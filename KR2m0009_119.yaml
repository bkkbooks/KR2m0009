body:
  text: 文獻通考卷一百十九鄱陽馬端臨貴與著王禮考十四后妃命婦以下車輦鹵簿周巾車王后之五路重翟錫面朱總厭翟勒面繢總安車雕面鷖總皆有容蓋重翟重翟雉之羽也厭翟次其羽使枂迫也勒面謂以如玊龍勒之韋為當面飾也雕者畫之不龍其韋安車坐乘車凡婦人車皆坐乘故書朱總為䌆鷖或作繄鄭司農云鍚馬面錫䌆當為總書亦或為總鷖讀為鳬鷖之鷖鷖總者青黑色以繒為之總著馬勒直兩耳與兩鑣容謂幨車山東謂之裳幃或曰潼容元謂朱總繢總其施之如鷖總車衡輨亦宜有焉繢畫文也蓋如今小車蓋也皆有容有蓋則重翟厭翟謂蔽也重翟后從王祭祀所乘厭翟后從王賔饗諸候所乘安車無蔽后朝見於王所乘謂去飾也詩國風碩人曰翟茀以朝謂諸候夫人始來乘翟蔽之車以朝見於君盛之也此翟蔽蓋厭翟也然則王后始來乘重翟乎二疏曰凡言翟者皆謂翟鳥之羽以為兩旁之蔽重則重為之厭則相次以厭其本單言翟車者又不厭其本也凡言總者謂以總為車馬之飾若婦人之總亦既係其本又埀為飾故謂之總安車坐乘車凡婦人皆坐乘而此獨得稱安車者以其無重翟厭翟翟車輦車之名無異物之稱故獨稱安車也鷖取鳥之鷖色青黑為義容昏禮婦車有裧注云裳幃周禮謂之容詩漸車幃裳注潼容是容潼容裳幃幨為一物蓋漢法小車有蓋所以表尊所以禦雨翟車貝面組總有幄輦車組鞔有翣羽蓋翟車不重不厭以翟飾車之側爾貝面貝飾勒之當面也有幄則此無蓋矣如今軿車是也后所乘以出桑輦車不言飾后居宫中從容所乘但漆之而已為輇輪人鞔之以行有翣所以禦風塵以羽作小蓋為翳日也面疏曰貝面貝水物謂餘泉餘蚳之貝文以飾勒之當者也蓋所以禦雨無幄乃施之有幄則無蓋漢法軿車無蓋有輻曰輪無輻曰輇輇則人鞔行之陳氏禮書曰五路言翟言車而不言路二翟言翟而不言車者不言路避王也不言車車不足以名之也孤言夏篆卿言夏縵至墨車以下然後言車是亦飾盛者以飾名飾殺者以車名也重翟錫面厭翟勒面安車雕面翟車貝面鄭司農曰錫馬面錫鄭康成曰勒面如玉龍勒之韋為當面飾然則錫面者錫飾馬面也勒面雕面貝面蓋亦若此勒面以韋則錫面雕面貝面以韋可知也錫必鏤之則雕面亦鏤錫可知也鍚面雕面以金貝面以貝則勒面有錫亦可知也或言勒或言雕互備也馬飾莫隆於錫勒飾莫殺於貝故巾車於王之玉輅言錫樊纓儀禮於士之喪車貝勒此重翟厭翟安車所以錫面而翟車所以貝面也漢制皇后鴛輅青羽蓋駕四馬斾九斿東漢太皇太后皇太后皇后法駕皆御金根車重翟羽蓋加青交輅帷裳其非法駕則乘紫罽軿車雲文畫輈黃金塗五末五末轅一轂二箱二共五也蓋爪施金花駕三馬左右騑應劭漢官儀明帝永平元年光烈皇后葬魂車駕輅青羽蓋駕四馬旗九旒前有方箱鳯凰車此因前漢舊制長公主乘赤罽軿車大貴人公主王妃封君油畫軿車大貴人加節畫輈皆右騑公列侯中二千石二千石夫人會朝若親蠶各乘其夫之安車右騑加交絡帷裳皆皂非公會不得乘朝車得乘漆布輜軿銅飾五末晉制后乘重翟羽蓋金根車加青絡青帷裳雲畫轅黃金塗五末蓋爪施金華駕三馬左右騑其廟見小駕則乘紫罽軿車飾及駕馬如重翟非法駕則皇太后乘輿皇后畫車后親蠶乘油畫雲母安車駕六騩馬騩淺黑色油畫兩轅安車駕五騩馬為副又金博山駢紫絳罽車皆駕三騩馬三夫人油駢車駕兩馬左騑其貴人加節畫輈三夫人助蠶乘青交絡安車駕三皆以紫絳罽軿車九嬪世婦乘軿車駕三長公主赤罽駢車駕兩馬公主王太妃皆油軿車駕兩馬右騑公主油畫安車駕三青交絡以紫絳罽軿車駕三馬為副王太妃三夫人亦如之公主助蠶乘油畫安車駕三公主有先置者乘青交絡安車駕三諸王妃公太夫人縣鄉君諸郡公侯特進夫人助蠶乘皂交絡車駕三諸郡公侯監國嗣子之世婦侍中常侍尚書中書監令卿校世婦命婦助蠶乘皂交絡安車儷駕郡縣公侯中二千石二千石夫人會朝及蠶各乘其夫之安車皆左騑皂交絡皂帷裳自非公會則不得乘軺車王妃特進夫人封郡君安車駕三皂交絡封縣鄉君油軿車駕兩馬右騑宋因晉制法駕乘重翟親蠶乘油畫雲母安車元嘉中東宫儀注云中宫僕御重翟金根車公主安車以紫絳罽軿車為副駕三九嬪世婦駢車駕一王妃特進夫人封君皂交絡安車駕三其貴人公主王妃封君油軿車駕二右騑公列侯中二千石夫人會朝及蠶所乘依漢故事齊因重翟車加金塗校具白地人馬錦帖箱隱漆後户白牙的帖金塗面釘漆畫鐡鉗金塗縱容後路師子轄軛皆施金塗螭首及龍雀等諸飾軛衡上施金博山又有金塗長角巴首蓋飾金塗爪支子花二十八青油挾碧絹黃紋蓋漆布箱紫顔黃絞紫紋隨隂碧芚徒昆反外上施絳紫絲絡碧旗九斿棨戟皇太子妃厭翟車如重翟飾而微減油絡畫安車公主王妃三公特進夫人所乘其貴人公主三夫人九嬪世婦三公妃特進夫人所乘正副皆依漢晉梁天監二年令上臺六宫長公主公主諸王太妃皆得乘青油榻幢通幰車榻幢涅幰為副綵女皇女諸王嗣子侯夫人皆乘赤油榻幢車以涅幰為副侍女聼涅幰二乘後魏熙平中有司蘇紹議皇后之輅其從祭則御金根車親喪則御雲母車歸寧則御紫罽車遊行御安車弔問御紺罽車并駕四馬北齊因魏制其諸公主乘油朱絡網車車中飾用金塗及純銀後周皇后之車十二等一曰重翟以從皇帝祀郊禖享先皇朝皇太后二曰厭翟以祭隂社三曰翟輅以採桑四曰翠輅以從皇帝見賔客五曰雕輅以歸寧六曰篆輅以臨諸道法門六輅皆鍚面朱總金鈎七曰蒼輅以適命婦八曰青輅九曰朱輅十曰黃輅十一曰白輅十二曰元輅五時常出則供之六輅皆疏面繢總諸公夫人之輅車九厭翟翟輅翠輅皆鍚面朱總金鈎雕輅篆輅皆勒面刻白黑韋為當顱繢總朱輅黃輅白輅元輅皆雕面鷖總總黑色繒其著如朱總諸侯夫人自翟輅而下八諸伯夫人自翟輅而下七諸子夫人自雕輅而下六諸男夫人自篆輅而下五鞶纓就數各視其君三妃三公夫人之輅九篆輅朱輅黃輅白輅元輅皆勒面緇總夏篆夏縵墨車棧車皆雕面鷖總三㚤由內反三孤內子自朱輅以下八六嬪六卿內子自黃輅而下七上下媛婦中大夫孺人自夏篆而下四女御婉士婦人自夏縵而下三其鞶纓就各以其等皆簟茀漆之君以赤卿大夫士以元君駕四三輈六轡卿大夫士駕二一輈四轡隋開皇初李德林奏用後魏熙平蘇紹議皇后之輅後著令制重翟青質金飾諸末朱輪金根朱牙其箱飾以重翟羽青油幢朱裏通幰繡紫帷朱絲絡網繡紫絡帶八鸞在衡鏤錫鞶纓十二就金鑁方釳插翟尾朱總駕蒼龍受册從祀郊禖享廟則供之厭翟赤質金飾諸末輪畫朱牙其箱飾以翟羽紫油幢朱裏通幰紅錦帷朱絲絡網紅錦帶餘如重翟駕赤騮親桑供之翟車黃質金飾諸末朱輪畫朱牙其側飾以翟羽黃油幢黃裏通幰白紅錦帷朱絲網絡白紅錦絡帶餘如重翟駕黃騮歸寧則供之諸鞶纓之色皆從車質安車赤質金飾紫通幰朱裏駕四馬臨幸及弔則供之輦金飾同於蓬輦通幰班輪駕四馬宫苑近行則乘之屬車三十六乘皇太子妃乘翟車以赤為質駕三馬畫轅金飾犢車為幅紫幰朱網絡良娣以下並乘犢車青幰朱裏三公夫人公主王妃並犢車紫幰朱網絡五品以上並乘青幰與其夫同唐因隋制重翟厭翟翟車安車其飾不易又制四望車紫油朱質通幰畫絡帶拜陵臨弔則供之又制金根車朱質紫油通幰畫油絡帶朱絲絡網常行則供之內命婦夫人乘厭翟車嬪乘翟車媫妤以下乘安車各駕二馬外命婦公主王妃乘厭翟車駕二馬自餘一品乘白銅飾犢車青通幰朱裏油幢朱絲絡網駕牛二品以下去油幢絡網四品青偏幔其王公以下車輅皆太僕官造貯掌之若受制行册命及二時巡陵婚葬則給之皇太后皇后鹵簿清遊旗一人執二人引二人夾領三十人並帶橫刀執矟弩弓箭而行次虞候佽飛二十八人夾道單行次內僕令一人在左內僕丞一人在右次黃麾一人執次左右廂黃麾仗廂各三行行列百人左右領軍衛各領五色繡幡六口次內謁者監四人給事二人內常侍二人內侍一人並騎分左右次內給使百二十人分左右屬子單畫宫人車次偏扇團扇方扇各二十四分左右宫人執次香鐙一內給使四人舁次重翟車青質金飾駕四馬受册從祀享廟則乘之駕士二十四人次行障六具分左右宫人執次坐障三具分左右宫人執次內寺伯二人領寺人六人騎分左右夾重翟車次腰輿一執者八人次團扇二次大繖四次孔雀扇八分左右次錦花蓋二次小扇朱畫團扇各十二並橫行次錦曲蓋二十次錦六柱八扇分左右自腰輿已下並大內給使執次宫人車次後黃麾一次供奉宫人在黃麾之後次厭翟車朱質金飾駕赤騮四親蠶採桑則乘之次翟車黃質金飾駕赤驊騮四寧于家乘之次安車赤質金飾駕赤騮四臨幸及弔則乘之駕士各二十四人次四望車朱質駕牛拜陵臨弔則乘之次金根車朱質駕牛常行則乘之駕士各十二次左右廂各牙門二門二人執四人夾次左右領軍衛廂各百五十人執殳盡鹵簿曲折陪後門左右折衝一人次領鹵簿後所開牙門並在殳杖行之內前後部鼓吹金鉦棡鼓大鼓小鼓長鳴中鳴鐃次羽葆鼓吹橫吹節鼓御馬並減大駕之半皇太子妃鹵簿清道率府校尉六人騎分左右為三重引帶弓箭橫刀次青衣十人分左右次𨗳客舍人四人分左右引𨗳次內給使六人朱衣分左右後盡內人車次偏扇團扇方扇各十八各分左右宫人執並間綵衣次行障四具分左右夾車宫人執次坐障二具夾車宫人執次內典二人騎分左右次翟車駕三馬駕士十四人次閣師二人領內給使十八人分左右次六柱二扇內給使執次供奉內人乘犢車次繖一正道行大扇二團扇四曲蓋二分左右各內給事執次戟九十分左右在內給使單行前與青衣齊後盡內人車內命婦四妃九嬪媫妤美人才人鹵簿太子良娣以下同清道二人青衣六人青衣九嬪四人餘並二人偏扇團扇方扇各十六九嬪十四餘並十行障三具九嬪以下二具坐障二具九嬪已下一具並婦人執厭翟車九嬪翟車媫妤以下安車並駕二馬馭十人九嬪以下八內給使十六人九嬪十四餘並十人從車六乘九嬪四餘並三乘繖一大扇二九嬪已下無大扇團扇二內給使執戟六十九嬪四十餘並二十外命婦鹵簿一品清道二人青衣六人二品青衣四人三品四品二人偏扇團扇方扇各十六二品十四三品四品八行障三具二品三品三具四品一具坐障二具已下並一具厭翟車從人十六夾車駕一馬馭人八非公主王妃並乘白銅飾犢車駕牛馭人四二品從人十四已下各減二從車六乘二品三品四乘四品二乘繖一大扇一二品已下無大扇團扇二戟六十二品四十三品二十四品無戟宋朝皇后鹵簿唯用厭翟車其制箱上有平盤四角曲欄兩壁紗窗龜文金鳯翅前有虛匱香爐香寶緋繡幰衣絡帶門簾三轅鳯首畫梯推竿行馬緋繒裹索駕六馬金銅面纓轡鈴襻緋屧駕士三十人武辨緋繡衫常出止用正副金塗銀裝白藤輿各一上覆棕櫚屋飾以鳯輦官同乘輿平頭輦之制內外命婦之車銀裝白藤輿簷內命婦皇親所乘白藤輿簷金桐犢車漆犢車或覆以氊或覆以棕內外命婦通乘皇太后皇后鹵簿皆如禮令昭憲孝明孝章元德明德莊穆皇后園陵嘗用之公主鹵簿惟葬日給之秦國成聖繼明夫人葬日亦給外命婦一品鹵簿自餘未嘗用之仁宗初章獻太后臨朝儀衛始盛乾興元年用禮儀院奏製皇太后所乘輿名之曰大安輦具皇太后出入鳴鞭儀衛凡御龍直總五十四人骨朵直總八十四人弓箭直弩直合五十四人殿前指揮使左右班合五十六人禁衛皇城司二百人寬衣天武二百人儀衛供御輦宫六十二人寬衣天武百人其侍衛諸司應舉悉如乘輿神宗嗣位尊皇太后為太皇太后而皇太后皇后常出止用副金塗銀裝白藤輿制見前乃詔太皇太后出入所乘如萬安太后輿上設行龍六制飾率有加哲宗紹聖元年議造皇太后太安輦中書具治平元豐皇太后輿服儀衛以呈曰元豐中宣仁謙恭不乘太安輦上曰今皇太后獨尊非宣仁比遂詔行幸進太安輦而皇太后嫌避竟不製造哲宗即位尊朱貴妃為皇太妃出入乘簷子有司請用牙魚鳯為飾繖用青元祐三年太皇太后詔有司尋繹典故於是簷子飾以龍鳯繖用紅九年羣臣議改簷子為輿上設行龍五出入由宣德東偏門帝以皇太后諭旨令太妃坐六龍輿出入進黃繖由宣德正門於是三省議皇太妃坐龍鳯輿繖紅黃兼用從皇太后出入止用紅徽宗政和三年議禮局上皇后車輿之制重翟車青質金飾諸末間以五采輪金根朱牙其箱飾以重翟羽面施雲鳯孔雀刻鏤龜文頂輪上施金立鳯耀葉青羅幰衣一紫羅畫雲龍絡帶二青絲絡網二紫羅畫帷一青羅畫雲鳯夾幔二車內設紅褥及坐橫轅上施立鳯八香匱設香爐香寶飾以螭首前後施簾長轅三飾以鳯頭青繒裹索駕青馬六馬有銅面插翟羽鞶纓襻胸鈴拂青屧青色尾若受册謁景靈宫則乘之厭翟車赤質其箱飾以次翟羽紫幰衣紅絲絡網紅羅畫絡帶夾幔錦帷餘如重翟車駕赤騮四若親蠶則乘之翟車黃質其車側飾以翟羽黃幰衣黃絲絡網錦帷絡帶餘如重翟車駕黃騮四安車赤質金飾間以五采刻鏤龜文紫幰衣錦帷絡帶紅絲絡網前後施簾車內設褥及坐長轅三飾以鳯頭駕赤騮四凡駕馬鞶纓之飾並從車質四望車朱質青幰衣餘同安車駕牛三金根車朱質紫幰衣餘同安車駕牛三自重翟以下備鹵簿則皆以次陳設藤輿金塗銀裝上覆棕櫚屋以龍飾常行之儀則用之皇后鹵簿之制清遊隊旗一執一人引二人夾二人並騎金吾衛折衝都尉一員騎執矟二人夾領四十騎執矟二十人弩四人橫刀一十六人次虞候佽飛二十八騎內僕內僕丞各一員各書令史二人並騎次正道黃麾執一人夾二人並騎次左右廂黃麾仗廂各三行行一百人第一行短戟五色氅第二行戈五色氅第三行儀鍠五色幡左右領軍衛左右威衛左右武衛左右驍衛左右衛等各三行行二十人各帥兵官六人領內左右領軍衛帥兵官各三人各果毅都尉一員檢校各一人步從左右領軍衛絳引旗引前掩後各六次內謁者監四人給事內常侍內侍各二人並騎內給使各一人步從次內給使一百二十人次偏扇團扇方扇各二十四次香鐙一執擎內給使四人在重翟車前次重翟車駕青馬六駕士二十四人行障六坐障三夾車並宫人執次內寺伯二人騎領寺人六人分左右夾重翟車次腰輿一輿士八人團雉尾扇二夾輿次大繖四大雉尾扇八錦花蓋二小雉尾扇朱畫團扇各一十二錦曲蓋二十錦六柱八扇自腰輿以下並內給使執次宫人車次絳麾二各一人執次正道後黃麾一執一人夾二人並騎次供奉宫人次厭翟車駕赤騮翟車駕黃騮安車駕赤騮各四駕士各二十四人四望車金根車各駕牛三駕士各一十二人次左右廂各置牙門二每門執二人夾四人一在前黃麾前一在後黃麾後次左右領軍衛每廂各一百五十人執殳帥兵官四人檢校次左右領軍衛折衝都尉各一員檢校殳仗各一人騎從次後殳仗內正道置牙門一每門監門校尉二人騎每廂各巡檢校尉一員騎往來檢校前後部鼓吹金鉦棡鼓大鼓長鳴中鳴鐃吹羽葆鼓吹節鼓御馬並減大駕之半皇太子妃鹵簿之制清道率府校尉六人騎青衣十人次𨗳客舍人四人內給使六十人偏扇團扇方扇各一十八並宫人執行障四坐障二夾輦宫人執典內二人騎厭翟車駕三馬駕士一十四人次閣師二人領內給使十八人夾車六柱二扇內給使執次供奉內人乘犢車次繖一正道雉尾扇二團扇四曲蓋二執繖扇各內給使一人次戟九十命婦鹵簿附見品官鹵簿門孝宗隆興二年禮官言五禮新儀皇后受册畢乘重翟車陳小駕鹵簿朝謁景靈宫次詣德夀宫朝謁今重翟車等未備請止用肩輿龍簷子從之乾道元年詔有司製皇太子妃簷子如政和六年之制竿梁黑漆角獸白藤織花面茜紅羅掌扇四柄簷子前以小殿侍二人抱鍍金青香毬寧宗慶元二年册皇妃製簷子金鍍銀裝釘棕頂紅黃藤百花龍總以香檀木為之椅子以金雕龍首褥以紅羅裝釘以金鍍銀葉絛以紅茸屏風夾幔皆以紅羅供御輦官三十六人次供御十四人下都五十四人皇太子皇子公卿以下車輦鹵簿周禮巾車金輅鈎樊纓九就建大旗以封同姓象路朱樊纓七就以封異姓革路龍勒條纓五就以封四衛木路前樊鵠纓建大麾以封蕃國同姓謂子母弟以功德出封若魯衛之屬異姓王甥舅四衛四方諸侯守衛者蠻服以內也蕃國謂九州之外夷鎮蕃服其制度並注見乘輿門服車五乘服車服事者之車也孤乘夏篆謂五色畫轂約也卿乘夏幔夏縵亦五采畫無篆大夫乘墨車墨車不畫但以漆革車而已士乘棧車不革鞔而漆也庶人乘役車箱方可載任器以供役漢皇太子皆安車朱班輪飛軨青蓋金虎爪倚花較伏鹿文畫轓吉陽筒文輈金塗五末旗九斿降龍皇太子為王賜以乘之皇孫緑車以從皆左右騑三馬名皇孫車景帝中元五年始詔六百石以上施車轓得銅五末軛有吉陽筒二千石以上右騑三百石以上帛布蓋千石以上皂繒蓋二百石以上白布蓋皆四維杠衣賈人不得乘馬車吏赤蓋杠其餘皆青古今注曰武帝天漢四年令諸侯王大國朱輪特虎居前左兕右鹿小國特熊居前麋鹿居左右大使車立乘駕四赤帷裳持節者重𨗳從賊曹車斧車功曹車皆兩大車伍百璅弩十二人辟車四人從車四乘小使車不立乘有騑赤屏泥油重絳帷𨗳無斧車近小使車蘭輿赤轂白蓋赤帷騶騎四十人此追捕考按有所執取者所乘諸侯車皆朱斑輪四幅赤衡軛公卿二千石郊廟明堂祀陵法出皆大車立乘駕駟他出乘安車其飾如金根車如施組連璧交結四角金龍銜璧垂五綵析羽旒蘇前後雲氣畫帷裳文畫轓長與車等駕布施馬布施馬者純白駱馬也以黑藥灼其身為武文公卿以下至縣三百石五吏賊曹督賊功曹皆帶劍三車𨗳從縣令以上加𨗳斧車牛車武帝推恩之末諸侯有寡弱者皆乘牛車其後牛車稍通貴者之所乘諸馬之文王公列侯鏤錫義髦朱鑣朱鹿朱文絳扇汗青翅燕尾卿以下有騑者緹扇汗青翅尾當盧義髦上下皆通中二千石以上及使者乃有騑駕云程氏演繁露曰漢初馬少故曰自天子不能具醇駟將相或乘牛車言惟天子之車然後有馬然亦不能純具一色至將相則時或駕牛也自吳楚誅後諸侯惟是食租衣稅無有橫入故貧者或乘牛車則此之以牛而駕自緣貧窶無資可具非有禁約也漢韋元成以列侯侍祠天雨淖不駕駟馬車而騎至廟下有司劾奏削爵則舍車而騎漢已有禁矣東晉惟許乘車其或騎者御史彈則漢法仍在也至其駕車遂改用牛王𨗳駕短轅犢車犢牛犢也王濟之八百里駁駁亦牛也言其色駁而行速日可八百里也石崇之牛疾奔人不能追此其所以寶之也南史吳興太守之官皆殺軛下牛以祭項羽知駕車用牛也豈通晉之制皆不得駕馬也邪子於是考按上古駕車則皆駕牛無用馬者故易曰服牛乘馬也又曰皖彼牽牛不以服箱則牛服之謂也至古之耕却不用牛孔子弟子中有冉耕字伯牛豈前此未以牛耕邪詩十千為耦長沮桀溺耦而耕沮溺二人相對自挽犂也甘誓御非其馬之正汝不供命詩曰四牡騑騑蕭蕭馬鳴有車鄰鄰有馬白顛則車皆馬駕也然則此時牛既不耕又不駕車則將何用也至於馬既駕車車重而鈍又未有人知用馬為騎直至六韜方著騎兵詩書中元未之有此制殆難考也後漢制公卿乘安車朱斑輪飛軨倚鹿較伏熊軾皂繒蓋黑轓右騑旗九斿鏤錫義旄朱鑣縱末鹿文絳扇汗青翅燕尾卿以下有騑者緹扇汗中二千石皆皂蓋朱兩轓千石六百朱左轓轓長六尺下屈廣八寸上業廣尺二寸九丈十二物後謙一寸若月初生然不敢自滿也後漢百官𨗳從卒公卿以下至縣三百石長𨗳從置門下五吏賊曹督察盜賊功曹皆帶劍三車𨗳主簿主記兩車為從縣令以上加𨗳斧車公乘安車則前後并馬立乘長安雒陽令及王國都縣加前後兵車亭長設右騑駕兩璅弩車前伍伯公八人中二千石二千石六百石皆四人自四百石以下至二百石皆二人黃綬武官伍百文官辟車軨下侍閣門闌部曲街里走卒皆有程品多少隨所典領驛馬三十里一置卒皆赤幘絳云古者軍出師旅皆從秦省其卒取其師旅之名焉公卿下至二千石騎吏四人千石以下至三百石縣長二人皆帶劍持棨戟為前列揵弓韣九鞬諸侯王法駕官屬傅相以下皆備鹵簿似京都官騎張弓帶鞬遮迾出入稱課促列候家丞度子𨗳從若會耕祠主縣假給辟車鮮明卒備其威儀𨗳從事畢皆罷所假程氏演繁露曰太守五馬莫知的據古樂府五馬立踟躇即其來已久或言詩有良馬五之侯國事也然上言良馬四之下言良馬六之則或四或六元非定制也漢有駟馬車正用四馬而鄭元注詩曰周禮州長建旟漢太守比州長法御五馬元以州長比方漢州大小相絶逺矣周之州乃反統𨽻於縣比漢太守品秩殊不侔不足為據然鄭後漢時人則太守之用五馬後漢已然矣至唐白樂天和深春二十詩曰五匹鳴珂馬雙輪畫戟車至其自杭分司有詩曰錢唐五馬留三匹還擬騎來攪優春老杜亦曰使君五馬一馬驄則是真有五馬矣若其制之所始則未有知者魏因漢制文帝問東平王有輅為是特賜乎鄭稱對曰天子五輅金輅以封同姓諸侯得與天子同乘金輅非特賜始有也晉皇太子安車因魏制而駕三馬非法駕則乘畫輪車上開四望緑油幢朱絲繩絡兩廂裏飾黃金漆塗五末其副車三乘形制如所乘但不畫輪耳王青蓋車皇孫緑蓋車並駕三左右騑晉制雲母車以雲母飾犢車以賜王公皂輪車駕牛形如犢車皂漆較轂上加青油幢朱絲繩絡諸王三公有勳德者特加之位至公或四望三望夾望車油幢車駕牛如犢車皂輪但不漆轂王公大臣有勳德特給之通幰車駕牛如犢車但舉其幰通覆車上諸王三公並乘之武帝詔給魏舒陽燧四望小車三望如四望油幢給車似三望而減王公加禮者乘次三望平乘車竹簟子壁揩輪為輪通幰其後形龍牽金塗支子花細轅頭後稍沓伏神承塗庶人亦然三公諸王所乘自四望至平乘皆銅校飾諸公給朝車駕駟安車黑耳駕三自祭酒掾下及令史皆皂軨特進以下諸將軍非持節都督者給安車黑耳駕二三公九卿二千石皆人車立乘駕四去位致仕告老賜安車駕四郡縣公侯安車駕二右騑皆朱斑輪倚鹿車伏熊軾皂繒旗斿公八侯七卿五皆畫降龍中二千石二千石皆皂蓋朱輪同五駕二千石六百石朱左輪王公之元子攝命理國者安車駕三旗七斿封侯之元子五斿大使車立乘駕四赤帷裳騶騎公卿二千石郊廟上陵從駕所乘小使車不立乘駕四輕車之流也蘭輿皆朱轂赤屏泥白蓋赤帷裳追捕執取者所乘凡諸使車皆朱斑輪赤衡軛追鋒車去小蓋加通幔如軺車駕二以迅速為名戎陳之間是為傳乘軺車古將軍所乘傳之車按漢貴輜軿而賤軺車魏晉貴軺車而賤輜軿三品將軍以上尚書令軺車黑耳有後户僕射但有後户耳並皂輪也東晉安帝時皇子乘後山安車制如金輅宋因之皇子為王亦錫以皇太子之安車皇孫緑車亦因舊法其追鋒車雲母車四望車公及列候所乘安車依漢舊制駕二馬旗旗斿王公侯七卿五皆降龍公卿中二千石郊陵法出皆大車立乘駕四他出去位致仕者皆安車四馬二千石皆皂蓋朱轓銅五末駕二右騑王公之世子攝命治國者安車駕三旗旗七斿侯世子五斿齊皇太子乘象輅校飾如御旗旗九斿降龍制黃屋車建碧旗九斿九斿鸞輅也蓋以黃絡為裏金塗校其絳絲九命上公所乘青蓋安車朱轓斑輪駕一左右騑通幰車為副諸王禮行所乘皂蓋安車朱轓漆斑輪駕一通幰朱車為副三公禮行所乘安車黑耳皂蓋朱轓駕一牛車為副國公列侯禮行所乘馬車駕一九卿領護二衛驍遊四軍五校從郊陵所乘餘同晉法梁皇太子皇子因齊象輅制鸞輅駕三左右騑朱斑輪倚獸較伏鹿軾九斿降龍青蓋畫轓文輈金塗五末以畫輪車為副常乘畫輪則衣畫車為副其畫輪車上開四望緑油幢朱繩絡兩箱裏飾以金錦二千石四品以上及列侯皆給軺車駕牛伏兔箱青油幢朱絲絡網轂皆黑漆天監二年令三公開府尚書令給鹿轓軺施耳後户皂輞尚書僕射左右光祿大夫侍中中書監祕書監給鳯轄軺後户皂輞領護國子祭酒太子詹事尚書侍中列卿等給聊泥軺無後户漆輪車驃騎及諸王除刺史帶將軍給龍雀軺以金銀飾御史中丞給方蓋軺形小如繖諸王三公有勳德者皆特加皂輪車駕牛形如犢車但烏漆輪轂黃金雕裝上加清油幢朱絲絡通幰王公加禮者給油幢絡車駕牛朱輪華轂程氏演繁露曰舊尚書令僕中丞騶唱得入宫門止於馬道馬道是許人上馬處也郭祚為僕射奏言非盡敬之宜騶唱不入宫自此始也按騶唱者騶從之傳呼也朱仲逺為行臺僕射請凖朝式在軍鳴騶廢帝笑而許之史臣謂其任情則是僕射在朝得用騶唱而涖軍則否軍國異容之義也在軍而乞從朝儀所以名為任情也梁制尚書令僕御史中丞各給威儀十人其七人武冠絳韝唱呼入殿引喤至階一人執儀囊不喤音橫類篇曰喧也則七人同聲唱𨗳故曰喧也通典二十二絳韝六人所謂騶也陳因梁制後魏太子乘金輅朱蓋赤質駕四馬三公及王車朱屋青蓋制同五輅名曰髙車駕三馬庶姓王侯及尚書令僕以下列卿以上並給軺車駕一馬或乘四望通幰車駕一牛北齊因魏制庶姓王儀同三司以下翟尾扇繖皇宗及三品以上官青繖朱裏其青繖碧裏達於士人不禁正從一品執事散官及儀同三司乘油朱絡網車車牛飾得用金塗及純銀二品三品乘卷通幰車車牛金飾七品以上乘偏幰車車牛飾以銅後周諸公之輅九方輅各象方之色碧輅金輅皆錫鞶纓九就金鈎象輅犀輅貝輅革輅篆輅木輅皆疏鞶纓九就皆以朱白蒼三綵諸侯自方輅而下八無碧輅諸伯自方輅而下七無金輅諸子自方輅而下六無象輅諸男自方輅而下五又無犀輅凡就各如其命三公之車輅九祀輅犀輅貝輅篆輅木輅夏篆夏幔墨車棧車自篆以上金塗諸末錫鞶纓金鈎木輅以下銅飾諸末疏鞶纓皆九就三孤自祀輅而下八無犀輅六卿自祀輅而下七又無貝輅上大夫自祀輅而下六又無篆輅中大夫自祀輅而下五又無木輅下大夫自祀輅而下四又無夏篆士車三祀車墨車棧車凡就各如其命數自孤以下就以朱緑二采隋皇太子金輅赤質金飾諸末重較箱畫文鳥獸黃伏鹿軾龍輈金鳯一在軾前設障塵朱蓋黃裏畫輪朱牙左建旗九斿右載闟戟旗首金龍頭銜結綴及鈴緌駕赤騮駟八鸞在衡二鈴在軾金鑁方釳插翟尾五焦鏤錫鞶纓九就從祀享廟正冬大朝納妃則乘之軺車金飾諸末紫通幰朱裏駕一馬五日常朝及朝饗宫官出入行道乘之四望車金飾諸末紫油幢通幰朱裏朱絲絡網駕一馬弔臨則乘之隋制公及一品象輅黃質象飾諸末建旟畫以鳥隼受册告廟升壇上任親迎及葬則乘之侯伯及二品三品革輅白質建旟畫熊虎受册告廟親迎及葬則乘之子男及四品木輅漆飾建旐畫龜蛇受册告廟親迎及葬則乘之象輅以下斿及就數各依爵品犢車則魏武賜楊彪七香車也駕牛自王公以下至五品以上並給乘之三品以上青幰朱裏五品以上紺幰碧裏皆白銅裝唯有參謁及弔喪者則不張幰而乘鐵裝車六品以下不給任自乘犢車弗許施幰而乘初五品以上乘偏幰車其後嫌其美停不行用以白幰代之三品以上通幰車則青壁一品軺車油幰朱網唯車輅一等聽始得乘之唐太子車輅因隋制王公以下車輅親王及武職一品象輅自餘及二品三品革輅四品木輅五品軺車象輅朱斑輪八在衡左建旗旗畫龍一升一降右載闟戟革輅以革飾左建旜通帛為旜餘同象輅木輅以漆飾之餘同革輅軺車曲壁青通幰諸輅質蓋旗旜皆朱一品九斿二品八斿三品七斿四品六斿其有鞶纓就數皆凖此三品以上珂九子四品七子五品五子六品以下去通幰及珂王公車輅藏於太僕受制行册命巡陵婚葬則給之餘皆以騎代車皇太子鹵簿家令次率更令並乘軺車次太保次太傅次太師自家令已下並正道威儀鹵簿各次六十三品各乘輅次清遊隊旗一人執一人引二人夾領三十騎次左右清道率府率各一人次外清道直簿二十四人騎分左右夾道單行次龍旗六各一人騎執每一騎前二人騎為二重引前每旗後亦二人重騎護後次細引六重重二人並行正道次率更丞一人棡鼓金鉦各二面左鼓右鉦次大鼓三十六面騎橫行正道次長鳴三十六具騎橫行正道次鐃吹一部鐃鼓二面各一騎執二人騎夾簫笳各六騎並橫行次棡鼓金鉦各二面一騎執左鼓右鉦次小鼓三十六面次中鳴三十六具並騎橫行正道次誕馬十匹分左右二人執次廄牧令一人在左丞二人在右次左右翊府郎將各一