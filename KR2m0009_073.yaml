body:
  text: 文獻通考卷七十三鄱陽馬端臨貴與著郊社考六明堂黄帝拜祀上帝於明堂或謂之合宫其堂之制中有一殿四面無壁以茅葢通水水圜宫垣為複道上有樓從西南入名昆侖右黄帝明堂制度之説乃漢武帝時濟南人公玉帶所上楊氏祭禮明堂篇以其不經而削之然其所言茅葢通水與夫戴禮所記畧同又考工記所言夏后世室殷人重屋周人明堂其制大槩由質而趨於文由狹而趨於廣以是推之黄帝時無明堂則已茍有之則一殿無壁葢以茅正太古儉朴之制又按武帝欲求仙延年方士之謬誕者多假設黄帝之事以售其説如所謂作五城十二樓封名山接萬靈明廷采首出銅鑄鼎之𩔖皆矯誣古聖張大其詞以迎合時主之侈心獨公玉帶所上明堂之制乃簡朴如此雖不經見然豈不可稍䂓千門萬户之失固未可以其言之並出於封禪求仙之時而例黜之也唐虞祀五帝於五府府者聚也言五帝之神聚而祭於此堂蒼曰靈府赤曰文祖黄曰神記白曰明紀黑曰元矩五府之制未詳夏后氏世室堂修二七廣四修一世室者宗廟也魯廟有世室夏度以歩令堂修十四歩其廣益以四分修之一則堂廣十七歩半疏曰云夏度以歩者下文云三四歩明此二七是十四歩也云令堂修十四歩者言假令以此堂云二七約之知用歩無正文故鄭以假令言之也知堂廣十七歩半者以南北為修十四歩四分之取十二歩益三歩為十五歩餘二歩益半歩為二歩半添前十五歩是十七歩半也五室三四歩四三尺堂上為五室象五行也三四歩室方也四三尺以益廣也木室於東北火室於東南金室於西南水室於西北其方皆三歩其廣益之以三尺土室於中央方四歩其廣益之以四尺此五室居堂南北六丈東西七丈中疏曰云五室象五行者以其宗廟制如明堂明堂之有五天帝五人帝五人神之坐皆法五行故知五室象五行也揚氏曰注四室皆三歩六尺為歩三歩一丈八尺也其廣益之以三尺為二丈一尺中央四歩二丈四尺也其廣益之以四尺為二丈八尺合南北二室為三丈六尺及堂二丈四尺為六丈合東西二室為四丈二尺及堂二丈八尺為七丈九階南面三三面各二疏曰按賈馬諸家皆以為九等階鄭不從者以周殷差之夏人卑宫室當一尺之堂為九等階於義不可故為旁九階也鄭知南面三階者見明堂位云三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上故知南面三階也知餘三面各二者大射禮云升自北階又雜記云升自側階奔䘮云升自東階以此而言四面有階可知四旁兩夾窻窻助户為明每室四户八窻疏曰言四旁者五室室有四户四户之旁皆有兩夾窻則五室二十户四十窻也白盛蜃灰也盛之言成也以蜃灰堊墻所以飾成宫室反蜃常軫反堊烏路門堂三之二門堂門側之堂取數於正堂今堂如上制則門堂南北九歩二尺東西十一歩四尺爾雅曰門側之堂謂之塾室三之一兩室與門各居一分各疏曰此室則在門堂之上作之也言居一分者謂兩室與門各居一分殷人重屋堂修七尋堂崇三尺四阿重屋重直龍反宫重屋者王正堂若大寢也其修七尋五丈六尺放夏周則其廣九尋七丈二尺也五室各二尋崇髙也四阿若今四注屋重屋複笮也云放方往反複音福笮側白反南疏曰雖言放夏周經堂修七尋則廣九尋若周言北七筵則東西九筵是偏放周法而言放夏者七九偏據周夏后氏南北狹東西長亦是放之故得兼言放夏也云四阿若今四注屋者燕禮云設洗當東霤則此四阿四霤者也云重屋複笮也者若明堂位云複廟重檐鄭注云重檐重承壁材也則此複笮亦重承材故謂之重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵明堂者明政教之堂周度以筵亦王者相改周堂髙九尺殷三尺則夏一尺矣相參之數禹卑宫室謂此一尺之堂與此三者或舉宗廟或舉王寢或舉明堂互言之以明其同制疏曰云其同制者謂當代三者其制同非謂三代制同也室中度以几堂上度以筵宫中度以尋野度以歩涂度以軌周文者各因物宜為之數室中舉謂四壁之内中疏曰因物宜者謂室中坐時馮几堂上行禮用筵宫合院之内無几無筵故用手之尋也在野論里數皆以歩故用歩涂有三道車從中央故用車之軌是因物所宜也廟門容大扄七个大扄牛鼎之扄長三尺每扄為一个七个二丈一尺制疏曰知大扄十鼎之扄長二尺者此約漢禮器度闈門容小扄三个廟中之門曰闈門小扄膷鼎之扄長二尺三个六尺疏曰云廟中之門曰闈門者爾雅文此即雜記云夫人至入自闈門是也膷鼎亦牛鼎但上牛鼎扄長三尺據正鼎而言此言膷鼎據陪鼎三膷臐膮而説也膷音香冬官考工記天子負斧依南鄉而立負之言背也斧依為斧文屏風於户牖之間於前立焉三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上九采之國應門之外北面東上四塞世告至此周公明堂之位也九采九州之牧典貢職者也正門謂之應門方伯帥諸侯而入牧居外而糾察之也四塞謂夷服鎮服蕃服在四方為蔽塞者新君即位則來朝周禮侯服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見九州之外謂之蕃國世一見明堂位朱子曰鄭氏謂天子廟及路寢如明堂制者葢未必然明堂位與考工記所記明堂之制度者非出於舊典亦未敢必信也楊氏曰此章云周公相武王以伐紂武王崩成王㓜弱周公踐天子之位以治天下六年朝諸侯於明堂註家云周公攝王位以明堂之禮儀朝諸侯此説舛謬故削去之孟春之月天子居青陽左个青陽左个大寢東堂北偏仲春之月天子居青陽太廟青陽太廟東堂當太室季春之月天子居青陽右个青陽右个東堂南偏孟夏之月天子居明堂左个明堂左个大寢南堂東偏也仲夏之月天子居明堂太廟明堂太廟南堂當太室也季夏之月天子居明堂右个明堂右个南堂西偏也中央土天子居太廟太室太廟太室中央室也孟秋之月天子居總章左个縂章左个大寢西堂南偏仲秋之月天子居總章太廟總章太廟西堂堂太室也季秋之月天子居總章右个總章右个西堂北偏孟冬之月天子居元堂左个元堂左个北堂西偏仲冬之月天子居元堂太廟元堂太廟北堂當太室季冬之月天子居元堂右个元堂右个北堂東偏月令大戴禮曰明堂者古有之也淮南子言神農之世祀於明堂明堂有葢四方又漢武帝時有獻黄帝明堂圖者或始於此凡九室一室有四户八牖三十六户七十二牖以茅葢屋茅取其潔質也上圓下方明堂者所以明諸侯尊卑外水曰辟雍韓詩説辟圓如璧雍以水不言圓言辟者取辟有徳不言辟水言雍雍和也南蠻東夷北狄西戎言四海之君於祭也各以其方列於水外明堂月令於明堂之中施十二月之令赤綴户也白綴牖也綴飾也二九四七五三六一八記用九室謂法龜文堂髙三尺東西九筵南北七筵上圓下方九室十二堂室四户户二牖其宫三百歩在近郊近郊三十里淳于登説明堂在國之陽三里之外七里之内丙巳之地韓詩説明堂在南方七里之郊然三十里無所取也再言圓方及户牖之數亦煩重或以為明堂者文王之廟也明堂與文王之廟不同處或説謬朱草日生一葉至十五日生十五葉十六日一葉落終而復始也孝經援神契曰朱草生蓂莢孳嘉禾成莆生蓂莢堯時夾階而生以記朔也朱草可食王者慈仁則生其形無記周時徳澤洽和蒿茂大以為宫柱名為蒿宫也晏子春秋曰明堂之制下之潤濕不及也上之寒暑不入也木工不鏤示民知節也然或以髙為柱表其儉質也此天子之路寢也不齊不居其室路寢亦為此制明堂位疏曰明堂説月令説明堂髙三丈東西九筵南北七筵上圓下方四堂十二室四户八牖其宫方三百歩在近郊三十里淳于登説云明堂在國之陽三里之外七里之内丙巳之地就陽位上圓下方八窻四闥布政之宫故稱明堂明堂盛貎周公祀文王於明堂以古周禮孝經説明堂文王之廟夏后氏曰世室殷人曰重屋周人曰明堂東西九筵南北七筵堂崇一筵五室凡室二筵葢之以茅周公祀文王於明堂以昭事上帝許君謹案今禮古禮各以義説無明文以知之鄭駮之云戴禮所云雖出盛徳篇云九室三十六户七十二牖似秦相吕不韋作春秋時説者葢非古制也四堂十二室字誤本書云九室十二堂淳于登之言取義於孝經援神契説宗祀文王於明堂以配上帝曰明堂者上圓下方八窻四闥布政之宫在國之陽帝者諦也象上承五精之神五精之神實在太微在辰為巳是以登云然今漢立明堂丙巳由此為之如鄭此言用淳于登之説此别錄所云依考工記之文然先代諸儒所説不一故蔡邕明堂月令章句明堂者天子太廟所以祭祀夏后氏世室殷人重屋周人明堂饗功養老教學選士皆在其中故言取尊崇之貎則曰太廟取其正室則曰太室取其堂則曰明堂取其四時之學則曰太學取其圜水則曰辟雍雖名别而實同鄭必以為各異者袁凖正論明堂宗廟太學禮之本物也事義不同各有所為而世之論者合以為一體取詩書放逸之文經典相似之語推而致之考之人情失之逺矣宗廟之中人所致敬幽隱清淨鬼神所居而使學衆處焉饗射其中人鬼慢黷死生交錯囚俘截耳以干鬼神非其理也茅茨采椽至質之物建日月乗玉路以處其中非其𩔖也夫宗廟鬼神所居祭天而於人鬼之室非其處也王者五門宗廟在一門之内若射在於廟而張三侯又辟雍在内人物衆多殆非宗廟之中所能容也如凖之所論是鄭所謂不同之意蔡邕明堂論見辟廱門陳氏禮書曰夏世室商重屋周明堂則制漸文矣夏度以歩商度以㝷周度以筵則堂漸廣矣夏言堂修廣而不言崇商言堂修而不言廣言四阿而不言室周言堂修廣崇而不言四阿其言葢皆互備鄭康成曰夏堂崇一尺商堂廣九㝷理或然也月令中央太室東青陽南明堂西總章北元堂皆分左右个與太廟則五室十二堂矣明堂位前中階阼階賔階旁四門而南門之外又有應門則南三階東西北各二階而為九階矣考工記五室九階葢木室於東北火室於東南金室於西南水室於西北土室於中央其外别之以十二堂通之以九階環之以四門而南門之外加以應門此明堂之大畧也大戴禮白虎通韓嬰公玉帶淳于登桓譚鄭康成蔡邕之徒其論明堂多矣時淳于登以為在國之陽三里之外七里之内其説葢有所傳然也何則聽朔必於明堂而玉藻曰聽朔於南門之外則明堂在國之南可知成玉之朝諸侯四夷之君咸列四門之外而朝寢之間有是制乎則明堂在國之外可知然大戴謂九室三十六户七十二牖上圓下方公玉帶謂為一殿居中覆之以茅環之以水設之以複通之以樓鄭康成謂明堂太廟路寢異實同制康成以春秋書世室屋壊明堂位稱魯公之廟文世室武公之廟武世室則以考工記所謂世室為廟重屋為寢或舉王寢或舉明堂互言之蔡邕謂明堂太廟辟雍同實異名豈其然哉諸侯之廟見於公食大夫有東西堂東西夾而已天子路寢見於書亦東西房東西夾又東序西序東堂西堂而已則太廟路寢無五室十二堂矣謂之明堂太廟路寢異實同制非也宗廟居雉門之内而教學飲射於其中則莫之容處學者於鬼神之宫享天神於人鬼之室則失之瀆袁凖嘗攻之矣則謂之明堂太廟辟雍同實異名非也彼葢以魯之太廟有天子明堂之飾晉之明堂有功臣登享之事乃有同實異實之論是不知諸侯有太廟無明堂特魯放其制晉放其名也四時之氣春為青陽夏為朱明秋為白藏冬為元英則青者春之色春者陽之中故春堂名之總者物之聚章者文之成故秋堂名之明者萬物之相見元者萬物之復本故冬夏之堂名之左右之堂曰个以其介於四隅故也中之堂曰太廟以其大享在焉故也古者鬼神所在皆謂之廟書與士虞以殯宫為廟則大享在焉謂之太廟可也明堂之作不始於周公而武王之時有之記曰祀乎明堂而民知孝是也不特建之於内而外之四嶽亦有之孟子之時齊有泰山之明堂是也荀子强國篇曰雖為之築明堂於塞外而朝諸侯使殆可也漢有奉髙明堂月令言明堂之制則然其言四時乗異路載異旂衣異衣用異器則非也明堂位言朝諸侯於明堂則然其言周公踐天子之阼負扆而受朝則非也何則王者迎五氣則於東南西北之四郊禮六神則以蒼黄青赤白元之牲玉象四時以廵嶽順閏月以居門而天地之間罔不欽若則十二月之異堂聽朔不為過也若夫車旗之辨見於巾車司常衣冠之等見於弁師司服皆無四時之異禮運曰五色十二衣旋相為質郎顗曰王者隨天自春徂夏改青服絳非古制也書曰周公位冢宰正百工詩序曰周公既成洛邑朝諸侯乃率以祀文王葢成王宅憂周公位冢宰而百工總已以聽焉及既成洛邑輔成王以朝諸侯詩序言朝諸侯乃率以祀文王則朝不在廟而在明堂可知也朱子曰論明堂之制者非一某竊意當有九室如井田之制東之中為青陽太廟東之南為青陽右个東之北為青陽左个南之中為明堂太廟南之東即東之南為明堂左个南之西即西之南為明堂右个西之中為總章太廟西之南即南之西為總章左个西之北即北之西為總章右个北之中為元堂太廟北之東即東之北為元堂右个北之西即西之北為元堂左个中是太廟太室凡四方之太廟異方所其左个右个則青陽之右个乃明堂之左个明堂右个乃總章之左个也總章之右个乃元堂之左个元堂之右个乃青陽之左个也但隨其時之方位開門耳太廟太室則每季十八日天子居焉古人制事多用井田遺意此恐也是問郊祀后稷以配天宗祀文王以配上帝帝只是天天只是帝却分祭何也朱子曰為壇而祭故謂之天祭於屋下而以神祗祭之故謂之帝又曰明堂想只是一个三間九架屋子楊氏曰愚按明堂者王者之堂也謂王者所居以出教令之堂也夫王者所居非謂王之常居也疏家云明堂在國之南丙巳之地三里之外七里之内此言雖未可以為據然其制必凛然森嚴肅然清淨王者朝諸侯出教令之時而後居焉而亦可以事天地交神明於此地而無愧焉周人祀上帝於明堂而以文王配之者此也説者乃以明堂為宗廟又為大寢又為太學則不待辨説而知其謬矣惟考工記謂明堂五室大戴禮謂明堂九室二説不同前代欲建明堂者或云五室或云九室往往惑於二説莫知所決而遂止愚謂五室取五方之義也九室則五方之外而必備四隅也九室之制視五室為尤備然王者居明堂必順月令信如月令之説則為十二室可乎此又不通之論也惟朱子明堂圖謂青陽之右个乃明堂之左个東之南即南之東明堂之右个乃總章之左个南之西即西之南總章之右个乃元堂之左个西之北即北之西元堂之右个乃青陽之左个北之東即東之北但隨其時之方位開門耳太廟太室則每時十八日居焉古人制事多用井田遺意此恐然也朱子所謂明堂想是一个三間九架屋子者指五方四隅凡有九室之大畧而言之也然則朱子之説其亦有據乎曰漢承秦後禮經無全書姑以考工記觀之亦粗可見考工記曰周人明堂度九尺之筵東西九筵為八丈一尺言明堂之廣也南北七筵為六丈三尺言明堂之修也五室象五行之方位有五方則有四隅不言可知也夫有五方四隅則一堂之地裂而為九室矣又安得通而為一復有九筵之廣七筵之修乎葢明堂云者通明之堂也所以朝諸侯行王政者在是所以享上帝配祖考者在是非七筵九筵之修廣不能行也五方四隅亦惟辨其方正其位隨王者所居之月掌次以帷幕幄帟為之以詔王居以順月令以奉天道耳亦如所謂隨其時之方位開門是也此其大畧也又按齊宣王欲毁明堂孟子曰王欲行王政則勿毁之矣此又王者廵狩之地有明堂以朝諸侯行政教非在國之明堂也又曰按月令迎春東郊及祠髙禖注引王居明堂禮漢藝文志有明堂隂陽三十三篇明堂隂陽説五篇魏相每表采易隂陽及明堂月令奏之漢有此書今無傳焉右經傳及諸儒所言明堂制度北史李謐傳載謐著明堂制度論甚詳孝經子曰孝莫大於嚴父嚴謂敬也尊嚴其父嚴父莫大於配天則周公其人也言以父配天之禮始於周公昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝明堂天子布政之宫周公因祀五方上帝於明堂乃尊文王以配之是以四海之内各以其職來祭謂諸侯修其職來助祭月令季秋上丁命樂正入學習吹為將饗帝也春夏重舞秋冬重吹也是月也大饗帝疏曰大饗與帝連文故謂祭天詩我將祀文王於明堂也我將我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王既右享之我其夙夜畏天之威於時保之陳氏禮書曰先王之於天尊而遠之故祀於郊而配以祖親而近之故祀於明堂而配以父孝經曰孝莫大於配天又曰郊祀后稷以配天宗祀文王於明堂以配上帝嚴父配天矣又曰配上帝者天則昊天上帝也上帝則五帝與天也明堂不祀昊天上帝不可謂配天五帝不與不可謂配上帝以上帝為昊天上帝邪而周禮以旅上帝對旅四望言之則上帝非一帝也以明堂時祀昊天上帝邪而考工記明堂有五室則五室非一位也祭法曰周人禘嚳而郊稷祖文王而宗武王鄭氏曰禘郊祖宗謂祭祀以配食也其説以為坐五帝於堂上以五人帝及文王配之坐五神於庭中以武王配之然古者祖有功而宗有徳謂祖宗其廟耳非謂配於明堂也王肅曰審如鄭説則經當言祖祀文王不言宗祀也凡言宗者尊也周人既祖其廟又宗其祀月令之五人帝五人神所以配食四郊也其與享明堂於經無見又况降五神於庭中降武王以配之豈嚴父之意哉然宗祀文王則成王矣成王不祀武王而祀文王者葢於是時成王未畢䘮武王未立廟故宗祀文王而已此所以言周公其人也詩序曰豐年秋冬報則秋報者季秋之於明堂也冬報者冬至之於郊也先明堂而後郊者禮由内以及外也先嚴父而後祖者禮由親以及尊也明堂之祀於郊為文於廟為質故郊掃地藁秸而已明堂則有堂有筵郊特牲而已明堂則維羊維牛然郊有燔燎而明堂固有升煙漢武帝明堂禮畢燎於堂下古之遺制也由漢及唐或祠太一五帝光武或特祀五帝光武明帝或除五帝之坐同稱昊天上帝晉武帝時議除明堂五帝之坐同稱昊天上帝各設一坐而已後又復武帝位或合祭天地唐武后合祭天地於明堂中宗仍之或配以祖或配以羣祖漢武帝祠明堂髙皇帝對之章帝祠明堂以光武配後又以髙祖太宗世宗中宗世祖顯宗配各一太牢其服也或以衮冕東晉武帝或以大裘梁禮其獻也或以一獻或以三獻梁朱异曰祀明堂改服大裘又以貴質不應三獻請停三獻止於一獻隋於雩壇行三獻禮抑又明堂之制變易不常與考工之説不同皆一時之制然也朱子曰古者祭天於圜丘掃地而行事器用陶匏牲用犢其禮極簡聖人之意以為未足以盡其意之委曲故於季秋之月有大享之禮焉天即帝也郊而曰天所以尊之也故以后稷配后稷逺矣配稷於郊亦所以尊稷也明堂而曰帝所以親之也以文王配焉文王親也配文王於明堂亦以親文王也尊尊而親親周道備矣然則郊者古禮而明堂者周制也周公以義起之也楊氏曰愚按郊祀配天明堂配上帝天與上帝一也祀上帝祀並如郊祀然月令有大饗之文我將之詩有維羊維牛之語則明堂之禮為尤備故程子曰其禮必以宗廟之禮享之朱子亦曰祭於屋下而以神祇祭之葢謂此也又曰按周人宗祀文王於明堂以配上帝上帝即天也配帝即文王也自漢以來乃有並祭五帝之禮鄭康成注祭法祖文王宗武王之説差誤特甚至唐以來遂有三帝並侑之禮皆非古人制禮之本意故今具載於後併列諸儒議論以明之祭法祖文王而宗武王注曰祭五帝五神於明堂曰祖宗祖宗通言爾孝經曰宗祀文王於明堂以配上帝月令春曰其帝太皥其神句芒夏曰其帝炎帝其神祝融中央曰其帝黄帝其神后土秋曰其帝少昊其神蓐収冬曰其帝顓頊其神元㝠疏曰云祭五帝五神於明堂曰祖宗祖宗通言爾者以明堂月令五時俱有帝及神又月令季秋大饗帝故知明堂之祭有五人神及五天帝也孝經云宗祀文王於明堂以配上帝故知於明堂也又郊特牲疏云五時迎氣及雩祭則以五方人帝配之九月大饗五帝則以五人帝及文武配之以文王配五天帝則謂之祖以武王配五人神則謂之宗崔氏云皆在明堂之上祖宗通言故祭法云祖文王文王稱祖孝經云宗祀文王於明堂是文王稱宗文王既爾則武王亦有祖宗之號故云祖宗通言王肅駁鄭義曰古者祖有功而宗有徳祖宗自是不毁之名非謂配食於明堂者也審如鄭言則經當言祖祀文王於明堂不得言宗祀也宗者尊也周人既祖其廟又尊其祀孰謂祖於明堂者乎鄭引孝經以觧祭法而不曉周公本意殊非仲尼之義㫖也通典宗祀文王於明堂以配上帝謂祀昊天上帝先儒所釋不同若以祭五帝則以天帝皆坐明堂之中以五人帝及文王配之五官之神坐於庭中以武王配之通名曰祖宗故云祖文王而宗武王文王為父配祭於上武王為子配祭於下如其所論非為通理但五神皆生為上公死為貴神生存之日帝王享㑹皆須升堂今死為貴神獨配於下屈武王之尊同下坐之義為不便意為合祭五帝於明堂唯有一祭月令所謂九月大享帝於明堂也五帝及神俱坐於上以文武二祖汎配五帝及五神而祭之以文王配祭五帝則謂之祖以武王配祭五神則謂之宗明二君同配故祭法云祖文王而宗武王夫祖者始也宗者尊也所以名祭為祖宗者明祭之中有此二義漢武帝元封五年初天子封泰山泰山東北趾古時有明堂處險不敝上欲治明堂奉髙堂未曉其制度濟南人公玉帶上黄帝時明堂圖明堂圖中有一殿四面無壁以茅蓋通水圜宫垣為複道上有樓從南入命曰昆侖天子從之入以拜祀上帝焉於是上令奉髙作明堂汶上徐廣曰在元封二年秋如帶圖及五年修封則祀太一五帝於明堂上坐令髙皇帝祠坐對之祠后土於下房以二十太牢天子從昆侖道入始拜明堂如郊禮禮畢燎堂下因朝諸侯王列侯受郡國計師古曰計若今之諸州計帳也太初元年十一月甲子朔旦冬至祀上帝於明堂後每修封其賛饗曰天増授皇帝泰元神䇿周而復始皇帝敬拜太一師古曰自此以上賛祝者詞毋修封禪徐廣曰常五年一修耳今適二年故但祠於明堂天漢四年行幸泰山修封祀明堂因受計太始四年三月行幸泰山壬午祀髙祖於明堂以配上帝因受計癸未祀孝景皇帝於明堂征和四年幸泰山修封祀於明堂平帝元始四年安漢公王莾奏立明堂辟雍五年春正月祫祭明堂禮五年一祫祫者毁廟與未毁廟之主皆合食於太祖也致堂胡氏曰明堂辟雍靈臺雜見於孝經孟子詩與禮記其制作之詳不可得而聞矣後世紛紛之論所以起歟然以理考之先王舉事動可為憲必不如後世之妄作爾王者向明而治古之堂今之殿也孝經以為宗祀之所孟子以為王政之堂然則是人君之路寢猶後世大朝㑹之正衙也王者見羣臣覲諸侯頒朔布政皆於是焉故曰欲行王政則不可毁也齊何以有明堂僣也人謂宣王毁之者俾革其僣也孟子語以勿毁者教使行王政也則何以用之宗祀乎文王已有廟矣以季秋享帝而奉文王配焉不可於七廟中獨舉大禮于一廟故迎主致之明堂以配帝也祭帝必於明堂者帝出震而宰萬物猶向明而治天下也武王即位追王文王周公制禮推本王功故以文王配帝而祀於明堂此義𩔖也是明堂之説也後世紛紛皆狃於劉歆世室重屋之載吕不韋青陽總章之比是可信乎世祖中元元年初營明堂辟雍靈臺未用事明帝永平二年正月辛未初祀五帝於明堂光武帝配五帝坐位堂上各處其方黄帝在未皆如南郊之位光武帝位在青帝之南少退西面牲各一犢帝及公卿列侯始服冠冕衣裳玉珮絇屨以行事奏樂如南郊禮畢登靈臺使尚書令持節詔驃騎將軍三公曰今令月吉日宗祀光武皇帝於明堂以配五帝禮偹法物樂和八音詠祉福舞功徳其班時令敕羣后事畢升靈臺望元氣吹時律觀物變羣僚藩輔宗室子孫衆郡奉計百蠻貢職烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功徳之所致也朕以闇陋奉承大業親執圭璧恭祀天地仰惟先帝受命中興撥亂反正以寧天下封泰山建明堂立辟雍起靈臺恢𢎞大道被之八極而嗣子無成康之質羣臣無吕旦之謀盥洗進爵踧踖惟慙素性頑鄙臨事益懼其令天下自殊死以下皆赦除之百僚師尹其勉修厥職順行時令敬若昊天以綏兆人班固東都賦明堂詩於昭明堂明堂孔陽聖王宗祀穆穆煌煌上帝宴享五位時序誰其配之世祖光武普天率土各以其職猗歟緝熙允懐多福東京賦曰復廟重屋八逹九房薛綜注曰八逹謂室有八窻也堂後有九室所以異於周制也王隆漢官篇曰是古者清廟茅屋胡廣曰古之清廟以茅葢屋所以示儉也今之明堂茅葢之乃加瓦其上不忘古也章帝建初三年宗祀明堂禮畢登靈臺望雲物元和二年二月幸泰山柴告岱宗進幸奉髙壬申宗祀五帝於孝武所作汶上明堂光武帝配如雒陽明堂禮癸酉更告祀髙祖太宗世宗中宗世祖顯宗於明堂各一太牢安帝延光三年東廵泰山祀汶上明堂如元和二年故事順帝即位修奉常祀和帝永元五年祀五帝於明堂遂登靈臺望雲物順帝永和元年宗祀明堂登靈臺改元大赦漢安元年正月宗祀明堂大赦改元靈帝初黄門朱瑀等隂於明堂中禱皇天曰竇氏無道請皇天輔帝誅之既殺武等詔太官給塞具塞報祀也賽通用東漢制明堂及靈臺令各一人掌守明堂靈臺掌候日月星氣皆屬太史東漢明堂制上圓下方法天地八窻四閨法八風四時九室十二座法九州十二月三十六户七十二牖法三十六旬七十二候魏明帝太和元年正月丁未宗祀文帝於明堂以配上帝祝稱天子臣某齊王亦行其禮晉武帝太始元年二月丁丑宗祀文皇帝於明堂以配上帝又議明堂宜除五帝坐同稱昊天上帝各設一坐而已晉明堂裴頠議立只為一殿十年十月詔復明堂五帝位晉初以文帝配後復以宣帝尋復還以文帝配其餘無所變革是則郊與明堂同配異配參差不同矣摯虞議以為漢魏故事明堂祀五帝之神新禮五帝即上帝帝即天也明堂除五帝之位惟祭上帝按仲尼稱郊祀后稷以配天宗祀文王於明堂以配上帝周禮祀天旅上帝祀地旅四望四望非地則上帝非天斷可識矣郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以逺祖明堂之祭備物以薦玉牲並陳籩豆成列禮同人理故配以近考郊堂兆位居然異體牲牢品物質文殊趣且祖考同配非謂尊嚴之美三日再祀非謂不黷之義其非一神亦足明矣昔在上古生為明王沒則配五行故太昊配木神農配火少昊配金顓頊配水黄帝配土此五帝者配天之神同兆之於四郊報之以明堂祀天大裘而冕祀五帝亦如之或以為五精之帝佐天育物者也前代相因莫之或廢晉初始從異議庚午詔書明堂及南郊除五帝之位惟祀天神新禮奉而用之前太醫令韓楊上書宜如舊祀五帝太康十年詔已施用宜定新禮明堂及郊祀五帝如舊議詔從之江左以後未遑脩建晉傅元製天地郊明堂夕牲歌一天地郊明堂降神歌一明堂饗神歌一東晉孝武帝太元十三年正月後辛祀明堂車服之儀率遵漢制出以法駕服以衮冕時孫耆之議郊以祀天故配之以后稷明堂祀帝故配之以文王由斯言之郊為皇天之位明堂為上帝之廟故徐邈以配之為言必有神主郊為天壇則明堂非文廟矣時議帝親奉今親祀北郊明年正月上辛祀昊天次辛祀后土後辛祀明堂宋孝武大明五年依漢汶上儀設五帝位太祖文帝對饗祭皇天上帝鼎俎彛簋一依太廟禮堂制但作大殿屋十二間無古三十六户七十二牖文飾雕畫而巳時有司奏伏尋明堂辟雍制無定文自漢暨晉莫之能辨周書云清廟明堂路寢同制鄭元注禮義生於斯諸儒又云明堂在國之陽丙巳之地三里之内晉侍中裴頠以爲尊祖配天其義明著廟宇之制理據未分直可為殿以崇嚴祀其餘雜碎一皆除之裴頠所奏竊謂可安國學之南地實丙巳其墻宇規範宜擬則太廟唯十有二間以應一周之數齊髙帝建元元年祭五帝之神於明堂有功徳之君配明堂制五室時從王儉議明帝崇昌元年有司奏以武帝配國子助教謝曇濟議按祭法禘郊祖宗並列嚴祀鄭元注義亦據兼享宜祖宗兩配文武䨇祀左僕射王晏議若用鄭元祖宗通稱則生有功徳沒垂尊稱歴代配帝何止於二今殷薦上帝元屬武帝百代不毁其文廟乎詔可梁祀五帝於明堂服大裘冕罇以瓦爼豆以純漆牲以特牛餚膳凖二郊若水土之品蔬菜之屬宜以薦郊所無者從省除五配五帝行禮自東階升先春郊帝為始止一獻清酒停三獻及灌事儀曹郎朱异議祀明堂改服大裘又以貴質不應二獻禮云朝踐用太罇鄭元云太罇瓦也有虞氏瓦罇此皆是宗廟猶以質素况在明堂理不容象罇也郊祀貴質器用陶匏宗廟貴文誠宜雕爼明堂之禮於郊為文比廟為質請改器用純漆庶合文質之衷舊儀鬯灌求神初獻清酒次醽終醁禮畢太祝取俎上祭肉當御前以授俎五帝天神不可求之於地二郊主祭無授肉之禮請停三獻灌鬯及授俎之法止於一獻清酒舊用太牢按郊用繭栗詩云祀文王於明堂有維羊維牛良由周監二代其義貴文明堂方郊未為極質故特用三牲今斟酌百王義存通典蔬菜之薦雖符周禮而牲牢之用宜遵夏殷請自今明堂牲用特牛從之其堂制十二年毁宋太極殿以其材構明堂十二間皆凖太廟以中央六間安六天座悉南向東來第一青帝五帝依次而列又五人帝配饗在阼階東上北向大殿後為小殿五間以為五佐室焉帝曰明堂之祭五帝則是總義在郊之祭五帝則是别義宗祀所配復應有室若専配一室則義非配五若皆配五則成五位以理而言明堂無室朱异以月令天子居明堂左个右个聼朔之禮既在明堂今若無室則於義或闕帝又曰鄭元義聼朔必在明堂此則人神混淆莊敬道廢春秋左氏傳云介居二大國之間此云左右个者謂祀帝堂南又有小室亦號明堂分為三處聼朔既有三處則有左右之義在宫之内明堂之外人神有别差無相干其議是非莫定初尚未改十二年太常丞虞瞬復引周禮明堂九尺之筵以為髙下修廣之數堂崇一筵故階髙九尺漢家制度猶遵此禮於是毁宋太極殿為明堂十二間梁明堂送神諴雅一曲四言明堂徧歌五帝登歌五曲四言陳祀昊天上帝五帝於明堂牲以太牢粢盛六飯鉶羮蔬備薦焉武帝以徳帝配文帝以武帝配堂制殿屋十二間中央六間依前代安六座四方帝各依其方黄帝居坤維而配享坐依梁法後魏文帝太和十三年四月經始明堂改營太廟遷洛之後宣武永平延昌中欲建明堂而議者或云五室或云九室至明帝神龜中復議之元乂執政遂營九室值代亂不成宗配之禮迄無所設北齊採周官考工記為五室後周採漢三輔黄圖為九室並竟不成隋文帝開皇十三年議立明堂繁役不就終隋代季秋祀五方上帝於雩壇上其用幣各依其方人帝各在天帝之左太祖在太昊南西向五官在庭各依其方牲用犢十二皇帝太尉司農行三獻禮於青帝及太祖自餘有司助奠五官位於堂下行一獻禮有燎其省牲進熟如南郊禮時禮部尚書牛𢎞定議造明堂將作大匠宇文愷依月令様重檐複屋五房四逹丈尺規矩皆有凖慿帝命有司規兆方欲崇建又命詳定諸儒爭論莫之能決煬帝大業年中愷又奏之以他役繁興遂寢唐髙祖武徳初定令每嵗季秋祀五方上帝於明堂以元帝配五人帝五官並從祀迄於貞觀之末竟未議立明堂季秋大享則於圜丘行事新唐書禮樂志明堂自漢以來諸儒之論不一至於莫知所從則一切臨時増損而不能合古然推其本㫖要於布政交神於王者尊嚴之居而已其制作何必與古同然為之者至於無所據依乃引天地四時風氣乾坤五行數象之𩔖以為倣象而衆説亦不克成隋無明堂而季秋大享常寓雩壇唐髙祖太宗時寓於圜丘貞觀中禮部尚書豆盧寛等議從昆侖道上層以祭天下層以布政而太子中允孔穎逹以為非穎逹大畧謂六藝羣書皆訓基上曰堂樓上曰觀未聞重樓之上而有明堂又明堂法天聖王示儉今若飛樓架道浮閣凌空不合古言又古者敬重大事與祭相似是以朝覲祭祀並在於廟若樓上祭祖樓下視朝閣道升樓路便窄隘乗輦則接神不敬歩陟則勞勤聖躬侍衛在旁百司供奉求之經誥全無此理侍中魏徴請為五室重屋上圓下方上以祭天下以布政謂前世儒者所言雖異而以為如此者多同至於髙下廣狹丈尺之制可以因事制宜也祕書監顔師古曰周書叙明堂有應門雉門之制以此知為王者之常居爾其青陽總章元堂太廟左右个皆路寢之名也文王居明堂之篇帶弓韣禮髙禖九門磔禳國有酒以合三族推其事皆與月令合則皆在路寢也大戴禮曰在近郊又曰文王之廟也此奚足信哉且門有臯庫豈知施於郊野謂宜近在宫中徴及師古皆當時名儒其論止於如此髙宗永徽二年奉太宗配祀明堂有司遂請以髙祖配五天帝太宗配五人帝顯慶元年詔以髙祖配圜丘太宗配明堂太尉長孫無忌等議曰宗祀明堂必配天帝而伏義五代本配五郊參之明堂自縁從祀今以太宗作配理有未安伏見永徽二年追奉太宗以遵嚴配當時髙祖先在明堂禮司致惑竟未遷祀乃以太宗降配五人帝雖復亦在明堂不得對越天帝謹按孝經孝莫大於嚴父嚴父莫大於配天昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝又尋歴代禮儀且無父子同配明堂之義唯祭法云周人禘嚳而郊稷祖文王而宗武王鄭元注曰禘郊宗祖謂祭祀以配食也禘謂祭昊天於圜丘郊謂祭上帝於南郊祖宗謂祭五帝五神於明堂也尋鄭此注乃以宗祖合為一祭又以文武共在明堂連祍配祠良為謬矣故王肅駁之臣謹上考殷周下洎貞觀並無一代兩帝同配於明堂伏惟髙祖太武皇帝躬受天命奄有神州創制改物體元居正為國始祖抑有舊章太宗文武皇帝道格上元功清下黷拯率土之塗炭布大造於生靈請准詔書宗祀於明堂以配上帝從之乾封初詔明堂仍祭五方上帝依鄭元義儀鳳二年太常少卿韋萬碩奏曰明堂大饗凖古禮鄭元義祀五天帝王肅義祀五行帝貞觀禮依鄭義祀五帝顯慶以來新修禮祀昊天上帝奉乾封二年敕祀五帝又奉制兼祀昊天上帝又奉上元三年三月敕五祀行用已久並依貞觀年禮為定又奉去年敕並依周禮行事今用樂須定所祀之神未審依定何禮臣以去年十二月錄奏至今未奉進止所以樂章不定上及宰臣並不能㫁乃詔尚書省召學者更參議之事仍不定自此明堂大饗兼用貞觀顯慶二禮禮司益無慿凖髙宗改元總章分萬年縣置明堂縣示欲必立之而議者紛然或以為五室或以為九室帝依兩議以帟幕為之與公卿臨觀而議益不一乃下詔率意班其制度至取象黄琮上設鴟尾其言益不經而明堂卒不能立上内出九室様更令有司損益之有司奏言内様堂基三重每基階各十二上基方九雉八角髙一尺中基方三百尺髙一筵下基方三百六十尺髙一丈二尺上基象黄琮為八角四面安十二階請從内様為定基髙下仍請凖周制髙九尺其方共作司約凖百四十八尺中基下基望並不用又内様室各方三筵開四闥八窻屋圓楣徑二百九十一尺按季秋大饗五帝各在一室商量不便請依兩漢季秋合饗總於太室若四時迎氣之祀則各於其方之室其安置九室之制増損明堂故事三三相重太室在中央方六丈其四隅之室謂之左右房各方二丈四尺當太室四面青陽明堂總章元堂等室各長六丈以應太室濶二丈四尺以應左右房室間並通巷各廣一文八尺其九室并巷在堂上總方一百四十四尺法坤之䇿屋圓楣檐或為未允請據鄭元盧植等説以前梁為楣其徑二百一十六尺法乾之䇿圓楣之下所施圓柱旁出九宫四隅各七尺法天以七紀柱外餘基共作司約凖面别各餘一丈一尺内様室别四闥八窻檢與古合請依為定其户仍在外設而不開内様外有柱三十六每柱十梁内有七間柱根以上至梁髙三丈梁已上至屋峻起計髙八十一尺上圓下方飛檐應規請依内様為定其葢屋形制仍望據考工記改為四阿并依禮加重檐凖太廟安鴟尾堂四向五色請依周禮白盛為便其四向各隨方色請施四垣及四門辟雍按大戴禮及前代説辟雍多無水廣内徑之數蔡邕云水廣二十四丈四周於外三輔黄圖云水廣四周與蔡邕不異仍云水外周堤又張衡東京賦稱造舟為梁禮記明堂陰陽錄水左旋以象天商量水廣二十四丈恐傷於濶今請減為二十四歩垣外量取周足仍依故事造舟為梁其外周以圓堤并取陰陽水行左旋之制殿垣按三輔黄圖殿垣四周方在水内髙不蔽日殿門去殿七十二歩准今行事陳設猶恐窄小其方垣四門去堂歩數請凖太廟南門去廟基遠近為制仍立四門八觀依太廟門别各安三門施元閫四角造三重巍闕自後羣儒分競各執異議九室五室俱有依慿上令所司於觀徳殿前依兩議張設上觀之謂公卿曰明堂之制自古有之議者不同所以未造今令張設兩議公等以何者為宜工部尚書閻立徳奏曰兩議不同俱有典故九室自暗五室自明取舍之宜斷在聖慮上亦以五室為便後以制度未定而止文獻通考巻七十三
