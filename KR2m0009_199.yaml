body:
  text: 文獻通考卷一百九十九鄱陽馬端臨貴與著經籍考二十六史傳記魏公語録一卷陳氏曰與别録小異而實同别録分四卷此總為一篇先後次第亦不同而末一則别録所無姑並存之魏公别録四卷鼂氏曰其門人王巖叟記其言論事實然以國史考之其歲月往往抵牾蓋失之誣也杜祁公語録一卷陳氏曰不知何人作文潞公私記一卷鼂氏曰皇朝文彥博所撰元豐初王堯臣之子同老以其父至和中所撰立英宗為皇子詔草上之且曰時宰相文彥博富弼知狀神宗以問彥博彥博具以實對至元祐中賈易為言官為韓忠彥爭辨其事彥博乃著此其後云自古惟霍禹云縣官非我家將軍不得至此楊復恭自稱定䇿國老謂昭宗為門生天子鞅鞅不道之言卒被夷滅陳氏曰記至和請建儲及元豐褒賞事潛德録一卷鼂氏曰皇朝吕誨獻可之孫撰記其祖乞立英宗言章嘉祐名臣傳五卷鼂氏曰張唐英傳仁宗朝賢臣五十餘人王氏揮麈録曰唐英天覺同胞兄仕至殿中侍御史嘗述仁宗政要上於朝所謂嘉祐名臣傳特政要中一門耳孔子編年三卷鼂氏曰皇朝孔傳取左氏國語公羊史記及他書所載孔子事以年次之自生至卒東家雜記二卷鼂氏曰亦孔傳撰孔子四十七代孫也纂其家舊聞軼事於此書陳氏曰歷代追崇先聖故事及孔林古迹鼂以道揚雄别傳一卷鼂氏曰從父詹事公撰雜取諸書所載雄逸事為一編係之以贊唐質肅遺事一卷陳氏曰無名氏所記唐介子方事也韓莊敏遺事一卷陳氏曰祕書丞韓宗武文若撰記其父丞相縝玉汝事末亦雜載他事宗武即少年遇洋客者也年八十二乃卒此編亦載其詩云熙寧間得異疾與神物遇范忠宣言行録二十卷陳氏曰不著名氏其家所録也范太史遺事一卷陳氏曰翰林學士范沖元長記其父事傅獻簡佳語一卷陳氏曰不知何人所作記傅堯俞所談杜公談録一卷陳氏曰雷繹杜師益等録其父務滋之言王廣淵作序豐清敏遺事一卷陳氏曰給事中章貢李朴先之撰記豐稷相之事朱熹為之後序宗忠簡公遺事三卷陳氏曰不著名氏録留守開封事亦其家子孫所為後村劉氏序曰公遺事行世已久今連帥寶謨王公鎔公之外孫復稍採托舊聞以傅翼之呂忠穆家傳一卷逢辰記一卷遺事一卷陳氏曰記建炎丞相吕頥浩元直事孫昭問刻之廣德軍褒德集二卷易學辨惑一卷陳氏曰邵伯溫撰録其父告命諡議行狀墓志之屬辨惑述傳授源流辨鄭夬之妄吕氏家孰記一卷陳氏曰侍講吕希哲原明撰桐隂舊話十卷陳氏曰吏部尚書潁川韓元吉無咎撰記其家世舊事以京師第門有桐木故云元吉門下侍郎維之四世孫也趙康靖日記一卷陳氏曰參政睢陽趙槩叔平所記治平乙巳丙午間在政路初事劉忠肅公行年記一卷陳氏曰丞相東平劉摯莘老撰文昌雜録六卷陳氏曰主客郎中南京龎元英懋賢撰官制初行元英為郎在省四年記一時見聞及古今典故可觀覽元英丞相莊敏公籍之子聞見近録一卷陳氏曰宗正丞三槐王鞏定國撰辨欺録一卷陳氏曰韓忠彥記其父嘉祐末命事與文富諸公辨回天録一卷陳氏曰宣教郎秦湛處度撰記吕好問圍城中事好問除右丞訓詞有回天之力語故以名録後有好問謝其祖公著復官表及遺表盡忠補過録一卷陳氏曰修職郎穆伯芻撰記張孝純在偽齊時所上本朝書吳丞相手録一卷陳氏曰吳敏元忠撰記靖康初元事嶽飛事實六卷辨誣五卷陳氏曰飛之孫珂撰丁卯實編一卷陳氏曰成忠郎李珙撰誅曦之功楊巨源為多安丙忌而殺之珙為作傳上之於朝以昭其功而申其寃孔子編年五卷陳氏曰新安胡仔元任撰其父待制舜陟命仔采托經傳為之諸葛武侯傳一卷陳氏曰侍講張栻撰以陳壽作史私且陋裒集他傳及裴松之所注為此傳而削去管樂自許一則朱晦翁以為不然又為後論以達其意謂其體正大而學未至使得遊洙泗之門所就不止此韓文公歷官記一卷陳氏曰新安張敦頥撰頗疏略其最誤者序言擒吳元濟出牛元翼為一事此大謬也為裴度行軍司馬在憲宗元和時奉使鎮州王庭湊在穆宗長慶時歐公本末四卷陳氏曰吕祖謙編蓋因觀歐陽公集考其歷仕歲月同官同朝之人略著其事迹而集中詩文亦隨事附見非獨歐公本末而時事時賢之本末亦大略可觀矣故以入傳記類皇祐平蠻記二卷陳氏曰殿中丞馮炳撰記儂智高事孫威敏征南録一卷陳氏曰學士睢陽滕甫元發撰言平南之功皆本孫沔元規狄青之至莫能出其右者余靖歸美於青非實也甫時通判潮州唃厮囉傳一卷陳氏曰不著作者陜西聚米圖經五卷陳氏曰閣門通事舍人雄州趙珣撰珣父振博州防禦使久在西邊珣訪得五路徼外山川道里康定二年為此書韓魏公經略言於朝詔取其書召見執政吕許公宋莒公言用兵以來䇿士之言以干數無如珣者擢涇原都監定川之敗死焉珣徑特好學恂恂類儒者人皆惜之元豐平蠻録三卷陳氏曰金部員外郎知鳯翔府家安國撰記乞弟韓存寶事元祐分疆録三卷陳氏曰直龍圖閣京兆遊師雄景叔撰元祐初議棄西邊四寨執政召師雄問之對曰先帝棄之可也主上棄之則不可且示弱夷狄反益邊患爭之甚力不聼卒棄之四寨者葭蘆米脂浮屠安疆也夏人以事出望外萌侵侮之心連年犯順皆如師雄所料此書前三卷記當時論辨本末後一卷行實不知何人作也是歲師雄被命行邊請以便宜行事夏人與鬼章謀寇熙河師雄説劉舜卿出師种誼遂破洮州擒鬼章以獻其功偉矣元祐諸老固欲休兵息民師雄言既不行功復不賞殆以專反熙豐失於偏滯終成紹述之禍亦有以也師雄治平二年進士青唐録一卷陳氏曰右班殿直李遠撰元符中取邈川青唐已而皆棄之遠紹聖武舉人官鎮洮奉檄軍前記其經歷見聞之實燦然可觀交趾事迹十卷陳氏曰知新州趙協撰占城國録一卷陳氏曰不著名氏雞林類事三卷陳氏曰不著名氏政和大理入貢録一卷陳氏曰右迪功郎錢塘周邦撰其祖穜為集賢修撰知桂州時歸明人黃璘招來大理國入貢詔穜考究其真偽穜言偽妄不可憑乞依熙寧故事支馬價發還璘至京師力主其事穜落職奉祠久而覺其詐乃改正復職知廣州安南表狀一卷陳氏曰紹興二十五年李天祚進貢自靖康二年以後至是始通也邊和録五卷陳氏曰承議郎河東陳伯疆撰載胡世將承公宣撫川陜事建炎德安守禦録三卷陳氏曰郡丞東平劉荀子卿編次建炎初髙密陳規元則守德安禦羣盜事迹功狀規後守順昌與劉錡共成却敵之功者也以樞密直學士知廬州而卒淮西從軍記一卷陳氏曰不著名氏記紹興十年金人敗盟淮西諸帥守禦事順昌破敵録一卷陳氏曰不著名氏記劉錡信叔守禦戰勝本末滕公守台録一卷陳氏曰不著名氏睢陽滕膺子勤為台州户曹方臘之亂仙居人吕師囊應之攻城甚急膺佐太守備禦卒全一城郡人德之至今廟食行狀事實聚見此篇膺後至直祕閣京西漕而終二楊歸朝録一卷楊堯弼楊載紹興八年所與達蘭烏珠書時偽齊初廢也末有探報敵事數十條逆臣劉豫傳一卷陳氏曰楊堯弼等撰二楊事迹當考前録題銜稱宣義郎迪功郎並為大總管府官屬此傳堯弼為右從事郎載為右迪功郎許右丞行狀一卷陳氏曰吏部員外郎許欣撰許公翰字嵩老襄邑人為尚書右丞欣其弟也李忠定行狀一卷陳氏曰通判洪州李綸撰其兄丞相綱伯紀事狀葉適正則所作諡議附於後翟忠惠家傳一卷陳氏曰翟耆年伯壽述其父汝文公巽事實忠惠者私諡也耆年實邢恕外孫艾軒家傳一卷陳氏曰莆田林成季述其季父工部侍郎光朝謙之事實夾漈家傳一卷所著書目附陳氏曰莆田鄭翁歸述其父樵漁仲事迹翁歸年八十歲老貧不競頃佐莆郡時猶識之葉丞相行狀一卷陳氏曰閣學廬陵楊萬里廷秀撰丞相莆田葉顒子昂乾道丁亥以冬雷罷相至建寧而薨謝修撰行狀墓志一卷陳氏曰昭武謝師稷務本奉使閩部有惠愛沒而民祠之行狀里人黃遹景聲撰墓志永嘉陳謙益之撰其廟曰昭應朱侍講行狀一卷陳氏曰奉議郎三山黃幹直卿撰其高第弟子且子壻也紫陽年譜三卷陳氏曰朱侍講門人通判辰州昭武李方子公晦撰篤行事實一卷陳氏曰丞相趙汝愚子直編其父善應彥遠事而羅願朱熹所撰行狀墓銘及諸賢哀詞題跋之屬萃為一編篤行者陳福公題其墓云爾吕太史跋語有云處者易持出者難工朱侍講取其意以為銘所以勉其子之意深矣趙丞相行實一卷附録二卷陳氏曰知靜江府趙崇憲履常編集忠定長子也其一時諸賢祭文挽歌與嘉定更化之後昭雪誣枉改正史牒本末皆見附録趙忠定行狀一卷續議一卷陳氏曰知光州鄱陽柴中行與之撰其諡議允濟全之楊方子直所為也倪文節言行録三卷遺奏志狀碑銘諡議一卷陳氏曰户部郎中倪祖常子武輯其父尚書遺事行狀錫山蔣重珍良貴撰碑銘臨卭魏了翁華甫撰趙華文行狀一卷陳氏曰文林郎趙山李燔敬子撰忠定之子吏部崇憲履常也八朝名臣言行録二十四卷陳氏曰侍講朱熹撰以近代文集及傳記載本朝名臣言行掇取其要輯為此録前五朝五十五人後三朝四十二人中興志議忠録三卷陳氏曰龔頥正撰自建炎至紹興辛巳上自李若水劉韐貴臣名士下及一婦人卒伍之微皆録之孝史五十卷太學博士新喻謝諤昌國撰集曰君紹五后德一宗表五臣傳三十五文類二夷附一諤後至御史丞淳熙名臣樂易君子也孝行録三卷陳氏曰京兆胡訥撰始得此書不知訥何人也所記多國初人已而知其為安定先生翼之之父仕為寧海節度推官古今孝悌録二十四卷陳氏曰廬陵王紹圭唐卿撰亷吏傳十卷陳氏曰成都費樞伯樞撰自秦至唐凡百十有四人宣和乙巳為序南陽先民傳二十卷陳氏曰題南陽王襄元祐癸酉歲序所記鄧州人物自百里奚直不疑而下至唐范傳正韓翃凡一百六十人典刑録十二卷陳氏曰苕溪吳宏編凡五十二門大略於言行録中抄出近世厚德録四卷陳氏曰題百鍊真隱李元綱國紀編沈濬道原為作序救荒活民書三卷陳氏曰從政郎鄱陽董煟編進煟紹熙五年進士嘗知瑞安縣仁政活民書二卷陳氏曰秀州司户會稽丁鋭集好還集一卷陳氏曰秀水婁伯高元龍編報應之事為十門先賢施仁濟世録一卷陳氏曰奉化丞山隂諸葛興編凡十門皆本朝諸賢事實也莆陽人物志三卷陳氏曰知興化軍永嘉林紘文伯撰以圖志不敘人物故特為是編莆壤地褊小而人物特盛臥遊録一卷陳氏曰吕祖謙撰晚歲病廢臥家取史傳所載古今人境勝處録之時以宗少文臥遊之語實諸卷首上庠録十卷陳氏曰光州助教吕榮義撰雜記京師太學故事上庠後録十二卷陳氏曰三山周士貴撰記中興太學事頗疏略昭明太子事實二卷陳氏曰知池州趙彥博富文編昭明廟食於池頗著靈響元祐始賜額曰文孝祠山家世編一卷陳氏曰詹仁澤曽樵編輯廣德橫山神張王事迹海神靈應録一卷陳氏曰永嘉貢士陸維則撰太守韓彥直子溫為之序初元祐中守直龍圖閣范峋夢海神曰吾唐李德裕也郡城東北隅海仙壇之上有廟初不知其為何代人峋明日往謁其像即夢中所見自是多響應然封爵訓詞惟曰海神而已鄂國金他粹編二十八卷續編三十卷陳氏曰嶽珂撰宋登科記三卷鼂氏曰皇朝登科人名氏未詳何人所撰唐宋科名分定録三卷鼂氏曰不題撰人元符間所著書也序云己卯歲得張君房所志唐朝科場故事今續添五代及本朝科名分定事迄於李常寧云大宋登科記三十二卷陳氏曰洪適編始吳興郡學有鋟板不分卷第止述進士一科適始倣姚康録制舉詞科自建隆庚申迄紹興庚辰二萬三千六百人有竒為二十卷自後皆續書之中興登科小録三卷姓類一卷陳氏曰通判徽州江都李椿撰新安舊有登科記但逐榜全録姓名而已椿家藏小録自建炎戊申至嘉熙戊戍節次取名字鄉貫三代諱刋之後以韻類其姓凡一萬五千八百人有竒太守吳興倪祖常子武刻之以備前記之闕文乘軺録一卷陳氏曰知制誥祁陽路振子發撰祥符中使契丹歸進此録事見其傳奉使别録一卷陳氏曰河南富弼彥國撰慶歷使契丹歸為語録以進機宜事節則具於此録又一本有兩朝往來書附於末劉氏西行録一卷陳氏曰直昭文館保塞劉渙中章撰按康定二年朝廷議遣使通河西唃氏渙以屯田郎知晉州請行以十月十九日出界慶歷元年三月十日回泰州此其行紀也唃氏自此與中國通而元昊始病於牽制矣渙後擢刺史歷典數州至留後以工部尚書致仕契丹講和記一卷陳氏曰不著名氏載契丹初講和本末未有慶歷增幣後北朝誓書慶歷正旦國信語録一卷陳氏曰余靖慶歷三年使北所記熙寧正旦國信録一卷陳氏曰天章閣待制竇卞熙寧八年使北所記接伴送語録一卷陳氏曰集賢校理沈季長熙寧九年接伴送北使耶律運所記使遼見聞録二卷陳氏曰尚書膳部郎中李罕撰宣和使金録一卷陳氏曰大常少卿安陸連南夫鵬舉弔祭阿固達奉使所記時宣和六年奉使雜録一卷陳氏曰紹興十二年何鑄使北所録禮物名銜表章之屬館伴目録一卷陳氏曰無名氏紹興二十四年隆興奉使審議録一卷陳氏曰左奉議郎雍希稷堯佐撰隆興二年編修官胡昉閣門祗候楊由義使金營軍前審議海泗唐鄧等事不屈而歸希稷其禮物官也所抗辨應對之語多出由義攬轡録一卷陳氏曰吳郡范成大至能乾道六年使北所記聞見北行日録一卷陳氏曰參政四明樓鑰大防乾道己丑待次溫州教授以書狀官從其舅汪大猷仲嘉使北紀行乾道奉使録一卷陳氏曰參政諸暨姚憲令則乾道壬辰使北日記奉使執禮録一卷陳氏曰進士鄭儼撰淳熙己酉中書舍人莆田鄭僑惠叔使北賀正會其主病篤欲令於閣門進國書僑不可已而殂遂回使燕録一卷陳氏曰尚書户部郎龍遊余嶸景瞻撰嘉定辛未嶸使北賀生辰會有北師行至涿州定興縣而回文獻通考卷一百九十九
