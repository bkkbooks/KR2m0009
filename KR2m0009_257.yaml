外備內臣褰簾皇太子常服出次就座諸王宗室參賀再拜訖垂簾皇太子降座還次中書門下文武百官樞密使內職師賔客而下以次參賀皆降階答拜訖升座受文武宫臣三品以下參賀庚午具鹵簿謁太廟五室常服乘馬出東華門升輅先是有司言唐禮宫臣參賀皇太子皆舞蹈開元始罷其禮故事百官及東宮官接見祗呼皇太子上箋啓稱皇太子殿下百官自稱名宫官自稱臣常所行用左春坊印宫內行令又按唐制凡東宮處分論事之書皇太子並書諾今左右庶子以下署姓名宣奉行書其與親友師傅等書不用此制今請如開元之制宫臣止稱名不行舞蹈之禮伏緣皇太子兼判開封府其所上表狀即署皇太子之位其當申中書樞密院狀祗判官署餘斷按及處分公事並書諾詔為準餘皆從之又言百官見皇太子自兩省五品尚書省御史臺四品諸司三品以上皆答拜餘悉受拜宫臣自左右庶子以下悉用參見之儀其皇太子宴會位在王公之上奏可有司草具皇太子受册畢朝皇后儀詔止用宫中常禮十月皇太子言臣自受册以來逮兹纍日每見僚屬率皆稱臣况至尊無二上之文事主有比肩之義在臣之懇實所不遑望許仍舊名許之真宗天禧二年八月丁卯册為皇太子並如至道之儀册用珉玉如乘輿之制而差損降其押輿用金塗銀平鈒承以髹漆小案飾以衣繡凡飾用龍者皆以螭鳳天禧四年閏十二月左僕射兼太子少師平章事丁謂言臣與兼少保賔客至資善堂許皇太子不答拜詔不允真宗六子郭皇后生周王元祐章懿李皇后生仁宗四子早亡史不詳其母氏仁宗三子俞才人生褒王昉苖昭儀生豫王昕朱才人生鄂王曦皆早亡英宗以濮安懿王之子立為皇子入繼大統英宗四子長神宗次吳王皓潤王顔益王頵皆宣仁高皇后所生神宗十四子欽成朱皇后生哲宗楚榮憲王似欽慈陳皇后生徽宗宋夫人生成王佾邢賢妃生惠王僅冀沖孝王僴徐沖惠王倜宋偼妤生唐哀獻王俊向夫人生褒王伸邢婉儀生豫悼惠王價武賢妃生吳榮穆王佖郭夫人生儀王偉林賢妃生燕王俁越王偲徽宗二十一子顯恭王皇后生欽宗顯仁韋皇后生高宗明逹劉皇后生濟陽郡王棫祁王模信王榛明節劉皇后生建安郡王楧嘉國公椅英國公橞諸姬生兗沖僖王柳鄆王楷荆悼敏王楫肅王樞景王把齊王栩邠沖穆王材莘王植華原郡王朴徐王棣沂王㮙鄆沖懿王栱和王栻漢沖昭王椿安康郡王楃廣平郡王楗陳悼惠王機相國公梴瀛國公樾溫國公棟儀國公桐昌國公柄潤國公樅欽宗二子仁懷朱皇后生太子諶少子訓北地所生終於五國城髙宗一子潘賢妃生元懿太子敷早亡孝宗以秀安僖王之子立為皇太子入繼大統孝宗四子莊文太子愭魏惠獻王愷光宗邵悼肅王恪皆成穆郭皇后所生初紹興崇建皇儲詔有司備禮册命然在欽宗恤制未及製樂乾道初元詔啓震宫命禮部太常寺討舊典以聞受册日陳黃麾仗於大慶殿設宫架樂於殿庭皇帝升降御座作乾安之樂升用黃鍾宮降用蕤賔宫皇太子入殿門作明安之樂受册出殿門亦如之皆用應鍾宫至七年易應鍾而奏以姑洗古者太子生則太師吹管以度其聲觀所協之律有虞典樂教胄子自天子至元子皆以樂為教所以養其情性之正蕩滌邪氛消融查滓而和順於道德則陳金石雅奏以重元良册拜宜倣古誼式昭盛禮繇唐季世儲二罕定國家亦多故而禮廢樂缺皇朝建隆定樂雖詔皇太子出入奏良安至道始册皇太子有司言太子受册宜奏正安之樂舉行百年曠典中外胥悅至天禧册命禮儀院復奏改正安為明安之樂乾道之用明安實祖述天禧而姑洗為宮則唐東宫軒垂奏樂舊貫云光宗二子節使挺及寧宗皆慈懿李皇后所生寧宗九子長子未名而夭莫詳母氏恭淑韓皇后生兖王埈邠王坦郢王增華王坰鍾夫人生順王圻申王墌其肅王垍邳王坻史不言其母氏九王俱早夭景獻太子詢以燕懿王後立為太子薨於東宫理宗以沂靖惠王後立為皇太子入繼大統文獻通考卷二百五十七
