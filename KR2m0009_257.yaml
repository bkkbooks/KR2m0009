body:
  text: 文獻通考卷二百五十七鄱陽馬端臨貴與著帝系考八皇太子皇子策命黃帝二十五子其得姓者十四人索隱曰舊解破四為三言得姓十三人耳今按國語胥臣云黃帝之子二十五宗其得姓者十四人為十二姓姬酉祁已滕葴任荀僖姞嬛依是也唯青陽與夷鼓同己姓又云青陽與蒼林為姬姓上則十四人為十二姓其文甚明唯姬姓再稱青陽蒼林蓋國語文誤所以致令前儒共疑其姬姓青陽當為元囂是帝嚳祖本與黃帝同姬姓其國語上文青陽即是少皥金天氏為己姓者耳既理在不疑無煩破四為三也黃帝娶西陵之女生二子其後皆有天下其一曰元囂是為青陽青陽降居江水其二曰昌意降居若水昌意娶蜀山氏女曰昌僕生髙陽髙陽有聖德焉注見后妃門帝顓頊生子曰窮蟬索隱曰系本作窮係也正義曰帝舜之髙祖也帝嚳娶陳鋒氏女生放勳娶娵訾氏女生摯帝嚳崩而摯代立帝摯立不善崩不善謂微弱不著而弟放勳立是為帝堯堯子丹朱舜子商均夏禹子啓按家天下自禹始啓而後凡襲位者非太子則王之衆子弟也其父子繼世以有天下者已見帝號歷年門兹不贅録其支庶羣子名字之見於經傳者録之其所不載則無由考焉啓子太康昆弟五人其一為仲康餘名字不見帝泄二子帝不降帝扄殷湯三子太丁外丙仲壬太甲二子沃丁太庚太庚三子小甲雍已太戊太戊二子外壬河亶甲祖乙二子祖辛祖丁祖丁四子陽甲盤庚小辛小乙武丁二子祖庚祖甲祖甲二子廪辛庚丁帝乙二子微子啓帝辛禮記國君世子生告於君接以太牢宰掌具接讀為捷捷勝也謂食其母使補虛強氣也三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑弧蓬矢六射天地四方詩之言承也桑弧蓬矢本太古也天地四方男子所有事也保受乃負之代士也保保母宰醴負子賜之束帛醴當為禮禮以一獻之禮酬之以幣也卜士之妻大夫之妾使食子食子不使君妾適妾有敵義不相褻以勞辱事也士妻大夫之妾謂時自有子正義曰王肅杜預並以為接待夫人以太牢鄭必讀為捷為補虛強氣者以婦人初産必困病當三日之內未必能以禮相接應待負子之後今前為之故知補虛強氣宜速也詩含神霧云詩者持也以手維持則奉承之義謂以手承下而抱負之桑蓬皆素質之物故知本太古也男子上事天下事地旁禦四方之難故云所有事然射禮唯四矢者謂天地非射事所及唯禦四方故止四矢蓬是禦亂之草桑衆木之本凡接子擇日雖三日之內尊卑必皆選其吉焉冢子則太牢天子世子也冢大也猶言長子庶人特豚士特豕大夫少牢國君世子太牢皆謂長子其非冡子則皆降一等謂冡子之弟及衆妾之子生也天子諸侯少牢大夫特豕士庶人特豚耳異為孺子室於宮中别掃一室以居擇於諸母與可者必求其寬裕慈惠溫良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室此人君養子之禮也諸母衆妾也可者傅御之屬也子師教示以善道者慈母知其嗜欲者保母安其居處者士妻以乳食之而已矣他人無事不往為兒精氣微弱將驚動也三月之末擇日剪髮為鬌男角女羈否則男左女右鬌所遺髮也夾囟曰角午逹日羈是日也妻以子見於父貴人則為衣服由命士以下皆潄浣貴人大夫以上由自也男女夙興沐浴衣服具視朔食朔食天子太牢諸侯少牢大夫特豕士特豚男女謂所生子之父母夫入門升自阼階立於階西向妻抱子出自房當楣立東面入門者入側室之門也大夫以下見子就側室見妾於內寢避人君也姆先相曰母某敢用時日祇見孺子某妻姓若言薑氏也祇敬也夫對曰欽有帥父執子之右手咳而名之欽敬帥循也言教之敬使有循也執右手明將授以事也妻對曰記有成遂左還授師記猶識也識大之言使有成也師子師也子師遍告諸婦諸母名後告諸母若名成於尊妻遂適寢復于夫之燕寢正義曰三月剪髮所留不剪者謂之鬌夾腦兩旁當角之處留髮不剪曰角午逹者一縱一橫曰午今女剪髮留其頂上縱橫相交通逹故曰午逹不如兩角相對但縱橫各一在頂上曰羈羈隻也世子生則君沐浴朝服夫人亦如之皆立於阼階西向世婦抱子升自西階君名之乃降子升自西階則人君見世子於路寢也見妾子就側室凡子生皆就側室正義曰世婦抱子從外而入其內寢是君之常居之處夫人不可以此寢生子故知亦在側室內也適子庶子見於外寢撫其手咳而名之禮帥初無辭此適子謂世子弟也庶子妾子也外寢君燕寢也無辭辭謂欽有帥記有成也公庶子生就側室三月之末其母沐浴朝服見於君擯者以其子見君所有賜君名之衆子則使有司名之擯者傳母之屬也人君尊雖妾不抱子有賜於君有恩惠也有司臣有事者也魯桓公名子問於申繻也曾子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面於西階南變於朝夕哭位也攝主上卿代君聼政也太祝禆冕執束帛升自西階盡等不升堂命無哭將有事宜清淨也禆冕者按神則祭服也禆冕絺冕元冕也士服爵辨服其太祝禆冕則大夫也祝聲三告曰某之子生敢告聲噫歆警神也某夫人氏升奠幣於殯東几上哭降几於殯東明繼體也衆主人卿大夫士房中皆哭不踊衆主人君之親也房中婦人也盡一哀反位遂朝奠反朝夕哭位小宰升舉幣所主也舉而下埋之階間三日衆主人卿大夫士如初位北面三日負子日也初告生時太宰太宗太祝皆禆冕少師奉子以縗祝先子從宰宗人從入門哭者止宰宗人詔贊君事者子升自西階殯前北面祝立於殯東南隅祝聲三曰某之子某從執事敢見子拜稽顙哭奉子者拜哭也祝宰宗人衆主人卿大夫士哭踊三者三凡踊三跳為一節三節為一踊謂之成踊故云三者三降東反位皆袒子踊房中亦踊三者三襲縗杖踊襲縗杖成子禮也奠出亦謂朝奠太宰命祝史以名遍告於五祀山川因負名之喪於禮略如已葬而世子生太宰太宗從太祝而告於禰告生三月乃名於禰以名遍告及社稷宗廟山川也右古者生世子之禮此經所言雖皆諸侯之禮然戴記中所述喪禮祭禮多是諸侯之禮而未嘗不可通之天子也以是推之亦可見矣經言接子冡子則太牢又曰國君世子太牢注謂前冡子天子世子也禮記凡三王教子必以禮樂樂所以修內也禮所以修外也禮樂交錯於中發形於外是故其成也懌恭敬而溫文中心中也懌悅懌立太傅少傅以養之欲其知父子君臣之道也養猶教也言養者積浸成長之太傅審父子君臣之道以示之謂為之行其禮少傅奉世子以觀太傅之德行而審喻之為説其義太傅在前少傅在後謂其在學時入則有保出則有師謂燕居出入時是以教喻而德成也以有四人維持之師也者教之以事而喻諸德者也保也者慎其身以輔翼之而歸諸道者也慎其身者謹安護之記曰虞夏商周有師保有疑丞記所云謂天子也取以成説設四輔及三公不必備唯其人語使能也語言也得能則用之無則已君子曰德成而教尊教尊而官正官正而國治此之謂也疏曰按四輔者尚書大傳云古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿祿視次國之君右古者教世子之禮歷代所建師傳本此其歷代師傅宮僚建置本末已見職官門茲不更録其文王世子篇所言庠序釋奠養老乞言等事雖亦為教世子設然其本則學校也已見學校門此亦不詳著焉漢文帝時賈誼上疏曰古之王者太子乃生固舉以禮正始也使士負之有司齊肅端冕見之南郊見於天也過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣昔者成王幼在繦抱之中召公為太保周公為太傅太公為太師保保其身體傳傳之德義師道之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也宴謂安居故乃孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也及太子少長知妃色則入於學學者所學之官也官謂學舍學禮曰帝入東學上親而貴仁則親疏有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不隃矣隃與踰同謂越制帝入太學承師問道退習而考於太傅太傳罰其不則而匡其不及則德智長而治道得矣此五學者既成於上則百姓黎民化輯於下矣及太子既冠成人免於保傅之嚴則有記過之史有過則記徹膳之宰有闕則諫進善之旌進善言者立於旌下誹謗之木譏惡事者書之於木敢諫之鼓欲顯諫者則擊鼓瞽史誦詩工誦針諫工樂工也大夫進謀士傳民語習與智長故切而不愧每被切磋故無大過可耻愧之事化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也朝日夕月以朝暮皆迎其初出也春秋入學坐國老執醬而親餽所以明有孝也行以鸞和鸞和車上鈴也步中采齊樂詩名也字或作薺又作茨並才和反趣中肆夏亦樂詩名趣讀曰趨趨疾步也凡此中者謂與其節相應也所以明有度也其於禽獸見其生不忍見其死聞其聲不忍食其肉故逺庖厨所以長恩且明有仁也夫三代所以久長者以其輔翼太子有此具也右賈誼疏所言教養世子之法與戴記相出入故附於此周文王之為世子朝於王季日三三皆日朝以其禮同雞初鳴而衣服至於寢門外問內豎之御者曰今日安否何如內豎小臣之屬掌外內之通命者御如今之小吏直日矣內豎曰安文王乃喜孝子恆兢兢及日中又至亦如之及莫又至亦如之莫夕也其有不安節則內豎以告文王文王色憂行不能正履節謂履處故事履蹈地也王季復膳然後亦復初食上必在視寒暖之節在察也食下問所膳問所食也命膳宰曰末有原應曰諾然後退末猶勿也原再也勿有所再進為其失飪臭味惡也退反其寢武王帥而行之不敢有加焉庶幾程式之帥循也文王有疾武王不説冠帶而養言常在側文王一飯武王亦一飯文王再飯亦再飯欲知氣味針樂所勝旬有二日乃間文王正妃太姒生武王武王同母兄弟十人其長子曰伯邑考次曰武王發次曰管叔鮮次曰周公旦次曰蔡叔度次曰曹叔振鐸次曰成叔武次曰霍叔處次曰康叔封次曰冉叔載正義冉作丹右史記世家所載如此左傳言管蔡郕霍魯衛毛𥅆郜雍曹滕畢原酆郇文之昭也杜氏注十六國皆文王子也然則史記世家所載十人蓋太姒正妃之子而郜雍滕畢原酆郇七人則皆庶子歟七人皆受封惟畢與周召共佐成王功德最顯滕有國至戰國時傳世最久餘無聞焉武王子成王邘晉應韓右文王武王之子其詳見於左傳故備録之成王以後之王子除繼世以有天下者可考而餘無聞焉其經傳所及者亦略載之於後又按周以來王子多為諸侯其受封傳世之本末分藩建國之規制已詳著於封建考更不再敘姑録其名字耳漢以後諸侯王倣此穆王二子共王繄扈孝王辟方厲王二子宣王靜鄭桓公友幽王二子平王宜􅍫伯服桓王二子莊王他王子克莊王二子釐王胡齊王子頽惠王二子襄王鄭甘昭公叔帶頃王二子匡王班定王瑜景王四子太子聖悼王猛敬王丐王子朝貞王三子哀王去疾思王叔考王嵬考王二子威烈王午西周桓公揭安王二子烈王喜顯王扁秦孝文王子二十餘人吕不韋説子楚曰子之兄弟二十餘人子居中不甚見幸久質諸侯太子即位子不得為嗣矣始皇子長子扶蘇公子十二人公子將閭昆弟三人公子髙二世胡亥按此據史記載二世既立趙高言沙邱之謀諸公子及大臣疑之諸公子皆帝兄怏怏不服當盡除之於是公子十二人僇死於市公子將閭昆弟三人囚於內宮議其罪使使賜死三人皆流涕拔劍自殺公子髙欲奔恐收族乃上書請從死驪山二世許之以是觀之始皇之子見於傳記而可考者十六人并扶蘇胡亥共十八人扶蘇以下十七人俱為胡亥所殺胡亥復為趙髙所殺皆不得良死嗟乎威震四海功加五帝而身殁未幾子孫殱焉彼文昭武穆之苖裔分茅胙土與國咸休者數百年而未艾也仁而延暴而顚信哉漢髙皇帝八男吕后生孝惠帝曹夫人生齊悼惠王肥薄姬生孝文帝戚夫人生趙王如意趙姬生淮南厲王長諸姬生趙幽王友趙共王恢燕靈王建髙五王傳孝文皇帝四男竇皇后生景帝梁孝王武諸姬生代孝王參梁懷王揖文三王傳孝景皇帝十四男王后生孝武皇帝栗姬生臨江閔王榮河間獻王德臨江哀王閼程姬生魯共王餘江都易王非膠西于王端賈夫人生趙敬肅王彭祖中山靖王勝唐姬生長沙定王發王夫人生廣川惠王越膠東康王寄清河哀王乘常山憲王舜景十三王傳孝武皇帝六男衛皇后生戾太子趙偼妤生孝昭帝王夫人生齊懷王閎李姬生燕刺王旦廣陵厲王胥李夫人生昌邑哀王髆武五子傳孝宣皇帝五男許皇后生孝元帝張偼妤生淮陽憲王欽衛倢妤生楚孝王嚻公孫倢妤生東平思王宇戎倢妤生中山哀王竟宣元六王傅孝元皇帝三男王皇后生孝成皇帝傅昭儀生定陶共王康馮昭儀生中山孝王興宣元王傳東漢光武十一子郭皇后生東海恭王強沛獻王輔濟南安王康阜陵質王延中山簡王焉許美人生楚王英光烈皇后生顯宗東平憲王蒼廣陵思王荆臨淮懷公衡琅邪孝王京眀帝九子賈貴人生章帝隂貴人生梁節王暢餘七王千乘哀王建陳敬王羡彭城靖王恭樂成靖王黨下邳惠王衍淮陽頃王昞濟隂悼王長本書不載母氏章帝八子宋貴人生清河孝王慶梁貴人生和帝申貴人生濟北惠王壽及河間孝王開餘四王千乘貞王伉平春悼王全城陽懷王淑廣宗殤王萬歲不載母氏和帝一子平原懷王勝並列傳後漢制拜皇太子儀百官會位定謁者引皇太子當御座殿下北面司空當太子西北東面立讀策書畢中常侍持太子璽綬太子再拜三稽首謁者贊曰皇太子臣某甲謁者稱制曰可三公升階上殿賀夀萬歲因赦天下舊制太子食湯沐十縣周衛交戟五日一朝因坐東廂省視膳食其非朝日使僕中允旦旦請問而已明不媟黷廣其敬也魏武帝二十五男卞皇后生文皇帝任城威王彰陳思王植蕭懷王熊劉夫人生豐愍王昂哀殤王鑠環夫人生鄧哀王沖彭城王據燕王宇杜夫人生沛穆王林中山恭王袞秦夫人生濟陽懷王玹陳留恭王竣尹夫人生范陽閔王矩王昭儀生趙王揮孫姬生臨邑殤公子上楚王彪剛殤公子勤李姬生榖城殤公子乘郿戴公子整靈殤公子京周姬生楚安公均劉姬生廣宗殤公子棘宋姬生東平靈王徽趙姬生樂陵王茂文帝九男甄皇后生眀帝李貴人生贊哀王協潘淑媛生北海悼王蕤朱淑媛生東武陽懷王鑒仇昭儀生東海定王霖徐姬生元城哀王禮蘇姬生邯鄲懷王雍張姬生清河悼王貢宋姬生廣平哀王儼晉宣帝九男穆張皇后生景帝文帝平原王幹伏夫人生汝南文成王亮琅邪武王胄音宙清惠亭侯京扶風武王駿張夫人生梁王肜音融柏夫人生趙王倫文帝九男文明王皇后生武帝齊獻王攸城陽哀王兆遼東悼惠王定國廣漢殤王廣德其樂安平王鑒燕王機皇子永祚樂平王延阼不知母氏武帝二十六男楊元后生毗陵悼王軌惠帝秦獻王東審美人生城陽懷王景楚隱王瑋長河厲王義徐才人生城陽殤王憲匱才人生東海沖王祗趙才人生始平哀王裕趙美人生代哀王演李夫人生淮南忠壯王允吳孝王晏嚴保林生新都懷王該陳美人生清河康王遐諸姬生汝隂哀王謨程才人生成都王頴王才人生孝懷帝楊悼后生渤海殤王恢餘八子不顯母氏並早夭又無封國及追諡元帝六男宫人荀氏生明帝及琅邪孝王裒石倢妤生東海哀王沖王才人生武陵威王晞鄭夫人生琅邪悼王煥及簡文帝明帝二男庾皇后生成帝康帝成帝二男太妃周氏生哀帝海西公簡文帝七男王皇后生會稽思世子道生皇子俞生胡淑儀生臨川王郁皇子朱生王淑儀生皇子天流李夫人生孝武帝會稽孝王道子俞生朱生天流並早夭孝武帝二子安帝恭帝不知母氏晉制皇帝會公卿座位定太子後至孫育以為羣臣不應起禮曰父在斯為子君在斯為臣侍坐於所尊見同等不起皆以為尊無二上故有所厭之義也昔衛綰不應漢景之召釋之正公門之法明太子事同於羣臣羣臣亦統一於所事應依同等不起之禮明帝太寧三年詔曰漢魏以來尊崇儲二使官屬稱臣朝臣咸拜此甚無謂今太子衍幼沖之年使臣先逹將今所習見謂之自然此豈可以教之邪令內外通議尚書令卞壼議以為春秋王太子不會明禮同於君皆所以重儲二異正嫡茍奉之如君不得不拜矣太子若存謙沖故宜答拜臣以為皇太子之立郊告天地正位儲宫豈得同之皇子揖讓而已謂宜稽則漢魏闔朝同拜從之徐邈云東宫臣上表天朝既用黃紙上太子疏則用白紙也北人有作符閎宫屬者云東宫臣上疏於太子用白紙太子答之用黃紙朝士率常箋上下死罪太子答之用白亦有惶恐此自得中朝舊法東晉孝武皇帝泰元十二年臺符問皇太子既拜朝臣奉賀應上禮不國子博士車允云百辟卿士咸與盛禮展敬拜伏不須復上禮唯方伯牧守不覩大禮自非酒牢貢羞無以裁其乃誠故宜有上禮亦如元正大慶方伯莫不上禮朝臣奉璧而已太學博士庾𢎞之議按武帝咸寧中諸王新拜有司近臣諸