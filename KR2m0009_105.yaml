body:
  text: 文獻通考卷一百五鄱陽馬端臨貴與著宗廟考十五大夫士庶宗廟大夫三廟一昭一穆與太祖之廟而三太祖别子始爵者大傳曰别子為祖謂此雖非别子始爵者亦然嫡疏曰此據諸侯之子始為卿大夫謂之别子者也是夫人之次子或衆妾之子别異於正君繼父言之故云别子引大傳證此太祖是别子也云雖非别子始爵者亦然非諸侯之子孫異姓為大夫者及他國之臣初來仕為大夫者亦得為太祖故云雖非别子亦得立太祖之廟若其周制别子始爵其後得立别子為太祖若非别子之後雖為大夫但立父祖曾祖三廟而已隨時而遷不得立始爵者為太祖故鄭答趙商問祭法云大夫立三廟曰考廟曰王考廟曰皇考廟注非别子故知祖考無廟商按王制大夫三廟一昭一穆與太祖之廟而三注云太祖别子始爵者雖非别子始爵者亦然二者不知所定鄭答云祭法周禮王制所云或以夏殷雜不合周制是鄭以為殷周之别也鄭必知周制别子之後得立别子為太祖者以大傳云别子為祖繫之以姓而弗别綴之以食而不殊雖百世而婚姻不通者周道然也故知别子百世不遷為太祖也周既如此明殷不繫姓不綴食大傳又云其庶姓别於上而戚單於下五世而婚姻可以通明五世之後不復繼於别子但始爵者則得為太祖也此大夫三廟者天子諸侯之大夫皆同卿即大夫總號故春秋經皆總號大夫其三公即與諸侯同若附庸之君亦五廟故莊三年公羊傳云紀季以􅈶入於齊傳曰請復五廟以存姑姊妹有朱子曰大夫三廟一昭一穆與太祖廟而三大夫亦始封之君如魯季氏則公子友仲孫氏則公子慶父叔孫氏則公子牙是也禮又曰余正父謂士大夫不得祭始祖此天子諸侯之若士大夫當祭則自古無明文先生因舉春秋如尹氏單氏王朝之大夫自上世至後世皆不變其初來姓號則必有太祖又如季氏之徒世世不改其號則亦必有太祖余正父謂此春秋時自是世卿不由天子都沒理會先生云非獨是春秋如詩説南仲太祖太師皇父南仲是文王時人到宣王時為太祖不知古者世祿不世官之説如何士一廟謂諸侯之中士下士名曰官師者上士二廟疏曰按祭法云官師一廟故云名曰官師者鄭既云諸侯之中士下士一廟則天子之中士下士皆二廟也曲禮士祭其先疏曰以士祭先祖歲有四時更無餘神故也庶人於寢寢適寢也謂適丁歷反官疏曰此庶人祭寢是庶人在府史之屬及尋常庶人此祭謂薦物以其無廟故唯薦而已薦獻不可褻處故知適寢也大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼注見天子宗廟顯考祖考無廟者以其卑故高祖太祖無廟也有禱焉為壇祭之者大夫無主故無所寄藏而高太二祖既又無廟若應有祈禱則為壇祭之二壇之設實為於此矣然墠輕於壇今二壇無墠者為太祖雖無廟猶重之故也去壇為鬼者謂髙祖若遷去於壇則為鬼不復得祭但薦於太祖壇而已適士上士也天子三等諸侯上士悉二廟一壇顯考無廟顯當為皇皇考曾祖也官師謂諸侯中士下士言為一官之長一廟祖禰共之又無壇也去王考為鬼者謂曽祖則不得祭又無壇若有祈禱則薦之於廟也庶士府史之屬庶人平民賤故無廟死曰鬼亦得薦之於寢凡鬼者薦而不祭薦輕於祭鬼疏於廟朱子曰官師諸有司之長也一廟止及禰却於禰廟并祭祖適士二廟即祭祖祭禰皆不及其高曾也朱子語録問官師一廟若只是一廟只祭得父母更不及祖矣毋乃不近人情曰位卑則澤淺其理自當如此曰今雖士庶人家亦祭三代如此却是違禮曰雖祭三代却無廟亦不可謂之僭古之所謂廟者其體面甚大皆有門堂寢室如所居之宮非如今人但以一室為之有問程子曰今人不祭髙祖如何曰髙祖自有服不祭甚非某家却祭髙祖又曰自天子至於庶人五服未嘗異皆至高祖服既如是祭祀亦須如是其疏數之節未有可考但其理必如此七廟五廟亦只是祭及高祖大夫士雖或三廟二廟一廟或祭寢廟則雖異亦不害祭及高祖若止祭禰是為知母而不知父禽獸道也祭禰不及祖非人道也朱子曰考諸程子之言則以為高祖有服不可不祭雖七廟五廟亦止於高祖雖三廟一廟以至祭寢亦必及於高祖但有疏數之不同耳疑此最為得祭祀之本意禮家言大夫有事省於其君干祫及其高祖此則可為立三廟而祭及高祖之驗但干祫之制他有可考耳楊氏曰愚按前二條謂澤有淺深則制有隆殺其分異也後二條謂七廟五廟亦止於高祖雖三廟一廟以至祭寢亦必及高祖其理同也按自天子以至於士五服之制則同而祭祀止及其立廟之親則大夫不祭其高曽士不祭其祖非人情也程子以為有服者皆不可不祭其説當矣愚又嘗考之禮經參以諸儒注疏之説然後知古今異宜禮緣人情固當隨時為之損益不可膠於一説也人徒見適士二廟官師一廟以為所及者狹不足以伸孝子慈孫追逺之心也然古人之制則雖諸侯大夫固有拘於禮而不得祀其祖考者矣何也鄭氏注諸侯五廟云太祖始封之君王者之後不為始封之君廟疏曰凡始封之君謂王之子弟封為諸侯為後世之太祖當此君之身不得立出王之廟則全無廟也注大夫太祖别子始爵者然則諸侯始封之太祖如鄭桓公友是也鄭桓公以周厲王少子而始封於鄭既為諸侯可以立五廟矣然其考則厲王祖則夷王曾祖則懿王髙祖則共王五世祖則穆王自穆至厲皆天子也諸侯不敢祖天子則此五王之廟不當立於鄭所謂此君之身全無廟也必俟桓公之子然後可立一廟以祀桓公為太祖桓公之孫然後可立二廟以祀其祖若禰必俟五世之後而鄭國之五廟始備也大夫始爵之太祖則魯季友是也季友為魯桓公之别子既為大夫可以立三廟矣然其考則桓公其祖則惠公其曾祖則孝公自孝以至桓皆諸侯大夫不敢祖諸侯則此三公之廟不當立於季氏之家所謂别子亦全無廟也必俟季友之子然後可立一廟以祀季友為太祖季友之孫然後可立二廟以祀其祖若禰必俟三世之後而季氏之三廟始備也蓋諸侯大夫雖有五廟三廟之制然方其始為諸侯大夫也茍非傳襲數世則亦不能備此五廟三廟之禮至於士庶人則古者因生賜姓受姓之後甫及一傳即有嫡有庶嫡宗子也庶支子也禮云支子不祭祭必告於宗子又云庶子不祭明其宗也蓋謂非大宗則不得祭别子之為祖者非小宗則各不得祭其四小宗所生之祖禰也先王因族以立宗敬宗以尊祖尊卑有分而不亂親疏有别而不二其法甚備而猶嚴於廟祀之際故諸侯雖曰五廟而五世之內有為天子者則不可立大夫雖曰三廟而三世之內有為諸侯者則不可立適士二廟官師一廟庶人祭於寢然茍非宗子則亦不可祭於其家必獻牲於宗子之家然後舉私祭凡為是者蓋懼上僭而不敢祭非薄其親而不祭也然諸侯不敢祖天子而天子之為祖者自有天子祭之大夫不敢祖諸侯而諸侯之為祖者自有諸侯祭之支子不敢祭大宗而大宗之為祖禰者自有宗子祭之蓋已雖拘於禮而不得祭而祖考之祭則元未嘗廢適士官師雖止於二廟一廟而祖禰以上則自有司其祭者此古人之制也後世大宗小宗之法既亡别子繼别之序已紊未嘗專有宗子以主祀事其入仕者又多崛起單寒非時王之支庶不得以不敢祖天子諸侯之説為諉也乃執大夫三廟適士二廟之制而所祭不及祖禰之上是不以學士大夫自處而孝敬之心薄矣烏得為禮乎故曰古今異宜禮緣人情當隨時為之損益不可膠於一説也或曰此為國中公族之世祿者言也若庶姓之來自他國而為諸侯大夫者則如之何愚曰古未有無宗者庶姓有庶姓之宗他國有他國之宗而宗子之制則一也曾子問曰宗子為士庶子為大夫其祭之也如之何孔子曰以上牲祭於宗子之家又問曰宗子去在他國庶子無爵而居可以祭乎孔子曰祭哉望墓而為壇以祭此二條正為起自匹庶與來自他國者言若太公東海人而仕周為諸侯孔子宋人而事魯為大夫之類是也注疏謂異姓始封為諸侯者及非别子而始爵為大夫者如他國之臣初來為大夫本身即得立五廟三廟蓋以其非天子諸侯之子孫上無所拘礙故當代即可依禮制立廟然以曾子問宗子為士一條及參以內則中所謂不敢以富貴加於宗子之説則知崛起為諸侯大夫者若身是支庶亦合尊其宗子不敢盡如禮制也諸侯不敢祖天子大夫不敢祖諸侯公廟之設於私家非禮也由三桓始也言仲孫叔孫季孫皆立桓公廟魯以周公之故立文王廟三家見而僭焉郊特牲衛孔悝出奔宋使二車反祏於西圃悝若回反祏音石圃布五反圃孔氏廟所在祏藏主石函使副車還取廟主西函音咸疏曰少牢饋食大夫之祭禮其祭無主鄭元祭法注云唯天子諸侯有主禘祫無主耳今孔悝得有主者當時僭為之非禮也鄭元駮異義云大夫無主孔悝之反祏所出公之主耳按孔氏姞姓春秋時國唯南燕為姞姓耳孔氏仕於衛朝已歷多世不知本出何國安得有所出公之主也知是僭為之主耳春秋哀公十六年左傳支子不祭祭必告於宗子不敢自專謂宗子有故支子當攝而祭者也五宗皆然不疏曰支子庶子也祖禰廟在適子之家而庶子賤敢輒祭之也宗子有疾不堪當祭則庶子代攝可也猶宜告宗子然後祭故鄭云不敢自專曲禮下庶子不祭明其宗也大傳得朱子曰按此依大傳文直謂非大宗則不祭别子之為祖者非小宗則各不得祭其四小宗所生之祖禰也其小記則云庶子不祭禰明其宗也又云庶子不祭祖明其宗也文意重復似是衍字而鄭氏曲為之説於不祭禰則曰謂宗子庶子俱為下士得立禰廟也雖庶人亦然明其尊宗以為本也於不祭祖則云禰則不祭矣言不祭祖者主謂宗子庶子俱為適士得立祖禰廟者也凡正體在乎上者謂下正猶為庶也族人上不戚君下又辟宗乃後能相序而疏亦從之上條云禰適故得立禰廟故祭禰禰庶故不得祭禰明其有所宗也下條云庶子適子俱是人子並宜供養而適子蒸嘗庶子獨不祭者正是推本崇適明有所宗也又云父庶即不得祭父何暇言祖而言不祭祖故知是宗子庶子俱為適士適士得立二廟自禰及祖是適宗子得立祖廟祭之而已是祖庶雖俱為適士得自立禰廟而不得立祖廟祭之也正體謂祖之適也下正謂禰之適也雖正為禰適而於祖猶為庶故禰適謂之為庶也五宗悉然今姑存之然恐不如大傳語雖簡而事反該悉也又曰凡文字有一兩本參對則義自明如禮記中喪服小記大傳皆是解注儀禮喪服小記云庶子不祭禰明其宗也又曰庶子不祭祖明其宗也注謂不祭禰者父之庶子不祭祖者其父為庶子説得繁碎大傳只説庶子不祭其祖禰支子在其中其所以於祭禮中只載大傳宗張氏曰宗子既祭其祖禰支子不得别祭所以嚴廟合族屬故曰庶子不祭祖禰明其宗也庶子不祭殤與無後者殤與無後者從祖祔食殤音傷祔音附也不祭殤者父之庶也不祭無後者祖之庶此二者當從祖祔食而已不祭祖無所食之也共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者唯適子耳無後者謂昆弟諸父也宗子之諸父無後者為墠祭之與所食音嗣共音恭墠音善又徒丹反疏曰此事曾子問中義同而語異曾子問中是明宗子所得祭就宗子之家宗子主其禮今此所言是庶子不得在家祭者也見喪服小記條曾子問之於祭殤也庶子若富則具二牲獻其賢者於宗子賢猶善也善疏曰善者獻宗子使祭之不者私用自祭也夫婦皆齊而宗敬焉齊側皆反將當助祭於宗子之家齊疏曰大宗子祭之時小宗夫婦皆戒以助祭於大宗以加敬焉謂敬事大宗之祭終事而後敢私祭祭其祖禰疏曰大宗終竟祭事而后敢以私祭祖禰也此文雖主事大宗子其大宗之外事小宗子者亦然內則曾子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家貴祿重宗也上牲大夫少牢疏曰宗子是士合用特牲今庶子身為大夫若祭祖禰當用少牢之牲就宗子之家祭之也用大夫之牲是貴祿也宗廟在宗子之家是重宗也此宗子謂小宗也若大宗子為士得有祖禰二廟若庶子是宗子親弟則與宗子同祖禰得以上牲於宗子之家而祭祖禰也但庶子為大夫得祭曾祖廟已是庶子不合自立曾祖之廟崔氏云當寄曾祖廟於宗子之家亦得以上牲宗子為祭也祝曰孝子某為介子某薦其常事為於偽反曰介副也不言庶使若可以祭然疏上云庶子為大夫此亦當云為庶子某今云介子某者庶子卑賤之稱介是副二之義介副則可祭故云使若可以祭然故稱介子若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事此之謂宗子攝大夫大疏曰喪服小記士不攝夫士攝大夫唯宗子也攝主不厭祭不旅不假不綏祭不配厭本或作懨於艷反綏本或作隳隳五垂反酌皆辟正主厭厭飫神也厭有隂有陽迎尸之前祝奠奠之且享是隂厭也尸謖之後徹薦爼敦設於西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀為嘏不嘏不嘏主人也不綏祭謂今主人也綏周禮作隳不配者祝辭不言以某妃配某氏辟音避謖所六反敦音對嘏古雅反布奠於賓賓奠而不舉布奠謂主人酬賓奠觶於薦北賓奠謂取觶奠於薦南也此酬之始也奠之不舉止旅爵疏曰主人酬賓之時賓在西廂東面主人布此奠於賔之北賓坐取薦北之爵奠於薦南而不舉案特牲禮云賓奠之後主人獻衆兄弟內兄弟訖乃行旅酬故云酬之始也云止旅者謂止旅酬之事而不為也不歸肉肉爼也諸與祭者留之共燕與音預不疏曰賓客正祭諸助祭之賓客各使歸爼今攝主敢饋爼肉於賔故注云諸與祭者留之共燕其辭於賓曰宗兄宗弟宗子在他國使某辭辭猶告也宿賓之辭與宗子為列則曰宗兄若宗弟昭穆異者曰宗子而已其辭若云宗兄某在他國使某執其常事使某告初疏曰非但祭不備禮其將祭之辭告於賓與常禮亦别曾子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉有子孫存不可以乏先祖之祀子疏曰曾子以孔子上文云宗子有罪居在他國庶為大夫得在本國攝祭未知庶子無爵在國居者可祭否故問之孔子曰祭哉者孔子既許其祭以無正文得祭故云祭哉祭哉者疑而量度之辭請問其祭如之何孔子曰望墓而為壇以時祭不祭於廟無爵者賤逺辟正主家逺於萬反疏曰庶子雖有廟在宗子之庶子無爵不敢就宗子之廟而祭唯可望近所祭者之墓而為壇以四時致祭也所以不致祭於宗子廟者以庶子無爵卑賤逺辟正主正主者謂宗子也若宗子死告於墓而后祭於家言祭於家容無廟也以疏曰告於所祭之墓而后祭於庶子之家也從上來雖據宗子有爵而言其廟在家今宗子既死庶子無所可辟當云告於墓而后祭於宗子之家今直云祭於家是祭於庶子之家是容宗子之家無廟也宗子所以無廟者宗子無爵不合立廟或云祭於家者是祭於宗子之家容庶子之家無廟也庶子所以無廟者一是庶子無爵不合立廟二是宗子無罪居他國以廟從本家不復有廟故也宗子死稱名不言孝孝宗子之稱不敢與之同其辭但言子某薦其常事身沒而已至子可以稱孝庶疏曰庶子身死其子則是庶適子祭子之時可以稱孝子遊之徒有庶子祭者以此以用也用此禮祭也有疏曰孔子引子遊之徒黨庶子祭者而用此禮而祭若義也疏曰若順也謂順於古義故云若義也今之祭者不首其義故誣於祭也首本也不疏曰謂今日世俗庶子祭者尋本義之道理為此祭故云誣於祭謂妄為祭之法不依典禮通典載諸侯以下祭禮見諸侯宗廟門後漢許愼五經異義或曰卿大夫士有主不答曰按公羊説卿大夫非有土之君不得祫享昭穆故無主大夫束帛依神士結茅為菆則牛反衛愼據春秋左氏傳曰孔悝反祏於西圃祏石主也言大夫以石為主鄭駮云少牢饋食大夫祭禮也束帛依神特牲饋食士祭禮也結茅為菆鄭志張逸問許氏異義駮衛孔悝之反祏有主者何謂也答禮太夫無主而孔獨有者或時末代之君賜之使祀其所出之君也諸侯不祀天而魯郊諸侯不祖天子而鄭祀厲王皆時君之賜也晉人問蔡謨云時人祠有版版為用當主為是神座之榜題謨答今代有祠版木乃始禮之奉廟主也主亦有題今版書名號亦是題主之意安昌公荀氏祠制神版皆正長尺一寸博四寸五分厚五寸八分大書某祖考某封之神座夫人某氏之神座以下皆然書訖蠟油炙令入理刮拭之徐邈云左氏稱孔悝反祏又公羊大夫聞君之喪攝主而往注義以為斂攝神主而已不暇待祭也皆大夫有主之文大夫以下不云尺寸雖有主無以知其形制然推義謂亦應有按喪之銘旌題别亡者設重於庭亦有所憑祭必有尸想像乎存此皆自天子及士並有其禮但制度降殺為殊何至於主唯侯王而已禮言重主道也理重則立主今大夫士有重亦宜有主主以紀别座位有尸無主何以為别將表稱號題祖考何可無主今按經傳未見大夫士無主之義有者為長後魏孝明帝孝昌中清河王懌議曰原夫作主之禮本以依神孝子之心非主莫展今銘旌紀柩設重憑神祭必有尸神必有廟皆所以展事孝敬想像乎存上自天子下達於士如此四事並同其禮何至於主唯謂王侯若位擬諸侯者則有主位為大夫者則無主是使三神有主一位獨闕求諸情禮實所未安宜通為主以銘神位北齊王及五等開國執事官散從二品以上皆祀五代五等散官正三品以下從五品以上祭三代三品以上牲用太牢以下少牢執事官正六品以下從七品以上祭二代用特牲正八品以下達於庶人祭於寢唐制一品二品四廟三品三廟五品二廟嫡士一廟庶人祭於寢及開元定禮二品以上四廟三品三廟三品以上不須爵者亦四廟四廟有始封為五廟四品五品有兼爵亦三廟六品以下達於庶人祭於寢天寶十載京官正其四品清望及四品五品清官聽立廟勿限兼爵雖品及而建廟未逮亦聽寢祭唐諸臣廟之制三品以上九架厦兩旁三廟者五間中為三室左右厦一間前後虛之無重栱藻井室皆為石室一於西墉三之一近南距地四尺容二主廟垣周之為南門東門門屋三室而上間以廟增建神厨於廟東之少南齋院於東門之外少北制勿逾於廟三品以上有神主五品以上有几筵牲以少牢羊豕一六品以下特豚不以祖禰貴賤異子孫之牲牲闕代以野獸五品以上室異牲六品以下共牲二品以上室以籩豆十三品以八四品五品以六五品以上室皆簠二簋㽅二鈃二俎二樽二罍二勺二爵六盤一坫一篚一牙盤胙俎一祭服三品以上元冕五品以上爵辨六品以下進賢冠各以其服凡祔皆給休五日時享皆四日散齋二日於正寢致齋一日於廟子孫陪者齋一宿於家始廟則署主而祔後喪闋乃祔喪二十八月上旬卜而祔始神事之矣王公之主載以輅夫人之主以翟車其餘皆以輿天子以四孟臘享太廟諸臣避之祭仲而不臘三歲一祫五歲一禘若常享若禘祫卜日齋戒省牲親滌濯鼎鑊烹牲實饌三獻飲福受胙進退之數大抵如宗廟之祀以國官亞終獻無則以親賓以子弟其後不卜日而筮用亥祭寢者春秋以分冬夏以至日若祭春分則廢元日然元正歲之始冬至陽之復二節最重祭不欲數乃廢春分通為四祠器以烏漆差小常制祭服以進賢冠主婦花叉禮衣後或改衣冠從公服無則常服凡祭之在廟在寢既畢皆親賓子孫慰主人以常服見若宗子有故庶子攝祭則祝曰孝子某使介子某執其常事通祭三代而宗子卑則以上牲祭宗子家祝曰孝子某為其介子某薦其常事庶子官尊而立廟其主祭則以支庶封官依大宗主祭兄陪於位以廟由弟立已不得延神也或兄弟分官則各祭考妣於正寢若殤及無後皆祔食於祖無祝而不拜設坐祖左而西面亞獻者奠祝乃奠之一獻而止其後廟制設幄當中南向祔坐無所施皆祭室戶外之東而西向親伯叔之無後者祔曾祖親昆弟及從父昆弟祔於祖親子姪祔於禰寢祭之位西上祖東向而昭穆南北則伯叔之祔者居禰下之穆位北向昆弟從父昆弟居祖下之昭位向南子姪居伯叔之下穆位北向以序尊卑凡殤無後以周親及大功為斷古者廟於大門內奉出寢於陵側故王公亦建廟於墓既廟與居異則宮中有喪而祭三年之喪齊縗大功皆廢祭外喪齊縗以下行之唐三品以上時享其廟儀四品五品六品以下附前享五日筮於廟門之外主人公服立於門東西面掌事者各服其服立於門西北上設筮席於闑西閾外西面筮者開韇出册兼執之東面受命於主人主人曰孝曾孫某來日丁亥祗享於廟尚饗亥不必丁直舉一日以言之則己亥辛亥茍有亥焉可筮者曰諾進就筮席西面以韇擊册遂述曰假爾太筮有常孝曾孫來日丁亥祗享於廟尚饗乃釋韇坐筮訖興降席東面稱占曰從筮吉退若不吉即筮遠日還如初儀贊禮者進主人之左告禮畢掌事者徹筮席先享三日主人及亞獻終獻並執事者各散齋二日於正寢致齋一日於廟所國官僚佐之長為亞獻其次為終獻無則親賓為之子孫及凡入廟者各於其家清齋皆一宿四品五品以上同六品以下若有廟者如五品以上之儀無廟者筮於正寢之堂主人公服立於堂上楹間近東西面掌事者近西東面北上設筮席於主人之西筮者開韇出册兼執之東面受命於主人主人曰孝孫某來日丁亥春祠其餘並同五品以上儀亞獻終獻親賓為之前一日之夕清掃內外掌廟者整拂神幄六品以下無廟者但清掃內外贊禮者設主人之位於東階西面亞獻終獻位於主人東南掌事者位於終獻東南俱重行西向北上設子孫之位於庭重行北面西上設贊唱者位於終獻西南西面又設亞獻以下位於門外之東執事者在南差退俱西向設牲於南門之外當門北向以西為上掌牲者位於牲西北東面諸祝位於牲後俱北向設亞獻省牲位於牲前近東西面設祭器之數每室樽二簋二簠二㽅二鈃二俎二籩豆一品二品各十三品八四品五品各六六品以下簋簠㽅鈃俎各一籩豆各二掌事者以樽入設前楹下各於室户六品以下無廟者不言室户之東北面西上皆加勺羃首座爵一餘座皆爵四置於坫四品五品六品以下皆置於樽下加勺羃設祭器於序東西向每座簋在前簠次之鈃次之豆次之俎在後每座異之皆以南為上屈陳而下設洗於東階東南東西當東霤五品以上同六品以下當東榮餘同南北以堂深罍水在洗東加勺羃篚在西南肆實爵三巾二於篚加羃凡器物皆濯而陳之執樽罍洗篚者各於樽罍洗篚之後掌牲者以牲就榜位贊禮者引亞獻入詣東階升堂遍視滌濯於視濯執樽者皆舉羃告潔訖引降就省牲位亞獻省牲掌牲者前東面舉手曰腯還本位諸祝各循牲一匝北面舉手曰充俱還本位祝與掌牲者以次牽牲付厨贊禮者引終獻詣厨省鼎鑊視濯溉亞獻以下每事訖各還齋所執饌者入徹簠簋籩豆俎鈃以出享日未明烹牲於厨夙興掌饌者實祭器牲體皆載右胖前腳三節節一假肩臂皆載之後腳三節節一假去下一節載上胱胳一節又取正脊脠脊橫脊短脅正脅代脅各二骨以並餘皆不設簋實稷黍簠實稻梁籩實石鹽乾脯棗栗之屬豆實醢醬虀葅之類六品以下簋實稷簠實黍籩實脯棗豆實葅醢餘同五品以上主人以下各服其服掌事者入實樽罍每室一樽一實元酒為上一實醴齊次之祝版各置於坫四品五品六品於樽所諸祝與奄人四品五品無奄人六品以下於正寢室內入立於庭北面西上立定皆再拜訖升自東階以次出神主各置於座夫人之主奄人奉出俱並常處右四品五品祝拜訖升整拂几筵六品以下祝設神座於正寢室內祖在西東面禰在祖東北向凡皆有几筵質明贊禮者引亞獻以下及子孫俱就門外位贊唱者先入就位諸祝與執樽罍者入立於庭北面西上立定贊唱者曰再拜祝以下俱再拜各就位掌饌者奉饌陳於門外贊禮者引主人入就位又贊禮者引亞獻以下及子孫以次入就位立定贊唱者曰再拜主人以下皆再拜贊禮者進主人之左白請行事退復位掌饌者引饌入升自東階諸祝迎引於階上各設於神座前籩居右豆居左簠簋㽅鈃居其間羊豕二俎橫重陳於右臘俎侍於左四品五品同六品特牲俎橫於前執爐炭蕭稷膟膋者各從其俎升置於室戶外之左六品無廟則致於堂戶外之左餘同其蕭稷各置於爐炭下施設訖掌饌以下降出諸祝各取蕭稷擩而專反於脂燔於爐炭還樽所贊禮者引主人詣罍洗執罍者酌水執洗者跪取盤興承水主人盥手執篚者跪取巾於篚興進主人拭手執篚者受巾跪奠於篚遂取爵興以進主人受爵執罍者酌水主人洗爵執篚者又跪取巾於篚興主人進拭爵訖受巾跪奠於篚奉盤者跪奠盤興凡取物者跪俯伏而取以興奠物則奠訖俯伏而後興贊禮者引主人自東階升堂詣某祖酒樽所六品以下詣祖下放此執樽者舉羃主人酌酒贊禮者引主人進詣某祖座前北面跪奠爵興出戶北面立四品五品同六品以下西向奠爵興少退西向立祝持版進於室戶外之右東面四品五品同六品以下祝持版進祖座之右北面跪讀祝文曰維某年歲次月朔日子孝曾孫某官封某無封者單稱官六品以下稱孝孫餘同無官者稱名敢昭告於某祖考某諡封祖妣某邑夫人某氏時惟仲春夏云仲夏秋云仲秋冬云仲冬伏增遠感謹以柔毛剛鬛明粢薌合薌箕嘉蔬嘉薦四品五品云柔毛剛鬛嘉薦普淖六品以下無柔毛餘同五品醴齊恭薦祠享春云祠夏云礿秋云嘗冬云蒸於某祖考某諡封某祖妣夫人某氏配尚饗祖考及孫各依尊卑稱號其祝文四品以下同訖興主人再拜祝進跪奠版於神座興還樽所贊禮者引主人以次酌獻如上儀唯不盥洗訖贊禮者引主人詣東序西向立四品五品同六品以下詣先祖座前近東西向立餘同諸祝各以爵酌福酒各置一爵一祝持爵進主人之左跪祭酒啐酒奠爵興諸祝各帥執饌者以俎入減神前胙肉共置一俎上又以籩遍取稷黍飯共置一籩祝先以飯籩進主人受以授左右祝又以俎以授主人每受以授左右訖主人跪取爵遂飲卒爵祝進受爵復於坫四品五品六品復於樽所下放此主人興再拜贊禮者引主人降自東階還版位西向立主人獻將畢贊禮者引亞獻詣罍洗盥手洗爵升自東階詣某祖酒樽所執樽者舉羃亞獻酌清酒贊禮者引亞獻進詣某祖神座前北向跪五品以上同六品以下詣先祖前西向跪奠爵興少退再拜奠爵興出戶北向再拜贊禮者引亞獻如上儀訖贊禮者引亞獻詣東序西向立五品以下同六品詣祖座近東西向立諸祝各以爵酌福酒如初獻儀唯不受胙又贊禮者引終獻亦如初獻儀訖降復位諸祝皆進神座前跪徹豆興還樽所徹者籩豆各一少移於故處贊唱者曰再拜非飲福受胙者皆再拜贊唱者又曰再拜主人以下皆再拜贊禮者進主人之左白禮畢遂引主人出贊禮者引亞獻以下出子孫以次出諸祝奠執樽罍篚者俱復執事位立定贊唱者曰再拜諸祝以下皆再拜執樽罍篚者出諸祝與奄人櫝神主納於坎室如常儀訖祝版焚於齋所四品五品以下無櫝神主褒聖侯祀孔宣父廟及王公以下皆用此禮唯祝文别唐制三品以上祫享其廟禘享附前享五日筮於廟門之外齋及設位牲榜祭器省牲皆如時享之儀掌事者以樽坫入設於廟堂上皆於神座左昭座之樽在前楹間北向始祖及穆座之樽在戶外南向俱以近神為上皆加勺羃若始祖在曾祖以下則設樽依親廟之式其首座爵一餘座爵四各置於坫禘享其未毁廟之樽坫於前楹下各於室戶之東皆北向西上設祭器於序東西向每座簋在前簠次之鈃次之籩次之豆次之俎在後每座異之皆以南為上屈陳而下設洗於東階東南東西當東霤南北以堂深罍水在洗東加勺羃篚在洗西南肆實爵三巾二於篚加羃凡器皆濯而陳之執樽罍篚羃者各位於樽罍篚羃之後享日未明牽牲於厨夙興掌饌者實祭器特體折節所載及諸祭器所實如時享掌廟者設神座於朝堂之上自西序以東始祖座於西序東向昭座於始祖座東北南向穆座於東南北向俱西上若始封者仍在曽祖以下則空東南之座依昭穆南北設之每座皆有屏風几席設趺櫝如式禘又設未毁廟上名於其室如時享主人以下各服其服掌事者入實樽罍每室四樽一實醴齊為上一實盎齊次之元酒各實於上樽設元酒者古陳而不酌也祝版各置於坫諸祝與奄者入立於庭北面西上掌事者持腰輿從入立於東階下西面立定祝與奄者皆再拜訖帥腰輿升自東階詣始祖廟入開坎室出神主置於輿出詣座前以主置於座以次出神主如上儀訖還齋所夫人之主奄人奉出俱並西出處右禘又以次出毁廟主如上未毁廟主出置於室內之座如時享質明贊者引亞獻以下及子孫俱就門外位贊唱者先入就位諸祝與執樽罍者入立於庭北面西上立定贊唱者曰再拜各就位掌饌