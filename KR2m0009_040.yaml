body:
  text: 文獻通考卷四十鄱陽馬端臨貴與著學校考一太學王制有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊皆學名也異者四代相變或上西或上東或貴在國或貴在郊上庠右學太學也在西郊下庠左學小學也在國中王宫之東東序東膠亦太學在國中王宫之東西序虞庠亦小學西序在西郊周立小學於西郊國老謂卿大夫致仕者庶老謂士及庶人在官者飬國老者為太學飬庶老者為小學米廩有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也庠之為言詳也於以考禮詳事魯謂之米廩虞帝上孝令藏粢盛之委焉序次序王事也瞽宗樂師瞽矇之所宗也古者有道德者使教焉死則以為樂祖於此祭之頖之為言班也於此班政教也夏曰校殷曰序周曰庠學則三代共之校序庠皆鄉學學國學也共之無異名也禮書曰四代之學虞則上庠下庠夏則東序西序商則右學左學周則東膠虞庠而周則又有辟雍成均瞽宗之名則上庠東序右學東膠太學也故國老於之飬焉下庠西序左學虞庠小學也故庶老於之養焉記曰天子設四學蓋周之制也周之辟雍即成均也東膠即東序也瞽宗即右學也蓋以其明之以法和之以道則曰辟雍鄭氏釋王制謂辟明也雍和也所以明和天下毛氏釋詩謂水旋邱如璧以節觀者故曰辟雍孔頴逹曰禮注解其義詩注解其形以其成其虧均其過不及則曰成均以習射事則曰序以紏德行則曰膠以樂祖在焉則曰瞽宗以居右焉則曰右學蓋周之學成均居中其左東序其右瞽宗此太學也虞庠在國之西郊小學也記曰天子視學命有司行事祭先聖先師焉卒事遂適東序設三老五更之席又曰食三老五更於太學所以教諸侯之弟祀先賢於西學所以教諸侯之德夫天子視學則成均也命有司行事祭先聖先師焉即祀先賢於西學也祀先賢於西學則祭於瞽宗也有司卒事適東序設三老五更之席即養國老於東膠也養國老於東膠即食三老五更於太學也然則商之右學在周謂之西學亦謂之瞽宗夏之東序在周謂之東膠亦謂之太學蓋夏學上東而下西商學下右而上左周之所存特其上者耳則右學東序蓋與成均並建於一邱之上而已由是觀之成均頒學政右學祀樂祖東序養老更右學東序不特存其制而已又因其所上之方而位之也夫諸侯之學小學在內太學在外故王制言小學在公宫南之左太學在郊以其選士由內以升於外然後逹於京故也天子之學小學居外太學居內故文王世子言凡語於郊然後於成均取爵於上尊以其選士由外以升於內然後逹於朝故也江陵項氏松滋縣學記曰學制之可見於書者自五帝始其名曰成均説者曰以成性也然則有民斯可教有教斯可學自開闢則既然矣有虞氏始即學以藏粢而命之曰庠又曰米廩則自其孝養之心發之也夏后氏以射造士如行葦矍相之所言而命之曰序則以檢其行也商人以樂造士如夔與大司樂所言而命之曰學又曰瞽宗則以成其德也學之音則校校之義則教也蓋倣於商人先王之所以教者備矣周人修而兼用之內即近郊並建四學虞庠在其北夏序在其東商校在西當代之學居中南面而三學環之命之曰膠又曰辟雍郊言其地璧言其象皆古人假借字也其外亦以四學之制參而行之凡侯國皆立當代之學而損其制曰泮宫凡鄉皆立虞庠凡州皆立夏序凡黨皆立商校於是四代之學逹於天下夫人而習聞之故今百家所記參錯不同者無他皆即周制雜指而互言之也司徒修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗養耆老以致孝恤孤獨以逮不足上賢以崇德簡不肖以絀惡六禮冠昏喪祭卿相見七教父子兄弟夫婦君臣長幼朋友賔客八政飲食衣服事為異别度量數制命鄉簡不率教者以告耆老皆朝於庠元日習射上功習鄉上齒大司徒率國之俊士與執事焉朝猶會也此庠謂鄉學也鄉謂飲酒也將習禮以化之不變命國之右鄉簡不率教者移之左命國之左鄉簡不率教者移之右如初禮中年考校而又不變則使轉徙其居也不變移之郊如初禮郊鄉界之外不變移之遂逺郊之外如初禮不變屏之逺方終身不齒命鄉論秀士升之司徒曰選士移居於司徒也秀士鄉大夫所考有德行道藝者司徒論選士之秀者而升之學曰俊士可使習禮者學太學升於司徒者不征於鄉升於學者不征於司徒曰造士不征不給其徭役造成也能習禮則為成士正義云此徭役者供學及司徒細碎之徭役樂正崇四術立四教即詩書禮樂順先王詩書禮樂以造士春秋教之以禮樂冬夏教之以詩書王太子王子群后之太子卿大夫元士之適子國之俊選皆造焉凡入學以齒將出學小胥大胥小樂正簡不帥教者以告於大樂正大樂正以告於王此所簡者謂王太子王子群后之太子卿大夫元士之適子大胥小胥皆樂官屬也出學謂九年大成學止也王命三公九卿大夫元士皆入學不變王親視學亦習禮以化之不變王親臨重棄賢者子孫此習禮皆於大學也不變王三日不舉去食樂屏之逺方西方曰棘東方曰寄棘逼也逼寄於夷戎不屏於南北謂其太逺終身不齒禮書曰鄉簡不率教者至於四不變然後屏之小樂正簡國子之不帥教止於二不變則屏之者先王以匹庶之家為易治膏粱之性為難化以其易治故鄉遂之所考常在三年大比之時以其難化故國子之出學常在九年大成之後三年而考故必在於四不變然後屏之九年而簡則雖二不變屏之可也古之學政其輕者有觥撻其重者不過屏斥而已若夫萬民之不服教其附於刑者歸於士又曰秀於一鄉者謂之秀士中於所選謂之選士俊士以其德之敏也造士以其材之成也進士以其將進而用之也選士升於司徒而不征於鄉俊士升於學而不征於司徒俊士亦謂之造士蓋學至於此材成德敏非可一名命之也傳曰十人曰選百人曰俊此論其大致然也古之六卿其分職也未嘗不通其聨事也未嘗不分司徒掌邦教司馬掌邦政未嘗不分也有發則司徒教士以車甲升造士則司馬辨論官材未嘗不通也周官大司馬之屬司士曰以德詔爵此司馬辨論官材之謂也大樂正論造士之秀者以告於王而升諸司馬曰進士移名於司馬進士可進受爵祿也司馬辨論官材辨其論官其材觀其所長也論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之師氏掌以媺詔王媺音美掌國中失之事以教國子弟教之使識舊事中中禮者失失禮者凡國之貴遊子弟學焉保氏掌諌王惡而飬國子以道大司樂掌成均之法以治建國之學政而合國之子弟焉均調也樂師主調其音大司樂主受此成事以調之樂董仲舒云成均五帝之學凡有道者有德者使教焉死則以為樂祖祭於瞽宗祭於學宫中大胥掌學士之版以待致諸子學士謂卿大夫諸子學舞者版籍也今時鄉户籍世謂之户版大胥主此籍以待當召聚學舞者卿大夫之諸子則按此籍以召之春入學舍菜合舞秋頒學合聲春使之學秋頒其材藝所為合聲亦等其曲折使應節奏文王世子凡學户孝反教也世子及學士必時學士謂司徒論俊選所升於學者春夏學干戈秋冬學羽籥皆於東序干戈萬舞象武也用動作之時學之籥舞象文也用安靜之時以學之小樂正學干大胥贊之籥師學戈籥師丞贊之四人皆樂官之屬通職秋冬亦學以羽籥小樂正樂師也周禮樂師掌國學之政教國子小舞大胥所掌見上籥師掌教國子舞羽吹籥疏曰此經雜多有諸侯之禮故謂之大樂正小樂正也小舞即年幼小時教之舞其舞即帗舞羽舞皇舞旄舞干舞人舞也周禮唯有籥師此云籥師丞者或諸侯之禮或異代之法胥鼓南南南夷之樂胥掌以大樂之會正舞位旄人教夷樂則以鼓節之春誦夏弦大師詔之􅮊宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠誦謂歌樂也弦謂以絲播詩陽用事則學之以聲隂用事則學之以事因時順氣於功易也周立三代之學學書於有虞氏之學典謨之教所由興也學舞於夏后氏之學文武中也學禮樂於殷之學功成治定與已同也凡祭與飬老乞言合語之禮皆小樂正詔之於東序學以三者之威儀也合語謂鄉射鄉飲酒大射燕射之屬也鄉射義曰古者於旅也語云疏曰合語謂合會義理而語説詩楚茨論祭祀之事笑語卒獲箋云古者於旅也語是祭有合語也養老既乞言自然合語也周立三代之學三代學皆立大學小學今按下飬老於東序是周之大學夏之東序也又王制之飬老於虞庠是周之小學為虞庠也大樂正學舞干戚語説命乞言皆大樂正授數學以三者之義也戚斧也語説合語之説數篇數篇疏云謂大樂正授世子及學士等章之數為之講説使知義理大司成論説在東序論説課其義之深淺才能優劣此云樂正司業父師司成則大司成司徒之屬師氏也凡侍坐於大司成者逺近間三席可以問間猶容也容三席則得指畫相分别也席之為制廣三尺三寸三分則是所謂函丈也終則負墻卻就後席相避列事未盡不問錯尊者之語不敬也樂書曰王制之教造士春秋以禮樂冬夏以詩書文王世子之教世子春夏以干戈秋冬以羽籥者升於學者之造士則其才向於有成其教之也易故先其難者而以詩書後於禮樂貴驕之世子則其性誘於外物其教之也難故先其易者而以干戈羽籥後於禮樂詩書周官師氏教國子在司徒教民之後記言教國之子弟在鄉遂之後其教之難易蓋可見矣然王制主於教造士而王太子王子羣后之太子卿大夫元士之適子亦預焉文王世子主於教世子而國之學士亦及焉特其所主者異教之所施有先後爾凡語於郊者語謂論説於郊學郊疏曰郊西郊也周以虞庠為小學在西天子親視學而考課論説也必取賢斂才焉或以德進或以事舉或以言揚大樂正論造士之秀者升諸司馬曰進士謂此矣曲藝皆誓之曲藝小技能誓謹也皆使謹習其事以待又語又語謂後復論説也待疏令待後復論説之日如春秋時也三而一有焉三説之中有一善則中之以有曲藝不必盡善乃進其等進於衆學者等輩以其序又以其藝為次謂之郊人逺之候事官之缺者以代之逺之者不曰俊選曰郊人賤技藝疏謂之郊人以其猶在郊學也於成均以及取爵於上尊也天子飲酒於虞庠則郊人亦得酌於上尊以相旅尚書大傳使公卿之太子大夫元士之適子十有三年始入小學見小節焉踐小義焉二十入大學見大節焉踐大義焉故入小學知父子之道長幼之序入大學知君臣之義上下之位故為君則君為臣則臣為父則父為子則子程子曰古者八嵗入小學十五入大學擇其才之可教者聚之不肖者復之農畝蓋士農不易業既入學則不治農然後士農判古之學者自十五入學至四十方仕中間自有二十五年學又無利可趨則所志可知須去趨善便自此成德後之人自童稚間已有汲汲趨利之意何由得向善其古人必使四十而仕然後志定只營衣食却無害惟利祿之誘最害人朱子大學章句序曰人生八嵗則自王公以下至於庶人之子弟皆入小學而教之以灑掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心修已治人之道此又學校之教大小之節所以分也按八嵗入小學十五入大學大戴禮保傅傳及白虎通之説十三年入小學二十入大學尚書大傳之説程朱二子從保傅白虎通又按注云十五年入小學十八入大學者謂諸子姓既成者至十五入小學其早成者十八入大學內則曰十年出就外傅居宿於外學書計者謂公卿以下教子於家也今以諸書所載及此注詳之則保傅及白虎通所言八嵗入小學者乃天子世子之禮所謂小學則在師氏虎門之左大學則在王宫之東亦皆天子之學也尚書大傳所言十三年入小學乃公卿大夫元士適子之禮蓋公卿已下之子弟年方童幼未應便入天子之學所以十年出就外傅且學於家孰直至十五方令入師氏所掌虎門小學而天子則别無私學所以世子八嵗便入小學歟王制天子曰辟雍辟明也雍和也所以明和天下詩靈臺虡業維樅賁鼓維鏞於論鼓鐘於樂辟雍於論鼓鐘於樂辟雍鼉鼓逄逄矇瞍奏公植者曰虡橫者曰栒業大板也樅崇牙也賁大鼓鏞大鐘論之言倫也言得其倫理水旋邱如璧曰辟雍以節觀者逄逄和也有眸子而無見曰矇無眸子曰瞍公事也朱子曰王制論學曰天子曰辟雍諸侯曰泮宫説者以為辟雍大射行禮之處也水旋邱如璧以節觀者泮宫諸侯鄉射之宫也其水半之蓋東西門以南通水北無也故振鷺之詩曰振鷺於飛於彼西雍説者以雍為澤蓋即旋邱之水而其學即所謂澤宫也蓋古人之學與今日不同孟子所謂序者射也則學蓋有以射為主者矣蘇氏引莊子言文王有辟雍之樂遂以辟雍亦為學名而曰古人以學教胄子則未知學以樂而得名歟樂以學而得名歟則是又以為習樂之所也張子亦曰辟雍古無此名其制蓋始於此故周有天下遂以名天子之學而諸侯不得立焉記所謂魯人將有事於上帝必先有事於泮宫者蓋射以擇士云爾東萊吕氏曰或疑是詩敘臺池苑囿與民同樂胡為以辟雍學校勦入之彼蓋未嘗深考三代人君與士大夫甚親遊宴之􅉏御征行之扈衛無往而不與髦俊俱焉樂正司業父師司成則樂者固學士之所常𨽻也夫豈有二事哉文王有聲鎬京辟雍自西自東自南自北無思不服皇王蒸哉張氏曰靈臺辟雍文王之學也辟雍之在鎬京者武王之學也辟雍至此始為天子之學江陵項氏枝江縣新學記曰古者周天子之居民也不但天子諸侯之國自二十五家以上則有學焉學莫尚於斯矣方是時建官三百六十以張備法而紀衆民視其中無一事無法者而獨於建學無制則其吏非應文也無一民無飬者而獨無粟士之廪則其士非為飬也而上下顧交趨之如裘葛飲食然則必有不可捨焉者矣天子之學謂之辟雍班朝布令享帝右祖則以為明堂同律候氣治歷考祥則以為靈臺諸侯之學謂之泮宫大師旅則將士會焉大獄訟則吏民期焉大祭祀則始祖享焉蓋其制皆於國之勝地披水築宫為一大有司國有大事則以禮屬百官群吏下民而講行之無事則國之耆老子弟遊焉以論鼓鐘而修孝弟其地尊其禮大三百六十官皆不得治其事意者三公之老而致仕者掌之謂之鄉老二鄉而公一人則六鄉蓋三公矣故曰三公在朝三老在學公與老皆無職於六官學序庠孰皆無制於六典古之言道者固如是也嗚呼此意深矣漢興髙帝尚有干戈平定四海未遑庠序之事至武帝始興太學徐氏曰按三輔黃圖太學在長安西北七里有市有獄董仲舒對䇿曰養士莫大乎太學太學者賢士之所關也教化之本原也今以一郡一國之衆對亡應書者謂舉賢良文學之詔書也是王道往往而絶也臣願陛下興太學置明師以飬天下之士數考問以盡其材則英俊宜可得矣後武帝立學校之官皆自仲舒發之元朔五年置博士弟子員前此博士雖各以經授徒而無考察試用之法至是官始為置弟子員即武帝所謂興太學也太史公曰余讀功令名見後至於廣厲學官之路未嘗不廢書而歎也曰嗟乎周室衰而關雎作韓詩説也幽厲微而禮樂壞諸侯恣行政由強國故孔子憫王路廢而邪道興於是論次詩書修起禮樂世以渾濁莫能用是以仲尼干七十君無所遇西狩獲麟曰吾道窮矣故因史記作春秋以當王法其辭微而指博後世學者多録焉自孔子卒後七十子之徒散遊諸侯大者為師傅卿相小者友教士大夫或隱而不見故子路居衛子張居陳淡臺子羽居楚子夏居西河子貢終於齊如田子方假干木吳起禽滑釐之屬皆受業於子夏之倫為王者師是時獨文侯好學陵遲以至於始皇天下並爭於戰國儒術既絀焉然齊魯之間學者獨不廢也於威宣之際孟子荀卿之列咸遵夫子之業而潤色之以學顯於當世及至秦季世焚詩書坑儒士六藝從此缺矣陳涉起匹夫不滿半嵗竟滅亡其事至微淺然而搢紳先生之徒負孔子禮器往委質為臣孔甲為涉博士者何也以秦焚其業積怨而發憤於陳王也及髙皇帝誅項籍舉兵圍魯魯中諸儒尚講誦習禮樂弦歌之聲不絶豈非聖人之遺化好禮樂之國哉夫齊魯之間於文學自古以來其天性也故漢興然後諸儒始得修其經藝講習大射鄉飲之禮叔孫通作漢禮儀因為太常諸生弟子共定者咸為選首於是喟然歎興於學然尚有干戈平定四海亦未遑暇庠序之事也孝惠吕后時公卿皆武力有功之臣孝文時頗徴用然本好刑名之言及至孝景不任儒者而竇太后又好黃老之術故諸博士具官待問未有進者及今上即位公孫𢎞以春秋白衣為天子三公自孔子後公孫𢎞始以儒者得政天下學士靡然嚮風矣公孫𢎞為學官悼道之鬱滯乃請曰丞相御史言制曰蓋聞導民以禮風之以樂婚姻者居室之大倫是時論學者尚知本如此今禮廢樂崩朕甚憫焉故詳延天下方正博聞之士太常議與博士弟子崇鄉里之化以廣賢材焉此武帝制也而其建請之議條畫之目則公孫丞相實發之謹與太常臧博士平臧孔臧平博士之長也博士太常之屬等議曰聞三代之道鄉里有教夏曰校殷曰序周曰庠其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始由內以及外今陛下昭至德開大明配天地本人倫勸學修禮崇化厲賢以風四方太平之原也古者政教未洽不備其禮請因舊官而興焉舊官為博士舊授徒之黌舍也至是官置弟子員來者既衆故因舊黌舍而興修之為博士官置弟子五十人復其身太常擇民年十八已上儀狀端正者補博士弟子此太常所補也詔書既曰崇鄉里之化則太常所補弟子不過取諸關中而已郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞者令相長丞上屬所二千石二千石謹察可者當與計偕詣太常得受業如弟子此郡國所擇也自好文學已下條目甚詳而太常弟子止取儀狀端正者蓋太常天子近臣常以儒宗為之任其選擇不必立法也一嵗皆輒試太常所補郡國所擇雖有兩途至於受業一年而後試則考察無二法也能通一藝以上補文學掌故缺鼂錯以文學為太常掌故應劭曰掌故六百石吏主故事按博士秩比六百不應掌故秩反過之蓋應劭之誤其髙第可以為郎中者太常籍奏郎中宿衛之臣故具名籍以待上選也即有秀才異等輒以名聞非常選也其不事學若下材及不能通一藝輒罷之而請諸不稱者罰諸不稱者謂太常之謬選博士之失教及郡國之濫以充賦也臣謹按詔書律令下者明天人分際通古今之義文章爾雅訓辭深厚恩施甚美小吏淺聞不能究宣無以名布諭下欲為學者開入仕之路故以宣布詔書為名與三代賔興之意異矣此俗儒之所喜而髙士所不屑也治禮掌故以文學禮義為官遷留滯請選擇其秩比二百石以上及吏百石通一藝以上補左右內史大行卒史左內史後為左馮翊右內史後為京兆尹右扶風大行後為大鴻臚比百石以下補郡太守卒史皆各二人邊郡一人先用誦多者若不足乃擇掌故補中二千石屬掌故尊於文學掌故即前所謂秩比二百石以上者也中二千石屬即左右內史大行卒史也大行中二千石左右內史雖二千石亦通言之也文學掌故補郡屬文學掌故即博士弟子通一藝所補也郡屬即郡太守卒史也備員既無誦多者故選掌故彼善於此者以充數請著功令新立此條請以著於功令功令篇名若今選舉令他如律令此外並如舊律令制曰可自此以來則公卿大夫士彬彬多文學之士矣公卿多文學之士而治效反少於前日此太史公所歎也先公曰按漢書此條有博士弟子通一藝以上者補文學掌故缺又有吏百石通一藝以上者補卒史恐是兩樣人溫公通鑑析為二端東萊大事記殊未明武帝崇儒興學只是好名當時文學布在州郡極留滯故𢎞請選用之為學官而復補卒史及郡國備員意輕可知竊詳此假自太常擇民年十八以下至請諸不稱是指白身受業而通一藝者自擇其秩比二百石至補郡屬備員是指已仕受業而通一藝者然白身通藝者可以為郎中則其官反髙郎中秩比三百石已仕通藝者只可為左右內史太守卒史則其位反卑佐史秩百石以下殊不可曉考訂精詳者必能知之按西漢公卿百官表博士秦官掌通古今秦焚詩書獨存博士官所職者則猶令其司經籍然既曰通古今則上必有所師承下必有所傳授故其徒實繁秦雖存其官而甚惡其徒常設法誅滅之始皇使御史案問諸生傳相告引至殺四百六十餘人又令冬種瓜驪山實生命博士諸生就視為伏機殺七百餘人二世時又以陳勝起召博士諸生議坐以非所宜言者又數十人然則秦之於博士弟子非惟不能考察試用之蓋惟恐其不澌盡泯沒矣叔孫通面諛脫虎口而逃亡孔甲持禮器發憤而事陳涉有以也哉儒林傳自武帝立五經博士開弟子員設科射䇿勸以官祿師古曰射䇿者謂為問難疑義書之於䇿量其大小置為甲乙之科列而置之不使彰顯有欲射者隨其所取而釋之以知優劣射之言投射也按此即後世糊名之意但糊名則是隱舉人之名以防囑托徇私此則似是隱問難之條以防假手宿搆其欲示公一也張湯請博士弟子治尚書春秋補廷尉史按湯本傳上方鄉文學湯決大獄欲傅古義乃請博士弟子治尚書春秋補廷尉史湯雖文深意忌不専平然得此聲譽而深刻吏多為爪牙用者依於文學之士丞相𢎞數稱其美夫尚書春秋所言豈有舞文巧詆慘酷深刻如湯之為乎今以上鄉文學而令博士弟子以其所學附會緣飾之則所謂廷尉卒史者往往皆曲學阿世如公孫丞相之流耳狄山以博士稍持正論抗湯則觸禍機矣賈山所謂士修之於家而壞之於天子之廷此語當為武帝發孝文則未嘗壞天下士也昭帝舉賢良文學增博士弟子員滿百人宣帝末增倍之元帝好儒能通一經者皆復數年以用度不足更為設員千人郡國置五經百石卒史成帝末或言孔子布衣養徒三千人今天子太學弟子少於是增弟子員三千人嵗餘復如故先公曰西漢博士𨽻太常有周成均𨽻宗伯之意州有博士郡有文學掾五經之師儒宫之官長吏辟置布列郡國亦有黨庠遂序之意然有二失鄉里學校人不升於太學而補弟子員者自一項人好文學敬長上儀狀端正公卿弟子不飬於太學而任子盡𨽻光祿勳自有四科考試殊塗異方下之心術分裂不一上之考察馳騖不精哀帝時置博士弟子父母死豫寧三年謂處家持喪服按學校禮義之地博士弟子公卿之儲則親喪而子寧持服宜也然漢時居官者實未嘗行喪禮薛宣後母死弟修去官持服宣謂修三年喪少能行者由是兄弟不和翟方進母死既葬三十六日起視事自以為身備漢相不敢踰國家之制注即文帝遺詔所謂也宣方進皆為相封侯猶不能捨去祿位躬行三年之喪而乃欲立此法以律從學干祿之士乎陽朔二年詔曰古之立太學將以傳先王之業流化於天下也儒林之官四海淵源宜皆明於古今溫故知新通逹國體故謂之博士否則學者無述焉為下所輕非所以尊道德也工欲善其事必先利其器丞相御史其與中二千石二千石雜舉可充博士位者使卓然可觀平帝時王莽秉政增元士之子得受業如弟子勿以為員常員之外更開此路嵗課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故云奏起明堂辟雍靈臺為學者築舍萬區班固儒林傳贊自武帝立五經博士開弟子員設科射䇿勸以官祿訖於元始百有餘年傳業者寖盛枝葉蕃滋一經説至百餘萬言大師衆至千餘人蓋利祿之路然辟雍武帝封泰山還登明堂兒寬上夀曰間者聖統廢絶陛下發憤祖立明堂辟雍河間獻王來朝獻雅樂對三雍宫注三雍明堂辟雍靈臺也成帝時犍為郡於水濱得古磬十六枚劉向因是説上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖遜之容以風化天下成帝以向言下公卿議會向病卒丞相大司空奏請立辟雍案行長安城南營表未作遭成帝崩群臣引以定諡及王莽為宰衡欲耀衆庶遂興辟雍因以篡位按據此説則辟雍王莽時方立之武帝置博士弟子員不過令其授學而擇其通藝上第者擢用之未嘗築宫以居之也然考兒寬所言與河間獻王對三雍宫之事則似已立於武帝之時何也蓋古者明堂辟雍共為一所蔡雍明堂論曰取其宗祀之清貌則曰清廟取其正室之貌則曰太廟取其尊崇則曰太室取其堂則曰明堂取其四門之學則曰太學取其四面周水圓如璧則曰辟雍異名而同事武帝時封泰山濟南人公玉帶上黃帝時明堂圗明堂中有一殿四面無壁以茅蓋通水水圜宫垣為復道上有樓從西北入名曰崑崙天子從之以入拜祀上帝於是上令奉髙作明堂汶上如帶圗修封時以祠太一五帝蓋兒寬時為御史大夫從祠東封還登明堂上夀所言如此則所指者疑此明堂耳意河間獻王所對之地亦是其處非養士之辟雍也班固漢書武帝贊有興太學之説然董仲舒傳只言後武帝立學校之官皆自仲舒發之明元未嘗有庠序也至成帝時劉向所言則専為庠序而設然班固禮樂志言世祖受命中興乃立明堂辟雍顯宗即位躬行其禮宗祀光武皇帝於明堂飬三老五更於辟雍威儀既盛美矣然德化未流洽者禮樂未興群下無所從説而庠序尚未設之故也則知東都亦未嘗以辟雍為庠序然世祖建武五年已立太學而固之時尚言庠序未設何邪當考又按徐天麟西漢會要言三輔黃圗漢辟雍在長安西北七里恐即王莽所立又言太學亦在長安西北七里有市有獄豈即辟雍邪或别一所邪鮑宣得罪下獄博士弟子王咸舉幡太學下曰欲救鮑司𨽻者集此下諸生會者千餘人此亦西都已立太學之一證當考西漢以博士入官賈誼吳公薦為博士董仲舒疏廣薛廣德彭宣貢禹韋賢夏侯勝轅固后蒼韓嬰胡毋生嚴彭祖江公以太常掌故入官鼂錯以文學充以博士弟子入官息夫躬兒寬終軍朱雲眭𢎞明經蕭望之射䇿甲科匡衡射䇿甲科馬宫射䇿甲科翟方進射䇿甲科何武射䇿甲科王嘉射䇿甲科施讎房鳳射䇿乙科召信臣射䇿甲科世祖建武五年十月營起太學車駕幸太學賜博士弟子各有差洛陽記太學在洛陽城南開陽門外去宫八里講堂長十丈廣二丈堂前石經四部服方領習矩步者委蛇乎其中光武中興先訪儒雅四方學士雲會京師於是立五經博士各以其法教授凡十四博士太常差次總領焉十四博士謂易有施孟梁邱京氏尚書歐陽大小夏侯詩齊魯韓禮大小戴春秋嚴顔太僕朱浮以國學既興宜廣博士之選乃上書曰夫太學禮義之官教化所興博士之官為天下宗師使孔聖之言傳而不絶舊事䇿試博士必廣求詳選爰自畿夏延及四方伏聞詔書更試五人唯取見在洛陽城者臣恐自今以往將有所失求之密邇容或未盡而四方之學無所勸樂凡䇿試之本貴得其真非有期會不及逺方也及諸所召試皆私自發遣非有傷費煩擾於事也語曰中國失禮求之於野臣浮幸得與講圗讖故敢越職帝然之東漢之制太常卿每選士博士奏其能否建武中太常選試博士四人陳元為第一張元舉孝亷為郎會顔氏博士缺元䇿試第一拜為博士蔡茂試博士對䇿陳災異以髙等擢拜議郎楊仁舉孝亷除郎太常上仁經中博士仁自以年未五十不應舊科上府遜選漢官儀博士限年五十以上按西京博士但以名流為之無選試之法中興以來始試而後用蓋既欲其為人之師範則不容不先試其能否也博士舉狀曰生事愛敬喪沒如禮通易尚書孝經論語兼綜載籍窮微闡奧隱居樂道不求聞逹身無金痍痼疾三十六屬不與妖惡交通王侯賞賜行應四科經任博士下言某官某甲保舉十九年車駕幸太學會諸博士論難於前桓榮被服儒衣溫恭有醖藉辨明經義每以禮遜相厭不以辭長勝人儒者莫及特加賞賜又詔諸生雅吹擊磬盡日乃罷中元元年初營明堂辟雍靈臺未用事明帝永平二年臨辟雍初行大射禮光武始建三雍明帝即位親行其禮天子始冠通天衣日月備法物之駕盛清道之儀坐明堂而朝群后登靈臺以望雲物袒割辟雍之上尊飬三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶搢紳之人圜橋門而觀聼者蓋億萬計其後復為功臣子孫四姓未屬别立校舍搜選髙能以受其業自期門羽林之士悉令通孝經章句胸奴亦遣子入學濟濟乎洋洋乎盛於永平矣蔡雍明堂論曰明堂者天子太廟所以崇禮其祖以配上帝者也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰明堂西曰總章北曰元堂中曰太室易曰離也者明也南方之卦也聖人南面而聼天下向明而治人君之位莫正於此焉故雖有五名而主以明堂也其中正焉皆曰太廟謹承天隨時之令昭令德宗祀之禮明前功百辟之勞起尊老敬長之義顯教幼誨稚之學朝諸侯選造士於其中以制度生者乘其能而至死者論其功而祭故為大教之官而四學具焉官司備焉譬如北辰居其所而衆星拱之萬象翼之教之所由生専受作之所自來明一統也故言明堂事之大義之深也取其宗祀之清貌則曰清廟取其正室之貌則曰太廟取其尊崇則曰太室取其堂則曰明堂取其四門之學則曰太學取其四面周水圎如璧則曰辟雍異名而同事其實一也春秋因魯取宋之姦賂則顯之太廟以明聖王建清廟明堂之義經曰取郜大鼎於宋納於太廟傳曰非禮也君人者將昭德塞違故昭令德以示子孫是以清廟茅屋昭其儉也夫德儉而有度升降有數文物以紀之聲明以發之以臨照百官百官於是戒懼而不敢易紀律所以大明教也以周清廟論曰魯太廟皆明堂也魯禘祀周公於太廟明堂猶周宗祀文王於清廟明堂也禮記檀弓曰王齋禘於清廟明堂也孝經曰宗祀文王於明堂禮記明堂位曰太廟天子曰明堂又曰成王幼弱周公踐天子位以治天下朝諸侯於明堂制禮作樂頒度量而天下大服成王以周公為有勳勞於天下命魯公世世禘祀周公於太廟以天子禮樂升歌清廟下管象舞所以異魯於天下取周清廟之歌歌於魯太廟明堂魯之廟猶周清廟也皆所以昭文王周公之德以示子孫者也易傳太初篇曰天子旦入東學晝入南學暮入西學在中央曰太學天子之所自學也禮記保傅篇曰帝入東學上親而貴仁入西學上賢而貴德入南學上齒而貴信入北學上貴而尊爵入太學承師而問道與易傳同魏文侯孝經傳曰太學者中學明堂之位也禮記古大明堂之禮曰膳夫是相禮日中出南闈見九侯門子日側出西闈視五國之事日暗出北闈視帝節猶爾雅曰宫中之門謂之闈王居明堂之禮又别隂陽門南門稱門西門稱闈故周官有門闈之學師氏教以三德守王門保氏教以六藝守王闈然則師氏居東門南門保氏居西門北門也知掌教國子與易傳保傅王居明堂之禮參相發明為四學焉文王世子篇曰凡大合樂則遂飬老天子至乃命有司行事興秩節祭先師先聖焉始之飬也適東序釋奠於先老遂設三老位焉春夏學干戈秋冬學羽籥皆於東序凡祭與飬老乞言合語之禮皆小樂正詔之於東序又曰大司成論説在東序然則詔學皆在東序東序東之堂也學者詔焉故稱太學仲夏之月令祀百辟卿士之有德於民者禮記太學志曰禮士大夫學於聖人善人祭於明堂其無位者祭於太學禮記昭穆篇曰祀先賢於西學所以教諸侯之德也即所以顯行國禮之處也太學明堂之東序也皆在明堂辟雍之內月令記曰明堂者所以明天氣統萬物明堂上通於天象日辰故下十二宫象日辰也水環四周言王者動作法天地德廣及四海方此水也名曰辟雍王制曰天子出征執有罪反舍奠於學以訊馘告樂記曰武王伐殷為俘馘於京太室詩魯頌云矯矯虎臣在泮獻馘京鎬京也太室辟雍之中明堂太室也與諸侯泮宫俱獻馘焉即王制所謂以訊馘告也禮記曰祀乎明堂所以教諸侯之孝也孝經曰孝悌之至通於神明光於四海無所不通詩云自西自東自南自北無思不服言行孝者則曰明堂行悌者則曰太學故孝經合以為一義而稱鎬京之詩以明之凡此皆明堂太室辟雍太學事通合之義也其制度數各有所法堂方百四十四尺坤之䇿也屋圎屋徑二百一十六尺乾之䇿也太廟明堂方三十六丈通天屋徑九丈隂陽九六之變且圎蓋方載六九之道也八闥以象八卦九室以象九州十二宫以應辰三十六户七十二牖以四户八牖乘九室之數也户皆外設而不閉示天下不藏也通天屋髙八十一尺黃鍾九九之實也二十八柱列於四方亦七宿之象也堂髙三丈亦應三統四鄉五色者象其行外廣二十四丈應一嵗二十四氣四周以水象四海王者之大禮也按如蔡雍之説則古者明堂辟雍太學太廟合為一所以朝以祭以教以饗以射皆於其地東漢時辟雍以為天子飬老大射行禮之所太學以為博士弟子授業之所析為二處與古異要之太學與辟雍固不可析為二處飬老大射其與傳道授業亦豈二事哉班固辟雍詩乃流辟雍辟雍湯湯聖皇蒞止造舟為梁皤皤國老乃父乃兄抑抑威儀孝友光明致堂胡氏曰明帝幸辟雍遣使者安車迎三老五更於太學詳此禮則知東京太學與辟雍相去亦非近地蓋漢世辟雍不為飬士之所顯宗以迎老更而至焉非此時也則黌宇之設遂虗之邪商周在先代之學故記言飬國老於某庠飬庶老於某序且食三老五更於太學矣不應以為未足又建辟雍也永平九年為四姓小侯開立學校置五經師四姓為外戚樊氏郭氏隂氏馬氏諸子弟以非列侯故曰小侯安帝元初六年鄧太后召和帝弟濟北河間王子男女年五嵗以上四十餘人又鄧氏近親子孫三十餘人並為開邸第教學經書躬自監試尚幼者使置師保朝夕入宫撫循詔導恩愛甚渥肅宗建初中大會諸儒於白虎觀考詳同異連月乃罷帝親臨稱制如石渠故事顧命史臣著為通義又詔髙才生受古文尚書毛詩榖梁左氏春秋雖不立學官然皆擢髙第為講郎給事近署所以網羅逸軼博存衆家和帝永元十二年賜博士弟子員在太學者布人三匹司徒徐防上疏以為漢立博士十有四家設甲乙之科以勸勉伏見太學試博士弟子皆以意説不修家法臣以為博士及甲乙䇿試宜從其家章句開五十難以試之解釋多者為上第引文明者為髙説若不依先師義有相伐者皆正以為非上從之和帝亦數幸東觀覽閲書林及鄧后稱制學者頗懈時樊凖徐防並陳敦學之宜又言儒職多非其人於是制詔公卿妙簡其選三署郎能通經術者皆得察舉順帝永建六年繕太學更開拓房室將作大匠翟酺言孝文皇帝始置一經博士武帝大合天下之書而孝宣論六經於石渠學者滋盛弟子萬數光武初興愍其荒廢起太學博士舍內外講堂諸生橫巷為海內所集明帝時辟雍始成欲毁太學太尉趙熹以為太學辟雍皆宜兼存故並傳至今而項者頽廢至為園採芻牧之處宜更修繕誘進後學帝從之學者為酺立碑銘於學陽嘉元年以太學新成試明經下第者補弟子增甲乙科員各十人除郡國耆儒九十人補郎舍人左雄又奏召海內名儒為博士使公卿子弟為諸生有志操者加其俸祿及汝南謝亷河南趙建年始十二各能通經雄並奏拜童子郎於是負書來學雲集京師前漢成帝末嵗課甲科四十人乙科二十人今各增十人則甲科五十人乙科三十人并丙科二十人為一百人自安帝覽政薄於藝文博士倚席不講朋徒相視怠散學舍頽敝順帝感翟酺之言更修黌舍凡所造構二百四十房千八百五十室質帝本初元年令郡國學明經年五十以上七十以下詣太學自大將軍至六百石皆遣子受業嵗滿課試以髙第五人補郎中次五人太子舍人又千石六百石四府掾屬三署郎四姓小侯先能通經者各令隨家法其髙第者上名牒以次賞進梁太后詔令大將軍以下悉遣子入學每嵗輒於鄉射月一饗會之以此為常漢官儀曰春三月秋九月習鄉射禮禮生皆使太學學生自是遊學增盛至三萬餘生然章句漸疏而多以浮華相尚儒者之風蓋衰矣桓帝延熹五年太學西門自壞襄楷上疏曰太學天子教化之宫其門無故自壞者言文德將喪教化廢也時甘陵有南北部黨人之譏汝南南陽又有畫諾坐嘯之謡因此流言轉入太學諸生三萬餘人郭林宗賈偉節為之冠並與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏強禦陳仲舉天下俊秀王叔茂又渤海公族進階公族姓也名進階扶風魏齊卿並危言深論不隱豪強自公卿以下莫不畏其貶議屣履到門牢修乃上書誣告膺等養太學遊士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗天子震怒下郡國捕黨人布告天下使同忿疾收執膺等辭所連及陳實之徒二百餘人書名三府禁錮終身自是正直廢放邪枉熾結海內希風之徒遂共相標榜指天下名士為之稱號上曰三君次曰八俊曰八顧曰八及曰八厨猶古之八元八愷也東坡蘇氏南安軍之學記曰學莫盛於東漢士數萬人噓枯吹生自三公九卿皆折節下之三府辟召常出其口其取士議政可謂近古然卒為黨錮之禍何也曰此王政也王者不作士自以其私意行之於下其禍敗固宜建和初詔諸學生年六十以上比郡國明經試次第上名髙第十五人上第十六人為中郎中第十七人為太子舍人下第十七人為王家郎永夀二年詔復課試諸生補郎舍人其後復制學生滿二嵗試通二經者補文學掌故其不能通二經者須後試復隨輩試之通二經者亦得為文學掌故其已為文學掌故者滿二嵗試能通三經者擢其髙第為太子舍人其不得第者後試復隨輩試第復髙者亦得為太子舍人已為太子舍人滿二嵗試能通四經者推其髙第為郎中其不得第者後試復隨輩試第復髙者亦得為郎中滿二嵗試能通五經者推其髙第補吏隨才而用其不得第者後試復隨輩試第復髙者亦得補吏其後綱紀隳紊凡所選用莫非情故乃立三互法詳見舉官門靈帝熹平四年試太學生年六十以上百餘人除郎中太子舍人至王家郎郡國文學吏黨人既誅其髙名善士多坐流廢諸博士試甲乙科爭第髙下更相告訟亦有私行金貨定蘭臺􅃮書經字以合其私文熹平四年靈帝乃詔諸儒正定五經刋於石碑為古文篆隸三體書法以相參檢樹之學門古文謂孔子壁中書篆書秦始皇使程邈所作𨽻書亦程邈所獻主於徒𨽻從簡易也鴻都門學初靈帝好學自造皇羲篇五十章因引諸生能為文賦者本頗以經術相招後諸為尺牘及工書鳥篆者皆加引召遂至數十人侍中祭酒樂松賈護多引無行趨勢之徒並待制鴻都門下喜陳方俗閭里小事帝甚悅之待以不次之位蔡雍上封事言古者取士必使諸侯嵗貢孝武之時郡舉孝亷又有賢良文學之選於是名臣輩出文武並興漢之得人數路而已夫書畫辭賦才之小者康國理政未有其能陛下即位之初先涉經術聼政餘日觀省篇章聊以遊意當代博奕非以教化取士之本而諸生競利作者鼎沸其髙者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次録第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守奉祿於義巳𢎞不可復使理人及仕州郡昔孝宣會諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致逺則泥君子故當志其大者光和元年遂置鴻都門學畫孔子及七十二弟子像其諸生皆敕州郡三公舉用辟召或出為刺史太守入為尚書侍中乃有封侯賜爵者士君子皆恥與為列焉後又詔中尚方為鴻都文學樂松江覽等三十二人圗像立贊以勸學者尚書陽球奏曰臣聞傳曰君舉必書書而不法後嗣何觀按松覽等皆出於微篾斗筲小人依慿世戚附託權豪俯眉承睫徼進明時或獻賦一篇或鳥篆盈簡而位升郎中形圖丹青亦有筆不點牘辭不辨心假手請字妖偽百品莫不被蒙殊恩蟬蛻滓濁是以有識掩口天下嗟歎臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞孺子小人詐作文頌而可妄竊天官垂象圗素者也今太學東觀足以宣明聖化願罷鴻都之選以消天下之謗書奏不省先公曰鴻都門漢宫門也太子保之廢來歷與九卿朝臣俱詣鴻都門證太子無過即其所也太學公學也鴻都學私學也學乃天下公而以為人主私可乎是以士君子之欲與為列者則以為恥公卿州郡之舉辟也必敕書強之人心之公豈可誣也雖然有所由然也在昔明帝之朝幸辟雍辨説講白虎觀稱制臨決也先儒戴氏論曰天下是非析於理不析於勢君子論學無庸於挾貴為也天子之尊群臣承望不及是是非非豈能盡斷於天下之理乎明章皆崇儒重道之君也尊禮師傅是正經義豈不盡善盡美哉明帝臨幸辟雍自為辨説已失人君之體矣章帝患五經同異博集諸儒會議白虎觀天子稱制臨決去聖久逺六經殘闕諸儒論難前後異説而欲以天子之尊臨定是非於一言之間難矣哉鴻都之興蔡雍言之以為章帝白虎釋義其事優大彼靈帝之童心稚識何足語此愚謂啓帝之私心者往往自白虎觀之稱制臨決始按靈帝之鴻都門學即西都孝武時待詔金馬門之比也然武帝時雖文學如司馬遷相如枚臯東方朔輩亦俱以俳優畜之固未嘗任以要職而靈帝時鴻都門學之士至有封侯賜爵者士君子皆恥與為列則其人品可知然當時太學諸生三萬餘人其持危言核論以激濁揚清自負者誅戮禁錮殆靡孑遺而其在學授業者至爭第更相告訟無復亷恥且當時在仕路者上自公卿下至孝亷茂材皆西園諧價獻修宫錢之人矣於鴻都學士乎何誅獻帝初平四年九月試儒生四十餘人上第即位郎中次太子舍人下第者罷之詔曰孔子歎學之不講不講則所識日忘今耆儒年踰六十去離本土營求糧資不得事業結童入學白首空歸長委農野永絶榮望朕甚憫焉其依科罷者聼為太子舍人時長安中為之謡日頭白皎然食不充糧裹衣褰裳當還故鄉聖主愍念悉用補郎舍是布衣被服玄黃十月太學行禮車駕幸永福城門臨觀其儀賜博士以下各有差先公曰試士科選也觀禮文字也天下承平行之可也是時姦凶亂朝殺戮宰輔諸侯據地戕虐王臣盜賊未平道路不通國家岌岌有危亡之形而獻帝方為此舉何其不知務漢祚至此時已如日薄桑榆如人迫耄荒乃不自哀而哀耆儒之不遇邪東漢以博士入官蔡茂承宫郎顗曹褒盧植戴慿歐陽歙牟長楊倫魏應文獻通考卷四十
