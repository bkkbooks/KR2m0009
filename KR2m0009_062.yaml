body:
  text: 文獻通考卷六十二鄱陽馬端臨貴與著職官考十六制置使唐宣宗大中五年以白敏中充招討党項行營都統制置等使制置使之名始此宋朝不常置掌經畫邉鄙軍旅之事政和中熈秦用兵以内侍童貫爲之宣和末姚古為京畿輔郡兵馬制置使靖康初种師道為河東路制置使錢盖為陜西五路制置使建炎元年有招捉盜賊制置使自王淵始三年有行在五軍制置使自劉光世始又諸路皆有副使自江浙陳彥文程千秋始六月浙西安撫使康允之帶本路制置使安撫帶制置自此始也四年罷有沿江都制置使管江南東路知建康府紹興二年有沿海制置使係建康兩浙東路三年有安撫制置使大使之名自江南西路大使趙鼎始六年始鑄印以某路制置司為名從浙西淮東制置使梁汝嘉所請也其後盡省惟四川沿海有焉四川係成都府沿海明州開禧用兵起邱宗卿守金陵留鑰宗卿嘗以簽樞督視軍馬於是趙淳已為江淮制置命宗卿為江淮制置大使已而罷四川宣撫又以安子文為制置大使朝議以子文恩數視執政特加大字屬官有參謀參議主管機宜書冩文字各一員幹辦公事三員凖備將領差遣差使各五員餘隨時勢輕重而增損焉經畧使唐貞觀二年邉州别置經畧使此盖使名之起節度兼度支營田招討經畧使則有副使判官各一人儀鳳二年以黒齒常之為河源軍經畧大使永淳元年婁師德為河源軍經畧副使至徳三年賀蘭進明除嶺南五府經畧兼節度使建中元年除元琇節度始不合五府經畧宋朝不常置咸平五年始以右僕射張齊賢為邠寜環慶涇原路經畧使判汾州諸路軍馬並受節度又以鄧州觀察使錢若水為并代經畧使判并州自後不除人寳元中夏人入㓂始命陜西沿邉大將皆兼經畧皇祐間儂智髙擾邉詔知廣桂州並帶經畧安撫使自後西南二邉常𢃄經畧所以重帥權而服羌夷也其經畧安撫各以直祕閣以上充掌一路兵民之事皆帥其屬而聽其獄訟頒其禁令定其賞罰稽其錢榖甲械出納之名籍而行以法若事難專决則具可否禀奏即干機速邊防及士卒抵罪則聽以便宜裁斷帥臣任河東陜西嶺南路職任綏御戎夷則為經畧安撫使南渡之初依舊制廣南東路𢃄主管經畧安撫使公事西路𢃄經畧安撫使紹興五年令襄陽守臣湖北帥𢃄經畧安撫使中書門下省言湖北帥司已移還荆南舊治與襄陽府事體頗同詔王庶許依襄陽例𢃄經畧安撫後罷而二廣如故發運使宋太平興國二年置江淮水陸發運於京師端拱元年罷以其事分𨽻排岸司至道元年始命洛苑副使楊允恭西京作坊使副李延遂及太子中允王子輿為江淮南兩浙發運使兼知制茶鹽事就淮南置局三年省咸平二年鹽鐡判官王子輿復為制置淮南茶鹽是年令兼制置礬税仍領荆湖路三年以子輿充淮南轉運使四年又加都大發運事兼以淮南轉運使領其務而無使名景德二年復置一人後亦有二人副使以諸司副使充景徳二年置都監天禧二年官崇者或為副使秩輕者為都監副使都監不常備景祐元年罷寶元元年復慶歴七年上命發運副使更不置正使置司真州歲漕江湖粟六百萬斛以贍中都渡江後江湖宼盜多發運司第職糴買而已紹興二年罷以其錢帛赴行在八年起居舍人勾龍如淵言戸部非生財之道請置諸路水陸度支轉運等使置司蘓杭戸部侍郎李彌遜請復置發運使别給糴本錢數百萬緡廣行儲積徽猷閣待制程邁為江湖荆浙閩廣經制發運使專掌糴事九年廢發運司乾道六年虞丞相當國奏復發運司以戸部侍郎史正志為江浙荆湖淮廣福建等路都大發運使朝論不以為宜汪聖鍚黄通老二尚書言之尤力執政不聽其年十二月正志以奏課誕謾遂廢司焉後復置以平江府守臣兼専領糴運之事以餉淮軍總領總領財賦古無其官宋靖康末髙宗以大元帥駐軍濟州命隨軍轉運使梁揚祖總領措置財用然未以官名也南渡初嘗命朝臣總領都督府宣撫司財賦建炎末張浚用趙開總領四川財賦始置所繋銜總領官自此始紹興三年差戸部侍郎姚舜明徃建康總領應千都督府錢物糧斛六年都督諸路軍馬張浚言三宣撫司錢糧漕司互相占恡因至闕乏乞於戸部長貳内差一員来鎮江府置司專一總領詔差戸部侍郎劉寧止七年令戸部郎官霍蠡前徃岳州置局専一總領岳飛軍錢糧其後大軍在江上間遣版曹或太府司農卿少調其錢糧皆暫以總領為名而四川改置都轉運司故總領又廢紹興十一年諸將既罷兵乃收諸帥之兵以為御前軍屯駐諸處皆置總領以朝臣為之仍𢃄專一報發御前軍馬文字盖又使之與聞軍政不獨職餽餉而已叙位在轉運副使之上鎮江諸軍錢糧淮東總領掌之建康池州諸軍錢糧淮西總領掌之鄂州荆南江南諸軍錢糧湖廣總領掌之興元興州金州諸軍錢糧四川總領掌之初以胡紡為司農少卿總領淮東軍馬錢糧吳彦璋為太府少卿總領淮西江東軍馬錢糧曾造為太府卿總領湖廣江西京西路財賦湖北京西軍馬錢糧諸軍不聽節制十六年四川總司以總領四川宣撫司錢糧所為名十八年詔罷宣撫司始改為四川總領孝宗乾道六年詔淮東總領併歸淮西總領所中書門下省言勘㑹淮東總領所廢併司名合行併司詔以總領兩淮浙西江東財賦軍馬錢糧為名仍鑄印繳納兩司元印七年復置淮東總領官屬有幹辦公事差遣四川有主管文字二員淮東西有分差糧料院審計司審計司通判兼㩁貨務都茶場御前封樁甲仗庫大軍倉大軍庫贍軍酒庫市易抵當司恵民藥局湖廣有給内場分差糧料院四川有撥發船運官贖藥庫糴買場餘並同兩淮都大提舉茶馬宋熈寜七年始三司鹽鐵判官李杞三司勾當公事蒲宗閔經畫川蜀買茶充秦鳳熙河路博馬就除提舉成都府路買茶公事把扵秦川宗閔於成都置司後改名都大提舉茶馬事熈寧七年差李把蒲宗閔成都府買茶熈河路博馬並令杞等提舉置都大提舉及主管同主管各因其資品髙下除授云元豊四年羣牧判官郭茂恂又言茶司既不兼買馬遂立法以害馬政恐誤國事乞併茶塲買馬為一司從之蓋茶馬司始合於此時也舊制於源渭徳順三郡市蕃馬熈寕七年初復熈河經畧使王韶言西人頗以善馬至邉其所當唯乏茶與之為市請趣茶馬辦之乃命三司勾當公事李祀運蜀茶至熈河置買馬塲云而源渭徳順更不買馬於是把言賣茶市馬一事也乞同提舉買馬把遂兼馬政然合分不常至元豊四年羣牧判官提舉買馬郭茂恂又言茶司既不兼買馬遂立法以害馬政乞倂為一司從之掌収摘山之利以佐邦用凡市馬於蕃夷以茶易之大觀以来茶馬之政廢川茶不以博馬唯市珠玉故馬政廢缺建炎四年張浚奏大石進奉珠玉髙宗俞曰云云紹興四年從關師古之請以乏戰馬始令四川宣撫司支茶博馬五年密院言已於永康軍威茂州置塲七年宰臣趙鼎言得㫖復置茶馬官舊有主管茶馬同提舉茶馬都大提舉茶馬凡三等上曰考其資歴命之乾道元年川秦兩司馬額共九千餘匹茶馬陳彌作言本司買馬川秦兩司文黎珍叙南平長寧軍本州軍年額川馬五千餘匹係應副江上諸軍階州之峯帖陜西和州之宕昌兩處年額共西馬四千餘匹係輪年應副三衙川秦兩司者祖宗舊制至今不廢四年四川宣撫使虞允文奏照得祖宗朝都大茶馬官扵秦州成都各置司居治各半府排發馬月分居秦司訖事即歸川司措置發茶并買馬物帛之𩔖今欲依舊制於鳳州河池縣置秦司既近宕昌買馬之弊可以稽察従之秦馬舊二萬匹乾道川秦買馬之額歲為萬有一千九百匹有竒川司六千秦司五千九百益梓利三路漕司歳應副博馬紬絹十萬四千匹成都利州路十一州産茶二千一百二萬斤茶馬司所收大較若此其後文州改隸秦司而川司増珍州之額共為四千八百九十六秦司六千一百二十合兩司為萬有一千十有六匹此慶元之額也嘉泰末川司五塲又增為五千一百九十六匹秦司三塲增為七千七百九十八匹合兩司為萬有二千九百九十四匹然累歳所市多不及額焉都大坑冶唐開元二十五年監察御史羅文信充諸道鑄錢使天寶三載楊眘矜除御史中丞充鑄錢使六載度支郎中楊釗充諸道鑄錢使永泰元年劉晏充東都淮南浙江東西湖南山南東道鑄錢使第五琦充京畿關内河東劍南山南西道鑄錢使諸鑄錢監監所在州府都督刺史為之副監一人上佐判之宋朝自開寶平吳之後因其舊置錢監於鄱陽既而江淮荆浙閩廣之地皆有監係發運使兼提㸃咸平三年以馮亮為江南轉運副使兼都大提㸃江南福建路鑄錢事内供奉官白承睿同提㸃鑄錢事至景祐二年始置江浙川廣福建等路都大提㸃坑冶鑄錢一員以魏兼為之與提㸃刑獄序官按四朝傳榮宗範知鉛山縣有詔罷民采銅皆散為盜宗範一切始如故真宗嘉異擢提㸃江浙諸路銀銅坑冶興此不同當考元豊二年三司言江浙等路提㸃坑冶鑄錢官一員通領九路水陸廵按不周欲増一員分路提㸃從之遂定為兩司在饒者領江東淮浙七閩在䖍者領江西荆湖二廣焉至元祐元年以坑冶鑄錢通為一司從淮南提㸃李深之請也政和七年置提㸃鑄錢官兩員扵饒䖍州紹興二年置䖍州提㸃司從提㸃王㬇之請也雖有上項指揮後来多在饒州置司贛州只係廵歴六年趙伯瑜乞依嘉祐著令銜内添都大二字與提刑序官二十六年詔都大提㸃坑冶鑄錢司官吏並罷令逐路轉運司交割以尚書省言坑冶鑄錢司近年鑄錢全虧一司官吏所費不貲罷之二十七年置提領諸路鑄錢官扵行在差侍從或卿監一員不妨本職兼領置屬官三員以提領諸路鑄錢所為名以戸部侍郎榮嶷兼二十九年從左司諫何溥言乃復置以江淮荆湖福建廣南路提㸃坑冶鑄錢公事繫銜與運判序官依舊扵饒贛二州置司輪年守任専以措置坑冶督責鼓鑄為職租額一百六十餘萬貫孝宗乾道六年併歸發運司八年復置此據提㸃司題名八年詔鑄錢司依舊置提㸃官二員扵饒贛二州置司除王楫李大正二人九年兩司分認課額將江南淮南兩浙潼州利州路隸饒州司江西湖廣福建分隸贛州司又王楫等言所有舊坑多係江西却慮饒州一司無從措置欲扵江西管内取撥江州吉州撫州興國軍隆興府却隸饒州司従之淳熙三年倂贛司歸饒州王楫専為提㸃官加都大焉屬官有幹辦公事一員檢踏官三員催綱官一員後檢踏増置六員各分認専管職事一員饒州本司一員信州一員建州一員都州一員潭州提舉市舶唐有市舶使以右威衛中郎將周澤為之見栁澤劾慶立疏唐代宗廣徳元年有廣州市舶使吕大一宋開寳四年下廣南以同知廣州潘美尹宗珂並兼市舶使通判謝處玭兼市舶判官咸平二年九月庚子令杭州明州各置市舶聽蕃官從便熈寧中始變市舶法泉人賈海外者徃復必使東詣廣否則没其貨海道囘逺竊還家者過半嵗抵罪者衆太守陳偁奏疏願置市舶於泉不報哲宗即位之二年始詔泉置市舶偁子齋之父也偁傳廷平志蕃制雖有市舶司多州郡兼領元豐中始令轉運司兼提舉而州郡不復預矣三年尚書省言廣州市舶條已修定乞専委官催行詔廣東以轉運使孫逈廣西以運召陳伯兩浙以轉運副使周直孺福建以轉運判官王子京逈直孺兼提舉催行倩子京兼覺察拘欄其廣東路安撫使更不𢃄市舶後専置提舉而轉運亦不復預矣後盡罷提舉官至大觀元年續置明年御史中丞石公弼請歸之轉運司不報建炎中興詔罷兩浙福建市舶司歸轉運司明年夏復閩浙二司賜度牒直三十萬緡為博易本元年十一月廢二年五月復四年春復置廣司尚書省言併廢以来工人不便虧失数多扵是詔依舊復置紹興二年廢福建提舉市舶初令提刑兼領旋委提舉茶事十二年朝廷欲措置福建蠟茶時欲廢蠟茶至行在置局出賣吕斌上言扵是茶事司歸建州而提舉市舶以次復矣十四年命蕃啇以香藥至者十取其四十七年詔丁沉香豆䓻龍腦之屬號細香藥者十取其一乾道二年詔罷兩浙提舉市舶逐處職事委知通知縣監官同行檢視而總其數令轉運司提督紹興十九年張閑言福建廣南各置務扵一州兩浙舶務乃分建扵五所至乾道初臣僚言兩浙惟臨安明州秀州温州江隂軍凡五處有市舶祖宗舊制有市舶處知州兼提舉市舶務通判𢃄主管知縣𢃄監而逐務又各有監官市舶置司乃在華亭近年過明州舶船到提舉𢃄一司吏人留明州數月名為抽解其實搔擾且福建廣南皆有市舶物貨皓瀚置官提舉誠所當宜惟是兩浙置官委是冗蠧乞賜廢罷従之走馬承受兼訪使走馬承受諸路各一員宋仁宗時置以三班使臣及内侍充隸經畧安撫總管司無事嵗一入奏有邉警則不時馳驛上聞然居是職者惡有所隸乃潜去總管司字冀以擅權熈寧五年帝命正其名鑄銅記給之仍收還所用奉使印崇寧中始詔不隸帥司而輙預邉事則論以違制大觀中詔許風聞言事政和五年詔諸路走馬承受體均使華邇来皆貪賄賂𩔖不舉職是豈設官之意其各自勵以稱任使㦯蹈前失罰不汝赦明年七月改為兼訪使者宣和五年詔近者諸路兼訪官循習違越附下罔上凡邉機皆先申後奏且侵監司凌州縣而預軍旅刑獄之事復强買民物不償其直招權恃勢至與監司表裏為惡自今猶爾必加貶竄靖康初罷之依祖宗舊制復為走馬承受經制邉防財用事掌經畫錢帛芻糧以供邉費凡權易貨物根括耕地及蕃部弓箭手等事皆奏而行之熙寧末以熙河連歳用兵仰給度支費不貲始置是司元祐初罷崇寧中復置提舉學事司掌一路州縣學政歳廵所部以察師儒之優劣生員之勤惰而專舉刺之事崇寧年置宣和三年罷提舉河北糴使司掌糴便芻糧以供邉儲之用提舉制置解鹽司掌鹽澤之禁令使民入粟塞下予鈔給鹽以足民用而實邉備凡鹽價髙下及文鈔出納多寡之數皆掌之提舉保甲司掌什伍其民教之武藝視其優者而進賞之元豐初置於開封府界遂下其法扵河北河東陜西三路既而悉置提舉官如府界焉提舉三白渠公事掌瀦泄三白渠以給關中灌溉之利撥發司輦運司以時起發綱運而督其滯留以供京師之用提舉弓箭手掌沿邉郡縣射地弓箭手之籍及團結訓練賞罰之事政和五年復置以所招弓箭手之數為殿最元祐初右僕射司馬光乞罷提舉官疏曰天聖中諸路止有轉運使一員亦無提㸃刑獄惟河北陜西以地重事多置轉運使兩員一路之事無不總使按察官吏進賢發姦興利除害或朝廷有本路事務未能細知利害者則委之相度措置當時官少民安事無不舉公私饒樂海内晏清景祐初始復置提㸃刑獄其後或時置轉運判官以其冗長害事尋復廢罷自王安石執政以来欲力成新法諸路始置提舉常平廣恵農田水利官其後各置提舉官皆得按察官吏事權一如監司又增轉運副使判官等員數皆選年少資淺輕俊之士為之㦯通判知縣監當資序及選人以權發遣處之有未嘗歴親民即為監司者能順己意即不次遷擢小有乖違則送審官院與合入差遣更加責降彼年少則歴事未多資淺則衆所不服輕俊則舉措率易又利祿誘扵前罪戾怵扵後由是徃徃上不顧國家事體下不恤百姓怨咨止務希合以廣進取致今日天下藉藉如此皆由此來則提舉官乃病民之本原也經總制使徽宗宣和三年方臘初平江浙諸郡皆未有常賦乃詔除陳亨伯以大漕之職經制七路財賦許得移用監司聽其按察扵是亨伯收民間印契及鬻糟醋之𩔖為錢凡七色是後州縣有所謂經制錢自亨伯始也其後翁端朝繼為之紹興初與發運俱罷九年復置以戸部侍郎梁汝嘉為使司農少卿霍蠡為判官以檢察内外失䧟錢物舉催未到綱運措置糴買總領常平為職未幾諫議曹統言其無益而多費就省之紹興中又有總制司以参政孟庾領其事其職畧視經制司招討使掌招收討殺盜賊之事不常置建炎四年以檢校少保定江招慶軍節度使張俊充江南路招討使定位在宣撫使之下制置使之上著為定制軍中急速事宜待報不及許以便宜行事差隨軍轉運使一員參講官一員幹辦官三員隨軍幹辦官四員書寫機宜文字一員并聽奏辟紹興五年岳飛為湖北襄陽招討請州縣不法害民者許一面對移㦯放罷以聞從之十二年烏珠犯三京以韓世忠岳飛張俊並兼河南北招討使以禦之三十一年陜西河東北京東西等路皆置招討使盖又特遙領其地而已招撫使不常置建炎初李綱秉政以張所為河北招撫使未及出師而廢三十二年孝宗即位以成閔張子盖李顯忠三大將為湖北京西淮東西招撫使子盖死劉寶代之未幾結局官吏並罷開禧二年山東及京東西北路並置使招撫後皆罷宣諭使掌宣諭徳音不預他事歸即結罷紹興元年詔祕書少監傅崧年充淮南東路宣諭使此其始也二年分遣御史五人宣諭東南諸路戒其興獄責其不當督捕盗賊皆欲專一布惠以為民其後右司范直方宣諭川陜察院方庭實宣諭三京均此意及新復陜西樓炤以簽書樞密院事往永興宣諭就令招撫盗賊鄭剛中為川陜宣諭使許按察官吏汪徹為湖北京西宣諭使仍節制兩路軍馬自是使權益重而使事始不專三十二年虞允文王之望相繼充川陜宣諭使皆預軍政其權任殆亞扵宣撫其後錢端禮吳芾皆以侍從出膺斯寄事畢結局官屬軍兵視其所任事之輕重為賞之厚薄焉開禧間薛叔似鄧友龍吳獵皆因飢荒盜賊及平逆亂後徃敷德意亦皆以從官行撫諭使掌慰安存問採民之利病條奏而罷行之亦不常置建炎元年上謂輔臣曰京城士庶自金人退師人情未安可差官撫諭扵是以路允廸耿延禧為京城撫諭使此置使初意也是年八月又令學士院降詔且命江端友等奉詔撫諭諸路其後李正民以中書舍人為江浙湖南撫諭使且令按察官吏伸民寃抑傅崧卿以吏部侍郎為淮東撫諭使採訪民間利病及措置營田等事㦯不以使名則稱撫諭官所至以某州撫諭司為名具宣恩言俾民知德意初無二致乾道元年知閤門事龍大淵差充兩淮撫諭軍馬回日結局是又特為軍馬出云鎮撫使舊所無有中興假權宜以招收羣盜初建炎四年范宗尹參知政事議羣盜併力以拒官軍莫若析地以處之盜有所歸則可漸制乃請稍復藩鎮之制是年五月宗尹為右僕射於是請以淮南京東西湖南北諸路並分為鎮除茶鹽之利仍歸朝廷置官提舉外他監司並罷上供財賦權免三年餘聽帥臣移用更不從朝廷應副軍興聽從便宜時劇盗李成在舒蘄桑仲在襄鄧郭仲威在維掦許慶在髙郵皆即以為鎮撫使其餘或以處歸朝之人分畫不一許以能捍禦外宼顯立大功特與世襲官屬有參議官書冩機宜文字各一員幹公事二員並聽奏辟後諸鎮或以戰死或降偽齊久之但餘荆南觧潛及趙鼎為相召潜主管馬軍遂罷弗置焉按古者牧伯之任後世之所謂監司也隋以前多謂之刺史自唐以刺史名知州而後牧伯始别有以名其官盖唐之初止有上中下都督府其後則有節度觀察團練諸使宋之初止有轉運使其後則有安撫提刑等官然唐宋中世以後監司尤多盖唐之多設監司也起於開元天寳之興利如楊國忠為宰相所領四十餘使及元道州言到官未五十日諸使徴求符牒二百餘封是也宋之多設監司也起扵熈寧元豊之行新法如蘇公所謂使者四十餘軰事少員多人輕權重及温公所謂提舉司乃病民之本源是也又有倥偬之際因事置官事已遂廢者前軰所著職官之書多所不載今以㑹要及史志參考列唐營田度支兩税租庸等使扵都督節度觀察之後列宋諸項提舉錢總制招討諸使扵轉運安撫提刑等官之後庻可以備見當時設官廢置之本末云總論州佐别駕從治中典主簿佐功曹書佐事部郡國事部書祭酒從中正簽判書記支使推判官州之佐吏漢有别駕治中主簿功曹書佐簿曹簿曹從事史主錢穀簿書兵曹兵曹從事史有軍事則置之以主兵馬部郡國從事史典郡書佐等官又有孝經師主監試經月令師主時節祠祀律令師主平法律皆州自辟除通為百石又後漢書㦯云秩六百日職與司隸官屬同唯無都官從事漢魏之際復增祭酒文學從事員晋又有武猛從事員其州邉逺有山險砦賊者置弓馬從事五十人歴代職員互相因襲雖小有更易而大抵不異自魏晋以後刺史多𢃄將軍開府則州與府各置寮屬州官理民别駕治中以下是府官理戎長史司馬等官是後魏舊以州牧親人班九條之制使前政選吏以待後人獻文帝革制刺史守宰到官之日仰自舉擇以為選官若簡任失所以罔上論自孝明孝昌以後四方多難刺史太守皆為當部都督雖無兵事皆立寮佐頗為煩擾髙隆之乃表謂自非邉要見有兵馬者悉皆斷之北齊上上州刺史屬官佐吏合三百九十三人以下州遞減十人其州郡佐吏皆州府辟除及後主失政賜諸佞幸賣官分州郡下逮鄉官多降中旨故有勅用州主簿郡功曹者後周刺史府官則命扵天朝州吏並牧守自置至隋以州為郡無復軍府則州府之吏變為郡官矣唐無州府之名而有採訪使及節度使節度使説在都督篇採訪使有判官二人分判尚書六行事及州縣簿書支使二人分使出入職如節度使之隨車推官一人推鞫獄訟皆使自辟召然後上聞其未奉報者稱攝其節度防禦等使寮佐辟奏之例亦如之今舉州之舊職以列於左舊職謂隋以前官職别駕從事史一人從刺史行部别乗傳車故謂之别駕漢制也歴代皆有後漢周景為荆河州辟陳蕃為别駕蕃不受景題别駕輿曰陳仲舉座不復更辟蕃惶恐起視職烈士傳曰孔恂字巨郷為别駕别駕車舊有屏星如刺史車刺史因怒欲去别駕車屏星恂曰徹去屏星毁國舊儀别駕可去屏星不可省乃止庾亮集答郭豫書云别駕舊與刺史别乗同流宣王化于萬里其任居刺史之半梁時别駕官品揚州視黄門郎南徐州視散騎常侍隋及唐並為郡官治中從事史一人居中治事主衆曹文書漢制也歴代皆有隋為郡官唐改為司馬説在佐後主簿一人錄門下衆事省署文書漢制也歴代至隋皆有功曹書佐一人主選用漢制也其司隸功曹從事史兼錄衆事應劭漢百官表曰司隸功曹從事即州治中從事也晋以来改功曹為西曹書佐宋有别駕西曹主吏及選舉即漢功曹書佐也部郡國從事史每郡國各一人漢制也主督促文書舉非法後漢喬元字公祖為梁縣功曹荆河州刺史周景行部到梁國元謁景因㐲地言陳相羊昌罪惡乞為部郡從事窮理其罪景壮元意即署遣之元到具考贓罪梁冀馳檄救之景承旨召元還檄至不發按之益急昌坐檻車徵元由是著名又朱震字伯厚為州從事奏濟隂太守單匡贓罪三府諺曰車如雞棲馬如狗疾惡如風朱伯厚典郡書佐每郡國各一人漢制也各主一郡文書以郡吏補歳滿一更祭酒從事史漢魏以来置宋世分掌諸曹兵賊倉戸水鎧之事自江左揚州無祭酒而以主簿治事中正陳勝為楚王以朱房為中正而不言職事兩漢無聞魏司空陳羣以天臺選用不盡人才擇州之才優有昭鑒者除為中正自拔人才銓定九品州郡皆置吳有大公平亦其任也吳習温為荆州大公平大公平即州都也後潘祕為尚書僕射代温為公平甚得州里之稱晋宣帝加置大中正故有大小中正其用人甚重晋劉毅字仲雄年七十已告老後舉為青州大中正尚書以毅懸車致仕不宜勞以碎務孫尹表曰司徒魏舒司隸嚴詢與毅年齒相近管四十萬户州兼董司百僚總攝機要議者不以為劇毅志氣聰明一州品第不足勞其思慮毅遂為州都銓正人流清獨區别其所彈貶自親貴始又干寳稱晋宣帝除九品置大中正晋令曰大小中正為内官者聽月三㑹議上扵東門外設幔陳席又劉毅上表刺史初臨州大中正選州里才業髙者兼主簿從事迎刺史若吏部選用猶下中正問人事所在父祖位状又晋起居注曰僕射諸菖恢啓稱州都大中正為吏部尚書及郎司徒左長史掾屬皆為中正臣令領吏部請解大中正以為都中正職局司理不宜兼也齊梁亦重焉梁沈約遷侍中光禄大夫領太子詹事揚州大中正開尚書八條事後魏有之孝文云中正之任必須得才業兼資者太武帝時崔浩為冀州中正北齊郡縣皆有其本州中正以京官為之乾明中邢劭為中書監同郡許淳與邵競本州中正遂慿附宋欽道出邵為刺史隋有州都其任亦重晋王廣為雍州牧司空楊雄太僕髙熲並為州都唐無容齋洪氏隨筆曰唐世士人初登科或未仕者多以從諸藩府辟置為重觀韓文公送石洪温造二處士赴河陽幕序可見禮節然其職甚勞苦故亦或不屑為之杜子羙從劍南節度嚴武辟為参謀作詩二十韻呈嚴公云胡為来幕下只合在舟中束縛酬知己蹉跎效小忠周防期稍稍太簡遂怱怱曉入朱扉啟昏歸畫角終不成尋别業未敢息㣲躬㑹希全物色時放倚梧桐而其題曰遣悶可知矣韓文公從徐州張建封辟為推官有書上張公云受牒之明日使院小吏持故事節目十餘事来其中不可者自九月至二月皆晨入夜歸非有疾病事故輙不許出若此者非愈之所能也若寛假之使不失其性寅而入盡辰而退申而入終酉而退率以為常亦不廢事苟如此則死扵執事之門無悔杜韓之㫖大畧相似云又曰唐世節度觀察諸使辟置僚佐以至州郡差掾屬牒語皆用四六大畧如誥詞李啇隠樊南甲乙集顧雲編槀羅隱湘南雜槀皆有之故韓文公送石洪赴河陽幕府序云撰書辭具馬幣李肇國史補載崖州差故相韋執誼攝軍事衙推亦有其文非若今時只以吏牘行遣也簽判唐制節度觀察判官宋有兩使防團軍事推判官皆以選人充太平興國中以賛善大夫十五員充諸州節度判官以王化基韋亶武元頴等為之盖太宗以諸州戎幕缺官選朝士補之俾分理事且試其才此簽判所由始也盖選人則為判官亰官則為簽判掌禆賛郡政總理諸案文移斟酌可否以白扵其長而罷行之凡員數多寡視郡小大及職務之繁簡初政和改簽書判官㕔公事為司録建炎初復舊凡節度推判官從軍額察推及支使從州府名凡諸州減罷通判處則陞判官為簽官以兼之小郡推判官不並置或以判官兼司法或以推官兼支使亦有併判官窠闕省罷則令錄参兼管凡要郡簽判及推官皆掌除爵吏部使改二廣間許監司辟差紹熈元年臣僚言廣西奏擬簽判多恩科廕老乞行下轉運司不許差年六十以上昏眊之人嘉定二年臣僚言監司有幹官州郡有職官以供簽㕔之職或非才不勝任則按刺易置可也今乃差兼簽㕔者動輙三兩員或四五員其為冗費與添差何異乞将諸州郡所差兼簽㕔官並行住罷從之書記支使自魏以来有其名魏太祖以陳琳阮瑀爲司空軍謀祭酒管書記室宋江夏王恭取邱巨源為掌書記陳有文房書記之任南史趙知禮蔡景歴屬陳武帝經論之日唐景龍中元帥府置掌書記一人節度使亦置焉掌朝覲聘問慰薦祭祀祈祝之文與號令升納之事後唐長興中有書記支使宋朝乾徳二年詔歴兩任有文學者許兩使留後奏充掌書記詔曰管記之任資序頗優自前藩鎮薦人多自初官除授自今歴職兩任以上有文學即許節度使觀察使留後奏充太平興國六年詔諸節度州依舊置官察支使一員資考俸科並同掌書記自今吏部除擬以經學及諸色人任無出身人充凡書記支使不得並置有出身曰書記無出身曰支使位在判官之下推官之上推判官唐天寳後有判官之名未見品秩後唐長興二年詔有兩使判官防團推官軍事判官等是時判官多本州自辟舉清泰中始擇朝士為之宋朝沿五代之制兩使置判官推官各一人餘州置推判官各一人元祐令京府判官至軍監判官為幕職官皆從八品政和初自判官至諸曹改為士戸議兵刑工曹掾建炎復舊制焉按州之名起扵虞十有二州後世刺史之所治是也郡之名起於秦三十六郡後世太守之所治是也隋廢郡以州統縣然郡卒不可廢也至唐而復之然唐太守俱稱刺史使持節盖所治者太守之事而所稱則州牧之官矣故所謂治中别駕之屬其在歴代本州之佐官也唐郡守稱刺史而遂以治中别駕為郡官屬矣然唐州牧之官為節度觀察諸使而其屬官則有推官判官書記支使之屬至宋而節度觀察特為貴官之虛名初不預方岳之事而州牧之任則自有閫帥漕憲等官而各臺又自有掾屬若唐節度觀察之屬官則反為列郡之元僚盖雖冒以節度推官觀察推官判官書記支使等名而實則郡僚耳故叙其職于州佐之後而不並之於户曹理掾之流存其舊也文獻通考卷六十二
