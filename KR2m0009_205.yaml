body:
  text: 文獻通考卷二百五鄱陽馬端臨貴與著經籍考三十二史地理建康志十卷陳氏曰府帥史正志志道撰乾道五年續建康志十卷陳氏曰府帥吳琚居父以郡人朱舜庸所編詮次與前志並行時慶元六年六朝事迹一卷南朝宮苑記二卷陳氏曰不知何人所作記六朝故都事迹頗為詳盡姑孰志五卷陳氏曰教授長樂林桷子長撰太守楊愿原仲也時淳熈五年新安志十卷陳氏曰通判贑州郡人羅願撰時淳熈二年太守則趙不悔也秋浦志八卷陳氏曰太守南昌胡兆乾道八年修秋浦新志十六卷陳氏曰三山王伯大幼學以前志缺陋重修時以庾節攝郡事端平丙申也南康志八卷陳氏曰郡守朱端章撰淳熈十二年桐汭新志二十卷陳氏曰教授錢塘趙子直撰紹定五年也太守林棐序豫章職方乗三卷後乗十二卷陳氏曰郡人洪芻駒父宣和己亥撰乗取晉乗為名後乗淳熈十一年太守程叔逹序潯陽志十二卷陳氏曰廸功郎鼂百揆元采撰淳熈三年太守開封曹訓為序宜春志十卷陳氏曰袁州教授南城童宗說撰太守李觀民也宜春傳信録三卷鼂氏曰皇朝羅誘述載其地古今人物及牧守政迹山川靈異之跡袁州孚惠廟録一卷鼂氏曰皇朝張慤撰記仰山二神靈異之跡旴江志十卷續十卷陳氏曰郡守胡舜舉紹興戊寅俾郡人童宗說黄敷忠為之續志慶元五年三山陳岐修亦郡守也富川志六卷陳氏曰軍學教授括蒼潘廷立撰太守趙善宣紹熈四年也軍治永興本富川縣故名南安志二十卷補遺一卷陳氏曰太守方崧卿教授許開修廣陵志十二卷陳氏曰教授三山鄭少魏江都尉㑹稽姚一謙撰紹熈元年太守鄭興裔也楚州圖經二卷陳氏曰教授霅川吳莘商卿撰太守毘陵錢之望大受時淳熈十三年永陽志三十五卷陳氏曰滁守林㟽命法曹龔惟蕃修吳陵志十卷陳氏曰不著名氏淳熈壬寅所修後三年乙巳太守錢塘萬鍾元亨屬僚佐參正而刻之泰州在唐為吳陵縣高郵志三卷續修十卷陳氏曰興化縣主簿孫祖義撰郡守趙不慙刻之淳熈四五年間也其書在圖志中最為疏畧嘉定中守汪綱再修稍詳定矣都梁志八卷續一卷陳氏曰郡守霍箎教授周之瑞修紹熈元年也續志嘉泰壬戍郡守耿與義序合肥志四卷陳氏曰合肥主簿唐錡撰郡守鄭興裔也時淳熈十五年同安志十卷陳氏曰毘陵錢紳伸仲撰宣和五年太守曰曽元禮未㡬而有兵難至紹興十三年太守張彦聲始取而刻之歴陽志十卷陳氏曰郡守九華程九萬鵬飛教授天台黄宜逹之撰慶元元年黄州圗經四卷附録一卷陳氏曰李諤祥符所修舊經亦頗有後人附益者郡守李訦又以近事為附録焉訦參政邴漢老之子也齊安志二十卷陳氏曰郡守吕昭問俾教授厲居正重修慶元己未也濠梁志三卷陳氏曰永嘉張季樗撰時嘉泰初元無為志三卷陳氏曰教授宋宜之撰太守柴瑾為之序襄陽志四十卷郡守朐山高䕫命教授吳興劉宗幕官上蔡任編纂為書既詳偹而刋刻亦精緻圗志之佳者襄沔記三卷陳氏曰唐呉從政撰刪宗懔荆楚嵗時記盛𢎞之荆州記鄒閎甫楚國先賢傳習鑿齒襄陽耆舊傳郭仲産襄陽記鮑堅南雍州記集成此書其記襄漢事跡詳矣景龍中人自號栖閑子渚宫舊事十卷鼂氏曰唐知古撰自鬻熊至唐江陵君臣人物事迹史氏傳記所載者悉編次之房州圗志三卷陳氏曰郡守毘陵陳宇撰義陽志八卷陳氏曰郡守河南關良臣撰紹熈二年也信陽軍唐申州所謂申光蔡吳元濟所據竭天下之力以取之者長沙志五十二卷續志十一卷陳氏曰郡守趙善俊以紹熈二年命教授禇孝錫等七人撰時止齋持漕相與考訂商畧故序言當與長樂志並也續志不著名氏録紹熈以後事長沙風土碑一卷陳氏曰唐潭州刺史河南張謂撰前有碑銘後有湘中記載事跡七十件衡州圖經三卷陳氏曰郡守三山孫德輿行之撰嘉定戊寅刻零陵志十卷陳氏曰郡守徐自明嘉定己邜重修零陵記十五卷鼂氏曰皇朝陶岳撰永州地理志也今永州所部方三縣其所録多連及数郡自序云以其皆零陵舊地故收之舂陵圖志十卷陳氏曰教授臨江章頴茂憲撰淳熈六年太守趙汝誼九疑考古二卷陳氏曰道州崇道主簿吳致堯格甫撰取舂陵志所紀而為詩以紀之宣和甲辰序清湘志六卷陳氏曰郡守永嘉陳峴壽南俾教授林瀛修嘉泰二年也武昌志三十卷陳氏曰郡守括蒼王信成之命教授許中應等撰武昌土俗編二卷陳氏曰武昌令永嘉薛季宣撰記一縣之事頗詳紹興辛己壬午間也其邑今為壽昌軍鄭城志十二卷陳氏曰教授傅岩撰慶元戊午太守李楫岳陽志甲二卷乙三卷陳氏曰甲集建安馬子嚴荘父乙集永嘉張聲道聲之所修皆郡守也岳陽風土記一卷陳氏曰宣德郎監商稅務建安范致明晦叔撰元符進士第二人仕至次對其在岳蓋謫官也辰州風土紀六卷陳氏曰教授縉雲田渭伯清撰隆興二年郡守徐彭年成都古今記三十卷鼂氏曰皇朝趙抃編抃自慶歴至熈寧凡四入蜀知蜀事為詳摭其故實以𩔖相從分百餘門時熈寜七年續成都古今集記二十二卷陳氏曰知府事王剛中居正撰紹興三十年余嘗手寫洛陽名園記而題其後曰晉王右軍聞成都府有漢時講堂秦時城池及門屋楼觀慨然逺想欲一遊目其與周益州帖蓋数致意焉近時吕太史有感於宗少文卧遊之語凡昔人紀載人境之勝録為一編其奉祠亳社也自以為譙沛真源恍然在目而兗之太極嵩之崇福華之雲臺皆将卧逰之噫嘻弧矢四方之志高人逹士之懐古今一也顧南北分裂蜀在境内雖逺患不徃爾徃則至矣亳兗嵩華視蜀猶邇封也欲徃其可得乎然則太史之情其可悲也已余近得此記手寫一通與東京記長安河南志夢華録諸書並藏而時自覽焉是亦卧遊之意云耳於時嵗在己丑蜀故無恙也後七年而有兵禍秦漢故迹焚蕩無遺今其可見者惟此二記耳而板本亦不可復得矣嗚呼悲夫劒南須知十卷巽岩李氏曰宋如愚撰第一第二卷但編集舊史棄取或不倫第三第四第五第六凡四卷盡出唐樊綽蠻書第七卷以下乃如愚自為之文及所畫計䇿耳如熈寜買馬事誠西南要害異時或可補國史之闕云如愚眉山人游塲屋有俊聲不第以死亦可哀者蜀記一卷鼂氏曰皇朝張守約撰載孟昶初降至薨事蜀記二卷陳氏曰唐鄭暐撰雜記蜀事人物古跡寺觀之屬未詳何人梁益志十卷鼂氏曰皇朝任弁撰天禧中游宦於成都以蜀記数家其言皆無據乃引書傳刋正其謬自為序蜀三神祠碑文五卷鼂氏曰皇朝井䖍編任四川漕日裒梓潼灌口射洪三神祠碑文板記成此書嘉州志二卷鼂氏曰皇朝吕昌明以嘉州圗經増廣之長樂志四十卷陳氏曰府帥清源梁克家叔子淳熈九年序永嘉陳傅良君舉通判州事大畧皆出其手閩中記十卷陳氏曰唐林諝撰本朝慶歴中有林世程者重修其兄世矩作序諝郡人養高不仕當大中時世程亦郡人也其言永嘉之亂中原仕族林黄陳鄭四姓先入閩可以證閩人皆稱光州固始之妄建安志二十四卷續志一卷陳氏曰刪定官郡人林光撰慶元四年郡守永嘉張叔椿俾僚屬成之續志嘉定十二年府學士人所録清源志七卷陳氏曰通判州事永嘉戴溪肖望撰時慶元己未太守信安劉頴延平志十卷陳氏曰郡守新安胡舜舉汝士與郡人廖拱廖挺裒集時紹興庚辰也序言與盱江志並行蓋其為建昌守亦嘗修圗志清漳新志十卷陳氏曰司理參軍方杰撰嘉定六年太守趙汝譡蹈中也鄞江志八卷陳氏曰郡守古靈陳曄日華俾昭武士人李臯為之時慶元戊午郡有鄞江溪故名莆陽志十五卷陳氏曰郡守趙彦勵懋訓紹興三年集郡士為之武陽志十卷陳氏曰教授葛元隲撰太守廖遲元逹乾道六年也晉江海物異名記三卷陳氏曰祕書監莆田陳致雍撰致雍仕偽閩南唐後歸朝廣州圗經二卷陳氏曰教授王中行撰南越志七卷陳氏曰宋武康令吳興沈懐逺撰此五嶺諸書之最在前者也懐逺懐文之弟見宋書番禺雜記一卷陳氏曰攝南海主簿鄭熊撰國初人也莆田借李氏本録之蓋承平時舊書末有河南少尹家藏六字不知何人也番禺紀異五卷鼂氏曰皇朝馮拯撰拯淳化中謫知端州見嶺表鳥獸草木民俗物情舉異中原録之為三十門凡三百事還朝上之北户雜記三卷陳氏曰唐萬年縣尉叚公路撰鄒平公之孫鄒平文昌也桂林志一卷陳氏曰静江教授江文叔編時乾道五年張維為帥撰次疏畧刋刻草率亦不分卷次桂林風土記一卷陳氏曰唐融州刺史權知春州莫休符撰昭宗光化二年也桂林虞衡志二卷陳氏曰府帥吳郡范成大至能撰范自桂移蜀道中追記昔游高凉志七卷陳氏曰教授莆田劉棠撰太守舂陵義太初嘉泰壬戌也南行録一卷陳氏曰唐房千里撰太和中謫高州既北歸編山川物産之竒人民風俗之異為此書一名投荒雜録嶺表異録三卷陳氏曰唐廣州司馬劉恂撰昭宗時人邕管雜記一卷陳氏曰庫部員外郎范旻撰國初宰相質之子嶺南初平旻知邕嶺外代答十卷陳氏曰永嘉周去非直夫撰去非癸未進士至郡倅所記皆廣西事南方草木狀一卷陳氏曰晉襄陽太守嵇含撰黄岩志十六卷陳氏曰知縣永嘉蔡範甫撰嘉定甲申旌川志八卷陳氏曰知旌德縣歴陽李瞻伯山撰紹興三年謝昌國為序涇川志十三卷陳氏曰知涇縣濡須王栐叔永撰嘉定癸酉趙南塘序之初縣嵗有水患庚午冬叔永改卜於舊治之東二里曰留村新吳志二卷陳氏曰知奉新縣盱江張國均維之撰新吳縣舊名嘉定甲戌樂清志十卷陳氏曰縣令信安袁采君載撰修水志十卷陳氏曰分寜宰徐筠撰連川志十卷陳氏曰知連江縣豫章陶武克之撰嘉定乙亥文獻通考卷二百五
