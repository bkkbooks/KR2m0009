body:
  text: 文獻通考卷二百九十五鄱陽馬端臨貴與著物異考一總序漢五行志漢興承秦滅學之後景武之世董仲舒治公羊春秋始推陰陽為儒者宗宣元之後劉向治穀梁春秋數其禍福𫝊以洪範傅讀曰附謂附著或作𫝊謂以洪範義𫝊而説之也與董仲舒錯謂錯互不同也至向子歆治左氏𫝊其春秋意亦已乖矣言五行𫝊又頗不同是以㩜仲舒别向歆㩜與擥同謂引取之㩜音来敢反𫝊載眭孟夏侯勝京房谷永李尋之徒所陳行事訖於王莽舉十二世以傅春秋著於篇𫝊讀曰附謂比附其事經曰初一曰五行五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上皆從水火自然之性也木曰曲直言可揉而曲可矯而直金曰從革革更也可更銷鑄也土爰稼穡爰於也可於其上稼穡也種之曰稼收聚曰穡𫝊曰五行𫝊伏勝作田獵不宿不得其時也㦯曰不豫戒曰不宿不戒以其時也飲食不享不行享獻之禮出入不節奪民農時及有姦謀李竒曰姦謀増賦履畝之事臣瓚曰姦謀謂邪謀也師古曰即下所謂作為姦詐以奪農時李説是也則木不曲直説曰木東方也於易地上之木為觀其於王事威儀容貌亦可觀也故行歩有佩玉之度登車有和鸞之節田狩有三驅之制飲食有獻享之禮出入有名使民以時務在勸農桑謀在安百姓如此則木得其性矣若乃田獵馳騁不反宫室飲食沉湎不顧法度妄興繇役以奪民時作為姦詐以傷民財則木失其性矣盖工匠之為輪矢者多傷敗如淳曰揉輪不曲矯矢不直也及木為變怪臣瓚曰梓柱更生及變為人形是也是為木不曲直𫝊曰棄法律逐功臣殺太子以妾為妻則火不炎上説曰火南方揚光輝為眀者也其於王者南面嚮明而治書云知人則哲能官人故堯舜舉羣賢而命之朝逺四佞而放諸埜古野反孔子曰浸潤之譖膚受之愬不行焉可謂明矣賢佞分别官人有序帥由舊章敬重功勲殊别嫡庶如此則火得其性矣若乃信道不篤㦯耀虚偽讒夫昌邪勝正則火失其性矣自上而降及濫炎妄起焚宗廟燒宫館雖興師衆不能救也是為火不炎上𫝊曰修宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成説曰土中央生萬物者也其於王者為内事宫室夫婦親屬亦相生者也古者天子諸侯宫廟大小髙卑有制后夫人媵妾多少有度九族親疎長幼有序孔子曰禮與其奢也寧儉故禹卑宫室文王刑于寡妻此聖人之所以昭教化也如此則土得其性矣若乃奢淫驕慢則土失其性亡水旱之災而草木百穀不熟是為稼穡不成𫝊曰好戰攻輕百姓飾城郭侵邊境則金不從革説曰金西方萬物既成殺氣之始也故立秋而鷹隼擊秋分而微霜降其於王事出軍行師把旌仗鉞誓士衆抗威武所以征叛逆止暴亂也詩云有䖍秉鉞如火烈烈又曰載戢干戈載櫜弓矢動靜應宜說以犯難人忘其死金得其性矣若乃貪慾恣睢務立威勝不重人命則金失其性盖工冶鑄金銕冰滯涸堅不成者衆乃為變怪是為金不從革𫝊曰簡宗廟不禱祠廢祭祀逆天時則水不潤下説曰水北方終藏萬物者也其於人道命終而形藏精神放越聖人為之宗廟以收魂氣春秋祭祀以終孝道王者即位必郊祀天地禱祈神祗望秩山川懷柔百神亡不宗事師古曰懐来也柔安也謂招来而祭祀之使其安也宗尊也慎其齋戒致其嚴敬鬼神歆饗多獲福助此聖王所以順事隂氣和神人也至發號施令亦奉天時十二月咸得其氣則陰陽調而終始成如此則水得其性矣若乃不敬鬼神政令逆時則水失其性霧水暴出百川逆溢壞鄉邑溺人民及淫雨傷稼穡是為水不潤下京房易𫝊曰顓事有知誅罰絶理厥灾水其水也雨殺人以隕霜大風天黄飢而不損兹謂泰厥灾水水殺人辟遏有德兹謂狂應劭曰辟天子也有徳者雍遏不見用也師古曰遏音一曷反厥災水水流殺人已水則地生蟲歸獄不解兹謂追非李竒曰歸罪過於民不罪已也張晏曰謂釋有罪之人而歸無辜者也解止也追非遂非也厥水寒殺人追誅不解兹謂不理厥水五穀不收大敗不解兹謂皆陰解舍也王者於大敗誅首惡赦其衆不則皆函陰氣師古曰函與含同厥水流入國邑隕霜殺穀經曰敬用五事五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰䜭䜭通也古文作睿恭作肅從作艾讀曰乂治也明作悊聰作謀上聰則下謀故聰為謀也䜭作聖休徵善行之驗也曰肅時雨若乂時暘若悊時燠若謀時寒若聖時風若凡言時者皆謂行得其道則寒暑風雨以時應而順之咎徵言惡行之驗曰狂恒雨若僭恒暘若僭僭差舒恒燠若急恒寒若霿恒風若服䖍曰霿音人備反應劭曰人君䐨霿鄙吝則風不順之也師古曰凡言恒者謂所行者失道則寒暑風雨不時而恒久為灾也霿音莫豆反䐨音構又音㓂𫝊曰貌之不恭是謂不肅厥咎狂厥罰恒雨厥極惡時則有服妖時則有龜孽鄭元曰龜蟲之生於水而游於春者属木時則有鷄禍鄭元曰鷄畜之有冠翼者也属貌時則有下體生上之痾鄭元曰痾病也貌氣失之病也漢書音義曰若梁孝王之時牛足反出背上也時則有青眚青祥鄭元曰青木色也眚生於此祥自外来也唯金沴木服䖍曰沴害也如淳曰沴音拂戾之戾義亦同鄭元曰沴殄也凡貌言視聽思心一事失則逆人之心人心逆則怨木金水土火氣為之傷傷則衝勝来乗殄之於是神怒人怨将為禍亂故五行先見變異以譴告人也及妖孽禍痾眚祥皆其氣類暴作非常時為怪者也各以物象為之占也凡六沴之作歳之朝月之朝日之朝則后王受之歳之中月之中日之中則正卿受之歳之夕月之夕日之夕則庶民受之鄭元曰自正月盡四月為嵗之朝自五月盡八月為歳之中自九月盡十二月為歳之夕上旬為月之朝中旬為月之中下旬為月之夕平旦至食時為日之朝禺中至日昳為日之中晡時至黄昏為日之夕受之受其凶咎也其二辰以次相將其次受之鄭元曰二辰謂日月也假令歳之朝也日月中則上公受之日月夕則下公受之歳之中也日月朝則孤卿受之日月夕則大夫受之歳之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣説曰凡草木之類謂之妖妖猶夭胎言尚微也蟲豸池尔反之類謂之孽孽則芽孽矣及六畜謂之禍言其著也及人謂之痾痾病貌也言䆮作任反深也甚則異物生謂之眚自外来謂之祥祥猶禎也氣相傷謂之沴沴猶臨莅不和意也每一事云時則以絶之非必俱至或有㦯亡㦯在前或在後孝武時夏侯始昌通五經善推五行𫝊以傳族子夏侯勝下及許商皆以教所賢弟子其𫝊與劉向同惟劉歆𫝊獨異貌之不恭是謂不肅肅敬也内曰恭外曰敬人君行已體貌不恭怠慢驕蹇則不能敬萬事失在狂易故其咎狂也上慢下暴則陰氣勝故其罰常雨也水傷百穀衣食不足則姦宄並作故其極惡也一曰人多被刑或形貌醜惡亦是也風俗狂慢變莭易度則為剽匹妙反輕竒怪之服故有服妖水類動故有龜孽於易巽為雞雞有冠距文武之貌而不為威貌氣毁故有雞禍一曰水歳多雞死及為怪亦是也上失威儀則有彊臣害君上者故有下體生於上之痾木色青故有青眚青祥凡貌傷者病木氣木氣病則金沴之衝氣相通也於易震在東方為春為木兌在西方為秋為金離在南方為夏為火坎在北方為冬為水春與秋日夜分寒暑平是以金木之氣易以相變故貌傷則致秋陰常雨言傷則致春陽常旱也至於冬夏日夜相反寒暑殊絶水火之氣不得相并故視傷常燠聽傷常寒者其氣然也逆之其極曰惡順之其福曰攸好德劉歆貌𫝊曰有鱗蟲之孽羊禍鼻痾説以為於天文東方辰為龍星故為鱗蟲於易兑為羊木為金所病故致羊禍與常雨同應此説非是春與秋氣陰陽相敵木病金盛故能相并惟此一事耳禍與妖痾祥眚同類不得獨異𫝊曰言之不從是謂不乂厥咎僭厥罰恒暘厥極憂時則有詩妖時則有介蟲之孽時則有犬禍時則有口舌之痾時則有白眚白祥惟木沴金説曰言之不從從順也是謂不乂乂治也孔子曰君子居其室出其言不善則千里之外違之况其邇者乎詩曰如蜩音調如螗音口唐如沸如羮言上號令不順人心虚譁音華憒亂則不能治海内失在過差故其咎僭差也刑罰妄加羣陰不附則陽氣勝故其罰常暘也旱傷百穀則有宼難上下俱憂故其極憂也君炕苦朗反陽而暴虐臣畏刑而箝巨淹反口則怨謗之氣發於歌謡故有詩妖介蟲孽者謂小蟲有甲飛揚之類陽氣所生也於春秋為螽音終今謂之蝗皆其類也於易兌為口犬以吠守而不可信言氣毁故有犬禍一曰旱歳犬多狂死及為怪亦是也及人則多病口喉欬苦愛反嗽蘇豆反者故有口舌痾金色白故有白眚白祥凡言傷者病金氣金氣病則木沴之其極憂者順之其福康寧劉歆言𫝊曰時則有毛蟲之孽説以為天文西方參為獸星故為毛蟲𫝊曰視之不明是謂不悊厥咎舒厥罰恒燠厥極疾時則有草妖時則有臝蟲之孽師古曰螽螟之類無鱗甲毛羽故謂之臝蟲也音郎果反時則有羊禍時則有目痾時則有赤眚赤祥惟水沴火説曰視之不眀是謂不悊悊知也詩云不明爾德時無背無側爾徳不明以無陪無卿師古曰大雅蕩之詩也言不别善惡有逆背傾仄者有堪為卿大夫者皆不知之也仄古側字言上不明暗昧蔽惑則不能知善惡親近習長同類師古曰習狎也近狎者則親愛之同類者則長益也亡功者受賞有罪者不殺百官廢亂失在舒緩故其咎舒也盛夏日長暑以養物政弛緩故其罰常燠也燠則冬溫春夏不和傷病民人故極疾也誅不行則霜不殺草繇臣下則殺不以時師古曰繇讀與由同言誅罰由於臣下故有草妖凡妖貌則以服言則以詩聽則以聲視則以色者五色物之大分也在於眚祥故聖人以為草妖失秉之明者也師古曰謂失所執之權也音彼命反溫燠生蟲故有臝蟲之孽謂螟螣之類師古曰螟食苖心螣食苗葉之蟲也螟音㝠螣音徒得反當死不死未當生而生或多於故而為災也劉歆以為属思心不容於易剛而包柔為離師古曰兩陽居外一陰在内云剛包柔離為火為目羊上角下蹄剛而包柔羊大目而不精明視氣毁故有羊禍一曰暑歳羊多疫死及為怪亦是也及人則多病目者故有目痾火色赤故有赤眚赤祥凡視傷者病火氣火氣傷則水沴之其極疾者順之其福曰夀李竒曰於六極之中為疾者逆火氣致疾病也能順火氣則禍更為福劉歆視𫝊曰有羽蟲之孽雞禍説以為天文南方喙為鳥星故為羽蟲禍亦從羽故為雞雞於易自在巽説非是庶徵之恒燠劉向以為春秋亡冰也小燠不書無冰然後書舉其大者也京房易𫝊曰禄不遂行兹謂欺厥咎燠雨雪四至而温臣安禄樂逸兹謂亂燠而生蟲知罪不誅兹謂舒其燠夏則暑殺人冬則物華實重過不誅兹謂亡徵其咎當寒而燠六日也𫝊曰聽之不聰是謂不謀厥咎急厥罰恒寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黒眚黒祥惟火沴水説曰聽之不聰是謂不謀言上偏聽不聰下情隔塞則不能謀慮利害失在嚴急故其咎急也盛冬日短寒以殺物政促廹故其罰常寒也寒則不生百穀上下俱貧故其極貧也君嚴猛而閉下臣戰栗而塞耳則妄聞之氣發於音聲故有鼓妖寒氣動故有魚孽雨以龜為孽服䖍曰多雨則龜多出龜能陸處非極陰也魚去水而死極隂之孽也於易坎為豕豕大耳而不聪察聽氣毁故有豕禍也一曰寒歳豕多死及為怪亦是也及人則多病耳者故有耳痾水色黒故有黒眚黒祥凡聽傷者病水氣水氣病則火沴之其極貧者順之其福曰富劉歆聽𫝊曰有介蟲孽也𫝊曰思之不䜭是謂不聖厥咎霿莫豆反厥罰恒風厥極㐫短折時則有脂夜之妖時則有華孽時則有牛禍時則有心腹之痾時則有黄眚黄祥時則有金木水火沴土説曰思心之不䜭是謂不聖思心者心思慮也䜭寛也孔子曰居上不寛吾何以觀之哉言上不寛大包容臣下則不能居聖位貌言視聽以心為主四者皆失區霿無識師古曰區音口豆反霿音莫豆反其下並同故其咎霿也雨旱寒燠亦以風為本四氣皆亂故其罰常風也常風傷物故其極㐫短折也傷人曰㐫禽獸曰短草木曰折一曰㐫夭也兄喪弟曰短父喪子曰折在人腹中肥而包裹心者脂也心區霿則㝠晦故有脂夜之妖師古曰脂妖及夜妖一曰有脂物而夜為妖若脂水夜汙人衣淫之象也一曰夜妖者雲風並起而杳㝠故與常風同象也溫而風則生螟螣有裸蟲之孽師古曰裸亦臝字也従衣果聲劉向以為於易巽為風為木卦在三月四月繼陽而治主木之華實風氣盛至秋冬木復華故有華孽一曰地氣盛則秋冬復華一曰華者色也土為内事為女孽也於易坤為土為牛牛大心而不能思慮思心氣毁故有牛禍一曰牛多死及為怪亦是也及人則多病心腹者故有心腹之痾土色黄故有黄眚黄祥凡思心傷者病土氣土氣病則金木水火沴之故曰時則有金木水火沴土不言惟而獨曰時則有者非一衝氣所沴明其異大也其極曰㐫短折順之其福曰考終命劉歆思心𫝊曰時則有臝蟲之孽謂螟螣之属也𫝊曰皇之不極是謂不建厥咎眊音耄厥罰恒陰厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾鄭元曰夏侯勝説伐宜為代書亦㦯作伐陰陽之神曰精氣性情之神曰魂魄君行不由常侜張無度則是魂魄傷也皇極氣失之病也天於不中之人恒耆其毒増以為病將以開賢代之也春秋傳所謂奪伯有魄者是也不名病者病不著於身體也時則有日月亂行星辰逆行說曰皇之不極是謂不建皇君也極中建立也人君貌言視聽思心五事皆失不得其中則不能立萬事失在眊悖故其咎眊也師古曰眊不明也悖惑也音布内反王者自下承天理物雲起於山而彌於天師古曰彌滿也天氣亂故其罰常陰也一曰上失中則下彊盛而蔽君明也易曰亢龍有悔貴而亡位髙而亡民賢人在下位而亡輔師古曰乾上九文言也如此則君有南面之尊而亡一人之助故其極弱也盛陽動進輕疾服䖍曰陽行輕且疾也禮春而大射以順陽氣韋昭曰将祭與羣臣射謂之大射上微弱則不奮動故有射妖易曰雲從龍師古曰乾九五文言又曰龍蛇之蟄以存身也師古曰下繫辭也陰氣動故有龍蛇之孽於易乾為君為馬馬任用而彊力君氣毁故有馬禍一曰馬多死及為怪亦是也君亂且弱人之所叛天之所去不有明王之誅則有簒弑之禍故有下人伐上之痾凡君道傷者病天氣不言五行沴天而曰日月亂行星辰逆行者為若下不敢沴天猶春秋曰王師敗績於貿戎不言敗之者以自敗為文尊尊之意也劉歆皇極𫝊曰有下體生上之痾説以為下人伐上天誅已成不得復為痾云唐史五行志序曰萬物盈於天地之間而其為物最大且多者有五一曰水二曰火三曰木四曰金五曰土其用於人也非此五物不能以為生而闕其一不可是以聖王重焉夫所謂五物者其見象於天也為五星分位於地也為五方行於四時也為五徳禀於人也為五常播於音律為五聲發於文章為五色總其精氣之用謂之五行自三代之後數術之士興而為災異之學者務極其説至舉天地萬物動植無大小皆推其類而附之於五物曰五行之属以謂人禀五行之全氣以生故於物為最靈其餘動植之類各得其氣之偏者其發為英華美實氣臭滋味羽毛鱗介文采剛柔亦皆得其一氣之盛至其為變怪非常失其本性則推以事類吉㐫影響其説尤為委曲繁宻盖王者之有天下也順天地以治人而取材於萬物以足用若政得其道而取不過度則天地順成萬物茂盛而民以安樂謂之至治若政失其道用物傷夭民被其害而愁苦則天地之氣沴三光錯行陰陽寒暑失節以為水旱蝗螟風雹雷火山崩水溢泉竭雪霜不時雨非其物或發為氛霧虹蜺光怪之類此天地災異之大者皆生於亂政而考其所發驗以人事往往近其所失而以類至然時有推之不能合者豈非天地之大固有不可知者邪若其諸物種類不可勝數下至細微家人里巷之占有考於人事而合者有漠然而無所應者皆不足道語曰迅雷風烈必變盖君子之畏天也見物有反常而為變者失其本性則思其有以致而為之戒懼雖微不敢忽而已至為災異之學者不然莫不指事以為應及其難合則旁引曲取而遷就其説盖自漢儒董仲舒劉向與其子歆之徒皆以春秋洪範為學而失聖人之本意至其不通也父子之言自相戾可勝歎哉昔者箕子為周武王陳禹所有洪範之書條其事為九類别其説為九章謂之九疇考其説初不相附屬而向為五行𫝊乃取其五事皇極庶徵附於五行以為八事皆属五行歟則至於八政五紀三徳稽疑福極之類又不能附至俾洪範之書失其倫理有以見所謂旁引曲取而遷就其説也然自漢以来未有非之者又其祥眚禍痾之説自其數術之學故略存之庶幾深識博聞之士有以考而擇焉夫所謂災者被於物而可知者也水旱螟蝗之類是已異者不可知其所以然者也日食星孛五石六鷁之類是已孔子於春秋記災異而不著其事應盖慎之也以謂天道逺非諄諄以諭人而君子見其變則知天之所以譴告恐懼脩省而已若推其事應則有合有不合有同有不同至於不合不同則將使君子怠焉以為偶然而不懼此其深意也盖聖人慎而不言如此而後世猶為曲説以妄意天此其不可以𫝊也故考次武徳以来略依洪範五行𫝊著其災異而削其事應云老泉蘇氏曰五行含羅九疇者也五事檢御五行者也皇極裁莭五事者也今夫皇極之建也貌必恭恭作肅言必從從作乂視必明明作哲聽必聰聰作謀思必睿睿作聖如此則五行得其性雨暘燠寒風皆時而五福應矣若夫皇極之不建也貌不恭厥咎狂言不從厥咎僭視之不明厥咎豫聽不聰厥咎急思不睿厥咎蒙如此則五行失其性雨暘燠寒風皆常而六極應矣歆向之惑始於福極分應五事遂强為之説故其失寖廣而有五焉今其𫝊以極之惡福之攸好徳歸諸貌極之憂福之康寧歸諸言極之疾福之壽歸諸視極之貧福之富歸諸聽極之㐫短折福之考終命歸諸思所謂福止此而已所謂極則未盡其弱焉遂曲引皇極以足之劉向五行𫝊云皇之不極厥極弱皇極非五事匹其不建之咎止一極之弱哉其失一也且逆而極順而福𫝊之例也至皇之不極則其極既弱矣吾不識皇之極則天將以何福應之哉若曰五福偕應則皇之不極惡憂疾貧㐫短折曷不偕應哉此乃自廢其例其失二也箕謂咎曰狂僭豫急䝉而已罰曰雨暘燠寒風而已今𫝊又増咎以眊増罰以陰五行𫝊云皇之不極厥咎眊厥罰常陰此其揠聖人之言以就固謬况眊與蒙無異而陰可兼之而别名之得乎其失三也經之首五行而次五事者徒以五行天而五事人人不可以先天耳然五行之逆順必視五事之得失使吾為𫝊必以五事先五行借如𫝊貌之不恭是謂不肅厥咎狂則木不曲直厥罰常雨其餘亦如之察劉之心非不欲爾盖五行盡於思無以周皇極茍如庶驗増之則雖憃亦恠駭矣故離五行五事而為解以蔽其釁其失四也𫝊之於木其説以為貌矣及火土金水則思言視聼殊不及焉自相駮亂其失五也夫九疇之於五行可以條而入者惟二箕子陳之盖有深㫖矣五事一也庶驗二也驗之肅乂哲謀聖一出於五事事之貌言視聽思一出於五行此理之自然可不條而入之乎其他八政五紀三徳稽疑福極其大歸雖無越於五行五事非可條而入之者也條而入非理之自然故其𫝊必鉤牽扳援文致而强附之然後可以僅知此福此極之所以應此事者立言如此其亦勞矣且𫝊於福極既爾則於八政五紀三徳稽疑亦當爾而今又不爾何也經曰五皇極皇建其有極歛時五福用敷錫厥庶民此言皇極建而五福備使經云皇極之不建則必以六極易五福矣焉在其條而入之乎且皇極九疇之尤貴者故聖人位之於中以貫上下譬如庶驗然曰雨曰暘曰燠曰寒曰風曰時時於雨暘燠寒風各冠其上耳又可列之為一驗乎若是則劉之𫝊惑且强眀矣噫𫝊之法二劉唱之班固志之班固敘傳云河圖命庖洛書賜禹八卦成列九疇逌敘春秋之占咎證是舉告往知来王事之表述五行志第七後之史志五行者孰不師而效之世之讀者又孰不從而然之是以膠為一論莫有考正吾得無言哉夾漈鄭氏曰仲尼既沒先儒駕以妖妄之説而欺後世後世相承罔敢失墜者有兩種學一種妄學務以欺人一種妖學務以欺天凡説春秋者皆謂孔子寓褒貶於一字之間以陰中時人使人不可曉解三𫝊唱之於前諸儒從之於後盡推已意而誣以聖人之意此之謂欺人之學説洪範者皆謂箕子本河圖洛書以明五行之㫖劉向創釋其𫝊於前諸史因之而為志於後析天下災祥之變而推之於金木水火土之域乃以時事之吉㐫而曲為之配此之謂欺天之學夫春秋者成周之典也洪範者皇極之書也臣舊作春秋傳専以明王道削去三家褒貶之説所以杜其妄今作災祥略専以記實迹削去五行相應之説所以絶其妖且萬物之理不離五行而五行之理其變無方離固為火矣而離中有水坎固為水矣而坎中有火安得直以秋大水為水行之應成周宣榭火為火行之應乎况周得木徳而有赤烏之祥漢得火徳而有黄龍之瑞此理又如何耶豈其晉厲公一視之逺周單公一言之徐而能關於五行之沴乎豈其晉申生一衣之偏鄭子臧一冠之異而能關於五行之沴乎如是則五行之繩人甚於三尺矣臣竊觀漢儒之説以亂世無如春秋之深災異無如春秋之衆者是不考其實也臣每謂春秋雖三王之亂世猶治於漢唐之盛時何哉春秋二百四十二年而日食三十六唐三百年而日食過百舉春秋地震五漢河平中積二十一日而地百二十四動舉春秋山傾者二漢文帝時一年之間齊楚山二十九所同日圯舉春秋大水者八後漢延平中一月之間郡國三十六大水其他小小災異則二百四十年之事不及後世一年也如李梅冬實鸜鵒来巢之類在後世不勝書使春秋之人而親見後世事豈但慟哭流涕而已哉以春秋視後世不為亂世也何哉後世之法度不及春秋之法度後世之人才不及春秋之人才其所以感和氣而彌災異者又安可望春秋乎嗚呼天地之間災祥萬種人間禍福㝠不可知奈何以一蟲之妖一氣之戾而一一質之為禍福之應其愚甚矣况凶吉有不由於災祥者宋之五石六鷁可以為異矣而内史叔興以為此陰陽之事非吉㐫所生魏安平太守王基筮於管輅輅曰君家有三怪一則生男女墮地走入竈死二則大蛇牀上銜筆三則烏来入室與燕鬭兒入竈者宋無忌之妖蛇銜筆者老書佐之妖烏與燕鬭者老鈴下之妖此三者足以為異而無㐫兆無所憂也王基之家卒以無患觀叔興之言則國不可以災祥論興衰觀管輅之言則家不可以變怪論休咎惟有和氣致祥乖氣致異者可以為通論按古今言災異者始於五行𫝊而歴代史氏所述災異因之然必曰某事召某災證合某應如醫師之脉訣占書之繇辭則其説太牽强而拘泥老泉之論足以正其牽强之失夾漈之論足以破其拘泥之見然鄭論一歸之妖妄而以為本無其事應則矯枉而至於過正矣是謂天變不足畏也不如蘇論之正大云禮記禮運故聖王所以順山者不使居川不使渚者居中原而弗敝也使各安其居不勞敝之也用水火金木飲食必時用水謂漁人以時漁為梁春獻鼈蜃秋獻龜魚也用火謂司爟四時變國火以救時疾及季春出火季秋納火是也用金謂卝人以時取金玉錫石也用木謂山虞仲冬斬陽木仲夏斬陰木飲食謂食齊視春時羮齊視夏時醤齊視秋時飲齊視冬時合男女頒爵必當年徳謂媒氏令男三十而娶女二十而嫁司士稽士任進退其爵禄用民必順不奪農時故無水旱昆蟲之災民無㓙饑妖孽之疾故天不愛其道地不愛其寶人不愛其情言嘉瑞出人情至也故天降膏露地出醴泉山出器車河出馬圖鳯凰麒麟皆在郊棷龜龍在宫沼其餘鳥獸之卵胎皆可俯而窺也器謂若銀甕丹甑也棷聚草也疏按禮緯斗威儀云其政太平山車垂鉤註云山車自然之車埀鉤不揉治而自圎曲也銀甕丹甑援神契云則是無故非有他事使之然也先王能脩禮以逹義體信以逹順故此順之實也歐陽氏五代史王建世家論曰嗚呼自秦漢以来學者多言祥瑞雖有善辯之士不能袪其惑也予讀蜀書至於龜龍麟鳯騶虞之類凡世所謂王者之嘉瑞莫不畢出於其國異哉然考王氏之所以興亡成敗者可以知之矣或以為一王氏不足以當之則視當時天下治亂可以知之矣龍之為物也以不見為神以升雲行天為得志今偃然暴露其形是不神也不上於天而下見於水中是失職也然其一何多歟可以為妖矣鳯凰鳥之逺人者也昔舜治天下政成而民悦命䕫作樂樂聲和鳥獸聞之皆鼓舞當是之時鳯凰適至舜之史因并記以為羙後世因以鳯來為有道之應其後鳯凰數至或出於庸君繆政之時㦯出於危亡大亂之際是果為瑞哉麟獸之逺人者也昔魯哀公出獵得之而不識盖索而獲之非其自出也故孔子書於春秋曰西狩獲麟者譏之也西狩非其逺也獲麟惡其盡取也狩必書地而哀公馳騁所渉地多不可徧以名舉故書西以包衆地謂其舉國之西皆至也麟人罕識之獸也以見公之窮山竭澤而盡取至於不識之獸皆搜索而獲之故曰譏之也聖人已沒而異端之說興乃以麟為王者之瑞而附以符命䜟緯詭怪之言鳯嘗出於舜以為瑞猶有説也及其後出於亂世則可以知其非瑞矣若麟者前有治世如堯舜禹湯文武周公之世未嘗一出其一出而當亂世然則孰知其為瑞哉龜元物也汚泥川澤不可勝數其死而貴於卜官者用適有宜爾而戴氏禮以其在宫沼為王者難致之瑞戴禮雜出於諸家其失亦已多矣騶虞吾不知其何物也詩曰吁嗟乎騶虞賈誼以為騶者文王之囿虞虞官也當誼之時其説如此然則以之為獸者其出於近世之説乎夫破人之惑者難與爭於篤信之時待其有所疑焉然後從而攻之可也麟鳯龜龍王者之瑞而出於五代之際又皆萃於蜀此雖好為祥瑞之説者亦可疑也因其可疑者而攻之庶㡬惑者有以思焉致堂胡氏曰草木之秀異禽獸之珍竒雲物之變動無時無之係時好與不好耳以為祥瑞注意於多有雖元狩之麟神爵之鳯尚可力致盖嘗有好芝草者一日官吏入深山窮谷間覆地皆芝也盖數千萬本遂擇其尤者少取以復命又况智巧之徒能偽造乎花卉可以染植増其態毛羽可以餵飼變其色雖石脉木理猶且假幻使成文字惟上之人泊然無欲於此也茍欲之則四面而至矣漢章帝時以瑞物仍集改元章和而何敞謂宋由袁安曰夫瑞應依徳而至災異縁政而生今異鳥翔於殿屋怪草生於庭際不可不察由安懼不敢答夫二人位冠羣臣乃為謟媚之習蒙蔽之行以侈逸上心使忽忘警戒不亦昧於責難正捄之道乎按古今言祥瑞者詳於禮運而歴代史氏所述祥瑞因之然有無其證而有其應者又有反當為妖而謬以為祥者歐陽公胡氏致堂之論誼正詞偉足以祛千古之惑破諂子之謬故備著之文獻通考卷二百九十五
