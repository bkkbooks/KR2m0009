body:
  text: 文獻通考卷五十鄱陽馬端臨貴與著職官考四門下省門下省後漢謂之侍中寺嘉平六年改侍中寺晉志曰給事黄門侍郎與侍中俱管門下衆事或謂之門下省至齊亦呼侍中為門下領給事黄門侍郎公車太學太醫等令丞及内外殿中監内外驊騮廐散騎常侍給事中奉朝請駙馬都尉等官梁門下省有侍中給事黄門侍郎四人掌侍從儐相盡規獻納糾正違闕監合嘗御藥封璽事後魏尤重北齊門下省掌獻納諫正及司進御之職有侍中給事黄門侍郎各六人綂左右局左右局掌承華閣内諸事尚食知御膳尚藥主御藥尚衣主御衣服殿中領殿中監察駕前奏引行事制諸修補東耕則進耜事隋改為殿内凡六局隋門下省有納言二人給事黄門侍郎四人煬帝三人及散騎常侍諫議大夫等官並掌陪從朝直兼統六局開皇三年罷門下省員外散騎常侍員煬帝即位加給事員廢帝侍諌議等官又改殿内省隷門下省唐龍朔二年改門下省為東臺咸亨初復舊至武太后臨朝光宅初改為鸞臺神龍初復舊聖歴三年四月勅別勅賜物中書門下省官正三品唯二品四品五品開元七年八月初勅中書門下厨新料破用外餘有宜分取開元元年改為黄門省五年復舊有侍中二人黄門侍郎二人給事中四人左散騎二人諌議大夫四人典儀二人起居郎左補闕左拾遺各二人城門郎四人符寳郎四人𢎞文館校書二人其餘小吏各有差宋制門下省在正陽門外西面北廊掌受天下之成事審命令駮正違失受發通進奏狀進請寳印凡中書省畫黄錄黄樞宻院錄白畫㫖則留為底及尚書省六曹所上有法式事皆奏覆審駮之給事中讀侍郎省侍中審進入被㫖畫聞則授之尚書省樞宻院即有舛誤應舉駮者大則論列小則改正凡文書自内降者著之籍章奏至則受而通進俟頒降分送所𨽻官司凡吏部擬六品以下職事官則給事中校其仕歴功狀侍郎侍中引驗審實察非其人則論奏凡遷改爵秩加叙勲封四選擬注奏鈔之事有舛誤退送尚書省覆刑部大理寺所斷獄案審其輕重枉直不當罪則以法駮正之國初循舊制以中書門下平章事為宰相之職復用兩制官一員判門下省事官制行始釐正焉凡官十有一侍中侍郎左散騎常侍各一人給事中四人左諌議大夫起居郎左司諌左正言各一人元祐初左僕射司馬光上言謹按西漢以丞相總百官而九卿分治天下之事光武中興身親庶務事歸臺閣尚書始重而西漢公卿稍以失職矣及魏武佐漢初建魏國置祕書令典尚書奏事文帝受禪改祕書為中書有令有監而亦不廢尚書然中書親近而尚書疎外矣東晉以來天子以侍中常在左右多與之議政事不專任中書於是又有門下而中書權始分矣降及南北朝大體皆循此制唐初始合中書門下之職故有同中書門下三品同中書門下平章事其後又置政事堂蓋以中書出詔令門下掌封駮日有爭論紛紜不決故使兩省先於政事堂議定然後奏聞開元中張説奏改政事堂為中書門下自是相承至於國朝莫之能改非不欲分也理勢不可復分也向日所謂中書者乃中書門下政事堂也唐末諸司使皆内臣領之樞宻使參預朝政始與宰相分權矣降及五代改用士人樞宻使皆天子腹心之臣日與議軍國大事其權重於宰相太祖受命以宰相專主文事參知政事佐之樞宻使專掌武事副使佐之自是以來百有餘年官師相承中外安帖百司長官及諸路監司諸州長吏皆得專達或申奏朝廷或止申中書樞宻院事大則中書樞宻院進呈取㫖降勅劄宣命指揮事小則批狀直下本司本路本州本人故文書簡徑事無留滯神宗皇帝以唐自中葉以後官職繁冗名器紊亂欲革而正之誠為至當然但當據今日之事實考前世之訛謬刪定重複去其冗長必有此事乃置此官不必一依唐之六典分中書為三省令中書取㫖門下覆奏尚書施行凡内降文書及諸處所上奏狀申狀至門下中書省者大率皆送尚書省尚書省下六曹六曹付諸案勘當檢尋文書㑹問事節近則寺監遠則州縣一切齊足然後相度事理定奪歸著申尚書省尚書省送中書取㫖中書既得㫖送門下省覆奏畫可然後飜錄下尚書省尚書省復下六曹方符下諸處以此文字繁冗行遣迂回近者數月遠者踰年未能決絶或四方急奏待報或吏民詞訟求決皆困於留滯又本置門下省欲以封駮中書省錄黄樞宻院錄白恐有未當若令舉職則須日有駮正爭論紛紜執政大臣遂成不叶故自置門下省以來駮議甚少又門下不可得直取㫖行雖有駮議必須却送中書取㫖中書或不捨前見復行改易又内批文字及諸處奏請多降付三省同共進呈則門下之官已經商量奏決若後有駮正則為反復近日中書文字有急速者往往更不送門下省然則門下一官殆為虛設徒使吏員倍多文書繁冗無益於是臣等今衆共商量欲乞依舊令中書門下通同職業以都堂為政事堂毎有政事差除及臺諌官章奏已有聖㫖三省同進呈外其餘並令中書門下官同商議簽書施行事大則進呈取㫖降勅劄事小則直批狀指揮一如舊日中書門下故事并兩省十二房吏人為六房同共㸃檢鈔狀行遣文書若有溢員除揀選留住外並特與減三年出職不及三年應出職者與減磨勘年限若政事有差失委給事中封駮差除有不當委中書舍人封還詞頭又兩省諫官皆得論列則號令之出亦不為不審矣如此則政事歸一吏員不冗文書不繁行遣徑直於先帝所建之官並無所變更但於職業微有修改欲令於事務時宜差為簡便耳石林葉氏曰本朝沿集唐官制始用六典别尚書門下中書為三省各以其省長官為宰相則侍中中書尚書令是也既又以秩高不除故以尚書令之貳左右僕射為宰相而左僕射兼門下侍郎以行侍中之職右僕射兼中書侍郎以行中書令之職而别置侍郎以佐之則三省互相兼矣然左右僕射既為宰相則凡命令進擬未有不由之出者而左右僕射又為之長則出令之職自已身行尚何省而覆之乎方其進對執政無不同則所謂門下侍郎者亦預聞之矣故批㫖皆曰三省同奉聖㫖既以奉之而又審之亦無是理門下省事惟有給事中封駮而已未有左僕射與門下侍郎自駮已奉之命者則侍中侍郎所謂省審者殆成虚文也元祐間議者以詔令稽留吏員冗多徒為重複因有併廢門下省之意後雖不行然事有當奏禀左相必批送中書左相將上而右相有不同往往或持之不上或退送不受左相無如之何侍郎無所用力事權多在中書自中書侍郎遷門下侍郎雖名進其實皆未必樂也致堂胡氏曰古者論一相而止至成王時雖以周公位冡宰然亦與召公同相為左右此尚書之序孔子之言也何者周公不敢自聖獨專相事又將訓後世為人心不同而大賢難得則參錯并用猶驅車猶植屋兼取衆力相輔相正歸於無失而已矣故自漢以來或置左右丞相或並置三公不拘一相之文至唐而法意尤宻既有左右僕射又有侍中中書尚書兩令左右丞及以官未及而人可用者參預朝政而其大綱則俾中書出令門下審駮分為二省而尚書受成頒之有司當貞觀之時君明臣忠朝希粃政不數年坐致太平其集材並用之效如此諸葛武侯曰參署者集衆思廣忠益也若難相違覆曠闕損矣違覆而得中猶棄弊屩而獲珠玉也嗚呼為君如太宗為臣如武侯公心望治可為後世法也若棄數百年成規合三省為一以一相專之而官屬如故略無可否見姓署名是中書門下之名存而基命駮正之實亡矣豈非舞文便私之甚哉按温公所言以三省同取㫖為是盖主於合也致堂所言以三省各振職為是盖主於分也其㫖似異盖門下審覆之説始於唐然唐以中書門下為政事堂則已合而為一矣但門下省之官有給事中任出納王命之事有散騎常侍左右司諌任諌爭闕失之事皆所謂覆審而貞觀時太宗又命諌官隨宰相入閣議事有失輙諌則門下省無不舉職之官矣坐廟堂者商訂於造命之初毋或擅權而好勝居糾駮者審察於出令之後不憚糾過以弼違則上下之間始無曠職而三省之設不為具文固不必為宰相者各據一省顯分爾汝然後謂之稱其職也盖元豐官制之行王珪為首相蔡確為次相確奏乞以首相兼門下侍郎次相兼中書侍郎其實以唐制有中書造命之説於是奏事取㫖皆次相而首相並不得預盖隂傾珪而奪之權及温公為門下侍郎嘗懇確欲數㑹議各盡所見而確終不許此小人擅權之常態於是門下省又以審覆駮正為己任若各逞私意以為舉職則為中書長官者執造命之説而必擯門下使不得預取㫖之權門下長官者執審覆之説而必駮中書已取㫖之事則兩省之分所以使之自為讐敵矣其實兩省屬官既各有司封駮者則都省共同奏事取㫖施行事有不當而後省留黄繳駮乃不易之法侍中侍中者周公戒成王立政之篇所云常伯任以為左右即其任也漢官曰選於侯伯轉補袞闕言其道可常尊故曰常伯周禮有太僕干寳注云若侍中秦為侍中晉志曰黄帝時風后為侍中此皆出於兵家及䜟緯之文不足徵也劉昭釋太尉其義詳矣本丞相史也使五人往來殿内東廂奏事故謂之侍中漢侍中為加官凡侍中左右曹諸吏散騎中常侍皆為加官漢儀注諸吏給事中日上朝謁平尚書奏事分為左右曹所加或列侯將軍卿大夫將都尉尚書太醫太官令至郎中無員將謂郎將以下也自列侯以下至郎中皆得有此加官多至數十人侍中中常侍得入禁中諸曹受尚書事諸吏得舉法漢侍中冠武弁大冠亦曰惠文冠加金璫附蟬為文貂尾為飾侍中服則左貂常侍服則右貂金取堅剛百錬不耗蟬取居髙食潔貂取外勁捍而内温潤此本趙武靈王胡服之制秦破趙得其冠以賜侍中便繁左右與帝升降舊用儒者然貴子弟榮其觀好至乃襁抱坐受寵位貝帶脂粉綺𥜗紈袴鵕䴊冠惠帝時侍中鵕䴊冠貝帶傅脂粉張辟疆年十五桑𢎞羊年十三並為侍中鵕思俊切䴊魚奇切鵕䴊似鳯皇神鳥直侍左右分掌乗輿服物下至䙝器虎子之屬蘇則與吉茂同隠於太白山後則為侍中侍中舊親省起居故謂之執虎子茂見則嘲曰仕進不止執虎子則笑曰誠不能效汝蹇蹇鹿車驅武帝時孔安國為侍中以其儒者特聽掌御唾壺朝廷榮之本有僕射一人秦漢以侍中功髙者一人為僕射後漢光武改僕射為祭酒或置或否而文屬少府掌贊導衆事顧問應對桓帝末侍中皇蟬參乗問貂璫何法不知所出又問地震云不為灾還宫左遷議郎法駕出則多識者一人負國璽操斬白蛇劍參乗餘皆騎在乗􅓅後獻帝即位初置六人贊法駕則正直一人負璽陪乘大駕出則次直侍中䕶駕正直侍中負璽參乘不帶劍餘皆騎從殿内門下衆事皆掌之後選侍中皆舊儒髙徳學識淵懿仰占俯視切問近對喻㫖公卿上殿稱制秉笏陪見舊在尚書令僕射下尚書上司𨽻校尉見侍中執板揖侍中舊與中官俱止禁中因武帝時侍中馬何羅挾刃謀逆由是出禁外有事乃召之畢即出王莽秉政侍中復入與中官止禁中章帝元和中郭舉與後宫通㧞佩刀驚上舉伏誅侍中由是復出外秦漢無定員蔡質漢儀曰員本八人漢官曰無員侍中舍有八區論者因言員本八人其省門題尚書寺此孝明帝治於東宫尚書模也魏晉以來置四人别加官者則非數王粲為侍中曹植集贈粲詩曰戴蟬珥貂朱衣皓帶入侍帷幄出擁華盖御駕登樓與散騎常侍侍中居左常侍居右備切問近對拾遺補闕及江左興寜四年桓温奏省二人後復舊晉武帝時彭權為侍中帝問侍臣髦頭之義何也權曰秦紀云秦國有竒怪獸觸山截波無不崩潰唯畏髦頭故使持之以衞至尊也又褚翼字謀遠為侍中蘇峻作亂王師敗績火及宫室手抱天子登太極殿峻兵入叱翼令下翼不動曰蘇冠軍來覲至尊軍人豈得逼侵宫禁於是兵士不敢上太極殿峻執政猶以為侍中時鍾雅亦為侍中謀奉天子出投義軍事覺為峻所害又王爽為侍中孝武崩王國寳夜欲開門入為遺詔爽拒之曰皇帝晏駕太子未至輙入者斬國寳懼乃止侍中漢代為親近之職魏晉選用稍増華重而大意不異晉任愷字元𠂻為侍中萬機大小多管綜之愷中正以社稷為己任惡賈充之為人不欲久執朝政或為充謀曰愷總門下樞要得與上親接宜啓令典選使得漸疎此一都令史事耳九流難精間隙易乘充因稱愷才能宜在官人之職即日以愷為吏部尚書由是侍覲轉稀武冠絳朝服佩水蒼玉舊遷列曹尚書美遷中領䕶吏部尚書宋文帝元嘉中王華王曇首殷景仁等並為侍中情任親密王華等每與帝接膝共語貂拂帝手㧞貂置案上語畢復手插之孝武時侍中何偃南郊陪乘鑾輅過白門闕偃將匐帝反手接之曰朕反陪卿也又宋孝武代選侍中四人並以丰貌王或與謝莊為一䨇阮韜與何偃為一䨇常充兼假又謝朏字敬仲宋末為侍中及齊受禪之日朏在直百僚陪位侍中當解帝璽朏佯不知傳詔曰解璽授齊王朏曰齊自應有侍中乃引枕卧傳詔懼使稱疾朏曰我無疾何可道遂朝服歩出門得車還宅是日遂以王儉為侍中解璽齊髙祖曰我若誅之彼遂成名乃廢於家永明中復為侍中至梁亦為侍中齊侍中功髙者稱侍中祭酒其朝㑹多以美姿容者兼官欲以陸慧曉為侍中以形短小乃止永元三年東昬南郊不欲親朝士以主璽陪乘前代未嘗有齊有主璽主衣等官梁侍中功髙者在職一年詔加侍中祭酒與散騎侍郎功髙者一人對掌禁令此頗為宰相矣王訓字懐範遷侍中既拜入見武帝問何敬容曰褚彦回年幾為宰相對曰少過三十上曰今之王訓不謝彦回又曰柳慶遠為侍中嘗失火禁中驚懼帝悉歛諸門鑰問柳侍中何在既至悉付之又王峻與謝瀹約官至侍中不復謀仕進陳侍中亦如梁制後魏置六人加官在其數宜都王穆壽廣平公張黎並以侍中輔政北齊侍中亦六人後周初有御伯中大夫二人掌出入侍從屬天官府保定四年改御伯為納言斯侍中之職也宣帝末又别置侍中為加官隋又改侍中為納言置二人煬帝大業十二年又改納言為侍内隋氏諱忠故凡中皆曰内唐初為納言武徳四年改為侍中亦置二人龍朔二年改為左相咸亨元年復舊光宅元年又改為納言神龍元年復為侍中開元元年又改為黄門監五年復為侍中天寳元年改為左相至徳初復為侍中自隋至今皆為宰相舊班正三品大歴二年升為從二品按令文掌侍從負寳獻替贊相禮儀審署奏抄駁正違失監封題給驛劵監起居注總判省事宋制侍中掌佐天子議大政審中外出納之事大祭祀則版奏中嚴外辦導輿輅詔升降之節皇帝齋則請就齋室大朝㑹則承㫖宣制告命成禮祭祀亦如之冊后則奉寳以授司徒以秩髙罕除自建隆至熙寧真拜侍中纔五人雖有他官兼領而實不任其事官制行以左僕射兼門下侍郎行侍中職别置侍郎以佐之元豐寄祿為開府儀同三司容齋隨筆論三省長官見中書令門侍郎門下侍郎秦官有黄門侍郎漢因之劉向與子歆書曰今若年少得黄門侍郎要處也與侍中俱管門下衆事無員郊廟則一人執盖臨軒朝㑹則一人執麾凡禁門黄闥故號黄門其官給事於黄闥之内故曰黄門侍郎初秦漢别有給事黄門之職揚雄為給事黄門後漢併為一官故有給事黄門侍郎掌侍從左右給事中使關通中外及諸王朝見於殿上引王就座無員屬少府又漢舊儀曰屬黄門令日暮入對青瑣門拜故謂之夕郎宫闥簿曰青瑣門在南宫衛瓘注呉都賦曰青瑣户邊青鏤也獻帝初即位置侍中給事黄門侍郎員各六人出入禁中近侍帷幄尚書事後改給事黄門侍郎為侍中侍郎去給事黄門之號旋復故初誅黄門後侍中侍郎出入禁闥機事頗露由是王允乃奏比尚書不得出入不通賓客自此始荀悦為黄門侍郎郭况以后弟小心謙慎年十六為黄門侍郎魏晉以來給事黄門侍郎並為侍衞之官員四入山公啓事曰黄門侍郎和嶠最有才可為吏部郎詔曰欲令在左右更求其次宋制武冠絳朝服多以中書侍郎為之齊亦管知詔令呼為小門下梁増品第與侍中同掌侍從儐相威儀盡規獻納糾正違闕監合嘗御藥封璽書陳制亦然後魏亦有崔光為黄門侍郎未嘗留心文案唯從容論議參贊大政北齊置六人所掌與侍中同後周天官府置御伯下大夫二人武帝改為納言下大夫隋六人屬門下省至煬帝減二人而去給事之名煬帝初嗣位猶以張衡為給事黄門侍郎初劉行本為黄門侍郎文帝嘗怒一郎於殿前笞之行木進諌帝不顧行本乃正當上前曰陛下不以臣不肖置臣左右豈得輕臣而不顧乃置笏於地而退上謝之而原所笞者唐龍朔二年改黄門侍郎為東臺侍郎咸通元年復舊光宅元年改為鸞臺侍郎神龍元年復舊天寳元年改為門下侍郎至徳中復舊舊制正四品至大歴三年又改為門下侍郎升從三品員二人掌侍從署奏抄駁正違失通判省事若侍中闕則監封題給驛劵宋制侍郎掌二侍中之職省中外出納之事大祭祀則前導輿輅詔進止大朝㑹則授表以奏祥瑞冊后則奉節及寳位與知樞密院同知樞密院中書侍郎尚書左右丞為執政官元豐官制行以尚書左僕射兼復置門下侍郎一員以代參知政事中興後宰相罷兼復改門下侍郎為參知政事按以宰相而兼他官本非令典唐制所謂反輕宰相之體是也然時方用兵則兼節度使崇儒學則為大學士急財用則為鹽鐡轉運使盖以國家方重其事而以宰相提綱則下不敢以泛泛之司存視之猶有説也至於三省則俱為政本之地無所不綂長官則宰相所謂中書門下同平章事是也佐官則參知政事是也今元豐改官制既以中書門下同平章事為左右僕射參知政事為中書門下侍郎尚書左右丞矣而復以左僕射兼門下侍郎右僕射兼中書侍郎則是既自有佐官而復以長官兼之贅尤甚矣盖神宗必欲復唐三省之職而蔡確以有中書造命之説已為次相兼中書侍郎王珪為首相兼門下侍郎實欲隂擯珪於門下使不得與造命取㫖之事茍以便其専政之私而不復顧體統名稱之不順也給事中給事中加官也秦置漢因之所加或大夫博士議郎掌顧問應對位次中常侍侍中黄門無員漢官表曰凡侍中左右曹諸吏散騎中常侍皆加官也諸給事中日上朝謁平尚書奏事分為左右曹以有事殿中故曰給事中漢東京省魏代復置或為加官或為正員晉無加官亦無常員在散騎常侍下給事黄門侍郎上武冠絳朝服宋齊𨽻集書省梁陳亦掌獻納省諸聞奏後魏無員北齊亦屬集書省凡六十人後周天官之屬有給事中士六十人掌理六經給事左右其後别置給事中在六官之外隋初無至開皇六年始詔吏部置給事郎凡置八郎説在爵命篇煬帝乃移吏部給事郎為門下之職位次黄門下置員四人以省讀奏案唐武徳三年改給事郎為給事中後定為四員龍朔二年改為東臺舍人咸亨元年復舊常侍從讀署奏抄駁正違失分判省事若侍中侍郎並闕則監封題給驛劵前代雖有給事中之名非今任也今之給事中蓋因古之名用隋之職宋淳化四年詔給事中凡制勅有所不便凖故事封駁九年詔停給事中始以封駁司𨽻銀臺元豐官制行給事中始正其職而封駁司歸門下又詔給事中許書畫黄不書草著為令元祐元年門下中書言後省修成所有省曹寺監條貫以門下中書後省為名從之六年詔駁正事赴執政禀議給事中韓忠彦言朝廷之事執政所行職當封駁則已與執政異當求決於上尚何禀議之有詔從之紹聖四年葉祖洽言兩省置給舍廟堂設施得以更相驗今使舍人兼封駁則給事職廢詔特㫖書讀不回避餘令互書元符三年曽肇言門下駁正中書違失近給事中封駁中書錄黄令舍人書讀隳壞官制宣和元年張叔夜言命令之出中書宣奉門下審讀尚書頒行而密院被㫖亦錄付門下省神宗制也今急速文字不經三省諸房以空黄先次書讀則審讀殆成虛設乞立法禁從之元豐寄祿為通議大夫建炎間因舊制置門下後省以給事中為長官四員為額紹興二年韓世忠賞功文字給事中賈安宅除工部侍郎門下後省闕官乃詔檢正李與權書讀此事亦前所未有岳氏愧郯錄曰唐李藩在𤨏闥以筆塗詔謂之塗歸國朝嚴重此制銀臺既設封駁二字亦許繳奏元豐改官名門下省則有給事中中書省則有中書舍人然中興以後三省合為一均為後省封還或同衘則曰未敢書讀書行否則析之其辭止此而已珂按典故元祐四年五月乙酉權給事中梁燾繳蒲宗孟知虢州及胡宗回范鍔孫升杜天經等放罪罰金指揮其駮文皆曰所有錄黄謹具封還伏乞聖慈特付中書省别賜取㫖施行語意乃與今異以時考之盖官制既行分省治事謹審覆揆議之訓故其制如此耳然元祐之初司馬文正光已嘗乞合三省則是道揆雖一職守仍分至如合二府於一堂列兩省於同局則固不必為是區别斯亦南渡簡易之制也散騎常侍散騎常侍自秦置散騎又置中常侍散騎並乘輿並音歩浪切騎而散從無常職後中常侍得入禁中皆無員漢因之並加官説在侍中篇散騎有常侍侍郎與侍中黄門侍郎後漢中初省散騎而中常侍改用宦者魏文帝黄初初置散騎合於中常侍謂之散騎常侍後用士人始以孟逹補之久次者為祭酒孟逹字子度自蜀降魏魏文帝善逹之姿才容觀以為散騎常侍散騎常侍掌規諌不典事貂璫挿右騎而散從又有員外者因曰員外散騎常侍晋太始中令員外散騎常侍二人與散騎常侍通員直因曰通直散騎常侍亦武冠右貂金蟬絳朝服佩水蒼玉山公啓事曰郄詵才志器局當為黄散黄散謂黄門侍郎及散騎常侍又曰散騎常侍闕當取素行者補之遂舉郄詵又阮孚字遙集為散騎常侍嘗以金貂換酒為所司彈糾帝宥之又曰賈充為常侍後改常侍為侍中未詳其義散騎常侍黄門侍郎共平尚書奏事雖𨽻門下而别為一省潘岳云寓直散騎省自魏至晋共平尚書奏事東晋乃罷之而以中書職入散騎省故散騎亦掌表詔焉傅元為散騎常侍與皇甫陶俱掌直諌又華嶠字叔駿加散騎常侍班同中書寺為内臺中書散騎著作及理禮音律天文數術南省文章門下撰集皆典掌統之宋置四人屬集書省齊散騎侍郎通直散騎侍郎員外散騎侍郎並為直書省職而散騎常侍為東省官其二衞四軍四校為西省官説在將軍總叙篇周盤龍自平北將軍為散騎常侍武帝戲之曰卿著貂蟬何如兠鍪對曰此貂蟬從兠鍪中出耳散騎常侍通直散騎常侍員外散騎常侍舊為顯職與侍中通官其通直員外用衰老人士故其官漸替宋大明中雖革選比侍中而人情久習終不見重㝷復如初梁謂之散騎省天監六年詔又革之六年詔曰在昔晋初仰惟盛化常侍侍中並參帷幄員外常侍特為清顯可分門下二局委散騎常侍侍中並侍帷幄書案奏分曹入集書通直常侍本為顯爵員外之選宜參舊准人數依正員格自是散騎視中丞通直視侍中員外視黄門郎然而常侍終非華胄所悦常侍亦四人功髙者一人為祭酒與侍中功髙者一人對掌禁令糾諸逋違陳因梁制後魏北齊皆為集書省掌諷議左右從容獻納領諸散騎常侍侍郎及諌議大夫給事中等官兼以出入王命位在中書之右魏髙祖謂散騎常侍元景曰卿等自在集書閤省逋墮致使王言違滯起居不修又宋弁為散騎常侍遷右將軍領黄門弁屢讓髙祖曰散騎位在中書之右常侍者黄門之庶兄領軍侍二衞之假攝不足空存推讓而棄大委任其資叙為第三清明毫為常侍加武勇將軍進曰臣本官常侍是第三清今授武勇其號至濁北齊常侍定限八員如金紫光祿大夫隋諸散騎官並屬門下省凡歴代散騎官有郎騎常侍漢書有之顔師古曰官為郎而常侍以侍天子故為郎騎常侍散騎常侍散騎侍郎魏初與散騎常侍同置員外散騎常侍魏末置齊梁用人卑雜又朱异為員外常侍侍中中領軍中書舍人四職並驅鹵簿近代未之有也又賀琛字國寳遷員外散騎常侍舊尚書南座無貂自琛始員外散騎侍郎晋武帝置晋代名家身有國制若起家多為員外散騎侍郎通直散騎常侍按魏末散騎常侍又有在員外者晋太始十年武帝使二人與散騎常侍通員直故謂之通直散騎常侍齊梁微輕北齊張景仁除通直散騎常侍及奏御筆㸃除通直字遂為正常侍通直散騎侍郎初晋武帝置員外散騎侍郎及太興中元帝使一人與散騎侍郎通直故謂之通直散騎侍郎按歴代常侍或有員外者或有通直者故史傳中謂員外散騎侍郎或單謂之員外郎謂通直散騎侍郎或單謂之通直郎其非員外及通直者或謂之正員散騎侍郎或單謂之正員郎唐貞觀二年制諸散騎常侍皆為散官從三品後悉省之貞觀十七年復置為職事官始以劉洎為之其後定制置四員屬門下掌侍從規諌顯慶二年遷二員𨽻中書遂分為左右左屬門下右屬中書左散騎與侍中左貂右散騎與中書令右貂謂之八貂龍朔二年改左右散騎常侍為左右侍極咸亨元年復舊宋散騎常侍不常置與諌議起居司諌正言皆附兩省班籍通謂之兩省官左散騎常侍𨽻門下省右𨽻中書省皆掌諌諍虚不除人亦為檢校官石林葉氏曰元豐既新官制四十年間職事官未有不經除者惟御史大夫左右散騎常侍至今未嘗除人盖兩官為臺諌之長非宰執所利故無有啓之者或云元豐末黄安中為中丞久次神宗欲擢為常侍㑹寢疾不果崇寧中朱聖予為中丞嘗請除二官竟不行按神宗之初行官制也嘗諭輔臣欲取新舊人兩用之又曰御史大夫非司馬光不可蔡確進曰國是方定願少遲之王珪亦助確乃已盖臺諌之長上意必欲取負天下重名如温公者居之尤非小人之便故遂終不除人也諌議大夫秦署諌議大夫掌論議無常員多至數十人屬郎中令至漢武帝元狩五年始更置之劉輔以美才擢為諌議大夫成帝欲立趙媫妤為皇后輔上書諌書奏收輔繫掖庭祕獄又王褒貢禹王吉匡衡何武夏侯勝嚴助等並為之後漢増諌大夫為諌議大夫亦無常員二漢並屬光祿勲韋彪字孟逹上疏曰諌議之職應用公直之士通才謇正有補益於朝者今或從徴試軰為之不宜也自後則無聞矣後魏亦曰諌議大夫北齊有七人屬集書省後周地官府有保氏下大夫規諌於天子盖比其任也隋亦曰諌議大夫置七人屬門下省煬帝廢之唐武徳五年復置屬門下王珪為諌議大夫嘗有諌論太宗稱善遂詔每宰相入内平章大計必使諌官隨入與聞政事龍朔二年改諌議大夫為正諌大夫武后臨朝垂拱二年六月置匭四區共為一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之曰延恩南方夏色赤有能正諌論時政之得失可投書於丹匭銘之曰招諌西方秋色白有能自陳抑屈可投書於素匭銘之曰申寃北方冬色元有能謀智者可投書於元匭銘之曰通元宜令正諌大夫補闕拾遺等一人充使知匭事每日所有投書至暮即進天寳九載三月改匭為獻納至徳元年十月復改為匭後又置諌議大夫屬中書延載元年山人武付方拜正諌大夫平章事開元以來廢正諌大夫復以諌議大夫屬門下凡四人掌侍從規諌至徳元年九月制諌議大夫論事自今以後不須令宰相先知乾元二年四月兩省諌官十日正封事直論得失無假文書冀成殿最用存沮勸大歴七年二月其四員外内供奉不得過正員數貞元四年五月分為左右各四員其右諌議𨽻中書省宋承五代之弊官失其守官職差遣纔以定俸入而不親職諌議大夫司諌正言皆須别降敕許赴諌院供職方為諌官亦有領他職而不與諌諍其由他官領者帶知諌院以兩省官充掌供奉諌諍凡朝廷闕失大則廷議小則上封明道初陳執中為諌官屢請置院於是以門下省為諌院徙舊省於左掖之西司馬光有題名記真宗天禧元年詔兩省置諌官六員不兼職務後復兼職如故詔曰朕大庇烝民隆興至治彌綸闕失交屬於庶僚寤寐忠規屢頒於明詔雖曽虚佇未協翹思夫惟諌諍之臣迨於風憲之列倘因循而自黙則獻納以曷觀况朕躬覽萬機日披封奏詳延百執素靡漏言舉職徇公有何所避保身箝口詎至於斯將戒慢官用申誕告仍加優異以勸傾輸自今兩省置諌官六員御史臺中丞知雜推直外置御史六員並不兼領職務每月添支錢十五貫三年内不得差出其或詔令乖當官曹渉私措置失宜刑賞踰制賦歛繁暴獄犴稽留並令諌官奏論憲臣彈舉每月須一員奏事或有急務亦許非時入對雖言有過當必示曲全若事難顯行即令留内但不得潛為朋附故作中傷其諌官仍於諌院或兩省内選擇廳事量置什器候及三年或屢有章疏實能禆益特越常例别與升遷茍或職業無閒公言罔覩移授散秩仍遣監臨載念古賢不忘忠諌雖逢暴怒尚靡諂辭今則冲人渇聞讜論開懐而待好爵斯縻是為不諱之朝豈有犯顔之慮黜陟之典斷在於必行語黙之端亟從於自擇更資宰府宣布周行慶歴初詔除諌官毋得用見任輔臣所薦之人元豐寄祿為大中大夫始正名左右諌議大夫為諌垣之長專言責焉左𨽻門下右𨽻中書同掌規諌凡朝政闕失大臣至百官任非其人皆得諌正靖康元年詔宰執毋得薦舉臺諌當出親擢立為定制建炎三年詔諌議大夫不𨽻兩省别置局於後省之側許與兩省官相見議事以登聞檢鼓院專𨽻焉又詔臺諌言事官係非時上殿不合在輪對條具之數紹興三年曽統言本朝多以諌議兼記注且聽直前奏事元豐始不任諌列然亦許直前頃者權臣用事言路壅塞詔依元豐舊制容齋隨筆論諌官與臺官舊不相見事見御史臺門紹興間致堂胡氏寄政府書曰古者人臣皆得進諌於其君後世專設一職既已乖謬居是職者又多以立異為心撓亂政事人君難於盡從故員多不備難於盡廢故姑設一二人比諸餼羊惟臺官亦然方祖宗時充臺諌之選者皆天下望士或中外踐更已久無所不知故能有補後世乃以新進利口為之宜其觀望喋喋而莫可遏也然事有隨時官與世建方漢光武唐太宗馬上經營之日與齊小白秦苻堅專任一相以成霸業之時未嘗聞有臺諌官喋喋於其旁誠以三軍五兵之運伐人制勝之謀不可以告人亦非人所能與故也及夫平定之後法制既立則必設置臺臣使糾違犯開通諌諍以補闕失時勢當然耳今宜以給事中兼諌大夫中書舍人兼司諌左右史兼正言政事下省便可救正諌員既廣院額可廢而御史臺只合彈撃官邪與夫壞敗已成憲度者至於政事得失專責大臣與諌者若夫四方訴訟自有州縣監司臺省節次又不得直則有登聞檢鼓兩院存焉憲臺亦非受訟之所也如此則治有體統朝廷增重國勢不搖可以言治按以立異為心以利口為能此諌官之所以使人厭也况處多事之時運籌決勝其機貴密其發貴果尤不宜使好異利口者喋喋其間然欲遂從而廢其官則過矣昔司馬温公言凡擇言事官當以三事為先第一不愛富貴次則重惜名節次則曉知治體此乃名言誠使為諌官皆得如此之人何至如致堂所言哉起居起居周官有左右史記其言事盖今起居之本動則左史書之言則右史書之左史記言右史記事漢武帝有禁中起居後漢馬皇后撰明帝起居注則漢起居似在宫中為女史之任又王莽時置柱下五史秩如御史聼事侍傍記其言行此又起居之職自魏至晋起居注則著作掌之其後起居皆近侍之臣錄記也錄其言行與其勲伐歴代有其職而無其官後魏始置其起居令史每行幸宴會則在御左右記錄帝言及宴賔客訓答後又别置修起居注二人以他官領之北齊有起居省後周有外史掌書王言及動作之事以為國志即起居之職又有著作二人掌綴國錄則起居注著作之任自此而分也至隋初以吏部散官及校書正字有叙述之才者掌起居之職以納言統之至煬帝以為古有内史外史今著作如外史矣宜置起居官以掌其内乃於内史省置起居舍人二員次内史舍人下庾自直崔濬祖虞南蔡允恭等皆為此職唐貞觀二年省起居舍人移其職於門下置起居郎二人顯慶中復於中書省置起居舍人遂與起居郎分掌左右龍朔三年改為左右史郎為左史舍人為右史咸亨元年復舊天授元年又為左右史神龍初復舊每皇帝御殿則對立於殿左郎右舍人矣有命則臨陛俯聼退而書之以為起居注凡冊命啟奏封拜薨免悉載之史館得之以撰述焉令狐徳棻吕才蕭鈞禇遂良上官儀李安期顧允髙智周張大素凌季友等並以起居皆有名之賢者宋沿唐制起居郎𨽻門下起居舍人𨽻中書號小兩省官皆為虚名不典本省事而典職者自號修起居注凡二人多以館閣官兼掌更番侍立於崇政殿又從行幸以備記錄國初院在皇城外但關敕送史館而不譔集淳化五年史館修撰張佖上書請依故事復左右史之職為起居注乃詔從置院於禁中命起居舍人史館修撰梁周翰祕書丞直昭文館李宗諤掌起居郎舍人事通撰注記凡宣徽客省四方館閣門御前忠佐引見司制置進貢辭謝游幸宴㑹賜賚恩澤之事五日一報翰林麻制徳音詔書敕榜該沿革制置者門下中書省封冊告命進奏院四方官吏風俗善惡之奏禮賓院諸蕃職貢宴勞賜賚之事並十日一報吏部文官除拜選調沿革兵部武臣除授司封封建考功諡議行狀户部土貢旌表州縣廢置刑部法令沿革禮部奏賀祥瑞貢舉品式祠部祭祀畫日道釋條制太常雅樂沿革禮院禮儀制撰司天風雲氣候祥異證驗宗正皇屬封建出降宗廟祭享制度並月終而報鹽鐡金穀增耗度支經費出納户部版圖升降咸歳終而報每季譔集以送史館是歳令審刑院奏覆有所諭㫖可垂戒者並錄送院熙寧初詔諌官兼修注者因後殿侍立許奏事元豐中兼修注王存乞復起居郎舍人之職使得盡聞明天子徳音退而書之神宗亦謂人臣奏對有頗僻讒慝者若左右有史官書之則無所肆其姦矣故事左右雖日侍立而欲奏事必禀中書俟㫖存因對及之乃詔雖不兼諌職者亦許直前奏事五年官制行罷修注而郎舍人始專其職四朝志起居郎舍人掌記天子言動御正殿則俟於門廡外便殿則侍立行幸則從大朝會則對立於殿下螭首之側凡朝廷命令赦宥禮樂法度損益因革賞罰勸懲羣臣進對文武臣除授及祭祀燕享臨幸引見之事四時氣候四方符瑞户口增減州縣廢置皆書以授著作官六年詔左右史分記言動元祐元年仍詔不分七年詔邇英閣講罷續有留身奏事者許侍立紹聖元年中丞黄履言所奏或干機宻難令旁立乃止會要隆興元年胡銓奏記注之失有四一人主不當觀史國朝梁周翰以起居注每月進御慶歴中歐陽修乞更不進木仁宗從之今望遵仁宗所行之訓二立非其地國朝記注之臣立於座後歐陽修謂當人主言動而書乃立於前修罷復故今乃立於殿之東南隅言動不聞乞復歐陽修之制三前殿不立國朝古制前後殿皆侍立而前殿不立又左右司分日而立無言動之異欲乞於前後殿皆分日侍立四奏不直前臣欲直前奏事閣門以不預牒却之嘗預牒矣又以無班為詞是雖有直前名而無可奏之時矣乞左右史奏事直前不必預牒及有無班次為拘也詔前殿依後殿侍立餘並依舊制淳熙間羅春伯㸃自户部員外郎除右史避曽祖諱以太常少卿兼侍立修注官其後兩史或闕則降㫖以某人權侍立官蓋自此始元豐寄祿起居舍人為朝散郎拾遺補闕補闕拾遺武太后垂拱中置補闕拾遺二官以掌供奉諷諌天授二年各増置通前為五員三年舉人無賢愚咸加擢用髙者試鳯閣侍郎給事中次或試員外郎侍御史補闕拾遺校書郎當時頗為濫雜著於謡誦謡曰補闕連車載拾遺平斗量杷推侍御史椀脱校書郎自開元以來尤為清選左右補闕各二人内供奉者各一人左右拾遺亦然兩省補闕拾遺凡十二人左屬門下右屬中書宋端拱初改左右補闕為左右司諌左右拾遺為左右正言是時太宗欲令諌官修職故詔改其官後亦有兼他官不供諌職者真宗天禧初詔兩省置諌官不兼職用劉燁魯宗道為左右正言元豐肇新官制左右司諌各一人正七品左右正言各一人從七品同掌規諌諷諭凡朝廷有闕失大事則廷諍小事則論奏分𨽻兩省寄祿左右司諌為朝奉郎左右正言為承議郎中興初詔不𨽻兩省紹興二年復淳熙十五年兵部侍郎林栗奏言諌諍之官尚有闕員居其位者往往分行御史之職至於箴規闕失寂無聞焉願依唐制置拾遺補闕左右各一員専掌諌諍不許糾彈從之以許深父薛象先充其職班著在監察御史之上光宗立復省典儀典儀二人唐置周禮秋官有司儀上士八人中士十六人盖此典儀之任齊職儀云東宫殿中將軍屬官有導客局置典儀錄事一人掌朝㑹之事梁有典儀之職未詳何曹之官掌唱警唱奏之事朱服武冠陳亦有之後魏置典儀監史闕其員及所掌唐初𨽻門下省初用人皆輕至貞觀李義府為之是後常用士人領贊者以知贊唱之節及殿庭版位之次城門郎周禮地官有司門下大夫一人上士四人並城門郎之任初漢置城門校尉員一人掌城門屯兵有司馬及丞各一人十二城門候各一人出從緹騎百二十人緹徒兮切盖兼監門將軍之職魏因之晋制銀章青綬絳朝服武冠佩水蒼玉元帝省之宋齊俱以衞尉掌宫城屯兵及管鑰之事梁陳二代依秦漢以光祿卿等掌宫殿門户亦無城門之職後魏置城門校尉北齊衞尉寺統城門寺置城門校尉二人掌宫殿城門并諸倉庫管鑰之事後周地官府置宫門上士一人下士一人掌皇城十二門之禁令盖並在其任隋氏門下省統城門局校尉二人煬帝大業三年又𨽻殿中省十二年又減一人後又改校尉為城門郎置四人又𨽻門下省唐因之符寳郎周官有典瑞掌節二官掌瑞節之事瑞節信也典瑞屬春官掌節屬地官秦漢有符節令丞領符璽郎昭帝幼冲霍光秉政殿中夜驚光召求符璽符璽郎不肯授光奪之郎按劔對曰臣頭可得璽不可得也光壯之增秩二等文帝二年初與郡守為銅虎符竹使符之制又皆屬焉應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之竹使符者以竹箭五枚長五寸鐫刻篆書第一至第五顔師古曰符與郡守各分其半右則留京師左以與之後漢有符節令兩梁冠位次御史中丞别為一臺而符節令一人為臺率掌符節之事屬少府魏與後漢同晋太始元年省并蘭臺置符節御史掌其事宋與晋齊蘭臺有主璽令史以治書侍御史領之梁陳御史臺亦有符節令史後魏御史臺領符節令符節令領符璽郎中北齊有符節署餘與後魏同符節令一人符璽郎中四人後周有主璽下士掌國璽之藏隋初有符璽局置監二人屬門下省煬帝改監為郎唐因之長慶三年改為符寶郎神龍初復為符璽郎開元初復為符寶郎天寶五載六月勅玉璽既為寶宜為璽書十載正月改傳國寶為承天大寶其符節並納於宫中有行從則請之郎掌諸進符寶出納幡節也𢎞文館唐武徳初置修文館後改名𢎞文館神龍初改為昭文二年又却為修文尋又為昭文開元七年又詔𢎞文焉儀鳯中以館中多圖籍未詳正委學士校理自垂拱以來多大臣兼領館中有四部書自貞觀初褚亮檢校館務學士號為館主因為故事毎令給事中一人判館事校書二人學生三十人宋改為昭文館以𢎞犯宣祖諱大學士一人以宰相充學士直學士不常置直館以京朝官充掌經史子集四庫圖籍修寫校讎之事判官一人以兩省五品以上充文獻通考卷五十
