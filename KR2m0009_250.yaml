body:
  text: 文獻通考卷二百五十鄱陽馬端臨貴與著帝系考一帝號歴年黃帝少典之子姓公孫名軒轅生於壽邱神農氏世衰諸侯相侵伐蚩尤最暴黃帝徵師諸侯擒殺蚩尤諸侯尊黃帝為天子在位百年崩年百一十歲帝顓頊高陽黃帝之孫昌意之子繼黃帝為天子在位七十八年崩年九十八歲帝嚳高辛黃帝之曾孫元囂之孫蟜極之子繼顓頊為天子在位七十年崩年百五歲帝堯帝嚳之子姓伊祁名放勲帝嚳崩而長子摯代立封堯為唐侯帝摯立不善在位九年唐侯徳盛乃禪位於唐侯堯以甲辰即位都平陽號陶唐氏在位七十年薦舜攝政又二十八年崩在位九十八年壽一百一十八首甲辰盡癸未帝舜顓頊七世孫瞽䏂之子姓姚氏名重華年三十堯舉之年五十攝行天子事年五十八堯崩年六十一以丙戌歲代堯踐帝位都蒲阪號有虞氏三十一年以丁巳歲禪於禹又八年崩壽一百歲首丙戍盡癸亥夏禹顓頊之孫鯀之子姓姒氏名文命治水有功舜使宅百揆年七十三以丁巳歲受舜禪即天子位都平陽安邑在位二十七年癸未崩壽百歲啟禹子以甲申嗣位九年壬辰崩太康啟子以癸巳嗣位二十九年辛酉以盤遊無度為有窮后羿距於河失邦而崩仲康太康子以壬戍嗣位十三年甲戌崩帝相仲康子以己亥嗣位二十八年壬寅為羿所弑寒浞殺羿并滅相相之臣靡逃於有鬲氏相之后還於有仍氏生少康至四十一年壬午靡自有鬲氏滅寒浞而立少康少康相子以壬午滅寒浞嗣立二十二年癸卯崩帝杼少康子以甲辰嗣立十七年庚申崩帝槐杼子以辛酉嗣立二十六年丙戌崩帝芒槐子以丁亥嗣立十八年甲辰崩帝泄芒子以乙巳嗣立十六年庚申崩帝不降泄子以辛酉嗣立五十九年己未崩帝扄不降子以庚申嗣立二十一年庚辰崩帝厪扄子以辛巳嗣立二十一年辛丑崩帝孔甲厪子以壬寅嗣立三十一年壬申崩帝臯孔甲子以癸酉嗣立十一年癸未崩帝發臯子以甲申嗣立十九年壬寅崩帝履癸是為桀以癸卯嗣立四十三年乙未以失道為殷湯所伐戰於鳴條師敗湯放之南巢夏亡右夏一十七世共四百五十九年首丁巳盡乙未内寒浞篡位四十一年殷湯契之十四世孫姓子氏名履以夏桀之三十五年丁丑即諸侯位自商邱徙都亳以乙未代桀滅夏即天子位十三年丁未崩壽百歲太甲湯孫以戊申嗣立三十三年庚辰崩沃丁太甲子以辛巳歲嗣立二十九年己酉崩太庚沃丁弟以庚戌嗣立十五年甲戌崩小甲太庚子以乙亥嗣立十七年辛卯崩雍巳小甲弟以壬辰嗣立十一年癸卯崩大戊雍巳弟以甲辰嗣立七十五年戊午崩仲丁大戊子以己未嗣立十三年辛未崩外壬仲丁弟以壬申嗣立十五年丙戌崩河亶甲外壬弟以丁亥嗣立九年乙未崩祖乙河亶甲子以丙申嗣立十九年甲寅崩祖辛祖乙子以乙卯嗣立十六年庚午崩沃甲祖辛弟以辛未嗣立二十五年乙未崩祖丁沃甲兄以丙申嗣立三十二年丁卯崩南庚沃甲子以戊辰嗣立二十五年壬辰崩陽甲祖丁子以癸巳嗣立七年己亥崩盤庚陽甲弟以庚子嗣立二十八年丁卯崩小辛盤庚弟以戊辰嗣立二十一年戊子崩小乙小辛弟以己丑嗣立二十八年丙辰崩武丁小乙子以丁巳嗣立五十九年乙卯崩祖庚武丁弟以丙辰嗣立七年壬戌崩祖甲祖庚弟以癸亥嗣立三十三年乙未崩廩辛祖甲子以丙申嗣立六年辛丑崩庚丁廩辛弟以壬寅嗣立二十一年壬戌崩武乙庚丁子以癸亥嗣立四年丙寅崩太丁武乙子以丁卯嗣立三年己巳崩帝乙太子子以庚午嗣立三十七年丙午崩受辛帝乙子是為紂以丁未嗣立無道三十二年戊寅周武王伐之戰於牧野師敗受死殷亡右殷二十八世共六百四十五年首乙未盡戊寅周武王后稷十六世孫文王之子姓姬氏名發以商紂二十三年己巳嗣為西伯至己卯勝殷殺受即天子位七年乙酉崩壽九十三成王名誦武王子以丙戌嗣立三十七年壬戌崩歲四十四歲康王名釗成王子以癸亥嗣立二十六年戊子崩昭王名瑕康王子以己丑嗣立五十一年己卯崩穆王名滿昭王子以庚辰嗣立五十五年甲戌崩共王名繄扈穆王子以乙亥嗣立十二年丙戌崩懿王名囏共王子以丁亥嗣立二十五年辛亥崩孝王名辟方共王弟以壬子嗣立十五年丙寅崩夷王名燮懿王子以丁卯嗣立十六年壬午崩厲王名胡夷王子以癸未嗣立三十七年無道為國人所逐出奔彘周召二伯行政謂之共和十五年癸酉崩於彘宣王名靜厲王子以甲戌嗣立四十六年己未崩幽王名宮湼宣王子以庚申嗣立無道十一年庚午為犬戎所伐敗死平王名宜臼幽王子以辛未嗣立五十一年辛酉崩桓王名林平王孫以壬戌嗣立二十三年甲申崩莊王名佗桓王子以乙酉嗣立十五年己亥崩釐王名胡齊莊王子以庚子嗣立五年甲辰崩惠王名閬釐王子以乙巳嗣立二十五年己巳崩襄王名鄭惠王子以庚午嗣立三十二年壬寅崩頃王名壬臣襄王子以癸卯嗣立六年戊申崩匡王名班頃王子以己酉嗣立六年甲寅崩定王名瑜匡王弟以乙卯嗣立二十一年乙亥崩簡王名夷定王子以丙子嗣立十四年己丑崩靈王名泄心簡王子以庚寅嗣立二十七年丙辰崩景王名貴靈王子以丁巳嗣立二十五年辛巳崩子猛立為悼王王子朝殺猛代立晉逐子朝立敬王敬王名丐景王子以壬午嗣立四十四年乙丑崩元王名仁敬王子以丙寅嗣立六年辛未崩貞定王名介元王子以壬申嗣立二十八年己亥崩太子去疾立為哀王王叔襲殺之代立為思王思王以庚子嗣立為其弟少隗所殺考王名少隗以辛丑嗣立十六年乙卯崩威烈王名午考王子以丙辰嗣立二十四年己卯崩安王名驕威烈王子以庚辰嗣立二十六年乙巳崩烈王名喜安王子以丙午嗣立七年壬子崩顯王名扁烈王弟以癸丑嗣立四十八年庚子崩愼靚王名定顯王子以辛丑嗣立六年丙午崩赧王名延愼靚王子以丁未嗣立五十九年乙巳為秦所攻王奔秦盡獻其邑三十六秦受之是歲王崩周亡右周三十七世共八百六十七年首己卯盡乙巳内共和行政十五年自周亡至秦始皇滅六國稱皇帝以前首丙午盡己卯共三十四年秦始皇伯翳之後莊襄王之子母呂不韋姬姓嬴氏名政以周亡後九年甲寅嗣立為秦王立二十六年庚辰盡滅六國稱始皇帝後十二年辛卯崩二世皇帝名胡亥始皇少子以壬辰嗣立三年甲午為趙高所弑立二世兄子嬰乙未漢高祖入秦子嬰降秦亡右秦二世共十五年首庚辰盡甲午漢太祖高皇帝沛豐邑中陽里人姓劉氏名邦父太公母媪以秦二世元年壬辰年三十起兵為沛公乙未入關滅秦為漢王五年己亥滅項籍即皇帝位都長安十二年丙午崩壽五十三孝惠皇帝名盈高祖太子母呂后以丁未嗣立時年十七在位七年癸丑崩壽二十四呂太后取後宮子以為帝子立之太后臨朝稱制九年辛酉呂后崩諸呂作亂大臣誅之立文帝太宗孝文皇帝名恒高祖中子母薄姬年五歲立為代王二十三歲辛酉太尉周勃等迎立為皇帝在位二十三年甲申崩壽四十六孝景皇帝名啟文帝太子母竇皇后三十二歲乙酉嗣立在位十六年庚子崩壽四十八世宗孝武皇帝名徹景帝中子母王美人十六歲嗣立在位五十四年甲午崩壽七十一改元十一建元六元鼎六元光六元封六元朔六太初四元狩六天漢四太始四征和四後元二孝昭皇帝名弗陵武帝少子母趙偼伃八歲乙未嗣立在位十三年丁未崩壽二十二改元三始元六元鳯六元平一中宗孝宣皇帝名詢武帝曾孫戾太子孫史皇孫子母王夫人昭帝崩無嗣大將軍霍光立昌邑王賀賀無道廢之更立帝時年十八丁未嗣立在位二十五年壬申崩壽四十三改元七本始四甘地節四黄元康四鳯四露四龍一神爵四五高宗孝元皇帝名奭宣帝太子母許皇后年二十七癸酉嗣立在位十六年戊子崩壽四十三改元四初元五永光五建昭五竟寧一孝成皇帝名驁元帝太子母王皇后年二十己丑嗣立在位二十六年甲寅崩壽四十六改元七建始四元河平四綏陽朔四始四延四和二鴻嘉四永孝哀皇帝名欣元帝庶孫定陶恭王子母丁姬成帝無子立為太子年二十乙卯嗣立在位六年庚申崩壽二十六改元二建平四元壽二孝平皇帝名衎元帝庶孫中山孝王子母衞姬哀帝崩無子太皇太后遣使迎立之年九歲辛酉嗣立在位五年乙丑為王莽所鴆崩壽十四改元一元始五王莽立孺子嬰自為攝皇帝三年至戊辰莽篡位右西漢十二帝共二百一十四年始乙未盡戊辰王莽以己巳篡位稱新室十五年癸未為漢兵所誅淮陽王劉元立二年為赤眉所滅莽元共十六年改元四建國五天鳯六地皇三更始二東漢世祖光武皇帝名秀南陽人高祖九世孫父南頓令欽帝以王莽簒位之十四年壬午起兵乙酉卽皇帝位遷都洛陽時年二十九在位三十三年丁巳崩壽六十二改元二建武三十一中元二顯宗孝明皇帝名莊光武第四子母陰皇后年三十以戊午嗣立在位十八年乙亥崩壽四十八改元一永平十八肅宗孝章皇帝名炟顯宗第五子母賈貴人年十九以丙子嗣立在位十三年戊子崩壽三十三改元三建初八元和三章和二孝和皇帝名肇肅宗第四子母梁貴人年十歲以己丑嗣立在位十七年乙巳崩壽二十七改元二永元十六元興一孝殤皇帝名隆和帝少子生始百日嗣立丙午崩壽二歲改元一延平元恭宗孝安皇帝名祐肅宗孫父淸河孝王母左姬殤帝崩太后立為孝和皇帝嗣年十三以丁未嗣立在位十九年乙丑崩壽三十二改元五永初七光四元初六永寧一建光一延孝順皇帝名保安帝子母李氏年十一以丙寅嗣立在位十九年甲申崩壽三十改元五永建六康一陽嘉四永和六漢安二建孝冲皇帝名炳順帝子母虞貴人年二歲以乙酉嗣立一年崩壽三歲改元一永嘉元孝質皇帝名纘肅宗元孫父渤海孝王母陳夫人冲帝崩皇太后詔嗣立時年八歲在位一年為梁冀所鴆崩年九歲改元一本初元孝桓皇帝名志肅宗曾孫父蠡吾侯翼母匽氏質帝崩太后與梁冀迎立之年十五歲以丁亥嗣立在位二十一年丁未崩壽三十六改元七建和三延和平二永元嘉一夀三熹九康一永興二永孝靈皇帝名宏肅宗元孫父解瀆亭侯母董夫人桓帝崩無子皇太后迎立之時年十二以戊申嗣立在位二十一年戊辰崩壽三十四改元四建寧四熹平六光和六中平六孝獻皇帝名協靈帝中子母王美人靈帝崩董卓廢少帝為𢎞農王立帝年九歲以己巳嗣立在位三十二年以庚子禪位於魏後十三年壬子崩壽五十四改元四初平四興平二建安二十四延康一右東漢十二帝共一百九十六年首乙酉盡庚子蜀漢昭烈皇帝名備涿郡涿縣人景帝子中山靖王勝之後父𢎞以建安十九年甲午取蜀二十四年己亥稱漢中王辛丑卽皇帝位三年癸卯崩壽六十三改元一章武三後主名禪昭烈帝子年十七以甲辰嗣立在位四十一年為魏所滅改元四建興十五延熙二十景耀六炎興元右蜀漢二帝共四十三年首辛丑盡癸未魏文帝沛國譙人姓曹氏名丕武王太子以庚子受漢禪卽皇帝位時年三十三在位七年丙午崩壽四十改元一黃初七明皇帝名叡文帝太子年二十二以丁未嗣立在位十三年己未崩壽三十五改元三太和六靑龍四景初三齊王名芳明帝養為子年九歲以庚申嗣立在位十四年癸酉為司馬師所廢時年二十三改元二正始九嘉平五高貴鄉公名髦文帝孫東海定王霖子司馬師旣廢齊王迎立之年十四以甲戌嗣立在位六年己卯以討司馬昭不克遇弑年二十改元二正元二甘露四陳留王名奐武帝孫燕王宇子司馬昭旣弑高貴鄉公迎立之年十五以庚辰嗣立在位五年乙酉禪於晉改元二景元四咸熙二右魏五帝共四十六年首庚子盡乙酉吳大帝吳郡富春人姓孫氏名權長沙太守堅之子討逆將軍策之弟漢末封吳王及魏王丕簒逆權以辛丑歲稱帝在位三十一年辛未崩壽七十一改元六黃武七太元一黃龍三神鳯一嘉禾六赤烏十三會稽王名亮大帝少子以壬申年嗣立在位六年為權臣孫綝所廢庚辰歲亮以謠言自殺時年十六改元三建興二五鳯二太平二景帝名休大帝第六子會稽王亮之兄初封瑯琊王戊寅歲孫綝廢亮迎而立之在位六年甲申歲崩時年三十改元一永安六歸命侯名皓大帝之孫太子和之子初封烏程侯景帝崩吳人迎而立之晉咸寧末武帝令將軍王濬等率兵伐之皓戰敗詣軍門請降太康元年徙皓洛陽封歸命侯在位十七年壽四十改元八元興一天甘露一天寶鼎三天建衡三凰三冊一璽二紀四鳯右吳四帝共六十年首辛丑盡庚子晉世祖武皇帝河内温縣孝敬里人姓司馬氏名炎宣王之孫文王之子以乙酉受魏禪卽皇帝位時年二十九在位二十六年庚戌崩壽五十五改元三泰始十咸寧五泰康十孝惠皇帝名𠂻武帝第二子以庚戌嗣立時年三十一在位十七年丙寅崩壽四十八改元七永熙一永元康九光永康一安二興二熙一永寧一太孝懷皇帝名熾武帝第二十五子惠帝時立為皇太弟帝崩以丙寅嗣立時年二十三在位五年辛未劉曜石勒兵陷洛陽蒙塵於平陽壬申遇害壽三十改元一永嘉五孝愍皇帝名鄴武帝孫吳孝王晏之子洛陽傾覆奔長安衆推為太子懷帝崩以癸酉卽位時年十三在位四年丙子劉曜陷長安丁丑遇害壽十八改元一建興四右西晉四帝共五十二年首乙酉盡丙子元皇帝名睿宣帝曾孫瑯琊恭王覲之子襲封鎭建鄴愍帝遇害以丁丑嗣立時年四十一在位六年壬午崩壽四十七改元三建武一太興四永昌一明皇帝名紹元帝太子以癸未嗣立時年二十四在位三年乙酉崩壽二十七改元一太寧三成皇帝名衍明帝太子以丙戌嗣立時年五歲在位十七年壬寅崩壽二十二改元二咸和九咸康八康皇帝名岳成帝母弟以癸卯嗣立時年二十在位二年甲辰崩壽二十二改元一建元二穆皇帝名聃康帝子以乙巳嗣立時年二歲在位十七年辛酉崩壽十九改元二永和十二升平五哀皇帝名丕成帝子以壬戌嗣立時年二十一在位四年乙丑崩壽二十五改元二隆和一興寧三廢帝名弈哀帝母弟哀帝崩皇太后詔立之以丙寅嗣立時年二十四在位六年辛未桓溫廢之改元一太和五簡文皇帝名昱元帝少子封會稽王桓溫旣廢海西公迎立之以辛未嗣立時年五十一在位二年壬申崩壽五十三改元一咸安二孝武皇帝名曜簡文帝子以癸酉嗣立時年十一在位二十四年丙申崩壽三十五改元二寧康三太元二十一安皇帝名德宗孝武帝長子以丁酉嗣立時年十五在位二十二年戊午崩壽四十一改元三隆安五元興三義熙十四恭皇帝名德文安帝母弟以己未嗣立時年三十四在位二年庚申禪位於宋遇害壽三十六改元一元熙二右東晉十一帝共一百有四年首丁丑盡庚申宋高祖武皇帝彭城綏輿里人姓劉氏名裕以庚申受晉禪卽皇帝位時年五十七在位三年壬戌崩壽六十改元一永初三少帝名義符武帝長子以壬戌嗣立時年十七在位二年癸亥徐羡之等廢弑之壽十九改元一景平二太祖文皇帝名義隆武帝第三子封宜都王少帝廢大臣迎立之以甲子嗣立時年十六在位三十年癸巳為元凶劭所弑壽四十六改元一元嘉三十世祖孝武皇帝名駿文帝第三子封武陵王元凶劭弑逆入討賊以甲午嗣立時年二十四在位十一年甲辰崩壽三十五改元二孝建三大明八前廢帝名子業孝武帝長子以甲辰嗣立時年十六在位一年荒滛無道遇弑壽十七改元一景和元太宗明皇帝名彧文帝第十一子封淮陽王廢帝遇弑以乙巳嗣立時年二十六在位八年壬子崩壽三十四改元二泰始七泰豫一後廢帝名昱明帝太子以癸丑嗣立時年二十一在位四年丁巳以無道遇弑年二十五改元一元徽四順皇帝名凖明帝第三子封安成王廢帝殞蕭道成奉太后令立之以丁巳嗣立在位三年以己未禪於齊遇害壽十歲改元一昇明三右宋八帝共六十年首庚申盡己未齊太祖高皇帝東海蘭陵郡人姓蕭名道成以已未歲受宋禪卽皇帝位時年五十二在位四年壬戍崩壽五十六改元一建元四世祖武皇帝名賾高帝長子以壬戌嗣立時年四十二在位十二年癸酉崩壽五十四改元一永明十一廢帝名昭業武帝長孫立為太孫以癸酉嗣立為西昌侯鸞廢而弑之二十二歲再立海陵王昭文復廢之改元二隆昌延興高宗明皇帝名鸞始安貞王道生之子旣廢二帝以甲戌嗣立時年四十二在位五年戊寅崩壽四十七改元二建武四永泰一廢帝名寶卷明帝第二子以己卯嗣立時年十六立三年辛巳無道遇弑壽十九改元一永元三和帝名寶融明帝第八子以辛巳嗣立禪於梁遇害壽十五改元一中興元右齊六帝共二十二年首已未盡辛巳梁高祖武皇帝南蘭陵中都里人姓蕭氏名衍以壬午歲受齊禪時年三十五在位四十八年己巳崩壽八十三改元七天監十八一普通七同大通二淸中大通六大同十中大一太三太宗簡文皇帝名綱武帝第三子昭明太子薨立為太子以己巳嗣立三年辛未侯景廢而弑之壽四十九改元一大寶三世祖孝元皇帝名繹武帝第七子封湘東王侯景簒立王僧辨等起兵討誅景以壬申嗣立在位三年甲戌為西魏所滅遇害壽四十七改元一承聖三敬皇帝名方智元帝第九子封晉安王魏克江陵陳霸先等迎立之以乙亥嗣立在位三年丁丑禪於陳遇害壽十六改元二紹泰一太平二右梁四帝共五十六年首壬午盡丁丑陳高祖武皇帝吳興長城下若里人姓陳氏名霸先以丁丑受梁禪時年五十四在位三年己卯崩壽五十七改元一永定三世祖文皇帝名蒨武帝兄始興昭烈王之長子武帝受禪為臨川王以庚辰嗣立七年丙戍崩壽四十五改元二天嘉六天康一廢帝名伯宗文帝長子以丙戌嗣立在位三年戊子安成王頊廢之而自立未幾伯宗崩壽十九改元一光太二高宗宣皇帝名頊始興昭烈王次子以戊子嗣立時年四十在位十三年壬寅崩改元一太建十三後主名叔寳宣帝太子以壬寅嗣立年三十在位七年己酉隋滅之改元二至徳四禎明三右陳五帝共三十三年首丁丑盡己酉後魏太祖道武皇帝其先世為代北鮮卑君長姓拓䟦氏名珪以丙戌即代王位郊天改元時晉孝武太元十一年十三年戊戌取燕即帝位又十二年己酉為拓䟦紹所弑壽三十九改元四登國十皇始二天興六天賜四太宗明元皇帝名嗣道武帝子以己酉嗣立在位十五年癸亥崩壽三十二改元三永興五神瑞二泰常八世祖太武皇帝名燾明元帝長子以甲子嗣立在位二十九年壬辰為宗愛所弑壽四十五改元六始光四十神䴥四平太延五平眞君一正二延和三太高宗文成皇帝名濬太武帝嫡孫以壬辰嗣立在位十四年乙巳崩壽十六改元三興安三興光五和平六顯祖獻文皇帝名𢎞文成帝長子以乙巳嗣立在位七年辛亥禪位於太子宏又五年丙辰崩壽二十三改元二天安二皇興五高祖孝文皇帝名宏獻文帝太子以辛亥受禪在位二十九年己卯崩壽三十三改元三延興四承明三太和二世宗宣武皇帝名恪孝文第二子為皇太子以己卯嗣立在位十七年乙未崩壽三十三改元四景明四正始四永平四延昌四肅宗孝明皇帝名詡宣武帝第二子以乙未嗣立在位十四年戊申崩壽十九改元五熙平二泰三神龜二正光五孝昌二武敬宗孝莊皇帝名子攸彭城王勰第二子封長樂王明帝崩爾朱榮立之以戊申嗣立三年庚戌誅爾朱榮為其黨所弑壽二十四改元一永安三節閔帝名恭廣陵惠王羽之子少襲爵爾朱世隆旣弑敬宗迎立之以辛亥嗣立一年壬子高歡廢而弑之壽二十四改元一普嘉孝武皇帝名修廣平武穆王懷之子封平陽王高歡旣廢節閔奉渤海太守元朗為帝後廢之而立帝以壬子嗣立在位三年至甲寅西奔長安崩壽二十五改元一永熙三孝靜皇帝名善見淸河王亶之世子孝武帝旣西入關高歡奉帝立之為東魏以甲寅嗣立時年十一在位十七年庚午禪於齊未幾遇害壽二十八改元四天平四元象元興和四武定八文皇帝名寶炬孝文帝之孫京兆王愉之子封南陽王孝武崩宇文泰立之以甲寅嗣立在位十八年辛未崩壽四十五改元一大統十八廢帝名欽文帝長子以辛未嗣立在位三年癸酉為宇文泰所廢尋弑之壽十六不改元恭皇帝名廓文帝第四子以甲戌嗣立三年丙子禪於周未幾周人殺之壽二十一不改元右魏十五帝共一百七十一年首丙戌盡丙子北齊顯祖文宣皇帝渤海蓚人姓高氏名洋神武王歡之次子以庚午受魏禪卽皇帝位在位十年己卯崩壽三十一改元一天保十廢帝名殷文宣太子以己卯嗣立一年庚辰常山王演廢之而自立尋遇害壽十五改元一乾明孝昭皇帝名演神武第六子以庚辰嗣立一年崩壽二十七改元一皇建世祖武成皇帝名湛神武第九子辛巳嗣立五年乙酉禪位於太子稱太上皇又四年戊子崩壽三十二改元二太寧一河淸四後主名緯武成帝長子以乙酉嗣立在位十三年丁酉為周所滅改元二天統五武平八右北齊五帝共二十八年首庚午盡丁酉周閔帝姓宇文氏名覺代郡武川人文王泰之子以丙子受魏禪一年丁丑為晉公䕶廢而弑之壽十六不改元世宗明皇帝名毓文王子晉公䕶廢閔帝迎立之以丁丑嗣立四年庚辰崩壽二十七改元二武定二武成二高祖武皇帝名邕文王第四子庚辰嗣立在位十九年戊戌崩壽三十六改元四保定五天和六建德六宣政二宣皇帝名贇武帝長子以戊戌嗣立己亥傳位太子稱天元庚子崩壽二十二改元一大象靜帝名衍宣帝長子庚子嗣立辛丑禪於隋遇害壽九歲不改元右周五帝共二十六年首丙子盡辛丑隋高祖文皇帝𢎞農華陰人姓楊氏名堅以辛丑受魏禪在位二十四年甲子崩壽六十四改元二開皇二十仁夀四煬皇帝名廣高祖次子以甲子嗣立在位十三年戊寅無道遇弑壽五十改元一大業恭皇帝名侑煬帝孫元德太子之子唐公李淵入長安立之以丁丑嗣位戊寅禪於唐封為國公武德二年崩壽十五改元一羲寧右隋三帝共三十八年首辛丑盡戊寅唐高祖神堯大聖大光孝皇帝隴西成紀人姓李氏名淵以丁丑自太原留守起兵入長安戊寅受隋禪卽皇帝位時年五十三在位九年丙戌傳位於太宗稱太上皇又十年乙未崩壽七十二改元一武德九太宗文武大聖大廣孝皇帝名世民高祖次子母竇皇后初封秦王太子建成誅立為皇太子以丙戌嗣立時年二十九在位二十三年己酉崩壽五十二改元一貞觀二十高宗天皇大聖大𢎞孝皇帝名治太宗第九子母長孫皇后初封晉王太子承乾廢立為皇太子以己酉嗣立時年二十二在位三十四年癸未崩壽五十六改元十四永徽六乾封二顯慶五總章二龍朔三咸亨四麟德二上元二儀鳳三元調露元𢎞道永隆元開曜元永淳元中宗孝和大聖大昭孝皇帝名顯高宗第七子母武皇后為皇太子癸未嗣立甲申武后廢之後二十二年乙巳復辟在位五年庚戌為韋后所弑壽五十五改元三神龍二景龍二唐隆元武后改元十二光宅元夀垂拱四載永昌元冊天授二長二延元天萬歲元長萬歲通天元安四神功元聖歴二久視元睿宗元眞大聖大興孝皇帝名旦高宗第八子母武皇后封豫王武后旣廢中宗立之臨朝至庚寅降立為皇嗣中宗復辟封相王韋后弑逆臨淄王隆基誅之迎立帝以庚戌卽位三年壬子傳位於太子隆基後四年丙辰崩壽五十五改元二景雲二太極元元宗至道大聖大明孝皇帝名隆基睿宗第三子母竇皇后封臨淄郡王庚戌韋后弑逆以兵討誅之睿宗卽位立為皇太子以壬子嗣立時年二十七在位四十四年乙未禪位於太子後七年壬寅崩壽七十八改元三先天元開元二十九天寶十四肅宗文明武德大聖大宣孝皇帝名亨元宗第三子母楊皇后天寳中立為皇太子丙申嗣立時年四十五在位七年壬寅崩夀五十二改元四至德二乾元二上元二寶應元代宗睿文孝武皇帝名豫肅宗太子母吳皇后以壬寅嗣立時年三十六在位十八年己未崩壽五十四改元三廣德三永泰二大歴十二德宗神武孝文皇帝名适代宗太子母沈皇后以己未嗣立時年三十八在位二十六年甲申崩壽六十四改元三建中四興元元貞元二十一順宗至德𢎞道大聖大安孝皇帝名誦德宗太子母王皇后以甲申嗣立一年崩壽四十六改元一永貞憲宗昭文章武大聖至神孝皇帝名純母王皇后順宗太子以丙戌嗣立時年二十八在位十五年庚子崩壽四十三改元一元和十四穆宗睿聖文惠孝皇帝名恒憲宗第三子母郭皇后以庚子嗣立時年二十六在位五年甲辰崩壽三十改元一長慶四敬宗睿武昭愍孝皇帝名湛穆宗長子母王皇后以甲辰嗣立時年十六在位三年丙午為宦官蘇佐明等所弑壽十八改元一寶歴三文宗元聖昭獻孝皇帝名昻穆宗第二子母蕭皇后封江王敬宗崩王守澄等迎立之以丙午嗣立時年十八在位十四年庚申崩壽三十二改元二太和九開成五武宗至道昭肅孝皇帝名炎穆宗第五子母韋皇后封潁王文宗崩仇士良等迎立之以庚申嗣立年二十七在位六年丙寅崩壽三十三改元一會昌六宣宗聖武獻文孝皇帝名忱憲宗第十三子母鄭皇后封光王武宗崩中官迎立之以丙寅嗣立時年三十七在位十三年己卯崩壽五十改元一大中十三懿宗昭聖恭惠孝皇帝名漼宣宗太子母鼂皇后以己卯嗣立在位十四年癸巳崩壽四十一改元一咸通十四僖宗惠聖恭定孝皇帝名儇懿宗第五子母王皇后立為皇太子以癸巳嗣立時年二十在位十四年戊申崩壽三十六改元五乾符五德元廣明元中和四光啟三文昭宗聖穆景文孝皇帝名曄懿宗第七子母王皇后封壽王以戊申嗣立十六年甲子為朱全忠所弑壽三十八改元七龍紀元天大順化三復三天景福祐元乾寧四光哀皇帝名柷昭宗第九子母何皇后封暉王昭宗遇弑以甲子嗣立三年丁卯禪於梁明年遇害壽十七改元盡天祐四年右唐二十帝共二百九十年首丁丑盡丁卯内武氏二十二年後梁太祖神武元聖孝皇帝單州碭山縣人姓朱氏名晃初名温賜名全忠以丁卯受唐禪卽皇帝位年五十六在位六年壬申為其子郢王友珪所弑年六十二改元二開平四乾化二末帝名瑱太祖第三子母張皇后封均王友珪弑逆討誅之以癸酉嗣立在位十一年癸未唐兵入汴為其下所弑年三十六改元三乾化三貞明六龍德二右後梁二帝共十七年首丁卯盡癸未後唐莊宗光聖神閔孝皇帝其先沙陀人唐賜姓李氏名存朂武帝之子以癸未卽皇帝位滅梁在位四年丙戌兵亂中流矢崩壽四十二改元一同光四明宗聖德和武欽孝皇帝代北金鳯城人姓李氏名亶以丙戌嗣立在位八年癸巳崩壽六十七改元二天成四長興四愍帝名從厚明宗第三子封宋王癸巳嗣立甲午潞王兵入汴廢之而自立遇害壽二十一改元一應順二廢帝名從珂本姓王氏明宗養為子封潞王以甲午廢愍帝卽位三年丙申石敬瑭舉兵犯闕帝兵敗自焚死壽五十二改元一清泰三右後唐四帝共十四年首癸未盡丙申後晉高祖聖文章武明德孝皇帝太原汾陽里人姓石氏名敬瑭丙申以北京留守舉兵入洛卽皇帝位在位七年壬寅崩壽五十二改元一天福七出帝名重貴本高祖從子封齊王以壬寅嗣立在位四年丙午契丹入汴北遷卒於黃龍府壽三十四改元二天福二開運二右後晉二帝共十一年首丙申盡丙午後漢高祖睿文聖武昭肅孝皇帝太原人姓劉氏名暠初名知遠契丹入中國以丁未卽皇帝位於晉陽繼遷於汴在位二年戊申崩壽五十四改元一乾祐二隱帝名承祐高祖第二子封周王以戊申嗣立三年庚戍郭威擁兵犯闕遇弑壽二十右後漢二帝共四年首丁未盡庚戌後周太祖聖神恭肅文武孝皇帝邢州堯山人姓郭氏名威辛亥以鄴都留守入汴卽皇帝位三年癸丑崩壽五十一改元一廣順三世宗睿武孝文皇帝本姓柴氏名榮太祖養子封晉王以甲寅嗣立在位六年己未崩改元一顯德六恭帝名宗訓世宗子封梁王以己未嗣立庚申禪於宋後十四年癸酉崩壽二十一右後周三世共九年首辛亥盡己未宋太祖英武聖文神德皇帝其先涿郡人皇考始遷洛陽姓趙氏名匡允父周龍㨗左廂都指揮使𢎞殷追諡宣祖母昭憲杜太后庚申以殿前都㸃檢受周禪卽皇帝位時年三十三在位十七年丙子崩壽五十改元三建隆三乾德五開寶九太宗神功聖德文武皇帝名炅初名匡義母昭憲杜太后以丙子嗣立時年三十七在位二十二年丁酉崩壽五十九改元五太平興國八至道三雍熙四端拱二淳化五眞宗文明章聖元孝皇帝名恒初名元侃太宗第三子母元德李太后立為皇太子以丁酉嗣立年二十九在位二十六年壬戌崩壽五十五改元五咸平六元景德四乾興大中祥符九天禧五仁宗神文聖武明孝皇帝名正初名受益眞宗太子母莊懿李太后以壬戌嗣立時年十二在位四十二年癸卯崩壽五十四改元九天聖九慶明道二皇景祐四至寶元二嘉康定元歴八祐五和二祐英宗獻文肅武宣孝皇帝名曙初名宗實濮安懿王允讓之子詔立為皇子以癸卯嗣立時年三十三在位五年丁未崩壽三十八改元一治平四神宗英文烈武聖孝皇帝名頊英宗太子母宣仁高皇后以丁未嗣立時年十九在位十九年乙丑崩壽三十八改元二熙寧十元豐八哲宗欽文睿武昭孝皇帝名煦初名傭神宗太子母欽聖朱太妃以乙丑嗣立時年十歲在位十五年庚辰崩壽二十五改元三元祐八紹聖四元符三徽宗聖文仁德顯孝皇帝名佶神宗第十一子母欽慈陳太后初封端王哲宗崩以庚辰嗣立年十九歲在位二十五年乙巳禪位於太子丁未金人陷中原北遷後九年乙卯崩於五國城壽五十三改元六建中靖國元宣崇寧五重和元和七大觀四政和七欽宗恭文順德仁孝皇帝名桓徽宗太子母顯恭王皇后以乙巳受内禪卽位時年二十五二年金人䧟中原丁未北遷後三十四年庚辰崩壽六十一改元一靖康二高宗聖神武文昭仁憲孝皇帝名構徽宗第九子母顯仁韋太后初封康王金人陷中原二帝北狩以丁未嗣立於南京時年二十一在位三十六年壬午内禪於太子又二十五年丁未崩壽八十二改元二建炎四紹興三十二孝宗哲文神武明聖成孝皇帝名眘初名瑗太祖之裔高宗以為太子壬午受内禪卽位時年三十六在位二十七年己酉内禪於太子又五年癸丑崩壽六十八改元三隆興二乾道几淳熙十六光宗憲仁聖哲慈孝皇帝名惇孝宗第三子母成穆郭皇后立為太子己酉受内禪時年四十三在位五年甲寅内禪又六年戊午崩壽五十四改元一紹熙五寧宗仁文哲武恭孝皇帝名擴光宗第二子母慈懿李皇后立為太子甲寅卽位時年二十七在位三十一年甲申崩壽五十七改元四慶元六嘉泰四開禧三嘉定十七理宗烈文仁武安孝皇帝名昀初名貴誠沂靖惠王之子寧宗以為皇子甲申嗣立時年二十一在位四十一年甲子崩壽六十一改元八寶慶三祐十二紹定六寶祐六端平三開慶元嘉熙四景定五淳度宗端文明武景孝皇帝名叡福王之子理宗立為太子甲子嗣立時年二十五在位十一年甲戌崩壽三十五改元一咸淳十文獻通考卷二百五十
