body:
  text: 文獻通考卷三百鄱陽馬端臨貴與著物異考六金異周威烈王二十三年九鼎震顯王三年雨金於櫟陽赧王五十九年周亡秦昭王取九鼎其一飛入泗水餘八入於秦中漢武帝元鼎元年夏五月得鼎汾水上四年六月得寶鼎元封元年詔曰朕禮首山昆田出珍物化或為黄金應劭曰昆田首山之下田也武帝祠首山故神為出珍物化為黄金征和二年春涿郡鐵官鑄鐵鐵銷皆飛去此火為變使之然也其三月涿郡太守劉屈氂為丞相後坐祝詛腰斬成帝河平二年正月沛郡鐵官鑄鐵鐵不下隆隆如雷聲又如鼓音工十三人驚走音止還視地地陷數尺鑪分為十一鑪中銷鐵散如流星皆上去與征和二年同象其夏帝舅五人封列侯元舅王鳳擅政譖殺丞相王商京兆尹王章許后坐廢趙飛燕為后賊害皇子成帝亡嗣一曰鐵飛屬金不從革按鑄鐵而鐵不成正金不從革之異也而西漢五行志以為火不炎上誤矣今並革而正之後漢明帝永平六年二月王雒山出寶鼎廬江太守獻之詔以初祭之日陳鼎於廟以備器用賜三公以下帛有差十一年漅湖出黄金廬江太守以獻湖在廬州合肥縣章帝建初七年幸槐里岐山得銅器形似酒樽獻之魏明帝青龍中盛修宮室西取長安金狄承露盤盤折聲聞數十里金狄泣於是因留霸城此金失其性而為異也呉孫權赤烏十二年寳鼎出臨平湖孫休永安三年得大鼎於建徳縣晉恵帝元康三年閠二月殿前六鐘皆出涕五刻止前年賈后殺楊太后於金墉城而賈惡不止故鐘出涕猶傷之也永興元年成都伐長沙每夜戈㦸鋒有火光如懸燭此輕人命好攻戰金失其性而為變也天戒若曰兵猶火也不戢將自焚成都不悟終以敗亡懐帝永嘉元年項縣有魏豫州刺史賈逵石碑生金可採此金不從革而為變也五月汲桑作亂郡寇飈起又清河王覃為世子時所佩金鈴忽生起如粟者康王母疑不祥毁棄之及後為恵帝太子不終於位為司馬越所殺程氏演繁露曰晉語云墓碑生金庾氏大忌初不暁生金為何等語按呉淑事類賦引魏志曰繁昌縣傳禅碑中生金表送上羣臣盡賀王隐晉書曰永嘉中陳國項縣賈逵石碑中生金人盗鑿取以賣賣已復生此江東之瑞也其曰瑞者晉為金行故金生為祥元帝中興其應也据此而言則碑中誠生黄金矣亦異事哉元帝永昌元年甘卓將襲王敦旣而中止及還家多變怪照鏡不見其頭此金失其性而為妖也尋為敦所襲遂夷滅石季龍時鄴城鳯陽門上金鳳凰二頭飛入漳河海西太和中會稽山隂縣起倉鑿地得兩大船滿中錢錢皆輪文大形時日向暮鑿者馳以告官官夜遣防守甚嚴至明旦失錢所在惟有船存視其狀悉有錢處安帝義熙初東陽太守殷仲文照鏡不見其頭尋亦誅翦占與甘卓同也陳後主禎明二年五月東冶鐵鑄有物赤色大如斗自天墜鎔所隆隆有聲鐵飛破屋而四散燒人家東冶者陳人鑄兵之所鐵飛為變者金不從革之應天戒若曰陳國小兵弱云其後卒亡隋堯君素守蒲州兵器夜有光如火火鑠金金所畏也敗亡之象劉武周據并州兵勢甚盛城上矟刃夜每有火光唐垂拱三年七月魏州地出鐵如船數十丈廣州雨金金位正秋為刑為兵占曰人君多殺無辜一年兵災於朝神龍初東都白馬寺鐵像頭無故自落於殿門外天寶十載六月大同殿前鐘自嗚占曰庶雄為亂宰臣李適之常列鼎具饍羞中夜鼎躍出相鬬不觧鼎耳及足皆折乾元二年七月渾天儀有液如汗下流元和中翰林院有鈴夜中文書入則引之以代傳呼長慶中河北用兵鈴輙自鳴與軍中息耗相應聲急則軍事急聲緩則軍事緩光化四年冬武徳殿前鐘聲忽嘶嗄天復元年九月聲又變小後唐天成中偽漢欽州羅浮山民掘得古劒有篆文曰已與水同宮王將耳口同尹来居口上山岫䕶重重以獻偽王劉陟國人莫之辨及平廣南競傳其言知者云太宗以己亥年降誕是已水同宮也於文耳口王為聖尹口為君重山為出蓋己亥年聖君出也晉開運三年六月登州文登縣地内湧出金銅佛像四漢乾祐元年三月中書厨釜鳴者七是月宰相李濤罷免勒歸私第宋建隆二年七月晉江神山縣北谷中有鐵隨水流出方二丈三尺其重七十斤至道二年二月桂陽監鎔銀自涌成山峯狀咸平四年十二月亳州大清宮鐘自鳴大中祥符六年九月臨江軍清江縣民李公邁至雲騰廟前過遇小童贈塊土還家剖之得天尊人主像五軀慶厯四年五月乙亥撫州金谿縣得生金山重三百二十四兩至和五年正月湖南提舉常平劉欽言蘆荻衝出生金重九斤八兩狀類靈芝祥雲又淘得碎金四百七兩有竒十一月越州言民戸拾生金湟州丁羊谷金坑僅千餘眼得鑛成金共四等計一百三十四兩有竒崇寧四年三月鑄九鼎用金甚厚取九州水土内鼎中既奉安於九成宮車駕臨幸徧禮焉至北方之寳鼎忽漏水溢於外劉炳謬曰正北在燕山今寳鼎但取水土於雄州境宜不可用其後竟以北方致亂建炎三年吉州修城役夫得髑髏棄之水中俄浮一鐘有銘七十六字大畧云唐興元吾子歿瘞廬陵西壘後當火徳五九之際世衰道敗浙梁相繼䘮亂章貢康昌之日吾亦復出是邦東平鳩工復使吾子同河伯聴命水官時郡守命錄之僅錄畢而鐘自碎近金為變恠也紹興十一年主管成都等路茶事馮康國言三月庚申金敵居長安兵刃皆生火光天變豈直示敵亦示國家以恢疆之圗此與晉志永興初成都伐長沙戈㦸火光及唐志劉武周矟刃火光同占輕人命好攻戰金失其性為光恠也兵猶火也弗戢自焚敗亡象也二十六年七月辛酉夜天雨水銀與唐志貞觀廣州雨金同占金位正秋為刑為兵占曰人君多殺無辜一年災於朝是嵗成都郫縣地出銅馬髙三尺工制甚精中宵風雨輙聞嘶聲紹興中秦檜别墅農夫耕鑿得金甕重二十四鈞慶元二年正月泰寧縣耕夫得鏡厚三寸徑一尺二寸照水徹底對日爭輝病熱者鑑之心骨生寒後為雷震而碎十二月呉縣金鵞鄉銅錢百萬自飛漢書隂盛陽微金鐵為飛玉石之異春秋昭公八年春石言於晉晉平公問師曠對曰石不能言神或馮焉作事不時怨讟動於民則有非言之物而言於是晉侯方築虒祁之宮虒祁地在絳西臨汾水劉歆以為金石同類是謂金不從革失其性也劉向以為石白色為主属白祥昭公二十四年王子鼂以成周之寳湛於河津人得之河上隂不佞取將賣之則化為石見白祥門漢孝昭元鳳三年泰山有大石起立詳見白祥門成帝鴻嘉三年五月乙亥天水冀南山大石鳴聲隆隆如雷有頃止聞平襄二百四十里許埜雞皆鳴石長丈三尺廣厚略等旁著岸脅去地二百餘丈民俗名曰石鼓石鼓鳴有兵是嵗廣漢鉗子謀鉗子謂鉗徒牢係重囚處攻牢簒死囚鄭躬等盗庫兵刧掠吏民後四年尉氏樊並等謀反殺陳留太守山陽亡徒蘇令等黨與數百人盗庫兵經厯郡國四十餘皆踰年乃伏誅時起昌陵作者數萬人徙吏民作治五年不成與晉石言同應師曠所謂民力彫盡傳云輕百姓者是也魏明帝青龍元年張掖栁谷口水溢涌寳石負圗狀象靈龜立於川西有石馬七及鳳麒麟白虎犧牛璜玦八卦列宿孛彗之象又有文曰大討曹此晉之符命而於魏為妖好攻戰輕百姓飾城郭侵邉境魏氏三祖皆有其事石圗發於非常之文此不從革之異晉定大業多斃曹氏石瑞文大討曹之應也呉孫亮五鳳二年陽羡離里山大石自立孫皓天璽元年鄱陽言厯陽山石文理成字凡二十云楚九州渚呉九州都揚州士作天子四世治太平始江左傳曰厯陽縣有石山臨水髙百丈其三十丈所有土穿駢羅穿中色黄赤不與本體相似俗相傳謂之石印又云石印封發天下當太平有祠屋巫祝言石印神有三郎時厯陽長表上言石印發皓遣使以太牢祭厯山巫言石印三郎説天下方太平使者作髙俤上㸔印文詐以朱書石作二十字還以啟皓皓大喜曰呉當為九州作都渚乎從大皇帝逮孤四世矣太平之主非孤復誰重遣使以印綬拜三郎為王又刻石立銘褒賛靈徳以答休祥又呉興陽羡山有空石長十餘丈名曰石室在所表為大瑞乃遣兼司徒董朝兼太常周處至陽羨縣封禪國山明年改元大赦以協石文晉恵帝永熙五年有石生於京師宜年里永康元年襄陽得鳴石丹陽湖有浮石真定獲玉馬詳並見白祥門元帝初渡江有玉冊見於臨安白玉麒麟神璽出於江寧其文曰長夀萬年皆以為中興之驗焉愍帝建興五年石言於平陽時帝䝉塵亦在平陽故有非言之物而言妖之大者俄而帝遇害劉曜時終南山崩長安人劉終於崩所得白玉方一尺有文字曰皇亡皇亡敗趙昌井水竭構五梁咢五各反酉小衰困囂䘮嗚呼嗚呼赤牛奮靷直引反其盡乎時羣下咸賀以為勒滅之徴曜大悦齋七日而後受之於太廟大赦境内以終為奉瑞大夫中書監劉均進曰臣聞國主山川故山崩川竭君為之不舉終南京師之鎮國之所瞻無故而崩其凶焉可極言昔三代之季其災也如是今朝臣皆言祥瑞臣獨言非誠上忤聖㫖下違衆議然臣不逹大理竊所未同何則玉之於山石也猶君之於臣下山崩石壊象國傾人亂皇亡皇亡敗趙昌者此言皇室將為趙所敗趙因之而昌今大趙都於秦雍而勒跨全趙之地趙昌之應當在石勒不在我也井水竭構五梁者井謂東井秦之分也五謂五車梁謂大梁五車大梁趙之分也此言秦將竭滅以構成趙也咢者嵗之次名作咢也言嵗馭作咢酉之年當有敗軍殺將之事困謂困敦丁回反嵗在子之名元囂亦在子之次言嵗馭於子國當䘮亡赤牛奮靷謂赤奮若在丑之嵗名也牛謂牽牛東北維之宿丑之分也言嵗在於丑當滅亡盡無復遺也此其誡悟葢欲陛下勤脩徳化以禳之石虎時青州言濟南平陵城北石虎一夜中忽移在城東南善石溝上有狼狐千餘迹随之跡皆成路虎大悦曰石虎者朕也自北而南者天意將使朕平蕩江南也其勅諸州兵明年朕當親董六軍以副成路之祥羣臣皆賀又有石燃於泰山八日而滅東海有大石自立旁有血流鄴西山石間血流血長十餘歩廣二尺餘慕容儁既僣位初石虎使人探䇿於華山得玉版文曰嵗在申酉不絶如綫嵗在壬子真人乃見及此燕人咸以為儁之應也又常山大樹自㧞根下得璧七十珪七十玉光色精竒有異常玉儁以為岳神之命遣其尚書段勤以太牢祠之齊髙祖受禅之日滎陽郡人尹千於嵩山東南隅見天雨石墜地石開有玉璽在其中璽方三寸文曰戊丁之人與道俱肅然入草應天符掃平河洛清魏都又曰皇帝運興千奉璽以獻按宋武帝於嵩髙山得玉璧三十二枚神人云此是宋分世之數三十二年二三十也宋自受命至禅齊凡六十年云梁武帝中大同元年春曲阿縣建陵隧口石辟邪起舞後齊武成河清四年殿上石自起兩兩相對唐貞觀十七年八月凉州昌松縣鴻池谷有石五青質白文成字曰髙皇海出多子李元王八十年太平太子李世民千年太子李治書燕山人士樂太國主尚汪譂奨文仁邁千古大王五王六王七王十鳳毛才子七佛八菩薩及上果佛田天子文武貞觀昌大聖延四方上不治示孝仙戈八為善太宗遣使祭之曰天有成命表瑞貞石文字昭然厯數惟永既旌髙廟之業又錫眇身之祚迨於皇太子治亦降貞符具紀姓氏甫為寡薄彌增寅懼昔魏以土徳代漢涼州石有文石金類以五勝推之故時人謂為魏氏之妖而晉室之瑞唐亦土徳王石有文事頗相類然其文初不可曉而後人因推己事以騐之蓋武氏革命自以為金徳王其佛菩薩者慈氏金輪之號也樂太國主則鎮國太平公主安樂公主皆以女亂國其五王六王七王者唐世十八之數開元二十三年十二月己巳龍池聖徳頌石自鳴其音清逺如鐘磬近石言也至徳二年昭陵石馬汗出昔周武帝克晉州齊有石像汗流濕地此其類也上元二年楚州獻寳玉十三曰元黄天符形如笏長八寸有孔云辟兵疫曰玉雞毛白玉也曰榖璧亦白玉也粟粒自然無雕鐫迹曰西王母白環二曰如意寳珠大如雞卵曰紅靺鞨大如巨栗曰琅玕珠二形如玉環四分缺一曰玉印大如半手理如鹿陷入印中曰皇后採桑鉤如箸屈其末曰雷公石斧無孔其一闕凡十三置之日中白氣連天元和中文水武士彠碑失其龜頭太和三年南蠻圍成都毁玉晨殿石為􅓓有吼聲三乃止四年浙西觀察使王蟠治潤州城隍中得方石有刻文曰山有石石有玉玉有瑕瑕即休廣明元年華嶽廟元宗御製碑隐隐然有聲聞數里間浃旬乃止近石言也南漢劉鋹時宮中井旁石自立行百餘歩而仆宋太平興國四年九月嘉州夹江縣民王詣得江石二皆黝質丹文隐起成字一曰君王萬嵗一曰趙二十一帝三年四月華州言秦嶺南石洞自開遣吏馬文則秉炬視之入數十歩得丹砂千二百粒獸形石六以獻五年五月鄭州修東嶽祠穿土得玉杵臼七年六月深州陸澤縣民王緒田中得白兎逐入穴掘之得石佛五十軀皆長尺餘大中祥符五年四月慈州民饑鄉寧縣山生石脂如麺可為餅餌天禧三年正月晦潁州沈邱縣民駱新田間震雷頃之隕石三入地七尺許政和二年元圭始出晉州上一石緑色方三尺餘當中有文曰堯天正其字如掌大而端楷類手畫者堯字居右天正字綴行如左都堂騐視礱石三分而字畫愈明又於堯字之下隐約出一瑞字位置始均葢曰天正堯瑞云或謂晉陽堯都也方元圭出乃有此瑞殆宣和内禅之祥政和三四年畿府汝蔡之間連山大小石皆變為瑪瑙尚方取為寳器玩甚富至宣和四年後御府所藏往往復變為石而色類白骨此與周寶圭占略同五年鄭州滎陽縣賈谷山麒麟谷採石脩明堂得一石有文曰明百官表賀七年二月丙戌張杲言北嶽廟於廟側二十里黄山獲石柱十六條修短闊狭皆應營造法式用建正門毫釐不差建炎三年四月鼎州桃源洞大水巨石随流而下石間成文或識者三十二字其文曰無為大道天知人情無為窕冥神見人形心言意語鬼聞人聲犯禁滿盈地收人魂與唐志貞觀中鴻池谷石文同占紹興元年潭州得白玉於州城蓮池中孔彦舟以獻於朝詔却之漢志以為玉變近白祥與石恠同占後彦舟為劇盗乾道二年三月丙午夜福清縣石竹山大石自移聲如雷石方可九丈所過成蹊纔四尺而山之草木如故慶元二年六月辛未黄巖縣大石自隕雷雨甚至山水湧出白眚白祥天雨毛地生毛春秋左傳昭公二十四年十月癸酉王子鼂以成周之寳圭湛於河以祭河也幾以獲神之助甲戌津人得之河上隂不佞取將賣之則為石時王子鼂簒天子位萬民不鄉號令不從故有玉變近白祥也癸酉入而甲戌出神不享之驗云玉化為石貴將為賤也後二年子鼂奔走而死秦始皇二十六年鄭客遇江神持璧言祖龍死事詳見人異與周子鼂同應是嵗石隕東郡民或刻其石曰始皇死而地分此皆白祥炕陽暴虐號令不從孤陽獨治羣隂不附之所致其嵗始皇死後三年秦滅漢孝昭元鳳三年正月泰山萊蕪山南匈匈有數千人聲民視之有大石自立髙丈五尺大四十八圍入地深八尺三石為足石立處有白烏數千集其旁眭孟以為石隂類下民象泰山岱宗之嶽王者易姓告代之處當有庶人為天子者孟坐伏誅京房易傳曰復崩來無咎復卦之辭今易作朋来自上下者為崩厥應泰山之石顛而下顛墜也聖人受命人君虜又曰石立如人庶士為天下雄立於山同姓平地異姓立於水聖人於澤小人武帝天漢元年三月天雨白毛三年八月雨白氂京房易傳曰前樂後憂厥妖天雨羽又曰邪人進賢人逃天雨毛呉孫亮五鳳二年五月陽羡縣離里山大石自立按京房易傳曰庶士為天子之祥也其説曰立石於山同姓平地異姓干寳以為孫皓承廢故之家得位其應也或曰孫休見立之祥也晉武帝泰始八年五月蜀地雨白毛此白祥也時益州刺史皇甫晏伐汶山胡從事何旅固諌不從牙門張𢎞等因衆之怨誣晏謀逆害之京房易傳曰前樂後憂厥妖天雨羽又曰邪人進賢人逃天雨毛其易妖曰天雨毛羽貴人出走三占皆應太康十年洛陽宫西宜秋里石生地中始髙三尺如香爐形後如傴於武反人盤薄不可掘按劉向説此白眚也明年宮車晏駕王室始騷卒以亂亡京房易傳曰石立如人庶士為天下雄此近之矣恵帝元康五年十二月有石生於宜年里永康元年襄陽郡上言得鳴石撞宅江反之聲聞七八里永寧元年齊王冏舉義軍軍中有小兒出於襄城繁昌縣年八嵗髪體悉白頗能卜於洪範白祥也太安元年丹陽湖熟縣夏架湖有大石浮二百歩而登岸民驚噪蘇到反相告曰石來干寳曰尋有石冰入建業車騎大將軍東嬴王騰自并州遷鎮鄴行次真定時久積雪而當門前方數丈獨消釋騰怪而掘之得玉馬髙尺許口齒缺騰以馬者國姓上送之以為瑞然馬無齒則不得食妖祥之兆衰亡之徵按占此白祥也是後騰為汲桑所殺而天下遂亂成帝咸康初地生毛近白祥也孫盛以為人勞之異也是後石季龍滅而中原向化將相皆甘心焉於是方鎮屢革邉戍仍遷皆擁帯部曲動有萬數其間征伐徴賦役無寧嵗天下勞擾百姓疲怨咸康三年六月地生毛孝武太元二年五月京都地生毛至四年而氐賊次襄國圍彭城向廣陵征戍仍出兵連年不觧太元十四年四月京都地生毛時苻堅滅後經畧多事人勞之應也十七年四月地生毛安帝隆安四年四月乙未地生毛或白或黑元興三年五月江陵地生毛是後江陵見襲義熙三年三月地生白毛十三年三月地生毛明年王旅西討司馬休之又明年北掃關洛梁武帝大同二年地生白毛長二尺近白祥也孫盛以為人勞之異先是大發卒築浮山堰功費鉅億垂成復潰百姓怨嗟太清二年九月地生白毛長二尺時侯景舉兵反後齊河清元年九月滄州及長城之下地多生毛或白或黑長四五寸近白祥也時北築長城内興三臺人苦勞役天統初岱山封禅壇玉璧自出近白祥也岱山王者易姓告代之所玉璧所用幣而自出將有易姓者用幣之象其後齊亡地入於周隋髙祖受周禅天下一統焚柴泰山告祠之應武平三年白水巖下青石壁旁有文曰齊亡走人改為上延後主以為嘉瑞百僚畢賀後周師入國後主棄鄴而走隋文帝開皇六年七月京師雨毛如髮尾長者三尺餘短者六七寸京房易飛候曰天雨毛其國大饑時關中旱米粟踴貴十七年石隕於武安滏陽間十餘洪範五行傳曰石自髙隕者君將危殆後七年帝崩開皇末髙祖於宮中埋二小石於地以誌置牀之所未㡬變為玉劉向曰玉者至貴也賤將為貴之象及大業末盗皆僣名號煬帝大業十三年西平都石文曰天子立千年百僚稱賀識者尤之曰千年萬嵗者身後之意也今稱立千年者禍在非逺明年而帝被殺唐調露元年十一月壬午秦州神亭治北霧開如日初曜有白鹿白狼見近白祥也垂拱元年九月淮南地生毛或白或蒼長者尺餘遍居人牀下揚州尤甚大如馬鬛焚之臭如燎毛占曰兵起民不安神龍二年四月己亥雨毛於越州之鄮縣占曰邪人進賢人遁大厯二年七月甲戌日入時有白氣亘天九月戊午夜白霧起西北亘天五年五月甲申西北有白氣亘天建中四年四月甲子京師地生毛或黄或白有長尺餘者貞元四年四月淮南及河南地生毛二十年九月庚辰甲夜有白氣八東西際天太和三年八月西方有白氣如柱六年二月蘇州地震生白毛七年十月己酉西方又有白氣如柱者三光啟二年四月有白氣頭黑如髮自東南入於揚州滅光化二年三月乙巳日中有白氣亘天自西南貫於東北天復元年八月己亥西方有白雲如履底中出白氣如疋練長五丈上衝天分為三彗頭下垂占曰天下有兵白者戰祥也宋嘉祐七年三月徐州彭城縣白鶴鄉地生麵占曰地生麺民將饑五月濠州鍾離縣地生麵熙寧元年荆襄間天雨白氂如馬尾長者尺餘彌漫山谷三月丁酉潭州雨毛八年五月丁丑雨黄毛元豐三年五月青州臨朐益都石化為麺民取食之靖康二年二月壬午夜四鼓白氣如虹自南亘北須㬰移西南至東北天明而没建炎二年杜充為北京留守一日天雨紙錢於營中厚盈寸明日與金人戰於城下敗績錢金類金兵象紙白祥也三年三月白氣貫日未幾苗傅等作亂凡白氣之占皆為天下有兵戰之事白祥也四年五月壬子夜北方有白氣十餘道如練語在赤祥紹興元年二月己巳夜東南有白氣十一年馮康國言三月庚申金人居長安油酒皆變白色語在金傳及夜妖此白祥也白者西方兵象也亦喪祥也後金主亶為其下所弑三十年十一月甲午夜西南有白氣出危入昴十二月戊申白氣出尾入軫貫天市垣三十一年十二月辛丑白氣如帯東西亘天出斗厯牛隆興元年十二月壬午夜白氣見西南方出危入昴二年正月甲寅夜西南有白氣亘天如帯乾道元年正月庚午白氣見西北方出奎入參三月戊辰夜白氣如帶自参及角東西亘天四月丁酉夜白氣見西北方入天市垣辛丑夜白氣入北斗乙巳夜白氣入紫微垣十月己丑夜蒼白氣見南方入翼十一月丙寅白氣如帶出女入昴東西亘天二年十二月庚午夜白氣如帯東西亘天出女入昴淳熈十年正月戊子夜西南有白氣如天漢而明南北廣可六丈東西亘天厯壁至畢紹熈五年六月壬寅夜白氣亘天自紫微至亢角己酉日入後白氣亘天頃刻而散慶元五年二月癸酉夜東北方白氣如帶自角至參八月甲子東北方有白氣如帶亘天嘉泰四年十一月壬申晝有白氣分數道亘天紹熈四年十一月癸酉地生毛占曰兵起民不安後一年韓侂胄用事卒有開邉毒民之禍文獻通考卷三百
