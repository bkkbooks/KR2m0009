body:
  text: 文獻通考卷八十一鄱陽馬端臨貴與著郊社考十四祭寒暑祭法相近於坎壇祭寒暑也注相近當為禳祈聲之誤也禳猶却也祈求也寒暑不時則或禳之或祈之寒於坎暑於壇祭用少牢祭疏曰祭寒暑者或寒暑太甚祭以禳之或寒暑頓無以祈之籥章掌土鼓豳籥杜子春曰土鼓以瓦為匡以革為兩靣可擊也鄭司農云豳籥豳國之地竹豳詩亦如之元謂豳籥豳人吹籥之聲章明堂位曰土鼓蕢桴葺籥伊耆氏之樂疏曰後鄭云豳人吹籥之聲章云豳人吹籥其義難明謂作豳人吹樂之聲章商祝夏祝之類聲章即下文豳詩之等是也明堂位曰土鼓蕢桴葦籥伊耆氏之樂者鄭注禮運云土鼓築土為鼓也蕢㭩桴謂擊鼓之物以土塊為桴蕢苦對反又苦壞反桴音浮中春晝擊土鼓吹豳詩以逆暑中音仲吹昌垂反豳詩豳風七月也吹之者以籥為之聲七月言寒暑之事迎氣類其類也此風也而言詩詩總名迎暑以晝求諸陽暄疏曰仲春二月也言迎暑者謂仲春晝夜等已後漸故預迎之耳又曰鄭知吹之者以籥為之聲者以發首云掌土鼓豳籥故知詩與雅頌皆用籥吹之也云七月言寒暑之事者七月云一之日觱發二之日栗烈七月流火之詩是寒暑之事迎暑以晝求諸陽者對下迎寒以夜求諸陰也中秋夜迎寒亦如之迎寒以夜求諸隂子疏曰亦如之亦當擊土鼓吹豳詩也春官朱豳風七月詩集傳曰周禮籥章中春晝擊土鼓吹豳詩以迎暑中秋夜迎寒亦如之即謂此詩也楊氏曰籥章下文凡國祈年於田祖疏曰此祈年於田祖并上迎暑迎寒並不言祀事既告神當有祀事可知但以告祭非常故不言之耳若有禮物不過如祭法埋少牢之類仲春天子乃鮮羔開氷鮮注音獻誤鮮當為獻聲之也獻羔謂祭司寒也祭司寒而出氷薦於宗廟乃後賦之鮮疏曰按詩豳風七月云四之日其蚤獻羔祭韭故知為獻也云獻羔謂祭司寒者以經云獻羔啓氷先薦寢廟恐是獻羔寢廟故云祭司寒左傳直云獻羔而啓之知祭司寒者以傳云祭寒而藏之既祭司寒明啓時亦祭之薦於宗廟謂仲春也乃後賦之謂孟夏也故凌人云夏頒冰左傳云火出而畢賦是也畢盡也謂應是得冰之人無問尊卑盡賦與之蚤音早月令傳昭公四年大雨雹季武子問於申豐曰雹可禦乎禦止也申豐魯大夫對曰聖人在上無雹雖有不為災古者日在北陸而藏冰雨於付反雹蒲學反堅陸道也謂夏十二月日在虛危冰而藏之夏戶雅反方疏曰釋天云北陸虛西陸昴也孫炎云陸中也北之宿虛為中也西方之宿昴為中也彼以陸為中杜以陸為道者陸之為中為道皆無正訓各以意言耳周禮凌人正嵗十有二月令斬冰詩云二之口鑿冰沖沖月令季冬冰盛水腹命取冰鄭元云腹厚也以此知日在北陸謂夏之十二月也西陸朝覿而出之謂夏三月日在昴畢蟄蟲出而用冰春分之中奎星朝見東方疏曰覿見也西道之宿有早朝見者於是而出之謂奎星晨見而出冰也西方凡有七宿傳言西陸朝覿於傳之文未知何宿覿也杜以西陸朝覿實是春分二月故杜此注云春分之中奎星朝見東方及下獻羔啓之注云謂二月春分獻羔祭韭是皆據初出其冰公始用之時也所以杜又注云謂夏之三月日在昴畢蟄蟲出而用氷者以此傳云西陸朝覿而出之下傳覆之云其出之也朝之祿位賔食喪祭於是乎用之則是普賜羣臣故杜云謂夏三月又下注云言不獨共公是據普頒之時也故下傳又云火出而畢賦是也然冰之初出在西陸始朝覿之時氷之普出在西陸朝覿之後總而言之亦得稱西陸朝覿而出之也共肯恭其藏冰也深山窮谷固陰沍寒於是乎取之沍閉也必取積隂之冰所以道達其氣使不為災沍户故反其出之也朝之祿位賓食喪祭於是乎用之言不獨共公之疏曰此謂公家用之也朝廷臣食祿在位大夫以上皆當賜之冰也其公家有賔客享食公家有喪有祭於是乎用之言其不獨共公身所用也周禮凌人云春始治鑑凡內外饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共氷鑑賔客共冰大喪共夷槃冰是公家所用冰也其藏之也黑牡秬黍以享司寒牡茂后反秬音巨黑牡黑牲也秬黑黍也司寒元冥北方之神故物皆用黑有事於冰故祭其神疏曰此祭元冥之神非大神且非正祭計應不用大牲杜言黑壯黑牲當是黑牡羊也秬黑黍釋草文也啓冰唯獻羔祭韭藏冰則祭用牲黍者啓唯告而已藏則設享祭之禮祭禮大而告禮小故也月令於冬云其神元冥故知司寒是元冥也其出之也桃弧棘矢以除其災桃弓棘箭所以禳除凶邪將御至尊故云疏曰説文云弧木弓也謂空用木無骨飾也服虔桃所以逃凶也棘矢者棘赤有針取其名也蓋出冰之時置此弓矢於凌室之户所以禳除凶邪將禦至尊故慎其事為此禮也其出入也時食肉之祿冰皆與焉與音預其食肉之祿謂在朝廷治職事就官食者大夫命婦喪浴用冰命婦大夫妻祭寒而藏之享司寒獻羔而啓之謂二月春分獻羔祭韭始開冰室韭音久公始用之公先用優尊火出而畢賦火星昏見東方謂三月四月中月疏曰周禮云夏頒冰謂正嵗之夏即四是也故杜兼言四月自命夫命婦至於老疾無不受冰老致仕在家者其藏之也周其用之也遍則冬無愆陽愆過也謂冬溫夏無伏陰伏隂謂夏寒春無凄風凄寒也秋無苦雨霖雨為人所患苦雷出不震疏曰雷出不震言有雷而不為霹靂也下云雷不發而震言無雷而有霹靂也無災霜雹癘疾不降災音災癘音利雹疏曰霜雹即是災言無此災害之霜也寒暑失時則民多癘疾天氣為之故云降也民不夭札札側八反為短折為夭夭死札今藏川池之冰棄而不用風不越而殺雷不發而震疏曰風不以理舒散而暴疾害物雷不徐緩動發而震擊為害雹之為災誰能禦之七月之卒章藏冰之道也七月詩豳風卒章曰二之日鑿冰沖沖謂十二月鑿而取之三之日納於凌隂凌隂冰室也四之日其蚤獻羔祭韭謂二月春分蚤開冰室以薦宗廟秦德公時作初伏祠立秋之後以金代火金畏於火故遇庚日必伏庚金也周時無伏至此乃方有之磔狗邑四門以禦蠱災按秦伏祠磔狗之禮非古也以古有祀寒暑之禮姑附於此宋孝武帝大明六年立凌室藏冰有司奏季冬之月冰壯之時凌室長率山虞及輿隸取冰於深山窮谷固隂沍寒之地以納於凌隂務令周密無泄其氣先以黑牡秬黍祭司寒於凌室之北仲春之月春分之日以黑羔秬黍祭司寒啓冰室先薦寢廟夏祀用鑑盛冰室一鑑以禦溫氣蠅蚋御殿及太官膳羞並以鑑供冰自春分至立秋不限稱數以周喪事繕制夷槃隨冰供給凌室在樂遊苑內置長一人吏一人保舉吏二人隋以季冬藏冰仲春開冰並用黑牡秬黍於冰室祭司寒神開冰依以桃弧棘矢唐制先立春三日用黑牡秬黍祭司寒之神於冰室祭訖鑿冰萬段方三尺厚尺五寸而藏之仲春開冰祭如藏禮依以桃弧棘矢設於冰室户內之右禮畢遂留之唐開元禮孟冬祭司寒儀納冰開冰附前三日諸祭官散齋二日於家正寢致齋一日於祭所右校掃除祭所衛尉陳設如常祭日未明二刻太官丞具特牲之饌未明一刻郊社丞入布神座於廟北南向設神位於座首又帥其屬設酒樽於座東南設洗於酒樽東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚者各位於樽罍篚之後上林令設桃弧棘矢於冰室户內之右祭訖遂留之奉禮設上林令位於神座東南執事者陪其後俱重行西向北上質明上林令以下各服其服郊社丞良醖之屬入實樽罍太官丞監實籩豆簋簠贊引引上林令又贊引引執事者俱就門外位立定太祝與執樽罍篚羃者先入立於神座前北向俱再拜訖各就位贊引引上林令又贊引引執事者俱入就位立定贊拜上林令以下皆再拜太官丞出詣饌所贊引進上林令左白有司謹具請行事退復位太官丞引饌入太祝迎於座首設於神座前訖太官丞以下還樽所贊引引上林令盥手洗爵詣酒樽所執樽者舉羃上林令酌酒贊引引上林令進神座前北向跪奠爵俯伏興少退北向立太祝持版進於神座之右東向跪讀祝文曰維某年嵗次月朔日開元神武皇帝謹遣某官姓名敢昭告於元冥之神順兹時令增冰堅厚式遵常典將納凌隂謹以元牡秬黍嘉薦清酌明祀於神尚享訖興上林令再拜太祝進跪奠版於神座俯伏興還樽所太祝以爵酌福酒進上林令之右西向立上林令再拜受爵跪祭酒遂飲卒爵太祝進受爵還樽所上林令俯伏興再拜贊引引還本位太祝進跪徹豆俯伏興還樽所太祝與執樽罍篚者俱復位立定贊引贊拜上林令以下皆再拜贊引進上林令之左白禮畢贊引引上林令以下出其祝版焚於齋所周顯德元年詔築壇北郊以孟冬祭司寒其藏冰開冰之祭俟冰室成即行之宋太祖皇帝建隆二年始置藏冰署修其祭常以四月命官率太祝以黑牡祭於元冥神用幣乃開冰以薦太廟太宗淳化三年祕書監李至言周制以仲春天子獻羔開冰先薦寢廟詳其開冰之祭當在春分乃有司之失上覽奏即命正其禮其後又以孟冬祀司寒羊一豕一不行飲福天聖令春分開冰季冬藏冰皆祭神宗元豐中詳定郊廟奉祀禮文所言熙寧祀儀孟冬選吉日祭司寒國朝祀令春分日開冰季冬月藏冰祭司寒於北郊按春秋左傳曰古者日在北陸而藏冰西陸朝覿而出之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災古享司寒唯以藏冰啓冰之日孟冬非有事於冰則不應祭享其祀儀孟冬選吉日祭司寒宜從寢罷惟季冬藏冰則享司寒於冰井務牲用黑牡羊榖用秬黍仲春開冰則但用羔而已月令天子獻羔開冰孔頴達曰啓冰惟獻羔唐郊祀録仲春開冰祭司寒於冰室以桃弧棘矢設於神座夫桃弧棘矢以禳除凶邪非禮神之物當置於凌室之户其啓冰獻羔當依孔頴達之説從之徽宗大觀四年議禮局言左氏傳春秋以少皥有四叔其一為元冥杜預以元冥為水官故厯代祀之為司寒則元冥非天神矣本朝儀注其祭司寒禮畢燔燎是以祀天神之禮而享人鬼也請罷燔燎而埋祝幣從之六宗四方按舜典言類于上帝之下繼以禋于六宗曲禮言天子祭天地之下繼以祭四方然則古帝王祭六宗四方之禮亞於天地蓋非小祀也但經傳俱不明言其神之名目而先儒訓釋互有異同如六宗則或以為天神或以為地祗或以為祖宗四方則或以為五官或以為四望或以為蠟之百物而厯代之舉此二祀者各主一説今除五帝日月星辰水旱寒暑山川八蠟等項各自該載入本門外專立六宗四方一門以考厯代所以舉二祀之説而先儒訓釋之同異考訂之去取併詳著焉虞舜禋于六宗精氣以享謂之禋宗尊也所尊祭者其祀有六謂四時也寒暑也日也月也星也水旱也祭法埋少牢于泰昭祭時也相近於坎壇祭寒暑也王宮祭日也夜明祭月也幽禜祭星雩禜祭水旱也昭明也亦謂壇也時四時也亦謂隂陽之神也埋之者隂陽出入於地中也凡此已下皆祭用少牢相近當為禳祈禳猶却也祈猶求也寒暑不時則或禳之或祈之寒於坎暑於壇王宫日壇夜明月壇幽禜星壇雩禜水旱壇也疏曰按周禮大宗伯備列諸祀而不見祭四時寒暑水旱者宗伯所謂依周禮常祀嵗時常祭此經所載謂四時乖序寒暑僭逆水旱失時須有祈禱之理非關正禮之事故不列於宗伯也是以康成之意謂此諸神為祈禱之禮故康成六宗之義不以此神尊之明非常禮也祭時者謂春夏秋冬四時之氣不和為人害故祭此氣之神也祭寒暑者或寒暑太甚祭以禳之或寒暑頓無祭以祈之祭水旱者水甚祭水旱甚祭旱謂祭此水旱之神若王肅及先儒之意以此為六宗嵗之常禮宗伯不見文不具也非鄭義今不取云凡此以下皆祭用少牢者以埋少牢之文在諸祭之首故知以下皆祭用少牢楊氏曰愚按孔注禋于六宗取祭法四時寒暑日月星水旱為六宗王肅之説亦同朱子書説非茍從者亦取祭法六者為宗必有深意但鄭云注祭法改相近為禳祈又以六者皆為祈禳之祭夫舜類于上帝禋于六宗望于山川遍于羣神乃是攝位告祭之禮安得有禳祈之禮哉故書疏云鄭以彼皆為祈禳之祭則不可用鄭元注以解此傳也周官大宗伯以實柴祀日月星辰以槱燎祀司中司命風師雨師鄭君以為六宗按異義今歐陽夏侯説六宗者上不及天下不及地旁不及四方居中央恍惚無有神助隂陽變化有益於人故郊祭之古尚書説六宗天地神之尊者謂天宗三地宗三天宗日月星辰地宗岱山河海日月屬隂陽宗北辰為星宗岱為山宗河為水宗海為澤宗祀天則天文從祀祀地則地理從祀謹按夏侯歐陽説云宗實一而有六名實不相應春秋魯郊猶三望言郊天日月星河海山凡六宗魯下天子不祭日月星但祭其分野星國中山川故言三望六宗與古尚書説同元之文也書曰肆類于上帝禋于六宗望于山川遍于羣神此四物之類也禋也望也遍也所祭之神各異六宗言禋山川言望則六宗無山川明矣周禮大宗伯以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師凡此所祭皆天神也禮記郊特牲曰郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭於其質也祭義曰郊之祭也大報天而主日配以月則郊祭并祭日月可知其餘星也辰也司中司命風師雨師此之謂六宗亦自明矣禮論王莽時劉歆孔昭以為易震巽等六子之卦為六宗漢武即位依虞書禋于六宗禮用大社至魏明帝時詔令王肅議六宗取家語宰我問六宗孔子曰所宗者六埋少牢於泰昭祭時相近於坎壇祭寒暑王宫祭日夜明祭月幽禜祭星雩禜祭水旱孔安國注尚書與此同張融許從鄭君於義為允按月令孟冬云祈來年于天宗鄭云天宗日月星辰若然星辰入天宗又入六宗其日月入天宗即不入六宗之數也以其祭天主日配以月日月既尊如是故不得入宗也舜典禋于六宗疏曰漢世以來説六宗者多矣歐陽及大小夏侯説尚書皆云所祭者六上不謂天下不謂地旁不謂四方在六者之間助隂陽變化實一而名六宗矣孔光劉歆以六宗謂乾坤六子水火雷風山澤也賈逵以為六宗者天宗三日月星也地宗三河海岱也馬融云萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏此其謂六也鄭元以六宗言禋與祭天同名則六者皆是天之神祗謂星辰司中司命風師雨師星謂五緯也辰謂日月所會十二次也司中司命文昌第五第四星也風師箕也雨師畢也晉初幽州秀才張髦上表云臣謂禋于六宗祀祖考所尊者六三昭三穆是也司馬彪又上表云厯難諸家及自言已意天宗者日月星辰寒暑之屬也地宗社稷五祀之屬也四方之宗四時五帝之屬惟王肅據家語六宗與孔同各言其志未知孰是司馬彪續漢書云安帝元初六年立六宗祠於洛陽城西北亥地祀比大社魏亦因之晉初荀顗定新祀以六宗之神諸説不同廢之摯虞駁之謂宜依舊近代以來皆不立六宗之祠也楊氏曰諸儒説六宗異同如此愚按舜典類于上帝禋于六宗望于山川六宗在上帝之後山川之前其禮甚重因諸家之説不同而遂廢惜哉天子祭四方嵗遍諸侯方祀嵗遍祭四方謂祭五官之神於四郊也勾芒在東后土祝融在南蓐收在西元冥在北詩云來方禋祀方祀者各祭其方之官而已疏曰諸侯方祀者諸侯不得總祭四方之神唯祀當方故曰方祀曲禮下舞師教羽舞帥而舞四方之祭祀羽析白羽為之形如帗四方之祭祀謂四望也帗音拂一音弗疏曰教謂教野人使知之羽舞用白羽帗舞用五色繒用物雖異皆有柄其制相類故云形如帗也五嶽四瀆亦布在四方故知四方即四望也地官大司馬中秋教治兵疏曰言教治兵者凡兵出曰治兵入曰振旅春以入兵為名尚農事秋以出兵為名秋嚴尚威故也遂以獮田羅弊致禽以祀祊獮息淺反祊音方弊婢世反劉薄計反多秋田為獮獮殺也羅弊罔止也秋田主用罔中殺者也皆殺而罔止祊當為方聲之誤也秋田主祭四方報成萬物詩曰以社以方疏曰祊乃是廟門之外內惟因祭宗廟及明日繹祭乃為祊祭今既因秋田而祭當是祭四方之神故云誤也夏官月令季秋天子乃厲飾執弓挾矢以獵命主祠祭禽于四方注曰厲飾謂戎服尚威武也以所獲禽祀四方之神司馬職曰羅弊致禽以祀祊疏曰厲飾謂嚴厲武猛容飾熊氏云謂戎服者韋辨服也以秋冬之田故韋辨服若春夏則冠辨服故司服云凡甸冠辨服義或然也主祠謂典祭祀者也禽者獸之通名也四方四方有功於方之神也其祭四方但用此禽又用别牲故甫田云與我犧羊以社以方是也此祀四方者謂四方五行之神也大宗伯以疈辜祭四方百物疈孚逼反元鄭司農云罷辜披磔牲以祭若今時磔狗祭以止風謂疈疈牲胸也疈而磔之謂磔禳及蠟祭疏曰云若今時磔狗祭以止風者此舉漢法以况疈辜為磔之義必磔狗止風者狗屬西方金金制東方木之風故用狗止風也云疈疈牲胸也者無正文蓋據當時疈磔牲體者皆從胸臆解析之故以胸言之云謂磔禳及蠟祭者按禮記月令云九門磔禳又十二月大儺時亦磔禳是磔牲禳去惡氣之禮也春官鬯人掌共秬鬯而飾之注疏見社稷禮凡四方用蜃注疏見四望禮王祭羣小祀則元冕林澤墳衍四方百物之屬詳見羣小祀條四坎壇祭四方也四方即謂山林川谷邱陵之神也祭山林邱陵於壇川谷於坎祭用少牢疏曰四坎壇祭四方也者謂山林川谷邱陵之神有益於人民者也四方各為一坎一壇壇以祭山林邱陵坎以祭川谷泉澤故言坎壇祭四方陳氏禮書曰周禮大司馬春祭社秋祭祊舞師教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀詩曰以我犧羊以社以方又曰方社不莫古者言社必及方則社為民祈方為民報祈在春報在秋詩言來方禋祀明堂位言春社秋省則秋省斂而因祀焉此所謂來方禋祀也鄭康成釋曲禮謂四方五官之神東勾芒南祝融與犂西蓐收北元冥釋舞師謂四方四望也康成從先鄭之説釋大宗伯謂四方百物八蠟也然鬯人四方在山川之下大司樂四望在山川之上則四方非四望也舞師教羽舞帥而舞四方之祭祀鼓人凡祭祀百物之神鼓兵舞帗舞者則四方非百物也五官之説亦不可考大司馬於社言祭則地祗也於礿蒸言享則人鬼也於方言祀蓋兼上下之神也祀之之禮其位四郊其鬯蜃樽鬯人凡山川四方用蜃其舞羽舞舞師教羽舞帥而舞四方之祭祀其牲體則疈之其牲色則各以其方之色而已詩曰以我犧羊以社以方周禮小司徒小祭祀共牛牲則四方之祭不特用羊而已詩言犧羊者孔頴達言犧以見純明非特羊也頴達之言則是謂犧為純誤矣楊氏曰愚按四方篇注疏曲禮一條謂五官之神祭法一條謂山林川谷邱陵之神舞師一條謂四望之神大宗伯一條謂蠟祭四方百物之神月令一條謂四方五行之神大司馬一條謂祭四方之神詳考諸説惟舞師帥而舞四方之祭祀謂四望也其説為近蓋四方即四望而又有不同四望者郊祀之後合四方名山大川之神而望祭之如左氏曰望郊之屬是也四方者四時各望祭於其方如天子祭四方嵗遍是也通而言之則同時合祭四方謂之望四時各祭於其方亦謂之望如舜即位同時告祭曰望于山川嵗二月東巡狩亦曰望秩于山川是也諸侯方祀亦云嵗遍何也諸侯之國雖居一方然國內又各有東西南北亦隨四時而望祭於其方也望祭四方則五官之神五行之神及山林川澤之神皆在其中矣固不可又分而為四也大宗伯以疈辜祭四方百物亦謂之四方何邪按以血祭祭五嶽以疈辜祭四方百物禮固不同所謂祭四方百物言祭四方之內百物之神耳鼓人鼓兵舞帗舞疏云百物之小神是也非祭四方也漢興於甘泉汾隂立壇禋六宗平帝時王莽奏祀典功施於民則祀之天文日月星辰所昭仰也地理山川海澤所生殖也易有八卦乾坤六子水火相逮雷風不相悖山澤通氣然後能變化既成萬物也日月雷風山澤易卦六子之尊氣所謂六宗也星辰水火嶽瀆皆六宗之屬也今或未特祀或無兆謹與太師光等議易曰方以類聚物以羣分羣神以類相從為五部兆天墬之别神中央帝黃靈后土畤及日廟北辰北斗鎮星中宿中宫於長安城之未墬兆東方帝太皥青靈勾芒畤及雷公風伯廟嵗星東宿東宫於東郊兆南方炎帝赤靈祝融畤及熒惑星南宿南宫於南郊兆西方帝少皥白靈蓐收畤及太白星西宿西宫於西郊兆北方帝顓頊黑靈元冥畤及月廟雨師廟辰星北宿北宫於北郊兆奏可於是長安旁諸廟畤甚盛矣按王莽既以六子為六宗矣然所謂羣神以類相從為五部兆則日月雷風皆祠之而不及山澤何也後漢安帝元初六年三月初立六宗祀於洛陽城西戍亥之地禮比大社時司空李郃奏尚書禋于六宗漢興亦不廢今宜復舊制以尚書歐陽家説謂六宗者天地四方之中為上下四方之宗以元始中故事謂六宗易六子之氣日月雷公風伯山澤者為非是從之魏明帝立六宗祀六子之卦帝疑其事以問王肅肅以為六子之卦故不廢景初二年改祀太極中和之氣時散騎常侍劉劭言萬物負隂而抱陽沖氣以為和六宗者太極沖和之氣為六氣之宗也時從其議晉初罷其祀後復立六宗因魏舊事摯虞奏舜受命禋于六宗漢魏相承著為貴祀凡崇禮百神有其舉之莫敢廢也宜定新禮祀六宗如舊從之後魏明帝太常三年立六宗祀皆有别兆祭有常日牲用少牢孝文太和十三年詔祀天皇大帝及五帝之神於郊天壇時大議禋祀之禮高閭曰六宗之祀議者不同凡十一家莫能詳究遂相因承别立六宗之兆總為一位而祭之帝曰尚書稱肆類上帝禋于六宗文相接屬理似一事上帝稱肆而無禋六宗言禋而不别其名以此推之上帝六宗當是一時之祀非别祭之名肆類非獨祭之目禋非地祀之用六宗者必是天皇大帝及五帝之神是祭帝之事故稱禋以闕其地故稱六宗一祭也互舉以成之今祭圜丘五帝在焉其牲幣一也故稱肆類上帝禋于六宗一祭而祀備焉六祭俱備無煩别立通典評曰虞書肆類于上帝禋于六宗望于山川遍于羣神漢以王莽等奏日月星辰山川海澤六子之卦為六宗者按周禮以實柴祀日月星辰則星辰非六宗矣卦是物象不應祭之後漢馬融以天地四時為六宗者禮無禋地與四時之義孔安國言寒暑日月水旱為六宗者於理又乖鄭元以星辰司中司命風師雨師為六宗者並是星質不應更立風師雨師之位魏劉劭以沖和之氣六氣宗之者氣先於天不合禋天之下氣從天有則屬隂陽若無所受何所宗之其間有張迪以六代帝王張髦以宗廟三昭三穆等並不堪録後魏孝文帝以天皇大帝五帝為六宗於義為當何者按周禮以禋祀昊天上帝則禋祀在祀天不屬别神又司服云祀昊天上帝大裘而冕祀五帝亦如之昊天五帝乃百神之尊宗之義也或難曰書既云類上帝何更言禋者此敘巡狩祀禮之次矣將出征肆類也禋宗遍祀六天也何以肆類之文而迷都祀之禮乎儀禮祀方明儀諸侯覲於天子為宫方三百步四門壇十有二尋深四尺加方明於其上四時朝覲受之於廟此謂時會殷同也宫謂壝土為埓以象墻壁也為宫者於國外春會同則於東方夏南秋西冬北八尺曰尋十有二尋則方九十六尺也深謂高也從上曰深司儀職曰為壇三成成猶重也三重者自下差之為二等而上有堂焉堂上方二丈四尺上等中等下等每面十二尺方明者上下四方神明之象也會同而盟明神鑒之則謂之天之司盟有象者猶宗廟之有主乎王巡狩至於方嶽之下諸侯會之亦為此宫以見之司儀職曰將會諸侯則命為壇三成宫旁一門詔王儀南鄉見諸侯也方明者木也方四尺設六色東方青南方赤西方白北方黑上元下黃設六玉上圭下璧南方璋西方琥北方璜東方主六色象其神六玉以禮之上宜以蒼璧下宜以黃琮而不以者上下之神非天地之至貴者也設玉者刻其木而著之上介皆奉其君之旗置於宫尚左公侯伯子男皆就其旗而立置於宫者建之豫為其君見王之位也諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上尚左者建旗公東上侯先伯伯先子子先男而位皆上東方也諸侯入壝門或左或右各就其旗而立王降階南向見之三揖土揖庶姓時揖異姓天揖同姓見揖位乃定四傳擯王既揖五者升壇設擯升諸侯以會同之禮其奠瑞玉及享幣公拜於上等侯伯於中等子男於下等擯者每延之升堂致命王受玉撫玉降拜於下等及請事勞皆如覲禮是以記之覲云四傳擯者每一位畢擯者以告乃更陳列而升其次公也侯也伯也各一位子男俠門而居東上亦一位也至庭乃設擯則諸侯初入門王官之伯帥之天子乘龍載大旗象日月升龍降龍出拜日於東門之外反祀方明此謂會同以春者也馬八尺以上為龍大旗太常也王建太常縿首畫日月其下及旒交畫升龍降龍朝事儀曰天子冕而執鎮圭尺有二寸繅藉尺有二寸搢大圭乘大路建太常十有二旒樊纓十有二就二車十有二乘帥諸侯而朝日於東郊所以教尊尊也退而朝諸侯由此二者言之已祀方明乃以會同之禮見諸侯也凡會同者不協而盟司盟職曰凡邦國有疑會同則掌其盟約之載書及其禮儀北面詔明神既盟則二之言北面詔明神則明神有象也象者其方明乎及盟時又加於壇上乃以載辭告焉詛祝掌其祝號禮日於南門外禮月與四瀆於北門外禮山川邱陵於西門外此謂會同以夏冬秋也變拜言禮者客祀也禮月於北郊者月太隂之精以為北神也盟神必云日月山川者尚著明也詩曰謂豫不信有如皎日春秋傳曰縱豫忘之山川神祗其忘諸乎皆以神為信也祭天燔柴祭山邱陵升祭川沈祭地瘞升沈必就祭者也就祭則是謂王巡狩及諸侯之盟祭也其盟揭其著明者也燔柴升沈瘞祭禮終矣備矣郊特牲曰郊之祭也迎長日之至也大報天而主日也宗伯職曰以實柴祀日月星辰則燔柴祭天謂祭日也柴為祭日則祭地瘞者祭月也日月而云天地靈之也王制曰王巡狩至于岱宗柴是王巡狩之盟其神主日也春秋傳曰晉文公為踐土之盟而傳云山川之神是諸侯之盟其神主山川也月者太隂之精上為天使臣道莫貴焉是王官之伯會諸侯而盟其神主月與揭若蓋反儀禮朱子曰愚按覲禮特言拜日禮日禮月禮山川邱陵而無禮天禮地之文下文乃曰祭天燔柴祭山邱陵升祭川沈祭地瘞何也鄭注曰升沈必就祭者也就祭謂王巡狩及諸侯盟祭也此蓋博記祭天地日月山川邱陵之禮有燔柴升沈瘞之别非專言覲禮也注又傅會上文為之説曰燔柴祭天者祭日也祭地瘞者祭月也王巡狩之盟其神主日諸侯之盟神主山川王官之伯會盟其神主月一説之外又生一説穿鑿支離甚矣王制嵗二月東巡狩至于岱宗柴而望祀山川覲諸侯疏曰柴祭天告至謂燔柴以祭上天而告至其祭天之後乃望祀山川覲見東方諸侯告至之後為宫加方明於壇天子出宫東門外拜日反祀方明祀後乃徹去方明故鄭云由此二者言之已祀方明乃以會同之禮見諸侯云二者謂覲禮經文朝日東門反祀方明朝事儀云朝日東郊退而朝諸侯故云由此二者言之已祀方明乃以會同禮見諸侯也今於覲禮未祀方明之先未有見諸侯之事若有不協更加方明於壇上諸侯等俱北面戎右傅敦血以授歃者司盟主其職故司盟云掌其盟約之載及其禮儀北面詔明神於時王立無文不可與諸侯同北面當於阼階上西面又以柴為盟之所用不同者告至與盟必非一事鄭意證巡狩盟時有柴故引岱宗以明之秋官司儀將合諸侯則令為壇三成宫旁一門合諸侯謂有事而會也為壇於國外以命事宫謂壝土以為墻處所謂為壇壝宫也天子春帥諸侯拜日於東郊則為壇於國東夏禮日於南郊則為壇於國南秋禮山川邱陵於西郊則為壇於國西冬禮月四瀆於北郊則為壇於國北既拜禮而還加方明於壇土而祀焉覲禮曰諸侯覲於天子為宫方三百步四門壇十有二尋深四尺是也王巡狩殷國而同則其為宫亦如此與疏曰云有事而會也者春秋左氏傳文但春秋時有事而會不協而盟是霸者法引之者時雖不同為有事而行會禮則曰故引以為證云為壇於國外以命事者宫方三百步明在國外也言命事則大行人云時會以發四方之禁禁即九伐是其事也云既拜禮而還加方明于壇上而祀焉所以教尊尊也者言教尊尊者天子親自拜日禮月之等是尊尊之法教諸侯以下尊敬在上者也秋官司盟凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之有疑不協也明神神之明察者覲禮加方明於壇上所以依之也詔之者讀其載書以告之也二之者寫副當以授六官疏曰時見曰會殷見曰同若有疑則明之文獻通考卷八十一
