body:
  text: 文獻通考卷六十四鄱陽馬端臨貴與著職官考十八文散官開府儀同三司漢文帝元年始用宋昌為衛將軍位亞三司後漢章帝建初三年始使車騎將軍馬防班同三司同三司之名自此始也殤帝延平九年鄧隲為車騎將軍儀同三司儀同之名自此始也又獻帝以伏完為輔國將軍儀比三司魏黃權以車騎將軍開府儀同三司開府之名自此始也漢末奮威將軍晉江右伏波輔國將軍並加大而儀同三司江左以來將軍則中鎮撫四鎮以上或加大餘官則左右光祿大夫以上並得儀同三司齊開府儀同三司如公梁開府儀同三司位次三公諸將軍左右光祿大夫優者則加之同三公置官屬自晉以來又有如開府同三司之儀者自羊祜始焉漢末呂布開府如三司其他無聞至晉羊祜為車騎將軍荆州諸軍事加開府如同三司之儀纍年謙讓不辟士不備僚屬及始有所命辟士未到而卒不得除署後當陽侯杜元凱表哀其家無子嗣官無命士請更議之詔不許江左亦多有之梁沈約為侍中右光祿大夫徐勉為約請三司之儀武帝不許又邵陵王綸為平南將軍胡州刺史王茂為使持節散騎常侍驃騎將軍並同三司之儀後魏亦有之普泰初特以爾朱世隆為儀同三司位次上公北齊亦有儀同三司者任城王湝等諸王多為之湝戶皆反又有開府儀同三司及儀同三司後周建德四年改開府儀同三司為開府儀同大將軍仍增置上開府儀同大將軍又改儀同三司為儀同大將軍仍增置上儀同大將軍隋文帝並以為散官又諸衛各置開府左勳衛開府右翊一開府二開府三開府及武衛武侯領軍東宫領兵開府準此府置開府一人又有儀同府儀同以下置員與開府同初開府儀同三司為四品散實官至煬帝又改為從一品同漢魏之制位次三公唐武德七年改上開府儀同三司為上輕車都尉開府儀同三司為輕車都尉儀同三司為騎都尉後又以開府儀同三司為文散官開元以前舊例開府特進雖不𢃄職事皆給俸祿得與朝會班列依夲品之次皆崇官盛德罷劇就間者居之天寶六載正月制內外文武五品以上官父祖資廕者其所用廕宜同子孫用廕之例宋制祖宗時以節度使兼中書令或侍中或中書門下平章事皆謂之使相以待勳賢故老及宰相久次罷政者隨其舊職或檢校官加節度使出判大藩通謂之使相故事宰相去位例進官一等或易東宫三少惟趙普以開國舊臣在相位久故以使相罷蓋異恩也其後呂夷簡王欽若罷相皆以為例元豐新官制始改為開府儀同三司舊制敕出中書門下故事之大者使相係銜至是皆南省奉行則開府不預矣八年鎮江軍節度使檢校太傅韓絳為開府儀同三司判大名府元祐五年太師平章軍國重事文彥博為開府儀同三司守太師充護國軍山南西道節度使致仕自崇寧五年司空左僕射蔡京為開府儀同三司安逺軍節度使中泰一宮使其後故相而除則有劉正夫余深前執政則有蔡攸梁子美外戚則有向宗回宗良鄭紳錢景臻殿師則有髙俅內侍則有童貫梁師成名器至此輕矣紹興後呂頤浩韓世忠皆以開府儀同三司除少保按三朝國史職官志敘元豐寄祿新格以階易官謂開府儀同三司即舊使相然使相者是以侍中中書令平章事加節度使之謂也自唐至宋皆有之而事體微不同唐則多以同平章事加節度使之立勳勞而久任者蓋將而寵以相之名也宋則多以節度使加平章事之有德望而罷政者蓋相而寵以將之名也合而言之蓋位兼將相品極文武之稱今既曰以開府儀同三司易使相矣然韓絳為開府而復加以鎮江之節文彥博為開府而復加以護國山南之節蔡師為開府而復加以安逺之節則是且為開府且為使相而使相之名未嘗廢矣又況神宗更官制之夲意實以三省寺監之官無職掌為非遂欲易而正之如改左右僕射為特進則遂以僕射為宰相之職改左右丞為光祿大夫則遂以左右丞為執政之職今節度使之在宋其無職掌與開府儀同三司一也何須以開府易之况有開府之後宰相之除節度使元未嘗廢乎竊疑開府儀同三司特専以易三省長官尚書令中書令侍中而于使相節度使無預張演著職官記敘元豐新官而并著舊官于開府儀同三司之下只注舊官云中書令侍中同中書門下平章而不言使相雖與史志不合似為得之特進漢制諸侯功德優盛朝廷所敬異者賜位特進位在三公下故成都侯王商以特進領城門兵置幕府得舉吏如將軍是也後漢皇后父兄率為特進侯朝會位次三公隋志曰特進舊位從公光武以鄧禹列侯就第特進奉朝請是特進引見之稱無官定體也而竇篤進位特進得舉吏見禮依三公自二漢及魏晉以為加官從夲官車服無吏卒太僕羊琇遜位拜特進加散騎常侍無餘官故給吏卒車服其餘加特進者唯食其祿賜列其班位而已不别給特進吏卒車服晉惠帝元康中定令特進位次諸公在開府驃騎上冠進賢兩梁冠黑介幘五時朝服佩水蒼玉食俸日四斛太康三年始賜春絹五十匹秋絹五十匹綿百五十斤元康元年給菜田八頃田騶八人立夏後不及田者食俸一年置主薄功曹史門亭長門下書佐各一人給安車黑耳駕御一人輅車施耳後戶一乘無章綬齊時位從公陳因之後魏北齊用人皆以舊德就間者居之隋文帝為散官不理事煬帝即位廢特進官唐為文散官餘見開府門宋制左右僕射為宰相官元豐更官制乃以特進換之時王安石獨改特進至政和後薛昻帶觀文殿學士位特進白時中以門下侍郎帶特進皆失舊制繼紹聖改金紫光祿大夫今後特進非宰相不除光祿大夫以下秦時光祿勳屬官有中大夫漢武帝太初元年更名光祿大夫漢志曰夫者扶也膚也詩曰殷士膚敏灌將于亰明當以其肌膚知能侍君父也銀章青綬掌議論屬光祿勳門外特施行馬以旌别之無常事唯顧問應對詔命所使無員後漢光祿大夫三人凡諸國嗣王之喪則掌弔多以為拜假賵贈之使及監護喪事魏氏以來無員轉優重不復以為使命之官其諸公告老皆家拜此位及在朝顯職復用加之魏文帝以楊彪為光祿大夫賜几杖衣𫀆因朝會引見令楊彪著布單衣鹿皮冠杖而入待以賔客之禮及晉受命置左右光祿大夫假金章紫綬而光祿大夫如故加金章紫綬並與卿同進賢兩梁冠黑介幘五時朝服佩水蒼玉并祿賜班位吏卒皆與特進同復以為優崇之制而諸公遜位不復加之其以為加官者唯假章綬祿賜班位而已不别給車服吏卒也或更拜上公或以夲封食公祿其諸卿尹中朝大官年老致事及內外之職加此者前後甚衆由是或因得開府或進加金章紫綬又復以為禮贈之官夲已有卿官者不復重給其餘皆假其假銀章青綬者位在金紫將軍下諸卿上泰始中唯太子詹事楊珧加給事中光祿大夫加兵之制諸所供給依三品將軍晉宣帝子平原王幹拜光祿大夫加侍中特假金章紫綬班次三司其餘自如舊制終武惠孝懷三世食俸日三斛太康二年始給春絹五百匹綿百斤惠帝元康元年始給菜田六頃田騶六人置主簿功曺史門亭長門下書佐各一人宋氏因之齊左右光祿大夫皆據舊齒位從公開府置佐吏如公年重加親信二十人魏晉以來無員以左右光祿大夫光祿大夫皆銀章青綬其重者詔加金章紫綬則謂之金紫光祿大夫其重者既有金紫之號故謂夲光祿為銀青光祿大夫晉時王翹之為銀青光祿大夫樂安任遐為光祿就王晏乞一片金晏乃啓轉為金紫是也猶屬光祿勳梁又有左右金紫光祿大夫視吏部尚書左右光祿大夫視諸曺並養老病陳因之自晉以後多為兼官後魏有光祿大夫金紫銀青光祿大夫北齊皆以舊德就間者居之與特進同後周有左右金紫左右銀青四光祿大夫隋有光祿大夫左右光祿大夫皆為散官不理事唐初猶有左右之名貞觀以後唯曰光祿大夫金紫光祿銀青光祿並為文散官按前代光祿大夫始加金章紫綬及銀章青綬者並尊崇之皆在光祿之上後魏定令誤遂因仍不改宋元豐更官制以金紫光祿大夫換吏部尚書銀青光祿大夫換五部尚書時宰相王圭任禮部侍郎同平章事上以圭久不進官因改官制乃特授銀青光祿大夫光祿大夫換尚書左右丞宣奉大夫正奉大夫二階古無之宋大觀間新置正議大夫隋散官蓋取秦大夫掌論議之義唐因之宋元豐更官制以正議大夫換六部侍郎并作一等時議以為宰執貪進官作此蓋故事丞郎作四轉今乃減作兩轉耳通奉大夫古無此階宋大觀間新置通議大夫隋散官義與正議同唐因之宋元豐更官制以通議大夫換給事中太中大夫秦官亦掌議論漢因之哀帝初立御史大夫王嘉奏曰蘇令發起為盜欲遣大夫使時見大夫無可使者召盩厔令尹逢拜為諫大夫遣之今諸大夫有才者甚少宜預畜養也後漢置二十人張湛拜太中大夫居中東門候舍故人號為中東門君又隗囂廣置識位以自髙鄭興止之曰夫太中大夫使持節官皆王者之器非人臣所當置也胡廣云諫議光祿太中中散大夫此四等于古禮皆天子之下大夫列國之上卿魏以來無員晉視中丞吏部絳朝服進賢一梁冠介幘太始末詔除王覽為太中大夫祿賜與卿同梁北齊唐皆因之宋元豐官制行以太中大夫換諫議大夫神宗以寄祿官等級減少遂以太中大夫為宰相官故蔡確時任右諫議大夫參知政事先換太中大夫及拜相則依前太中大夫守尚書右僕射兼中書侍郎遂為定制其後又以太中大夫以上為侍從官元豐中自太中大夫至金紫止六階昔之五部尚書今為一官六部侍郎為一官是十一官併為兩官矣左右丞左右諫議亦並四官為兩官其後增置通奉正奉宣奉三階自太中大夫以上惟宰執侍從得遷中大夫秦官漢武改為光祿大夫自後無聞北齊有之唐又置龍朔二年七月制諸王嫡子封郡王者出身從四品下敘宋元豐更官制以中大夫換祕書監而殿中監夲一等其時偶關任殿中監者故只著祕書監神宗以太中大夫為宰相官故初除執政只授中大夫是時拜翰林學士蒲宗孟王安禮為左右丞二公寄祿官皆未至大夫只除中大夫守之中奉大夫古無此階宋大觀間新置中散大夫王莽所置後漢因之復置三十人漢官曰光武中興置魏晉無員齊梁視黃門侍郎品服冠幘與太中同陳及唐皆有之朝議大夫隋置散官以取漢諸大夫得上奉朝議為名唐因之宋元豐更官制以朝議大夫換左右司郎中侍從太常少卿館職光祿少卿出身應補又元豐中自朝議至中大夫凡三階後增置中奉奉直大夫兩階蓋祖宗舊制有出身人自郎中三遷至祕書監廕補人自郎中五遷至祕書監今增置奉直中奉而有出身人不遷中散奉直猶舊制也侍從官在祖宗時自郎中再遷即為諌議大夫是以朝議大夫徑遷太中大夫今亦遷中奉大夫非舊制也朝議大夫以上係卿監奉直大夫古無此階宋大觀間新置朝請大夫隋置散官取漢將軍公卿年髙德重者以列侯就第特進奉朝請之義唐因之龍朔置諸王衆子封郡公者出身從五品上敘宋元豐更官制以朝請大夫換前行郎中朝散大夫隋置散官唐因之宋元豐更官制以朝散大夫換中行郎中朝奉大夫古無此階宋元豐更官制以朝奉大夫換後行郎中官制舊典云故事若各曹謂兵刑工部也及司封司勳度支金部祠部主客雖轉正郎亦不呼郎中只稱其曹名以示其出常調也自改大夫更無别異且古大夫猶今之執政侍從也書所謂日宣三德者是焉曲禮曰四郊多壘卿大夫之辱也由此觀之豈宜換授庶僚耶在漢晉間只有光祿太中大夫中散大夫為侍從官當論思獻納之任至隋唐增名作階已非所宜今乃易少卿監郎中是輕其名器也朝奉大夫以上係正郎王氏揮塵録曰更官制後惟光祿大夫及中散朝議二大夫分左右增磨勘而已初非以科第也元祐間范忠宣當國始帶左右紹聖初罷去事見常希古奏疏大觀又置中奉奉直二大夫撤中散朝議左右字紹興初編修官楊願啓請再分左右自是以出身為重朝議郎以下朝議郎隋置散官唐因之顯慶五年制郡公出身正六品下敘宋無朝請郎隋置散官蓋採晉及六朝並有奉朝請為名唐因之顯慶制侯出身正七品上敘宋元豐更官制以朝請郎換前行員外郎侍御史朝散郎隋置散官唐因之顯慶制伯出身正七品下敘子出身從七品上敘宋元豐更官制以朝散郎換起居舍人及中行員外郎朝奉郎古無此階宋元豐更官制以朝奉郎換左右司諫及後行員外郎朝奉郎以上係員外郎承議郎隋有承議郎為散官唐因之品與朝議郎同宋元豐更官制以承議郎換左右正言太常國子博士奉議郎隋置通議郎為散官隋文帝于吏部别置朝議通議朝請朝散給事承事儒林文林等八郎武騎屯騎驍騎逰騎飛騎旅騎雲騎羽騎八尉其品則正六品以下從九品以上上皆為郎下皆為尉散官番直常出入使監檢至煬帝皆罷唐改通議為奉議郎顯慶制縣公出身從六品上敘宋元豐更官制以奉議郎換太常祕書殿中丞著作郎通直郎隋置三十人蓋採晉宋以來諸官皆有通直謂官髙下而通為宿直也因此為名唐因之宋元豐更官制以通直郎換太子中允贊善大夫洗馬自通直郎以上係升朝官宣教郎隋置宣德郎為散官唐因之品與朝散郎同宋元豐更官制以宣德郎換著作佐郎大理寺丞政和間避宣德門改為宣教郎宣義郎隋有遊騎尉為散官唐改為宣義郎蓋取梁宣義將軍之名顯慶制男出身從七品下敘宋元豐更官制以宣義郎換光祿衛尉寺將作監丞給事郎徴事郎二階隋散官唐因之宋無承事郎古無此階宋元豐更官制以承事郎換大理評事為狀元及第宰相任子之初官承奉郎隋置散官唐因之宋元豐更官制以承奉郎換太祝奉禮郎執政任子初官承務郎唐置蓋因隋尚書省三十四司承務郎之名宋元豐更官制以承務郎換校書郎正字將作監主簿自承務郎以上係京官承直郎古無此階宋崇寧定選人七階以承直郎換留守節察判官按元豐未改官制之先大率以職為階官以宰執言之如吏部尚書階官同中書門下平章事職尚書禮部侍郎階官參知政事職之類是也然所謂吏部尚書禮部侍郎者未嘗専有所係屬治其事則以為職不治其事則以為階官猶云可也獨選人七階則皆以幕職令録之屬為階官而幕職令録則各有所係屬之監司州縣遂至有以京西路某縣令為階官而為河北路轉運司勾當公事者有以陜西路某軍節度判官為階官而為河東路某州州學教授者有以無為軍判官為階官而試祕書省校書郎者其叢雜可笑尤甚元豐時赤暇革正至崇寧二年刑部尚書鄧洵武極言其事遂以承直郎以下七階換之儒林郎隋置散官蓋取前史儒林傳之義唐因之宋崇寧初以儒林郎換節察掌書記支使防團判官文林郎隋置散官蓋取北齊文林館徵文學之士以充之義唐因之宋崇寧初以文林郎換留守節察推官軍監判官從事郎古無此階宋崇寧定選階以從事郎換防團推官監判官從政郎古無此階宋崇寧定選階初以通事郎換録事參軍縣令政和間改通事郎為從政郎修職郎唐置登仕郎宋崇寧初以登仕郎換知録事參軍知縣令政和間改登仕郎為修職郎迪功郎隋置將仕郎為散官唐因之宋崇寧初以將仕郎換軍巡判官司理司法司戶簿尉以上七階係選人用舉考及功賞改官政和既以從政修職迪功郎易通仕登仕將仕郎其通仕登仕將仕三階係奏補未出官人右宋初省臺寺監之官特以寄祿皆不領夲職元豐三年始按唐六典肇新官制凡省臺寺監領空名者一切罷去而易之以階文階自開府至將仕為二十四崇寧大觀政和相繼潤色之紹興舉行元祐之法分置左右詞人為左餘人為右淳熙初乃去右右字今任子雜流惟細轉通直郎奉直中散二大夫有出身人不轉若帶貼職則超資京官以上四年一轉無出身人逐資轉有出身人超資轉至奉議並逐資轉至朝議大夫有止法仍七年一轉武散官驃騎將軍漢武帝元狩二年始用霍去病為驃騎將軍定令令驃騎將軍秩祿與大將軍等光武中興以景丹為驃騎大將軍位在三公下明帝初即位以弟東平王蒼有賢才以為驃騎將軍以王故位在公上蒼為驃騎輔政開東閣延英雄及蒼歸國有驃騎時吏斗食周相以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞褒美之數年復罷其官屬附見大將軍後魏晉齊並有之梁雜號中亦有陳後主以蕭摩訶為侍中驃騎大將軍加左光祿特開黃閣施行馬廳事寢堂置鴟尾如三公制後魏初加大則在三司上太和中制加大則在都督中外諸軍下後周亦有之隋開皇中置驃騎將軍府每府置驃騎車騎將軍各二人十七年頒銅獸符於驃騎車騎府煬帝改驃騎為鷹揚郎將改車騎為鷹揚副郎將唐復改為車騎驃騎其制如開皇而益復微矣故武德元年詔以軍頭為驃騎將軍軍副為車騎將軍又詔太子諸率府各置驃騎將軍五員車騎將軍十員後皆省之顯慶元年乃復置驃騎大將軍為武散官輔國將軍後漢獻帝置輔國將軍以伏完為之晉王濬平吳後拜輔國大將軍有司奏輔國依比未為逹官不置司馬不給官騎詔依征鎮給五百大車增兵五百人為輔國營給親騎百人官騎十人置司馬宋明帝泰始四年改為輔師將軍後廢帝昱元徽二年復故梁後魏後周隋並有之唐輔國大將軍為武散官鎮軍將軍以下鎮軍大將軍魏置文帝以陳羣為之晉則楊駿胡奮並領鎮軍將軍齊後周隋亦