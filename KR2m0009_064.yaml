居大夫之上至紹興始釐正其序自正侍郎至右武郎舊在武功大夫之上今釐正在武翼大夫之下武經郎之上又通侍大夫舊為內客省使國朝未嘗除人自易武階不遷通侍沿初意也轉至忠侍無磨勘者特旨除修武郎以上為大使臣承信郎以上為小使臣五年一轉至武功大夫有止法進武校尉進義校尉下班祗應進武副使進義副尉守闕進義副尉進勇副尉守闕進勇副尉以上無品二校尉參吏部下班參兵部以下並參刑部元豐初定官制或請併內侍官名易之神宗曰祖宗為此名有深意豈可輕議政和二年始改焉凡十有二階新官舊官供奉官內東頭供奉官左侍禁內西頭供奉官右侍禁殿直左班殿直髙品右班殿直髙班黃門黃門祗候侍禁祗候殿頭祗候殿直祗候髙班祗候黃門祗候髙班內品內品祗候內品貼祗候內品以上三名仍舊不改按唐宦者所厯散官與文官同仇士良至開府儀同三司請廕其子給事中李中敏判云開府階誠宜廕子謁者監何由有兒是也此外則貴璫之階官至金紫光祿大夫正議大夫者多有之祖宗立法不以內侍溷清流故曰有階官云政和初既易武階而醫官之名亦遂改焉凡十有四階新官舊官和安成安成全成和大夫軍器庫使保和大夫西陵錦使保安大夫𣙜易使翰林良醫翰林醫官使和安成和成安成全郎軍器庫副使保和郎西陵錦副使保安郎𣙜易副使翰林醫正翰林醫官副使凡除職事官以寄祿官品之髙下為凖髙一品以上為行下一品為守下二品已下為試品同者否紹聖三年戶部侍郎吳居厚言神宗官制凡臺省寺監之制有行守試三等之别元祐中裁減冗費而職事官兼行者第存虛名而已請付有司講復舊制從之四年翰林學士蔣之竒言所謂試則非正官也今尚書侍郎皆正官而謂之試失之矣如以其階卑則謂之守可也臣請凡有正官者皆改試為守崇寧中吏部授選人差遣亦用資序髙下分行守試三等政和三年詔選人在京職事官依品帶行守試其外任則否宣和以後官髙而仍舊職者謂之領官卑而職髙者謂之視故有庶官視從官從官視執政執政視宰相凡道官亦視文階云勳官上柱國柱國皆椘之寵官楚懷王使柱國昭陽將兵攻齊陳軫問楚國之法破軍殺將者何以貴之昭陽曰其官為上柱國是也陳勝為王蔡賜為上柱國厯代無聞至後魏孝莊以爾朱榮有翊載之㓛拜為柱國大將軍位在丞相上又拜大丞相天柱大將軍增佐吏及榮敗後天柱及柱國將軍官遂廢天柱之名尊崇莫大昔王莾末劉伯升起兵自號天柱大將軍而梁末侯景充建業後亦自為宇宙大將軍都督六合諸軍事至大統中始以宇文泰為之其後功參佐命聲實俱重者亦居此職自大統十六年以前任者凡有八人宇文泰元欣隴西公緯李弼獨孤信趙貴于謹侯莫陳崇時宇文泰任總百揆督中外軍事元欣以魏氏懿戚從容禁闥而已其餘六人各督二大將軍凡十二大將軍當時榮盛莫以為比其稱門閥者咸推八柱國家其後功臣位至柱國者衆矣咸是散秩無復統御也後周建德四年增置上柱國大將軍隋置上柱國柱國以酬勳勞並為散官實不理事楊元感以父素軍功位至柱國與其父俱為第二品朝會則齊列後文帝乃命元感降一等也唐改為上柱國及柱國秦有護軍都尉漢因之髙帝以陳平為護軍中尉盡護諸將然則復以都尉為中尉陳平為護軍中尉人讒之曰平受諸將金多者得善處金少者得惡處武帝元狩四年以護軍都尉屬大司馬於時復為都尉矣成帝綏和元年居大司馬府比司置哀帝元夀元年更名司寇平帝元始元年更名護軍初韓安國以護軍將軍擊胸奴趙充國以大將軍都尉擊武都也漢東京省班固為大將軍中護軍𨽻將軍幕府非漢朝列職魏武帝為丞相以韓浩為護軍史奐為領軍亦非漢官也建安十二年改護軍為中護軍領軍為中領軍魏初因置護軍將軍主武官選𨽻領軍晉世則不𨽻矣厯代史籍皆云護軍將軍主武官選則領軍無主選之文唯陶藻職官要録云領軍將軍主武官選舉而護軍不言主選又引曹昭叔𫐠孝詩敘曰余年三十遷中領軍總六軍之要秉選舉之機以此為證今按漢髙帝初以陳平為護軍中尉已令主武官選矣故陳平有受金之讒又魏略云護軍之官總統諸將主武官選前後當此官者不能止貨賂故蔣濟為護軍時有謠曰欲求牙門當得千匹五百人督得五百匹司馬宣王與濟善聞此聲以問濟濟無以解之及夏侯元代濟故不能止絶人事及晉景帝代元為中護軍整頓法度人莫敢犯者又王隱晉書曰景帝為中護軍作選用之法舉不越功吏無私焉又晉起居注云武帝詔曰中護軍職典戎選宜得幹才遂以羊琇為之宋志又云主武官選按此則護軍主選明矣而陶藻所言領軍主選及昭叔之敘者當因省併之際為一時之權宜非厯代之恆制元帝永昌元年省護軍併領軍明帝太寧二年復置魏晉江右領護各領營兵江左以來領軍不復别置營總管二衛驍騎材官諸營護軍猶别有營也周顗庾亮王義之謝安王彪之等並為護軍宋護軍將軍一人掌外軍領護軍重者為領軍將軍護軍將軍資輕者為中領軍中護軍其官屬有長史司馬功曹主簿五官受命出征則置參軍齊梁陳並有之北齊護軍府統四中郎將皆置佐史隋煬帝十二衛每衛置護軍四人以副將軍將軍無則一人攝尋改護軍為虎賁郎將唐採前代舊名置上護軍護軍輕車將軍漢武帝置以公孫賀為之又有輕車校尉梁陳後魏北齊亦有輕車將軍唐採舊名置上輕車都尉輕車都尉騎都尉漢武帝置以李陵為之更始初亦有故時謡云爛羊胃騎都尉晉以後厯代皆有之唐採舊名置上騎都尉騎都尉驍騎尉飛騎尉雲騎尉武騎尉並隋置為文散官唐採置自上柱國以下並為勳官宋制勳官十有二上柱國柱國上護軍護軍上輕車都尉輕車都尉上騎都尉騎都尉驍騎尉飛騎尉雲騎尉武騎尉右騎都尉以上兩府並武臣正任已上經恩加兩轉文武朝官加一轉武騎尉以上京官加一轉朝官雖未至驍騎尉經恩亦便加騎都尉功臣推忠佐理協謀同德守正亮節翊戴贊治崇仁保運經邦右以賜中書樞密院臣僚宰相初加六字餘臣初加四字其次並加兩字舊有功臣者改賜之推忠保德翊戴守正亮節同德佐運崇仁協恭贊治宣德純誠保節保順忠亮竭誠奉化效順順化右以賜皇子皇親文武臣僚外臣初加四字次加兩字拱衛翊衛衛聖保順忠勇拱極護聖奉慶果毅肅衛右以賜諸班直將士禁軍初加二字冉加亦如之政和中罷勳官淳熙末朝議欲復之以旌有功如貼職之比後亦不果行惟安南闍婆占城三國王始封加上柱國南丹州刺史加武騎尉焉加功臣號始於唐德宗宋朝因之至元豐乃罷中興後加賜者三人而已韓世忠楊武翊運功臣張俊安民靜難功臣劉光世和衆輔國功臣此外惟安南國王初除及經恩亦加功號嶽氏愧郯録曰按階散勳官在前世合于一至唐則析而為二階勳功臣檢校在唐則析于四而夲朝則合于一其用與不用實寓見于是自宋齊梁陳後魏北齊以來諸九品官皆以將軍為品秩謂之加戎號比正如國初軍制皆以御史為品秩謂之加憲銜也梁制雖親王起家未加將軍不開府不置佐史官可以見一時以此號為重然其實未嘗將屯亦虛名耳隋既受命髙祖採後周之制置上柱國柱國上大將軍大將軍上開府儀同三司開府儀同三司上儀同三司儀同三司大都督帥都督都督總十一等以酬勤勞又有特進左右光祿大夫金紫光祿大夫銀青光祿大夫朝議大夫朝散大夫並為散官又加文武官之德聲者並不理事又有翊軍等四十三號將軍品凡十六等為散號將軍以加將校居曺有職務者為執事官無職務者為散官戎上柱國已下為散實官軍為散號官諸省及左右衛武候餘左右監門府為內官自餘為外官散官之名肇見于是遷考漢制光祿大夫太中大夫郎議郎中郎侍郎郎中皆無員多至數十人特進奉朝請亦皆無職守優遊祿秩則官之有散自漢已有之矣然當時之仕于朝者不任以事則置之散正如今日宫觀設官之比未有以職為實以散為號如後世者也故成都侯王商以特進領城門兵置幕府得舉吏是正如今日兼官不可以官稱為比梁制左右光祿金紫光祿太中中散等大夫並無員以養老疾遡而考之魏晉宋齊元魏下而考之陳北齊後周隋亦莫不有之九品十八班之間元魏初又嘗置散官五等其品第五至第九百官有闕則取于其中以補之蓋皆以儲才待須而亦與諸職事官均其勞佚也逮隋開皇六年始置六品以下散官八郎為正階八尉為從階通而觀之則九品之內皆有散官以酬勞矣惟正一品虛而不置所以章其貴也煬帝嗣位多所改更先罷特進次罷十一等酬勞官八郎八尉四十三號將軍併省朝議大夫置九大夫八尉自一品至九品别有其制繼雖復儒林郎文林郎列之七品八品正乃𨽻祕書省置二十人若三十人専以明經待問撰録文史為職又若職事官無與于散階也尋又置散騎郎二十人為從五品承議通直郎各三十人為正從六品宣德宣義郎各四十人為正從七品徵事將仕郎各五十人為正從八品常從奉信郎各五十人為正從九品是為正員並得祿當品又各有散員郎無祿隋又改常從為登仕奉信為散從自散騎而下皆主出使量事大小據品以發之則正如國初九品京朝官皆在京師其罷職者歸夲班守夲官其出使者知某州轉運某路之制耳尚書省六曺皆置承務郎一人同員外郎之職乃正與今尚書郎等又非散號如限員以設官使其别有所授決知其必不復徒𢃄以為美觀也而唐乃析之郎大夫之秩光祿中散之養疾儒林文林之待問一歸之於文散散號將軍參取雜置益以校尉一歸之於武散柱國等號夲以酬勞武騎諸稱並同郎位一歸之于勳官則階散也勳官也唐雖因隋而所用未嘗因隋有職者改為虛名徒名者置在兼秩是所謂前世合于一而唐則析為二史大奈與髙祖興太原飲馬泉之戰功多授光祿大夫階李晟以克復元勳立功時諸子未官宰相以聞即日詔子願為上柱國故事柱國門列戟遂父子皆賜杜淹貞觀中檢校吏部尚書再加檢校侍中代宗以射生軍清難而有寶應之稱德宗以涇軍煽逆而有定難之號後隨事而賜亦無定名故唐之有功者或敘階或賜勳或加以檢校或寵以名號皆上之人有以寓一時之微權而初無階升必致之道四者並用而又申之以封爵重之以實封馭貴馭富又雜取而輔之在祖宗朝若功臣之名猶有官不當賜而特賜如開寶之于王明太平興國之于杜彥釣陳信從郝正大中祥符之于王丞美天禧之于向漢通南渡以後髙皇舉久廢之典以寵二三大將其他則不多見也每一遇郊官至某則加功臣若干字酬勳若干級進階若干等徹國若干戶並舉而豫之故世但以為煩而不見其用是所謂唐析於四而夲朝則合于一既合矣而不能分此所以發神宗皇帝之獨斷一舉而盡去之也政和罷勳官徒以太平之世不欲用議易之而未暇孝宗淳熙間廷䇿多士發為清問有意復之而未能誠使無並用之術祖已成之例一歸之有司則雖無復可也因虛以濟實即名以輔治一歸之君上則雖盡復之亦可也世之議者多以其名之混淆未易别白故表而著之以俟觀者擇焉檢校官一十九太師太尉太傅太保司徒司空左僕射右僕射吏部尚書兵部尚書戶部尚書刑部尚書禮部尚書工部尚書左散騎常侍右散騎常侍太子賔客國子祭酒水部員外郎右皇子初授官加太尉初除樞密使使相及曽任宰相樞密使除節度使加太傅初除宣徽節度使加太保宗室初除使相加尚書左僕射特除并換授諸司使已上加工部尚書諸司副使加右散騎常侍除通事舍人內殿崇班以上初授加太子賔客副率以上并三班及吏職蕃官軍員該恩加國子祭酒廂都指揮使止于司徒軍都指揮使忠佐馬步都軍頭止于司空軍班都虞候忠佐副都軍頭以上止于左右僕射諸軍指揮使止于吏部尚書其官止遇恩則加階爵功臣建炎以來朝野雜記曰檢校官者自唐以來有之凡內職崇班今修武郎武臣副率以上初除及該恩皆帶若文武臣則樞密宣徽節度使始帶焉自三公謂太尉司徒司空三司僕射尚書常侍至賔客祭酒凡十餘等元豐改官制武臣承宣使已下皆罷惟存檢校三公三師以待節度使之久次者政和後改三公為三少若武臣纍加至檢校少師則拜太尉文臣纍加檢校少師則拜開府儀同三司安南國王初襲封加檢校太尉經恩遷檢校太師外蕃刺史州則檢校太子賔客此外不帶云朱子語録曰祖宗之法除三孤三公者必須建節加檢校太子少保少師之類然後除開府儀同三司既除開府然後除三孤三公南渡以來如張韓劉嶽諸武臣猶是如此外皆不帶今則不然既建節便抹過檢校徑除開府至三孤三公矣文獻通考卷六十四
