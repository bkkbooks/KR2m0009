body:
  text: 文獻通考卷四十六鄱陽馬端臨貴與著學校考七郡國鄉黨之學學記古之敎者家有塾黨有庠術有序國有學術當爲遂古者仕焉而已者歸敎於閭里朝夕坐於門門側之堂謂之塾五百家爲黨萬二千五百家爲遂黨屬於鄉遂逺郊外比年入學每年來入也中年考校中猶間也鄉遂大夫間歲則考學者之徳行道藝周禮三歲大比乃考焉一年視離經辨志二年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知𩔖通達强立而不返謂之大成離經斷句絶也辨志謂别其心意所趣向也知𩔖知事義之比强立臨事不惑也禮書曰說文閭里門也爾雅曰門側之堂謂之塾尚書大傳曰上老平明坐於右塾庶老坐於左塾班固食貨志曰里胥平旦坐於右塾鄰長坐於左塾詳見下文葢古者合二十五家而爲之門塾坐上老庶老於此所以敎之學也坐里胥鄰長於此所以敎之耕也書云先路在左塾之前次路在右塾之前先路象路也次路木路也象路貴於木路而象路在左塾次路在右塾則左塾者西塾也里胥尊於鄰長而里胥在右塾鄰長在左塾則右塾者西塾也何則自内視外則左東而右西自外視内則左西而右東也曲禮曰主人入門而右客入門而左此左西而右東也又曰公事自闑東私事自闑西此左東而右西也然則書言左塾史言右塾皆西塾也自内外言之異耳漢之時閭里亦有門史稱石慶入里門是也孟子曰庠者飬也序者射也鄉飲酒尊兩壺於房户之間鄉射尊於賔席之東葢鄉飲在庠而庠有房室故尊於房户之間鄉射在序而序無房室故尊於賔席之東而已鄉射禮豫鄭氏曰今文豫爲序則鈎楹内堂則由檻外堂序也序則物當棟堂則物當楣是於其有室則所揖所履之位淺而前於其無室則所揖所履之位深而後爾雅曰東西墻謂之序序之名葢本於此州長正月之吉各率其州之民而讀法以考其徳行道藝而勸之以糾其過惡而戒之若以歲時祭祀州社則屬其民而讀法亦如之春秋以禮㑹民而射於州序序州黨之學黨正四時之孟月吉日則屬民而讀邦法以糾戒之春秋祭禜亦如之國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位尚書大傳大夫七十而致仕教其鄉里大夫爲父師士爲少師所謂里庶尹也耰鉏已藏祈樂已入歲事已畢祈樂當爲新穀餘子皆入學年十五始入小學見小節踐小義焉年十八始入大學見大節踐大義焉餘子猶衆子古者適子恒代父而仕距冬至四十五日始出學𫝊農事立春學止上老平明坐於右塾庶老坐於左塾上老父師庶老少師餘子畢出然後皆歸夕亦如之餘子皆入父之齒隨行兄之齒鴈行朋友不相踰輕任并重任分頒白者不提擕出入皆如之王制諸侯天子命之敎然後爲學小學在公宫南之左太學在郊尚書傳曰百里之國二十里之郊七十里之國九里之郊五十里之國三里之郊天子曰辟廱諸侯曰泮宫長樂陳氏曰夫諸侯之學小學在内大學在外故王制言小學在公宫南之左大學在郊以其選士由内以升於外然後達於京故也天子之學小學居外大學居内故文王世子言凡語於郊然後於成均取爵於上尊以其選士由外以升於内然後達於朝故也魯頌泮水頌僖公能修泮宫也思樂泮水薄采其芹魯侯戾止言觀其旂其旂茷茷鸞聲噦噦無小無大從公于邁八章章八句江陵項氏枝江縣新學記曰古之爲泮宫者其條理不見於經而有詩在焉予嘗反覆而推之其首三章則言其君相之相與樂此而已自四章以下始盡得其學法自敬其徳而至於明其德明其徳而至於廣其心廣其心而至於固其道終焉此則學之本也自威儀孝弟之自修而達於師旅獄訟之講習自師旅獄訟之講習而極於車馬器械之精能此則學之事也自烈祖之鑒其誠而至於多士之化其徳自多士之化其徳而至於逺夷之服其道此則學之功也明堂位米廪有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也言魯得立四代之學註見大學考班固漢書食貨志曰五家爲鄰五鄰爲里四里爲族五族爲黨五黨爲州五州爲鄉鄉萬二千五百户也鄰長位下士自此以上稍登一級至鄉而爲卿也於里有序而鄉有庠序以明敎庠以行禮而視化焉春令民畢出在壄冬則畢入於邑其詩曰四之日舉趾同我婦子饁彼南畆又曰十月蟋蟀入我牀下嗟我婦子聿為改歲入此室處所以順隂陽備㓂賊習禮文也春將出民里胥平旦坐於右塾鄰長坐於左塾里胥如今里吏門側之堂曰塾畢出然後歸夕亦如之入者必持薪樵輕重相分班白不提挈冬民既入婦人同巷相從夜績女工一月得四十五日一月之中又得夜半為十五日凡四十五日也必相從者所以省費燎火同巧拙而合習俗也男女有不得其所者因相與歌詠各言其傷怨刺之詩也是月餘子亦在於序室餘子庶子也未任役者八歲入小學學六甲五方書計之事蘓林曰五方異書如今祕書學外國書也臣瓉曰辨五方之名及書藝也始知室家長㓜之節十五入大學學先聖禮樂而知朝廷君臣之禮其有秀異者移鄉學於庠序庠序之異者移國學於少學諸侯歲貢少學之異者於天子學於大學命曰造士行同能偶則别之以射然後爵命焉孟春之月羣居者將散行人振木鐸以徇於路以采詩獻之太師比其音律以聞於天子故曰王者不窺牖戸而知天下此先王制土處民冨而敎之之大略也漢文翁爲蜀郡守仁愛好教化見蜀地僻陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有才者張叔等十餘人親自飭厲遣詣京師受業博士或學律令減省少府用度買刀布蜀物齎計吏以遺博士少府郡掌財物之府以此而供太守者數歲郡生皆成就還歸文翁以爲右職用次察舉官有至郡守刺史者又修起學官於成都市中學官學之官舍也招下縣子弟以為學官弟子爲除更繇髙者以補郡縣吏次爲孝弟力田常選學官僮子使在便坐受事便坐别坐可以視事非正廷也毎出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閤縣邑吏民見而榮之數年爭欲爲學官弟子冨人至出錢以求之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁爲之始云師古曰文翁學堂在今益州城内按武帝時始爲博士學官置弟子員前此所謂博士者雖有弟子要皆京師自授其徒其徒自願受業朝廷未嘗有舉用之法郡國亦無薦送之例而蜀地僻陋非齊魯諸儒風聲教化之所被故文翁遣其民就學必以物遺博士而使敎之及武帝既興學校則令郡國縣官謹察可者與計偕詣太常受業如弟子則郡縣皆有以應詔而博士弟子始爲國家選舉之公法也元帝時郡國置五經百石卒史平帝元始三年立學官郡國曰學邑侯國曰校校學置經師一人鄉曰庠聚曰序序庠置孝經師一人何武爲刺史行部必先即學宫見諸生試其誦論問以得失西漢以郡文學入官梅福雋不疑韓延夀王章蓋寛饒諸葛豐鄭崇張禹世祖建武六年李忠爲丹陽太守忠以丹陽越俗不好學乃爲起學校習禮容春秋鄉飲選用明經郡中向慕之明帝永平十年幸南陽召校官弟子作雅樂奏鹿鳴帝自御塤箎和之以娛嘉賔宋均調辰陽長爲立學校㓂恂爲汝南太守修學校教生徒聘能爲左氏春秋者親受舉焉衛颯爲桂陽太守下車修庠序之儀任延爲武威太守造立校官自掾吏子孫皆令習業受業復其徭役章句既通悉顯㧞榮進之郡遂有儒雅之士秦彭爲泰山太守崇好儒雅修明庠序毎春秋饗祀輒修升降揖遜之儀鮑德爲南陽太守時郡學久廢徳乃修起黌舎備爼豆黻冕行禮奏樂又尊饗國老宴㑹諸儒百姓觀者莫不勸服班固東都賦曰四海之内學校如林庠序盈門獻酬交錯爼豆莘莘下舞上歌蹈徳詠仁魯丕爲趙相趙王商嘗欲避疾便時稍住學官學官學舎也丕止不聼曰學官傳五帝之道修先王禮樂教化之處王欲廢塞以廣游讌事不可聼詔從丕言魏明帝時延夀亭侯高柔上疏曰漢末陵遲禮樂崩壊太祖初興愍其如此在於撥亂之際並使州縣立教學之官髙祖即位遂闡其業興復辟雍州立課試於是天下之士復聞庠序之教親爼豆之禮焉晉虞溥太康時爲鄱陽内史大修庠序廣招學徒移告屬縣具為條制於是至者七百餘人溥乃作誥以奨諭之曰文學諸生皆冠帶之流年盛志美始涉學庭講修典訓此大成之業立徳之基也夫聖人之道淡而寡味故始學者不好也及至朞月所觀彌博所習彌多日聞所不聞見所不見然後心開意朗敬業樂羣忽然不覺大化之陶已至道之入神也故學之染人甚於丹青丹青吾見其久而渝矣未見久學而渝也夫工人之染先修其質後事其色修色積而染工畢矣學亦有質孝弟忠信是也君子内正其心外修其行行有餘力則以學文文質彬彬然後爲徳夫學者不患才不及而患志不立故曰希驥之馬亦驥之乘希顔之徒亦顔之倫又曰㓶而舎之朽木不知㓶而不舍金石可虧斯非其效乎時祭酒求更起屋行禮溥曰君子行禮無常處也故孔子射於矍相之圃而行禮於大樹之下况今學庭庠序髙堂顯敞乎右係鄱陽郡學事跡之見於前史者溥之言有味可書郡志殊欠登載穆帝永和中征西將軍庾亮在武昌開置學官起立講舎亮家子弟及参佐大將子弟悉令入學四府博學識義通涉文學經綸者建儒林祭酒使班同三署厚其供給皆妙選邦彦必有其宜者以充此舉近臨川臨賀二郡並束脩復學校若非束脩之流禮敎所不及而欲階縁免役者不得為生明爲條制令法清而人貴梁武帝選學生遣就㑹稽雲門山受業於廬江何允分遣博士祭酒到州郡立學後魏獻文帝天安初立鄉學郡置博士二人助教二人學生六十人後令大郡立博士二人助敎四人學生百人次郡立博士二人助教四人學生八十人中郡博士一人助敎二人學生六十人下郡立博士一人助敎一人學生四十人郡縣學始乎此矣北齊制諸郡並立學置博士助教授經學生俱被差逼充員士流及豪冨之家皆不從調備員既非所好墳籍固不關懐又多被州郡官人驅使縱有㳺惰亦不檢察皆由上非所好之所致也諸郡俱得察孝亷其博士助教及游學之徒通經者推擇充舉射策十條通八以上聼九品出身其尤異者亦䝉抽擢隋仁夀元年詔廢州縣學詳見太學門唐制京都學生八十人大都督中都督府上州各六十人下都督府中州各五十人下州四十人京縣五十人上縣四十人中縣中下縣各三十五人下縣二十人州縣學生州縣長官補長史主焉毎歲仲冬州縣館監舉其成者送之尚書省詳見太學門武徳七年詔諸州縣及鄉並令置學有明一經以上者有司試冊加階元宗開元二十一年勅諸州縣學生年二十五以下八品九品子若庶人並年二十一已下通一經以上未及通經精神聰悟有文詞史學者毎年銓量舉送所司簡試聼入四門學充俊士即諸州人省試不第情願入學者聼國子監所管學生尚書省補州縣學生州縣長官補州縣學生取郭下人充諸州縣學生習正業之外仍兼習吉凶禮公私有禮事處令示儀式餘皆不得輒使諸百姓任立私學其欲寄州縣受業者亦聼二十六年正月十九日勅古者鄉有序黨有塾將以𢎞長儒教誘進學徒化人成俗率由於是其天下州縣毎鄉之内里别各置一學仍擇師資令其敎授貞元三年正月右補闕宇文炫上言請京畿諸縣鄉村廢寺並爲縣學並上制書事二十餘件疏奏不報後唐天成三年宰臣兼判國子祭酒崔協奏請頒下諸道州府各置官學如有鄉黨備諳文行可舉者録其事實申監司方與解送但一身就業不得影庇門户宋太宗皇帝太平興國二年知江州周述言廬山白鹿洞學徒常數千百人乞賜九經肄習詔國子監給本仍傳送之先時南唐升元中白鹿洞建學館以李道爲洞主掌其教授又賜石鼓書院勅額書院唐元和間衡州李寛所建國初賜額眞宗大中祥符二年應天府民曹誠即楚邱戚同文舊居造舍百五十間聚書數千卷博延生徒講習甚盛府奏其事詔賜額曰應天府書院命奉禮郎戚舜賔主之仍令本府幕職官提舉以誠爲府助教八年賜潭州嶽麓書院額始開寳中郡守朱洞首度基創宇以待四方學者李允則來爲州請於朝乞以書藏方是時山長周式以行義著八年詔見便殿拜國子學主簿使歸教授詔賜書院名増賜中秘書右宋興之初天下四書院建置之本末如此此外則又有西京嵩陽書院賜額於至道二年江寜府茅山書院賜田於天聖二年嵩陽茅山後來無聞獨四書院之名著是時未有州縣之學先有鄉黨之學葢州縣之學有司奉詔㫖所建也故或作或輟不免具文鄉黨之學賢士大夫留意斯文者所建也故前規後隨皆務興起後來所至書院尤多而其田土之錫敎飬之規往往過於州縣學葢皆欲倣四書院云仁宗即位之初賜兖州學田已而又命藩輔皆得立學其後諸旁郡多願立學者詔悉可之稍増賜之田如兖州由是學校之設遍天下皇祐四年詔自今須藩鎮乃得立學他州勿聼慶歴四年参知政事范仲淹等建議精貢舉請興學校本行實乃詔州縣立學本道使者選屬部為教授不足則取於鄉里宿學之有道業者士須在學三百日乃聼預秋賦舊嘗充者百日而止見舉士門安定先生胡瑗自慶歴中教學於蘓湖間二十餘年束脩弟子前後以數千計是時方尚辭賦獨湖學以經義及時務學中故有經義齋治事齋經義齋者擇疏通有器局者居之治事齋者人各治一事又兼一事如邊防水利之𩔖故天下謂湖學多秀彦其出而筮仕往往取高第及爲政多適於世用若老於吏事者由講習有素也歐陽公詩曰吳興先生冨道徳詵詵子弟皆賢才王荆公詩曰先収先生作梁柱以次収拾桷與榱慶歴四年詔州縣皆立學於是建太學於京師而有司請下湖州取先生之法以爲太學至今著爲令五年詔曰頃者嘗詔方夏増置學官而吏貪崇儒之虚名務増室屋使四方㳺士競起而趨之輕去鄉閭浸不可止今後有學州縣毋得輙容非本土人居止聼習若吏以繕修爲名而斂㑹民財者按舉之神宗熈寜四年詔置京東西河東北陕西五路學以陸佃等爲諸州學官仍令中書采訪逐路有經術行誼者各三五人雖未仕亦給簿尉俸使權教授他路州軍命近日選薦京朝官有學行可爲人師者堂除逐路官令兼所任州敎授州給田十頃爲學糧仍置小學教授八年秋詔諸州學官先赴學士院試大義五道取優通者選差元豐元年詔諸路州府學官共五十三員京東路兖徐曹鄆青宻州應天府各一員京西路西京國子監許陳襄鄧州各一員河北路北京國子監定相滄衛棣瀛州眞定府各一員陕府西路陕華耀邠秦熈州永興軍鳳翔河中府各一員河東路潞晉代州太原府各一員淮南路揚州亳州各一員兩浙路杭越蘓三州各一員江南東路饒州江寜府各一員江南西路洪州吉州各一員荆湖南路潭州一員荆湖北路江陵府一員福建路建州一員成都府路睂州成都府各一員梓州路梓州普州各一員利州路利州一員夔州路䕫州一員廣南東路廣州一員廣南西路桂州一員按是時大興學校而天下之有教授者只五十三員葢重師儒之官不肯輕授濫設故也觀其所用者既是有出身人然又必試中而後授則與入館閣翰苑者同科其遴選至矣哲宗元祐初齊盧宿常䖍潁同懐澶河陽等州始相繼置教授三舎法行而員額愈多至大觀時吉州建州皆以飬士數多置教授三員宣和時罷州縣學三舎法始令諸州教授若係未行三舍以前置者依舊餘並减罷如贍學田産房廊等係行三舎後添給者亦復拘収云哲宗元祐元年詔近臣擇經明行修堪内外學官者人舉二員遂罷試補法二年中丞胡宗愈言學者初登科遂顓師席非是詔内外學官經任年至三十方得在選三年又詔官學教授闕選諸嘗被舉可爲學官及中十科中可為師表或可備講讀者仍官已升朝年及四十乃得爲之四年以舉薦頗衆詔須命舉乃得奏上紹聖元年三省立格侍從臺諌國子長貳歲舉堪任諸州學官一員須嘗中進士或制科年及三十者若制科及進士第在上五人禮部奏名在上三人府監廣文館第一人或從太學上舎得第即皆不試而用餘並召附吏部春秋試凡試兩經大義各一道以通經善作文爲合格已經舉試中書籍其姓名俟有闕則選授焉於是内外見學官非制科進士出身及由上舍生入官者並罷時學官已立試法潭廣以下十一州敎授本付吏部擬注者令三省選差監察御史黄慶基奏先朝以經術設爲三舍以考察其行藝始自太學著爲定令而未及頒於四方請州學皆立學期以一年考察無玷乃許應舉方之前日結保投牒以較一日之長者有間矣元符二年初令諸州推行三舍法應嘗置教授州考選升補悉如太學州許上舍一人内舍二人歲貢入之京師其上舍即附太學補外舍試中補内舍生通三試不升舍者遣還其州其内舍免試至則補爲外舍生諸路選監司一員提舉學校守貳董幹其事遇試補上舎生選有出身官一人同教授考選仍彌封謄録徽宗崇寕元年宰相蔡京建議天下皆置學郡少或應書人少即合二三州共置一學學悉置教授二員縣亦置學州縣皆置小學推三舍法徧行天下自縣選考升諸州為州學生毎三年貢入太學為太學生至則附上舍試别立號考取分三等試入上等補上舍生入中等補下等上舍生入下等補内舎餘爲外舍諸州軍解額各以三分之一充貢士開封府量留五十五額解土人之不入學者餘盡均給諸州以爲貢額任外官者子弟親戚許入學若於法應避所任親者聼隨便學於他州即不得升補與貢在學及一年給牒至太學用國子生額解試若所貢士至太學試中上等或預升舍人多其本貫監司太守推賞有差州給常平或係省田宅充飬士費縣得用地利所出及非係省錢州學職掌學諭學長許差特奏名人某毋得以非經史子書敎授詔令講議司立法頒降二年先是諸州縣學補弟子無定員有司病費廣難贍詔諸州用前一舉試者爲則嘗踰二百人許置百員數減乎此則以三分之二爲額上舍内舍立額亦如之縣學則裁其見籍率三而汰一提學司通一路才計均給學費仍行部摘試文檢括當否生員嘗試公私試雖不中亦復其身勿事臣僚言神宗尚經術將以明道徳一風俗元祐姦朋暨其殘黨之在元符者立異說壊之今餘習未殄乞立法禁天下刋冩庶其可息詔付國子監其有上書及三舍生言涉誣訕并異論者悉遣歸其鄉自訟齋拘之三年令州縣學用三舍法陞太學罷科舉見舉士門舊法𨽻學三年經兩試不預升貢即除其籍法涉太嚴自今三年内三經公試不與選兩經補内舍貢上舍不及格且曽犯三等以上罰若外舍即除籍歸縣内舍降舍已降而私試不入等若曽犯罰亦除籍再赴嵗升試毎上舍生升舍巳其秋即貢入辟廱長吏集闔郡官提舉司官即本所燕設以禮津遣限嵗終悉集闕下自川廣福建入貢者給借職劵過二千里給大將劵續其路食皆以學錢給之選士入貢其自今年始如有孝弟婣睦任恤忠和若行能尤異爲鄉里所推縣上之州免試入學敎授知通詢審無謬即保任入貢仍具實以聞不實者坐罪有差八行者孝弟睦婣任恤忠和凡有八行實状鄉上之縣縣延入學審考無偽即以上州州第其等孝弟忠和爲上睦婣爲中任恤為下茍備八行不俟終嵗即奏貢入太學免試補爲上舍司成以下審考不誣即釋褐命之官仍優加升擢不能全備者爲州學上等上舍餘有差八刑則反八行而麗於罪名以其罪名之縣上其名於州州籍於學毋得補弟子員詔崇寜五年貢士至辟廱不如令者凡三十有八人皆遣歸而提學官皆罰金建州浦城縣丞徐秉哲以其縣學生𨽻籍者至千餘人爲一路最特遷一官詔縣學生三嵗不赴升試者除其籍諸路賔興㑹試辟廱獨常州中選者多知州教授特遷一官詔諸州學生員及五百人以上許置敎授二員不及八十人罷置敎授官以在州有科名官兼莅學事吳氏能改齋謾錄曰政和四年臣僚上言欲望應見任教授不得為人撰書啟簡牘樂語之𩔖庶幾日力有餘辦舉職事以副陛下責任師儒之意奉聖㫖依嘗聞陳瑩中初任潁昌敎授官時韓持國爲守開宴用樂語左右以舊例必敎授為之公因命陳陳曰朝廷師儒之官不當撰俳優之文持國遂薦諸朝不以爲忤四年鮑耀卿言今州縣學考試未校文字精弱先問時忌有無茍語涉時忌雖甚工不敢取時忌如曰休兵以息民節用以豐財罷不急之役清入仕之流諸如此語熈豐紹聖間試者共用不忌今悉絀之宜禁止詔可三年臣僚言比者試文有以聖經之言輙爲時忌而避之者如曰大哉堯之爲君以爲哉與災同制治于未亂安不忘危吉凶悔吝生乎動則以爲危亂凶悔皆當避不諱之朝豈冝有此詔禁之按熈寜之立學校飬生徒上自天庠下至郡縣其大意不過欲使之誦習新經附和新法耳紹聖崇觀而後羣憸用事醜正益甚遂立元祐學術之禁又令郡縣置自訟齋以拘誹謗時政之人士子志於進取故過有拘忌葢言休兵節用則恐𩔖元祐之學言災凶危亂則恐涉誹謗之語所謂轉㗋觸諱者也則惟有迎逢諂佞而已七年給事中毛友言比守郡見訴役者言冨家子弟初不知書第捐數百緡錢求人試補入學遂免身役比其歲升不中更數年而始除籍則其倖免已多矣請初試補入縣學人並簾試以别僞冒從之宣和三年罷天下州縣學三舍法惟太學用之臣僚言元豐六年學官召試六十人而所取纔四人皆一時知名之士故學者厭服近觀大觀政和所試率三人取一既非遴選故投牒自請試者逾多其選益輕欲自今試者十人始取一人以重其選從之又詔比取諸州敎授並令三省選差合天下三百餘州州嘗有兩敎授者則爲員闕且五百矣大臣五七人豈能盡察才否不過破格律應親故請求而已比又嘗命八行之教授諸州者止許大藩員外置之不以莅職夫八行老成有行實又經廷試登科顧不得實與諸生講學前詔皆未詳審其罷勿行高宗建炎初復教官試紹興中議者謂欲爲人師而自納所業於有司以幸中度乃詔罷其試而教授自朝廷選差已而復之凡有出身許應先具經義詩試各三首赴禮部乃下省闈分兩場試之而取其文理優長者不限其數初任爲諸州教官繇是為兩學之選十五年國子監丞文浩言師儒之官與諸生難疑答問於羣經冝無所不通請自今並於六經中臨期取二經各出兩題無拘義式以貫穿該贍為合格詔行焉其後四川制置司遇𩔖省試年亦放禮部附試自嘉泰元年始紹興三年詔建炎二年内復置教授處共四十三州至建炎二年並罷任滿更不差人今將二年復置教授窠闕並行存留又詔淮西路州縣教授並行減罷令逐州有出身官兼十八年江西轉運賈直清奏請立縣學於縣官内選有出身人兼領教導尋下國子監参酌措置欲比附舊法縣學委知通於令佐内選有出身官一員兼領教導職事及諸州軍如未差教授處即令本路提舉司於本州有出身官選差一員兼領若州縣官俱無出身只令本學長諭專主教導却令知州縣令覺察㸃檢從之二十一年大理寺主簿丁仲京奏贍學田土多爲勢家侵佃望令提舉學士官覺察上謂大臣曰既不度僧常住多有絶産其併撥以贍學既而户部請令提舉司置籍拘管其無敇額庵院一體行朱子崇安縣學田記曰予惟三代盛時自家以達於天子諸侯之國莫不有學而自天子之元子以至於士庶人之子莫不入焉則其士之廪於學官者冝數十倍於今日而考之禮典未有言其費出之所自者豈當時爲士者之家各已受田而其入學也有時故得以自食其食而不仰給於縣官也歟至漢元成間乃謂孔子布衣飬徒三千而増學官弟子至不復限以員數其後遂以用度不足無以給之而至於罷夫謂三千人者聚食於孔子之家則已妄矣然飬士之需至于以天下之力奉之而不足則亦豈可不謂難哉葢自周衰田不井授人無常産而爲士者尤厄於貧反不得與爲農工商者齒上之人乃欲聚而教之則彼又安能終嵗裹飯而學於我是以其費雖多而或取之經常之外勢固有不得已也文獻通考卷四十六
