政事直身立稱宣付三省退少西東向立引三省班首出班相向立各俛伏跪搢笏參知政事捧制書以授三省班首受訖並出笏伏興歸位付舍人舍人搢笏跪接訖直身立轉與閤門提㸃承受開拆訖却受舍人舍人行至班心近南面西拆方訖北向立知閤門官并捧制書舍人於左省班後詣宣制位起居郎或起居舍人一員指摘句讀候㫖讀訖却歸本班舍人宣有制典儀贊拜百寮已下皆再拜舍人宣至咸赦除之獄吏奏脱枷訖應喏三呼萬嵗奏聖躬萬福訖以罪人過宣制書訖門上舍人贊樞密使中書令翰林學士曲賀兩拜門上閤門官不拜知閤門官並捧赦書舍人歸侍立位宣制舍人捧制書於三省班首前東向立搢笏跪以制書授三省班首三省班首接訖舍人出笏退歸侍立位禮直官引刑部尚書於三省班首前東向搢笏三省班首以制書授刑部尚書刑部尚書受訖各出笏刑部尚書興以制書加於笏上轉與刑房錄事訖歸本班舎人閤門提㸃等分引百僚已下横行北向立定典儀贊拜百寮已下皆再拜訖舍人引百僚出班俛伏歸致詞訖伏興歸位立典儀贊拜百寮已下皆再拜搢笏舞蹈三呼萬嵗又再拜知閤門官於門下面北躬承㫖退稍東西向立稱有制典儀贊拜百寮已下皆再拜起躬身知閤門官宣答訖歸侍立位典儀贊拜百寮已下皆再拜搢笏舞蹈三呼萬嵗又再拜舍人閤門提㸃等分引百寮已下分東西相向立定門上禮直官引中書令詣御座前奏禮畢歸位内侍索扇扇合大樂正令撞㽔賔之鐘左五鐘皆應乾安之樂作簾降皇帝起還幄樂止門下鳴鞭舍人北向躬承㫖四色官應喏舎人稱奉敕放仗百寮已下再拜退舍人宣勞將士訖退皇帝乗輦降門作樂導引至文徳殿至殿上降輦樂止建炎以來朝野雜記曰自元豐分南北郊至政和乃克行之建炎二年上祀圜丘獨祭上帝而配以太祖用元豐禮也紹興十三年郊祀始設大神大示及太祖大宗配位自天地至從祀百神凡七百七十有一蓋元祐禮云孝宗隆興二年詔今嵗冬至日當郊見上帝可令有司除事神儀物諸軍賞給依舊制外其乗輿服御及中外之費並從省約太常少卿洪适言陛下盛徳重華度越古昔初講郊禋之禮宜進胙慈闈並受帝祉乞下有司草具儀註進呈從之禮部太常寺具上儀註郊祀獻禮畢皇帝將詣飲福位次贊者引光祿卿詣南壝門外幕次易常服次帥執事者入詣進胙幄内以所進胙設於腰輿匣内胙以牛腥體肩三臂二臑二次輦官擎腰輿進行光祿卿從至端誠殿上以腰輿隨地之宜置定輦官權於殿下立光祿卿以胙授進胙官進胙官受訖光祿卿以下先退次進胙官帥捧擎人擎腰輿入詣齋殿前以腰輿望徳壽宫設定執事内侍鋪設褥位於其後以俟皇帝還齋殿服履袍訖内侍官前導詣褥位執事内侍啟匣葢内侍官奏請皇帝稍前躬視訖復位執事内侍封鎻匣訖奏請拜皇帝再拜訖掌表内侍以表投進胙官進胙官受表訖皇帝還齋殿次進胙官帥捧擎人擎腰輿以出至端誠殿上權置定輦官升殿捧擎降殿進行親從官援衛至泰禋門外進胙官騎從至徳夀宫門外進胙官下馬後從以入至殿下置定以表并胙授徳夀宫提舉官供進訖進胙官以下乃退自後遇郊並如上儀建炎以來朝野雜記隆興二年孝宗初行大禮時湯慶公思退為左相上問郊於明堂之費如何戸部尚書韓仲通曰郊之費倍於明堂侍郎錢靖禮言不過増二十萬若從祖宗故事一切從儉自宜大有減省上以為然乃詔除賞軍事神外並從省約其秋金人入㓂遂用明年正月辛亥朔旦行之上自宫徂郊乗玉輅用鹵簿之半禮畢乗平輦而歸乾道三年再郊始復備五輅歸用大安輦焉光宗紹興二年十一月二十七日親郊於圜壇為值雨望祭殿行禮風雨大至上震懼始感疾寧宗嘉泰三年祕書省言看詳福州進士張容圖繳進南郊辨駁冊内太子庶子之星以為皇儲未慶理宜加祀并宋星乃國朝受命之符興王之地及感生帝本朝係火徳尤宜尊崇乞並特加祀於圜丘容圖所陳数事實闗國體辭理可採乞下禮寺施行從之五年臣寮言伏覩郊禋在即陛下祗奉神示其純誠固有以昭格矣而躬行盛徳又自足以上當天心不惟致敬於練日告䖍之時也然臣以為一人致其精一於上必百官有司駿奔無射而不匱於下斯可以咸助聖徳而潛通於聈冥自然神示降格而福祿之來下也周頌有曰濟濟多士秉文之徳對越在天春秋傳曰有司一人不備其職不可以祭祭者薦其敬也薦其美也臣請得而詳陳之商人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也此祭宗廟之文也而周家祀天祭地奏黄鍾歌大吕奏太蔟歌應鍾其為昭告於天地之間則一也樂工瞽師蓋聲音之所自出今登歌之樂列於壇上簉於上龕葢上帝地祇太祖太宗並侑之側也而宫架之樂列於午階之下則百神之所同聽也夫樂莫尚於和平以平時羣祀言之絲竹管絃類有斷闋未知今復何以戞擊搏拊鼓吹佾舞之工蓋數百人窶人賤工安能蠲潔而無請係名之人亦與其間垢穢擾雜殆不可辨此不可不嚴者一也周人尚臭灌用鬰鬯臭陰達於淵泉灌以圭璋用玉氣也既灌然後迎牲蕭合黍稷臭陽達於墻屋故既奠然後焫蕭合羶薌此祭宗廟之文也而大雅所言卬盛于豆于豆于登其香始升上帝居歆胡臭亶時毛氏曰木曰豆瓦曰登豆薦葅醢也登大羮也其求乎神之義則一也今自圓壇之上暨於層龕之相承位列甚衆所謂籩豆簠簋登鉶罇俎之實内惟牲牢至期宰擊餘如膴鮑魚鱐與夫兎鴈蠯蚔之醢麋麇之臡其𩔖甚不一也皆各司之所豫造也餌餈酏糝黍稷稻粱之食芹筍之葅亦不一也則皆神厨至期之所造也竊聞豫造者先後遲速或不能指措日分至有色惡臭惡之慮而先期呈饌之時或兩辰浹無乃太早而所供之物或不可用如醢臡之屬覆之瓦瓿無復再察其可改換者未見倉卒而無復可察者不可得而措手矣葢呈饌出於一時頃刻之間而豫造之司吏卒習於鹵莽之素而有司掌之者不過一廵視之而已百司狃於文具至於事神亦復無忌以至酒齊之設凡有数等京尹之司不過委之右選趨走之人其為醇醨既不可品嘗其不中度者甚多也氣臭之不嚴如此豈復有馨香之上達也哉矧又有最甚者名為供官殆有餘人祭之日凡籩豆簠簋登鉶罇俎之屬滌濯者此曹也籩豆簠簋登鉶罇俎之實鋪設者亦此曹也滌濯固已鹵莽而夜半設實於噐皆其手所敷頓豈但蕡䕩乾物之𩔖而醢臡餌酏腥熟酒齊之屬亦皆出於其手之所置竊聞此曹係籍奉常平時所給微甚籃縷垢穢殆不可近而况執事之夕又復無所止宿半夜而興靧面濯手皆所不及也僅有漫漶之服以䝉其外而可使之供祭實乎至若贊引之人亦百餘軰進退於神位儀物之間上焉則切近於至尊次焉則隨逐於禮官平時亦皆供官之𩔖耳以垢汙之人而蒙之以漫漶之服是皆不可進退於神位儀物之間者也此不可不嚴者二也昔魯人之祭也日不足繼之以燭雖有彊力之容肅敬之心皆倦怠矣有司跛倚則為不敬之大今圓壇一龕之位通二龕三龕至壝埒之内外為位者八百分獻之官贊禮之人不能審候壇上疾徐之節但欲速於竣事獻官既多而禮生率常抽差六部寺監帥漕之貼吏為之既不閑習於禮而贊引㨗給獻官跪拜俛興酌奠皆不及於禮端行無有而并行如奔其為怠慢甚矣此不可不嚴者三也夫三説如此正合汲汲求所以整齊之臣愚以為天下之事一則治散則偷久則專暫則忽今郊禋大禮其百司所供之物所造之物各有攸司固不可不分任之也而提綱總要當出於一不然則禁之徒峻察之徒苛而下之便文逃責終不可得而究也奉常為九卿之長蓋統攝齊一之所自出况今郊禋大禮實又奉常之所掌乎臣前所陳登歌宫架之工奉常固自有籍矣其有請者若干入而尚不足用則未免以無請寄名者足之今名為色長者當考見絲竹管絃有無斷闕速行修補仍必拘集羣工洗沐澣濯存其衣裝之可者其有不整之人責限令其措辦可也今雖有澣濯之令而莫之遵奉也若其供官贊引之人垢弊已甚又非樂工之比乞從御史臺行下奉常於一行人㸃名之外更加逐一檢察合用若干人除其間稍可備數之人自餘垢弊已甚必不可責其自辦者令奉常具申朝廷行下外祗備庫將先來檢計退下漫漶舊弊之物置造衲衣一褐一袴先期發下奉常見名責領色長至期盡去其垢弊之衣而外襲之以法服表裏咸潔可以執事於籩豆簠簋登鉶罇俎之間而親近於崇嚴清肅之地矣若夫一行合干等人名數猥衆乞下臨安府令於便近慈雲等處闗報居民灑掃為備先期一夕令執色之人分就民居止宿夜半而興各靧面濯手整束衣服以趨祭所仍周環壇下約每十數步為置一盥帨俾供官禮生等人必先盥帨而後升壇所是半夜鋪設亦乞於分獻官差劄内就令分頭躬親同供官逐位鋪設務令極其嚴潔一一如法所是神厨雖已差官監造亦必奉常譏察之仍乞下臨安府大禮酒庫專差文官監造而豫造之厨從所司亟撥人員徑過奉常躬親監造可也雖然今奉常之官朝廷分遣專一周旋檢察如升歌宫架之工豫造近造之厨府屬所造之齊供官贊引之役察之必周令之必嚴皆歸於奉常而不至於散漫茍且而無及於事也彼分獻贊引之人必令詳緩如禮亦從御史臺行下約束夫以郊禋大禮竊聞鉅費至數百萬而四方之犒費不與焉皆非切於事神也而聲音氣臭之用莫嚴於圓壇一處耳若夫先二日之朝獻先一日之朝饗其聲音氣臭之用則同出乎此也臣前所陳弊害非一此而不嚴則鉅費數百萬皆所謂不揣其本而齊其末也臣觀士庶之家或延緇黄設禱祠主人齋戒於家而僮僕莫不知懼於下庖厨者屏氣不息守䕶者呵禁甚䖍仰惟萬乗之尊郊禋大禮赫臨在下陛下嚴恭寅畏無一息之少間而又臨之以五使之重兢兢謹飭而百官有司顧循習舊弊不能凛然上承九重之意其可不亟正之以對越天地祖宗之威靈從之太祖在位十七年南郊四乾徳元年十一月二十六日開寳元年十一月二十四日日四年十一月二十七九年四月三日太宗在位二十二年南郊五太平興國三年十一月十五日六年十一月十七日月至道二年正月十日年雍熙元年十一二十一日淳化四正月二日真宗在位二十五年南郊五咸平二年十一月七日景五年十一月十一日徳二年十一月十三日一天禧元年正月十一日三年十月十九日東郊一大中祥符七年二月十六日仁宗在位四十一年南郊九天聖二年十一月十三日五年十一月十七日八年十一月十九日元元年十月十八日景祐二年十一月十四日慶歴元年十一月二十日寳四年十一月二十五日年七年十一月二十八日皇祐五十一月四日英宗在位四年南郊一治平二年十一月十六日神宗在位十八年南郊四熙寧元年十一月十八日十七年十一月二十五日年十一月二十七日日元豐六年十一月五哲宗在位十五年南郊二元祐七年十一月十四日元符元年十一月二十日徽宗在位二十五年南郊八建中靖國元年十一月二十三日大觀四年十一月三日日崇寧三年十一月二十六日元政和三年十一月六六年十一月十日宣和年十一月十三日七四年十一月十五日年十一月十九日髙宗在位三十六年南郊七建炎二年十一月二十二日紹興十三年十一月八日十十六年十一月十日二二年十一月十八日十九年十一月十四日二十五年十一月十九日月二十八年十一二十三日孝宗在位二十八年南郊六乾道元年正月一日年三年十一月二日六十