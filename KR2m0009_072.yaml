body:
  text: 文獻通考卷七十二鄱陽馬端臨貴與著郊社考五郊徽宗建中靖國元年詔初祀南郊權合祭天地於圜丘起居郎周常等以合祭為非禮曽布主其説乃詔罷合祭是嵗帝初郊十一月戊寅玉輅至景靈宫行禮畢赴太廟大雪上遣内臣問二相若大風雪不止何以出郊右相曽布奏云郊禮尚在後日雪勢暴必不久况乗輿順動理無不晴若更大雪亦須出郊必不可升壇則湏於端誠殿望祭此不易之理已降御札頒告天下何可中輟左相韓忠彦欲於大慶殿望祭布不可以為若還就大慶是日却晴霽柰何議遂定中夜雪果止五更上朝享九室已見月色己卯黎明自太廟齋殿步出廟門升玉輅景色已開霽時見日色已午間至青城晩遂晴五使廵仗至玉津園夕陽滿野庚辰四鼓赴郊壇行禮天色晴明星斗粲然五鼓二府稱賀於端誠殿黎明升輦還内政和三年冬十一月癸未郊上搢大圭執元圭以道士百人執儀衛前導蔡攸為執綏官玉輅出南薰門至玉津園上忽曰玉津園東若有樓殿重複是何處也攸即奏見雲間樓殿䑓閣隠隠數重既而審視皆去地數十丈頃之上又曰見人物否攸即奏若有道流童子持幡節葢相繼而出雲間衣服眉目歴歴可識攸請付史館宰相蔡京率百僚稱賀髙宗建炎二年詔行郊祀之禮時車駕幸揚州庶事草創乃築壇於州南門内江都縣之東南冬至日合祭天地以太祖配上自常朝殿用細仗千三百有五人詣壇行禮紹興元年當郊以國步多艱合祭天地於明堂以祖宗並配詳見明堂門十三年令臨安府於行宫東南城外先次踏逐可以建圜壇并青城齋宫去處領殿前都指揮使職事楊存中知臨安府王㬇等言今於龍華寺西空地得東西長一百二十步南北長一百八十步修築圜壇除壇及内壝丈尺依制度使用地步九十步外其中壝外壝欲乞隨地之宜用二十五步外作兩壝外有四十步若依前項地步修築兵部車輅儀仗殿前司禁衛皆可排列其龍華寺地步修建青城并望祭殿委是圓備從之詔郊祀齋宫更不修葢止令計置幕殿檢㑹在京青城宫殿大内門曰泰禋餘見元豐元年將來如車駕前一日赴青城宿齋令儀鑾司同臨安府預先體倣青城制度絞縳其行事執事陪祠官宿齋幕次亦隨宜絞縳不得侈大建炎以來朝野雜記東都舊有青城齋宫渡江後以幕屋絞縳為之每郊費緡錢十餘萬淳熙末張端明杓為京尹始議築齋宫可一勞永逸上從之宇文寶學价時為兵部尚書因宿直奏曰陛下方經略河南今築青城於臨安是無中原意也上以為然亟命罷役太常寺言修築圜壇并青城望祭殿依倣舊制及郊祀所設神位鋪列祭器登歌樂酒罇前𨗳路及皇帝飲福位等共合用第一成縱廣七丈第二成縱廣一十二丈第三成縱廣一十七丈第四成縱廣二十二丈分一十三陛每陛七十二級每成一十二綴三壝第一壝去壇二十五步中壝去第一壝一十二步半外壝去中壝一十二步半并燎壇之制方一丈髙一丈二尺開上南出戸方六尺三出陛在壇南二十步丙地詔令臨安府同殿前司修建詔將來郊祀大禮排設大駕鹵簿仗内六引并郊廟合用祭器令禮兵部太常寺討論名件數目據討論國初大駕儀仗總一萬一千二百二十二人今已有黄麾半仗二千四百八十三人玉輅腰小輿大輦逍遙子下一千九人外其金象革木輅芳亭鳳輦屬車寳輿一千二百七十三人天武捧日奉宸隊六千四百五十七人仗内六引鼓吹前後部一千五百人其法物儀仗合用文繡以纈充代并郊祀天地宗廟從祀共七百七十一位用祭器籩豆簠簋罇罍樿杓登鉶鼎牛鼎羊鼎摶黍豆毛血盤幣篚匏爵坫盤匜罍洗爵盞坫飲福俎燭臺俎共九千二百五件太廟共五百九十六件内用銅玉者權以陶木代之至十六年始製造如政和之制太常寺言大禮依儀前三日皇帝詣大慶殿宿齋前二日皇帝服通天冠絳紗袍乗玉輅詣景靈宫聖祖天尊大帝前行禮差侍從官分詣元天大聖后并諸殿神御前行禮畢皇帝服通天冠絳紗袍乗玉輅詣太廟宿齋前一日皇帝詣太廟諸室前行禮畢皇帝服通天冠絳紗袍乗玉輅詣青城宿齋冬至日皇帝詣圜壇行禮禮畢擇日恭謝景靈宫遍詣諸殿行禮從之既而禮部侍郎王賞言以行在街道與在京不同其詣景靈太廟權依四孟朝獻禮例服履袍乗輦其後並同此制禮部太常寺言修立郊祀大禮儀註前祀十日質明誓戒有司設行事執事及陪祠文武官位於尚書省左僕射刑部尚書在北南向左僕射在左刑部尚書在右刑部尚書稍却行事左僕射在南吏部戸部禮部刑部尚書吏部禮部刑部侍郎押樂太常卿光禄卿押樂太常丞光祿丞功臣獻官在其南凡設光禄丞以下位皆稍却次分獻官次執事官又於其南俱北向西上監察御史位二在西東向北上讀冊舉冊官奉禮協律郎太祝郊社太官令在東西向北上奉禮郎以下位皆稍却設陪祠文武百官位於行事官之南又設行事執事及陪祠親王宗室位於太廟齋房右僕射刑部侍郎在北南向右僕射在左刑部侍郎在右刑部侍郎稍却亞終獻在南北向西上親王及行事執事陪祠宗室在東西向北上閤門御史臺太常寺自下分引羣官各就位凡將引行事執事陪祠文武官立班即御史臺引殿中侍御史一員先入就位左僕射讀誓於尚書省刑部尚書涖之右僕射讀誓於太廟齋房刑部侍郎涖之誓文曰今年十一月某日冬日至皇帝謁欵於南郊合祭天地前二日朝獻景靈宫前一日朝享太廟各揚其職其或不恭國有常刑讀訖内執事官奉禮郎以下文官宣教郎以下武官從義郎以下先退餘官並對拜訖退致齋皇帝散齋七日於别殿致齋三日一日於大慶殿一日於太廟一日於青城凡散齋不弔喪問疾作樂有司不奏刑殺文書致齋日前後殿不視事唯行祀事前致齋一日儀鑾司帥其屬鋪御座於大慶殿當中南向設東西房於御座之左右稍北又設西閤及齋室於殿後之左右殿上前楹施簾致齋之日質明有司陳平輦於垂拱殿庭文武百官俱就次各服其服閤門奏請皇帝未後詣齋室宣贊舍人等自下分引知樞密院事以下詣垂拱殿庭立以俟閤門附内侍進班齊牌垂拱殿簾降皇帝乗輦出至殿上少駐輦官迎駕自贊常起居宣輦官上殿簾捲鳴鞭行門禁衛諸班親從迎駕自贊常起居次舍人先贊知内侍省官以下常起居次樞密以下通班常起居贊祗候引駕樞密知客省事以下至簽書閤門官分左右立應奉官祗應通侍大夫以下武功大夫以下並先退次管軍臣僚宣名常起居贊祗候引駕並分左右前導輦降東階垂拱殿門外禁衛諸班親從自贊常起居次行宫御營廵檢一班常起居如通侍大夫以下知客省事以下武功大夫以下知内侍兩省帶御器械官充行宫使御營廵檢各歸本班至大慶殿後閤如歩至大慶殿後閤臨時聽㫖降輦入西閤大慶殿簾降前導官並就次易朝服詣御榻前分左右侍立知樞密院事僉書樞密院事在東西向北上同知樞密院事在西東向侍中一員在知樞密院事之北贊拜閤門官一員又在其北並西向知客省事以下在僉書樞密院事之南稍東西向北上簽書客省事以下又在其南稍却宣贊舎人等分引行事執事陪祠文武官各綪結佩入詣大慶殿庭立班禮直官舍人引禮部侍郎奏請中嚴少頃又奏外辦符寳郎奉寳陳於御榻之左右皇帝服通天冠絳紗袍綪結佩出西閤乗輿稱警蹕侍衛如常儀由西房至御榻西降輿皇帝即御座南向侍臣夾侍贊拜閤門官於榻前贊樞密以下拜殿之上下應在位官皆再拜閤門官贊拜訖轉身北向隨拜訖面西贊各祗候次禮直官引侍中詣御座前俛伏跪奏稱侍中臣某言請皇帝降座就齋室奏訖俛伏興還侍立凡侍中奏請准此皇帝降座乗輿由東房入齋室侍臣各還所司直衛者如常儀宣贊舍人分引行事執事陪祠文武官以次出三省親王樞密宗室起居問聖體並如閤門儀應行事執事陪祠官及從升者並散齋七日宿於正寢致齋三日各宿於其次凡散齋治事如故唯不弔喪問疾作樂判書刑殺文書决罰罪人及與穢惡致齋之日官給酒饌唯祀事得行其餘悉禁與祀之官已齋而闕者通攝行事奏告前祀二日奏告太祖皇帝太宗皇帝室如常告之儀陳設前祀三日儀鑾司帥其屬設大次於外壝東門之内道北南向小次於午階之東西向又設文武侍臣次於大次之前隨地之宜行事陪祠官宗室及有司次於外壝東門之外設東方南方客使次於文官之後西方北方客使次於武官之後設饌幔於内壝東門之外隨地之宜前祀二日郊社令帥其屬掃除壇之上下積柴於燎壇光祿牽牲詣祠所太常設登歌之樂於壇上稍南北向及設宫架於壇南内壝之外立舞表於酇綴之間前祀一日太常設神位席太史設神位版昊天上帝位皇地祇位於壇上北方南向西上席以藁秸太祖皇帝位太宗皇帝位於壇上東方西向北上席以蒲越天皇大帝五方帝大明夜明北極神州地祇十位於第一龕北斗天一太一帝座五星十二辰河漢等内官五行五嶽神位六十有九於第二龕二十八宿等中官五鎮四海四瀆神位百七十有二於第三龕外官山林川澤邱陵墳衍原隰神位百五十有六於内壝之内衆星神位三百有六十於内壝之外第一龕席以藁秸餘以莞而席皆内向如太史之制昊天上帝皇地祇配帝天皇大帝五方帝大明夜明北極神州地祇之座及禮神之玉俟告潔訖權徹其内官中官外官衆星等位皆設定奉禮郎禮直官設皇帝位版於壇下小次前西向飲福位於壇上午階之西北向望燎位於柴壇之北南向望瘞位於瘞坎之南北向設權火二一於望燎位之東南一於望瘞位之西北東西各二人贊者設亞獻終獻位於小次之南稍東西向大禮使左僕射又於其南行事吏部戸部禮部刑部尚書吏部刑部侍郎光祿卿讀冊舉冊官光祿丞位於大禮使之東光禄丞稍却奉禮郎太祝郊社太官令位於小次之東北俱西向北上監察御史位二一於壇下午階之西南一於子階西北協律郎二一於壇上樂虡西北一於宫架西北俱東向押樂太常丞於登歌樂虡北押樂太常卿於宫架北良醖令於酌尊所俱北向又設陪祠文武官位於執事官之南諸方客使在文官之南隨其方國光祿陳牲於東壝門外西向祝史各位於牲後太常設省牲位於牲西大禮使左僕射在南北向西上分獻官位於其後行事吏部戸部禮部刑部尚書吏部禮部刑部侍郎押樂太常卿光祿卿讀冊舉冊官押樂太常丞光祿丞奉禮協律郎太祝郊社太官令在北南向西上凡設太常丞以下位皆稍却監察御史在吏部尚書之西異位稍却光祿陳禮饌於東壝門外道北南向太常設省饌位版於禮饌之南大禮使左僕射在南北向西上分獻官位於其後監察御史二俱在西東向北上行事吏部戸部禮部刑部尚書吏部禮部刑部侍郎押樂太常卿光祿卿讀冊舉冊官押樂太常丞光祿丞奉禮協律郎太祝郊社太官令在東西向北上禮部帥其屬設祝冊案於神位之右司罇彜帥其屬設玉帛篚於酌罇所次設籩豆簠簋之位正配位皆左二十有五籩右二十有五豆俱為四行俎一在籩前登一在籩豆間簠七簋七在籩豆外二俎間簠在左簋在右又設罇罍之位每位皆著罇二壺罇二皆有罍加勺羃為酌罇太罇二山罇二犧罇二象罇二皆有罍加羃設而不酌並在壇上稍南北向西上配位設於正位酒罇之東每位皆有爵坫又設從祀諸神籩豆簠簋之位第一龕每位皆左十籩右十豆俱為三行俎二在籩豆前登一在籩豆間簠一簋一在二俎間簠在左簋在右爵一在俎前加坫内神州地祇加盤一在登之前其餘神位每位皆左二籩右二豆俎一