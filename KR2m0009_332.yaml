body:
  text: 文獻通考卷三百三十二鄱陽馬端臨貴與著四裔考九真臘真臘國在林邑西南本扶南之屬國也去日南郡舟行六十日而至南接車渠國西有朱江國其王姓剎氏名質多斯那自其祖漸已強盛至質多斯那遂兼扶南而有之死子伊奢那先代立居伊奢那城郭下二萬餘家城中有一大堂是其王聼政所總三十所城有數千家各有部帥官名與林邑同其王三日一聼朝坐五香七寶床上施寶帳以文木為竿象牙金鈿為壁狀如小屋懸金光熖有同於赤土前有金香鼎命二人侍側王著朝霞古貝瞞絡腰腹下垂至脛頭戴金寶花冠被真珠纓絡足履革屐耳懸金璫常服白疊以象牙為屩若露髮則不加纓絡臣下服制大扺相類有五大臣一曰孤落友二曰相髙憑三日婆何多陵四曰舍摩陵五曰髯羅婁及諸小臣朝於王者輒於階下三稽首王呼上階則跪以兩手抱膊繞王環坐議政事訖跪伏而去階庭門閣侍衛有千餘人被甲持仗其國與參半朱江二國和親數與林邑陀桓二國戰爭其人行止皆持甲仗若有征伐因而用之其俗非王正妻子不得為嗣王初立日所有兄弟並刑殘之或去一指或劓其鼻别處供給不得仕進人形小而色黑婦人亦有白者悉拳髮垂耳性氣捷徑居處器物頗類赤土以右手為淨左手為穢每旦澡洗以楊枝淨齒讀誦經咒又澡灑乃食食罷還用楊枝淨齒又讀經咒飲食多酥酪沙糖粳粟米餅欲食之時先取雜肉羮與餅相和手擩而食娶妻者唯送女人女擇日遣媒人送婦男女二家各八日不出晝夜燃燈不息男婚禮畢即與其父母分財别居父母死小兒未婚者以餘財與之若婚畢財物入官喪葬兒女皆七日不食剔髮而喪僧尼道士親故皆來聚會音樂送之以五香木燒尸收灰以金銀瓶盛送大水之內貧者或用瓦而以五綵色畫之亦有不焚送尸山中任野獸食者其國北多山阜南有水澤地氣尤熱無霜雪饒瘴癘毒蠚宜粱稻少黍粟果菜與日南九真相類異者有婆羅那娑樹無花葉似柿實似冬瓜菴羅花葉似棗實似李毗野樹花似木瓜葉似杏實似楮婆田羅樹花葉實並似棗而小異歌畢他樹花似林檎葉似榆而厚大實似李其大如升自餘多同九真海有魚名建同四足無鱗鼻如象吸水上噴髙五六十尺有浮胡魚形似鱔觜如鸚鵡有八足多大魚半身出望之如山每五六月中毒氣流行即以白豬白羊於城西門外祠之不然五穀不登畜多死人疾病近都有陵伽鉢婆山上有神祠每以兵二千人守衛之城東神名婆多利祭用人肉其王年别殺人以夜祠禱亦有守衛者千人其敬鬼神如此多奉佛法尤信道士佛及道士並立像於其館隋大業十二年遣使貢獻帝禮之甚厚於後亦絶唐武德至聖歷凡四來朝神龍後分為二半北多山阜號陸真臘半南漈海饒陂澤號水真臘半水真臘地八百里王居婆羅提拔城陸真臘或曰文單曰婆鏤地七百里王號笡屈開元天寶時王子率其屬二十六來朝拜果毅都尉大歷中副王婆彌及妻來朝獻馴象十一擢婆彌試殿中監賜名賓漢是時德宗初即位珍禽竒獸悉縱之蠻夷所獻馴象畜苑中元會充廷者凡三十二悉放荆山之陽及元和中水真臘亦遣使入貢文單西北屬國曰參半武德八年使者來道明者亦屬國無衣服見衣服者共笑之無鹽鐵以竹弩射鳥獸自給宋政和六年十二月遣進奉使奉化郎將鳩摩僧哥副使安化郎將摩君明擒􅹟等十四人來賜以朝服僧哥言萬里逺蕃仰投聖化尚拘卉服未稱向慕之誠願許服所賜詔聼之仍以其事付史館書於䇿明年三月辭去宣和二年又遣使來朝廷封其王與占城等其年授占城王檢校司空兼御史大夫懷逺軍節度使琳州管內觀察處置等使封占城國王其後又加封邑其地接占城之南東至海西至蒲甘南至加囉希其縣鎮風俗與占城無異地方七千餘里有銅臺上列銅塔二十有四鎮以八銅象各重四千斤戰象幾二十萬馬多而小建炎三年以郊恩制授其王金裒賓深檢校司徒加食邑後以為常紹興元年廣南市舶司言其國附到蕃信與知州提舉詔勿受如可備官用即估直償之仍以省物回賜十七年宰臣奏其國王降制加恩事上曰日後效祀外國加惠可令先次檢舉庶知本朝懷逺之意其國舊與占城鄰好歲貢金若干兩淳熙四年五月望日占城主以舟師襲其國都誓必報怨慶元己未大舉入占城更立真臘人為主占城今亦為真臘屬國矣真里富真臘屬國也其國在西南隅東南接波斯蘭西南與登流眉為鄰所管聚落六十餘處慶元六年慶元府言其國王立二十年遣使齎表貢瑞象二及方物詔優答之仍諭本國海道逺涉今後免行入貢羅剎羅剎國在婆利之東其人極陋朱髮黑身獸牙鷹爪時與林邑人作市輒以夜晝日則掩其面隋煬帝大業三年遣使常駿等使赤土至羅剎投和投和國隋時聞焉在南海大洲中真臘之南自廣州西南水行百日至其國王姓投和羅名脯邪乞遙理數城覆屋以瓦並為閣而居屋壁皆以彩畫之城內皆王宫室城外人居可萬餘家王宿衛之士百餘人每臨朝則衣朝霞冠金冠耳挂金環頸挂金涎衣涎序連反足履寶裝皮履官屬有朝請將軍總知國政又有參軍功曹主簿城局金威將軍贊府等官分理文武又有州及郡縣州有參軍郡有金威將軍縣有城局其為長官初至各選官寮助理政事刑法盜賊多者死輕者穿耳及鼻并鑽鬢私鑄銀錢者截腕國無賦稅俱隨意貢奉無多少之限多以農商為業國人乘象及馬一國之中馬不過千匹又無鞍轡唯以繩穿頰為節制音樂則吹蠡擊鼓死喪則祠祀哭泣又焚尸以罌盛之沉於水中若父母之喪則截髮為孝其國市六所貿易皆用銀錢小如榆莢有佛道有學校文字與中夏不同訊其耆老云王無姓名齊杖摩其屋以草覆之王所坐塔圓似佛塔以金飾之門皆東開坐亦東向唐貞觀中遣使奉表以金函盛之又獻金榼苦盍反金鎮寶𢃄犀象海物等數十品闍婆闍婆國在南海中其國東至海一月泛海半月至崑崙國西至海四十五日南至海三日泛海五日至大食國北至海四日西北泛海十五日至渤泥國又十日至三佛齊國又七日至古邏國又七日至柴歷亭抵交趾逹廣州其地平坦宜種植産稻麻粟豆無麥民輸十一之租煮海為鹽多魚鱉雞鴨山羊兼椎牛以食果實有木瓜椰子蕉子甘蔗芋出金銀犀牙箋沉檀香茴香胡椒檳榔硫黃紅花蘇木亦務蠶織有薄絹絲絞吉貝布剪銀葉為錢博易官以粟一斛二斗博金錢室宇壯麗飾以金碧中國賈人至者待以賔館食豐潔地不産茶其酒出于椰子及蝦蝚丹樹之中蝦蝚丹樹華人未嘗見或以桄榔檳榔釀成亦甚香美不設刑禁雜犯罪者隨輕重出黃金以贖惟寇盜者殺之其王椎髻戴金鈴衣錦袍躡革履坐方床官吏日謁三拜而退出入乘象或腰輿壯者五七百輩執兵以從國人見王皆坐俟其過乃起以王子三人為副王官有落佶連四人共治國事如中國宰相無月俸隨時量給土産諸物次有文吏三百餘員目為秀才掌文簿總計財貨又有卑官殆千員分主城池帑廪及軍卒其領兵者每半歲給金十兩勝兵三萬每半歲亦給金有差土俗婚聘無媒妁但納黃金於女家以娶之五月遊船十月遊山有山馬可乘跨或乘軟兜樂有橫笛鼓板亦能舞土人被髮其衣裝纒胸以下至於膝疾病不服藥但禱神求佛其俗有名而無姓方言謂真珠為沒爹蝦囉謂牙為家囉謂香為崑燉盧麻諸犀為低密宋元嘉十二年國王師黎婆達阿陀羅跋摩遣使奉表曰宋國大主人大吉天子足下教化一切種智安穩大人師降伏四魔成等正覺轉尊法輸度脫衆生我雖在逺亦霑靈潤其後遂絶宋太宗淳化三年十二月其王穆羅茶遣使陀湛副使蒲亞理判官李陀那假澄等來朝貢陀湛云中國有真主本國乃修朝貢之禮國王貢象牙真珠繡花銷金及繡絲絞雜色絲絞吉貝織雜色絞布檀香玳瑁檳榔盤犀裝劍藤織花簟白鸚鵡七寶飾檀香亭子其使别貢玳瑁龍腦丁香藤織花簟先是朝貢使泛舶船六十日至明州定海縣掌市舶監察御史張肅先釋奏其使飾服之狀與嘗來入波斯相類譯者言云金主舶大商毛旭者建溪人數往來本國因假其鄉導來朝貢又言其國王一號曰夏至馬囉夜王妃曰落肩娑婆利本國亦署置僚屬又其方言目舶王為葧荷王妻曰葧荷比尼贖其船中婦人名眉珠椎髻無首飾以蠻布纒身顔色青黑言語不能曉拜亦如男子膜拜一子頂戴金連鎖子手有金鈎以帛帶縈之名阿嚕其國與三佛齊有讐怨互相攻戰本國山多猴不畏人呼以霄霄之聲即出或投以果實則有大猴二先至土人謂之猴王猴夫人食畢羣猴食其餘使既至上令有司優待之久使還賜金幣甚厚仍賜良馬戎具以從其請其使云鄰國名婆羅門有法善察人情人欲相危害者皆先知之又有摩逸國太平興國七年載寶貨至廣州海岸大觀三年闍婆復遣使入貢詔禮之如交址建炎三年制授懷逺軍節度琳州管內觀察處置等使金紫光祿大夫檢校司空使持節琳州諸軍事琳州刺史兼御史大夫上柱國闍婆國王食邑二千四百戶食實封一千戶悉里地茶蘭固野可特授檢校司空加食邑實封以南郊加恩也自後每遇大禮必加食邑訶羅陀西南夷訶羅陀國宋元嘉七年遣使奉表曰伏承聖主信重三寶興立塔寺周滿世界今故遣使二人表此微心呵羅單呵羅單國都闍婆洲宋元嘉七年遣使獻金剛指環及鸚鵡鳥天竺國白疊吉貝葉波國吉貝等物十年呵羅單國王毗沙跋摩奉表曰常勝天子陛下諸佛世尊常樂安隱三達六通為世間導是名如來是故至誠五體敬禮其後為子篡奪十三年又上表二十六年文帝詔曰呵囉單婆皇婆達三國頻越遐海欵化納貢逺誠宜甄可並加除授乃遣使策命之二十九年又遣長史婆和沙彌獻方物婆皇婆皇國宋元嘉二十六年國王舍利婆羅跋摩遣使獻方物四十一種文帝䇿命之為婆皇國二十八年孝武孝建三年俱遣使入貢方物以其使為振威將軍大明三年獻赤白鸚鵡大明八年明帝泰始二年俱入貢官其使婆達婆達國宋元嘉二十六年國王舍利不陵伽跋摩遣使貢方物文帝䇿命之為婆達國王二十八年復遣使獻方物丹丹丹丹在多羅磨羅國西北振州東南振州唐延德郡朱崖同在島山王姓剎利名尸陵伽治所可二萬餘家亦置州縣以相統領王每晨夕二時臨朝其大臣八人號曰八坐並以婆羅門為之王每以香粉塗面身冠通天冠挂雜寶瓔絡身衣朝霞足履皮屨近則乘輿逺則馭象其攻伐則吹蠡擊鼓兼有幡旗其刑治盜賊無多少皆殺之土出金銀白檀蘇方木檳榔其穀唯稻畜有沙牛羖羊豬雞鵝鴨麞鳥有越鳥孔雀果蓏有蒲桃石榴瓜瓠美蓮菜有蔥蘇蔓菁梁中大通二年其王遣使奉表送象牙及畫塔二軀并獻火齊珠吉貝雜香藥大同元年復遣使獻金銀琉璃雜寶香藥等物唐總章時又獻方物邉斗邉斗國一云班斗都昆國一云都軍拘刋國一云九離比嵩國並隋時聞焉扶南度金鄰大灣南行三千里有此四國其農作與金鄰同其人多白色都昆出好棧香藿香及流黃其藿香樹生千歲根本甚大伐之四五年本皆朽敗唯中節堅固芬香獨存取以為香杜薄杜薄國隋時聞焉在扶南東漲海中直渡海數十日而至其國人貌白晳皆有衣服國有稻田女子作白疊華布出金銀鐵以金為錢出雞舌香可以含以香不入衣服雞舌其為木也氣辛而性厲禽獸不能至故未有識其樹者華熟自零隨水而出方得之杜薄洲有十餘國城皆稱王薄利薄利國隋時聞焉在拘利南海灣中其人色黑而齒白眼正赤男女並無衣服勃焚勃焚洲抱朴子云勃焚洲在南海中薰緑水膠所出膠如楓脂所以不可多得者止患狤貀上音詰下音屈獸啖人此獸大者重十斤狀如水獺其頭身及他處了無毛唯從鼻上以竟脊至尾上有毛廣一寸許青毛長三四分許其無毛處則如韋囊人張捕得之斬刺不傷積薪烈火縛以投火中薪盡而此獸不焦須以大杖打之皮不傷而骨碎都盡乃死耳火山火山國隋時聞焉去諸薄東五千里國中山皆有火雖雨不息火中有白鼠扶南土俗傳云火洲在馬五洲之東可千餘里春月霖雨雨止則火然洲上林木得雨則皮黑得火則皮白諸左右洲人以春月取其木皮績以為布或作燈炷布若小穢投之火中使潔又有加營國北諸薄國西山周三百里從四月火生正月火滅火然則草木葉落如中國寒時人以三月至此山取木皮績為火浣布無論無論國隋時聞焉在扶南西二千餘里其國大道左右夾種枇杷樹及諸華果行其下常有重隂十里一亭亭皆有井食麥飯飲蒲桃酒如膠若飲即以水和之味甚甘美婆登婆登國在林邑南海行二月東與訶陵西與迷黎車接北鄰大海風俗與訶陵同種稻每月一熟有文字書於貝多葉其死者口實以金又以金釧貫於四支然後加以婆律膏及檀沉龍腦等香積薪以燔之唐貞觀二十一年遣使朝貢烏篤烏篤國在中天竺南一名烏伏邦地方五千餘里百姓殷實人性愞弱頗詭詐尤工禁術篤信佛法文字禮儀略同天竺自古不通中國唐貞觀中其王達摩因陀訶斯遣使獻龍腦香訶陵訶陵亦曰杜婆曰闍婆在南海中東距婆利西墮婆登南瀕海北真臘木為城雖大屋亦覆栟閭象牙為床若席出玳瑁黃白金犀象國最富有穴自湧鹽以栁花椰子為酒飲之輒醉宿昔壞有文字知星歷食無匕筯有毒女與接輒苦瘡人死尸不腐王居闍婆城其祖吉延東遷於婆露伽斯城旁小國二十八莫不臣服其官有三十三大夫而大坐敢兄為最貴山上有郎卑野州王常登以望海夏至立八尺表景在表南二尺四寸唐貞觀中與墮和羅墮婆登皆遣使者入貢太宗以璽詔優答墮和羅丏良馬帝與之至上元間國人推女子為王號悉莫威令整肅道不舉遺大食君聞之齎金一囊置其郊行者輒避如是三年太子過以足躪金悉莫怒將斬之羣臣固請悉莫曰而罪實本於足可斷趾羣臣復為請乃斬指以徇大食聞而畏之不敢加兵大歷中訶陵使者三至元和八年獻僧祇奴四五色鸚鵡頻伽鳥等憲宗拜內四門府左果毅使者讓其弟帝嘉美並官之訖大和再朝貢咸通中遣使獻女樂墮和羅亦曰獨和羅南距􅌉盤北迦邏舍弗西屬海東真臘自廣州行五月乃至國多美犀世謂墮和羅西有二屬國曰曇陵陀洹曇陵在海洲中陀洹一曰耨陀洹在環王西南海中與墮和羅接自交州行九十日乃至王姓察失利名婆那字婆未無蠶桑有稻麥麻豆畜有白象牛羊豬俗喜樓居謂為干欄以白㲲朝霞布為衣親喪在室不食燔尸已則剔髮浴於池然後食貞觀時並遣使者再入朝又獻婆律膏白鸚鵡首有十紅毛齊於翅因丏馬銅鐘帝與之墮婆登在環王南行二月乃至東訶陵西迷黎車北屬海俗與訶陵同種稻月一熟有文字以貝多葉寫之死者實金於口以釧貫其體加婆律膏龍腦衆香積薪燔之多蔑多蔑國其人短小兄弟共娶一妻婦總髮為角辨夫之多少唐貞觀中通焉在南海邉國界周回可一月行南阻大海西俱遊國北波剌國東真陀桓國戶口極多置三十州不役屬他國有州郭宫殿樓櫓並用瓦木以十二月為歲其物産有金銀銅鐵象牙犀角朝霞朝雲其俗交易用金銀朝霞等衣服百姓二十而稅一五穀萊蔬與中國不殊多摩長多摩長國居於海島東與婆鳳西與多隆南與半支跋華言五山也北與訶陵等國接其國界東西可一月行南北可二十五日行其王之先龍子也名骨利骨利得大鳥卵剖之得一女子容色殊妙即以為妻其王尸羅劬傭伊説即其後也唐顯慶中遣使貢獻其俗無姓王居以柵為城以板為屋坐獅子座東面坐衣物與林邑同勝兵一萬餘人無馬有弓刀甲矟婚姻無同姓之别其食器有銅鐵金銀所食尚蘇乳酪沙糖石蜜其家畜有羖羊水牛野獸有麞鹿等死亡無喪服之制以火焚其尸其音樂略同天竺有波那婆宅護遮菴磨石榴等果多甘蔗從其國經薩盧都思訶盧君那盧林邑等國達於交州哥羅舍分哥羅舍分國在南海之南接墮和羅國勝兵二萬人其王蒲越伽摩唐顯慶五年遣使朝貢占城占城國在中國之西南東至海西至雲南南至真臘國北至歡州外界海南去三佛齊五日程陸行至賔陀羅國一月程其國𨽻占城焉東去麻逸國二日程蒲端國七日程北去廣州便風半月程東北至兩浙一月程西北至交州兩日程陸行半月程其地東西七百里南北三千里南曰施備州西曰上源州北曰烏里州國無城郭有百餘村村落戶三五百或至七百亦有縣鎮之名土地所出箋沉香檳榔烏樠木蘇木白藤黃蠟吉貝花布絲絞布㲲布藤簞貝多葉簟金銀鐵錠等物五穀無麥有粳米粟豆麻子官給種一斛計租百斛果實有蓮甘蔗蕉子椰子鳥獸多孔雀犀牛畜産多黃牛水牛而無驢亦有山牛不任耕耨但殺以祭鬼將殺令巫祝之曰阿羅和及㧋譯之云早教他託生民獲犀象皆輸於王國人多乘象或軟布兜或於交州市馬頗食山羊水兕之肉其衣俗衣服與大食國相類無絲繭以白㲲布纒其胸垂至於足衣衫窄袖撮髮為髻散垂餘髾於其後互市無緡錢止用金銀較量錙銖或吉貝錦定博易之直樂器有胡琴笛鼓大鼓樂部亦列舞人其王腦後髽髻散披吉貝衣戴金花冠七寶裝纓絡為飾股脛皆露躡革履無襪婦人亦腦後撮髻無笄梳其服及拜揖與男子同王每午坐禪椅官屬謁見膜拜一而止白事畢復膜拜一而退或出遊看象采獵觀漁皆數日方還近則乘軟布兜逺則乘象或乘一木杠四人舁之先令一人持檳榔盤前導從者千餘輩各執弓箭刀槍手牌等其民望之膜拜一而止日或一再出每歲稻熟王自刈一把從者及羣婦女競割之其王或以兄為副王或以弟為次王設髙官凡八員東西南北各二分治庶事無俸祿令其所管土俗資給之别置文史五十餘員有郎中員外秀才之稱分掌資儲寶化等事亦無資俸但給龜魚充食及免調役而已又有司帑廪者十二員主軍卒者二百餘員皆無月俸勝兵萬餘人月給粳米二斛冬夏衣布各三匹至五匹每夕唯王升床而卧諸臣皆寢於地蓐親近之臣見王即胡跪而禮稍疏逺者但拱手而已其風俗正月一日牽象周行所居之地然後驅逐出郭謂之逐邪四月有遊船之戲定十一月十五日為冬至人皆相賀州縣以土産物帛獻其王每歲十二月十五日城外縛木為塔王及人民各以衣物香藥置於塔上焚之以祭天人有疾病旋采生藥服食地不産茶亦不知醖釀之法止飲椰子酒兼食檳榔刑禁亦設枷鎖小過以四人拽伏於地藤杖鞭之二人左右互朴量其犯罪或五六十至一百當死者以繩係於樹用梭槍舂喉而殊其首若故殺劫殺令衆踏之或以象卷撲於地象皆素習將刑人即令豢飬之人以數諭之悉能曉焉犯姦者男女共入一牛以贖死負國王物者以繩拘於荒塘物充而後出之其國前代罕與中國通周顯德中其王釋利因德漫遣其臣莆訶散貢方物有雲龍形通犀帶菩薩石又有薔薇水灑衣經歲香不歇猛火油得水愈熾皆貯以琉璃瓶建隆二年其王釋利因陀盤遣使莆訶散來表章書於貝多葉以香木函盛之貢犀牙龍腦香藥孔雀四大食瓶二十使回錫賚有差以器幣優賜其王三年乾德四年開寶三年五年六年七年九年太平興國二年三年四年俱遣使入貢六年交州黎桓上言欲以占城俘九十三人獻於京師太宗令廣州止其俘存撫之給衣服資糧遣還占城詔諭其王七年八年俱入貢雍熙二年遣使入貢且訴為交州所侵詔答令保國睦鄰三年入貢儋州言占城人蒲羅遏為交州所逼率其族百口來附四年秋廣州上言雷恩州開送占城人夷斯當李娘并其族一百五十人來歸分𨽻南海清遠縣端拱元年廣州又言占城夷人忽宣等族三百一人來附淳化元年遣使貢方物且訴為交州所攻國中人民財寶皆為所掠上賜黎桓詔令各守境三年遣使貢方物至道元年其王遣使來朝貢奉表詞甚恭順且言臣本國元有流民三百散居南海曽蒙聖旨許令放還今有猶在廣州者本國舊有進奉夷人羅常占見駐廣州乞詔本州盡數點集令舶船乘便風部領歸國上覽表詔遣使廣州詢問願還者悉復使回復賜良馬二遂為常制咸平二年景德元年俱入貢詔以良馬介胄戎器賜之四年遣使奉表來朝表函籍以文錦其使言本國舊𨽻交州後奔於佛逝北去舊所七百里使還賜物甚厚大中祥符三年來貢四年又遣使貢獅子詔畜於苑中使者留二蠻人以給豢飬上憐其懷土厚給資糧遣還八年天禧二年並遣入貢三年其使還詔賜國王銀四千七百兩并戎器鞍馬海上又有蒲端國三麻蘭國勿巡國蒲婆衆國太平祥符四年祀汾隂並遣使來貢蒲端國王上言伏見詔旨給賜占城使鞍勒馬大神旗各各乞如恩例有司以蒲端在占城下請賜雜綵小旗五從之天聖八年入貢慶厯二年獻馴象皇祐二年貢方物表二通一以蕃書一以中國書五年嘉祐元年俱入貢六年獻馴象七年正月廣西經略司言占臘素不習兵與交址鄰常苦侵軼而占城復近修武備以抗交址將繇廣東路入貢望撫以恩信五月入貢賜白馬二熙寧元年入貢乞市騾馬詔賜白馬一令於廣州置騾以歸五年貢方物七年交址李乾德言其王領兵三千人并妻子來降且言其國自海道抵真臘一月程西北抵交州四十日皆山路所治聚落一百五大略如州縣後討交址以其素仇遣使詔以乘機協力蕩除使還言其國選兵七千扼賊要路其王以木葉蕃書回牒詔使上之然亦不能成功後兩國同入貢占城使者乞避交人詔遇朔日朝文德殿分東西立望日則交人入垂拱而占城趨紫宸大燕則東西坐元祐七年又表言如天朝討交址願率兵掩襲朝廷以交址數入貢不絶臣節難以興師答敇書報之而以其使良保故倫軋丹副使傍木知突為保順郎將政和中授其王楊卜麻疊金紫光祿大夫領兼白州刺史卜麻疊言身縻化外不霑祿食願得薄受俸給壯觀小蕃許之宣和元年進檢校司空兼御史大夫懷逺軍節度使琳州管內觀察處置等使封占城國王自是每遇郊恩輒降制加封邑其州所統大小州三十八通不盈三萬家甃磚為城護以石塔其戎器以標鎗榜牌竹為弓無翎箭戰則五人為甲走則同甲皆坐山多香木每歲官監民入山斫香輸官謂之身丁香如中國身丁鹽稅之類納足聼民貿易商舶到其國則差蕃官摺黑皮為策書白字抄物數監盤上岸十取其二外聼交易建炎元年國王入貢遇郊恩制授檢校太傅加食邑後以為常紹興二十五年其子鄒時巴蘭嗣立貢方物求封爵詔授以其父官乾道三年其子鄒亞娜遣使入貢詔受其獻十分之一既而福建市舶司言大食國人烏師點等訴占城入貢即所奪本國物上以爭訟却之詔學士院答敇洪邁引崇寧故事乞用金花綾紙寫詔禮部郎中李燾上言當從紹興二十五年例用白藤紙况今進貢非實却而不受豈宜更優其禮上曰李燾之論有理即用近例邁以為侵官自是與燾有隙臣僚亦言鄒亞娜承襲若以禮入貢則當議封既與大食爭訟難即降詔俟再貢如禮然後賜命乾道七年閩人有泛海官吉陽軍者飄至占城見其國與真臘乘象以戰無大勝負乃説王以騎戰教之弓弩騎射其王大恱具舟送之吉陽厚賫隨以買馬得數十匹以戰則克次年復來人徒甚盛瓊州不受怒歸肆行劫掠淳熙二年詔帥臣張栻草書付瓊管司諭以中國馬自來不許出外界令還所掠人口等自今不得生事知吉陽軍林寶慈令王三俊指引占城國人買馬圖利令本司取勘具奏三年占城發回所掠人口見存八十三人又申乞與本蕃通商詔栻行下瓊管司朝廷加惠外國各已有市舶司主管交易海南四郡即無通商條令仰遵依自來體例施行淳熙四年五月以舟師襲真臘請和不許殺之遂為大讎慶元己未真臘大舉入占城俘其主戮其臣僕勦殺幾無噍類更立真臘人為主三佛齊三佛齊國蓋南蠻之别種與占城為鄰間於真臘闍婆之間所管十五州土産紅藤紫􅑭箋沉香檳榔子無緡錢土俗以金銀貿易諸物四時之氣多熱少寒冬無霜雪人用香油塗身其地無麥有米及青白豆雞魚鵝鴨頗類中土有栁花酒椰子酒檳榔酒皆非麴蘖所醖飲之亦醉樂有小琴小鼓昆崘奴踏曲為樂國中文字用蕃書以其王指環為印亦有中國文字上章表即用焉纍甓為城周數十里用椰葉覆屋人民散居城外不輸租賦有所征伐隨時調發立酋長率領皆自備兵器糧糗泛海便風二十日至廣州如泉州舟行順風月餘亦可到國人多姓蒲習水陸戰臨敵敢死伯於諸國其國在海中扼諸蕃舟車往來之咽喉若商舶過不入即出船合戰期以必死故諸國之舟輻湊焉唐天祐元年貢方物授其使都蕃長蒲訶粟寧逺將軍宋建隆元年九月其王悉利胡大霞里檀遣使李遮帝來朝貢二年夏又遣使貢方物是冬又來貢其國别號先留王李犀林男迷日來亦遣使同至貢方物三年又遣使來貢回賜以白犛牛尾白瓷器髹器錦綵鞍轡二副開寶四年遣使以水晶火油來貢五年又來貢七年又貢象牙乳香薔薇水萬年棗偏桃白沙糖水晶指環琉璃瓶珊瑚樹八年又遣使入貢賜以冠帶器幣太平興國五年入貢雍熙二年端拱二年俱入貢淳化三年冬廣州言三佛齊朝貢使蒲抑陀黎前年自京回聞本國為闍婆所侵住南海凡一年今春乘舶至占城風信不利復還乞降詔諭本國從之咸平六年遣使來貢且言本國建佛寺以祝聖夀願賜名及鐘上嘉其意詔以承天萬夀為寺額并鑄鐘以賜來使俱授以官大中祥符元年其王遣使來貢詔許赴泰山陪位於朝覲壇遣賜甚厚天禧元年遣使奉金字表貢珍珠象牙梵夾經昆崘雙使還賜禮物奬慰之天聖六年其王遣使入貢舊制蕃國使之貢賜以間金塗銀帶時特以渾金帶賜之熙寧十年使大首領地華伽囉來以為保順慕化大將軍賜詔寵之元豐中使至者再率以白金真珠婆律薰陸香備方物廣州受表入言俟報乃護至闕下天子念其道里逺每優賜遣歸二年賜錢六萬四千緡銀萬五百兩官其來使乞買金帶白金器物及僧紫衣師牒皆如所請給之五年廣州南蕃綱首以其主管國事國王之女唐字書寄龍腦及布與提舉市舶孫逈逈不敢受言於朝詔令估直輸之官而市采帛以報元祐三年遣使入見以金蓮花真珠龍腦撒殿官其來使六年及紹聖中再入貢紹興七年有司議三佛齊國王敇告綾紙並欲用黃色餘依所賜大食國例從之二十六年復入貢乾道八年國王書乞將銅搭船雇人造瓦回蕃詔從之自後不許淳熙五年來貢方物乞比占城進奉例回賜從之詔免到闕令泉州管待章表遞奏其子稱乾道四年承襲乞依舊封爵詔襲其父舊封仍賜襲衣金帶鞍馬幣帛有差勃泥勃泥國在京都之西南大海中去闍婆四十五日去三佛齊四十日程去占城與摩逸各三十日程皆計順風為則其國以板為城城中居者萬餘人所統十四州其王所居屋覆以貝多葉民舍覆以草在王左右者為大人王坐繩床若出即大布單坐其上衆舁之名曰阮囊戰鬬者則持刀被甲甲以銅鑄狀若大筒穿之於身護其腹背其地無麥有麻稻又有羊皮雞魚無蠶絲用吉貝花織成布飲椰子酒婚聘之資先以椰子酒檳榔次之指環又次之然後以吉貝布或量出金銀成其禮喪葬亦有棺斂以竹為輿載棄山中二月始耕則祀矣以十二月七日為歲節地熱多風雨國人宴會鳴鼓吹笛擊鈸歌舞為樂無器皿以竹編貝多葉為器盛食食訖棄之其國鄰於底門國有藥樹取其根煎為膏服之及塗其體兵創所傷皆不死前代未嘗朝貢故史籍不載宋太平興國二年其王向打遣使賫表貢大片龍腦光龍腦蒼龍腦玳瑁檀香象牙其表以數重小囊緘封之非中國紙類木皮薄瑩滑色微緑而長數尺闊寸餘橫卷之僅可盈握其字小細橫讀之以華言譯之云勃泥國王向打稽首拜皇帝萬歲萬歲萬萬歲願皇帝萬歲今遣使進貢向打聞朝廷無路得到昨有蕃人蒲蘆歇泊水口令人迎到州言自中朝來比詣闍婆國遇猛風吹其船不得去此時聞自中國來人皆大喜即造舶船令蒲蘆歇導達入貢朝所遣使人只願平善見皇帝每年令人入朝每年修貢慮風吹至占城界望皇帝詔占城令有向打船到不得留臣本國别無異物乞皇帝勿怪其表文如是詔館其使於禮賔院優賜以遣之元豐五年二月其王錫理麻喏復遣使貢方物其使乞從泉州乘海舶歸國從之注輦注輦國東距海五千里西至西天竺千五百里南至羅蘭二千五百里北至頓田三千里自古不通中國水行至廣州約四十一萬一千四百里其國有城七重髙七尺南北十二里東西七里每城相去百步凡四城用磚二城用土最中城以木為之皆植花果雜木其第一至第三城皆民居環以小河第四城四侍郎居之第五城主之四子居之第六城為佛寺百僧居之第七城即主之所居屋四百區所統有三十一部落其西十二其南八其北十一今國王相傳三世矣民有罪即命侍郎一員處治之輕者縶於木格笞五七十至一百重者則斬或以象踐殺之其宴則國主與四侍郎膜拜於階遂共坐作樂歌舞不飲酒而食肉俗衣布亦有餅餌嘗饌執事有婦人其嫁娶先用金銀指環使媒婦至女家後三日會男家親族約以土田生畜檳榔酒等稱其有無為禮女家復以金銀指環越諾布及女所服錦衣遺壻若男欲離女則不取聘財女欲却男則倍償之其兵陳用象居前小牌次之梭槍次之長刀又次之弓矢在後四侍郎分領其衆國東南約二千五百里有悉蘭池國或相侵伐地産真珠象珊瑚玻璃檳榔豆蔻吉貝布獸有山羊黃牛禽有山雞鸚鵡果有餘甘藤蘿千年棗椰子甘羅昆崘梅婆羅蜜之類花有白茉莉散絲蛇臍佛桑麗秋青黃碧婆羅瑶蓮蟬紫水蕉之類五穀緑黑豆麥稻地宜竹自昔未嘗朝貢宋大中祥符八年九月其國主羅茶羅乍遣進奉使侍郎娑里三文副使蒲加心判官翁勿防援官亞勤加等奉表來貢三文等以盤捧真珠碧玻璃升殿布於御坐前降殿再拜譯者導其言曰願以表逺人慕化之意其國主表曰臣羅茶羅乍言昨遇􅔓舶船商人到本國告稱巨宋之有天下也二帝開基聖人繼統登封大嶽禮祀汾隂至德升聞上穹眷命臣昌期斯遇古語幸聞輒傾就日之誠仰露朝天之欵臣伏聞人君之御統也無逺不臻臣子之推誠也有道則服伏惟皇帝陛下功超邃古道建大中衣裳埀而保合乾坤劒戟鑄而範圍區宇神武不殺人文化成廓明明之德以臨御下民懷翼翼之心以昭事上帝至仁不傷於行葦大信爰及於淵魚故得天鑒孔彰帝臨有赫顯今古未聞之事保邦家大定之基竊念臣微類醯雞賤如芻狗世居夷落地逺華風虛荷燭幽曽無執贄今者竊聼歌頌普及遐陬限年屬於桑榆阻躬陳於玉帛矧滄溟之曠絶在跋涉以稍難是敢傾倒赤心遙瞻丹闕任土作貢同螻蟻之慕羶委質事君比葵藿之向日謹遣專使等五十二人奉土物朝貢凡真珠衫帽各一真珠二萬一千一百兩象牙六十株乳香六十斤三文等又獻珠六千六百兩香藥三千三百斤初羅茶羅乍既聞商舶言且曰十年來海無風濤古老傳云如此則中國有聖人故遣三文等入貢三文離本國舟行七十七晝夜厯那勿丹山婆里西蘭山至占賔國又行六十一晝夜厯伊麻羅里山至古羅國國有古羅山因名焉又行七十一晝夜厯加八山古不牢山舟寶龍山至三佛齊國又行十八晝夜度蠻山水口厯天竺山至賔頭狼山望東西王母冢距舟所將百里又行二十晝夜度羊山九星山至廣州之琵琶洲離本國凡千一百五十日至廣州焉詔閣門祗候史祐之館伴几宴賜恩例同龜兹使其年承天節三文等請於啓聖禪院會僧以祝聖夀明年使回降詔羅茶羅乍賜物甚厚天禧四年又遣使琶欄得麻烈呧奉方物入貢至廣州病死守臣以其表聞詔廣州宴犒從者厚賜以遣之明年二年其王遣使以泥金表進真珠衫帽及真珠一百五兩象牙百株其使自言數朝貢而海風破船不達願將上等珠就龍床腳撒殿頂戴瞻禮以申向慕之誠乃奉銀盤升殿跪散珠於御榻下而退景祐元年以其使蒲押陀離為金紫光祿大夫懷化將軍還本國熙寧十年復遣二十七人來獻豌豆珠麻珠琉璃大洗盤生白梅花腦錦花犀牙乳香瓶香薔薇水金蓮花木香阿魏鵬砂丁香使副以真珠龍腦登殿跪而散之謂之撒殿既降詔遣御藥宣勞之以使為懷化將軍保順郎將各賜衣服器幣答賜其王錢八萬一千八百緡銀五萬二千兩按注輦國水行至廣州約四十一萬一千四百里凡千一百五十日而至其去中國最逺又自古未嘗相通至大中祥符間始入貢然其表文敘述有理詞采可觀略無島夷侏離鄙俚之談有類中土操觚文士之筆髙麗交址反所不逮竊疑史文容有緣飾非其實也州眉流州眉流國東至占臘五十程南至羅越水路十五程西至西天竺三十五程北至程良六十程東北至羅斛二十五程南至闍婆四十五程西南程若十五程西北至洛華二十五程東北至廣州三十五程其俗以板為屋跣足衣布無紳帶以白紵纒其首貿易以金銀其主所居廣袤五里無城郭出則乘象車亦如小駟地出犀象䃋石紫􅑭蘇木諸藥四時炎熱無霜雪未嘗至中國宋咸平四年國主多須機遣使打古馬副使打臘判官劄皮泥等九人來貢木香千斤鍮鑞各百斤胡黃連三十五斤紫􅑭百斤紅氈一合花布四假蘇木萬斤象牙六十一株召見崇德殿賜以冠帶服物及還又賜多須機詔書以敦奬之蒲甘宋崇寧五年蒲甘遣使入貢詔禮秩視注輦尚書省言注輦役屬三佛齊故熙寧中勑書以大背紙緘以匣襆今蒲甘乃大國蕃王不可下視附庸小國欲如大食交址諸國禮凡制詔並書以白背金花綾紙貯以間金鍍匣銀管籥用錦絹夾襆緘封以往從之南毗南毗國在西南自三佛齊便風月餘可到國多風王出先差官及兵卒百餘人持水灑地以防颶風播揚精飲食鼎以百計日一易之有官名翰林供王飲食喜戰鬭善刀矟習弓箭鑿雜白銀為錢鏤官印記民用以貿易土産珍珠諸色番布其國最逺番舶罕到有時羅巴智力于父子其種類也入居泉之城南自是舶舟多至其國矣層檀層檀國在南海傍城距海二千里宋熙寧四年始入貢海道便風行百六十日經勿巡古林三佛齊國乃至廣州其王名亞美羅亞眉蘭傳國五百年十世矣人語音如大食地春暖貴人以越布纒頭服花錦白疊布出入乘象馬有俸祿其法輕罪杖重死穀有稻粟麥食有魚畜有胡羊山羊沙牛水牛槖駝馬犀象藥有木香血竭沒藥鵬砂阿魏薰陸産珍珠玻璃密沙華三酒交易用錢官自鑄三分其齊金銅相半而銀居一分禁民私鑄元豐六年使保順郎將層伽尼再至神宗念其絶逺詔頒賚如故事仍加賜白金二千兩文獻通考卷三百三十二
