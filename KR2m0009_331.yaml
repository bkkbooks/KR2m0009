body:
  text: 文獻通考卷三百三十一鄱陽馬端臨貴與著四裔考八南丹州蠻南丹州蠻亦溪洞之種其地與宜州接宋開寶七年酋帥莫洪遣使奉表求內附九年復來貢求賜牌印詔刻印以給之太平興國五年貢銀百兩賀平太原雍熙四年洪族人莫淮閬以河池縣知縣余承鑒取其牛怒而劫掠誘羣蠻為寇詔誅承鑒以知宜州侯汀失於備禦免官發諸州兵進討未至而蠻已遁詔拊諭之自是不復寇淳化元年洪卒其弟洪皓襲稱刺史遣使入貢上降優詔賜綵自洪領州十餘年歲輸白金百兩洪皓襲兄位專地利不修常貢其弟洪玩忿之挈妻子來奔宜州洪皓數引兵攻洪玩乃乘傳詣闕訴其事請發兵致討上以其蠻夷但羈縻而已不欲為之興師報怨洪玩先自稱南丹州副使以為邵州團練副使給田十頃下詔戒飭洪皓景德二年洪皓死長子淮勍襲父任俄為其弟淮辿所逐遂以淮辿知南丹州淮勍帥屬來奔詔宜州賜間田資給之大中祥符九年討撫水蠻詔淮辿約勒溪洞勿從誘脅明年平撫水蠻淮辿等以勞進秩景祐三年淮辿老自言願傳其子世漸至和元年命世漸為檢校散騎常侍權發遣州事明年以淮辿為懷逺大將軍致仕世漸為刺史檢校工部尚書賜袍帶錢十萬絹百匹又補其親黨數十人為檢校官如故事也世漸死嘉祐末命其子公帳襲之有世忍者亦淮辿子也初率其屬入內附治平初逃歸攻殺公帳奪其地自守請於朝廷願授刺史補其親黨如故事歲輸銀百兩三年遂命為刺史皆如其請熙寧二年授世忍檢校禮部尚書元豐三年入貢其印以西南諸道武盛軍德政官家夫國主為文詔以南丹州印賜之令毁其舊印六年遷檢校户部尚書官其子姪九人世忍死子公佞襲大觀元年廣西經略使王祖道言公佞就擒進築平允從州收文地蘭那安外習南丹八州之地併為鎮庭孚觀州延德軍以其弟公晟襲刺史宣和四年公晟乞以州事傳其姪延豐願與其子歸朝詔從之仍乘驛給劵紹興三年廣西經略安撫劉亮適言南丹州莫公晟領賊圍打觀州燒毁寶積監宰臣朱勝非奏此皆是大觀及宣和以來所開新邊近來往往棄而不守如觀州屢下本路帥臣監司相度皆以為所據控扼不宜棄之上曰前日用事之臣貪功生事公為欺罔其實勞民費財使逺俗不安也亮適又言公晟自添差路分鈐轄逃去後未曽差官乞先與一職名欲於遙郡下添入知南丹州兼溪洞都巡檢使提舉盜賊公事舊賜南丹州刺史印記今依舊行使從之而公晟未出受命至二十四年廣西經略安撫司言願忠言莫公晟進馬與諸蠻首領並皆歸順令公晟守本官致仕以其子延沈承襲上諭輔臣曰得南丹州非以廣地但猺人不作過百姓安業可喜於是延沈承襲銀青光祿大夫檢校太子賔客使持節南丹州諸軍事南丹州刺史兼御史大夫知南丹州公事武騎尉願忠又奏説諭到諸蠻三十一種族計二十七州一百三十五縣四十寨一鎮三十二團一百七十九洞皆納欵面內乞作羈縻州縣實為熙朝盛事明年又加延沈團練防禦使三十一年廣西諸司言莫延沈恣行慘酷為諸蠻迫逐歸投省地而死衆共推莫延廩承襲知南丹州詔依例補授官孝宗隆興初延廪以諸蠻謀害擕家歸朝廷延椹管州事經略司保奏以聞詔延椹承襲知南丹州淳熙元年南丹州為永樂州所攻使來告急廣西帥差官齎旗榜往二州説諭聽從和解十四年經略司奏莫延蔭乞承襲延椹官爵詔從之寧宗嘉定五年詔以莫延蔭男莫光照承襲知南丹州從經略司所請也石湖范氏桂海虞衡志曰南丹在宜州西境地産竒材異藥惡獸毒虺其人剽悍以徑木為弩聚毒傅矢中人立死宜之髙峯寨古觀州也與南丹接境地勢極髙南丹對境亦髙二壘矢可相及南丹日通市於髙峯少不如意則怨毒思亂其酋莫氏國朝命為刺史月支鹽料及守臣供給錢百五十千比內郡自號莫大王間入宜州則禮之以列郡來已數十年矣其説以為宜州徼外西原黃洞武陽羣小蠻即唐黃家賊之地崇建丹使控制之然莫氏家人亦時自相攻剽今刺史莫延椹逐其弟延廪而自立延廪奔朝廷謂之出宋凡州洞歸朝皆稱出宋延椹淫酷不能服其類鄰永樂州玉氏與為仇歲相攻乾道丁亥與玉氏戰敗告急於帥司帥司遣官為和解永樂益淬勵有勝兵萬人志滅莫氏延椹乃益驕不奉法至私刻經略安撫司及宜州溪洞司印效帥守花書行移以嚇諸蕃落己丑歲自言州去産馬蠻不遠願與國買馬乞於宜州置場意欲藉朝廷任使威制永樂邊將常恭與交通至為代作奏章至闕下不經由帥司樞密院是其説差官置司宜州余論奏宜州密邇內地無故通道諸蠻且開邊隙不敢奉詔且自行在所捕得常恭囚而劾奏其事朝廷大悟削籍竄之九江永不放還外有省民冒法商販入南丹受其帖牒至內地幹事者多桂之興安人余亦物色得其渠送獄論如法南丹稍讋撫水蠻撫水蠻在宜州南有縣四曰撫水曰京水曰多建曰古勞唐𨽻黔南其酋皆蒙姓同出有上中下三房民則有區廖潘吳四姓亦種水田採魚其保聚山險者雖畬田收榖粟甚少但以藥箭射生取鳥獸盡即徙他處無羊馬桑柘地曰帚洞五十里至前村川原稍平合五百餘家夾龍江居種稻似湖湘中有樓屋戰棚衛以竹柵即其酋所居兵器有環刀標牌木弩善為藥箭中者大呌信宿死得雍藥解之即活宋雍熙中數寇邊境掠取民口畜産詔書招安補其酋蒙令地殿直蒙令札奉職咸平中又數為寇盜上令邊臣驅逐出境其黨狡獪者凡三十餘人宜州守將因擒送闕下上召見詰責之對曰臣等蠻陬小民為飢寒所迫耳上顧謂左右曰昨不欲盡令殺戮顧無噍類矣因釋罪賜錦袍冠𢃄銀綵戒勗遣還逾年酋長蒙頂等六十五人詣闕納器甲百七十事又蒙漢誠蒙虔瑋蒙搷來朝上器甲數百及毒箭藥誓不騷邊比歲皆遣使來貢及輸兵器乃授漢誠官賜物有差既而侵軼如故太中祥符九年數寇宜融州界詔以知宜州董元已不善撫綏黜之仍行招撫羣蠻拒命侵掠不已乃命平州刺史曹克明領兵討之傷殺甚衆蠻逃竄窮蹙酋帥蒙承貴等靣縛詣軍自首悉還所掠漢口資畜歃血立誓不敢復叛乃還師詔以撫水州為安化州撫水縣為歸仁縣京水縣為長寧縣自是間歲朝貢不復為邊患寶元元年寇宜融等州發兵討之踰年乃定慶歷嘉祐間再入貢其後首領月赴宜州參謁及貿巨板每歲州四管犒及三歲聽輸所貢兵械於思立寨以其直償之遞以官資遷補熙寧初知宜州錢師孟等擅裁損侵削之土人羅世念等為亂攻殺寨官詔遣兵討之未入境明年世念等率其徒來降各拜官崇寧三年復嘯聚為寇經略司遣兵擊却之大觀二年以三州一鎮户口六萬一千來上詔知融州程鄰往黔南路撫諭官吏推恩有差紹興三年蠻酋蒙全劍等寇掠省地詔帥司討平之二十九年詔加安化上州蒙自臨等七人官勳及賜錢帛有差孝宗淳熙十一年以知宜州馬寧祖減刻蠻人生料錢鹽致令犯邊降一官十二年廣西經略司言蠻人出犯省地多用強弩藥箭本路造木弩五十架給付兩路踏射并造藥箭備用詔常加閲習石湖范氏桂海虞衡志曰安化州最鷙悍在宜州西境官月給生料鹽以拊之猶日侵省地以耕民不敢與爭州亦不敢禁頃有凌羅二將者建炎間嘗率洞兵出勤王賊曹成入廣西建大旗購二人二人遣健兵侏儒者數十輩截髮為牧童候成兵過自牛背彍弩以毒矢射之中者立死成驚懼遁去時盜滿四方廣西獨晏然者二將之力也至今南人稱之子孫有仕於州縣者黎洞黎洞唐故瓊管之地在大海南距雷州泛海一日而至其地有黎母山黎人居焉舊説五嶺之南人雜夷獠珠崖環海豪富兼并役屬貧弱婦人服緦緶績木皮為布陶土為釡器用瓠瓢人飲石汁又有椒酒以安石榴花著甕中即成酒俗呼山嶺為黎居其間者號曰黎人弓刀未嘗去手弓以竹為弦今儋崖萬安皆與黎為境其服屬州者為熟黎其居山洞無征徭者為生黎時出與郡人互市宋至和初有黎人符護者邊吏嘗獲其奴婢十人還之符護亦嘗犯邊執瓊崖州巡檢慕容允則及軍士至是以軍士五十六人與允則來歸允則道病死詔軍士至是貸其罪紹興三十年廣西運判鄧酢言黎州王文滿結連西洞王承聞等攻破定南寨後復犯省地遂分遣官燒蕩巢穴生擒黎賊王用賔等詔令廣西諸司撫存歸業人户乾道二年廣西經略轉運司言欲下瓊管及三軍守倅措置説諭黎人示以朝廷德意威命使之自新退復省地能説諭收復者量功立賞任內有侵犯省地或逃失省民亦重責罰其先省民逃居黎洞之人守臣招誘復鄉蠲其逋稅詔從之六年黎人王用休犯邊萬安權守巡檢孫滋等招諭之遂定九年樂昌縣黎賊劫省民焚官舍瓊管安撫請於朝黎人王用存王承福陳顏等招降復寨有功借補官資彈壓邊面義兵統制黃文廣屢戰有功並欲推賞以澄邁縣巡檢權移駐劄樂昌縣控制黎人其省民久陷歸業蠲賦已責從之淳熙元年詔承節郎王日存等許子孫承襲以瓊州言其祖父居蔭元係入貢又自宣和以來能撫諭諸黎彈壓有勞也八年六月瓊管司言承襲宜人三十六洞統領王氏稱其祖本化外州皇祐熙寧間歸順彈壓三十六洞捍禦隘口正係瓊管咽喉之地三世受朝廷告命至母黃氏承襲彈壓邊界用寧紹興間又説諭化外黎人各安生業莫肯從亂乾道七年受告封宜人今年老無男有一女欲依例承襲詔王氏襲其後又以王氏之姪黃間補官守寨彈壓黎洞嘉定九年詔復許宜人王氏吳氏承襲石湖范氏桂海虞衡志曰黎海南四郡塢土蠻也塢直雷州由徐聞渡半日至塢之中有黎母山諸蠻環居四傍號黎人內為生黎外為熟黎山極髙常在霧靄中黎人自鮮識之久晴海氛清廓時或見翠尖浮半空下猶洪濛也山水分流四郡熟黎所居已阻深生黎之巢深邃外人不復迹黎母之巔則雖生黎亦不能至相傳其上有人壽考逸樂不與世接虎豹守險無路可攀但覺水泉甘美絶異爾蠻去省地逺不供賦役者名生黎耕作省地供賦役者名熟黎各以所邇分𨽻四郡皆椎髻跣足插銀銅錫叉腰繚花布執長靶刀長鞘弓長荷槍跬步不捨去熟黎能漢語變服入州縣墟市日晚鳴角結隊以歸婦人繡靣髙髻叉上加銅環耳墜垂肩衣裙皆五色吉貝無袴襦但繫裙數重製四圍合縫以足穿而繫之羣浴於川先去上衣自濯乃濯足漸升其裙至頂以身串入水浴已則裙復自頂而下身亦出水繡面乃其吉禮女年將及笄置酒會親屬女伴自施針筆涅為極細蟲蛾花卉而以淡粟紋遍其餘地謂之繡面女婢獲則否女工紡織得中國綵帛拆取色絲和吉貝織花所謂黎錦黎單及鞍搭之類精粗有差居處架木兩重上以自居下以畜牧婚姻折箭為定聚會亦椎鼓舞歌親死不哭不粥飯惟食生牛肉以為哀痛之至葬則舁櫬而行令一人前行以雞子擲地雞子不破處即為吉穴客來未相識主人先於隙間窺之客儼然矜莊始遣奴布席於地客即坐又移時主人乃出對坐不交一談少焉置酒先以惡臭穢味嘗客客食不疑則喜繼設中酒遂相親否則遣客不復與交會飲未嘗捨刀三杯後各請弛備雖解器械猶置身傍也一語不相能則起而相戕性喜讐殺謂之捉拗所親為人所殺後見仇家人及其洞中種類皆擒取以荔枝木械之要牛酒銀瓶乃釋謂之贖命土産沉水蓬萊諸香漫山悉檳榔椰子木亦産小馬翠羽黃蠟之屬與省地商人博易甚有信而不受欺紿商人有信則相與如至親借貸有所不吝歲望其一來不來則數數念之或負約不至自一錢以上雖數十年後其同郡人擒之以為質枷其項關以橫木俟前負者來償乃釋負者或遠或死無辜被繫纍歲月至死乃已復伺其同郡人來亦枷繫之被繫家人往負債之家痛詬責償或鄉黨率斂為償始解凡負錢一緡次年倍責兩緡倍至十年乃止本負一緡十年為千緡以故人不敢負其一錢客或誤殺其一雞則鳴鼓告衆責償曰某客殺我一雞當償一鬭一鬭者雌雄各一也一雄為錢三十一雌五十一鬭每生十子五為雄五為雌一歲四産十雞併種當為六鬭六鬭當生六十雞以此倍計展轉十年乃已誤殺其一雞雖富商亦償不足客其家無敢損動其一毫閩商值風水蕩去其資多入黎地耕種不歸官吏及省民經由村洞必舍其家恃以安熟黎之地始是州縣大扺四郡各占塢之一陲其中黎地不可得亦無路通珠崖在塢南陲既不可取徑則復桴海循塢而南所謂再涉鯨波也四郡之人多黎姓蓋其裔族而今黎人乃多姓王生黎質直獷悍不受欺觸不服王化亦不出為人患熟黎貪狡湖廣福建之姦民亡命雜焉侵軼省界常為四郡患有王二娘者瓊州熟黎之酋有夫而名不聞家饒財善用衆能制服羣黎朝廷封宜人瓊管有號令必下王宜人無不帖然二娘死女能繼之其餘三郡強名小壘實不及江浙間一村落縣邑或為黎人據其廳事治所遣人説謝始得還前後邊吏惴不敢言淳熙元年十月指山生黎洞首王仲期率其傍人十洞丁口千八百二十歸化仲期與諸洞首王仲文等八十一人詣瓊管司瓊管司受之以例詣顯應廟研石歃血約誓改過不復鈔掠犒賜遣歸瓊守圖其形狀衣製上經略司髻露者以絳帛約髻根或以綵帛包髻或戴小花笠皆簮二銀篦或加雉尾衣花織短衫繫花襈裙悉跣足是其盛飾也惟王居則青布紅錦袍束帶麻鞋自云祖父宣和中嘗納土補官賜錦袍云海南序略海南諸國漢時通焉大抵在交州南及西南居大海中洲上相去或三五百里三五千里遠者二三萬里乘舶舉帆道里不可詳知外國諸書雖言里數亦非定實也其西與諸胡國接元鼎中遣伏波將軍路博德開百越置日南郡其徼外國自武帝以來皆獻見後漢桓帝時大秦天竺皆由此道遣使貢獻及吳孫權遣宣化從事朱應中郎康泰使諸國其所經及傳聞則有百數十國因立記傳晉代通中國者蓋鮮及宋齊至者有十餘國自梁武隋煬諸國使至踰於前代至唐貞觀以後聲教逺被自古未通者重譯而至又多梁隋焉其無異聞亦不復更記黃支黃支國漢時通焉合海日南之南三萬里俗略與珠崖相類自武帝以來皆獻見有明珠玉璧琉璃竒石異物大珠至圍二寸以下而至圓者置之平地終日不停哥羅哥羅國漢時聞焉在槃槃東南亦曰哥羅富沙羅國云其王姓矢利婆羅名米失鉢羅其治城纍石為之城有樓闕門有禁宮室覆之以草國有二十四州而無縣庭列儀仗有纛以孔雀羽飾焉兵器有弓箭刀矟皮甲征伐皆乘象一隊有象百頭每象有百人衛之象鞍有鈎欄其中有四人一人執矟一人執弓矢一人執殳一人執刀賦稅人出銀一銖國無蠶絲麻紵唯出吉貝布畜有牛少馬其俗非有官者不得上髮褁頭又嫁娶初問婚惟以檳榔為禮多者至二百盤成婚時惟以黃金為財多者至二百兩婦人嫁訖則從夫姓音樂有琵琶橫笛銅鈸鐡鼓簧吹蠡擊鼓死亡則焚尸盛以金罌沉之大海林邑林邑國秦象郡林邑縣地漢為象林縣屬日南郡古越裳之界也在交址南海行三千里其地縱廣可六百里去日南界四百餘里其南水步道二千餘里有西屠夷亦稱王焉馬援所植兩銅柱表漢界處也馬援北還留十餘户於銅柱處至隋有三百餘户悉姓馬土人以為流寓號曰馬留人銅柱尋沒馬留人常識其處林邑國記馬援植兩銅柱於象林南界與西屠國分漢之南境又云銅柱山周十里形如倚蓋西跨重巖東臨大海屈璆道里記又云林邑大浦口有五銅柱焉後漢末大亂縣功曹姓區有子曰連殺縣令自號為王子孫相承吳時通使其後王無嗣外范熊代立熊死子逸代立其國有金山石皆赤色其中生金金夜則出飛狀如螢火又出玳瑁貝齒吉貝沉水香吉貝者樹名也其華成時如鵝毛抽以績紡作布潔白與紵布不殊亦染成五色織為斑布也沉香者土人破斷之積以歲年朽爛而心節獨在置水中則沉故曰沉香次不沉者曰棧香也又出猩猩獸爾雅曰肉之美者猩猩之唇多琥珀松脂淪入地千歲為茯苓又千歲為琥珀又云楓脂為之琥珀在地其上及傍不生草木深者或八九尺如大斛削去皮成焉初如桃膠凝成乃堅其金寶物産大抵與交址同以磚為城蜃灰塗之居處為閣名曰干蘭皆開北户以向日或東西無定尊官有二其一曰西郡婆帝其二曰薩婆地歌其屬官三等其一曰倫多姓次歌倫致帝次一地伽蘭外官分為二百餘部其長官曰弗羅次曰阿倫如牧宰之差也書樹葉為紙施椰葉為席男女皆以橫幅吉貝繞腰以下謂之干漫穿耳貫小環貴者著革履賤者跣行自林邑扶南諸國皆然也其王戴金花冠形如章甫加纓絡出則乘象吹螺擊鼓罩吉貝繖以吉貝為幡旗國不設刑法有罪者使象踏殺之林邑浦外有不勞山罪人亦送此山令其自死其大姓號婆羅門嫁娶必用八月女先求男由貴男而賤女也同姓還相婚姻人性凶悍果於戰鬭有弓箭刀槊以竹為弩樂有瑟笛琵琶五弦頗與中國同每擊鼓以警衆吹蠡以節戎其人深目髙鼻髮卷色黑婦人椎髻四時暄暖無霜雪王死七日而葬有官者三日庶人一日皆以函盛尸鼓舞導從輿至水次積薪焚之收餘骨王則內金罌中沉之於海有官者以銅沉之海口庶人以瓦送之於江男女截髮隨喪至水次盡哀而止其寡婦孤居散髮至老人皆奉釋法文字同於天竺王事尼乾道鑄金銀人像大十圍至晉武帝太康中又來貢獻成帝咸康二年逸死奴文篡位奴文昔嘗北至洛陽商貨因教王作宮室兵車器械王愛信之使為將乃譖王諸子或徙或奔及王死無嗣遂自立為王乃攻旁國并有衆四五萬至穆帝永和三年文率其衆攻陷日南今郡地遂據其地告交州刺史朱蕃交州今安南府求以日南北鄙今郡地橫山為界初徼外諸國嘗齎寶物自海路來貿貨賄而交州刺史日南太守多貪利侵侮十折二三由是諸國怨憤且林邑少田故貪日南之地文又襲九真今郡地害士庶十八九文死子佛立猶屯日南九真太守灌邃率兵討佛走之邃追至林邑時五月立表日在表北影在表南九寸一分自北影之南故開北户以向日此大較也佛乃請降其後頻寇日南九德之郡今安南日南郡界殺傷甚多交州遂至虗弱至佛曾孫文敵後為扶南王子當根純所殺大臣范諸農平其亂而立為王死子陽邁立死子咄復名曰陽邁初其父陽邁母始産夢人以金籍之夷人謂金為陽邁故為名至咄纂父業又名焉宋文帝元嘉中侵暴日南九德諸郡宋九德郡今安南日南郡界宋使振武將軍宗元幹討之克林邑陽邁父子並挺身奔逃所獲珍異皆是未名之寶又銷其金人得黃金數十萬斤其後纍代自宋齊梁陳皆遣使朝貢隋文帝既平陳後遣大將軍劉方步騎萬餘人擊之其王梵志率其徒乘象而戰方多掘小坑草覆其上因以兵挑之梵志悉衆而陳方偽北走梵志逐之其象多陷轉相驚駭軍遂亂方縱兵擊大破之遂棄城而走方入其都獲其廟主十八枚皆鑄金為之蓋其有國十八葉矣方既平其國班師故地遂空梵志收拾遺人别建國邑唐武德中再遣使貢方物貞觀時王頭黎獻馴象鏐鎖五色𢃄朝霞大火珠其言不恭羣臣請問罪帝赦不問又獻五色鸚鵡白鸚鵡數訴寒有詔還之頭黎死子鎮龍立獻通天犀雜寶十九年摩訶慢多伽獨弒鎮龍滅其宗范姓絶國人立頭黎壻婆羅門為王大臣共廢之更立頭黎女為王諸葛地者頭黎之姑子父得罪奔真臘女王不能定國大臣共迎諸葛地為王妻以女永徽至天寶三入獻嘗獻火環大如雞卵狀如水晶日正午時以艾藉珠輒火出云得之羅剎國至德復更號環王元和初不朝獻安南都護張丹執其偽歡愛州都督斬三萬級虜王子五十九獲戰舠鎧扶南扶南國在日南郡之南海西大島中去日南可七千里在林邑西南三千餘里其境廣袤三千餘里國俗本裸文身被髮裸郎果反不制衣裳其先有女人為主號曰柳葉年少壯健有似男子其南有激國人名混潰來伐柳葉降之遂以為妻惡其裸露形體乃穿疊布貫其首理其國子孫相傳至王混盤况死國人立其大將范師蔓為王蔓勇健有權略以兵威伐旁國咸服屬之自號扶南大王開地五六千里蔓死國亂大將范尋自立為王是吳晉時也土地坳下而平博氣候風俗物産大較與林邑同有城邑宫室國王居重閣以木柵為城海邊生大若葉長八九尺編其葉以覆屋國人亦為閣居為船八九丈廣才六七尺頭尾似魚國王行乘象人皆醜黑卷髮裸身跣行耕種為務一歲種三歲穫又好雕文刻鏤食器多以銀為之出金鋼可以刻玉狀似紫石英其所生乃在百丈水底盤石上如鍾乳人沒水取之竟日乃出以鐵鎚之而不傷鐵乃自損以羚羊角扣之漼然氷泮貢賦以金銀珠香亦有書記府庫文字類蕃吳時遣康泰朱應使於尋國國人猶裸唯婦人著貫頭泰應謂曰國中實佳但人褻露可怪耳尋始令國內男子著橫幅今干漫也大家乃截錦為之貧者以布又有老雕入海為玳可以裁作馬勒謂之珂西晉太始太康中皆遣使貢獻東晉時有竺旃檀稱王亦遣使其後王姓憍陳如本天竺婆羅門也有神語曰應王扶南憍陳如南至槃槃扶南人聞之迎而立焉復改制度用天竺法令其國人居不穿井數十家共一池引汲之俗事天神以銅為像二面者四手四面者八手手各有所持或小兒或鳥獸或日月王坐則偏踞翹膝垂左膝至地以白疊敷前設金盆香爐於其上居喪則剃除鬢髮人無禮義男女恣其奔隨宋齊梁並獻方物隋時其國王姓古龍諸國多姓古龍訊耆老言古龍無姓氏乃崑崙之訛隋代遣使貢獻唐武德後頻來貢貞觀中又獻白頭國二人於洛陽其國在扶南之西在參半之西南男女生皆素首身又凝白居山洞之中四面巖嶮故人莫至與參半國相接頓遜頓遜國梁時聞焉一曰典遜在海崎山上地方千里王並羈屬扶南北去扶南可三千餘里其國之東界通交州其西界接天竺安息徼外諸國賈人多至其國市焉所以然者頓遜迥入海中千餘里漲海無涯岸舶未曾得徑過也其市東西交會日有萬餘人珍物寶貨無種不有又有酒樹似安石榴採其花汁停酒甕中數日成酒出藿香插枝便生葉如都梁以裛衣國有區撥等花十餘種冬夏不衰日載數十車貨之其花燥更芬馥亦末為粉以傅身焉其俗又多鳥葬將死親賓歌舞於郭外有鳥如鵝口鶯鵡而紅色飛來萬許家人避之鳥食肉盡乃去燒其骨沉海中以為上行人也必升天鳥若回翔不食其人乃自悲復以為巳有穢乃更就火葬以為次行也若不能生入火又不被鳥食以為下行也毗騫毗騫國梁時聞焉在頓遜之外大海洲中去扶南八千里傳其王身長丈二尺頭長三尺自古來不死莫知其年其王神聖知將來事南方號曰長頭王國俗有室居衣服噉粳米其人言語小異扶南國不受估客有往者亦殺而噉之是以商旅不敢至王常樓居不血食不事鬼神其子孫生死如常人惟王不死又傳扶南東界即漲海海中有大洲洲上有諸薄國國東有馬五洲復東行漲海千餘里有燃火洲其上有樹生火中洲左近人剝取其皮紡績作布極得數尺以為手巾與蕉麻無異而色微青黑若小有垢汚則投火復更精潔毗騫王亦能作天竺書書可三千言説其宿命所由與佛經相似並論善事干陀利干陀利國在南海洲上其俗與林邑扶南略同出斑布吉貝檳榔特精好為諸國之極宋孝武世王釋婆羅那鄰陀遣長史竺留弛獻金銀寶器梁天監元年其王瞿曇修跋陀羅以四月八日夢一僧曰中國今有聖主十年之後佛法大興汝若遣使貢奉禮敬則土地豐樂商旅百倍若不信我則境土不得自安初未之信既而又夢此僧曰汝若不信我當與汝往觀乃於夢中至中國拜覲天子既覺心異之陀羅本工畫乃寫夢中所見武帝容質飾以丹青乃遣使并畫工奉表獻玉盤等物使人既至摸寫帝形以還其國比本畫則符同焉因盛以寶函日加禮敬後跋陀死子毗針邪跋摩立十七年遣長史毗員跋摩奉表獻金芙蓉雜香藥等普通元年復遣獻方物按干陀利王夢僧所言一假南史夷貊傳所載杜氏通典削之蓋梁武好佛之志通於華夷適干陀利以其時入貢佞臣黠僧遂立此説導之以納諂非事實也島夷朝貢不過利於互市賜豫豈真慕義而來諷以希旨宜無不可况所謂瞿曇修跋陀羅者本佛之徒亦欲其教之行於中土又安知其不自神其説以中帝之欲乎越裳氏所以贊武王周公者梁武豈足以當之哉狼牙修國狼牙修國在南海中其界東西三十日行南北二十日行北去廣州二萬四千里土氣物産與扶南略同偏多棧沉婆律香等其俗男女皆袒而被髮以吉貝為干漫其王及貴臣乃加雲霞布覆胛以金繩為絡帶金環貫耳女子則布以纓絡繞身其國纍磚為城重門樓閣王出乘象有幡毦旗鼓罩白蓋兵衛甚嚴國人説立國以來四百餘年後嗣衰弱王族有賢者國人歸向之王聞乃枷囚執其鎖無故自斷王以為神不敢害乃逐出境遂奔天竺天竺妻以長女俄而狼牙王死大臣迎還為王二十餘年死子婆加逹多立梁天監十四年遣使阿撒多奉表婆利國婆利國在廣州東南海中洲上去廣州二月日行國界東西五十日行南北二十日行有一百三十六聚土氣熱如中國之盛夏榖一歲再熟草木常榮海出文螺紫貝有石名坩貝羅初采之柔軟及刻削為物暴乾之遂大硬其國人披吉貝如帊及為都縵乃用斑絲者以纓絡繞身頭著金冠髙尺餘形如辨綴以七寶之飾帶金裝劍偏坐金髙坐以銀蹬支足侍女皆為金花雜寶之飾或持白毦拂及孔雀扇王出以象駕輿輿以雜香為之上施羽蓋珠簾其導從吹螺擊鼓王姓憍陳如自古未通中國問其先及年數不能記自言白淨王夫人即其國女梁天監十六年遣使奉表獻金席等普通三年其王頻伽復遣使珠智獻白鸚鵡青蟲兜鍪琉璃器吉貝螺杯雜香藥等數十種其國有舍利鳥通人言俗黑身朱髮而卷鷹爪獸牙穿耳傅璫以吉貝一幅繚於腰以夜為市自掩其面隋大業中又遣使入貢其王姓剎利邪伽名護路那婆唐貞觀中又遣使朝貢其東即羅剎也與婆利同俗隋煬帝遣常駿使赤土遂通中國赤土西南入海得婆羅總章二年其王旃逹鉢遣使者與環王使者偕朝環王南有珠奈者泛交址海二月乃至與婆羅同俗貞觀二年使者上方物九年甘棠使者入朝國居海南十二年僧髙武令迦乍鳩密四國使者朝貢僧髙直水真臘西北與環王同俗其後鳩密王尸利鳩摩又與富那王尸利提婆跋摩等遣使來貢僧髙等國永徽後為真臘所并槃槃槃槃國梁時通焉在南海大洲中北與林邑隔小海自交州船行四十日至其國其王曰楊栗翨音翅栗翨父曰楊德武連以上無得而記百姓多緣水而居國無城皆竪木為柵王坐金龍牀每坐諸大人皆兩手交抱肩而跽九暨反又其國多有婆羅門自天竺來就王乞財物王甚重之其大臣曰勃郎索濫次曰昆崘帝也次曰昆崘勃和胡卧反次曰昆崘勃帝索甘且其言昆崘古龍聲相近故或有謂為古龍者其在外城者曰那延猶中夏刺史縣令其矢以石為鏃矟則以鐵為刃有僧尼寺十所僧尼讀佛經皆肉食而不飲酒亦有道士寺一所道士不食酒肉讀阿修羅王經其國不甚重之俗皆呼僧為比邱呼道士為貪宋元嘉孝建大明中並遣使貢獻梁中大通元年四年其王使使奉表纍送佛牙及畫塔并獻香物十種六年復遣使送菩提國舍利及畫塔圖并菩提樹葉詹糖等香隋大業中亦遣使朝賀赤土國赤土國扶南之别種也在南海中水行百餘日而逹所都土色多赤因以為號東波羅刺國西婆羅娑國南訶羅旦國北拒大海地方數千里其王姓瞿曇氏名利富多塞不知有國逺近稱其父釋王位出家為道傳位於利富多塞在位十六年矣有三妻並鄰國女也居僧祗城有門三重相去各百許步每門圖畫菩薩飛仙之象懸金花鈴毦婦人數十人或奏樂或捧金花又飾四婦人容飾如佛塔邊金剛力士之狀夾門而立門外者持兵仗門內者執白拂夾道垂素網綴花王宫諸屋悉是重閣北户北面而坐三重之榻衣朝霞布冠金花冠垂雜寶纓絡四女子立侍左右兵衛百餘人王榻後作一木龕以金銀五香木雜鈿之龕後懸一金光焰夾榻又樹二金鏡鏡前並陳金甕甕前各有金香爐當前置一金伏牛前樹一寶蓋蓋左右皆有寶扇婆羅門等數百人東西重行相向而坐其官薩陀迦邏一人陀拏逹義二人迦利密迦三人共掌政事俱羅末帝一人掌刑法每城置那邪迦一人鉢帝一人其俗皆穿耳翦髮無跪拜之禮以香油塗身其俗敬佛尤重婆羅門婦人作髻於項後男女通以朝霞朝雲雜色布為衣豪富之室恣意華靡唯金鎖非王賜不得服用每婚姻擇吉日女家先期五日作樂飲酒父執女手以授壻七日乃配既娶即分財别居唯幼子與父居父母兄弟死則剔髮素服就水上構竹木為棚棚內積薪以尸置上燒香建幡吹蠡擊鼓以送火焚薪遂落於水貴賤皆同唯國王燒訖收夾貯以金瓶藏於廟屋冬夏常溫雨多霽少種植無時特宜稻穄白豆黑麻自餘物産多同於交趾以甘蔗作酒雜以紫瓜根酒色黃赤味亦香美亦名椰漿為酒隋煬帝嗣位募能通絶域者大業三年屯田主事常駿虞部主事王君政等請使赤土帝大悅遣齎物五千假以賜赤土王其年十月駿等自南海郡乘舟晝夜二旬每日遇便風至焦石山而過東南詣陵伽鉢拔多洲西與林邑相對上有神祠焉又南行至師子石自是島嶼連接又行二三日西望見狼牙修國之山於是南逹雞籠島至於赤土之界其王遣婆羅門鳩摩羅以舶三十艘來迎吹蠡擊鼓樂隋使進金鎖以纜船月鑷金合二枚貯香油金瓶八枚貯香水白疊布四條以擬供使者盥洗其日未時那邪迦又將象二頭持孔雀蓋以迎使人并致金盤金花以藉詔函男女百人奏蠡鼓婆羅門二人導路至王宫駿等奉詔書上閣王以下皆坐宣詔訖引駿等坐奏天竺樂事畢駿等還館又遣婆羅門就館送食以草葉為盤其大方丈因謂駿曰今是大國臣非復赤土國矣後數日請駿等入宴儀衛導從如初見之禮王前設兩牀牀上並設草葉盤方一丈五尺上有黃白紫赤四色之飰牛羊魚鱉豬蝳蝐之肉百餘品延駿升牀從者於地席各以金鐘置酒女樂迭奏禮遺甚厚遣那邪迦隨貢方物并獻金芙蓉冠龍腦香以鑄金為多羅葉隱起成文以為表金函封之令婆羅門以香花奏蠡鼓而送之既入海見緑魚羣飛水上浮海十餘日至林邑東南並山而行其海水色黃氣腥舟行一日不絶云是大魚糞也循海北岸逹於交趾駿以明年春與那邪迦於𢎞農謁帝帝大悅授駿等執戟都尉那邪迦等官賞各有差文獻通考卷三百三十一
