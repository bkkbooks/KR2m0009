body:
  text: 文獻通考卷二百七十一鄱陽馬端臨貴與著封建考十二晉諸侯王列侯晉亦有王公侯伯子男六等之封晉令曰有開國郡公縣公郡侯縣侯伯子男及鄉亭關中關內外等侯之爵唯安平郡公孚邑萬户制度如魏諸王其餘縣公邑千八百户地方七十五里大國侯邑千六百户地方七十里次國侯邑千四百户地方六十五里大國伯邑千二百户地方六十里次國伯邑千戶地方五十里大國子邑八百户地方五十里次國子邑六百戶地方四十里男邑四百户地方四十里武帝受禪之初泰始元年封建子弟為王二十餘人以郡為國邑二萬户為大國置上中下三軍兵五千人邑萬户次國置上軍下軍兵三千人邑五千户為小國置一軍兵千五百人王不之國官於京師罷五等之制公侯邑萬户以上為大國五千以上為次國不滿五千户為小國初雖有封國而王公皆在京都咸寧三年詔徙諸王公皆歸國時楊珧荀朂以齊王攸有時名懼惠帝有後難乃追故司空裴秀立封建之旨遂詔王公悉令歸國更制戶邑皆中尉領兵其平原汝南琅琊扶風齊為大國梁趙樂安燕安平義陽為次國其餘為小國皆制所近縣益滿萬户又為郡公制度如小國王亦中尉領兵郡侯如不滿五千户王置一軍千一百人亦中尉領之於時唯特增魯國公户邑追進封故司空博陵公王沈為郡公巨平侯羊祜為南城郡侯又南宫王丞隨王萬各於泰始中封為縣王邑千户至是改正縣王增邑為三千户制度如郡侯亦置一軍自此非皇子不得為王而諸王之支庶皆皇家之近屬至親亦各以土推恩受其大國次國始封王之支子為公承封王之支子為侯繼承封王之支子為伯小國五千户始封王之支子及始封公侯之支子皆為男非此皆不得封其公之制度如五千户國侯之制度如不滿五千户國亦置一軍千人中尉領之伯子男以下各有差而不置軍大國始封之孫罷下軍曾孫又罷上軍次國始封之孫亦罷下軍其餘付以一軍為常大國中軍二千人上下軍各千五百人次國上軍二千人下軍千人其未之國大國置守士百人次國八十人小國六十人郡侯縣公亦如小國制度既行所增徙各如本奏既遣就國而諸公皆戀京師涕泣而去及吳平後齊王攸遂之國凡名山大澤不以封鹽鐡金銀銅錫始平之竹園别都宫室園囿皆不為屬國其仕在天朝者與之國同皆自選其文武官時齊王攸國相上長史缺典書令請求差選攸下令曰官人敘才皆朝廷之事非國所宜裁也其令自上請之又當時王家人衣食皆出御府攸乃表租秩足自供遂求絶之諸入作卿士而其世子年已壯者皆遣蒞國其王公侯以下茅社符璽車旗命服一如泰始故事凡王金印龜紐纁朱綬遠遊三梁冠絳紗朝服佩山元玉開國郡公縣公金章皂朱紱綬郡侯青朱綬同進賢三梁冠絳朝服佩山元玉開國縣侯伯子男金章朱墨綬冠玉亦同初武帝踐祚封宣帝孫永為東莞郡王始置二卿侯以下置官屬隨國大小無定制諸侯並三分食一東晉元帝太興元年始置九分食一元帝以西陽王羕屬尊元會特為設牀明帝以羕皇室元老特為之拜成帝詔羡依安平獻王孚故事設牀帳於殿上帝親迎拜王國有傅傅即師也以景帝諱故曰傅武帝初置亦謂之師山公啓事曰王為燕王師友武帝初置一人蓋因文王仲尼四友之名典書令丞掌國教令職官録曰漢制本曰尚書改為治書國諱又改為典書至晉武置典書令文學一人郎中令中尉大農為三卿左右常侍大國各二人次國各一人掌贊相獻替內史改太守為內史又晉書曰改國相為內史將軍大國上中下軍三將軍次國上下二軍將軍各一人小國上軍而已典祠典衛學官令治書中尉司馬世子庶子陵廟牧長謁者中大夫舍人典府等其後省相及僕省郎中置侍郎二人初晉武帝輔魏政阮籍常言於帝曰平生曾遊東平樂其風土即拜為東平相籍乘驢到郡壞府舍屏障使內外相通法令清簡旬日而還公侯以下國官屬遞減晉書曰詔以夀光公鄭沖及朗陵公何曾國皆置郎中令又曰元帝初渡江即晉王位諸參軍奉車都尉掾屬者百餘人時人謂之百六掾晉諸侯王安平獻王孚宣帝次弟泰始元年封邑四萬户拜太宰八年薨孫穆王隆嗣無子國除義陽城王望孚子初出繼伯父朗武帝受禪封邑萬户泰始七年薨孫竒嗣後徙封棘陽王河間平王洪望子出繼叔父昌武帝受禪封咸寧二年薨子混嗣滔休隨穆王整望子武帝以義陽國一縣封整為隨縣王薨子邁嗣竟陵王楙望子武帝受禪封東平王邑三千九十七户懷帝踐祚改封竟陵王後為亂兵所害太原成王輔孚子武帝受禪封渤海王邑五千三百七十九户後徙為太原王薨子𢎞嗣後徙封中丘鑠下邳獻王晃孚子武帝受禪封邑五千一百七十六户薨子韡嗣韶太原烈王瓌孚子武帝受禪封邑五千四百九十六户薨子顒立徙封河間王趙王倫篡位齊王冏謀討之遣使告顒顒初不從遣張方助倫後見冏等兵盛乃從之倫既誅顒復興兵討冏殺之復與成都王頴謀舉兵誅長沙王乂遣張方入京城大掠以頴為太弟奉乘輿都長安後為南陽王模所殺并其三子融彭城王植子詔以為顒嗣改封樂成縣王欽髙陽元王圭孚子武帝受禪封邑五千五百七十户薨子哀王緝嗣訟常山孝王衡孚子武帝受禪封邑三千七百九十户薨子敦嗣沛順王景孚子武帝受禪封邑三千四百戶薨子韜嗣彭城穆王權宣帝弟武帝受禪封邑二千九百户薨子元王植嗣康王釋雄紘元宏之邵之崇之緝之宋受禪國除高密文獻王泰宣帝弟武帝受禪封隴西王邑三千二百户後改封高密王邑萬户薨子孝王略嗣恭王俊敬王純之恢之宋受禪國除東海孝獻王越泰次子以討楊駿功封五千户侯後封東海王食六縣長沙王乂既敗帝西幸以越為太傅與河間王顒共輔朝政越引兵奉帝還洛陽遂專朝政帝崩懷帝立委政於越所在冦亂上下崩離越以憂薨沖元帝子以嗣越率徙封琅琊王後嗣帝位桓溫廢之彥璋為桓元所殺國除南陽王模泰子初封平昌公永嘉初進爵南陽王轉征西大將軍代河間王顒鎮關中劉聰攻長安模敗降為聰所害子保嗣新蔡武哀王騰泰子初封東瀛公永嘉初封新蔡王遷車騎將軍鎮鄴羣盜李豐等攻鄴騰不能守為豐所害子莊王確嗣為石勒所殺弼邈晃崇惠宋受禪國除范陽康王綏宣帝弟武帝受禪封薨子虓嗣黎濟南惠王遂宣帝弟武帝受禪封薨子耽嗣譙剛王遜宣帝弟武帝受禪封邑四千四戶薨子定王隨邃沒於石勒閔王承隨弟元帝以紹遜封為湘州刺史王敦構逆圍承兵敗死之烈王無忌忠王尚之為桓元所殺文思坐謀逆死國除高陽王睦宣帝弟武帝受禪封中山王邑五千二百户後徙封高陽王薨孫毅嗣沒於石勒文深法連宋受禪國除任城景王陵宣帝弟武帝受禪封北海王邑四千七百户後改封任城薨子濟立為石勒所害西河繆王斌陵子武帝受禪封陳王邑千七百一十户後改封西河薨子隱嗣孴平原王幹宣帝子武帝受禪封邑萬一千三百户薨會劉聰亂不遑贈典世子早卒琅琊武王胄宣帝子武帝受禪封東莞郡王邑萬六百户後徙琅琊薨子恭王覲立睿渡江是為元帝裒以皇子奉恭王祀早薨昱徙封會稽後為簡文帝德文是為恭帝既立琅琊國除武陵莊王淡胄子胄薨分國封之後為石勒所害子哀王哲嗣晞元帝子繼哲後㻱遵東安王繇胄子胄薨封後為成都王頴所殺渾無子國除淮陵王瓘胄子以預討趙王倫功封薨子貞王融嗣藴安之宋受禪國除燕王機父清惠亭侯宣帝子早卒武帝受禪封機為燕王邑六千六百六十三户後增户至二萬薨子幾嗣扶風武王駿宣帝子武帝踐阼進封汝陰王邑萬户後徙封扶風薨子暢嗣改封順陽王劉聰入洛不知所終新野莊王歆駿子駿薨推恩分國封歆縣公後以預討趙王倫功封王邑二萬户後為賊張昌所害劭沒於石勒梁孝王肜宣帝子武帝踐阼封邑五千三百五十八戶後與趙王倫共廢賈后為太宰增封二萬户薨禧沒於石勒翹㻱和珍之為劉裕所害國除齊獻王攸文帝子以景帝無子命為嗣武帝受禪封齊王薨子冏嗣趙王倫篡位冏起兵誅倫惠帝反正拜大司馬河間王顒長沙王乂舉兵殺之子超嗣柔之建之宋受禪國除東萊王蕤攸子出繼遼東王定國後徙封東萊齊王冏既秉政蕤密謀廢冏坐廢死定國文帝子廣漢沖王贊攸子繼廣漢殤王薨殤王文帝子實以弟繼改封北海王城陽哀王肇文帝子早死武帝踐阼追封景度憲祗遐樂安平王鑒文帝子武帝踐阼封尋薨籍冰樂平王延祚文帝子以篤疾不任封太康初封尋薨無子汝南文成王亮宣帝第四子武帝踐阼封扶風王邑萬户惠帝即位楊駿誅為太宰録尚書事後為賈后及楚王瑋所殺矩與亮同遇害祐義遵之蓮扶宋受禪國除西陽王羕亮子惠帝時封元帝渡江即位拜侍中太保明帝崩受遺輔成帝後坐降蘇峻賜死國除南頓王宗亮子以討劉喬功封萬户後渡江為左將軍坐反死汝陽王熙亮子以討劉喬功封永嘉末沒於石勒楚隱王瑋武帝第五子初封始平王後徙楚楊駿誅賈后令瑋誅汝南王亮及衛瓘復以矯詔罪瑋而殺之範為石勒所害趙王倫宣帝第九子武帝即位封琅琊郡王後徙趙惠帝時為車騎將軍諂事賈后及后廢殺皇太子倫以兵廢后篡位齊王冏等討而誅之長沙厲王乂武帝第六子太康十五年封趙王倫篡位乂與齊王冏等舉兵誅倫復攻冏而殺之河間王顒等以兵攻乂東海王越收乂送金墉城張方取而殺之子碩嗣沒於劉聰成都王頴武帝第十六子太康未受封趙王倫篡位頴與齊王冏等以兵討誅之及冏敗頴鎮鄴遙執朝政憚長沙王乂與河間王顒等以兵犯京師執乂殺之廢太子覃以頴為太弟頴僣侈無君陳昣等奉帝討之敗績後為烏丸羯末等所襲奉帝奔長安河間王顒廢頴以豫章王為皇太弟范陽王虓幽頴而殺之遵沒於石勒秦獻王柬武帝子泰始初封汝陽王後徙封秦邑八萬户於時諸王封中土者皆五萬户以東為太子同産特加之元康元年薨郁鄴以吳王晏子嗣後入紹帝位為愍帝國絶毗陵悼王軌武帝子二嵗天太康時追封以楚王瑋子義嗣城陽懷王景武帝子出繼叔父城陽哀王兆後早薨無子東海沖王祗武帝子受封早薨始平哀王裕武帝子受封早薨迪以淮南王允子嗣淮南忠壯王允武帝子初封濮陽王後更封趙王倫既廢賈后以允為太尉倫將篡允帥兵攻之為倫所害祥代哀王演武帝子太康十年封薨子廓嗣新都王該武帝子咸寧三年封薨無子國除清河康王遐武帝子出繼叔父城陽哀王兆永康中薨子覃後立為皇太子河間王顒等舉兵脅遷復廢為清河王未幾被害籥汝陰哀王謨武帝子早薨無後吳敬王晏武帝子太康十年封洛京陷遇害渤海殤王恢武帝子早薨無後武帝太康時劉頌上疏曰三代並建明德以藩帝室延祚久遠近者五六百嵗遠者千載秦氏罷侯置守二世而亡漢承周秦之後雜而用之前後二代各二百餘年揆其封建強弱不適不盡事中然迹其衰亡常在同姓失職諸侯微時不在強盛昔吕氏之亂賴齊代以寧社稷七國叛逆梁王扞之以彌其難自是之後威權日削王莾得以遂其姦謀傾蕩天下光武紹起雖封樹子弟而不建成國之制祚亦不延魏氏乘之圈閉親戚幽囚子弟是以神器速傾天命移在陛下又魏氏時三方未賓實有戰國相持之勢大晉之興宣帝定燕太祖平蜀陛下滅吳可謂功格天地宜因盛明之時開啓土宇使同姓必王建久安於萬載垂長世於無窮今諸侯裂土皆秉於古之諸侯而君賤其爵臣恥其位莫有安志其故何也法同郡縣無成國之制故也今之建置宜一如古典惠帝永興初劉宏上言曰自頃兵戈紛亂猜禍蜂生疑隙構於羣王災難延於宗子今夕為忠明旦為逆翩其反而互為戎首載籍以來骨肉之禍未有如今者臣切悲之今籩陲無備豫之儲中華有杼軸之困而股肱之臣不惟國體職競尋常自相楚剝萬一四夷乘虛為變此亦猛虎交鬭自效於卞莊者矣臣以為宜速發明詔詔顒越等令兩釋猜嫌各保分局自今以後其有不被詔書擅興兵馬者天下共伐之按魏疏忌骨肉故武之子文之母弟不過食一縣且刻削遷徙殊無寧日幾不能以自存晉矯其敝受禪之初不特宣文之子孫畢王雖宣帝諸弟如孚如泰輩之子孫亦且同時俱封又許其自選官屬而王家人衣食御府别給之親親之意亦厚矣劉頌所言無成國之勢蓋以其徒享封土而不治吏民有同郡縣此乃漢景武以後之法制然惠帝既立之後諸王或鎮雄藩或專國政廢賈誅趙猶運之掌則亦不可以言無事任矣而干戈相侵自相屠毒遂以覆國蓋晉之創業不以道而垂統非其人故天命不祐雖有磐石之宗適以基禍固難以周漢自詭也臨川獻王郁簡文帝子早卒簡文即位追封寧康寶會稽文孝王道子簡文帝少子出繼琅琊王後更封會稽孝武即位進録尚書事安帝即位進太傅假黃鉞後以討桓元不克為元所害子修之右晉宗室王姓名之見於史傳者張軌安定烏氏人永寧初為護羌校尉涼州刺史以破鮮卑功封安樂鄉侯進封西平郡公立十三年薨諡武公子實嗣立進位大都督涼州牧侍中司空承制行事六年為閻沙等所殺諡昭公弟茂嗣五年薨諡成公兄子駿嗣時羣寮勸駿稱涼王駿不許然自後境內皆稱之為王立二十二年薨諡文公子重華嗣始自稱持節大都督太尉護羌校尉涼州牧河西公假涼王立十一年薨諡昭公子曜靈嗣為伯父長寧侯祚所弒諡哀公祚篡位改元為和平元年三年為張瓘等所殺元靚耀靈庶弟嗣廢和平之號復稱晉正朔立九年薨為天錫所弒諡沖公天錫駿少子嗣立十三年秦王堅遣將茍萇伐之天錫兵敗降秦自軌為涼州至天錫凡九世七十六年李皓隴西成紀人呂光末燉煌人推皓為太守六郡推皓為大都督大將軍涼公領秦涼二州牧義熙元年皓改元建初遣使奉表詣建康立三年薨國人諡為武昭王子士業嗣改元為嘉興為沮渠蒙遜所敗死國亡皓以晉安帝隆安四年立至宋少帝景平元年滅凡再世二十四年右晉祚中微羣雄割據以一隅之地盜名字者不一惟二涼纍世不失藩臣禮故晉書述於列傳明其異於載記所書僭偽之羣胡也故今敘其世系於宗室王之後為異姓王云晉五等侯王祥琅琊臨沂人魏末以從討毋邱儉功封亭侯後拜司空為睢陵侯晉武即位進爵為公薨諡元公子復嗣根鄭沖滎陽開封人常道鄉公時拜太保封壽光侯武帝即位進爵為公薨諡成公子徽嗣簡何曾陳國陽夏人少襲父夔爵武陽亭侯後封朗陵侯武帝即位進爵為公薨諡孝子劭嗣石苞渤海南皮人以破諸葛誕功封東光侯武帝即位封樂陵郡公薨諡武子統嗣崇苞子統弟以伐吳功封安陽鄉侯後為孫秀所殺羊祜泰山南城人魏世封巨平子武帝即位以佐命功進爵為侯後鎮襄陽以功改封南城公薨諡成篇以祜兄子嗣法興孝武時封後以桓元黨誅國除杜預京兆杜陵人襲祖畿爵豐樂亭侯從平蜀增邑以滅吳功進爵當陽縣侯薨諡成子錫嗣乂陳騫臨淮東陽人為相國司馬封安國亭侯武帝即位以佐命功封高平郡公薨諡武子輿嗣粹浩之以騫元孫襲爵宋受禪國除裴秀河東聞喜人以從討諸葛誕封魯陽鄉侯武帝即位封巨鹿郡公薨諡元子濬嗣頠濬少弟嗣賈后時輔政為趙王倫所殺嵩頠子楷秀從弟與楊駿為姻家駿誅坐不阿附封臨海侯薨諡元子輿嗣衛瓘河東安邑人襲父覬爵閺鄉侯後以平蜀誅鍾鄧功封災陽侯武帝即位進封公惠帝時為賈后所殺後諡成璪以孫襲爵崇張華范陽方城人以贊伐吳功封廣武縣侯惠帝時輔政封壯武縣公賈后廢為趙王倫所殺王沈太原晉陽人高貴鄉公將攻文帝沈奔白帝以功封安平侯武帝即位進爵為公薨諡元子浚嗣後為石勒所殺道素太元初以從孫襲崇之宋受禪國除荀覬潁川人以預討毋邱儉等功封亭侯武帝即位進爵臨淮公薨諡康徽以從孫嗣龍符宋受禪國除荀朂潁川潁陰人文帝為晉王封安陽子武帝即位改封濟北郡公薨諡成子輯嗣畯賈充平陽襄陵人少襲父逵陽里亭侯以預弒高貴鄉公封安陽鄉侯武帝受禪封魯郡公薨諡武謐韓壽子以外孫襲爵為趙王倫所殺模充從子以預誅楊駿功封平陽鄉侯薨諡成子遊嗣郭彰太原人以賈后從舅封冠軍縣侯薨諡烈楊駿𢎞農華陰人以后父封臨晉侯惠帝即位秉政為賈后所殺魏舒任城樊人武帝即位為司徒封劇陽子薨諡康融庶孫嗣晃李熹上黨銅鞮人武帝即位以佐命封祁侯薨諡成子贊嗣劉實平原高唐人以參文帝相國事封循陽子元康初進爵為侯薨諡元子躋嗣高光陳留圉城人以討成都王頴功封延陵縣公薨王渾太原晉陽人襲父昶爵京陵侯以平吳功進爵為公薨諡元子濟嗣王濬𢎞農湖人以平吳功封襄陽縣侯薨諡武子矩嗣唐彬魯國鄒人與王濬共伐吳以功封上庸縣侯薨諡襄山濤河內懷人武帝即位以佐命功封新沓伯薨諡康子該嗣王戎渾子以預平吳功進安豐縣侯惠帝即位為三公薨諡元愔子以從弟子嗣鄭袤滎陽開封人魏常道鄉公立以定䇿功封安成鄉侯泰始間薨諡元子默嗣李允遼東襄平人文帝時為廣陸伯泰始初進爵為侯薨諡成志盧欽范陽涿人少襲父育爵亭侯武帝即位為大梁侯薨諡元子浮嗣石鑒樂陵厭次人武帝即位封棠陽子後拜司空封昌安縣侯薨諡元子陋嗣溫羡太原祁人以從駕討成都王頴功封大陵縣公薨諡元武陵沛國𢎞邑人景帝時為大將軍引為從事中郎後封亭侯武帝即位封薛縣侯薨諡定子鋪嗣任愷樂安博昌人尚魏明帝女晉國建封昌國縣侯薨諡元子罕嗣郭奕太原陽曲人武帝即位以東宫官封平陵男卒諡穆侯史光東萊掖人泰始初以侍中持節循風俗還稱旨封臨海侯薨子元嗣施何攀蜀郡郫人以預誅楊駿功封西城侯薨子璋嗣傅元北地泥陽人魏時以典農校尉稱職封鶉觚男武帝即位進爵為子薨後追封清泉侯子咸嗣敷祗咸從父弟以預誅楊駿功封靈川縣公薨閻纘巴西安漢人為西戎校尉有功封平樂鄉侯謝鯤陳國陽夏人為王敦長史以討杜韜功封咸亭侯薨子尚嗣康肅靈祐曹志譙人魏陳思王植之子少襲封武帝受禪降為鄄城縣公薨諡定華談廣陵人以討石冰黨功封都亭侯薨諡胡子茂嗣羅憲襄陽人為蜀巴東太守蜀亡以郡降後卒追封西鄂侯諡烈滕修南陽西鄂人為吳廣州牧王師伐吳修帥衆赴難至巴邱而孫皓降乃與諸郡送印綬封武當侯卒諡聲子並嗣聲以討蘇峻功更封夏陽侯馬隆東平平陸人以討羌平涼州功封奉高侯子咸嗣胡奮安定臨涇人以從宣帝征伐功封夏陽子薨諡壯陶璜丹陽秣陵人嘗為吳交州刺史吳亡以地降封宛陵侯趙誘淮南人以討華軼杜韜等功封平阿縣侯後戰沒諡敬周玘義興陽羡人以討陳敏等定江南功封烏程侯薨諡忠烈子協嗣札玘弟以討錢璯功封東遷縣侯後為王敦所殺懋札兄子為晉陵太守封清流侯贊懋弟大將軍從事中郎封武康縣侯縉贊弟太子文學封都鄉侯周訪汝南安成人以討賊功封尋陽縣侯薨諡壯子撫嗣以功進封建城縣公楚瓊虓孟觀渤海東光人以受賈后旨殺楊駿封上谷郡公後坐趙王倫黨誅張輔南陽西鄂人為吏以擊搏豪強政迹封宜昌亭侯後為帳下督富整所殺索靖燉煌人以討孫秀及破羌等功封安樂亭侯薨諡莊子聿嗣綝靖子愍帝時輔政以禦劉曜功封上洛郡公後與帝俱降劉聰為聰所殺賈匹武威人愍帝時為雍州刺史封酒泉公邀擊劉曜大破之後為羣胡所襲敗死周浚汝南安城人以平吳功封成武侯薨子顗嗣為王敦所殺閔琳周馥浚從父弟以討陳敏功封永寧伯茍晞河內山陽人以破汲桑石勒等功封東平郡侯進爵為公後為石勒所殺劉喬南陽人以預誅賈謐功封安衆男劉琨中山魏昌人以斬石超迎大駕於長安封廣武侯後為假匹磾所殺諡愍子羣嗣劉輿琨兄為東海王越范陽王虓等所用有功封定襄侯薨諡貞子演嗣邵續魏郡安陽人以敗石勒功封祝阿子後沒於石虎為所殺李矩平陽人以伐氐齊萬年功封東明亭侯段匹磾東部鮮卑人父務勿塵遣兵助東海王越有功封遼西公匹磾襲父爵領幽州刺史為石虎所攻敗沒於虎被害右西晉列侯姓名之見於史者按晉始分五等則侯之秩已不一又永熙初楊駿輔政普進封爵以求媚於衆議者以為優於泰始革命之初及諸將平吳之功其後趙王倫既誅賈后遂竊帝位在職者皆封侯厮役亦加以爵位金銀冶鑄不給於印故有白版之侯君子恥之則其所濫及者蓋不可勝道矣王導琅琊臨沂人少襲祖覽爵即邱子元帝渡江導輔政歷受遺輔明成二帝為相積封至始興郡公薨諡文獻世子悅早卒混悅弟子嗣嘏恢恬導次子襲即邱子爵協導子襲武岡侯爵謐嗣協爵劉宏沛國相人以平張昌等功封新城郡公薨諡元陶侃番陽人初以軍功封東鄉侯後以平蘇峻積功封長沙郡公薨諡桓子夏嗣宏綽之延壽宋受禪降為吳昌侯溫嶠太原祁人以討王敦功封建寧縣公及平蘇峻進始安郡公薨諡忠武子放之嗣式之以弟嗣郗鑒高平金鄉人以預討王敦功封高平侯後更封南昌縣公薨諡文成子愔嗣超僧施曇鑒子少賜爵東安縣伯恢曇子襲封循恢子顧榮吳國吳人以討葛旟功封嘉興伯元帝鎮江東以為軍司卒帝即位追封為公諡元子毗嗣紀瞻丹陽秣陵人以討陳敏功封臨湘縣侯薨諡穆子景早卒友景子嗣賀循會稽山隂人以討華軼功封鄉侯薨諡穆薛兼丹陽人元帝即位以佐命功封安陽鄉侯劉隗彭城人元帝即位以佐命功封都鄉侯後以王敦反奔石勒戴淵廣陵人以討賊功封秣陵侯王敦反淵拒之兵敗為敦所殺諡簡應詹汝南南頓人以討賊功封觀陽縣侯薨諡烈子元嗣甘卓丹陽人以討周馥杜韜等功封于湖侯王敦反卓討之敦襲殺卓諡敬卞壼濟陰寃句人父粹齊王冏輔政時為中書令封成陽公為長沙王乂所殺壼襲父爵成帝時輔政蘇峻反壼力戰死之諡忠貞子眕與壼同死誕聄子嗣敦壼從父弟以討杜韜功封安陵亭侯薨諡敬子滔嗣劉超琅琊臨沂人元帝即位以佐命功封原鄉亭侯後為蘇峻所殺諡忠子訥嗣孫惠吳國富陽人為東海王越參軍以迎大駕功封臨湘縣公庾亮明穆皇后兄以討華軼功封都亭侯討錢鳳沈充平之進封永昌縣公薨諡文康子羲嗣凖翼亮弟以討蘇峻功封廣饒男冰亮弟以討蘇峻功封吳縣侯薨諡忠成桓彜譙國龍亢人以討王敦功封萬寧縣男蘇峻之反為賊所害諡簡子雲嗣序沖彜子以從兄溫破姚萇有功封豐城公薨諡宣子允嗣王承太原晉陽人永寧初以豫迎大駕封藍田縣侯薨子述嗣坦之愷荀嵩潁川臨潁人以預平王敦功封平樂伯薨諡敬子蕤嗣籍范汪雍州刺史晷孫以預討蘇峻功封都鄉侯薨諡穆子康嗣王舒丞相導之從弟以破蘇峻功封彭澤縣侯薨諡穆子崑之嗣陋之宋受禪國除允之舒子以討蘇峻功封番禺縣侯薨諡忠子晞之嗣肇之王廙導從弟以討杜韜等功封武陵縣侯薨諡康子頤之嗣虞潭會稽餘姚人以征討張昌等功賜爵都亭侯後進至武昌縣侯薨諡孝烈子仡嗣嘯父顧衆吳郡吳人以討蘇峻功封鄱陽縣伯薨諡靖子昌嗣張闓丹陽人以討蘇峻功封宜陽伯子混嗣陸曄吳郡吳人以平錢鳳功封江陵伯薨諡穆子諶嗣玩曄弟以討蘇峻功封興平伯薨諡康子始嗣何充廬江灊人以討蘇峻功封都鄉侯薨諡文弟子放嗣松褚翜太傅裒從父兄以拒蘇峻封長平縣伯薨諡穆子希嗣蔡謨陳留考城人以平蘇峻功封濟陽男薨諡文穆諸葛恢琅琊陽都人以討周馥封博陵亭侯討王含功封建安伯薨諡敬子甝嗣孔愈會稽山陰人以討華軼功封餘不亭侯薨諡貞子誾嗣靜沉愈從子蘇峻反以扈從功封永安伯薨諡簡子話嗣陶回丹陽人以破韓晃功封康樂伯薨諡威子汪嗣謝安陳國陽夏人孝武時輔政以禦苻堅功封建昌縣公薨諡文靖更封廬陵郡公子瑶嗣該琰安子以破苻堅功封望蔡公後為賊所害諡忠肅子混嗣峻琰子封建昌縣侯子密嗣元安兄子以征伐功封東興縣侯後以破苻堅功進康樂縣公薨諡獻武子瑍嗣靈運石安弟以破苻堅時為元帥封南康郡公薨諡襄子注嗣明慧皓王遜魏興人以征蠻功封褎中縣公薨諡壯子澄嗣羊鑒泰山人以預誅蘇峻功封豐城縣侯劉允東萊掖人以拒蘇峻功封豐城子後為郭默所殺子赤松嗣桓宣譙國銍人以前後戰功封竟陵縣男伊宣族子以破苻堅功封永修縣侯薨諡烈子肅之嗣陵毛寶滎陽陽武人以破蘇峻功封州陵縣侯後守邾城戰沒子穆之嗣即虎生以入洛功徙封建安侯珍璩虎生子以討桓元功封歸鄉公子宏之嗣劉遐廣平易陽人以討王含功封泉陵公薨子紹嗣舉遵之伯齡鄧嶽陳郡人以討郭默功封宜城縣伯薨子遐嗣朱序義陽人以討司馬勳功封襄平子後陷苻堅淮淝捷歸國虞預徵士喜之弟從平王含封平康縣侯徐廣東莞姑幕人義熙初封樂成侯袁瓌陳郡陽夏人以討蘇峻功封長合鄉侯薨諡恭子喬嗣方平嵩耽瓌弟以平蘇峻功封秭歸男劉牢之彭城人以破苻堅功封武岡縣男後謀拒桓元不克死元敗子敬宣嗣光祖劉毅彭城沛人以誅桓元反正功封南平郡公後為劉裕所殺諸葛長民琅琊陽都人以誅桓元反正功封新淦縣公後為劉裕所殺何無忌東海郯人以討桓元反正功封安成郡公後討盧循戰死諡忠肅子雍嗣檀憑之高平人討桓元戰殁追封曲阿縣公魏詠之任城人以贊討桓元功封江陵縣公嵇紹康之子賈謐誅以不阿比凶族封弋陽子蕩陰之戰死之贈進爵為侯翰從孫襲封曠魯芝扶風郿人以討諸葛誕功封武進亭侯後進爵漦城鄉侯薨諡貞胡威淮南壽春人武帝時為刺史以功封平春侯薨諡烈子奕嗣羊琇景獻皇后之從父弟封甘露亭侯薨諡威王虔文明皇后之弟封安壽亭侯子士文嗣愷虔弟封山東縣侯楊文宗武元皇后父封蓩亭侯諡穆羊元之惠皇后父封興晉侯虞豫元敬皇后父早卒追封平山縣侯子允嗣洪禇裒康獻皇后父以平蘇峻功封都卿亭侯薨諡元穆子歆嗣何凖穆章皇后父封晉興縣侯王藴孝定武皇后父封建昌縣侯王敦司徒導之從父兄以討華軼等功封漢安侯後舉兵反破石頭進爵武昌郡公病死討平跽而斬之桓溫彜子初襲爵萬寧男平蜀功封臨賀郡公北伐功封南郡公子元嗣僭位誅祖約逖之弟以討王敦功封五等侯後謀反兵敗奔石勒為勒所誅蘇峻長廣掖人以破沈充功封邵陵公後舉兵反伏誅右東晉列侯姓名之見於史者文獻通考卷二百七十一
