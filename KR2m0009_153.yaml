body:
  text: 文獻通考卷一百五十三鄱陽馬端臨貴與著兵考五兵制神宗即位之初總治平之兵一百十六萬二千而禁軍步騎六十六萬三千帝患兵冗不繼始議銷併乃親制選練之法靡不周悉其立軍之制非新經科簡即團併有餘或特創名或因舊額增損指揮之數無常焉熙寧元年詔諸路監司察州兵揀不如法者按之不任禁軍者降廂軍不任廂軍者免為民先是陳升之建議衛兵四十以上稍不中程者量減請衣糧徙之淮南呂公弼上言以為既使之去本土又減其常廩於人情未安且事體甚大難遽行也司馬光亦言其不便曰在京禁軍及其家屬率皆生長京師親姻聨布安居樂業衣食縣官日久年四十五未為衰老尚任征役一旦别無罪負削廩逺徙是橫遭降配也沙汰既多人情惶惑大致愁怨雖國家既承平紀綱素張此屬恟恟亦無能為然詔書一下萬一有道路流言驚動百姓朝廷欲務省事復為收還則頓失威重向後不復可號令驕兵若遂推行則衆怨難犯梁室分魏博之兵致張彥之亂此事之可鑑者也且國家竭天下之財養長征兵士本欲備禦邉陲今淮南非用武之地而多屯禁軍坐費衣食是養無用之兵置諸無用之地也又使邉陲常無事則已異日或小有警急主兵之臣必爭求益兵京師之兵既少必須使者四出大加召募廣為揀選將數倍多於今日所退之兵舊兵尚請衣糧而新兵更添衣糧是棄已教閲經戰之兵而收市井甽畝之人本欲減冗而冗兵更多本欲省大費而大費更廣竊恐非計之得也臣愚伏願朝廷且依舊法每歲揀禁軍有不任征戰者減充小分小分復不任執役者放令聽其自便在京居止但勿使老病者尚占兵籍虛費衣糧人情既安於所習皆無怨嗟國家又得其力用不為虛設冗兵既去大費自省兹事繫國家安危不敢不言右正言李常亦言其不便從之七月手詔揀諸路半分年四十五以下勝甲者升為大分五十以上願為民者聽之舊制兵至六十一始免猶不即許也至是免為民者甚衆冗兵由是大省二年詔併廢諸軍營陜西馬步軍營三百二十七併為二百七十馬軍額以三百人步軍以四百人其後總兵之撥併者馬步軍五百四十五營併為三百五十五而京師之兵類皆撥併畿甸諸路及廂軍皆會總畸零各定以常額凡併營先為繕新其居室給遷徙費軍校溢員者以補他軍之闕或隨所併兵入逐指揮依職髙下同領先時軍營皆有額皇祐格馬軍滿四百步軍滿五百人為一營承平日久兵制寖弛額存而兵闕馬一營或止數十騎兵一營或不滿二百既不成部分而將校猥多賜豫廩給十倍士卒遞遷如額不敢少損帝患之乃詔併廢諸營嘗謂輔臣曰天下財用朝廷稍加意則所省不可勝計乃者銷併軍營計減軍校十將以下三千餘人除二節賜豫及傔從廩給外計一歲所省為錢四十五萬緡米四十萬石紬絹二十萬匹布三萬端馬藁二百萬庶事若此邦財可勝用哉初帝議併營大臣皆以為兵驕已久遽併之必召亂帝不聽獨王安石贊帝力行之自熙寧至元豐歲有廢併甚衆三年樞密院文彥博等上在京開封府界及京東等路禁軍數帝亦自內出治平中兵數參照顧問久之遂詔殿前虎翼除水軍一指揮外六十指揮各以五百人為額總三萬四百人在京增廣勇五指揮共二千人開封府府界定六萬二千人京東五萬一千二百人兩浙四千人江東五千二百人江西六千八百人湖南八千三百人湖北萬二千人福建四千五百人廣南東西千二百人川陜三路四千四百人為額在京其餘指揮并河東陜西京西淮南路前已撥併其河北以人數尚多須後命是月詔河北禁軍以七萬為額初河北兵籍比諸路為多其沿邉者悉仰給三司言事者屢請損其數因撥併畸零立額為七萬以京東土地饒沃租賦有餘於是增置武衛軍嚴其訓練之法不數年皆為精兵至是分隸河北四路後又以三千人戍揚杭州江軍府以議言東南兵募寡而盜賊多故也其後又團給諸軍置將分領謂之將云八月帝手詔倉吏給軍糧例有虧減出軍之家侵牟益甚豈朕所以愛養兵卒之意自今給糧毋損其數三司具為令於是嚴河倉乞取減刻罪賞而兵糧每石及十斗士卒歡呼十二月詔行保甲法畿內之民十家為一保選主户有幹力者一人為保長五十家為一大保選一人為大保長十大保為一都保選為衆所服者為都保正又以人為之副應主客户兩丁以上選一人為保丁附保兩丁以上有餘力丁壯勇者亦附之內家資最厚材力過人者亦充保丁兵器非禁者聽習每一大保夜輪五人警盜凡告捕所獲以賞格從事同保犯強盜殺人放火強姦掠人傳習妖教造畜蠱毒知而不告依律伍保法餘事干已又非敇律所聽糾皆毋得告雖知情亦勿坐若於法類保合坐罪者乃坐之其居停強盜三人經三日保鄰雖不知情科失覺罪逃移死絶同保不及五家併地保有自外入保者收為同保户數足則附之俟及十家則别為保置牌以書其户數姓名遣官先行畿甸既就緒遂推之五路以遍於天下王安石欲變募兵而行保甲帝從其議帝嘗言節財用安石對以減兵最急帝曰比慶厯時數已甚減矣因舉河北陜西兵數慮募兵太少又訓練不精安石曰精訓練募兵而鼓舞三路之民習兵則兵可省臣屢言河北舊為武人割據內抗朝廷外敵四鄰亦有禦奚契丹者兵儲不外求而足今河北户口蕃息又舉天下財物奉之常苦不足以當一靣之嵗幣其施設乃不如武人割據時此無他惟能專用其民故也臣以為倘不能理兵稍復古制則中國無富強之理陛下若欲去數百年募兵之弊則宜果斷立法制令本末備具不然無補也帝曰制而用之在法當預立條制以漸推行可也安石又曰陛下以為柴世宗能辟土疆服天下者何也帝曰世宗非能果斷乎安石曰是也世宗能使兵威復振非但高平之戰能斬樊愛能等而已天下盜賊殺人亡命者皆募以為禁軍史臣以為當時孤子寡婦見仇讐而不敢校後悔之莫有貸者臣以為史官不足以知世宗世宗非悔也方中國兵弱以為非募此輩不足以勝諸僭偽之國及所募已足則法不可久弛故不復貸其死此乃定計數於前必事功於後豈以為悔也世宗募盜賊殺人亡命者以為禁衛不以為虞誠有帝王威略故也今當平世發義勇入衛有爵賞祿為勸利而乃更憂其為變豈篤論哉大抵世人習見募兵而不見民兵之事故一聞此議則不能無駭然募之法不變乃實可憂也彥博等又以為土兵難使千里出戍安石曰前代征琉球討黨項豈非府兵乎帝曰募兵專於戰守故或可恃至民兵則兵農其業相半可恃以戰守乎安石曰唐以前未有黥兵然亦可以戰守臣以為募兵與民兵無異顧所用將帥何如爾一日帝批陳留縣見行保甲每十人一小保中三人或五人須要弓箭縣吏督責無者有刑又每保令置鼓人置一鼓費錢不少至有質衣而買弓箭者可見貧乏艱於出備可速指揮禁戢安石曰民貧冝有之抑民使置弓箭則法所弗許也往者冬閲及巡檢番上唯就用官弓矢而已不知百姓何故至於質衣也然自生民以來兵農為一男子生則以桑弧蓬矢射四方明弓矢者男子之所有事蓋耒耜以養生弓矢以免死皆凡民所宜自具自古未有造耒耜弓矢以給百姓者也然則雖使百姓置弓矢未為過第陛下憂恤百姓甚至故今立法一聽民便爾且府界素多羣盜攻劫掠一嵗之間至二百夥逐夥皆有賞錢備賞之人即今保丁也方其備賞之時豈無賣易衣服以納官賞者然人皆以為賞錢宜出於百姓夫出錢之多不足以止盜而保甲之能止盜其效已見於今日則雖令民出少錢以置器械未有損也帝曰賞錢人所習慣則安之如自然不習慣則不能無怨如河決壞民産民不怨決河以壞民産則怨矣四年始詔畿內保丁肄習武事嵗農隙所隸官期日於要便村都試騎步射並以射中親疏逺近為等騎射校其用馬有餘藝而願試者聽之第一等保明以聞引見於庭天子親閲試之命以官第二等免當年春夫一月馬藁四十役錢二千本户無可免或所免不及聽移他户而受其直第三等四等視此有差即藝未精願來閲試者聽五年知制誥判司農寺曾布言近日保户數以狀詣縣願分番隸巡檢司習武伎提點司以聞朝廷及司農寺而未敢輒議於是詔主户保丁願上番於巡檢司者十日一更疾故者次番代之月給口糧薪菜錢分番巡警又詔尉司上番保丁如巡檢司之法始行保甲初以捕盜賊相保任而未肄以武事也至四年始詔畿內保丁肄習武事定其賞罰然猶番上也至五年因曽布之説始令分番隸巡檢司尉司云樞密院言在京繫役兵士舊額一萬八千二百五十九人見闕六千三百九十二人若招揀得足即不須外路勾抽以免不習水土凍餒道塗之患欲於在京及府界京東西河北招少壯兵止供在京工役不許臣僚差占不過期年可使充足却對減在外招募之數樁管所減糧賜上京應省司之用從之詔禁軍俸錢至五百而亡滿七日者斬舊制滿三日者死初執政議更法請滿十日帝令以七日六年詔開封府畿以都保置木契左留司農寺右付其縣凡追胥閲試肄習則出契是月又詔行於永興秦鳳河北東西河東五路唯每上番餘路止相保任毋習武藝內荆湖川廣沿邊者可肄武事令監司度之後惟全部土丁雍欽洞丁廣東槍手改為保甲者則肄焉十二月乃罷河北西路強壯沿邊弓箭社常繫籍番上巡守者初開封府畿五路保甲及五萬人二年一解發詣京師閲試命官開封府畿十人五路七人八年詔開封府畿及一萬五千人各許解發一人初保甲隸司農八年改隸兵部增同判一主薄二幹當公事十分按諸州其政令則聽於樞密院七年始詔總開封府畿京東西河北路兵分置將副自河北始自第一將以下共十七將在河北西路自第十八將以下共七將在府畿自第二十五將以下共九將自第三十四將以下共四將在京西合為三十七而鄜延環慶涇原秦鳳熙河又自列將其在鄜延者九在涇原者十一在環慶者八在秦鳳者五在熙河者九合為四十二八年又詔增置馬軍十三指揮分京東西兩路又募教閲忠果十指揮在京西額各五百人其六在唐鄧其四在蔡汝元豐二年又增置土兵勇捷兩指揮於京西額各四百人唐州方城為右第十一汝州襄城為左第十二凡馬軍十三指揮忠果及土軍共十二指揮四年詔團結東南路諸軍亦如畿京法共十三將自淮南始東路為第一西路為第二兩浙西路為第三東路為第四江南東路為第五西路為第六荆湖北路為第七南路潭州為第八全邵永州應援廣西為第九福建路為第十廣南東路為第十一西路桂州為第十二雍州為第十三總天下為九十二將而鄜延五路又有漢蕃弓箭手亦各附諸將而統隸焉凡諸路將各置副一人東南兵三十人以下唯置單將凡將副皆選內殿崇班以上嘗厯戰陳親民者充之亦詔監司奏舉又各以所將兵多寡置部將隊將押隊使臣各有差又置訓練官次諸將佐春秋都試擇武力士凡千人選十人以名聞而待旨解發其願留鄉里者勿強遣此將兵之法也五代承唐藩鎮之弊兵驕而將專務自封殖橫猾難制祖宗初定天下懲創其弊分遣禁旅戍守邊地率一二年而更欲使往來道路足以習勞苦南北番戍足以均勞佚故將不得專其兵而兵亦不至驕惰及承平既久方外郡國合為一家無復如曩時之難制而禁旅更戍尚循其舊新故相仍交錯旁午相屬於道議者以為更番迭戍無益於事徒使兵不知將將不知兵緩急恐不可恃神宗即位慨然更制部分諸路將兵總隸禁旅使兵知其將將練其士卒平居訓厲搜擇無復出戍外有事而後遣焉謂之將兵元豐二年以兖鄆齊濟濵棣德博民飢募為兵以補開封府界京東西將兵之闕又詔在京俸錢七百以下選募馬步軍萬五千人開封府界及本路共選募義兵保甲四萬人如涇原五千人不足於秦鳳路選募四年詔五路義勇悉改為保甲上曰河東修義勇強壯法又令團集保甲如何安石對曰義勇須隱括丁數若因團集保甲即一動而兩業就今既遣官隱括義勇又别遣官團結保甲即一事分為兩事恐民不能無擾上曰保甲不可代正軍上番不安石曰俟其習熟然後上番然東兵技藝亦弗能優於義勇保甲臣觀廣勇虎翼兵固然今為募兵者大抵皆偷惰頑猾不能自振之人為農者皆朴力一心聽令之人以此校之則緩急莫如民兵可用馮京曰太祖征伐天下豈必用農兵安石曰太祖時接五代百姓困極公侯多自軍中起故豪傑以從軍為利今百姓安業樂生而軍中不復有如嚮時拔起為公侯者即豪傑不復在軍而應募者大抵皆偷惰不能自振之人而已帝曰兵之強弱在人五代兵弱至世宗而強安石曰世宗所收亦皆天下強梁之人此其所以強也帝卒從安石議帝曰保甲義勇有芻糧之費當預為之計安石曰當減募兵取其費供之所供保甲之費才養兵十之一二帝曰畿內募兵之數已減於舊強本之勢未可悉減安石曰既有保甲代其役即不須募兵今京師募兵逃死停放一季乃數千但勿招填即為可減然今廂軍既少禁兵亦不多臣願早訓練民兵民兵成則募兵當減矣是年府界河北河東陜西路會校保甲都保凡三千三百六十六正長壯丁凡六十九萬一千九百四十五嵗省舊費緡錢一百六十六萬一千四百八十三嵗費緡錢三十一萬三千一百六十六而團教之賞為錢一百萬緡有竒不與焉凡集教圑教成嵗遣則謂之提舉按閲率以近臣挾內侍往賞錢給按格令從事諸路皆以番次藝成者先按閲率五六嵗一遍獨河東以金帛不足以賞乃至十一嵗上詔晉人勇悍俗尚武事又介居二敵之間講勸宜不可後其加賜緡錢十五萬焉其繫籍義勇保甲及民兵熙寧九年之數合七百一十八萬二千二十八人八年四月哲宗嗣位宣仁太后臨朝知陳州司馬光上疏乞罷保甲光疏曰兵出民間雖云古法然右者八百家才出甲士三人步卒七十二人間民甚多三時務農一時講武不妨稼穡自兩司馬以上皆選賢士大夫為之無侵漁之患故卒乘輯睦動則有功今籍鄉村人民二丁取一以為保甲授以弓弩教之戰陳是農民半為兵也三四年來又令河北河東陜西置都教場無問四時每五日一教特置此使者比監司專切提舉州縣不得干預每一丁教閲一丁供送雖云五日而保正長以泥堋除草為名日聚教場得賂則縱不則留之是三路耕耘收穫稼穡之業幾盡廢也自唐開元以來民兵法壞戍守戰功盡募長征兵士民間何嘗習兵夫兵者凶器聖人不得已而用之國家承平百有餘年四夷順服戴白之老不識兵革一旦畎畝之人忽皆戎服執兵奔驅滿野耆舊歎息以為不祥事既草創調發無法比户騷然不遺一家又巡檢指使按行鄉村往來如織保正保長依倚弄權坐索供給多責賂遺小不副意妄加鞭撻蠶食行伍不知紀極中下之民罄家所有侵肌削骨無以供億愁苦困弊靡所投訴流移四方襁負盈路又朝廷時遣使者遍行按閲所至犒設賞賚麋費金帛以巨萬計此皆鞭撻平民銖兩丈尺而斂之一旦用之如糞土而鄉村之民但勞苦役不感恩澤於農民之勞既如彼國家之費又如此終何所用哉若使之捕盜賊衛鄉里則何必如此之多若使之戍邊境征戎狄戎狄之民以騎射為業以攻戰為俗自幼及長更無他務中國之民生長太平服田力穡雖復授以兵械教之擊刺在教場之中坐作進退有似嚴整必若使之與戎狄相遇填然鼓之鳴鏑始交其奔北潰敗可以前料決無疑也是猶驅羣羊而戰豺狼也當是時豈不誤國事乎又悉罷三路巡檢下兵士及諸縣弓手皆以保甲令主簿兼縣尉但主城市以裏其鄉村盜賊悉委巡檢兼掌巡按保甲教閲朝夕奔走猶恐不辦何暇逐捕盜賊哉及保甲中往往有自為盜者亦有乘保馬行劫者然則設保甲保馬本欲除盜又更資盜也自教閲保甲以來河東陜西京西盜賊已多至敢白晝公行入縣鎮殺官吏官軍追討經厯嵗月終不能制况三路未至大飢而盜賊已昌熾如此萬一遇數千里之蝗旱而失業飢寒武藝成就之人所在蜂起以應之其為國家之患可勝言哉此非小事不可以忽夫奪其衣食使無以為生是驅民為盜也使比屋習戰勸以官賞是教民為盜又撤去捕盜之人是縱民為盜也謀國如此果為利乎害乎且嚮者干進之士説先帝以征伐四夷開邊拓土之䇿故立保甲戶馬保馬等法近者登極赦書節文云應沿邊州軍仰逐處長吏并巡檢使臣鈐轄兵士及邊上人户不得侵擾外界務要靜守疆場勿令騷擾此蓋聖意欲惠綏殊方休息中國華夷之人孰不歸戴然則保甲户馬復何所用哉今雖罷户馬寬保馬而保甲猶存者蓋未有以其利害之詳奏聞者也臣愚以為宜悉罷保甲使歸農召提舉官還朝量逐縣户口每五十户置弓手一人略依沿邊弓箭手法許蔭本户田二頃悉免其稅役除出賊地分嚴加科罰及令出賞錢外其賊發地分更不立三限科校但令捕賊給賞若獲賊數多及能獲強惡賊人者各隨功大小遷補職級或補班行務在優假弓手使人勸募本縣鄉村户有勇力武藝者投充計即保甲中有勇力武藝者必多願應募者一人闕額有二人以上爭投者即委本縣令尉選武藝高強者充武藝衰退者許他人指名與之比較若武藝勝於舊者即令充替其被替者更不得蔭田如此則不必教閲武藝自然精熟一縣之中其壯勇者既為弓手其羸弱者雖使為盜亦不能為患仍委本州及提點刑獄常按察令佐有取舍不公者嚴行典憲若召募不足即且於鄉村户上依舊法權差候有投名者即令充替其餘巡檢兵士縣尉弓手耆長壯丁逐捕盜賊並乞依祖宗舊法五月以司馬光為門下侍郎光欲申前説樞密院先進呈乞罷圑教光再奏尋蔡確執不行監察御史王巖叟等極言之十月詔提舉府界三路保甲官並罷令逐路提刑及府界提點司兼領所有保甲止冬教三月又詔逐縣監教官並罷委令佐監教巖叟言臣初以保甲之法行之纍年朝廷固已知人情之所共苦而前日下詔蠲疾病汰小弱釋第五等之田不及二十畝者省一月之六教而為三日之併教甚大惠也然其司常存其患終在朝廷知教民以為兵而不知其教之太苛而民不能堪知别為一司以總之而不知擾之太煩而民以生怨教之以為用也而使之至於怨則恐一日用之有不如吾意者矣不可不思也民之言曰教法之難不足以為苦也而羈縻之虐有甚焉羈縻不足以為苦也而鞭笞之酷有甚焉鞭笞不足以為苦也而誅求之無已有甚焉方耕方耘而罷方幹而去此羈縻之所以為苦也其教也保長得笞之保正又笞之巡檢之指使與巡檢者又交撻之提舉司之指揮與提司之幹當公事者又互鞭之提舉之官長又鞭之一有逃避縣令又鞭之人無聊生每相與言曰恨不死爾此鞭笞之所以為甚苦也創袍市巾買弓修箭添弦換包指治鞍轡蓋涼棚畫象法造隊牌緝架僦椅卓團典紙墨看聽人雇直均菜緍納秸粒之類其名百出不可勝數故其父老之諺曰兒曹空手不可以入教場非虛語也都副兩保正大小兩保長平居於家婚姻喪葬之問遺秋成憂熟絲麻榖麥之邀求遇於城市一飲一食之責望此迫於勢而不敢不致者也一不如意則以藝不應法為名而捶辱之無所不至又所謂巡檢者指使多由此徒以出貪而冒法不顧後禍有踰於保正保長者此誅求之所以為甚苦也又有逐養子出贅壻再嫁其母而兄弟析居以求免者有毒其目斷其指炙烙其肌膚以自致於殘廢而求免者有盡室以逃而不歸者有委老弱於家而保丁自逃者保丁者逃則法當督其家出賞錢十千以捕之使其有所出當未至於逃至於逃則困窮可知而督取十千何可以得故縣縣常有數十百家老弱嗟咨於道路哀訴於公庭如臣之愚且知不忍使陛下仁聖知之當如何也又保丁之外平户之家凡有一馬皆令借供逐場教騎終日馳驟往往至於肌羸殘壞而就斃誰復敢言或其主家偶因出處一誤借供遂有追呼笞責之苦又或其家官逋督迫不得已而易之則有抑令還取之苦故人人以有馬為禍此皆提舉司官吏倚法以生事重為百姓之擾也臣竊惟古者未嘗不教民以戰也而不聞其有此何則因人之情而為之法耳夫緣情以推法則愈久而愈行倚威以行令則愈嚴而愈悖此自然之理也獸窮則搏人窮則詐自古及今未有窮其下而能無危者也臣觀保甲一司上下官吏無毫髮愛百姓之意故百姓視其官司不啻虎狼積憤銜怨之人人所同比者保丁執指使逐巡檢攻提舉司幹當官大獄相繼今猶未已雖民之愚顧豈忘父母妻子之愛而喜為犯上之惡以取禍哉蓋激之至於此極爾臣以為激而益深安知其發有不甚於此者情狀如此不可不先事而處以保大體為安靜計夫三時務農一時講武先王之通制也臣愚以為一月之間併教三日不若一嵗之終併教一月農事既畢無他用心人自安於講武而無憾遂可罷提舉司廢巡教官一以隸州縣而俾逐路安撫司總之每俟冬教則安撫司旋擇教官分詣諸邑與令佐同教於地下一邑分兩番當一月起教則與正長論階級罷教則與正長不相誰何而百姓獲優遊以治生無終年遁逃之苦無侵漁苛虐之患無爭陵犯上之惡矣且武事不廢威聲亦全豈不易而有功哉又乞罷三路提舉保甲錢糧司又乞罷提舉教閲司又乞罷每嵗分保甲為兩番於十一十二兩月上教不必分作四番且不必自京師遣官視教只乞令安撫司差那使臣為便並從之元祐元年殿中侍御史呂陶言伏見保甲之法雖已改更猶有二弊未便於民其一為罷去二十畝以下免教指揮却令五等户有三丁者皆赴冬教一月緣民之貧富不係丁之多少而教與不教則有幸與不幸今田有百畝家有二丁則免教是謂之幸田有十畝家有三丁則赴教是謂之不幸此貧富力役大為不均於是詔府界三路保甲人户五等已下地土不及二十畝者雖三丁以上並免教按籍民為兵古法也雖唐府兵猶然今熙寧之保甲則無益而有害言其無益者則曰田畝之民不習戰鬬不可以代募兵言有害者則曰貪汚之吏並緣漁獵足以困百姓然民之未諳者可以教練而能而吏之為姦者則雖加之禁戢而不能止故元祐諸賢議更化瑟而首欲罷此者以其厲民也今觀呂陶之言以為民之貧富不係丁之多少而教與不教有幸與不幸遂令人户五等以下地土不及二十畝者雖三丁以上並免教然則豈貧者不堪為兵獨富者堪為兵乎蓋所取必五等以上與田及二十畝者非取其堪為兵也特以其稍有資力堪充汚吏之誅求耳蓋介甫所行刻核亟疾之意多慘怛忠利之意少故助役雖良法保甲雖古法而皆足以病民元祐之初苛刻小人用事中外未能盡去知保甲之當罷而第釋五等之田不及二十畝者是猶紾兄臂而諭以徐日攘雞而易以月法既不能盡革而又不能擯棄斥絶其奉法之人則姑少加末減裁量以殺其毒以紓久困之百姓可也以是為經武強兵之圗不亦悖乎尚書右僕射司馬光乞罷諸路將官乃詔陜西河東廣南將兵不出戍他路其餘河北差近裏一將更赴河東而諸路逐將與不隸將之兵並更互出戍稍省諸路鈐轄及都監員仍以將官兼都監職事卒不能盡罷將副光疏曰竊見國朝以來置總管鈐轄都監監押為將帥官凡州縣有兵馬者其長吏未嘗不兼同管轄蓋知州即一州之將知縣即一縣之將故也先帝欲征伐四夷患諸州兵官不精勤訓練士卒懈弛於是有建議者請分河北陜西河東京東京西等路諸軍若干人為一將别置將官使之專功訓練其逐州總管以下及知州知縣皆不得關預及其有差使量留羸弱下軍及剩員以充本州官白直及諸般差使其餘禁軍皆制在將官專事教閲臣愚以為職事修舉在於擇人不在設官茍得其人雖總管等皆能訓練士卒不得其人雖將官亦何所為况今之將官即向之為總管者也豈為總管等則不能舉職為將官乃能舉職乎此徒變易其名無益事實非惟無益兼復有害凡設官分職當上下相維如身之使臂臂之使指紀綱乃立今為州縣長吏及總管等官而於所部士卒有不相統攝不得差使殆如路人者至於倉庫守宿街市巡邏亦俱乏人雖於條許差將下兵士而州縣不能直差須牒將官將官往往占護不肯差撥萬一有非常之變州縣長吏何以號令其衆制禦姦宄哉又言竊見近年災傷盜賊頗多州郡全無武備長吏侍衛軍單寡禁旅盡屬將官多與州郡爭衡長吏勢力逺出其下萬一如李順王倫王均則之寇乘間竊發攻陷郡縣豈不為朝廷憂又祖宗以來諸軍少曾在營常分番出戍蓋欲使之勞筋骨知艱難輕去其家且習山川險阻也自置將以來茍非全將起發然後與將官偕行其餘常在本營飲食遊嬉養成驕惰嵗月滋久不可復用又每將下各有部隊將訓練官等一二十人而州又自有總管鈐轄都監監押設官重復虛費祿廩此天下知兵者皆知其非臣愚欲乞盡罷諸路將官其禁軍各委本州長吏與總管鈐轄都監等如未置將已前使州郡平居武備有餘然後緩急可責以守死八年知定州蘇軾上疏乞存恤河北弓箭社增修條約不報軾疏言臣竊見北敵久和河朔無事沿邊諸郡軍政少弛將驕卒惰緩急恐不可用武藝軍裝皆不逮陜西河東逺甚雖據即目邊防事勢三五年間必無警急然居安慮危有國之常備事不素講難以應猝今者河朔沿邊諸軍未嘗出征終年坐食理合富強臣近遣所辟幕官李之儀孫敏行親入諸營按視曲折審知禁軍大率貧窘妻子赤露飢寒十有六七屋舍大壞不庇風雨體問其故蓋是將校不肅斂掠乞取坐放債負習以成風將校既先違法不公則軍政無緣修舉所以軍人例皆飲博逾濫三事不止雖是禁軍不免寒餓既輕犯法動輒逃亡此豈久安之道臣自到任漸次申嚴軍法逃軍盜賊已覺衰少年嵗之間庶革此風然臣竊謂沿邊禁軍緩急終不可用何也驕惰既久膽力耗憊雖近戍短使輒與妻孥泣别被甲持兵行數十里即便喘汗臣若加嚴訓練畫夜勤習馳驟坐作使耐辛苦則此聲先馳北人疑畏或致生事臣觀祖宗以來沿邊要地屯聚重兵止以壯國威而消敵謀蓋所謂先聲後實形格勢禁之道耳若進取深入交鋒兩陳猶當雜用禁旅至於平日保境備禦小寇即須專用極邊土人此古今不易之論也鼂錯與漢文帝畫備邊策不過二事其一曰徙逺方以實空虛其二曰制邊縣以備敵寶元慶厯中趙元昊反屯兵四十餘萬招刺宣毅保捷二十五萬人皆不得其用卒無成功范仲淹劉滬种世衡等專務整輯番漢熟户弓箭手所以封殖其家砥礪其人者非一道藩籬既成賊來無所得故元昊服臣今河朔西路被邊州軍自澶淵講和以來百姓自相團結為弓箭社不論家業高下户出一人又自相推擇家資武藝衆所服者為社頭社副録事謂之頭月帶弓而鋤佩劔而樵出入山坂飲食長技與北人同私立賞罰嚴於官府分番巡邏鋪屋相望若透漏北人及本土強盜不獲其當番人皆有重罰遇其警急擊鼓集衆頃刻可致千人器甲鞍馬常若寇至蓋親戚墳墓所在人自為戰敵甚畏之先朝名臣帥定州者如韓琦龎籍皆加意拊循其人以為爪牙耳目之用而籍又增損其約束賞罰奏得仁宗皇帝聖旨見今具存昨於熙寧六年行保甲法凖當年十二月四日聖旨強壯弓箭社並行廢罷又至熙寧七年再凖正月十九日中書劄子聖旨應兩地供輸人户除元有弓箭社強壯并義勇之類並依舊存留外更不編排保甲看詳上件兩次聖旨除兩地供輸村分方許依舊置弓箭社其餘並合廢罷雖有上件指揮公私相承元不廢罷只是令弓箭社兩丁以上人户兼充保甲以至逐捕本界及化外盜賊並皆驅使弓箭社人户向前用命捉殺見今州縣全藉此等寅夜防托灼見弓箭社實為邊防要用其勢決不可廢但以兼充保甲之故召集追呼勞費失業今雖名目具存責其實用不逮往日臣竊謂陜西河東弓箭手官給良田以備甲馬今河朔沿邊弓箭社皆是人户祖業田産官無絲毫之給而捐軀捍邊器甲鞍馬與陜西河東無異苦樂相遼未盡其用近日霸州文安縣及真定府北寨皆有北敵驚劫人户捕盜官吏拱手相視無如之何可以驗禁軍弓手皆不得力向使州縣逐處皆有弓箭社人户致命盡力則北敵豈敢輕犯邊寨如入無人之境臣已戒飭本路將吏申嚴賞罰加意拊循其人輒復拾用龎籍舊奏約束稍加增損别立條目欲乞朝廷立法少賜優異明設賞罰以示懲勸今已密切會到本路極邊定保兩州安肅廣信順安三軍邊靣七縣一寨內管自來團結弓箭社五百八十八村六百五十一夥共計三萬一千四百一十一人若朝廷以為可行立法之後更敕將吏常加拊循使三萬餘人分番晝夜巡邏盜邊小寇來即搶獲不至狃􅏸以生戎心而事皆循舊無所改作敵不疑畏無由生事有利無害較然可見奏上不報是月再奏又不報右東坡所奏元不曾施行然疏中所言可以知當時北邊軍政之弛中天之禍有由來矣所言禁軍大率貧窘將校不肅斂掠乞取坐放債負習以成風則知當時雖所募長征之兵衣食仰給於縣官者猶不能不為將校所漁獵况籍民之有田畝者以為保甲貪官汚吏寧無誅求乎紹聖初樞密院建言往時軍士犯法詔許將官一靣決遣以故事無留滯自州縣官預軍事以來動多牽制不得自在今後欲仍舊法及諸軍除轉排補並隸將司州縣毋得輒有所預其非屯駐所在當俟將副巡歷決之餘委訓練官行焉詔從之至是州縣拱手聽其所為兵將愈驕無復可用矣紹聖二年御史中丞章惇奏乞教習保甲月分差官按試曾布言保甲固當教習然陜西河東連年進築城寨調發未已河北連被水災流民未復以此未可督責訓練熙寧中教保甲臣在司農正當此職事是時司農官親任其事督責檢察極精密縣令有抑令保甲置衣裝之類非理騷擾者亦皆衝替故人莫敢不奉法其後乃令上番至十一月蔡卞勸上復行畿內保甲教閲法帝屢以督曾布是日布進呈畿內保丁總二十六萬熙寧中教事藝者凡七萬因言此事固當講求然廢罷已十五年一旦復行與事初無異當以漸推行則人不至驚擾若便以元豐成法一切舉行當時保甲存者無幾以未教習之人便令上番及集教則人情洶洶未易安也熙寧中施行亦有漸容臣講求施行次退以語卞卞殊以為不快按王介甫嘗言終始言新法便者曾布也若保甲之事則其時布判司農寺條畫多出其建請然紹聖之時布獨不欲復行何也蓋其事繁擾奉行不得其人則徒足以困百姓而實無益於軍實彼章惇蔡卞之徒但欲假紹述之説以遂其私略不顧生民之休戚布在當時視羣小猶為彼善於此者歟徽宗崇寧四年樞密院言比者京畿保甲投八百七十一牒乞免教閲又二百三十餘牒遮樞密張康國馬首訴焉乃詔京畿三路保甲並於農隙時教閲其月教指揮勿行政和時諸路團成保甲六十一萬餘人十月尚書省言今所在逃軍聚集至以千數小則驚動鄉邑大則公為劫盜纍降指揮許其首身或令投換終未革絶神宗皇帝以將不知兵兵不知將故分兵隸將統兵官司凡兵之事無所不總則逃亡走死豈得不任其責今見行敕令未有將官與人員任責之法致兵將不加存恤勞役其身至於逃避而任職之人略不加罪近日熙河一路逃者幾四萬將副人員坐視故縱而不問且軍中有長行節級人員將校什長相統同營相依上下相制豈得至其逋亡漫不省察况招軍既立賞格則逃走安可無禁今參詳修立賞罰十數條並從之七月洪中孚為熙河蘭湟路轉運使先是樞密院創招崇威寧鋭兩軍三年十月二日中孚自河東入覲帝問新兵教閲就緒否中孚曰教閲易事也臣不知藝祖取天下之兵與神考所分將兵曾無減損若未嘗減損似不須增蓋兵貴簡練不貴多今遽增二軍所費至廣臣不知獻議者於經費之外别有措置或只仰給朝廷也帝愕然曰初議增兵未嘗議費可即罷去中孚曰惰遊之卒不復安於南畝今一旦罷遣強者聚而為盜弱者轉徙則重為朝廷憂不若使填諸營闕無闕聽於額外收管不一二年盡矣帝稱善政和二年廣西都鈐司奏廣西兩將額一萬三百餘人事故逃亡於湖南北江東西寄招緣諸路以非本職多不用心今兵闕六分乞本路鄰路有犯徒并杖以下情重之人取問犯人除配沙門島廣南逺惡并犯強盜凶惡殺人放火事干化外並依法外餘並免決刺填從之宣和三年知婺州掦應試言諸郡屯戍當隸守臣兵民之任一然後號令不二不然將驕卒橫侵奪細民氣壓州郡有不勝其憂者於是詔自今令隸守臣居無何復詔曰將兵自當遵將官條教其除前隸守臣指揮其後江浙盜起攻陷州邑東南將兵望風逃潰無復能戰又事平之後童貫奏言東南三將類皆孱弱全不知戰虛費糧廩驕惰自恣平時主領占差營私大半皆習工藝遂致寇恣橫行毒流一方重費經畫今事平之後當添將增兵鎮遏綏馭然大抵南人怯弱素失訓練終不堪戰今欲於內郡别置京畿將分接續排置使陜西軍更互戍守庶幾東南可得實戰之士於計為便詔從之四年三月臣僚上言伏見近者招刺闕額禁軍樞密院立限太遽以數萬人而期一月道路洶洶相怖云諸軍捉人刺人以補闕額率數人驅一壯夫且曵且毆百姓呌呼或齧指求免日者金明池人大和會忽遮門大索但長身少年牽之而去云充軍致賣蔬茹者不敢入城行旅市人下逮奴隸皆藏避恐懼事駭見聞今國家間暇必欲招填禁軍當明示法令賚以金帛捐財百萬則十萬人應募矣捉人於途實傷國體乞亟行禁止有已強刺涅之人釋遣之以釋憂疑詔如有非願之人速行改正臣僚言逃卒所在有之當祖宗時軍律甚嚴若在戍還家當役避事必有轅門之戮今既宥其罪且許投換不制於什伍之長既立赦限又特展日以寬自首之期臣恐逃亡得計其弊滋甚乞除恩赦外不輕與限使知限之不可為常稍有畏懼從之五年手詔訪聞保甲法行既久州縣玩習弛廢保丁開收既不以實保長役使又不得時如修鼓鋪飾粉壁守敗船沿道路給夫役催稅賦之類科率騷擾不一遂使寇盜竒邪無復糾禁譏察良法美意浸成虛文可令尚書省於諸路提刑或提舉各路委選一員令專一督責逐縣令佐將繫籍人丁開收取實選擇保正長各更替如法鈐束遞相覺察毋得舍無賴作過之人遇有盜賊畫時追捕若有過致藏匿者許人告首仍具條揭示欽宗靖康元年詔諸路州軍二稅課利先行樁辦軍兵合支每月糧斛春冬衣賜數方許别行支散官吏請給等禁軍月糧並免坐倉自藝祖兵制內則三司外則漕臺嵗賦禁軍錢糧之賜取足經常廩給皆有定數或因屯戍之勞調發之費則謂之特支或戰士有功將吏有勞隨時犒勞則謂之軍賞皆無定數若夫諸軍闕額未即招填則拘其俸廩别作樁備上供入內府隸樞密院自祖宗以來如此而特盛於熙寧間其後詔內外馬步軍自今更不封樁而次年復依舊法封樁大率諸軍司告乏則暫從其請或稍優足則封樁如舊久之事益訛宰路專權則闕額歸朝廷樞管勢重則闕額復還密院其來久矣崇寧大觀時皆為朝廷取用政和間鄭居中為樞密復爭去然密院又自用未始入內帑也內帑則更無考察兵政財用日益淆敝患在不能守祖宗規模而已詔守令募州縣鄉村土豪為隊長各自募其親識鄰里以行及五十人以上先與進義副尉三百人以上與承信郎募文武官習武勇者為統領行日所發州軍授以器甲人給糧半月地里逺者所至州縣接續批支京畿輔郡兵馬制置使司言路路召募敢勇效用每名先給錢三千赴本司試驗給據訖支散銀絹激賞若監司知通令佐并應有官人能召到敢勇效用事藝高強及二百人以上者乞與轉一官每加二百人依此或監司郡守州縣官以下應緣軍期事件稍有稽緩並依軍法從之又詔聞希賞之人抑勒強募自今並取情願敢有違戾當議重罰毋得將不堪出戰及已係軍籍者一例充募又詔募武舉及第有材武方略或戰功曾經戰陳及經邊任大小使臣不以罪犯已發未敘及武學有方略智謀及曾充弓馬所子弟及諸色有膽勇敢戰之人並許赴親征行營司方兵盛時年五十以上皆汰為民及銷併之久軍額廢闕則六十以上復收為兵矣自元豐而後民兵日盛募兵日衰其募兵闕額則收其廩給以為民兵教閲之費元祐以降民兵亦衰崇寧大觀以來蔡京用事兵弊日滋至於受逃亡收配隸猶恐不足政和之後久廢搜補軍士死亡之餘老病者徒費金穀少健者又多冗占階級既壞紀律遂亡童貫握兵勢傾內外凡遇陳敗恥於人言第言逃竄河北將兵十無二三往往多是住招故為闕額以其封樁為上供之用陜右諸路兵亦無幾种師道將兵入援止得萬五千而已靖康之初召募益急多市井亡賴及操瓢行乞之人固嘗申抑招之令明減尅之罰重末作之禁嚴竄亡之罪至於畫一之詔哀矜痛切亦已無及為童蔡者烏得不任其咎哉六月河北制置使劉韐奏近制置种師中領軍到榆次失利兵馬潰散師中不知存在奉聖旨師申下應統制將佐使臣等並與放罪臣契勘用兵失主將統制將佐並合行軍法軍法行則人以主將為重緩急必須護救若不行軍法緩急之際爭先逃遁主將如路人略不顧恤近年以來高永年陷殁一行將佐及中軍將提轄等並不曾行軍法繼而劉法陷殁今又种師中死軍夫兩軍相遇勢力不加血戰而敗士卒痛有傷折或失主將亦無可言者榆次之戰頃刻而潰統制將佐使臣走出者十已八九中傷者十無一二獨師中不出或謂師中撫御少恩紀律不嚴然師中忠義許國受命即行遇敵奮不顧身古之忠臣未見其比師中初聞右軍接戰已却即自遣發軍馬傳呼應援時召諸將已無在者至敵兵犯營師中猶未肯上馬使師中有偷生之心聞初敗即行亦必得出使諸將憂失主帥受軍法亦必戮力相救或能破敵今一軍才却諸將便不顧主帥相繼而遁意謂全軍潰散必難以盡行軍法諸將初出猶有懼色既聞放罪遂皆釋然朝廷以太原之圍未解未欲窮治今師旅方興深恐無所懲艾遇敵必不用命欲乞特降指揮應种師中下一行統制將佐並先次施行依已得指揮令依舊軍前自效如能用命立功即與免罪今後非立戰功雖該恩赦不得敘復仍乞降詔優異褒贈師中以為忠義死事之勸詔种師中下統制將佐並各特降五官仍令劉韐開具職位姓名申尚書省餘依奏十月樞密院奏召募有材武勇鋭及膽勇人并射獵生户從之時京城四壁共十萬人黃旗滿市應募者悉庸丐寒乞之人全無鬭志何栗用王健募竒兵操瓢行乞羸劣之人皆躍然應募倉卒未就紀律竒兵亂毆王健殺使臣數十人內前大擾王宗濋斬渠魁數人乃定及出戰為鐡騎所衝望風奔潰殲焉是時守禦司寄姓名得官者甚多如術人桞彥輔姓謝姓丁人皆冒故舊小人布衣補官不問能否與官告數十道使之妄用文獻通考卷一百五十三
