body:
  text: 文獻通考卷一百三十三鄱陽馬端臨貴與著樂考六度量衡虞書同律度量衡王制古者以周尺八尺為步今以周尺六尺四寸為步注周尺之數未詳聞也按禮制周以十寸為尺蓋六國時多變亂法度或言周尺八寸疏鄭注十寸為尺按玉人職云鎮圭尺有二寸又云桓圭九寸是周猶以十寸為尺也今經云以周尺六尺四寸為步乃是六十四寸則謂周八寸為尺也考工記栗氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之改煎重煎也重煎而不減耗然後稱分之稱金多少以擬鑄器也已稱則知輕重然後更擊煆金令平正之齊其金之大小也既凖訖量金計入模中鑄作也量之以為釜深尺內方尺而圜其外其實一釜以其容為之名也四升曰豆四豆曰區四區曰釜釜六斗四升釜十則鍾方尺積千寸於今粟米法計少二升八十一分升之二十二其數必容釜此言內方耳圜其外者為之脣其臀一寸其實一豆謂覆之其底深一寸其耳三寸其實一升耳在旁可舉也重一鈞重三十斤其聲中黃鍾之宫應律之首槩而不稅令百姓得以量而不租稅沙隨程氏曰釜銅重一鈞深尺內方尺其聲中黃鍾之宫豈扣擊而得其聲否乎又漢斛重二鈞方尺以圜函方聲中黃鍾夫籥管小差已不得其調周釜漢斛相去甚遠乃俱吻合黃鍾此愚所未解也有告逈曰以聲定籥若釜斛則是離合其數與黃鍾之聲會耳非扣擊而得其聲也齊舊四量豆區釜鍾四升為豆各自其四以登於釜四豆為區區斗六升四區為釡釡六斗四升登成也量音亮區烏侯反釜十則鍾六斛四升陳氏三量皆登一焉鍾乃大矣登加也加一謂加舊量之一也以五升為豆四豆為區四區為釜則區二斗釜八斗鍾八斛舊夲以五升為豆四豆為區四區為釜直加豆為五升而區釜自大故杜云區二斗釡八斗是也夲或作五豆為區五區為釜者為加舊豆區為五亦與杜注相會非於五升之豆又五五而加也以家量貸而以公量收之貸厚而收薄漢志度者分寸尺丈引也所以度長短也夲起黃鍾之長以子穀秬黍中者孟康曰子北方北方黑謂黑黍也師古曰此説非也子榖猶言穀子耳秬黍即黑黍無取北方為號也中者不大不小也言取黑黍榖子大小中者率為分寸也秬音巨一黍之廣度之九十分黃鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其法用銅髙一寸廣二寸長一丈而分寸尺丈存焉用竹為引髙一分廣六分長十丈其方法矩髙廣之數隂陽之象也孟康曰髙一分廣六分一為陽六為隂也分者自三微而成著可分别也寸者忖也尺者蒦也師古曰蒦音約丈者張也引者信也師古曰信讀曰伸言其長夫度者别於分忖於寸蒦於尺張於丈信於引引者信天下也職在內官師古曰內官署名也百官表云內官長丞初屬少府中屬主爵後屬宗正廷尉掌之師古曰法度所起故屬廷尉也量者籥合升斗斛也師古曰籥音籥合音閣所以量多少也師古曰量音力張反夲起於黃鍾之籥用度數審其容師古曰因度以生量也其容謂其中所容受之多少也以子榖秬黍中者千有二百實其籥以井水凖其槩孟康曰槩欲其直故以水平之井水清清則平也師古曰槩所以槩平斗斛之上者也音工代反又音工內反十籥為合十合為升十升為斗十斗為斛而五量嘉矣師古曰嘉善也其法用銅方尺而圜其外旁有庣焉鄭氏曰庣音條桑之條庣過也算方一尺所受一斛過九釐五毫然後成斛今尚方有王莽時銅斛制盡與此同師古曰庣不滿之處也音土雕反其上為斛其下為斗孟康曰其上謂仰斛也其下謂覆斛之底受一斗左耳為升右耳為合籥其狀似爵以縻爵祿晉灼日縻散也上三下二參天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十孟康曰三十斤為鈞鈞萬一千五百二十銖聲中黃鍾始於黃鍾而反覆焉孟康曰反斛聲中黃鍾覆斛亦中黃鍾之宫宫為君也臣瓚曰仰覆受一斛覆底受一斗故曰反覆焉師古曰覆音方目反君制器之象也籥者黃鍾律之實也躍微動氣而生物也合者合籥之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於籥合於合登於升聚於斗角於斛也職在太倉大司農掌之師古曰米粟之量故在太倉也衡權者衡平也權重也衡所以任權而鈞物平輕重也其道如底師古曰底平也謂以底石厲物令平齊也底音指以見凖之正繩之直左旋見規右折見矩其在天也佐助璇璣斟酌建指以齊七政師古曰七政日月五星也故曰玉衡論語曰立則見其參於前孟康曰權衡量三等為參在輿則見其倚於衡也又曰齊之以禮此衡在前居南方之義也權者銖兩斤鈞石也所以稱物平施知輕重也夲起於黃鍾之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石忖為十八易十有八變之象也孟康曰忖度也度其義有十八也黃鍾籥銖兩鈞斤石凡七與下十一象為十八也張晏曰象易三揲蓍而成一爻十八變具六爻而成卦五權之制以義立之以物鈞之其餘小大之差以輕重為宜圜而環之令之肉倍好者孟康曰謂為錘之形如鐶也如淳曰體為肉孔為好師古曰錘者稱之權也音直垂反又音直睡反周旋無端終而復始無窮已也銖者物繇忽微始至於成著可殊異也師古曰繇讀與由同由從也兩者兩黃鍾律之重也李奇曰黃鍾之管重十二銖兩十二得二十四二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻隂陽變動之象也十六兩成斤者四時乘四方之象也鈞者均也陽施其氣隂化其物皆得其成就平均也權與物均重萬一千五百二十銖當萬物之象也四百八十兩者六旬行八節之象也孟康曰六甲為六旬一歲有八節六甲周行成歲以六乘八節得之三十斤成鈞者一月之象也石者大也權之大者也始於銖兩於兩明於斤均於鈞終於石物終石大也四鈞為石者四時之象也重百二十斤者十二月之象也終於十二辰而復於子黃鍾之象也孟康曰數始於銖終於石石重百二十斤象十二月銖之重夲取於子律黃鍾一籥容千二百黍為十二銖故曰復於子黃鍾之象也千九百二十兩者隂陽之數也三百八十四爻五行之象也四萬六千八十銖者萬一千五百二十物歷四時之象也而歲功成就五權謹矣權與物鈞而生衡孟康曰謂錘與物鈞所稱適停則衡平衡運生規規圜生矩矩方生繩繩直生凖韋昭曰立凖以望繩以水為平凖正則平衡而鈞權矣是為五則規者所以規圜器械令得其類也矩者矩方器械令不失其形也規矩相須隂陽位序圜方乃成凖者所以揆平取正也繩者上下端直經緯四通也凖繩連體權衡合德百工繇焉以定法式師古曰繇讀與由同由用也輔弼執玉以翼天子師古曰翼助也詩云尹氏太師秉國之鈞四方是維天子是毗俾民不迷師古曰小雅節南山之詩言尹氏居太師之官執持國之權量維制四方輔翼天子使下無迷惑也咸有五象其義一也職在大衡鴻臚掌之平均曲直齊一逺近故在鴻臚魏初杜夔造斛即周禮所謂嘉量也深尺方尺實一釜音輔臀一寸實一豆耳三寸實一升重一斤聲中黃鍾晉氏播遷亡其彜量隋志言歷代度量衡之制審度史記曰夏禹以身為度以聲為律禮記曰丈夫布手為尺周官云璧羡起度鄭司農云羡長也此璧徑尺以起度量易緯通卦驗十馬尾為一分淮南子云秋分而禾蔚定蔚定而禾熟律數十二蔚而當一粟十二粟而當一寸蔚者禾穗芒也説苑云度量權衡以粟生一粟為一分孫子算術云蠶所生吐絲為忽十忽為杪十杪為毫十毫為釐十釐為分此皆起度之源其文舛互唯漢志度者所以度長短也夲起黃鍾之長以子榖秬黍中者一黍之廣度之九十黍為黃鍾之長一黍為一分十分為一寸十寸為一尺十尺為一丈十丈為一引五度審矣後之作者又憑此説以律度量衡並因秬黍散為諸法其率可通故也黍有大小之差年有豐耗之異末代量校每有不同又俗傳訛替漸致增損今略舉諸代尺度一十五等并異同之説如左一周尺漢志王莽時劉歆銅斛尺後漢建武銅尺晉泰始十年荀朂律尺為晉前尺祖沖之所傳銅尺徐廣徐爰王隱等晉書云武帝泰始九年中書監荀朂校太樂八音不和始知為後漢至魏尺長於古四分有餘朂乃部著作郎劉恭依周禮制尺所謂古尺也依古尺更鑄銅律吕以調聲韻以尺量古器與夲銘尺寸無差又汲郡盜發魏襄王冡得古周時玉律及鐘磬與新律聲韻暗同於時郡國或得漢時故鐘吹新律命之皆應梁武鍾律緯云祖沖之所傳銅尺其銘曰晉泰始十年中書考古器揆校今尺長四分半所校古法有七品一曰姑洗玉律二曰小吕玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武錢八曰建武銅尺姑洗微強西京望臬微弱其餘與此尺同銘八十二字此尺者朂新尺也今尺者杜夔尺也雷次宗何允之二人作鍾律圖所載荀朂校量古尺文與此銘同而蕭吉樂譜謂為梁朝所考七品謬也今以此尺為夲以校諸代尺云二晉田父玉尺梁法尺實比晉前尺一尺七釐世説稱有田父於野地中得周時玉尺便是天下正尺荀朂試以校尺所造金石絲竹皆短校一米梁武帝鍾律緯稱主衣從上相承有周時銅尺一枚古玉律八枚檢主衣周尺東昏用為章信尺不復存玉律一口蕭餘定七校夾鍾有昔題刻乃制為尺以相參驗取細毫中黍積次酬定今之最為詳密長祖沖之尺校半分以新尺制為四器名為通又依新尺為笛以命古鐘按刻夷則以笛命飲和韻夷則定合按此兩尺長短近同三梁表尺實比晉前尺一尺二分二釐一毫有竒蕭吉云出為司馬法梁朝刻其度於影表以測影按此即奉朝請祖暅所算造銅圭影表者也經陳滅入朝大業中議以合古乃用之調律以制鐘磬等八音樂器四漢官尺實比晉尺一尺三分七毫晉時始平掘地得古銅尺蕭吉樂譜云漢章帝時零陵文學史奚景於泠道縣舜廟下得玉律度為此尺傅暢晉諸公讃云荀朂新造鍾律時人並稱其精密唯陳留阮咸譏其聲髙後始平掘地得古銅尺歲久欲腐以校荀朂今尺短校四分時人以咸為解此兩尺長短近同五魏尺杜夔所用調律比晉前尺一尺四分七釐魏陳留王景元四年劉徽注九章云王莽時劉歆斛尺弱於今尺四分五釐比魏尺其斛深九寸五分五釐即晉荀朂所云杜夔尺長於今尺四分半是也六晉後尺實比晉前尺一尺六分二釐蕭吉云晉氏江東所用七後魏前尺實比晉前尺一尺二寸七釐八中尺實比晉前尺一尺二寸一分一釐九後尺實比晉前尺一尺二寸八分一釐即開皇官尺及後周市尺後周市尺比玉尺一尺九分三釐開皇官尺即鐵尺一尺二寸此後魏初及東西分國後周未用玊尺之前雜用此等尺甄鸞算術云周朝市尺得玉尺九分三釐或傳梁時有志公道人作此尺寄入周朝云與多鬚老翁周太祖及隋髙祖各自以為謂已周朝人間行用及開皇初著令以為官尺百司用之終於仁壽大業中人間或私用之十東後魏尺實比晉前尺一尺五分八毫此是魏中尉元延明纍黍用半周之廣為尺齊朝因而用之魏收魏史律歷志云公孫崇永平中更造新尺以一黍之長纍為寸法尋太常卿劉芳受詔修樂以秬黍中者一黍之廣即為一分而中尉元匡以一黍之廣度黍二縫以取一分三家紛競久不能決太和十九年髙祖詔以一黍之廣用成分體九十之黍黃鍾之長以定銅尺有司奏從前詔而芳尺同髙祖所制故遂典修金石迄武定未有論律者十一蔡雍銅籥尺後周玉尺實比晉前尺一尺一寸五分八釐從上相承有銅籥一以銀錯題其銘曰籥黃鍾之宫長九寸空圍九分容秬黍一千二百粒稱重十二銖兩之以為一合三分損益轉生十二律祖孝孫云相承傳是蔡雍銅籥後周武帝保定中詔遣大宗伯盧景宜上黨公長孫紹逺岐國公斛斯徵等纍黍造尺從橫不定後因修倉掘地得古玉斗以為正器據斗造律度量衡因用此尺大赦改元天和百司行用終於大象之末其律黃鍾與蔡雍古籥同十二宋氏尺實比晉前尺一尺六分四釐錢樂之渾天儀尺後周鐵尺開皇初調鍾律尺及平陳後調鍾律水尺此宋代人間所用尺傳入齊梁陳以制樂律與後晉尺及梁時俗尺劉曜渾儀尺略相依近當由人間恆用增損訛替之所致也周建德六年平齊以此同律度量頒於天下其後宣帝時逹奚震牛𢎞議曰竊惟權衡度量經邦楙軌誠須詳求故實考校得中謹尋今之鐵尺是太祖遣尚書故蘇綽所造當時檢勘用為前周之尺驗其長短與宋尺符同即以調鍾律并用均田度地今以上黨羊頭山黍依漢書律歷志度之若以大者稠纍依數滿尺實於黃鍾之律須撼乃容若以中者纍尺雖復小稀實黃鍾之律不動而滿計此二事之殊良由消息未善其於鐵尺終有一會且上黨之黍有異他鄉其色至烏其形圓重用之為量定不徒然正以時有水旱之差地有肥瘠之異取黍大小未必得中按許慎解秬黍體大夲異於常疑今之大者正是其中纍百滿尺即是會古實籥之外才剩十餘此恐圍徑或差造律未妙就如撼動取滿論理亦通今勘周漢古錢大小有合宋氏渾儀尺度無舛又依淮南纍粟十二成寸明先王制法索隱鈎深以律計分義無差異漢書食貨志云黃金方寸其重一斤今鑄金校驗鐵尺為近依文據理符會處多且平齊之始已用宣布今因而為定彌合時宜至於玉尺纍黍以廣為長纍既有剩實復不滿尋訪古今恐不可用其晉梁尺量過為短小以黍實管彌復不容據律調聲必致髙急且八音克諧明王盛軌同律度量哲后通規臣等詳校前經斟酌時事謂用鐵尺於理為便未及詳定髙祖受終牛𢎞辛彥之鄭譯何妥等久議不決既平陳上以江東樂為善曰此華夏舊聲雖隨俗改變大體猶是古法祖孝孫曰平陳後廢周玉尺律便用此鐵尺律以一尺二寸即為市尺十三開皇十年萬寶常所造律吕水尺實比晉前尺一尺一寸八分六釐今太樂庫及內出銅律一部是萬寶常所造名水尺律説稱其黃鍾律當鐵尺南吕倍聲南吕黃鍾羽也故謂之水尺律十四雜尺趙劉曜渾天儀土圭尺長於梁法尺四分三釐實比晉前尺一尺五分十五梁朝俗間尺長於梁法尺六分三釐短於劉曜渾儀尺二分實比晉前尺一尺七分一釐梁武鍾律緯云宋武平中原送渾天儀土圭云是張衡所作驗渾儀銘題是光初四年鑄土圭是光初八年作並是劉曜所制非張衡也制以為尺長今新尺四分三釐短俗間尺二分新尺謂梁法尺也嘉量周禮栗氏為量釜深尺內方尺而圜其外其實一釜其臀一寸其實一豆其耳三寸其實一升重一鈞其聲中黃鍾槩而不稅其銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後兹器為則春秋左氏傳曰齊舊四量豆區釜鍾四升為豆各自其四以登於釜六斗四升也釜十則鍾六十四斗也鄭元以為方尺積千寸比九章粟米法少二升八十一分升之二十二祖沖之以算術考之積凡一千五百六十二寸半方尺而圓其外減傍一釐八毫其徑一尺四寸一分四毫七杪二忽有竒而深尺即古斛之制也九章商功法程粟一斛積二千七百寸米一斛積一千六百二十寸菽合麻麥一斛積二千四百三十寸此據精粗為率使價齊而不等其器之積寸也以米斛為正則同於漢志孫子算術曰六粟為圭十圭為抄十抄為撮十撮為勺十勺為合應劭曰圭者自然之形隂陽之始四圭為撮孟康曰六十四黍為圭漢志曰量者籥合升斗斛也所以量多少也夲起於黃鍾之籥用度數審其容以子榖秬黍中者千有二百實其籥以井水凖其槩十籥為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圓其外旁有庣焉其上為斛其下為斗左耳為升右耳為合籥其狀似爵以縻爵祿上三下二參天兩地圓而函方左一右二隂陽之象也其圓象規其重二鈞備氣物之數合萬有一千五百二十也聲中黃鍾始於黃鍾而反覆焉其斛銘曰律嘉量斛方尺而圓其外庣旁九釐五毫羃百六十二寸深尺積一千六百二十寸容十斗祖沖之以圓率考之此斛當徑一尺四寸三分六釐一毫九杪二忽庣旁一分九毫有竒劉歆庣旁少一釐四毫有竒歆數術不精之所致也魏陳留王景元四年劉徽注九章商功曰當今大司農斛圓徑一尺三寸五分五釐深一尺積一千四百四十一寸十分之三王莽銅斛於今尺為深九寸五分五釐徑一尺三寸六分八釐七毫以徽術計之於今斛為容九斗七升四合有竒此魏斛大而尺長王莽斛小而尺短也梁陳依古齊以古升五升為一斗後周武帝保定元年辛巳五月晉國造倉獲古玉升暨五年乙酉冬十月詔改制銅律度遂致中和纍黍積籥同兹玉量與衡度無差凖為銅升用頒天下內徑七寸一分深二寸八分重七斤八兩天和二年丁亥正月癸酉朔十五日戊子校定移地官府為式此銅升之銘也其玉升銘曰維大周保定元年歲在重光月旅㽔賔晉國之有司修繕倉廩獲古玉升形制典正若古之嘉量太師晉國公以聞敕納於天府暨五年歲在叶洽皇帝乃詔稽凖繩考灰律不失圭撮不差纍黍遂鎔金寫之用頒天下以合太平權衡度量今若以數計之玉升積玉尺一百一十寸八分有奇斛積一千一百八十五分七釐三毫九杪又甄鸞算術云玉升一升得官斗一升三合四勺此玉升大而官斗小也以數計之甄鸞所據後周官斗積玉尺九十七寸有奇斛積九百七十七寸有奇後周玉斗并副金錯銅斗及建德六年金錯題銅斗實同以秬黍定量以玉稱權之一升之實皆重六斤十三兩開皇以古斗三升為一升大業初依復古斗衡權衡者平也權者重也衡所以任權而鈞物平輕重也其道如底以見凖之正繩之直左旋見規右折見矩其在天也佐助璇璣斟酌建指以齊七政故曰玉衡權者銖兩斤鈞石也以稱物平施知輕重也古者黍纍錘錙鐶鉤鏘鎰之目歷代差變其詳未聞前志曰權夲起於黃鍾之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石五權謹矣其制以義立之以物鈞之其餘大小之差以輕重為宜圜而環之令之肉好者周旋亡端終而復始亡窮已也權與物均而生衡衡運生規規圜生矩矩方生繩繩直生凖凖正則衡平而鈞權矣是為五則備於鈞器以為大範按趙書石勒十八年七月造建德殿得圓石狀如水碓其銘曰律權石重四鈞同律度量衡有辛氏造續咸議是王莽時物後魏景明中并州人王顯逹獻古銅權一枚上銘八十一字其銘曰律權石重四鈞又云黃帝初祖德市於虞虞帝始祖德市於辛歲在大梁龍集戊辰其定天命有人據土德受正號即真改正建丑長壽隆崇同律度量衡稽當前人龍在己巳歲在實沈初班天下萬國永遵子子孫孫享傳億年此亦王莽所制也其時太樂令公孫崇依漢志先修稱尺及見此權以新稱稱之重一百二十斤新稱與權合若符契於是付崇調樂孝文時一依漢志作斗尺梁陳依古稱齊以古稱一斤八兩為一斤周玉稱四兩當古稱四兩半開皇以古稱三斤為一斤大業中依復古稱唐太宗貞觀時協律郎張文收既定樂復鑄銅律三百六十銅斛二銅稱二銅甌十四稱尺一斛左右耳與臀皆方積十而登以至於斛與古玉尺玉斗同皆藏於大樂署武后時太常卿武延秀以為奇玩乃獻之及將考中宗廟樂有司奏請出之而稱尺已亡其迹猶存以常用度量校之尺當六之五量衡皆當三之一程氏演繁露曰通典敘六朝賦稅而論其總曰其度量三升當今一升稱則三兩當今一兩尺則一尺二寸當今一尺注云當今謂即時蓋當今之時也唐時一尺比六朝制一尺二寸也又曰開元九年敕度以十寸為尺尺二寸為大尺量以十升為斗斗三升為大斗此謂十寸而尺十升而斗者皆秬黍為定也鍾律冠冕湯藥皆用之此外官私悉用大者則黍尺一尺外更增三寸黍量一斗更增三升也唐志租絹長四丈二尺宋朝平定四方凡新邦悉頒度量於其境其偽俗尺度斗斛不中法度者皆去之太宗淳化三年三月詔曰書云協時月正日同律度量衡所以建國經而立民極也國家萬邦咸乂九賦是均故出納於有司繫權衡之定如聞秬黍之制或差毫釐錘鈞為姦害及黎庶宜令詳定稱法著為通規事下有司監內藏庫崇儀使劉蒙正劉承圭言太府寺舊銅式自一錢至十斤凡五十一輕重無凖外府嵗受黃金必自毫釐計之式自錢始則傷於重遂尋究夲末别製法物至景德中承圭重加參定而權衡之制益為精備其法蓋取漢制子榖秬黍為則廣十參以為寸從其大樂之尺秬黍黑黍也樂尺自黃鍾之管而生也謂以秬黍中者為分寸輕重之制就成二術二術謂以尺黍而求釐參因度而求釐度者尺丈之總名謂因樂尺之原起於黍而成於寸拆寸為分拆分為釐拆釐為毫拆毫為絲拆絲為忽則十忽為一絲十絲為毫十毫為釐十釐為分自積黍而取參從積黍而取參則十黍為參十參為銖二十四銖為兩參銖皆以銅為之以釐參造一錢半及一兩等二稱各懸三毫以生凖之等一錢半者以取一稱之法其衡合樂尺一尺二寸重一錢錘重六分盤重五分初毫星凖半錢至稍總一錢半拆成十五分分列十釐第一毫下等半錢當十五釐若十五斤稱等五斤也中毫至梢一錢拆成十分分列十釐末毫至梢半錢折成五分分列十釐等一兩者亦為一稱之則其衡合樂尺一尺四寸重一錢半錘重六錢盤重四錢初毫至梢布二十四銖下别出一星星等五絫每銖之下復出一星等五絫則四十八星等二百四十絫計二千四百黍為一兩中毫至梢五錢布十二銖銖列五星星等二絫布十二銖為五錢之數則一銖等十絫都等一百二十四絫為半兩末毫至稍六銖銖列十星星等一絫每星等一絫都等六十絫為二錢半以御書真草行三體淳化錢較定實重兩銖四絫為一錢者以二千四百得十有五斤為一稱之則其法初以清黍為凖然後以分而推忽為定數之端故自忽絲毫釐黍絫銖各定一錢之則謂皆定一錢之則然後制取等稱也忽萬為分以一萬忽為一分則以十萬忽定為一錢之則忽者吐絲為忽分者始微而著言可分别也絲則千千絲為一分以一萬絲定為一錢之則毫則百一百毫為一分以千毫定為一錢之則毫者毛也自忽絲毫三者皆斷驥尾為之者也釐則十一十釐為一分以百釐定為一錢之則釐者牛尾毛也曵赤金成絲以為之也轉以十倍倍之則為一錢轉以十倍倍之謂自一萬忽至十萬忽之類定為之則也黍以二千四百枚為一兩一籥容一千二百黍為十二銖則以二千四百黍定為一兩之則者是兩籥為兩也絫以二百四十謂以二百四十絫定為一兩之則也銖比二十四轉相因成十絫為銖則以二百四十絫定成二十四銖為一兩之則銖者蓋言殊異也遂成其稱稱合黍數則一錢半者計三百六十黍之重列為五分則每分計二十四黍又每分析為二十釐則每釐計二黍十分黍之四以十釐分二十四黍則每釐先得二黍餘四黍都分成四十分則一釐每得四分是每釐得二黍十分黍之四者也每四毫一絲六忽有差為一黍則釐三之數極矣一兩者合二十四銖為二千四百黍之重每百黍為銖十銖為絫二銖四絫為錢二絫四黍為分一絫二黍重五釐六黍重二釐五毫三黍重一釐二毫五絲則黍絫之數成矣其則用銅而鏤定以識其輕重新法既成詔以新式留禁中取太府寺舊稱四十舊式六十以新式校之乃見舊式所謂一斤而輕者有十謂五斤而重者有一式既若是權衡可知矣又比用大稱如百斤者皆懸鈎於架鐶於衡鐶或偃仆手或抑按則輕重之際殊為懸絶至是更鑄新式悉由黍絫而齊其斤石不可得增損也又令每月用大稱必顯以絲繩既置其物則却立以視不可得而抑按復鑄銅式以御書淳化三體錢二千四百暨新式三十有二銅牌二十授於太府又置新式於內府外府頒於四方大都凡十有一副先是守藏吏受天下歲輸金幣而太府權衡舊式失凖得因之為姦故諸道主者坐逋負而破産者甚衆又守藏更代校計爭訟動必數載至是新制既定姦弊無所措中外以為便度量權衡皆太府掌造以給內外官司及民間之用凡遇改元即差變新法者即以年印而識之其印有方印八角印笏頭印之别所以明制度而防偽濫也度量衡舊太府寺掌之熙寧四年詔歸文思院紹聖四年立增損衡量及私造賣之禁令轉運司置局鬻賣大觀四年詔以所定樂指尺頒之天下其長短闊狹之數以今尺計定政和元年詔諸路轉運司以所頒樂尺製給諸州州製以給屬縣自今年七月為始毁棄舊尺二年臣僚上言請以大晟樂尺帝指為數製量權衡式頒之天下仍釐正舊法又言新尺既頒諸條內尺寸宜以新尺紐定謂如帛長四十二尺闊二尺五分為匹以新尺計四十三尺七寸五分闊二尺一寸三分五釐之五為匹即是一寸四分一釐三分釐之二為一尺如天武等杖五尺八寸以新尺計六尺四分一釐三分釐之二之類仍令民間舊有斗升稱尺限半年首納出限許人告斷罪給賞文獻通考卷一百三十三
