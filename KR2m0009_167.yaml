body:
  text: 文獻通考卷一百六十七鄱陽馬端臨貴與著刑考六刑制仁宗天聖四年有司言敕增至六千餘條請命官刪定從之建隆初編敕四卷才百有六條太平興國中增至十五卷淳化中倍之咸平中增至萬八千五百五十有五條芟其繁亂定其可為敕者二百八十有六條總十一卷又别為儀制令一卷當時便其簡易大中祥符七年又增三十卷千三百七十四條又有景德農田敕五卷與敕兼行至是後增至六千餘條命官刪定帝謂輔臣曰或謂先朝詔令不輕易改信乎王曾曰此憸人惑上之言也咸平中刪太宗朝詔令十有一二蓋去其繁密之文以便於民何為不可帝然之於是下詔中外使得言敕之得失時以唐令有與本朝事異者亦命官修定有司乃取咸平儀制及制度約束之在敕者五百餘條悉附令後號曰附令敕七年令成頒之是嵗編敕成合農田敕為一書視祥符敕損百有餘條其麗于法者大辟之屬十有七流之屬三十有四徒之屬百有六杖之屬二百五十八笞之屬七十有六又配𨽻之屬六十有三大辟而下奏聼旨者七十有一凡此皆在律令外者也詔下諸路閲視聽言其未便者既而又詔須一年無改易然後鏤版至明道元年乃頒焉刑部侍郎燕肅奏唐貞觀四年斷死罪二十九開元二十五年才五十八今天下生齒未加於唐而天聖三年斷大辟二千四百三十六視唐幾至百倍蓋以奏讞之法廢失朝廷欽恤之意詳見詳讞門五年陜西旱災因詔民持杖劫人倉庫非傷主者減死刺𨽻他州非首謀者又減一等且諭長吏密以詔書從事自是諸路災傷即降不下司敕而民飢盜取榖食多蒙矜減賴以全活知諫院司馬光言臣竊聞降敕下京東京西災傷州軍如人户委是家貧偷盜斛斗因而盜財者與減等斷放未知虛的若果如此深為不便臣聞周禮荒政十有二散利薄征緩刑弛力舍禁去幾率皆推寬大之恩以利於民獨于盜賊愈更嚴急所以然者蓋以飢饉之嵗盜賊必多殘害良民不可不除也頃年嘗見州縣官吏有不知治體務為小仁者或遇凶年有劫盜斛斗者小加寬縱則盜賊公行更相劫奪鄉村大擾不免廣有收捕重加刑辟或死或流然後稍定今若朝廷明降敕文豫言偷盜斛斗因而盜財者與減等斷放是勸民為盜也百姓乏食官中當輕徭薄賦開倉賑貸以救其死不當使之自相劫奪也今嵗府界京東京西水災極多嚴刑峻法以除盜賊猶恐春冬之交飢民嘯聚不可禁禦又况降敕以勸之臣恐國家始於寬仁而終于酷暴意在活人而殺人更多也六年集賢校理聶冠卿請罷覆杖笞而徒以上雖不繫獄皆附奏從之先是天下旬奏獄狀雖杖笞皆申覆而徒流罪繫不以聞又自定折杖之法杖之長短廣狹皆有尺度而輕重無凖官吏得以任情至是有司以為言詔毋過十五兩是嵗改強盜法不持杖不得財徒二年得財為錢萬及傷人者死持杖而不得財流三千里得財為錢五千者死傷人者殊死不持杖得財為錢六千若持杖罪不至死者仍刺𨽻千里外牢城又詔告羣盜劫殺人者第賞之及十人者豫錢十萬既而有司言竊盜不用威力得財為錢五千即刺為軍兵反重于強盜請竊盜罪亦第減之至十千刺為兵詔可又詔京城持杖竊盜得財為錢四千亦刺為兵自是盜法惟京城加重餘視舊益寬矣又詔如聞荆湖殺人祭鬼自今首謀若加功者凌遲斬募告者悉畀犯人家資捕殺者重其賞先時江淮捕盜官奏覆劫盜六人皆凌遲朝廷以非有司所得專因詔獲劫盜雖情巨蠧毋得擅凌遲凌遲者先斷斫其支體次絶其吭國朝之極法也詔京師正旦四立分至庚戍己巳日毋決大辟故事天慶等五節有司不奏大辟具獄者十日天聖初詔止三日餘罪一日而已開封府舊禁刑人正旦冬至三日端午節一日亦詔罷之國忌日舊亦禁刑至是詔聽決杖罪容齋洪氏隨筆曰刑統載唐太和七年敕令國忌日惟禁飲酒舉樂至於科罰人吏都無明文但緣其日不合釐務官曹即不得決斷刑獄其小小笞責在禮律固無所妨從今以後縱有此類臺府更不要舉奏舊唐書載此事因御史臺奏均王傅王堪兒國忌日於私第科決杖人故降此詔蓋唐世國忌日休務正與私忌義等雖刑獄亦不決斷謂之不合釐務者此也今在京百司唯雙忌作假以其拜跪多又晝漏已數刻若單忌獨三省歸休耳百司坐曹決獄與常日亡異視古誼為不同元微之詩云縛遣推囚名御史狼籍囚徒滿田地明日不推緣國忌又可證也嘉祐五年判刑部李綖言一嵗之中死刑無慮二千五百六十其殺父母叔父母兄弟兄弟之妻夫殺妻殺妻之父母妻殺夫凡百四十故謀鬬殺千有三百劫盜九百七十姦亡命一百十夫風俗之薄無甚於骨肉相殘衣食之窮莫急于盜賊及犯法者衆豈刑罰不足以止姦而教化未能導而為善歟願詔刑部類次天下所斷大辟嵗上朝廷以助觀省從之七年斷大辟千六百八十三人帝慎恤用刑廣州司理參軍陳仲約誤入人死有司當仲約公罪贖帝曰死者不可復生而獄吏雖暫廢他日復得敘官何可不重其罰命特停之會赦未許敘用尚書比部員外郎師仲説請老自言恩得任子孫帝以仲説嘗失入人死罪不豫其重人命如此英宗始平二年斷大辟千八百三十二人四年十二月時神宗已即位令應諸州軍巡司理院所禁罪人一嵗在獄病死及二人者推吏獄卒皆杖六十增一人者加一等罪止杖一百如五縣以上州嵗死三人開封府司軍巡嵗死十人如死二人法加等亦如之典獄之官如推獄經兩犯即坐仍從違制大縣三萬户以上依五縣以上州法提點刑獄司嵗終會死者之數以聞委中書檢察或死者過多官吏雖已行罰當更黜責神宗熙寧元年開封府請以京朝官分治左右廂凡鬬訟杖六十已下情輕者得專決從之二年知金州張仲宣坐受贓論罪時金州金坑發仲宣發檄巡檢體究無甚利土人憚興作以金八兩求仲宣不差官比較法官坐仲宣枉法贓抵死援前比貸死杖脊黥配海島知審刑院蘇頌言仲宣所犯可比恐喝條且古者刑不上大夫仲宣官五品有罪得乘車今刑為徒𨽻恐汚辱衣冠耳其人則無足矜也仲宣繇是免杖黥止流海外自是命官無杖黥者三年命尚書都官郎中沈衡鞫前知杭州祖無擇於秀州遣內侍乘驛追逮監察御史張戩言無擇三朝近侍而驟繫囹圄非朝廷以廉恥風厲臣下之意請免其就獄止就行審問不從詔責戩等又命權御史臺推直官張景直鞫前知明州光祿卿苗振于越州獄成無擇坐貸官錢及借公使酒責檢校工部尚書忠正軍節度使副使振坐故入裴士堯罪及所為不法責復州團練副使獄半年及決詞所連逮官吏坐勒停衝替編管又十餘人蓋王安石以私怨諷御史王子韶誣其過自後多興詔獄矣凡因事置推已事而罷者詔獄謂之制勘院非詔獄謂之推勘院其體大者則下御史臺獄成即開封府大理寺究治三年編修中書條例所請委逐路提點刑獄司嵗於冬夏上旬檢舉牒州長吏勿留獄牒訖奏聞祖宗故事每嵗冬夏降詔恤刑帝遵行之既委各路提點刑獄自是不復降詔八月詔曰在京班直諸軍請糧斗斛不足出戍之家尤甚倉吏自以在官無祿恣為侵漁非朕所以愛養將士之意也于是三司始立諸倉丐取法已而中書請主典役人嵗增祿至一萬八千九百餘緡丐取不滿百錢徒一年每百錢則加一等千錢則流二千里每千錢則加一等罪止流三千里其行貨及過制者減首罪二等徒者皆配五百里其賞百千流者皆配千里賞二百千滿十千為首者配沙門島賞三百千自首者除其罪凡更定約束十條行之其後內則政府外則監司多倣此法內外歲增吏祿至百餘萬緡皆取於坊場河渡市利免行役剩息錢久之議臣欲稍緩倉法編敕所修立告捕獲倉法給賞條目一百千分等至三百千而按問者減半給之中書請依所定詔仍舊給全賞雖係按問亦全給中書上刑名未安者五條其一嵗斷死刑幾二千比前代殊多如強劫盜並有死法其間情狀輕重有絶相遠者使例抵死良亦可哀若據從情輕之人别立刑等如前代斬右趾之比足以止惡而除害禁軍非在邉防屯戍而逃者亦可更寬首限以收其勇力之效其二徒流折杖之法禁網加密良民偶有抵冒致傷肌體為終身之辱愚頑之徒雖一時創痛而終無愧恥若使情理輕者復古居作之法遇赦第減月日使良善知改過自新凶頑者有所拘繫焉其三刺配之法二百餘條其間情理輕者亦可復古徒流移鄉之法俟其再犯然後決刺充軍其配𨽻並減就夲處或與近地凶頑之徒自從舊法編管之人亦迭送他所量立役作時限無得髠鉗其四令州縣考察士民有能孝悌力田為衆所知者給帖付身偶有犯令情輕可恕者特議贖罰其不悛者科決其五奏裁條目繁多致淹刑禁亦冝刪定詔付編敕所詳議立法韓綘曾布請用肉刑布上議曰先王之制刑罰未嘗不本於仁然而有斷支體刻肌膚以至於殺戮非得已也蓋人之有罪贖刑不足以懲之故不得已而加之以墨劓剕宫大辟然審適輕重則又有流宥之法至漢文帝除肉刑而定笞箠之令後世因之以為律令大辟之次處以流刑代墨劓剕宫之法不惟非先王流宥之意而又失輕重之差古者鄉田同井人皆安土重遷流之逺方無所資給徒𨽻困辱以至終身近世人民輕去鄉土轉徙四方因而為患而居作一年即聽附籍比于古亦輕矣况折杖之法於古為鞭撲之刑刑輕不能止惡故犯法日益衆其終必至于殺戮是欲輕而反重也今大辟之目至多取其情可貸者處之以肉刑則人之獲生者必衆若軍士亡去應斬盜賊贓滿應絞則刖其足良人于法應死而情輕者則處以宫刑至於劓墨則用刺配之法降此而後為流徒杖笞之罪則制刑有差等議既上帝問可否于執政王安石馮京互有論辨迄不果行樞密使文彥博言臣聞刑亂國用重典刑平國用中典唐末五代刑用重典以救時弊故法律之外徒流或加至於死國家承平百年當用中典然猶因循有重於舊律者若偽造文書律止流二千里今斷從絞近臣僚奏請凡偽造印記再犯不至死者亦從絞坐若責其不悛則持杖強盜再犯贓不滿者不死則用刑甚異於律文矣請檢詳見用刑名有重于舊律者以敕律參考裁定其當詔送編敕所四年令盜賊囊槖停宿之家立重法凡劫盜罪當死者籍其家資以賞告人妻子編置千里遇赦若災傷減等者配逺惡地罪當徒流者配嶺表流罪會降者配三千里籍其家資之半為賞妻子遞降等有差應編配者雖會赦不移不釋囊槖之家劫盜死罪情重者斬餘皆配遠惡地籍其家資之半為賞盜罪當徒流者配五百里籍其家資三之一為賞竊盜三犯杖配五百里或鄰州雖非重法之地而囊槖重法之人並以重法論其知縣捕盜官皆用舉者或以武臣為縣尉盜發十人以上者限內捕不獲半劾罪取旨若復殺官吏及纍殺三人焚舍屋百間或羣行于州縣之內掠劫于江海船筏之中非重法之地亦以從重法論嘉祐中始于開封府諸縣後稍及曹濮澶滑等州是年以開封府東明考城長垣縣京西滑州淮南宿州河北澶州京東應天府濮齊徐濟單兗鄆沂州淮陽軍亦立重法著為令至元豐時河北京東淮南福建等路用重法郡縣寖亦廣矣七年詔品官罪犯按察之官並奏劾聽旨毋得擅捕繫罷其職俸四月設置律學設教授四員公試習律令生員義三道習斷案生員一道刑名五事至七事私試義二道案一道刑名五事至三事先時已置刑法科詔法寺主判官諸路監司奏舉京朝官選人兩考者上等進秩補法官餘減磨勘循資免選射闕推恩有差法官闕員亦以次補之其考試關防如諸科法元祐中司馬光論之曰律令敕式皆當官者所須何必置明法一科使為士者豫習之夫禮之所去刑之所取為士者果能知道又自與法律冥合若其不知但日誦徒流絞斬之書習煆鍊文致之事為士已成刻薄從政豈有循良非所以長育人材敦厚風俗也八年沂州民朱唐告前越州餘姚縣主簿李逢有逆謀提點刑獄王庭筠等言其無迹但謗讟朝政語涉指斥及妄説休咎請法外編配仍治告人之妄帝疑之遣權御史推直言官蹇周輔劾治中書以庭筠等所奏不當并劾之庭筠懼縊死逢辭連右羽林大將軍秀州團練使世居醫官劉育等詔捕繫御史臺獄令范百祿徐禧雜治差官即世居及育家索圖讖簡牘獄具世居賜死逢育及河中府觀察推官徐革並凌遲處死將作監簿張靖武舉進士郝士宣皆腰斬司天監學生秦彪百姓李士寧杖脊湖南編管按凌遲之法昭陵以前雖凶強殺人之盜亦未嘗輕用自詔獄既興而以口語狂悖者皆麗此刑矣詔獄盛于熙豐之間蓋柄國之權臣藉此以威縉紳祖無擇之獄王安石私怨所誣也鄭俠蘇軾之獄杜絶忠言也世居之獄則吕惠卿欲文致李士寧以傾王安石陳世儒之獄則賈種民欲文致世儒妻母呂以傾吕公著至王安石欲報呂惠卿而特勘張若濟之獄蔡確欲撼吳充而特勘潘開之獄其事皆起于纎微而根連株逮坐纍者甚衆蓋其置獄之本意自有所謂故非深竟黨與不能以逞其私憾而非中以危法則不能以深竟黨與此所以濫酷之刑至于輕施也元豐元年帝以國初廢大理獄非是乃詔曰大理有獄尚矣今中都官有所劾治皆寓繫開封諸獄囚既猥多難于隔訊盛夏疾疫傳致瘦死或主者異見輒淹嵗時不決朕甚愍焉其復大理獄置卿一人少卿二人丞四人專主鞫訊檢法官二人主簿一人應三司諸寺監吏犯杖笞不俟追究者聽即決餘悉送大理獄其應奏者並令刑部審刑院詳斷應天下奏案亦上之遷寺于馳道之西國朝舊制刑部審刑院大理寺主斷內外所上刑獄與凡法律之事又有糾察在京刑獄司以參稽審覆官制既行審刑院紏察司皆省而歸其職於刑部四方之獄非奏讞者則提點刑獄主焉官司之有獄者在開封則有府司左右軍巡院在諸司則有殿前馬步軍司及四排岸外則三京府司左右軍巡院諸州軍院司理院下至諸院皆有之時官制既行斷讞還大理于是左斷刑右治獄以分寺事斷刑則評事檢法詳斷丞議正審治獄則丞專推劾主簿掌案籍少卿分領其事而卿總焉二年編敕所上新修敕式始分敕令格式為四帝熙寧初置局修敕詔中外集議擇其可采者用之有未便于事理而應修改者上之尚書省議奏即面得旨若一時巡分應著為令及應衝改者隨所屬上二府奏審至是上之熙寧敕令視嘉祐則有減元豐敕令視熙寧則有增而格式不與焉容齋洪氏隨筆曰法令之書其别有四敕令格式是也神宗聖訓曰禁于未然之謂敕禁于已然之謂令設於此以待彼之至謂之格設于此使彼效之謂之式凡入笞杖徒流死自例以下至斷獄十有二門麗刑名輕重者皆為敕自品官以下至斷獄三十五門約束禁止者皆為令命官庶人之等倍全分釐之給有等級高下者皆為格表奏帳籍關牒符檄之類有體制模楷者皆為式元豐編敕用此後來雖數有修定然大體悉循用之今假寧一門實載於格而公私文書行移並名為式假則非也成都府和州路鈐轄司申往時川陜絹匹為錢二千六百以此編敕估贓兩鐡錢得銅錢之一近嵗絹匹不過千三百估贓二匹乃得一匹之罪至多重法法寺請以一錢半當銅錢之一從之三年正月詔審刑院刑部斷議官自今嵗終具嘗失入徒罪五人以上或失入死罪者取旨連名者二人當一人京朝官展磨勘年幕職州縣官展考或不與任滿指射差遣或罷本年斷絶支賜去官不免先是嘗詔嵗終比較取旨而法未備故有是詔七年七月御史黃降言朝廷修立敕令多用舊文損益其去取意義則具載看詳卷藏之有司以偹參照比者議法之官于敕令文意有疑或不取看詳舊卷參照多以臆見裁決請申飭攸司自今申明敕令及定奪疑議並須參以看詳舊卷考其意義所歸庶幾法定於一無敢輕重本臺亦得據文考察從之八月詔舉故事大暑大寒或雨雪稍愆停録囚決獄十月牛羊典吏李偉坐贓抵罪光祿卿吕嘉問言朝廷捐數十萬緡行一重法於天下而無忌憚之吏已漸弛於法行之初蓋由本法豫錢之人才減取錢之人二等請定丐倉法斷遣刑名自陳告首之賞與引領過度一切如舊下刑部刑部議如嘉問所定又詔自今應諸州鞫訊強盜情理無可愍刑名無疑慮而輒奏並令刑部舉駁重行朝典毋得用例破條從司馬光之請也詳見詳讞門哲宗元祐元年詔御史中丞劉摯右正言王覿等刋修元豐敕令格式先是摯言元豐中命有司編修敕令凡舊制載於敕者多移之于令蓋違敕之法重違令之罪輕此足以見神宗仁厚之德而有司不能推廣乃增多條目離柝舊制用一言而立一法因一事而生一條意苛文晦不足以該事物之情行之幾時蓋已屢變今所續降者半嵗一頒無慮數帙宜選經術儒臣明于治體練達民情者取慶歷嘉祐以來新舊敕參照去取略行刪正以成一代之典右諫議大夫孫覺亦言元豐編敕細碎煩多難以檢用甚為今日之患朝廷立法簡易當使人人通曉宜特置局擇通經義明法律者為修敕官命大臣典領則朝廷仁厚之意可以宣布四方矣帝從其請故有是命至紹聖以後詔並用熙寧元豐舊例元符中復參用元祐元豐條目崇寧元年乃詔編敕所並依元豐敕令格式勿復編修其元祐以後所修者並毁版三年詔罷大理寺右治獄户部如三司故事置推勘法官治在京錢榖事尋詔大理獄既廢開封府軍巡院事衆其復置判官一員府司妨礙公事體小者送户部取勘先是元豐初置大理獄本以懲革囚繫淹滯事有所統而崔台符等不能奉承德意士大夫小有連逮輒捕繫雖命婦亦不免追攝邏者所探報下之于獄傅會煆鍊無不誣服人皆惕息至是台符等皆得罪獄亦罷五年詔諸路兵官及使臣有罪自樞密院以下所屬鞫治者奏案申樞密院取旨又詔刑部命官犯罪事干邊防軍政文臣申尚書省武臣申樞密院刑部言佃客犯主加凡人一等主犯之杖以下勿論徒以上減凡人一等謀殺盜詐及有所規求避免而犯者不減因毆致死者不刺靣配鄰州情重者奏裁從之七年臣僚言法寺斷獄大辟失入有罰失出不坐常人之情自擇利害誰肯公心正法者請自今失出死罪五人比失入一人失出徒流罪三人比失入一人著為法從之八年中書省言往詔內外嵗終具諸獄囚死之數初無禁繫多寡之限至元祐七年諸路所上刑部獄死之數遂以禁繫二十而死一則不具即是嵗繫二百人許以十人獄死恐州縣弛意獄事甚非欽恤之意詔刑部自今不許輒分禁繫之數紹聖四年治同文館獄章惇蔡卞用事既再追貶吕公著司馬光及謫呂大防等過嶺意猶未快仍用黃履疏高士京狀追貶王圭皆誣以圖危上躬其言寖及宣仁上頗惑之最後起同文館獄將悉誅元祐舊臣時太府寺主簿蔡渭奏臣叔父碩嘗於邢恕處見文及甫元祐中所寄恕書具述姦臣大逆不道之謀及甫彥博子也必知姦狀詔翰林承旨蔡京中丞安惇同究問初及甫與恕書自謂畢禫當求外入朝之計未可必聞已逆為機穽以榛塞其塗又謂司馬昭之心路人所知又云濟之以粉昆朋類錯立欲以眇躬為甘心快意之地及甫嘗語蔡碩謂司馬昭指劉摯粉昆指韓忠彥眇躬及甫自謂蓋俗稱駙馬都尉為粉侯人以王師約故呼其父堯臣為粉父忠彥乃嘉彥之兄也及甫除都司為劉摯嘗論彥博不可除三省長官故止為平章重事及彥博致仕及甫自權侍郎以修撰守郡母喪除與恕書請補外因為譟忿詆毁之辭及置對則以昭比摯如舊眇躬乃以指上而粉昆乃謂指王巖叟面如傅粉故曰粉梁燾字况之以况為兄故曰昆斥摯將謀廢立不利于上躬京惇言事涉不順及甫止聞其父言無他證佐望别差官審問詔中書舍人蹇序辰審問仍差內侍一員同往蔡京安惇等共治之將大有誅戮然卒不得其要領會星變上怒稍息然京惇極力煆鍊不少置既而梁燾卒於化州劉摯卒于新州衆皆疑二人不得其死明年五月詔摯燾據文及甫等所供言語偶逐人皆亡不及考驗明正典刑摯燾諸子並勒停永不收敘先時三省進呈帝曰摯等已謫遐方朕遵祖宗遺志未嘗殺戮大臣其釋勿治元符元年置看詳元祐訴理局元祐初嘗置訴理所申理寃濫至是中丞安惇言陛下未親政時姦臣置訴理所凡得罪于熙豐之間者咸為除雪歸怨先朝收恩私室乞取公案看詳從初加罪之意復依元斷施行時章惇猶豫未應蔡卞即以相公二心之言迫之惇懼即日置局命蹇序辰同安惇看詳案內文狀陳述及訴理所看詳于先朝言語不順者具名以聞自是申雪復改正或重得罪者八十三家三年詔強盜計贓應絞者贓數並增一倍贓滿不傷人而情輕者奏裁其用兵杖湯火之類傷人及殘虐主家情狀酷毒或汚辱良家或入州縣鎮寨行劫不在奏裁之限若驅虜官吏巡防人等罪不至死仍奏裁先是曾布建議為盜之罪情有輕重贓有多少若劫貧家情理雖重偶以贓少而減免劫富室情理雖輕偶以贓重而論死是盜之生死係于主家之貧富也至于傷人情狀輕重亦殊其以手足毆人偶傷肌體與夫兵刃湯火固有間矣而均謂之傷殘朝廷雖許奏裁州郡之吏或奏或否死生之分特幸與不幸爾不若一變舊法凡以贓定罪及傷人情狀不至切害者皆聽從罪止之法其用兵刃湯火之類情狀酷毒及汚辱良家或入州縣鎮寨行劫若驅虜官吏巡防人等不以傷與不傷凡情不可貸者皆處以死刑如此則輕重不失其當王古徐彥孚鍾正甫亦以為請及是布為相遂申前議改焉侍御史陳次升言祖宗仁政加於天下者廣刑罰之重改而從輕者至多惟是強盜之法特加重者蓋以禁姦宄而惠良民也近者朝廷改法以強盜計贓應絞者並增一倍贓滿不傷人而情輕者奏裁如聞法行之後民受其弊被苦之家以盜無必死之理不敢告官而鄰里亦不為之擒捕恐怨仇報復故賊徒益逞重法地方尤甚竊恐養成大寇以貽國家之患請復行強盜舊法又言朝廷取諸郡所申盜賊之數比較新法未行之前為少遂以為賊盜衰息刑罰可減此正與臣之論相反也夫有盜必申則刑部之數多懼有報復不敢以聞則刑部之數少臣恐自此盜賊充斥而朝廷不知也從官臺臣亦嘗論列非獨臣區區之私見也曾布罷相翰林學士徐績復言其不便乃詔強盜應絞者計贓如舊法前詔勿行刑部言祖宗以來重失入之罪所以恤刑紹聖之法以失出三人比失入一人則是一嵗之中偶失出死罪三人即抵重譴夫失出臣下之小過好生聖人之大德請罷理官失出之責使有司讞議之間務盡忠恕從之徽宗建中靖國元年五月大理卿周鼎言律鬭殺人者絞故殺人者斬蓋兩相爭競者謂之故義理甚明今法寺斷案每於故鬭之際議論不一蓋泥刑統所謂非因鬭爭無事而殺是名故殺殊不知所謂無事而殺者以言無彼此爭鬭之事而殺人者是名故殺若謂不必鬭爭但緣他事而殺者不當為故則律之立文奚不曰有事殺人絞而曰鬭殺人絞不曰無事殺人斬而云故殺人斬以此質之法意可見請自今凡斷奏故鬭案並令有司指定兩相鬬爭是否若止辨説往復即非忿競則故鬬情狀判然矣刑部亦是鼎議詔申明行下崇寧元年臣僚言三省六曹所守者法法所不載然後用例今顧引例而破法此何理哉請取前後所用例以類編修與法妨者去之詔從之三年宰臣蔡京請倣周官司圜之法令諸州築圜土以居強盜貸死者詳見徒流門大觀元年詔計贓之律以絹論罪絹價有貴賤故論罪有輕重今四方絹價增貴而計絹之數猶循舊制以定一貫三百為率計價既低抵罪太重非仁民恤獄之意可以一貫五百定罪二年更定笞法自今並以小杖行決笞十為五二十為七三十為八四十為十五五十為二十不以大杖比折永為定制八年大理少卿任良弼言州縣推勘盜賊多以止宿林野為詞不究囊槖之家請自今應推強盜而不究囊槖及所止之地名各徒二年不盡者減二等為令從之四年詔河北河東羣賊所經歷縣及十次以上知縣降一官衝替縣尉降一官勒停不及十次知縣衝替縣尉勒停政和二年臣僚言比來大理迎合觀望曲法用情例使幸免有犯在開封而願移大理者至號法寺為休和所甚非廷尉持平之義詔大理少卿罷免四年詔立聚問審録之限死囚五日流罪三日杖笞一日五年詔令今後不法官吏已為按察官所劾而輒論告按察官者雖指斥等事亦候結勘斷罪畢再推勘如不實誣告人特于法外别行重斷七年詔品官犯三問不承即奏請追攝若果情理重害而拒隱者方許枷訊所以示别也邇來有司廢法不候三問追攝不原輕重枷訊與常人無異將使人有輕視爵祿之心可申明條令以稱欽恤庶獄之意又詔宗室犯罪與常人同法有司承例奏請不候三問未承即加訊問非朕所以篤親親之恩也自今有犯除涉情理重害别被處分外餘止以衆證為定仍取伏辨無得輒加捶拷若罪至徒以上方許依條置勘其合廷訓者並送大宗正司以副朕敦睦九族之意中書省言律在官犯罪去官勿論蓋為命官立文其後敕文相因修立掌典解役亦用去官免罪例而有犯則解役歸農幸免重罪詔政和敕掌典解役者聽從去官法勿行重和元年二月河北西路提點刑獄虞奕言州縣虐吏輒借杖為溜筒用鐡鉗項以竹實沙而貫之非理慘酷詔悉禁止犯者以違制論四月詔肉刑廢而為杖笞折杖之數多寡不倫民抵慮禁傷及肌膚宜約其數以善天下自今徒二年半杖九十者折十七徒二年杖八十者十五徒一年半杖七十者十三徒一年杖六十者十二笞五十者十笞四十者八笞三十者七笞二十者六笞十者五宣和元年詔虔州近斷大辟二人其元犯人乃于斷後首獲人命至重失刑如此深可憫傷其令本路提點根勘官吏並先勒停不以赦原誤斷之家優加存恤二年右司員外郎翁彥深言陛下欽恤庶獄無所不至而州郡不能審克吏得以並緣為姦刑及貧民而富者規免寖失天下之平今奏牘之首纎悉畢載而略其户等請自今奏案並列其户之髙下察吏姦而懲之使寡弱之民不見凌暴從之臣僚言比年官吏希求恩賞治獄者務作獄空輒不受辭又寄留囚徒于他所致有逃逸斷刑者務作斷絶滅裂鹵莾用刑失當有以婦人配𨽻千里者昨詔大理寺開封府不得輒奏獄空近復有旨不許妄作斷絶然開封府復有斷絶獄官吏冒賞者詔令御史臺覺察彈奏故事法司斷絶必宣付史館獄空降詔奬諭或加秩賜章服後以冒賞者多熙寧初以斷絶乃常事不足書罷宣付史館仍不降詔奬諭都曹翁彥深上言伏見淮東十一州軍政和六年七年坐殺人而死者才十有二人刑幾措矣然計二年之獄蓋一百三十二人而獨此十二人者死問之有司則曰不死者有情理者也自五帝三代至于漢唐未有殺人不死之法在律詈人者笞四十借如以一詈之故即遭毆殺是殺人者不死詈人者顧當死輕重倒置莫此為甚且百有二十人皆大辟也州郡奏而免之可謂仁心矣彼其遭殺者受無辜之虐而銜不報之寃反不足恤乎廷尉天下之平乃仁于強暴使寡弱者不保其生烏在其為平也以一路二年計之已如此天下復當幾何所謂好生者將以省刑而召和氣也今舍止殺之具致被殺者滋多非所以省刑也寬殺人之人使銜寃者益衆非所以召和氣也朝廷見嵗斷大辟之少以為刑將措矣盍亦并奏案而計之乎致治猶元氣也刑之禁民為非猶藥疾也慕措刑之虛名而忘失刑之實患是猶慕治古之無札瘥而但去其藥民知擠于溝壑矣今之官吏外希雪活之賞內冀隂德之報遞相驅煽遂成風俗一作奏案無敢異議胥吏乘之姦弊萬態文致情理莫可究詰讞狀徑上不由憲司其就東市者大抵貧民耳詔州縣官不親聽囚而使吏鞫訊者徒二年髙宗中興著令諸獄具當職官依式檢校枷以乾木為之長者以輕重刻識其上不得留節目亦不得釘飾及加筋膠之類仍用火印從官給杻鉗鎖杖制各如律不得微有增損暑月每五日一濯枷杻禁囚因得少休刑寺遇浣濯之日輪官一員躬親監視州縣獄犴不得輒為非法之具違者論如律制詔諸獄司並旬申禁狀品官命婦在禁别具單狀合奏案具情欵招伏案奏聞法司朱書檢坐條列推司録問檢法官吏姓名於後各州每年開收編配羈管奴婢人各置籍本州斷過編配之數亦如之各路提點刑獄司每年具本路州軍斷過大辟申刑部諸州倣此申提點刑獄司其獄事應書禁歷而不書應申所屬而不申奏案不依式檢坐開具違令若回報不圓致妨詳覆與提點刑獄司詳覆大辟而稽留失覆大辟致罪有出入者各抵罪建炎元年大理正權刑部郎官朱端友言舊例以絹計贓者千三百為一匹今所在絹直髙合議增估乃詔自今以絹定罪者並以二千為凖三年詔自今並遵用嘉祐條法內擬斷刑名嘉祐與見行條法輕重不等並從輕賞格即從重其官制所掌事務格目及設法等有引用窒礙各該載未盡者並令有司條具以聞熙寧中神宗厲精為治議置局修敕蓋謂律不足以周盡事情凡邦國沿革之政與人之為惡入于罪戾而律所不載者一斷以敕乃更其目曰敕令格式而律存乎敕之外自元祐變熙寧之法紹興復熙寧之制以後衝前以新改舊各自為書而刑書寖繁至是乃有此詔又詔重修敕令所應仁宗法度理合舉行自今遵奉嘉祐條法將嘉祐敕與政和敕對修紹興初張守等上對修嘉祐政和敕令格式一百二十卷及看詳六百四卷詔以紹興重修敕令格式為名頒行于是熙寧元祐紹聖法制無所偏循善者從之自渡江以來有司圖籍散失凡所施行多出百司省記胥吏因得豫奪至是監察御史劉一止奏曰伏見尚書六曹下逮百司凡所用法令初無畫一之論類以人吏省記便為豫奪蓋法令具存姦吏猶得而舞之今乃一切聽其省記顧欺弊何所不有陛下聖明灼見此弊嘗見處分令左右司郎官以其省記之文刋定頒行然左右司職事號為最繁竊恐于此不能專一無由速成伏望改差詳定一司敕令所立限刋定鏤版頒降施行詔如其請四年二月詔靖康元年正月一日以前所降御筆多出于法令之外奉行抵牾甚非恤刑之意自今除靖康元年正月一日以前御筆有出於法之外者依纍降指揮施行其餘減杖恤刑之類並合遵守自蔡京當國請降御筆手詔以快已私自畔法令有司莫知適從至是釐正之八月詔祖宗雖崇好生之德而贓吏死徙未嘗末減自今官吏犯贓雖未欲誅戮若杖脊流配決不可貸又詔贓罪至死者籍其家上宣諭欲極治贓吏仍欲檢舉祖宗舊法詳悉告諭使行之不暴毋駭聞聽其後三省進呈臣僚論列贓吏棄市事上曰不必至此但杖遣足矣自後贓吏皆杖脊流配紹興二年詔知州兼統兵去處非出師臨陳自今無得輕用重刑先是祕書少監傅嵩卿言軍國異容刑亦殊制不可槩以軍法從事比聞州軍有捕獲軍兵劫盜殺人者至族其家望加戒飭故有是詔三年詔自今犯私鹽並依紹興敕斷其去年十二月甲午敕旨及今年六月辛丑尚書省批送指揮更不施行先是殿中侍御史常同入對論私販刑名大重其略曰紹興敕私有鹽一斤徒一年三百斤配本城煎煉者一兩比二兩刑名不為不重後來復降指揮又因官司申請不以赦原減雖遇特恩不原為法可謂盡矣去年之冬因大軍所屯嘗有軍卒私販百姓因之故有亭户不以多寡杖脊配廣南指揮蓋一時禁止非通天下永久之法也昨因𣙜貨務看詳以為諸路亦合一體施行遂批狀行提領官張純一堂吏耳但欲附會去相之意朝廷不謀之廷臣不付之户部不稟之聖旨遂以批狀行之何其易哉自此法之行州郡斷配日日有之破家蕩産不可勝計主議之臣但曰刑不峻不足以致厚利夫峻刑章而不恤民害此蔡京王黼之術也奈何今遂用之自古及今刑之所犯必稱罪之輕重豈有罪無等降一用重刑之理今私鹽一斤至杖脊配廣南則孰不相率而為百千斤之多哉祖宗仁德在人猶人之有元氣今天下之勢可為病矣奈何遂欲傷元氣乎法令之行繫乎國本不使有識縉紳之士議之而使刀筆之吏弄其文墨非國之福也望付三省熟議故有是詔詔捕獲強盜雖無被主姓名贓滿已經論決者許推賞太常少卿唐恕言舊法獲盜不知被主姓名則不該賞故江湖間有舉舟盡遭屠戮蹤迹絶滅官司雖知終亦掩蔽蓋既無激勸之方又欲逃捕盜之責法久姦生望賜更改故有是詔五年尚書省言州縣治獄之吏專事慘酷待其垂死皆托之疫患殺之未嘗依條醫治乞舉行嵗終比較計分斷罪法是年比較得宣州衢州福州無病死囚當職官各轉一官舒州病死者及一分惠州病死者二分六釐當職官各特降一官十年詔諸獄並一更三點下鎖五更五點開鎖定牢違者杖八十獄官令佐不親臨及縣令輒分輪餘官並徒一年知通監司覺察按劾著為令十八年撫州泉州誤決重囚官吏各置重憲大理寺丞石邦哲上疏曰伏覩紹興令決大辟皆于市先給酒食聽親戚辭訣示以犯狀不得窒塞口耳蒙蔽面目及喧呼奔逼而有司不以舉行視為文具無辜之民至是強置之法如近年撫州獄案已成陳四間合斷放陳四合依軍法又如泉州獄案已成陳翁進合決配陳進哥合決重杖姓名略同而罪犯逈别臨決遣之日乃誤以陳四間為陳四以陳翁進為陳進哥皆已配而事方發倘使不窒塞蒙蔽其面目口耳而舉行給酒辭訣之令是二人者豈不能呼寃以警官吏之失哉欲望申嚴法禁否則以違制論從之臣僚言比年諸路推究翻異公事或朝廷委之鞫勘例差初官蔭補子及新第進士於法令實未暇習其勢必委之於下老胥􅠕吏得以為姦請行下諸路應有鞫勘公事並須擇曽經歷任人從之二十六年吏部尚書周麟之言臣聞之傳曰非天子不制度不議禮不考文竊見吏部續降申明條册乃有頃年都省批狀指揮參于其間向之修書官有所畏忌至與成法並立以理推之誠為未允望今選具紹興二十五年以前批狀指揮令敕令所看詳可削則削毋令與三尺混淆麟之所言蓋指秦檜也詔依秦檜自得政以來動興大獄脅制天下嶽飛獄死檜勢熖愈熾賢士大夫時繫詔獄死徙相繼天下寃之又置察事卒數百遊市間聞言其姦者即送大理獄殺之大開告訐之門至檜老病日深忌􅎱愈甚將除異已者乃令殿中侍御史徐嘉右正言張扶論趙汾張初交結事先捕汾下大理考掠無完膚令汾自誣與張浚李光胡寅謀大逆凡一時賢士大夫五十三人檜所惡者皆與獄上而檜已病不能書事乃寢詔刑部郎中依元豐法分左右廳治事先是右司郎中汪應辰言國家謹重用刑是以參酌古誼並建官師在京之獄曰開封曰御史又置糾察司以譏其失斷者曰大理曰刑部又置審刑院以決其平鞫之與讞各司其局初不相關是非可否有以相濟及赦令之行有罪者許之敘復無辜者謂之湔洗內則命侍從館閣之臣置司詳定而昔之鞫與讞者皆無預焉外人之川陜去朝廷逺則委之轉運鈐轄司而提點刑獄之官亦無預焉及元豐更定官制始以大理兼獄事而刑部如故然而大理少卿二人一以治獄一以斷刑刑部郎官四人分為左右或以詳覆或以敘雪同僚而異事猶不失祖宗分職之意本朝比之前世刑獄號為平治蓋其並建官師所以防間考核有此具也中興以來務從簡省大理少卿止于一員而刑部郎中初無分異則獄之不得其情法之不當於理者又將使誰平反而追改之乎今雖未能盡復祖宗之舊亦當遵用元豐舊制庶幾官各有守人各有見反覆詳盡以稱欽恤之意上善其言故有是旨孝宗乾道二年刑部侍郎方滋上乾道新編特旨斷例七十卷四年正月臣僚言杖笞之制著令具存輕重大小之制不得以私意易也比年以來吏務酷虐浸乖仁恕之意凡訊囚合用荆子一次不得過三十共不得過二百此法意也今州縣不用荆子而用藤條或用雙荆合而為一或鞭股鞭足至三五百刑罰寃濫莫此為甚願戒有司申嚴行下凡守令與掌行刑獄之官並令依法製大小杖當官封押乃得行用不得增添换易過數訊囚恣為慘酷從之五月臣僚言民命莫重于大辟方煆錬時何可盡察獨在聚録之際官吏聚於一堂引囚而讀示之死生之分決于頃刻而獄吏憚于平反摘紙疾讀離絶其文嘈噆其語故為不可曉解之音造次而畢呼囚書字茫然引去指日聽刑人命所干輕忽若此臣竊照聚録之法有曰人吏依句宣讀無得隱瞞令囚自通重情以合其欵此法意蓋不止於只讀成案而已臣謂當稽參自通重情以合其欵之文于聚録時委長二點無干礙吏人先附囚口責狀一通覆視獄案果無差殊然後亦點無干礙吏人依句宣讀務要詳明令囚通曉庶幾伏辜者無憾寃枉者獲伸從之六年祕書少監權刑部侍郎汪大猷等重修敕令格式百二十二卷存留照用指揮二卷詔以乾道重修敕令格式為名淳熙元年五月詔頒浙西提刑鄭興裔檢驗格目於諸路提刑司初興裔言諸州縣檢驗之弊遂措置格目行下所屬州縣每一次檢驗依立定字號用格目三本一申所屬州縣一付被害之家一申本司照會州縣受詞差官檢官受牒起發皆注日時于上關防詳密州縣不得為欺朝廷善之乃行於諸路十月詔六部除刑部許用乾道所修刑名斷例及司勳許用編類獲盜推賞例并乾道元年四月十八日輕置修例敝事指揮內立定合引例外其餘並依成法不許用例先是臣僚言今之有司既問法之當否又問例之有無法既當然而例或無之則事皆沮而不行夫法之當否人所共知而例之有無多出吏手往往隱匿其例以沮壞良法甚者賄賂既行乃為具例為患不一請詔有司應事有在法灼然可行而未有此例者不得以無例廢法事下六部看詳至是來上乃有是詔六年知湖州長興縣茹驤坐贓免真決編管台州仍籍沒家財參知政事錢良臣奏臣昨任淮東總領日失舉茹驤改官今以贓敗法當同坐詔覽良臣所奏乃欲以身行法國有常憲朕不敢私勉從所請可鐫三官於是陳峴張宗元趙磻老徐本中並坐舉驤各降三官八年詔自今強盜抵死特貸命之人並于額上刺強盜二字餘字分刺兩頰十六年臣僚言在律鞫獄者皆須依所告狀鞫若於本狀之外别求他罪者以故入人罪論比年中外之獄聞于狀外求罪推尋愆咎鞫勘平生旁及他人干連禁繫豈無寃濫乞申明法令自今獄事無得于狀外求罪如有違戾重置於法從之光宗紹熙五年臣僚言廣東一路十有四州惟英德府煙瘴最甚有人間生地獄之號諸司分在廣韶二州置司英德府界乎廣韶之間故諸司凡以公事送獄者多送英德人一聞生地獄之名則已心懼凡罪不至死與未必有罪之人每至獄則皆引伏其意以為久繫于獄未必辨明而不免于死不若亟就刑責猶得一生由是獄之欲速成者必之英德而英德之吏以善治獄名今一路之中東有潮惠西有二廣北有南雄連州皆風土之不甚惡者請行下本路諸司應今後公事合送别州根勘者不許送英德府庶獄無寃濫人獲生全從之寧宗嘉泰二年臣僚言近日大辟行凶之人鄰保逼令自盡或使之説誘被死家賂之財物不令到官嘗求其故始則保甲憚檢驗之費避證佐之勞次則巡尉憚于檢覆又次則縣道憚于鞫勘結解上下蒙蔽只欲省事不知置立官府本何所為今若縱而不問則是被殺人者反為妻子親戚乞錢之資甚可痛也請明降指揮凡有殺傷人處如都保不曽申官州縣不差官檢覆及家屬受財私和許諸色人告首並合從條究治其行財受和會之人更合計贓論罪從之二年刑部侍郎林粟言嘉泰改元一年天下所上死案共一千八百一十一人而斷死者才一百八十一人餘皆貸放夫有司以具獄來上必皆可論刑之人陛下貸其罪辜者凡一千三百六十人豈為細事請詔祕書省修入日歷上以示陛下好生之德下以戒有司用刑之濫從之四年詔頒湖南廣西刋印檢驗正背人形圖於諸路提刑司先是江西提刑徐似道言推鞫大辟之獄自檢驗始其間有因檢驗官司指輕作重以有為無差訛交互以故姦吏出入人罪弊幸不一伏見湖南廣西見行刋印正背人形隨格目給下檢驗官司令于傷損去處依樣朱紅書畫橫斜曲直仍于檢驗之時唱喝傷痕令罪人同共觀看所畫圖本衆無異詞然後著押則吏姦難行愚民易曉于是詔行之臣僚言切見縣獄苦無囚糧而城下之邑尤甚法許於運司錢內支往往縣道不敢支破例多陪辦于推獄私取於役户分甘于同禁之人簞食入獄攫拏紛然極可憐憫乞從諸縣申州就於常平米內支撥從之十三年詔凡在官財物不應用而用之依律科坐贓罪之人自今私自入已者為贓罪私自饋遺者為私罪用充公用者為之公罪創始者為首坐以全罪循例者為從與減一等文獻通考卷一百六十七
