body:
  text: 文獻通考卷二百五十一鄱陽馬端臨貴與著帝系考二太上皇太皇太后皇太后母后臨朝稱制及推尊私親父母附追尊私親父母見宗廟門此不録虞舜踐帝位乃載天子旌旗往朝瞽瞍唯謹以子道孟子咸邱蒙問曰語云盛德之士君不得而臣父不得而子舜南面而立堯帥諸侯北面而朝之瞽瞍亦北面而朝之舜見瞽瞍其容有蹙孔子曰於斯時也天下殆哉岌岌乎不識此語誠然乎哉孟子曰否此非君子之言齊東野人之語也堯老而舜攝也堯典曰二十有八載放勳乃徂落百姓如喪考妣三年四海遏密八音孔子曰天無二日民無二王舜既為天子矣又帥天下諸侯以為堯三年喪是二天子矣朱子集注咸邱蒙孟子弟子語古語也蹙顰蹙不自安也岌岌不安貌言人倫乖亂天下將危也齊東齊國東鄙也孟子言堯但老而不治事而舜攝天子之事堯時舜未嘗即天子位堯何由北面而朝之乎又引書及孔子之言以眀之咸邱蒙曰舜之不臣堯則吾既得聞命矣詩云普天之下莫非王土率土之濵莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也不臣堯不以堯為臣使北面而朝也詩小雅北山之篇普遍也率循也此詩今毛氏序云役使不均已勞於王事而不得養其父母焉其詩下文亦云大夫不均我從事獨賢乃作詩者自言天下皆王臣何為獨使我以賢才而勞苦乎非謂天子可臣其父也孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也詩曰永言孝思孝思維則此之謂也言瞽瞍既為天子之父則當享天下之養此舜之所以為尊親養親之至也豈有使之北面而朝之理乎詩大雅下武之篇言人能長言孝思而不忘則可以為天下法則也書曰祗載見瞽瞍夔夔齊栗瞽瞍亦允若是為父不得而子也書大禹謨篇也祗敬也載事也夔夔齊栗敬謹恐懼之貌允信也若順也言舜事瞽瞍往而見之敬謹如此瞽瞍亦信而順之也孟子引此而言瞽瞍不能以不善及其子而反見化於其子則是所謂父不得而子者而非如咸邱蒙之説也漢高祖六年尊太公為太上皇上歸櫟陽五日一朝太公太公家令説太公曰天無二日土無二王皇帝雖子人主也太公雖父人臣也奈何使人主拜人臣如此則威重不行後上朝太公擁彗李竒曰為恭也如今卒持帚也師古曰彗所以掃也音似歲反迎門郤行郤退而行上大驚下扶太公太公曰帝人主奈何以我亂天下法於是上心善家令言賜黃金五百斤夏五月丙午詔曰人之至親莫親於父子故父有天下傳歸於子子有天下尊歸於父此人道之極也前日天下大亂兵革並起萬民苦殃朕親被堅執鋭自帥士卒犯危難平暴亂立諸侯偃兵息民天下大安此皆太公之教訓也諸王通侯將軍羣卿大夫已尊朕為皇帝而太公未有號今尊太公曰太上皇師古曰太上極尊之稱也皇君也天子之父故曰皇不預治國故不言帝也後漢荀悅曰孝經云故雖天子必有尊也言有父也王者父事三老以示天下所以眀孝也無父猶設三老之禮况其存者乎孝莫大於嚴父故子尊不加於父母家令之言於是過矣晉愍懷太子令問中庶子劉寶云太公家令説太公為是為非對曰荀悅論賜家令為非臣以為悅不識高帝意高帝雖貴為天子事父不失子之禮時即位已六年而不加父號是以家令言雖父乃人臣也言無可尊敬當與人臣同禮欲以此感動之帝聞家令言乃悟即立號太上皇得人子尊父之道若不聞家令言父終無號矣家令説是也師古亦以為善其發悟已心因得尊崇父號非善其令父敬已漢因秦之稱號帝母稱皇太后祖母稱太皇太后高祖崩惠帝即位尊呂皇后為皇太后太后首末並見皇后門後同惠帝崩太后取後宮子名為孝惠子立之年幼太后臨朝稱制師古曰天子之言一曰制書二曰詔書制書者謂為制度之命也非皇后所得稱今呂太后臨朝行天子事斷決萬機故稱制詔立兄子呂台産祿台子通四人為王封諸呂六人為列侯四年少帝自知非皇后子出怨言太后廢之立恆山王𢎞為帝八年皇太后崩諸呂謀亂大臣誅之文帝立尊母薄姬為皇太后姬初為代太后薄氏侯者一人後文帝崩二歲孝景前二年崩葬南陵因呂后不合葬長陵故特自起陵近文帝景帝立尊母竇皇后為皇太后竇氏侯者三人後景帝六歲以武帝元光六年崩武帝立尊母王皇后為皇太后王氏田氏侯者凡三人後景帝十五歲元朔三年崩合葬陽陵昭帝崩霍光迎立昌邑王賀尊上官皇后為皇太后既廢賀立宣帝尊太后為太皇太后以建昭二年崩合葬平陵元帝立尊孝宣王皇后為皇太后元帝崩成帝即位為太皇太后王氏列侯二人關內侯一人時成帝母亦姓王氏故世號太皇太后為卭成太后永始元年崩合葬杜陵稱東園師古曰雖同營兆而别為墳王后陵次宣帝陵東故曰東園也成帝立尊母王皇后為皇太后以平陽侯鳯為大司馬大將軍領尚書事又封太后同母弟崇為侯鳯庶弟談為關內侯後五年又封舅談商立根逢時皆為侯世謂之五侯後又封兄子莽為新都侯哀帝即位尊為太皇太后哀帝崩無子太皇太后以莽為大司馬立平帝太后臨朝委政於莽羣臣希旨奏請莽為安漢公宰衡平帝崩莽徴宣帝元孫嬰為帝居攝踐祚既而即真號太后為新室文母年八十四建國五年崩合葬渭陵司徒掾班彪曰三代以來春秋所記王公國君與其失世希不以女寵漢興后妃之家呂霍上官幾危國者數矣及王莽之興由孝元后歷漢四世為天下母享國六十餘載羣弟世權更持國柄五將十侯卒成新都位號已移於天下而元后拳拳猶握一璽不欲以授莽婦人之仁悲夫致堂胡氏曰外戚之禍在王氏然漢初功臣平勃等預有罪焉高祖崩唱言呂后與帝共定天下帝王諸劉后王諸呂無不可者共定之語本出酈寄然當時必有此議論於是大裂土疆以王諸呂侵弱劉氏罪一也孝惠即世聽張辟疆之説縱諸呂居中用事專權禁闥共斡兵柄上以媚太后下以安己身由是諸呂不可制罪二矣高氏即世雖能誅諸呂立孝文然自兹以往母后習見前世用事例為出閫之言觀大臣議所言皆曰齊王高帝孫然母家駟鈞惡淮南王母家又惡獨代王母家薄氏謹良遂立孝文則平勃之徒畏母后深矣蓋漢母后預政不必臨朝少主雖長君亦然竇太后好黃老惡儒士儒士多不得進趙綰王臧欲助上興制度則發其姦利害之竇嬰兄子也惡之則除門籍喜之則為相梁孝王愛之則誦言請立為嗣不顧大宗之重王太后於灌夫罵坐則不食論棄市韓嫣帝所貴也太后欲殺之則帝不能救可謂司晨預事矣武帝欲立昭則先殺鈎弋夫人馴致王氏篡奪其所從來者遠矣先公曰今按胡氏之説足以盡西京外威貽禍之本末矣嘗因是而極論之天地間有陽不能無隂隂而乘陽則宇宙分裂人極隳亡矣歐陽公謂宦官之禍甚於女子蓋為唐末一代言之耳以古今大勢論則女禍深矣少女子能蠱惑人主以亡國老女子能崇長外戚以亡國三代之亡國皆由此物矣周之東遷以褒姒周雖不亡於此已衰於此矣秦后始有宣太后穰侯之專莊襄悅美姬以易其宗漢高帝起於閭閻呂氏初無功於王業也而漢初諸人之論每以為呂氏雅故本推轂高帝就天下田生語注謂翼戴以成帝業若車之行助推其轂又謂呂后與高帝共定天下酈寄語是以諸呂之心自謂與諸劉等􅍀然有取而代之之意而後動於惡中間霍氏擁昭立宣隂妻邪謀特覺之早耳而終不免新莽之亂焉曹魏之見篡於司馬氏也一再廢殺專以母后為之主及晉武帝平吳之後耽惑女寵楊賈實召劉石紛爭之亂天下既為南北矣齊陳以女色亡元魏以淫后亡隋文帝起外戚以篡周唐高祖主外戚竊宮嬪以取隋太宗寵武才人開聚麀之醜子孫殱焉祿山之起為太真妃也唐雖未亡於此而已衰於此矣河朔失而徑兵亡東南虛而蠻禍起非權輿於天寶末乎朱梁以女寵開子禍而亡後唐莊宗以劉后殺功臣靳軍賞而亡皆女子之為也哀帝立尊趙后為皇太后趙氏侯者二人哀帝為太子頗得趙太后力傅太后恩趙太后趙太后亦歸心故成帝母及王氏皆怨之哀帝崩王莽白太后太后詔有司曰前皇太后與昭儀俱封帷幄姊弟專妬殘滅繼祀以危宗廟貶為孝成皇后徙北宮後月餘復詔廢為庶人就其園自殺立十六年哀帝既為太子成帝母王太后欲令傅太后哀帝祖母丁姬哀帝母十日一至太子家成帝曰太子承正統共養陛下不得復顧私親王太后曰太子小而傅太后抱養之今至太子家以乳母恩耳於是令傅太后得至太子家丁姬以不小養太子獨不得哀帝即位王太后詔令傅太后丁姬十日一至未央宫後下詔尊定陶共王為共皇尊傅太后為共皇太后丁姬為共皇后各置左右詹事食邑如長信宮中宫後歲餘下詔曰漢家之制推親親以顯尊尊定陶共皇之號不宜復稱定陶其尊共皇太后為帝太太后丁姬為帝太后復又更號帝太太后為皇太太后稱永信宮帝太后稱中安宮而成帝母太皇太后本稱長信宮成帝趙后為皇太后並四太后各置少府太僕秩皆二千石傅氏侯者六人傅太后既尊後尤驕元壽元年崩合葬渭陵稱孝元傅皇后丁氏侯者二人太后建平二年崩起陵恭皇之園哀帝崩王莽秉政使有司舉奏丁傅罪惡皆免官爵徙故郡貶傳丁二太后號夷其陵東漢眀帝即位尊隂皇后為皇太后永平七年崩在位二十四年年六十合葬原陵肅宗即位尊馬皇后為皇太后帝欲封爵諸舅太后不聽建初四年崩在位二十三年年四十餘合葬顯節陵和帝即位尊竇皇后為皇太后太后臨朝兄憲等並顯貴擅威權後密謀不軌發覺誅九年太后崩在位十八年臨朝四年未葬而帝母梁貴人姊嬺一計反上書陳貴人為后所陷枉殁之狀太尉張酺等請依光武黜呂太后故事貶太后尊號不宜合葬先帝帝手詔曰竇氏雖不遵法度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧按前世上官太后亦無降黜其勿復議於是合葬敬陵和帝崩長子平原王有疾而諸皇子夭殁前後十數後生者輒隱祕養於人間殤帝生始百日鄧皇后迎立之尊后為皇太后太后臨朝殤帝崩太后定䇿立安帝猶臨朝政以連遭大憂百姓苦役乃詔減除浮費録寃獄自太后臨朝水旱十載四夷外侵盜賊內起每聞人飢或逹旦不寐躬自減徹以救災厄故天下復平歲還豐穰永寧二年崩在位二十年臨朝十七年年四十一合葬順陵范曄論曰鄧后稱制終身號令自出術謝前政之良身闕眀辟之義前政謂周公也辟君也尚書曰朕復子明辟言周公攝位復還成王今太后不還故曰闕也至使嗣主側目斂衽於虛器器謂神器喻帝位也直生懷悶懸書於象魏象魏闕也直生杜根等上書請太后還政借之儀者殆其惑哉借猶假也殆近也言太后不還政於安帝近可惑也然而建光之後王柄有歸太后建光之中崩遂乃名賢戮辱便孽黨進帝寵用乳母王聖及其女伯榮出入宮掖通傳姦賂太尉楊震及鄧隲皆被中官譖誅也衰斁之來兹焉有徴斁敗也安帝臨政衰敗逾甚故曰有徴也故知持權引謗所幸者非已焦心恤患自強者唯國言執持朝權以招衆謗者所幸不為己身唯憂國也是以班母一説闔門辭事太后兄大將軍隲以母憂上書乞身太后不許以問班昭乃許之語見昭傳也愛姪微愆髠剔謝罪太后兄隲子鳯受遺事泄隲遂髠妻及鳯以謝天下語見隲傳將杜根逢誅未值其誠乎誠信也言未為太后所信但蹊田之牛奪之已甚左傳申叔時曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣此喻杜根上書雖曰有罪太后殺之為過甚也安帝閻皇后與兄顯及江京譖皇太子保廢為濟陰王帝崩為皇太后欲久專國政貪立幼年與顯等定策禁中迎濟北惠王子北鄉侯懿立為皇帝太后臨朝蔡雍獨斷曰少帝即位太后即代攝政臨前殿朝羣臣太后東面少帝西面羣臣奏事上書皆為兩通一詣后一詣少帝少帝立二百餘日而薨京白太后徴濟北河間王子未至而中黃門孫程等合謀殺江京等立濟隂王是為順帝顯等皆伏誅遷太后於離宮家屬徙比景眀年太后崩在位十二年合葬恭陵順帝崩梁皇后無子美人虞氏子炳立是為沖帝尊后為皇太后太后臨朝沖帝尋崩復立質帝猶秉朝政時寇盜羌蠻擾亂賦斂煩數官民困竭太后夙夜勤勞推心拔賢委任太尉李固等拔忠良誅貪慝崇節儉寇夷消弭海內肅然而兄大將軍冀鴆殺質帝專權暴忌數以邪説疑誤太后遂立桓帝而誅李固天下失望和平元年歸政尋崩在位十九年臨朝六年年四十五合葬憲陵桓帝既立追尊本生父蠡吾侯翼為孝崇皇帝梁太后既崩乃追尊妾母匽氏為孝崇皇后遣司徒持節奉䇿授璽綬賫乘輿器服備法物宫曰永樂置太僕少府以下皆如長樂宮故事漢官儀曰帝祖母稱長信宮帝母稱長樂宮故有長信少府長樂少府及職吏皆宦官為之又置虎賁羽林衛士起宮室分巨鹿九縣為后湯沐邑在位三年元嘉二年崩以帝弟平原王石為喪主葬儀比皇后桓帝崩無子竇皇后為皇太后臨朝定䇿立解瀆侯宏是為靈帝太后父大將軍武謀誅宦官而中常侍曹節等矯詔殺武遷太后於南宮雲臺家屬徙比景竇氏雖誅帝猶以太后有援立之恩朝於南宫親饋上壽供養資奉有加於前熹平元年崩立七年合葬宣陵靈帝既立追尊本生父解瀆亭侯萇為孝仁皇帝夫人董氏為孝仁皇后迎至京師居南宮嘉德殿宮稱永樂及竇太后崩始預政使帝賣官求貨帝崩何太后臨朝孝仁后欲參預政事太后輒禁塞之忿恚太后與兄何進謀奏蕃后故事不得留京師請遷本國收其兄子重免官重自殺孝仁后以憂崩在位二十二年靈帝崩皇子辨即位尊母何皇后為皇太后臨朝后兄大將軍進欲誅宦官不克反為所害董卓將兵入洛陽遂廢少帝而立協是為獻帝遷太后於永安宮遇鴆而崩在位一年范曄論曰自古雖主幼時艱王家多釁必委成冢宰簡求忠良未有專任婦人斷割重器唯秦芉太后始攝政事故穰侯權重於昭王家富於嬴國太后昭王母也號宣太后史記曰昭王立年少宣太后自知事以同母弟魏冉為將軍任政封為穰侯太后攝政始於此也漢仍其謬知患莫改東京皇統屢絶權歸女主外立者四帝安質桓靈臨朝者六后章帝竇太后和熹鄧太后安思閻太后順烈梁太后桓思竇太后靈思何太后也莫不定䇿帷帟委事父兄貪孩童以久其政抑眀賢以專其威周禮幕人掌帷帟幄幕之事鄭元注曰帟幄中坐上承塵也殤帝崩鄧太后與兄隲等定立安帝年十三沖帝崩梁太后與兄冀迎立質帝年八歲質帝崩太后與兄冀迎立桓帝年十五桓帝崩竇太后與父武迎立靈帝年十二任重道悠利深禍速身犯霧露於雲臺之上霧露謂疾病也不可指言死故假霧露以言之靈帝時中常侍曹節矯詔遷太后於雲臺謝弼上封事曰伏惟皇太后援立眀聖幽居空宮如有霧露之疾陛下當何面目以見天下家嬰縲紲於圄犴之下縲索也絏繫也囹圄周獄名也鄉亭之獄曰犴音五旦反謂外戚等被誅也湮滅連踵傾輈繼路踵迹也輈車轅也賈誼曰前車覆後車戒而赴蹈不息燋爛為期終陵夷大運淪亡神寶陵夷猶頺替神寶帝位也詩書所歎略同一揆故考列行迹以為皇后本紀魏文帝受禪尊卞后曰皇太后稱永壽宮眀帝即位尊太后曰太皇太后太和四年崩合葬高陵黃初元年詔曰婦人與政亂之本也自今以後羣臣不得奏事太后后族之家不得當輔政之任又不得橫受茅土之爵以此詔傳之後世若有違背天下共誅之眀帝立尊郭皇后為皇太后稱永安宮青龍三年帝數問甄后死狀於太后由是太后以憂崩齊王即位尊郭皇后為皇太后稱永寧宮其後值三主幼弱宰輔統政與奪大事皆先咨啓於太后而後施行母邱儉鍾會等作亂咸假其命以為辭焉景元四年崩葬高平陵西景元元年十一月燕王表賀冬稱臣帝即燕王宇之子宇稱臣故以為疑詔曰古之先王者或有不臣今王宜依此表不稱臣乎又當為報答夫係大宗者降其私親况所係者重邪若便同之臣妾朕所未安其皆依禮典據當務盡其義有司議奏以為禮莫崇於尊祖制莫重於王典陛下紹大宗之重崇三祖之業伏惟燕王禮尊屬戚正位蕃服躬秉虔肅以先萬國其於王典闡濟大順誠宜割以非常之制奉以不臣之禮臣等立議以為燕王章表可聽如舊式中詔所施宜曰皇帝敬問大王侍御議又云至於制書國之舊典朝廷所以辨章於天下者也宜循法故曰制詔燕王議又曰凡詔命制書奏事上書文書有應稱燕王者皆云上字其非宗廟助祭之事不得稱王名奏事上事及吏人皆不得觸王諱以彰殊禮加於羣后云上遵王典尊祖之制俯順聖旨敬承之心晉何琦議曰父母之尊擬則天地君親之道資敬是同今承受命運君臨率土而父以子尸天祿不敢子天子以眀王者之尊而子雖以為天子必有尊也推斯以言父必臣天位之君而子自必尊天性之父晉惠帝即位尊楊皇后為皇太后后父駿受遺詔輔政元康元年賈后不肯以婦道事太后又欲干預政事而為太傅駿所抑乃啓帝作詔誣駿謀反誅之夷其族賈后矯詔使後軍將軍荀悝送太后於永寧宮特全太后母高都君龎氏之命聽就太后居尋復諷羣公有司奏曰皇太后隂潛姦謀圖危社稷飛箭繫書要募壯士同惡相濟自絶於天魯侯絶文薑春秋所許蓋奉祖宗任至公於天下陛下雖懷無已之情臣下不敢奉詔詔曰此大事更詳之有司又奏宜廢皇太后為峻陽庶人中書監張華議皇太后非得罪於先帝今黨其所親為不母於聖世宜依漢廢趙太后為孝成后故事貶皇太后之號還稱武皇后居異宮以全始終之恩左僕射荀愷與太子少師下邳王晃等議曰皇太后謀危社稷不可復配先帝宜貶尊號廢詣金墉城於是有司奏請從晃等議廢太后為庶人詔可又奏楊駿造亂家屬應誅詔原其妻龎命以慰太后心今太皇后廢為庶人宜以龐付廷尉行刑詔不許有司復請乃從之龎臨刑太后抱持號呌截髮稽顙上表詣賈后稱妾請全母命不見省董養遊太學升堂嘆曰朝廷建斯堂將以何為乎每覽國家赦書謀反大逆皆赦至於殺祖父母父母不赦者以為王法所不容故也奈何公卿處議文飾典禮乃至此乎天人之理既滅大亂將作矣二年太后以絶膳而崩年三十四在位十五年永嘉初追復尊號致堂胡氏曰按羣公有司所奏張華所議徑以太后圖危社稷不母於聖世方是時討楊駿者兩親王將殿中兵而出駿既無逆謀至是又未嘗有一戈指闕坐受攻討蹙迫而死太后以父之故射帛於外以祈免耳不知何名為圖危社稷不母於聖世乎及有司再請廢后為庶人詔旨畫可華不復切諫依阿緘默陰附虐后而庸奴其君不待式乾之事已當誅殛不得赦矣先公曰賈后殺故楊太后飢而死之也武帝身創大業且智力足以得天下而無以保妻子何也司馬氏三世以來強人之母以廢人之子奪人之國宜有斯報矣彼且以虛罪誣高貴鄉公而實受報於武悼后且皆是賈氏發之駕虛罪於高貴鄉公者充也效實報於楊太后者南風也天道昭昭亦巧於示報矣東晉成帝即位尊庾皇后為皇太后羣臣奏天子幼沖宜依漢和熹皇后故事辟讓數四不得已臨朝稱萬機后兄中書令亮管詔命公卿奏事稱皇太后陛下及蘇峻作逆京師傾覆后見逼辱遂以憂崩年三十二在位六年哀帝即位詔有司議生母章貴人位號乃尊為皇太妃儀服與太后同又詔朝臣不為太妃敬合典禮不太常江逌議位號不極不應盡敬興寧元年薨帝欲服重服江霦啓應緦麻三月詔欲降為期年霦又啓厭屈私情所以上嚴祖考帝從之穆帝即位尊禇皇后為皇太后以帝幼沖臨朝稱制太常殷融議從鄭元議后父衛將軍裒在宮庭則盡臣敬太后歸寧之日自如家人之禮太后詔曰典禮誠所未詳如所奏是情所不能安也更詳之征西將軍翼等議謂父尊盡於一家君敬重於天下鄭元議合情理之中太后從之自是朝臣皆敬裒焉帝加元服乃居崇德宮哀帝海西公之世太后復臨朝稱制簡文帝即位尊后為崇德太后帝崩孝武幼沖羣臣復請臨朝孝武冠復稱崇德太后太元九年崩於顯陽殿年六十一在位四十年太后於帝為從嫂朝議疑其服太學博士徐澡議曰資父事君而敬同又曰其夫屬父道者妻皆母道也則夫屬君道妻亦后道矣服后以齊母之義也魯譏逆祀以明尊卑今上躬奉康穆哀皇及靖后之把致敬同於所天豈可敬之以君道而服廢於本親謂應齊縗期從之孝武皇帝即位尊生母李氏為淑妃太元三年進為貴人九年又進為夫人十二年加為皇太妃儀服一同太后十九年尊為皇太后稱崇訓宮安帝即位尊為太皇太后隆安四年崩葬修平陵神主祔於宣太后廟宣太后簡文帝母也徐邈與范寧公書訪其事寧答謂子不得爵命母妃是太子婦號必也正名可以稱母也邈重與寧書曰禮天子之妃曰后關雎稱后妃之德妃后之名可謂大同所以憲章皇極禮崇物備者在於此也故太后之號定於前朝而當今所率由也若必欲服章同於后而名號異於妃則可因夫人之稱而加皇太以眀尊雖曰一理然於文物之章猶未盡崇高之極此又今之所疑不可得而行也足下嫌太子妻稱妃然古無此稱出於後代今有皇太之别可例論邪宋武帝受禪尊後母蕭氏為皇太后帝事太后孝謹即位時春秋已高每旦朝太后未嘗失時刻少帝即位尊為太皇太后景平元年崩年八十一宋武帝將崩手詔曰後世若有幼主朝事一委宰相母后不煩臨朝孝武即位尊母路淑媛為皇太后宫曰崇憲廢帝立為太皇太后眀帝立號崇憲太后乃居中宮崩廢帝即位尊孝武王皇后為太后宮曰永訓其年崩後廢帝即位尊眀帝王皇后為皇太后宮曰𢎞訓順帝禪位遷居丹陽宮拜汝陰王太妃順帝殂更立第都下薨於第後廢帝母陳氏既即位尊為皇太妃輿服一如晉孝武李太妃故事宫曰𢎞化置家令一人改諸國太妃曰太姫升明初降為蒼梧王太妃陳文帝即位尊武帝章皇后為皇太后宮曰慈訓廢帝即位后為太皇太后光大二年后下令黜廢帝為臨海王命宣帝嗣立太建元年復為皇太后崩年六十五後主即位尊宣帝柳皇后為皇太后宮曰𢎞範陳亡入長安隋大業十二年薨於東都年八十三後魏太武即位尊眀元杜皇后為皇太后封后弟為遼東王真君元年崩詔天下大臨三日别立后寢廟於陵所獻文即位尊文成馮皇后為太后帝年十二居諒暗丞相乙渾謀逆后密定䇿誅之遂臨朝聽政內行不正寵李奕等獻文誅奕遂害獻文孝文時尊曰太皇太后復臨聽政孝文雅性孝謹事無巨細一稟於太后后多智猜忍能行大事十四年崩年四十九孝文行三年喪魏獻文帝好黃老浮屠之學雅薄富貴常有遺世之心欲禪位於京兆王子推羣臣固諫任城王雲曰陛下方隆太平臨覆四海豈得上違宗廟下棄兆民且父子相傳其來久矣陛下必欲委棄塵務則皇太子宜承正統中書令高允曰願陛下上思宗廟託付之重追念周公抱成王之事帝曰然則立太子羣公輔之有何不可乃傳位於太子下詔曰朕希心元古志存淡泊爰命儲宮踐升大位朕得優遊恭已栖心浩然羣臣奏曰昔漢高祖稱皇帝尊其父曰太上皇眀不統天下也今皇帝幼沖萬機大政猶宜陛下總之謹上尊號曰太上皇帝從之上皇徙居崇光宮采椽不斫土階而已國之大事咸以聞崇光宮在北苑中又建鹿野浮屠於苑中之西山與禪僧居之五年崩眀帝即位尊宣武高皇后為皇太后尋為尼居瑶光寺非大節慶不入宫中時天文有變靈太后欲以后當之遂暴崩天下寃之喪還瑶光佛寺殯皆以尼禮明帝尊母胡充華為皇太妃後尊為皇太后臨朝聽政猶曰殿下後改令稱詔羣臣上書曰陛下自稱曰朕以眀帝沖幼未堪親祭欲依周禮夫人與君交獻之義代行祭禮禮官博議以為不可而太后欲以幃幔自障觀三公行事重問侍中崔光光便據漢和熹鄧后薦祭故事太后大悅遂攝行初祀臨朝淫恣五年為元義所幽又六年誅義復臨朝自是朝政疏緩恩威不立又三年鴆孝眀立孝文曾孫釗爾朱榮興兵向闕沉后於河齊文宣受禪尊母婁妃為皇太后宮曰宣訓濟南即位尊為太皇太后密與孝昭諸將誅楊愔等廢濟南立孝昭復為皇太后孝昭崩又下詔立武成帝大寧二年崩年六十二武成即位四年傳位於太子緯自稱太上皇又四年崩後主即位武成既崩尊武成胡后為皇太后后內行不謹幸和士開及沙門曇獻等齊亡入周又恣行姦穢開皇中殂周武帝即位尊母叱奴氏為皇太后建德二年崩宣帝即位尊武帝后阿史那氏為皇太后大象元年改為天元皇太后二年又尊為天元上皇太后宣帝崩靜帝尊為太后隋開皇二年殂年三十二又尊母李氏為帝太后大象元年改為天元帝太后又尊為太皇太后二年又尊為天元聖皇太后靜帝立尊為大帝太后隋開皇初出俗為尼八年殂以尼禮葬宣帝既立一年傳位於太子闡自稱天元皇帝所居稱天臺冕二十四旒車旗鼓皆倍於前王之數每對臣下自稱為天用樽彛圭瓚以飲食令羣臣朝天臺者齊三日清身一日自比上帝立五皇后二年而崩天元崩靜帝時楊堅秉政尊天元楊后為皇太后居𢎞聖宫堅既受禪后憤惋愈甚堅內甚愧之開皇中封為樂平公主大業五年殂靜帝母朱氏天元崩後尊為帝太后隋初出俗為尼文獻通考卷二百五十一
