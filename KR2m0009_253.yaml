body:
  text: 文獻通考卷二百五十三鄱陽馬端臨貴與著帝系考四后妃皇太子妃及後宫儀冊后妃及冊太子妃禮黄帝娶於西陵之女西陵國名也是為嫘祖祖一作俎嫘力追反索隱曰一曰雷祖音力誰反正義曰一作傫嫘祖為黄帝正妃索隱曰按黄帝立四妃象后妃四星皇甫謐云元妃西陵氏女曰嫘祖生昌意次妃方雷氏女曰女節生青陽次妃彤魚氏女生夷鼔一名蒼林次妃嫫母班在三人之下按國語夷鼔蒼林是二人又按漢書古今人表彤魚氏生夷鼔嫫母生蒼林不得如謐所說生二子其後皆有天下其一曰元囂是為青陽太史公自據大戴禮以嫘祖生昌意及元囂則青陽也皇甫謐以青陽為少昊乃方雷氏所生是其所見異也索隱曰元囂帝嚳之祖按皇甫謐及宋衷皆云元囂青陽即少昊也今此紀下云元囂不得在帝位則太史公意青陽非少昊明矣而此又云元囂是為青陽當是誤也謂二人皆黄帝子並列其名所以前史因誤以元囂青陽一人耳宋衷又云元囂是為青陽少昊繼黄帝立者而史不叙蓋少昊以金徳王非五運之次故叙五帝不數之也青陽降居江水其二曰昌意降居若水降下也言帝子為諸侯降居江水若水二國皆在蜀即所封國也昌意娶蜀山氏女曰昌僕生高陽高陽有聖德焉正義曰華陽國志及十三州志云蜀之先肇於人皇之際黄帝與子昌意娶蜀山氏後子孫因封焉帝顓頊高陽氏黄帝之孫昌意之子母曰昌僕亦謂之女樞河圖云瑶光如蜺貫月正白感女樞於幽房之宫生顓頊首戴干戈有德文也帝嚳有四妃卜其子皆有天下元妃有邰氏女曰姜嫄生后稷次妃有娀氏女曰簡狄生卨次妃陳豐氏女曰慶都生放勲次妃娵訾氏女曰常儀生帝摯帝嚳崩帝摯代立摯在位九年政微弱弟唐侯放勲德盛乃禪位焉唐堯娶散宜氏之女曰女皇生丹朱又有庶子九人皆不肖虞舜娶堯之二女長娥皇次女英舜升天子娥皇為后女英為妃娥皇無子女英生商均夏禹娶塗山氏之女生啟商湯妃有莘氏之女周太王娶有邰氏之女曰太姜詩古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇王季娶摯任氏之中女正義曰國語注摯疇二國任姓奚仲仲虺之後太任之家太任王季之妃文王母也詩摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維德之行太任有身生此文王思齊太任文王之母思媚周姜京室之婦齊莊媚愛也周姜太姜也京周地也常思莊敬太任也乃為文王之母又常思愛太姜之配太王之禮故能為京室之婦言其徳行純備故生聖子也列女傳太姜太王娶之以為妃生太伯仲雍王季太姜有色而貞順率導諸子至於成童靡有過失太王謀事必於太姜遷徙必與太任王季娶之以為妃太任之性端壹誠莊維德之行及其有身目不視惡色耳不聽淫聲口不出傲言能以胎教子而生文王此皆有賢行也文王娶有莘氏之長女曰太姒詩文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子大邦有子俔天之妹俔譬也知太姒之賢而尊之如天之有女弟文定厥祥問名之後卜而得吉則文王以禮定其吉祥謂納幣也親迎于渭造舟為梁不顯其光不明乎其禮之有光輝美之也天子造舟周制也殷時未有此等制有命自天命此文王于周于京纘女維莘長子維行天將命文王君天下於周京之地故亦為作合使繼太任之女事於莘國莘國之長女太姒則配文王維德之行篤生武王保祐命爾燮伐大商燮和也謂協和伐殷之事太姒嗣徽音則百斯男太姒十子衆妾則宜百子也箋云徽美也嗣太任之美音謂續行其善教令惠于宗公神罔時怨神罔時恫宗公宗神也惠順也刑于寡妻至于兄弟以御于家邦刑法也寡妻適妻也箋云寡妻寡有之妻武王娶邑姜服䖍曰邑姜武王后太公之女也論語武王曰予有亂臣十人十人謂周公旦召公奭太公望畢公榮公太顚閎夭散宜生南宫适其一人謂丈母劉侍讀以為子無臣母之義蓋邑姜也九人治外邑姜治内亂治也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已史記武王與叔虞母會時夢天謂武王曰余命女生子名虞余與之唐及生子文在其手曰虞故命之曰虞曲禮天子有后有夫人有世婦有嬪有妻有妾妻八十一御妻周禮謂之女御以其御序於王之燕妾賤者以疏夫扶也扶持於王婦服也言其進以服事君子也其猶貴故加以世婦言之亦廣世允也嬪婦人之美稱可賔敬也妻之言齊也言進御於王之時暫有齊同之義妾之言接也聞彼有禮走而徃焉以得接見於君子也周禮則嬪在世婦上又無妾之文也今此所陳與周禮雜而不次者記者之言或雜夏殷而言之鄭注檀弓云舜不告而娶不立正妃但三夫人夏則因而廣之増九女則十二人所増九女者則九嬪也故鄭云春秋説云天子娶十二人夏制鄭又云殷増三九二十七人總三十九人所謂二十七世婦也周又三二十七人因為八十一人則女御也注周禮至賤者正義曰解周名為女御之義以其御於王之燕寢御女按周禮王有六寢一是正寢餘五任後通為燕寢其一在東北王春居之一在西北王冬居之一在西南王秋居之一在東南王夏居之一在中央六月居之凡后妃以下更為次序而上御王於五寢之中也故鄭注周禮九嬪云凡御見之法月與后妃其象也卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕亦十五日而徧云自望後反之婦人上御必有女史彤管以差次之后妃羣妾以禮御於君所女史書其日月授之環以進退之生子月辰則以金環退之當御者以銀環進之著左手既御著於右手事無小大記以成法昏義古者后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章婦順故天下内和而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治故曰天子聽男教后聽女順天子理陽道后治隂德天子聽外治后聽内治教順成俗外内和順國家理治此之謂盛德天子六寢而六宫在後六官在前所以成副施内外之政也三夫人以下百二十人周制也三公以下百二十人似夏制也合而言之取其相應有象天數也内治婦學之法也隂德謂主隂事隂令也正義曰按宫人云掌王之六寢之修注路寢一小寢五是天子六寢也云六宫在後者后之六宮在王之六寢之後亦大寢一小寢五其九嬪以下亦分居之其三夫人雖不分居六宮亦分主六宮之事或二宫則一人也或猶如三公分主六卿之類也云内治婦學之法也者按九嬪職云掌婦學之法故知内治是婦學也云隂德謂主隂事隂令也者按内宰掌王之隂事隂令注云隂事謂羣妃御見之事隂令為王所求為於北宫也周官内宰以隂禮教六宮鄭司農云隂禮婦人之禮六宫後五前一王之妃百二十人后一人夫人三人嬪九人世婦二十七人女御八十一人言謂六官謂后也婦人稱寢曰宫宫隠蔽之言后象王立六宫而居之亦正寢一燕寢五教者不敢斥言之謂之六宫若今稱皇后為中宫矣以隂禮教六嬪教之以婦人之禮不言教夫人世婦者舉中省文也以婦職之法教九御使各有屬以作二事正其服禁其竒衺展其功緒婦職謂織絍組紃縫線之事九御女御也九九而御於王因以號焉使之九九為屬同時御又同事也正其服止踰侈竒衺若今媚道展猶録也緒業也故書二為三杜子春云當為二二事謂絲枲之屬也大祭祀后祼獻則贊瑶爵亦如之謂祭宗廟王既祼而出迎牲后乃從後祼也祭統曰君執圭瓚祼尸大宗執璋瓚亞祼此大宗亞祼謂夫人不與而攝耳獻謂王薦腥薦熟后亦從獻也瑶爵謂尸卒食王既酳尸后亞獻之其爵以瑶為飾正后之服位而詔其禮樂之儀薦徹之禮當與樂相應位謂房中户内及阼所立處贊九嬪之禮事助九嬪贊后之事九嬪者贊后薦玉齍薦徹豆籩咨齍音凡賔客之祼獻瑶爵皆贊謂王同姓及二王之後來朝覲為賔客者祼之禮亞王而禮賔獻謂王享燕亞王獻賔也瑶爵所以亞王酬賔也坊記曰陽侯殺穆侯而竊其夫人故大饗廢夫人之禮致后之賔客之禮謂諸侯來朝覲及女賔之賔客凡喪事佐后使治外内命婦正其服位使使其屬之上士内命婦謂九嬪世婦女御鄭司農云外命婦卿大夫之妻王命其夫后命其婦元謂士妻亦為命婦凡建國佐后立市設其次置其叙正其肆陳其貨賄出其度量淳制祭之以隂禮市朝者君所以建國也建國者必面朝後市王立朝而后立市隂陽相承之義次司次也叙介次也陳猶處也度丈尺也量豆區之屬鄭司農云佐后立市者始立市后立之也祭之以隂禮者市中之社先后所立社也故書淳為敦杜子春讀敦為純純謂幅廣也制謂匹長元謂純制天子廵狩禮所云制幣丈八尺純四􅡥與隂禮婦人之祭祀與純諸允反下司􅡥音紙音餘中春詔后帥内外命婦始蠶於北郊以為祭服蠶於北郊婦人以純隂為尊郊必有公桑蠶室焉中音仲歳終則會内人之稍食稽其功事内人主為九御佐后而受獻功者比其小大與其麤良而賞罰之獻功者九御之屬鄭司農云烝而獻功元謂典婦功曰及秋獻功㑹内宫之財用計夫人以下所用財正嵗均其稍食施其功事憲禁令於王之北宫而紏其守均猶調度也施猶賦也北宫后之六宫謂之北宫者繋於王言之明用王之禁令令之守宿衛者上春詔王后帥六宫之人而生穜稑之種而獻之於王六宮之人夫人以下分居后之六宫者古者使后宫藏種以其有𫝊類蕃孳之祥必生而獻之示能育之使不傷敗且以佐王耕事共禘郊也鄭司農云先種後熟曰穜後穜先熟曰稑王當以耕種於藉田元謂詩云黍稷穜稑是也夫人以下分居后之六宫者毎宫九嬪一人世婦三人女御九人其餘九嬪三人世婦九人女御二十七人從后唯其所燕息焉從后者五日而沐浴其次又上十五日而徧云夫人如三公從容論婦禮内宰下大夫二人上士四人中士八人府四人史八人胥八人徒八十人内宰宫中官之長治疏内宰對太宰治百官内宰婦人之事故名内宰太宰不稱外者謂兼統内九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御叙於王所婦德謂貞順婦言謂辭令婦容婉娩婦功謂絲枲自九嬪以下九九而御於王所九嬪者既習於四事又備於從人之道是以教女御也教各率其屬者使亦九九相與從於王所息之燕寢御猶進也勸也進勸王息亦相次叙羣妃御見法見曲禮注凡祭祀贊玉齍贊后薦徹豆籩玉齍玉敦受黍稷器后進之而不徹故書玉為玉也杜子春讀為玉若有賔客則從后當贊后事大喪帥叙哭者亦如之亦從后帥猶道也后哭衆之次序乃哭世婦掌祭祀賔客喪紀之事帥女宫而濯摡為齊盛摡拭也為猶差擇婦疏祭祀黍稷舂人舂之􅐪人炊之皆不使世此為非舂非炊是差擇暁然矣及祭之日涖陳女宫之具凡内羞之物涖臨也内羞房中之羞也掌弔臨於卿大夫之喪王使之往弔女御掌御叙於王之燕寢言掌御叙防上之專妬者於王之燕寢則王不就后宫息在疏掌御叙不使九嬪世婦掌之者謂上妬嫉自專之事女御官卑不敢也以歳時獻功事絲枲成功之事凡祭祀贊世婦助其帥涖女官大喪掌沐浴王及后之喪后之喪持翣翣棺飾也持而從柩車從世婦而弔於卿大夫之喪從之數蓋如使者之介云鄭氏曰不列夫人於此官者夫人之於后猶三公之於王坐而論婦禮無官職世婦不言數者君子不茍於色有婦德者充之無則闕女御昏義所謂御妻御猶進也侍也天子聘女納徵加穀珪鄭元云納徵加於束帛賈公彦曰士以上皆同元纁束帛天子加以榖珪也魯桓公八年祭公來遂逆王后于紀公羊傳祭公者何天子之三公也何以不稱使冢宰周公稱使婚禮不稱主人時王者有母也遂者何生事也生猶造也專事之辭大夫無遂事此其言遂何據待君命然後卒大夫也成使乎我也以上來無事知成使乎我使所吏反其成使乎我柰何使我為媒可則因用是徃逆矣婚禮成於五先納采問名納吉納徵請期然後親迎時王者遣祭公來使魯為媒可則因用魯往迎之不復成禮疾王者不重妃匹逆天下之母若逆婢妾將謂海内何哉故譏之不言如紀者辭有外文女在其國稱女此其稱王后何王者無外其辭成矣九年春紀季姜歸于京師公羊傳其辭成矣則其稱紀季姜何自我言紀父母之於子雖為天王后猶曰吾季姜明子尊不加於父母襄公十五年劉夏逆王后于齊劉采地夏名也天子卿書字劉夏非卿故書名天子無外所命則成故不言逆女左氏傳十二年靈王求后於齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人不敢譽亦不敢毁故曰若而人妾婦之子若而人言非適也無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許昏王使隂里給之隂里周大夫結成也十五年官師從單靖公逆王后于齊卿不行非禮也官師劉夏也天子官師非卿也劉夏獨過魯告昏故不書單靖公天子不親昏使上卿逆而公監之故曰卿不行非禮也通典說曰禮記昏義云婚禮者將合二姓之好上以事宗廟下以繼後代也故君子重之共牢而食合卺而酳所以合禮同尊卑而親之成男女之别立夫婦之義而後父子親君臣正故曰婚禮者禮之本也公羊說天子至庶人皆親迎左氏説王者至尊無敵體之義不親迎鄭元駮之曰文王親迎於渭則天子親迎也天子雖尊然夫婦無判禮同一體所謂無敵豈施於此按禮記哀公問曰冕而親迎不亦重乎孔子對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎此言繼先聖之後以為天地之主非天子則誰乎是鄭以天子當親迎也杜元凱以為天子不親迎按春秋祭公逆王后于紀𫝊曰禮也劉夏逆王后譏卿不行皆不譏王不親行明是天子不當親迎也文王之迎太姒身為公子迎在殷代未可據此以為天子之禮孔子之對哀公自論魯國之法魯以周公之後得郊祀上帝故以先聖天地為言耳非說天子之禮漢興因秦之稱號帝母稱皇太后祖母稱太皇太后適稱皇后師古曰適讀曰嫡后亦君也天曰皇天地曰后土故天子之妃以后為稱取象二儀妾皆稱夫人又有美人良人八子七子長使少使之號焉師古曰良善也八七禄秩之差也長使少使主供使者至武帝制偼伃娙娥傛􆂧充依各有爵位師古曰偼言接幸於上也伃美稱也娙娥皆美貌也傛傛猶言奕奕也便習之意也充依言充後庭而依秩序也偼音接伃音予字或從女其音同耳娙音五經反傛音容而元帝加昭儀之號師古曰昭顯其儀亦隆重也凡十四等云師古曰除皇后自昭儀以下至秩百石十四等昭儀位視丞相爵比諸侯王偼伃視上卿比列侯娙娥視中二千石比關内侯師古曰中二千石實得二千石也中之言滿也月得百八十斛是為一嵗凡得二千一百六十石言二千者舉成數耳傛視真二千石比太上造師古曰真二千石月得百五十斛一嵗几得千八百石耳太上造第十六等爵美人視二千石比少上造師古曰二千石月得百二十斛一嵗凡得一千四百四十石耳少上造第十五爵八子視千石比中更師古曰中更第十三爵也更音公衡反其下亦同充依視千石比左更師古曰左更第十二爵七子視八百石比右庶長師古曰右庶長第十一爵良人視八百石比左庶長師古曰左庶長第十爵長使視六百石比五大夫師古曰五大夫第九爵少使視四百石比公乘師古曰公乘第八爵五官視三百石師古曰五官所掌亦象外之五官也順常視二百石無涓共和娯靈保林良使夜者皆視百石師古曰涓潔也無涓言無所不潔也共讀曰恭言恭順而和柔也娯靈可娯樂情靈也保安也保林言其可安衆如林也良使使令之善也夜者主職夜事令力成反上家人子中家人子視有秩斗食云師古曰家人子者言采擇良家子以入宫未有職號但稱家人子也斗食謂佐史也謂之斗食者言一嵗不滿百石日食一斗二升五官以下葬司馬門外服䖍曰陵上司馬門之外髙祖吕皇后名雉單父人髙祖微時后父吕公相而異之妻以后生惠帝魯元公主髙祖為漢王元年封吕公為臨泗侯髙祖崩孝恵立尊后為皇太后應歴代后之推尊為皇太后太妃者自推尊以後至崩葬事跡竝見太后門此不具錄後同戚姬定陶人愛幸生趙王如意髙祖崩為吕后所殺薄姬吳人初在魏王豹宫中豹亡輸織室髙祖幸之生文帝自有子後希見文帝封代王從之文帝既立尊為皇太后孝惠張皇后宣平侯敖之女母魯元公主吕太后欲為重親故以魯元女配帝為皇后無子惠帝崩皇太后取後宫子立為帝太后崩大臣誅諸吕及所名孝惠子張后廢處北宫北宫在未央之北孝文後元年薨葬安陵不起墳惠帝納后納采鴈璧乘馬東帛聘黄金二萬斤馬十二匹吕氏為惠帝娶魯元公主女故特優其禮先公曰魯元壻其弟而不知帝之為人主也惠帝妻其甥而不知妻之為皇后也夫上者民之父母如此豈可以奉神靈之統哉蓋人倫顚倒而君道陵夷甚矣孝文竇皇后觀津人吕太后時以良家子選入宫太后出宫人賜諸王各五人竇姬與至代代王幸之生女嫖及景帝代王王后卒及入為帝立啓為太子竇姬為皇后景帝立尊為皇太后孝景薄皇后孝文薄太后家女也景帝為太子時太后取為太子妃景帝立之為皇后無寵立六年薄太后崩坐廢廢後四年薨𦵏長安城東平望亭南孝景王皇后槐里人初嫁為金王孫婦母臧氏奪之金以納太子宫景帝為太子愛幸之生三女及武帝景帝即位廢薄皇后及太子為臨江王乃立王夫人為后男為太子封后兄信為蓋侯武帝即位尊為皇太后孝武陳皇后長公主嫖女父陳午武帝得立為太子長主有力乃取主女為妃及帝即位為皇后十餘年無子元光五年坐巫蠱廢居長門宫後十餘年薨𦵏霸陵郎官亭東孝武衞皇后字子夫生微為平陽主謳者帝恱之納宮中元朔元年生男據遂立為皇后據為太子立二十八年遭巫蠱事起太子誅江充發兵敗収后璽綬自殺宣帝立改𦵏諡思后孝武李夫人本以倡進兄延年納之宫中得幸生昌邑哀王夫人早卒上憐之以后禮𦵏及衞思后廢後四年武帝崩大將軍光緣上雅意以李夫人配食追上尊號曰孝武皇后孝武鉤弋趙偼伃河間人武帝廵狩過河間望氣者言有竒女乃使使召之得幸為偼伃居鉤弋宫生昭帝後從幸甘泉以譴死昭帝立追尊為皇太后孝昭上官皇后祖桀父安隴西上邽人孝昭立召入宫為偼伃月餘立為皇后年甫六歳立十歳而昭帝崩昌邑王即位尊為皇太后時年方十四五歳衛太子史良娣宣帝祖母太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣家魯國元鼎四年入為良娣生男號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害宣帝即位追尊為戾后起園邑史氏侯者四人史皇孫王夫人宣帝母名翁須太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆坐誅莫有収𦵏者宣帝即位後追尊為悼后起園邑王氏侯者二人孝宣許皇后父廣漢昌邑人宣帝養於掖庭號皇曾孫廣漢以女妻之生元帝數月宣帝即位立為皇后廣漢封昌成君明年為淳于衍所毒崩在位三年諡恭哀皇后𦵏杜南是為杜陵南園孝宣霍皇后大將軍光女許后崩光納之宫中立為后立五年霍顯與子謀反誅坐廢處昭臺宫後十二嵗徙雲林館乃自殺𦵏昆吾亭東孝宣王皇后父奉光長陵人宣帝即位入宫為偼伃帝憐太子蚤失母幾為霍氏所害乃選後宫素謹愼無子者立王偼伃為后令母養皇太子立十六年宣帝崩元帝即位為皇太后孝元王皇后名政君父禁居長安為廷尉吏宣帝時入掖庭為家人子嵗餘宣帝令送太子宫見内殿一幸有身生成帝為皇孫元帝即位以妃為偼伃後三年立為皇后成帝立為皇太后孝成許皇后平恩侯嘉女元帝悼母恭哀后遭霍氏之禍故選嘉女配皇太子成帝即位立為皇后立十四年寵衰坐姊為媚道祝詛廢處昭臺宫後九年坐淳于長等與后姊孊通書有誖謾賜藥自殺𦵏延陵交道廐西孝成班偼伃帝初即位選入後宫始為少使俄大幸為偼伃居増成舍有男後失之鴻嘉三年趙飛燕告許后及班偼伃挾媚道祝詛后坐廢偼伃入求共飬太后長信宫至成帝崩偼伃充奉園陵薨因𦵏園中孝成趙皇后本長安宫人師古曰本宫人以賜陽阿主家也宫人者省中副使官婢名曰宫人非天子掖庭中也事見漢舊儀言長安者以别甘泉等諸宫省也屬陽阿主家學歌舞號曰飛燕以其體輕故也成帝見而悅之召入宫大幸有女弟復召入俱為偼伃許后廢乃立飛燕為皇后而女弟為昭儀姊弟專寵十餘年無子成帝暴崩民間歸咎趙昭儀皇太后詔問皇帝起居發病狀昭儀自殺哀帝立尊趙皇后為皇太后孝元傅昭儀哀帝祖母父河内温人昭儀少為上官太后才人自元帝為太子得進幸帝即位立為偼伃甚有寵生一男一女男為定陶恭王帝既重傅偼伃及馮偼伃亦幸生中山孝王上欲殊之於後宫以二人皆有子為王上尚在未得稱太后乃更號曰昭儀賜以印綬在偼伃上昭其儀尊之也至成哀時趙昭儀董昭儀皆無子猶稱焉元帝崩隨王歸國稱定陶太后恭王薨子入為漢嗣為哀帝尊為恭皇太后定陶丁姬哀帝母山陽瑕邱人恭王時姬為後宫生哀帝帝入嗣漢即位尊為帝太后孝哀傅皇后定陶太后從弟子哀帝為王時傅太后欲重親取以配王王入為漢太子傅氏為妃即位立為皇后哀帝崩王莽奏徙桂宫後月復與孝成趙后俱廢為庻人就其園自殺孝元馮昭儀平帝祖母元帝即位二年以選入後宫生男為中山孝王元帝崩隨王之國哀帝立傅太后以素怨誣以罪自殺中山衛姬平帝母成帝時中山孝王無子上以衛氏子豪少女配孝王生平帝孝王薨代為王哀帝崩無子太皇太后詔迎中山王立為帝王莽欲專權懲丁傅行事乃令帝母衛姬及外家不得至京師更立宗室桃鄉侯子成都為中山王奉孝王後賜衞姬璽綬拜為中山孝王后加湯沐邑後以事誅衛氏支屬唯后在莽簒位廢為家人嵗餘卒孝平王皇后安漢公王莽女平帝即位莽以女配帝以禮迎立為皇后嵗餘平帝崩莽立孝宣元孫嬰為孺子尊后為皇太后莽篡以嬰為定安公改后為定安公太后時年十八自劉氏廢每稱疾不朝會莽敬悼哀傷欲嫁之更號為黄皇室主若漢之稱公主后怒發疾不肯起莽不能強漢兵誅莽后赴火而死王莽納女為后以固權遣宗正劉宏尚書令平晏納采太師孔光大司徒馬宫等四十九人賜皮弁素積皮弁鹿皮為冠也素積以十五升布為衣積素以為裳以禮雜卜筮太牢告宗廟封后父百里尊而不臣有司奏故事聘皇后黄金二萬斤為錢一萬萬莽深辭讓受四千萬而以其三千三百萬予十一媵家有詔復益二千三百萬合為三千萬莽復以其千萬分予九族貧者遣甄豐奉璽綬拜帝母衞姬為中山孝王后四年春遣大司徒宫等奉乘輿法駕迎皇后於安漢公第授皇后璽紱顔師古曰紱所以繋璽登車稱警蹕便時取日時之便上臨延壽門入未央宫前殿羣臣就位行禮大赦天下益封安漢公地滿百里賜迎皇后及行禮者三公以下宰執皆增秩賜金帛各有差皇后立三月以禮見髙廟尊父號曰宰衡位在諸侯王上班固贊曰易著吉凶而言謙盈之效天地鬼神至於人道靡不同之夫女寵之興繇至微而體至尊窮富貴而不以功此固道家所畏禍福之宗也序自漢興終於孝平外戚後庭色寵著聞二十有餘人然其保位全家者唯文景武帝太后及卭成后四人而已至如史良娣王悼后許恭哀后身皆夭折不辜而家依託舊恩不敢縱恣是以能全其餘大者夷滅小者放流嗚呼鑒前行事變亦偹矣東漢皇后紀叙論秦并天下多自驕大宫備七國史記始皇破六國寫放其宫室作之咸陽北阪上南臨渭水殿屋複道周閣相屬所得諸侯美人以充實之并秦為七也爵列八品前書曰漢興因秦之稱號正嫡稱皇后妾皆稱夫人又有美人良人八子七子長使少使之號漢興因循其號而婦制莫釐釐理髙祖帷薄不修大戴禮曰大臣坐汚穢男女無别者不曰汚穢曰帷薄不修謂周昌入奏事髙帝擁戚姬是不修也孝文衽席無辨鄭元注禮記曰祍卧席也孝文幸愼夫人每與皇后同坐是無辨也然而選納尚簡飾翫少華自武元之後世增滛費至乃掖庭三千増級十四偼伃一娙娥二容華三充衣四己上武帝置昭儀五元帝置美人六良人七七子八八子九長使十少使十一五官十二順常十三無涓共和娯靈保林良使夜者十四此六官品秩同為一等也妖幸毁政之符外姻亂邦之跡前史載之詳矣及光武中興斵彫為朴六宫稱號唯皇后貴人貴人金印紫綬奉不過粟數十斛又置美人宫人采女三等並無爵秩嵗時賞賜充給而已漢法常因八月算人漢儀注曰八月初為算賦故曰算人遣中大夫與掖庭丞及相士於洛陽鄉中閲視良家童女年十三以上二十以下姿色端麗合法相者載還後宫擇視可否乃用登御所以明愼聘納詳求淑哲明帝聿遵先㫖宫敎頗修登建嬪后必先令德内無出閫之言權無私溺之授可謂矯其弊矣向使因設外戚之禁編著令甲改正后妃之制貽厥方來豈不休哉雖御已有度而防閑未篤故孝章以下漸用色授恩隆好合遂亡緇蠧緇黒也蠧食木䖝以喻傾敗也云云見太后門故考列行跡以為皇后本紀雖成敗事異而同歸正號者並列於篇其以私恩追尊非當時所奉者則隨事附出謂安帝母左姬及祖母宋貴人之類並見清河孝王傳親屬外事各依列傳其餘無所見則繫之此紀謂賈貴人虞美人之類是以纘西京外戚云爾光武郭皇后諱聖通眞定槀人更始二年光武擊王郎至眞定納后有寵即位以為貴人建武二年立為皇后十七年以寵衰怨懟廢為中山王太后后中子封中山王二十年中山王徙封沛王后為沛太后二十八年薨𦵏北邙按西都廢后如薄如陳如霍如許皆幽之别宫至光武郭后則以有子為王故得隨子之國然帝在而稱太后非名也光烈隂皇后名麗華南陽新野人更始元年帝納后於宛即位封貴人生顯宗十七年廢皇后郭氏而立貴人制詔三公曰皇后懐執怨懟數違教令不能撫循他子訓長異室宫闈之内若見鷹鸇既無闗雎之徳而有吕霍之風豈可託以孤㓜恭承眀祀其上皇后璽綬隂貴人鄉里良家歸自微賤自我不見於今三年宜奉宗廟為天下母主者詳按舊典時上尊號異常之事非國休福不得上壽稱慶顯宗即位尊為皇太后明徳馬皇后伏波將軍援之小女世祖時選入太子宫顯宗即位以為貴人永平三年立為皇后肅宗即位尊為皇太后賈貴人南陽人建武末選入太子宫生肅宗為貴人帝既為明德后所飬專以馬氏為外家故貴人不登極位及太后崩乃冊書加貴人王赤綬諸矦王赤綬也章德竇皇后扶風平陵人大司徒融之曽孫以選入掖庭建初三年立為皇后和帝立尊為皇太后梁貴人梁竦女建初中入掖庭生和帝竇后以為己子忌梁氏誅竦貴人以憂卒竇后崩上尊號曰恭懐皇后追服䘮服𦵏西陵和帝隂皇后光烈皇后兄執金吾識之曾孫永元四年選入掖庭為貴人八年立為后十四年坐祝詛事廢遷桐宫以憂卒立七年𦵏臨平亭部和熹鄧皇后名綏太傅禹之孫永光八年入掖庭為貴人十四年隂后廢立為皇后帝崩殤帝立尊為皇太后安思閻皇后名姬河内榮陽人元初元年以選入掖庭為貴人三年立為皇后譖皇子保廢之帝崩立北鄉侯懿尊為皇太后安帝宫人李氏生皇子保閻后專房妬忌鴆殺李氏譖廢保為濟隂王安帝崩立北鄉侯懿懿卒中黄門孫程等迎保立之為順帝遷閻太后於離宫后崩上李氏尊號曰恭愍皇后𦵏恭北陵為冊書金匱藏於世祖廟順烈梁皇后名妠音納妠娶也大將軍商之女永建三年入掖庭為貴人陽嘉元年立為皇后順帝崩冲帝立尊為皇太后虞美人以良家子選入掖庭生冲帝帝早夭大将軍梁冀秉政忌惡他族故抑而不登但稱大家而已陳夫人魏郡人少以聲技入孝王宫得幸生質帝亦以梁氏故榮寵不及熹平四年小黄門趙祐等言春秋之義母以子貴今冲帝母虞大家質帝母陳夫人皆誕聖皇而未有稱號夫臣子雖賤尚有追贈之典况二母見在不蒙崇顯之次無以述遵先世垂示後世也帝感其言乃拜虞大家為憲陵貴人陳夫人為渤海孝王妃孝王名鴻生質帝使中常侍持節授印綬遣太常以三牲告憲陵懐陵靜陵焉懐陵冲帝陵靜陵質帝陵桓帝懿獻梁皇后名女瑩順烈皇后之女弟帝立迎立為皇后皇太后崩恩愛稍衰延熹三年以恚崩在位十三年𦵏懿陵其嵗誅梁冀廢懿陵為貴人冢帝既立明年有司奏太后曰春秋迎皇后于紀在塗則稱后今大將軍冀女弟應昭聖善結昏之際有命既集帝為蠡吾侯梁太后徴欲與后為昏未及而質帝崩帝即位冊為后宜備禮進徴幣於是悉依孝惠皇帝納后故事聘黄金二萬斤納采鴈璧乘馬束帛一如舊典桓帝鄧皇后名猛女和熹皇后從兄子鄧香之女永興中進入掖庭為采女絶幸梁后崩梁冀誅立為后八年坐驕忌廢以憂死立七年葬北邙桓思竇皇后名妙章徳皇后從祖弟孫女延熹八年鄧后廢以選入掖庭為貴人其冬立為皇后帝崩靈帝立尊為皇太后靈帝宋皇后扶風平陵人肅宗宋貴人之從曾孫建寧三年選入掖庭為貴人明年立為皇后無寵為中常侍王甫及後宫幸姬等所譖坐廢以憂死靈帝冊宋貴人為皇后天子御章德殿軒百官陪位太尉襲使持節奉璽綬皇后北面帝南面太尉立階下東向宗正大長秋西向宗正讀冊文曰惟建寕四年七月乙未制詔皇后之尊與帝同體供奉天地祗承宗廟母臨天下故有莘興殷姜任母周二代之崇蓋有内徳長秋宫闕中宫曠位宋貴人垂淑媛之懿體河山之儀威容昭曜徳冠後庭羣僚所咨人曰宜哉卜之蓍龜卦得坤乾有司奏議宜稱紱組以母兆人今使太尉襲使持節奉璽紱宗正祖為副立貴人為皇后后其徃踐爾位敬尊禮典肅愼中饋毋替朕命永終天禄冊文畢皇后拜稱臣任位太尉授璽綬中常侍長秋太僕髙鄉侯覽長跪受璽紱奏於殿前女使授媫妤遂長跪受以授昭儀受長跪以帶皇后皇后伏起拜稱臣妾畢黄門鼔吹三通鳴鼔畢羣臣以次出后即位大赦天下皇后秩比國王即位威儀赤紱玉璽也漢制乘輿黄赤綬四采黄赤縹紺紱黄質長二丈九尺九寸太子太后綬與乗輿同靈思何皇后南陽宛人家夲屠者以選入掖庭風俗通曰漢以八月算人后家以金帛賂遺主者以求之也生皇子辯拜為貴人光和三年立為皇后靈帝崩皇子辯即位尊為皇太后王美人趙國人以良家子選入掖庭生皇子協何后妬而酖之董卓既廢少帝立協是為獻帝後追尊為靈懐皇后改𦵏文昭陵獻帝伏皇后名壽瑯琊東武人大司徒湛之八世孫初平元年入掖庭為貴人興平二年立為皇后建安十九年為曹操所殺在位二十年獻穆曹皇后名節魏公曹操之中女建安十八年操進三女憲節華為夫人聘以束帛元纁五萬匹小者待年於國留住於國以待年長十九年並拜貴人伏皇后殺立節為皇后在位七年帝禪於魏降為山陽公夫人魏景初元年薨合𦵏禪陵范曄論曰漢世皇后無諡皆因帝諡以為稱雖呂氏專政上官臨制亦無殊號上官昭帝后也中興明帝始建光烈之稱其後並以德為配至於賢愚優劣混同一貫故馬竇二后俱稱徳焉其餘惟帝之庶母及蕃王乘統以追尊之重特為其號如恭懐孝崇之比是也初平中蔡邕始追正和熹之諡蔡邕集議曰漢世母氏無諡至於明帝始建光烈之稱是後轉因帝號加之以徳上下優劣混而為一違禮大行受大名小行受小名之制諡法有功安人曰熹帝后一體禮亦宜同大行皇太后諡宜為和熹其安思順烈以下皆依而加焉魏因漢法母后之號皆如舊制自夫人以下世有增損太祖建國始命王后其下五等有夫人有昭儀有偼伃有容華有美人文帝増貴嬪淑媛修容順成良人明帝増淑妃昭華修儀除順成官太和中始復命夫人登其位於淑妃之上自夫人以下爵凡十二等貴嬪夫人位次皇后爵無所視淑妃位視相國爵比諸侯王淑媛位視御史大夫爵比縣公昭儀比縣侯昭華比鄉侯修容比亭侯修儀比闗内侯偼伃視中二千石容華視眞二千石美人視比二千石良人視千石武宣卞皇后瑯琊開陽人本倡家年二十太祖納之於譙為妾生文帝諸子無母者皆令母飬之建安二十四年拜為王后文帝受禪尊為皇太后文昭甄皇后中山無極人本袁熙妻冀州平文帝納之生明帝皇初二年以怨望賜死明帝即位追諡文德郭皇后安平廣宗人太祖時得入東宫文帝為太子立為夫人及踐祚為貴嬪皇初三年立為皇后明帝即位尊為皇太后明悼毛皇后河内人皇初中以選入東宫明帝即位以為貴嬪太和元年立為皇后景初元年以愛弛賜死加諡𦵏愍陵明元郭皇后西平人世河右大族皇初中夲郡反叛遂没入宫明帝愛幸之拜為夫人後立為皇后齊王即位尊為皇太后魏制天子冊后以皮馬庭實加榖珪齊王正始四年立后甄氏其儀不存晉景獻羊皇后名徵瑜泰山南城人景帝納之無子武帝愛禪居𢎞訓宫號𢎞訓太后咸寧四年崩文明王皇后名元姬東海郯人父肅魏中領軍蘭陵侯歸於文帝生武帝帝受禪尊為皇太后宫曰崇化初置宫卿重其選以太常諸葛緒為衛尉太僕劉原為太僕宗正曹楷為少府四年崩武元楊皇后名艷𢎞農華陽人父文宗武帝為世子聘之即位立為皇后有司奏依漢故事皇后太子各食湯沐邑四十縣而帝以非古典不許生惠帝泰始十年崩𦵏峻陽陵泰始中帝博選良家以充後宫先下書禁天下嫁娶使宦者乗使車給騶騎州郡召充選者使后㨂擇后性妬惟取潔白長大端正美麗者司徒李允領軍大將軍胡奮廷尉諸葛冲太僕臧權侍中馮蓀祕書郎左思及世族子女並充三夫人九嬪之列司冀兗豫四州二千石將吏家補良人以下名家盛族子女多敗衣瘁貌以避之九年帝多遣良家子女以充内職自擇其美者以絳紗繫臂平呉之後復納孫皓宫人數千自此掖庭殆將萬人而並寵者甚衆帝莫知所適常乘羊車恣其所之至便宴寢宫人乃取竹葉插户以鹽汁灑地而引帝車十年將聘三夫人九嬪有司奏禮皇后聘以榖珪無妾媵禮贄之制詔曰拜授可依魏氏故事於是臨軒使使持節兼太常拜三夫人兼御史中丞拜九嬪武悼楊皇后名芷元后從妹父駿以咸寧二年立為皇后惠帝立尊為皇太后武帝咸寧二年臨軒遣太尉賈充冊立皇后楊氏因大赦賜王公以下各有差百僚上禮納悼后太康八年有司奏大婚納徵用元纁束帛加榖珪馬二駟羊鴈酒米如故尚書朱整議按魏昏故事天子以皮馬為庭實加以榖珪左貴嬪名芬兄思好學善文名亞於思武帝聞其名納之拜修儀胡貴嬪名芳父奮泰始九年納宫中拜貴嬪生武安公主諸葛夫人名婉瑯琊陽都人父冲以泰始九年入宫拜為夫人惠賈皇后名南風平陽人父充泰始八年冊拜太子妃帝即位立為皇后干政廢楊太后淫恣在位十一年趙王倫等廢而殺之惠羊皇后名獻容泰山南城人賈后既廢孫秀乃立為皇后時太安元年成都王潁奏廢為庶人陳眕等伐乂復后位張方入洛又廢后大駕幸長安又復永興初又廢河間王顒欲殺后周馥止之帝崩懐帝立尊為惠皇后居𢎞訓宫洛陽敗没於劉曜曜僭位以為后生二子而死偽諡文獻皇后先公曰自司馬懿廢齊王芳司馬昭弑髙貴鄉公而皆假太后以為言既以此得成簒矣詎意其後改易詔書黜亮升駿者后為之也偽立文字弑武悼殺愍懐者后為之也彼羊后區區一放廢婦人囚處宫圍何預世事而今日復明日廢紛紛未巳何邪姦人常懼有假之以舉事如前之為者是以一人復之則一人廢之至辱於非類而後已哀哉誰實基之謝夫人名玖父以屠羊為業武帝時入後庭為才人帝以賜太子生皇孫遹遹立為太子拜淑媛及愍懐太子遇害玖亦死懐帝王太后名瑗武帝宫才人生懐帝早卒帝即位追尊曰皇太后元帝夏侯太妃名光姬沛國譙人瑯琊武王為世子納焉生元帝帝嗣位稱王太妃永嘉初薨於江左元敬虞皇后名孟母濟陽外黄人父豫元帝為瑯琊王納為妃無子永嘉六年薨大興三年追冊為皇后豫章君荀氏元帝宫人生明帝帝即位封建安君成帝立尊重同於太后咸康元年薨明穆庾皇后名文君潁川鄢陵人父琛元帝聘為太子妃明帝即位立為皇后成帝即位尊為皇太后晉太康中有司奏太子昏納徵用元纁束帛加璧羊馬二駟東普太子昏納徴禮用玉璧一虎皮二王彪之上書曰或者虎取威猛有斑彩蔚玉象徳而有潤珪璋亦玉之羙者豹皮彩蔚以譬君子王肅納徵辭云元纁束帛儷皮鴈羊前漢亦無用羊之禮鄭氏昏物贊曰羊者祥也婚之有羊自漢末始成恭杜皇后名陵陽京兆人鎭南將軍預之曾孫成帝備禮拜為皇后在位六年崩年二十一咸康二年帝臨軒遣使持節兼太保領軍諸葛恢兼太尉䕶軍孔愉六禮備物拜皇后杜氏即日入宫帝御太極殿羣臣畢賀賀非禮也王者昏禮禮無其制春秋祭公逆王后于紀榖梁左氏説與公羊又不同而况漢魏遺事闕略者衆晉武惠納后江左又無儀注故成帝將納杜后太常華恒始與博士參定其儀據杜元凱左氏傳説主昏是供其昏禮之幣而已又周靈王求昏於齊先儒以為邱明詳録為王者昏禮故成帝臨軒遣使稱制拜后然其儀注又不具存章太妃周氏以選入成帝宫生哀帝及海西公拜貴人哀帝即位詔有司議貴人位號太尉桓温議宜稱夫人尚書僕射江霦議應曰太夫人詔崇為皇太妃儀服與太后同康獻禇皇后名蒜子河南陽翟人父裒少以名家入為瑯琊王妃康帝即位立為皇后穆帝即位尊為皇太后康帝建元元年納后禇氏而儀注陛者不設旄頭殿中御史奏今迎皇后依昔成恭皇后入宫御物而儀注至尊衮冕升殿旄頭不設昔迎恭皇后唯作青龍旗其餘皆即御物今臨軒遣使而五牛旗旄頭畢罕並出即用舊制今闕詔曰今所以正法服升太極者以敬其始故備禮也今何闕所重而撤法物邪又恭后神主入廟先帝詔后禮宜有降不宜建五牛旗既不設五旗則旄頭畢罕易具也又詔舊制既難具於今而備法服儀飾粗舉兼副雜器停之穆帝永和十年臺符問六禮版文舊稱皇帝今太后臨朝當何稱博士曹耽云公羊傳昏禮不稱主人母命諸父為主𫝊紀履繻來逆女不稱使也無母辭窮乃命使者耳太常王彪之云三傳異義不可全據今皇后臨朝稱制文告所逹國之大典皆仰禀成命非無外事也豈婚聘獨不通乎六禮版文應稱皇太后詔彪之又曰天子嫁女使同姓之國為主者以受體於皇極則有虧婚姻之敵禮至於迎后之制必禮成而後入雖復戚屬之尊亦臣妾也天王之后寧可先之蕃國然後入臨六宫乎是以祭公來迎王后於紀使我為媒不云為主符又問今后還政不復臨朝當何稱彪之云當稱皇帝詔升平元年將納皇后何氏彪之正禮始更大引經傳及諸故事深非公羊昏禮不稱主人之義曰王者之於四海無不臣妾雖復父兄之親師友之賢皆純臣也夫崇三綱之始定乾坤之儀安有天父之尊而稱臣下之命以納伉儷安有臣下之卑而稱天父之名以行大禮逺尋古禮於義不通按咸寧二年納悼皇后時𢎞訓太后臨天下而無命戚屬之臣為武皇父兄主婚之文考咸寧故事不稱父兄師友則咸康華恒所上合於舊也謂今納后儀制一依咸寧故事從之華恒定六禮云宜依舊及大晉已行之制此恒猶識前事故王彪之多從咸康由此也唯以娶婦之家三日不舉樂而咸康羣臣賀為失禮故但依咸寕上禮群臣不復賀也其告廟六禮版文等皆彪之所定博士孫納云凡六禮版長尺二寸以應十二月博四寸以象四時厚八分以象八節皆眞書后家答則以鮫脚書之納采用鴈一頭白羊一口酒十二斛文曰皇帝咨前大尉參軍都鄉侯何渾元資始肇經人倫爰及夫婦以奉宗廟天地社稷謀於公卿咸以為宜率由舊典今使持節崇德衛尉領太常彪之兼宗正散騎侍郎綜以禮納采后家答曰皇帝嘉命訪昏陋族備數采擇臣之先臣散騎侍郎凖之遺女未閑教訓衣履若如人欽承舊章肅奉典制前太尉參軍都鄉侯糞土臣何琦頓首稽首再拜承制問名用鴈羊如前文曰皇帝曰咨前某官侯何兩儀配合承天統物正位於内必侯名族重申舊典今使持節某官彪之某官綜以禮問名后家答曰皇帝嘉命使者彪之重宣中詔問臣名族女父母所生先臣故光祿大夫雩婁侯禎之遺元孫先臣故豫州刺史闗内侯惲之曽孫先臣故安豐太守闗内中侯友之孫先臣故散騎侍郎凖之遺女外出自於先臣故内書左丞孔胄之外曽孫先臣故侍中闗内侯夷之外孫女年十七欽承舊章肅奉典制前某官某侯糞土臣何琦稽首頓首再拜恭承制詔納吉用鴈羊酒如前文曰皇帝曰咨前某官某侯何人謀龜從僉曰貞吉敬順典禮今使持節某官彪之某官綜以禮納吉后家答曰皇帝嘉命使者彪之重宣中詔大卜元吉臣陋族卑鄙憂懼不堪欽承舊章肅奉典制前某官某侯糞土臣何琦稽首頓首再拜承制納徵用白羊一口元纁帛三疋絳二疋絹二百疋獸皮二枚錢二百萬玉璧一枚酒十二斛馬六駟文曰皇帝曰咨某官某侯何之族女有母儀之徳窈窕之姿如山如河宜奉宗廟永承天祚以元纁皮馬羊錢璧以章典禮今使持節兼司徒光禄勲闗内侯恪崇徳衛尉領太常彪之以禮納徵后家答皇帝嘉命使者恪重宣中詔降昏卑陋命以上公寵以豐禮備物典冊欽承舊章肅奉典制前某官某侯云云再拜承制詔請期用鴈羊酒米如初文曰皇帝曰咨前某官某侯何謀於公卿大筮元龜罔有不臧率遵典禮今使某官彪之某官綜以禮請期后家答皇帝嘉命使者彪之重宣中詔吉日惟八月壬子可迎臣欽承舊章肅奉典制前某官某侯某再拜承制詔迎用鴈羊酒米如初文曰皇帝曰咨前某官某侯何嵗吉月令吉日唯未率禮以迎今遣使持節兼太保侍中太宰武陵王晞迎后家答皇帝嘉命使者晞重宣中詔令月吉辰備禮以迎上公宗卿兼至副介近臣百兩臣螻蟻之族猥承大禮憂懼戰悸欽承舊章肅奉典制前某官某侯糞土臣某謹因使者兼某官某侯王晞上謹答冊皇后文曰惟升平元年八月皇帝使使持節兼太保侍中太宰武陵王晞冊命故散騎侍郎女何氏為皇后咨爾易本乾坤詩首闗雎王化之本實由内輔是故皇英嬪虞帝道以光任姒母周允嗣克崇皇后其祗朂厥徳以肅承宗廟䖍恭中饋盡敬婦道帥導六宫作軌儀於四海皇天無親惟徳是依可不愼歟穆章何皇后名法倪廬江灊人父凖升平八年以名家膺選冊為皇后無子哀帝即位稱穆皇后居永安宫永興三年崩年六十六在位四十八年哀靖王皇后名穆之大原晉陽人司徒左長使濛之女哀帝即位以王妃立為皇后無子在位三年興慶三年崩廢帝庾皇后名道憐潁川􅋣陵人父冰初為東海王妃王即位立為后太和六年崩帝廢追贈為海西公夫人簡文宣鄭太后名阿春河南滎陽人先適渤海田氏生一男而寡元帝納之生簡文帝咸和元年薨簡文即位未及追崇孝武時追上尊號曰簡文太后簡文順王皇后名簡姬太原晉陽人父遐選為會稽王妃生子道生失意以憂死孝武帝即位追尊曰順皇后合𦵏髙平陵孝武文李太后名陵容本出微賤簡文屢失子召幸之生孝武帝帝即位尊為淑妃後追為皇太妃孝武定王皇后名法慧哀靖皇后之姪父藴孝武即位納為后太元五年崩年二十一𦵏隆平陵安德陳皇后名歸女松滋潯陽人孝武時入宫為淑媛生安恭二帝後追崇曰太后安僖王皇后名神愛瑯琊臨沂人父獻之初為太子妃安帝即位立為皇后無子義熙八年崩年二十九𦵏休平陵恭思禇皇后名靈媛河南陽翟人父爽初為瑯琊王妃恭帝即位立為皇后帝禪位降為零陵王妃宋元嘉十三年崩年五十三祔𦵏冲平陵文獻通考卷二百五十三
