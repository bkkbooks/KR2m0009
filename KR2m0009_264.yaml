body:
  text: 文獻通考卷二百六十四鄱陽馬端臨貴與著封建考五春秋列國傳授本末事跡周周姬姓公爵國在王畿内扶風雍縣唐改為天興成王封周公於魯周公元子伯禽就封於魯次子留相王室代為周公桓公五年鄭伯不朝王以諸侯伐鄭鄭禦之王為中軍虢公林父將右軍蔡衞屬焉周公黑肩將左軍陳人屬焉黑肩即周桓公也王卒大敗十八年周公欲弑莊王而立王子克莊王弟辛伯告王遂與王殺周公黒肩王子克奔燕初子儀有寵於桓王子儀即王子克桓王屬諸周公辛伯諌曰並后妾如后匹嫡庶如嫡兩政臣擅命耦國都如國亂之本也周公弗從故及僖公九年周公㑹齊侯及諸侯盟於葵邱周公宰孔也王使宰孔賜齊侯胙二十四年頹叔桃子奉太叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰三十年王使周公閲來聘饗有昌歜白黒形鹽昌歜昌蒲葅白熬稻黒熬黍形鹽鹽形象虎辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉榖鹽虎形以獻其功吾何以堪之文公十四年頃王崩周公閲與王孫蘓争政故不赴周公與王孫蘓訟於晉王叛王孫蘓王匡王而使尹氏與聃啓訟周公於晉趙宣子平王室而復之成公十一年周公楚惡惠襄之偪也惠王襄王之族且與伯輿争政伯輿周卿士不勝怒而出及陽樊王使劉子復之盟於鄄而入三日復出奔晉王既復之而復出所以自絶於周召召姬姓伯爵國在王畿内雍縣東南今王屋縣召康公奭受封於燕而食采於召其後世世輔王室厲王行暴虐國人謗王召穆公虎諫曰民不堪命矣王怒得衞巫使監謗者以告則殺之國人莫敢言道路以目王告召公曰吾能弭謗矣召公曰是鄣之也防民之口甚於防川川壅而潰傷人必多民亦如之王不聽國人畔襲王王出奔彘太子静匿召公之家國人圍之召公曰昔吾驟諫王王不從以及此難也今殺王太子王其以我為讐而懟怒乎乃以其子代王太子太子得脱周公召公二相行政號曰共和共和十四年厲王死於彘太子静長於召公家二相共立之是為宣王宣王即位命穆公平淮夷告成於王王錫以圭瓚秬鬯一卣錫之土田穆公作常武之詩以美宣王僖公十一年王使召武公賜晉惠公命宣公十五年王孫蘓與召氏毛氏争政使王子㨗殺召戴公及毛伯衞卒立召襄襄召戴公之子成公八年王使召桓公來賜魯公命昭公二十二年景王崩既葬王子朝因舊官百工之喪職秩者與靈景之族以作亂逐劉子單子王子還與召莊公謀殺單子還及召莊公奐皆子朝黨二十六年召伯盈逐王子朝伯盈本子朝黨晉師克鞏知子朝不成更逐之而立敬王王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚召伯逆王於尸及劉子單子盟召伯新還故盟二十九年三月京師人殺召伯盈尹氏固及原伯魯之子皆子朝黨也劉劉姬姓子爵國在畿内河南緱氏縣西北今緱氏西城舊有劉亭劉子世為王卿士宣公十年劉康公報聘於魯去年王來徵聘孟獻子聘於周也成公元年晉侯使瑕嘉平戎於王劉康公徼戎將遂伐之叔服曰背盟而欺大國必敗不聽遂伐茅戎敗績於徐吾氏十一年晉郤至與周争鄇田王命劉康公單襄公訟諸晉郤至曰温吾故也故不敢失劉子單子曰昔周克商使諸侯撫封蘓忿生以温為司寇與檀伯達封於河蘓氏即狄又不能於狄而奔衞襄王勞文公而賜之温狐氏陽氏先處之而後及子若治其故則王官之邑也子安得之晉侯使郤至勿敢争十三年劉康公㑹晉侯及諸侯伐秦成肅公受脤於社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎十四年王使劉定公賜齊侯命昭公元年晉趙武楚公子圍㑹諸侯于虢王使劉定公勞趙孟於潁館於洛汭劉子曰美哉禹功明德逺矣微禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也子盍亦績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將至而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕於𨽻人朝不謀夕棄神人矣神怒民叛何以能乆趙孟不復年矣昭公二十二年初王子朝賓起有寵於景王子朝景王長庶子賓起子朝傅王與賓孟説之孟即賓起欲立之劉獻公之庶子伯蚠事單穆公獻公劉摯伯蚠劉狄穆公單旗惡賓孟之為人也願殺之又惡王子朝之言以為亂願去之子朝有欲位之言夏王田北山使公卿皆從將殺劉子單子王知劉單不欲立子朝欲先期殺之王有心疾乙丑崩於榮錡氏戊辰劉子摯卒無子單子立劉蚠五月庚辰見王見王猛遂攻賓起殺之盟羣王子于單氏丁巳葬景王王子朝因舊官百工之喪職秩者與靈景之族以作亂靈王景王之子也帥郊要餞之甲三邑周地以逐劉子劉子奔揚單子逆悼王於莊宫以歸王子還夜取王以如莊宫王子還子朝黨不欲使單子得王猛故取之癸亥單子出失王故出奔王子還與召莊公謀曰不殺單旗不㨗遂奉王以追單子及領大盟而復領周地欲重盟令單子劉子復歸然後背盟殺之殺摯荒以説劉子如劉單子亡奔於平畤知還欲背盟故奔羣王子追之單子殺還姑發弱鬷延定稠八子靈景之族因戰而殺之子朝奔京其黨死故丙寅伐之單子伐京京人奔山劉子入於王城子朝奔京故得入辛未鞏簡公敗績於京乙亥甘平公亦敗焉甘鞏二公周卿士為子朝所敗單子欲告急於晉以王如平畤遂如圃車次於皇出次以示急劉子如劉單子使王子處守於王城守王城距子朝盟百工於平宫鄩肸伐皇大敗子朝黨司徒醜以王師敗績於前城百工叛司徒醜敗故伐單氏之宫敗焉百工伐單氏為單氏所敗庚午反伐之單氏反伐百工辛未伐東圉百工所在冬十月丁巳晉籍談荀躒帥九州之戎及焦瑕温原之師以納王於王城庚申單子劉蚠以王師敗績於郊為子朝之黨所敗前城人敗陸渾於社前城子朝衆十一月乙酉王子猛卒不成喪也未即位周人諡曰悼王所以不稱崩己丑敬王即位子猛母弟館于子旅氏周大夫二十三年四月單子取訾劉子取牆人直人二邑屬子朝六月王子朝入於尹自京入尹氏之邑癸未尹圉誘劉佗殺之尹圉尹文公也劉佗劉蚠族敬王黨丙戌單子從阪道劉子從尹道伐尹單子先至而敗劉子還己丑召伯奐南宫極以成周人戍尹二子周卿士子朝黨庚寅單子劉子樊齊以王如劉辟子朝出居劉子邑甲午王子朝入於王城次於左巷鄩羅納諸莊宫周大夫尹辛敗劉師於唐丙辰又敗諸鄩甲子尹辛取西闈西闈周地丙寅攻蒯蒯潰二十六年單子如晉告急劉人敗王城之師於尹氏劉人劉蚠之族王城子朝之徒戊辰王城人劉氏戰于施谷劉氏敗績七月劉子以王出師敗故次於渠周地王城人焚劉王宿於禇氏晉知躒趙鞅帥師納王召伯盈逐王子朝子朝奔楚召伯逆王於尸及劉子單子盟癸酉王入于成周定公四年劉文公㑹晉及諸侯于召陵謀伐楚也七年周儋翩入於儀栗以叛儀栗周邑單武公劉桓公敗尹氏於窮谷尹氏復黨儋翩共為亂也八年劉子伐儀栗伐盂以定王室討儋翩之黨哀公三年初劉氏范氏世為婚姻萇宏事劉文公故周與范氏趙鞅以為討六月周人殺萇宏及定王時劉氏亡國語單單姬姓伯爵國在畿内單伯世為王卿士莊公十四年齊侯以諸侯伐宋以其背北杏之㑹故也齊請師於周欲崇天子假王命以示大順單子㑹之取成於宋而還文公十四年魯襄仲使告於王請以王寵求叔姬於齊叔姬魯女齊昭公夫人生子舍無寵為公子商人弑之而自立曰殺其子焉用其母請受而罪之冬單子如齊請子叔姬齊人執之恨魯恃王勢求女又執子叔姬十五年齊人許單伯請而赦之使致命於魯成公元年晉侯使瑕嘉平戎於王單襄公如晉拜成十二年郤至與周争鄇田王命劉康公單襄公訟諸晉語見劉子十七年單子㑹晉侯及諸侯之師伐鄭襄公三年公㑹單頃公及諸侯同盟于雞澤十年王叔陳生與伯輿争政二子王卿士晉侯使士匄平王室王使叔氏與伯輿合要要辭也王叔氏不能舉其契王叔奔晉單靖公為卿士以相王室代王叔昭公十一年單子㑹韓宣子于戚視下言徐叔向曰單子其將死乎朝有著定著定朝内列位常處謂之表著㑹有表野㑹設表以為位衣有襘𢃄有結襘領㑹結帯結㑹朝之言必聞於表著之位所以昭事序也視不過結襘之中所以道容貎也言以命之容貎以明之失則有闕今單子為王官伯而命事於㑹視不登帯言不過步貎不道容而言不昭矣不道不共不昭不從無守氣矣冬單成公卒景王鑄大錢及無射單穆公諫不聽二十二年景王崩劉子單子立王子猛王子朝作亂語見劉子定公八年單子伐榖城簡城以定王室討儋翩之亂祭祭姬姓伯爵周公之後國於畿内在陳留長垣縣今鄭州管城有祭城世為王卿士穆王將征犬戎祭公謀父諫曰不可先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震韋昭曰震懼也是故周文公之頌韋昭曰文公周公旦之諡曰載戢干戈載櫜弓矢唐固曰櫜韜也我求懿德肆于時夏允王保之韋昭曰言武王常求美德故陳其功於是夏而歌之信哉武王能保此時夏之美樂章大者曰夏先王之於民也茂正其德而厚其性阜其財求而利其器用明利害之鄉韋昭曰鄉方也以文修之使之務利而辟害懷德而畏威故能保世以滋大昔我先王世后稷韋昭曰謂棄與不窋也唐固曰父子相繼曰世以服事虞夏及夏之衰也正義曰謂太康也棄稷不務正義曰言太康棄廢稷官我先王不窋用失其官而自竄於戎狄之間不敢怠業時序其德遵修其緒徐廣曰遵一作纂修其訓典朝夕恪勤守以敦篤奉以忠信奕世載德不忝前人正義曰前人謂后稷也言不窋亦世載德不忝后稷及文王武王無不務農事至於文王武王昭前之光明而加之以慈和事神保民無不欣喜商王帝辛大惡於民庶民不忍訢戴武王以致戎於商牧正義曰紂近郊地名牧野是故先王非務武也勤恤民隱而除其害也夫先王之制邦内甸服邦外侯服侯衞賓服韋昭曰此總言之也侯侯圻衞衞圻也夷蠻要服戎翟荒服甸服者祭韋昭曰供日祭侯服者祀韋昭曰供月祀賓服者享韋昭曰供時享要服者貢韋昭曰供歲貢荒服者王韋昭曰王王事天子也詩曰莫敢不來王日祭月祀時享歲貢終王先王之順祀也徐廣曰外傳云先王之訓有不祭則修意韋昭曰先修志意以自責也畿内近知王意也有不祀則修言韋昭曰言號令也有不享則修文韋昭曰文典法也有不貢則修名韋昭曰名謂尊卑職貢之名號也有不王則修德韋昭曰逺人不服則修文德以來之序成而有不至則修刑韋昭曰序成謂上五者次序已成有不至則有刑罰也於是有刑不祭伐不祀征不享讓不貢告不王於是有刑罰之辟有攻伐之兵有征討之備有威讓之命有文告之辭布令陳辭而有不至則増修於德無勤民於逺是以近無不聽逺無不服今自大畢伯士之終也徐廣曰犬戎之君犬戎氏以其職來王正義賈逵云大畢伯士犬戎氏之二君也白狼白鹿犬戎之職貢也按大畢伯士終後犬戎氏常以其職來王天子曰正義曰祭公言穆王之意故云天子曰予必以不享征之且觀之兵無乃廢先王之訓而王幾頓乎正義曰幾音祈吾聞犬戎樹敦徐廣曰樹一作􅈪駰案韋昭曰樹立也言犬戎立性敦篤也率舊德而守終純固其有以禦我矣王遂征之得四白狼四白鹿以歸自是荒服者不至王欲肆其心周行天下將必有車轍馬跡焉祭公謀父作祈招之詩以止王心祈父周司馬世掌甲兵之職招其名祭公方諫游行故指司馬官而言其詩曰祈招之愔愔式昭德音思我王度式如玉式如金形民之力而無醉飽之心王是以獲沒於祇宫獲沒不見篡弑隱公元年祭伯來非王命也釋所以不稱使桓公八年祭公來遂逆王后于紀凡凡姬姓伯爵周公之後國於畿内在汲郡共縣今衞州共城縣世為王卿士厲王幽王之時凡伯作板瞻卬召旻諸詩以刺王隱公七年戎朝于周發幣于公卿凡伯弗賓冬王使凡伯來聘還戎伐之于楚邱以歸蘓蘓其姓未詳子爵周武王時蘓忿生為司寇封於温為畿内之國地在河内温縣幽王時蘓成公與暴辛公共為卿士為暴公所譖作何人斯隐公十一年王取鄔劉蒍邘之田于鄭而與鄭人蘓忿生之田温原絺樊隰郕櫕茅向盟州陘隤懷時蘓氏叛王十二邑王不能有故以與鄭莊公十九年蒍國邊伯石速詹父子禽祝跪作亂因蘓氏桓王奪蘓十二邑以與鄭自此以來遂不和秋五大夫奉子頹以伐王不克出奔温蘓邑蘓子奉子頽以奔衞衞燕伐周納子頹僖公十年狄滅温蘓子無信也蘓子叛王即狄不能於狄狄人伐之王不救故滅蘓子奔衞文公十年及蘓子盟于女栗頃王立故也僖十年狄滅温今復見蓋王復之成十一年晉郤至與周争鄇田王命劉康公單襄公訟諸晉郤至曰温吾故也故不敢失言温郤氏舊邑劉子單子曰昔周克商使諸侯撫封各撫有其封内之地蘓忿生以温為司寇與檀伯達封於河謂俱封於河内蘓氏即狄又不能於狄而奔衞襄王勞文公而賜之温狐氏陽氏先處之狐溱陽處父先食温也而後及子若治其故則王官之邑也子安得之晉侯使郤至勿敢争毛毛姬姓伯爵文王之後封於毛地在畿内成王時為卿士與召公芮伯彤伯畢公衞侯同受顧命立康王自此世為王卿士文公元年王使毛伯衞來錫公命九年毛伯衞來求金襄王崩求金以共葬事宣公十五年王孫蘓與召氏毛氏争政使王子㨗殺召戴公及毛伯衞昭公十八年二月乙卯周毛得殺毛伯過得過之族而代之萇宏曰毛得必亡是昆吾稔之日也侈故之以昆吾夏伯稔熟侈惡積熟以乙卯日與桀同誅而毛得以濟侈於王都不亡何待二十六年尹氏召伯毛伯以王子朝奔楚語見劉子右周召劉單祭凡蘓毛皆王畿内之國世為王卿士先王之時諸侯之有功德者則入輔王室如成王時召太保芮伯彤伯畢公衞侯毛公為六卿召畢毛皆兼三公齊侯吕伋為王虎賁氏後來如衞鄭二武公亦入為王卿士皆外諸侯也東遷而後王室微弱號令不能行於畿外春秋之初鄭與虢尚迭為卿士然争政怨怒至於交質交惡稱兵構逆王夷師熸而名義蕩然矣其後虢為晉所滅鄭亦不復聽王室之令齊晉迭伯而列國之所為奔走後先者知有盟主而已王室之政付之畿内食采邑之小國然温已叛去其地入於狄與晉凡祭僅再見於隐桓之間而已後不復聞惟周召劉單世執王室之政柄云徐徐嬴姓子爵出自柏翳國始封於夏歴殷周國在下邳僮縣今泗州臨淮有徐城武王崩成王㓜周公攝政三監及徐商奄叛周周公討之殺管蔡武庚踐奄踐滅也寧東土及伯禽封於魯而徐戎淮夷復寇東郊伯禽討之作費誓穆王西廵守樂而㤀歸徐君誕僭稱偃王行仁義除刑争四方諸侯争辯者無所質正咸賓祭於徐贄玉帛死生之物於徐庭者三十六國得朱弓赤矢之瑞穆王聞之乃命造父御長驅而歸與楚連謀伐徐偃王失國走死彭城武原山下宣王時徐方不庭王命太師皇父程伯休甫總六師以討之僖公三年徐人取舒舒國亦廬江舒縣勝國而不用大師亦曰取十五年春楚人伐徐徐即諸夏故也三月齊侯及諸侯盟于牡邱尋葵邱之盟且救徐也孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之冬楚敗徐于婁林徐恃救也恃齊救十七年春齊人為徐伐英氏以報婁林之役也文公七年徐伐莒成公七年吳伐巢伐徐楚子重奔命救巢徐昭公四年楚子㑹諸侯于申徐子吳出也以為貳焉故執諸申六年徐儀楚聘於楚儀楚徐大夫楚子執之逃歸懼其叛也使薳洩伐徐吳救徐敗楚師於房鍾十二年楚子狩於州來次於潁尾使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳楚子次於乾谿以為之援十六年齊侯伐徐師至於蒲隧徐地徐人行成徐子及郯人莒人㑹齊侯盟於蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉為小國害齊君之無道也興師而伐逺方㑹之有成而還莫之亢也亢禦也無伯也夫三十年吳子伐徐防山以水之防壅山水以灌徐己卯滅徐徐子章禹斷其髪自刑示懼擕其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚楚沈尹戍帥師救徐弗及遂城夷使徐子處之夷城父也先儒林少穎言周自文武興於西土而化行於南故西夷最先服而東夷之服為最後是以武王牧野之戰方與商師决勝負於行陣之間而西南夷之邦所謂庸蜀羌髳微盧彭濮者己皆作使而成王之即政天下已太平矣東夷之徐奄猶興兵以叛也愚按徐雖柏翳之後有國己乆而俗流於夷周初一叛於三監流言之時再叛於伯禽撫封之日周公魯公僅能定之至穆王稍有荒縱逺狩之失而偃王者遽爾僭號侈然有朝諸侯有天下之意洎厲王無道宣王撥亂之始而繹騷於南國者又徐也然則徐於西周之時蓋常常稱亂於東南及東遷之後徐始微弱而東南之鴟張僭竊北向以争諸侯者荆楚吳越相繼興矣其後徐益以弱服屬於吳楚之間而卒不得免焉然吳楚倔强於東周衰微之後而徐倔强於西周鼎盛之時則其初本非弱國也戎隱公二年公㑹戎于潛修惠公之好也戎請盟公辭陳留濟陽縣東南有戎城戎請盟秋盟于唐復修戎好也七年初戎朝於周發幣於公卿凡伯弗賓冬王使凡伯聘於魯還戎伐之于楚邱以歸九年北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也公子突曰使勇而無剛者嘗寇而速去之突鄭厲公嘗試也勇則能徃無剛不耻退君為三覆以待之覆伏兵戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之戎人之前遇覆者奔祝聃逐之衷戎師戎前後及中遇三覆皆受敵故曰衷戎師前後擊之盡殪戎師大奔十一月甲寅鄭人大敗戎師桓公六年北戎伐齊齊侯使乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻於齊於是諸侯之大夫戍齊莊公十八年公追戎于濟西不言其來諱之也戎來侵魯魯不知去乃追之故諱不言其來二十年齊人伐戎三十年魯公及齊侯遇於魯濟謀山戎也以其病燕故也北燕幽薊齊人伐山戎山戎北狄三十一年齊侯來獻戎㨗榖梁傳曰桓内無因國外無從諸侯而越千里之險北伐山戎危之也内無因縁山戎左右之國為内間者外無諸侯者不煩役寮國則非之乎善之也何善乎爾燕周之分子也召康公之後周之别子孫貢職不至山戎為之伐矣閔公二年虢公敗犬戎於渭汭犬戎西戎别在中國者僖公二年虢公敗戎於桑田桑田虢地在𢎞農陜縣十年齊侯許男伐北戎十一年揚拒泉臯伊雒之戎同伐京師入王城焚東門揚拒泉臯皆戎邑及諸雜居伊水洛水之間者今伊闕北有泉亭王子𢃄召之也子帯召戎欲因以篡位秦晉伐戎以救周秋晉侯平戎於王十二年王以戎難故討王子帯王子𢃄奔齊冬齊侯使管夷吾平戎於王使隰朋平戎於晉平和也前年晉救周伐戎故戎與周晋不和十三年為戎難故諸侯戍周齊仲孫湫致之十六年王以戎難告於齊齊徵諸侯而戍周二十二年初平王之東遷也辛有適伊川見被髪而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晋遷陸渾之戎於伊川允姓之戎居陸渾在秦晋西北二國誘而徙之遂去戎號至今為陸渾縣也三十三年晋及姜戎敗秦師于殽文公八年魯公子遂㑹伊雒之戎盟于暴暴鄭地十六年楚大饑戎伐其西南至於阜山師於大林又伐其東南至於陽丘以侵訾枝戎山夷也大林陽丘訾枝皆楚邑也十七年周甘歜敗戎於邥垂乗其飲酒也歜周大夫邥垂周地在河南新城縣北宣公三年楚子伐陸渾之戎遂至於雒觀兵於周疆定王使王孫滿勞楚子成公元年晉侯使瑕嘉平戎於王平文十七年邥垂之役單襄公如晉拜成劉康公徼戎將遂伐之欲要其無備叔服曰背盟而欺大國此必敗背盟不祥欺大國不義將何以勝不聽遂伐茅戎三月癸未敗績於徐吾氏徐吾氏茅戎之别也六年晉伯宗夏陽説衞孫良夫寗相鄭人伊雒之戎陸渾蠻氏侵宋蠻氏戎别種也河南新城縣東南有蠻城以其辭㑹也前年宋辭蟲牢之盟襄公四年無終子嘉父使孟樂如晉無終山戎國名孟樂其使臣因魏莊子納虎豹之皮以請和諸戎莊子魏絳晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則擕貳勞師於戎而楚伐陳必不能救是棄陳也諸華必叛戎禽獸也獲戎失華無乃不可乎和戎有五利焉戎狄荐居貴貨易土土可賈焉一也邊鄙不聳民狎其野穯人成功二也戎狄事晉四鄰震動諸侯威懐三也以德綏戎師徒不勤甲兵不頓頓壞也四也鑒於后羿而用德度逺至邇安五也君其圖之公説使魏絳盟諸戎修民事田以時五年王使王叔陳生愬戎于晋戎陵虣周室故告愬於盟主晋人執之士魴如京師言王叔之貳於戎也王叔反有貳心於戎失奉使之義故晋執之十四年晋及諸侯㑹於向將執戎子駒支范宣子親數諸朝行之所在亦設朝位曰來姜戎氏昔秦人廹逐乃祖吾離於𤓰州四嶽之後皆姓姜又别為允姓𤓰州地在今燉煌燉徒門反乃祖吾離被苫蓋䝉荆棘以來歸我先君蓋苫之别名䝉冒也我先君惠公有不腆之田腆厚也與女剖分而食之中分為剖今諸侯之事我寡君不如昔者蓋言語漏泄則職女之由職主也詰朝之事爾無與焉詰朝明旦不使復得與㑹事也與將執女對曰昔秦人負恃其衆貪於土地逐我諸戎惠公蠲其大德蠲明也謂我諸戎是四嶽之裔胄也四嶽堯時方伯姜姓也裔逺也胄後也毋是翦棄翦削也賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至於今不貳不内侵亦不外叛昔文公與秦伐鄭秦人竊與鄭盟而舍戌焉在僖三十年於是乎有殽之師在僖三十三年晉禦其上戎亢其下亢猶當也秦師不復我諸戎實然譬如捕鹿晉人角之諸戎犄之犄其足也犄居綺反與晉踣之踣僵也踣蒲北反又敷豆反戎何以不免自是以來晉之百役與我諸戎相繼於時言給晋役不曠時以從執政猶殽志也意常如殽無中二也豈敢離逷今官之師旅無乃實有所闕以擕諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不達何惡之能為不與於㑹亦無瞢焉瞢悶也賦青蠅而退青蠅詩小雅取其愷悌君子無信讒言宣子辭焉使即事於㑹成愷悌也成愷悌不信讒也不書者戎為晋屬不肯特達昭公九年周甘人與晋閻嘉争閻田甘人甘大夫襄也閻嘉晋閻縣大夫晉梁丙張趯率隂戎伐潁隂戎陸渾之戎潁周邑王使詹桓伯辭於晉辭責讓之桓伯周大夫曰我自夏以后稷魏駘芮岐畢吾西土也在夏世以后稷功受此五國為西土之長駘在始平武功縣所治釐城岐在扶風美陽縣西北及武王克商蒲姑商奄吾東土也樂安博昌縣北有蒲姑城巴濮楚鄧吾南土也肅慎燕亳吾北土也肅慎北夷在元莵北計三千餘里吾何邇封之有邇近也文武成康之建母弟以蕃屏周亦其廢墜是為為後世廢墜兄弟之國當救濟之豈如弁髦而因以敝之童子垂髦始冠必三加冠成禮而棄其始冠故言弁髦因以敝之先王居檮杌於四裔以禦魑魅言檮杌略舉四㐫之一下言四裔則三苗在其中故允姓之姦居於𤓰州允姓隂戎之祖與三苖俱放三危者𤓰州今燉煌伯父惠公歸自秦而誘以來僖十五年晋惠公自秦歸二十二年秦晋遷陸渾之戎於伊川使偪我諸姬入我郊甸則戎焉取之邑外為郊郊外為甸言戎取周郊甸之地戎有中國誰之咎也咎在晋后稷封殖天下今戎制之不亦難乎后稷修封疆埴五榖今戎得之唯以畜牧伯父圖之我在伯父猶衣服之有冠冕木水之有本源民人之有謀主也民人謀主宗族之師長伯父若裂冠毁冕㧞本塞源專棄謀主雖戎狄其何有余一人伯父猶然則雖戎狄無所可責晋率隂戎伐周邑故云然叔向謂宣子曰文之伯也豈能改物晋文公雖霸未能改正朔易服色翼戴天子而加之以共翼佐也自文以來世有衰德而暴滅宗周宗周天子以宣示其侈諸侯之貳不亦宜乎且王辭直子其圖之宣子説王有姻喪外親之喪使趙成如周弔且致閻田與襚襚送死衣反潁俘王亦使賓滑執甘大夫襄以説於晉晉人禮而歸之賓滑周大夫十六年楚子聞蠻氏之亂也與蠻子之無質也質信也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子禮也河南新城縣東南有蠻城十七年晋侯使屠蒯如周請有事於雒及三塗屠蒯晋之膳宰以忠諫見進雒雒水也三塗山名在陸渾南萇宏謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備警戒以備戎欲因晋合勢九月丁卯晋荀吳帥師涉自棘津使祭史先用牲於雒陸渾人弗知師從之庚午遂滅陸渾數之以其貳於楚也陸渾子奔楚其衆奔甘鹿甘鹿周地周大獲先警戎備故獲范宣子夢文公擕荀吳而授之陸渾故使穆子帥師獻俘於文宫哀公四年夏楚人既克夷虎夷虎蠻夷叛楚者乃謀北方左司馬眅申公夀餘葉公諸梁致蔡於負函三子楚大夫也此蔡之故地人民楚因以為邑致之者㑹其衆也致方城之外於繒闗負函繒闗皆楚地曰吳將泝江入郢逆流曰泝將奔命焉為一昔之期襲梁及霍偽辭當備吳夜結期明日便襲梁霍使不知之梁河南梁縣西南故城也梁南有霍陽山皆蠻子之邑也單浮餘圍蠻氏蠻氏潰浮餘楚大夫也單音善蠻子赤奔晋隂地隂地河南山北自上雒以東至陸渾司馬起豐析與狄戎楚司馬也析縣屬南鄉郡析南有豐鄉皆楚邑發此二邑人及戎狄以臨上雒左師軍於莵和莵和山在上雒東也莵音徒右師軍於蒼野蒼野在上雒縣使謂隂地之命大夫士蔑命大夫别縣監尹曰晋楚有盟好惡同之若將不廢寡君之願也不然將通於少習以聽命少習商縣武闗也將大開武闗道以伐晋士蔑請於趙孟趙孟曰晋國未寕安能惡於楚必速與之未寕有范中行之難士蔑乃致九州之戎九州戎在隂地陸渾者將裂田以與蠻子而城之以詐蠻子且將為之卜卜城蠻子聽卜遂執之與其五大夫以畀楚師於三戸今丹水縣北三户亭司馬致邑立宗焉以誘其遺民楚復詐為蠻子作邑立其宗主而盡俘以歸狄莊公三十一年狄伐邢閔公元年狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親暱不可棄也宴安酖毒不可懐也詩云豈不懐歸畏此簡書同惡相恤之謂也請救邢以從簡書齊人救邢二年冬狄人伐衞衞及狄戰於滎澤衞師敗績遂滅衞此滎澤當在河北狄人囚史華龍滑與禮孔以逐衞人二人曰我太史也實掌其祭不先國不可得也夷狄畏鬼故恐言當先白神乃先之至則告守者曰不可待也守者石祁子寗莊子公與之玦與矢令守而自禦狄戰敗君死而衆散夜與國人出狄入衞遂從之又敗諸河衞將東走渡河狄復逐而敗之宋桓公逆諸河迎衞敗衆宵濟夜渡畏狄衞之遺民男女七百有三十人益之以共滕之民為五千人共滕衞别邑立戴公以廬於曺曺衞下邑戴公名申其年卒文公燬立齊師戍曺晋侯使太子申生伐東山臯落氏赤狄别種也臯落其氏族僖公元年春諸侯救邢邢潰出奔師師遂逐狄人具邢器用而遷之師無私焉八年晋里克帥師梁由靡御虢射為右以敗狄於采桑傳言前年事也平陽北屈縣西南有采桑津梁由靡曰狄無耻從之必大克不耻走故可逐里克曰懼之而已無速衆狄恐怨深而羣黨來報虢射曰期年狄必至示之弱矣夏狄伐晋報采桑之役也復期月明期年之言騐十年狄滅温蘓子無信也蘓子叛王即狄又不能於狄狄人伐之王不救故滅蘓子奔衞十三年狄侵衞十六年狄侵晋取狐厨受鐸涉汾及昆都因晋敗也狐厨受鐸昆都晋三邑平陽臨汾縣西北有狐谷亭汾水出太原南入河時秦敗晋於韓十八年邢人狄人伐衞圍莵圃二十一年狄侵衞為邢故二十四年鄭伐滑王使伯服游孫伯如鄭請滑鄭伯怨王不聽命而執二子王怒將以狄伐鄭富辰諌不聽使頹叔桃子出狄師夏狄伐鄭取櫟王德狄人將以其女為后富辰諫曰不可臣聞之曰報者倦矣施者未厭狄固貪惏王又啓之女德無極婦怨無終狄必為患王弗聽初甘昭公有寵於惠后惠后將立之未及而卒昭公奔齊王復之又通於隗氏王替隗氏頺叔桃子曰我實使狄狄其怨我遂奉太叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿國人納之秋頺叔桃子奉太叔以狄師伐周大敗周師王出適鄭處於氾太叔以隗氏居於温二十五年晋侯納王殺太叔二十八年晋侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行晋置上中下三軍今復増置三行以避天子六軍之名三十年晋人侵鄭狄間晋之有鄭虞也夏狄侵齊三十一年晋蒐于清源作五軍以禦狄二十八年作三行今罷之更為上下新軍冬狄圍衞衞遷于帝邱三十二年夏狄有亂衞人侵狄狄請平焉秋衞人及狄盟三十三年狄侵齊因晋䘮也晋文公薨狄伐晋及箕晋侯敗狄於箕郤缺獲白狄子白狄狄别種也故西河郡有白部胡先軫死於狄師文公七年狄侵魯西鄙公使告於晋趙宣子使因賈季問酆舒且讓之鄷舒狄相讓其伐魯時賈季奔狄故就使讓之九年狄侵齊十年狄侵宋十三年狄侵衛宣公三年赤狄侵齊四年赤狄侵齊六年秋赤狄伐晋圍懐及邢邱邢邱今河内平臯縣晋侯欲伐之中行桓子曰使疾其民為民所疾以盈其貫將可殪也周書曰殪戎殷此之謂也七年赤狄侵晋取向隂之禾八年白狄及晋平㑹晋伐秦十一年晋郤成子求成於衆狄衆狄疾赤狄之役遂服於晋赤狄潞氏最强故服役衆狄秋㑹于欑函衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非徳莫如勤非勤何以求於人能勤有繼其從之也勤則功繼之詩曰文王既勤止文王猶勤况寡德乎十三年赤狄伐晋及清先縠召之也邲戰不得志故召狄欲為變晋人討先縠殺之十五年潞子嬰兒之夫人晋景公之姊也酆舒為政而殺之又傷潞子之目酆舒潞相晋侯將伐之諸大夫皆曰不可酆舒有三雋才雋絶異也言有才藝絶人者三不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也嗜酒二也棄仲章而奪黎氏地三也仲章潞賢人也黎氏黎侯之國上黨壺闗縣有黎亭虐我伯姬四也傷其君目五也怙其雋才而不以茂德兹益罪也後之人或者欲敬奉德義以事神人而申固其命若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅由用也天反時為災寒暑易節地反物為妖羣物失性民反徳為亂亂則妖災生故文反正為乏盡在狄矣晋侯從之六月癸卯晋荀林父敗赤狄於曲梁辛亥滅潞曲梁今廣平曲梁縣也書癸卯從赴酆舒奔衞衞人歸諸晋晋人殺之公羊傳潞何以稱子潞子之為善也躬足以亡爾雖然君子不可不記也離於夷狄疾夷狄之俗而去離之故稱子而未能合乎中國未能與中國合同禮義相親比也故猶繋赤狄立黎侯而還狄奪其地故晋復立之晋侯賞桓子狄臣千室千家亦賞士伯以𤓰衍之縣曰吾獲狄土子之功也微子吾䘮伯氏矣邲之敗晋侯將殺桓子士伯請而逸之使趙同獻狄俘於周十六年晋士㑹帥師滅赤狄甲氏及留吁鐸辰甲氏留吁赤狄别種晋既滅潞氏今又盡并其餘黨獻狄俘於王成公三年晋郤克衞孫良夫伐廧咎如討赤狄之餘焉晋滅赤狄潞氏其餘黨散入廧咎如廧咎如潰上失民也九年秦人白狄伐晋諸侯貳故也十二年狄人間宋之盟以侵晋而不設備秋晋人敗狄於交剛襄公十八年白狄始來白狄狄之别名未嘗與魯接故曰始來不能行朝禮故不曰朝二十八年白狄朝于晋昭公元年晋中行穆子敗無終及羣狄於太原即大鹵也無終山戎崇卒也崇聚也將戰魏舒曰彼徒我車所遇又阨地險不便車以什共車必克更増十人以當一車之用困諸阨又克車每困於阨道今去車故為必克請皆卒去車為步卒自我始乃毁車以為行五乘為三伍乗車者車三人五乗十五人今改去車更以五人為伍分為三伍荀吳之嬖人不肯即卒斬以徇魏舒輙斬之荀吳不恨所以能立功為五陳以相離兩於前伍於後專為右角参為左角偏為前拒皆臨時處置之名以誘之翟人笑之笑其失常未陳而薄之大敗之十二年晋荀吳偽㑹齊侯者假道於鮮虞遂入昔陽鮮虞白狄别種在中山新市縣昔陽肥國都樂平沾縣東有昔陽城秋八月壬午滅肥以肥子綿臯歸肥白狄也綿臯其君名鉅鹿下曲陽縣西有肥累城晋伐鮮虞因肥之役也十三年鮮虞人聞晋師之悉起也平邱盟甲車四千乗而不警邊且不修備晋荀吳自著雍以上軍侵鮮虞及中人驅衝競中山望都縣西北有中人城驅衝車與狄逐大獲而歸十五年晋荀吳帥師伐鮮虞圍鼓鼔白狄之别鉅鹿下曲陽有鼔聚鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無以復加所好若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈音古賈怠無卒卒終也棄舊不祥鼔人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所知義所在也荀吳必其能獲故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸二十二年晋之取鼓也既獻而反鼓子焉又叛於鮮虞叛晋屬鮮虞六月荀吳略東陽略行也東陽晋之山東邑也使師偽糴者負甲以息於昔陽之門外昔陽故肥子所都遂襲鼓滅之以鼓子䳒鞮歸使涉佗守之守鼓之地佗晋大夫中行伯既克鼓以鼓子宛支來宛支鼔子䳒鞮也穆子既克鼓以䳒鞮歸既獻而反之其後又叛魯昭二十二年荀吳襲鼓滅之以䳒鞮歸使涉佗守之令鼓人各復其所非僚勿從僚官也鼓子之臣曰夙沙釐以其孥行釐將妻子從鼔子也軍使執之辭曰我君是事非事土也名曰君臣豈曰土臣今君實遷徙也臣何頼於鼓頼利也穆子召之曰鼓有君矣君謂涉佗爾止事君吾定而禄爵而女也定安也對曰臣委質於狄之鼓未委質於晋之鼓也質贄也士贄以雉委贄而退臣聞之委質為臣無有二心委質而策死古之法也言委贄於君書名於策示必死也君有烈名臣無叛質敢即私利以煩司寇而亂舊法其若不虞何即就也虞度也若就私利是謂叛君叛君有罪故煩司寇舊法策死之法若臣皆如是將有不意度而至之患者晋其如之何也穆子歎而謂其左右曰吾何徳之務而有是臣也吾當修務何徳而得若此之臣也乃使行既獻既獻功也言於公言釐之賢於公公昭公之子去疾也與鼓子田於河隂河隂晋河南之田使君而田也使夙沙釐相之定公三年鮮虞入晋師於平中平中晋地獲晋觀虎恃其勇也五年晋士鞅圍鮮虞報觀虎之役也哀公六年晋趙鞅伐鮮虞治范氏之亂也四年鮮虞納荀寅於栢人項氏曰大抵桓文皆畏狄而不問者齊桓之世狄伐邢齊以微者救之而不能却狄入衞齊强鄭使赴之而棄其師城夷儀而遷邢城楚邱而遷衞皆以避狄也桓公召陵服楚首止定王室五年間狄為少止八年僖狄始伐晉以威齊也十年狄滅温温王畿也温子奔衞狄侵衞以討之其後宋伐齊而狄反救之矣晋文之世其初僖二十四年狄伐鄭逐天王也其後也晋文公狄侵齊以嘗晋也狄圍衞衞遷於帝丘狄再逐衞也衞侵狄而與狄盟晋不能討故衞自報之而自與之平也亦見晋伯之不終矣自是文公且卒狄再侵齊而公亦終身不討狄矣晋文既縱狄又復導秦故晋之子孫世有秦狄之禍其後狄常與中國争衡而秦遂伐周亦秦將興而天遣楚以牽制齊晋於南方而不暇北顧與按戎之種類不一其在西方者曰犬戎最强盛攻殺幽王於驪山下取周之地居涇渭之間周於是東遷以其地畀秦秦攻戎却之而取周之故地入春秋時虢公敗犬戎於渭汭則其遺種之在中國者也其在北方者曰山戎亦曰北戎侵鄭侵齊病燕者是也其在南方者曰徐戎居淮泗之間公㑹戎於潛追戎於濟西者是也其在伊雒之間者曰姜戎亦曰陸渾之戎本三苗之裔出自太岳世居𤓰州燉煌僖公二十二年秦晋遷其族於伊川自是世服屬於晋戎子支駒之屬是也其姓氏史所不載惟姜戎姜姓驪戎姬姓犬戎亦姬姓小戎子姓僅可考而他則未詳狄之種亦不一有赤狄有白狄曰臯落氏曰潞曰甲氏留吁皆赤狄之類也曰鼓曰鮮虞曰肥皆白狄之類也其姓曰隗氏而潞為潞氏餘未之詳然戎狄與春秋相為始終而齊晋之伯也亦必先能制戎狄而後可以為盟主齊桓之時戎病周病燕狄伐邢伐衞俱為齊所攘却不得以逞夫子所以有微管仲之言也至晋都冀北則立國於戎狄之間祝鮀所謂疆以戎索籍談所謂晋居深山戎狄之與鄰故其所以待戎狄者尤不容以無策自獻惠文襄以來其規模之大槩可見戎易服故懐之以徳如遷姜戎分以南鄙之田世修其職及命魏絳和諸戎是也狄難服故威之以刑如作三行作新軍皆以禦狄後來至於滅潞滅鼓滅肥范宣子言吾先君之亟戰也有故秦狄齊楚皆强不盡力子孫將弱以狄儕之秦齊楚其强可知古稱西戎北狄今考春秋之時戎散居於四方惟狄獨倔强於北散居故其勢易弱聚在一方并力倔强故其慓悍飄忽之勢雖誅鋤之未易帖服兩漢以來匈奴常盛於羌戎蓋有由來矣文獻通考卷二百六十四
