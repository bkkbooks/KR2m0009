獻后土氏一獻蓐收氏一獻元冥氏后稷田畯等各祝史助奠訖祝史持版進神座之右跪讀祝文訖興餘與東方同唯無后稷獻官再拜祝史奠版於神座贊引引五官獻官等詣罍洗酒樽所酌酒分獻五靈其鱗羽裸毛介貓於莵坊水墉昆蟲等皆齋郎助奠相次俱畢祝史持版跪讀祝文訖興拜訖奠版各引還本位武舞六成樂止舞獻俱畢上下諸祝各進徹豆還樽所徹者籩豆各一少移故處奉禮曰賜胙贊者唱衆官再拜衆官在位皆再拜已飲福又胙者不拜元和之樂作太常卿前奏稱請再拜退位皇帝再拜奉禮曰衆官再拜在位者皆再拜樂一成止太常卿前奏請就望燎位攝事謁者引太尉就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止於羣官將拜上下諸祝各執篚進神座前跪取玉帛祝版齊郎以爼載牲體稷黍飯爵酒各由其陛降壇南行經懸內當柴壇東行自南登柴壇以玉幣饌物祝版置於柴上戶內諸祝以星辰七宿已上之禮幣皆從燎神農伊耆氏嶽鎮已下之祝俱詣瘞坎以玉幣饌物置於坎訖奉禮曰可燎東西靣各六人以炬燎初唱可燎坎東西廂各四人置土火半柴太常卿前奏禮畢攝事謁者白禮畢太常卿引皇帝還大次樂作皇帝出中壝門殿中監前受鎮圭以授尚衣奉御殿中監又前受大圭華蓋侍衛如常儀皇帝入次樂止謁者贊引各引祀官通事舍人分引從祀羣官諸國客使以次出贊引引御史已下俱復執事位立定奉禮曰再拜御史已下皆再拜贊引引出工人二舞以次出其神農已下祝版燔於齋所鑾駕還宫如圜丘之儀伊耆氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位姓名敢昭告於帝伊耆氏惟帝體仁尚義崇本念功爰創嘉祀息農饗物今九土攸宜百榖豐稔備茲八蠟大旅四方謹以制幣犧齊粢盛庶品明薦於帝尚饗神農氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位姓名敢昭告於帝神農氏惟帝肇興播植粒此黎元今時和嵗稔神功是賴謹以制幣犧齊粢盛庶品明薦於帝尚饗東方嵗星祝文曰維某年嵗次月朔日子嗣天子諱謹遣具位姓名敢昭告於東方嵗星七宿惟神列位垂象叶質穹蒼昭晣羣生蕃阜庶類今時和嵗稔恆禮是率謹陳嘉薦庶神饗之南方中央西方北方準此東方嶽鎮海瀆祝文曰維某年嵗次月朔云云惟神宣導坤輿興降雲雨亭毒庶品實賴滋益年榖順成用通大蠟謹薦嘉祀溥及一方山林川澤邱陵墳衍原隰井泉庶神咸饗南方西方北方準此句芒氏祝文曰維某年嵗次月朔日子開元神武皇帝諱謹遣具位臣姓名敢昭告於句芒氏惟神贊陽出滯發生品物萌者畢逹仁德以宣用陳明薦神其臨饗后稷氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於后稷氏惟神誕降嘉種播茲百榖蒸庶以粒乂此萬邦爰及田畯實勸農穡謹薦明祀庶神饗之祝融氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位臣姓名敢昭告於祝融氏惟神典司火正淳曜昭明式贊南訛厥功以致豐年之薦庶神臨饗后土氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位姓名敢昭告於后土氏惟神式贊黃道典司土正居中執信是興稼穡年榖既登庶饗嘉薦蓐收氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位臣姓名敢昭告於蓐收氏惟神典司金正式贊西成執矩懷莊尚義趨力豐年之報饗兹嘉祀元冥氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具位臣姓名敢昭告於元冥氏惟神典司水正贊序幽都厥務安寧積藏斯在豐年之祝庶饗明薦蒼龍祝文曰維某年嵗次月朔日子嗣天子諱謹遣具位臣姓名敢昭告於蒼龍之神惟神體備幽明質兼小大實為鱗長贊明造物嵗稔年登實資弭患式陳嘉薦百靈是屬爰及東方鱗羽裸毛介衆族貓於莵坊水墉昆蟲諸神咸饗其朱鳥騶虞元武祝文首尾並與此同朱鳥之神惟神肇自火精冠兹羽族輔時宣化效祥蹈禮年和嵗稔有賴厥功麟之神惟神體信為質惟和是歸作長毛宗表靈玉牒年榖豐稔實兹宣助式陳嘉薦庶神臨饗騶虞之神惟神性履至仁稟靈金宿贊育生類實參利物爰兹報功用率恆祀元武之神惟神誕稟辰精長兹介族先知稱貴誠行攸底伊此豐年有憑宜慶宋火德王以戌日為臘建隆三年十二月戊戌臘有司畫日以七日辛卯蠟百神太常博士和峴奏議曰謹按蠟始於伊耆後歷三代及漢其名雖改而臘與蠟其實一也漢火行用戌臘臘者接也新故相接畋獵禽獸以饗百神報終嵗之功也王者因蠟祭上饗宗廟旁及五祀展其孝心盡物示恭也魏晉以降悉沿其制唐乘土德貞觀之際以前寅日蠟百神卯日祭社宫辰日饗宗廟開元定禮三祭皆於臘辰以應土德聖朝常以十二月戌日為臘而以七日辛卯先行蠟祭蓋禮官之失也事下有司請準唐禮蠟百神祀社稷饗宗廟皆同用臘日從之蠟百神壇髙四尺東西七步二尺南北六步四尺仁宗天聖三年禮官陳詁言蠟祭一百九十二位而祝文所載一百八十二無五方田畯五方郵表畷蓋開元以來年祀寖逺有司失傳郊祀正辭録司天監神位圖皆以虎為於莵乃避唐諱詔復為虎載田畯郵表畷慶歷用羊豕各二大明夜明壇增山罍為二籩豆十二三獻終禮生引司天監分獻官逐階下罍洗詣帝神農伊耆五星三辰七宿嶽鎮海瀆祝融后土后稷蒼龍朱雀麒麟元武白虎神座前上香奠幣爵並再拜內從祀神位不設香幣祝版唯奠酒再行復皇祐定壇髙八尺廣四丈嘉祐加羊豕各五神宗元豐六年詳定郊廟奉祀禮文所言記曰八蠟以記四方年不順成八蠟不通歷代蠟祭獨在南郊為一壇惟周隋有四郊之兆又禮記月令以蠟與息民為二祭故隋唐息民祭在蠟之後請蠟祭四郊各為一壇以祀其方之神有不順成之方則不修報其息民仍在蠟祭之後從之先是太常寺言四郊蠟祭宜依百神制度築壇其東西有不順成之方即祭日月其神農后稷舊設位於壇下當移於壇上其壇下伊耆氏之位宜除之禮部復言蠟祭四壇皆設神農后稷同日祭享頗為重復太常寺以為蠟祭本以神農為主后稷從祭四郊今設壇自當每方各祭同日不為重復從之曾鞏本朝正要策云博士和峴言蠟始伊耆而三代有嘉平清祀蠟祭之名蠟臘之别名也漢乘火德以戌日為臘臘接也言新故相接故田獵取禽以報百神饗宗廟旁及五祀以致孝盡虔魏晉同之唐以土王貞觀之際尚用前寅蠟八神卯日祭社辰日為臘而獨以前七日辛卯蠟不應於禮請如開元故事蠟百神祀社稷饗宗廟同用戌臘如禮便制曰可徽宗政和三年四月議禮局上五禮新儀臘前一日蠟百神四方蠟壇廣四丈髙八尺四出陛兩壝每壝二十五步東方設大明位西方設夜明位以神農氏后稷氏配位以北為上南北壇設神農氏位以后稷氏配五星二十八宿十二辰五官五嶽五鎮四海四瀆及五方山林川澤邱陵墳衍原隰井泉田畯蒼龍朱鳥麒麟白虎元武五水庸五坊五於莵五鱗五羽五介五毛五郵表畷五裸五貓五昆蟲從祀方依其分設若中方嶽鎮以下設於南方蠟壇西階之西中方山林以下設於南方蠟壇午階之西伊耆設於北方蠟壇卯階之南其位次於辰星髙宗紹興十九年臣僚言月令臘先祖五祀勞農以休息之釋者謂蠟祭也所以報一嵗之成功求嗣嵗之福也今已行臘享而報農之祀或闕請並行蠟祭有司檢會以臘前一日蠟祭東西方百神禮料一視感生帝內從祀視釋奠文宣王從祀蠟祭南北方百神一視鎮嶽海瀆內從祀視釋奠武成王從祀孝宗乾道四年太常少卿王瀹請於四郊各為一壇以祀其方之神從之東方以日為主西方以月為主各配以神農后稷南北方皆以神農為主配以后稷若五星五帝二十八宿十二辰嶽鎮海瀆山林川澤邱陵墳衍原隰羽毛鱗介貓虎昆蟲各隨其方分為從祀文獻通考卷八十五
