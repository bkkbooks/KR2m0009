body:
  text: 文獻通考卷八十五鄱陽馬端臨貴與著郊社考十八髙禖仲春元鳥至至之日以太牢祠于髙禖天子親往元鳥燕也燕以施生時來巢人堂宇而孚乳嫁娶之象也禖氏之官以為候髙辛氏之世元鳥遺卵娀簡吞之而生契後王以為媒官嘉祥而立其祠焉變媒言禖神之也神禖音梅娀夙中反契息列反疏曰按蔡雍以為禖是髙辛已前舊有髙者尊也謂尊髙之禖不由髙辛氏而始有髙禖又生民及元鳥毛詩傳云薑嫄從帝而祠於郊禖又云簡狄從帝而祈於郊禖則是薑嫄簡狄之前先有禖神矣而此注立髙辛氏為禖神是髙辛氏已前未有禖神參差不同也后妃帥九嬪御御謂從往侍祠周禮天子有夫人有嬪有世婦有女御獨云帥九嬪舉中云也乃禮天子所御帶以弓韣授以弓矢于髙禖之前韣大木反髙天子所御謂今有娠者於祠大祝酌酒飲於禖之庭以神惠顯之也帶以弓韣授以弓矢求男之祥也王居明堂禮曰帶以弓韣禮之禖下其子必得天材疏曰祭髙禖既畢祝官乃禮接天子所御幸有娠之人謂酌酒以飲之飲酒既畢乃屬帶此所御之人以弓韣又授之以弓矢於髙禖之前而北靣也禮此所御之人於禖神之前禖在壇上御者在下故云禖下以祭神必福降故云其子必得天材月令先朱子生民詩集傳曰古者立郊禖蓋祭天於郊而以禖配也變媒言禖者神之也其禮以元鳥至之日用太牢祀之薑嫄出祀郊禖見大人迹而履其拇遂歆歆然如有人道而震動有娠乃周人所由以生之始也陳氏曰髙禖事當以毛詩傳及朱子集傳為正漢武帝年二十九乃得太子甚喜始立為髙禖之祠於城南祭以特牲晉博士束晢云漢武帝晚得太子始為立髙禖之祠髙禖者人之先也故立石以為主而祀之以太牢也後漢因之祀於仲春之月魏禖壇有石青龍中造許慎云山陽人以石為主晉以仲春之月髙禖祠於城南祀以特牲惠帝元康六年髙禖壇上石中破博士議禮無髙禖置石之文未知設造所由既已毁破可無改造束晢議以為石在壇上蓋主道也禮祭器弊則埋而置新今宜埋而更造不宜遂廢後得髙堂隆故事詔更鐫石令如舊置髙禖壇上埋破石入地一丈按江東太廟北門內道西有石處如竹葉小屋覆之宋文帝元嘉中修廟所得石陸澄以為晉孝武時郊禖石然則江左亦有此禮矣或曰百姓祀其傍或謂之落星也北齊制髙禖壇於南郊旁廣輪二十六尺髙九尺四陛三壝每嵗元鳥至之日皇帝親帥六宫祀青帝於壇以太皥配而祀髙禖之神以祈子其儀青帝北方南向配帝東方西向禖神壇下東陛之南西向禮用青圭束帛牲共以一太牢皇帝衮冕乘玉輅皇后褘衣乘重翟皇帝初獻降自東陛皇后亞獻降自西陛並詣便座夫人終獻上嬪獻於禖神訖帝及后並詣攢位乃送神皇帝皇后及羣嬪皆拜乃撤就燎禮畢而還隋亦以元鳥至日祀髙禖於南郊壇牲用一太牢唐亦以仲春元鳥至之日以太牢祀於髙禖天子親往宋仁宗景祐四年御史張奎請親祀髙禖下禮院定築壇南郊春分之日祀青帝本詩克禋以祓之義配以伏羲帝嚳以禖神從祀報古為禖之先石為主依東漢晉隋之舊牲用太牢樂以升歌儀視先蠶有司攝事以乘輿所御弓矢弓韣致禖神前祀已與胙酒進內以禮所御使齋戒受之每嵗孟春有司申請以俟上旨命曰特祀即用其年春分遣官致祭壇髙九尺周廣二丈六尺四出陛陛廣五尺設三壝壝别二十五步青石主長三尺八寸用木生成之數形凖廟社主植壇上稍北露首三寸圭幣青色牲用牛羊豕各一如盧植説樂章祀儀凖青帝樽器神座如句芒唯有司攝事受福不飲為異祀前一日內侍請皇后宿齋别寢宫嬪從齋庭量地設香案褥位各二重行南向以望禖壇又設褥位香案北重行皇后服褘衣褥位以緋宫嬪服宫中朝賀之服褥位以紫祀日有司以福酒胙肉弓矢弓韣授內臣奉至齋所置弓矢弓韣於箱在香案東福酒於坫胙肉於俎在香案西內臣引宫嬪詣褥位東上南向立又詣皇后幄次跪請皇后行禮導至褥位南向立請再拜在位者皆再拜導皇后詣香案褥位上香帶弓韣受弓矢轉授內臣置於箱又請再拜內臣進胙皇后受訖轉授內臣次進福酒內侍日請飲福內臣又奏請再拜乃解弓韣內臣跪受置於箱導皇后歸東向褥位又引宫嬪最髙一人詣香案上香帶弓韣受弓矢轉授左右置於箱請再拜左右授福酒請飲福再拜解弓韣還位又引以次宫嬪悉如上儀俟俱復內侍奉請皇后詣南向褥位皆再拜內侍跪奏禮畢導皇后歸幄次宫嬪並退是嵗宫中又置赤帝像以祈皇嗣宋神宗元豐四年天章閣待制羅拯言髙禖壇在南郊制不甚廣上設神位三皆密列祭器執事之人殆不容足祀官奠獻或側身拜於褥位乞令修展以叶禮制詔太常禮院詳定以聞禮官言髙禖壇髙八尺廣二十六尺上以青帝為主伏羲髙辛配侑髙禖設位壇下壇上神位三陳設祭器樂架實為狹隘酌奠拜跪及執事進退不可觀禮按祀儀青帝壇廣四丈髙八尺今祠髙禖既以青帝為主其壇之髙廣請如青帝之制從之尚書禮部言先農正座帝神農氏祝文云以后稷配神作主配座后稷云作主侑神謹按春秋公羊傳曰郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自內出者無匹不行自外至者無主不止何休曰天道暗昧故推人道以接之然則古者作主配神之意本施於祖宗其間有雖非祖宗而祝辭可以言作主配神者如五人帝之於五帝是推人道以接天神勾龍之於社后稷之於稷是推人道以接土榖之祇其祝辭俱云作主可也若並為外祭而正配座又皆人鬼則以正座為主其配座但合食從祭而已伏請於神農祝文云以后稷配於后稷云配食於神髙禖以伏羲髙辛配祝文並云作主配神神無二主伏羲既為主其髙辛祝文改云配食於神從之徽宗政和二年詔春分祀髙禖青帝以帝伏羲氏髙辛氏配簡狄薑嫄從祀髙宗紹興元年太常少卿趙子畫言祀典每嵗春分日祀髙禖青帝正位配以伏羲髙辛從以簡狄薑嫄弓矢弓韣內出偹器禮畢收徹三從祀神位前禮料入禁中行禮自車駕巡幸雖多故之際禮文雖偹至於祓無子祝多男所以繫四方萬里之心者蓋不可闕乞自來嵗之春復行髙禖之祀從之十六年監察御史王鎡言禖祀之壇卑陋弗稱有司致齋於社亭之上行事於民居之後遇雨望祭徙置江館去壇既逺事涉瀆慢未足以彰禋潔祀為帝王求嗣之禮乞申命使司考昔制度一新壇宇仍命大臣取生民薑嫄從於帝而見於天之義月令以太牢祠於髙禖天子親往之文詳加定議乞法駕臨祠必獲聖嗣詵詵之福詔禮部看詳先時禮部太常寺檢會國朝禮例髙禖壇在國之東南依儀合差三獻官監察御史等各前十日受誓戒及排設登歌之樂內行事官就南郊齋宫宿齋牲用牛羊豕每位籩豆各一十二昨緣車駕駐蹕臨安府權於錢湖門外惠照院齋宫設位行禮牲用羊豕每位籩豆各六差獻官一員行禮不受誓戒亦不設登歌之樂今來劉嶸所請欲令臨安府於行宫東南城外踏逐隨宜修建及踏逐近便寺觀權充行事官齋舍所有設登歌樂差行事官受誓戒并合用牲牢禮料籩豆之數並依見今大祀禮例差官排辦從之禮部言竊詳生民之詩言履帝武敏歆先儒以敏為拇謂薑嫄履巨迹之拇以歆郊禖之神是生后稷以為從帝嚳祀禖神之應其説頗附會元鳥生契之意如詩言繩其祖武傳言夫子步亦步趨亦趨皆繼踵相因循之意履帝武敏歆猶言帝嚳行禖祀之禮薑嫄踵而行之疾而不遲故上帝所歆居然生子以見視履考祥其應亦速而後世弗深考經旨傳注怪詭禨祥併為一談至北齊妃嬪參饗黷而不蠲去禮逾逺歷世非之唯禮記通典載大唐月令具言仲春元鳥至之日以太牢祀於髙禖天子親往而政和新禮亦有皇帝親饗髙禖之儀緣祖宗以來未嘗舉行親祠唯兩制官并有司攝事今欲乞比祖宗故事增重祀典依每嵗元日祈榖於上帝禮例命執政官攝事前期申取指揮施行又檢會國朝會要每嵗春分遣官致祭牲用牛羊豕各一弓矢弓韣以乘輿所御者權降付外有司奉祠訖以福酒胙肉弓矢弓韣授內侍以進皇后宫嬪就宫中受胙飲福詳見上文今欲遇祠高禖及徹禮饌進內依景祐儀制行飲福受胙之禮所有牲牢亦依祖宗故事用牛羊豕務從豐偹以盡祈天錫羡之誠從之十七年二月上親祠髙禖以普安郡王為亞獻恩平郡王為終獻禮部太常寺言按禮經仲春天子親祠髙禖徽宗皇帝修成親祠之制具載新儀未經舉行望皇帝親祠以祈多男之祥副天下之望從之八蠟籥章國祭蠟則吹豳頌擊土鼓以息老物吹冒垂反月元謂十二建亥之月也求萬物而祭之者萬物助天成嵗事至此為其老而勞乃祀而老息之於是國亦養老焉月令孟冬勞農以休息之是也豳頌亦七月也七月又有穫稻作酒躋彼公堂稱彼兕觥萬夀無疆之事是亦歌其類也謂之頌者以其言嵗終人功之成氏疏曰此祭蠟直擊土鼓按明堂位云土鼓葦籥伊耆之樂即此亦各有葦籥可知言以息老物者謂息田夫萬物也云謂之頌者以其言嵗終人功之成者凡言頌者頌美成功之事故於七月風詩之中亦有雅頌也春官孟冬天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀此周禮所謂蠟祭也天宗謂日月星辰也大割大殺羣牲割之也臘謂以田獵所得禽祭也五祀門戶中霤竈行也或言祈年或言大割或言臘互文公疏曰祈來年于天宗者謂祭日月星辰也大割祠於社者謂大割牲以祀公社以上公配祭故云公社及門閭者非但祭社又祭門閭但先祭社後祭門閭故云及臘先祖五祀者臘獵也謂獵取禽獸以祭先祖五祀也此等之祭總謂之蠟若細别言之天宗公社門閭謂之蠟其祭則皮辨素服葛帶榛杖其臘先祖五祀謂之息民之祭其服則黃衣黃冠鄭注郊特牲云息民與蠟異也知此周禮所謂蠟者以郊特牲蠟者索也索萬物而饗之按籥章云國祭蠟吹豳頌以息老物蠟而後息老此經亦先祭衆神乃後勞農休息文與籥章相當故經廣祭衆神是周禮籥章所謂蠟祭也云天宗謂日月星辰者以蠟祭唯祠公社不祭地故知祭天宗者不祭天若是祭天何須稱宗下季冬云天之神是天之衆神有司中司命不稱宗明稱宗者謂日月星也云臘謂田獵所得禽祭者以欲臘祭之時暫出田獵以取禽非仲冬大閲之獵也左傳云惟君用鮮則天子諸侯祭用鮮獸云或言祈年或言大割或言臘互文者天宗公社門閭先祖五祀等皆祈年大割臘祭之事故云互也勞農以休息之黨正屬民飲酒正齒位是也以疏曰按黨正職國索鬼神而祭祀則禮屬民此亦祭衆神之後勞農休息文正相當故云是此等休息是正齒位按雜記子貢觀蠟云一國之人皆若狂者按鄉飲酒初立賔行禮至禮終脫屨升堂而燕行無算爵然則初時正齒位後則皆狂蠟祭蔡雍云夏曰清祀殷曰嘉平周曰蠟秦曰臘按左傳云虞不臘矣是周亦有臘名也月令黨正國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位屬音燭合也國索鬼神而祭祀謂嵗十二月大蠟之時建亥之月也正齒位者鄉飲酒禮所謂六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆是也必正之者為民三時務農將闕於禮至此農隙而教之尊長養老見孝悌之道也黨正飲酒禮亡以此事屬於鄉飲酒之義微失少矣凡射飲酒此鄉民雖為鄉大夫必來觀禮鄉飲酒鄉射記大夫樂作不入士既旅不入是也非疏曰黨正行正齒位之禮在十二月建亥之月為之蠟祭之禮而此云國索鬼神而祭祀者以其正齒位禮在蠟月故言之以為節耳當國索鬼神而祭祀之時則黨正屬聚其民而飲酒於序學中以行正齒位之法當正齒位之時民內有為一命以上必來觀禮故須言其坐之處地官羅氏蠟則作羅𥜗𥜗女俱反或音須謂作猶用也鄭司農云蠟十二月大祭萬物也郊特牲曰天子大蠟謂嵗十二月合聚萬物而索饗之𥜗細密之羅𥜗讀為繻有衣袽之繻元謂蠟建亥之月此時火伏蟄者畢矣豺既祭獸可以羅罔圍取禽也夏官蔡雍獨斷四代臘之别名夏曰嘉平殷曰清祀周曰大蠟漢曰臘五帝臘祖之别名青帝以未臘卯祖青帝太皥木行赤帝以戍臘午祖赤帝炎帝火行白帝以丑臘酉祖白帝少皥金行黑帝以辰臘子祖黑帝顓頊水行黃帝以辰臘未祖黃帝軒轅后土土行陳氏禮書曰蠟之為祭所以報本反始息老送終也其服王元冕而有司皮辨素服葛帶榛杖其牲體疈辜其樂六樂而奏六變吹豳頌擊土鼓舞兵舞帗舞其所致者川澤山林以至土示天神莫不與焉則合聚萬物而饗之者非特八神也而所重者八以其尤有功於田故也其神之尊者非特先嗇也而主先嗇以其始有事於田故也鄭氏曰先嗇若神農者司嗇后稷是也農田畯也郵表畷田畯所以督約百姓於井間之處也爾雅曰畯農夫也然則蠟之八神則先嗇也司嗇也百種也農也郵表畷也禽獸也坊也水庸也古者蠟則飲於學黨正屬民飲酒於序是也既蠟則臘先祖五祀於廟仲尼與於蠟賔事畢出遊於觀之上是也然則臘亦謂之蠟矣先儒以郊特牲言皮辨素服而祭又言黃衣黃冠而祭則二祭之服不同月令言祈來年于天宗割祠于公社又言臘先祖五祀則祈臘之名不同於是謂皮辨素服而祭與祈來年于天宗蠟也黃衣黃冠而祭與臘先祖五祀臘也蠟以息老物臘以息民息民固在蠟後矣此記所以言既蠟而收民息已也周蠟於十有二月秦臘於孟冬皆建亥之月也晉侯以十二月滅虢遂襲虞宫之竒曰虞不臘矣則臘在蠟月可知矣古者臘有常月而無常日祖在始行而無常時由漢以來溺於五行之説以王日祖以衰日臘其失先王之禮逺矣後周兼五天帝五人帝與百神而蠟於五郊唐不祭五天帝五人帝特蠟百神於南郊而闕其方之不登者然蠟因其順成之方以報神因其州之序以樂民則唐一於南郊非也蠟及天宗則日月星辰之類而已後唐兼天帝而祭之亦非也先儒謂蠟六奏樂而禮畢東方之祭則用太蔟姑洗南方㽔賔西方夷則無射北方則黃鍾為均於理或然楊氏曰愚按夏正建寅殷正建丑周正建子三正不同夫子告顔淵獨以夏時為正蓋建寅者生物之始亦人事之始故以為嵗首建丑者成物之終亦人事之終故以為嵗終嵗終則行蠟臘之祭宜也禮記月令孟冬臘先祖五祀籥章國祭蠟黨正國索鬼神而祭祀鄭氏兩注皆謂建亥之月此亦可疑原記禮者及注家之意豈不曰此皆周禮也周以建子為嵗首故以建亥之月為嵗終然夏殷周三正示不相沿特以其月為大朝會大政令之始而天時之始終則不可易也建亥孟冬之月謂之嵗終可乎漢史臘月陳勝之御莊賈殺勝以降秦張晏曰秦之臘月夏之九月也其意亦曰秦以建亥為正而臘則建戍也臣瓚曰建丑之月也師古曰史記云胡亥二年十月誅葛嬰十一月周文死十二月陳勝死臣瓚説是也夫秦人不師古始猶知以建丑之月為臘孰謂周人以建亥為臘乎傳天子大蠟八疏曰大蠟八者即鄭注云先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八所祭之神合聚萬物而索饗之但以此八神為主蠟云大者是天子之蠟對諸侯為大天子既有八神則諸侯之蠟未必八也謂若先嗇古之天子諸侯未必得祭也知諸侯亦有蠟者禮運云仲尼與於蠟賔是諸侯有蠟也伊耆氏始為蠟耆臣夷反或伊耆氏古天子號也云即帝堯是也王陳氏曰禮記曰伊耆氏始為蠟周禮伊耆氏掌共之杖咸以老者待杖然後安猶於物待蠟然後息也伊耆氏以有功於耆老著矣故後世以其官為姓周又以其姓名官先儒謂其始制鼓籥又始為蠟於是以為古天子之號然古之制法者𨽻首造歷大撓作甲子蒼頡造書之類豈皆古王者哉果伊耆氏實古王者之號周人固應尊異而神之不宜列於銜枚氏壺涿氏而以下士之官名之也蠟也者索也謂求索也嵗十二月合聚萬物而索饗之也饗者祭其神也之疏曰云饗者祭其神也者解經合聚萬物而索饗萬物非所饗但饗其萬物之神所以饗其神者萬物所以能功加於民者神使為之故祭之以報焉蠟之祭也主先嗇而祭司嗇也先嗇若神農者司嗇后稷是也司疏曰若是不定之辭以神農比擬故云若嗇后稷無所疑故不言若直云后稷是也以先嗇為主司嗇從祭祭百種以報嗇也疏曰百種則農及郵表畷禽獸等所以祭之者報其助嗇之功使盡饗焉饗農及郵表畷禽獸仁之至義之盡也郵本亦作尤畷丁劣反又丁衛反農田畯也郵表畷謂田畯所以督約百姓於井間之處也民畯音俊約因妙反於疏曰農謂古之田畯有功於郵表畷者是田畯井間所舍之處郵若郵亭屋宇處所表田畔畷者謂井畔相連畷於此田畔相連畷之所造此郵舍田畯處焉禽獸者即下文云貓虎之屬古之君子使之必報之迎貓謂其食田鼠也迎虎謂其食田豕也迎而祭之也迎其神也祭坊與水庸事也水庸溝也須疏曰祭坊與水庸事也者是營為所之事故云事也坊者所以畜水亦以障水庸者所以受水亦以泄水謂祭此坊與水庸之神曰土反其宅水歸其壑昆蟲毋作草木歸其澤此蠟祝辭也若辭同則祭同處可知矣壑猶坑也昆蟲暑生寒死螟螽之屬為害者也反螽音終安疏曰此以下皆蠟祭之祝辭土即坊也歸也宅也土歸其宅則不崩水歸其壑者水即水庸壑坑坎也水歸其壑謂不泛溢昆蟲毋作者昆蟲螟螽之屬也得隂而死得陽而生曰昆蟲毋作謂不為災草木歸其澤者草苔稗木棒梗之屬也當各歸生藪澤之中不得生於良田害嘉榖也蠟祭乃是報功故亦因祈禱有此辭也一云祝辭言此神由有此功故今得報非祈禱也辭有水土昆蟲草木者以其無知故特有辭也而先嗇之屬有知故不假辭也據此祭草木有辭則草木當有神八蠟不數之者以草木遍地皆是不如坊與水庸之屬各指其一物故不數皮辨素服而祭素服以送終也葛帶榛杖喪殺也蠟之祭仁之至義之盡也榛側巾反以榛木為杖也殺所界反送終喪殺所謂息老物也素服衣裳皆素黃衣黃冠而祭息田夫也祭謂既蠟臘先祖五祀也於是勞農以休息之論語曰黃衣狐裘蠟疏曰上云蠟此云祭故知既蠟臘先祖五祀對文臘有别總其義俱名蠟也故月令孟冬祈來年于天宗大割祠于公社及門閭臘先祖五祀鄭注云此周禮所謂蠟是也野夫黃冠黃冠草服也言祭以息民服象其時物之色季秋而草木黃落大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也諸侯於蠟使使者戴草笠貢鳥獸也詩云彼都人士臺笠緇撮又曰其餉伊黍其笠伊糾皆言野人之服也鄭疏曰天子掌鳥獸之官謂大羅氏也謂為大羅者云能以羅捕鳥獸者也周禮羅氏掌羅烏鳥蠟則作羅𥜗鄭司農云𥜗細密之羅也解者云順秋冬殺物故羅氏用細密之羅網以捕禽鳥矣然周禮不云掌獸此云獸者以其受貢獸故也諸侯貢屬焉者大羅氏既以羅為名能張羅得鳥獸故四方諸侯有貢獻鳥獸於王者皆入屬大羅氏也羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國好呼報反受疏曰羅氏先貢畢使者臨去羅氏又以鹿及女子致與使者而宣天子之詔於使者令使者反還其國以告戒其君故云詔客告也以戒諸侯曰好田好女者亡其國者此宣詔所告之言也令使者還其國以如此告汝君曰不得好田臘及女色使國亡也言鹿是田臘所得之物女是亡國之女而王所以獲者也故與之鹿女明以此為戒也一云豈每國輒與女鹿邪正當羅氏以鹿與女示使者爾天子樹瓜華不斂藏之種也華果蓏也又詔以天子樹瓜蓏而已戒諸侯以蓄藏藴財利也蓏力果反藴於粉反者疏曰言天子唯樹瓜與果蓏所以唯樹植此瓜華是供一時之食不是收斂久藏之種若其可久藏之物則不樹之不務蓄藏與民爭利八蠟以記四方疏曰言蠟祭八神因以明記四方之國記其有豐稔凶荒之異也四方年不順成八蠟不通以謹民財也疏曰四方年不順成八蠟不通者謂四方之內年榖不得和順成熟則當方八蠟之神不得與諸方通祭所以然者以謹慎民財欲使不熟之方萬民謹慎財物也鄭數八神約上文也王肅分貓虎為二無昆蟲鄭數昆蟲合貓虎者昆蟲不為物害亦是其功貓虎俱是除田中之害不得分為二不言與故合為一也順成之方其蠟乃通以移民也疏曰四方之內有順成之方其蠟之八神乃與諸方通祭所以然者以其蠟祭豐饒皆醉飽酒食使民歆羡也既蠟而收民息已故既蠟君子不興功收謂收斂積聚也息民與蠟異則黃衣黃冠而祭為臘必矣民疏曰此文云既蠟而收民息已先蠟後息民是息為臘與蠟異也月令臘在祈天宗之下但不知臘與蠟祭相去幾日唯隋禮及今禮皆蠟之後日經云既蠟不興功者謂不興農功若其土功則左氏傳云龍見而畢務戒事也火見而致用昏正而裁曰至而畢土功建亥之月起日至而畢也司爟凡祭祀則祭爟報其為明之功禮如祭爨老疏曰鄭云禮如祭爨者祭爨祭婦也則此祭爟謂祭先出火之人夏官龜人上春釁龜祭祀先卜釁者殺牲以血之神之也元謂先卜始用卜筮者言祭言祀尊焉天地之也世本作曰巫咸作筮卜未聞其人也是上春者夏正建寅之月月令孟冬云釁龜策相互矣秦以十月建亥為嵗首則月令秦世之書亦或欲以嵗首釁龜耳疏曰天地稱祭祀今云先卜是人應云享而云祭祀與天地同稱故云尊焉天地之也伏羲作易時未有揲蓍之法至巫咸始教人為之故巫咸得作筮之名春官傳孔子曰臧文仲安知禮燔柴於奧燔音煩奧依注作釁七亂反文仲魯公子彄之曾孫臧孫辰也莊文之間為大夫於時為賢是以非之不正禮也奧當為爨字之誤也或作竈禮尸卒食而祭饎爨饔爨也時人以為祭火神乃燔柴彄苦侯反饎昌志反疏曰奧當為爨字之誤也者下文云老婦之祭盛於盆尊於瓶故知非奧奧者夏祀竈神其禮尊以老婦配之耳故中霤禮祭竈先薦於奧有主有尸用特牲迎尸以下略如祭宗廟之禮是其事大也爨者宗廟祭祀尸卒食之後特祭老婦盛於盆尊於瓶是其事小也云禮尸卒食而祭饎爨饔爨也者特牲記注舊説云宗婦祭饎爨烹者祭饔爨用黍肉而已無邊豆爼云時人以為祭火神乃燔柴者依尸卒食而祭饎爨饔爨當時失禮又以此為祭火神遂乃燔柴明失禮也皇氏云弗綦既以逆祀為是又以燔柴祭爨為是按疏皇氏説者言臧文仲不能正逆祀之失夫子譏其三不知又不能正燔柴祭奧之失夫子譏其安知禮也古周禮説顓頊氏有子曰黎為祝融祀以為竈神許君謹按同周禮鄭駮之云祝融乃古火官之長猶后稷為堯司馬其尊如是王者祭之但就竈陘一何陋也祝融乃是五祀之神祀於四郊而祭火神於竈陘於禮乖也如鄭駮言則祝融是五祀之神祀於郊奧者正是竈之神常祀在夏以老婦配之有爼及籩豆設於竈陘又延尸入奧爨者宗廟祭後直祭先炊老婦之神在於爨竈此祝融并奧及爨三者所以為不同者也夫奧者老婦之祭也盛於盆尊於瓶盛音成瓶步丁反老婦先炊者也盆瓶炊器也明此祭先炊非祭火神燔柴似失之疏曰夫奧者老婦之祭也是既譏燔柴於爨又明祭爨不可以燔柴之義爨者是老婦之祭其祭卑唯盛食於盆盛酒於瓶卑賤若此何得燔柴祭之也曲禮器貢家語禮子問同沙隨程氏曰八蠟之祭為民設教也厚矣方里而井八家共焉吾食其一仰事俯育資焉而無憾者可不知所本乎古有始為稼穡以易佃漁俾吾卒嵗無飢不與禽獸爭一旦之命者繄先嗇是德故祭先嗇焉曰司嗇者謂修明其政而潤色之者也曰農者謂傳是業以授之於我者也曰郵表畷者畷井田間道也郵表也者謂畫疆分理以是為準者也昔之人為是而勞今我蒙之而逸蓋不得不報也曰貓虎者謂能除鼠豕之害吾稼者也曰坊者謂昔為隄防之人使吾禦水患者也曰水庸者謂昔為畎澮溝洫使吾為旱備者也曰昆蟲者先儒謂昆蟲害稼不當與祭乃易以百種是不然所謂昆蟲者非祭昆蟲也祭其除昆蟲而有功於我者也除昆蟲者不一而足如火田之人捕蝗之子禽鳥或能食之霜霰或能殺之以其不一而足故直曰昆蟲焉耳夫以表畷坊庸之賤𨽻貓虎昆蟲之細效吾不敢忘皆得以上配先嗇司嗇之享其民勸於功利推而廣之等而上之視君親如天地而不敢慢也後世農田之利奪於兼并之家雖天下之用舉仰於農而農人不蒙其利大扺一嵗之入兼并袖手十取之五假之牛種則什之七又乘其乏舉貸以倍稱之息雖八九可也是故樂嵗先飢凶年多死者莫農人若也何以致然由郵表畷之失職也郵表畷之失職則先嗇司嗇與夫農者其德不白雖有坊庸必私其私是生民之害不在鼠豕螟蟘也古之一夫施功力於田里者生蒙其利沒享其祭後世一切反此古者上農夫食九人後世農能食九口者不千一也下農夫食五人後世具父母妻子養者不百一也有為浮屠氏者詭言於民曰汝知竭力耕耘而不自粒者乎是前生不種福也汝知燕居甲第坐享王侯之奉者乎品其材智道德非有踰乎人是前生種福德也故敬我者貴施我者富前生所作今獲其報今世所作後亦如之猶影響也是以設為天宫淨土地獄惡趣以誘懼之時出怪神夢兆以證信之而先王神道設教之意替矣仰觀三代里田蠟祭之時其民恬寧愈樂和睦無怨故鬼神享馨香之薦交歸其德不為妖厲豈不盛矣乎秦惠文王十二年初臘注臘獵禽獸以嵗終祭先祖秦是時始效中國為之風俗通夏曰嘉平殷曰清祀周曰蠟漢改曰臘索羣鬼神而祭之始皇三十一年更名臘曰嘉平漢復曰臘季冬之月星回嵗終隂陽以交農大享臘言祭宗廟旁祭五祀蓋同一日自此而始非舊典魏因漢制髙堂隆議臘用日云王者各以其行之盛而祖以其終而臘水始於申盛於子終於辰故水行之君以子祖以辰臘火始於寅盛於午終於戌故火行之君以午祖以戌臘木始於亥盛於卯終於未故木行之君以卯祖以未臘金始於巳盛於酉終於丒故金行之君以酉祖以丒臘土始於未盛於戌終於辰故土行之君以戌祖以辰臘今魏土德而王宜以戌祖辰臘博士秦靜議古禮嵗終聚合百物祭宗廟謂之蠟皆有常日無正月祖祭之禮漢用午祖戍臘午者南方之象故以午祖正月為嵗首故以寅始用午祖戌者嵗之終萬物畢成故以戌臘小數之學因就傳著五行以為説皆非典籍經義之文尚書易經説五行水火木金土王相衍天地隂陽之義故易曰坤為土土位西南黃精之君盛德在未祖戍者嵗終日窮之辰不宜以為嵗初祖祭之行始也易曰坤利西南得朋東北喪朋丒者土之終故以丑臘終而復始乃終有慶宜如前以未祖丑臘奏可之東晉元帝大興二年未臘前一日詔明日當為范氏從母舉哀百官戒嚴尚書郎張亮議曰天子祭宗廟社稷鼎俎既陳不得終事者四若五服之喪以當降者不以廢從母無服之喪不宜廢事舉哀又禮祭之明日改祭於祊以燕皇尸殷謂之肜周謂之繹今雖未施肜繹之祭先王之典聖人重不忘但大臘之日休息黎衆百日之勤一日之澤未可戒嚴宋因之水德王祖以子臘以辰後周以十月祭神農伊耆以下至毛介等神於五郊五方天地星宿四靈五帝五官嶽鎮下至原隰各分其方合祭之上帝地祇神農伊耆人帝於壇上南郊則以神農既蠟無其祀三辰七宿則為小壇於其側自嶽鎮以下則各為坎餘於平地皇帝為初獻上帝地祇神農伊耆及五人帝冡宰亞獻宗伯終獻上大夫獻三辰以下中大夫獻七宿以下自天帝至羽毛之牲玉帛皆從燎餘從瘞祭畢帝如南郊便殿明日乃蠟訖又如西郊蠟訖又至北郊祭訖還宫隋初因以孟冬下亥蠟百神開皇四年詔曰前周嵗首今之仲冬建亥之月大蠟可也後周以夏后之時行姬氏之蠟考之前代於義有違其十月行蠟者停可以十二月為臘於是始革前制前周姬氏後周宇文氏唐太宗貞觀十一年房元齡等議曰按月令蠟法唯祭天宗近代蠟五天帝五人帝五地祇皆非古典今並除之季冬寅日蠟祭百神於南郊大明用犢二籩豆各四簋簠㽅爼各一神農及伊耆氏各用少牢一籩豆等與大明同后稷及五方十二次五官五方田畯五嶽四鎮四海四瀆以下方别各用少牢一其日祭井泉於川澤之下用羊一卯日祭社稷於社宫二十八宿五方之山林川澤邱陵墳衍原隰鱗羽裸毛介水墉坊郵表畷貓虎及龍麟朱鳥白獸元武方别各用少牢一每座籩豆各二簋簠㽅爼各一䄍祭凡百八十七座當方年榖不登則闕其祀蠟之明日又祭社稷於社宫如春秋二仲之禮元宗開元中制儀季冬臘曰蠟百神於南郊之壇若其方不登則闕之唐開元禮臘日蠟百神於南郊都百九十二座大明夜明在壇上每座籩豆各十簠簋㽅爼各一神農伊耆五官每座籩豆各四簠簋爼各二五星三辰后稷五方田畯嶽鎮海瀆二十八宿五方山林川澤邱陵墳衍原隰龍麟朱鳥白獸元武鱗羽毛介於莵井泉等八十五座籩豆各二簠簋爼各二樂舊用黃鍾之均三成新改用天神之樂圜鍾之均六成皇帝臘日蠟百神於南郊儀攝事附齋戒如圜丘儀從祀官及攝事齋戒並如别儀陳設前蠟三日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御座攝事衛尉設祀官公