body:
  text: 文獻通考卷一百六十八鄱陽馬端臨貴與著刑考七徒流配沒虞舜流宥五刑宥寬也以流放之法寬五刑流共工於幽洲幽洲北裔氷中可居曰洲放歡兜于崇山崇山南裔竄三苗于三危三苗國名三危西裔殛鯀于羽山羽山東裔在海中四罪而天下咸服五流有宅五宅三居謂不忍加刑則放流之若四凶者五刑之流各有所居五居之等有三等之居大罪四裔次九州之外次千里之外周官大司寇之職凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐期役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之役諸司空坐日訖使給百工之役役月訖使其州里之人任之乃赦司厲掌盜賊之任器貨賄辨其物皆有數量賈而楬之入於司兵任器貨賄謂盜賊所用傷人兵器及所盜財物也入于司兵若今時傷殺人所用兵器盜賊贓加責役入縣官其奴男子入于罪𨽻女子入于舂藁鄭司農云謂坐為盜賊而為奴者輸於罪𨽻舂人藁人之官也今日為奴婢古之罪也故書曰豫則奴戮汝論語曰箕子為之奴罪𨽻之奴也春秋傳斐豹𨽻也著于丹書豹恥為奴欲除其籍然後殺督戎元謂奴從坐而沒入縣官者男女同名凡有爵者與七十者與未齓者皆不為奴有爵命士以上齓毁齒也男八歲女七歲毁齒司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒弗使冠飾者著黑幪若古人之象刑與舍釋之也鄭司農云罷民謂惡人不從化為百姓所患苦而未入五刑者凡圜土之刑人也不虧體其罰人也不虧財言其刑人但加以明刑罰人但任之以事耳鄭司農云以此知其為民所苦而未入刑者也故大司寇職曰凡萬民之有罪過而未麗于法而害于州里者桎梏而坐諸嘉石役諸司空又曰以嘉石平罷民國語曰罷士無伍罷女無家言為惡無所容入也元謂圜土所收教者過失害人已麗于法者掌戮墨者使守門劓者使守關宫者使守內刖者使守囿髠者使守積注見刑制門司𨽻掌五𨽻之法辨其物而掌其政令五𨽻謂罪𨽻四翟之𨽻也物謂衣服兵器之屬也帥其民而搏盜賊役國中之辱事為百官積任器凡囚執人之事民五𨽻之民也鄭司農云百官所當任持之器物此官主為積聚之也元謂任猶用也邦有祭祀賔客喪紀之事則役其煩辱之事煩猶劇也士喪禮下篇曰𨽻人涅厠掌帥四翟之𨽻使之皆服其邦之服執其邦之兵守王宫與野舍之厲禁野舍王行所止舍也厲遮列也罪𨽻掌役百官府與凡有守者掌使令之小事役給其小役凡封國若家牛助為牽傍鄭司農云凡封國若家謂建諸侯立大夫家也牛助為牽傍此官主為送致之也元謂牛助國以牛助轉徙也罪𨽻牽傍之在前曰牽在旁曰傍疏國家以官牛助諸侯及大夫家運物往致任所其守王宫與其厲禁者如蠻𨽻之事罪𨽻盜賊之家為奴者蠻𨽻征南夷所獲閩𨽻南蠻之别夷𨽻征東夷所獲貉𨽻征東北夷所獲疏古者身有大罪身既從戮男女緣坐男子入于罪𨽻女子入于舂藁五𨽻各百二十人者謂𨽻中選取善者以為之員役數為限其餘衆以為𨽻民罪𨽻則中國之以罪為𨽻者餘四𨽻征伐所獲秦始皇時嫪毒作亂討誅之其徒皆梟首車裂輕者為鬼薪取薪給宗廟為鬼薪律曰鬼薪作三嵗三十四年燒詩書百家語令下三十日不燒黥為城旦城旦者旦起行治城四嵗刑也漢文帝詔除肉刑定律曰諸當完者完為城旦舂城旦注見上舂者婦不預外徭但舂作米皆四嵗刑也臣瓉曰文帝除肉刑皆有以易之故以完代髠以宫代劓以􅎂左右趾代刖令既曰完矣不復云以完代完此當言髠者完也當黥者髠鉗為城旦舂罪人獄已決完為城旦舂滿三嵗為鬼薪白粲坐擇米使正白為白粲者三嵗刑鬼薪白粲一嵗為𨽻臣妾𨽻臣妾一嵗免為庶人師古曰男子為𨽻臣女子為𨽻妾鬼薪白粲滿三嵗為𨽻臣𨽻臣一嵗免為庶人𨽻妾亦然也𨽻臣妾滿二嵗為司寇司寇一嵗及作如司寇二嵗皆免為庶人如淳曰罪降為司寇故一嵗正司寇故二嵗也其亡逃及有耐罪以上不用此令於本罪中又重犯也前令之刑城旦舂嵗而非禁錮者完為城旦舂嵗數以免李竒曰謂文帝作此令之前有刑者武帝建元元年赦吳楚七國孥輸在官者吳楚七國反時其首事者妻子沒入為官奴婢帝即位哀而赦之平帝元始二年令天下女徒已論歸家雇山錢月三百如淳曰已論者罪已定已令甲如女子犯罪作如徒六月雇山遣歸説以為當于山伐木聽使入錢雇功直故謂之雇山應劭曰舊刑鬼薪取薪于山以給宗廟今使女徒出錢雇薪故曰雇山也師古曰古説如近之謂女徒論罪已定並放歸家不親役之但令一月出錢三百以雇人也况為此恩者所以行太皇太后之德施惠於婦人後漢光武建武三年詔令女徒雇山歸家注見上七年詔罪囚非犯殊死勿按其罪見徒免為庶人二十九年詔罪囚各減本罪一等其餘贖罪輸作有差輸作司寇前書謂之罰作一嵗刑也輸作左校韋彪傳注云左校曹名屬將作輸作右校屬將作輸作若盧龎參為左校令犯法輸作若盧耐光紀注云一嵗刑為罰作二嵗已上為耐音乃代反前書又作而施刑光紀注云施讀曰弛謂有赦令去其鉗􅎂赭衣明帝即位詔施刑及郡國徒在中元元年四月己卯赦前所犯而後捕繫者悉免其刑八年詔郡國中都官死罪繫囚減罪一等勿笞屯朔方五原之邊縣肅宗建初七年詔天下繫囚減死一等勿笞詣邊妻子自隨占犯殊死一切募下蠶室其女子宫繫囚鬼薪白粲已上皆減本罪各一等輸司寇作元和七年令如前和帝永元三年詔中書官徒各除半刑謫其未竟五月以下皆免遣八年詔郡國中都官繫囚減死一等詣燉煌屯十一年詔郡國中都官徒及篤癃老小女徒各除半刑其未竟三月者皆免歸田里元初二年詔中書都官繫囚減死一等勿笞詣馮翊扶風屯妻子自隨延光三年詔死罪囚繫減死一等詣燉煌隴西及度遼營順帝漢安二年令繫囚殊死以下入贖其不能入贖者遣詣臨光縣居作二嵗沖帝即位令郡國中都官繫囚減死一等徙邊謀反大逆不用此令魏明帝定律髠刑有四完刑作刑各三晉武帝制新律纍作不過十一嵗月贖不計日日作不拘月嵗數不疑閏劉頌為廷尉請復肉刑疏曰今為徒者類性元惡不軌之族也去家縣逺作役山谷飢寒切身志不聊生又有廉士介者茍慮不首死則皆為盜賊况本性姦凶無賴之徒乎又今徒富者輸財解日歸家乃無役之人也貧者起為姦盜又不制之虜也不刑則罪無所禁不制則羣惡橫肆若是近不盡善也是以徒亡日屬賊盜日煩亡之數者至有十數得輒加刑日益一嵗此為終身之徒也自顧反善無期而災困逼身其志亡思盜勢不得息事使之然也成帝時邵廣盜官幔二帳坐死其子宗雲乞自沒為奚官奴以贖父命事見詳讞門宋制為劫者身斬家人棄市同籍周親謫補兵見詳讞門梁制謀反降叛大逆已上皆斬父子同産男女無少長皆棄市母妻姊妹及應從坐棄市者妻子女妾同補奚官為奴婢資財沒官劫身皆斬妻子補兵遇赦降死者黵面為劫字髠鉗補冶鎖士終身其下又謫運配財官冶士尚方鎖士皆輕重差其年數其重者或終身梁天監十一年詔自今捕謫之家及罪應質作若年有老小者可停將送時百姓有罪緣坐則老幼不免一人亡逃則舉家質作人既窮急姦宄益深帝思所以寬之乃下是詔時徒居作者具五任其無任者著升械若病疾權解之是後囚徒或有優劇大同中皇太子在春宫視事見而愍之乃上疏曰臣以比時奉敕權視京師雜事切見南北郊壇材官車府太官下省左裝等處上啓並請四五嵗以下輕囚助充使役自有刑均罪等愆目不異而甲付錢署乙配郊壇錢署三所於辛為劇郊壇六處在役則優今聽獄官詳其可否舞文之路自此而生公平難遇其人流泉易啓其齒將恐玉科重輕全關墨綬金書去取更由丹筆愚謂其詳立條制以為永準帝手敕報曰頃年以來處處之役唯資徒謫逐急充配若科繁細義同繭絲切須之處終不可得引例興訟紛紜方始防杜姦巧自是為難更當别思取其便也竟弗之從陳制獲賊帥及士人惡逆免死付冶聽將妻入役不為年數其髠鞭五嵗刑降死一等鎖二重其五嵗刑以下並鎖一重五嵗四嵗刑若有官凖當二年餘並居作後魏太武定律令當刑者贖負則加鞭二百畿內人富者燒炭於山貧者役于圊溷女子入舂藁其痼疾不逮平人者守苑囿孝文時以有罪徙邊者多逋亡乃制一人逋亡合門充役崔挺上書諫曰天下善人少惡人多若一人有罪延及闔門則司馬牛受桓魋之罪柳下惠嬰盜跖之誅豈不哀哉帝善之乃除其制齊神武秉政改制諸強盜殺人者斬妻子同籍配為樂户小盜贓滿十匹以上魁首死妻子配驛從者流武成時制齊律一曰流刑謂論犯可罪原情可降鞭笞百髠之投於邊裔以為兵卒未有道里之差其不合遠配者男子長徒女子配舂並六年二曰刑罪即耐罪也有五嵗四嵗三嵗二嵗一嵗之差凡五等各加鞭六嵗者加笞百其五嵗者又加笞八十四嵗者六十三嵗者四十二嵗者二十一嵗者無笞並鎖輸作左校而不髠無保者鉗之婦人配舂及掖庭織盜及殺人而亡者即懸名注籍甄其一房配驛户周制徒刑五徒一年者鞭六十笞十徒二年者鞭七十笞二十徒三年者鞭八十笞三十徒四年者鞭九十笞四十徒五年者鞭一百笞五十流刑流衛服去皇畿二千五百里者鞭一百笞六十流要服去皇畿三千里者鞭一百笞七十流荒服去皇畿三千五百里者鞭一百笞八十流鎮服去皇畿四千里者鞭一百笞九十流藩服去皇畿四千五百里者鞭一百笞一百徒輸作者皆任其所能而役使之為盜賊及謀反大逆降叛惡逆罪當流者皆甄一房配為雜户其為盜賊發逃亡者懸名注配若再犯徒三犯鞭者一身永配下役自魏晉相承死罪其重者妻子皆以補兵魏虜西涼之人沒入名為𨽻户孝武入關𨽻户皆在東魏後齊因之仍供厮役建德六年齊平後帝欲施輕典於新國乃詔凡諸新户悉放為百姓自是無復新戶隋文帝令髙熲定新律流刑三有千里千五百里二千里應配者千里居作二年千五百里居作二年半二千里居作三年徒刑五有一年一年半二年二年半三年其流徒之罪皆減從輕流役六年改為五年徒刑五年改為三年犯法私罪以官當徒者五品以上一官當徒二年九品以上一官當徒一年當流者三流同皆比徒三年若犯公罪者加一年當流者各加一等其追徒過九年者徒二千里其後改徒及流並為配防唐初徒流之刑皆因隋制武德四年詔裴寂等更定律令流罪三皆加千里居作三嵗至二嵗半悉為一嵗居作者著鉗若校京師𨽻將作女子𨽻少府縫作旬給假一日臘寒食一日毋出役院病者釋鉗校給假疾差倍役謀反者男女奴婢沒為官奴婢𨽻司農七十者免之凡役男子入于蔬圃女子入于厨膳流移人在道疾病婦人免乳祖父母父母喪男女奴婢死皆給假授程糧非反逆緣坐六嵗縱之特流者三嵗縱之有官者得復仕太宗初議絞刑之屬五十皆免死而斷右趾既又哀其毁傷支體乃除斷趾流為加役流三千里居作又比隋舊律減大辟入流九十二條減入徒七十一條貞觀二年詔三品以上犯公罪流私罪徒皆不追身十四年制流罪三等不限以里數量配邊要之州十五年敇犯反逆免死配流者六嵗之後仍不聽仕武后長夀元年有人上封事言嶺南流人有隂謀逆者乃遣司刑評事萬國俊攝監察御史就案之若得反狀便許斬決國俊至廣州遍召流人擁之水次以次加戮三百餘人一時併命然後煆鍊曲成反狀仍誣奏云諸道流人咸有怨望若不推究為變不遙后然其奏又命攝監察御史劉光業王德夀鮑思恭王大正屈正筠等分往劍南黔中安南嶺南等六道案鞫流人於是光業誅七百人德夀五百人其餘少者不減數百人元宗開元十年敇自今以後準格敕合應決杖人若有便流移左貶之邑決訖許一月內將息發遣其緣惡逆指斥乘輿者臨時發遣天寶五載敕流貶人多在道逗留自今左降官情罪稍重者日馳十驛以上自是流貶者多不全矣肅宗乾元元年敕左降官非反逆緣坐及犯惡逆名教枉法強盜贓如有親年八十以上及患在牀枕不堪扶持更無兄弟者許停官終養其流移人亦凖此德宗建中三年敕諸色貶流人及左降官身死並許親屬收之本貫殯葬其造蠱毒移鄉人不在此限憲宗元和八年刑部侍郎王璠奏天德軍五城及諸邊城配流人等臣切見諸處配流人每逢恩赦悉得歸還惟前件流人皆被本道重奏稱要防邊遂令沒身終無歸日臣又見比年邊城犯流者多是胥徒小吏或是鬬打輕刑據罪可原在邊無益請自今流人準格例滿日六年後並許放還所冀抵法者足以悛懲滿嵗者絶其愁怨從之穆宗長慶元年制應亡官失爵及放還流人如先有莊田不經沒官被人請射作主如本主及子孫已歸並委州府却還務令安業武宗會昌六年赦書節文應徒流人在天德振武者官中量借糧種俾令耕田以為生業僖宗乾符三年敕流徒之人殘疾者懲贖見贖刑門後唐清泰三年尚書刑部郎中李元龜奏準開成格應斷天下徒流人到所流處本管畫時申御史臺候年月滿日申奏方得放還本貫近年凡徒流人所管雖奏不申御史臺報大理寺所以不知放還年月望依律格處分從之宋太祖皇帝開寶時定刑制凡流刑四徒刑五詳見刑制門流配舊制止于遠徙不刺而晉天福中始創刺面之法遂為戢姦重典宋因其法開寶五年御史臺上言伏見大理寺斷徒罪人非有官當贖銅之外送將作監役者其將作監舊兼充內作又有左校右校中校署比來工役並在此司今雖有其名無復役使或遇祠祭供具水火乏人使令欲望令大理寺依格斷遣徒罪人後並送作坊應役從之太宗以國初諸方割據沿五代之制罪人率配𨽻西北邊然多亡投塞外誘羌戎為患乃詔自今當徙者勿復𨽻秦州靈武通逺軍及緣邊諸州時江南湖廣已平于是罪人皆流南方太平興國五年詔配役者分𨽻鹽亭役使先是國初以來犯死罪獲貸者多配𨽻登州沙門島通州海島皆屯兵使者領護而通州島中凡兩處豪強難制者𨽻崇明鎮懦弱者𨽻東布州兩處悉官煮鹽是嵗始令配役者分𨽻鹽亭役使之而沙門如故端拱二年詔免嶺南流配人荷校執役又令婦人有罪至流者免配役真宗咸平三年先是江浙荆湖廣南遠地應強盜及持仗不死者并部其屬至京師多殞于道路乃詔自今止決杖黵面配所在五百里外牢城仁宗景祐中以罪人貸死者舊多配沙門島在登州海中至者多死乃詔當配沙門島者第配廣南逺惡地牢城廣南罪人乃配嶺北然其後亦有配沙門島者神宗熙寧三年詔決配強盜無以全黨置之一路刪定編敕官曾布請復肉刑略曰今大辟之次處以流刑代墨劓剕宫之法不惟非先王流宥之意而又失重輕之差古者鄉田同井人皆安土重遷流之遠方無所資給徒𨽻困辱以至終身近世之民輕去鄉土轉徙四方固不為患而居作一年即聽附籍比於古亦輕矣况折杖之法于古為鞭朴之刑刑輕不能止惡故犯法日衆其終必至于殺戮是欲輕反重也六年審刑院言登州沙門島寨配𨽻以二百人為額餘則移置海外非禁姦之意詔自今以三百人為額吳充建請流人冬寒被創上道多凍死請自今非情理巨蠧過冬月聽留役本處至春遣之奏可九年詔以交趾犯順應配廣南東西路罪人並權配三千里外元豐八年罷就配法並如舊制行初帝以流人去鄉邑疾死於道而護送禁卒往來勞費用張誠一之議隨所在配諸軍重役至是中丞黃履言其報仇非便罷之詔犯盜刺環於耳後徒流以方杖以圓三犯杖移于面徑不得過五分元祐六年刑部言配諸𨽻沙門島強盜殺人縱火贓滿五萬錢強姦毆傷兩犯至死纍贓至二十萬錢謀殺致至及十惡死罪造蠱已殺人者不移配強盜徒黨殺人不同謀贓滿二十五萬遇赦移配廣南溢額者配𨽻遠惡餘犯遇赦移配荆湖南北福建路諸州溢額者配𨽻廣南在沙門島滿五年遇赦不􅔜移配與不許縱還而年及六十以上者移配廣南在島十年者依餘犯格移配篤疾在身年及七十在島三年以上移配近鄉州軍犯狀應移而老病者同其永不放還者各加二年移配從之紹聖三年詔配沙門島人已溢額者並配瓊州萬安軍昌化珠崖軍定為令徽宗崇寧三年宰臣蔡京請倣周官司圜之法令諸州築圜土以居強盜貸死者晝則役作夜則拘之視罪之輕重以為久近之限許出圜土充軍無過者縱釋詔從其請五年罷之大觀元年復行四年復罷石林葉氏曰前世常患加役流法太重官有監驅之勞而配𨽻者有道路奔亡困踣之患蘇子容元豐中建議請依古圜土取當流者治罪訖髠首鉗足晝夜居作夜則置之圜土滿三嵗而後釋未滿嵗而遇赦者不原既釋仍送本鄉稽察出入又三嵗不犯乃聽自如崇寧初蔡魯公始行之人不以為善也髙宗建炎二年以盜賊竊發所在道梗乃詔諸州罪人斷配訖權送本處重役俟盜息路通日遣行四年詔臨安府四至州郡犯罪合配之人毋得配本府候回鑾日如舊紹興十九年刑部看詳捕獲沿海劫盜並係持杖凶徒理宜措置關防今將合􅔜刺配廣南及三千里之人斷訖權行刺配鄂州都統制軍下二千五百里以下之人斷訖量地里逺近權行刺配池州太平州建康府都統制軍下並收管重役其配字欲以配州府屯駐軍重役字為文候盜賊衰息日依舊例從之二十四年詔諸路州軍有編管之人願充廂軍者聽上因宣諭大臣曰朕昨在元帥府見河朔州軍將編管人穿鎖傳送旅店三五相聯乞丐於市蓋緣不給之食至於此真可憫惻可申嚴約束行下孝宗隆興元年臣僚言諸州斷配海賊例送廣南遠惡州軍緣瀕海之郡多為賊船嘯聚慮長姦惡請自今並分𨽻兩淮水軍收管從之淳熙十一年校書郎羅點言比年以來所在流配人甚衆強盜之獄每案必有逃卒積此不已為害不細臣嘗推原其端蓋由配法太繁本朝折杖之制視前代用刑為輕而刺配之法視前代用刑為重國初敕令尚簡入配者少承平既久防禁益密在仁宗朝張方平極陳其弊建議減除逮今百有餘年有增無損切謂欲戢盜賊不可不銷逃亡之卒欲銷逃亡之卒不可不減刺配之法望詔有司將見行刺配情輕者從寬減降别定居役或編管之令其應配者檢會淳熙元年五月指揮擇其強壯刺充屯駐大軍庶幾州郡黥配之卒自此漸少上曰近嵗配𨽻稍多久後當如何凖等奏如雜犯死罪猶可從輕至如劫盜六項指揮之行為盜者莫不曉得將欲為盜必先虛立為首之名殺人姦濫之罪皆歸之以故為首者不獲而犯者免死盜何由懲上曰可令刑寺集議奏聞既而刑部大理寺奏言象以典刑墨居其一流放之法用宥五刑是墨刑不施而後宥以流也鞭作官刑説者曰鞭以為治官事之刑是流墨不施而後及於鞭也蓋曰墨曰流曰鞭三者俱為九刑之一自帝舜以迄三王未聞有兼施並用者漢文帝除肉刑當黥者髠鉗為城旦舂惟劓與刖方及于笞則黥之與笞漢時亦不兼用也歷代遵尚鞭笞度數雖有不同止用其一無復他法隋文始改百王之制而用其二然亦不兼施今簡册可考也流刑徙之遠方則在千里千五百里二千里之外止于離其鄉井徒刑役於當處則有一年一年半二年二年半三年之限止役作其身凡是二者皆不笞決惟杖刑自六十至百笞刑自十五至五十是二者笞決其身隨即縱遣至唐髙祖加千里之流太宗申加役之制餘因隋舊而已晉天福始創刺配合用其二仍役而不決逮我藝祖一洗五代之苛猶以隋制為重於是悉易以決為流徒杖笞之法名存實改自加役流至流二千里其刑四並決脊杖配役有差所謂配役非今之所謂配古所謂徒役是也自徒三年至徒一年其刑有五並決脊杖有差而盡免其徒役之年自杖一百至六十自笞五十至十其刑各五悉易以臀杖而減其數如杖一百止決二十減其八十之數是也由杖九十以下至於笞十悉從末減於是帝舜三居之法至此始不用流罪得免遠徒徒罪得免役年笞杖得減決數而省刑之意遂冠百王其後坐特貸者方決杖黥面配逺州牢城而舜之九刑始併用其三黥為墨配即流杖乃鞭三者始萃于一夫之身蓋其制將以宥死罪合三為一猶為生刑端未為過至太宗皇帝始詔竊盜贓滿五貫者決杖黥面配役其意亦以宥死蓋國初之制竊盜三貫棄市故也纍聖相承固未嘗有慘於用刑之意而人情狃於見聞法令易以滋彰據張方平所奏祥符天聖慶歷其數至倍是也今以刑書考之其麗於配者幾五百條中間有數項比之慶歷又復數倍積少成多殆非一朝一夕之故然回視藝祖創法之始特以宥死者固已遠矣又有罪不至配而用情重決配者亦有泛言決配而因以決配者嘗推原其故爰自建隆以及淳熙二百年之間決配既多視以為常不復知有前代之遺制與夫祖宗之美意臣僚奏請動以決配為言有司建立亦以決配為可而配法始滋矣近者李樁嘗建此議陛下特詔近臣各述所見其間亦有為陛下略言及此者而講之不詳亦卒以廢格良可惜也竊謂今罪之麗於大辟者宥其一死俯從決配乃藝祖之遺制固不容輕議自餘流罪以下情理重害未可遽去者且仍舊其次重者當如方平之請代以役年其輕者並行刋削如此既不失藝祖創法之本意亦稍復前代沿襲之舊章非細故也但方平之請止具四等而今世配法乃至十四等今欲推廣方平之意永不放還者役終身海外者役八年逺惡廣南者役七年三千里二千五百里者並役六年二千里一千五百里者並役五年千五百里者並役四年特旨配鄰州者役三年本州本城者並役二年不刺面者役一年免其文面並役當處雖纍會恩不許原免則方平之意得矣上尋謂輔臣曰朕思之配法雜犯配罪只配本州牢城犯私茶鹽之類不必遠配只刺充本州廂軍令著役若是劫盜已經三次便可置之死可諭刑寺熟議奏來十四年八月臣僚言刺配之法始於晉天福間國初加杖用貸死罪其後科禁寖密刺配日增考之祥符編敇止四十六條至於慶歷已一百七十餘條今淳熙配法凡五百七十條配法既多犯者自衆黥𨽻之人所至充斥近臣僚建請改定居役之法已降指揮看詳至今未見定論蓋緣刺配情理稍輕既欲降居役則編管乃為從坐不應却令徙鄉輕重不倫議乃中格竊謂前後創立配條不為無説若止令居役不離鄉井則幾于惠姦不足以懲惡若盡用配法不恤黥刺則面目一壞誰復顧藉強民適長威力有過無由自新檢照元豐刑部格諸編配人自有不移不放及移放條限政和編配格又有情重稍重情輕稍輕四等色目莫若依倣舊格稍加參訂將犯配法人如入情重則依舊刺面用不移不放之格其次稍重則止刺額角用配及十年之格其次稍輕則與免黥刺面放還之格其次最輕則降為居役别立年限縱免之格倘使居役本條或有從坐編管則置之本城減其放限如此則於見行條法並無抵牾且使刺面之法專處情犯凶蠧而其他偶麗于罪皆得全其面目知有顧藉可以自新省黥徒銷姦黨誠天下之切務惟陛下留神速詔有司裁定施行後迄如舊制光宗紹熙二年知瓊州黃揆言今中外之姦民以罪抵死而獲貸者必盡投之海外以為兵是聚千百虎狼而共置之一丘也今日積者已多而纍纍遞送者方來未巳一旦稔惡積釁潰裂四出臣恐偏州之民項背不能帖席而臥也請自今凡凶惡貸死而𨽻於流籍者許分之沿江諸屯及其他逺惡之地無專指海外以為凶藪庶幾隂消潛削不至滋蔓流毒偏方從之三年臣僚言配法自有年限方許放停近來更不照應一二年間隨即放便是致人皆玩法以配為常請行下諸路應犯法刺配人如至本州須依條限方許放停如限內再有所犯乞撥入屯駐軍中重役永不放便從之寧宗嘉泰四年正月臣僚言後世衣食之路日蹙犯法者衆配𨽻之人中路多逸及到配所州郡憚于贍飬往往故縱不捕此徒雖幸脫免而其身實無所容于天地間飢寒切身若非羣衆販買私商即是聚為強盜配𨽻之人蓋有兩等其間鄉民一時鬬毆殺傷及胥吏犯贓貸命流配等人設使逃逸未必皆是強勇能為大過欲止徒配本州牢城重役立為條限限滿給據復為良民至於纍犯強盜及聚衆販賣私商曽經殺傷捕獲之人皆能跳梁山溪運動兵仗非村民胥吏之比欲並配屯駐軍立為年限限滿改刺從正軍衣糧誠為利便從之開禧元年閏八月臣僚言國朝品式條章燦然偹具謂人之難於離鄉井也於是有配𨽻羈管編管之條然非姦贓強盜殺人貸命與夫鬪傷情重者不以是罪之今世酷吏曾不是思於配𨽻編管羈管之外自創為押出外界之條使之蕩析離居浮遊失所未免有客死異鄉之嘆欲嚴飭中外自配𨽻編管羈管之外惟他郡作過之人許勒歸本貫其餘悉從本條科罪不得輒將土著之家人屬押出外界從之文獻通考卷一百六十八
