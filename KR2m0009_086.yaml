body:
  text: 文獻通考卷八十六鄱陽馬端臨貴與著郊社考十九五祀中央土其祀中霤祭先心中霤猶中室也土主中央而神在室古者復穴是以名室為霤云祀之先祭心者五藏之次心次肺至此心為尊也祀中霤之禮設主於牖下乃制心及肝肺為俎其祭肉心肺肝各一他如祀戶之禮中藏才浪反則疏曰鄭意言中霤猶中室乃是開牖象霤之取明其地不當棟而在室之中央故喪禮云浴於中霤飯於牖下明中霤不關牖下也主中央而神在室者所以必在室中祭土神之義也土五行之主故其神在室之中央也是名中霤所祭則土神也故杜注春秋云在家則祀中霤在野則為社也又郊特牲云家主中霤而國主社社神亦中霤神故也云古者復穴是以名室為霤云者解所以謂室中為中霤之由也古者謂未有宫室之時也復穴者謂窟居也古者窟居隨地而造若平地則不鑿但纍土為之謂之為復言於地上重復為之也若髙地則鑿為坎謂之為穴其形皆如陶竈故詩云陶復陶穴是也故毛云陶其土而復之陶其壤而穴之鄭云復者復於土上鑿地曰穴皆如陶然庾蔚云復謂地上纍土為之穴則穿地也復穴皆開其上取明故雨霤之是以後因名室為中霤問后土氏之祭朱子曰極而言之亦似僭然此即古人中霤之祭而今之所謂土地者郊特牲取財於地取法於天是以尊天而親地教民美報焉故家主中霤而國主社觀此則天不可祭而土地在民亦可祭蓋自上古陶為土室其當中處上為一竅通明名之曰中霤及中古有宫室亦以室之中央為霤存古之舊亦不忘本雖曰土神而只以小者言之非天子所謂祭皇天后土之大者也春祀戶祭先脾春陽氣出祀之於戶內陽也祀之先祭脾者春為陽中於藏值脾脾為尊凡祭五祀於廟用特牲有主有尸皆先設席於奧祀戶之禮南靣設主於戶內之西乃制脾及腎為俎奠於主北又設盛於俎西祭黍稷祭肉祭醴皆三祭肉脾一腎再既祭徹之更陳鼎俎設饌於筵前迎尸略如祭宗廟之儀戶值丈吏反又如字後倣此疏曰春陽氣出祀之於者戶在內從外向內戶又在內故云內陽也戶是人之出入戶則有神又曰春為陽中於藏值脾脾為尊者以祭戶之時脾腎俱有先用脾以祭之者以春為陽中於藏值脾脾既春時最尊故先祭之脾為尊也所以春位當脾者牲位南首肺最在前而當夏也腎最在後而當冬也從冬稍前而當春從腎稍前而當脾故春位當脾從肺稍却而當心故中央主心從心稍却而當肝故秋位主肝此等直據牲之五藏所在而當春夏秋冬之位耳若其五行所生主五藏則不然矣故異義云今文尚書歐陽説肝木也心火也脾土也肺金也腎水也古尚書説脾木也肺火也心土也肝金也腎水也許慎謹按月令春祭脾夏祭肺季夏祭心秋祭肝冬祭腎與古尚書同鄭駮之云月令祭四時之位乃其五藏之上下次之耳冬位在後而腎在下夏位在前而肺在上春位小前故祭先脾秋位小却故祭先肝腎也脾也俱在鬲下肺也心也肝也俱在鬲上祭者必三故有先後焉不得同五行之氣今醫病之法以肝為木心為火脾為土肺為金腎為水則有瘳也若反其術不死為劇如鄭此言五行所主則從今文尚書之説不同許慎之義云凡祭五祀於廟用特牲之下皆中霤禮文云祭五祀於廟者設祭戶祭中霤在於廟室之中先設席於廟堂之奧若祀竈祀門祀行皆在廟門外先設席於廟門之奧雖廟室廟堂廟門有别總而言之皆謂之廟故云凡祭五祀於廟此謂殷禮也若周則七祀加司命與厲也不審祀之處所亦當與竈門行等俱在廟門之外祀也若周總在宫內故宫正注云祭社稷七祀於宫中此特牲謂特牛故小司徒云小祭祀奉牛牲注云小祭祀王元冕所祭若諸侯或亦當然其大夫所祭或特羊也云有主有尸者謂天子諸侯若卿大夫廟無主則五祀無主也云祀之禮設主於戶內西者先設席於奧乃更設席於廟戶西夾北向置主位設主之人南靣設主於戶西位上使主北靣云乃制脾及腎為俎奠於主北者謂設主之後以割制脾之與腎為俎實奠於主北主既北靣奠於主前云又設盛於俎西者盛謂黍稷俎在主前稍東故黍稷之簋在主前稍西云祭黍稷祭肉祭醴皆三者當時惟始設主未有迎尸則是祝官祭簋中黍稷祭俎中脾腎之肉祭薦之醴皆三度祭之黍亦三祭醴亦三祭肉亦三祭故云皆三祭云肉脾一腎再者申明祭肉三度之事其祭肉三者脾尊故一祭腎卑故再祭云既祭徹之更陳鼎俎設饌於筵前者謂既祭黍稷祭肉醴之後徹去俎之與盛更陳列鼎俎設其饌食於初設奧之筵前其時主已移於筵上主人出戶迎尸尸入即筵而坐但宗廟之祭尸入之後始祭籩豆及黍稷醴其祭戶之時已於西祭黍稷祭肉祭醴今迎尸而入則應坐而饌食不更祭黍稷祭肉祭醴故云略如祭宗廟之儀祭戶所以先設席於奧乃設饌筵迎尸皆在奧者就尊之處也中間設主祭黍稷肉祭醴戶西者就戶處也其餘五祀所祭設主皆就其處也夏祀竈祭先肺夏陽氣盛熱於外祀之於竈從熱類也祀之先祭肺者陽位在上肺亦在上肺為尊也竈在廟門外之東祀竈之禮先席於門之奧東靣設主於竈陘乃制肺及心肝為俎奠於主西又設盛於俎南亦祭黍三祭肺心肝各一祭醴三亦既祭徹之更陳鼎俎設饌於筵前迎尸如祀戶之禮牲陘音刑疏曰知竈在廟門外之東者按少牢及特禮皆竈在廟門外之東西靣北上云祀竈之禮以下皆逸中霤禮文云先席於門之奧謂廟門外西室之奧以神位在西故知在西室之奧以祀戶在戶內故祭在廟室之奧祀竈在門外故設主在門室之奧各從其義云東靣設主於竈陘者謂設主人東靣也竈陘謂竈邊承器之物以土為之云乃制肺及心肝為俎奠於主西者制謂截割心肝皆鬲上之物故從肺類俱置俎上奠此俎於主之西此主位西向故置俎在西而對主也盛謂黍稷盛之於簋皇氏以為此祭老婦盛於盆非其義也云亦祭黍三祭肺心肝各一祭醴三者亦上祀戶之禮祭必三者以禮成於三故也上祀戶者祭肉三脾一腎再此云祭肺心肝各一亦為肉祭三也此醴實於樽祭三者始扱一祭又扱再祭云既祭徹之更陳鼎俎設饌於筵前者筵前謂初設廟室奧之筵前唯特牲少牢鼎當陳於廟門室之前稍東西靣執俎者以俎就鼎載肉入設於筵前在葅醢之東其黍稷等設於俎南此唯云祭黍或無稷也此配竈神而祭者是先炊之人禮器云竈者是老婦之祭此禮器祭爨見百神篇先火條秋祀門祭先肝秋隂氣出祀之於門外隂也祀之先祭肝者秋為隂中於藏值肝肝為尊也祀門之禮北靣設主於門左樞乃制肝及肺心為俎奠於主南又設盛於俎東其他皆如祭竈之禮疏曰云祀之先祭肝者秋為隂中於藏值肝者以隂氣始於五月終於十月其七月八月為隂之中故云秋為隂中其陽氣始於十一月終於四月正月二月為陽中故正月云春為陽中然隂中之時兼有陽陽中之時兼有隂亦是隂陽之中也今五藏肺最在前心次之肝次之脾次之腎為後肝在心肺之下脾腎之上故云於藏值肝然脾在肺心肝之下腎之上則是上有肺心肝下唯有腎不當其中而云春為陽中於藏值脾者但五行相次水則次木故春繼於冬腎後則次脾其火後則次土土後方次金故秋不得繼夏由隔於土由此脾不得繼肺隔於心也為此肝之上有肺有心脾之下唯有腎俱得為藏之中也云北靣設主於門左樞者謂廟門外左樞北靣以在門外故主得南嚮而北靣設之云乃制肝及肺心為俎奠於主南設盛於俎東者皆約中霤禮文也其他皆如祭竈之禮者謂祭心肺肝各一及祭醴三并設席於奧迎尸之屬也冬祀行祭先腎冬隂盛寒於水祀之於行從辟除之類也祀之先祭腎者隂位在下腎亦在下腎為尊也行在廟門外之西為軷壤厚二寸廣五尺輪四尺祀行之禮北靣設主於軷上乃制腎及脾為俎奠於主南又設盛於俎東祭肉腎一脾再其他皆如祀門之禮輪疏曰按鄭注聘禮云禮畢乘車轢而遂行唯車之一轢耳所以然者以兩輪相去八尺今軷唯廣五尺故知不兩輪俱轢云北靣設主軷上者以主須南嚮故人北靣設之其主則鄭注大馭云蓋以菩芻棘柏為神主也祭月令之大雅生民詩取羝以軷朱子注曰羝牡羊軷行道神也曾子問諸侯適天子道而出見因祭篇會同條於聘禮賓釋幣於行及出祖釋軷歸釋幣門見因祭條鬯人掌共秬鬯而飾之注見社稷禮凡祭祀禜門用瓢齎禜音詠瓢婢遙反齎音齊蠡禜謂營酇所祭門國門也杜子春讀齎為粢瓢謂瓠也粢盛也元謂齎讀為齊取甘瓠割去柢以齊為尊者蠡力兮反或郎過反柢音帝之疏曰鄭知禜謂營酇欲見祭神非一取營酇而祭義也鄭知門是國門者禮記云天子祭七祀有國門故也春官司門凡嵗時之門受其餘鄭司農云受祭門之餘祭疏曰嵗之四時祭門非一故云凡以總之若月令秋門者是祭廟門此門亦謂國門十二者除四時祭外仍有為水祈禱故左氏莊公二十年秋大水有用牲於門之事地官孟冬臘五祀冬臘謂以田獵所得禽祭也五祀門戶中霤竈行也疏曰臘五祀者臘獵也謂獵取禽獸以祭五祀也其臘五祀謂之息民之祭其服則黃衣黃冠又曰臘謂田獵所得禽祭者以欲臘祭之時暫出田獵以取禽非仲冬大閲之獵也左傳云唯君用鮮則天子諸侯祭用鮮獸皇氏云仲秋獵得禽獸以為乾豆至臘用之其義非也云五祀門戶中霤竈行者月令殷禮言若周則七祀詳見百神䄍條天子諸侯大夫祭五祀嵗遍曲禮下王祭五祀則希冕春官司服注見祭社稷禮之內以血祭祭五祀隂祀自血起貴氣臭也五祀五色之帝於王者宫中曰五祀元謂此五祀者五官之神在四郊四時迎五行之氣於四郊而祭五德之帝亦食此神焉少皥氏之子曰重為句芒食於木該為蓐收食於金修及熙為元冥食於水顓頊氏之子曰黎為祝融后土食於火土春官大宗伯神楊氏曰先正以五祀為五色之帝後鄭以為五官之以經云血祭祭社稷五祀五嶽而五祀文在五嶽之上故也抑不思社稷五祀皆在內故聯序並言之五嶽在外故序在社稷五祀之後此以內外分不以大小分也三獻文三獻爓爓似廉反小注疏並見社稷禮夏官子掌祈於五祀見因祭釁條祭疾病乃行禱於五祀見因祭疾而禱條儀禮問五祀想也只是當如此致敬未必有此神朱子曰神也者妙萬物為言者也盈天地之間皆神若説五祀無神則是有有神處有無神處却是甚麼道理霤又曰五祀行是道路之神門是門神戶是戶神與中竈凡五古時聖人為之祭祀亦必有其神如孔子説祭如在祭神如神在是有這祭便有這神不是聖人若有若亡見得一半便自恁地但不如後世門神便畫個神像如此只又問五祀祭行之義先生曰行堂塗也古人無廊屋於堂陛之下取兩條路五祀雖分四時祭然出則獨祭行又出門有一祭作兩小山於門前烹狗置之山上祭畢却就山邊喫却推車從兩山間過蓋取跋履山川之義人程子曰五祀恐非先王之典報則遺其重者井所重行寧廊也其功幾何白虎通曰五祀者謂門戶井竈中霤也人之所處出入所飲食故為神而祭之大夫已上得祭之何士者位卑祿薄但祭其先祖耳五祀所以嵗一遍何順五行也故春即祭戶戶者人所出入亦春萬物始觸尸而出也夏祭竈竈者火之主人所以自養也夏亦火王長養萬物秋祭門門以閉藏自固也秋亦萬物成熟內備自守冬祭井井者水之生藏在地中冬亦水王萬物伏藏六月祭中霤中霤者象土在中央也六月亦土王也祭五祀天子諸侯以牛卿大夫以羊一説戶以羊竈以雉中霤以豚門以犬井以豕或曰中霤用牛餘不得用豚井以魚陳氏禮書曰五祀見於周禮禮記儀禮雜出於史傳多矣特祭法以司命泰厲為七祀而左傳昭二十五年家語五帝篇則以五祀為重該修熙黎句龍之五官月令以五祀為門行戶竈中霤白虎通劉昭范曄髙堂隆之徒以五祀為門井戶竈中霤鄭氏釋大宗伯之五祀則用左傳家語之説釋小祝之五祀用月令之説釋王制之五祀則用祭法之説而荀卿謂五祀執薦者百人侍西房侍西房則五祀固非四方之五官侍必百人則五祀固非門户之類然則所謂五祀者其名雖同其祭各有所主七祀之制不見他經鄭氏以七祀為周制五祀為商制然周官雖天子亦止於五祀儀禮雖士亦備五祀則五祀無尊卑隆殺之數矣祭法自七祀推而下之至於適士二祀庶人一祀非周禮也然禮所言五祀蓋皆門戶之類而已門戶人所資以出入者也中霤人所資以居者也竈井人所資以養者也先王之於五者不特所資如此而又事有所本制度有所興此所以祀而報之也中霤土之所用事故祀於中央竈火之所用事故祀於夏井水之所用事故祀於冬尸在內而竒陽也故祀於春門在外而耦隂也故祀於秋兩漢魏晉之立五祀井皆與焉特隋唐參用月令祭法之説五祀祭行及李林甫之徒復修月令冬亦祀井而不祀行然則行神亦特軷於始行而已非先王冬日之常祀也考之於禮五祀之牲牛牲小司徒小祭祀共牛牲凡祭五祀於廟有主有尸觀月令臘先祖五祀同時則五祀祭於廟可知也曾子問既殯而祭五祀尸及三飯則五祀有尸可知也既殯而祭不酳不酢則凡祭五祀固有侑酳與酢矣老婦之祭先儒以為竈配則五祀固有配矣先儒又謂卿以上宗廟有主五祀亦有主矣大夫以下宗廟無主五祀亦如之然大夫之廟未嘗無主五祀有主與否不可考也王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戶曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立尸或立竈司命主督察三命中霤主堂室居處門户主出入行主道路行作厲主殺罰竈主飲食之事明堂月令春曰其祀戶祭先脾夏曰其祀竈祭先肺中央曰其祀中霤祭先心秋曰其祀門祭先肝冬曰其祀行祭先腎聘禮曰使者出釋幣於行歸釋幣於門士喪禮曰疾病禱於五祀司命與厲其時不著今時民家或春秋祀司命行神山神門户竈在旁是必春祠司命秋祠厲也或者合而祠之山即厲也民惡言厲巫祝以厲山為之謬也春秋傳曰鬼有所歸乃不為厲疏曰司命者宫中小神熊氏曰非天之司命故祭於宫中皇氏云司命者文昌宫星其義非也曰中霤者主堂室神曰國門者謂城門也曰國行者謂行神在國門外之西曰泰厲者謂古帝王無後者也此鬼無所依歸好為民作禍故祀之也王自為立七祀者前是為民所立與衆共之四時常祀及為羣姓禱祀其自為立者王自禱祭不知其當同是一神為是别更立七祀也諸侯為國立五祀者減天子戶竈二祀故為立五祀也曰公厲者謂古諸侯無後者諸侯稱公其鬼為厲故曰公厲諸侯自為立五祀者義與天子同大夫立三祀者減諸侯司命中霤故為三祀也曰族厲者謂古大夫無後者鬼也族衆也大夫衆多其鬼無後者衆故曰族厲曰門曰行者其大夫無民國故不言國門國行也云司命主督察三命者按援神契云命有三科有受命以保慶有遭命以謫暴有隨命以督行受命謂年夀也遭命謂行善而遇凶也隨命謂隨其善惡而報之云民惡言厲巫祝以厲山為之者鄭解厲稱山之意漢時人民嫌惡厲漢時巫祝之人意以厲神是厲山氏之鬼為之故云厲山所以謬者鬼之無後於是為厲厲山氏有子曰柱世祀厲山之神何得其鬼為厲故云謬也祭法曲禮天子諸侯大夫祭五祀注曰五祀戶竈中霤門行也此蓋殷時制也祭法曰天子立七祀諸侯立五祀大夫立三祀士立二祀謂周制也冬疏曰祭五祀者春祭戶夏祭竈季夏祭中霤秋祭門祭行也云此蓋殷時制也者以天子諸侯大夫同云祭五祀既無差等故疑殷時制也按王制云大夫祭五祀文與此同而鄭云五祀謂司命也中霤也門也行也厲也與此不同者王制之文上云天子祭天地諸侯祭社稷大夫祭五祀既有尊卑等級疑是周禮故引祭法五祀以解之與此不同是有地大夫祭五祀無地大夫祭三祀又疏曰鄭注曲禮大夫五祀為夏殷法注王制大夫五祀是有采地者鄭何以知然曲禮文連於大夫五祀故知非周而王制王立七祀故知周禮大夫五祀是有采地者以彼推此大夫三祀則周諸侯之大夫無地者也朱子語録問五祀皆有尸竈則以誰為尸曰今亦無可考者但如墓祭則以冡人為尸以此推之則祀竈之尸必是膳夫之類祀門之尸必是閽人之類又如祀山川則是虞衡之類黃氏曰祭法七祀宗伯五祀司命泰厲非地類血祭者唯五耳月令四時祀戶竈門行中霤是也漢立五祀白虎通云戶一祀竈二祀門三祀井四祀中霤五祀嵗一遍有司行事禮頗輕於社稷祀户以羊竈以雞中霤以牛門以犬井以豕嶽氏曰古有七祀於前代帝王諸侯卿大夫之無後者皆致祭焉謂之泰厲公厲族厲今絶無舉行者故此等無依之厲勢或出於依附淫祠殆無足怪禮記祭法鄭氏注漢時民家皆秋祠厲蓋此祀又逹於民也於古加嚴矣按月令五祀祭法王為羣姓立七祀皆典祀之正者也至漢則其制已廢而郊祀志所載不經淫祀甚衆然武帝時李少君言祠竈則可致物物謂鬼物致物則丹砂可化為黃金黃金成以為飲食器則益夀益夀則海中蓬萊仙可見於是天子始親祠竈又髙帝時南山巫祠南山秦中秦中者二世皇帝也與注疏所言泰厲者謂古帝王無後者其鬼無所依歸好為民作禍故祀之之意略同然其所以立祠之意則皆淫諂非禮之正也武帝太初二年令天下大酺五日祠門戶比臘後漢建武初有五祀有司掌之人家祀山神門戶山即厲也鬼有所歸乃不為厲魏武王始定天下興復舊祀而造祭五祀門户井竈中霤也晉武帝時傅元云帝之都城宜祭一門正宫亦祭一門正室祭一尸井竈及中霤各擇其正者祭之以後諸祀無聞唯司命配享於南郊壇隋制祀司命戶以春竈以夏門以秋行以冬各於享廟日中霤則以季夏祀黃郊日夏季土德王各命有司祭於廟西門道南牲以少牢唐初廢七祀唯季夏祭中霤開元中制禮祭七祀各因時享祭之於廟庭司命戶以春竈以夏門厲以秋行以冬中霤以季夏通典説曰天子諸侯必立五祀五祀者為其有居處出入飲食之用祭之所以報德也歷代不同或五或七周禮天子祭七諸侯祭五降殺之差也殷天子諸侯大夫皆五鄭注云殷禮者以祭法差降殊異故言之鄭又云竈祀老婦人古之始炊者也以此推之七祀皆應古之始造者焉馬融以七祀中之五門戶竈行中霤即句芒等五官之神配食者句芒食於木祝融食於火該食於金修及元冥食於水句龍食於土月令五時祭祀只是金木水火土五行之祭也許慎云月令孟夏祀竈王者所祭古之有功德於人非老婦也鄭元云為祭五祀竈在廟門外之東祀竈禮設主於竈陘祝融乃古火官之長猶后稷為堯司馬上公也今但就竈陘而祭之屈上公之神何其陋也又月令云其帝炎帝其神祝融文列在上與祀竈絶逺而推合之文義不次焉得為義也又左傳云五官之神生為上公死為貴神若祭之竈陘豈得為貴神乎特牲饋食禮云尸謖而祭饎㸑以謝先炊者之功知竈神是祭老婦報先炊之義也臧文仲燔柴於竈夫子譏之云盛於盆尊於瓶若是祝融之神豈可以盆瓶之器置於陘而祭之乎鄭沖云五祀雖出天地之間隂陽之氣實非四時五行隂陽之正者也月令春祀戶祭先脾秋祀門祭先肝此順氣所宜藏所值耳又司命則司命星下食人間司譴過小神矣袁凖正論著以為五行之官祭於門戶行竈中霤中霤土神也火正祀竈而水正不祀井非其類也且社奚為於人家之屋棟間哉禮記王七祀諸侯五大夫三冬其祀行是記之誤也井不輕於竈行不唯冬白虎通云月令其祀井是也秦靜云今月令謂行為井是以時俗或廢行而祀井魏武興復舊祀而祭門戶井竈中霤凡五祀焉按漢諸儒戴聖聞人通漢等白虎通議五祀則有井之説蓋當時已行中間廢闕至魏武重修舊典而祭井焉髙堂生月令仲冬祀四海井泉祭井自從小類不列五祀儒家設以井於五祀宜除井而祀行傅元曰七祀五祀月令皆云祀行而無井月令先儒有直作井者既祭竈而不祭井於事則有闕於情則不類謂之井者近是也又按白虎通曰共工之子曰修好逺遊舟車所至足迹所逹靡不窮覽故祀行以為祖神祖者徂也徂即行之義也唐開元禮祭七祀儀各因時享祭之唯中霤季夏别祭祫禘之日遍祭之如臘享祭日未明一刻大廟令率其屬入布神席於廟庭西門內道南東向北上席皆以莞設神位各於座首設酒樽於神座東南設洗於酒樽東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵太廟令與良醖令之屬入實樽罍如常其執樽罍篚者各位於樽罍篚之後初太祝以下入祝史與執樽罍篚者次入就位遂於堂上設饌訖太官丞引饌入祝史迎引於座首各設於神座前於光祿卿將升獻贊引引獻官詣罍盥洗詣酒樽所執樽者舉羃獻官酌酒贊引引獻官進西靣跪奠於司命神座少退西向立祝史持版進神座之右北向跪讀祝文曰維某年嵗次月朔日子開元神武皇帝遣具位姓名昭告於司命三陽照物四序惟始式遵常禮謹以犧齊粢盛庶品明薦於司命尚饗戶云時惟嵗首升陽贊滯竈云時惟夏始盛陽作統門云時惟孟秋升隂紀物厲云時屬實沉氣序清肅行云時惟冬首盛隂作紀讀祝文訖興獻官再拜祝史進奠版於神座還樽所其七祝版祝史一人讀之獻官再拜訖贊引引獻官詣酒樽所酌獻尸如上儀訖贊引引還本位於堂上徹豆祝史進徹豆還樽所臘享祭七祀文維某年嵗次月朔日子開元神武皇帝遣具位姓名昭告於司命户竈中霤門厲行今時和年豐式遵常禮謹以犧齊粢盛庶品明薦於司命户竈中霤門厲行尚饗獻官唯獻司命餘座齋郎助奠餘如上儀祭中霤儀季夏土王日祭中霤於太廟之庭前祭三日諸祭官散齋二日於正寢致齋一日於廟所如别儀前一日衛尉陳設如常祭日未明十刻太官丞具特牲之饌未明一刻太常令帥其屬入布神座於廟庭西門之內道南東向席以莞設神位於座首設酒樽於神座東南又設洗於酒樽東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵奉禮設太廟令位於神座東南執事者位於其後俱北向西上設門外位皆於東門之外道南重行北向以西為上質明諸行事之官各服其服良醖之屬入實樽罍太官丞監實籩豆簠簋贊引引太廟令又贊引引執事者俱就門外位太祝與執樽罍篚羃者先入詣神座前西向再拜訖各就位立定贊引引太廟令又贊引引執事者入就位贊引贊拜太廟令以下皆再拜太官丞出詣饌所贊引進太廟令之左白有司謹具請行事退復位太官丞引饌入太祝迎引於座首設於神座前訖太官丞以下還本位太祝還樽所贊引引太廟令詣罍洗盥手洗爵詣酒樽所執樽者舉羃太廟令酌酒贊引引太廟令進神座前西向跪奠爵俯伏興少退西向立太祝持版進於神座之右北向跪讀祝文曰維某年嵗次月朔日子開元神武皇帝謹遣具位姓名敢昭告於中霤賴兹保養氓庶以安式荷神功祗率常禮爰以特牲時藏薌合薌萁嘉蔬嘉薦醴酒明祝於神尚饗訖興太廟令再拜太祝進奠版於神座俯伏興還樽所太祝以爵酌福酒進太廟令之左北靣立太廟令再拜受爵跪祭酒遂飲卒爵太祝進受爵還樽所太廟令俯伏興再拜贊引引還本位太祝進跪徹豆俯伏興還樽所太祝與執樽罍篚者俱復位立定贊引贊拜太廟令以下皆再拜贊引進太廟令之左白禮畢遂引太廟令以下出其祝版燔於齋所按古者雖有五祀七祀而不言其所祭之地然以七者觀之獨司命與厲當有祭之之所而若中霤若門若戶若行若竈則所祭之神即其地也祭法言王及諸侯立門行二祀則曰國門國行大夫士則曰門曰行而已竊謂有國者祀此二神則當於國門祭之而大夫以下則當在其家之門首至若中霤尸竈則凡居室皆有之皆可祀於其地義或然也而隋唐乃祀之於太廟以時享祖宗之時并祭之蓋本鄭康成之説然康成注禮記月令其祀户條下則言凡祭五祀於廟注周禮宫正凡邦之事畢條下則言邦之祭社稷七祀於宫中而正義則謂於廟者殷禮於宫者周禮蓋康成解經於制度之不吻合處則以為或殷禮或周禮今鄭注自為異同而正義所以釋之者亦復如是皆臆説也然二説之中宫中之義為優蓋此五祀者皆人生日用起居之所係故當即宫居而祭之若廟則所以崇奉祖宗不當雜祭他鬼神於其地如門中霤廟亦有之因時享而并祀於其地猶云可也至於若司命若竈若行則於廟何關又王之所祀泰厲乃帝王之無後者蓋非我族類也今即太廟之中為位而祭之得毋有相奪豫享之患乎宋制七祀春祀司命及戶夏祀竈季夏祀中霤秋祀門及厲冬祀行為小祀用羊一豕一不行飲福神宗熙寧八年詔置太廟司命户竈中霤門厲行七祀版位元豐三年太常禮院請禘饗遍祭七祀詔從之四年詳定郊廟奉祀言按禮記祭法曰王自為立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戶曰竈孟春其祀户祭先脾孟夏其祀竈祭先肺中央土其祀中霤祭先心孟秋其祀門祭先肝孟冬其祀行祭先腎又傳曰春祠司命秋祠厲此所祀之位所祀之時所用之俎也又周禮司服掌王之吉服祭羣小祀則服元冕注謂羣小祀宫中七祀之屬又禮記曰一獻熟注謂宫中羣小神七祀之等又周禮大宗伯若王不與祭祀則攝位此所祀之服所獻之禮所攝之官也近世因禘祫則遍祭七祀其四時則隨時享分祭攝事以卿行禮而服七旒之冕分太廟牲以為俎一獻而不薦熟皆非禮制請立春祭尸於廟室尸外之西祭司命於廟門之西制脾於俎立夏祭竈於廟門之東制肺於俎季夏土王日祭中霤於廟庭之中制心於俎立秋祭門及厲於廟門外之西制肝於俎立冬祭行於廟門外之西制腎於俎皆用特牲更不隨時享分祭有司攝事以太廟令攝禮官服必元冕獻必薦熟親祠及臘享即依舊禮遍祭從之政和時議禮局上五禮新儀太廟七祀四時分祭如元豐儀臘享祫享則遍祭設位於殿下橫街之北道東西向北上文獻通考卷八十六
