body:
  text: 文獻通考卷一百五十五鄱陽馬端臨貴與著兵考七禁衛兵周官宫正掌王宫之戒令紏禁以時比宫中之官府次舍之衆寡時四時比校次其人之在否官府之在宫中者若膳夫王府內宰之屬次諸吏直宿若今部署諸廬者舍其所居寺也為之版以待官府次舍之版圗及其人之名籍以待比夕擊柝而比之莫行夜以比直宿者為其有懈怠離部署國有故則令宿其比亦如之故謂災禍令宿謂衛王宫也辨內外而時禁分别內外人禁其非時出入稽其功緒紏其德行功吏職也緒其志業譏其出入均其稍食去其淫怠與其竒袤之民民宫中吏之家人也淫放濫怠懈慢竒袤譎觚非常會其什伍而教之道藝五人為伍二伍為什寄宿衛之令月終則會其稍食嵗終則會其行事行事吏職也宫伯掌王宫之士庶子凡在版者鄭司農云庶子宿衛之官版名籍也以版為之若今鄉户籍謂之户版謂王宫之士謂王宫中諸吏之適子也庶子其支庶也掌其政令行其秩敘作其徒役之事秩祿秩也敘才等也作徒役之事天子所用授八次八舍之職事衛王宫者必居四角四中於徼候便也鄭司農云庶子衛王宫在內為次在外為舍玄謂次其宿衛所在舍其休沐之處若邦有大事作宫衆則令之謂王宫之士庶子於邦之大事或當選行月終則均秩嵗終則均敘以時頒其衣裘掌其誅賞虎賁氏虎士八百人士徒選有勇力者掌先後王而趨以卒伍王出將虎賁士居前後雖羣行亦有局分軍旅會同亦如之舍則守王間舍王出所止宿處間梐枑也王在國則守王宫為周衛國有大故則守王門大喪亦如之及葬從遣車而哭適四方使則從士大夫虎士從使者若道路不通有徴事則奉書以使於四方不通逢兵寇若泥水奉書徴師役也旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪夾王車者其下士也下士十有六人士為之帥焉凡祭祀會同賓客則服而趨服而趨夾王車趨也會同賓客王亦齋服服袞冕則此士之齋服玄玄端喪記則衰葛執戈盾葛葛絰武士尚輕軍旅則介而趨介被甲司𨽻掌五𨽻之法辨其物而掌其政令五𨽻謂罪𨽻四翟之𨽻也物衣服兵器之屬掌帥四翟之役使之皆服其邦之服執其邦之兵守王宫與野舍之厲禁野舍王行所止舍也厲遮衛也疏服其邦之服若東方南方衣皮帛執刀劍西北方衣氊裘執弓矢蠻𨽻在王宫者執其國之兵以守王宫在野外則守厲禁罪𨽻夷𨽻貉𨽻其守王宫與其守厲禁者如蠻𨽻之事林氏曰周廬千列設戟百重入守虎關出陪豹尾此古人設衛所以強幹弱枝防未然而滅不軌也昔成周宿衛之制居則宫正宫伯之衛行則虎賁氏之衛僕從之衛掌於太僕守𨽻之衛掌於司𨽻其制蓋不一矣宫正有宫之徒役宫伯有公卿大夫之士庶子以為環列腹心之任居衛之制然也虎賁氏有虎士八百人掌先後王而趨以卒伍視朝則在路門之右行衛之制然也太僕掌奉輿馬督扈從視朝則在路門之左太僕王視朝則荷正位而退入亦如之王出入則左馭而前驅太僕而下有小臣祭僕𨽻僕御僕皆屬焉又司云太僕大有太僕從者在路門之左司𨽻掌率夷𨽻執兵器服兵服以衛王之門外朝在野外則守內列僕從守𨽻之衛制然也由是言之環列腹心之衛非兵衛在內而不出虎士之衛為重兵之衛非王出亦不行四翟之衛則環衛諸門僕從之徒則整飾騶從此宿衛之别詳矣然虎賁綴衣無非吉士侍御僕從罔非正人執劉鉞而上戈刃者皆用冠冕之士大夫顧命四人綦辨執戈上刃夾兩階戺一人冕執劉立於東堂居虎門而詔王媺者乃率四夷之賤𨽻師氏掌以媺詔王使其屬率四夷之𨽻紏其德行稽其功緒勸以善也掌其紏禁嚴其誅賞防以過也由是言之腹心之衛固擇有道有德之賢而宿衛之兵亦皆使賢士大夫為之其任嚴矣而聖人防微杜漸之意又不止是蓋人君處內庭之時多處外庭之時少親侍臣之意玩親大臣之意嚴今宫正宫伯之兵衛郎衛固為太宰之屬而虎賁之虎士掌於司馬司𨽻之伍𨽻掌於司寇皆聼命於太宰內外相維而賢否無混淆之患事權不分而政令無下移之漸此周制之所以盡善也漢制南軍在京城門內衛尉主之北軍在宫城門外中尉主之詳見兵制門郎中令秦官掌宫殿掖門户有丞武帝太初元年更名光祿勳屬官有大夫郎謁者皆秦官又期門羽林皆屬焉衛尉秦官掌宫門衛屯兵有丞景帝初更名中大夫令後元年復為衛尉屬官有公車司馬衛士旅賁三令丞衛三丞又諸屯衛候司馬十二官皆附焉郎掌守門户出充車騎有議郎中郎侍郎郎中皆無員多至千人徐氏官考曰謹按周之兵制無事則散之田畝有役則召以縣師而宿衛常飬之兵則有虎賁之士八百人至六軍之徒一軍百人大司馬之屬徒三百有二十人又在虎賁之外然不常有而虎賁之祿比下士足以代耕蓋庶人在官者也漢期門千人而秩比郎亦古虎賁之遺意歟後漢光祿勳掌宿衛宫殿門户典謁書郎更直執戟宿衛門户考其德行而進退之五官中郎將五官中郎五官侍郎五官郎中凡郎官皆主更直執戟宿衛諸殿門户出充車騎左右僕射主虎賁郎習射左右陛長主直虎賁朝會在殿中虎賁郎虎賁中郎將羽林中郎將羽林郎無員掌宿衛侍從掌選漢陽隴西安定北地上郡西河凡六郡良家子弟補林氏曰漢制南軍衛宫衛尉主之北軍護京中尉主之南軍則有郎衛兵衛之别如三署諸郎羽林期門則皆郎衛也如衛士令丞諸屯衛候則皆兵衛也是衛也非南軍守衛之衛乎北軍則有調兵募兵之分如三輔兵卒則是調兵而衛表中尉屬官左右京輔都尉尉丞有兵卒按黃霸為京兆尹坐發騎士詣北軍調馬不適士貶秩則京輔兵卒番上北軍明矣如八校胡騎越騎則是募兵而衛八校尉皆武帝初置中壘屯騎步兵越騎長水胡騎射聲虎賁是衛也非北軍護京之衛乎此漢人南北軍之制也朱虛入衛卒平諸吕方朔執戟坐折董偃袁盎以中郎却慎夫人之坐日磾入侍縛莽何羅之逆事並見夲傳王國侯國拘不得入漢制王國侯國不得入宿衛龔勝為楚王常侍後三舉孝亷不得宿衛同族犯法限不得與漢制同族犯法不得宿衛蕭望之以甲科為郎後坐弟犯法不得宿衛雖以龔勝蕭望之之賢寧從退免則宿衛所任之人固無愧於周耳然始以南北軍皆𨽻三公而太尉周勃得入北軍以成安劉之功可也自武帝踈逺外庭之後衛尉之職領於將軍王莽以大將軍兼衛尉城門之兵領於司馬成帝世陽阿侯王談成都侯王商紅陽侯王音皆以大司馬特進領城門軍往往以中朝任之而大臣皆無預焉大司馬之任又非向時大尉之比豈知禁嚴之地大臣皆不預聞則凡可以轉移人主之心志惑亂人主之視聼無所不至異日之變可見耳至東漢以來又舉五官郎將羽林虎賁以職屬大夫議郎謁者僕射以文屬後漢官志五官中郎將左右中郎將羽林虎賁中郎將羽林監以職屬光祿大夫大中大夫中散大夫諫議大夫議郎謁者僕射常侍謁者以文屬分屬之後政令不行於其間而又光祿大夫不在宿直議郎不與執戟後志自五官至羽林凡七署唯議郎與光祿大夫同不在直中餘同後志惟不在宿直執戟之列則凡為禁衛者皆非士人之流而郎官三省盡為諸黃門之廬耳故宦官內典門户外與政事竇武説太后曰故事黃門常侍但當給事省內典門户耳今乃使與政事而任權重子弟布列專為貪暴及何進誅宦者太后不聼曰中官領統禁省自古及今漢家故事我奈何與士人共對事乎則知士人不為郎中久矣後盡除宦者選三署郎入守宦官之廬即此可見何進傳推原其故皆光武不任三公多置黃門光武不任三公事歸臺閣後官少府屬多置黃門其流禍至是也唐有南北衙兵南衙諸衛兵是也北衙禁軍是也髙祖初起兵有元從禁軍太宗時置百騎武后時改為千騎睿宗時增至萬騎肅宗時有供奉射生官代宗以後有左右神䇿軍並詳見兵制門左右監門衛掌諸禁衛門籍之法左右千牛衛掌衛及供御兵仗親衛一府勳衛二府翊衛二府凡有五府每府中郎將一人左右中郎將各一人凡府中郎將掌領校尉旅師親衛之屬宿衛者而總其府事左右郎將二焉番上者以名簿上於大將軍而配以職武德貞觀世重資蔭二品三品子補親衛二品曽孫三品孫四品子職事官五品子若孫勳官三品以上有封及國公子補勳衛及率府親衛四品孫五品及上柱國子補翊衛及率府勳衛勳官二品及縣男以上子若孫補諸衛及率府翊衛王府執仗親事執乘親事每月番上者數千人宿衛內廡及城門給廪食執扇三衛三百人擇少壯肩膊齊儀容整美者夲衛印臂送殿中省𨽻習仗下每番三衛一人為太僕寺引輅其後入官路艱三衛非權勢子弟輒退番柱國子有白首不得進者流外雖鄙不數年給祿廪故三衛益賤人罕趨之左右衛上將軍各一人大將軍各一人將軍各二人掌宫禁宿衛凡五府及外府皆總制焉凡五府三衛及折衝府驍騎番上受其名簿而配以職左右衛左右驍騎左右武衛左右威衛左右領軍左右金吾左右監門左右千牛衛凡十六左右千牛衛掌侍從及僕御器仗以千牛備身左右執弓箭宿衛以主仗守戎器折衝都尉掌領屬備宿衛師役則總戎具資點習以三百人為團一校尉領之十六衛每衛有上將軍有大將軍有將軍自左右衛至領軍並掌宫禁宿衛金吾掌宫中京城警監門掌諸門禁衛千牛掌侍衛凡五府外府之番上者十二衛受其名簿而配以職除監門千牛凡左右四衛不領故但十二衛五府謂親勳翊三衛外府折衝府也五府惟左右衛兼領之餘但翊衛二府而已林氏曰唐制有八衛各分左右自左右以至千牛皆典扈從是故宫禁宿衛是統是司內廂儀仗是臨是職者左右衛也皇城四靣宫城內外諸門置兵分助其役者驍騎也正衙朝會釐鎧旅卒兩廂列仗唱警應蹕者武衛也正殿之前隊立於階長樂永安隊列於廡者威衛也皇城之四面宫苑之城門則職於領軍京城烽堠之宜南衙番上之數則職於金吾禁衛名籍器仗出入則職於監門僕御兵仗宿衛弓箭則職於千牛此唐人十六衛之制也張延師之謹畏至三十年未嘗有過唐職林張延師為左衛大將軍性謹畏典羽林三十年未嘗有過阿史那忠之清謹至四十八年無有纎隙忠性清謹為右驍騎大將軍宿衛四十八年無纎隙時人比之金日磾龎玉久典宿衛習知制度玉久宿衛習知朝廷制度髙祖顧諸將多不間儀檢故授玉領軍武衛一大將軍使衆觀以為法假志元衛章武門夜不示詔假志元為左驍騎大將軍文德皇后之葬勒兵衛章武門太宗夜遣使至志元拒曰軍門不夜開使者示以手詔志元曰夜不能辨比旦帝嘆曰真將軍也則宿衛所任之人亦無愧於周然始以大臣兼領宿衛使文皇有甘寢之安可也元微之行子季友右羽林將軍制曰分八舍之衆寡均一庚之勞逸皆將軍之力也是以李大亮上直禁中而文皇甘寢則心腹瓜牙之任不細矣時李大亮以冬官兼自六軍禁衛皆用市人其選始輕天寶之後衛佐悉以假人為童奴京師人耻之至相屬辱必曰侍官而六軍宿衛皆市人祿山吐蕃之變神策禁軍外入赴難國家遂以倚重悉命中人主之其勢益橫兵至上元中以北衙軍使衛伯玉為神策軍節度使鎮陜州中使魚朝恩為觀軍容使監其軍祿山反時伯玉以磨環門軍赴難即神䇿軍也其後吐蕃入寇朝恩又以神策軍屯苑自是復益分為左右廂大歷四年請以京兆之好畤鳳翔之麟遊普閏皆𨽻神䇿自是南衙日輕北衙日重矣夫所謂禁軍者蓋太宗舉義兵起太原已定天下悉罷還歸而願留宿衛者三萬人給以渭北腴田號曰元從禁軍夲為兵立制非為制置兵見唐兵志詳已具兵制門其後左右羽林龍武神武及神䇿神威而總名北衙者豈太宗初制哉唐兵志載詳已具兵制門且唐之十六衛已備漢人南北軍之制以衛尉護南軍以金吾巡北軍今十六衛已有金吾將軍掌京城巡警是北軍已寓其間觀白集羽林衛將軍之制所謂國家設十六衛猶漢之有南北軍其知之矣白集王元輔授左羽林衛將軍制國家設十六衛猶漢之有南北軍而左右羽林尤稱親重而其元從禁軍亦猶官制員外之置初非禁衛正兵也今以禁軍為北衙衛兵為南衙以備漢制豈不過歟北衙既橫之後外庭諸臣莫之誰何蕭復言之而不見聼蕭復言艱難以來始用宦者監軍權望太重是曹政可委宫掖事兵要政機勿使參預不聼髙元裕言之而不及用夲傳敬宗視朝不時決事禁中宦寺恣放大臣不得進見元裕諫曰西頭勢乃重南衙樞密之權過宰相帝雖悟而不能用惜夫推原其故皆外臣不預禁軍專歸宦者其為患至是也噫漢不以中朝屬外朝而使閹宦宿直卒成何進之亂見進夲傳唐不以北衙𨽻南衙亦使宦官典兵反致王叔文之亂見唐兵志其視周人以禁衛屬冢宰之意又何止天淵哉梁太祖始置侍衛馬步軍開平元年改左右長直為左右龍虎軍左右內衛為左右羽林軍左右監鋭夾馬突將為左右神武軍左右親隨軍將馬軍為左右龍􅋮軍其年九月置左右天興左右廣勝軍仍以親王為軍使二年十月置左右神捷軍十二月改左右天武為左右龍虎軍左右龍虎為左右天武軍左右天威為左右羽林軍左右羽林為左右天威軍左右英武為左右神武軍左右神武為左右英武軍前朝置龍虎等六軍謂之衛士至是以天威天武英武等六軍易其軍號而任勳舊焉後唐長興三年三月敕衛軍神威雄威及魏府廣捷以下指揮宜改為左右羽林置四十指揮每十指揮立為一軍每一軍置都指揮使一人兼分為左右廂應順元年三月改左右羽林四十指揮為嚴衛左右軍龍武神武四十指揮為捧聖左右軍清泰元年六月改捧聖馬軍為彰聖左右軍嚴衛步軍為寧衛左右軍晉天福六年改拱宸威和內直軍並為興順至八月改奉德兩軍為護聖左右軍周廣順元年四月改侍衛馬軍曰龍捷左右軍步軍曰虎捷左右軍顯德元年詔汰簡諸軍取武藝超絶者為殿前諸班見軍制門宋太祖皇帝建隆初詔殿前侍衛二司各閲所掌兵練其驍勇者為上軍老弱者為剩員又詔諸州長吏選所部兵送都下以補禁旅之闕詳見兵制門禁軍殿前侍衛司分領之殿前司領騎兵之額三十七步兵之額二十六侍衛司領騎兵之額三十五步兵之額八十三御前忠佐軍頭司領步騎之額四皇城司領步兵之額二左右騏驥院領騎兵之額二廂軍亦內屬侍衛司見郡國門仁宗天聖至寶元間增募禁軍陜西蕃落廣鋭河北雲翼京畿廣捷虎翼效忠陜西河東清邉弩手京西江淮荆湖歸逺總百餘營康定初趙元昊反西邉用師詔募神捷兵既而易名萬勝為二十營所募多雜市井之人選偄不足以備戰守是時禁兵多戍陜西陜西並邉土兵雖不及等然驍勇善戰而以京師所遣戍為東兵東兵雖魁碩大率不能辛苦而摧鋒陷陳非其所長又北兵戍川陜嶺嶠荆湖間多不便習水土故建議者欲益募土兵為就糧於是增置陜西蕃落保捷定功河北雲翼有馬徑勇陜西河北振武河北京東武衛陜西京西壯勇延州青澗登州澄海弩手京畿近郡亦增募龍騎廣勇廣捷虎翼步鬬步武復升河北招收無敵聼豫馬陜西制勝并州充戎騎射麟州飛騎府州威逺秦州建威慶州有馬安塞保州威邉安肅軍忠鋭嵐府州建安登州平海皆為禁兵蓋用外馬步凡增數百營揀選之制有自廂軍升禁軍禁軍升上軍上軍升班直升上軍及班直者皆臨軒親閲自非才勇絶羣不以應召募餘皆自下選補仁宗嘗詔樞密院次禁軍選補之法凡入上四軍者捧日天武弓以九斗龍衛神衛弓以七斗天武弩以二石七斗神衛弩以二石三斗為中格恩冀員僚直驍捷軍士選中四軍則不復閲試自餘招揀中選者並引對凡員僚直闕人則以選中上軍及龍衛等樣弓射七斗合格者充仍許如龍衛例選補班直凡選禁軍自奉錢三百以上弓射一石五斗弩跖三石五斗等樣及龍衛者並親閲以𨽻龍衛神衛凡騎御馬直闕小底則閲拱聖驍騎少壯善射者充凡弓手內殿直以下選補殿前指揮使射一石五斗御龍弓箭直選補御龍直御龍骨朵子直東西班帶甲殿侍選補長入祗候御龍諸直將虞候選補十將射皆一石四斗東西班散直選補內殿直捧日員僚直天武神衛龍衛親從選補諸班直御龍骨朵子直弓箭直將虞候選補十將御龍諸直長行選補將虞候射皆一石三斗員僚龍御騎御馬直小底選補散直射皆一石二斗神宗初揀罷禁軍之不如法者入并廢諸軍營詳見兵制門熙寧之籍天下禁軍凡五十六萬八千六百八十八人元豐之籍六十一萬二千二百四十三人徽宗宣和五年尚書省言昨臣僚言古制六軍所以備王之爪牙而羽林又禁衛之總名也今臣僚使令兵卒所居營分曰六軍而復有左右衛林之名稱謂失當詔令措置今欲將揀中六軍并六軍指揮並改為廣效內揀中六軍作第一指揮左龍武第二左羽林第三左神武第四右龍武第五右羽林第六右神武第七從之髙宗建炎元年五月始置御營司以黃潛善汪伯彥兼使副國初以來殿前侍御馬步司三衙禁旅合十餘萬人自髙俅得用軍政遂弛靖康末衛士僅三萬人及城破所存無幾至是殿前司以左言權領而侍衛二司猶在東京禁衛寡弱諸將楊惟忠王淵韓世忠以河北兵劉光世以陜西兵張俊苖傅等以帥府及降盜兵皆在行朝不相統一於是始置御營司以總齊軍中之政令因其所部為五軍以淵為使司都總制世忠俊傅等並為統制官又命光世提舉使同一行事務潛善伯彥别置親兵各千人優其廪賜議者非之四年三省言夲府分兩府而兵權盡付樞密院今又置御營司是政出於三也乃詔御營司併歸樞密院紹興四年詔改御前五軍為神武御營五軍為神武副軍並𨽻樞密院既而左僕射趙鼎言神武乃北齊舊號且督府軍馬今撥𨽻三衙乃廢神武中軍𨽻殿前司以楊沂中主管殿司公事又以都督府兵分𨽻之於是殿司之兵柄始一建炎以來朝野雜記國朝舊制殿前侍衛馬步三衙禁旅合十餘萬人宣和間僅存三萬而已京城之破多死於敵建炎元年秋騎帥郭仲荀自東京部禁旅至南京已而還為副留守三年秋仲荀以敵過京城糧儲告竭遂率餘兵赴行在其冬上將航海避狄而衛士張寶等不欲行因吕元直入朝率衆圍之出語不遜上怒誅十七人於明州市除行門外盡廢其班明年春上至台州兵衛寡弱惟中軍統制官辛永宗有衆數千而吕元直之親軍將姚端衆獨盛上皆優遇四月上還會稽乃選中軍五百人入直殿巖悉烏合之衆時趙元鎮初秉政因為上言祖宗於兵政最為留意今諸將各總衆兵不𨽻三衙則兵政已壞獨衛兵髣佛舊制亦掃蕩不存是因咽而廢食也上悟尋復舊制然衛兵不滿三千識者病其單弱數以為言紹興二年秋詔三衙措置已而上謂輔臣曰一衛士所給可贍三四兵朕命楊沂中治神武中軍此皆宿衛兵也遂命沂中兼提舉宿衛親兵五年冬廢神武中軍𨽻殿前司以沂中主管殿前司公事十二月庚子又以都督府兵分𨽻三衙是月庚戍七年夏復合馬司餘軍及八字軍為六軍十二將命劉信叔主之四月丙申解承宣潛典步軍如故自是三衙始復矣神武中軍舊止三部自楊存中職殿巖始增為五軍又置護聖踏白選鋒神奕神勇馬步凡十二軍時江海盜作因分制諸軍控制之如泉之左翼贛之右翼循之推鋒明之水軍皆𨽻殿司總七萬人由是殿司兵籍為天下冠初御營五軍之外又置御前三軍尋又改為神武五軍紹興元年又改為行營四護軍張俊稱前軍韓世忠稱後軍嶽飛稱左軍劉光世稱右軍楊沂中中軍以𨽻殿前司而吳玠軍如故七年光世軍叛降偽齊於是川陜軍更以右護軍為號十一年三宣撫罷乃改稱某州駐劄御前諸軍十八年川陜諸軍亦如之其軍皆不𨽻三衙由是御前軍又在禁軍之外矣二十四年殿前都指揮使楊存中劄子乞遵依祖宗法在京所管捧日天武拱聖驍勝騎勝寧朔神騎神勇宣武虎翼廣勇諸指揮禁軍內捧日天武依條升揀扈衛諸班直拱聖神勇以下升揀捧日天武除逃亡事故外有一千九百人差使日增人數日虧欲乞於今年分定月分內招一千人請給例物並依先招人體例詔依二十七年十二月樞密院言殿前都指揮使楊存中劄子凖旨三衙所招軍兵效用權行住招自紹興二十六年見闕四千四十六人及三十七年揀汰三千四十四人見闕二千一百四十人并已揀汰五百四十人共闕六千七百二十六人若不招填兵數日有虧損緣近來遊手人陳乞情願投軍稍多望令夲司自來年正月一日為始依舊招募情願投軍少壯百姓刺充效用勝捷吐渾雄威填額使換依例支破請給所招係填名闕即不曾添請給照依今三衙依分定月分招填孝宗隆興三年主管步軍司公事郭振言夲司在京日所管軍額計三萬九千五百人今來行在見管止一千二百一十九人緣諸處非乏差使應副不行乞招一千七百八十人通作三千人為額刺充神衛虎翼飛山床子弩雄武等指揮其請給例物等依則例行詔特依乾道四年樞密院言殿前司步軍司內有官人子弟多願投充效用其間不及等杖二三寸却有膂力強壯之人詔今後令逐司遇有闕額除及等杖外若低一二寸令射八斗力弓低三寸令射九斗力弓委承旨司審驗強壯即行指試六年主管侍衛馬軍司公事李顯忠言夲司諸軍兵將官有闕自來遴選衆所推服之人不以次序申乞升差近年以來須自訓練官差充準備將及二年升副將副將及二年升正將正將及三年升統領再及三年升統制官切恐無以激勸士氣乞今後兵將官有闕不以年限許令夲司銓量人材膽勇過人能服衆者保明申朝廷取旨差填從之時處禁旅廷補夲末見軍制門七年虞允文乞移馬司於建康以為出師之漸乃以李顯忠為都指揮使統馬軍屯焉元額三萬人乾道初殿步馬司兵馬權以七萬三千人為額二年降旨馬司以三萬人步司以二萬七千人慶元二年殿前都指揮使郭杲言南渡以來捧日天武已下權以三千人為額今諸班直見管一千七百五十九人并新揀中人共二千二百五十二人請立為定額詔依大抵此一軍乃髙宗所收諸將之部曲其殿前司則辛永宗諸軍部曲而益以他軍也馬軍司則合王彥部曲而益以解潛劉錡田盛之兵步軍司則夲王彥所部之兵其軍校之制有殿前司都指揮使副都指揮使都虞候各一人諸班有都虞候都虞候指揮使都知副都知押班御龍諸班有四直都虞候夲直各有都虞候指揮使都頭十將將虞候馬步軍有捧日四廂都指揮使管舊城裏左廂煙大及殿前司馬軍天武四廂都指揮使管舊城裏右廂煙火及殿前司馬軍捧日天武左右廂各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使每都有軍使步軍四都頭副兵馬使副軍四副都頭十將虞候承局押官其下有統制官領官同統領正將副將同副將準備將同準備將之分推之侍衛司廂禁軍皆如之中興制自殿前左右班御龍直骨朵直內殿直弓箭直弩直散員散指揮散都頭散祗候金槍銀槍班茶酒新班西一班殿侍東五班散直班二十四班為上軍文獻通考卷一百五十五
