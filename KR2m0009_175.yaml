body:
  text: 文獻通考卷一百七十五鄱陽馬端臨貴與著經籍考二經易昔伏犧氏始畫八卦以通神眀之德以類萬物之情蓋因而重之為六十四卦及乎三代是為三易夏曰連山言似山內出氣殷曰歸藏言萬物莫不歸而藏于其中杜子春曰連山伏犧歸藏黃帝周禮疏按今歸藏坤開筮帝堯降二女為舜妃又見節卦云殷王其國常母谷若依子春説歸藏黃帝何得有帝堯及殷王事蓋子春之意伏犧黃帝造其名夏殷因其名以作易也周文王作卦辭謂之周易周公作爻辭孔子為彖辭象辭繫辭文言序卦説卦雜卦謂之十翼班固曰孔子晚而好易讀之韋編三絶而為之傳即十翼也先儒説重卦及爻辭并十翼不同自魯商瞿子木受易孔子商瞿姓以授魯橋庇子庸姓橋名庇字子庸子庸授江東馯臂子弓馯姓也音韓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子裝及秦焚書周易獨以卜筮得存唯失説卦三篇後河內女子得之漢初傳易者有田何何授丁寬寬授田王孫王孫授沛人施讎東海孟喜琅邪梁丘賀由是有施孟梁丘之學又有東郡京房自云受易于梁國焦延夀别為京氏學嘗立後罷後漢施孟梁丘京氏凡四家並立而傳者甚衆漢初又有東萊費直傳易其本皆古字號曰古文易以授琅邪王璜璜授沛人高相相以授子康及蘭陵母將永故有費氏之學行于人間而未得立後漢陳元鄭衆皆傳費氏之學馬融又為其傳以授鄭玄玄作易注荀􅐩又作易傳魏代王肅王弼並為之注自是費氏大興高氏遂衰梁丘施氏亡於西晉孟氏京氏有書無師梁陳鄭玄王弼二注列于國學齊代唯傳鄭義至隋王注盛行鄭學浸微今殆絶矣歸藏漢初已亡按晉中經有之唯載卜筮不似聖人之旨唐開元中備有三易至宋惟歸藏略存而不傳習漢募羣書多散逸而易獨完學者傳之遂分為三一曰田何之易始自子夏傳之孔子卦象爻彖與文言説卦等離為十二篇而説者自為章句易之本經也二曰焦贛之易無所師授自本言得之隱者第述隂陽災異之言不類聖人之經三曰費直之易亦無師授専以彖象文言等參卦爻凡以彖象文言雜入卦中者自費氏始田何之學施孟梁丘之徒最盛費氏初微但傳民間至後漢時陳元鄭衆之徒皆學費氏費氏興而田何遂息古十二篇之易遂亡其本及王弼為注亦用卦象相雜之經自晉之後弼學獨行遂傳至今西漢志易十三家二百九十四篇隋志六十九部五百五十一卷通計亡書合九十四部八百二十九卷唐志七十六家八十八部六百六十五卷失姓名一家李鼎祚以下不著録十一家三百二十九卷宋三朝志二十七部二百四十卷宋兩朝志十一部七十三卷宋四朝志三十七部二百一十九卷宋中興志一百四十家一百八十四部一千三百六十六卷丁寬易本傳初梁項生從田何受易時寬為項生從者讀易精敏材過項生遂事何學成何謝寬寬東歸何謂門人曰易以東矣寬至雒陽復從周王孫受古義號周氏傳景帝時寬為梁孝王將軍距吳楚號丁將軍作易説三萬言訓詁舉大義而已今小章句是也寬授同郡碭田王孫王孫授施讎孟喜梁丘賀由是易有施孟梁丘之學孟喜易本傳喜從田王孫受易好自稱譽得易家候隂陽災變書詐言師田生且死時獨傳喜諸儒以此耀之也耀榮也同門梁丘賀疏通證明之疏通猶分别證明明其偽也曰田生絶于施讎手中時喜歸東海安得此事又蜀人趙賔好小數書後為易飾易文以為箕子明夷隂陽氣亡箕子箕子者萬物方荄滋也師古曰易明夷箕子之明夷利貞此箕子者謂殷父師説洪範者也而賔妄為之説荄滋言其根荄滋茂也荄音該又音皆賔持論巧慧易家不能難皆曰非古法也心不服云受孟喜為名之名之者承取其名云實授賔也後賔死莫能持其説喜因不肯仞仭亦名也以此不見信京房易傳四卷本傳房治易事梁人焦延夀名贛贛常曰得我道以亡身者京生也其説長于災變分六十四卦更直日用事以風雨寒溫為候孟康曰分卦直日之法一爻主一日六十四卦為三百六十日餘四卦震離兑坎為方伯監司之官所以用震離兑坎者是二至二分用事之日又是四時各専主之氣各卦主時其占法各以其日觀其善惡也各有占驗房用之尤精鼂氏讀書記曰漢藝文志易京氏凡三種八十九篇隋經籍志有京氏章句十卷又有占候十種七十三卷唐藝文志有京氏章句十卷而占候存者五種二十三卷今其章句亡矣乃略見于僧一行及李鼎祚之書今傳者曰京氏積算易傳三卷雜占條例法一卷名與古不同所謂積算易傳疑隋唐志之錯卦是也雜占條例法者疑隋唐志之逆刺占災異是也景迂嘗曰是書兆乾坤之二象以成八卦卦凡八變六十有四於其往來升降之際以觀消息盈虗於天地之元而酬酢乎萬物之表者炳然在目也大抵辨三易運五行正四時謹二十四氣悉七十二候而位五星降二十八宿其進退以幾而為一卦之主者謂之世竒耦相與據一以超二而為主之相者謂之應世之所位而隂陽之肆者謂之飛隂陽肇乎所配乾與坤震與巽坎與離艮與兊而終不脫乎本以飛某卦之位乃伏某宫之位以隱賾佐神明者謂之伏起乎世而周乎內外參乎本數以紀月者謂之建終終始極乎數而不可窮以紀日者謂之積含于中而以四為用一卦備四卦者謂之互乾建甲子于初坤建甲午于上八卦之上乃生一世之初一世之五位乃分而為五世之位其五世之上乃為遊魂之世五世之初乃為歸魂之世而歸魂之初乃生後卦之初其建剛日則節氣柔日則中氣其數虗則二十有八盈則三十有六蓋其可言者如此若夫象遺乎意意遺乎言則錯綜其用唯變所適茍非彰往而察來微顯而闡幽者曷足以與此易學自商瞿至孟喜授受甚明房受之喜而翟牧白生者不肯仞京房曰京非孟氏學也劉向亦疑京託之孟氏豫不知當時為何説也今以當時之書驗之蓋有孟氏京房十一篇災異孟氏京房六十六篇同為一家之學則其源委孰可誣哉石林葉氏曰世傳京房易學據漢書傳易自商瞿至田王孫皆自有次第故言易者以田王孫為正孟喜從王孫學好自稱譽得易家候隂陽災變書詐言王孫死時枕喜股膝獨傳己為梁丘賀所排矣京房受學焦延壽延夀受學孟喜孟喜且不為當時所信况延夀乎史謂延夀獨得隱士之説託之孟氏易家大略同唯京氏為異黨而受梁丘賀學者亦京房顔師古謂别一人亦受學田何今世有京房易皆隂陽歷數之書又有京房雜算數十篇其言龎雜専主占筮兩人莫知為誰審為受延夀學者今考京房傳本以卦氣直日為説與其書不類占事知來房力犯𢎞恭石顯自不能保其身亦何貴於占乎易于他經孔子最所致意蓋言五十而學易可以無大過而自司馬遷以來學者皆言孔子傳商瞿瞿本非門人高弟略無一言見于論語性與天道子貢且不得聞而謂商瞿得之乎朱子語録曰京房卦氣用六日七分季通云康節亦用六日七分但不見康節説處又曰京房輩説數捉他那影裏才發見處便算將去且如今日一箇人來相見便就那相見底時節算得這箇是好人不是好人用得極精密他只是動便算得靜便算不得陳氏書録解題曰京房易傳三卷積算雜占條例一卷吳鬱林太守陸績注京氏學廢絶久矣所謂章句者既不復傳而占候之存於世者僅若此校之前志什百之一二耳今世術士所用世應飛伏遊魂歸魂納甲之説皆出京氏鼂景迂嘗為京氏學也用其傳為易式云或作四卷而條例居其首又有參同契律厯志見隂陽家専言占候焦氏易林十六卷説見占筮門費直易本傳直長于卦筮亡章句徒以彖象繫辭十篇文言解説上下經琅邪王璜平中音仲能傳之鄭康成易注崇文總目今唯文言説卦序卦雜卦合四篇餘皆逸指趣淵確本去聖之未逺王弼易注略例繫辭注十卷鼂氏曰上下經魏尚書郎王弼輔嗣注繫辭説卦雜卦序卦弼之門人韓康伯注又載弼所作略例通十卷易自商瞿受於孔子六傳至田何而大興為施讎孟喜梁丘賀其後焦贛費直始顯而傳受皆不明由是分為三家漢末田焦之學微絶而費氏獨存其學無章句惟以彖象文言等十篇解上下經凡以彖象文言等參入卦中者皆祖費氏東京荀劉馬鄭皆傳其學王弼最後世或用鄭説則弼亦本費氏也歐陽公見此遂謂孔子古經已亡按劉向以中古文易經校施孟梁丘經或脫去無咎悔亡惟費氏經與古文同然則古經何嘗亡哉陳氏曰自漢以來言易者多溺於象占之學至弼始一切掃去暢以義理於是天下宗之餘家盡廢然王弼好老氏魏晉談玄自弼輩倡之易有聖人之道四焉去三存一于道闕矣况其所謂辭者又雜異端之説乎范寧謂其罪深於桀紂誠有以也連山十卷北史劉炫傳時牛𢎞奏購求天下遺逸之書炫遂偽造書百餘卷題為連山易魯史記等録上送官取賞而去後人有訟之經赦免死坐除名夾漈鄭氏曰夏后氏易至唐始出今亡歸藏三卷崇文總目晉太尉參軍薛正注隋世有十三篇今但存初經齊母本著三篇文多闕亂不可詳解夾漈鄭氏曰連山亡矣歸藏唐有司馬膺注十三卷今亦亡隋有薛正注十三卷今所存者初經齊母本著三篇而已言占筮事其辭質其義古後學以其不文則疑而棄之往往連山所以亡者復過于此矣獨不知後之人能為此文乎子曰周監於二代郁郁乎文哉以周易校商易則周商之文質可知也以商易校夏易則商夏之文質又可知也三易皆始乎八而成六十四有八卦即有六十四卦六十四卦非至周而備也但法之所立數之所起皆不相為用連山用三十六䇿歸藏四十五䇿周易四十九䇿誠以人事代謝星紀推移一代一謝漸繁漸文又何必近耳目而信諸逺耳目而疑諸按連山歸藏乃夏商之易本在周易之前然歸藏漢志無之連山隋志無之蓋二書至晉隋間始出而連山出於劉炫之偽作北史明言之度歸藏之為書亦此類耳夾漈好竒獨尊信此二書與古三墳書且咎世人以其晚出而疑之然殊不知毛氏詩左氏春秋小戴氏禮與古文尚書周官六典比之當時皆晚出者也然其義理其文辭一無可疑非二易三墳之比不謂之六經可乎故今敘二易不敢遽指為夏商之書姑隨其所出之時置之漢之後唐之前云孔頴逹正義十四卷鼂氏曰唐國子祭酒孔頴達與顔師古司馬才章王恭馬嘉運趙乾叶王談于志寧等同撰蘇德融趙𢎞智覆審序稱江南義疏有十餘家辭尚虗誕皆所不取唯王弼之學獨冠古今以弼為本採諸説附益之崇文總目唐太尉長孫無忌與諸儒刋定宋朝端拱初國子司業孔維等奉詔是正其言主申王學云陳氏曰序云十四卷館閣書目亦云今本止十三卷按五經正義本唐貞觀中頴逹與顔師古等受詔撰五經義贊後改為正義博士馬嘉運駁正其失永徽二年中書門下于志寧等考正增損書始布下其實非一手一足之力世但稱孔疏耳其説専釋一家注文為正甘棠正義三十卷崇文總目梁陜州大都督府左司馬任正一撰孔頴逹正義申演其説李鼎祚周易集解十卷鼂氏曰鼎祚唐人集解經皆避唐諱又取序卦各冠逐卦之首所集有子夏孟喜京房馬融荀􅐩鄭康成劉表何晏宋衷虞翻陸績干寶王肅王輔嗣姚信王廙張璠向秀王凱同侯果蜀才翟玄韓伯劉瓛何妥崔憬沈麟士盧氏崔覲孔頴逹三十餘家又引九家易乾鑿度義所謂蜀才者人多不知按顔之推云范長生也其序云自卜商之後傳注百家唯王鄭相沿頗行于代鄭則多參天象王乃全釋人事易之道豈偏滯於天人哉而天象難尋人事易習折楊黃華學徒多從之今集諸家刋輔嗣之野文輔康成之逸象以貽同好蓋宗鄭學者也隋書經籍志所録易類六十九部公武今所有五部而已關朗不載於目乾鑿度自是緯書焦贛易林又屬卜筮子夏書或云張弧偽為然則隋志所録捨王弼書皆未得見也獨鼎祚所集諸家之説時可見其大旨唐録稱鼎祚書十七卷今所有止十卷而始末皆全無所亡失豈後人併之邪陳氏曰隋唐以前易家諸書逸不傳者賴此書猶見其一二而所取於荀虞者尤多九家者漢淮南王所聘明易者九人荀􅐩嘗為之集解陸氏釋文所載説卦逸象本於九家易中興藝文志李鼎祚易宗鄭康成排王弼易舉正三卷崇文總目唐蘇州司戶恭軍郭京撰京世授五經得王輔嗣韓康伯手寫易經比世所行或頗差駮故舉正其訛而著於篇鼂氏曰京自稱家藏王韓手札周易及石經校正一百三十五處二百七十三字蓋以爻象相正有闕漏處可推而知託云得王韓手札與石經耳容齋洪氏隨筆曰易舉正三卷云曾得王輔嗣韓康伯手寫注定傳授真本比校今世流行本及國學鄉貢舉人等本或將經入注用注作經小象中間以下句反居其上爻辭注內移後義却處於前兼有脫遺兩字顛倒謬誤者並依定本舉正其訛凡一百三節今略取其明白者二十處載於此坤初六履霜堅氷至象曰履霜隂始凝也馴至其道至堅氷也今本於象文霜字下誤增堅氷二字屯六三象曰即鹿無虞何以從禽也今本脫何字師六五田有禽利執之無咎今本之字誤作言觀注義亦全不作言字釋也比九五象曰失前禽舍逆取順也今本誤倒其句賁亨不利有攸往今本不字誤作小字剛柔交錯天文也文明以止人文也注云剛柔交錯而成文焉天之文也今夲脫剛柔交錯一句坎卦習坎上脫坎字姤九四包失魚注云有其魚故失之也今本作無魚蹇九三往蹇來正今本作來反困初六象曰入於幽谷不明也今本谷字下多幽字鼎彖聖人亨以享上帝以養聖賢今本正文多而大亨三字故注文亦誤增大亨二字震彖曰不喪七鬯出可以守宗廟社稷以為祭主也今本脫不喪七鬯一句漸象曰君子以居賢德善風俗今本正文脫風字豐九四象遇其夷主吉志行也今文脫志字中孚彖豚魚吉信及也今本及字下多豚魚二字小過彖柔得中是以可小事也今本脫可字而事字下誤增吉字六五象曰密雲不雨已止也注陽已止下故也今本正文作已上故注亦誤作陽已上故止也既濟彖曰既濟亨小小者亨也今本脫一小字繫辭二多譽四多懼注云懼近也今本誤以近也字為正文而注中又脫懼字雜卦蒙稚而著今本稚誤作雜字豫頃於福州道藏中見此書而傳之及在後省見鼂公武所進易解多引用之世罕有其書也巽岩李氏曰京此書使經傳不相混亂殘闕復為真全頗有益於學者然能研諸侯之慮衍侯之字成言乎艮當作誠若此等京蓋未知豈王韓舊本固不免訛舛邪京開元後人故所為書不得著録本末亦未詳要可惜云陸希聲易傳崇文總目唐右拾遺陸希聲撰希聲作易傳十篇易圖指説釋變微旨四篇初隴西李阮學其説以為上下經傳二篇思屬近妙故希聲自為之解餘篇差顯不復為注蓋近世之名家歟今二篇外餘篇逸鼂氏曰微旨三卷皆設問答陳氏曰按唐志有易傳二卷中興書目作六卷别出微旨三卷今所謂解説者上下經共一册不分卷有序言著易傳十篇七篇以上解易義之淵微八篇以下廣易道之旁行第為六卷又撰易圖指説釋變微旨各一卷通為十卷其上下經蓋第一第二篇經文一句傳亦一句門人以為難曉故復為之解然則其全書十卷不盡傳矣家舊惟有微旨續得解説一編始知其詳衛元嵩元包十卷崇文總目元嵩唐人撰武功蘇源明傳趙郡李江注包以坤為首因八純之宫以生變極於六十四自繫其辭言外卦體不列爻位以謂易首乾尚文包首坤尚質夏連山商歸藏周易唐包其實一也雖欲馳騁而放言趨理近止易家之區鄙云陳氏曰其書以八卦為八篇首而一世至歸魂各附其下先坤次乾兑艮離坎巽震坤曰太隂乾曰太陽餘六子有孟仲少之目每卦之下各為數語意僻怪文險澀不可深曉也張氏曰衛元嵩作元包義取於歸藏元包粗贊卦名之大指未極人事之精義辭略數隱世多不傳乃作元包數義二卷以明衛元嵩之易詳見七易序子夏易十卷崇文總目此書篇第略依王式決非卜子夏之文又其言近而不篤然學者尚異頗傳習之鼂氏曰舊題卜子夏傳唐藝文志子夏書已亡今此書約王弼注為之者止雜卦景迂云張弧偽作陳氏曰按隋唐志有卜子夏傳二卷殘闕陸德明李鼎祚亦時稱引考漢志初無此書有孫坦者為周易析藴此漢杜子夏也未知何據使其果然何為不見於漢志其為依託明矣隋唐時止二卷已殘缺今安得有十卷且其經文彖象爻辭相錯正用王弼本決非漢世書以陸德明所引求之今傳則皆無之豈惟非漢世書亦非隋唐所傳書矣其文辭淺俚非古人語姑存之以備一家按鼂以道傳易堂記曰古今咸謂子夏受於孔子而為之傳然太史公劉向父子班固皆不論著唐劉子玄知其偽矣書不傳於今今號為子夏傳者崇文總目知其為偽而不知其所作之人豫知其為唐張弧之易也鼂之言云爾張弧有王道小疏五卷見館閣書目云唐大理評事亦不詳何時人容齋洪氏隨筆曰孔子弟子惟子夏於諸經獨有書雖傳記雜言未可盡信然要為與他人不同矣於易則有傳於詩則有序而毛詩之學一云子夏授高行子四傳而至小毛公一云子夏傳曽申五傳而至大毛公於禮則有儀禮喪服一篇馬融王肅諸儒多為之訓説於春秋所云不能贊一辭蓋亦嘗從事於斯矣公羊高實受之於子夏榖梁赤者風俗通亦云子夏門人於論語則鄭康成以為仲弓子夏等所撰定也後漢徐防上疏曰詩書禮樂定自孔子發明章句始於子夏斯其證云周易新論傳疏崇文總目唐隂洪道撰洪道世其父顯之學雜采子夏孟喜等十八家之説恭訂其長合七十二篇於易有助云周易物象釋疑一卷崇文總目唐東鄉助撰取卦互體開釋言象蓋未始見康成之學而著此書焉陳氏曰東鄉一作東陽館閣書目又云守江陵尹東陽東鄉皆復姓也其序言隨事義而取象若以龍敘乾以馬明坤凡注疏未釋者標出為此書周易口訣義六卷崇文總目河南史證撰不詳何代人其書直鈔孔氏説以便講習故曰口訣鼂氏曰唐史證撰鈔注疏以便講習田氏乃以為魏鄭公撰誤也陳氏曰三朝史志有其書非唐則五代人也避諱作證字周易正義補闕略例疏一卷崇文總目不著撰人名氏其説自謂裨頴逹之闕陳氏曰唐四門助教邢璹撰按蜀本略例有璹所注止有篇首釋略例二字文與此同餘皆不然此本亦淺近無義理姑存之關子明易傳一卷鼂氏曰魏關朗撰元魏太和末王虬言於孝文孝文召見之著成筮論數十篇唐趙㽔云恨書亡半隨文詮解才十一篇而已李邯鄲始著之目云王通贊易蓋宗此也朱子語録關子明易偽書也陳氏曰唐趙㽔注然隋唐志皆不録或云阮逸偽作周易啓源十卷鼂氏曰蔡廣成撰李邯鄲云唐人田偉置於王昭素之下今從李説卷首德恆德言德膚德翰四篇皆設為問對凡三十六篇周易開元關一卷鼂氏曰唐蘇鶚撰自序云五代祖晉官至吏部侍郎學兼天人嘗製八卦論為世所傳邅亂遺墜而漏簡尚有存者鶚乃略演其旨於此周易流演五卷鼂氏曰唐成元英撰錯綜六十四卦演九宫以直年月日推國家之吉凶元英道士也故道藏録之或云釋仁英撰未知孰是周易窮微一卷陳氏曰稱王輔嗣凡為論五篇館閣書目有王弼易辨一卷其論彖論象亦類略例意即此書也又言弼注此書已亡至晉得之王羲之承詔録藏於祕府世莫得見未知何所據而云周易釋文一卷陳氏曰唐國子博士陸德明撰本名元朗以字行多援漢魏以前諸家説蓋唐初諸書皆在也卦首注某宫某世用京房説石經周易周易指略例共十一卷鼂氏曰偽蜀廣政辛亥孫逢吉書廣政孟昶年號也説卦乾健也以下有韓康伯注略例有邢璹注此與國子監本不同者也以蜀中印本校邢璹注略例不同者又百餘字詳其意義似石經誤而無他本訂正姑兩存焉夾漈鄭氏曰按石經之學始於蔡雍始也秦火之後經籍初出諸家所藏傳寫或異箋傳之儒皆馮所見更不論文字之訛謬雍校書東觀奏求正定六經文字靈帝許之乃自為書而刻石於太學門外後儒晚學咸所取正奈當漢之末祚所傳未廣而兵火無存後之人所得者亦希矣今之所謂石經者但刻諸石耳多非蔡氏之經易軌一卷鼂氏曰偽蜀蒲乾貫撰専言流演其序云可以知否泰之原察延促之數蓋數學也王昭素易論三十三卷鼂氏曰昭素居酸棗太祖時嘗召令講易其書以注疏異同互相詰難蔽以己意昭素隱居求志行義甚髙史臣以王烈管寧比之易證墜簡一卷鼂氏曰皇朝天禧中毗陵從事范諤昌撰其書酷類郭京舉正如震卦彖辭內云脫不喪七鬯四字程正叔取之漸卦上六疑陸字誤胡翼之取之自謂其學出於湓浦李處約廬山許堅意者豈果有師承故程胡取之陳氏曰其上卷如郭京舉正下卷辨繫辭非孔子命名止可謂之贊繫今爻辭乃可謂之繫辭又重定其次序又有注補一篇辨周孔述作與諸儒異為乾坤二傳末有四時晷刻圖一篇館閣書目止一卷又有源流圖一卷言納甲納音者即此下卷補注序中語也世或言劉牧之學出於諤昌而諤昌之學亦出种放未知信否鼂以道卲子朱子發皆云爾陸秉周易意學十卷鼂氏曰秉字端夫舊名東寶元間以此書奏御勑書嘉奬秉嘗通判蜀州首篇論易之名頗采恭同契之説陳氏曰其説多異先儒穿鑿無據胡安定易傳十卷鼂氏曰此解甚詳蓋門人倪天隱所纂非其自著故序首稱先生曰又曰新安王炎晦叔嘗問南軒曰伊川令學者先看王輔嗣胡翼之王介甫三家易何也南軒曰三家不論互體故云爾然雜物撰德具於中爻互體未可廢也南軒之説雖如此要之程氏専治文義不論象數三家者文義皆坦明象數殆於掃除略盡非特互體也周易言象外集古易崇文總目皇朝王洙原叔撰洙以通經侍􅊰天章閣乃集前世諸儒易説折衷其理依卦變為類其論以王弼傳為內故自名曰外傳陳氏曰其序言學易於處士趙期論次舊義附以新説凡十二篇十卷又曰古易十二卷亦出王原叔家上下經惟載爻辭外卦辭一彖辭二大象三小象四文言五上繫六下繫七説卦八序卦九雜卦十葉石林以為此即藝文志所謂古易十二篇者按隋唐志皆無古易之目當亦後人依倣録之耳邵古周易解五卷鼂氏曰古字天叟雍之父也世本范陽而卒於洛其學先正音文云皇甫泌易解十四卷鼂氏曰泌官至尚書右丞有述聞一卷隱訣一卷補解一卷精微三卷又有紀師説辨道通為八卷陳氏曰其學得之常山抱犢山人而莆陽遊中傳之劉彛錢藻皆為之序山人不知名蓋隱者也泌嘗守海陵治平以前人石徂徠易解五卷鼂氏曰景迂云易古文十二篇先儒謂費直専以彖象文言恭解易爻以彖象文言雜入卦中者自費氏始孔頴逹云王輔嗣又分爻之象辭各附當爻則費氏初變古制時猶若今乾卦彖象繫卦之末歟古經始變於費氏卒大亂於王弼惜哉今學者曽不之知也石守道亦曰孔子作彖象於六爻之前小象繫逐爻之下惟乾悉屬之於後者讓也嗚呼他人尚何責哉家本不見此文豈介後覺其誤改之歟陳氏曰所解止六十四解亦無大發眀鼂景迂言守道曰云云見前假今觀此解義言王弼注易欲人易見使相附近他卦皆然惟乾不同者欲存舊本而已更無他説不知景迂何以云爾也按宋咸補注首章頗有此意鼂殆誤記耳劉長民易解十五卷鼂氏曰皇朝劉牧長民撰仁宗時言數者皆宗之慶歷初吳祕獻其書於朝優詔奬之田况為序又有鈎隱圖三卷皆易之數也凡五十五圖并遺事九有歐陽永叔序而其文殊不類陳氏曰黃黎獻為之序又為略例圖亦黎獻所序又有三衢劉敏士刻於浙右庾司者歐公序文淺俚決非公作其書三卷與前本大同小異牧易學盛行於慶厯時刪定易論一卷陳氏曰直講盱江李覯泰伯撰凡六篇蓋刪劉牧易圖而存之者三焉館閣書目作六卷十九篇覯先注易論十九篇皆見集中與此自為二書當是合為十九也宋咸易訓易補注王劉易辨鼂氏曰咸自序云豫既以補注易奏御而男億請餘義凡百餘篇端因以易訓名之蓋言不敢以傳世特教其子而已凡三卷頗論陸希聲劉牧鮮于侁得失云陳氏曰咸嘗撰易明凡一百九十三條以正亡誤及得郭京舉正於歐陽公遂參驗為補注十卷皇祐五年表上之别有易訓未見易辨凡二十篇為一卷劉牧之學大抵求異先儒穿鑿破碎故李宋或刪之或辨之周易聖斷七卷鼂氏曰皇朝鮮于侁子駿撰本之王弼劉牧而時辨其非且云衆言淆亂折諸聖故名其篇曰聖斷陳氏曰其書乾坤二卦不解爻象欲學者觀彖象文言而自得云易意藴凡例總論一卷鼂氏曰皇朝徐庸撰庸以春秋凡例易亦有之故著書九篇號意藴凡例總論其學祖劉牧陸秉云陳氏曰庸皇祐時人凡為論九篇館閣書又有卦變解未見文獻通考卷一百七十五
