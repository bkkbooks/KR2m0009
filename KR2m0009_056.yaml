body:
  text: 文獻通考卷五十六鄱陽馬端臨貴與著職官考十太僕卿少卿署丞車主簿典牧府署乘黃署諸牧監典廐署周官有太僕下大夫掌正王之服位出入王之大命似今太僕之職一云周穆王置太僕正以伯冏為之冏俱永切掌輿馬秦因之在周官則校人掌馬巾車掌車及置太僕兼其任也漢初夏侯嬰常為之漢書曰夏侯嬰為沛公太僕常奉車自髙帝至文帝常為太僕又石慶為太僕御出上問車中幾馬慶以䇿數馬畢曰六馬領五監龍馬閑駒槖泉騊駼承華五監各有長丞六廐各有令或曰六廐謂未央承華騊駼龍馬輅軨大廐也馬皆萬匹武帝承文景蓄積海内殷富廐馬有四十萬匹時匈奴數宼邊遣衛青霍去病發十萬騎并負私從馬凡十四萬匹窮追大破匈奴漢馬死者十餘萬匹匈奴雖病逺去而漢亦馬少無以復往王莽改太僕為太御後漢太僕與漢同亦掌車馬天子毎出奏駕上鹵簿用大駕則執馭初漢西京置六廐東京約省唯置一廐魏因之晉初有之銀章青綬五時朝服進賢兩梁冠佩水蒼玉領典牧乘黄驊騮龍馬等廐令自元帝過江之後或置或省故驊騮廐為門下之職晉宋以來不常置郊祀則權置太僕執轡事畢則省齊亦然梁太僕卿位視黄門侍郎統南牧左右牧龍廐内外廐陳因之後魏兼置少卿太武帝平統萬赫連昌定隴右秃髮沮渠等河西水草善乃以為牧地六畜滋息馬三百餘萬匹馲駝將半之牛則無數孝文帝遷洛陽之後復以河陽為牧塲恒置戎馬十萬匹以擬京師軍警之備毎嵗自河西徙牧於并州漸南欲其習水土而無死傷也而河西之牧滋甚北齊太僕寺統驊騮左右龍左右牝乘黃車府署卿及少卿各一人後周如古周隋如北齊煬帝加署少卿一人唐龍朔二年改太僕為司馭咸亨初復舊光宅元年改為司僕神龍初復舊卿一人掌馭五輅少卿本一員景雲元年加一員領乘黃典廐典牧車府等四署署各有令天下監牧置八使五十六監貞觀初僅有牧牝三千匹從赤岸澤徙之隴右十五年始令太僕卿張萬嵗勾當羣牧至麟徳四十年間馬至七十萬六千匹置八使領六監初置四十八監跨蘭渭秦原四州之地猶為隘狹更析八監布於河曲其時天下以一縑易一馬儀鳯三年少卿李思文檢校隴右諸牧監方稱使爾後或戎狄外侵或牧圉乖散洎乎垂拱漸耗大半開元初牧馬二十四萬匹十三年加至四十五萬匹初有牛三萬五千頭是年有五萬頭初有羊十一萬二千口是年亦二十萬六千口盛於垂拱丞秦漢有二人後漢一人漢書張敬字子髙為太僕丞魏晉因之東晉或省或置梁有丞陳因之後魏北齊丞一人隋三人唐因之主簿梁置一人北齊亦一人隋二人唐因之宋太僕寺判寺事一人以朝官以上充凡邦國廐牧車輿之政令今分𨽻羣牧司騏驥院諸坊監本寺但掌天子五輅屬車后妃王公車輅給大中小祀牛羊元豐改官制置卿少卿丞主簿各一人卿掌車輅廐牧馬政之令少卿為之貳丞參預之元祐二年詔外監事令本寺依羣牧司舊法施行應内外馬車専𨽻太僕直達樞宻院更不經尚書及駕部三年詔省主簿一員所𨽻官司十車輅院掌乘輅法物輦騏驥院左右天駟監掌養國馬鞍轡庫掌御馬鞍轡及給賜臣下養象所養馴象駞坊車營致逺務掌分養雜畜上下監掌治療病馬元豐末廢畿内牧馬監元祐初置左右天廐坊聼民間承佃牧地紹聖初置孳生監中興後廢太僕併入兵部乘黄署後漢太僕有未央廐令魏改為乘黃廐乘黃古之神馬因以為名乘黃亦名飛龍背有角日行萬里淮南子云天下有道飛黃伏皁一云神黄獸名龍翼馬身黄帝乘而仙晉以下因之宋屬太常銅印墨綬進賢一梁冠絳朝服歴代皆有悉掌乘輿唐令丞各一人掌乘輿車輅典廐署周官有校人圉師趣馬掌十二閑之馬漢西京太僕有龍馬長東京有未央廐令掌乘輿及宫中之馬魏為驊騮廐晉有驊騮龍馬二廐自宋以後分驊騮廐屬門下梁太僕有龍廐及内外等廐陳因之北齊有驊騮左右龍等署後周有左右廐各上士一人隋如北齊唐改龍廐為典廐署令二人丞四人掌在廐繫飼馬牛及雜畜事典牧署周官牧師下士四人掌牧馬而頒之秦漢邊郡置六牧師令説在諸牧監篇魏晉以下因之隋有典牧牛羊等署各置令丞唐有乘黄等四署令丞各四人掌外牧及造酥酪脯腊之事車府署秦有車府令以趙髙為之歴代皆有漢魏屬太僕宋齊以後屬尚書駕部北齊以下又屬太僕唐置令丞各一人掌王公以下車輅諸牧監漢太僕有牧師諸苑三十六所在北邊西邊以郎為苑監官魏置牧官都尉晉因之自後無聞北齊有左右牝牡駝牛羊等署令後周曰典牝典牡上士中士又有典駝典羊典牛中士隋曰典牧署牛羊署令丞唐初因之分曰牧監置監副監丞主簿武太后聖歴二年正月署控鶴府監一員從三品丞一員從六品主簿一員從七品控鶴左右各二十員從五品下以張易之為控鶴監統左控鶴出入供奉以麟臺監張昌宗統右控鶴内供奉乆視元年六月改控鶴監為天驥府其月二十五日又改為奉宸大夫前改為天驥者宜内供奉員半千以奉宸之職古無其事又授斯任者率多輕薄非朝廷進止選上疏請罷之由是忤㫖其年四月勅奉宸令一員從三品奉宸侍郎一員從四品上奉宸大夫十員左右各五上奉宸驂乗十員左右各五從六品上奉宸主簿一員從七品上凡二十四員以應二十四氣控鶴奉宸之名歴代不設既以車馬名職遂附此篇宋有羣牧司制置使景徳四年置使副使都監判官制置使一人以樞密使副為之明道二年罷未幾復置使一人以兩省以上充使舊一員皇祐初以翰林學士吏部郎中梁適為同羣牧使時彭乘已為使適員外置也副使一人以内侍都知充都監二人以諸司使充判官二人以京朝官充掌内外廐牧之事周知國馬之政而察其登耗凡受宣詔文牒則以時下於院監大事則制置使同簽小事則専遣其副使都監不備置判官都監毎嵗更出諸州廵坊監㸃印國馬之蕃息者左右騏驥院勾當官各三人以諸司使副及内侍充掌牧養國馬以供乘輿及頒賜王公羣臣蕃夷國信給騎軍廐置之用天駟左右四監監官各一人左右天廐坊監官各一人牧養上下監官各一人並以三班使臣充乳酪院以勾當左騏驥官兼掌供尚食乳餅酥酪之事藥蜜庫監官二人以京朝官充掌受糖蜜藥物以供馬醫之用佑馬司勾當官三人以内侍押班諸司使副充掌閲諸州所市馬平其直車營致逺務監官三人以京朝官諸司使副充掌養飼驢牛以駕車乘駝坊監官二人以三班使臣充掌牧養橐駝皮剝所監官二人以三班使臣充掌割剝馬牛諸畜之死者大理卿少卿評事正監丞主簿獄丞司直今大理者亦舜攝帝位臯繇作士正五刑周秋官之任秦為廷尉漢因之掌刑辟凡獄必質之朝廷與衆共之之義也兵獄同制故曰廷尉此應劭注也顔師古曰廷平也理獄貴平故以為號景帝中元六年更名大理武帝建元四年復為廷尉哀帝元夀初年復為大理後漢廷尉卿凡郡國讞疑讞質皆處當以報楊賜為廷尉乃嘆曰昔三后成功惟殷於民而臯繇不與焉蓋吝之也遂以世非法家固辭漢官儀曰光武時有疑獄見廷尉曹史張禹所問輙對處當詳理於是䇿免廷尉以禹代之雖越次而授亦足以勵其臣節以世家為之而郭氏尤盛郭躬為廷尉躬家世掌法務在寛平乃條諸重文可從輕者十一事奏之事皆施行著之於令建安中復為大理鍾繇以大理為相國魏黄初元年改為廷尉鍾毓字稚叔為廷尉聼君父亡沒臣子得為理謗及士為侯其妻不復改嫁毓所制也歴代皆為廷尉梁國初建曰大理天監元年復改為廷尉舊用黄門後視祕書監有正監平三人元㑹廷尉三官與建康三官皆法冠元衣朝服以監東西中華門手執方木長三尺一寸謂之執方天監元年詔建康獄依廷尉三官置正監平革選士流視給事以尚書郎出為之官服廷尉三官同陳因之後魏亦曰廷尉北齊曰大理寺置卿少卿各一人後周有刑部中大夫掌五刑之法附萬人之罪屬大司宼亦其任也今刑部侍郎之任隋初與北齊同文帝時議置六卿將除大理盧思道奏曰省有駕部寺留太僕省有刑部寺除大理斯則重畜産而賤刑名也至煬帝加置少卿二人唐龍朔二年改大理為詳刑咸亨元年復舊光宅元年改為司刑神龍元年復舊卿一人掌鞫獄定刑名決諸疑讞少卿二人永徽六年初置少卿一人神龍元年又加一員正二人丞六人主簿二人司直六人評事十二人正秦置廷尉正漢因之後漢一人魏晉謂正監平為廷尉三官晉廷尉三官通視南臺持書舊尚書郎下遷梁制服獬豸冠介幘皁衣銅印用墨綬其後皆有隋開皇三年增為四員煬帝增為六員唐二人通判寺事龍朔二年改為詳刑大夫咸亨初復舊丞自晉武咸寧中曹志上表請廷尉置丞宋齊梁並因之後魏亦然北齊曰大理丞一人隋初二人至煬帝改為勾檢官増為十六人分判獄事唐又曰丞置六人杜景佺徐有功並為司刑丞與來俊臣侯思正同制獄人稱之曰遇徐杜必生遇来侯必死主簿自魏晉宋齊梁陳皆有唐置二人獄丞晉有左右丞各一人宋齊因之梁陳置二人後魏北齊亦然隋有獄掾八人唐曰丞有四人司直後魏永安二年置司直十人御史中尉髙穆所奏置視五品𨽻廷尉位在正監上不署曹事唯覆理御史檢劾事漢武已置司直屬丞相府非此司直北齊隋因之隋初置十人煬帝置十六人唐置六人掌承制出使推覆若寺有疑獄則參議之評事漢宣帝地節三年初於廷尉置左右平員四人宣帝詔曰今遣廷吏與郡鞫獄任輕禄薄其為置正平員四人其務平之涿郡太守鄭昌上言曰聖王立法明刑者非以為理救衰亂之起也今明主躬垂明聴不置廷平獄將自正若開後嗣不若删定律令律令定愚民知所避就姦吏無所弄法今不正其本而置廷平以理其末代衰聼惑則廷平將搖權而為亂首也宣帝始置左右平而三輔決録注云何比干漢武帝為廷尉右平謬矣後漢光武省右平唯有左平一人掌平決詔獄冠法冠魏晉以來無左右而直謂之廷尉平後魏北齊及隋廷尉平各一人開皇三年罷至煬帝乃置評事四十八人掌與司直同其後官廢唐貞觀二十二年褚遂良議重法官復奏置評事十員掌出使推覆後加二人為十二員監秦置廷尉監漢有左右監邴吉字少卿為廷尉監光武省右監唯有左監一人魏晉以來無左右而直云廷尉監隋開皇三年罷大理監宋大理寺以朝官一員或二員判寺事一員兼少卿事建隆二年以工部尚書竇儀判寺事故事䑓省長官兼判公事得言判某官事如晉朝尚書左丞崔祝兼判太常卿事是也若止言寺事則其屬丞正並可行之竇儀兼判太常寺又兼判大理寺事皆新例也凡獄訟之事隨官司決劾不復聴信但掌斷天下奏獄送審刑院詳訖同書以上於朝熙寧九年神宗謂國初廢大理獄非是以問孫洙洙對合㫖於是下詔以京師官寺凡有獄皆繋開封府司録司及左右軍廵三院囚逮猥多難於隔訊又暑多瘦死因縁留滯動渉嵗時稽參故事宜屬理官可復置大理獄天下奏案刑部審刑院詳斷置卿一少卿二丞四始命崔台符知卿事蹇周輔楊汲為少卿各舉丞及檢法官凡官屬依御史臺例謁有禁官制行左斷刑右治獄各五案左㕔斷刑曰詳刑詳讞宣黄分簿奏表右㕔治獄曰左推右推寺案知雜檢治元祐間因鮮于侁所請廢大理獄後復卿掌折獄詳刑鞫獄之事凡職務分左右天下奏劾命官將校及大辟囚以下以疑請讞者𨽻左斷刑則司直評事詳斷丞議之正審之若在京百司事當推治或特㫖委勘及係官之物應追䆒者𨽻右治獄則丞専推鞫蓋少卿分領其事而卿總焉建炎三年併省寺監而大理如故省卿而斷刑治獄少卿各一員寺正神宗復置大理獄後置寺正元豐五年刑部乞分評事司直與正為斷司丞與長貳為議司凡斷案先上正看詳當否論難改正然後過議司覆議建炎併省斷治獄寺正各一員寺丞國初為寄禄官視後來宣敎郎神宗正官名置獄丞四員命卿少舉官元豐五年命莫君陳等九人為大理寺丞始自朝廷差官也舊制斷刑寺丞六員建炎三年減三員治獄寺丞减二員司直元豐時命程嗣先等四人為之建炎元年詔斷刑司直兼治獄司直其治獄司直罷評事國初為京官寄禄視後來承事郎元豐正官名命張仲穎等十二人為評事隆興二年詔評事以八員為額以雷霆號令星斗文章為號鴻臚卿少卿丞主簿典客署司儀署周官大行人掌大賔客之禮周禮又有象胥干寳注云若晉鴻臚也秦官有典客掌諸侯及歸義蠻夷史記云韓信亡楚歸漢為連敖徐廣注云連敖典客漢改為鴻臚應邵曰郊廟行禮贊導九賔鴻聲也臚傳也所以傳聲賛導故曰鴻臚景帝二年令諸侯王薨列侯初封及之國大鴻臚奏諡誄䇿應劭曰皇帝建諸侯王賔諸侯王皆屬大鴻臚故其薨奏其行跡賜與諡及哀䇿誄之列侯薨及諸侯太傅初除之官大行奏諡誄策周禮有大行人小行人主諡官故以名之臣瓚曰大行是官名掌九儀之制以賔諸侯者顔師古曰事之尊重者遣大鴻臚而輕賤者遣大行人建中六年改大鴻臚為大行令武帝太初元年更名大鴻臚又更名其屬官行人為大行令其屬官又有郡邸長丞主諸郡之邸在京師者至後漢省但令郎理郡邸秦時又有典屬國官掌蠻夷降者漢因之成帝河平元年省之併大鴻臚王莽改曰典樂後漢大鴻臚卿一人諸王入朝當郊迎典其禮儀及郡國上計餘職與漢同凡皇子拜王贊授印綬及拜諸侯諸侯嗣子及四方夷狄封者臺下鴻臚召拜之王薨則使使弔之及拜王嗣魏及晉初皆有之自東晉至於宋齊有事則權置兼官畢則省梁除大字但曰鴻臚卿位視尚書左丞常導䕶贊拜職官録曰舊視散騎常侍天監中視中丞吏部後魏曰大鴻臚北齊曰鴻臚寺有卿少卿各一人亦掌蕃客朝及吉㐫弔祭後周司宼有蕃部中大夫掌諸侯朝覲之叙有賔部中大夫掌大賔客之儀隋文帝開皇三年廢鴻臚寺入太常十二年復置領典客司儀崇元三署至煬帝置少卿二人唐龍朔二年改鴻臚為司文咸亨初復舊光宅初改為司賔神龍初復舊卿一人掌賔客凶儀之事及冊諸蕃少卿本一員景雲二年加一員領典客司儀二署署各有令丞秦曰典客丞漢為鴻臚丞蕭望之為之魏晉亦然梁陳後魏北齊皆有之後周曰賔部上士隋如北齊唐因之有二人主簿一人典客署周官有掌客上士中士秦官有典客漢改為鴻臚鴻臚屬官有大行令丞本名行人武帝改為大行令丞魏改大行令為客館令晉改為典客宋分置南北客館令齊梁陳皆有客館令丞後魏初曰典客監太和中置主客令北齊有典客署後周置東南西北四掌客上士下士隋初又曰典客署置令丞煬帝改為典藩署唐為典客署置令丞各一人掌二王後蕃客辭見宴接送迎及在國夷狄司儀署周官有司儀上士中士漢大鴻臚有理禮郎自後無聞後魏置司儀官北齊置署令丞後周置上士等員隋如北齊唐因之置令丞各一人掌凶事儀式及喪葬之事宋鴻臚寺判寺事一人以朝官以上充凡四夷朝貢宴享送迎之事分𨽻國信所都亭懐逺驛禮賔院本寺但掌祭祀朝㑹前資致仕蕃客進奉位享拜周六廟三陵公王妃主以下䘮葬羌官監䕶給其所用鹵簿文武官薨卒之事往来國信所管勾官二人以都知押班充掌大遼使介交聘之事都亭驛監官一人西驛管勾官二人以諸司使副以下至三班使臣充掌河西蕃部貢奉之事禮賔院監官二人以閤門祇候以上及三班使臣充掌蕃夷貢朝互市之事懐逺驛監官二人以監外物料庫官兼掌西南蕃交州龜兹占城注輦大石于闐甘沙宗哥等貢奉之事元豐官制行置卿少卿丞主簿各一人卿掌四夷朝貢宴勞給賜送迎之事及國之凶儀中都祠廟道釋帳籍除附之禁令少卿為之貳卿參領之所𨽻官屬十有二中泰一宮建隆觀等各置提㸃所掌殿宇齋宮噐用儀物陳設錢幣之事在京寺務司及提㸃所掌諸寺葺治之事傳法院掌譯經潤文左右街僧録司掌寺院僧寺帳籍及僧官補授之事同文館及管勾所掌髙麗使命都亭西驛懐逺驛禮賔院所掌見前中興後廢鴻臚併入禮部司農卿少卿署丞導主簿鈎盾官署上林署苑總監太倉署諸倉監司竹監農温泉湯監官諸屯監令騪粟都尉等官典中郎將等籍田少皥氏以九􅟾為九農正􅟾鳥也􅟾有九種以為農號各隨其宜以敎人事舜攝帝位命棄為后稷周則為太府下大夫秦為理粟内史掌穀貨漢景帝更名大農令武帝太初元年更名大司農掌九穀六畜之供膳羞者見宋志漢書曰主穀貨凡郡國諸倉農監都水六十五官皆屬焉毋將崇字君房為執金吾上發武庫兵送董賢及乳母崇以為武庫兵器天下公用繕修造作皆度大司農錢自乘輿不以給供養勞賜一出少府蓋不以本藏給末用不以人力供私費也王莽改曰羲和後改為納言後漢大司農掌諸錢穀金帛劉據為大司農以職事被譴靈帝召諸尚書傳呼促歩将加捶撻尚書令左雄奏曰九卿位亞三公行有佩玉之節動有庠序之儀孝明永平始加撻罰非古典也帝從之九卿於此始免捶扑郡國四時上月旦見錢穀簿其逋未畢各具别之邊郡諸官請調度者皆為給報損多益寡取相給足初郡國鹽官鐵官並屬司農中興皆屬郡縣建安中為大農魏黄初元年又改為司農晉初因之渡江哀帝末省司農並都水孝武復置宋齊皆有之梁司農卿位視散騎常侍主農功倉廪陳因之後魏曰大司農北齊曰司農寺有卿少卿各一人掌倉市薪米園池果實後周有司農上士一人掌三農九穀稼穡之政令屬大司徒隋初與北齊同煬帝置少卿二人唐龍朔二年改司農為司稼咸亨初復舊卿一人少卿二人掌東耕供進耒耜及邦國倉儲之事領上林太倉鈎盾導官四署署各有令丞丞秦曰理粟内史丞有二人漢為大司農丞亦二人或謂之中丞耿夀昌為大司農中丞奏設常平倉給北邊省轉漕又桑𢎞羊為大司農中丞管諸計㑹事平帝又置大司農部丞十三人人部一州勸農桑後漢司農丞一人部丞一人部丞主帑藏魏晉因之銅印黃綬宋齊以来墨綬進賢一梁冠介幘皁衣後魏北齊皆有司農丞隋置五人唐六人主簿晉太康中置自後無聞梁陳又有北齊亦然唐因之宋司農寺判寺事二人以兩制或朝官以上充熙寧二年立常平斂散法三年詔以新法付司農寺而農田水利免役保甲等法悉自司農講行以呂恵卿鄧綰判寺胡宗愈曾布同判元豐官制行寺監不治外事遂循唐典正其職秩司農舊職悉歸户部右曹司農掌倉儲委積之政令總苑囿庫務之事而謹其出納京都官吏禄廪諸路嵗運至京師悉掌焉凡苑囿行幸排比及薦享進御頒賜植藏之物與造麴蘖給薪炭皆戒有司以時辦具天子親耕籍田則奉耒耜所𨽻官屬凡五十倉二十有五續會要總倉作二十四草塲十有二續㑹要作十排岸司四園苑四建炎三年詔罷司農寺紹興四年復置司農寺卿少各特置一員丞熙寜新法行呂恵卿請始置司農寺丞一員五年増置丞四員仍與簿輪出按察逐年保甲又置勾當公事官以葉康直等四人為之九年以勾當公事官所至輒用喜怒罷之元豐四年止留丞一員餘並罷中興後置丞二員主簿治平中已置熙寜新法行詔增一員後置六員元豐四年罷三員建炎罷紹興復置上林署漢水衡都尉之職說在都水篇後漢曰上林苑令丞主苑中禽獸頗有人居皆主之魏晉因之江左無聞宋初復置𨽻尚書殿中曹齊因之梁陳屬司農北齊及隋亦然唐因之有令二人丞四人掌諸苑囿池沼種植蔬果藏氷之事宋四園苑提舉官無常員以三司判官内侍都知諸司使以上充東曰宜春南曰玉津西曰瓊林北曰瑞聖監官各二人以諸司使副或内侍三班使臣充又有西京宮苑司勾當官一人元豐後四園苑屬司農太倉署周官有廩人下大夫上士秦官有太倉令丞漢因之屬大司農後漢令主受郡國傳漕穀其滎陽敖倉官中興後屬河南尹歴代並有之晉江左以來又有東倉石頭倉丞各一人北齊亦然後周曰司倉下大夫隋有令二人丞六人唐有令三人丞二人掌倉廪出納宋諸倉京城有船般倉稅倉中倉總二十五名監官每界二人以京朝官及三班使臣充元豐後二十五倉屬司農官吏軍兵禄食凡綱運受納及封椿支用月具報數以報司農中興後又有豐儲倉初紹興以上供米餘數椿管别廩以為水旱之助後益增廣收糴置監官二員監門官一員淳熙間命右司為之提領後以屬檢正非奉朝廷指揮不許支撥凡外州軍起到椿管未從司農寺差官盤量據納到數報本所椿管鈎屯署漢鈎盾令宦者典諸近園苑逰觀之事屬少府後漢亦有之晉大鴻臚屬官有鈎盾令自後無聞北齊如晉制隋如北齊令三人丞十二人唐因之令二人丞四人掌薪炭鵝鴨藪澤之物天寳五載九月侍御史楊釗充木炭使自後相循或以京尹或以戸部侍郎充導官署導擇周有舂人秦漢有令丞屬少府漢東京令丞主舂御米及作乾糒音備屬大司農歴代皆有唐置令二人丞四人掌舂碾米麵油燭之事苑總監自隋而置東西南北各有監及副監唐因之兼有丞主簿等官以掌苑内宮館園池之事諸倉監後漢河南尹屬官有滎陽穀倉長丞梁司農有左中右三部倉丞陳因之隋諸倉各有監官唐因之掌倉廪出納司竹監漢有司竹長丞魏晉河南淇園竹各置官守之後魏有司竹都尉隋曰司竹監唐因之有監副監丞掌植養園竹之事温泉湯監令唐置掌湯院宇脩整噐物以備供奉諸屯監隋置諸屯監及副監畿内者𨽻司農自外者𨽻諸州唐因之置監及丞掌營種屯田勾當功課畜産等事騪粟都尉騪音搜索也漢武帝軍官不常置又有治粟都尉均輸令漢有之後漢省斡官長漢有之如淳曰斡音管或作幹主均輸之事所謂斡鹽鐵也晉灼曰箭幹之官長也均輸自有令師古曰如説讀為斡持貨財之事非箭幹也初斡官屬少府中屬主爵後屬司農典農中郎將典農都尉典農校尉並曹公置晉太始二年罷農官為郡縣後復有之隋煬帝罷典農官勸農謁者梁武帝天監九年置視殿中御史自騪粟以下盡屬司農唐無之籍田令周為甸師漢文帝感賈誼之言始開籍田置令丞掌耕國廟社稷之田春始東耕於籍田祠先農大賜三輔二百里孝弟力田三老帛種百穀收萬斛立為籍田館穀皆以給祭天地宗廟羣臣之祀東漢及魏闕晉武復置江左省宋元嘉中又置宋掌帝籍耕耨出納之事五穀蔬果藏氷以待用元豐三年詔籍田令𨽻太常寺渡江初闕紹興十五年初除康與之為籍田令三十一年詔籍田司權罷官吏並罷後復置太府卿少卿藏丞左右署主簿署諸市署常平平凖署周官有太府下大夫掌貢賦之貳受其貨賄之入頒其貨賄於受藏之府歴代不置然其職在司農少府至梁天監七年置太府卿位視宗正掌金帛府帑及闗津市肆陳因之後魏太和中改少府為太府卿兼有少卿掌財物庫藏王顯謂楊固曰吾作太府卿庫藏充實固曰減百官之禄及贓贖悉入京藏以此充府未足為多且有聚斂之臣寜有盗臣北齊曰太府寺亦有卿少卿各一人又兼掌造噐物後周有太府中大夫掌貢賦貨賄以供國用屬大冡宰隋初與北齊同所掌左右藏及尚方司染甄官等署煬帝置少卿二人又分太府寺置少府監管尚方織染等署而太府但管京都市及平凖左右藏唐龍朔二年改太府為外府咸亨元年復舊光宅元年改為司府神龍元年復舊卿一人少卿二人龍朔元年置少卿二人分監兩都事太極元年又加一人領兩京諸市平凖左右藏常平等九署署各有令丞丞於周官為太府上士之任自後無聞梁太府丞一人陳因之後魏北齊各一人後周曰太府上士隋又曰府丞唐因之有四人主簿亦周官太府下士之任自後無聞梁置一人陳因之後魏亦然隋置四人唐因之減一人宋太府寺判寺事一人以兩制或𢃄職朝官充凡財貨廪藏貿易四方貢賦百官俸秩皆𨽻三司本寺但掌祠祭香幣帨巾神位席及造斗秤升尺而已元豐改制始正職掌四朝志此據續會要而題名乃云國初省部寺監惟以寄禄寺則光禄太常宗正衛尉司農大理或以卿或以貳或以丞各寓一階别設主判之官以典事惟太府則否其職悉入三司諸案故主判之任罕置與㑹要或異當考卿掌財貨出納貿易之事凡貢賦之輸於京師者至則别而受之供君之用及待邊費則歸於内藏供國之用及待經費則歸於左藏應禄賜以法給歴從有司檢察書其名數鈎覆而後給焉供奉之物則承㫖以進審奏得畫乃聼除之若頒畿内軍衣則前期進様定其頒曰将校部營兵支請月具數以聞凡賈商之賦小賈則門征之大賈則輸於務貨之不售平其價鬻於平凖乘時賖貸以濟民用若質取於官則給用多寡各從其抵嵗以香茶鹽鈔募人入豆穀實邊即京都関用物預報度支凡課入以盈虧定課最行賞罰大祭祀祼則卿置幣奠玉則入陳玉帛元祐三年詔太府寺置長貳餘寺監長貳互置建炎三年詔罷太府寺撥𨽻金部獨以一丞治鹺茗之質劑凡省五年而後復置卿少各一員丞元豐改制置二人元符中増一員崇寧中置藥局添丞一員宣和中省一員紹興置二員參預寺事簿元豐置二人建炎罷紹興復置太府寺所𨽻官司二十有五左藏東西庫南北兩庫掌受四方財賦之入以待經費内藏庫受嵗計之餘積以待非常之用奉宸庫掌内廷金玉珠寳良貨祗候庫掌受錢帛雜物以備傳詔頒給賜予元豐庫神宗置布庫茶庫雜物庫糧料院掌以法式批支諸司諸軍之廪禄審計司掌審受給之數驅磨當否商税務收京城商税汴河上下鎖蔡河上下鎖掌收舟船木筏之征都提舉市易司掌提㸃貿易貨物雜買務雜賣場市易上界掌歛市不售貨滯於民用者貿易平價市易下界掌飛錢給劵以通官糴㩁貨務賞折博斛金銀之屬交引庫掌給印出納引錢鈔之事抵當所掌以官錢聼民質取濟其緩急和劑恵民局掌合藥出賣以濟民疾苦店宅務掌管官屋邸店石炭場掌受納出賣石炭香藥庫中興後惟有糧料院審計司編估局打套局二局係㨂選市舶香藥雜物交引庫祗候庫左藏東西庫和劑恵民局寄椿庫諸市署周官有司市下大夫掌市之理漢京兆尹屬官有長安市長丞後漢則河南尹屬官雒陽市長丞魏晉因之東晉則丹陽尹管之宋齊因之梁始隸太府陳因之後魏有京邑市令北齊則司州牧領東西市令丞後周司市下大夫隋初京市令丞屬司農煬帝改隸太府唐因之每市令一人丞二人平凖署周官有貨人中士下士主平定物價秦置平凖令漢因之掌知物價及主練染作彩色趙廣漢州舉茂才為平凖令後漢平凖令丞𨽻大司農嘉平四年改平凖為中凖使宦者為之列於内署自是諸署悉以閹人為令丞魏少府屬官有平凖令宋唯掌染順帝即位以帝諱凖故曰染署齊又曰平凖屬少府梁陳則曰平水令丞北齊平凖屬司農後周曰平凖中士下士隋初如北齊煬帝改隸太府唐因之令二人丞四人掌官市易左右藏署周官有職幣上士中士掌邦財之幣又外府中士主泉藏有玉府掌王之金玉兵器之藏内府中士主貨賄藏在内也職内上士主泉貨所入蓋其任也漢少府屬官有中藏府令丞魏因之晉有左右藏令屬少府晉江東置御史掌庫曹後分庫曹曰外左庫内左庫至宋省外左庫而内左庫直曰左庫齊梁陳曰右藏北齊曰左右藏令屬太府寺後周曰外府上士中士隋如北齊唐因之置左藏署令三人掌庫藏錢布帛雜綵右藏署令二人掌銅鐵毛角玩弄之物金玉珠寳香畫彩色諸方貢獻雜物常平署漢宣帝時耿夀昌請於邊郡皆築倉穀賤時增價而糴貴時減價而糶名曰常平倉常平之名起於此也後漢眀帝置常滿倉晉又曰常平倉自後無聞梁亦曰常平倉而不糴糶陳因之後魏太和中雖不名曰常平亦各令官司糴貯儉則出糶隋曰常平倉唐武徳中置常平監官以均天下之貨市肆騰踊則減價而出田穡豐羡則增糴而收觸𩔖長之後省監署常平署令一人掌倉糧管鑰出納糶糴凡天下倉廪和糴者為常平倉正租為正倉地子為義倉祕書監少監佐丞郎郎郎字校書郎局正字丞著作正太史令周官太史掌建邦之六典又有外史掌四方之志三皇五帝之書漢氏圖籍所在有石渠石室延閣廣内貯之於外府又有御史中丞居殿中掌蘭臺祕書及麒麟天禄二閣藏之於内禁後漢圖書在東觀桓帝延熹二年始置祕書監一人掌典圖書古今文字考合同異屬太常以其掌圖書祕記故曰祕書後省魏武帝又置祕書令典尚書奏事即中書令之任文帝黄初初乃置中書令典尚書奏事而祕書改令為監掌藝文圖籍之事初屬少府後乃不屬自王肅為監乃不屬其蘭臺亦藏書籍而御史掌之魏薛夏云蘭臺為外䑓祕書為内閣晉武帝以祕書併入中書省其祕書著作之局不廢恵帝永平中復别置祕書監并統著作局掌三閣圖書自是祕書之府始居於外其監銅印墨綬進賢兩梁冠絳朝服佩水蒼玉宋與晉同梁曰祕書省任昉字彦昇為祕書監自齊永元以来祕閣四部篇卷紛雜昉手自讐校由是篇目定焉陳因之後魏亦有之後周祕書監亦領著作監掌國史說在祕書丞注隋祕書省領著作太史二曹煬帝増置少監一人後又改監少監並為令唐武徳初復改為監龍朔二年改祕書省為蘭臺改監為太史少監為侍郎咸亨初復舊天授初改祕書監為麟臺神龍初復舊掌經籍圖書監國史領著作太史二局太極元年増祕書少監為二員通判省事其後國史太史分為别曹而祕書省但主書寫勘校而已漢初御史中丞掌蘭䑓祕書圖籍之事至魏晉其制猶存故歴代營都邑置府寺必以祕書省及御史臺為隣雖非要劇然好學君子亦求為之魏徴後為祕書監奏引學者校定四部書自是祕府圖籍燦然畢備丞魏武帝置祕書令及丞一人典尚書奏事後文帝黄初中欲以何楨為祕書丞而祕書先自有丞乃以楨為祕書右丞其後遂有左右二丞劉放為左丞孫資為右丞後省晉復置祕書丞銅印墨綬進賢一梁冠綘朝服嵇紹司馬彪傅暢王謐等並為此官宋為黃綬餘與晉同齊梁尤重陳隋印綬與齊同歴代皆有後周栁蚪為祕書丞時祕書雖領著作不恭史事因蚪為丞始命監掌焉唐龍朔二年改為蘭臺大夫咸亨初復舊掌府事勾稽省署抄目祕書郎後漢馬融字季長為祕書郎詣東觀典校書及魏武建國又置祕書郎嘗以劉邵為之出乘鹿車王肅表曰臣以為祕書職於三臺為近宻中書郎在尚書丞郎上祕書丞郎宜次尚書郎下不然則宜次侍御史下祕書丞郎俱四百石遷宜比尚書郎出亦宜為郡此陛下崇儒術之盛㫖也尚書郎侍御史皆乘犢車而祕書丞郎獨乘鹿車不得朝服又恐非陛下轉臺郎以為祕書丞郎之本意也晉祕書郎掌中外三閣經書校閲脱誤進賢一梁冠綘朝服亦謂之郎中武帝分祕書圖籍為甲乙丙丁四部使祕書郎中四人各掌其一宋齊祕書郎皆四員尤為美職皆為甲族起家之選待次入補其居職例十月便遷宋王敬𢎞子恢之召為祕書郎敬𢎞求為奉朝請與恢之書曰祕書日有限故有競朝請無限故無競吾欲使汝處無競之地文帝許之梁亦然張纘字伯緒為祕書郎固求不遷欲徧觀閣内圖籍自齊梁之末多以貴逰子弟為之無其才實當時諺曰上車不落則著作體中何如則祕書歴代皆有北齊又謂之郎中隋除中字亦四員唐亦四員分掌四部經籍圖書分判校寫功程事龍朔中改為蘭臺郎咸亨初復舊開元二十八年減一員宋太平興國二年始建崇文院昭文館史館集賢院皆總為崇文院及端拱初建祕閣擇三館書籍真本並内出古畫墨跡等藏之亦在崇文院中淳化元年詔祕閣次三館祕書省仍隸京百司時祕書雖有監少監丞郎校書郎正字著作郎佐皆以為寄禄官常帯出入祕監即今中大夫也郎官至祕書監有特令供職者有以他官兼領者有以判祕閣官兼判者至道中末以翰林學士承㫖兼祕書監淳化中李至自前執政以禮部侍郎兼祕書監祥符九年楊億以祕書監判祕閣兼祕書省事見麟臺故事凡邦國經籍圖書悉歸祕閣而祕書所掌常祭祀祝版而已元豐正名以崇文院為祕書省既罷館職麟臺故事云國初三館直館直校勘通謂之館職必試而命不試而命者皆異恩盡以三館職事歸祕書省置祕書省職事官自監少至正字不領他局初除龍圖閣學士王勝之為祕書監時寄禄官為正議大夫蓋裕陵欲重此選又勝之雅有文學故也監掌書籍圖史天文歴數之事屬有五著作佐郎祕書校書祕書正字各以職隸於長貳惟日歴非編修官不預元祐中復置集賢院校理自校理而上職有六等隨官資除授或領内外職任不必専在館中紹聖初罷之宣和初改元豐之制增定為十八員以放唐登瀛之數政和五年詔祕書省殿以右文為名改集賢殿修撰為右文殿修撰建炎三年罷紹興元年復置舊祕書省建於禁中至是權寓臨安府法恵寺十四年剏新省於天井巷之左少監游操援政和故事乞置提舉官遂以授禮部侍郎秦禧後又以孟忠厚為醴泉觀使提舉月過局如宰執五年立定十八員為額太史局文徳殿鐘漏所隸焉隆興元年詔監少丞外以七員為額二年詔依祖宗舊法更不立額丞淳化六年詔祕書監丞仍舊惟無定員及不専職分莅中外之任寄禄官後為奉議郎元豐後掌參領書籍國史天文歴數之事郎國初為寄禄官後亦奉議郎元豐後掌校寫分貯集賢院史館昭文館祕閣經籍圖書則祕書郎主之元祐四年祕書郎並除陞朝知縣已上資序人任滿除集賢校理紹興初罷校理祕書省校書郎漢之蘭臺及後漢東觀皆藏書之室亦著述之所多當時文學之士使讎校於其中故有校書之職初漢成帝時已命光禄大夫劉向於天禄閣校經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校數術太醫令李柱國校方伎後以諸大夫楊雄等亦典校於其中後於蘭臺置令史十八人秩百石屬御史中丞又選他官入東觀皆令典校祕書或撰述傳記後漢明帝以班固為蘭臺令史撰光武本紀及諸傳記又以傅毅為蘭臺令史與班固賈逵等共典校書蓋有校書之任而未為官也故以郎居其任則謂之校書郎以郎中居其任則謂之校書郎中當時重其職故學者稱東觀為老氏藏室道家蓬莱山焉至魏始置祕書校書郎晉宋以下無聞至後魏有祕書校書郎北齊亦有校書郎後周有校書郎下士十二人屬春官之外史隋校書郎十二人煬帝初減二人尋更増為四十人唐置八人掌讎校典籍為文士起家之良選其𢎞文崇文館著作司經局並有校書之官皆為美職而祕書省為最祕書正字後漢桓帝初置祕書監掌圖書古今文字考合同異其後監令掌圖籍之紀監述作之事不復専文字之任矣今之正字蓋令監之遺職校書之通制歴代無聞齊集書省有正書北齊祕書省有正字隋置四人唐因之掌刋正文字其官資輕重與校書郎同貞元八年割校書四員正字兩員隸集賢殿宋初為寄禄官後改承務郎元豐後校書郎四人正字二人掌校讎典籍刋正訛謬各以其職隸於長貳元祐初立試中人除館職法選人除正字京官除校書即建炎初罷紹興復置必召試學士院而後命之著作郎漢東京圖書悉在東觀故使名儒碩學入直東觀撰述國史謂之著作東觀皆以他官領焉蓋有著作之任而未為官員也蘭臺令史班固傅毅洛陽令陳崇長陵令尹敏司隸校尉孟冀及楊彪等著作東觀魏明帝太和中始置著作郎官隸中書省専掌國史衛覬字伯儒以侍中尚書典著作晉元康二年詔曰著作舊屬中書令祕書既典文籍宜改中書著作為祕書著作於是改隸祕書後别自置省謂之著作省而猶隸祕書著作郎一人謂之大著作専掌史任進賢兩梁冠介幘綘朝服宋齊與晉同梁制一梁冠而無印綬以上並大著作魏氏又置佐著作郎亦屬中書晉佐著作郎八人進賢一梁冠絳朝服祕書監自調補之太元四年詔祕書無監使吏部選佐著作郎有監復舊又閻纂集云鄒湛謂祕書監和嶠曰閻纂可佐著作嶠曰此職閒重勢貴多争不暇求才按此則大著作祕監自調也晉制佐著作郎始到職必撰名臣傳一人宋初以國朝始建未有合撰者其制遂廢矣宋齊以來遂遷佐於下謂之著作佐郎亦掌國史集注起居梁初周捨裴子野皆以他官領其職官制與大著作同陳氏為令僕子起家之選後魏有著作郎佐郎北齊有著作郎佐郎各二人後周有著作上士二人中士四人掌綴國録屬春官之外史隋於祕書省署著作曹著作郎二人佐郎八人煬帝加佐郎為十二人唐為著作局置著作郎二人佐郎四人開元二十六年減佐郎二員亦屬祕書省自宋以後國史悉屬祕書龍朔二年改著作郎為司文郎中佐郎為司文郎咸亨初復舊初著作郎掌修國史及製碑頌之屬分判局事佐郎貳之徒有撰史之名而實無其任其任盡在史館矣其屬官有校書郎二人後魏著作省置校書郎北齊著作亦置校書郎二人隋亦同掌讎校書籍若本局無書兼校本省典籍正字二人隋著作曹置正字二人唐減一人掌同校書宋舊為寄禄官郎後為奉議郎佐郎後為宣教郎元豐正名掌修纂日歴祭祀祝辭則著作郎佐之初除林希為大著豐稷為小著皆一時選日歴所隸祕書省著作郎著作佐郎掌以宰相時政記左右史起居注所書㑹集脩撰為一代之典舊於門下省置編脩院専掌國史實録脩纂日歴官制行屬祕書省國史案國史詳見中書省太史局令昔少皥以鳥名官其鳯鳥氏為歴正至顓頊命南正重以司天北正黎以司地唐虞之際羲氏和氏紹重黎之後代序天地夏有太史終古者當桀之暴知其將亡乃執其圖法而奔於殷殷太史髙勢見紂之亂載其圖法出奔於周周官太史掌建邦之六典正歲年以序事頒告朔於邦國魯昭公二年晉韓宣子聘魯觀書於太史氏見易象與魯春秋曰周禮盡在魯矣又有馮相氏視天文之次序保章氏掌天文之變當周宣王時太史官失其守而為司馬氏司馬氏世典周史恵襄之間司馬氏適晉周恵王襄王有子頹叔帯之難故司馬氏奔晉晉中軍隨會奔秦而司馬氏入梁晉太史屠黍見晉之亂以其圖法歸周秦為太史令胡母敬之為太史令作博學七章漢武置太史公以司馬談為之位在丞相上天下計書先上太史副上丞相談卒其子遷嗣之遷死後宣帝以其官為令行太史公文書而已瓚曰百官表無太史公茂陵中書司馬談以太史丞為太史令也張夀王亦為太史令後漢太史令掌天時星歴凡嵗将終奏新年歴凡國祭祀喪娶之事掌奏良日及時節禁忌國有瑞應災異則掌記之張衡字平子為太史令造渾天儀鑄銅為之秦漢以來太史之任蓋併周之太史馮相保章三職自漢晉宋齊並屬太常銅印墨綬進賢一梁冠絳朝服梁陳亦同後魏北齊皆如晉宋隋曰太史曹置令丞各二人而屬祕書省煬帝又改曹為監有令唐初改監為局置令龍朔二年改太史局為祕書閣改令為郎中丞為祕書閣郎咸亨初復舊初屬祕書省乆視元年改為渾天監不隸麟臺改令為監置一人其年又改為渾儀監長安二年復為太史局又隸麟臺其監復太史局令置二人景龍二年復改局為監而令名不易不隸祕書開元二年復改令為監改一員為少監十四年復為太史局置令二人復隸祕書後又改局為監乾元元年又改其局為司天臺掌天文歴數風雲氣色有異則宻封以奏其次小史有司歴保章正靈臺郎挈壺正等官各有差丞二人司馬彪續漢志云太史有丞一人魏以下歴代皆同隋置二人煬帝減一人唐初不置丞乆視初改為渾儀監始置丞二人長安二年又省景龍二年復置宋有司天監天文院鐘鼓院元豐正官制以太史局𨽻祕書省掌測騐天文考定歴法凡日月星辰風雲氣候祥𤯝之事日具所占以聞嵗頒歴於天下則預造進呈祭祀冠昏及典禮則選所用日其官有令有正有春官夏官中官秋官冬官正有丞有直長有靈臺郎有保章正其判局及同判則選五官正以上業優考深者充保章正五年直長至令十年一遷為靈臺郎試中乃遷而挈壺正無遷法其别局有天文院測驗渾儀刻漏所掌渾儀臺晝夜測驗辰象鐘鼓院掌文徳殿鐘鼓樓刻漏進牌之事印歴所掌雕印歴書算學元豐七年詔四選命官通算學者許於吏部就試其合格者上等除博士中次為學諭元祐元年初議者謂本監雖准朝㫖造算學元未興工其試選學官亦未有應格竊慮徒有煩費乞罷修建崇寜三年遂将元豐算學條制修成勅令五年罷算學令附於國子監十一月從薛昻請復置算學大觀三年太常寺考究以黄帝為先師自常先力牧至周朴已上從祀凡七十人四年以算學生併入太史局宣和二年詔並罷官吏文獻通考卷五十六
