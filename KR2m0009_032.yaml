body:
  text: 文獻通考卷三十二鄱陽馬端臨貴與著選舉考五舉士髙宗建炎元年詔曰國家設科取人制爵待士嵗月等隂陽之信法令如金石之堅頃緣冦戎侵犯京邑爰致四方之雋已愆三嵗之期比申飭於攸司涓上春而明試深虞道阻寛佇浹旬而駐蹕行宫時廵方嶽非若中都當逺近之㑹可使四方得道里之均特從權宜創立規制分禮闈之奏額就諸路之漕臺俾謹擇於考官用精蒐於實學士省勞費鄉烝譽髦悉預計偕以俟親策敷告多士咸體至懐諸道令提刑司選官即轉運置司州軍引試使副或判官一人董之河東路附京西轉運司國子監開封府人就試於留守司御史一人董之國子監人願就本路試者聼朝野雜記建炎二年王唐公為禮部侍郎建言復以詞賦取士自紹興二年科塲始曾侍御綂請廢經義而專用詞賦上意鄉之呂元直不可而止十三年國學初建髙抑崇司業言士以經術為本請頭塲試經義次塲試詩賦末塲試子史論時務䇿各一首許之十五年詔經義詩賦分為兩科於是學者競習詞賦經學寖微二十六年冬上諭沈守約曰恐數年之後經學遂廢明年二月詔舉人並兼習兩科内大小經義共三道三十一年言者以為老成經術之士强習辭章不合音律請復分科取士仍詔經義合格人有餘許以詩賦不足之數通取不得過三分自今年太學公補試行之迄今不改先是舉人既兼經義詩賦論䇿因號四科然自更制以後惟紹興十四年二十九年兩行之而止蓋舉人所習已是為二不可復合矣按熈寧四年始罷詞賦專用經義取士凡十五年至元祐元年復詞賦與經義並行至紹聖元年復罷詞賦專用經義凡三十五年至建炎二年又兼用經賦蓋熈寧紹聖則專用經而廢賦元祐建炎則雖復賦而未嘗不兼經然則自熈寧以來士無不習經義之日矣然元祐初始復賦欲經賦中分取人而東坡公上疏言自更法以來士工習詩賦者十人而七欲朝廷随經賦人數多少各自立額取人則知當時士雖不習詩賦者十五年而變法之餘一習即工且多矣至建炎紹興之間則朝廷以經義取士者且五六十年其間兼用詩賦纔十餘年耳然共塲而試則經拙而賦工分科而試則經少而賦多流傳既久後來所至塲屋率是賦居其三之二蓋有自來矣二年詔下第進士六舉曾經御試八舉曾經省試並年四十以上四舉曾經御試五舉曾經省試並年五十以上河北河東陜西舉人數内特各减一舉元符以前到省兩舉者不限年一舉者年五十五已上諸道轉運司開封府皆以名聞令直赴廷試按仁宗嘉祐二年廷試始免黜落然則自後凡經御試者無不出官之人熙豐年間亦嘗有曾經御試推恩之令蓋為嘉祐二年御試不中者設也今中興之初復有此令則自建炎上距嘉祐以前蓋七十餘年豈復有曾經御試之人乎又恐是特為科試入下等不理選限未出官者而設蓋此曹亦謂之曾經御試故令其再試而官之以示優渥之恩史志所載不明當攷是年親試舉人於行都賜進士李易以下四百五十餘人第一人左宣教郎二人三人左宣義郎餘推恩有差特奏名第一人附第二甲入五等者亦予調官川陜河北京東正奏名不赴者一百三人即家賜第皆龍飛特恩也故事廷試上十名御藥院先以文卷奏御定髙下上曰取士當務至公考官自足憑信豈容以一人之意更自升降詔自今勿先進卷子紹興元年以嵗當明堂復詔諸道𩔖試擇憲漕或帥守中詞學之人總其事使精選考官於是四川宣撫處置使張浚始以便宜令川陜舉人即置司州試之侯延慶言用兵以來太學既罷青衿解散文籍淪墜今諸道州軍進士已有定額獨行在職事及釐務官隨行有服親及門客往往鄉貢隔絶請立應舉法以國子監進士為名詔從之令轉運司附試是年徳音應該恩免解舉人值兵燹失公據者召京官二員委保所在州軍給據訖仍申部注籍二年親策進士張九成等時凌景夏為第二吕頤浩言景夏詞實勝九成請更寘第一上曰士人初進便須别其忠佞九成上自朕躬下至百執事言之無所畏避乃擢寘首選九成以𩔖試及親策俱第一特進一官四川𩔖試正奏名第一人依殿試第五人恩例九年詔陜西久陷偽境與四川𩔖試必不能中程式其令禮部措置别號取放川陜分𩔖試額自此始御史中丞廖剛言國朝三嵗一舉毎以今年大禮明年科塲又明年省殿試為凖故注授人先後到部不至攙併今科試明堂同在嗣嵗省司財計難以應辦一不便也近嵗初官待闕率四五年若使進士䕃人同時差注二不便也更展一年則舊制合矣天子是其議其來年詔曰三嵗賓興之制肇自治平爰暨累朝遵為彛典頃緣多故洊展試期致取士之年適當宗祀而入仕之衆併集銓曹攸司困供億之繁多士興滯留之歎宜從革正用復故常庶蕆事惟均有便於國調官無壅亦便爾私其紹興十年諸州依條發解於紹興十二年正月省試三月殿試自後科塲示此為凖十三年初立同文館試凡在行朝去本貫及千里以上者許附試國子監詔祖宗舊法諸路州軍科塲並限八月五日鎻院緣福建去京逺遂先期用七月川廣尤逺遂用六月今福建二廣趨京不逺恐試下舉人冒名再試他州可依限八月初五日鎻院舊諸州皆以八月選日試士舉人有就數州取解者至是詔諸道發解並以中秋日引試四川則用季春而仲秋𩔖省焉太學博士王之望言舉人程文或純用本朝人文集數百言或歌頌及佛書全句舊式皆不攷建炎初悉從刪去故犯者多詔申嚴行下十九年詔自今科試前一嵗諸州軍及屬縣長吏籍定合應舉人以次年春縣上之州州下之學覈實引保赴鄉飲酒畢送試院其臨期投狀射保者皆勿受自熙豐間程顥程頤以道學倡於洛海内皆師歸之中興以來始盛於東南士子科舉之文稍祖頤說先是陳公輔上疏詆頤學乞行禁絶而胡寅辨其非至紹興末年正字葉謙亨上言向者朝論專尚程頤之學士有立說稍異者皆不在選前日大臣則隂右王安石稍涉頤學一切擯棄程王之學時有所長皆有所短取其合於孔孟者皆可以為學也上曰趙鼎主程頤秦檜主王安石誠為偏曲詔有司自今母拘一家之說務求至當之論道學之禁至是稍解矣禮部侍郎周葵言科舉足以取士近年主司迎合大臣之意多取經傳之言可為諛佞者以為問目學者因之專務茍合時好如論伊尹周公則競為歸美宰相之言春秋譏貶失禮則指為褒稱之事悖戾聖人之意大率𩔖此至於前古治亂興亡之變以時忌絶口不道後生晩軰往往不讀史書望詔有司選通經博古之士置之上㳺其穿鑿迎合議論乖僻不合體式者皆行黜落若矯枉過正不顧所問務為詆訐者亦復勿取從之二十五年上謂輔臣曰往年秦塤對策皆檜熺語有司擬為第一朕抑寘第三不使與寒士爭今可舉行祖宗故事應禮部舉人内有權要親族者並令覆試仍追奪塤出身改曹冠等七人階官並帶右字餘並駁放二十七年先時蜀士赴殿試不及者皆賜同進士出身上念其中有俊秀能取髙第者不宜皆寘下列至是先期諭都省寛展試日以待宰相沈該奏天時向暑臨軒非便請後至者臣等策之中書定髙下上曰三年策士朕豈憚一日之勞邪及唱第王十朋為首第二人閻安中第三人梁介安中梁介皆蜀士也上大悅二十九年孫道夫侍經筵一日極論四川𩔖試請托之弊請盡令赴禮部上曰後舉但當遣御史監之道夫持益堅事下國子監祭酒楊椿曰蜀去天萬里可使士子涉三峽冒重湖邪欲革其弊一監試得人足矣遂詔監司守倅賓客力可行者赴省餘不在遣中是嵗四川𩔖省試始降敕差官四川𩔖省試第一人恩數初視殿試第三人賜進士及第優之也後以何耕對蜀人才策為秦檜所怒乃改禮部𩔖試第一等人並賜進士出身自是無有不赴御試者惟上不親策則𩔖省試第一人恩數如舊第二第三人皆附第一甲九名已上附第二甲焉孝宗隆興元年詔應令人代名及為人冒名赴省者各計所受財依條外並永不得應舉省試舊以十四人取一名隆興初建劒宣鼎洪五州進士三舉實到塲者皆以覃恩免解有㫖増省額百人遂以十七人取一人而四川𩔖省試則十六人取一名後不復改容齋洪氏隨筆曰黄魯直以元祐三年為貢院參詳官有書帖一紙云正月乙丑鏁太學試禮部進士四千七百三十二人三月戊申具奏進士五百人乃是在院四十四日而九人半取一人視今日為不侔臣僚言科舉之制州郡解額狹而舉子多漕司數寛士往往捨鄉貫而圖漕牒乞申嚴詐冒之禁立為中制從之四年乃裁定牒試法文武臣添差官除親子孫外並罷其行在職事官除監察御史已上並不許牒試乾道六年詔自今諸道試官皆隔一郡選差後又令歴三郡合符乃聽入院防私弊也七年虞允文請辛巳以來歸正人依倣祖宗陜西河北赴南省試别立號取人從之八年禮部尚書胡沂郎官蕭國梁造貢籍成上之凡諸道舉人鄉貫治經三代年甲舉數悉備淳熙二年御試上嘗謂輔臣欲令文士能射御武臣知詩書命討論殿最來上至是唱第後之二日上御殿引按文士詹騤以下一百三十九人射藝新制也翌日又引文士第五甲及特奏名一百五十二人其日進士俱襴笏入殿起居易戎服各給箭六弓不限斗力射者莫不振厲自獻多命中焉凡三箭中帖為上等正奏第一人轉一官與通判餘循一資二箭中帖為中等減二年磨勘一箭中帖及一箭上垜為下等一任回不依次注官上四甲能全中者取㫖第五甲射入上等注黄甲餘陞名次而已特奏名第五等人射藝合格與文學凡不中者並賜帛六年詔特奏名自今三人取一寘在第四等以前餘並入第五等其末等納敕者舊許再試今止許一試舊免解人有故不入試者理為一舉今不理潛藩及五路舊升甲者今但升名其後又許納敕三次為定制焉容齋洪氏隨筆曰唐開元中國子祭酒楊瑒言竊見流外出身毎嵗二千餘人而明經進士不能居其什一則是服勤道業之士不如胥吏之得仕也若以出身人太多則應諸色裁損不應獨抑明經進士當時以其言為然淳熙九年大減任子員數是時吏部四選開具以三年為率文班進士大約三四百人任子文武亦如之而恩倖流外蓋過二千之數甚與開元𩔖也十一年御試時進士試策薄暮未納卷者三奉㫖賜燭既而侍御史劉國瑞言宫庭之間自有火禁貢舉之條不許見燭雖聖恩寛厚假以須臾竊恐玩習成風寖隳法制其納卷最後者請下御試所降黜從之舊例廷試舉人至暮者許賜燭然殿深易黒日昃則殿上燭出矣凡賜燭正奏名降一甲如在第五甲降充本甲末名特奏名降一等如在第五等與攝助教舉人試藝於省闈及國子監兩浙轉運司者皆禁燭十四年御試得進士王容以下上天姿英明大廷策士多自陞黜不盡由有司是舉王容蓋自第三親擢為榜首時儒生迭興辭章雅正號乾淳體朱熹嘗欲罷詩賦而分諸經子史時務之年其私議曰古者大學之教以格物致知為先而其考校之法又以九年知𩔖通達強立不返為大成今樂經亡而禮經闕二戴之禮已非正經而又廢其一經之為教已不能備而治經者𩔖皆舍其所難而就其所易僅窺其一而不及其餘若諸子之學同出於聖人諸史則該古今興亡治亂得失之變皆不可闕者而學者豈能一旦盡通若合所當讀之書而分之以年使之各以三年而共通其三四之一凡易書詩為一科而子年午年試之周禮儀禮及二戴記為一科而卯年試之春秋及三傳為一科而酉年試之試義各二道諸經皆兼大學論語中庸孟子義一道論則分諸子為四科而分年以附焉諸史則左傳國語史記兩漢為一科三國晉書南北史為一科新舊唐書五代史為一科時務則律歴地理為一科以次分年如經子之法試䇿各二道又使治經者必守家法答義者必通貫經文條舉衆說而斷以己意有司命題必依章句如是則士無不通之經無不通之史而皆可用於世矣雖熹議未上聞而天下誦之項安世擬對學士院試䇿曰科舉之法此今日不可如何之法也自太平興國以來科名日重實用日輕以至於今二百餘年舉天下之人才一限於科目之内入是科者雖檮杌饕餮必官之出是科者雖周公孔子必棄之習之既乆上不以為疑下不以為怨一出其外而有所取捨則上蓄縮而不安下睥睨而不服共知其弊而甘心守之不敢復議矣故曰此今日不可如何之法也不論伊傅周召如何但使諸葛亮王猛處此必當自出意度别作爐鞴以陶鎔天下之人物以收拾天下之才智以共了當時之事决不矻矻受此纒縛也自王𨗳謝安以下隨世就事之人欲於妥帖平靜之中宻致分數劑量之效則必不敢變今之說取今之士矣此固無以議為也然則用王謝之術為之調度亦有道乎曰有時於尋常尺寸之中畧出神明特達之舉稍更闒茸已甚之習薄伸渾厚平直之氣則猶愈於已也蓋天下之事雖貴於守法而亦不可以一付於法法者所以抑僥倖非所以抑豪傑也夫所謂僥倖者其才不應得而冒欲得之之謂也一人得之衆人攀之其門一開不可復禁故上之人立法以拒之使之欲進而無隙欲求而無辭是則法之效也若夫豪傑之士其徳宜為人上其才宜為世用非所謂僥倖者此法之所求非法之所拒也人所共服莫敢與比以此為例誰敢攀之有若是者時出而用之以示天下不專以操筆弄墨取人主之官爵則亦足以補風化隆實行扶善人而愧惡子也又曰夫科目之盛自李唐起而唐之取士猶未盡出於此也有上書而得官如和逄堯員半千之𩔖是也有隠逸而召用如陽城李渤之𩔖是也有出於辟舉如韓愈之出於張建封董晉是也有出於延譽如呉武陵之薦杜牧之是也至於本朝法令始宻科塲條貫如縛胥吏而鄉舉里選之意纎悉無遺矣然祖宗之時猶有度外之事如張詠當為舉首而以遜其鄉人則猶有朋友之義也宋祁當為第一而令與兄則猶有兄弟之恩也延入客次先通所為文則猶有禮意也李畋張及二人並解則猶未立額也此外又有陳乞之恩聘召之禮元祐經行之舉三舍行藝之規則其意亦知徒文之不足以盡士矣故孫復蘇洵之用猶出於常法之外而雷簡夫姚嗣宗之官或由於特達之授然意欲不安而法已一定雖或少出常度然亦千萬中之一二耳須臾之才行不足以勝二百年之科目也按取士之弊人人能言之然晦菴平甫二公之說則不廢科目之法而自足以救科目之弊其説猶為確實可行云光宗初建議者云省闈試士春令尚淺天寒晷短間遇風雪則硯冰筆凍書字不成縱有鉅材莫克展布請展至二月朔而殿試則於四月初選日從之寧宗慶元二年以諒隂不親策省試進士得正奏名鄒應龍等自韓侂胄襲秦檜故智指道學為偽學臺臣附之上章論列詔榜朝堂而劉徳秀在省闈奏疏至云偽學之魁以匹夫竊人主之柄鼓動天下故文風未能丕變請将語録之𩔖並行除毁既而葉翥上言士狃於偽學專習語録詭誕之說中庸大學之書以文其非有葉適進卷陳傅良待遇集士人傳誦其文每用輙效請内自太學外自州軍學各以月試合格前三名程文上御史臺考察太學以月諸路以季其有舊習不改則坐學官提學司之罪是舉也語涉道學者皆不預選四年言者云今之詩賦雖未近古然亦貫穿六藝馳騁百家拘以駢儷之制研精覃思始能成章惟經義一科全用套𩔖父兄相授囊括㝠搜片言隻字不脫毫分溢篋盈箱初無本領旅進塲屋鮮有出於揣擬之外天下士子誰務實學哉望令有司所出六經題目各於本經摘出兩段文意相𩔖者合為一題庶幾實學得盡已見而挾冊讐偽者或可退聼從之嘉泰元年起居舍人章良能陳主司三弊一曰沮抑詞賦太甚既暗削分數又多置下陳二曰假借春秋太過諸處解榜多寘首選三曰國朝正史與實録等書人間私藏具有法禁惟公卿子弟或因父兄得以竊窺有力之家冒禁傳寫而有司乃取本朝故事藏匿本末發為策問寒逺之士無繇盡知請自今詩賦純正者寘之前列春秋卓異者不妨巍占若所作無異諸經自當雜定髙下其策題並須明白指問詔從之開禧二年詔諸道運司州府軍監凡發解舉人合格試卷姓名𩔖申禮部候省試中牒發御史臺同禮部長貳參對字畫闗御藥院内侍照應廷試字畫不同者别榜駮放舊制秋貢春試皆置别頭塲以待舉人之避親者自緦麻以上親及大功以上婚姻之家皆牒送惟臨軒親試謂之天子門生雖父兄為考官亦不避是年始因議臣有請詔自今在朝官有親屬赴廷對者免差考校開禧元年檢詳毛憲為考官其子自知以迎合用兵冠多士韓侂胄既敗乃用言者奏奪憲次對而降自知為第五甲末十五年祕書郎何澹言祖宗舊制諸科舉人問大義十道能以本經註疏對而加之以文辭潤色者為上或不指明義理但引註疏及六分者為麤其不識本義或連他經文義乖戾章句斷絶者否夫經本註疏則學有源流文先義理則士有噐識而今之時文束於命題之短長狃於立說之闗鍵而有司強裂句讀專務斷章是在我者已先離絶㫖意破碎經文則何以責其盡合於大義哉望詔有司革去舊習使士子去機巧而深義理考註疏而辯異同明綱領而識體要則實學之士出矣詔從之新進士舊有期集渡江後置局於貢院特㫖賜之餐錢集英殿賜第之三日赴焉上三人得自擇同升之彦分職有差朝謝後拜黄甲其儀設褥於堂上東西相向皆再拜拜已擇榜中年長者一人狀元拜之復擇最少者一人拜狀元所以侈寵靈重好㑹明長少也又數日赴國子監謁謝先聖先師用釋奠禮遂賜聞喜宴侍從已上及知舉官館職皆預焉試刑法者亦自熙豊間始舊附銓試院兵火後權停紹興三年始復後又降敕别差試官二員專撰刑法問題號為假案其合格分數例以五十五通作十分為率五分以上入第二等下係二十七通七釐半四分半以上入第三等上係二十四通七釐半四分以上入第三等中係二十二通以上凡試入二等者選人改京秩蓋趙忠簡為相以刑名之學其廢日久故白請優之今遂為大理評丞之選四年制置司請每三年就𩔖省試院别差刑法官二員校試從之新科明法者熙寧間改舊明法科為之崇寧初廢取其解省額歸禮部建炎二年正月大理少卿呉瓌言法官闕人請復此科許進士嘗得解貢人就試從之紹興十一年始就諸路秋試每五人解一名省試七人取一名皆不兼經明年御試御藥院請分為第二等第一等本科及第第二等本科出身十四年七月言者以為濫請解省試各逓増二人解試七人取一省試九人取一所試斷案刑名通麤以十分為率斷案及五分刑統義文理俱通者為合格無則闕之仍自後舉兼經十六年二月遂罷之迄今不復置矣新科明法始就諸道秋試每各五人解一省試十取其一御藥院又擬恩例第一等賜本科及第第二等本科出身後三嵗議者謂得解人取應更不兼經白身得官反易於有官試法乃詔自今斷案刑名通麤以十分為率斷及五分刑統義文理全通為合格及雖全通而斷案不及分數者勿取仍自後舉兼經淳熙七年祕書郎李巘言漢世儀律令同藏於理官而决疑獄者必傅以古義祖宗朝詔學究兼習律令而廢明法科後復明法而以三小經附蓋欲使經生明法法吏通經今所試止於斷案律義斷案稍通律義雖不成文亦得中選故法官罕能知書謂宜使習大法者兼習經義參考優劣以定去留上曰古之儒者以經術决獄若用俗吏必流於刻宜如所奏乃詔自今第一第二第三塲試斷案毎塲各三道第四塲試大經義一道小經義二道第五塲試刑統律義五道明年詔斷案三塲毎塲止試一道每道刑名十件與經義通取四十分已上為合格經義定去留律義定髙下嘉定二年臣僚上言棘寺官屬頗難其人獄案來上致多差舛其原在於習法之不精試法之不詳也自昔設科本以六塲引試内斷案五塲各以刑名八件計四十通律義一塲計十通斷案以試其法令律義以試其文理自後有欲便其所習始增經義一塲而止試五塲律義又居其一斷案止三塲而已殊失設科之初意金科玉條𤨏宻繁碎自非終日研究未易精熟乃牽於程文以移其功考試主文𩔖多文士輕視法家惟以經義定去留其弊一也法科之設正欲深明憲章習熟法令察舉明比附之精微識比折出入之錯綜酌情法於數字之内决是非於片言之間政和紹興案題字不過五七百多不滿千比年不求題意之精宻專務繁冗以困人敷衍支離動輙二千字自朝至於日中昃僅能謄寫題目豈暇深究法意其弊二也進士考官凡有出身皆可充選刑法考官不過在朝曽中法科丞評數人由是請托之風盛換易之弊興其弊三也臣以為宜罷去經義仍分六塲以五塲斷案一塲律義為定所問法題稍簡其字數而求精於法試官各供五六題納監試或主文臨期㸃定如是則讞議得人矣從之六年議者云今止試刑統是盡廢義理而專以法律為事雜流進納之人皆得就又可徑除職事官非所以重科目清班綴也請復試經義一塲以尚書語孟題各一篇與刑統大義通為五塲所出經題不必拘刑名倫𩔖以防預造雜流入貲人毋得收試文武雜試髙宗建炎元年追復祖宗故事於科舉之外有文武傑特者試而官之時郡國薦士四人適至命中書省各試策一道何烈對策依廷試禮稱臣上以其寒逺一體推恩既而有言其疎者於是降充末名補下州文學考官汪藻等皆坐黜而軍中便宜借補者衆詔内有武勇之人委諸道提刑安撫司依弓馬所格法比試合格人赴御營使司審試擬定名目上大省部給進武進義校尉兩等文帖換授既而上言者云立功之人色目不一或輸家財助國或齎蠟彈冒險阻或以進言獻策今率試以弓馬而舊補授至陞朝官大使臣者例得校尉未為允愜宜令借補文臣試兵書戰策以為殿最餘並騐實免試注官東萊吕氏曰取士科目自夏商以前不見於經其可見者至周始有自周後數千載凡其間廢置沿革輕重就所偏者看皆自可考然而考論須見得所以廢置因革輕重之所以然以大畧觀之大抵向前重向後愈輕且如周禮以鄉三物教民謂之賓興只看賓之一字當時蓋甚尊事詳考前一叚他是一个本末度數精詳具備固不必說只看他賓興之三年大比獻賢能之書於王王拜受之登於天府内史貳之如此其重及至後世如飲墨水如奪席脫容刀如棘圍如糊名若防姦盗然為士者須深思其故何故古如此重後世如此輕須當深究之三代之時士一个進脩之至惟上之人自求之故如此重又須看當時之於士待之甚重而攷之則甚詳後世待之既輕攷之又畧且如王制論鄉秀士升於司徒曰選士司徒又論其士之秀者而升之學曰俊士然後方免其徭役大樂正又論造士之秀者升諸司馬曰進士這裏方可受爵禄司馬政官也以其可使從政也凡經四級然後始可從政然猶未也司馬又辨論官材論其賢者以告於王而定其論論定然後官之任官然後爵之待其位定始與之以禄一人之身未入仕之前凡經四級已入仕之後凡經三級經七級然後始得禄其考之之詳如此成周之時見得官爵皆天位天禄不敢輕授至後世與之甚遽全以文字髙下為進退蓋有以一日之長而决取終身之富貴者當時攷之甚詳如此然論其大畧漢唐以來大抵自重而漸輕自緩而漸速由漢以來雖不能如三代拜受之禮然猶州長身勸為之駕雖以當時號為諂諛如公孫𢎞者猶是鄉人勸勉而來未嘗自進到得後來唐始令投牒自進而士始漸輕此所謂自重而漸輕自漢至唐進士登第者尚未釋褐或是為人所論薦或再應皆中或藩方辟舉然後始得釋褐至本朝始放進士及第即放釋褐此所謂自緩而漸速科目雖多其間歴代常行自有數自漢至隋以前惟孝㢘與秀才常行自隋唐至本朝惟進士明經常行至熙寧後王荆公用事改取士之法自是進士獨存明經始廢熙寧四年明經科廢罷此其大畧可見其次便是制科制科却歴代常行不廢漢則因事而舉六朝亦間舉至唐及本朝亦未嘗廢到得熙寧間王荆公得政孔文仲對策議新法制科始罷至元祐初又再復得兩三舉至紹聖初章惇為相欲行荆公法又再罷景徳四年帝曰比設此科欲求才識若但考文義茍有濟時之用安得知今䇿問宜用經義參之時務熙寧二年賢良孔文仲考入第三等詔毁薄時政不足收録告示發付本任天聖八年茂才富弼景祐二年體用呉育景祐六年賢良蘇轍蘇軾大抵三代之時不專是語言文章至漢以來則有所謂射策對䇿是時已成科舉之習雖然尚理㑹經義又與時議到隋煬帝之時風俗浮華始有進士之科方有律賦自唐以來孝亷秀才之科尚在但只是明經進士二科盛而秀孝衰是時有記問者則得明經有辭藻者則得進士當時南北未分兩邊各自設科既分之後後周進士未設尚自理㑹秀孝二科是時南人髙南師北人髙北師各守家法莫之能定當時主司有欲優劣之者反為所難隋煬帝時風俗浮華進士科始立至唐初間進士明經都重及至中葉以後則進士重而明經輕蓋當唐之時文華之士多了故如此到得本朝待遇不同進士之科往往皆為將相皆極通顯至明經之科不過為學究之𩔖當時之人為之語曰焚香取進士嗔目待明經才設進士試時便設香案有拜跪之禮才到明經試時則設棘監守惟恐他傳義當時進士却有帖經之制他文士都不屑去記這𫝊義於是有贖帖才是進士科試帖經不知是或作一篇文或作一賦便可贖帖經及至熙寧間荆公罷詞賦帖經墨義併歸進士一科齊魯河朔之士往往守先儒訓詁質厚不能為文辭所以自進士科一併之後榜出多是南人預選北人預者極少自哲廟以後立齊魯河朔五路之制凡是北人皆别考然後取人南北始均慶歴中范文正公富公韓魏公執政欲先試論䇿使工文辭者言古今治亂簡其程式使得以逞問以大義使不專記誦自是古文漸復一年而三公皆罷政此制遂停王文正公為相南省試進士當仁不讓於師論時邊讓李廸皆有名塲屋及榜出二人不與試官取其文觀之李以落韻邊以師為衆與注疏異特奏令御試王文公以為落韻者不審爾若舍注疏而立說不可許遂取李黜邊前軰之守注疏如此嚴至王荆公始以注疏不可用作三經說令天下非從三經者不預選罷詞賦又以春秋有三傳難通罷之至元祐間始復詞賦増春秋又至紹聖章惇執政欲復介甫法遂復罷詞賦去春秋後來至欽宗又始復元祐制大平興國三年詔律賦以平仄次用韻天聖五年詔參考策論慶歴四年宋祁等言使士皆土著而教之以學校先䇿論則文辭者留心於治亂簡其程式則宏博者得以騁問以大義則執經者不專於記誦賦許依放唐人賦詔頒下慶歴五年詔進士諸科如舊制考校注云先是頒行宋祁等新制上封者言非便熈寧四年詔進士罷詩賦帖經墨義各令占一經并論語孟子諸科稍令改進士科大抵須是有鄉舉里選底風俗然後方行得鄉舉里選之制所以楊綰復鄉舉里選未幾停罷緣是未有這風俗今已為士須思所以為風俗者何由又須深察三代之所以厚而後世之所以薄者何故則亦庶乎復古宋登科記總目太祖建隆元年進士十九人榜首楊礪二年進士十一人榜首張去華三年進士十五人榜首馬適四年進士八人榜首蘇徳祥乾徳二年進士八人榜首李景陽制科一人三年進士七人榜首劉察四年進士六人榜首李肅制科二人五年進士十人榜首劉䝉叟六年進士十一人榜首柴成務開寳二年進士七人榜首安徳裕三年進士八人榜首張拱賜十五舉未及第人司馬浦等一百六人本科出身四年進士十人榜首劉寅五年進士十一人榜首安守亮六年進士十一人榜首宋凖再試取十六人落下一人諸科九十六人七年停貢舉八年進士三十一人省元王式狀元王嗣宗諸科二十四人九年停貢舉太宗太平興國二年進士一百九人省元闕狀元吕蒙正諸科二百七人十五舉以上一百八十四凡五百餘人三年進士七十四人省元闕狀元胡旦諸科八十二人四年不貢舉五年進士一百二十一人省元闕狀元蘇易簡諸科五百三十四人六年七年停貢舉八年進士二百三十九人省元王禹偁狀元王世則諸科二百八十五人雍熈元年不貢舉二年進士二百五十八人省元陳充狀元梁顥諸科六百九十九人三年四年不貢舉端拱元年進士二十八人諸科一百一十人覆試得進士諸科七百人又武成王廟重試得進士三十一人諸科八十九人省元程宿是年不臨軒二年進士一百八十六人諸科四百七十八人省元陳堯叟狀元同淳化元年二年不貢舉三年進士三百五十三人諸科七百七十四人省元孫何狀元同四年五年至道元年二年三年並不貢舉真宗咸平元年進士五十人諸科一百五十人省元孫僅狀元同二年進士七十一人諸科一百八十人省元孫暨狀元同三年進士四百九人諸科一千一百二十九人省元李庶幾狀元陳堯咨四年停貢舉制科七人五年進士三十八人諸科一百八十二人省元王曾狀元同六年不貢舉景徳元年不貢舉二年進士二百四十七人諸科五百七十人省元劉滋狀元李廸三年不貢舉制科二人四年不貢舉制科二人大中祥符元年進士二百七人諸科三百二十人省元鄭向狀元姚曄二年親試東封路進士三十一人狀元梁固三年停貢舉四年祀汾隂路進士三十一人狀元張師徳五年進士一百二十六人諸科三百七十七人省元闕狀元徐奭六年停貢舉七年亳州南京路進士二十一人狀元張觀八年進士二百八十人諸科六十五人省元髙餗狀元蔡齊九年停貢舉天禧元年二年停貢舉三年進士一百四十人諸科一百五十四人省元程戡狀元王整四年五年乾興元年並停貢舉仁宗天聖元年停貢舉二年進士二百人諸科三百五十四人省元呉感狀元宋郊三年四年停貢舉五年進士七十七人諸科八百九十四人省元呉育狀元王堯臣六年七年停貢舉八年進士二百四十九人諸科五百七十三人省元歐陽脩狀元王拱辰制科二人㧞萃二人九年停貢舉㧞萃四人明道元年二年並停貢舉景祐元年進士四百九十九人諸科四百八十一人制科三人㧞萃四人省元黄庠狀元張唐卿二年三年四年並停貢舉寳元元年進士三百一十人諸科六百一十七人制科二人省元范鎮狀元吕溱二年康定元年慶歴元年並停貢舉二年進士四百三十五人省元楊寘狀元同制科一人三年四年五年並停貢舉六年進士五百三十八人諸科四百一十五人制科一人省元裵煜狀元賈黯七年八年停貢舉皇祐元年進士四百九十八人諸科五百五十人制科一人省元馮京狀元同二年三年四年並停貢舉五年進士五百二十人諸科五百二十二人省元徐無黨狀元鄭獬至和元年二年嘉祐元年不貢舉二年進士三百八十八人諸科三百八十九人省元李實狀元張衡制科一人是嵗始定為間嵗一科舉四年進士一百六十五人諸科一百八十四人省元劉摯狀元劉煇制科二人六年進士一百八十三人諸科一百二人省元江衍狀元王俊民八年進士一百九十三人諸科十一人省元孔武仲狀元許將英宗治平二年進士二百人諸科十八人制科二人省元彭汝礪狀元同始詔三嵗一科舉四年進士二百五十人諸科三十六人省元許安世狀元同時神宗已即位神宗熈寧三年進士二百九十五人省元陸佃狀元葉祖洽明經諸科四百七十二人制科二人六年進士四百人諸科四十人省元邵剛狀元余中九年進士四百二十二人諸科一百九十四人省元張嵫狀元徐鐸元豐二年進士三百四十八人省元朱浚明狀元時彦五年進士四百四十五人明經三人省元劉槩狀元黄裳八年進士四百八十五人省元焦蹈狀元同是嵗諒闇不臨軒哲宗元祐三年進士五百二十三人制科一人省元章援狀元李常寧六年進士五百一十九人省元鄒起狀元馬涓制科三人紹聖元年進士五百一十二人省元劉範狀元畢漸制科三人宏詞科八人四年進士五百六十四人省元汪革狀元何昌言詞科九人元符三年進士五百六十一人省元李崟狀元同是嵗諒闇不臨軒徽宗崇寧二年進士五百三十八人省元李階狀元霍端友五年進士六百七十一人省元呉倜狀元蔡薿是科為始罷諸州發解併省試並從學校逐年貢士大觀三年進士六百八十五人宗室上舍四十二人上舍魁李彌遜狀元賈安宅政和二年進士七百一十三人上舍魁師驥狀元莫儔五年進士六百七十人宗子上舍十七人上舍魁傅崧卿狀元何㮚八年進士七百八十三人上舍魁何奎狀元王嘉宣和三年進士六百三十人上舍魁宋齊愈狀元何渙六年進士八百五人是年復省試省元楊椿狀元沈晦髙宗建炎二年以軍興分路𩔖省試進士四百五十一人狀元李易四川河北京東進士八十七人紹興二年進士二百五十九人狀元張九成四川進士一百二十人五年進士二百二十人省元樊光逺狀元汪應辰四川進士一百三十七人八年進士二百九十三人省元黄公度狀元同是年不親策引見正奏名與四川𩔖省奏名參定編排十二年進士二百五十四人省元何浦狀元陳誠之四川進士一百四十四人十五年進士三百人省元林機狀元劉章四川進士七十三人十八年進士三百三十人省元徐履狀元王佐四川進士二十三人二十一年進士四百四人省元鄭聞狀元趙逵四川進士十八人二十四年進士三百四十八人省元秦塤狀元張孝祥四川進士六十三人二十七年進士四百二十六人省元張宋卿狀元王十朋先時四川𩔖省道逺趂赴殿不及者别奏名是年無不到三十年進士四百一十二人省元劉朔狀元梁克家四川進士十六人孝宗隆興元年進士五百四十一人省元木待問狀元同是年不親策同紹興八年乾道二年進士四百九十二人省元何澹狀元蕭國梁五年進士五百九十二人省元方恬狀元鄭僑八年進士三百八十九人省元蔡㓜學狀元黄定淳熈二年進士四百二十六人省元章頴狀元詹騤五年進士四百一十七人省元黄渙狀元姚頴八年進士三百七十九人省元俞烈狀元黄由十二年進士三百九十五人省元邵康狀元衞涇十四年進士四百三十五人省元湯璹狀元王容光宗紹熈元年進士五百五十七人省元錢易直狀元余復四年進士三百九十六人省元徐邦憲狀元陳亮寧宗慶元二年進士五百十六人省元莫子純狀元鄒應龍五年進士四百一十二人省元蘇大璋狀元曽從龍四川進士四人嘉泰二年進士四百三十五人省元傅行簡狀元同是年諒闇不臨軒開禧元年進士三十八人省元林執善狀元毛自知嘉定元年進士四百二十六人省元朱停狀元鄭自誠四川進士四人四年進士四百六十五人省元周端朝狀元趙建夫七年進士五百二人省元姚宏中狀元袁甫十年進士五百二十三人省元陳塤狀元呉潛十三年進士四百七十五人省元邱大發狀元劉渭十六年進士五百五十人省元王胄狀元蔣重珍理宗寳慶二年進士九百八十七人省元王㑹龍狀元同是年諒闇不臨軒紹定二年進士五百五十七人省元陳松龍狀元黄朴五年進士四百九十三人省元葉大有狀元徐元杰端平二年進士四百六十六人省元楊茂子狀元呉叔告嘉熈二年進士四百二十二人省元繆烈狀元周坦淳祐元年進士闕人省元劉自狀元徐儼夫四年進士闕人省元徐霖狀元留夢炎七年進士闕人省元馬廷鸞狀元張淵微十年進士闕人省元陳應靁狀元方逢辰寳祐元年闕人省元丁應奎狀元姚勉四年進士闕人省元彭方逈狀元文天祥開慶二年進士闕人省元李雷奮狀元周震炎景定三年進士闕人省元李珏狀元方山京度宗咸淳元年進士闕人省元阮登炳狀元同是年諒闇不親策四年進士六百六十五人省元胡躍龍狀元陳文龍七年進士闕人省元劉夢薦狀元張鎮孫十年進士闕人省元李大同狀元王龍澤右宋三百一十五年逐科取士之總目以登科記及會要參考并省元狀元之名具録於此國初殿試本覆試也唐以來或以禮部所取未當命中書門下詳覆至宋藝祖太宗重其事故御殿覆試至雍熈四年宰相請如唐故事以春官之職歸有司上從之次年命宋知白知舉榜出而謗議蠭起或擊登聞鼓求别試於是再行覆試凡得數百人又明年則知貢舉蘇易簡等不敢專其事固請御試上從之自此遂為定例然是年以後如陳堯叟孫何王曾皆禮部所取第一人而御試復以之冠多士可見當時殿試不過審覆其繆濫者黜之而元在前列者固未嘗别第其升降也景徳以後多别取狀元然省元亦皆置之前列石林燕語謂故事南省奏名第一人殿試唱過三名不及則必越衆抗聲自陳雖考校在下列必得升等呉春卿歐陽公皆由是升第一甲獨范景仁避不肯言等軰屢趣之皆不應至第十九人方及徐出拜命而退時服其静退自此遂為故事然則仁宗時省元亦例在前列蓋當時殿試雖曰别命試官糊名考校然賜第之時往往亦參採譽望乃定掄魁歐陽公作蔡齊行狀言凡貢士當賜第者考定必召其髙第數人並見又參擇其材質可者然後賜第一及公召見衣冠偉然進對有法天子以為無能出其右者乃擢為第一可見當時掄魁未嘗不參取譽望則文章冠禮闈者就為狀頭要亦此意後來無此法矣文獻通考卷三十二
