body:
  text: 文獻通考卷十三鄱陽馬端臨貴與著職役考二歷代鄉黨版籍職役元祐元年二月門下侍郎司馬光言按因差役破産者惟鄉戶衙前有之自餘散從承符弓手手力耆戶長壯丁未聞有破産者其鄉户衙前所以破産者蓋由山野愚戅之人不能幹事或因水火損破官物或為上下侵欺乞取是致欠折備償不足有破産者至於長名衙前在公精熟每經重難别得優輕場務酬奬往往致富何破産之有又向者役人皆上等戶為之其下等單丁女戶及品官僧道夲來無役今更使之一槩輸錢則是賦斂愈重也故自行免役法來富者差得自寬而窮者困窮日甚又監司守令之不仁於雇役人之外多取羡餘以希恩賞此農民之所以重困也臣愚以為莫若直降命敕應天下免役錢一切並罷其諸役人並依熙寧以前舊法人數委夲縣令佐親自揭五等丁産簿定差之人若正身自願充役者即令入役不願充役者任便選雇有行止人自代其雇錢多少私下商量若所雇人逃亡即勒正身别雇若將帶官物勒正身賠填如此則諸色公人盡得其根柢行止之人少敢作過官中百事無不修舉其見雇役人候差到新役人各放逐便如衙前一役雖號重難近來條貫頗為優假諸公庫設厨酒庫茶酒司並差將校勾當諸上京綱運召得替官員或差使臣殿侍軍將管押其雜色及畸零之物差將校或節級管押衙前若無差遣不聞更有破産之人若今日差充衙前料民間賠備亦少於向日若猶以衙前為力難獨任即乞依舊於官戶僧道寺觀單丁女戶有屋業每月掠錢及十五貫莊田中年所收斛斗及百石以上者隨貧富等第出助役錢不及此數者與免放其助役錢令逐州樁管約夲州衙前重難分數即行支給然尚慮天下役人利害逐處不同乞指揮下諸路轉運司下諸州縣限五日內具利害申夲州州限一月申轉運司夲司類聚限一季奏聞委執政官參詳施行是日三省樞密院同進呈得旨依初光上奏左僕射蔡確言此大事當與樞密院共之故同進呈知樞密院章惇取光所奏凡疏略未盡者枚數而駁奏之尚書左丞吕公著言光所建明大意已善其間不無疏略未備惇所言專欲求勝不顧朝廷大體乞選差近臣三四人專切詳定聞奏從之始司馬光奏乞復行差役舊法既得旨依奏知開封府蔡京即用五日限令開封祥符兩縣如舊役人數差一千餘人充役亟詣東府白光光喜曰使人人如待制何患法之不行議者謂京但希望風旨茍欲媚光非事實也蘇轍言京明知熙寧以前舊法役人數目顯有冗長並不依近降指揮相度申請便盡數差撥及朝旨夲無日限輒敢差人監勒於數日內蹙迫了當故意擾民以害成法乞賜行遣以示懲戒監察御史王巖叟言請復差鄉戶主管天下官物公家則免侵陷在私亦脫刑禍宜獨可於衙前大役立夲等相助法以盡變通之利借如一邑之中當應大役者百家而歲取十人則九十家出力為助明年易十戶復如之則大役無偏重之弊矣其於百色無名之差占一切非理之資陪悉用熙寧新法禁之雖不助猶可為今所謂助者不過助受役之家嵗用而已無厚斂也中書舍人蘇軾言先帝初行役法取寬剩錢不得過二分以備災傷而有司奉行過當通計天下乃十四五然行之幾十六七年常積而不用至三十餘萬貫石先帝聖意固自有在今日所當追探其意以興長世無窮之利熙寧中嘗行給田募役法其法以係官田如退灘戶絶沒納之類及用寬剩錢買民田以募役人大略如邉郡弓箭手臣知密州親行其法先募弓手民甚便之曾未半年此法復罷蓋大臣利於速成且利寬剩錢以為他用故不果行因列其五利詔並送詳定所右司諌蘇轍言復行差役其應議者有五其一曰舊差鄉戶為衙前破散人家甚如兵火自新法行天下不復知有衙前之患然而天下反以為苦者其弊自是農家嵗出役錢為難及許人添剗見賣坊場遂有輸納不納者耳向使止用官賣坊場一色課入以雇衙前自可足辦而他色役人止如舊法則為利較然矣初疑衙前多是浮浪投雇不如鄉差稅户可託然行之十餘年投雇者亦無大敗闕不足以易鄉差衙前之害今略計天下坊場錢一嵗可得四百二十餘萬若立定中價不許添剗三分減一尚有二百八十餘萬貫而衙前支費及召募非泛綱運一嵗共不過一百五十餘萬緡則是坊場之直自可了辦衙前百費何用更差鄉户今制盡復差役知衙前苦無陪備故以鄉戶為之至於坊場元無明降處分不知官自賣邪抑仍用以酬奬衙前也若仍用以酬奬即召募部綱以何錢應用若不與之錢即舊名重難鄉户衙前仍前自備為害不小其二坊郭人戶舊苦科配新法令與鄉户並出役錢而免科配其法甚便但敷錢太重未為經久之法乞取坊郭官戶寺觀單丁女户酌今役錢減定中數與坊場錢用以支雇衙前及召募非泛綱運外今樁備募雇諸色役人之用其三乞用見今在人數定差熙寧未減定前其數實冗長不可遵用其四熙寧以前散從弓手手力諸役人常苦迓送自新法以來官吏皆請雇錢役人既便官亦不至闕事乞仍用雇法其五州縣胥吏並量支雇錢募充仍罷重法亦許以坊場錢為用不足用方差鄉戶所出雇錢不得過官雇夲數詔送看詳役法所詳定役法所以役法難盡猝就擇其要者先奏以行於是役人悉用見數為額惟衙前一役用坊場河渡錢雇募不足方許揭簿定差其餘役人惟該募者得募餘悉定差遂罷官戶寺觀單丁女戶出助役法其今夏役錢即免輸尋以衙前不皆有雇直遂改雇募為招募凡熙寧嘗立法禁以衙前及役人非理役使及令陪備圓融之類悉申行之耆壯依保正長法坊場河渡錢量添酒錢之類名色不一惟於法許用者仍以支用外並樁備招募衙前支酬重難及應緣役事之用如州錢不供用許移别州錢用之一路不足許從户部通他路移用其或有餘毋得減募增差衙前最為重役若已招募足額上一等户有虛間不差者令供次等色役鄉差役人在職官如敢抑令别雇承符散從承代其役者轉運司劾奏重責時提舉常平司已罷置凡役事改隸提刑司九月詔諸路坊郭五等已上及單丁女户官戶寺觀等三等以上舊輸免役錢者減五分餘户下此悉免之輸仍自元祐二年始凡支酬衙前重難及綱運公皂迓送餐錢用坊場河渡錢給賦不足方得取此六色錢助用而有餘封樁以備不時之須七年尚書省言近者參行差募之法聞州縣奉詔不謹以致差徭輕重失當或役人有所賠備或占留役錢不盡雇募詔運使提刑司申飭使之究心如更不虔劾奏以聞二月詔應差諸縣手力如合一鄉休役皆不及二年者得用助役錢募人為之既終一役别有間及三年者復行差法御史中丞蘇轍言臣近奏乞修完弊政以塞異同之議其一謂諸州衙前臣請先論今昔差雇衙前利害之實蓋定差鄉戶人有家業欺詐逃亡之弊比之雇募浮浪其勢必少此則差衙前之利也然而每差鄉戶必有避免糾決比至差定州縣吏乞取不資及被差使先入重難若使雇募慣熟之人費用一分則鄉差生疏之人非二三分不了由此破蕩家産嘉祐以前衙前之苦民極畏之此則差衙前之害也若雇募情願自非慣熟必不肯投州縣吏人知其熟事乞取自少及至勾當動知空便費亦有常雖經重難自無破産之患此則雇衙前之利也然浮浪之人家産單薄侵盜之弊必甚於鄉差熙寧以來多患於此此則雇衙前之弊也然則差衙前之弊害在私家而雇衙前之弊害在官府若差法必行則私家之害無法可救若雇法必用則官府之弊有法可正何者嘉祐以前長名衙前除差二大戶外許免其餘色役今若許雇募衙前依昔日長名免役之法則上等人戶誰不願投諸州衙前例得實戶則所謂官府之害坐而自除臣竊謂雖三代聖人其法不能無弊是以易貢為助易助為徹要以因時施宜無害於民而已今差法行於祖宗雇法行於先帝取其便於民者而用之此三代變法之比也役次之名衙前散從承符弓手戶耆戶長壯丁熙寧雇役所取之錢坊場當役戶坊郭戶官户女户單丁寺觀內坊場係官錢當役戶以下係取之於民謂之六色錢取民間六色之錢益以係官坊場錢充雇役之用而盡蠲衙前以下諸役熙寧之法也以坊場充衙前雇役之用而承符以下諸役仍復輪差民户而盡蠲六色之錢元祐之法也然元祐復差役之初議者不同故有弓手許募曾充有勞效者指揮則所謂雇役者不特衙前而已也六色錢雖曰罷徴繼而詔諸路坊郭五等以上及單丁女戶官户自三等以上舊輸免役錢並減五分餘戶下此悉免之則所謂雇役之錢元未嘗盡除也自是諸賢於差雇之議各有所主而朝廷亦兼行之然熙寧盡除差法明立雇議而當時無狀官吏尚且掯免役之錢而不盡支給假他役之名而重復科差况元祐差雇兼行議論反復則此免役六色之錢其在官者不肯盡捐以豫民其在民者有時復徴以入官固其勢也潁濵所謂所在役錢寬剩一二年必未至缺用從今放免理在不疑東坡所謂六色錢以免役取當於雇役乎盡之然後名正而人服皆至當之論紹聖元年帝始親政三省言役法尚未就緒帝曰第行元豐舊法而減去寬剩錢百姓有何不便邪右司諌朱勃言輸錢免役固有過數多敷者用錢雇役有立直太重者役色之內又有優便而願自投募不必給雇者茍詳為裁省則人情無有不便詔付户部詳議詔復免役法凡條約悉用元豐八年見制鄉差役人有應募者可以更代即罷遣之許借坊場河渡及封樁錢以為雇須有役錢日補足其數所輸免役錢自今年七月始耆户長壯丁召雇不得以保正保長保丁充代其他役色應雇者放此所敷寬剩錢不過一分昔常過數今應減下者先自下五等人戶始復置提舉官九月用户部言舉行元豐條制以保正長代耆長甲頭代戶長承帖人代壯丁其後又詔諸縣無得以催稅比磨追甲頭保長無得以雜事追保正副在任官以承帖為名占破當直者坐贓論所管催督租賦州縣官輒令陪備輸物者以違制論左正言孫諤言役法之行在官之數元豐多元祐省雖省未嘗廢事也則多不若省雇役之直元豐重元祐輕雖輕未嘗不應募也則重不若輕戶部尚書蔡京言詳諤所論多省輕重明有抑揚是謂元豐不如元祐乞行貶黜諤坐黜知廣德軍徽宗建中靖國元年四月户部奏京西北路鄉書手雜職斗子所由庫稱揀搯之類土人願就募不須給之雇直他路亦須詳度施行詔從之崇寧元年尚書省言民户既輸錢免役豈可復差前嘗令大保長催稅而不給雇直是為差役非免役也詔提舉司以元輸雇錢如舊法均給二年臣僚言常平之息嵗取二分則五年有一倍之數免役剩錢嵗取一分則十年有一年之備故紹聖立法常平息及一倍免役寬剩及三料取旨蠲減以眀朝廷取於民者非為利也乞詔常平司候豐衍日具此制奏而蠲之四年臣僚言州縣户簿等纍經改造故增減失實乞委常平官分行所部不以等第而以田稅多寡均敷役錢户部尚書許幾言州縣户衆而役少則敷錢止於第三等或户少而役多則均及四五等今若不計家業稅錢不用等第槩以田畝均敷役錢則失輸錢代役之意其議遂格宣和元年臣僚言役錢一事神宗首防官户免多時責半輸今比户稱官州縣募役之類既不可減雇令官戶所減之數均入下户下户於常賦之外又代官戶減半之輸豈不重困詔非泛補官者輸賦差科免役並不得視官户法減免已免者改之進納人自如夲法髙宗建炎元年臣僚言官户役錢舊法比民户減半今來詔置弓手以禦暴防患官户所賴猶重欲令官户役錢更不減而民户比舊役錢量增三分專樁管以助養給從之官舊給庸錢以募户長及立保甲則樁庸錢以助給費未幾廢保甲復户長而庸錢不復給遂拘入總制窠名焉臣僚言州縣保正副未嘗肯請雇錢并典吏雇錢亦不曾給乞行拘收戶部看詳州縣典吏雇錢若不支給竊恐無以責其亷謹難以施行其鄉村耆户長依法係保正長輪差所請雇錢往往不行支給委是合行拘收乞下諸路常平司將紹興五年分州縣所支雇錢依經制錢例分季發付行在敢隱匿侵用並依擅支上供錢法從之按役錢之在官者以供他用而雇役之直或給或否中興以前已如此矣但尚未曾明立一説盡取之耳今乃謂保正副未嘗肯請雇錢又謂所請雇錢往往不行支給夫當役者豈有不肯請雇錢之理而不行支給則州縣之過朝廷所當覺察禁治使不失立法之初意可也今乃以此之故而拘入經制之窠名所謂舍曰欲之而必為之辭也四年罷催稅户長依熙豐法以村疃三十戶每料輪差甲頭一名催納租稅免役等分物既而言者謂甲頭不便者有五一小戶丁小催科不辦二舊每都保正長才四人今甲頭凡三十一人破産者必衆三夏耕秋收一都之內廢農業者凡六十人則通一路有萬萬人不容力穡四甲頭皆耕夫既不識官府且不能與形勢豪戶爭立所差既多爭訴必倍於是甲頭不復差而耆戶長役錢因不復給保正副十大保為一都保二百五十家內通選才勇物力最髙二人充應主一都盜賊煙火之事大保長一年替保正小保長二年替戶長催一都人戶夏秋二稅大保長願兼戶長者輪催納稅租一稅一替欠數者後料人催以上係中興以後差役之法已充役者謂之批朱未曾充役者謂之白腳孝宗隆興二年詔諸充保正副依條只令管煙火盜賊外並不得泛有科擾差使如違許令越訴知縣重行黜責守倅各坐失覺察之罪以言者謂近來州縣違法保內事無巨細一一責辦至於承受文引催納稅役抱佃寬剩修葺鋪驛置買軍器科賣食鹽追擾賠備無所不至一經執役家業隨破故有是命乾道三年三省言役法之害下三等尤甚官户既有限田往往假名寄産不若一􅋀勿拘限法只選物力髙強官户與民户通差則役户頓增下户必無偏差之害乞此後官户合雇人代役詔依令兩浙路先次遵行寧宗慶元五年右諌議大夫張奎言乞行下州縣保正止許幹當夲都賊盜鬪毆煙火公事不許非法科配户長止許專一拘催都內土著租稅不許抑勒代納逃絶官物違者官吏重罰從之又臣僚言户長催納苗稅內有逃絶之家户籍如故見存之户恃頑拖欠為戶長者迫於期限不免與之填納雖或經官陳訴而乃視為私債不與追理勢單力窮必至破蕩此户長之所以重困也乞行下州縣如有恃頑拖欠之徒即與嚴行追斷仍勒還代輸之錢庶使充役者不致重困破家從之嘉定二年殿中侍御史徐範言民資之重者俾充里正彼多産之家其輸役錢於官亦多既已征其財而又俾之執二年之役是為重復乞參酌祖宗常平免役之夲意行下州縣姑於役人從役之年蠲其免役之輸役滿輸錢如故從之役起於物力物力有升降升降不殽則役法公是以紹興以來講究推割推排之制最詳應人戶典賣産業推割稅賦即與物力一併推割至於推排則因其資産之進退與之升降三嵗一行固有資産百倍於前科役不增於今者其如貧乏下户資産既竭物力猶存朝夕經營而應酬之不給者非推排不可也然當時推排之弊或以小民粗有米粟僅存屋宇凡耕耨刀斧之器雞豚犬彘之畜纎微細瑣皆得而籍之吏視其賂之多寡以為物力之低昻又有計田家口食之餘盡載之物力者上之人憂之於是又為之限制除質庫房廊停塌店鋪租牛賃船等外不得以豬羊雜色估紐其貧民求趁衣食不為浮財後耕牛租牛亦與蠲免若夫江之東西以田地畝頭計稅亦有不待推排者惟受産之家有司詳於稅契而略於割稅倘為之令曰交易固以稅契為先後亦以割稅為得業雖已稅契而不割稅許出産人告以業還見納稅人則人孰有不割稅者乎此亦所以救役法之弊也保正長之立也五家相比五五為保十大保為都保有保長有都副保正餘及三保亦置長五大保亦置都保正其不及三保五大保者或為之附庸或為之均并不一也其人户物力如買撲坊場别無産業即以夲坊物力就坊充役如有田産物力即併就一多處充役其有物力散在鄰鄉者併歸煙㸑處又有散在别縣數鄉者各隨縣分併歸一里為等第若夫役次之歇倍則紹興十四年臣僚奏請以其物力增及半倍者歇役十年增及一倍者歇役八年增及二倍歇役四年皆理為白腳必差遍上三等户方許於得替人輪差其窄都不及歇役年限去處即從遞年體例選差十六年兩浙漕臣耿秉申眀又以一倍歇役十年二倍歇役八年三倍歇役六年庶幾疏數得中慶元元年徐誼盡破秉之説專用淳熙十四年臣僚之議而議者又謂物力有高下之殊鄉都有寬狹之異其折倍之法可以為寬鄉之便適以貽狹鄉之害可利寬鄉之中户適以困狹鄉多産之家如以寬鄉言之自物力五百貫而上纍至二千貫者則三倍五百貫之家矣其在富室雖使之四年一役亦未為過若狹鄉自物力一百貫而上積至於四百貫亦謂之三倍所謂四百貫之户曾不及寬鄉之中産今亦使之四年一役其利害輕重灼然矣於是從耿秉之議務要寬鄉狹鄉各得其便其析生白腳則慶元五年臣僚奏謂若兄弟共有田二三百畝才已分析便令各戶充役則前役未蘇而後役踵至實為中産之害須以其分後物力參之其在二等以上者合作析生白腳充應役次若在三等以下許將未分前充過役次於各户名下批朱理為役腳與都內得替人比並物力髙下歇役久近通行選差品官限田有制死亡子孫減半蔭盡差役同編戶一品五十頃二品四十五頃三品四十頃四品三十五頃五品三十頃六品二十五頃七品二十頃八品一十頃九品五頃封贈官子孫差役同編户謂父母生前無曾任官伯叔或兄弟封贈者應非泛及七色補官不在限田免役之數其奏薦弟姪子孫原自非泛七色而來者仍同差役進納軍功捕盜宰執給使減年補授轉至升朝官即為官户身亡子孫並同編戶太學生及得解及曾經省試人雖無限田許募人充役單丁女户及孤幼户並免差役庶幾孤寒得所存恤凡有夫有子不得為女户無夫子則生為女户死為絶户女適人以奩錢置産仍以夫為户坑冶户遇採打礦寶免夲身諸般差役鹽亭户家産及二等以上與官户編户一般差役不及二等依紹興十七年七月指揮蠲免民兵萬弩手免户下三百畝稅賦及諸般差役不及三百畝輒隱他人田畝許人告湖北京西民義勇第四等户與免非泛差科外其合差保正長以家業錢數多寡為限將限外之數與官編户輪差總首部將免保正長差役文州義士已免之田不許典賣老疾身亡許承襲凡募人充役並募土著有行止人其故停軍人及曾係公人並不許募既有募人官司不得復追正身募人不管於雇役之家非理需索或憑藉官司之勢姦害善人斷罪外坐募之者以保伍有犯知而不糾之罰且保正副所職在于煙火盜賊橋梁道路今或使之督賦租備修造供役使皆非所役而執役者每患參役有錢知縣到罷有地理錢時節參賀有節料錢官員過都醋庫月息皆於是而取之抑有弓兵月巡之擾透漏禁物之責捕盜出限之罰催科填代之費承判追呼之勞至於州縣官吏收買公私食用及土産所有皆其所甚懼也若夫户長所職催夏稅則先期借絹催秋稅則先期借米坍溪落江之田逃亡死絶之户又令填納凡此之弊皆上之所當察也髙宗皇帝身履艱難在河朔親知閭閻之苦嘗嘆知縣不得人一充役次即便破家是以講究役法至中興而大備乾道五年處州松陽縣首倡義役衆出田榖助役户輪充守臣范成大嘉其風義為易鄉名自是所在推行浸廣而當時浮議胥動多有伺其隙而敗其謀者十一年御史謝諤言義役之行當從民便其不願義役者乃行差役上然之且美其言為法意圎備及朱文公熹亦謂義役有未盡善者四上户官户寺觀出田以充義役善矣其間有下户只有田一二畝者亦皆出田或令出錢買田入官而上户田多之人却計會減縮所出殊少其下户今既被出田將來却不免役無緣復收此田之租乃是困貧民以資上户此一未盡善也如逐都各立役首管收田租排定役次此其出納先後之間亦未免有不公之弊將來難施刑罰轉添詞訴此二未盡善也又如逐都所排役次今日已是多有不公而况三五年後貧者或富富者或貧臨事未免却致爭訟此三未盡善也所排役次以上户輪充都副保正中下户輪充夏秋户長上户安逸而下户陪費此四未盡善也固嘗即此四未盡善者而求之蓋始倡義役者多鄉閭之善士惟恐當時議之未詳而慮之未周及踵接義役者未必皆鄉閭之善士於是其弊日開其流日甚或以其材智足以把握而專義役之利或以其氣力足以凌駕乃私差役之權曰倍法曰析生等第法皆無所考而雇募人亦不與置置必受約束任驅使於義首者可以教號鄉曲厭酒肉而有餘否則傭錢不支而當役者困矣是以虐貧而優富凌寡而暴孤義役之名立而役戶不得以安其業雇役之法行而役户不得以安其居信乎朱熹未盡善之弊固如此也水心葉氏義役跋曰保正長法不承引帖催二稅今州縣以例相驅訶繫鞭撻遂使差役不行士民同苦至預醵錢給費逆次第其先後以應期會名曰義役然則有司失義甚矣余嘗問為保正者曰費必數百千保長者曰必百餘千不幸遇意外事費輒兼倍少不破家蕩産民之惡役甚於寇讎余嘗疑之官人以牧養百姓為職當潔身馭吏除民疾苦且追則有期約日以集使賄必行應追者任之可也民實有産視稅而輸使賦必重應輸者任之可也保正長會最督促而已何用自費數百千及百餘千甚或兼倍以至破家蕩産乎且此錢合而計之嵗以千百巨萬既不歸公上官人知自愛又不敢取誰則有此余欲以其言為妄然余行江淮閩浙洞庭之南北蓋無不為此言者矣嗚呼此有司之所宜陳者也余忝為長吏不得為令佐自試其術以破余疑而不能意殊慘然因孫君義役書成輒題於後以告其得為者按差役古法也其弊也差設不公漁取無藝故轉而為雇雇役熙寧之法也其弊也庸錢白輸苦役如故故轉而為義義役中興以來江浙諸郡民户自相與講究之法也其弊也豪強專制寡弱受凌故復反而為差蓋以事體之便民者觀之雇便於差義便於雇至於義而復有弊則末如之何也已竊嘗論之古之所謂役者或以起軍旅則執干戈冒鋒鏑而後謂之役或以營土木則親畚鍤疲筋力然後謂之役夫子所謂使民以時王制所謂嵗不過三日皆此役也至於鄉有長里有正則非役也柳子厚言有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子然則天子之與里胥其貴賤雖不侔而其任長人之責則一也其在成周則五家設比長二十五家設里宰皆下士也等而上之則曰閭胥掌二十五家六鄉曰酇長掌一百家六遂皆中士也曰族師掌一百家六鄉曰鄙師掌五百家六遂皆上士也曰黨正掌五百家六鄉曰縣正掌二千五百家六遂皆下大夫也曰州長掌二千五百家六鄉則中大夫也周時鄰里鄉黨之事皆以命官主之至漢時鄉亭之任則每鄉有三老孝悌力田掌觀導鄉里助成風俗每亭有亭長嗇夫掌聽獄訟收賦稅又有遊徼掌巡禁盜賊亦皆有祿秩而三老孝悌力田為尤尊可與縣令丞尉以事相教復勿繇戍古之所謂復除者復其繇戌耳如三老蓋亦在復除之科然則謂三老為役可乎嘗以嵗十月賜酒肉或賜民爵一級則三老孝悌力田必二級賜民帛一匹則三老孝悌力田必三匹或五匹其尊之也至矣故戾太子得罪而壺關三老得以言其寃王尊為郡而東郡三老得以奏其治狀至於張敞朱博鮑宣仇香之徒為顯宦有聲名然其猷為才望亦皆見於為亭長嗇夫之時蓋上之人愛之重之未嘗有誅求無藝迫脅不堪之舉下之人亦自愛自重未嘗有頑鈍無耻畏避苟免之事故自漢以來雖叔季昏亂之世亦未聞有以任鄉亭之職為苦者也隋時蘇威奏置五百家鄉正令理人間詞訟而李德林以為夲廢鄉官判事為其里閭親識剖斷不平今令鄉正專理五百家恐為害更甚詔集議而衆多是德林遂廢不置然則隋時鄉職或設或廢夲無關於理亂之故而其所以廢者蓋上之人重其事而不輕置非下之人畏其事而不肯充也至唐睿宗時觀監察御史韓琬之疏然後知鄉職之不願為故有避免之人琬言往年兩京及天下州縣學生佐史里正坊正每一員闕先擬者輒十人頃年差人以充猶致亡逸即知政令風化漸以弊也唐宣宗時觀大中九年之詔然後知鄉職之不易為故有輪差之舉詔以州縣差役不均自今每縣據人貧富及差役輕重作差科簿送刺史檢署訖鎖於令廳每有役事委令據簿輪差自是以後所謂鄉亭之職至困至賤貪官汙吏非理徴求極意凌蔑故雖足迹不離里閭之間奉行不過文書之事而期會追呼笞箠比較其困踣無聊之狀則與以身任軍旅土木之徭役者無以異而至於破家蕩産不能自保則徭役之禍反不至此也然則差役之名蓋後世以其困苦卑賤同於徭役而稱之而非古人所以置比閭族黨之官之夲意也王荆公謂免役之法合於周官所謂府史胥徒王制所謂庶人在官者然不知周官之府史胥徒蓋服役於比閭族黨之官者也蘇文忠公謂自楊炎定兩稅之後租調與庸兩稅既兼之矣今兩稅如故奈何復欲取庸錢然不知唐之所謂庸乃征徭之身役而非鄉職之謂也二公蓋亦習聞當時差役之名但見當時差役之賤故立論如此然實則誤舉以為比也上之人既賤其職故叱之如奴𨽻待之如罪囚下之人復自賤其身故或倚法以為姦或匿賊以規免皆非古義也成周之事逺矣漢之所以待三老嗇夫亭長者亦難以望於後世如近代則役法愈弊役議愈詳元祐間講明差雇二法為一大議論然大槩役之所以不可為者費重破家耳蘇黃門言市井之人應募充役家力既非富厚生長習見官司吏雖欲侵漁無所措手耕稼之民性如麋鹿一入州縣已自懾怖而况家有田業求無不應自非廉吏誰不動心凡百侵擾當復如故以是言之則其所以必行雇役者蓋雖不能使充役之無費然官自任雇募之責則其役與民不同而橫費可以省雖不能使官吏之不貪然民既出雇募之費則其身與官無預而貪毒無所施此其相與防間之術雖去古義逺甚然救時之良䇿亦不容不如此然熙豐間言其不便者則謂差役有休歇之時而雇役則年年出費差役有不及之户而雇役則户户徴錢至有不願輸錢而情願執役者蓋當時破家者皆愚懦畏事之人而桀黠之徒自能支吾而費用少者反以出雇役錢為不便又當時各州縣所徴雇役錢除募人應役之外又以其餘者充典吏俸給之用又有寬剩錢可以偹凶旱賑救可以見當時充役之費夲不甚重故雇役之錢可以備此三項支用也若夫一承職役羈身官府則左支右吾盡所取辦傾囷倒廩不足賠償役未滿而家已罄事體如此則雇役之法豈復可行雇役之金豈復能了然則此法所以行之熙豐而民便之元祐諸君子皆以為善者亦當時執役之費夲少故也禮義消亡貪叨成俗為吏者以狐兔視其民睥睨朵頥惟恐墮穽之不早為民者以寇戎視其吏潛形匿影日虞懷璧之為殃上下狙伺巧相計度州縣專以役户之貧富為宦况之豐殺百姓亦專以役籍之係否驗家道之興衰於是民間視鄉亭之職役如蹈湯火官又以復除之説要市於民以取其資其在復除之科者苟延嵗月而在職役之列者立見虛耗雖有智者不能為謀矣所謂正夲澄源之論必也朝廷以四維勵士大夫餼廩稱事無俾有多藏之惡士大夫以四維自勵力行好事稍能以澤物存心然後鋤姦貪之胥吏以去其蠧害削非泛之支備以養其事力賦斂之簿書必核無使代逋欠之輸勾呼之期會必明毋使受稽慢之罰夫然故役人者如父母之令其子弟恩愛素孚役於人者如臂指之護其腹心劬勞不憚既無困苦之憂不作避免之念則按籍召而役之可矣奚必曰雇曰義之紛紛哉不然舉三代以來比閭族黨之法所以聮屬其民上下相維者反藉為厲民之一大事愚不知其説矣復除周鄉大夫之職以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍舍役除不收役事也貴若今宗室及關內侯皆復也服公事者若今吏有復除也老者謂若今八十九十復羡卒也旅師凡新氓之治皆聽之使無征役新徙來者復之也均人凶札則無力政政讀作征王制命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士不征不給其徭役五十不從力政力政城道之役也八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政父母之喪三年不從政齊縗大功之喪三月不從政將徙於諸侯三月不從政自諸侯來徙家期不從政大夫采地之民徙於諸侯為民以其新徙當須復除但諸侯地寬役少故三月不從政自諸侯來徙大夫之家邑大夫役多地狹故期不從政漢髙祖二年蜀漢民給軍事勞者復勿租稅二嵗關中卒從軍者復家一嵗鄉三老縣三老復勿徭戍五年詔諸侯子在關中者復之十二嵗其歸者半之軍吏卒賜爵非七大夫已下皆復其身及户勿事七年民産子復勿事二嵗八年令吏卒從軍至平城及守城邑者皆復終身勿事十一年諸縣堅守不降反寇者復租三嵗豐人徙關中者皆復其身士卒從入蜀漢關中者皆復終身十二年詔吏二千石入蜀漢定三秦者皆世世復以沛為湯沐邑復其民世世無有所與沛父兄請復豐乃并復豐比沛又詔秦始皇帝守冡二十家楚魏齊各十家趙及魏公子無忌各五家令視其冡復無與他事惠帝四年舉民孝悌力田者復其身文帝禮髙年九十者一子不事八十者二算不事募民守塞皆賜髙爵復其家令民入粟至五大夫乃復一人西邉北邉之郡雖有長爵不輕得復三年幸太原復晉陽中都民三嵗租四年復諸劉有屬籍者家無所與景帝遺詔出宫人歸其家復終身武帝建元元年民年八十復二算九十復甲卒又詔民年九十以上已有受鬻法給米粟為糜鬻之六反為復子若孫令得身率妻妾遂其供養之事武帝為博士官置弟子五十人復其身登禮中嶽以山下户凡三百封崇髙為之奉邑獨給祠復無有所與府庫並虛乃募民能入奴婢者得以終身復桑𢎞羊請令民入粟甘泉各有差以復終身時兵革數動民多買復及五大夫千夫調發之士益鮮宣帝地節二年詔博陸侯功德茂盛復其後世世毋有所與功如蕭相國地節三年詔流民還歸者且勿算事地節四年詔有大父母喪者勿徭事使得送終盡子道元康元年復髙皇帝功臣絳侯周勃等百三十六人家子孫令奉祭祀世世勿絶其毋嗣者復其次元帝好儒能通一經者復數年以用度不足更為設員千人永光三年用度不足民多復除無以給中外徭役世祖建武五年詔復濟陽二年徭役帝生於濟陽故復之十九年幸汝南南頓縣賜吏人復南頓歲租一嵗父老叩頭言願賜復十年帝曰天下重器常恐不任日復一日安敢遠期十年乎吏人又言陛下實惜之何言謙也帝大笑復增一嵗二十年復濟陽縣徭役六嵗三十年復濟陽縣徭役一嵗明帝永平五年常山三老言上生於元氏願蒙優復詔曰豐沛濟陽受命所由加恩報德適其宜也今永平之政百姓怨結而吏人求復令人愧笑重逆此縣之拳拳其復元氏田租更賦六嵗勞賜縣掾史及門闌走卒桓帝永康元年復博陵河間二郡比豐沛靈帝光和六年復長陵縣比豐沛徐氏曰按漢之有復除猶周官之有施舍皆除其賦役之謂也然西京時或以從軍或以三老或以孝悌力田或以明經或以博士弟子或以功臣後以至民産子者大父母父母之年髙者給崇髙之祠者莫不得復其間美意至多至東都所復不過濟陽元氏南頓數邑為天子之私恩矣按周官及禮記所載周家復除之法除其征役而已至漢則并賦稅除之豈漢之法優於周乎曰非也蓋賦稅出於田而周人之田則皆受之於官其在復除之例者如所謂貴者賢者能者服公事者即公卿大夫以及庶人在官之流皆受公田之祿以代耕未嘗豫之田而使之躬耕者也所謂老者疾者則不能耕而不復給以田且仰常餼於官者也所謂新氓之遷徙者則是未及授以田者也此數色之人既元無田則何有於賦稅故只除其征役至漢則田在民間官不執授受之柄亦無復應受與不應受之法矣故在復除之例者並除其賦役也然漢以後則官户之有蔭至單丁或老疾者除其役則有之亦不復聞有除稅之事矣魏黃初元年之後始開太學至太和青龍中中外多事人懷避就雖性非解學多求詣太學諸生有千數而諸博士率皆粗疏無以教弟子弟子夲亦避役竟無能習學冬來春去嵗嵗如是王褒門人為夲縣所役求褒為屬褒曰卿學不足以庇身吾德薄不足以蔭卿屬之何益且吾不捉筆已四十年乃步擔乾飯兒負鹽豉門徒從者千餘人安邱令以為見已整衣出迎之於門褒乃下道至土牛磬揖而立云門生為縣所役故來送别執手涕泣而去令即放遣諸生唐制太皇太后皇太后皇后緦麻以上親內命婦一品以上親郡王及五品以上祖父兄弟職事勳官三品以上有封者若縣男父子國子太學四門學生俊士孝子順孫義夫節婦同籍者皆免課役凡主户內有課口者為課户若老及廢疾篤疾寡妻妾部曲客女奴婢及視九品以上官不課四夷降户附以寬鄉給復十年奴婢縱為良人給復三年役外蕃人一年還者給復三年二年者給復四年三年給復五年又詔諸宗姓未有職任者不在徭役之限元宗初立求治蠲徭役者給蠲符以流外及九品京官為蠲使嵗再遣之白履忠召拜朝散大夫乞還吳兢謂之曰子素貧不霑斗米匹帛雖得五品何益履忠曰往契丹入冦家取排門夫吾以讀書縣為免今終身髙卧寬徭役豈易得哉唐制諸司捉錢户皆給牒蠲免徭役詳見雜征𣙜門宋真宗皇帝乾興元年臣僚上言官勢户及將校衙前占田避役之害見差役門仁宗時初官八品已下死者子孫役同編户詔特蠲之民避役者或竄名浮圗籍號為出家趙州至千餘人州以為言遂詔出家者須落髮為僧乃可免役神宗熙寧二年頒募役法於天下詔崇奉聖祖及祖宗陵寢神御寺院宫觀免納役錢諸旌表門閭有敇書及前代子孫於法有蔭者所出役錢依官户法賜號處士非因技授者凖此按自熙寧助役之法既行凡品官形勢以至僧道單丁該免役之科者皆等第輸錢無所謂復除矣然數者之輸錢輕重不等其詳見户役門兹更不備録中興以後差役之法品官限田有制死亡子孫減半蔭盡差役同編户詳並見户役門文獻通考卷十三
