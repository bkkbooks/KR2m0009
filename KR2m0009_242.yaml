body:
  text: 文獻通考卷二百四十二鄱陽馬端臨貴與著經籍考六十九集詩集陳氏曰凡無他文而獨有詩及雖有他文而詩集復獨行者别為一類阮歩兵集陳氏曰魏歩兵校尉陳留阮籍嗣宗撰其題皆曰詠懐首卷四言十三篇餘皆五言八十篇通為九十三篇文選所收十七篇而已宋武帝集一卷陳氏曰孝武駿也梁簡文集五卷陳氏曰簡文帝綱也按隋志八十五卷唐已缺五卷中興書目只存一卷詩百篇又缺其三首今五卷皆詩總為二百四十四篇梁元帝詩一卷陳氏曰即湘東王繹謝惠連集一卷陳氏曰宋司徒參軍謝惠連撰本集五卷今惟詩二十四首惠連得名早輕薄多尤累故仕不顯死時才三十七歲劉孝綽集一卷陳氏曰梁祕書監彭城劉孝綽撰宋僕射勔之孫本傳稱文集數十萬言今所存止此又言兄弟及羣從子弟當時有七十人並能屬文近古未有其三妹亦並有才學適徐悱者文尤清拔所謂劉三娘者今玉臺集中有悱妻詩柳吳興集一卷陳氏曰梁吳興太守河東柳惲文暢撰僅有十八首徐孝穆集一卷陳氏曰陳太子太傅東海徐陵孝穆撰本傳稱其文喪亂散失存者二十卷今惟詩五十餘篇江總集一卷陳氏曰陳尚書令考城江總總持撰總在陳為太子詹事以宮端為長夜之飲及後主卽位當權任日為艶詩君臣昏亂以至亡國入隋為上開府唐志集三十卷中興書目七卷今惟存詩僅百首云陰鏗集一卷陳氏曰陳㪚騎常侍南平陰鏗子堅撰才三十餘篇杜子美云李侯有佳句往往似陰鏗今考之未見鏗之所以似太白者太白固未易似也子美云爾殆必有說薛道衡集一卷陳氏曰隋内史侍郎河東薛道衡元卿撰詩凡十九篇本集三十卷所存止此大抵隋以前文集存全者亡幾多好事者於類書中抄出以􅊀家數也史言道衡每至構文必隱空齋蹋壁而卧聞户外人聲便怒其沉思如此杜必簡集一卷陳氏曰唐著作郎襄陽杜審言必簡撰工部之祖也唐初沈宋以來律詩始盛行然未以平仄失眼為忌審言詩雖不多句律極嚴無一失粘者甫之家傳有自來矣然遂欲衙官屈宋則不可也楊誠齋序畧曰必簡嘗為吉州司户今户曹趙君彦清旁搜遠摭得其詩四十二首將刻棗以傳好詩且以為户廳之寶玉大弓屬予集之余觀必簡之詩若牽絲紫蔓長卽水荇牽風翠帶長之句也若鶴子曳童衣卽儒衣山鳥怪之句也若雲陰送晚雷卽雷聲忽送千峯雨之句也若風光新栁報宴賞落花催即星霜元鳥變身世白駒催之句也予不知祖孫之相似其有意乎抑亦偶然乎至如往來花不發新舊雪仍殘如日氣抱殘虹如愁思看春不當春明年春色倍還人如飛花攪獨愁皆佳句也三世之後莫之與京宜哉薛少保集一卷陳氏曰唐太子少保河東薛稷嗣通撰稷道衡曾孫魏徵外孫喬知之集一卷陳氏曰唐右司郎喬知之撰天授中為酷吏所陷死集中有綠珠怨蓋其所由以致禍也孟襄陽集三卷陳氏曰唐進士孟浩然撰宜城王士源序之凡二百十八首分為七類太常卿韋縚為之重序東坡謂浩然詩韻高而才短如造内法酒手而無材料耶崔顥集一卷陳氏曰唐司勲員外郎崔顥撰開元十年進士才俊無行黃鶴樓詩盛傳於世祖詠集一卷陳氏曰唐祖詠撰開元十二年進士崔國輔集一卷陳氏曰唐集賢直學士禮部員外郎崔國輔撰開元十三年進士應縣令舉為許昌令天寶中加學士後以王鉷近親坐貶詩凡二十八首臨海李氏本後又得石林葉氏本多六首綦母潛集一卷陳氏曰唐待制集賢院南康綦母潛孝通撰南康今贛州儲光羲集五卷陳氏曰唐監察御史魯國儲光羲撰與崔國輔綦母潛皆同年進士天寶末任偽官貶死顧况為集序常建集一卷陳氏曰唐盱眙尉常建撰王江寧集一卷陳氏曰唐龍標尉江寧王昌齡少伯撰與常建俱開元十五年進士二十二年選宏詞超絶羣類為汜水尉不䕶細行貶龍標世亂還里為刺史閭邱曉所殺為詩緒密而思清李頎集一卷陳氏曰唐李頎撰開元二十三年進士崔曙集一卷陳氏曰唐崔曙撰開元二十六年進士狀頭杜工部詩集注三十六卷陳氏曰蜀人郭知逹所集九家注世有稱東坡杜詩故事者隨事造文一一牽合而皆不言其所自出且其辭氣首末出一口蓋妄人依托以欺亂流俗者書坊輙勦入集注中殊敗人意此本獨削去之福清曾噩子肅刻板五羊漕司字大可考最為善本宋子京贊唐興詩人承陳隋風流浮靡相矜至宋之問沈佺期等研揣聲音浮切不差而號律詩競相沿襲逮開元間稍裁以雅正然恃華者質反好麗者壯違人得一槩皆自名所長至甫渾涵汪茫千彚萬狀兼古今而有之他人不足甫乃厭餘殘膏賸馥沾丐後人多矣故元稹謂詩人以來未有如子美者甫又善陳時事律切精深至千言不少衰世號詩史昌黎韓愈於文章少許可至歌詩獨推曰李杜文章在光焰萬丈長誠可信云朱子語錄曰杜詩初年甚精細晚年橫逸不可當只意到處便押一箇韻如自秦州入蜀諸詩分明如畫乃其少作也人多説杜子美䕫州詩好此不可曉䕫州詩却說得鄭重煩絮不如他中前有一節詩好魯直一時固有所見今人只見魯直說好便却說好如矮人看塲耳杜詩最多誤字蔡興宗正異固好而未盡某嘗欲𢋫之作杜詩考異竟未暇也如風吹蒼江樹雨洒石壁來樹字無意思當作去字無疑去字對來字又如蜀有漏天以其西北陰盛常雨如天之漏也故杜詩云鼓角漏天東後人不曉其義遂改漏字為滿字似此類極多門類杜詩二十五卷陳氏曰稱東萊徐宅居仁編次未詳何人類集詩史三十卷陳氏曰莆陽方醇道温叟編王季友集一卷陳氏曰唐王季友撰元結篋中集有季友詩二首今此集有七篇而篋中二首不在焉杜詩所謂鄷城客子王季友者意即其人也耶陶翰集一卷陳氏曰唐禮部員外郎丹陽陶翰撰開元十八年進士次年宏詞秦隱君集一卷陳氏曰唐處士秦系公緒撰自天寶間有詩名藩鎭奏辟皆不就嘗隱越之剡泉之南安至貞元中年八十餘不知所終此本南安所刻余嘗於宋次道寶刻叢章得其逸詩二首書冊末岑嘉州集八卷陳氏曰唐嘉州刺史南陽岑參撰文本之曾孫天寶三載進士為補闕左史郎官與杜甫唱和李嘉祐集一卷陳氏曰唐台州刺史李嘉祐從一撰天寶七載進士亦號臺閣集李肇稱其水田飛白鷺夏木囀黃鸝之句王維取之以為七言今按此集無之右謝惠連陰鏗杜審言儲光羲王昌齡常建孟浩然岑參李嘉祐九家集鼂氏書録在别集門所論已附在本門此更不重具皇甫冉集一卷鼂氏曰唐皇甫冉茂政丹陽人天寶十五載進士為無錫尉歴拾遺補闕卒與弟曾齊名當時比張氏景陽孟陽云集有獨孤及序皇甫曾集一卷陳氏曰唐侍御史皇甫曾孝常撰天寶十二載進士兄冉後曾三載登第郎士元詩一卷鼂氏曰唐郎士元字君胄中山人天寶十五載進士為郢州刺史與錢起俱有詩名而士元尤更清雅時朝廷公卿出牧奉使若兩人無詩祖行人以為愧包何集一卷陳氏曰唐起居舍人延陵包何㓜正撰包佶集一卷唐史藝文志何佶皆包融之子兄弟齊名世稱二包融與儲光羲皆延陵人曲阿有餘杭尉丁仙芝緱氏主簿蔡隐邱監察御史蔡希周渭南尉蔡希寂處士張彦惟張湘校書郎張暈吏部常選周瑀長洲尉談戭句容有王府參軍殷遥硤石主簿樊光橫陽主簿沈如筠江寜有右拾遺孫處元處士徐延壽丹徒有江都主簿馬挺武進尉申堂構十八人皆有詩名殷蟠彚次其詩為丹陽集者陳氏曰唐祕書監包佶選天寶六載進士兄何後一年錢考功集二卷鼂氏曰唐錢起徽之父呉郡人天寶中舉進士初從鄉薦客舍月夜聞人哦於庭曰曲終人不見江上數峯青起攝衣從之無所見矣及就試詩題乃湘靈鼓瑟也起即以鬼謠十字為落句主文李暉深嘉之擢至髙第釋褐授校書郎終考功與郎士元齊名時曰前有沈宋後有錢郎陳氏曰蜀本作前後集十三卷韓翃集五卷鼂氏曰唐韓翃君平南陽人天寶十三載進士淄青侯希逸宣武李勉繼辟幕府俄以駕部郎中知制誥終於中書舍人翃詩興致繁富朝野重之陳氏曰翃以春城飛花之句受知德宗顧况集二卷鼂氏曰唐顧况字逋翁蘇州人至德二年江東進士善為歌詩性諧談德宗時栁渾輔政以袐書郎召况善李泌及泌相自謂當得逹官乆遷著作郎及泌卒有調笑語貶饒州司户卒集有皇甫湜序陳氏曰湜嘗言吾自為顧况作序未嘗許他人况在唐蓋為人推重也集本十五卷今止五卷不全嚴維集一卷陳氏曰唐祕書郎山隂嚴維正文撰至德二載辭藻宏麗科耿湋集一卷陳氏曰唐右拾遺河東耿湋撰寶應二年進士登科記一作緯韋蘇州集十卷陳氏曰唐韋應物京兆人天寶時為三衛後作洛陽丞京兆府功曹知滁江二州召還或媢其進媒孽之出為蘇州刺史詩律自沈宋以後日益靡嫚鎪章刻句揣合浮切雖音韻諧婉屬對麗密而閑雅平淡之氣不存矣獨應物之詩馳驟建安以還得其風格云韓子蒼曰蘇州少以三衞郎事元宗豪縱不羈元宗崩始折節務讀書故其逢楊開府詩曰少事武皇帝無賴恃恩私身作里中橫家藏亡命兒朝持摴蒲局暮竊東鄰姬司𨽻不敢捕立在白玉墀一字都不識飲酒肆頑癡云云然余觀其人為性髙潔鮮食寡欲所居埽地焚香而坐與豪縱者不類其詩清深妙麗雖唐詩人之盛亦少其比又豈似晚節把筆學為者豈蘇州自序之過歟徐師川云韋蘇州詩人多言其古淡乃是不知言自李杜以後古人詩法盡廢惟蘇州有六朝風致最為流麗司空文明集三卷陳氏曰唐虞部郎中京兆司空曙文明撰别本一卷才數篇李端司馬集三卷鼂氏曰唐李端趙州人大歴五年進士為校書郎卒官杭州司馬郭曖尚昇平公主賢明招納士類故端等皆客之當坐上賦詩奇甚主大加稱歎錢起曰素為之請賦起姓端立獻一篇云新開金埒看調馬舊賜銅山許鑄錢起乃服主喜厚賜之盧綸詩一卷鼂氏曰唐盧綸與吉中孚韓翃錢起司空曙苗發崔峒耿緯夏侯審李端皆能詩齊名號大歴十才子綸字允言累舉進士不第李益詩一卷鼂氏曰唐李益君虞姑臧人大歴四年進士調鄭縣尉幽州劉濟辟從事憲宗雅聞其名召為集賢殿學士負才凌籍士衆不能堪暴其獻濟詩不上望京樓之句以渉怨望詔降秩俄復舊益少負詞藻長於歌詩與宗人賀齊名每作一篇樂工以賂求取被聲歌供奉天子征人早行詩天下皆施之圖畫今集有從軍詩五十首而無此詩惜其放逸多矣陳氏曰益宰相揆之族子舊史本傳指其少有癡疾防閑妻妾過於苛酷有散灰扃户之談聞於時故時謂之妬癡為李益疾按世傳霍小玉傳所謂李十郎詩開簾風動竹疑是故人來者即益也舊史所載如此豈小玉將死訣絶之言果驗耶抑好事者因其有此疾遂為此説以實之也孟東野詩集十卷鼂氏曰唐孟郊東野湖州人貞元十二年進士調溧陽尉辟為興元參謀卒郊少隠嵩山性介寡合韓愈一見為忘形交為詩有理致然思苦澁李觀論其詩曰髙處在古無上平處下顧二謝云張籍諡為貞曜先生集宋次道重編先時世傳汴吳鏤本五卷一百二十四篇周安惠本十卷三百三十一篇别本五卷三百四十篇蜀人寋濬用退之贈郊句纂咸池集二卷一百八十篇自餘不為編秩雜録之家家自異次道總拾遺逸摘去重復若體製不類者得五百十一篇四十聨句不與焉一贊二書附於後郊集於是始有完書潁濵蘇氏曰唐人工於為詩而陋於聞道孟郊嘗有詩曰食薺腸亦苦强歌聲無歡出門如有礙誰云天地寛郊耿介之士雖天地之大無以安其身起居飲食有慼慼之憂是以卒窮以死而李觀盛稱之至韓退之亦談不容口甚矣唐人之不聞道也孔子稱顔子在陋巷人不堪其憂囘也不改其樂與郊異矣朱倣詩一卷鼂氏曰唐朱倣字長通襄陽人隠居剡溪嗣曹王臯鎮江西辟節度參謀貞元初召為拾遺不就朱灣集一卷陳氏曰唐永平從事朱灣撰自號蒼洲其為從事李勉辟之也麴信陵集一卷鼂氏曰唐麴信陵貞元元年進士為舒州望江令以卒長孫佐輔集一卷陳氏曰唐長孫佐輔撰按百家詩選云德宗時人其弟公輔為吉州刺史往依焉當必有所據也其詩號古調集柳宗元詩一卷陳氏曰唐栁宗元撰子厚詩在唐與王摩詰韋應物相上下頗有陶謝風氣古律絶句總一百四十五篇在全集中不便於觀覽因抄出别行東坡曰蘇李之天成曹劉之自得陶謝之超然固已至矣而杜子美李太白以英偉絶世之資凌跨百代古之詩人盡廢然魏晉以來髙風絶塵亦少衰矣李杜之後詩人繼出雖有遠韻而才不逮意獨韋應物栁子厚發纖穠於簡古寄至味於淡泊非餘子所及也唐末司空圖崎嶇兵亂之間而得詩人髙雅獨有承平之遺風其論詩曰梅止於酸鹽止於鹹飲食不可無鹽梅而其美常在於鹹酸之外可以一唱而三嘆也子厚詩在陶淵明下韋蘇州上退之豪放竒險則過之而温麗清深不及也所貴於枯淡者謂外枯而中膏似淡而實美淵明子厚之流是也若中邊皆枯亦何足道佛言譬如食蜜中邊皆甜人食五味知其甘苦者皆是能分别其中邊者百無一也後村劉氏曰栁子厚才髙他文惟韓可對壘古律詩精妙韓不及也當舉世為元和體韓猶未免諧俗而子厚獨能為一家之言豈非豪傑之士乎昔何文縝嘗語李漢老云如子厚詩人豈可不學他做數百首漢老退而嘆曰得一二首似之足矣文縝後從北狩病中詩云歴歴通前刼依依返舊魂人生會有死遺恨滿乾坤雖意極忠憤而語不刻急亦學栁之驗張籍詩集五卷鼂氏曰唐張籍文昌和州人貞元十五年登進士第終國子司業籍性狷急為詩長於樂府多警句元和中與白樂天孟東野歌詞天下宗之謂之元和體一本纔三卷陳氏曰張洎所編錢公輔名木鐸集與他本相出入亦有他本所無者凡十二卷近世湯中季庸以諸本校定為張司業集八卷且考訂其為呉郡人魏峻叔髙刻之平江續又得木鐸集凡他本所無者皆附其末王建集十卷陳氏曰唐陜州司馬王建仲初撰建長於樂府與張籍相上下大歴十年進士歴官昭應縣丞太和中為陜州司馬尤長宫詞在集中第十卷録出别行漁隠叢話余閲王建宫詞選其佳者亦自少得只世所膾炙者數詞而已其間雜以他人之詞如閑吹玉殿昭華管醉折棃園縹蒂花十年一夢歸人世絳縷猶封繫臂紗銀燭秋光冷畫屏輕羅小扇撲流螢天階夜色凉如水卧看牽牛織女星並杜牧之也淚滿羅巾夢不成夜深前殿按歌聲紅顔未老恩先斷斜倚薫籠坐到明此白樂天也寶仗平明金殿開暫將紈扇共徘徊玉顔不及寒鴉色猶帯昭陽日影來此王昌齡也建詞凡百有四篇又逸詞九篇或云元微之亦有詞襍於其間余以元氏長慶集檢尋却無之或者之言誤矣舊䟦王建太和中為陜州司馬與韓愈張籍同時而籍相友善工為樂府歌行思遠格幽初為渭南尉與宦者王守澄有宗人之分因過飲相譏戲守澄深憾曰吾弟所作宫詞禁掖深邃何以知之將奏劾建因以詩解之曰先朝行坐鎮相隨今上春宫見長時脱下御衣偏得著進來龍馬每教騎嘗承密㫖還家少獨奏邊情出殿遲不是當家頻向説九重争遣外人知事遂寝宫詞凡百絶天下傳播傚此體者雖有數家而建為之祖也李長吉集四卷外集一卷鼂氏曰唐李賀長吉鄭王之孫七嵗能詞章韓愈皇甫湜聞之過其家使賦詩援筆輒就自目曰髙軒過二人大驚年二十七終協律郎賀詞尚竒詭為詩未始先立題所得皆警邁遠去筆墨畦逕當時無能傚者樂府十數篇雲韶工合之絃管云或説賀卒後不相悦者盡取其所著投圊中以故世傳者不多外集予得之梁子美家姚鉉頗選載文粹中宋景文諸公在館嘗評唐人詩云太白仙才長吉鬼才然長吉有鴈門太守詩曰黒雲壓城城欲摧甲光向日金鱗開王安石曰是兒言不相副也方黒雲如此安得向日之甲光也朱子語錄曰李賀詩巧然較怪不如太白自在後村劉氏曰樂府惟李賀最工張籍王建輩皆出其下然全集不過一小冊世傳賀中表有妬賀才名投其集溷中故傳於世者極少余竊意不然天地間尤物且不多得况佳句乎使賀集不遭厄必不能一一如今所傳本之精善疑賀手自銓擇者耳盧仝集一卷鼂氏曰唐盧仝范陽人隠少室山號玉川子徴諫議不起唐史稱韓愈為河南令愛其詩厚禮之嘗作月蝕詩以譏元和逆黨愈稱其工按其詩云元和庚寅蓋五年也憲宗遇弑在十五年後十歲也豈追托庚寅歲事為詩乎不然則史誣也後死於甘露之禍陳氏曰凡三卷其詩古怪而女兒曲小婦吟有所思諸篇輒嫵媚豔冶其第三卷號集外詩凡十首慶歴中有韓盈者為之序川本止前二卷劉义詩一卷鼂氏曰唐劉义少嘗任俠殺人後更折節讀書善歌詩客韓愈門作冰柱雪車二詩出盧仝李賀右歸齊魯不知所終今集二十餘篇不載二詩陳氏曰凡二卷义附見新史韓愈傳不知何處人其冰柱雪車二詩狂怪誠出盧仝右然豈風人之謂哉楊巨源詩一卷鼂氏曰唐楊巨源字景山河中人貞元五年第進士為張𢎞靖從事自秘書郎擢太常博士遷禮部員外郎出為鳯翔少尹復召除國子司業巨源在元和中詩韻不造新語體律務實用功頗深旦暮揺首微詠不輟年老成疾嘗贈𢎞靖詩叙其世家云伊陟無聞祖韋賢不到孫時人稱之年滿七十丐歸時宰惜其去以為其鄉少尹不絶其禄太和以官壽卒陳氏曰凡五卷按韓退之有送楊少尹序盖自司業為少尹稱其都少尹者乃其鄉里也藝文志乃云太和河中少尹誤第三卷末二十餘篇有目無詩武元衡臨淮集兩卷鼂氏曰唐武元衡伯蒼河南人建中四年進士元和二年以門下侍郎平章事出為劍南節度八年復秉政明年早朝遇盗害之元衡工五言詩好事者傳之被於管絃嘗夏夜作詩曰夜乆喧暫息池臺惟月明無因駐清景日出事還生翌日遇害舊有臨淮集七卷此其二也議者謂唐世工詩宦達者唯高適宦逹詩工者唯元衡陳氏曰初用莆田李氏本傳錄後以石林氏本校益六首及李吉甫唱酬六首川本作二卷張碧歌詩集一卷陳氏曰唐張碧太碧撰藝文志云貞元時人集中有覽貫休上人詩或勦入之也陳羽集一卷陳氏曰唐東宫衞佐陳羽撰貞元八年陸䞇下第二人羊士諤詩一卷鼂氏曰唐羊士諤貞元元年進士第順宗時為宣歙巡官王叔文所惡貶汀州寕化尉元和初李吉甫知奨擢監察御史掌制誥嘗出為資州刺史陳氏曰竇羣引士諤為御史共傾李吉甫鮑溶詩五卷鼂氏曰唐鮑溶字德源元和四年進士集中有别韓博士愈詩云不知無聲淚中感一顧厚蓋退之所嘗推激也張薦謂溶詩氣力宏贍博識清度雅正高古衆才無不備具曾子固亦愛其詩以史館本及歐公所藏互校得二百三十三篇今本有一百九十二篇餘逸南豐曾氏曰鮑溶詩集六卷史館書舊題云鮑防集五卷崇文總目叙别集亦然知制誥宋敏求為臣言此集詩見文粹唐詩類選者皆稱鮑溶作又防之雜感詩最顯而此集無之知此詩非防作也臣以文粹類選及防雜感詩考之敏求言皆是又得參知政事歐陽修所藏鮑溶集與此集同然後知為溶集決也史館書五卷總二百篇歐陽氏書無卷第纔百餘篇然其三十三篇史館書所無今别為一卷附於後而總題曰鮑溶詩集六卷蓋自先王之澤熄而詩亡晚周以來作者嗜文辭抒情思而已然亦往往有可采者溶詩尤清約謹嚴而違理者少亦近世之能言者也故既正其誤謬且著其大㫖以傳焉竇拾遺集一卷陳氏曰唐左拾遺扶風竇叔向撰包何為序羣庠牟鞏皆其子也賈長江集十卷鼂氏曰唐賈島浪仙詩共三百七十九首唐書稱島范陽人初為浮屠名無本後從韓愈遂去浮屠舉進士累舉進士不第文宗時坐飛謗謫長江主簿會昌初終普州司倉參軍今長江祠堂中有石刻大中九年墨制大中宣宗年號與傳不合摭言又載武宗時謫去尤差誤陳氏曰韓退之有送無本詩即其人也後返初舉進士不第文宗時坐飛謗貶長江㑹昌初以普州參軍卒本傳所載如此今遂寧刋本首載大中墨制云比者禮部奏卿風狂遂且飬疾關外今却携卷軸潛至京城遇朕微行聞卿諷詠觀其志業可謂屈人是用顯我特恩賜卿墨制宜從短簿别俟殊科與傳所稱飛謗不同蓋宣宗好微行小説載島應對忤㫖好事撰此制以實之安有微行而顯著訓詞者首稱奏卿風狂尤為好笑當以本傳亦據其墓誌也唐貴進士科故誌言責授長江如温飛卿亦謫方城尉當時謂鄉貢進士不博上州刺史則簿尉固宜謂之責授欲使今世進士得罪而責授簿尉則惟恐責之不早耳姚少監集十卷鼂氏曰唐姚合也崇曾孫以詩聞元和十一年李逢吉知舉進士歴武功主簿富平萬年尉寶應中監察殿中御史户部員外郎歴金杭二州刺史為刑戸二部郎中諫議大夫給事中陜虢觀察使開成末終祕書監世號姚武功云陳氏曰川本卷數同編次異莊南傑集一卷陳氏曰唐進士莊南傑撰與賈島同時李渉歌詩一卷鼂氏曰唐李渉渤之弟也早從陳許辟一再謫官夷陵太和中為太學博士自號清溪子渤三詩附殷堯藩集一卷陳氏曰唐侍御史殷堯藩撰元和九年進士章孝標集一卷陳氏曰唐祕書省正字章孝標撰元和十四年進士熊孺登集一卷陳氏曰唐西川從事熊孺登撰元和中人執易其從姪也施肩吾西山集五卷鼂氏曰唐施肩吾呉興人元和十五年進士以豫章之西山乃十二真仙羽化之所心慕之因卜隠焉且以名其所著自為之序雍裕之集一卷陳氏曰唐雍裕之撰未詳何時人雍陶詩五卷鼂氏曰唐雍陶國鈞太和八年進士大中六年自國子毛詩博士出刺簡州唐志集十卷今亡其半張南史集一卷陳氏曰唐試參軍范陽張南史撰唐史藝文志南史字季直幽州人以試參軍避亂於揚州再召之未赴而卒王涯集一卷陳氏曰唐宰相王涯廣津撰袁不約集一卷陳氏曰唐袁不約還朴撰長慶三年進士其年試麗龜賦李紳追昔游集三卷鼂氏曰唐李紳公垂也亳州人元和元年進士補國子助教穆宗召為翰林學士累進中書舍人武宗即位拜中書侍郎平章事紳為人短小精悍於詩最有名號短李與李徳裕元稹同時號三俊追昔遊者蓋賦詩紀其平生所遊歴謂起梁漢歸諫署升翰苑及播越荆楚踰嶺嶠上髙安移九江過鍾陵守滁陽轉壽春留洛陽廉會稽分務東周守蜀鎮梁也開成戊午八月自為之序陳氏曰皆平生歴官及遷謫所至述懷紀遊之作也余嘗書其後云讀此篇見其飾志矜能夸榮殉勢益知子陵元亮為千古髙人朱景元集一卷陳氏曰唐太子諭徳朱景元撰朱慶餘集一卷陳氏曰唐朱可乆慶餘撰以字行受知於張籍寶歴二年進士文獻通考卷二百四十二
