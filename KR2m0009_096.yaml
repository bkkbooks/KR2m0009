body:
  text: 文獻通考卷九十六鄱陽馬端臨貴與著宗廟考六祭祀時享薦新有虞氏四時之祭名春曰礿礿薄也春物未成其祭品鮮薄又云新菜可礿夏曰禘禘者次第也夏時物雖未成宜依時次第而祭之秋曰嘗新榖熟而嘗之冬曰蒸蒸進也冬物成進其品也其祭尚氣郊特牲云血腥爓祭用氣也尚謂貴而祭祀之時先薦用氣物也血謂祭初以血詔神於室腥謂朝踐薦腥肉於堂爓謂沈肉於湯次腥亦薦於堂以血腥爓三者而祭是用氣也以其並未熟故云用氣也法先迎牲殺之取血告於室以降其神然後用樂而行祭事其祭貴首夔曰戞擊鳴球搏拊琴瑟以詠祖考來格虞賓在位羣后德讓戞擊是作用之名非樂器故以戞擊為柷敔摶拊形如鼓以韋為之實之以粳擊之以節樂球玉磬以合堂上之樂此舜廟內堂上之樂以下云下管故知此在堂上也所謂虞賔丹朱王者後以故稱賔下管鼗鼓合止柷敔堂上下樂各有柷敔上言戞擊以作用言此以器言互相備笙鏞以間鳥獸蹌蹌吹笙擊鐘相間而作鳥獸化德相率而舞簫韶九成鳯凰來儀韶舜樂名言簫見細器之備成猶終也每曲一終必變更奏故經言九成傳言九奏周禮謂之九變其實一也備樂九終而致靈鳥夏氏時祭之名因有虞其祭貴心用昏殷禴禘蒸嘗亦因虞夏之制王制云春禴夏禘秋嘗冬蒸鄭元云此夏殷之法其祭尚聲郊特牲云殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也疏曰殷人尚聲者先奏樂也臭味未成謂未殺牲也滌蕩猶搖動也既尚聲故未殺牲而先搖動樂聲以求神也樂三闋然後出迎牲者闋止也奏樂三遍止乃迎牲入殺之聲音之號所以詔告於天地之間也者解以先奏樂之義言天地之間虛豁亦陽也言鬼神在天地之間聲是陽故用樂之音聲號呼告於天地之間庶神明聞之而來是先求陽之義也其祭貴肝用日出傳樂以迎來哀以送往故禘有樂而嘗無樂迎來而樂樂親之將來也送去而哀哀其享否不可知也小言之則為一祭之間孝子不知鬼神之期推而廣之放其去來於隂陽小放方往反祭疏曰一祭比於一年其事為小故云言之為一之間既不知鬼神之來去期節故祭初似若來故樂祭末似去故哀據孝子之心雖春有樂及鐘鼓送尸孝子之心祭末猶哀也云推而廣之放其去來於隂陽者解經云故禘有樂而嘗無樂二句也言推此一祭而廣論一年放神之去來似隂陽二氣但陽主生長春夏陽來似神來故春夏祭有樂秋冬隂象神去故秋冬祭無樂然周禮四時之祭皆有樂殷則蒸嘗祭亦有樂故那詩云庸鼓有斁萬舞有奕下去顧豫蒸嘗則殷秋冬亦有樂者熊氏云殷秋冬但有管絃之樂又云蒸嘗全無樂故其義已具郊特牲凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰蒸謂夏殷時禮也礿禘陽義也嘗蒸隂義也禘者陽之盛也嘗者隂之盛也故曰莫重於禘嘗疏曰禘祭在夏夏為炎暑故為陽盛嘗祭在秋之時隂功成就故為隂盛古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順隂義也疏曰爵命是生飬之事故屬陽國地是土地之事故屬隂也故記曰嘗之日發公室示賞也草艾則墨未發秋政則民弗敢草也艾音刈故疏曰以記録之前先有此記之文作記者載此前記之文所以言記曰也此記云嘗祭之日發出公室貨財以示賞也草刈則墨者謂初秋草堪艾給炊㸑之時則行小刑之墨人君未發行秋政則民不敢艾草也陳氏禮書曰商禮春曰礿夏曰禘而五年之禘為大禘詩頌長發大禘是也周禮春曰祠夏曰礿而五帝之禘不稱大焉詩頌雍禘太祖是也周祭春曰祠祠之言食夏祭曰礿新菜可汋秋祭曰嘗冬祭曰蒸以禘為殷祭之名其祭尚臭郊特牲曰周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽達於墻屋故既奠然後焫蕭合羶薌焫如悅反羶音馨薌音香逆灌謂以圭瓚酌鬯始獻神也已乃牲於庭殺之天子諸侯之禮也奠謂薦熟時也特牲饋食所云祝酌奠於鉶南是也蕭薌蒿也染以脂合黍稷燒之詩云取蕭祭脂謂疏曰周人尚臭者周禮變於殷故先求隂尚臭也臭鬯氣也未殺牲先酌鬯酒灌地以求神是尚臭也鬱鬱金草也鬯謂鬯酒煮鬱金草和之其氣芬芳調鬯故云鬱合鬯也用鬱鬯灌地是用臭氣求隂達於淵泉也灌以圭璋用玉氣也者王肅云以圭璋為瓚之柄也瓚所以㪺鬯也玉氣潔潤灌用玉瓚亦求神之宜也玉氣亦是尚臭也既灌然後迎牲者先求神後迎牲也先灌是先求隂也蕭合黍稷者周人後求陽也取蕭草及牲脂膋合黍稷燒之也此謂饋食時也臭陽逹於墻屋者謂以蕭合黍稷之臭氣求陽達于墻屋也其祭貴肺用朝及暗傳凡祭慎諸此魂氣歸於天形魄歸於地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂陳氏禮書曰祭義曰夏后氏祭其暗商人祭其陽周人祭日以朝及暗檀弓曰夏后氏大事用昏商人大事用日中周人大事用日出然則春秋書之大事於太廟傳稱國之大事在祀與戎則祭亦大事也夏尚黑用昏故祭其暗商尚白用日中故祭其陽周尚赤用日出故祭以朝及暗鄭氏謂陽讀為曰雨曰㿩之㿩以朝及暗謂終日有事蓋三代正朔之所尚正則夏以建寅商以建丑周以建子朔則夏以平旦商以雞鳴周以夜半是皆夏據其末商周探其夲則祭之早晏亦若此也少牢大夫之祭宗人請期曰旦明行事子路祭於季氏質明而始行事晏朝而退孔子取之此周禮也然禮與其失於晏也寧早則周雖未明之時祭之可也故曰以朝及暗周官雞人凡國事為期則告之時宗伯祭之日告時於王蓋雞人告於宗伯宗伯告於王然後行事朱子曰儀禮所存惟少牢饋食特牲饋食禮是大夫士禮兼又只是有饋食若天子祭便合有初間祭腥等事如所謂建設朝事燔燎羶薌若附儀禮此等皆無入頭處意欲將周禮中天子祭禮逐項作一總腦却以禮記附如疏中有説天子處皆編出因云某已衰老其間合要理會文字皆起得箇頭在及見其成不見其成皆未可知萬一不及見此書之成諸公千萬勉力整理得成此書所係甚大大宗伯之職以吉禮事邦國之鬼神示以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王示音祇肆他歷反祼古亂反禴餘若反宗廟之祭有此六享肆獻祼饋食在四時之上則是祫也禘也肆者進所解牲體謂薦熟時也獻獻禮謂薦血腥也祼之言灌灌以鬱鬯謂始獻尸求神時也郊特牲曰魂氣歸於天形魄歸於地故祭所以求諸隂陽之義也殷人先求諸陽周人先求諸隂灌是也祭必先灌而後薦腥薦熟于祫逆言之者與下共文明六享俱然祫言肆獻祼禘言饋食者著有黍稷互相備也下疏曰云祭必先灌乃後薦腥薦熟於祫逆言之者與共文明六享俱然者如向所説先灌訖王始迎牲次腥其俎腥其俎訖乃爓爓祭訖始迎尸入室乃有黍稷是其順也今此經先言肆肆是饋獻節次言獻獻是朝踐節後言灌灌是最在先之事是於祫逆言之也言與下共文明六享俱然者既從下向上為文即是於下五享與上祫祭皆有灌獻肆三事矣故云六享俱然黃氏曰先儒以肆為肆解牲體獻為獻醴肆獻祼謂灌而後薦腥薦熟差次薦獻之節固如此然典瑞祼圭有瓚以肆先王司尊彜鬱齊獻酌則肆獻皆用祼而為名也若以為祼而後肆獻故以為名則義猶得通然小宗伯王崩大肆以秬鬯渳太祝大喪始崩以肆鬯渳尸不可亦為肆解牲體矣是則肆獻専為祼但不知其義為何如也先儒又以肆獻饋食為禘祫宗廟四時之祭其外有禘祫禘追逺祫合食宜為廟祭之首然天子之禮亡今諸儒所言祭祀之節皆雜出經傳意類推次難遽信也宗廟之祭皆有牲體皆有黍稷而獨以肆獻為祫饋食為禘不知其義何以為據楊氏曰愚按典瑞祼圭以肆先王司尊鬱齊獻酌則肆獻祼即祼也祭以祼為重祼所以降神祭統云獻之屬莫重於祼是也祭以饋熟為正正祭之時祝官以祝辭告於主郊特牲云直祭祝於主是也凡四時之祭皆然舉其要故在四時之上仲春之月天子乃鮮羔開氷先薦寢廟鮮當作獻獻羔謂祭司寒也祭司寒而出氷先薦於宗廟乃後賦之孟夏之月農乃登麥天子乃以彘嘗麥先薦寢廟登進也麥新氣尤盛以彘食之散其熱也彘水畜也仲夏之月農乃登黍天子乃以雛嘗黍羞以含桃先薦寢廟此嘗雛也而云以嘗黍不以牲主榖也必以黍者黍火榖氣之主也雛雞也疏云如鄭此言黍非新成直取舊黍與雛同薦之故下孟秋云農乃登黍注云黍稷於是始熟明仲夏未熟蔡氏以為此時黍新熟今蟬鳴黍是也非鄭義也按月令諸月無薦果之文此獨羞含桃者以此果先成異於餘物故特記之其實諸果亦時薦孟秋之月農乃登榖天子嘗新先薦寢廟仲秋以犬嘗麻先薦寢廟季秋以犬嘗稻先薦寢廟季冬命漁師始漁天子親往乃嘗魚先薦寢廟長樂陳氏曰先儒謂廟藏神主而祭以四時寢藏衣冠几杖之具而祭之以新物然國語曰大寒取名魚登水禽嘗寢廟月令四時新物皆先薦寢廟蓋有寢者薦於寢無寢者薦於廟非謂薦止於寢也嚴陵方氏曰既曰寢又曰廟何也蓋王者之於祖禰以人道事之則有寢以神道事之則有廟天子七廟而周官𨽻僕止掌五寢者以二祧將毁先除其寢事有漸故也祭神道也薦人道也傳始殺而嘗建酉之月隂氣始殺嘉榖始熟故薦嘗於宗廟閉蟄而蒸建亥之月昆蟲閉户萬物皆成可薦者衆故蒸祭宗廟春秋桓公五年左氏傳中夏教茇舍遂以苖田如搜之法獻禽以享礿中音仲下同茇蒲末反茇舍草止之也夏田為苖擇取不孕任者象礿宗廟之夏祭也冬夏田主於祭宗廟隂陽始起神之在內疏曰以草釋茇以止釋舍軍有草止之法云冬夏田主於祭宗廟隂陽始起象神之在內者仲冬一陽生仲夏一隂生是隂陽在內故神象之而行祭也此祭因田獵獻禽為祭若正祭自在孟月中冬教大閲遂以狩田入獻禽以享蒸冬田曰狩言守取之無所擇也入以禽祭宗廟大夏官司馬易既濟九五東鄰殺牛不如西鄰之禴祭牛祭之盛者也禴祭之薄者也居既濟之時而處尊位物皆濟矣將何為焉其所務者祭祀祭祀之盛莫盛修德故沼沚之毛蘋蘩之菜可羞於鬼神故黍稷非馨明德惟馨是以東鄰殺牛不如西鄰之禴祭實受其福也桓十四年秋八月壬申御廪災乙亥嘗御廪藏公所親耕以奉粢盛之倉也天火曰災既戒日致齊御廪雖災苟不害嘉榖則祭不應廢故書以示法仲尼嘗奉薦而進其親也慤其行也趨趨以數趨音促數色角反進嘗秋祭也親謂身親執事數速也尸疏曰奉薦而其親也慤謂質慤謂仲尼奉薦進之時其身執事其行貌慤質少威儀其行步促促速疾少威儀舉足而數也詳見宗廟祭祀總義戊辰王在新邑蒸祭嵗文王騂牛一武王騂牛一洛誥桓公八年正月己卯蒸榖梁子曰蒸冬事也春興之志不時也夏五月丁丑蒸蒸冬事也春夏興之黷祀也志不敬也公羊子曰春曰祠夏曰礿秋曰嘗冬曰蒸常事不書此何以書譏亟也亟數也亟則黷黷則不敬君子之祭也敬而不黷疏則怠怠則忘士不及兹四者則冬不裘夏不葛裘葛者禦寒暑之服士則公事不得及此四時祭者則不敢美其衣服蓋思念親之至也襄公十五年冬十有一月晉侯周卒十六年正月葬晉悼公平公即位蒸於曲沃平公悼公子彪曲沃晉祖廟蒸冬祭也諸侯五月而葬既葬作主然後蒸嘗於廟今晉踰月葬作主而蒸祭傳言晉將有溴梁之會故速葬陳氏禮書曰君子以義處禮則祭不至於數煩以仁處禮則祭不至於疏怠悽愴發於霜露之既降怵惕生於雨露之既濡此所以有四時之享也然四時之享皆前期十日而齋戒前祭一日而省視祭之日禮交動乎上樂交應乎下自再祼以至九獻其禮非一舉自致神以至送尸其樂非一次以一日而歷七廟則日固不足而強有力者亦莫善其事矣若日享一廟前祭視牲後祭又繹則彌月之間亦莫既其事矣考之經傳蓋天子之禮春則犆祭夏秋冬則合享犆祭各於其廟合享同於太廟王制曰天子犆礿祫禘祫嘗祫蒸諸侯礿犆禘一犆一祫是天子春犆而三時皆祫諸侯亦春犆而冬皆祫其異於天子者禘一犆一祫而已禘一犆一祫而嘗蒸皆祫是始年再祫次年三祫也天子言犆礿諸侯言礿犆天子言祫禘祫嘗祫蒸諸侯言嘗祫蒸祫此特變文而已非有異也鄭氏曰天子先祫而後時祭諸侯先時祭而後祫凡祫之嵗春一礿而已孔頴逹云皇氏謂虞夏祫祭每年為之又云三時祫者夏秋冬或一祫焉按禘祫志云祫於秋於冬於夏則夏商三時俱殷祭皇氏之説非也其言皆無所據楚茨之詩始言以往蒸嘗終言神具醉止儀禮大夫三廟筮止丁亥之一日而言薦嵗事於皇祖禮記云嘗禘之禮所以仁昭穆則會羣神於蒸嘗而具醉者祫也合三廟於一日而薦於皇祖者亦祫也嘗禘所以仁昭穆亦祫也祫有三年之祫有時祭之祫時祭小祫也士虞禮曰薦此祫事則時祭謂之祫宜矣三年之祫大祫也時祭有小禮有大禮小禮春也大禮夏秋冬也公羊傳曰大事者何大祫也則明時祭之祫為小祫矣禮記曰大嘗周禮曰大蒸則春祀為小禮矣蓋小祫止於未毁廟之主大祫已及於毁廟之主禮記曰周旅酬六尸又曰祫於太廟祝迎四廟之主夫天子旅酬止於六尸諸侯迎主止於四廟非小祫而何又曰周禮大宗伯以肆獻祼饋食享先王以春祠夏禴秋嘗冬蒸享先王祭法王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止諸侯五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止然則周禮有時祭無月祭祭法有月祭無時祭周語祭公謀父曰甸服者祭侯服者祀賔服者享要服者貢日祭月祀時享嵗貢楚語觀射父曰先王日祭月享時類嵗祀諸侯舍日卿大夫舍月士庶人舍時韋元成韋昭之徒則曰天子日祭於祖考月祭於曽髙時享於二祧嵗貢於壇墠此與漢法日祭於寢月祭於廟時祭於便殿其事相類而甸侯賔要荒五服之制與禹貢相合蓋夏啇之禮如此故左邱明荀卿司馬遷皆得以傳之也周禮小宗伯凡天地之大災類社稷宗廟為位則類於宗廟者無常時與所謂王時類者異矣王制庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈則薦於四時者有常物與所謂庶人舍時者異矣然則玉藻言天子聽朔於南門之外諸侯聼朔於太廟春秋文公六年書閏月不告朔猶朝於廟論語曰子貢欲去告朔之餼羊鄭氏釋玉藻謂天子聽朔於明堂以特牲告其帝神配以文王武王釋論語謂人君每月告朔有祭謂之朝享然周禮朝享非謂告朔而聼朔於明堂以特牲告其帝及神配以文王武王無所經見要之告朔於廟餼以特牲謂之月祭此先王之禮也魯文公不行告朔之禮但身至廟拜謁而已故春秋譏之榖梁言天子告朔於諸侯諸侯受於禰廟禮也又曰閏月不以告朔然受朔於禰則異於玉藻閏月不告朔則異於左氏左氏曰閏以正時時以作事事以厚生生民之道於是乎在不告朔棄時政也祭法諸侯月祭不及祖考其説與榖梁同不知何據然邪右四時祭義國語楚語曰古者先王日祭月享時類嵗祀日祭於祖考月祭於髙曽時類及二祧嵗祀於壇墠也卿大夫舍月有時祭也周語穆王將征犬戎犬戎西戎之别名征荒服祭公謀父諫曰先王之制邦內甸服邦外侯服侯衛賔服蠻夷要服戎翟荒服甸服者祭供日祭也此采地之君其見無數侯服者祀供月祀也堯舜及周侯服皆嵗見賔服者享供時享也享獻也周禮甸圻二嵗而見男圻三嵗而見衛圻五嵗而見其見也必以所貢助祭於廟孝經所謂四海之內各以其職來祭要服者貢供嵗貢也要服六嵗一見荒服者王王王事天子也周禮九州之外謂之蕃國世一見各以其所貴寶為贄詩曰自彼氐羌莫敢不來王日祭祭於祖考謂上食也月祀月祀於髙曽時享時享於二祧嵗貢嵗貢於壇墠終王終謂世終也惟嗣王及即位而來見先王之訓也序成而有不至則修刑序成謂上五者次序也今自大畢伯仕之終也大畢伯仕犬戎氏之二君終卒也犬戎時以其職來王天子曰豫必以不享征之且觀之兵其無乃非先王之訓乎朱子曰左氏云特祀於寢而國語有日祭之文韋昭曰謂日上食於祖禰漢事亦然是主復寢猶日上食矣又曰國語日祭月祀時享既與周禮祀天神地祗享人鬼之名不合韋昭又謂日上食於祖禰月祀於髙曽時享於二祧亦但於祭法略有表裏而不見於他經又主既復寢則其几筵未知當俟臨祭而後設邪或常設而不除也右日月時嵗之祭前期十日小宗伯掌四時祭祀之序事與其禮序事謂卜日省牲視滌濯饔㸑之事次序之時春官太宰祀五帝則掌百官之誓戒與其具修前期十日帥執事而卜日遂戒享先王亦如之自太宰而下及齋冠服等並見祀昊天上帝禮前期十日之條內小宗伯毛六牲頒於五官使共奉之毛擇毛也鄭司農云司徒主牛宗伯主雞司馬主馬及羊司冦主犬司空主豕報疏曰皆有毛色若宗廟用騂之等謂毛戚如字劉莫反王制宗廟之牛角握注曰握長不出膚注國語楚語蒸嘗不過把握曰把握角長不出把辨六齍使六宫之人共奉之齍讀為粢謂六榖黍稷稻梁麥苽苽音孤辨六彜以待果將雞鳥斚黃虎蜼疏曰將送也謂以圭瓉酌之送與尸果讀為祼斚音假又音嫁蜼音誄辨六尊以待祭祀獻象壺著大山春官籩人共其籩薦羞之實醢人共薦羞之豆實醢呼在反獻詳見下文朝踐饋再獻條醯人共五齊七菹凡醯醬之物齊子兮反天官鹽人共苦鹽散鹽苦音盬工户反散悉但反杜子春讀苦為盬謂出鹽直用不湅治鄭司農云散鹽湅治者元謂散鹽鬻水為鹽湅音練鬻音煮盬音古甸師共齍盛共蕭茅見祭物世婦掌女宫之宿戒女宫刑女給宫中事者宿戒當給事豫告之齊戒也宿疏曰此亦祭前十日戒之使齊祭前三日又之帥六宫之人共齍盛帥世婦世御濯春官齍天官世婦掌祭祀之事帥女宫溉為盛注曰溉拭也為猶差擇疏曰祭祀黍稷舂人舂之􅐪人炊之皆不使世婦故此為非舂非炊是差擇可知也溉古愛反寺人若冇祭祀之事則帥女宫而致於有司佐世婦治禮事注曰有司謂宫卿世婦佐世婦二十七世婦女御凡祭祀贊世婦注曰助其帥涖女宫內小臣若有祭祀則擯詔后之禮事相九嬪之禮事正內人之禮事疏曰祭祀后有事九嬪以下從后往小臣則與后為擯贊也云詔后之禮事相九嬪之禮事正內人之禮事者詔相正皆是上擯但據尊卑不同故以詔相别之后尊云詔詔告而已九嬪稍卑則言相相佐助也女御卑直正之而已天官亨人掌共鼎鑊以給水火之齊齊才細反熟鑊所以煮肉及魚臘之器既乃脀於鼎疏曰云齊多少之量者謂實水於鑊及㸑之以火皆有多少之齊也𨽻僕掃除糞灑掃素報反灑所賣反制注疏見宗廟度傳及時將祭君子乃齊齊之為言齊也齊不齊以致齊者也及其將齊也防其邪物訖其嗜欲耳不聼樂故記曰齊者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮訖猶止也乃齊側皆反下齊也齊不齊齊之皆如字嗜市志反邪似嗟反訖居乙反所疏曰方將接神先宜齊整身心故齊也齊者齊也以正此不齊之事謂未齊之時心慮散蕩心所嗜欲有不齊正及其齊也正此不齊之事以致極齊戒之道是故君子之齊也専致其精明之德也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也然後可以交於神明也定者定其志意是故先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日宫宰守宫官也宿讀為肅肅猶戒也戒猶肅重也君致齊於外夫人致齊於內然後會於太廟祭統致齊於內散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者所樂音嶽又五孝反思疏曰思其居處以下五事謂孝子念親存之五事也先思其粗漸思其精故居處在前樂嗜居後齊三日乃見其所為齊者謂致齊精意純熟目想之若見其所為齊之親也笑祭義孝程子曰凡祭必齊齊之日思其居處思其語此子平日思親之心非齊也齊不容有思有思則非齊齊三日見其所為齊者此非聖人語齊者湛然純一方能與鬼神接能事鬼神此是上一等人祭之前日太宰及執事視滌濯疏及大宗伯以下並見祀昊天上帝禮祭之前日條大宗伯涖鬯鬯鬱鬯小宗伯省牲察其不如法牲地官充人展則告牲注曰展牲若今夕牲也特牲宗人視牲告充司烜氏以夫燧取明火於日以鑒取明水於月以共祭祀之明齍明燭共明水烜音燬夫方符反司農音符齍音資注作粢音同月夫遂陽遂也鑒鏡屬取水者世謂之方諸取日之火之水欲得隂陽之潔氣也明燭以照饌陳明水以為元酒鄭司農云夫發聲明齍謂以明水修滌粢盛黍稷疏曰云陽遂也者日者太陽之精取火於日故名陽遂秋官世婦及祭祀比其具比鄭毗志反司農匹氏反為比次也具所濯溉及粢盛之㸑鄭司農讀庀庀具也春官掌次張其旅幕尸次見祭物司几筵設莞筵紛純加繅席畫純加次席黼純左右玉几祀先王昨席亦如之諸侯祭祀席蒲筵繢純加莞席紛純右雕几昨席莞筵紛純加繅席畫純凡吉事變几斧謂之黼其繡白黑采以絳帛為質依其制如屏風然於依前為王設席左右有几優至尊也紛讀如粉謂白繡也純緣也繅讀如藻次席虎皮為席元謂紛如綬有文而狹者繅席削蒲蒻展之編以五采若今合歡畫謂雲氣也次席桃枝席有次列成文昨讀曰酢謂祭祀及王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王於是席王於户內后諸臣致爵乃設席亦如上三種席吉事王祭宗廟祼於室饋食於堂繹於祊每事易几神事文示新之凶事仍几凡奠几朝夕相因喪禮略疏曰凡敷席之法初在地一重即謂之筵重在上者即謂之席云次席桃枝席有次列成文者鄭以漢時以桃枝竹為席次第行列有成其文章故以言之也鋪筵設同几為依神也鋪普胡反疏曰設之曰筵坐之曰席言人生事體異故夫婦别几死則魂氣同歸於此故夫婦同几也典庸器帥其屬而設簴陳庸器注疏見祭物樂條大司樂以六律六同五聲八音六舞大合樂以致鬼神示乃分樂而序之以祭以享以祀乃奏夷則歌小吕舞大濩以享先妣濩或故反嫄夷則陽聲第五小吕為之合小吕一名中吕先妣薑也周立廟自后稷為始祖薑嫄無所配是以特立廟而祭之謂之閟宫閟神之乃奏無射歌夾鍾舞大武以享先祖射音亦夾古洽反鍾無射陽聲之下也夾鍾為之合夾鍾一名圜先祖謂先王先公詳見祭物凡樂事大祭祀宿縣遂以聲展之縣咅元否疏曰謂展省聼之知其完善惡也詳見祭物王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏三夏皆樂章名訖疏曰王出入謂王將祭祀初入廟門及祭出廟門皆令奏王夏也尸出入謂尸初入廟門及祭祀訖出廟門皆令奏肆夏牲出入者謂二灌後王出迎牲及爓肉與體具犬豕是牲出入皆令奏昭夏先言王次言尸後言牲此亦祭祀之次也鼓人以路鼓鼓鬼享享許丈反四路鼓四面鼓王疏曰按大宗伯宗廟有六享禘祫及時皆言享先則皆是大祭統有享先公為次祀祭殤為小祀皆用此路鼓以天地神祗大小同鼓故也地官及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸樂音洛統君為東上近主位也皇君也言君尸者尊之時祭通典云乃奏無射歌夾鍾舞大武以享先祖堂下之樂亦作若特祭后稷廟樂同降神樂章則歌思文特祭文王廟歌清廟特祭武王廟歌執競樂同先王先公若特祭薑嫄廟則奏夷則歌小呂舞大濩以享先妣思文等詩並見祫祭禮楊氏曰大司樂凡樂黃鍾為宫九變則人鬼可得而禮宜入四時祭祀但宗廟之禮莫重於祫祭大司樂疏亦云於宗廟中奏之謂大祫也故見於祫祭篇祭之日雞人大祭祀夜呼旦以嘂百官呼火吳反嘂古弔反春官巾車鳴鈴以應雞人同上閽人大祭祀之事設門燎蹕宫門廟門燎地燭也蹕止行者廟在中門之外疏曰燭在地曰燎謂若天子百公五十侯伯子男皆三十所作之狀蓋百根葦皆以布纒之以蜜塗其上若今蠟燭矣天官宫正凡邦之事蹕宫中廟中則執燭注曰國有事王當出則宫正主禁絶行者若今時衛士填街蹕也事祭事也邦之祭社稷七祀於宫中祭先公先王於廟中𨽻僕掌蹕止行者宫正則執燭以為眀疏曰宫中者小宗伯云左宗廟右社稷在宫中中門之外也注填音田街音佳有內豎若有祭祀之事則為內人蹕曰內人從世婦事於廟者內豎為六宫蹕者以其掌內小事疏曰祭祀在廟謂禘祫四時之祭祀為于偽反酒正共五齊三酒以實八尊時祭用二齊三酒説見前圖酒正注疏見祭物羃人以畫布巾羃六彛羃莫歷反與宗廟可以文畫者其畫雲氣與音餘又疏布巾羃八尊疏曰宗廟八尊亦用畫布互舉以明義也天官世婦及祭之日涖陳女宫之具凡內羞之物涖臨也少疏曰內羞之物者謂糗餌粉餈按牢從房中而來故名為內羞肆師祭之日表齍盛告潔展器陳告備疏曰當祭之日具其黍稷等盛於簠簋陳於廟堂東皆為徽識小旌書其黍稷之名以表之又告潔淨於堂東陳器實之既訖則又展省視之而告備具春官大史祭之日執書以次位常大音泰謂校呼之教其所當居之處位同上授文王世子公族其在宗廟之中則如外朝之宗人事以爵以官注曰宗人掌禮及宗廟也以爵貴賤異位也以官官各有掌也若司徒奉牛司馬奉羊司空奉豕與疏曰此論同姓公族在宗廟之禮故云其在宗廟之中則立位所在如外朝之位也宗人授事以爵以官者宗人掌禮之官及宗廟授百官之事以爵者隨爵之尊卑貴者在前賤者在後又以官之職掌各供其事按周禮司徒奉牛牲司馬奉羊牲其司空奉豕無文此云知奉豕者五行傳云豕屬水司空冬官其位當水故鄭注周禮司空奉豕與典路若有大祭祀則出路贊駕説説書鋭反舍車也出路王當乘之贊駕説贊僕與趣馬也天春官騎大馭司常節服氏等並見祀禮車條司服享先王則袞冕享先公則鷩冕鷩必滅反蟲袞卷龍衣也鷩畫以雉謂華也見於春官君純冕立於阼夫人副褘立於東房純側其反褘音輝疏曰君純冕立於阼者純亦緇也冕皆上元下纁其服並然故通云緇冕副及褘后之上服尸既入之後轉就西房故禮器云夫人在房雖不云東西房下云夫人東酌罍尊則知夫人在房謂西房也祭統太祝逆尸令鐘鼓來瞽令臯舞來臯者皆謂呼之入入疏曰瞽人擬升堂歌呼之乃舞謂學子舞人令呼亦來入故鄭云來臯皆謂呼之也相尸禮延其出入詔其坐作春官天府祖廟之中沃盥執燭盥音管臣疏曰小祝云大祭祀沃尸盥小大祭祀沃王盥此二官所沃盥在祖廟中則天府為之執燭春官太宰贊玉几玉几所以依神天子左右玉几與疏曰享先王之几亦王平生同天官九獻祼春祠夏禴祼用雞彜鳥彜秋嘗冬蒸祼用斚彜黃彜祼謂以圭瓚酌鬱鬯始獻尸也后於是以璋瓚酌亞祼雞彜鳥彜謂刻畫為雞及鳯凰之形斚讀如稼稼畫禾稼也所謂黃彜者乃黃目尊也爾雅曰彜卣罍器也典瑞祼圭有瓚以肆先王以祼賔客祼古亂反瓚才旱反肆如字又他歷反謂鄭司農云於圭頭為器可以挹鬯祼祭之瓚故詩云瑟彼玉瓚黃流在中國語謂之鬯圭以肆先王灌先王祭也元謂肆解牲體以祭因以為名爵行曰祼漢禮瓚槃大五升口徑八寸下有槃口徑一尺玉疏曰言祼言祭則祼據賔客祭據宗廟也詩曰瑟彼瓚黃流在中者彼詩是美王季為西伯受殷王圭瓚之賜云國語謂之鬯圭者按國語云臧文仲以鬯圭與磬如齊告糴是也云爵行亦曰祼者皆據祭而言至於生人飲酒亦曰祼故投壺禮云奉觴賜灌是生人飲酒爵行亦曰灌也以詳見祭器祼春官灌冬官玉人祼圭尺有二寸有瓚祀廟注曰之言也或作淉或作果謂始獻酌奠也瓚如盤其柄用圭有流前注疏曰始獻酌奠也者小宰注云祼亦謂祭之啐之奠之以其尸不飲故云奠之按司尊彜注祼謂始獻尸郊特牲注云始獻神也者以其祼入獻於尸故云獻尸二灌主為降神故云獻神三注雖曰不同其義一也詳見祭器鬱人掌祼器祼器謂彜及舟與瓚疏曰司尊彜云春祠夏禴祼用雞彜鳥彜皆有舟故知彜有舟也禮記王制云諸侯賜圭瓚然後為鬯故知祼器中有瓚瓚則兼圭瓚璋瓚也凡祭祀之祼事和鬱鬯以實彜而陳之疏曰云和鬱鬯者謂和鬯人所造秬黍之鬯酒也為宗廟用鬱者則肆師築鬱金草煮之以和鬯酒更和以盎齊泲之以實彜陳於廟中祭之處也凡祼玉濯之陳之以贊祼事祼玉謂圭瓚璋瓚詔祼將之儀與其節疏曰云祼將之儀者即是奉玉送祼之威儀云節者即早晚時節故兩言之云奉玉謂王與后祼時奉瓚而酌鬱鬯云送祼者謂送之以授尸尸得祭之嚌之奠之不飲者凡祼事沃盥疏曰凡言非一若賔客則大宗伯祼若祭祀王及后祼皆鬱人沃以水盥手及洗瓚也為春官疏肆師及果築鬻注曰鄭司農云築香草煮以鬯也曰按禮記雜記築鬱臼以椈杵以梧而築鬱金煮以和秬鬯之酒以泲之而祼矣但鬱人自掌鬱此肆師察其不如儀者也果古亂反鬻音煮小宰凡祭祀贊祼將之事將送也祼送送祼謂贊王酌鬱鬯以獻尸為之祼祼之言灌也明不為飲主以祭祀唯人道宗廟有祼天地大神至尊不祼莫稱焉凡鬱鬯受祭之啐之奠之天官春官小宗伯凡祭祀以時將瓚果注曰將送也猶奉也祭祀以時奉而授王也天子圭瓚諸侯璋瓚疏曰小宰云贊王祼將之事此小宗伯又奉而授王者此據授王彼小宰據贊王授尸天官內宰大祭祀后祼則贊注曰謂祭宗廟王既祼而出迎牲后乃從後祼也疏曰祼時以璋授后故云贊也君執圭瓉祼尸大宗執璋瓚亞祼大宗亞祼容夫人有故攝焉曰祭統明堂灌用玉瓚大圭注瓚形如槃容五升疏曰以玉飾瓚故曰玉瓚以大圭為瓚柄故曰大圭傳獻之屬莫重於祼祭統王入太室祼洛誥見告祭門有虞氏之祭也尚用氣云云殷人尚聲云云周人尚臭云云詳見前三代祭條下楊氏曰愚按司尊彜疏曰王以圭瓚酌雞彜鬱鬯始獻尸尸以灌地降神小宰注曰凡鬱鬯尸受祭之啐之奠之此為祼神之一獻也后以璋瓚酌鬱鬯亞祼內宰大祭祀后祼獻則贊注云王既祼而出迎牲后乃從後祼也皆祭啐奠同上此為祼神之二獻朝踐周禮司尊彜謂之朝踐籩人醢人謂之朝事既灌然後迎牲郊特牲坐尸於堂謂朝事時也朝事延尸於户西南面布主席東面郊特牲外宗佐王后薦玉豆視豆籩視音視籩疏曰凡王之豆籩皆玉飾之餘云豆不云玉文略云薦豆不云籩者以豆云玉略籩云視豆籩者謂在堂東未設之時視其實也春官世婦詔王后之禮事相外內宗之禮事注曰詔禮事薦徹之節外內宗同姓異姓之女有爵佐后者天官九嬪贊后薦徹豆籩內宰正后之服位而詔其禮樂之儀贊九嬪之禮事注曰薦徹之禮當與樂相應位謂房中户內及阼所立處贊九嬪助九嬪贊后之事也疏曰服謂若內司服褘衣以下六服皆正之天子之禮薦時歌清廟及徹歌雍是薦徹皆有樂但內宰所詔唯詔禮經兼云樂者禮樂相應也又曰內宰助九嬪九嬪贊后籩人朝事之籩其實麷蕡白黑形鹽膴鮑魚鱐麷芳弓反蕡符文反鱐所求反疏曰此言朝事謂祭宗廟二灌之後祝延尸於户外后薦此八籩麷為熬麥蕡為麻子白為熬稻米黑為熬黍米形鹽鹽似虎形膴以魚肉為大臠鮑以魚於􅟺室糗乾之鱐為乾魚􅟺皮逼反詳見祭物篇醢人朝事之豆其實韭菹醓醢昌夲麋臡菁菹鹿臡茆菹麇臡韭音久菹莊魚反臡乃兮反菁作寧反又音精茆音卯麇京倫反三臡亦醢也有骨為臡無骨為醢韲菹之類菜肉通全物若䐑為菹細切為韲䐑章涉反詳見祭物夫人薦豆執校執醴授之執鐙校户教反又户交反又下卯反鐙音登又丁鄧反鐙豆下跗也疏曰校謂豆之中央直者夫人薦豆之時手執此校執醴授醴之人者謂夫人獻尸以醴齊之時此人酌醴以授夫人至夫人薦豆之時此人又執以授夫人是獻之與薦皆此人所掌故云執醴授醴之人執鐙謂授夫人以豆而執鐙也祭統納牲詔於庭疏曰牲入在庭以幣告神禮器大宗伯省牲鑊省悉井反鑊户郭反春疏曰省視亨牲之鑊官大宰及納亨贊王牲事大音泰亨普庚反下同祭納亨納牲將告殺謂鄉祭之晨既殺以授亨人凡大祀君親牽牲大夫贊之天官內饔凡宗廟之祭祀掌割亨之事小疏曰言凡者謂四時及禘祫并月祭等皆在其中雅信南山詩云執其鸞刀以啓其毛取其血膋朱子注曰鸞刀刀有鈴也膋脂膏也啓其毛以告純也取其血以告殺也取其膋以升臭也大司徒奉牛牲羞其肆肆託歷反陳鄭司農云羞進也肆骨體也元謂進所肆解骨體先疏曰謂初牽入時即言羞其肆明豚解地官取膟膋燔燎報陽也膟音律膋力雕反燔音煩燎力妙反膟膋腸間脂也郊特牲血毛詔於室疏曰殺牲取血及毛入以告神於室禮器腥其俎謂豚解而腥之禮運設祭於堂疏曰謂薦腥爓之時設此所薦饌在於堂爓禮器祭義爓祭祭腥注曰湯肉曰爓疏曰謂爓肉而祭腥謂以腥肉而祭言薦膟膋之後以俎載爓肉腥肉而祭並當朝踐之節升首於室制祭之後升牲首於北牖下尊首尚氣郊特牲周禮羊人割牲登其首疏云三牲之首俱升其朝踐用兩獻尊獻注作犧素何反犧尊飾以翡翠春祠夏禴則用之朝踐謂薦血腥酌醴始行祭事后於是薦朝事之豆籩既又酌獻其變朝踐為朝獻者尊相因也大宰贊王爵宗廟六享皆然天疏曰按明堂位獻用玉盞謂王朝踐饋獻酳尸時之官明堂位曰爵用玉盞仍雕注曰仍因也因爵形為之飾也官疏曰爵君酌酒獻尸柸也盞夏后氏之爵名也天內宰后獻則贊注曰獻謂王薦腥薦熟后亦從後獻也后疏曰獻謂朝踐饋獻后以玉爵亞王而獻尸內宰贊春官外宗贊王后獻注曰獻酒於尸後疏曰朝踐饋獻及酳尸以食亦是獻獻中可以兼之大合樂疏曰據薦腥之後合樂之時用之也大司樂楊氏曰愚按禮運疏云鄭注祭統云天子諸侯之祭朝事延尸於户外是以有北面事尸之禮王親執鸞刀啓其毛而祝以血毛告於室故禮器云血毛詔於室祝乃取牲膟膋燎於爐炭入以詔神於室又出以墮於主前郊特牲云詔祝於室是也王乃洗肝於鬱而燔之以制於主前所謂制祭次乃升牲首於室中置於北牖下后薦朝事之豆籩乃薦腥於尸主之前謂之朝踐即此禮運云腥其俎是也王乃以玉爵酌醴齊以獻尸三獻也后亦以玉爵酌醴齊以亞獻尸四獻也又按周禮內宰疏云堂上朝踐之節王出迎牲時祝延尸於户外之西南面后薦八豆八籩王牽牲以入以血毛告訖以此腥其俎薦於神前王以玉爵酌醴齊以獻尸后亦以玉爵酌醴齊以獻尸二疏大略皆同但后薦豆籩有先後之異按籩人疏云祝延尸於户外后薦此八籩則當以內宰及籩人疏為正饋獻周禮司尊彜謂之饋獻籩人醢人謂之饋食之郊特牲坐尸於堂注云至薦熟乃更延主於室奧尸來升席自北方坐於北焉疏曰尸主各席大宗伯省鑊省鑊視亨腥熟春官諸子正六牲之體正謂體載之疏見犧牲條下孰其殽殽户交反謂體解而爓之乃按此章退而合亨疏云前獻爓既未熟今至饋食取嚮所爓肉更合亨之令熟見之禮運羮定詔於堂疏曰羮肉湆也定熟肉也謂煮肉既熟將欲迎尸主入室乃先以俎盛之告神於堂是薦熟未食之前也禮器籩人饋食之籩其實棗栗桃乾榛實栗古栗字音老榛側巾反之疏曰此朝踐薦腥後堂上更體其犬豕牛羊烹熟時后先薦之謂之饋食之籩也其八籩者棗一栗二桃三乾謂乾梅四榛實五桃梅棗三物各有濕有乾為八詳見之祭物醢人饋食之豆其實葵菹螺醢脾析蠯醢蜃蚳醢豚拍魚醢醢呼在反螺力禾反脾婢支反析星歷反蠯蒲佳反蜃市軫反拍音博螺䗂蝓蜃大蛤蚳蛾子脾析牛百葉蠯蛤也豚拍肩也詳疏曰脾析蜃豚拍三者不言菹皆也見祭物舍人共簠簋實之陳之注疏見祭物簋音鬼小宗伯逆齍齍音咨齍疏曰知逆受饎人之盛以入者按少牢饎㸑在廟門之外明天子諸侯饎㸑亦在廟門外今逆齍迎入向廟堂中實之於簠簋也食春官於小祝迎齍盛疏曰祭宗廟饋獻後尸將入室小祝廟門外迎饎人之齍盛於廟堂東實之薦於神座前外宗王后以樂羞齍則贊疏曰羞進也齍黍稷也后進黍稷之時依樂以進之則贊后者亦佐后進之豆籩與齍此官已贊九嬪又贊者以籩豆及黍稷器多故諸官共贊春官也天官九嬪凡祭祀贊玉齍注曰玉齍玉敦受黍稷器疏曰凡祭祀者唯宗廟禘祫與四時月祭等贊玉齍者祭祀之時男子進俎婦人進豆籩簠簋贊助后也亨人共大羮鉶羮鉶音刑大羮肉湆鉶羮加鹽菜矣詳見之於祭物庶羞條既奠然後焫蕭合羶薌焫如悅反蕭音簫羶音馨薌音香尸蕭薌蒿也熟疏曰既奠謂薦熟時也堂上事尸竟延户內更從始也於薦熟時祝先酌酒奠於鉶羮之南訖尸未入於是又取香蒿染以腸脂合黍稷燒之馨香謂黍稷饋熟有黍稷此云蕭合黍稷是蕭與黍稷合詩云取蕭祭脂是蕭與脂合又此章取膟膋燔燎疏曰朝踐時取膟膋燎於爐炭至薦熟之時更取膟膋及蕭與黍稷合燒之郊特牲舉斚角詔妥尸妥安也尸始入舉奠斚若奠角將祭之祝則詔主人即妥尸使之坐尸即至尊之坐或不自安則以拜安之也天子奠斚諸侯奠角牲郊特其饋獻用兩壺樽饋獻謂薦熟時后於是薦饋食之豆籩壺樽以壺為樽春秋傳曰樽以魯壺直祭祝於主謂薦熟時也直正也祭以熟為正疏曰言薦熟正祭之時祝官以祝辭告於主若儀禮少牢敢用柔毛剛鬛用薦嵗事於皇祖伯某是也郊特牲太祝肆享則執明水火而號祝肆享祭宗廟也明水火司烜所共日月之氣以給蒸享執之如以大號祝明此圭潔也春官量人凡祭祀制其從獻脯燔之數量量音亮或音良也從獻者肉殽從酒也元謂燔從於獻酒之肉炙數多少也量長短也炙章夜反從疏曰祭禮獻以燔從按特牲少牢云主人獻尸以肝主婦獻尸以燔從故後鄭據此以為從獻以燔按儀禮脯十脡各長尺二寸是多少長短燔之數量未聞夏官楊氏曰愚按儀禮特牲饋食士禮也少牢饋食大夫禮也大夫士之祭不祼不薦血腥惟室中設尸主東面行饋食禮天子諸侯饋食以前堂上設南面位行祼鬯薦腥之禮而後延尸入室東面位行饋食禮禮運疏云乃退而合亨至薦熟之時陳於堂故禮器云設祭於堂乃後延尸入室中位徙堂上之饌於室內座前祝以斚酌奠於饌南故郊特牲云天子奠斚諸侯奠角即此之謂也既奠之後又取腸間脂焫蕭合羶薌郊特牲注云奠謂薦熟時當此之時大合樂自此以後謂之接祭乃迎尸入室舉此奠斚主人拜以妥尸故郊特牲云舉斚角詔妥尸是也后薦饋獻之豆籩王以玉爵酌盎齊以獻尸祝以祝辭告神此五獻也后又以玉爵酌盎齊以獻尸此六獻也朝獻朝獻即食後酳尸之禮謂之朝獻者蓋以酳尸因朝踐之尊而得名與其朝獻用兩著樽朝獻謂尸卒食王酳之著樽者著略樽也或曰著樽著足無地明堂位曰著殷樽也秋嘗冬蒸則用著樽司几筵設莞筵紛純加繅席畫純加次席黼純注疏見祭物筵几條祀先王昨席亦如之昨讀曰酢謂王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王於是席王於户內席疏曰祀先王謂宗廟六享皆用上三種席王受酢之亦如上三種席春官膳夫凡王祭祀則徹王之胙俎膳夫親徹胙俎胙俎最尊也其餘則其屬徹之尸疏曰祭宗廟有胙俎者謂若特牲少牢主人受尸酢東西面設主人俎於席前王受尸酢禮亦當然天官鬱人大祭祀與量人受舉斚之卒爵而飲之斚古雅反爵斚受福之嘏聲之誤也王酳尸尸嘏王此其卒也少牢饋食禮主人受嘏尸懷之卒爵執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人受王之卒爵亦王出房時也必與量人者鬱人贊祼尸量人制從獻之脯燔事相成福疏曰此大祭祀云受嘏謂祭宗廟者也鄭知斚是受之嘏非天子奠斚殷爵名者按郊特牲云舉斚角詔妥尸其時無鬱人量人受爵飲之法唯有受嘏時受王卒爵飲之禮故知斚為受福之嘏也此鬱人受王之卒爵亦王出房時也者大夫士有獻祝及佐食無獻鬱人量人法天子有獻鬱人量人之禮無獻祝及佐食之事但其節同故引為證也云必與量人者鬱人贊祼尸量人制其從獻脯燔之𢾗量前祼後獻祭事乃成故云事相成也注春官宰夏官量人凡宰祭與鬱人受斚歷而皆飲之曰言祭者冡宰佐王祭亦容攝祭元謂斚讀如嘏尸之嘏宰冡宰疏曰鄭云冡宰佐王祭亦容攝祭者義當兩含按大宗伯云若王不與祭祀則攝位此據宗伯亦有故則冡宰攝之後鄭云斚讀如嘏尸之嘏讀從少牢尸嘏主人此有歷字者謂鬱人與量人歷皆飲之也楊氏曰疏云有獻鬱人量人之法何也當受王卒爵之時王皆飲之以酒此疏所謂獻也尸飲五君洗玉爵獻卿皆以齒尸飲五謂酳尸五獻也大夫士祭三獻而獻賔祭疏曰此據備九獻之禮者主人酳尸故尸飲五也凡二獻祼用鬱鬯尸祭奠而不飲朝踐二獻饋食二獻及食畢主人酳尸此等皆尸欲之故云尸飲五於此之時以玉爵獻卿其爵雖同皆長者在先故云皆以齒云大夫士祭三獻而獻賔者欲明諸侯獻賓時節與大夫士獻賔不同知大夫士祭三獻而獻賔者特牲禮文下大夫不賔尸與士同亦三獻而獻賔知者有司徹文其上大夫别行賓賓尸之禮與此相異也祭統楊氏曰愚按儀禮注云諸侯尸十三飯天子尸十五飯尸食後王以玉爵酌朝踐之尊醴齊以酳尸為七獻也尸卒爵祝受之以酌授尸尸以酢王於是設昨席於戶內司几筵之祀先王昨席亦如之是也祝取少祭饌並黍稷以假福王王乃出量人與鬱人受舉斚之卒爵是也尸飲五王乃以玉爵獻卿此天子禮也諸侯酳尸尸酢主君亦設昨席於户之東面此諸侯禮也又曰按祭統尸飲五君洗玉爵獻卿以下所謂君者指國君言之先鄭注及疏家皆言王可以獻卿者蓋王獻諸臣無文此又約祭統以明王禮再獻按后酳尸謂之再獻者蓋以朝獻王一獻后未獻今后再酳尸而乃謂之再獻歟其再獻用兩象尊再獻者王酳尸之後后酌再獻諸臣為賔又次后酌盎齊備卒食三獻也於后亞獻內宗薦加豆籩其春祠夏禴則用象尊變再獻為饋獻者亦尊相因象尊以象鳯凰或曰以象骨飾尊內宰贊瑶爵爵以瑶為飾尸疏曰內宰以瑶爵授后后親酌盎齊以酳又曰瑶爵謂尸卒食王既酳尸后亞獻之者尸食後王以玉爵酌朝踐醴齊以酳尸謂之朝獻后亦於後以瑶爵酌饋獻時盎齊以酳尸謂之再獻知后以瑶爵亞酳尸者約明堂位云爵用玉盞仍雕加以璧散璧角食後稱加彼魯用王禮即知王酳尸亦用玉盞后酳尸用璧角賔長酳尸用璧散彼云璧此云瑶不同者瑶玉名瑶玉為璧形飾角口則曰璧角角受四升爵為總號故鄭云其爵以瑶為飾也天官加以璧角加加爵也竟疏曰朝獻而夫人酌盎齊亞獻名為再獻又名為加於時薦加豆籩也此再獻之時夫人用璧角內宰所為瑶爵也明堂位內宗掌宗廟之祭祀薦加豆籩加爵之豆籩稱疏曰以其食後加春官籩人加籩之實菱芡栗脯菱芡栗脯菱芰也芡雞頭栗與饋食同酳芰其寄反之疏曰此加籩當尸食後王酳尸后亞王尸於時薦四物重言之則八籩主人獻尸之時不見有設籩之事故知唯主於后也詳見之祭物條醢人加豆之實芹菹兔醢深蒲醓醢箈菹鴈醢筍菹魚醢箈音逮醬芹楚葵也醓醢肉也元謂深蒲蒲始生水中子為疏曰亦與加籩之實同時設之深蒲謂蒲入水深以虀醓醢與朝事之豆同箈箭萌一名篠謂以箈箭為菹也筍竹萌一名蕩謂竹萌為菹也菹皆為新生者也詳見於祭物條尸酢夫人執柄夫人受尸執足疏曰尸酢夫人執柄者爵為雀形以尾為柄夫人獻尸尸酢夫人尸則執雀尾授夫人也夫人授尸執足者夫人受酢於尸則執爵足也祭統加以璧散加加爵璧散以璧飾其口也總疏曰璧散者夫人再獻訖諸侯為賔用之以獻尸而名之亦得稱加明堂位司尊彞春祠夏禴皆有罍諸臣之所昨也秋嘗冬蒸皆有罍諸臣之所昨也昨讀為酢疏曰尸酢賔長即用罍尊三酒之中清酒以自酢是不敢與王之神靈共酒尊也詳見上文尸飲七以瑶爵獻大夫皆以齒疏曰獻卿之後乃主婦酳尸酳尸畢賔長獻尸是尸飲七也乃瑶爵獻大夫是正九獻禮畢初二祼不飲故云飲尸七祭統楊氏曰愚按禮運疏云於是后以瑶爵酌饋食盎齊以酳尸為八獻也尸酢后如王之禮所謂小臣徹后之爼是也祭統云尸酢夫人執柄此諸侯夫人禮也諸侯為賔者以瑶爵酌盎齊以獻尸為九獻諸臣獻者酌罍以自酢司尊彞云皆有罍諸臣之所昨是也於時尸飲七王可以瑶爵獻大夫右九獻程子曰祭法中用九奠以禮有九獻樂有九奏也又曰古之樂九奏乃是九獻陳氏禮書曰先儒謂大祫十有二獻四時與禘九獻上公亦九獻侯伯七獻周官掌客諸侯長十有再獻行人上公再祼享禮九獻侯伯一祼七獻子男一祼五獻諸侯之卿各下其君二等以下及其大夫士皆如之及禮器有五獻之尊郊特牲有三獻之介則享賓祀神之獻數固不異矣然祫雖大於時祭而禘又大於祫宜亦十二獻先儒以禘小於祫非也行人上公再祼而祼不預於九獻侯伯子男一祼而祼亦不預於七獻五獻則先儒以二祼在九獻之內非也司尊彞朝踐用兩尊皆有罍饋食用兩尊皆有罍籩人醢人有朝踐之籩豆有饋食之籩豆有加籩加豆則朝踐王獻后亞之諸臣之所昨三獻也饋食王獻后亞之諸臣之所昨六獻也酳尸三九獻加爵不與焉此宗廟九獻之禮也夫卒食必有酳曽子問言侑酳是侑食然後有酳也樂記言執醬而饋執爵而酳是饋食然後有酳也特牲少牢之祭皆曰饋食而獻皆曰酳尸則大夫士無朝獻饋獻之禮特酳尸於饋食之後而已然士禮主人主婦賔三獻又加爵三長兄弟賓長利獻之也下大夫主人主婦賓又獻又加爵二賓長與利獻之也上大夫特主人主婦賓三獻而已蓋士與下大夫無賓尸故有加爵上大夫有賓尸故無加爵天子諸侯有繹祭又有加爵記所以隆於尊者也春秋之時楚子入享於鄭九獻加籩豆六品季孫宿如晉晉侯享之有加辭曰小國之事大國也得貺不過三爵今豆有加下臣弗堪則加豈卑者之所預乎士與下大夫有加其代賓尸可知也周官朝事饋食之籩豆后薦之加爵之籩豆內宗薦之則加以璧散璧角亦諸臣獻之可知也卑者獻以散士之飲禮止於一獻而祭有三者攝盛也士加爵三而下大夫加爵二者厭降也書曰大保秉璋以酢孔安國謂報祭曰酢蓋獻始事也酢成事也諸臣之於禮成之而已故獻皆曰酢黃氏曰先鄭推次朝踐朝獻饋獻再獻為九酌王與后各四諸臣一義皆可觀存之以待作者楊氏曰愚按司尊彞所述與先鄭所注祼二獻朝踐二獻饋食二獻朝獻一獻再獻二獻則九獻之目也籩人醢人有朝事饋食之籩之豆則九獻薦籩豆之時也禮運則論九獻之義也又按四時之祭名既不同禮必有異今其可見者惟尊彞之殊用耳於經無其文者皆不可知也姑據經所可見者著之於篇又按陳氏曰周官行人上公再祼而酢饗禮九獻而祼不預於九獻諸侯一祼而酢享禮七獻而祼亦不預於七獻先儒以二祼在九獻之內非也蓋嘗考之古禮闕亡殘編斷簡之僅存者如祭禮有二祼有朝踐有饋獻有酳食此可得而知也其間禮之節文詳略多寡禮經無明文此不可得而知者也先鄭謂二祼王與后各一朝踐王與后各一饋獻王與后各一酳尸王與后各一又諸臣一為九獻求之禮經尚有明證故先儒多從之今固不得遽以為非陳氏所引周官行人謂二祼在九獻之外此固有所據謂朝踐三獻饋食三獻酳尸三獻似亦可通但以諸臣之所酢為報祭而引太保秉璋以酢為證則恐不然夫尊重而罍輕如先鄭謂諸臣酌罍以自酢不敢與神靈共尊則可謂諸臣以罍報祭於神靈而不以尊則於理為不通矣二説當並存之以待作者又按九獻之禮春祠夏禴用兩獻尊象尊秋嘗冬蒸用兩著尊壺尊凡四時之間祀追享朝享謂禘祫也用兩大尊山尊經有明文不待言矣但所謂九獻者謂王及后祼各一朝踐各一朝獻王酳尸一再獻后酳尸一此為八獻諸臣為賓酳尸一并前八為九是禮也春祠夏禴秋嘗冬蒸追享朝享莫不皆然今經獨於春祠夏禴言朝踐再獻秋嘗冬蒸言朝獻饋獻何也蓋互文以見義也春夏言朝踐秋冬言朝獻欲見朝獻因朝踐之尊鄭注所謂尊相因也春夏言再獻秋冬言饋獻欲見再獻因饋獻之尊鄭注所謂亦尊相因是也今作二圖以見之其追享朝享别有圖見祫祭禮春祠夏禴九獻圖禮運疏崔氏云四時之祭唯二齊三酒二齊醴盎也故鄭注司尊彞四時祭法但醴盎而已用二齊者朝踐王酌醴齊后亦酌醴齊饋食王酌盎齊后亦酌盎齊朝獻王還用醴齊再獻后還用盎齊亦尊相因也諸侯為賓亦酌盎齊賓長酳尸酢用清酒和爵用三酒二彞雞彞盛明水鳥彞盛鬱鬯二齊獻尊盛醴齊象尊盛盎齊祼王一獻祼用鳥彞后二獻祼用鳥彞朝踐王三獻用獻尊醴齊后四獻用獻尊醴齊饋獻王五獻用象尊盎齊后六獻用象尊盎齊朝獻王七獻因朝踐獻尊醴齊再獻后八獻因饋獻象尊盎齊賓九獻用象尊盎齊尸飲九以散爵獻士及羣有司皆以齒明尊卑之等也散悉但反又疏曰九獻禮畢自此以後長賓長兄弟更為加爵尸飲二是并前尸飲九主人乃散爵獻士及羣有司也衆祭統及楊氏曰九獻之後謂之加爵特牲禮長兄弟賓長佐食有三加爵則天子諸侯亦有加爵明堂位云加以璧散是也又特牲禮云加爵之後有嗣子舉奠文王世子謂之上嗣舉奠天子之禮亦當然也侯禮運獻崔氏疏云天子九獻魯及王者之後亦九獻伯七朝踐及饋熟君皆不獻於九獻之中減二故為七獻子男五獻亦以朝踐饋熟君皆不獻但酳尸一獻而已禮器曰太廟之內敬矣君親牽牲大夫贊幣而從君親制祭夫人薦盎親疏曰侯伯子男之君朝踐君不獻故夫人薦盎又君割牲夫人薦酒疏曰君親割牲夫人薦酒者謂薦熟時君親割牲體於時君亦不獻故夫人薦酒又按特牲少牢饋食之禮主人主婦及賓備行三獻况祭禮以饋熟為正上而天子下而大夫士祭禮皆有獻今云侯伯子男饋熟時皆無獻於理不通聖人制禮文理密察自有隆殺之宜必不如疏家所説之疏也右九獻之後加爵太祝既祭令徹疏曰祭訖尸謖之後太祝命徹祭器即詩云諸宰君婦廢徹不遲是也春官樂師及徹帥學士而歌徹學士國子也鄭司農云將徹之時自有樂帥學士而歌徹元謂徹者歌雍歌疏曰但學士主舞瞽人主歌今云帥學士而歌徹者徹之時歌舞俱有謂率學士使之舞歌者自是瞽人歌雍詩也令相相去聲此令視瞭扶工歌瞭音了疏曰令相之文在徹之下以其瞽人無目而稱工故令視瞭扶工也祭同上收論語八佾以雍徹朱子注曰雍周頌篇名徹畢而其爼也天子宗廟之祭則歌雍以徹薦玉豆視豆籩及以樂徹亦如之春官外宗佐王后內宗及以樂徹則佐傳豆籩內疏曰豆籩后於神前徹之傳與外宗外宗傳與內宗宗傳與外者故知佐傳也世婦九嬪內宰贊徹豆籩互見朝踐條注酢天官內小臣徹后爼疏曰謂如東房中受尸之爼內小臣徹之右徹濟濟蹌蹌潔爾牛羊以往蒸嘗或剝或亨或肆或將祝祭于祊祀事孔明祊補彭反神祊門內也箋云孔甚也孝子不知之所在故使祝博求之平生門內之旁待賓客之處祀禮於是甚明祭小雅楚茨楊氏曰祊有二有祭日之祊有明日繹之祊楚茨詩祝祭於祊在門內之旁待賔客之處乃祭日之祊也右祝祭于祊傳夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神言其物質略有齊敬之心則可以薦羞於鬼神中古未有釡甑釋米捭肉加於燒石之上而食之耳今北狄猶然汙尊鑿地為尊抷飲手掬之也蕢讀為凷苦對反凷逼也謂摶土為桴也土鼓築土為鼓也及其死也升屋而號告曰臯某復然後飯腥而苴熟疏曰後世漸文及其身之死也升上屋而號呼北面告文曰臯臯引聲之言某為死者名令其反復魄不復然後浴尸而行含禮於含之時飯用生稻之米故云飯腥用上古未嘗有火化之法苴熟者至欲葬遣奠之時而用苞褁熟肉以遣送尸法中古修火化之法也伏羲為上古神農為中古五帝為下古故天望而地藏也體魄則降和氣在上疏曰天望謂始死望天而招魂也藏謂葬地以藏尸體魄則降所以地藏和氣在上所以望天而招魂故死者北首首隂也生者南鄉鄉陽也皆從其初謂取法於上古中古也昔者先王未有宫室冬則居營窟夏則居橧巢寒則纍土暑則聚薪柴居其上未有火化食腥也食草木之實鳥獸之肉飲其血茹其毛未有麻絲衣其羽皮此上古之時也後聖有作謂中古之後聖人作興然後修火之利熟冶萬物笵金鑄作器用合土謂和合其土燒以作器如有虞氏瓦棺泰有虞氏之尊之類以為臺榭宫室牖户以炮裏燒之也以燔加於火上以亨煮之鑊也以炙貫之火上以為醴酪治其麻絲以為布帛以飬生送死以事鬼神上帝皆從其朔朔亦初也謂倣效中古以來故元酒在室醴盞在户粢醍在堂澄酒在下陳其犧牲備其鼎爼列其琴瑟管磬鐘鼓修其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜醍音體其此言今禮饌具所因於古及事義也粢讀為齊聲之誤也周禮五齊一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊字雖異盞與盎澄與沈蓋同物也奠之不同處重古略近也祝祝為主人享神辭也嘏祝為尸致福於主人之辭也祜福也福之言備也泛芳劒反為於偽反之疏曰元酒謂水也太古無酒以水當酒所用故謂元酒以今雖有五齊三酒貴重古物故陳設之時在於室內而近北醴盞在户醴謂醴齊盞謂盎齊以其後世所為賤之陳列雖在室內稍南近户粢醍在堂者以卑之故陳列又南近户而在堂澄酒在下者澄謂沈齊也酒謂三酒事酒昔酒清酒之等稍卑之故陳在堂下也陳其犧牲者按特牲禮陳鼎於門外北面獸在鼎南東首犧牲在獸西北首其天子諸侯夕省牲之時亦陳於廟門外橫行西上備其鼎爼者以牲煮於鑊鑊在廟門之外鼎隨鑊設各陳於鑊西取牲體以實其鼎而入設於阼階下南北陳之爼設於鼎西以次載於爼也故云備其鼎爼列其琴瑟者琴瑟在堂而登歌故書云搏拊琴瑟以詠是也管磬鐘鼓者堂下之樂則書云下管鼗鼓笙鏞以間是也其歌鐘歌磬亦在堂下祝謂以主人之辭享神嘏謂祝以尸之辭致福而嘏主人也指其精氣謂之上神指其亡親謂之先祖以正君臣者祭統云君在廟門外則疑於君入廟門則全於臣是也以篤父子者祭統云尸南面父北面而事之是也以睦兄弟者祭統云昭與昭齒穆與穆齒特牲云主人洗爵獻長兄弟衆兄弟是也以齊上下者祭統云尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫是也夫婦有所者禮器云君在阼夫人在房及特牲夫婦交相致爵是也云盞與盎澄與沈蓋同物者以酒正文醴醍之間有盎此醴醍之間有盞又周禮醍齊之下有沈齊此醍齊之下有澄齊故也按此注澄是沈齊按酒正注澄酒是三酒二注不同故趙啇疑而致問鄭答之云此夲不誤轉寫益澄字耳如鄭所答是轉寫酒正之文誤益澄字當云酒三酒也則是與禮運注同然按坊記云醴酒在室醍酒在堂澄酒在下示民不淫也注云淫猶貪也又以澄為清酒田瓊疑而致問鄭答之云禮運云醴盞醍澄各是一物皆不言酒故推其意澄為沈齊酒為三酒坊記云醴也醍也澄也皆言酒故因注云澄酒清酒也其實沈齊也如鄭此言坊記所云醴酒盞酒五齊亦言酒則澄酒是沈齊也是五者最清故云澄酒非為三酒之中清酒是與禮運不異也作其祝號元酒以祭薦其血毛腥其爼熟其殽與其越席疏布以羃衣其浣帛醴盞以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫越音活羃莫歷反衣於既反熟疏曰元酒以祭薦其血毛腥其爼此是用上古也其殽以下用中古也作其祝號者謂造其鬼神及牲玉美號之辭史祝稱之以告鬼神故云作其祝號元酒以祭者謂朝踐之時設此元酒於五齊之上以致祭鬼神此重古設之其實不用以祭也薦其血毛者亦朝踐時延尸在堂祝以血毛告於室也腥其爼者亦謂朝踐時既殺牲以爼盛肉進於尸前也熟其殽者殽骨體也熟謂以湯爓之以其所爓骨體進於尸前也與其越席至浣帛皆謂祭初之時越席謂蒲席疏布謂粗布若依周禮越席疏布是祭天之物此經云君與夫人則宗廟之禮也此蓋記者雜陳夏殷諸侯之禮故雖宗廟而用越席疏布也衣其浣帛者謂祭服練帛染而為之醴盞以獻者朝踐之時用醴饋食之時用盞薦其燔炙者謂燔肉炙肝按特牲禮主人獻尸賔長以肝從主婦獻尸賔長以燔從則此君薦之用炙也夫人薦用燔是也詩楚茨云或燔或炙鄭云燔燔肉也炙炙肝也君與夫人交獻第一君獻第二夫人獻第三君獻第四夫人獻其君與夫人交錯而獻也設此在上祭祀之禮所以嘉善於死者之魂魄是謂合莫莫謂虛無寂寞言死者精神虛無寂寞得生者嘉善而神來歆享是生者和合於寂寞但禮運之作因魯之失禮孔子乃為廣陳天子諸侯之事及五帝三王之道其言雜亂或先或後其文不次舉其大綱不可以一代而定其法制又不可以一槩而正其先後也若審此理則無所疑惑然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶羮祝以孝告嘏以慈告是謂大祥鉶音刑賔疏曰此謂祭饋之節供事鬼神及祭末獻並祭竟燕飲享食賔客兄弟也退而合亨者前明薦爓既未熟今至饋事乃退取嚮爓肉更合亨之令熟擬更薦尸又尸爼唯載右體其餘不載者及左體等亦於鑊中亨煮之故云合亨體其犬豕牛羊者亨之既熟乃體别骨之貴賤以為衆爼知非尸前正爼者以此經所陳多是祭末之事若是尸前正爼當云是謂合莫不得云是謂大祥既是人之祥善故為祭末享燕之衆爼也實其簠簋籩豆鉶羮者此舉事尸之時所供設也若籩豆亦兼據賔客及兄弟之等故特牲少牢賓及衆賔兄弟之等皆有籩豆及爼是也此禮之大成也禮運設朝事燔燎羶薌見以蕭光以報氣也薦黍稷羞肝肺首心見間以俠甒加以鬱鬯以報魄也見依注作覸音間厠之間徐古辨反俠古洽反甒音武間朝事謂薦血腥時也薦黍稷所謂饋食也見及見皆當為覸字之誤也事疏曰報氣謂朝踐之節也報魄謂饋熟之節也朝謂早朝祭事燔燎謂取膟膋燎於爐炭羶謂馨香見以蕭光謂見覸覸謂雜也光謂氣也謂燔膟膋兼爇蕭蒿是雜以蕭氣是以報氣也羞進也殷祭以肝周祭以肺有虞氏以首夏后氏以心皆謂祭黍稷之時兼此物祭也見間以俠甒者言祭黍稷之時雜以兩甒醴酒加以鬱鬯者言非但薦熟是報魄初所加鬱鬯亦是報魄以魄在地下鬱鬯灌地雖然是祭初亦是報蓋不當薦熟之時以故云加也祭義祭之日君牽牲穆答君卿大夫序從從木用反牽穆子姓也答對也共疏曰祭廟君牲之時子姓對君牽牲卿大夫序從者卿大夫佐幣士奉芻依次第而從君也既入廟門麗於碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也袒徒旦反刲苦圭反膟音律爓音燖麗猶繫也毛牛尚耳以耳毛為上也膟膋血與腸間脂也爓祭祭腥祭爓肉腥肉也湯肉曰爓疏曰麗繫也君牽牲入廟繫著中庭碑也用鸞刀刲割牲體又取血及腸間脂血以供薦而膋以供炙肝及爇蕭也乃退者謂殺牲竟而取卿大夫所刲血毛膟膋薦之竟而退也爓祭祭腥者爓謂爓肉而祭腥謂以腥肉而祭言薦膟膋之後以爼載爓肉腥肉而祭祭事既卒而退是恭敬之至極也又曰按説文及字林云膟血祭膋是牛腸間脂也其祭腥肉爓肉並當朝踐之節祭義君純冕立於阼夫人副褘立於東房君執圭瓚祼尸大宗執璋瓚亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之褘音輝瓚才但反紖直忍反又以忍反從才用反芻初俱反盎烏浪反從夫人絶句一讀以從字絶句涗舒鋭反徐音嵗羞齊夲亦作嚌才細反鬱太廟始祖廟也圭瓚璋瓚祼器也以圭璋為柄酌鬯曰祼疏曰大宗執璋瓚亞祼者大宗主宗廟禮者以亞祼之禮夫人親為之此不云夫人而云大宗者記者廣言容夫人有故故大宗伯代夫人行禮執璋瓚亞祼之禮君執紖者紖牛鼻繩君自執之入繫於碑卿大夫從者謂卿大夫從驅之及殺與幣告也士執芻者芻謂藁也以其殺牲用芻藁藉之宗婦執盎從者謂同宗之婦執盎以從夫人夫人薦涗水者涗即盎齊從夫人而來奠盎齊於位夫人是明水宗婦執盎齊從夫人而來奠盎齊於位夫人乃就盎齊之尊酌此涗齊而薦之者因盎齊有明水連言水耳上云夫人副褘此則上公之祭宜有醴齊盎但言盎者略言之亦容侯伯子男之祭但有盎齊無醴齊也故執盎從君執鸞刀羞嚌者嚌肝肺也嚌有二時一是朝踐之時取肝以膋貫之入室燎於爐炭出薦之主前二者謂饋熟之時君以鸞刀割制之羞嚌肺橫切之使不絶亦奠於爼上尸並嚌之故云羞嚌一云羞進也謂君用鸞刀制此嚌肉以進之故云鸞刀羞嚌於君羞嚌之時夫人薦此饋食之豆君親執紖及鸞刀羞嚌是夫親之也夫人薦涗水及羞豆是婦親之也故云夫婦親之天道至教聖人至德疏曰天道用教以示人聖人則放之以為德故君立於阼以象日夫人在西房以象月廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東縣音元尊禮樂之器西也犧周禮作獻大獻素河反縣疏曰犧尊貴於罍尊而犧尊西縣鼓於應鼓而鼓在於西故云禮樂之器尊西又曰罍尊在阼謂夫人所酌也犧尊在西謂君所酌也縣鼓謂大鼓也在西方而縣之應鼓謂小鼓也在東方而縣之熊氏云此諸侯時祭所用之禮故罍尊夫人所酌也若天子之祭則罍尊在堂下故禮運云澄酒在下酒謂三酒在堂下司尊彞云皆有罍諸臣之所昨則君不酌罍也君在阼夫人在房人君尊東也天子諸侯有左右房在疏曰顧命云天子有左右房此云夫人房又云夫人東酌罍尊是西房也大明生於東月生於西此隂陽之分夫婦之位也君西酌犧尊夫人東酌罍尊象日出東方而西行也月出西方而東行也禮交動乎上樂交應乎下和之至也疏曰堂之上下禮樂交相應會和諧之至極也禮器詔祝於室坐尸於堂謂朝事時也朝事延尸於户西南面布主席東面取牲膟膋燎於爐炭洗肝於鬱鬯而燔之入以詔神於室又出以墮於主前主人親制其肝所謂制祭也時尸薦以籩豆至薦熟乃更延主於室之奧尸來升席自北方坐於主北焉反墮許恚反或許垂用牲於庭謂殺之時升首於室制祭之後升牲首於北牖下尊首尚氣也直祭祝於主謂薦熟時也如特牲少牢饋食之也直正也祭以熟為正則血腥之屬盡敬心耳少疏曰薦熟正祭之時祝官以祝辭告於主若儀禮牢敢用柔毛剛鬛用薦嵗事於皇祖伯某是也索祭祝於祊索求神也廟門曰祊謂之祊者以於繹祭名也求疏曰凡祊有二種一是正祭之時既設祭於廟又神於廟門之內詩楚茨云祝祭于祊門內平生待賔之處與祭同日也二是明日繹祭之時設饌於廟門外西室亦謂之祊今此索祭於祊當是正祭日之祊矣不知神之所在於彼乎於此乎室與堂與同與音餘下或諸逺人乎祭於祊尚曰求諸逺者與逺千萬反曰尚庶幾也疏或逺離於人不在廟乎尚是庶幾也言正祭之時祭於廟祊者庶幾求於逺處者與言於逺處求神也郊特牲皆禮器納牲詔於庭血毛詔於室羮定詔於堂三詔不同位蓋道求而未得也疏曰牲入在庭以幣告神故云詔於庭殺牲取血及毛入以告神於室羮肉湆也定熟肉也謂煮肉既熟將欲迎尸主人乃先以爼盛之告神於堂道言也所以三詔皆不同位者蓋言求而未之得也故于三處告之及入舞君執干戚就舞位君為東上冕而總干率其羣臣以樂皇尸是故天子之祭也與天下樂之諸侯之祭也與境內樂之冕而總干率其羣臣以樂皇尸此與境內樂之之義也東君為東上近主位也皇君也言君尸者尊之疏曰祭時天子諸侯親在舞位以樂皇尸也夫祭有三重焉獻之屬莫重於祼聲莫重於升歌舞莫重於武宿夜此周道也疏曰祭祀之禮有三種可重之事舞莫重於武宿夜者武宿夜是武曲之名是衆舞之中無能重於武宿夜之舞皇氏云師説書傳云武王伐紂至於商郊停止宿夜士卒皆歡樂歌舞以待旦因名焉武宿夜其樂亡也熊氏云此即大武之樂也凡三道者所以假於外而以增君子之志也故與志進退志輕則亦輕志重則亦重輕其志而求外之重也雖聖人弗能得也是故君子之祭也必身自盡也所以明道也道之以禮以奉三重而薦諸皇尸此聖人之道也疏曰三種所重之道皆假借外物而以增益君子內志祼則假於鬱鬯歌則假於聲音舞則假於干戚皆是假於外祭統清廟之瑟朱弦而疏越一倡而三歎有遺音者矣疏曰清廟之瑟謂歌清廟之詩所彈之瑟朱弦謂練朱絲為弦練則聲濁也越謂瑟底孔也疏通之使聲遲故云疏越弦聲既濁瑟音又遲是質素之聲非要妙之聲以其質素初發首一倡之時而唯有三人歎之是人不愛樂然以其貴在於德所以有餘遺之音念之不忘也章樂記琴尚書大傳曰古者帝王升歌清廟清廟樂名大練弦逹越大瑟朱弦達越以韋為鼓謂之摶拊何以也練弦朱弦互文也越下孔也凡練弦達越摶拊者象其德寬和君子有大人聲不以鐘鼓竽瑟之聲亂人聲清廟升歌者歌先人之功烈德澤也故欲其清也烈業也其歌之呼也呼出聲也曰於穆清廟於者歎之也穆者敬之也清者欲其在位者遍聞之也故周公升歌文王之功烈德澤茍在廟中見文王者愀然如見文王故書曰摶拊瑟琴以詠祖考來假此之謂也詩云肅雍和鳴先祖是聼夫肅肅敬也雍雍和也云云聖人作為鞉鼓椌楬塤箎此六者德音之音也鞉音桃椌苦江反楬苦瞎反塤六者為夲以其聲質也椌楬謂柷敔也箎或為簨簴簨恤尹反簴音巨然後鐘磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也和如字徐户卧反酳音允又仕覲反疏曰既用質素為夲然後用此鐘磬竽瑟華美之音以贊和之使文質相雜干楯也戚斧也狄羽也聲既文質備足又用干戚旄羽以舞動之前云鄭宋齊衛四者為祭祀之所不用故此六器為道德之音四器之和文武之舞並可用於宗廟之中奏之若樂九變而鬼神格也所以獻酬酳酢者又於宗廟中接納賓客也賔入而奏肆夏及卒爵而樂闋孔子屢歎之是也楊氏曰愚按九獻祭之正也其間節文又有因傳記可以參互見者掇拾以著之於篇君卷冕立於阼夫人副禕立於東房夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵卷古夲反處昌慮反於疏曰上公之夫人故副禕立東房若其餘夫人則不副禕也夫婦相授受不相襲處者謂夫婦交相致爵之時襲因也其執之物不相因故處若夫婦交相致爵不執故處以明男女有别酢必易爵者謂夫婦交相致爵之時主人受主婦之酢易換其爵故特牲主人受主婦之酢爵更爵酢鄭注云主人更爵自酢男子不承婦人爵即引此文云夫婦相授受不相襲處酢必易爵也右致爵楊氏曰愚按特牲饋食禮主婦致爵於主人卒爵主婦出反於房主人降洗酌致爵於主婦主婦拜受爵諸侯夫人以上致爵經無其文此因祭統上文君卷冕立於阼夫人副褘立於東房下文有酢必易爵之文知諸侯夫人亦有致爵之禮籩人羞籩之實糗餌粉餈餈昨資反宰羞籩謂若少牢主人酬尸夫羞房中之羞於尸侑主人主婦皆右之者元謂此二物皆粉稻米黍米所為也合蒸曰餌餅之曰餈糗者搗粉熬大豆為餌餈之黏著以粉之耳餌言糗餈言粉互相足官疏曰此當王酬尸內饔進之於尸侑等也天醢人羞豆之實酏食糝食酏食音嗣糝素感反舉元謂酏􅊡也內則曰取稻米糔溲之小切狼臅膏以與稻米為􅊡又曰糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之􅊡之然反糔思栁反溲所栁反臅昌蜀反一音粟疏曰亦與羞籩之實同時設之右羞楊氏曰愚按儀禮有司徹主人酬尸之後尸侑主人皆升筵乃羞宰夫羞房中之羞於尸侑主人主婦皆右之司士羞庶羞於尸侑主人主婦皆左之今按籩人醢人有羞籩羞豆之實則知天子之禮亦有羞諸侯亦必有之但經文不備耳司士凡祭祀及賜爵呼昭穆而進之賜爵神惠及下也此所謂王之子姓兄弟祭統曰凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長幼有序疏曰姓生也子之所生則孫及兄弟皆有昭穆引祭統者是諸侯法明天子亦然凡言昭穆在助祭之中者皆在東階前南陳就昭穆之中皆年長者在上年幼者在下故云齒也云及賜爵者謂祭末旅酬無算爵之時皆有酒爵賜及之皆以昭穆為序也少祭統凡賜爵昭為一穆為一云云注曰昭穆猶特牲牢饋食之禮衆兄弟也羣有司猶衆賔下及執事者君賜之爵謂若酬之賜疏曰爵酒爵也謂祭祀旅酬時賜助祭者酒爵故云爵昭為一穆為一者言君衆兄弟子孫等在昭列者别為一色在穆列者自為一色各自相旅尊者在前卑者在後若同班列則長者在前少者在後是昭與昭齒穆與穆齒言祭統坊記因其酒肉聚其宗族以教民睦也注曰祭有酒肉羣昭羣穆皆至而獻酬之咸有薦爼穆疏曰謂因其祭祀之酒肉於祭祀之末聚其宗族昭相獻酬教民相親睦也凡為爼者以骨為主骨有貴賤殷人貴髀周人貴肩凡前貴於後爼者所以明祭之必有惠也是故貴者取貴骨賤者取賤骨貴者不重賤者不虛示均也髀必氏反又必履反重直龍反於殷人貴髀為其厚也周人貴肩為其顯也凡前貴後謂脊脅臂臑之屬者臑乃報反爼疏曰凡為爼者以骨為主者爼謂助祭各將物於也殷人貴髀周人貴肩者殷質貴髀之厚賤肩之薄周文貴肩之顯賤髀之隱各隨所貴凡前貴於後者據周言之以周人之貴肩故也貴者不重賤者不虛示均也者言貴者不待多而重賤者不虛而無分爼多少隨其貴賤是示均平也又曰此脊脅臂臑舉其貴者言之屬中包其賤者不云肩者以經云周人貴肩故此略之前體臂臑為貴後體膞胳為賤就脊脅之中亦有貴賤正脊在前為貴脡脊橫脊在後為賤脅則正脅在前為貴短脅為賤故總云之屬以包之祭統右旅酬賜爵其登餕受爵則以上嗣餕音俊食上嗣君之適長子以特牲饋禮言之受爵謂上嗣舉奠也獻謂舉奠洗爵酌入也餕謂宗人遣舉奠盥祝命之餕也大夫之嗣無此禮辟君也適丁歷反盥音管尊疏曰按少牢饋食無嗣子舉奠大夫於士而不舉奠故知辟正舉也登餕受爵以上嗣尊祖之道也疏曰此覆釋所以登餕受爵用適子也文王世子楊氏曰此條有兩事受爵謂上嗣舉奠也已見上文再獻條注登餕謂宗人遣舉奠盥祝命之餕也右登餕受爵傳夫祭有餕餕者祭之末也不可不知也是故古之人有言曰善終者如始餕其是已是故古之君子曰尸亦餕鬼神之餘也惠術也可以觀政矣疏曰初薦毛血燔燎是薦於鬼神至薦熟時尸乃食之是尸餕鬼神之餘若大夫士隂厭亦是先薦鬼神而後尸乃食亦尸餕鬼神餘故并云尸亦餕鬼神之餘也術猶法也尸餕鬼神之餘是施恩惠之術法也施始豉反是故尸謖君與卿四人餕君起大夫六人餕臣餕君之餘也大夫起士八人餕賤餕貴之餘也士起各執其具以出陳於堂下百官進徹之下餕上之餘也謖所六反起也百官進依注作餕餕進當為餕聲之誤也百官謂有事於君祭者也既乃徹之而去所謂自卑至賤進徹或俱為餕也凡餕之道每變以衆所以别貴賤之等而興施惠之象也是故以四簋黍見其修於廟中也廟中者竟內之象也别彼列反見賢遍反修於廟中一夲作遍鬼神之惠遍廟中如國君之惠遍竟內也時疏曰是故以四簋黍見其修於廟中也者謂餕之君與三卿以四簋之黍修整普遍也所以用四簋多黍稷而餕者欲見其恩惠修整遍於廟中諸侯之祭有六簋今云以四簋者以二簋留為陽厭之祭故以四簋為餕簋有黍稷特云黍者見其美舉黍稷可知也廟中者竟內之象也者以其簋而遍廟中如君之恩惠遍於竟內也祭者澤之大者也是故上有大澤則惠必及下顧上先下後耳非上積重而下有凍餒之民也是故上有大澤則民夫人待於下流知惠之必將至也由餕見之矣故曰可以觀政矣積重直龍反餒乃罪反夫音扶君鬼神有祭不獨饗之使人綏之恩澤之大者也國有蓄積不獨食之亦以施惠竟內也祭統餕餘不祭父不祭子夫不祭妻曲禮注朱子曰古説不是今思之只是不敢以餕餘又將去祭神雖以父之尊亦不可以祭其子之卑夫之尊亦不可以祭其妻之卑蓋不敢以鬼神之餘復以祭也祭非飲食必祭之祭又曰先儒自為一説橫渠又自為一説看來只是祭祀之祭此因餕餘起文謂父不以是祭其子夫不以是祭其妻夫祭有畀輝胞翟閽者惠下之道也唯有德之君為能行此明足以見之仁足以與之畀之為言與也能以其餘畀其下者也輝者甲吏之賤者也胞者肉吏之賤者也翟者樂吏之賤者也閽者守門之賤者也古者不使刑人守門此四守者吏之至賤者也尸又至尊以至尊既祭之末而不忘至賤而以其餘畀之是故明君在上則竟內之民無凍餒者矣此之謂上下之際畀必利反輝依注作韗同况萬反又音運胞步交反翟音狄閽音昏明足以見之見此卑仁足以與之與此卑者也輝周禮作韗謂韗磔皮革之官也翟謂教羽舞者也古者不使刑人守門謂夏殷時卑如字舊必利反疏曰此之謂上下之際者際接也至尊者與賤者其道接也祭統閍謂之門詩曰祝祭於祊爾雅繹又祭也祭之明日尋繹復祭疏曰繹又祭也者又復也繹復祭之名也郭云祭之眀日尋繹復祭公羊傳曰繹者何祭之明日也榖梁傳云繹者祭之旦日之享賓也天子諸侯謂之為繹少牢饋食大夫之禮也謂之賓尸與祭同日若然是亦與賔尸事不同矣而詩頌絲衣序云繹賔尸者繹祭之禮主為賔事此尸但天子諸侯禮大異日為之别為立名謂之繹言其尋繹昨日卿大夫禮小同日為之不别立名直指其事謂之賔尸耳此序言繹者是祭之名賔尸是此祭之事故特詳其文然又祭之名三代各異周曰繹春秋經曰壬午猶繹八疏曰郭云壬午猶繹者宣年經文曰商曰彤疏曰髙宗彤日商書篇也孫炎云肜者相尋不絶之意夏曰復胙疏曰夏之典訓無言復胙名者未見義所出也詩傳及詩箋亦無此一句説者云胙是祭肉也以祭之旦日復陳其祭肉以賔尸也未知然不祭名者以顯上事也同上右祭之眀日又祊傳為祊於外祊百彭反門祊祭明日之繹祭也謂之祊者於廟之旁因名焉其祭之禮既設祭於室而事尸於堂孝子求神非一處也周禮曰夏后氏世室門堂三之二室三之一詩頌絲衣曰自堂徂基繹繹音亦處昌慮反西疏曰為祊於外者祊謂明日祭在於廟門外之旁以正祭設饌在室故知繹祭亦設饌在室有司徹上大夫賔尸坐尸侑於堂酌而獻尸故知人君繹祭亦事尸於堂也云夏后氏世室門堂三之二室三之一者證廟門之旁有室有堂也又引詩頌絲衣之篇者證繹祭在堂事尸也絲衣之篇論繹祭之時從堂上往於堂下之基故云自堂徂基故曰於彼乎於此乎疏曰故曰於彼乎於此乎者以其不知神之所在或祭之於堂或祭之於外不知此神於彼堂乎於彼室乎於此祊乎以古語有此故記者引以結之也禮器祭統詔祝於室而出乎祊此交神明之道明疏曰祝官以言詔告祝請冥尸於室求之此交神之道也者神明難測不可一處求之或門旁不敢定是與神明交接之道詩云明發不寐有懷二人文王之詩也祭之眀日眀發不寐饗而致之又從而思之祭之日樂與哀半饗之必樂已至必哀明發不寐謂夜而至旦也祭之明日謂繹日也言繹日夜不寐也二人謂父母容尸侑也疏曰云二人謂父母容尸侑也者祭以念親故二人謂父母按有司徹上大夫賔尸别立一人為侑以助尸繹祭與儐尸同故知二人容尸與侑也儐音賔義祭是故孝子臨尸而不怍君牽牲夫人奠盎君獻尸夫人薦豆卿大夫相君命婦相夫人齊齊乎其敬也愈愈乎其忠也勿勿乎其欲其饗之也怍才各反盎烏浪反愈羊朱反祀君牽牲將薦毛血對疏曰怍謂顔色不和恱以祭須饗尸故孝子臨尸前不得顔色不和君牽牲夫人奠盎者熊氏云此謂繹祭君當牽牲之時夫人奠設盎齊之尊君獻尸夫人薦豆者繹祭故先獻後薦齊齊乎其敬也者卿大夫相君命婦相夫人皆齊齊乎其恭敬齊齊謂整齊之貌故玉藻云廟中齊齊愈愈乎其忠也者愈愈和恱之貌忠謂忠心言孝子顔色愈愈然和恱盡忠心勿勿乎其欲其享之也者勿勿猶勉勉也言孝子之心與貌勉勉然欲得親之歆享也云儐尸主人獻尸主婦自東房薦韭菹醢者此是有司徹文引之者證儐尸之時先獻後薦上大夫儐尸即天子諸侯之繹也盎齊才細反祭義宣公八年六月辛巳有事於太廟中遂卒於垂壬午猶繹繹又祭陳昨日之禮所以賔尸公羊子曰繹者何祭之眀日也天子諸侯曰繹大夫曰賔尸士曰宴尸榖梁子曰繹者祭之旦日之享賔也疏曰旦日猶明日也何休云繹者繼昨日事但不灌地以降神耳衛莊公改舊制變宗廟易朝市髙子睪問於孔子曰周禮繹祭於祊祊在廟門之西前朝而後市今衛君更之如之何孔子曰繹之於庫門內祊之於東方市朝之於西方失之矣家語曲禮公西赤問陳氏禮書曰禮有正祭之祊有繹祭之祊於祊求諸逺者也祊於西尊其右也詩云以往蒸嘗或剝或烹或肆或將而繼之以祝祭於祊此正祭之祊也禮言設祭於堂為祊乎外家語言繹祭於祊此繹祭之祊也正祭之祊位於門內之西室故毛氏釋詩以祊為門內繹祭之祊位於門外之西室故鄭氏釋郊特牲以祊於門外蓋祊其位也繹其祭也賓尸其事也繹祭謂之祊而祭之祊不謂之繹繹之名特施於天子諸侯賔尸之名亦施於卿大夫鄭氏以卿大夫賔尸在堂故謂祊於門外之西室繹又於其堂孔頴達申之云求神在室接尸在堂於義或然卿大夫有賔尸則正祭無加爵無陽厭下大夫士無賓尸故正祭有加爵有陽厭必於明日春秋書辛巳有事於太廟壬午猶繹榖梁曰繹者祭之明日之享賔也公羊曰繹者何祭之明日是也賓尸則祭日而已儀禮有司徹掃堂攝酒迎尸而賓之是也繹於明日則異牲詩曰自羊徂牛是也賔尸於祭日則用正祭特牲而已有司徹燅音尋尸爼是也蓋正祭重而主於禮神繹輕而主於禮尸重故省牲視具在宗伯輕故使士焉則絲衣其紑載辨俅俅者士而爵辨絲衣者也主於禮神故在室主於禮尸故在堂則自堂徂基掃堂設筵者皆堂上之事也考之儀禮大夫正祭不迎尸而賓尸迎之正祭有祝而賓尸有侑正祭先薦後獻賓尸先獻後薦正祭之鼎五賓尸之鼎三正祭之牲體進下賓尸之牲體進腠正祭之魚縮載賓尸之魚橫載正祭主人獻尸而尸酢之於獻祝佐食之前賓尸主人獻尸而尸酢之於獻侑之後凡此皆與正祭不同則主人迎尸尸後酢主人所以伸主人也先獻後薦而進下所以醉飽尸也其飲至於無算其罰至於兕觥則繹祭可知矣通典祭之日王服衮冕而入廟工則奏以王夏王入立於東序后則副褘而入立於西序尸入之後乃就於西房轉就西房者所以放隂陽之義禮器云大明生於東月生於西隂陽之分夫婦之位也尸服衮冕而入工則奏肆夏王及於室而不迎尸祭統云君迎牲而不迎尸所以别嫌也於是玉以圭瓚酌雞彞之鬱鬯以獻尸尸以祼地降神尸祭之啐之奠之此為祼神之一獻也后乃璋瓚酌鳥彞之鬱鬯以獻尸尸祭之啐之奠之此為二獻也王乃袒而迎牲於門牲入門則奏昭夏王親牽牲公卿大夫執幣以從入而告於庭云博碩肥腯王乃麗牲於碑親執鸞刀啓其毛血以授於祝祝入告於幽全之義遂乃殺牲始行朝踐之事凡牲廟用一牢公羊傳云周公白牡魯公騂剛羣公不毛朝踐之時尸出於室坐於戶西南面主在西東面郊特牲云詔祝於室坐尸於堂鄭元注云謂朝踐時迎尸於户外時尸主之前薦以籩豆脯醢而已乃取牲膟膋燎於爐炭入室詔神於室於時王親洗肝於鬱鬯而燔之以墮於主主人親制其肝所謂制祭也次乃升牲首於室中北墉下尊首尚氣之義也時又薦腥於尸主之前謂之朝踐於時王乃以玉爵酌獻素何反下同樽中醴齊以獻此三獻也后於是薦朝事之籩時堂上以夾鍾之調歌堂下以無射之調作大武之樂后於是亦以玉爵獻樽醴齊以獻尸此四獻也時堂下之樂亦作也於是王自阼階而西酌獻后從西階東酌獻所謂禮交動乎上樂交應乎下至薦熟之時謂之饋食先薦熟於堂視陳此設饌之禮非謂即食設饌之時王及尸皆有倚住之處設機於傍故云變機也設席之後更設尸主之席於堂在戶內西方東面尸在其北布尸主席設乃遷所設於堂上之饌置尸主坐前時祝又以斚酌奠奠於饌南所謂天子奠斚又取腸間脂焫之蕭合羶薌鄭云羶當為馨字之悮燎於爐炭所謂臰陽達於墻屋乃迎尸主入室即席舉奠斚將祭之時祝則詔王拜妥尸郊特牲云舉斚角詔妥尸是也拜訖尸遂祭酒以菁茅謂之縮酒左傳云爾貢苞茅不入王祭不供無以縮酒尸遂啐之奠之尸乃坐於是王以玉爵酌象樽盎齊以獻尸五獻也時后薦饋食之籩又以玉爵酌象樽醖齊以獻尸此六獻也王及后每獻皆作樂如初尸食訖王以玊爵酌朝踐之獻樽醴齊以酳尸謂之朝獻亦樽相因此七獻也后薦加事之豆籩尸飲七王可以獻公尸飲訖受祝祝酌清酒以授尸尸以酢王王乃設酢席於户內尸少祭饌黍稷并假福王王乃以出量人與鬱人受之周禮宗伯職云量人與鬱人受舉之卒爵后以玉爵酌饋食象樽之盎齊以獻尸日再獻亦樽之相因尸酢后如王之法飲酢酒此八獻也尸飲八王可以獻卿諸侯為賔者以玊爵酌盎齊備卒食三獻合九獻凡王及后各四諸侯為賔者一也尸飲九王可以獻大夫士取惠均於下之義尸飲訖又酢諸臣如后之法自九獻之後遂降冕而總干舞大武之樂以樂尸祭統云君執干戚就舞位冕而總干率其羣臣以樂皇尸九獻之後更為嗣子舉奠與羣臣進獻更行三爵皆謂之加爵則用璧散璧角明堂位云用璧角即行旅酬無算之爵樂作亦然旅酬既訖則尸出尸出之後則嗣子餕之文王世子云登餕受爵以上嗣尊祖之道鄭元注云上嗣祖之正統厥眀更以一牢繹於祊於廟門之外而行其禮按儀禮所存唯少牢饋食特牲饋食為大夫祭宗廟之禮而天子諸侯之祭禮亡矣其載於周禮禮記者雖略可考見而參錯渙散後之有天下者雖欲一遵古禮行之而其節文脈絡不相連屬此所以病其難行也晦庵嘗欲以二禮所注疏中所言紬繹其節奏之先後為天子祭禮而其書未成以授其門人勉齋黃公黃又未及成而以授信齋楊公信齋之書出而後學者開卷始可以洞窺其奏節自致齋而祼獻自祼獻而饋獻以至加爵徹爼旅酬登餕繹祭之儀大概以經之所言為主而經之所未備者則取注疏之説以備之注疏之所未備者又約儀禮所載大夫士之禮以推之其説始粲然有條足為百代不刋之典然杜氏通典亦嘗採經傳及注疏之説條陳九獻之禮特略而未備且與信齋之説小異故並存之文獻通考卷九十六
