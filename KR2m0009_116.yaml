人並騎在後郎簿十隊隊各五十人絳袍將一人騎鞉各一人在前督戰伯長一人歩在後騎皆持矟次大㦸一隊九尺楯一隊刀楯一隊弓一隊弩一隊五隊隊各五十人黒袴褶將一人騎校鞉角各一人歩在前督戰伯長各一人歩在後金顔督將并領之其屬車因後漢制復制御衣御書御軺御藥等車駕牛陽燧四望皀輪小形晉自過江之後舊章多缺元帝踐極始造大路戎路各一皆即古金根之制也無復充庭之儀至於郊祀大禮則權飾餘車以周用六師親征則用戎路去其盖而乗屬車但五乗而已加綠油幢朱絲絡飾青交路黄金塗五采其輪轂猶素兩箱無金錦之飾其一車又是軺車舊儀天子所乗駕六是時無復六馬之乗五路皆駕四而已同用黒是為元牡無復五時車有事則權以馬車代之建旗其上其後但以五色木牛象五時車竪旗於牛背行則使人輿之牛之義盖取其負重致逺而安穏也旗常纒而不舒飾所謂徳車結旌者也惟天子親戎五旗舒飾所謂武車綏旌者也指南車過江亡失及義熙五年劉裕屠廣固始復獲焉乃使工人張綱補緝周用十三年裕定闗中又獲司南記里諸車制度始備其輦過江亦亡制度太元中謝安率意造焉及破苻堅於淮上獲京師舊輦形制無差大小如一時人服其清記義熙五年劉裕執慕容超獲金鉦輦豹尾舊式猶存元興中屬車唯九乗符堅敗又得偽車輦增為十二乗宋孝武大明中尚書左丞荀萬秋改造五輅依晉金根車加赤漆􅏹畫玉飾諸末建青旗十有二旒駕駟以元復因漢之安車章施羽葆盖以祀以金根為金輅建青旗駕元馬四羽葆盖以賔象革木輅並擬玉輅象輅視朝革輅即戎二輅並建赤旂駕元馬四木輅建赤麾以田駕赤馬四大事法駕五輅俱出孝建中尚書令王宏議屬車起秦八十一乗及三十六乗並不出經典自胡廣蔡邕𫝊說耳又是從官所乗非常副車正數江左五乗則儉不中禮帝王文物旗旒皆十二為莭今宜依禮十二乗為制齊武帝永平初伏曼容議齊徳尚青車旗先青次赤次白次黒軍容戎事宜依漢道行運之色因宋金根車而修玉輅畫輪金塗兩箱上望板前優逰通禄金塗鏤鍱碧紋箱鑿縷金簿帖兩箱外織成衣兩箱裏金塗鏤面釘玳瑁帖望板箱上帖金博山優逰上和鸞立花趺銜鈴銀𢃄玳瑁䇶優逰下隠膝裏施金塗鏤面花釘織成文優逰横前施玳瑁帖金塗花釘金塗倒龍後損鑿銀玳瑁龜甲金塗花沓望板金塗受福望龍諸校飾軛及諸末皆螭龍首龍形板在車前銀帯花獸金塗受福緣裏邊鏤鍱玳瑁織成衣裏金塗鏤面花釘外金塗博山辟邪障鳳凰銜花升盖金塗鏤鍱二十八爪支子花黄錦升衣複碧絹漆布緣油頂絳絲織成顔芚徒昆反赭舌孔雀毛複錦綠紋隨隂懸諸珠蜯佩金塗鈴雲朱結人綬雜色真孔雀眊一轅漆畫車衡銀花帯衡上金塗博山四鸞鳥立花趺銜鈴龍首銜軛棰翟尾上下花沓絳緑絲的望繩八枚旂十有二斿畫升龍竿首金塗龍銜大騶幡真眊棨㦸織成衣金塗沓駐及受福金塗鴈鏤鍱漆安立牀在車中錦複黄紋為安立衣錦複黄紋障泥八幅長九尺緑紅錦芚𢃄織成花五輅江左相承駕駟左右騑為六施絳絲遊御繩其重轂貳轄飛軨幡赤油金紫真眊左纛置左騑馬軛上金鑁方釳繁音鞶纓金塗紫皮帶真眊横在馬膺前其鏤鍚皆如古制初加玉輅為重盖㨗寳鳳凰綴金鑷珠璫玉蜯珮四角金龍銜五采眊又麒麟頭加以采畫馬首戴之竟陵王子良啓曰凡盖圓象天軫方象地上無二天之儀下設兩盖之飾求諸志録最為乖衷又假為麟首加乎馬頭事不師古鮮或可施至建武中眀帝乃省重盖等金輅之飾如玉輅而減少象輅減金輅革輅如象輅而尤減木輅如革輅建大赤麾首施大騶幡玉輅金輅建碧旂象輅木輅建赤旂齊輦因宋制名小輿小輿即今之犢車軿車之流盛増其飾竹蓬箱外鑿鏤金簿碧紗衣織成芚錦衣箱裏及仰頂隠膝後户金塗鏤面釘瑇瑁帖金塗松精登仙花鈿綠四望紗萌子上下前後眉鏤鍱轅枕長角龍白牙蘭瑇瑁金塗校飾漆障形板在蘭前金銀花獸攫天伐龍師子鏤面榆花鈿金龍虎扶轅軛上金鳯凰鈴鏁銀口帶星後梢瑇瑁帖金塗花沓銀星花獸幔竿杖金塗龍牽縱横長網又制卧輦校飾如坐輦不堪服用復制小輿形如軺車小行幸則乗之梁車輅初因齊制天監三年五輅旗麾同用赤而斿不異以從行運所尚也七年帝據周禮玉輅以祀金輅以賔今祀乗金輅詔下詳議周捨謂金輅為齊車本不闗於祭祀於是改陵廟皆乗玉輅轡以朱絲梁制小輿似軺車金裝漆畫地八横元正大㑹乗出上殿西堂舉哀亦乗之行則從後又制歩輿方四尺上施隠膝人輿上殿天子至下賤皆得乗之復制副輦加笨歩本反如犢車通幰朱絡謂之蓬輦陳初因梁文帝天嘉初令劉仲舉議錯綜漢晉舊飾造玉金象革木等五輅皆金簿交龍為輿倚較文豹伏軾虬首銜軛左右吉陽筩鸞雀立衡􅏹文畫轓綠油盖黄紋裏相思橑金華末邪注旂旗於車之左各依方色置棨㦸於車之右韜以黻繡獸頭幡長丈四尺懸於㦸杪玉輅正副同駕六馬餘皆駕駟並金义髦揷於翟尾玉為鏤鍚以綵畫蛙蟆幡綴兩軸頭即漢之飛軨五路兩箱後皆玳瑁為鵾翅金銀雕飾兩箱裏衣紅錦金花帖釘上用紅錦為後襜青紋純帶夏花簟冬綺繡縟後魏道武帝天興初修軒冕制乾象等輦草創制度多違舊章至孝文太和中儀曹令李韶更議改正唯􅊀五輅各依方色其餘車輦猶未能具眀帝熙平中侍中崔光等議大造車服五輅並駕五馬亦無經據道武帝天興二年命禮官採古法制三駕鹵簿一曰大駕設五輅建太常屬車八十一乗平城令代尹司𨽻校尉丞相奉引太尉陪乗太僕御從輕車介士千乗萬騎魚麗鴈行前驅皮軒闟㦸芝盖雲䍐指南後殿豹尾鳴笳唱上不作鼓吹軍戎大祠則設之二曰法駕屬車三十六乗平城令代尹太尉奉引侍中陪乗奉車都尉御廵狩小祠則設之三曰小駕屬車十二乗平城令太僕奉引常侍陪乗奉車郎御逰宴離宫則設之天賜二年初改大駕魚麗鴈行更為方陣鹵簿列歩騎内外為四重列標建旌通門建五色車旗各處其方諸王導從在甲騎内公在幢内侯在歩矟内子在刀楯内五品朝臣夹列乗輿前兩箱官卑者先引王公侯子車後魏制除伯男爵旒麾盖信幡及散官褠服一皆絳黒天興初始修軒冕制乾象輦羽葆圓盖畫日月五星二十八宿天街雲䍐星經曰昴天子出旄頭畢為天街䍐畢以前驅山林竒瑞遊麟飛鳳朱雀元武騶虞青龍駕二十四馬又制大樓輦車龍輈加玉飾四轂六衡方輿圓盖金雞樹羽寳鐸流蘇鸞雀立衡螭龍銜軛建太常畫升龍日月駕二十牛又制象輦左右金鳳白鹿仙人羽葆流蘇金鈴玉佩初駕二象後以六駝代之復有游觀小樓等輦駕十五馬車等草創修制多違舊章北齊車服制度多因後魏天保中所乗是太和中李韶所制五輅後周依周禮設六官置司輅之職掌公車之政辨其名品物色皇帝之輅十有二等一曰蒼輅以祀昊天上帝二曰青輅以祀東方上帝三曰朱輅以祀南方上帝及朝日四曰黄輅以祭地祇中央上帝五曰白輅以祀西方上帝及夕月六曰元輅以祀北方上帝及感帝神州此六輅通漆之而無他飾即周木輅遺象也馬皆疏面斿就以方色俱十有二七曰玉輅以享先皇加元服納后八曰碧輅以祭社稷享諸先帝食三老五更享諸侯耕籍九曰金輅以祀星辰視朔十曰象輅以望秩羣祀十一曰革輅以廵兵即戎十二曰木輅以田獵行鄉畿此六輅以六色漆畫之用玉碧金象革物飾諸末錫面金鉤就以五采俱十有二其輅之飾重輪重較加茸焉皇帝之輅輿廣六尺有六寸畫輪輈衡以雲牙箱軾􅏹文内畫以雜獸獸伏軾鹿倚較三辰之常元青蒼等旗畫繢之六仞曵地設和鸞以莭趨行圓盖方輿以象天地後周太常畫三辰日月五星旂畫青龍天子升龍諸侯交龍旟畫朱鳥旌畫黄麟旗畫白虎旐畫元武皆加雲氣其旜物在軍亦畫其事號加以雲氣徽幟亦如之通帛為旜雜帛為物號所書其與姓名之事號徽幟亦書之旌莭又畫白虎而析羽於其上又司常掌旗物之藏通帛之旗六以供郊祀蒼赤黄白元等旗三辰之常畫繢之旗六以充玉輅之等一曰三辰之常二曰青龍旗三曰朱雀旟四曰黄麟旌五曰白虎旂六曰元武旐皆左建旗而右建闟㦸又有繼旗四以施軍旅一曰麾以供軍將二曰旞以帥師三曰音伐以供旅帥四曰斾以供卒長諸公方輅碧輅建旂金輅建旟象輅建物木輅建旐諸侯自金輅而下如諸公之旗諸伯自象輅而下如諸侯之旗諸子自犀輅而下如諸伯之旗諸男自篆輅而下如諸子之旗三公犀輅貝輅篆輅建旟旐夏篆夏縵及輚車建物孤卿以下各以其等建其旗旌杠皇帝六仞諸侯五大夫四士三斿皇帝曵地諸侯及軹大夫及轂士及軫凡注毛於杠首曰綏析羽曰旌全羽曰旞其縿皇帝諸侯加以孤韣闟㦸方六尺而被之以黻唯皇帝諸侯軨建焉闟㦸杠綢與旗同隋開皇元年内史令李徳林奏後魏輿輦乖制請廢唯留後魏太和時李韶所制五輅北齊所尊者後著令制玉輅青質重箱盤輿左龍右虎金鳯翅畫􅏹文軛左立纛金鳯一在軾前八鸞在衡二鈴在軾龍輈之上前設障塵青盖裏繡斿帶金博山綴以鏡子下垂八珮樹四十葆羽輪皆朱班重牙復轄左建太常十有二斿皆畫升龍日月其長曵地右載闟㦸長四尺闊三尺黻文旗首金龍頭銜鈴及緌垂以結綬駕蒼龍金鑁方釳挿翟尾五隻鏤鍚鞶纓十有二就皆五采繒罽為飾天子祭祀納后則乗之金輅赤質左建旟畫飛隼右建闟㦸盤輿鳳等並同玉輅駕赤騮臨朝㑹同饗射飲至則乗之象輅黄質左建旌畫㳺麟右建闟㦸駕黄騮祀后土則乗之革輅白質鞔以革左建旗畫騶虞右建闟㦸駕白騮廵狩臨兵則乗之木輅黒質漆之左建旐畫元武右闟㦸駕黒騮田獵則乗之其輅並駕六馬馬飾同玉輅復置安車重輿曲壁紫油纁裏通幰朱絲絡網朱鞶纓駕赤騮臨幸所乗按隋氏五輅逺酌周禮旗斿藻飾近約漢制文質相半文帝既平陳因為法令憲章往古大駕依秦法駕依漢小駕依宋煬帝大業初復偹大駕八十一乗並如犢車紫通幰朱絲絡黄金飾駕一牛在鹵簿中單行正道後帝嫌多大駕減為三十六乗法駕宜用十二小駕除之可也詳見北史閻毘𫝊隋制輦而不施輪通幰朱絡飾以金玉而人荷之又依梁制副輦復制輿如輦而小宫苑私宴御之小輿方形同幄帳自閤内升殿御之文獻通考卷一百十六
