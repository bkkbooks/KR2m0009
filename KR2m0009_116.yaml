body:
  text: 文獻通考卷一百十六鄱陽馬端臨貴與著王禮考十一乘輿車旗鹵簿昔人皇氏乘雲駕六羽出谷口或云祗車也及五龍氏乘龍上下以治古史考之黃帝作車至少皥始駕牛及陶唐氏制彤車乘白馬則馬駕之初也黃帝振兵教熊羆貔貙虎制陳法設五旗五麾有虞氏因彤車而制鸞車鸞有鸞和也有虞氏之旗有虞氏當言綏夏后氏當言旗此蓋錯誤也綏謂注旄牛尾於杠首所謂大麾周禮王建大麾以朝夏后氏因鸞車而制鉤車鉤有曲蓋曲蓋者謂曲前闌也鉤之言不揉自曲俾車正奚仲建斿旐尊卑上下各有等級夏后氏之綏綏當為旗此錯誤夏后氏漸文既注旄竿首又有旒縿夏后氏駱馬黑鬛駱白黑相間也此馬白身黑鬛故云駱也夏尚黑故云黑鬛夏后末代制輦按輦人所輦也傅元子曰夏名輦曰輿車司馬法曰夏后二十人而輦殷因鉤車而制大輅大輅車輅也禮緯曰山車乘鉤乃鉤車之象昔成湯用而郊祀有山車之瑞山車亦謂之桑根車似金根之色亦謂之大輅殷之大白謂白色旗殷尚白故隨代之色無所畫也殷人白馬黑首純白似凶故黑首亦從所尚也殷曰胡奴車即輦也殷十八人而輦周因鉤車以制木輅約木以加飾為王之五路一曰玉路鍚樊纓十有再就建太常十有二斿以祀王在焉曰路玉路以玉飾諸末鍚馬面當盧刻金為之所謂鏤鍚也樊讀如鞶帶之鞶謂今馬大帶也鄭司農云纓謂當胸以削革為之三就三重三匝也元謂纓今馬鞅玉路之樊及纓皆以五彩罽飾之十二就就成也太常九旗之畫日月者正幅為縿斿則屬焉鍚疏曰飾諸末凡車上之材於末頭皆飾之鍚眉上曰刻金飾之纓夾馬頸故以馬鞅解之就謂毛氂以為罽染五采飾之一采一匝為一就就數雖多亦一采一匝也鉤在膺前玉路有鍚亦有鉤上得兼下金路有鉤無鍚下不得僭上金路鉤樊纓九就建大旗以賔同姓以封金路以金飾諸末鉤婁頷之鉤也金路無鍚有鉤亦以金為之其樊及纓以五采罽飾之而九成大旗九旗之畫交龍者以賔以會賔客同姓以封謂王子母弟率以功德出封雖為侯伯其畫服猶如上公若魯衛之屬其無功德各以親疏食采畿內而已象路朱樊纓七就建大赤以朝異姓以封象路以象飾諸末象路無鉤以朱飾勒而已其樊及纓以五采罽飾之而七成大赤九旗之通帛以朝以日視朝異姓王甥舅疏云凡言勒者馬之轡飾皆是革路龍勒條纓五就建大白以即戎以封四衛革路鞔之以革而漆之無他飾龍駹也以白黑飾韋雜色為勒條讀為絛其樊及纓以絛絲飾之而五成不言樊蓋脫耳以此言條知玉路金路象路飾樊纓皆不用金玉象矣大白殷之旗猶周大赤蓋象正色也即戎謂兵事四衛四方諸侯守衛者蠻服以內疏曰金玉象路皆以革鞔但更有玉金象為飾故謂之他物且有玉金象之名今此革路亦用革鞔而無他物則名為革路而已龍勒雜色韋為勒木路前樊鵠纓建大麾以田以封蕃國木路不鞔以革漆之而已前讀為緇翦之翦翦淺黑也木路無龍勒以淺黑飾韋為樊鵠色為纓不言就數飾與革路同大麾不在九旗中以正色言之則黑夏后氏所建田四時田獵蕃國謂九州之外夷服鎮服蕃服疏曰木上無革故言木路無龍勒降於革路也凡五等諸侯所得路者在國祭祀及朝天子皆乘之但朝天子之時乘至天子館則舍之於館諸侯自相朝赤應乘之親迎皆乘所賜路陳氏禮書曰古者服牛乘馬引重致逺以利天下則車之作尚矣或曰黃帝作軒冕不可考也車之制象天以為蓋象地以為輿象斗以為杠轂象二十八星以為橑象日月以為輪輻前軾而後户前軌而後軫旁輢而首以較下軸而銜以轐對人者謂之對車如舟者謂之輈揉而相迎者謂之牙輈之曲中謂之前疾軛之上平謂之衡衡之材與輿之下木皆曰任以其力任於此也轂之端與輢之下木皆曰軹以其旁止於此也軫可以名輿可以名車逹常可以名部軫前橫木可以名輅此又因一材而通名之也其為車者有長轂者有短轂者有杼輪者有侔輪者有反揉者有仄揉者有兩輪者有四輪者有有輻者有無輻者有曲轅者有直轅者輦直轅有一轅者有兩轅者有直輿者有曲輿者鉤車曲輿有廣箱者有方箱者有重較者有單較者或駕以馬或駕以牛或鞔以人或飾以物或飾以漆或朴以素要皆因宜以為之制稱事以為之文也然禮有屈伸名有抑揚故論其任重則雖度人之牛車亦與大夫同稱大車論其等威則雖諸侯之正路於王門曰偏駕而已又曰路大也玉路金路象路以金玉象飾之也革路鞔而漆之木路漆之而不鞔則有飾者皆鞔而漆鞔而漆者無飾也玉路鍚樊纓十有再就金路鉤樊纓九就象路朱樊纓七就革路龍勒條纓五就木路前樊鵠纓者鍚在顱鉤在額朱者勒之色龍者勒之飾詩言鏤鍚左傳言鍚鸞和鈴昭其聲也莊周言齊之以月題鍚白金也鏤其文也月題其象也則鍚象月而鏤之又昭其聲也詩言鉤膺采芑曰鉤膺鞗革韓奕曰鉤膺鏤鍚則鉤在膺前赤金為之爾雅轡首謂之革詩曰鞗革金厄儀禮士纓轡貝勒夫諸侯之鞗革有金厄毛義曰厄鳥蠋也士之勒有貝飾則王之革路有龍勒宜矣巾車行人言樊纓禮記左傳皆作繁纓繁纓十有再就九就七就五就之别此左傳所謂遊纓昭其數也杜預曰纓在馬膺前如素裙則纓非鞅也樊然為鞅之飾耳杜子春謂故書鵠或為結則前樊結纓者無就而結之爾條則不結則條纓垂而長者也然則鍚也鉤也朱也龍勒也玉金象革四路蓋皆有之采芑言方叔之車鉤膺鞗革韓奕言韓侯車鉤膺鏤鍚夫方叔在征則革路矣而有鉤膺釋詩者謂方叔乘金路然金路以封同姓而方叔不必同姓又非就封其於師中宜乘革路韓侯就封則象路矣而有鏤鍚是鍚不特施於玉路而鉤不特施於金路也以此觀之則禮所謂鍚也鉤也朱也龍勒也條也各舉其一互相􅊀也若夫木車則質而已故前樊結纓則結其前而非全結也巾車言五者之飾皆其首面頷膺之著者也故不及腹帶鄭康成以樊為鞶𢃄之鞶又以龍為駹條為絛前為翦非也纓蓋用組為之與冠纓同五采一匝為就與圭繅冕旒之就同鄭司農以士喪馬纓三就為削革三重康成謂樊纓以五采罽飾之又謂金路無鍚有鉤鵠纓就數與革路同殆不然也禮曰丹漆雕幾之美素車之乘詩曰路車有奭毛氏曰奭赤貌路車之飾皆丹漆矣然禮言玉路以祀又言素車之乘蓋王之祀天自國至大次則乘玉路自大次以升壇則乘素車猶之聽祭報以皮辨及祭則服大裘冕也巾車金路以賔同姓以封象路以朝異姓以封革路以即戎以封四衛木路以田以封蕃國言同姓以封而不言以封同姓言異姓以封而不言以封異姓則嫌以賔獨賔同姓以朝獨朝異姓故也同姓一異姓二以異姓對庶姓則庶姓非異姓也司儀土揖庶姓時揖異姓孔子以南宫緇為異姓則異姓姻也庶姓非姻也以異姓對同姓則庶姓亦異姓而已故巾車金路封同姓象路封異姓禮記於侯授同姓謂之伯父叔父異姓謂之伯舅叔舅凡此所謂異姓者庶姓預之也同姓亦曰內姓異姓亦曰外姓左傳曰同姓選親外姓選舊又曰書曰大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前禮器曰大路繁纓一就次路繁纓七就郊特牲曰大路繁纓一就先路三就次路五就然則周官馭玉路者謂之大馭則玉路謂之大路獨周為然若夫商之大路則木路而已春秋傳與荀卿曰大路越席禮器與郊特牲曰大路繁纓一就眀堂位曰大路商路也孔子曰乘殷之路皆木路也然禮器與郊特牲言大路繁纓一就則同其言次路繁纓五就七就則不同者先王之路降殺以兩反此而加多焉蓋亦以兩而已大路一就先路三就則次路有五就七就者矣書言次路以兼革木二路則商之次路五就七就庸豈一車耶鄭氏以七就為誤是過論也夫綴路金路也以其綴於玉路故也先路象路也以其行道之所先故也次路革路木路也以其次於象路故也周官典路若有大祭祀則出路大喪大賔客亦如之凡會同軍旅弔於四方以路從蓋王之行也乘玉路而先之以象路次之以革路木路而金路綴於玉路之後觀書先路在左孰之前而居西次路在右孰之前而居東春秋之時鄭侯以先路三命之服賜子展以次路再命之服賜子産魯以先路三命之服賜晉三帥以一命之服賜司馬輿師以下則先路固貴於次路矣孔安國亦以先路為象路蓋亦有所受之也諸侯有先路後路亦有大路樂記亦曰大輅天子之輅所以贈諸侯雜記諸侯之賵有乘黃大路相襚以後路與冕服先路與褒衣蓋諸侯之大輅則金路謂之大路猶熊侯謂之大夫侯春秋傳稱王賜晉文公以大路之服僖二十八年祝鮀言先王分魯衛晉以大路定四年王賜鄭子僑以大路襄十九年王賜叔孫豹以大路襄二十四年杜氏以賜魯衛晉之大路皆金路賜穆叔子僑之大路當是草木二路此不可考司常掌九旗之物名各有屬以待國事日月為常交龍為旗通帛為旜雜帛為物熊􅍑為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌物名者所畫異物則異名也屬謂徽識也大傳謂之徽號今城門僕射所被及亭長著絳衣皆其舊象通帛謂大赤從周正色無飾雜帛者以帛素飾其側白殷之正色全羽析羽皆五采繫之於旞旌之上所謂注旄於干首也凡九旗之帛皆用絳疏曰九旗之中旜物旌旞不畫此總言之故皆云畫耳天子之衣無日月星故有升龍降龍諸侯不得與天子同故其衣有升龍無降龍天子之旗有日月星辰諸侯旌旗無日月星故有升龍降龍升龍象朝王降象還本國也旜不畫異物帛而已物赤中白旁旗畫鳥隼隼象勇鳥象捷疾旐畫龜蛇龜蛇象避難道車載旞道車象輅也王以朝夕燕出入所乘全羽為旞全羽析羽皆象文德夏采注云禹貢徐州貢夏翟羽有虞氏為綏後染羽用之無帛遊車載旌析羽為旌大麾以田夏后氏之正色大白以即戎殷之正色翿旌君射於國中以翿旌為獲白羽與朱羽揉鴻脰韜杠三仞龍􅏧君射於境所用也畫龍於通帛之􅏧上陳氏禮書曰釋名曰旗期也言與衆期於下明堂位曰有虞氏之綏夏后氏之綢練商之崇牙則其制有自矣司常日月為常交龍為旗熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌則其等有辨矣然熊虎為旗而九旗亦謂之旗經傳凡言旌旗是也日月為常而諸侯之旗亦謂之常行人公侯伯子男建常是也交龍為旗天子之常亦謂之旗覲禮天子載大旗是也析羽為旌天子至大夫士之旗亦謂之旌樂記龍旗天子之旌鄉射旌各以其物是也爾雅曰素錦綢杠纁帛縿素升龍於縿練旒九飾以組維以縷蓋揭旗以杠綢杠以錦正幅為縿為旒旒亦曰飾縿以纁則旒績矣左傳曰績茷是也升龍素則降龍青矣曲禮曰左青龍是也蓋青陽也素隂也陽在上而降隂在下而升交泰之道也覲禮曰天子載大旗升龍降龍周禮曰交龍為旗又曰諸侯建旗則天子諸侯之旗龍章一也司馬法謂旗章夏以日月上眀商以虎上威周以龍上文先儒謂諸侯畫交龍一象其升朝一象其下復然商頌曰龍旗十乘則商不聞其以虎也天子之旗亦升龍降龍不象其升朝下復也先儒又謂天子之旌髙九仞仞八尺諸侯七仞大夫五仞士三仞死者以尺易仞天子九尺諸侯七尺大夫五尺士三尺射禮無物則翿旌杠三仞士喪禮無銘則緇銘而杠三尺其説蓋有所受也舊圖杠首為龍首銜結綬及鈴蓋承唐制然歟又曰周禮司常日月為常巾車王乘玉路建太常十有二斿以祀覲禮天子乘龍載大旗象日月升龍降龍郊特牲曰旗十有二旒龍章而設日月象天也魯頌與明堂位言魯用天子之禮亦曰龍旗承祀旗十有二旒日月之章左傳曰三辰旗旗昭其眀也然則常有三辰升龍降龍設崇牙􅊀􅋃矢弧以張縿也鄭氏謂崇牙者為重牙以飾旒之側飾之以旄垂之以鈴人臣有功則書於其上考工記曰􅋃旌枉矢以象􅋃鄭氏曰畫枉矢恐不然也眀堂位曰乘大路載􅋃韣覲禮侯氏載龍旗􅋃韣左傳曰鍚鸞和鈴爾雅曰有鈴曰旗書曰厥有成績紀于太常司勳凡有功者銘書於王之太常觀此則太常之制可知矣太常不特祀天而已至於拜日禮月祀方眀禮四瀆禮山川秋治兵冬大閲皆載焉祀方明遂會諸侯則所會之旗與朝之大赤異矣治兵大閲然後田則治兵大閲之旗與田之大麾異矣鄭氏謂春夏之田用大麾秋冬建太常王之自將建太常不自將建大白然後治兵非即戎也治兵大閲未即田也孰謂行師而不建大白田而不建大麾乎然常之三辰則日月北斗而已與衣服之畫星辰不同觀曲禮曰招搖在上穆天子傳稱天子葬盛姬建日月七星蓋旗以指物則所畫者不過北斗耳漢郊祀歌曰招搖靈旗則後世旗亦畫北斗也周曰輜車即輦也不知何年去其輪周十五人而輦秦平九國蕩滅典籍舊制多亡因金根車用金為飾謂金根車而為帝軫金根以金為飾黑旗皀旒以從水德復法水數駕馬以六五子之歌曰若朽索之馭六馬則六馬非始於秦制但法水德相符耳古者諸侯二車九乘秦滅九國兼其車服故大駕屬車八十一乘周制凡良車散車任馬者其用無常以給遊燕及恩惠之賜從車所載財貨輜重之車車後開户作之有功有沽良車功多散車功少鄭元曰作之有功有沽沽粗也則屬車之流周末諸侯有二車九乘秦滅而兼之薛綜曰屬者相連屬也皆在後二行法駕半之左右分行其車皆皀蓋赤裏木轓輜戈矛弩箙尚書御史所載最後一乘懸豹尾豹尾以前為省中小學漢官篇曰豹尾過後罷屯解圍胡廣曰施之道路故須過後屯圍乃得解所以戒不虞也淮南子曰軍正執豹皮所以制正其衆也省中即今之仗內秦以輦為人君之乘古謂人牽為輦宋萬以乘車輦其母秦始皇乃去其輪而輿之漢代遂為人君之乘漢制乘輿大駕備車千乘騎萬匹屬車八十一乘公卿奉引太僕大將軍驂乘祀天於甘泉用之三輔黃圖天子出車駕次第謂之鹵簿有大駕有法駕有小駕大駕則公卿奉引大將軍驂乘太僕御屬車八十一乘作三行尚書御史乘之最後一乘垂豹尾豹尾以前皆為省中􅊀千乘萬騎出長安出祠天於甘泉􅊀之百官有其儀注名曰甘泉鹵簿法駕京兆尹奉引侍中驂乘奉車郎御屬車三十六乘石林葉氏曰大駕儀仗通號鹵簿蔡雍獨斷已有此名唐人謂鹵櫓也甲楯之别凡兵衛以甲楯居外為前導捍蔽其先後皆著之簿籍故曰鹵簿因舉南朝御史中丞建康令皆有鹵簿為君臣通稱二字别無義此説為差近或又以鹵為鼓簿為部謂鼓駕成而部伍不知鹵何以謂之鼓又謂石季龍以女騎千人為一鹵部簿乃作部皆不可曉今有鹵簿記宋宣獻公所修審以簿籍之簿則既云簿不應更言記漢王車黃屋左纛李斐曰天子車以黃繒為蓋裏纛毛羽幢也在乘輿車衡左方上注之蔡雍曰以氂牛尾為之如斗或在騑頭或在衡或在最後左騑馬騣上鸞旗在前屬車在後師古曰鸞旗編以羽毛列繫幢旁載於車上大駕出則陳於道而先行翠鳳之駕師古曰天子乘車為鳳形而飾以翠羽也楊雄傳旌旗鼓車旄頭先驅師古曰凡此皆天子之制又東方朔傳應劭云旄頭以羽林為之髮正向上而長衣繡衣在乘輿之前驂乘師古日乘車之法尊者居左御者居中又有一人處車之右以備傾側是以戎事則稱車右其餘則曰驂乘蓋取三人為名義耳陳平降漢漢王使驂乘周緤以舍人從髙祖常為驂乘文帝自代來令宋昌驂乘文帝朝東宫趙談驂乘袁盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人獨奈何與刀鋸餘人共載於是上笑下談談泣下車武帝時金日磾遷侍中駙馬都尉光祿大夫出則驂乘宣帝始立謁髙廟大將軍光驂乘上內嚴憚若有芒刺在背後車騎將軍張安世代驂乘上從容肆體甚安髙祖為沛公旗幟皆赤由所殺蛇白帝子所殺者赤帝子故也司馬相如傳乘鏤象六玉蚪張楫曰鏤象象路也以象牙疏鏤其車輅六玉蚪謂駕六馬以玉飾其鑣勒有似玉蚪龍子有角曰蚪拖霓旌析羽毛染以五采綴以鏤為旌有似虹霓之氣靡雲旗畫熊虎為旒於旗似雲氣前皮軒後道遊皮軒之上以赤皮為重蓋天子時出道車五乘遊車九乘言皮軒最居前而道遊次皮軒之後也揚雄傳乘輿乃登夫鳯凰兮翳華芝師古曰鳯凰者車以鳯凰為飾也翳蔽也以華芝為蔽也駟蒼螭兮六素蚪四六駕數也螭似龍一名螭流星旄以電燭兮咸翠蓋而鸞旗屯萬騎於中營兮方玉車之千乘方並也張耀日之元旄揚左纛被雲稍稍與旓同奮電鞭驂雷輜鳴洪鐘建五旗漢舊儀云黃帝車駕建五旗蓋謂五色之旗也以木牛承其下取其負重致逺建九旒六白虎載靈輿立歷天之旗曵梢星之旃舉洪頤植靈旗旗名也漢舊儀皇帝起居儀宫馬內百官所使按傳籍而後出入營衛周廬晝夜誰何殿門外署衛尉殿內郎署屬光祿勳黃門鉤盾近署屬少府輦動則左右傳帷幄者稱警蹕則衛官填街騎士塞路出殿則傳蹕止人清道建五旗丞相入卿執兵奉引先置素室清宫而後往故曰出則屏門入則瘞塞所以重威固絶無間防未然也乘輿冠髙山冠飛羽之纓幘耳赤丹純裏帶七尺斬蛇劍履虎尾絇履漢輦因秦以雕玉為之方徑六尺或使人鞔之或駕果下馬東漢大駕希用惟上陵及遭大喪施之法駕公卿不在鹵簿中唯河南尹執金吾洛陽令奉引侍中驂乘奉車郎御屬車三十六乘或曰四十六乘前驅有九斿雲罕斿車有九乘前史不記形武王剋紂百夫荷罕旗而先驅東京賦曰雲罕九斿薛綜曰罕旌旗名也鳯凰闟戟闟之為言亟也取四戟亟車邉皮軒鸞旗應劭漢官鹵簿圖曰乘輿大駕則御鳯凰車以金根為列皆大夫載皮軒謂虎皮軒郭璞曰皮軒革車或曰即曲禮前有士師則載虎皮鸞旗者編羽旄列繫幢旁胡廣曰建蓋在中民或謂之雞翹非也胡廣曰鸞旗以銅作鸞鳥車衡上與本志不同後有金鉦黃鉞説文曰鉞大斧也司馬法曰夏執元鉞殷執白鉞周仗黃鉞黃門鼓車大駕屬車八十一乘法駕半之屬車皆皀蓋朱裏木轓輜戈矛弩箙尚書御史所載最後一車懸豹尾薛綜曰傳御史載之豹尾以前比省中禮記前載虎皮亦此之義類行祠天郊以法駕祠地明堂省什三祠宗廟尤省謂之小駕每出太僕奉駕上鹵簿中常侍小黃門副尚書主者郎令史副侍御史蘭臺令史副皆執注以督整車騎謂之護駕春秋上陵尤省於小駕直事尚書一人從其餘令以下皆先行後罷乘輿金根安車立車蔡雍曰五安五立徐廣曰立乘曰髙車坐乘曰安車輪皆朱班重牙周禮曰牙也者以為因袍也鄭衆曰牙謂輪輮也世間或謂之輞二轂兩轄蔡雍曰轂外復有一轂抱轄其外乃復設轄抱銅置其中東京賦曰重輪二轄疏轂飛軨金簿繆龍為輿倚較徐廣曰繆交錯之形也較在箱上説文曰􅏹文畫蕃之箱也通俗文章車箱為較文虎伏軾軾車橫覆膝人所馮止者也龍首銜軛左右吉陽筒鸞雀立衡徐廣曰置金鳥於橫上􅏹文畫輈羽蓋華瓜徐廣曰翠羽蓋黃裏所謂黃屋車也金華施朱橑有二十八枚即蓋弓也東京賦曰樹翠羽之髙蓋薛綜曰樹翠羽為蓋如雲龍矣金作華形莖皆低曲建大旗十有二斿畫日月升龍駕六馬東京賦云六方蚪之奕奕象鑣鏤鍚金騣凶鬯匕方釳插翟尾獨斷曰金鑁者馬冠也髙廣各五寸上如玉華形在馬髦前方釳鐡也廣數寸在馬騣後後有三孔插翟尾其中薛綜曰釳中央兩頭髙如山形而實中翟尾結著之顔延之幼誥曰釳乘輿馬頭上防釳角所以防罔羅釳以翟尾鐡翮象之也徐廣曰金為馬文尾也朱兼樊纓赤罽易茸金就十有二左纛以氂牛尾為之在左騑馬軛上大如斗徐廣曰馬在中曰腹在外曰騑騑亦名驂蔡雍曰在最後左騑馬頭上是為德車五時車安立亦皆如之各如方色馬亦如之白馬者朱其髦尾為朱鬛云所御駕六餘皆駕四後從為副車古文尚書曰豫臨兆民凛乎若朽索之馭六馬逸禮王度記曰天子駕六馬諸侯駕四大夫三士二庶人一周禮四馬乘毛詩天子至大夫同駕四士駕二易京氏春秋公羊説皆云天子駕六許慎以為天子駕六諸侯及卿駕四大夫駕三士駕二庶人駕一史記曰秦始皇以水數制乘六馬鄭元以為天子四馬周禮乘馬有四圉各飬一馬也諸侯亦四馬顧命時諸侯皆獻乘黃朱乘亦四馬也今帝者駕六此自漢制與古異耳蔡雍表志曰以文義不著之故俗人多失其名五時副車曰五帝車鸞旗曰雞翹耕根曰三蓋其比非一也蔡雍獨斷法駕上所乘曰金根車駕六馬有五色安車五色立車各一皆駕四馬是為五時副車俗人名曰五帝車非也又有戎立車以征伐三蓋車名耕根車一名芝車親耕籍田乘之又有踏豬車慢輪有畫田獵乘之緑車名曰皇孫車天子孫乘之以從凡乘輿車皆羽蓋金華瓜黃屋左纛金鑁方釳繁纓重轂副牽繁纓在馬膺前如素裙重轂轂外復有一轂施牽其外諸車之文乘輿倚龍伏虎􅏹文畫輈龍首鸞衡重牙班輪升龍飛軨薛綜曰飛軨以緹油廣八寸長注地畫左蒼龍右白虎繫軸頭二千石亦然但無畫耳盧植禮記注曰軨轄頭也楚辭云倚結軨兮太息王逸注曰重較也李尤小車銘曰軨之嗛虛疏逹開通按二家之言不如綜注所記諸馬之文按乘輿金鑁方釳插翟象鑣爾雅注曰鑣馬勒旁鉞也皆用象牙龍畫總沫升龍赤扇汗詩云朱幩鑣鑣毛傳曰人君以朱纒鑣扇汗且以為鑣飾青兩翅燕尾駙馬左右赤珥流蘇飛鳥莭赤膺漢官儀侍中左貂右蟬本秦丞相史往來殿中分掌乘輿服物下至褻器虎子之屬武帝時孔安國為侍中以其儒者特令掌御唾壺朝廷榮之至東京時屬少府亦無員駕出則一人負傳國璽操斬蛇劍乘輿中官俱止禁中光武平公孫述始獲葆車輿輦而因舊制金根車擬周之玉輅最尊者也其制見前大駕則御鳯凰車以金根為副魏武帝受漢獻帝命乘金根車駕六馬設五時副車明帝景初中山茌縣黃龍見以為魏得地統服色尚黃戎事乘黑首白馬魏晉小出則乘輦亦多乘輿晉制玉金象革木等路是為五路並天子之法車皆朱班漆輪畫為􅏹其巨反文三十輻法月之數重轂二轄以赤油廣八寸長三尺注地繫兩軸頭謂之飛軨金簿繆龍為輿倚較較重為文獸伏軾龍首銜軛左右吉陽筒鸞雀立衡􅏹文畫輈及幡青蓋黃為裏謂之黃屋金華施橑朱橑二十八以象宿兩箱之後皆玳瑁為鵾翅加以金銀雕飾故世人亦謂之金鵾車斜注旗旗於車之左又加棨音啓戟於車之右皆橐而施之棨戟韜以黻繡上為亞字繫大蛙蟆幡軛長丈餘於戟之杪以氂牛尾大如斗置左騑馬軛上是為左纛轅皆曲向上取禮緯山車垂句之義言不揉而能自曲玉金象三路各以其物飾車因以為革者漆革木者漆木其制玉路最尊建太常十有二旒九仞委地畫日月升龍以祀天金路建大旗九旒以會萬國之賔亦以賜上公及王子母弟象路建大赤通赤無畫所以視朝亦以賜諸侯革路建大白以即戎兵事亦以賜四鎮諸侯木路建大麾以田獵其麾色黑亦以賜蕃國玉路駕六黑馬餘四路皆駕四馬馬並以黃金為文髦插以翟尾象鹿而鏤鍚鍚在馬面所謂當顱者也金鑁而方釳金鑁謂以金鑁為文旄以鐡為之其大三寸中缺而兩頭髙如山形貫中以翟尾而結著之繁纓赤罽易茸金就十有二繁纓馬飾纓在馬膺前如素裙五路皆有鍚鸞之飾和鈴之響鉤膺玉瓖鉤膺即繁纓也瓖馬𢃄玦名也龍輈華轙輈車轅也頭為龍象轙謂車衡上環受鸞者也