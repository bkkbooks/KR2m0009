人並騎在後郎簿十隊隊各五十人絳袍將一人騎鞉各一人在前督戰伯長一人步在後騎皆持矟次大戟一隊九尺楯一隊刀楯一隊弓一隊弩一隊五隊隊各五十人黑袴褶將一人騎校鞉角各一人步在前督戰伯長各一人步在後金顔督將并領之其屬車因後漢制復制御衣御書御軺御藥等車駕牛陽燧四望皀輪小形晉自過江之後舊章多缺元帝踐極始造大路戎路各一皆即古金根之制也無復充庭之儀至於郊祀大禮則權飾餘車以周用六師親征則用戎路去其蓋而乘屬車但五乘而已加緑油幢朱絲絡飾青交路黃金塗五采其輪轂猶素兩箱無金錦之飾其一車又是軺車舊儀天子所乘駕六是時無復六馬之乘五路皆駕四而已同用黑是為元牡無復五時車有事則權以馬車代之建旗其上其後但以五色木牛象五時車竪旗於牛背行則使人輿之牛之義蓋取其負重致逺而安穩也旗常纒而不舒飾所謂德車結旌者也惟天子親戎五旗舒飾所謂武車綏旌者也指南車過江亡失及義熙五年劉裕屠廣固始復獲焉乃使工人張綱補緝周用十三年裕定關中又獲司南記里諸車制度始備其輦過江亦亡制度太元中謝安率意造焉及破苻堅於淮上獲京師舊輦形制無差大小如一時人服其清記義熙五年劉裕執慕容超獲金鉦輦豹尾舊式猶存元興中屬車唯九乘符堅敗又得偽車輦增為十二乘宋孝武大明中尚書左丞荀萬秋改造五輅依晉金根車加赤漆􅏹畫玉飾諸末建青旗十有二旒駕駟以元復因漢之安車章施羽葆蓋以祀以金根為金輅建青旗駕元馬四羽葆蓋以賔象革木輅並擬玉輅象輅視朝革輅即戎二輅並建赤旗駕元馬四木輅建赤麾以田駕赤馬四大事法駕五輅俱出孝建中尚書令王宏議屬車起秦八十一乘及三十六乘並不出經典自胡廣蔡雍傳説耳又是從官所乘非常副車正數江左五乘則儉不中禮帝王文物旗旒皆十二為莭今宜依禮十二乘為制齊武帝永平初伏曼容議齊德尚青車旗先青次赤次白次黑軍容戎事宜依漢道行運之色因宋金根車而修玉輅畫輪金塗兩箱上望板前優逰通祿金塗鏤鍱碧紋箱鑿縷金簿帖兩箱外織成衣兩箱裏金塗鏤面釘玳瑁帖望板箱上帖金博山優逰上和鸞立花趺銜鈴銀𢃄玳瑁䇶優逰下隱膝裏施金塗鏤面花釘織成文優逰橫前施玳瑁帖金塗花釘金塗倒龍後損鑿銀玳瑁龜甲金塗花沓望板金塗受福望龍諸校飾軛及諸末皆螭龍首龍形板在車前銀帶花獸金塗受福緣裏邊鏤鍱玳瑁織成衣裏金塗鏤面花釘外金塗博山辟邪障鳳凰銜花升蓋金塗鏤鍱二十八爪支子花黃錦升衣復碧絹漆布緣油頂絳絲織成顔芚徒昆反赭舌孔雀毛復錦緑紋隨隂懸諸珠蚌佩金塗鈴雲朱結人綬雜色真孔雀眊一轅漆畫車衡銀花帶衡上金塗博山四鸞鳥立花趺銜鈴龍首銜軛捶翟尾上下花沓絳緑絲的望繩八枚旗十有二斿畫升龍竿首金塗龍銜大騶幡真眊棨戟織成衣金塗沓駐及受福金塗鴈鏤鍱漆安立牀在車中錦復黃紋為安立衣錦復黃紋障泥八幅長九尺緑紅錦芚𢃄織成花五輅江左相承駕駟左右騑為六施絳絲遊御繩其重轂二轄飛軨幡赤油金紫真眊左纛置左騑馬軛上金鑁方釳繁音鞶纓金塗紫皮帶真眊橫在馬膺前其鏤鍚皆如古制初加玉輅為重蓋捷寶鳳凰綴金鑷珠璫玉蚌珮四角金龍銜五采眊又麒麟頭加以采畫馬首戴之竟陵王子良啓曰凡蓋圓象天軫方象地上無二天之儀下設兩蓋之飾求諸志録最為乖衷又假為麟首加乎馬頭事不師古鮮或可施至建武中眀帝乃省重蓋等金輅之飾如玉輅而減少象輅減金輅革輅如象輅而尤減木輅如革輅建大赤麾首施大騶幡玉輅金輅建碧旗象輅木輅建赤旗齊輦因宋制名小輿小輿即今之犢車軿車之流盛增其飾竹蓬箱外鑿鏤金簿碧紗衣織成芚錦衣箱裏及仰頂隱膝後户金塗鏤面釘玳瑁帖金塗松精登仙花鈿緑四望紗萌子上下前後眉鏤鍱轅枕長角龍白牙蘭玳瑁金塗校飾漆障形板在蘭前金銀花獸攫天伐龍師子鏤面榆花鈿金龍虎扶轅軛上金鳯凰鈴鎖銀口帶星後梢玳瑁帖金塗花沓銀星花獸幔竿杖金塗龍牽縱橫長網又制卧輦校飾如坐輦不堪服用復制小輿形如軺車小行幸則乘之梁車輅初因齊制天監三年五輅旗麾同用赤而斿不異以從行運所尚也七年帝據周禮玉輅以祀金輅以賔今祀乘金輅詔下詳議周捨謂金輅為齊車本不關於祭祀於是改陵廟皆乘玉輅轡以朱絲梁制小輿似軺車金裝漆畫地八橫元正大會乘出上殿西堂舉哀亦乘之行則從後又制步輿方四尺上施隱膝人輿上殿天子至下賤皆得乘之復制副輦加笨步本反如犢車通幰朱絡謂之蓬輦陳初因梁文帝天嘉初令劉仲舉議錯綜漢晉舊飾造玉金象革木等五輅皆金簿交龍為輿倚較文豹伏軾虬首銜軛左右吉陽筒鸞雀立衡􅏹文畫轓緑油蓋黃紋裏相思橑金華末邪注旗旗於車之左各依方色置棨戟於車之右韜以黻繡獸頭幡長丈四尺懸於戟杪玉輅正副同駕六馬餘皆駕駟並金義髦插於翟尾玉為鏤鍚以綵畫蛙蟆幡綴兩軸頭即漢之飛軨五路兩箱後皆玳瑁為鵾翅金銀雕飾兩箱裏衣紅錦金花帖釘上用紅錦為後襜青紋純帶夏花簟冬綺繡縟後魏道武帝天興初修軒冕制乾象等輦草創制度多違舊章至孝文太和中儀曹令李韶更議改正唯􅊀五輅各依方色其餘車輦猶未能具眀帝熙平中侍中崔光等議大造車服五輅並駕五馬亦無經據道武帝天興二年命禮官採古法制三駕鹵簿一曰大駕設五輅建太常屬車八十一乘平城令代尹司𨽻校尉丞相奉引太尉陪乘太僕御從輕車介士千乘萬騎魚麗鴈行前驅皮軒闟戟芝蓋雲罕指南後殿豹尾鳴笳唱上不作鼓吹軍戎大祠則設之二曰法駕屬車三十六乘平城令代尹太尉奉引侍中陪乘奉車都尉御巡狩小祠則設之三曰小駕屬車十二乘平城令太僕奉引常侍陪乘奉車郎御逰宴離宫則設之天賜二年初改大駕魚麗鴈行更為方陳鹵簿列步騎內外為四重列標建旌通門建五色車旗各處其方諸王導從在甲騎內公在幢內侯在步矟內子在刀楯內五品朝臣夾列乘輿前兩箱官卑者先引王公侯子車後魏制除伯男爵旒麾蓋信幡及散官褠服一皆絳黑天興初始修軒冕制乾象輦羽葆圓蓋畫日月五星二十八宿天街雲罕星經曰昴天子出旄頭畢為天街罕畢以前驅山林竒瑞遊麟飛鳳朱雀元武騶虞青龍駕二十四馬又制大樓輦車龍輈加玉飾四轂六衡方輿圓蓋金雞樹羽寶鐸流蘇鸞雀立衡螭龍銜軛建太常畫升龍日月駕二十牛又制象輦左右金鳳白鹿仙人羽葆流蘇金鈴玉佩初駕二象後以六駝代之復有遊觀小樓等輦駕十五馬車等草創修制多違舊章北齊車服制度多因後魏天保中所乘是太和中李韶所制五輅後周依周禮設六官置司輅之職掌公車之政辨其名品物色皇帝之輅十有二等一曰蒼輅以祀昊天上帝二曰青輅以祀東方上帝三曰朱輅以祀南方上帝及朝日四曰黃輅以祭地祇中央上帝五曰白輅以祀西方上帝及夕月六曰元輅以祀北方上帝及感帝神州此六輅通漆之而無他飾即周木輅遺象也馬皆疏面斿就以方色俱十有二七曰玉輅以享先皇加元服納后八曰碧輅以祭社稷享諸先帝食三老五更享諸侯耕籍九曰金輅以祀星辰視朔十曰象輅以望秩羣祀十一曰革輅以巡兵即戎十二曰木輅以田獵行鄉畿此六輅以六色漆畫之用玉碧金象革物飾諸末錫面金鉤就以五采俱十有二其輅之飾重輪重較加茸焉皇帝之輅輿廣六尺有六寸畫輪輈衡以雲牙箱軾􅏹文內畫以雜獸獸伏軾鹿倚較三辰之常元青蒼等旗畫繢之六仞曵地設和鸞以莭趨行圓蓋方輿以象天地後周太常畫三辰日月五星旗畫青龍天子升龍諸侯交龍旟畫朱鳥旌畫黃麟旗畫白虎旐畫元武皆加雲氣其旜物在軍亦畫其事號加以雲氣徽幟亦如之通帛為旜雜帛為物號所書其與姓名之事號徽幟亦書之旌莭又畫白虎而析羽於其上又司常掌旗物之藏通帛之旗六以供郊祀蒼赤黃白元等旗三辰之常畫繢之旗六以充玉輅之等一曰三辰之常二曰青龍旗三曰朱雀旟四曰黃麟旌五曰白虎旗六曰元武旐皆左建旗而右建闟戟又有繼旗四以施軍旅一曰麾以供軍將二曰旞以帥師三曰音伐以供旅帥四曰斾以供卒長諸公方輅碧輅建旗金輅建旟象輅建物木輅建旐諸侯自金輅而下如諸公之旗諸伯自象輅而下如諸侯之旗諸子自犀輅而下如諸伯之旗諸男自篆輅而下如諸子之旗三公犀輅貝輅篆輅建旟旐夏篆夏縵及輚車建物孤卿以下各以其等建其旗旌杠皇帝六仞諸侯五大夫四士三斿皇帝曵地諸侯及軹大夫及轂士及軫凡注毛於杠首曰綏析羽曰旌全羽曰旞其縿皇帝諸侯加以孤韣闟戟方六尺而被之以黻唯皇帝諸侯軨建焉闟戟杠綢與旗同隋開皇元年內史令李德林奏後魏輿輦乖制請廢唯留後魏太和時李韶所制五輅北齊所尊者後著令制玉輅青質重箱盤輿左龍右虎金鳯翅畫􅏹文軛左立纛金鳯一在軾前八鸞在衡二鈴在軾龍輈之上前設障塵青蓋裏繡斿帶金博山綴以鏡子下垂八珮樹四十葆羽輪皆朱班重牙復轄左建太常十有二斿皆畫升龍日月其長曵地右載闟戟長四尺闊三尺黻文旗首金龍頭銜鈴及緌垂以結綬駕蒼龍金鑁方釳插翟尾五隻鏤鍚鞶纓十有二就皆五采繒罽為飾天子祭祀納后則乘之金輅赤質左建旟畫飛隼右建闟戟盤輿鳳等並同玉輅駕赤騮臨朝會同饗射飲至則乘之象輅黃質左建旌畫遊麟右建闟戟駕黃騮祀后土則乘之革輅白質鞔以革左建旗畫騶虞右建闟戟駕白騮巡狩臨兵則乘之木輅黑質漆之左建旐畫元武右闟戟駕黑騮田獵則乘之其輅並駕六馬馬飾同玉輅復置安車重輿曲壁紫油纁裏通幰朱絲絡網朱鞶纓駕赤騮臨幸所乘按隋氏五輅逺酌周禮旗斿藻飾近約漢制文質相半文帝既平陳因為法令憲章往古大駕依秦法駕依漢小駕依宋煬帝大業初復偹大駕八十一乘並如犢車紫通幰朱絲絡黃金飾駕一牛在鹵簿中單行正道後帝嫌多大駕減為三十六乘法駕宜用十二小駕除之可也詳見北史閻毗傳隋制輦而不施輪通幰朱絡飾以金玉而人荷之又依梁制副輦復制輿如輦而小宫苑私宴御之小輿方形同幄帳自閣內升殿御之文獻通考卷一百十六
