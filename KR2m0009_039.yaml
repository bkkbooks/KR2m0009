body:
  text: 文獻通考卷三十九鄱陽馬端臨貴與著選舉考十二辟舉三代以前天下列國有三卿五大夫二十七士大國三卿二卿命於天子一卿命於其君小國三卿一卿命於天子二卿命於其君公侯伯之大夫再命子男之大夫一命其士以下皆不命皆國君専之漢初王侯國百官皆如漢朝唯丞相命於天子其御史大夫以下皆自置及景帝懲呉楚之亂殺其制度罷御史大夫以下官至武帝又詔凡王侯吏職秩二千石者不得擅補其州郡佐吏自别駕長史以下皆刺史太守自辟歴代因而不革漢初掾吏辟皆上言之故有秩比命士其所不言則為百石屬其後皆自辟除故通為百石云世祖詔方今選舉賢佞朱紫錯用丞相故事四科取士一曰徳行髙妙志節清白二曰學通行修經中博士三曰明逹法令足以決疑能按章覆問文中御史四曰剛毅多畧遭事不惑明足以決才任三輔令皆有孝弟亷公之行自今以後審四科辟召及刺史二千石察茂才尤異孝亷之吏務盡實覈選擇英俊賢行亷潔平端於縣邑務授試以職有非其人臨計過署不便習官事書疏不端正不如詔書有司奏罪名并正舉者建武二年衛颯辟大司徒府舉能案劇除侍御史安帝元初六年詔三府選掾屬髙第能恵利牧飬者五人舊任三府選令史光禄試尚書郎時皆特拜不復選試李固與呉雄上疏選舉補置可歸有司帝感其言自是稀復特拜切責三公明加考察朝廷稱善楊秉亦言所徴皆特拜不試為非翟酺為侍中時尚書有缺詔将大夫六百石以上試對政事天文道術以高第者補之酺自恃能髙而忌故太史令孫懿恐有先用乃紿懿曰圗書有漢賊孫登将以才智為中書所害觀君表相似當應之因對之涕泣懿憂懼移病不試由是酺對第一拜尚書按東漢用人多以試取之諸科之中孝亷賢良有道皆有試遷官則如博士如尚書皆先試至於辟舉徴召無不試者李固楊秉所言皆以試為是特拜為非然所試率文墨小技固未足以知其賢否也况如翟酺者以市井權譎之術冒取髙第又足為賢乎孝靈帝時司徒楊賜大尉桓焉皆坐辟召禁錮黨人免徐氏曰按公府之有辟命自西京則然矣然東漢之世公卿尤以辟士相髙卓茂習詩禮為通儒而辟丞相府史蔡邕少博學好詞章而辟司徒橋元府周舉博學洽聞為儒者宗而辟司徒李郃府又有五府俱辟如黄瓊者四府並命如陳紀者徃徃名公鉅卿以能致賢才為髙而英才俊士以得所依乘為重是以譽望日隆名節日著而一洗末世茍合輕就之風孟子曰觀近臣以其所為主觀逺臣以其所主其斯之謂與州從事史十二人皆州自辟除通為百石按魯恭𫝊恭再在公位選辟髙第至列卿郡守者數十人而其耆舊大姓或不蒙薦舉至有怨望者恭聞之曰學之不講是吾憂也諸生不有鄉舉者乎終無所言盖東漢時選舉辟召皆可以入仕以鄉舉里選循序而進者選舉也以髙才重名躐等而升者辟召也故時人猶以辟召為榮云孫寳為京兆尹故吏侯文以剛直不茍合常稱疾不仕寳以恩禮請文為布衣友日設酒食妻子相對文求受署為掾進見如賓禮數月以立秋日署文東部督郵入見敕曰今日鷹隼始擊當順天氣取姦惡掾部渠有其人乎文仰曰無其人不敢受職寳曰誰也文曰覇陵杜穉季云云於是穉季不敢犯法寳為京兆三嵗京師稱之仕延為㑹稽都尉呉有龍丘萇者隱居太未王莽時四輔三公連辟不就掾吏白延請召之延曰龍丘先生躬徳履義都尉掃灑其門猶懼辱焉召之不可遣功曹奉書記致醫藥吏使相望於道積一嵗萇乃乗輦詣府願得先死備録延辭讓再三遂署議曹祭酒按兩漢二千石長吏皆可以自辟曹掾而所辟大概多取管屬賢士之有才能操守者盖必如是乃能知閭里之姦邪黔庻之休戚故治狀之顯著常必由之後世長吏既不與之以用人之權而士自一命以上拘於三互之法不使之效職顯能於本土士之賢者亦以隱情惜已不預郡府之事為髙而與郡守縣令共治其民者則皆凶惡貪饕舞文悖理之胥吏大率皆本土人也然則豈三互之法可行之於僚掾而獨不行之於胥吏可施之於有行止之命官而獨不可施之於無藉在之惡少乎魏王凌為青州刺史青土初定請王基為别駕後召為祕書郎凌復請還頃之司徒王朗辟基凌不遣朗書劾州曰凡家臣之良則升於公輔公臣之良則入於王職是故古者侯伯有貢士之禮今州取宿衛之臣留祕閣之吏所希聞也凌猶不遣凌流稱青土亦由基叶和之輔也劉虞備禮署田疇為從事令其奉表行在既而虞為公孫瓚所殺疇至哭於虞墓北歸率宗族附從數百人掃地而盟曰君讐不報不可以立於世遂入徐無山中營深險平敞地而居徴辟皆不就曹爽辟王沈及羊祜沈勸祜應命祜曰委質事人復何容易遂不就古人之於所為主也有君臣之義焉故難則死之羊叔子之賢盖知曹爽之不足以死故也北齊武平中後主失政多有佞幸乃賜其賣官分占州郡下及鄉官多降中㫖故有敕用州主簿郡功曹者自是之後州郡辟士之權浸移於朝廷以故外吏不得精覈由此起也後周時刺史僚佐州吏則自署府官則命於朝廷隋文帝時牛𢎞為吏部尚書髙搆為侍郎最為稱職當時之制尚書舉其大者侍郎銓其小者則六品以下官吏咸吏部所掌自是海内一命以上之官州郡無復辟署矣𢎞問於劉炫曰魏齊之時令史從容而已今則不遑寜舍何也炫對曰徃者州唯置綱紀郡置守丞縣唯令而已其所事具寮則長官自辟受詔赴任毎州不過數十今則不然大小之官悉是吏部纎介之績皆屬考功所以繁也唐制二品三品冊授五品以上制授守五品以下敕授六品以下㫖授其視品及流外官皆判補之判補即辟舉之類肅代以後天下兵興多故官濫而銓法益壞沈既濟上疏極言之欲請五品以上及羣司長官宰臣進叙吏部兵部得參議焉六品以下或僚佐之屬聼州府辟用則銓擇之任委於四方結奏之成歸於二部必先擇牧守然後授其權髙者先署而後聞卑者聼版而不命牧守将帥或選用非公則吏部兵部得察而舉之有選舉雜議十條詳見舉官門既濟選舉雜議五或曰今人多情故長官許其選吏必綱紀紊失不如今已之有倫也答曰不假古義請徴目前以明之今諸道節度都團練觀察租庸等使自判官副将以下皆使自銓擇縱其間或有情故大舉其例十猶七全則辟吏之法見行於今但未及於州縣耳利害之理較然可觀何紀之失何綱之紊向令諸使僚佐盡授於選曹則安獲鎮方隅之重理財賦之殷也六或曰頃年嘗見州縣有攝官皆是牧守所自署置政多茍且不議久長纔始到官已營生計迎新送故勞弊甚矣今令州郡召辟則其弊亦爾柰何答曰國家職員皆稟朝命攝官承乏茍濟一時不日不月事必停省人雖流而責不及績雖著而官不成便身而行不茍何待若職無移奪命自州邦所攝之官便為已任上酬知已下利班榮爭竭智力人誰不盡今常調之人逺授一職已數千里赴集又數千里之官挈擕妻孥徃復勞苦必一周而在路料間嵗而停官成名非知己之恩後任可計考而得此之不茍而誰為茍陸贄秉政請令臺閣長官各自舉其屬有不職坐舉者帝初許之或言諸司所舉皆親黨招賂遺無實才帝復詔宰相自擇贄上奏言其非便帝雖嘉之然卒停薦士詔陸贄疏見舉士門按自隋時海内一命之官並出於朝廷州郡無復有辟署之事士之才智可效一官者茍非宿登仕版則雖見知於方鎮岳牧亦不能稍振㧞之以收其用至唐則仕者多由科目矣然辟署亦時有之而其法亦不一有既為王官而被辟者若張建封之辟許孟容李徳裕之辟鄭畋白敏中之辟王鐸是也有登第未釋褐入仕而被辟者若董晉之於韓退之是也有强起隱逸之士者若烏重𦙍之於石洪温造張搏之於陸龜蒙是也有特招智略之士者若裴度之於柏耆杜慆之於辛讜是也而所謂隱逸智畧之士多起自白衣劉貢甫言唐有天下諸侯自辟幕府之士唯其才能不問所從來而朝廷常收其俊偉以補王官之缺是以號稱得人蓋必許其辟置則可破拘攣以得度外之士而士之偶見遺於科目者亦未嘗不可自效於幕府取人之道所以廣也宋時雖有辟法然白衣不可辟有出身而未歴任者不可辟其可辟者復拘以資格限以舉主蓋去古法愈逺而倜儻跅弛之士其不諧尺繩於科目受覊􅎗於銓曹者少得以自逹矣宋太祖皇帝建隆四年詔自前藩鎮多奏初官人為掌書記頗越資序自今歴兩任有文學者方得奏舉開寳四年詔自今諸州不得以攝官視事其闕員處即時以聞當委有司除注繼又詔委有司按其歴任經三攝無曠敗者具以名聞詳見舉官門太宗雍熙四年詔今後諸路轉運使及州郡長吏並不得擅舉人充部内官其有闕員即時具奏神宗熙寜間内外小職任長吏舊得奏舉者悉罷一歸吏部以為選闕已而銓法所授才與職多不相當遂又即選闕取其不可専以法注者仍許辟置然亦罕矣至要司劇任或創有興建長吏欲得其所親信者與相協濟則徃徃特命許之於是辟置亦不能全廢也時開封府許自辟其府曹官自餘如東西審官三班流内銓主簿陜西湖城鎮等監官發運轉運司管幹文字及掌機宜文字元豐中三司在京倉庫御厨店宅務提舉熙河等路弓箭手營田蕃部司幹當公事及差使使臣并川路買茶起綱塲監官之類並許自辟不從吏部注擬哲宗元祐元年監察御史上官均言廣南攝官凡兩經觧發攝簿尉一任無過遂得正授若重加舉數亦可少節其濫徽宗大觀二年詔祖宗銷革五代辟置自一命以上非王命不除自今諸路毋得直牒差官及以待闕得替官權政和六年吏部侍郎韓粹彦言三年患官久闕則乏事嘗詔見官若當終更已及三月或創闕及非次闕而經三季無辟牘來上則不俟長吏奏報吏部徑自用闕有明命矣今奏舉闕如防河捕盗𣙜鹽三路沿邉掌兵欲俟所委舉官自列無人乃從吏部用闕從之赦文舉其所知古之道也比臣僚妄請盡罷舉辟意謂遵奉元豐而不知元豐一時之命尋已復舊盖事有繁簡人有能否若不令長吏薦舉天下之大人才之衆朝廷何由盡知必致滯才廢事宣和七年臣僚言在部右選員猥多無闕可受而法湏急綱運差使者所差不得過一二百人額差不足至於借差至再三而又不足遂借及大使臣毎被差訟訴紛拏爭欲求免此其弊在於干求辟舉莫肯參選固有連三任自初官以至陞朝足未嘗躡吏部門故在部者多遭役使今欲湏用部闕足一任乃許就辟自後部授外辟常令相間茍不如式受辟與辟之者皆坐罪詔議立法髙宗建炎初兵革方殷詔河北招撫使河東經制使及安撫等使皆得辟置将佐官屬行在五軍并御營司将領亦辟大小使臣於是負才略武勇者或以簪笏從戎或以布衣授官入幕不可勝數而諸道郡縣自戎馬侵軼盗賊殘擾之餘官吏觧散諸司誘人填闕皆先領職而後奏給付身於是江浙州郡守将皆假軍興之名換易官屬占使窠闕又有罪籍未該叙復守選未合參部者競趨焉朝論患之乃下吏部盡令改正使歸部依格注擬除陜西五路兩河兩淮京東等路經略安撫司屬官聴舉辟餘路皆罷諸道廵檢縣尉刑獄官闕許提刑司具名奏辟四年臣僚上言南渡以來土宇未復宦逰之所睥睨者江浙閩廣數路而已朝廷既侵用吏部闕員而提領安撫司又奏辟其親舊貴遊子弟稍有黨援則足不至銓部輒得便地占善闕凌邁超越無復資格長奔競之風塞寒俊之路臣謂大郡守倅及軍旅之事或湏擇人任使者自從朝廷除授其餘員闕與諸司所辟舉一皆付之銓曹使有司以法授之如郡縣常經兵燬吏部榜闕無願就者即許權行辟舉從之起居郎朱震言方今經營荆楚控制上流逺方之民理宜綏撫如聞峽州四縣多用軍功或胥吏補知縣攔吏補監務民被其害願取各州官闕委安撫奏辟從之紹興二年吕頤浩以左僕射都督諸軍請辟參謀官以下文武七十七人戸部尚書李彌大祕書少監傅崧卿預焉而李彌大言於上曰東晉王導謝安為都督未嘗離朝廷今邊圉幸無他頤浩不宜輕動且臣為天子侍從非頤浩可辟請於諸軍悉置軍正如漢朝故事察官郎為之陛下必欲遣臣請與崧卿别為一司専伺其過失以聞彌大遂改命吕頤浩又言督府屬官不限員數徒以開請謁縻禄廩請以凖備差遣辟文資以凖備差使辟武資臣各以十五人為限詔可七月議者言比年帥守監司辟官攙奪部注朝廷不能奪銓曹不能違又多畀以添差不釐務之闕上自監司倅貮以下至掾屬給使一郡之中兵官八九員一務之中監當六七員較祖宗朝殆三四倍存無事之官食至重之禄生民安得不重困乎請敕有司裁省其闕不得已則以宫廟之祿畀之奏可自今已就辟差理資任者毋得據舊闕以妨下次三年敕不曾經吏部注授參選及雖有請受歴之類而别無省部手照文字人明勅諸路監司郡守並不許奏辟差遣六年詔諸道宣撫司屬官許本司奏辟内京官以二年為任願留再任者取㫖自兵興所辟官有更十年不退者故條約焉考課虞五載一廵守羣后四朝敷奏以言明試以功車服以庸帝曰咨汝二十有二人欽哉惟時亮天功三載考績三考黜陟幽明庻績咸熙周六年五服一朝又六年王乃時廵考制度於四岳諸侯各朝於方岳大明黜陟冡宰嵗終則令百官府各正其治受其會㑹大計也聼其政事而詔王廢置三嵗則大計羣吏之治而誅賞之漢法刺史以六條察二千石嵗終奏事舉殿最六條强一條宗豪右田宅踰制以强凌弱以衆暴寡利二條二千石不奉詔書遵承典制倍公向私旁詔守侵漁百姓聚斂為姦賞三條二千石不䘏疑獄風厲殺人怒則任刑喜則淫煩擾刻暴剝截黎元為百姓所疾山崩石裂妖譌訛言二四條二千石選署不平茍阿所好蔽賢寵頑五條千石子弟恃怙榮勢請托所監六條二十石違公下比阿附豪强通行貨賂割損正令也兒寛為左内史有軍發以負租課殿當免民恐失之輸租不絶課更以最宣帝始親政事自丞相以下各奉職奏事以傅奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜二千石有治理効輒以璽書勉勵公卿闕則選諸所表以次用之丙吉𫝊嵗竟丞相課其殿最奏行賞罰朱邑為北海太守以治行第一入為大司農尹翁歸為扶風盗賊課常為三輔最韓延夀為東郡太守斷獄大減為天下最河南太守召信臣治行常為第一荆州刺史奏信臣為百姓興利賜黄金四十斤陳萬年鄭昌皆以守相髙第入為右扶風義縱朱博尹賞皆縣令髙第入為長安令地節四年詔令郡國嵗上繫囚以掠笞若瘐死者所坐各縣爵里丞相御史課殿最聞黄龍元年詔曰上計簿具文而已務為欺謾以避其課三公不以為意朕将何任御史察計簿疑非實者按之使真偽毋相亂元帝時京房言古帝王以功舉賢則萬化成瑞應著末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法晉灼曰令丞尉治一縣崇教化亡犯法者輙遷有盗賊滿三日不覺則尉事也令覺之自除二尉負其辠率相准如此法上令公卿朝臣與房㑹議溫室皆以房言煩碎令上下相伺不可許上意鄉之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行唯御史大夫鄭𢎞光禄大夫周堪初言不可後善之上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防壅塞石顯五鹿充宗皆疾房欲逺之建言宜試以房為郡守上乃以房為魏郡太守秩八百石房得以考功法治郡房自請願無屬刺史得除用他郡人自第吏千石以下嵗竟乗𫝊奏事天子許焉房去月餘為顯等所譛下獄坐死按考課之法漢行之久矣今房始以是為言而帝善之則其所陳必有異乎人者史文不詳無以訂其得失但既曰考課則必黜幽陟明立為一定之法使一皆可行又必上下之間體統相維而後可以舉行今房欲使其弟子二人為刺史而已居中通籍為其奏事以防壅塞及其為太守則又請無屬刺史則是以考課之法為其一家之學而他人皆不能行且已欲自課第吏千石以下而不欲刺史課已則體統隳矣此所以來讒賊之口而殺其身也蕭育為茂陵令㑹課育第六而漆令郭舜殿見責問育為之請扶風怒曰君課第六裁自脱何暇欲為左右言永光元年詔丞相御史舉質朴淳厚謙遜有行者光禄嵗以此科第郎從官又使尚書選第中二千石而大鴻臚卿野王能行第一東漢之制太尉掌四方兵事功課嵗盡即奏其殿最而行賞罰司徒掌人民事凡四方民事功課嵗盡則奏其殿最而行賞罰司空掌水土事凡四方水土功課嵗盡則奏其殿最而行賞罰李忠為丹陽守墾田増多三公考課為天下第一賈琮為交趾刺史在事三年為十三州最明帝永平九年令司𨽻校尉部刺史嵗上墨綬長吏視事三嵗以上理狀尤異者各一人與計偕及尤不政理者亦以聞舊制州牧奏二千石長吏不任位者事皆下三公三公遣掾吏按驗然後黜退光武時用明察不復委任三府而權歸刺舉之吏朱浮上䟽曰陛下即位以來不用舊典信刺舉之官黜鼎輔之任至於有所效奏便加退免覆案不闗三府罪譴不蒙澄察陛下以使者為腹心使者以從事為耳目是謂尚書之平决於百石之吏故群下苛刻各自為能兼以私情容長憎愛故有罪者心不厭服無咎者坐被空文非所以經盛衰貽後王也魏明帝時以士人毁稱是非混雜難辨遂令散騎常侍劉邵作都官考課之法七十二條考覈百官其略欲使州郡考士必由四科皆有効然後察舉或辟公府為親人長吏轉以功次補郡守者或就秩而加賜爵焉至於公卿及内職大臣率考之事下三府是時大議考課之制散騎黄門侍郎杜恕以為用不盡其人雖文具無益上䟽曰書稱明試以功三考黜陟帝王之盛制然歴六代而考績之法不著闗七聖而課試之要未立臣誠以為其法可粗依其詳難備舉故也語曰世有亂人而無亂法若使法可専任在唐虞可不須稷契之佐殷周無責伊吕之輔矣今奏考功者陳周漢之云為掇京房之本㫖可謂明考課之要至於崇揖譲之風興濟濟之理臣以為未盡善也古之三公坐而論道内職大臣納言補闕無善不紀無過不舉且天下至大萬㡬至衆誠非一明所能徧照故君為元首臣為股肱明一體相資而成也後考課竟不行晉武帝泰始初務崇理本詔河南尹杜預為黜陟之課其略曰臣聞上古之政因循自然虗已委誠而信順之道應神感心通而天下之理得其後敦樸漸散彰美顯惡設官分職以頒爵禄𢎞宣六典以詳考察然獨倚明哲之輔建忠貞之司使名不得越功而獨美功不得後名而獨隱皆疇咨博訪敷納以言及至末代不能紀逺而求於宻微疑諸心而信耳目疑耳目而信簡書簡書愈繁官方愈偽法令滋彰巧飾彌多昔漢之刺史亦嵗終奏事不制算課而清濁粗舉魏氏考課即京房之遺意其文可謂至密然由於累細故歴代不能通也豈若申唐堯之舊典去密就簡則簡而易從也今科舉優劣莫若委任逹官各考所統在官一年以後毎嵗言優者一人為上第劣者一人為下第因計偕以名聞如此六載主者總集採按其六嵗處優舉者超用之六嵗處劣舉者奏免之其優多劣少者叙用之劣多優少者左遷之今考課之品所對不均誠有難易若以難取優以易而否主者固難准量輕重微加降殺不足復曲以法書也後魏孝文帝太和中詔曰三載考績自古通經三考黜陟以彰能否今若待三考然後黜陟可黜者不足為遲可進者大成賒緩是以朕今三載一考考即黜陟欲令愚滯無妨於賢者才能不壅於下位各令當曹考其優劣為三等六品以下尚書重問五品以上朕将親與公卿論其善惡上上者遷之下下者黜之中中者守其本任時否臧必舉賞罰大行其薄賞者猶錫車馬器服以申奨勸後帝臨朝堂顧謂録尚書兼廷尉卿廣陵王羽曰凡考績上下二等可為三品中等但為一品所以然者上下是黜陟之科故旌絲髪之美惡中等守本事理大通帝又謂尚書等曰卿等在任年垂二周未嘗進一賢退一不肖此二事罪之大者謂羽曰汝居樞端之任在職以來功勤之績不聞於朝阿黨之音頻于朕聼今黜汝録尚書廷尉但居特進太保自尚書令僕射以下凡黜退二十餘人皆略舉遺闕諸如此黜官者令一年之後任官如初宣武帝時太尉侍中髙陽王雍上表曰竊惟三載考績百王通典今任事上中者三年升一階散官上第者四載登一級閑冗官本非虚置或以賢能而進或因累勤而舉如其無能不應忝兹髙選以勤以能進之朝伍或征官外戍逺使絶域催督逋懸察檢州鎮皆是散官以充劇使乃於考陟排同閑伍檢散官之人才非皆劣稱事之輩未必悉賢而考閑以多課煩以少上乖天澤之均下生不等之苦復尋正始之格汎後任事上中者三年升一階汎前任事上中者六年進一級三年一考自古通經今以汎前六年升一階檢無愆犯倍年成級以此推之明以汎代考也徐州刺史蕭寳寅又論曰方今守令厥任非輕及考課悉以六載為程既而限滿代還復經六年而叙是則嵗周十二始得一階於東西兩省文武閑職公府散佐無事冗官或數旬方應一直或弦朔止於暫朝及其考日更得四年為限是則一紀之内便登三級彼以實勞劇任而遷貴之路至難此以散位虗名而升陟之方甚易何内外之相懸令厚薄之如是孝明帝延昌二年又將大考百寮散騎常侍領三公郎中崔鴻以考令於體例不通乃建議曰竊惟王者為官求才使人以器黜陟幽明揚清激濁故績效能官才必稱位者朝升夕進年嵗數遷豈拘一階半級閡以同寮等位者哉二漢以降太和以前茍必官湏此人人稱其職或超騰轉陟數嵗而至公卿故能時收多士之稱國號豐賢之美竊見景明以來考格三年成一考轉一階貴賤内外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如龔黄儒學如王鄭才史如班馬文章如張蔡得一分一寸必為常流所攀選曹亦抑為一㮣不曽甄别琴瑟不調改而更張雖明㫖已行猶宜消息時不從虞書言三載考績三考黜陟幽明此古帝王考課之法董仲舒言古之所謂功者以任官稱職為差非謂積日累久也故小才雖累日不離於小官賢才雖未久不害為輔佐今則不然累日以取貴積久以致官是以亷恥貿亂賢不肖渾淆未得其真此後世年勞之法二法雖相似而其意實相反考課是以日月驗其職業之修廢年勞是以日月計其資格之深淺後世之所謂考課者皆年勞之法耳故賢者當陟或反以資淺而抑之不肖者當黜或反以年深而升之故考課之法行則庸愚畏之年勞之法行則庸愚便之崔鴻所言即崔亮所行也亮奏立停年之格見舉官門宋文帝元嘉時守宰以六期為斷及宋末以治民之官六年過久乃以三年為斷謂之小滿唐考功之法凡百司之長嵗較其屬功過差以九等大合衆而讀之流内之官叙以四善一曰徳義有聞二曰清慎明著三曰公平可稱四曰恪勤匪懈善狀之外有二十七最一曰獻可替否拾遺補闕為近侍之最二曰銓衡人物擢盡才良為選司之最三曰揚清激濁褒貶必當為考較之最四曰禮制儀式動合經典為禮官之最五曰音律克諧不失節奏為樂官之最六曰决斷不滯與奪合理為判事之最七曰部統有方警守無失為宿衛之最八曰兵士調習戎装充備為督領之最九曰推鞫得情處斷平允為法官之最十曰讎校精審明於刋定為校正之最十一曰承㫖敷奏吐納明敏為宣納之最十二曰訓導有方生徒充業為學官之最十三曰賞罰嚴明攻戰必勝為軍将之最十四曰禮義興行肅清所部為政教之最十五曰詳録典正詞理兼舉為文史之最十六曰訪察精審彈舉必當為紏正之最十七曰明於勘覆稽失無隱為句檢之最十八曰職事修理供承彊濟為監掌之最十九曰功課皆充丁匠無怨為役使之最二十曰耕耨以時收穫成課為屯官之最二十一曰謹於盖藏明於出納為倉庫之最二十二日推歩盈虗究理精密為歴官之最二十三曰占候醫卜效驗多著為方術之最二十四曰檢察有方行旅無壅為闗津之最二十五曰市㕓弗擾姦濫不行為市司之最二十六曰牧飬肥碩蕃息孳多為牧官之最二十七曰邊境清肅城隍修理為鎮防之最一最四善為上上一最三善為上中一最二善為上下無最而有二善為中上無最而有一善為中中職事粗理善最不聞為中下愛憎任情處斷乖理為下上背公向私職務廢闕為下中居官飾詐貪濁有狀為下下凡定考皆集於尚書省唱第然後奏親王及中書門下京官三品以上都督刺史都䕶節度觀察使則奏功過狀以覈考行之上下毎嵗尚書省諸司具州牧刺史縣令殊功異行災蝗祥瑞户口賦役増减盗賊多少皆上於考司監領之官以能撫飬役使者為功有耗亡者以十分為率一分為一殿博士助教計講授多少為差親勲翊衛以行能功過為三等親勲翊衛備身東宫親勲翊衛備身王府執仗親事執乗親事及親勲翊衛主帥校尉直長品子雜任飛騎皆上中下考有二上第者加階番考别為簿以侍郎顓掌之流外官以行能功過為四等清謹勤公為上執事無私為中不勤其職為下貪濁有狀為下下凡考中上以上毎進一等加禄一季中中守本禄中下以下每退一等奪禄一季中品以下四考皆中中者進一階一中上考復進一階一上下考進二階計當進而參有下考者以一中上覆一中下以一上下覆二中下上中以上雖有下考從上第有下下考者觧任凡制勅不便有執奏者進其考貞觀初嵗定京官望髙者二人分校京官外官考給事中中書舎人各一人涖之號監中外官考使考功郎中判京官考員外郎判外官考其後屢置監考校考知考使故事考簿朱書吏縁為姦咸通十四年始以墨又制若於善最之外别有可加尚及罪雖成殿而情狀可矜或不成殿而情状可責者省校之日皆聼考官臨事量定髙祖武徳二年上親閲群臣考績以李綱孫伏伽為上第太宗貞觀三年尚書右僕射房元齡侍中王珪掌内外官考治書侍御史權萬紀奏其不平追按勘問王珪不伏舉按上付侯君集推問祕書監魏徴奏稱必不可推鞫且元齡王珪國家重臣俱以忠直任使其所考者既多或一人兩人不當終非有阿私若即推繩此事便不可信任何以堪當委重假令錯謬有實未足虧損國家窮鞫若虗失委大臣之體且萬紀比来恒在考堂必有乖違足得論正當時鑒見切無陳説身不得考方始紏彈徒發在上瞋怒非是誠心為國無益於上者有損於下所惜傷於理體不敢有所阿為遂釋不問六年監察御史馬周上䟽曰臣竊見流内九品以上令有等第而自比年入多者不過中上未有得上下以上考者臣謂令設九等正考當今之官必不施之於異代也縱朝廷實無好人猶應於見在之内比較其尤善者以為上第豈容皇朝之士遂無堪上下之考者朝廷獨知貶一惡人可以懲惡不知褒一善人足以勸善臣謂宜毎年選天下政術尤最者一二人為上上其次為上中次為上下其次為中上則中人已上可以自勸髙宗時滕王元嬰為全州刺史頗縱驕逸動作無度帝戒之且曰朕以王骨肉至親不能致於理今書王下下考以愧王心司列太常伯盧承慶嘗考内外官有一人督運遭風失米承慶考之曰監運損糧考中下其人容色自若無言而退承慶重其雅量改注曰非力所及考中中其人既無喜色亦無愧詞又改曰寵辱不驚考中上致堂胡氏曰考士者當較其平素今以一時容止而進退之厚貌深情者得以䝉其姦矣然觀承慶判注之語則知古者考課有所毁譽而得之者以為榮辱此亦山公啟事之餘俗也後世課最負犯立為定目依式而書於吏文無謬則善矣其人有異績美行無由察録而貪賊素害幸免按舉者即以無過著於官簿賢否混亂功罪同區未之有改也豈非激揚之闕政乎中宗神龍中御史中丞盧懐慎上䟽曰臣聞孔子曰為邦百年可以勝殘去殺又曰茍有用我者期月已可三年有成故書云三載考績校其功也子産賢者也其為政尚累年而化成况常材乎竊見比来州縣官佐下車布政有多者一二年少者三五月遽即遷除不論課考或歴時未改便傾耳而聼企踵而覩爭求冒進不顧亷恥亦何暇宣風布化求瘼恤人哉户口流散百姓凋敝職為此也何則人知吏之不久則不從其政吏知遷之不遥又不盡其能偷安茍且脂韋而已又古之為吏者長子孫倉氏庾氏即其後也臣請都督刺史上佐兩畿縣令等在任未經四考不許遷除察其課效尤異或錫以車裘或就加禄秩或降使臨問并璽書慰勉若公卿有闕則擢以勸能政績無聞抵犯貪暴者放歸田以明賞罰致理救弊莫過於此元宗開元三年勅内外官考未滿所司預補替人名為守闕特宜禁斷縱後有闕所司不得令上二十五年命諸道採訪使考課官人善績三年一奏永為常式二十七年赦文三載考績黜陟幽明允叶大猷以勸天下比來諸道所通善狀但優仕進之輩與為選調之資責實循名或乖古義自今以後諸道使更不須通善狀每至三年朕自擇使臣觀察風俗有清白政理著聞者當别擢用之天寳二年考功奏准考課令考前釐事不滿二百日不成合考者釐事謂都論在任日至考時有二百日即成考請假停務並不合破日比來多不會令文以為不入曹局即為不釐事因此破考臣等參量但請俸禄即同釐事請假不滿百日停務不至觧免事須却上其考並合不破若有停務逾年不可更請禄料兼與成考從之肅宗乾元二年御製郭子儀李光弼苗晉卿李輔國考辭代宗寳慶元年吏部奏州縣官三考一替如替人不到請校四考後停二年考功奏請立京外按察京察連御史臺分察使外察連諸道觀察使各訪察官吏善惡其功過稍大事當奏者使司案成便奏毎年九月三十日以前具狀報考功其功過雖小理堪懲勸者案成即報考功至校考日參事跡以為殿最徳宗貞元元年以刑部尚書闗播吏部侍郎班宏為校内外官考使七年考功奏准諸司皆據功過論其考第自至徳後至今三十年來一例申中上考今請覆其能否以定升降從之又言凖考課令三品已上及同中書門下平章事考並奏取裁親王及大都督亦同伏詳此文則職位崇重考績褒貶不在有司皆合上奏今縁諸州刺史大都督府長史及上中下都督都䕶等有帶節度觀察使者方鎮既崇名禮當異毎嵗考績亦請奏裁其非節度觀察等州府長官有帶臺省官者請不在此限憲宗元和二年中書門下舉今年正月赦文上言國家故事於中書直具員簿以序内外庻官爰自近年因循遂廢清源正本莫急於斯今請京常參官五品以上前資見任起元和二年量定考數直具員簿應諸州刺史次赤府少尹次赤令諸陵令五府司馬及東宫官除右左庻子王府官四品已下並請五考其臺官先定月數今請侍御史滿十三月殿中侍御史滿十八月監察御史依前一十五個月與轉三省官並三考外餘官並四考外其文武官四品已下並五考商量與改尚書省四品已上餘文武官三品已上縁品秩已崇不可限以此例須有進改並臨時奏聼進止其權知官須至兩考然後正授未經正授不得用權知官資改轉其中縁官闕要人及縁事須有移者即不在常格叙遷之限諸道及諸使副使行軍司馬判官參謀掌書記支使推官廵官等有勅充職掌帶檢校五品已上官及臺省官三考與改轉餘官四考與改轉李渤為考功員外郎嵗終當考校自宰相而下升黜之名第其考以宰相叚文昌等為下考奏入不報會渤請急馮宿領考功以考課令取嵗中善惡為上下郎中校京官四品以下黜陟之由三品以上為清望官嵗進名聼内考非有司所得専渤舉舊事為褒貶違朝廷制請如故事渤議遂廢十四年考功奏今後應注考狀但直言某色行能某色異政或樹勞效或推斷紏舉便書善惡不得更有虗美閑言注考並不得失於褒貶如違據所失輕重准令降書考官考又准勅御史臺分察及諸道觀察使訪察官吏善惡功過具狀報考功近日都不見牒報今後諸司不申報者州府本判官便與下考從之宣宗大中五年吏部奏刺史縣令如賦税畢集判斷不滯户口無逃散田畝守常額差科均平𪠘宇修飾館驛如法道路開通之類皆是尋常職分不合計課自今後但云所勾當常行公事並無敗闕唯職分乖缺及開田招户辨獄雪寃及新制置之事則任録其由申上亦須簡要不得繁多又近年以來刺史皆自録課績申省務衒者則張皇其事謙退者則緘黙不言今後其廵内刺史請並委本道觀察使定其考第然後録申本州不得自録課績申省又州府申官人覆得寃獄書殊考者其元推官人多不懲殿或云書考日當書下考至時又不提舉請自今以後書辨獄官人殊考日便須書元推官下考如元推官自以為屈任經亷使及臺省陳論其官人先有殿犯官長斷云至書考日與下考者如至時不舉其本判官當書下考其所申到下考省司校其所犯如與令式相符便校定申奏至勅下後並須各牒州府又近日諸州府所申奏録課績至兩考三考以後皆重具從前功課申省以冀褒升省司或檢勘不精便有僥倖今後不得更具從前功績申上又近日諸州府所申考觧皆不指言善最或漫稱考秩或廣説門資既乖令文實為繁弊今後如有此色並請准令降其考第從前以來應得考之人並給考牒以為憑據近年考事容易給牒不一或一人考牒數處請假或數年之後方始來請自今以後校考勅下後其得殊考及上考人省司便據人數一時與修寫考牒請准吏部告身及禮部春闗牒毎人各出錢收贖其得殊考者出一千文上考者出五百文其錢便充寫考牒紙筆雜用以前件事條等或出於令文或附以近勅酌情揣事不致乖張謹並條例進上奉勅依周世宗顯徳五年尚書考功奏奉新勅起今年正月一日後授官並以三周年為限閏月不在其内者當司所書校内外六品以下赴選官員考第今後以一周年校成一考如欠日不計限滿三周年校成三考如考滿後未有替人在任更一周年與成第四考欠日不在計限兼逐年月日自上以來課績功過第二考須具經考後課績不得重疊計功其末考須是具得替年月日比類升降自今年正月一日以前授官到任者准格例三十箇月書校三考今年正月一日後来授官到任者准新勅三周年為月限毎一周年書校一考閏月不在其内所有諸道州府校考申發考帳及當司校奏各依前後格勅施行按周以前皆以三十月為三考至是始令三周年云宋太祖皇帝建隆二年舊制文武常參官各以曹務閑劇為月限考滿即遷上謂宰相非循名責實之道會監門衛将軍魏仁滌等以治市征有羡詔並增秩因罷嵗月叙遷之制非有勞者未嘗進秩矣止齋陳氏曰太祖置審官院考課中外職事受代京朝官引對磨勘蓋復序進之制其後稍立法文臣五年武臣七年咸平五年十二月令審官院考校京朝官令任及五年以上無贓私罪者以名聞當遷其秩諸路轉運使令中書進擬景徳三年六月令三班院考校使臣以七年為限曾犯贓罪則文臣七年武臣十年天禧三年十一月郊赦京朝官犯贓罪經七年者委中書門下取㫖五行曾犯贓罪經十年者委樞宻院取㫖治平三年九月詔待制以上六嵗至諫議大夫止今太中大夫京朝官四嵗至前行郎中止今朝請大夫少卿監以七十員為額今朝議大夫於是始有止法元豐四年中書擬定磨勘轉官諌議大夫待制以上自通直郎至太中大夫三年太中大夫以上進士八年餘十年今考功令改諌議大夫為權六曹侍郎承務郎以上至朝請大夫進士八年餘十年崇寜四年改朝請大夫至中散大夫七年中大夫非兩制不得轉太中大夫紹興四年修立承務以上四年即轉奉直朝議中散中奉中大夫者七年紹興八年添入中大夫諸朝議奉直大夫并特恩人以八十員為額餘如舊法武臣大使臣修武郎至武徳大夫五年武功大夫七年轉遥郡刺史以後十年至遥郡防禦使止而止法尤為嚴密矣進納人至從義郎止吏職非泛補授至訓武郎止樞密院人亦至訓武止三省人至朝請大夫止已出官不得轉中大夫内侍至武功郎止駙馬都尉至承宣使止而醫官不過和安大夫太史局官不過春官大夫横行非戰功不得除授三年詔吏部流内銓南曹門下省令議成長定格一卷循資格一卷制勅一卷凡二十二道止齋陳氏曰選人七階祖宗朝以考第資歴無過犯或有勞績者遞遷謂之循資若磨勘應格自令録以上今從政郎及六考者皆改著作佐郎無出身及十考者改大理寺丞今宣教郎舊宣徳郎政和改今名其有功賞者減一考若未該磨勘循格至支使今文林郎及八考者有出身人改太子中允餘改太子中舎今通直郎其四色判官今承直郎及九考以上者改祕書丞今承議郎無出身人止殿中丞今奉議郎十二考以上改太常博士今奉議郎自仁宗始以考第改官者猥多遂詔用帥守通判監司保舉以嵗改百員為額元豐稍鐫改官之額觀察判官以上改奉議郎無出身人改通直郎掌書記改通直郎支使以下一例改宣徳郎先是令文州縣官撫育有方户口增益者各凖見户十分加一分刺史縣令各進考若户口耗者凖增户法減一分降考一等主司因循例不進考唯按視缺失不以輕重便書下考至是有司上言請以減損户口一分科内係欠一分以上並降考一等如以公事曠遺有制殿罰者亦降一等又置縣尉頒捕賊條給以三限限各二十日三限内獲者令尉等第議賞三限不獲者尉罰一月俸令半之尉三罰令四罰皆殿一選三殿停官令尉與賊鬬而能盡獲者賜緋陞擢六年詔諸州縣官今後罷任具治所𪠘舎倉庫有無壊隳及所增修著為籍受代則書於考課之文其損壊不完者殿一選完葺建置而不煩民力者減一選凡考第之法内外選人周一嵗為一考欠日不得成考三考未替更周一嵗書為第四考已書之績不得重計太宗太平興國元年先是諸州掾曹及縣令簿尉皆户部南曹給印紙歴子俾州郡長吏書其績用愆過秩滿有司詳視差其殿最詔有司申明其諸州有别給公據者罷之繼又詔申明有司批書凡漏書一事者殿一選三事降一資及不得增減功過阿私罔上違事者書考之官議罪端拱三年以户部侍郎王沔度支副使謝泌祕書承王仲華同磨勘京朝官功過吏部侍郎張宏户部副使髙象先膳部員外郎范正辭同磨勘幕職州縣官樞宻院都承㫖趙鎔李著左贊善大夫魏廷式同磨勘三班自是考績之司各有條制矣四年磨勘京朝官之司曰審官院幕職州縣官曰考課院詔翰林學士錢若水樞宻直學士劉昌言同知審官院事凡京朝官考較功過以定任使之升降皆其職也又以判流内銓翰林學士蘇易簡虞部員外郎知制誥王旦等同知考課院凡常調選人流内銓主之奏舉及歴任有私累官考課院主之按考課之任唐則屬之吏部専以考功郎中主之宋興之初祖宗特重其事故不但委之司存而特命清望之官同任其事如五年之命王沔謝泌之流是也至是年始立審官院考課院於是専有司存然所命同知院事者亦皆名流貴官為之比唐制為重矣真宗咸平四年舊制毎郊祀推恩百僚多獲序進諫官孫何等請罷之至是詔郊祀禮行慶成止加勲階爵邑而命審官院考課朝官殿最引對遷秩京朝官磨勘始此景徳元年令諸路轉運使辨察所部官吏能否為三等公勤亷幹恵及民者為上幹事而無亷譽清白而無治聲者為次畏懦貪猥者為下四年初令見任京朝官及三年方得磨勘遷官後又令京朝官在外任滿三年當考課考者附驛上狀仁宗尤矜憐下吏以銓法選人有私罪皆未聼磨勘諭近臣凡衙謝弗至與對揚失儀舊嘗論罪其勿論其後吏部銓引選人九人瀛州束鹿縣尉王得説歴官寡過書考最多而無保任者帝察其孤寒特擢為大理寺丞天聖時詔自今兩地臣僚非有勲徳善状不得非時進秩非次罷免者毋以轉官帶職為例兩省以上舊法四年一遷官今具履歴聼㫖京朝官磨勘年限有私罪及歴任嘗有罪先以情重輕及勤績與舉者數奏聼㫖慶歴三年從輔臣范仲淹等所奏定磨勘保任之法自朝官至郎中少卿須清望官五人保任始得遷其後御史劉元瑜以為適長奔競非所以飬士亷恥乃罷之八年詔近臣言時政翰林學士張方平言祖宗之時文武官不立磨勘年嵗不為升遷次序有才用名實之人或從下位便見超擢無才用名實之人有守一官十餘年不改轉者其任監當或知縣通判知州有至數任不得遷者故當時人皆自勉非有勞效知不得進自祥符之後朝廷之議益循寛大故令自監當入知縣知縣入通判通判入知州皆以兩任為限又守官及三年即例得磨勘先朝行之人始知恩未見有弊及今嵗年深久習以為常皆謂本分合得無賢不肖莫知所勸願陛下稍革此制其應磨勘叙遷者必有勞績可褒或朝廷特勅擇官保任者即與轉遷如無勞績又不因保任者更增展年考其保任之法不當一例應須選擇清望有才識之人即命舉之如此則是委執政之臣舉清望官委清望官舉親民官官有闕員隨員數舉之又足以見聖恩急才愛民之意也至和元年以賈黯判流内銓時承平日久百官職業皆有常憲度樂於因循而銓衡徒文書備具而已黯始欲以風義整救其弊益州推官桑澤在蜀三年不知其父死後代還舉者甚多應格當遷方投牒自陳人皆知其嘗喪父莫肯為作文書澤知不可乃去發喪制服以不得家問為觧澤既除喪求磨勘黯謂澤三年不與其父通問亦有人子之愛於其親乎使澤雖非匿喪猶為不孝也言之於朝澤坐廢歸田里不齒終身晉州推官李亢初以入錢得官已而有私罪黙自引去匿所得官以白衣應舉及第積十嵗當應勘乃自首言其初事黯以為此律所謂罔冒也奏罷之奪其勞考容齋洪氏隨筆曰國朝尚存唐制考課之法慶歴皇祐中黄亞夫庻佐一府三州幕其集所載考詞十四篇黄司理者曰治許獄嵗再周矣論其罪棄市者五十四流若徙三百十有四杖百八十六皆得其情無有寃隱不伸非才也其孰能其考可書中舞陽尉者曰舞陽大約地廣他盗徃徃嚢槖於其間居一嵗為竊與强者凡十一前件官捕得之其亡者一而已矣非才焉固不能可書中法曹劉昭逺者曰法者禮之防也其用之以當人情為得刻者為之則拘而少恩前件官以通經舉進士始掾於此若老於為法者毎抱具獄必傅之經義然後處故無一不當其情其考可書中他皆類此不知其制廢於何時今但付之士案吏据定式書於印紙比者又令郡守定縣令臧否高下人亦不知所從出若使稍復舊貫似為得宜雖未必人人盡公得實然思過半矣嘉祐二年詔文武官舊皆陳乞磨勘有傷亷節截自今嵗滿令審官三班院舉行之同知諌院司馬光言自古得賢之盛莫若唐虞之際然稷任播種益主山林垂為共工龍作納言契敷五教臯陶明刑伯夷典禮后䕫典樂皆各守一官終身不易茍使之更來迭去易地而居未必能盡善也今以群臣之材固非八人之比乃使之遍居八人之官逺者三年近者數月輙以易去如此而望職事之修功業之成必不可得也非特如是而已設有勤恪之臣悉心致力以治其職群情未洽績效未著在上者疑之同列嫉之在下者怨之當是時朝廷或以衆言而罰之則勤恪者無不觧體矣姦邪之臣衒竒以譁衆飬交以市譽居官未久聲聞四逹蓄患積弊以遺後人當是之時朝廷或以衆言而賞之則姦邪者無不爭進矣所以然者其失在於國家采名不采實誅文不誅意夫以名行賞則天下飾名以求功以文行罰則天下巧文以逃罪矣英宗治平三年考課院言知磁州李田再考在劣等降監淄州鹽酒税務坐考劣降等自田始考績之制舊無審定殿最格法自發運使率而下之至於知州皆歸考課院専以監司所第等級為據至考監司則總其甄别吏部能否副以採訪才行合二事為課悉書中等無所髙下神宗即位凡職皆有課凡課皆責實監司所上守臣謂不占等者展年降資而治狀優異者增秩賜金帛以璽書奬勵之若監司以上則命御史中丞侍御史考校又詔立考課縣令之法以斷獄平允賦入不擾均役止盗勸課農桑賑恤饑窮導修水利户籍增衍整治簿書為最而參用徳義清謹公平勤恪為善參考縣令治行分定上中下等至其能否尤殊絶者别立優劣二等嵗上其狀以詔賞罰其入優劣者賞罰尤峻繼又令一路長吏無甚臧否不須别為優劣二等止因上中下三等區别以聞隨内外官職司以考覈而中書皆置之籍每嵗竟或有除授則稽差殿最取其尤甚者而進絀之元豐三年詔御史臺六察案官以所紏劾官司稽違失職事多寡為殿最中書置簿以時書之任滿取㫖升黜已而中書上所修法以朝廷用其言斷罰人方為紏劾帝批曰或上簿亦可髙宗紹興二年臣僚言守令有四善四最考課之法雖具載條格欲明詔監司守臣遵行詔令吏部申明行下三年禮部員外郎舒清國言諸道郡縣頃罹兵燬請以户口增否别立守令考課分為上中下三等毎等又為三甲置籍考校縣令課績知通考之知州課績監司考之考功會其已成較其優劣而賞罰焉從其議六年王弗請令江淮官久任而課其功過上曰朕昔為元帥時見州縣官言在官者以三年為一任一年立威信二年守規矩三年則務收人情以為去計今止以二年為任雖有葺治之心亦無暇矣可如所奏中興之初赴調之士萃於東南令權以二年為任以紓留滯兵休日仍舊又詔自今監司分上下半年開具所部知縣有無善政顯著繆懦不職申省十四年司封郎中李澗言今知縣再任六考乃陞通判而丞與諸司屬官初無吏責反以四考闗陞故人皆有所擇而不願就又因民事得罪之人雖微罪亦終身廢棄故人皆有所懼而不敢就請自今應理親民者並通及六考闗陞而應緣民事之人自徒以上乃取㫖二十五年監察御史何溥言州縣之間貪吏為虐監司不問郡守不訶甚失陛下委任之意臣請郡守不治而監司得以按之則郡守當坐縱容之罪監司不按而臺諌得以劾之則監司當受失察之罪而又毎嵗校其所按之多寡以為殿最之課從之二十七年校書郎陳俊卿上言人之才性各有所長稷契臯陶垂益伯夷在唐虞之際各守一官至終身不易此數君子者使之更來迭去易地而居未必盡其能况其餘乎今也監司帥臣小州換大州東路易西路送迎擾擾内而朝廷百執事亦徃徃計日待遷視所居之官有如𫝊舎臣嘗考太祖朝任魏丕掌作坊十年劉温叟為臺丞十有二年太宗朝劉䝉正掌内藏二十餘年此祖宗之良法也望令監司帥守有政術優異者或増秩賜金或待終秩而後遷使久於其職察其勤惰而陞黜之庻㡬人安其分而萬事舉矣詔三省行之孝宗隆興元年先時以恩例減磨勘者率以四年為一官有初官部數綱而徑轉朝郎者至是始著對用之令凡一年減年對一年實歴乃得四年臣僚言有其事斯有其勞有其勞斯謂之考今有丐祠於私室受禄於公家秩終則計考書歴用以升改甚不稱陛下勸勤責實之意乃詔選人任嶽祠並不理為考乾道三年廷臣上言我祖宗盛時有京朝官考課有幕職州縣官考課其後為審官院為考課院皆命中書或兩制臣僚校其能否以施賞罰百餘年如一日也獨熙寜中始罷之自此州縣之吏茍簡自恣不復知有殿最雖有批書徒為文具至若身為侍從則并與批書俱亡矣尚何考焉今陛下勵精庶政綜核名實望遵故事應監司郡守朝辭日别給御前歴子如薦賢才為㡬人使各録其政績若為治錢榖若為理獄訟興某利除某害各為條目使之祗奉新書黽勉從事毎考令當職官吏從實批書代還使藉手以見陛下然後詔執事精加考覈其風績有聞者優與增秩所莅無狀者罰自無赦薄海内外風俗丕變賢者效職而中下之才亦皆强於為善上乃詔經筵官參照祖宗考課之法講而行之廣西提刑張維考察本部守令以政平訟理為臧以政不平訟不理為否而臧否之中復有優劣凡臧之品有三臧之最臧之次臧之下否之品有二否之最否之次天子嘉其法頒之諸道視以為式令監司帥臣嵗終各以其能否之實聞於朝其有貪墨庸懦庇而不發致臺諌論列者各有罰其冬禮部郎官胡元質論其法猶未盡上問其故元質曰治效赫然職事廢弛臧否定矣其有治狀隱而未著無功過可書一切名之以否則何武之平平陽城之下下今日皆否也願令監司帥臣置之臧否之外無强名之上曰善八年詔臧否為三等治效顯著為臧貪刻庸繆為否無功無過為平令詳加考察明著事實如不公令御史臺彈奏張栻胡銓久不理年勞上嘉其亷靜詔栻特遷兩官銓磨勘四官光宗初言者謂臧否之法多由請託繆者營救其入否平者僥倖其為臧况觀其初而未安於政者先在所否待久而後見其過者預以為臧臧否一定則臧者雖有疵而終不指否者雖有美而終不錄願詔各舉所知而罷其令寜宗慶元三年右正言應武言祖宗以一郡之官總之太守諸郡之官總之監司而又以諸道之監司總之御史朝廷以殿最三等察監司監司以三科考郡守而下皆辨其職而進退之今郡國按刺之權寖輕多徇私情而廢公法臣嘗考承平舊制於御史臺别立考課職司一司以刺舉多者為中無所刺舉為下盖監司受察則郡守不得茍安郡守振職則僚屬莫敢自肆願陛下遵而行之申嚴其令嵗終各以能否之實聞於上以詔陞黜其貪墨昏懦致臺諌奏劾者坐監司郡守以容庇之罪詔行焉文獻通考卷三十九
