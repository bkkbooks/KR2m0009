body:
  text: 文獻通考卷一百九十六鄱陽馬端臨貴與著經籍考二十三史傳記國史補二卷鼂氏曰唐李筆撰起開元止長慶間事初劉餗記元魏迄唐開元事名曰國朝傳記故肇續之幸蜀記三卷鼂氏曰唐李匡文宋巨周宋居白撰初匡文記盡孝明崩巨周記止於歸長安敘事互有詳略居白合二記以宋為本析李為注取二序冠篇復掇遺事增廣焉次栁氏舊聞一卷鼂氏曰唐李德裕撰上元中史臣栁芳與髙力士同竄黔中髙力士為芳言開元天寶禁中事乃論次舊聞李吉甫與芳子冕貞元初俱為尚書郎嘗道力士之説吉甫每為其子德裕言歲祀既久遺藁不傳但記十七事後文宗訪力士事於德裕德裕編次上之多同明皇雜録奉天録四卷陳氏曰唐趙元一撰起建中四年涇原叛命終興元元年克復神都燕南記三卷陳氏曰唐恆州司戶谷况撰專記成德一鎮事自建中二年至大和七年起張志忠終王承元古語有燕南垂趙北際今以其在燕之南故名然河北諸鎮連叛事迹亦略矣建中河朔記六卷陳氏曰唐李公佐撰序言與從弟正封讀國史至建中貞元之際序述河朔故事未甚詳備以舊聞於老僧智融及谷况燕南記所説略同參錯會要以補史闕邠志三卷陳氏曰唐殿中侍御史凌凖宗一撰邠軍即朔方軍也此本從盱江鼂氏借録其末題曰文忠修唐史求此書不獲今得於忠憲范公之孫伯髙其中尚舛誤當訪求正之紹興乙丑鼂公鄼涼公平蔡録一卷陳氏曰唐山南東道掌書記鄭澥撰涼國公者李訴也開成承詔録二卷鼂氏曰唐李石撰石與鄭覃李固言相文宗録當時延英奏對事開成年號太和野史三卷陳氏曰不著名氏但稱大中戊辰陳郡袁濤序自鄭注而下十七人本共為一軸濤分之為三卷太和摧凶記一卷陳氏曰文與上同而不分卷豈其初本邪野史甘露記二卷陳氏曰不著名氏上卷記甘露之禍下卷記諸臣本末乙卯記一卷陳氏曰唐布衣李潛用撰末又有吳郡李實者述訓注本謀附益之乙卯太和九年也兩朝獻替記三卷鼂氏曰唐李德裕撰德裕相文宗武宗録當時奏對議論元和朋黨録一卷鼂氏曰唐馬永易記牛李朋黨始末自牛僧孺試賢良迄令狐綯去位陳氏曰池州石埭縣尉維揚馬永易明叟撰自元和三年牛李對策以至大中十三年令狐綯罷相唐朋黨本末具矣永易嘗著唐職林實賔録等書崇觀政和間人也又有馬永卿大年者從劉元城遊大觀三年進士當是其羣從館閣書以永易為唐人大誤也會昌伐叛記一卷陳氏曰李德裕撰記平澤潞事四夷朝貢録十卷陳氏曰唐給事中渤海髙少逸撰會昌中宰相李德裕以黠戞斯朝貢莫知其國本原詔為此書凡二百一十國本二十卷合之為十卷東觀奏記三卷鼂氏曰唐裴廷裕撰昭宗時長安寇亂相仍自武宗以後日歷起居注散軼不存詔史臣撰宣懿僖三朝實録廷裕次宣宗録特采大中以來耳目聞見撰次此書奏記於監修杜讓能以備史閣討論云陳氏曰記宣宗朝事凡八十九條貞陵遺事二卷續一卷陳氏曰唐中書舍人令狐澄撰吏部侍郎栁玭續之澄所記十七事玭所續十四事咸通庚寅解圍録一卷陳氏曰唐成都少尹張雲景之撰言南詔圍城扞禦事金鑾密記一卷一作三卷鼂氏曰唐韓偓撰偓天復元年為翰林學士從昭宗西幸朱溫圍岐三年偓因密記其謀議及所聞見事止於貶濮州司馬豫嘗謂偓有君子之道四焉唐之末南北分朋而忘其君偓崔允門生獨能棄家從上一也其時搢紳無不交通內外以躐取爵祿偓獨能力辭相位二也不肯草韋貽範起復麻三也不肯致拜於朱溫四也詩曰風雨如晦雞鳴不已偓之謂矣而宋子京薄之奈何一本釐天復二年三年各為一卷首尾詳略頗不同互相讎校凡改正千有餘字云陳氏曰具述在翰苑時事危疑艱險甚矣昭宗屢欲相之卒不果而貶竟終於閩非不幸也不然與崔垂休輩駢首就戮於朱溫之手矣大唐補記三卷陳氏曰南唐程匡柔撰序言懿宗朝有焦璐者撰年代紀述神堯止宣宗匡柔襲托三百年歷補足十九朝起咸通戊子止癸巳附璐書中乾符已後備存補記末有後論一篇文詞雖拙議論亦正南部新書五卷鼂氏曰皇朝錢希白撰記唐故事桂苑叢談一卷鼂氏曰題云馮翊子子休撰雜記唐朝僖昭時雜事當是五代人李邯鄲云姓嚴中朝故事二卷鼂氏曰偽唐尉遲偓撰記唐懿昭哀三朝故事故曰中朝三朝見聞録八卷陳氏曰不知作者起乾符戊戌至天祐末年及莊宗中興後河東事迹三朝者僖昭莊也其文直述多鄙俚廣陵妖亂志三卷陳氏曰唐晉陽鄭廷誨撰言髙駢吕用之畢師鐸等事汴水滔天録一卷陳氏曰唐左拾遺王振撰言朱溫篡逆事吕夏卿兵志三卷鼂氏曰皇朝吕夏卿撰公武得之於宇文時中季蒙題其後云夏卿修唐史别著兵志三篇祕之戒其子弟勿妄傳鮑欽止吏部好藏書苦求得之其子無為太守恭孫偶言及因懇借抄録於吳興耳目記二卷鼂氏曰題云劉氏未詳何時人雜記唐末五代事朱梁興創遺編二十卷陳氏曰梁宰相敬翔子振撰自廣明巢賊之亂朱溫事迹訖於天祐弒逆大書特書不以為愧也其辭亦鄙俚莊宗召禍記一卷陳氏曰後唐中書舍人黃彬撰入洛記一卷鼂氏曰蜀王仁裕撰仁裕隨王衍降入洛陽記往返塗中事并其所著詩賦賈氏備史六卷陳氏曰漢諫議大夫賈談撰敘石晉禍亂每一事為一詩系之晉朝陷蕃記四卷鼂氏曰皇朝范質撰質石晉末在翰林為出帝草降虜表知其事為詳記少主初遷於黃龍府後居於建州凡十八年而卒按契丹丙午歲入汴順數至甲子歲為十八年實國朝太祖乾德二年也陳氏曰據莆田鄭氏書目云范質撰本傳不載故館閣書目云不知作者未悉鄭氏何所據也晉太康平吳記二卷隋氏曰周吏部尚書張昭撰世宗將討江南昭采晉武平孫皓事迹為書上之唐餘録六十卷鼂氏曰皇朝王皡奉詔撰皡芟五代舊史繁雜之文采諸家之説倣裴松之體附注之以本朝當承漢唐之盛五代則閏也故名曰唐餘録寶元二年上之溫公修通鑑間亦取之皥曾之弟陳氏曰是時惟有薛居正五代舊史歐陽修書未出此書有紀有志有傳又博采諸家小説倣裴松之三國志注附其下方蓋五代别史也館閣書目以入雜傳類非是唐末泛聞録一卷鼂氏曰皇朝閻自若纂乾德中王普五代史成自若之父觀之謂自若曰唐末之事皆吾耳目所及與史册異者多矣因話見聞故事命自若志之陳氏曰題常山閻自若撰記五代及諸僣偽事其序自言乾德中得於先人及舅氏聞見且曰傳者難驗見者易憑考之史䇿不若詢之耆舊也然所記亦時有不同者如李濤納命事本謂張彥澤今乃云謁周髙祖未詳孰是五代補録五卷鼂氏曰皇朝陶嶽撰祥符壬子以五季史書闕略因書所聞得一百七事陳氏曰每代為一卷凡一百七條嶽雍熙二年進士五代史闕文一卷鼂氏曰皇朝王禹稱撰録五代史筆避嫌漏略者以備闕文凡一十七事建隆遺事一卷鼂氏曰皇朝王禹稱記太祖事按太祖崩時趙普已罷為河南節度使盧多遜亦是太宗太平興國元年始除平章事今云上將晏駕前一日召趙盧入宫其謬甚矣世多以其所記為然不足信也王氏揮麈録曰建隆遺事世稱王元之所述其間率多誣謗之詞至於稱趙普盧多遜受遺詔昌陵尤為舛繆案國史韓王以開寶六年八月免相至太平興國六年九月始再秉衡鈞當太祖升􅜯時普正在外何緣前一日與盧丞相同見於寢邪稱太祖長子德昭為南陽王又誤矣初未嘗有此事元之當時近臣又秉史筆豈不詳知且載秦王傳中云云安有淳化三年而見三朝國史秦王傳稱可謂亂道此特人託名為之又案元之自有小畜集序及三黜賦與國史本傳俱云淳化二年自知制誥舍人貶商州至道二年自翰林學士黜守滁上咸平二年守本官知齊安郡而此序年月次序悉皆顛錯其偽也明矣巽岩李氏曰世傳王禹稱所記建隆遺事十三章考其章句大抵不類禹稱平日之文其七章十三章鄙悖益可駭幸而史官弗信然學士大夫不習朝廷之故者猶以禹稱所作私信之余常反復證驗力排其誣決知其不出於禹稱矣蓋禹稱世所謂名賢者而數以直道廢故羣不逞輒假借竄寄謂世可欺殊不知普實愛重禹稱而禹稱於普尤拳拳也普遺藁四六表狀往往見禹稱集蓋禹稱代作也彼小人烏得識之陳氏曰其記陳橋驛前戒誓諸將事元出熙陵而序文云近取實録入禁中親自筆削然則此書之作誠何謂也邵氏聞見録亦嘗表而出之而或者亦辨此書之偽當考祖宗獨斷一卷陳氏曰皇朝陸經記祖宗獨斷事十事龍飛日歷一卷鼂氏曰皇朝趙普撰記顯德七年正月藝祖受禪事是年改建隆二月普撰此書普時為樞密學士景命萬年録一卷藝祖受禪録一卷鼂氏曰未詳撰人記趙氏世次藝祖歷試迄受禪事聖宋掇遺一卷鼂氏曰皇朝歐陽靖撰記國初至仁宗君臣美事以備史闕晉公談録三卷鼂氏曰皇朝丁謂撰多本朝事每章之首皆稱晉公言不知何人為潤益初董識志彥得之於洪州潘延之家延之晉公甥疑延之所為涑水記聞十卷鼂氏曰皇朝司馬光撰記賔客所談祖宗朝及當時雜事陳氏曰此書行於世久矣其間記吕文靖數事吕氏子孫頗以為諱蓋嘗辨之以為非溫公全書而公之曾孫侍郎伋季思遂從而實之上章乞毁板識者以為譏嘉祐時政記一卷鼂氏曰吳奎趙槩歐陽修記立英宗事并賈易論韓琦定册疏附於後甘陵伐叛記一卷陳氏曰題文升撰不知何人末有論稱甘陵人蘇朔為余言其大父慶歷中陷賊親見賊初叛時事按中興書目有甘陵誅叛録稱殿中丞王起撰起時為文彥博幕客然則别自一書也隆平集二十卷鼂氏曰皇朝曾鞏撰記五朝君臣事迹其間記事多誤如以太平御覽與總類兩書之類或疑非鞏書濮王中陳一卷鼂氏曰記治平中封濮安懿王時宰相奏狀及臺諫言章歐陽濮議四卷鼂氏曰皇朝歐陽修永叔撰其序云武王之作人皆謂君可代濮議之興人皆謂父可絶孟津之會獨夷齊不食周粟而餓死世未之知也後五百年得孔子而後顯然則濮議其可與庸人以口舌一日爭邪熙寧初永叔知亳州日書成上之蘇子瞻永叔客也亦以臺諫之論為直云書壬戍事一卷隋氏曰不知何人作記永樂之敗甚詳文獻通考卷一百九十六
