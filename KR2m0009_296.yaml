body:
  text: 文獻通考卷二百九十六鄱陽馬端臨貴與著物異考二水災春秋桓公元年秋大水董仲舒劉向以為桓弒兄隱公民臣痛隱而賤桓十三年復大水一曰夫人驕淫將弒君陰氣盛桓不悟卒見殺莊公七年秋大水亡麥苗董仲舒劉向以為莊公母與兄通共弒桓公莊釋父讎復取齊女臣下賤之之應十一年秋宋大水董仲舒以為時魯宋比年為乘邱鄑之戰百姓愁怨陰氣盛故二國俱水明年宋萬弒閔公二十四年大水董仲舒謂夫人哀薑淫亂不婦陰氣盛也宣公十年秋大水董仲舒以為時北伐邾取邑亦見報復兵讎連結百姓愁怨成公五年秋大水董仲舒劉向以為時成幼弱政在大夫三家専兵陰勝陽襄公二十四年秋大水劉向以為襄慢鄰國邾齊莒交伐之魯國小兵弱數敵強大百姓愁怨陰氣盛漢髙后三年夏漢中南郡大水水出流四千餘家四年秋河南大水伊雒流千六百餘家汝水流八百餘家八年夏漢中南郡水復出流六千餘家南陽沔水流萬餘家是時女主獨治諸呂相王文帝十二年十一月河決東郡後三年秋大雨晝夜不絶三十五日藍田山水出流九百餘家淹壞民室八千餘所殺三百餘人時新垣平得幸立渭陽五帝廟郊見上帝後歲餘謀為逆誅夷又胸奴數犯北邊殺略甚衆漢連歲征討武帝建元二年春河水溢於平原元光三年春河水徙從頓邱東南流入渤海五月河決濮陽汜郡十六發卒十萬救決河起龍淵宮元鼎二年夏大水關東餓死以千數元帝初元元年關中十一郡大水二年北海水溢流殺人民五年夏及秋大水潁川汝南淮陽廬江雨壞鄉聚民舍及水流殺人先是一年有司奏罷郡國廟是歲又定迭毁罷太上皇於惠帝寢廟皆無復修刑臣石顯用事成帝建始三年夏大水三輔霖雨三十餘日郡國十九雨山谷水出凡殺四千餘人壞官寺民舍八萬三千餘所四年河決東郡金隄一陽朔二年秋關東大水王莽始建國二年河決魏郡泛清河以東數郡後漢光武建武六年東郡以北傷水七年六月戊辰雒水溢至津城門𢎞農都尉治為水所漂殺民人傷稼及廬舍八年秋大水三十一年五月大水明帝永平三年京師及郡國七大水七年秋郡國十四大水和帝永元元年七月郡國九大水傷稼榖梁傳曰高下有水災曰大水京房易傳曰顓事私知誅罰絶理厥災水其水也雨殺人隕霜大風天黃飢而不損兹謂泰厥災水殺人辟遏有德兹謂狂厥災水流殺人已水則地生蟲歸獄不解兹謂追非厥水寒殺人追誅不解兹謂不理厥水五穀不收大敗不解兹謂皆陰厥水流入國邑隕霜殺穀春秋考異郵曰陰盛臣逆民悲情發則水出河決也是時和帝幼竇太后攝政其兄竇憲幹事及憲諸弟皆貴顯並作威暴虐常所怨恨輒任客殺人其後竇氏誅滅十年五月丁巳京師大雨山水流出至東郊壞民廬舍十二年六月潁川大水傷稼時和帝幸鄧貴人廢陰后殤帝延平元年五月郡國三十七大水傷稼董仲舒曰水者陰氣盛也是時帝在襁抱鄧太后専政臣昭按本紀是年九月六州大水袁山松書曰六州河濟渭雒洧水盛長泛溢傷秋稼安帝永初元年冬十月辛酉河南新城山水暴出突壞民田壞處泉水出深三丈是時司空周章等以鄧太后不立皇太子勝而立清河王子故謀欲廢置十一月事覺章等被誅是年郡國四十一水出漂沒人民謝沈書曰死者以千數讖曰水者純陰之精也陰氣盛洋溢者小人専制擅權妒疾賢者依公結私侵乘君子小人席勝失懷得志故涌水為災二年大水臣昭按本紀京師及郡國四十有水周嘉傳是夏旱嘉收葬客死骸骨應時澍雨歲乃豐稔則水不為災也三年大水臣昭按本紀京師及郡國四十一雨水四年大水臣昭按本紀云三郡五年大水臣昭按本紀郡國八六年河東池水變色皆赤如血水變占曰水化為血者好任殘賊殺戮不辜延及親戚水當為血是時鄧太后猶専政古今注曰元初二年潁川襄城臨水化為血京房占曰流水化為血兵且起以日辰占與其色博物記曰江河水赤占曰泣血道路涉蘇於河以處延光三年大水流殺人民傷苖稼是時安帝信江京樊豐及阿母王聖等讒言免太尉楊震廢皇太子臣昭按左雄傳順帝永建四年司冀二州大水傷稼楊厚傳永和元年夏雒陽暴水殺千餘人質帝本初元年五月海水溢樂安北海溺殺人物時帝幼梁太后専政春秋漢含孳曰九卿阿黨擠排正直驕奢僭害則江河潰決方儲對策曰民悲怨則陰類強河決海淡地動土涌桓帝建和二年七月京師大水去年冬梁冀枉殺故太尉李固杜喬三年八月京都大水時梁太后猶専政永興元年秋河水溢漂害人物臣昭按朱穆傳云漂害數千萬户京房占曰江河溢者天有制度地有里數懷容水澤浸溉萬物今溢者明在位者不勝任也三公之禍不能容也率執法者利刑罰不用常法二年六月彭城泗水增長逆流梁冀别傳曰冀之専政天為見異衆災並湊蝗蟲滋生河水逆流五星失次太白經天人民疾疫出入六年羌戎叛戾盜賊略平皆冀所致燉煌實録張衡對策曰水者五行之首滯而逆流者人君之恩不能下及而致逆也潛潭巴曰水逆者反命也宜修德以應之永夀元年六月雒水溢至津陽城門漂流人物臣昭按本紀又南陽大水是時梁皇后兄冀秉政疾害忠直威權震主後遂誅滅延熹八年四月濟北水清九年四月濟陰東郡濟北平原河水清襄楷上言河者諸侯之象清者陽眀之徵豈獨諸侯有規京都計邪其明年宫車晏駕徵解犢亭侯為漢嗣即尊位是為孝靈皇帝永康元年八月六州大水渤海海溢沒殺人是時桓帝奢侈淫祀十一月崩無嗣靈帝建寧四年二月河水清袁山松書曰禱於龍五月山水大出漂壞廬舍五百餘家袁山松書曰是河東之水暴出也熹平二年六月東萊北海海水溢出漂流人物三年秋雒水出四年夏郡國三水傷害秋稼光和六年金城河溢東出二十餘里中平五年郡國六水大出臣昭按袁山松書曰山陽梁沛彭城下邳東海琅琊則是七郡獻帝建安二年九月漢水溢流害民田廬舍是時天下大亂袁山松書曰曹操専政十七年七月大水洧水溢十八年六月大水獻帝起居注曰七月大水上親避正殿八月以雨不止且還殿二十四年八月漢水溢流害民田廬舍明年禪位於魏魏文帝黃初四年六月大雨霖伊雒溢至津陽城門漂數千家殺人帝自即位自鄴遷洛營造宫室而不起宗廟太祖神主猶在鄴嘗於建始殿饗祭如家人禮終黃初不復還鄴又郊社神祇未有定位簡宗廟廢祭祀之罰也明帝景初元年九月淫雨冀兖徐豫四州水出溺殺人漂失財産時帝崇飾宫室妨害農戰觸情恣欲水不潤下之應吳孫權赤烏八年夏茶陵縣洪水溢出漂二百餘家十三年秋丹陽故鄣等縣又洪水溢出按權稱帝三十年竟不於建業創七廟唯父堅一廟逺在長沙而郊祀禮闕末年雖一南郊而北郊無聞吳楚之望亦不見秩反祀羅陽妖神以求福助簡宗廟廢祭祀之罰也太元元年又有大風涌水之異時權信讒廢太子又無年不用兵百姓愁怨孫亮五鳯元年夏大水亮即位四年乃立權廟又終吳世不上祖宗號修嚴父禮廢二郊不秩羣神罰同前又時孫峻専政陰勝陽之應孫休永安四年五月大雨水泉涌溢昔歲作浦里塘功費無數而田不可成士卒死叛或自賊殺百姓愁怨陰氣盛五年八月壬午大雨震電水泉涌溢晉武帝泰始四年九月青徐兖豫四州大水七年六月大雨霖河洛伊泌皆溢殺二百餘人自帝即尊位不加三后祖宗之號至泰始二年又除明堂南郊五帝座同稱昊天上帝一位而已又省先后配地之祀此簡宗廟廢祭祀之罰也咸寧元年九月徐州大水二年七月癸亥河南魏郡暴水殺百餘人閏月荆州郡國五大水流四千餘家去年采擇良家子女露面入殿帝親簡閲務在姿色不訪德行有蔽匿者以不敬論搢紳愁怨天下非之陰盛之應也三年六月益梁二州郡國八暴水殺三百餘人七月荆州大水九月始平郡大水十月青徐兖豫荆益梁七州又大水是時賈充等用事専恣而正人疏外者多陰氣盛也四年七月司冀兖豫荆揚郡國二十大水傷秋稼壞屋室有死者太康二年六月泰山江夏大水泰山流三百家殺六千餘人江夏亦殺人時平吳後王濬為元功而詆劾妄加荀賈為無謀而並蒙重賞收吳姬五千納之後宫此其應也四年七月兗州大水十二月河南及荆揚六州大水五年九月郡國四大水又隕霜是月南安等五郡大水六年四月郡國十大水壞廬舍七年九月郡國八大水八年六月郡國八大水惠帝元康二年有水災五年五月潁川淮南大水六月城陽東莞音官大水殺人荆揚徐兗豫五州又水是時帝即位已五載猶未郊祀其蒸嘗亦多不親行事此簡宗廟廢祭祀之罰六年五月荆揚二州大水是時賈后亂朝寵樹賈郭女主専政陰氣盛之應也八年五月金墉城井溢漢志成帝時有此妖後王莽僭逆今又有此妖趙王倫篡位倫廢帝於此城井溢所在其天意也九月荆揚徐冀豫五州大水是時賈后暴戾滋甚韓謐驕猜彌扇卒害太子旋以禍滅九年四月宫中井水沸溢永寧元年七月南陽東海大水是時齊王冏舉永反専政陰盛之應也泰安元年七月兖豫徐冀四州水時將相力政無尊主心陰盛故也元帝太興三年六月大水是時王敦內懷不臣慠狠凌上此隂氣盛也四年七月又大水永昌二年五月荆州及丹陽宣城吳興夀春大水眀帝太寧元年五月丹陽宣城吳興夀陽大水是時王敦威權震主陰氣盛故也成帝咸和元年五月大水是時嗣主幼沖母后稱制庾亮以元舅決事禁中陰勝陽故也二年五月戊子京都大水是冬以蘇峻稱兵都邑塗地七年五月大水是時帝未親機務政在大臣陰勝陽也咸康元年八月長沙武陵大水穆帝永和四年五月大水五年五月大水六年五月又大水是時幼主沖弱母后臨朝又將相大臣各執權政與咸和初同事也七年七月甲辰夜濤水入石頭死者數百人是時殷浩以私忿廢蔡謨遐邇非之又幼主在上而殷桓交惡選徒聚甲各崇私權陰勝陽之應也一説濤水入石頭以為兵占後殷浩桓溫謝尚荀羡連年征伐百姓愁怨也升平二年五月大水五年四月又大水是時桓溫權制朝廷専征伐陰勝陽也海西太和六年六月京師大水平地數尺浸及太廟朱雀大航纜斷三艘流入大江丹陽晉陵吳郡吳興臨海五郡又大水稻稼蕩沒黎庶飢饉初四年桓溫北伐敗績十喪其九五年又征淮南踰歲乃克百姓愁怨之應也簡文帝咸安元年十二月壬午濤水入石頭眀年祅賊盧竦率其屬數百人入殿略取武庫三庫甲仗遊擊將軍毛安之討滅之兵興陰盛之應也孝武帝太元三年六月大水是時帝幼弱政在將相五年五月大水六年六月揚荆江三州大水八年三月始興南康廬陵大水平地五丈十年五月大水自八年破苻堅後有事中州役無寧歲愁怨之應十三年十二月濤水入石頭毁大航殺人明年慕容氏寇擾司兖鎮戍西北疲於奔命愁怨之應也十五年七月沔中諸郡及兖州大水是時緣河紛爭征戍勤悴之應也十七年六月甲寅濤水入石頭毁大航漂船舫有死者京口西浦亦濤入殺人永嘉郡潮水湧起近海四縣人多死後四年帝崩而王恭再攻京師京師亦發衆以禦之兵役頻興百姓愁怨之應也十八年六月己亥始興南康廬陵大水深五丈十九年七月荆徐大水傷秋稼二十年六月荆徐又大水安帝隆安三年五月荆州大水平地三丈去年殷仲堪舉兵向京師是年春又殺郗恢陰盛作威之應也仲堪尋亦敗亡五年五月大水是時會稽王世子元顯作威陵上又桓元擅西夏孫恩亂東國陰勝陽之應也元興二年十二月桓元篡位其明年二月庚寅夜濤水入石頭商旅方舟萬計漂敗流斷骸胔在智反相望江左雖頻有濤變未有若斯之甚三月義軍克京都元敗走遂夷滅之三年二月己丑朔夜濤水入石頭漂沒殺人大航流敗義熙二年十二月己未夜濤水入石頭明年駱球父環潛結桓允殷仲文等謀作亂劉稚亦謀反凡所誅滅數十家三年五月丙午大水四年十二月戊寅濤水入石頭明年王旅北討六年五月丁巳大水乙丑盧循至蔡州八年六月大水九年五月辛巳大水十年五月丁丑大水戊寅西明門地穿涌水出毁門扇及限亦水沴土也七月乙丑淮北風災大水殺人十一年七月丙戌大水淹漬太廟百官赴救明年王旅北討關河宋文帝元嘉五年六月都下大水七年十二月吳興晉陵義興大水十二年六月丹陽淮南吳興義興大水都下乘船十七年八月徐兖青冀四州大水十八年五月甲申河水泛溢害居人十九年閏五月都下水二十四年徐兖青冀四州大水二十五年冬青州城南逺望見地中如水出有影謂之地鏡也孝武大眀元年正月庚午都下雨水齊武帝永明九年吳興義興大水廢帝永元元年七月都下大水死者甚衆梁武帝天監二年六月太末信安安豐三縣大水春秋考異繇曰陰盛臣逆人悲則水出河決時江州刺史陳伯之益州刺史劉季連舉兵反叛師旅數興百姓愁怨臣逆人悲之應也六年八月建康大水濤上御道七尺七年五月建康又大水時數興師旅以拒魏軍十二年四月建康大水時大發卒築浮山堰以遏淮水勞運連年百姓悲怨之應也普通元年七月己卯江淮海並溢中大通五年五月建康大水御道通船京房易飛候曰大水至國賤人將貴蕭棟侯景僭稱尊號之應也後魏宣武帝元年州鎮十八水飢延昌元年郡國十一大水二年十三郡大水東魏孝靜帝元象元年山東大水蝦蟇鳴於樹上後齊武成河清二年十二月兖趙魏大水後主天統三年并州汾水溢水者純陰之精陰氣洋溢者小人専制時和士開元文遙趙彥深等専任武平六年八月山東諸州大水時羣小用事姦佞滿朝隋文帝開皇六年山南荆浙七州水十八年河南八州大水時獨孤后預政楊素頗専水陰氣臣妾盛強之應仁夀二年河南河北諸州大水時帝用刑嚴急京房易傳誅罰絶理則厥災水煬帝大業三年河南大水漂沒三十餘郡帝嗣位已來未親郊廟之禮簡宗廟廢祭祀之應也唐太宗貞觀三年秋貝譙鄆泗沂徐亳蘇隴九州水水太陰之氣也若臣道顓女謁行夷狄強小人道長嚴刑以逞下民不堪其憂則陰類勝其氣應而水至其謫見於天月及辰星與列星之司水者為之變若七曜循中道之北皆水祥也四年秋許戴集三州水七年八月山東河南州四十大水八年七月山東江淮大水十年關東及淮海旁州二十八大水十一年七月癸未黃氣際天大雨穀水溢入洛陽宫深四尺壞左掖門毁官寺十九洛水漂六百餘家九月丁亥河溢壞陜州之河北縣及太原倉毁河陽中灘十六年秋徐戴二州大水十八年秋穀襄豫荆徐梓忠綿宋亳十州大水十九年秋沁易二州水害稼二十一年八月河北大水泉州海溢歡州水二十二年夏瀘越徐交渝等州水髙宗永徽元年六月新豐渭南大雨零口山水暴出漂廬舍宣歙饒常等州大雨水溺死者數百人秋齊定等州十六水二年秋汴㝎濮亳等州水四年杭夔果忠等州水五年五月丁丑夜大雨麟遊縣山水衝萬年宫元武門入寢殿衛士有溺死者六月河北大水滹沱溢損五千餘家六年六月商州大水秋冀沂密兖滑汴鄭婺等州水害稼洛州大水毁天津橋十月齊州河溢顯慶元年九月溫州暴風雨海水溢壞安固永嘉二縣四年七月連州山水暴出漂七百餘家麟德二年十月鄜州大水壞居人廬舍總章二年六月括州大風雨海溢壞永嘉安固二縣溺死者九千七十人冀州大雨水平地深一丈壞民居萬家咸亨元年五月丙戌大雨山水溢溺死者五千餘人二年八月徐州山水漂百餘家四年七月婺州大雨山水暴漲溺死五千餘人上元三年八月青州大風海溢漂居人五千餘家齊淄等七州大水永隆元年九月河南河北大水溺死者甚衆二年八月河南河北大水壞民居十萬餘家永淳元年五月丙午東都連日澍雨乙邜洛水溢壞天津橋及中橋漂居民千餘家六月乙亥京師大雨水平地水深數尺秋山東大雨水民大飢二年七月己巳河溢壞河陽橋八月恆州滹沱河及山水暴出害禾稼文眀元年七月溫州大水漂千餘家括州溪水暴漲溺死百餘人武后如意元年四月洛水溢壞永昌橋漂居民四百餘家七月洛水溢漂居民五千餘家八月河溢壞河陽縣長夀二年五月棣州河溢壞居民二千餘家是歲河南州十一水神功元年三月括州水壞民居七百餘家是歲河南州十九水聖歷二年七月丙辰神都大雨洛水壞天津橋秋河溢懷州漂千餘家三年三月辛亥鴻州水漂千餘家溺死四百餘人長安三年六月寧州大雨水漂二千餘家溺死千餘人四年八月瀛州水溢壞民居數千家中宗神龍元年四月雍州同官縣大雨水漂沒居民五百餘家六月河北州十七大水七月甲辰洛水溢壞民居二千餘家二年四月辛丑洛水壞天津橋溺死者數百人八月魏州水景龍三年七月澧水害稼九月密州水壞民居數百家元宗開元三年河南河北水四年七月丁酉洛水溢沉舟數百艘五年六月甲申瀍水溢溺死者千餘人鞏縣大水壞城邑損居民數百家河南水害稼八年夏契丹寇營州發關中卒援之宿澠池之缺門營穀水上夜半山水暴至萬餘人皆溺死六月庚寅夜穀洛溢入西上陽宫宫人死者十七八畿內諸縣田稼廬舍蕩盡掌衛兵溺死千餘人京師興道坊一夕陷為池居民五百餘家皆沒不見是年鄧州三鴉口大水塞谷或見二小兒以水相沃須臾有蛇大十圍張口仰天人或斬射之俄而暴雷雨漂溺數百家十年五月