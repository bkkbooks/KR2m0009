二江水漲壞民田廬舍九月卭州蒲江等縣山水暴漲壞民舍七十區死者七十九人是秋荆南北路江水注溢浸田畝甚衆三年七月河南府洛水漲壞七里鎮國二橋又山水暴漲壞豐饒務官舍民居溺死者二百四十人十月商州上津縣大雨河水溢壞民舍溺者三十七人四年六月隴城縣大雨牛頭河漲二十丈沒溺居人廬舍七月京師大雨十晝夜不止朱雀崇眀門外積水尤甚軍營廬舍多壞九月澶州河水漲衝陷北城壞居民廬舍官署倉庫殆盡民溺死者甚衆梓州元武縣涪江漲二丈五尺壅決流入州城壞官私廬舍萬餘區溺死者甚衆是秋陳潁宋亳許蔡徐濮澶博州霖雨秋稼多敗十月澶州河決西北流入御河浸大名府城知州趙昌言壅城門禦之五年秋開封府宋亳陳潁泗夀鄧州雨水害稼至道元年四月甲辰京師大雨雷電道上水數尺二年六月河南府瀍澗洛三水漲壞鎮國橋七月建州溪水漲溢入州城內壞倉庫民舍萬餘區鄆州河水漲壞連堤四處宋州河決穀熟縣閏七月陜州河漲漂大樹壞浮梁失連艦是月廣南諸州並雨水真宗咸平元年正月昭州雨霖害民田溺死者百五十七人齊州清黃河泛溢壞田廬二年十月潭州山水泛溢壞民舍千餘區民黃拏等十家俱溺死三年三月梓州江水漲壞民田五月河決鄆州王陵掃七月洋州漢水溢民多有溺死者四年七月同州汙谷水溢夏陽縣民溺死者數十人五年二月雄霸瀛深滄州乾寧軍水溢害民田六月京師大雨漂壞廬舍民有壓死者積潦浸道路自朱雀門東抵宣化門尤甚皆注惠民河河復漲溢軍營多壞景德元年九月宋州汴水決浸民田壞廬舍河決澶州橫隴掃等二年六月寧州山水泛溢壞民舍軍營多溺死者三年七月應天府汴水決南注亳州合浪宕渠東入於淮四年五月鄭州索水漲髙四丈許漂滎陽縣居民四十二户有溺死者六月鄧州江水暴漲南劔州山水泛溢漂溺居人七月河溢澶州壞王八掃大中祥符元年六月開封府尉氏縣惠民河決二年七月徐濟淄青州大水八月無為軍大風雨拔木壞城門營壘民舍壓溺千餘人鳯州大水漂溺居民十月兖州霖雨害稼京畿惠民河決壞民田三年五月辛丑京師大雨平地數尺壞軍營民舍多壓死者近畿積潦六月吉州臨江軍並江水泛溢害民田九月河決河中府白浮圖村四年七月江洪筠袁州江漲害民田壞州城八月河決通利軍大名府御河水溢合流壞府城害民田人多溺死者九月河溢於孟州溫縣蘇州吳江泛溢壞民廬舍十一月楚秦州潮水害田民多溺死五年正月河決棣州聶家口七月慶州淮安鎮山水暴漲漂溺居民六年六月保安軍積雨河溢浸城壘壞廬舍判官趙震溺死又兵民溺者凡六百五十人七年六月泗州水溢害民田河南府洛水漲秦州定西寨山水暴漲有溺死者八月河決澶州十月濵州河溢於安定鎮九年六月秦州獨孤谷水漲壞長道縣鹽官鎮城橋及官廨民舍共二百九十五區溺死者六十七人七月延州洎定平安逺寨門栲栳四寨山水泛溢壞隄城九月雄霸州界河泛溢利州水漂棧閣萬一千八百間天禧三年六月河決滑州城西南漂沒公私廬舍死者甚衆歷澶濮鄆濟單至徐州與清河合浸城壁不沒者四版眀年既塞六月復決於西北隅文獻通考卷二百九十六
