body:
  text: 文獻通考卷三百十二鄱陽馬端臨貴與著物異考十八豕禍左傳齊襄公田于貝邱見豕從者曰公子彭生也公怒射之豕人立而啼公懼墮車傷足喪屨劉向以為近豕禍也未幾公為公孫無知所弒漢昭帝元鳳元年燕王宮永巷中豕出圂壞都竈師古曰圂者養豕之牢也都竈蒸炊之大竈圂胡頓反銜其釜六七枚置殿前釜古釜反劉向以為近豕禍也時燕王旦與長公主左將軍謀為大逆暴急無道竈者生養之本豕而敗竈陳釜於庭釜竈將不用宮室將廢辱也燕王不改卒伏其辜京房易傳曰衆心不安君政厥妖豕入居室吳孫皓時野豕入右司馬丁奉營此豕禍也後奉見遣攻穀陽無功而反皓怒斬其導軍及舉大衆北出奉及萬彧等相謂曰若至華里不得不各還也此謀泄奉時已死皓殺其子溫家屬皆逺徙豕禍之應也龔遂曰山野之獸來入宮室宮室將空又其應也晉懷帝永嘉中壽春城中有豕生兩頭而不活周馥取而觀之時識者云豕北方之畜生而兩頭者無上也生而死不遂也天戒若曰勿生專利之謀將自致傾敗也周馥不悟遂欲迎天子令諸侯俄為元帝所敗是其應石勒亦尋渡淮百姓死者十有其九元帝建武元年有豕八足此聽不聰之罰又所任邪也是後有劉隗之變成帝咸和六年六月錢塘人家猳音加牡豕也豕産兩子而皆人面睂目皆具其身猶豕京房易傳曰豕生人頭豕身者危且亂今此猳豕而産異之甚也孝武帝太元四年四月京都有豚徒渾反一頭二脊八足十三年京都人家豕産子一頭二身八足並與建武同妖也是後宰相沉酗香弓反不恤朝政近習用事漸亂國綱至於大壞也劉聰末年犬與豕交於相國府門又交於宫門又交於司𨽻御史門有豕著進賢冠升聰座犬冠武冠帶綬與豕並升俄而鬬死殿上宿衛莫有見其入者劉曜時武功豕生犬隋文帝開皇末渭南有沙門三人行頭陀法於人場圃之上夜見大豕來詣其所小豕從者十餘謂沙門曰阿練我欲得賢聖道然猶負他一命言罷而去賢聖道者君上之所行也皇太子勇當嗣業行君上之道而被囚廢之象也一命者言為煬帝所殺渭南有人寄宿他舍夜中聞二豕對語其一曰嵗將盡阿耶明日殺我供嵗何處避之一答曰可向水北姊家因相隨而去天將曉主人見豕不得意是宿客而詰之宿客言狀主人如其言而得豕其後蜀王秀得罪帝將殺之平樂公主每匡救得全後數年而帝崩嵗盡之應唐太宗貞觀十七年六月司農寺豕生子一首八足自頸分為二德宗貞元四年二月京師民家有豕生子兩首四足首多者上不一也是嵗宣州大雨震電有物墮地如豬手足各兩指執赤班蛇食之頃之雲合不復見近豕禍也憲宗元和八年四月長安西市有豕生子三耳八足自尾分為二足多者下不一也懿宗咸通七年徐州蕭縣民家豕出圂舞又牡豕多將鄰里羣豕而行復自相噬齧僖宗乾符六年越州山隂民家有豕入室內壞器用銜案缶置水次廣明元年絳州稷山縣民家豕生如人狀無眉目耳髮占為邑有亂宋太祖乾道六年南雄州民家豕生數豚而首各備他獸形亦有人首者占為邑有亂光宗紹熙二年三月辰州敘浦縣常平倉厫墻壁為羣豕所穴食倉米五十石彘食人食近豕禍也寧宗慶元初饒州樂平縣民家豕生豚與南雄豕禍同占而更具他獸蹄京房妖占曰豕生人頭豕身者危且亂三年四月饒州餘干州民家生八豚其二為鹿福州古田縣民生嬰兒為豕所食皆豕禍也羊禍史記魯定公時季桓子穿井得土缶中得蟲若羊缶盎之屬即今之盆近羊禍也羊者地上之物幽於土中象定公不用孔子之言而聽季氏暗昧不明之應一曰羊去野外而拘土缶者象魯公失其所而拘於季氏季氏亦將拘於家臣也是嵗陽虎囚季桓子後三年虎劫公伐孟氏兵敗竊寶玉大弓出亡晉成帝咸和二年五月司徒王導廄羊生無後足此羊禍也京房易傳曰足少者下不勝任也明年蘇峻破京都導與帝俱幽石頭是其應也隋文帝開皇十二年六月繁昌楊悅見雲中二物如羝羊黃色大如新生犬鬬而墜悅獲其一數旬失所在近羊禍也洪範五行傳曰君不明逆火政之所致也狀如新生犬者羔類也雲體掩蔽邪佞之象羊國姓羔羊子也皇太子勇既升儲二晉王隂毁之而被廢黜二羔鬭一羔墜之應也恭帝義寧二年麟遊太守司馬武獻羊羔生而無尾時議者以為楊氏子孫無後之象是嵗煬帝被弒恭帝遜位又太原獻羖羊無頭而不死唐元宗開元二年正月原州獻肉角羊二年三月富平縣有肉角羊武宗會昌二年春代州崞縣羊生二首連頸兩尾占曰二首上不一也懿宗咸通三年夏定陶民家羊生羔如犢僖宗乾符二年洛陽建春門外因暴雨有物墮地如羖羊不食頃之入地中其迹月餘不滅或以為雨工也占曰當旱漢劉鋹苑中羊吐珠宋高宗紹興五年江東西羊大疫班固以為暑嵗羊多疫死及為怪十七年汀州羊生無角寧宗嘉定九年信州玉山縣羊生駢角犬異春秋左氏傳襄公十七年十一月甲午宋國人逐狾狗狾狂也征例反狾狗入于華臣氏華元子國人從之臣懼遂奔陳先是臣兄閲為宋卿閲卒臣使賊殺閲家宰遂就其妻宋平公聞之曰臣不唯其宗室是暴大亂宗國之政遂逐之左師向戌曰大臣不順國之恥也不如蓋之謂掩覆其事也公乃止華臣亢暴失義內不自安故犬禍至以奔亡也威烈王二十七年乙亥五月晉有三大犬率衆犬數萬聚于絳殺一犬于東方一犬于西方漢高后八年三月祓霸上師古曰祓者除惡之祭也音廢還過枳道見物如倉狗撠高后掖師古曰撠謂拘持之也撠音戟拘音居足反忽而不見卜之趙王如意為祟遂病掖傷而崩先是高后鴆殺如意支斷其母戚夫人手足榷其眼以為人彘師古曰榷謂敲擊去其精也榷音口角反凡言彘者皆豕之别名文帝後五年六月齊雍城門外有狗生角師古曰雍城門者齊門名也春秋左氏傳平陽之役趙武及秦周伐雍門之荻是也先是帝兄齊悼惠王亡後帝分齊地立其庶子七人皆為王師古曰謂齊孝王將閭濟北王志災川王賢膠東王雄渠膠西王卬濟南王辟光并城陽恭王喜是為七王兄弟並強有炕陽心故犬禍見也犬守御角兵象在前而上鄉者也師古曰鄉讀曰嚮此下亦同犬不當生角猶諸侯不當舉兵鄉京師也天之戒人蚤矣師古曰蚤古早字諸侯不悟後六年吳楚叛濟南膠西膠東三國應之舉兵至齊齊王猶與城守與讀曰豫三國圍之會漢破吳楚因誅四王故天狗下梁而吳楚攻梁狗生角於齊而三國圍齊漢卒破吳楚於梁誅四王於齊京房易傳曰執政失下將害之厥妖狗生角君子茍免小人陷之厥妖狗生角景帝三年二月邯鄲狗與彘交悖亂之氣犬豕之禍也師古曰悖惑也音布內反此下亦同是時趙王遂悖亂與吳楚謀為逆遣使胸奴求助兵卒伏其辜犬兵革失衆之占如淳曰犬吠守似兵革外附他類失衆也豕北方之畜七國逆言失聽交於異域以生害也京房易傳曰夫婦不嚴厥妖狗與豕交兹謂反德國有兵革昌邑王有狗冠方山冠事詳見服妖門成帝河平元年長安男子石良劉音相與同居師古曰二人共止一室有如人狀在於室中擊之為狗走出去後有數人被甲持兵弩至良家良等格擊或死或傷皆狗也自二月至六月乃止鴻嘉中狗與彘交魏公孫淵家有犬冠幘絳衣上屋此犬禍也屋上亢陽高危之地天戒若曰亢陽無上偷自尊高狗而冠者也及淵自立為燕王果為魏所滅京房易傳曰君不正臣欲篡厥妖狗出朝門魏侍中應璩在直廬欻見一白狗出門問衆人無見者踰年卒近犬禍也吳諸葛恪征淮南歸將朝會犬銜引其衣恪曰犬不欲我行乎還坐有頃復起犬又銜衣乃令逐犬遂升車入而被害晉武帝太康九年幽州有犬鼻行地三百餘步天戒若曰是時帝不思和嶠之言卒立惠帝以致衰亂是言不從之罰也惠帝元康中吳郡婁縣人家聞地中有犬子聲掘之得雌雄各一還置窟中覆以磨石經宿失所在天戒若曰帝既衰弱藩王相譖故有犬禍永興元年丹陽內史朱逵家犬生三子皆無頭後逵為揚州刺史曹武所殺孝懷帝永嘉五年吳郡嘉興張林家狗人言云天下人餓死有劉石之亂天下飢荒焉愍帝建興狗與豬交按漢書景帝時有此以為悖亂之氣亦犬豕禍也犬兵革之占也豕北方之畜其占逆言失聽異類相交必生害也俄而帝沒於漢是其應也元帝太興中吳郡太守張懋聞齋內牀下犬聲求而不得既而地自坼見有二犬子取而養之皆死尋而懋為沈充所害京房易傳曰讒臣在側則犬生妖太興四年廬江灊縣何旭家忽聞地中有犬子聲掘之得一母犬青釐音黎黑而黃色色狀甚羸瘦走入草中不知所在視其處有二犬子一雄一雌哺而養之雌死雄活及長為犬善噬野獸其後旭里中為蠻所沒安帝隆安初吳郡治下狗恆夜吠聚高橋上人家狗有限而吠聲甚衆或有夜覘敕艷反視之云一狗假有兩三頭皆前向亂吠無幾孫恩亂於吳會焉是時輔國將軍孫無終家於既陽地中聞犬子聲尋而地坼有二犬子皆白色一雄一雌取而養之皆死後無終為桓元所誅滅按尸子曰地中有犬名曰地狼夏鼎志曰掘地得犬名曰賈此蓋自然之物不應出而出為犬禍也桓元將拜楚王已設拜席羣官陪位元未及出有狗來便其席莫不驚怪元性猜暴竟無言者逐狗改席而已天戒若曰桓元無德而叨竊大位故犬便其席示其妄據之甚也八十日元敗亡焉劉聰末年犬與豕交詳見豕禍門北齊文宣天保四年鄴中及頓邱並有犬與女交洪範五行傳曰異類不當交而交悖亂之氣犬交人為犬禍犬禍者亢陽失衆之應也時帝不恤國政恩澤不流於其國後主時犬為開封儀同雌者有夫人郡君之號給兵以奉養食以粱肉藉以茵蓐天奪其心爵加於犬近犬禍也天意若曰卿士皆類犬後主不悟遂以取滅後周武帝保定三年有犬生子腰已後分為兩身二尾六足犬猛畜而有爪牙將士之象也時宇文護與侯伏侯龍恩等有謀懷二犬體後分此其應也隋煬帝大業元年鴈門百姓間犬多去其主羣聚於野形頓變如狼而噉噬行人數年而止五行傳曰犬守禦者也而今去其主臣下不附之象形變如狼狼色白為主兵之應也其後帝窮兵黷武勞役不息天戒若曰無為勞役守禦之臣將叛而為害帝不悟遂起長城之役續有西域遼東之舉天下怨叛及江都之變並宿衛之臣也唐高祖武德三年突厥處羅可汗將入冦夜聞犬羣嘷而不見犬武后初酷吏邱神績家狗生子無首當項有孔如口晝夜鳴吠俄失所在神功元年安國獻兩首犬首多者上不一也元宗天寶十一載李林甫晨起盥飾將朝取書囊視之中有物如鼠躍於地即變為狗壯大雄目張牙視林甫林甫射之中霅然有聲隨箭沒武宗貞元七年趙州柏鄉民李崇真家黃犬乳犢憲宗會昌三年定州深澤令家狗生角宣宗大中初狗生角京房曰執政失將害之應又曰君子危陷則狗生角懿宗咸通中會稽有狗生而不能吠擊之無聲狗職吠以守禦其不能者象鎮守者不能禦寇之兆成汭為荆南節度使城中犬皆夜吠日者向隱以為城郭將邱墟僖宗中和二年秋丹徒狗與彘交占曰諸侯有謀害國者宋高宗紹興六年四月中京大雪雷震羣犬數十爭赴土河而死可救者才二三衆共異之未幾金人有內亂之事寧宗慶元二年撫州有犬人坐於郡守治事之上後守臣林廷彥卒於官下體生上之痾西漢景帝時梁孝王北獵梁山有獻牛足出背上王惡之六月中病熱六日薨張晏曰足當處下所以輔身也象孝王背朝而干上也北者隂也又在梁山明為梁也牛者丑之畜衝在六月北方數六故六月六日王薨也北周武帝保定三年有牛足生於背唐懿宗咸通十四年七月宋州襄邑有獵者得雉五足三足出背上足出於背下干上之象五足者衆也羽蟲之異契母曰簡狄有娀氏之女為帝嚳次妃三人行浴見元鳥墜其卵簡狄取吞之因孕生契薑嫄為帝嚳元妃履巨人迹而生稷以為不祥棄之置渠中冰上飛鳥以其翼覆薦之薑嫄以為神乃收養之高宗祭成湯有蜚雉登鼎耳而雊劉歆以為羽蟲之孽鼎宗廟之器野鳥自外來入為宗廟器主是繼嗣將易也一曰鼎三公象以耳行野鳥居鼎耳小人將居公位敗宗廟之祀武丁恐駭謀於忠賢修德而正事故能攘其妖致百年之壽周武王伐紂師渡孟津既濟有火自上復於下至於王屋流為烏其色赤其聲魄云馬融曰王屋王所居屋流行也魄然安定意也鄭元曰書説云烏有孝名武王卒父大業故烏瑞臻赤者周之正色也索隱曰按今文泰誓流為雕雕摯鳥也馬融云明武王能伐紂春秋昭公二十五年夏有鸜鵒來巢劉歆以為羽蟲之孽其色黑又黑祥也視不明聽不聰之罰也劉向以為蜚有􅈮不言來者氣所生所謂眚也師古曰此蜚謂負蠜也其為蟲臭􅈮短狐即今所謂水弩也隱元年有蜚莊十八年有􅈮蜚音翡􅈮音域蜚亦作蜰其音同耳鸜鵒言來者氣所致所謂祥也鸜鵒邊土穴藏之禽來至中國不穴而巢隂居陽位師古曰今之鸜鵒中國皆有依周官而言但不踰濟水耳左氏以為魯所常無異而書之而此云邊土禽來未喻其意又此鳥本亦巢居不皆穴處也書巢者著其居止字乳不即去也象季氏將逐昭公去宮室而居外野也鸜鵒白羽旱之祥穴居而好水黑色為主急之應也天戒若曰既失衆不可急暴急暴隂將持莭陽以逐爾去宮室而居外野矣昭不悟而舉兵圍季氏為季氏所敗出奔於齊遂死於外野董仲舒指略同赧王二十九年宋有雀生于城之陬史占之曰占小而生大必霸天下宋康王喜起兵滅滕伐薛東敗齊南敗楚西敗魏與齊魏為敵欲霸之亟成射天笞地斬社稷而焚滅之又為長夜之飲天下之人謂之桀宋齊湣王起兵伐之民散城不守宋王奔魏死于溫漢景帝三年十一月有白頸烏與黑烏羣鬭楚國呂縣白頸不勝墮泗水中死者數千劉向以為近白黑祥時楚王戊暴逆無道與吳王謀反烏羣鬬者師戰之象白頸者小明小者敗也墮於水將死水地其後王戊反兵敗走為人所殺京房易傳曰逆親親厥妖白黑烏鬬於國武帝太始三年二月行幸東海獲赤鴈作朱鴈之歌昭帝始元元年春二月黃鵠下建章宮太液池中臣瓉曰時漢用土德服色尚黃鵠色皆白而今更黃以為土德之瑞故紀之也師古曰非也黃鵠大鳥一舉千里者非白鵠也元鳳元年有烏與鵲鬭燕王宮池上烏墮池死近黑祥也時燕王旦謀為亂遂不改悟伏辜而死楚燕皆骨肉藩臣以驕怨而謀逆俱有烏鵲鬬死之祥行同而占合此天人之明表也燕一烏鵲鬬於宮中而黑者死楚以萬數鬬於野外而白者死象燕隂謀未發獨王自殺於宫故一烏水色者死楚亢陽舉兵軍師大敗於野故衆烏金色者死天道精微之效也京房易傳曰專征劫殺厥妖烏鵲鬬昭帝時有鵜鶘或曰秃鶖師古曰鵜鶘即汙澤也一名淘河腹下胡大如數升囊好羣入澤中抒水食魚因名秃鶖亦水鳥也鵜音大奚反鶘音胡鶖音秋集昌邑王殿下王使人射殺之劉向以為水鳥青色青祥也時王馳騁無度慢侮大臣不敬至尊有服妖之象師古曰謂多治仄注冠又以冠奴也故青祥見也野鳥入處宮室將空王不悟卒以亡京房易傳曰辟退有德厥咎狂厥妖水鳥集於中國宣帝元康三年春以神雀數集泰山賜諸侯王丞相以下令郎從官帛吏民爵女子牛酒鰥寡孤獨高年帛六月詔曰前年夏神爵集雍晉灼曰漢注大如鷃爵黃喉白頸黑背腹斑文也今五色鳥以萬數飛過屬縣三輔諸縣也翺翔而飛欲集未下其令三輔毋得以春夏擲巢探卵彈射飛鳥具為令四年三月神爵五采以萬數集長樂未央北宮高寢甘泉泰畤殿中及上林苑京兆尹張敞舍鶡雀飛集丞相府丞相黃霸以為神雀議欲以聞敞奏霸曰長吏守丞對時臣敞舍有鶡雀飛止丞相府屋上丞相以下見者數百人邊臣多知鶡雀者問之皆陽不知丞相圖議上奏圖謀也曰臣聞上計長吏守丞以興化條皇天報下神雀後知從臣敞舍來乃止郡國吏竊笑丞相仁厚有知略微信竒怪也東坡致堂論見鳳凰門成帝河平元年二月庚子泰山山桑谷有鳶鴟也音緣焚其巢男子孫通等聞山中羣鳥鳶鵲聲往視見其巢㸐古然字盡墮地中有三鳶鷇燒死鳥子新生而哺者曰鷇樹大四圍巢去地五丈五尺太守以聞鳶色黑近黑祥貪虐之類也易曰鳥焚其巢旅人先笑後號咷泰山岱宗五嶽之長王者易姓告代之處也天戒若曰勿近貪虐之人聼其賊謀將生焚巢自害其子絶世易姓之禍其後趙飛燕得幸立為皇后姊妹專寵後宮有子者殺之并殺其母帝崩后坐誅此焚巢殺子後號咷之應也一曰王莽貪虐而任社稷之重卒成易姓之禍云京房易傳曰人主暴虐鳥焚其舍鴻嘉二年三月博士行大射禮有飛雉集於庭歷階登堂而雊後雉又集太常宗正丞相御史大夫大司馬車騎將軍之府又集未央承明殿屋上時大司馬車騎將軍王音待詔寵等上言天地之氣以類相應師古曰以經術待詔其人名寵不記姓流俗書本寵上輒加孫字非也譴告人君甚微而著雉者聽察先聞雷聲故月令以紀氣師古曰謂季冬之月云雉雊雞乳也經載高宗雊雉之異師古曰已解於上以明轉禍為福之驗今雉以博士行禮之日大衆聚會飛集於庭歷階登堂萬衆睢睢師古曰睢睢仰目視貌也音呼椎反驚怪連日徑歷三公之府太常宗正典宗廟骨肉之官然後入宮其宿留告曉人具備深切師古曰宿音先就反留音力救反雖人道相戒何以過是宜謀於賢知克己復禮以求天意繼嗣可立災變可銷也綏和二年三月天水平襄有燕生爵哺食至大俱飛京房易傳曰賊臣在國厥咎燕生爵諸侯銷一曰生非其類子不嗣世後漢明帝永平十一年獲白雉十七年神雀五色翔集京師章帝元和二年幸泰山柴告岱宗有黃鵠三十西南來經祠壇上東北過宮屋翺翔升降桓帝永壽元年白烏見齊國靈帝中平三年八月懷陵上有萬餘爵先極悲鳴已亂鬭相殺皆斷頭懸著樹枝枳棘到六年靈帝崩大將軍何進以內寵外嬖積惡日久欲悉紏黜以隆更始冗政而太后持疑事久不決進從中出於省內見殺因是有司蕩滌虔劉後祿而尊厚者無餘矣夫陵者高大之象也天戒若曰諸懷爵祿而尊厚者還自相害至滅亡也古今注曰建武九年六郡八縣鼠食稼張璠紀曰初平元年三月獻帝初入未央宮翟雉飛入未央宮獲之獻帝春秋曰建安七年五色大鳥集魏郡衆鳥數千隨之魏志曰二十三年秃鶖集鄴宮文昌殿後池獻帝建安二十三年秃鶖鳥集鄴宮文昌殿後池明年魏武王薨蜀後主建興九年十月江陽至江州有鳥從江南飛渡江北不能達墮水死者以千數時諸葛亮連年動衆志吞中夏而終死渭南所圖不遂又諸將分爭頗喪徒旅鳥北飛不能達墮水死者皆有其象也亮竟不能過渭是其應也魏文帝黃初元年四月饒安縣言白雉見未央宮中又有燕生鷹口爪俱赤此與商紂宋隱同象三年又集雒陽芳林園池四年五月有鵜鶘題胡二音鳥集靈芝池按劉向説此羽蟲之孽又青祥也詔曰此詩人所謂汙澤者也曹詩刺共音恭公逺君子近小人今豈有賢智之士處於下位否則斯鳥胡為而至哉其博舉天下雋德茂才獨行君子以答曹人之刺於是楊彪管寧之徒咸見薦舉此所謂覩妖知懼者也雖然猶不能優容亮直而多溺偏私矣京房易傳曰辟退有德厥妖水鳥集於國井七年燕又集雒陽芳林園池與三年同其夏文帝崩明帝景初元年陵霄闕始構有鵲巢其上鵲體白黑雜色此羽蟲之孽又白黑祥也帝以問高堂隆對曰詩云維鵲有巢維鳩居之今興起宮室而鵲來巢此宮室未成身不得居之象也天戒若曰宫室未成將以他姓制御之不可不深慮也於是帝改容動色又有燕生巨鷇苦候反於衛國李蓋家形若鷹吻似燕此羽蟲之孽又赤眚也髙堂隆曰此魏室之大異防鷹揚之臣於蕭牆之內其後宣帝起誅曹爽遂有魏室景初末又集芳林園池已前再至輒有大喪帝惡之其年明帝崩吳孫權赤烏元年以有赤烏之祥改元十一年八月白鳩見於章安十二年四月有兩烏銜鵲墮東館權使領丞相朱據燎鵲以祭按劉歆説此羽蟲之孽又黑祥也視不明聼不聰之罰也是時權意溢德衰信讒好殺二子將危將相俱殆覩妖不悟加之以燎昧道之甚者也明年太子和廢魯王霸賜死朱據左遷陸議憂卒是其應也東館典教之府鵲墮東館又天意乎太元二年正月封前太子和為南陽王遣之長沙有鵲巢其帆檣凡墻二音和故官僚聞之皆憂慘以為檣木傾危非久安之象是後果不得其死孫亮建興二年十一月有大鳥五見於春申吳人以為鳳凰明年改元為五鳳漢桓帝時有五色大鳥司馬彪云政道衰缺無以致鳳乃羽蟲孽耳孫亮未有德政孫峻驕暴方甚此與桓帝同事也按瑞應圖大鳥似鳳而為孽者非一宜皆是也孫休永安三年西陵言赤鳥見六年白燕見於慈湖赤雀見於豫章晉武帝泰始四年八月有翟雉飛上閶闔門天戒若曰閶闔門非雉所止猶殷宗雉登鼎耳之戒也惠帝永康元年趙王倫謀篡京師得異鳥莫能名倫使人持出周旋城邑市以問人積日宫西有小兒見之遂自言曰服留鳥翳持者即還白倫倫使更求又見之仍將入宫密籠鳥并閉小兒戶中明日視之悉不見此羽蟲之孽時趙王倫有目瘤之疾言服留者謂倫留將服其罪也尋而倫誅趙王倫篡位鶉入太極殿雉集東堂天戒若曰太極東堂皆朝享聼政之所而鶉雉同日集之者趙王倫不當居此位也詩云鵲之強強鶉之奔奔人之無良我以為君其此之謂乎尋而倫滅孝懷帝永嘉元年二月洛陽東北步廣里地陷有蒼白二色鵝出蒼者飛翔沖天白者止焉此羽蟲之孽又黑白祥也董飬曰步廣周之狄泉盟會地也白者金色國之行也蒼為隂象其可象言乎是後劉元海石勒相繼亂華明帝太寧三年八月庚戌有大鳥二蒼黑色翼廣一丈四尺其一集司徒府射而殺之其一集市北家人舍亦獲焉此羽蟲之孽也又黑祥也及閏月戊子而帝崩後遂有蘇峻祖約之亂成帝咸和二年正月有五鷗鳥集殿庭北又白祥也是時庾亮茍違衆謀將召蘇峻有言不從之咎故白祥先見也三年二月峻果作亂宫殿焚毁化為汙萊烏來二音此其應也咸康八年七月有白鷺集殿屋是時康帝始即位不永之祥也後涉再期而帝崩按劉向曰野鳥入處宫室將空此其應也海西初以興寧三年二月即位有野雉集於相風此羽蟲之孽也尋為桓溫所廢也孝武帝太元十六年六月鵲巢太極東頭鴟尾又巢國子學堂西頭十八年東宫始成十九年正月鵲又巢其西門此殆與魏景初同占學堂風教之所聚西頭又金行之祥及帝崩後安皇嗣位桓元遂篡風教乃頽金行不競之象也安帝雍熙三年龍驤將軍朱猗於離反戍壽陽婢炊飯忽有羣烏集竈競來啄噉婢驅逐不去有獵狗咋殺兩烏餘烏因共啄殺狗又噉其肉唯餘骨存此亦羽蟲之孽又黑祥也明年六月猗死此其應也石虎饗羣臣於太武殿前有白鴈百餘集於馬道南命射之無所獲太史令趙攬以為白鴈集庭宫室將空揚州送黃鵠雛五頸長一丈聲聞十餘里泛之於元武池宋孝武帝大明七年十一月大閲水師於中江有白雀二集華蓋梁武帝中大同元年邵陵王綸在南徐州坐廳事有野鳥如鳶數百飛屋梁上彈射不中俄頃失所在京房易飛候曰野鳥入君室其邑虛君亡之他方後綸為湘東王所襲竟致奔亡為西魏所殺侯景在梁將受錫命陳偹物於庭有野鳥如山雀赤觜集於册書之上鵂鶹鳴於殿與中大同元年同占景尋敗將亡入海中為羊鵾所殺陳後主時蔣山有衆鳥鼓翼而鳴曰奈何帝京房易飛候曰鳥鳴門闕如人音邑且亡蔣山吳之望也鳥於上鳴吳邑空虛之象及陳亡建康為墟又陳未亡時有一足鳥集於殿庭以觜畫地成文曰獨足上髙臺盛草變成灰獨足者叔寶獨行無衆之應盛草成灰者陳政蕪穢被隋火德所焚除也叔寶至長安館於都水臺上髙臺之義也魏太武太延元年白燕集於盛樂舊都元鳥隨之以千數白雉三集於平陽太祖之廟北齊孝昭帝即位之後有雉飛上御座占同中大同元年又有鳥止於後園其色赤形似鴨而有九頭其年帝崩武成胡后生後主初有梟升后帳而鳴梟不孝之鳥不祥之應也後主嗣位胡后淫亂事彰遂幽后於北宫焉後主天統三年九月萬春鳥集仙都苑京房易飛候曰非常之鳥來宿於邑中邑有兵周師入鄴之應也武平七年有鸛巢太極殿又巢并州嘉陽殿雉集晉陽宫御坐獲之京房易飛候曰鳥無故巢居君門及殿屋上邑且虛其年國滅北周靜帝大象二年二月有秃鶖集洛陽宫太極殿其年帝崩後宫常虛隋文帝開皇初梁主蕭琮新起後有鴻鳥集其帳隅未幾琮入朝被留於長安梁國遂廢煬帝大業四年蜀郡獲三足烏八年帝征遼東次大頓見二大烏髙丈餘皓身朱足遊泳自若上異之命工圖寫并立銘頌十二年二月甲子夜有二大鳥似雕飛入大業殿止於御幄至明而去大業末京師宫室中恆有鴻鴈之類無數翔集其間俄而長安不守十三年十一月烏鵲巢帝帳幄驅不能止帝尋逢弒唐髙祖武德初隋將堯君素守蒲州有鵲巢其炮機太宗貞觀十六年立晉王為太子雌雉集太極殿前雄雉集東宫顯德殿前太極三朝所會也帝以問褚遂良對曰昔秦文公時有童子化為雉雌者鳴於陳倉雄者鳴於南陽童子曰得雄者王得雌者霸文公遂以為寶雞祠漢光武得雄遂起南陽有四海陛下舊封秦王故雄雉見秦地所以彰明德也上悅十七年春齊王祐為齊州刺史好畜鴨有貍嚙鴨頭斷者四十餘髙宗永徽四年宋州人蔡道基舍傍有獸髙丈餘頭類羊一角鹿形馬蹄牛尾五色有翅占曰鳥如畜形者有大兵五年七月辛巳萬年宫有小鳥如雀生子大如鳲鳩調露元年鳴鵽羣飛入塞相繼蔽野至二年正月還復北飛至靈夏北悉墮地而死視之皆無首武后文明後天下屢奏雌雞化為雄或半化者中宗景龍四年六月辛巳朔烏集太極殿梁驅之不去元宗開元十三年十一月戊子雄雉馴飛泰山齋宫內封禪所以告成功祀事無重於此者而野鳥馴飛不忌禁衛不祥二十五年四月濮州兩烏兩鵲兩鸜鵒同巢隴州鵲哺慈烏二十八年四月庚辰慈烏巢宣政殿拱辛巳又巢宣政殿拱天寶十三載葉縣有鵲巢於車轍中不巢木而巢地失其所也肅宗至德二載三月安祿山將武令珣圍南陽有鵲巢於城中炮機者三雛成乃去代宗大歷八年九月武功獲大鳥肉翅狐首四足有爪長四尺餘毛赤如蝙蝠群鳥隨而噪之近羽蟲孽也十三年五月左羽林軍有鸜鵒乳鵲二德宗貞元四年三月中書省梧桐樹有鵲以泥為巢鵲巢知嵗次於羽蟲為有知今以泥露巢遇風雨壞矣是嵗夏鄭汴境內烏皆群飛集魏博田緒淄青李納境銜木為城髙二三尺方十里緒惡而焚之信宿又然烏口皆流血九年春許州鵲哺烏雛十年四月有大鳥飛集宫中食雜骨數日獲之不食死六月辛未晦水鳥集左藏庫七月懷州奏獲白鵲二十一年二月同州進五色鷹八月潞州進白鶻十一月潭州進赤烏十二年七月河陽進鸜鵒二十三年懷州鵊巢內有黃雀往來哺食十四年秋有異鳥色青類鳩鵲見於宋州郊外所止之處群鳥翼衛朝夕嗛稻梁以哺之睢陽人適野聚觀者旬日十八年六月烏集徐州之滕縣嗛柴為城中有白烏一碧烏一憲宗元和元年常州鵲巢於平地四年十二月群鳥夜集於太行山上十三年春淄青府署及城中烏鵲互取其雛各以哺子更相搏擊不能禁穆宗長慶元年六月鄆州奏雷澤縣界有烏巢因風墜二雛鵲引而哺之敬宗寶歷元年十月丙申群烏夜鳴文宗開成元年閏五月丙戌烏集唐安寺逾月散雀集元法寺燕集蕭望之冢二年三月真興門外鵲巢於古塜鵲巢知避嵗而古占又以髙下水旱今不巢於木而穴於塜不祥是秋突厥鳥自塞北群飛入塞五年六月有秃鶖群飛集禁苑鶖水鳥也武宗會昌元年潞州長子有白頸烏與鵲鬭宣宗大中十年三月舒州吳塘堰有衆禽成巢闊七尺髙一尺水禽山鳥無不馴狎中有如人面緑毛紺爪觜者其聲曰甘人謂之甘蟲占曰有鳥非常來宿于邑中國有兵人相食懿宗咸通七年涇州靈臺百里戍有雀生燕至大俱飛去京房易傳曰賊臣在國厥妖燕生雀雀生燕同説十一年夏雉集河內縣署咸通中吳越有異鳥極大四目三足鳴山林其聲曰羅平占曰國有兵人相食僖宗乾符四年春廬江縣北鵲巢於地六年夏鴟雉集于偃師南樓及縣署劉向説野鳥入處宫室將空廣明元年春絳州翼城縣有鵂鶹鳥群飛集縣署衆鳥逐而噪之光啓元年二年復如之鵂鶹一名訓狐中和元年三月陳留有烏變為鵲二年有鵲變為烏古者以烏卜軍之勝負烏變為鵲民從賊之象鵲復變為烏賊復為民之象三年新安縣吏家捕得雉飬之與雞馴月餘相與鬬死四年臨淮漣水民家鷹化為鵝而弗能遊鷹以鷙而擊武臣象也鵝雖毛羽清潔而飛不能逺無搏擊之用充庖厨而已光啓元年十二月陜州平陸集津山有雉二首向背而連頸者棲集津倉廡後數月羣雉數百來鬬殺之二年正月閺鄉湖城野雉及鳶夜鳴七月中條山鵲焚其巢京房易傳曰人君暴虐鳥焚其巢三年十月慈州仵城梟與鴟鬬相殺昭宗光化二年幽州節度使劉仁恭屠貝州去夜有鵂鶹鳥十數飛入帳中逐去復來昭宗時有秃鶖鳥巢寢殿隅帝親射殺之天復二年帝在鳯翔十一月丁巳日南至夜驟風有烏數千迄明飛噪數日不止自車駕在岐常有鳥數萬棲殿前諸樹岐人謂之神鴉三年宣州有鳥如雉而大尾有火光如散星集於戟門明日大火曹局皆盡惟兵械存後唐明帝天成二年五月懷州進白鵲六月兖州進三足烏廢帝清泰元年十月辛未已時有雉金色自南飛入中書止於政事堂屋脊上吏驅之不去良久飛入於民家得之其年李愚劉昫並罷相後晉髙祖天福八年三月有白烏棲於作坊桐樹後漢髙祖乾祐三年五月太原進白烏後周太祖廣順三年六月河南河北諸州旬日內無烏既而聚澤潞之間山谷中集於林木壓樹枝皆折是年人疾疫甚衆至顯德元年河東劉崇為周師所敗伏尸血流故先萌其兆世宗顯德元年二月潞州髙平縣有鵲巢於縣郭之南平地巢中七八雛三年潁州進白烏宋太祖乾德六年西川兵馬都監張延通獻白鵲太宗太平興國五年七月祕書丞郭延釗獻紫鵲九年江陵獻緑鵲易州獻紅山鵲潁州獻白雉西京獻白鳩至道元年四月知通利軍錢昭序獲赤烏以獻上曰烏色正如渥丹正火德之應也貝州獻白鵪鶉越州獻白鸜鵒九月京師自旦至酉群烏百餘萬飛翔有聲如風識者云突厥雀亦云蕃雀真宗咸平二年八月黃州群雞夜鳴至冬不止太中祥符二年春升州見黃雀羣飛蔽日有從空墜者占主民有役事是嵗火延州天建節道場有禽素質修毛赤咮丹趾集壇側槐樹醮罷方去是秋有禽白質丹咮飛止禁中殿隅逐之至天書殿而隱三年三月禁中有禽止殿檻馴擾無畏宫人以袂捧而獻采毛修頸惟飲水不粒食五年七月乙酉建安軍鑄聖像所啓道場神雀五色修尾黃喙集塑像上九月庚辰復有神雀丹咮黃腹背翅青緑集玊皇殿幕馴擾不驚六年十月代州五臺山有吉祥鳥見形翅甚大其飛也四黃鳥導之四鵲從之泰山興工有鳥狀烏咮趾皆赤役夫稍憩即飛鳴作起之聲衆工見其來畚鍤爭進將晡而去日以為常目以為催工鳥仁宗寶元元年二月乙酉興州長舉縣有鵲羽毛潔白觜腳紅不類常鵲英宗治平三年五月太子右贊善大夫陳世修獻白烏神宗熙寧七年六月乙未廣州言增城縣鳯凰見元豐三年八月戊寅趙州平棘縣獲白鵲九月丙午趙州獲白烏六年七月壬申丹州生白鵲徽宗政和三年九月大饗明堂有鶴回翔堂上明日又翔於上清宫是時所在言瑞鶴宰臣等表賀不可勝紀宣和元年九月戊午蔡京等表賀赤烏又賀白鵲政和後禁苑多為林居野店又聚珍禽野獸麀鹿鴐鵝禽鳥數百實其中至宣和間每秋風夜靜禽鳥之音四徹宛若深山大澤陂野之間識者以為不祥宣和末南郊禮畢御郊宫端誠殿天未明百辟方稱賀忽有梟正鳴於殿屋若與贊拜聲相應和聞者駭之時已報女真背盟未踰月內禪明年有青城之難髙宗建炎三年上在揚州二月辛亥早朝有翠羽飛鳴行殿三匝一再止於宰臣汪伯彥朝冠冠者尊服飛鳥踐之不祥翠羽又青祥也劉向以為野鳥入宫室將空一曰敗亡之應是日敵兵入揚州有倉卒渡江之變後二十日伯彥罷相尋坐貶四年五月丁巳敵兵圍陜府鳶鴉數萬飛噪城上與戰聲相亂敵將羅索曰城當陷急攻之遂失守近羽孽也七年梟鳴於劉豫後苑又群鳥鳴於內庭如曰休也豫惡之募人獲一梟者豫錢五千是嵗豫廢偽齊亡十七年二月有白鳥六集於髙禖壇上近羽孽也宰臣沈該以瑞奏二十七年饒州鄱陽縣有妖鳥鳬身雞尾長喙方足赤目上於民屋數日彈矢不能中亦羽孽也孝宗乾道六年邵武軍泰寧縣有爵飛鳴立死於瑞寧佛剎香鼎先是紹興初是邑有爵立死於丹霞佛剎之鼎皆羽孽也釋子因釋其妖謂之雀化寧宗慶元三年春池州銅陵縣鴛鴦雄化雌近羽孽也文獻通考卷三百十二
