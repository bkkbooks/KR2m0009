body:
  text: 文獻通考卷二百九十一鄱陽馬端臨貴與著象緯考十四流星星隕春秋魯莊公七年夏四月辛卯夜恆星不見恆常也謂常見之星辛卯四月五日月光尚微蓋時無雲日光不以昏沒夜明也夜中星隕如雨如而也夜半乃有雲星落而且雨其數多皆記異也日光不匿恆星不見而云夜中者以水漏知之與雨偕也偕俱也公羊傳恆星者何列星也列星不見則何以知夜之中星反也反者星復其位如雨者何非雨也非雨則曷為謂之如雨不修春秋曰雨星不及地尺而復不修春秋謂史記也古者謂史記為春秋君子修之曰星霣如雨明其狀似雨耳不當言雨星不言尺者霣則為異不以尺寸録之何以書記異也穀梁傳恆星者經星也經常也謂常列宿日入至于星出謂之昔不見者可以見也夜中星隕如雨如而也星既隕而復雨隕云敏反復扶又反其隕也如雨是夜中與星既隕而雨必晦暝安知夜中乎與音餘暝亡定反春秋著以傳著疑以傳疑明實録也傳直専反中之幾也而曰夜中著焉耳幾微也星既隕而雨中微難知而日夜中自以實著爾非臆度而知度徙各反何用見其中也失變而録其時則夜中矣失星變之始而録其已隕之時檢録漏刻以知夜中其不曰恆星之隕何也我知恆星之不見而不知其隕也我見其隕而接于地者則是雨説也言我見從上來接於下然後可以言雨星今唯見在下故曰隕星我見之見音如字注同雨於付反注同著於上見於下謂之雨著於下不見於上謂之隕豈雨説哉解經不得言雨星而言隕星也鄭君白衆星列宿諸侯之象不見者是諸侯棄天子禮儀法度也劉向曰隕者象諸侯隕墜失其所也又中夜而隕者象不終其性命中道而落僖公十六年春王正月戊申朔隕石于宋五隕落也聞其隕視之石數之五各隨其聞見先後而記之莊七年星隕如雨見星之隕而墜於四逺若山若水不見在地之驗此則見在地之驗而不見始隕之星史各據事而書之也隕星也但言星則嫌星使石隕故重言隕星秦始皇三十六年熒惑守心有墜星下東郡至地為石或刻其石曰始皇死而地分始皇聞之遣御史逐問莫服盡取石旁人誅之燔其石漢惠帝三年隕石綿諸一綿諸道也屬天水郡孝武帝元光中天星盡搖上以問候星者對曰星搖者民勞也後伐四夷百姓勞於兵革武帝征和四年二月丁酉隕石雍二天晏無雲聲聞四百里雍扶風縣晏天昏也昭帝始元中流星下燕萬載宫極東去李竒曰極屋梁三也或曰極棟也輔間名棟為極尋棟東去也延篤謂之堂前闌楯也法曰國恐有誅詳五星凌犯門元平元年二月甲申晨有大星如月有衆星隨而西行乙酉牂雲如狗赤色長尾三枚夾漢西行大星如月大臣之象衆星隨之衆皆隨從之象也天文以東行為順西行為逆此大臣欲行權以安社稷占曰太白散為天狗為卒起卒起見禍無時臣運柄牂雲為亂君到其四月昌邑王賀行淫辟立二十七日大將軍霍光乃白皇太后廢賀三月丙戌流星出翼軫東北干太微入紫宫始出小旦入大有光入有頃聲如雷三鳴止占曰流星入紫宫天下大凶四月癸未宫車晏駕元帝建昭元年正月戊辰隕石梁國六成帝建始元年九月戊子有流星出文昌色白光燭地長可四丈大一圍動搖如龍蛇形有頃長五六丈大四圍所詘折委曲貫紫宫西在斗西北子亥間後詘如環北方不合留一刻許占曰文昌為上將貴相時帝舅王鳳為大將軍其後宣帝舅子王商為丞相皆貴重任政鳳妬商譖罷商自殺親屬皆廢黜四年正月癸卯隕石藁四肥纍一皆縣名屬真定陽朔三年二月壬戌隕石白馬八東郡之縣名四年閏月庚午飛星大如缶出西南入斗下占曰漢使胸奴明年單于死漢遣使往吊鴻嘉二年五月癸未隕石杜衍三南陽之縣名永始二年二月癸未夜過中星隕如雨長一二丈繹繹未至地滅師古曰繹繹光采貌至雞鳴止谷永對曰日月星辰燭臨下土其有石隕之異則遐邇幽隱靡不咸睹星辰附離于天猶庶民附離王者也王者失道綱紀廢頓下將叛去故星叛天而隕以見其象春秋記異星隕最大自魯嚴以來至今再見臣聞三代所以喪亡者皆繇婦人羣小湛湎於酒湛讀曰沈又音耽下亦同書云乃用婦人之言四方之逋逃多罪是信是使師古曰周書泰誓也言紂惑於妲己而眤近亡逃罪人信用之詩曰赫赫宗周褒姒滅之師古曰小雅正月之詩也已解於上滅許悅反顛覆厥德荒沈于酒師古曰大雅抑之詩也刺王傾敗其德荒廢政事而耽酒及秦所以二世而亡者養生太奢奉終太厚方今國家兼而有之社稷宗廟之大憂也京房易傳曰君不任賢厥妖天雨星元延元年三月隕石都關一山陽縣名四月丁酉日餔時天暝晏殷殷如雷聲有流星頭大如缶長十餘丈皎然赤白色從日東南去四面或大如盂或如雞子耀耀如雨下至昏止郡國皆言星隕春秋星隕如雨為王者失勢諸侯起伯之異也其後王莽遂専國柄王氏之興萌於成帝時是以有星隕之變後莽遂篡國綏和元年正月辛未有流星從東南入北斗長數十丈二刻所息占曰大臣有繫者其年十一月庚子定陵侯淳于長坐執左道下獄死哀帝建平元年正月丁未隕石北地十其九月甲辰隕石虞二梁國縣名平帝元始二年六月隕石巨鹿二自惠盡平隕石凡十一皆有光耀雷聲成哀尤屢見光武建武十年三月癸卯流星如月從太微出入北斗魁第六星色白旁有小星射者十餘枚滅則有聲如雷食頃止孟康曰流星光迹相連也絶迹而去為飛也流星為貴使星大者使大星小者使小太微天子廷北斗魁主殺星從太微出抵北斗魁是天子大使將出有所伐殺古今注曰正月壬戌月犯心後星閏月庚辰火入輿鬼過軫北庚申月在斗赤如丹者也十二月己亥大流星如缶出栁西南行入軫且滅時分為十餘如遺火狀須臾有聲隱隱如雷栁為周軫為秦蜀大流星出栁入軫者是大使從周入蜀是時光武帝使大司馬吳漢發南陽卒三萬人乘船泝江而上擊蜀十二年十一月丁丑敗公孫述兵殺述明日漢入屠蜀城誅述大將公孫晃延岑等所殺數萬人夷滅述妻宗族萬餘人以上是大將出伐殺之應也其小星射者及如遺火分為十餘皆小將相隨之象有聲如雷隱隱者兵將怒之徴也十二年正月古今注曰丁丑月犯軒轅大星己未小星流百枚以上或西北或正北或東北二夜止古今注曰二月辛亥月入氐暈珥圍角亢房六月戊寅晨小流星百枚以上四面行小星者庶民之類流行者移徙之象也或西北或東北或四面行皆小民流移之徴是時西討公孫述北征盧芳丐奴助芳侵邊漢騎將軍馬武騎都尉劉納閻興軍下曲陽臨平呼沱以備胡丐奴入河東中國未安米榖荒貴民或流散後三年吳漢馬武又徙鴈門代郡上谷關西縣吏民六萬餘口置常關居庸關以東以避胡寇自是小民流移之應十月丁卯大星流有光發東井西行聲隆隆郗萌占曰流星出東井所之國水中元二年十月戊子大流星從西南東北行聲如雷流星為使中郎將竇固揚虛侯馬武等將兵西征也孝明永平元年四月丁酉流星大如斗起天市樓西南行光照地流星為外兵西南行為西南夷是時益州發兵擊姑復蠻夷大牟替陵斬首詣洛陽七年流星大如杯從織女西行光照地織女天之貴女流星出之女主憂其月癸卯光烈皇后崩孝章建初元年二月甲寅流星過紫宫中長數丈散為三滅為大人忌後四年明德皇后崩六年七月丁酉夜有流星起軒轅大如拳厯文昌餘氣正白向西如文昌久久乃滅孝和永元元年正月辛卯有流星起參長四丈古今注曰大如拳起參東向有光色黃白古今注曰癸亥鎮在參又有流星大如桃色赤起太微東蕃石氏曰鎮守參有土功事二月流星起天棓東北行三丈所滅色青白壬申夜有流星起太微東蕃長三丈三月古今注曰戊子土在參丙辰流星起天津古今注曰星大如桃起天津東至斗黃白頻有光壬戌有流星起天將軍東北行古今注曰色黃無光參為邊兵天棓為兵太微天廷天津為水天將軍為兵流星起之皆為兵其六月漢遣車騎將軍竇憲執金吾耿秉與度遼將軍鄧鴻出朔方並進兵臨私渠北鞮海斬虜首萬餘級獲生口牛馬羊百萬頭日逐王等八十一部降凡三十餘萬人追單于至西海是嵗七月又雨水漂人民是其應也二年二月丁酉有流星大如桃起紫宫東蕃西北行五丈稍滅古今注曰三月甲子火在亢南端門第一星南乙亥金在東井四月丙辰有流星大如瓜起文昌東北西南行至少微西滅有頃音如雷聲已而金在軒轅大星東北二尺所古今注曰丁丑火在氐東南星東南八月丁未有流星如雞子起太微西東南行四丈所消十月癸未有流星大如桃起天津西行六丈所消十一月辛酉有流星大如拳起紫宫西行到胃消三年九月丁卯流星大如雞子起紫宫西南至北斗柄間消尾紫宫占曰有流星出紫宫天子使也色赤言兵色白言義色黃言蟲色青言憂色黑言水出皆以所之野命東西南北紫宫天子宫文昌少微為貴臣天津為水北斗主殺流星起厯紫宫文昌少微天津文昌為天子使出有兵誅也竇憲為大將軍與其弟篤景女弟壻郭舉等坐謀不軌伏誅六年六月己丑流星大如桃起參北西至參尾南稍有光七年正月丁未有流星起天津入紫宫中滅色青黃有光八年九月辛丑夜有流星大如拳起婁十一年五月丙午流星大如瓜起氐西南行稍有光白色古今注曰六月庚辰月入畢中占曰流星白為有使客大為大使小亦小使疾期疾遲亦遲大如瓜為近小行稍有光為遲也又正王日邊方有受王令者也明年二月蜀郡旄牛徼外夷白狼樓薄種王唐繒等率種人口十七萬歸義內屬賜金印紫綬錢帛十四年十一月丁丑有流星大如拳起北斗魁中北至閣道稍有光色赤黃須臾西北有雷聲十六年十月辛亥流星起鈎陳北行三丈有光色黃元興元年二月庚辰有流星起角亢五丈所四月辛亥有流星起斗東北行到須女七月己巳有流星起天市五丈所光色赤閏月辛亥水金俱在氐巫咸曰辰星守氐多水災海中占曰天下大旱所在不收荆州星占太白守氐國君大哭流星起斗東北行至須女須女燕地天市為外軍水金會為兵誅其年遼東貊人反鈔六縣發上谷漁陽右北平遼西烏桓討之殤帝延平元年九月隕石陳留四傳曰隕星也董仲舒以為從髙反下之象或以為庶人惟星隕民困之象也順帝永和三年二月辛丑有流星大如斗從西北東行長八九尺色黃赤有聲隆隆如雷桓帝延熹七年二月癸亥隕石右扶風一鄠又隕石二皆有聲如雷靈帝光和元年四月癸丑流星犯軒轅第二星東北行入北斗魁中流星為貴使軒轅為內宫北斗主殺是天子大使將出有伐殺也至中平元年黃巾賊起上遣中郎將皇甫嵩等征之斬首十餘萬級中平中夏流星赤如火長三丈起河鼓入天市抵觸宦者星色白長三丈後尾曲屈食頃乃滅狀似枉矢占曰枉矢流發其宫射所謂矢當直而枉者操矢者邪枉人也六年大將軍何進謀盡誅中官中官覺于省中殺進俱兩破滅天下遂大壞亂蜀後主建興十三年諸葛亮率大衆伐魏屯於渭南有長星赤而芒角自東北西南流投亮營三投再還往大還小占曰兩軍相當有大流星來走軍上及墜軍中者皆破敗之徴也九月亮卒於軍焚營而退羣帥交怒多相誅殘魏眀帝景初二年宣帝圍公孫文懿於襄平八月景寅夜有大流星長數十丈白色有芒鬛從首山東北流墜襄平城東南占曰圍城而有流星來走城上及墜城中者破又曰星墜當其下有戰場又曰凡星所墜國易姓九月文懿突圍走至星墜所被斬屠城坑其衆元帝景元四年六月有大流星二並如斗見西方分流南北光照地隆隆有聲按占流星為貴使星大者使大是年鍾鄧尅蜀二星蓋二帥之象二帥相背又分流南北之應鍾會既叛三軍憤怒隆隆有聲兵將怒之徴也晉武帝泰始四年七月星隕如雨皆西流占曰星隕為百姓叛西流吳人歸晉之象也二年吳夏口督孫秀率部曲二千餘人來降太康九年八月壬子星隕如雨劉向傳言下去其上之象後三年帝崩而惠帝立天下自此亂矣惠帝泰安二年十一月辛巳有星晝隕中天北下光變白有聲如雷按占曰營首營首所在下有大兵流血眀年劉石攻略并州多所殘滅王浚起燕代引鮮卑攻掠鄴中百姓塗地有聲如雷怒之象也永興元年七月乙丑星隕有聲二年十月星又隕有聲占同上是後遂亡中夏懷帝永嘉元年九月辛卯有大星如日自西南流於東北小者如斗相隨天盡赤聲如雷占曰流星為貴使星大者使大是年五月汲桑殺東燕王騰遂據河北十一月始遣和郁為征北將軍鎮鄴西田甄等大破汲桑斬於樂陵於是以甄為汲郡太守弟蘭巨鹿太守小星相隨者小將副帥之象也司馬越忿魏郡以東平原以南皆黨於桑以賞田甄等於是侵掠桑地有聲如雷忿怒之象也十二月丁亥星流震散按劉向説天官列宿在位之象其衆小星無名者衆庶之類此百官衆庶將流散之象也是後天下大亂百官萬姓流移轉死矣四年十月庚子大星西北墜有聲尋而帝蒙塵於平陽元帝永昌元年七月甲午有流星大如甕長百餘丈青赤色從西方來尾分為百餘岐或散時王敦亂百姓流亡之應也成帝咸康三年六月辛未流星大如二斗魁色青赤光耀地出奎中沒婁北按占為飢五榖不藏是月大旱飢六年二月庚午朔有流星大如缶光耀地出天市西北入太微占曰大人當之八年六月成帝崩穆帝永和八年六月辛巳日未入有流星大如三斗魁從辰巳上東南行晷度推之在箕斗之間蓋燕分也按占為營首營首之下流血滂沱是時慕容俊僭稱大燕攻伐無已十年四月癸未流星大如斗色赤黃出織女沒造父有聲如雷占曰燕齊有兵百姓流亡其年十二月慕容俊遂據臨漳盡有幽并青冀之地緣河諸將奔敗河津隔絶慕容恪攻齊海西公太和四年十月壬申有大流星西下有聲如雷眀年遣使免袁真為庶人桓溫征夀春真病死息瑾代立求救於苻堅溫破苻堅軍六月夀春城陷孝武太元六年十月乙卯有奔星東南經翼軫聲如雷占曰楚地有兵軍破百姓流亡十二月苻堅荆州刺史梁成襄陽太守閻震率衆伐竟陵桓石虔擊大破之生擒震斬首七千獲生口萬人聲如雷將帥怒之象也十三年閏月戊辰天狗東北下有聲占曰有大戰流血自是後慕容垂翟遼姚萇苻登慕容永並阻兵爭強十四年正月彭城妖賊又稱偽號於皇丘劉牢之破滅之三月張道破合鄊太山向欽之擊破之安帝隆安五年三月甲寅流星赤色衆多西行經牽牛虛危天津閣道貫太微紫宫占曰星庶人類衆多西行衆將西流之象經天子庭主弱臣強諸侯兵不制其年五月孫恩侵吳郡殺內史六月至京口於是內外戒嚴營陳屯守劉裕追破之元興元年七月大飢人相食浙江以東流亡十六七吳郡吳興户口減半又流奔而西者萬計十月桓元遣將擊劉軌破走之軌奔青州石勒末年星隕於鄴東北六十里初赤黑黃雲如幕長數十丈交錯如雷震聲墜地氣熱如火塵起連天時有耕者往視之土猶然沸見一石方尺餘青色而輕擊之聲如磬未幾石勒死虎殺其子而自立宋文帝元嘉十年十二月有流星大如甕尾長二十餘丈梁武帝天監十年九月丙申天西北隆隆有聲赤氣下至地占曰天狗也所往之鄉有流血其君失地其年二月馬仙琕大破魏軍斬馘十餘萬克復朐山城中大通四年七月甲辰星隕如雨占曰星隕隂失其位災害之象萌也星隕如雨人民叛下有専討大人憂其後侯景狡亂以憂崩人衆奔散皆其應也太清三年有流星長三十丈墮武軍元帝承聖元年十二月星隕吳郡三年十一月周人圍江陵有流星墜城中陳文帝天嘉六年三月丁卯日入後衆星未見有流星白色大如斗從太微間南行尾長尺餘占曰有兵與喪明年帝崩少帝廢後魏道武帝登國四年三月丁未有大流星東南行尾屬地六七丈有聲九年有星墜於河北聲如雷震光眀燭天地文成帝興安元年五月辛亥流星大如五斗許西南為六七假有聲獻文帝大安元年十一月乙酉有流星照地啾啾有聲孝靜帝武定四年九月丁未髙祖圍玉壁城有星墜於營衆驢皆鳴占曰破軍殺將髙祖不豫次年崩周武帝天和三年二月庚午有流星大如斗出在攝提流至天津滅有聲如雷建德六年十二月癸丑流星大如月西流有聲蛇行屈曲光照地占曰兵大起下有戰場戊辰平旦有流星大如三斗器色赤出紫宫凝著天乃北下占曰人主去其宫殿是月營州刺史髙寶寧反其明年帝總戎北伐後年帝崩宣帝大成元年六月丁卯有流星大如雞子出氐中西北流有尾迹長一丈所入月中即滅占曰不出三年人主憂又曰有亡國靜帝幽閉之應己丑有流星一大如斗色青有光眀照地出營室抵壁入濁二年四月乙丑有星大如斗出天厨流入紫宫抵鉤陳乃滅占曰有大喪兵大起將軍戮又曰臣犯上主有憂其五月帝崩隋公執國政大喪臣犯主之應趙王越王以謀執政被誅又荆豫襄三州諸蠻反尉遲迥王謙司馬消難各舉兵畔不從執政終以敗亡此皆大兵起將軍戮之應也五月甲辰有流星一大如三斗器出太微端門流入翼色青白光明照地聲若風吹幡旗占曰有立王若徙王又曰國失君其月己酉帝崩劉昉矯制以隋公受遺詔輔政終受天命立王徙王失君之應也七月壬子嵗星太白合於張有流星大如斗出五車東北流光明燭地隋文帝開皇元年十一月己巳有流星聲如隤墻光燭地占曰流星有光有聲名曰天保所墜國有喜其九年平陳天下一統五年八月戊申有流星數百四散而下占曰小星四面流行者庶人流移之象其九年平陳江南士人悉播遷京師十九年十二月乙未星霣於渤海占曰王失其位災害之萌也又曰大人憂煬帝大業十一年十二月戊寅大流星如斛墜賊盧明月營破其衝輣壓殺十餘人占曰奔星所墜破軍殺將其年王充擊盧明月城破之十二年五月癸巳大流星隕於吳郡為石占曰有亡國有死王有大戰破軍殺將其後大軍破逆賊劉元進於吳郡八月壬子有大流星如斗出王良閣道聲如隤墻癸丑大流星如甕出羽林十三年五月辛亥大流星如甕墜於江都占曰其下有大兵戰流血破軍殺將眀年帝遇弒唐髙祖武德三年十月己未有星隕於東都隱隱有聲太宗貞觀二年天狗隕於夏州城中十四年八月有星隕於髙昌城中十六年六月甲辰西方有流星如月西南行三丈乃滅占曰星甚大者為人主十八年五月流星出東壁有聲如雷占曰聲如雷者怒象十九年四月己酉有流星向北斗杓而滅髙宗永徽三年十月有流星貫北極四年十月十日睦州女子陳石真反婺州刺史崔義元討之有星隕於賊營乾封元年正月癸酉有星出太微東流有聲如雷咸亨元年十一月西方有流星聲如雷調露元年十一月戊寅流星入北斗魁中乙巳流星燭地有光使星也武后延載元年六月幽州都督孫佺討奚契丹出師之夕有大星隕於營中中宗神龍三年三月丙辰有流星聲如頺墻光燭天地景龍二年二月癸未有大星隕於西南聲如雷野雉皆雊景雲元年八月己未有流星出五車至上台滅九月甲申有流星出中台至相滅太極元年正月辛卯有流星出太微至相滅元宗開元二年五月乙卯晦有星西北流或如甕或如斗貫北極小者不可勝數天星盡搖至曙乃止占曰星民象流者失其所也漢書曰星搖者民勞十二年十月壬辰流星大如桃色赤黃有光燭地占曰色赤為將軍使天寶三載閏二月辛亥有星如月墜於東南墜後有聲肅宗至德二載賊將武令珣圍南陽四月甲辰夜中有大星赤黃色其長數十丈光燭地墜賊營中十一月壬戌有流星大如斗東北流長數丈蛇行屈曲有碎光迸出占曰是謂枉矢代宗廣德二年六月丁卯有妖星隕於汾州十二月丙寅自乙夜至曙有星流如雨大厯二年九月乙丑晝有星如一斗器色黃有尾長六丈餘出南方沒於東北東北於中國則幽州分也三年九月乙亥有星大如斗北流有光燭地占為貴使六年九月甲辰有星西流大如一斗器光燭地有尾迸光如珠長五丈出婺女入天市南垣滅八年六月戊辰有流星大如一升器有尾長丈餘入太微十二月壬申有流星大如一升器有尾長二丈餘出紫微入濁十年三月戊戌有流星出於西方如二升器有尾長二丈入濁十二年二月辛亥有流星如桃尾長十丈出匏瓜入太微德宗建中四年八月庚申有星隕於京師興元元年六月戊午星或什或伍而隕貞元三年閏五月戊寅枉矢墜於虛危十四年閏五月辛亥有星墜於東北光燭如晝聲如雷憲宗元和二年十二月己巳西北有流星亘天尾散如珠占曰有貴使四年八月丁丑西北有大星東南流聲如雷鼓六年三月戊戌日晡天隂寒有流星大如一斛器墜於兖鄆間聲震數百里野雉皆雊所墜之上有赤氣如立蛇長丈餘至夕乃滅時占者以為日在戌魯分也不及十年其野主殺而地分九年正月有大星如半席自下而升有光燭地羣小星隨之四月辛巳有大流星尾迹長五丈餘光燭地至右攝提西滅十二年九月己亥甲夜有流星起中天首如甕尾如二百斛船長十餘丈聲如羣鴨飛明若火炬過月下西流須臾有聲礱礱墜地有大聲如壞屋者三在陳蔡間十四年五月己亥有大流星出北斗魁長二丈餘南抵軒轅而滅占曰有赦赦視星之大小十五年七月癸亥有大星出鉤陳南流至婁滅穆宗長慶元年正月丙辰有大星出狼星北色赤有尾迹長三丈餘光燭地東北流至七星南滅四月有大星墜於吳聲如飛羽七月乙巳有大流星出參西北色黃有尾迹長六七丈光燭地至羽林乃滅八月辛巳東北方有大星自雲中出色白光燭地前鋭後大長二丈餘西北流入雲中滅二年四月辛亥有流星出天市光燭地隱隱有聲至郎位滅市者小人所聚郎在天廷中主宿衛六月丁酉有小星隕於房心間閏十一月丙申有流星大如斗抵中台上星三年八月丁酉夜有大流星如數斗器起西北經奎婁東南流去月甚近迸光散落墜地有聲四年四月紫微中星隕者衆七月乙卯有大流星出天船犯斗魁樞星而滅占曰有舟楫事丙子有大流星出天將軍東北入濁敬宗寶厯元年正月乙卯有流星出北斗樞星光燭地入濁占曰有赦二年五月癸巳西北有流星長三丈餘光燭地入天市中滅占為有誅七月丙戌日初入東南有流星向南滅以晷度推之在箕斗間八月丙申有大流星出王良長四丈餘至北斗杓滅王良奉車御官也文宗太和四年六月辛未自昏至戊夜流星或大或小觀者不能數占曰民失其所王者失道綱紀廢則然又曰星在野象物在朝象官七年六月戊子自昏及曙四方流星大小縱橫百餘八年六月辛巳夜中有流星出河鼓赤色有尾迹光燭地迸如散珠北行近天棓滅有聲如雷河鼓為將軍天棓者帝之武備九年六月丁酉自昏至丁夜流星二十餘縱橫出沒多近天漢開成二年九月丁酉有星大如斗長五丈自室壁西北流入大角下沒行類枉矢中天有聲小星數百隨之十一月丁丑有大星隕於興元府署寢室之上光燭庭宇三年五月乙丑有大星出於栁張尾長五丈餘再出再沒四年二月乙亥丁夜至戊夜四方中天星流大小凡二百餘並西流有尾迹長二丈至五丈八月辛未流星出羽林有尾迹長八丈餘有聲如雷羽林天軍也十二月壬申蚩尤旗見武宗會昌元年六月戊辰自昏至戊夜小星數十縱橫流散占曰小星民象七月庚午北方有星光燭地東北流經王良有聲如雷十一月壬寅有大星東北流光燭地有聲如雷四年八月丙午有大星如炬火光燭天地自奎婁掃北方七宿而隕六年二月辛丑夜中有流星赤色如桃光燭地有尾迹貫紫微入濁懿宗咸通六年七月乙酉甲夜有大流星長數丈光燦如電羣小星隨之自南徂北其象南方有以衆叛而之北也九年十一月丁酉有星出如匹練亘空化為雲而沒在楚分是謂長庚見則兵起十三年春有二星從天際而上相從至中天狀如旌旗乃隕九月蚩尤旗見僖宗乾符二年冬有二星一赤一白大如斗相隨東南流燭地如月漸大光芒猛怒三年晝有星如炬火大如五升器出東北徐行隕於西北四年七月有大流星如盂自虛危厯天市入羽林滅占為外兵中和元年有異星出於輿鬼占者以為惡星八月己丑夜星隕如雨或如杯如碗者交流如織庚寅夜亦如之至丁酉止三年十一月夜星隕於西北如雨光啓二年九月有大星隕於揚州府署延和閣前聲如雷炎光燭地十月壬戌有星出於西方色白長一丈五尺屈曲而隕占曰長庚也下則流血三年五月秦宗權擁兵於汴州北郊晝有大星隕於其營聲如雷是謂營頭其下破軍殺將昭宗乾寧元年夏有星隕於越州後有光長丈餘狀如蛇或曰枉矢也三年六月天暴雨雷電有星大如碗起西南墜於東北色如鶴練聲如羣鴨飛占為姦謀光化元年九月丙子有大星墜於北方三年三月丙午有星如二十斛船色黃前鋭後大西南行十一月中天有大星自東緩流如帶屈曲光凝著天食頃乃滅是謂枉矢天復三年二月帝至自鳳翔其明日有大星如月自東濁際西流有聲如雷尾迹橫貫中天三夕乃滅天祐元年五月戊寅乙夜雨晦暝有星長二十丈出東方西南向首黑尾赤中白枉矢也一曰長星二年三月乙丑夜中有大星出中天如五斗器流至西北去十丈許而止上有星芒炎如火赤而黃長丈五許而蛇行小星皆動而東南其隕如雨少頃沒後有蒼白氣如竹叢上衝天中色瞢瞢占曰亦枉矢也梁太祖乾化元年十一月甲辰夜東方有流星如數升器出畢宿口曵光三丈餘有聲如雷後唐莊宗同光三年六月甲申衆星交流丙戌衆星交流庚寅夜一鼓西南有流星約七十餘皆有尾迹西南流其年七月皇太后崩辛卯衆小星流於西南九月丁未天狗墮有聲如雷野雉皆雊明宗天成元年六月乙未衆小星交流二年三月庚申衆小星流於西北三年自正月至於六月宗人宗正搖不止長興元年九月辛酉衆小星交流而隕丙戌夜二鼓初東北方有小流星入北斗魁滅至五鼓初西北方次北有流星狀如半升器初小後大速流入奎滅尾迹凝天屈曲似雲而散光明燭地又東北有流星如大桃出下台星向西北速流至斗柄第三星旁滅五鼓後至明中天及四方有小流星百餘流注交橫六月庚午衆星交流七月乙亥朔衆星交流閔帝應順元年二月丁酉衆星流於西北末帝清泰元年九月辛丑夜五鼓初有大星如五斗器西南流尾迹長數丈色赤移時盤屈如龍形蹙縮如二鏵相鬪而散又一星稍小東流有尾迹凝成白氣食頃方散晉髙祖天福三年三月壬申夜四鼓後東方有大流星狀如三升器其色白尾迹長二尺餘屈曲流出河鼓星東三尺東流丈餘滅周世宗顯德元年正月庚寅有大星墜有聲如雷牛馬皆逸京城以為曉鼓皆伐鼓應之三年正月癸亥五鼓後有大星出南斗東北流丈餘滅宋太祖建隆元年正月戊午有星出東北方如半升器青赤色北行初小後大尾迹斷續光燭地九月癸亥有星出昴大如缶十二月戊辰有星如半升器青赤色出參旗西南慢行而沒蒼光燭地三年五月乙丑天狗墮西南占曰其地有兵後王師討西蜀孟昶既降草寇連年方定四年二月丙午有星如桃色赤如弧矢東南沒有光明乾德二年二月乙丑有星如三升器黃白色出太微五帝南速行至外厨沒其體散落光燭地三年六月丁巳有星如桃色黃赤出北斗魁經太微垣北過角西漸大行五尺餘沒尾迹凝天有光明十二月丁巳有星出天河青白色南行至天倉沒初小後大如半升器光燭地四年正月乙未有星出社星青白色速行尾迹三丈餘初小後大沒有光明四月甲寅有星出天乳青赤色如升器東南行貫房沒光燭地閏八月己丑有星出天船如升器青白色西北速行沒於文昌五年七月戊子有星出大角如升器青白色北行沒明燭地六年六月己卯有星出河鼓如升器慢行明燭地開寶三年九月庚午廣州民見衆星皆北流知星者言劉氏當舉國以歸中原明年廣南平四年八月辛卯有星出織女西北行尾迹三丈餘沒久有聲五年八月乙巳有星出王良西北行四丈有聲而散占云有聲怒也主使出七年九月甲午有星出室西北行星體散落有聲明燭地太宗太平興國二年三月丙午有大星出天棓光燭地三年十月甲寅有星出天船赤黃色如二升器至天棓星體散明燭地七月辛巳有星如稱權沒於婁八月壬寅有星出紫微鈎陳東如碗大赤黃色向北速行近北極沒占曰外國有使至是冬三佛齊吐蕃山後兩林蠻來貢雍熙元年十月丁酉有星出昴赤色東南蛇行二丈餘沒占曰外國使至又為姦邪之象二年正月壬戌有星出東井其大倍於金星至輿鬼沒占云四表來貢是嵗占城卭部州蠻西南蕃來貢四年六月庚戌酉初有星出西北色青白入濁當戌地有聲如雷占曰戍地兵飢流血是後李繼遷擾西鄙八月乙亥有星出天關東色赤黃尾貫月端拱元年四月辛亥亥時有星出天津大如盞赤黃色蛇行有聲明燭地犯天津東北星占云枉矢見逆臣誅其年陳廷山謀叛磔於市閏五月辛亥丑時有星出奎如半月北行而沒占云有溝瀆事乙卯有星出紫微鈎陳西大如盞色青尾迹短赤光照地北行而沒九月癸丑有星出西南如太白有尾迹至中天旁出一小星行丈餘又出一小星相隨至五車沒占主兵戰賊敗二年四月辛亥戌時有星出東南如升器色白墜於氐房間占云宰相出明年春趙普留守西京壬申有星出漸臺大如碗色赤東南急行掩左旗過河鼓沒淳化元年九月辛巳有星出羽林色青南行光奪月占曰禁兵出十一月壬午流星出天關如半月南行厯東井郎位攝提至大角東北墜於地光芒四照聲如隤墻占曰秦燕分兵疫水旱二年正月丙申有星出水府西大如杯色赤黃經參其分為三星相從至天苑東沒光燭地七月癸酉有星出雲雨側大如杯色青白緩行三尺餘沒占云為大風發屋折木三年三月己酉未時西北方有星西北速行大如杯色青白有尾迹占云有隂謀將不和刑傷兵疫之象屬燕分四月己卯有星出文昌西南速行至栁分為二星而沒六月己丑有星出天市垣屠肆東色青白西北慢行丈餘分為三星從而沒四年五月乙未平明有星東南出南斗大如杯色青白西北行而沒占云衆星沒流星出者為警動衆庶之象色青白主兵急流事速五年八月己酉常星未見有星出東方色青白東北慢行入濁沒約出奎婁間占為兵衆之象九月庚午有星出昴北大如杯緩行過卷舌至礪石沒占云星大事大緩行事緩為候兵討賊殺將之象至道元年四月乙巳常星未見有星出心北大如杯色青赤急行而墜占云兵象七月癸丑有星出危大如杯色青白入羽林沒占云為兵大起將軍出二年五月辛丑有星出紫微北尾迹丈餘彗而有聲墜於室壁間占云所墜之地破軍殺將今墜北方主北蕃君長災五月己未日未及地五尺間有星出中天大如杯色赤黃有尾迹東北速行二丈餘沒占云動衆之象荆楚有兵疫六月己卯有星出牽牛西厯狗國光芒丈餘墜東南及地無聲又有星出翼貫天廟墜於稷星東光燭地占云邉庭不靖又云兵起命將宜告廟九月丁酉平明有星出北方大如杯東行三丈餘分為三星從而沒占云皇王欲發使慰四方三年九月丁丑有星二隕於西南一出南斗一出牽牛有光三丈許真宗咸平五年三月丙午有星晝出心至南斗沒赤光丈餘八月辛巳有星出營室大如杯色白有光九月丙申有星出東方西南行大如斗有聲若牛吼小星數十隨之而隕戊戌又有星十數入輿鬼至中台凡一大星偕小星數十隨之其間兩星如升器大一至狼星一至南斗沒占曰燕朔民流徙又曰有兵不戰踰年契丹擾河朔請盟而去壬子有星出中天如缶尾迹數道如迸火西流至狼弧沒六年五月乙未有星出王良西又出北極稍東北至垣外沒有聲如雷占曰逺邦有歸伏者其年髙麗三佛齊大食蒲端國並朝貢七月壬辰有星出昴尾迹丈餘色白隱隱有聲至狼沒占曰有赦明年改元大赦二月乙酉威虜軍有星大如斗厯城西北尾迹長數里光照地落蕃帳有聲如雷者三占曰有敗兵流血殺將伏尸明年春李繼遷冦西涼府為潘羅支所敗中流矢死景德元年十月戊申天雄軍有星出北方大如斗隕於西北赤光丈餘二年正月丙子日未沒有星速流西南大如杯占曰外國大使至是冬契丹使來四月癸卯有星北流入天市如升器尾迹丈餘十二月壬子有星出胃南聲如雷光燭地三年五月乙卯有星出天津東北至紫微垣北分為四星隨而沒赤黃有尾迹丁酉有星出胃北入天囷迸為數星光燭地七月庚申有星出虛旁有短彗聲如雷至東北沒赤光照地占曰秦楚有暴兵明年宜賊叛荆楚發兵十一月辛丑有星出中台東北速流有聲光燭地四年六月丙辰有星出北方慢流至八穀迸為數星沒光燭地七月辛卯有星出敗瓜南大如杯慢流厯河鼓入天市至宗人東北迸為二星沒色赤黃有尾迹十二月癸巳有星出弧矢赤黃色尾迹丈餘光燭地速流入濁占曰燕趙飢大中祥符元年二月戊申有星十餘急流入濁色赤黃有尾迹五月辛未有星如太白出天市垣宗人東南尾迹丈餘闊三寸向北慢流至女牀西分為數星沒九月乙丑有星出天倉急流東南星體散落二年三月己未有星如斗器出天津南至離珠沒尾迹五尺餘照地明占曰后宫憂四月丙申有星出八榖如升器有尾迹速流西至五車東迸為數星沒八月丙申有星出北斗杓西南急行至郎將西分為數假占曰燕分飢三年三月丁未有星出天市宗人東北如升器尾迹二丈至旗迸為數星沒光燭地五月丁亥有星出北斗魁如桃色青白尾迹二丈餘乙丑有星出傳舍如桃色赤黃至紫微沒壬申有星出建星如升器入南斗沒赤黃有尾迹七月庚辰有星出宗人西如升器北流入濁光照地八月丁未有星出貫索如升器至帝席沒尾迹光明九月庚辰有星出軒轅如半升器入太微垣沒十月甲戌有星出東方赤黃無尾迹分為數星稍南沒四年二月辛亥有星出東方尾迹赤黃二丈餘占為天保星所見吉四月乙丑有星出栁如升器色赤黃至翼沒六月壬戌有星出觜東北如升器流入濁占曰東北蠻夷憂七月壬申有星出紫微宫如升器速流至天皇沒十月戊午有星出東北如升器流入濁又星出七星南大如杯至天稷沒尾迹丈餘五年二月戊申有星出貫索經庫樓迸為數星沒八月戊午有星大小二十餘皆有尾迹北流又一星如升器光燭地出紫微垣外尾丈餘闊三寸許東北流至傳舍沒占有大慶大赦是冬聖祖降赦常所不原者六年十一月丁巳有星出太微郎位東大如杯色赤黃有尾迹至軫北迸為數星沒占曰大臣憂七年三月丙戌有星出南河大如杯至玉井沒占曰秦齊飢四月辛酉有星出鈎陳大如杯尾迹赤黃占曰發大使宣急令是嵗遣巡撫江淮兩浙八年二月丁卯有星出郎將北迸為三星四月癸丑有星出亢西至右攝提迸為數星隨而沒五月乙酉有星大如杯青白色出人星至騰蛇沒光燭地八月己亥有星出參大如杯南流入濁天禧元年四月己巳有星出軫大如杯至器府北沒光照地十二月癸巳有星出東北大如杯尾迹赤黃急流西南沒二年八月乙卯有星二大如杯尾迹赤黃一出五車一出狼北入濁九月戊子有星如二升器出西南河色赤黃至栁沒三年六月乙巳星出昴大如杯急流至天倉沒十二月壬寅有星出軒轅大如杯尾迹黃慢流至太微垣久之有聲如雷占曰女主之慶四年正月丁巳有星出王良大如杯明照地至騰蛇沒占曰有大水其年秋京師大雨河渠壅溢壞廬舍五年四月己未有星出南方如二升器北流入濁尾迹三丈餘十月乙巳有星出天津西大如杯文獻通考卷二百九十一
