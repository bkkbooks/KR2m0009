body:
  text: 文獻通考卷一百三鄱陽馬端臨貴與著宗廟考十三功臣配享殷盤庚王若曰古我先王暨乃祖乃父胥及逸勤豫敢動用非罰言古之君臣相與同勞逸子孫所宜法之我豈敢動用非常之罰脅汝乎世選爾勞豫不掩爾善選數也掩蔽也兹豫大享於先王爾祖其從與享之古者天子録功臣配食於廟大享蒸嘗也所以不掩汝善周禮夏官司勳王功曰勳輔成王業若周公國功曰功保全國家若伊尹民功曰庸法施於人若后稷事功曰勞以勞定國若禹治功曰力制法成治若咎繇戰功曰多克戰出竒若韓信陳平司馬法曰尚多前勇謂敵功多凡有功者銘書於王之太常祭於大蒸司勳詔之銘之言名也生則書於王旌以識其人與其功也死則於蒸先王祭之詔謂告其神以辭也漢制祭功臣於庭生時侍宴於堂死則降在庭位與士庶為列魏齊王景元五年詔祀故尚書令荀攸於太祖廟庭臣松之以為故魏氏配享不及荀彧蓋以其末年異議又位非魏臣故也至於升程昱而遺郭嘉先鍾繇而後荀攸則末詳厥極也徐他謀逆而許禇心動忠誠之至逺同於日磾且潼關之危非禇不濟禇之功烈有過典韋今祀韋而不及禇文之所未逹也魏髙堂隆議曰按先典祭祀之禮皆依生前尊卑之敘以為位次功臣配享於先王像生時侍宴宴禮大夫以上皆升堂以下則位於庭其餘則與君同牢至於俎豆薦羞唯君備矣公降於君卿大夫降於公士降於大夫使功臣配食於蒸祭所以尊崇其德明其勳以勸嗣臣也議者欲從漢氏祭之於庭此為貶損非寵異之謂也貴者取貴骨賤者取賤骨凡牲體前貴後賤今使配食者因君之牢以貴賤為俎庶合事宜周志曰勇則害上不登於眀堂共用為之勇共用死國用言有勇而無義死不登堂而配食此即配食之義位在堂之眀證也下為北面三公朝立之位耳宴則脫屨升堂不在庭也凡獻爵有十二九七五三之差君禮大夫三獻太祝令進三爵於配食者可也晉散騎常侍任茂議按魏功臣配食之禮敘六功之勳祭陳五事之品或祀之於一代或傳之於百代蓋社稷五祀所謂傳之於百代者古之王臣有眀德大功若勾龍之能平水土柱之能殖百榖則祀社稷異代不廢也昔湯既勝夏欲遷其社不可乃遷稷而周棄德可代柱而勾龍莫廢也若四敘之屬分主五方則祀為貴神傳之異代載之春秋非此之類則雖眀如咎繇勳如伊尹功如吕尚各於當代祀之不祭於異代也然則伊尹於殷雖有王功之茂不配食於周之清廟矣今之功臣論其勳迹比咎繇伊尹呂尚猶或未及凡云配食各配食於主也今主遷廟臣宜從享大司馬石苞等議魏氏代功臣宜歸之陳留國使修常祀允合事理梁武帝初何佟之議曰禘於夏首物皆未成故為小祫於冬萬物皆成其禮斯大近代禘祫並及功臣有乖古典請唯祫祭不及功臣從之唐太宗貞觀禮祫享功臣配享於廟庭禘享則不配後又令禘祫之日功臣並得配享初太常卿韋縚等議功臣祫享之日配享於廟庭禘及時享則皆不預其議遂行至開元初復令禘之日亦皆配享非舊典也配享位在各帝廟庭太階之東少南西向以北為上髙祖廟六人贈司空淮安靖王神通贈司空河間元王孝恭尚書右僕射鄖節公殷開山贈民部尚書渝襄公劉政會並貞觀十四年十月十五日敇贈司徒周定公武士彠顯慶四年三月七日敇文眀元年停贈太子太師魏國公裴寂贈禮部尚書魯國公劉文靖並天寶六載正月十三日敇開元禮無武士彠裴寂劉文靜太宗廟七人贈太尉梁文昭公房元齡贈司徒申文獻公髙士廉贈尚書左僕射蔣忠公屈突通並貞觀二十三年九月二十四日敇至永徽四年二月房元齡以子遺愛反停配享贈太尉鄭文貞公魏徴神龍二年閏二月十五日敇太尉趙國公長孫無忌贈司徒衛景武公李靖司空萊成公杜如晦並天寶六載正月十二日敇開元禮無長孫無忌李靖杜如晦髙宗廟六人贈太尉貞武公李績贈開府儀同三司北平定公張行成贈揚州大都督髙陽恭公許敬宗贈尚書右僕射髙唐忠公馬周並垂拱二年正月十一日敇其許敬宗神龍二年閏二月一日有敇停尚書右僕射河南文忠公禇遂良贈司徒蓚縣憲公髙季輔贈司空樂成文獻公劉仁軌並天寶六載正月十二日敇開元禮無許敬宗禇遂良髙季輔劉仁軌中宗廟八人侍中譙國公桓彥範侍中平陽愍王敬暉中書令漢南郡王張柬之贈太尉博陸文獻王崔元暐中書令南郡王袁恕已並開元六年六月二十二日敇司空梁文惠公狄仁傑贈尚書左僕射齊正公魏元忠贈太子少保琅琊郡公王同皎並天寶六載正月十二日敇開元禮無狄仁傑魏元忠王同皎睿宗廟二人贈司空許文正公蘇瓌尚書左丞相徐文獻公劉幽求並開元六年六月二十三日敇元宗廟三人贈太師燕文正公張説贈太子太師代國公郭元振中書令趙國公王琚檢年月未獲肅宗廟二人贈太師韓文憲公苖晉卿大歷四年十月七日敇贈太尉翼獻穆公裴冕元和四年八月敇代宗廟一人贈太尉汾陽忠武王郭子儀建中二年十一月敇德宗廟三人贈太師西平忠武王李晟贈太尉忠烈公假秀實並元和四年八月敇贈太師忠武公渾瑊元和四年九月四日敇憲宗廟四人贈司徒宣懿公杜黃裳贈太師裴度會昌六年十月敇贈司徒威武公髙崇文贈太尉李訴會昌六年十一月敇唐開元禮祫禘以功臣配享儀諸座各設版於座首其版文各具題官爵姓名每座各設壺樽二於左北向元酒在西加勺羃置爵於樽下設洗於終獻罍洗東南北向太廟令與良醖令以齊實樽如常堂上設饌訖太官令帥進饌者出奉饌入祝迎引於座左各設於座前太官令以下出祝還樽所初亞獻將軍贊引引獻官詣罍洗盥手洗爵詣酒樽所執樽者舉羃獻官酌酒諸助奠者皆酌酒訖贊引引獻官進詣首座前東面奠爵贊引引還夲位於獻官進奠諸助奠者各進奠於座還樽所於堂上徹豆祝進首座前徹豆還樽所順宗既葬議祧遷中宗廟有司疑曰五王有安社稷功若遷中宗則配享永絶判集賢院事蔣乂曰禘祫功臣乃合食太廟中宗廟雖毁而禘祫並陳太廟此則五王配食與初一也由是遷廟遂定後唐眀宗長興二年詔故昭義節度使李嗣昭故幽州節度使周德威故汴州節度使符存審配享莊宗廟庭宋真宗咸平二年詔以故太師贈尚書令追封韓王趙普配享太祖廟庭仍遣官奏告本室太常禮院言凖詔定配享功臣禘祫之日祀儀請令有司先事設幄次布褥位於廟庭東門內道南當所配室西向設位版方七寸厚一寸半籩豆各二簠簋俎各一知廟卿奠爵再拜詔可神宗元豐三年詳定郊廟奉祀禮文所言謹按書盤庚曰兹豫大享於先王爾祖其從與享之周禮司勳凡有功者祭於大蒸然則書之所謂大享即禮之所謂大蒸也蒸冬祭也謂之大者物成衆多之時其祭比三時為大也方是時百物皆報焉祭有功宜矣禮記祭統衛孔悝之鼎銘曰勤大命施於蒸彛鼎後世蒸祭不及功臣既不合禮而禘祫及之事不經見梁初誤禘功臣何佟之以謂夏物未成而禘功臣為非典禮唐韋挺亦云今禘祫以功臣配享而冬蒸不及與經不合蓋因仍之誤也伏請每遇冬蒸以功臣配享其禘祫配享罷之詔凡冬享禘祫及親祠功臣並配享髙宗紹興四年太常少卿江端友請眀堂前一日差官詣七祀功臣位行禮緣即今權於溫州真華宫奉安宗廟比在京事體不同欲依紹興元年眀堂更不排辦從之十八年監登聞鼓院徐璉言國家逺稽三代肇建原廟凡是佐命配享與夫當時輔弼勳勞之臣繪像於廟庭以示不忘崇德報功之意纍朝佐命配享功臣不過十餘人今之臣僚與其家之子孫必有存其繪像者望詔有司尋訪復摹於景靈宫庭之壁非獨假寵諸臣之子孫所以增重祖宗之德業以為臣子之勸禮部討論欲下諸路轉運司委所管州軍尋訪配享功臣之家韓王趙普周王曹彬太師薛居正石熙載鄭王潘美太師李沆王旦李繼隆王曾吕夷簡侍中曹瑋司徒韓琦太師曽公亮富弼司馬光韓忠彥各令摹寫貌像投納繪畫於景靈宮庭壁從之孝宗乾道五年太常少卿林栗等言孟冬祫享在近欽宗皇帝廟庭配享臣僚尚虛其位當時遭值艱難莫救淪胥臣僚罕可稱述而以身徇國名節暴著者不無其人雖生前官品不應配享之科然事變非常難拘定制栗意指李若水乞特詔侍從臺諌集議以聞從之右侍郎官曽逮言昔元祐中神宗未有配享朝廷依例權塑二侍臣吏部尚書汪應辰言欽宗所圖共政之臣皆未有能勝其任者若應故事姑令備數上非所以尊宗廟下非所以勸有功誠如太常所言當時死事之臣非一今欲令配享考究本末差次輕重有所取捨尤不可以輕易昔唐文宗武宗皆無配享功臣本朝太祖英宗既無御集亦不建閣蓋崇奉祖宗必審其實必當於理不虛尚文飾以茍塞人情而已既無可配享者乞更不集議從之光宗紹熙元年詔呂頤浩趙鼎韓世忠張俊並已配享髙宗皇帝廟庭繪像訖各許長房陳乞恩例一名中書門下省檢會元豐五年詔景靈宮繪像舊臣推恩本支下兩房以上取不食祿者均有無取齒長者若子孫亦繪像本房不食祿更不取别房應推恩人願與以次别房者聼元祐七年詔故相富弼配享神宗廟庭其子紹延特差江陵府通判仍與子孫一名恩澤崇寧二年詔哲宗皇帝神御殿繪像文武臣僚並與子若孫一人初品官故有是命宋配享功臣太祖太師贈尚書令韓王趙普樞密使贈中書令濟陽郡王曹彬太宗司空同中書門下平章事贈太尉中書令薛居正右僕射贈侍中石熙載忠武軍節度使同中書門下平章事贈中書令潘美真宗右僕射同中書門下平章事贈太尉中書令李沆太尉贈太師尚書令王旦忠武軍節度使同中書門下平章事中書令李繼隆仁宗左僕射贈尚書令王曽太尉贈尚書令呂夷簡彰武軍節度使贈侍中曹瑋英宗司徒兼侍中贈尚書令韓琦太傅兼侍中贈太師中書令曽公亮神宗寧武軍節度使守司徒開府儀同三司贈太師富弼紹聖元年詔以故觀文殿大學士集禧觀使守司空荆國公贈太傅王安石配享三年罷富弼配享髙宗建炎二年詔罷王安石仍以富弼配享哲宗左僕射贈太師溫國公司馬光徽宗崇寧元年詔以觀文殿大學士贈太師蔡確配享髙宗建炎元年詔蔡確罷配享以司馬光代之徽宗左光祿大夫尚書左僕射兼門下侍郎贈太師魏國公韓忠彥髙宗左僕射贈太師秦國公呂頤浩左僕射追復特進觀文殿學士趙鼎太傅鎮南武安寧國軍節度使贈太師蘄王韓世忠太師靜江寧武靖海軍節度使贈循王張俊孝宗左丞相贈太師魯國公陳康伯右丞相太師追封越王史浩光宗右丞相贈太師葛邲建炎以來朝野雜記祖宗故事大臣配享皆祔廟後議之若趙韓王曹秦王之配享太祖蓋真宗咸平時而韓魏王曽魯公之配享英宗皆其身薨日降制亦在祔廟十數年後永思陵復土翰林學士洪邁言聖神武文憲孝皇帝祔廟有期所有配食臣僚先期議定臣兩蒙宣諭欲用文武臣各兩人文臣故宰相贈太師秦國公諡忠穆吕頤浩特進觀文殿大學士諡忠簡趙鼎武臣太師蘄王諡忠武韓世忠太師魯王諡忠烈張浚此四人皆一時名將相合於天下公論望付侍臣詳議以聞議者皆以為宜遂從之祕書少監楊萬里獨謂張丞相浚不與配食為非宜爭之不能因補外去國焉孝宗既祔廟詔以故相陳康伯侑食寶文閣待制吳總上疏請以其父璘配享廟庭不報祀先代帝王賢士修陵墓附祭法夫聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社帝嚳能敘星辰以著衆堯能賞均刑法以義終舜勤衆事而野死鯀鄣鴻水而殛死禹能修鯀之功黃帝正名百物以眀民共財顓頊能修之契為司徒而民成冥勤其官而水死湯以寬治民而除其虐文王以文治武王以武功去民之災此皆有功烈於民者也厲山力世反左傳作烈山共音恭彰音章殛紀力反去起吕反嚳口毒反顓音専頊許玉反厲春秋傳曰封為上公祀為大神厲山氏炎帝也起於山或曰有烈山氏棄后稷名也共工氏無録而王謂之霸在太昊炎帝之間著衆謂使民興事知休作之期也賞賞善謂禪舜封禹稷等也能刑謂去四凶義終謂既禪二十八載乃死也野死謂征有苖死於蒼梧也殛死謂不能成其功也明民謂使之衣服有章也民成謂知五教之禮也冥契六世之孫也其官元冥水官也虐災謂桀紂也烈業也及疏曰法施於民則祀之者若神農及后土帝嚳與堯黃帝顓頊與契之屬是也以死勤事則祀之者若舜及鯀冥是也以勞定國則祀之者若禹是也能禦大災及能捍大患則祀之者若湯及文武是也其子曰農能殖百榖農謂厲山氏後世子孫名柱能殖百榖故國語云神農之名柱作農官因名農是也夏之衰也周棄繼之者以夏末湯遭大旱七年欲變置社稷故廢農祀棄故祀以為稷者謂農及棄皆祀之以配稷之神其子曰后土能平九州故祀以為社者是共工後世之子孫為后土之官后君也為君而掌土能治九州五土之神故祀以為配社之神鯀鄣洪水而殛死者鯀塞水無功而被堯殛死於羽山亦是有微功於人故得祀之若無微功烏能治水黃帝正名百物者土雖有百物而未有名黃帝為物作名正名其體也以明民者謂垂衣裳使貴賤分眀得其所也共財者謂山澤不鄣教民取百物以自贍也其如上事故得祀之顓頊能修之者謂能修黃帝之法契為司徒而民成者契為堯之司徒掌五教故民之五教得成冥勤其官而水死者冥契六世孫其官元冥水官也朱子語録問祭先賢先聖如何曰有功德在人人自當報之古人祀五人帝只是如此後世有箇新生底神道緣衆人心邪向他他便盛如狄仁傑只留泰伯伍子胥廟壞了許多廟其鬼亦不能為害緣是他見得無這物事了因舉上蔡云可者欲人致生之故其鬼神不可者欲人致死之故其鬼不神秦始皇三十七年出遊十一月至雲夢望祀虞舜於九疑山上會稽祭大禹漢髙祖二年或言周興而邑立后稷之祠至今血食天下於是髙祖制詔天下立靈星祠常以嵗時祠以牛注云后稷祠而謂之靈星者以稷配靈星漢舊儀五年修復周家舊祀祀稷於東南常以八月祭以太牢舞者七十二人冠者五六三十人童子六七四十二人為民祈榖報功武帝時有人言古者天子以春解祠祠黃帝用一梟破鏡張晏曰黃帝五帝之首也春嵗之始也梟惡逆之鳥方士云以嵗始祓除凶災令神仙之帝食惡逆之物梟食母黃帝欲絶其類使百司皆用焉漢使東郡送梟食以二月初五日作羮以賜百官所謂解祠者謂解罪求福也明帝永平二年遣使者以中牢祠蕭何霍光帝謁陵園過式其墓章帝元和春東巡狩使使者奉一太牢祠帝堯於濟隂後主景曜六年詔為丞相諸葛亮立廟於沔陽先時所在各請為亮立廟不許百姓遂私祭之或以為可立於京師禪不納步兵校尉習崇中書侍郎向充等言於禪曰自漢以來小德而圖形立廟者多矣况亮德範遐邇勳蓋季世而蒸嘗止於私門廟貌闕而莫立非所以存德念功逺追在昔也今若盡從人則黷而無典建之京師又逼宗廟宜因近其墓立之沔陽使所屬以時賜祭凡其臣故欲奉祠者皆限至廟斷其私祀從之何承天曰周禮凡有功者祭於大蒸故後代遵之元勳配享充等曽不是式禪又從之蓋非禮也東晉孝武帝寧康三年七月故事禮臯陶於廷尉寺新禮移祀於律署以同祭先聖於太學舊祀以社日新改用孟秋以應秋政虞摰按虞書臯陶作士惟明克允國重其功人思其當是以獄官禮其神繫者致其祭功在斷獄之成不在律令之始也太學之祠義重太常故祭於太學律之署卑於廷尉故祀於署是去重而就輕律非正署興廢無常宜如舊祀於廷尉祭用仲春義取重生改用孟秋以應刑殺理未足以相易宜定祭禮皆如舊制後魏文成帝東巡歷嶠山祀黃帝孝文太和十六年詔曰法施於人祀有明典立功垂惠祭有常式其孟春應祀者頃以事殷遂及今日可令以仲月而享祀焉凡在祀令者有五帝堯樹則天之功興巍巍之治可祀於平陽虞舜播太平之風致無為之化可祀於廣寧夏禹禦洪水之災建天下之利可祀於安邑周文公制禮作樂垂範萬葉可祀於洛陽其宣尼廟已於中書别敇有司行事自文公以上可令當界牧守各隨所近攝行祀事皆用清酌尹祭也典禮曰脯曰尹祭隋制使祀先代王公帝堯於平陽以契配帝舜於河東咎繇配夏禹於安邑伯益配商湯於汾隂伊尹配文王武王於酆渭之郊周公召公配漢帝於長陵蕭何配各以一太牢而無樂配者享於廟庭唐髙宗顯慶二年太尉長孫無忌議祭法堯舜禹湯文武皆有功烈於人及日月星辰人所瞻仰非此族也不在祀典準此帝王合與日月同例常加祭享義在報功爰及隋代並遵斯典其漢高祖祭法無文但以前代迄今多行秦漢故事始皇無道所以棄之漢髙祖典章法垂於後自隋已上亦在祠例大唐稽古垂化網羅前典唯此一禮咸秩中申令新禮及今無祭先代帝王之文今請聿遵故實修祔禮令三年一祭仍以仲春之月祭唐堯於平陽以契配祭虞舜於河東以咎繇配祭夏禹於安邑以伯益配祭殷湯於偃師以伊尹配祭周文王於酆以太公配祭武王於鎬以周公召公配祭漢祖於長陵以蕭何配麟德二年車駕將封岱嶽至滎陽頓祭紀信墓贈驃騎大將軍元宗開元二十一年詔自古聖帝眀王嶽瀆海鎮用牲牢餘並以酒脯充奠祀其年雲州置魏孝文帝祠堂有司以時享祭州有魏故明堂遺迹乃於其上置廟焉天寶二年追尊咎繇為德眀皇帝涼武昭王為興聖皇帝各與立廟每嵗四孟月享祭寶應時禮儀使杜鴻漸請停四時獻享六載敇三皇五帝創物垂範永言龜鏡宜有欽崇三皇伏羲以句芒配神農以祝融配黃帝以風后力牧配五帝少昊以蓐收配顓頊以元冥配髙辛以稷契配唐堯以羲仲和叔配虞舜以夔龍配其擇日及置廟地量事營立其樂器請用宫懸祭請用少牢仍以春秋二時致享共置令丞太常寺檢校七載詔上古之君存諸氏號雖事先書契而道著皇王緬懷厥功寧忘咸秩其三皇已前帝王宜於京城內共置一廟仍與三皇五帝廟相近以時致祭天皇氏地皇氏人皇氏有巢氏燧人氏其祭料及樂請準三皇五帝廟以春秋二時享祭歷代帝王肇基之處未有祠宇者所由郡置一廟享祭仍取當時將相德業可稱者二人配享夏王禹都安邑今夏縣以虞伯益秩宗伯夷配殷王湯都亳今榖熟縣以阿衡伊尹左相仲虺配周文王都酆今咸陽縣先有廟以師鬻熊齊太公望配周武王都鎬請入文王廟同享太師周公太保召公配秦始皇都咸陽丞相李斯將軍王翦配漢髙祖起沛今彭城縣太傅張良相國蕭何配後漢光武皇帝起南陽司徒鄧禹將軍耿弇配魏武皇帝都鄴侍中荀彧太尉鍾繇配晉武帝都故洛陽司空張華大將軍羊祜配後魏道武皇帝起雲中太尉長孫嵩尚書崔元伯配周文帝起馮翊尚書蘇綽將軍于謹配隋文帝封隋漢東僕射髙熲大將軍賀若弼配令郡縣長官春秋二時擇日粢盛蔬饌時果酒脯潔誠致祭其忠臣義士孝婦烈女史籍所載德行彌髙者所在宜置祠宇量事致祭殷相傅説汲郡殷太師箕子汲郡宋公微子睢陽郡殷少師比干汲郡齊相管夷吾濟南郡齊相晏平仲濟南郡晉卿羊舌叔向綘郡魯卿季孫行父魯郡鄭卿東里子産滎陽郡燕上將軍樂毅上谷郡趙卿藺相如趙郡楚三閭大夫屈原長沙郡漢大將軍霍光平陽郡漢太傅蕭望之萬年縣漢丞相丙吉魯郡蜀丞相諸葛亮南陽郡已上忠臣一十六人周太王子吳太伯吳郡伯夷叔齊並河東郡吳延陵季札丹陽郡魏將假干木陕郡齊髙士魯仲連濟南郡楚大夫申包胥富水郡漢將軍紀信滎陽郡已上義士八人周太王妃太薑新平郡周王季妃大任扶風郡周文王妃太姒長安縣配享文王廟魯大夫妻敬薑魯郡鄒孟軻母魯郡陳宣孝婦睢陽郡曹世叔妻大家扶風縣已上孝婦七人周宣王齊陵長沙郡衛太子恭薑汲郡楚莊樊姬富水郡楚昭正女富水郡宋恭伯姬睢陽郡梁宣髙行陳留郡齊把梁妻濟南郡趙將趙括母趙郡漢元帝馮昭儀咸陽郡漢成帝班媫妤扶風郡漢太傅王陵母彭城郡漢御史大夫張湯母萬年縣漢河南尹嚴延年母東海郡漢淳于緹縈濟南郡已上烈女一十四人右並令郡縣長官春秋二時擇日準前致祭其歷代帝王廟每所差側近人不課户四人有闕續填仍關户部處分至十二嵗七月二十八日有敇廢九載十一月十六日周武王漢髙祖於京城內同置一廟并置官吏代宗大歷五年鄜坊節度使上言坊州軒轅皇帝陵同請置廟四時列於祀典從之永泰二年詔道州舜廟宜蠲近廟佃户充掃除從刺史元結請憲宗元和十四年勑周文王武王祠宇在咸陽縣宜令有司精加修飾昭宗天祐二年封楚三閭大夫屈原為昭靈侯舜帝二妃祠為懿節祠唐開元禮有司享先代帝王儀前享五日諸享官各散齋三日於正寢致齋二日於其廟所如别儀無廟者祭於壇其壇制準州社壇其祭官以當州長官亦無以次通取也諸享官致齋之日給酒食及眀衣各習禮於齋所前享一日所管縣官清掃內外整拂神座無廟者享日未明縣官率其屬入請壇東陛仗設神座於壇上近北南向席以管以後陳設行事體在廟之位設配座於神座東南西向席以管又為瘞坎於廟後壬地方深取足容物贊禮者設初獻位於東階東南亞獻終獻於初獻之南少退俱西向北上設掌事者位於終獻東南重行西面以北為上設贊唱者於終獻西南西向北上設望瘞位於廟堂東北西向又設贊唱者位於瘞坎東北南向東上設享官以下位於南門之外道東重行西面以北為上無廟者即設享官以下位於壇壝門之外道南重行北面西上祭器之數每座樽六籩十豆十簋二簠二鈃三爼三縣官帥其屬升設樽於廟堂上前楹間室户之外北向正座之樽在西配座之樽在東樽皆加勺羃有坫以置爵設幣篚於樽所設洗於東階東南北向東西當中霤南北以堂深罍水在洗東篚在洗西南肆實爵三巾二在篚加勺羃執樽罍洗篚者各依於樽罍洗篚之後享日未眀亨牲於厨夙興掌饌者實祭器牲體牛羊豕皆載右胖前腳三節節一假皆載之後腳三節節一假去上節載下二節又取正脊脡脊橫脊正脅代脅各二骨以並餘皆不設簋實黍稷簠實稻梁籩十實石鹽乾魚棗栗榛菱芡鹿脯白餅黑餅豆十實韭葅醢醓醢菁葅鹿醢芹葅兔醢笋葅魚醢脾菜葅豚胉若土無者各以其類充之諸享官以下各服祭服三品毳冕四品繡冕五品元冕六品以下爵辨縣官帥其屬入實樽罍及幣每坐之樽一實醴齊一實盎齊一實清酒各實於上樽幣用帛長丈八尺色用白也祝版各置於坫贊唱者先入就位祝與執罍樽篚者入立於庭重行北面以西為上立定贊唱者曰再拜祝以下俱再拜執樽者升東階壇則升自東陛以後準此立於樽所執樽罍篚者各就位升自東階行掃除於上降掃除於下訖各引就位質眀贊禮者引享官以下俱就門外位少頃贊禮者引享官以下以次位立定贊唱者曰再拜在位者皆再拜贊禮者進初獻之左白有司謹具請行事退復位祝跪取幣於篚各立於樽所掌饌者帥