body:
  text: 文獻通考卷三十五鄱陽馬端貴與著選舉考八童科小學附漢興蕭何草律曰太史試學童能諷書九千字以上乃得為史又以六體試之課最者以為尚書御史史書令史吏民上書字或不正輒舉劾後漢左雄奏召海內名儒為博士使公卿子弟為諸生有志操者加其俸祿及汝南謝亷河南趙建章年始十二各能通經雄並奏補童子郎漢法孝亷試經者拜為郎年幼才俊者拜童子郎黃琬以公孫為童子郎臧洪年十五以父功拜童子郎知名太學任延年十二為諸生顯名太學中號為任聖童張堪年十六受業長安志美行厲諸儒號曰聖童杜安年十三入太學號竒童黃香年十二博學經典京師號曰天下無雙江夏黃童司馬朗十二試經為童子郎監試者以其身體壯大疑朗匿年劾問朗曰朗之內外纍世長大朗雖稚弱無仰髙之風損年以求早成非志所為也監試者異之唐有童子科凡十歲以下能通一經及孝經論語每卷誦文十通者豫官通七者與出身廣德二年停童子歲貢大歷三年又復之仍每歲令本貫申送禮部同明經舉人之例考試訖奏聞十年再停之開成三年敕諸道應薦萬言及童子朝廷設科取士門目至多有官者合詣吏曹未試者即歸禮部文詞學藝各盡其長此外更有招延則為冗長起今以後不得更有聞薦俾由正路冀絶幸門雖有是命而以童子為薦者比比有之後唐莊宗同光三年禮部貢院奏今後童子委本州府依諸色舉人例考試經解選省任稱鄉貢童子長吏不能表薦若無本處解送本司不在考試之限天成三年敕近年諸道解童子皆越常規或年齒漸高或神情非俊或道字頗多訛舛或念書不合格文積成乖敝此後應州府不考藝能濫發文解其逐處判官責罰仍下貢院將解到童子精加考較須是年顔不高念書合格道字分明即放及第長興元年敕童子凖往例委諸道表薦不得解送每年所放不得過十人仍所念書並須是正經不得以諸子書虛成卷數及第後十一選集初任未得授親民官周太祖廣順三年戶部侍郎權知貢舉趙上交奏童子元念書二十四道今欲添念書通前五十道念及三十道者放及第從之宋真宗景德二年撫州進士晏殊年十四太名府進士薑蓋年十二並長吏以聞至是亦召試殊詩賦各一篇蓋詩六章賜殊進士出身蓋同學究出身後旨復召殊試詩賦論嘉其敏贍擢授祕書省正字王氏揮麈録曰真宗實録召試神童蔡伯俙授官之後寂無所傳明清因於故書中得其奏狀一紙云伏念臣先於大中祥符八年真宗皇帝遣內臣毛昌達宣召賜對試誦真宗皇帝御製歌詩即日蒙恩釋褐授守祕書省正字臣遭遇之年方始三歲及賜臣御詩云七閩山水多才俊三歲竒童出盛時續蒙宣赴東宮侍仁宗皇帝讀書朝夕親近頗歷歲年其後臣年一十七嵗以家貧陳乞差遣仁宗皇帝聖念矜憐特依所乞仍有旨餘人不得援例自兹纍歷任使今來本任至來年二月當滿重念臣生事蕭條纍族重大又無得力兒男可以供侍一日捨祿無以為生幸遇皇帝陛下至仁至治無一物失所其於老者惠恤尤深臣以祥符八年三歲甲子庚申即未至衰老欲望聖慈特賜許臣再任管勾江州太平觀一任覬仍廩稍得養單貧蓋元豐初計其年尚未七十司農少卿今之朝議大夫也碌碌無所聞豈非聰明不及於前時邪朱興仲續歸田録云伯俙字景蕃與晏元獻俱五六歲以神童侍仁宗於東宮元獻自幼梗介蔡最柔媚每太子過門闌高者蔡伏地令太子履其背而登既踐䟭元獻被知遇至宰相蔡竟不大用以舊恩常領郡頗不循法令或被劾取旨上識其姓名必曰藩邸舊臣且令轉官凡更四朝元符初致仕已八十歲矣監司薦之乞落致仕與宮祠其辭略云蔡伯俙年八十歲食祿七十五年余謂人生名位固可得罕得綿長如此者按史言晏殊以景德二年召試年十四仁宗以大中祥符三年生則仁宗有生之年殊年已十九今謂殊與蔡伯俙俱以五六歲為神童侍仁宗於東宮誤矣仁宗即位以童子賜出身者凡十人寶元元年以為無補而罷之神宗元豐時置在京小學有就傅初筮兩齋徽宗政和四年小學生近千人尚有繼至者分十齋處之增教諭俸不許受束修自八歲至十二歲率以誦經書字多少差次補內舍上舍若能文從博士試本經小經義各一道稍通補內舍優補上舍後曹芬以文優賜同上舍出身崇寧五年參在京小學規約頒之州縣小學州隸教授縣隸學長其小學生皆自備餐錢附食至宣和罷其法童子科元豐以後賜出身者五人元祐時詔禮部自今請試童子誦書毋收接大觀後復其科賜補官者五人髙宗建炎二年初試童子祖宗朝皆天子親試其命官免舉皆臨時取旨無常格也孝宗淳熙八年始詔分為三等凡全誦六經孝經語孟及能文如大經義三道語孟義各一道或賦及詩各一首為上等與推恩誦書外能誦一經為中等免文解兩次止能誦六經語孟為下等免文解一次覆試不合格與賜帛寧宗嘉定十四年詔自今歲取三人期以季春集闕下先試於國子監而中書覆試為定制焉高宗一朝童子求試者三十有六人授官者五人萬頃彭興宗張揉朱虎臣劉轂永免文解者一人晏章免文解者一人紹興三年林佐國始賜帛罷遣者九人紹興三年四月兄弟童子三人饒州江安國定國戴松戴滋又張嵒叟嵒卿未知何許人惟朱虎臣者能排陳步射及誦七書故補承信郎劉轂以小校子五歲善騎射故補校尉虎臣浮梁人既召見又特賜金帶以寵異之此亦前所未有孝宗一朝童子求試者七十四人而命官者七人有呂嗣興者衢州人也四歲能誦書切韻變四聲畫八卦上召見面俾吟詩遂授右從政郎賜錢三百緡令伴皇孫榮國公讀誦乾道八年春也又有臨川王克勤尤為警敏初命右從事郎廬陵李如圭三山林公洽何擢並右迪功郎三山何致逺將仕郎廬陵郭洵直下州文學光宗一朝童子求試者十七人無補官者惟從事郎吳剛年九歲能誦六經語孟以壽聖親姪孫特改承務郎仍依初補法壬子四月也晏元獻初以童子召試遂賜出身令祕閣讀書久之即以為正字乾道末上踵故事以臨川王克勤敏叔為祕書省讀書制祿視正字之半淳熙初上幸祕閣館職皆遷官選人改京秩有司言克勤於上詔以為文林郎久之臺官有言其過者遂除初等職官後復以鎖廳中第為太學博士自後未有繼者自置童子科以來未有女童應試者自淳熙元年夏女童林幼玉求試中書後省挑試所誦經書四十三件並通詔特封孺人吏道西漢時以試吏入官路溫舒縣獄吏衛青縣吏給事侯家公孫𢎞獄吏張湯長安吏杜周廷尉史王欣郡縣吏陳萬年郡吏于定國獄吏龔勝郡吏丙吉魯獄吏趙廣漢郡吏尹翁歸獄小吏張敞鄉有秩補太守卒史王尊獄小吏孫寶郡吏何並郡吏薛宣都船獄吏朱博亭長遷功曹朱邑嗇夫遷卒史趙禹佐史王溫舒亭長遷廷尉史尹齊以刀筆吏遷御史減宣佐史嚴延年郡吏尹賞郡吏樓護京兆吏王吉郡吏鮑宣嗇夫補束州丞焦延壽郡吏察舉補小黃令公非劉氏送焦千之序曰東西漢之時賢士長者未嘗不仕郡縣也自曹掾書史馭吏亭長門幹街卒遊徼嗇夫盡儒生學士為之才試於事情見於物則賢不肖較然故遭事不惑則知其智犯難不避則知其節臨財不私則知其亷應對不疑則知其辨如此則察舉易而賢公卿大夫自此出矣今時士與吏徒異物吏徒治文書給厮役戇愚無知奊詬無節乘間窺隙詭法求貸笞罵僇辱安以為己物故無可以興善者而儒生學士之居於鄉里不過閉門養高其外則遊學四方以崇名譽然後可以出羣過人矣而欲法前世一使郡縣議其行而察舉之難矣今按西都公卿士大夫或出於文學或出於吏道亦由上之人並開二途以取人未嘗自為抑揚偏有輕重故下之人亦隨其所遇以為進身之階而人品之賢不肖初不係其出身之或為儒或為吏也是以張湯趙周輩之深文巧詆趙廣漢何並之強明健決固胥吏氣習也若公孫𢎞之儒雅丙吉之賢厚龔勝之節操尹翁歸之介潔亦不嫌於以吏發身則所謂吏者豈必皆浮薄刻核之流而後始能為之乎後世儒與吏判為二途儒自許以雅而詆吏為俗於是以剸繁治劇者為不足以語道吏自許以通而誚儒為迂於是以通經博古為不足以適時而上之人又不能立兼收並蓄之法過有抑揚輕重之意於是拘謭不通者一歸之儒放蕩無恥者一歸之吏而二途皆不足以得人矣和帝永元十四年初復郡國上計補郎官漢制郡國歲盡遣上計掾史條上郡內衆事謂之計簿東都上計吏多留補郎官中間嘗罷今復之桓帝時郡國計吏多留拜為郎太尉楊秉等上言三署見郎七百餘人帑藏空虛浮食者衆而不良守相欲因國為池澆濯釁穢宜絶橫拜以塞覬覦之端自此終桓帝世計吏無留拜者趙一舉郡上計到京師司徒袁逢受計計吏數百人皆拜伏廷中莫敢仰視一獨長揖而已逢異之讓曰下郡計吏而揖三公何也對曰酈食其長揖漢王今揖三公何遽怪哉逢斂衽下堂執其手延置上坐坐者皆屬觀一造河南尹羊陟陟初不見後延與語大竒之西還謁𢎞農太守皇甫規門者不即通一遁去規聞大驚以書謝曰今旦白有一尉兩計吏不道屈尊門下言只以為計吏不知是一也更啓乃知已去如印綬可投夜豈待旦按以趙一之文才儒雅而失身計吏以取傲忽如此非深相知者蓋不知其為一也徐氏曰東京入仕之途雖不一然由儒科而進者其選亦艱故才智之士多由郡吏而入仕以胡廣之賢而不免為郡散吏袁安世傳易學而不免為縣功曹應奉讀書五行並下而為郡決曹史王充之始進也刺史辟為從事徐稚之初筮也太守請補功曹蓋當時仕進之路有如此者初不以為屈也主事二漢有之漢光祿勳有南北庭主事主三署之事於諸郎之中察茂材者為之後漢范滂自光祿四行遷光祿主事時陳蕃為光祿勳滂執公儀詣蕃蕃亦不止滂懷恨投版棄官而去郭泰聞之曰若范孟博者豈宜以公禮隔之蕃乃謝之又胡伯蕃公沙穆並為之令史漢官也後漢尚書令史十八人曹有三人主書後增劇曹三人合二十一人皆選於蘭臺符節精練有吏能者為之漢官儀云能通蒼頡史籕篇補蘭臺令史滿歲補尚書令史滿歲為尚書郎後漢韋彪上疏曰往時楚獄大起故置令史以助郎職而類多小人好為姦利今者務簡可皆停省其尚書郎初與令史皆主文簿其職一也即缺以令史久次者補之光武始革用孝亷孝亷恥焉丁邯以孝亷為郎稱病不就光武詔問實病乎羞為郎乎對曰臣實不病恥以孝亷為令史職耳帝怒杖之數十詔問欲為郎否邯曰能殺臣者陛下不能為郎者臣也中詔遣出終不能為郎又郎中袁著詣闕上書訟梁冀驕暴冀隂殺之學生劉常為名儒素善著冀召常補令史以辱之舊制尚書郎限滿補縣長令史補丞尉尚書令鄭𢎞奏曰職尊賞薄多無樂者請郎補千石令史為長帝從之蜀志董厥為府令史諸葛亮稱之曰董令史良士也後遷至尚書令史平臺事按成周之制元士以上命官也府史胥徒庶人之在官者也然下士與庶人在官者同祿則未嘗曰官綦貴而吏綦賤也後世為胥吏者作姦犯科不自愛重放縱於義理之外故為世所輕而儒者尤恥與為伍秦棄儒崇吏西都因之蕭曹以刀筆吏佐命為元勳故終西都之世公卿多出胥史而儒雅賢厚之人亦多借徑於吏以發身其時儒與吏未甚分别故以博士弟子之明經者補太守卒史而不以為恧元成以來至東漢之初流品漸分儒漸鄙吏故以孝亷補尚書郎令史而深以為恥蓋亦習俗使然然胡廣袁安之進身者亦由郡吏而丁邯則決不肯為尚書令史何也蓋東都亦未嘗廢試吏入仕之塗故方其未遇而浮沉里巷無所知名也則雖郡吏亦屑為之及其既以孝亷異科薦舉徴召則未免自負清流雖尚書機要之地亦恥其為郎令史矣然考晉書百官志魏青龍二年尚書陳矯奏置都官騎兵合凡二十五郎每一郎缺白試諸孝亷能結文案者五人謹封奏其姓名以補之然則丁邯雖誓死不為而自光武立法之後孝亷之為郎者遂為久例歟都事晉有尚書都令史八人秩二百石與左右丞總知都臺事宋齊八人梁五人謂之五都令史職與晉同舊用人常輕武帝詔曰尚書五都職參政要非但總領衆局亦乃方軌二丞頃須求才未臻妙簡可革用士流以盡時彥乃以都令史視奉朝請其時以太學博士劉訥兼殿中都司空法曹參軍劉顯兼吏部都太學博士孔虔孫兼金部都司空法曹參軍蕭軌兼左民都宣毅墨曹參軍王顒兼中兵都五人並以才地兼美歷兹選隋開皇初改都令史為都事置八人煬帝分𨽻六尚書六人領六曹事唐因之主事後魏於尚書諸司置主事令史隋於諸省又各置主事令史員煬帝三年並去令史之名但曰主事隨曹間劇而每十令史置一主事不滿十者亦一人雜用士人唐並用流外右歷代都事主事皆吏長之名也西晉令史朝晡詣都座朝江左唯早朝而已賈充為尚書令以目疾表置省事吏四人尚書置省事自此始也其品職與諸曹令史同劉卞入太學試經為臺四品吏訪問令寫黃紙一鹿車卞曰劉卞非為人寫黃紙者也訪問知怒退為尚書令史曰姚萇執苻堅遣僕射尹緯詣堅問事堅見其瓌傑問卿於朕世何官緯答曰尚書令史堅曰卿宰相材王景略之儔而朕不知宜其亡也晉宋蘭臺寺正書令史雖行文書皆有品秩朱衣執版孔顗為御史中丞坐鞭令史為有司所糾梁陳與晉宋同後魏令史亦朱衣執笏然謂之流外勳品北齊尚書郎判事正令史側坐書令史過事令史皆平揖郎無拜自隋以來令史之任文案煩屑漸為卑冗不參官品開皇十五年詔州縣佐史三年一代不得重任煬帝以四省三臺皆曰令史九寺五監諸府衛皆曰府史於時令史得官甚少年限亦賒牛𢎞嘗問於劉炫曰按周禮士多而府史少今令史百倍於前減則不濟何也炫曰古人委任責成歲終考其殿最案不重較文不煩悉府史之任掌要目而已今之文簿嘗慮覆理煆鍊辛苦甚密萬里追證百年舊案故諺曰老吏抱案死今古不同若此之逺也𢎞又曰後魏北齊之時令史從容而已今則不遑寧舍其何由炫曰齊氏立州不過十二州行臺遞相統領文書行下不過十條今州二百其繁一也往者州唯置綱紀郡置守丞縣唯令而已其所具僚則長官自辟受詔赴任每州不過數十今則不然大小之官悉由吏部纎介之迹皆屬考功其繁二也省官不如省事省事不如清心官不省而欲從容其可得乎𢎞甚善其言而不能用唐武德初天下初定京師糴貴逺人不願仕流外始於諸州調佐史及朝集典充選不獲已而為之遂促年限優以敘次六七年有至本司主事及上縣尉者自此之後遂為宦途總章初詔諸司令史考滿者限試一經時人嗟異著於謠頌是歲京師飢旱𢎞文崇賢司成三館學士並放歸本貫又閻立本薑恪為相立本善畫恪有邊功當時為之語曰左相宣威沙漠右相馳譽丹青三館學士放散五臺令史明經張元素少為刑部令史太宗嘗對朝臣問之曰卿在隋何官對曰縣尉又問未為縣尉時曰流外又問何曹元素辱之出閣殆不能步色如死灰褚遂良上疏以為君能禮其臣乃能盡其力元素雖寒微陛下重其材擢至三品豈可復對羣臣窮其門戶棄宿昔之恩使之鬱結於懷何以責其仗節死義乎上曰朕亦悔之孫伏伽與元素在隋皆為令史伏伽於廣坐自陳往事一無所隱高宗永徽時吏部侍郎劉祥道上言三省都事主事主書比選補皆取流外有刀筆者雖欲參用士流率以儔類為恥前後相沿遂成故事且掖省崇峻王言祕密尚書政本人物所歸專責曹史理有未盡宜稍革之以清其選元宗開元十七年國子祭酒楊瑒上言省司奏限天下明經進士及第每年不過百人竊見流外出身每歲二千餘人而明經進士不能居其什一則是服勤道業之士不如胥吏之得仕也若以出身人太多則應諸色裁損不應獨抑明經進士也按張元素事太宗深以流外為恥彼創業之時依乘風雲致位將相其發身微賤蓋有甚於流外者矣不必恥也然至明皇時承平已久正當分别流品汰除冗濫以清仕途而流外出身歲不下二千人蓋唐進士科取人頗少士欲求用而有所限制則捷出他徑處汙穢而不羞矣劉晏為度支使常以為辦集衆務在於得人故必擇通敏精悍亷勤之士而用之至於勾檢簿書出納錢榖事雖至細必委之士類吏惟書符牒不得輕出一言常言士陷贓賄則淪棄於時名重於利故士多清修吏雖亷潔終無顯榮利重於名故吏多貪汚鄭餘慶為同中書門下平章事時主書滑渙與宦人劉光琦相倚為姦每宰相議為光琦沮變者令渙往請必得由是四方資餉奔委之弟泳至官刺史杜佑鄭絪政頗姑息而佑常行輩待不名也至餘慶議事渙傲然指畫諸宰相前餘慶叱去後渙以贓敗憲宗聞而善之唐法置公廨本錢與諸司令史主之號捉錢令史歲滿授官見資選門凡流外兵部禮部舉人郎官得自主之謂之小選後唐明宗天成四年中書奏吏部流外銓諸色選人試判兩節並以優劣等第申奏文優者宜超一資注擬次者依資又其次者與同類官中比擬仍準元敇業文者任徴引今古不業文者但據公理判斷可否不當罪在有司宋太祖皇帝開寶五年詔流外選人經十考入令録者引對方得注擬驅使散從官伎術人資考雖多亦不注擬上親閲諸司流外人勒歸農者四百人六年上知堂後官擅權多為姦贓欲更用士人命選令録簿尉充之而有司所選終不及數乃召舊任者四人面加戒勵令復故太宗端拱元年詔河南府法曹參軍梁正辭楚邱縣主簿喬蔚等五人為作監丞充中書堂後官堂吏拔選人授京官為之自此始也二年上親試舉人有中書守當官陳貽慶舉周易學究及第上知之令追奪所受敇牒釋其罪勒歸本局因謂侍臣曰科級之設待士流也豈容走吏冒進竊取科名乃詔自今中書樞密宣徽學士院京百司諸州係職人吏不得離局應舉至道元年以堂後官欒崇吉為度支副使崇吉提點中書五房公事明習文法清白勤事故上越次而用之即召堂後官著作郎楊文質為祕書丞代掌五房事謂之曰汝見擢用欒崇吉否當自勉勵也雍熙時以堂後官充職事官仍詔除入謝外不赴朝參見宰相禮同胥吏尋又詔流外出身曾坐真徒歷四任不入令録真宗咸平元年詔吏部銓凡注諸縣令佐勿得全用流外流外補選之例五省御史臺九寺三監金吾司四方館職掌每嵗遣近臣與判銓曹就尚書省同試律三道中者補正名理勞考後以就試人多懷挾傳授乃有鎖院巡搜糊名之法試百司吏人問律及疏所對合格復口誦之以防懷挾傳授之弊然其自敘勞績臣僚為之陳請特免口誦謂之優試得優試者率中選後因言者遂復減吏部考試百司人歲以二十人為額毋得僥幸求優試神宗熙寧三年詔中書置檢正五房公事官一員每房各置檢正公事二員並以士人升朝官充石林葉氏曰樞密都承旨與副承旨祖宗皆用士人比僚屬事參謀議真宗後天下無事稍稍遂皆用吏人歐公建言請復舊制而不克行熙寧初始用李評為都承旨評初受命文潞公為樞密使以舊例見之不為禮評訴於神宗上命史官檢詳故事以久無士人為之檢不獲乃詔如閣門使見樞密之禮按檢正都承後來皆從官為之今觀此則知祖宗立法之初或命胥吏或命士人固無定例也既胥吏所嘗為之官則宰相所以待之者宜其禮貌少殺於士大夫然考之國史檢正之初立也鄧綰實為之鄧以上書阿附新法進身有笑罵從他笑罵好官須我為之之語則豈以充檢正為恧者哉知徐州蘇軾上言昔者以詩賦取士今陛下以經術用人名雖不同然皆以文詞進耳考其所得多吳楚閩蜀之人至於京東西河北河東陜西五路蓋自古豪傑之場其人沈鷙勇悍可任以事然欲使治聲律讀經義以與吳楚閩蜀之士爭得失於毫釐之間則彼有不仕而已故其得人常少夫惟忠孝禮義之士雖不得志不失為君子若德不足而才有餘者困於無門則無所不至矣故臣願陛下特為五路之士别開仕進之門漢法郡縣秀民推擇為吏考行察亷以次遷補或至二千石入為公卿古者不專以文詞取人故得士為多黃霸起於卒史薛宣奮於書佐朱邑選於嗇夫丙吉出於獄吏其餘名臣循吏由此而進者不可勝數唐自中葉以後方鎮皆選列校以掌牙兵是時四方豪傑不能以科舉自達者皆爭為之往往積功以取旄鉞雖老姦巨盜或出其中而名卿賢將如高仙芝封常清李光弼來瑱李抱玉段秀實之流所得亦已多矣王者之用人如江河江河所趨百川赴焉蛟龍生之及其去而之他則魚鱉無所還其體而鯢鰍為之制今世胥史牙校皆奴僕庸人者無他以陛下不用也今欲用胥史牙校而胥史行文書治刑獄錢榖其勢不可廢鞭撻鞭撻一行則豪傑不出於其間故凡士之刑者不可用用者不可刑故臣願陛下採唐之舊使五路監司郡守共選士人以補牙職皆取人材心力有足過人而不能從事於科舉者祿之以今之庸錢而課之鎮稅場務督捕盜賊之類自公罪杖以下聽贖依將校法使長吏得薦其才者第其功閲書其歲月使得出仕比任子而不以流外限其所至朝廷察其異者擢用數人則豪傑英偉之士漸出於此塗而姦猾之黨可得而籠取也按祖宗時吏可出仕為官而外官又可以入為省吏嘗觀歐陽公集外制有堂後官李元方可大理寺丞審官院令史馬登可遂州司戶前杭州司理參軍范袞可衛尉寺丞充堂後官等制皆在昭陵之時蓋不特藝祖太宗朝為然也今坡公復拳拳欲立吏人出官之法蓋祖宗時省院要路之吏可以年勞出官而州縣小吏則未有入仕之法此五路人士既拙於文詞多不能以科目發身則立試吏之途以收拾之亦良法也哲宗元祐元年監察御史上官均言百司胥史大率積纍及二十餘年方得出官惟三省吏為最優幸凡干點檢諸司文書率隨其司酬奬減年出官最速其未願出官者坐理資任至為郡守宜加裁抑使毋過厚則雜流可以少損先時中書堂後官提點五房官雖未至員外郎奏補聽如舊制至崇觀時蔡京優待堂吏往往至中奉大夫或換防禦使觀察使由此任子百倍以前朝野雜記曰堂後官者三省諸房都録事也補職及一年改宣教郎五年願出職者與通判十年以上豫郡建炎初李伯紀為相建諸堂吏出職止通判從之迄今不改又曰凡吏職年滿依法補授將仕郎後有恩賞者許循修職郎用考第開升至從政郎止其不因年勞非泛補授者未得注擬具元補因依奏裁資選進納漢文帝從鼂錯之言令民入粟邊六百石爵上造第二等稍增至四千石為五大夫第九等萬二千石為大庶長第十八等各以多少級數為差景帝二年詔曰人不患其不知患其為詐也不患其不勇患其為暴也不患其不富患其無厭也其唯亷士寡欲易足令資算十以上乃得官服虔曰訾萬錢算百二十七也應劭曰古者疾吏之貪衣食足知榮辱限訾十算乃得為吏十算十萬也賈人有財不得為吏亷士無訾又不得官故減訾四算得官矣訾與資同亷士算不必衆有市籍不得官無訾又不得官朕甚愍之訾算四得官亡令亷士久失職貪夫長利按漢初限訾富者乃得官蓋恐其家貧而為吏則必貪故也然致富者多賈人而賈人又不得為吏有市籍即賈人也然則訾不及算與及算而為賈人者皆不可以為官則所限者衆矣故景帝詔減作訾算四乃得官云景帝時上郡以西旱復修賣爵令而裁其價以招人裁謂減省及徒復作得輸粟於縣官以除罪武帝時董仲舒對䇿言選郎吏又以富資未必賢也武帝即位干戈日滋財賂衰耗而不贍入物者補官出貨者除罪選舉陵遲亷恥相冒興利之臣自此始也其後府庫益虛乃募民能入奴婢得以終身復為郎增秩及入羊為郎始於此元朔五年置賞官命曰武功爵茂陵中書有武功爵一級曰造士二級曰間輿衛三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰左庶長十一級曰軍衛此武帝所制以寵軍功級十七萬凡直三十餘萬金索隱曰大顔云一金萬錢也計十一級級十七萬合百八十七萬金而此云三十餘萬金其數必有誤者顧氏按或解云一級十七萬自此以上每級加一萬至十七級合成三十七萬也或説七當為一即十一級衍萬字其曰直三十餘萬者蓋賣爵必級級少增其價至直三十餘萬金也諸買武功爵官首者試補吏先除官首武功爵第五也位稍高故得試為吏先除用也千夫如五大夫千夫武功爵第七級五大夫舊二十等爵第九級也言千夫爵秩比於五大夫故楊僕以千夫為吏殆謂此其有罪又減二等爵得至樂卿樂卿武功爵第八言買爵唯得至第八也以顯軍功軍功多用越等大者封侯卿大夫小者即吏吏道雜而多端則官職廢耗元狩四年除故鹽鐡官家富者為吏吏道益雜不選而多賈人矣元鼎二年始令吏得入榖補官郎至六百石師古曰吏更遷補高官郎又就增其秩得至六百石也元鼎三年所忠言世家子弟富人或鬪雞走狗馬弋獵博戲亂齊民乃徴諸犯令相引數千人命曰株送徒入財者得補郎郎選衰矣言被牽引者為其根株所送當充徒役而能入財者即當補吏按漢初入仕之途不加澄汰懼民之棄本逐末而儲蓄不豐也遂立為入粟之法懼吏之貧乏無藉而貪欲無厭也遂立為資算之法雖有愧於古人任賢使能之意然猶不過隨時以救弊而上之人初未嘗利其財也至武帝以征伐之餘用度不足始立賞官明開鬻賣之門入榖者入羊者入奴婢者煮鹽冶鐵者皆得入仕至株送之法行則陷之以罪罟以取其財而復酬之以官於是名器益濫矣西漢以資為郎如淳曰漢制資五百萬得為常侍郎張釋之司馬相如楊惲傳惲遷中郎將郎官故事令郎出錢市財用給文書乃得出名曰山郎山財用之所出故取名焉移病盡一日輒償十沐言出財用者雖非休沐常得在外也或至歲餘不得沐其豪富郎日出遊戲或行錢得善部貨賂流行轉相放效惲為中郎將罷山郎移長度大司農以給財用長久也一歲之調度言總一歲所須財物文書調度移司農以官錢給之其疾病休謁洗沐皆以法令從事有罪輒奏免薦其賢者郎官化之莫不自勵絶請謁貨賂之端宮殿翕然稱之貢禹傳禹言孝文時貴亷潔賤貪汚賈人贅壻及吏坐贓者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅疑者以與民亡贖罪之法故令行禁止武帝始臨天下尊賢用士闢地廣境自見功大威行遂從嗜欲用度不足乃行一切之法使犯法者贖罪入榖者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝悖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政於世行雖犬彘家富勢足目指氣使是為賢耳故謂居官而置富者為雄桀處姦而得利者為壯士察其所以然皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有贓罪者輒誅亡但免官則爭盡力為善貴孝弟賤賈人進真賢舉實亷而天下治矣按楊惲傳所載及貢禹所言大槩皆為資郎設也任官不以材德選而徒擇其資力之富厚豈理也哉然資郎之見於漢史者惟張釋之司馬相如釋之十年不得調有久宦減仲産之嘆相如亦謝病免歸成都家徒四壁立蓋其初非以德選遂為世所輕而宦亦不達故資産之富厚者反因遊宦而貧雖以釋之之才相如之文茍非一日他有以見知人主自致顯榮則必為資郎所纍終身坎壈矣士之所以進身者其發軔可不審哉黃霸傳馮翊以霸入財為官不署右職使領郡錢榖計夫輸財於官而得仕者猶不以右職畀之况徒以其家資之厚而豫之官者乎輸財得官卜式武帝時上書願輸家財半助邊不報再獻錢三十萬拜郎中後為御史大夫封侯黃霸武帝末以待詔入錢賞官補侍郎謁者坐同産有罪劾免後復入榖沈黎郡補左馮翊二百石卒史至丞相楊僕以千夫為吏樓千夫即武功賞第七級至船將軍封侯東漢安帝永初三年三公以國用不足奏令吏人入錢榖得為關內侯虎賁羽林郎五大夫官府吏緹騎營士各有差桓帝延熹五年占賣關內侯虎賁羽林緹騎營士五大夫錢各有差靈帝光和元年初開西邸賣官自關內侯虎賁羽林入錢各有差私令左右賣公卿公千萬卿五百萬山陽公載記曰時賣官二千石二千萬四百石四百萬其以德應選者半之或二分之一於西園立庫貯之中平四年賣關內侯假金印紫綬傳世入錢五百萬時開鴻都門榜賣官爵公卿州郡下至黃綬各有差其富者則先入錢貧者到官而後倍輸或因常侍阿保别自通達是時段熲樊陵張溫等雖有功勤名譽然皆先輸貨財而後登公位崔烈時因傅母入錢五百萬得為司徒及拜日帝曰悔不小靳可至千萬烈於是聲譽衰減帝欲以羊續為太尉時拜三公者皆輸東園禮錢千萬中使督之名為左騶其所之往輒迎致禮敬厚加贈賂續乃坐使人於單席舉緼袍示之曰臣之所資惟此而已左騶白之帝不悅以故不登公位劉陶為京兆尹到職當出修宮錢直千萬時拜職名當出買官之錢謂之修宮錢陶既清貧而恥以錢買職稱疾不聽政帝重陶才原其病武帝靈帝賣官之事同而其指意則異武帝取之於豪富之百姓蓋風以毁家紓國之公誼故卜式黃霸雖以資財進身而不害其為名士也靈帝取之於貪叨之公卿蓋縱其剝下媚上之私心故崔烈張溫雖以公譽登仕而無救其為小人也晉武帝太康三年問司𨽻校尉劉毅曰朕可方漢何帝毅曰桓靈帝曰吾雖德不及古人猶克已為治南平吳會混一天下方之桓靈不已甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之乃不如也後魏明帝時孝昌二年初承喪亂之後倉廩虛罄遂班入粟之制輸粟八千石賞散侯六千石散伯四千石散子三千石散男職人輸七百石賞一夫階授以實官白人輸五百石聽依第出身千石加一大階諸沙門有輸粟四千石入京倉者授本州統各有差唐置公廨本錢以諸州令史主之號捉錢令史每司九人補於吏部所主才五萬錢以下市肆販易月納息錢四千歲滿授官諫議大夫褚遂良上言七十餘司更一二載捉錢令史六百餘人受職太學高第諸州進士拔十取五猶有犯禁罹法者况㕓肆之人茍得無恥不可使其居職太宗乃罷捉錢令史復詔給百官俸又令文武職事三品以上給親事帳內以六品七品子為親事以八品九品子為帳內歲納錢千五百謂之品子課錢凡捉錢品子無違負者滿二百日本屬以簿附朝集使上於考功兵部滿十歲量文武授散官至德二年七月宣諭使侍御史鄭叔清奏承前諸使下召納錢物多給空名告身雖假以官賞其忠義猶未盡才能今皆量文武才藝兼情願穩便據條格議同申奏聞便寫告身諸道士女道士僧尼如納錢請準敕回授餘人并情願還俗授官勳邑號等亦聽如無人回授及不願還俗者準法不合畜奴婢田宅資財既助國納錢不可更拘常格其所有資財能率十分納三分助國餘七分並任終身自蔭身殁之後亦任回與近親又準敕納錢百千文與明經出身如曾受業粗通帖䇿修身謹行鄉曲所知者量減二十千文如先經舉送到省落第灼然有憑帖䇿不甚寥落者減五十千文若粗識文字者準元敕處分未曾讀學不識文字者加三十千應授職事官并勳階號及贈官等有合蔭子孫者如戶內兼蔭丁中三人以上免課役者加一百千文每加一丁中纍加三十千文其商賈準令所在收稅如能據所有資財十分納四助軍者便與終身優復如於敇條外有悉以家産助國嘉其竭誠待以非次如先出身及官資並量資歷好惡各據本條格例節級優加擬授如七十以上情願授致仕官者每色內量十分減二分錢時屬幽寇內侮天下多虞軍用不充權為此制尋即停罷元和十二年詔入粟助邊古今通制如聞定州側近秋稼方登念切救人不同常例有人能於定州納粟五百石者放優出身仍減三選一千石者無官便授解褐官有官者依資授官二千石者超兩資如先有出身及官情願減選者每三百石與減一選又敕入蕃使不得與私覿正員官告量别支給以充私覿舊例使絶域者許賣正員官十員取資以備私覿雖優假逺使殊非典法故革之十五年復其制入回鶻使仍舊與私覿正員官十三員吐蕃使八員宋興以來所重者獨進士若納粟授官止贖刑而已於民政無預也神宗熙寧元年行入粟補官法出將作監主簿助教告敕七十道付河北安撫司募人入粟尋又賜河東空名敕誥徽宗宣和三年臣僚言元豐所立進納官法多所裁抑應入令録及因賞得職官止與監當該磨勘者即換授降等使臣仍不免科率法意深矣邇者東南用兵民八金榖皆得補文武官理選依限如官戶此不便也且富而入納者皆嘗與不入納者均受科取今復其戶不輸是得數千緡於一日而失數千斛於無窮也况大戶得復則移其科於下户下户重貧州縣緩急當責何人辦事况不注監當不限磨勘與士大夫涇渭並流駑驥同皂又弊之大者乞改用進納本法詔近東南捕賊入金粟而補之官與常平法進納者異可如已命毋改該注親民官而有田業在所涖其毋得注高宗紹興二十年用吳逵言置力田科命江浙福建監司守臣募民往兩淮開墾田地歲收榖五百石歸官莊者免本戶差役七百石補進義副尉至四千石補進武校尉並作力田出身其被賞後再開墾及元數許參選如法理名次在武舉特奏名出身之上遇科場許赴轉運司應舉孝宗淳熙二年詔進納補官請舉年及合免舉之人許納補授文書直赴南省七年中書門下省言湖南江西旱傷立賞格以勸積粟之家凡出米賑濟係崇尚義風不與進納同一千石補進義校尉願補不理選將仕郎者聽二千石補進武校尉如係進士與免文解一次四千石補承信郎如係進士與補上州文學五千石補承節郎係進士補迪功郎方伎西漢衛綰以戲車為郎事文帝仕至丞相鄧通以濯船為黃頭郎佞幸周仁以醫見景帝為太子時為舍人仕至侍中吾邱壽王年少以善格五召待詔仕至大中大夫荀彘以御見侍中武帝時虞初以方士侍祠東郭先生以方士待詔公車武帝即位博開藝能之路悉延百端之學通一伎之士咸得自效絶倫超竒者為右亡所阿私龜策傳丞相魏相奏言知音善鼓雅琴者趙定龔德皆召見待詔伍宏以醫待詔成帝時言祭祀方術者皆得待詔又有本草待詔郊祀志范曄東漢書方伎傳論曰漢自武帝頗好方術天下懷挾道藝之士莫不負䇿抵掌順風而屇焉謂李少翁欒大之徒後王莽矯用符命及光武尤信讖言士之赴趨時宜者皆騁馳穿鑿爭談之也故王梁孫咸名應圖籙越登槐鼎之任鄭興賈逵以附同稱顯桓談尹敏以乖忤淪敗自是習為內學尚竒文貴異數不乏於時矣是以通儒碩生忿其姦妄不經奏議慷慨以為宜見藏擯謂桓談賈逵張衡之流子長亦云觀隂陽之書使人拘而多畏蓋謂此也東漢書方術傳所載在仕路者任文公善天官風角仕至司空掾郭憲善術仕至光祿勳許楊善術曉水脈仕至都水掾王喬有神術仕至縣令謝夷吾善風角仕至太守李郃善河洛風星以孝亷舉仕至司徒樊英善風角算河洛七緯推步災異以隱士聘仕至光祿大夫公沙穆善河洛步推之術仕至𢎞農令單揚善天官算術仕至漢中太守韓説善圖緯仕至江夏太守按史所載兩漢士大夫明方術善技藝而在仕途有至大官者如衛綰周仁吾邱夀王則假方術以進而自他有文行以取顯貴者也如李郃樊英之徒則雖善方術而本不假此以進身取位者也然考東漢書方術傳所載則終身肥遁不求聞達者甚多有不應辟舉者有變姓名不知所終者真賢士也其與後世之以一伎自名而奔走形勢之塗以為干名徇利之階者大有徑庭矣唐高祖以舞胡安叱奴為散騎侍郎禮部尚書李綱諫曰古者樂工不與士齒雖賢如子野師襄皆終身繼世不易其業唯齊末封曹妙達為王安馬駒為開府有國家者以為殷監今天下新定建義功臣行賞未遍高才碩學猶滯草萊而先擢舞胡為五品使鳴玉曵組趨蹌廊廟非所以規模後世也上不從曰吾業已授之不可追也故事伎術官皆本司定送吏部附申謂祕書殿中太常左春坊太僕等伎藝之官唯得本司遷轉不得外敘若本司無闕聽授散官有闕先授若再經考滿者聽外敘唐制凡醫術不過尚藥奉御隂陽卜筮圖書工巧造食音聲及天文不過本色局署令鴻臚譯語不過典客署令中宗神龍元年太白山人鄭普思以方術除祕書監其年又除方術人葉靜能為國子祭酒元宗開元七年敕出身非伎術而以能任伎術官者聽量與員外其選敘考勞不須拘伎術例天寶十三載吏部奏凖格伎術官各於當色本局署員外置不得同正員之數從之文宗太和五年敕諸色藝能授官今後如有罪犯停職者委本司牒報吏部不在敘用限後唐莊宗同光二年初胡柳之役伶人周匝為梁所得帝每思之入汴之日匝謁見於馬前帝甚喜匝涕泣言曰臣所以得生全者皆梁教坊使陳俊內園栽接使儲德源之力也願就陛下乞二州以報之帝許之郭崇韜諫曰陛下所與共取天下者皆英豪忠勇之士今大功始就封賞未及一人而先以伶人為刺史恐失天下心既而伶人屢以為言帝謂崇韜曰吾已許匝矣使吾慙見此三人公言雖正當為我屈意行之乃以俊為景州刺史德源為憲州刺史時親軍有從帝百戰未得刺史者莫不憤歎宋太祖皇帝開寶十年詔司天臺學生及諸司伎術工巧人不得擬外官教坊使衛德仁以老求外官且援同光故事乞領郡上曰用伶人為刺史此莊宗失政豈可效之邪宰相擬上州司馬上曰上佐乃士人所處資望甚優亦不可輕授此輩但當於樂部遷轉乃以為太樂署令真宗天禧元年詔伎術人雖任京朝官審刑院不在磨勘之例魯國長公主以趙自化藥餌有功請授尚食使兼醫官院事上曰自化頃因雍王元份以求刺郡尋諭以方術之流不可任郡今復有此請命樞密使召戒之乾興元年中書言舊制翰林醫官圖畫琴棋待詔轉官止光祿寺丞天禧四年乃遷至中允贊善洗馬同正請勿踰此制惟特恩至國子博士而止徽宗大觀四年併書學生入翰林書藝局畫學生入翰林圖畫局醫學生入太醫局而算書生則歸之太史局畫學醫學等並見學校考文獻通考卷三十五
