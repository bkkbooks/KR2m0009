body:
  text: 文獻通考卷五十九鄱陽馬端臨貴與著職官考十三大將軍并官屬大將軍戰國時官也楚懷王與秦戰秦敗楚虜其大將軍屈丐是矣漢高帝以韓信為大將軍初拜信蕭何曰王素慢無禮今拜大將如兒戲耳乃擇良日齋戒設壇以禮拜之又竇嬰為大將軍每朝大議列侯莫敢抗禮武帝又置初武帝以衛青數征伐有功以為大將軍欲尊寵之故置大司馬官號以冠之衛青字仲卿為車騎擊胸奴大立功引兵至塞天子使使者持大將軍印因軍中拜青為大將軍位在公上卿以下皆拜惟汲黯獨揖後又加青大司馬位冠於大將軍上共為一官後霍光王鳳等皆然成帝綏和二年賜大司馬印綬罷將軍官後漢光武時吳漢以大將軍為大司馬後漢大將軍自為一官其大司馬不加於其上和帝時以竇憲為之舊大將軍位在三公下置官屬依太尉憲威權振朝廷公卿希旨奏憲位次太傅下三公上長史司馬秩中二千石從事中郎二人六百石自下各有增憲初為此官威振天下尚書以下欲拜之伏稱萬歲尚書令韓稜曰禮無人臣稱萬歲之制乃止後梁冀為之官屬倍於三公府自安帝政理衰缺始以嫡舅耿寶為大將軍常在亰都順帝即位又以皇后父兄弟相繼為大將軍如三公梁冀别傳云元嘉二年又加冀禮儀大將軍朝到端門謁者將引增掾屬舍人令史官騎鼓吹各十人風俗通曰桓帝初亰師謡曰遊平賣印自有許不避豪強及大姓按竇武字遊平為大將軍印綬所加咸得其人漢末猶在三公上魏武為大將軍袁紹為太尉紹恥班在下魏武乃固以大將軍讓紹魏黃初中又有上大將軍以曹真為之吳亦以陸遜為上大將軍諸葛恪為大將軍眀帝青龍三年晉宣帝自大將軍為太尉然則大將軍在三司下矣其後又在三司上自漢東亰大將軍不常置為之者皆擅朝權至晉景帝為大將軍亦受非常之任後以叔父孚為太尉奏改大將軍在太尉後位次三司下後復舊在三司上太康元年琅琊王胄遷大將軍復制在三司下胄薨復如舊冠綬佩服與大司馬同宋唯彭城王義康為之章綬冠佩亦與晉同齊以為贈梁有之陳以為贈後魏北齊為二大與大司馬同後周建德四年增置上大將軍隋並以為武散官不理事上大將軍從二品大將軍正三品唐貞觀二年九月敕六軍先已各置統軍一人今十六衛宜各置上將軍一人秩從二品其左右衛及左金吾衛上將軍俸料隨軍人馬等並同六軍統軍其諸衛上將軍次於統軍支給自今已後內外文武闕官於文武班中材望相當者參敘仍符以後各依故事於本衛量置衛兵仍舉故事置武班朝參其廊下食亦宜加給稍令優重漢不見官屬後漢大將軍驃騎將軍車騎將軍衛將軍有長史一人司馬一人竇憲為大將軍置長史司馬員吏官屬位次太傅屬官從事中郎二人掾屬二十九人令史及御屬三十一人又賜官騎四十人及鼓吹應劭曰鼓吹二十人非常貟其領軍皆有部曲大將軍營五部部校尉一人軍司馬一人部下有曲曲有軍候一人曲下有伅伅長一人其不置校尉部但有軍司馬一人其别營領屬為别部司馬其兵多少各隨時宜門有門候魏以司馬景王為大將軍置掾十人則無屬官其驃騎車騎府有長史司馬晉驃騎衛將軍伏波撫軍都護鎮軍中領四征四鎮龍驤撫軍上軍輔國等大將軍開府者皆為位從公品秩俸賜亦與諸公同加兵者增置司馬一人從事中郎二人主簿記室督各一人官屬並與公同宋大將軍驃騎車騎衛將軍諸府皆有長史一人又各置司馬一人齊有大將軍為贈官無僚屬諸驃騎車騎衛鎮軍中軍撫軍四征四鎮等將軍凡加大字位從公長史司馬諸官屬亦同公梁因之諸將軍優者亦然陳為贈官無僚屬後魏大將軍僚屬如三公北齊亦然後周大將軍有長史司馬中郎掾屬諸曹參軍典籖等員隋以後無都督魏文帝黃初三年以大將軍曹真都督中外諸軍假黃鉞總統內外諸軍眀帝太和四年司馬懿征蜀加號大都督高貴鄉公正元二年司馬昭都督中外諸軍尋加大都督晉武帝伐吳以賈充為使持節假黃鉞大都督總統六師江左以來都督中外尤重唯王𨗳等權重者乃居之宋氏人臣無居者惟江夏王義恭得假黃鉞則專戮郎將非人臣常器也後魏亦有都督中外諸軍事後周以來改都督為總管校尉唐分諸道各置都督府而都督之名微矣宋紹興初吕頤浩以左僕射都督江淮荆浙諸軍事置司鎮江既而又命孟庾以參知政事權同都督四年趙鼎自知樞密院為川陕宣撫處置使以與吳玠共事為嫌乃改都督川陕荆襄諸軍事五年鼎與張浚並相遂帶兼都督諸路軍馬入銜浚之初為都督也以行府為名凡事干朝廷則關三省樞密院孟庾時為政府不平曰三省樞密院乃奉行行府文書邪七年將罷浚先廢都督府三十二年葉義問始以知樞密院事為督視軍馬蓋朝議以義問非相臣故其名下都督一等蓋不考孟庾趙鼎故事而失之也隆興初張浚再以樞密使都督江淮軍馬乃命汪徹以參知政事督視湖北京西軍馬浚去位都督復廢其秋詔湯思退以左僕射為之思退逗遛不進乃命王之望以參知政事為同都督之望亦丐免於是遂命楊存中代為都督非宰相而為都督自存中始元帥唐制有天下兵馬元帥副元帥掌征伐兵罷則省高祖入關太宗為秦王加西討元帥其後中宗為周王為洮河道元帥睿宗為相王為并州道行軍元帥天寶十五載安祿山反以哥舒翰為諸道兵馬元帥上皇幸蜀以太子亨充天下兵馬元帥肅宗即位以廣平王俶為天下兵馬元帥諸將皆屬焉乾元二年以趙王係為天下兵馬元帥李光弼為副元帥代宗即位以雍王適為天下兵馬元帥廣德元年吐蕃入寇復以雍王為關內元帥郭子儀為副元帥大歷八年罷天下兵馬元帥建中四年以李希烈反置諸道行營兵馬都元帥以李晟為鄜坊亰畿渭北商華副元帥昭宗天復三年上議褒宗朱全忠乃以皇子輝王祚為諸道兵馬元帥加全忠太尉充副元帥後唐長興四年以秦王從榮為天下兵馬元帥中書門下奏歷朝以來無天下兵馬大元帥公事儀注臣等謹沿近事伏見招討使總管兼授副使已下橐鞬庭禮今望令諸道節度使已下凡帶兵權者見元帥階下具軍禮參見皆申公狀其使相者初相見亦以軍禮一度已後客禮相見宋靖康元年冬金人圍京師康王奉使至磁相間為士民所遏不得進乃拜王為天下兵馬大元帥陳遘元帥宗澤汪伯彥副元帥速領兵入衛宣撫使唐元和十四年淄青兖鄆等十二州平詔户部侍郎楊於陵以本官充淄青等州宣撫使宋不常置祖宗時有軍旅大事則命執政大臣為之纍朝但除向敏中鄜延路范仲淹陕西四路富弼河北文彥博河北韓絳陕西河東五人今考向范二公但為經略安撫使富文韓三公始為宣撫使仁宗征儂智高以狄青為宣撫使武臣為宣撫自此始神宗命郭逵討交趾逵前執政然但以招討使為名惜之也靖康初李綱以尚書右丞出為兩河宣撫繼而又以种師道代之建炎三年張浚以知樞密院為川陕宣撫處置使宰執為宣撫行移六曹等監帥司用劄子而六曹於宣司用申狀從官任使副合申六部六部行移用公牒故事大臣為宣撫使於三省樞密院皆用申狀若建都督府則只用關隆興初張魏公以少傅為江淮宣撫使頃之拜樞密使都督江淮軍馬及符離師潰公上表待罪乃降特進復為宣撫使既而言者謂降官示罰自古所有雖出浚自請然人情觀望號令不行乃復以為都督其後孟庾趙鼎虞允文王炎輩皆自二府出為之若前宰相為宣撫者則自渡江以後止除李綱吕頤浩朱勝非三人紹興元年劉光世以使相宣撫淮南武臣非執政而為宣撫自此始二年李光以端眀殿學士為夀春等州宣撫使文臣非執政而為宣撫自此始然自紹興至嘉泰武臣止劉光世韓世忠張浚吳玠嶽飛吳璘六人從官止李光王似二人蓋重之也紹興末詔以楊存中為江淮宣撫使劉珙不書黃遂寢其命又詔虞允文以兵部尚書為湖北亰西宣撫副使會存中命格於是復改川陕宣諭使而存中措置兩淮焉按兩漢以來大將軍之官內秉國政外則仗鉞専征其權任出宰相之右隋唐以後則無其官然唐有都副元帥宋有都督宣撫皆以為將相重臣總師征討者之官蓋都督元帥宣撫即兩漢大將軍之任也故各敘其事於大將軍之後又都督之名始於魏晉之間謂之假黃鉞都督中外軍事其權任甚重至唐則每道有都督府特以為州牧之職而已宋中興後所命都督始復魏晉之舊故唐之都督别自為門在州牧刺史之後而此所敘者不及之云車騎將軍漢文帝元年始用薄昭為車騎將軍灌嬰周亞夫金日磾並為之後漢章帝即位西羌反以舅馬防行車騎將軍征之銀印青綬在卿上絶席還復罷和帝即位以舅竇憲為車騎將軍征胸奴始賜金紫次司空安帝即位西羌寇亂以舅鄧隲為車騎將軍征之數年復罷又皇甫嵩等並為之其官屬附見大將軍後靈帝數以車騎拜嬖臣及贈亡人應劭曰美號加於頑凶印綬汙於腐尸虧國家之舊傷虓武之重昔年有覩被髮之祥知其為戎今假號雲集不亦宜乎魏車騎為都督儀與四征同若不為都督雖持節屬四征者與前後左右雜號將軍同其或散還從文官之例則位次三司晉宋車騎衛不復為四征所督晉羊祜為車騎將軍開府如三司之儀後魏制與驃騎同位次升降並同隋車騎屬驃騎府唐省之衛將軍漢文帝始用宋昌為衛將軍位亞三司其官屬附見大將軍後凡驃騎車騎衛三將軍皆金印紫綬武冠絳朝服佩水蒼玉晉以陸曄為衛將軍兼儀同三司加千兵百騎東晉已後尤為要重後魏初加大則次儀同三司孝文太和中制加大則位在太子太師上歷代多有唐無之前後左右將軍前後左右將軍皆周末官秦因之位上卿金印紫綬漢不常置或有前後或有左右皆掌兵及四夷李廣為前將軍趙充國為後將軍辛慶忌王商為左將軍馮奉世為右將軍光武建武七年省魏以來復置晉武初又置前軍左軍右軍太始八年又置後軍是為四軍齊亦號左右前後四軍陳並有之北齊左右將軍領千牛備身唐無四征將軍四征將軍皆漢魏以來置加大者始曰方靣征東將軍漢獻帝初平三年以馬騰為之或云以張遼為征西將軍漢光武建武中以馮異為大將軍征南將軍漢光武建武二年置以馮異為之亦以岑彭為大將軍征北將軍魏眀帝太和中置劉靖為之許允亦為之各一人魏黃初中位次三公後魏加大則次衛將軍唐無四鎮將軍鎮東將軍後漢末魏武帝為之鎮南將軍後漢末劉表為之魏張魯晉當陽侯杜元凱並為之鎮西將軍後漢劉表為之魏鍾會鄧艾並為之鎮北將軍魏明帝太和中置劉靖許允並為之各一人宋時四鎮與中軍為雜號後魏加大次尚書令唐無四安將軍安東將軍後漢陶謙曹休並為之安南將軍光武元年以岑彭為之晉范陽王虓亦為之安西將軍後漢末假煨魏鍾會晉郗鑒並為之安北將軍晉以郗鑒為之各一人後魏亦有唐無四平將軍平東將軍晉當陽侯杜元凱王濬等為之平南將軍晉盧欽羊祜胡奮等為之平西將軍晉以嵇紹為之平北將軍漢獻以張燕晉以阮坦並為之各一人並漢魏間置後魏亦有唐無雜號將軍上漢以吕祿為上將軍騎漢武帝以公孫敖及公孫賀並為騎將軍樓船漢元封三年以荀彘為之橫海漢元鼎六年以韓説為之擊東越有功材官漢李息為之掌理宫室貮師漢李廣利為之征貮師城取善馬故以為號輕車漢武帝以公孫賀為之伏波漢武帝征南越始置此號以路博德為之後漢馬援亦為之伏波者船涉江海欲使波浪之伏息中軍漢武帝以公孫敖為之強弩漢武帝以李沮為之戈船環氏要略云建戈於船上浮渡沮水以討北狄奮威漢武帝以田千秋為之度遼漢武帝初以范眀友為度遼將軍後漢眀帝永平八年又置屯五原銀印青綬种皓字伯景為度遼將軍誠心懷撫信賞分眀乃去烽燧斥堠邉方晏然及卒胸奴舉國傷惜單于每入朝賀每見墳輒哭泣祭祀又李膺為度遼將軍聲振逺域積射漢有之晉武帝太始四年省太康十五年立射營弩營置積射強弩將軍主之建威漢元帝以韓安國王晏並為之光武以耿弇為之九武王莾拜將軍九人皆以武為號號曰九武將軍征虜後漢建武中始以祭遵為後張飛亦為之武牙後漢光武以蓋延為之橫野漢光武以王常為橫野大將軍位與諸將絶席捕虜後漢永平中馬武為之鷹揚後漢建安中魏武以曹洪為之討逆後漢末以孫䇿為之破虜後漢末以孫堅為之討虜後漢末以孫權為之安漢蜀糜竺為之班在軍師將軍之右武威魏武帝以于禁為之撫軍魏武帝置以司馬宣王為之凌江後漢置以羅獻為之寧朔魏以王渾為之橫江吳魯肅為之又曰魯橫江昔仗萬人屯據陸口界龍驤晉武帝始以王濬為之殿中宋初置之黑矟後魏于粟磾好持黑矟以自衛劉裕遙見題書與之曰黑矟公麾下眀帝因授黑矟將軍牙門將冠服與將軍同魏文帝黃初中置眀帝以胡烈為之又王隱晉書云陸機少襲父為牙門將吳人重武官故也晉惠帝特置四部牙門以汝南王祐為之蜀以趙雲為之監軍軍師祭酒理曹掾屬附周代齊景公使穰苴將兵捍燕晉之師穰苴願得君之寵臣以監軍公使莊賈往賈不時至苴斬之是其始也漢武帝置監軍使者光武以來歙監諸將後漢末劉焉以監軍使者領益州牧劉璋亦為監軍使者魏晉皆有之魏時司馬文王征夀春石苞為監軍鍾會伐蜀衛瓘為監軍晉孟康持節監石苞諸軍事初隗囂軍中嘗置軍師隗囂聘平陵人方望以為軍師又袁紹請盧損為軍師至魏武帝又置師官四人魏荀攸為軍師軍國選舉及刑獄法制皆使決焉又梁義為左軍師吳朱然為右軍師蜀以諸葛亮為軍師將軍晉避景帝諱改為軍司凡諸軍皆置之以為常員所以節量諸宜亦監軍之職也而太尉軍司尤重故山公啓事曰太尉軍司缺當選上宰監宜得宿有資重者也宋齊以來此官頗廢至梁大通四年元法僧北討復以羊侃為大軍司後代多不置至隋末或以御史監軍事唐亦然時有其職非常官也開元二十年後並以中官為之謂之監軍使至德間九節度圍賊相州以魚朝恩為觀軍容宣慰處置使觀軍容使自朝恩始是後宦者多稱軍容節度使皆置監軍至昭宗天復二年誅宦官其為監軍者詔方鎮誅之宦官盡死惟河東監軍張承業幽州監軍張居翰清海監軍程匡柔西川監軍魚全禋及致仕嚴遵美為李克用劉仁恭楊行密王建所匿得全斬他囚以應詔後唐莊宗既取蜀以孟知祥為西川節度使眀帝既立安重誨以知祥據險要擁強兵恐久而難制客省使李嚴自請為西川監軍必能制知祥詔從之嚴既至知祥謂之曰公前奉使王衍歸而請兵伐蜀莊宗用公言遂至兩國俱亡今公復來蜀人懼矣且天下皆廢監軍公獨來監吾軍何也嚴惶恐求哀知祥曰衆怒不可遏也遂攝下斬之軍師祭酒後漢建安三年曹公還許初置此官理曹掾屬後漢建安十九年魏武令曰軍中典獄或非其人而任以三軍死生吾甚懼之遂置此選三署郎官敘漢中郎將分掌三署郎有議郎中郎皆比六百石侍郎比四百石郎中比三百石凡四等皆秦官無員多至千人靈帝時三署郎吏二千餘人皆掌門户出充車騎其散郎謂之外郎故卿校尉牧守待價於此公車特徴賢良方正敦朴有道高節公府掾曹試博士者亦充兹位其下第白衣試博士者皆拜郎中中郎有五官左右三將謂五官中郎將左右郎將郎中有車户騎三將如淳曰主車曰車郎主户衛曰户郎漢舊儀曰郎中令主郎中左右車將主左右車郎左右户將主左右户郎凡郎官皆主更直執戟宿衛諸殿門唯議郎不在直中漢儀曰三署郎見光祿勳執板拜若見五官左右將執板不拜於三公諸卿無敬郎官故事令出錢市財用給文書乃得出時號曰山郎謂以資財為郎也山者財用所出故取名或至嵗不得休沐其豪富郎日出逰戲或行錢得善部貨賂流行轉相放效楊惲字子幼為中郎將罷山郎其疾病休沐皆以法令有過奏免薦舉其高第有行能者多至郡守九卿三署化之莫不自勵宫殿之內翕然同聲其後遂以為常後漢和帝永元元年初令郎官詔除者得占丞尉以比秩為真凡三署郎官二漢並屬光祿勳光祿選三署郎有行應四科者嵗舉茂材二人四行二人後漢范滂字孟博舉孝廉光祿四行時冀州飢荒盜賊羣起乃以滂為清詔使以按察之滂登車攬轡慨然有澄清天下之志及到州境守令有贓汚者望風解印綬而去其所舉奏莫不厭塞衆議又上廉吏六人為長理劇隨缺多少萬户以上為劇縣其缺少者不選公府亦然故眀帝時館陶公主為子求郎帝不許賜錢十萬曰夫郎官上應列宿出宰百里茍非其人人受其殃後漢桓靈間三署見郎七百餘人而郡國計吏多留拜為郎太尉楊秉上疏諌曰先王建國順天制官太微積星名為郎位入奉宿衛出牧百姓云云按自近代皆謂郎官上應列宿出宰百里為尚書郎故事且夫天文有武賁郎位等星皆在太微帝座之後為翊衛之象則應劭楊秉所言三署郎是也而世人謂之尚書郎則誤矣徴其失也蓋自梁陶藻職官要録以漢三署郎故事通為尚書郎循名失實遺誤後代舊有郎中將右騎光武中興悉省漢袁盎卜式張騫並為中郎韓信主父偃並為郎中後漢眀帝性褊察嘗以事怒郎樂嵩嵩走入床下上將杖撞嵩嵩曰天子穆穆諸侯皇皇未聞人君自起撞郎上乃捨之又班固二代位不過郎又陳蕃諫靈帝曰昔眀帝公主為子求郎賜錢十萬今陛下除拜郎吏無有休已以一郎比一把菜耳晉議郎遷為太守山公啓事曰議郎許允宜參廣漢太守選亦有郎中等官其後雖有中郎將等官而無三署郎矣中郎將五官中郎將左右中郎將五官左右中郎將皆秦官漢因之並領三署郎從後漢之制郡國舉孝廉以補之三署郎年五十以上屬五官後漢黃琬字子琰為五官中郎將時陳蕃為光祿勳深相敬待每與議事舊制光祿舉三署郎以功髙久次才德尤異者為茂才四行時權富子弟多以人事得舉而貧約守志者見遺京師謡曰欲得不能光祿茂才於是蕃琬同心顯用志士故蕃琬皆為權富郎所中傷也其次分屬左右署左右郎將各領左右署郎二署皆有中郎侍郎郎中三郎並屬光祿勳魏無三署郎猶置左右中郎將晉武帝省左右中郎將官宋孝武大眀中復置銀章青綬武冠絳朝服佩水蒼玉齊左右中郎將屬西省梁代並分司丹禁今中郎將四十四員郎將六十四員各附諸軍諸衛篇唐亦置諸衛中郎將永徽三年八月避太子名改中郎將為旅賁郎將又改為翊軍郎將尋復舊虎賁中郎將周官有虎賁氏掌領虎士八百人軍旅會同君宿於外則守王間間梐枑行馬也梐音陛枑音護漢武帝建元三年初置期門比郎中蓋以微行出逰選材力之士執兵從送期之諸門故名期門無員多至千人平帝元始元年更名虎賁郎舊曰虎賁言如虎之奔置中郎將領之故有虎賁中郎將主虎賁宿衛冠插兩鶡尾鶡鷙之中果徑者每有攫撮應爪摧碎尾上黨所貢也紗縠單衣虎文錦袴餘郎亦然凡有虎賁中郎虎賁侍郎虎賁郎中節從虎賁皆父死子繼若死王事亦如之前賢亦多為者後漢馬援孔融並為虎賁中郎將遷尚書魏桓階為虎賁中郎將遷尚書典選唐無四中郎將東西南北東中郎將後漢靈帝以董卓為之南中郎將後漢獻帝以臨淄侯曹植為之西中郎將晉以謝曼桓沖為之北中郎將後漢以盧植為之建安中以鄢陵侯曹彰為之並後漢置江左彌重或領刺史或持節為之銀印青綬服同將軍後魏靈太后時四中郎將兵數寡弱不足以襟帶京師任城王澄奏宜以東中帶滎陽郡南中帶魯陽郡西中帶恆農郡北中帶河南郡選二品三品親賢兼稱者居之配以強兵則深根固本之計也靈太后初從之後復止唐至德後節度都團練使殆其遺職雜中郎將使胸奴中郎將後漢主護南單于以張奐為之後魏天興四年罷平越中郎將晉武帝置理廣州主護南越司金中郎將趙王循為之武衛中郎將魏始以許褚為之唐無折衝府果􅐧别將等附隋初左右衛左右武衛左右武候各領軍坊鄉團以統戎卒開皇中置驃騎將軍府每府置驃騎車騎二將軍大業三年改驃騎府為鷹揚府改驃騎將軍為鷹揚郎將改車騎將軍為鷹揚副郎將五年又以鷹揚副郎將為鷹擊郎將九年别置折衝果毅及武勇雄武等郎將官以統領驍果唐武德初猶有驃騎府及驃騎車騎將軍之制武德七年乃改驃騎為統軍車騎為别將貞觀十年復採隋折衝果毅郎將之名改統軍為折衝都尉别將為果毅都尉魏有折衝將軍後周有成議别將官其名因此也其府多因其地各自為名無鷹揚之號凡五百七十四府分置於諸州而名𨽻諸衛及東宮率府各領兵滿一千二百人為上府兩亰城內雖不滿此數而亦同上府千人為中府兩畿及岐同華懷陕等五州所管府雖不滿此數亦同中府八百人為下府每府置折衝都尉一人掌領校尉以下宿衛及衛士以上總判府事左右果毅都尉各一人掌通判春秋傳曰戎昭果毅又曰殺敵為果致果為毅煬帝始置後改將為之别將一人不判府事若無兵曹以上即知府事初别將既改為果毅而府中有長史員聖歷三年廢長史置别將一員後又兼置長史長史一人通判載初元年置兵曹一人判府事付事勾稽監印給紙筆校尉六人以下小吏各有差若校尉以下唯人數置之凡府在赤縣為赤府在畿縣為畿府衛士以三百人為團團有校尉五十人為隊隊有正十人為火火有備六馱馬驢初置八馱後改為六米糧介胄戎器鍋幕貯之府庫以備武事每嵗十一月以衛士帳上於兵部以候徴發天下衛士向六十萬人初置以成丁而入六十出役其家不免征徭遂漸逃散年月漸久逃死者不補天寶八載五月停折衝府以無兵可校之十一載八月改諸衛士為武士三都尉奉車駙馬騎奉朝請附奉車駙馬騎三都尉並漢武帝元鼎二年初置李陵為騎都尉至更始時官亂謡曰爛羊胃騎都尉舊無員或以冠常侍或卿尹校尉左遷為之奉車掌御乘輿車漢官曰三人駙馬掌駙馬駙馬非征駕車皆為副馬一曰駙近也疾也騎都尉本監羽林騎漢官十人又竇嬰為朝請竇太后除嬰門籍不得入朝請漢律諸侯春朝天子曰朝秋曰請後漢並屬光祿勳奉朝請無員本不為官漢東京罷省三公外戚皇室諸侯多奉朝請奉朝請者奉朝會請召而已晉武帝亦以皇室外戚為三都尉而奉朝請焉元帝為晉王以參軍為奉車都尉掾屬為駙馬都尉行參軍舍人為騎都尉皆奉朝請後罷奉車騎二都尉唯留駙馬都尉奉朝請而已諸尚公主者若劉惔桓溫等皆為之宋武帝永初已來以朝請選雜其尚主者唯拜駙馬都尉齊奉朝請駙馬都尉及散騎給事中等官並集書省職朝散用衣冠之餘人數猥積武帝永眀中奉朝請至六百餘人齊職儀曰凡尚公主拜駙馬都尉梁三都尉並無員秩其奉車駙馬皆武官絳朝服銀章青綬梁陳駙馬皆尚公主者為之陳武帝長女永世公主先適陳留太守錢蕆生子岊及岊並卒武帝受禪唯公主追封將葬尚書主客牒詳議欲加􅟹駙馬都尉并贈岊官袁樞議曰昔王姬下降必適諸侯同姓為主聞於公羊之説車服不繫著於詩人之篇漢氏之初列侯尚主自斯以後降嬪素族駙馬都尉置由漢武或以假諸功臣或以加於戚屬是以魏表駙馬為一號魏晉以來因為常準蓋眀王姬之重庶姓之輕若不加其等級莫可合卺而酳所以假駙馬之位乃崇於皇女今公主早薨伉儷已絶既無禮數致疑何須駙馬之授按當陽侯杜元凱尚晉宣帝第二女高陸宣公主晉武踐祚而主已亡泰始中追贈公主杜君無復駙馬之號梁元帝女新安穆公主早薨天監初王氏無追拜之事遠近二例足以相眀公主所生既未及成人之禮無勞此授今宜追贈亭侯時以樞議為衷􅟹丑善反岊音節後魏駙馬都尉亦為尚公主官雖位高卿尹而此職不去奉車二十人騎都尉六十人北齊駙馬與後魏同隋開皇三年罷奉朝請煬帝時奉車駙馬並廢唐駙馬都尉從五品皆尚主者為之開元三年八月敕駙馬都尉從五品階宜依令式仍借紫金魚袋天寶以前悉以儀容美麗者充選奉車都尉五貟掌馭副車不常置若大備陳設則以餘官攝行屬左右衛也宋制騎都尉為勳官駙馬都尉為尚主之官奉車都尉無節度使唐因隋制諸州總管加號使持節後改大總管為大都督永徽已後除都督帶使持節即是節度使不帶者即不是節度使景雲二年賀拔延嗣除􅋽州都督充河東節使自此有節度之號節度使封郡王則有奏記一人兼觀察使又有判官支使推官巡官衙推各一人又兼安撫使則有副使判官各一人兼度支營田招討經略使則有副使判官各一人支度使復有遣運判官巡官各一人節度使掌總軍旅顓誅殺初授具帑秣兵仗詣兵部辭見觀察使亦如之辭日賜雙旌雙節行則建節樹六纛中官相送次一驛輒上聞入境州縣築節樓迎以鼓角衙仗居前旌幢居中大將鳴珂金鉦鼓角居後州縣齎送迎於道左天寶初置十節度經略使以備邉安西節度撫寧西域統龜兹焉耆于闐踈勒四鎮治龜兹城兵二萬四千北庭節度防制突騎施堅昆統瀚海天山伊吾三軍屯伊西二州之境治北庭都護府兵二萬人河西節度斷隔吐蕃突厥統赤水大斗建康寧寇玉門墨離豆盧新泉八軍張掖交城白亭三守捉屯涼肅瓜沙會五州之境治涼州兵七萬三千人朔方節度捍禦突厥統經略豐安定逺三軍三受降城安北單于二都護府屯靈夏豐三州之境治靈州兵六萬四千七百人河東節度與朔方犄角以禦突厥統天兵大同橫野岢嵐四軍雲中守捉屯太原府欣代嵐三州之境治太原府兵五萬五千人范陽節度臨制奚契丹統經略威武清夷靜塞恆陽北平高陽唐興橫海九軍屯幽薊媯檀易恆定漠滄九州之境治幽州兵九萬一千四百人平盧節度鎮撫室韋鞨統平盧盧龍二軍榆關守捉安東都護府屯營平二州之境治營州兵三萬七千五百人隴右節度備禦吐蕃統臨洮河源白水安振威戎漠門寧塞積石鎮西十軍綏和合川平夷三守捉屯鄯廓洮河之境治鄯州兵七萬五千人劔南節度西抗吐蕃南撫蠻獠統天寶平戎昆眀寧逺澄川南江六軍屯益翼茂當雋柘松維恭雅黎姚悉十三州之境治益州兵三萬九百人嶺南五府經略綏靜夷獠統經略清海二軍桂容雍交四管治廣州兵萬五千四百人此外又有長樂經略福州領之兵千五百人東萊守捉萊州領之東牟守捉登州領之兵各千人凡鎮兵四十九萬人馬八萬餘匹其後有淮南河南江東成德鎮州宣武汴宋亳鎮海浙西義成滑州淮寧淮西彰義申光蔡義武易定奉義安黃忠武陳許武寧徐州永安荆南天平山東河陽淮孟歸義瓜沙伊肅等十一州戎昭金州義昌滄景德山南襄郢唐鄧俱置節度使有以親王遙領者如開元十五年以慶王潭為涼州都督兼河西節度大使忠王俊為單于大都護朔方節度大使之類是也有以宰相遙領者如兵部尚書河西節度副大使知節度事蕭嵩除同中書門下平章事節度如故又李林甫遙領隴右節度楊國忠遙領劔南節度是也蕭嵩以牛仙客為留後李林甫以杜希望為留後楊國忠以李察崔圎為留後宋興節度觀察使事務悉歸於本州知州通判兼總之節度使無定員恩數與執政同初除鎖院降麻恩禮尤異祖宗時以待宗室近屬外戚國壻年勞久次者若外任除殿帥始授此官亦止於一貟或有功勳顯著任帥守於外及前宰執拜者不輕授又遵唐制以節度使兼中書令或侍中或中書門下平章事皆謂之使相以待勳賢故老及宰相久次罷政者隨其舊職或檢校官加節度使出判大藩通謂之使相元豐以新制始改為開府儀同三司舊制敕出中書門下故事之大者使相繫銜至是皆南省奉行則開府不預矣八年鎮江軍節度使檢校太傅韓絳為開府儀同三司判大名府元祐五年太師平章軍國重事文彥博為開府儀同三司守太師充護國軍山南西道節度使致仕自崇寧五年司空左僕射蔡京為開府儀同三司安逺軍節度使中太一宫使其後故相而除則有劉正夫余深前執政則有蔡攸梁子美外戚則有向宗回宗良鄭紳錢景臻殿帥則有高俅內侍則有童貫梁師成宣和末節度使至六十人議者以為濫親王皇子二十六人宗室十一人前執政二人大將四人外戚十人宦者恩澤計七人中興諸州升改節鎮凡十有二是時諸將勳名鼎盛有兼兩鎮三鎮者實為希闊之典國朝元臣拜兩鎮節度使者才三人韓魏公文潞公中興後呂成公是也三公卒辭之而諸大將若韓張吳嶽楊劉之流率至兩鎮節度使其後加至三鎮者三人韓蘄至鎮南武安寧國張循至靜江寧武靖海劉安城至護國寧武保靜其後相承宰執從官及后妃之族拜者不一然自建炎至嘉泰宰相特拜者六人吕忠穆張忠獻虞忠肅皆以勳史會稽王以舊趙衛公葛文定以恩執政一人葉右丞夢得從官二人而已張端眀澄楊敷學倓惟紹興中曹勛韓公裔乾道中曾覿嘉泰中薑持立譙令雍皆以攀附恩澤亦纍官至焉非常制也國初外戚罕有建節者太祖時杜審進以元舅之尊窮老才得節度使仁宗用張堯佐一時名臣力爭之其後除拜寖多中興後外戚節度使二十有二人哲廟以前節度使未有以恩澤除者若王顯張旻輩雖以舊恩貴然皆以嘗任宰府乃得之崇寧後始除郭天信朱勔其後童貫楊戬凡十餘人中興後曹勛曾覿輩以攀附恩建節石林葉氏曰節度使旌節門旗二龍虎旌一節一麾槍二凡八物旗以紅繒為之九幅上為塗金銅龍頭以揭旌加木盤節以金銅葉為之盤三層加紅絲為旌麾槍亦施木盤豹尾以赤黃布畫豹文皆以髹漆為杠文臣以朱武臣以黑旗則綢以紅繒節及麾槍則綢以碧油故謂之碧油紅斾受賜者藏於公宇私室皆别為堂號節堂每朔望之次日祭之號衙日唐制有六纛今無有也容齋洪氏隨筆曰唐節度使𢃄檢校官其初只左右散騎常侍如李訴在唐鄧時所稱者也後乃轉尚書及僕射司空司徒能至此者蓋少僖昭以降藩鎮盛強武夫得志才建節鉞其資級已高於是復升太保太傅太尉其上惟有太師故將帥悉稱太尉元豐定官制尚如舊貫崇寧中改三公為太師太傅太保而以太尉為武階之冠以是凡管軍者猶悉稱之紹興間葉夢得自觀文殿學士張澄自端眀殿學士拜節度葉嘗任執政以暮年擁旄為儒者之榮自稱葉太尉張微時用鄧洵武給使恩出身羞為武職但稱尚書如故其相反如此又曰太祖有天下將收藩鎮威柄故漸行改革至於位至侍中中書令使相者其髙僅得東宮官次但居環衛鳳翔王晏為太子太師安逺武行德為太子太傅護國郭從義為左金吾上將軍自後不復舉行矣承宣使唐中世以後節度使往往自擇將吏號為留後宋朝沿唐制方鎮有節度觀察使留後又官制舊典祖宗時留後惟宗室國戚自當敘遷若外官唯馬步軍都指揮使方就除焉馬軍帶留後步軍帶觀察餘無至者獨內臣任都知久次官至延福宫使景福殿使者方𢃄留後觀察皆為遙郡止於防禦使而已政和七年詔觀察留後乃五季藩鎮官以所親信留主後務之稱不可循用可冠以軍名改為承宣使承宣觀察防禦團練使刺史無定員除落階官為正任未落階官者為遙郡朝謁御宴惟正任預焉遙領者並止本官敘遷正任者次第轉行靖康元年臣僚言遙郡正任恩數遼絶自遙郡遷正任者合次第轉行今有自遙郡與落階官而授正任直超轉本等正官是皆姦巧希進躐取乞應遙郡承宣使有功勞除正任者止除正任刺史從之觀察使唐貞觀初遣大使十三人巡省天下諸州水旱則遣使有巡察安撫之名神龍三年以五品以上二十人為十道巡察使察舉州縣再周而代景雲三年置十道按察使道各一人開元二年曰十道按察採訪處置使二十年曰採訪處置使分十五道天寶末又兼黜陟使乾元元年改曰觀察處置使又事物紀原以為至道元年置觀察使與志不同當考掌察所部善惡舉大綱凡奏請皆屬於州歲以八月考其治以豐稔為上考省刑為中考辦稅為下考宋朝沿唐制置諸州觀察使凡諸衛將軍及使遙領者其資品並止本官敘防禦團練使刺史亦同祥符中詔觀察使並帶刺史翰林學士陳彭年檢討唐以來故事觀察使並合帶刺史詔自今除觀察使可兼領之政和中詔承宣觀察使仍不𢃄持節等防禦使唐武后聖歷元年以夏州鎮領防禦使防禦使之名自此始開元二年薛訥為隴右防禦使天寶中安祿山犯順大郡要地當賊衝者置防禦守捉使事物紀原又唐職官志云至德後置節度使大郡要害之地置防禦使以治軍事刺史兼之不賜節與紀原不同今兩存之當考代宗即位諸州防禦使並停眀年授田承嗣魏博等州都防禦使俄遷節度使蓋防禦使之名不廢也大率防禦𨽻所治州嵗以八月考其治否以無虞為上考清苦為中考政成為下考宋朝沿唐制置諸州防禦使唐防禦使在團練使之下宋朝升之於上職略云官制舊典防禦團練刺史均謂之正任外官初除管軍便帶正任刺史或隨其人見帶遙郡就除之其橫行諸司使𢃄遙郡防禦使者年勞至深邉功優異即落遙郡為正任官其團練使刺史則無法落遙郡也以上應管軍臣僚因乞改軍職遂以本官出守或領副總管方有帶正任者其宗室國戚除再遷便領正任乃國朝舊制團練使唐肅宗乾元初置團練使守捉使大領十州小者三五州代宗時元載當國令刺史悉帶團練唐職林李少良傳大歷八年晉州男子郇謨欲以三十字上獻多譏切元載其言團者願罷諸州團練使少良尋為載所殺大率團練皆𨽻所治州歲以八月考其治否以安民為上考懲姦為中考得情為下考宋朝沿唐制諸州團練使刺史漢武帝元封五年初置部刺史掌奉詔條察州秩六百石員十三人唐武德元年改太守曰刺史加使持節從三品職同牧尹宋制諸州刺史無定貟外官初除管軍便𢃄正任刺職隨其人見帶遙郡就除之其橫行諸司使帶遙郡防禦使者年勞至深或邉功優異即落遙郡為正任官靖康元年臣僚言遙郡正任恩數遼絶自遙郡遷正任者合次第轉行今有自遙郡與落階官而授正任直超轉本等正官是皆姦巧希進躐取乞應遙郡承宣使有功勞除正任者止除正任刺史從之按節度使在唐為閫帥觀察團練使在唐為監司防禦使在唐為邉將刺史在唐為郡守至宋則閫帥監司邉將郡守各别有以名其官而節度承宣觀察團練防禦刺史則俱無職任特以為武臣遷轉之次第故序其事於將軍都尉之後諸路將官宋神宗留意武備本以捍西北二方而推其法於東南故西北為多東南為少陕西諸路四十二將河北諸路三十七將而東南才十三將元豐四年詔東南諸路團練諸軍馬十三將淮南東路第一西路第二兩浙西路第三東路第四江南東路第五西路第六荆湖北路第七南路潭州第八全邵永三州備廣西應授第九福建路第十廣東路第十一西路桂州第十二雍州第十三合諸路九十二將各有正副軍中行圗陳隊調發賞罰皆關決於將副宣和六年詔元祐元年司馬光請盡罷諸路將官其禁軍各委本州縣長吏與總管鈐轄都監押等轄一如未置將官以前之法而樞密院難之止詔諸路將副在州駐劄不係路分兵官知州并州鈐轄兼充者並差將官一貟兼本州都監其單將駐劄處勿復差兼宣和五年御筆諸路將副剖隊自今並依元豐法選差乾道四年密院奏諸州揀中弓弩手雖已差路分鈐轄都監春秋詣諸路巡按緣逐州未有將官專一日逐訓練恐致事藝生踈詔諸州各置準備將一貟專一管轄日逐訓練揀中弓弩事藝考宗會要哲宗職官志諸路將官掌統制所𨽻禁旅以行陳隊伍金鼓幟職弓矢擊刺之法而教習訓練之别其武藝精強者待次遷補以激勸士卒凡兵仗器甲之數廪祿犒給賞罰約束之禁令皆掌焉副將為之二若屯戍防邉則受帥司節制禦寇敵則審其戰守應授之事若師有功則具馘數籍用命者而旌賞之焉元祐初右僕射司馬光乞罷諸路將官疏曰臣竊見國朝以來置總管鈐轄都監監押為將帥之官凡州縣有兵馬者其長吏未曾不兼同管轄蓋知州即一州之將知縣即一縣之將故也先帝欲征伐四夷患諸州兵官不精勤訓練士卒懈弛於是有建議者請分河北陕西河東亰東亰西等路諸軍若干人為一將别置將官使之專功訓練其逐州總管以下及知州知縣皆不得關預及有差使量留羸弱下軍及剩貟以充本州官白直及諸般差使其餘禁軍皆制在將官專事教閲臣愚以為職事修舉在於擇人不在設官茍得其人雖總管等皆能訓練士卒不得其人雖將官亦何所為况今之將官即向之為總管者也豈為總管則不能舉職為將官乃能舉職乎此徒變易其名無益事實非維無益兼復有害凡設官分職當上下相維如身之使臂臂之使指紀綱乃立今為州縣長吏及總管等官而於所部士卒有不相統攝不得差使殆如路人者至於倉庫守宿街市巡邏亦皆乏人雖於條許差將下兵士而州縣不能直差須牒將官將官往往占護不肯差撥萬一有非常之變州縣長吏何以號令其衆制禦姦宄哉都統晉孝武帝太元十九年有河西大都統唐天寶末置為天下兵馬元帥都統朔方河東北平盧節度使都統之名始於此乾元元年户部尚書李峘除都統淮南江東西節度使宣慰觀察處置等使都統之官始於此唐制或總五道或總三道上元末省大中後討徐州以康承訓討黃巢以荆王鐸為都統黃巢之難置諸道行營都統掌征伐兵罷則省雖總諸道兵馬不賜旌節宋朝諸軍都統制者自渡江已前亦有之然未為官稱蓋是時陕西河東三路皆以武臣職髙有智略者為馬步軍副都總管遇出師征討則加以都統制軍馬之名猶今節制軍馬之類非有司分也建炎元年置御營司遂擢王淵為都統制都統制名官自此始大槩南渡置統制一則兵興稱謂不一諸路起兵有自稱統制者州縣管押勤王兵者亦有稱統制者諸道都總管及諸司便宜差統制者建炎初劉光世上言於是並罷惟中都主兵朝廷差充統制者仍舊紹興初諸大將改為行營五護軍四年吳玠升宣撫副使其弟為右護軍都統制十一年韓世忠張俊嶽飛除樞密使副使罷宣撫司其統領將副並改充御前𨽻樞密院各𢃄御前字入銜其兵馬就令所部統制官節制而都統皆以屯駐名冠軍額之上獨川陕如故恩數略視三衙權任在帥臣之右官卑者稱副都統制設屬有計議機宜幹辦公事凖遣十九年漢沔兩大將改為御前諸軍璘稱利州西路駐劄御前諸軍都統制政稱利州東路駐劄御前諸軍都統制郭浩時已死故金州無都統制但以知州兼節制嘉定初蜀叛既平安丙又奏分興州十軍為沔利三軍沔州除都統制利州除副都統制天下有十都統矣初烏珠犯泗州詔樞密使張俊於鎮江府置司措置江淮守備俊發張憲事併嶽飛死俊遂薦其將定逺軍節度使田師中掌故嶽飛之兵又薦清遠軍節度使王德往金陵於是並詔為御前都統制師中於鄂州德於建康府駐劄副都統唐興元中置副都統宋朝紹興中亦有副統制隆興二年詔應諸軍副都統制並罷乾道三年五月陳天麟奏荆南都統王宣久病邉報不一恐緩急誤事蔣芾奏貟琦為副都統同管軍閏七月上謂宰執曰朕欲江上諸軍各置副都統制一貟令兼領軍事豈惟儲他日統制亦使主將有所顧忌於是以郭剛為鎮江副都統制張榮為建康副都統制三省樞密院定制云已復置在外副都統制禆贊主帥商議軍事覺察姦弊所有本司文字與都統連銜調發軍馬併聽都統指揮月旦亦許上表平江許浦水軍乾道間置副都統以領之統制統制統領官三衙及御前軍將佐也祖宗時禁兵但以路分都監等領之渡江後大軍又有統制同統制副統制統領同統領副統領等其下乃有正將副將凖備將之名皆偏裨也舊制凖備而上自主帥升差仍先申樞密院定察紹熙四年詔江上升差統制至凖備將令主帥解發三人赴總領所內選一名慶元三年詔升差並委主帥自是主帥之權復重矣都總管副總管附魏黃初始置都督諸州軍事後周改都督諸軍事為總管武帝時以王謙為益州總管之名始此隋文帝以并益荆楊四州置大總管其餘總管府置於諸州列為上中下三等加使持節煬帝改帥都督為旅帥唐諸州復有總管亦加使持節武德初邉要之地亦置宋朝馬步軍都總管以節度使充副總管以觀察以下充有止一州者有數州為一路者有帶兩路三路者或文臣知州則管勾軍馬事舊相重臣亦為都總管有禁兵駐泊其地者冠以駐泊之名咸平發三路都總管景德詔鎮定兩路併為一路諸路並去行營之名止為駐泊總管慶歷三年詔近分陕西緣邉為四路各置經略安撫招討等使自今路分總管鈐轄以上許與都總管司同議軍事路分都監以下並聽都總管等節制違者以軍法論七年析河北四路各置都總管一貟如無止以安撫使總制諸路八年諸州部署並改兵馬總管副總管又職略總管舊曰部署因廟諱改焉又續會要云兩朝國史志有兵馬總管副總管凡武臣以諸司使以上充文臣以兩省五品以上充一州即為兵馬總管一路即為步軍總管副總管建炎元年李綱言守備當於沿河沿淮沿江置帥府要郡以控扼其帥府文臣一貟帶安撫使馬步軍都總管武臣一貟充副總管改路分為副總管路鈐轄為副鈐轄州鈐轄為副都監遇朝廷起兵則副總管為帥副鈐轄都監各以兵從出聽其節制正官願行者聽紹興二年詔郡守臣罷帶兵職諸路副總管可依舊改充路分鈐轄五年密院言東南多事合要近上兵官總領軍政乃詔兩浙江南荆湖福建廣東可依三路置總管於帥府七年淮東置總管十二年諸路並置州總管一貟都副鈐轄州鈐轄附宋初以朝官及諸司使以上充或一州或一路或兩路三路亦有無都字者嘉祐詔內臣為鈐轄都監者逐路止置一貟祖宗時不常置成都大府帥臣第𢃄兵馬鈐轄而兩武臣之為鈐轄者與鈞禮張詠知益州羣盜充斥詠一日召鈐轄以州印付之曰盜勢如此而鈐轄晏然無討賊心是必欲詠自行也鈐轄宜權州事鈐轄驚曰某今行矣詠置酒餞之曰鈐轄今往必破賊若無功而還必斷頭於此樓下鈐轄震栗遂平賊而還焉又續會要載兩朝國史云官髙資深充都鈐轄官卑資淺稱鈐轄建炎三年詔要郡守臣兼兵鈐轄改為路分都監而帥府如故自從益瀘廣桂五州牧皆以都鈐為稱而江西贛州以多盜其守臣亦帶江西兵馬鈐轄至於武臣為路鈐者亦無尺籍伍符然每嵗猶往諸州按閲特存故事而已間有得旨葺治軍器或訓練禁軍者則仍帶入銜二十八年鎮江府守楊揆言舊政法一路則有路分鈐轄一州則有州鈐轄如常秀平江皆有之獨鎮江闕欲添置州鈐轄從之淳熙間詔諸路訓練路鈐並要年六十以下曾經從軍有才武人充紹熙初詔雜流出身不得注路分州鈐都監専注才武及曾任主兵官之人兵馬都監州都監附宋朝兵馬都監有路分掌本路禁旅屯戍邉防訓練之政令以肅清所部建炎三年以要郡守臣帶本路兵馬都監武臣一貟充副都監紹興三年罷守臣兼兵職而副都監如故州都監則以大小使臣充掌本城屯駐兵甲訓練差使之事兼在城巡檢資淺者為監押或雜用文臣其後止用武臣巡檢宋朝有沿邉溪洞都巡檢或蕃漢都巡檢或數州數縣管界或一州一縣巡檢掌訓練甲兵巡邏州邑擒捕盜賊事又有刀魚船戰棹巡檢江河淮海置捉賊巡檢又巡馬遞鋪巡河巡捉私茶鹽等各視其名分以修舉職業皆掌巡邏機察之事中興後凡沿江沿海招集水軍控扼要害及地分濶逺處皆置巡檢一員往來接連合相應援處則置都巡檢以總之皆以才武大小使臣充各隨所在聽州縣守令節制本寨事並用取州縣指揮若海南瓊管及歸峽荆門等處跨連數郡控制溪洞又置水陸都巡檢使或三州都巡檢使以增重之文獻通考卷五十九
