body:
  text: 文獻通考卷九十四鄱陽馬端臨貴與著宗廟考四天子宗廟英宗治平初景靈宫西園作仁宗神御殿曰孝嚴别殿曰寜真齋殿曰迎釐景靈西門曰廣祐眀年奉安次日太后酌獻大臣分獻天興諸殿特支在京諸軍班錢初真宗大中祥符五年以聖祖臨降作景靈宫至天聖元年二月詔修宫之萬夀殿以奉真宗皇帝殿成榜曰奉真眀道二年又建廣孝殿十月二十九日奉安章懿皇后神御儀衞迎導祭告皆如天聖二年奉真殿禮治平元年三月又詔就宫之西園建殿以奉仁宗皇帝八月殿成榜曰孝嚴二年四月十七日奉安御容帝親行酌獻命大臣分詣諸神御代行禮翌日皇太后酌獻皇后大長公主以下内外命婦陪位於庭詔每嵗下元朝謁如奉真殿儀九月詔名齋殿曰迎釐十二月名宫之西門曰廣祐凡七十年間神御在宫者四其他寓諸寺觀者十一所元豐五年神宗皇帝始就景靈宫作十一殿在京宫觀寺院神御悉皆迎奉入内盡合帝后而奉以時王之禮元祐元年作宣光殿後改為徽音殿紹聖二年作顯承殿元符三年作西宫以顯承殿為館御之首易名曰大眀又作坤元殿重光殿政和四年作柔儀殿於是兩宫合為前殿九後殿八山殿十六閣一鐘樓一碑樓四經閣一齋殿三神厨二道院一東宫正南門曰景靈宫門門内有東西横門其北曰天興殿門門内曰天興殿以奉聖袓九天司命天尊大帝玉石像刻真宗皇帝聖容侍立大中祥符五年作及奉僖祖皇帝順祖皇帝翼祖皇帝版位元豐五年祔東西廊門曰左右正元殿後門曰保寧以奉元天大聖后像大中祥符五年作及文懿皇后惠明皇后簡穆皇后孝惠皇后孝章皇后淑徳皇后章懐皇后版立元豐五年祔閣上奉聖祖及六僊官大中祥符五年作自西横門西出凡前後殿各三曰天元殿以奉宣祖皇帝山殿曰来寧其後曰太始殿以奉昭憲皇后山殿曰宴娭次西曰皇武殿以奉太祖皇帝山殿曰靈㳺其後曰儷極殿以奉孝眀皇后山殿曰凝神又西曰大定殿以奉太宗皇帝山殿曰天㳺其後曰輝徳殿以奉懿徳皇后眀徳皇后元徳皇后山殿曰冷風自東横門東出凡前後殿各三曰熈文殿以奉真宗皇帝山殿曰太虚其後曰衍慶殿以奉孝穆皇后章獻眀肅皇后章懿皇后山殿曰丹臺次西曰美成殿以奉仁宗皇帝山殿曰晨霄其後曰繼仁殿以奉慈聖光獻皇后山殿曰靈崑又西曰治隆殿以奉英宗皇帝山殿曰昭清其後曰徽音殿以奉宣仁聖烈皇后山殿曰寧真齋殿在天興殿之東曰眀福西曰迎釐神厨道院皆在宫之西南西宫正南門曰燕昌門其北曰大眀殿門門内曰大眀殿以奉神宗皇帝山殿曰靈徳其後曰坤元殿以奉欽聖憲肅皇后欽成皇后欽慈皇后山殿曰顯光其西曰世徳門其北曰重光殿門門内曰重光殿以奉哲宗皇帝山殿曰靈臺其後曰柔儀殿以奉昭懐皇后山殿曰靈娭齋宫在宫之東偏正南曰昭徳門門内曰潔誠殿神厨正宫之東南殿閣齋宫及廊廡共為屋二千三百二十區凡累朝文臣執政官武臣節度使以上並圖形於兩廡元豐時修定儀注所言先王之制設廟於前以象生之有朝設寝於後以象生之有寝廟以蔵木主列昭穆之序寝有衣冠几杖象平生之居先儒謂薦其血毛腥其爼為薦上古之食退而合享體其犬豕牛羊為薦今世之食儀禮曰燕飬饋羞湯沐之饌如他日者鄭氏云孝子不忍一日廢其事親之禮故也後世因之故方其薦上古之食於廟則時王之制有所不行薦今世之饌於寝則先王之禮有所不用有唐追尊老氏立太清宫於西都凡将郊祀必先朝焉嵗四孟月亦先薦焉天寳詔曰我祖澹然常在為道之宗既殊有盡之期湏依生事之禮以祭用質眀乃尚隂之義故改以卯初冕服策祝非事生之謂故停而不用章聖皇帝席厚徳之流光推璿源之自出乃崇琳館以事聖祖雖採太清之儀實兼原廟之制聖聖纂承益昭前烈然而如在之容或寓於浮圖之祠朝拜之日尚因於道家之禮至於儀物雜以古今義或未稱時亦有待陛下純孝自天至誠繼志肆宏屋宇裒合僊聖規模恢廓咸出睿畫旬嵗之間其功大就将期落成之始聿嚴親饗之事爰勅有司議其典式伏按原廟雖出於近世餘意乃祖乎先王夫孝子之於親事亡如事其生思之欲見其人齋三日必見其所為齋者不敢以生事之故有廟焉示不忘古所以神之也不敢以亡事之故有寝焉以象其平生所以親之也多方以求之而其肹饗如在左右故曰唯孝子為能饗親陛下比詔禮官講眀太廟之禮斷之以古其非先王之法者去而弗用則今日設原廟之禮宜酌今制猶前日之詔意也周官四時之祭春曰祠夏曰禴秋曰嘗冬曰烝皆於首時盖君子感時物之變而思其親得疏數之中者也伏請以四孟月吉朝獻景靈宫天子常服行事薦聖祖殿以素饌神御殿以饍羞噐服儀物悉從今制登降薦獻參酌朝謁之儀凡古之事一切不違以合先王事亡如存之義縁饗儀注乞下夲所詳定從之時祖宗帝后神御皆寓於宫觀寺院在京師者十有五神宗作景靈宫而在京寺觀神御悉迎奉入内所存者惟萬夀觀延聖廣愛寧華三殿焉後又詔宗室宫院有祖宗御容遣内侍奉迎藏於天章閣自是臣庶之家凡有御容悉取藏禁中治平四年神宗已即位英宗皇帝将祔廟太常禮院請以神主祔於太廟第八室僖祖皇帝文懿皇后神主依唐故事祧藏於西夾室自仁宗而上順祖以次升遷請下兩制以上參議翰林學士承㫖張方平等議同堂入室廟制已定僖祖當祧合於典禮九月奉安入室帝后神主奏告太廟祧藏僖祖皇帝文懿皇后神主於西夾室祔英宗於太廟罷僖祖諱及文懿皇后忌日熈寧五年中書門下言夲朝自僖祖以上世次不可得而知則僖祖有廟與商周稷契疑無以異今毁其廟而藏主於夾室替祖考之尊而下祧於子孫殆非所以順祖宗孝心事亡如存之義請以所奏付之兩制詳議而擇取其當者時王安石為相不主祧遷之議故復有此請乃復奉僖祖於太廟遷順祖神主藏於夾室翰林學士元絳知制誥王益柔陳繹曾布直舍人院許将張琥上議曰自古受命之王既以功徳饗有天下皆推其夲統以尊事其祖故商周以契稷為始祖者皆以承其夲統而非以有功與封國為重輕也諸儒以契稷有功於唐虞之際故謂之祖有功若必以有功而為祖則夏后氏不郊鯀矣今太祖受命之初立親廟自僖祖以上世次既不可得而知則僖祖之為始祖無疑矣倘謂僖祖不當比契稷為始祖是使天下之人不復知尊祖而子孫得以有功加其祖考也𫝊曰毁廟之主陳於太祖未毁廟之主皆升合食於太祖今遷僖祖之主而藏於太祖之室則是僖祖順祖翼祖宣祖祫祭之日皆降而合食也情文不順無甚於此請以僖祖之廟為太祖則合於先王之禮意翰林學士韓維議曰昔先王既有天下迹其基業之所由起奉以為太祖所以推功美重夲始也故子夏序詩稱文武之功起於后稷後世有天下者特起無所因故遂為一代太祖太祖皇帝孝友仁聖睿知神武兵不血刃坐清大亂子孫遵業萬世䝉澤功徳卓然為宋太祖無可議者僖祖雖於太祖為髙祖然仰迹功業未見其有所因上尋世系又不知其所以始若以所事契稷奉之竊恐於古無考而於今亦有所未安今之廟室與古殊制古者每廟異宫今祖宗同處一堂而西夾室在順祖之右考之尊卑之次似亦無嫌天章閣待制孫固請特為僖祖立室由太祖而上親盡迭毁之主皆藏之當禘祫之時以僖祖權居東向之位太祖順昭穆之列而從之取毁廟之主而合食則僖祖之尊自有所申以僖祖立廟為非則周人别廟姜嫄不可謂非禮祕閣校理王介請依周官守祧之制創祧廟以奉僖祖庶不下祧子孫夾室以替逺祖之尊議既上帝頗以韓維之説為是而王安石以維言夾室在右為尊與固言禘祫僖祖居東向之説為非理帝亦然又問前代郊配與宗祀明堂之禮安石以尊僖祖為始祖則郊祀當以配天若宗祀眀堂則太祖太宗當迭配帝又疑眀堂以英宗配天與僖祖為始祖之説遂下禮官詳定同判太常寺兼禮儀事張師顔同知禮院張裕梁夀等議曰昔者商周之興夲於契稷故奉之為太祖後世受命之君功業特起不因前代則親廟迭毁身自為祖鄭康成云夏五廟無太祖自禹與二昭二穆而已唐張薦云夏后以禹始封遂為不遷之祖是也若始封世近上有親廟則擬祖上遷而太祖不毁魏祖武帝則䖏士迭毁唐祖景帝則洪農迭毁此前世祖其始封之君以法契稷之眀例也唐韓愈有言事異商周禮從而變晋瑯琊王徳文曰七廟之義自由徳厚流光饗祀及逺非是為太祖申尊祖之祀其説是也禮天子七廟而太祖之逺近不可以必故但云三昭三穆與太祖之廟而七未嘗言親廟之首必為始祖也國家以僖祖親盡而祧之奉景祐之詔以太祖皇帝為帝者之祖是合於禮矣國初張昭任澈之徒不能逺推隆極之制因緣近比請建四廟遂使天子之禮下同諸侯若使廟數備六則更當上推兩世而僖祖次在第三亦未可謂之始祖也謹按建隆四年親郊崇配不及僖祖開國以来大祭虚其東向斯乃祖宗已行之意也請略倣周官守祧之制築别廟以藏僖祖神主大祭之嵗祀於其室太廟則一依舊制虚東向之位郊配之禮則仍其舊同知太常禮院蘇棁請即景靈聖祖之宫袝安僖祖即與唐祔獻懿二祖於興聖眀徳廟禮意無異同判禮儀事周孟陽知太常禮院宋充國禮院檢詳文字楊傑議玉牒帝系自僖祖而上世次莫知則僖祖為始祖無疑宜以僖祖配感生帝其舊制以祖宗配侑並無更易人情禮意莫不為順同判太常寺兼禮儀事章衡請尊僖祖為始祖而次祧順祖以合子為父屈之義推僖祖侑感生之祀而罷宣袓配位以合祖以孫尊之義餘且如舊制帝以羣議紛紜不能决而馮京欲以太祖正東向之位安石力主元絳等初議遂從之帝問配天孰從安石曰宣祖見配感生帝欲改以僖祖配帝然之於是請奉僖祖神主為太廟始祖遷順祖神主藏之夾室孟春祀感生帝以僖祖配詔下太常禮院詳定儀注安石夲議欲以僖祖配天帝不許故更以配感生帝元豐元年詳定郊廟禮文所言古者父子異宫祖彌異廟今之廟制與古不侔遂圖上八廟異宫之制以始祖居中分昭穆為左右自北而南僖祖為始祖翼祖太祖太宗仁宗為穆在右宣祖真宗為昭在左皆南面北上詔詳定夲朝可行典禮陸佃張璪所議昭穆之位各不同佃璪詳議見朱子論古今廟制條下詔俟廟制成日取㫖晦庵嘗言太祖昭穆廟制一事千五六百年無人整理且以為神宗嘗討論舊典將復古制而惜其未及營建愚以為後王之失禮者豈獨廟制一事而廟制之説自漢以来諸儒講䆒非不詳明而卒不能復古制者盖有由矣如天子七廟三昭三穆并太祖之廟而七太祖百世不遷一昭一穆為宗亦如之餘則親盡迭毁其制則外為都宫内各有寝廟别有門垣太祖在北東向左昭右穆以次而南夫人而能知之也然此乃殷周之制殷以契為太祖而成湯及三宗則為有功徳不毁之廟周以稷為太祖而文武則為有功徳不毁之廟其餘則親盡而毁夫契稷皆有大功於生民以此受封𫝊世至於湯武受命興王推其所自夲於稷契故奉之以為太祖舉無異詞若後之有天下者則皆功業特起不因前代然既即帝位必以天子之禮事其祖考如漢之太公晋之征西豫章唐之宣懿景元宋之僖順翼宣皆帝者之祖宗享七廟之嚴奉可也若推以為太祖而比之稷契則固不侔矣是以韋元成劉歆諸人講論廟制備矣而終不能復殷周之制者盖太祖之位未定故也古之祫祭盖奉太祖與毁廟未毁廟之主而合祀之其制則太祖東向左昭右穆以次為位而祭之然唐世以景帝為太祖唐公李丙髙祖父當中睿間則景帝世近在三昭三穆之内故禘祫則虚東向之位而太祖列於昭穆至代宗以後景帝方居第一室禘祫得以正位然獻懿二祖景帝之祖父親盡已毁而禘祫則合祭故當時建議者請景帝禘祫之時暫居昭穆屈己以奉祖宗而以獻祖東向然則唐世之祫祭如太祖東嚮之位其始也虚之其末也則景獻二帝迭處之矣然祭祀乃一時之禮虚其位可也迭䖏其位亦可也宗廟有百世之䂓既立太祖之廟不可復虚既入太祖之廟不可復遷姑以熙寧之事言之當時以僖祖為太祖而自翼祖以下至英宗為三昭三穆是矣然禧祖夲無功徳非宋所以興而肇造區夏光啟後裔者藝祖太宗也今僖祖為百世不遷之太祖而藝祖太宗則親盡而毁之可乎藉曰以二祖同文武世室亦百世不毁然周之文武其功徳未嘗居后稷之右今以僖祖為太祖而藝祖太宗僅同世室終不足以厭人心盖宋太祖之廟非藝祖不足以當之而神宗之世纔及五代以藝祖為太祖則七廟未可立也漢以来崛起而有天下者必合以天子之禮事其祖考於是尊為始祖或推以配天固不容論其功業之有無也逮其𫝊世既久子孫相承則自當以建邦啟土創業垂統者為太祖而創業者所祖之祖固未可以言百世不遷矣盖後世太祖之位隨世而遷太祖之議世各異論不能如殷契周稷之定於有天下之初而後世子孫竟無以易也然則歴代所以不能復殷周七廟之制者非不知古禮也正以追尊之祖無一人可以擬稷契者是以太祖之議難决而太祖之位未定故耳三年詳定禮文所言古者宗廟為石室以藏主謂之宗祏夫婦一體同几共牢一室之中有左主右主之别正廟之主各藏廟室西壁之中遷廟之主藏於太祖太室北壁之中其埳去地六尺一寸今太廟藏主之室帝后異䖏遷主仍藏西夾室求之於禮有所未合請新廟既成並遵古制從之六年詔太祖孝惠皇后孝章皇后太宗淑徳皇后真宗章懐皇后自别廟升祔太廟詳見后妃廟門哲宗元祐元年禮部太常寺言有天下者事七世嘉祐詔書定七世八室之制今神宗皇帝崇祔有日僖祖皇帝為始祖萬世不遷翼祖皇帝在七世之外於世次當祧先皇帝神主祔於太廟第八室翼祖皇帝簡穆皇后劉氏神主依唐故事祧藏於西夾室置西壁石室中列於順祖皇帝惠眀皇后之次自英宗皇帝上至宣祖皇帝以次升遷其祧藏之主毎遇祫享即如典禮從之紹聖元年祔宣仁聖烈皇后神主於太廟元符三年五月時徽宗已即位禮部太常寺言晋成帝時宗廟十室至康帝以成帝之弟承統不遷京兆府君始増一室為十一室合於温嶠等諸儒全七世之議考之歴代於禮為宜今哲宗升祔宜如晋成帝故事於太廟殿増一室候廟成日神主祔第九室詔下侍從祕書省長貳參議乃權祔於太廟夾室權知開封府吴居厚等議曰以兄弟為世則親親之恩未盡而廟食已毁宜如禮部太常寺所請太廟増一室翰林學士承㫖蔡京議曰哲宗嗣神宗皇帝大統父子相承自當為世今若不祧逺祖不以哲宗為世則三昭四穆與太祖之廟而八宜深考載籍遷祔如禮吏部侍郎陸佃黄裳刑部侍郎郭知章中書舍人曽肇樞宻都承㫖范純禮議曰國朝自僖祖而下始備七世故英宗祔廟則遷順祖神宗祔廟則遷翼祖今哲宗皇帝於神宗父子也如禮官所議更増一室則廟中當有八世况唐文宗即位則遷肅宗以敬宗為一世故事不逺将来哲宗皇帝祔廟當以神宗為昭上遷宣祖以合古三昭三穆之義詔如禮官所議先是李清臣為禮部尚書首建増室之議侍郎趙挺之等和之㑹清臣為門下侍郎論者多從其議惟曽肇等議異而蔡京别議與肇同二議既上清臣辯説甚力帝訖從之六月禮部請用太廟東室一間奉安哲宗神主詔依所請太常寺言若就東夾室奉安不唯廟室不正兼狹隘不可容奉神之物請依八室制度増建一室依舊存立夾室詔依初㫖權行奉安太常少卿孫傑又言今先帝神主措之夾室即是不得祔於正廟與前詔増建一室之義不同昨用嘉祐故事專置使修奉而修奉之使乃請以夾室奉安神主亦與元置使之意相違請如太常前議増建一室尚書省言先皇帝祔享太廟増室在東與祖宗並列今廟室未備行禮有期若告遷神主更修廟室則期日迫趣功力不及故湏權宜及時升祔隨即増修豈為簡薄比之前代修廟室不及權宜設幄行事者不為不至詔速依初㫖奉行八月癸亥帝自集英殿導哲宗神主至宣徳門外奉祠有司奉神主翰林學士承㫖蔡京題諡號行祔享之祭權祔於太廟夾室詔特置景靈西宫奉安神宗皇帝於顯承殿為館御之首昭示萬世尊異之意建哲宗皇帝神御殿於西以東偏為齋殿右正言陳瓘言近修建景靈西宫拆移元豐庫大理寺軍噐監鸞儀司等䖏以其地奉安神考哲宗神御然可得而議者有五事焉夫國之神位左宗廟右社稷今廟㩀社位不合經㫖此其可議一也刑獄之地必有殺氣今乃擇此以建宫廟此其可議者二也西宫之地雖云只移官舍不動民居而一寺一庫一監一司移於他䖏遷此就彼亦有居民此其可議者三也昔者奉安祖宗帝后神御散於寺觀之内神考合集諸殿㑹於一宫今乃析而為二嵗時酌獻鑾輿分詣禮既繁矣事神則難此其可議者四也顯承殿奉安以来一祖五宗神靈恊㑹既久何用遷徙宗廟重事豈宜輕動此其可議者五也望别行詳議瓘又言陛下所以不敢輕改前議者謂神考素有修西宫之意蔡京親聞先訓而寔録備載其語故不可以不恭依也以臣觀之此乃蔡京矯誣神考之訓無足信者元豐中神考於治隆殿後留基以待宣仁後因御史有請宣仁以其地為神考廟宫而紹聖大臣反謂宣仁輕蔑神考裁損廟制於是重建顯承殿以為奉安之地當哲宗之時蔡京最用事凡可以毁宣仁者無所不至豈有親聞神考之言可以證元祐之失而乃隠忍不聞於哲宗者乎臣是以知其為矯誣也不從詔仁宗神考廟永祀不祧詔曰盖聞有天下者事七世則迭毁之制有常祖有功而宗有徳則不遷之廟非一伏以藝祖應天順人肇造區夏太宗受命繼代底定寰宇真宗以聖繼聖撫全盛之運故仁祖並尊為百世不祧之廟恭惟仁宗皇帝躬天地之度以仁為治在位四十二年利澤施於四海蚤定大策授英宗以神噐功隆徳厚孰可擬議英宗皇帝享祚日淺未䆒施設神宗皇帝以聖神不出世之資慨然大有為於天下政令法度莫不革而新之功業盛大謙抑不居而廟祏之制未議尊崇宜令禮官稽參故事考定仁祖神考廟制詳議以聞十一月權太常少卿盛次仲等言仁宗神考請如聖詔尊崇廟祏永祀不祧與天無極於是三省表請付外施行有詔恭依崇寧二年詔祧宣祖以哲宗神主祔太廟第八室詔曰欽惟哲宗實繼神考𫝊序正統十有六年升祔之初朕方恭黙乃増一室於七世之外遂成四穆於三昭之間考禮與書曾靡有合比閲近疏特詔從臣并與禮官博盡衆見列奏来上援㩀甚明謂夲朝自僖祖至仁宗始備七世當英宗祔廟上祧順祖暨神考祔廟又祧翼祖則哲宗祔廟父子相承自當為世祧遷之序典禮可稽覽之愓然敢不敬聼其合行事件令禮部太常寺詳議聞奏十二月禮部太常寺言祧遷之序當祧宣祖昭武睿聖皇帝昭憲皇后杜氏神主藏於西夾室居翼祖簡恭睿徳皇帝簡穆皇后劉氏石室之次當遷之主每遇祫享即依典禮其祧遷祭告興工擇日學士院撰祝文望依故事詔恭依三年詔増太廟為十室復翼祖宣祖廟詔曰朕惟有天下者事七世古之道也乃者有司以哲宗皇帝嗣承神考父子相繼自當為世故上祧宣祖於夾室據經合禮已依所奏去古既逺禮文殘闕諸儒之説不同鄭氏謂太祖及文武不祧之廟與親廟四并而為七是不祧之宗在七廟之内王氏謂非太祖而不毁不為常數是不祧之宗在七廟之外惟我祖考功隆徳大萬世不祧者今已五宗則七廟當祧者二宗而已遷毁之禮近及祖考殆非先王尊祖奉先之意禮以義起稱情為夲可令有司集議典禮以聞禮官言先王之禮廟止於七後王以義起禮乃有増至九廟者詳酌典故當自朝廷禮部尚書徐鐸又言唐之獻祖中宗代宗與夲朝僖祖皆嘗祧而復令存宣祖於當祧之際復翼祖於已祧之後以備九廟禮無不稱九月詔曰有天下者事七世古之道也惟我治朝祖功宗徳聖賢之君六七作休烈之盛軼於古先尊為不祧者至於五宗遷毁之禮近及祖考永惟景祐欽崇之詔已行而不敢踰暨我元符尊奉之文既隆而不可殺雖欲如古莫可得也博考諸儒之説詳求列辟之宜顧守經無以見其全而適時當必通其變爰稽衆議肇作尋倫惟恩以稱情而為宜則禮以義起而無愧是用酌鄭氏四親之論取王肅九廟之規參合二家之言著為一代之典自我作古垂之将来庶安宗廟之靈以永邦家之福其合行典禮令禮部太常寺詳議聞奏十月詔曰仰惟翼祖在天毓璿源而濬發安陵有衍粲皇武於始基然循七世八室之規則數踰於古遵四廟五宗之法則禮未應遷是用仰奉二祧之靈復還列聖之次雖豐不昵雖逺當隆豈惟稽三代之徽猷盖亦用夲朝之故事其已祧翼祖當祧宣祖廟並復四年三月詔以復翼祖宣祖廟増太廟殿為十室尋以吏部侍郎王寧為修奉使六月九廟奉禮畢宰臣蔡京率百官拜表稱賀五年三省言西京㑹聖宫諸陵旦望節日薦獻如景靈宫令式㑹聖宫制度朴素宜加修飾凡陳設噐皿之類並三年一易違者以違制論從之髙宗建炎二年十月上幸揚州奉太廟神主於夀寧寺景靈宫神御奉安於温州建炎以来朝野雜記郡國廟國朝惟祖宗所嘗幸則有之建炎初西京被圍急㽞守孫昭逺遣其将王仔奉啓運宫神御間道走揚州後遷於福州而永安軍㑹聖宫揚州章武殿之御容則遷於温州天慶觀紹興十三年復奉温州神御還臨安奉安於萬夀觀之後殿惟啓運留福州以守臣提舉成都府新繁縣御容殿者始在重光寺藥師院雍熈間僧道輝畵太祖皇帝御容於佛屋之後壁熈寧六年趙清獻為成都守請建殿奉安神宗不許但令設板屋欄楣以扄䕶之元豐七年走馬承受趙選者更具奏得㫖修建殿宇創置門鑰宦官監守朝謁以時紹興元年終南山上清太平宫道士訾全真等復持太宗真宗御容自岐下抵宣撫使張忠獻忠獻即遣使奉安於太祖之側四年宣撫副使吴武安玠更自武興送仁宗英宗神宗御容至殿奉安二十七年楊文安椿為兵部侍郎言於朝有㫖别加營繕始更為殿門外門二十九年乃成時王時亨知府事請賜宫額及殿名不報淳熈中胡長文入蜀始議即府之聖夀寺創殿以奉御容殿宇甚華供奉之物亦寖備乃復乞宫額於朝先是長文創雄邉軍數千人列營府治之側又言石室學官聚川峽之士而每遇科舉皆歸試其鄉乞為之别立觧額事未行議者因謂今蜀已有太學及殿前司獨欠景靈宫爾繇是格不下令春秋以府通判朝謁用素饌道士讀祝文猶如終南之禮云三年上幸杭州太廟神主并奉安於温州祭享皆差官攝事紹興五年司封郎中林待聘言原廟在郡有漢故事而太廟神主禮宜在都今新邑未奠宜考古師載主之義遷之行闕以彰聖孝於是就臨安府建太廟上行欵謁之禮十三年有司請擇爽塏之地倣景靈宫舊規隨宜建置俟告成有日迎還列聖晬容奉安新廟庶㡬四孟躬行獻禮乃詔度地築宫為三殿聖祖居前宣祖至徽宗居中元天太聖后及昭憲而下二十一后居後七月新宫成上親詣行禮十月遣官自温州奉迎神御至上乃詣天章閣西殿告遷徽宗及顯恭顯肅二后神御并奉安焉掌宫内侍七人道士十人吏卒二百七十六人上元結燈寒食設鞦韆七夕設摩㬋羅簾幙嵗時一易嵗時酌獻二百四十羊凡帝后忌辰通用僧道四七人作法事十八年増建道院後又以韓世忠賜第増築天興殿五楹中殿七楹後殿十有七楹齋殿進食殿皆備遇孟享皇帝齋於内殿行事官齋於夲司其日質明皇帝先詣聖祖位前三上香進茶三進酒次詣宣祖位前又次詣太祖太宗至於徽宗位前並如上儀次日皇帝詣元天大聖后次詣昭憲皇后至顯肅皇后位前行禮並如前殿後殿之儀自渡江後行在靡有定所神御奉安他州朝獻則遣官分詣至紹興十二年和議成駐蹕臨安始備太廟原廟之制建炎以来朝野雜記自休兵後太祖創冊寳殿凡帝后寳冊洎郊廟金玉禮噐皆藏焉始時令太常寺官一員季㸃然第省閱文歴而已乾道五年春因有盗竊禮噐者中書門下始奏令每季取索赤歴㸃檢足備用印封鎖具有無損失申省二月己丑降㫖慶元五年夏太常寺奏太廟遺失皇后金寳二命大理寺治之六月庚寅降㫖既而廟之衛卒赴有司自首坐獄死盖故事冊寳以中人領其工作及盗去鑿而售之中乃鐵胎也繇是事敗自後朝廷益謹其事月以察官禮官中官各一員檢視謂之㸃寳禮噐中瑶爵玉瓚二事絶佳人間所未見其他圭壁大抵多水漿色也冊寳中惟昭慈聖憲皇后諡冊以象牙餘皆珉玉又有徽宗皇帝諡寳玉色尤温粹十五年詔倣東都舊制創欽先孝思殿於崇政殿之東凡朔望節序生辰上皆親酌獻行香用家人禮建炎以来朝野雜記國朝宗廟之制太廟以奉神主一嵗五享朔祭而月薦新五享以宗室諸王朔祭以太常卿行事景靈宫以奉塑像嵗四孟享上親行之帝后大忌則宰相率百官行香僧道士作法事而后妃六宫亦皆繼徃天章閣以奉畵像時節朔望帝后生辰日皆徧薦之内臣行事欽先孝思殿亦奉神御上日焚香而諸陵之上宫亦有御容時節酌獻如天章閣每嵗寒食及十月朔宗室内人各徃朝拜春秋二仲太常行園陵季秋監察御史檢視太廟之祭以俎豆景靈宫用牙盤而天章閣等以常饌用家人之禮云迄今不改十六年太常寺言契勘在京廟制每室東設户西設牖西墻作祏室藏祖宗帝后神主又有東西夹室其夹室止設户見今行在太廟係随宜修蓋未曾安設祏室今既創行修蓋即合體倣在京廟制同殿異室修蓋及將殿東西作兩夹室其兩夹室止設户十一室即依廟制設户牖其殿南北深七丈每室於西壁從北以南一丈二尺作厚墻隨宜安設祏室其西夹室亦合設祏室藏順祖室神主詔從之乃廣太廟工部侍郎兼太常少卿王普言謹案春秋公羊說曰主藏廟室西壁中以備火災左氏說曰主祏於宗廟言廟有祏室以藏神主漢儀藏主於西墻壁埳中去地六尺一寸蓋埳即祏室也非特備災亦神道尚幽之義然則古者廟必有主主必有祏鄭原繁曰先君威公命我先人典司宗祏此諸侯廟主之祏也衞孔悝使宰反祏於西圃此大夫廟主之祏也開寳通禮别廟時享孝明孝恵皇后享日宮闈令入室開埳奉出神主置於座政和五禮時享别廟儀享日祠祭官贊奉神主宮闈令於祏室内奉恵恭皇后神主於神幄啟匵設於座至送神樂止祠祭官贊奉神主入祏室宮闈令納神主於匵捧入祏室然則夲朝故事别廟后主亦有祏室自藝祖至徽宗未之有改也昨紹興五年祖宗后神主至自温州始建太廟才為屋五間後稍増至七間皆有殿而無室但置神主并匵於案上以帳幬之每遇祭享則就案啟匵而薦獻於前其草創如此十二年祔懿節皇后乃建别廟亦如太廟之草創也十六年新造禮噐告成詔增籩豆簠簋之數悉依典禮而太廟殿上迫狭不能容之於是始作新廟凡十三間除東西夹室之外為十一室各開户牖安祏室於西墻略倣京師廟制惟别廟一位祭噐不多遂且仍舊以至於今此有司因循之過也兹追册皇后將祔於懿節之次既修别廟分為二室當各置祏室如累朝故事詔從之董芬王普議當以藝祖為太祖正東向之位事見禘祫門建炎以来朝野雜記太廟自仁宗以来皆祀七世崇寜初蔡京秉政始取王肅說謂二祧在七世之外乃建九廟奉翼祖宣祖咸歸夲室焉然王莽已營九廟唐眀皇又用之非始於蔡京也紹興中徽宗祔廟以與哲宗同為一世故無所祧及升祔欽宗始祧翼祖髙宗與欽宗同為一世亦不祧由是淳熙末年太廟祀九世十二室及阜陵復土趙子直為政遂祧僖宣二祖而祔孝宗時朱元晦在經筵獨以九廟為正子直不從元晦議遂格及光宗祔廟復不祧今又祀九世矣紹熈五年閏十月時寧宗已即位詔别建四祖殿於太廟大殿之西奉祧主僖順翼宣四祖神主嵗令禮官薦獻宋朝自太祖追王僖順翼宣四祖以来每遇禘祫祖宗以昭穆相對而虚東鄉之位王安石用事以為僖祖以上世次不可知則僖祖之有廟與后稷疑無以異當時諸儒韓絳軰辯之不從時程頤為布衣為人言亦以安石之言為是熈寕八年夏禘於太廟以僖祖東嚮自是無敢議者紹興後董弅王普尤袤俱請正太祖東嚮之位未克行先是英宗祔廟已祧順祖至欽宗祔廟又祧翼祖及髙宗升祔遂為九世十二室至是孝宗将升祔趙汝愚當國欲併祧僖宣二祖事下侍從臺諫禮官議於是吏部尚書鄭僑等請祧二祖而正太祖東嚮之位諸儒如樓鑰陳傅良輩皆以為可詔從之僑等尋又奏請立僖祖别廟以順懿宣三祖祔藏時朱熹在講筵獨入議状條其不可者四大畧云准吏部尚書牒集議四祖祧主宜有所歸者今詳羣議雖多而皆有可疑若曰藏之夾室則是以祖宗之主下藏於子孫之夾室至於祫祭設幄於夾室之前則亦不得謂之祫欲别立一廟則喪事即逺有毁無立欲藏之天興殿則宗廟原廟不可相雜議者皆知其不安特以其心急欲尊奉太祖三年一祫時暫東嚮之故不知其實無益於太祖之尊而徒使僖祖太祖兩廟威靈相與爭校强弱於㝠㝠之中併使四祖之神疑於受擯徬徨躑躅莫知所歸令人痛傷不能自已今但以太祖當日追尊帝號之令而黙推之則知今日太祖在天之靈必有所不忍而不敢當矣又况僖祖祧主遷於治平不過數年神宗皇帝復奉以為始祖已為得禮之正而合於人心所謂有其舉之莫敢廢者乎又言當以僖祖為始祖如周之后稷太祖如周之文王太宗如周之武王與仁祖之廟皆萬世不祧仁宗為昭英宗為穆與真宗主並藏西夾室神宗為昭哲宗為穆徽宗為昭欽宗為穆髙宗為昭孝宗為穆而髙宗之廟亦萬世不祧若未能然則奉僖祖居第一室太祖居第二室太宗居第三室太祖太宗仍共為一世自真宗以下至於孝宗凡九世十二室貼黄云續蒐訪得元祐大儒程頤之說以為太祖以上有僖順翼宣先嘗以僖祧之矣介甫議以為不當祧順以下祧可也或難以僖祖無功業或謂靈芝無根醴泉無源物豈有無夲而生者今日天下基夲蓋出於此人安得為無功業故朝廷復立僖祖廟為得禮安石所見終是髙於世俗之儒熹竊詳頤之議論素與王安石不同至論此事則深服之足以見義理人心之所同固有不約而合者又司馬光韓維之徒皆是大賢人所敬信其議偶不出此而安石乃以變亂穿鑿得罪於公議故欲堅守二賢之說并安石所當取者而盡廢之今以程頤之說考之則是非可判矣議既上召對上於榻後取文書一卷曰此卿所奏廟議也可細陳其説熹先以所論畫為圖夲貼説詳盡至是出以奏陳久之上再三稱善且曰僖祖自不當祧髙宗即位時不曽祧夀皇即位亦不曽祧太上即位亦又不曽祧今日豈可容易可於榻前撰數語俟徑批出施行熹方懲内批之弊因乞降出劄子再令臣僚集議上亦然熹既退即進擬詔意以上意諭廟堂則聞已毁四祖廟而遷之矣時汝愚既以王安石之論為非異議之徒懼其軋已藉以求勝事竟不行熹時已得罪遺汝愚書曰相公以宗子入輔王室而無故輕納鄙人之妄議毁拆祖宗之廟以快其私其不詳亦甚矣欲望神靈降歆垂休錫羡以永國祚於無窮其可得乎時太廟殿已為十二室故孝宗既升祔而東室尚虚熹以為非所以祝延夀康之意深不然之因自劾不堪言語侍從之選乞追奪待制章再上詔次對之職除授已久與廟議初不相闗不許及光宗祔廟遂復為九世十二室云盖自昌陵祔廟踰二百年而後正太祖之位自是年冬始而别建一殿以奉祧主於大殿之西隅嵗命禮官薦獻焉今謂四祖殿者是也按太祖東向之位或以為僖祖當居之或以為藝祖當居之自熈寧以来議者不一矣盖自治平四年英宗已祔廟張安道等以為宜遵七世之制合祧僖祖詔從其説熙寧初王介甫當國每事務欲紛更遂主議以為僖祖宋之太祖不當祧而韓持國輩爭之以為太祖合屬之昌陵諸賢爭之愈力而介甫持之愈固遂㡬至欲廢藝祖配天之祀以奉僖祖盖其務排衆議好異遂非與行新法等固無怪也然愚甞考之張安道建隨世祧遷之議韓持國執藝祖當居東向之説論則正矣而揆之當時則未可盖古之所謂天子七廟者三昭三穆與太祖之廟而七三昭三穆則自父祖而上六世太祖則始封受命以有功徳而萬世不祧遷者夲非第七世之祖也今神宗之世而獨祧僖祖則順翼宣太祖宗共一世真仁英猶七世也是将祧僖祖而以順祖為太祖乎不可也僖順俱無功徳非商契周稷之倫今當時之議其欲祧僖祖者特以其已在七世之外其不祧順祖者特欲以備天子七廟之數然不知親盡而祧者昭穆也萬世不祧者太祖也今以三昭三穆言則僖順皆已在祧遷之數以萬世不祧言則二祖俱未足以當之是姑以當祧之祖而權居太祖之位耳若不以順祖為太祖則所謂七世者乃四昭三穆矣非所謂三昭三穆與太祖之廟而七也若必曰虚太祖之位而只祀三昭三穆則當併僖順二祖而祧之又否則姑如唐人九廟之制且未議祧遷雖於禮經不合而不害其近厚今獨祧僖祖則順祖隠然居太祖之位矣此其未可一也如藝祖之合居東向為萬世不祧之太祖其説固不可易然神宗之時上距藝祖纔四代五廟耳若遽以為太祖則僖順以下四帝皆合祧而天子之廟下同於諸侯矣此其未可者二也諸賢之説大槩只以為不可近捨創業之藝祖而逺取追尊之僖祖介甫務欲異衆則必欲以其所以尊藝祖者尊僖祖而於當時事體皆未嘗審訂若以前二節者反復推之則尊僖祖者固失矣而遽尊藝祖者亦未為得也至寧宗之初年則不然矣自藝祖創業以来已及八世十二廟則僖順翼宣之當祧無可疑者於此時奉藝祖正東向之位為萬世不祧之祖更無拘礙而董弅王普等所言乃至當之論矣二人議見禘祫門晦菴獨以伊川曽是介甫之説而猶欲力主僖祖之議則㡬於膠柱鼓瑟而不適於時黨同代異而不當於理愚固未敢以為然也天子宗廟之制見於經傳甚眀歴代諸儒因經傳所載而推明之其説亦甚備然終不能依古制立廟者其説有二一則太祖之議難决二則昭穆之位太拘太祖之議難决愚既詳言之於前叚者矣若昭穆之位太拘則請得而備言之盖諸儒言廟制者莫詳明於晦菴之説既為之説又為之圖説及圖俱見周廟制下覽者一見可决矣其大槩謂太祖在北左昭右穆以次而南太祖百世不遷以下六廟親盡則毁而逓遷昭常為昭穆常為穆祔昭則羣昭皆動而穆不移祔穆則羣穆皆移而昭不動且引書穆考文王詩率見昭考及左傳文之昭也武之穆也以為證盖文為穆則文之孫及元孫皆穆其子與曽孫皆昭也武為昭則武之孫及元孫皆昭其子與曽孫皆穆也既創此六廟之後其新陟王之升祔者昭入於昭穆入於穆截然不可紊此立廟之制也然愚以為此制也必繼世以有天下者皆父死子立而後可若兄終弟及則其序紊矣姑以晦菴之圖考之其圖自武王至於幽王皆定六廟三昭三穆之位然自懿王之前皆父傳之子則其序未嘗紊也懿王崩孝王以共王之弟懿王之叔繼懿王而立故晦菴廟圖宣王之世則以穆懿夷為昭共孝厲為穆夫穆王於世次昭也共王為穆王之子於世次穆也懿王為穆王之孫則繼穆王而為昭是也孝王為共王之弟而以繼共王為穆雖於世次不紊然以弟而據孫之廟矣至夷王為懿王之子世次當穆而圖反居昭厲王為夷王之子世次當昭而圖反居穆則一孝王立而夷厲之昭穆遂至於易位於是晦菴亦無以䖏此不過即其繼立之先後以為昭穆而不能自守其初説矣又况宣王之世三昭三穆為六代則所祀合始於昭王今因孝王厠其間而其第六世祖昭王雖未當祧而已在三昭三穆之外則雖名為六廟而所祀止於五世矣然此所言者昭穆祧遷之紊亂不過一代而已前乎周者為商商武丁之時所謂六廟者祖丁南庚陽甲盤庚小辛小乙是也然南庚者祖丁兄子陽甲盤庚小辛小乙又皆祖丁子也姑以祖丁為昭言之則南庚至小乙皆祖丁子屬俱當為穆是一昭五穆而武丁所祀上不及曽祖未當祧而祧者四世矣後乎周者為唐唐懿宗之時所謂六廟者憲宗穆宗敬宗文宗武宗宣宗是也然穆宗宣宗皆憲宗之子敬宗文宗武宗又皆穆宗之子姑以憲宗為昭言之則穆宣為穆敬文武為昭是四昭二穆而懿宗所祀上不及髙祖未當祧而祧者三世矣盖至此則不特昭穆之位偏枯而祧遷之法亦復紊亂若必欲祀及六世則武丁之時除太祖之外必創十廟懿宗之時除太祖之外必創九廟而後可且繼世嗣位者既不能必其為弟為子而創立宗廟之時亦安能預定後王之入廟者或穆多昭少如殷之時或昭多穆少如唐之時哉則立廟之制必合於将升祔之時旋行營創屬平昭者於太祖廟之左建之屬平穆者於太祖廟之右建之方為合宜而預立六廟定為三昭三穆以次逓遷之説不可行矣又必如晦菴之説外為都宫内則各有廟有寝有門有垣則其制甚大且必在國中門之左則其地亦有限昭穆之位既已截然則武丁之時雖五穆而不可侵昭之地而昭之地多虚懿宗之時雖四昭而不可居穆之位而穆之位半闕易世之後又不知其為昭為穆者何如而已創之廟其世代之近者既未可祧遷如武丁之時小乙父也南庚陽甲盤庚小辛皆伯父也祖丁祖也祖辛沃甲皆伯祖也祖乙曽祖也河亶髙祖也外壬仲丁髙伯祖也太戊五世祖也雍己五世伯祖也小甲六世祖也若以祀及六世言之是此十五廟皆未合祧遷亦不止十廟而已其昭穆之不順者又不可升祔則必湏逐代旋行位置營建而後可而其地又拘於中門之内太祖廟之左右創造煩擾非所以寧神明對偶偏枯又無以聳觀視似反不如漢代之每帝建廟各在一所東都以来之同堂異室共為一廟之混成也愚故曰七廟之制諸儒皆能言之而歴代俱不能如其制而建造者以昭穆之位太拘故也有天下者必推其祖以配天既立宗廟必推其祖為太祖禮也自孝經有郊祀配天明堂配帝之説祭法有禘郊祖宗之説鄭氏註以為禘郊即郊也鄭氏以禘為祀天於圜丘然圜丘亦郊也祖宗即明堂也於是後之有天下者配天配帝必各以一祖推其創業之祖以擬文王以為未足也而必求其祖之可以擬后稷者而推以配天焉夫文王受命作周者也漢之高帝唐之神堯宋之藝祖庶乎其可擬矣曹孟徳司馬仲達以下諸人逞其姦雄詐力取人之天下國家以遺其子孫上視文王奚啻瓦釡之與黄鍾然其為肇造區夏光啓王業事跡則同為子孫者雖以之擬文王可也獨擬后稷之祖則歴代多未有以䖏於是或取之遥遥華胄如曹魏之祖帝舜宇文周之祖神農周武氏之祖文王是也此三聖人者其功徳固可配天矣而非魏與二周之祖也是以當時議之後代哂之以為不類至於唐既以神堯擬文王矣而求其所以擬后稷者則屬之景帝宋既以藝祖擬文王矣而求其所以擬后稷者則屬之僖祖夫景僖二帝雖唐宋之始祖然其在當時則無功業之庸夫也上視周室僅可比不窋之流而以后稷尊之過矣是以不特後世議其非而當時固譁然以為不可盖無以厭服人心故也夫知其祖之未足以厭服人心而推崇尊大之意未慊也於是獻議者始為導䛕附㑹之説以中之老聃亦人耳道家者流假託其名以行其教遂至推而尊之列坐上帝之右而為其徒習其教者則曰此天帝也非復周之柱下史也而聃姓適同乎唐乃推聃以為始祖尊之曰元元皇帝盖雖祖聃而其意謂吾祖固天之貴神也於是崇建太清宫每禘祫並於元元皇帝前設位序正是盖以元元為太祖擬周之后稷而其祖宗則俱為昭穆矣至宋大中祥符間天書封禪之事競興遂復效唐人之為推所謂司命保生天尊大帝以為聖祖建立景靈宫聖祖殿居中而僖祖以下各立一殿分置左右是盖以聖祖為太祖擬周之后稷而祖宗則俱為昭穆矣晦菴甞言景靈之建外為都宫而内各為寝廟門垣乃為近古盖以其規制宏壮每帝各居一殿不如太廟之共處一堂稍類古人立廟之制而足以稱天子所以嚴奉祖宗之意是則然矣然不知所謂聖祖者果有功徳之可稱如后稷譜系之可尋如稷之於文武成康乎祭法言虞夏商周禘郊祖宗之制鄭氏註謂有虞氏以上尚徳禘郊祖宗配用有徳而已自夏以下稍用其姓氏之先後為次項平甫亦言此經作祭法者已於篇末自觧其意先序帝嚳堯舜鯀禹之功次序黄帝顓頊契㝠湯文武之功以為此皆有功烈於民者故聖王祀之非此族也不在祀典則其意盖為郊禘祖宗皆擇有功烈者祀之耳而後之有天下者欲稽此以祀其祖先則固與其説大異矣愚嘗因是而䆒論之虞夏商之事逺矣周人郊祀后稷宗祀明堂此後世所取法也以詩考之言后稷配郊者為生民思文言文王配明堂者為我将我将之詩其所稱頌者受命興周而已而生民思文二詩則皆言教民播種樹藝五榖之事然則文王有功於興周而后稷則有功於天下萬世者也𫝊曰烈山氏之子柱為稷自夏以上祀之周棄亦為稷自商以来祀之夫社五土之神稷五榖之神皆地之異名也古之聖人能建天地所不及之功則其道可以擬天地故後世祀之推以配天地棄自商祀以為稷則周為諸侯之時固已配食地祗矣周有天下棄開國之祖也文王受命禮合配天而實棄之子孫也周公制禮作樂既舉嚴父配天之禮以祀文王矣而棄之祀仍商之舊列於社稷是尊禰而卑祖也故復創為明堂之禮而以是二聖人者各配一祀焉晦菴亦言古惟郊祀明堂之祀周公以義起自秦以来文王配天之禮廢矣而稷之祀至今未嘗廢盖稷之配食地祗周未興而已然周已亡而不替所謂有功烈於民者祀之萬世如一日也後之有天下者豈復有此祖也哉而必欲效周之禮推其逺祖上擬后稷或夲無譜系可考而强附㑹於古之帝王如曹魏二周之祖舜神農與文王是也或姑推其上世之逺祖而不問其人品功徳之何如如唐之景帝宋之僖祖是也又否則推而神之託之天帝之杳㝠如唐之元元宋之聖祖是也而上視周家祀后稷之意則不類甚矣曷若只推其創業之祖上擬文王郊祀明堂俱以配侑而上世之祖既未有可以擬后稷者則不必一遵周人之制可也文獻通考卷九十四
