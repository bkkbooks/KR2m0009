body:
  text: 文獻通考卷二百十九鄱陽馬端臨貴與著經籍考四十六子陰陽各門總天文歷算漢藝文志陰陽者流蓋出於羲和之官敬順昊天歷象日月星辰敬授民時此其所長也及拘者為之則牽於禁忌泥於小數舍人事而任鬼神漢志二十一家三百六十九篇右陰陽漢藝文志曰天文者序二十八宿步五星日月以紀吉凶之象聖王所以參政也易曰觀乎天文以察時變然星事􅓇悍非湛密者弗能由也􅓇讀與凶同湛讀曰沉由用也夫觀景以譴形非明主亦不能服聽也以不能由之臣諫不能聽之主此所以兩有患也宋三朝藝文志曰國家建官庀局觀文察變尤重慎其事太宗即位知私習冒禁頗為誑耀悉搜訪考驗黜去繆妄遂下詔禁止之至真宗復申明詔旨重其罪罰自兹澄汰旌别濫學方息而民無所惑矣兩朝藝文志曰天文圖書藏祕閣西編有內侍專掌禁私習者嘉祐中大校經史而兵法小學醫術禮書皆分局命官編校定寫唯天文五行未嘗是正諸儒亦莫得考也漢志二十一家四百四十五卷隋志九十七部合六百七十五卷唐志二十家三十部三百六卷失姓名六家李淳風天文占以下不著録六家一百七十五卷宋三朝志八十四部三十二卷宋兩朝志二十八部一百六卷宋四朝志三十九部二百四十六卷宋中興志二十家二十部一百二十七卷右天文漢藝文志歷譜者序四時之位正分至之節會日月五星之辰以考寒暑殺生之實故聖王必正歷數以定三統服色之制又以探知五星日月之會凶厄之患吉隆之喜其術皆出焉此聖人知命之術也非天下之至材其孰能與焉道之亂也患出於小人而強欲知天道者壞大以為小削逺以為近是以道術破碎而難知也宋兩朝藝文志歷以算成自建隆迄治平五正歷象作為銅儀經法具於所司蓋有知算而不知歷者故歷為算本治歷之善積算逺其驗難而差遲治歷之不善積算近其驗易而差亦速漢志十八家六百六卷隋志一百部二百六十三卷唐志三十六家七十五部二百三十七部失姓名五家王勃以下不著録十九家百二十六卷宋三朝志五十三部二百卷宋兩朝志三十三部六十四卷宋四朝志五十三部二百四十三卷宋中興志三十八家五十一部一百五十八卷右歷譜漢藝文志曰五行者五常之形氣也書云初一曰五行次二曰敬用五事言進用五事以順五行也貌言視聽思心失而五行之序亂五星之變作皆出於律歷之數而分為二者也其法亦起五德終始推其極則無不至而小數家因此以為吉凶而行於世寖以相亂漢志五行三十一家六百五十二卷漢志蓍龜十五家四百一卷漢志雜占十八家三百一十三卷容齋洪氏隨筆曰漢藝文志七略雜占十八家以黃帝甘德占夢二書為首其説曰雜占者紀百家之象候善惡之證衆占非一而夢為大故周有其官周禮太卜掌三夢之法一曰致夢二曰觭夢三曰咸陟鄭氏以為致夢夏后氏所作觭夢商人所作咸陟者言夢之皆得周人作焉而占夢專為一官以日月星辰占六夢之吉凶其别曰正曰噩曰思曰寤曰喜曰懼季冬聘王夢獻吉夢於王王拜而受之乃舍萌於四方以贈惡夢舍萌者猶釋菜也贈者送之也詩書禮經所載高宗夢得説周武王夢帝與九齡伐紂夢叶朕卜宣王考牧牧人有熊羆虺蛇之夢召彼故老訊之占夢左傳所書尤多孔子夢坐奠於兩楹然則古之聖賢未嘗不以夢為大是以見於七略者如此魏晉方技猶時時或有之今人不復留意此卜雖市井妄術所在如林亦無以占夢自名者其學殆絶矣右五行漢藝文志形法者大舉九州之勢以立城郭室舍形人及六畜骨法之度數器物之形容以求其聲氣貴賤吉凶猶律有長短而各徵其聲非有鬼神數使然也然形與氣相首尾亦有有其形而無其氣者有其氣而無其形者此精微之獨異也漢志六家一百二十二卷隋志五行二百七十二部合一千二十二卷唐志五行六十家一百六十部六百四十七卷失姓名六十五家袁天綱以下不著録二十五家一百三十二卷宋三朝志五行四百四十二部一千四百九十七卷宋兩朝志五行一百一十五部一百六十一卷宋四朝志五行一百三十四部三百九十二卷宋中興志五行八十二家八十八部二百八十六卷宋中興志蓍龜三十三家三十六部一百一卷宋中興志雜占八十家八十四部一百七十五卷宋中興志形法九十五家一百四部二百六十八卷陳氏曰自司馬氏論九流其後劉歆七略班固藝文志皆著陰陽家而天文歷譜五行卜筮形法之屬别為術數略其論陰陽家者流蓋出於羲和之官敬順昊天歷象日月星辰拘者為之則牽於禁忌泥於小數至其論術數則又以為羲和卜史之流而所謂司星子韋三篇不列於天文而著之陰陽家之首然則陰陽之與術數似未有以大異也不知當時何以别之豈此論其理彼具其術邪今志所載二十一家之書皆不存無所考究而隋唐以來子部遂闕陰陽一家至董逌藏書志始以星占五行書為陰陽類今稍增損之以時日祿命遁甲等備陰陽一家之闕而其他術數各自為類按陳氏之説固然矣然時日祿命遁甲獨非術數乎其所謂術數各自為類者曰卜筮曰形法然此二者獨不本於陰陽乎蓋班史藝文志陰陽家之後又分五行卜筮形法各自為類今班志中五行卜筮形法之書雖不盡存而後世尚能知其名義獨其所謂陰陽家二十一種之書並無一存而隋史遂不立陰陽門蓋隋唐間已不能知其名義故無由以後來所著之書續立此門矣然隋書唐書及宋九朝史凡涉乎術數者總以五行一門包之殊欠分剔獨中興史志乃用班志舊例以五行占卜形法各自為門今從之右形法周髀算經二卷音義一卷陳氏曰題趙君卿注甄鸞重述李淳風等注釋周髀者蓋天文書也稱周公受之商高而以句股為術故曰周髀唐志有趙嬰甄鸞注多一卷李淳風釋二卷今曰君卿者豈嬰之字邪中興書目又云君卿名爽蓋本崇文總目然皆莫詳時代甄鸞者後周司𨽻也音義假承務郎李籍撰司天考古星通元寶鏡一卷鼂氏曰題曰巫咸氏宋朝太平興國中詔天下知星者詣京師未幾至者百許人坐私習天文或誅或配𨽻海島由是星歷之學殆絶故豫所藏書中亦無幾姑裒數種以備數云甘石星經一卷鼂氏曰漢甘公石申撰以日月五星三垣二十八舍恆星圖象次舍有占訣以候休咎星簿讚歷一卷陳氏曰唐志稱石氏星經簿讚館閣書目以其有徐潁婺台等州名疑後人附益今此書明言依甘石巫咸氏則非專石申書也乙巳占十卷陳氏曰唐太史令政陽李淳風撰起算上元乙巳故以名焉玉歷通政經三卷陳氏曰李淳風撰亦天文占也唐志無之乾坤變異録一卷陳氏曰不著名氏雜占變異凡十七篇古今通占三十卷陳氏曰唐嵩高潛夫沛國武密撰纂集黃帝巫咸而下諸家及隋以前諸史天文志為此書景祐乾象新書間取其説中興館閣書目作古今通占鏡本唐志云爾步天歌一卷鼂氏曰未詳撰人二十八舍歌也三垣頌五星凌犯賦附於後或云唐王希明撰自號丹元子夾漈鄭氏天文略曰隋有丹元子隱者之流也不知名氏作步天歌見者可以觀象焉王希明纂漢晉志以釋之唐書誤以為王希明也天文藉圖不藉書然書經百傳不復訛謬縱有訛謬易為考正圖一再傳便成顚錯一錯愈錯不可復尋所以信圖難得故學者不復識星向嘗盡求其書不得其象又盡求其圖不得其信一日得步天歌而誦之時素秋無月清天如水誦一句凝目一星不三數夜一天星斗盡在胸中矣此本只傳靈臺不傳人間術家祕之名曰鬼料竅世有數本不勝其訛今則取之仰觀以從稽定然步天歌之言不過漢晉諸志之言也漢晉志不可以得天文者謂所載名數太詳叢雜難舉故也步天歌句中有圖言下見象或約或豐無餘無失又不言休咎是深知天者今之所作以是為本舊於歌前亦有星形然流傳易訛所當削去惟於歌之前採諸家之言以備其書云列宿圖一卷天象分野圖一卷鼂氏曰未詳撰人景祐乾象新書三十卷陳氏曰司天春官正楊惟德等撰以歷代占書及春秋至五代諸史採托撰集元年七月書成賜名仍御製序鼂氏曰今惟三卷大宋天文書十五卷陳氏曰不著名氏館閣書目亦無之意其為太史局見今施行之書蓋供報占驗大抵出此天經十九卷陳氏曰同州進士王及甫撰不知何人其書定是非協同異由博而約儒者之善言天者也天象法要二卷陳氏曰丞相溫陵蘇頌子容撰元祐三年新造渾天成記其法要而圖其形象進之歷代星史一卷陳氏曰不著名氏抄集諸史天文志天文考異二十五卷陳氏曰昭武布衣鄒淮撰大抵襲景祐新書之舊淮後入太史局二十四氣中星日月宿度一卷陳氏曰此書傳之程文簡家云得於荆判局荆名大聲太史局官也天象義府九卷陳氏曰宜黃布衣應垕撰其書考究精詳論議新竒而多穿鑿傅會象垂於天其曰某星主某書者人實名之也開闢之初神聖在御地天之道未絶其必有得於仰觀俯察之妙者故曰天埀象聖人則之夫天豈諄諄然命之乎如必一切巧為之説而以為天意實然則幾於矯誣矣右天文合元萬分歷一卷鼂氏曰唐曹氏撰未知其名歷元起唐高宗顯慶五年庚申蓋民間所行小歷也本天竺歷為法李獻臣云歷法一卷鼂氏曰未詳撰人歷草也唐大衍歷議十卷陳氏曰唐僧一行作新歷草成而卒詔張説與歷官陳元景等次為歷術七篇略例一篇歷議十篇新史志略見之十議者一歷本二日度三中氣四合朔五卦候六九道七日晷八分野九五星十日食大抵皆以考正古今得失也歷志略取其要著於篇者十有二曰歷本曰中氣曰合朔曰卦候曰日卦曰日度曰九道曰日食曰五星蓋歷議之八篇而分卦候為二故共為九條其沒滅盈縮晷漏中星三條則皆取之略例餘歷議日晷分野二篇則具之天文志嘉定辛未辭科用為序題有劉淡如者蓋得其書自許必在選中而考官但據史文初不知此書尚存於世也以其篇次與史文不合黜之要之史官因此書以述志考官因史志以命題當以書為本參考志之所載乃為全善崇天歷一卷陳氏曰司天夏官正權判監宋行古等撰天聖二年上學士晏殊序國初有建隆應天歷次有乾元歷儀天歷詳見三朝史志紀元歷三卷立成一卷陳氏曰姚舜輔撰崇寧五年成自崇文之後有明天歷熙寧奉元歷元祐觀天歷至崇寧三年舜輔造新歷曰占天未幾蔡京又令舜輔更造用帝受命之年即位之日元起庚辰日命己卯上親製序頒之天下賜名紀元本朝承平諸歷略具正史志不見全書此二歷近得之蜀人秦九韶道古故存之統元歷一卷陳氏曰常州布衣陳得一更造祕書少監朱震監視紹興五年上歷家不以為工會元歷一卷陳氏曰夏官正劉孝榮造禮部尚書李巘序紹熙元年也孝榮判太史局凡造三歷此其最後者勝前逺矣統天歷一卷陳氏曰冬官正楊忠輔撰丞相京鏜表進其歷議甚詳至於星度明言不曾測驗無候簿可以立術最為不欺紹熙五年也其末有神殺一篇流於陰陽拘忌則為俚語開禧歷三卷立成一卷陳氏曰大理評事鮑浣之撰進時開禧三年詔附統天歷推算至今頒歷用統天之名而實用此歷當時緣金人閏月與本朝不同故於此歷加五刻天道有常而造術以就之非也大抵中興以來雖屢改歷而日官淺鄙不知歷象之本但模襲前歷而於氣朔皆一時遷就爾金大明歷一卷陳氏曰亡金大定十三年所為也其術踈淺不足取積年三億以上其拙可知然統天開禧改歷皆緣朝論以北歷得天為疑貴貝耳賤目由來久矣實不然也數術大略九卷陳氏曰魯郡秦九韶道古撰前世算術自漢志皆屬歷譜家要之數居六藝之一故今解題列之雜藝類惟周髀經為蓋天遺書以為歷象之冠此書本名數術而前二卷大衍天時二類於治歷測天為詳故亦置之於此秦博學多能尤邃歷法凡近世諸歷皆傳於秦所言得失亦悉著其語云集聖歷四卷鼂氏曰皇朝楊可集可久為司天冬官正輯古今隂陽書彚為四時以涓擇日辰云百中經三卷鼂氏曰自紹興二十一年以上百二十年歷日節文也刻漏圖一卷鼂氏曰皇朝燕肅撰肅有巧思上蓮花漏法嘗知潼州有石刻存焉洛陽宋君者增損肅之法為此圖官歷刻漏圖一卷蓮花漏圖一卷陳氏曰太常博士王普伯照撰右歷算文獻通考卷二百十九
