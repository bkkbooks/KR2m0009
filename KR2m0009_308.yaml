body:
  text: 文獻通考卷三百八鄱陽馬端臨貴與著物異考十四人異按傳曰皇之不極厥罰常陰時則有下人伐上之痾昌邑王時霍光將議廢立而夏侯勝援此以諫王出遊光與張安世疑謀已泄而驚異其説然則所謂下人伐上之痾乃犯上反叛之謂然歴代史志只謂之人痾而所載者則形體之妖異或舉動言語之狂惑或化為異物或已死復生殊不及叛逆之事蓋人痾者妖也叛逆者其應也又下而犯上臣而背君其妖孰甚焉故總謂之人痾云春秋文公十一年敗狄于鹹師古曰鹹魯地也穀梁公羊傳曰長狄師古曰防風之後漆姓也國號鄋暪鄋音所求反暪莫干反兄弟三人一者之魯師古曰僑如也來伐魯為叔孫得臣所獲一者之齊師古曰榮如也齊襄公二年伐齊為王子成父所獲一者之晉師古曰焚如也宣十五年晉滅潞國而獲之皆殺之身横九畮師古曰畮古畝字斷其首而載之肩見於軾師古曰軾車前横木何以書記異也劉向以為是時周室衰微三國為大可責者也天戒若曰不行禮義大為暴亂之行將致危亡其後三國皆有篡弑之禍師古曰謂魯文公薨襄仲弑惡及視而立宣公齊連稱管至父弑襄公而立無知晉欒書中行偃弑厲公而立悼公近下人伐上之痾也劉歆以為人變屬黄祥一曰屬臝蟲之孽一曰天地之性人為貴凡人為變皆屬皇極下人伐上之痾云京房易傳曰君暴亂疾有道厥妖長狄入國又曰豐其屋下獨苦師古曰豐其屋易豐卦上六爻辭豐大也長狄生世主虜史記魏襄王十三年魏有女子化為丈夫京房易傳曰女子化為丈夫兹謂隂昌賤人為王丈夫化為女子兹謂陰勝厥咎亡一曰男化為女宮刑濫也如淳曰宮刑之行大濫也女化男婦政行也赧王三十一年齊有人當闕而哭者求之不得去則聞其聲時燕昭王伐齊齊湣王出奔為楚將淖齒所弑史記秦始皇帝二十六年有大人長五丈足履六尺皆夷狄服凡十二人見於臨洮師古曰隴西之縣也音吐高反天戒若曰勿大為暴亂之行將受其禍是歲始皇初并六國反喜以為瑞銷天下兵器作金人十二以象之遂自賢聖燔詩書阬儒士奢淫暴虐務欲廣地南戍五嶺北築長城以備胡越師古曰五嶺解在張耳陳餘傳塹山填谷西起臨洮東至遼東徑數千里故大人見於臨洮明禍亂之起後十四年而秦亡亡自戍卒陳勝發秦始皇三十六年鄭客從闗東來至華陰望見素車白馬從華山上下知其非人道住止而待之遂至持璧與客曰為我遺滈池君長安西北有滈池君則池神也江神告之因言今年祖龍死祖始也龍人君象謂始皇也忽不見客捧璧始皇使御史視之即二十八年過江所湛璧也黙然良久曰山鬼不過知一歲事也漢高祖為亭長送徒驪山被酒夜經澤中有大蛇當徑乃拔劔斬蛇後人來至蛇所有一老嫗夜哭人問之曰吾子白帝子也化為蛇當道今者赤帝子斬之故哭人以嫗為不誠欲苦之嫗因忽不見後人告高祖高祖心獨喜自負諸從者日益畏之景帝二年九月膠東下密人年七十餘生角角有毛時膠西濟南齊四王有舉兵反謀謀由吳王濞起連楚趙凡七國下密縣居四齊之中角兵象上鄉者也老人吳王象也年七十七國象也天戒若曰人不當生角猶諸侯不當舉兵以鄉京師也禍從老人生七國俱敗云京房易傳曰冢宰專政厥妖人生角武帝征和元年上居建章宮見一男子帶劒入中龍華門疑其異人命收之男子捐劒走逐之弗獲上怒斬門候冬十一月發三輔騎士大搜上林閉長安城門索十一日乃解巫蠱始起哀帝建平中豫章有男子化為女子嫁為人婦生一子長安陳鳯言此陽變為陰將亡繼嗣自相生之象一曰嫁為人婦生一子者將復一世乃絶哀帝建平四年四月山陽方與女子田無嗇生子師古曰方與者山陽之縣也女子姓田名無嗇方與音房豫先未生二月兒嗁腹中及生不舉葬之陌上三日人過聞嗁聲母掘收養平帝元始元年二月朔方廣牧女子趙春病死師古曰廣牧朔方之縣也姓趙名春斂棺積六日師古曰斂音力贍反棺音工喚反出在棺外自言見夫死父曰年二十七不當死太守譚以聞京房易傳曰幹父之蠱有子考旡咎韋昭曰蠱事也子能正父之事是為有子故考不為咎累師古曰易蠱卦初六爻辭也子三年不改父道思慕不皇亦重見先人之非師古曰言久有不善之事當速改之若唯思慕而已無所變易是重顯先人之非也一曰三年之内但思慕而已不暇見父之非故不改也重音直用反不則為私厥妖人死復生一曰至陰為陽下人為上六月長安女子有生兒兩頭異頸面相鄉四臂共胸俱前鄉師古曰鄉讀曰嚮凥上有目長二寸所京房易傳曰睽孤見豕負塗師古曰易睽卦上九爻辭也睽孤乖刺之意也塗泥也睽音苦擕反厥妖人生兩頭下相攘善妖亦同人若六畜首目在下兹謂亡上正將變更凡妖之作以譴失正各象其類二首下不一也足多所任邪也足少下不勝任或不任下也凡下體生於上不敬也上體生於下媟瀆也生非其類淫亂也人生而大上速成也生而能言好虚也羣妖推此類不改乃成㐫也王莽始建國二年甄豐子尋坐偽作符命誅黨與死者數百人尋手理有天子字莽解其臂入視之曰此一大子也或一六子也六者戮也明尋父子當戮死也是歲池陽縣有小人景長尺餘或乘車馬或步行操持萬物大小多相稱車馬及物皆稱人之形三日止天鳯四年連率韓博上言有竒士長丈大十圍來至臣府曰欲奮擊匃奴謂巨母覇出於蓬萊東南五城西北昭如海瀕昭如海名也軺車不能載三馬不能勝即日以大車四馬建虎旗載覇詣闕覇卧則枕鼓以鐡著食乞迎之於道京師門户不容者開高大之以視百蠻後漢靈帝建寧三年春河内婦食夫河南夫食婦臣昭曰以夫之尊在河之陽而陰承體卑吞食尊陽將非君道昏弱無居剛之德遂為隂細之人所能消毁乎夫為家之主而乃自食正内之人時宋皇后將立而靈帝一聽閹官無所厝心宋后終廢天戒若曰徒隨嬖豎之意夫噉其妻乎二年雒陽上西門外女子生兒兩頭異肩共胷俱前向以為不祥墮地棄之自此之後朝廷霿亂政在私門上下無别二頭之象後董卓弑太后被以不孝之名放廢天子後復害之漢元以來禍莫踰此四年魏郡男子張博送鐡盧詣太官博上書室殿山居屋後宮禁落屋讙呼上收縛考問辭忽不自覺知臣昭曰魏人入宮既奪漢之徵至後宮而讙呼終亦禍廢母后中平元年六月壬申雒陽男子劉倉居上西門外妻生男兩頭共身靈帝時江夏黄氏之母浴而化為黿入於深淵其後時出見初浴簮一銀釵及見猶在其首臣昭曰黄者代漢之色女人臣妾之體化為黿黿者元也入於深淵水實制火夫君德尊陽利見九五飛在於天乃備光盛俯等龜黿有愧潛躍首從戴釵卑弱未盡獻帝初平中長沙有人姓桓氏死棺斂月餘其母聞棺中聲發之遂生占曰至陰為陽下人為上其後曹公由庻士起建安四年二月武陵充縣女子李娥年六十餘物故其家以杉木槥斂墓於城外數里上已十四日有行者聞冢中有聲便語其家其家徃視聞聲便發出遂活七年越嶲有男子化為女子時周羣上言哀帝時亦有此異將有易代之事至二十五年獻帝封於山陽建安中女子生男兩頭共身魏文帝黄初初清河宋士宗母化為鱉入水明帝太和三年曹休部曲邱奚農女死復生時有開周世冢得殉葬女子數日而有氣數月而能言郭太后愛養之又太原人發冢破棺棺中有一生婦人問其本事不知也視其墓木可三十歲按京房易傳曰至陰為陽下人為上宣帝起之象也漢平帝獻帝並有此異占以為王莽曹操之證青龍元年并州刺史畢軌送漢故渡遼將軍范明友鮮卑奴年三百五十歲而言語飲食如常人奴云霍顯光後小妻明友妻光前妻女時京邑有一人失其姓名食啖兼十許人遂肥不能動其父曽作遠方長吏官徒送彼縣令故義傳供食之一二年中一鄉輙為之儉三年中壽春農民妻自言為天神所下命為登女當營衞帝室蠲邪納福飲人以水及以洗創或多愈者於是立館後宮下詔稱揚甚見優寵及景初二年帝疾飲水無驗以致大漸於是斬焉元帝咸寧二年八月襄武縣言有大人見長三丈餘跡長三尺二寸髪白著黄巾單衣拄杖呼王始語曰今當太平晉尋代魏吳孫休時烏程人有得困病及瘥能以嚮言者言於此而聞於彼自其所聽之不覺其聲之大也自遠聽之如人對言不覺聲之自遠來也聲之所徃隨其所向遠者所過十數里其隣人有責息於外歴年不還乃假之使為責讓懼以禍福負物者以為鬼神即顛倒畀之其人亦自不知所以然也按此事晉史置之言不從條下然此妖異也故今移置之人痾門云孫休永安四年安吳氏陳焦死七日復生穿冢出干寶曰此與漢宣帝同事烏程侯皓承廢故之家得位之祥也孫皓寶鼎元年丹陽宣騫母時年八十因浴化為黿兄弟閉户衞之掘堂上作一大坎實水其中黿入坎遊戲一二日恒延頸外望伺户小開便輪轉自躍入於遠潭遂不復還此與漢靈帝時黄氏母事同吳亡之象也晉武帝泰始五年元城人年七十生角殆趙王倫簒亂之象也咸寧二年十二月瑯邪人顔畿病死棺斂已久家人咸夢畿謂己曰我當復生可急開棺遂出之漸能飲食屈伸視瞻不能行語二年復死京房易傳曰至隂為陽下人為上厥妖人死復生其後劉石僭逆遂亡晉室下為上之應也惠帝元康中安豐有女子周世寧八歲漸化為男子至十七八而氣性成京房易傳曰女子化為丈夫兹謂隂昌賤人為王此亦劉石覆蕩天下之妖也元康中梁國女子許嫁己受禮聘尋而其夫戍長安經年不歸女家更以適人女不樂行其父母逼强不得已去尋病亡後其夫還問其女所在其家具説之其夫逕至女墓不勝哀情便發冢開棺女遂活因與歸家後壻聞知詣官争之所在不能决祕書郎王導議曰此是非常事不得以常理斷之宜還前夫朝廷從其議惠帝世杜錫家葬而婢誤不得出後十年開冢祔葬而婢尚生始如瞑有頃漸覺問之自謂再宿爾初婢之埋年十五六及開冢更生猶十五六也嫁之有子光熙元年㑹稽謝真生子頭大而有髪兩蹠之石反反向上有男女兩體生便作丈夫聲經一日死此皇之不極下人伐上之痾於是諸王有僭亂之象也惠帝之世京洛有人兼男女體亦能兩用人道而性尤淫此亂氣所生自咸寧太康之後男寵大興甚於女色士大夫莫不尚之天下相倣傚或至夫婦離絶多生怨曠故男女氣亂而妖形之作也懷帝永嘉元年吳郡吳縣萬祥婢生子鳥頭兩足馬蹄一手無毛尾黄色大如枕此亦人妖亂之象也五年五月枹罕令嚴根妓産一龍一女一鵞京房易傳曰人生他物非人所見者皆為天下大兵是時帝承惠皇之後四海沸騰尋而陷於平陽為劉氏所害此其徵也愍帝建興四年新蔡縣吏任僑妻産二女腹與心相合自胷以上臍以下各分此蓋天下未一之妖也時内史呂會上言按瑞應圗異根同體謂之連理異畝同頴謂之嘉禾草木之異猶以為瑞今二人同心易稱二人同心其利斷金蓋四海同心之瑞也時皆哂之俄而四海分崩帝亦淪沒元帝太興初有女子其陰在腹當臍下自中國來至江東其性淫而不産又有女子陰在首渡在揚州性亦淫京房易傳曰人生子陰在首天下大亂在腹天下有事在背天下無後於時王敦據上流將欲為亂是其徵三年十二月尚書騶謝平妻生女墮地濞濞匹備反有聲湏臾便死鼻目皆在頂上面處如項口有齒都連為一胷如鼈手足爪如鳥爪皆下勾此亦人生他物非人所見者後二年有石頭之敗明帝太寧二年七月丹陽江寧侯紀妻死經三日復生成帝咸康五年四月下邳民王和僑居曁居未反陽息女可年二十自云上天來還得徵瑞印綬當母天下晉陵太守以為妖收付獄至十一月有人持柘之夜反杖絳衣詣止車門口列為聖人使求見天子門候受辭辭稱姓呂名賜其言王和女可右足下有七星星皆有毛長七寸天今命可為天下母奏聞即伏誅并下晉陵誅可康帝建元二年十月衞將軍營督過望所領兵陳瀆女臺有丈在其足曰天下之母灸之愈明京都諠譁有司收繫以聞俄自建康縣獄亡去明年帝崩獻后臨朝此其祥也孝武帝寧康初南郡州陵女唐氏漸化為丈夫安帝義熙七年無錫人趙未年八歲一旦暴長八尺髭鬚上即移反下相俞反蔚音尉然三日而死義熙中東陽人莫氏生女不養埋之數日於土中啼取養遂活義熙末豫章吳平人有二陽道重累生恭帝元熙元年建安人陽道無頭正平本下作女人形體劉聰子約死一指猶暖遂不殯殮及蘇言見元海於不周山經五日而遂復從至崑崙山三日而復返於不周見諸王公卿將相死者悉在宮室甚壯麗號曰䝉珠離國元海謂約曰東北有遮湏夷國無主久待汝父為之汝父後三年當來來後國中大亂相殺害吾家死亡畧盡但可永明軰十數人在耳汝宜還後年當來見汝不久約拜辭而回道過一國曰猗尼渠餘國引約入宮與約皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後年來必見過當以小女妻之約歸置皮囊於机上俄而蘇使左右机上取皮囊開視之有一方白玉題文曰猗尼渠餘國天王敬信遮湏夷國天王歲在攝提當相見也馳使呈聰聰曰若審如此吾不懼死也及聰死與此玉并葬焉苻健時新平有長人見語百姓張靖曰苻氏應天受命今當太平外面者歸中而安泰問姓名弗答俄而不見新平令以聞健以為妖下靖獄會大雨霖河渭溢浦津監㓂登得一屐於河長七尺三寸人跡稱之指長尺餘丈深一寸健歎曰覆載之中何所不有張靖所見定不虚也乃赦之宋明帝泰豫元年正月丁巳巨人跡見西池冰上梁武帝時海中浮鵠山去餘姚岸可千餘里上有女人年三百歲有女官道士四五百人年並出百但在山學道遣使獻紅席帝方捨身時其使適至云此草常有紅鳥居下故以為名觀其圖象則鸞鳥也時又有男子不知何許人於大衆中自割身以飼饑鳥血流徧體而顔色不變又沙門智泉鐡鉤挂體以燃千燈一日一夜端坐不動太清元年丹陽有莫氏妻生男眼在頂上大如兩歲兒墮地而言曰兒是旱疫鬼不得住母曰汝當令我得過疫鬼曰有上官何得自由母可急作絳帽故當無憂母不暇作帽以絳繫髪自是旱疫者二年揚徐兖豫尤甚莫氏鄉鄰多以絳免他土效之無騐簡文大寶二年京口人於藏兒年五歲登城西南角大樓打鼓作長攂鼓兵象也時侯景亂江南元帝承聖元年十二月天門山獲野人出山三日而死陳武帝永定三年有人長三丈見羅浮山通身潔白衣服楚麗京房易傳曰長人見亡後二歲帝崩後主為太子時有婦人突入東宫而大言曰畢國主後主立而祚終之應也至德三年八月建康人家婢死埋之九日而更生有牧牛人聞而出之禎明二年有神自稱老子游於都下與人對語而不見形言吉凶多驗得酒輙釂之經三四年乃去有船下忽聞人言曰明年亂視之得死嬰兒長三尺而無頭明年陳亡後魏太武大延元年有鄙婦人持方寸玉印詣潞縣侯孫家既而亡去莫知所在印有三字為龍鳥之形要妙奇巧不類人跡文曰旱疫平後齊文宣天保中臨漳有婦人産子二頭共體是後政由奸佞上下無别兩頭之應也武成河清四年有神見於後園萬壽堂前山穴中其體壯大不辨其面兩齒絶白長出於唇帝直宿嬪御已下七百人咸見焉帝又夢之後主武平五年大旱晉陽得死魃長二尺面頂各二目帝聞之使刻木為其形以獻後周武帝保定三年有人産子男陰在背上如尾兩足指如獸爪陰不當生於背而生者陰陽反覆君臣顛倒之象也人足不當有爪而有者將致攫人之變也時晉公䕶專政征伐自己陰懷簒逆帝誅之武帝時有强練者佯狂持一瓢至晉蕩公䕶門而擊破之曰身尚可子苦矣時䕶專政因朝太后帝擊殺之發兵捕其諸子皆備楚毒而死强練又行乞於市人或遺之粟麥輙以無底帒受之因大笑曰盛空未幾周滅高祖移都長安城為墟矣隋高祖開皇六年霍州有老翁化為猛獸七年相州有桑門變為蛇尾繞樹而自抽長二丈許仁壽四年有人長數丈見於應門其跡長四尺五寸其年帝崩煬帝大業元年鴈門人房回安母年百歲額上生角長二寸洪範五行傳曰婦人陰象也角兵象也下反上之應是後天下果大亂陰戎圍帝於鴈門四年鴈門宋谷村有婦人生一肉卵大如斗埋之後數日所埋處雲霧盡合從地雷震而上視之洞穴失卵所在六年趙郡李來王家有婢産一物大如卵七年正月朔旦有盜衣白練裙襦手持香花自稱彌勒佛出世入建國門奪衞士仗將為亂齊王暕遇而斬之後三年楊元感作亂引兵圍洛陽戰敗乃伏誅八年有澄公者若狂人於東都大呌唱賊帝聞而惡之明年元感作亂舉兵圍洛陽至十二年澄公又大呌賊李宻逼東都孟讓燒豐東都市而去九年帝在高陽唐縣人宋子賢善為幻術毎夜樓上有光明能變作佛形自稱彌勒出世又懸大鏡於堂上紙素上畫為虵為獸及人形有人來禮謁者轉側其鏡遣觀來生形像或映見紙上虵形子賢輙告云此罪業也當更禮念又令禮謁乃轉人形京之遠近惑信日數百千人遂潛謀作亂將為無遮佛㑹因舉兵欲襲擊乘輿事泄鷹揚郎將以兵捕之夜至其所遶其所居但見火坑兵不敢進郎將曰此地素無坑止妖妄耳及進無復火矣遂擒斬之并坐其黨與千餘家其後復有桑門向海明於扶風自稱彌勒佛出世潛謀逆亂人有歸心者輙獲吉夢由是人皆惑之三輔之士翕然稱為大聖因舉兵反衆至數萬官軍擊破之京房易飛候曰妖言動衆者兹謂不信路無人行不出三年起兵自是天下大亂路無人行唐高祖武德四年太原尼志覺死十日而蘇太宗貞觀十九年衞州人劉道安頭生肉角隠見不常因以惑衆伏誅角兵象肉不可以觸者高宗永徽六年淄州高苑民吳威妻嘉州民辛道䕶妻皆一産四男凡物反常則為妖亦陰氣盛則母道壯也顯慶三年普州有人化為虎虎猛噬而不仁儀鳯三年四月涇州獻二小兒連心異體初鶉觚縣衞士胡萬年妻吳生一男一女其胸相連餘各異體乃析之則皆死又産復然俱男也遂育之至是四歲以獻於朝永隆元年長安獲女魃長尺有二寸其狀怪異詩曰旱魃為虐如惔如焚是歲秋不雨至於明年正月二年九月萬年縣女子劉凝静衣白衣從者數人升太史令㕔問比有何災異令執之以聞是夜彗星見太史司天文歴候王者所以奉若天道恭授民時者非女子所當問武后載初中涪州民范端化為虎神功元年二月庚子有人走入端門又入則天門至通天宮閽及仗衞不之覺時來俊臣婢産肉塊如二升器剖之有赤蟲湏臾化為蜂螫人而去久視二年正月成州有大人跡見長安中郴州佐史因病化為虎欲食其嫂擒之乃人也雖未全化而虎毛生矣睿宗太極元年狂人段萬謙潛入承天門登太極殿升御牀自稱天子且言我李安國也人相我年三十二當為天子元宗開元二十三年四月冀州獻長人李家寵八尺有五寸代宗大歴十年二月昭應婦人張産一男二女德宗貞元八年正月丁亥許州人李狗兒持杖上含元殿擊欄檻伏誅十年四月恒州有巨人跡見十五年正月戊申狂人劉忠詣銀臺稱白起令上表天下有火災十七年十一月翰林待詔戴少平死十有六日而蘇是歲宣州南陵縣丞李嶷死已殯三十日而蘇憲宗元和二年商州洪崖冶役夫將化為虎衆以水沃之不果化穆宗長慶四年三月民徐忠信潛入浴堂門敬宗寶歴二年十二月延州人賀文妻一産四男文宗太和二年十月狂人劉德廣入含元殿懿宗咸通七年渭州有人生角寸許占曰天下有兵十三年四月太原晉陽民家有嬰兒兩頭異頸四手聨足此天下不一之妖是歲民皇甫及年十四暴長七尺餘長啜大嚼三倍如初歲餘死僖宗乾符六年秋蜀郡婦人尹生子首如豕目在脽下占曰君失道光啓元年隰州溫泉民家有死者既葬且半月行人聞聲呼地下其家發之則復生歲餘乃死二年春鳯翔郿縣女子未齓化為丈夫旬日而死京房易傳曰兹謂陰昌賊人為王昭宗大順元年六月資州兵王全義妻如孕覺物漸下入股至足大拇痛甚拆而生珠如彈丸漸長大如杯天祐二年五月潁州汝陰民彭文妻一産三男蜀王建元年巨人見青城山南漢劉鋹時南海民妻生子兩首四臂宋自太祖建隆元年至真宗天禧四年郡縣上言民妻産三男者凡一百九産四男者凡三産一男三女者二産二男一女者一太祖建隆三年齊州晉州大旱民家多生魃太宗太平興國九年揚州揚子縣民妻生男毛被體半寸餘面長頂高鳶肩眉毫麤宻近髪際有毛兩道軟長眼微紫唇紅厚耳鼻大類胡僧至三歲畫圖以獻淳化元年八月汾州悉達院僧智嚴頭生角可長三寸真宗天禧四年七月衡州耒陽縣民張中妻産三男其一額有白痣方寸餘上生白髪仁宗天聖至英宗治平婦人生四男者二生三男者四十四生二男一女者一説者曰天下安寧人民蕃息之驗也神宗熙寧元年距元豐七年郡邑民家生三男者八十四而四男者一二男一女者一元豐八年至哲宗元符二年生三男者十八而四男者二三男一女者一元符三年至欽宗靖康生三男者十九四男者一徽宗宣和六年都城有賣青果男子孕而誕子蓐母不能收易七人始免而逃去又有酒肆號豐樂樓酒保朱氏子之妻可四十餘楚州人忽生髭長僅六七寸疏秀而美宛然一男子特詔度為女道士高宗紹興三年建康府桐林灣人産兒肉角有齒角兵象肉不可以觸者是歲人多産鱗毛皆人痾也二十年八月洋州真符縣民家一産三男孝宗隆興元年建康民流寓行都産子二首具羽毛之形乾道五年衡湘間有人化為虎者與唐志顯慶三年人痾同占餘杭縣民婦産子青而毛二肉角又有二家婦産子毛角亦如之皆連體兩面相鄉鄉與嚮同三家纔相去一二里痾氣同所鍾也又潮州城西婦孕過期産兒如指大五體皆具者百餘蠕蠕能動人痾之異也淳熙十年鄱陽南鄉民産子兩肘各有二臂長十五歲毎鬬則六臂並運十三年行都有人死十四日復生十一月辛未鄧家巷民婦産肉塊三其一直目而横口十四年六月臨安府浦頭民産子生而能言四日暴長四尺光宗紹熙元年平江府崑山縣石工採石而山摧工壓焉三年六月他工採石鄰山聞其聲呼相應答如平生報其家鑿石出之見其妻喜曰久閉乍風肌如裂俄頃聲微噤不語化為石人貎如生寧宗慶元元年饒州樂平民産子人體有尾永州民産兒首有角腋有肉翅二年七月隆興府進賢縣民産子亦如之而面有三目嘉定元年四月鎮江後軍妻生子一身二首四臂晉志謂中原分裂應此人痾也後數年金人失中原文獻通考卷三百八
