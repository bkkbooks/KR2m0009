body:
  text: 文獻通考卷七十八鄱陽馬端臨貴與著郊社考十一祀五帝五時迎氣周禮小宗伯兆五帝於四郊兆為壇之營域者疏曰云兆為壇之營域按封人云社稷之壝謂壝土為之即此壇之營域一也不言壇者舉外營域有壇可知春官因吉土以享帝於郊吉土王者所卜而居之土也享帝於郊以四時所兆祭於四郊者也今漢亦四時迎氣其禮則簡詳見祀天禮先立春三日太史謁之天子曰某日立春盛德在木天子乃齋太史禮官之屬掌正歲年以序事謁告也疏曰先立春三日者周法五時迎氣皆前期十日而齋散齋七日致齋三日今秦法簡省故三日也蓋散齋二日致齋一日盛德在木者天以覆蓋生民為德四時各有盛時春則為生天之生育盛德在木位故云盛德在木立春之日天子親帥三公九卿諸侯大夫以迎春於東郊還反賞公卿諸侯大夫於朝還音旋之迎春祭蒼帝靈威仰於東郊兆也王居明堂禮曰出十五里迎歲蓋殷禮也周近郊五十里賞謂有功德者有以顯揚之也朝大寢門外命相布德和令行慶施惠下及兆民相謂三公相王之事也德謂善教也令謂時禁也慶謂休其善也惠謂恤其不足也天子曰兆民慶賜遂行毋有不當遂猶逹也言使當得者皆得得者無非其人先立夏三日太史謁之天子曰某日立夏盛德在火天子乃齋立夏之日天子親帥三公九卿大夫以迎夏於南郊還反行賞封諸侯慶賜遂行無不欣説迎夏祭赤帝赤熛怒於南郊之兆也不言帥諸侯而云封諸侯諸侯時或無在京師者空其文也説音悅熛必遙反先立秋三日太史謁之天子曰某日立秋盛德在金天子乃齋立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊還反賞軍帥武人於朝迎秋者祭白帝白招拒於西郊之兆也軍帥諸將也武人謂環人之屬有勇力者先立冬三日太史謁之天子曰某日立冬盛德在水天子乃齋立冬之日天子親帥三公九卿大夫以迎冬於北郊還反賞死事恤孤寡迎冬者祭黑帝叶光紀於北郊之兆也死事謂以國事死者若公叔禺人顔涿聚者也孤寡其妻子也有以惠賜之大功加賞又禺音寓涿丁角反作椓大宗伯以玉作六器以禮天地四方以青圭禮東方以赤璋禮南方以白琥禮西方以元璜禮北方禮東方以立春謂蒼精之帝而太皥句芒食焉禮南方以立夏謂赤精之帝而炎帝祝融食焉禮西方以立秋謂白精之帝而少昊蓐收食焉禮北方以立冬謂黑精之帝而顓頊元冥食焉禮神者必象其類圭鋭象春物初生半圭曰璋象夏物半死琥猛象秋嚴半璧曰璜象冬閉藏地上無物惟天半見令疏曰禮東方以立春謂蒼精之帝者此已下皆據月四時迎氣皆在四立之日故以立春立夏立秋立冬言之也知皆配以人帝人神者亦據月令四時十二月皆陳人帝人神彼止為告朔於明堂及四時迎氣配天帝而言告朔於明堂告五人帝五人神配以文王武王必知迎氣亦有五人帝五人神者以其告朔入明堂至秋總享五帝於明堂皆以五人帝五人神配天若然迎氣在四郊還是迎五天帝明知五人帝五人神亦配祭可知以其自外至者無主不止故皆以人帝人神為配也言蒼精赤精白精黑精者皆據春秋緯運斗樞云太微宮有五帝座星文耀鈎亦曰靈威仰之等而説也云禮神者必象其類者即圭鋭已下是象其類也云圭鋭象春物初生者雜記贊大行云圭剡上左右各寸半是圭鋭也云半圭曰璋者按典瑞云四圭有邸以祀天兩圭有邸以祀地是兩圭半四圭又云圭璧以祀日月是一圭半兩圭又云璋邸射以祀山川是璋又半一圭故云半圭曰璋公羊傳亦云寶者何璋判白亦半圭曰璋云象夏物半死者夏時薺麥死是半死云琥猛象秋嚴者謂以玊為虎形猛屬西方是象秋嚴也云半璧曰璜者逸禮記文似半圭曰璋也云冬閉藏地上無物惟天半見者列宿為天文草木為地文冬時草木枯落唯天上列宿仍在故云惟天半見故用半璧曰璜也此六玊所用則上璧下琮按覲禮加方明東方圭南方璋西方琥北方璜與此同唯上圭下璧與此違者鄭彼注云上宜以蒼璧下宜以黃琮而不以者則上下之神非天地之至貴者也彼上下之神是日月故陳玊與此不同也此經神不見中央含樞紐者此四時迎氣皆在四郊小宗伯云兆五帝於四郊鄭注云黃帝亦於南郊是也璋音章琥音虎璜音黃皆有牲幣各放其器之色注疏見祀天禮太宰祀五帝則掌百官之誓戒與其具修祀五帝謂四郊及明堂誓戒要之以刑重失禮也明堂位所謂各揚其職百官廢職服大刑是其辭之略也具所當共修掃除糞灑灑色買反疏曰具所當共者祭祀之聨事祭祀之具百官共供宮人云掌六寢之修守祧云其廟有司修除之是其修掃除糞灑也前期十日帥執事而卜日遂戒前期前所諏之日也十日容散齋七日致齋三日執事宗伯太卜之屬既卜又戒百官以始齋疏曰大宗伯職云凡祀大神享大鬼祭大示帥執事而卜日謂宗伯蒞卜但四時迎氣冬至郊天等雖有常日常時猶須審慎仍卜日故表記云不犯日月不違卜筮注日月謂冬夏至正月及四時也所不違者日與牲尸也假令不吉改卜後日及執事視滌濯疏曰春官小宗伯大祭祀視滌濯大宗伯亦云宿視滌濯彼二官親視滌濯太宰尊亦往蒞之及納亨贊王牲事納亨納牲將告殺謂鄉祭之晨既殺以授亨人凡大祭祀君親牽牲大夫贊之鄉許亮反告疏曰謂牽牲入時也禮器云納牲詔於庭殺訖毛以純血以告殺腥其俎豚解而腥之以此訖乃納與亨人爓祭祭天無祼故先迎牲若宗廟之祭有祼而後迎牲也及祀之日贊玊幣爵之事日旦明也玉幣所以禮神玊與幣各如其方之色爵所以獻齊酒不用玊爵尚質也三者執以從王王至而授之云疏曰下經享先王用玉爵尚文此祭天不用玉爵故尚質云三者執以從王至而授之者謂至此祀圜丘方澤祭所而授之王親自執玉幣奠於神座親酌以獻尸祀大神示亦如之疏曰云祀大神謂冬至祭天於圜丘云祀大祇謂夏至祭地於方澤亦如之者皆如已上祀五帝之禮享先王亦如之天官大司寇若禋祀五帝則戒之日涖誓百官戒於百族戒之日卜之日也百族謂府史以下也郊特牲曰卜之日王立於澤親聼誓命受教諫之義也獻命庫門之內戒百官也太廟之內戒百姓也疏曰禋之言煙煙祀五帝謂迎氣於四郊及總享五帝於明堂也云戒之日者謂前十日卜之日卜吉即戒之使散齋云涖誓百官者謂餘官誓百官之時大司冦則臨之云戒於百族者大司寇親自戒之其百官所戒者當太宰為之是以太宰云祀五帝前期十日帥執事而卜日遂戒故知太宰戒百官也若然太宰云祀五帝則掌百官之誓戒太宰雖云掌百官誓戒戒則親為之誓則掌之而不親誓何者此司冦卑於太宰此云涖誓百官豈司寇得臨太宰乎故知太宰掌之餘小官誓之司寇臨之也又曰鄭知百族府史以下者以其王之百姓亦同太宰戒之故知百族府史胥徒也引郊特牲者欲見百族非王之親是府史以下也云獻命庫門之內戒百官也者王自澤宮而還入臯門至庫門之內太宰獻命命即戒百官又於庫門內而東入廟門廟門之內戒百姓彼注云百姓王之親也族親故入廟乃戒之及納亨前王祭之日亦如之亨普庚反辰疏曰納亨謂將祭之祭之日謂旦明也此二者大司寇為王引道故云亦如之奉其明水火疏曰司烜氏以陽燧取火於日中以隂鑑取水於月中明潔也奉此水火者水以配鬱鬯與五齊火以給㸑亨也秋官掌次祀五帝則張大次小次設重㡩重案疏曰祀五帝謂四時迎氣次謂幄帳也大幄小幄但幄在幕中既有幄明有帷幕可知設重㡩者謂於幄中設承塵云重案者案則牀也牀言重謂牀上設重席不言氈及皇邸亦有可知此謂四時迎氣月令四立之祭大幄謂王侵晨至祭所祭時未到去壇壝之外逺處設大次王且止居故云大幄初往所止居也接祭者與羣臣交接相代而祭去壇宜近置一小幄退候之處云重㡩復㡩者謂雨重為之云重案牀重席者案司几筵莞筵繅席次席三重此言重席亦當有此三重與重帟不同郊天官上氈案皇邸見祭旅帝條王祀昊天上帝則服大裘而冕祀五帝亦如之疏見祀天禮春官司服小司寇凡禋祀五帝實鑊水納亨亦如之鑊戶郭反疏其實鑊水當以洗解牲體肉曰五帝所祀四時迎氣總享明堂實鑊水以擬洗肉所用也納亨亦如之謂將祭亨祭之晨實以水烹牲也鄭知實鑊水為洗解牲肉者以下云納亨亦如之是實鑊水亨煮肉故知此是洗肉也封人云供其水稿亦謂洗牲肉也秋官士師祀五帝則沃尸及王盥洎鑊水洎謂增其沃汁牢疏曰按特牲少尸尊不就洗入門北面則以盤匜盥手王盥謂將獻尸時先就洗盥洎鑊水增其沃汁鑊在門外之東亨牲之㸑言須鑊水就㸑增之亨實鑊水此官增之示敬而已同上充人掌繫祭祀之牲牷祀五帝則繫於牢芻之三月牢間也必有間者防禽獸觸齧養牛羊曰芻三月一時節氣成祀疏曰祭祀之牲皆體全具故以牷言之上云掌繫祭之牲牷則總養天地宗廟之牲下别言祀五帝則略舉五帝而已其實昊天及地祇四望社稷之等皆繫之也云牢間也者校人養馬謂之間此養牛羊謂之為牢言間見其間衛言牢見其牢固所從言之異其實一物也按宣三年公羊云帝牲在於滌三月何休云滌宮名養帝牲三牢之處也三牢者各主一月地官大司徒祀五帝奉牛牲羞其肆肆託歷反注肆解同司農音四注肆陳同進牛能任載地類也奉猶進也鄭司農云羞也肆陳骨體也元謂進所肆解骨體喪禮曰肆解去蹄疏曰牛能任載地類也故屬地官司徒骨體肩臂脊脅之屬司農以肆為四音讀之故云肆陳也謂陳牲體於爼上即體解折節為二十一體是也元謂進所肆解骨體者後鄭之意以肆為擲音讀之肆解骨體者為七體解之故引士喪禮曰肆解去蹄按士喪禮曰特豚四鬄去蹄彼注云四解之殊肩髀彼言殊肩髀與此骨體一也但彼云四鬄此云肆解其字不同者鄭直以義讀之非彼正文此云解當彼鬄也後鄭必不從先鄭為肆陳骨體為二十一體者按禮運云腥其爼孰其殽彼注云腥其俎謂豚解而腥之也孰其殽謂體解而爓之也祭祀之法先豚解後體解經云奉牛牲謂初牽入時即言羞其肆明先豚解又按國語禘郊之事則有全蒸明知不得先有體解若然則禘郊之事先全蒸始後豚解也若宗廟則無全蒸先豚解次體解禮運所云者是也地官大司樂乃奏黃鍾歌大呂舞雲門以祀天神天神謂五帝及日月星辰傳季康子問於孔子曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔丘也聞諸老聃曰天有五行水火木金土分時化育以成萬物一歲三百六十日五行各主七十二日也化生長育一歲之功萬物莫不受成其神謂之五帝五帝五行之神佐天生物者而後世讖緯皆為之名字亦為妖怪妄言古之王者易代而改號取法五行五行更王終始相生亦象其義更古衡反王音旺下王天同法五行更王終始相生以木德王天下其次以所生之行轉相承而諸説乃謂五精之帝下生王者其為蔽惑無可言者故其生為明王者死而配五行是以太皥配木炎帝配火黃帝配土少皥配金顓頊配水康子曰太皥氏其始之木何如孔子曰五行用事先起於木木東方萬物之初皆出焉是故王者則之而首以木德王天下其次則以所生之行轉相承也木生火火生土之屬康子曰吾聞句芒為木正祝融為火正蓐收為金正元冥為水正后土為土正此則五行之主而不亂稱曰帝者何也孔子曰凡五正者五行之官名五行佐成上帝而稱五帝太皥之屬配焉亦云帝從其號天至尊物不可以同其號亦兼稱上帝上得包下五行佐成天事謂之五帝以地有五行而其精神在上故亦謂之上帝黃帝之屬故亦稱帝蓋從天五帝之號故王者雖號稱帝而不得稱天帝而曰天子者天子與父其尊卑相去逺矣曰天王者言乃天下之王也昔少皥氏之子有四叔曰重曰該曰修曰熙實能金木及水使重為句芒該為蓐收修及熙為元冥顓頊氏之子曰犂為祝融龔工氏之子曰句龍為后土此五者各以其所能業為官職各以一行之官為職業之事生為上公死為貴神别稱五祀不得同帝神故不得稱帝也康子曰陶唐有虞夏后殷周獨不得配五帝意者德不及上古邪將有限乎孔子曰古之平治水土及播殖百穀者衆矣唯句龍兼食於社兼猶配也而棄為稷神易代奉之無敢易者明不可與等故自太皥以降逮於顓頊其應五行而王數非徒五而配五帝是其德不可以多也家語五帝篇楊氏曰愚按此章注云五帝五行之神佐天生物者而後世讖緯皆為之名字亦為妖怪妄言夫所謂為之名字如靈威仰而下是也自伏羲始畫八卦更文王夫子而後易道備卦象文言繫辭言天者詳矣何嘗有此等名字推原此説之所出則曰易緯乾鑿度也春秋緯文耀鉤也運斗樞也孝經緯文也鉤命決也援神契也抑不知易也春秋也孝經也聖人何嘗有一言一句如此信乎其為妖怪妄言矣但此章所謂五帝五行之神佐天生物者愚恐非夫子之言或謂家語王肅所作何也以易論之乾坤為父母震巽坎離艮兌為六子卦畫固有此象矣然序卦言帝出乎震齊乎巽自震巽而下皆天帝之為也謂在天有五行能生物則可謂五行佐天生物則天與五行為二矣是以程子曰不知乾坤之外甚底是六子譬如人之四肢只是一體耳學者大惑也按五帝之祀見於周禮五帝之義見於家語其説本正大也自秦漢間廢祀天之禮而以所謂郊祀者祀於五畤名曰五帝鄭康成解經習聞秦漢之事遂於經所言郊祀多指為祀五帝且據緯書為之名字東曰靈威仰南曰赤熛怒西曰白招拒北曰叶光紀中曰含樞紐於是王子雍羣儒引經傳以排之而謂五帝者太皥以下五人帝也先儒楊信齋則謂果以五人帝為五帝則五人帝之前其無司四時者乎鄭則失矣王亦未為得也其説善矣然楊氏之釋五帝則以為如毛公所謂元氣昊大謂之昊天逺視蒼蒼謂之蒼天程子所謂以形體謂之天以主宰謂之帝之類則五帝乃天之别名而元未嘗有所謂五帝之神也愚謂若以為天之别名而已則曰帝可矣何必拘以五又何必於祀上帝之外别立祀五帝之禮乎蓋五帝者五行之主而在天猶五嶽為五方之鎮而在地也五帝不出於天之外而謂五帝即昊天則不可五嶽不出於地之外而謂五嶽即后土亦不可家語所言盡之矣今因疑緯書靈威仰等名字而謂五帝之本無因疑五帝之本無而謂家語之非聖言亦過矣如日月星宿風伯雨師皆天神之見於祀典者經傳所言昭昭也而道家者流則以為各有名稱甚者或為之姓字其妖妄不經甚於緯書儒者所不道也然因是而疑日月諸神之本無可乎三山林氏曰古之祭上帝與祭五帝之禮以經推之禮莫盛於周周之祭上帝亦曰祀天郊祀之天明堂之上帝即一也郊祀從簡為報本反始以稷配明堂從備為大享報成以文王配稷王業所始文王王業所成從其類也祭於郊曰天於明堂曰上帝天言兆朕帝言主宰也是故歲之祭天者四郊於冬至一也明堂於季秋一也祈穀於孟春一也左氏謂郊而後耕併言后稷是已大雩於龍見一也詩頌所謂春夏祈穀於上帝是已歲之祭五帝者五周禮所謂祀五帝亦如之是也先言祀上帝次言祀五帝亦如之蓋言祀青帝之禮亦如之祀赤帝之禮亦如之不可詳數故但曰祀五帝亦如之夫所謂祀五帝亦如之者謂大臣之贊相有司之備具至其圭幣則五帝各有方色未嘗與上帝混而同也周禮曰禮東方禮南方月令云四立迎氣故曰歲之祭上帝者四而祭五帝者五若有故而旅則不在此矣又曰愚按祀五帝禮物樂章大略當與郊祀同而亦有不同者如小宗伯兆五帝於四郊乃祀五帝之位月令四立之祭乃祀五帝之時大宗伯以青圭禮東方以赤璋禮南方之類乃禮五帝之玊大宗伯牲幣各放其器之色大司徒奉牛牲之類皆祀五帝之禮也大司樂乃奏黃鍾歌大呂舞雲門以祀天神鄭注云天神謂五帝及日月星辰則祀五帝之樂也又按大宗伯注疏祭五天帝以五人帝五人神配食通典云其配祭以五人帝春以太皥夏以炎帝季夏以黃帝秋以少皥冬以顓頊其壇位各於當方之郊去國五十里內曰近郊為兆位於中築方壇亦名曰太壇而祭之其禮七獻畢獻之後天子舞當代之樂又按鄭氏注掌次祀五帝則張大次小次設重帟重案云此所謂四時迎氣月令四立之祭是矣及注太宰祀五帝大司寇小司寇禋祀五帝皆云四時迎氣亦當與掌次同注又兼云總享明堂何邪夫總享五帝於明堂漢禮則有之非周禮也漢襲秦禮郊祀及明堂皆祀五畤之帝周禮安有此哉鄭注蓋約漢禮以言周禮耳我將之詩曰我將我享維羊維牛維天其右之又曰我其夙夜畏天之威于時保之我將之詩言天者再天即帝也帝即天也觀我將之詩則知周人明堂祀天非總享五帝明矣又詳見明堂篇祀五人帝五人神禮楊氏曰鄭注五帝為五天帝賈逵馬融王肅等以五帝為五人帝故為鄭學者辨之云享帝於郊而風雨節寒暑時若是五人帝何能使風雨寒暑得時二説不同當以鄭氏之説為正謂又鄭氏注春官宗伯謂禮五天帝而以五人帝配食如立春禮蒼帝於東郊而太皥句芒食焉以其自外至者無主不止故四時别祀五帝而以五人帝配食也乂孟夏大雩季秋大享鄭注謂合祭五天帝而以五人帝配之合祭五帝之説無所據武又鄭注謂十二月聽朔告五人帝五人神配以文王王原鄭注之意蓋以月令十二月皆有五人帝五人神之文如其帝太皥其神句芒之類故有是説未知然否春其帝太皥其神句芒此蒼精之君木官之臣自古以來著德立功者也太皡宓戲氏句芒少皥氏之子曰重為木官謂宓音密戲作羲廣疏曰按異義古尚書説元氣廣大之皥天則皥皥大之意以伏羲德能同天故稱皥以東方生養元氣盛大西方收斂元氣便小故東方之帝謂之太皥西方之帝謂之少皥其神句芒者謂自古以來主德立功之臣其祀以為神是句芒者主木之官木初生之時句屈而有芒角故云句芒言太皥句芒者以此二人生時木王主春立德立功及其死後春祀之時則祀此太皥句芒太皥在前句芒在後相去懸逺非是一時太皥木主句芒有主木之功故取以相配也云著德立功者著德謂太皥立功謂句芒也云太皥宓犧氏者以東方著德則謂之太皥德能執伏犧牲謂之伏羲即宓戲也律歷志云太皥作網罟以佃漁取犧牲故天下號曰包犧氏之又季春天子乃薦鞠衣於先帝注云為將蠶求福祥助也鞠衣黃桑之服先帝太皥之屬於疏曰禮祭五帝則服大裘今薦鞠衣與桑同色蓋薦神座菊者草名花色黃故季秋之月云菊有黃華是鞠衣黃也與桑同色又當桑生之時故云黃桑之服也云先帝太皥之屬者以其言先不言上故知非天唯太皡之屬春唯祭太皥云之屬者以蠶功既大非獨祭太皥故何允云總祭五方之帝其所祭之處王權賀瑒熊氏等並以為在明堂以太皡祭在明堂故也夏其帝炎帝其神祝融此赤精之君火官之臣自古以來著德立功者也炎帝大庭氏也祝融顓頊氏子曰犂為火官為疏曰春秋説云炎帝號大庭氏下地皇作耒耜播百穀曰神農也中央土其帝黃帝其神后土此黃精之君土官之臣自古以來著德立功者也黃帝軒轅氏也后土亦顓頊氏之子曰犂兼為土官融疏曰按昭二十九年左傳云顓頊氏有子曰犂為祝共工氏有子曰句龍為后土后土為土官知此經后土非句龍而為犂者以句龍初為后土後轉為社后土官闕犂則兼之故鄭注大宗伯云犂食火土以宗伯别云社稷又云五祀句龍為社神則不得又為五祀故云犂兼也秋其帝少皥其神蓐收此白精之君金官之臣自古以來著德立功者也少皥金天氏蓐收少皥氏之子曰該為金官師疏曰左傳昭元年云昔金天氏有裔子曰昧為元冥生允格臺駘稱金天氏與少皥金位相當故少皥則金天氏也昭二十九年蔡墨云少皥氏之子曰該又云該為蓐收是為金神佐少皡於秋蓐收者言秋時萬物摧辱而收斂冬其帝顓頊其神元冥此黑精之君水官之臣自古以來著德立功者也顓頊髙陽氏也元冥少皥氏之子曰修曰熙為水官疏曰按五帝德云顓頊高陽氏姬姓也又帝王世紀云生十年而佐少皡十二年而冠二十年而登帝位在位七十八年而崩以水承金也季冬乃畢祀帝之大臣天之神祇四時之功成於冬孟月祭其宗至此可以祭其佐也帝之大臣句芒之屬不疏曰前孟冬是祭先嗇神農并祭五帝但孟冬其文具則五帝為宗大臣句芒等為佐是孟月祭其宗此月祭其佐也報月令人問祭先聖如何朱子曰有功德在人人自當之古祀五人帝只是如此秦襄公作西畤祠白帝宣公作密畤祠青帝靈公作吳陽上畤祠黃帝作下畤祠炎帝詳見郊祀門漢高祖二年立黑帝祠命曰北畤詳見郊祀門命晉巫祠五帝九天巫祠九天皆以歲時祠宮中索隱曰孝文本紀云立九天廟於甘泉三輔故事云胡巫事九天於神明臺淮南子云中央曰鈞天東方曰蒼天東北昊天北方元天西北幽天西方皓天西南朱天南方炎天東南陽天是為九天也正義曰太元經云一中天二羡天三從天四更天五晬天六郭天七咸天八治天九成天也按五帝之説先儒多闢之以為帝即天也天一而已安得有五然帝者主宰之名五行之在天各有神以主之而謂之五帝猶云可也至於九天之説則其虛誕特甚而漢初已祠之宮中索隱正義引淮南子及太元經所載名字是果何所傳授而於義何所當邪後來道家有所謂九天又有所謂三十三天且各有名字然則其説所從來逺矣文帝十五年趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉曰東北神明之舍西方神明之墓也神明日也日出東方舍謂暘谷日沒於西墓北谷也天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇宇謂上同下異禮所謂復廟重屋也一營宇之中立五廟括地志云渭陽五帝廟在雍州咸陽縣東三十里一宇之內而設五帝各依其方帝别為一殿帝一殿面各五門各如其帝色祠所用及儀亦如雍五畤夏四月帝親拜霸渭之會以郊見渭陽五帝五帝廟南臨渭北穿蒲池溝水權火舉而祠若光輝然屬天焉於是貴平上大夫賜纍千金而使博士諸生刺六經中作王制謀議巡狩封禪事文帝出長安門若見五人於道北遂因其直北立五帝壇祠以五牢其後人有上書告新垣平所言皆詐下吏治誅夷平自後帝怠於神明之事而渭陽長門五帝使祠官領以時致禮不親往焉武帝時亳人繆忌言天神貴者泰一泰一佐者五帝乃令祠官寬舒等具泰一祠壇祠壇放薄忌泰一壇壇三垓五帝壇環居其下各如其方又治明堂奉高旁祠泰一五帝於明堂上座詳見郊祀門成帝時匡衡請於長安立南北郊奏言今郊雍鄜密上下畤本秦侯各以其意所立非禮之所載術也漢初儀制未定且因秦故祠復立北畤今既稽古建定天地之大禮郊見上帝青赤白黃黑五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當長遵及北畤未定時所立不宜復修天子皆從焉漢舊儀匡衡既奏罷雍畤甘泉汾隂作南北郊祀天地復作五畤祭五帝於長安城旁十里內平帝元始五年大司馬王莽奏臣前奏徙甘泉泰畤汾隂后土皆復於南北郊謹按周官兆五帝於四郊山川各因其方師古曰春官小宗伯之職也兆謂為壇之營域也五帝於四郊謂青帝於東郊赤帝及黃帝於南郊白帝於西郊黑帝於北郊也各因其方謂順其所在也今五帝兆居在雍五畤不合於古又日月雷風山澤易卦六子之尊氣所謂六宗也星辰水火溝瀆皆六宗之屬也今或未特祀或無兆居謹與太師光大司徒宮羲和歆等八十九人議皆曰天子父事天母事地今稱天神曰皇天上帝泰一兆曰泰畤而稱地祇曰后土與中央黃靈同又兆北郊未有尊稱宜令地祇稱皇地后祇兆曰廣畤易曰方以類聚物以羣分師古曰易上繫之辭也方謂所向之地分羣神以類相從為五部兆天地之别神中央帝黃靈后土畤及日廟北辰北斗鎮星中宿中宮於長安城之未地兆東方帝太昊青靈句芒畤及雷公風伯廟歲星東宿東宮於東郊兆南方炎帝赤靈祝融畤及熒惑星南宿南宮於南郊兆西方帝少皥白靈蓐收畤及太白星西宿西宮於西郊兆北方帝顓頊黑靈元冥畤及月廟雨師廟辰星北宿北宮於北郊兆奏可於是長安旁諸廟兆畤甚衆矣世祖建武二年制郊兆於雒陽城南採元始故事為圜壇八陛中又為重壇天地位其上皆南鄉西上其外壇上為五帝位青帝位在甲寅之地赤帝位在丙巳之地黃帝位在丁未之地白帝位在庚申之地黑帝位在壬亥之地天地高帝黃帝各用犢一頭青帝赤帝共用犢一頭白帝黑帝共用犢一頭凡樂奏青陽朱明西皓元冥餘見郊祀門顯宗永平二年祀五帝於明堂光武帝配五帝座位堂上各處其方黃帝在未皆如南郊之位永平中以禮讖及月令有五郊迎氣服色因採元始中故事兆五郊於雒陽四方中兆在未壇皆三尺階無等立春之日迎春於東郊祭青帝句芒月令章句曰東郊去邑八里因木數也車旗服飾皆青歌青陽八佾舞雲翹之舞及因賜文官太傅司徒以下縑各有差立夏之日迎夏於南郊祭赤帝祝融月令章句曰南郊七里因火數也車旗服飾皆赤歌朱明八佾舞雲翹之舞先立秋十八日迎黃靈於中兆祭黃帝后土月令章句曰去邑五里因土數也車旗服飾皆黃歌朱明八佾舞雲翹育命之舞魏代繆襲議曰漢有雲翹育命之舞不知所出舊以祀天今可兼以雲翹祀圜丘兼以育命祀方澤立秋之日迎秋於西郊祭白帝蓐收月令章句曰西郊九里因金數也車旗服飾皆白歌西皓八佾舞育命之舞使謁者以一特牲先祭先虞於壇有事天子入囿射牲以祭宗廟名曰貙劉語在禮儀志立冬之日迎冬於北郊祭黑帝元冥月令章句曰北郊六里因水數也車旗服飾皆黑歌元冥八佾舞育命之舞獻帝起居注曰建安八年公卿迎氣北郊始復用八佾皇覽曰迎禮春夏秋冬之樂以順天道是故距冬至日四十六日則天子迎春於東堂距邦八里堂髙八尺堂階三等青稅八乘旗旄尚青田車載矛號曰助天生唱之以角舞之以羽翟此迎春之樂也自春分數四十六日則天子迎夏於南堂距邦七里堂髙七尺堂階三等赤稅七乘旗旄尚赤田車載戟號曰助天飬唱之以徵舞之以鼓鞉此迎夏之樂也自夏至數四十六日則天子迎秋於西堂距邦九里堂髙九尺堂階九等白稅九乘旗旄尚白田車載兵號曰助天收唱之以商舞之以干戚此迎秋之樂也自秋分數四十六日則天子迎冬於北堂距邦六里堂高六尺堂階六等黑稅六乘旗旄尚黑田車載甲鐡鍪號曰助天誅唱之以羽舞之以干戈此迎冬之樂也靈帝時議郎蔡雍上疏言臣自在宰府及備朱衣朱衣謂祭官也迎氣五時而車駕稀出四時致敬屢委有司雖有解除猶為踈廢解除謂謝過也忘禮敬之大任禁忌之書拘信小故以虧大典故皇天不悅顯風霆災妖之異晉武帝泰始二年羣臣議五帝即天地王氣時異故殊其號雖名有五其實一神明堂南郊宜除五帝之座五郊改五精之號皆同稱昊天上帝各設一座而已帝從之三年詔曰孝經郊祀后稷以配天宗祀文王於明堂以配上帝而周官之祀天旅上帝又曰祀地旅四望望非地則明堂上帝不得為天往者衆議除明堂五帝考之禮文不正且詩序曰文武之功起於后稷故推以配天宣帝以神武創業既以配天復以先帝配天於義亦所不安其復明堂及南郊五帝座摯虞議見明堂門晉傅元撰祠天地五郊夕牲歌一祠天地五郊送神歌一享天地五郊歌一宋孝武大明五年依漢汶上儀設五帝位太祖文帝對享六年帝親奉明堂祀祭五時帝以太祖配用鄭元議齊高祖建元元年祭五帝之神於明堂有功德之君配明堂制五室明帝時有司奏以武帝配梁祀五帝於明堂服大裘冕樽以瓦俎豆以純漆牲以特牛肴膳準二郊詳見郊及明堂門陳祀昊天上帝五帝於明堂牲以太牢詳見明堂門梁明堂遍歌五帝登歌五曲四言每帝各一首沈約撰後魏道武帝親祀上帝於南郊五帝以下天文從食明元帝太常三年立五精帝兆於四郊逺近放五行數各為方壇四陛埒壝三重通四門以太皥等及諸佐配祭黃帝常以立秋前十八日餘四帝各以四立日祀之牲各一牛又立春日遣有司迎春於東郊祭用酒脯棗栗無牲幣北齊三年一祭天於圜丘五精帝天文等從祀後諸儒定禮圜丘改以冬至祀之南郊則歲一祀以正月上辛為壇於國南祀所感帝靈威仰以神武皇帝配五郊迎氣為壇各於四郊又為黃壇於未地所祀天帝及配帝五官之神同梁其玉帛牲各以其方色其儀與南郊同帝及后各以夕牲日之旦太尉陳幣告請其廟以就配焉其從祀之官位皆南陛之東西向壇上設饌畢太宰丞設饌於其座亞獻畢太常少卿乃於其所獻事畢皆撤又立春前五日於州大門外之東造青土牛兩頭耕夫犂具立春有司迎春於東郊豎青幡於青牛之旁後周祀昊天於圜丘以其先炎帝神農氏配五帝天文並從祀又祀所感帝靈威仰於南郊以始祖獻侯莫那配五郊壇其崇及去國如其行之數其廣皆四丈其方俱百二十步內壝皆半之祭配皆同後齊星辰七宿嶽鎮海瀆山林川澤邱陵墳衍亦各於其方配郊而祀之其星辰為壇崇五尺方二丈嶽鎮為坎方二丈深二尺山林已下亦為坎壇崇三尺坎深一尺俱方一丈其儀頗同南郊冢宰亞獻宗伯終獻禮畢隋以冬至日祀昊天於圜丘五方上帝天文並從祀又以孟春上辛祀感帝赤熛怒於南郊並以太祖武元帝配煬帝即位以髙祖配感帝季秋祀五方上帝於雩壇其用幣各依其方人帝各在天帝之左太祖在太皥南西向五官在庭各依其方牲用犢十二皇帝太尉司農行三獻禮於青帝及太祖自餘有司助奠五官位於堂下行一獻禮有燎其省牲進熟如南郊禮五時迎氣青郊為壇國東春明門外道北去宮八里髙八尺赤郊為壇國南明德門外道西去宮十三里髙七尺黃郊為壇國南安化門外道西去宮十二里髙七尺白郊為壇國西開逺門外道南去宮八里髙九尺黑郊為壇宮北十一里丑地髙六尺並廣四丈各以四時立日黃郊以季夏土王日祀其方之帝各配以人帝以太祖武元帝配五官及星三辰七宿亦各依其方從祀其牲依方色各用犢二星辰加羊豕各一其儀同南郊其嶽鎮海瀆各依五時迎氣日遣使就其所祭之以太牢北齊五郊迎氣樂辭五帝各奏髙明樂辭一首祠五帝於明堂先祀一日羣官入自門奏肆夏一首太祝令迎神奏髙明樂覆燾舞辭一首太祖配享奏武德樂昭烈舞辭一首牲出入薦血毛各奏昭夏辭一首進熟奏皇夏辭一首初獻祼獻太祝送神奏髙明樂覆燾舞辭各一首皇帝飲福酒還便殿各奏皇夏辭一首周祀五官樂辭皇帝初獻青帝赤帝黃帝白帝黑帝各奏雲門舞辭一首隋五郊歌辭青帝奏角音一首赤帝奏徵音一首黃帝奏宮音一首白帝奏商音一首黑帝奏羽音一首感帝奏諴夏辭一首唐髙祖武德元年制每歲季秋祀五方上帝於明堂以元皇帝配孟春辛日祀感帝於南郊以元皇帝配髙宗顯慶二年詔南郊祈穀明堂大享皆祭昊天上帝太尉長孫無忌言按史記天官書等太微宮有五帝者自是五精之神五星所奉以其是人主之象故况之曰帝如房心為天王之象豈是天乎周禮兆五帝於四郊祀五帝則掌百官之誓戒唯稱五帝皆不言天此自太微之神本非穹昊之祭今請憲章姬孔取王去鄭四郊迎氣存太微五帝之祀南郊明堂廢緯書六天之義詔可之詳見郊祀門乾封元年詔祈穀復祀感帝二年詔明堂兼祀昊天及五帝永昌元年敕天無二稱帝是通名承前諸儒互生同異乃以五方之帝亦謂為天假有經傳互文終是名實未當稱號不别尊卑相混自今郊祀之禮唯昊天上帝稱天自餘五帝皆稱帝元宗開元十一年正月一日制獻歲之吉迎氣方始敬順天時無違月令所由長吏可舉舊章二十五年十月一日制自今已後每年立春之日朕當帥公卿親迎春於東郊其後夏及秋常以孟月朔於正殿讀時令禮官即修撰儀注既為常式乃是常禮務從省便無使勞煩也至二十六年正月八日親迎氣於東郊祀青帝壇以句芒配歲星及三辰七宿從祀忠王璵為亞獻頴王璬為終獻其壇本在春明門外上以祠所隘始移於滻水之東面值望春宮其壇一成壇上及四面皆青色句芒壇在其西歲星已下共為一小壇青帝壇北十五年太常博士錢嘉會言準月令及祠令九月農功畢大享五帝於明堂貞觀及神龍皆於南郊報祭中間寢廢有虧祀典凖孝經宗祀文王於明堂以配上帝請每年九月於南郊雩壇行享禮以睿宗皇帝配制從之肅宗元年建卯月一日赦文朕敬授人時慎徽月令庶無極憊以獲休徵自今以後每至四孟月迎氣之日令所司明按典禮宣讀時令朕當以百辟卿士舉而行之德宗時術士巨彭祖上疏云大唐土德千年合符請每四季郊祠祀天地詔禮官儒者議之禮官歸崇敬議曰按禮立春之日迎春於東郊祭青帝立夏之日迎夏於南郊祭赤帝立秋前十八日迎黃靈於中地祀黃帝秋冬各如其方黃帝於五行為土王在四季土生於火用事於未而祭三季則否漢魏周隋共行此禮國家土德乘時亦以每歲六月土王之日祠黃帝於南郊以后土配所謂合禮彭祖今請用四季祠多慿緯候之説且據隂陽書事涉不經恐難行焉德宗貞元元年詔郊祀之義本於至誠制定禮名合從事實使名實相副尊卑有倫五方配帝上古哲王道濟蒸人禮著明祀論善計功則朕德不類統天御極則朕位攸同而祝文所在稱臣以祭既無益於誠敬徒有黷於等夷宜從改正以敦至禮自今以後祀五方配帝祝文並不須稱臣其餘禮數如舊唐開元禮立春日祀青帝於東郊以太皥配句芒歲星三辰七宿從祀立夏日祀赤帝於南郊炎帝配祝融熒惑三辰七宿從祀季夏日祀黃帝於南郊軒轅配后土鎮星從祀立秋日祀白帝於西郊少皥配蓐收太白三辰七宿從祀立冬日祀黑帝於北郊顓頊配元冥恆星三辰七宿從祀正座配座籩豆各十二五辰五官三辰七宿籩豆各二餘各一籩豆實物並見郊祀門皇帝立春祀青帝於東郊儀餘四郊及攝事並同齋戒攝事祀官齋戒如圜丘儀前祀七日平明太尉誓百官於尚書省曰某月某日祀青帝於東郊各揚其職不供其事國有常刑皇帝散齋四日致齋三日如圜丘儀陳設前祀二日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御座攝事則衛尉設祀官公卿已下次於道南北向西上衛尉設陳饌幔於內壝東門之外道南北向設文武侍臣次又設祀官及從祀官諸州使蕃客等次前二日太樂令設宮懸之樂於壇南壝之內設歌鐘磬於壇上各如圜丘之儀右校掃除壇之內外郊社令積柴於燎壇其壇於樂之南外壝之內攝事則其壇於神壇之左內壝之外方一丈髙丈二尺開上南出戶方六尺前祀一日奉禮設御位在壇之東南西向攝事則設祀官公卿位於內壝東門之內道北執事位於道南每等異位重行西向以北為上也設望燎位於柴壇之北南向設祀官公卿位於內壝東門之外道南分獻之官於公卿之南執事位於其後設祀官及從祀羣官位及門外等位一如圜丘攝事則御史位於壇上設牲榜於東壝之外當門西配帝牲榜少退在南設廪犧令位於牲西南祝史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北南向設青帝夏赤帝季夏黃帝秋白帝冬黑帝酒樽於壇之上下太樽二著樽二犧樽二罍二在壇上於東南隅北向象樽二壺樽二山罍二在壇下皆於南陛之東北向西上設配帝著樽二犧樽二象樽二罍二在壇上於青帝酒樽之東北向西上歲星三辰句芒氏夏祝融季夏后土秋蓐收冬元冥已下倣此俱象樽二各設於神座之左皆右向七宿壺樽二設於神座之右而左向上帝配帝之樽置於坫星辰已下樽藉以席皆加勺羃設爵於樽下設御洗於壇南陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設星辰之樽罍洗篚各於其方陛道之左俱內向執樽罍篚羃者各於其後又設玉幣之篚於壇上下樽坫之所祀日未明五刻太史令郊社令設青帝靈威仰神位赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝叶光紀於壇上北方南向席以稿秸設配帝太皥氏神座夏神農季夏軒轅秋少皥冬顓頊已下倣此於東方西向席以莞設歲星三辰之座於壇之東北七宿之座於壇之西北各於其壇南向相對為首設句芒氏之座於壇之東面西向席皆莞設神位各於座首省牲器如别儀鑾駕出宮如圜丘儀奠玉幣祀日未明三刻諸祀官各服其服郊社令良醞令各率其屬入實樽罍玉幣凡六樽之次太樽為上實以泛齊著樽次之實以醴齊犧樽次之實以盎齊象樽次之實以醍齊壺樽次之實以沈齊山罍為下實以三酒配帝著樽為上實以泛齊犧樽次之實以醴齊象樽次之實以盎齊其歲星三辰句芒氏之象樽俱實以醍齊七宿之壺樽俱實以沈齊元酒各實於五齊之上樽禮神之玉東方以青圭南方以赤璋中央以黃琮西方以騶虞北方以元璜其幣各隨方色長丈八尺太官令帥進饌者實籩豆簠簋入設於內壝東門之外饌幔內未明二刻奉禮帥贊者先入就位贊引引御史博士諸太祝及令史祝史與執樽罍篚羃者入自東壝門當壇南重行北面西上立定奉禮曰再拜贊者承傳御史已下皆再拜訖執樽罍篚羃者各就位贊引引御史博士諸太祝詣卯陛升行掃除於上令史祝史行掃除於下訖引就位車駕將至謁者贊引引祀官通事舍人分引從祀羣官諸方客使先置者各就門外位駕至大次門外回輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次通事舍人各引文武九品已上從祀官就壝外位攝則無車駕將至下至壝外位儀太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西謁者引司空入行掃除訖出復位如常儀皇帝停大次半刻頃通事舍人贊引各引從祀羣官介公酅公諸方客使先入就位太常博士引太常卿位於大次門當門北向侍中版奏外辦攝則初司空入謁者引祀官贊引引執事俱就門外位司空掃除訖各引入就位贊再拜謁者進太尉之左白有司謹具請行事無皇帝停大次下至太常奏謹具儀皇帝服大裘而冕夏服袞冕出次華蓋侍衛如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至內壝外殿中監進大圭尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停於門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常儀皇帝至版位西向立每立定太常卿博士即立於左謁者贊引各引祀官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾鼓柷奏角音夏徵音季夏宮音秋商音冬羽音乃以黃鍾之均文舞之舞樂六成偃麾戛敔樂止太常卿前奏稱請再拜退復位皇帝再拜攝事拜奉禮曰衆官再拜衆官在位者皆再拜上下諸太祝俱取玉幣於篚各立於樽所其奠玊幣及毛血並如圜丘儀攝則太尉為初獻受玉幣登歌作肅和之樂餘亦如圜丘攝事之儀進熟皇帝既升奠玊帛其設饌盥洗奠皆如圜丘之儀攝事如圜丘攝事儀太祝持版進於神座之右東向跪讀祝文曰維某年歲次某月朔某日子嗣天子臣某攝事云嗣天子臣某謹遣太尉封臣名敢昭告於青帝靈威仰獻春伊始時惟發生品物昭蘇式遵恆禮敬以玉帛犧齊粢盛庶品肅恭燔祀暢兹和德帝太皥氏配神作主尚享訖興夏云昭告於赤帝赤熛怒朱明屆序長嬴馭節庶品蕃碩用遵恆典敬以玊帛犧齊粢盛庶品恭敬禋祀肅昭養德帝神農氏配神作主季夏云黃帝􅍭樞紐爰兹溽暑實惟土潤戊巳統位黃鍾在宮敬以玉帛犧齊粢盛庶品恭備燔祀式虔厚德帝軒轅氏配神作主秋云白帝白招拒素秋伊始品物收成祗率舊章展其恆禮云云帝少皥氏配神作主冬云黑帝叶光紀元冥屆序庶類安寧資此積歲祗率恆典云云帝顓頊氏配神作主皇帝再拜初讀祝文訖樂作太祝進奠版於神座前興還樽所皇帝拜訖樂止太常卿引皇帝詣配帝酒樽所執樽者舉羃侍中取爵進侍中贊酌泛齊訖樂作太常卿引皇帝進當太皥氏神座前東向跪奠爵俯伏興太常卿引皇帝少退東向立樂止太祝持版進於神座之左北向跪讀祝文曰維某年歲次某月朔日子開元神武皇帝臣某敢昭告於帝太皥氏爰始立春盛德在木用致燔燎於青帝靈威仰惟帝布兹仁政功叶上元謹以制幣犧齊粢盛庶品備兹明薦配神作主尚享訖興夏云昭告於帝神農氏時維孟夏火德方融用致明禋於赤帝赤熛怒惟帝表功協德允斯作對謹以制幣犧齊粢盛庶品式陳明薦作主配神季夏云告於帝軒轅氏時維季夏用膺土德式奉明禋於黃帝含樞紐惟帝功施厚地道合上蒼謹以云云秋云告於帝少皥氏時維立秋金德在馭用致燔燎於白帝白招拒惟帝立兹義政叶此神功云云冬云帝顓頊氏時維立冬水德在馭用致禋燎於黑帝叶光紀惟帝道合乾元允兹升配謹以云云其飲福及亞獻終獻至還宮並同圜丘攝事同圜丘攝事宋制以正月上辛祀感生帝四孟及土王日祀五方帝太祖皇帝乾德元年博士聶崇義上言皇家以火德上承正統膺五行之王氣纂三元之命歷恭尋舊制存於祀典伏請奉赤帝為感生帝每歲正月别尊而祭之事下尚書省集議請如崇義之奏有司酌隋制感生帝為壇於南郊髙七尺廣四丈奉先祖升配牲用騂犢二玊用四圭有邸幣如方色常以正月上辛奉祀二年正月有司言上辛祀昊天上帝五方帝從祀伏緣明詔别祀赤帝為感生帝用符火德一日之內兩處俱祀且祭有煩數之禁况同時並祀在禮非宜其昊天從祀神位望不設赤帝座從之太宗太平興國八年詔祀土德於黃帝壇如太祠之制淳化三年正月上辛親祀南郊五方帝並列從祀詔罷本壇之祭真宗景德二年鹵簿使王欽若言五方帝位版如靈威仰赤熛怒皆是帝名理當恭避望下禮官詳定禮官言按開寶通禮義纂靈威仰赤熛怒含樞紐白招拒叶光紀者皆五帝之號漢書注五帝自有名即靈符文祖之類是也既為美稱不煩回避詔可仁宗時制四立土王日祭五方帝青帝壇髙七尺方六步四尺赤帝壇高六尺東西六步三尺南北六步二尺黃帝壇髙四尺方七步白帝壇髙七尺東西七步南北七步一尺黑帝壇高五尺方三步七尺天聖六年詔太常葺四郊宮少府監遣吏齎祭服就給祠官光祿進胙監祭使封題慶歷用羊豕各一正位太樽著樽各二不用犧樽增山罍為二在壇上簠簋俎各增為二皇祐定壇如唐郊祀録各廣四丈其髙用五行八七五九六為尺數嘉祐加羊豕各二禮官丁諷言春秋文耀鉤五方帝名靈威仰赤熛怒含樞紐白招拒叶光紀祝文位版有司皆書斥其名下禮院議去之春分朝日秋分夕月慶歷用羊豕各二籩豆十二簠簋俎二神宗熙寧五年中書門下言僖祖神主為太廟始祖每歲孟春祀感生帝當以僖祖配詔從之元豐三年大享明堂詔罷五帝從祀見明堂門哲宗元祐六年知開封府范百祿言每歲四立及中央迎氣於四郊祀五帝配以五神國之大祠也古者天子皆親率三公九卿諸侯大夫以虔恭重事而導四時之和氣今吏部所差三獻皆常參官其餘執事與贊相之人皆班卑品下不得視中祠行事者之例請下禮部與太常寺官講議凡大祠以公卿攝事徽宗大觀四年議禮局言太常祀感生帝神州地祇儀注牲用繭栗席用藁秸已合古祀而所用之器與宗廟同則為非稱請改用陶匏又言國家崇奉赤帝為感生帝以僖祖配侑與迎氣之禮不同所以尊異之也今乃於立夏迎氣之壇甚不稱所以尊異之意請於南郊别立感生壇視赤帝髙廣之制並從之政和三年議禮局上五禮新儀感生帝壇廣四丈髙七尺壇飾依方色四出陛兩壝每壝二十五步五方帝壇廣四丈青帝壇高八尺赤帝壇髙七尺黃帝壇髙五尺白帝壇髙九尺黑帝壇髙六尺壇飾依方色立春祀青帝以帝太皥氏配以句芒氏歲星三辰七宿從祀句芒位於壇下卯階之南歲星析木大火夀星於壇下子階之東西上角宿亢宿氐宿房宿心宿尾宿箕宿位於壇下子階之西東上立夏祀赤帝以帝神農氏配以祝融氏熒惑三辰七宿從祀祝融位於壇下卯階之南熒惑鶉首鶉火鶉尾位於子階之東西上井宿鬼宿栁宿星宿張宿翼宿軫宿位於子階之西東上季夏祀黃帝以帝軒轅氏配以后土鎮星從祀后土位於壇下卯階之南鎮星位於壇下子階之東立秋祀白帝以帝少皥氏配以蓐收大白三辰七宿從祀蓐收位於壇下卯階之南太白大梁降婁實沈位於子階之東西上奎宿婁宿胃宿昴宿畢宿觜宿參宿位於子階之西東上立冬祀黑帝以帝髙陽氏配以元冥辰星三辰七宿從祀元冥位於壇下卯階之南辰星娵訾元枵星紀位於子階之東西上斗宿牛宿女宿虛宿危宿室宿壁宿位於子階之西東上皇帝祀五方帝儀皇帝服袞冕祀黑帝則服裘被袞配位登歌作承安之樂餘並如祈穀祀上帝儀重和元年大享明堂祀五帝於五室詳見明堂門髙宗紹興元年禮部太常寺討論孟春上辛日祀感生帝以僖祖配於天慶觀設位望祭幣依方色權不用玊正配二位每位樽爵籩豆各一實以酒脯鹿臡以獻官一員行禮三年司封員外郎鄭士彥請以立春立夏季夏土王日立秋立冬祀五帝於四郊九年國子監丞張希亮言祀五帝今用酒脯乞依大祀用牲牢十八年臣僚言鄭康成謂周祀感生帝而以后稷配其説若曰天之五帝迭王四時王者之興必感其一故於夏正之月祭所生帝於南郊而以祖配之周運木德帝威靈仰乃尊后稷以配蒼龍之精我朝火德赤熛怒實為感生帝大觀式至親祠故猗蘭孕秀子孫衆多龜鼎之祚與天無極陛下中興寖久祀秩咸修惟感生帝本為大祀牲玉甄異有司因循尚淹小祀寓於招提酒脯而已欲望明詔有司復舉縟典升為上祀庶幾炎精感永錫蕃衍盛大之貺禮官議請三獻牲用少牢籩豆皆十有二具樂舞前期誓戒祠於望祭齋宮從之太常寺取到禮料用羊豕各一口籩十二菱芡栗鹿脯榛實乾桃乾䕩乾棗形鹽魚鱐糗餌粉餈簠二稻梁瓦登一大羮盤一毛血簋二黍稷豆十二芹筍葵菁韭􅓞食魚醢兔醢豚鹿臡醯醢糝食俎八羊腥七體羊熟十一羊腥腸胃肺羊熟腸胃肺豕腥十體豕熟十一豕腥膚豕熟膚樽罍二十四實以酒並同皇地祇三十一年七月二十七日臣僚言伏遇宗祀徽考於明堂以配上帝聞有司將設五方帝位於朵殿五人帝五官神位於兩廊悉於典故未合望詔禮官更加詳議禮部太常寺討論今行禮殿難設五室欲依臣僚所乞升祀五方帝五人帝於堂各依方向鋪設神位內五人帝從位各於其左稍却五官神位於殿下東廊稍南設位俱西向以北為上並差官分獻行禮其五帝五人帝既升祀於堂依禮例逐位合用十二籩豆從之文獻通考卷七十八
