body:
  text: 文獻通考卷一百四十九鄱陽馬端臨貴與著兵考一兵制周官大司馬凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長軍師旅卒兩伍皆衆名也伍一比兩一閭卒一族旅一黨師一州軍一鄉家所出一人將帥長司馬者其師吏也言軍將皆命卿則凡軍帥不特置選於六官六鄉之吏自卿以下徳任者使兼官焉春秋傳曰成國不過半天子之軍詩常武曰整我六師文王曰六師及之此周為六軍之見於經者也春秋傳曰王使虢公命曲沃伯以一軍為晉侯此小國一軍之見於傳也百人為卒二十五人為兩故春秋傳曰廣有一卒卒偏之兩比疏云此皆據在鄉時為卿大夫州長黨正族師閭胥長時尊卑命數而言伍長不言下士者以衆為官卑故畧而不言大國次國小國皆以命數同者軍數則同則上公為大國侯伯為次國子男為小國魯是侯爵而魯頌言公徒三萬注云萬二千五百人為軍三軍合三萬七千五百人言三萬者舉成數也如襄公作三軍則是前無三軍惟僖公盛時有之又季武子為三軍叔孫昭子不可云我小侯也是伯禽大侯之時有之楚之軍法百人為卒五十人為偏二十五人曰兩君之戎分為二廣廣有一卒為承承有偏有兩以證此經百人為卒二十五人為兩之意也一軍則二府六史胥十人徒百人盱江李氏曰此則六鄉為六軍又按遂人職云稽其人民而授之田野簡其兵器康成謂遂之軍法如六鄉則六遂亦為六軍注疏謂天子六鄉六遂合有十二軍而止六軍何也蓋六鄉為正軍六遂為副倅至於大國之三鄉三遂次國之二鄉二遂小國之一鄉一遂莫不皆然但以王家迭用之則常六軍爾故止言六軍此鄉遂制軍之法小司徒乃會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦用謂使民事之伍兩旅卒師軍皆衆之名兩二十五人卒百人旅五百人師二千五百人軍萬二千五百人此皆先王所因農事而定軍令者也欲其恩足相恤義足相救服容相别音聲相識作為也使功令之事追逐宼也春秋公追戎於濟西胥伺捕盗賊也疏曰五人為伍即五家為比家出一人在家為比在軍為伍五伍為兩即五比為閭閭二十五家兩二十五人四兩為卒即四閭為族族百家卒百人五卒為旅即五族為黨黨五百家旅五百人五旅為師即五黨為州州二千五百家師二千五百人五師為軍即五州為鄉鄉萬二千五百家軍萬二千五百人管子内政寄軍令在鄉五家為比以營農事比長領之及其出軍家出一人五人為伍則伍長領之在家閭胥領之閭在軍則為兩司馬領之在家為族師在軍為卒長在家為黨正在軍為旅師在家為州長在軍為師帥在鄉為大夫在軍為軍將乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人均平也周猶徧也一家男女七人以上則授之以上地所養者衆也男女五人以下則授之以下地所養者寡也正以七人六人五人為率者有夫有婦然後為家自二人以至十為九等七六五者為其中可任謂丁強任力役之事者也出老者一人而已其餘男女强弱相半其大數凡起徒役者毋過家一人以其餘為羡唯田與追胥竭作鄭司農云羡者饒也田謂田獵也追謂追逐㓂賊也竭作者盡行也凡國之大事致民大故致餘子大事謂戎事也大故謂災寇者也鄭司農云凡國有大事乃當徴召會聚百姓則小司徒召聚之餘子謂羡也元謂餘子卿大夫之子也當守於王宫者也疏曰此謂六鄉之内上劑致甿一人為正卒其餘皆為羡卒也若六遂之内以下劑致甿一人為正卒一人為羡卒其餘皆為餘夫饒逺故也遂人以歲時稽其人民而授之田野簡其兵器教之稼穯凡治野以下劑致甿致猶會也民雖受上田中田下田及會之以下劑為率謂可任者家二人優逺民也陳氏禮書曰古者國有遊倅田有餘夫軍有羡卒皆所以副其正也六鄉以三劑致民上地家七人至毋過家一人以其餘為羡則一人為正卒餘可任者皆羡卒也六遂以下劑致民上地可任者家三人中地可任者二家五人而皆以下地二人任之則一人為正卒一人為羡卒其餘不預所以優野人也惟田與追胥竭作鄉遂皆然以田獵禽獸人所同欲追伺盗賊人所同惡故也羡卒亦謂之餘子則餘子自私言之羡卒自公言之故周詩曰其軍三單先儒謂公劉始遷於豳無羡卒是也班固漢志殷周以兵定天下矣天下既定戢藏干戈教以文徳而猶立司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦師古曰稅者田租也賦謂𤼵賦斂之賦也稅以足食賦以足兵故四井為邑四邑為邱邱十六井也有戎馬一匹牛三頭四邱為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人干戈備具是謂乘馬之法鄭氏曰甲士在車士也一同百里提封萬井提舉也舉四封之内除山川沈斥城池邑居園囿術路三千六百井沈斥水田潟鹵也術大道也川謂水之通流者沈謂居深水之下也斥鹹鹵之地定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也采官也因官食地故曰采地是謂百乗之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘之王戎馬車徒干戈素具春振旅以蒐夏苃舍以苗秋治兵以獮冬大閱以狩皆於農隙以講事焉五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧連帥比年簡車卒正三年簡徒羣牧五載大簡車徒此先王為國立武足兵之大畧也薛氏曰一封出車千乘以杜氏法積算十同千乘當有戎馬四千匹牛一萬二千頭甲士三千人步卒七萬二千人合士卒之數可以為六軍然而大國不過三軍其有六軍者猶天子六鄉六遂迭用之耳記曰大國不過千乘蓋諸侯地不過百里車不過千乗以開方之法計之方十里為方一里者百其賦十乘方百里者為方一里者萬其賦千乘然賦雖出千乘而兵不過三軍五百乘而已則五百乘三鄉之所出也千乘闔境之所出也何則鄉萬二千五百家合三鄉則三萬七千五百家凡起徒役毋過家一人則三軍為三萬七千五百人矣三軍而車五百乘則天子六軍為車千乗矣又曰周制萬二千五百人為軍六軍七萬五千人千里之畿提封萬井定出賦六十四萬井一井之田八家耕之總計六十四萬井之田為五百一十二萬家家之一夫為五百一十二萬夫以此夫衆而供萬乘之賦是為七家而賦一兵孫子曰興師十萬日費千金内外騷動怠於道路不得操事者七十萬家蓋言一夫從軍七家奉之此亦見七家賦一兵也自夫率之七家相更以給軍則王畿之内凡七征而役方一遍焉章氏曰司徒之可任者如此其多司馬法之出士徒如彼其少蓋古人之於兵不盡用之小司徒只言其可任者非實數也後世反此晉作州兵乃是盡數調發甚非先王之制其他如魯成作邱甲蘇秦謂齊宣王臨淄之中七萬户不下户三男子而卒以二十一萬曹操謂崔琰曰昨按户籍可得三十萬衆故為大州是皆以實數調發惟孔明僅有此意以蜀之大其兵常不過十二萬而所用八萬常留四萬以為更代蜀之强以孔明不盡用之故及蜀之亡尚有十萬二千數年之間所折不過二萬耳成周兵制圖王六鄉六遂六軍七萬五千人大國上公三鄉三遂三軍三萬七千五百人次國侯伯二鄉二遂二軍二萬五千人小國子男一鄉一遂一軍一萬二千五百人伍五人伍長公司馬下士一軍伍長二千五百人六軍共一萬五千人兩二十五人兩司馬中士一軍兩司馬五百人六軍共三千人卒百人卒長上士一軍卒長一百二十五人六軍共七百五十人旅五百人旅師下大夫一軍旅師二十五人六軍共一百五十人師二千五百人師帥中大夫一軍師帥五人六軍共三十人軍萬二千五百人軍將卿一軍一人卿六軍共六章氏曰王畿千里近郊五十里逺郊百里郊為鄉六鄉百里通十為同為百里者十提封九萬井九十萬夫之地除山川城邑之屬三萬六千井為六萬四千井六十四萬夫之地除公田九分之一為五十萬二千夫又以一易再易三易通之三分去一為三十五萬四百夫率三百五十家賦一乘四邱為乗故曰邱乗積六鄉為千乘而餘率七家賦一兵積六鄉為七萬五千人此六軍之制也六遂及三等侯國皆如鄉之法畿方千里為百里者十如鄉之除為三百五十萬四千夫賦車千乘卒七十五萬人為六軍者十此通畿之師也牧野之師紂七十萬意通圻皆發大司馬遞而征之大司馬教兵號名有縣鄙家鄉官野之異等物有諸侯軍吏師都遂郊野之别此見其遞征十年而役一遍凡三家可任者率十有一人則終身無過一再給公上事蓋先王忠厚之至更勞均逸不欲窮民之力也古者畿内之兵不出所以重内也卒有四方之役即用諸侯人耳或遣上公帥王賦亦不過元戎十乘以先啓而行也王有四方之事冡宰徴師於諸侯如詩常武文王命卿士太師皇父整我六師冢宰也小宰掌戎是虎賁氏奉書以牙璋發之而調兵諸侯亦各從其方之便髙宗伐楚蓋裒荆之旅武王克商實用西土至於征徐以魯費誓追貊以韓韓奕於淮夷以江漢畧見於經可考也平王出戍逺以見刺當是時周都洛矣自洛戍申許無乃未甚逺而周人已不堪况後世有勞師萬里者哉春秋之初從王伐鄭猶有蔡人衛人二百四十二年間王人會伐屢矣未嘗見師之出唯敗績於茅戎王師自出春秋深譏焉齊桓公問管仲行伯用師之道仲曰公欲定卒伍修甲兵大國亦將修之而小國設備則難以速得志矣乃作内政而寓軍令焉三分其國為二十一鄉工商之鄉六工商各三也二者不從戎役士鄉十五韋昭謂此士軍士也十五鄉合三萬人是為三軍農野處而不暱不在都邑之數則下云五鄙是也參國起案以為三官臣立三宰工立三族市立三鄉澤立三虞山立三衡作内政而寄軍令焉五家為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長帥之居則為軌出則為伍所謂寄政十軌為里故五十人為小戎里有司帥之小戎兵車也詩云小戎俴收四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之公將其一工商之鄉𨽻公國子帥五鄉焉髙子帥五鄉焉三軍故有中軍之鼓有國子之鼓有髙子之鼓春以蒐振旅秋以獮治兵是故卒伍整於里軍旅整於郊内教既成令勿遷徙夜戰聲相聞足以不乖晝戰目相視足以相識凡三軍教士三萬人車八百乘周制戎車一乗歩卒七十二人萬二千五百人為軍今齊車一乗五十人萬人為軍以齊法參周制車增三百乘徒損三萬人吳子云齊桓募士五萬人未詳蓋如鄉之法五鄙制鄙三十家為邑邑有司制野鄙之政此以下與郊内之政異十邑為卒卒有卒帥十卒為鄉鄉有鄉帥三鄉為縣縣有縣帥十縣為屬屬有大夫五屬故立五大夫各使治一屬焉立五正長也各使聴一屬焉是故正之政聴屬正五正聴大夫之治牧政聴縣牧五屬大夫聴縣帥之治下政聴鄉下政縣帥聴鄉帥之治自邑積至於五屬為四十五萬家率九家得一兵得甲十萬九十家一車得車五千乘可為三軍者四長勺之戰桓公自謂有帯甲十萬車五千乘蓋斥地甚大非齊舊制蓋如遂之法以通國之數而遞征之率車用六之一士用十之三大畧依周變從輕便當時地廣參用王畿之制正月之朝鄉長復事君親問焉嚴蔽明蔽賢下比之罰其賢者則鄉長進之官長書之公訾相之謂之三選國子髙子退而修鄉鄉退而修連連退而修里里退而修軌軌退而修伍伍退而修家五屬大夫復事擇其寡過者而摘之亦嚴蔽賢蔽明下比之罰五屬大夫於是退而修屬屬退而修縣縣退而修鄉鄉退而修卒卒退而修邑邑退而修家政既成以守則固以征則强蘇氏曰嘗讀周官司馬法得軍旅什伍之數其後讀管夷吾書又得管子所以變周之制蓋王者之兵出於不得已而非以求勝敵也故其為法要以不可敗而已至於威文非決勝無以定覇故其法在必勝繁而曲者所以為不可敗也簡而直者所以為必勝也周之制萬二千五百人而為軍萬之有二千二千之有五百其數奇而不齊是以知其所以為繁且曲也今夫天度三百六十均之十二辰得三十者此其正也五日四分之一者此其奇也使天度而無奇則千載之日雖婦人孺子皆以坐而計唯其奇而不齊是故巧歴有所不能盡也聖人知其然故為之章會統元以盡其數以極其變司馬曰五人為伍五伍為兩萬二千五百人而為軍二百五十十取三焉而為奇其餘七以為正四奇四正而八陣生焉夫以萬二千五百人而均之八陣之中宜其有奇而不齊者是以多為之曲折以盡其數以極其變鉤聨蟠屈各有條理故三代之興治其兵農軍賦皆數十百年而後得志於天下自周之亡秦漢陣法不復三代其後諸葛獨識其遺制以為可用以取天下然相持數歲魏人不敢决戰而孔明亦卒無尺寸之功豈八陣者先王所以為不可敗而非以逐利勝者邪若夫管仲之制兵其可謂截然而易曉矣三分其國以為三軍五人為軌軌有長十軌為里里有司四里為連連有長十連為鄉鄉有良人五鄉一帥萬人為一軍公將其一髙國將其二三軍三萬人如貫繩如畫碁局踈暢洞達雖有智者無所施其巧故其法令簡一而民有餘力以致其死昔者嘗讀左氏春秋以為邱明最好兵法蓋三代之制至於列國猶有存者以區區之鄭而魚麗鵞鸛之陣見於其書及至管仲陣法不少槩見者何哉蓋管仲欲以歲月服天下故變古司馬法而為是簡畧速勝之兵是莫得而見其法也其後吳晉爭長於黄池王孫雒教夫差以三萬人壓晉壘而戰陣百為行行百為陣行陣皆徹無有隠蔽援桴而鼓之勇怯盡應三軍皆讙晉師大駭卒以得志由此觀之不簡而直不可以决勝深惟後世不達繁簡之宜以取敗北而三代什伍之數與管子所以治齊之兵雖不可盡用而其近於繁而曲者以之固守近於簡而直者以之决戰則庶乎其不可敗而有所必勝矣林氏曰如韋昭之說則是國内無農其六鄉為工商其十五則為兵而已五屬之地則皆農居之四民之外特有所謂士卒則是兵農分矣或曰齊變周制欲速得志於天下則釐國内之民在十五鄉者専使之為士卒亦必有田以授之第不使出租稅供他役庶調發雖煩而民亦不怨若其工商之六鄉為農之五屬則皆不以為兵右齊兵制晉曲沃武公并翼僖王使虢公命曲沃伯以一軍為晉侯莊十六年獻公之十六年始作二軍公將上軍太子申生將下軍以滅耿滅霍滅魏惠公韓之敗作州兵僖十五年恵公獲晉侯吕甥言於衆曰征繕以輔孺子甲兵益多庶有益乎衆說晉於是乎作州兵五黨為州州二千五百家也率一家起五人則是一萬二千五百人古制也孔穎達曰周禮卿大夫以歲時登其夫家之衆寡辨其可任者州長則否今以州長管人既少督察易精故使州長治之文公蒐於被廬作三軍僖公二十七年郤縠將中軍郤溱佐之狐毛將上軍狐偃佐之欒枝將下軍先軫佐之二軍則上軍為尊三軍則中軍為尊城濮之戰賦車七百乘五萬一千五百人按楚蒍啓疆曰晉十家九縣長轂九百其餘四十縣遺守四千而平公治兵邾南甲車四千乘則晉通國率亦五千乘用七百乘猶齊之法其後作三行以禦狄二十八年荀林父將中行屠擊將右行先蔑將左行成國不過三軍今復置三行以辟天子六軍之名而實則為六軍按吳子晉文公召為前行四萬以獲其志意即三行清原之蒐遂作五軍三十年蓋文公雖增置三行自知其僭故罷之更為上下新軍襄公蒐於夷文公六年舎二軍以復三軍之制景公邲之戰宣十二年三軍增置大夫各一人則猶三行也至鞌之戰成二年郤克請益車八百乘始作六軍賞鞌之功上中下各增新軍成六軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿僭更王度若此厲公鄢陵之戰罷新上軍十六年悼公初尚四軍襄公八年楚伐鄭子展曰四軍無闕其後新軍無帥公使其什吏帥其卒乘官屬以從於下軍明年遂舍之襄十四年傳曰禮也成國不過半天子之軍蓋自文公僭王度至悼公方革焉右晉兵制魯自禽父封於曲阜及僖公能復周公之宇其詩曰公車千乘說者以為大國之賦也又公徒三萬說者以為大國之軍也故知三軍魯之舊其曰三萬舉成數也實三萬七千五百人宣公奢泰初稅畝什二而稅既益民稅及成公謀伐齊元年作丘甲丘各一甲又益民賦率一甸而加步卒二十四人甲士一人三甸而加一乘兵車之賦非復司馬法之舊矣程氏曰周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸方八里六十四井出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人又成方十里出長轂一乘古者或以甸為乘或以乘為甸以甸為乘稍人掌丘乘之政令禮記為社丘乘粢盛是也以乘為甸衞良夫乘甸兩牡是也蓋乘者甸之賦甸者乘之地甸方八里據地言之成方十里無溝洫言之其實一也今作丘甲者即丘出甲一人是一甸之中共百人為兵也榖梁以為甲非人人之所能為杜預以為丘出甸賦加四倍誤矣胡氏曰魯至昭公時嘗蒐於紅至增三之一耳明年戰於鞌四卿並出前此春秋未有累書帥師者襄公十一年三桓改作三軍三分魯而各征其一季氏使其乘之人以其役邑入者無征不入者倍征孟氏使其半為臣若子若弟叔孫氏使盡為臣不然不舎至是中軍削矣昭公五年遂舍中軍四分公室季氏擇二二子各一皆盡征之而貢於公季氏専將一軍而孟仲各専一軍之半公無軍焉八年蒐於紅自根牟至於商衛根牟魯東界商宋也魯西南境衞北隣也革車千乘故邾人告吳曰魯賦八百乘邾六百乘蓋竭作也考之春秋書蒐五皆在昭定之世自蒐紅之後繼大蒐於北蒲十一年於昌閭二十二年又於北蒲者再定公十三年十四年獨異於他公者用見二公在位君不得有其國而奪於大夫大夫不得専其政而制於陪臣各恃兵威以為强假大蒐之名隂擇其材力可任者以植私黨使國人莫敢睥睨終於不可制蓋傷公室削弱疾臣下恣横也迄哀公十二年用田賦又以夫田而賦軍旅之征悉變邱乘之制民無餘力矣兵賦之法因其田財九夫為井十六井為邱通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦古者田以出粟為主而足食賦以出軍為主而足兵今開田而賦軍旅之征非矣右魯兵制楚自若敖蚡冒篳路藍縷以啓山林武王始為軍政作荆尸以伐隨授師孑以立陳法莊四年楚武王荆尸授師孑焉以伐隨按宣十二年隨武子論楚之兵曰荆尸而舉杜預曰荆楚也尸陳也楚武王始更此為陳法遂以為名孑鎗屬亦楚陳所利大抵陳中有利於長兵者有利於短兵者弓矢利逺是長兵孑是短兵蓋楚麥用孑為陳成王地方千里城濮之役僖二十八年子玉請戰王怒少與之師唯西廣東宫與若敖之六卒從之大抵皆非正軍制亦非古子玉以若敖之六卒將中軍蓋兵屬子玉者子西將左子上將右當是西廣東宫之兵傳曰楚右師左師潰楚敗績子玉收其卒而止故不敗杜曰三軍惟中軍完則不敗者止若敖之六卒楚軍有兩廣即其親軍今曰西廣止分其一而已杜注東宫曰太子有宫甲分取以給之按文元年宫臣以宫甲圍成王是宫中兵也若敖楚武王之祖父葬若敖者子玉之祖也杜預曰六卒子玉宗人之兵六百人言不悉師以益之於時子玉既為令尹而乃請戰蓋欲增兵耳若敖之六卒乃子玉家兵觀宣公四年楚子與若敖氏戰於臯滸敢於敵君戰則兵强可知穆王按晉文襄覇之後楚益强大時則嚴環衞之屬文元年傳潘崇掌環列之尹杜注宫衞之官列兵而環王宫又宣十二年傳内官序當其夜以待不虞注官當同環列之尹都君子王馬之屬所以親衞於王出入同之厥貉之會陳鄭及宋受役於司馬以田孟諸時則有右盂左盂兩甄之制文十年會於厥貉宋道楚子以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬杜注盂田獵陳名將獵張兩甄故置二左司馬蓋期思公復遂一人為右司馬當中央則左司馬二人為兩甄矣兩甄猶言兩翼莊王覇强克庸以來文十六年無日不討國人而訓之于民生之不易在軍無日不討軍實而申儆之于勝之不可保逮邲之戰宣十二年軍制備矣蓋兆於武王備於莊王𫝊莫詳焉三軍以為正軍傳曰楚子北師次於邲沈尹將中軍子重將左軍子反將右軍此三軍者蓋正軍也是時孫叔敖為令尹秉政不在三軍之數如南轅反斾軍進退皆由之故知令尹為兼統三軍矣二廣以為親軍傳載欒武子言楚軍制曰其軍之戎分二廣右廣初駕數及日中左受之至於昬内官序當其夜鄭氏曰廣平横陳之車杜預注二廣君之親兵按傳楚子分左右廣雞鳴而駕日中而說左則受之日入而說許偃御右廣養由基為右彭名御左廣屈蕩為右王乘左廣以逐趙旃杜預注楚王更迭載之故各有御傳又曰王見右廣將從之乘屈蕩尸之曰君以此始亦必以終自是楚之乘廣先左蓋左右二廣為王親軍右廣初駕以及日中左廣受之以及日入嘗在王側内官序當其夜若今之當更循環衞敵安當掩襲親軍之制詳矣僖二十八年西廣從子玉時子玉専軍政故分西廣以屬之今邲之戰則二廣皆以侯王迭載其曰楚之乘廣先左杜預雖云以乘左得勝然實則楚人尚左故親軍分為二廣而王則乘左游闕以為游兵傳使潘黨率游闕四十乘從唐侯游闕蓋游兵往來游補闕者觀兵陳何處為薄則從而補之所謂奇軍以防敗失由正軍中逐旋分出不係步伍之數也廣有一卒卒偏之兩傳曰廣有一卒卒偏之兩又曰楚子為乘廣三十乘分為左右司馬法百人為卒卒二十五人為兩車十五乘為大偏九乘為小偏其尤大者又有二十五乘之偏今一廣十五乘則古大偏之法而曰卒偏之兩者孔頴逹謂兩廣之别各有一卒之兵百人也言一卒之外復有十五乗之偏并二十五人之兩既一卒又云卒偏之兩言卒之者成辭婉句耳蓋防正軍有敗則以偏卒易之正卒有闕則以偏卒補之於陳則分左右二拒傳曰尹齊將右拒卒以逐下軍使潘黨率游闕四十乘從唐侯以為左拒以從上軍亦猶鄭二拒蓋楚子在中軍與晉中軍相對臨戰分此二拒右拒當晉下軍左拒當晉上軍故杜預謂為陳名調卒之法商農工賈不敗其業卒乘輯睦不奸於事行軍之典則右轅左追蓐前茅慮無中權後勁百官象物而動軍政不戒而備軍行右轅左追蓐凡兵車有甲士有步卒甲士在車不供碎役分步卒為前左右三處兵車一轅服馬夾之而言夾轅者步卒被主分左右者軍行時又分之在兩廂挾轅以為戰備傳曰令尹南轅又曰改乘轅楚陳以轅為主以轅表車正是挾車嚴兵以備不虞其應左右者使之追步草蓐令離道求草不近兵車蓐謂卧止之草以為宿備豫定左右之别在道分使之故云軍行至於對陳則在車左右前茅慮無爾雅曰茅明也在前者明為思慮所無之事恐卒有非常則預告軍衆使知而為備如今軍行令人逺在軍前斥度候望虞有伏兵使踰行人持以絳及白為幡與軍人為私號曲禮前有水則載青旌之𩔖是也茅明釋言文舍人曰茅昧之明也杜預注或曰時楚以茅為旌義未詳中權是中軍大將軍進退之權三軍之心在此權者謂謀之髙下輕重皆當後勁以精兵為殿後世勁兵多在前或被撃敗則後無應勁兵之後此最良法百官象物而動物猶𩔖也謂旌旗畫物𩔖也百官尊卑不同象其所見之物而行動軍之政教不待號令而自備周禮大司馬仲秋教治兵辨旗物之用王載太常諸侯載斾軍吏載旅師都載旌鄉遂載斾郊野載旐百官載旟凡旗有軍衆者畫異物無者帛而已尊卑所建各有物𩔖此云象物而動謂軍行時當指治兵之法行軍之翼日則輜重至乙卯王乘左廣以逐趙旃及昏楚師軍於邲晉之餘師不能軍丙辰楚重至於邲杜注輜重也楚輜重嘗後正軍一日蓋楚軍有法輜重若與正軍過逺則有邀撃之患過近則重兵纔亂正軍亦漬後世用兵先撃輜重取勝者多蓋以非太近則太逺以是知楚輜重逺大兵一日為得宜也凡此皆軍政之善者也若共王之世公子嬰齊為簡之師組甲被練皆創名之襄三年傳楚子重伐吳為簡之師使鄧廖帥組甲三百被練三千簡謂選擇也杜預注組甲被練皆戰備也組甲漆甲成文被練之袍賈逵云組甲以組綴甲車士服之被練帛也以帛綴甲步卒服之孔頴達曰甲貴牢固練若不固宜皆用組何當造不牢之甲而令步卒服之豈欲其被傷故使甲不牢也若練以綴甲何以謂之被又組是條繩不可為衣服安得以為甲裏杜言組甲漆甲成組文今時漆甲有為文者被練文不言甲必非甲名被是被覆衣著之名故以練袍被於身上雖並無明證而杜說近之吕祖謙曰組甲被練皆擇兵之精者被練若今之軟纏之𩔖康王以蒍掩為司馬始井沃衍牧隰臯賦車籍馬而有車兵徒兵甲楯之數襄二十五年楚蒍掩為司馬子木使莊賦數甲兵掩書土田牧隰臯井衍沃量入修賦賦車籍馬賦車兵徒甲兵楯之數既成以授子木靈王斥地益大陳蔡不羮邑賦千乘於是有五帥左氏傳吳人敗諸豫章獲其五帥平王簡上國東國之兵都外都師精練有法昭十四年楚平王使然丹簡上國之兵於宗邱且撫其民使屈罷簡東國之兵於召陵亦如之好於邉疆息民五年而復用師杜預注上國都在國都之西西方居上流故謂之上國按下云簡東國之兵亦如此知此是簡西國之兵也西國東國皆是楚人在國之東西者孔頴達曰西為上則東為下下言東則此是西互見也至若成丁則若申息之子弟僖二十八年楚子入居於申子玉城濮之敗王使謂之曰大夫若入其若申息之老何杜預曰申息二邑子弟皆從子玉而死士兵則若都君子按之則若王馬之屬昭二十七年傳左司馬戍帥都君子與王馬之屬以濟師杜注在都邑之士有復除者賈逵云平常免其行役事急乃使之耳君子既有士則不調發唯吳楚多有此事急則從如越有君子六千人是也王馬之屬王養馬官屬校人之𩔖凡此皆以急調役非常法其為舟師以待吳寇而卒莫能以得志故曰吳用木也我用革也楚用舟師自康王始考之經傳吳自成七年始入州來暨共王卒繼侵楚明年敗楚於臯舟之隘是吳利在舟師楚懼無以敵吳後十年康王始為舟師以畧吳疆而吳乃滅巢昭王時救潛之役令尹子常以舟師及河内而還竟無成功其後囊瓦伐吳師於豫章吳人見舟豫章而潛師於巢遂敗楚師入郢之後吳太子終纍又敗楚舟師獲其帥蓋楚雖以備吴置舟師而實莫能勝亦地形用便有不同耳右楚兵制秦自非子為孝王養馬汧渭之間封為附庸至秦仲始大秦仲之孫襄公當平王初興兵討西戎以救周平王東遷遂有岐豐之地列為諸侯地與戎相錯襄公修其車馬備其兵甲武事備矣至穆公覇西戎始作三軍殽之役三帥而車三百乘又置陷陣吳子秦置陷陣三萬魯定公五年秦子蒲子虎帥車五百乘救楚兵力益以强盛及孝公用商鞅定變法之令令民為什伍而相收連坐告姦者與斬敵首同賞匿姦者與降敵同罰民有二男以上不分異者倍其賦有軍功者各以率音律受上爵為私鬬者各以輕重被刑宗室非有軍功論不得為屬籍行之十年民勇於公戰怯於私鬭又以秦地曠而人寡晉地狹而人稠誘三晉之人耕秦地優其田宅而使秦人應敵於外大率百人則五十人為農五十人習戰凡民年二十三附之疇官給郡縣一月而更謂卒復給中都一歲謂正卒復屯邉一歲謂戍卒凡戰獲一首賜爵一級自公士至大庶長十八級後通闗内列侯二十級皆以戰功相君長長平之役年十五以上悉發又非商鞅之舊矣右秦兵制蘇秦說燕文侯曰燕東有朝鮮遼東二水名北有林胡樓煩樓煩屬鴈門郡二胡國名朔嵐已北西有雲中九原二郡名南有滹沱易水地方二千里帯甲數十萬車六百乘騎六千匹粟支數年南有碣石鴈門之饒北有棗栗之利民雖不佃作而足於棗栗矣此所謂之天府也說趙肅侯曰當今之時山東之建國莫强於趙趙地方二千餘里帯甲數十萬車千乘騎萬匹粟支數年西有常山南有河漳東有清河北有燕國臣竊以天下地圖按之諸侯之地五倍於秦料度諸侯之卒十倍於秦六國為一并力西向而攻秦破秦必矣說韓宣惠王曰韓北有鞏洛成臯之固西有宜陽商阪之塞東有宛穰二縣名洧水南有陘山地方九百餘里帯甲數十萬天下之强弓勁弩皆從韓出谿子南方谿子蠻夷柘弩皆善材少府時力距來者韓有谿子弩又有少府所造二種之弩按時力謂作之得時力倍於常故名時力距來者謂弩勢勁利足距來敵也見淮南子皆射六百步之外韓卒超卒而射百發不暇止逺者括蔽洞胷近者鏑弇心韓卒之劒㦸皆出於冥山冥山在朔州北棠谿在豫州偃城墨陽淮南子曰墨陽之莫邪也合賻戰國罙作合伯春秋後語作合相鄧師宛馮鄧國有功鑄劒因名鄧師宛人於馮池鑄劒故號宛馮在滎陽龍淵太阿二劒名皆陸斷牛馬水截鵠鴈當敵則斬堅甲鐡幕革抉㕹芮抉音決謂以革為射決決射韝也㕹音伐謂楯也芮謂繋盾之紛綬也無不畢具以韓卒之勇被堅甲疏勁弩帯利劒一人當百不足言也說魏襄王曰大王之地南有鴻溝陳汝南許郾昆陽召陵舞陽新都新郪東有淮頴煑棗無胥西有長城之界北有河外卷衍酸棗地方千里地名雖小然而田舍廬廡之數曾無所芻牧人民之衆車馬之多日夜行不絶輷輷殷殷輷麾宏反殷音隠若有三軍之衆臣竊量大王之國不下於楚竊聞大王之卒武士二十萬即魏氏武卒也注見後班固刑法志蒼頭二十萬謂以青布裹頭以異於衆荀子魏有蒼頭二十萬是也奮撃二十萬厮徒十萬厮養之卒謂養馬賤者亦為兵車六百乘騎五千匹此其過越句踐武王逺矣說齊宣王曰齊南有泰山東有琅邪西有清河北有勃海此所謂四塞之國也齊地方二千餘里帯申數十萬粟如邱山三軍之良五家之兵五家即五國進如鋒矢戰如雷霆解如風雨即有軍役未嘗背泰山絶清河渉勃海也言臨淄自足齊有軍役不用度河取二部臨淄之中七萬户臣竊度之不下户三男子三七二十一萬不待發於逺縣而臨淄之卒固已二十一萬矣說楚威王曰楚天下之强國也王天下之賢王也西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有陘塞郇陽地方五千餘里帯甲百萬車千乘騎萬匹粟支十年此伯王之資也班固漢書刑法志曰春秋之後滅弱吞小並為戰國稍增講武之禮以為戲樂用相夸視師古曰視讀曰示而秦更名角抵師古曰抵音丁禮反解在武紀先王之禮没於淫樂中矣雄桀之士因埶輔時作為權詐以相傾覆吳有孫武齊有孫臏師古曰臏音頻忍反魏有吳起秦有商鞅皆禽敵立勝垂著篇籍當此之時合從連衡師古曰衡横也戰國時齊楚韓魏燕趙為從秦國為衡從音子容反謂其地形南北從長也秦地形東西横長故為衡也轉相攻伐代為雌雄師古曰代亦迭也齊愍以技撃强孟康曰兵家之技巧技巧者習手足便器械積機闗以立攻守之勝魏惠以武卒奮師古曰奮盛起秦昭以銳士勝師古曰銳勇利世方爭於功利而馳說者以孫吳為宗時唯荀卿明於王道而非之曰彼孫吳者上埶利而貴變詐施於暴亂昏嫚之國君臣有間師古曰言有間隙不諧和上下離心政謀不良故可變而詐也夫仁人在上為下所卬卬讀作仰猶子弟之衞父兄若手足之扞頭目何可當也扞禦難也鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讎人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀攻堯若卵投石夫何幸之有師古曰言往必破碎詩曰武王載斾有䖍秉鉞如火烈烈則莫我敢遏師古曰殷頌長發之詩也武王謂湯也䖍敬也遏止也言湯建號興師猶本仁義雖執戚鉞以敬為先故得如火之盛無能止也言以仁義綏民者無敵於天下也若齊之技撃得一首則受賜金事小敵脆則媮可用也師古曰媮與偷同謂茍且事鉅敵堅則渙然離矣是亡國之兵也魏氏武卒衣三屬之甲服䖍曰作大甲三屬竟人身也蘇林曰兜鍪也盆領也髀襌也如淳曰上身一髀褌一踁繳一凡三屬也屬聨也操十二石之弩負矢五十个置戈其上冠胄帯劒贏三日之糧師古曰个讀曰个个枚也胄兜鍪也冠胄帯劒者著兜鍪而又帯劒也贏謂擔負也音盈日中而趨百里師古曰中一日之中中試則復其户利其田宅師古曰中試試之而中科條也復謂免其賦稅也利田宅者給其便利之處也中音竹仲反復音方目反如此則其地雖廣其稅必寡其氣力數年而衰是危國之兵也秦人其生民也陿阸其使民也酷烈師古曰陿地小也隘險固也酷重辱也烈猛威也刼之以埶隠之以阸鄭氏曰秦地多隘蔵隠其民於隘中也臣瓚曰秦政急峻隠括其民於隘狹之法狃之以賞慶道之以刑罰師古曰狃串習也音女救反道讀曰導使民所以要利於上者非戰無由也功賞相長五甲首而𨽻五家服䖍曰能得著甲者五人首使得𨽻役五家也如淳曰役𨽻五家是為相君長是最為有數故能四者有勝於天下然皆干賞蹈利之兵庸徒鬻賣之道耳師古曰鬻音育未有安制矜節之理也師古曰矜持也故雖地廣兵彊鰓鰓常恐天下之一合而共軋已也蘇林曰鰓音慎而無禮則葸之葸鰓懼貌也張晏曰軋踐轢也師古曰鰓音先祀反軋音於黠反至乎齊桓晉文之兵可謂入其域而有節制矣孟康曰入王兵之域而未盡也然猶未本仁義之統也故齊之技撃不可以遇魏之武卒魏之武卒不可以直秦之銳士師古曰直亦當也秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳師古曰戰陳之義本因陳列為名而音變耳字則作陳更無别體而末代學者輙改其字旁從車非經史之本文也今宜依古不從流俗也善陳者不戰善戰者不敗善敗者不亡若夫舜脩百僚咎繇作士師古曰士師理官謂司寇之職也命以蠻夷猾夏寇賊姦宄而刑無所用所謂善師不陳者也湯武征伐陳師誓衆而放禽桀紂師古曰謂湯誓泰誓牧誓是也所謂善陳不戰者也齊桓南服彊楚使貢周室師古曰謂僖四年伐楚次於陘責包茅不入王祭不供也北伐山戎為燕開路師古曰謂莊三十年伐山戎以其病燕故存亡繼絶功為伯首師古曰謂存三亡國衞邢魯也伯讀曰覇所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡師古曰謂定四年吳入郢楚子出涉雎濟江入於雲中也父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之或犇走赴秦號哭請救師古曰謂申包胥如秦乞師也犇古奔字秦人為之出兵師古曰謂秦子蒲子武帥車五百乗以救楚也二國并力遂走吳師師古曰謂子蒲大敗夫槩王於沂薳射之子從子西敗吳師於軍祥昭王返國師古曰吳師已歸楚子入郢所謂善敗不亡者也若秦因四世之勝據河山之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下師古曰言如獵之取獸窮武極詐士民不附卒𨽻之徒還為敵讎師古曰謂陳勝吳廣英布之徒也猋起雲合果共軋之師古曰猋疾風也如猋之起言其速也如雲之合言其盛也猋音必遥反斯為下矣凡兵所以存亡繼絶救亂除害也故伊吕之將子孫有國與商周並師古曰言其同盛衰也至於末世茍任詐力以快貪殘爭城殺人盈城爭地殺人滿野孫吳商白之徒皆身誅戮於前而國滅亡於後師古曰孫武孫臏吳起商鞅白起也報應之埶各以𩔖至其道然矣自周室以東諸侯强大僭侈兵法軍制國自為政俱非先王之舊晉楚齊秦其尤也魯雖弱國而軍制亦屢變故摭左氏内外傳諸書畧考諸國之兵制至戰國時六王爭强軍政雖無可考而畧見於蘇秦之說班孟堅西漢刑法志論兵多述春秋戰國時事頗有可考故具載之秦始皇既并天下分為三十六郡郡置材官聚天下兵器於咸陽鑄為鐘鐻講武之禮罷為角觝是時北築長城四十餘萬南戍五嶺五十餘萬驪山阿房之役各七十餘萬兵不足用而後發謫矣其後里門之左一切發之而勝廣起里門左謂閭里之左凡居者以富强為右貧弱為左秦役戍多富者役盡兼取貧弱而發之也山齋易氏曰始皇既并天下北築長城南戌五嶺又有驪山阿房之役兵不足用乃至發謫先發弛刑之𩔖次發西賈人之𩔖次發治獄不直者之𩔖次以隠官刑徒者次以嘗有市籍者又其次則大父母父母嘗有市籍者先發里門之左名閭左之戍未及發右而二世立復調材士五萬人以衞咸陽民不聊生天下騷動而勝廣起矣是時楚兵百萬而秦發近縣不及乃赦驪山徒奴産子以擊盗及關東盗賊益熾又發關中卒以撃之而章邯三歲將兵亡失已十數萬坑於降楚者又二十餘萬沛公入關而秦遂以亡原秦之亡皆起於兵備廢弛而倚辦於倉卒髙祖鑒其弊而於郡國京師兵備嚴整且内外有相制之勢漢法之善者也按班史以銷鋒鏑弛武備為秦之所以亡山齋因而發明其說然愚以為秦之亡非闗於兵弛也當時盡吞六雄威震六合彼胡越僻在裔夷豈能為纎芥之害而發百萬之師以戍之驪山阿房之役又復數十萬健卒壯士虚耗於無用之時糜爛於不切之役蓋側目倒戈相挺而並起者皆秦兵也史記言先是諸侯吏卒繇使屯戍過秦中者秦中吏卒遇之多無狀及章邯以秦軍降諸侯諸侯吏卒乘勝多奴虜使之輕折辱秦吏卒秦吏卒多怨竊言曰章將軍等詐吾屬降諸侯今能入關破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子奈何諸將微聞其語以告項羽羽乃盡坑秦卒二十餘萬人夫此二十萬人者即十餘年前王翦王賁等將之以横行天下誅滅六雄者也國有興廢而士心之勇怯頓殊異哉然章邯之降也特以畏趙髙之讒二世之誅而其兵固非小弱亦未嘗甚敗衂也而此二十萬人者亦復弭耳解甲而曾無異辭雖明知必蹈禍機反幸諸侯之入闗以紓禍所謂寡助之至親戚叛之者歟文獻通考卷一百四十九
