body:
  text: 文獻通考卷二十五鄱陽馬端臨貴與著國用考三漕運秦欲攻匈奴運糧使天下飛芻輓粟運載芻藳令疾至故曰飛芻輓粟謂引車船也音晩起於黄腄音譙東莱二縣瑯琊負海之郡轉輸北河言沿海諸郡皆令轉輸至北河北河今朔方之北河也率三十鍾而致一石六斛四斗為鍾計其道路所費凡用百九十二斛乃得一石漢興髙帝時漕運山東之粟以給中都官歲不過數十萬石婁敬說帝都關中張良曰關中阻三面而守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師諸侯有變順流而下足以委輸敬說是也孝文時賈誼上說曰天子都長安而以淮南東道為奉地鏹道數千不輕致輸郡或乃越諸侯而遂調均發徴至無狀也古者天子地方千里中之而為都輸將繇使其逺者不在五百里而至公侯地百里中之而為都輸將繇使逺者不在五十里而至輸者不苦其繇繇者不傷其費故逺方人安及秦不能分人寸地欲自有之輸將起海上而来一錢之賦數十錢之費不輕而致也上之所得甚少而人之所苦甚多也孝武建元中通西南夷作者數萬人千里負擔饋糧至十餘鍾致一石其後東滅朝鮮置滄海郡人徒之衆擬西南夷又衛青擊匈奴取河南地今朔方復興十萬餘人築衛朔方轉漕甚逺自山東咸被其勞元光中大司農鄭當時言於帝曰異時關東運粟漕水從渭中上度六月而罷而渭水道九百餘里時有難處引渭穿渠起長安傍南山下至河三百餘里徑易漕度可三月罷而渠下民田萬餘頃又可得以溉此損漕省卒而益肥關中之地得穀上以為然發卒穿渠以漕運大便利也其後番係言漕從山東西嵗百餘萬石更底柱之險敗亡甚多而亦頗費穿渠引汾溉皮氏汾隂下引河溉汾隂蒲阪下皮氏今絳郡龍門縣汾隂蒲阪今河東郡寳鼎河東二縣度可得五千頃故盡河壖棄地度可得穀二百萬石以上穀從渭上與關中無異而底柱之東可無復漕上又以為然發卒作渠田數嵗河移徙渠不利田者不能償種久之河東渠田廢予越人令少府以為稍入時越人徙者以田予之其租稅入少府其入未多故謂之稍其後又有人上書欲通褒斜道褒斜二水名褒水東流南入沔今漢中郡褒城縣斜水北流入渭今武功縣及扶風郡及漕事下御史大夫張湯湯言抵蜀從故道多坂廽逺今穿褒斜道少阪近四百里而褒水通沔斜水通渭皆可以行船漕漕從南陽上沔入褒褒之絶水至斜間百餘里以車轉從斜入渭如此漢中穀可致而山東從沔無限便於底柱之漕且褒斜材木竹箭之饒擬於巴蜀上以為然拜湯子卬為漢中守發數萬人作褒斜道五百餘里道果便近而水多湍石不可漕武帝作柏梁臺宫室之修由此日麗徒奴婢衆而下河漕度四百萬石及官自糴乃足元封元年桑𢎞羊請令民入粟補吏贖罪他郡各輸急處而諸農各致粟山東漕益嵗六百萬石一嵗之中太倉甘泉倉滿邊餘穀按漢初致山東之粟不過嵗數十萬石耳至孝武而嵗至六百萬石則幾十倍其數矣雖征斂苛煩取之無藝亦由河渠疏利致之有道也昭帝元鳯二年詔曰前年減漕三百萬石三年詔曰民被水災頗匱於食其止四年勿漕孝宣即位嵗數豐穰耿夀昌五鳯中奏言故事嵗漕關東穀四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原等郡穀多足供京師可以省關東漕卒過半天子從其計御史大夫蕭望之奏言夀昌欲近糴漕關内之穀築倉理船費直二萬萬餘萬萬億也有動衆之功恐生旱氣人被其災夀昌習於商功分銖之事其深計逺慮誠未足任宜且如故帝不聽漕事果便光武北征命冦恂守河内收四百萬斛以給軍以輦車驪駕轉輸不絶虞詡為武都太守開漕船道而水運通利明帝永平十三年汴渠成河汴分流復其舊跡初平帝時河汴決壊久而不修建武時光武欲修之而未果其後汴渠東侵日月彌廣兖豫百姓怨嘆㑹有薦樂浪王景能治水者乃詔發卒數十萬遣景與將作謁者王吳修汴渠隄自滎陽東至千乗海口千餘里十里立一水門令更相洄注無潰漏之患費以百億計致堂胡氏曰世言隋煬帝開汴渠以幸揚州文士考禹貢言堯都冀州居河下流而入都貢賦重於用民力故每州必記入河之水獨淮與河無相通之道求之故迹而不得乃疑汴水自禹以来有之不起於隋世既久逺或名鴻溝或名官渡或名汴梁大槩皆自河入淮故淮可引江湖之舟以逹於冀也今據後漢書則平帝時已有汴渠曰河汴決壊則謂輸受之所也至是發卒四十萬修渠隄則平地起兩岸而汴水行其中也十里立一水門更相洄注則以節制上流恐河溢為患也是正與今之汴渠制度無異特未有導洛之事耳史曰渠隄自滎陽而東則上疑其為鴻溝下疑其為官渡者恐未得其要官渡直黄河也故袁曺相距沮授曰悠悠黄河吾其濟乎汴渠自西而東鴻溝乃横亘南北故曰未得其要也獨所謂自禹以来有汴者此則不易之論也漢丞相諸葛亮勸農講武作木牛流馬運米集斜谷口治斜谷邸閣息民休士三年而後用之木牛其法方腹曲脛一脚四足頭入領中舌著於腹載多而行少宜住可大用而不可小使特行者數十里羣行者二十里曲者為牛頭雙者為牛脚横者為牛領轉者為牛足覆者為牛背方者為牛腹垂者為牛舌曲者為牛肋牛御雙轅人行六尺牛行四歩載一歲糧日行三十里而人不大勞牛不飲食流馬亦有尺寸之數先公曰邸閣者倉廪之異名歟魏晋以来多稱之晋史景紀言蜀將姜維冦狄道帝曰姜維攻羗收其質任聚穀作邸閣訖而復轉行至此云云是邸閣者倉廩之名耳魏齊王正始四年司馬宣王使鄧艾行陳項以東至夀春今淮陽郡至夀春郡艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通運漕之道宣王從之乃開廣漕渠東南有事興衆泛舟而下逹於江淮資食有儲而無水害艾所建也語在屯田篇晋武帝太始十年鑿陕南山決河東注洛以通運漕雖有此詔竟未成功懐帝永嘉元年修千金堨於許昌以通運成帝咸和六年以海賊冦抄運漕不繼發王公以下千餘丁各運米六斛穆帝時頻有大軍糧運不繼制王公已下十三户共借一人助度支運趙王虎以租入殷廣轉輸勞煩令中倉嵗入百萬斛餘皆儲之水次令刑贖之家得以錢代財帛無錢聽以穀麥皆隨時價輸水次倉後魏自徐揚内附之後徐州今彭城揚州今夀州仍代經畧江淮於是轉運中州以實邊鎮百姓疲於道路有司請於水運之次隨便置倉乃於小平石門白馬津漳涯黒水濟州陳郡大梁凡八所各立邸閣每軍國有需應機漕引此費役微省時三門都將薛欽上言計京西水次汾華二州恒農河北河東平陽等郡年常綿絹及貲麻皆折公物雇車牛送京道險人敝費公損私畧計華州一車官酬絹八疋三丈九尺别有私人雇價布八十疋河東一車官酬絹五疋二丈别有私人雇價布五十疋自餘州郡雖未練多少推之逺近應不減此今求車取雇絹三疋市木造船不勞採斫計船一艘舉十三車車取三疋合有三十九疋雇作首并匠及船上雜具食直足以成船計一船賸絹七十八疋布七百八十疋又租車一乗官格二十斛成載私人雇價逺者五斗布一疋近者一石布一疋准其私費一車有布逺者八十疋近者四十疋造船一艘計舉七百石准其雇價應有千四百疋今取布三百疋造船一艘并船上覆理雜事計一船有賸布千一百疋又其造船之處皆須鋸材人功并削船茹依功多少即給當州郡門兵不假更召汾州有租庸調之處去汾不過百里華州去河不滿六十並令計程依舊酬價車送船所船之所運唯達㵢陂其陸路後㵢陂至倉門調一車雇絹一疋租一車布五疋則於公私為便詔從之而未能盡行也孝文太和七年薄骨律鎮將刁雍上表曰奉詔髙平安定統萬薄骨律鎮今靈武郡髙平今平凉郡安定即今郡統萬即朔方郡也及臣所守四鎮出車五千乗運屯穀五十萬斛付沃野鎮以供軍糧臣鎮去沃野八百里道多深沙輕車往来猶以為難設令載穀二十石每至深沙必至滯䧟又穀在河西轉至沃野越渡大河計奉五千乗運十萬斛百餘日乃得一返大廢生人耕墾之業車牛艱阻難可全至一歲不過三運五十萬斛乃經三年臣聞鄭白之渠逺引淮海之粟泝流數千里周年乃得一至猶稱國有儲糧人用安樂求於山在今平涼郡髙平縣今笄頭山語訛亦曰汧沌山即山也河水之次造船二百艘二船為一船一船勝二十斛一舫十人計須千人臣鎮内之兵率皆習水一運二十萬斛方舟順流五日而至自沃野牽上十日還到合六十日得一返從三月至九月三返運送六十萬斛計用人工輕於車運十倍有餘不費牛力又不廢田詔曰知欲造船運穀一冬即大省人力既不費牛又不廢田甚善非但一運自可永以為式隋文帝開皇二年以京師倉廩尚虚議為水旱之備詔於蒲陕虢熊伊洛鄭懷邠衛汴許汝等水次十三州熊州今福昌縣伊州今陸渾縣洛州今絳縣餘縣並今郡置募運米丁又於衛州置黎陽倉陕州置常平倉華州置廣通倉衛陕華並今郡轉相灌注漕關東及汾晋之粟以給京師又遣倉部侍郎韋瓚向蒲陕以東募人能於洛陽運米四十石經底柱之險達於常平者免其征戍其後以渭水多沙流有深淺漕者苦之四年詔宇文愷率水工鑿渠引渭水自大興城即今西京城也東至潼關三百餘里名曰廣通渠轉運通利關内便之煬帝大業元年發河南諸郡男女百餘萬開通濟渠自西苑引穀洛水達於河又引河通於淮海自是天下利於轉輸四年又發河北諸郡百餘萬衆開永濟渠引沁水南達於北河通涿郡今范陽郡自是丁男不供始以婦人從役五年於西域之地置西海鄯善且末等郡逐吐谷渾得其地置在今酒泉張掖晋昌郡之北今悉為北狄之地譴天下罪人配為戍卒大開屯田發四方諸郡運糧以給之七年冬大㑹涿郡分江淮南配驍衛大將軍来䕶兒别以舟師濟海舳艫數百里並載軍糧期與大兵㑹於平壤髙麗所都置洛口回洛倉穿三千三百窖窖容八千致堂胡氏曰隋煬積米其多至二千六百餘萬石何凶旱水溢之足虞然極奢於内窮武於外耕桑失業民不聊生所謂江河之水不能實漏甕倉窖充盈適足為重斂多蔵之罪耳唐都長安而關中號稱沃野然其土地狭所出不足以給京師備水旱故常轉漕東南之粟髙祖太宗之時用物有節而易贍水陸漕運嵗不過二十萬石故漕事簡自髙祖以後嵗益増多而功利繁興民亦罹其弊矣初江淮漕租米至東都輸含嘉倉以車或䭾陸運至陕而水行来逺多風波覆溺之患其失常十七八故其率一斛得八斗為成勞而陸運至陕纔三百里率兩斛計庸錢千民送租者皆有水陸之直而河有三門底柱之險顯慶元年苑西監褚朗議鑿三門山為梁可通陸運乃發卒六千鑿之功不成其後將作大匠楊務廉又鑿為棧以輓漕舟輓夫繫二釽於胸而繩多絶輓夫輙墜死則以逃亡報因繫其父母妻子人以為苦開元十八年宣州刺史裴耀卿朝集京師元宗訪以漕事耀卿條上便宜曰江南户口多而無征防之役然送租庸調物以歲二月至揚州入斗門四月已後始渡淮入汴常苦水淺六七月乃至河口而河水方漲須八九月水落始得上河入洛而漕路多梗船檣阻隘江南之人不習河事轉雇河師水手重為勞費其得行日少阻滯日多今漢隋漕路瀕河倉廩遺迹可尋可於河口置武牢倉鞏縣置洛口倉使江南之舟不入黄河黄河之舟不入洛口而河陽柏崖太原永豐渭南諸倉節級轉運水通則舟行水淺則寓於倉以待則舟無停留而物不耗失此甚利也元宗初不省二十一年耀卿為京兆尹京師雨水穀踊貴元宗將幸東都復問耀卿漕事耀卿因請罷陕陸運而置倉河口使江南漕舟至河口者輸粟於倉而去縣官雇舟以分入河洛置倉三門東西漕舟輸其東倉而陸運以輸西倉復以舟漕以避三門之水險元宗以為然乃於河隂置河隂倉河西置柏崖倉三門東置集津倉西置鹽倉鑿山十八里以陸運自江淮漕者皆輸河隂倉自河隂西至太原倉謂之北運自太原倉浮渭以實關中元宗大悅拜耀卿為黄門侍郎同中書門下平章事兼江淮都轉運使以鄭州刺史崔希逸河南少尹蕭炅為副使益漕晋絳魏濮邢貝濟博之租輸諸倉轉而入渭凡三嵗漕七百萬石省陸運傭錢三十萬緡是時民久不罹兵革物力豐富朝廷用度亦廣不計道里之輸送所出水陸之直增以函脚營窖之名民間傳言用斗錢運斗米其糜耗如此及耀卿罷相北運頗艱米嵗至京師纔百萬石三十五年遂罷北運而崔希逸為河南陕運使嵗運百八十萬石其後以太倉積粟有餘歲減漕數十萬石三十九年陕郡太守李齊物鑿底柱為門以通漕開其山巔為輓路燒石沃醯而鑿之然棄石入河激水益湍怒舟不能入新門候其水漲以人輓舟而上天子疑之遣宦者按視齊物厚賂使者還言便齊物入為鴻臚卿以長安令韋堅代之兼水陸運使堅治漢隋運渠起關門抵長安通山東租賦乃絶㶚滻並渭而東至永豐倉與渭合又於長樂坡瀕苑墻鑿潭於望春樓下以聚漕舟堅因使諸舟各揭其郡名陳其土地所産寳貨諸竒物於栿上先時民間唱俚歌曰得體紇那邪後得寶符於桃林於是陕縣尉崔成甫更得體歌為得寳𢎞農野堅命舟人為吳楚服大笠廣䄂芒屩以歌之成甫又廣之為歌辭十闋自衣闕後綠衣錦半臂紅抹額立第一船為號頭以唱集兩縣婦女百餘人鮮服靚粧鳴鼓吹笛以和之衆艘以次輳樓下天子望見大悅賜其潭名曰廣運潭是嵗漕山東粟四百萬石自裴耀卿言漕事進用者常兼轉運之職而韋堅為最初耀卿興漕路請罷陸運而不果廢自景雲中陸運北路分八遞雇民車牛以載開元初河南尹李傑為水陸運使運米嵗二百五十萬石而八遞用車千八百乗耀卿罷久之河南尹裴逈以八遞傷牛乃為交塲兩遞濵水處為宿塲分官縂之自龍門東山抵天津橋為石堰以遏水其後大盗起而天下匱矣肅宗末年史朝義兵分出宋州淮運於是阻絶租庸鹽鐵泝漢江而上河南尹劉晏為户部侍郎兼勾當度支轉運鹽鐵鑄錢使江淮粟帛繇襄漢越商於輸京師及代宗出陕州關中空窘於是盛轉輸以給用廣德二年廢勾當度支使以劉晏顓領東都河南淮西江南東西轉運租庸鑄錢鹽鐵轉輸至上都度支所領諸道租庸觀察使凡漕事亦皆決於晏晏即鹽利雇傭分吏督之隨江汴河渭所宜故時轉運船繇潤州陸運至揚子斗米費錢十九晏命囊米而載以舟減錢十五繇揚州距河隂斗米費錢百二十晏為歇艎支江船二千艘毎船受千斛十船為綱毎綱三百人篙工五十人自揚州遣將部送至河隂上三門號上門填闕船米斗減錢九十調巴蜀襄漢麻枲竹篠為綯輓舟以朽索腐材代薪物無棄者未十年人人習河險江船不入汴汴船不入河河船不入渭江南之運積掦州汴河之運積河隂河船之運積渭口渭船之運入太倉嵗轉粟百一十萬石無升斗溺者輕貨自揚子至汴州毎䭾費錢二千二百減九百嵗省十餘萬緡又分官吏主丹陽湖禁引溉自是河漕不涸大歴八年以關内豐穰減漕十萬石度支和糴以優農晏自天寳末掌出納監嵗運知左右蔵主財穀三十餘年矣及楊炎為相以舊惡罷晏轉運使復歸度支凡江淮漕米以庫部郎中崔河圖主之及田恱李惟岳李納梁崇義拒命舉天下兵討之諸軍仰給京師而李納田恱兵守渦口梁崇義搤襄鄧南北漕引皆絶京師大恐江淮水陸轉運使杜佑以漢運路出浚儀十里入琵琶溝絶蔡河至陳州而合自隋鑿汴河官漕不通若導流培岸功用甚寡疏鷄鳴岡首尾可以通舟陸行纔四十里則江湖黔中嶺南蜀漢之粟可方舟而下繇白沙趣東關歴潁蔡涉汴抵東都無濁河泝淮之阻減故道二千餘里㑹李納將李洧以徐州歸命淮路通而止户部侍郎趙贊又以錢貨出淮迂緩分置汴州東西水陸運兩稅鹽鐵使以度支總大綱貞元初關輔宿兵米斗千錢太倉供天子六宫之膳不及十日禁中不能釀酒以飛龍駝負永豐倉米給禁軍陸運牛死殆盡德宗以給事中崔造敢言為能立事用為相造以江吳素嫉錢穀諸使顓利㒺上乃奏諸道觀察使刺史選官部送兩稅至京師廢諸道水陸轉運使及度支廵院江淮轉運使以度支鹽鐵歸尚書省宰相分判六尚書以户部侍郎元琇判諸道鹽鐵𣙜酒侍郎吉中孚判度支諸道兩稅増江淮之運浙江東西嵗運米七十五萬石復以兩稅易米百萬石江西湖南鄂岳福建嶺南米亦百二十萬石詔浙江東西莭度使韓滉淮南莭度使杜亞運至東西渭橋倉諸道有鹽鐵處復置廵院嵗終宰相計課最崔造厚元琇而韓滉方領轉運奏國漕不可改帝亦雅器滉復以為江淮轉運使元琇嫉其剛不可共事因有隙琇稱疾罷而滉為度支諸道鹽鐵轉運使於是崔造亦罷滉遂劾琇常饋米淄青河中而李納懐光倚以構叛貶琇雷州司户参軍尋賜死是時汴宋莭度使春夏遣官監汴水察盜灌溉者嵗漕經底柱覆者㡬半河中有山號米堆運舟入三門雇平陸人為門匠執標指麾一舟百日乃能上諺曰古無門匠墓謂皆溺死也陕虢觀察使李泌益鑿集津倉山西逕為運道屬於三門倉治上路以回空車費錢三萬緡下路減半又為入渭船方五板輸東渭橋太倉米至凡百三十萬石遂罷南路陸運其後諸道鹽鐵轉運使張滂復置江淮廵院及浙西觀察使李錡領使江淮堰埭𨽻浙西者増私路小堰之稅以副使潘孟陽主上都留後李巽為諸道轉運鹽鐵使以堰埭歸鹽鐵使罷其増置者自劉晏後江淮米至渭橋寖減矣至巽乃復如晏之多初揚州䟽太子港陳登塘凡三十四陂以益漕河輙復堙塞淮南節度使杜亞乃濬渠蜀岡疏句城湖愛敬陂起隄貫城以通大舟河益庳水下走淮夏則舟不得前莭度使李吉甫築平津堰以洩有餘防不足漕流遂通然漕益少江淮米至渭橋者纔二十萬斛以諸道鹽鐵轉運使盧坦糴以備一歲之費省冗職八十員自江以南補署皆剸屬院監而漕米亡耗於路頗多刑部侍郎王播代坦建議米至渭橋五百石亡五十石者死其後判度支皇甫鎛議萬斛亡三百斛者償之千七百斛者流塞下過者死盗十斛者流三十斛者死而覆船敗輓至者不得十之四五部吏舟人相挾為姦榜笞號苦之聲聞於道路禁錮連嵗赦下而獄死者不可勝數其後貸死刑流天德五城人不畏法運米至者十亡七八鹽鐵轉運使柳公綽請如王播議加重刑太和初嵗旱河涸掊沙而進米多耗抵死甚衆不待覆奏秦漢時故漕興成堰東達永豐倉咸陽縣令韓遼請疏之自咸陽抵潼關三百里可以罷車輓之勞宰相李固言以為非時文宗曰茍利於人隂陽拘忌非朕所顧也議遂決堰成罷輓車之牛以供農耕關中賴其利故事州縣官充綱送輕貨四萬書上考開成初為長定綱州擇清疆官送兩稅至十萬遷一官往来十年者授縣令江淮錢積河隂轉輸嵗費十七萬餘緡行綱多以盗抵死判度支王彦威置縣遞羣畜萬三千三百乗使路傍民飬以取傭日役一驛省費甚博而宰相亦以長定綱命官不以材江淮大州嵗授官者十餘人乃罷長定綱送五萬者書上考七萬者減一選五十萬減三選而已及户部侍郎裴休為使以河瀕縣令董漕事自江達渭運米四十萬石居三嵗米至渭橋百二十萬石凡漕達於京師而足國用者大畧如此其他州縣方鎮漕以自資或兵所征行轉運以給一時之用者皆不足紀貞元初陸贄上奏言邦畿之稅給用不充東方嵗運租米冒淮湖風浪之險泝河渭湍險之艱費多而益寡習聞見而不逹時宜者則曰國之大事不煩費損故有用斗錢運斗米之言雖知勞煩不可廢也習近利而不防遠慮者則曰毎至秋成但令畿内和糴既易集事又足勸農何必轉輸徒耗財用臣以兩家之論互有短長各申偏執之懐俱昧變通之術若國家理安錢穀俱富烝黎蕃息力役靡施然後常以羡財益廣漕運雖有厚費適資貧人貞元之始巨盗初平太倉無兼月之儲關輔遇連年之旱而有司奏停水運務省脚錢至使郊畿煙火殆絶餒殍相望斯所謂覩近利而不防遠患者也近嵗關輔年穀屢登數減百姓稅錢許其折納粟麥公儲委積足給數年農家猶苦穀賤今夏江淮水潦漂損田苗米價倍貴流庸頗多關輔以穀賤傷農宜加價糴穀以勸稼穡江淮以穀貴民困宜減價糶米以救凶災今宜糴之處則無錢宜糶之處則無米而又運彼所乏益此所餘所謂習聞見而不達時宜者也今淮南諸州米每斗當錢一百五十文從淮入渭橋每斗船脚又約用錢二百文計運米一斗總當錢三百五十文其米既糙且陳尤為京邑所賤據市司月估每斗只糶得錢三十七而已耗其九而存其一餒彼人而傷此農制事若斯可謂深失矣今約計一年和糴之數可當轉運二年一斛轉運之資足以和糴五斛比較即時利害運務且合悉停臣竊慮停運則舟船無用壊爛莫修倘遇凶災復須轉漕臨時鳩集理必淹遲臣今欲減所轉之數以實邊儲其江淮諸道運米至河隂河隂運米至太原倉太原運米至東渭橋来年各請停所運三之二其江淮所停運米八十萬斛委轉運使毎斗取八十錢於水災州縣糶之以救貧乏計得錢六十四萬緡減僦直六十九萬緡請令户部先以二十萬緡付京兆令糴米以補渭橋倉之闕數斗用百錢以利農人以一百二萬六千緡付邊鎮使糴十萬人一年之糧餘十萬四千緡以充来年和糴之價其江淮米錢僦直並委轉運使折市綾絹絁綿以輸上都償先貸户部錢如此則不擾一人無廢百事但於常用之内收其枉費之資百萬贏糧坐實邊鄙又有勸農賑乏之利存乎其間矣元祐間東坡蘇氏論綱梢欠折利害奏狀曰臣聞唐代宗時劉晏為江淮轉運使始於揚州造轉運船毎船載一千石十船為一綱揚州差軍將押赴河隂毎造一船破錢一千貫而實費不及五百貫或譏其枉費晏曰大國不可以小道理凡所創置須謀經久船塲既興執事者非一須有餘剰飬活衆人私用不窘則官物牢固乃於揚子縣置十船塲差專知官十人不數年間皆致富贍凡五十餘年船塲既無破敗餽運亦不闕絶至咸通末有杜侍御者始以一千石船分造五百石船二隻船始敗壊而吳堯卿者為揚子院官始勘㑹每船合用物料實數估給其錢無復寛剰專知官十家即時凍餒而船塲遂破餽運不給不久遂有黄巢之亂劉晏以一千貫造船破五百貫為干繫人欺隱之資以今之君子寡見淺聞者論之可謂踈繆之極矣然晏運四十萬石當用船四百隻五年而一更造是嵗造八十隻也每隻剰破五百貫是嵗失四萬貫也而吳堯卿不過為朝廷嵗寛四萬貫耳得失至微而餽運不繼以貽天下之大禍臣以此知天下之大計未嘗不成於大度之士而敗於寒陋之小人也國家財用大事安危所出願常不與寒陋小人謀之則可以經久不敗矣按西漢與唐俱都關中皆運東南之粟以餉京師自河渭泝流而上然漢武帝時運六百萬斛唐天寳極盛之時韋堅為水陸運使僅一嵗能致四百萬斛餘嵗止二百五十萬斛而至德以後僅百餘萬而已俱未能如漢之數且考之食貨志及參以陸蘇二公之言則運彌艱費彌重豈古今水道有險易之不同邪當考咸通元年南蠻䧟交趾徵諸道兵赴嶺南詔湖南水運自湘江入澪渠并江西水運以饋行營諸軍泝運艱難軍屯廣州乏食潤州人陳磻石詣闕言海船至福建往来大船一隻可致千石自福建不一月至廣州得船數十艘便可得三五萬石勝於江西湖南泝流運糧又引劉裕海路進軍破盧循故事乃以磻石為鹽鐵廵官往揚子縣專督海運於是軍不闕供後唐同光三年吏部尚書李琪奏請勅下諸道合差百姓轉般之數有能出力運官物到京者五百石以上白身授一初任州縣官有官者依資次遷授欠選者便與放選千石以上至萬石者不拘文武顯示賞酬免令方春農人流散此亦轉倉贍軍之一術也敇租庸司下諸州有應募者聞奏施行長興二年敇應沿河船般倉依北面轉運司船般倉例每一石於數内與正銷破二升四年二月三司使奏洛河水運自洛口至京往来牽船下卸皆是水運牙官每人管定四十石今洛岸至倉門稍逺牙官運轉艱難近日例多逃走今欲於洛河北岸别鑿一灣引船直至倉門下卸其工役欲於諸軍傔人内差借從之周顯德二年上謂侍臣曰轉輸之物向来皆給斗耗自漢以来不與支破倉廩所納新物尚破省耗况水路所般豈無損失今後每石宜與耗一斗致堂胡氏曰受稅而取耗雖非良法誠以給用猶不使民徒費今觀世宗之言則知晋漢間取雀䑕耗及省耗未嘗為耗用直多取以實倉廩耳比及輸運其當給耗反不與之而或責之綱吏或還使所出州縣補其虧數亡身破家不可勝計豈為國撫民之道也不宜取而取者省耗糜費是也當予而未嘗予者漕運斗耗是也世宗既與之善矣省耗應罷而未罷豈非以多故未及邪眀宗潞王時可謂窘匱猶放逋租數一百萬世宗誠欲蠲除省耗又何難哉四年詔疏下汴水一𣲖北入於五丈河又東北達於濟自是齊魯之舟檝皆至京師六年命侍衛馬軍都指揮使韓令坤自京東䟽汴水入於蔡河侍衛歩軍都指揮使袁彦浚五丈河以通漕運宋東京之制受四方之運者謂之船般倉曰永豐通濟萬盈廣衍通濟冇四倉景德四年改第三曰萬盈第四曰廣衍延豐舊廣利景德中改大中祥符二年增第二順成舊常豐景德中改濟遠舊常盈景德中改富國凡十倉皆受江淮所運謂之東河亦謂之裏河曰永濟永富二倉受懐孟等州所運謂之西河曰廣濟第一受潁夀等州所運謂之南河亦謂之外河曰廣積廣儲二倉受曹濮等州所運謂之北河受京畿之租者謂之稅倉曰廣濟受京東諸縣廣積第一左右騏驥天駟監凡三倉受京北諸縣左天廐坊倉受京西諸縣舊有義豐倉大中祥符元年停大盈右天廐二倉受京南諸縣受商人入中者謂之折中倉有裏外河二名又有茶庫倉或空則兼受船般斛斗草塲則汴河南北各三所騏驥左右天廐坊天駟監各一所以受京畿租賦及和市所入諸州皆有正倉草塲受租稅和糴和市芻粟並掾曹主之其多積之處亦别遣官專掌凡漕運所會則有轉般倉太祖皇帝乾德二年令諸州自今每歲受民租及筦𣙜所獲之課除支度給用外凡緡帛之𩔖悉輦送京師官乏車牛者僦民車以給六年令諸州輦送上供錢帛悉官給車乗當水運者官為具舟不得調發居民以妨農作初荆湖江浙淮南諸州擇部民之髙貲者部送上供物民質不能檢御舟人舟人侵盜官物民破産以償乃詔遣牙將部送勿復擾民自江南東嵗漕米數百萬給京師太宗恐倉吏給受不平遣皇城卒變服偵邏廉得永豐倉持量者八輩受賕為姦悉斬之監倉免官治罪端拱元年徐休復上言京師内外凡大小二十五倉官吏四百二人計每嵗所給不下四百萬石望自今米麥菽各以一百萬石為一界每界命常参官供奉官殿直各一人專知副知各二人凡七人共掌之詔可二年國子博士李覺上言曰鼂錯云欲民務農在於貴粟蓋不可使至賤亦不可使至貴今王都萬衆所聚導河渠達淮海貫江湖嵗運五百萬斛以資國費此朝廷之盛臣庶之福也近来都下粟麥至賤倉廩充牣紅腐相因或以充賞給斗直數十錢此工賈之利而軍農之不利也夫軍士妻子不過數口而月給糧數斛即其費有餘矣百萬之衆所餘既多游手之民資以給食農夫之粟何所求售况糧之来也至逺至艱官之給也至輕至豐嵗豐儉不可預期倘不幸有水旱之虞卒然有邊境之急何以救之今運米一斛至京師其費不啻三百錢諸軍舊日給米二升今若月賦錢三百人必樂焉是一斗為錢五十計江淮運米工脚亦不減此數望明敕軍中各從其便願受錢者若市價官米斗為錢二十即増給十錢裁足以當工脚之費而官私獲利數月之内米價必増農民受賜矣若米價騰踴即官復給糧軍人糶其所餘亦獲善價此又戎士受賜矣不十年官有餘糧江外之運亦漸可省上覽奏嘉之天禧末京城所積倉粟一千五百六十萬餘石草一千七百萬五千餘圍國初以来四河所運粟未有定制至太平興國六年汴河嵗運江淮米三百萬石菽一百萬石黄河粟五十萬石菽三十萬石惠民河粟四十萬石菽二十萬石廣濟河粟十二萬石凡五百五十萬石非水旱大蠲民租未嘗不及其數至道初汴河運米至五百八十萬石自是京城積粟盈溢大中祥符初至七百萬石凡漕運大約其數亦計臨時移易焉凡水運自淮南江南荆湖南北路所運粟於揚真楚泗州四處置倉以受其輸既而分調舟船泝流而入京師發運使領之荆湖江淮兩浙以及嶺表金銀香藥犀象百貨亦同之惟嶺表陸運至䖍州而後水運咸平五年七月又命户部判官凌策與江南轉運同計度省自京至廣南香藥驛遞軍士及使臣計六千一百餘人陜西諸州菽粟自黄河三門沿流由汴河而至亦置發運使領之陳潁許蔡光夀等六州之粟帛由石塘惠民河而至京東十七州之粟帛由廣濟河而至皆有京朝官廷臣督之凡三水皆通漕運而嵗計所賴者惟汴流焉河北衛川東北有御河達乾寧軍其運物亦有廷臣主之川陜諸州金帛自劍門列傳置分輦負擔以至租布及官所市布由水運送江陵自江陵遣綱吏運送京師咸平中定嵗運六十六萬疋分為十綱舊常至數百萬疋天禧末水陸上供金帛緡錢二十三萬一千餘貫兩端疋珠寳香藥二十七萬五千餘斤諸州嵗造運船至道末三千三百三十七艘天禧末減四百二十一䖍州六百五吉州五百二十五明州一百七十七婺州一百三温州一百二十五台州一百二十六楚州八十七潭州二百八十鼎州二百四十一鳯翔斜谷六百嘉州四十五止齋陳氏曰本朝定都於汴漕運之法分為四路江南淮南浙東西荆湖南北六路之粟自淮入汴至京師陜西之粟自三門白波轉黄河入汴至京師陳蔡之粟自閔河蔡河入汴至京師京東之粟自十五丈河歴陳濟及鄆至京師四河所運惟汴河最重景德中漕東南粟嵗不過四百五十萬石後增至六百萬天聖中發運使請所部六路計民稅一石量糴粟二斗五升嵗可更得二百萬石給京師仁宗曰常賦外増糴是重擾民不許時江南穀貴民貧尚書員外郎吳耀卿以為言詔嵗減五十萬後是三司奏復増至六百萬然東南災歉輙減嵗漕數或百萬或數十萬又轉移以給他路者時有焉慶歴中詔減廣濟河嵗漕一十萬石後黄河歲漕益減耗纔運菽三十萬石而嵗創漕船市材木役牙錢勞費甚廣嘉祐四年詔罷所運菽減漕船三百艘自是嵗漕三河而已江湖上供米舊轉運使以本路綱輸真楚泗州轉般倉載鹽以歸舟還其郡卒還其家而汴舟詣轉般倉漕米輸京師歲擢運者四河冬涸舟卒亦還營至春復集名曰放凍卒得番休逃亡者少而汴船不涉江路無風波沈溺之患其後發運使權益重六路上供米團綱發船不復委本路獨發運使專其任文移坌併事目繁夥有不能檢察則吏胥可以用意於其間操舟者賕諸吏輙得詣富饒郡市賤貿貴以趨京師自是江汴之舟合雜混轉無辨矣挽舟卒有終身不還其家而老死河路者籍多空名漕事大敝皇祐中發運使許元奏近嵗諸路因循糧綱法壊遂令汴綱至冬出江為他路轉漕兵不得息宜敇諸路增船載米輸轉般倉充歲計如故事於是言利者多以元說為然朝廷為詔如元奏久之而諸路綱不集嘉祐三年復下詔切責有司以格詔不行及發運使不能總綱條轉運使不能斡嵗入預敇江淮兩浙轉運司以期年功各造船補卒團本路綱期自嘉祐五年汴綱不得復出江至期諸路船猶不足汴綱既不得至江外江外船亦不得至京師失商販之利而汴綱工卒訖冬坐食苦不足皆盗毁船材易錢以自給船愈壊漕嵗額又愈不及論者初欲漕卒得歸息而近嵗汴綱多傭丁夫毎船卒不過一二人至冬當留守船實無得歸息者時元罷久矣後至者數奏請出汴船執政守前詔不許御史亦以為言治平三年始詔出汴船七十綱未幾皆出江復故治平二年漕粟至京師汴河五百七十五萬五千石惠民河二十六萬七千石廣濟河七十四萬石又運金帛緡錢入左藏庫内藏庫者總其數一千一百七十三萬而諸路轉移以相給者皆不與焉繇京西陜西河東運薪炭至者薪以斤計為一千七百一十三萬炭以秤計為一百萬是嵗諸路創漕船二千五百四十艘大約京師嵗費粟四百餘萬石芻四百餘萬圍粟則漕運之人及畿縣嵗賦商人入中皆在焉芻亦賦於畿縣或體量和市既而罷商人入中粟至景祐初議復之論者或謂糴京師則穀價翔貴命官度利害後雖復之然入中者無幾芻以體量和市者遇嵗儉則蠲之前後不可勝數至和中一嵗凡蠲二十五萬三司嘗請以布償芻直登莱端布為錢千三百六十沂布千一百仁宗以取直過厚命差減其數云英宗治平四年三司言京師秔米支五歲餘久且陳腐請令發運司以上供穀五十萬石糶穀貴處市金帛儲𣙜貨務以給三路軍需從之發運司始於仁宗時許元自判官為副使創汴河一百綱漕荆湖江淮兩浙六路八十四州米至真揚楚泗轉般倉而止復從通泰載鹽為諸路漕司經費發運司自以汴河綱運米入京師神宗熙寧七年詔委官䟽浚廣濟河增置漕舟依舊運京東米上供宣徽南院使張方平言國初浚河渠三道以通漕運立上供年額汴河六百萬石廣濟河六十二萬石惠民河六十萬石廣濟河所運止給太康咸平尉氏等縣軍糧而已唯汴河運米麥此乃太倉蓄積之實近罷廣濟河而惠民河斛斗不入太倉大衆之命惟汴河是頼議者不已屢作改更必致汴河日失其舊願留神慮以固基本京東察訪鄧潤甫等言山東沿海州郡地廣豐嵗則穀賤可募人為海運山東之粟可轉之河朔以助軍食詔京東河北路轉運相度訖無施行薛向為江淮發運使先是漕運吏卒上下共為侵盗貿易甚則託風水沉没以滅跡而官物陷折者歲不減二十萬斛至向始募客舟與官舟分運以相檢察而舊弊悉去七年提舉汴河隄岸司言京東地富穀粟可以漕運但以河水淺澁不能通舟近修京東河岸開斗門通廣濟河為利甚大今請通津門裏汴河岸東城裏三十步内開河一道及置斗門上安水磨下通廣濟河應接行運從之八年詔罷嵗運糧百萬石赴西京先是導洛入汴運東南粟以實洛下至是户部奏罷之元祐七年知揚州蘇軾上言臣竊見嘉祐中張方平論京師軍儲云今之京師古所謂陳留四通八達之地非如雍洛有山河之險足恃也特恃重兵以立國兵恃食食恃漕運漕運一虧朝廷無所措手足因畫十四策内一項云糧綱到京每嵗少欠不下六七萬石皆以折㑹填償發運司不復抱認非祖宗之舊也臣以此知嘉祐前歲運六百萬石而以欠折六七萬石為多訪聞去嵗止運四百五十餘萬石而欠折之多約至三十餘萬石運法之壊一至於此臣到任以来所斷糧綱欠折等人不可勝數衣糧罄於折㑹船車盡於折賣質妻鬻子聚為乞丏散為盗賊竊計京師及縁河諸郡例皆如此蓋祖宗以来通許綱運攬載物貨既免征稅而脚錢又輕故物貨流通縁路雖失商稅而京師坐獲富庶自導洛司廢而淮南轉運司隂收其利數年以来官用窘逼轉運司督廹諸處稅務日急一日謹按一綱三十隻船而稅務那官不過一員未委如何㸃檢得三十隻船一時皆遍而必勒留住岸一船檢㸃即二十九隻船皆須住岸伺侯以淮南一路言之真揚髙郵楚泗宿六州軍所得糧綱稅錢不過萬緡而所在稅務專欄因金部轉運司許令檢㸃緣此為姦邀難乞取十倍於官遂致綱梢皆窮困骨立亦無復富商大賈肯以物貨委令撘載以此專仰攘取官米無有限量折賣船板動使淨盡事敗入獄以命償官顯是金部與轉運司違條刻剥得糧綱稅錢一萬貫而令朝廷失䧟綱運米三十餘萬石利害皎然臣聞東南餽運所係國計至大故祖宗以来特置發運司專任其責選用既重威令自行如昔時許元輩皆能約束諸路主張綱運其監司州郡及諸塲務豈敢非理刻剝邀難但發運使得人稍假事權申眀元祐編敇不得勒令住岸條貫嚴賜約束行下庶刻薄之吏不敢取小害大東南大計自然辦集徽宗大觀三年尚書省言六路上供斛斗已令直達而奉行之吏因循止將嵗貢額斛於真揚楚泗倉厫為卸納摺運之地又以所管斛斗代諸路嵗額不足之數且欠發運司米一百二十餘萬斛不償乞將見在斛斗盡令般發赴朝廷從之轉般之法東南六路斛斗自江浙起綱至於淮甸以及真揚楚泗為倉七以聚蓄軍儲復自楚泗置汴綱般運上京以發運使董之故常有六百萬石以供京師而諸倉常有數年之積州郡告歉則折納上等價錢謂之額斛計本州歳額以倉儲代輸京師謂之代發復於豐熟以中價收糴穀賤則官糴不至傷農饑歉則納錢民以為便本錢嵗増兵食有餘國家建都大梁足食足兵之法無以加於此矣崇寧初蔡京為相始求羡財以供侈費用所親胡師文為發運使以糴本數百萬緡充貢入為户部侍郎自是来者效尤時有進獻而本錢竭矣本錢既竭不能増糴而儲積空矣儲積既空無可代發而轉般無用矣乃用户部尚書曾孝廣之說立直達之法時崇寧三年九月二十九日也孝廣之言曰往年南自真州江岸北至楚州淮隄以堰瀦水不通重船般剝勞費遂於堰傍置轉般倉受逐州所輸更用運河船載之入汴以達京師雖免推舟過堰之勞然侵盗之弊由此而起天聖中發運使方仲荀奏請度真楚州堰為水閘自是東南金帛茶布之𩔖直至京師惟六路上供猶循用轉般法吏卒糜費與在路折閱動以萬數欲將六路上供斛斗並依東南雜運直至京師或南京府界卸納庶免侵盜乞貸之弊自是六路郡縣各認嵗額雖湖南北至逺處所亦直抵京師豐不加糴歉不代發方綱米之来也立法峻甚船有損壊所至修整不得踰時州縣欲其速過但令供狀以錢給之以至沿流鄉保悉致騷擾公私横費無有紀極又鹽法已壊迴舟無所得舟人逃散船亦隨壊本法盡廢弊事百出良可嘆也譚稹言伏讀聖訓自轉般之法廢為直達嵗運僅足自開嵗綱運不至兩河所糴所般數目不多何以為策令臣詢訪措置以聞竊詳祖宗建立真楚泗州轉般倉之本意可謂至密一則以備中都緩急二則以防漕渠阻節三則綱般裝發資次運行更無虚日自其法廢河道日益淺澁遂致中都糧儲不繼仰煩聖訓丁寧訓飭謂淮南三轉般倉今日不可不復置淮南路泗州江南路真州兩浙路楚州仍乞先自泗州為始候一處了當次及真楚既有糴本順流而下不甚勞費乞賜施行然後俟豐嵗計置儲蓄取㫖立法轉般以為永法詔稹所陳利害甚明並可依奏候睦賊平日令發運司措置施行五年二月新淮南路轉運判官向子諲奏轉般之法寓平糴之意江湖有米則可糴於真二浙有米則可糴於揚宿亳有米則可糴於泗坐視六路之豐歉間有不登之處則以錢折斛發運司得以斡運之不獨無歲額不足之憂因以寛民力萬一運渠旱乾則近有汴口倉庾今日所患者向来糴本嵗五百萬緡支移殆盡難以全仰朝廷乞將經制司措置地契賣糟量添七色等錢以樁充糴本假之數年可以足用六月詔特支降度牒一百萬貫香鹽鈔一百萬貫付吕淙盧知原均斛斗專充應副轉般令尚書省措置取㫖大觀以後或行轉般或行直達詔令不一政和元年張根為江西轉運副使嵗漕米百二十萬以給中都江南州郡僻逺官吏艱於督趨根常存三十萬石於本司為轉輸之本以寛諸郡時甚稱之髙宗建炎初詔諸路綱米以三分之一輸行在所餘赴京師二年八月詔二廣湖南北江東西路綱運赴江寧府福建兩浙路赴平江府京畿淮南京東西河北陜西路及川綱並赴行在又詔二廣湖南北綱運如經由兩浙亦許赴平江府送納福建綱運經由江東西亦許赴江寧府送納三年閏八月又詔諸路綱運除見錢并糧斛赴建康府户部送納外其金銀絹帛並赴行在所紹興初因地之宜以兩浙粟專供行在以江東之粟餉淮東以江西之粟餉淮西荆湖之粟餉岳鄂荆南量所用之數責漕臣將輸而歸其餘行在錢帛亦然惟水運有舟楫之勞陸運有夫丁之擾雇舟差夫不勝其弊民間有自毁其舟楫不願藏舟自廢其田而不願有田王事鞅掌人胥病之於是申水脚糜費七分錢三分錢法嚴卸綱無欠復拘留人船之戒慮擄船之為民害也既優價雇募客舟矣又許將一分力勝撘帶私物捐其稅及於兩浙江東西四川瀘叙嘉黔間自造官舟又揆道里之逺近灘磧之險阻置轉般倉修堰閘開浚河道以便漕運紹興四年川陜宣撫吳玠調兩川夫運米十五萬斛至利州率四十餘千致一斛饑病相仍道死者衆漕臣趙開聽民以粟輸内郡募舟輓之人以為便然嘉陵江險灘磧相望夏苦漲流冬阻淺澁終嵗之運殆莫能給玠再欲陸運帥臣邵溥争之且言宣司已取蜀民運脚錢百五十萬其忍復使之陸運乎乃卒行水運總所委官就糴於沿流復就興利閬州置塲聽客人中賣又减成都水運對糴米免四川及京西路諸州租以寛之綱運之官其責繁難人以為憚故自紹興以来優立賞格其有少欠許糴填補足其綱欠及一分才送有司䆒弊後来獻說者止欲從窄減作五釐且以百石論之五釐止五斗耳使之全無侵蠧當風揚擲亦不免五釐之少則舉無納足之綱於是户部言乞將少欠五釐以上一分以下之人立限二十日糴填孝宗淳熙元年詔不以所欠多少並與放除其綱米赴倉卸納以陳易新不得就舟支遣其折帛錢綱在路違法借貸重其罰或借貸官錢收買物貨無償許估賣出豁其金銀錢帛色額低次虧損官錢者行下元買納塲吏人名下追理不得均攤民户其有因綱運欠折追降官資者如本非侵盗且補納已足許保明叙復吳氏能改齋漫錄曰本朝東南嵗漕米六百萬石而江西居三分之一蓋天下漕米多取於東南而東南之米多取於江西也東莱吕氏曰古者天子中千里而為都公侯中百里而為都天子之都漕運東西南北所貢入者不過五百里諸侯之都漕運所貢入者不過五十里所以三代之前漕運之法不備雖如禹貢所載入於渭亂於河之𩔖所載者不過是朝廷之路所輸者不過幣帛九貢之法所以三代之時漕運之法未甚講論正緣未是事大體重到春秋之末戰國之初諸侯交相侵伐爭事攻戰是時稍稍講論漕運然所論者尚只是行運之漕至於國都之漕亦未甚論且如管子所論粟行三百里則無一年之積粟行四百里則無二年之積粟行五百里則衆有饑色如孫武所謂千里饋糧士有饑色皆是出征轉輸至其所以輸國都不出五百里五十里國都所在各有分故當時亦尚未講論惟是後来秦併諸侯罷五等置郡然後漕運之法自此方詳秦運天下之粟輸之北河是時葢有三十鍾致一石者地里之逺運粟之多故講論之詳方自此始後来歴代最盛無如漢唐在漢初髙后文景時中都所用者省嵗計不過數十萬石而足是時漕運之法亦未講到得武帝官多徒役衆在關中之粟四百萬猶不足給之所以鄭當時開漕渠六輔渠之𩔖葢緣當時用粟之多漕法不得不講然當漢之漕在武帝時諸侯王尚未盡輸天下之粟至武宣以後諸侯王削弱方盡輸天下之粟漢之東南漕運至此始詳當髙帝之初天子之州郡與諸侯封疆相間雜諸侯各據其利粟不及於天子是時所謂淮南東道皆天子奉地如賈生說是漢初如此至漢武帝時亦大槩有名而無實其發運粟入關當時尚未論江淮到得唐時方論江淮何故漢㑹稽之地去中國封疆遼逺開墾者多粟不入京師以京師之粟尚不自全何况諸侯自封殖且如吳王濞作亂枚乗之說言京都之倉不如吳之富以此知當時殖利自豐不是運江淮之粟到唐時全倚辦江淮之粟唐太宗以前府兵之制未壊有征行便出兵兵不征行各自歸散於田野未盡仰給大農所以唐髙祖太宗運粟於關中不過十萬後来明皇府兵之法漸壊兵漸多所以漕粟自此多且唐睿宗眀皇以後府兵之法已壊是故用粟乃多向前府兵之法未壊所用粟不多唐漕運時李傑裴耀卿之徒未甚講論到二子講論自是府兵之法既壊用粟既多不得不講論且如漢漕係鄭當時之議都不曾見於髙惠文景之世唐之李傑裴耀卿之議都不曾見於髙祖太宗之世但只見於中睿明皇之時正縁漢武官多役衆唐中睿以後府兵之法壊聚兵既多所以漕運不得不詳大抵這兩事常相為消長兵與漕運常相關所謂宗廟祀饗之類十分不費一分所費廣者全在用兵所謂漕運全視兵多少且唐肅宗代宗之後如河北諸鎮皆强租賦不領於度支當時有如吐蕃回紇為亂所用猶多振武天德之間嵗遣兩河諸鎮所以全倚辦江淮之粟議論漕運其大畧自江入淮自淮入汴自洛入河自河入渭各自征輸水次各自置倉如集津倉洛口倉含嘉倉河隂倉渭橋轉相般運道途之逺此法遂壊自當時劉晏再整頓運漕之法江淮之道各自置船淮船不入汴汴船不入河河船不入渭水之曲折各自便習其操舟者所以無傾覆之患國計於是足所以唐人議論之多惟江淮為最急德宗時縁江淮米不至六軍之士脫巾呼於道韓滉運嵗米至德宗太子置酒相慶可見唐人倚辦於此如此其急唐時漕運大率三節江淮是一節河南是一節陜西到長安是一節所以當時漕運之臣所謂無如此三節最重者京口初京口濟江淮之粟所㑹於京口京口是諸郡咽喉處初時潤州江淮之粟至於京口到得中間河南陜西互相轉輸然而三處惟是江淮最切何故皆自江淮發足所以韓滉由漕運致位宰相李錡因漕運飛揚䟦扈以至作亂以此三節惟是京口最重所謂漢漕一時所運臨時制宜不足深論到得宋朝定都於汴是時漕運之法分為四路東南之粟自淮入汴至京師若是陜西之粟便自三門白波轉黄河入汴至京師若是陳蔡一路粟自惠民河至京師京東粟自廣濟河至京師四方之粟有四路四條河至京師當時最重者惟是汴河最重何故河西之粟江無阻及入汴大計皆在汴其次北方之粟自三門白波入關自河入汴入京師雖惠民廣濟来處不多其勢也輕本朝置發漕兩處最重者是江淮至真州陸路轉輸之勞其次北之粟底柱之門舟楫之利若其他置發運如惠民河廣濟河雖嘗立官然不如兩處之重此宋朝之大畧如此然而宋朝所謂嵗漕六百萬石所專倚辦江淮其所謂三門白波之𩔖非大農仰給之所惟是江淮最重在祖宗時陸路之粟至真州入轉般倉自真方入船即下貯發運司入汴方至京師諸州回船却自真州請鹽散於諸州諸州雖有費亦有鹽以償之此是宋朝良法凡以江淮往来遲速必視風勢本朝發運使相風旗有官專主管相風旗合則無罪如不合便是姦弊夫船之遲速何故以風為旗盖縁風動四方萬里只是一等所以使得相風旗真州便是唐時揚子江後来本朝改號曰真州運法未壞諸州船只到真州請鹽回其次入汴入京師後来發運嵗造船謂之發運官船與諸州載米發運申明汴船不出江諸州又自造船雖有此約束諸州船終不應付因此漕法漸壊惟發綱發運未罷及蔡京為相不學無術不能明考祖宗立法深意遂廢改鹽法置直達江無水處不如此是時姦吏多雖有運漕之官不過催督起發其官亦有名而無實大抵用官船逐處漕運時便都無姦計若用直達江經渉嵗月長逺故得為姦所費甚多東南入京之粟亦少故太倉之粟少似東南蓄積發運有名無實此召亂之道也本朝漕運之法壊自蔡京東京發運本原大畧如此文獻通考卷二十五
