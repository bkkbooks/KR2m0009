body:
  text: 文獻通考卷三百十五鄱陽馬端臨貴與著輿地考一總叙黄帝方制天下立為萬國易稱首出庶物萬國咸寧少皥氏之衰其後制度無聞顓帝之所建帝嚳受之創制九州統領萬國雍荆豫梁冀青徐兖揚北至於幽陵幽州南至於交趾交州西至於流沙在張掖居延縣東至於蟠木東海中山也日月所照莫不砥屬砥平也四逺皆平而來服屬唐堯遭洪水而天下分絶使禹平水土還為九州如舊制五百里甸服五百里侯服五百里綏服五百里荒服詳及註並見封建考東漸於海西被於流沙朔南暨聲教訖於四海蔡氏五服説見封建考虞舜攝帝位分為十二州雍荆豫梁冀幽并青營徐兖揚故虞書云肇十有二州是也夏氏革命又為九州塗山之會亦云萬國四百年間逓相兼并商湯受命其能存者三千餘國亦為九州分統天下載祀六百周初尚有千八百國而分天下為九畿方千里曰王畿其外曰侯畿亦曰服又外曰甸畿又外曰男畿又外曰采畿又外曰衞畿又外曰蠻畿又外曰夷畿要服也又外曰鎮畿又外曰藩畿荒服也詳及註並見封建考至成王時亦曰九州屬職方氏揚荆豫青兖雍幽冀并其後諸侯相并有千二百國及平王東遷迄獲麟之末二百四十二年間諸侯征伐更相吞滅不可勝數而見於春秋經傳者百有七十國焉百三十九國知土地所在三十一國不知其處也蠻夷戎狄不在其數逮乎下分地里上配天象所定躔次總標十二及周之末唯有七國秦昭王時西周盡獻其地邑三十六口三萬受獻而歸其人至莊襄王滅東西周國七城而已唐氏周九服唐五服異同説見封建考秦制天下為四十郡其地則西臨洮而北沙漠東縈南帶皆臨大海漢興以秦地太大加置郡國其後開越攘胡土宇彌廣改雍曰凉梁曰益又置徐州復禹之舊號南置交趾初為交趾後為交州北有朔方初為朔方後為并州凡為十三州部刺史司𨽻并荆豫揚冀幽兖徐益青交凉而不常理至哀平之際凡新置郡國六十三與秦四十合百三縣邑千三百十四道三十二侯國二百四十一地東西九千三百二里南北萬三千三百六十八里此漢之極盛也後漢光武以官多役煩乃併省郡國十縣道侯四百餘所其後亦為十三州部司𨽻治河南今河南府豫治譙今酇縣兗治昌邑今魯郡金鄉縣徐治郯郯音談今臨淮郡下邳縣青治臨淄今北海郡縣涼治隴今天水郡隴城縣并治晉陽今太原府冀治鄗許各反今趙郡高邑縣幽治薊今范陽郡揚治歴陽今郡縣益治雒今永昌郡荆治漢夀今武陵郡武陵縣交治廣信今蒼梧郡蒼梧縣漸復加置郡國至於靈獻凡百有五焉縣道侯國千一百八十桓帝永興初有鄉三千六百八十二亭萬二千四百二十東樂浪郡西燉煌郡南日南郡北鴈門郡西南永昌郡四履之盛亦如前漢魏氏據中原有州十三司𨽻荆豫兖青徐涼秦冀幽并揚雍分涼州置秦州治上邽今天水郡揚治夀春今郡徐治彭城今郡荆治襄陽今郡涼治武威今郡餘並依前式有郡國六十八東自廣陵文帝黄初六年親征幸廣陵故城及旋師留張遼屯江都齊王嘉平後屬吳即今郡夀春毌邱儉諸葛誕皆鎮之合肥明帝青龍元年滿寵於合肥西北三十里築新城吳軍頻攻不拔即今廬江郡故魏明帝云先帝東置合肥南守襄陽西固祁山賊來輙破於三城之下者地有所必争是也沔口建安十五年文聘為江夏太守鎮焉其後吳軍頻攻不拔青龍後屬吳即今漢陽郡西陽黄初中令滿寵將守之今齊安郡襄陽建安二十四年徐晃守之蜀將闗羽攻不下重兵以備吳江淮之間除鎮兵處更無人居青龍之中孫權遣數千家佃於江北為滿寵破也西自隴西今郡是南安今隴西郡隴西縣齊王嘉平五年蜀將姜維來伐攻隴西南安皆不尅祁山明帝太和二年蜀將諸葛亮攻祁山城不拔今同谷郡長道縣東十里漢陽明帝青龍三年蜀將諸葛亮來伐遣兵備於此即今天水郡陳倉建安二十四年因蜀將破夏侯妙才於漢中遂令張郃守陳倉太和二年諸葛亮以數萬人攻陳倉將軍郝昭以千人守二十餘日不拔在今縣東二十里故城是攻郿不尅在今縣東北十五里故郿城是並今扶風郡重兵以備蜀蜀主全制巴蜀置益治成都今郡梁治漢中今郡二州有郡二十二以漢中建安末破魏將夏侯妙才後遂有漢川以魏延鎮守後蔣琬姜維相繼鎮於此即今郡地興勢後主延熙七年將軍王平守之魏大將軍曹爽攻不尅今洋川郡興道縣也白帝先主章武元年屯之遂為重鎮後主建興十五年吳將全琮來攻不尅即今雲安郡並為重鎮吳主北據江南盡海置交治龍編今安南府廣孫權置治番禺今南海郡荆治南郡今江陵郡郢治江夏即今郡揚治建業今丹陽郡江寧縣五州有郡四十有三以建平自孫權黄武初破蜀先主後得之孫皓天紀四年晉軍沿流來伐守將吳彥請増兵皓不從今巴東郡西陵建安二十四年蜀將關羽北討魏將于禁等於襄陽陸遜為宜都守鎮此黄武初蜀先主來遜大破之後歩闡陸抗並鎮焉即今夷陵郡是也樂鄉吳孫皓建衡三年陸抗所築樂鄉城後朱然修之戌焉晉王濬攻樂鄉獲水軍督陸景平西將軍施洪以城降在今江陵郡松滋縣東南郡自建安末尅闗羽後蜀將糜芳來降遂得之孫皓鳯皇元年將張咸任延並守之晉軍平吳當陽侯杜元凱趨於此即今江陵郡巴邱建安十九年魯肅孫皓寳鼎元年萬或並鎮守即今巴陵郡夏口建安十三年孫權征黄祖尅之後遂置兵鎮孫皓天紀元年孫慎守之及晉平吳將軍胡奮趨於此即今江夏郡武昌孫權甘露元年城武昌陸遜諸葛恪鎮守及晉平吳將軍王戎趨於此即今江夏郡是皖城建安十九年孫權尅之赤烏四年諸葛恪屯此今同安郡皖音患牛渚圻孫皓天紀末何植鎮守晉平吳大將王渾趨於此即今宣城郡當塗縣采石也濡須塢建安十七年築後曺公頻來攻不尅在今歴陽縣西南百八十里並為重鎮其後得沔口孫權嘉禾後陸遜諸葛瑾屯守邾城赤烏四年陸遜常以三萬兵戍之今齊安郡東西界臨江與江夏郡武昌相對廣陵孫亮建興三年衞尉馮朝城廣陵自三國鼎立更相侵伐互有勝負疆境之守彼此不常纔得遽失則不暇存也今略紀其久經屯鎮及要害之地焉其守將亦畧紀其知名者餘不可徧舉他亦類此晉武帝太康元年平吳分為十九州部置司州治洛陽今河南府兖治廩邱今濮陽郡雷澤縣是豫治項今淮陽郡項城是冀治房子今趙郡是并治晉陽青治臨淄徐治彭城荆初治襄陽後治江陵今郡揚初治夀春後治建業涼治武威分三輔為雍治京兆今府分隴山之西為秦治上邽今天水郡縣益治成都分巴漢之地為梁治南鄭今漢中郡縣分雲南為寧治雲南今郡幽治涿今范陽郡范陽縣分遼東為平治昌黎今安東府交治龍編今安南府分合浦之北為廣治番禺又増置郡國二十有二凡州百五十有六縣千一百有九以為冠帶之國盡秦漢之土及永嘉南渡境宇殊狹九州之地有其二焉初元帝命祖逖鎮雍邱建武初逖北伐便屯雍邱今陳留郡縣逖死北境漸蹙大興四年逖死於是荆豫自淮北今汝南汝隂南陽等郡以北青兖四州今東萊東牟髙密北海淄川濟南等郡地及徐州之半今彭城瑯琊等郡䧟劉曜石勒以合肥戴若思鎮守之淮隂劉隗鎮守即今山陽郡縣夀陽祖約鎮守後又陷於石勒季龍死後復之即今夀春郡也泗口劉遐鎮守即今臨淮縣宿遷縣角城安帝義熙中置亦在宿遷縣界為重鎮成帝時酇守將退屯襄陽咸和初魏諺屯酇為劉曜將黄秀所逼而退守襄陽後亦陷石勒尋復之庾翼朱序皆鎮於此又為苻堅將苻丕所陷尋復之即今郡穆帝時平蜀漢永和三年桓溫西討擒李勢復梁益之地梁州則漢川益則蜀川是又遣軍西入關至㶚上十年桓溫討苻健於今京兆府萬年縣白鹿原戰敗再北伐一至洛陽永和十二年溫討慕容儁破其將姚襄於伊水時襄已降一至枋頭廢帝太和三年溫又討慕容暐敗還今汲郡衞縣界枋音方所得郡縣軍旋又失洎苻堅東平慕容暐太和五年西南陷蜀漢西北尅姑臧孝武太和五年張天錫今武威郡是則漢水長淮以北悉為堅有及堅敗太和八年再復梁九年將郭寳平梁州益蜀郡太守任權斬苻堅益州刺史李平益州平青徐兖豫司之地其後青兖陷於慕容德安帝隆安三年德據之殺幽州刺史辟閭渾時鎮廣固即今北海郡豫司陷於姚興隆安三年以彭城為北境藩扞朱序鎮守後益梁陷於譙縱義熙初陷每因劉石苻姚衰亂之際則進兵屯戍在於漢中襄陽彭城然大抵上明今江陵郡松滋縣江陵夏口武昌合肥夀陽淮隂常為晉氏鎮守其刺史所治皆置州兵雖有不經攻圍互是重鎮他皆類此義熙以後又復青兖司豫梁益之地而政移於宋矣宋武北平廣固晉安帝義熙六年平慕容超得青州之地廣固即今北海西定梁益九年朱齡石平譙縱又尅長安十三年親征平姚泓盡得河南之地長安尋為赫連勃勃所陷至廢帝滎陽王景平中武牢以西復陷後魏今大較以孝武大明為正凡二十有二州揚治建業南徐治京口今丹陽郡丹徒縣徐治彭城南兖治廣陵兖治瑕今魯郡縣南豫治歴陽豫治汝南今汝南郡汝南縣江治潯陽今郡縣青治臨淄初治歴城今濟南郡縣後治廣固後又移治臨淄即今縣是冀治歴城司治義陽今郡荆治南郡郢治江夏今郡湘治臨湘今長沙郡雍治襄陽今郡梁治南鄭秦亦治南鄭益治成都今蜀郡寧治建寧今雲南郡廣治南海交治龍編越治臨鄣今合浦郡自東晉成帝中原流民多南渡遂於江漢淮之間僑立州郡以撫其民中間併省廢置離合非一不能詳誌焉紀其所治經久者他皆類此郡凡二百三十有八縣千一百七十有九初文帝元嘉中遣將北伐水軍入河尅魏碻磝滑臺武牢洛陽四城碻磝即今濟陽郡城滑臺今靈昌郡城武牢今氾水縣洛陽今故洛陽城碻音口交反磝音敖其後又失又分軍北伐西軍尅𢎞農開方二城並今𢎞農郡以東攻滑臺不尅而平碻磝守之尋皆敗退元嘉二十七年王元謨於滑臺敗歸時栁元景拔𢎞農開方及元謨敗亦棄而歸於是後魏主太武總師經彭城臨江屯於𤓰歩今廣陵郡六合縣東退攻盱眙不拔而旋臧質守之魏師攻圍三旬不下今淮陽郡縣明帝時後魏又南侵淮北青冀徐兖四州及豫州西境悉陷没太始二年徐州刺史薛安都引魏軍自是沈文秀東陽城崔道固歴城並為魏將慕容白曜所陷安都以彭城常珍竒以懸瓠並降魏懸瓠今汝南郡城則長淮為北境僑徐兖於淮南淮隂立兖州鍾離立徐州立青冀二州寄治贛榆今東海郡東海縣贛古淡反其後十年餘而宋亡然初强盛也南鄭襄陽懸瓠元嘉二十六年後魏主太武率十兵攻圍汝南太守陳憲等距四餘日魏人積屍與城齊不拔而退彭城歴城東陽南廢帝景平初筑䕫鎮守後魏攻圍數旬不尅即今北海郡治東城皆為宋藩扞齊氏淮北之地所以全少青州治朐山今東海郡朐音衢冀治渦口今臨淮郡漣水縣豫治夀春豫州自東晉以後或治淮南或治淮北不常其所今舉其要害之地北兖治淮隂北徐治鍾離又置巴東治巴今雲安郡其餘州郡悉因宋代州二十有三郡三百九十有五縣千四百七十有四其後頻為後魏所侵至東昏永元初沔北諸郡相繼敗没今南陽郡地又遣軍北伐敗於馬圈退屯盆城魏馬圈城去襄陽三百里時陳顯逹攻圍四十餘日不拔魏援師至敗還在今襄陽郡界又失夀春永元二年豫州刺史裴叔業以城反入魏後三年齊亡齊氏七主凡二十四年内難繁興不遑外畧及東昏暴虐北境彌蹙也始全盛也南鄭明帝建武二年後魏大將元英來伐梁州刺史蕭懿守拒攻圍百餘日不下樊城今襄陽郡安養縣建武中後魏主孝文率兵十萬數旬攻圍將曹武拒不下襄陽義陽夀春髙帝又建鎮謂垣崇祖曰兵衝要地切備魏師俄而魏將王肅以師二十萬至敗而歸淮陽角城明帝初後魏南侵以李安民戌之漣口朐山為重鎮梁氏州郡多沿舊制天監中州二十有三郡三百五十縣千二十有五其後更有析置大同中州百有七郡縣亦稱於此自侯景逆亂建康傾陷墳籍散逸不可得而詳焉初武帝受禪數年即失漢川及淮西之地天監三年梁州刺史夏侯道遷以本部叛降後魏自劒閣以北並陷沒又魏將元英破將軍馬仙琕於義陽失地其後諸將頻年與魏軍交戰於淮南淮北互有勝負自天監四年以後將張惠紹尅魏宿遷城韋叡尅合肥裴邃尅翟邱城朐山城皆敗唯合肥獨存雖得懸瓠彭城俄而又失天監六年魏軍主白皁生豫州刺史胡遜以懸瓠普通六年徐州刺史元法興以彭城並内屬無何悉復於魏又尅夀春普通七年將夏侯亶元植等尅之獲魏揚州刺史李憲自齊東昏永元二年陷後魏至是凡二十七年南朝始復大通初大舉北伐城鎮相次尅平直至洛陽蹔為梁有大通元年魏將爾朱榮害胡太后及少主魏朝大亂遣將陳慶之率軍送元顥為魏主入河陽六旬五日爾朱榮來攻慶之渡河守北中府城數日顥敗慶之亦奔退所得之地尋亦失之中府地即今河陽北城是其後又復漢中大同中將蘭欽尅之自天監二年失漢川凡經四十三年却復至東魏將侯景以河南地降逆亂相尋有名無實及景平後江北之地悉陷髙齊漢川蜀川沒於西魏太清初侯景以十三州來降旋為東魏將慕容紹宗所敗二年景舉兵反圍建康陷之及景平後元帝承聖初齊將辛術南伐盡復淮南江北之地得傳國璽反於齊三年西魏將逹奚武陷漢川尉遲逈陷蜀川其漢川經九年復失大抵雍州今襄州下溠音槎戍漢東郡棗陽縣東南夏口白茍堆大同中東魏静帝遣將堯䧺為南境守將䧺曰白茍堆梁之北面重鎮請備之在今汝南郡真陽縣硤石城今汝隂郡下蔡縣合州即合肥鍾離將康絢鎮守之淮隂朐山為重鎮天監三年角城戌主柴慶宗以角城十一年東莞太守劉晰以朐山並降入魏陳氏比於梁代土宇彌蹙西不得蜀漢北失淮肥以長江為境文帝天嘉初湘川之地為周軍所陷二年侯瑱尅平之湘川今澧陽武陵長沙衡陽等郡之地也有州四十有二地轉狹而州益多暨後周郡又數倍多於前代故不可詳郡百有九縣四百三十有八宣帝太建中頻年北伐諸將累㨗盡復淮南之地將吳明徹於夀春城斬高齊將王琳更經畧淮北大破齊軍於吕梁及旋師屬髙齊亡國又總軍北伐至吕梁周軍來拒又大破之自太建五年北伐七年破齊軍九年又破周將梁士彦悉得梁淮北城鎮下邳朐山旋為周軍所敗悉虜其衆時梁士彦守彭城明徹來攻未下十年周將王軌來伐明徹退師全軍沒於清口自是江北之地盡沒於周又以長江為界十二年周大將司馬消難以淮西地來降又遣將周羅㬋攻尅新野尋並失之及隋軍來伐遣將守狼尾灘後主禎明三年戚昕守之今夷陵郡宜都縣界荆門將仲肅據之亦宜都界安蜀城將顧覺鎮之亦夷陵郡公安將陳紀鎮之今江陵郡縣巴陵以下並風靡退散信州道大總管清河公楊素自峽中舟師東下東方守將相繼而破信州即今雲安郡也隋軍自采石隋將韓擒虎襲陷之京口賀若弼襲陷之渡江而平之後魏起自北方至道武率兵下山東攻拔慕容寳中山今博陵郡唐昌縣遂有河北之地於是遷都平城今雲中郡慕容氏喪敗遣將南略地至於滑臺許昌今潁川郡彭城明元帝太常中始於滑臺許昌置兵鎮守道武天興中長孫肥等尅滑臺許昌尋不能守至是始有之太武帝時又得蒲坂今河東郡長安統萬始光中遣軍伐赫連昌尅蒲坂及長安又尅統萬後遂滅赫連統萬即赫連所都今朔方郡是神䴥中宋師來伐碻磝今濟陽郡城滑臺武牢今河南府汜水縣是戍將皆不守尋並復之神䴥三年宋將到彦之王仲德等陷滑臺武牢洛陽遣安頡叔孫建等擊敗走之太延以後東平遼東西平姑臧三年東伐馮氏五年西伐沮渠並滅之於是西至流沙東接髙麗所未得者漢中及南陽懸瓠彭城青州之南而已其後帝自南征遂臨𤓰歩宋淮北城鎮守將多有敗沒太平真君十一年因宋將王元謨來侵尅碻磝城戌將濟州刺史王買德棄城而走宋師至滑臺敗帝乘勝至江上獻文天安初自河之南長淮之北皆為魏有時因宋晉安王子勛之亂遣將慕容白曜畧地破宋將沈文秀畢衆欽薛安都崔道固常珍竒遂有其地孝文遷都洛陽太和十九年徙都頻嵗親征皆渡淮沔二十年屯八公山三十年屯新野及樊城宣武初又得夀春景明初齊將裴叔業以夀春來降後至明帝孝昌二年又陷入梁續収漢川至於劒閣兼得淮西之地正始初梁將夏侯道遷以漢中降又元英破梁將馬仙琕於義陽遂有其地莊帝時梁軍洛陽數旬敗走永安初因爾朱榮害胡太后少帝之亂梁將陳慶之送元顥為魏主爾後内難相繼不暇外畧三四年後分為東西魏矣皆權臣擅命具周齊事中自永安末年爾朱世隆稱兵入洛圖籍散亡不可詳記今按舊史云管州百十有一郡五百十有九縣千三百五十有二按魏収史所載州郡是東魏静帝武定中其時洛陽以西及關中梁益之地悉屬西魏収猶總而編之自太武以後漸更强盛東征西伐尅定中原屬宋明以後及於齊梁國土漸蹙自守不暇雖時有侵掠而退不旋踵故魏之城鎮少被攻圍因利進取不常所守也北齊神武東魏天平末大舉西伐至蒲津静帝天平四年三道伐西魏齊神武自總大衆至蒲津竇泰自風陵濟河至潼關髙敖曹入武闗陷上洛以泰軍敗沒並旋師風陵在潼關北岸相對西魏乘勝攻陷陜州周文帝率李弼等東征下陜州擒刺史李祥伯即今陜郡神武西至沙苑其年冬大敗而歸今馮翊郡界西軍又乘勝襲陷洛陽西魏將獨孤如願據金墉明年西師又至於河隂今洛陽縣北時拒守河陽城潘相樂守北城即據此高永樂守南城即今城後周文帝親征不尅西師敗歸大象元年周文帝親征敗還如願亦棄金墉遁走神武遂毁其城其後神武攻圍西魏玉壁不尅興元四年西魏將王思政守之今絳郡稷山縣西師來伐至於邙山武定初周文帝親征神武禦之敗殺周將王䧺後神武又圍玉壁不尅武定四年西魏將韋孝寛守之文襄遣將圍潁川拔之自武定五年冬攻圍至明年六月城陷於是河南自洛陽之西河北自晉州之西今平陽郡悉入西魏文宣之世命將略地南際於江矣天保二年屬侯景亂梁遣辛術南討遂得傳國璽又過江得梁夏口後二國通和旋師矣武成河清中築戍於軹關河清二年遣斛律光築之今河南府濟源界其年周軍至洛陽敗還晉公䕶統軍將楊標等至軹關敗走後主武平中陳軍來侵盡失淮南之地武平五年以後陳將吳明徹頻嵗來侵淮南城鎮皆不守諸將累敗周師攻㧞河隂大城周武親征有疾班師幼主崇化末西師攻拔晉州今平陽縣因之國滅齊都於鄴即今郡縣自東魏之後天下三分梁陳有江東宇文有關西髙氏據河北有州九十有七郡百六十縣三百六十有五文宣天寳七年已併省州三郡百五十三縣五百八十九鎮二戌二十六當齊神武之時與周文帝抗敵十三四年間凡四出師大舉西伐周師東討者三焉畧舉齊神武周文帝統師親征諸將攻戰則不絶紀自文宣之後纔守境而已大抵西則姚襄城今文城郡西城姚襄所築西臨黄河控帶龍門之險周齊交争之地後主武平二年大將斛律光破周兵於城遂立鎮焉洪洞今平陽郡縣北故城控據惡險崇化末周師既尅晉州其城主張元静以城降周晉州武平關三關並今絳郡正平縣界栢崖城侯景所築今河清縣西軹關河陽南則武牢陸子章增築城守洛陽北荆州今陸津縣東北故城是孔城防今伊闕縣東南故城是汝南郡今臨汝郡梁縣南魯城今汝南郡魯山縣東北置兵以防周寇自洛陽之南襄城汝隂汝南以北皆齊有及陳師侵軼數嵗齊亡南境要害未遑制置也周文帝西魏大統中東魏師至蒲津文帝大統二年齊神武親征至蒲津以竇泰死退軍文帝東征尅陜州兼得宜陽郡邵郡邵郡今絳郡垣縣宜陽郡今福昌縣東師又至沙苑其年冬齊神武親征大敗走後文帝東征至河隂先勝後敗大統四年殺魏將髙敖曹也築城於玉壁大統八年將王思政築之齊神武攻圍不尅至十二年韋孝寛守之齊神武又攻圍六旬不尅文帝又至邙山先勝後敗大統九年得梁雍州十六年梁雍州刺史岳陽王詧舉州内附廢帝初尅平漢中梁侯景逆亂遣達奚武尅之又遣軍平蜀將尉遲逈尅之文帝西征至姑臧後又平江陵齊王廓後元初于謹平之殺梁元帝自是疆理西有姑臧西南有全蜀南至於江矣明帝武成二年將賀若敦尅陳湘川之地三年失之今澧陽武陵長沙衡陽等地是其河南自洛陽之東之北河東自平陽之界屬於髙齊至武帝建德中東征拔齊晉州城尋又東征破齊師於晉州城下建德五年攻拔晉州使梁士彦守之齊後主來攻三旬餘不拔六年又破齊後主軍乘勝平齊後遣軍破陳軍於吕梁將王軌破陳將吳明徹悉虜其衆也其東南之境盡於長沙通計州二百十有一郡五百八縣千二十有四當全盛戰争之際則玉壁初王思政守後韋孝寛守東軍攻不拔遂置勲州邵郡齊子領今王屋縣東二十里周齊分界處通洛防故函關城武帝保定中改名在今新安縣東黄櫨三城今永寧縣西北宜陽郡陜州土剗今長水郡西北二十五里三荆將獨孤信畧定北荆州今即伊陽縣東荆州後改名淮州今淮安郡荆州今南陽郡三鴉鎮今汝州魯山縣西南名平髙城置兵以備東軍隋文帝開皇三年遷都大興城即今城遂廢諸郡以州治民自三代以前為九州兩漢加置十三州晉宋之後析漸多至於魏齊後周雖割據鼎立天下分裂其於州郡乃倍兩漢之地隋氏以官繁民弊遂廢五百餘郡而以州治民名則因循職事同於郡守無復刺舉之任自九載廓定江表尋以户口滋多析置州縣煬帝大業初移洛陽城即今之城征林邑更置三州既而併省諸州三年改州為郡乃置司𨽻刺史分部廵察本史不分别所領諸郡五年平定吐谷渾更置四郡大凡郡百九十縣千二百五十五東西九千三百里南北萬四千八百一十五里東南皆至於海西至且末隋氏西境惟得今燉煌郡以東且子余反北至五原即今九原郡按隋氏北境唯至於河隋氏之盛極於此矣唐武德初改郡為州太守為刺史其邊鎮及襟帶之地置總管府以領軍戎至七年改總管府為都督府自因隋季分割州府倍多前代貞觀初并省州縣始於山河形便分為十道一曰關内道二曰河南道三曰河東道四曰河北道五曰山南道六曰隴右道七曰淮南道八曰江南道九曰劒南道十曰嶺南道既北殄突厥頡利西平髙昌東西九千五百十里南北萬六千九百十八里髙宗平髙麗百濟得海東數千餘里旋為新羅靺鞨所侵失之又開四鎮即西境拓數千里于闐疎勒龜茲焉耆諸國矣景雲二年又分置二十四都督府分統諸州時議以權重不便尋罷之開元二十一年分為十五道置採訪使以檢察非法京畿治西京城内都畿治東都關内多以京官遥領河南治陳留郡河東治河東郡河北治魏郡隴右治西平郡山南東治襄陽郡山南西治漢中郡劒南治蜀郡淮南治廣陵郡江南東治吳郡江南西治豫章郡黔中治黔中郡嶺南治南海郡又於邊境置節度經畧使式遏四夷節度使十經畧守捉使三大凡鎮兵四十九萬人戎馬八萬餘匹每嵗經費衣賜則千二十萬匹段軍倉則百九十萬石大凡千二百十萬開元天寳毎嵗邊用不過二百萬其地東至安東都護府西至安西都護府南至日南郡北至單于都護府南北如前漢之盛東則不及西則過之漢之東境有樂浪郡西境有燉煌郡今東極安東府則漢遼東郡也其漢之元莵樂浪二郡並在遼東郡之東今悉為東夷之地矣今西極安西府其伊吾交河北庭安西則漢代戎胡所據皆未得而詳天寳初又改州為郡刺史為太守大凡郡府三百二十有八縣千五百七十有三羈縻州郡不在數中其後范陽盗起中國用兵而河西隴右不守陷於吐蕃至大中咸通始復隴右乾符以後天下大亂至於唐亡梁初天下别為十一南有吳浙荆湖閩漢西有岐蜀北有燕晉而朱氏所有七十八州以為梁莊宗初起并代取幽滄有州三十五其後又取梁魏博等十有六州合五十一州以滅梁岐王稱臣又得其州七同光破蜀己而復失惟得秦鳳階成四州而營平二州陷於契丹其增置之州一合一百二十三州以為唐石氏入立獻十有六州於契丹而得蜀金州又增置之州一合百九州以為晉劉氏之初秦鳳階成復入於蜀隐帝時增置之州一合一百六州以為漢郭氏十州入於劉旻世宗取秦鳳階成瀛莫及淮南十四州又增置之州五而廢者三合一百十八州以為周宋因之此中國之大畧也其餘外屬者彊弱相并不常其得失至於周末閩己先亡而在者七國自江以南二十一州為南唐自劒以南及山南西道四十六州為蜀自湖南北十州為楚自浙東西十三州為吳越自嶺南北四十七州為南漢自太原以北十州為東漢而荆峽三州為南平合中國所有二百六十八州而軍不在焉宋太祖皇帝受周禪凡州府軍監一百三十九縣六百六十一户九十六萬七千三百五十三建隆四年荆南髙繼冲來朝得州府三江陵府歸峽縣一十七户一十四萬二千三百是年平湖南得州一十五監一潭衡邵郴道永全岳澧朗溥辰錦溪叙桂陽監縣六十六户九萬七千三百八十八乾德三年平蜀得州府四十六益彭郿嘉卭蜀綿漢資簡梓遂黎雅陵戎瀘維茂昌榮果閬渠合龍普利興文巴劒蓬壁䕫忠萬集開渝涪黔施達洋興元府縣二百四十户五十三萬四千二十九開寳四年平廣南得州六十廣韶潮循封端英連䧺㳟恵康恩春龍勤新髙潘雷羅辨桂賀昭梧蒙龔象富融宜栁嚴思唐邕澄貴蠻横賔欽潯容牢白亷黨綉鬰林滕竇義禺順瓊崖儋萬安振縣二百一十四户一十七萬二百六十三八年平江南得州一十九軍三昇宣歙池洪潤常鄂筠饒信䖍吉袁撫江汀建劒江隂䧺逺建昌軍縣一百八户六十五萬五千六十五太宗太平興國二年八月盡罷天下節鎮所領支郡唐及五代節鎮皆有支郡國初平湖南始令潭朗數郡直屬京長吏得自奏事乾德元年以隴州義州直屬京二年又以階成乾三州屬京其後大縣屯兵亦有直屬京者興元府三泉縣是也五年又析慶州商州開寳二年又析歸峽四年又析澤州通逺軍並屬京以邠寧原渭鄜坊延丹陜虢襄均房復鄧唐澶濮宋亳鄆齊滄德曹單青淄兖沂貝冀滑衞鎮深趙定祁等十八鎮所領郡皆直屬京天下藩鎮除羈縻州無復領支郡矣三年陳洪進獻其地得州二漳泉縣十四户一十五萬一千九百七十八是年錢俶亦獻其所管得州一十三軍一杭蘇越湖衢婺台明溫秀處睦福衣錦軍縣八十六户五十五萬六百八十四四年平太原得州十軍一并汾嵐憲忻代遼沁隆石州寳興軍縣四十一户三萬五千二百二十七是年李繼捧來朝得州四縣八夏銀綏宥雍熙元年復以四州授繼捧自後不領於職方時天下上閏年圖州府軍㡬於四百上令以絹百疋合而畫之為天下圖至道三年分天下為十五路其後又增三路一曰京東路領府二州十五軍四監二二曰京西路府一州十六軍二太平興國三年分京西轉運為二司孟滑衞陳潁許蔡汝等州為一路襄均房復郢金隨安鄧唐等州信陽軍為一路後復併三曰河北路府三州二十三軍十二太平興國初分河北南路雍熙中又分為東西路後併焉雍熙四年易州陷敵四曰河東路州二十軍六監二五曰陜西路府三州二十五軍四監三太平興國二年分陜西轉運為陜西河北陜西河南兩路又有陜府西北路後併焉咸平五年靈州清逺軍皆陷六曰淮南路州十八軍三監二太平興國初分淮南西路後併七曰江南東路府一州七軍二八曰江南西路州六軍四太平興國初分江南東西路後併焉天禧四年分為兩路九曰荆湖南路州七監一十曰荆湖北路府一州十軍二十一曰兩浙路州十四軍一十二曰福建路州六軍二太平興國初為兩浙西南路後改焉十三曰益州路州十五軍一十四曰梓州路州十一軍二十五曰利州路府一州十十六曰䕫州路州九軍二監一國初平劒南西川但為西川路開寳六年始分峽西路咸平四年又分川峽為四路十七曰廣南東路州十六十八曰廣南西路州二十一軍二天下凡十八路州府軍監三百二十二凡京府三次府八州二百五十二軍四十六監一十三乾德元年令天下防禦團練刺史州有都督額者並停仍為上州縣一千二百六十二舊制縣除亦次赤畿次畿外三千户已上為望二千户已上為緊一千户已上為上五百户已上為中不滿五百户為中下建隆元年令自上縣以上例加千户一千户以上為中不滿千户為中下三嵗取諸道户口以升降之地東南皆至於海西盡巴僰北際中山東西六千四百八十五里南北一萬一千六百二十里皇祐五年以曺陳許鄭滑五州為輔郡𨽻畿内置京畿轉運使以總之至和二年罷嘉祐四年改益州路為成都府路治平四年府州軍監增置五縣損者五十三熙寧始務闢國未及改元种諤先取綏州韓絳繼取銀州王韶取熙河章惇取懿洽謝景溫取徽誠熊本取南平郭逵取廣源最後李憲取蘭州沈括取葭蘆米脂浮圖安疆等寨雖嘗以河東邊界七百里地乞遼人而當時王安石議曰吾將欲取之寧姑予之逮元祐更張舉葭蘆等四寨給賜夏人而分畫久弗能定紹聖遂罷分畫督諸路各乘勢攻討進築自三年秋八月訖元符二年冬凡陜西河東建州一安西軍二晉寧綏德關三龍平會寧金城城九安西平夏威戎興平定邊威羌金湯白豹會川寨二十八平羌平戎殄羌暖泉米脂克戎安疆横山綏逺寧羌靈平髙平西平新泉盪羌通峽天都臨羌定戎龕谷大和通秦寧河彌川寧逺神泉烏龍堡十開光通塞石門通會大和通泰寧河彌川寧川三交又取青唐鄯邈川湟寧塞廓龍支宗哥等城武節赫然見矣建中靖國悉還吐蕃故壤稍舒民力崇寧亟變前議専以紹述為事蔡京始任童貫王厚更取湟鄯廓三州二十餘壘陶節夫鍾傳邢恕胡宗回曾孝序之徒又相與鑿空架虚馳騖乎元符封域之表訖於重和既立靖夏涇原制戎鄜延制羌西寧三城雖夏人寖衰而吾民力亦弊西事粗定北事踵起蓋自崇寧以來益梓䕫黔廣西荆湖南北迭相視效斥大土宇鮮有寧嵗凡所建州軍關城塞堡紛然殆不可勝記最後建燕山雲中兩路甫閱三嵗而禍變遽作矣宣和二年始遣趙良嗣使金約夾攻契丹取燕雲舊地四年五月童貫帥師與遼人戰失利退保雄州九月再舉遼髙鳳郭藥師以易州涿州降乃謀襲燕遼人禦之師潰於盧溝金使來議割燕山地初朝廷與女真約但求石晉故地初不思平營灤三州乃劉仁恭以遺契丹故女真不肯割蓋王黼疎繆如此至是趙良嗣馬擴見阿固達於奉聖州金以今嵗出兵失期為言且曰今更不論元約特與燕京六州二十四縣六州謂薊景檀順涿易也良嗣謂元約山前山後十七州十七州者幽涿檀薊順營平灤蔚朔雲應新媯儒武寰也良嗣與辨論數四卒不從十二月金人入燕五年春金使來遣趙良嗣報聘併求三州之地阿固達曰平灤等州必欲取并燕京不與汝家矣燕京用我兵力攻下其租賦當歸我乃議以銀絹充之而再求平灤阿固達曰平灤欲作邊鎮不可得也四月金人來歸燕京六月且索米二十萬石王黼遂許以遼人舊嵗幣四十萬之數外每嵗更添燕山等六州代稅錢一百萬緡我又索平營二州則曰海上元約只及石晉之地又索雲中一路則曰雲中久為我有中國安得有之中國亦無如之何姑欲得燕山且掩挫敗之醜以塞中外之議燕山之地易州西北乃金坡關昌平之西乃居庸關順州之北乃古北關景州東北乃松亭關平州之東乃榆關榆關之東乃金人之來路凡此數關蓋天所以限蕃漢也一夫守之可以當百朝廷之割地若得諸關則燕山之境可保矣然關内之地平灤營三州自後唐為契丹安巴堅陷之後改平州為遼興府以營灤二州𨽻之號為平州路至石晉之初安巴堅子耶律德光又得燕山檀順景薊涿易諸郡建燕山為燕京以轄六郡號為燕京路而與平州自成兩路始朝廷自海上議割地但云燕雲兩路而已蓋初謂燕山之路盡得關内之地殊不知關内之地平州與燕山異路也由是破遼之後金人復得平州路金人既據平州則關内之地蕃漢雜處故幹里雅布至自平州入寇此當時議割燕雲不明地里之誤也及童貫蔡攸入燕燕之金帛子女職官民户為金人席捲而東朝廷捐嵗幣數百萬所得空城而已尼堪猶欲止割涿易阿固達曰海上之盟不可忘也我死汝則為之五月遼張㲄據平州來降十一月金人陷平州初金人納夏羌之請割拓䟦故地雲中二千里遺之止以朔武二州歸我至是夏人舉兵侵朔武地界譚稹禦之不退又金人以朝廷納張㲄出怨言又以借糧許而不時給乃以兵攻應蔚逐守臣又陷飛狐靈邱兩縣七年十二月遂大舉入寇靖康元年正月犯京師遣使來欲割中山太原河間三鎮之地乃退師冬再入寇京師失守二年春三宫北狩五月髙宗即位於南京改元建炎黄潛善等復主和議用靖康誓書畫河為界乃令刑部不得謄登極赦文下河東北兩路十月上幸揚州敵分三道入冦攻陷山東陜西河南五年春入冦陷淮泗揚楚等州上如杭州三年敵分河間真定二府為河北東西兩路平陽太原二府為河東南北兩路冬分道冦江陷杭越等州上自明州航海五月敵退十月張浚及敵戰於富平不利敵以劉豫僭位於大名府偽號齊以舊河為界紹興元年張浚退屯閬州盡失陜西地但餘階成泯鳳洮五郡及鳳翔府之和尚原隴州之方山原而已七年敵廢劉豫九年歸我陜西河南故地十年敵分四道入冦劉琦敗之於順昌是秋岳飛兵至朱仙鎮距東京四十五里詔班師於是潁昌懷寧鄭祭諸州皆復陷金十二年再定和議割唐鄧二州歸金以淮中流為界又割商州秦州之半存上津豐陽天水三邑及隴西成紀餘地棄和尚原方山原以大散關為界内得興趙原為控扼之所十四年鄭剛中請以利州路分東西以興元府利閬澤巴劒大安軍七郡為東路治興元興階成西和文龍鳳七州為西路治興州三十一年金亮渝盟入冦既而亮為其下所殺三十二年吳璘復大散關興州路得秦隴環原熙河蘭會洮州積石鎮戎德順軍凡十二郡金州路得商虢陜華凡四郡獨金以重兵拒鳳翔故大散關之兵未得進淮襄諸軍復得海泗唐鄧陳蔡許汝嵩夀等十州繼而旋失之但得海泗唐鄧四州而已是嵗帝内禪孝宗即位詔吳璘罷德順軍屯戍並於秦州以裏安泊璘棄軍而退隆興二年和議成割所復海泗唐鄧四州及商秦等地歸於金疆界悉如紹興之舊開禧韓侂胄啓釁開邊致金師渡淮侵破諸郡吳曦遂據西蜀以叛韓吳既誅和好如舊侵疆俱復嘉定而後金人被兵中原擾亂山東河北間有據土地内附者然旋得旋失故不復紀錄云九州之區域在昔顓頊及於陶唐分而為九其制最大顓帝制九州堯時洪水分絶使禹治水還為九州舜分為十二州夏商並為九州按周之本制起於顓頊辨其疆界始於禹貢今分别地里故以為首雍州西據黑水東距西河黑水今張掖郡西河則龍門之河今京兆華隂馮翊扶風汧陽新平安定彭原安化平涼靈武五原寕朔洛交中部延安咸寕上郡銀川新秦朔方九原榆林安北天水隴西金城㑹寕安鄉臨洮和政寕塞西平武威張掖酒泉晉昌燉煌等郡地豫州西南至荆山北距河荆山在今襄陽郡南其北境至於河今河南府陜郡之南境𢎞農臨汝滎陽陳留睢陽濟隂譙郡潁川淮陽汝隂汝南淮安襄陽武當漢東等郡地冀州唐虞之都以餘州所至則是其境西境雍州南境豫州東境兖州皆以河為界河自今文城絳郡西龍門南流至華隂東過今汲郡黎陽縣東大岯山又東入於海今河内汲郡鄴郡廣平鉅鹿信都趙郡常山博陵河間文安饒陽上谷范陽順義歸化歸徳媯川漁陽密雲北平栁城河東絳郡陜郡之北境平陽髙平上黨樂平陽城太寧文城西河太原昌化樓煩鴈門定襄安邊馬邑雲中單于等郡地兖州舊為濟河之間孔安國云東南據濟西北距河青州東北據海西距岱岱泰山也在今魯郡界自泰山之東至於海今北海濟南淄川東萊東牟髙密安東等郡即其地徐州東據海北至岱南及淮自泰山之南淮之北海之西也今彭城臨淮魯郡東海琅琊等郡地是梁州東據華山之陽西距黑水華山之南今華隂之西南黑水出張掖郡南流入海即巴蜀之地皆是也今上洛漢中洋川安康房陵通川潾山南平涪陵南川瀘川清化始寕咸安符陽巴川南賔南浦閬中南充安岳盛山雲安犍為陽安仁夀通義和義資陽南溪河池武都同谷順政懷道同昌隂平江油交川合川益昌普安巴西梓潼遂寕蜀郡德陽濛陽唐安臨卭盧山通化越嶲雲南洪源等郡地揚州北據淮東南距海北自淮之南東南拒於海閩中以北地今廣陵淮隂鍾離夀春永陽歴陽廬江同安蘄春弋陽宣城丹陽晉陵吳郡餘杭新定新安㑹稽餘姚臨海縉雲永嘉東陽信安鄱陽潯陽之東境豫章臨川廬陵宜春南康建安長樂清源漳浦臨汀潮陽郡地自晉以來歴代史皆云五嶺之南至於海並是禹貢揚州之地按禹貢物産貢道職方山藪川浸皆不及五嶺之外又按荆州南境至衡山之陽若五嶺之南在九州封域則以鄰接宜屬荆州豈有舎荆而屬揚斯不然矣此則近史之誤也則嶺南之地非九州境荆州北據荆山南及衡山之陽荆山在今襄陽郡界南至今衡陽郡桂嶺之北皆是也今江陵夷陵巴東景陵富水安陸齊安漢陽江夏義陽潯陽之西境長沙巴陵衡陽零陵江華桂陽連山卲陽武陵澧陽黔中寕夷涪川廬溪廬陽靈溪潭陽清江播川義泉夜郎龍溪溱溪等郡地其雍州西境流沙之西荆州南境五嶺之南所置郡縣並非九州封域之内也今辨禹貢九州并南越之地歴代郡國析於其中其有本非州之區域則以鄰接附入云爾如冀州伊吾交河北庭安西梁州臨翼歸誠静川恭化維川蓬山雲山夾漈鄭氏曰州縣之設有時而更山川之形千古不易所以禹貢分州必以山川定經界使兖州可移而濟河之兖不能移使梁州可遷而華陽黑水之梁州不能遷是故禹貢為萬世不易之書後之為史者主於州縣故州縣移易而其書遂廢矣按禹九州之後虞分為十二州周職方之九州又與禹異兩漢為十三州置刺史以統郡歴代因之其後置郡益多而土宇益狹且所𨽻之州隋與晉異晉與漢殊於是禹跡之九州益不可復考矣是以斷代為書不可聨屬夾漈所謂州縣移易其書遂廢者是也獨杜氏通典以歴代郡國析於禹九州之中條理明備今從之然杜書州郡皆唐天寳以前唐之中世以迄於宋沿革多矣故今所叙州郡則皆以宋史為據推而上之以考歴代之沿革至冀之幽朔雍之銀夏南粤之交趾元未嘗入宋職方而史所不載者則追考前代之史以備其闕而於每州總論之下復各為一圖先以春秋時諸國之可考者分入九州次則及秦漢晉隋唐宋所分郡縣考其地里悉以附禹九州之下而漢以來各州刺史州牧所領之郡其不合禹九州者悉改而正之如魯郡在禹跡為徐州而漢則屬豫州所領陳留郡在禹跡為豫州而晉則屬兖州所領之類今悉改從禹跡文獻通考卷三百十五
