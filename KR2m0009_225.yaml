body:
  text: 文獻通考卷二百二十五鄱陽馬端臨貴與著經籍考五十二子神仙家太平經一百七十卷後漢書襄楷傳桓帝時楷上書言臣前上琅邪宫崇受于吉神書不合明聼于姓吉名也神書即今道家太平經也其經以甲乙丙丁戊己庚辛壬癸為部每部一十七卷又言前者宫崇所獻神書專以奉天地順五行為本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國允不興云云初順帝時琅邪宫崇詣闕上其師于吉於曲陽泉水上所得神書百七十卷皆縹白素朱介青首朱目號太平清領書其言隂陽五行為家而多巫覡雜語有司奏崇所上妖妄不經乃收藏之後張角頗有其書焉及靈帝即位以楷書為然按道家之説皆昉於後漢桓帝之時今世所傳經典符籙以為張道陵天師永壽年間受於老君者是也而太平經正出於此時范史所書甚明然隋以來藝文志道書中並不收入至宋中興史志方有之然以為襄楷撰則非也今此經世所不見獨章懷太子所注漢書略及其一二如楷疏中所謂奉天地順五行者經中所言亦淺易無甚高論至所謂興國廣嗣之術則不過房中鄙褻之談耳楷好學博古於君昏政亂之時能詣闕上書明成瑨李雲之寃指常侍黃門之過不可謂非高明傑特之士而疏中獨再三尊信此書遂以來違背經誼假托神靈之劾幾不免獄死惜哉然此經流傳最古卷帙最多故附見於此于吉者後為孫䇿所殺按順帝至孫䇿據江東之時垂七十年而吉於順帝時已為宫崇之師則必非稚齒度其死時當過百嵗必有長生久視之術然亦不能晦迹山林以全其天年而乃招集徒衆制作符水襲黃巾米賊之為以取誅戮則亦不足稱也登真隱訣二十五卷鼂氏曰梁陶𢎞景撰景以學其訣者當由階而登真文多隱非訣莫登故以名書凡七篇十七條隋志云抱朴子內篇二十卷鼂氏曰晉葛洪撰洪字稚川丹陽句容人元帝時纍召不起止羅浮山鍊丹著書推明飛升之道導養之理黃白之事三十卷二十卷名曰內篇十卷名曰外篇自號抱朴子因以命書陳氏曰洪所著書內篇言神仙黃白變化之事外篇駁雜通釋此二十卷者內篇也館閣書目有外篇五十卷未見玉皇聖胎神用訣一卷鼂氏曰玉皇訣云野人郎肇注無上祕要九十五卷鼂氏曰題曰元始天尊説藝文志止七十二卷不知何時析出二十三通也葛仙翁胎息術一卷鼂氏曰仙翁葛洪也太清服氣口訣一卷太起經一卷開氣法一卷太上指南歌一卷鼂氏曰四書皆題曰老子撰服氣訣也導引養生圖一卷鼂氏曰梁陶𢎞景撰分三十六勢如鴻鶴徘徊鴛鴦戢羽之類各繪像於其上田偉家本少八勢大還丹契祕圖一卷鼂氏曰草衣洞真子元撰凡三十章大還丹者乃日月精氣所致也論火候則以朔望為據記藥物則以鉛汞為名云太上墨子枕中記一卷中興藝文志不知作者書載匿形幻化之術殆依託墨子云金碧潛通一卷鼂氏曰題長白山人元陽子解未詳何代人不著撰人名氏按邯鄲書目云羊參微集其序言本得之石函皆科斗文字世有三十六字訣七曜五行八卦九宫論還丹之事其辭多隱人莫測劉真人演仰觀上象以定節度今之所作多不成者蓋不得口訣故也吾恐墜匿聖文故著上經託號金碧潛通金者剛柔得位火不能灼服之仙遊碧落雲云疑即參微所撰也道藏止收一卷還丹歌一卷鼂氏曰元陽子撰次序雜亂非完書也大旨解參同契李氏書目云海客李元光遇元壽先生於中嶽授此未詳元光何代人龍虎通元要訣一卷鼂氏曰蘇元朗撰以古訣龍虎經參同契祕金碧潛通訣其文繁而隱故纂其要為是書李邯鄲家本題云青霞子隋開皇時人不出名氏豈元朗之號邪易成子大丹訣一卷鼂氏曰彭仲堪撰不著何代人字舜元天台遇一異僧授此術論火候青牛道士歌一卷鼂氏曰題曰青牛道士未詳八假錦一卷鼂氏曰不題撰人吐故納新之訣也髙象先歌一卷鼂氏曰髙先撰象先其字也未詳何代人論參同契真一子還丹金鑰一卷太清大或經一卷九天元路祕論一卷靈源銘一卷太清爐鼎斤兩訣一卷鼂氏曰五書不著撰人論龍虎鉛汞火候之術神仙可學論一篇鼂氏曰唐吳筠撰嵇康謂神仙不可以學致筠意不以為然故演修習之方以勉學仙之士云坐忘論一卷鼂氏曰唐司馬承禎子微撰凡七篇其後有文元公跋謂子微之所謂坐忘即釋氏之言宴坐也陳氏曰言坐忘安心之法凡七條并樞翼一卷以為修道階次其論與釋氏相出入天隱子一卷鼂氏曰唐司馬子微為之序天隱子不知何許人著書八篇修鍊形氣養和心靈歸根契於隂陽遺照齊乎莊叟殆非人間所能力學者也王古以天隱子即子微也一本有三宫法附於後陳氏曰司馬子微序言長生久視無出此書今觀其言殆與坐忘論相表裏豈天隱云者托之别號歟幽傳福善論一卷陳氏曰唐孫思邈撰元綱論一卷陳氏曰唐中嶽道士吳筠撰日月元樞論一卷鼂氏曰唐劉知古撰明皇朝為綿州昌明令時詔求通丹藥之士知古謂神仙大藥無出參同契因著論上於朝胎息祕訣一卷鼂氏曰唐僧遵化撰論達磨胎息總十八篇歌二十三首凡一千四百四十言天祐丁丑書成太白還丹篇一卷陳氏曰稱清虛子太白山人唐貞元時金丹訣一卷鼂氏曰皇朝張瑾撰治平中授丹訣於榮中立後因敘其事以教後學玉芝書三卷鼂氏曰皇朝陳舉撰舉字子堙蘇州人養生真訣一卷陳氏曰虞部員外郎耿肱撰大中祥符時人授道志一卷鼂氏曰皇朝楊谷真宗朝嘗遇神仙成都藥市因授其道本李氏書目亦載云谷自號純粹子通元祕要悟真篇一卷鼂氏曰皇朝張用成撰用成字平叔天台人熙寧中隋陸師閔入蜀授道於隱者因成律詩八十一首陳氏曰天台張伯端平叔撰一名用成熙寧遇異人於成都所著五七言詩及西江月百篇末卷為禪宗歌頌以謂學道之人不通性理獨修金丹則性命之道未全有葉士表袁公輔者各為注凡五卷養生丹訣一卷鼂氏曰皇朝皇甫士安撰士安岷山道士也歸正議九卷鼂氏曰皇朝林靈素撰佛書中非道家者太一真君固命歌一卷中興藝文志題真人勒於羅浮山朱明洞隂谷壁古篆文字東晉葛洪譯鮑靚行於世言房中術靈樞道言發微二卷陳氏曰朝議大夫致仕傳燮撰進専言火候金液還丹圖一卷陳氏曰不著名氏自稱元真蓋宣和道流也還丹復命篇一卷陳氏曰毗陵僧道光撰亦擬悟真詩篇靖康丙午序道樞二十卷陳氏曰會慥端伯撰慥自號至遊子采諸家金丹大藥修鍊般運之術為百二十二篇初無所發明獨黜採御之法以為殘生害道云肘後三成篇一卷陳氏曰稱純陽子謂吕洞賓也其言小成七中成六大成五皆導引吐納修煉之事又有金丹訣一卷即此書而微不同太清養生上下篇二卷陳氏曰稱赤松子寧先生上清金碧篇一卷陳氏曰稱煙蘿子金虎鉛汞篇一卷陳氏曰稱元君鉛汞五行篇一卷陳氏曰稱探元子華陽真人祕訣一卷吕真人血脈論一卷陳氏曰前書稱施肩吾後書稱傅婁景先生老子四象論一卷道士柳沖用巨勝歌一卷百章集一卷陳氏曰百章集稱魏伯陽逍遙子通元書三卷許先生十二時歌一卷金鏡九真玉書一卷陳氏曰並不知姓名黃帝丹訣玉函祕文一卷陳氏曰文林郎蒲庚進吕公窰頭坯歌一卷陳氏曰以陶器為喻也龍虎金液還丹通元論一卷陳氏曰稱羅浮山蘇真人撰金碧上經古文龍虎傳陳氏曰長白山人元陽子注皆莫知何人已上十八種共為一集其中有龍牙頌及天隱子各見釋氏道家類羣仙珠玉集一卷陳氏曰其序曰西華真人以金丹刀圭之訣傳張平叔作悟真篇以傳石得之薛道光陳泥丸至白玉蟾玉蟾者葛其姓福之閩清人嘗得罪亡命蓋姦妄流也余宰南城有寓公稱其人云近嘗過此識之否余言不識也此輩何可使及吾門李士寧張懷素之徒皆殷監也是以君子惡異端列仙傳二卷陳氏曰漢劉向撰凡七十二人每傳有贊似非向撰西漢人文章不爾也館閣書目三卷六十二人崇文總目作二卷七十二人與此合神仙傳十卷鼂氏曰晉葛洪弟子滕升嘗問洪曰古人之仙者豈有其人乎洪答以秦阮倉所記有數百人劉向所纂又七十一人今後録集古之仙者以傳真識之士云續仙傳三卷陳氏曰唐溧水令沈汾撰或作玢仙苑編珠二卷鼂氏曰唐王松年撰取阮倉劉向葛洪所傳神仙又取經記中梁以後神仙百二十八人比事屬辭效蒙求體為是書道教靈驗記二十卷陳氏曰蜀道士杜光庭撰王氏神仙傳四卷鼂氏曰蜀杜光庭纂光庭集王氏男真女仙五十五人以諂王建又有王虛中續纂三十人附其後陳氏曰當王氏有國時為此書以媚之謂光庭有道吾不信也西山羣仙會真記五卷陳氏曰九江施肩吾希聖撰唐有施肩吾能詩元和中進士也而曽慥集仙傳稱吕巖之後有施肩吾撰會真記蓋别是一人也鼂氏曰言煉養形氣補育精神成內丹之法凡三十五篇鍾吕傳道記三卷陳氏曰施肩吾撰敘鍾離權雲房吕巖洞賓傳授論議降聖記五十卷鼂氏曰皇朝丁謂撰大中祥符五年十月十七日聖祖降七年謂請編次事迹詔李維宋綬晏殊同編天禧元年上之先天記三十六卷鼂氏曰皇朝王欽若集聖祖趙諱即軒轅黃帝也故欽若奉詔編次傳記黃帝事迹上之賜名先天記御製序冠其首集仙傳十二卷陳氏曰會慥撰自岑道願而下一百六十二人雲笈七籖一百二十卷鼂氏曰皇朝張君房等纂君房祥符中謫官寧海時聖祖降朝廷盡以祕閣道書付杭州俾戚綸陳堯臣校正綸等同王欽若薦君房專其事君房銓次得四千五百六十五卷於是掇其藴奧總萬餘條成是書仁宗時上之陳氏曰凡經法符籙修飬服食以及傳記無不畢録頃於莆中傳録才二册蓋節本也後於平江天慶觀道藏得其全録之道藏書目一卷鼂氏曰皇朝鄧自和撰大洞真部八十一帙靈寶洞元部九十帙太上洞部三十帙太真部九十六帙太平部一十六帙正一部三十九帙凡六部三百一十一帙鼂氏曰序九流者以謂皆出於先王之官咸有所長及失其傳故各有弊非道本然特學者之過也是以録之又有醫卜技藝亦先王之所不廢故附於九流之末夫儒墨名法先王之教醫卜技藝先王之政其相附近也固宜昔劉歆既録神仙之書而王儉又録釋氏今亦具循之者何哉自漢以後九流寖微隋唐之間又尚辭章不復問義理之實雖以儒自名者亦不知何等為儒術矣况其次者哉百家壅底正塗之弊雖息而神仙服食之説盛釋氏因果之教興雜然與儒者抗衡而意常先之君子雖有取焉而學之者不為其所誤者鮮矣則為患又甚於漢蓋彼八家皆有補於時而此二教皆無意於世也八家本出於聖人有補於時特學者失之而莊老猶足以亡晉申商猶足以滅秦况二教無意於世不自附於聖人若學而又失之則其禍將如何故存之以為世戒云東坡蘇氏上清儲祥宫碑曰臣謹按道家者流本出於黃帝老子其道以清靜無為為宗以虛無應物為用以慈儉不爭為行合於周易何思何慮論語仁者靜壽之説如是而已自秦漢以來始用方士言乃有飛升變化之術黃庭大洞之法太上天真木公金母之號延康赤明龍漢開皇之紀天皇太一紫微北極之祀下至於丹藥竒技符籙小數皆歸於道家學者不能必其有無然臣竊論之黃帝老子道之本也方士之言末也后山陳氏曰白鶴觀記曰漢兩劉校中書為七略其敘方技則有神仙諸子則有道家而老莊並焉天地神祇三靈百神又皆出於禮官而今之為道者合而有之益以符咒法籙捕使鬼物皆老氏所不道也致堂胡氏曰三教之名自其徒失本真而云然其繆悠之甚者道家是也儒以名學仁義道德之人自周有之然非一定之美稱也故孔子曰女為君子儒無為小人儒學仁義道德不失其正君子儒也其極則莊周所謂魯國一人者也學仁義道德而失其正小人儒也其極則莊周所謂詩禮發冡者也佛者浮屠所謂覺也為其道而覺號之曰佛則瞿曇之徒是也若夫道則以天下共由而得名猶道路然何適而非道哉得道而盡惟堯舜文王孔子而已黃帝之言無傳矣老聃八十一篇槩之孔業固難以大成歸之自其所見而立言不可與天下共由也獨善其身不可與天下共由而名之曰道此漢以來淺儒之論以啓後人枝流分裂之弊豈可用也至其後不復宗八十一篇之旨而從方士言乃有飛仙變化之術丹藥符籙之技禱祈醮祭之法沉淪鬼獄之論雜然並興皆歸於道家者流世人從事於此者皆曰奉道奉道意以道為混淪元妙有主有知能與人興禍作福之一物也豈不遠哉佛氏固邪説然所論虛實並行若其三身雖曰寓意而實有是三人焉道家惟老聃者周柱下史也其元始太上則無是人也無是人則何所象類無乃邪誕之甚歟至其經論科儀等事又依倣佛氏而不及者自杜光庭為之黃冠師資豢養口體逃避稅役士大夫習而不察和其所倡不亦惑哉故因武宗道門先生之命而遂言之彼趙歸真者寧有他長必以殘生左道熒惑人主故敬武皆餌丹躁渴以殞天年如太宗之婆娑寐憲宗之柳泌盡此類也茍以吹噓呼吸已疾引年則司馬承禎軒轅集之徒安肯舍萬乘所問而去之哉武宗曰宫中無事與之談道滌煩此以清虛之趣蓋其非僻之為也人主惟寡欲則邪説無自而入矣按道家之術雜而多端先儒之論備矣蓋清淨一説也煉養一説也服食又一説也符籙又一説也經典科教又一説也黃帝老子列禦寇莊周之書所言者清淨無為而已而略及煉養之事服食以下所不道也至赤松子魏伯陽之徒則言煉養而不言清靜盧生李少君欒大之徒則言服食而不言煉養張道陵寇謙之之徒則言符籙而俱不言煉養服食至杜光庭而下以及近世黃冠師之徒則專言經典科教所謂符籙者特其教中一事於是不惟清淨無為之説略不能知其旨趣雖所謂煉養服食之書亦未嘗過而問焉矣然俱欲冒以老氏為之宗主而行其教蓋嘗即是數説者而詳其是非如清淨無為之言曹相國李文靖師其意而不擾則足以致治何晏王衍樂其誕而自肆則足以致亂蓋得失相半者也煉養之説歐陽文忠公嘗刪正黃庭朱文公嘗稱參同契二公大儒攘斥異端不遺餘力獨不以其説為非山林獨善之士以此養生全年固未嘗得罪於名教也至於經典科教之説盡鄙淺之言庸黃冠以此逐食常欲與釋子抗衡而其説較釋氏不能三之一為世患蠧未為甚巨也獨服食符籙二家其説本邪僻謬悠而惑之者罹禍不淺欒大李少君于吉張津之徒以此殺其身柳泌趙歸真之徒以此禍人而卒自嬰其戮張角孫恩吕用之之徒遂以此敗人天下國家然則柱史五千言曷嘗有是乎蓋愈逺而愈失其真矣朱文公嘗言佛家偷得老子好處後來道家只偷得佛家不好處譬如道家有箇寶藏被佛家偷去後來道家却只取得佛道瓦礫殊可笑愚嘗因是説而推究之仁義禮法者聖賢之説也老氏以為不足為而主於清淨清淨無為者老氏之説也佛氏以為不足為而主於寂滅蓋清淨者求以超出乎仁義禮法而寂滅者又求以超出乎清靜無為者也然曰寂滅而已則不足以垂世立教於是緣業之説因果之説六根六塵四大十二緣生之説層見疊出宏逺微妙然推其所自實本老子高虛元妙之旨增而高之鑿而深之遂自成一家之言而後來之道經反從而依倣之然較其詞采則鄙劣彌甚者蓋瞿曇設教最久囑付其徒亦甚至又能鼓舞天下之文人才士以羽翼之推原其旨意之所從來而潤色其辭語之所未備故其為書博大竒偉不可以淺窺若老子則其初固未嘗欲以道德五千言設教也羽人方士借其名以自重而實不能知其説於是就佛經腳跟下竊其緒餘作諸經懴而復無羽翼潤色之者故無足觀蓋佛襲老之精微泝而上之其説愈精微道襲佛之粗淺沿而下之其説愈粗淺矣然此論其藴奧也今之黃冠釋子俱未嘗究竟至此而特以其科教之所謂濟生度死希求福利者行於世而舉世宗之莫敢有異説愚嘗論之二教所謂濟拔幽途者俱妄也不足復議至於祈求以希福之説雖達生知命者所不為然以理觀之則道教為優何也蓋人受生於天地稟氣於隂陽五行日月星辰實照臨之山川神祗實擁護之則夫疾痛而呼籲厄難而叩祁首過雪愆祈恩請福而天地明神鑒其懇誠為之悔禍降祥則亦理之所有雖曰道經中所謂天神地祗皆領之國家之祠官為臣庶者不當僭有所祈然子路曰禱爾於上下神祗孟子曰雖有惡人齋戒沐浴則可事上帝則亦為臣庶而言且古今異宜禮亦因時而以義起古者士惟一廟今士庶莫不祀其高會古者支子不祭今無有不祀其先者古者有喪不祭今亦不然先儒講論及此固未嘗病其僭瀆而必欲復古之禮制也則夫臣庶士民之家茍有災厄而為之祈籲天地醮祭星辰黃冠師者齋明盛服露香叩首達其誠悃乃古者祝史巫覡薦信鬼神之遺意蓋理之所有而亦人情之所不能免也至以三清為三氣五方為五氣九天為九氣雖不能必其有無然其説亦通特不當指太清為老子蓋務尊其師而反流於僭妄耳釋流見道家科教之有是説也乃從而效之以其所謂諸佛菩薩者美其名曰無量壽曰消災熾盛曰救苦救難而以為所求必得所禱必應且佛氏所謂悲閔衆生而為之導師者不過欲其脫離三業而躋之十地除去無明而納之真如懴悔於既往覺悟於方來以共成佛道耳禍福之司非其任也彼方以空寂為賢則豈復預災祥吉凶之事以色相為妄則豈復歆供養香乳之奉乃盛作莊嚴僕僕亟拜以希福利不亦踈乎然則二氏固互相倣效者也理致之見於經典者釋氏為優道家強欲效之則祗見其敷淺無味祈禱之具於科教者道家為優釋氏強欲效之則祇見其荒誕不切矣文獻通考卷二百二十五
