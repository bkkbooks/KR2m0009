body:
  text: 文獻通考卷二十二鄱陽馬端臨貴與著土貢考一歷代土貢進奉羡餘禹貢兖州厥貢漆絲厥篚織文織文錦繡之屬盛之筐篚而貢青州厥貢鹽絺細葛海物惟錯錯雜也岱畎絲枲鉛松怪石畎谷也怪石石似玊厥篚檿絲檿桑蠶絲中琴瑟絃徐州厥貢惟土五色泗濵浮磬淮夷蠙珠暨魚厥篚元纎縞元黑繒縞白繒纎細也明二繒俱細揚州厥貢惟金三品金銀銅瑶琨美玉篠簜美竹齒革羽毛惟木厥篚織貝織細苧貝水物厥包橘柚錫貢錫命乃貢言不常荆州厥貢羽毛齒革惟金三品杶幹栝柏幹柘也礪砥砮丹砮矢鏃惟箘簵楛三邦底貢厥名箘簵美竹楛中矢幹三物皆出雲夢澤傍三國常致貢之天下稱善包橘柚匭匣也菁茅菁以為菹茅以縮酒厥篚元纁璣組此州染元纁色善故貢之璣珠類組綬類九江納錫大龜豫州厥貢漆枲絺紵厥篚纎纊纊細綿錫貢磬錯治玉曰錯梁州厥貢璆鐵銀鏤砮磬璆玉名鏤剛鐡熊羆狐狸織皮貢四獸之皮織金罽雍州厥貢球琳琅玕球琳皆玉名琅玕石似珠周官太宰以九貢致邦國之用一曰祀貢犧牲包茅之屬二曰嬪貢嬪故書作賔賔貢皮帛之屬三曰器貢宗廟之器四曰幣貢繡帛五曰材貢木材也六曰貨貢珠貝自然之物七曰服貢祭服八曰斿貢羽毛九曰物貢九州之外各以其所貴寶為贄大行人邦畿方千里其外方五百里謂之侯服嵗一見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四嵗一見其貢服物又其外方五百里謂之衛服五嵗一見其貢材物材物八材也又其外方五百里謂之要服六嵗一見其貢貨物九州之外謂之蕃國世一見各以其所貴寶為贄若犬戎獻白狼白鹿是也漢高帝十一年詔諸侯王通侯常以十月朝獻及郡各以人口數率人嵗六十三錢以給獻費詳見丁賦門文帝後六年大旱蝗令諸侯毋入貢弛山澤時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行日三十里朕乘千里馬獨先安之於是還馬與道里費元帝初元五年罷齊三服官齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服東漢世祖建武十三年詔曰往年已敕郡國異味不得有獻御今猶未止非徒有豫養導澤之勞至乃煩擾道上疲費過所其令官勿復受明敕下以遠方口實所以薦宗廟者自如舊制異國有獻名馬者日行千里又進寶劒價兼百金詔以馬駕鼓車劔賜騎士野王嵗獻甘醪膏餳每輒擾人吏以為市樊倏臨終奏乞罷之明帝從之明帝永平十一年漅湖出黃金廬江太守取以獻章帝建初二年詔齊相省冰綺方空縠吹綸絮舊齊有三服官今省和帝詔太官勿受遠國珍羞舊南海獻龍眼荔枝十里一置五里一候奔騰險阻死者繼路時臨武長汝南唐羌縣接南海乃上書陳狀詔曰遠國珍羞本以奉宗廟茍有傷害豈愛民之本其敕太官勿復受獻安帝永初五年詔省減郡國貢獻太官口食和熹鄧后詔蜀漢扣器凡帶佩刀並不復調扣音口以金銀緣器也順帝永建四年詔曰海內頗有災異朝廷修政太官減膳珍玩不御而桂陽太守文礱不惟竭忠宣暢本朝而遠獻大珠以求幸媚今封還之晉武帝時太醫司馬程據獻雉頭裘帝焚之於殿前乃敕內外敢有獻竒技異服者罪之隨煬帝龍舟幸江都所過州縣五百里外皆令獻食多者一州至百輦極水陸珍竒後宮厭飫將發之際多棄埋之帝至江都江淮郡官謁見者專問禮餉豐薄豐則超遷丞守薄則率從停解江都郡丞王世充獻銅鏡屏風遷通守歷陽郡丞趙元楷獻異味遷江都郡丞由是郡縣競務刻剝以充貢獻民外為盜賊所掠內為郡縣所賦生計無遺唐制州府嵗市土所出以為貢其價視絹之上下無過五十匹異物滋味名馬鷹犬非有詔不獻有加配則以代租賦中宗時大臣初拜官獻食天子名曰燒尾蘇瓌獨不進及侍宴宗晉卿嘲之帝默然瓌曰宰相燮和隂陽代天治物今粒食踴貴百姓不足臣誠不稱職不敢燒尾元宗開元二十四年千秋節羣臣皆獻寶鏡張九齡以為以鏡自照見形容以人自照見吉凶乃述前世興廢之源為書五卷謂之千秋金鏡録上之代宗時生日端午四方貢獻至數千萬者加以恩澤諸道尚多侈麗以自媚德宗既平朱泚之後屬意聚斂藩鎮常賦之外進奉不息劒南西川節度使韋臯有日進江西觀察李兼有月進他如杜亞劉贊王緯李錡皆徼射恩澤以常賦入貢名為羡餘至代易又有進奉户部財物所在州府及巡院皆得擅留或矯密旨加斂或減刻吏祿或販鬻𬞞果往往私自入所進才十二三無敢問者刺史及幕僚至以進奉得遷官李德裕為浙西觀察使敬宗立侈用無度詔浙西上脂盝妝具德裕奏比年旱災物力未完乃三月壬子赦令常貢之外悉罷進獻又赦令禁諸州羡餘無送使今嵗經費常少十三萬軍用褊急所需脂盝妝具度用銀二萬三千兩金一百三十兩物非土産雖力營索尚恐不逮願詔宰相議何以俾臣不違詔旨不乏軍興不疲人不斂怨則前敕後詔咸可遵承不報時罷進獻不閲月而求貢使足相接於道故德裕推一以諷他又詔索盤絛繚綾千匹復奏言太宗時使至涼州見名鷹諷李大亮獻之大亮諌止詔嘉歎元宗時使者抵江南捕鵁鶄翠鳥汴州刺史倪若水言之即見褒納皇甫詢織半臂造琵琶捍撥鏤牙筒於益州蘇頲不奉詔帝不之罪夫鵁鶄鏤牙微物也二三臣尚以勞人損德為言豈二祖有臣如此今獨無之且立鵝天馬盤絛掬豹文彩怪麗惟乘輿當御今廣用千匹臣所未諭優詔為停憲宗禁無名貢獻而至者不甚却翰林學士錢徽懇諌罷之帝密戒後有獻毋入右銀臺門以避學士宣宗時右補闕張潛奏藩府代移之際皆奏羡餘為課績朝廷因為甄奬夫財賦有常非重取於民刻削軍士則安得羡餘南方諸鎮不寧皆由此也變故一生所蓄既遭焚掠發兵費又百倍然則朝廷何利焉乞自今藩府長吏不增賦斂不減糧賜獨節遊宴省浮費而能致羡者然後可賞也上嘉納之致堂胡氏曰憲宗喜進奉上承乃祖代德之弊然當朝多賢相繼論列雖實不能革猶文為之禁穆敬而後遂無復諌者非無進奉也蓋以為常例矣故李德裕收諸道助軍錢帛入備邊庫然因私獻以為公家費䇿之次也觀張潛疏則益信羡餘之進纍朝相襲明矣雖然潛之言曰長吏不增賦斂不減糧賜獨節遊宴省浮費而能致羡然後賞之審如是將安取餘且方鎮專制境內其倚法剝削朝廷何自而稽之羡餘之名存而甄奬之令在彼必曰此皆節省所得而非增削所致也悅其名不去其實病源曷瘳不若禁絶羡餘無得進奉則民瘼庶乎其少損矣唐天下諸郡每年常貢通典按令文諸郡貢獻皆取當土所出凖絹為價多不得過五十匹並以官物充市所貢至薄其物易供聖朝常制於斯在矣其有加於此數者亦折租賦不别徴科京兆府貢葵草席地骨白皮酸棗仁華隂郡貢鷂子十聨細辛四斤烏鶻五聨八茯苓三十八斤茯神三十斤今華州馮翊郡貢白裏皺文皮三十一領今同州扶風郡貢龍鬚席十領今岐州新平郡貢剪刀十具十蛇膽十斤州蓽豆澡豆五石白火筯二具今邠安定郡貢龍鬚席十領今涇州彭原郡貢五色龍鬚席十領今莞菁長假蘇荆芥寧州菴䕡子亭汧陽郡貢龍鬚席六領今隴州中部郡貢龍鬚席六領今坊州洛交郡貢龍鬚席六領今鄜州朔方郡貢白氈十領今夏州安化郡貢麝香二十五顆今慶州靈武郡貢鹿角膠靈州代赭花蓯蓉白雕翎今榆林郡貢青龍角兩具斤今勝州徐長卿十斤赤芍藥十延安郡貢麝香三十顆今延州咸寧郡貢麝香一顆今丹州銀川郡貢女稽布五端今銀州平涼郡貢九尺白氈十領今原州九原郡貢野馬胯皮二十一片今豐州白麥麵印盛鹽會寧郡貢駝毛褐兩段今會州五原郡貢鹽山四十顆今鹽州新秦郡貢青地鹿角二具鹿角三十具今麟州單于都護府貢生野馬胯皮總十二片安北都護府貢生野馬胯皮二十一片太原府貢銅鏡兩靣斤甘草三十一斤柏礬石三十斤龍骨三十蒲萄粉屑子仁上黨郡貢人參二百小兩墨三挺今潞州河東郡貢綾絹扇四靣五龍骨二十斤州棗八千顆鳳栖梨三千百顆今蒲絳郡貢梁穀二十石顆墨千四百七十挺百匹梨三千今絳州白縠五平陽郡貢蠟燭三十條今晉州西河郡貢龍鬚席十領斤今汾州石膏五十斤消石五十𢎞農郡貢麝香十顆硯瓦十具今虢州高平郡貢白石英五十小兩州人參三十兩今澤太寧郡貢胡女布五端今隰州昌化郡貢胡女布五端今石州文城郡貢蠟二百斤今慈州陽城郡貢龍鬚席六領今沁州定襄郡貢豹尾十枚今欣州樂平郡貢人參三十兩今儀州鴈門郡貢白雕翎五具兩今代州熟青二十兩熟緑二十樓煩郡貢麝香十顆今嵐州安邊郡貢松子一石今蔚州馬邑郡貢白雕翎五具今朔州河南府貢瓷器十五事陜郡貢柏子仁瓜婁根各三十斤今陜州陳留郡貢絹二十匹今汴州滎陽郡貢絹二十匹麻黃二十斤今鄭州臨汝郡貢絁二十匹今汝州睢陽郡貢絹二十匹今宋州靈昌郡貢綾二十匹並方文今滑州潁川郡貢絹十匹藨心席六領今許州譙郡貢絹二十匹今亳州濮陽郡貢絹二十匹今濮州濟隂郡貢蛇床子二十斤絹二十匹今曹州北海郡貢棗兩石仙文綾十匹今青州淮陽郡貢絹十匹今陳州汝南郡貢鸂鶒綾十匹今豫州東平郡貢絹二十匹今鄆州淄川郡貢防風五十斤進理石五斤今淄州臨淄郡貢絲葛十五匹今齊州魯郡貢鏡花綾十匹紫英白二十二兩今兖州彭城郡貢絹二十匹今徐州臨淮郡貢綿二十屯資布十匹今泗州汝隂郡貢綿二十屯今潁州東海郡貢楚布十匹今海州濟陽郡貢阿膠二百小片濟州鹿角膠三十小片今琅琊郡貢紫石英二十兩今沂州髙密郡貢資布十端今密州牛黃一斤海蛤二十兩東牟郡貢牛黃百二十八兩州水蔥席六領今登范陽郡貢綾二十匹今幽州河內郡貢平紗十匹今懷州魏郡貢白綿紬八匹白平紬八匹今魏州汲郡貢綿三百兩今衛州鄴郡貢紗十匹州鳳翮席六領胡粉百團今相廣平郡貢平紬十匹今洺州清河郡貢氈十領今貝州信都郡貢絹二十匹綿一十屯今冀州平原郡貢絹二十匹今德州饒陽郡貢絹二十匹今深州河間郡貢絹三十匹今瀛州東萊郡貢牛黃百二十二兩今萊州常山郡貢梨六百顆羅二十匹今恆州景城郡貢細簟四領三細桞箱八十合滄糖蟹二十三坩鱧鮬百五十挺今州博陵郡貢細綾千二百七十匹瑞綾二百五十五匹兩窠細綾十五匹大獨窠綾二十五匹獨窠綾一十匹今定州趙郡貢綿五十匹今趙州巨鹿郡貢絲布十匹今邢州博平郡貢紬十匹今博州文安郡貢綿三百兩今莫州上谷郡貢墨三百挺今易州樂安郡貢絹十匹今棣州北平郡貢蔓荆子四斤今平州密雲郡貢人參五斤今檀州媯川郡貢麝香十顆今媯州漁陽郡貢鹿角膠十斤今薊州桞城郡貢麝香十顆今營州歸德郡貢豹尾三枚今燕州安東都護府貢人參五斤武威郡貢野馬皮五張白小麥十石今涼州天水郡貢龍鬚席六領芎藭四十斤今秦州安西都護府貢硇砂五十斤緋氈五領北庭都護府貢隂牙角五隻根二十斤速霍角十隻阿魏截交河郡貢㲲布十端今西州晉昌郡貢草鼓子州野馬皮淚今瓜黃礬絳礬胡桐西平郡貢牸犀角十隻今鄯州隴西郡貢麝香十顆秦苀今渭州燉煌郡貢碁子二十具石膏今沙州酒泉郡貢肉蓯蓉二十斤張今肅州柏脈二十野馬皮兩金城郡貢麝香十顆鼧鼠六頭今蘭州安昌郡貢麝香二十顆今河州同谷郡貢蠟燭十條今成州和政郡貢龍鬚席六領並青黃色今岷州武都郡貢蠟燭十條蜜蠟羚羊角今武州臨洮郡貢