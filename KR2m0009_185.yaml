body:
  text: 文獻通考卷一百八十五鄱陽馬端臨貴與著經籍考十二經孝經經解漢藝文志曰孝經者孔子為曽子陳孝道也夫孝天之經地之義民之行也舉大者言故曰孝經漢興長孫氏博士江翁少府后倉諫大夫翼奉安昌侯張禹傳之各自名家經文皆同唯孔氏壁中古文為異父母生之續莫大焉故親生之膝下諸家説不安處古文字讀皆異臣瓚曰孝經云續莫大焉而諸家之説各不安處之也師古曰桓談新論云古孝經千八百七十二字今異者四百餘字隋經籍志曰孔子既敘六經題目不同指意差别恐斯道離散故作孝經以總會之明其枝流雖分本萌於孝者也遭秦焚書為河間人顔芝所藏漢初芝子貞出之凡十八章而長孫氏博士江翁少府后倉諫議大夫翼奉安昌侯張禹皆名其學又有古文孝經與古文尚書同出而長孫有閨門一章其餘經文大較相似篇簡闕解又有衍出三章并前合為二十二章孔安國為之傳至劉向典校經籍以顔本比古文除其繁惑以十八章為定鄭衆馬融並為之注又有鄭氏注相傳或云鄭玄其立義與玄所注餘書不同故疑之梁代安國及鄭氏二家並立國學安國之本亡於梁亂陳及周齊唯傳鄭氏至隋祕書監王劭於京師訪得孔傳送至河間劉炫炫因序其得喪述其議疏講於人間漸聞朝廷後遂著令與鄭氏並立儒者喧喧皆云炫自作之非孔舊本而祕府又先無其書又云魏氏遷洛未達華語孝文帝命侯伏侯可悉陵以夷言譯孝經之旨教於國人謂之國語孝經今取以附此篇之末宋三朝藝文志曰古文孝經世不傳歷晉至唐所行唯鄭氏者世以為鄭玄唐開元中史官劉子玄證其非鄭玄者十有二諸儒非子玄之説天寶中玄宗自注玄行沖造疏授學官凡今儒者傳習焉五代以來孔鄭二注皆亡周顯德末新羅獻别序孝經即鄭注者皇朝咸平中令祭酒邢昺取行沖疏刪定正義行焉漢志八家一十二篇夲志十一家五十九篇今削五經雜議以下見經解門隋志十八部合六十三卷通計亡書合五十九部一百四十卷唐志二十七家三十六部八十二卷失姓名一家尹知章以下不著録六家一十三卷宋三朝志六部十卷宋兩朝志一部一卷宋四朝志六部五卷宋中興志二十一家二十一部二十九卷古文孝經一卷崇文總目漢侍中孔安國注班固藝文志有孝經古文孔氏一篇二十二章本出屋壁中前世與鄭康成注並行今孔注不存而𨽻古文與章數存焉鄭康成注孝經一卷崇文總目先儒多疑其書唯晉孫昶集解以此注為優請與孔注並行詔可今太學所立陸德明釋文與此相應五代兵興中原久逸其書咸平中日本僧以此書來獻議藏祕府陳氏曰世傳秦火之後河間人顔芝得孝經藏之以獻河間王今十八章是也相承云康成作注而鄭志目録不載故先儒並疑之古文有孔安國傳不行於世劉炫為作稽疑一篇序所謂劉炫明安國之本陸澄譏康成之注者也及唐開元中詔議孔鄭二家劉知幾以為宜行孔廢鄭諸儒非之卒行鄭學按三朝志五代以來孔鄭注皆亡周顯德中新羅獻别序孝經即鄭注者而崇文總目以為咸平中日本僧奝然所獻未詳孰是世少有其本乾道中熊克子復然袁樞機仲得之刻於京口學宫而孔傳不可復見唐明皇孝經注一卷崇文總目取王肅劉劭虞翻韋昭劉炫陸澄六家之説參倣孔鄭舊義今行於大學鼂氏曰何休稱子曰吾志在春秋行在孝經信斯言也則孝經乃孔子自著者也今其首章云仲尼居曽子侍則非孔子所著明矣詳其文書當是曽子弟子所為書柳宗元謂論語載弟子必以字然曽參不然蓋曽氏之徒樂正子春子思相與為之耳余於孝經亦云陳氏曰今世所行本也始刻石大學御八分書末有祭酒李齊古所上表及答詔且具宰相等名銜實天寶四載號為石臺孝經乾道中蔡洸知鎮江以其本授教授沈必豫熊克使刻石學宫云歐陽公集古録無之豈偶未之見耶家有此刻為四大軸以為書閣之鎮按唐志作孝經制旨元行沖孝經疏崇文總目明皇既作注故行沖奉詔作疏孝經正義三卷崇文總目皇朝翰林侍講學士邢昺等撰初世傳行沖疏外餘家尚多皆猥俗褊陋不足行逺咸平中詔昺及杜鎬等集諸儒之説而增損焉司馬君實古文孝經指解一卷自序先儒皆以為孔氏避秦禁而藏書愚竊疑其不然何則秦世科斗之書廢絶已久又始皇三十四年始下焚書之令距漢興才七年耳孔氏子孫豈容悉無知者必待恭王然後乃出蓋始藏之時去聖未遠其書最真與夫他國之人轉相傳授歷世疏遠者誠不侔矣且孝經與尚書俱出壁中今人皆知尚書之真而疑孝經之偽是何異信膾之可啖而疑炙之不可食也鼂氏曰古文蓋孔惠所藏者與顔芝十八章大較相似而析出三章又有閨門一章不同者四百餘字劉向校書以十八章為定故世不大傳獨有孔安國注今亡然諸家説不安處古文字讀皆異推此言之未必非真也司馬公為之指解并音中興藝文志自唐明皇時議者排毁古文以閨門一章為鄙俗古文遂廢國朝司馬光始取古文為指解陳氏曰按唐志孝經二十七家今溫公序言祕閣所藏止有鄭氏明皇及古文三家而已古文有經無傳以𨽻體寫之而為之指解仁宗朝表上之王介甫孝經解一卷鼂氏曰經云當不義則子不可以不諍於父而孟子猥曰父子之間不責善夫豈然哉今介甫因謂當不義則諍之非責善也噫不為不義即善矣阿其所好以巧慧侮聖人之言至此君子疾夫范淳夫古文孝經説一卷鼂氏曰元祐中侍經筵時所上晦庵孝經刋誤一卷中興藝文志刋誤謂今文六章古文七章以前為經後為傳經之首統論孝之終始乃敷陳天子諸侯卿大夫士庶人之孝而其末曰故自天子至於庶人孝無終始而患不及者未之有也其首尾相應文勢聨貫實皆一時之言而後人妄分為六七又增子曰及詩書之文以雜乎其間今乃合為一章而刪去子曰者二引書者一引詩者四凡六十一字以復經文之舊又指傳文之失刪去先王見教以下凡六十七字以順則逆已下凡九十字餘從古文跋尾云熹舊見衡山胡侍郎論語説疑孝經引詩非經夲文初甚駭焉徐而察之始悟胡公之言為信而孝經之可疑者不但此也因以書質之沙隨程可久丈程答書曰頃見玉山汪端明亦以為此書多出後人附會於是乃知前輩讀書精察其論固已及此又竊自幸有所因述而得免於鑿空妄言之罪也因欲掇取他書之言可發此書之旨者别為外傳如冬溫夏凊昏定晨省之類即附始於事親之傳顧未敢耳語録孝經疑非聖人之言且如先王有至德要道此是説得好處然下面都不曽説得切要處著但説得孝之效如此如論語中説孝皆親切有味都不如此士庶人章説得更好只是下面都不親切陳氏曰抱遺經於千載之後而能卓然悟疑辨惑非豪傑特起獨立之士何以及此後學所不敢倣效而亦不敢擬議也張無垢孝經解一卷中興藝文志九成依今文為解其謂人各有入道處曽子則由孝而入亦名言也黃勉齋孝經夲旨一卷中興藝文志幹繼熹之志輯六經論孟之言孝者為一書釐為二十四篇名為孝經夲旨馮椅古孝經輯注中興藝文志椅祖朱氏刋經文所引詩書之妄而傳則盡刪其所託曽孔答問與其增益之辭為古孝經輯注并引蔡氏注楊慈湖古文孝經解中興藝文志解中如德性無生何從有死之語蓋近於禪袁廣微孝經説三卷陳氏曰廣微為鄱憲日為諸生説孝經旁及諸子諸生録之為此編凡三卷右孝經漢志一家十八篇五經雜講隋志二十九部三百五十九卷亡書四家十七卷唐志十九家二十六部三百八十一卷失姓名一家趙英以下不著録十家一百二十七卷宋兩朝志二家七十九卷宋四朝志四家一百九十五卷宋三朝志十五家一百七十一卷宋中興志二十二家一百四十九卷白虎通德論十卷崇文總目後漢班固撰章帝建初四年詔諸儒會白虎觀講議五經同異詔集其事凡十四篇陳氏曰章帝詔諸儒講議五經同異五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決作白虎議奏蓋用宣帝石渠故事石渠議奏今不傳矣班固傳稱撰集凡四十四門容齋洪氏隨筆曰晉唐至今諸儒訓釋六經否則自立佳名蓋各以百數其書曰傳曰解曰章句而已若戰國逮漢則其名簡雅一曰故故者通其指義也書有夏侯解故詩有魯故后氏故韓故也毛詩故訓傳顔師古謂流俗改故訓傳為詁字失真耳小學有杜林倉頡故二曰微謂釋其微指如春秋有左氏微鐸氏微張氏微虞卿微傳三曰通如窪丹易通論名為窪君通班固白虎通應劭風俗通唐劉知幾史通韓滉春秋通凡此諸書唯白虎通風俗通僅存耳又如鄭康成作毛詩箋申明其義他書無用此字者論語之學但曰齊論魯論張侯論後來皆不然也五經鉤沉崇文總目晉楊芳撰答難申暢自謂鉤取五經之沉義篇第亡缺今缺五篇匡繆正俗八卷崇文總目唐祕書監顔師古撰採先儒及當世之言參質訛謬而矯正之未終篇而師古殁其子始上之詔録藏祕閣鼂氏曰師古以世俗之言多繆誤故質諸經史刋而正之永徽中子揚庭上之陳氏曰莆田鄭樵有刋謬正俗跋八卷汪玉山亦言揚庭表以為藁草才半部帙未終則是書初非定本也今前後乖剌極多玉山集中所辨甚詳六説五卷崇文總目唐右補闕劉迅作六書以繼六經故標槩作書之誼而著其目惟易闕而不敘鼂氏曰此其敘篇也凡五卷經典釋文三十卷崇文總目唐陸德明撰德明為國子博士以先儒作經典音訓不列注傳全録文頗乖詳略又南北異區音讀罕同乃集諸家之讀九經論語老莊爾雅者皆著其翻語以增損之陳氏曰唐陸德明撰自五經三傳古禮之外及孝經論語爾雅莊老兼解文義廣采諸家不但音切也或言陸吳人多吳音綜其實未必然按前世藝文志列於經解類中興書目始入之小學非也經史釋題崇文總目唐李肇撰起九經下止唐氏實録列篇帙之凡槩釋其題五經文字三卷陳氏曰唐國子司業張參撰大歷中刻石長安大學崇文總目初參拜詔與儒官校正經典乃取漢蔡雍石經許慎説文呂忱字林陸德明釋文命孝廉生顔傳鈔撮疑亙取定儒師部為一百六十非緣經見者皆略而不集經典分毫正字一卷崇文總目唐太學博士歐陽融撰辨正經典字文使不得相亂篇帙今闕全篇止春秋中帙餘篇悉亡九經字樣一卷崇文總目唐翰林待制唐元度撰開成中元度奉詔覆定太學石經字文以來補張參之闕更作九經字樣為七十六五經字樣一卷陳氏曰唐沔王友翰林待制唐元度撰補張參之所不載開成中上之二書却當在小學類以其專為經設故亦附見於此往宰南城出謁有持故紙鬻於道右得此書乃古京本五代開運丙午所刻也遂為家藏書籍之最古者授經圖崇文總目不著撰人名氏敘易詩書禮春秋三傳論語孝經之學師承相第系而為圖九經餘義崇文總目皇朝處士黃敏求撰托諸家之説是非者裁正之演聖通論六十卷崇文總目皇朝祕書監致仕胡旦撰以易詩書論語先儒傳注得失參糅故作論而辨正之易百篇書五十六篇詩七十八篇論語十八篇凡二百五十二天聖中獻之鼂氏曰其所論易十六卷書七卷詩十卷禮記十六卷而春秋論别行天聖中嘗獻於朝博辨精詳學者宗焉陳氏曰易十七書七詩十禮記十六春秋十其第一卷為目録旦大平興國三年進士第一人恃才輕躁纍坐擯斥晚尤黷貨持吏短長為時論所薄然其學亦博矣羣經音辨七卷陳氏曰丞相真定賈昌朝子明撰康定中侍講天章閣所上凡五門七經小傳五卷鼂氏曰皇朝劉敞原甫撰其所謂七經者毛詩尚書公羊周禮儀禮禮記論語也元祐史官謂慶歷前學者尚文詞多守章句注疏之學至敞始異諸儒之説後王安石修經義蓋本於敞公武觀原甫説伊尹相湯伐桀升自陑之類經義多勦取之史官之言不誣陳氏曰前世經學大抵祖述注疏其以己意言經著書行世自敞倡之惟春秋既有成書而詩書三禮論語見之小傳又公羊左氏國語三則附焉故曰七經河南經説七卷陳氏曰程頤撰繫辭説一書一詩二春秋一論語一改定大學一程氏之學易傳為全書餘經具此龜山經説八卷陳氏曰楊時撰易三詩春秋孟子各一末二卷則經筵講義也三經義辨辨學中興藝文志三經義辨楊時撰辨學王居正撰居正為舉子時不習王氏新經字説流落十餘年時出義辨示之曰吾舉其端子成吾志居正感厲首尾十載為三經辨學凡安石父子言不合道者悉正之紹興間於上前論安石釋經無父無君處上正色曰是豈不害名教居正退序上語係辨學書首上之與時義辨並列祕府自是天下不復言王氏學矣六經圖七卷陳氏曰東嘉葉仲堪思文重編按館閣書目有六卷昌州布衣楊甲鼎卿所撰撫州教授毛邦翰增補之易七十今百三十書五十五今六十三詩四十七今同周禮六十五今六十一禮記四十三今六十二春秋二十九今七十二然則仲堪蓋又以舊本增損改定者耶麗澤論説集録十卷陳氏曰吕祖謙門人所録平日説經之語末三卷則為史説雜説東萊於諸經亦為讀詩記及書説成書而未終也畏齋經學十二卷陳氏曰宣教郎廣安遊桂元發撰凡十二卷桂隆興癸未進士歷官至制司機宜項氏家説十卷附録四卷陳氏曰項安世撰九經皆有論注其第八卷以後雜説文史正學附録孝經中庸詩篇次丘乘圖則各為一書重見諸類山堂疑問一卷陳氏曰起居郎簡池劉光祖德修撰凡一卷慶元中謫居房陵與其子講説諸經因茟記之以其所問於詩為多遂取吕氏讀詩記盡觀之而釋以己意附疑問之後六經正誤六卷陳氏曰柯山毛居正誼甫校監夲經籍之誤所欲刋正者魏鶴山為之序而刻傳之大抵多偏傍之疑似者凡六卷西山讀書記三十九卷陳氏曰真德秀景元撰其書有甲乙丙丁甲言性理中述治道末言出處大抵本經子格言而述以己意今但有甲三十七卷丁二卷乙丙未見考信録三十卷賈鑄撰後溪劉氏序略曰友人賈君成已少豫十三歲未脫舉子纍且教授生徒所至坐席常滿而能歷年篤以成書世之學者於六經之疏能一閲焉者蓋寡况能參稽其類大之如天地氣形之初微之如服食器用之末先儒該洽兼綜凡古書之雜出者徴之而靡不在分之而靡不貫也其書曰考信録考諸古而信於心又以質於余而證於後世用意逺矣右經解文獻通考卷一百八十五
