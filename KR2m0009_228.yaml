body:
  text: 文獻通考卷二百二十八鄱陽馬端臨貴與著經籍考五十五子類書唐志十七家四十二部七千二百八十八卷失姓名三家王義方以下不著錄三十二家一千三百三十八卷宋三朝志一百一十五部五千一百一十九卷宋四朝志一十六部五百一十四卷宋中興志一百七十一家一百九十七部八千三百九十七卷同姓名錄三卷鼂氏曰梁元帝撰纂類歴代姓名人成書一卷唐陸善經續増廣之齊梁間士大夫之俗喜徴事以為其學淺深之候梁武帝與沈約徴栗事是也類書之起當在此時故以此錄為首古今刀劒錄一卷鼂氏曰梁陶𢎞景撰記古今刀劒語麗十卷陳氏曰梁湘東王功曹參軍朱澹遠撰采摭書語之麗者為四十門按前志但有雜家而無類書新唐書志始别出為一類此書乃猶列雜家要之實類書也但其分門類無倫理澹遠又有語對一卷不傳修文殿御覽三百六十卷陳氏曰北齊尚書左僕射范陽祖珽孝徴等撰按唐志類書在前者有皇覽類苑華林遍略等六家今皆不存則此書當為古今類書之首珽之行事姦貪㐫險盜賊小人之尤無良者言之則汚口舌而其所編集乃獨至今傳於世然珽嘗以他人所賣遍略質錢受杖又嘗盗官遍略一部坐獄論罪今書毋乃盗遍略之舊以為己功邪遍略者梁徐僧權所為也又按隋志作聖壽堂御覽卷數同聖壽者實齊後主所居北堂書鈔一百七十三卷鼂氏曰唐虞世南撰世南仕隋為祕書郎時鈔經史百家之事以備用分八十部八百一類北堂者省之後堂世南鈔書之所也家一百二十卷兎園䇿十卷鼂氏曰唐虞世南撰奉王命纂古今事為四十八門皆偶麗之語至五代時行於民間村墅以授學童故有遺下兎園䇿之誚古今姓字相同錄鼂氏曰唐邱光庭撰光庭中進士第藝文類聚一百卷鼂氏曰唐歐陽詢等撰分門類事兼採前世賦詩銘頌文章附於逐目之後按唐志詢與令狐德棻袁朗趙智行同修陳氏曰所載詩文賦頌之屬多今世所無之文集初學記三十卷鼂氏曰唐徐堅等撰初張説類集事要以教諸王開元中詔堅與韋述余欽施本張烜李銧孫季良分門撰次集類一百卷鼂氏曰唐劉綺莊撰綺莊毗陵人嘗為蘇州崑山縣令家多異書採摭事類分二十餘門凡五十餘萬言上之於朝前有萬希序題云開元二十九年辛巳按綺莊集有上白敏中啓疑非元宗時人當考六帖三十卷鼂氏曰唐白居易撰以天地事物分門類為聲偶而不載所出書曽祖父祕閣公為之注行於世世傳居易作六帖以陶家缾數十各題名目置齋中命諸生采集其事類投缾内倒取之抄錄成書故所記時代多無次序云陳氏曰唐志作白氏經史事類一名六帖程氏演繁露曰白樂天取凡書精語可備詞賦制文采用者各以門目類萃而總名其書為六帖既不自釋所以名後人亦無辨偶閲唐制其時取士凡六科别其所試條件每一事名一帖其多者明經試至十帖而説文極於六帖白之書為應科第設則以帖為名其取此矣又曰唐制開元中舉行課試之法帖經者以所習經掩其兩端中間惟開一行裁紙為帖凡帖三字視時増損可否不一或得四得五得六者為通六帖之名所由起取中帖之多者以名其書期必中選也記室新書三十卷鼂氏曰唐李途撰采摭故事綴為偶儷之句分四百門途中和中為東川掌記因以名其書云古鏡記一卷鼂氏曰未詳撰人纂古鏡故事戚苑英華十卷鼂氏曰唐袁悦重修本楊名所著悦掇其要類為語對以他説附益之戚苑纂要十卷陳氏曰唐劉揚名撰皆集内外宗族姻親故事三教珠英三卷鼂氏曰唐張昌宗撰按唐志一千三百卷今所存者止此備舉文言二十卷鼂氏曰唐陸贄撰總四百五十餘門議者謂大類六帖而文辭過焉崇文總目有之童子洽聞記三卷鼂氏曰不題撰人分二十門雜記經史名數或題童子洽聞記云唐許塾撰古城冡記二卷鼂氏曰唐皇甫鑒撰記古城所築之人姓名初不及冡而名曰城冡記未知其説小名錄三卷鼂氏曰唐陸龜蒙撰龜蒙以末世有官名小名之别自秦至隋編而記之至於神仙玉女之名婦人臧獲之字亦無棄焉龜蒙世稱其博然此書特雜取於史傳間爾無異聞也金鑰二卷陳氏曰唐太學博士内李商隱義山撰分四部曰帝室職官歲時州府大略為牋啓應用之備玉屑十五卷陳氏曰無名氏備忘小抄十卷鼂氏曰偽蜀文谷撰雜抄子史一千餘事以備遺忘其後題廣政三年廣政王衍年號也太平御覽一千卷鼂氏曰皇朝李昉等撰太平興國中昉被詔輯經史故事分門春明退朝錄云書成帝日覽三卷一年而讀周賜名太平御覽陳氏曰以前代修文御覽藝文類聚文思博要及諸書參譯條次修纂本號太平編類太平興國二年受詔八年書成改名御覽或言國初古書多未亡以御覽所引用書名故也其實不然特因前諸家類書之舊爾以三朝國史考之館閣及禁中書總三萬六千餘卷而御覽所引書多不著錄盖可見矣冊府元龜一千卷鼂氏曰皇朝景德二年詔王欽若楊億修君臣事跡唯取六經子史不錄小説雜書至祥符六年書成上之凡三十一部有總序一千一百四門有小序同修者十五人錢惟演杜鎬刁衎李維戚綸王希哲陳彭年姜輿宋貽陳鉞陳從易劉筠查道王曙夏竦初撰編序諸儒皆作帝以體制不一遂擇李維錢惟演陳彭年劉筠夏竦等付楊億竄定賜今名為序冠其首其音釋又命孫奭為之陳氏曰凡八年而書成總五十部部有總序一千二百四門門有小序賜名製序所采五經史之外惟取戰國䇿國語韓詩外傳呂氏春秋管晏韓子孟子淮南子及修文殿御覽每門具進上親覽擿其舛誤多出手書或召對指示商略容齊洪氏隨筆曰真宗初命儒臣編修君臣事跡後謂輔臣曰昨見宴享門中錄唐中宗宴飲韋庶人等預㑹和詩與臣僚馬上口摘含桃事皆非禮也已令削之又曰所編事迹盖欲垂為典法異端小説咸所不取可謂盡善而編修官上言近代臣僚自述揚歴之事如李德裕文武兩朝獻替記李石開成承詔錄韓偓金鑾密記之類又有子孫追述先徳叙家世如李繁鄴侯傳柳氏序訓魏公家傳之類或隱己之惡或攘人之善並多溢美故匪信書并僭偽諸國各有著撰如偽吳錄孟知祥實錄之類自矜本國事或近誣其上件書並欲不取餘有三十國春秋河洛記壺關錄之類多是正史已有秦記燕書之類出自偽邦商芸小説談藪之類俱是詼諧小事河南志邠志平剡錄之類多是故吏賔從述本府戎帥征伐之功傷於煩碎西京雜記明皇雜錄事多語怪奉天錄尤是虛詞盡議采取恐成蕪穢並從之及書成賜名冊府元龜首尾十年皆王欽若提總凡一千卷其所遺棄既多故亦不能暴白如資治通鑑則不然以唐朝一代言之叙王世充李密事用河洛記魏鄭公諌爭用諫錄李絳議奏用李司空論事睢陽事用張中丞傳淮西事用凉公平蔡錄李泌事用鄴侯家傳李德裕太原澤潞回鶻事用兩朝獻替記大中吐蕃尚婢婢等事用林恩後史補韓偓鳳翔謀畫用金鑾密記平龎勛用彭門紀亂討裘甫用平剡錄記畢師鐸呂用之事用廣陵妖亂志皆本末粲然然則雜史𤨏説家傳豈可盡廢也天和殿御覽四十卷陳氏曰侍讀學士臨川晏殊等天聖中受詔取冊府元龜掇其要者分類為一百一十五門天和者禁中便殿也鹿門家鈔詩詠五十卷陳氏曰鴻臚少卿襄陽皮文燦撰以群書分類事為詩而注釋之其祖日休有書名鹿門家鈔故今述其名類要六十五卷鼂氏曰皇朝晏殊纂分門輯經史子集事實以備修文之用陳氏曰按中興書目七十七卷豈併目錄為七十七部邪南豐曽氏序略曰公所為類要上中下帙總七十四門凡若干門皆公所手抄於六藝太史百家之書騷人墨客之文章至於地志族譜佛老方伎之衆説旁及九州之外蠻夷荒忽詭變竒跡之序錄皆搜尋細譯而終於三才萬物變化情偽是非興壞之理隱顯巨細之委曲莫不究公之得於内者若此則士不素學而處從官大臣之列備文儒道德之任其能不餒且病乎事類賦三十卷陳氏曰校理丹陽吳淑正儀撰進并注韻類題選一百卷陳氏曰朝奉大夫知處州鄞袁轂容直撰以韻類事纂集頗精要世所行書林韻㑹盖依倣而附益之者也轂嘉祐六年進士東坡守杭時為倅風月平分之詞為轂作也其後累世登科絜齊夑其四世孫也書林韻海一百卷鼂氏曰不題撰人分門韻纂經史雜事以備檢閲或云皇朝許冠所編書叙指南二十卷鼂氏曰任浚撰崇寧中人纂集古今文章碎語分門編次之凡二百餘類陳氏曰皆經傳四字語備尺牘應用者異號錄二十卷鼂氏曰皇朝馬永易明叟編古今殊異名號如銅馬帝無愁天子之類頃嘗見近世人増廣其書名曰賔實錄亦殊該博陳氏曰馬永易撰蜀人勾龍材校正文彪増廣本書三十卷後集三十卷義取名者實之賔為名史韻四十九卷陳氏曰嘉禾錢諷正初撰附韻類事頗便檢閲書林韻㑹一百卷陳氏曰無名氏蜀書坊所刻規摹韻類題選而加詳焉押韻五卷鼂氏曰皇朝張孟撰輯六藝諸子三史句語依韻編入以備舉子試詩賦之用歌詩押韻五卷鼂氏曰皇朝楊咨編古今詩人警句附於韻之下以備押强韻魯史分門屬類賦三卷鼂氏曰皇朝楊筠撰以左氏事類分十門各為律賦一篇乾德四年上之國史對韻十二卷鼂氏曰皇朝范鎮撰吳仲庶嘗稱景仁憫諸後學雖渉書傳而問以今代典故則懵然不知乃從太祖開基迄於仁宗朝摭取事實可為規矩鑒戒者用韻編次之即此書也孝悌類鑒七卷鼂氏曰皇朝俞觀能撰取經史孝悌事四言韻語禁殺錄一卷鼂氏曰皇朝李象先撰元祐中象先集錄古今冥報事以為殺戒侍女小名一卷鼂氏曰王經纂序云大觀中居汝陰與洪炎玉父游讀陸魯望小名錄戲徴古今女侍名字因盡發所藏書纂集踰月而成焉凡稗官小説所記采之且盡獨是正史所載返為脱略子弟之學其蔽如此後六帖三十卷陳氏曰知撫州孔傳撰以續白氏之後也傳襲封衍聖公海錄碎事三十三卷陳氏曰知泉州建安葉廷珪撰皇朝事實類苑二十六卷陳氏曰知吉州江少虞撰紹興中人其書亦可入小説類群書類句十四卷陳氏曰三山葉儀鳳撰以群書新語増廣自五字以至九字為七百五十一門各以平仄為偶對兩漢博聞二十卷陳氏曰無名氏或曰楊侃左氏摘竒十二卷陳氏曰給事中吳郡胡元質長文撰諸史提要十五卷陳氏曰參政吳越錢端禮處和撰泛然抄錄無義類漢雋十卷陳氏曰括蒼林鉞撰以西漢書分類為五十篇皆句字之古雅者雋者取雋永之義也文選䨇字類要三卷陳氏曰蘇易簡撰摘取䨇字以類編集選腴五卷陳氏曰天台王若撰以五聲韻編集文選中字淳熙元年序晉史屬辭三卷陳氏曰永嘉戴迅簡之撰用蒙求體以類晉事元祐癸酉歲也觀史類編六卷陳氏曰呂祖謙撰初集此篇為六門曰擇善曰儆戒曰閫範曰治體曰論議曰處事而閫範最先成既刋行今惟五門而論議分上下卷帝王經世圖譜十卷陳氏曰著作佐郎金華唐仲友與正撰凡天文地理禮樂刑政陰陽度數兵農王覇本之經典兼采傳註類聚羣分凡百二十二篇周平園題辭略曰與正於書無不觀於理無不究凡天文地理禮樂刑政陰陽度數兵農王覇皆本之經典兼採傳注類聚羣分旁通畢貫使事時相參形聲相配或推消長之象或列休咎之證而於郊廟學校畿疆井野尤致詳焉各為總説附其後始終條理如指諸掌每一篇成門人金式輙繕寫藏去積百二十二篇又得與正猶子煜别本相與校讎釐為十卷以類相從㑹分教廬陵將鏤板校官而郡守趙侯善鐻助成之屬予題辭夫水之流東惟海是歸車之指南其途不迷今是書折𠂻於聖人示適治之路故名曰帝王經世圖譜非其他類書比也昔漢儒專通一經仍守師説居家用以修身涖官取以決事况乎六經㫖趣百世軌範皆聚於此學者能因廣記備言精思博考守以卓約則他日見諸行事豈不要而有功也歟經子法語二十四卷左傳法語六卷史記法語十八卷西漢法語二十卷後漢精語十六卷三國精語六卷晉書精語五卷南史精語十卷陳氏曰洪邁撰自博聞誨蒙漢雋摘竒提要及此法語諸書皆所以備遺忘而洪氏多取句法漢雋類例有倫餘皆隨筆信意抄錄者也杜詩六帖十八卷陳氏曰建安陳應行季陵撰用白氏内類編杜詩語錦綉萬花谷四十卷續四十卷陳氏曰序稱淳熙十五年作而不著名氏門類無倫理序文亦拙古今故事錄二十卷陳氏曰知建昌軍金陵閻一德撰文獻通考卷二百二十八
