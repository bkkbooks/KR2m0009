body:
  text: 文獻通考卷十五鄱陽馬端臨貴與著征𣙜考二鹽鐵礬齊管子曰海王之國海王者言以負海之利而王其業王音於况反謹正鹽莢正稅也音征十口之家十人食鹽百口之家百人食鹽終月大男食鹽五升少半少半猶劣薄也大女食鹽三升少半吾子食鹽二升少半吾子謂小男小女也此其大歷也歷數鹽百升而釡鹽十三兩七銖一黍十分之一為升當米六合四勺也百升之鹽七十六斤十二兩十九銖二絫為釡當米六斗四升今鹽之重升加分強釡五十也分強半強也今使鹽官稅其鹽之重每一升加半合為強而取之則一釡之鹽得五十合而為之強升加一強釡百也升加二強釡二百也鍾二千十釡之鹽七百六十八斤為鍾當米六斛四斗是十鍾二萬百鍾二十萬千鍾二百萬萬乘之國人數開口千萬也舉其大數而言之也開口謂大男大女之所食鹽也禺策之商日二百萬禺讀為偶偶對也商計也對其大男大女食鹽者之口數而立莢以計所稅之鹽一日計二百萬合為二百鍾十日二千萬一月六千萬萬乘之正九百萬也萬乘之國大男大女食鹽者千萬人而稅之鹽一日二百鍾十日二千鍾一月六千鍾也今又施其鹽數以千萬人如九百萬人之數則所稅之鹽一日百八十鍾十日千八百鍾一月五千四百鍾月人三十錢之籍為錢三千萬又變其稅千四百鍾之鹽而籍其錢計一月每人人籍錢三十九千萬人為錢二萬萬矣以此籍之數而比其常籍則當一國而有三千萬人矣今吾非籍之諸君吾子而有二國之籍者六千萬諸君謂老男老女也六十以上為老女也既不籍於老男老女又不籍於小男小女乃能以十萬人而當三千萬人者蓋鹽官之利耳鹽官之利既然則鐵官之利可知也鹽官之利當一國而三萬人鐵官之利當一國而三萬人焉故能有二國之籍者六千萬人耳其常籍人之數猶在此外使君施令曰吾將籍於諸君吾子則必囂號令天給之鹽莢則百倍歸於上人無以避此者數也今鐵官之數曰一女必有一針一刀若其事立若猶然後耕者必有一耒一耜一銚若其事立大鋤謂之銚羊昭反行服連輦名所以載作器人挽者軺羊昭反輂居玉反者大車駕馬必有一斤一鋸一錐一鑿若其事立不爾而成事者天下無有今針之重加一也三十針一人之籍針之重每十分加一分為強而取之則一女之籍得三十針也矣刀之重加六五六三十五刀一人之籍也刀之重每十分加六分以為強而取之五六為三十也則一女之籍得五刀耜鐵之重加七三耜鐵一人之籍也耜鐵之重每十分加七分以為強而取之則一農之籍得三耜鐵也其餘輕重皆準此而行其器彌重其加彌多然則舉臂勝音升事無不服籍者桓公曰然則國無山海不王乎管子曰因人山海假之名有海之國雖無海而假名有海則亦雖無山而假名有山售鹽於吾國彼國有鹽而糴於吾國為售耳釡十五吾受而官出之以百受取也假令彼鹽平價釡當十錢者吾又加五錢而取之所以來之也既得彼鹽則令吾國鹽官又出而糴之釡以百錢也我未與其本事也與用也本事本鹽也受人之事以重相推以重相推謂加五錢之類也推猶度也此人用之數也彼人所有而皆為我用也又曰齊有渠展之鹽渠展齊地泲水所流入海之處可煮鹽之所也故曰渠展之鹽請君伐菹薪草枯曰菹采居反煮水為鹽煮海水正音征而積之十月始征至於正月成三萬鍾下令曰孟春既至農事且起大夫無得繕冢墓理宮室立臺榭築墻垣北海之衆無得聚庸庸功也而煮鹽北海之衆謂北海煮鹽之人本意禁人煮鹽下令託以農事慮有妨奪先自大夫起欲人不知其機斯為權術此則坐長十倍以令糶之梁趙宋衛濮陽彼盡饋食之國本國自無鹽逺饋而食無鹽則腫守圉之國圉與禦同古通用用鹽獨甚桓公乃使糶之得成金萬斤按周禮所建山澤之官雖多然大槩不過掌其政令之厲禁不在於征𣙜取財也至管夷吾相齊負山海之利始有鹽鐵之征觀其論鹽則雖少男少女所食論鐵則雖一針一刀所用皆欲計之苛碎甚矣故其言曰利出一孔者其國無敵出二孔者其兵不詘出三孔者不可以舉兵出四孔者其國必亡先王知其然故塞人之養養利也隘其利途故豫之在君奪之在君貧之在君富之在君又曰夫人豫則喜奪則怒先王知其然故見豫之形而不見奪之理故民可愛而洽於上也其意不過欲巧為之法隂奪民利而盡取之既以此相桓公霸諸侯而齊世守其法故晏子曰山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一山林之木衡麓守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政逼介之關暴征其私布常無藝徴斂無度蓋極言其苛如此然則桑孔之為有自來矣漢髙祖接秦之敝量利祿度官用以賦於民而山川園池市肆租稅之入自天子至於封君湯沐邑皆各自為奉養不領於天下之經費秦賦鹽鐵之利二十倍於古漢興循而未改按史既言髙祖省賦而復言鹽鐵之賦仍秦者蓋當時封國至多山澤之利在諸侯王國者皆循秦法取之以自豐非縣官經費所𣙜也孝惠髙后時吳有豫章銅山即招致天下亡命盜鑄錢東煮海水為鹽以故無賦國用饒足班固贊曰吳王擅山海之利能薄斂以使其衆逆亂之萌自其子興古者諸侯不過百里山海不以封蓋防此矣武帝元狩四年置鹽鐵官元狩中兵連不解縣官大空富商大賈冶鑄煮鹽財或纍萬金而不佐公家之急於是以東郭咸陽孔僅為大農丞領鹽鐵事五年僅咸陽言山海天地之藏宜屬少府陛下弗私以屬大農佐賦願募民自給費因官器作煮鹽官為牢盆蘇林曰牢價直也今世人言雇手牢如淳曰牢廩食也古者名廪盆煮鹽盆也浮食竒民欲擅斡山海之貨以致富羡役利細民其沮事之議不可勝聽敢私鑄鐵器煮鹽者釱左趾沒入其器物郡不出鐵者置小鐵官使屬在所縣使僅咸陽乘傳舉行天下鹽鐵作官府除故鹽鐵家富者為吏吏益多賈人矣孔僅使天下鑄作器而縣官以鹽鐵緡錢之故用少饒矣益廣開置左右輔初大農斡鹽鐵官布多置水衡欲以主鹽鐵及楊可告緡上林財物衆乃令水衡主上林既充滿益廣卜式為御史大夫見郡國多不便縣官作鹽鐵苦惡鹽味苦器脆惡賈貴強令民買之乃因孔僅言事上不説先公曰孔僅咸陽所言前之屬少府者其利微今改屬大農則其利盡此聚斂之臣飾説以蓋其私也管仲之鹽鐵其大法稅之而已鹽雖官嘗自煮之以權時取利亦非久行鐵則官未嘗冶鑄也與孔桑之法異矣元封元年因桑宏羊請置大農部丞數十人分部主郡國各往往置均輸鹽鐡官不出鐡者置小鐡官使屬所在縣鹽官凡二十八郡河東安邑太原晉陽南郡巫巨鹿堂陽勃海章武千乘琅琊海曲長廣會稽海鹽犍為南安蜀臨邛益州連然巴胊䏰安定三水北地弋居上郡獨樂西河富昌朔方沃壄五原成宜鴈門樓煩沃陽有長丞漁陽泉州隴西遼西海陽遼東南海番禺蒼梧高要東平北海東萊曲城㡉東牟當利陽樂鐵官凡四十郡京兆鄭左馮翊夏陽右扶風雍漆𢎞農宜陽澠池太原大陵河東安邑絳縣皮氏平陽河內隆慮河南潁川陽城汝南西平南陽宛廬江皖山陽沛沛魏武安常山都鄉千乘郡乘千齊臨淄東萊東牟東海下邳朐濟南東平陵歷城泰山嬴臨淮鹽瀆堂邑桂陽漢中沔陽犍為武陽南安蜀臨邛琅琊漁陽漁陽右北平夕陽遼東平郭隴西膠東郁秩魯楚彭城廣陵中山北平東平城陽莒涿元鼎中博士徐偃使行風俗矯制使膠東魯國鼓鑄鹽鐵還奏事徙為太常丞御史大夫張湯劾偃矯制大害法至死有詔下終軍問狀軍詰偃膠東南近琅琊北接北海魯國西枕泰山東有東海受其鹽鐵偃度四郡口數田地率其用器食鹽不足以并給二郡邪將勢宜有餘而吏不能也何以言之偃矯制而鼓鑄者欲及春耕種贍民器也今魯國之鼓當先具其備至秋乃能舉火此言與實反者非重問之一偃已前三奏無詔不報聽也不惟所為不許惟思也而直矯作威福以從民望千名采譽此眀聖之所必誅也偃矯制顓行非奉使體請下御史徴偃即罪上善其請奏可昭帝始元六年詔郡國舉賢良文學之士問以民所疾苦教化之要皆對願罷鹽鐵酒𣙜均輸毋得與天下爭利視以儉勤御史大夫桑宏羊難以為此國家大業所以制四夷安邊足用之本不可廢也宏羊言往者豪強之家得管山海之利采石鼓鑄煮鹽一家聚或至千餘人大抵盡流放之人逺去鄉里棄墳墓依倚大家相聚深山窮澤之中成姦偽之業家人有寶器尚猶柙而藏之况天地之山澤乎夫權利之處必在山澤非豪人不能通其利異時鹽鐵未籠布衣有朐邴人君有吳王專山澤之饒薄賦其人贍窮乏以成私威私威積而逆節之心作今縱人於權利罷鹽鐵以資強暴遂其貪心衆邪羣聚私門成黨則強禦日以不制而并兼之徒姦形成矣鹽鐵之利佐百姓之急奉軍旅之費不可廢也文學曰庶人藏於家諸侯藏於國天子藏於海內是以王者不蓄下藏於民逺爭利務民之義利散而人怨止若是雖湯武生存於代無所容其慮工商之事歐冶之任何姦之能成三桓專魯六卿分晉不以鹽冶故權利深者不在山海在朝廷一家害百家在蕭墻不在朐邴大夫曰山海有禁而人不傾貴賤有平而人不疑縣官設衡立凖而人得其所雖使五尺童子適市莫之能欺今罷之則豪人擅其用而專其利也文學曰山海者財用之寶路也鐵器者農之死士也死士用則仇讎滅田野闢而五榖熟寶路開則百姓贍而人用給人用給則富國而教之以禮禮行則道有讓而人敦朴以相接而莫相利也夫秦楚燕齊士乃不同剛柔異氣巨小之用倨勾之宜黨殊俗異各有所便縣官籠而一之則鐵器失其宜而農人失其便器用不便則農夫罷於野而草萊不闢草萊不闢則人困乏也大夫曰昔商君理秦也設百倍之利收山澤之稅國富人強蓄積有餘是以征伐敵國攘地斥境不賦百姓軍師以贍故利用不竭而人不知地盡西河而人不苦今鹽鐵之利所佐百姓之急奉軍旅之費務於蓄積以備乏絶所給甚衆有益於用無害於人文學曰昔文帝之時無鹽鐵之利而人富當今有之而百姓困之未見利之所利而見其所害且利非從天來不由地出所出於人間而為之百倍此計之失者也夫李梅實多者來年為之衰新榖熟舊榖為之虧自天地不能滿盈而况於人乎故利於彼者必耗於此猶隂陽之不並晝夜之代長短也商鞅峭七呌反法長利秦人不聊生相與哭孝公其後秦日以危利蓄而怨積地廣而禍搆惡在利用不竭乎於是丞相奏曰賢良文學不眀縣官猥以鹽鐵為不便宜罷郡國𣙜酤酒關內鐵奏可於是利復流下庶人休息宣帝地節四年詔鹽民之食而賈咸貴其減天下鹽賈元帝初元五年罷鹽鐵官永光二年復鹽鐵官成帝綏和二年賜丞相翟方進策曰百僚用度各有數君增益鹽鐵更變無常朕既不眀隨奏許可云云方進自殺東漢郡有鹽官鐵官者隨事廣狹置令長及丞本注曰凡郡縣出鹽多者置鹽官主鹽稅出鐵多者置鐵官主鼓鑄眀帝時官自鬻鹽時榖貴縣官給用不足尚書張林言鹽食之急雖貴人不得不須官可自鬻詔諸尚書通議朱暉等言鹽利歸官則人貧怨非眀主所宜行帝卒以林言為然永平十五年復置涿郡故安鐵官肅宗建初中議復鹽鐵官鄭衆諌以為不可詔數切責至被奏劾衆執之不移帝不從按鹽鐵官顯宗已嘗置矣今言復豈中間嘗罷邪和帝即位罷鹽鐵禁詔曰昔孝武皇帝致誅胡越故𣙜收鹽鐵之利以奉師旅之費自中興以來胸奴未賔永平末年復修征伐先帝即位務休力役然猶深思逺慮安不忘危探觀舊典復收鹽鐵欲以防備不虞寧安邊境而吏多不良動失其便以違上意先帝恨之故遺戒郡國罷鹽鐵之禁縱民煮鑄入稅縣官如故事其申敕刺史二千石奉順聖旨勉行德化布告天下使眀朕意獻帝建安初置使者監賣鹽時關中百姓流入荆州者十餘萬家及聞本土安寧皆企願思歸而無以自業於是衛覬議以為鹽者國家之大寶自喪亂以來放散今宜依舊置使者監賣以其直益市犂牛百姓歸者以供給之勸耕積粟以豐實關中逺者聞之必競還魏武於是遣謁者僕射監鹽官移司𨽻校尉居𢎞農流人果還關中豐實後秦主姚興以國用不足增關津之稅鹽竹木皆有賦羣臣咸諌以為天殖品物以養羣生王者子育萬邦不宜節約以奪其利興曰能踰關梁通利於山水者皆豪富之家吾損有餘以裨不足何不可遂行之陳文帝天嘉二年太子中庶子虞荔御史中丞孔奐以國用不足奏立煮海鹽稅遂從之後魏宣武時河東郡有鹽池舊立官司以收稅利先是罷之而人有富強者專擅其食貧弱者不能資益延興末復立監司量其貴賤節其賦入公私兼利孝眀即位復罷其禁與百姓共之時御史中尉甄琛表稱周禮山林川澤有虞衡之官為之厲禁蓋取之以時不使戕賊而已故雖置有司實為民守之也夫一家之長必惠養子孫天下之君必惠養兆民未有為民父母而吝其醯醢富有羣生而𣙜其一物者也今縣官鄣護河東鹽池而收其利是專奉口腹而不及四體也蓋天子富有四海何患於貧乞弛鹽禁與民共之録尚書彭城王協曰聖人斂山澤之貨以寬田疇之賦收關市之稅以助什一之儲取此與彼皆非為身所謂資天地之産惠天地之民鹽池之禁為日已久積而散之以濟國用非專為供大官之用宜如舊魏主卒從琛議致堂胡氏曰鹽之為物天地自然之利所以養人也盡捐之民則縱末作資遊惰盡屬之官則奪民日用而公室有近寶之害琛協之言皆未得中道也官為厲禁俾民取之而裁入其稅則政平而害息矣魏自弛鹽禁之後官雖無𣙜而豪貴之家復乘勢占奪近池之人又輒障吝神龜初太師高陽王雍太傅清河王懌等奏請依先朝禁之為便於是復置監官以監檢焉其後更罷更立至於永熙自遷鄴後於滄瀛幽青四州之境傍海煮鹽滄州置竈一千四百八十四瀛州置竈一百五十二幽州置竈一百八十青州置竈五百四十六又於邯鄲置竈四計終歲合收鹽二十萬九千七百八斛四斗軍國所資得以周贍矣後周文帝霸政之初置掌鹽之政令一曰散鹽煮海以成之二曰盬鹽引池以化之三曰形鹽掘地以出之四曰飴鹽於戎以取之凡盬鹽每池為之禁百姓取之皆稅焉按東南之鹽煮海而已西北之鹽則所出不一而名亦各異南史張暢傳魏太武至瓜洲餉武陵王以九種鹽曰此諸鹽各有所宜白鹽是魏主所食黑者療腹脹氣滿細刮取六銖以酒服之胡鹽療目痛柔鹽不用食療馬脊創赤鹽駮鹽臭鹽馬齒鹽四種並不中食是也隋文帝開皇三年先是尚依周末之弊鹽池鹽井皆禁百姓採用至是通鹽池鹽井與百姓共之唐肅宗即位時兩京陷沒民物耗弊天下用度不足於是吳鹽蜀麻銅冶皆有稅市輕貨繇江陵襄陽上津路轉至鳯翔唐貞元元年河中尹薑師度以安邑鹽池漸涸開拓疏決水道置為鹽屯公私大收其利左拾遺劉彤請檢校海內鹽鐵之利從之彤上表曰臣聞漢孝武為政廄馬三十萬後宮數萬人外討戎夷內興宮室殫費之甚實百當今然而古費多而貨有餘今用少而財不足者何豈非古取山澤而今取貧人哉取山澤則公利厚而人歸於農取貧人則公利薄而人去其業故先王之作法也山海有官虞衡有職輕重有術禁發有時一則專農二則饒國濟人盛事也臣實為當今宜之夫煮海為鹽採山鑄鐵伐木為室豐餘之輩也寒而無衣飢而無食傭賃自資者窮苦之流也若能收山海厚利奪豐餘之人蠲調斂重徭免窮苦之子所謂損有餘而益不足帝王之道可不講乎然臣願陛下詔鹽鐵木等官各收其利貿遷於人則不及數年府有餘儲矣然後下寬貸之令蠲窮獨之徭可以惠羣生可以柔荒服雖戎狄降服堯湯水旱無足虞也奉天適變惟在陛下行之上令宰臣議其可否咸以鹽鐵之利甚益國用遂令將作大匠薑師度户部侍郎強循俱攝御史中丞與諸道按察使檢校海內鹽鐵之課至十年八月十日敕諸川所造鹽鐵每年合有官課比令使人勾當除此更無别求在外不細委知如聞稱有侵剋宜令本州刺史上佐一人檢校依令式收稅如有落帳欺沒仍委按察糾覺奏聞其薑師度除蒲州鹽池以外自餘處更不須巡檢唐有鹽池十八井六百四十皆𨽻度支蒲州安邑解縣有池五總曰兩池歲得鹽萬斛以供京師鹽州五原有烏池白池瓦窑池細項池靈州有溫泉池兩井池長尾池五泉池紅桃池回樂池𢎞靜池會州有河池三州皆輸米以代鹽安北都護府有胡落池歲得鹽萬四千斛以給振武天德黔州有井四十一成州嶲州井各一果閬開通井百二十三山南西院領之卭眉嘉有井十三劍南西川院領之梓遂綿合昌渝瀘資榮陵簡有井四百六十劍南東川院領之皆隨月督課幽州大同橫野軍有鹽屯每屯有丁有兵歲得鹽二千八百斛下者千五百斛負海州嵗免租為鹽二萬斛以輸司農青楚滄海棣杭蘇等州以鹽價市輕貨亦輸司農天寶至德間鹽每斗十錢乾元元年鹽鐵鑄錢使第五琦初變鹽法就山海井竈近利之地置監院遊民業鹽者為亭户免雜徭盜鬻者論法及琦為諸州權鹽鐵使盡𣙜天下鹽斗加時價百錢而出之為錢一百一十自兵起流庸未復稅賦不足供費鹽鐵使劉晏以為因民所急而稅之則國用足於是上鹽法輕重之宜以鹽利多則州縣擾出鹽鄉因舊監置吏亭户糶商人縱其所之江嶺去鹽逺者有常平鹽每商人不至則減價以糶民官收厚利而人不知貴晏又以鹽生霖潦則鹵薄暵旱則土溜墳乃隨時為令遣吏曉導倍於勸農吳越揚楚鹽廪至數千積鹽二萬餘石有漣水湖州越州杭州四場嘉興海陵鹽城新亭臨平蘭亭永嘉大昌侯官富都十監歲得錢百餘萬緡以當百餘州之賦自淮北置巡院十三曰揚州陳許汴州廬夀白沙淮西甬橋浙西宋州泗州嶺南兖鄆鄭滑捕私鹽者姦盜為之衰息然諸道加𣙜鹽錢商人舟所過有稅晏奏罷州縣率稅禁堰埭邀以利者晏之始至也鹽利歲才四十萬緡至大歷末六百餘萬緡天下之賦鹽利居半宫闈服御軍餉百官祿俸皆仰給焉明年而晏罷貞元四年淮西節度使陳少遊奏加民賦自此江淮鹽每斗亦增二百為錢三百一十其後復增六十河中兩池鹽每斗為錢三百七十江淮豪賈射利或時倍之官收不能過半民始怨矣劉晏鹽法既成商人納絹以代鹽利者每緡加錢二百以備將士春服包佶為汴東水陸運兩稅鹽鐵使許以漆器玳瑁綾綺代鹽價雖不可用者亦高估而售之廣虛數以罔上亭户冒法私鬻不絶巡捕之卒遍於州縣鹽估益貴商人乘時射利逺鄉貧民困高估至有淡食者巡吏既多官冗傷財當時病之其後軍費日增鹽價寖又貴有以榖數斗易鹽一升私糶犯法未嘗少息順宗時始減江淮鹽價每斗為錢二百五十河中兩池鹽斗錢三百增雲安渙陽塗澮三監其後鹽鐵使李錡奏江淮每斗減錢十以便民未幾復舊方是時錡盛貢獻以固寵朝廷大臣皆餌以厚貨鹽鐵之利積於私室而國用耗屈𣙜鹽法大壞多為虛估率千錢不滿百三十而已兵部侍郎李巽為使以鹽利皆為度支物無虛估天下糶鹽稅茶其贏六百六十五萬緡初歲之利如劉晏之季年其後則三倍晏時矣兩池鹽利歲收百五十餘萬緡四方豪商猾賈雜處解縣主以郎官其佐二皆御史鹽民田園籍於縣而令不得以縣民治之元和中皇甫鎛奏應管煎鹽户及鹽商并諸監院停場官吏所由等前後制敇除兩稅外不許差役追擾今請更有違越者縣令奏聞貶黜刺史罰俸再罰奏取旨施行從之貞元二十一年停鹽鐵使月進舊鹽鐵錢總悉入正庫以助給費而主北務者稍以時市珍玩時新物充進獻以求恩澤其後益甚歲進錢物謂之羡餘而給入益少及貞元末逐月有獻謂之月進及是而罷憲宗之討淮西也度支使皇甫鎛加劔南東西兩川山南西道鹽估以供軍貞元中盜鬻兩池鹽一石者死至元和中減死流天德五城鎛奏論死如初一斗以上杖背沒其車驢能捕斗鹽者賞千錢州縣團保相察比於貞元加酷矣自兵興河北鹽法羈縻而已至皇甫鎛又奏置𣙜鹽使如江淮𣙜法犯禁歲多元和十三年鹽鐵使程異奏應諸州府先請置茶鹽店收稅伏準今年正月赦文諸州府因用兵以來或慮有權置職名及擅加科配事非常禁一切禁斷者伏以𣙜稅茶鹽本資財賦贍濟軍鎮蓋是從權兵罷自合便停事久實為重斂其諸道先所置店及收諸色錢物等雖非擅加且異常制伏請凖赦文勒停從之按皇甫鎛程異皆聚斂小人元和十三年則憲宗平淮西之後浸以驕侈二人以進羡餘有寵為相之時也然鎛加鹽估峻𣙜法靡所不至而異能上此奏猶為彼善於此史稱異自知不合衆心能亷謹謙退為相月餘不敢知印秉筆故終免於禍觀此奏亦其一節也穆宗時田宏正舉魏博歸朝廷乃命河北罷𣙜鹽戶部侍郎張平叔議𣙜鹽法敝請官自賣鹽可以富國詔公卿議其可否中書舍人韋處厚兵部侍郎韓愈條詰之以為不可遂不行愈奏略謂平叔請今州府差人自糶官鹽可以獲利一倍臣以為城郭之外少有見錢糴鹽多用雜物貿易鹽商則無物不取或賖貸徐還用此取濟兩得利便今令吏人坐鋪自賣利不關己罪則加身非得見錢必不敢受如此則貧者無從得鹽自然坐失常課如何更有倍利又欲令人吏將鹽家至户到而糶之必索百姓供應搔擾極多有貧家食鹽至少或有淡食動經旬月若據口給鹽依時徴價官吏畏罪必用威刑臣恐所在不安此尤不可之大者平叔又云浮寄姦猾者轉富土著守業者日貧若官自糶鹽不問貴賤貧富四民僧道并兼遊手因其所食盡輸官錢并諸道軍諸使家口親族遞相影占不曽輸稅若官自糶鹽此輩無一人遺漏者臣以為此數色人等官未糶鹽之時從來糴鹽而食不待官自糶然後食鹽也國家𣙜鹽糶與商人商人納𣙜糶與百姓則是天下百姓無貧富貴賤皆已輸錢於官矣不必與國家交手付錢然後為輸錢於官也時奉天鹵池生水柏以灰一斛得鹽十二斤利倍鹻鹵文宗時采灰一斗比鹽一斤論罪開成末詔私鹽月再犯者易縣令罰刺史俸十犯則罰觀察判官課料宣宗即位茶鹽之法益密糶鹽少私盜多者謫觀察判官不計十犯户部侍郎判度支盧𢎞正以兩池鹽法敝遣巡院官司空輿更立新法其課倍入遷𣙜鹽使以壕籬者鹽池之隄禁有盜壤與鬻鹻皆死鹽盜持弓矢者亦皆死刑兵部侍郎判度支周墀又言兩池鹽盜販者迹其居處保社按罪鬻五石市二石亭户盜糶二石皆死是時江吳羣盜以所剽物易茶鹽不受者焚其室廬吏不敢枝梧鎮戍場鋪堰埭以關通致富宣宗乃擇嘗更兩畿輔望縣令者為監院官户部侍郎裴休為鹽鐵使上鹽法八事其法皆施行兩池𣙜課大增其後兵遍天下諸鎮擅利兩池為河中節度使王重榮所有歲貢鹽三千車中官田令孜募新軍五十四都餫轉不足仍倡議兩池復歸鹽鐵使而重榮不奉詔至舉兵反僖宗為再出然而卒不能奪後唐同光三年敇魏府每年所徴隨絲鹽錢每兩與減放五文逐年俵賣蠶鹽食鹽大鹽甜次冷鹽每斗與減五十欒鹽與減三十天成元年敇諸州府百姓合散蠶鹽二月內一度俵散依夏稅限納錢晉天福元年敇京洛管內所配人户食鹽起來年每斗放減十文七年宣旨下三司應有往來鹽貨悉稅之過每斤七文住稅每斤十文其諸道應有保屬州府鹽務並令省司差人勾當先是諸州府除俵散蠶鹽徵錢外每年末鹽界分場務約糶錢一十七萬貫有餘言事者稱雖得此錢百姓多犯鹽法請將上件食鹽錢於諸道州府計户每户一貫至二百為五等配之然後任人逐便興販既不虧官又益百姓朝廷行之諸處場務且仍舊俄而鹽貨頓賤去出鹽逺處州縣每斤不過二十掌事者又稱驟改其法奏請重置稅焉蓋欲絶興販歸利於官場院糶鹽雖多人户鹽錢又不放免民甚苦之按鹽之為利自齊管仲發之後之為國者𣙜利日至其初也奪竈户之利而官自煮之甚則奪商販之利而官自賣之然官賣未必能周遍而細民之食鹽者不能皆與官交易則課利反虧於商稅於是立為𧖟鹽食鹽等名分貧富五等之户而俵散抑配之蓋唐張平叔所獻官自賣鹽之策而昌黎公所以駁議之者其慮已略及此矣逮其極弊也則官復取鹽自賣之别取其錢而人户所納鹽錢遂同常賦無名之橫斂永不可除矣當時江南亦配鹽於民而徴米在後鹽不給而徵米如故其弊歷三百年而未除宇縣分割國自為政而苛斂如出一轍異哉周廣順二年敕令慶州𣙜鹽務今後每青鹽一石依舊抽稅錢八百八十五陌鹽一斗白鹽一石抽稅錢五百八十五陌鹽五升此外不得别有邀求青白鹽池在鹽州北唐朝元管四池曰烏池白池瓦窑池細項池今出稅置吏唯有青白二池敕諸色犯鹽麴五斤以上並重杖處死以下科斷有差刮鹻煎錬私鹽所犯一斤以上斷死以下科斷有差人户所請𧖟鹽祗得將歸裛繭供食不得博易貨賣違者照私鹽科斷州城縣鎮郭下人户係屋稅合請鹽者若是州府並於城內請給若是外縣鎮郭下人户亦許將鹽歸家供食仰本縣預取逐户合請鹽數目攢定文帳部領人户請給勒本處官吏及所在場務同點檢入城若縣鎮郭下人户城外别有莊田亦仰本縣預先分擘開坐勿令一處分給供使三年敕諸州府并外縣鎮城內其居人屋稅鹽今後不俵其鹽錢亦不徵納所有鄉村人户合請𧖟鹽所在州城縣鎮嚴切檢校不得放入城門顯德元年上謂侍臣曰朕覽食末鹽州郡犯私鹽多於顆鹽界分蓋卑濕之地易為刮鹽煎造豈惟違我𣙜法兼又汚我好鹽况末鹽煎錬搬運費用倍於顆鹽今宜分割十餘州令食顆鹽不唯輦運省力兼亦少人犯禁自是曹宋已西十餘州皆食顆鹽種者曰顆鹽出解州煮者曰末鹽出瀕海三年敕漳河已北州府管界元是官場糶鹽今後除城郭草市內仍舊禁法其鄉村並不許鹽貨通商逐處有鹹鹵之地一任人户煎錬興販則不得踰越漳河入不通商界五年既取江北諸州唐主奉表入貢因白帝以江南無鹵田願得海陵鹽監南屬以贍軍帝曰海陵在江北難以交居當别有處分乃詔歲支鹽三十萬斛以給江南士卒稍稍歸之宋朝之制顆鹽出解州安邑解縣兩池以戶民為畦夫悉蠲其他役每歲自三月一日墾畦四月始種八月乃罷官廪給之安邑池每户歲種鹽千席解池減二十席至道二年兩池得鹽三十七萬三千五百四十五席席一百一十六斤半此其最多之數也大中祥符九年四月陜西轉運張象中言兩池見貯鹽三千二百七十六席計三億八千八百八十二萬八千九百二十八斤計直二千一百七十六萬一千八十貫慮尚有遺利望行條約上曰地財之阜此亦至矣若過求增羡慮有時而闕不可許也募兵百人目為護寶都以巡邏之以給本州及三京京東之齊兖曹濮單鄆州廣濟軍京西之滑鄭陳潁汝許孟州陜西之河中府陜虢州慶成軍河東之晉絳慈隰州淮南之宿亳州河北之懷州及澶州諸縣之在南河者鄆齊宿州舊食末鹽建隆二年以泝流輦運勞費始改食顆鹽末鹽煮海則楚州鹽城監歲煮四十一萬七千餘石通州豐利監四十八萬九千餘石泰州海陵監如臯倉小海場六十五萬六千餘石給本州及淮南之廬和舒蘄黃州無為軍江南之江寧府宣洪袁吉筠江池太平饒信歙撫州廣德臨江軍兩浙之常潤湖睦州荆湖之江陵府安復潭鼎鄂嶽衡永州漢陽軍廬和舒蘄黃州漢陽軍舊通商太平興國二年始令官賣信歙舊食兩浙鹽後改焉江浙舊皆禁九年鹽鐵使王眀請開禁計嵗賣鹽錢五十三萬五千餘貫二十八萬七千餘貫給鹽與民隨稅收其錢二十四萬餘貫商人販易收其算雍熙二年六月依舊禁止海州板浦惠澤洛要三場歲煮四十七萬七千餘石漣水軍海口場十一萬五千餘石以給本州軍及京東之徐州淮南之光夀濠泗州兩浙之杭蘇湖常潤州江隂軍密州濤洛場歲煮三萬二千餘石以給本州及沂濰州杭州場歲煮七萬七千餘石眀州昌國東西監三十萬一千餘石秀州場二十萬八千餘石溫州天富南北監密纓永嘉二場七萬四千餘石台州黃巖監一萬五千餘石以給本州及越處衢婺州越州舊有鹽潤監嵗煮三千餘石後罷福州長清場嵗煮五百一萬五千餘斤以給福建路初得福建即禁鹽太平興國八年開其禁後復禁之建劍汀嘗食兩浙鹽後改就本路廣州東莞靜安等十三場歲煮二萬四千餘石以給本州及封康英韶端潮連賀恩新惠梅循南雄州西路之昭桂州江南之南安軍舊潮州有松口等四場歲煮以給本州及梅循二州雍熙四年廢廉州白石石康二場歲煮一百五十萬斤以給本州及容白欽化蒙龔藤象宜栁雍潯貴賔梧橫南儀鬱林州又高竇春雷融瓊崖儋萬安州各煮以給本州無定額大率煮海有亭户鹽丁鬻於官或折租稅亦有役軍士定課煮者通泰亭户每一石并耗三石給錢五百文以布帛茶米充直民甚苦之開寶七年始詔並給實錢初平嶺南令民煮鹽以百一十斤為石給錢二百後廉州言鹽田荒穢民新鋤治舊鹽課月八石至三石凡五等不能充其數望差減之詔蠲其半又有濵州場嵗煮二萬一千餘石以給本州及棣祁州雜支并京東之青淄齊州舊濵棣二州禁𣙜雍熙二年令通商煮井者益州路則陵井監及二十八井歲煮一百十四萬五千餘斤乾德五年偽蜀知陵井監任元吉始請鑿五井煮鹽是嵗得八十萬斤擢元吉永清令是後寖增其數綿州二十四萬餘斤邛州九井二百五十萬斤眉州一井一萬餘斤簡州十九井二十七萬斤嘉州十五井五萬九千餘斤雅州一井一千六百餘斤漢州一井五百餘斤梓州路則梓州一百四十八井三百六十六萬餘斤資州九十四井六十四萬二千餘斤遂州三十五井四十一萬六千餘斤果州四十三井十四萬六千餘斤普州三十八井二十二萬九千餘斤昌州八井四萬餘斤瀘州淯井監及五井七十八萬三千餘斤富順監十四井一百一十七萬三千餘斤利州路則閬州一百二十九井六十一萬餘斤夔州路則夔州永安監十一萬七千餘斤忠州五井五十一萬三千餘斤逹州三井十九萬餘斤萬州五井二十萬九千餘斤黔州四井二十九萬七千斤開州一井二十萬四千斤雲安軍雲安監及一井八十一萬四千餘斤大寧監一井一百九十五萬餘斤以各給本路監則官掌井則土民斡鬻如數輸課聽往旁境販賣唯不得出川峽川峽鹽初承偽制官鬻之開寶七年詔斤十錢又令斡鬻其羡利者但輸十之九太平興國三年右拾遺郭泌上言劍南諸州官糶鹽斤為錢七十鹽井濬深煮鹽極苦樵薪益貴輦置彌艱加以風水之虞或至漂喪而豪民黠吏相與為姦賤糴於官貴糶於民至有斤獲錢數百者有司虧失嵗額而民間不得賤鹽望稍增舊價為百五十文則豪猾無以規利民有望以給食矣從之有司言昌州嵗收虛額鹽萬八千五百餘斤乃開寶中知州李佩率意掊斂以希課最廢諸井薪錢於嵗額外課部民煮鹽民不習其事甚以為苦至破産不能償其數多流移入他部而積年之征不可遽免欲均於諸州作兩稅草估錢米以輸官詔悉除之其舊額二萬七千六十斤即令井户煮焉端拱元年七月以西川食鹽不足許商人販階文州青白鹽陜路井鹽永康軍崖鹽入川勿收算大中祥符元年十二月詔瀘州南井竈户過正至寒食各給假三日所收日額仍與除放三年正月減瀘州淯井監課鹽三之一煮鹵者并州永利監本名河東𣙜鹽院咸平四年改名歲煮十二萬五千餘石以給本州及欣代石嵐憲遼澤潞麟府州威勝岢嵐火山平定寧化保德軍許商人販賣如川峽之制凡顆末鹽皆以五斤為斗顆鹽賣價每斤自四十四至三十四錢有三等末鹽賣價每斤自四十七至八錢有二十一等開寶初嘗詔諸州賣鹽斤六十錢者減為五十四十者為三十後顆鹽減至四十四九年又減四錢太平興國初新禁𣙜之地以轉送回逺又有增顆鹽至五十末鹽至四十錢處至道二年楊允恭等復請定和州無為軍斤三十六舒廬州加二錢蘄黃濠夀州又加二錢安復州又加二錢止於四十四錢至道末賣顆鹽錢七十二萬八千餘貫末鹽一百六十三萬三千餘貫凡禁𣙜之地官立標識候望以曉民其顆鹽通商之地京西則蔡襄鄧隨唐金房均郢州光化信陽軍陜西則京兆鳳翔府同華耀乾商涇原邠寧儀渭鄜坊丹延環慶秦隴鳳階成州保安鎮戎軍舊緣邊諸州兼食烏白池之青白鹽淳化三年陜西轉運鄭文寶以李繼遷叛逆請禁止之許商人販解池鹽可以資國計詔可自陜以西收私市者抵死其後戎人乏食復商販解鹽利薄多取他徑趣唐鄧以邀善價吏不能禁關隴民無鹽食四年八月除其禁咸平中有請官運解鹽就邊州置吏鬻之命度支使梁鼎馳往經畫度支員外郎李士衡上言輦運勞民非便請行解鹽通商從之而以舊𣙜年額錢分配諸州隨稅輸納景德三年士衡又言京兆同華耀錢額多請減十之二詔悉除之及澶州諸縣之在河北者蔡襄等州及安復商州舊通商太平興國初令商蔡食解鹽餘食海鹽並官賣後以運路不通復許通商唯安復則禁之末鹽通商之地京東則登萊州河北則大名真定府貝冀相衛邢洺深趙滄磁德博棣祁定保瀛莫雄霸州德清通利永靜乾寧定逺保定廣信安肅永定軍河北舊禁鹽建隆四年始令邢洺磁鎮冀趙六州城外二十里通行鹽商開寶三年悉罷𣙜官收其算斤一錢往賣者倍之舊𣙜利錢均賦城郭居民及門户形要户隨夏稅輸之亦差減舊數五代時鹽法太峻建隆二年始定官鹽闌入禁法貿易至十斤煮鹻至三斤乃坐死民所受蠶鹽以入城市三十斤以上徒三年增闌入三十斤煮鹻至十斤坐死蠶鹽入城市百斤以上奏裁自後每詔優寬至太平興國二年乃詔闌入至二百斤以上煮鹻及主吏盜販至百斤以上蠶鹽入城市五百斤以上並黥面送闕下止齋陳氏曰國初鹽莢只聽州縣給賣歲以所入課利申省而轉運司操其贏以佐一路之費初未有客鈔也雍熙二年三月令河東北商人如要折博茶鹽令所在納銀赴京請領交引蓋邊郡入納算請始見於此端拱二年十月置折中倉令商人入中斛斗給茶鹽鈔蓋在京入中斛斗算請始見於此天聖七年令商人於在京𣙜貨務入納錢銀算請末鹽蓋在京入納見錢算請始見於此而解鹽算請始天聖八年福建廣東鹽算請始景祐二年京師歲入見錢至二百二十萬諸路斛斗至十萬石見是年八月淮南江浙荆湖福建等路提舉鹽事朱某奏祖宗之意慮客鈔行而州縣之鹽不足則為之限制至道二年二月敇江浙淮南官賣鹽並赴永豐鹽城監般請其海陵監應副客人至解鹽則以唐鄧商均等十一州為在京入納金銀交引地分永興鳳翔等二十五州為陜西入納糧草交引地分可謂詳密矣熙豐新法增長鹽價福建路祖額賣鹽收到二十七萬三百餘貫自推行鹽法於元豐二年收到四十六萬五千三百餘貫三年收六十萬餘貫見轉運司賈青奏河北路自元豐七年正月推行鹽法至十一月終收鹽息錢二十六萬五千貫充便糴司糴本見元豐八年四月六日敕可以略見當時鹽課於是河北復官鹽而廣鹽亦通入江湖置使糴司以所封樁諸路增剩鹽利錢充糴本元祐裁損剩數且罷封樁三年令任公裕裁定增損九路鹽價未幾復新法紹聖三年二月江湖淮浙六路通算鈔引見錢充足元祐八年年額外有增收到五分入朝廷封樁五分轉運司元符元年九月令福建準此崇寧元年二月敕鹽鈔每一百貫於在京入納九十五貫於請鹽處納充鹽本其紹聖三年五分指揮不行自二年十二月行法至三年十一月在京已及一千二百餘萬貫遂盡罷諸路官以鹽鈔每百貫撥一貫與轉運司於是東南官賣與西北折博之利盡歸京師而州縣之橫斂起矣開寶七年詔三司校諸州鹽麴市征課而殿最之令諸州知州通判官兵馬都監縣令所掌鹽麴及市征地課等並親臨之月具籍供三司秩滿較其殿最欺隱者置於法募告者賞錢三十萬止齋陳氏曰太平興國以後雖有比較歲入增虧酬奬之法而纍朝多不果行至景德以後且有諸鹽場監受課出剩不得理為勞績嘉祐赦文又申嚴希求恩賞苛阻商旅之禁至熙寧五年始令逐年轉運司每歲比較州縣鹽酒課利最多最少者兩處開坐增虧及知通令尉名銜聞奏當行賞罰合黜者不以去官赦降原減雍熙四年禁代州寶興軍等處民私市北敵骨堆渡及桃山鹽犯者論罪有差雍熙後以用兵乏饋餉令商人輸芻粟塞下增其直令江淮荆湖給以顆末鹽端拱二年置折中倉聽商人輸粟京師優其直給江淮茶鹽咸平四年十月祕書丞直史館孫冕上言曰茶鹽之制利害相須若或江南荆湖通商賣鹽緣邉折中糧草在京納金銀錢帛則公私皆便為利實多今若便放行即南中州軍且令官賣商人既已入中候其换易交引往至亭場川路修遐風波阻滯計須二年以上方到江潭未即間官賣鹽課已倍獲利入縱其坌集稍侵官賣之額然以增補虧於官無損緣邊入中又委輸愈多况三路官賣舊額止百三十萬貫臣計在北所入已多在南所虧至少舊額錢數必甚增盈其淮南禁鹽有長江之限但嚴切警巡眀立賞罰則官賣鹽課必不虧懸設使淮南因江南荆湖通商之後官吏怠慢或至年額稍虧則國家以折中糧草贍得邊兵以中納金銀實之官庫且免和雇車乘差優户民冒涉凛寒經歷遐逺借加荆湖運錢萬貫淮南運米千石地里腳力送至窮邊則官費民勞何啻數倍詔吏部侍郎陳恕等議其事恕等上議曰江湖之地素來官自賣鹽禁絶私商良亦有以蓋由近煮海之地自犯禁之人官得緡錢頗資經費且江湖之壤租賦之中榖帛雖多錢刀蓋寡每歲買茶入𣙜市銅鑄錢凖糧斛以益運輸平金銀以充貢入乃至京師便易南土支還贍用之名實籍鹽錢佽助居常度費猶或闕供今若悉許通商則必頓無儲擬未有别錢備用鹽法詎可更張且變制改圖事非細故若匪官鹽住賣則又私商不行即令住賣官鹽立乏一年課額况行商算畫必務十全豈有江湖官猶賣鹽邉塞私肯入粟假令敢入私物獲請官鹽首初運到江湖必須官私競貿既而官價高大私價低平多糶商鹽則官鹽不售並依官價則私價太高公私兩途矛盾不已則官利失而私商困矣况不即住賣而望商人入中藁粟者未之有也既入中藁粟而望課利不虧者亦未之有也向者淮南通商亦於邊上折中一歲之內入數甚微糧則不及萬鍾草則多無一束近者陜西鹽法亦令納秸資邉一年之間數亦無幾全亡實驗但有虛名江湖若放通商淮南亦須撤禁三處既私商雜擾兩浙必官鹽流離透漏浸淫禁不可止乍變易則江湖為首終紊亂則淮浙相兼大失公儲莫救邊備若以施之於今日竊恐未為叶宜也詔從之𣙜礬者唐於晉州置平陽院以收其利開成三年度支奏罷之以礬山歸州縣五代以來創務置官吏宋朝之制白礬出晉慈坊州無為軍汾州之靈石縣無為軍場曰崑山自大中祥符元年後以停積頗多權罷煮造靈石場至道初廢景德元年復置大中祥符八年又廢其礬徙就晉州慈州場曰芥泉緑礬出慈隰州池州之銅陵縣隰州場太祖時以地接河東偽竟罷之太平興國八年本州牙吏卜美請募工造鑊煮礬輸官課詔從其請銅陵場雍熙二年廢天禧五年復置又汾州靈石亦有緑礬各置官典領有鑊户煮造入官市晉汾慈州礬以一百四十斤為一馱給錢六十給見錢三之二餘凖以茶絲隰州礬馱減三十斤給錢八百賣博白緑礬汾州每馱二十四貫五百慈州又增五百隰州每馱四貫六百皆博賣於人又有散賣者白礬坊州斤八十錢汾州百九十二錢無為軍六十錢緑礬斤七十錢至道中白礬歲課九十七萬六千斤緑礬四十萬五千餘斤賣錢十七萬餘貫真宗末白礬增二十萬一千餘斤緑礬增二萬三千餘斤賣錢增六萬九千餘貫建隆三年詔禁商人私販幽州礬官司嚴捕沒入之其後定令私販河東幽州礬一兩以上私煮礬三斤及盜官礬至十斤者棄市開寶三年二月增私販至十斤私煮及盜滿五十斤者死餘論罪有差太平興國初以歲鬻不充有司請嚴禁法詔私販化外礬一兩以上及私煮至十斤並如律論決而再犯者悉配流逺復犯者死淳化元年有司言慈州官礬滯積蓋小民多就山谷僻奧處私煮以侵其利而緑礬價錢不可以晉州礬均法詔如犯私茶論罪建隆時命晉州制置礬務許商人輸金帛絲綿茶及緡錢官以礬償凡歲增課八十萬貫淳化初有司言國家以見錢酬礬直商客以陳茶入博有利豪商無資國用請今後惟以金銀見錢入博從之止齋陳氏曰太祖礬禁為契丹北漢設也其後并鹽酒皆𣙜之非本意也文獻通考卷十五
