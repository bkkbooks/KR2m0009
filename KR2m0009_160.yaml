body:
  text: 文獻通考卷一百六十鄱陽馬端臨貴與著兵考十二馬政宋初有左右飛龍二院以左右飛龍使各二人分掌之時諸州監牧多廢國馬無復孳息太祖始置飬馬二務又興葺舊馬務四以為放牧之地分遣中使詣邉州嵗市馬自是閑廐之馬始備矣先是兩河入邊界盗馬邉吏籍數以聞官給其直上方鎮撫不容私掠乃詔禁之悉還所盗馬戎人悦服太宗太平興國四年詔市吏民馬十七萬匹以備征討是嵗平太原觀兵於幽州得汾晉燕薊之馬四萬二千餘匹國馬增多内皁充牣始分置諸州牧飬之國子博士李覺上言曰夫冀北燕代馬之所生胡戎之所恃也故制敵之用實兵騎為急議者以為欲國之多馬在乎㗖戎以利使重譯而至焉然市馬之費歳益而廐牧之數不加者盖失其生息之理也且戎人畜牧轉徙旅逐水草騰駒游牝順其物性由是寖以蕃滋也暨乎市易之馬至於中國則縶之維之飼以枯藁離析牝牡制其生性元黄虺隤因而減耗宜然矣又有不同中國之馬服習成性食枯芻處華廐率以為常故多生息而無耗失古者田賦之法六十四井出戎馬四匹兵車一乗牛十二頭天子畿方千里提封百萬井除山川城池邑居苑囿凡三十六萬井不輸賦外六十四萬井出戎馬四萬匹兵車萬乗此賦馬之數也諸侯大者馬四千匹兵車千乘故稱千乘之國卿大夫者馬四百匹兵車百乗故稱百乗之家則天下之廣諸侯之衆戎馬之賦多矣是以唐堯暨晉皆處河北而北虜不能為患由馬之多也此並取於田賦不聞市馬於戎也洎秦壞井田漢興阡陌兵車不取田賦戎馬悉從官給是以匃奴歷年為患由馬之少也故鼂錯説文帝勸農功令民有車騎馬一匹者復卒三人謂免三人甲卒之賦也至武帝七十年間衆庶街巷有馬阡陌之間成羣乗牸牝者擯而不得㑹聚此則馬皆生於中國不聞市之於戎也今軍伍中牝馬甚多而孳息之數尤鮮者何也皆云官給秣飼之費不充又馬多産則羸弱駒能食則侵其芻粟馬母愈瘠飬馬之卒有罪無利是以駒子生乃驅令齅灰而死其後官司知有此蠧於是議及飬駒之卒量給賞緡其如所賜無幾而尚習前弊今竊揣量國家所市戎馬直之少者匹不下二十千徃来資給賜與復在數外是貴市於外夷而賤棄於中國非理之得也國家縱未暇别擇之牝馬以分畜牧宜且減市馬之半直賜畜駒之將卒増為月給俟其納馬則止焉則是貨不出國而馬有滋也大率牝馬二萬而駒收其半亦可歲獲萬匹况復牝以生牝駒以生駒十數年間馬必倍矣昔猗頓窮士也陶朱公教以畜五牸乃適西河大畜牛羊於猗頓之南十年之間其息無筭况以天下之馬而生息乎上覽奏嘉之淳化二年通利軍上十牧草地圖上慮畜牧之地多侵民田乃遣中使檢視畫其疆界又從内侍趙守倫之請於諸州牧龍坊畜牝馬萬五千匹逐水草放牧不費芻秣所生駒子可資用自是諸牧馬頗蕃息真宗咸平元年别置佑馬司掌戎人驅馬至京師辨其良駑平直以市分給諸監牧飬三年置制置羣牧使以内臣勾當制置羣牧司京朝官為判官景徳二年改諸州牧龍坊悉為監賜名鑄印以給之四年以知樞密院陳堯叟為羣牧制置使又置羣牧使副都監增判官為二員凡廐牧之政皆出於羣牧司自騏驥院而下皆聼命焉其二院所管坊監仍舊諸州有牧監知通判兼領之諸監各置勾當官二人又有左右廂提㸃並以三班為之其修創規制纎悉備具其後又詔左右騏驥院諸坊監監官自今並以三年為滿如習知馬事欲留者羣牧司保薦以聞當徙涖他監議者言罷兵之後頗以國馬煩耗歳費縑繒雖市得尤衆而損失亦多堯叟謂羣牧之設國家巨防今愚淺之説以馬為不急之務則士卒亦當遣而還農也作監牧議以獻勒石大名監自是率以樞臣専領以重其事凡市馬之處河東則府州岢嵐軍陜西則秦渭涇原儀環慶階文州鎮戎軍川峽則益黎戎茂雅䕫州永康軍皆置務遣官以主之歳得五千餘匹以布帛茶他物凖其直舊運銅錢給之太平興國八年有司言戎人得錢悉銷鑄為器乃定此制其後諸州市蕃馬給直漸髙務增數以為課績景徳中戎事已怠因詔條約之招馬之處秦渭階文之吐蕃回紇麟府之党項豐州之藏才族環州之白馬鼻家保家名市族洎涇儀延鄜火山保安軍唐龍鎮制勝關之諸蕃每歳皆給以空名勅書委沿邉長吏擇牙吏入蕃招募給劵詣京師至則估馬司定其直自三十五千至千凡二十三等舊選三歳至十七歳者景徳二年詔止市四歳至十三歳者餘聼私市其蕃部又有直進者自七十五千至十七千凡三等有獻尚乗者自百一十千至六十千亦三等凡畜馬處有兩院曰左右騏驥四監曰天駟左右第一第二二坊曰左右天廐皆在京師在外有十四監大名大名廣平洺州淇水衛州並分第一第二洛陽河南原武鄭州沙苑同州安陽相州鎮寜澶州安國邢州淳澤中牟單鎮許州又有牧飬上下監以飬療京城諸坊監病馬其孳生之所即大名洺衞相州凡七監多擇善馬為種牝牡為羣歳遣判官一人廵行㸃印二歳已上者歳約八千餘匹凡京城諸州飼馬兵校一萬六千三十八人坊監及諸軍馬二十餘萬每歳京城草六十六萬六千圍麩料六萬二千二百四石鹽藥油糖九萬五千餘斤石枚諸州諸軍不預焉左右騏驥院六坊上留馬二千餘皆季春出就放牧至秋冬而入其尚乗之馬唯備用者在焉諸班不自出馬寄兩院其牧地始自畿田及於近郡皆遣使分行水草善地而標占之諸坊監總四萬九千四百餘頃諸班諸軍又三萬九百九十頃皆有凉棚井泉所屬縣令檢校之外坊監亦有四時逐水草以肆游牝者凡御馬有三等其次給用又有十六等曰簡中馬曰不得支使馬曰添價馬曰國信馬曰臣僚馬景徳四年詔羣臣常賜廐馬者命中使簡定六十匹賜之賜畢復増常足其額又内職受命出使者多求賜馬大中祥符三年以其例或不均詔樞宻院定羣臣出使賜馬條例曰諸軍班馬曰御龍直馬捧日龍衞馬曰拱聖馬曰驍騎馬曰雲武馬天武龍猛馬曰雜配軍馬曰雜使馬曰馬鋪馬國初諸州廐置闕馬取民馬補之開寳五年詔罷自恩賜外皇族及内臣伎術官要司職掌皆給借之凡馬以府州為最盖生於子河汊有善種次環慶次秦渭雖骨格稍大而蹄薄多病文雅諸州為下止給本處兵契丹馬骨格頗多河北孳生謂之本羣馬盖因其水土服習而少疾焉又泉福州興化軍亦有洲嶼馬皆低弱不勝具裝苐以給本道廂軍及江浙驛置之用福州四牧曰水峭龍胡瀝﨑海澶泉州二牧曰浯州列嶼興化軍二牧曰東越猴嶼舊十一牧大中祥符二年廢湄州嶼南匿三牧每牧置羣頭牧户以主之毎歳孳育本縣籍其數以使臣一人提㸃大中祥符元年立牧監賞罰之令外監息馬一歳終以十分為率死一分以上勾當官罰一月俸餘等第决杖牧倍多而死少者給賞緡有差凡生駒一匹兵校而下賞絹一疋是歳於京師置賣馬務掌受退馬而出市之天禧初宰相向敏中言國馬之數方先朝倍多廣費芻粟若令羣牧司度數出賣散於民間緩急取之猶外廐耳是秋乃詔十三歳以上配軍馬估直出賣仁宗景祐二年詔民間無以馬數升户等康定初陜西用兵馬騎不足詔京畿京西淮南陜西路括市戰馬自四尺六寸至四尺二寸其直自五十千至二十千凡五等敢輙隐者重寘之法皇祐五年丁度上言天聖中牧馬至十餘萬其後言者以為天下無事而事虛費遂廢八監然而秦渭環階麟府州大山保徳岢嵐軍歳市馬二萬二百才能補京畿塞下之闕自用兵四年而所市馬才三萬况河北河東京東京西淮南籍丁壯為兵請下令有能畜一戰馬者免二丁仍不升户等以備緩急如此國馬蕃矣言不果行至和二年羣牧使歐陽修言今之馬政皆因唐制而今馬多少與唐不同者其利病甚多不可概舉至於唐世牧地皆與馬性相宜西起隴右金城平凉天水外洎河曲之野内則岐豳涇寜東接銀夏又東至於樓煩此唐飬馬之地也以今考之或䧟沒夷狄或已為民田皆不可復得惟聞今河東路嵐石之間山荒甚多及汾河之側草地亦廣其間草軟水甘最宜牧飬此乃唐樓煩監地也可以興置一監臣以為推迹而求之則樓煩元池天池三監之地尚兾可得又臣徃年奉使河東嘗行威勝以東及遼州平定軍見其不耕之地甚多而河東一路山川深峡水草甚佳其地髙寒必宜馬性及京西路唐汝之間乆荒之地其數甚廣請下河東京西轉運司遣官訪草地有可以興置監牧則河北諸監有地不宜馬可行廢罷至於估馬一司利害易見若國家廣捐金帛則劵馬利厚来者必多若有司惜費則蕃部利薄馬来寖少然而招誘之方事非一體請遣羣牧司或禮賔院官一人至邉訪蕃部劵馬利害以此三者參酌商議庶不倉卒輕為改更天子下其奏相度牧馬所奎等請如修奏神宗即位留意馬政於是樞宻副使邵亢請以牧馬餘田修稼政以資牧飬之利而羣牧司言馬監草地四萬八千餘頃今以五萬為率一馬占地五十畝大名廣平四監餘田無㡬宜且仍舊而原武單鎮洛陽沙苑淇水安陽東平等監餘良田萬七千頃可賦民以收芻粟從之又詔河南北分置監牧使以劉航崔台符為之又置都監各一員其在河南者為孳生監凡外諸監並分屬兩使各條上所當施行者諸監官吏若牧田縣令佐並委監牧使舉劾專隸樞宻院不隸於羣牧制置二年詔括河南監牧司總牧地舊籍六萬八千頃而今籍五萬五千餘數皆隐於民自是請以牧田賦民者紛然而諸監尋廢是歳天下應在馬凡十五萬三千六百有竒五年廢太原監七年廢東平原武監而合淇水兩監為一八年廢河南北八監惟存河苑一監而兩監牧司亦罷河苑監先以隸陜西提舉監牧至是復屬之羣牧司云時諸監牧田大抵皆寛衍為人所冒占故議者争請收其餘資以佐芻粟言利者乗之始以増廣賦入為務始議監時羣牧制置使文彦博言議者欲賦牧地與民而歛租課散國馬於編户而責孳息非便詔元絳蔡確較其利害上之於是中書樞宻院言河南北十二監起熈寧二年至五年歳出馬一千六百四十匹可給騎兵者二百六十四餘僅足配郵𫝊而兩監牧吏卒雜費及所占地租歳為緡錢五十三萬九千有竒計所出馬為錢三萬六千四百餘緡而已今九監見馬三萬若更制則日就損耗於是卒廢之以其善馬分隸諸監餘馬皆斥賣收其地租給市易本錢之外寄籍常平出子錢以為市馬之直監兵五千以為廣固指揮修治京城焉後遂廢髙陽真定太原大名定州五監凡廢監錢歸市之外又以給熈河歳計諸監既廢游田司請廣行淤溉増課以募耕者而河北制置牧田所繼言牧田沒於民者五千七百餘頃乃嚴侵冒之法而加告獲之賞是利入増多元豐三年收廢監租錢遂至百十六萬自羣牧使而下賜賚有差河北察訪使者曽孝寛言慶歴中嘗詔河北民户以物力飬馬備非時官買乞參考申行之而户馬法始此自諸監既廢仰給市馬而義勇保甲馬復從官給議者常患國馬未備元豐三年春以王拱辰之請乃召開封府界京東西河北陜西河東路州縣户各計資産市馬坊郭家産及三千緡鄉村五千緡若坊郭鄉村通及三千緡以上者各飬一馬増倍者馬亦如之至三匹止馬以四尺三寸以上齒以八歳以下為斷齒及十五歳則更市如初提舉司籍記之於是諸道各以其數来上開封府界四千六百九十四河北東路六百一十五西路八百五十四秦鳳等路六百四十二永興路一千五百四十六河東路三百六十六京東東路七百一十七西路九百二十二京西南路五百九十九北路七百一十六時初立法帝慮商賈乗民期㑹髙馬直以專利命出羣牧司驍騎以上千匹與飬馬户交市以平其價先是熈寜中嘗令徳順軍蕃部飬馬帝問其利害王安石對今坊監以五百緡乃得一馬若委之熈河蕃部决當不至重費蕃部以畜牧為生且其地宜馬誠為便利既而得駒庳劣亡失者責償蕃部苦之其法尋廢至是環慶路經略司復言已誘勸諸蕃部令飬馬詔閲實及格者一匹支五縑鄜延秦鳯涇原路准此飬馬之令復行於蕃部矣已而西方用兵頗調户馬以給戰騎借者給還死者償直七年六月遂詔河東鄜延環慶路各發户馬二千以給正兵河東就給本路鄜延益以永興軍等路及京西坊郭馬環慶益以秦鳳等路及開封府界馬户既配兵後遂不復補京東西既更爲保馬而諸路飬馬指揮至八年四月乃罷然其後行給地牧馬則猶本於户馬之意云五年五月詔開封府界諸縣保甲願飬馬者聼仍以陜西所市馬選給之六年又詔司農寺立飬馬法於是曽布等上其條約凡五路義勇保甲願飬馬者户一匹物力髙者願飬二匹者聼皆以監牧見馬給之或官予其直令自市毋或强予府界毋過三千匹五路無過五千匹襲逐盗賊之外乗越三百里者皆有禁在府界者免輸糧草二百五十束加給以錢布在五路者歳免折變縁納錢三等以上十户爲一保四等以下十户爲一社以待病斃補償者保户馬斃馬户獨償之社戸馬斃者社人半償之歳一閲其肥瘠禁苛留者凡十有四條先從府界頒焉五路委監司經略司州縣更度之於是保甲飬馬行於諸路矣先是中書樞宻院保甲飬馬事文彦博吳充言三代有邱乘出馬有國馬國馬宜不可闕且今法欲令馬死備償恐非民願而王安石以爲令下之初京畿百姓多自以爲便願投牒者已千五百户决非有所驅迫力請行之時河東騎軍有馬萬一千餘匹歳番戍邉率十年而一周議者以爲費廪食而多亡失乃行五路義勇保甲飬馬法繼而兵部言河東正軍馬九千五百匹請權罷官給以義勇保甲馬五千補其闕合萬匹為額俟正軍不及五千始行給配事下中書樞宻院以為車騎國之大計不當專以一時省費輕議廢置且官飬一馬歳爲錢二十七千民飬一馬纔免折變縁納錢六千五百計折米而輸其直爲錢十四千四百餘皆出於民决非所願若芻秣失莭或不善調習緩急無以應用况減馬軍五千匹卽異時當減軍正數九千九百人又減分數馬三千九百四十匹邉防事宜何所取備若存官軍馬如故漸令民間從便牧飬不必以五千匹爲限於理爲可而中書謂官飬一馬以中價率之爲錢二十三千募民飬牧可省雜費八萬餘緡且使入中芻粟之家無以邀厚利計前二年官馬死倍於保甲馬而保甲有馬可以習戰禦盜公私兩利上竟從樞宻院議河東騎軍得不減耗而民馬不至甚病者由帝獨斷之審也八年置熈河路買馬坊六而原渭徳順諸塲皆廢又以麟府所市馬羸直多罷之岢嵐火山軍所産馬亦以敵境言邊人多盜馬越界趨利尋皆罷之自是國馬専仰市於熈河秦鳳矣九年提舉開封府界蔡確言比賦保甲以國馬免所輸草賜之錢布民以畜馬省於輸稿雖不給錢布而願爲官飬馬者甚衆請增馬數歳止免輸稿一百五十束詔毋過五千匹於是京畿罷給錢布而增馬數矣元豐六年提舉河東路保甲王崇拯言請令本路保甲十分取二以教騎戰每官給二十五千令市一馬限以五千當得馬六千九百十有八匹爲緡錢十七萬二千九百有五十詔以京東鹽息錢給之令崇拯月上所買數於是保甲皆兼市馬矣七年京東提刑霍翔請募民飬馬蠲其賦役乃詔京東西路保甲免教閲每一都保飬馬五十匹匹給十千限以京東十年京西十五年而數足置提舉保馬官京西吕公雅京東霍翔並領其事而罷鄉村先以物力飬馬之令尚飬户馬者免保馬凡飬馬免大小保長税租支移每歳春夫催税甲頭盜賊備賞保丁廵宿凡七事於是京東西户馬更為保馬矣公雅翔又請以常平息錢賞馬之充肥及孳生者且請願以私馬印為保馬者聼飬至三匹蠲除之外每匹各次下一人許贖杖罪公雅又令每都歳市二十匹初限十五年者乃促為二年半京西地不産馬民又貧乏甚苦之翔又奏本路馬已及萬匹請令諸縣弓手各飬馬聼贖非捕盜之罪按熈寜五年所行者户馬也元豐七年所行者保馬也皆是以官馬責之於民令其字飬户馬則是蠲其科賦保馬則是蠲其征役史志言户馬之將行也王介甫以爲京畿百姓投牒願應募者已千五百户保馬之將行也霍翔以為禹城一縣願應募者為馬已四百四十八盖法行之初民皆樂從初非官府抑逼夫樂從之説出於建議者之口未必有是事實然所謂投牒應募之數未必全虛盖民本非樂為官飬馬也當時科賦征役必是繁重故茍有一役於官而得以自免則亦不暇詳慮却顧而靡然從之正栁子厚所謂吾蛇尚存則弛然而臥時而獻之退而甘食其土之所有以盡吾齒是也及其乆也馬之斃者賠償不訾且奉行之吏務為苛峻於是數之少者增之期之寛者促之始重爲民病矣八年提舉茶塲李把言賣茶易馬固為一事乞同提舉買馬詔如其請其後羣牧判官郭茂恂言承詔議専以茶市馬以金帛市榖而併茶馬為一司臣聞頃時以茶市馬兼用金帛者亦聼其便近歳事局既分始専用銀絹錢錢非蕃部所欲且茶馬二事事實相須乃詔専以雅州之名山茶為易馬之用自是蕃馬之至者稍衆乆之買馬司復罷兼茶事自李把建議始於提舉茶事兼買馬其後二職分合不一哲宗嗣位議者争言新法保馬之不便乃下詔以兩路保馬分配諸軍餘數發赴太僕寺不堪支配者斥還民戸而責官給元價翔公雅皆得罪保馬遂罷元祐初朝廷方議興廢監復祖宗之舊於是詔陜西河東相視所當置監又下河北陜西按行河渭并晉之間牧田以聞時已罷保甲教騎兵而還戸馬於民左司諌王巖叟上疏極言其事自是洛陽單鎮原武淇水東平陽等監皆復巖叟疏言兵所恃在馬而能蕃息馬者牧監也昔廢監之初識者皆知十年之後天下當乏馬已而不待十年其弊已見此甚非國之利也乞收還戸馬三萬復置監如故監牧事委之轉運官而不専置使今鄆州之東平北京之大名元城衛州之淇水相州之安陽洺州之廣平監以及於瀛定之間棚基草地疆畫具存使臣牧卒大半猶在稍加招集則指顧之間措置可定而人免納錢之害國收牧馬之利豈非計之得哉又廢監以来牧地之在民者處處為害愚民利於一時請地之易不虞後日輸送之難投牒之初爭立髙課有司復重估其價計租為錢力皆不勝歳益増欠轉運司迫於羣牧督責之嚴雖水旱不在蠲放禁錮鞭撻無日無之設欲還官豈復聼許今若因復置監牧收地入官則百姓戴恩如釋重負矣紹聖三年始行給地牧馬之政先是知任城縣韓筠等建議於邢州請以牧田募民受田一頃者為官牧一馬而蠲其租縣籍其所飬之髙下老壯毛色歳一閲亡失者備償已佃人願飬馬者除其租於是知州張赴上其説且以為陜西沿邊弓箭授田不過一頃既飬一馬又役一丁備邊之日歳居其半今但牧一馬而無身丁之役若試之一監或一縣當有利而無害樞宻院是其請乃言赴等所陳受田飬馬既蠲其租不責以孳息而不願之家無所抑勒又限以尺寸則緩急皆可用之馬矣乃具為條畫下太僕寺應有監牧州縣悉施行之殿中侍御史陳次升言近者募人給牧田飬馬若牧田鄰於居民地復膏腴宜有願者相去稍逺難就耕牧則必非所願且一頃之地所直不多馬或亡失乃償錢四五十千恐人之非願言竟不行徽宗崇寜元年有司較諸路田飬之數凡一千八百匹有竒而河北西路占一千四百他路自二百匹以下至河東僅九匹而開封府界京西南路京東東路皆無應募者盖法雖已具而猶未力行也大觀元年尚書省言元祐置監馬不蕃息而費用不貲今沙苑最號多馬然占牧馬者九千餘頃芻粟官曹之費歳為緡錢四十餘萬而牧馬止及六千自元符元年至二年亡失者三千九百且素不調習無以任騎乘以九千頃之田四十萬緡之費飬馬六千而不適於用又亡失如此利害灼然可見今以九千頃之田計其瘠磽者三分去一猶得良田六千頃以見直計之頃為錢五百餘緡若以一頃募飬一馬則人得地利馬得所飬可以紹述先帝隐兵於農之意請下永興軍路提㸃刑獄司及同州詳度以聞俟見實利六路新邊閑田當以次施行時熈河蘭湟路牧馬司又請兼募願飬牝馬者每收三駒以其二歸官而一充賞詔行之是歳臣僚言岷州應募飬馬者至萬餘匹於是自守貳而下遞賞有差宣和二年手詔曰給地牧馬議者本以蕃息國馬為言今損失動以千計而自法行至今皆無出駒之數歳縻賞賚蠲除租税科調而賦歛日以不均為害非一其罷政和二年以来給地牧馬條令收見馬以給軍應牧馬及置監處並如舊制於是又復東平監凡諸監興罷不一而沙苑監獨不廢自給地牧馬之法既罷三年而復行時牧田已多所給占乃詔見管及已拘收牧田如官司輙復請占者以違御筆論雖奉御筆者皆許執奏六年又詔立賞格應飬馬通一路及三千匹州通縣及一千縣及三百其提㸃刑獄守令各遷一官倍之者更減磨勘年於是諸路應募牧馬者為户八萬七千六百有奇為馬二萬三千五百既推賞如上詔而兵部長貳亦以兼總八路馬政遷官然北方用兵而馬政益急矣蔡條國史補政和二年詔於京東西河北以舊牧地募人牧馬以次推行於諸路其制以在官逃田若天荒凡二頃至三四頃度髙下肥磽而授之蠲其一頃之賦而牧一馬牝則三年而出一駒牧五年者詣官再易馬盡括澤潞京西山東河北等田即陜右軍蕃羌馬一分給之魯公既罷於是詔以所牧馬盡給賜童貫及補陜右諸軍之闕馬者凡九萬餘匹既不加恤道斃者十八九遂盡收田以賜諸苑囿及道宫若復苑八作書藝局艮嶽擷芳園上清寳籙宫龍徳太一宫祐神觀各一千或八百頃他以差給賜其後北事興郭藥師在燕山乃盡發河北諸軍及係官馬聼其所擇而國馬盡矣宣和末金人且寒盟始悟闕馬乃復給地牧馬既無馬以給民又不得元田州縣强民出馬以牧取文具而已屬金人犯闕詔盡括内外馬及取於在京騎軍不及二萬且授内臣梁方平扼大河於濬州至則大敗馬復殱焉政和五禮新儀仲春祀馬祖仲夏享先牧仲秋祭馬社仲冬祭馬歩並擇日馬祖先牧馬社馬歩壇各廣九歩髙三尺四出陛一壝二十五歩中興後以紹興三十一年於行在昭慶寺設位行祭髙宗渡江以来無復國馬紹興二年始命措置馬監後置於饒州以守倅領之擇官田為牧地復置提舉俄廢四年又置監於臨安之餘杭南蕩上曰輔臣進呈廣馬㡬似代北所生春秋列國不相通所用之馬皆取於其國中而已申公巫臣使於吳與其射御教吳乘車則是雖吳亦自有馬今必産馬處求之則是馬政不修也十九年夏詔馬五百匹為一監牡一而牝四之監分四羣歳生産駒三分及斃二分以上有賞罰先是川路所買馬歳付鎮江軍中飬牧至是上以未見孳生之數遂分江上諸軍後又置監於郢鄂之間牡牝千餘十有餘年纔生三十駒而又不可用乃已故凡戰馬悉仰川秦廣三邊焉川秦馬秦馬舊二萬匹乾道間川秦買馬之額歳為萬有一千九百匹有竒川司六千秦司五千九百益梓利三路漕司歳應副博馬紬絹十萬四千疋成都利州路十一州産茶二千一百二萬斤茶馬司所收大較若此其後文州復𨽻秦司而川司増珍州之額共為四千八百九十六秦司六千一百二十合兩司為萬有一千十有六匹此慶元初之額也嘉泰末川司五塲又増為五千一百九十六匹秦司三塲増為七千七百九十八匹合兩司為萬有二千九百九十四然累歳所市多不及額盖祖宗時所市馬分而為二其一曰戰馬生於西邊强壮濶大可備戰陣今宕昌峰貼峽文州所産是也其二曰覊縻馬産於西南諸蠻格尺短小不堪行陣今黎叙等五州軍所産是也覊縻馬每綱五十匹其間良馴不過三五匹中等十許匹餘皆不等不可服乗守貳貪於賞格以多為貴起綱逺来或死道路其僅至者但存皮骨茶馬司以其將斃者責付諸路鬻之至則随死而計綱赴江上者又為押綱卒校竊其芻粟道斃相望焉成都府馬務每年排發江上諸軍馬五十八綱一月劵食錢米二百貫五十八綱一年總計一萬一千六百貫押馬官五十三員毎員六百貫共計三萬一千八百貫興元府馬務每年排飬三衙馬一百十二綱所費稱此率未嘗如數盖茶馬司靳吝錢帛蕃蠻馬至多不即償故也或為守倅兵官有市馬賞茶司屬官亦有而都大主管官獨無之故至此舊蕃蠻中馬髙下良駑各有定價紹興中張松為黎倅欲馬溢額以幸賞髙其直以市之自是夷人所欲無厭愈肆邀索癸巳變故之後卭部川蠻邀功趙彦博始以細茶錦與之至今夷人常以博馬茶錦不堪藉口淳熈中龔總為黎守又與卭部蠻設席於倅㕔之副堦犒以酒食夷人益肆稍不如欲則詆訶官吏牽馬出場宕昌馬舊止三千淳熈中始増其數慶元中金人既為䝉古所侵冀之北土遂失由是馬至秦司者差罕矣舊川秦市馬赴宻院多道斃者紹興二十四年始撥秦馬付三衙命小校徃取之三司取馬一嵗再徃反用精甲四百四十人州縣頗憚其費二十七年秋又詔川馬不赴行在分𨽻江上諸軍鎮江建康荆鄂軍各七百五十江池軍各五百殿前司二千五百馬歩司各千而以川馬良者二百進御凡以川秦綱馬皆遵陸乾道初吳璘為宣撫使始議馬綱勞費又均房一帶多峻嶺亂石馬多傷蹄道斃請以舟載馬而東上命䕫路造舟明年䕫路轉運司主管文字任續上言造舟已畢工役遂事山程灘險利害相當在所不論惟欲撥陸路之芻秣以免沿流之煩費輟四路之軍兵以免篙梢之追擾四路廂禁軍數目不少若各輟五千人於沿流十郡充水軍其衣糧令元來處科撥馬綱行則迎送舟船馬綱住則訓習水戰莫此為便上大喜令制置司撥廂禁軍三千五百人如其請王十朋虞允文力論其擾人其後言者又謂馬綱所至騷擾江村而商販米斛之舟尤被其毒況水路馬數較之陸行存亡相若而於糴塲大有妨碍乃詔川路馬舡日下廢罷盖自璘建請之後利䕫兩路沿江十餘郡之被其害者三載而後得免焉淳熈八年新興國軍朱晞顔朝辭奏四川茶馬司歲於宕昌黎文階叙南州珍州等處買馬一萬二千餘匹並四尺二寸以上十歲以下方許起綱不合格者雖骨相驍駿馳驟超逸者亦不收買又不許民間私買臣愚以為棄之於化外不若飬之民間緩急收之實朝廷之外廐況沿邊之地去西北不逺風土水草相類飬之易以蕃息而有願中賣於官者依所直之數與之孰不樂歸於官者是則民間之馬皆吾廐中物乞於茶馬司所買馬外不堪排撥起綱之馬令官用退印不拘軍民並聼從便收買則不惟得夷人懽心且俾沿邊牧馬日以蕃息可為緩急之備是一舉而數利也從之信陽軍守臣言秦司排撥綱馬兵士已至而馬數未足官司每以多支日劵為憂馬數已登而兵士未至官司復以多費草料為念幸而人馬俱集則督促發遣一不暇顧且馬産於深蕃渉逺而至力猶未充不問羸病遽責之以經渉險阻沿路倒斃皆此之由乞下秦司今後綱馬有羸瘠病患者且須醫療飼飬十分充壯然後撥發從之廣馬建炎末廣西提舉峒丁李棫始請市戰馬赴行在紹興初隸經畧司三年春即邕州置司提舉市於羅殿自把大理諸蠻其後又置買馬司以帥臣領其事七年胡舜陟為帥歳中市馬二千四百匹詔賞之其後馬益精歳費黄金五鎰中金二百五十鎰錦四百端絁四千疋亷州鹽三百萬斤而得馬千五百馬必四尺二寸以上乃市之其直為銀四十兩每高一寸増銀十两有至六七十兩者土人云其尤駔駿者在其出産處或博黄金二十兩日行四百里但官價有定數不能致此耳然自把諸蕃本自無馬盖又市之南詔南詔今大理國也去自把國可二十程而自把至邕州横山寨二十二程横山寨至靜江府又二十餘程羅殿國又逺如自杞十程宜州溪峒廵檢常恭赴闕持南丹州莫延甚表來乞就宜州市馬比之横山可省三十程産馬地至南丹十程南丹至靜江府十三程張説在樞筦欲從其説或謂邕逺宜近人孰不知前迂其塗豈無意况莫氏方横乃欲為之除道而擅以互市之饒誤矣小吏妄作將啓邊釁乃止廣州例以五十匹為一綱每年綱許推賞然吏為姦博馬銀多雜以銅每銀一兩為握臂釧撲鹽百斤為一畚朘減至六十所贏皆官吏共盗之蠻覺知不肯以良馬來所市率多老病駑下且不能登數帥范成大善為約束増足鹽畚逮其去官之歳市馬乃六十綱前此未有也嶺南自産小駟匹直十餘千與淮湖所出無異大理地連西戎故多馬雖互市於廣南其實猶西馬也每選其良者赴三衙而其他則付建康鎮江府池鄂太平州軍中皆有常數舊廣西十州民運鹽至横山寨民甚苦之紹興十九年陳璹為經畧使以官錢募小校運送若鹽無闕失則部良馬至行在以酬之至今為例淮馬隆興初張浚為江淮都督即淮上市之浚言川廣市戰馬每匹不下三四百千又道逺多斃今淮馬每匹通不滿二百千且軍中即日可得上從之逮督府廢乃止然淮南馬矮小實不可用其可用者乃取之淮北耳乾道以後又詔於淮郡市馬於是多有越淮盜馬來市者時曽昭守濠州至以其馬起綱至行在北人以為言淮西帥臣趙善俊奏其事大臣欲下令還之孝宗以為失體乃諭善俊執死罪囚付昭令斬之曰此盜馬者也於是一綱已至御馬院命濠州以死損報而次綱未至者皆遣還之昭坐追官放罷自是不復買淮馬矣淳熙十五年侍衞歩軍都虞候梁師雄言三衙每年取押綱馬全藉馬驛辦其草料以時飬飼竊聞沿路驛舍例皆損弊及將合支草料離驛安頓每遇綱馬到程旋令官兵般擔以此失時多致羸痩盖因提㸃驛程官吏失於檢察乞行下所隸州縣相視驛舎量加修葺及時合用草料常切應辦各就馬驛附近樁頓綱馬到日隨即支給更乞令沿路都統司分定驛程各差素有心力將官一員從各司量給盤費責令與諸州軍所委官同共提㸃自宕昌至興州十五驛屬興州都統司自大桃至漢隂十五驛屬興元府都統司自衡口至干平十三驛屬金州都統司自梅溪至石墻十四驛屬鄂州都統司自邊城至梅溪十一驛屬江州都統司自紫宕至廣徳軍十二驛屬池州都統司自叚村至臨安府餘杭門六驛屬殿前歩軍司各令所差將官徃來用心廵視務要館舍草料應辦齊整違從提㸃將官申所差將官歳一更替如見實有勞效即支犒賞從之嘉定六年臣僚言將佐之馬徃徃取之馬軍則馬軍雖合請三百止得一百食錢而主軍者宻收其三分之一又統制官占馬至四十五匹名料馬豈特占請馬料每二匹必有一卒以頂其名而盜取其錢以入巳者今措置立為定額詔統制官止許差破戰馬六匹統領官差破四匹馬歩軍正副凖備將各止差破兩匹其減下馬拘収從公撥付入隊官兵如法飬餵約束自後不得輙於官兵名下差撥換易從之容齋洪氏隨筆曰國家買馬南邊於邕管西邊於岷黎皆置使提督歲所綱發者盖踰萬匹使臣将校得遷秩轉資沿道數十州驛程劵食廐圉薪芻之費其數不貲而江淮之間本非騎兵所能展奮又三衙遇暑月放牧於蘇秀以水草亦為逐處之患因讀五代舊史云唐明宗問樞宻使范延光内外馬數對曰三萬五千匹帝歎曰太祖在太原騎軍不過七千先皇自始至終馬纔及萬今有鐵馬如是而不能使九州混一是吾飬士練將之不至也延光奏曰國家飬馬太多計一騎士之費可贍歩軍五人三萬五千騎抵十五萬歩軍既無所施虛耗國力帝曰誠如卿言肥騎士而瘠吾民民何負哉明宗出於蕃戎猶能以愛民為念李克用父子以馬上立國制勝然所蓄只如此今盖數倍之矣尺寸之功不建可不惜哉且明宗都洛陽正臨中州尚以為騎士無所施然則今雖純用歩卒亦未為失計也文獻通考卷一百六十
