body:
  text: 文獻通考卷三十七鄱陽馬端臨貴與著選舉考十舉官唐制凡選有文武文選吏部主之武選兵部主之皆為三銓尚書侍郎分主之凡官員有數而署置過者有罰知而聽者有罰規取者有罰每嵗五月頒格於州縣選人應格則本屬或故任取選解列其罷免善惡之狀以十月會於省過其時者不叙其以時至者乃考其功過同流者五五為聨京官五人保之一人識之刑家之子工賈異𩔖及假名承偽隐冒升降者有罰文書乖錯隱幸者駮放之非隱幸則不凡擇人之法有四一曰身體貎豐偉二曰言言辭辨正三曰書楷法遒羙四曰判文理優長四事皆可取則先德行德均以才才均以勞得者為留不得者為放五品以上不試上其名中書門下六品以下始集而試觀其書判已試而銓察其身言已銓而注詢其便利而擬已注而唱不厭者得反通其辭三唱而不厭聽冬集厭者為甲上於僕射乃上門下省給事中讀之黄門侍郎省之侍中審之然後以聞主者受㫖而奉行焉謂之奏受視品及流外則判補皆給以符謂之告身凡官已受成皆廷謝凡試判登科謂之入等甚拙者謂之藍縷選未滿而試文三篇謂之宏辭試判三條謂之拔萃中者即授官凡出身嗣王郡王從四品下親王諸子封郡公者從五品上國公正六品上郡公正六品下縣公從六品上侯正七品上伯正七品下子從七品上男從七品下皇帝緦麻以上親皇太后期親正六品上皇太后大功皇后期親從六品上皇帝袒免皇太后小功緦麻皇后大功親正七品上皇后小功緦麻皇太子妃期親從七品上外戚皆以服屬降二階敘娶郡主者正六品上娶縣主者正七品上郡主子從七品上縣主子從八品上凡用䕃一品子正七品上二品子正七品下三品子從七品上從三品子從七品下正四品子正八品上從四品子正八品下正五品子從八品上從五品及國公子從八品下凡品子任雜掌及王公以下親事帳内勞滿而選者七品以上子從九品上敘其任流外而應入流内敘品卑者亦如之九品以上及勲官五品以上子從九品下敘三品以上䕃曾孫五品以上䕃孫孫降子一等曾孫降孫一等贈官降正官一等死事者與正官同郡縣公子視從五品孫縣男以上子降一等勲官二品子又降一等二王後孫視正三品凡秀才上上第正八品上上中第正八品下上下第從八品上中下第從八品下明經上上第從八品下上中第正九品上上下第正九品下中上第從九品下進士明法甲第從九品上乙第從九品下𢎞文崇文館生及第亦如之應入五品者以聞書算學生從九品下敘凡𢎞文崇文生皇帝緦麻以上親皇太后皇后大功以上親一家聽二人選職事二品以上散官一品中書門下正三品同三品六尚書等子孫并姪功臣身食實封者子孫一䕃聽二人選京官職事正三品同中書門下平章事供奉官三品子孫京官職官從三品中書黄門侍郎并供奉三品官帶四品五品散官子一䕃一人凡勲官選者上柱國正六品叙六品而下遞降一階驍騎尉武騎尉從九品上敘凡居官必四考四考中中進年勞一階敘每一考中上進一階上下二階上中以上及計考應至五品以上奏而别敘六品以下遷改不更選及守五品以上官年勞歲一敘給記階牒考多者准考累加凡醫術不過尚藥奉御隂陽卜筮圖畫工巧造食音聲及天文不過本色局署令鴻臚譯語不過典客署令凡千牛備身備左右五考送兵部試有文者送吏部凡齋郎太廟以五品以上子孫及六品職事并清官子為之六考為滿郊社以六品職事官子為之八考而滿皆讀兩經粗通限年十五以上二十以下擇儀狀端正無疾者武選凡納課品子歲取文武六品以下勲官三品以下五品以上子年十八以上每州為解上兵部納課十三歲而試第一等送吏部第二等留本司第三等納資二歲第四等納資三歲納已復試量文武授散官若考滿不試免當年資遭喪免資無故不輸資及有犯者放還之凡捉錢品子無違負滿二百日本屬以簿附朝集使上於考功兵部滿十歲量文武授散官其視品國官府佐應停者依品子納課十歲而試凡一歲為一選自一選至十二選視官品高下以定其數因其功過而增損之高祖武徳初天下兵革新定士不求禄官不充員有司移符州縣課人赴調逺方或賜衣續食猶辭不行至則授用無所黜退不數年求者浸多亦頗加簡汰舊制内外官皆吏部啟奏授之大則署制三公小則綜覈品流自隋以降職事五品以上官中書門下訪擇奏然後下制授之唐承隋制初則尚書銓掌六品七品選侍郎銓掌八品選三年一大集每年一小集其後尚書侍郎通掌六品以下選其員外郎監察御史亦吏部唱訖尚書侍郎為之典自貞觀以後員外郎乃制授之又至則天朝以吏部權輕監察亦制授之其銓綜也南曹綜覈之廢置予奪之銓曹注擬之尚書門下兼同之門下詳覆之覆成而後過官至肅宗即位靈武强寇在郊始命中書以功狀除官非舊制也凡諸王及職事正三品以上若文武散官二品以上及都督都䕶上州刺史在京師者冊授諸王及職事二品以上若文武散官一品並臨軒冊授其職事正三品散官二品以上及都督都䕶上州刺史並朝堂冊訖皆拜廟册用竹簡書用漆五品以上皆制授六品以下守五品以上及視五品以上皆敇授凡制敇授及冊拜皆宰司進擬自六品以下㫖授其視品及流外官皆判補之凡㫖授官悉由於尚書唯員外郎御史及供奉之官則否供奉官名起居補闕拾遺之𩔖雖是六品以下官而皆敕授不屬選司開元四年始有此制唐取人之路蓋多矣方其盛時著於令者納課品子萬人諸館及州縣學六萬三千七十人太史歴生三十六人天文生百五十人太醫藥童針呪諸生二百一十一人太卜卜筮三十人千牛備身八十人備身左右二百五十六人進馬十六人齋郎八百六十二人諸衛三衛監門直長三萬九千四百六十二人諸屯主副千九百八人諸折衝府録事府史一千七百八十二人校尉三千五百六十四人執仗執乘毎府三十二人親事帳内萬人集賢院御書手百人史館典書楷書四十一人尚藥童三十人諸臺省寺監軍衛坊府之胥史六千餘人凡此者皆入官之門戸而諸司主録以成官及州縣佐史未敘者不在焉至於銓選其制不一凡流外兵部禮部舉人郎官得自主之謂之小選太宗時以歲旱榖貴東人選者集於洛州謂之會選髙宗上元二年以嶺南五管黔中都督府得即任仕人而官或非其才乃遣郎官御史為選補使謂之南選其後江南淮南福建大抵因歲水旱皆遣選補使即選其人而廢置不常選法又不著故不復詳焉太宗貞觀五年六月十一日敕准貞觀四年正月一日制春秋舉薦官中書門下奏常參官八品以上外官五品以上正員及額内得替者並停薦其使下郎官御史丁憂廢省官在外者望委諸道觀察使及州府長史其在京城委中書門下尚書省御史臺常參清官并諸使三品以上左右庶子詹事少卿監司業少尹諭德國子博士長安萬年縣令著作郎中允中舍祕書太常丞贊善洗馬等每年一度聞薦至六年十二月一日敕自今已後王府宫宜停薦其見任宰相及勲臣子弟亦不湏舉人至八年每冬薦官比來所舉人數頗多自今以後中書門下兩省御史臺五品以上尚書省四品以上諸司三品以上應合舉人各令每人薦不得過兩人餘官不得過一人准前敇處分至九年十一月二十九日敕每年冬薦官吏部准式檢勘或成者宜令諸司尚書左右丞本司侍郎引試都堂訪以理術兼商量時務狀考其理識通者及考第事迹定為三等并舉主姓名録奏試日仍令御史一人監試按唐初所謂冬薦即後來所謂舉狀也但如國子博士長安萬年縣令皆有薦人之權則其途亦廣然所薦必試而後用則薦人者亦必審而後發不至如後來全以請謁囑託而得之者矣高宗總章二年司列少常伯裴行儉始設長名榜引銓注法復定州縣升降為八等其三京五府都督都䕶府悉有差次量官資授之其後李敬元為少常伯委事於員外郎張仁褘仁褘又造姓歴改狀樣銓歴等程式而銓總之法宻矣然是時仕者衆庸愚咸集有偽主符告而矯為官者有接承他名而參調者有逺人無親而置保者試之日冒名代進或旁坐假手或借人外助多非其實雖繁設等級遞差選限增譴犯之科開糾告之令以遏之然猶不能禁大率十人競一官餘多委積不可遣有司患之謀為黜落之計以僻書隱學為判目無復求人之意而吏求貨賄出入升降黄門侍郎知吏部選事劉祥道上疏曰今之選司取士傷多且濫每年入流數過一千四百人是傷多也雜色入流不加銓簡是傷濫也古之選者為官擇人不聞取人多而官員少也今官員有數入流無限以有數供無限遂令九流繁總人隨歲積謹約在所須人量支年别入流者今内外文武官一品以下九品已上一萬三千四百六十五員略舉大數當一萬四千人壯室而仕耳順而退取其中數不過支三十年此則一萬四千人三十年而略盡若年别入流者五百人三十年便得一萬五千人定須者一萬三千四百六十五人足充所須之數况三十年之外在官者猶多此便有餘不慮其少今每年入流者遂至一千四百餘人計應須數外恒餘兩倍又比來放選者見停亦千餘人更復年别新加實非處置之法望請釐革稍清其選中書令杜正倫亦言入流者多為政之弊公卿以下憚於改作事竟不行武后初試選人皆糊名后以為非委任之方罷之務収人心士無賢不肖多所進奬職員不足乃令吏部大置試官以處之故當時有車載斗量之謠又以鄧元挺許子儒為侍郎無所藻鑑委成令史依資平配李嶠為尚書又置員外郎二千餘員悉用勢家親戚給俸禄使釐務至與正官相毆者又有檢校敕攝判知之官中宗時韋后及太平安樂公主等用事於側門降墨敇斜封授官號斜封官凡數千員内外盈溢無㕔事以居當時謂三無坐處言宰相御史及員外郎也又以鄭愔為侍郎大納貨賂選人留者甚衆至逆用三年員闕而綱紀大潰韋氏敗始以宋璟為吏部尚書李乂盧從愿為侍郎姚元之為兵部尚書陸象先盧懐慎為侍郎悉奏罷斜封官量闕留人雖資高者深非才實者不取初尚書銓掌七品以上選侍郎銓掌八品以下選至是通其品而掌焉未幾璟元之等罷殿中侍御史崔涖太子中允薛昭希太平公主意上言罷斜封官人失其所而怨積於下必有非常之變乃下詔盡復斜封别敕官元宗即位勵精為治制凡官不歴州縣者不擬臺省已而悉集新除縣令宣政院親臨問以治人之策而擢其高第者又詔員外郎御史諸供奉官皆進名敕授而兵吏部各以員外郎一人判南曹由是銓司之任輕矣其後户部侍郎宇文融又建議置十銓乃以禮部尚書蘇頲等分主之太子左庶子吳兢諫曰易稱君子思不出其位言不侵官也今以頲等分掌吏部選而天子親臨決之尚書侍郎皆不聞議者以為萬乘之君下行選事帝悟復以三銓還有司開元十八年侍中裴光庭兼吏部尚書先是選司注官惟視其人之能否或不次超遷或老於下位有出身二十年不得禄者又州縣亦無等級或自大入小或初近後逺皆無定制光庭始奏用循資格各以罷官若干選而集官髙者選少卑者選多無問能否選滿則注限年躡級毋得踰越非負譴者皆有升無降有庸愚沉滯者皆喜謂之聖書而才俊之士無不怨歎宋璟爭之不能得及光庭卒中書令蕭嵩以為非求才之方奏罷之詔曰凡人年三十而出身四十乃得從事更造格以分寸為差若循新格則六十未離一尉自今有異材髙行聽擢不次然有其制而無其事有司但守文奉式循資例而已按自漢董仲舒對策以謂古之所謂功者以任官稱職為差非謂積日累久也然則年勞之説自西漢以來有之矣然未嘗專以此為用人之法至崔亮之在後魏裴光庭之在唐則遂以此立法矣此法既立之後庸碌者便於歴級而升不致沉廢挺特者不能脱頴以出遂至邅迴宋蕭二公皆以為非明皇雖從其言而卒不能易其法非特明皇不能易而已傳之後世踵而行之卒不可變何也蓋守法之事庸愚皆能之知人之明則賢哲亦不敢以此自詭故也昔熙寧間東坡公擬進士御試策曰古之欲立非常之功者必有知人之明茍無知人之明則循規矩蹈繩墨以求寡過二者審於自知而安於才分者也道可講習而知德可勉强而能惟知人之明不可學必出於天資如蕭何之識韓信豈有法之可傳者以諸葛孔明之賢而短於知人故失之於馬謖而孔明亦審於自知故終身不敢用魏延我仁祖之在位也事無大小一付之於法人無賢不肖一付之於公議事已效而後行人已試而後用終不敢求非常之功者誠以當時大臣不足以與知人之明也古之為醫者聆音察色洞視五藏則其治疾也有剖胸决脾洗濯胃腎之變茍無其術不敢行其事今無知人之明而欲立非常之功解縱繩墨以慕古人則是未能察脉而欲試華佗之方其異於操刀而殺人者幾希矣然則後之論者雖君相之用人猶以循規矩蹈繩墨為主則知人之事固難以責之吏部尚書也天寳二年李林甫領吏部尚書日在政府選事悉委侍郎宋遥苖晉卿御史中丞張倚新得幸於上遥晉卿欲附之時選人集者以萬計入等者六十四人倚子奭為之首羣議沸騰安禄山入言於上上悉召入等人面試之奭手持試紙終日不成一字時人謂之曵白遥晉卿等皆坐貶官天寶九載敇吏部取人必限書判且文學政事本自異科求備一人百中無一况古來良宰豈必文人又限循資尤難奬擢自今已後簡縣令但才堪政理方圜取人不得限以書判及循資格注擬諸畿望𦂳上中每等為一甲委中書門下察問選擇堪者然後奏授大理評事緣朝要子弟中有未歴望畿縣便授此官既不守文又未經事自今後有此色及朝要至親並不得注擬初諸司官兼知政事者至日午後乃還本司視事兵部吏部尚書侍郎知政事者亦還本司分闕注唱開元以來宰相位望漸崇雖尚書知政事亦於中書決本司事以自便而左右相兼兵部吏部尚書者不自銓總又故事必三銓三注三唱而後擬官季春始畢乃過門下省楊國忠以右相兼吏部尚書建議選人視官資書判狀迹功優宜對衆定留放乃先遣吏宻定員闕一日會左相及諸司長官於都堂注唱以誇神速或於宅中引注虢國姊妹垂簾觀之或有老醜者指名以為笑士大夫遭詬恥故事兵吏部注官訖於門下過侍中給事中省不過者謂之退量國忠注官呼左相陳希烈於坐隅給事中列於前曰既對注擬即是過門下了侍郎韋見素張倚皆衣紫與本曹郎官藩屏外排比案牘趨走諮事國忠顧謂簾中曰兩箇紫袍主事何如楊氏大噱先公曰唐之選格寛嚴失中其始立法始集而試觀其書判已試而銓察其身言已銓而注詢其便利而擬其官已注而唱示之不厭者得反通其辭三唱而不厭聽冬集厭者為甲上於僕射乃上門下省給事中讀之黄門侍郎省之侍中審之不審者皆得駮下既審然後上聞主者受㫖而奉行焉此其詳也惟若是是以有出身二十年不獲禄者自裴光庭作循資格謂之聖書至楊國忠任情廢法而選法始大壊然以韓文公之才猶三選無成十年如初不得已就張建封之辟然後得禄蓋嚴則賢愚同滯寛則賢否混淆亦法使之然也肅宗即位於靈武以崔渙同中書門下平章事時京師未復舉選不至詔渙為江淮宣諭選補使收采遺逸不以親故自嫌常曰抑才虞謗吾不忍為然聽受不甚精以不職罷代宗大歴六年元載為宰相奏凡别敕除文武六品以下官乞令吏部兵部無得檢勘從之時載所奏擬多不遵法度恐為有司所駮故也先公曰史稱載納賄除吏恐有司之駮正也然近世廟堂除官超資越格惟意所為有司亦曷嘗敢問是唐之法令猶存耳肅代以後兵興天下多故官員益濫而銓法無可道者德宗時試太常寺叶律郎沈既濟極言其弊曰近世爵禄失之者久其失非他四太而已入仕之門太多世胄之家太優禄利之資太厚督責之令太薄臣以為當輕其禄利重其督責夫古今選用之法九流常叙有三科而已曰德也才也勞也而今選曹皆不及焉且吏部甲令雖曰度德居任量才授職計勞升叙然考校之法皆在書判簿歴言辭俯仰之間侍郎非通神不可得而知則安行徐言非德也空文善書非才也累資積考非勞也茍執不失猶乖得人况衆流茫茫耳目有不足者乎蓋非鑒之不明非擇之不精法使然也王者觀變以制法察時而立政按前代選用皆州府察舉至於齊隋署置多由請托故當時議者以為與其率私不若自舉與其外濫不若内收是以罷州府之權而歸於吏部此矯時懲弊之權法非經國不刋之常典今吏部之法蹙矣不可以坐守刓弊臣請五品以上及羣司長官俾宰臣進叙吏部兵部得參議焉六品以下或僚佐之屬聽州府辟用則銓擇之任委於四方結奏之成歸於二部必先擇牧守然後授其權髙者先署而後聞卑者聽版而不命其牧守將帥或選用非公則吏部兵部得察而舉之聖王明目達聰逖聽遐視罪其私冒不慎舉者小加譴黜大正刑典責成授任誰敢不勉夫如是則接名偽命之徒菲才薄行之人貪叨賄貨懦弱姦宄下詔之日隨聲而廢通計大數十去八九矣如是人少而員寛事覈而官審賢者不奬而自進不肖者不抑而自退或曰開元天寶中不易吏部之法而天下砥平何必外辟方臻於理臣以為不然夫選舉者經邦之一端雖制之有羙惡而行之由法令是以州郡察舉在兩漢則理在魏齊則亂吏部選集在神龍景龍則紊在開元天寶則理當其時久承升平御以法術慶賞不軼威刑必齊由是而理匪用吏部而臻此也况以此時用辟召之法則理不益久乎天子雖嘉其言而重於改作訖不能用既濟選舉雜議十條二或曰昔後漢貢士諸生試經學文史試牋奏則舉人試文乃前王典故而子獨非於今何也答曰漢代所貢乃王官耳凡漢郡國每歲貢士皆拜為郎分居三署儲才待詔無有常職故初至必試其藝業而觀其能否至於郡國僚吏皆府主所署版檄召用至而授職何嘗賓貢亦不試練其遐州陋邑一掾一尉或津官戍吏皆登銓上省受試而去者自隋而然非舊典也四或曰吏部有濫止由一門州郡有濫其門多矣若等為濫豈若杜衆門而歸一門乎答曰州郡有濫雖多門易改也吏部有濫雖一門不可改也何者凡令選法皆擇才於吏部述職於州郡若才職不稱紊亂無任責於刺史則曰官命出於吏曹不敢廢也責於侍郎則曰量書判資考而授之不保其往也責於令史則曰按由歴出入而行之不知其他也黎庶受弊誰任其咎若牧守自用則罪將焉逃必州郡之濫獨換一刺史則革矣如吏部之濫雖更其侍郎無益也蓋九流浩浩不可得知法使之然非正司之過故云門雖多而易改門雖一而不可改者以此致堂胡氏曰銓選年格之弊有志於治天下者莫不以為當革而莫有行之者豈皆智之不及歟蓋以自不能無私而度人之不能公也自以不能知人而度人之亦不能知也故寜付之成法猶意乎㧞十得五而已縱未可盡革如沈既濟之論亦可救其甚弊俾吏部守案籍成法人才之賢否一不預焉大則委宰臣叙進下則聽州府辟舉其狥私不稱則吏部覺察御史按劾豈有不得人之患哉雖然世無不可革之弊以周漢良法魏崔亮裴光庭一朝而廢之則崔亮裴光庭所建何難改之有為政在人人存則政舉矣其本則係乎人君有愛民之意與否耳初吏部嵗常集人其後三數歲一集選人猥至文簿紛雜吏因得以為姦利士至蹉跌或十年不得官而闕員亦累歲不補陸贄為相乃懲其弊命吏部據内外員三分之計闕集人歲以為常是時河西隴右沒於虜河南河北不上計吏員大率減天寳三之一而入流者加一故士人二年居官十年待選而考限遷除之法浸壞帝初任楊炎盧把引植私黨排陷忠良天下怨疾貞元後懲艾其失雖置宰相至除用庶官必反覆參詰乃得下及陸贄秉政始請臺閣長官得自薦其屬有不職坐舉者帝初許之或言諸司所舉皆親黨招賂遺無實才帝復詔宰相自擇贄上奏言其非便帝雖嘉之然卒停薦士詔贄疏言夫理道之急在於得人而知人之難聖哲所病聽其言則未保其行求其行則或遺其才校勞考則巧偽繁興而端方之人罕進狥聲華則趨競彌長而沉退之士莫勝自非素與交親備詳本末探其志行閲其器能然後守道藏用者可得而知沽名飾貎者不容其偽故孔子云視其所以觀其所由察其所安人焉廋哉夫欲觀視而察之固非一朝一夕之所能也是以前代有鄉里舉選之法長吏辟舉之制漢制其州郡佐史自長吏以下皆太守刺史自辟當時如杜喬則楊震所辟李膺則胡廣所辟唐制採訪節度官屬自判官以下得自辟舉未報則稱攝已命則同正當時如杜甫則嚴武所辟韓愈則董晉所辟他皆𩔖此所以明歴試廣旁求證行能息馳騖也昔周以伯冏為太僕命之曰愼簡乃僚罔以巧言令色便辟側媚其惟吉士是則古之王朝但命其大官而大官得自簡僚屬之明驗也漢朝務求多士其選不唯公府辟召而已又有父任兄仕皆得為郎選入之初雜居三所臺省有闕即用補之是則古之郎官皆以任舉充選此其明驗也魏晉以後暨於國初採擇庶官多由選部唯髙位重職乃由宰相考庶官之有成效者請而命焉故晉代山濤為吏部尚書中外品員多所啟授宋朝以蔡廓為吏部尚書先使人謂宰相徐羡之曰若得行吏部之職則拜不然則否羡之答云黄散已下悉委蔡廓猶憤恚以為失職遂不之官是則黄門散騎侍郎皆由吏部選授不必朝廷列位盡合簡在台司此其明驗也國朝之制庶官五品以上制敇命之六品已下則並㫖授制敇所命者蓋宰相商議奏可而除拜之也㫖授者蓋吏部銓材授職然後上言詔㫖但畫聞以從之而不可否者也開元中吏部注擬選人奏置循資格限自起居遺補及御史等官猶並列於選曹銓綜之例著在格令至今不刋未聞常參之官悉委宰臣選擇此又近事之明驗也其後舊典失序倖臣專朝捨僉議而重已權廢公舉而行私惠是使周行庶品茍不出時宰之意者則莫致焉任衆之道益微進善之途漸隘近者每須任使常苦乏人臨事選求動淹旬朔姑務應用難盡當才豈不以薦舉陵遲人物衰少居常則求精太過有急則備位不充欲令庶績咸熙固亦難矣臣實駑鈍一無所堪猥蒙任使待罪宰相雖懷竊位之懼且乏知人之明自揣庸虛終難上報唯廣求才之路使賢者各以彚征啟至公之門令職司皆得自達臣當謹守法度考課百官奉揚聰明信賞必罰庶乎人無滯用朝不乏才以此為酬恩之資以此為致理之具爰初受命即以上陳求賢審官粗立綱制凡是百司之長兼副貳等官及兩省供奉之職并因察舉勞效須加奬任者並宰臣叙擬以聞其餘臺省屬僚請委長官選擇指陳才實以狀上聞一經薦揚終身保任各於除書之内具標舉授之由示衆以公明章得失得賢則進考增秩失實則奪俸贖金亟得則褒升亟失則黜免非止搜揚下位亦可閲試大官前志所謂達觀其所舉即此義也自䝉允許即以宣行南宫舉人纔至十數或非臺省舊吏則是使府佐僚累經薦延多歴仕任議其資望既不愧於班行考其行能又未聞於闕敗而議者遽以騰口上煩聖聰道之難行亦可知矣陛下勤求理道務狥物情因謂舉薦非宜復委宰臣揀擇崇任輔弼博採輿詞可謂聖德之盛者然於委任責成之道聽言考實之方閑邪存誠猶恐有闕所謂委任責成者將立其事先擇其人既得其人謹謀其始既謀其始詳慮其終終始之間事必前定有疑則勿果於用既用則不復有疑待終其謀乃考其事事愆於素者革其弊而黜其人事協於初者賞其人而成其羙使受賞者無所與遜見黜者莫得為辭夫如是則茍無其才孰敢當任茍當其任必得竭才此古之聖王委任責成無為而理之道也所謂聽言考實虛受廣納洪接下之規明目達聰廣濟人之道欲知事之得失不可不聽之於言欲辨言之眞虛不可不考之於實言事之得者勿即謂是必原其所得之由言事之失者勿即謂非必窮其所失之理稱人之善者必詳考行善之迹論人之惡者必明辨為惡之端凡聽其言皆考其實既得其實又察以情既盡其情復稽於衆衆議情實必參相得然後信其説奬其誠如或矯誣亦寘明罰夫如是則言者不壅聽之不勞無浮妄亂敎之談無隂邪害善之説無輕信見欺之失無潛陷不辯之寃此古之聖王聽言考實不出户而知天下之方也陛下既納臣而用之旋聞横議而止之於臣謀不責成於横議不考實此乃謀失者得以辭其罪議曲者得以肆其誣率是以行觸𩔖而長固無必定之計亦無必實之言計不定則理道難成言不實則小人得志國家所病常必由之聖㫖以為外議云諸司所舉皆有情故兼受賄賂不得實才者臣請陛下當使所言之人詳陳所犯之狀某人受賄某舉有情陛下然後以事質於臣臣復以事質於舉主若便首伏則據罪抵刑如或有詞則付法閲實謬舉者必行其罰誣善者亦反其辜自然憲典克明邪慝不作懲一沮百理之善經何必貸其姦贓不加辯詰私其公議不出主名使無辜見疑有罪獲縱枉直同貫人何頼焉聖㫖又以官長舉人法非穩便令臣並自揀擇不可信任諸司者伏以宰輔常制不過數人人之所知固有限極必不能徧諳多士備閲羣才若令悉命羣官理須輾轉詢訪是則變公舉為私薦易明敭以暗投倘如議者之言所舉多有情故舉於君上且未絶私薦於宰臣安肯無詐失人之弊必又甚焉所以承前命官罕有不涉私謗雖則秉鈞不一或自行情亦由私訪所親轉為所賣其弊非逺聖鑒明知今义將徇浮言專任宰臣除吏宰臣不徧諳識踵前須訪於人若訪於親朋則是悔其覆車不易其前轍之失也若訪於朝列則是求其私薦必不如公舉之愈也二者利害惟陛下更詳擇焉恐不如委任長官謹簡僚屬所揀既少所求亦精得賢有鑒識之名失實當闇謬之責人之常性莫不愛身况於臺省長官皆是久當朝選孰肯徇私妄舉以傷名取責者乎所謂臺省長官即僕射尚書左右丞侍郎及侍御史大夫中丞是也陛下比擇輔相多亦不出其中今之宰相則往日臺省長官也今之臺省長官乃將來之宰臣也但是職名暫異固非行舉頓殊豈有為長官之時則不能舉一二屬吏居宰臣之位則可擇千百具僚物議悠悠其惑斯甚聖人制事必度物宜無求備於一人無責人於不逮尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長擇僚佐所任愈崇故所擇愈少所試漸下故所舉漸輕進不失倫則杜絶徼求將務得人無易於此是故選自卑逺始升於朝者各委長吏任舉之則下無遺賢矣寘於周行既任以事者於是宰臣序進之則朝無曠職矣才德兼茂歴事不踰者然後人主將任之則海内無遺士矣夫求才貴廣考課貴精求廣在於各選所知長吏之薦擇是也考精在於按名責實宰臣之序進是也求不廣則下位罕進下位罕進則用常乏人用常乏人則懼曠庶職懼曠庶職則茍取備員是以考課之法不暇精也考課不精則能否無别能否無别則砥礪漸衰砥礪漸衰則職業不舉職業不舉則品格浸微是以賢能之功不克彰也皆失於不廣求人之道而務選士之精不思考課之行而望得人之羙是以望得彌失務精益粗塞源浚流未見其可臣欲詳懲舊説伏慮聽覧為煩粗舉一端以明其理往者則天太后踐䟭臨朝欲收人心尤務㧞擢洪委任之意開汲引之門進用不疑求訪無倦非但人得薦士亦得自舉其才所薦必行所舉輙試其於選士之道豈不傷於容易哉然而課責既嚴進退皆速不肖者旋黜才能者驟升是以當代謂知人之明累朝頼多士之用太后不惜爵位以寵四方豪傑自為助雖妄男子言有所合輒不次官之至不稱職尋亦廢誅不少縱務取實才眞賢故當時有杷推盌脱之語而一時所得如姚崇宋璟軰皆足以建開元之太平事見則天傳此乃近於求才貴廣考課貴精之效也陛下誕膺寳歴思致理平雖好賢之心有踰前哲而得人之盛未逮徃時蓋由鑒賞獨任於聖聦搜擇頗難於公舉但速登延之路罕施揀覈之方遂使先進者漸益凋訛後來者不相接續施一令則謗沮互起用一人則瘡痏立成此乃失於選才太精制法不一之患也德宗天資猜忌用人太精東省閉閣累月南臺惟一御史則天舉用之法傷易而得人陛下慎簡之規太精而失士是知雖易於舉用而不易於茍容則所易者適足廣得人之資不為害也不精於法制而務精於選才則所精者適足梗進賢之途不為利也人之才行自昔罕全茍有所長必有所短若録長補短則天下無不用之人責短捨長則天下無不棄之士加以情有憎愛趣有異同假使聖如伊周賢如楊墨求諸物議孰免譏嫌昔子貢問於孔子曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之蓋以小人君子意必相反其在小人之惡君子亦如君子之惡小人將察其情在審其聽聽君子則小人道廢聽小人則君子道消今陛下謹選宰臣必以為重於庶品精擇長吏必以為愈於末流及至宰臣獻規長吏薦士陛下則但納横議不稽始謀是乃任以重者輕其言待以輕者重其事且又不辨所毁之虛實不校所議之短長人之多言何所不至是將使人無所措其手足豈獨選任之道失其端而已乎貞元四年吏部奏艱難以來年月積久兩都士𩔖散在逺方三庫敇甲又經失墜因此人多罔冒吏或詐欺分見官者謂之擘名承巳死者謂之接脚乃至制敕㫖皆被改張毁裂如此之色其𩔖頗多所以選集加衆眞偽混然謹具由歴狀様乞委觀察使諸州府縣於界内應有出身以上合依様通狀發到所司攢勘即姦偽必露寃抑可明貞元九年御史中丞韋正伯劾奏稱吏部貞元七年冬京兆府踰濫解送之人已授官總六十六人或有不到京銓試懸授官告又按選格銓狀自書試日書跡不同即駮放殿選違格文者皆不覆驗及降資不盡或與注官伏以承前選曹乖謬未有如此遂使衣冠以貧乏待闕姦濫以賄賂成名非陛下求才審官之意由是刑部尚書劉滋以前任吏部尚書及吏部侍郎杜黄裳皆坐削階韓愈贈張童子序曰天下之以明二經舉於禮部者歲至三千人始自縣考試定其可舉者然後升於州若府其不能中科者不與是數焉州若府總其屬之所升又考試之如縣加察詳焉舉其可舉者然後貢於天子而升之有司其不能中科者不與是數焉謂之鄉貢有司總州府之所升而考試之加察詳焉第其可進者以名上於天子而藏之屬之吏部歲不及二百人謂之出身能在是選者厥惟艱哉二經章句僅數十萬言其傳注在外皆誦之又約知其大説繇是舉者或逺至十餘年然後與乎三千之數而升於禮部矣又或逺至十餘年然後與乎二百之數而進於吏部矣班白之老半焉昏塞不能及者皆不在是限有終身不得與者焉按如昌黎公之説則知唐選舉之法州府所升者試之禮部禮部所升者試之吏部其法截然且禮部所升之士其中吏部之選十不及一可謂難矣然觀御史韋正伯所劾奏貞元七年冬京兆府踰濫解送之人已授官總六十六人則似未經禮部者徑入吏部又會要稱太和元年中書門下奏凡未有出身未有官如有文學祗合於禮部應舉有出身有官方合於吏部赴科目選近年以來格文差互多有白身及散官并稱鄉貢者並赴科目選及注擬之時即妄論資次曾無格例有司不知所守則知唐中葉以後法度大叚隳廢紊亂矣憲宗時宰相李吉甫定考遷之格諸州刺史四品以上皆五考見考課門楊於陵為吏部侍郎初吏部程判别詔官參考齊抗當國罷之至是尚書鄭餘慶移疾乃循舊制於陵建言他官但第判能否不知限員有司計員為留遣之格事不相謀莫如勿置於是有詔三考官止較科目選至常調悉還吏部又請修甲歴南曹置簿相檢實吏不能為姦初吏部選才將親其人覆其吏事始取州縣案牘疑議試其斷割而觀其能否此所以為判也後日月浸久選人猥多案牘淺近不足為難乃採經籍古義假設甲乙令其判斷既而來者益衆而通經正籍又不足以為問乃徵僻書曲學隱伏之義問之唯懼人之能知也張鷟有龍筋鳯髓判白樂天集有甲乙判元微之集亦有判百餘篇容齋洪氏隨筆曰唐銓選以身言書判擇人既以書為藝故唐人無不工楷法以判為貴故無不習熟而判語必駢儷今所傳龍筋鳳髓判及白樂天集甲乙判是也自朝廷至縣邑莫不皆然非讀書善文不可也宰臣每啟擬一事亦必偶數十語今鄭畋敇語堂判猶存世俗喜道瑣細遺事參以滑稽目為花判其實乃如此非若今人握筆据案只署一字亦可國初尚有唐餘波久而革去之但貎體豐偉用以取人未為至論按唐取人之法禮部則試以文學故曰策曰大義曰詩賦吏部則試以政事故曰身曰言曰書曰判然吏部所試四者之中則判為尤切蓋臨政治民此為第一義必通曉事情諳練法律明辨是非發摘隱伏皆可以此覘之今主司之命題則取諸僻書曲學故以所不知而出其所不備選人之試判則務為駢四儷六引援必故事而組織皆浮詞然則所得者不過學問精通文章羙麗之士耳蓋雖名之曰判而與禮部所試詩賦雜文無以異殊不切於從政而吏部所試為贅疣矣陵夷至於五代干戈侵㝷士失素業於是所謂試判遂有一詞莫措傳寫定本或只書未詳亦可應舉蓋判詞雖工亦本無益故及其末流上下皆以具文視之耳文宗太和元年八月敇諸道諸軍諸使應奏判官并每年冬薦等所奏判官除新開幕府據元額署外其向後奏請如是元闕即云闕某職今奏某人充如已有今更奏即云某職某人縁某事停奏某人替其前使下臺省官合冬薦者除府使罷外既有薦用當且要籍不合便稱去職自今已後如帶職掌授臺省官兩考者不在冬薦限如其實有故罷免者亦須待授官周歲然後許冬薦狀中具言罷免事故其他據品秩合冬薦者則依元敕太和二年三月都省奏落下吏部三銓注今春㫖甲内超資官洪師敏等六十七人敇都省所執是格銓司所引是例互相陳列頗似紛紜所貴清而能通亦猶議事以制今選已滿方此爭論選人可哀難更停滯其三銓已授官都省落下者並依舊注重與團奏仍限五日内畢其如官超一資半資以今授稍優者至後選日量事降折尚書侍郎注擬不一致令都省以此興詞鄭絪丁公著宜罰一季俸東銓所落人數較少楊嗣復罰兩月俸其今年選格仍分明標出近例冀絶徼求時尚書左丞崔𢎞景以吏部注擬多不守文選人中僥倖者衆糾按其事落下甲敇選人輩惜已成之官經宰相喧訴故特降此敇七年中書門下奏今後請京兆河南尹及天下刺史各於本府本道常選人中擇堪為縣令司録録事參軍人具課績才能聞薦其諸州先申牒觀察使都加考覆申送吏部至選集日不要就選塲更試書判吏部尚書侍郎引詣銓曹試時務狀一道訪以理民之術及自陳歴仕以來課績二條擇其理識優長者以為等第便以大縣注擬如刺史所舉併兩人得上下考者就加爵秩在任年考已深者優與進改其縣令録事參軍得上下考兼陟狀者許非時放選如犯贓至一百貫已下者舉主量削階秩一百貫已上者移守僻逺小郡觀察使委中書門下奏聽進止所舉人中兩人善政一人犯贓亦得贖免其犯贓官永不齒録從之昭宗天祐元年敇應天下州府令録並委吏部三銓注擬自四月十一日以後中書並不除授或諸道薦奏量留即度可否施行杜氏通典評曰按秦法唯農與戰始得入官漢有孝悌力田賢良方正之科乃時令徴辟而常歲郡國率二十萬口貢止一人約計當時推薦天下纔過百數則考精審擇必獲器能自兹厥後轉益煩廣我開元天寳之中一歲貢舉凡有數千而門資武功藝術胥吏衆名雜目百戸千途入為仕者又不可勝紀比於漢代且增數十百倍安得不重設吏職多置等級遞立選限以抑之乎常情進趨共慕榮達升高自下由邇陟遐固宜驟歴方至何暇淹留著績秦氏列郡四十兩漢郡國百餘太守入作公卿郎官出宰縣邑便宜從事闕略其文無所可否責以成效寄委斯重酬奬亦崇今之部符三百五十郡縣差降復為八九邑之俊乂不得有之事之利病不得專之八使十連舉動咨禀地卑禮薄事下任輕誠曰徒勞難階超擢容易而授理固然也始後魏崔亮為吏部尚書無問賢愚以停解日月為斷時沉滯者皆稱其能魏之失才實從亮始洎隋文帝素非學術盗有天下不欲權分罷州郡之辟廢鄉里之衆内外一命悉歸吏曹纔厠班列皆由執政則執政參吏部之職吏部總州郡之權罔徵體國推誠代天理物之本意是故銓綜失叙受任多濫豈有萬里封域九流叢湊掄材受職仰成吏曹以俄頃之周旋定才行之優劣求無其失不亦謬歟爾後有司尊賢之道先於文華辨論之方擇於書判靡然趨尚其流猥雜所以閲經號為倒拔徴詞同乎射覆置循資之格立選數之制壓例示其定限平配絶其踰涯或糊名考覈或十銓分掌茍濟其末不澄其源則吏部專總是作程之弊者文詞取士是審才之末者書判又文詞之末也凡為國之本資乎人甿人之利害繫乎官政欲求其理在久其任欲久其任在少等級欲少等級在精選擇欲精選擇在減名目俾士寡而農工商衆始可以省吏員始可以安黎庶矣誠宜斟酌理亂詳覧古今推仗至公矯正前失或許辟召或令薦延舉有否臧論其誅賞課績以考之升黜以勵之拯斯刓弊其效甚速實為大政可不務乎文獻通考卷三十七
