body:
  text: 文獻通考卷一百四十五鄱陽馬端臨貴與著樂考十八樂舞魏武帝平荆州獲漢雅樂郎杜夔時舞師馮肅曉知先代諸舞使夔總之始設軒懸復先代古樂文帝受禪改漢安世樂為正世嘉至樂為迎靈昭容樂為昭業漢巴渝舞為昭武雲翹舞為鳳翔育命舞為靈應武德舞為武頌文始舞為大韶五行舞為大武眀帝太和初詔議廟樂改大子樂為大樂大樂漢舊名也太祖武皇帝樂曰武始之舞髙祖文皇帝樂曰咸熙之舞烈祖皇帝樂曰章斌之舞凡此三舞天地宗廟薦享及朝饗用之總名大鈞之樂也王肅等議設宫縣之樂八佾之舞髙皇大帝太祖髙祖文昭廟皆當兼用先代及武始大鈞之舞以文始大武武德武始大鈞可以備四代之樂猶周存六代之樂也故奏黃鍾舞文始以禮天地奏太蔟舞大武以祀五郊眀堂奏姑洗舞武德巡守以祭四望山川奏㽔賓舞武始大鈞以祀宗廟二至祀邱澤可兼舞四代又漢雲翹育命之舞舊以祀天今可兼以雲翹祀圜丘育命祀方澤卒如肅議亦近古盛制也鞞舞未詳所起然漢已施於燕享矣傅毅張衡所賦皆其事也魏曹植鞞舞歌序曰漢靈帝西園鼓吹有李堅者能鞞舞遭亂西隨段煨先帝聞其舊伎召之堅既中廢兼古曲多謬誤異代之文未必相襲故依前曲改作新歌五篇不敢充之黃門近以成下國之陋樂焉晉武帝受命之初百度草創郊祀眀堂權用魏樂而改樂章繼而命荀朂領其事使郭夏宋識等造正德大豫二舞又改魏昭武舞曰宣武之舞羽籥舞曰宣文之舞咸寧初詔定祖宗之號而廟樂乃廢宣武宣文之舞同用正德大豫之舞朂既以新律造二舞次更修正鐘磬朂薨復詔其子藩修定以施郊廟鞶舞漢曲至晉加以柸謂之世寧舞也張衡舞賦云歷七鞶而蹤躡王粲釋云七鞶陳於廣庭顔延之云遞間開於鞶扇鮑昭云七鞶起長袖皆以七鞶為舞也干寶云晉武帝太康中天下為晉世寧舞矜手以接鞶反覆之至危之象言晉代之士茍貪飲食智不及逺至宋改為宋世寧齊改為齊代昌唐謂之鞶舞𨽻清樂部中白紵舞按舞辭有巾袍之言紵本吳地所出疑是吳舞也晉俳歌又云皎皎白緒節節為雙吳音呼緒為紵疑白紵即白緒也鐸舞漢曲也晉鞞舞亦五篇及鐸舞歌一篇幡舞一篇鼓舞伎六曲並陳於元會其舞故常二八桓元即真太樂遣衆伎尚書殿中郎裴眀子啓增八佾相承不復革宋眀帝自改舞曲歌詞猶存舞並闕其鞞梁謂之鞞扇舞也幡舞扇舞後並亡宋武帝紹晉衰亂之後改正德舞為前舞大豫舞為後舞文帝元嘉中令奚縱參議宗廟舞事會軍興而寢至孝武有司奏宋承晉氏未有稱號前舞後舞有乖古制於是前舞為凱容之舞後舞為宣烈之舞既而建平王宏又議以凱容為韶舞宣烈為武舞故以正德為宣化之舞大豫為興和之舞郊廟初獻奏凱容宣烈之舞終獻奏永安之樂何承天三代樂序稱正德大豫舞蓋出三代容樂其聲節有古之遺音焉然不知二舞乃出宣舞宣文魏大武三舞也宣舞魏韶舞也宣文魏武始舞也魏改巴渝為昭舞五行為大武凱容舞執籥秉翟則魏武始舞也宣烈舞有牟弩有干戚牟弩漢巴渝舞也干戚周舞也由是言之何承天之論未為知樂者也眀帝又自改鞞舞曲歌辭大眀中以鞞柫雜舞合之鐘石施之殿庭順帝升眀中王僧虔以為乖於雅體何其知言邪文帝元嘉十三年司徒彭城王義康於東府正會依舊給伎總章工馮大列相承給諸王伎十四種其舞伎三十六人太常博士傅崇議以為未詳此人數所由唯杜氏注左傳佾舞云諸侯六六三十六人以為非也夫舞者所以節八音也八音克諧然後成樂故樂必以八人為列自天子至士降殺以兩兩者減其二列耳杜以為一列又減二人至士止餘四人豈復成樂按服虔注左傳云天子八八諸侯六八大夫四八士二八其議甚允今諸王不復舞佾其總章舞伎即古之女樂也殿庭八八諸王則應六八春狄鄭伯納晉悼公女樂二八晉以一八賜魏絳此樂以八八為列之證也若如議者唯天子有八則鄭應納晉二六晉應賜絳一六也自天子至士其文物典章尊卑差級莫不以兩未有諸侯既降二列輒減二人近降大半非唯八音不具於兩義亦乖齊武帝祠南郊初獻奏文德宣烈之舞次奏武德宣烈之樂太祖髙皇帝配享奏高德宣烈之樂北郊初獻奏地德凱容之樂次奏昭德凱容之樂眀堂之樂並同二郊之奏宗廟太祖神室奏髙德宣烈之樂穆后奏穆德凱容之樂髙祖奏眀德凱容之舞齊永眀中釋寶月為太樂令鄭義秦論曰笛節以旄籥飾以羽今笛籥並用羽舊制進賢冠幘不簪筆朱衣褾服中厠皂緣曲領白布襪復舄義秦乃改簪筆笛籥同用竹朱漆籥三孔笛一頭五色毦籥兩頭葆羽毦著馮皮履梁武帝辨之曰詩云左手執籥右手秉翟筆笏以記事受言舞者何事簪筆邪梁室肇有天下任昉宗王肅之議凡郊廟備六代之樂武帝非之以為仲尼晏朝之意於是不備宫架不遍舞六代至於郊廟及三朝設架則非宫非軒非判非特直以至恭所應施用而已何其率邪故其命武舞為大壯文舞為大觀南郊舞奏黃鍾取陽始化也北郊舞奏林鍾取隂始化也眀堂宗廟舞奏㽔賓取恭名隂主之義也三朝則大壯奏夷則大觀奏姑洗取其月王也彼謂魏晉以降不應以巴渝夷狄之舞雜周舞真篤論歟梁武帝時太常任昉奏據魏王肅議周禮賓客皆作備樂况天地宗廟事之大者周官以下六律六吕五聲八音六舞大合樂致鬼神以和邦國請依王肅祀祭郊廟備六代樂帝曰按言大合樂者是使六律與五聲克諧八音與舞蹈合節耳豈謂致鬼神祇用六代樂也其後即言乃分樂而序之以祭以享以祀此則曉然已眀肅則失其旨矣推檢記載初無宗廟郊禋遍舞之文唯眀堂之位云以禘禮祀周公於太廟朱干玉戚冕而舞大武皮辨素幘裼而舞大夏納夷蠻之樂於太廟言廣魯於天下也按所以舞大武大夏者止欲備其文武二舞耳非兼用六代也夏以文受周以武功所以故兼之而不用濩者濩武舞也周監於二代質文乃備納蠻夷樂者此眀功德所須蓋止施禘祭不及四時也今四海之祭而不遍舞者何夫祭尚於敬不欲使樂繁禮縟故季氏逮暗而祭日不足則繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛彼義反倚乙利反以臨祭其為不敬大矣他日祭子路與焉質眀而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎儒者知子頽宴饗猶舞六代不知有司跛倚不敬已大若依肅議用六代樂者郊堂既有迎神之樂又登歌各頌功德遍以六律繼以出入方待樂終然後罷祭者此則乖仲尼韙晏朝之旨若三獻禮畢即便卒事則無勞於遍舞也陳武帝宗祀朝饗並遵梁制武舞奏大壯夷則作夾鍾參應之七月金始王取其剛斷也文舞奏大觀姑洗作應鍾參應之三月萬物必榮取其布惠也文帝天禧五年詔劉平張崖定二郊眀堂儀改天嘉中所用齊樂盡以韶為名更舞七德之舞工執干楯曲終復綴出就縣東繼舞九敘之舞工執羽籥後魏道武帝定中山獲其樂縣自制樂舞追尊祖考諸帝樂用八佾奏皇始之舞冬至祭天於南郊圜丘樂用皇矣奏雲和之舞夏至祭地於北郊方澤樂用天祚奏大武之舞及破赫連昌獲古雅樂平涼州得其伶人器服並擇而存之後通西域又以恱般國鼓舞設於樂府文帝時公孫崇典知樂章嘗言於帝曰樂府先傳正聲有王夏登歌鹿鳴之屬而有文始五行勺舞及太祖初興所制皇始之舞又有吳夷東夷西戎之舞凡七舞用之郊廟中京造次但用文始五行皇始三舞而已皇魏四祖三宗之樂宜有表章帝乃詔劉芳更定文武二舞始於大饗用之後祖瑩等建言請以韶舞為崇德武舞為章烈總名曰嘉成詔可其議特凖古六代之樂易嘉成為大成然赫連昌涼州恱般國之樂吳夷東夷西戎之舞並列之太樂是不知先王之時夷樂作於國門右辟之説也北齊之舞作覆燾以享天地之神作恢祚以獻髙祖武帝之室宣政以獻文襄之室光大以獻文宣之室朝饗用文武之舞咸有階步其雜樂歌舞之伎自襄以來皆所樂好至河清以後傳習尤甚無足紀焉後周武帝初造山雲之舞又定大夏大漢大武正德武德以備六代之樂南北郊雩壇太廟禘祫朝會並用之然不制神室之舞非古人所以象德昭功之意也城舞後周武帝平齊作永安樂行列方正象城郭謂之城舞用八十人刻木為靣狗喙獸耳以金飾之垂線為髮畫襖皮帽舞蹈姿致猶作羌胡狀隋文帝平陳之後盡得宋齊舊樂更詔牛宏等定文武之舞辨器服之異又凖樂記象德擬功初來就位總干而山立思君道之難也發揚蹈厲威而不殘也武亂皆坐四海咸安也武始而受命再成而定山東三成而平蜀道四成而北狄是通五成而江南是拓六成復綴以闡太平文武曰不用象功德直象事可也近代舞出入皆作樂謂之階步咸用肆夏周官所謂出入奏鐘鼓是也並依定焉梁帝罷之不知經之過也魏晉以來有矛俞弩俞及諸儒𨗳引之類既非正典悉罷不用亦可謂治古之舉也其後定令置七部樂而牛宏又請存鞞鐸巾拂四舞與新伎並陳宴會同設於西涼前奏之帝曰音聲節奏及舞悉宜依舊惟舞人不捉鞞拂爾牛宏當世儒宗而措論如是抑何不知先王雅樂之甚哉隋文舞工六十四並黑介冠進賢冠絳紗連裳白內單皂褾領襈裾革帶烏皮履十六工執翣十六工執帗十六工執旄十六工執羽左手皆執籥二工執纛引前左舞員外衣冠亦如之武舞工六十四並服武辨朱褠衣革帶烏皮履左執朱干右執玉戚二工執旌居前二工執鼗二工執鐸金錞二四工舉二工作二工執鐃二工執相在左二工執雅在右各一工作焉自旌以下夾引武舞者在舞員外衣冠亦如之然朱干玉戚古天子之舞也舞工以之不亦過乎唐髙祖時祖孝孫定樂更文舞曰治康武舞曰凱安舞者各六十四人文舞左籥右翟與執纛而引者二人皆委貌冠黑素絳領廣褎白褲革帶烏皮履武舞左干右戚執旌居前者二人執鼗執鐸皆二人金錞二輿者四人奏者二人執鐃二人執相在左執雅在右皆二人夾𨗳服平冕餘同文舞朝會則武辨平巾幘廣褎金甲豹文褲烏皮鞾執干戚夾𨗳皆同郊廟凡初獻作文舞之舞亞獻終獻作武舞之舞太廟降神以文舞每室酌獻各用其廟之舞禘祫遷廟之主合食則舞亦如之儀鳳二年太常卿韋萬石定凱安舞六變一變象龍興參墟二變象克定關中三變象東夏賓服四變象江淮平五變象獫狁伏從六變復位以崇象兵還振旅初太宗時詔祕書監顔師古等撰定𢎞農府君至髙祖太武皇帝六廟樂曲舞名其後變更不一而自獻祖而下廟舞略可見也獻祖曰光大之舞懿祖曰長發之舞太祖曰大政之舞世祖曰大成之舞髙祖曰大眀之舞太宗曰崇德之舞髙宗曰鈞天之舞中宗曰大和之舞睿宗曰景雲之舞元宗曰大運之舞肅宗曰惟新之舞代宗曰保大之舞德宗曰文眀之舞順宗曰大順之舞憲宗曰象德之舞穆宗曰和寧之舞敬宗曰大鈞之舞文宗曰文成之舞武宗曰大定之舞昭宗曰咸寧之舞其餘闕而不著唐之自製樂凡三大舞一曰七德舞二曰九功舞三曰上元舞七德舞者本名秦王破陳樂太宗為秦王破劉武周軍中相與作秦王破陳樂曲及即位宴會必奏之謂侍臣曰雖發揚蹈厲異乎文容然功業由之被於樂章示不忘本也右僕射封德彞曰陛下以聖武戡難陳樂象德文容豈足道哉帝矍然曰朕雖以武功興終以文德綏海內謂文容不如蹈厲斯過矣乃製舞圖左圓右方先偏後伍交錯屈伸以象魚麗鵝鸛命吕才以圖教樂工百二十八人被銀甲執戟而舞凡三變每變為四陳象擊刺往來歌者和日秦王破陳樂後令魏徵與員外散騎常侍褚亮員外散騎常侍虞世南太子右庶子李百藥更製歌辭名曰七德舞舞初成觀者皆扼腕踊躍諸將上夀羣臣稱萬歲蠻夷在庭者請相率以舞太常卿蕭瑀曰樂所以美盛德形容而有所未盡陛下破劉武周薛舉竇建德王世充願圖其狀以識帝曰方四海未定攻伐以平禍亂製樂陳其梗槩而已若備寫擒獲今將相有嘗為其臣者觀之有所不忍我不為也自是元日冬至朝會慶賀與九功舞同奏舞人更以進賢冠虎文袴螣蛇帶烏皮鞾二人執旌居前其後更號神功破陳樂九功舞本名功成慶善樂太宗生於慶善宫貞觀六年幸之宴從臣賞賜閭里同漢沛宛帝歡甚賦詩起居郎吕才被之管絃名曰功成慶善樂以童兒六十四人冠進德冠紫袴褶長褎漆髻屣履而舞號九功舞進蹈安徐以象文德麟德二年詔郊廟享祀奏文舞用功成慶善樂曵履執紼服袴褶童子冠如故武舞用神功破陳樂衣甲持戟執纛者被金甲八佾加簫笛歌鼓列坐縣南若舞即與宫縣合奏其宴樂二舞仍别設焉上元舞者髙宗所作也舞者百八十人衣畫雲五色衣以象元氣其樂有上元二儀三才四時五行六律七政八風九宫十洲得一慶雲之曲大祠享皆用之至上元三年詔惟圜丘方澤太廟乃用餘皆罷又曰神功破陳樂不入雅樂功成慶善樂不可降神亦皆罷而郊廟用治康凱安如故儀鳳二年太常卿韋萬石奏請作上元舞兼奏破陳慶善二舞而破陳樂五十二遍著於雅樂者二遍慶善樂五十遍著於雅樂者一遍上元舞二十九遍皆著於雅樂又曰雲門大咸大㲈大夏古文舞也大濩大武古武舞也為國家者揖讓得天下則先奏文舞征伐得天下則先奏武舞神功破陳樂有武事之象功成慶善樂有文事之象用二舞請先奏神功破陳樂初朝會常奏破陳舞髙宗即位不忍觀之乃不設後幸九成宫置酒韋萬石曰破陳樂舞所以宣揚祖宗盛烈以示後世自陛下即位寢而不作者久矣禮天子親總干戚以舞先祖之樂今破陳樂久廢羣下無所稱述非所以發孝思也帝復令奏之舞畢歎曰不見此樂垂三十年追思王業勤勞若此朕安可忘武功邪羣臣皆稱萬歲然遇饗燕奏二樂天子必避位坐者皆興太常博士裴守真以為奏二舞時天子不宜起立詔從之及髙宗崩改治康舞曰化康以避諱武后毁唐太廟七德九功之舞皆亡唯其名存自後復用隋文舞武舞而已開元元年瀛州司法參軍趙慎言言按周禮以樂舞教國子舞雲門大咸大濩大武是知古之舞者即諸侯子孫容服鮮麗故得神祗降福靈光燭壇今之舞人並容貌菆陋屠沽之流用以接神欲求降福固亦難矣隋猶以品子為之號為二舞郎逮乎聖朝遂變斯制誠願革兹近誤考復古道其二舞人取品子年二十以下顔容修正者為之令太常博士主之準國子學給科行事之外習六樂之道學五禮之儀十周年量文武授散官號曰雲門生又五郊工人舞人衣服合依五色按周禮以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以元璜禮北方是知五方帝德色玉不同四時文物各隨方變冀以同色相感同事相宜隂陽交泰莫不由此今祭器裀褥總隨於五方五郊衣服獨乖於方色舞者常持皂飾工人恆服絳衣以臣愚知深為不便其工人衣服各依方色其宗廟黃色仍各以所主色褾袖又以樂治身心禮移風俗請立樂教以化兆民周禮曰以樂德教國子中和祗庸孝友其國子諸生請教以樂經同於禮傳則人人知禮家家知樂自然風移俗易災害不生其樂經章目雖詳稍乖旨要請委通眀博識修撰訖然後頒下大定舞本出破陳樂舞者百四十人被五采文甲持槊歌云八弦同軌樂以象平遼東而邉隅大定也聖夀舞唐髙宗武后作舞用百四十人金銅冠五色畫衣舞之行列必成字凡十六變而畢有聖超千古道泰百王皇帝萬年寶祚彌昌之字然先王作樂有六變而止者有八變而止者有九變而止者未聞十六變也不亦失大樂必易之意邪光聖舞唐眀皇作舞者八十人鳥冠五采畫衣兼以上元聖夀之容以歌王業所興也宴樂舞唐張文收所造也舞工二十人緋綾為袍絲布為袴又分四部景雲舞八人慶善舞四人承天舞四人樂用玉磬二格大方饗一格搊箏築臥箜篌大箜篌小箜篌大琵琶小琵琶大五絃琵琶小五絃琵琶吹葉大笙小笙大觱篥小觱篥大簫小簫正銅鈸和銅鈸長笛短笛楷鼓連鼓鞉鼓桴鼓各一工歌二開元以後並亡唯景雲舞僅存爾長夀舞武后長夀年所制舞者十有二人衣冠皆畫天授舞武后天授年所制舞者四人畫衣五采鳳冠萬嵗舞鳥歌萬嵗樂舞唐武太后所造也當是時宫中養鳥能人言又常稱萬嵗故為樂以象之舞者三人緋大袖並畫鸜鵒冠作鳥像嶺南有鳥似鸜鵒稍大乍視不可辨久飬之能言南人謂之吉了亦云料開元初廣州獻之言音雄重如丈夫委曲識人情慧於鸚鵡逺矣漢書武帝紀書南越獻能言鳥豈謂此邪北方常言鸜鵒踰嶺乃能言傳者誤矣龍池舞唐眀皇所作初帝在藩邸居龍慶坊坊之南忽變為池望氣者異焉中宗末年泛舟池中及即位以坊為宫池水逾大彌漫數里故為此樂以歌其祥舞者十有二人為列服五色紗雲衣芙蓉冠無憂履四工執蓮花以引舞一奏而五疉小破陳樂舞唐眀皇造舞者四人金甲胄蓋生於立部伎也師子舞唐太平樂亦謂之五方師子舞師子摯獸出於西南夷天竺師子等國綴毛為之各髙丈餘人居其中像其俯仰馴狎之容二人持繩秉拂為習㺯之狀五師子各放其方色百四十人歌太平樂舞以足持繩者服飾作崑崙狀中和舞唐德宗造舞因成八卦仲春麟德殿會百僚觀新樂詩且敘其舞曰朕以仲春之首紀為令節聽政之暇韻於歌詩象中和之容作中和之舞六合還淳舞唐調露二年上御洛城南樓賜太常奏六合還淳之舞順聖舞昔于司空頔撰順聖樂以進每宴必使奏之其曲將半行綴皆伏一人舞於中央幕客韋授笑曰何用窮兵獨舞觀其言雖詼諧然亦不為無味矣豈古所謂譎諫邪承天舞承天樂舞四人紫袍進德冠並銅帶聖主回鑾舞唐大定元年天后幸京師同州刺史蘇環進聖主還京樂舞上御行宫樓觀之賜以束帛令編之樂府一戎大定舞唐龍朔元年上召李績阿史那上官儀等宴於城門觀屯營新教之舞名之一戎大定樂皆親征遼東形容用武之象也神宫大樂舞唐武后長夀中親享萬象神宫因制此舞用舞者九百人作之神宫之庭焉霓裳舞唐文宗每聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成太常卿馮定總樂工閲之於庭端凝若植文宗乃召升階自吟定送客西江詩因錫禁中瑞錦令録所著古體詩以獻豈莊周所謂旦暮遇之者邪自兵亂以來霓裳羽衣曲其音遂絶江南偽主李煜樂工曹者素善琵琶因按譜得其聲煜后周氏亦善音律又自變易徐鉉問曹曰法曲本緩而此聲太急何也曹曰宫中人易之議者以為非吉祥也後嵗餘而周氏卒矣景雲舞舞者八人花錦為袍五綾為袴緑雲冠黑皮鞾坐部舞立部舞唐安樂太平破陳慶善大定上元聖夀光聖等舞皆雷大鼓雜以龜茲之樂大定樂加金鉦唯慶善舞獨用西涼樂舊破陳上元慶善三舞皆更其衣冠合之鍾石别享郊廟以破陳為七德之武舞慶善為九功之文舞自武后僣亂毁唐宗廟斯禮竟廢矣安樂等八舞皆立奏之樂府謂之立部伎也自長夀天授鳥歌萬嵗龍池小破陳等舞皆同龜茲樂舞人皆穿皮鞾惟龍池舞備用雅樂而無鍾石舞躡履宴樂等六舞皆坐奏之樂府謂之坐部伎也唐之雅樂其雜夷蠻之制如此然則卒致胡雛之禍者有以也夫傾杯舞唐明皇常令教舞馬百駟分為左右部時塞外亦以善馬來貢上俾之教習無不曲盡其妙因命衣以文繡絡金鈴飾其鬛間雜以珠玉其曲謂之傾杯樂凡數十疊奮首鼓尾縱橫應節又施三層板牀乘馬而上抃轉如飛或命壯士舉榻馬舞其上樂工數十環立皆衣以淡黃衫文玉帶必求妙齡姿美者充之每遇千秋節大宴勤政樓奏立坐二部伎畢則自內廄引出舞之其後明皇幸蜀而舞馬散在民間祿山頗心愛之自是以數十匹置之范陽後為田承嗣所得而雜於戰馬置之外棧既而軍中饗士樂作馬舞不能自止厮養輩謂其為妖擁篲以擊之馬立其舞不中節抑揚頓挫尚存故態廄吏遽以為怪白承嗣箠之終斃於櫪下惜哉由是觀之山海經述海外太樂之野夏后啓於此舞九代馬穆天子傳有馬舞之舞亦信有之矣軟舞唐開成末有樂人崇胡子能軟舞其腰支不異女郎也然舞容有大垂手有小垂手或像驚鴻或如飛燕婆娑舞態也蔓延舞綴也然則軟舞蓋出體之自然非此類歟健舞唐教坊樂垂手羅回陂樂蘭陵王春鶯囀半社渠借席烏夜啼之屬謂之軟阿遼柘枝黃章拂林大渭州達摩支之屬謂之健舞故健舞曲有大杆阿連柘枝劍氣胡旋胡勝軟舞有舞州蘇合香拙枝團亂旋甘州焉歎舞唐咸通中伶人李可及善音律尤能囀喉為新聲音辭曲折聽者忘倦京師屠沽少年效之謂之拍彈時同昌公主喪除懿宗與郭淑妃悼念不已可及為歎百年舞曲舞人皆盛飾珠翠仍畫魚龍地衣以列之曲終樂闋珠翠覆地調語悽惻聞者流涕懿宗嘗厚賜之時宰相曺確屢論之不納至僖宗朝卒為崔彥昭所奏死於嶺表豈得放鄭逺佞之意邪杜氏通典前代樂飲酒酣必起自舞詩云屢舞仙仙是也宴樂必舞但不宜屢耳前代譏在屢舞不譏舞也漢武帝樂飲長沙定王舞是也魏晉以來尤重以舞相屬謝安以屬桓嗣是也近代以來此風絶矣宋孝武帝大明中以鞞拂雜舞合之鍾石施於廟庭鶴舞馬舞竹書穆天子傳亦有之宋鮑昭又有舞鶴賦此舞或時而有非樂府所統今翔麟鳳苑廄有蹀馬俯仰騰躍皆合曲節朝會用樂則兼奏之梁太祖開平初造崇德之舞以祀昊天開平之舞以享宗廟然廟有四室室為一舞一室曰大合之舞二室曰象功之舞三室曰來儀之舞四室曰昭德之舞後唐依前制獨宗廟四室别立舞名懿宗用昭德之舞獻祖用文明之舞太祖用應天之舞昭宗用永平之舞莊宗用武成之舞明宗用雍熙之舞晉高祖初詔崔棁等制定樂舞棁等講求唐制盡復其器服工員改文曰昭德之舞武曰成功之舞始為大會陳之並推取教坊諸工以備行列屈信俯仰頗有儀度其後太常更自廣募工員多出市人閲習未幾而元會朝饗遂用寺工以陳於廷進退無旅而歌如虞殯當時識者觀之知晉之將亡兆於此矣漢高祖即位之初太常張昭進言唐有治康凱安七德九功四舞不可廢罷宜更名號示不相襲也故治康曰治安之舞凱安曰振德之舞九功曰觀象之舞七德曰講功之舞治安振德用之郊廟觀象講功施之燕享又宗廟四室室别名舞一室曰靈長之舞二室曰積善之舞三室曰顯仁之舞四室曰章慶之舞未幾高祖廟有司上觀德之舞云周廣順初太常卿邊蔚奏改治安為政和之舞振德為善勝之舞觀象為崇德之舞講功為象成之舞宗廟樂舞信祖廟舞肅雍之舞僖祖廟舞章德之舞義祖廟舞善慶之舞慶祖廟舞觀成之舞太祖廟舞明德之舞世宗廟舞定功之舞宋朝建隆之初竇儼首議更周樂舞之名以崇德舞為文德之舞象成舞為武功之舞權籍教坊及開封府樂户子弟充之冠服用唐舊制而已太祖皇帝乾元殿朝羣臣更詣大明殿上夀詔用文德武功之舞然郊廟殿廷同制其容綴未稱朝廷揖遜之意故和峴建言宜先奏文舞焉殿廷所用文舞宜為盛德升聞之舞取舜受堯禪元德升聞之義也舞工用百二十人八佾之數判為八列列十六工皆著履執拂服袴褶冠進賢二工執五采纛引之文容變數略倣舊儀次奏武舞宜為天下大定之舞取武王一戎衣而天下大定之義也舞工亦凖文舞之數被金甲持戟二工執五色旗引之一變象六師舉二變象上黨平三變象維揚定四變象荆湖復五變象卭蜀來六變象師還振旅至於鐃鐸雅相錞鼗並舞舞工冠服仍舊而已太宗淳化中峴弟㠓復奏昔改殿廷二舞以光太祖功烈今亦應更定舞名其舊用盛德升聞宜更名化成天下之舞取易稱化成天下之義也天下大定更名威加海內之舞取漢高祖為威加海內之歌也蓋其舞亦六變焉一變象講武二變象漳泉歸三變象杭越朝四變象殄並汾五變象清銀夏六變象兵還振旅每變樂一曲而已詔從之和峴弟兄可謂善因時而造者真宗又詔殿廷二舞復用乾德舊名祥符中崇奉玉清昭應宫等諸祠每乘輿薦獻並作備樂别號文舞曰發祥流慶之舞武舞曰降真觀德之舞又因太宗裁萬國朝天之曲造同和之舞裁平晉之曲造定功之舞郊廟並奏之天聖中孫奭進言太常雅樂郊廟酌獻上用登歌不作文舞亞獻又不作武舞止奏正安而已於是劉筠等議自是宗廟酌獻復用文舞武舞工先入以須亞獻而亞獻終獻並舞正安之曲郊祀天地與宗廟既異廟室各有稱頌功德故文舞迎神之後各奏逐室之舞郊祀降神奏高安之曲文舞已作及皇帝酌泛齊惟登歌奏禧安之樂而舞綴不作亞獻終獻仍用武舞焉明道中冬至皇帝率羣臣於文德殿莊獻明肅皇太后行上夀之禮設宫縣進厚德無疆之文舞四海會同之武舞各三變而罷宋祖宗廟室樂舞之名僖祖室曰大善之舞順祖室曰大寧之舞翼祖室曰大順之舞宣祖室曰大慶之舞太祖室曰大定之舞太宗室曰天盛之舞真宗室曰大明之舞仁宗室曰大仁之舞英宗室曰大英之舞神宗室曰大成之舞諸后之室凡行酌獻之禮孝惠孝章位同奏大統之曲淑德位奏大昌之曲章懷位奏大治之曲自餘隨帝室所奏云陳氏樂書曰竊觀祖宗之室曲異之舞至於后室一用文德之舞而武舞不用焉豈非感於先儒婦人無武事之説邪春秋書初獻六羽非無武舞也特舉羽以見干耳如曰不然閟宫祀薑嫄之詩何以美萬舞洋洋乎古人亦常振萬於文夫人之側亦足考信矣方今誠於諸后之室并奏文武之舞以娛樂神靈以形容德美真曠代甚盛之舉而不失先王之制也又曰周人教國子之舞有大司樂有小司樂又舞師下士二人胥四人舞徒四十人然則古之舞者非獨給繇役之賤者而已雖為國子爵為下士亦預焉漢太樂律卑者之子不得舞宗廟之酎除吏二千石至六百石關內侯至五大夫之子取其適者五尺以上年十二至三十顔色和身體修治者以為舞人古國子下士之實也唐之郊廟舞工不合古制趙慎言奏議隋代猶以品子為之號二舞郎唐興遂變其制誠願復古道取品子年二十以下容質修正者備二舞之員令太常博士主之準國子學給科間日得習六樂學五禮滿十嵗量文武授散官號雲門生其制亦可謂近古矣然不設課試之法勸沮之術未為備制也聖朝舞郎之制尚仍唐舊誠推慎言之法輔之以課試勸沮之方以之饗郊廟接神祇未有不降格而來饗矣今日不得不為之留意也神宗元豐二年詳㝎所以朝會樂而有請者十其三定文舞武舞各為四表表距四步為鄼綴各六十四文舞者服進賢冠左執籥右秉翟分八佾二工執纛引前衣冠同之舞者進蹈安徐進一步則兩兩相顧揖三步三揖四步為三辭之容是為一成餘成如之自南第一表至第二表為第一成至第三表為再成至北第一表為三成覆郤行至第三表為四成至第二表為五成復至南第一表為六成而武舞入今文舞所秉翟羽則集雉尾置於髹漆之柄求之古制實無所本聶崇義圖羽舞所執類羽葆幢析羽四重以結綬系於柄此纛翳之謂也請按圖以翟羽為之其四武舞服平巾幘左執干右執戈二工執旌居前執鼗執鐸各二工金錞二四工舉二工執鐲執鐃執相在左執雅在右亦各二夾引舞者衣冠同之分八佾於南表前先振鐸以通鼓乃擊鼓以警戒舞工聞鼓聲則各依鄼綴總干正立安位堂上長歌以咏歎之於是播鼗以導舞舞者進步自南而北至最南表以見舞漸然後左右夾振鐸次擊鼓以金錞和之以金鐲節之以相而輔樂以雅而陔步舞者發揚蹈厲為猛賁橇速之狀每步一進則兩兩以戈盾相嚮一擊一刺為一伐為一成成謂之變至第二表為一變至第三表為二變至北第一表為三變舞者覆身嚮堂郤行而南至第三表為四變乃擊刺而前至第二表回易行列春雅節步分左右而跪以右膝至地左足仰起象以文止武為五變舞蹈而進為兵還振旅之狀振鐸搖鼗擊鼓和以金錞廢鐲鳴鐃復至南第一表為六變而舞畢古者人君自舞大武故服冕執干戚若用八佾而為擊刺之容則舞者執干戈説者謂武舞戰象樂六奏每一奏之中率以戈矛四擊刺戈則擊兵矛則刺兵玉戚非可施於擊刺今舞執干戚蓋沿襲之誤請左執干右執戈哲宗元祐四年十二月始命大樂正葉防撰三朝二舞儀武舞曰威加四海之舞第一變舞人去南表三步總干而立聽舉樂三鼓前行三步及表而蹲再鼓皆舞進一步正立再鼓皆持干荷戈相顧作猛賁橇速之狀再鼓皆轉身向裏以干戈相擊刺足不動再鼓皆回身向外擊刺如前再鼓皆正立舉手蹲再鼓皆舞進一步轉靣相向立干戈各直腰再鼓各前進以左足在前右足在後左手執干當前右手持戈在腰為進旅再鼓各相擊刺再鼓各退身復位整其干為退旅再鼓皆正立蹲再鼓皆舞進一步正立再鼓皆轉靣相向秉干持戈坐作再鼓各相擊刺再鼓皆起收其干戈為克捷之象再鼓正立遇節則蹲第二變聽舉樂依前蹲再鼓皆舞進一步正立再鼓皆正靣作再鼓各轉身向裏相擊刺足不動再鼓各轉身向外擊刺如前再鼓皆正立蹲再鼓皆舞進一步陳其干戈左右相顧為賁速之狀再鼓皆併入行以八為四再鼓皆兩兩對相擊刺再