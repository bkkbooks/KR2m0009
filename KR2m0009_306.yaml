body:
  text: 文獻通考卷三百六鄱陽馬端臨貴與著物異考十二恆風春秋僖公十六年正月六鶂退蜚過宋都師古曰鶂音五狄反左氏傳曰風也劉歆以為風發於他所至宋而高鶂高蜚而逄之則退經以見者為文故記退蜚傳以實應著言風常風之罰也象宋襄公區霿自用不容臣下逆司馬子魚之諫而與強楚爭盟師古曰子魚公子目夷也桓公之子而為司馬爭盟謂為鹿上之盟以求諸侯於楚子魚諫曰小國爭盟禍也公不聽之後六年為楚所執師古曰僖二十一年楚執宋公以伐宋距六鶂退飛凡六年應六鶂之數云京房易傳曰潛龍勿用師古曰乾初九爻辭衆逆同志至德乃潛厥異風其風也行不解物不長師古曰不解物謂物逄之而不解散也不長所起者近也雨小而傷政悖德隱兹謂亂厥風先風不雨大風暴起發屋折木守義不進兹謂耄厥風雲俱起折五穀莖臣易上政兹謂不順厥風大猋發屋師古曰猋疾風也音必遙反賦斂不理兹謂禍厥風絶經緯如淳曰有所破壞絶匹帛之屬也晉灼曰南北為經東西為緯絲因風暴亂不端理也止即溫溫即蟲侯專封兹謂不統厥風疾而樹不搖穀不成辟不思道利兹謂無澤師古曰道讀導不思導示於下而安利之厥風不搖木旱無雲傷禾公常於利兹謂亂師古曰公上爵也常於利謂心常求利也厥風微而溫生蟲蝗害五穀棄正作淫兹謂惑厥風溫螟蟲起害有益人之物侯不朝兹謂叛厥風無恆地變赤而殺人漢文帝二年六月淮南王都壽春大風毁民室殺人時淮南王破南越後遂謀逆帝赦之遷蜀道死五年吳暴風雨壞城官府民室時吳王濞謀為逆亂後卒誅滅五年十月楚王都彭城大風從東南來毁市門殺人時王戊初嗣位後坐淫削國與吳王謀反誅武帝元光五年秋七月大風拔木征和二年夏四月大風發屋折木昭帝元鳯元年燕王都薊大風雨拔宫中樹七圍以上十六株壞城樓後燕王旦謀反發覺誅成帝建始元年十二月大風拔甘泉畤中大木十圍以上王莽天鳯元年七月大風拔木飛北闕直城瓦屋地皇元年七月大風毁王路堂後漢光武於更始元年六月中破王尋王邑兵于昆陽大雷風屋瓦皆飛和帝永元五年五月戊寅南陽大風拔樹木安帝永初元年大風拔樹是時鄧太后攝政以清河王子年少號精耳故立之是為安帝不立皇太子勝以為安帝賢必當德鄧氏也後安帝親讒廢免鄧氏令郡縣迫切死者八九人家至破壞此為瞽霿也是後西羌亦大亂涼州十有餘年二年六月京師及郡國四十大風拔木三年五月癸酉京都大風拔南郊道梓樹九十六株七年八月丙寅京都大風拔樹元初二年二月癸亥京都大風拔樹六年夏四月沛國勃海大風拔樹三萬餘株延光二年三月丙申河南潁川大風拔樹六月壬午郡國十一大風拔樹是時安帝親讒曲直不分三年京都及郡國三十六大風拔樹靈帝建寧二年四月癸巳京都大風雨雹拔郊道樹十一圍已上百餘株其後晨迎氣東郊道於雒水西橋逄暴風雨鹵簿車或發蓋百官霑濡還不至郊使有司行禮迎氣西郊亦一如此中平五年六月丙寅大風拔樹獻帝初平四年六月右扶風大風發屋拔木魏齊王正始九年十一月大風數十日發屋折樹十二月戊午晦尤甚動太極東閣嘉平元年正月壬辰朔西北大風發屋折樹木昏塵蔽天按管輅説此為時刑大風執政之憂也是時曹爽區霿自專驕僭過度此思心不睿恆風之罰也後踰旬而爽誅滅吳孫權太元元年八月朔大風江海涌溢平地水深八尺拔南陵樹二千株石碑蹉動吳城兩門飛落按華核對役繁賦重區霿不容之罰也明年權薨孫亮建興元年十二月甲申大風震電是歲魏遣大衆三道來攻諸葛恪破其東興軍二軍亦退明年恪又攻新城喪衆大半還伏誅孫休永安元年十一月甲午風四轉五復蒙霧連日是時孫綝一門五侯權逼吳王風霧之災與漢五侯丁傅同應也十二月丁卯夜有大風發木揚沙明日綝誅晉武帝泰始五年五月辛卯朔廣平大風折木咸寧元年五月下邳廣陵大風壞千餘家折樹木其月甲申廣陵司吾下邳大風折木二年八月河間大風折木太康二年五月濟南暴風折木傷麥六月高平大風折木發壞邸閣四十四區七月上黨又大風傷秋稼八年六月郡國八大風九年正月京都風雹發屋拔樹後二年宮車晏駕惠帝元康四年六月大風雨拔樹五年四月庚寅夜暴風城東渠波浪殺人七月下邳大風壞廬舍九月鴈門新興太原上黨災風傷稼明年氐羌反叛大兵西討九年六月飈風吹賈謐朝服飛數百丈明年謐誅十一月甲子朔京都連大風發屋折木十二月愍懷太子廢幽於許昌永康元年二月大風拔木三月愍懷被害己卯喪柩發許昌還洛是日又大風雷電幃蓋飛裂四月張華第舍飈風起折木飛繒折軸六七是月華遇害十一月戊午朔大風從西北來折木飛沙石六日止明年正月趙王倫篡位永寧元年八月郡國三大風永興元年正月乙丑西北大風趙王倫建始元年正月癸酉趙王倫祠太廟災風暴起塵四合其年四月倫伏辜元帝永昌元年七月丙寅大風拔木屋瓦皆飛八月暴風壞屋拔御道柳樹百餘株其風縱橫無常若風自八方來者是時王敦專權害尚書令刁協僕射周顗等故風縱橫若非一處也此臣易上政諸侯不朝之罰也十一月宮車晏駕成帝咸康四年三月壬辰成都大風發屋折木四月李壽襲殺李期自立康帝建元元年七月庚寅晉陵吳郡災風穆帝升平元年八月丁未册立皇后何氏是日疾風後桓元篡位乃降后為零陵縣君不睿之罰也五年正月戊午朔大風海西公太和六年二月大風迅急是年被廢孝武帝寧康元年三月京都大風火大起是時桓溫入朝志在陵上帝又幼小人懷憂恐斯不睿之徵也三年三月戊申朔暴風迅起從丑上來須臾逆轉從子上來飛沙揚礫太元二年二月乙丑朔暴風折木閏三月甲子朔暴風疾雨俱至發屋折木三年六月長安大風拔苻堅宮中樹其後堅再南伐遂有淝水之敗身戮國亡四年八月丁未暴風揚沙石十二年正月壬午夜暴風七月甲辰大風折木十三年十二月己未大風晝晦其後帝崩而諸侯違命權奪於元顯禍成於桓元是其應也十七年六月乙未大風折木安帝元興二年二月夜大風雨大航門屋瓦飛落明年桓元篡位由此門入三年正月桓元出遊大航南風飄其䡟輗上匹計反下五計反蓋經三月而元敗歸江陵五月江陵又大風折木是月桓元敗於崢嶸洲身亦屠裂十一月丁酉大風江陵人多死者義熙四年十一月辛卯朔西北方疾風起五年閏十一月丁亥大風發屋明年盧循至蔡洲六年五月壬申大風拔北郊樹樹蓋幾百年也并吹琅邪揚州二射堂俱倒壞是日盧循大艦漂沒甲戌又風發屋折木是歲冬王師南討九年正月大風白馬寺浮圗剎初轄反柱折壞十年四月己丑朔大風拔木六月辛亥又大風拔木七月淮北又大風壞屋舍皆為明年西討司馬休之應也宋文帝元嘉二十九年三月壬午大風拔木齊武帝永明四年二月丙寅大風吳興偏甚樹葉皆赤八年六月乙酉都下大風發屋梁武帝天監六年八月戊戌大風折木京房易飛候曰角日疾風天下昏不出三月中兵必起是歲魏軍入鍾離元帝承聖三年十一月癸未帝閲武於南城北風大急普天昏暗洪範五行傳曰人君瞀亂之應時帝既平侯景公卿咸勸帝反丹陽帝不從又多猜忌有瞀亂之行故天變應之以風是歲為西魏滅陳文帝天嘉六年七月癸未大風起西南吹倒靈臺候樓洪範五行傳以為大臣專恣之咎時太子沖幼安成王頊專政帝不時抑損明年崩皇太子嗣位頊遂廢之宣帝太建十二年六月壬戌大風吹壞臯門中闥九月夜又風發屋拔樹始興王叔陵專恣之應後主至德中大風吹倒朱雀門禎明三年六月丁巳大風自西北激濤水入石頭淮是時後主任司馬申誅戮忠諫沈客卿施文慶專行邪僻江總孔範等崇長淫縱杜塞聰明瞀亂之咎北齊武成河清二年大風三旬乃止時帝委政佞臣和士開專恣日甚後主天統三年五月大風晝晦發屋拔木明年帝崩七年三月大風起西北發屋拔木五日乃止時高阿那瓌駱提婆等專恣之應隋文帝開皇二十年十一月京師大風發屋拔木秦隴壓死者千餘仁壽二年西河有胡人乘騾在道忽為廽風所飄并一車上千餘尺乃墜皆碎焉京房易傳曰衆逆同志至德乃潛厥異風後二載漢王諒在并州潛謀逆亂車及騾騎之象也升空而墜顛殞之應也唐高宗武德二年十二月壬子大風易巽為風重巽以申命其及物也象人君誥命其鼓動於天地間有時飛沙揚塵怒也發屋拔木者怒甚也其占大臣專恣而氣盛衆逆同志君行蒙暗施於事則皆傷害故常風又飄風入宮闕一日再三若風聲如雷觸地而起為兵將興太宗貞觀十四年六月乙酉大風拔木高宗咸亨四年八月己酉大風落太廟鴟尾永隆二年七月雍州大風害稼𢎞道元年十二月壬午晦宋州大風拔木中宗嗣聖元年四月丁巳寧州大風拔木武后垂拱四年十月辛亥大風拔木永昌二年五月丁亥大風拔木中宗神龍元年三月乙酉睦州大風拔木崔元暐封博陵郡王也大風折其輅蓋二年六月乙亥滑州大風拔木景龍元年七月郴州大風發屋拔木八月宋州大風拔木壞屋舍二年十月辛亥滑州暴風發屋三年三月辛未曹州大風拔木元宗開元二年六月京師大風發屋大木拔者十七八四年六月辛未京師陜華大風拔木九年七月丙辰揚州潤州暴風雨發屋拔木十四年六月戊午大風拔木發屋端門鴟尾盡落端門號令所從出也十九年六月乙酉大風拔木二十二年五月戊子大風拔木天寶十一載五月甲子東京大風拔木十三載三月辛酉大風拔木代宗永泰元年三月辛亥大風拔木大歷七年五月乙酉大風拔木十年五月甲寅大風拔木德宗貞元元年七月庚子大風拔木六年四月甲申大風雨八年五月己未暴風發太廟屋瓦毁門闕宮署屋舍不可勝紀十年六月辛未大風拔木十四年八月癸未廣州大風壞屋覆舟憲宗元和元年六月丙申大風拔木三年四月壬申大風毁含元殿欄檻二十七間占為兵起四年十月壬午天有氣如煙臭如燔皮日昳大風而止五年三月丙子大風毁崇陵上宮衙殿鴟尾及神門戟竿六壞行垣四十間八年六月庚寅京師大風雨毁屋飄瓦人多壓死者丙申富平大風拔棗木千餘株十二年春青州一夕暴風自西北天地晦冥空中有若旌旗狀屋瓦上如蹂躒聲有日者占之曰不及五年此地當大殺戮穆宗長慶二年正月己酉大風霾十月夏州大風飛沙為堆高及城堞三年正月丁巳朔大風昏霾終日四年六月庚寅大風毁延喜門及景風門文宗太和八年六月癸未暴風壞長安縣署及經行寺塔九年四月辛丑大風拔木萬株墮含元殿四鴟尾拔殿庭樹三壞金吾仗舍發城門樓觀內外三十餘所光化門西城十數雉壞開成三年正月戊辰大風拔木五年四月甲子大風拔木五月壬寅亦如之七月戊寅亦如之武宗會昌元年三月黔南大風飄瓦懿宗咸通六年正月絳州大風拔木有十圍者十一月己卯晦潼關夜中大風山如吼雷河噴石鳴羣鳥亂飛重關傾側十二月大風拔木僖宗乾符五年五月丁酉大風拔木廣明元年四月甲申京師及東都汝州雨雹大風拔木四年六月乙巳太原大風雨拔木千株害稼百里昭宗光化三年七月乙丑洺州大風發屋拔木天復二年升州大風發屋飛大木後漢隱帝乾祐三年閏五月癸巳京師西北風暴雨至戴婁門外壞營舍瓦木吹鄭門門扉起十餘步落拔大樹數十震死者六七人平地水深尺餘其年十一月隱帝遇害宋太祖乾德二年五月揚州暴風壞軍營舍僅百區三年六月揚州暴風壞軍營及城上敵棚開寶二年三月車駕駐太原城下大風一夕而止八年十月廣州颶風起一晝夜雨水二丈餘海為之漲飄失舟九年四月宋州大風壞甲仗庫城樓軍營民舍凡四千五百九十六區太宗太平興國二年六月曹州大風壞濟陰縣廨及軍營四年八月泗州大風浮梁竹笮鐡索斷華表石柱折六年九月高州大風壞廨宇民舍五百區七年八月瓊州颶風壞城門州署民舍殆盡八年九月太平軍颶風拔木壞廨宇民舍千八十七區十月雷州颶風壞廪庫民舍七百區九年八月白州颶風壞州廨民舍端拱二年京師暴風起東北塵沙曀日人不相辨淳化二年五月通利軍大風害稼三年六月丁丑黑風自西北起天地晦暝雷震有頃乃止先是都下大熱疫死者衆及此風至疾疫遂止至道二年八月潮州颶風壞州廨營寨漂刀魚舟真宗咸平元年八月涪州大風壞城舍四年八月丙子京師暴風景德二年六月甲午大風吹沙折木八月福州海上有颶風壞屋舍三年七月丙寅京師大風四年三月甲寅夕京師大風黃塵蔽日自大名府歷京畿害桑稼唐州尤甚大中祥符二年四月乙未大風起京師西北連日不止九月無為軍城北暴風雨晝晦不可辨拔木壞城門營壘民舍壓死千餘人遣內侍張景宣馳驛恤視壞屋者無出來年夏租壓死者家賜米一斛無主者官瘞之五年八月京師大風七年二月戊辰京師大風揚沙礫是日百官習儀恭謝壇有隨仆者六年六月辛亥京師大風起己位吹沙揚塵天禧二年正月永州大風發屋拔木數日止三年五月徐州利國監大風起西南壞廬舍二百餘區壓死十二人四年四月丁亥大風起西北飛沙折木晝晦數刻止五月乙卯大風起西北有聲折木吹黃塵蔽天按占並主陰謀姦邪是秋內侍周懷政坐妖亂伏誅仁宗天聖六年二月庚辰大風晝暝九年十二月辛酉大風三日景祐元年九月甲寅夜漏上風自丑起有聲擺木鳴條二年六月戊寅平明風自未來占者以為百穀豐衍之候康定元年大風晝暝經刻乃復皇祐四年七月丁巳大風拔木神宗熙寧四年二月辛巳京東自濮州至河北旁邊大風異常百姓驚恐四月癸亥京師大風霾六年四月北京館陶縣黑風九年十一月潮州海陽潮陽二縣颶風海潮害民田稼十年六月恩州武城縣大風壞縣廨知縣李愈妻主簿寇宗奭妻之母壓死七月溫州大風雨漂城樓官舍元豐四年六月雍州颶風壞城樓官私廬舍七月甲午夜泰州海風作繼以大雨浸州城壞公私廬舍數千間又通州靜海縣大風雨毁官私廬舍二千七百六十三楹潤州丹陽縣大風雨溺居民毁廬舍丹徒縣大風潮飄蕩沿江盧舍損田稼五年八月朱崖軍颶風毁廬舍哲宗元祐八年二月末京師風霾大寒是歲福建兩浙海風駕潮害民田紹聖元年秋蘇湖秀等州海風害民田欽宗靖康元年正月望夜大風起西北有聲吹沙走石盡明日乃止二月戊申大風起東北揚塵翳空三月己巳夜五更大風乍慢乍急聲如呌怒十一月丁亥大風發屋折木閏十一月甲寅大風起北方雪繼作積數尺連夜不停二年正月己亥天氣昏曀狂風迅發竟日夜西北陰雲中如有火光二丈餘濶數尺時時見庚戌大風雨二月乙酉大風折木晚尤甚三月丁酉風霾己亥大風四月庚申朔大風吹石折木辛酉北風益甚苦寒高宗建炎元年二月乙酉大風拔木紹興二十八年七月壬戌平江府大風雨駕潮漂溺數百里壞田廬三十二年七月戊申大風拔木溫州大風壞屋覆舟孝宗隆興元年浙東西郡國風水傷稼二年八月大風雨漂蕩田廬乾道二年八月丁亥溫州大風雨駕海潮殺人覆舟壞廬舍五年十月台州大風水壞田廬八年六月丙辰惠州颶風壞海艦三十餘時樞密院調廣東經略司水軍四艦覆其三死者百三十餘人淳煕三年六月大風連日四年九月明州大風駕潮壞定海鄞縣海岸七千六百餘丈及田廬軍壘六月乙巳夜福州福清縣興化軍大風雨壞官舍民居倉庫及海口鎮人多死者六年十一月卾州大風覆舟溺人甚衆七年二月江陵府大風焚溺岸舟死者尤衆十年八月辛酉雷州颶風大作駕海潮飄溢殺人林木田禾皆折光宗紹熙二年二月癸酉溫州瑞安縣大風仆屋拔木殺人四年七月興化軍海風害稼五年七月乙亥行都大風拔木壞舟甚衆紹興府秀州大風駕海潮害稼秋明州颶風駕海潮害稼十月甲戌行都大風拔木寧宗慶元二年六月壬申台州暴風雨駕海潮壞田屋六年夏常風當夏而寒嘉定二年七月壬辰台州大風雨駕海潮壞屋殺人三年八月癸酉大風連日大木皆拔折禾穗墮果實上露禱至於丙子乃息後御史朝陵於紹興府歸奏風壞陵殿宮墻六十餘所折陵木二千餘株六年十二月餘姚縣風潮壞海堤亘八鄉七年正月庚辰江州燈夕黑雲暴風暮作郡治遊人相踐死於門者二十餘人十一月二日甲寅大風十六年秋大風拔木害稼十七年秋福州颶風大作壞田損稼冬鄂州暴風壞戰艦二百餘壽昌軍壞戰艦六十餘江州興國軍亦如之恆陰漢昭帝元平元年四月崩亡嗣立昌邑王賀賀即位天陰晝夜不見日月賀欲出光祿大夫夏侯勝當車諫曰天久陰而不雨臣下有謀上者陛下欲何之賀怒縳勝以屬吏師古曰屬委也音之欲反吏白大將軍霍光光時與車騎將軍張安世謀欲廢賀光讓安世以為泄語安世實不泄召問勝勝上洪範五行傳曰皇之不極厥罰常陰時則有下人伐上不敢察察言臣瓚曰不敢察察明言之故云臣下有謀光安世讀之大驚以此益重經術士後數日卒共廢賀此常陰之明效也京房易傳曰有霓蒙霧霧上下合也蒙如塵雲霓日旁氣也其占曰后妃有專霓再重赤而專至衝旱孟康曰專員也若五月再重赤而員至十一月旱也妻不一順黑霓四背又白霓雙出日中妻以貴高夫兹謂擅陽霓四方日光不揚解而溫服虔曰蒙氣解而溫內取兹謂禽服虔曰人君內淫於骨肉也臣瓚曰人君取於國中也師古曰取如禮記聚麀之聚瓚説非霓如禽在日旁以尊降妃兹謂薄嗣霓直而塞六辰乃除夜星見而赤韋昭曰六辰謂從卯至申女不變始兹謂乘夫孟康曰始高貴於夫終行此不變也霓白在日側黑霓果之氣正直師古曰果謂干之也妻不順正兹謂擅陽霓中窺貫而外專夫妻不嚴兹謂媟韋昭曰媟言媟慢也師古曰音先列反霓與日會婦人擅國兹謂頃師古曰頃讀曰傾霓白貫日中赤霓四背服虔曰霓背日適不答兹謂不次服虔曰言適妻不見答也臣瓚曰夫不接妻為不答師古曰適讀曰嫡答報也言妻有承順之心不見報答也一曰答對也言不以恩意接對之霓直在左霓交在右取於不專兹謂危嗣霓抱日兩未及君淫外兹謂亡霓氣左日交於外取不逹兹謂不知霓白奪明而大溫溫而雨師古曰取讀曰聚尊卑不别兹謂媟霓三出三巳三辰除韋昭曰若從寅至辰也霓旦見西晏則雨除則日出且雨臣私祿及親兹謂罔辟韋昭曰辟君也師古曰辟音壁其下並同厥異蒙其蒙先大溫已蒙起日不見行善不請於上兹謂作福蒙一日五起五解辟不下謀臣辟異道兹謂不見上蒙下霧風三變而俱解立嗣子疑兹謂動欲蒙赤日不明德不序兹謂不聰蒙日不明溫而民病德不試空言祿師古曰試用也兹謂主窳臣夭孟康曰謂君惰窳用人不以次第為夭也師古曰窳音庾蒙起而白君樂逸人兹謂放蒙日青黑雲夾日左右前後行過日公不任職兹謂怙祿蒙三日又大風五日蒙不解利邪以食兹謂閉上蒙大起白雲如山行蔽日公懼不言道兹謂閉下蒙大起日不見若雨不雨至十二日解而有大雲蔽日祿生於下兹謂誣君蒙微而小雨已乃大雨下相攘善兹謂盜明蒙黃濁下陳功求於上兹謂不知蒙微而赤風鳴條解復蒙下專刑兹謂分威蒙而日不得明大臣厭小臣兹謂蔽蒙微日不明若解不解大風發赤雲起而蔽日衆不惡惡兹謂閉蒙尊卦用事孟康曰尊卦乾坤也臣瓚曰京房謂方伯卦震兑坎離也師古曰孟説是也三日而起日不見漏言亡喜兹謂下厝用師古曰厝音千各反蒙微日無光有雨雲雨不降廢忠惑佞兹謂亡蒙天先清而暴蒙微而日不明有逸民兹謂不明蒙濁奪日光公不任職兹謂不詘蒙白三辰止則日青青而寒寒必雨忠臣進善君不試兹謂遏師古曰試用也蒙先小雨雨已蒙起微而日不明惑衆在位兹謂覆國蒙微而日不明一溫一寒風揚塵知佞厚之兹謂庳蒙甚而溫君臣故弼兹謂悖師古曰弼猶相戾也悖惑也厥災風雨霧風拔木亂五穀已而大霧庶正蔽惡兹謂生孽災厥異霧此皆陰雲之類云後漢順帝陽嘉二年郎顗上書云正月以來陰暗連日久陰不雨亂氣也得賢不用猶久陰不雨也吳孫亮太平三年自八月沉陰不雨四十餘日是時將誅孫綝謀泄九月戊午綝以兵圍宮廢帝為會稽王此常陰之罰也孫皓寶鼎元年十二月太史奏久陰不雨將有陰謀孫皓驚懼時陸凱等謀因其謁廟廢之及出留平領兵前驅凱先語平平不許是以不果皓既肆虐羣下多懷異圗終至降亡隋文帝開皇二十年十月久陰不雨劉向曰王者失中臣下蔽君明則雲陰時獨孤后與楊素譖太子勇廢之唐武后長壽元年九月戊戌黃霧四塞霧者百邪之氣為陰冒陽本於地而應於天也黃為土土為中宮長安四年自九月霖雨陰晦至於神龍元年正月中宗神龍二年三月乙巳黃霧四塞景龍二年八月甲戌黃霧昏濁不雨三年正月丁卯黃霧四塞十一月甲寅日入後昏霧四塞經二日乃止占曰霧連日不解其國昏亂元宗開元五年正月戊辰昏霧四塞天寶十四載冬三月常霧昏暗十步外不見人是謂晝昏占曰有破國肅宗至德二載四月賊將武令珣圍南陽白霧四塞上元元年閏四月大霧占曰兵起德宗貞元十年三月乙亥黃霧四塞日無光二十年秋連月陰霪憲宗元和十五年正月庚辰至於丙申晝常陰晦微雨雪夜則晴霽占曰晝霧夜晴臣志得申懿宗咸通九年十一月龎勛圍徐州甲辰大霧昏塞至於丙午十四年七月靈州陰晦僖宗乾符六年秋多雲霧晦冥日旦及禺中乃解光啓元年秋河東大雲霧明年夏晝陰積六十日二年十一月淮南陰晦雨雪至明年二月不解昭宗景福二年夏連陰四十餘日霧光化四年冬昭宗在東內武德門煙霧四塞門外日色皎然宋高宗建炎三年六月久陰上謂輔臣曰占為陰盛下有陰謀語在常雨紹興三年自正月陰晦陽光不舒者四十餘日八年三月乙卯晝蒙京房易傳曰霧上下合也蒙如塵雲四月積雨方止氛霧四塞晝日無光近常陰也孝宗隆興二年六月沈陰不解者月餘乾道二年十一月天久晦陰五年正月甲申晝蒙六年五月連陰六月日青無光淳熙六年十一月乙丑晝蒙十三年正月丁亥亦如之寧宗慶元六年十二月辛邜嘉定三年正月丙午十年正月乙未十三年三月壬辰皆晝蒙夜妖春秋僖公十五年九月己卯晦震夷伯之廟師古曰夷伯司空無駭之後本魯公族也號展氏劉向以為晦暝也震雷也夷伯世大夫正晝雷其廟獨冥師古曰冥暗也天戒若曰勿使大夫世官將專事暝晦明年公子季友卒果世官師古曰謂季友之孫行父仍執政專國自此以後常為卿政在季氏至成公十六年正月甲午晦正晝皆暝隂為陽臣制君也成公不寤其冬季氏殺公子偃師古曰為季文子所殺也已解於上季氏萌於僖公師古曰萌謂草木始生也言其始有威權大於成公此其應也董仲舒以為夷伯季氏之孚也師古曰孚信也所信任之臣也陪臣不當有廟震者雷也晦暝雷擊其廟明當絶去僭差之類也向又以為此皆所謂夜妖者也劉歆以為春秋及朔言朔及晦言晦人道所不及則天震之展氏有隱慝故天加誅於其祖夷伯之廟以譴告之也成公十六年六月甲午晦晉侯及楚子鄭伯戰于鄢陵皆月晦云漢高祖二年東伐楚入彭城項羽以精兵擊漢軍大破之圍漢王三匝大風起揚沙石晝晦楚軍大亂漢王得與數十騎遁去魏高貴鄉公正元二年正月戊戌景帝討毋邱儉大風晦暝行者皆頓伏近夜妖也劉向曰晝晦而暝陰為陽臣制君也元帝景元三年十月京師大震晝晦此夜妖也劉向春秋説云天戒若曰勿使大夫世官將令專事暝晦公室卑矣魏見此妖晉有天下之應也晉武帝泰始三年三月丁未晝昏懷帝永嘉四年十一月辛卯晝昏至於庚子此夜妖也後年劉曜寇洛川王師頻為賊所敗帝蒙塵於平陽孝武帝太元十三年十二月乙未大風晦暝其後帝崩而諸侯違命干戈內侮權奪於元顯禍成於桓元苻堅時大風晝暝恆星皆見太史以為西南國亡明年堅陷蜀梁元帝承聖二年十月丁卯大風晝暝天地昏暗近夜妖也京房易飛候曰羽日風天下昏人大疾不然多寇盜三年為西魏所滅陳後主禎明三年正月朔旦雲霧晦暝入鼻酸辛後主昏昧近夜妖也時北軍臨江柳莊任蠻奴並進中欵後主惑佞臣孔範之言而昏暗不能用以至覆亡東魏孝靜武定四年冬大霧六日晝夜不解洪範五行傳曰晝而晦冥若夜者陰侵陽臣將侵君之象也明年元瑾劉思逸謀殺大將軍之應北周靜帝大象二年尉遲逈敗於相州坑其黨與數萬人於遊豫園其處每聞鬼夜哭聲洪範五行傳曰哭者死亡之表近夜妖也鬼而夜哭者將有死亡之應京房易飛候曰鬼夜哭國將亡明年周氏王公皆見殺周室亦亡隋文帝仁壽中仁壽宮及長城之下數聞鬼哭尋而獻后及帝相次而崩於仁壽宮煬帝大業八年楊元感作亂於東都尚書樊子蓋坑其黨與長夏門外前後數萬洎於末年數聞其處鬼哭有呻吟之聲與前占同其後王世充害越王侗於洛陽唐文宗太和九年十一月戊辰晝晦懿宗咸通七年九月辛卯朔天暗僖宗乾符二年二月宣武境內黑風雨土昭宗天祐元年閏四月乙未朔大風雨土後周世宗顯德六年六月辛卯辰巳間京師天地晦暝澍雨驟降雨中有腥氣其日世宗崩宋太宗端拱二年京師暴風起東北塵沙曀日人不相辨淳化三年六月丁丑黑風自西北起天地晦冥雷震有頃乃止貞宗大中祥符二年九月無為軍城北暴風雨晝晦不可辨拔木壞城門營壘民舍仁宗天聖六年二月庚辰大風晝暝康定元年三月丙子大風晝暝經刻乃復嘉祐八年十一月丙午大風霾英宗治平二年二月乙巳大風晝晦四年正月庚辰朔大風霾是日羣臣上尊號廷中仗衛皆不能整時帝不豫越七日崩神宗熙寧四年四月京師大風霾欽宗靖康二年正月己亥天氣昏曀風迅發竟日丁未霧氣四塞人對面不相視高宗建炎元年三月丁酉汴京風霾日無光劉向曰正晝而暝陰為陽臣制君也是日張邦昌僭位二年七月癸未風雨晝晦是日東京留守宗澤薨十一月甲子北京大霧四塞是夕城陷三年三月上發溫州航海乙丑御舟次松門海中白霧晝晦近夜妖也紹興八年三月甲寅晝晦日無光陰霧四塞乙卯晝夜雲氣昧濁十一年主管成都等路茶事馮康國言三月庚申敵居長安晝晦面不相睹敵亡之象也孝宗乾道五年正月甲申晝霾四塞淳熙五年四月丁丑塵霾晝晦日無光寧宗慶元元年二月己卯晝暝四方昏塞三年二月丁卯晝晦昏霧四塞嘉定十年正月乙未晝霾二月癸巳日蒙無光文獻通考卷三百六
