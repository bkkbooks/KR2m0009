body:
  text: 文獻通考卷一百五十二鄱陽馬端臨貴與著兵考四兵制梁太祖開平元年初帝在藩鎮用法嚴將校有戰沒者所部兵悉斬之謂之拔隊斬士卒失主將者多亡逸不敢歸帝乃命凡軍士皆文其面以記軍號軍士或思鄉里逃去關津輒執之送所屬無不死者其鄉里亦不敢容由是亡者皆聚山谷為盜大為州縣之患至是詔赦其罪自今文面亦聼還鄉里盜減什七八吳氏能改齋漫録曰五代史劉守光傳天祐三年梁攻滄州仁恭調其境內凡男子年十五以上七十以下皆黥其面文曰定霸都士人則文其腕或臂曰一心事主得二十萬人故蘇眀允兵制篇曰屯田府兵其利既不足以及天下而後世之君又不能循而守之至於五代燕帥劉守光又從而為之黥面涅手自後遂以為常法使之不得與齊民齒然余按陶嶽五代史補乃云健兒文面自梁太祖始梁燕皆同時則文面不特始於仁恭也致堂胡氏曰伊尹曰臣下不匡其刑墨孔氏曰鑿其額以墨涅之吕刑曰苖民淫為劓刵椓黥孔氏曰黥面也然則涅其顙者乃五刑之正而黥其面者乃五虐之法也顙受墨涅若膚疾然雖刑而不害以字文面則棄人矣是法也始於有苖至劉仁恭朱全忠加甚籍民為兵無罪而黥之使終身不能去以自别於平人非至不仁者莫忍為也後唐莊宗同光二年敕隨駕收復汴州并扈從到洛京南郊立仗都將官貟自檢校司空已下宜並賜協謀定亂匡國功臣自檢校僕射尚書常侍至大夫中丞宜並賜忠勇拱衛功臣其初帶憲銜並賜忠烈功臣已有功臣名者不在此限其節級長行軍將並賜扈蹕功臣唐元宗平內難賜衛士葛福順等為唐元功臣不過十數人德宗駐蹕奉天賜從軍駕立功將校為奉天定難功臣及僖宗昭宗頻年播遷功臣差多至是遍及戎卒非賞典也潞王之初發鳳翔也許軍士以入洛人賞錢百緡至閲實金帛不過三萬兩匹而賞軍之費計用五十萬緡帝怒三司使王玫請率京城民財以足之又據屋為率無問白居及僦者預借五月僦直有司百方斂民財僅得六萬帝怒下軍巡獄畫夜督責囚繫滿獄貧者至自經赴井而軍士逰市肆皆有驕色市人聚詬之是時竭左藏舊物及諸道貢獻乃至太后太妃器服簮珥皆出之才及二十萬緡帝患之李専美曰臣竊思自長興之季賞賚亟行卒以自驕繼以山陵及出師帑藏遂涸雖有無窮之財終不能滿驕卒之心故陛下拱手於危困之中而得天下夫國之存亡不専繫於厚賞亦在修法度立紀綱陛下苟不改覆車之轍臣恐徒困百姓存亡未可知也今財力盡於此矣宜據所有均給之何必踐初言乎帝以為然壬辰詔禁軍在鳳翔歸命者自楊思權尹暉等各賜二馬一駝錢七十緡下至軍人錢二十緡其在京者各十緡軍士無厭猶怨望為謡言曰除去菩薩扶立生鐵以閔帝仁弱帝剛嚴有悔心故也晉初置鄉兵號天威軍教習嵗餘村民不嫻軍旅竟不可用悉罷之但令七户輸錢十千其鎧仗悉輸官而無賴子弟不復肯復農桑多聚山林為盜及契丹入汴縱胡騎打草穀民不堪命所在盜起攻陷州縣長吏不能制周太祖顯德元年軍士有流言郊賞薄於唐眀宗時帝召諸將至寢殿讓之曰朕自即位以來惡衣菲食専以贍軍為念府庫蓄積四方貢獻贍軍之外鮮有贏餘汝輩豈不知之今乃縱凶徒騰口不顧人主之勤儉察國之貧乏又不思已有何功而受賞惟知怨望於汝輩安乎皆惶恐謝罪退索不逞之徒戮之流言乃息世宗即位既敗北漢兵於髙平謀肅軍政初宿衛之士纍朝相承務求姑息不欲簡閲恐傷人情由是羸老者居多但驕蹇不用命實不可用每遇大敵不走則降其所以失國多由此帝因高平之戰始知其弊謂侍臣曰凡兵務精不務多今以農夫百未能當甲士一奈何浚民之膏澤養此無用之物乎且健懦不分衆何所勸乃命大簡諸軍精鋭者升之上軍羸者斥去之又以驍勇之士多為諸藩鎮所蓄詔募天下壯士咸遣詣闕命太祖皇帝選其尤者為殿前諸班其騎步諸軍各命將帥選士由是士卒精強近代無比征伐四方所向皆捷選練之力也宋太祖皇帝建隆元年詔殿前侍衛二司各閲所掌兵練其驍勇升為上軍老弱怯懦置剩圎以處之剩圎給官符宫觀園苑寺廟蘆廩之役咸平五年七月戎卒有苦寒廢支體者真宗念其勞不欲遽棄令𨽻剩圎廩給如故自是率以為例止齋陳氏曰剩圎之置不但以仁羸卒亦以省冗食也熙寧十年十月詔諸路州軍以逐州就糧禁軍廂軍通計十分立一分為額剩圎立額自此始自宣和之難養兵益衆戰功之賞例加官資於是退兵重為天下費蓋揀汰起於紹興七年率置添差官以處之自諸司及州軍各有圎參定為節鎮一百三十圎次州軍六十五圎極邉節鎮二十六圎次州軍十八圎待闕圎數亦凖此乾道二年二月二十五日敕而州縣之力困於養退兵矣八月詔諸州長吏選所部兵送都下以補禁旅之闕又選強壯卒定為兵樣分送諸道其後又以木梃為高下之等散給諸州軍委長吏都監等召募教習俟其精練即送闕下京諸司庫務皆有役兵其執杖者即不設等樣自是師旅皆精鋭禁衛之籍無闕矣止齋陳氏曰世多言國家養兵之費自藝祖時增置禁軍始考之則不然按祥符天聖編敕諸部郡自騎射至牢城凡名額二百二十三總為本城而已則天下無禁兵也所謂禁兵者皆三司之卒分屯而更戍今之屯駐駐泊之名而鈐轄都監監押之官所部領者也三邉之兵間因事宜升為禁軍者則所謂四十四處禁軍是已咸平四年始升陜西諸州選中保捷慶歷元年秋河北教閲本城為禁軍是為就糧自元昊叛而西北有保毅王倫叛而東南有宣毅之類於是列郡稍置禁軍嘉祐中詔東南帥司各置威果凡二十五指揮既云多矣然亦無過九大郡熙寧按天下廂軍之籍五十萬人而亦不足戰於是教閲之法起其後以廂軍團併為額則今之兩浙崇節福建保節之類是也教閲之兵因别為額而𨽻之將下則今兩浙雄節福建廣節之類是也五年始排立在就糧禁軍之下元豐兵令悉以雄節之類升同禁軍由是禁軍始遍天下此不可不辨自唐中葉後營兵在諸鎮每防秋征行大則節將自往小則列校董之禁衛雖設而皆非精練藩鎮強者得以専土叛渙河北兵最強故聲教不能及然屯營之處頗雜耕戰僖昭間征討不息師人疲苦多亡命者梁祖患之乃令諸軍悉黵面為字以識軍號訖今遵其制五代以來境蹙兵少然習用為常亦有近藩之地更迭戍守者然方鎮列校勢位差損周顯德後尅淮甸有東南之漕京師倉廩稍實得以聚兵為強幹之術太祖太宗以雄略英武平一海內懲纍朝藩鎮跋扈盡收兵於京師於時天下山澤之利悉入於官帑庾充牣得以贍給而備時使其邉防外藩鎮須兵屯守者自京而遣故有駐泊屯駐之名其京畿諸州便運路者則有就糧兵焉許挈家屬以往及本州兵皆更迭屯駐代還即復舊所舊制除軍衛外諸州兵上從節鎮及本軍之號自唐末稍增其美名國朝初平偽國合併所得兵别為軍額其願歸農者解其籍或給以土田其後或新經料簡或團併有餘則或特創名或因舊額增指揮之數而無常焉凡召募兵者所在設旗給賞長吏都監専視之遣吏部送闕下至則軍頭司覆驗等第引對便坐𨽻諸軍淳化二年詔以子弟附兵籍者除去之願𨽻名者閲試而後聼景德三年又詔有材勇者許𨽻本軍其自下軍而升入上軍者自上軍而入諸班直者皆臨軒親閲諸班直新召募者非材勇超絶即不預焉餘皆自下選補大中祥符五年詔揀閲諸軍有方壯而被斥者委所在告諭聼其自陳每上軍遣戍皆本司整比軍頭司引對便殿給以裝錢代還亦入見犒以飲食揀拔精鋭升補之或退其疲老者凡大祀有賞給每嵗寒食端午冬至各有特支特支有大小之差亦有非時給者戍邉每季又加給銀鞋環慶緣邉艱於爨給者又有薪水錢其役兵勞苦者或季給錢或川廣而代還者别給裝錢川廣遞補卒或給時服錢屨凡出外率有口糧有折月糧者有别給者開寶四年祀南郊禮畢行賞上以御馬直扈從郊祀特命增給錢人五千而川班內殿直不得如例乃相率擊登聞鼓上訴陳乞上怒曰朕所與即為恩澤安有例哉命斬妄訴者四十人餘悉配𨽻許州驍捷軍都校皆決杖降職遂廢其班時內臣有李承進者逮事後唐上問曰莊宗以英武定中原享國不久何也對曰莊宗好田獵惟務姑息將士每乘輿出次近郊禁衛兵卒必控馬首告曰兒郎輩寒冷望與振救莊宗即隨所欲以給之如此非一失於禁戢因而兆亂蓋威令不行賞罰無節矣上撫髀歎曰二十年夾河戰爭而得天下不能用法約束此輩縱其無厭之求以兹臨御誠為兒戲今我撫養士卒固不吝惜爵賞但犯吾法無所貸耳太宗選軍中勇士教以劒舞皆能擲劒凌空繞身承接妙捷如神每契丹使至賜宴乃出以示之凡數百輩袒裼鼓譟挺刃而入各獻其技霜鋒雪鍔飛躍滿空及親征太原巡城耀武必令劒舞前導觀者神聳至道初帝因問侍臣河渠轉漕以給軍食之事語及屯兵利害參知政事張洎退而講求故實上封奏曰國家應圖受命經營鴻業懲前王之失審形勝之地以大梁者八方所輳為天下之樞可以阜安兆人臨制四海故卜京邑而定都焉昔炎漢開基髙帝云吾以羽檄召天下兵未有至者又孝武云吾初即位不欲出虎符發兵郡國即知兵甲在外也唯有南北軍期門郎羽林孤兒以備天子扈從藩衛之用唐承隋制置十二衛府兵皆農夫也及罷府兵始置神武神策為禁軍不過三數萬人亦以備天子扈從藩衛而已及祿山犯闕朝廷驅市人接戰德宗蒙塵扈駕者四百餘騎兵甲散在郡國軍額存而可舉者除河朔三鎮外太原青社各十萬人邠寧宣武各六萬人潞徐荆揚各五萬人襄宣夀鎮海各二萬餘人觀察團練據要害之地者亦不下萬人今天下甲卒數十萬衆戰馬數十萬匹萃在京師本固兵強邦國之利也上覽而嘉之真宗咸平四年開封府言龍武軍卒亡命捕獲法當決徒帝以是軍無俸而同禁軍例科罪太重令改從輕法其後又詔禁軍非征行而因役亡者止決杖流配時寧朔軍充役太廟而亡法官議當斬詔從流配景德元年班臨軍賞罰之令遣中使齎御劒赴北面以肅軍令北面諸路駐泊兵馬使臣等臨陳能率先用命殺賊者與賊鬭戰生擒獲賊者臨陳擒獲賊首領者使斫營寨能驚賊令擾亂及擒獲人畜者諸偏裨下軍士與戎人鬭能用命策應殺退賊者戎人為誘兵翼張受命掩擊能破赱之者賊逰騎往來或近大軍受命掩襲而能擒殺者用命深入被傷者臨陳用命入賊斬刺其首領分散其旗鼓者並賞之其擒賊首領有酋渠并得旗鼓者加等焉如賊已敗走所奪車帳人畜財物並給與之若尅日會戰不齊者夜喧衆者不俟賊稍前而亂射者陳成列而監軍諸校使臣擅簡一卒一騎者後馬有犯者下行陳大寨不齊者旗槍交錯隊伍者賊至可出軍而不出者戰鬭而觀望不救者兵器不修至臨陳不堪施用者巧詐以避征役者臨陳先退者貪爭資畜而不赴殺賊遣入賊境而規避既復命言不以實者為斥候而不覺賊來者臨陳不射賊及棄其餘箭者遺失鎧甲兵器者賊棄仗降而輒殺者分布軍號及傳令不慎密而漏泄者受命逐賊至某處輒過者部署下牙隊軍校左右指使使臣忠佐及從人使臣軍校下押前隊圓寮軍頭十將并從人臨陳輒離左右不受節度者並斬凡軍中皆計斬級行賞其後頗有梟路人首以希賞者真宗聞而詔戒之又令緣邉凡獲蕃寇皆須辨問得實當行殺戮者許給賞如其非理即以軍法論二年春以契丹通好邉鄙無事釋河北諸州強壯悉歸會合鎮定兩路部署為一省河北防城鎮兵十之五緣邉三之一兩朝國史志太祖太宗平一海內懲纍朝藩鎮跋扈盡收天下徑兵列營京畿以備藩衛其分營於外者曰就糧就糧者本京師兵而便廩食於外故聼其家往其邉防要郡須兵屯守即遣自京師諸鎮之兵亦皆戍更真宗仁宗英宗嗣守其法益以完密於時天下山澤之利悉入縣官以資廩賜將帥之臣入奉朝請以備指蹤獷悍之民收𨽻尺籍以給守衛兵無常帥帥無常師內外相維上下相制等級相軋雖有暴戾恣睢無所厝於其間是以天下晏然逾百年而無犬吠之警此制兵得其道也制兵之額有四曰禁兵曰廂兵曰鄉兵曰藩兵分𨽻殿前侍衛總管司而籍藏樞密院凡召募廪給訓練屯戍揀選補之政皆樞密院掌之禁兵者天子衛兵也總於殿前侍衛二司其尤親近扈從者號班直餘自龍衛而下皆番戍諸路有事即以征討自景德後兵不復試廂兵者諸州之鎮兵也太祖鑒唐末方鎮跋扈詔選州兵壯勇者悉部送京師以備禁衛餘留本城本城雖或戍更然罕教閲類多給役而已鄉兵者選自户籍或土民應募所在團給訓練以為防守之兵也國朝以來河北河東有神鋭忠勇強壯河北有忠順強人陜西有保毅寨户強人強人弓手河東陜西有弓箭手河北河東陜西有義勇麟州有義軍川峽有土丁壯丁荆湖南北有弩手土丁廣東廣西有槍手土丁雍州有溪洞壯丁其本末各見郡國兵門蕃兵者塞下內屬諸部落團結以為藩籬之兵也西北邉羌戎種落不相統一保寨者謂之熟户餘謂之生户陜西則秦鳯涇原環慶鄜延河東則石隰鄜府其大首領為都軍主百帳已上為軍主其次為副軍主又有以功次補者其官職俸給有差其兵數本末見郡國兵門召募之制起於府衛之廢蓋籍天下良民以討有罪三代之兵與府衛是也收天下獷悍之兵以衛良民今召募之兵是也唐末士卒疲於征役多亡命者梁祖令諸軍悉黵面為字以識軍號是為長征之兵初募時先度人材次閲走躍試瞻視然後為黵面賜以緡錢衣屨而𨽻諸軍自國初以來其取非一途或土人就在所團立或取營伍子弟聽從本軍或乘嵗凶募飢民補本城或以有罪配𨽻給役是以天下失職獷悍之徒悉收籍之伉健者遷禁衛短弱者為廂軍制以隊伍束以法令帖帖不敢出繩墨平居食俸廩養妻子備征防之用一有警急勇者力戰鬭弱者給漕挽則向之天下失職獷悍之徒今為良民之衛矣廩給之制總內外廂禁諸軍且百萬言國費最巨者宜無出此雖然古者寓兵於民民既出常賦有事復褁糧而為兵後世兵農分常賦之外山澤關市之利悉以養兵然有警則以素所養者捍之民晏然無預征役也唐之時兵分藩鎮得専租稅天子禁衛之兵中外不過十餘萬人國朝收天下甲卒數十萬悉萃京師京師八方所湊水陸四逹嵗漕江淮粟六百萬石而縑帛貨泉齒革百物之委不可勝紀是以軍儲饒羡初太倉才支三二嵗承平既久常餘數年之食以此臨制四方猶臂指之運也世之議者不逹乃謂竭民賦租以養不戰之卒糜國帑廩以優坐食之校是豈知祖宗所以擾役強悍銷弭爭亂之深意哉屯戍之制凡遣上軍軍頭司引對賜以裝錢代還亦入見犒以飲食簡拔精鋭退其癃老至於諸州禁廂兵亦皆戍更𨽻州者曰屯駐𨽻總管曰駐泊揀選之制有自廂軍升禁軍禁軍升上軍上軍升班直升上軍及班直者皆臨軒親閲自非材勇絶羣不以應召募餘皆自下選補云仁宗時元昊反西邉用師多募禁軍吏以所募多寡為賞罰格諸軍子弟悉聼𨽻籍禁軍額員多選本城補填故慶歷中內外禁廂軍總一百二十五萬視祖宗時為最多及西師罷天下患兵冗帑庾不能給樞密使龎籍奏世養兵務多而不精請與中書議揀汰之法從之省兵數萬人石林葉氏燕語元昊初臣龎頴公自延州入為樞密副使首言關中苦餽餉請徙沿邉兵就食內地議者爭言不可以為虜初伏情偽難測未可遽弛備獨公知元昊已困必不能遽敗盟卒徙二十萬人後為樞密使復言天下兵太冗多不可用請汰其罷老者時論紛然尤以為必生變仁宗以為疑公曰倘有一夫之呼臣請以百口當之帝從其言遂汰八萬人嘉祐二年復定招軍等杖自上四軍至武肅忠靖皆五尺以上差以寸坊而視其奉錢之數奉錢一千者以五尺八寸七寸三分七寸為三等奉錢七百者降殺有差唯武嚴御營喝探以藝精者充諸軍執杖者不設等杖其支軍食糧料院先進樣三司定倉敖界分而以年月次之國初諸庾分給諸營營在國城西多給糧於城東若南北亦然相距有四十里者蓋恐士卒習墮使知負擔之勤久之有司乃取受輸年月界分以軍次髙下給之凡三嵗大祀有賜賚有優賜每嵗寒食端午冬至有特支特支有大小之差亦有非時給者戍邉季加給銀鞋邠寧環慶緣邉艱於爨汲者兩月則給薪水錢苦寒或賜絮𥜗袴役兵勞苦季給錢戍嶺南者增月奉自川廣戍還者别豫裝錢川廣遞鋪卒或給時服錢屨屯兵州軍官賜錢宴犒將校謂之旬設舊止待屯泊禁軍其後及於本城天聖七年法自裁定諸軍衣裝騎兵春冬衣各七事步兵春衣七事冬衣六事質賣者重置之法三司使程琳上疏論兵在精不在衆河北陜西軍儲數匱而招募不已且住營一兵之費可給屯駐三兵昔養萬兵者今三萬兵矣河北嵗費芻糧千二十萬其賦入支十之三陜西嵗費千五百萬其賦入支十之五自餘悉仰給京師自咸平逮今二邉所增馬步軍指揮百六十計騎兵一指揮所給嵗約費緡錢四萬三千步兵所給嵗約費緡錢三萬二千他給賜不預合新舊兵所費不啻千萬緡天地生財有限而用無紀極此國用所以日屈也今同華沿河州軍積粟至於紅腐而不用沿邉入中粟價常踊貴而未嘗足誠願罷河北陜西募住營兵勿復增置遇闕即選廂軍精鋭者補之仍漸徙營內郡以便糧餉無事時番戍于邉緩急即調發便近嚴戒封疆之臣毋得侵軼生事以覬恩賞違令者重置之法如此則疆埸無事而國用有餘矣帝嘉納之嘉祐七年宰相韓琦上言祖宗時以兵定天下凡有征伐則募置事已則省併故兵日精而用不廣今二邊雖號通好而西北屯邉之兵常若待敵之至故竭天下之力而不能給不於此時先慮而速救之一旦邉陲用兵水旱相繼駭而圗之不可及也又三路就糧之兵雖勇徑服習然邉儲貴踊常苦難贍若其數過多復有尾大不掉之患京師之兵雖雜且少精然漕於東南廣而易供設其數多乃得強幹弱枝之勢也祖宗時就糧之兵不甚多邉陲有事則以京師兵益之其慮也深而其費也鮮願詔樞密院同三司量河北陜西河東及三司𣙜貨務嵗入金帛之數約可贍京師及三路兵馬幾何然後以可贍之數立為定額額足罷募闕即增補額外數已盡而營數畸零則省併之既見定額則可以定某路馬步一營以若干人為額仍請核開寶至道天禧慶歷中外兵馬之數蓋開寶至道之兵太祖太宗以之定天下服四夷也天禧之兵真宗所以守成備豫也慶歷之兵乃西師後增置之數也以祖宗所養之兵視今數之多少則精冗易判裁制無疑矣於是詔中書樞密院同議樞密院掇祖宗已來兵數以聞蓋開寶之籍總三十七萬八千而禁軍馬步十九萬三千至道之籍總六十六萬六千而禁軍馬步三十五萬八千天禧之籍總九十一萬二千而禁軍馬步四十三萬二千慶歷之籍總一百二十五萬九千而禁軍馬步八十二萬六千視前募兵寖多自是稍加裁制以為定額琦嘗從容議及養兵事慨然曰養兵雖非古然積之久不可廢又自有利處昔者發百姓戍邉者無虛嵗父子兄弟嘗有生離死别之苦議者但云不如漢唐調兵於民獨不見杜甫石壕吏一詩乎調兵於民其弊如此後世既取強健無賴者養以為兵兵行雖民間稅斂良厚而終身保骨月相聚之樂此豈小事又其習練戰陳而豪勇可使安得與農夫同日道也知諫院范鎮言河北連嵗招兵未已皆是坊市無賴子弟及隴畝力田之人謂為軍營子弟求刺為軍况今田甚曠民甚稀賦斂甚重國用甚不足者正由兵多故也議者必曰以為契丹備也且契丹五十年不敢南入為患者金繒之利厚也就使棄利為害則大河以北婦人女子皆是乘城之人其城市無賴隴畝力田者又將焉用而預蓄養之以困民况契丹貪利而不敢動夫取兵於民則民稀民稀則田曠田曠賦役重賦役重則民心離寓兵於民則民稠民稠則田闢田闢則賦役輕賦役輕則民心固與其離民之心以備契丹契丹未至而民力先已匱孰若固民之心以備契丹雖至而民力有餘國用有備其利害若視白黑若數一二而今以為難者臣所以深惑也昔漢武以兵困天下者用兵以征胸奴空漠北得所欲也陛下以兵困天下者不用兵養兵以至是也非以快所欲也何苦而為是乎五口之家尚知量入以為出况天下大計其可以不校出入乎其可以無經乎請下臣章中書樞密院大臣看詳若陛下誠能罷今招兵敕大臣使具太祖太宗真宗每朝賦入若干兵若干官若干陛下天聖中賦入若干兵若干官若干約今賦入之數與兵數官數約取中道立為經制以賦入之數十分為率以七分養兵官給郊廟宫省諸費三分以備水旱緩急非常為之十年僅可以言治古者國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國今自京師至天下州郡大率無儲蓄邉城甚者或無三數月之備不幸有連年水旱將何以養此兵乎此兵不足以養則其憂不在契丹也歐陽修時論原弊曰國家自景德罷兵三十三嵗矣兵嘗經用者老死幾盡而後來者未嘗聞金鼓識戰陳也生於無事而飽於衣食也其勢不得不驕惰今衛士入宿不自持被而使人持之禁兵給糧不自荷而雇人荷之其驕如此况肯冒辛苦以戰鬭乎前日西邉之吏如髙化軍齊宗舉兩用兵而輒敗此其效也夫就使兵耐辛苦而能鬭戰雖耗農民為之可也奈何有為兵之虛名而其實驕惰無用之人也古之凡民長大壯健者皆在南畝農隙則教之以戰今乃大異一遇凶嵗則州郡吏以尺度量民之長大而試其壯健者招之去為禁兵其次不及尺度而稍怯弱者籍之以為廂兵一作軍吏招人多者有賞而民方窮時爭投之故一經凶荒則所留在南畝者惟老弱也而吏方曰不收為兵則恐為盜噫茍知一時之不為盜而不知終身驕惰而竊食也古之長太壯健者任耕而老弱者遊惰今之長大壯健者遊惰而老弱者留耕也何相反之甚邪然民盡力乎南畝者或不免乎狗彘之食而一去為儈兵則終身安佚而享豐腴則南畝之民不得不日減也故曰有誘民之弊者謂此也又本論曰古之善用兵者可使之赴水火今廂禁之軍有司不敢役必不得已而暫用之則謂之借倩彼兵相謂亦曰官倩我而官之文符亦曰倩夫賞者所以酬勞也今以大禮之故不勞之賞三年而一遍所費八九十萬有司不敢緩月日之期兵之得賞不以無功知愧乃稱多量少比好嫌惡小不如意則持挺而呼羣聚欲擊天子之命吏無事之時猶若此以此知兵驕也兵之敢驕者以用之不得其術而法制不立也前日五代之亂可謂極矣五十三年之間易五姓十二君而亡國被弒者八長者不過十餘嵗甚者三四嵗而亡其主豈皆愚邪其心豈樂禍亂而不欲為久安之計乎顧其力不能者時也當時東有汾晉西有岐蜀北有強胡南有江淮閩廣吳越荆潭天下分為十三四四面環之以至加之中國又有叛將強臣割而據之其君天下者類皆為國日淺威德未洽強君武主力而為之僅以自守不幸孱子弱孫不過一再傳而復亂敗是以養兵如兒子之啖虎狼猶恐不為用尚何敢制天下之勢方若敝廬補其奧則隅壞整其桷則棟傾支撑扶持茍存而已尚何暇法象規矩而為制度今宋之為宋八十年矣外平僭亂無抗敵之國內削方鎮無強叛之臣天下為一海內晏然為國不為不久天下不為不廣也然而兵不足以威於外而敢驕於內制度不可為萬世法而日益叢雜一切茍且不異五代之時此甚可歎也蘇軾應詔策别其一曰定軍制自三代之衰井田廢兵農異處兵不得休而為民民不得息肩而無事於兵者十有餘年而未有如今日之極者也三代之制不可復追矣至於漢唐猶有可得而言者夫兵無事而食則不可使聚聚則不可使無事而食此二者相勝而不可並行其勢然也今夫有百頃之間田則足以牧馬千駟而不知費聚千駟之馬而輸百頃之芻則其費百倍此易曉也昔漢之制有踐更之卒而無營田之兵雖皆出於農夫而方其為兵也不知農夫之事是故郡縣無常屯之兵而京師亦不過有南北軍期門羽林而已邉境有事諸侯有變皆以虎符調發郡國之兵至於事已而兵休則渙然各復其故是以其兵雖不離農而天下不至於弊者未嘗聚也唐有天下置十六衛府兵天下之府八百餘所而屯於關中者至有五百然皆無事則力耕而積榖不惟以自贍養而又足以廣縣官之儲是以兵雖聚於京師而天下亦不至於弊者未嘗無事而食也今天下之兵不耕而聚於畿輔者以數十萬計皆仰給於縣官有漢唐之患而無漢唐之利擇其偏而兼用之是以兼受其弊而莫之分也天下之財近自淮甸而逺至於吳楚凡舟車所至人力所及莫不盡取以歸於京師晏然無事而賦斂之厚至於不可復加而三司之用猶苦其不給其弊皆起於不耕之兵聚於內而食四方之貢賦非特如此而已又有循環往來屯戍於郡縣者昔建國之初所在分裂擁兵而不服太祖太宗躬擐甲胄力戰而取之既降其君而籍其疆土矣然其故基餘孽猶有存者上之人見天下之難合而恐其復發也於是出禁兵以戍之大自藩府而小至於縣鎮往往皆有京師之兵由此觀之則是天下之地一尺一寸皆天子自為守也而可以長久而不變乎費莫大於養兵養兵之費莫大於征行今出禁兵而戍郡縣逺者或數千里其月廩嵗給之外又日供其芻糧三嵗而一遷往者紛紛來者纍纍雖不過數百為輩而要其歸無以異於數十萬之兵三嵗而一出征也農夫之力安得不竭餽運之卒安得不疲且今天下未嘗有戰鬭之事武夫悍卒非有勞伐可以邀其上之人然皆不得為休息間居無用之兵者其意以為為天子出戍也是故美衣豐食開府庫輦金帛若有所負一逆其意則欲羣起而噪呼此何為者也天下一家且數十百年矣民之戴君至於海隅無以異於畿甸亦不必舉疑四方之兵而専信禁兵也曩者蜀之有均賊近嵗貝州之亂未必非禁兵致之臣愚以為郡縣之土兵可以漸訓而隂奪其權則禁兵可以漸省而無用天下武健豈有常所哉山川之所習風氣之所咻四方之民一也昔者戰國常用之矣蜀人之怯懦吳人之短小皆嘗以抗衡於上國夫安得禁兵而用之今之土兵所以鈍弊劣弱而不振者彼見郡縣皆有禁兵而待之異等是以自棄於賤𨽻役夫之間而將吏亦莫訓也茍禁兵漸省而以其資糧益優郡縣之土兵則彼固以歡欣踴躍出於意外戴上之恩而願效其力又何遽不如禁兵耶夫土兵日以多禁兵日以少天子扈從捍城之外無所復用如此則內無屯聚仰給之費而外無遷徙供億之勞費之省者又已過半矣其二曰練軍實三代之兵不待擇而精其故何也出兵於農有常數而無常人國有事要以一家而備一正卒如斯而已矣是故老者得以養疾病者得以為間民而役於官者莫不皆其壯子弟故其無事而田獵則未嘗發老弱之民師行而餽糧則未嘗食無用之卒使之足輕險阻而手易器械聰眀足以赴旗鼓之節強鋭足以犯死傷之地千乘之衆而人人足以自捍故殺人少而成功多費用省而兵卒強蓋春秋之時諸侯相并天下百戰其經傳所見謂之敗績者如城濮鄢陵之役皆不過犯其偏師而獵其遊卒斂兵而退未有僵尸百萬流血江河如後世之戰者何也民各推其家之壯者以為兵則其勢不可得而多殺也及至後世兵民既分兵不得復而為民於是始有老弱之卒夫既已募民而為兵其妻子屋廬既已託於營伍之中其姓名既已書於官府之籍行不得為商居不得為農而仰食於官至於衰老而無歸則其道誠不可以棄去是故無用之卒雖薄其資糧而皆廩之終身凡民之生自二十以上至於衰老不過四十餘年之間勇鋭強力之氣足以犯堅冒刃者不過二十餘年今廩之終身則是一卒凡二十年無用而食於官也自此而推之養兵十萬則是五萬人可去也屯兵十年則是五年為無益之費也民者天下之本而財者民之所以生也有兵而不可使戰是謂棄財不可使戰而驅之戰是謂棄民臣觀秦漢之後天下何其殘敗之多邪其弊皆起於分民而為兵兵不得休使老弱不堪之卒拱手而就戮故有以百萬之衆而見屠於數千之兵者有良將善用不過為餌委之啖賊嗟夫三代之衰民之無罪而死者其不可勝數矣今天下募兵至多往者陜西之役舉籍平民以為兵加以眀道寶元之間天下旱蝗次及近嵗青齊之飢與河朔之水災民急而為兵者日益衆舉籍而按之近世以來募兵之多無如今日者然皆老弱不教不能當古之十五而衣食之費百倍於古此甚非所以長久而不變者也凡民之為兵者其類多非良民方其少壯之時博奕飲酒不安於家而後能捐其身至其少衰而氣沮蓋亦有悔而不復者矣臣以謂五十以上願復而為民者宜聼自今以往民之願為兵者皆三十以下則收限以十年而除其籍民三十而為兵十年而復歸其精力思慮猶可以養生送死為終身之計其應募之日心知其不出十年而為十年之計則除其籍而不怨以無用之兵終身坐食之費而為重募則應者必衆如此縣官常無老弱之兵而民之不任戰者不至於無罪而死彼皆知其不過十年而復為平民則自愛其身而重犯法不至於呌呼無賴以自棄於凶人今夫天下之患在於民不知兵故兵常驕悍而民常怯盜賊攻之而不能禦戎狄掠之而不能抗今使民得更代而為兵兵得復還而為民則天下之知兵者衆而盜賊戎狄將有所忌然獨有言者將以為十年而代故者已去而新者未教則緩急有所不濟夫所謂十年而代者豈舉軍而並去之有始至者有既久者有將去者有當代者新故雜居而教之則緩急可以無憂矣英宗治平初兵一百一十六萬二千而禁軍馬步六十六萬三千治平元年宰相韓琦上言古者籍民為兵故其數雖多而贍至薄唐置府兵最近古天寶以後廢不能復今之義勇河北幾十五萬河東幾八萬勇悍純實生於天性而有物力資産父母妻子之所係若稍加簡錬與唐府兵何異陜西嘗刺弓手為保捷其後揀放所存無幾且河北河東陜西三路皆控西北事當一體請於陜西亦點義勇止涅手背一時不能無小擾而終成長利乃遣官陜西路籍義勇得十三萬八千四百六十五人知諫院司馬光上言昔康定慶歷之間朝廷以元昊犯邉官軍不利已曽籍陜西之民以為鄉弓手始者眀出敕榜云但欲使之守護鄉里必不刺充正軍屯戍邉境榜猶未收而朝廷盡刺充保捷指揮令於邉州屯戍當是之時臣丁憂在陜備見其事民皆生長太平不識金革一旦調發為兵自陜以西閭閻之間如人人有喪户户被掠號哭之聲彌天亘野天地為之慘悽日月為之無色往往逃避於外官中縶其父母妻子急加追捕鬻賣田園以充購賞暨刺面之後兵員教頭利其家富百端誅剝衣糧不足以自贍須至取於私家或屯戍在邉則更須千里供送祖父財産日銷月鑠以至於盡况其平生所習者則惟桑麻耒耜至於甲胄弩槊雖日加教閲不免生疏而又資性戇愚加之畏懦臨敵之際得便即思退走不惟自喪其身兼更拽動大陳自後官中知其無用遂大加沙汰給與公憑放令逐便而惰遊已久不復肯服稼穡之勞兼田産已空無所復歸皆流落凍餒不知所在長老至今言之猶長歎出涕其為失策較然可知足以為後來之戒而不足以為法也又言祖宗平諸鎮一天下豈嘗有義勇哉自趙元昊反諸將覆師者相繼終不能出一旅之衆涉區脫之地以討其罪不免為姑息之計當是時三路鄉兵數十萬何嘗得一人之力乎議者必曰河北河東不用衣廩得勝兵數十萬閲教精熟皆可以戰又兵出民間合於古制臣謂不然彼數十萬者虛數也閲教精熟者外貌也兵出民間者多與古同而實異也蓋州縣承朝廷之意止求數多閲教之日觀者但見其旗號鮮眀鉦鼓備具行列有序進退應節即歎美以為真可以戰殊不知彼猶聚戲若聞寇敵則瓦解星散不知所之矣古者兵出民間民耕桑之所得皆以衣食其家故處則富足出則精鋭今既賦斂農民之粟帛以贍正軍又籍農民之身以為兵是一家獨任二家之事也如此則民之財力安得不屈臣愚以為河北河東已刺之民猶當放遣况陜西未刺之民乎又言臣比日以來熟思其事誠於民有世世之害於國無分毫之利何謂於民有世世之害臣竊見河北陜西河東自景祐以前本無義勇凡州縣諸般色役並是上等有物力人户支當其鄉村下等人户除二稅之外更無大假差徭自非大飢之嵗則溫衣飽食父子兄弟熙熙相樂自寶元慶歷之間將陜西一路弓手盡刺充保捷正軍自此騷然愁苦矣其河北河東之民比於陜西路雖免離家去鄉戍邉死敵之患然一刺手背之後或遇水旱凶荒欲分房逐熟或典賣盡田産欲浮遊作客皆慮官中非時點集不敢東西又差點之際州縣之吏寧無乞覔教閲之時軍貟教頭寧無斂掠是以常時色役之外添此一種科徭云云且今日既籍之後州縣義勇皆有常數每有逃亡病死州縣必隨而補之然義勇之身既羇縻以至老死而子孫若有壯丁又不免刺為義勇是使陜西之民子子孫孫常有三分之一為兵故臣曰於民有世世之害也何謂於國無分毫之利者曰古之兵皆出民間豈民兵可用於古而不用於今乎臣對曰三代之時用井田之法以出士卒車馬居則為比閭族黨州鄉行則為伍兩卒旅師軍為之長者皆鄉士大夫也唐初府兵各有營府有將軍郎將折衝果毅以相統攝是以令下之日數萬之衆可以立具無敢逃亡避匿者以其紀綱素備故也今鄉兵則不然雖有軍貟節級之名皆其鄉黨族姻平居相與拍肩把袂飲博鬬毆之人非如正軍有階級上下之嚴也若安寧無事之時州縣聚集教閲則亦有行陳旗鼓開弓彍弩坐作呌噪真如可以戰敵者設若聞敵軍大入邉兵已敗邉城不守則莫不望風聲奔波迸散其軍員節級將鳥伏鼠竄自救之不暇豈有一人能為縣官率士卒以待敵乎臣故曰於國無分毫之利也韓魏公建議於陜西刺義勇凡三丁刺一每人支買弓箭錢三貫深山窮谷無得脫者人情驚撓而兵紀律疏略終不可用徒費官錢不資無一人敢言其非者司馬光時為諌官極言不便持劄子至中書魏公曰兵貴先聲後實今諒祚方桀驁使聞陜西驟益二十萬兵豈不震懾光曰兵之用先聲為其無實也獨可以欺人於一日之間耳少緩則敵知其情不可復用矣今吾雖益二十萬兵然實不可用過十日西人知其詳不復懼矣魏公不能答復曰君但見慶歷間陜西鄉兵初刺手背後皆刺面充正兵憂今復爾耳今已降敕榜與民約永不充軍戍邉矣光曰朝廷屢失信民間皆憂此事未敢以敕榜為信雖光亦未免疑也魏公曰吾在此君無憂此語之不信光曰光不敢奉信非獨不敢恐相公亦不能自信耳魏公怒曰君何相輕甚耶光曰相公長在此坐可也萬一均逸偃藩他人在此因相公見成之兵遣以運糧戍邉反掌間耳魏公竟不為止其後不十年義勇運糧沿邉率以為常如光言文獻通考卷一百五十二
