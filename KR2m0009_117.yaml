十人排列官一員凡玉輅丈尺飾視承平所用顯慶輅輅多不同蓋出省記增減也金輅色以赤駕六赤馬駕士六十四人象輅色以淺黃駕六赭白馬駕士四十人革輅色以黃駕六騧馬駕士四十人木輅色以黑駕六黑騮馬駕士四十人自金輅而下其制皆同玉輅惟無玉飾副玉輅副金輅副象輅副革輅副木輅並駕六馬駕士四十人當用銀飾者皆以銅餘制如正輅元豐初禮文所言近制金輅不以金飾諸末象輅不以象飾諸末革輅不鞔木輅不漆請改飾四輅又古者五輅皆載旗謂之道德之車考工記車戟崇於殳酋矛崇於戟各四赤戟矛皆插車騎謂之兵車戟國尚武故增插四戟謂之闟戟則知德車武車固異用矣漢鹵簿前驅有鳯凰闟戟猶未施於五輅江左以來五輅乃加棨戟於車之右韜以黻繡之衣後周司輅左建旗右建闟戟闟戟方六尺而被之以繡皆戾於古請去五輅闟戟以應道德之稱而建太常於車後之中央升輅則由左又按周禮大馭掌馭玉輅以祀則祀乘玉輅也齋僕掌馭金輅齋充金輅之右則齋乘金輅也齋祀之車異用而不相因國朝親祠太廟致齋文德殿畢翼日即進玉輅非是請進金輅俟太廟祀畢翼日御玉輅詣郊又言法駕之行必有共輿者蓋以承清問袁盎曰天子所與共六尺輿皆天下豪俊此漢用古制也周官有太僕齋僕道僕所以御車至驂其乘則其禮益重故道德之車則有齋右道右武車則有戎右皆以士大夫為之國朝之制乘輿有太僕而無驂乘請增近臣一員立車右其後詔增制五輅及驂乘玉輅建太常金輅建太旗象輅建太赤革輅建太白木輅建太麾諸輅之副各次正輅仍有闟戟焉中興後金輅之制黃飾建大斾九斿繡升龍輅牌一金鍍銀耀葉八十一輪衣一繡絡帶二頂雲龍䋿帶十有二玉珮十有二金絲結穗毬二金絲結綬一長轅金鍍銀龍頭二上有金鍍銅立鳯十有二車桄上金鍍銅座一金鍍銅套筒十金鍍銀鈸面四金鍍爐一金鍍銀香寶二并匙金鍍銀立羽臺八御座褥子一有黃絹帕三箱周回葉假正輪輻一副輪軸罨頭鈸面各二轂輻葉各二百四十建竿二流蘇結二并鐸軟簾一并鈸遮環踏道一并褥行馬二并罨頭小托義二車箱行道褥一馬飾十有二馬面轡頭攀胸腹帶包􅐢尾錦屜綽頦職掌駕士一百五十六人服色以黃黃馬三十匹四輅下駕輅馬共一百二十匹蓋覆儀鸞共六人前後攔馬各五人踏道六人轅馬六人誕馬六人抱轅墜轅各四人正托義四人把棒四人椎杠二人靜席二人左右索各五十一人職掌呵唱二人教馬二人車子官健二人象革木三輅人數並同四輅無千牛衛上將軍抱龍旗進馬官香蹬睥睨排列官職掌等象輅朱飾建大赤七斾繡鳥隼儀物同金輅職掌駕士一百五十六人服色以赤騂馬三十匹革輅銀褐飾建太白六斿繡熊虎儀物同上職掌駕士一百五十六人服色以銀褐白馬三十匹木輅黑飾建大麾四斿繡龜蛇儀物同上職掌駕士一百五十六人服色以黑驪馬三十匹大輅徽宗政和六年徐秉哲言南北郊皇帝乘玉輅以赴齋宫自齋宫赴壇正當祀天地乃乘大輦疑非禮意下禮制局討論於是議造大路如玉輅之制唯不飾以玉樊纓一就以尚質又制大旗十有二旒龍章而設日月建於大路之上以象天大路大輿陳列於門輦逍遙平輦之前禮畢還宫則御大輦耕根車漢制如副車有三蓋一曰芝車置􅞙耒耜之箙上親耕所乘桓談謂楊雄曰君之為黃門郎居殿中數見輿輦玉蚤華芝及鳳凰三蓋之屬皆元黃五色飾以金玉翠羽珠絡錦繡茵席者晉因之駕駟天子親耕所乘置耒耜於軾上一名三蓋車宋因之隋以青為質三重蓋羽葆雕裝同玉輅駕六馬其軾平以青囊盛耒耜而加之籍田則乘之唐因隋其飾不易大駕行則偹焉宋制如五輅之副駕六青馬駕士四十人進賢車古安車也周制致仕之老及后乘之漢制乘輿金根安車立車蔡雍曰五安五立徐廣曰立乘曰髙車坐乘曰安車是為德車五時車安立亦皆如之各如方色馬亦如之建大旗十有二斿駕六馬餘皆駕四皇太子皇子公列侯皆乘之自漢以後亦為副車晉制因之天子所御則駕六餘並駕四三公下至九卿各一乘公駕三特進駕二卿駕一宋因之齊制諸王三公國公列侯等行禮則乘之隋制金飾紫通幰朱裏駕四馬臨幸及弔則供之唐制以金飾駕四馬臨幸則乘之大駕出在耕根車後宋乾德時改赤質兩碧紗窗擎耳虛匱一轅緋幰衣絡帶門簾皆繡鳳紅絲網中設朱漆床香案紫裬案衣緋繒裏鞔索朱漆行馬凡車皆有鞔索行馬駕四馬駕士二十四人眀逺車古四望車齊制通幰油幢絡班漆輪轂亦曰皀輪以加貴臣隋制同犢車黃金飾青油幢朱裏紫通􅎻紫絲網駕一牛拜陵臨弔則乘之唐制以金飾駕四馬拜陵臨弔則乘之大駕出在安車後宋初駕以牛後改仍駕四馬赤質制所屋重櫩勾闌上有金龍四角重銅鐸上層四面垂簾下層周以花轅三板駕士四十人羊車晉制一名輦上如軺伏箱漆畫輪武帝太始中羊琇乘司隸紏罪免官齊依之因制漆畫牽車小形如輿金塗縱容錦衣箱裏隱漆後户牙蘭轅枕後捎􅎻竿代棟梁皆金塗鉸飾御及皇太子所乘之梁因制羊車亦名輦上如軺小兒衣青布袴褶五辮髻數人引之貴賤通得乘之名牽子也隋大業始置焉金寶飾紫􅎻朱絲網童子二十人皆兩環髻服青衣年十四五者乘之謂之羊車小吏駕果下馬其大如羊唐因之小吏十四人宋亦為畫輪車駕以牛隨駕以果下馬以二小馬赤質兩壁畫龜文金鳳翅緋􅎻衣絡帶門簾皆繡以瑞羊童子十八人景祐中賈昌朝言大駕鹵簿有羊車前列案羊車本漢晉時乘於後宫隋唐以來遂為法從國朝因循未改竊以郊祭天地廟見祖宗車服所陳動必由禮至於四望耕根之屬兼包歷代豈容後宫所乘參陪五輅欲望大駕不用羊車所冀肅恭稽合典禮指南車黃帝與蚩尤戰於涿鹿之野蚩尤作大霧將士皆迷四方黃帝於是作指南車以示方故後常建焉出崔豹古今注周致太平越裳氏重譯來獻使者迷其歸路周公為司南之制使載之南周年至國故常為先導示服逺人而正四方車法具在尚方故事其制未詳後漢張衡始復創造漢末喪亂其制不存魏明帝青龍中令博士馬鈞紹而作焉車上有木仙人舉手常指南車箱回轉所指微差晉亂復亡東晉義熙十三年劉裕平長安始得此車復修之一名司南車駕駟其下制如樓三級四角金龍銜羽葆刻木為仙人衣羽衣立車上車雖回運而手恆指南大駕出行為先啓之乘此車戎狄所制機數不精回曲頻驟猶須人力正之范陽人祖沖之有巧思常謂冝更造宋順帝升眀中東齊髙帝為相命沖之造焉車成使撫軍將軍丹陽尹王僧虔等試之其制甚精百屈千回未嘗移變齊因宋制加飾四周箱上施屋指南人衣裙襦天衣在箱中上四角皆施龍子干懸雜色真孔雀眊布皂覆幔駕牛皆銅鈸飾梁復名司南車大駕出為先啓之乘後魏太武帝使工人郭善眀造之彌年不就扶風人馬嶽又造垂成善眀鴆殺之唐修之􅊀於大駕行則先導宋一名司馬車赤質兩箱畫青龍白虎四面畫花鳥重臺勾闌鏤拱四角垂香囊上有仙人車雖轉而手恆指南一轅鳳首駕四馬駕士三十人天聖五年燕肅復創意造之其法用獨轅車箱外籠上有重構立木人用大小輪九合齒一百二十匹輪二髙六尺圍一丈八尺附足立子輪二徑二尺四寸圍七尺二寸齒各二十四齒間相去三寸轅端橫木下立小輪二其徑三寸鐡軸貫之左小平輪一其徑一尺二寸齒十二右小平輪一其徑一尺二寸齒十二中心大平輪一其徑四尺八寸圍一丈四尺四寸齒四十八齒間相去三寸中立貫心軸一其髙八尺徑二寸上刻木為人其車行木人南指若折而東推轅右旋附右足子輪順轉十二齒擊右小平輪一匝觸中心大平輪左旋四分之一轉十二齒車東行木人交而南指若折而西推轅左旋附左足子輪隨輪順轉十二齒擊左小平輪一匝觸中心大平輪右轉四分之一轉十二齒車正西行木人交而南指若欲北行或東或西轉亦如之徽宗大觀元年內侍省吳德仁又獻指南車之制其制身一丈一尺一寸五分闊九尺五寸深一丈九寸車輪直徑五尺七寸車轅一丈五寸車箱上下為兩層中設屏風上安仙人一執仗左右龜鶴各一童子四各執纓立四角上設關捩卧輪一十三各徑一尺八寸五分圍五尺五寸五分出齒三十二齒間相去一寸八分中心輪軸隨屏風貫下下有輪一十三中至大平輪其輪徑三尺八寸圍一丈一尺四寸出齒一百齒間相去一寸二分五釐通上左右起落二小平輪各有鐡墜子一皆徑一尺一寸圍三尺三寸出齒一十七齒間相去一寸九分又左右附輪各一徑一尺五寸五分圍四尺六寸五分出齒二十四齒間相去二寸一分左右疊輪各二下輪各徑二尺一寸圍六尺三寸出齒三十二齒間相去二寸一分上輪各徑一尺二寸圍三尺六寸出齒三十二齒間相去一寸一分左右車腳上各立輪一徑二尺二寸圍六尺六寸出齒三十二齒間相去一寸二分五釐左右後轅各小輪一無齒繫竹䉡并索在左右軸遇右轉使右轅小輪觸落右輪若左轉使左轅小轅觸落左輪行仙童交而指南車成記里鼓車東晉安帝義熙十三年劉裕滅後秦所獲未詳其所由來制如指南車駕駟中有木人執槌向鼓行一里則打一槌崔豹古今注云亦名大章車所以識道里也車上為二層皆有木人執槌行一里下一層擊鼓行十里上一層擊鐲尚方故事有其作法然亦未詳之宋因之不易大駕鹵簿次指南車後齊因宋制飾加華蓋子襟衣漆畫鼓機皆在內也梁因齊制改駕以牛唐復修大駕鹵簿次指南車後宋一名大章車赤質四面畫花鳥重臺勾闌鏤拱行一里則上層木人擊鼓十里則次層木人擊鐲一轅鳯首駕四馬駕士三十人天聖間內侍盧道隆上記里鼓車之制其制獨轅雙輪箱上為兩重各刻木為人執檛足輪各徑六尺圍丈八尺足輪一周而行地三步以古法六尺為步三百步為里用較今法五尺為步三百六十步為里立輪一附於左足徑一尺三寸八分圍四尺一寸四分出齒十八齒間相去二寸三分半平輪一其徑四尺一寸四分圍丈二尺四寸二分出齒五十四齒間相去與附立輪同立貫心軸一其上設銅旋風輪一出齒三齒間相去寸二分中立平輪一其徑四尺圍丈二尺出齒百齒間相去與旋風等次設小平輪一其徑三寸少半寸圍一尺出齒十齒間相去一寸上平輪一其徑三尺少半尺圍一丈出齒百齒間相去與小平輪同其中平輪轉一周車行一里一層木人擊鼓上平輪轉一周車行十里上一層木人擊鐲凡用大小輪八合二百八十五齒遞相鈎鎖周而復始詔皆以其法下有司而製之大觀元年內侍省吳德仁獻記里鼓車之制其法車箱上下為兩層上安木人二身各手執木槌輪軸共四內左壁車腳上立輪一安車箱內徑二尺二寸五分圍六尺七寸五分二十齒齒間相去三寸三分五釐又平輪一徑四尺六寸五分圍一丈三尺九寸五分出齒六十齒間相去二寸四分上大平輪一通軸貫上徑二尺八寸圍一丈一尺出齒一百齒間相去一寸二分立軸一徑二寸二分圍六寸六分出齒三齒間相去二寸二分外大平輪軸上有鐡撥子二又木橫軸上關捩撥子各一其於車腳轉一百遭通輪軸轉周木人各一擊鉦鼓白鷺車隋制一名鼓吹車車上施層樓樓上有翔鸞棲焉唐因之駕四馬大駕出在記里鼓車後宋制赤質周施花板上有朱柱貫五輪相重輪衣以緋皂頂及緋絡帶立繡飛鷺柱杪刻木為鷺御鵝毛筒紅綬帶一轅駕四馬駕士十八人宣和元年禮制局言舊鹵簿記有白鷺鸞旗皮軒三重其制非古按曲禮曰前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有鷙獸則載貔貅萬乘一出五車必載所以警衆也青旌鳴鳶飛鴻貔貅乃以白鷺鸞旗雜陳其間未為合禮今欲改五車相次於中道繼之以崇德車於是為􅊀青旌車赤質曲壁中載青旗以絳帛為之畫青鳥於其上鳴鳶車赤質曲壁中載鳴鳶旌以絳帛為之畫鳴鳶於其上飛鴻車赤質曲壁中載飛鴻旌以絳帛為之載飛鴻於其上虎皮車赤質曲壁中載虎皮旌絳帛為之緣以赤畫虎皮於上貔貅車赤質曲壁旌絳帛為之緣以赤畫貔貅於上其轅皆一鸞旗車漢制為前驅編羽旄列繫幢旁胡廣曰以銅作鸞鳥於車衡上晉宋因之駕四馬先路所載唐􅊀於大駕鹵簿次白鷺車後宋制赤質曲壁一轅上載赤旗繡鸞鳥駕四馬駕士十八人宣和中禮制局言三車非古制改五車事見白鷺車下崇德車秦名為辟惡車上有桃􅋃葦矢以禳祓不祥太僕令一人在車前執弓箭出崔豹古今注唐制駕四馬大駕出在鸞旗車後宋制赤質周施花板四角刻辟惡獸中載黃旗亦繡此獸太卜署令一人在車中執旗駕四馬駕士十八人宣和初禮制局言記曰前巫而後史傳曰桃􅋃棘矢以供禦王事請以巫易太卜弧矢易辟惡獸從之皮軒車漢前驅車以虎皮為軒取曲禮前有士師則載虎皮之義晉宋相因駕四馬皆大夫載自後無聞唐􅊀之大駕鹵簿次於辟惡車後宋制赤質曲壁上有柱貫五輪相重畫虎文駕四馬駕士十八人宣和初禮制局言三車非古制改五車事見白鷺車下黃鉞車漢制乘輿建之在大駕後晉黃鉞車駕一馬大駕行次於華蓋後御麾左右又有金鉞車金鉦車並駕三馬唐偹於大駕鹵簿天寶初改為金鉞車宋制赤質曲壁中設金鉞錦囊綢杠左武衛隊正一人在車中執鉞駕兩馬駕士十五人豹尾車周制象君子豹變又以尾者言謙也古者軍正建之崔豹古今注云漢制大駕出屬車八十一乘法駕出屬車三十六乘最後一乘豹尾以前比之省中胡廣曰施於道路豹尾之內為省中晉因之在鹵簿末宋制徐廣按淮南子云軍正執豹皮以正其衆禮記曰前有士師則載虎皮乘輿豹尾以其義類唐制大駕出在黃鉞車後駕二馬右武衛隊正一人在車執之宋因之制同黃鉞車上載朱漆竿首綴豹尾右武衛隊正一人執之駕兩馬駕士十五人屬車一曰二車一曰左車秦制大駕屬車八十一乘法駕三十六乘漢法駕用三十一乘小駕用十二乘隋制大駕三十六法駕十二小駕不用唐大駕唯用十二乘宋因之其制黑質兩箱輿裝前有曲闌金銅飾上施紫通􅎻絡帶門簾皆繡雲鶴紫網帉錔每乘駕三牛駕士十人元豐初詳定禮文所言周戎右職曰會同充革車儀禮曰二車畢乘禮記曰乘君之乘車不敢曠左右必式蓋古者後車餘路必使人乘之不敢曠空所以别曠左之嫌也詩曰命彼後車謂之載之是也自秦兼九國車服西漢因之大駕屬車八十一乘後漢制云尚書御史所載揚雄云鴟夷國器託於屬車張衡曰屬車之簉載獫猲獢則是漢之屬車非獨載人又以載物亦儀禮所謂畢乘之也宋朝鹵簿車十二乘虛設於法駕之後實近曠左之嫌請尚書御史乘之或以載乘輿服御從之大輦歷代之制已見前宋制大輦赤質正方油畫金塗銀葉龍鳳裝其上四面行雲龍朵火珠方鑑銀絲囊網珠翠結條雲龍鈿窠霞子四角龍頭銜香囊頂輪施耀葉中有銀蓮華座龍紅綾裏碧牙壓帖內設圓鑑銀絲香囊銀飾勾闌臺座紅絲絛網帉錔中施黃褥置御座扶几香爐錦結綬几衣輪衣絡帶並緋繡壓金銀線長竿四銀裏鐡鋦龍頭魚鈎錦膊褥銀裝畫梯托義黃羅緣席褥帊梯杖褥朱索緋繒油帊主輦六十四人親祀南郊謁太廟還及具鸞駕黃麾仗省方還都則乘之大中祥符初東封舊輦太重遂命别造凡減去七百餘斤後常用焉紹興十三年更製大安輦赤質正方油畫金塗銀龍鳳裝朱漆大輪一金塗銀頂龍一四面施行龍一十六火珠四方鑑銀絲囊網珠翠結絛雲龍鈿窠霞子四角龍頭四真珠結穗毬一十二頂輪塗施金銀耀葉銀盤紅羅輪衣一綴銀鈴紅羅絡帶二中設御座檀香雕木龍椅靠背上水晶珠梅紅絲裙網象牙滴子曲几錦褥絹畫裏外龍水屏風香爐結綬長竿四飾以金塗銀龍頭奉輦四百六十人為五番每番九十二人祀畢車駕還內不用金輅則乘之淳熙十二年新製踏道增其尺寸舊例五番四十人今添三十人及副都大人員一人服五色武辨冠黃羅繡對鳳袍黃羅勒帛紫羅生色袒帶紫絹行縢文德殿發册尚輦陳於西階下東嚮隆興元年禮官請大輦權不陳設芳亭輦黑質頂如幕屋緋羅衣裙襴絡帶皆繡雲鳳兩面朱緑蔥花鈑外施紅絲網金銅帉錔前後垂簾下設牙牀勾闌長竿四銀龍頭銀飾梯行馬主輦一百二十人鳳輦赤質頂輪有二柱緋羅輪衣絡帶門簾皆繡雲鳳頂有金鳳一兩壁刻畫龜文金鳳翅前有軾設香爐香寶結帶下有勾闌二重長竿三銀飾梯行馬主輦八十人法駕鹵簿不設逍遙輦以棕櫚為屋赤質金裝朱漆竿版各一金螭頭金褁魚鈎各四朱漆柄托義二金絲坐褥扶版踏牀褥飾以紅花羅錦踏牀褥一襯褥十六金鍍銀裝行馬二朱漆踏牀二促塵版軟屏風紅花羅錦金屏風護泥屏各一舊云逍遙子後改名輦髙宗紹興七年重製詔務令朴素乾道九年以後殿門卑小逍遙輦出入有礙令工部照輦院丈尺重修殿門御輦院官舊制二千六百三十人紹興十二年詔以一千人為額供御營三百人次供御營一百五十人下都營六百五十人後減為九百人乾道六年詔以七百人為額供御二百二十人次供御一百三十人下都三百五十人平頭輦制如逍遙輦而無屋真宗造登封輦今平頭輦制因此金螭頭四金裝朱漆扶版竿各二雲版座各一金褁魚鈎四褥飾以紅花羅錦踏牀褥一檀香促塵版一護泥屏一舊制輦官十二人服同逍遙輦紹興十六年親耕服履袍乘之隆興初詔制平輦及絛衣褥郊祀禮畢用之小輦赤質頂輪下施曲柄如蓋緋繡輪衣絡帶制如鳳輦而小下有勾闌牙牀繡瀝水中設方牀緋羅衣錦褥上有小案坐牀皆繡衣踏牀緋衣前後長竿二銀飾梯行馬奉輿二十四人七寶輦隆興二年正月詔御輦院令京師舊輦官省記昨進道君皇帝七寶輦之制下有司製造更為美名以進德夀宫禮官言七寶輦髙五尺一寸廣二尺七寸深三尺六寸竿長二丈一寸扶版二朱紅漆絲織紅百花行龍藍瀝水升龍朱漆踏牀一紅百花團龍覆之百花大團龍褥一紅羅銷金百花團龍座一朱漆踏牀一鍍金銀火踏一純金裝釘行馬一對托義一以朱漆之比大輦制度內耀葉并角龍蓮盤頂龍並塗金真珠結穗毬龍水屏風御座用香檀木龍椅靠背金焰水晶珠梅紅絲裙網牙象滴今欲比大輦平輦用珠靠背龍頭引手玉龍頭并玉轉身捧珠龍其角龍鐸等並純金詔如其式內裙網用七寶裝綴太上皇帝曰儀衛已隨時增益輿輦不須别造况多事之時國用方殷不宜虛費遂止自是上皇每至大內多乘馬間至湖上則用肩輿蓋不欲煩民也腰輿前後長竿各二金銅螭頭緋繡鳳裙襴上施錦褥别設小牀緋繡花龍衣奉輿十六人香蹬唐制也朱漆案緋繡花龍衣上設金塗香爐燭臺長竿二輿士八人金塗銀火鐐香匙副之象漢鹵簿最在前晉平吳後南越獻馴象作大車駕之以載黃門鼓吹數十人使越人騎之以試橋梁宋朝鹵簿以象居先設木蓮花座金蕉盤紫羅繡襜絡腦當胸後鞦並設銅鈴杏葉紅犛牛尾拂跋塵每象南越軍一人跨其上四人引並花腳幞頭緋繡窄衣銀帶五牛旗依方色皆小輿上刻木為牛背插旗錯采為牛旗竿上有小盤衣及輿衣亦並繡牛形輿士各四人相風烏輿上載長竿杪刻木為烏垂鵝毛筒紅綬帶下承以盤周以緋裙繡烏形輿士四人交龍鉦鼓輿各一皆刻木為二青龍相交下有木臺長竿一挂畫鼓一挂金鉦上皆有緋蓋亦繡交龍輿士各二人鐘鼓樓各一本隋大駕鐘車鼓車也皆刻木為屋中置鐘鼓下施木臺長竿如鉦鼓輿輿士各二十四人行漏隋大業行漏車也制同鐘鼓樓而大設刻漏如桶衡首垂銅鉢末有鉢象漆匱貯水渴烏注水入鉢中長竿四輿士六十人十二神輿赤質四門旁刻十二辰緋繡輪衣絡帶輿士十二人自鉦鼓以下舊禮令無文皆開寶定禮所增旗常之制自漢以來制度殘缺唐禮五輅皆左建龍旗右載闟戟訛謬滋甚元豐改定郊廟禮文五輅所載悉如巾車之職又以闟戟非古政和間禮官請玉輅以太常大旗建於左右而去闟戟厥後郊廟五輅及副車皆建太常一日並出觀者駭焉至是造五輅悉效周禮之制玉輅後左太常繡日月星辰右龍旗繡交龍皆用青羅表裏文繡下有網鬚謂之茀頭用青飾建竿插於輅後兩柱傍金環之內竿首飾以鍍金螭頭垂以金鈸青纓各六謂之旒繻竿以桐木剖竹外護固以筋膠布以漆飾以青藻旗勢稍重六人各執義托之以助旗力旗皆錯采為之漆竿鎞首纛頭錦腰火焰腳白澤攝提金鸞獅子天下太平君王萬嵗及在步甲前後隊後馬隊三隊六軍儀仗內並以赤日月及合璧連珠五星二十八宿祥雲並以青北斗以黑五嶽四瀆五方五神十二辰五龍五鳳龍虎君並以方色天王以赤黃二色排攔以黃紫赤三色大黃龍負圖旗舊畫八卦政和禮局改畫為河圖九一三七二四六八五之數中興後增製華旗各以瑞物繢形其上皂纛本後魏纛頭之制蓋旄頭之遺象制同旗無文采去鎞首六腳犦矟擊聲也一云象犦牛善鬬唐金吾將軍執之宋朝制如莭有袋上加碧油常置朝堂車馬鹵簿出則八枚前導又衛司犦矟四牙門旗古者天子出建大牙宋朝制赤質錯采為神人象中道前後各一門左右道五門門二旗蓋取周旌旗門及天子五門之制中興後中道前後門旗各二左右道五門各四繖古者張帛以避雨今有方繖大繖皆赤質紫表朱裏四角銅螭首六引內制差小紹興九年詔後殿射殿引呈公事日景已髙作衛清涼繖十從舊制也蓋本黃帝時有雲氣為花花之象而作金花蓋導蓋皆赤質如繖而圓瀝水繡花龍又有曲蓋差小繡瑞草睥睨漢乘輿所用如花蓋而小扇有朱團及雉尾四等朱團繡雲鳳黑漆柄金銅飾雉尾皆方其上繡雉尾紹興十三年詔郊禮繖扇並遵舊制拂扇等毋以珠為飾金莭隋制也黑漆竿上施圎盤周綴紅絲拂八層黃繡龍袋籠之王公以下皆有莭制同金莭韜以碧油罕罼象畢昴為天階故為前引皆赤質金銅飾朱藤結網金獸面罕方上有二螭首銜紅絲拂罼圎如扇幢制如莭而五層韜以袋繡四神各隨其方色朱漆柄王公所給幢黑漆柄紫綾袋黃麾古有黃朱纁三色所以指麾也漢大駕有前黃麾宋朝之制絳帛為之如幡錯采成黃麾字下繡交龍朱漆竿金龍首上乘朱絲小蓋元豐中命禮官定朝會儀請製大麾一注旄於竿首其旗十有二幅其色黃一旒元會設仗建大黃麾於當御廂之前麾幡二於後神宗疑其制鑿命且闕之而黃麾幡仍舊幡本幟也貌幡幡然有告止傳教信幡皆絳帛錯采為字上有朱絲小蓋四角垂羅紋佩繫龍頭竿上錯采字下告止為雙鳳傳教為雙白虎信幡為雙龍又有絳引幡制頗同此作五色間暈無字兩角垂佩御刀自晉宋以來有之黑鞘金花銀飾靶􅫓紫絲絛帉錔儀刀制同悉以銀飾王公亦給之班劍本漢朝服帶劒晉易以木謂之象劍取裝飾斑斕之義鞘以黃質素紫班文金銅紫絲絛帉錔戟有枝兵也木為刃赤質畫雲氣上垂交龍掌五色帶末綴銅鈴鈒戟無掌而有小橫木又有小戟與鈒戟同制矟長矛也木刃黑質畫雲氣又有細矟制同而差小儀艎劍戟之類秦漢有之唐用為儀仗刻木如斧塗以青柄以黃上綴小錦幡五色帶殳義亦戟類殳無刃而短黑飾兩末義青飾兩末皆青中白畫雲氣綴朱絲拂氅本緝鳥毛為之今為四角小蓋每角垂珠佩間以朱絲周綴五色帶繡雲龍孔雀白鵝其别有三繫龍頭竿竿制如戟􅎻弩漢京尹司𨽻前驅持弓以射窺者今制每弩加箭二有靫畫雲氣仗內弩同弓箭每弓加箭二有靫同幰弩刀盾刀容刀也盾旁排也一人分持刀以木為之無鞘有環紫絲絛帉錔盾赤質畫異獸又朱藤絡盾制悉同惟緑藤緑質皆持執之甲騎具裝甲人鎧也具裝馬鎧也甲以布為裏黃絁為表青緑畫為甲文紅錦緣青絁為下裙絳韋為絡金銅鉠長短至膝長膺為人面二自背連膺纒以錦螣蛇具裝如常馬甲加珂拂於前膺及後鞦車輻棒也形如車輪輻今制朱漆八稜白柯搶矟也唐羽林所執同矟而鐡刃上綴朱絲拂柯舒黑漆棒也制同車輻以金銅釘飾鐙杖黑漆弩柄也以金銅為飾其末紫絲絛繫之七寶牀一覆以緋羅繡帕國初內臣馬上捧之謂之駕頭緋羅繡扇二緋羅繡曲蓋一並內臣馬上執之謂之扇筤駕頭在細仗前扇筤在乘輿後三駕及常出並用之嘉祐六年以閣門祇候及內臣各二人分駕頭左右扇筤後編攔仍以皇城司親從官二十人隨之鳴鞭周官條狼氏執鞭趨辟之遺制也鞭鞘用紅絲而漬以蠟行幸則前警祀畢還宫亦用之視朝宴會則用於殿庭紹興十三年親饗太廟命去神位百步之內毋得鳴鞭十五年正旦朝會帝出東閣御大慶殿殿上合鳴鞭以殿小非在京比乃免焉毬仗塗金銀褁以供奉官騎執之分左右前導大禮用百人常行三十褥大禮舊儀御座金褁裝釘施珠坐褥是年八月上謂輔臣曰事天以誠為主器用陶匏貴其質也茍尚侈麗則失精禋之意矣乃詔有司製褥毋以珠為飾駕馬鞍勒有金玉水晶金塗四等閙裝䩞鞢結為座龍碾鈒鏤塵沙面平面窪面方團寸莭卷荷校具皆垂六鞘金褁銀鞍橋銜鐙朱黃絲絛轡鞦緋黃織繡或素圜韀􅜵襆用金銀線織或緋黃絁仁宗至道中以黃絹代之鞭用紫竹紅黃絲鞘纓以紅黃犛牛尾金為鈸每日馬五匹供奉鞍用玉及金塗銀􅜵襆用絁絹行幸則十四匹加真金水晶之飾紹興十五年詔自今御後殿及駕出御馬權免入殿止例於殿門外射殿則仍舊制淳熙十四年詔引呈射事御馬依後殿儀立於殿門外右五輅及諸車輿輦旗常鹵簿多歷代所用然有其説而不詳其制惟宋九朝及中興史志所載制造設飾之制頗詳然亦必承襲歷代相因之制而微有增損者也故具載於此至於逍遙子平頭輦駕頭扇筤之屬雖歷代所無然宋三百年相承乘輿出入所必用也故亦具載其制云文獻通考卷一百十七
