body:
  text: 文獻通考卷一百十七鄱陽馬端臨貴與著王禮考十二乘輿車旗鹵簿唐制凡天子之車曰玉輅者祭祀納后所乘也青質玉飾末金輅者饗射祀還飲至所乘也赤質金飾末象輅行道所乘也黃質象飾末革輅者臨兵巡狩所乘也白質鞔以革木輅者搜田所乘也黑質漆之五輅者重輿左青龍右白虎金鳳翅畫苣文鳥獸黃屋左纛金鳯一鈴二在軾前鸞十二在衡龍輈前設障塵青蓋三層繡飾上設博山方鏡下圓鏡樹羽輪金根朱班重牙左建斿十有二旒畫升龍其長曵地青繡綢杠右載闟戟長四尺廣三尺黻文旗首金龍銜錦結綬及縷帶垂鈴金鑁方釳插翟尾五隻鏤鍚鞶纓十二就旌旗蓋鞶纓皆從輅質唯蓋裏皆用黃五輅皆有副耕根車者耕籍所乘也青質三重蓋餘如玉輅安車者臨幸所乘也金飾重輿曲壁紫油纁朱裏通幰朱絲絡網朱鞶纓朱覆髮具絡駕赤駵副輅耕根車安車皆八鸞四望車者拜陵臨弔所乘也制如安車青油纁朱裏通幰朱絲絡網又有屬車十乘一曰指南車二曰記里鼓車三曰白鷺車四曰鸞旗車五曰辟惡車六曰皮軒車七曰羊車與耕根車四望車安車為十乘行幸陳於鹵簿則分前後大朝會則分左右太宗貞觀元年十一月始加黃鉞車豹尾車通為屬車十二乘以為儀仗之用大駕行幸則分前後施於鹵簿之內若大陳設行則分左右施於儀仗之中髙祖太宗大禮則乘輅髙宗不喜乘輅每有大禮則乘輦至武太后以為常元宗以輦不中禮廢而不用開元十一年冬祀南郊乘輅而往禮畢騎還自是行幸郊祀皆騎於儀仗之內其五輅腰輿陳於鹵簿而已唐制輦有七一曰大鳯輦二曰大芳輦三曰仙遊輦四曰小輕輦五曰芳亭輦六曰大玉輦七曰小玉輦輿有三一曰五色輿二曰常平輿三曰腰輿大駕鹵簿先五輅以行唐大駕鹵簿天子將出前二日大樂令設宫縣之樂於庭晝漏上五刻駕發前七刻擊一鼓為一嚴前五刻擊二鼓為再嚴侍中版奏請中嚴有司陳鹵簿前二刻擊三鼓為三嚴諸衛各督其隊與鈒戟以次入陳殿庭通事舍人引羣官立朝堂侍中中書令以下奉迎於西階侍中負寶乘黃令進輅於太極殿西階南向千牛將軍一人執長刀立輅前北向黃門侍郎一人立侍臣之前贊者二人既外辦太僕卿攝衣而升正立執轡天子乘輿以出降自西階曲直華蓋警蹕侍衛千牛將軍前執轡天子升路太僕卿授綏侍中中書令以下夾侍黃門侍郎前奏請法駕動警蹕鼓傳音黃門侍郎前奏請發鑾駕動警蹕鼓傳音黃門侍郎與贊者夾引而出千牛將軍夾路而趨駕出承天門侍郎乘馬奏駕少留敇侍臣乘馬侍中前承制退稱制曰可黃門侍郎退稱侍臣乘馬贊者承傳侍臣皆乘侍衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中後部從在黃鉞內侍中中書令以下夾侍輅前贊者在供奉官內侍臣乘畢侍郎奏請車右升侍中前承制退稱制曰可侍郎復位千牛將軍升侍郎奏請發導駕先萬年縣令次京兆牧次太常卿次司徒次御史大夫次兵部尚書自縣令以下並正道威儀各乘輅其鹵簿各依本品給之次清遊隊白澤旗二分左右各一人執二人引二人夾也金吾折衝二人各領四十騎戎服分左右次金吾大將軍二人分左右各二人執䂍矟騎從自龍騎以前檢校也次金吾果毅二人領虞候佽飛四十八騎夾道單行分左右引導黃麾仗也次外鐡甲佽飛二十四騎並行分左右廂各六重引導步甲隊次朱雀旗一騎執二騎引二騎夾金吾折衝都尉一人領四十人執橫刀矟弩弓箭騎從也次龍騎十二各一騎執並戎服被大袍橫行正道每一旗前二人騎為二重引前每旗後亦二人護後副竿二分左右又金吾果毅二人騎領也次指南車次記里鼓車次白鷺旗車十二旗次辟惡車次皮軒車並駕四馬駕士各十四人匠一人次引駕十二重重二人並行正道騎帶橫刀自皮軒車後均布至細仗前一重弓箭相間金吾果毅一人檢校次鼓吹令二人次棡鼓十二面金鉦十二面次大鼓百二面次長鳴百二十具次鐃鼓十二面歌簫笳各二十四次大橫吹百二十具莭鼓二面笛簫篳篥笳桃皮篳篥各二十四次棡鼓十二面金鉦十二面次小鼓百二十面次中鳴百二十具次羽葆鼓十二面歌簫笳各二十四自前棡鼓以下工人皆自副並騎分左右橫行每鼓皆二人夾每隊皆有主帥五人以上統領次殿中侍御史二人次黃麾一人執二人騎夾次太史令一人次相風輿輿士八人次棡鼓金鉦各一司辰一人典事一人刻漏生四人分左右次行漏輿正道匠一人輿士四十人次鈒戟前隊左右武衛果毅各一人騎騎分左右次天色繡幡一次金莭十二次罕各一左罕右次朱雀幄一次左青龍幢右白虎幢各一次導蓋一又次稱長一次鈒戟各百四十四人分左右也次左右衛將軍各一次御馬二十四匹分左右也次尚乘奉御二人分左右次左青龍旗右白虎旗各一左右衛果毅各一人各領三十五人騎分左右次通事舍人八人騎分左右次侍御史二人次御史中丞二人次御史二人次拾遺二人次補闕二人並騎左右次起居郎一人在左次起居舍人一人在右次諌議大夫二人在右次給事二人在左次黃門侍郎二人在左次中書侍郎二人在右次左散騎常侍二人在左次右散騎二人在右次侍中二人在左中書令二人在右自通事舍人以下一人皆步從次香鐙一次左右衛將軍各一人分左右次班劍儀刀左右廂各十二行人也次左右衛郎將各一人領散手翊衛三十人橫刀騎在副使仗矟衛內也次左右驍衛郎將各一人各領翊衛二十八人甲騎具裝執副仗矟在散手外均布曲折至後門次左右衛供奉中郎將四人領親勳翊衛四十八人帶橫刀騎分左右在三衛仗內也次玉輅青質玉飾駕青駁六祭祀納后則乘之大僕卿駁駕士四十一人千牛將軍一人陪乘次左右衛大將軍各一人夾五輅次千牛將軍一人中郎將二人分左右次千牛􅊀身分左右騎在玉輅後次御馬二匹次左右監門校尉各一人在後門內檢校次牙門二人執四人夾次左右監門校尉各十二人騎監當後門十二行仗頭各一人次左右驍衛翊衛各三隊每隊三十五人並帶矟弩箭橫刀相間前苐一隊各大將軍領執鳳旗苐二隊各將軍一人領執飛黃旗苐三隊各郎將一人領執吉利旗次左右衛夾轂廂各六隊隊三十人每隊各折衝一人果毅一人檢校也次大繖二在牙門後次孔雀扇各四分左右也次腰輿一次小團扇四次方扇十二花蓋次大輦一尚輦奉御二人殿中少監一人騎從次諸司侍奉官二人分左右次御馬二十四匹分左右次尚乘直長二人分左右次大繖二孔雀扇八夾繖次小扇十二次朱畫團扇十二次花蓋次睥睨十二次元武幢一次絳麾二次細矟十二次後黃麾一次殿中侍御史二人騎分左右次大角百二十具金吾果毅一人領橫行十重也次後部鼓吹羽葆鼓十二面工人十二歌簫笳各工人二十四次鐃鼓十二面工人各十二歌簫笳各工人二十四次小橫吹百二十具工人百二十笛簫篳篥笳桃皮篳篥各工人二十四次芳輦主輦二百人也次小輦一主輦六十人也次小􅓅一奉􅓅十二人次尚􅓅直長二人分左右次左右武衛五牛旗􅓅五黃牛旗處內赤青在左各八人執白黑在右各八人執左右威衛隊正各一人檢校次乘黃令一人丞二人騎分左右檢校玉輅等次金輅赤質金飾駕赤駵六饗射還飲至則乘之次象輅黃質以象飾駕黃駵六行道則供之次革輅青質鞔以革駕白駱六巡狩臨兵事則乘之各駕士三十二人次五副輅各駕四馬駕士各二十八人次耕根車青質蓋三重駕六馬耕籍則乘之駕士三十二人次安車金飾駕四馬臨幸則乘之次四望車金飾駕四馬拜陵臨弔則乘之駕士各二十四人次羊車駕果下馬二小吏十四人次屬車十二駕牛駕士各八人次門下中書省祕書省殿中等局官各一人並騎分左右次黃鉞車駕二馬駕士十二人次豹尾車駕二馬駕士十二人次左右威衛折衝都尉各一人領掩後二百人各執大戟刀盾弓箭及弩各五十人為一行並橫行次左右領軍將軍各一人各二人執䂍矟步從次前後左右廂步甲隊四十八隊前後各二十四隊並鍪鎧弓刀盾五色相間隊引各三十人次左右廂黃麾仗廂各十二部部各十二行並執弓刀戟盾及孔雀氅鵝毛氅雞毛氅等行引十人左右領軍黃麾仗首尾廂各五色繡幡二十口十口引前十口引後廂各獨揭鼓十二重重二人在黃麾仗外次左右衛將軍各一人驍衛武衛威衛領軍衛各大將軍一人檢校黃麾仗次殳仗左右廂各十八人廂别二百五十人執殳二百五十人執義每殳一義一相間次諸衛馬隊左右廂各二十四隊從十二旗隊别主帥以下四十人每隊皆折衝果毅一人撿校前苐一隊辟邪旗苐二隊應龍旗苐三隊玉馬旗苐四隊三角獸旗苐五隊黃龍負圖旗苐六隊黃鹿旗苐七隊飛麟旗苐八隊駃騠旗苐九隊鸞旗苐十隊鳳旗苐十一隊飛黃旗苐十二隊麟旗苐十三隊角端旗苐十四隊赤熊旗次後苐十五隊兕旗苐十六隊太平旗苐十七隊犀牛旗苐十八隊鵕鸃旗苐十九隊騼䮷旗苐二十隊騶牙旗苐二十一隊蒼鳥旗苐二十二隊白狼旗苐二十三隊龍馬旗苐二十四隊金牛旗次元武隊元武旗一人執二人引二人夾金吾折衝一人領五十騎分執矟弩次元武隊前大戟隊後當正道執殳仗行內置牙門一二人執四人央騎分左右次牙門左右廂各開五門門二人執四人夾並騎分左右苐一門在左右威衛黑質步甲隊後白質步甲隊前苐二門在左右衛步甲隊後左右領軍黃麾仗前苐三門在左右武衛黃麾仗後左右驍衛黃麾仗前苐四門在左右領軍衛黃麾仗後左右衛步甲隊前苐五門在左右武衛白質步甲隊後黑質步甲隊前右自清遊隊以下諸衛將軍並平巾幘紫裲襠大口袴錦螣蛇金隱起帶弓箭橫刀中郎將折衝果毅皆平巾幘緋裲襠大口袴錦螣蛇銀梁金隱起帶橫刀弓箭佽飛執旗人引駕三行並武辨緋裲襠大口袴供奉並武辨朱衣各一人步從餘文武官及導駕官並朱衣冠履依本品服其工人駕官並絳衣平巾幘餘並戎服若法駕減大駕太常卿司徒兵部尚書及白鷺車辟惡車大輦五副輅安車四望車屬車減四其清遊隊持鈒隊元武隊皆四分減一諸隊鼓吹皆三分減一餘同大駕縣令以後御史大夫以前威儀亦三分減一若小駕又減法駕御史大夫及指南車記里鼓車鸞旗車皮軒車象輅革輅木輅耕根車羊車黃鉞車豹尾車屬車小輦小輿諸隊仗及鼓吹各減大駕之半餘同法駕縣令州牧威儀亦減大駕之半其新製苣文旗雲旗刃旗肆神幢長夀幢及左右千牛將軍衣瑞牛文左右衛瑞馬文左右驍衛大蟲文左右武衛瑞鷹文左右威衛豹文左右領軍白澤文左右金吾辟邪文左右監門獅子文並繡為袍文將軍中郎將皆同並冬正大會通服之宋太祖皇帝建隆四年將郊祀大禮使范質與鹵簿使張昭儀仗使劉溫叟同詳定大駕鹵簿之制禮儀使陶榖建議金吾及諸衛將軍導駕及押仗舊服紫衣請依開元禮各服本色繡袍舊執仗軍士悉衣五色畫衣隨人數給之有無凖式請以五行相生之色為次黑衣先之青衣次之赤黃白又次之又大駕五輅各有副車近代寖廢請依令文增造又按明宗舊圖導駕三引而儀仗法物人數多周太極鹵簿六引而人數少請凖令文用六引其鹵簿各依本品以給從之舊清遊隊有甲騎具裝亡其制度榖以其所記造之又作大輦皆率意定其制規榖又取天文大角攝提旗及北斗旗二十八宿旗十二辰旗龍墀十三旗五方神旗五方鳯旗四瀆旗時有貢黃鸚鵡白兔及馴象自來又作金鸚鵡玉兔馴象旗太祖又詔别造