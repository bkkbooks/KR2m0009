body:
  text: 文獻通考卷三百四十五鄱陽馬端臨貴與著四裔考二十二契丹上契丹夲東國種其先為胸奴所破保鮮卑山與庫莫奚異種而同類並為慕容氏所破俱竄於松漠之間其俗頗與靺鞨同父母死而悲哭者為不壯但以尸置於山樹之上經三年之後乃收其骨而焚之因酹酒而祝曰冬月時向陽食夏月時向隂食若我射獵時使我多得豬鹿其無禮頑嚚於諸夷最盛後魏初大破之遂逃迸與庫莫奚分背經數十年稍滋蔓有部落於和龍之北數百里和龍今栁城郡多為冦盜魏太武帝真君以來嵗貢名馬於是東北羣狄錫萬丹部赫特赫部佛佛頁裕嚕部錫林部博恰部理部圖嚕部各以其名馬文皮入獻皆得交市於和龍密雲之間密雲今郡齊受魏禪入貢不絶天保四年犯塞文宣北討大破之虜十餘萬口雜畜數十萬頭其後復為突厥所逼又以萬家寄於髙麗隋開皇末有别部四千餘家背突厥來降文帝方與突厥和重失信逺人乃悉給糧令還夲部敕突厥拊納之固辭不去部落漸衆遂北逐水草畜牧有征伐則酋帥相與議之興兵動衆合如符契突厥沙鉢略可汗遣吐屯潘垤統之契丹殺吐屯而遁隋大業七年遣使貢方物唐武德中其大酋孫敖曹等遣人來朝而君長或小入冦邉後二年君長上名馬豐貂貞觀初摩歡來降突厥不欲外夷與唐合請以梁師都易契丹太宗曰契丹外夷已降我不可索師都我叛臣詎可易降者不許眀年摩歡復入朝自是有常貢二十二年契丹帥庫克率其部內屬以契丹部為松漠都督府拜庫克為持節十州諸軍事松漠都督封無極男賜姓李置都督府于營州兼置東夷都護以統松漠饒樂之地武太后萬嵗通天元年五月庫克曾孫松漠都督縻松漠都督府屬今栁城郡李盡忠與其妻兄歸誠州刺史孫萬榮殺都督趙文􅔘舉兵反陷營州今栁城自號為汗命左鷹揚將軍曺仁師右金吾將軍張元遇右武威大將軍李多祚司農少卿麻仁節等二十八將討之遇賊於西硤石黃麞谷官軍敗績元遇仁節沒於賊李盡忠死孫萬榮代領其衆攻陷冀州今信都郡刺史陸寶積死之又陷瀛州屬縣今河間郡又遣夏官尚書同鳯閣鸞臺三品王孝傑與蘇宏暉率兵十八萬與孫萬榮戰於東硤石官軍又大敗孝傑沒於陳宏暉棄甲而遁又命河內王武懿宗為大總管右肅政御史大夫婁師德為副沙吒忠義為前軍率兵二十萬以討破之萬榮為其家奴所殺其黨遂潰乃附於突厥開元初盡忠從父弟都督舍琿以摩多政衰率部落來降元宗賜丹書鐡劵五年以宗女為永樂公主出降契丹松漠王李舍琿舍琿死以其弟繅古襲封後為其酋格圖肯所殺奉繅古從父弟裕允為君詔即拜裕允襲封以宗室出女慕容氏為公主妻之裕允死弟托允嗣托允為格圖肯所逼來奔格圖肯奉其弟實古統衆詔許襲封後三年格圖肯殺實古立庫哩為王脅奚衆共降突厥詔幽州長史范陽節度使趙含章等八總管兵擊之大破其師格圖肯走眀年復冦邉幽州長史張守圭圍之格圖肯為其下所殺支黨皆散二十五年守圭討契丹再破之天寶四載契丹大酋李懷秀降拜松漠都督封崇順王以宗室出女獨孤為靜樂公主妻之是嵗殺公主叛去范陽節度使安祿山討破之更封其酋且羅為恭仁王代松漠都督祿山方幸表討契丹以向帝意發幽州雲中平盧河東兵十餘萬以奚為鄉導大戰潢水南祿山敗死者數千自是祿山與相侵掠未嘗解至其反乃已契丹在開元天寶間使朝獻者無慮二十故事以范陽節度為押奚契丹使自至德後藩鎮擅地務自安障戍斥候益謹不生事于邉奚契丹亦鮮入冦嵗選酋豪數十入長安朝會每引見賜與有秩其下率數百皆駐館幽州至德寶應時再朝獻大歷中十三貞元間三元和中七大和開成間凡四然天子惡其外附回鶻不復官爵渠長會昌二年回鶻破契丹酋齊蘇始復內附拜雲麾將軍守右武衛將軍於是幽州節度使張仲武為易回鶻所與舊印賜唐新印曰奉國契丹之印咸通中其王曰實埒再遣使者入朝部落寖又強實埒既死族人哈陶津嗣光啓時方天下盜興北疆多故乃鈔奚室韋小小部種皆役服之其居曰尼嚕古穆稜穆稜者河也是謂黃水之南黃龍之北得鮮卑之故地當唐之末其地北接室韋東鄰髙麗西界奚國而南至營州其部族之大者曰達呼哩氏後分為八部其一曰達爾扎部二曰伊斯琿部三曰舍琿部四曰諾爾威部五曰頗摩部六曰訥古濟部七曰濟勒勤部八曰實衮部部之長號大人而常推一大人建旗鼓以統八部至其嵗久或其國有災疾而畜牧衰則八部聚議以旗鼓立其次而代之被代者以為約夲如此不敢爭某部大人約尼次立時劉仁恭據有幽州數出兵摘星嶺攻之每嵗秋霜落則燒其野草契丹馬多飢死以良馬賂仁恭求市牧地請聼盟約甚謹八部之人以為約尼不任事選於其衆以安巴堅代之安巴堅亦不知其何部人也為人多智勇而善騎射是時劉守光暴虐幽涿之人多亡入契丹安巴堅乘間入塞攻陷城邑俘其人民依唐州縣置城以居之漢人教安巴堅曰中國之王無代立者由是安巴堅益以威制諸部而不肯代其立九年諸部以久不代責誚之安巴堅不得已傳其旗鼓而謂諸部曰吾立九年所得漢人多矣吾欲自為一部以治漢城可乎諸部許之漢城在炭山東南欒河上有鹽鐡之利乃後魏滑鹽縣也其地可植五榖安巴堅率漢人耕種為治城郭邑屋㕓市如幽州制度漢人安之不復思歸安巴堅知衆可用用其妻舒嚕策使人告諸部大人曰我有鹽池諸部所食然諸部知食鹽之利而不知鹽有主人可乎當來犒我諸部以為然共以牛酒會鹽池安巴堅伏兵其旁酒酣伏發盡殺諸部大人遂立不復代梁將篡唐晉王李克用使人聘於契丹約為兄弟贈金帛甚厚期共舉兵擊梁安巴堅既而背約遣使聘梁稱臣約共滅晉後唐莊宗天祐十三年契丹冦晉蔚州又攻破新州莊宗遣周德威擊之德威兵敗走幽州契丹圍之幽薊之間敵騎遍野德威拒守百餘日契丹兵敗乃解去安巴堅多用漢人漢人教以𨽻書之半增損之作文字數千以代刻木之約又制婚姻置官號乃僭稱皇帝自號天皇王以其所居橫帳地名為姓曰錫里錫里譯者謂之耶律名年曰天贊以其所居為上京起樓其間號西樓又於其東千里起東樓北三百里起北樓南木葉山起南樓往來射獵四樓之間好鬼而貴日每月朔日東向而拜日其會聚視國事皆以東向為尊四樓門屋皆東向莊宗討張文禮圍鎮州定州王處直懼鎮且亡晉兵必併擊已乃遣子郁説契丹入塞以牽晉兵郁謂安巴堅曰鎮州金帛山積姬女羅綺盈廷張文禮得之為晉所攻懼死不暇故留以待皇帝安巴堅大喜乃空國入冦攻幽州不克又攻涿州陷之遂攻中山渡沙河莊宗自將鐡騎五千乘敵散走會天大雪契丹人馬飢寒多死乃引兵去雖無所得而歸然自此頗有窺中國之意患女真渤海在其後欲擊渤海愳中國乘其虛乃遣聘使唐通好同光間使者再至莊宗崩明宗遣供奉官姚坤告哀於契丹安巴堅問坤以洛陽之變仰天大哭曰晉王與我約為兄弟河南天子即吾兒也昨聞中國亂欲以甲馬五萬往助我兒而渤海未除志願不遂又曰我兒既沒理當取我商量新天子安得自立坤曰新天子將兵二十年位至大總管所領精兵三十萬天時人事豈可得違其子托雲在側曰使者無多言蹊田奪牛豈不為過坤曰應天順人豈比匹夫之事至如天皇王得國而不代豈強取之邪安巴堅即慰勞坤曰理正當如是爾又曰吾聞此兒有宫婢二千人樂官千人放鷹走狗嗜酒好色任用不肖不惜人民此其所以敗也我自聞其禍即舉家斷酒解放鷹犬罷散樂官我亦有諸部樂官千人非公宴不用我若所為類吾兒則亦安能長久又謂坤曰吾能漢語然絶口不道于部人懼其效漢而怯弱也因戒坤曰爾當先歸吾以甲馬三萬會新天子幽鎮之間共為盟約與我幽州則不復侵汝矣安巴堅攻渤海取其扶餘一城以為東丹國以其長子人皇王托雲為東丹王已而安巴堅病死舒嚕護喪歸西樓立其次子元帥太子耀庫濟坤從至西樓而還耀庫濟後更名德光諡安巴堅為大聖皇帝德光立三年改元天顯遣使聘唐明宗厚禮之遣使報聘會定州王都反求援於契丹契丹遣塔拉扎拉將兵援都唐遣王晏球破定州擒塔拉等斬之擒其壯健者五千餘人為契丹直初安巴堅死長子東丹王托雲當立其母舒嚕愛德光德光智勇素服諸部共希旨請立德光托雲不得立長興元年自夫餘泛海奔唐明宗賜其姓為東丹更名曰慕華拜懷化軍節度使後又更姓李名贊華契丹自安巴堅時侵滅諸國稱雄北方及救王都為王晏球所敗喪其萬騎又失哈瑪爾等皆名將而舒嚕尤思念托雲由是卑辭厚幣數遣使聘中國因求歸哈瑪爾扎拉等唐輒斬其使而不報當此之時中國之威幾振距幽州北七百里有榆關東臨海北有兔耳覆舟山山皆陡絶並海東北有路狹僅通車其旁地可耕植唐時置東西狹西淥疇米礴長楊黃花紫蒙白狼等戍以扼契丹於此戍兵常自耕食惟衣絮嵗給幽州久之皆有田宅養子孫以堅守為已利自唐末幽薊戍兵廢散契丹因得出陷平營而幽薊之人歲苦冦鈔自涿州至幽州百里人迹斷絶轉餉常以兵護送契丹多伏兵鹽溝以擊奪之莊宗之末趙德鈞鎮幽州於鹽溝置良鄉縣又於幽州東五十里築城皆戍以兵及破塔拉等又於其東置三河縣由是幽薊之人始得耕牧而輸餉可通德光乃西徙橫帳居庫爾泊出冦雲朔之間明宗患之以石敬瑭鎮河東總大同彰國振武威塞等軍禦之應順清泰之間調發饋餉逺近勞敝德光侍其母甚謹常侍立其側國事必告而後行石敬瑭反唐遣張敬達等討之敬瑭遣使求救於德光稱臣以父事之約事捷之後割盧龍一道及鴈門關以北諸州與之契丹兵出鴈門車騎連亘數十里唐兵大敗遂築壇晉城南立敬瑭為皇帝敬瑭自太原入洛陽德光送至潞州先時唐廢帝遣趙德鈞并其子延夀將兵禦契丹德鈞隂遣人聘德光求立已為帝德光指穹廬前巨石謂德鈞使者曰吾已許石郎矣石爛可改也德光至潞州遂執德鈞父子而去後以延夀為幽州節度使封燕王契丹當莊宗明宗時攻陷營平二州及已立晉又得鴈門以北幽州節度管內一十六州乃以幽州為燕京改天顯十一年為會同元年更其國號大遼置百官皆依中國參用中國之人晉髙祖每遣使聘問奉表稱臣嵗輸絹三十萬匹其餘寶玉珍異下至中國飲食諸物使者相屬於道無虛日德光約髙祖不稱臣更表為書稱兒皇帝如家人禮德光遣中書令韓頻奉册髙祖為英武明義皇帝髙祖復遣趙瑩馮道等以太常鹵簿奉册德光及其母尊號終其世奉之甚謹髙祖崩出帝即位德光怒其不先以告而又不上表不稱臣而稱孫數遣使者責晉晉大臣皆恐而景延廣對契丹使者語獨不遜德光益怒楊光逺反青州招之開運元年春德光傾國南冦分其衆為三西出鴈門攻并代劉知逺擊敗之於秀容東至于河陷博州以應光逺德光與延夀南攻陷貝州德光屯元城兵及黎陽晉出帝親征遣李守貞等東馳馬家渡擊敗契丹而德光與晉相距於河月餘聞馬家渡兵敗乃引衆擊晉戰於戚城德光臨陳望見晉軍旗幟光明而士馬嚴整有懼色謂其左右曰楊光逺言晉家兵馬半已餓死何其盛也兵既交殺傷相半陳間斷箭遺鏃布厚寸餘日暮德光引去分其兵為二一出滄州一出深州以歸二年正月德光復傾國入冦圍鎮州分兵攻下鼓城等九縣杜重威守鎮州閉壁不敢出契丹南掠邢洺磁至於安陽河千里之內焚剽始盡契丹見大桑木罵曰吾知紫披襖出自汝身吾豈容汝活邪束薪於木而焚之是時出帝病不能出征遣張從恩安審琦皇甫遇等禦之遇前渡漳水遇契丹戰於榆林幾為所虜審琦從後救之契丹望見塵起謂救兵至引去而從恩畏怯不敢追亦引兵南走黎陽契丹已北而出帝疾少間乃下詔親征軍於澶州遣杜重威等北征契丹歸至虎北聞晉軍且至即復引而南及重威戰於陽城衛村晉軍飢渴鑿井輒壞絞泥汁而飲德光坐奚車中呼其衆曰晉軍盡在此矣可生擒之然後平定天下會天大風晉軍奮死擊之契丹大敗德光喪車騎一白橐駝而走至幽州其首領大將各笞數百獨趙延夀免焉是時天下旱蝗晉人苦兵乃遣開封府軍將張暉假供奉官聘於契丹奉表稱臣以修和好德光語不遜然契丹亦自厭兵德光母舒嚕嘗謂晉人曰南朝漢兒爭得一向卧邪自古聞漢來和蕃不聞蕃去和漢若漢兒實有回心則我亦何惜通好晉亦不復遣使然數以書招趙延夀延夀見晉衰而天下亂嘗有意窺中國而德光亦嘗許延夀滅晉而立之延夀得晉書偽為好辭報晉言身陷敵思歸約晉發兵為應而德光將髙牟翰亦詐以瀛州降晉晉君臣皆喜三年七月遣杜重威李守貞張彥澤等出兵為延夀應兵趨瀛州牟翰空城而去晉軍至城下見城門皆啓疑有伏兵不敢入遣梁漢璋追牟翰及之漢璋戰死重威等軍屯武強德光聞晉出兵乃入冦鎮州重威西屯中渡與德光夾水而軍德光分兵並西山出晉軍後攻破欒城縣縣有騎軍千人皆降於敵德光每獲晉人刺其面文曰奉敕不殺縱以南歸重威等被圍糧絶遂舉軍降德光喜謂趙延夀曰所得漢兒皆與爾因以龍鳯赭袍賜之使衣以撫晉軍亦以赭袍賜重威遣富珠哩監張彥澤將騎二千先入京師晉出帝與太后為降表自陳過咎德光遣嘉哩以手詔賜帝曰孫兒但勿憂管取一喫飯處德光將至京師有司請以法駕奉迎德光曰吾躬擐甲胄以定中原太常之儀不暇顧也止而不用出帝與太后出郊奉迎德光辭不見曰豈有兩天子相見於道路邪四年正月丁亥朔旦晉文武百官班於都城北望帝拜辭素服紗帽以待德光被甲衣貂帽立馬於髙岡百官俯伏待罪德光入自封邱門登城樓遣通事宣言諭曰我亦人也可無懼我夲無心至此漢兵引我來爾遂入晉宫宫中嬪妓迎謁皆不顧夕出宿於赤岡封出帝負義侯遷於黃龍府癸巳入居晉宫以契丹守諸門門廡殿廷皆磔犬挂皮以為厭勝甲午德光胡服視朝於廣政殿乙未被中國冠服百官常參起居如晉儀而氈裘左袵胡馬奚車羅列階陛晉人俯首不敢仰視二月丁丑朔金吾六軍殿中省仗太常樂舞陳於廷德光冠通天冠服絳紗袍執大圭以視朝大赦改晉國為大遼國開運四年為會同十年德光嘗許趙延夀滅晉而立以為帝故契丹擊晉延夀常為先鋒虜掠所得悉以奉德光及其母舒嚕德光已滅晉而無立延夀意以為中京留守大丞相燕王如故三月丙戌朔德光服靴袍御崇元殿百官入閣德光大悅顧左右曰漢家儀物盛如此我得於此殿坐豈非真天子邪德光已滅晉遣其部族酋豪及其通事為諸州鎮刺史節度使括借天下錢帛以賞軍胡兵人馬不給糧草遣數千騎分出四野劫掠人民號為打草榖東西二三千里之間民被其毒逺近怨嗟漢髙祖起太原所在州鎮多殺契丹守將歸漢德光大懼又時已熱乃以蕭翰為宣武軍節度使翰契丹之大族其號阿巴翰之妹亦嫁德光而阿巴夲無姓氏契丹呼翰為國舅及將以為節度使李嵩為制姓名曰蕭翰於是始姓蕭德光已留翰守汴乃北歸以晉內諸司伎術宫女諸軍將卒數千人從自黎陽渡河行至湯隂登愁死岡謂其宣徽使髙勳曰我在上國以打圍食肉為樂自入中國心常不快若得復吾夲土死亦無恨勳退而謂人曰是將死矣相州梁暉殺契丹守將閉城距守德光引兵破之城中男子無少長皆屠之婦女悉驅以北後漢以王繼宏鎮相州得髑髏十數萬枚為大塜葬之德光至臨洺見其井邑荒殘笑謂晉人曰致中國至此皆燕王為罪首又顧張礪曰爾亦有力焉德光行至欒城得疾卒於殺胡林契丹破其腹去其腸胃實之以鹽載而北晉人謂之帝豝永康王烏雲立諡德光為嗣聖皇帝號安巴堅為太祖德光為太宗烏雲東丹王托雲子也托雲奔唐烏雲留不從號永康王性殘忍然喜賔客好飲酒工畫知書契丹兵助晉攻唐唐廢帝殺托雲晉髙祖入京師追封托雲為燕王德光滅晉烏雲從至京師德光死欒城烏雲與趙延夀及諸大將等俱入鎮州延夀自稱權知軍國事遣人求鎮州管籥於烏雲烏雲不與延夀左右曰契丹大人聚而謀者訩訩必有變宜備之今中國兵猶萬人可以擊敵不然事必不成延夀猶豫不決烏雲召延夀飲酒誘而鎖之籍其家乃宣德光遺制曰可於中京即皇帝位中京契丹謂鎮州也遣使告哀於諸鎮蕭翰聞德光死棄汴州而北烏雲已立先遣人報其祖母舒嚕舒嚕怒曰我兒平晉取天下有功業其子在我側者當立人皇王背我歸中國其子豈得立邪乃率兵逆烏雲將廢之烏雲留其將滿達守鎮州晉諸將相隨德光在鎮州者皆留之而去與其祖母舒嚕相拒於石橋舒嚕所將兵多亡歸烏雲烏雲乃幽舒嚕于祖州祖州安巴堅墓所也初德光之擊晉也舒嚕常非之曰吾國用一漢人為主可乎德光曰不可也舒嚕曰然則汝得中國不能有後必有禍悔無及矣德光死載其尸歸舒嚕不哭而撫其尸曰待我國中人畜如故然後葬汝已而烏雲囚之後死于木葉山烏雲更名阮號天授皇帝改元曰天祿是嵗八月葬德光于木葉山遣至鎮州召馮道和凝等會葬使者至鎮州鎮州軍亂大將白再榮等逐出滿達據定州已而悉其衆以北滿達者德光之從弟也德光滅晉以為邢州節度使烏雲立命守鎮州滿達尤酷虐多略中國人剝面抉目拔髮斷腕而殺之出入常以鉗鑿挑割之具自隨寢處前後挂人肝脛手足言笑自若鎮定之人不勝其毒滿達已去馮道等乃南歸漢乾祐元年烏雲率萬騎攻邢州陷內邱契丹入寇常以馬嘶為候其來也馬不嘶鳴而矛戟夜有光又月食敵衆皆懼以為凶雖破內邱而人馬傷死者大半烏雲立五年會諸部酋長復謀入冦諸部大人皆不欲烏雲強之燕王舍音與太寧王額哩森等率兵殺烏雲於火神淀德光子齊王舒嚕聞亂走南山契丹擊殺舍音額哩森而迎舒嚕以立舒嚕立改元應歷號天順皇帝後更名璟舒嚕有疾不能近婦人左右給事多以宦者然畋獵好飲酒不恤國事每酣飲自夜至旦晝則常睡國人謂之睡王初烏雲常遣使聘漢使者至中國而周太祖入立太祖後遣將軍朱憲報聘憲還而烏雲死舒嚕立遂不復南冦顯德六年夏世宗北伐以保大軍節度使田景咸為淤口關部署右神武統軍李洪信為合流口部署前鳯翔節度使王晏為益津關部署侍衛親軍馬步都虞候韓通為陸路都部署世宗自乾寧軍御龍舟艛船戰艦首尾數十里至益津關降其守將而河路漸狹舟不能進乃捨舟陸行瓦橋淤口關瀛莫州守將皆迎降方下令進攻幽州世宗遇病乃置雄州於瓦橋關霸州於益津關而還周師下三關瀛莫兵不血刃舒嚕聞之謂其國人曰此夲漢地今已還漢又何惜邪歐陽氏五代史記論曰初蕭翰聞德光死北歸有同州郃陽縣令胡嶠為翰掌書記隨入契丹而翰妻爭妬告翰謀反翰見殺嶠無所依居契丹七年當廣順三年亡歸中國略能道其所見云自幽州西北入居庸關明日又西北入石關關路崖狹一夫可以當百此中國控扼契丹之險也又三日至可汗南望五臺山其一峰最髙者東臺也又三日至新武西北行五十里有雞鳴山云唐太宗北伐聞雞鳴於此因以名山眀日入永定關北此唐故關也又四日至歸化州又三日登天嶺嶺東西連亘有路北下四顧冥然黃雲白草不可窮極契丹謂嶠曰此辭鄉嶺也可一南望而為永訣同行者皆慟哭往往絶而復蘇又行三四日至黑榆林時七月寒如深冬又眀日入斜谷谷長五十里髙崖峻谷仰不見日而寒尤甚已出谷得平地氣稍溫又行二日渡湟水又明日渡黑水又二日至湯城淀地氣最溫契丹若大寒則就溫於此其水泉清冷草軟如茸可藉以寢而多異花記其二種一曰旱金大如掌金色爍人一曰青囊如中國金燈而色類藍可愛又二日至儀坤州渡麝香河自幽州至此無里候其向不知為南北又二日至赤崖翰與烏雲相及遂及舒嚕戰於沙河舒嚕兵敗而北烏雲追至獨樹渡遂囚舒嚕於撲馬山又行三日遂至上京所謂西樓也西樓有邑屋市肆交易無錢而用布有綾錦諸工作官者翰林伎術教坊角抵秀才僧尼道士等皆中國人而并汾幽薊之人尤多自上京東去四十里至真珠寨始食菜明日東行地勢漸髙西望平地松林鬱然數十里遂入平川多草木始食西瓜云契丹破回紇得此種以牛糞覆棚而種大如中國東瓜而味甘又東行至裊潭始有栁而水草豐美有息雞草尤美而夲大馬食不過十夲而飽自裊潭入大山行十餘日而出過一大林長二三里皆蕪荑枝葉有芒刺如箭羽其地皆無草烏雲時卓帳於此會部人葬德光自此西南行日六十里行七日至大山門兩髙山相去一里有長松豐草珍禽野卉有屋宇碑石曰陵所也烏雲入祭諸部大人惟執祭器者得入入而門闔明日開門曰拋盞禮畢問其禮皆祕不肯言嶠所目見囚舒嚕葬德光等事與中國所記差異已而翰得罪被鎖嶠與部曲東之福州翰所治也嶠等東行過一山名十三山云此西南去幽州二千里又東行數日過衛州有居人三千餘家蓋契丹所虜中國衛州人築城而居之嶠至福州而契丹多憐嶠教其逃歸嶠因得其諸國種類逺近云距契丹國東至於海有鐡甸其族野居皮帳而人剛勇其地少草木水鹹濁色如血澄之久而後可飲又東女真善射多牛鹿野狗其人無定居行以牛負物遇雨則張革為屋常作鹿鳴呼鹿而射之食其生肉能釀糜為酒醉則縛之而睡醒而後解不然則殺人又東渤海又東遼國皆與契丹略同其南海曲有魚鹽之利又南奚與契丹略同而人好殺戮又南至榆關矣西南至儒州皆故漢地西則突厥回紇西北至裕庫哷其人長髦頭酋長全其髮盛以紫囊地嚴寒水出大魚契丹仰食又多黑白黃貂鼠皮北方諸國皆仰之其人最勇鄰國不敢侵又其西哈噶斯又其北單于突厥皆與裕庫哷略同又北黑車子善作車帳其人知孝義地貧無所産云契丹之先常役回紇後背之走黑車子始學作車帳又北牛蹄突厥人身牛足其地尤寒水曰瓠􅕧河夏秋氷厚二尺春冬氷徹底常燒器銷氷乃得飲東北至襪劫子其人髦首被皮為衣不鞍而騎大弓長箭尤善射遇人輒殺而生食其肉契丹等國皆畏之契丹五騎遇一襪劫子則皆散走其國三面皆室韋一曰室韋二曰黃頭室韋三曰獸室韋其地多銅鐡金銀其工巧銅鐡諸器皆精好善織毛錦地尤寒馬溺至地成氷堆又北狗國人身狗首長毛不衣手搏猛獸語為犬嘷其妻皆人能漢語生男為狗女為人自相婚嫁穴居食生而妻女人食云嘗有中國人至其國其妻憐之使逃歸與其筯十餘隻教其每走十餘里遺一筯狗夫追之見其家物必􅋦而歸則不能追矣其説如此又曰契丹嘗選百里馬二十匹遣十人齎乾北行窮其所見其人自黑車子歷牛蹄國北行一年經四十三城居人多以木皮為屋其語言無譯者不知其國地山川部族名號其地氣遇平地則溫和山林則寒冽至三十三城得一人能鐡甸語其言頗可解云地名頡利鳥于邪堰云自此以北龍蛇猛獸魑魅羣行不可往矣其人乃還此北荒之極也契丹謂嶠曰吾國之人豈能勝中國然晉所以敗者主暗而臣不忠因具道諸國事曰子歸悉以語漢人使漢人努力事其主無為吾國所虜吾國非人境也嶠歸以為陷敵記云文獻通考卷三百四十五
