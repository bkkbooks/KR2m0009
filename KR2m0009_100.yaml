body:
  text: 文獻通考卷一百鄱陽馬端臨貴與著宗廟考十祫禘春秋文公二年八月丁卯大事於太廟公羊傳曰大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳於太祖未毁廟之主皆升合食於太祖榖梁傳同按楊氏曰愚此謂大合毁廟與未毁廟之主於太祖之廟而祭之也右大祫朱子周大祫圖祫祭於祖則祝迎四廟之主疏曰祫合祭祖太祖當祫之時則祝迎髙曽祖禰四廟而於太祖廟祭之天子祫祭則迎六廟之主今言迎四廟者舉諸侯言也主出廟入廟必蹕蹕止行也往疏曰主謂木主羣廟之主也出廟者謂出巳廟而太祖廟入廟謂從太祖廟而反還入巳廟若在廟院之外當主出入之時必須蹕止行人曽子問天子犆礿祫禘祫嘗祫蒸犆音特春春一礿而已不祫以物無成者不殷祭盧植曰特餘時祫程子曰祫合祭也諸侯亦祭祫只是祠禴嘗蒸之祭為廟禮煩故每年於四祭之中三祭祫食於祖廟惟春則祭諸廟也楊氏曰程子之言正解釋此章之義其曰祫合祭也只是禴祠嘗蒸之祭為廟禮煩故每年於四祭之中三祭合食於祖廟惟春則祭諸廟此説推明時祫之本意最為明白又曰諸侯亦祭祫則通下章諸侯祫亦概可見矣諸侯礿犆互明犆礿文禘一犆一祫嘗祫蒸祫王制子橫渠張子曰天七廟一日而行則力不給故禮有一犆一祫之説特則祭一祫則遍祭如春祭高祖夏祫羣廟秋祭曾冬又祫來春祭祖夏又祫秋祭禰冬又祫楊氏曰張子謂禮有一特一祫之説正解釋此章但本章言礿嘗蒸三祭皆祫惟禘一特一祫禮文殘缺指不分明故張子不從其言又别為之説曰春祭高祖夏祫羣廟秋祭曾冬又祫來春祭祖夏又祫秋祭禰冬又祫雖一犆一祫之説若可通但言特只祭一廟而遺其餘廟恐於人情亦有所不安不若前章程子之言簡而意備也又春祠夏禴秋嘗冬蒸周時祭名詩所謂禴祠蒸嘗於公先王是也此云礿禘嘗蒸乃記禮者之誤也詳見四時祭篇乃又按時祫即四時禴祠蒸嘗之祭為特祭羣廟禮煩合高曾祖禰之主於太祖之廟並祭之故曰時祫朱子曰昭穆之不為尊卑説已見前其大祫則始封以下以次相承亦無差舛故張璪以為四時常祀各於其廟不偶坐而相臨故武王進居王季之位而不嫌尊於文王及合食乎祖則王季文王更為昭穆不可謂無尊卑之序者是也但四時之祫不兼毁廟之主則右無昭而穆獨為尊若兩世室之主則文常為穆而武常為昭也故陸佃以為毁廟之主有不皆祫之時難之而未見璪之所以對也豫竊以為以上世之次推之一昭一穆固有定次而其自相為偶亦不可易但其散居本廟各自為主而不相厭則武王進居王季之位而不嫌尊於文王及其合食於祖則王季雖遷而武王自當與成王為偶未可以遽進而居王季之處也文王之為穆亦虛其所向之位而已則雖北向而何害其為尊哉作此圖以見之問朱子祫祭考妣之位如何答曰太祖東向則昭穆之南北向者當以西方為上則昭之位次高祖西而妣東祖西而妣東是祖母與孫並列於體為順若余正父之説則髙祖東而妣西祖東而妣西則是祖與孫婦並列於體為不順彼蓋據漢儀中有高祖南向吕后少西更不取證於經文而獨取傳注中之一二執以為是斷不可回耳楊氏曰愚聞之師曰祫祭有二曽子問曰祫祭於祖則祝迎四廟之主王制云天子祫嘗祫蒸諸侯嘗祫蒸祫此時祭之祫也公羊傳曰毁廟之主陳於太祖未毁廟之主皆升合食於太祖此大祫毁廟未毁廟之主而祭之也祫祭惟有此二條此外無餘禮矣漢儒之論又混禘祫而并言之何其紛紛多端也馬融謂歲祫及壇墠禘及郊宗石室鄭元謂祫則毁主未毁主合祭於太祖禘則惟太王王季以上遷主祭於后稷之廟文武以下若穆之遷主則祭於文王之廟昭之遷主則祭於武王之廟何休謂祫祭不及功臣禘則功臣皆祭及論禘祫之歲月則皆援公羊五年再殷祭之説為據按祫祭年月經無其文惟公羊文二年大事於太廟傳云大事者何大祫也五年而再殷祭夫殷祭乃大祫之祭也五年而再殷祭謂三年一祫五年再祫猶天道三歲一閏五歲再閏也於禘祭乎何與漢儒乃援此以證禘祫相因之説為鄭康成之説則曰三年而祫五年而禘為徐邈之説則曰相去各三十月三十月而祫三十月而禘唐自睿宗以後三年一祫各自計年不相通數然至二十七年凡五禘七祫其年夏禘訖冬又當祫而禘祫同嵗太常議曰今太廟禘祫各自數年兩岐俱下通計或比年頻合或同嵗再序或一禘之後併為再祫或五年之內驟有三殷求於禮經頗為乖失國朝宗廟之祭三年一祫以孟冬五年一禘以孟夏蓋用鄭康成之説其後有司又言三年喪畢遇祫則祫遇禘則禘二説抵牾不可稽考慶歷初乃用徐邈之説每三十月而一禘後又以二祭各不相因故熙寧八年既禘又祫竟無一定之論推原其所以然皆由混禘於祫而皆以為合食於太祖也夫既混禘於祫皆以為合食於太祖則禘祫無辨矣而又欲勉強穿鑿分别其所以不同此所以紛紛多端而莫之一也知禘者禘其祖之所自出不兼羣廟之主而惟以其祖配之則禘與祫異不容混矣知大祫兼羣廟之主則自太祖而下毁廟未毁廟之主皆合食於太祖矣又何壇墠與郊宗石室之分乎又何大王王季合食於后稷文武以下分昭穆各祭於文武二祧之分乎祫蒸則功臣皆祭即司勳所謂祭於大蒸是也誰謂祫祭功臣不與饗乎知禘祫之不同則鄭康成徐邈之説皆非矣其間相因不相因之説皆無謂矣又何同異得失之足論乎司尊彛凡四時之間祀追饗朝饗祼用虎彞蜼彞皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也蜼音誄大音泰故鄭司農云追饗朝饗謂禘祫也在四時之間曰間祀大樽太古之瓦樽山樽山罍也明堂位曰泰有虞氏之樽也山罍夏后氏之樽元謂追饗祭遷廟之主以事有所請禱朝饗謂朝受政於廟春秋傳曰閏月不告朔猶朝於廟蜼禺屬卭鼻而長尾山罍亦刻而畫之為山雲之形禺音遇劉音隅卭魚丈反又五剛反是疏曰大樽太古之瓦樽者此即有虞氏之大尊於義也故皆以明堂位為證也云蜼禺屬卭鼻而長尾者案雞彞鳥彞相配皆為鳥則虎彞蜼彞相配皆為獸故爾雅注云蜼似獮猴而大黃黑色尾長數尺似獺尾末有岐鼻露向上雨即自懸於樹以尾塞鼻或以兩指今江東人亦取養之為物捷健其虎彞蜼彞當是有虞氏之尊故鄭注尚書云宗彞宗廟之中鬱尊虞氏所用春官黃氏曰先鄭曰追饗朝饗禘祫也在四時之間故曰間祀其説是趙伯循春秋纂例曰大傳王者禘其祖之所自出而以其祖配之蓋帝王立始祖之廟猶謂未盡追逺之義故又推始祖所出之帝而追祀之以其祖配之者謂於始祖廟祭之而便以始祖配不兼羣廟之主謂其尊逺不敢褻也公羊傳曰大事祫也毁廟之主皆陳於太祖未毁廟之主皆升合食於太祖故謂之大事也然則禘追祭其所自出故為追饗祫羣主皆朝於太祖而合食故為朝饗記曰喪之朝也順死者之孝心也此朝之義後鄭亦曰追饗追祭遷廟之主而曰有所請禱非常禮也又曰朝饗月朔朝廟於義通然月月行之何以謂之間祀禮運疏云祫祭之法既備五齊三酒以實八樽祫祭在秋案司樽彞秋嘗冬蒸朝獻用兩著樽饋獻用兩壺樽則泛齊醴齊各以著樽盛之盎齊醍齊沈齊各以壺樽盛之凡五樽也又五齊各有明水之樽凡十樽也三酒三樽各加元酒凡六樽也通斚彞盛明水黃彞盛鬱鬯凡十有八樽故崔氏云大祫祭凡十八樽其明水元酒陳之各在五齊三酒之上楊氏曰愚按禮運疏云司樽彞樽皆云兩若禘祫之祭其齊既多不得惟兩而已蓋五齊各加明水當用十樽今云用兩大樽兩山尊此疏之所以疑也然司樽彞疏已云禘祫則用當時樽重用取足而已則未嘗以兩為拘也所謂重用取足者泛齊醴齊各以大樽盛之盎齊醍齊各以山樽盛之是五齊各用五樽也五齊各加明水合之而為十樽大祫九獻圖若時祫則所用彞樽與春祠夏禴秋嘗冬蒸九獻兩圖同禮運疏崔氏云周禮大祫於太廟則備五齊三酒朝踐王酌泛齊后酌醴齊饋食王酌盎齊后酌醍齊朝獻王酌泛齊因朝踐之樽再獻后酌醍齊因饋食之樽諸侯為賔則酌沈齊尸酢王與后皆還用所獻之齊賔長酳尸酢用清酒加爵亦用三酒二彞虎彞盛明水蜼彞盛鬱鬯五齊太樽盛泛齊太樽盛醴齊山樽盛盎齊山樽盛緹齊山樽盛沈齊祼王一獻祼用蜼彞后二獻祼用蜼彞朝踐王三獻用太樽泛齊后四獻用太樽醴齊饋獻王五獻用山樽盎齊后六獻用山樽緹齊朝獻王七獻用朝踐太樽泛齊再獻后八獻用饋獻山樽緹齊賓九獻用山樽沈齊天府凡國之玉鎮大寶器藏焉若有大祭則出而陳之既事藏之鎮珍忍反又音珍之玉鎮大寶器玉瑞玉器之美者禘祫陳以華國也春官大饗其王事與與音餘其盛其饌與貢謂祫祭先王也疏曰盛饌者即三牲魚臘籩豆是貢者則內金示和龜為前列之屬是也謂祫祭先王者以有三牲魚臘則非祭天以內金布庭實又非饗賔饗賔時無此庭實故也知非朝而貢物者以朝而貢物不名大饗孝經云四海之內各以其職來助祭故知大饗是祫祭也以饗中最大故稱大饗三牲魚臘四海九州之美味也籩豆之薦四時之和氣也臘音昔所此饌諸侯獻內金示和也內音納此所貢也內之庭實先設之金從革性和荆揚二州貢金三品疏曰知為庭實者左傳云庭實旅百奉之以玉帛故知金為庭實先云內金故知先設金禹貢注三品者金銀銅三色也束帛加璧尊德也貢饗所執致命者君子於玉比德焉云疏曰知束帛加璧行饗之時所執致命者覲禮文也君子於玉比德者謂諸侯執玉來貢欲自朂勵以玉比德又示敬王以玉比王龜為前列先知也龜知事情者陳於庭在前荆州納錫大龜物疏曰龜能豫知吉凶故云知事情所陳衆龜最在前金次之見情也見賢遍反物金照物金有兩義先入後設二照音照金照者解經見情兩義者一示和見情先入後設者此經先云內金示和是先入陳在龜後是後設丹漆絲纊竹箭與衆共財也纊音曠纊萬民皆有此物荆州貢丹兖州貢漆絲豫州貢揚州貢篠簜簜大黨反疏曰此皆見於禹貢文也其餘無常貨各以其國之所有則致逺物也其餘謂九州夷服鎮服蕃服之國周禮九州之外謂之蕃國世一見各以其所貴寶為摯其出也肆夏而送之蓋重禮也出謂諸侯之賔也禮畢而出作樂以節之肆夏當為陔夏疏曰大饗諸侯則諸侯出入奏肆夏此經是助祭之後禮畢客醉而後出宜奏陔夏故燕禮大射賔出奏陔夏明不失禮也器禮大饗之禮尚元酒而爼腥魚大羮不和有遺味者矣大饗祫祭先王以腥魚為爼實不臑熟之大羮肉湆不調以鹽菜臑音而湆去及反疏曰此皆質素之食而大饗設之人所不欲也然以其有德質素其味可重人愛之不忘故云有遺味者矣樂記大戴禮曰大饗尚元樽爼生魚先大羮貴飲食之本也大饗尚元樽而用酒食先黍稷而飯稻粱祭齊大羮而飽乎庶羞貴本而親用也大司樂凡樂黃鍾為宫大吕為角太簇為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣大音泰蔟七豆反徵張里反九㲈依字九音大㲈上昭反黃鍾生於虛危之氣虛危為宗廟九德之歌春秋傳所謂六府三事謂之九功九功之德皆可歌也隂竹生於山北者龍門山名九㲈讀當為大韶字之誤無疏曰宗廟不言時節者天地自相對而言至此宗廟所對謂祫祭也又分樂已見四時祭禮楊氏曰大司樂圜鍾為宫之樂冬日至於地上之圜丘奏之與上文乃奏黃鍾歌大吕舞雲門以祀天神者不同則知圜鍾為宫之樂非冬日至祀皥天上帝則不得用矣函鍾為宫之樂夏日至於澤中之方丘奏之與上文以祭地示以祀四望以祭山川者不同則函鍾為宫之樂非夏至祭后土地祗不得用也以此推之黃鍾為宫之樂於宗廟之中奏之與上文以享先妣以享先祖者不同則知於宗廟之中奏之者謂大祫也故疏家引公羊大事於太廟大事者何大祫也其説為有據矣宗廟禮禘祫為大祭禘祀亦當用此樂也思文天作清廟執競維清武雍右祫祭禮物樂舞按楊氏祭禮以思文以下六詩為祫祭之樂歌蓋本通典之説然以序考之惟天作祀先王公近於祫祭而其他詩則皆非也蓋朱文公之釋詩皆廢序而自為之説故其門人宗之然祫者合祭太祖以下所該甚廣則其詩之所贊頌者亦不當專指一人如天作如執競如武如雍贊頌者廣則祫祭之時歌之可也至於思文專言后稷清廟維清專言文王施之祫祭則不類矣恐當以序説為正前期十日並見四時祭禮祭之前日小史大祭祀讀禮法史以書敘昭穆之俎簋讀禮法者大史與羣執事此史小史也昭疏曰大祭祀謂祭宗廟三年一祫之時有尸主兼序穆也大史讀禮法之時小史則敘昭穆俎簋當依禮法之節校比之使不差錯餘並見四時祭禮祭之日酒正共五齊三酒以實八樽説見祫祭九獻圖餘並見四時祭禮九獻祼祼用虎彞蜼彞皆有舟餘並見四時祭禮樂禮運疏云尸入室乃作降神故大司樂云凡樂黃鍾為宫九變而致人鬼是也乃灌故書云王入太室祼當祼之時衆尸皆同在太廟中依次而灌所灌鬱鬯小宰注云尸祭之啐之奠之是為一獻也王乃出迎牲后從灌二獻也朝踐朝事之籩其實麷蕡白黑形鹽膴鮑魚鱐朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茆菹麇臡麷芳弓反蕡符文反鱐所求反臡乃兮反菁作寧反又音精茆音卯麇京倫反詳見祭物魯祭周公何以為牲周公用白牡白牡殷牲也周公死有王禮謙不敢與文武同也不以夏黑牡者嫌改周之文王于况反魯公用騂犅騂息營反犅音㓻公騂犅赤脊周牲也魯以諸侯不嫌故從周制以脊為差羣公不毛不毛不純色所以降於尊祖春秋文公十三年公羊傳其朝踐用兩大樽司樽彞迎餘並見四時祭禮禮禮運疏云牲而入至於庭故器云納牲詔於庭王親執鸞刀啓其毛而祝以血毛告於室故禮器云血毛詔於室凡牲則廟各别牢故公羊傳云周公白牡魯公騂犅案逸禮云毁廟之主昭共一牢穆共一牢於是行朝踐之事尸出於室太祖之尸坐於户西南面其主在右昭在東穆在西相對坐主各在其右故鄭注祭統云天子諸侯之禮朝事延尸於户外是以有北面事尸之禮祝乃取牲膟膋燎於爐炭入以詔神於室又出以薦於主前郊特牲云詔祝於室坐尸於堂是也王乃洗肝於鬱鬯而燔之以制於主前所謂制祭次乃升牲首於室中置於北牖下后薦朝事之豆籩乃薦腥於尸主之前謂之朝踐即禮運薦其血毛腥其俎是也王乃以玉爵酌太樽泛齊以獻尸三獻也后又以玉爵酌太樽醴齊以亞獻四獻也與禮器周旅酬六尸疏曰大祫多主而唯云尸者先儒王肅並云毁廟無尸但有主也饋獻饋食之籩其實棗栗桃乾䕩榛實饋食之豆其實葵菹螺醢脾析蠯醢蜃蚳醢豚拍魚醢栗古栗字䕩音老榛側巾反螺力禾反蠯蒲佳反蜃市軫反拍音摶詳見祭物魯祭周公何以為盛周公盛魯公燾羣公廪盛音成粢盛也在器曰盛也盛者新榖燾者冒也故上以新廩者連新於陳上財令半相連耳此謂方祫祭之時序昭穆之差疏曰若其時祭粢盛精鑿羣公之饌一何至此故知正是祫祭之時序昭穆之差降於尊祖故也獻春秋文公十三年公羊傳饋獻之樽見前祫祭九圖之餘並見四時祭禮云禮運疏云乃退而合亨至薦熟時陳於堂故禮器設饌於堂乃後延尸入室太祖東面昭在南面穆在北面徙堂上之饌於室內坐前祝以斚爵酌奠於饌南故郊特牲注云天子奠斚諸侯奠角即此之謂也既奠之後又取腸間脂焫蕭合馨薌郊特牲注云奠謂薦熟時當此大合樂也自此以前謂之接祭乃迎尸入室舉此奠斚主人拜以妥尸故郊特牲云舉斚角拜妥尸是也后薦饋獻豆籩王乃以玉爵酌山樽盎齊以獻尸為五獻也后又以玉爵酌山樽緹齊以獻尸是六獻也朝獻朝獻因朝踐之樽見前圖飯餘並見四時祭禮踐禮運疏云於是尸食十五訖王以玉爵因朝之樽泛齊以酳尸為七獻也故鄭云變朝踐云朝獻樽相因也朝獻謂此王酳尸因朝踐之樽也后乃薦加豆籩尸酌酢主人主人受嘏王所以獻諸侯再獻其再獻用兩山樽司樽彞加籩之實菱芡栗脯菱芡栗脯加豆之實芹菹兔醢深蒲醓醢菭菹鴈醢筍菹魚醢菱音陵芡音儉芹音勤菭音台詳見祭物皆有罍諸臣之所昨也昨讀為酢聲之誤也與疏曰尸酢賔長即用罍樽三酒中清酒以自酢不敢王之神靈共酒樽餘並見四時祭物八禮運疏云於是后以瑶爵因酌山樽醍齊以酳尸為獻也鄭注司樽彞云變饋獻為再獻者亦樽相因也再獻後酳尸獻謂饋食時后之獻也於時王可以瑶爵獻卿也諸侯為賔者以瑶爵酌山樽沈齊以獻尸為九獻九獻之後謂之加爵案特牲有三加則天子以下加爵之數依尊卑不止三加也故特牲三加爵别有嗣子舉奠文王世子諸侯謂之上嗣舉奠亦當然崔氏以為后獻皆用瑶爵又以九獻之外加爵用璧角璧散今案內宰云后祼獻則贊瑶爵亦如之鄭注云瑶爵謂尸卒食王既酳尸后亦獻之始用瑶爵則后未酳尸以前不用也又鄭注司樽彞云王酳尸用玉爵而再獻者用璧角璧散可知此璧角璧散則瑶爵也崔氏乃云正獻之外諸臣加爵用璧角璧散其義非也周旅酬六尸使之相酌也后稷之尸祭爵不受旅在疏曰謂祫祭時聚羣廟之主於太祖后稷廟中后稷室西壁東向為祭爵之主尊不與子孫為酬酢餘自文武二尸就親廟尸凡六在后稷之東相對為昭穆更相次序以酬也大祫多主而唯云六尸者先儒與王肅並云毁廟無尸但有主也曾子曰周禮其猶醵與醵其庶反又其約反合錢飲酒為醵旅酬相酌似之也王居明堂之禮中秋乃命國醵禮器通典將祫祭前期十日之前夕肆師告其太宰太宗太史帥執事而卜日既卜司𨽻𨽻僕修除糞灑其廟將祭前夕於太廟南門之外展牲庖人告牷太宰視滌濯祭器掌次於廟門外之東設主人及公卿以下次幕其尸次兼設幄掌次云凡祭祀張其旅幕張尸次鄭元云旅衆也公卿以下即位所祭祀之門外以待事為之張大幕尸則有幄鄭司農注云尸次尸所居更衣帳次百司所供之物皆至廟門外司徒奉牛牲司馬奉羊牲司空奉豕牲每廟各一牢案公羊云周公白牡魯公騂犅羣公不毛是各牲也司烜氏以夫燧取明火於日以照饌以鑑取明水於月以加五齊欲得隂陽之潔氣也加謂於上陳之籩人陳四籩之實謂朝事之籩饋食之籩加籩之實羞籩之實名物各具前九獻條下醢人掌四豆之實謂朝事之豆饋食之豆加豆之實羞豆之實名物見前九獻條下醯人共五齏七菹醯醬等鹽人共苦鹽顆鹽散鹽今海鹽也小史敘昭穆之俎簋酒正共五齊三酒以實八樽司樽彞共斚彞黃彞司樽彞云秋嘗冬蒸祼用斚彞黃彞鄭元云斚彞畫禾稼黃彞黃目樽也謂以黃金為目設於樽上以祫在秋故用冪人共畫布巾以冪之烹人共鼎鑊及大羮鉶羮鑊所以煮肉及魚臘之器既熟乃升於鼎舍人共簠簋甸師氏共齍盛及蕭茅蕭茅則納於鄉師鄉師得而束之長五寸切之以藉祭凡后所陳薦玉齍玉敦音對等物皆九嬪共之獻尸之瑤爵等內宰共之天府陳國之玉鎮大寶器陳於東西序即尚書顧命者是也九服內諸侯及夷狄等來助祭所貢方物珍異等皆陳廟庭其几筵司几筵云吉事變几祼於室饋食於堂繹於祊每事易几神事文示新也席皆以莞筵紛純加繅席畫純加次席黼純左右玉几紛如綬有文而狹者繅席削蒲蒻展之編以五綵若今合歡矣畫謂雲氣次席桃枝席有次列成文司服共饗先王則袞冕饗先公則鷩冕尸服亦然凡百司所供之物皆太史校數之及教所當置處太史職云祭之日㼬書以次位常是王所乘輅雞人呼晨司樂宿懸等一如圜丘其日夙興陳酒齊等室中近北陳鬱鬯鬱鬯之南陳明水明水之南室户之內陳泛齊醴齊盎齊室户之外堂上陳醍齊而已次堂下陳沈齊沈齊之南陳元酒元酒之南陳事酒昔酒清酒此説取禮運元酒在室醴盞在户粢醍在堂澄酒在下之意楊氏曰愚按四時祭禮其陳五齊之序亦當如是但四時之祭陳之而不盡用只用醴盎二齊惟祫祭並用五齊於是大宗伯出髙祖以下木主守祧出先王先公祧主皆入太祖后稷廟中於室中之奧西壁下東面布太祖后稷位尸在東北面太祖之子於席前之北南面為昭次昭之子在南方北面相對為穆以次而東孫與王父並列直至禰其尸各居木主之左凡七尸七尸者逸禮文按禮器云君旅酬六尸鄭元云后稷尸祭爵不受旅是也皆楊氏曰愚按祫祭禮有二大祫則不窋至宣王為昭南向鞠至幽王為穆皆北向如朱子大祫圖時祫則太祖后稷東向二昭南向二穆北向世數迭遷如朱子時祫圗用九獻王服袞冕而入奏王夏后服副褘從王而入則奏齊夏次尸入奏肆夏祭統云君迎牲而不迎尸别嫌也王乃圭瓚酌斚彞鬱鬯以授尸尸受之灌地祭之以降神乃啐之奠之此為求神之始也此為一獻樂章歌九功之德詩用清廟次后以璋瓚酌黃彛之鬱鬯以亞獻尸亦祭之啐之奠之此為二獻次奏黃鍾為宫大吕為角太蔟為徵應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九韶之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣人鬼則主后稷先奏是樂以致其神然後合樂而祭焉路鼓四面鼓也九德之歌春秋所謂六府三事也九功之德皆可歌樂隂竹生山北者龍門山名九韶當為大韶前祼及樂皆為求神謂之二始楊氏曰愚按求神二始謂祼及樂也但通典此章先述二獻後述大司樂則祼先而樂後又按大司樂黃鍾為宫注云先奏是樂以致其神而祼焉禮運疏亦云作樂降神乃灌則樂先而祼後二説不同以周人尚臭故以鬯臭次王出迎牲入奏昭夏郊特牲云既灌然後迎牲王親牽牲大夫贊執幣而從禮器注云納牲於庭是也當用幣以告神而殺牲乃以牲告庭云博碩肥腯禮器云納牲詔於庭是也王乃親執鸞刀啓其血毛謂耳傍毛也以授於祝祝入告神於室幽全之義也禮器注云血毛詔於室是也幽謂血全謂色純也乃延太祖尸主坐於室戶外之西南面主在其右亦南面昭在東穆在西相向而坐主各在其右王乃親射牲而殺之以行朝事之禮乃延尸於户西南面取牲膟膋燎於爐炭洗肝於鬱鬯而燔之入以詔神於室又出以隳於主隳謂分減肝膋以祭主隳音許志反次乃升牲首於室中置於北牖下尊首尚氣乃薦腥肉於尸主前謂朝踐之禮王乃以玉爵酌泛齊以獻尸謂之朝踐之獻凡三獻也后於是薦朝事之籩豆時堂上以大吕之調歌清廟之詩堂下以黃鍾之調作大武之樂奏大武之詩則歌維清及大武之詩詩序云維清奏象舞也奏大武也獻后稷尸時樂同降神樂章則歌思文詩序云思文后稷配天也獻先王先公則大司樂云奏無射歌夾鍾舞大武以饗先祖先王先公樂章則歌天作詩序云天作祀先王先公獻文王尸歌清廟詩序云清廟祀文王獻武王尸歌執競詩序云執競祀武王樂同先王先公凡歌皆大司樂師瞽人登歌之時后薦之後遂以瑶爵酌著樽之醴齊以亞獻凡四獻也於是堂下樂作時王從東階而西酌以獻尸后則從西而東酌獻尸禮器云君西酌犧象夫人東酌罍樽禮交動乎上樂交動乎下至將薦熟時先以所薦之饌設於堂以告尸主禮器云設祭乎堂鄭元云設饌於堂乃人君之禮時祝以斚爵酌奠於饌之右鄭元注郊特牲云天子奠斚爵此時又膟膋及黍稷焫於薌蒿令臭陽逹於牆室既乃迎尸入室各即席祝取向時所奠斚爵將祭之祝乃詔王拜尸以安之尸遂坐祭酒啐之奠之於是王又以玊爵酌壺樽盎齊以獻尸謂之再獻凡五獻也時后薦饋食之籩豆薦訖乃以瑶爵酌壺樽醍齊以亞獻凡六獻也每獻作樂如初尸乃食食訖王以玉爵酌朝踐著樽之泛齊以酳尸謂之朝獻凡七獻也司樽彝云朝踐用兩著樽注云變朝踐為朝獻樽相因后乃薦加事豆籩尸飲訖授祝祝酌清酒以授尸尸以酢王乃設酢席於戶內司几筵云祀先王酢席亦如之鄭元注云尸卒食王酳之卒爵祝受之又祝授尸尸以酢王於是席王於戶內后及諸臣致爵乃設席楊氏曰愚按禮運疏及通典皆云王酳尸訖后乃薦加事豆籩則后薦豆籩當王酳尸節又按籩人疏云此加籩當尸食後王酳尸后亞王酳尸於時薦之則后薦豆籩當后酳尸節二説不同於是后以瑶爵酌壺樽醍齊以獻尸謂之再獻凡八獻也鄭元注司樽彞云王酳尸之後后酌亞獻尸乃酢后后飲酢酒次諸臣為賓酌壺樽沈齊以備卒食三獻凡九獻司樽彝注云王及后各四諸臣一祭之正也大祝乃設饌於廟門外之西室以索祭名為祊郊特牲云索祭祝於祊是也緣此處生平待賓客之處故廣求既九獻王乃冕而總干戚率羣臣王在東舞大武樂皇尸所謂八佾又皮辨而舞大夏兼作六代之樂遂行加爵為旅酬之始禮器云周旅酬六尸是也加爵者謂太子所謂上嗣舉奠乃三公之長一人九卿之長一人用璧角酌沈齊各行一加爵按少牢特牲之祭加爵但止於三也通前凡十二獻亦得於天數也明堂位云加以璧散璧角也然後輝胞上詳眷反下音炮翟閽等皆有所賜豫於來日又祭名為繹亦謂之祊爾雅云繹又祭也春秋云壬午猶繹杜注云先日辛巳有事於太廟是又鄭元注禮器云祊祭明日之繹祭也謂之祊者以於廟門之傍因名焉其禮先設饌於廟門外之西室而事尸於堂其祭室之禮簡而事尸禮大以孝子求神非一處也不知神之所在於彼乎於此乎右九獻楊氏曰愚按特牲饋食禮賈疏云天子大祫十有二獻夫宗廟祭禮莫重於大祫恐未必止於九獻周官諸公九獻諸侯七獻見於行人諸侯長十有再獻見於掌客注云諸侯長九命作伯者也獻公侯以下如其命數以諸侯長十有再獻推之則大祫十有二獻禮亦宜然但其禮既亡節文無所可據禮運疏及通典所述九獻大略著之於篇庶幾可以見禮之梗概賈疏十有二獻之説今並存之以待作者傳文公二年大事於太廟躋僖公躋升也僖公閔公庶兄繼閔而立廟坐宜次閔下今升在閔上故書而譏之左氏曰逆祀也於是夏父弗忌為宗伯夏戶雅反昭疏曰小宗伯掌建國之神位辨廟祧之穆諸侯之官所掌亦當然也尊僖公且明見曰吾見新鬼大故鬼小新鬼僖公既為兄死時年又長故鬼閔公死時年少弗忌明言其所見先大後小順也躋聖賢明也又以僖公為聖賢明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣先悉薦反下不先同父齊肅也臣繼君猶子繼故禹不先鯀鯀禹父湯不先契契湯十三世祖文武不先不窋窋知律反子不窋后稷宋祖帝乙鄭祖厲王猶上祖也帝乙微子父厲王鄭桓公父二國不以帝乙厲王不肖而猶尊尚之是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷解佳賣反忒他得反郊忒差也皇皇美也后帝天也詩頌僖公祭上天配以后稷君子曰禮謂其后稷親而先帝也先稱帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也公羊傳曰大事者何大祫也祥見前躋者何升也何言乎升僖公譏逆祀也其逆祀奈何先禰而後祖也升謂西上後祖者僖公以臣繼閔公猶子繼父故閔公於文公亦猶祖也自先君之隱桓及閔僖各當為兄弟顧有貴賤耳自繼代言之有父子君臣之道此恩義逆順各有所施也夫榖梁傳同國語魯語夏父弗忌為宗弗忌魯大宗宗伯蒸將躋僖公宗有司曰宗有司宗官司事臣也自元王以及主癸莫若湯元王契也主癸湯父也自稷以及王季莫若文武商周之蒸也未嘗躋湯與文武為不踰也不使相踰楊氏曰春秋書大事於太廟謂大祫也大祫與時祫不同國語云蒸將躋僖公榖梁傳云著祫嘗曰蒸曰嘗皆指時祫言之非也定公八年冬十月從祀先公從順也先公閔公僖公也將正二公之位次左氏曰順祀先公而祈焉陽虎將作大事欲順祀以取媚通典古者天子諸侯三年喪畢皆祫先祖之神而饗之以生有慶集之歡死亦應備合食之禮緣生以事死因天道之成而設禘祫之饗皆合先祖之神而饗之虞夏先王崩新王元年二年喪畢而祫三年春特禴夏特禘秋特嘗冬特蒸四年春特禴夏祫禘秋祫嘗冬祫蒸每間歲皆然以終其代高堂隆云喪以竒年畢則祫亦常在竒年偶年畢則祫亦常在偶年殷先王崩新王二年喪畢而祫三年春特禘夏特禴秋特嘗冬特蒸四年春特禘夏祫禴秋祫嘗冬祫蒸間歲竒偶如虞夏按殷改虞夏春禴曰禘又改禘為禴按郊特牲春禘秋嘗則殷祭周制天子諸侯三年喪畢禫祭之後乃祫於太祖來年春禘於羣廟祫毁廟未毁廟皆合升於太祖禘則不及親廟但文武以下毁主依昭穆於文武廟中祭之王季以上於后稷廟祭之知先祫後禘者約春秋魯僖公定公宣公皆八年而禘以再殷祭推之爾後五年再殷祭一禘一祫所以喪必有此禘祫者為後再殷之祭夲也喪畢之祫祫之本明年之禘禘之本故從此後各自數每至三年則各為之故得五年再殷祭因以法五歲再閏天道大成也禘以夏祫以秋詩閟宫傳云諸侯再禘則不祫秋祫則不嘗唯天子兼之是也崔靈恩云禘以夏者以審諦昭穆序列尊卑夏時陽在上隂在下尊卑有序故大次第而祭之故禘者諦也弟也祫以秋者以合聚羣生其禮最大必秋時萬物成熟大合而祭之故祫者合也右楊氏祭禮只分大祫時祫為二而不言四代之制且不言祫祭之時蓋以經無明文不敢臆説而通典則備言之蓋通典取鄭康成所注禮記為説而康成又約春秋所書為説大概皆臆説也是以先儒多排之然自鄭注既行而後之有國者多本之以定宗廟之祭矣故具載通典所述而列諸儒之論於左方趙氏曰王制春礿夏禘鄭注以為夏時禮祭統注謂夏殷禮祭義春禘秋嘗注以為春禘者夏殷禮周以禘為殷祭更名春祭曰祠郊特牲又注曰禘當為禴夫禮記諸篇或孔門之末流弟子所撰或是漢初諸儒私撰之以求購金皆約春秋為之見春秋禘於莊公遂以為時祭之名見春秋惟兩度書禘閔二年五月吉禘於莊公今之三月僖八年七月禘於太廟今之五月也所以或謂之春祭或謂之夏祭各自著書不相符會理可見也而鄭元不逹其意故注郊特牲云禘當為礿祭義與郊特牲同祭統及王制則云此夏殷時禮也且祭統篇末云成王追念周公賜之重祭郊社嘗禘是也何得云夏殷禮哉王制諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不禴撰此篇者亦緣見春秋中唯有禘蒸嘗三祭謂魯唯行此三祭故云耳若信如鄭注諸侯每嵗皆朝即逺國來往須歷數時何獨廢一時而已又須往來常在道路如何守國理民乎鄭注虞夏之制諸侯嵗朝廢一時祭公羊傳五年而再殷祭大宗伯注曰五年再殷祭一祫一禘又云禘祫俱殷祭祫則於太祖列羣廟之主禘則於文武廟各迎昭穆之主夫太廟之有祫祭象生有族食之義列昭穆齒尊卑今乃分昭穆各於一廟有何理哉若信有此理五廟七廟有虛主曽子問篇中何得不該蓋儒者無以分别禘祫之異強生此義也僖公三十三年左氏傳曰蒸嘗禘於廟蓋左氏見春秋經前後記祭唯有此蒸嘗禘三種以為祭名盡於此但按經文不識經意所以云爾又昭公十五年禘於武宫二十五年禘於襄公定公八年禘於僖公亦左氏見經書禘於莊公以為諸廟合行之故妄云禘於武宫僖公襄公皆妄引禘文而説祭耳問者曰若謂禘非三年喪畢之殷祭則晉人云以寡君之未禘祀何也答曰此左氏之妄也左氏見經文吉禘於莊公以為喪畢當禘而不知此本魯禮不合施於他國左氏亦自云魯有禘樂賔祭用之即眀諸國無禘可知是左氏自相違背亦可見矣林氏曰事有出於一時之陋見行之數千百載莫有悟其非者良可歎也夫禘祫之説諸儒聚訟久矣論年之先後則謂之先三而後二鄭康成髙堂隆或謂先二而後三徐邈辨祭之小大則或謂祫大於禘鄭康成或謂禘大於祫王肅或謂一祭而二名禮無差降賈逵劉歆又或謂禘以夏不以春祫以冬不以秋矛盾相攻卒無定論此皆置而勿辨其可深責者始為私見陋説召諸儒之紛紛者其鄭氏之失歟鄭氏之説曰魯禮三年喪畢而祫於太祖明年春禘於羣廟自爾以後五年而再盛祭一禘一祫周禮廢絶久矣鄭氏何據而云為之説者曰周禮盡在魯鄭氏據春秋魯禮則周禮可知矣僖公薨文公即位二年秋八月大事於太廟大事祫也推此是三年喪畢而祫於太祖也明年春禘雖無正文約僖公定公八年皆有禘文可知蓋以文公二年祫則知僖宣二年亦皆有祫則明年是三年春禘四年五年六年秋祫是三年祫更加七年八年并前為五年禘故禘於羣廟也自後三年一祫五年一祫嗚呼鄭氏不知春秋固妄為此説後學又不察固為所惑也當春秋時諸侯僭亂無復禮制魯之祭祀皆妄舉也諸侯而郊上帝禘始祖罪也大夫而旅泰山舞八佾罪也春秋常事不書其書者皆悖禮亂常之事故書郊者九書禘者二與夫大事一有事二蒸二嘗一之類無非記其非常俾後世以見其非奈何反以為周禮而足法乎使魯之祭祀如周之禮則春秋不書矣據僖公以三十二年冬十二月薨至文公二年秋八月喪制未畢未可以祫也而乃大事焉一惡也躋僖公二惡也彼有二惡春秋譏之鄭氏乃謂三年喪畢而祫於太祖者果禮邪又曰明年春禘經無三年禘祭之文何自知之徒約僖公宣公八年皆有禘而云愈繆也魯之設祭何常之有聖人於其常又不書之何得約他公之年以足文公而見三年之禘與五年而再殷祭乎使文公二年不因躋僖公則春秋不書大事使僖公八年不因用致夫人則春秋不書禘又何凖邪况宣公八年經書有事於太廟則是常祭也而以為禘何邪誠為禘祭經不得謂之有事且閔公二年春秋書夏月吉禘於莊公是魯常以二年即禘矣何待三年與八年乎閔有禘文而不之據宣無禘文而妄據之傅會可見也不然魯至僖公而始書三望豈他公皆不望乎至成公而後書用郊豈他公皆不郊乎桓公一歲而再蒸十二公而唯一嘗又可以為法乎取亂世之典以為治世之制鄭氏豈知春秋哉區區一鄭氏不足責後世諸儒波蕩而從之歷代祀典咸所遵用益可悲也夫其論禘祫之制既謬至其言祭之時亦非矣春秋書大事於秋八月而彼以為冬書閔公之禘於夏五月書僖公之禘於秋七月而彼一以為夏既本魯禮以行祀典而又不用其時是自戾也故曰事有出於一時之陋見行之數千百歲莫有悟其非者禘祫之説是也雖然魯禮誠非矣先王之制可得聞乎曰孟子之時不聞周禮之詳矣矧加秦火之酷乎夫子曰多聞闕疑鄭氏惟不知闕疑之理乃妄説以惑世况又效其尤邪故求之聖經禘祫之文不詳所可知者禘尊而祫卑矣禮不王不禘或問禘之説夫子答以不知譏魯僖僭也春秋之法所譏在祭則書其祭名不然則否書郊書望禘則所譏在郊望與禘也若文公之祫則譏其短喪逆祀不在於祫故曰大事而已何者禘者禘其祖之所自出王者立始祖之廟未足以盡追逺尊先之義故近推祖所出之君而追祀之則謂之禘有虞氏夏后氏皆禘黃帝以其祖顓帝之所出也商人周人皆禘嚳以其祖契文王之所出也禘天子之祭名諸侯無禘禮魯用之僭也若夫祫則合食而已毁廟未毁廟之主皆合食於太祖非惟天子有祫諸侯亦得祫也詳二祭之名則禘尊而祫卑可謂明矣先儒據鄭氏説率以祫大於禘是以諸侯之祭加天子之祭可乎考之經籍禘祫之文可知者此爾蓋其禮之大者至於年數之久逺祭時之先後則經無所據學者當闕其疑不可據漢儒臆論也若世有聖君賢臣達禮之情觀時變通而為之制可矣何必膠柱而不知變乎茍徒以鄭氏之誤説魯人僭禮之典以為百代常行則恐為後世知春秋者笑也揚氏曰自漢以來宗廟之禮不合古制者其失有二混禘祫為一事一失也輕宗廟而重原廟二失也其一曰禘祫之禮不同王者既立始祖之廟又推始祖所自出之帝而以始祖配之所謂禘也合羣廟之主於始祖之廟而設殷祭所謂祫也先儒皆知祫為殷祭矣而又兼以禘為殷祭其説何從始乎蓋自成王念周公有大勳勞賜以郊禘重祭聖人已歎其非禮然魯之有禘特祭於周公之廟而上及於文王以文王者周公之所出也其後閔公二年僭用禘禮行吉祭不於周公之廟而行之於莊公之宫而禘之禮始紊自僖公八年用禘禮合先祖敘昭穆用致夫人於廟而禘禮始與祫混淆而無别春秋常事不書特書閔公僖公兩禘者記失禮之始也文公二年大事於太廟躋僖公公羊傳曰大事者何大祫也謂大合毁廟未毁廟之主於太祖之廟而祭之也天子有祫諸侯亦有祫於文公乎何譏譏其逆祀躋僖公也鄭康成乃謂禘祫皆為魯禮夫謂祫為魯禮可也魯之有禘行於周公之廟已非禮矣况僭而行之於莊公之宫又禘於太廟以致妾母可以謂之禮乎禘宗廟之大祭也故惟禘禮為盛觀明堂位之言可見閔僖竊禘之盛禮以侈一時之美觀猶周公廟有八佾其後竊而用之於季氏之庭此聖人之所深惡也况三年喪畢而吉祭此祫禮也閔公喪未畢竊禘之盛禮以行吉祭合先祖敘昭穆此祫禮也僖公竊禘之盛禮以致夫人禘祫之混自此始也鄭氏不能推本尋源以辨禘祫二禮之異正閔僖僭禘之罪以明春秋之意反取春秋之所深譏者以明先王禘祫之正禮又妄稱禘祫皆為殷祭三年一祫五年一禘二禮常相因並行且多為説以文之按鄭注王制及春官大宗伯詩殷頌皆曰魯禮三年喪畢而祫於太祖明年春禘於羣廟自爾以後五年而再殷祭一祫一禘愚始讀鄭氏三注意其必有昭然可據之實及考其所自來則曰一祫一禘之説出於春秋魯禮及緯書夫溺於緯書之偽而不誤其非此鄭氏之蔽惑不足責也謂出於春秋魯禮者並無事實可證乃專取僖公之禘文公之祫二事穿鑿傅會以文致其説而已夫禘祫二禮其源各異本不相因僖公之禘未嘗因乎祫文公之祫未嘗關乎禘也今其説曰文公二年既有祫則僖公二年亦必有祫僖公八年既有禘則文公八年亦必有禘事之本無既牽合影射以為有蓋欲明僖公之禘前有祫文公之祫後有禘以證一祫一禘之説而已此其妄一也夫既取僖公之禘文公之祫為證矣又增宣公八年之禘以明之謂僖宣八年皆有禘放於春秋宣公八年有事於太廟未嘗有禘文乃鄭氏駕虛詞以多其證此其妄二也文二年公羊傳云五年而再殷祭所謂五年再殷祭者謂三年一祫五年再祫猶天道三年一閏五年再閏也鄭氏乃引之以為三年一祫五年一禘之證此其妄三也二年至八年相去凡七年與五年再殷祭之數不合也則為之説曰魯禮三年喪畢而祫於太祖明年春禘於羣廟自爾以後五年而再殷祭夫謂三年喪畢而祫於太祖可也明年春禘於羣廟何所據而為是説乎強添此事於五年再殷祭之前直欲以掩五年七年不合之數爾後之儒者知其不可則為之説曰喪畢之祫祫之本明年之禘禘之本此其為説若巧矣惜乎其似是而實非也此其妄四也且後世之所以信鄭氏者以其所據者春秋也而鄭氏所據者乃是以無為有駕虛為實取閔僖僭竊之禮以明先王禘祫之正禮既三注其説於經又以此説推演為禘祫志注疏盈溢文不勝繁故觀者莫辨諸儒靡然而從之是皆求其説於鄭注之中未嘗以經而考注之真偽也王肅最為不信鄭氏亦以禘為五年殷祭之名不亦誤乎自鄭氏之説立混禘於祫而禘之禮遂亡混祫於禘而祫之禮亦紊夫禮不王不禘王者禘其祖之所自出見於大傳見於小記見於喪服子夏傳非不甚明祭法首述虞夏殷周四代已行之禮又信而有證固有國家者所當講明而舉行也自漢以來世之儒者皆置之而不論其故何哉蓋後之言禘者皆求其説於三年一祫五年一禘之中而不求之於禘其祖之所自出皆由漢儒混禘於祫而遂至於不知有禘此禘禮之所由亡也可不惜哉漢儒既以禘祫皆為魯禮又以禘祫同為殷祭於禘祫之本原已失之矣又欲尋流逐末欲辨禘祫之名所以不同是故馬融謂禘大祫小禘三年大禘及郊宗祏祫歲祫及壇墠鄭元謂祫大禘小祫毁主未毁主合於太祖禘唯毁主合食未毁則各祭於其廟賈逵劉歆謂一祭二名紛紛異同得失不能相逺最是鄭氏多為之説附經而行其汨經為尤甚於是祫禮為禘所混歷代所行衆説紛錯歲月先後拘牽纏繞而祫禮亦不得其正是祫之禮亦從此而紊矣故曰混禘祫為一事其失一也輕宗廟重原廟説見宗廟門又曰愚按鄭氏注王制春官大宗伯及詩殷頌皆云魯禮三年喪畢而祫於太祖明年春禘於羣廟及注鬯人廟用修又云始禘自饋食始信如是言則喪畢而有祫祫之前又有禘自饋食始也以喪禮考之大祥禫皆有此祭猶是喪祭也喪畢則有吉祭未聞喪畢既有吉祭之祫祫前又有吉祭之禘也自鄭氏注有此説魏卞后唐睿宗之喪皆禫後有禘喪畢有祫明年春有禘國朝治平二年同知太常禮院吕夏卿亦建此議謂之小禘後之儒者意在尊信聖經不知經無其文乃鄭氏説也若如疏家謂鄭氏用穀梁練而壞廟之説爾時木主新入廟禘祭之此尤非也禘吉祭也練而遷廟之時遽行吉祭尤無是理案禘祫之制禮經無明文而漢儒之釋經者各以意言之其説莫詳於鄭氏而其支離亦莫甚於鄭氏故先儒皆不以為然如趙氏林氏楊氏之言辨析詳明已無餘藴然其所詆訾者大概有四三年一祫五年一禘一也混禘祫為一事二也以禘為喪服即吉之祭三也以禘為時祭四也夫三年一祫五年一禘經無其文蓋緯書之説若混禘祫為一事則鄭氏據魯之僭禮妄作而以為周禮先儒言之詳矣至於以禘為喪服即吉後之祭為非則愚以為王制言三年之喪不祭唯祭天地社稷為越紼而行事然則喪服未除宗廟諸祭盡廢非特禘祫也左傳言祔而作主特祀於主蒸嘗禘於廟然則喪服既除宗廟諸祭盡舉亦非特禘祫也以是觀之則鄭注所謂魯禮三年喪畢而祫於太祖明年春禘於羣廟恐只是泛指喪畢則可以吉祭而言未見其即以祫禘為喪畢之祭也如喪畢之祭則禮謂之祔然左氏所謂特祀於主者先儒注釋以為祀新主於寢則不及羣廟也儀禮士虞禮載祔祭祝文曰孝子某孝顯相夙興夜處小心畏忌不惰其身不寧用尹祭脯曰尹祭嘉薦普淖普薦溲酒適爾皇祖某甫以隮祔爾孫某甫尚饗則祔亦有告祭於廟之禮但儀禮所言乃士禮若國家之禮則禘祫時饗之外必别有一祔祭之禮而經文無可考至魯則始以禘為祔而禮之失自此始矣先儒議康成之釋禘祫病其據魯之失禮以為周禮然魯自以禘為祔祭而康成自謂三年喪畢祫於太祖則其意乃以祔為祫本不以禘為祔實未嘗專以魯為據也蓋祫者合祭也大祫則以已毁廟之主合於太祖而祭之時祫則以未毁昭穆廟之主合於太祖而祭之至於祔則亦是以新主合於舊主而祭之然則以祫訓祔祭亦未為不可而所謂明年春禘於羣廟則自是吉祭矣故愚以為康成所謂三年喪畢祫於太祖明年禘於羣廟本非據魯禮而言未可深訾也特不當以春秋所書而遙推其禘祫之年則為無據而臆説耳若禘之又為時祭則王制天子祫祭諸侯禘一犆一祫之説左傳蒸嘗禘於廟之説所載晉人言寡君未禘祀之説皆指時祭而言無緣皆妄蓋禘有二名有大禘之禘大傳所謂禮不王不禘王者禘其祖之所自出而以祖配之禮運所謂魯之郊禘非禮也是也有時禘之禘祭義所謂春禘秋嘗王制所謂天子祫禘諸侯禘一犆一祫是也趙伯循必以禘為非時祭之名因不信鄭氏而并詆禮記左傳其意蓋謂禘只是大禘無所謂時禘然禘之名義他不經見惟禮記詳言之耳趙氏所言亦是因不王不禘之説魯郊禘非禮之説見得禘為天子之大祀故不可以名時祭然大傳禮運禮記也王制祭義亦禮記也今所本者大傳禮運所詆者王制祭法是據禮記以攻禮記也至於禘蒸嘗於廟一語雖左氏所言然其所載昭公十五年禘於武宫二十五年禘於襄公定公八年禘於僖公襄公十六年晉人曰寡君之未禘祀則皆當時之事今趙氏皆以為左氏見經中有禘於莊公一事故於當時魯國及他國之祭祀皆妄以為禘則其説尤不通矣安有魯國元無此祭晉人元無此言而鑿空妄説乎蓋魯伯禽嘗受郊禘之賜則魯國後來所行之禘其或為大禘或為時禘亦未可知也至於左氏所謂蒸嘗禘於廟晉人所謂寡君未禘祀則時禘之通行於天子諸侯者非止魯國行之而已恐難儕之郊望而例以僭目之也文獻通考卷一百
