body:
  text: 文獻通考卷三十四鄱陽馬端臨貴與著選舉考七孝廉漢文帝十二年詔曰孝悌天下之大順也力田為生之本也廉吏民之表也朕甚嘉此二三大夫之行今萬家之縣云亡應令豈實人情是吏舉賢之道未備也其遣謁者勞賜孝者帛人三匹悌者力田二匹廉吏二百石以上率百石三匹自二百石以上每百石加三匹也孝景後二年詔曰其唯廉士寡欲易足今訾算十以上乃得官廉士算不必衆有市籍不得官亡訾又不得官朕甚愍之訾算四得官亡令廉士久失職貪夫長利孝武元光元年冬初令郡國舉孝廉各一人董仲舒對策曰臣愚以為使諸列侯郡守二千石各擇其吏民之賢者嵗貢各二人故州郡舉茂材孝廉皆自仲舒發之元朔元年詔曰朕深詔執事興廉舉孝今或闔郡不薦一人是化不下究而積行之君子雍於上聞也詳見鄉舉里選考按漢時詔郡國薦舉人才賢良方正與孝廉二科並行然賢良一科文帝與武帝時每對輒百餘人又徴詣公車上書自衒鬻者以千數而孝廉之選文帝之詔以為萬家之縣亡應令者武帝之詔以為闔郡不薦一人蓋賢良則稍有文墨材學者可以充選而孝廉則非有實行可見者不容謬舉故也孝宣黃龍元年詔曰舉廉吏誠欲得其真也吏六百石位大夫有罪先請秩祿上通足以效其賢材自今以來毋得舉言吏六百石者不得復舉為廉吏也孝平元始元年令宗室其為吏舉廉佐吏補四百石西漢舉孝廉路溫舒以決曹吏舉遷山邑丞龔勝郡吏三舉孝廉再為尉一為丞鮑宣以郡功曹舉遷郎京房以孝廉舉為郎趙廣漢以州從事舉茂材察廉遷陽翟令張敞以太守卒史察廉為甘泉倉長尹翁歸以督郵舉廉為緱氏尉又以都內令舉廉為𢎞農都尉王尊以州從事舉遷鹽官長蓋寬饒郡文學舉遷郎劉輔遷襄賁令蕭望之御吏官屬遷治禮丞薛宣以大司農斗食屬察廉補不其丞又以不其丞察廉遷樂浪都尉丞馮逡野王子遷郎朱博以太常掾察廉補安陵丞杜鄴遷郎王嘉光祿掾察廉為南陵丞復察廉為長陵尉師丹遷郎孟喜遷郎黃霸左馮翊卒史察補河東均輸長復察廉為河南太守丞尹賞以郡吏察廉為樓煩長王吉郡吏舉孝亷為郎平當以大鴻臚文學察廉為順陽長東漢之制郡太守舉孝廉郡口二十萬舉一人百官志故事尚書郎以令史久次補之光武始用孝廉為尚書郎建武十二年詔三公舉廉吏各二人光祿嵗察廉吏三人中二千石嵗察廉吏各一人廷尉大司農各二人將兵將軍嵗察廉吏各二人章帝建初元年初舉孝廉郎中寬博有謀任典城者以補長相和帝時大郡口五六十萬舉孝廉二人小郡口二十萬并有蠻夷者亦舉二人帝以為不均下公卿會議丁鴻與司空劉方上言凡口率之科宜有階品蠻夷錯雜不得為數自今郡國率二十萬口嵗舉孝廉一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二嵗一人不滿十萬三嵗一人帝從之丁鴻傳永元七年四月詔曰舊典因孝廉之舉以求人有司詳選郎官寬博有謀才任典城者三十人既而悉以所選郎出補守相十三年詔緣邊郡口十萬以上嵗舉孝廉一人不滿十萬二嵗舉一人五萬以下三嵗舉一人安帝元初六年詔光祿勳與中郎將選孝廉郎寬博有謀清白行髙者五十人補令長丞尉延光二年八月初令三署郎通達經術任牧民者視事三嵗以上皆得察舉順帝即位令郡國守相視事未滿嵗者一切得舉孝廉吏陽嘉元年左雄上言孔子曰四十不惑禮稱強仕請自今孝廉年不滿四十不得察舉皆先詣公府諸生試家法文吏課箋奏副之端門練其虗實以觀異能以美風俗有不承科令者正其罪法若有茂材異行自可不拘年齒帝從之胡廣郭虔史敞上書駮之曰凡選舉因才無拘定制六竒之策不出經學鄭阿之政非必章奏甘竒顯用年乖強仕終賈揚聲亦在弱冠前世以來貢舉之制莫或回革今以一臣之言剗戾舊章便利未明衆心不厭矯枉變常政之所重而不訪台司不謀卿士若事下之後議者剝異異之則朝失其便同之則王言己行臣愚以為可宣下百官參其同異然後覽擇勝否詳采厥衷帝不從辛卯初令郡國舉孝廉限年四十以上諸生通章句文吏能箋奏乃得應選其有異才異行若顔淵子竒不拘年齒久之廣陵所舉孝廉徐淑年未四十臺郎詰之對曰詔書曰有如顔回子竒不拘年齒是故本郡以臣充選郎不能屈左雄詰之曰昔顔回聞一知十孝廉問一知幾邪淑無以對乃罷却之閏月丁亥令諸以詔除為郎年四十以上課試如孝廉科者得參廉選嵗舉一人左雄前議舉吏先試之於公府又覆之於端門尚書張盛奏除此科黃瓊復上言覆試之作將以澄清洗濁覆實虗濫不宜改革帝乃止二年張衡言自初舉孝廉迄今二百嵗矣皆先孝行行有餘力始學文法辛卯詔書以能章句奏案為限雖有至孝猶不應科此棄本而取末曽子長於孝然實魯鈍文學不若遊夏政事不若冉季今欲使一人兼之茍外有可觀內必有闕則違選舉孝廉之志矣漢安元年尚書令黃瓊以前左雄所上孝廉之選專用儒學文吏於取士之義猶有所遺乃奏增孝悌及能從政者為四科帝從之桓帝即位詔曰孝廉廉吏皆當典城牧民禁姦舉善興化之本常必由之詔書連下分明懇惻而在所玩習遂至怠慢選舉乖錯害及元元頃雖頗繩正猶未懲改方今淮夷未殄軍師屢出百姓疲悴困於調發庶望羣吏惠我勞民蠲滌貪穢以祈休祥其令秩滿百石十嵗以上有殊才異行乃得參選贓吏子孫不得察舉杜絶邪偽請託之原令廉白守道者得信其操各明守所司將觀厥後詔侍中尚書中官子弟不得為吏察孝廉徐氏曰按孝廉之舉始自西都嘗考元朔詔書云深詔執事興廉舉孝今或至闔郡不薦一人其與中二千石禮官博士議不舉者罪有司奏議曰不舉孝不奉詔當以不敬論不察廉不勝任也當免詳觀此文則孝之與廉當是各為一科故蕭望之薛宣黃霸張敞等皆以察廉補長丞獨王吉京房師丹孟喜皆以舉孝廉為郎劉輔舉孝廉為襄賁令至東都則合為一科矣西都止從郡國奏舉未有試文之事至東都則諸生試家法文吏課箋奏無異於後世科舉之法矣西都末始限年至東都則年四十以上始得察舉矣黃瓊言左雄所上孝廉之選專用儒學文吏於取士之選猶有所遺乃奏增孝悌及能從政者為四科則知當時雖以孝廉名科而未嘗責其孝行廉隅之實是亦失設科之本意也雖然漢世諸科雖以賢良方正為至重而得人之盛則莫如孝廉斯亦後世之所不能及按西漢舉賢良文學則令其對策而孝廉則無對策之事蓋所謂賢良文學者取其忠言嘉謨足以佐國崇論宏議足以康時故非試之以對策則無以盡其材若孝廉則取其履行而非資其議論也今亦從而有試焉則所謂孝廉者若何而著之於篇乎又况左雄所言諸生試家法謂儒有一家之學六藝專門之類文吏課箋奏則又文之靡者去賢良所對尚復逺甚而何以言孝廉乎雄又言郡國孝廉古之貢士出則寧民宣協風教若其面墻則無所施用愚以為真孝實廉之人豈有不學墻面之理而以家法箋奏應選者又豈可遽許以學古入官之事也然史言雄立此法之後濟隂太守胡廣等十餘人皆坐繆舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏栗莫敢輕舉則知當時孝廉一科濫吹特甚於文墨小技尚未能精通固無問其實行也科以孝廉名而猶如此則其他可知王荆公詩言文章始隋唐進取歸一律安知鴻都事竟用程人物嗚呼其來久矣非始於隋唐也許荆祖父武太守第五倫舉為孝廉武以二弟晏普未顯欲令成名乃請之曰禮有分異之義家有别居之道於是共割財産以為三分武自取肥田廣宅奴婢強者二弟所得悉劣少鄉人皆稱弟克讓而鄙武貪婪晏等以此並得選舉武乃會宗親泣曰吾為兄不肖盜聲竊位二弟年長未豫榮祿所以求得分財自取大譏今理産所增三倍於前悉以推二弟一無所留於是郡中翕然逺近稱之位至長樂少府按此後漢初之事當時之所謂孝廉必取其實行稽諸鄉評譽望著者入選掄而聲稱損者遭擯棄故所舉大概皆得其人中葉以來此意不存往往多庸妄之流以干請而得之於是只得假試文之事以為革繆之法矣至孝安帝永初五年舉至孝與衆卓異者桓帝建和元年詔大將軍公卿郡國舉至孝篤行之士各一人延熹九年詔公卿校尉郡國舉至孝獻帝建安五年詔三公舉至孝二人九卿校尉郡國各一人皆上封事靡有所諱徐氏曰按荀爽傳太常趙典舉爽至孝對策陳便宜靈帝詔舉有道之士而謝弼陳淳公孫度俱對策除郎中由是觀之漢世諸科皆有制策有司因以定其科第之等也東漢舉孝廉馬稜伏波族孫以郡功曹舉遷謁者魏霸韋彪馮豹賈琮鄭𢎞周章張霸桓典桓鸞劉平江革周槃第五倫鍾離意寒朗朱穆徐防張敏胡廣袁安應劭霍諝陳禪龎參陳龜橋元黃憲不就楊彪張綱王龔种皓陳球杜根劉陶李雲傅燮蓋勳張衡不就左雄李固杜喬吳祐延篤假熲陳蕃李膺劉祐宗慈巴肅范滂尹勳蔡衍羊陟陳翔檀敷劉儒賈彪符融不就鄭太不就荀彧皇甫嵩朱雋劉虞公孫瓚袁術許荆第五訪劉矩劉寵陽球劉昆張興包咸楊仁董鈞服虔頴容許慎葛龔劉梁髙彪劉茂張武戴封雷義王烈謝夷吾李郃公沙穆華他不就長水校尉樊倏上言郡國舉孝廉率取年少能報恩者耆宿大賢多見廢棄宜敕郡國簡用良俊种皓始為縣門下史時河南尹田歆外甥王諶名知人歆謂之曰今當舉六孝廉多得貴戚書命不宜相違欲自用一名士以報國家爾助我求之明日諶送客於大陽郭遙見皓異之還白歆曰為尹得孝廉矣近洛陽門下史也歆笑曰當求山澤隱滯近洛陽吏邪諶曰山澤不必有異士異士不必在山澤歆即召皓於庭辨詰職事皓辭對有序歆甚知之召署主簿辟太尉府舉髙第按東京選舉孝廉一科為盛名士多出其中然以此二段觀之則濫吹者亦多如樊倏所言取年少能報恩者固非矣若田歆庭詰种皓而觀其辭對有序則謂之能吏可耳所謂孝廉豈於一應對之頃而知之乎魏黃初二年初令郡國口滿十萬者嵗察孝廉一人其有秀異無拘户口三府議舉孝廉本以德行不復限以試經司徒華歆以為喪亂以來六籍隳廢當務存立以崇王道夫制法者所以經盛衰今聼孝廉不以經試恐學業從此而廢若有秀異可特徴用患於無其人何患不得哉帝從其言魏舒年四十餘郡舉上計掾察孝廉宗黨以舒無學業勸令不就可以為髙舒曰若試而不中其負在我安可虗竊不就之髙以為己榮乎於是自課百日習一經因而對策升第東晉元帝初以天下喪亂務存慰勉逺方孝秀不復䇿試後以經略粗定乃令試經其後孝秀莫敢應命至者多辭以疾詳見舉士門宋制州舉秀才郡舉孝廉皆策試見舉士門北齊制中書策秀才集書策貢士考功郎中策賢良見舉士門周武帝詔郡舉經明行修者為孝廉嵗一人見舉士門唐太宗貞觀十八年引汴鄜諸州所舉孝廉賜坐於御前上問以皇王政術及皇太子問以曽參説孝經並不能答太宗謂曰昔楚莊王言事羣臣莫逮退而有憂色曰諸侯能自得師者王自謀而莫已若者亡今以不榖之不德羣臣莫能逮吾國其幾於亡乎朕發詔徴天下俊異才以淺近問之咸不能答海內賢哲將無其人邪朕甚憂之代宗寶應二年禮部侍郎楊綰奏請每嵗舉人依鄉舉里選察秀才孝廉敕旨每州每嵗察孝廉取在鄉閭有孝弟廉恥之行薦焉委有司以禮待之試其所通之學五經之內精通一經兼能對策達於理體者並量行業授官其明經進士並停進舉亦宜準此同所司作條件處分七月二十六日禮部侍郎楊綰奏貢舉條孝廉各令精通一經其取左氏傳公羊榖梁禮記周禮儀禮毛詩尚書周易任通一經每經問義二十條皆取傍通諸義務窮根本試策三道問古今理體及當時要務取堪行用者仍每日問一道頻二道日畢經義及策全通為上第其上第者望付吏部便與官其問義每十條通七策通二為中第與出身下者罷之又論語孝經皆聖人深旨孟子亦儒門之達者其學官望兼習此三者共為一經其試如上秀才舉望令精通五經問義二十條對策五道全通者為上第上第者送名中書門下請超與處分問義十條通七策通四為中第中第者送吏部與官下者罷之孝悌力田但能熟讀一經言經音切即令所司舉送試通便與出身其今年舉人或舊業既成理難速改或逺州所送身己在途事須收奬不可中廢其今秋舉人中有情願依舊業舉者亦聼今年之後並依新敕敕旨進士明經置來日久今頓令改業恐難有其人諸色舉人宜與舊法兼行至建中元年六月九日敕孝廉科宜停宋太祖皇帝開寶八年詔諸州察民有孝悌力田竒才異行或有文武材幹年二十以上至五十可任使者選擇具送闕下如無人塞詔亦以實聞九年詔翰林學士李昉等於禮部貢院同閲諸道所解孝悌力田及有人材武學凡七百四十人試問所習之業皆無可採而濮州以孝悌薦名者二百七十人上駭其頗多召問於講武殿率不如詔猶稱素能習武復試以騎射則隕越顛沛失次上顧曰止可𨽻兵籍皆號告求免乃悉令退去詔劾本部官司濫舉之罪按以孝廉或孝悌名科蓋取其平日之素履固難於一閲試之頃而知之也然自東漢以來孝廉遂為取士科目之通稱不復有循名責實之舉不過試以文墨小技而命之官至倥偬之際則并不試文而悉官之矣隋唐而後始有進士明經等科遂無復有舉孝廉之事蓋隋唐而後之進士明經即東漢以來之孝廉皆借其名以為士子進取之塗耳然上之人慕孝廉之美名故時有察舉之詔而貞觀之孝廉至不能答曽參所説孝經開寶之孝弟至不能言所習之業淺陋可笑如此蓋自以文藝取人士之精華果鋭者皆盡瘁於記問詞章聲病帖括之中其不能以進士明經自進者皆椎朴無文之人遂欲别求進身之塗轍故夤緣州郡以應詔舉詳史所載二帝所以詢訪之者固非僻經奧傳傲以所不知也而已不能答則其無所抱負可知景祐間李淑言所謂茂材者本求出類之雋而士之不利鄉舉者應焉非求材之本意也意貞觀開寶所解孝悌力田文武才幹皆不能應鄉舉之輩耳武舉漢興六郡良家子選給羽林期門師古曰六郡謂隴西天水安定北地上郡西河也以材力為官名將多出焉軍功多用超等大者封侯卿大夫小者郎公孫賀北地人少為騎士從軍李廣隴西人以良家子從軍趙充國隴西人以六郡良家子善騎射補羽林傅介子北地人以從軍為官甘延壽北地人以良家子善騎射為羽林馮奉世上黨人以良家子選為郎張次公以勇悍從軍常惠應募隨蘇武使胸奴鄭吉以卒伍從軍傅介子斬樓蘭王士刺王者皆補侍郎灌夫以候司馬從擊吳楚蘇建以校尉從大將軍唐武舉起於武后之時長安二年始置武舉其制有長垜馬射步射平射筒射又有馬槍翹關負重身材之選翹關者長一丈七尺徑三寸半凡十舉後手持關距出處無過一尺負重者負米五斛行二十步皆為中第亦以鄉飲酒禮送兵部其選用之法不足道故不復書按選舉志言唐武舉起武后之時其選用之法不足道故不詳書然郭子儀大勳盛德身係安危自武舉異等中出是豈可概言其不足道邪唐登科記所載異科出身者衆獨軼武舉亦一欠事永隆元年嶽牧舉武陟縣尉員半千及第上御武成殿親問曰兵書云天陳地陳人陳之名何謂也半千對曰臣觀載籍多謂天陳謂星宿孤虗也地陳謂山川向背也人陳謂偏伍彌縫也以臣愚見謂不然矣夫師出以義有若時雨得天之時此天陳也兵在足食且耕且戰得地之利此地陳也士卒輕利將帥和睦此人陳也若用兵去是三者其何以戰上深賞之右補闕薛謙光言今武能制敵之科祗令彎弧夫趙雲雖勇資諸葛之指揮周勃雖雄乏陳平之計略若使樊噲居蕭何之任必失指蹤之機使蕭何入戲下之軍亦無免主之效是知謀將不取於弓馬良相不資於射䇿願降明制循名責實文則試以效官武則令其守禦唐武選兵部主之課試之法如舉人之制取其軀幹雄偉應對詳明有驍勇材藝及可為統師者若文吏求為武選取身長六尺以上籍年四十以下強勇可以統人者武夫求為文選取書判精通有理人之才而無殿犯者宋有武舉武選咸平時令兩制館閣詳定入官資序故事而未嘗行仁宗天聖八年親試武舉十二人先閲其騎射而後試之景祐四年韓億言武臣宜知兵書而禁不得傳請纂其要以授之於是出神武祕略以授邊臣慶厯六年策武舉馮維師奏武舉以策為去留弓馬為髙下神宗熙寧五年樞密請建武學於武成王廟選文武官知兵者為教授使臣未參班與門蔭草澤人召京官保任人材弓馬應格聼入學給食習諸家兵法教授纂次歷代用兵成敗前世忠義之節足以訓者講釋之願試陳隊者量給兵伍在學三年具藝業考試等第推恩未及格者逾年再試凡試中三班使臣與三路巡檢寨主未有官人與經略司教隊差使三年無過則升親民至大使臣有兩省待制或本路鈐轄以上三人保舉堪將領者並兼諸衛將軍外任回歸環衛班以尚書兵部郎中韓縝判學內藏庫副使郭固同判賜食本錢萬緡生員以百人為額科場前一年武臣路分都監文官轉運判官以上各奏舉一人聼免試入學生員及應舉者不過二百人春秋各一試步射以一石三斗馬射以八斗矢五發中的或習武伎副之䇿略雖弓力不及學業卓然並為優等補上舍以三十人為額八年詔武學與文舉同時鎖試以防進士之被黜而改習者髙宗建炎二年兵部言應武舉得解免解人各召保官賫公據赴部引驗於行在殿前司試弓馬訖就淮南轉運司别場附試程文從之紹興十六年始建武學兵部上武士弓馬及選試去留格凡初補入學步射弓一石若公私試步騎射不中即不許試程文其射格自一石五斗以下九斗凡五等上可其奏因謂輔臣國家武選政欲得人今諸將子弟皆恥習弓馬求換文資數年之後將無人習武矣宜勸誘之凡武學生習七書兵法步騎射分上內外三舍學生以百人為額置博士一員以文臣有出身或武舉髙選人為之學諭一員以武舉補官人為之孝宗隆興元年御試得正奏名三十七人殿中侍御史胡沂言臣觀唐之郭子儀以武舉異等初補右衛長史歷振遠橫塞天德軍使祖宗時試中武藝人並赴陜西任使又武舉中選者或除京東捉賊或三路沿邊試其效用或經略司教押軍隊凖備差使今率授以𣙜酤之事是所取非所用所用非所學也臣請取近嵗中選人數量其才品之髙下考任之深淺授以軍職使之習練邊事諳曉軍旅實選用之初意也乾道五年廷試始依文舉給黃牒同正奏名三十三人榜首賜武舉及第餘並賜武舉出身上垂意武科以授官與文士不類詔自今第一人補秉義郎堂除諸司計議官序位在機宜之上第二第三人保義郎諸路帥司凖備將領代還轉忠翊郎第四第五人承節郎諸路兵馬監押代還將保義郎皆倣進士甲科恩例四年又以文舉狀元代還例除館職亦召武舉榜首為閣門舍人五年御試得正奏名四十四名始立武學國子額收補武臣親屬其文臣親屬願赴武補者亦聼七年初立武舉絶倫並從軍法凡願從軍者殿試第一人與同正將第二第三名同副將第五名已上省試第六名已下並同凖備將從軍以後立軍功及人才出衆特旨擢用上曰武舉本求將帥之才今前名皆從軍以七年為限則久在軍中諳練軍政他日可備擢用武臣試換文資祖宗朝許從官三人薦舉紹興令敦武郎以下聼召保官二人以經義詩賦求試其後太學諸生久不第者多去從武舉已乃鎖廳應進士第凡以秉義或忠翊皆換京秩恩數與第一人等後以林頴秀言武士舍棄弓矢更習程文褒衣大袖專效舉子夫科以武名不得雄健喜功之士徒啓其僥幸名爵之心於是詔自今毋得鎖換寧宗初復武科鎖換令任子漢儀注吏二千石以上視事滿三嵗得任同産若子一人為郎董仲舒對策曰夫選吏多出於郎中郎中吏二千石子弟未必賢也王吉言舜湯不用三公九卿之世而舉臯陶伊尹不仁者逺今使俗吏得任子弟率多驕驁不通古今至於積功治人亡益於民此伐檀所為作也宜明選求賢除任子之令外家及故人可厚以財不宜居位哀帝元年除任子令先公曰漢二千石任職二年得任其子若同産蓋有八九嵗為郎備宿衛者朝夕左右與聞公卿議論執戟殿陛中郎將以兵法部屬之而淳厚有行者光祿勳嵗課第之時出意上書疏足以禆缺失而天子亦因以習知其性而識其才之能否自郎選為縣令自大夫選為守相或持節四方天子時課其功而召之入蓋上之久留意其選而法制使之然也西漢任子入仕蘇武以父任為郎劉向以父任為輦郎孔光子男放為侍郎董恭為御史任賢為太子舍人蕭育以父任為太子庶子史丹九男皆以丹任為侍中汲黯以父任為太子洗馬史丹馮野王皆以父任為太子中庶子伏湛以父任為博士弟子辛慶忌以父任為右校丞杜延年以三公子補軍司空虎賁諸郎皆父死子代右父任霍去病任光為郎楊惲以忠任為郎袁盎兄噲任盎為郎中右兄任成帝時侯霸以族父任為太子舍人趙兼淮南王舅子由以宗家任為郎右宗家任元始二年龔勝邴漢乞骸骨策曰其上子若孫若同産子一人所上子男皆除為郎右致仕任安帝建光元年以公卿校尉尚書子弟一人為郎舍人東漢任子入仕桓郁桓焉周協耿秉馬廖宋均黃瓊袁敞黃琬臧洪何休延熹中宦官方熾任及子弟為官布滿州縣按任子法始於漢而其法尤備於唐漢唐史列傳中凡以門蔭入仕者皆備言之獨魏晉南北史不言門蔭之法而列傳中亦不言以門蔭入仕之人何也蓋兩漢入仕之途或從辟召或舉孝亷至隋唐則專以科目取人所以漢唐之以門蔭入仕者皆不由科目與辟召者也自魏晉以來始以九品中正為取人之法而九品所取大槩多以世家為主所謂上品無寒門下品無世族故自魏晉以來仕者多世家逮南北分裂凡三百年而用人之法多取之世族如南之王謝北之崔盧雖朝代推移鼎遷物改猶卬然以門地自負上之人亦緣其門地而用之故當時南人有三公之子傲九棘之家黃散之孫蔑令長之室之説北人亦有以貴襲貴以賤襲賤之説往往其時仕者或從辟召或舉孝亷雖與兩漢無異而所謂從辟召舉孝亷之人則皆貴胄也其起自單族匹士而顯貴者蓋所罕見當時既皆尊世胄而賤孤寒故不至如後世之誇特起而鄙門蔭而史傳中所以不言以蔭敘入官者蓋所以見當時雖以他途登仕版居清要者亦皆世家也唐制凡用蔭一品子正七品上二品子正七品下三品子從七品上從三品子從七品下正四品子正八品上從四品子正八品下正五品子從八品上從五品及國公子從八品下餘見舉官門宋太祖皇帝乾德元年詔減每嵗奏補千牛齋郎之額自今臺省六品諸司五品登朝第二任方得蔭補止齋陳氏曰唐制禮部簡試太廟齋郎郊社齋郎文資也兵部簡試千牛備身及太子千牛武資也蓋文武蔭補之制自後唐天成三年和凝奏齋郎嵗以三十人為限同光二年奏千牛左右仗各六員嵗以十二員為限至是減之嵗凡補二十五員恭惟藝祖初定任子之法臺省六品諸司五品必嘗登朝歷兩任然後得請不請者則不補矣太宗淳化始因改元恩霈文班中書舍人武班大將軍以上並許蔭補如遇轉品即許更蔭一子而奏薦之廣自此始至道二年始有壽寧節推恩之令則聖節奏薦自此為例大中祥符元年始有東封禮畢推恩之令則郊禋奏薦自此為例前朝患之纍嘗裁定聖節奏薦自嘉祐元年罷今惟郊禋如故至於致仕遺表之恩凡與者皆特典也而後亦為定制至熙寧始裁定諸衛將軍諸司副使纍奏不得過二人非任路分都監差遣即須入仕三十年方聼奏薦而限年限員之法立宣和四年中大夫至帶職朝奉郎入官十五年諸衛大將軍至武翊大夫入官二十年宣和四年九月二十九日敕內侍官武功大夫至武翊郎纍奏不得過二人逮於孝宗法度益嚴淳熙九年更務裁抑始立遇郊蔭補恩澤正數宰相十人開府儀同三司以上同執政八人侍從六人觀察使至節度使侍御史同中散大夫至中大夫右武大夫及至通侍大夫同帶職朝奉郎朝儀大夫三人武翊大夫至武功大夫同致仕遺表恩澤文臣見任宰相八名舊十二名曽任宰執七名舊十名見任執政六名舊九名曽任執政謂帶職者五名舊七名在內侍從在外待制以上或不帶職大中大夫以上二名舊二名無遺表止得致仕者侍御史舊二名中散中奉至中大夫舊二名朝奉郎至朝議大夫一名武臣見任使相七名舊九名曽任使相六名舊八名見任執政太尉謂許依執政官例者六名舊七名曽任執政節度使五名舊七名諸衛上將軍至承宣使四名舊五名觀察使三名舊四名通侍大夫二名舊四名正侍至右武大夫舊二名諸衛大將軍武功至武翊大夫一名遙郡同又詔齋郎每嵗以十五人為額取年貌合格誦書精熟者充覆試不如所奏三司坐之真宗大中祥符二年詔應以門蔭授京官年二十五以上求差使者當令於國學聼習經書以二年為限仍令審官院與判監官考試訖以名聞既而引對大理評事錢象中太常寺舉禮郎陳宗紀並以學業未精令且習讀俟次年引對又詔已有官而再奏者至所合授止又詔鎖廳就試至禮部不合格者停見任詳見舉士門石林葉氏曰祖宗時見任官應進士舉謂之鎖廳雖中選止令遷官而不賜科第不中則停見任其愛惜科名如此淳化三年滁州軍事推官鮑當等應舉合格始各賜進士及第自是遂皆賜第七年幸南京詔文武臣僚逮事太祖者賜一子恩澤初轉運使辭日皆得奏一人天禧後唯川廣福建路始聼餘路再任者始得奏焉仁宗慶厯中大減恩蔭制入仕之路罷聖節奏蔭恩例學士以下遇郊恩許奏大功以上親再遇郊許奏小功以下親蔭長子孫皆不限年諸子孫須年過十五若弟姪須過二十必五服親乃得蔭已嘗蔭而物故者無子孫祿仕聼再蔭自是任子之恩殺矣英宗登極四方監司州守賀即位押貢奉人悉命以官知諫院司馬光言監司太守遣親屬奉表至京師者不問官職髙下親屬逺近一例推恩乃至班行幕職權知州軍或所遣之人非親屬者亦除齋郎差使殿侍此蓋國初承五代姑息藩鎮之弊大臣因循故事不能革正國家爵祿本待賢才及有功效之人今使此等無故受官誠為太濫今縱不能盡罷其進表人若五服內親者或乞等第授以官其無服及非親屬者並量賜金帛罷去庶少救濫官之失時以詔令已行不從英宗慨然思革天下之弊時方患官冗言者皆謂由三嵗一磨勘其進甚亟稍遷以至髙位故獲蔭者衆乃令自今待制以上自遷官後六嵗無過遷之有過益展年至諫議大夫止京朝官四嵗磨勘至前行郎中止少卿監限七十員員有闕以前行郎中久次者補之少卿監以上遷官聼旨神宗熙寧四年中書言蔭補者免試注官多不習事以致失職試者又須限年二十五才者既滯所試又止律詩豈足甄才及已受任而無勞可書亦無薦者法當再試書判三道亦成虗文今請守選者嵗以二月八月試斷案二或律令大義五或議三道法官同銓曹官撰式考試第為三等上之中書上等免選注官優等依判超例升資無出身者賜之試不中或不能試滿三嵗亦許注官惟不得入縣令司理司法自是更不試判仍除去免選恩格若歷任有舉者五人自與免試注官其蔭補人亦罷試詩年及二十許自言而試斷案律義及議應格即許注官優等亦賜出身試而不中或不能試年及三十自許參注若年及二十授官已及三年出官亦不用試若秩入京朝即展任監當三年在任有二人薦之免展詔悉從之舊制蔭補初赴選皆試律暨詩已仕而無勞績舉薦及無免試恩皆試判更制以後暨試律義斷案議後又增試經義中選者皆得隨銓擬注其入優等者往往特旨擢賜進士出身熙寧初裁損奏蔭之法自宰相使相而下併及宫掖外戚遞有減損舊制諸妃遇聖節奏親屬一人間一年許奏三人郊禮許奏一人今定諸妃每遇聖節并郊許奏有服親一人舊制皇親妻兩遇郊許奏親屬一人今罷舊制郡縣主遇郊許奏親生子及其夫之親今只許奏親子舊制臣僚之妻為國夫人者得遺表恩今除之舊制公主每遇聖節郊禮許奏夫之親屬一人并遇公主生日許奏一人今罷生日恩聖節許奏有服親按熙寧所裁損奏蔭之法先自妃嬪公主始此法之所以必行外如皇親妻及命婦郡縣主所蔭其恩尤濫故並抑之而聖節奏蔭恩例則仁宗時已罷之往往行之於臣僚而未嘗行之於妃主至此方有施行然亦但裁抑其濫及者而未嘗盡罷此例云五年曽布等言中外臣僚陳請恩澤未有定制今欲見任二府許乞差遣一人宰相樞密使兼平章事因事罷者陳乞轉官一人指射差遣一人餘以次有差徽宗宣和元年侍御史張汝舟言奏補之法有太濫者有太吝者今法所該奏補與先朝同而所從該奏者異昔之官至大夫歷官不下三五十年而今之出官有閲三五年間已至大夫者矣文武官至大夫既易且速其來日衆而奏補未嘗限年此所以為太濫也朝請至朝奉郎得致仕恩雖亡殁在給敕後皆得蔭補至若中大夫以下及武功武翼大夫已求致仕而受敕不在生前者乃格其恩不與於是有以疾危而致仕身謝而未受敕者則其家往往匿哀須限仍以不及親授不與霑恩者多矣此所以為太吝也欲乞文武官雖遇郊當蔭文入官不及十五年武入官不及二十年皆未許蔭補以抑其太濫至於文武官及大夫以上嘗乞休致而身謝在出敕前並許奏蔭以補其所不及詔除寺監長二至開封少尹係用職事蔭補不合限年餘悉從之司諫李會言比年大臣子弟僅能勝衣即簉從列遇大禮亦得奏補其稚年顯貴身既濫矣未有子而移蔭他人是疊濫也請待制以上無出身人須年及三十通歷任及十年者遇郊許奏從之其後朱勝非追記當時權臣欺君濫恩其言曰祖宗舊制宰執子弟例不堂除只於銓部注擬罷政不以罪則推恩遷擢蓋二府號表則之地不阿其親當以身率故也趙普子弟皆官右列普再相長子遂受莊宅使元祐中范純仁再相子正平博學有文行未嘗出官竟死選調紹聖中章惇作相九年子援及持皆髙第有學問士論推許並為州縣幕職監當官惟是仁宗朝夏竦子安期以纍任邊帥授待制直學士熙寧間王安石薦其子雱為崇政殿説書除待制後因三經義成遷直學士力辭不受然安期猶有才幹雱猶有學問至蔡京拜相不數年子六人孫四人同時為執政從官宰相鄭居中子修年億年劉正夫子皂民阜民余深子日章兄清王黼子閎孚白時中子彥暉執政蔡卞子仍鄧洵仁子襄鄧洵武子雍並以曲恩幸例列於從班而阜民襄閎孚尤懦騃或始十餘嵗宣和末諫官李會疏論以為尚嬉竹馬已獲荷囊未應娶婦已得任子時亦覺其太濫遂免奉朝而列侍從如故髙宗建炎元年李綱言宣靖以來宰相子悉以恩澤至待制雜學士乃詔宰執子弟任待制已上者並罷紹興四年太尉神武右軍都統制張俊乞以明堂恩任子宗元文資吏部言有礙條格詔特許之武臣非使相而以文資祿子孫者自是為例中書舍人趙思誠言孤寒之士名在選部皆待數年之闕大率十年而不得一任今親祠之嵗任子約四千人是十年之後增萬二千員科舉取士不與焉將見寒士有三十年不得調者矣祖宗朝祕書監今之中大夫也諸寺卿今之中奉中散大夫也仕至此者皆實以年勞功績得之年必六十身不過得恩澤五六人政和宣和之後私謁行橫恩廣有年未三十而官至大夫者數員比祖宗時不知其幾倍而恩例未嘗少損有一人而任子至十餘者此而不革實政事之大蠧也望特旨侍從官共議所以革弊之術示之以至公斷之以必行詔下其議會思誠去國議遂格二十二年右諫議大夫林大鼐言武臣多出軍中爵秩多而族姓少凡有奏薦同姓皆期功異姓皆中表閭巷之徒附會以進寨帥柵長利其髙資有司不能詰其端他人不能伺其隙請自今須經統轄長官結罪保明詭冒者連坐之孝宗即位慨然思革冗官之弊初詔百官任子者遇郊恩權免奏薦年七十人遇郊不許奏子俄又詔未奏者許一名乾道九年詔武臣嘗任執政官遇郊聼補文資於是恩數視執政者亦得之蓋戚里宗王與夫攀附之臣皆爭以文資祿其子不可復正矣寧宗嘉泰初言者以官冗恩濫諸宗女夫授官者依舊法終身只任一子兩府使相不得以郊恩奏門客著為令慶元蔭補新格使相以上十人執政官太尉八人文官大中大夫以上及侍御史武臣節度承宣觀察使六人文臣中散大夫以上武臣防團刺史及橫行四人文臣帶職朝郎以上武臣正使三人致仕遺表文臣前宰相見任三少使相共八人曽任三少使相七人曽任執政官六人大中大夫以上二人武臣使相已上八人節度使六人承宣使五人觀察使四人文臣中大夫武臣防禦使已下並不得推遺表恩先是紹興初中書舍人趙思誠嘗上任子限員之議詔從官討論申省淳熙九年八月庚子始用廷臣集議行之既而從官有身前已奏六人而身後推恩為吏部所格者開禧末議者有請乃詔致仕遺表恩澤在限員之外若非泛恩澤則概不許云謂監司帥臣遇有恩及泛使出疆之類銓試者舊有之凡任子若同進士出身之人皆赴建炎兵火後權停紹興三年始復舊無出身人許習經義詩賦時議或刑統義斷案十三年九月詔兼試二場惟有出身人試律如故其任子之在蜀者舊法令益梓兩路漕司輪年分春秋銓試乾道二年從知蜀州楊民望之請委制置司主之後有降敕差監試考試官惟蜀士同出身之在東南者則免銓試故事春秋再試十人而取七乾道二年後上春試二人而取一紹熙末議者病其寡學乃請三人而取一後三年謝用光為吏部侍郎上言今世祿之家已留意學問請復舊制詔許焉今蜀中銓試甚寬凡假手者率費七百緡又勢要子孫鮮不與選或謂宜悉赴吏部然吏部亦不免此要當如祖宗時先試而後命可也舊銓試未合格者許堂除淳熙中孝宗始嚴其令八年八月趙衛公帥瀘奏其子昱書寫機宜文字既受敕矣木待問藴之在西掖緣他事以未銓試為言遂寢其命紹熙元年八月計司葉衡又奏乞中選人就吏部長二廳前簾試試中然後許參選小經義一首或小賦或省題詩一首明年四月吏部條具如所奏內同進士出身并恩科人更不簾試仍下四川制置司一體施行從之黃子由時為考功郎官建言今已增試律義自不須更簾試大臣進呈光宗曰簾試以革代筆之弊正當加嚴豈可廢也三年八月謝子肅侍郎又言銓試不中四十以上注殘零闕人乞令郎官就長二廳寫律一條俾之解釋如或不通未得參注從之始任子降等補文學者與恩科人皆免銓試孝宗以為非是亦命試焉惟宗室子銓試則終場無雜犯者皆出官蓋朝廷優天屬之意廣東西漕司舊亦有銓試乾道八年罷之乾道元年吏部尚書葉顒上言選人差注格法堂除賞典並在中銓人之上比年以來調官者急於請謁而堂除不勝其多在官者巧於經營而賞典不勝其濫至於銓試號為公選舊來一嵗二試十取其七今乃從而損之嵗止一試十取其五夫其嚴且難如此而注授之際乃為多且濫者所升壓非所以為平也上從其議命更法焉淳熙十二年臣僚言比年銓試有以國戚而與宫觀有以勳閥而與差遣問嘗中銓乎曰未也臣聞古之行法必自貴近始捨貴近而行於踈逺則天下不服法行而天下不服則法廢矣請明詔執事自今一時除授未察其中否者令吏部條具來上未中者許給舍繳駮臺諫彈罷雖宫觀嶽祠帶貼職者亦在所不與蓋貼職者天子之優恩非可假此以免試也嶽祠宫觀臨民之漸也不中銓試不以貼職而出官不以嶽祠宫觀而臨民則幸塞矣從之文獻通考卷三十四
