body:
  text: 文獻通考卷六十九鄱陽馬端臨貴與著郊社考二郊成王以周公為有勲勞於天下命魯公世世祀周公以天子之禮樂是以魯君孟春乘大路載弧韣旂十有二旒日月之章祀帝於郊配以后稷天子之禮也大路殷之祭天車弧旌旂所以張幅也其衣曰韣天子之旂畫日月趙伯循曰郊者所以事上帝也魯曷為之周公故也不於日至避王室也卜用夏正於農耕之始也郊特牲疏曰魯之郊祭師説不同崔氏皇氏用王肅之説以魯冬至郊天至建寅之月又郊以祈穀故左傳云啓蟄而郊又云郊祀后稷以祈農事是二郊也若依鄭康成之説則異於此也魯唯一郊不與天子郊天同月轉卜三正故穀梁傳云魯以十二月下辛卜正月上辛若不從則以正月下辛卜二月上辛若不從則以二月下辛卜三月上辛若不從則止故聖證論馬昭引穀梁傳以答王肅之難是魯一郊則止或用建子之月則宣三年正月郊牛之口傷是也或用建寅之月則春秋左傳云郊祀后稷以祈農事是也若杜預不信禮記不取公羊穀梁魯唯有建寅郊天及龍見而雩石林葉氏曰明堂位曰魯君孟春祀帝於郊配以后稷季夏六月以禘禮祀於太廟鄭氏以孟春為建子之月季夏為建已之月盖用周正非也郊特牲曰郊之祭也迎長日之至也又曰郊之用辛也周之始郊日以至鄭氏謂證易説以三王之郊一用夏正為建寅之月迎長日為建卯之月晝夜分分而日長以日至為魯禮亦非也且冬至之日祭天於地上之圜丘此周之正禮不可得而易者也孟春建寅之郊盖祈穀之祭爾魯雖得郊不得同於天子是以故使因周郊之日以次上辛三卜不從至建寅之月而止乃不郊書於春秋者甚明則魯郊殆周祈穀之郊而已故左氏以謂啓蟄而郊安得孟春為建子乎孟春為建寅則所謂季夏六月者建未之月也郊特牲以郊為迎長日之至而謂郊之用辛周之始郊日以至正以别魯禮而鄭氏反之强以建卯為日至甚矣先儒之好誣也雜記曰孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也盖謂魯不得郊日至故仲孫蔑欲取建未夏至而禘以配周郊祖所以記其失何與六月之禘乎凡周之政事大抵皆用夏正盖天時有不可亂故周官毎以正嵗别之易説言三王之郊一用夏正為建寅亦無據鄭氏取以為證徒以成其説爾鄭氏本不曉郊禘之辨故以冬至之祭為大禘以祈穀為正郊此其言所以紛紛雖詩之雍與長發亦豈得其正也魯人將有事於上帝必先有事於頖宫先有事於頖宫告后稷也魯以周公之故得郊祀上帝與周同吿吿者將以配天先仁也頖宫郊之學也春秋僖公三十一年夏四月四卜郊不從乃免牲猶三望三望分野之星國中山川皆因郊祀望而祭之魯廢郊天而修其小祀故曰猶猶者可止之辭左氏曰牛卜日曰牲既得吉日則牛改名曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也公羊子曰三卜禮也四卜非禮也三卜何以禮四卜何以非禮求吉之道三曷為或言免牲或言免牛免牲禮也免牛非禮也免牛何以非禮傷者曰牛養牲不謹致有災傷天不饗用不得復為天牲故以本牛易之三望者何望祭也然則曷祭祭泰山河海趙伯循曰公穀云四卜非禮四月不時左氏公穀皆云譏猶三望卜郊不從而免牲是知不郊故不云不郊宣公三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望公羊子曰曷為不復卜養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在於滌三月滌宫名養帝牲三牢之處也謂之滌者取其蕩滌潔清三牢各主一月取三月一時足以充其天牲於稷者惟具是視視其身體具無災害而已不特養於滌宫所以降稷尊帝成公七年春王正月鼷䑕食郊牛角改卜牛鼷䑕乂食其角乃免牛夏五月不郊猶三望十年夏四月五卜郊不從乃不郊穀梁云五卜强卜也十七年九月辛丑用郊公羊子曰九月非所用郊也郊用正月上辛襄公七年夏四月三卜郊不從乃免牲左氏孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也纂例曰三卜禮也四月不時也十一年夏四月四卜郊不從乃不郊定公十五年春王正月鼷䑕食郊牛牛死改卜牛夏五月幸亥郊五月不時也趙氏曰予卑年常怪鼷䑕食郊牛致死上元二年因避兵旅於會稽時有水旱疫癘之苦至明年而牛災有小䑕能噬牛纔傷其皮膚乃無有不死者哀公元年鼷䑕食郊牛角改卜牛夏四月辛巳郊穀梁子曰此該郊之變而道之也於變之中又有言焉鼷䑕食郊牛角改卜牛志不敬也郊牛日展觓角而知傷展道盡矣郊自正月至於三月郊之時也夏四月郊不時五月郊不時也夏之始可以承春以秋之末承春之始益不可矣九月用郊用者不宜用也在成十七年郊三卜禮也四卜非禮也僖三十一年襄十一年皆四卜五卜强也成十年五卜卜免牲者吉則免之不吉則否牛傷不言傷之者傷自牛作也故其辭緩宣三年郊牛之口傷以牛自傷故加之言緩辭全曰牲傷曰牛未牲曰牛其牛一也其所以為牛者異巳卜日成牲而傷之曰牛未卜日未成牲之牛有變而不郊故卜免牛也已牛矣其尚卜免之何也禮與其亡也寧有嘗置之上帝矣故卜而後免之不敢専也嘗置之滌宫名之為上帝牲矣故不敢擅施也卜之不吉則如之何不免安置之繫而待六月上甲始庀牲然後左右之庀具也待具後牲然後左右前牛在我用之不復湏卜已有新牲故也周禮司門掌授管鍵以啓閉國門祭祀之牛牲繫焉然則未左右時監門者養之子之所言者牲之變也而曰我一該郊之變而道之何也我以六月上甲始庀牲十月上甲始繫牲十一月十二月牲雖有變不道也牲有變則改卜牛以不妨郊事故不言其變我疏曰上言子者弟子問穀梁子辭而曰者是弟子述穀梁子自我之意待正月然後言牲之變此乃所以該郊至郊時然後言其變所必重其妨郊也子不志三月卜郊何也三月謂十二月正月二月也郊自正月至於三月郊之時也有變乃志常事不書我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣意欲郊而卜不吉故曰不從郊必用上辛者取其新潔莫先也四月則不時矣孔子曰我觀周道幽厲傷之吾舎魯何適矣魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也先祖法度子孫所當守横渠張氏曰杞宋之郊則為其二王之後也魯用天子之禮樂必是成王之意不敢臣周公即以二王之後待魯然而非周公本意也以成王尊徳樂道之心則善矣伯禽不當受故曰魯之郊禘非禮也周公其衰者謂周公必不饗其祀三山林氏曰春秋郊望之㫖三傳諸儒之説無得之者無他知求小禮而昧於大禮故也經書郊者九皆為有故而書非因卜不吉而廢郊則因牲死傷而廢郊又有不待卜之吉而特郊者雖牛之死傷而必郊者因卜不吉而廢郊則若僖三十一年夏四月成十年夏四月襄公七年夏四月十一年夏四月是也因牲死傷而廢郊者則若宣三年正月成七年正月是也有不待卜之吉而特郊者則若成十七年九月辛丑用郊是也有牛雖死傷而必郊者則若定十五年正月哀元年春正月是也先儒之説不過罪其屢卜與其養牲不謹爾不知聖人書郊乃惡其非禮之大者至屢卜之瀆養牲之慢非春秋所責也學者欲究聖人之㫖先當斷魯郊之當否未暇及其瑣瑣也夫子傷周之衰禮樂自諸侯出其言魯之郊禘則有周公其衰之歎豈有天子郊天諸侯亦郊天子望祀山川諸侯亦望天子禘祖之所出諸侯亦禘使諸侯亦可行則聖人不以禮樂自諸侯出為傷自夫子沒漢儒不知道者但見春秋書魯祭祀多天子之禮始妄設周賜禮樂之説所以諸儒不以魯郊為非捨其非禮之大者求其不合禮之小者魯人既僭竊禮樂罪莫重焉就使無四卜五卜瀆禮之過則可以郊乎否乎又使養牲必謹不至死傷則亦可郊乎否乎魯人郊望無時可也何區區者之足論然周郊以冬至而魯用之於啓蟄天子四望而魯三之名為後時降殺但竊郊望之名已有罪矣譬如商賈冠師儒之冠庶人服卿相之服望其容飾已知其非分越制也予謂春秋所書之㫖正以有故而不郊者為幸無故而郊者為大罪也季氏旅於泰山夫子曰曾謂泰山不如林放乎泰山有知必不享季氏之祭矧上帝而可謟乎宜乎至於三卜四卜五卜不從鼷䑕屢食其牛可見天心之不享也魯人曾不知得罪於天雖屢卜不從而猶三望雖牛死而改卜牛甚者至於用郊可知僭擬之心不能自己下破王制上拂天心其罪為大也聖人發憤作春秋書其因變故而不郊者僅如此其餘非卜不從牛死傷而肆意於僭者又不知其幾也深味聖師之㫖曰猶三望曰乃免牲其深矣乎其微矣乎學者思之蔣氏曰魯不得用天子禮樂是成王過賜而伯禽受之非也夫以伯禽受之為非而成王之時禮典未壊不應有是過賜之事識者又從而為之説曰賜非成王是周之末王賜之也昔者魯恵公使宰請郊廟之禮於天子天子使史角往止之使成王之世而魯已郊則恵公奚請惠公之請殆由平王以下也是説然矣自今言之聖人觀周道而傷幽厲論郊禘而衰周公則重祭賜魯豈盛時賢君事其出於衰世天子諸侯無疑也故聖人恥魯之事而因及杞宋之郊杞之郊也存禹後也宋之郊也存商後也是宜以禹契而配天周祀未絶魯以周公配天於周公能無愧於后稷太王王季文王乎是周公之所弗居故曰祝嘏莫敢易其常告是謂大假假亦大也祭之始也祝以主人之辭而告神祭之終也嘏以神之辭而致福於主今以諸侯僭天子之祭事不因其常告則忠孝報反之義名稱位號之别將有所紊亂變更而失其宜矣按先儒論魯郊祀之非如林少頴謂三傳所譏捨其非禮之大者求其不合禮之小者其論正矣然遂以為非出於成王之命特漢儒見春秋所書魯祭祀多僭天子之禮始妄設周賜禮樂之説至蔣氏遂直以為出於惠公之請則愚未敢以為然盖春秋之際雖諸侯不無上僭然茍非如楚及吳越之流介處蠻貊自放於禮義之外者則亦不敢奄然以天子之制自居雖以五伯盛時晉侯之請隧楚子之問鼎如襄王及王孫滿尚能引正義以責之不聞晉楚之君遽至於用隧而求鼎也僭郊之事大於請隧問鼎矣惠公當平王之時王室雖弱其陵夷不至於後來之甚魯又素為秉周禮之國夫子嘗稱其一變可以至道孰謂惠公於是時而敢以僭郊為請王使史角止之而不從魯由此而僭郊則惠公之暴横無君過於晉文楚莊矣決不然也横渠以為成王之意不敢臣周公故以二王之後待魯而命以禮樂特伯禽不當受此説得之明堂位成王以周公為有勲勞於天下命魯公世世祀周公以天子之禮樂是以魯君孟春乘大路載弧韣十有二旒日月之章祀帝於郊配以后稷天子之禮也祭統昔者周公旦有勲勞於天下成王康王追念周公勲勞而欲尊魯故賜以重祭外祭則郊社是也内祭則大嘗禘是也夫所謂祀周公以天子之禮樂者如樂用宫懸舞用八佾以天子所以祭其祖者用之於周公之廟謂之尊周公可也至於郊祀后稷以配天禘者禘其祖之所自出而以其祖配之則非諸侯之所當僭且郊禘所祀元未嘗及周公則何名為報周公之勲勞而尊之乎以其祖宗之勲勞而許其子孫僭天子之禮樂以祭之已非矣况所祀者乃天子之太祖而本非有勲勞之臣乎先儒議此但謂周公有知決不歆非禮僭竊之祀而不知僭郊僭禘則其所祀本不及周公不知成王何名而賜之伯禽又何名而受之乎禮運孔子曰魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也横渠因此遂以為成王念周公之勲勞不敢臣之故以二王之後待魯往往當時事情亦是如此愚嘗因是而考論之禮制之陵夷非一朝夕之故其所由来者漸矣盖周之封杞宋也以其為二王之後俾之修其禮物作賓於王家以奉禹契之祀而禹契天子之祖也不可以諸侯之太祖祀之故許其用天子之禮然特許其用天子之禮祀禹契之廟未必許其郊天也夷王以下君弱臣強上陵下僭杞宋因其用天子之禮樂於禹契之廟而禹契則配天之祖也遂併僭行郊祀上帝之禮焉此夫子所以有天子事守之嘆也至於魯則周公本非配天之祖而稷嚳之祀元未嘗廢無藉於魯之郊禘也乃因其可以用天子之禮樂於周公之廟而併效杞宋之尤則不𩔖甚矣其後三桓遂至八佾舞於庭豈無所自而然哉明堂位首言命魯公世世祀周公以天子之禮樂又云季夏六月以禘禮祀周公於太廟牲用白牡犧象云云即此二言觀之可見當時止許用郊禘之禮樂以祀周公未嘗許其遂行郊禘之祀後来乃至於禘嚳郊稷祀天配祖一一用天子之制所謂穿窬不戢遂至斬闗作俑不止遂至用人亦始謀之未善有以肇之也左傳宋公享晉侯於楚邱請以桑林註桑林殷天子之樂名荀罃辭荀偃士匄曰諸侯魯宋於是觀禮魯有禘樂賓祭用之宋以桑林享君不亦可乎乃知魯宋不特僭天子之禮樂以祀郊禘雖燕享賓客亦用之矣秦始皇既并天下以昔文公出獵獲黑龍此其水徳之瑞用十月為嵗首色尚黑音尚大呂大呂音律之始東游海上禮祀八神具雜祠篇二代尊雍四畤上帝春以脯酒為嵗祠禱因泮凍秋涸凍冬賽祠五月嘗駒及四中之月月祠畤駒四匹每畤用駒四匹而春秋異色木寓龍一駟寓寄也寄生龍形於木也駟亦四龍木寓車馬一駟各如其帝色黄犢與羔各四珪幣各有數皆生瘞無俎豆之具三年一郊常以十月上宿郊見秦以十月為嵗首故上宿上齋戒也通權火張晏曰權火㷭火也狀若井桔橰其法𩔖稱欲令光明逺照通於祀所漢祀五畤於雍五十里一㷭火望師古曰凡祭祀通舉火者或以天子不親至祠所而拜或以衆祠各處欲其一時薦享宜知早晏故以火為之節度也拜於咸陽之旁而衣尚白其用如常時經焚書坑儒後更無典禮祠享用木寓龍木寓馬不知何慿如此乖謬初秦襄公攻戎救周始列為諸侯居西垂漢隴西郡西縣今在秦州上封縣西南九十里自以為主少皥之神作西畤祠白帝其牲用騮駒黄牛牴羊各一云其後十六年秦文公東獵汧渭之間卜居之而吉文公夢黄蛇自天下屬地其口止於鄜衍鄜屬馮翊山阪曰衍史敦曰此上帝之徵君其祠之於是作鄜畤用三牲郊祭白帝焉其未作鄜畤也而雍旁故有吴陽武畤雍東有好畤皆廢無祠或曰自古以雍州積高神明之隩故立畤郊上帝諸神祠皆聚云盖黄帝時常用事雖晩周亦郊焉其語不經見搢紳者不道作鄜畤後七十八年秦徳公既立卜居雍後子孫飲馬於河遂都雍雍之諸祠自此興用三百牢於鄜畤索隱曰百當為白秦君西祀少皥牲尚白牢秦諸侯也雖奢侈僭祭郊本特牲不可用三百牢以祭天盖字誤也徳公立二年卒其後六年秦宣公作密畤於渭南祭青帝其後秦靈公作吴陽上畤祭黄帝徐廣曰凡去作宻畤二百五十年作下畤祭炎帝索隱曰吴陽地名盖在嶽之南又上云雍旁冇故吴陽武畤今盖因武畤又作上下畤以祀黄帝炎帝櫟陽雨金秦獻公自以為得金瑞故作畦畤櫟陽而祀白帝晉灼曰漢註在隴西西縣人先祠山下形如種韭畦索隠曰漢舊儀云祭人先於隴西西縣人先山山上皆有土人山下有畤如種韭畦畦中各有二十封故云畦畤其後百二十嵗而秦滅周漢髙祖二年東擊項籍而還入闗問故秦時上帝祠何帝也對曰四帝有白青黄赤帝之祠髙祖曰吾聞天有五帝而今有四何也莫知其説於是高祖曰吾知之矣乃待我而具五也乃立黑帝祠命曰北畤有司進祠上不親往詔曰吾甚重祠而敬祭今上帝之祭及山川諸神當祠者各以其時禮祠之如故文帝十三年制曰朕賴宗廟之靈社稷之福方内艾安民人靡疾間者比年登朕之不徳何以饗此皆上帝諸神之賜也盖聞古者饗其徳必報其功其增諸神祠有司議增雍五畤路車各一乘駕被具駕車被馬之飾皆具西畤畦畤寓車各一乘寓馬四匹駕被具十四年詔曰朕獲執犧牲珪幣以事上帝宗廟十四年於兹歴日彌長以不敏不明而久撫臨天下朕甚自媿其廣增諸祀壇塲珪幣昔先王逺施不求其報望祀不祈其福右賢左戚先民後已至明之極也今吾聞祠官祝釐皆歸福於朕躬不為百姓朕甚媿之夫以朕之不徳而専享獨美其福百姓不與焉是重吾不徳也其令祠官致敬無有所祈十五年黄龍見成紀詔曰有異物之神見於成紀毋害於民嵗以有年朕幾郊祀上帝諸神幾讀曰冀禮官議毋諱以朕勞無諱以朕為勞自言不以為勞也有司皆曰古者天子夏親郊祀上帝於郊故曰郊於是夏四月帝始幸雍郊見五畤祠衣皆尚赤又採新垣平之説立渭陽五帝廟見五帝門十六年夏四月上郊祀五帝於渭陽祠所用及儀亦如雍五畤武帝元光二年行幸雍郊見五畤後常三嵗一郊後亳人謬忌奏祠泰一方曰天神貴者泰一泰一佐者五帝古者天子以春秋祭泰一東南郊日一太牢七日每日以一太牢凡七日祭也為壇開八通之鬼道於是天子令太祝立其祠長安城東南郊常奉祠如忌方其後人上書言古者天子三年一用太牢祠三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方五年郊雍獲一角獸若麃然麃鹿屬也形似牛尾一角有司曰陛下肅祗郊祀上帝報享賜一角獸盖麟云於是以薦五畤畤加一牛以燎或言五帝泰一之佐宜立泰一而上親郊之上疑未定齊人公孫卿言黄帝采首山銅鑄鼎於荆山下鼎既成有龍下迎帝上仙事於是天子曰嗟乎誠得如黄帝吾視去妻子如脱屣耳拜卿為郎使東候神於太室上遂郊雍至隴西登崆峒幸甘泉令祠官寛舒等具泰一祠壇祠壇放亳忌太一壇三陔五帝壇環居其下各如其方黄帝西南除八通鬼道泰一所用如雍一畤物而加醴棗脯之屬殺一氂牛以為俎豆牢具而五帝獨有俎豆醴進其下四方地為腏食羣神從者及北斗云已祠胙餘皆燎之其牛色白白鹿居其中彘在鹿中鹿中水而酒之祭日以牛祭月以羊彘特泰一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至昒爽昒音忽未明之時也天子始郊拜泰一朝朝日夕夕月則揖而見泰一如雍郊禮其贊饗曰天始以寶鼎神策授皇帝朔而又朔終而復始皇帝敬拜見焉而衣尚黄其祠列火滿壇壇旁烹炊具有司云祠上有光公卿言皇帝始郊見泰一雲陽有司奉瑄玉嘉牲薦享是夜有美光及晝黄氣上屬天太史令談祠官寛舒等曰神靈之休祐福兆祥宜因此地光域立泰畤壇以明應令太祝領秋及臘間祠三嵗天子一郊見後嬖臣李延年以好音見帝善之下公卿議曰人間祠尚有鼓舞樂豈郊祠無樂豈稱乎公卿曰古者祠天地皆有樂而神祇可得而禮乃立樂府以延年為協律都尉論律吕合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至明夜嘗若有神光如流星止集於祠壇天子自竹宫遥拜以竹為宫去壇三里百官侍祠者數百人皆肅然心動郊祀歌十九章練時日一帝臨二青陽三朱明四西顥五元㝠六惟泰元七天地八日出入九天馬十元狩元年馬生渥洼水中而作天門十一景星十二元鼎五年得鼎汾隂作齊房十三元封二年芝生甘泉齋房作后皇十四華煜煜十五五神十六朝隴首十七象載瑜十八赤蛟十九元封二年冬郊雍五帝還拜祝祠泰一拜而祠之加祝詞贊饗曰徳星昭衍厥惟休祥壽星仍出淵燿光明信星昭見皇帝敬拜泰祝之享其年秋有星孛于東井後十餘日有星孛于三能讀曰台望氣王朔言候獨見鎮星出如𤓰食頃復入有司皆曰陛下建漢家封禪天其報徳星云徳星即鎮星言天以徳星報於帝太初二年有司言雍五畤無牢孰具芬芳不備廼令祠官進畤犢牢具色食所勝孟康曰若火勝金則祠赤帝以白牲也而以木寓馬代駒云及諸名山川用駒者悉以木寓馬代獨行過親祠乃用駒他禮如故宣帝神爵元年詔曰盖聞天子尊事天地修祀山川古今通禮也間者上帝之祠闕而不親十有餘年自大將軍霍光輔政上恭已南面非宗廟之祭不出朕甚懼焉朕親飭躬齋戒親奉祠為百姓䝉嘉氣獲豐年焉二年正月上始幸甘泉郊見泰畤數有美祥修武帝故事盛車服敬齋祠之禮頗作詩歌四年詔曰廼者鳳凰甘露降集京師嘉瑞並見修興泰一五帝后土之祠祈為百姓䝉祉福鸞鳳萬舉蜚覽翺翔集止於旁齋戒之暮神光顯著薦鬯之夕神光交錯或降於天或登於地或從四方来集於壇上帝嘉嚮海内承福其赦天下五鳳元年上幸甘泉郊泰畤二年上幸雍祠五畤甘露元年上行幸甘泉郊泰畤三年上行幸甘泉郊泰畤朝匈奴單于於甘泉宫黄龍元年上行幸甘泉郊泰畤元帝即位遵舊儀間嵗正月一幸甘泉郊泰畤又東至河東祠后土西至雍祠五畤凡五奉泰畤后土之祠亦施恩澤惠時所過毋出田租成帝建始元年十二月作長安南北郊罷甘泉汾隂祠帝初即位丞相匡衡御史大夫張譚奏言帝王之事莫大乎承天之序承天之序莫重於郊祀故聖王盡心極慮以建其制祭天於南郊就陽之義也瘞地於北郊即隂之象也天之於天子也因其所都而各饗焉往者孝武皇帝居甘泉宫即於雲陽立泰畤祭於宫南今行常幸長安郊見皇天反北之泰隂祠后土反東之少陽事與古制殊又至雲陽行谿谷中阸陿且百里汾隂則渡大川有風波舟楫之危皆非聖主所宜數乘郡縣治道共張吏民困苦百官煩費勞所保之民行危險之地難以奉神靈而祈福佑殆未合於承天子民之意昔者周文武郊於豐鄗成王郊於雒邑由此觀之天隨王者所居而饗之可見也甘泉泰畤河東后土之祠宜可徙置長安合於古帝王願與羣臣議定奏可大司馬車騎將軍許嘉等八人以為所從来久逺宜如故右將軍王商博士師丹議郎翟方進等五十人以為禮記曰燔柴於泰壇祭天也瘞薶於泰折祭地也兆於南郊所以定天位也祭地於泰折在北郊就隂位也郊處各在聖王所都之南北書曰越三日丁巳用牲於郊牛二周公加牲告徙新邑定郊禮於雒明王聖主事天明事地察天地明察神明章矣天地以王者為主故聖王制祭天地之禮必於國郊長安聖主之居皇天所觀視也甘泉河東之祠非神靈所享宜徙就正陽太隂之處違俗復古循聖制定天位如禮便衡又言甘泉泰畤紫壇八觚宣通象八方五帝壇周環其下又有羣神之壇以尚書禋六宗望山川徧羣神之義紫壇有文章采鏤黼黻之飾及玉女樂石壇僊人祠瘞鸞路騂駒寓龍馬不能得其象於古臣聞郊柴饗帝之義掃地而祭尚質也歌大吕舞雲門以竢天神歌大蔟舞咸池以竢地祇其牲用犢其席藁稭其器陶匏稭音戞皆因天地之性貴誠尚質不敢修其文也以為神祇功徳至大雖修精微而備庶物猶不足以報功唯至誠為可故尚質不飾以章天徳紫壇偽飾女樂鸞路騂駒龍馬石壇之屬宜皆勿修衡又言王者各以其禮制事天地非因異世所立而繼之今郊雍鄜宻上下畤本秦侯各以其意所立非禮之所載術也漢興之初儀制未及定即且因秦故祠復立北畤今既稽古建定天地之大禮郊見上帝青赤白黄黑五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當長遵及北畤未定時所立不宜復修天子皆從焉及陳寶祠由是皆罷二年正月辛巳上始郊祀長安南郊詔曰廼者徙泰畤后土於南郊北郊朕親飭躬郊祀上帝皇天報應神光並見三輔長無共張繇役之勞漢每上雍祠甘泉有千乘萬騎今移祀於南郊北郊故無供張繇役也赦奉郊縣長安長陵天郊在長安城南地郊在長安城北長陵界中二縣有奉郊之勤故一切並赦之及中都官耐罪徒減天下賦錢算四十永始三年冬十月皇太后詔有司復甘泉泰畤汾隂后土雍五畤陳寶祠作南北郊之明年匡衡坐事免官爵衆庶多言不當變動祭祀者又初罷甘泉泰畤作南郊日大風壊甘泉竹宫折㧞畤中樹木十圍以上百餘天子異之以問劉向向言家人尚不欲絶種祠種祠繼嗣所傳祠也况於國之神寶舊畤且甘泉汾隂及雍五畤始立皆有神祇感應然後營之非茍而已也武宣之世奉此三神禮敬勅備神光尤著祖宗所立神祇舊位誠未易動上意恨之後上以無繼嗣故令皇太后詔有司曰盖聞王者承事天地交接泰一尊莫著於祭祀孝武皇帝大聖通明始建上下之祀營泰畤於甘泉定后土於汾隂而神祇安之享國長久子孫蕃滋累世遵業福流於今今皇帝寛仁孝順奉循聖緒靡有大愆而久無繼嗣思其咎職殆在徙南北郊違先帝之制改神祇舊位失天地之心以妨繼嗣之福春秋六十未見皇孫食不甘味寢不安席朕甚悼焉春秋大復古善順祀其復甘泉泰畤汾隂后土如故及雍五畤陳寶祠在陳倉者天子復親郊禮如前四年春上行幸甘泉郊泰畤時成都侯王商為大司馬輔政杜鄴説商曰東隣殺牛不如西隣之禴祭言奉天之道貴以誠質大得民心也行穢祀豐猶不䝉祐徳修薦薄吉必大来古者壇塲有常處燎禋有常用贊見有常禮犧牲玉帛雖備而財不匱車輿臣役雖動而用不勞是故每舉其禮助者歡説大路所歴黎元不知今甘泉河東天地郊祀咸失方位違隂陽之宜及雍五畤皆曠逺奉尊之役休而復起繕治供張無解已時皇天著象殆可畧知前上甘泉先敺失道禮月之夕奉引復迷祠后土還臨河當渡疾風起波船不可御又雍大雨壊平陽宫垣廼三月甲子震電災臨光宫門祥瑞未著咎徴仍臻迹三郡所奏皆有變故不答不饗何以甚此詩曰率由舊章先王法度文王以之交神於祀子孫千億宜如異時公卿之議復還長安南北郊元延元年三月行幸雍祠五畤二年正月行幸甘泉郊泰畤時上郊祀甘泉泰畤汾隂后土以求繼嗣召揚雄待詔承明之殿承明殿在未央門正月從上甘泉還奏甘泉賦以風甘泉本因秦離宫既奢泰而武帝復增通天高光迎風宫外近則洪厓旁皇儲胥弩阹逺則石闗封巒枝鵲露寒棠梨師得遊觀屈竒瑰偉非木摩而不雕牆塗而不畫周宣所考盤庚所遷夏卑宫室唐虞採椽三等之制也且其為已久矣非成帝所造欲諫則非時欲黙則不能已故遂推而隆之廼上比於帝室紫宫若曰此非人力之所為儻鬼神可也又是時趙昭儀方大幸每上甘泉常法從在屬車間豹尾中故雄聊盛言車騎之衆參麗之駕非所以感動天地逆釐三神又言屏玉女郤虙妃以微戒齋肅之事賦成奏之天子異焉三年幸雍祠五畤四年幸甘泉郊泰畤綏和元年行幸雍祠五畤二年春正月行幸甘泉郊泰畤三月帝崩皇太后詔有司曰皇帝即位思順天心遵經義定郊禮天下説憙懼未有皇孫故復甘泉泰畤汾隂后土庶幾獲福皇帝恨難之卒未得其祐其復南北郊長安如故以順皇帝之意也哀帝建平三年寢疾乃令太皇太后詔有司曰皇帝孝順奉承聖業靡有懈怠而久疾未瘳夙夜唯思殆繼體之君不宜改作其復甘泉泰畤汾隂后土祠如故上亦不能親至遣有司行事而禮祠焉後三年帝崩平帝元始五年復南北郊罷甘泉汾隂祠大司馬王莽奏言王者父事天故爵稱天子孔子曰人之行莫大於孝孝莫大於嚴父嚴父莫大於配天王者尊其考欲以配天緣考之意欲尊祖推而上之遂及始祖是以周公郊祀后稷以配天宗祀文王於明堂以配上帝禮記天子祭天地及山川嵗徧春秋穀梁傳以十二月下辛卜正月上辛郊高皇帝受命因雍四畤起北畤而備五帝未共天地之祀孝文十六年用新垣平初起渭陽五帝廟祭泰一地祇以太祖高皇帝配日冬至祠泰一夏至祠地祇皆并祠五帝而共一牲上親郊拜後平伏誅廼不復自親而使有司行事孝武皇帝祠雍曰今上帝朕親郊而后土無祠則禮不答也於是元鼎四年十一月甲子始立后土祠於汾隂或曰五帝泰一之佐宜立泰一五年十一月癸未始立泰一祠於甘泉三嵗一郊與雍更祠亦以高祖配不嵗事天皆未應古制建始元年徙甘泉泰畤河東后土於長安南北郊永始元年三月以未有皇孫復甘泉河東祠綏和二年以卒不獲祐復長安南北郊建平三年懼孝哀皇帝之疾未瘳復甘泉汾隂祠竟復無福臣謹與太師孔光長樂少府平晏大司農左咸中壘校尉劉歆太中大夫朱陽博士薛順議郎國由等六十七人議皆曰宜如建始時丞相衡等議復長安南北郊如故莽又頗改其祭禮曰周官天墬之祀墬古地字也樂有别有合其合樂曰以六律六鍾五聲八音六舞大合樂祀天神祭墬祇祀四望祭山川享先妣先祖凡六樂奏六歌而天墬神祇之物皆至四望盖謂日月星海也三光高而不可得親海廣大無限界故其樂同祀天則天文從祭墬則墬理從三光天文也山川地理也天地合祭先祖配天先妣配地其誼一也天地合精夫婦判合祭天南郊則以地配一體之誼也天地位皆南鄉同席地在東共牢而食高帝高后配於壇上西鄉后在北亦同席共牢牲用繭栗牛角如繭及栗者牛之小也元酒陶匏禮記曰天子籍田千晦以事天地繇是言之宜有黍稷天地用牲一燔燎瘞薶用牲一高帝高后用牲一天用牲左及黍稷燔燎南郊地用牲右及黍稷瘞於北郊其旦東鄉再拜朝日其夕西鄉再拜夕月然後孝弟之道備而神祇嘉享萬福降輯此天地合祀以祖妣配者也其别樂曰冬日至於地上之圜丘奏樂六變則天神皆降夏日至於澤中之方丘奏樂八變則地祇皆出天地有常位不得常合此其各特祀者也隂陽之别於日冬夏至其會也以孟春正月上辛若丁天子親合祀天地於南郊以高帝高后配隂陽有離合易曰分隂分陽迭用柔剛以日冬至使有司奉祠南郊高帝配而望羣陽日夏至使有司奉祭北郊高后配而望羣隂皆以助致微氣通道幽弱當此之時后不省方故天子不親而遣有司所以正承天順地復聖王之制顯太祖之功也渭陽祠勿復修羣望未悉定定復奏奏可三十餘年間天地之祠五徙焉漢舊儀元年祭天二年祭地三年祭五帝於五畤三嵗一㵷皇帝自行羣臣從齋皆百日他祠不出祭天紫壇幄帷高皇帝配天居堂下西向紺席祭天用六綵綺席六重長一丈一副四周緣之祭天用玉几玉飾器凡器七千百物飾具祭天養牛五嵗至三千斤皇帝祭天居雲陽宫齋百日上甘泉通天臺髙二十丈以候天神之下見如流火舞女童三百人皆年八嵗天神下壇所舉烽火皇帝就竹宫去壇三里望對壇竹宫中不至壇所甘泉臺去長安三百里望見長安城皇帝以来所祭天之圜丘也皇帝祭天地宗廟駕四馬羽盖華宴出則乘馬逺行在左纛黄屋乘六馬纛左排馬頭上髦也西京之事班史於祭祀儀文所述簡畧衛敬仲撰漢舊儀頗有正史所未見者然其詞多率而叙述亦無甚倫序如西漢未嘗舉高祖配天之祀惟武帝作汶上明堂祠泰一五帝於明堂上坐合高皇帝祠坐對之服䖍所註可見而三嵗郊見於雍畤甘泉則未嘗有配天之祖也今此謂高帝配天而又言居堂下則未有配神作主而坐堂下者也其義難曉姑錄以廣異聞西漢郊祀之地凡三處雍五畤其四畤秦所建北畤髙祖所建領之祠官嵗時致祭文帝十五年方親郊是後凡三嵗一郊渭陽五帝廟文帝用新垣平之説建十六年上親郊繼而平誅遂領之祠官不親祭甘泉泰一祠武帝用方士謬忌公孫卿之説建三嵗一郊與雍五畤更祠王者祭天而以祖配之古今之通義祀典之首也舜攝政之初類於上帝禋於六宗望於山川徧於羣神湯代夏之初用元牡告於上帝神后武王代殷之初告於皇天后土所過名山大川然則其所祀者天與六宗地與山川而已初無祀五帝之文周頌三十有一篇曰郊曰明堂曰柴望曰祈穀曰報祭曰𩔖禡所以告神明之事備矣亦無祀五帝之樂章而祀五帝之説始於周禮先儒各以其意為之訓詁以為五天帝者曰靈威仰赤熛怒白招拒叶光紀含樞紐也以為五人帝者曰太皥炎帝黄帝少皥顓頊也姑以五天帝言之則此五帝皆天神之貴主五方之祀者意其在祀典當與日月六宗並而亞於祀天者也秦襄公攻戎救周列為諸侯而居西自以為主少皥之神作西畤祠白帝太史公讀秦記以為秦雜戎翟之俗作西畤用事上帝僭端見矣位在藩臣而臚於郊祀君子懼焉然以愚考之襄公以其有國於西也而祀少皥白帝是猶宋人之祀閼伯晉人之祀實沈耳非郊天也太史公誤矣自漢人既以祭畤為郊天太史公習見當時之事而追尤秦襄之僭其實非也繼而諸畤並興或由夢蛇而為鄜畤或因獲石聞雉而為陳寶或由雨金而為畦畤又繼而有青帝黃帝炎帝之祠俱以畤名之盖少皥白帝西方之神秦祠之宜也而并及青帝黃帝炎帝則非所祭而祭者也至於鄜畤陳寶之屬則皆秦中小神之為滛厲而驚動禍福者秦人無知亦為立畤而同於諸帝之祠漢人不考復指四畤以為郊天之事至高祖立黑帝祠以備五畤而五帝俱祠矣然命有司進祠上不親往嗚呼安有郊見上帝而人主不親其事者乎往往見其所祠者叢雜冗泛是以姑諉之祠官修故事耳至孝文用新垣平之言而立渭陽五帝之廟孝武採謬忌之説而建太一天皇之壇始親祠矣而皆謂之郊見夫郊事天之禮也諸方士言天神貴者泰一泰一佐者五帝則太一五帝俱天上之神爾以神為帝以祀神為郊而昊天上帝之祭固未嘗舉行也泰及漢初以郊祀事天之禮奉五帝至武帝時方士謬忌言泰一貴於五帝者也遂復以郊禮事泰一而五帝壇環居其下然終不聞舉祀天之禮至鄭康成遂創為六天之説以為泰一五帝并昊天而六也盖異名而同體也然其説終難通盖方士之説至為誕謾然猶言天神貴者泰一泰一佐者五帝終不敢言泰一五帝即天也康成儒者乃創六天之説何哉竊意泰一五帝之在天猶五嶽四瀆之在地也謂嶽瀆非地固不可而以方澤祠后土之禮事嶽瀆亦不可謂已祭嶽瀆而遂廢后土方澤之祠尤不可蓋秦襄所祠少皥白帝耳然秦俗信鬼好祠至其子孫遂并青黄赤帝而祠之至漢髙帝立黑帝祠而以為事天之事畢矣盖其祠本不經而諸畤之怪妄尤甚高祖明逹者也故雖有重祠敬祭之詔而卒不親享其亦有見於此矣漢初陋儒既不能有所建論是正賈生賢而知禮者也親承宣室鬼神之問亦不能引經援古定郊社明堂祀天配祖之儀以革秦世之滛祠惜哉自是而後郊畤祠禮之豐殺每與方士之際遇相為盛衰渭陽五帝之親祠也以新垣平平誅而帝怠於渭陽之祭泰一諸祠之郊拜也以謬忌忌亡而祠官領三一之祠而昊天上帝反不得比所謂泰一五帝者得享郊祀之祭髙祖創業之太祖亦終西都之世不得享配天之祀豈不繆哉按郊祀志天子封泰山欲治明堂奉高傍未曉其制濟南人公玉帶上黄帝時明堂圖於是上令奉髙作明堂汶上如帶圖及是嵗修封則祀泰一五帝於明堂上坐合高皇帝祠坐對之服䖍註曰漢是時未以高祖配天故言對光武以来乃配之盖漢時泰一五帝之祠不一其在甘泉者曰郊畤三嵗一親祠未嘗以祖配其在汶上者曰明堂武帝封泰山時所建方有高帝並祠每修封則祀之終帝之世五修封而昭宣之後無幸泰山修封之事則廢其祭矣然高皇帝之所並祠者泰一五帝不過天神之貴者則非配天也至成帝時匡衡請徙甘泉祠於長安定南北郊又言王者各以其禮制事天地非因異世所立而繼之今郊雍鄜宻上下畤本秦侯各以其意所立非禮所載漢興之初儀制未定即且因秦故祠復立北畤今既稽古建定天地之大禮郊見上帝青赤白黄黑五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當長遵及北畤未定時所立不宜復修天子皆從焉及陳寶祠因是皆罷并毁不應禮之祠四百七十五所然後祀禮稍正然終不能建議盡復三代以来郊祀明堂嚴父配天之禮而哀平之間怵於禍福之説南北郊與甘泉五畤互為罷復卒無定制至王莽秉政請復長安南北郊祭天而以高帝配善矣然復以高后配地祇而共祭則臆説不經為甚盖莽將簒漢故為是崇隂教以媚元后而遂其盗權竊位之謀耳或曰匡衡之論正矣然史載初罷甘泉泰畤作南郊日大風壊甘泉竹宫折拔畤中樹木十圍以上百餘天子異之以問劉向而向以為不當革上卒無繼嗣哀平短祚漢以中衰議者惑焉何也對曰千金之家其祖父奉滛昏之鬼以求福而為之子孫者欲矯而正之則所舉者未必蒙福而所廢者祗以掇禍如諸畤之神雖不正然漢代秦而興不能以禮革之方且信方士之言愈加尊奉侔於事天其祭之也且歴七世百五十餘年則其靈饗暴著也久矣固未易遽絶也漢之中衰諸儒劉向谷永固嘗預言之向以人事永以天運然則固非廢滛祠之咎也逮世祖中興建武郊天即採用元始故事而不復襲漢初之跡甘泉諸畤未嘗領之祠官加以尊奉而亦不聞其能驚動禍福以来紛紛之議則以其絶之有素也故曰君子以作事謀始道家者流其所言者鍊養之事符籙之術耳然必以天帝諸神為宗陳后山作白鶴觀記言漢兩劉校中書為七略其叙方伎則有神仙諸子則有道家而老莊並焉天地神祇三靈百神又皆出於禮官而今之為道者合而有之益以符呪法籙捕使鬼物皆老氏所不道晦庵亦言道家祀昊天上帝為非且謂釋老之學盡當毁廢縱使不能盡去則老氏之學但當自祀其老子闗尹莊列之徒以及安期生魏伯陽軰而他百祠自當領於天子之祠官而不當使道家預之庶乎其可也然觀太史公封禪書首叙帝舜𩔖上帝禋六宗望山川祠五嶽之事以至三代郊祀之禮然後及秦漢間不經之祠且歴叙始皇孝武所得燕齊方士怪誕矯誣之説共為一書班孟堅遂取以作漢郊祀志盖秦漢之君不能明理以古先聖王報本反始之大典視為求仙徼福之一事故郊祀諸祠其説多出於方士作史者固不得而刪之也然少君欒大公孫卿粤人勇之徒其所言怪妄諸説本無闗於祠祀者如使物却老鬭棊及入海求不死藥大營宫室之𩔖亦叢雜附見於封禪郊祀之書何耶如此則與道家之經典何異遷固儒者而著書指意如此固無怪黄冠師得以夤緣附會其説而啓后山晦庵之嘆也要之郊祀志只當叙説所祀天地百神本末而諸方士之言當别立方伎傳述之乃為允當道家以符籙役鬼之説附會於天地百神則遷固封禪郊祀之書實啓之以昊天上帝並列於所謂上九位天尊者則鄭康成六天之説實啓之世祖建武二年初制郊兆於雒陽城南七里依鄗采元始中故事為圓壇八陛中又為重壇天地位其上皆南鄉西上其外壇上為五帝位青帝位在甲寅之地赤帝位在丙巳之地黄帝位在丁未之地白帝位在庚申之地黑帝位在壬亥之地其外為壝重營皆紫以像紫宫有四通道以為門日月在中營内南道日在東月在西北斗在北道之西皆别位不在羣神列中八陛陛五十八醊合四百六十四醊五帝陛郭帝七十二醊合三百六十醊中營四門門五十四神合二百一十六神外營四門門百八神合四百三十二神皆背營内鄉中營四門門封神四外營四門門封神四合三十二神凡千五百一十四神營即壝也封封土築也背中營神五星也及中宫宿五官神及五嶽之屬也背外營神二十八宿外宫星雷公先農風伯雨師四海四瀆名山大川之屬也醊竹芮切祭酹也黃圖載元始儀上帝壇圓八觚徑五丈高九尺茅營去壇十歩竹宫徑三百歩土營徑五百歩神靈壇各於其方面三丈去茅營二十步廣坐十五步合祀神靈以璧琮用辟神道以通廣各三十步竹宫内道廣三丈有闕各九十一步壇方三丈拜位壇亦如之為周道郊營之外廣九步營六甘泉北辰於南門之外日月海東門之外河北門之外岱宗西門之外為周道前望之外廣九步列望道乃近前望道外徑六十二步壇方二丈五尺高三尺五寸為周道列望之外徑九步卿望亞列望外徑四十步壇廣三丈高二尺為周道卿望之外徑九步大夫望亞卿望道外徑二十步壇廣一丈五尺髙一尺五寸為周道大夫望之外徑九步士望亞大夫望道外徑十五步壇廣一丈高一尺為周道士望之外徑九步庶望亞士望道外徑九步壇廣五尺高五寸為周道庶望之外徑九步凡天宗上帝宫壇營徑三里周九里營三重通八方后土壇方五丈六尺茅營去壇十步外土營方二百步限之其五零壇去茅營如上帝五神去營步數神道四通廣各十步宫内道廣各二丈有闕為周道后土宫外徑九步營岱宗西門之外河北門之外海東門之外徑各六十步壇方二丈高二尺為周道前望之外徑六步列望亞前望道外三十六步壇廣一丈五尺高一尺五寸為周道列望之外徑六步卿望亞列望道外徑二十五步壇廣一丈高一尺為周道卿望之外徑六步大夫望亞卿望道之外徑十九步壇廣八尺髙八寸為周道大夫望之外徑九步士望亞大夫望道外徑十二步壇廣六尺高六寸為周道士望之外徑六步凡地宗后土宫壇營方二里周八里營再重道四通常以嵗之孟春正月上辛若丁親郊祭天南郊以地配望秩山川徧於羣神天地位皆南鄉同席地差在東共牢而食太祖高皇帝高后配於壇上西鄉后在北亦同席共牢而食日冬至使有司奉祭天神於南郊高皇帝配而望羣陽夏至使有司奉祭地祇於北郊高皇后配而望羣隂天地用牲二燔燎瘞薶用牲一先祖先妣用牲一天以牲左地以牲右皆用黍稷及樂七年大議郊祀制多以為周郊后稷漢當祀堯詔下公卿議侍御史杜林以為周室之興祚由后稷漢業特起功不縁堯祖宗故事所宜因循乃定從林議依舊制以高祖配隴蜀平後乃增廣郊祀高帝配食位在中壇上西面北上漢舊儀曰祭天祭紫壇幄帷高皇帝配天居堂下西向紺帷帳紺席鈎命決曰自外至者無主不止自内出者無匹不行天地高帝黃帝各用犢一頭青帝赤帝共用犢一頭白帝黑帝共用犢一頭凡用犢六頭漢舊儀曰祭天飬牛五嵗至三千斤按禮記曰天地之牛角繭栗而此云五嵗本志用犢是也日月北斗共用牛一頭四營羣神共用牛四頭凡用牛五頭凡樂奏青陽朱明西皓元㝠及雲翹育命舞中營四門門用席十八枚外營四門門用席三十六枚凡用席二百一十六枚皆莞簟率一席三神日月北斗無陛郭醊既送神燌俎實於壇南已地周禮凡以神仕者掌三辰之法以猶鬼神祇之居辨其名物鄭𤣥曰猶圖也居謂坐也天者羣神之精日月星辰其著位也以此圖天神人鬼地祇之坐者謂布祭衆寡與其居向孝經説郊祀之禮曰燔燎掃地祭牲繭栗或象天酒旗坐星厨倉具黍稷布席極敬心也言郊之布席象五帝坐禮祭宗廟序昭穆亦有似虛危則祭天圜丘象北極祭地方澤象后妃及社稷之席皆有明法焉明帝永平二年以月令有五郊迎氣因採元始故事兆五郊於雒陽詳見祠五帝門按自秦始皇有三嵗一郊之制漢髙恵二帝未嘗親郊文帝在位二十三年親郊雍畤及渭陽五帝各一而已景帝不親郊武帝元光後常三嵗一郊昭帝不親郊宣帝神爵以前十三年不親郊以後間嵗一郊元成如之盖西都之所謂郊祀若雍五畤若甘泉泰一皆出於方士祈福之説而非有古人報本之意惟武宣以求僊成帝以求嗣故三君親郊頗多而其清心無求者則領之祠官修故事而已世祖置郊丘於洛陽以高帝配祀始稍復古人祀天之制但范史紀志不載親郊之嵗月禮儀志云正月上丁祠南郊禮畢次北郊明堂高廟世祖廟謂之五供豈每嵗行之邪祭祀志言二年初制郊采元始中故事按元始之制常以嵗孟春正月上辛若丁親郊祭天南郊以地配冬至則使有司祭天神於南郊以高帝配夏至使有司祭地祇於北郊以高后配然則天地之祭每嵗親祠者一命有司祭者二豈嵗以為常故不復紀述乎昭烈章武元年即位設壇於成都武擔山南用元牡二年十月詔丞相諸葛亮營南郊於成都文獻通考卷六十九
