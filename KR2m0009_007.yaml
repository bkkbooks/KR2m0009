body:
  text: 文獻通考卷七鄱陽馬端臨貴與著田賦考七屯田漢昭帝始元二年發習戰射士調故吏將屯田張掖郡調發遣之也故吏前為官職者宣帝神爵元年後將軍趙充國擊先零羌罷騎兵屯田以待其敝充國奏曰臣所將吏士馬牛食月用糧穀十九萬九千六百三十斛鹽千六百九十三斛茭藁二十五萬二百八十六石難久不解徭役不息又恐他夷卒有不虞之變且羌虜易以計破難用兵碎也故臣愚心以為擊之不便計度臨羌東至浩音告亹音門即金城郡廣武縣地臨羌在今西平郡羌虜故田及公田民所未墾可二千頃以上願罷騎兵留弛刑應募及淮陽汝南步兵與吏私從者合凡萬二百八十一人用穀月二萬七千三百六十三斛鹽三百八斛分屯要害處冰解漕下繕鄉亭浚溝渠漕下以水運木而下也理湟音皇陿音陜以西道橋七十所令可至鮮水左右田事出賦人二十畝田事出謂至春人出營田也賦謂班與之至四月草生發郡騎及屬國胡騎伉健各十倅馬十二就草倅馬副馬十二者千騎則與副馬二百匹也為田者游兵以充入金城郡益積蓄省大費今大司農所轉穀至者足支萬人一歳食謹上田處及器用簿唯陛下裁許又上便宜十二事步兵九校一部為一校吏士萬人留屯以為武因田致穀威德並行一也又因摧折羌虜令不得歸肥饒之地貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一歳罷騎兵以省大費四也至春省田士卒循河湟漕穀至臨羌以示羌虜揚威武傳世折衝之具五也以閒暇時下所伐材繕治郵亭充入金城六也兵出乘危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫瘃墮之患謂因寒而墮指也坐得必勝之道七也亡經阻逺追死傷之害八也内不損威武之重外不令虜得乘間之勢九也又亡驚動河南大开小开皆羌種使生地變十也治湟陿中道橋令可至鮮水以制西域信威千里從枕席上過師十一也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利屯田内有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必禽之具其土崩歸德宜不久矣詔罷兵獨留充國屯田明年五月充國奏羌本可五萬人軍凡斬首七千六百級降者三萬二千人溺河湟饑餓死者五六千人定計遺脱與煎鞏黃羝俱亡者不過四千人羌靡忘等自詭必得請罷屯兵詔可充國振旅而還按屯田所以省饋饟因農為兵而起於漢昭宣之時然文帝時鼂錯上言逺方之卒守塞一歳而更不知胡人之能不如選常居者家室田作以備之為之高城深塹先為室屋具田器募罪人及免徒復作及民之欲往者皆賜高爵復其家俾實塞下使屯戍之事省輸將之費寡則其規模已畧出此但文帝則與以田屋令其人自為戰守而此屯田則以兵留耕因取其耕之所獲以饟兵微為不同又按武帝征和中桑𢎞羊與丞相御史請屯田故輪臺地以威西域而帝下詔深陳既往之悔不從之其事亦在昭宣之前然輪臺西於車師千餘里去長安且萬里非張掖金城之比而欲驅漢兵逺耕之豈不謬哉頼其説陳於帝既悔之後耳武帝通西域復輪臺渠犁亦置營田校尉領䕶然田卒止數百人今𢎞羊建請以為溉田五千頃以上則徙民多而騷動衆矣帝既悔往事思富民宜其不從也東漢邊郡置農都尉主屯田殖穀光武建武四年劉隆討李憲憲平遣隆屯田武當馬援以三輔地曠土沃而所將賔客猥多乃上書求屯田上林苑中帝許之六年王霸屯田新安夏李通破公孫述於西城還屯田順陽八年王霸屯田函谷闗張純將兵屯田南陽明帝永平十六年北伐匈奴取伊吾地置宜禾都尉以屯田遂通西域章帝建初二年罷伊吾盧屯田兵和帝永元二年擊伊吾破之三年班超定西域復置戊巳校尉十四年安定降羌燒何種反曹鳯請廣設屯田隔塞羌胡交闗之路及省委輸之役上乃拜鳯為金城西部都尉將徙士屯龍耆後金城長史上官鴻上開置歸義建威屯田二十七部侯霸復開置東西邯屯田增留逢二部帝皆從之列屯夾河合三十四部其功垂立㑹永初中諸羌叛乃罷順帝永建四年虞詡上疏曰禹貢雍州之域厥土惟上且沃野千里夫棄沃壤之饒損自然之財不可謂利書奏帝乃復三郡朔方西河上郡激河浚渠為屯田省内郡費歳一億計明年校尉韓皓轉湟中屯田置西河間以逼羣羌羌以屯田近之恐必見圖乃解仇詛盟馬續上移屯田湟中羌意乃安至陽嘉元年以湟中地廣增置屯田五部并為十部永建六年以伊吾膏腴之地旁近西域匈奴資之以為鈔暴復令開設屯田如永平故事鄧訓擊敗迷唐諸羌威信盛行遂罷屯田各令歸郡唯置弛刑徒二千餘人分以屯田為貧人耕種修理城郭塢壁而已陽嘉元年復置元莬郡屯田六部傅燮為漢陽太守廣開屯田列置四十餘營獻帝建安元年募民屯田許下中平以來天下亂離民棄農業諸軍並起率乏糧穀無終歳之計饑則冦掠飽則棄餘瓦解流離無敵自破者不可勝數袁紹在河北軍人仰視桑椹袁術在江淮取給蒲蠃民多相食州里蕭條羽林監棗祗及韓浩請建置屯田操從之以祗為屯田都尉以騎都尉任峻為典農中郎將募民屯田許下得穀百萬斛於是州郡例置田官所在積穀倉廪皆滿故操征伐四方無運糧之勞遂能兼幷羣雄軍穀之饒起於祗而成於峻建安十四年曹操引水軍自渦入淮出肥水軍合肥開芍陂屯田諸葛亮由斜谷伐魏亮以前者數出皆以運糧不繼使已志不伸乃分兵屯田為久駐之計耕者雜於渭濵居民之間而百姓安堵軍無私焉魏齊王芳正始四年司馬宣王督諸軍伐吳時欲廣田畜穀為滅賊資乃使鄧艾行陳項以東至壽春自今淮陽郡項城縣以東至壽春郡艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黃巾因為屯田積穀於許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費百億以為大役陳蔡之間土下田良可省許昌左右諸稻田幷水東下令淮北屯二萬人淮南三萬人十二分休常有四萬人且佃且守水豐常收三倍於西計除衆費歳完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年之食也以此乘吳無往而不克矣宣王善之皆如艾計遂北臨淮水自鍾離西南横石以西盡沘旁脂水四百餘里置一營六十人且佃且守兼修廣淮陽百尺二渠上引河流下通淮潁大理諸陂於潁南北穿渠三百餘里溉田二萬頃淮南淮北皆相連接自壽春到京師農官兵田雞犬之聲阡陌相屬每東南有事大軍興衆汎舟而下達於江淮資食有儲而無水害艾所建也晉羊祜為征南大將軍鎮襄陽吳石城守去襄陽七百餘里每為邊害祜患之竟以詭計令吳罷守於是戍邏減半分以墾田八百餘頃大獲其利祜之始至也軍無百日之糧及至季年有十年之積太康元年平吳之後當陽侯杜元凱在荆州今襄陽郡修召信臣遺跡召信臣所作鉗盧陂六門堰並今南陽郡穰縣界時為荆州所統激用滍音蚩淯音育諸水以浸原田萬餘頃分疆刋石使有定分公私同利衆庶頼之號曰杜父舊水道唯沔漢達江陵千數百里北無通路又巴邱湖沅湘之㑹表裏山川實為險固荆蠻之所恃也預乃開楊口起夏水達巴陵千餘里夏水楊口在今江陵郡江陵縣界巴陵即今郡内瀉長江之險外通零桂之漕零陵桂陽並郡南土歌之曰後世無叛由杜翁孰識知名與勇功東晉元帝督課農功二千石長吏以入穀多少為殿最其宿衛要任皆令赴農使軍各自佃即以名廪大興中三吳大饑後軍將軍應詹上表曰魏武帝用棗祗韓浩之議廣建屯田又於征伐之中分帶甲之士隨宜開墾故下不甚勞大功克舉間者流人奔東吳東吳今儉皆已還返江西良田曠廢未久火耕水耨為功差易宜簡流人興復農官功勞報賞皆如魏氏故事一年中與百姓二年分稅三年計賦稅以使之公私兼濟則倉庾盈億可計日而待之穆帝昇平初荀羡為北部都尉鎮下邳今臨淮郡縣屯田於東陽之石鼈亦在今之臨淮郡界公私利之齊高帝勑垣崇祖修理芍陂田曰卿但努力營田自然平殄虜冦昔魏置典農而中都足食晉開汝潁而河汴委儲卿宜勉之後魏文帝大和十一年大旱十二年祕書丞李彪上表請别立農官取州郡户十分之一為屯田人相水陸之宜料頃畝之數以贓贖雜物市牛科給令其肆力一夫之田歳責六十斛甄其正課幷征戍雜役行此二事數年之中穀積而人足矣帝覽而善之尋施行焉自此公私豐贍雖有水旱不為害北齊廢帝乾明中尚書左丞蘇珍芝又議修石鼈等屯歳收數十萬石自是淮南軍防糧足孝昭帝皇建中平州刺史嵇曄建議開幽州督亢舊陂今范陽郡范陽縣界長城左右營屯歳收稻粟數十萬石北境得以周贍又於河内置懐義等屯以給河南之費自是稍止轉輸之勞武成帝河清三年詔沿邊城守堪耕食者營屯田置都子使以統之一子使當田五十頃歳終課其所入以論褒貶隋文帝開皇三年突厥犯塞吐谷渾冦邊轉輸勞敝乃令朔方總管趙仲卿於長城以北大興屯田唐開軍府以扞要衝因隙地置營田天下屯總九百九十二司農寺每屯三頃州鎮諸軍每屯五十頃水陸腴瘠播植地宜與其功庸煩省收率之多少皆決於尚書省苑内屯以善農者為屯官屯副御史巡行莅輸上地五十畝瘠地二十畝稻田八十畝則給牛一諸屯以地良薄與歳之豐凶為三等具民田歳穫多少取中熟為率有警則以兵若夫千人助收𨽻司農者歳二月卿少卿循行治不法者凡屯田收多者褒進之歳以仲春籍來歳頃畝州府軍鎮之逺近上兵部度便宜遣之開元二十五年詔屯官敘功以歳豐凶為上下鎮戍地可耕者人給十畝以供糧方春令屯官巡行讁作不時者天下屯田收穀百九十餘萬斛初度支歳市糧於北部以贍振武天德靈武鹽夏之軍費錢五六十萬緡泝河舟溺甚衆建中初宰相楊炎請置屯田於豐州發闗輔民鑿陵陽渠以增溉京兆尹嚴郢嘗從事朔方知其利害以為不便疏奏不報郢乃奏五城舊屯其數至廣以開渠之糧貸諸城官田約以冬輸又以開渠功直布帛先給田者據估轉穀如此則闗輔免調發五城田闢比之浚渠利十倍也時楊炎方用事郢議不用而陵陽渠亦不成然振武天德良田廣袤千里元和中振武軍饑宰相李絳請開營田可省度支漕運及絶和糴欺隱憲宗稱善乃以韓重華為振武京西營田和糴水運使起代北墾田三百頃出贓罪吏九百餘人給以耒耜耕牛假糧種使償所負粟一歳大熟因募人為十五屯每屯百三十人人耕百畝就高為堡東起振武西逾雲州極於中受降城凡六百餘里列柵二十墾田三千八百餘頃歳收粟二十萬石省度支錢二千餘萬緡重華入朝奏請益開田五千頃法用人七千可以盡給五城㑹李絳已罷後宰相持其議而止憲宗末天下營田皆僱民或借庸以耕又以瘠地易上地民間苦之穆宗即位詔還所易地而耕以官兵耕官地者給三之一以終身靈武邠寧土廣肥而民不知耕太和末王起奏立營田後党項大擾河西邠寧節度使畢諴亦募士開營田歳收三十萬斛省度支錢數百萬緡開元令諸屯田應用牛之處山原川澤土有硬軟至於耕墾用力不同土軟處每一頃五十畝配牛一頭强硬處一頃二十畝配牛一頭即當屯之内有軟有硬亦依此法其稻田每八十畝配牛一頭諸營田若五十頃外更有地剩配丁牛者所以收斛斗皆凖頃畝折除其大麥蕎麥乾蘿蔔等凖粟計折斛斗以定等級天寶八載天下屯收百九十一萬三千六百六十石闗内五十六萬三千八百一十石河北四十萬三千二百八十石河東二十四萬五千八百石河西二十六萬八十八石隴右四十四萬九百二石上元中於楚州古射陽湖置洪澤屯壽州置芍陂屯厥田沃壤大獲其利宋太宗皇帝端拱二年以左諫議大夫陳恕為河北東路招置營田使魏羽為副使右諫議大夫樊知古為河北西路招置營田使索湘為副使欲大興營田也先是自雄州東際於海多積水戎人患之未嘗敢由此路入冦順安軍西至北平二百里地平廣無隔閡每歳胡騎多由此而入議者以為宜度地形高下因水陸之便建阡陌浚溝洫益樹五稼所以實邊廪而限戎馬雍熙後數用兵岐溝君子館敗衂之後河朔之民農桑失業多閑田且戍兵增倍故遣恕等經營之恕密奏戍卒皆惰游仰食縣官一旦使冬被甲兵春執耒耜恐變生不測乃詔止令葺營堡營田之議遂寢淳化四年知雄州何承矩請於順安寨西引易河築隄為屯田既而河朔頻年霖澍水潦河流湍溢壊城壘民舍復請因積潦處畜積為陂塘大作稻田以足食滄州臨津令黃懋上書請於河北諸州作水利田懋自言閩人閩地種水田緣山導泉倍費功力今河北州軍陂塘甚多引水溉田省功易就三五年内公私必獲大利乃詔承矩往河北諸州水所積處大墾田以承矩為制置河北沿邊屯田使懋充判官發諸州鎮兵萬八千人給其役凡雄莫霸州平戎破虜順安軍興堰六百里置斗門引淀水灌溉初年種稻值霜早不成次年方熟初承矩建議沮之者頗衆又武臣習攻戰亦恥於營葺種稻又不成羣議益甚幾罷役至是議者乃息莞蒲蜃蛤之饒民頼其利按古者兵與農共此民也故無事則驅之為農而力稼穡有事則調之為兵而任征戰雖唐府兵之法猶然至於屯田則驅游民闢曠土且耕且戍以省饋饟尤為良法自府兵之法既壊然後兵農判而為二不特農疲於養兵而兵且恥於為農觀陳恕所奏及沮何承矩屯田之議者可見然則國力如之何而不敝於餉軍也哉眞宗咸平五年殿直牛睿請增廣方田疏治溝塍為胡馬之閡詔邊臣經度之順安軍威虜軍保州定州皆有屯田九年改定州保州順安軍營田務為屯田務凡九州軍皆遣官監務置吏屬召募役兵自京師傳送鬻稭幹以補牛闕陜西轉運使劉綜上言今於古原州建鎮戎軍以備賊遷請於軍城四面置屯田務開田五百頃置下軍二千人牛八百頭以耕種之又置堡寨使其分居無冦則耕冦來則戰從之既而原渭亦開方田戎人内屬者皆依之得以安居太宗時度支叛官陳堯叟等上言自唐季以來農政多廢民率棄本不務力田是以家鮮餘糧地有遺利臣等每於農畝之業精求利害之理必在乎修因地之利建用水之法討論典籍備窮本末自漢魏晉唐以來於陳許鄧潁蔡宿亳至於壽春用水利墾田陳迹具在望選稽古通明之士分為諸州長吏兼管農事大開公田以通水利發江淮下軍散卒及募民以充役每一夫給牛一頭治田五十畝雖古制一夫百畝今且墾其半俟久而古制可復也畝約收三斛歳可得十五萬斛凡七州之間置二十屯可得三百萬斛因而益之不知其極矣行之二三年必可至倉廪充實省江淮漕運其民田之未闢者官為種植公田之未墾者募民墾之歳登所取並如民間主客之例此又敦本勸農之至道也傅子曰陸田命懸於天人力雖修茍水旱不時則一年之功棄矣水田之制由人力人力茍修則地利可盡也且蟲災之害又少於陸水田既修其利兼倍與陸田不侔矣上覽奏嘉之即遣大理寺丞皇甫選光祿寺丞何亮乘傳往諸州案視經度事卒不行襄州襄陽縣有屯田三百餘頃知州耿望請置營田務是歳種稻三百餘頃五年以其煩擾罷之唐州赭陽陂亦有營田務歳種七十餘頃後以其所收薄且擾人罷之賦貧民天禧末諸州屯田總四千二百餘頃而河北屯田歳收二萬九千四百餘石而保州最多逾其半焉江淮兩浙承偽制皆有屯田克復後多賦與民輸租第存其名在河北者雖有其實而歳入無幾利在畜水以限戎馬而已治平三年河北屯田有田三百六十七頃得穀三萬五千四百六十八石屯田因兵屯得名則固以兵耕營田募民耕之而分里築室以居其人畧如鼂錯田塞之制故以營名其實用民而非兵也國初惟河北屯田有兵若江浙間名屯田者皆因五代舊名非實有屯也祥符九年李允則奏改保州定州營田務為屯田務則募兵以供其役熙寧取屯田務罷之則又收務兵各𨽻其州以為廂軍則屯營固異制矣然咸平中營田襄州既而又取隣州兵用之則非單出民力熙豐間屯營多在邊州土著人少則不復更限兵民但及給用即取之於是屯田營田實同名異而官莊之名最後乃出亦往往雜用兵民也其間又有牧地者本收閒地以給牧養後亦稍取可耕者以為之田而邊地荒棄者又立頃畝招弓箭手田其不屬弓箭手而募中土人往耕者壤地租給大抵參錯名雖殊而制相入也神宗熙寧元年詔以坊監牧馬餘地立田官令專稼政以資牧養之用按原武單鎮洛陽沙苑淇水安陽東平七監地餘良田萬七千頃可賦民租佃收草粟以備枯寒從樞密副使邵亢請也四年河北屯田司屢言豐歳所入亦不償費詔沿邊屯田不以水陸悉募民租佃罷屯田務收其兵為州廂軍五年知延州趙卨乞根括閑田及募弓箭手詔如其請行之卨上議曰今陜西雖有曠土而未嘗耕墾屯戍不撤而逺方有輸納之勤願募民耕閑田經畧安撫使郭逵言今懐寧寨新得地百里已募弓箭手無閑田可耕遂括得地萬五千餘頃募蕃漢兵幾五千為八指揮知熙州王韶乞以河州蕃部近城川地招弓箭手又以山坡地招蕃兵弓箭手每寨五指揮以二百五十人為額每人給地一頃蕃官兩頃大蕃官三頃熙河多美田朝廷委提㸃秦鳯刑獄鄭民憲興民田奏辟官屬以集其事七年章惇初築沅州亦為屯田務元豐二年以所收不及額罷之九年詔熙河路有弓箭手耕種不及之田經畧安撫司權㸃廂軍田之官置牛具農器人給一頃歳終參較弓箭手廂軍所種孰為優劣以行賞罸六月鄭民憲言逃走弓箭手并營田地土作多方設法召人請佃今來認租課乞許就近於本城寨送納特與蠲免支移折變從之知河州鮮于師中乞以未募弓箭手地百頃為屯田從之樞密使吳充言實邊之策惟屯田為利近聞鮮于師中建請朝廷以計置弓箭手重於改作故裁令試治百頃而已然屯田之法行之於今誠未易惟有因今弓箭手以為助法公田似有可為且以熙河四州較之無慮一萬五千頃十分取一以為公田大約歳收畝一石則公田所得十五萬水旱肥瘠三分除一亦可得十萬官無營屯牛具廪給之費借用衆力而民不勞大荒不收而官無損省轉輸平糴價凡六便詔議其事議者謂弓箭手皆新招重以歳連不善若使之自備功力耕佃恐人心動揺宜俟稍稔推行元豐元年詔經制熙河財用司括冒耕地期半歳使民得自言五年提舉熙河營田康識言新復土地及命官分畫經界選知田廂軍人給一頃耕之餘悉給弓箭手人加一頃有馬者又加五十畝每五十頃為一營四寨堡見缺農作廂軍乞許於秦鳯涇原熙河三路選募廂軍及馬遞舖卒願行者人給裝錢二千從之八年樞密院上河東經畧司之言曰去年出兵耕種木瓜原地凡用將兵萬八千餘人馬二千餘匹費錢七千餘緡穀近九千石糗糧近五萬斤草萬四千餘束又保甲守禦費緡錢千三百米三千二百石役耕民千五百僱牛千具皆强民為之所收禾粟蕎麥萬八千石草十萬二千不償所費又借轉運司錢穀以為子種至今未償增人馬防拓之費仍在年計之外慮經畧司來年再欲耕種乞早賜約束詔諭呂惠卿毋蹈前失先一年惠卿僱五縣耕牛發將兵外護耕新疆於木瓜原等處五百餘頃自謂所得極厚可助邊計至是乃詔戒之元祐元年永興軍民庶進狀言興平縣有地二百四十餘頃久輸二稅熙寧五年本縣抑令退為牧地詔提刑司審定以奏如他州縣更有以稅地改牧地者亦具以聞提刑司乞與免納租錢給種如故大觀二年陜西轉運副使孫琦言西寧湟廓三州良田沃野並給族部畧無稅賦今進築之初宜召諸首領與族長開諭令量立租課責期限並委族長使之催輸詔童貫度其宜以行五年提舉涇原弓箭手司奏乞案漢蕃田土其已開熟地仍許著業外若非朝命所給而州軍帥司一時私自撥予或川原漫坡地土今仍荒閑者並以給招闕額人馬惟其不堪耕種者方許撥充牧地庶可究極地利增廣人兵從之祖宗時營田皆置務淳化中河北有屯田務祥符九年改定州保州營田務為屯田務天聖四年廢襄唐二州營田務慶歴元年陜西置營田務何承矩建議於河北端拱元年歐陽修募弓箭手於河東慶歴二年陳恕樊知古招置營田於河東北端拱二年范仲淹大興屯田於陜西慶歴元年耿望置屯田襄州咸平二年章惇初築沅州亦為屯田務熙寧七年正以極邊兩不耕之地並邊多流徙之餘因地之利課以耕耘贍師旅而省轉輸此所以為扈邊實塞之要務足國安民之至計也然屯田以兵營田以民固有異制營者分里築室以居其人如鼂錯田塞之制咸平中襄州營田既調夫矣又取鄰州之兵是營田不獨以民也熙豐間邊州營屯不限兵民皆取給用是屯田不獨以兵也至於招弓箭手不盡之地復以募民則兵民參錯固無異也然前後施行或以侵占民田為擾虞奕於徽或以差借耨夫為擾咸平二年耿望襄州借夫或以諸郡括牛為擾慶歴間范雍括諸郡牛或以兵民雜耕為擾又或以諸路廂軍不習耕種不能水土為擾元符三年九月提舉河東營田言至於歳之所入不償其費遂又報罷惟因弓箭手為助田法一夫受田百畝别以十畝為公田俾之自備種糧功力歳收一石水旱三分除一官無廪給之費民有耕鑿之利若可以為便矣然弓箭手之招至者未安其業而種糧無所仰給且又責其借力於公田慮人心易搖卒莫之行熙寧九年正月鄭民憲言紹興元年鎮撫使知荆南府解潛奏措置荆南歸峽荆門公安五州營田其後軍食仰給省縣官之半三年德安復州漢陽軍鎮撫使陳規放古屯田有逃户歸業者收畢給之過三年者不受理凡軍士所屯之田皆相其險隘立為堡寨其弓兵等半為守禦半為耕種如遇農時則就田作有警則充軍用凡耕種則必少增錢糧秋收給斛斗犒賞依鋤田客户則例餘並入官凡民户所營之田水田畝賦粳米一斗陸田豆麥夏秋各五升滿二年無欠輸給為永業兵民各處一方流民歸業漸衆亦置堡寨屯聚凡屯田事務營田司兼行營田事府縣官兼行更不别置官吏當時廷紳因規奏請相與推廣謂一夫受田百畝古制也厥今諸荒田甚多惟恐人力不足兼肥瘠不同難以槩論當聽人户量力取射其有闕少牛畜宜用人耕之法以二人拽一犁凡受田五人為一甲别給莱田五畝為廬舍稻場兵屯以大使臣主之民屯以縣令主之以歳課多少為殿最下諸鎮推行之又詔江東西宣撫使韓世忠措置建康營田又詔湖北浙西江西屯營田徭役科配並免五年屯田郎中樊賔言荆湖江南與兩浙膏腴之田彌亘數千里無人可耕則地有遺利中原士民扶擕南渡幾千萬人則人有餘力今若使流寓失業之人盡田荒閑不耕之田則地無遺利人無遺力可以資中興六年右㒒射張浚奏改江淮屯田為營田凡官田逃田並拘籍以五頃為一莊募民承佃命措置官樊賔王弗行之尋命五大將劉光世韓世忠張俊岳飛吳玠及江淮荆襄利路帥悉領營田使江淮營田置司建康歳中收穀三十萬有奇七年監中嶽李寀言營田之官或抑配豪户或强科保正田瘠難耕多收子利張浚亦覺其擾請罷司以監司兼領於是詔帥臣兼領營田内見帶營田使名者即仍舊詔奬諭川陜宣撫吳玠治廢堰營田六十莊計田八百五十四頃約收二十五萬石補助軍糧以省饋餉十六年定江淮湖北營田以紹興七年至十三年所收數内取三年最多數内取一年酌中為額縣官奉行有方無詞訴抑勒處分三等定賞罰隆興元年工部尚書張闡言今日荆襄屯田之害非田之不可耕也無耕田之民也官司慮其功之不就不免課之游民游民不足不免抑勒百姓捨已熟田耕官生田私田既荒賦税猶在或逺數百里追奪以來或名雙丁役其强壯占百姓之田以為官田奪民種之穀以為官穀老稚無養一方騷然有司知其不便申言於朝罷之誠是也然臣竊謂自去歳以來置耕牛置農器修長木二渠費已十餘萬其間豈無已墾闢之地豈無廬舍場圃尚可卒業一旦舉而棄之必為勢家所占則是捐十萬緡於無用之地而荆襄之田終不可耕也臣比見兩淮歸正之民動以萬計官給之食以半歳為期今踰期矣官不能給則老弱饑餓者轉而他之殊失斯民向化之心兼亦有傷國體臣愚以為荆襄之田尚有可承之規與其棄之孰若使歸正之民就耕非惟可免流離庶使中原之民知朝廷有以處我率皆襁負而至異日墾闢既廣田疇既成然後取其餘者而輸之官實為兩便詔除見耕種人依舊外餘令虞允文同王珏疾速措置揚州興元府階成岷鳯等處屯田後皆以所得不償所費罷之議者皆曰漢趙充國魏棗祗屯田皆卓有成效不知充國以方隆之漢敝垂盡之先零棗祗以未裂之中原營於無虞之許下其為之也暇且無有害其成者今禾黍未登塲而馳突蹂踐有不可必茍嚴其備有以限戎馬之來則沿邊莽堰莫非可耕之地矣官田籍田附孟子曰殷人七十而助又曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也朱子集註當時助法盡廢典籍不存惟有此詩可見周亦用助故引之也月令孟春之月天子乃擇元辰親載耒耜措之於參保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推保介車右也置耒於車石與御者之間明已勸農非農者也反執爵於大寢三公九卿諸侯大夫皆御命曰勞酒既耕而宴飲以勞羣臣周禮甸師掌率其屬而耕耨王籍以時入之其屬庶人也王籍謂王者籍田千畝所親帥公卿以下親耕農人耕之處也庶人終於千畝故曰率其屬入其所收黍稷以供粢盛宣王即位不籍千畝籍借也借民力以為之天子田籍千畝諸侯百畝自厲王之後籍田禮廢宣王即位不復古也虢文公諫曰不可夫民之大事在農古者太史順時瓜見音脉土陽癉丁佐反憤盈土氣震發癉厚也憤積也農祥晨正農祥房星晨正謂立春之日晨正於午日月底於天廟天廟營室也孟春之日日月皆在營室土乃脉發先時九日太史告稷曰自今至於初吉初吉二月朔陽氣俱蒸土膏其動弗震弗渝脉其滿眚穀乃不殖言陽氣升土膏動當即發動變瀉其氣不然則脉萌而氣結更為災疫稷以告王曰史帥陽官以命我司事陽官春官司事農事曰距今九日土其俱動王其祗祓監農不易王乃使司徒咸戒公卿百吏庶民司空除壇於籍命農大夫咸戒農用農大夫田畯先時五日瞽告有協風至王即齋宫百官御事各即其齋三日王乃淳濯饗醴及期鬱人薦鬯犧人薦醴王祼鬯饗醴乃行百吏庶民畢從及籍后稷監之膳夫農正行籍禮太史贊王王敬從之王耕一墢班三之班次也王一墢公三卿九大夫二十七也庶民終於千畝其后稷省功太史監之司徒省民太師監之畢宰夫陳饗膳宰監之膳宰贊王王歆太牢班嘗之庶人終食是日也瞽師音官以風土音官樂官風土以音律省土風風氣和則土氣養也廪於籍東南鍾而藏之廪御廪以藏王所籍田以奉粢盛而時布之於農稷則徧戒百姓紀農協功曰陰陽分布震雷出滯土不備墾辟在司冦乃命其旅曰徇農師一之農正再之后稷三之司空四之司徒五之太保六之太師七之太史八之宗伯九之王則大徇耨穫亦如之民用莫不震動恪恭於農修其疆畔日服其鎛不解於時財用不乏民用和同是時也王事惟農是務無有求利其官以干農功三時務農而一時講武故征則有威守則有財若是乃能媚於神而利於民矣則享祀時至而布施優裕也今天子欲修先王之緒而棄其大功匱神乏祀而困民財將何以求福用民王不聽漢高祖二年故秦苑囿園池令民得田之文帝二年詔曰夫農天下之本也其開籍田朕親率耕以給宗廟粢盛賈誼説上曰一夫不耕或受其饑今背本而趨末生之者甚少而糜之者甚多天下財産何得不蹙今敺民而歸之農皆著於本使天下各食其力末技游手之民轉而緣南畝則畜積足而人樂其所矣上感誼言乃開籍田十三年詔曰朕親率天下農耕以供粢盛皇后親桑以奉祭服其具禮儀令立耕桑之禮制也景帝後二年親耕籍田武帝元年罷苑馬以賜貧民養馬之苑禁百姓芻收今賜民為田征和四年上耕於鉅定地名近東海昭帝始元元年上耕於鉤盾弄田時帝年九歳未能親耕帝籍鉤盾宦者近署故往試耕為戲弄也弄田在未央宫中六年上耕於上林元鳯二年罷中牟苑賦貧民宣帝地節元年假郡國貧民田二年詔池籞未御幸者假與貧民又令流民還歸者假公田貸種食元帝初元元年以三輔太常郡國公田及苑可省者振業貧民江海陂湖園池屬少府者以假貧民勿租賦省苑馬以振困乏二年詔罷水衡禁苑宜春下苑少府佽飛外池嚴籞池田假與貧民五年罷北假田官主假賃見田官與民收其税或曰北假地名也永光元年令民各務農畝無田者假之哀帝建平元年太皇太后詔外家王氏田非冢營皆以賦貧民後漢禮儀志正月始耕晝漏上水初納執事告祠先農已享賀循籍田儀曰漢耕田以太牢祭先農於田所薛綜注二京賦曰為天神借民力於此田故名曰帝籍田在國之辰地耕時有司請行事就耕位天子三公九卿諸侯以次耕力田種各耰訖有司告事畢漢舊儀曰春始耕於籍田官祠先農先農即神農炎帝也祠以一太牢百官皆從大賜三輔二百里孝悌力田三老帛種百穀萬斛為立籍田倉置令丞穀皆以給祭天地宗廟羣神之祀以為粢盛是月令日郡國守相皆勸民始耕如儀諸行出入皆鳴鐘皆作樂其有災眚有他故若請雨止雨皆不鳴鐘不作樂漢家郡守行大夫禮鼎俎籩豆工歌縣明帝永平九年詔郡國以公田賜貧民各有差十三年汴渠成詔曰今五土之宜反其正色濱渠下田賦與貧人無令豪右得固其利章帝建初元年詔以上林池籞田賦與貧人元和元年詔郡國募人無田欲徙他界就饒者悉聽之到在所賜給公田為顧耕庸賃種餉貰與田器勿收租五歳除算三年其後欲還本鄉者勿禁三年詔曰月令孟春善相邱陵土地所宜今肥田尚多未有墾闢其悉以賦貧民給與種糧務盡地力勿令游手安帝永初元年以廣城游獵地及被災郡國公田假與貧民魏制天子親耕籍田藩鎮闕諸侯百畝之禮晉武帝太始四年正月帝躬耕籍田於東郊詔曰近代以來耕籍田於數歩之内空有慕古之名曾無供祀訓農之實而有百官車徒之費今循千畝之制當率羣公卿士躬稼穡以先天下於東郊之南洛水之北去宫八里逺十六里為田千畆帝御木輅以耕自惠帝後禮廢宋文帝元嘉十二年將親耕司空大司農京尹令度宫之辰地八里之外整制千畝中開阡陌齊武帝永明中耕籍田梁依宋齊禮天監十二年以啓蟄而耕普通二年移籍田於建康北岸後魏道武帝天興三年春始躬耕籍田北齊籍於帝城東南千畝内種赤粱白穀大豆赤黍小豆黑穄麻子大小麥色别一頃自餘一頃中通阡陌隋制於國南十四里啓夏門置地千畝為壇行播殖禮九穀納於神倉以擬粢盛秸藁以餉犧牲唐太宗貞觀三年二月籍於千畝之甸高宗永徽三年正月率公卿耕於千畝之甸乾封二年儀鳯二年景雲三年並躬耕籍田元宗開元二十三年正月躬耕籍田宋太宗端拱元年親耕籍田以勸農事天禧元年以久罷畋遊其京城四面禁圍草地令開封府告諭百姓許其耕牧四年福建轉運使方仲荀言福州王氏時有官莊千二百一十五頃自來給與人户主佃每年只納税米乞差官估價令見佃人收買與限二年送納價直仁宗天聖三年屯田員外郎張希顏奏福建八州皆有官莊七州各納租課惟福州只依私産納税復免差徭顯是倖民乞相均米數依州價折納見錢銅鐡中半從之嘉祐二年詔以天下没入户絶田募人耕收其利置廣惠倉以賑貧人見賑恤門熙寧間以廣惠倉之入歸之常平神宗熙寧二年三司言天下屯田省莊皆子孫相承租佃歳久乞不許賣其餘没官納莊願賣者聽從之七年詔户絶莊産召人充佃及入實封狀承買以其直增助諸路常平錢開封府界諸路係省莊屯田營田稻田務及司農寺户絶水利田並都水監官莊淤田司四十四萬七千四百四十八頃一十六畝内三司官田莊四千五百九十三頃四十畝零總收租餘斛斗疋帛六萬一千四百九貫石疋都水監淤田司官莊五百五十四頃一十九畝零總收租斛斗五萬二百一十石斤稈等五十萬一千六十六束斤哲宗元祐元年户部言鬻賣絶户田宅既有估覆定價乞如買撲坊場例罷實封投狀從之八年詔凡官田及已佃而逃或佃租違期應剗佃者不别召佃悉籍之官為招募衙前之用如未有投募且令租佃以應募者而給之徽宗建中靖國元年詔市易折納田産並依户絶田産法政和元年時朝廷以用度艱窘命官鬻賣官田江西路一歳失折上供無慮二十餘萬斛運副張根建言田既不存當減上供朝廷深察所以然遂止不賣總領措置官田所言元奏存留屯田為係河北河東陜西邊防利害乞存之不鬻自三路外名屯田者其實悉以民耕與凡官田無異無係邊防自應鬻賣從之知吉州徐常奏諸路惟江西乃有屯田非邊地其所立租則比税苗特重所以祖宗時許民間用為永業如有移變雖名立價交佃其實便如典賣已物其有得以為業者於中悉為居室墳墓既不可例以奪賣又其交佃歳久甲乙相傳皆隨價得佃今若令見業者買之則是一業而兩輸直亦為不可而况若賣而起税税起於租計一歳而州失租米八萬七千餘石其勢便當損減上供是一時得價而久逺失利此議臣見近利而失逺圖公私交害也於是都省乞下江西覈實如屯田紐利多於二税即住賣之為税田而税多租少即鬻之他路倣此詔可臣僚言天下係官田産如折納抵當户絶之類𨽻屬常平則法許鬻賣如天荒逃田省莊之類在運司有請佃法自餘閑田名類非一乞命官總領條畫以聞户部奏凡田當防河召募弓箭手或屯田之類悉應存留凡市易抵當折納籍没常平户絶天荒省莊沙田退灘荻塲圩田之類並應出賣又奏倣熙寧制所委官一年内賣及七分與轉一官餘以次減磨勘不登五分加奏劾詔從之八月詔乃者有司建明盡鬻係官田宅茍目前之利廢久長之策其總領措置官並罷已賣田宅給還元直仍拘入官如舍屋已經改更但課虧租額者與免仍舊修蓋官田已嘗為墓據合用畝步約價者與免遷移六年始作公田於汝州公田之法縣取民間田契根磨如田今屬甲則從甲而索乙契乙契既在又索丙契展轉推求至無契可證則量地所在增立官租一説謂按民契劵而以樂尺打量其贏則拘入官而創立租課初因中官楊戩主後苑作有言汝州地可為稻田者置務掌之號稻田務復行於府畿易名公田南暨襄城西至沔池北踰大河民田有踰初劵畝步者輙使輸公田錢政和末又置營繕所亦為公田久之後苑營繕所公田皆併於城西所盡山東河朔天荒逃田與河堤退灘輸租舉入焉皆内侍主其事所括凡得田三萬四千三百餘頃農畝困敗但能輸公田錢而正税不復有輸後李彦又立城西括田所而公田皆彦主之靖康初誅彦宣和元年提舉水利農田所奏浙西平江諸州積水減退欲委官分詣鄉村檢視露出田土惟人户見業已納省税不括外其餘逃田天荒草田葑茭蕩及湖濼退灘沙塗等地悉標記置籍召人請射種植視鄉例拘納租課樁充御前錢物專一應奉御前支用置局提舉如造謗惑衆沮害之人罪徒從之三年詔方量根括到田土税租課利内特與減一半十月尚書省言諸路學田并西南外宗室財用司田産元所給佃租課太輕不足於用詔許添立實封入狀添立租課剗佃一次如佃人願從添數亦仍給佃高宗建炎元年從江南經制使翁彦國言拘籍蔡京王黼等莊田令佃户就種歳減租課二分三年令應天下係官田令有司依鄉例紐納佃租期以半月許民自陳輸租額過期依見行條法紹興元年詔盡鬻諸路官田命各路憲臣總領措置時以軍興用度不足又先時知永嘉縣霍蠡言温州四縣没官田勢家詭名請佃歳責保正長代輸公私病之乃詔並召人鬻五年又詔見佃人願承買者聽佃及三十年以上者減價錢三之二十二年户部言諸路常平司未賣田令見佃人添租三分不願者勒令離業召人佃知邵州吕稽仲言湖南廣西閑田甚多若輕租召佃收其所輸糴其贏餘可寛州縣詔户部措置劉䕫為福州帥貿易僧寺田以取資至張守帥閩始議存留上等四十餘刹以待高僧外悉令民實封請買歳入七八萬緡以助軍衣餘寛百姓雜科民皆便之二十六年户部侍郎韓仲通言蜀地狹人稠而京西淮南係官膏腴之田尚衆乞許人承佃官貸牛種八年仍償並邊免十年租次邊半之滿三年充已業從之户部言諸路賣官田錢乞以七分上供三分充常平司糴本今諸買官田者免納税契錢又免和買二年免物力三年至十年一千貫以下免三年一千貫以上五年五千貫以上十年已給賣後不許執隣取贖舊六十日輸錢不足者錢没官别召買今倍其日皆從之二十九年户部提領官田所言應官户勢家坐占官田今依估承買其浙西營田及餘路營田官莊田屯田並住賣詔各路提舉司督察欺弊申嚴賞罸縣賣十萬緡州二十萬緡守令各進一秩餘以次減磨勘最稽遲者貶秩荆南提刑彭合入對言州縣賣官田之害望減價無抑勒户部以減價為難但令勿抑勒而已諫議大夫何溥言比議臣欲優恤見佃者令減價二分承買而復謂其低價買增價賣或借錢收買增價准折許人告即拘没夫始憐其失業而為之減價終設為轉賣之説而開其爭端望明詔改正兩浙轉運司言申括到平江府省田一十六萬六千七百二十八畝每畝納上供省苗三斗三升六合計米三萬九千四十七石係民户世業今若出賣便為私田上輸二税暗失上供歳額苗米乃止臣僚言江東西二廣村疃之間人户凋疎彌望皆黃茅白葦民間膏腴之田耕布猶且不徧豈有餘力可置官産浙東西最號繁盛所買僅及百餘萬緡累月尚未足數且有抑勒之患况江廣米穀既平錢貨艱得畝直不過貫百縱根括無遺其能應期限乎若謂命令已行難於寢罷乞寛之一年聽民情願無或抑勒違者坐之詔可又言二年之間三省户部困於文移監司州郡疲於出賣上下督責始限一季繼限一年已賣者纔十三已納者纔十二其事猶未竟也蓋買産之家無非大姓估價之初以上色之産輕立價貫揭榜之後率先投狀至於拆封往往必得今之已賣者是也若中下之産無人計囑所立之價輕重不均今之無人承買者是也宜且令元佃之家著業納租歳猶可得數十萬斛從之寧宗開禧三年冬韓侂胄既誅復與敵講解明年改元嘉定始用廷臣言置安邊所命户部侍郎沈詵等條畫來上凡侂胄與其他權倖没入之田及圍田湖田之在官者皆𨽻焉初以御史提其綱繼委之版曹或都司寺監官其後又俾畿漕領之諸路歳輸米七十二萬二千七百斛有奇錢一百三十一萬五千緡有奇兩浙江東西淮東西福建皆有籍以給行人金繒之費迨敵好既絶軍需邊用每於此乎取之文獻通考卷七
