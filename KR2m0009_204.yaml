body:
  text: 文獻通考卷二百四鄱陽馬端臨貴與著經籍考三十一史地理山海經十八卷鼂氏曰大禹製晉郭璞傳漢侍中奉車都尉劉秀校定表言禹别九州而益等類物善惡著此書皆聖賢之遺事古文明著者也大父嘗考之於書有曰長沙零陵鴈門皆郡縣名又自載禹鯀似後人因其名參益之陳氏曰漢侍中奉車都尉臣秀所校祕書秀即劉歆也晉郭璞注按唐志二十三卷音二卷今本錫山尤袤延之校定世傳禹益所作其事見吳越春秋曰禹東巡登南嶽得金簡玉字通水之理遂行四瀆與益共謀所至使益疏而記之名山海經此其為説恢誕不典司馬遷曰言九州山川尚書近之矣至禹本紀山海經所書怪物余不敢言之也可謂名言孰曰多愛乎故尤跋明其非禹伯翳所作而以為先秦古書無疑然莫能名其何人也洪慶善補注楚辭引山海經淮南子以釋天問而朱晦翁則曰古今説天問者皆本此二書今以文意考之疑此二書本皆緣解天問而作此可以破千載之惑古今相傳既久姑以冠地理書之録山海圖經十卷鼂氏曰皇朝舒雅等撰雅仕江南韓熙載之門人也後入朝數預修書之選閩中刋行本或題曰張僧繇畫妄也水經四十卷鼂氏曰漢桑欽撰欽成帝時人本經三卷後魏酈道元注史稱道元好學歷覽竒書撰注水經行於世陳氏曰欽邯鄲書目以為漢人鼂氏言成帝時人當有所據按唐志注或云郭璞撰又杜氏通典按水經晉郭璞注二卷後魏酈道元注四十卷皆不詳所撰者名氏亦不知何代之書佑謂二子博贍解釋固應精當然其經云濟水過壽張則前漢壽良縣光武更名又東北過臨濟則前漢狄縣安帝更名又云菏水過湖陸則前漢湖陵縣章帝更名又云汾水過河東郡永安則前漢彘縣順帝更名故知順帝以後纂序也詳水經所作殊為詭誕全無慿據按後漢郡國志濟水王莽末因旱渠塞不復截河南過既順帝時所撰都不詳悉其餘可知景純注解又甚疏略亦為迂怪以其僻書人多不覩謂其審正未之精也十道志十三卷鼂氏曰唐梁載言撰唐分天下為十道所載頗詳博其書多稱咸通中沿革蓋唐末人也陳氏曰其書廣記備言頗有可采載言不見於史未定為何朝人此書有太和以後沿革當是唐末人唐十道圖一卷陳氏曰唐宰相趙郡李吉甫𢎞憲撰首載州縣總數文武官員數俸料唐志云十卷今不分卷元和郡縣志四十卷陳氏曰李吉甫撰自京兆至隴右凡四十七鎮篇首皆有圖今圖不存太平寰宇志二百卷鼂氏曰皇朝樂史等撰太平興國中盡平諸國天下一統史悉取自古山經地志考正訛謬纂成此書上之陳氏曰其書起自河南周於海外圖經鼂氏曰皇朝李昉撰九域志十卷鼂氏曰皇朝王存被旨刪定總二十三路京府四次府十州二百四十二軍三十七監四縣一千一百三十五陳氏曰存與曾肇李德芻等共刪定名元豐九域志輿地廣記三十八卷鼂氏曰皇朝歐陽忞纂自堯舜以來至於五代地理沿革離合皆繫以今郡縣名或云無所謂歐陽忞者特假名以行其書耳陳氏曰政和中作其前三卷以今之郡縣繫於前代郡國之下其序曰以今州縣求於漢則為郡以漢郡縣求於三代則為州三代之九州散而為漢之六十餘郡又分而為今之三百州雖或離或合不可討究而吾胸中則已了然矣漢郡國一百三今云六十餘郡不可曉也忞當是文忠族孫行名皆連心字春秋地譜十二卷鼂氏曰皇朝楊湜編十三國地皆釋以今州縣名并為圗於其後蓋常氏已嘗有此書而湜增廣焉洽聞記三卷鼂氏曰唐鄭常撰記郡國舊事故附之地理類職方機要四十卷鼂氏曰不題撰人姓名序云本新舊九域志上據歷代史旁取左氏水經通典且采舊聞參以小説黜謬舉真紬成此書其間載政和間事蓋當時人也地理指掌圗一卷陳氏曰蜀人稅安禮撰元符中欲上之朝未及而卒書肆所刋皆不著名氏亦頗闕不備此蜀本有涪右任慥序言之頗詳歷代疆域志十卷陳氏曰臨川布衣吳澥撰輿地紀勝二百卷陳氏曰知江寧縣金華王象之撰蓋以諸郡圗經節要略而山川景物碑刻詩詠粗無所遺行在宮闕觀寺實冠其首關河版圗之未復者猶不與焉眉山李説齋季允為之序輿地圗十六卷陳氏曰王象之撰紀勝逐州為卷圗逐路為卷其搜求亦勤至西蜀諸郡尤詳其兄觀之漕夔門時所得也皇朝方域志二百卷陳氏曰東陽布衣王希先撰凡前代謂之譜十六譜為八十卷本朝謂之志為一百二十卷譜敘當時事實而注以今之郡縣志述今日疆理而繫於古之州國古今參考譜志互見地理學之詳明者無以過此矣嘉熙二年上於朝得永免文解其父珨本建寧人己未進士試詞科不中頗該洽希先述其遺藁以成此書六合掌運圗一卷鼂氏曰不著名凡為四十四圗首列禹迹次為中興後南北二境其後則諸邊關險要以及敵地疆界亦著之燕吳行役記陳氏曰不著名氏大中九年崔鉉鎮淮南諸鎮畢賀為此記者燕帥張允伸所遣僚佐道中記所經行郡縣道里及事迹也南行記三卷鼂氏曰王仁祐撰晉天福二年仁祐被命使髙季興記自汴至荆南道塗賦詠及飲宴倡酬殆百餘篇江行録一卷陳氏曰真州教授勾穎紹聖三年所序云太守張公所修也張不著名自真而上直抵荆南自嶽而分旁徴衡永自湖口而别則東入鄱陽南至廬陵程期岸次風雲占候時日吉凶與夫港派灘磧磯洑莫不具載行江者賴焉三輔黃圗三卷鼂氏曰按經籍志有黃圗一卷記三輔宮觀陵廟明堂辟雍郊畤等即此書也不著撰人姓名其間頗引劉昭漢志然則出於梁陳間也陳氏曰按唐志一卷今分上下卷載秦漢間宮室苑囿甚詳多引用應劭漢書解而如淳顔師古復引此書為據意漢魏間人所作然中興書目以為崇文總目及國史志不載疑非本書也程氏雍録辨之尤悉長安志十卷鼂氏曰皇朝宋敏求撰敏求因韋氏所記搜采羣書罔有遺軼二紀而成凡府縣之政官尹之職河渠關塞之類至於風俗物産宫室道街無不詳偹世稱其博趙若彥為之序陳氏曰與河南志二書凡例微不同然漢唐舊都遺事詳矣河南志二十卷鼂氏曰宋敏求撰以韋述西京記為未偹演之為長安河南志司馬光為之序以為考之韋記其詳不啻十餘倍開編粲然如指諸掌真博物之書關中記一卷陳氏曰晉葛洪稚川撰所載殊簡略長安圗記一卷陳氏曰丞相汲公吕大防知永興軍以為正長安故圗著其説於上今信安郡有此圗而别録其説為一篇雍録十卷陳氏曰吏部尚書新安程大昌泰之撰周秦漢隋唐五代皆都雍故以名録前史及黃圗宋志異同往往辨訂其辨黃圗有唐縣名且晉灼所引黃圗皆今書所無蓋唐人續成之非見漢事者遊城南記一卷鼂氏曰皇朝張禮撰禮秦人元祐中與陳明微自長安城南探竒訪古以抵樊川因次之為記洛陽伽藍記三卷鼂氏曰元魏楊衒之撰後魏遷都洛陽一時王公大夫多造佛寺或捨其私第為之故僧舍多為天下最衒之載其本末及事迹甚備陳氏曰衒之以爾朱之亂城郭邱墟追述斯記洛陽名園記一卷鼂氏曰皇朝李格非撰記洛中園圃自富鄭公以下十九所其論以為洛陽之盛衰為天下治亂之候園圃之興廢為洛陽盛衰之候則園記之作豈徒然哉公卿大夫忘天下治忽欲退享此樂得乎唐之末路是也陳氏曰格非禮部員外郎以不肯與編元祐奏章入黨籍國史文苑有李易安居士清照者其女也格非苦心為文而集不傳館中亦無有惟錫山尤氏有之文鑑僅存此跋蓋未嘗見其全集也東京記鼂氏曰皇朝宋敏求編開封坊巷寺觀官廨私第所在及諸故實極精博陳氏曰上卷為宮城周五里唐宣武節度治所建隆三年廣城之北隅用洛陽宮殿之制修之中卷為舊城周二十一里一百五十步唐汴州城也號闕城亦曰裏城下卷為新城周四十八里二百三十三步周世宗所築羅城也號曰國城又曰外城三城之內宮殿官府坊巷第宅寺觀營房次第記之東京夢華録一卷陳氏曰稱幽蘭居士孟元老撰元老不知何人少遊京師晚值喪亂之後追述舊事兼及國家典祀里巷風俗以其首載京城宫闕橋道坊曲尤詳故繫之地理類鄴中記一卷陳氏曰不著名氏記自魏而下及僭偽都鄴者六家宫殿事迹按唐志有鄴都故事二卷肅代時馬溫所作今書多引之相臺志十二卷鼂氏曰皇朝韓琦欲編次未成郡守李琮命郡文學掾陳申之效宋敏求河南志成此書晉陽事迹雜記十卷陳氏曰唐河東節度李璋纂序言十四卷唐志亦同今刪為十卷蓋治平中太原府所刻本也從莆田李氏借録自南渡以來關河阻絶圗志泯亡得見一二僅存者猶足以發傷今思古之嘆然唐并州治晉陽太原二縣國初克復徙治陽曲而虛其故城二縣後皆并省則唐之故迹皆不復存矣臨安志十五卷陳氏曰府帥吳興周淙彥廣撰首卷為行在所於宫闕殿閣全不記載藉曰禁省嚴祕不敢明著其視宋次道東京記何其大不侔其他沿革亦多疏略然淙有才具其尹京開湖濬河皆有成緒今城中河道通利民户為腳船以濟行旅者蓋自此始吳興雜録七卷陳氏曰唐湖州刺史張文規撰末載義興造茶及風物雜占甚詳文規張薦之後彥逺之子其為郡當會昌二年吳興紀統十卷陳氏曰攝湖州長史左文質撰分門别類古事頗詳序稱甲辰嵗者本朝景德元年也吳興志二十卷陳氏曰樞密院編修郡人談鑰元時撰嘉泰元年也其為書草率未得為盡善蘇州圗經六卷陳氏曰翰林學士饒陽李宗諤昌武等撰景德四年詔以四方郡縣所上圗經刋修校定為一千五百六十六卷以大中祥符四年頒下今皆散亡館中僅存九十八卷余家所有惟蘇越黃三州刻本耳吳郡圗經續記三卷陳氏曰祕書省正字郡人朱長文伯原撰記祥符以後事亦頗補前志之缺遺長文吳中名士病廢不仕自號樂圃卒於元符元年吳地記一卷陳氏曰唐陸廣微撰郡人也多記古吳國事唐未有秀州天禧中始割嘉興縣置故此記合二郡為一吳郡志五十卷陳氏曰參政郡人范成大至能撰書始成未行而石湖沒有求附見某事而弗得者譁曰此非石湖筆也太守不能決藏其書學官然周益公為范墓碑述所著書目有焉及紹定初桐川李壽朋儔老為守始取而刻之而書止於紹興其後事實俾僚屬用禇少孫史記例補成之趙南塘履常作序訂其為石湖書不疑且謂郡士龔頤正滕􅍲周南皆常薦所聞於公者而龔尤多鎮江志三十卷陳氏曰教授天台盧憲子章撰新定志八卷陳氏曰郡守東平董弅令升撰紹興己未也淳熙甲辰武義陳公亮重修嘉禾志五卷故事一卷陳氏曰郡守毗陵張元成撰為書極草草毗陵志十二卷陳氏曰教授三山鄒補之撰越州圗經九卷陳氏曰李宗諤祥符所上也末有祕閣校理李垂邵煥修及覆修名銜然則書成於衆手而宗諤特提總其凡耳會稽志二十卷陳氏曰通判吳興施宿武子郡人馮景中陸子虛朱鼐王度等撰陸放翁為之序首稱禹會諸侯而以思陵巡守升府配之氣壯文雅蓋竒作也嘉泰辛酉六年已七十七矣未幾始落致仕為史官至八十五嵗乃終其筆力老而不衰於此序見之會稽續志八卷陳氏曰梁國張淏撰續記辛酉後事而亦補前志之遺前志無進士題名此其尤不可遺者也赤城志四十卷陳氏曰國子司業郡人陳耆卿壽老撰其前為圗十有三赤城續志八卷陳氏曰郡人吳子良拾其所遺續載之赤城三志四卷陳氏曰郡人林表民逄吉撰紹定己丑水壞城修治興築本末詳焉四明志二十一卷陳氏曰贑州録事參軍廬陵羅璿修時胡矩仲方尚書為守璿其鄉人也明越風物志七卷鼂氏曰皇朝薑嶼撰以明州本越地故曰明越又以郭璞注爾雅多引江東故詳載其風物云永嘉譜二十四卷陳氏曰禮部侍郎郡人曹叔逺器逺撰曰年譜地譜名譜人譜時紹熙三年太守宛陵孫楙屬器逺裒集創為義例如此器逺庚戌進士蓋初第時也永寧編十五卷陳氏曰待制郡人陳謙益之撰漢分章安之東甌鄉為永寧今永嘉四邑是也故以名編時嘉定九年留元剛茂潛為太守東陽志十卷陳氏曰樞密鄱陽洪遵景嚴撰紹興二十四年為通判時所作括蒼志七卷陳氏曰教授曽賁撰乾道六年太守四明樓璩叔韞序括蒼續志一卷陳氏曰郡人陳百朋撰信安志十六卷陳氏曰教授衛珍撰太守四明劉垕也實嘉定己邜信安續志二卷陳氏曰教授葉汝明撰袁甫廣微紹定初也文獻通考卷二百四
