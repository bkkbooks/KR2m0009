body:
  text: 文獻通考卷一百八十八鄱陽馬端臨貴與著經籍考十五經儀注諡法讖緯孫氏祭享禮一卷陳氏曰檢校左散騎常侍孫日用撰周顯德中博士後仕夲朝開寶時作此書杜氏四時祭享禮一卷陳氏曰丞相山隂杜衍世昌撰韓氏古今家祭式一卷陳氏曰司徒兼侍中相臺韓琦稚圭撰橫渠張氏祭禮一卷陳氏曰張載子厚撰末有呂大鈞和叔説數條附焉朱氏語録曰橫渠所制禮多不夲諸儀禮有自杜撰處伊川程氏祭禮一卷陳氏曰程頤正叔撰首載作主式伊洛禮書補亡伊洛遺禮龍川陳氏序曰吾友陳君舉為余言薛季宣士龍嘗從袁道潔遊道潔及事伊川自言得伊洛禮書不及授士龍而死今不知其書在何許伊川嘗言舊修六典已及七分及被召乃止今更一二年可成則信有其書矣道潔之所藏近是惜其書之散亡不可見也因集其遺言中凡參考禮儀而是正其可行與不可行者以為伊洛禮書補亡庶幾遺意之未泯而或者其書尚可訪也又曰伊洛遺禮其可見者惟婚與喪禮僅存其一二今以附諸補亡之後夫禮雖先王之未有可以義起也補亡所集集其義也苟精其義則當時之所參定者尚可考而闕裂不全之制豈必以是為尊哉記曰禮之所尊尊其義也存其義之可見者以惜其不可見者而已呂氏家祭禮一卷陳氏曰丞相京兆呂大防微仲正字大臨與叔撰朱子語録曰與叔集諸家禮補儀以儀禮為骨范氏家祭禮一卷陳氏曰范祖禹淳甫撰溫公書儀一卷陳氏曰司馬光撰前一卷為表章書啓式餘則冠婚喪祭之禮詳焉朱子語録胡叔器問四先生禮晦庵先生曰二程與橫渠多是古禮溫公則大槩夲儀禮而參以今之可行者要之溫公較穩其中與古不甚逺是七分好大扺古禮不可全用如古服古器今皆難用溫公夲諸儀禮最為適古今之宜先公曰溫公此書專夲儀禮其大者莫如婚喪婚禮婦見舅姑條下注若舅姑已殁則有三月廟見之禮此儀禮説也儀禮凡單言廟皆謂禰廟非祖廟也公謂婦入門拜先靈則三月廟見之禮可廢此於禮為稍略而朱文公遂以為惑於陳針子先配後祖之説故以婦入拜祖先為未然此禮當考按針子所譏自謂鄭忽當迎婦時不先告廟注家引公子圍告莊共之廟而後行為證即非婦入門時事喪禮卒哭而祔亦儀禮説也儀禮三虞明日以其班祔公直用之此於禮為大遽檀弓明言殷練而祔周卒哭而祔孔子善殷而云周已戚公於注文但略言而不詳述蓋練而祔公所不敢故耳大槩溫公誠篤之學嘗答許奉世秀才書云自幼誦諸經讀注疏以求聖人之道直取其合人情物理目前可用者從之此其大指也居家雜禮一卷陳氏曰司馬光撰呂氏鄉約一卷鄉儀一卷陳氏曰呂大鈞和叔撰髙氏送終禮一卷陳氏曰禮部侍郎髙閌抑崇撰四家禮範五卷陳氏曰張栻朱熹所集司馬程張呂氏諸書而建安劉珙刻於金陵古今家祭禮二十卷陳氏曰朱熹集通典會要所載以及唐夲朝諸家祭禮皆在焉朱文公家禮朱子自序曰嘗獨究觀古今之籍因其大體之不可變者而少加損益於其間以為一家之書大抵謹名分崇愛敬以為之夲至其施行之際則又略浮文務夲實以竊自附於孔子從先進之遺意誠得與同志之士熟講而勉行之李氏曰先生居母祝令人憂居喪盡禮蓋自始死以至祥禫參酌古今咸盡其變因成喪葬祭禮又推之於冠婚共成一編命曰家禮既成為一童行竊之以逃先生易簀其書始出今行於世然其間有與先生晚歲之論不合者故未嘗為學者道之楊氏曰愚按家禮一書今之士大夫家冠婚喪祭多所遵命然此書始成輒復失之先生未嘗再加審訂則世或未之知也初先生所定家鄉邦國王朝禮專以儀禮為經及自述家禮則又通之以古今之宜故冠禮則多取司馬氏婚禮則參諸司馬氏程氏喪禮夲之司馬氏後又以髙氏之書為最善及論祔遷則取橫渠遺命治喪則以書儀疏略而用儀禮祭禮兼用司馬氏程氏而先後所見又有不同節祠則以韓魏公所行者為法若夫明大宗小宗之法以寓愛禮存羊之意此又家禮之大義所繫蓋諸書所未暇及而先生於此尤拳拳也惜其書既亡至先生既沒而後出先生不及再修為一定之成儀以幸萬世而反為未成之闕典愚嘗與朋友讀而病之於是竊取先生平日去取折衷之言有以發明家禮之意者若婚禮親迎用溫公入門以後則從伊川之類是也有後來議論始定不必守家禮之舊儀者若祭禮祭始祖初祖而後不祭之類是也有超然獨得於心不用疏家穿鑿之説而默與鄭注夲義契合若深衣之續袵鉤邉是也有用先儒舊義與經傳不同未見於後來之考訂議論者若喪服辟領婦人不杖之類是也凡若此者悉附於逐條之下以待朋友共相考訂庶幾粗有以見先生之意云十書類編三卷陳氏曰不知何人所集十書者管氏弟子職曹昭女誡韓氏家祭式司馬溫公居家雜儀呂氏鄉禮范氏義莊規髙氏送終禮髙登修學門庭朱氏重定鄉約社倉約束也雖不專為禮而禮居多故附之於此廟議一卷陳氏曰吏部侍郎趙粹中撰進專為太祖未正東鄉之位乃裒董弅王普趙漢首議與一時討論夲末上之時淳熙中也奉常雜録一卷樂章一卷陳氏曰無名氏雜録禮寺牲牢樂舞祝祠其樂章則祠祭見行用者服飾變古元録三卷陳氏曰唐翰林學士汝南袁郊之儀撰郊宰相滋之子唐志作一卷古今服飾儀一卷陳氏曰題蜀人樊建紹癸丙序考古圖十卷鼂氏曰皇朝呂大臨與叔裒諸家所藏三代秦漢尊彛鼎敦之屬繪之於幅而辨論形制文字陳氏曰其書作於元祐七年所紀自御府之外凡三十六家所藏古器物皆圖而録之博古圖説十一卷陳氏曰祕書郎昭武黃伯思長睿撰有序凡諸器五十九品其數五百二十七印章十七品其數二百四十五李丞相伯紀為長睿志墓言所著古器説四百二十六篇悉載博古圖説考之固多出於伯思亦有不盡然者又其名物亦頗不同錢鑑二品至多此所載二錢二鑑而已博古不載印章而此印章最夥蓋長睿沒於政和八年其後修博古圖頗采用之而亦有刪改云爾其書大抵好傅會古今名字説已見前宣和博古圖三十卷鼂氏曰皇朝王楚集三代秦漢彛器繪其形範辨其欵識增多於呂氏考古十倍矣陳氏曰宣和殿所藏古器物圖其形製而記名物録其欵識品有總説以舉其凡而物物考訂則其目詳焉然亦不無牽合也容齋洪氏隨筆曰政和宣和間朝廷置書局以數十計其荒陋而可笑者莫若博古圖豫比得漢匜因取一册讀之發書捧腹之餘聊識數事於此父癸匜之銘曰爵方父癸則為説曰周之君臣其有癸號者惟齊之四世有癸公癸公之子曰哀公然則作是器也其在哀公之時歟故銘曰父癸者此也夫以十干為號及稱父甲父丁父癸之類夏啇皆然編圖者固知之矣獨於此器表為周物且以為癸公之子稱其父其可笑一也周義母匜之銘曰仲姞義母作則為之説曰晉文公杜祁讓逼姞而已次之趙孟云母義子貴正謂杜祁則所謂仲姞者自名也義母者襄公謂杜祁也夫周世姞姓女多矣安知此為逼姞杜祁但讓之在上豈可便為母哉既言仲姞自名又以為襄公為杜祁所作然則為誰之物哉其可笑二也漢注水匜之銘曰始建國元年正月癸酉朔日制則為之説曰漢初始元年十二月改為建國此言元年正月者當是明年也按漢書王莾以初始元年十二月癸酉朔日竊即真位遂以其日為始建國元年安有明年却稱元年之理其可笑三也楚姬盤之銘曰齊侯作楚姬寶盤則為之説曰楚與齊從親在齊湣王之時所謂齊侯則湣王也周末諸侯自王而稱侯以銘器尚知止乎禮義也夫齊楚之為國各數百年豈必當湣王時從親乎且湣王在齊諸王中最為驕暴嘗稱東帝豈有肯自稱侯之理其可笑四也漢梁山鋗之銘曰梁山銅造則為之説曰梁山銅者紀其所貢之地梁孝王依山鼓鑄為國之富則銅有自來矣夫即山鑄錢乃吳王濞耳梁山自是山名屬馮翊夏陽縣於梁國何預焉其可笑五也觀此數説他可知矣又曰博古圖近復盡觀之其謬妄不可殫舉政宣間蔡京為政禁士大夫不得讀史春秋三傳真束髙閣故其所引用絶為乖盾然至以州吁為衛大夫髙克為衛文公將是此書局學士亦不曽讀毛詩矣可笑也鍾鼎欵識二十卷鼂氏曰皇朝薛尚功編考古博古圖之類然尤為詳備按考古圖諸書鼂氏以入小學門陳氏以入書目門皆失其倫類既所考者古之禮器則禮文之事也故釐入儀注門中興禮書中興藝文志中興禮書者淳熙中禮部太常寺編次中興以來所行之禮也其間如內禪慶壽之類亘古所無可謂盛矣右儀注諡别十卷崇文總目宋沈約撰上采周秦下至晉宋君臣諡號而以周公諡法為夲云諡法四卷崇文總目梁賀琛撰初約夲周公之諡法至琛又分君臣美惡婦人之諡各以其類標其目曰舊諡者周公之諡法曰廣諡者約所撰也曰新諡者琛所增也鼂氏曰約撰凡七百九十四條琛又加婦人諡二百三十八條續古今諡法十四卷崇文總目唐户部郎中王彥威撰因舊諡品援集故事依沈約諡例記梁以來至唐得諡官稱姓名又以單復諡為别嘉祐諡法三卷鼂氏曰皇朝蘇洵明允撰洵嘉祐中被詔編定周公春秋廣諡沈約賀琛扈蒙六家諡法於是講求六家外採今文尚書汲冡師春蔡雍獨斷凡古人論諡之書收其所長加以新意得一百六十八諡芟去者百九十有八又為論四篇以敘去取之意六家諡法陳氏曰翰林學士判太常寺周沆等編六家者周公春秋廣諡沈約賀琛扈蒙也今按周公即汲冡書之諡法解春秋即杜預釋例所載也廣諡不著名氏沈約書一卷賀琛書四卷扈蒙書一卷皆祖述古法而增廣之琛字國寶山隂人梁尚書左丞蒙字日用幽州人國初翰林學士此書嘉祐末編集英宗初始上鴈湖李氏跋六家諡法二十卷嘉祐中范忠文與老蘇公及姚闢等所修六年十月始奉詔刋定八年上之蘇公之意有所未盡又别為諡法三卷諡録三十五卷於是古今諡法始粲然大備諡者行之表所以成德蓋考名易行使既沒之後是非較然先王所以深勸沮所從來逺矣後世循私之習勝士一登大官身顯不問賢否例得美諡褒貶至是幾廢猶賴學士大夫時起爭之公之此書雖格於一時異議卒不果行而著書之意爛如日星固不害其傳百代之明法也惜諡録之書今獨皇朝者存而所次歷代十五卷俄空焉六家之得失公辨正既無遺矣然某嘗考之名周公者即汲冡周書諡法篇名春秋者即杜預釋例諡法篇唐及國史藝文志皆不載近世學者就二書中採出公固以疑其非古然猶未明其為汲冡書與釋例故并及之集諡總録一卷鼂氏曰皇朝孫緯撰凡一卷春明退朝録嘗集類國朝諡幾二百人緯任宗正寺丞日因宋氏之舊纂元豐以後遂得三百餘人自宗室宰相以下分為九等其序略云有爵位已髙當得諡而未聞者若范質呂餘慶韓崇王博文薑遵王沔是也政和修定諡法陳氏曰禮制局詳議官蔡攸等承旨修定全書八十卷大率祖六家之舊為沿革統論一卷參照二十六卷看詳二十五卷增立十卷合而為詳定六卷今惟修定六卷存而以沿革繫之篇首按館閣書目亦闕參照二十六卷鄭氏諡法三卷陳氏曰鄭樵撰上卷序五篇中卷諡三等下卷後論四篇右諡法隋藝文志易曰河出圖洛出書然則聖人之受命也必因積德纍業豐功厚利誠著天地澤被生人萬物之所歸往神明之所福饗則有天命之應蓋龜龍御負出於河洛以紀易代之證其理幽昧究極神道先王恐其惑人祕而不傳説者又云孔子既敘六經以明天人之道知後世不能稽同其意故必立緯及讖以遺來世其書出於前漢有河圖九篇洛書六篇云自黃帝至周文王所受夲文又别有三十篇云自初起至於孔子九聖之所增演以廣其意又有七經緯三十六篇並為孔子所作并前合為八十一篇而又有尚書中候洛書緯五行傳詩推度災汜歷樞含神霧孝經勾命決援神契雜讖等書漢代有郗氏袁氏説漢末郎中郗萌集圖緯讖雜占為五十篇謂之春秋災異宋均鄭元並為讖律之注然其文辭淺俗顛倒舛謬不類聖人之旨相傳疑世人造為之後或者又加點竄非其實録起王莾好符命光武以圖讖興遂盛行於世漢時又詔東平王蒼正五經章句皆命從讖俗儒趨時益為其學篇卷第目轉加增廣言五經者皆􅑀讖為説唯孔安國毛公王璜賈逵之徒獨非之相承以為祅妄亂中庸之典故因漢魯恭王河間獻王所得古文參而考之以成其義謂之古學當世之儒又非毁之竟不得行魏代王肅推引古學以難其義王弼杜預從而明之自是古學稍立至宋大明中始禁圖讖梁天監以後又重其制及髙祖受禪禁之愈切煬帝即位乃發使四出搜天下書籍與讖緯相涉者皆焚之為吏所紏者至死自是無復其學祕府之內亦多散亡今録其見存列於六經之下以備異説陳氏曰按後漢書緯候之學注言緯七緯也候尚書中候也所謂河洛七緯者易緯稽覽圖乾鑿度坤靈圖通卦驗是類謀辨終備也書緯璇璣鈐考靈曜帝命驗運期授也詩緯推度災汜歷樞含神霧也禮緯含文嘉稽命徵斗威儀也樂緯動聲儀稽耀嘉叶圖徵也孝經緯援神契鈎命決也春秋緯演孔圖元命包文耀鉤運斗樞感精符合誠圖考異郵保乾圖漢含孳佐助期握誠圖潛潭巴説題辭也讖緯之説起於哀平王莽之際莽以此濟其篡逆公孫述效之而光武紹復舊物乃亦以赤伏自纍篤好而推崇之甘心與莽述同智於是佞臣陋士從風而靡賈逵以此論左氏學曹褒以此定漢禮作大豫樂大儒如鄭元專以讖言經何休又不足言矣二百年間惟桓談張衡力非之而不回也魏晉以革命受終莫不傅會符命其源實出於此隋唐以來其學寖微矣考唐志猶存九部八十四卷今其書皆亡惟易緯僅存者如此及孔氏正義或時援引先儒蓋嘗欲刪去之以絶偽妄矣使所謂七緯者皆存猶學者所不道况其殘闕不完於偽之中又有偽者乎姑存之以備凡目云爾唐志數內有論語緯十卷七緯無之太平御覽有論語摘輔象撰考讖者意其是也御覽又有書帝驗期禮稽命曜春秋命歷序孝經左方契威嬉拒等皆七緯所無要皆不足深考致堂胡氏曰讖書原於易之推往以知來周家卜世得三十卜年得八百此知來之的也易道既隱卜筮者溺於考測必欲竒中故分流别𣲖其説寖廣要之各有以也易道所明時有所用知道者以義處命理行則行理止則止術數之學蓋不取也光武早歲從師長安受尚書大義夷考其行事蓋儒流之英傑也何乃蔽於讖文牢不可破耶又曰緯書原夲於五經而失之者也而尤紊於鬼神之理幽明之故夫鬼神之理幽明之故非知道者不能識自孟子而後知道者鮮矣所以易惑而難解也斷國論者誠能一決於聖人之經經所不載雖有緯書讖記屏而不用則庶乎其不謬於理也隋志十三部合九十二卷通計亡書合三十二部共二百三十二卷唐志二家九部八十四卷宋三朝志四部三十二卷宋中興志三家五部十二卷易乾鑿度二卷鼂氏曰右舊題蒼頡修古籕文鄭氏注按唐四庫書目有鄭元注詩書緯及有宋均注易緯而無此書其中多有不可曉者獨九宮之法頗明昔通儒謂緯書偽起哀平光武既以讖立故篤信之陋儒阿世學者甚衆鄭元何休以之通經曹褒以之定禮歷代革命之際莫不引讖為符瑞故桓談張衡之徒皆深嫉之自苻堅之後其學殆絶使其尚存猶不足信况此又非其真也坤鑿度二卷鼂氏曰題曰包犧氏先文軒轅氏演古籕文蒼頡修按隋唐志及崇文總目皆無之至元祐田氏書目始載焉當是國朝人依託為之周易緯稽覽圖二卷是類謀一卷辨終備一卷乾元序制記一卷坤靈圖一卷通卦驗二卷鼂氏曰漢鄭元注按隋志有鄭氏注易緯八卷唐志有宋均注易緯九卷李氏夲注與隋志同卷數與唐志同家夲蓋出李氏獨不載乾鑿度二卷而有乾元序制一卷按後漢注七緯名亦無乾元序制陳氏曰其間推隂陽卦直至唐元和中蓋後世術士所附益也按七緯之名無乾元序制易稽覽圖三卷陳氏曰與上易緯前三卷相出入而詳備不同乾坤鑿二卷陳氏曰一作坤鑿度題包犧氏先文軒轅氏演籕蒼頡修鼂氏讀書志云崇文總目無之至元祐田氏書目始載當是國朝人依託為之禮含文嘉宋兩朝藝文志舊有讖緯七經雜解今緯書存者獨易而含文嘉乃後人著為占候兵家之説與諸書所引禮緯乖異不合故以易緯附經移含文嘉於五行右讖緯文獻通考卷一百八十八
