body:
  text: 文獻通考卷三百四十七鄱陽馬端臨貴與著四裔考二十四室韋室韋有五部後魏末通焉並在靺鞨之北路出栁城諸部不相總一所謂南室韋北室韋鉢室韋深末怛室韋大室韋並無君長人衆貧弱突厥沙鉢略可汗常以吐屯潘垤統領之蓋契丹之類也其南者為契丹在北者號室韋南室韋在契丹北三千里後魏書云自契丹路經啜水蓋犢子山其山周回三百里又經屈利水始到其國土地卑濕至夏則移向西貸勃欠對二山多草木饒禽獸又多蚊蚋人皆巢居以避其患後漸分為二十五部有餘莫不滿咄猶酋長也死則子弟代立之嗣絶則擇賢豪而立之盤髮衣服與契丹同乘牛車蘧蒢為室如突厥氈車之狀渡水則束薪為筏或有以皮為舟者馬則織草為韀結繩為轡寢則屈木為室以蘧蒢覆上移則載行以豬皮為席編木籍之氣候多寒田收甚薄無羊少馬多豬牛造酒食噉言語與靺鞨同婚嫁之法二家相許壻輒盜婦去然後送牛馬為聘婦人不再嫁以為死人妻難以共居部落共為大柵人死則置尸其上居喪而三年其國無鐡取給於高麗自南室韋北行十一日至北室韋分為九部落其部落渠帥號乞引莫賀咄氣候最寒冬則入山居穴中牛畜多凍死饒麞鹿射獵為務鑿氷沒水中而網射魚鱉地多積雪懼陷坑穽騎木而行俗皆捕貂為業冠以狐貉衣以魚皮北行千里至鉢室韋依胡布山而住人衆多於北室韋不知為幾部落用樺皮蓋屋其餘同北室韋從鉢室韋西四日行至深末怛室韋因水為號也冬月穴居以避太隂之氣又西北數千里至大室韋徑路險阻言語不通尤多貂及青鼠北室韋後魏武定隋開皇大業中並遣使朝獻餘無至者唐所聞有九部曰嶺西室韋北室韋黃頭室韋大如者室韋小如者室韋訥婆萵室韋達木室韋駱駝室韋並在栁城郡之東近者三千五百里逺者六千二百里貞觀五年始來貢豐貂後再入朝長夀二年叛將軍李多祚擊定之景龍初復朝獻請助討突厥開元天寶間凡十朝獻大歷中十一貞元四年與奚共冦振武殺掠而去太和中三朝獻大中中一來咸通時大酋坦烈與奚皆遣使至京師然非顯夷後史官失傳地豆干地豆干國在室韋西千餘里多牛羊出名馬皮為衣服無五榖惟食肉酪魏延興三年遣使朝貢至太和六年貢使不絶十四年頻犯塞孝文詔征西大將軍陽平王頤擊走之自後時朝京師迄武定末不絶齊時亦入貢烏洛侯烏洛侯亦曰烏羅渾國後魏通焉在地豆干之北其土下濕多霧氣而寒冬則穿地為室夏則隨原阜多豕有榖麥無大君長部落莫弗皆代為之其俗繩髮皮服以珠為飾人尚勇不為姦竊故慢藏野積而無冦盜好獵射樂有胡空侯木槽革面而九絃其國西北有貌水東流合於難水東入於海又西北二十日行有于已尼大水所謂北海也太武帝真君四年來朝稱其國西北有魏先帝舊墟石室南北九十步東西十四步高七十尺室有神靈人多祈請太武帝遣中書侍郎李敞祭告焉刻祝文於石室之北而還唐貞觀六年遣使朝貢云烏羅渾國亦謂之烏護乃言訛也東與靺鞨南與契丹北與烏丸為鄰風俗與靺鞨同驅度寐驅度寐隋時聞焉在室韋之北其人甚長而衣短不束髮皆裹頭居土窟中惟有豬更無諸畜人輕捷一跳三丈餘又能立浮卧浮履水浸腰與陸走不異數乘大船至北室韋鈔掠無甲胄以石為矢鏃霫霫胸奴之别種隋時通焉與靺鞨為鄰理黃水北亦鮮卑故地勝兵萬餘人習俗與突厥略同亦臣于頡利其渠帥號為俟斤唐貞觀中遣渠帥內附拔悉彌拔悉彌一名弊刺國隋時聞焉在北庭北海南結骨東南依山散居去燉煌九千餘里有渠帥無王號戶二千餘其人雄健皆獵射國多雪恆以木為馬雪上逐鹿其狀似楯而頭髙其下以馬皮順毛衣之令毛著雪而滑如著屧屐縛之足下屧先叶反屐巨戟反若下阪走過奔鹿若平地履雪即以杖刺地而走如船焉上阪即手持之而登每獵得鹿將家室就而食之盡更移處其所居即以樺皮為舍丈夫翦髮樺皮為帽唐貞觀二十三年始來朝天寶初與紇葉護殺突厥可汗立拔悉密大酋阿史那施為賀臘毗伽可汗遣使者入謝元宗賜袍帶不三年為葛邏祿回紇所破奔北廷後朝京師拜左武衛將軍地與衆歸回紇流鬼流鬼在北海之北北至夜義國餘三面皆抵大海南去莫設靺鞨船行十五日無城郭依海島散居掘地數尺深兩邊斜竪木構為屋人皆皮服又狗毛雜麻為布而衣之婦人冬衣豕鹿皮夏衣魚皮制與獠同多沮澤有鹽魚之利地氣沍寒早霜雪每堅氷之後以木廣六寸長七尺施系其上以踐層氷逐及奔獸俗多狗勝兵萬餘人無相敬之禮官僚之法不識四時節序有他盜入境乃相呼召弓長四尺餘箭與中國同以骨石為鏃樂有歌舞死解封樹哭之三年無餘服制靺鞨有乘海至其國貨易陳國家之盛業於是其君長孟蚌遣其子可也余志以唐貞觀十四年三譯而來朝貢初至靺鞨不解乘馬上即顛墜其長老人傳言其國北一月行有夜義人皆豕牙翹出噉人莫有涉其界未嘗通聘回紇回紇其先胸奴也俗多乘高輪車元魏時亦號髙車部或曰敕勒訛為鐡勒其部落曰袁紇薛延陀契苾羽都播骨利幹多覽葛僕骨拔野古同羅渾思結斛薛奚結阿跌白霫凡十有五種皆散處磧北袁紇者亦曰烏護曰烏紇至隋曰韋紇其人驍強初無酋長逐水草轉徙善騎射喜盜鈔臣于突厥突厥資其財力雄北荒大業中處羅可汗攻脅鐡勒部裒責其財既又恐其怨則集渠豪數百悉坑之韋紇乃并僕骨同羅拔野古叛去自為俟斤稱回紇回紇姓藥羅葛氏居薛延陀北娑陵水上距京師七千里衆十萬勝兵半之地磧鹵畜多大足羊有時健俟斤者衆始推為君長子曰菩薩材勇有謀嗜獵射戰必身先所向輒摧破故下皆畏附為時健所逐時健死部人賢菩薩立之母曰烏羅渾性嚴明能決平部事回紇繇是寖盛與薛延陀共攻突厥北邊頡利欲遣谷設領騎十萬討之菩薩身將五千騎破之馬鬛山追北至天山大俘其部人聲震北方繇是附薛延陀相唇齒號活頡利發樹牙獨樂水上唐貞觀三年始來朝獻方物突厥已亡惟回紇與薛延陀為最雄強菩薩死其酋胡祿俟利發吐迷度與諸部攻薛延陀殘之并有其地遂南踰賀蘭山境諸河遣使者獻欵太宗為幸靈州次涇陽受其功於是鐡勒十一部皆來言延陀不事大國以自取亡其下麕駭鳥散不知所之今各有分地願歸命天子請置唐官有詔張飲髙會引見渠長等以唐官官之凡數千人明年復入朝乃以回紇部為瀚海多覽葛部為燕然僕骨部為金微拔野古部為幽陵同羅部為龜林思結部為盧山皆號都督府以渾為臯蘭州斛薛為髙闕州阿跌為雞田州契苾羽為榆溪州奚結為雞鹿州思結為蹛林州白霫為置顔州其西北結骨部為堅昆府北骨利幹為元闕州東北俱羅勃獨龍州皆以首領為都督刺史長史司馬即故單于臺置燕然都護府統之六都督七州皆隸屬以李素立為燕然都護其都督刺史給元金魚符黃金為文天子方招寵逺夷作絳黃瑞錦文袍寶刀珍器賜之帝坐祕殿陳十部樂殿前設髙坫置朱提瓶其上潛泉浮酒自左閣通坫趾注之瓶轉受百斛鐐盎回紇數千人飲畢尚不能半又詔文武五品官以上祖飲尚書省中渠領共言生荒陋地歸身聖化天至尊賜官爵與為百姓依唐若父母然請於回紇突厥部治大凃號參天至尊道世為唐臣乃詔磧南鸊鵜泉之陽置過郵六十八所具羣馬湩肉待使客嵗內貂皮為賦乃拜吐迷度為懷化大將軍瀚海都督然私自號可汗署官吏臺似突厥有外宰相六內宰相三又有都督軍司馬之號吐迷度後為烏紇所殺子婆閏襲父所領婆閏死子比栗嗣龍朔中以燕然都護府領回紇更號瀚海都護府以磧為限大抵北諸蕃悉隸之比栗死子獨解支嗣武后時突厥默啜方強取鐵勒故地故回紇與契苾思結渾三部度磧徙甘涼間然唐常取其壯騎佐赤水軍云獨解支死子伏帝匐立明年助唐攻殺默啜於是别部移健頡利發與同羅霫等皆來詔置其部於大武軍北伏帝匐死子承宗立涼州都督王君􅎢誣暴其罪流死瀼州當此時回紇稍不循族子瀚海府司馬護輸乘衆怨共殺君􅎢梗絶安西諸國朝貢道久之奔突厥死子骨力裴羅立會突厥亂天寶初裴羅與葛邏祿自稱左右葉護助拔悉蜜擊走烏蘇可汗後三年襲破拔悉蜜斬頡跌伊施可汗遣使上狀自稱骨咄祿毗伽可汗天子以為奉義王南居突厥故地徙牙烏德鞬山昆河之間南距西城千七百里西城漢髙闕塞也北盡磧口三百里悉有九姓地九姓者曰藥羅葛曰胡咄葛曰啒羅勿葛曰貊歌息訖曰阿勿嘀曰葛薩曰斛嗢素曰藥勿葛曰奚邪勿藥羅葛回紇姓也與僕骨渾拔野古同羅思結契苾六種相等夷不列於數後破有拔悉蜜葛邏祿總十一姓並置都督號十一部落自是戰常以二客部為先鋒有詔拜為骨咄祿毗伽闕懷仁可汗前殿列仗中書令內案授册使者使者出門升輅至皇城門降乘馬幡節導以行凡册可汗率用此禮明年裴羅又攻殺突厥白眉可汗遣頓啜羅達于來上功拜裴羅左驍衛員外大將軍斥地愈廣東極室韋西金山南控大漠盡得古胸奴地裴羅死子磨延啜立號葛勒可汗剽悍善用兵嵗遣使者入朝肅宗即位使者來請助討祿山帝詔燉煌郡王承宷與約而令僕固懷恩送王因召其兵於是可汗自將與朔方節度使郭子儀合討同羅蕃破之又令其太子葉護將四千騎來帝命廣平王見葉護約為兄弟從王進戰破賊收長安進復東京回紇大掠東都廣平王令耆老以繒錦萬匹賂回紇乃止不剽葉護還京師帝宴賜甚厚詔進司空爵忠義王嵗給絹二萬匹使至朔方軍受賜乾元元年回紇使者多彥阿波與黑衣大食酋閣之等俱朝爭長有司使異門並進又使請婚許之帝以幼女寧國公主下嫁册磨延啜為英武威逺毗伽可汗詔漢中郡王瑀攝御史大夫為册命使送公主之其國既至可汗驕倨不拜瑀折之可汗慙乃起奉詔拜受册翼日尊主為可敦瑀還獻馬五百匹貂裘白氈等乃遣王子骨啜特勒宰相帝德等率騎三千助討賊明年骨啜與九節度戰相州王師潰帝德等奔京師帝厚賜慰其意乃還俄而可汗死葉護太子前得罪死故次子移地健立號牟羽可汗明年使使入朝代宗即位以史朝義未滅遣中人劉清潭往結好且發其兵使者至回紇已為朝義所訹曰唐荐有喪國無主且亂請回紇入收府庫其富不資可汗即引兵南回紇已踰三城見州縣榛萊烽障無守有輕唐色乃遣使北收單于府兵數以語凌折清潭清潭密白帝回紇兵十萬向塞朝廷震驚遣殿中監藥子昻迎勞且視軍遇於太原密識其兵裁四千懦弱萬餘馬與可敦偕來可敦僕固懷恩女帝令懷恩與回紇會因遣使上書請助天子討賊詔以雍王為天下兵馬元帥進子昻與魏琚為左右廂兵馬使中書舍人韋少華為判官東會回紇於陜州王往見之可汗責王不舞蹈庭詰至再子昻等固拒之回紇君臣度不能屈即引子昻少華琚榜之一百少華琚一夕死王還營官軍以王見辱將合誅回紇王以賊未滅止之於是懷恩與回紇及諸將同擊賊戰橫水走之進收東都可汗遣使賀天子其兵留河陽屯三月旁人困於剽辱僕固瑒率回紇與朝義拏戰蹀血二千里梟其首河北悉平初回紇至東京放兵攘剽至是益橫詬折官吏至以兵夜抄含光門入鴻臚寺詔加可汗可敦册命遣王翊就其牙册之自可汗至宰相共賜實封二萬戶以其左殺右殺為王其酋長十都督皆封國公永泰初懷恩反誘回紇吐蕃入冦俄而懷恩死二虜爭長回紇首領潛詣涇陽見郭子儀請改事子儀詣其營遺以纒頭綵三千且讓之酋長讋服曰懷恩詭我曰唐天子南走公見廢是以來今天可汗在公無恙吾等願還擊吐蕃以報厚恩然懷恩子可敦弟也願赦死於是子儀持酒與盟而飲與唐兵擊退吐蕃俘獲甚衆令胡祿都督等二百人皆來朝賜與不可計大歷三年可敦卒遣使弔祠明年以懷恩幼女為崇徽公主繼室遣使册為可敦賜繒綵二萬時財用屈稅公卿嬴槖庀給行回紇之留京師掠女子於市引騎犯含光門詔劉清潭慰諭復出暴市物有司不敢詰自乾元後益負功每納一馬取直四十縑嵗以數萬求售使者相躡留舍鴻臚駘弱不可用帝厚賜欲以愧之不知也復以萬馬來帝不忍重煩民為償六千十年回紇殺人橫道京兆尹黎幹捕之詔貸勿劾又刺人東市縛送萬年首領劫取囚殘獄吏去都人厭苦十三年回紇襲振武攻東陘入冦太原河東節度使鮑防與戰陽曲防敗績殘殺萬人代州都督張光晟又戰羊虎谷破之虜乃去德宗立使中人告喪且修好時九姓胡勸可汗入冦可汗欲悉師向塞見使者不為禮宰相頓莫賀達于曰唐大國無負於我前日入太原取羊馬數萬比及國亡耗略盡今舉國逺鬭有如不捷將安歸可汗不聼頓莫賀怒因擊殺之并屠其支黨及九姓胡幾二千人即自立為合骨咄祿毗伽可汗使長建達于從使者入朝建中元年詔京兆少尹源休持節册頓莫賀為武義成功可汗始回紇至中國常參以九姓胡往往留京師至千人居資殖産甚厚會酋長突董翳密施大小梅録等還國裝槖係道留振武三月供擬珍豐費不資軍使張光晟隂伺之皆盛女子以槖光晟使驛吏刺以長錐然後知之已而聞頓莫賀新立多殺九姓胡人懼不敢歸往往亡去突董察視嚴亟羣胡獻計於光晟請悉斬回紇光晟許之即上言回紇非素強助之者九胡爾今其國亂兵方相加而虜利則往財則合無財與利一亂不振不以此時乘之復歸人與幣是謂借賊兵資盜糧也使裨校陽不禮突董果怒鞭之光晟因勒兵盡殺回紇羣胡收槖駝馬數千繒錦十萬且告曰回紇抶大將謀取振武謹先誅之部送女子還長安帝召光晟還以彭令方代之遣中人與回紇使聿達于往言其端因欲與虜絶敕源休俟命太原明年乃行因歸突董等四喪突董可汗諸父也源休至可汗令大臣具車馬出迎其大相頡于迦踞坐責休等殺突董事休言彼自與張光晟鬭死非天子命又曰使者皆負罪死唐不自戮何假手於我邪良久罷去休等幾死留五旬卒不見可汗可汗傳謂休曰國人皆欲爾死我獨不然突董等已亡今又殺爾猶以血濯血徒益汙吾以水濯血不亦善乎為我言有司所負馬直一百八十萬可速償我遣散支將軍康亦心等隨休來朝帝隱忍賜以金繒後三年使使者獻方物請和親帝畜前恚未平謂宰相李泌曰和親待子孫圖之朕不能已泌曰陛下豈以陜州故憾乎帝曰然朕方天下多難未能報且毋議和泌曰辱少華等乃牟羽可汗也知陛下即位必償怨乃謀先冦邉然兵未出為今可汗所殺矣今可汗新立遣使者告垂髮不翦待天子命而張光晟殺突董等雖幽止使人然卒完歸則為無罪矣今其請和必舉部南望陛下不答怨益深願聼昏而用開元故事如突厥可汗稱臣使來者不過二百市馬不過千不以唐人出塞亦無不可者帝從之乃許降公主回紇亦請如約詔咸安公主下嫁明年可汗遣其宰相等來迎時可汗上書恭甚言昔為兄弟今壻半子也陛下若患西戎子請以兵除之又請易回紇為回鶻言捷鷙如鶻然詔以嗣滕王湛然為昏禮使且將册書拜可汗加號并册公主為可敦貞元五年可汗死子多邏斯立詔遣使册為可汗初安西北廷自天寶末失關隴朝貢道隔伊西北廷節度使李元忠四鎮節度留後郭昕數遣使奉表皆不至貞元二年元忠等所遣假道回鶻乃得至長安帝進元忠昕等皆為大都護自是道雖通而虜求取無厭沙陀别部六千帳與北廷相依亦厭虜裒索皆密附吐蕃故吐蕃因沙陀共冦北廷頡于迦斯與戰不勝北廷陷葛祿又取深圖川回鶻大恐稍南其部落以避之是嵗可汗死其弟自立為國人所殺以可汗幼子阿啜嗣詔遣使册為可汗是嵗回鶻擊吐蕃葛祿於北廷勝之來獻俘十一年可汗死無子國人立其相骨咄祿為可汗遣使來詔册命如故事永貞元年死遣使弔祭册所嗣為可汗元和初再朝獻三年死詔册其嗣為可汗遣使者來請昏禮部尚書李絳言北狄西戎素相攻討故邊無虞今回鶻不市馬若與吐蕃結約解仇則將臣閉壁憚戰邉人拱手受禍又淮西吳少陽垂死若無北顧憂可乘其變發諸道討平之或曰降主費多臣謂不然我三分天下賦以一事邊又東南大縣賦嵗二十萬緍以一縣賦為婚資非損寡得大乎帝不聼穆宗立回鶻又固請昏許之俄而可汗死遣使册所嗣為可汗可汗乃遣使來逆女部渠二千人納馬二萬槖駝千四夷之使中國其衆未嘗多此詔許五百人至長安餘留太原以太和公主下降主憲宗女册為可敦時裴度方伐幽鎮回鶻以兵三千佐天子平河北賊議者懲創前患不聼兵已及豐州使者厚賜乃去敬宗即位之年可汗死其弟立遣使册為可汗文宗太和六年可汗為其下所殺從子胡特勒立遣使册為可汗開成四年其相掘羅勿作難引沙陀共攻可汗可汗自殺國人立廅馺特勒為可汗方嵗飢遂疫又大雪羊馬多死未及命武宗即位乃知其國亂俄而渠長句録莫賀與黠戞斯合騎十萬攻回鶻城殺可汗誅掘羅勿焚其牙諸部潰其相馺職厖特勒十五部奔葛邏祿殘衆入吐蕃安西於是可汗牙部十三姓奉烏介特勒為可汗南保錯子山黠戞斯已破回鶻得太和公主又自以李陵後與唐同宗故遣使者達于奉主來歸烏介怒追擊達于殺之劫主南度磧邊人大恐進攻天德城振武節度使劉沔屯雲伽關拒卻之宰相李德裕建言回鶻曩有功今飢且亂可汗無歸不可擊宜遣使者贍安之帝用兵部郎中李拭行邊刺狀於是其相赤心與王子嗢沒斯特勒那頡啜將其部欲自歸而公主亦遣使者來言烏介已立因請命又大臣頡于伽思等表假振武居公主可汗帝乃詔右金吾衛大將軍王會持節慰撫其衆輸糧二萬斛不許借振武令中人好語開諭又詔使者持册往潛稽其行須變明年回鶻奉主至漠南入雲朔剽橫水殺掠甚衆轉側天德振武間盜畜牧自如乃召諸道兵合討嗢沒斯以赤心姧桀難得要領即密約天德戍將田牟誘赤心斬帳下那頡啜收赤心衆七千帳東走振武大同因室韋黑沙南窺幽州節度使張仲武破之悉得其衆那頡啜走烏介執而殺之然烏介兵尚強號十萬駐牙大同北閭門山而特勒厖俱遮阿敦寧等凡四部及將軍曹磨你衆三萬因仲武降嗢沒斯亦附使者送款帝欲使助可汗復國而可汗已攻雲州劉沔與戰敗績嗢沒斯率三部及特勒大酋二千騎詣振武降詔拜嗢沒斯為右金吾衛上將軍爵懷化郡王其酋阿麼支等皆拜郡公嗢沒斯請留族太原率昆弟為天子扞邉帝命劉沔為列舍雲朔間處其家可汗遣使者籍兵欲還故廷且假天德城帝不許可汗恚進略大同川轉戰攻雲州詔發諸鎮兵屯太原以北嗢沒斯等既朝俱賜姓李名嗢沒斯曰思忠於是詔劉沔為回鶻南面招撫使思忠為西南面招討使沔營鴈門又詔銀州刺史何清朝等以兵出振武與沔等合稍逼回鶻思忠數深入諭降其下沔思忠等與回鶻戰屢破之烏介方薄振武石雄馳入夜穴壘出鏖兵烏介驚引去雄遇公主奉主還降特勒以下衆數萬可汗收所餘往依黑車子詔窮躡其後仍啖黑車子以利募殺烏介初從可汗亡者既不能軍往往詣幽州降留者皆飢寒裁數千黑車子幸其殘即殺烏介其下又奉其弟遏捻特勒為可汗思忠等以國亡皆願入朝見聽擢為左監門衛上將軍稟奉賜第分其兵隸諸節度遏捻可汗裒殘部五千仰食於奚大酋碩舍朗大中初張仲武討奚破之回鶻寖耗滅所存名王貴臣三百餘轉依室韋仲武諭令羈致可汗遏捻懼挾妻葛祿子特勒毒斯馳九騎夜委衆西走部人皆慟哭室韋七姓析回鶻隸之黠戞斯怒與其相阿播將兵七萬擊室韋悉收回鶻還磧北遺帳伏山林間狙盜諸蕃自給稍歸厖特勒是時特勒已自稱可汗居甘州有磧西諸城宣宗務綏柔荒逺遣使者抵靈州省其酋長回鶻因遣人隨使者京師帝即册拜嗢祿登里邏汨沒蜜施合俱録毗伽懷建可汗後十餘年一再獻方物懿宗時大酋僕固俊自北庭擊吐蕃斬論尚熱盡取西州輪臺等城使達于米懷玉朝且獻俘因請命詔可其後王室亂貢會不常史亡其傳昭宗幸鳯翔靈州節度使韓遜表回鶻請率兵赴難翰林學士韓偓曰虜為國仇舊矣自會昌時伺邉羽翼未成不得逞今乘我危以冀幸不可開也遂格不報然其國卒不振時時以玉馬與邉州相市云五代之際有居甘州西州者嘗見中國而甘州回鶻數至自唐以女妻之後代猶呼中國為舅中國答以詔書亦呼為甥梁乾化元年都督周易言等來史不見其君長名號梁拜易言等官爵遣還唐莊宗時王仁美遣使者來貢玉馬自稱權知可汗莊宗遣使册為英義可汗是嵗仁美卒弟狄銀立同光四年狄銀卒阿咄欲立天成二年權知國事王仁裕遣使來朝明宗册為順化可汗晉髙祖時又加册命阿咄欲不知其為狄銀親踈亦不知其立卒而仁裕訖五代常來朝貢史亦失其紀其地出玉犛牛緑野馬獨峯駝白貂鼠羚羊角硇砂腽肭臍金剛鑽紅鹽罽㲲騊駼之革其地宜白麥青麥黃麻蔥韭胡荽以櫜駝耕而種其可汗常樓居妻號天公主其國相號媚祿都督見可汗則去帽被髮而入以為禮婦人總髮為髻髙五六寸以紅絹囊之既嫁則加氈帽又有别族號龍家其俗與回紇小異長興四年回鶻來獻白鶻一聨明宗命解緤放之自明宗時嘗以馬市中國其所賫寶玉皆鬻縣官而民犯禁為市者輒罪之周太祖時除其禁民得與回鶻私市玉價由此倍賤顯德中來獻玉世宗曰玉雖寶而無益却之仁裕卒子景瓊立宋建隆二年景瓊遣使朝獻三年阿都督等四十二人以方物來貢乾德二年遣使貢玉百團琥珀四十斤犛牛尾貂鼠等三年又遣使貢方物開寶中纍入貢其宰相亦來貢馬太平興國二年遣使詔諭甘沙州回鶻可汗外甥賜以器幣招致名馬美玉以備車騎琮璜之用五年及雍熙元年俱入貢端拱元年九月回鶻都督石仁政磨囉王子等四族並居賀蘭山下無所統屬蕃部入貢多由其地磨囉王子自云向為靈州馮暉阻絶由是不通貢奉今有內附意各以錦袍錦帶賜之至道二年甘州可汗附國來貢方物因上言欲同率兵助討李繼遷賜詔優奬之咸平四年可汗遣使來貢自言夲國東至黃河西至雪山有小郡數百甲馬甚精皆願朝廷命使統領得縛繼遷以獻降詔嘉諭之景德元年入貢四年入貢又遣僧來奏欲於京城建佛寺祝聖壽求錫名額不許大中祥符元年遣使入貢四年其使者請從祀汾隂其年秦州回鶻安蜜獻玉帶於道左既而夜落紇遣使言敗趙德明蕃兵立功皆首領請加恩賞詔給司戈司階郎將告敕十道使得承制補署先是甘州數與夏州接戰夜落紇貢奉多為夏州鈔奪及宗哥族感悅朝廷恩化乃遣人援送其使故頻年得至京師既而唃厮囉欲娶可汗女而無聘財可汗不許因為仇敵復阻貢路八年可汗遣使乞慰諭宗哥使開朝貢之路從之天禧二年都督安信等來朝四年又遣使同龜兹國可汗使來獻大尾羊初回鶻西奔族種散處故甘州有可汗王西州有克韓國新復州有黑韓王皆其後焉天聖元年甘州遣使來貢方物六月詔封甘州回鶻外甥可汗王夜落隔通順特封歸忠保順可汗王二年三年四年五年六年各遣使入貢熙寧元年入貢求買金字大般若經以墨夲賜之六年復來補其首領五人為軍主嵗給綵二十匹神宗問其國種落生齒幾何曰三十餘萬壯可用者幾何曰二十萬明年敕李憲擇使聘阿里骨使諭回鶻令發兵深入夏境憲以命殿直皇甫旦旦入蕃不得前而妄奏功狀詔逮旦赴御史獄抵罪然回鶻使不常來宣和中間因入貢散而之陜西諸州公為貿易至留久不歸朝廷慮其習知邊事且往來皆經夏國於播傳非便乃立法禁之文獻通考卷三百四十七
