body:
  text: 文獻通考卷五十八鄱陽馬端臨貴與著職官考十二樞密院唐代宗永泰中置內樞密使始以宦者為之初不置司局但有屋三楹貯文書而已其職掌惟承受表奏於內中進呈若人主有所處分則宣付中書門下施行而已永泰中宦官董廷秀參掌樞密事元和中劉光琦梁守謙為樞密使長慶中王守澄知樞密事舊左右軍容多入為樞密亦無視事之廳後僖昭時楊復恭西門季元欲奪宰相權乃於堂狀後帖黃指揮公事此其始也後梁革唐世宦官之弊開平元年改樞密院為崇政院命敬翔為使始更用士人其備顧問參謀議於中則有之未始専行事於外也唐莊宗同光元年復以崇政院為樞密院命宰臣郭崇韜兼使又置院使一人然權侔宰相矣晉天福中以桑維翰知樞密院事四年廢樞密院以劉處謙兼樞密奏議多不稱旨及處謙丁內憂遂廢其院開運元年復置以宰臣桑維翰兼使周顯德六年范質王溥並參知樞密院事宋朝樞密院與中書對持文武二柄號為二府院在中書之北印有東院西院之文而共為一院但行東院印建隆元年以魏仁浦吳興祚為樞密使趙普為副使周末闕副使至是始置太平興國四年以石熙載為樞密直學士以簽書院事直學士六人備顧問應對然未嘗盡除簽書之名始此淳化三年以張遜知院事溫仲舒寇凖同知院事同知院之名始此治平中以郭逵同簽書院事同簽書之名始此舊制樞密院有使則置副使有知院則置同知如置知院則當為副使者皆改同知若置使則同知復改為副使熙寧元年文彥博呂公弼為使韓絳邵亢為副使時陳升之三至樞府神宗欲稍異其禮乃以為知院於是知院與使副並置矣元豐改官制議者欲廢密院歸兵部神宗曰祖宗不以兵柄歸有司故専命官統之互相維制不從然以密院聨職輔弼非出使之名乃定置知院同知院二人餘悉置職事多所釐正細務分𨽻六曹専以兵機軍政為職而契丹國信民兵牧馬猶總領焉中興初有知院同知院簽樞同簽樞不置樞密使副使紹興七年張魏公既薦秦檜未欲其與已並又以故相不可除他官乃先白髙宗降旨以本兵之地事權宜重特除樞密使秦檜首復除樞使王敏節副之既而張劉二將並除樞密使嶽飛副之合典故矣近嵗張俊汪徹虞允文王炎王淮周必大王藺趙汝愚繼除樞使其副止稱同知蓋相承之誤石林葉氏曰梁改樞密院為崇政院唐莊宗復舊名遂改為樞密院直學士至明宗時安重誨為樞密使明宗既不知書而重誨又武人故孔循始議置端明殿學士二人専備顧問以馮道趙鳳為之班翰林學士上蓋樞密院職事官也本朝樞密院官既備學士之職寖廢然猶會食樞密院每文德殿視朝則升殿侍立亦不多除人官制行乃與職事皆為職名為直學士之冠不𨽻樞密院升殿侍立為樞密都承旨之任每吏部尚書補外除龍圖閣學士戶部以下五曹則除樞密直學士相呼謂之密學容齋洪氏隨筆曰唐世樞密使専以內侍為之與他使均稱內諸司五代以來始參用士大夫遂同執政按實録所載景德二年三月元德皇后忌中書樞密院文武百官並赴相國寺行香初樞密院言舊例國忌行香惟密院使副依內諸司例不赴恐有虧恭恪今欲每遇大忌日與中書門下同赴行香從之樞密使副翰林樞密直學士並赴自兹始也然則樞密之同內諸司久矣隆興以來定朝臣四參之儀自宰臣至於郎官御史皆班列殿庭拜舞惟樞密立殿上不預亦此意云按樞密之名始於唐代宗寵任宦者故置內樞密使使之掌機密文書如漢之中書謁者令是也若內中處分則令內樞密使宣付中書門下施行則其權任己侔宰相至僖昭間楊復恭西門季元之徒遂至於視事行文書矣昭宗天復元年既誅劉季述乃敕近年宰相延英奏事樞密院侍側爭論紛然既出又稱上旨未允復有改易撓權亂政自今並依大中舊制俟宰相奏事畢方得升殿承受公事蓋當時所謂樞密使者専橫如此朱梁懲唐弊不用宦者然徒知宦者之不可用而不知樞密院之不必存也乃復改為崇政院以敬翔為使至後唐而復樞密院郭崇韜安重誨相繼領其事皆腹心大臣則是宰相之外復有宰相三省之外復有一省矣宋興始以樞密與中書對持文武二柄號稱二府然後樞密院之設始専有職掌不為贅疣然祖宗時樞密院官雖曰掌兵亦未嘗不兼任宰相之事景德四年中書命祕書丞楊士元通判鳳翔府樞密院命之掌內香藥庫兩府不相知宣敕各下乃詔自今中書所行事關軍機及內職者報樞密院樞密院所行關民政及京朝官者報中書是樞密院得以預除授之事也又是年命宰臣王旦監修兩朝正史知樞密王欽若陳堯叟參知政事趙安仁並修國史是樞密院可以預文史之事也至慶歷以後始以宰相兼樞密使及元豐官制行欲各主其名遂不復兼乃詔釐其事大小大事三省與密院同議進呈畫旨稱三省樞密院同奉聖旨三省官皆同簽書付樞密院行之小事樞密院獨取旨行訖關三省每朝三省樞密先同對樞密院退待於殿廬三省始留進呈三省事退樞密院再上進呈獨取旨遂為定例然熙寧初以司馬溫公為樞密副使公以言新法不見聽力辭上使人謂之曰樞密兵事也官各有職不當以他事辭其時文潞公亦在樞府雖持正論終不能抑新法之行至哲宗初即位蔡確為相溫公為門下侍郎章惇知樞密院溫公欲復差役法而確言此大事當與樞密院同議取旨惇果駁溫公所言然則密院雖可以參謀三省之事而又在所以委任之者如何溫公潞公當熙寧之時與國論不合則欲其専任本兵不預他事蔡確當元祐之初欲引章惇以自助則欲其共立異議陰排正人至紹聖以後則兩府皆憸人附會紹述更無異議亦不復聞以文馬之儔參錯其間矣樞密使五代置樞密使宋朝國初因之詳見樞密院門建隆二年以樞密副使兵部侍郎趙普為檢校太保充樞密使不帶正官自普始也又以宣徽北院使李處榮為南院使兼樞密副使自五代以來凡樞密院官皆文武參用大中祥符七年以王嗣宗曹利用並為檢校太保充樞密副使亦不帶正官開寶九年以曹彬為樞密使領忠武軍節度使𢃄節度自此始也至道三年以鎮國軍節度曹彬兼侍中充樞密使彬自節鎮入罷旄鉞太平興國六年以樞密副使石熙載為戶部尚書充樞密使以文資正官充使自此始也大中祥符五年以知樞密院王欽若陳堯叟同中書門下平章事充樞密使儒臣為樞使兼使相自此始也皇祐五年制以樞密使髙若訥為尚書左丞觀文殿學士兼翰林侍讀學士同羣牧制置使故事罷樞密使當學士降麻及若訥罷但令舍人草詞遂以為例元豐官制行罷使副紹興七年詔樞密本兵之地事權宜重可依故事置樞密使副使閏月詔宰臣兼使同月詔樞使立班序立依宰相例乾道五年以虞允文為樞密使立班恩數並依宰臣宰相兼樞密使樞密使帶相印為樞相自後唐始宋初魏仁浦以宰相兼樞密使後罷慶歷二年二邊用兵富弼言邊事係國安危國初范質王溥以宰相兼知樞密事今兵興宜令宰相兼領仁宗然之令中書同議樞密院事呂夷簡為首相曰恐樞密謂臣奪權時諫官亦論宰相宜知兵事遂降制以宰相判樞密院或曰二府體均判字太重乃改為兼樞密使建炎初置御營司以宰相為之使四年罷之以其事歸樞密院機速房以宰相范宗尹兼知樞密院自慶歷後宰相不兼樞密者八十餘年其兼自此始紹興七年令宰臣張浚兼樞密使趙鼎秦檜亦以左右僕射兼紹興二十五年秦檜死乃詔依祖宗故事更不兼領其後或兼或否至開禧而宰臣兼使為永制矣知樞密院晉天福初桑維翰以翰林學士尚書禮部侍郎知樞密院事知院之名始此宋初不置淳化二年樞使王顯出鎮始以張遜知樞密院事知樞密院同知院並正二品知院掌佐天子執兵政而同知院為之副凡邊防軍務常與三省分院稟奏事干體要則宰相執政官合奏神宗正史職官志元豐官制行廢樞密使政和末鄧莘公官至少保猶止為知院焉中興初宰相兼樞密只兼知院容齋洪氏隨筆曰國朝樞密之名其長為使則其二為副使其長為知院則其二為同知院如柴禹錫知院向敏中同知及曹彬為使則敏中改副使王繼英知院王旦同知繼馮拯陳堯叟亦同知及繼英為使拯堯叟乃改簽書院事而恩例同副使王欽若陳堯叟知院馬知節簽書及王陳為使知節遷副使其後知節知院則任中正周起同知惟熙寧初文彥博呂公弼已為使而陳升之過闕留王安石以升之曾再入樞府遂除知院知院與使並置非故事也安石之意以沮彥博耳紹興以來唯韓世忠張浚為使嶽飛為副使此後除使固多而其二只為同知亦非故事也又使班視宰相而乾道職制雜壓令副使反在同知之下又曰趙汝愚初拜相陳騤自參知政事除知樞密院趙辭不受相印乃改樞密使而陳已供職纍日朝論謂兩樞長又名稱不同為無典故然熙寧間陳升之知樞密院文彥博呂公弼為使乃知院與使並命故事也同知樞密院五代有參知樞密院事詳見樞密院宋朝國初闕淳化二年王顯出鎮張遜知樞密院事始以溫仲舒寇凖同知院同知之名自此始也元豐官制行廢使副存同知紹興中髙宗以本兵之地事權宜重依祖宗故事置樞密使而知院同知院亦仍舊由是並除簽書樞密院同簽書院事宋太平興國四年石熙載以樞密直學士簽書院事簽書之名自此始也八年張齊賢王沔並以右諫議大夫簽書樞密院事端拱元年以內客省使楊守一為宣徽北院使簽書密院事景德三年韓崇訓檢校太傅馬知節為檢校太保並簽樞密院事天僖四年以華州觀察使曹瑋為宣徽北院使鎮國軍留後簽書樞密院事簽書兼藩鎮自此始也元豐官制行使副簽書悉罷元祐初復置簽書樞密院事初除皆帶密直及罷政乃拜端明殿學士靖康初李回首拜延康殿學士簽書延康今為端明自是遂為故事樞密院舊無同簽書院事者治平中始以郭逵為之簽書大抵以處資淺之人若簽書一經親祠方進同知及樞副若武臣權預國政只除同簽書容齋洪氏隨筆曰樞密使副使知院事同知院事簽書同簽書之别雖品秩有髙下然均稱為樞密明道中王沂公自故相召為檢校太師樞密使李文定公為集賢相以書迎之於國門稱曰樞密太師相公豫家藏此帖紹興五年髙宗車駕幸平江過秀州執政從行者四人在前者傳呼宰相趙忠簡也次呼樞密張魏公也時為知院事次呼參政沈必先也最後又呼樞密則簽書權朝美云豫為檢詳時葉審言黃繼道為長二亦同一稱而二三十年以來遂有知院同知之目初出於典謁街卒之口久而朝士亦然名不雅古莫此為甚都副承旨五代有承旨副承旨以諸衛將軍充魏仁浦為樞密副承旨周祖問屯兵之數及將校名氏令取簿參視之仁浦曰臣悉能記之遂口占以對無一差誤宋太平興國中以楊守一充都承旨都承旨自守一始也是時都承旨副承旨多用士人真宗後稍稍遂用吏人歐陽修建言請復舊制不克行熙寧二年始以東上閣門使李評為樞密都承旨李綬為之副不用院吏而更用士人自評始也續會要初評受命文潞公為樞使以舊制見不為禮評訴於上命檢故事不獲乃詔都承旨副承旨見樞密使副並如閣門使禮熙寧五年以尚書比部員外郎集賢校理同修起居注曾孝寬為起居舍人充史館修撰兼都承旨先是或用士人亦止於右職中選用文館兼領自孝寬始也元豐三年用張誠一為客省使都承旨自是都承復用武臣元祐中復以文臣𢃄待制充都承旨哲宗職官志至崇寧以後則専用武臣矣四朝志紹興二年權禮部侍郎趙子畫充徽猷閣待制密院都承旨自改官制後除文臣自子畫始中興系年録建炎四年髙宗在會稽以武臣辛宗道為都承旨頗用事紹興元年十二月辛宗道既免乃詔依元祐職制置都承旨一員並差兩制為之然但聞一二人而已淳熙中王抃久用事孝宗惡焉遂復用士人檢詳檢詳之職古無之宋熙寧四年詔以編修經武要略官四人王存陳侗陳奉世蘇液檢詳樞密院諸房文字禮遇視中書檢正官元豐三年詔定置三員及改官制檢詳官尋罷建炎三年樞密院請依祖宗朝置檢詳諸房文字兩員敘位在左右司之下紹興二年詔樞密院已置都承旨一員減檢詳一員樞密請置二員從之三十二年詔樞密院諸房令檢詳書擬從左右司請也乾道二年詔樞密院檢詳係掌朝廷機要文字不許出謁及接見賔客亦令遵兩省官施行編修官編修官古無之慶歷四年史館王洙承旨單士寧編修例册編修之名自此始熙寧二年樞密院乞將祖宗以來法制所宜施行於久逺者並與刪取大旨著為畫一及聖政釐革檢尋本院文書以次記録其事目曰兵制凡招揀屯戍訓練之類皆附焉曰馬政曰邊防曰夷狄曰屬國曰守城曰器械曰捕盜曰選材曰責效各以其事類相從一如兵制候編成䇿仍於逐門各留空紙以備書載將來處置事件從之詔以經武要略為名熙寧三年以館職王存顧臨等同編經武要略兼刪定諸房例册元祐四年詔密院條例久未編修又自官制後舊事例他司所存者亦未刪正命承旨司取索編修以奉議郎蔡駰宣德郎衛規充編修官舊以四員為額紹興兵興裁省其半三年樞密請置檢詳二員編修止存一員後復編修官隨事置無定員以本院官兼者不入銜宣徽院唐置宣徽南北院使有副使宦者嚴季實楊復恭皆嘗為之梁因之後唐省副使院在樞密院北二使共院而各設廳事使各一人以檢校官為之或領節度及兩使留後闕則樞密副使一人兼領二使亦有兼樞密副使簽書樞密院者南院使資望比北院使稍優然事皆通掌只用南院印掌總領內諸司及三班內侍之籍郊祀朝會宴饗供帳之事應內外進奉悉檢視其名物分掌四案曰兵案曰騎案曰倉案曰胄案其吏史則有都勾押官前行後行其給使則有知客押衙道引行首之屬故事與參知政事樞密副使同知樞密事以先後入敘位宋熙寧四年詔位參知政事樞密副使同知樞密院下著為令九年詔今後遇以職事侍殿或中書樞密院合班問聖體及非次慶賀並特敘二府班官制行罷宣徽院以職事分𨽻省寺而使號猶存初王拱辰治平中知宣徽院神宗即位拜太子少保明年檢校太傅改宣徽北院使尋遷南院立班序位視簽樞元豐六年拱辰除安武軍節度使再任自此遂罷使名不復除獨太子少師張方平許依舊領南院使致仕哲宗即位始遷太子太保而罷使名元祐三年復置南北院使儀品恩數如舊制在京人從視簽樞六年以馮京為南院使而張方平亦復使名中書舍人韓川言祖宗設此官禮均二府以待勳舊未嘗帶以致仕且宣徽武官也宮保文官也不宜混併不聼方平亦固辭不拜七年馮京亦以使致仕紹聖三年議者言官名雖復而無所治之事乃罷之按樞密宣徽院皆始於唐然唐之職官志及會要略不言建置本末蓋因肅代以後特設此官以處宦者其初亦無甚司存職業故史所不載及其後宦者之勢日盛則此二官日尊及五代以來至於宋朝則皆以大臣為之然樞密既専掌兵事繁任重故其官不可一日廢而副二屬官亦不容不備宣徽位尊而事簡故常以樞密院官兼之或以待勳舊大臣之罷政者及官制行而事各有所𨽻則愈覺贅疣故遂廢罷云將軍總敘三代之制天子六軍其將皆命卿故夏書曰大戰于甘乃召六卿蓋古之天子寄軍政於六卿居則以田警則以戰所謂入使治之出使長之之義其職在國則以比長閭胥族師黨正州長鄉大夫為稱在軍則以卒伍司馬將軍為號所以異軍國之名諸侯之制大國三軍次國二軍小國一軍其將亦命卿也晉獻公初作二軍公將上軍未有其號魏獻子衛文子始有將軍之稱左傳曰晉閻沒女寬謂魏子曰豈將軍食之而有不足注曰獻子為中軍率故謂之將軍又禮記曰將軍文子之喪自戰國置大將軍周末又置前後左右將軍秦因之位上卿金印紫綬漢興置大將軍驃騎將軍位次丞相車騎將軍衛將軍左右前後將軍皆金印紫綬位次上卿後漢志曰漢將軍比公者四謂大將軍驃騎車騎衛將軍掌京師兵衛四夷屯警孝武征閩越東甌又有伏波樓船及伐朝鮮大宛復置橫海度遼二師宣帝增以蒲類破羌權時之制若此非一亦不常設光武中興諸將軍皆稱大及天下已定武官悉省四征興於漢代四安四平起於魏初後漢有三鎮之稱魏有鎮北之號晉武帝重兵官故軍校多選朝廷清重之士居之置中軍將軍以統宿衛七軍及五王作難東海王越以頃興事皆由殿省乃奏宿衛有侯爵者皆罷之時殿中武官並封侯由是出者略盡皆涕泣而去乃以東海國官領左右衛以國兵宿衛晉宋以來以領軍護軍左右二衛驍騎遊擊將軍謂之六軍宋輿服志曰驃騎車騎衛將軍及諸將軍加大者皆金章紫綬武冠佩水蒼玉諸軍司馬銀章青綬朝服武冠其四安四平左右前後征虜等將軍及四中郎將晉代荀羡王胡之並居此官宋齊以來唯處諸王素族無為者齊以二衛四軍五校驍騎遊擊積射強弩殿中員外殿中武衛七將軍殿中司馬左右及虎賁中郎將冗從僕射羽林監武騎常侍謂之西省而散騎為東省梁武帝以將軍之名髙下舛雜命更加釐定於是有司奏置一百二十五號將軍以鎮衛驃騎車騎為二十四班四征四中為二十三班八鎮為二十二班八安為二十一班四平四翊為二十班凡三十六號為重號將軍又有五德將軍忠勇軍師武臣瓜牙龍騎雲麾鎮兵翊師宣惠果毅知威仁威勇威信威嚴威智武仁武勇武信武嚴武是為五德將軍也以班多者為貴凡十品二十四班品取其盈數班法氣候之數制簿悉以大號居後以為選法自小遷大也前史所記以位得從公故將軍之名次於台槐之下至是備其班品敘於百官之外凡一百二十五將軍後魏將軍之名多矣謂驃騎軍騎衛為三將軍末年有八柱國大將軍其中六人各督二大將軍凡十二大將軍元贊元育元廓侯莫陳順宇文遵逹奚武李逺豆盧寧宇文貴賀蘭祥楊忠王雄等是也又各分統開府一人一開府領一軍兵是為二十四軍分掌禁旅當瓜牙禦侮之寄自大統十六年以後功臣位至柱國及大將軍者衆矣咸是散秩無復統禦後周武帝三年改諸軍軍士並為侍官隋煬帝以左右衛左右屯衛左右禦衛左右候衛凡十二衛各置大將軍一人將軍二人以總府事每衛各置長史録事參軍司倉兵騎鎧等參軍員軍人總名衛士蓋魏周十二大將軍之遺制唐武德初秦王既平王世充及竇建德髙祖以秦王功殊今古自昔位號不足以為稱乃特置天䇿上將軍以拜焉位在王公上及升儲宫遂廢天䇿府二年七月髙祖以天下未定事資武力將舉關中之衆以臨四方乃置十二軍分關中諸府以𨽻焉以萬年道為參旗軍長安道為鼓旗軍富平道為元戈軍醴泉道為丹鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍岐州道為平道軍豳州道為招搖軍麟州道為苑遊軍涇州道為天紀軍宜州道為天節軍每軍將一人副一人取威名素重者為之楊恭仁劉𢎞基長孫順德等為其將督耕戰之備自是士馬強徑無敵於天下五年省七年以突厥寇掠復置十二軍後又省之其後定制有左右衛左右驍左右武左右威左右領軍左右金吾左右監門左右千牛凡十六衛大將軍各一人左右衛及左右金吾總謂之四衛其餘謂之雜衛將軍總三十人左右千牛衛將軍各一人餘衛各二人左右羽林左右龍武左右神武六軍大將軍各一人將軍各三人皆有衛署其驃騎輔國鎮軍冠軍四大將軍雲麾勇武壯武宣威明威定逺寧逺遊騎遊擊等九將軍並為五品以上武散官先天二年正月十日詔往者衛士計戶取充使二十一入幕六十出軍既憚劬勞咸欲避匿今改取二十五以上充十五年即放出頻經征鎮者十年放出自今已後羽林飛騎先於衛士中簡擇開元六年始詔折衝府兵每六嵗一簡自髙宗武后時天下久不用兵府兵之法寖壞番役更代多不以時衛士稍稍去匿至是益耗散宿衛不能給宰相張説乃請一切募士宿衛十一年取京兆蒲同岐華府兵及白丁而益以潞州長從兵共二十萬號長從宿衛嵗一番命左丞蕭嵩與州刺史共選之明年更號曰彍騎也肅宗以後有左右神䇿軍各置大將軍一人統軍各二人將軍各四人後唐長興三年敕衛軍神威雄威及魏府廣捷以下指揮宜改為左右羽林置四十指揮每十指揮立為一軍每一軍置都指揮使一人兼分為左右廂應順元年改左右羽林四十指揮為嚴衛左右軍龍武神武四十指揮為捧聖左右軍清泰元年改捧聖馬軍為彰聖左右軍嚴衛步軍為寧衛左右軍宋朝承前代之制有左右金吾衛左右衛上將軍左右驍衛屯衛領軍衛監門衛千牛衛上將軍諸衛大將軍諸衛將軍並為環衛官無定員皆命宗室為之亦為武臣之贈典大將軍以下又為武臣責降散官政和中改武臣官制而環衛如故蓋雖有四十八階别無所領故也至於禁旅則有殿前司都副指揮使侍衛步軍馬軍都副指揮總之孝宗時始令節度使領左右金吾衛上將軍承宣使領左右衛上將軍在內則兼帶在外不𢃄左右衛并親衛漢京師有南北軍掌理禁衛南軍若唐諸衛北軍若唐羽林等軍周勃馳入北軍是也初有衛將軍魏末晉文王又置中衛將軍武帝受禪分中衛為左右衛將軍以羊琇為左趙序為右並置佐吏皆掌宿衛營兵銀章青綬武冠綘朝服佩水蒼玉宋齊謂之二衛各領營兵每暮一人宿直後增二衛儀從為九十人陳因之後魏永光初又增置左右衛將軍各二人北齊二人分掌左右廂所主朱華閣以外各武衛將軍二人二之隋初左右衛大將軍各一人將軍各二人又各統親衛煬帝改左右衛為左右翊衛又加置親衛並領勳武三衛煬帝改三衛為三侍非翊衛府皆無三侍其所領軍士名為驍騎唐復為左右衛大將軍各一人掌宫掖禁禦督攝隊伍將軍各二人二大將軍事宋有左右衛上將軍大將軍將軍中郎將郎並為環衛官無定員皆命宗室為之亦為武臣之贈自大將軍以下又為武臣責降散官長史左右衛各一人晉武帝置左右衛各有長史司馬東晉省長史歷宋齊梁陳後魏北齊並同隋左右衛各置長史一人唐因之録事參軍左右衛各一人東晉元帝初為鎮東大將軍置録事參軍自後無聞梁皇弟皇子府有中録事參軍及録事參軍各一人後魏二大公府及第一第二第三品將軍府及始蕃王二蕃王三蕃王府各有録事參軍官北齊因之隋左右衛府各有録事參軍一人唐因之倉曹參軍左右衛各二人東晉元帝為鎮東大將軍有倉曹參軍宋武帝相府亦置後魏與録事參軍同置北齊因之隋左右衛府各有倉曹參軍一人唐因之置二人兵曹參軍左右衛各二人歷代皆與倉曹同置騎曹參軍左右衛各一人魏司馬景王為大將軍有騎兵宋武帝為相有騎兵參軍隋左右衛府有騎兵參軍唐初因之其後改為騎曹胄曹參軍左右衛各一人東晉元帝為鎮束大將軍有鎧曹參軍宋武帝為相亦有之齊有左右鎧曹各一人隋左右衛府有鎧曹行參軍事一人唐因之長安初改為胄曹神武初復為鎧曹開元初復為胄曹凡自十六衛及東宫十率府録事及兵倉騎胄等曹參軍通謂之衛佐並為美職漢魏以來諸將軍有長史以下官屬及唐諸衛所置蓋亦因其舊號考其資位則全校微矣其下諸衛官屬並同左右親衛中郎將府中郎將之名秦漢以來有之隋每衛各置開府一員以統之唐武德七年改開府為中郎將親衛為一府勳衛翊衛各為一府中郎將各一人掌領校尉以下宿衛總判府事唐武德七年改親衛驃騎將軍為之其勳翊二衛亦然德左右郎將一人隋備身府置左右郎將唐因其名武七年改親衛車騎將軍為之其勳衛翊衛亦然掌二中郎將之職録事參軍一人掌受府事兵曹參軍一人掌判府事校尉五人左右驍衛漢有驍衛將軍謂之雜號將軍武帝以李廣為之後省後漢初改屯衛為驍騎魏置為中軍晉領營兵兼統宿衛梁以來其任愈重天監六年置左右驍騎領朱衣直閣並給儀從北徐州刺史昌義之首為此職出則羽儀清道入則與二衛通直臨軒則升殿夾侍改舊驍騎曰雲騎陳有左右驍騎及雲騎後魏北齊並有驍騎將軍之職後周有左右驍騎率上士隋開皇十八年置備身府煬帝即位改左右備身府為左右驍衛府所領軍士名曰豹騎其備身府又别置焉唐因隋置左右驍衛府龍朔二年去府字光宅元年改左右驍衛為左右武威神龍元年復舊大將軍各一人所掌與左右衛同將軍各二人以副之領官屬並隋置唐因之同左右衛宋制見總序左右武衛後漢末曹公為丞相有武衛營及魏文帝乃置武衛將軍以主禁旅晉宋齊梁陳隋又有建武奮武廣武等將軍至隋採諸武之名置左右武衛大將軍一人將軍各二人以總府事煬帝改所領軍士名熊騎唐光宅元年改為左右鷹揚衛神龍元年復為武衛其制與隋同所掌如左右衛領官屬並隋置唐因之同左右衛宋制見總序左右威衛隋初有領軍府煬帝改為左右屯衛唐因之貞觀十二年左右屯衛始置飛騎出遊幸即衣五色袍乘六間馬賜猛獸衣韀而從焉龍朔二年改左右屯衛為左右威衛而别置左右屯營亦有大將軍等官尋改左右屯營為羽林光宅元年改威衛為豹韜衛神龍元年復舊所掌如左右衛領官屬並隋置唐因之同左右衛龍朔二年左右威衛舊官之員外各置録事參軍一人府三人史四人並𨽻左右羽林軍統本司事左右領軍衛初魏武為漢丞相相府自置領軍非漢官也建安十二年改為中領軍以史渙為之與護軍韓浩皆領禁兵文帝受漢禪始置領軍將軍以曹休為之主五校中壘武衛三營晉武帝初省使中軍將軍羊祜統二衛前後左右驍騎七軍營兵即領軍之任也祜遷罷復置北軍中候懷帝永嘉中改中軍為中領軍元帝永昌元年復改曰北軍中候尋復為領軍成帝時復以為中候而陶侃居之尋復為領軍魏晉領護皆金章紫綬中領中護銀章青綬武冠絳朝服佩水蒼玉晉却鑒庾亮紀瞻卞壼陸曄褚翼王彪之會稽王道子沈嘉武陵王導孔安國謝鯤等並為領軍宋置領軍將軍一人掌內軍護軍將軍一人掌外軍齊有領軍及中領軍梁領軍將軍管天下兵要謂之禁司與左右僕射為一流中領軍與吏部尚書為一流陳因之後魏有領軍護軍二職若侍臣帶者加中又有領軍將軍護軍將軍二軍與領護不並置北齊領軍府凡禁衛官皆主之以髙歸彥為領軍大將軍領軍加大自歸彥始隋有左右領軍府各掌十二軍籍帳差科辭訟之事不置將軍惟有長史司馬諸曹掾屬等官煬帝改領軍為左右屯衛即唐左右威衛唐復採舊名别置領軍衛分為左右龍朔二年改為左右戎衛咸亨元年復舊光宅元年改為左右玉鈐衛神龍元年復舊各置大將軍一人掌宫掖禁備督攝隊伍與左右諸衛同將軍各二人以副之長史齊梁陳並有之北齊有長史司馬隋置録事以下諸曹唐因之同左右衛宋為環衛官無定員無職事皆命宗室為之詳見總敘靖康元年御史中丞陳過庭言請遵藝祖開寶初罷諸節度使歸環衛故事於是節度使錢景臻等並為左右金吾衛上將軍孝宗隆興初詔學士院討論環衛官制欲參酌祖宗時及唐太宗制如節度使則領左右金吾衛上將軍承宣使則領左右衛上將軍在內則兼𢃄在外則不帶正任為上將軍遙郡為大將軍正使為將軍副使為中郎將使臣以下為左右郎將通以十員為額宗室不在此例餘管軍則解或領閣門皇城之類則仍帶雖戚里子弟非戰功不除上謂宰相謂欲以此儲將才重環衛如文臣儲才於館閣也左右金吾衛秦有中尉掌徼循京師如淳曰所謂遊徼徼循禁備盜賊也顔師古曰徼謂遮繞漢武帝太初元年更名執金吾顔師古曰金吾鳥名也按起居注天子出職主先導以禦非常故執此鳥之象因以名官緹騎二百人緹騎無秩比史食俸五百二十人輿服導從光生滿路羣僚之中斯最壯矣光武微時歎曰仕宦當為執金吾舊掌京師盜賊考按疑事後漢掌宫外戒司非常水火之事衛尉巡行宫內金吾徼巡宫外相為表裏以擒姦捕猾月三繞行宫外及主兵器自中興但専徼循不與他政魏武秉政復為中尉晉初罷直至後周置武環率武候率下大夫各二人隋置左右武候府大將軍一人將軍三人掌車駕出入先驅後殿晝巡夜察執捕姦非烽候道路水草所宜巡狩師田則掌其營禁煬帝大業三年改為左右武候衛所領軍士名佽飛漢百官表曰漢有左武右武衛太初元年更名佽飛掌弋射屬少府光武省之隋氏採舊名唐初又為左右武候府龍朔二年改為左右金吾衛置大將軍一人所掌與隋同將軍二人副其事領官屬並隋置唐因之宋制見左右領軍衛門左右監門衛隋初有左右監門府將軍各一人掌宫殿門禁及守衛事各置郎將二人校尉直長各三十人有長史司馬録事及倉兵二曹參軍鎧曹行參軍各一人二漢有城門校尉掌京師城門屯兵非唐時任煬帝改將軍為郎將各一人正四品置官屬並同備身府唐左右監門府置大將軍中郎將等官龍朔二年改府為衛大將軍各一人所掌與隋同將軍各二人以副之中郎將各四人分掌諸門以時巡檢領官屬並隋置唐因之宋制見總敘左右千牛衛千牛刀名後魏有千牛備身掌執御刀因以名職謝綽宋拾遺有千牛刀即人君防身刀也齊尚書楊玉夫取千牛刀殺蒼梧王是也其義蓋取莊子云庖丁解牛十九年所割者數千牛而刀刃若發於硎因以為備身刀名北齊千牛備身屬左右將軍隋有左右領左右府大將軍一人將軍二人掌侍衛左右供御兵仗領千牛備身十二人掌執千牛刀備身左右十二人掌供御刀箭備身十六人掌宿衛侍從左右置長史司馬録事及倉兵二曹參軍事鎧曹行參軍煬帝改左右領左右府為左右備身府置備身郎將等官唐貞觀中復為左右領左右府顯慶五年始置左右千牛府龍朔二年改左右千牛府為左右奉宸衛後改為左右千牛衛神龍二年各置大將軍一人所掌與隋同總判衛事將軍各一人以副之中郎將各一人通判衛事領官屬即隋左右領左右府長史以下唐改之左右千牛備身各十二人掌執御刀宿衛侍從皆以髙廕子弟年少姿容美麗者補之為貴胄起家之良選備身左右十二人執御刀弓箭宿衛侍省備身各一百人掌宿衛侍從宋制見總敘左右羽林衛漢武太初元年初置建章營騎後更名羽林象天文羽林星主車騎也宣帝令中郎將騎都尉監羽林謂之羽林中郎將領郎百人謂之羽林郎選隴西漢陽安定北地西河上郡良家子便弓馬者以為之一名巖郎後漢志曰言從逰獵還宿殿階巖下室中故號巖郎又置羽林左右監後漢志曰羽林左監一人主羽林左騎羽林右監一人主羽林右騎皆六百石取從軍死事之子孫養之羽林官教以五兵號曰羽林孤兒光武中興以所征伐士勞苦者為之其後復簡五營髙手别為左右監羽林父死子繼與虎賁同所居之處謂之寺延熹六年減虎賁羽林住寺不任事者半俸二漢並屬光祿勳後漢竇固鄧彪並為羽林魏羽林左右監與漢同夏侯元為右桓範為左晉罷羽林中郎將又省一監置一監而已哀帝省宋武帝永初初復置江右領營兵江左無復營兵羽林監及虎賁中郎將並銅印墨綬武冠絳朝服其在陛列則鶡尾冠鶡鳥每鬪死不止絳紗縠單衣江左不復著鶡冠齊因之後魏有羽林監北齊置監十五人後周有左右羽林率屬大司馬隋煬帝改左右領軍為左右屯衛所領兵為羽林唐貞觀十二年於元武門置左右屯營以諸衛將軍領之其兵名曰飛騎又於飛騎中簡材力驍捷善戰者號為百騎扈從逰幸則衣五色袍乘六間馬賜猛獸衣韀龍朔二年改左右屯營為左右羽林軍武太后臨朝永昌元年改百騎為千騎天授中改軍為衛中宗景龍元年改千騎為萬騎大將軍一人大足元年左右羽林衛各增置將軍一人所掌與左右衛同將軍各三人以副之領官屬並唐置左右龍武軍左右神武軍附唐初有禁兵號為百騎屬羽林永昌元年改羽林百騎為千騎景龍元年改千騎為萬騎仍分為左右營開元二十六年析羽林軍置左右龍武軍以左右萬騎營隸焉官屬並唐置至德中分置左右神武軍各置官屬如羽林之制左右神策軍唐上元中以北衙軍使衛伯玉為神策軍節度使鎮陜州中使魚朝恩為觀軍容使監其軍初哥舒翰破吐蕃臨洮西之磨環川即其地置神䇿軍以成如璆為軍使及安祿山反如璆以伯玉將兵千人赴難伯玉與朝恩皆屯於陜時邊土陷蹙神策故地淪沒即詔伯玉所部兵號神䇿軍以伯玉為節度使與陜州節度使郭英義皆鎮陜其後伯玉罷以英義兼神䇿軍節度英義入為僕射軍遂統於觀軍容使廣德元年代宗避吐蕃幸陜朝恩舉在陜兵與神策軍迎扈悉號神策軍天子幸其營京師平朝恩遂以軍歸禁中自將之然尚未與北軍齒也南衙諸衛兵北衙禁軍永泰元年吐蕃復入冦朝恩又以神䇿軍屯苑中自是寖盛分為左右廂勢居北軍右遂為天子禁軍非他司比朝恩領之又請以京兆之好畤鳳翔之麟遊普潤皆𨽻神策軍明年又以興平武功天興隸之及朝恩罪誅以劉希暹代為神策軍使希暹復得罪以朝恩舊校王駕鶴代將德宗即位以白志貞代之及李希烈反河北盜起數出禁軍征伐神䇿之士多鬪死者下詔募兵而志貞陰以市人補之名隸籍而身居市肆及涇卒潰變皆戢伏不出帝遂出奔及志貞流貶神策都虞候李晟與其軍之他將皆自飛狐道西赴難遂為神策行營節度屯渭北軍遂振貞元二年改神策左右廂為左右神策軍特置勾當左右神策軍以寵宦者而益置大將軍以下又令左右神䇿軍皆加將軍二員以待諸道大將有功者其後京畿之西多以神策軍鎮之以竇文場霍仙鳴為左右神策護軍中尉又詔左右神策置統軍以崇親衛時邊兵衣餉多不贍而神䇿軍廪賜贏三倍繇是諸將多請遙隸神䇿軍往往稱神策行營皆內統於中人矣順宗即位王叔文用事欲取神策兵柄以奪宦者權而不克元和時廢左右神武左右神威軍以吳兵騎分隸左右神策軍及僖宗幸蜀田令孜募神策新軍為五十四都離為十軍令孜自為左右神策十軍兼十二衛觀軍容使肅宗以後營衛惟羽林龍武神武神策神威最盛皆隸北軍亦名左右十軍以左右神策大將軍為左右神策諸都指揮使諸都又領以都將亦曰都頭景福二年昭宗以藩臣跋扈天子孤弱議以宗室典禁兵及伐李茂貞乃用嗣覃王允為京西招討使神策諸軍五十四軍悉隸之屯興平已而兵自潰茂貞逼京師又與王行瑜韓建連兵犯闕天子為之斬中尉殺宰相乃去後又詔諸王閲親軍收拾神策亡散得數萬置殿後四軍嗣覃王允與嗣延王戒丕將之茂貞再犯京師覃王戰敗昭宗幸華州明年韓建畏諸王有兵請皆歸十六宅於是四軍二萬餘人皆罷又請誅都頭李筠遂殺十一王及還長安左右神䇿軍稍復置之以六十人為定是嵗左右神䇿中尉劉季述等廢帝幽之季述等誅而昭宗召朱全忠兵入誅宦官宦官覺劫天子幸鳳翔全忠圍之嵗餘天子乃誅中尉韓全誨等以解梁兵乃還長安於是悉誅宦官而神䇿左右軍繇此廢矣諸司悉歸尚書省郎官兩軍兵皆𨽻六軍而以崔允判六軍十二衛事六軍者左右龍武神武羽林其名存而已自是軍司以宰相領按通典敘唐十六衛建置官將之事詳矣而左右神策軍獨闕焉蓋杜公所言多至德天寶以前事而神䇿雖萌芽於肅代之時實磐固於德宗幸奉天之後其初也則劫制天子専擅策立而其末也則外召賊臣覆亡宗社蓋唐自中葉以後強藩擅兵禁衛寡弱而其僅存者復為神策所併視同中人之私屬至昭宗之時外不足以定寇而內徒以脅君逮中人誅神策廢而唐遂亡矣新史職官志亦以神策大將軍敘於諸衛之後但不言其興廢之本末故托史傳所言以補之殿前司都指揮使副都指揮使都虞候使副都虞候掌殿前諸班直及步騎諸指揮之名籍及訓練之政宋初有都點檢副都點檢之名在都指揮使之上後不復置入則侍衛殿陛出則扈從乘輿大禮則提點編排整肅禁衛鹵簿儀仗掌宿衛之事都指揮使以節度為之而副都指揮使都虞候以刺史以上充資序淺則主管本司公事馬步軍亦如之備則通治闕則互攝凡軍事皆行以法而治其獄訟若情不中法則稟奏聼旨騎軍有殿前指揮使內直散員散指揮散都頭散祗候金鎗班東西班散直鈞容直及捧日以下諸軍指揮步軍有御龍直骨朵子直弓箭弩直及天武以下諸軍指揮諸班有都虞候都虞候指揮使諸知副都知押班御龍諸直有四直都虞候本直各有都虞候指揮使副指揮使都頭副都頭十將將虞候騎軍步軍有捧日天武左右四廂都指揮使捧日天武左右廂各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使每都有軍使副兵馬使十將將虞候承局押官各以其職𨽻於殿前司政和四年詔殿前都指揮使在節度使之上副都指揮使在正任承宣使之上殿前都虞候在正任防禦使之上中興後都指揮使副都指揮使間虛不除則以主管殿前司一員任其事其屬有幹辦公事主管禁衛二員凖備差遣凖備差使點檢醫藥飯食各一員書寫機宜文字一員本司掌諸班直禁旅扈衛之事捧日天武四廂𨽻焉訓齊其衆振飭其藝通輪內宿併宿衛親兵並聽節制其下有統制統領將佐等分任其事凡諸軍班功賞轉補行門拍試換官閲日排連以詔於上諸殿侍差使年滿出職抵應參班核其名籍以時教閲則謹鞍馬軍器衣甲之出入軍兵有獄訟則以法鞫治初渡江草創三衙之制未備稍稍招集填置三帥資淺者各有主管某司公事之稱又别置御營司擢王淵為都統制其後外州駐劄又有御前諸軍都統制之名又併入神武軍以舊統制統領改充殿前統制統領官石林葉氏曰殿前司與侍衛司馬軍步軍為三衙其實兩司而侍衛司都指揮使外又置馬步軍都指揮使耳殿前司亦參馬步軍而總於都指揮使故殿前司都指揮副都虞候侍衛親軍都指揮使副都虞候與馬軍步軍都指揮使副使虞候兩司三衛合十二員分天下兵而領之此祖宗制兵之大要也始唐制有十二衛兵後又有六軍十二衛兵為南衙漢之南軍也六軍為北衙漢之北軍也末年常以大臣一人總之如崔允判六軍十二衛是也都指揮使本方鎮軍校之名自梁起宣武軍乃以其鎮兵因仍舊號置在京馬步軍都指揮使而自將之蓋於唐六軍諸衛之外别為私兵至後唐明宗遂改為侍衛親軍以康義誠為馬步軍都指揮使秦王從榮以河南尹為大元帥典六軍此侍衛司所從始也及從榮以六軍反入宫義誠顧望不出兵而侍衛馬軍都指揮使朱𢎞實擊之其後遂不廢殿前軍起於周世宗是時太祖為殿前司都虞候初詔天下選募壯士送京師命太祖擇其武藝精髙者為殿前諸班而置都檢點位都指揮使上太祖實由此受禪見於國史歐陽文忠公為五代史號精詳乃云不知所始蓋考之未詳也自有兩司六軍諸衛漸廢今但有其名則兩司不獨為親軍而已天下之兵柄皆在焉其權雖重而軍政號令則在樞密院與漢周之間史𢎞肇之徒為之者異矣此祖宗之微意非前世所可及也熙寧九年殿前都指揮郝質言往軍器監與判監劉奉世會議軍器上批殿前馬步三帥朝廷待遇禮繼二府事體至重寺監小官豈可呼召自今止令移文定議沈氏筆談曰三衙內中見宰執皆橫杖於文德殿後立廊階下唱喏宰相出立階揖之外遇從官於通衢皆避焉此禮久廢惟內中橫杖之禮至今不廢歐陽氏歸田録曰寶元康定豫自貶所還京見王君貺初作舍人在坐見殿前馬步軍聨騎立門外呈榜稱不敢求見舍人遣人謝之而去慶歷三年余作舍人三衙軍相逢而斂馬駐立前呵者傳聲太尉立馬急遣人謝之比舍人馬過然後敢行後余官於外十年而還遂入翰林與學士相逢分道而過更無斂避之禮蓋兩制漸輕三衙漸重洪邁論三衙軍制劄子臣仰惟陛下天資神武留意治軍將士感恩用命非復前比然臣區區管見獨以為猶有可議者軍制不立名位不正是也請以祖宗之制大略論之三衙軍職之大者凡八等除都指揮使或不常置外曰殿前副都指揮使馬軍副都指揮使步軍副都指揮使曰殿前都虞候馬軍都虞候步軍都虞候曰捧日天武四廂都指揮使龍神衛四廂都指揮使秩秩有序若登梯然不可一級輒廢一或有闕即以功次遞遷降此而下則分營分廂各置都副指揮使如捧日左廂第一軍都指揮使天武右廂第二軍都指揮使之類邊境有事命將討捕則旋立總管鈐轄都監之名使各將其所部以出事已則復初二百年之間纍聖相承皆用此術以制軍詰禁自南渡以後觸事草創於是三帥之資淺者始有主管某司公事之稱而都虞候以下不復設置乃以天子宿衛虎士而與在外諸軍同其名號以統制統領為之長又使遙𢃄外路總管鈐轄之名考之舊制則非法稽之事體則非是以陛下聖明能知人善任使所謂爪牙之士豈無數十人以待用者若法祖宗之制正三衙之名改諸軍為諸廂改統制以下為都虞候指揮使使宿衛之職預有差等士卒之心明有所繫異時拜將必無一軍皆驚之舉於以銷壓未萌循名責實則環衛將軍雖不置可也如蒙聖慈或以為然乞下樞密討論故實圖議其當恐或可以少贊陛下布昭聖武之意兹事體大願陛下深念之侍衛馬軍司馬軍都指揮使一人以節度使充副都指揮使都虞候皆無定員副都指揮使以觀察使以上充都虞候以防禦使以上充掌騎兵之名籍及訓練之政令所領馬軍自龍衛而下有左右四廂都指揮使龍衛左右廂各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使每都有軍使副兵馬使十將將虞候承局押官各以其職𨽻於馬軍司中興後常出戍建康所設官屬如殿前司侍衛步軍司掌步軍之政令凡出入扈衛守宿以奉上開收閲習轉補以勵下所設官置屬及所領步軍自神衛而下左右四廂如馬軍司知閣門事即古者擯相之職也周禮大行人掌九儀及賔客之位漢有通事舍人宋朝橫班有內客省使崇政殿受朝則升東階侍立掌四方進奉及四夷朝貢牧伯朝覲酒饌饔餼宰相近臣禁衛將校節儀諸州進奉賜物回詔之事引進使四方館使唐四方館以通事舍人判𨽻中書省石晉始有為卿監専掌判館者皇朝初以檢校官判館淳熙四年改置使名掌文武官正謝辭國忌賜香諸道月旦正至章表郊祀朝蕃官貢舉人進奉使京官致仕官道釋父老陪位之事東上閣門使西上閣門使凡取稟旨命供奉乘輿朝會遊宴及贊導三公羣臣蕃國朝見辭謝糾彈失儀之事使副専之舍人以下但通班贊名而已其供職於內者多用國戚世族號為華要禮均侍從政和官制橫班使副之名既改為大夫而其職任則命內外官知焉其後所除總名知閣門事仍兼客省四方館之職焉靖康元年詔閣門並立員額監察御史胡舜陟奏閣門之職祖宗所重宣贊不過三五人熙寧間通事舍人十三員祗候看班祗候六人當時議者猶以為多今舍人一百八員祗候七十六員看班四員內免職者二百三員由宦侍恩幸以求財朱勔父子交賣尤多富商豪子往往得之真宗時諸王夫人因聖節乞補閣門帝曰此職非可以恩澤授不許神宗即位之初用宮邸直省官郭昭選為閣門祗候司馬光言此祖宗以畜養賢才在文臣為館職其重如此今豈可賣以求財乞賜裁省故有是詔紹興元年上以宋籛孫藩邸舊人稍習儀注命轉行橫行一官主管閣門紹興五年詔右武大夫以上並稱知閣門事兼客省四方館事官未至者即稱同知閣門事仍兼客省四方館事以除授為序稱同知者在知閣門之下同知閣門事宋朝東西上閣門副使雖無定員然選任不及疏逺而所置常少於正使之數政和官制以左武右武郎易二閣副使而閣門事乃命橫行知焉則同知之職乃昔時所謂副使也閣門宣贊舍人閣門祗候故事閣門無通事舍人而通事舍人沿唐制自𨽻中書省如抽赴閣門並稱閣門祗候其後直授閣門通事舍人非舊制也天禧中去閣門二字政和六年改為宣贊舍人又舊以閣門通事舍人閣門祗候二等謂之閣職蓋武臣之清選也閣門通事舍人閣門祗候二等比館職清流為進取之基非熟於朝儀不在此選又有看班祗候以命世家新進及擢閣門點檢使臣為之而點檢官乃知班使之長者二年無過遂改看班政和間改通事作宣贊且不復選人才而濫除不知其數人不以為貴也舊止三五員天禧初上與輔臣語及減吏員向敏中曰太祖太宗朝閣門祗候不過三五員宣導贊謁而已今踰數百而除授未已上曰此蓋相承為例當漸省之熙寧四年閣門請擇武臣子弟六人前後殿日祗應以閣中看班祗候為名候五年熟識儀數乃除閣門祗候紹興中許令供職注授內外合入差遣闕到然後免供職其後供職舍人員數稍冗裁定以四十員為額乾道六年上欲清閣門之選除宣贊舍人閣門祗候仍舊通掌贊引之職外置閣門舍人十員以待武舉之入官者掌諸殿覺察失儀兼侍立駕出行幸亦如之六參常朝後殿引親王起居倣儒人館閣之制召試中書省然後命之又許轉對如職事官供職滿二年與邊郡淳熙間置看班祗候令忠訓郎以下充秉義郎以上始除閣門祗候又增重薦舉閣門祗候之制必廉幹有方略善弓馬兩任親民無遺闕及曾歷邊任者充紹熙以來立定員額慶元初申嚴閣門長官選擇其屬之令非右科前名之士不與召試閣門為右列清選之職蓋先後維持之力云幹辦皇城司周虎賁氏舍則守王間王在國則守王宫漢北軍即今之皇城司也漢置羽林郎材官取三輔良家之子自給鞍馬唐謂之北衙左右羽林軍大將軍各一人正三品將軍各三人從三品掌統北衙禁兵督攝左右廂飛騎儀仗大朝會則周衛階陛巡幸則夾馳道為內仗凡飛騎南上者配其職有敕上南衙者大將軍承墨敕白移於金吾引駕仗官與監門奏覆降墨然後乃得入宋朝因之舊號武德司大平興國詔改今名政和官制改皇城使為武功大夫而其職任則選內外通領焉皇城司以入內兩都知主內判內定事入內都知無不與知者惟宿直諸班禁衛略無統攝而皇城司親從官數千人乃命武臣二員同兩都知主之而殿前復不預此祖宗處軍政深意也紹興中詔行宫禁衛所改為行在皇城司三年詔皇城司係專掌禁庭出入依祖宗法不𨽻臺察御前忠佐軍頭引見司宋初但曰軍頭引見司端拱元年改軍頭司為御前忠佐軍頭司引見司為御前忠佐引見司軍頭司掌崇班供奉及諸州駐泊捕捉之事引見司掌軍頭名籍諸軍搜閲引見之事中興以來提點官幹辦官並以閣門官充紹興三十二年詔知閣門官兼則稱提點宣贊舍人閣門祗候兼則稱幹辦乾道三年詔提點幹辦共以四員為額帶御器械宋初嘗選三班以上武幹親信者佩櫜鞬御劍或以內臣為之初是職止名御帶咸平元年改為御𢃄器械景祐二年詔自今無得過六人慶歷元年詔遇闕員以歷邊任有功者補之舊制外任帶御器械過闕朝見不宿衛熙寧六年向寶移真定府路總管過京師特命宿直中興初諸將在外者多帶職蓋假禁近之名為軍旅之重紹興七年樞密院言𢃄御器械官合帶插上曰祖宗置此官所以衛不虞也今乃佩數隻骹箭不知何用方承平時至飾以珠珍車駕每出為觀美而已他日恢復此等事當盡去二十九年詔中外舉薦武臣無闕可處增置帶御器械四員然近侍亦或得之乾道以來詔𢃄御器械立班在樞密院檢詳文字之上淳熙間凡正除軍中差遣或外任者不許銜內帶行又須供職一年方與解帶恩例於是屬鞬之職益加重矣按唐承前代置十六衛皆所以命武臣掌禁旅也宋興以來環衛官特以處宗親無限員無職事而禁旅則仍五代之制屬之三衙有都副指揮虞候為之長其次則有閣門御帶其所職亦皆唐十六衛之任然三衙則専掌兵以大將主之而御帶閣門則或以處戚畹內臣不専為將帥之任而其職掌皆在京師故俱次序其事於十六衛將軍之後文獻通考卷五十八
