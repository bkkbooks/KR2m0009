body:
  text: 文獻通考卷二百六十八鄱陽馬端臨貴與著封建考九後漢王侯更始二年既誅王莽遷都長安李崧趙萌說更始宜悉王諸功臣朱鮪爭之以為高祖約非劉氏不王更始乃先封諸宗室祉為定陶王慶為燕王歙為元氏王嘉為漢中王賜為宛王信為汝隂王然後立王匡為沘陽王王鳳為宣城王朱鮪為膠東王王常為鄧王申屠建為平氏王陳牧為隂平王衞尉大將軍張卬為淮陽王執金吾大將軍廖湛為穰王尚書胡殷為隨王柱天大將軍李通為西平王五威中郎將李軼為舞隂王水衡大將軍成丹為襄邑王驃騎大將軍宋佻為潁隂王尹尊為郾王唯朱鮪辭不受定陶王祉光武族兄舂陵康侯敞之子漢兵起祉兄弟相率從軍更始立以祉為太常將軍紹封舂陵侯入闗封定陶王建武二年改封城陽王十一年薨諡恭王子平為蔡陽侯奉祉祀眞禹嘉燕王慶舂陵侯敞同産弟更始入闗封燕王更始敗為亂兵所殺子順歸光武封成武侯十一年卒遵弇亡嗣國除元氏王歙光武族父更始入闗封元氏王為侍中更始敗歸洛陽建武二年改封歙為泗水王十年薨子終封淄川王薨子柱為邔侯奉終祀鳳終子别封曲陽侯漢中王嘉光武族兄舂陵侯敞同産弟漢兵起從軍破宛奉興徳侯入長安為漢中王鄧禹西征嘉自歸到洛陽從征伐後封順陽侯十五年卒子參嗣循章宛王賜光武族兄蒼梧太守利之孫伯升起兵隨衆攻諸縣更始立以為光禄勲代伯升為大司徒都長安封宛王光武即位歸洛陽建武二年封愼侯十三年更户邑為安成侯二十八年卒子閔嗣商昌汝隂王信賜之兄子從伯升起兵更始即位為奮威大將軍入長安封為汝隂王將兵平定江南據豫章光武即位詣洛陽封為汝隂侯永平十三年坐楚王英事國除王匡新市人王莽末南方饑饉人庶入野澤掘鳬茈而食之更相侵奪匡與王鳳為平理爭訟遂推為渠帥衆數百人藏於緑林中號新市兵更始立以匡為定國上公遣攻洛陽拔之更始入長安封為沘陽王匡與張卭横暴三輔所授官爵皆羣小賈䜿闗中離心與張卭守河東為鄧禹所破後叛更始降赤眉王鳳新市人與王匡共起緑林中更始立以鳳為成國上公入長安封為宣城王朱鮪新市人王莽地皇三年與王匡等起兵北入南陽號新市兵皆自稱將軍更始立以鮪為大司馬入長安封為膠東王鮪以為非劉宗不受封乃徙為左大司馬與李通王常等鎭撫闗東光武即位鮪以伯升被害時預其謀又諫更始無遣蕭王北征遂堅守洛陽不敢降帝令岑彭説之鮪乃降拜平狄將軍封扶溝侯後為少府傳封累世王常潁川舞陽人王莽末與王鳳等起兵入南郡號下江兵時漢兵敗新市平林兵各欲解去伯升乃造下江壁説常以合從之利常即率諸將引兵與漢兵合遂破殺莽將更始立以常為廷尉大將軍入昆陽與光武共破尋邑都長安封為鄧王更始敗常自歸於光武封山桑侯遷為漢忠將軍後拜常為横野大將軍位次與諸將絕席十二年薨諡節侯子廣嗣徙封石城侯後坐楚王事國除申屠建不知何許人漢兵起更始立為西屏大將軍將兵攻武闗莽既誅自長安奉迎遷都封為平氏王赤眉西入闗更始遣兵拒之師敗張卬廖湛等與建謀共刼更始掠城中東歸南陽謀泄為更始所殺陳牧平林人王莽地皇三年與廖湛聚衆數千人號平林兵劉聖公因往從牧等為其軍安集掾光武及伯升亦起舂陵與諸部合兵而進更始即位以牧為大司空入長安封為隂平王赤眉西入闗立劉盆子更始使牧與王匡等屯新豐拒之張卬申屠建等謀刼更始東奔事覺更始殺建卭遂勒兵攻更始更始兵敗奔新豐疑匡牧等與卬同謀乃收斬之張卬新市人地皇三年與王匡朱鮪等共起兵號新市兵自稱將軍後屬漢兵更始即位以卬為衞尉大將軍入長安封淮陽王與王匡等輔政横暴三輔所授官爵皆羣小賈䜿四方怨叛赤眉西入闗卬與王匡守河東為鄧禹所破還奔長安欲掠城中轉攻所在東歸南陽復為羣盗更始不從卬等謀刼更始謀泄遂勒兵掠東西市戰於宮中更始大敗赤眉至高陵匡卬迎降之更始降赤眉卬與謝禄謀縊更始殺之廖湛平林人下江新市兵起湛與陳牧聚衆千餘人號平林兵以應之聖公為其軍安集掾聖公立拜湛為執金吾大將軍入長安封為穰王及赤眉西入闗王匡張卬謀東奔申屠建及湛以為然入説更始不從乃謀刼更始成前計事覺遂勒兵掠東西市更始與戰大敗後與王匡等同降赤眉為赤眉將兵攻順陽侯嘉兵敗為嘉所殺胡殷不知何許人更始即位以為尚書入長安封隨王赤眉西入闗更始兵敗王匡張卬等欲勒兵掠城中以自富東歸南陽更始不從卬乃與殷等謀欲刼更始謀泄卬殷等遂勒兵掠東西市更始與戰大敗後與王匡等降赤眉李通南陽宛人王莽時為五威將軍從事不樂為吏自免歸下江新市兵起通陳䜟文勸光武起兵更始立以通為柱國大將軍輔漢侯至長安封西平王持節還鎭荆州光武即位徴為衞尉建武二年封固始侯拜大司空十八年卒諡恭侯子音嗣定黄夀李軼南陽宛人通之從弟與通共謀起兵更始立軼為五威中郎將入長安封舞隂王後與朱鮪共守洛陽為鮪所殺成丹不知何許人亡命緑林中聚衆至七八千人號下江兵後從漢軍更始立以為水衡大將軍入長安封襄邑王赤眉西入闗立劉盆子更始遣丹與王匡等屯新豐以拒之後為更始所殺尹尊不知何許人更始封為郾王光武時據地最强帝使執金吾賈復擊降之宋佻事跡首尾史所不載宗姓王王子侯附齊武王縯光武長兄與光武共起兵更始即位為大司徒更始忌而殺之光武建武二年立縯長子章為太原王十一年徙為齊王二十一年薨諡曰哀王殤王石晃坐罪貶蕪湖侯無忌石子復封齊王喜承建安十一年國除魯王興齊武王次子建武二年封嗣光武兄仲後後徙為北海王立三十九年薨諡靖王子敬王睦哀王基威坐罪死頃王普恭王翼康王亡後下博侯張齊武王孫殤王石弟建武三十年封他人臨邑侯復北海靖王子建武三十年封騊駼趙孝王良光武叔父更始立以良為國三老更始敗亡奔洛陽建武二年封廣陽王五年徙趙王十三年降為趙公立十六年薨子節王栩頃王商靖王宏惠王乾懐王豫獻王赦珪魏受禪降為崇徳侯城陽恭王祉泗水王歙安成孝侯賜順陽懐侯嘉成武孝侯順事跡並見更始所封諸王下高鄉侯堅城陽恭王子建武十三年封中山王茂歙從父弟王莽末起兵後降光武封中山王十三年以疏屬降為穰侯宜春侯匡茂弟亦起兵附漢建武二年封浮䕶瓖坐罪貶為亭侯白牛侯嵩安成孝侯賜之子建武三十年封後坐楚事國除甘里侯閔弋陽侯國成武孝侯順叔父宏之子建武二年封黄李侯廧順陽侯嘉之子建武十三年封襄邑侯劉求更始長子更始降赤眉為謝禄所殺明年求兄弟與母詣洛陽帝封求為襄邑侯奉更始祀後徙封成陽侯卒子廵嗣復徙封灌澤侯姚榖孰侯歆夀光侯鯉俱更始子求弟與求同時封建武二年詔曰惟宗室列侯為王莽所廢先靈無所依歸朕愍之其並復故國若侯身已歿屬所上其子孫見名尚書封拜十三年詔曰長沙王興眞定王得河間王邵中山王茂皆襲爵為王不應經義其以興為臨湘侯得為眞定侯邵為樂成侯茂為單父侯其宗室及絶國封侯者凡一百三十七人降趙王良為趙公太原王章為齊公魯王興為魯公長沙王興河間王邵事跡首尾史不載餘並見前右光武時封宗室王侯東海恭王彊建武二年立為皇太子十七年母郭后廢彊陳懇誠願備蕃國十九年封為東海王二十八年就國帝以彊廢不以過去就有禮故優以大封兼食魯郡合二十九縣都魯立十八年薨子靖王政嗣立四十四年薨子頃王肅嗣立二十三年薨子孝王臻嗣立三十一年薨子懿王祇嗣立四十四年薨子羡嗣二十年魏受禪以為崇徳侯永元十六年封頃王肅弟二十一人皆為列侯永建二年封孝王臻二弟敏儉為鄉侯初平四年封懿王祇子琬為汶陽侯沛獻王輔建武十五年封右馮翊公十七年郭后廢為中山太后故徙輔為中山王并食常山郡二十年徙封沛王二十八年就國立四十六年薨子釐王定嗣立十一年薨子節王正嗣立十四年薨子孝王廣嗣立三十五年薨子幽王榮嗣立二十年薨子孝王琮嗣薨子恭王曜嗣薨子契嗣魏受禪廢為侯中元二年封獻王輔子寶為沛侯永平元年封寶弟嘉為僮侯元和二年封釐王定弟十二人為鄉侯元興元年封節王正弟二人為縣侯楚王英以建武十五年封為楚公十七年進爵為王二十八年就國英母許氏無寵故英國最貧小三十年以臨淮之取慮須昌二縣益楚國十二年坐交方士造作圖書有逆謀廢徙丹陽自殺立三十三年國除建初元年封英子楚侯种五弟皆為列侯並不得置相臣吏人种後徙封陸侯子度拘濟南安王康建武十五年封濟南公十七年為王二十八年就國三十年以祝阿安徳朝陽平昌隰隂重邱六縣益濟南國立五十九年薨子簡王錯嗣立六年薨子孝王香嗣立二十年薨無子國絶永建元年順帝立錯子阜陽侯顯為嗣是為釐王立三年薨子悼王廣嗣立二十五年薨無子國除中元二年封安王康子徳為東武城侯永元十一年封簡王錯弟七人為列侯永初二年封孝王香弟四人為列侯香又上書分爵土封叔父篤子丸西平昌侯昱子嵩皆為列侯東平憲王蒼建武十五年封東平公十七年進為王顯宗即位拜為驃騎將軍置長史掾史員四十人位在三公上以東郡之夀張須昌山陽之南平陽槀湖陵五縣益東平國立四十五年薨子懐王忠嗣明年帝乃分東平國封忠弟讓為任城王餘五人為列侯忠立十一年薨子孝王敞嗣立四十八年薨子頃王端嗣立四十七年薨子凱嗣立四十一年魏受禪降為侯永平二年封憲王蒼子二人為縣侯十一年賜蒼列侯印十九枚諸王子年五歲已上能趨拜者令帶之永元十年封蒼孫梁為矜陽亭侯敞弟六人為列侯永寧元年封蒼孫二人為亭侯任城孝王尚東平憲王蒼之子懐王忠之弟元和元年封食任城亢父樊三縣立十八年薨子貞王安嗣立十九年薨子節王崇嗣立三十一年薨無子國絶延熹元年桓帝立河間孝王子恭為參户亭侯博為任城王以奉其祀立十三年薨無子國絶熹平四年靈帝復立河間貞王遜新昌侯子佗為任城王奉孝王後立四十六年魏受禪廢為侯永元十四年封孝王尚子福為桃鄉侯亢為當塗鄉侯阜陵質王延建武十五年封淮陽公十七年進爵為王二十八年就國三十年以汝南之長平西華新陽扶樂四縣益淮陽國後坐罪徙為阜陵王立五十一年薨子殤王冲嗣二年薨無嗣和帝復封冲兄魴是為頃王立三十年薨子懐王恢嗣立十年薨子節王代嗣立十四年薨無子國絶桓帝立勃遒亭侯便親為恢嗣是為恭王立十三年薨子孝王統嗣立八年薨王子赦立建安中薨無子國除永元八年封頃王魴弟十二人為鄉亭侯延光三年封懐王恢兄弟五人為鄉亭侯廣陵思王荆建武十五年封山陽公十七年進爵為王立二十九年坐使巫祭祀祝詛自殺十四年封荆子元夀為廣陵侯又封元夀弟三人為鄉侯元壽卒子商嗣商卒子條嗣臨淮懐公衡建武十五年立未及進爵為王而薨無子國除中山簡王焉建武十五年封左馮翊公十七年進爵為王三十年徙封中山王立五十二年薨子夷王憲嗣立二十一年薨子孝王宏嗣立二十八年薨子穆王暢嗣立三十四年薨子節王稚嗣無子國除永元四年封夷王憲弟列侯十一人永寧二年封孝王宏二弟為亭侯永和六年封穆王暢弟荆為南鄉侯瑯琊孝王京建武十五年封瑯琊公十七年進爵為王永平二年以泰山之蓋南武陽華東萊之昌陽盧鄉東牟六縣益瑯琊立三十一年薨子夷王宇嗣立二十年薨子恭王夀嗣立十七年薨子貞王尊嗣立十八年薨子安王據嗣立四十七年薨子順王容嗣立八年薨子熙嗣在位十一年建安時坐謀欲過江被誅建初七年封夷王宇弟十三人為列侯永初元年封恭王夀弟八人為列侯延光元年封貞王尊弟四人為鄉侯永和五年封安王據弟三人為鄉侯右光武子十王千乘哀王建永平三年封明年薨年少無子國除陳敬王羡永平三年封廣平王七年徙為西平王肅宗崩遺詔徙為陳王食淮陽郡立三十七年薨子思王鈞嗣立二十一年薨子懐王竦嗣立二年薨無子永寧元年立敬王子安夀亭侯崇為陳王是為頃王立五年薨子孝王承嗣薨子愍王寵嗣後為袁術殺其國相駱俊陳由此敗永元十二年封思王鈞六弟為列侯永初七年封敬王孫安國為耕亭侯彭城靖王恭永平九年賜號靈夀王取其美名未有國邑十五年封為鉅鹿王建初三年徙封江陵王改南郡為國元和二年徙為六安王以廬江郡為國肅宗崩遺詔徙封彭城王食楚郡立四十六年薨子考王道嗣立二十八年薨子頃王定嗣立四年薨子孝王和嗣立六十四年薨孫祇嗣七年魏受禪降為侯永初六年封靖王恭子阿奴為竹邑侯元初五年封考王道弟三人為鄉侯本初元年封定兄弟九人皆為亭侯樂成靖王黨永平九年賜號重熹王十五年封樂成王建初四年以清河之游觀津渤海之東光成平涿郡之中水饒陽安平南深澤八縣益樂成國立二十五年薨子哀王崇嗣立二月薨無子明年和帝立崇兄修侯廵為樂成王是為釐王立十五年薨子隠王賓嗣立八年薨無子明年立濟北惠王子萇為樂成王後坐罪貶臨湖侯延光元年以河間孝王子得嗣靖王後以樂成比廢絶故改國曰安平孝王立三十年薨子續嗣立三十四年坐不道誅國除下邳惠王衍永平十五年封四年以臨淮郡及九江之鍾離當塗東城歴陽全椒合十七縣益下邳國立五十四年薨子貞王成嗣立二年薨子愍王意嗣立五十七年薨子哀王宜嗣薨無子國除永建元年封貞王成兄二人及惠王孫二人皆為列侯陽嘉元年封愍王意弟八人為鄉亭侯梁節王暢永平十五年封為汝南王建初四年徙為梁王以陳留之郾寜陵濟隂之薄單父猗氏成武凡六縣益梁國立二十七年薨子恭王堅嗣立二十六年薨子懐王匡嗣立十一年薨無子順帝封匡弟孝陽亭侯成為梁王是為夷王立二十九年薨子敬王元嗣立十六年薨子彌嗣立四十年魏受禪降為侯永元十六年封恭王堅弟二人為鄉侯淮陽頃王昞永平五年封常山王建初四年徙為淮陽王以汝南之新安西華益淮陽國立十六年薨子殤王側嗣立十三年薨無子立兄防子侯章為常山王立二十五年薨是為靖王子頃王儀嗣立十七年薨子節王豹嗣立八年薨子暠嗣三十二年遭黄巾賊棄國走建安十一年國除永建二年封頃王儀兄二人為亭侯永嘉元年封節王豹兄四人為亭侯濟隂悼王長永平十五年封建初四年以東郡之離狐陳留之長垣益濟隂國立十三年薨於京師無子國除右孝明子八王千乘貞王伉建初四年封立十五年薨子寵嗣永元七年改國名樂安立二十八年薨是為夷王子鴻嗣鴻生質帝梁太后詔以樂安國土卑濕租委鮮薄改鴻封渤海王立二十六年薨是為孝王無子太后立桓帝弟蠡吾侯悝為渤海王奉鴻嗣立二十五年為王甫誣以大逆自殺國除平春悼王全以建初四年封其年薨葬京師無子國除清河孝王慶建初四年立為皇太子後廢為清河王立二十五年薨長子祐嗣殤帝是為安帝鄧太后崩安帝乃上慶尊號曰孝徳皇子愍王虎威嗣立三年薨無子鄧太后立樂安王寵子延平為清河王是為恭王立三十五年薨子蒜質帝崩太尉李固等議徵立之梁冀及曹騰等不從遂立桓帝甘陵人劉文等謀立蒜事覺坐奪爵自殺國除明年立安平孝王子經為甘陵王奉孝徳皇祀是為威王立二十五年薨子貞王定嗣立四年薨子獻王忠嗣立十三年薨嗣子為黄巾所害無後國除永初元年封孝王慶少子常保為廣川王濟北惠王夀以永元二年封分太山郡為國立三十一年薨子節王登嗣立十五年薨子哀王多嗣立三年薨無子立戰鄉侯安國為濟北王是為釐王立十年薨子孝王次嗣立七年薨子鸞嗣薨子政嗣薨無子國除永寧元年封節王登弟五人為鄉侯本初元年封孝王次弟猛為亭侯河間孝王開以永元二年封分樂成渤海涿郡為國立四十二年薨子惠王政嗣立十年薨子貞王建嗣立十年薨子安王利嗣立二十八年薨子陔嗣立四十一年魏受禪為侯陽嘉三年封惠王政弟十三人為亭侯蠡吾侯翼河間孝王開子元初六年鄧太后徴濟北河間王諸子詣京師以翼為平原懐王後懐王勝和帝子後為王聖江京等所譖貶為都鄉侯父開上書願分蠡吾縣以封翼順帝從之翼卒子志嗣為大將軍梁冀所立是為桓帝梁太后詔追尊河間孝王為孝穆皇蠡吾先侯曰孝崇皇皆立陵廟置令丞更封帝兄都鄉侯碩為平原王留博陵奉翼後建安十一年國除解瀆亭侯淑以河間孝王子封淑卒子長嗣長卒子宏嗣為大將軍竇武所立是為靈帝追尊皇祖淑為孝元皇皇考長為孝仁皇立陵廟置令丞拜河間安王利子康為濟南王奉孝仁皇祀康薨子贇嗣贇薨子開嗣立十三年魏受禪降為侯城陽懐王淑以永元二年分濟隂為國立五年薨於京師無子國除廣宗殤王萬嵗以永元五年封分鉅鹿為國其年薨無子國除右孝章子七王平原懐王勝和帝長子少有痼疾延平元年封立八年薨葬於京師無子鄧太后立樂安夷王寵子得為平原王奉勝後是為哀王立六年薨無子太后又立河間王開子都鄉侯翼為平原王嗣安帝廢之國除右孝和子一王按范蔚宗東漢書敘諸王止於和帝蓋自孝和以後殤冲質三帝皆早世安順桓三帝皆無子惟靈帝二子皇子辯陳留王協辯嗣位為董卓廢而殺之立協是為獻帝獻帝六子其二為曹操所殺建安十七年封熙為濟隂王懿為山陽王邈為濟北王敦為東海王然是時政在曹氏天下三分雖有封爵之名而實無所謂土地租食矣既封後九年魏始受禪四王皆降為列侯云世祖初大司馬吳漢請封皇子不許重奏連嵗建武十五年三月乃詔令羣臣議大司空融固始侯通膠東侯復高密侯禹太常登等奏議曰古者封建諸侯以藩屏京師周封八百同姓諸姬並為建國夾輔王室尊事天子享國永長為後世法故詩云大啟爾宇為周室輔高祖聖徳光有天下亦務親親封立兄弟諸子不違舊章陛下徳横天地興復宗統褒徳賞勲親睦九族功臣宗室咸䝉封爵多受廣地或連屬縣今皇子賴天能勝衣趨拜陛下恭謙克遜抑而未議羣臣百姓莫不失望宜因盛夏吉時定號位以廣藩輔明親親尊宗廟重社稷應古合舊厭塞衆心臣請大司空上輿地圖太常擇吉日具禮儀制曰可夏四月戊申以太牢告祀宗廟丁巳使大司空融告廟封皇子輔為右翊公英為楚公陽為東海公康為濟南公蒼為東平公延為淮陽公荆為山陽公衡為臨淮公焉為左翊公京為瑯琊公按秦罷侯置守曽不數年始皇死而羣雄蠭起六國之裔與其强宗大槩皆逐秦守宰而自王故地秦亡之後項羽主約霸天下然所建置諸侯亦多是已自王之人及漢東出并三秦討項羽劉項之勢既分而諸侯多附漢其中立懐兩端者皆為漢所擊滅如趙歇魏豹田横之類是也既滅項氏之後羽所建諸侯其存者惟共敖臧荼然亦不旋踵而俘之然後裂土以封韓彭英盧張耳韓信吳芮之徒蓋自是非漢之功臣不得王矣逮數年之後反者九起異姓諸侯王多已夷滅於是悉取其地以王子弟親屬如荆吳齊楚淮南之類蓋自是非漢之同姓不得王矣然一再傳而後賈誼鼂錯之徒拳拳有諸侯强大之慮蓋以為親者無分地而疏者偪天子必為子孫之憂於是或分其國或削其地其負强而動者則六師夷之蓋西漢之封建其初也則勦滅異代所建而以畀其功臣繼而勦滅異姓諸侯而以畀其同宗又繼而勦滅疏屬劉氏王而以畀其子孫蓋檢制益密而猜防益深矣昔湯武雖以征伐取天下然商惟十一征周惟滅國者五十其餘諸侯則皆襲前代所封未聞盡以宇内易置而封其私人周雖大封同姓然文昭武穆之邦與國咸休亦未聞成康而後復畏文武之族偪而必欲夷滅之以建置已之子孫也愚嘗謂必有公天下之心而後可以行封建自其出於公心則選賢與能而小大相維之勢足以綿千載自其出於私心則忌疎畏偪而上下相猜之形不能以一朝居矣景武而後令諸侯王不得治民補吏於是諸侯雖有君國子民之名不過食其邑入而已土地甲兵不可得而擅矣然則漢懲秦之弊復行封建然為人上者苟慕美名而實無唐虞三代之公心為諸侯者既獲裂土則遽欲效春秋戰國之餘習故不乆而遂廢盖罷侯置守雖始於秦然諸侯王不得治民補吏則始於西都景武之時盖自是封建之名存而封建之實盡廢矣至東漢更始既入闗雖盡王諸造謀復漢者然諸人雖有受封之名多聚處京師布列要職實未嘗有裂土建國南面稱孤之事光武既定天下至建武十五年方封諸皇子為公十七年皇子之為公者方進爵為王徐徐如此未嘗有盡王子弟以鎭服天下之意盖是時封建之實已亡尺土一民皆上自制之諸侯王不過食其邑入之租而於所謂藩維屏扞本無所預故亦不必急急然視為一大事如周漢有天下之初也明帝永平三年封皇子建為千乘王羡為廣平王十五年封皇子恭為鉅鹿王黨為樂成王衍為下邳王暢為汝南王昞為常山王萇為濟隂王初帝按地圖將封皇子悉半諸國明徳馬后見而言之曰諸子食數縣於制不已儉乎帝曰我子豈宜與先帝子等乎歲給二千萬足矣按前漢孝文之時梁懐王薨賈誼上疏拳拳以諸侯强大皇子單弱為慮欲帝徙皇子大其封疆而帝從之後漢顯宗則謂我子豈宜與先帝子等於是封皇子悉半光武所封諸王與孝文異意何也盖孝文之時分封之大小可以驗國勢之强弱顯宗之時分封之大小不過係租入之豐儉國勢則宗藩强而皇子弱殊非强幹弱支之逺慮租入則兄弟豐而諸子儉乃見先人後已之公心然亦可以知封建一事至東漢之初名存實亡故諸侯王土地之大小初無係於理亂安危之大勢矣建初四年按輿地圖令諸國户口皆等租入嵗皆八千萬東漢皇子封王其郡為國諸王受封者受茅土歸以立社胡廣曰諸侯受封皆受茅土歸立社稷本朝為宮室自有制度至於列侯歸國者不受茅土不立宮室各隨其貧富而裁别之庶以守其寵王國有𫝊如師不臣二千石相秩二千石刁躍為魯相行縣三老執轡學官處士皆乘車馬隨後所頓亭傳輒講經内史如郡丞中尉郎中令掌王大夫郎中宿衞官如光禄勲僕主車馬持書奉使至京都謁者禮樂長衞士長醫工長永巷長祠祀長郎中其紹封削黜者中尉内史官屬隨亦率減文獻通考卷二百六十八
