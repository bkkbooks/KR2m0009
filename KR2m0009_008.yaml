body:
  text: 文獻通考卷八鄱陽馬端臨貴與著錢幣考一歴代錢幣之制自太皥以來則有錢矣太皥氏高陽氏謂之金有熊氏高辛氏謂之貨陶唐氏謂之泉商人齊人謂之布齊人莒人謂之刀神農列鄽於國以聚貨帛日中為市以交有無虞夏商之幣金為三品或黃或白或赤或錢或布或刀或龜貝管子曰湯七年旱禹五年水人之無􅕷章延反糜也有賣子者湯以莊山之金鑄幣而贖人之無􅕷賣子者禹以歴山之金鑄幣以救人之困夫玉起於禺音虞氏金起於汝漢珠起於赤墅東西南北去周七八千里水絶壤斷舟車不能通為其途之逺其至之難故託用於其重以珠玉為上幣以黃金為中幣以刀布為下幣三幣握之則非有補於暖也食之則非有補於飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一高一下不得有調也若五穀與萬物平則人無其利故設上中下幣而行輕重之術使一高一下乃可權制利門悉歸於上周制以商通貨以賈易物太公又立九府圜法周官有太府玉府内府外府泉府天府職内職幣職金皆掌財幣之官故云九府圜謂均而通也黃金方寸而重一斤錢圜函方外圜而内孔方輕重以銖黃金以斤為名錢以銖為重也布帛廣二尺二寸為幅長四丈為疋故貨寶於金利於刀流於泉流行如泉布於布布於民間束於帛束聚也周官司市國凶荒札喪則市無征而作布凶年物貴置錢以饒民夾漈鄭氏曰謂之泉者言其形謂之金者言其質謂之刀者言其器謂之貨謂之布者言其用古文錢字作泉者言其形如泉文一變而為刀器再變而為圜法即太公所作自圜法流通於世民實便之故泉與刀為廢後人不曉其謂也觀古錢其形即篆泉文也後世代以錢字故泉之文借為泉水之泉其實泉之篆文下體不從水也先儒不知本末因謂流於泉布於布寶於金利於刀此皆沿鑿之義也外府掌邦布之入出以共百物而待邦之用凡有法者布泉也有法百官之公用也共王及后世子之衣服之用凡祭祀賔客喪紀㑹同軍旅共其財用之幣齎賜予之財齎行道之財用也凡邦之小用皆受焉歳終則㑹唯王及后之服不㑹泉府掌以市之征布斂市之不售貨之滯於民用者以其賈買之物揭而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後予之抵故賈也主者别治大夫也康成謂抵本也本謂所屬吏主有司是也凡賒者祭祀無過旬日喪紀無過三月凡民之貸者與其有司辯而授之以國服為之息鄭司農謂以其所賈之國所出為息也假令其國出絲絮則以絲絮償出絺葛則以絺葛償康成謂以其於國服事之税為息也於國事受園㕓之田而貸萬泉者則朞出息五百凡國事之財用取具焉歳終則㑹其出入而納其餘按周禮主財之官雖多而專掌錢布則惟外府泉府二官外府掌齎賜之出入泉府掌買賣之出入自王介甫以鄭注國服為息之説行青苗誤天下而後儒之解此語者或以息為生息之息或以息為休息之息然於義皆無所當蓋古人創泉布之本意實取其流通緣貨則或滯於民用而錢則無所不通而泉府一官最為便民滯則買之不時而欲買者則賣之無力者則賖貸與之蓋先王視民如子洞察其隱微而多方濟其缺乏仁政莫尚於此初非專為謀利取息設也不原其立官之本意而勦其一語以斷天下大事可乎買之於方滯之時賣之於欲買之際此與常平賤糴貴糶之意同泉府則以錢易貨常平則以錢易粟其本意皆以利民非謀利也然後世常平之法轉而為和糴且以其所儲他用而不以濟民則惟恐其數之不多利之不羡於是亦以理財之法視之矣周景王二十一年患錢輕更鑄大錢徑一寸二分重十二銖文曰大泉五十肉好皆有周郭以勸農贍不足王將鑄大錢單穆公曰不可古者天災降戾於是乎量資幣權輕重以賑救民民患輕則為作重幣以行之幣輕物貴也於是乎有母權子而行民皆得焉重曰母輕曰子相權並行也若不堪重則多作輕而行之亦不廢重於是乎有子權母而行大小利之民患幣重則多作輕錢而行之亦不廢去重者言重者行其貴輕者行其賤今王廢輕而作重民失其資能無匱乎若匱王用將有所乏乏則將厚取於民民不給將有逺志是離民也且夫有備未至而設之有至而後救之是不相入也可先而不備謂之急可後而先之謂之召災且絶民用以實王府猶塞川原而為潢汙也其竭無日矣王弗聽楚莊王以為幣重更以小為大百姓不便皆去其業孫叔敖為相市令言於相曰市亂人莫安其處行不定叔敖白於王遂令復如故而百姓乃安秦兼天下幣為二等黃金鎰為名上幣二十兩為鎰改周一斤之制更以鎰為金之名數也高祖初賜張良金百鎰此尚秦制也上幣者二等之中黃金為上而錢為下也銅錢質如周錢文曰半兩重如其文而珠玉龜貝銀錫之屬為器飾寶藏不為幣然各隨時而輕重無常漢興以為秦錢重難用更令民鑄莢錢如榆莢也莢音頰黃金一斤復周之制更以斤名金而不軌逐利之民畜積餘贏以稽市物踴騰躍稽貯滿也言以其贏餘之財畜積羣貨使物甚騰躍也米至石萬錢馬至匹百金高后二年行八銖錢即秦半兩錢也漢初患其重更鑄榆莢人患太輕故復行此六年行五分錢即莢錢文帝五年為錢益多而輕乃更鑄四銖錢其文為半兩除盗鑄錢使民放鑄賈誼諫曰法使天下公得顧租鑄銅錫為錢敢雜以鉛鐡為他巧者其罪黥顧租謂雇傭之直或租其本然鑄錢之情非殽雜為巧則不可得贏而殽之甚微為利甚厚夫事有召禍而法有起姦今令細民人操造幣之勢各隱屛而鑄作因欲禁其厚利微姦雖黥罪日報其勢不止乃者民抵罪多者一縣百數及吏之所疑榜笞奔走者甚衆夫縣法以誘民使入陷穽孰積於此曩禁鑄錢死罪積下言死罪多委積於下今公鑄錢黥罪積下為法若此上何頼焉又民用錢郡縣不同或用輕錢百加若干時錢重四銖法錢百枚當重一斤十六銖輕則以錢足之若干枚令滿平也或用重錢平稱不受秦錢重半兩漢初鑄莢錢文帝更鑄四銖錢秦錢與莢錢皆當廢而故與四銖並行民以其見廢故用輕錢則百加若干用重錢雖以一當一猶復不受之是以郡縣不同也法錢不立法錢依法之錢也吏急而壹之乎則大為煩苛而力不能勝縱而弗呵乎則市肆異用錢文大亂茍非其術何鄉而可哉今農事棄捐而采銅者日蕃釋其耒耜冶鎔吹炭姦錢日多五穀不為多善人怵而為姦邪愿民陷而之刑戮刑戮將甚不詳奈何而忽國知患此吏議必曰禁之禁之不得其術其傷必大令禁鑄錢則錢必重重則其利深盗鑄如雲而起棄市之罪又不足以禁矣姦數不勝而法禁數潰銅使之然也故銅布於天下其為禍博矣今博禍可除而七福可致也何謂七福上收銅勿令布則民不鑄錢黥罪不積一矣偽錢不蕃民不相疑二矣采銅鑄作者反於耕田三矣銅畢歸於上上挾銅積以御輕重錢輕則以術斂之重則以術散之貨物必平四矣以作兵器以假貴臣多少有制用别貴賤五矣以臨萬貨以調盈虛以收奇羡則官富實而末民困六矣制吾棄財以與匈奴逐爭其民則敵必懐七矣故善為天下者因禍而為福轉敗而為功今久退七福而行博禍臣誠傷之上不從是時吳以諸侯即山鑄錢富埒天子後卒叛逆鄧通以鑄錢財過王者故吳鄧錢布天下賈山上書諫以為錢者無用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也其後復禁鑄錢景帝中六年定鑄錢偽黃金棄市律人有告鄧通盗出徼外鑄錢下吏驗問頗有遂竟案盡沒之武帝建元元年行三銖錢壊四銖造此也重如其文五年罷三銖錢行半兩錢自孝文更造四銖錢至元狩四年四十餘年從建元以來用少縣官往往多即銅山而鑄錢民亦盗鑄不可勝數錢益多而輕物益少而貴有司言曰今半兩錢法重四銖而姦或盗磨錢質而取鋊鋊銅屑也錢益輕薄而物貴則逺方用幣煩費不省乃令縣官銷半兩錢更鑄三銖錢重如其文其明年有司言三銖錢輕輕錢易作姦詐乃更請郡國鑄五銖周郭其質令不得磨錢取鋊元狩四年造白金及皮幣時縣官大空而富商賈或滯財役貧轉轂數百冶鑄䰞鹽財或累萬金而不佐公家之急黎民重困於是天子與公卿議更造錢幣以贍用時禁苑有白鹿而少府多銀錫有司言曰古者皮幣諸侯以聘享金有三等黃金為上白金為中赤金為下今半兩錢法重四銖而姦或盗磨錢質而取鋊錢益輕薄而物貴則逺方用幣煩費不省今以白鹿皮方尺緣以繢為皮幣直四十萬王侯宗室朝覲享必以皮幣薦璧然後得行又造銀錫白金以為天用莫如龍地用莫如馬人用莫如龜故曰金三品其一曰重八兩圜之其文龍名白撰直三千二曰以重差小方之其文馬直五百三曰復小撱之撱下而長其文龜直三百一重八兩則二重六兩三重四兩其後官鑄赤仄白金稍賤民弗寶用縣官以令禁之無益歳餘終廢不行自造白金五銖錢後五歳而赦吏民之坐盗鑄金錢死者數十萬人其不發覺相殺者不可勝計赦自出者百餘萬人然不能半自出天下大抵無慮皆鑄金錢矣犯法衆吏不能盡誅於是遣博士褚大徐偃等分行郡國舉并兼之徒守相為利者劾之時張湯用事帝與湯造白鹿皮幣以問大司農顏異對曰今王侯朝賀以蒼璧直數千而皮薦反四十萬本末不相稱上不恱湯奏異腹誹坐死元鼎二年令京師鑄官赤仄時郡國鑄錢而民多姦鑄錢多輕而公卿請令京師鑄官赤仄以赤銅為其郭也一當五賦官用非赤仄不得行其後二歳赤仄錢賤民巧法用之不便又廢於是悉禁郡國毋鑄錢專令上林三官鑄錢既多而令天下非三官錢不得行諸郡國前所鑄錢皆廢銷之輸入其銅三官而民之鑄錢益少計其費不能相當唯眞工大姦乃盗為之元帝時貢禹言鑄錢採銅一歳十萬人不耕民坐盗鑄陷刑者多富人藏錢滿室猶無厭足民心動揺棄本逐末耕者不能半姦邪不可禁原起於錢疾其末者絶其本宜罷採珠玉金銀鑄錢之官毋復以為幣除其販賣租銖之律租銖謂計其所賣物價平其錙銖而收租也租稅祿賜皆以布帛及穀使百姓一意農桑議者以為交易待錢布帛不可尺寸分裂禹議亦寢師丹傳有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣上以問丹丹對言可改章下有司議皆以為行錢以來久難卒變易自孝武元狩五年三官初鑄五銖錢至平帝元始中成錢二百八十億萬餘云石林葉氏曰漢書王嘉傳元帝時都内錢四十萬萬水衡錢一十五萬萬少府錢十八萬萬言其多也以今計之纔八百三十萬貫耳不足以當𣙜貨務盛時一歳之入蓋漢時錢極重而幣輕穀價甚賤時至斛五錢耿壽昌以穀賤傷農建常平之議其年斛五錢故嘉言是時外戚貲千萬者少正使有千萬亦是今一萬貫中下户皆有之漢律丞相大司馬大將軍月俸六萬乃今六十貫御史大夫四萬而大將軍米月三百五十斛下至佐史秩百石猶月八斛有竒其賜臣下黃金每百斤二百斤少亦三十斤雖燕王劉澤以諸侯賜田生金亦二百斤梁孝王死有金四十餘萬斤幣輕故米賤金多近世患國用不足以為錢少故夾錫當十等交具卒未嘗有補蓋錢之多寡係幣之輕重不在鼓鑄廣狹也又曰如魏文侯相李悝言一夫治田百畝畝收粟一石半為粟百五十石一夫五口人月食一石半百畝之入以其十五石為税九十石為食餘四十五石石錢三十計錢千三百五十而社閭嘗新春秋之祠只用錢三百而其餘錢以為五口之衣衣人率用錢三百五人終歳用千五百今只餘千五十不足四百五十則固不嫌錢之少也然正使幣輕亦何至是蓋日用猶不滿一錢不知何以為生王莽居攝變漢制以周錢有子母相權於是更造大錢徑寸二分重十二銖文曰大錢五十又造契刀錯刀契刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黃金錯其文曰一刀直五十張晏曰按今所見契刀錯刀形質如大錢而肉好輪厚異於此大錢形如大刀環矣契刀身形員不長二寸也其文左曰契右曰刀無五百字也錯刀則刻之作字也以黃金塡其文上曰一下曰刀二刀泉甚不與志相應也似札單差錯文字磨滅故耳師古曰張説非也王莽錢刀今並尚在形質及文並與志相合與五銖錢凡四品並行莽即眞以為書劉字有金刀乃罷錯刀契刀及五銖錢而更作金銀龜貝錢布之品名曰寶貨小錢徑六分重一銖文曰小錢直一次七分三銖曰么錢一十么小也次八分五銖曰㓜錢二十次九分七銖曰中錢三十次一寸九銖曰壯錢四十因前大錢五十是為錢貨六品直各如其文黃金重一斤直錢萬朱提銀重八兩為一流直一千五百八十朱提縣名屬犍為出善銀朱音殊提字音上支反他銀一流直千是為銀貨二品元龜岠冉長尺二寸冉龜甲緣也岠至也度背兩邊緣尺二寸也直二千一百六十為大貝十朋兩貝為朋朋直二百一十六元龜十朋故二千一百六十也公龜九寸直五百為壯貝十朋侯龜七寸以上直三百為么貝十朋子龜五寸以上直百為小貝十朋是為龜寶四品大貝四寸八分以上二枚為一朋直二百一十六壯貝三寸六分以上二枚為一朋直五十么貝二寸四分以上二枚為一朋直三十小貝寸二分以上二枚為一朋直十不盈寸二分漏度不得為朋率枚直錢三是為貝貨五品大布次布第布壯布中布差布厚布㓜布么布小布小布長寸五分重十五銖文曰小布一百自小布以上各相長一分相重一銖文各為其布名直各加一百上至大布長二寸四分重一兩而直千錢矣是為布貨十品布亦錢凡寶貨五物六名二十八品鑄作錢布皆用銅殽以鏈錫許慎曰鏈銅屬也然則以鏈及雜銅而為錢也鏈音連文質周郭放漢五銖錢云放依其金銀與他物雜色不純好龜不盈五寸貝不盈六分皆不得為寶貨元龜為蔡非四民所得居有者入太卜受直其後百姓憒亂其貨不行民私以五銖錢市買莽患之下詔敢挾五銖錢者為惑衆投諸四裔於是農商失業食貨俱廢民涕泣於市道坐賣買田宅奴婢鑄錢抵罪者自公卿大夫至庶人不可稱數莽知民愁廼但行小錢直一與大錢五十二品並行龜貝布屬遂廢莽天鳯元年復申下金錢龜貝之貨頗增減其價直而罷大小錢改作貨布長二寸五分廣一寸首長八分有竒其廣八分其圓好徑二分半足枝長八分間廣二分其文右曰貨左曰布重二十五銖直貨泉二十五貨泉徑一寸重五銖文右曰貨左曰泉枚直一與貨布二品並行又以大錢行久罷之恐民挾不止廼令民且獨行大錢與新貨泉俱枚直一並行盡六年毋得復挾大錢矣每壹易錢民用破業而大陷刑莽以私鑄錢死及非沮寶貨投四裔犯法者多不可勝行廼更輕其法私鑄作泉布者與妻子没為官奴婢吏及比伍知而不舉告與同罪比音頻未反非沮寶貨民罰作一歳吏免官犯者愈衆又五人相坐皆没入郡國檻車鐡鏁傳送長安鍾官鍾官主鑄錢者愁苦死者十六七漢錢舊用五銖自王莽改革百姓皆不便之及公孫述廢銅錢置鐡官鑄鐡錢百姓貨幣不行時童謡曰黃牛白腹五銖當復好事者竊言王莽稱黃述欲繼之故稱白腹五銖漢貨言漢當復幷天下世祖建武十六年始行五銖錢天下頼其便初王莽亂後貨幣雜用布帛金粟建武初馬援在隴西上書言宜如舊鑄五銖錢事下三府三府奏以為未可許事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋更具表言帝從之建武時長安鑄錢多姦第五倫為督鑄錢掾領長安市倫平銓衡正斗斛市無阿枉百姓悦服桓帝時議改鑄大錢劉陶言其不便乃止時有上書言人以貨輕財薄故致貧困宜改鑄大錢事下四府羣僚及太學能言之士陶上議曰當今之憂不在於貨在於民饑蓋民可百年無貨不可一朝有饑故食為至急也議者不達農殖之本多言冶鑄之便故欲因緣行詐以賈國利國利將盡取者爭競造鑄之端於是乎生蓋萬人鑄之一人奪之猶不能給况一人鑄之萬人奪之乎夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下欲鑄錢齊貨以救其弊此猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必致焦爛帝乃止不鑄錢靈帝中平三年鑄四出文錢錢皆四道識者竊言侈虐已甚形象兆見此錢成必四道而去及京師亂錢果流布四海獻帝初平元年鑄小錢董卓壊五銖錢更鑄小錢悉取洛陽長安銅人鐘簴飛廉銅馬之屬以充鑄故貨賤物貴穀石數萬又錢無倫理文章不便人用昭烈取蜀鑄直百錢先主攻劉璋與士衆約若事定府庫百姓孤無取焉及入成都士庶皆捨干戈赴諸庫藏取寶物軍用不足備憂之西曹掾劉巴曰此易耳但當鑄直百錢平諸物價令吏為官市備從之旬月之間府庫充實文曰直百亦有勒為五銖者大小秤兩如一焉並徑七分重四銖魏文帝黃初二年罷五銖錢使百姓以穀帛為市至明帝世廢錢穀用既久人間巧偽漸多競濕穀以要利作薄絹以為市雖處以嚴刑不能禁司馬芝等議以為用錢非徒豐國亦以省刑若更鑄五銖錢則國豐刑省於是為便明帝乃立五銖錢孫權嘉平五年鑄大錢一當五百赤烏元年又鑄當千錢故呂蒙定荆州孫權賜錢一億錢既太貴但有空名人間患之權聞百姓不以為便省息之鑄為器物官勿復出也私家有者並以輸藏平畀其直勿有所枉晉用魏五銖錢不聞有所更創元帝過江用孫氏舊錢輕重雜行大者謂之比輪中者謂之四文吳興沈充又鑄小錢謂之沈郎錢錢既不多由是稍貴孝武太元三年詔曰錢國之重寶小人貪利銷壊無已監司當以為意廣州夷人寶貴銅鼓而州境素不出銅聞官司賈人皆貪比輪錢斤兩差重以入廣州貨與夷人鑄韛作鼓其重為禁制得者科罪安帝元興中桓元輔政議欲廢錢用穀帛朝議以為不可乃止孔琳之議曰洪範八政貨為食次豈不以交易之所資為用之至要者乎若使百姓用力於為錢則是妨為生之業禁之可也今農自務穀工自務器各肄其業何嘗致勤於錢故聖王制無用之貨以通有用之財既無毁敗之費又省運致之苦此錢所以嗣功龜貝歴代不可廢者也穀帛本充於衣食今分以為貨則致損甚多又勞毁於商販之手耗棄於割截之用此之謂弊著於目前故鍾繇曰巧偽之人競濕穀以要利制薄絹以充資魏代制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑錢之不用由於兵亂積久用之於廢有由而然漢末是也今既用而廢之則百姓頓亡其利今既度天下之穀以周天下之食或倉庫充溢或糧靡斗儲以相資通則貧者仰富致之之道實假於錢一朝斷之便為棄物是有錢無糧之人皆坐而饑困此斷之又立弊也且據今用錢之處不為貧用穀之處不為富又人習來久革之怨惑語曰利不百不易業况又錢便於穀也魏明帝時錢廢用穀四十年矣以不便於人乃舉朝大議精才達政之士莫不以宜復用錢下無異情朝無異論彼尚捨穀帛而用錢足以明穀帛之弊著於已試也愚謂救弊之術無取於廢錢朝議多同琳之故元議不行前涼張軌太府參軍索輔言於軌曰古以金貝皮幣為貨息穀帛量度之耗二漢制五銖錢通易不滯晉太始中河西荒廢遂不用錢裂疋以為叚數縑布既壊市易又難徒壊女工不任衣用弊之甚也今中州雖亂此方全安宜復五銖以濟通變之㑹軌納之立制凖布用錢錢遂大行人頼其利宋文帝元嘉七年立錢置法鑄四銖文曰四銖重如其文人間頗盜鑄多翦鑿古錢取銅帝甚患之錄尚書江夏王義恭建議以一大錢當兩以防穿鑿議者多同之何尚之議曰夫泉貝之興以估貨為本事在交易豈假多數數少則幣輕數多則物重多少雖異濟用不殊况復以一當兩徒崇虛價夫錢之形大小多品直云大錢則未知其格若止於四銖五銖則文皆古篆既非庸下所識如或漫滅尤難分明公私交亂爭訟必起此最足深疑者也命㫖兼慮翦鑿日多以致銷盡鄙意復謂直由紏察不精致使立制以來發覺者寡今雖有懸金之名竟無酬與之實若申明舊科擒獲即報畏法希賞不日息矣中領軍沈演之以為晉遷江南疆境未廓或土習其風錢不普用今封畧開廣聲教遐暨金鏹布洽爰逮邊荒用彌廣而貨愈狹如復競竊翦鑿銷毁滋繁刑雖重禁姦弊方宻肆力之甿徒勤不足以供贍誠由貨貴物賤常調未革愚謂若以大錢當兩則國傳難毁之寶家贏一倍之利不俟加憲巧源日絶上從演之議遂以一錢當兩行之經時公私非便乃罷時言事者多以錢貨減少國用不足欲禁私銅以充官鑄五銖范泰又陳曰夫貨存貿易不在多少昔日之貴今日之賤彼此共之其揆一也但令官人均通則無患不足若使必資廣以收國用者則龜貝之屬自古而行銅之為器在用也博矣鍾律所通者逺機衡所揆者大器有要用則貴賤同資物有適宜則家國共給今毁必資之器而為無施之錢於貨則功不補勞在用則君人俱困較之以實損多益少良由階根未固意存逺畧伏願思可久之道贖欲速之情則嘉謨日陳聖慮可廣自元嘉中鑄四銖錢輪郭形製與古五銖同價無利百姓不資盜鑄孝武孝建初鑄四銖文曰孝建一邊為四銖其後稍去四銖專為孝建尚書右丞徐爰議曰貨薄人貧公私俱罄不有革造將大乏宜應遵式古典收銅繕鑄納贖刋刑著在往䇿合宜以銅贖刑隨罪為品詔可之所鑄錢形式薄小輪郭不成就於是人間盜鑄者雲起雜以鉛錫並不牢固又翦鑿古錢以取其銅錢既轉小稍違官式雖重制嚴刑人吏官長坐罪免者相係而盜鑄彌甚百物踊貴人患苦之乃立品格薄小無輪郭者悉加禁斷時議者又以銅轉難得欲鑄二銖錢顔竣曰議者將謂官藏空虛宜更改變天下銅少宜減錢式以救災弊賑國弔人愚以為不然今鑄二銖恣行新細於官無解於乏而人姦巧大興天下之貨將糜碎至盡空立嚴禁而利深難絶不過一二年間其弊不可復救此其不可一也今鎔鑄獲利不見有頓得一二倍之理縱復得此必待彌年又不可二也人懲大錢之改兼畏近日新禁市井之間必生紛擾富商得志貧人困窮又不可三也况又未見其利而衆弊如此失算當時取誚百代上不聽廢帝景和二年鑄二銖錢文曰景和形式轉細官錢每出人間即模效之而大小厚薄皆不及也無輪郭不磨翦鑿者謂之來子謂尤輕薄者謂之荇葉市井通用之永光元年沈慶之啓通私鑄由是錢貨亂敗一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢入水不沉隨手破碎市井不復斷數十萬錢不盈一掬斗米一萬商賈不行明帝太始初唯禁鵝眼綖環其餘皆通用復禁民鑄官署亦廢工尋又普斷唯用古錢齊高帝建元四年奉朝請孔覬上書曰三吳國之闗閫比歳被水潦而糴不貴是天下錢少非穀穰賤此不可不察也鑄錢之弊在輕重屢更重錢患難用而難用為無累輕錢弊盜鑄而盜鑄為禍深人所盜鑄嚴法不禁者由上鑄錢惜銅愛工也惜銅愛工也者謂錢無用之器以通交易務欲令輕而數多使省工而易成不詳慮其患也自漢鑄五銖錢至宋文帝四百餘年制度有廢興而不變五銖者其輕重可得貨之宜也以為開置錢府方督貢金大興鎔鑄錢重五銖一依漢法府庫以實國用有儲乃量俸祿薄賦税則家給人足頃盜鑄新錢者皆效作翦鑿不鑄大錢也若官錢已布於人使嚴斷翦鑿小輕破缺無周郭者悉不得行官錢細小者稱合銖兩銷以為大利貧良之人塞姦巧之路錢貨既均逺近則一百姓樂業市道無爭衣食滋殖矣時議者以為錢貨轉少宜更廣鑄重其銖兩以防人姦上乃使諸州大市銅上崩乃止武帝時竟陵王子良上表曰頃錢貴物賤殆欲兼倍凡在觸類莫不知兹稼穡艱劬斛直數千機杼勤苦疋纔三百所以然者實亦有由人間錢多翦鑿鮮復完者公家所受必須圓大以兩代一困於無所鞭捶質繫益致無聊梁初唯京師及三吳荆郢江襄梁益用錢其餘州郡則雜以穀帛交易交廣之域則全以金銀為貨武帝乃鑄錢肉好周郭文曰五銖重四銖三絫二黍其文則重一斤三兩又别鑄除其肉郭謂之公式女錢徑一寸文曰五銖重如新鑄五銖二品並行百姓或私以古錢交易者其五銖徑一寸一分重八銖文曰五銖三吳屬縣行之女錢徑一寸重五銖無輪郭郡縣皆通用太平百錢二種並徑一寸重四銖源流本一但文字古今之殊耳文並曰太平百錢定平一百五銖徑六分重一銖半文曰定平一稚錢五銖徑一分半重四銖文曰五銖源出於五銖但狹小東境謂之稚錢五銖錢徑七分半重三銖半文曰五朱源出稚錢但稍遷異以銖為朱耳三吳行之差少於餘錢又有對文錢其原未聞豐貨錢徑一寸重四銖半代之謂之男錢云婦人佩之即生男也此等輕重不一天子頻下詔書非新鑄二種之錢並不許用而趨利之徒私用轉甚至普通中乃議盡罷銅錢更鑄鐡錢人以鐡錢易得並皆私鑄及大同以後所在鐡錢遂如邱山物價騰貴交易者以車載錢不復計數而惟論貫商旅姦詐因之以求利自破嶺以東八十為陌名曰東錢江郢以上七十為陌名曰西錢京師以九十為陌名曰長錢大同元年天子乃詔通用足陌詔下而人不從錢陌益多至末年遂以三十五為陌陳初承梁䘮亂之後鐡錢不行始梁末又有兩柱錢及鵞眼錢時人雜用其價同但兩柱重而鵞眼輕私家多鎔鑄又間以錫錢兼以粟帛為貨文帝天嘉五年改鑄五銖初出一當鵞眼十宣帝大建十一年又鑄大貨六銖以一當五銖之十與五銖並行後還當一人皆不便乃相與訛言曰六銖錢有不利縣官之象未幾而帝崩遂廢六銖而行五銖竟至陳亡其嶺南諸州多以鹽米布交易俱不用錢後魏初置太和錢貨無所用也孝文帝始詔天下用錢十九年公鑄粗備文曰泰和五銖詔京師及諸州鎭皆通行之内外百官祿皆凖絹給錢疋為錢二百在所遣錢工備爐冶人有欲鑄就聽鑄之銅必精錬無所和雜宣武帝永平三年冬又鑄五銖錢京師及諸州鎮或不用或有止用古錢不行新錢致商貨不通貿遷頗隔孝明熙平初尚書令任城王澄上言竊尋太和之錢孝文留心創制後與五銖並行此乃不刋之式臣竊聞之君子行禮不求變俗因其所宜順而致用太和五銖雖利於京邑之肆所不入徐揚之市徐今彭城瑯琊郡地揚今壽春郡地土貨既殊貿鬻亦異便於荆郢之邦者則礙於兗徐之域荆今南陽郡地郢今汝南郡地兗今魯郡東平郡地致使貧人有重困之切王道貽隔化之訟臣之愚意謂今之太和與新鑄五銖及諸古錢方俗所便用者雖有小大之異並得通行貴賤之差自依鄉價庶貨環海内公私無壅其不行之錢及盜鑄毁大為小偽不如法者據律罪之詔曰錢行已久今東南有事且可依舊澄又奏太和五銖乃大魏之通貨不朽之常模寧可專貨於京邑不行於天下但今戎馬在郊江疆未一東南之州依舊為便至於京北京邑域内州鎮未用錢處行之則不足為難塞之則有乖通典何者布帛不可尺寸而裂五穀則有負擔之難錢之為用貫繦相屬不假斗斛之器不勞秤尺之平濟代之宜便益於此請並下諸方鎮其太和及新鑄并古錢内外全好者不限大小悉聽行之鵞眼環鑿依律而禁河南州鎮先用錢者既聽依舊不在斷限唯太和五銖二錢得用公造新者其餘雜種一用古錢生新之類普同禁約諸方錢通用京師其聽依舊使與太和錢及新造五銖並行若盜鑄錢者罪當重憲詔從之而河北諸州舊少錢貨猶以他物交易錢畧不入於市二年冬尚書崔亮奏𢎞農郡銅青谷有銅鑛計一斗得銅五兩四銖葦池谷鑛一斗得銅五兩鸞帳山鑛一斗得銅四兩河内郡王屋山今玉山縣鑛一斗得銅八兩南有青州苑燭山齊州商山並是往昔銅官舊迹見在謹按鑄錢方興用銅處廣既有冶利並許開鑄詔從之自後所行之錢人多私鑄錢稍小薄價用彌賤建初重制盜鑄之禁開紏賞之格孝莊帝初私鑄者益更薄小乃至風飄水浮米斗幾直一千祕書郎楊偘奏曰臣頃在雍州表陳聽人與官並鑄五銖錢使人樂為而俗弊得改㫖下尚書八座不許以今况昔為理不殊求取臣前表經御披析偘乃隨宜剖説帝從之乃鑄五銖錢御史中尉高恭之又奏曰四民之業錢貨為本救弊改鑄王政所先自頃以來私鑄薄濫官司紏繩挂網非一在今銅價八十一文得銅一斤私造薄錢斤餘二百既示之以深利又隨之以重刑得罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不沉此乃因循有漸科防不切朝廷失之彼復何罪昔漢文以五分錢小改鑄四銖至孝武復改三銖為半兩此皆以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成七十六文銅價至賤五十有餘其中人功食料錫炭鉛沙縱復私營不能自潤直置無利應自息心况復嚴刑廣設以臣測之必當錢貨永通公私獲允後遂用楊偘計永安二年秋詔更鑄文曰永安五銖錢官自立鑪亦聽人就鑄起自九月至三年正月而止官欲知貴賤乃出藏絹分遣使人於三市賣之絹疋止錢二百而私市者猶三百利之所在盜鑄彌衆巧偽既多輕重非一四方州鎮用各不同時鑄錢都督長史高謙之即高恭之兄字道讓上表求鑄三銖錢曰蓋錢貨之立本以通有無便交易故錢之輕重時代不同太公為周置九府圜法至景王時更鑄大錢秦兼海内錢重半兩漢興以秦錢重改鑄莢錢至孝文五年復為四銖孝武時悉復銷壊更鑄三銖至元狩中變為五銖又造赤仄以一當五王莽攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖魏文帝罷五銖至明帝復立孫權江左鑄大錢一當五百權赤烏五年復鑄大錢一當千輕重大小莫不隨時而變况今冦難未除州郡淪没人物凋零軍國用少則鑄小錢可以富益何損於政何妨於人也且政興不以錢大政衰不以錢小唯貴公私得所政化無虧既行之於古亦宜效之於今矣臣今請鑄以濟交乏五銖之錢任使並用行之無損國得其益詔將從之事未就㑹卒北齊神武霸政之初猶用永安五銖遷鄴已後百姓私鑄體制漸别遂各以為名有雍州青州梁州生厚𦂳錢古錢河陽生澁天柱赤牽之稱冀州之北錢皆不行交貿者皆以絹布神武乃收境内之銅及錢仍依舊文更鑄流之四境未幾之間漸復細薄姦偽競起武定六年文襄王以錢文五銖名須稱實宜秤錢一文重五銖者聽入市用計一百文重一斤四兩二十銖自餘皆凖此為數其京邑二市天下州鎮郡縣之市各置二秤懸於市門私人所用之秤皆凖市秤以定輕重凡有私鑄悉不禁斷但重五銖然後聽用若入市之錢不重五銖或雖重五銖而多雜鉛鑞並不聽用若輙以小薄雜錢入市有人紏獲其錢悉入告者其薄小之錢若便禁斷恐人交乏絶畿内五十日外州百日為限羣官參議咸以為時穀稍貴請待有年王從之而止文宣受東魏禪除永安之錢改鑄常平五銖重如其文其錢甚貴而製造甚精其錢未行而私鑄已興一二年間即有濫惡雖殺戮不能止乃令市增長銅價由此利薄私鑄少止至乾明皇建之間往往私鑄鄴中用錢有赤郭青熟細眉赤生之異河南所用有青薄鉛錫之别青齊徐兗梁荆河等州輩類各殊武平以後私鑄轉甚或以生鐡和銅至於齊亡卒不能禁後周之初尚用魏錢及武帝保定元年乃更鑄布泉之錢以一當五與五銖並行梁益之境又雜用古錢交易河西諸郡或用西域金銀之錢漢書西域傳罽賔國以銀為錢文為騎馬幕為人面幕即漫也烏弋山離國之錢與罽賔國同文為為人頭幕為騎馬加金銀飾其仄安息亦以銀為錢文王面幕為夫人面王死即更鑄大月氏亦同而官不禁建德三年更鑄五行大布錢以一當十大收商賈之利與布泉錢並行四年又以邊境之錢人多盜鑄乃禁五行大布不得出入四闗布泉之錢聽入而不聽出五年以布錢漸賤而人不用遂廢之初令私鑄者絞從者逺配為户齊平以後山東之人猶雜用齊氏舊錢至宣帝大成元年又鑄永通萬國錢以一當千與五行大布五銖凡三品並用隋文帝開皇元年以天下錢貨輕重不一乃更鑄新錢背面肉好皆有周郭文曰五銖而重如其文每錢一千重四斤二兩後魏食貨志云齊文襄令錢一文重五銖者聽入市用計一百錢重一斤四兩二十銖則一千錢重十二斤以上而隋代五銖錢一千重四斤二兩當是大小秤之差耳是時錢既雜出百姓或私有鎔鑄三年詔四面諸闗各付百錢為樣從闗外來勘樣相似然後得過樣不同者則壊以為銅入官詔行新錢以後前代舊錢有五行大布永通萬國及常平所在勿用以其貿易不止四年詔依舊不禁者縣令奪半年祿然百姓習用既久猶不能絶五年詔又嚴其制自是錢貨始一所在流布百姓便之是時見用之錢皆須和以錫鑞錫鑞既賤求利者多私鑄之錢不可禁約其年詔乃禁出錫鑞之處並不得私有採取十年詔晉王廣聽於揚州立五鑪鑄錢其後姦猾稍多漸磨鑢錢郭取銅私鑄又雜以鉛錫遞相倣傚錢遂輕薄乃下惡錢之禁京師及諸州邸肆之上皆令立榜置樣為准不中樣者不入於市十八年詔漢王諒聽於并州立五鑪鑄錢又江南人間錢少晉王廣又請於鄂州白紵山有銅鑛處鑄錢於是詔聽置十鑪鑄錢又詔蜀王秀於益州立五鑪鑄錢是時錢益濫惡乃令有司檢天下邸肆見錢非官鑄者皆毁之其銅入官而京師以惡錢貿易為吏所執有死者數年之間私鑄頗息大業以後王綱弛紊巨姦大猾遂多私鑄錢轉薄惡每千宜重二斤後漸輕至一斤或剪鐡鐷裁衣糊紙以為錢相雜用之貨賤物貴以至於亡唐武德四年廢五銖錢鑄開元通寶錢每十錢重一兩計一千重六斤四兩得輕重大小之中置錢監於洛并幽益等諸州賜秦王齊王三鑪右僕射裴寂一鑪以鑄盜鑄者死没其家屬高祖初入闗民間行綫環錢其製輕小凡八九萬纔滿半斛乃鑄開元通寶其文給事中歐陽詢製詞及書時稱其工字含八分及篆𨽻三體其詞先上後下次左後右讀之自上及左廻環讀之其義亦通流俗謂之開通元寶錢鄭䖍㑹粹云詢初進蠟樣日文德皇后掐一甲跡故錢上有掐文每兩二十四銖則一錢重二銖半以下古秤比今秤三之一也則今錢為古秤之七銖以上古五銖則加重二銖以上顯慶五年以盜鑄惡錢多官為市之以一善錢售五惡錢民間藏惡錢以待禁弛儀鳯四年以天下惡錢轉多令東都出逺年糙米及粟於市糶斗别納惡錢百文其惡錢令少府司農相知即令鑄破其厚重合斤兩者任將行用乾封元年改鑄乾封泉寶錢徑寸重二銖六分以一當舊錢之十踰年而舊錢多廢明年以商賈不通米帛踴貴復行開通元寶錢天下皆鑄之然私鑄犯法日蕃有以舟筏鑄江中者詔所在納惡錢而姦亦不息儀鳯中瀕江民多私鑄錢為業詔巡江官督捕載銅錫鑞過百斤者沒官四年命東都糶米粟别納惡錢百文少府司農毁之時鑄多錢賤米踴貴乃詔少府鑄尋復舊永淳元年私鑄者抵死隣保從坐武后長安中令懸樣於市令百姓依樣用錢俄而揀擇艱難交易留滯乃令錢非穿穴及鐡錫銅液皆得用之熟銅排斗沙澁之錢皆售自是盜鑄蜂起江淮尤甚吏莫能捕先天之際兩京錢益濫郴衡錢纔有輪郭鐡錫五銖之屬皆可用之或鎔錫模錢須臾千百元宗開元初宰相宋璟請禁惡錢行二銖四絫錢毁舊錢不可用者江淮有官鑪錢偏鑪錢稜錢時錢遣監察御史蕭隱之使江淮括惡錢隱之嚴急煩擾怨嗟盈路坐貶官璟又請糶十萬斛收惡錢少府毁之開元二十二年三月二十一日勅布泉不可以尺寸為交易菽粟不可以抄勺貿有無古之為錢以通貨幣頃雖官鑄所入無幾約工計本勞費又多公私之間給用不贍永言其弊豈無變通往者漢文之時已有放鑄之令雖見非於賈誼亦無廢於賢君古往今來時移事異亦欲不禁私鑄其理如何公卿百僚詳議可否祕書監崔沔議曰夫國之有錢時所通用若許私鑄人必競為各狥所求小如有利漸忘本業大計斯貧是以賈生之陳七福規於更漢令太公之創九府將以殷貧人况依法則不成違法乃有利謹按漢書文帝雖除盜鑄錢令而不得雜以鉛鐡為他巧者然則雖私鑄不容姦錢錢不容姦則鑄者無利鑄者無利則私鑄自息斯則除之與不除為法正等能謹於法而節其用則令行而詐不起事變而姦不生斯所以稱賢君也今若聽其私鑄嚴斷惡錢官必得人人皆知禁誠則漢政可侔猶恐未若皇唐之舊也今若税銅折役則官冶可成計估度庸則私錢無利易而可久簡而難誣謹守舊章無越制度且夫錢之為物貴以通貨利不在多何待私鑄然後足用也左監門錄事參軍劉秩議曰古者以珠玉為上幣黃金為中幣刀布為下幣管子曰夫三幣握之則非有補於暖也捨之則非有損於飽也先王以守財物以御人事而平天下是以命之曰衡衡者使物一高一下不得有常故與之在君奪之在君以人戴君如日月親君如父母用此術也是謂人主之權今之錢即古之下幣也陛下若捨之任人則上無以御下下無以事上其不可一也夫物賤則傷農錢賤則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕由乎物多多則作法收之使少少則重重則作法布之使輕輕重之本必由乎是奈何而假於人其不可二也夫鑄錢不雜以鉛鐡則無利雜以鉛鐡則惡不重禁不足以懲息方今塞其私鑄之路人猶冒死以犯之况啓其源而欲人之從令乎是設陷穽而誘之入其不可三也夫許人鑄錢無利則人不鑄有利則人去南畝者衆去南畝者衆則草萊不墾又鄰於寒餒其不可四也夫人富溢則不可以賞勸貧餒則不可以威禁故法令不行人之不理皆由貧富之不齊也若許其鑄錢則貧者必不能為臣恐貧者彌貧而服役於富室富室乘之則益盜昔漢文時吳濞諸侯也富埒天子鄧通大夫也財侔王者此皆鑄錢所致也必欲許其私鑄是與人利權而捨其柄其不可五也陛下必以錢重而傷本工費而利寡則臣願言其失以效愚計夫錢重者繇人日滋於前而鑪不加於舊又公錢重與銅之價頗等故盜鑄者破重錢以為輕錢禁寛則行禁嚴則止止則棄矣此錢之所以少也夫鑄錢用不贍者在乎銅貴銅貴之由在於採用者衆矣夫銅以為兵則不如鐡以為器則不如漆禁之無害陛下何不禁於人則銅無所用銅無所用則銅益賤銅賤則錢之用給矣夫銅不布下則盜鑄者無因而鑄無因而鑄則公錢不破公錢不破則人不犯死刑錢又日增末復利矣是一舉而四美兼也伏惟陛下熟察之其年十月六日勅貨幣兼通將以利用而布帛為本錢刀是末賤本貴末為弊則深法教之間宜有變革自今以後所有莊宅口馬交易並先用絹布綾羅絲綿等其餘市買至一千以上亦令錢物兼用違者科罪二十六年於宣潤等州置錢監時兩京用錢稍善米粟價益下其後錢又漸惡詔出銅所在置監鑄開元通寶錢京師庫藏皆滿天下盜鑄益起廣陵丹陽宜城尤甚京師權豪歳歳取之舟車相屬江淮偏鑪錢數十種雜以鐡錫輕漫無復錢形以一當偏鑪錢七八富商往往藏之以易江淮私鑄者兩京錢有鵞眼古文綖環之别每貫重三四斤至剪鐡而緡之宰相李林甫請出絹布三百萬疋平估收錢物價踴貴訴者百萬人兵部侍郎楊國忠欲招權以市恩揚鞭市門曰行當復之明日詔復行舊錢天寶十一載又出錢三十萬緡易兩市惡錢出左藏庫排斗錢許民易之國忠又言非鐡錫銅沙穿穴古文皆得用之是時增調農人鑄錢既非所習皆不聊生内作判官韋倫請厚價募工繇是役用減而鼓鑄多天下鑪九十九絳州三十揚潤宣鄂蔚皆十益郴皆五洋州三定州一每鑪歳鑄錢三千三百緡役丁匠三十費銅二萬一千二百斤鑞三千七百斤錫五百斤每千錢費錢七百五十天下歳鑄三十二萬七千緡肅宗乾元元年户部侍郎第五琦以國用未足幣重貨輕乃請鑄乾元重寶錢徑一寸每緡重十斤以一當十與開元通寶參用及琦為相又鑄重輪乾元錢一當五十每緡重十二斤與三品錢並行法既屢易物價騰踴斗米至七千錢死者滿道初有虚錢京師人人私鑄并小錢壊鐘像犯禁者愈衆鄭叔清為京兆尹數月榜死者八百餘人上元元年減重輪錢以一當三十開元舊錢與乾元十當錢皆以一當十碾磑鬻受得為實錢虛錢交易皆用十當錢由是錢有虛實之名史思明據東都鑄得一元寶錢徑一寸四分以當開元通寶之百既而惡得一非長祚之兆改其文曰順天元寶代宗即位乾元重寶錢以一當二重輪錢以一當三凡三日而大小錢皆以一當一自第五𤦺更鑄犯法者日數百州縣不能禁止至是人甚便之其後民間乾元重輪二錢鑄為器不復出矣當時議者以為自天寳至今户九百餘萬王制上農食九人中農夫七人以中農夫計之為六千三百萬人少壯相均人食米二升日費米百二十六萬斛歳費四萬五千三百六十萬斛而衣倍之吉凶之禮再倍餘三年之儲以備水旱凶災當米十三萬六千八十萬斛以貴賤豐儉相當則米之直與錢均也田以高下肥瘠豐耗為率一頃出米五十餘斛當田二千七百二十一萬六千頃而錢亦歳毁於棺瓶埋藏焚溺其間銅貴錢賤有鑄以為器者不出十年錢幾盡不足以周當世之用諸道鹽鐡轉運使劉晏以江嶺諸州任土所出皆重粗賤弱之貨輸京師不足以供道路之直於是積之江淮易銅鉛薪炭廣鑄錢每歳得十餘萬緡輸京師及荆揚二州自是錢日增矣建中元年九月户部侍郎韓洄上言江淮錢監歳共鑄錢四萬五千貫輸於京師度工用轉送之費每貫計錢二千是本倍利也今商州有紅崖冶出銅益多又有洛源監久廢不理請增工鑿山以取銅興洛源故監置十鑪鑄之歳計出錢七萬二千貫度用工轉送之費貫計錢九百則浮本矣其江淮七監請皆停罷從之二年八月諸道鹽鐡使包佶奏江淮百姓近日市肆交易錢交下粗惡揀擇納官者三分纔有二分餘並鉛錫銅盪不敷斤兩致使絹價騰貴惡錢漸多訪聞諸州山野地窖皆有私錢轉相貨易姦宄漸深今後委本道觀察使明立賞罰切加禁斷貞元九年正月張滂奏諸州府公私諸色鑄造銅器雜物等伏以國家錢少損失多門興販之徒潛將銷錢一千為銅六斤造寫器物則斤直六百餘有利既厚銷鑄遂多江淮之間錢實減耗伏請凖從前勅文除鑄鏡外一切禁斷十年六月勅今後天下鑄造買賣銅器並不須禁止其器物約每斤價直不得過一百六十文委所在長吏及巡院同勾當訪察如有銷錢為銅者以盜鑄錢罪論十四年十二月鹽鐡使李若初奏諸道州府多以近日泉貨數少繒帛價輕禁止見錢不令出界致使課利有缺商賈不通請指揮見錢任其往來勿使禁止從之憲宗以錢少復禁用銅器時商賈至京師委錢諸路進奏院及諸軍諸使富家以輕裝趨四方合劵乃取之號飛錢京兆尹裴武請禁與商賈飛錢者搜索諸坊十人為保鹽鐡使李巽以郴州平陽銅坑二百八十餘復置桂陽監以兩鑪日鑄錢二十萬天下歳鑄錢十三萬五千緡命商賈蓄錢者皆出以市貨天下有銀之山必有銅唯銀無益於人五嶺以北採銀一兩者流他州官吏論罪元和四年京師用錢緡少二十及有鉛錫錢者捕之非交易而錢行衢路者不問復詔採五嶺銀坑禁錢出嶺六年貨易錢十緡以上者參用布帛蔚州三河冶距飛狐故監二十里而近河東節度使王鍔置鑪疏拒馬河水鑄錢工費尤省以刺史李聽為使以五鑪鑄每鑪月鑄錢三十萬自是河東錫錢皆廢自京師禁飛錢家有滯藏物價頓輕判度支盧坦兵部尚書判户部事王紹鹽鐡使王播請許商人於户部度支鹽鐡三司飛錢每千緡增給百錢然商人至者復許與商人敵貫而易之然錢重幣輕如故憲宗為之出内庫錢五十萬緡市布帛每疋加舊估十之一㑹吳元濟王承宗連衡拒命以七道兵討之經費屈竭皇甫鎛建議内外用錢每緡墊二十外復抽五十送度支以贍軍十二年勅自今文武官僚不問品秩高下并公郡縣主中使下至士庶商旅寺觀坊市所有私貯見錢並不得過五千貫如有過此許從勅出後限一月市别物收貯如限内未了更請限亦不得過兩月限滿違犯者白身人處死有官人等聞奏科貶其賸貯錢納官五分取一充賞時京師里閈區肆所積多方鎮錢如王鍔韓𢎞李惟簡少者不下五十萬貫於是競買地屋以變其錢而高貲大價多依倚左右軍官錢為名府縣不能究治竟不行先是三年詔應天下商賈先蓄見錢者委所在長吏令收市貨物官中不得輙有程限逼迫商人任其貨易以求便利周歳之後此法徧行朕當别立新規設蓄錢之禁所以先有告示許其方員意在他時行法不貸按後之為國者不能制民之産以均貧富而徒欲設法以限豪强兼并之徒限民名田猶云可也限民蓄錢不亦甚乎然買田者志於吞併故必須上之人立法以限其頃畝蓄錢者志於流通初不煩上之人立法以教其懋遷也今以錢重物輕之故立蓄錢之限然錢重物輕正蔵鏹逐利者之所樂聞也人棄我取誰無是心正不必設法禁以驅之徒開告訐之門而重為煩擾耳穆宗即位京師鬻賣金銀十兩亦墊一兩糴米鹽百錢墊七八京兆尹柳公綽以嚴法禁止之尋以所在用錢墊陌不一詔從俗所宜内外給用每緡墊八十寶歴初河南尹王起請銷錢為佛像者以盜鑄錢論太和三年詔佛像以鉛錫土木為之飾帶以金銀鍮石烏油藍鐡唯鑑磬釘鐶鈕得用銅餘皆禁之盜鑄者死是時峻鉛鐡錢之禁告千錢者賞以五千四年詔積錢以七千緡為率十萬緡者期以一年出之二十萬以二年凡交易百緡以上者疋帛米粟居半河南府揚州江陵府以都㑹之劇約束如京師未幾皆罷八年河東錫錢復起鹽鐡使王涯置飛狐鑄錢院於蔚州天下歳鑄錢不及十萬緡文宗病幣輕錢重詔方鎮縱錢穀交易時雖禁銅為器而江淮嶺南列肆鬻之鑄千錢為器售利數倍宰相李珏請加鑪鑄錢於是禁銅器官一切為市之天下銅坑五十歳采銅二十六萬六千斤及武宗廢浮屠法永平監官李郁彦請以銅像鐘磬鑪鐸皆歸巡院州縣銅亦多矣鹽鐡使以工有常力不足以加鑄許諸道觀察使皆得置錢坊淮南節度使李紳請天下以州名鑄錢京師為京錢大小徑寸如開元通寶交易禁用舊錢㑹宣宗即位盡黜㑹昌之政新錢以字可辯復鑄為像昭宗末京師用錢八百五十為貫每百纔八十五河南府以八十為百云文獻通考卷八
