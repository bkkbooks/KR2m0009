body:
  text: 文獻通考卷二百二十六鄱陽馬端臨貴與著經籍考五十三子釋氏隋經籍志曰佛經者天竺之迦維衛國淨飯王太子釋迦牟尼所説釋迦當周莊王之九年四月八日自母右脅而生資貌竒異有三十二相八十二好捨太子位出家學道勤行精進覺悟一切種智而謂之佛亦曰佛陀亦曰浮屠皆胡言也華言譯之為淨覺其所説云人身雖有生死之異至於精神則常不滅此身之前則經無量身矣積而修習則成佛道天地之外四維上下更有天地亦無終極然皆有成有敗一成一敗謂之一劫自此天地已前則有無量劫矣每劫必有諸佛得道出世教化其數不同今此劫中當有千佛自初至於釋迦已七佛矣其次當有彌勒出世必經三會演説法藏開度衆生由是道者有四等之果一曰須陀洹二曰斯陀含三曰阿那含四曰阿羅漢至羅漢者則出入生死去來隱顯而不為纍阿羅漢已上至菩薩者深見佛性以至成道每佛滅度遺法相傳有正象末三等醇醨之異年嵗遠近亦各不同末法已後衆生愚鈍無復佛教而業行轉惡年壽漸短經數百千載間乃至朝生夕死然後有大火大水大風之災一切除去之而更立生人又歸淳朴謂之小劫每一小劫則一佛出世初天竺中多諸外道並事水火毒龍而善諸變幻釋迦之苦行也是諸邪道並來嬲惱以亂其心而不能得及佛道成盡皆摧伏並為弟子弟子男曰桑門譯言息心而總曰僧譯言行乞女曰比邱尼皆剃落鬚髮釋纍辭家相與和居治心修淨行乞以自資而防心攝行僧至二百五十戒尼五百戒俗人信馮佛法者男曰優婆塞女曰優婆夷皆去殺盜淫妄言飲酒是為五戒釋迦在世教化四十九年乃至天龍人鬼並來聽法弟子得道以百千萬億數然後於拘尸那城娑羅雙樹間以二月十五日入般涅槃涅槃亦曰泥洹譯言滅度亦言常樂我淨初釋迦説法以人之性識根業各差故有大乘小乘之説至是謝世弟子大迦葉與阿難等五百人追共撰述綴以文字集載為十二部後數百年有羅漢菩薩相繼著論贊明其義然佛所説我滅度後正法五百年像法一千年末法三千年其義如此推尋典籍自漢已上中國未傳或云久已流布遭秦之世所以堙滅其後張騫使西域蓋聞有浮屠之教哀帝時博士弟子秦景使伊存口授浮屠經中土聞之未之信也後漢明帝夜夢金神飛行殿庭以問於朝而傅毅以佛對帝遣郎中蔡愔及秦景使天竺求之得佛經四十二章及釋迦立像并與沙門攝摩騰竺法蘭東還愔之來也以白馬負經因立白馬寺於洛城雍門西以處之其經緘於蘭臺石室而又畫像於清源臺及顯節陵上章帝時楚王英以崇敬佛法聞西域沙門齎佛經而至者甚衆永平中法蘭又譯十住經其餘傳譯多未能通至桓帝時有安息國沙門安靜齎經至洛翻譯最為通解靈帝時有月支沙門支讖天竺沙門竺佛朔等並翻佛經而支讖所譯泥洹經二卷學者以為大得本旨漢太守竺融亦崇佛法三國時有西域沙門康僧會齎佛經至吳譯之吳主孫權甚大敬信魏黃初中國人始依佛戒剃髮為僧先是西域沙門來此譯小品經首尾乖舛未能通解甘露中有朱仕行者往西域至于闐國得經九十章晉元康中至鄴譯之題曰放光般若經太始中有月支沙門竺法護西遊諸國大得佛經至洛翻譯部數甚多佛教東流自此而盛石勒時常山沙門衛道安性聰敏誦經日至萬餘言以胡僧所譯維摩法華未盡深旨精思十年心了神悟乃正其乖舛宣揚解釋時中國紛擾四方隔絶道安乃率門徒南遊新野欲令元宗所在流布分遣弟子各趨諸方法往詣揚州法和入蜀道安與惠逺之襄陽後至長安苻堅甚敬之道安素聞天竺沙門鳩摩羅什思通法門勸堅致之什亦聞安令問遙拜致敬姚萇𢎞始二年羅什至長安時道安卒後已二十載矣什深慨恨什之來也大譯經論道安所正與什所譯辭義如一初無乖舛初晉元熙中新豐沙門智猛策杖西行到華氏城得泥洹經及僧祗律東至髙昌譯泥洹為二十卷後有天竺沙門曇摩羅讖復齎胡本來至河西沮渠蒙遜遣使至髙昌取猛本欲相參驗未還而蒙遜破滅姚萇𢎞始十年猛本始至長安譯為三十卷曇摩羅讖又譯金光明等經時胡僧至長安者數十輩惟鳩摩羅什才德最優其所譯則維摩法華成實論等諸經及曇無懴所譯金光明曇摩懴所譯泥洹等經並為大乘之學而什又譯十誦律天竺沙門佛陀耶舍譯長阿含經及四分律兜法勒沙門曇摩難提譯增一阿含經曇摩耶含譯阿毗曇論並為小乘之學其餘經論不可勝紀自是佛法流通極於四海矣東晉隆安中又有罽賓沙門僧伽提婆譯增一阿含經及中阿含經義熙中沙門支法領從于闐國得華嚴經三萬六千偈至金陵宣譯又有沙門法顯自長安遊天竺經三十餘國隨有經律之處學其書語譯而寫之還至金陵與天竺禪師跋羅參共辨定謂僧祗律學者傳之齊梁及陳並有外國沙門然所宣譯無大名部可謂法門者梁武帝大崇佛法於華林園中總集釋氏經典凡五千四百卷沙門寶唱撰經目録又後魏時太武帝西征長安以沙門多違佛律羣聚穢亂乃詔有司盡坑殺之焚破佛像長安僧徒一時殱滅自餘征鎮豫聞詔書亡匿得免者十一二文成之世又更修復熙平中遣沙門慧生使西域采諸經律得一百七十部永平中又有天竺沙門菩提留支大譯佛經與羅什相埒其地持十地論並為大乘學者所重後齊遷鄴佛法不改至周武帝時蜀郡沙門衛元嵩上書稱僧徒猥濫武帝出詔一切廢毁開皇元年髙祖普詔天下任聽出家仍令計口出錢營造金像而京師及并州相州洛州等諸大都邑之處並官寫一切經置於寺內又别寫藏於祕閣天下之人從風而靡競相景慕民間佛經多於六經十百倍大業時又令沙門智果於東都內道場撰諸經目分别條貫以佛所説經為三部一曰大乘二曰小乘三曰雜經其餘自後人假托為之者别為一部謂之疑經又有菩薩及諸深解奧義贊明佛理者名之為論及戒律並有大小及中三部之别又所學者録其當時行事名之為記凡十一種今舉其大數列於此篇隋志一千九百五十部六千一百九十八卷唐志二十五家四十部三百九十五卷失姓名一家元苑以下不著録七十四家九百四十一卷宋三朝藝文志曰唐開元釋藏目凡五千四十八卷正元藏目又二百七十五卷而禪觀之書不預焉迄於皇朝復興翻譯太平興國後至道二年二百三十九卷又至大中祥符四年成一百七十五卷潤文官趙安仁等編纂新目為大中祥符法寶咸平初雲勝奉詔編藏經隨函索隱六百六十卷入令詔訪唐正元以後未附藏諸經益之並令摹刻劉安仁又分太宗妙覺祕詮為名真宗法音集論頌贊詩為三卷以法音旨要為名摹印頒行訖於天禧末又譯成七十卷凡大乘經三百三十四卷大乘律一卷大乘論二十九卷小乘經八十一卷小乘律五卷西方聖賢集二十九卷今取傳記禪律纂之書參儒典者具之宋三朝志五十八部六百一十六卷宋兩朝志一百一十三部宋四朝志十部宋中興志一百家一十部七百七十五卷四十二章經一卷鼂氏曰天竺釋迦牟尼佛所説也釋迦者華言能仁以周昭王二十四年甲寅四月八日生十九學道三十學成處世演道者四十九年而終蓋年七十九也沒後弟子大迦葉與阿難纂掇其平生之言成書自漢以上中國未傳或云雖傳而泯絶於秦火張騫使西域已聞有浮屠之教及明帝感傳毅之對遣蔡愔秦景使天竺求之得此經以歸中國之有佛書自此始故其文不類他經云佛書自愔景以來至梁武帝華林之集入中國者五千四百卷曰經曰論曰律謂之三藏傳於世盛矣其徒又或摘出别行為之注釋疏抄至不可選紀而通謂之律學厥後達磨西來以三藏皆筌蹄不得佛意故直指人心俾之見性衆尊之為祖學之者布於天下雖曰不假文字而弟子録其善言往往成書由是禪學興焉觀今世佛書三藏之外凡講説之類律學也凡問答之類禪學也藏經猥衆且所至有之不録今取其餘者列於篇此經雖在藏中然其見於經籍志故特取焉陳氏曰後漢竺法蘭譯佛書到中國此其首也所謂經來白馬寺者其後千經萬論一大藏教乘要不出於此水心葉氏曰按四十二章經質略淺俗是時天竺未測漢事採摘大意頗用華言以復命非浮屠氏本書也夫西戎僻阻無有禮義忠信之教彼浮屠者直以人身喜怒哀樂之間披折解剝别其真妄究其終始為聖狂賢不肖之分蓋世外竒偉廣博之論也與中國之學皎然殊異豈可同哉世之儒者不知其淺深猥欲強為攘斥然反以中國之學佐佑異端而曰吾能自信不惑者其於道鮮矣朱子語録曰釋氏書其初只有四十二章經所言甚鄙俚後來日添月益皆是中華文士相助撰集如晉宋間自立講師孰為釋迦孰為阿難孰為迦葉各自問難筆之於書轉相欺誑大抵皆是剽竊老列意思變換以文其説四十二章經之説却自平實如言彈琴弦急則絶慢則不響不急不慢乃是大抵是偷老莊之意後來達磨出來一切掃盡至楞嚴經做得極好金剛般若經一卷鼂氏曰後秦僧鳩摩羅什譯唐僧宗密僧知恩皇朝思元仁賈昌朝王安石五家注豫弟公訴日誦三過豫靳之曰汝亦頗知其義乎對曰知之其義明萬物皆空故古人謂以空為宗也豫曰金剛者堅固不壞之義也萬物之空何以謂之金剛復曰六如偈其言明甚獨奈何因語之曰汝之過正在以有為法同無為法以真空同頑空耳張湛曰身與萬物同有其有不有心與大虛同無其無不無庶幾知此哉六祖解金剛經一卷鼂氏曰唐僧惠能注金剛經凡六譯其文大槩既同時小異耳而世多行姚秦鳩摩羅什本六譯金剛經一卷陳氏曰此經前後六譯各有異同有𢎞農楊翺者集為此本大和中中貴人楊承和集右軍書刻之興唐寺石本金剛經一卷陳氏曰南唐保大五年壽春所刻乾道中劉岑崇髙再刻於建昌軍不分三十二分相傳以為最善禪宗金剛經解一卷鼂氏曰皇朝安保衡採托禪宗自達磨而下發明是經者參釋之序稱其有言涉修證者北宗法門也舉心即佛者江西法門也無法無物本來如是者曹溪法門也六祖序如來所説金剛般若波羅蜜與法為名其意謂何以金剛世界之寶其性猛利能壞諸物金雖至剛羚羊角能壞金剛喻佛性羚羊角喻煩惱金雖堅剛羚羊角能碎佛性雖堅煩惱能亂煩惱雖堅般若智能破羚羊角雖堅賓鐵能壞悟此理者了然見性涅槃經云見佛性者不名衆生如來所説金剛喻者祗為世人性無堅固定慧即亡口誦心行定慧均等是名究竟金在山中不知是寶亦不知是山何以故為無性故人則有性取其寶用得遇金師鏨鑿山破取礦烹煉遂成精金隨意使用得免貧苦四大身中佛性亦爾身喻世界人我喻山煩惱為礦佛性喻金智慧喻工匠精進勇猛喻鏨鑿身世界中有人我山人我山中有煩惱礦煩惱礦中有佛性寶佛性寶中有智慧工匠用智慧工匠鑿破人我山見煩惱礦以覺悟火烹煉見自金剛佛性了然明淨是故以金剛為喻因以為名也又曰大藏教般若經合六百卷四處共十六會此金剛經是十六會中第九會六百卷中第五百七十七卷謂談般若有八部謂大品小品放光光讚道行勝天王文殊問金剛屬第八部中自佛滅度後九百年間西竺天親菩薩師事無著天親欲釋金剛經乃問無著無著遂入日光定上兜率問慈氏慈氏以八十行偈授無著天親依此造論三卷躡須菩提三種問答斷二十七疑釋此金剛一卷經文頴濱蘇氏曰金剛經所謂一切賢聖皆以無為法而有差别者謂以無而為法耳非别有無為之法也然自六祖以來皆讀作無為之法蓋僧家拙於文義耳餘見楞嚴條下按經文言以無為法而有差别又言一切有為法語意相對故誤讀作無為然有即有為無則不必言為矣有為法而視同夢幻泡影露電則終歸於無而已無與無為是兩義無為者清淨之謂也老氏之説無者空寂之謂也佛氏之説了翁陳氏曰佛法之要不在文字而亦不離於文字文字不必多讀只金剛經一卷足矣世之賢士大夫無營於世而致力於此經者昔嘗陋之今知其亦不癡也此經要處只九箇字阿耨多羅三藐三菩提梵語九字華言一字一覺字耳中庸誠字即此字也此經於一切有名有相有覺有見皆掃為虛妄佛非佛法非法衆生我相非我相之類其所建立者獨此九字惟阿耨菩提則不曰非阿耨菩提蓋世念盡空則實體自見也其字九其物一是一以貫之之一非一二三四之一也是不誠無物之物非萬物散殊之物也年過五十宜即留意勿復因循此與日用事百不相妨獨在心不忘耳但日讀一遍讀之千遍其旨自明蚤知則蚤得力朱子曰金剛經大意只在須菩提問云何住云何降伏其心兩句上故説不應住法生心不應住色生心應無所住而生其心此是答云何住又説若胎生卵生濕生化生我皆令入無餘涅槃而滅度之此是答云何降伏其心彼所謂降伏者非謂欲遏伏此心謂盡降收世間衆生之心入他無餘涅槃中滅度都教爾無心了方是只是一箇無字自此以後只管纒去只是這兩句如這卓子則云若此卓子是名卓子若見諸相非相則見如來離一切相即名佛皆是此意要之只是説箇無圓覺了義經十卷陳氏曰唐罽賔佛陀多羅譯圓覺經疏三卷鼂氏曰唐長壽二年天竺僧覺救譯宗密疏解圓覺之旨佛為十二大士説如來本起因地修之以三觀楞嚴之旨阿難因遇魔障嬈問學菩提最初方便終之以二義蓋圓覺自誠而明楞嚴自明而誠雖若不同而二義三觀不出定慧其歸豈有二哉萬行首楞嚴經十卷陳氏曰唐天竺般刺密諦烏長國彌迦譯語宰相房融筆授所謂譯經潤文者也楞嚴經疏二十卷鼂氏曰唐神龍二年中天竺國僧彼岸於廣州譯房融筆授皇朝僧于璿撰楞嚴標指十卷鼂氏曰皇朝僧曉月撰其弟子應乾録范峋為之序圓覺經云修多羅教如標指月其名書之意蓋取此會解楞嚴經十卷鼂氏曰唐僧彌伽釋迦譯語房融筆授皇朝井度集古今十二家解去取之成書豫嘗為之序潁濱蘇氏曰楞嚴經如來諸大弟子多從六根入至返流全一六用不行混入性海雖凡夫可以直造佛地矣又曰豫讀楞嚴知六根源出於一外緣六塵流而為六隨物淪逝不能自返如來憐愍衆生為設方便使知出門即是歸路故於此經指涅槃門初無隱蔽若衆生能洗心行法使塵不相緣根無所偶返流全一六用不行晝夜中中流入與如來法流水接則自其內身便可成佛如來猶恐衆生於六根中未知所從乃使二十五弟子各説所證而觀世音以聞思修為圓通第一其言曰初於聞中入流無所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅見前若能如是圜拔一根則諸根皆脫於一彈指頃遍歷三空即與諸佛無異矣既又讀金剛經説四果人須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹乃廢經而嘆曰須陀洹所證則觀世音所謂初於聞中入流無所者邪入流非有法也唯不入六塵安然常住斯入流矣至於斯陀含名一往來而實無往來阿那含名為不來而實無來蓋往則入塵來則返本斯陀含雖能來矣而未能無往阿那含非徒不往而亦無來至阿羅漢則往來意盡無法可得然則所謂四果者其實一法也但歷三空有淺深之異耳豫觀二經之言本若符契而世或不喻故明言之朱子語録曰楞嚴經只是強立一箇意義只管疊將去數節之後全無意味楞嚴前後只是説呪中間皆是增入蓋中國好佛者覺其陋而加之耳又譯經而不譯呪想其徒見呪本淺近故特地不譯因説程子耳無聞目無見之語答曰決無此理遂舉釋教中有塵既不緣根無所著反流全一六用不行之説蘇子由以為此理至深至妙蓋他意謂六根既不與六塵相緣則收拾六根之用反復歸於本體而使之不行顧烏有此理廣因舉程子之説譬如靜坐時忽有人喚自家只得應他不成不應曰彼説出楞嚴經此經唐房融訓釋故説得如此巧佛書中唯此經最巧然佛當初也不如是説如四十二章經最先傳來中國底文字然其説却平實楞伽經四卷鼂氏曰宋天竺僧求那跋陀羅譯楞伽山名也佛為大慧演道為此山元魏僧達磨以付僧慧可曰吾觀中國所有經教唯楞伽可以印心謂此書也釋延壽謂此經以佛語心為宗而李通元則以為五法三自性八識二無我為宗按經説第八業種之識名為如來藏言其性不二明偽即出世也延壽所云者指其理通元所云者指其事非不同也陳氏曰有宋魏唐三譯宋譯四卷唐譯七卷正平張戒集注蓋以三譯參校同舊注本莫知誰氏頗有倫理亦多可取句讀遂明白其八卷者分上下也東坡蘇氏書後曰楞伽阿跋多羅寶經先佛所説微妙第一真實了義故謂之佛語心品祖師達磨以付二祖曰吾觀震旦所有經教惟楞伽四卷可以印心祖祖相受以為心法如醫之有難經句句皆理字字皆法後世達者神而明之如槃走珠如珠走槃無不可者若出新意而棄舊學以為無用非愚無知則狂而已近嵗學者各宗其師務從簡便得一句一偈自謂了證至使婦人女子抵掌嬉笑爭談禪説髙者為名下者為利餘波末流無所不至而佛法微矣譬如俚俗醫師不由經論直授方藥以之療病非不或中至於遇病輒應懸斷死生則與知經學古者不可同日語矣世徒見其有一至之功或捷於古人因謂難經不學而可豈不誤哉楞伽義趣幽眇文字簡古或不能句而况遺文以得義志義以了心者乎此其所以寂寥於世幾廢而僅存也六祖解心經一卷鼂氏曰唐僧慧能解慧能其徒尊之以為六祖忠國師解心經一卷鼂氏曰唐僧慧忠肅宗師事之此其所著書也心經會解一卷鼂氏曰唐陳留僧元奘譯併注般若者華言智慧波羅蜜多者華言到彼岸謂智可以濟物入聖域也長安中僧法藏為之疏元豐中僧法泉亦注之司馬溫公書心經後曰余嘗聞學佛者言佛書入中國經律論三藏合五千四十八卷般若經獨居六百卷學者撮其要為心經一卷為之注者鄭預最簡而明余讀鄭注乃知佛書之要盡於空一字而已或問揚子人有齊死生同貧富等貴賤何如揚子曰作此者其有懼乎此經云照見五藴皆空度一切苦厄似與揚子同指然則釋老之道皆宜為憂患之用乎世稱韓文公不喜佛嘗排之余觀其與孟尚書論大顚云能以理自勝不為事物侵亂乃知文公於書無所不觀蓋嘗遍觀佛書取其精粹而排其糟粕耳不然何以知不為事物侵亂為學佛書者所先邪今之學佛者自言得佛心作佛事然皆不免侵亂於事物則其人果何如哉朱子語録問心經既説空又説色如何曰他蓋欲於色見空耳大抵只要鶻突人維摩詰所説經十卷鼂氏曰天竺維摩詰撰西域謂淨名曰維摩詰廣嚴城處士也佛聞其病使十弟子四菩薩往問訊皆以不勝任固辭最後遣文殊行因共談妙道遂成此經其大旨明真俗不二而已淨名演法要者居世出世也不以十弟子四菩薩為知法者斥其有穢淨之别也文殊大智法身之體也淨名處俗法身之用也俾體用相酬對皆真俗不二之喻也姚秦僧鳩摩羅什譯按開元釋教録云羅什者華言童壽天竺人苻堅遣吕光破西域俘之以歸姚興迎長安譯經於逍遙園凡四十部此其一也本三卷十四品其後什之徒僧肇道生道融等為之注釐為十卷豫得之董太虛家蓋襄陽本也唐李繁頗言此注後人依托者遺教經一卷陳氏曰佛涅槃時所説唐碑本山谷黃氏曰遺教經譯於姚秦𢎞始四年在王右軍沒後數年𢎞始中雖有譯本不至江南至陳氏時有譯師出遺教經論於是並行今長安雷氏家遺教經石上行書貞觀中行遺教經敕令擇善書經生書本頒焉敕與經字是一手但真行異耳余平生疑遺教非右軍書比來考尋遂決定知非右軍書矣西山真氏跋曰遺教經蓋瞿曇氏最後教諸弟子語今學佛者罕常誦而習之也蓋自禪教既分學者往往以為不階言語文字而佛可得於是脫略經教而求所謂禪者髙則髙矣至其身心顛倒有不堪檢點者則反不如誦經持律之徒循循規矩中猶不至大謬也今觀此經以端心正念為首而深言持戒為禪定智慧之本至謂制心之道如牧牛如馭馬不使縱逸去瞋止妄息欲寡求然後由遠離以至精進由禪定以造智慧具有漸次梯級非如今之談者以為一起可到如來地位也宜學佛者患其迂而不若禪之捷歟以吾儒觀之聖門教人以下學為本然後可以上達亦此理也學佛者不由持戒而欲至定慧亦猶吾儒捨離經辨志而急於大成去灑掃應對而語性與天道之妙其可得哉余謂佛氏之有此經猶儒家之有論語而金剛楞嚴圓覺等經則易中庸之比未有不先論語而可遽及易中庸者也儒釋之教其趣固不同而為學之序則有不可易者妙法蓮華經觀世音普門品姚秦三藏鳩摩羅什譯西山真氏跋曰余自少讀普門品雖未能深解其義然嘗以意測之曰此佛氏之寓言也昔唐李文公問藥山禪師曰如何是惡風吹船飄入鬼國師曰李翺小子問此何為文公怫然怒形於色師笑曰發此瞋恚心便是黑風吹船飄入鬼國也吁藥山可謂善啓發人矣以是推之則知利欲熾然即是火坑貪愛沉溺便是苦海一念清淨烈熖成池一念警覺船到彼岸災患纒縛隨處而安我無畏怖如械自脫惡人侵凌待以橫逆我無忿嫉如獸自奔讀是經者作如是觀則知彌陀大士真實為人非浪語者阿彌陀經一卷陳氏曰唐陳仁稜所書刻於襄陽文獻通考卷二百二十六
