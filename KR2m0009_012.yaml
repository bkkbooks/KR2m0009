body:
  text: 文獻通考卷十二鄱陽馬端臨貴與著職役考一厯代鄉黨版籍職役昔黄帝始經土設井以塞爭端立歩制畝以防不足使八家為井井開四道而分八宅鑿井於中一則不洩地氣二則無費一家三則同風俗四則齊巧拙五則通財貨六則存亡更守七則出入相司八則嫁娶相媒九則無有相貸十則疾病相救是以情性可得而親生産可得而均均則欺凌之路塞親則鬭訟之心弭既牧之於邑故井一為隣隣三為朋朋三為里里五為邑邑十為都都十為師師七為州夫始分於井則地著計之於州則數詳迄乎夏殷不易其制周制大司徒令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓鄭元曰此所以勸民者也使之者皆謂立其長而教令使之保猶任也救救凶災也賓賓客其賢者也受者宅舍有故相受寄託也賙者謂禮物不備相給足也閭二十五家族百家黨五百家州二千五百家鄉萬二千五百家此總謂郊内者也及三年則大比大比則受邦國之比要大比謂使天下更簡閲人數及其財物也受邦國之比要則亦受鄉遂矣鄭司農云五家為比故以比為名今時八月按比是也要謂其簿比長每比下士一人掌五家各掌其比之治五家相受相和親有辠竒衺則相及徙於國中則從而授之徙謂不便其居或國中徙郊或郊徙國中皆從而付所處之吏明無罪惡徙於他則為旌節而行之謂徙異鄉有節乃達若無授無節則唯圜土納之閭胥每閭中士一人掌二十五家各掌其閭之徵令嵗時數其閭之衆寡辨其施舍凡春秋之祭祀役政喪紀之數聚衆庶既比而讀法書其敬敏任恤者凡事掌其比觵撻罰之事失禮者之罰也族師每族上士一人掌一百家各掌其族之戒令政事月吉屬民讀邦法書其孝悌睦婣有學者春秋祭酺亦如之登其族之夫家衆寡辨其貴賤老㓜廢疾可任者及其六畜車輦比伍閭族各為聨使之相保相受賞罰相及以受邦職以役國事相葬埋若師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至掌其治令戒禁刑罰嵗終則㑹黨正每黨下大夫一人掌五百家各掌其黨之政令教治四孟月屬民讀法春秋祭禜亦如之國索鬼神而祭祀䄍祭則以禮屬民而飲酒於序以正齒位凡黨之祭祀喪紀昏冠飲酒教其禮事掌其戒禁師田行役則以法治其政事正嵗屬民讀法書其德行道藝嵗終則㑹州長每州中大夫一人掌二千五百家各掌其州之教治政令月吉屬民讀法考其德行道藝糾其過惡而勸戒之嵗時祭祀州社則屬民讀法春秋以禮㑹民而射於州序州之大祭大喪皆涖其事師田行役則帥而致之掌其戒令賞罰於軍因為師帥嵗終則㑹正嵗讀法三年大比則大考州里以贊鄉大夫廢興遂人掌邦之野郊外曰野此野謂甸稍縣都以土地之圖經田野造縣鄙形體之法五家為鄰五鄰為里四里為酇作管反五酇為鄙五鄙為縣五縣為遂皆有地域溝樹之使各掌其政令刑禁以嵗時稽其人民而授之田野簡其兵器教之稼穡經形體皆謂制分界也鄰里酇鄙縣遂猶郊内比閭族黨州鄉也鄭司農云田野之居其比伍之名與國中異制故五家為鄰鄭元謂異其名者示相變耳遂之軍旅追胥起徒役如六鄉里有序而鄉有庠序以明教庠則行禮而視化焉夫均其厚薄則生産平統之於都則其數舉家於鄉遂則其户可詳五人為伍則人之衆寡可知故管子曰欲理其國者必先知其人欲知其人者必先知其地自昭穆之後王室中衰井田廢壞不足以紀人之衆寡宣王是以料人於大原由兹道失之鄰長每鄰一人掌五家掌相糾相受凡邑中之政相贊徙於他邑則從而授之里宰每里下士一人掌二十五家掌比其邑之衆寡與其六畜兵器治其政令以嵗時合耦於鋤以治稼穡趨其耕耨行其秩序以待有司之政令而徵斂其財賦酇長每酇中士一人掌一百家各掌其酇之政令以時校登其夫家比其衆寡治其喪紀祭祀之事作民則以旗鼓兵革帥而至嵗時簡器稼器兵器趨其耕耨稽其女工鄙師每鄙上士一人掌五百家各掌其鄙之政令祭祀作民謂起役也則掌其戒令以時數其衆寡而察其􅍇惡而誅賞嵗終則㑹縣正每縣下大夫一人掌二千五百家各掌其縣之政令徵比以頒田里以分職事掌其治訟趨其稼事而賞罰之若將用野民師田行役移執事則帥而至治其政令移執事謂移用其民既役則稽功㑹事而誅賞章氏曰三代役法莫詳於周周禮五兩軍師之法此兵役也師田追胥之法此徒役也府史胥徒之有其人此胥役也比閭族黨之相保此鄉役也有司徒焉則因地之善惡而均役有族師焉則校民之衆寡以起役有鄉大夫焉則辨年之老少以從役有均人焉則論嵗之豐凶以行復役之法齊威公用管仲仲曰夫善牧者非以城郭也輔之以什司之以伍伍無非其里什無非其家故奔亡者無所匿遷徙者無所容不求而得不召而來故人無流亡之意吏無備追之憂故主政可行於人人心可繫於主是以制國郊内則以五家為軌軌十為里里四為連連十為鄉鄉五為帥國内十五鄉自家至帥郊外則三十家為邑邑十為卒卒十為鄉鄉三為縣縣十為屬屬有五自家至屬各有官長以司其事以寓軍政焉而齊遂霸徐偉長中論曰夫治平在庶功興庶功興在事役均事役均在民數周民數周為國之本也先王周知其萬民衆寡之數乃分九職焉九職既分則劬勞者可見勤惰者可聞也然而事役不均者未之有也事役既均故上盡其心而人竭其力然而庶功不興者未之有也庶功既興故國家殷富大小不匱百姓休和下無怨疾焉然而治不平者未之有也故泉有源治有本道者審本而已矣故周禮孟冬司冦獻民數於王王拜受之登於天府内史司㑹冢宰貳之其重之也如是今之為政者未之知恤民也譬猶無田而欲樹藝雖有農夫安能措其强力乎是以先王制六鄉六遂之法所以維持其民而為之綱目也使其鄰比相保愛賞罰相延及故出入存亡臧否逆順可得而知也及亂君之為政也户口漏於國版夫家脱於聨伍避役逋逃者有之於是姦心競生而偽端並作小則濫竊大則攻劫嚴刑峻令不能救也人數者庶事之所自出也莫不取正焉以分田里以令貢賦以造器用以制禄食以起田役以作軍旅國以建典家以立度五禮用修九刑用措其唯審人數乎秦用商鞅變法令民為什伍而相收司連坐告姦者與斬敵首同賞不告姦者與降敵同罰按秦人所行什伍之法與成周一也然周之法則欲其出入相友守望相助疾病相扶持是教其相率而為仁厚輯睦之君子也秦之法一人有姦鄰里告之一人犯罪鄰里坐之是教其相率而為暴戾刻核之小人也漢高祖二年舉民年五十以上有修行能帥衆為善置以為三老鄉一人擇鄉三老一人為縣三老與縣令丞尉以事相教復勿繇戍以十月賜酒肉十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游徼三老掌教化嗇夫職聽訟收賦税游徼徼循禁賊盗縣大率方百里其民稠則減稀則曠鄉亭亦如之皆秦制也漢官儀曰游徼亭長皆習設備五兵弓弩㦸楯刀劒甲鉦鼓吏赤幘行縢帶劔佩刀持盾被甲設矛㦸習射十里一亭亭長候五里一郵郵間相去二里半司姦盗亭長持二尺版以劾賊執繩以収執賊水心葉氏曰縣鄉亭之制本於商鞅鞅雖改法要是周衰國大者難用舊制齊晉楚裂地名官以自便往往在商鞅之前矣古者百里之狹自為朝廷由後世觀之疑若煩民然三老嗇夫游徼猶各有職掌近民而分其責任若後世蕩然無復紀秩而令長悍然獨以征取為事則又鞅之所不為也新城三老董公遮説漢王為義帝發喪討項羽文帝十二年詔以戸口率置三老常員遣謁者勞賜三老帛人五疋武帝元狩元年遣謁者賜縣三老帛人五疋鄉三老人三疋元狩六年遣謁者循行天下謁三老孝弟以為民師戾太子發兵誅江充長安擾亂言太子反上怒甚壺闗三老茂上書言太子亡邪心上感悟宣帝元康元年加賜三老帛四年及甘露三年皆賜帛有差王尊為京兆尹坐免湖三老公乗興等上書訟尊治京兆功效日著書奏天子復以尊為徐州刺史王尊為東郡太守河水甚溢尊躬率吏民投沈白馬請以身填金堤水波稍却白馬三老奏其狀制詔秩尊中二千石黄霸守潁川吏民興於行誼賜三老爵及帛韓延壽守馮翊有昆弟訟田延壽曰咎在馮翊稱疾病不聽事令丞嗇夫三老亦自繫待罪元帝初元元年賜三老帛人五疋五年賜三老帛人五疋元光二年賜三老帛成帝建始元年賜三老錢帛綏和元年賜三老帛平帝元始三年賜三老帛西漢凡縣道有蠻夷曰道國列侯所食縣曰國邑皇太后皇后公主所食曰邑千五百八十七鄉六千六百二十二亭二萬九千六百三十五東漢鄉置三老掌教化凡有孝子順孫正女義婦遜財救患及學士為民法式者皆扁表其門閭以興善行鄉置有秩游徼有秩郡所置秩百石掌一鄉人其鄉小者縣置嗇夫一人皆主知民善惡為役先後知民貧富為賦多少平其差品游徼掌循禁司姦盗又有鄉佐屬鄉主民收賦税亭有長以禁盗賊里有里魁民有什伍善惡以告本注曰里魁掌一里百家什主十家伍主五家以相檢察有善事惡事以告監官漢官儀曰鄉户五千則有秩明帝即位賜爵三老孝弟力田人三級注云三老孝弟力田皆鄉官之名三老高帝置孝弟力田高后置所以勸導鄉里助成風化今考西漢高后紀元年初置孝弟力田二千石者一人師古曰特置孝弟力田官而尊其秩欲以勸厲天下令各敦行務本然則三老鄉各一人孝弟力田既禄秩如許尊未必各鄉皆設有其人則置之耳孝文武宣成哀紀各有賜孝弟力田金帛爵級事元和二年帝耕於定陶詔曰三老尊年也孝弟淑行也力田勤勞也國家甚休之其賜帛人一疋勉率農功永平三年賜三老孝弟力田爵人三級十二年賜三老孝弟力田爵人三級十七年賜三老孝弟力田爵人三級章帝建初三年賜三老孝弟力田爵人三級四年立皇太子賜爵同和帝永元八年賜爵同十二年賜爵同元興元年立皇太子賜爵同安帝永初二年帝加元服賜爵二級元初元年賜爵同延光元年賜爵人一級順帝永建元年賜爵人三級四年賜爵二級陽嘉元年賜爵三級桓帝建和元年賜爵同獻帝建安元年賜爵人二級晉制每縣户五百以上皆置鄉三千以上置二鄉五千以上置三鄉萬以上置四鄉鄉置嗇夫一人鄉戸口每千以下置治書吏一人千以上置史佐各一人正一人五千五百以上置史一人佐二人縣率百戸置里吏一人其土廣人稀聽隨宜置里吏限不得減五十戸户千以上置校官掾一人縣皆置方略吏四人洛陽縣置六部尉江左以後建康亦置六部尉餘大縣置二人次縣小縣各一人鄴長安置吏如三千户以上之制東晉哀帝崇和元年三月庚戍天下所在土斷孝武時范寗陳時政曰昔中原喪亂流寓江左庶有旋反之期故許其狹注本郡自爾漸久人安其業邱壠墳栢皆以成行無本邦之名而有安土之實今宜正其封疆土斷人户明考課之科修閭伍之法難者必曰人各有桑土之懷下役之慮斯成并兼之所執而非通理之篤論也古者失地之君猶臣所寓之主列國之臣亦有違適之禮隨㑹仕秦致稱春秋樂毅􅉨燕見褒良史且今普天之人原其氏出皆隨代移遷何至於今而獨不可帝善之安帝義熙九年宋公劉裕縁人居土上表曰臣聞先王制禮九土攸序分境畫野各安其居故井田之制三代以崇秦革其政漢遂不改富强兼并於是為弊在漢西京大遷田景之族以實闗中即以三輔為鄉閭不復係之於齊楚九服不擾所託成舊自永嘉播越爰託淮海朝運匡復之算人懷思本之心經畧之圖日不暇給是以寧人綏理猶有未遑及至大司馬桓温以人無定本傷理為深庚戌土斷以一其業於時財阜國豐實由於此自兹迄今彌厯年載畫一之制漸用頹弛雜居流寓閭伍不修王化所以未純民瘼所以猶在自非改調無以濟理夫人情滯常難與慮始謂父母之邦以為桑梓者誠以生焉敬愛所託請依庚戌土斷之科庶存其本稍與事著然後率之以仁義鼓之以威聲超大江而跨黄河撫九州而復舊土則戀本之志乃速申於當年在始暫勤要終必易於是依界土斷唯青兖徐三州人居晉陵者不在斷限諸流寓郡縣多被併省宋孝武大明中王元謨請土斷雍州諸僑郡縣今襄陽漢東等郡也齊高祖建元二年詔朝臣曰黄籍人之大紀國之理端自頃氓偽已久乃至竊注爵位盜易年月或戸存而文書已絶或人在而反記死叛停私而云隸役身强而稱六疾皆政之巨蠧敎之深疵比年雖却改籍書終無得實若約之以刑則人偽已逺若綏之以德又未易可懲諸賢並深明理體各獻嘉謀以何科算能革斯弊也虞玩之上表曰宋元嘉二十七年八條取人孝建元年書籍衆巧之所始也元嘉中故光禄大夫傅崇年出七十猶手自書籍躬加隱校古之共理天下唯良二千石今欲求理正其在勤明令長凡受籍縣不加檢勘但封送州州檢得知方却下歸縣吏貪其賂人肆其姦姦彌深而却彌多賂逾厚而答逾緩自泰始三年至元徽四年揚州等九郡黄籍共却七萬一千餘戸於今十一年矣而所正者猶未四萬神州奥區尚或如此江湘諸郡尤不可言愚謂宜以元嘉二十七年籍為正人惰法既久今建元二年書籍宜更立明科一聽首悔迷而不返依制必戮使官長審自檢校然後上州永以為正若有虚昧州縣同咎今戸口多少不減元嘉而版籍頓闕弊亦有以自孝建以來入勲者衆其中操干戈衞社稷者三分殆無一焉尋蘇峻平後庾亮就温嶠求勲簿而嶠不與以為陶侃所上多非實録物之懷私無代不有又有改注籍狀詐入仕流昔為人役者今反役人又生不長髪便謂道人或抱子并居竟不編戸遷徙去來公違土斷屬役無漏流亡不歸法令必行自然競反為理不患無制患在不行不患不行患在不久帝省表納之乃别置校籍官置令史限人一日得數巧以防懈怠至武帝永明八年讁巧者戍縁淮各十年百姓怨咨帝乃詔曰既徃之愆不足追咎自宋昇明以前皆聽復注其有讁邊疆皆許還本自此後有犯嚴其罪梁武帝時所司奏南徐江郢逋兩年黄籍不上帝納尚書令沈約之言詔改定百家譜約上言曰晉咸和初蘇峻作亂版籍焚化此後起咸和三年以至乎宋並皆詳實朱筆隱注紙連悉縫而尚書上省庫籍唯有宋元嘉中以來者晉代舊籍並在下省左人曹謂之晉籍自東西二庫既不係尋檢主者不復經懷狗牽䑕齧雨濕沾爛解散於地又無扃縢此籍精詳實宜保惜位髙官卑皆可依按宋元嘉二十七年始以七條徵發既立此科茍有廻避姦偽互起嵗月滋廣以至於齊於是東堂校籍置郎令史以掌之而簿籍於此大壞矣凡粗有衣食者莫不互相因依競行姦貨落除卑注更書新籍通官榮禄隨意高下以新換故不過用一萬許錢昨日卑微今日仕伍凡此姦巧並出愚下不辨年號不識官階或注義熙在寧康之前或以崇安在元興之後此時無此府此年無此國元興唯有三年而猥稱四年又詔書甲子不與長厯相應如此詭謬萬緒千端校籍諸郎亦所不覺不才令史更何可言且籍字既細難為眼力尋求巧偽莫知所在徒費日月未有實驗假令兄弟三人分為三籍却一籍祖父官其二初不被却同堂從祖以下固自不論諸如此例難可悉數或有應却而不却不須却而却所却既多理無悉當懷寃抱屈非止百千投辭請訴充曹牣府既難領理交興人怨於是悉聽復注普停洗却既䝉復注則莫不成官此盖核籍不精之巨弊也臣謂宋齊二代士庶不分雜役減闕職由於此自元嘉以來籍多假偽景平以前既不係檢凡此諸籍得無巧换今雖遺落所存尚多宜有徵驗可得信實其永初景平籍宜移還上省竊以為晉籍所餘須加寳愛若不留意則還復散失矣不識胄允非謂衣冠凡諸此流罕知其祖假稱高曽莫非巧偽質諸文籍姦事立露徵覆矯詐為益實𢎞又上省籍庫雖直郎題掌而盡日科校唯令史獨入籍既重寳不可專委羣細若入庫檢籍之時直郎直都應共監視寫籍皆於郎都目前並皆掌置私寫私换可以永絶事畢郎出仍自題名臣又以為巧偽既多並稱人士百役不及高卧私門致令公私闕乏是事不舉宜選史傳學士諳究流品者為左人即左人尚書專共校勘所貴卑姓雜譜以晉籍及宋永初景平籍在下省者對共讐校若譜注通籍有卑雜則條其巧謬下在所科罰帝以是留意譜籍詔御史中丞王僧孺改定百家譜由是有令史書吏之職譜局因此而置始晉太元中員外散騎侍郎賈弼好簿狀大披羣族所撰十八州百一十六郡合七百一十二卷士庶略無遺闕其子孫代傳其業宋王𢎞劉湛並好其書𢎞日對千客不犯一人諱湛為選曹始撰百姓譜以助銓序傷於寡略齊王儉復加得繁省之衷僧孺為八十卷東南諸族别為一部不在百家之數按魏晉以來最重世族公家以此定選舉私門以此訂婚姻寒門之視華族如冠屨之不侔則夫徭役賤事人之所憚固宜其改竄冒偽求自附流品以為避免之計也然徭役當視物力雖世族在必免之例而官之占田有廣狹澤之䕃後有久近若於此立法以限之不勞而定矣不此之務而方欲改定譜籍雖曰選諳究流品之人為郎尚書以掌之然偽冒之久者滋多非敢於任怨者誰肯澄汰如楊佺期并韶至以恥憤構逆亂則澄汰亦豈易言哉陳文帝天嘉初詔曰自頃編戸播遷良可哀傷其亡鄉失土逐食流移者今年内隨其適樂來嵗不問僑舊悉令著籍同土斷之例按周官之法貴者賢者及新甿之遷徙者皆復其征役後世因之故六朝議征役之法必以土斷僑寓釐正譜籍為先然自晉至梁陳且三百年貴者之澤既斬則同於編氓僑者之居既久則同於土著難以稽考此所以偽冒滋多而議論紛紛也後魏初不立三長唯立宗主督䕶所以人多隱冒五十三十家方為一户謂之䕃附䕃附者皆無官役豪强徵斂倍於公賦孝文太和十年納給事中李冲之説遂立三長三長謂五家一鄰長五鄰一里長五里一黨長李冲以為三正理人所由來逺於是創三長之制曰宜准古五家立一鄰長五鄰立一里長五里立一黨長取鄉人强謹者鄰長復一夫里長二黨長三三長三載亡愆則陟用之一等太后覽而稱善引見公卿議之中書令鄭羲祕書令高祐等曰冲求立三長者乃欲混天下為一法言似可用其實難行太尉元丕曰臣謂此法若行公私有益方今有事之月校比人戸新舊未分人心勞怨請過今秋至冬閑月徐乃遣使於事為宜冲曰人可使由之不可使知之若不因課時百姓徒知立長校戸之勤未見均徭省賦之益心必生怨宜及課調之月令知賦税之均既識其事又得其利因人之欲為之易行著作郎傅思益進曰人俗既異險易不同九品差調為日已久一朝改法恐成擾亂太后曰立三長則課有常凖賦有常分包䕃之户可出僥倖之人可止何為而不可遂立三長公私便之北齊令人居十家為鄰比五十家為閭百家為族黨一黨之内則有黨族一人副黨一人閭正二人鄰長十人合十有四人共領百家而已至於城邑一坊僑舊或有千户以上唯有里正二人里吏二人里吏不常置隅老四人非是官府私充事力坊事亦得取濟若論外黨便是煩多齊文宣始立九等之户富者税其錢貧者役其力隋文帝受禪頒新令五家為保保五為閭閭四為族皆有正畿外置里正比閭正黨長比族正以相檢察蘇威奏置五百家鄉正令理人間詞訟李德林以為本廢鄉官判事為其里閭親識判斷不平今令鄉正專理五百家恐為害更甚且今時吏部總選人物天下不過數百縣於六七百萬戸内銓簡數百縣令猶不能稱才乃欲於一鄉之内選人能理五百家者必恐難得又即要荒小縣有不至五百家者復不可令兩縣共管一鄉勅内外羣官就東宫㑹議自皇太子以下多從德林議蘇威又言廢郡德林語之云修令時公何不論廢郡為便令出其可改乎然高熲同威之議遂置之十年虞慶則於闗東諸道廵省使還並奏云五百家鄉正專理詞訟不便於人黨與愛憎公行貨賄乃廢之唐令諸户以百戸為里五里為鄉四家為鄰三家為保每里設正一人若山谷阻險地逺人稀之處聽隨便量置掌按比户口課植農桑檢察非違催驅賦役在邑居者為坊别置正一人掌坊門管鑰督察姦非並免其課役在田野者為村别置村正一人其村滿百家增置一人掌同坊正其村居如滿十家者隸入大村不須别置村正天下戸量其資産升降定為九等三年一造戸籍凡三本一留縣一送州一送戸部常留三比在州縣五比送省儀鳳二年二月勅自今以後省黄籍及州縣籍也諸里正縣司選勲官六品以下白丁清平强幹者充其次為坊正若當里無人聽於比鄰里簡用其村正取白丁充無人處里正等並通取十八以上中男殘疾免充開元十八年勅天下戸等第未平升降須實比來富商大賈多與官吏往還逓相憑囑求居下等自後如有囑請委御史彈奏廣德二年勅天下戸口委刺史縣令據見在實户量貧富等第科差不得依舊籍帳睿宗景雲二年監察御史韓琬陳時政上疏曰往年兩京及天下州縣學生佐史里正坊正每一員闕先擬者輒十人頃年差人以充猶致亡逸即知政令風化漸以敝也宣宗大中九年詔以州縣差役不均自今每縣據人貧富及役輕重作差科簿送刺史檢署訖鏁於令㕔每有役事委令據簿輪差周顯德五年詔諸道州府令團併鄉村大率以百户為一團每團選三大戸為耆長凡民家之有姦盗者三大户察之民田之有耗登者三大户均之仍每及三載即一如是宋太祖皇帝建隆三年舊制凡有課役皆出於戸民郡國輦運官物率以僑居人充至是始令文武官内諸司臺省監諸使不得占州縣課役戸及諸州不得役道路居民為逓夫五月詔令佐檢察差役有不平者許民自相糾舉京百官補吏須不礙役乃聽國初循舊制衙前以主官物里正户長鄉書手以課督賦税耆長弓手壯丁以逐捕盗賊承符人力手力散從官以奔走驅使在縣曹司至押録在州曹司至孔目官下至雜職虞候㨂搯等人各以鄉戸等第差充乾德五年又禁諸州職官私占役戸供課太宗太平興國三年京西轉運使程能上言諸州户供官役素無等第望品定為九等著於籍以上四等量輕重給役餘五等免之後有貧富隨所升降望令本路施行俟稍便宜即頒於天下詔令轉運使躬裁定之七年令兩京諸州府部民有乏種及耕具人丁者許衆共推擇一人練土地之宜明種樹之法者縣補為農師令相視田畝沃瘠及五種所宜指言某處土地宜植某物某家有種某户有丁男某人有耕牛即令鄉三老里胥與農師周勸民分於曠土種蒔俟嵗熟共取其利為農師者蠲税外免其他役民家有嗜酒賭博者怠於農務者農師謹察之白於州縣論其罪以警游惰焉九年以其煩擾停之淳化五年令天下諸縣以第一等戸為里正第二等戸為户長勿得冒名以給役訖今循其制宋朝凡衆役多以廂軍給之罕調丁男大中祥符五年提㸃府界段惟幾發中牟縣夫修馬監倉羣牧制置使以廐卒代焉因下詔禁之天禧元年又詔治河勿調丁夫以役充乾興元年十二月時仁宗已即位未改元臣僚上言伏見勸課農桑曲盡條目然鄉閭之弊無由得知朝廷惠澤雖優豪勢侵陵罔暇遂使單貧小户力役靡供乃嵗豐登稍能自給或時水旱流徙無蹤戸籍雖有增添農民日以減少以臣愚見且以三千戸之邑五等分等中等以上可任差遣者約千戸官員形勢衙前將吏不啻一二百户並免差遣州縣鄉村諸色役人又不啻一二百戸如此則二三年内已總遍差纔得歸農即復應役直至破盡家業方得休閑所以人戸懼見稍有田産典賣與形勢之家以避徭役因為浮浪或縱惰游更有諸般惡倖影占門户田土稍多同居骨肉及衙前將吏各免户役者除見莊業外不得更典賣田土如違許人告官將所典賣沒官自減農田之弊均差遣之勞免致私役不禁因循失業其罷俸罷任前資官元無田者許置五頃為限詔三司定奪三司言准農田勅應鄉村有莊田物力者多茍免差徭虛報逃移與形勢戸同情啟倖却於名下作客戸隱庇差徭全種自巳田産今與一月自首放罪限滿不首許人告論依法斷遣支賞又准勅應以田産虛立契典賣於形勢豪强戸下隱庇差役者與限百日經官首罪改正戸名限滿不首被人告發者命官使臣除名公人百姓决配今准臣僚奏欲諸命官所置莊田定以三十頃為限衙前將吏合免户役者定以十五頃為限所典買田只得於一州之内典買如祖父遷葬别無塋地者數外許更置墳地五頃若地有崖嶺不通歩量刀耕火種之處所定頃畝委逐路轉運使别為條制詣實申奏又按農田勅買置及析居歸業佃逃戸未併入本尸者各共户帖供輸今並須割入一户下今後如有違犯者科罪告人給賞並從之開寳平蜀後令西川得替官部綱赴京與減一選無選可減加一階止齋陳氏曰熙寧罷衙前應綱運皆募得替官管押自令下無應募者仁宗景祐中詔川陜閩廣吳越諸路衙前仍舊制餘路募有版籍者為衙前滿三期罪不至徒補三司軍將皇祐中又禁役鄉户為長名衙前使募人為之役之重者自里正鄉户為衙前主典府庫或輦運官物往往破産景祐中稍欲寛里正衙前之法乃命募充知并州韓𤦺上疏曰州縣生民之苦無重於里正衙前兵興以來殘剥尤甚至有孀母改嫁親族分居或棄田與人以免上等或非命求死以就單丁規圖百端苟脱溝壑之患每鄉被差疎密與貲力高下不均假有一縣甲乙二鄉甲鄉第一等戸十五户計貲為錢三百萬乙鄉第一等戸五户計貲為錢五十萬番休遞役即甲鄉十五年一周乙鄉五年一周富者休息有餘貧者敗亡相繼豈朝廷為民父母之意乎請罷里正衙前命轉運司以州軍見役人數為額令佐視五等簿通一縣計之籍皆在第一等選貲最髙者一户為鄉户衙前後差人倣此即甲縣户少而役蕃聽差乙縣戸多而役簡者簿書未盡實聽换取他户里正主督租賦請以戸長代之二年一易下其議京畿河北河東陜西京東西轉運司度利害皆以為便而知制誥韓絳蔡襄亦極論江南福建里正衙前之弊絳請行鄉户五則之法襄請以産錢多少定役重輕至和中遂命絳襄與三司參定繼遣尚書都官員外郎吳機復趨江東殿中丞蔡禀趨江西與長吏轉運使議可否因請行五則法凡差鄉户衙前視貲産多寡置籍分為五則又第其役輕重放此假有第一等重役十當役十人列第一等户百第二等重役五當役五人列第二等户五十以備一番役使藏其籍通判治所遇差人長吏以下同按視之轉運使提㸃刑獄察其違慢遂更著淮南江南兩浙荆湖福建之法下三司頒焉自是遂罷里正衙前百姓稍休息矣按乾興元年臣僚上言影占徭役之害自官豪勢要以至衙前將吏皆避役之人請立限田之法命官三十頃而衙前將吏亦得占十五頃餘者以違制論夫均一衙前也將吏為之則可以占田給復鄉户為之則至於賣産破家然則非衙前之能為人禍也蓋官吏侵漁之毒可施之於愚戅之鄉氓而不可施之於諳練之將吏故也韓蔡諸公所言固為切當然過欲驗鄉之濶狹役之疎密而均之且既曰罷里正衙前而復選貲最高者為鄉户衙前則不過能免里正重復應役之苦而衙前之弊如故也此王荆公僱募之法所以不容不行之熙豐歟慶歴中令京東西河北陜西河東裁損役人即給使不足益以廂兵時范仲淹執政以為天下縣多故役蕃而民瘠首廢河南府諸縣欲以次及他州當時以為非是未幾悉復時州縣既廣徭役益衆知廣濟軍范諷上言軍地方四十里户口不及一縣而差役與諸郡等願復為縣轉運司執不可因詔裁損役人自是數下詔書議蠲冗役以寛民力又置寛恤民力司遣使四出自是州縣力役多所裁損凡省二萬三千六百二十二人皇祐中詔州縣里正押司録事既代而令輸錢免役者論如違制律時有王逵者為荆湖轉運使率民輸錢免役得緡錢三十萬進為羡餘蒙奬詔由是他路競為掊克欲以市恩民至破産不能償所負朝廷知其弊乃下此詔按役錢之説始於此以免役誘民而取其錢及得錢則以給他用而役如故其弊由來久矣治平四年六月時神宗已即位未改元詔州縣差役仍重勞役不均其令逐路轉運司遍牒轄下州軍如官吏有知差役利害可以寛減者實封條析以聞先是三司使韓絳言害農之弊無甚差役之法重者衙前多致破産次則州役亦須重費向聞京東有父子二丁將為衙前其父告其子云吾當求死使汝曹免凍餒自經而死又聞江南有嫁其祖母及與母析居以避役者此大逆人理所不忍聞又有鬻田産於官户田歸不役之家而役併増於本等户其餘戕賊農民未易遽數望令中外臣庶條具利害委侍從臺省官集議考驗古制裁定使役力無偏重之患則農民知為生之利有樂業之心役法之議始此英宗時諌官司馬光言置鄉户衙前以來民益困乏不敢營生富者反不如貧貧者不敢求富臣嘗行於村落見農民生具之微而問其故皆言不敢為也今欲多種一桑多置一牛蓄二年之糧藏十疋之帛鄰里已目為富室指抉以為衙前矣况敢益田疇葺閭舎乎臣聞其事惄焉傷心安有聖帝在上四方無事而立法使民不敢為久生之計乎臣愚以為凡農民租税之外宜無所預衙前當募人為之以優重相補不足則以坊郭上户為之彼坊郭之民部送綱運典領倉庫不費二三而農民常廢八九何則儇利戅愚之性不同也其餘輕役則以農民為之按温公此奏言之於英宗之時所謂募人充衙前即熙寧之法也然既曰募則必有以酬之此錢非出於官當役者合輸之則助役錢豈容於不徵而當時諸賢論此事復齗齗不可何也蓋荆公新法大概主於理財所以内而條例司外而常平使者所用皆苛刻小人雖助役良法亦不免以聚歛亟疾之意行之故不能無弊然遂指其法為不可行則過矣知諌院吳充言鄉役之中衙前為重被差之日官吏臨門籍記杯杵七筯皆計資産定為分數以應須求至有家貲已竭而逋負未除子孫既沒而鄰保猶逮是以民間規避重役土地不敢多耕而避丁等骨肉不敢義聚而憚人上無以為生乞早定鄉役利害以時施行帝因閲内藏庫奏有衙前越千里輸金七錢庫吏邀乞踰年不得還者帝重傷之乃詔制置條例司講立役法二年條例司言考合衆論悉以使民出錢僱役為便即先王之法致民財以禄庶人在官者之意也願以條目付所遣官分行天下博盡衆議奏可於是條諭諸路曰衙前既用重難分數凡買撲酒税坊塲舊以酬衙前者從官自賣以其錢同役錢隨分數給之其廂鎮塲務之類舊酬奬衙前不可令民買占者即用舊定分數為投名衙前酬奬如部水陸運及領倉驛塲務公使庫之類舊煩擾且使陪備者今當省使無費承符散從等舊苦重役償欠者今當改法除弊使無困凡有産業物力而舊無役者今當出錢以助役皆其條目也久之司農寺言今立役條所寛優者皆村鄉樸憃不能自達之窮氓所裁取者乃仕宦兼并能致人言之豪右若經制一定則衙司縣吏又無以施誅求巧舞之姦故新法之行尤所不便築室道謀難以成就欲自司農申明所降條約先自一両州為始候其成就即令諸州軍放視施行若其法實便百姓當特奬之從之於是提㸃府界公事趙子幾以其府界所行條目奏上之帝下之司農寺詔判寺鄧綰曾布更議之綰布上言畿内鄉户計産業若家資之貧富上下分為五等嵗以夏秋隨等輸錢鄉户自四等坊郭自六等以下勿輸兩縣有産業者上等各隨縣中等併一縣輸析居者隨所析而升降其等若官户女户寺觀未成丁減半輸皆用其錢募三等以上税戸代役隨役重輕制禄開封縣户二萬二千六百有竒嵗輸錢萬二千九百緡以萬二百為禄贏其二千七百以備凶荒欠闕他縣倣此然輸錢計等高下而户等著籍昔縁巧避失實乃詔責郡縣坊郭三年鄉村五年農隙集衆稽其物業考其貧富察其詐偽為之升降若故為高下者以違制論募法三人相任衙前仍供物産為抵弓手試武藝典吏試書計以三年或二年乃更為法既具掲示一月民無異辭著為令令下募者執役被差者得散去開封一府罷衙前八百三十人畿縣放鄉役數千於是頒其法天下天下土俗不同役重輕不一民貧富不等從所便為法凡當役人户以等第出錢名免役錢其坊郭等第戸及成丁單女户寺觀品官之家舊無色役而出錢者名助役錢凡敷錢先視州若縣應用僱直多少而隨戸等均取僱直既巳足用又率其數增取二分以備水旱欠闕雖増毋得過二分謂之免役寛剰錢四年上召二府對資政殿馮京言修差役作保甲人極勞敝上曰詢訪鄰近百姓亦皆以免役為喜盖雖令出錢而復其身役無追呼刑責之虞人自情願故也文彦博言祖宗法制具在不須更張以失人心上曰更張法制於士大夫誠多不説然於百姓何所不便彦博曰為與士大夫治天下非與百姓治天下也按潞公此論失之盖介甫之行新法其意勇於任怨而不為毁譽所動然役法之行坊郭品官之家盡令輸錢坊塲酒税之入盡歸助役故士夫豪右不能無怨而實則農民之利此神宗所以有於百姓何所不便之説而潞公此語與東坡所謂凋敝太甚厨傳蕭然云者皆介甫所指以為流俗干譽不足恤者是豈足以䋲其偏而救其弊乎四月從提舉常平陳知儉之請罷許州衙前幹公使庫以軍校主之月給食錢三千初諸路衙前以公使多所倍費有至破家者至是始更以軍校其後行於諸路人皆便之御史中丞楊繪言非不知助役之法乃陛下閔差役之不均欲平一之而有司率務多歛致天下不曉以為取贏而他用之也如王庭老張靚科配一路緡錢至七十萬輸之多者一户至三百千民皆謂供一嵗役之外剰數幾半咸謂庭老靚必有陞擢此盖因取數多謗議興也乞少賜裁損以安民心東明縣民數百詣開封府及臺省訴超升等第出役錢事楊繪又言東明縣民所訴乃因司農寺不因舊則自據戸數創立助役錢等第下縣令遵所立而著之籍不問堪升與否也凡立等第必稽戸力高下而制其升降州必慿縣縣必慿户長里正戸長里正稽之鄉衆乃可得實今乃自司農寺預定品數付縣立簿豈得民心甘服哉帝命提㸃司究所從升降以聞仍嚴升降之法司農寺及府界提舉言畿民有未知新立法意以助役錢多願仍舊充役者詔如不願輸錢免役縣案所當供役嵗月如期役之與免輸錢王安石為言外間扇搖役法者謂輸錢多必有贏餘若羣訴必可免役既聚衆僥倖茍受其訴與免輸錢當仍役之帝從其説監察御史劉摯陳十害其要曰上户常少中下戸常多故舊法上户之役類皆數且重下户之役率常簡而輕今不問上下户槩視物力以差出錢故上户以為幸而下户苦之優富苦貧非法之善况嵗有豐凶而役人有定數助錢歳不可闕則是賦税有時減闕而助錢更無蠲損也役人必用鄉户為其有常産則自重今既招僱恐止得浮浪姦偽之人則帑庾塲務綱運不唯不能典幹竊恐不勝其盗用而冒法者衆至於弓手耆壯承符散從手力胥史之類恐遇冦則有縱逸因事輙為騷擾也司農新法衙前不差鄉户其舊嘗願為長名者聽仍其舊却用官自召賣酒税坊塲并州縣坊郭人户助役錢數酬其重難惟此一法有若可行然坊郭十等户緩急科率郡縣賴之難更使之均助錢乞詔有司若坊塲錢可足衙前僱直則詳究條目徐行而觀之御史中丞楊繪言助役之利一而難行有五請先言其利假如民田有一家而百頃者亦有户纔三頃者其等乃俱在第一以百頃而較三頃則已三十倍矣而受役月日均齊無異况如官户則除耆長外皆應無役今例使均出僱錢則百頃所輸必三十倍於三頃者而又永無決射之訟此其利也然難行之説亦有五民惟種田而責其輸錢錢非田之所出一也近邊州軍應募者非土著姦細難防二也逐處田税多少不同三也耆長僱人則盗賊難止四也專典僱人則失陷官物五也乞先議防此五害然後著為定制仍先戒農寺無欲速就以祈恩賞提舉司無得多取於民以自為功如此則誰復妄議同判司農寺曾布摭繪摯所言而條奏辯詰之其略曰畿内上等户盡罷昔日衙前之役故今所輸錢比舊受役時其費十減四五中等人戸舊充弓手手力承符户長之類今使上等及坊郭寺觀單丁官户皆出錢以助之故其費十減六七下等人户盡除前日冗役而專充壯丁且不輸一錢故其費十減八九大抵上户所減之費少下户所減之費多言者謂優上户而虐下户得聚斂之謗臣所未諭也提舉司以諸縣等第不實故首立品量升降之法開封府司農寺方奏議時盖不知己嘗増減舊數然舊敇每三年一造簿書等第常有升降則今品量増減亦未為非又况方曉諭民户苟有未便皆與釐正則凡所増減實未嘗行言者則以為品量立等者盖欲多斂僱錢升補上等以足配錢之數至於祥符等縣以上等人户數多減充下等乃獨掩而不言此臣所未諭也凡州縣之役無不可募人之理今投名衙前半天下未嘗不典主倉庫塲務綱運而承符手力之類舊法皆許僱人行之久矣惟耆長壯丁以今所措置最為輕役故但輪差鄉户不復募人言者則以為專典僱人則失陷官物耆長僱人則盗賊難止又以為近邊姦細之人應募則焚燒倉廩或守把城門則恐潛通外境此臣所未諭也免役或輸見錢或納斛斗皆從民便為法至此亦已周矣言者則謂直使輸錢則絲帛粟麥必賤若用他物凖直為錢則又退㨂乞索且為民害如此則當如何而可此臣所未諭也昔之徭役皆百姓所為雖凶荒饑饉未嘗罷役今役錢必欲稍有餘羡廼所以為凶年蠲減之備其餘又專以興田利增吏禄言者則以為助錢非如税賦有倚閣減放之期臣不知昔之衙前弓手承符手力之類亦當倚閣減放否此臣所未諭也兩浙一路户一百四十餘萬所輸緡錢七十萬耳而畿内户十六萬率緡錢亦十六萬是兩浙所輸財半畿内然畿内用以募役所餘亦自無㡬言者則以為吏縁法意廣收大計如兩浙欲以羡錢徼幸司農欲以出剰為功此臣所未諭也於是詔繪知鄭州摯落館閣校勘監察御史裏行監衡州鹽倉遣察訪使遍行諸路促成役書司農言始議出錢助民執役今悉召募請改助役為免役制可若不願就募而强之者論如律詔監司各定所部助役錢數利路轉運使李瑜欲定四十萬判官鮮于侁曰利路民貧二十萬足矣議既不合各為奏上帝是侁議侍御史鄧綰言利路役歳須緡錢九萬餘而李瑜率取至三十三萬有竒乃詔責瑜而擢侁為副使以示諸路頒募役法於天下内外胥吏素不賦禄惟以受賕為生至是用免役錢禄之有禄而贜者用倉法重其坐初時京師賦吏禄嵗僅四千緡至八年計緡錢三十八萬有竒京師吏舊有禄及外路吏禄尚在數外又詔凡縣皆以免役剰錢用常平法給散收息添支吏人餐錢仍立為法五年權江西提刑提舉金君卿首遵詔書募受代官部錢帛綱趨京不差鄉戸衙前而費十減五六賜詔奬諭仍落權為真先時召募人押錢帛綱入京每一萬貫疋支陪綱錢五百貫足詢問曽押綱鄉户衙前之家皆不願行乃選得替官員使臣人員管押相度每紬絹萬疋正支錢一百緡足錢萬貫支錢七十緡足並不差鄉户衙前故有此詔王安石白上曰此事諸路皆可行但令監司加意許令指占好舟差壯力兵士及時遣則替罷官人人爭應募矣七年詔役錢每千别納頭子五錢凡修官舎作什器夫力輦載之𩔖皆許取以供費若尚不給用許以情輕贖銅錢足之先是凡公家之費有敷於民間者謂之圓融多寡之數或出臨時汚吏乗之以為姦習弊滋乆至是詔輒圓融者以違制論不以去官赦原詔聞定州民有拆賣屋木以納免役錢者令安撫轉運提舉司體量具實以聞王安石白上言百姓賣屋納役錢臣不能保其無此然論事有權須考問從前差役賣屋陪填與今賣屋納役孰多孰少即於役法利害灼然可見詔崇奉聖祖及祖宗陵寢神御寺院宫觀免納役錢諸旌表門閭有勅書及前代帝王子孫於法有蔭者所出役錢依官户法賜號處士非因技授者准此五月詔諸路公人如弓箭手法給田募人為之凡逃絶監牧之田籍於轉運司者不許射買請佃以其田給應募者而覈其所直凖一年僱役為錢幾何而歸其直於轉運司衢州西安縣用緡錢十二萬買田始足募一縣之役司農寺請行之諸路詔自今用寛剰錢買募役田須先參㑹餘錢可以枝梧災傷方許給買若田價翔貴之地則止之八月詔罷給田募役法已就募人如舊闕者勿補七月參知政事呂惠卿獻議曰免役出錢或未均出於簿法之不善按戸令手實者令人户具其丁口田宅之實也嘉祐勅造簿委令佐責户長三大户録人户丁口税産物力為五等且田野居民耆戸長豈能盡知其貧富之詳既不令自供手實則無隱匿之責安肯自陳又無賞典孰肯糾抉以此舊簿不可信用謂宜倣手實之意使人户自占家業如有刋匿即用隱寄産業賞告之法庶得其實於是遂行手實法其法官為定立田産中價使民各以田畝多少高下隨價自占仍并屋宅分有無蕃息以立之等凡居錢五當蕃息之錢一非用器田榖而輙隱落者許吿有實三分以一充賞將造簿預具式示民令依式為狀縣受而籍之以其價列定高下分為五等既該見一縣之民物産物數乃參㑹通縣役錢本額而定所當輸明書其數衆示兩月使悉知之從之察訪京南常平事蒲宗孟言近制民以手實上其家之物産而官為注籍以正百年無用不明之版圖而均齊其力役此天下之良法也然縣災傷五分以上則留竢豐歳以臣觀之使民自供手實無所擾也何待於豐穰哉願詔有司不以豐凶弛張其法從之十月詔聞東南推行手實簿法公私煩擾其權罷委司農寺再詳定以聞初吕惠卿創行手實法言者多論其長告訐增煩擾不便至是惠卿罷政御史中丞鄧綰言役法初行且用丁産户籍故諸路患其不均各已改造其均錢之法田頃可用者視田頃税數可用者視税數已得家業貫陌者視家業貫陌或隨所下種石或附所収租課法雖不同大約已定而民樂輸矣安用剔抉披索互相糾告使不安其生邪凡民所以養生之具日用而家有之今欲盡數供析出錢則本用供家不專於租賃營利欲指為供家之物則有時餘羡不免須貿易與人則家家有吿訐之憂人人有隱落之罪無所措手足矣夫行商坐賈通貨殖財四民之一也其有無交易不過服食器用粟米財畜絲麻布帛之𩔖或春有之而夏已析闕或秋居之而冬已散亡則公家簿書如何拘轄隱落之罪安得而不犯徒使嚚訟者趨賞報怨而公相吿訐畏怯者守死忍餓而不敢為生其為未善可知矣故降是詔司農寺乞廢戸長坊正其州縣坊郭擇相鄰戸三二十家排比成甲迭為甲頭督輸税賦苗役一税一替若催科外别令追呼者以違制論從之明年詔問罷耆戸長壯丁之法何人建議及以此議奏呈帝曰已令出錢免役又排甲使為保丁責之催科失信於民又保正本令習兵何可更供二役安石曰保丁戸長皆百姓為之今罷差户長使為保丁數年或十年方催一税其任役不過二十餘家於人情無所苦周官什伍其民有軍旅有田役若謂保丁止供教閲不知餘事屬何人也其後諸路皆言甲頭催税未便遂詔耆户長壯丁仍舊募充其保正甲頭承帖法並罷詔官户輸役錢免其半所免雖多各無過二十千兩縣以上有物産者通計之兩州兩縣有物産者隨所輸錢等第不及者并一多處以司農寺言户減免錢數及民户兩處有物業者出錢不一故也九年荆湖路察訪蒲宗孟言兩路元敷役錢太重以一歳較其入出而寛剰數多詔權減二年十月詔自今寛剰役錢及買撲坊塲錢更不以給役人歳具羡數上之司農餘物凡籍之常平者常留一半侍御史周尹言諸路募役錢元指揮於數外留寛剰錢一分聞諸州縣希提舉司風指廣敷民錢至減省役額尅損僱直而民間輸數一切如舊寛剰數已倍多而募直太輕倉法又重役人多不願就募天下皆謂朝廷設法聚斂不無疑怨乞遵免役本法募耆長户長及役人不可過減者悉復舊額但約募錢足用其寛剰止存留二分以上不得更有敷取三司使沈括亦言立法之意本欲與民均財惜力役重者不可不助無役者不可不使之助今重役不過衙前耆戸長散從官之𩔖衙前即坊塲河渡錢自可足用其餘取於坊郭官戸女戸單丁寺觀之𩔖足以賦禄出錢之户不多則州縣易於督斂重輕相補民力均詔司農寺相度以聞知彭州吕陶奏朝廷欲寛力役立法召募初無過斂民財之意有司奉行過當増添科出謂之寛剰自熙寧六年施行役法至今四年臣本州四縣已有寛剰錢四萬八千七百餘貫今歳又須科納一萬餘貫以成都一路計之無慮五六十萬推之天下見今納有六七百萬貫文寛剰在官嵗嵗如此泉幣絶乏貨法不通商旅農夫最受其弊臣恐朝廷不知免役錢外有此寛剰數目乞令諸路提舉倉司契勘見在寛剰錢數約度支得幾嵗不至缺乏沛發德音特與免數年或乞逐年限定數目不得過役錢十分之一所貴民不重困不報是嵗諸路上司農寺嵗収免役錢一千四十一萬四千五百五十三貫石匹兩金銀錢斛匹帛一千四十一萬四千三百五十二貫石匹兩絲綿二百一兩支金銀錢斛六百四十八萬七千六百八十八兩貫石匹應在銀錢斛匹帛二百六十九萬二千二十貫匹石兩見在八十七萬九千二百六十七貫石匹兩役錢之初立額兩浙之東多以田税錢數為則浙西多用物力至是詔令通物力税錢互紐為數從便輸納初許兩浙坊郭戸家産不及二百千鄉村户不及五十千毋輸役錢已而鄉户不及五十千者亦不免輸元豐七年天下免役緡錢嵗計一千八百七十二萬九千三百塲務錢五百五萬九十榖帛石匹九十七萬六千六百五十七役錢較熙寧所入多三之一帝之力主免役也知民間通苦差役而衙役之任重行逺者尤甚特創免法雖均敷僱直不能不取之民然民得一意田畝實解前日困敝故羣議雜起意不為變顧其間采王安石䇿不正用僱直為額而展敷二分以備吏禄水旱之用羣臣每以為言屢加疑詰而安石持之益堅此其為法既不究終防弊又有聚斂小人乗此増取帝雖數詔禁戒而不能盡止至是僱役不加多而嵗入比前増廣則安石不能將順德意其流弊已見矣八年哲宗已即位八月户部言役錢所留寛剰内有及三四分已上去處合行裁減令所留寛剰不得過二分餘並減其元不及二分處依舊從之又詔體量人户役錢輕重先從下等減放又詔舊以保正代耆長催税甲頭代户長承帖人代壯丁並罷如元充保正户長保丁願不妨本保應募者聽知吉州安福縣上官公頴奏臣竊怪耆壯户長法之始行也皆出於僱及其既久也耆壯之役則歸於保甲之正長戸長之役則歸於催税甲頭往日所募之錢係承帖司及刑法司人吏許用而其餘一切封樁若以為耆壯戸長誠可以廢罷即所用之錢自當百姓均減元額今則錢不為之減又使保正長為耆壯之事催税甲頭任戸長之責是何異使民出錢而免役而又使之執役也按以保正代耆長等役熙寧間已嘗行之繼而以人言不便罷之矣今觀此則是罷而復行也盖熙寧之徵免役錢也非專為供鄉戸募人充役之用而已官府之需用吏胥之廩給皆出於此及其久也則官吏可以破用而役人未嘗支給是假免役之名以取之而復他作名色以役之也為法之弊一至此哉侍御史劉摯言州縣上戸常少中下户常多自助役法行以來簿籍不改務欲敷配錢數故所在臨時肆意升補下戸入中中戸入上今天下往往中上户多而下户少富縣大鄉上户所納役錢嵗有至數百緡或千緡者每嵗輸納無已至貧竭而後有裁減之期舊來鄉縣差役循環相代上等大役至速亦十餘年而一及之若下役則動須三二年乃復一差雖有勞費比今日嵗被重斂之害孰為多少也文獻通考卷十二
