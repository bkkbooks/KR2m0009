body:
  text: 文獻通考卷十六鄱陽馬端臨貴與著征𣙜考三鹽鐵礬仁宗時詔天下茶鹽酒稅取一嵗中數為額後雖羡益勿增無得抑配人戶苛阻商旅天聖八年上書者言陜西禁鹽得利微而為害博兩池積鹽為阜其上生木合抱數莫可校請聽通商平估以售可寬百姓之力乃詔罷三京二十八軍州𣙜法聽商賈入錢若金銀京師𣙜貨務受鹽兩池自是商賈流行然稅課之入官者頗耗自元昊反聚兵西邊用度不足因詔入中他貨豫券償以池鹽由是羽毛筋角膠漆錢炭瓦木之屬一切以鹽易之猾商貪賈乘時賕吏為姦至入椽木二估千錢給鹽一大席為鹽二百二十斤虛費池鹽不可勝計鹽直益賤販者不行公私無利朝廷知其弊乃詔復京師𣙜法凡商人以虛估受券及已受鹽未鬻者皆計直輸虧官錢內地州軍民間鹽悉收市入官官為置場增價而出之復禁永興同華耀河中陜虢解晉絳慶成十一州軍商鹽官自輦運以衙前主之又禁商鹽私入蜀置折博務於永興鳳翔聽人入錢若蜀貨易鹽趨蜀中以售自禁𣙜之後量民資厚薄役令挽車轉致諸郡道路縻費役人竭産不能償往往亡匿關內騷然所得鹽利不足以佐縣官之急並邊誘人入中芻粟皆為虛估騰踴至數倍嵗費京師錢幣不可勝數帑藏愈虛太常博士范祥乃請舊禁鹽池一切通商鹽入蜀者亦恣不問罷並邊九州軍入中芻粟第令入實錢以鹽償之視入錢州軍逺近及所指東南西鹽第優其估東南鹽又聽入錢永興鳳翔河中嵗課入錢凡通商州軍在京西者為南鹽在陜西者為西鹽若築鹽池則為東鹽總為鹽三十七萬五千大席受以要券即池驗券按數而出盡弛兵民輦運之役詔從之數年滑商貪賈無所僥幸關內民安其業其後三司言京師商賈罕至則鹽直踴貴請得公私並貿而餘則禁止官鬻皆從之兩池嵗役畦户以解河中陜虢慶成民為之官司旁沿侵剝為苦乃詔三嵗一代嘗積逋鹽課至三百三十七萬餘席詔蠲其半中間以積鹽多特罷種鹽一嵗或二嵗三嵗以寬其力其後減畦戶半又稍傭夫代之五州之民得安田里無追逮侵剝之擾沈氏筆談曰陜西顆鹽舊法官自搬運置務拘賣兵部員外郎范祥始為鈔法令商人就邊郡入錢四貫八百售一鈔至解池請鹽二百斤任其私賣得錢以實塞下省數十郡搬運之勞異日輦車牛驢以鹽役死者嵗以萬計冒禁抵罪者不可勝數至是悉免行之既久鹽價時有低昻又於京師置都鹽院陜西轉運司自遣官主之京師食鹽斤不足三十五錢則斂而不發以長下價過四十則大發庫鹽以壓商利使鹽價有常而鈔法有定數行之數年至今以為利青白鹽出烏白池西羌擅以為利自繼遷叛乃禁毋入塞未幾罷慶厯中元昊納欵請嵗入十萬石售於縣官諫官孫甫等言輦運疲勞又並邊戶嘗言青鹽價賤而味甘故食解鹽者少雖刑不能禁今若許之則並邊蕃漢盡食羌人所販青鹽不能禁止解鹽利削陜西財用屈矣乃不許其請慶厯元年冬以淄濰青齊沂密徐淮陽八州軍仍嵗凶災乃詔弛禁聽人貿易官收其算而罷密登嵗課第令戶輸租錢其後鄆兖皆以壤地相接請罷食池鹽得通海鹽收算如淄濰等州許之自是諸州官不貯鹽而嵗應授百姓蠶鹽皆罷給然百姓輸蠶鹽錢如故至和中始詔百姓輸錢以十分為率聽減三分云河北滄濵二州鹽自開寶以來聽人貿易官收其算嵗為額錢十五萬緡上封者請禁𣙜以收其利余靖為諫官言前嵗軍興以來河北揀點義勇及諸色科率數年未得休息臣嘗痛燕薊之地陷沒且百年而民無南顧之思者戎狄之法大率簡易鹽麴俱賤科役不煩故也昔太祖皇帝特推恩以惠河朔故許通鹽商止令收稅若一旦𣙜絶價必騰踴民茍懷怨悔將何及伏緣河朔土多鹽鹵小民稅地不生五榖惟刮鹻煎之以納二稅今若禁止便須逃亡鹽價若髙犯者必衆近民怨望非國之福其議遂寢後王拱辰為三司使復建議𣙜二州鹽下其議魚周詢等以為不可請重算商人可得緡錢七十餘萬上曰使人頓食貴鹽非朕之意於是三司更立𣙜法而未下張方平見上問曰河北再𣙜鹽何也上曰始議立法非再𣙜也方平曰周世宗𣙜河北鹽犯輒處死世宗北伐父老遮道泣訴願以鹽課均之兩稅錢而弛其禁今兩稅鹽錢是也豈非再𣙜乎且今未𣙜也而契丹常盜販不已若𣙜之則鹽貴敵鹽益售是為我斂怨而使敵獲福也敵鹽滋多非用兵不能禁邊隙一開所得鹽利能補用兵之費乎上大悟立以手詔罷之河朔父老相率拜迎於澶州為佛會七日以報且刻詔書北京後父老過其下輒流涕按授人以鹽而徴其錢謂之蠶鹽行之京東諸路免鹽之𣙜而均諸稅謂之兩稅鹽錢行之河北皆五代法也及其弊也鹽不給而徴錢如故稅已納而禁𣙜再行蓋誤以二者為經常之賦而不知其源出於鹽也河北之𣙜方平言之仁皇聽之惠及一道矣獨蠶鹽錢之輸未有能如方平者力言之至和中僅免其十之三惜哉東南鹽利視天下為最厚鹽之入官淮南福建斤為錢四兩浙杭秀為錢六溫台明亦為錢四廣南為錢五其出視去鹽道里逺近而上下其估利有至十倍者先是天禧初募人入緡錢粟帛京師及淮浙江南荆湖州軍易鹽乾興元年入錢貨京師總為緡錢一百十四萬會通泰鬻鹽歲損所在貯積無幾因罷入粟帛第令入錢久之積鹽復多明道二年參知政事王隨建言淮南鹽初甚善自通泰楚運至真州自真州運至江浙荆湖綱吏舟卒侵盜販鬻從而雜以砂土涉道愈逺雜惡殆不可食吏卒坐鞭笞配徙相繼而莫能止比歲運河淺涸漕挽不行遠州村民頓乏鹽食而淮南所積一千五百萬石至無屋以貯則露積苫覆嵗以損耗又亭戶輸鹽應得本錢或無以給故亭户貧困往往起為盜賊其害如此願得權聽通商三五年使商人入錢京師又置折博務於揚州使輸錢及粟帛計直豫鹽鹽一石約售錢二千則一千五百萬石可得緡錢三千萬以資國用一利也江湖遠近皆食白鹽二利也嵗罷漕運糜費風水覆溺舟人不陷刑辟三利也昔時漕鹽舟可移以漕米四利也商人入錢可取以償亭户五利也贍國濟民無出於此時范仲淹安撫江淮亦以疏通鹽利為言即詔翰林侍讀宋綬樞密直學士張若谷知制誥丁度與三司使江淮制置使同議可否皆以為聽通商則恐私販肆行侵蠧縣官請敕制置司益漕船運至諸路使皆有二三年之鹽天禧元年制聽商人入錢粟京師及淮浙江南荆湖州軍易鹽在通泰楚海真揚漣水髙郵貿易者毋得出城餘州聽縣鎮毋至鄉村其入錢京師者增鹽豫之并敇轉運司經畫本錢以償亭户詔皆施行景祐二年三司言諸路博易無利遂罷而入錢京師如故康定元年詔商人入芻粟陜西並邊願受東南鹽者加數豫之而河北復出三稅法亦以鹽代京師所給緡錢然東西鹽利特厚商旅不願受金帛皆願得鹽江湖漕鹽既雜惡又官估髙故百姓利食私鹽而並海民以魚鹽為業用工省而得利厚無賴之徒盜販者衆捕之急則起為盜賊江淮間雖衣冠士人狃於厚利或以販鹽為事江西則虔州地連廣南而建之汀州與虔接虔鹽既不善汀故不産鹽多盜販廣南鹽以射利每嵗秋冬田事既畢往往數十百為羣持甲兵旗鼓往來虔汀漳潮循梅惠廣八州之地所至汚人婦女掠人榖帛與巡捕吏鬬格至殺傷吏卒則起為盜依阻險要捕不能得或赦其罪招之嵗月浸淫滋多而虔州官糶鹽嵗才及百萬斤朝廷以為患職方員外郎黃炳請增近嵗所增官估斤為錢四十以虔州十縣五等户夏秋稅率百錢令糴鹽二斤隨夏稅錢入償官從之然嵗才增糶六十餘萬斤江西提點刑獄蔡挺乃令民首納私藏帶兵械以給巡捕吏兵而令販黃魚籠挾鹽不及二十斤徒不及五人不以兵甲自隨者止輸算勿捕淮南既團新綱漕鹽挺增為十二綱綱二十五艘鎖栿至州乃發輸官有餘則以畀漕舟吏卒官復以半賈取之繇是減侵盜之敝鹽遂差善又損糶價嵗課視舊增至三百萬餘斤乃罷炳等所率糴鹽錢嘉祐間兩浙轉運使沈立李肅之奏本路鹽課緡錢嵗七十九萬嘉祐三年才及五十三萬而一嵗之內私販坐罪者三千九十九人其弊在於官鹽估髙私販不止而官課益虧請𣙜官估罷鹽綱令鋪戶衙前自趨山場取鹽如此則鹽善而估平人不肯冒禁私售官課必溢詔從之皇祐以來屢下詔書命亭户給官本皆以實錢其售額外鹽者給粟帛必良逋嵗課久者悉蠲之所以存恤之甚厚而有司罕能承上意焉蜀煮井為鹽者井源或發或微而責課如故任事者多務增課以為功貽患後人朝廷切於除民害尤以逺人為意有司上言輒為蠲減前後不可悉數鬻鹻為鹽大抵鹻土或厚或薄薄則利微鐺户破産不能足其課至和初韓琦請户滿三嵗地力盡得自言摘他户代之明年又詔鐺户輸嵗以分數為率蠲復有差復遇水災又聽得他户代役百姓便之礬初亦官置務煮之天聖已後聽民自煮官置場售之私售礬禁如私售茶法兩蜀舊亦𣙜礬天聖間詔弛其禁初晉慈礬募人入金帛茶絲易之其後河東轉運使薛顔請一切入緡錢以助邊糴久之礬積益多復聽入金帛芻粟芻粟虛估髙商人利於入中麟州斗粟直錢百萬估增至三百六十礬之出官為錢二萬一千五百才易粟六石以麟州粟實直較之為錢六千而礬一馱已費本錢六千縣官徒有𣙜礬之名其實無利嘉祐六年乃罷入芻粟復令入緡錢礬以四百斤為一馱入錢京師𣙜貨務者為錢十萬七千入錢麟府州者又減三十自是商賈不得專其利矣神宗熙寧七年中書議陜西鹽鈔大出多虛鈔而鹽益輕以鈔折兌糧草有虛擡邊糴之患請用西蜀交子法使其數與錢相當可濟緩急詔以內藏錢二百萬緡假三司遣市易吏行四路請買鹽引又令秦鳯永興鹽鈔嵗以百八十萬為額八年中書又言買鈔本錢有限而出鈔過多則鈔賤而糴貴故出鈔不可無限然入中商人或欲變易見錢而官不為買即為兼并所抑則鈔價賤而邊境有急鈔未免多出故當置鈔以市價平之今當定買兩路實賣鹽二百二十萬緡以當用鈔數立額永興軍遣官買鈔嵗支轉運司錢十萬緡買西鹽鈔又用市易務賖請法募人賖鈔變易即民間鈔多而滯則送解池毁之詔從其請然有司給鈔溢額猶視其故舊制河南北曹濮以西秦鳯以東皆食解鹽自仁宗時解鹽通商官不復𣙜熙寧中市易司始𣙜開封曹濮等州八年大理寺丞張景溫提舉出賣解鹽於是開封府界陽武酸棗封邱考城東明白馬中牟陳留長垣胙城韋城曹濮澶懷濟單解州河中府等州縣皆官自賣未幾復用商人議以唐鄧襄均房商蔡郢隨金晉絳虢陳許汝潁隰州西京信陽軍通商畿縣及澶曹濮懷衛濟單解同華陜河中府南京河陽令提舉解鹽司運鹽賣之自禁𣙜之後鹽價既增民不肯買乃課民買官鹽隨其貧富作業為多少之差重賞搆捕私鹽民間騷怨鹽鈔舊法每席六緡至是二緡有餘商不入粟邊儲失備乃議所以更之皮公弼沈括等言官賣當罷於是河陽同華解州河中陕府陳留雍邱襄邑中牟管城尉氏鄢陵扶溝太康咸平新鄭聽通商其入不及官賣者官復自賣澶濮濟單曹懷州南京陽武酸棗封邱考城東明白馬長垣胙城韋城九縣官賣如故又詔商鹽入京悉賣之市易務每席無減千民鹽皆買之市易務私與商人為市許告沒其鹽又詔京師置七場買東南鈔市易務計為錢五十九萬三千餘緡三司闕錢請頗還其鈔令賣之於西買者其三給錢其七凖緣邊價給新引庶得民間舊鈔而新引易於變易詔用其議哲宗元祐元年戶部及陜西制置解鹽司議延慶渭原環鎮戎保安德順等八州軍皆禁𣙜官自鬻以萬五千五百席為額聽商旅入納於八州軍折博務算給交引一如范祥舊法其出賣到鹽錢以給轉運司糴買從之徽宗崇寧元年解州賈考南北圑池修治畦眼拍磨布種通得鹽百七十八萬二千七百餘斤州具以聞初解梁之東有大鹽澤綿亘百餘里嵗得億萬計自元符元年霖潦池壞至是乃議修復四年池成凡開二千四百餘畦百官皆賀其役內侍王仲千實董之仲千以額課敷溢為功然議者或謂解池灌水盈尺暴以烈日鼓以南風須臾成鹽其利則博茍欲溢額不俟風日之便厚灌以水積水而成味苦不適口沈氏筆談曰解州鹽澤方百二十里久雨四山之水悉注其中未嘗溢大旱未嘗涸滷色正赤在版泉之下俚俗謂之蚩尤血惟中間有一泉乃是甘泉得此水然後可以聚人其北有堯梢水一謂之巫咸河大滷之水不得甘泉和之不能成鹽唯巫咸水入則鹽不復結故人謂之無鹹河為鹽澤之患築大隄以防之甚於偹寇盜原其理蓋巫咸乃濁水入滷中則淤澱滷脈鹽遂不成非有他異也又曰鹽之品至多前史所載夷狄間自有十餘種中國所出亦不減數十種今公私通行者四種末鹽顆鹽井鹽崖鹽是也唯陜西路顆鹽有定課嵗為錢二百三十萬緡自餘盈虛不常大約嵗入二千餘萬緡唯末鹽嵗自抄三百萬緡供河北邊糴其他皆給本處給費而已緣邊糴買仰給於度支者河北則海末鹽河東陜西則顆鹽及蜀茶為多運鹽之法凡行百里陸運斤四錢船運斤一錢以此為率祖宗以來行鹽鈔以實西邊其法積鹽於解池積錢於在京𣙜貨務積鈔於陜西沿邊諸郡商賈以物解至邊入中請鈔以歸物斛至邊有數倍之息惟患無回貨故極利於得鈔徑請鹽於解池舊制通行解鹽池甚寬或請錢於京師每鈔六千二百登時給與但輸頭子等錢數十而已以此所由州縣貿易熾盛至為良法崇寧間蔡京始變鹽法俾商人先輸錢請鈔赴産鹽郡授鹽欲囊括四方之錢盡入中都以進羡要寵鈔法遂廢商賈不通邊儲失備東南鹽禁加密犯法被罪者衆民間食鹽雜以灰土解池天産美利乃與糞壤俱積矣大概常使見行之法售給不通輒復變易名對帶法季年又變對帶為循環循環者已積賣鈔未授鹽復更鈔已更鈔鹽未給復貼輸錢凡三輸始獲一直之貨民無資更鈔已輸錢悉乾沒數十萬券一夕廢棄朝為豪商夕儕流丐有赴水投繯而死者時有魏伯芻者本三省大胥也蔡京委信之専主𣙜貨務政和六年鹽課通及四千萬緡官吏皆進秩七年又以課羡第賞其後伯芻年除嵗遷官通議大夫徽猷閣待制既而黨附王黼京惡而黜之伯芻非有心計但與交引户關通凡商旅算請率尅留十分之四以充入納之數務入納數多以昧人主而張虛最初政和再更鹽法伯芻方為蔡京所倚信建言朝廷所以開闔利柄馳走商賈不煩號令億萬之錢輻輳而並至御府須索百司支費嵗用之外沛然有餘則𣙜鹽之入可謂厚矣頃年鹽法未有一定之制隨時變革以便公私防間未定姦弊百出自政和立法之後頓絶弊源公私兼利異時一日所收不過二萬緡則已詫其太多今日之納乃常及四五萬貫以嵗計之有一郡而客鈔錢及五十餘萬貫者處州是也有一州倉而客人請鹽及四十萬袋者泰州是也新法於今才二年而所收已及四千萬貫雖傳記所載貫朽錢流者實未足為今日道也伏乞以通收四千萬貫之數宣付史館以示富國裕民之政小人得時騁志無所顧憚遂至於此於時御府用度日廣課入欲豐申嵗較季比之令在職而暫取告其月日皆毋得計折害法者不以官蔭並處極坐微至於鹽袋鮝鹽莫不有禁州縣惟務嵗增課以避罪法上下程督加厲七年乃降御筆昨改鹽法立賞至重抑配者衆計口敷及嬰孩廣數下逮駝畜使良民受弊比屋愁歎悉從初令以利百姓三省其申嚴近制改奉新鈔蓋帝意未嘗不欲審法定令寬濟斯民有司不能將明帝恩故比較已罷而復用鈔劄既免而復行鹽囊增饒而復止一囊之價裁為十一千既又復為三十三千矣民力因以擾匱盜賊滋焉南鹽熙寧五年盧秉提點兩浙刑獄仍專提舉鹽事令鹽場約得鹽之多寡而定其分數自六分至十分三竈為一甲而煮鹽地什伍其民以相譏察及募酒坊户願占課額取鹽於官賣之月以錢輸官毋得越所酤地又嚴捕盜販刑禁苛酷蹇周輔措置福建鹽以建劒汀邵武官賣鹽價苦髙漳泉福興化煮鹽價賤故多盜販賣於貴處請減建劒汀邵武鹽價募上户為鋪戶官給券定月所賣從官場買之如是則民易得鹽盜販不能規厚利周輔又措置江西鹽法言汀州運路險遠淮鹽至者不能多請罷運淮鹽通搬廣鹽一千萬斤於江西虔州南安軍復均淮鹽六百一十六萬斤於洪吉筠袁撫臨江建昌興國軍以補舊額大率峻剝民被其害哲宗即位御史言周輔議江西鹽法掊刻誕謾乃削職貶官河北鹽舊不𣙜熙寧八年三司使章惇言河北陜西並為邊防今陜西𣙜鹽而河北獨不𣙜此祖宗一時誤恩請遣使詣海陽及煮小鹽州縣小鹽偽鹽也與兩路轉運司度利害施行而文彥博論其不便詔如舊元豐三年京東轉運李察言南京濟濮曹澶行解鹽餘十有二州行海鹽請用今稅法置買鹽場盡竈戶所煮鹽官自賣之禁私為市嵗收錢二十七萬三千餘緡而息幾半之乃詔以京東法𣙜之河北自大名府澶恩信安雄霸瀛莫冀等州盡𣙜賣以增其利哲宗即位監察御史王巖叟言其不便遂罷河北𣙜法紹聖中復之河東鹽熙寧八年三司使章惇言東西永利兩監鹽嵗課舊額二十五萬餘緡自許商人入中糧草增饒給錢支鹽商人得鈔千錢售價半之縣官陰有所亡坐賈獲利不資又私鹽不禁嵗課日減今才十萬四千餘緡若計糧草虛估官才得實錢五萬餘緡視舊虧十之八請如解鹽例募商人入錢請買或官自鬻重私販之禁嵗課且大增並邊市糧草一用見錢乃詔官自運鹽鬻於本路知太原府韓絳言其不便請通商乃令商人輸錢於邊給券於東西監請鹽以除加饒折糴之弊仍令商人自占所賣地即官鹽已運至場務者令商人買之加運費蜀鹽熙寧中患井鹽不可禁欲盡實私井而運解鹽以足之修起居注沈括以為不可遂寢九年劉佐入蜀經度茶事乃嵗運解鹽十萬席未幾罷之崇寧二年川峽利洋興劒蓬閬巴綿漢興元府等州並通行東北鹽四年梓遂夔綿漢大寧監等鹽仍舊鬻於蜀惟禁侵解池鹽蠶鹽熙寧五年京西漕臣陳知儉言蠶鹽畸零非民所願乃罷之第令輸錢七年復詔開封府界蠶鹽折以糧者三等戶以下許代以錢願輸本色者聽元祐初有司言罷所俵蠶鹽而令虛納鹽錢於義未安乃詔舊經蠶鹽處仍舊散斂有司復奏府界京西京東等路用蠶鹽三萬二千五十席預出鹽引募人算請於解鹽司以給用六年徐州淮陽軍仍舊散斂京東及晉絳隰磁州皆罷元符三年重定散蠶鹽給納之限開封府界京東西河北澶州皆罷初東南嵗支蠶鹽即不欲鹽計其數輸價錢六分如京東西之制政和三年慮州縣抑民詔罷兩浙淮南支俵其江湖四路下鹽事常平司共相度聞奏後遂詔淮浙支俵蠶鹽去處依市賣客鹽價例支給價錢俵散依舊來數輸納物帛其丁口鹽錢亦依上件指揮散納中興後亦不復散鹽而差損民間所納之直東萊吕氏曰洪範初一曰五行一曰水水曰潤下潤下作鹹此鹽之根原五行之氣無所不在水周流於天地間潤下之性無所不在其味作鹹凝而為鹽亦無所不在種類品目甚多世所共知者有三如出於海出於井出於池三者鹽之尤多世共知之如青州出於東井幽薊東海嶺南南海皆出於海劒南西川出於井如河東鹽出於池如解池鹽之尤著者大略三種三種之外所出亦多如河北有鹵地此出於地者如永康軍鹽出於崖此出於山者又有出於石出於木品類不一大抵鹽生民之日用不可一日缺者所以天地之間無處不有自禹貢青州貢鹽絺此海鹽之見於經三代之時鹽雖入貢與民共之未嘗有禁法自管仲相桓公當時始興鹽策以奪民利自此後鹽禁方開雖漢興除山澤之禁到武帝時孔僅桑宏羊祖管仲之法鹽始禁𣙜至昭帝之世召賢良文學論民疾苦請罷鹽鐡又桑宏羊反覆論難所以鹽𣙜不能廢元帝雖暫罷之卒以用度不足復建自此之後雖鹽法有寬有急然禁𣙜與古今相為終始以此知天下利源不可開一開不可復塞於是論其作俑出於管仲計近功淺效奪民利以開鹽禁自此天下之鹽皆入禁𣙜論禁𣙜之利惟是海鹽與解池之鹽最資國用南方之鹽皆出於海北方之鹽皆出於池如蜀中井鹽自贍一方之用於大農之國計不與焉前代鹽法興衰皆不出於所論今且論本朝鹽本末本朝就海論之惟是淮鹽最資國用方其國初鈔鹽未行是時建安軍置鹽倉乃令真州發運在真州是時李沆為發運使運米轉入其倉空船回皆載鹽散於江浙湖廣諸路各得鹽資船運而民力寬此南方之鹽其利廣而鹽𣙜最資國用至道二年十一月西京作坊使楊允恭言淮南十八州軍其九禁鹽餘不禁商人由海上販鹽官倍數而取之至禁鹽地則上下其價民利商鹽之賤故販者益衆至有持兵器往來為盜者且行法宜一今請悉禁官遣吏主之詔知制誥張秉與鹽鐵使陳恕等會議恕言其不可允恭再三為請乃從之是嵗收利巨萬解池之鹽朝廷專置使以領之北方之鹽盡出於解池大中祥符九年陜西轉運副使張象中言安邑解縣貯鹽三千二百七十六卷計三億八千八百八十萬八千九百二十八斤計直二千一百七十六萬一千八十貫切慮遺利望行條目帝曰地財之阜此亦至矣若過求增羡慮有時而闕不可許也當時南方之鹽全在海北方全在解池然而南方之鹽管得其人則其害少惟北方解池之鹽有契丹西夏之鹽嘗相參雜奪解池之利所以本朝議論最詳大抵解池之鹽味不及西夏西夏優而解池劣價直西北之鹽又賤所以沿邊多盜販二國鹽以奪解池所以國家常措置關防西夏常護視入中國界大抵南方所出是海鹽自漢以來海鹽井鹽用煎熬之制皆烹煉然後成兩處之鹽必資人力如解池之鹽大抵耕種疏為畦壠決水灌其間必俟南風起此鹽遂熟風一夜起水一夜結成鹽所以北方皆坐食鹽如南風不起則課利遂失夫海鹽井鹽全資於人解池之鹽全資於天而人不與至徽宗時如兩浙之鹽多有變更自蔡京秉政費轉搬倉之法使商賈入納於官自此為鈔鹽法請鈔於京師商賈運於四方有長引短引限以時日各視所適之地逺近以為差蔡京專利罔民所以鹽法數十日一變鹽法既變則鈔鹽亦不可用商賈既納錢之後鈔皆不用所以商賈折閲甚多此海鹽之一變也解鹽之變緣徽廟初雨水不常圍塹不密守者護視不固為外水參雜雨水不常外水瀰滿流入解池不復成鹽此所以數年大失課利後大興徭役盡車出外水漸可再復此是解鹽之一變也若論禁𣙜之利天下之鹽固皆禁𣙜惟是河北之鹽自安史亂河北一路緣藩鎮據有河北鹽後本朝因而以鹽定稅所以河北一路鹽無禁𣙜唐志自兵興河北鹽羈縻而已至皇甫鎛奏置𣙜鹽使如江淮𣙜法犯禁者嵗多及田宏正舉魏博歸朝廷穆宗命河北罷𣙜鹽國朝會要開寶三年四月詔河北諸州鹽法並許通行量收稅錢每斤過稅一文住賣二文隱而不稅悉沒官以其半給捕人定賞仁宗時議者要禁𣙜仁宗不肯神宗時荆公章惇亦欲禁𣙜神宗亦不許自後章惇為相方始行禁𣙜犯刑禁者甚多盜賊滋起河北所以不可禁𣙜兼河北之鹽又與其他不同如井鹽官司只才一井故井鹽可𣙜如解池之鹽毫釐封守亦可禁𣙜海鹽亦待煎起爐非一旦所成官司及時禁察亦可禁𣙜惟河北鹽是鹵地其地甚廣非如井池可以為墻園籬塹封守又却才煎便成非如海鹽必待煎煮可以禁察所以最易得犯禁自章惇禁𣙜河北一到靖康之末盜賊愈多河北風俗慓悍鹽又易成小人圖利所以不體朝廷之法遂輕來相犯鹽大略如此然推大綱論之鹽固是三代以前與民共之若就後世不得已彼善於此論之取諸山澤不猶勝取之於民蓋所謂興販煎鹽皆非地著之人因而取之必寬民力本之民力然而取之欲寬不盡其利則鹽可以公行若迫而取之必有官刑此見小者必至於失大而鹽法之弊所以不可施行也與自熙寧初始變礬法嵗課所入元年為錢三萬六千四百緡有畸並增者五嵗乃取熙寧六年中數定以一十八萬三千一百緡有畸為新額至元豐六年課增至三十二萬七千九百緡而無為軍礬聽民自鬻官置場售之嵗課一百五十萬斤用本錢萬八千緡自治平至元祐數無增損初熙寧間東南九路官自賣礬發運司總領焉元祐初通商紹聖復熙寧之制大觀元年定河北河東礬額各二十四萬緡淮南九萬緡復罷官賣聽客販政和初以虧損額數於是復官賣罷客販如舊制髙宗建炎初淮浙亭戶官給本錢諸州置倉令商人買鈔算請五十斤為一石六石為一袋輸鈔錢十八千又詔運司勿得將鹽本錢支給他用紹興元年詔臨安府秀州亭户合給二稅依皇祐專法計納鹽貨以亭戶皆煎鹽為生未嘗墾田故也二年詔淮浙鹽每商人每袋貼納通貨錢三千已算請而未售者亦如之十日不自陳如私鹽律十一月詔淮浙鹽場所出鹽以十分為率四分支今降指揮以後文鈔二分支今年九月以後文鈔四分支建炎渡江以後文鈔先是吕頤浩以對帶法不可用令商人貼納錢至是復以分數如對帶法於是始加嚴察矣三月詔鹽場官煎賣鹽比租額增者推賞四年詔淮浙鹽每袋增貼納錢三貫文並計綱赴行在尋命廣鹽亦如之九月以入納遲細減所添錢然自建炎三年改鈔法紹興三年九月又改十一月又改今年正月又改及今所改凡五變而建炎舊鈔支發未絶乃命以資次前後從上并支焉六年趙鼎奏久不變法建康日納鹽錢甚盛上曰法既可信自然悠久孝宗乾道六年户部侍郎葉衡奏今日財賦之源煮海之利居其半然年來課入不增商賈不行者皆私販之害也且以淮東二浙鹽貨出入之數言之論鹽額則淮東之數多於兩浙五之一以去嵗賣鹽所得錢數論之淮東多於二浙三之二及以竈之多寡論之兩浙反多淮東之三蓋二浙無非私販故也乞委官分路措置十三年臣僚言總轄權制亭竈刻剝本錢却縱亭戶私煎盜賣詔淮浙場見差總轄並罷朝野雜記曰淮浙鹽額最多者泰州嵗産鹽一百六十一萬石嘉興八十一萬石通州七十八萬石慶元三十九萬石淮浙鹽一場十竈每竈晝夜煎鹽六盤一盤三百斤遇雨則停淳熙末議者謂總轄甲頭權制亭竈兜請本錢恣行刻剝懼其赴訴縱令私煎且如一日雨乃妄作三日申若一季之間十日雨則一場私鹽三十六萬斤矣而又有所謂鑊子鹽亭戶小火一竈之下無慮二十家家皆有鑊一家通夜必煎兩鑊得鹽六十斤十竈二百家以一季計之則鑊子鹽又百餘萬斤矣一場之數已如此諸路可知十三年九月己未遂罷總轄令亭户自請本錢焉寧宗慶元元年二月詔循環鹽鈔住罷將增剩鈔名改作五支文鈔給算與日前已投在倉通理資次支散以淮東提舉陳損之言循環增剩兩等文鈔據客人稱循環鈔多有弊蓋自宣和間客人先買一鈔却更重買一鈔其先鈔號為舊鈔而重買謂之新鈔舊鈔可以攙支重買復為舊鈔如此循環實商賈之利也乞截日住罷只用一色增剩鈔支請於是富商巨賈有頓為貧民者矣嘉泰四年十二月詔支客鹽並以舊鈔七分新鈔三分以舊鈔理資次開禧以後節次有繳納舊鈔換新鈔指揮不一唐乾元初第五琦為鹽鐵使變鹽法劉晏代之當時舉天下鹽利才四十萬緡至大歷末增至六百萬緡天下之賦鹽利居半宋朝元祐間淮鹽與解池等嵗四百萬緡比唐舉天下之賦已三分之二紹興末年以來泰州海寧一監支鹽三十餘萬席為錢六七百萬緡則是一州之數過唐舉天下之數矣右中興四朝食貨志言紹興間一州鹽利過唐時舉天下之數其説固然矣然考之唐史則至德間鹽每斗十錢而已至第五琦變鹽法而十倍其𣙜然不過每斗為錢一百一十而建炎初商人賈鈔計鹽六石為一袋至輸錢十八千繼而每袋又增貼納錢三千則其時鹽價比之第五琦所𣙜已是三倍有餘而至德之價則又懸絶矣蓋鹽直比唐則愈貴緡錢比唐則愈輕所以其數之多如此要亦未可全歸之征利之苛也閩廣之鹽自祖宗以來漕司官般官賣以給司存建炎間淮浙之商不通而閩廣之鈔法行未幾淮浙之商既通而閩廣之鈔法遂罷然舊法閩之上四州曰建劒汀邵行官賣鹽法閩之下四州曰福泉漳化行産鹽法隨稅納鹽也官賣之法既弊産鹽之法亦弊鈔法一行弊若可革而民俗又有不便故當時轉運提舉司申乞上四州依上項指揮下四州且令從舊及鈔法既罷嵗令漕司認鈔錢二十萬緡納行在所𣙜茶務自後或減或增卒為二十二萬緡紹興三年詔𣙜免五萬貫五年依舊認二十萬十二年詔添十萬計三十萬二十七年特減八萬為二十二萬上四州用鈔法以私販多鈔額隨即停鈔法仍係官賣下四州隨産納鹽而州縣苛取每産一文以上至二十文皆納鹽五斤而胥吏交納錢數又倍之嘉定間臣僚奏乞行下將産二十文以下合納鹽五斤者並行蠲免從之二廣之鹽皆屬於漕司量諸州嵗用而給之鹽然廣東之俗富猶可通商廣西之地廣漠而雕瘁食鹽有限商賈難行况自東廣而出乘大水而無灘磧其勢甚易自西廣而出水小多灘磧其勢甚難是廣西之鹽不得與廣東比倫也建炎末鬻鈔未幾復止然官搬客鈔亦屢有更革東西兩漕屢有分合紹興八年詔廣西鹽嵗以十分為率二分令欽廉雷化州官賣餘八分行鈔法又詔廣東鹽九分鈔法一分産鹽州縣出賣廣南土曠民貧賦入不給故漕司鬻鹽以其息什四為州用可以粗給而民無加賦若客鈔既行州縣必致缺乏孝宗乾道四年罷鹽鈔令廣西漕司自認鈔錢二十萬其後再行鈔法而州縣間率以鈔抑售於民其害甚於官般乃詔官賣如故蜀鹽有隆州之仙井邛州之蒲江榮州之公井大寧富順之井監西和州之鹽官長寧州之淯井皆大井也若隆榮等十七州則皆卓筒小井而已自祖宗以來皆民間自煮之成都潼川利路自元豐間嵗輸課利錢銀絹總為八十萬緡比軍興所輸已增數倍矣然井有耗淡而鹽不成者官司慮減課額不肯相驗封閉髙宗建炎二年十一月德音令逐路漕臣躬親按視紹興二年九月四川總領趙開初變鹽法倣大觀法置合同場收引稅錢大扺與茶法相類而嚴密過之每斤輸引錢二十有五土産稅及增添約九錢四分所過稅錢七分住稅一錢有半每引别輸提勘錢六十其後又增貼納等錢凡四川四千九百餘井嵗産鹽約六千餘萬斤引法初行每百斤為一擔又增十斤勿算以優之其後遞增至四百餘萬緡二十九年十二月詔減西和州賣鹽直之半先是州之鹽官井嵗産鹽七十餘萬斤半為官吏柴苑之費半鬻於西和成鳳州嵗得錢七萬緡為西和州鑄錢本鹽多地狹每斤為直四百民甚苦之故有是命初趙開之立𣙜法也令商人入錢請引井戶但如額煮鹽赴官輸土産稅而已其後鹹脈有盈縮月額有登耗官以虛鈔赴之而收其算引法由是大壞井戶既為商人所要因增其斤重與之每擔有增及百六十斤者又逃廢絶沒之井許人增額承認小民利於得井每界遞增鹽課加多而不可售公私皆病紹熙間楊輔為總計遣官核去虛額棧閉廢井申嚴合同場法文獻通考卷十六
