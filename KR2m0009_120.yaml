body:
  text: 文獻通考卷一百二十鄱陽馬端臨貴與著王禮考十五國恤虞舜攝政二十有八載帝乃殂落帝堯殂落崩也堯夀一百一十七嵗百姓如喪考妣百姓百官三載四海遏密八音遏絶密靜也四海四夷四夷絶音三年則華夏可知言盛德所化者逺也九賈公彥儀禮疏曰易繫辭云古者期喪無數在黃帝事章中是黃帝以前心喪終身不變也虞書云百姓如喪考妣三載四海遏密八音則是唐虞之日心喪三年亦未有服制也殷太甲惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冢宰此湯崩踰月太甲即位奠殯而告王疏曰太甲中篇云三祀十有二月伊尹以冕服奉嗣則是除喪即吉眀十二月服終禮記稱三年之喪二十五月而畢知此年十一月湯崩湯崩踰月太甲即位奠殯而告亦如周康王受顧命尸於天子春秋之世凡有奠殯即位踰年即位踰月即位當奠殯即位也此言伊尹祠于先王是特設祀也嗣王祗見厥祖是始見祖也特設祀禮而王始見祖眀是初即王位告殯為喪主也髙宗王宅憂亮隂三祀隂默也居憂信默三年不言禮記作諒暗鄭元以為凶廬論語作諒隂孔氏曰諒信也隂默也字義各不同尚書大傳書曰髙宗梁暗三年不言何謂梁暗也傳曰髙宗居凶廬三年不言此之謂梁暗子張曰何謂也孔子曰古者君薨王世子聽於冢宰三年不敢服先王之服履先王之位而聽焉以民臣之義則不可一日無君矣不可一日無君猶不可一日無天也以孝子之隱乎則孝子三年弗居矣隱痛也字或為殷故曰義者彼也隱者此也逺彼而近此則孝子之道􅍯矣喪服四制書曰髙宗諒暗三年不言善之也王者莫不行此禮何以獨善之也曰髙宗者武丁武丁者殷之賢王也繼世即位而慈良於喪當此之時殷衰而復興禮廢而復起故善之善之故載之書中而髙之故謂之髙宗周武王崩成王十三而嗣立周公居冢宰攝政眀年六月既葬周公冠成王而朝于祖以見諸侯祝雍作頌閔豫小子嗣王朝于廟也閔豫小子遭家不造嬛嬛在疚謂遭武王崩家道未成嬛嬛然孤特在憂患之中於乎皇考永世克孝念兹皇祖陟降庭止庭直也陟降上下也言武王長世能以孝行為子孫法文王以直道事天治民維豫小子夙夜敬止於乎皇王繼序思不忘序緒也繼其序思其所行之道不忘成王將崩命召公畢公率諸侯相康王作顧命惟四月哉生魄王不懌始生魄十六日王有疾故不悅懌甲子王乃洮頮水相被冕服慿玉几王發大命臨羣臣必齊戒沐浴今疾病危殆故但洮盥頮面扶相者被衮冕慿玉几以發命乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事同召六鄉下至御治事者太保芮伯彤伯畢公衛侯毛公六卿也冢宰第一召公領之司徒第二芮伯為之宗伯第三彤伯為之司馬第四畢公領之太保畢毛三公兼也芮彤畢衛毛皆國名入為天子公卿師氏大夫官虎臣虎賁氏百尹百官之長及諸御治事者平時則召六卿使帥其屬此則將發顧命自六卿至御事同以王召命也王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝此下成王顧命也自嘆其疾大進惟危殆病日至既彌甚而留連恐遂死不得誓言以嗣續我志此我所以詳審發訓命汝統言日疾甚言日病昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命武猶文謂之重光猶舜如堯謂之重華也奠定麗依也言文武宣布重明之德定民所依陳列教條則民習服習而不違天下化之用能逹於殷邦而集大命於周也在後之侗敬迓天威嗣守文武大訓無敢昏逾侗愚也成王自稱言其敬迎上天威命無敢少忽嗣守文武大訓而無敢昏逾天威天命也大訓述天命者也今天降疾殆弗興弗悟爾尚眀時朕言用敬保元子釗𢎞濟于艱難釗康王名成王言今天降疾我身殆將必死弗興弗悟庶幾明是我言用敬保元子釗大濟於艱難曰元子者正其統也柔逺能邇安勸小大庶邦懷來馴擾安寧勸導皆君道所當盡者合遠邇小大而言又以見君德所施公平周溥而不可有所偏滯也思夫人自亂于威儀爾無以釗冒貢于非幾亂治也威者有威可畏儀者有儀可象舉一身之則而言也蓋人受天地之中以生是以有動作威儀之則成王思夫人之所以為人者自治於威儀耳自治云者正其身而不假於外求也貢進也成王又言羣臣其無以元子而冒進於不善之幾也蓋幾者動之微而善惡之所由分也非幾則發於不善而陷於惡矣威儀舉其著於外者而勉之也非幾舉其發於中者而戒之也威儀之治皆本一念一慮之微可不謹乎孔子所謂知幾子思所謂慎獨周子所謂幾善惡者皆致意於是也成王垂絶之言而拳拳及此其有得於周公者亦深矣蘇氏曰死生之際聖賢之所甚重也成王將崩之一日被冕服以見百官出經遠保世之言其不死於燕安婦人之手也明矣其致刑措宜哉兹既受命還出綴衣于庭越翼日乙丑王崩綴衣幄帳也羣臣既退徹出幄帳於庭喪大記云疾病君徹懸東首於北牖下是也於其明日王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外延入翼室恤宅宗桓毛二臣名伋太公望子為天子虎賁氏延引也翼室路寢旁左右翼室也太保以冢宰攝政命桓毛二臣使齊侯呂伋以二干戈虎賁百人逆太子釗於路寢門外引入路寢翼室為憂居宗主也呂氏曰發命者冢宰傳命者兩朝臣承命者勳戚顯諸侯體統尊嚴樞機周密防危慮患之意深矣入自端門萬姓咸覩與天下共之也延入翼室為憂居之宗示天下不可一日無統也唐穆敬文武以降閹寺執國命易主於宮掖而外廷猶不聞然後知周家之制曲盡備豫雖一條一節亦不可廢也丁卯命作册度命史為册書法度傳顧命於康王越七日癸酉伯相命士須村伯相召公也召公以西伯為相須取也命士取材木以供喪用狄設黼扆綴衣狄下士祭統云狄者樂吏之賤者也喪大記狄人設階蓋供喪役而典設張之事者也黼扆屛風畫為斧文者設黼扆幄帳如成王生存之日也牖間南嚮敷重篾席黼純華玉仍几此平時見羣臣覲諸侯之座也敷設重席所謂天子之席三重者也篾席桃竹板席也黼白黑雜繪純緣也華采色也華玉以飾几仍因也因生時所設也周禮吉事變几凶事仍几是也西序東嚮敷重底席綴純文貝仍几此旦夕聽事之座也東西廂謂之序底席蒲席也綴雜采文貝有文之貝以飾几也東序西嚮敷重豐席畫純雕玉仍几此養國老饗羣臣之座也豐席筍席也畫彩色雕刻鏤也西夾南嚮敷重筍席元紛純漆仍几此親屬私燕之座也西廂夾室之前筍席竹席也紛雜也以元黑之色雜為之緣漆漆几也牖間兩序西夾其席有四牖户之間謂之扆天子負扆朝諸侯則牖間南嚮之席座之正也其三席各隨事以時設也將傳先王顧命知神之在此乎在彼乎故兼設平生之座也越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圗在東序允之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房於東西序座北列玉五重及陳先王所寶器物赤刀赤削也大訓三皇五帝之書訓誥亦在焉文武之訓亦曰大訓𢎞璧大璧也琬琰圭名夷常也球鳴球也河圖伏羲時龍馬負圖出於河易大傳所謂河出圖是也允國名允國所制舞衣大貝如車渠鼖鼓長八尺兌和皆古之巧工埀舜時共工舞衣鼖鼓戈弓竹矢皆制作精巧中法度故歷代傳寶之孔氏曰𢎞壁琬琰大玉夷玉天球玉之五重也呂氏曰西序所陳不惟赤刀𢎞璧而大訓參之東序所陳不惟大玉夷玉而河圖參之則其所寶者斷可識矣愚謂寶玉器物之陳非徒以為國容觀意者成王平日之所觀閲手澤在焉陳之以象其生存也楊氏中庸傳曰宗器於祭陳之示能守也於顧命陳之示能傳也大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前大輅玉輅也綴輅金輅也先輅木輅也次輅象輅革輅也王之五輅玉輅以祀不以封為最貴金輅以封同姓為次之象輅以封異姓為又次之革輅以封四衛為又次之木輅以封蕃國為最賤其行也貴者宜自近賤者宜逺也王乘玉輅綴之者金輅也故金輅謂之綴輅最遠者木輅也故木輅謂之先輅以木輅為先輅則革輅象輅為次輅矣賔階西階也阼階東階也面南嚮也孰門側堂也五輅陳列亦象成王之生存也周禮典路云若有大祭祀則出路大喪大賔客亦如之是大喪出輅為常禮又按所陳寶玉器物皆以西為上者成王殯在西序故也二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階辨士服雀辨赤色辨也綦辨以文鹿子皮為之惠三隅矛路寢門一名畢門上刃刃外嚮也堂亷曰戺冕大夫服劉鉞屬戣瞿皆戟屬鋭當作鈗説文曰鈗侍臣所執兵從金允聲周書曰一人冕執鈗讀若允東西堂路寢東西廂之前堂也東西垂路寢東西序之階上也側階北陛之階上也吕氏曰古者執戈戟以宿衛王宫皆士大夫之職無事而奉燕私則從容義德有膏澤之潤有事而司禦侮則堅明守義而無腹心之虞下及秦漢階楯執戟尚餘一二此制既廢人主接士大夫者僅有視朝數刻而周廬陛楯或環以椎埋嚚悍之徒有志於復古者當深繹也王麻冕黼裳由賔階隮卿士邦君麻冕蟻裳入即位麻冕三十升麻為冕也隮升也康王吉服自西階升堂以受先王之命故由賔階也蟻元色公卿大夫及諸侯皆同服亦廟中之禮不言升階者從王賔階也入即位者各就其位也吕氏曰麻冕黼裳王祭服也卿士邦君祭服之裳皆纁今蟻裳者蓋無事於奠祝不欲純用吉服有位於班列不可純用凶服酌吉凶之間亦禮之變也太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賔階隮御王册命太宗宗伯也彤纁也太保受遺太史奉册太宗相禮故皆祭服也介大也大圭天子之守長尺有二寸同爵名祭以酌酒者瑁方四寸邪刻之以冒諸侯之圭壁以齊瑞信也太保宗伯以先王之命奉符寶以傳嗣君有主道焉故升自阼階太史以册命御王故持書由賔階以升蘇氏曰凡王所臨所服用皆曰御曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓成王顧命之言書之册矣此太史口陳者也皇大后君也言大君成王力疾親憑玉几道掦臨終之命命汝嗣守文武大訓曰汝者父前子名之義卞法也臨君周邦位之大也率循大卞法之大也燮和天下和之大也居大位由大法致大和然後可以對掦文武之光訓也王冉拜興答曰眇眇豫末小子其能而亂四方以敬忌天威眇小而如亂治也王拜受顧命起答太史曰眇眇然豫微末小子其能如父祖治四方以敬忌天威乎謙辭退托於不能也顧有敬迓天威嗣守文武大訓之語故太史所告康王所答皆於是致意焉乃受同瑁王三宿三祭三吒上宗曰饗王受瑁為主受同以祭宿進爵也祭祭酒也吒奠爵也禮成於三故三宿三祭三吒葛氏曰受上宗同瑁則受太保介圭可知宗伯曰饗者傳神命以饗告也太保受同降盥以異同秉璋以酢授宗人同拜王答拜太保受王所吒之同而下堂盥洗更用他同秉璋以酢酢報祭也祭禮君執圭瓚祼尸太宗執璋瓚亞祼報祭亦亞祼之類故亦秉璋也以同授宗人而拜尸王答拜者代尸拜也宗人小宗伯之屬相太保酢者也太宗供王故宗人供太保太保受同祭嚌宅授宗人同拜王答拜以酒至齒曰嚌太保復受同以祭飲福至齒宅居也太保退居此所以同授宗人又拜王復答拜太保飲福至齒者方在喪疚歆神之賜而不甘其味也若王則喪之主非徒不甘味雖飲福亦廢也太保降收諸侯出廟門俟太保下堂有司收徹器用廟門路寢之門也成王之殯在焉故曰廟言諸侯則卿士以下可知俟者俟見新君也康王既尸天子遂誥諸侯作康王之誥王出自應門之內大保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黃朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆冉拜稽首王義嗣德答拜王出畢門立應門內蓋內朝所在也召公主西方諸侯畢公繼周公主東方諸侯諸侯皆陳四黃馬而朱其鬛以為庭實賔諸侯也諸侯舉所奉圭兼幣曰一二臣衛為王藩衛故曰臣衛敢執壤地所出奠贄皆再拜首至地以致敬義嗣德云者史氏之辭謂康王冝嗣前人之德故答拜也吳氏曰秦穆公使人弔公子重耳稽顙而不拜穆公曰則未為後也蓋有後者拜不拜未為後也弔者含者禭者升堂致命主孤拜稽顙成為後者也康王之見諸侯若以為不當拜則疑未為後也此純乎吉也答拜既正其為後且知其以喪見也太保暨芮伯咸進相揖皆冉拜稽首冡宰及司徒與羣臣皆進相揖定位又皆再拜稽首陳戒於王曰敢敬告天子云云王若曰庶邦侯甸男衛惟豫一人釗報誥康王在喪故稱名春秋嗣王在喪亦書名也昔君文武云云羣公既皆聽命相揖趨出王釋冕反喪服始相揖者揖而進也此相揖者揖而退也蘇氏曰成王崩未葬君臣皆冕服禮歟曰非禮也謂之變禮可乎曰不可禮變於不得已嫂非溺終不援也三年之喪既成服釋之而即吉無時而可者曰成王顧命不可以不傳既傳不可以喪服受也曰何為其不可也孔子曰將冠子未及期日而有齊衰大功之喪則因喪服而冠冠吉禮也猶可以喪服行之受顧命見諸侯獨不可以喪服乎太保使太史奉册授王于次諸侯入哭於路寢而見王於次王喪服受教戒諌哭踊答拜聖人復起不易斯言矣春秋傳曰鄭子皮如晉葬晉平公將以幣行子産曰喪安用幣子皮固請以行既喪諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以退今康王既以嘉服見諸侯而又受乘黃玉帛之幣使周公在必不為此然則孔子何取此書也曰至矣其父子君臣之間教戒深切著眀足以為後世法孔子何為不取哉然其失禮則不可不辨朱子語録或問居喪朝服曰麻冕乃是祭服顧命用之者以其以後繼統事於宗廟故也受册用之者以其在廟而凶服不可入故也舊説以廟門為殯宫之門不知是否若朝服則古者人君諒隂三年自無變服視朝之禮苐不知百官總已以聽冢宰冢宰百官各以何服蒞事耳想不至便用元冠黑帶也後世既無亮隂總已之事人主不免視朝聽政則豈可不酌其輕重而為之權制乎又况古者天子皮辨素積以曰視朝衣冠皆白不以為嫌則今在喪而白布衣冠以臨朝恐未為不可但入太廟則須吉服而小變耳又或問康王釋喪服而被冕裳且受黃朱圭幣之獻諸家以為禮之變獨蘇氏以為禮之失何也對曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語蓋謂此類耳如伊訓元祀十有二月朔亦是新喪伊尹已奉嗣王祗見厥祖固不可用凶服矣扶君卜人師扶右射人師扶左謂君疾時也卜當為僕聲之誤也僕人射人皆平時贊正君位者君薨以是舉不忍變也周禮射人大喪與僕人遷尸疏曰周禮太僕職掌正王之服位射人職掌國之三公孤卿大夫之位及王舉動悉隨王故知也君夫人卒于路寢言死者必於正處者疏曰君謂諸侯諸侯三寢一正者曰路寢餘二曰小寢卒歸於正故在路寢莊公三十二年八月公薨于路寢穀梁傳路寢正寢也寢疾居正寢正也男子不絶於婦人之手以齊終也僖公薨于小寢譏即安謂就夫人寢也陳公薨不書地文公薨于臺下襄公薨于楚宫定公薨于高寢皆非禮也右始死夏采掌大喪以冕服復于太祖以乘車建緌復于四郊求之王平常所有事之處乘車玉輅於太廟以冕服不出宫也太祖始祖廟也緌用旄牛尾為之綴於幢上王祀四郊乘玉輅建太常今以復去其旒異之於生於疏曰復者各依命數天子則十二人各服朝服而復太祖之廟當升自東霤北靣履危西上云臯天子復如是者三乃卷衣投於有司以篋受之升自阼階入衣於尸復而不蘇乃行死事也郊事神之處乘玉輅生時九旗有緌有旒今死去旒是異於生也君復於小寢大寢小祖大祖庫門四郊尊者求之備也亦他日嘗有事疏曰於小寢者前曰廟後曰寢爾雅云室有東西廂曰廟無東西廂有室曰寢此小寢高祖以下廟之寢也王侯同大寢謂天子始祖諸侯太祖也小祖高祖以下廟也王侯同太祖天子始祖諸侯太祖廟也兩言於廟求神備也周禮夏采以冕服復于太祖廟是也其小廟則祭供復之其小寢大寢則肆供服之四郊則夏采服之天子崩復曰天子復矣始死時呼魄辭也不呼名臣不名君也疏曰普天率土王者一人而已故呼天子復而王者必知其呼而反矣若諸侯則曰某甫稱字也右復鼓人大喪則詔太僕鼓始崩及窆時也太僕大喪始崩戒鼓傳達于四方戒鼓擊鼓以警衆四方以鼓聲傳逹而聞之也大司馬大喪平士大夫平者正其職與其位司士大喪作士掌事事謂奠斂之屬疏曰始死則有奠及至小斂大斂朝夕朔月月半薦新遷廟祖奠大遣奠等皆是未葬以前無尸不忍異于生皆稱奠也宰夫大喪小喪掌小官之戒令帥執事而治之大喪王后世子小喪夫人以下小官士也其大官則冡宰掌其戒令治謂共辦虎賁氏國有大故則守王門大喪亦如之大故謂兵災也大喪謂王崩非常之難須警備旅賁氏掌執戈盾夾王車而趨喪紀則衰葛執戈盾葛葛絰武士尚輕服疏曰臣為王貴賤皆斬衰斬衰麻絰至葬乃葛今王始死即服葛故云武士尚輕大司徒若國有故則致萬民于王門令無節者不行于天下大故謂王崩及寇兵司險國有故則藩塞阻路而止行之以其屬守之唯有節者得達之有故喪災及兵也閉塞要路之道􅍯姦寇也疏曰喪謂王喪天子崩巷市七日諸侯薨巷市三日疏曰若居天子諸侯之喪必巷市者以庶人憂戚無復求覔財利要有急須之物不得不求于邑里之內而為巷市右戒臣民射人大喪與僕人遷尸僕人太僕也僕人與射人俱掌王之朝位也王崩小斂大斂遷尸於室堂朝之象也檀弓扶君卜人師扶右射人師扶左君薨以是舉疏曰始死于北牖下遷尸于南牖下又云小斂于户內是遷尸于室小斂訖遷尸于戶外又遷尸大斂于阼階大斂訖及遷尸于西階以入棺是遷尸于室堂云朝之象也者君所在而臣之朝故云朝之象玉府大喪共角枕角柶角枕以枕尸角柶角匕也以楔齒士喪曰楔齒令可飯含疏曰按既夕禮楔皂如軛上兩末狀如枇杷拔屈中央楔齒始死遷尸于牀幠斂衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也牀謂所設牀第當牖者也疏曰遷尸于牀者尸初在地冀生氣復既而不生故更遷尸于牀而離初死處以近南當牖也幠覆也斂衾者將擬大斂之時衾被也楔齒解見上綴足用燕几者為尸應著屨恐足辟戾亦使小臣用燕几綴拘之令直也幕人大喪共帷幕帟綬詳見陳殯具條委人喪紀共其木村木材給帳事此已上兩條陳殯具條通用右遷尸楔齒綴足帷堂天子崩告喪曰天王登假告訃也登上也假已也上已者若仙去云耳右命訃唯天子之喪有别姓而哭使諸侯同姓異姓庶姓相從而為位别于朝覲爵同同位姓疏曰此言朝覲爵同同位然覲禮諸侯受舍于朝同西面異姓東面與此不同者覲禮先公而後侯先侯而後伯亦是爵同位同但同姓之中先爵尊耳檀弓肆師大喪令外內命婦序哭序使相次秩外疏曰按下注六卿以出及朝廷卿大夫妻皆為命婦其內命婦即下經內命女是也謂三夫人以下至女御也哭法以服之輕重為先後若然則內命婦為王斬衰居前諸臣之妻從服齊衰者居後也內宗大喪序哭者內宗凡內女之有爵者序次外內宗及命婦哭位九嬪若有賔客則從后大喪帥敘哭者亦如之亦從后帥猶導也后哭衆之次敘者乃哭列疏曰外內命婦哭時皆依尊卑命數在后後為前後哭之故須帥導使有次序也序唯天子之喪别姓而哭肆師序哭內宗哭九嬪帥敘哭皆朝夕哭條所通用司士凡士之有守者令哭無去守疏曰此文承大喪之下令哭無去守則大夫士有使役守當須同為天子斬衰不可廢事空官故令哭不得去守也既正尸子坐于東方卿大夫父兄子姓立于東方有司庶士哭于堂下北面夫人坐于西方內命婦姑姊妹子姓立于西方外命婦率外宗哭于堂上北面正尸者謂遷尸牖下南首也子姓謂衆子孫也姓之言生也其男子立于主人後女子立于夫人後世婦為內命婦卿大夫之妻為外命婦外宗姑姊妹之女疏曰人君初喪哭位子坐于東方者子謂世子世子尊故坐于東方謂室內尸東故士喪禮云主人入坐于牀東是也子姓謂衆子孫所生也準士禮父兄子姓大功以上正立于室內東方今此經總云卿大夫父兄子姓立於東方以士禮言之當在室內但諸侯以上位尊不可不正定世子之位故顧命康王之入翼室恤宅宗不宜與卿大夫父兄子姓俱在室內也卿大夫等或當在户外之東方遙繼主人之後有司庶士哭于堂下北面者以其卑故在堂下北面則諸父兄子姓等雖小功以下皆在堂上西面也夫人坐于西方者亦近尸故士喪禮云婦人俠牀東面士禮略但言俠牀人君則當以帷幛之也內命婦則子婦也姑姊妹謂君姑姊妹也子姓君女孫皆立于西方也外命婦率外宗哭于堂上北面者外命婦謂卿大夫妻外宗謂姑姊妹之女外命婦外宗等疏于內命婦故在户外婦人無堂下之位故皆堂上北面也右哭位小宰受其含襚幣玉之事王喪諸侯諸臣有致含襚幣玉之事右受含襚幣玉司常大喪共銘旌銘旌王則太常也士喪禮曰為銘各以其物疏曰士喪禮為銘各以其物云則以緇長半幅頳末長終幅廣三寸書名于末此蓋其制也按禮緯云天子之旌髙九仭大夫五仭士三仭按士喪禮竹杠長三尺則死者以尺易仭天子九尺諸侯七尺大夫五尺士三尺其旌身亦以尺易仭也書銘自天子達于士其辭一也男子稱名婦人書姓與伯仲書銘謂書亡人名字于旌旗也天子書名于太常諸侯以下書于旌旗男子稱名此並殷禮周世則尚文臣不名君天子復曰皋天子復矣右為銘鬯人大喪之大渳設斗共其釁鬯斗音主尸斗所以沃尸也釁以鬯酒使之香美者鄭司農云釁讀為徽築疏曰鄭云釁尸以鬯酒使之香美者按肆師云大喪鬻則此鬯酒中兼有鬱金香草故得香美也司農云釁讀為徽者以鬯釁尸故以徽為莊飾義也鬱人大喪之渳共其肆器肆器陳尸之器喪大記曰君設大盤造冰焉大夫設夷盤造冰焉士並瓦盤無冰設牀檀第有枕此之謂肆器天子亦用夷盤肆師大喪大渳以鬯則築鬻鬻音煮伯築香草煮以為鬯以浴尸香草鬱也草疏曰上小宗大喪以鬯渳則肆師與之築鬱金香和鬯酒以浴之使尸之香也典絲喪記共其絲纊組文之物以給線縷著旰口綦握之屬青與赤謂之文而著直略反下同徐豬略反縫疏曰此鄭並據士喪禮言云以給線縷者謂所裁皆用線縷釋經絲也云著旰口綦文之屬者釋經縷組按士喪禮握手元纁裏著組繫按喪大記屬纊以俟絶氣內則云屨著綦鄭云綦屨繫是用縷組之事也云青與赤謂之文繢人職文繡之屬亦用絲故連言也內司服后之喪共其衣服凡內具之物內具紛帨線纊鞶帙之屬疏曰后喪所共衣服者正謂襲時十二稱小斂十九稱大斂百二十稱及內具之物也按內則事舅姑有紛帨線纊鞶帙故死者入壙亦兼有數物之以上兩條下陳小斂大斂衣皆通用公襲卷衣一元端一朝服一素積一纁裳一爵辨二元冕一褒衣一朱緑帶申加大帶於上卷音袞以朱緑帶者襲衣之帶飾之雜朱緑異于生也此帶亦以素為之申重也重于革帶也革帶以佩韍必言重加大帶者眀雖有變必􅍯此二𢃄也士襲三稱子羔襲五稱今公襲九稱是尊卑襲數不同矣諸侯七稱天子十二稱與疏曰公襲以卷衣上服最在內者公身貴故以上服親身欲尊顯加賜故褒衣最外而細服居中也子羔賤故卑服親身也元端二者賀云燕居之服元端朱裳也朝服一者緇衣素裳公日視朝之服也素積一者皮辨之服公視朔之服也纁裳一者賀云冕服之裳也亦可鷩毳任取中間一服也爵辨二者元衣纁裳二通也此是始命之服示之重本故二通也招魂君亦用爵辨服也元冕之下又取一也褒衣一者所加賜之衣最上華君賜也自袞衣至此合爵辨二通合九稱注云朱緑帶者襲衣之帶飾以雜朱緑異于生者也此帶既非革帶又非大帶祗是衣之小帶衣帶以素為之而朱緑飾之亦異于生時也申重也重于革帶也者謂於革帶之上重加此大帶知非對小朱緑帶為重者以朱緑小帶𣪚在于衣非是總束其身若總束其身唯有革帶大帶故知對革帶為重者必見革帶與大帶者眀雖有變必備此二帶天子諸侯以下襲之數士喪禮襲三稱子羔襲五稱此文公襲九稱是尊卑襲數不同唯天子諸侯無文故約之云諸侯七稱天子十二稱與與者疑辭也君錦冒黼殺綴旁七凡冒質長與手齊殺三尺疏曰冒謂襲後小斂前所用以韜尸也冒有質殺者作兩囊每輒橫縫合一頭又縫連一邉餘一邉不縫兩囊皆然也上者曰質下者曰殺君質用錦殺用黼鄭注士喪禮云冒韜尸者制如直囊上曰質下曰殺質正也其用之先以殺韜足而上後以質韜首而下旁綴七者不縫之邉上下安七帶綴以結之故云綴旁七也凡冒質長與手齊凡謂貴賤冒通名也言冒之質從頭韜來至下長短與手相齊也殺三尺者殺從足韜上長三尺凌人大喪共夷槃冰漢制廣大盤廣八尺長丈二尺深三尺漆赤中即夷盤君設大盤造冰焉設牀檀第有枕造猶內也檀第袒箕也謂無席如浴時牀也禮自仲春之後尸既小斂先納冰盤中乃設牀于其上不施席而遷尸焉秋涼而止典瑞大喪共飯玉含玉飯玉碎玉以雜米也含玉柱左右齻及在口中者雜記曰含者執璧將命則是璧形而小耳疏曰按玉府已云大喪共含玉此又言之者蓋玉府主作之此官主其成事而共之玉府大喪共含玉疏曰玉者含玉壁形而小以為口實含人喪紀共飯米飯所以實口不忍虛也君用粱大夫用稷士用粱皆四朴實者唯盈天子飯九貝此蓋夏時制也周禮天子飯用玉含一牀襲一牀遷尸於堂又一牀皆有枕席君大夫士一也疏曰言此三節各自有牀皆有枕席唯含一時暫徹枕使平面故士喪禮商祝徹枕設中是也含襲及堂皆有席故鄭注士喪禮商祝襲衣于牀牀次含牀之東祍如初又注士禮設牀第于兩楹之間祍如初有枕云祍寢卧之席亦下莞上簟是也君大夫士一也者貴與賤同然也右陳沐浴襲飯含之具小宗伯王崩大肆以秬鬯渳渳亡婢反杜音泯李士辨反鄭司農云大肆大浴也杜子春讀渳為泯以秬鬯浴尸元謂大肆始陳尸伸之疏曰肆訓為陳為伸故也以秬鬯浴尸使之香也大職祝云大喪始崩以肆鬯渳尸小祝又云大喪贊渳彼二官以掌之此言之者察其不如儀也春官大祝大喪以肆鬯渳尸肆鬯所肆鬯為陳尸也春官小祝大喪贊渳故書渳為灄杜子春云當為渳渳謂浴尸春官女御大喪掌沐浴王及后之喪之疏曰王及后喪沐用潘浴用湯禮男子不死于婦人手今喪亦使女御浴者按士喪禮浴時男抗衾則不使婦人今王喪婦人或亦供給湯物亦得謂之掌也天官管人汲不説繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人沐浴水用盆沃水用枓浴用絺巾挋用浴衣如他日小臣爪足浴餘水棄于坎其母之喪則內御者抗衾而浴管掌管籥之人又古禮反掌管舍之人説吐活反繘均必反枓音主又音斗挋音震抗衾者蔽上重形也挋拭也瓜足斷足爪也屈疏曰繘汲水瓶索也遽促于事故不説去井索但縈就之于手盡階不升堂者以水從西階而升知西階者以士喪禮云為垼于西牆下故也沃水用枓酌盆水沃尸絺細葛浴時除垢挋用浴衣浴罷用生時浴衣拭尸令燥也如他日謂如平生尋常之日浴盤餘汁棄之坎中坎是甸人所掘於階間取土為竈之坎其母之喪則內御者抗衾而浴者內外宜别故用內御舉衾內御婦人亦管人汲事事如前唯浴用人不同耳管人汲授御者御者差沐於堂上士沐粱大夫沭稷甸人為垼於西墻下陶人出重鬲管人受沭乃煮之甸人所取徹廟之西厞薪用㸑之管人授御者沭乃沭沭用瓦盤挋用巾如他日小臣爪手翦須濡濯棄於坎差七何反垼音役陶音桃重直龍反鬲音厯煮諸許反厞扶味反㸑七逭反差淅也淅飯米取其潘以為沐也沭沃用枓沭于盤中文相變也士喪禮沭稻此云士沐粱蓋天子之士也以差率而上之天子沭黍與粱疏曰差謂淅米取其潘汁也君沭粱大夫沭稷士沭者皆取用其米取其汁而沐也將沐之時甸人之官為垼于西牆下土垼墼竈甸人具此為垼竈以煮沐汁陶人作瓦器之官重鬲者謂縣重之罌也是瓦瓶受三升以沐米為粥實于瓶以疏布羃口繫以篾縣之覆以葦席管人受沐乃煮之者淅于堂上管人亦升盡等不上堂而就御者受淅汁下往西階于垼竈鬲中煮之也㸑然也甸人為竈竟取復魄人所徹正寢西北厞以然竈煮沐汁也謂正寢為廟神之也然舊云厞是屋簷也謂抽取屋西北簷也熊氏云厞謂西北隅厞隱之處徹取屋外當厞隱處薪義亦通也取此薪而用者示主人已死此堂無復用故取之也管人授御者沐者煮汁􅌻而管人又取以升階授堂上御者御者受汁入為尸沐也士喪禮云沐巾一又云挋用巾注云挋晞也清也如他日者事事亦如平生也小臣沐竟而剪手瓜又治須象平生也濡濯棄于坎者皇氏云須謂煩撋其髮濯謂不淨之汁也言所濡濯汁棄于坎中鄭注士喪禮云巾櫛浴衣亦並棄之于坎按既夕禮云掘坎南順廣尺輪二尺深三尺南其壤此沐汁棄于坎則浴汁亦然差是差摩故云淅詩云釋之叟叟是釋淅米也沭與浴俱有枓俱有盤浴云用枓沐云用盤是文相變也右沐浴大祝大喪相飯疏曰云相飯者浴訖即飯含故言相飯也不言相含者大宰云大喪贊贈玉含玉此故不言大宰大喪贊含玉助王為之也王疏曰謂助嗣右飯含襲左傳皇武子曰宋先代之後於周為客天子有喪拜焉宋吊周喪王特拜謝之不疏曰禮弔喪之法皆人主拜其吊者謝其勤勞吊者答拜以其為事而來不自同于賔客此皆據吊及主人敵禮以上若其臣下來吊則主人不拜宋是前代之後王以敵禮待之故拜其來弔其餘諸侯者則否右受弔小斂於户內大斂於阼君以簟席簟細葦也下有莞司服大喪共其斂衣服掌其陳序疏曰云大喪王喪其中兼小喪也小斂皆十九稱大斂則士三十稱大夫五十稱諸侯皆百稱天子蓋百二十稱云小斂布絞縮者一橫者三君錦衾大夫縞衾士緇衾皆一衣十有九稱君陳衣於序東大夫士陳衣于房中皆西領北上絞襟不在列絞既斂所用束竪之者尸疏曰布絞者以布為絞縮從也謂從者一幅竪置于下橫者三幅亦在尸下從者在橫者之上每幅之末析為三片以結束為便也君錦衾大夫縞衾士緇衾皆一者謂大夫士等各用一衾故云皆一舒衾于此絞上衣十有九稱者君大夫士同用十九稱衣布于衾上然後舉尸于衣上屈衣裹又屈衾裹之然後以絞束之君陳衣于序東大夫士陳衣于房中者謂將小斂陳衣也房中者東房也大夫士唯有東房故也絞襟不在列者謂不在十九稱之列不入數也小斂未有襟因絞不在列而言襟耳君無襚無襚者不陳不以斂不疏曰君無襚者國君陳衣及斂悉宜用己衣得陳用他人見襚送者小斂君大夫士皆用復衣復衾同上凡陳衣者實之篋取衣者亦以篋升降自西階取猶受也凡陳衣不詘非列采不入絺綌紵不入不詘謂舒而不卷也列采謂正色之服也絺綌紵者當暑之褻衣也襲尸重形冬夏用袍及斂則用正服入疏曰列采謂五方正色之采非列采謂雜也不陳之也褻衣亦不陳復衣不以斂詳見復條封人凡喪紀則飾其牛牲疏曰喪紀有牲者除朝夕奠用脯醢以外大小斂朔月月半薦新奠祖奠大遣等皆有牲牢牛人喪事共其奠牛謂殷奠遣奠也喪所薦饋曰奠故疏曰喪自未葬以前無尸飲食直奠停置于神前謂之為奠朝夕之奠無尊卑皆脯醢酒而已無牲體殷大也唯有小斂大斂朔月月半薦新祖奠及遣奠時有牲體大遣奠非直牛亦有馬牲故鄭注云謂殷奠遣奠也云喪所薦饋曰奠以無尸故也地官囿人喪紀共其脯臘凡獸之物地官獸人凡喪紀共其死獸生獸天官臘人喪紀共其脯臘凡乾肉之事漁人漁音魚本又作魚又音御喪紀共其魚之鮮天官醢人凡祭祝共薦羞之豆實喪紀亦如之以上八官並陳大斂奠至祖奠遣奠條通用右陳小斂衣奠小斂主人即位於户內主婦東面乃斂疏曰主人即位於户內者以初時尸在牖下主人在尸東今小斂當户內故主人在户內稍東喪大記上始死條卜人右射人左遷尸條射人僕人遷尸並此條通用當互考也小宗伯王崩及執事涖小斂大斂帥異姓族而佐執事大祝之屬蒞臨也親斂者並事官之屬為之異族佐斂疏者可以相助云疏曰大祝職云大喪贊斂眀大祝執事小宗伯蒞之親斂者蓋事官之屬為之者以其諸處更不見主斂事者事官又主工巧之事以無正文故疑事官之屬為之也云異族佐斂疏者可以相助者此異族據姓而言之大祝大喪贊斂冬官主斂事大祝佐之春官君之喪大胥是斂衆胥佐之胥樂官也不掌喪事胥當為祝字之誤也疏曰大祝是接神者故使之執斂事也是猶執也衆祝佐之者衆祝喪祝也衆祝賤故副佐于大祝也凡斂者袒遷尸者襲袒者于事便也者疏曰凡斂謂執大小斂事也事多故袒為便也遷尸襲謂大斂于地乃遷尸入棺之屬事少故襲也小斂之衣祭服不倒尊祭服也斂者要方𣪚衣有倒疏曰祭服謂死者所得用祭服以上也小斂十九稱不悉著之但用裏尸要取其方而衣有倒領在足間者唯祭服尊雖𣪚不著而領不倒在足也同上小斂大斂祭服不倒皆左衽結絞不紐紐女九反舊而慎反左衽衽鄉左反生時也右疏曰皆左衽大斂小斂同故云皆也衽衣襟也生鄉手解抽帶便也死則襟向左示不復解也生時帶並為屈紐使易抽解若死則無復解義故絞束畢結之不為紐也同上自小斂以往用夷衾夷衾質殺之裁猶冒也疏曰往猶後也小斂前用冒故不用夷衾自小斂後衣多不可用冒故用夷衾覆之也士喪禮云幠用夷衾之柩之衾也裁猶制也言夷衾所用上齊茶手下三尺所用繒色及長短制度如冒之質殺也但不復為囊及旁聫也熊氏分質字屬上殺字屬下為句其義非也然始死幠用斂衾是大斂之衾自小斂以前覆尸至小斂時君錦衾大夫縞衾士緇衾用之小斂斂訖則制夷衾以覆之其小斂之前所用大斂之衾者小斂以後停而不用至將大斂及陳衣又更制一衾主用大斂也今按士喪禮幠用斂衾疏云大斂之時兩衾俱用一衾承薦于下一衾以覆尸則始死所用之衾至大斂即以承薦非停而不用也鋪絞襟踊鋪衾踊鋪衣踊遷尸踊斂衣踊斂衾踊斂絞襟踊皆孝子踊也同上斂者既斂必哭疏曰斂者即大祝衆祝之屬也既斂是斂竟也斂竟必皆哭也所以然者以其與亡者或臣舊或有恩今手為執事専心則增感故哭也卒斂主人馮之踊主婦亦如之主人袒説髦括髮以麻婦人髽帶麻于房中士既殯説髦此云小斂蓋諸侯禮也士之既殯諸侯之小斂于死者俱三日也婦人之髽帶麻于房中則西房也天子諸侯有左右房斂疏曰既斂主人馮之踊主婦亦如之主人袒者向小不袒今方有事故袒衣也士喪禮馮尸已竟而云髻髮袒此未括髮先云袒者或人君禮也説髦者髦幼時剪髮為之至年長則垂著兩邉眀人子事親恆有孺子之義也若父死説左髦母死説右髦二親並死則並説之親沒不髦是也今小斂竟喪事已成故説之也按鄭注士既殯説髦今斂而説者人君禮也括髮以麻者人君小斂説髦竟而男子括髮用麻也士小斂後亦括髮但未説髦耳婦人髽亦用麻對男子括髮也帶麻于房中者帶麻麻帶也謂婦人要絰也士喪禮云婦人之帶牡麻結本在房鄭云婦人亦有苴絰但言帶者記其異此齊衰婦人斬衰婦人亦苴絰也男子帶絰于東房而婦人帶絰在西房既與男子異處故特記其異也云天子諸侯有左右房者欲眀絰房中是西房也天子路寢制如眀堂熊氏曰左房則東南火室也右房則西南金室也諸侯路寢室在于中房在室之東西也右小斂按小斂所用之日以喪禮義考之但有死三日而斂若並死日而數二日而天子諸侯三日小斂大夫士二日小斂此乃小斂日數雖引以為在禮有之然無所考天子諸侯殯葬日月與士不同則斂日亦當不同故載其詳于喪禮義而記其略于此大祝大喪徹奠疏曰此文乃承大喪之下故奠為始死之奠小斂大斂奠並大祝徹之右徹始死奠主人即位襲帶絰踊即位阼階之下位也有襲絰乃踊疏曰襲帶絰踊者拜賔時袒今拜訖襲衣加要帶首絰于序東復位乃踊也士喪禮先踊乃襲絰此先襲絰乃踊士為卑也此據諸侯為尊故云尊卑相變也母之喪即位而免記異者禮斬衰括髮齊衰免以成服而冠為母重初亦括髮既小斂則免括疏曰為父喪拜賔竟而即阼階下位又序東帶絰猶髮若為母喪至拜賔竟即位時不復括髮以免代之免以襲絰至大斂乃成服也所以異于父者也同上乃奠小奠斂也疏曰拜賔襲絰踊竟後始設小斂之奠也賔出徹帷君與大夫之禮也士卒斂則徹帷徹或為廢後疏曰士小斂竟而徹帷此至小斂竟下階拜賔賔出乃除帷是人君及大夫禮舒也注云士卒斂則徹帷者士喪禮文條喪大記未小斂受弔有庶子不受弔宋成公如鄭二奉尸夷于堂有婦人迎送不下堂一條又殯後受弔條有君弔見尸柩而後踊皆此條通用當互考右襲帶絰小斂奠挈壺氏挈劉苦結反一音結又户結反凡喪縣壺以代哭者皆以水火守之分以日夜鄭司農云縣壺以為漏也代更也禮未大斂代哭以水守壷者為沃漏以火守壺者夜則視刻數也分以日夜者異晝夜漏也漏之箭晝夜共百刻冬夏之間有長短焉太史立成法有四十八箭絶疏曰禮未大斂代哭者未殯以前無問尊卑皆哭不聲大斂之後乃更代而哭亦使哭不絶聲大夫以官士親疏代哭人君尊又以壺為漏分更相代君喪虞人出木角狄人出壺雍人出鼎司馬縣之乃官代哭代更也未殯哭不絶聲為其罷倦既小斂可以為漏刻分時而更哭也壷疏曰虞人掌山澤之官故出木與角狄人樂吏主挈漏水之器故主壺雍人主烹飪故出鼎所以用鼎及木者冬月恐水凍則鼎漏遲遲更無凖則故取鼎暖水用虞人木㸑鼎煮之故取鼎及木也司馬夏官卿也其屬有挈壺氏掌知漏事故司馬自臨視縣漏之時節故挈壺氏云凡喪縣壷以代哭者縣漏分時使均其官屬更次相代而哭使聲之不絶者也右代哭委人喪紀共其薪蒸木材薪蒸給炊及燎木材給帳事司烜氏凡邦之大事共墳燭庭燎墳大也樹于門外曰大燭于門內曰庭燎疏曰大事謂若大喪紀大賔客之事也庭燎在大寢之庭君堂上二燭下二燭燭所以照饌也滅燎而設燎而疏曰有喪則于中庭終夜設燎至曉滅燎日光未眀故須燭以照祭饌也右設燎大斂於阼詳見陳小斂衣條大斂布絞縮者三橫者五布襟二衾君大夫士一也君陳衣於庭百稱北領西上絞襟如朝服絞一幅為三不辟襟五幅無紞辟補麥反紞丁覽反二衾者或覆之或薦之如朝服者謂布精粗朝服十五升小斂之絞廣終幅折其末以為堅之強也大斂之絞一幅三折用之以為堅之急也紞以組類為之綴之領側若今被識生時襌被有識死者去之異于生也疏曰大斂布絞縮者三者謂取布一幅分裂之作三片直用之三片則共是一幅兩頭裂中央不通橫者五尺又取布二幅分裂作大片而用五片橫之於縮下也布襟者皇氏云襟襌被也取置絞束之下撰用以舉尸也孝經云衣衾而舉之是也今按經云襟在絞後襟或當在絞上以絞束之且君衣百稱又通小斂與襲之衣非單絞所能舉也又孝經云衾不云襟皇氏之説未善也二衾者小斂君大夫士各一衾今至大斂又各加一衾為二衾其衾所用與小斂同但此衾一是始死覆尸者故士喪禮云幠用斂衾注云大斂所並用之喪一是大斂時復制又注士喪禮之衾二者謂始死斂衾今又復制士既然則大夫以上一爾君陳衣于庭百稱北領西上者衣多故陳在庭為榮顯按鄭注雜記篇以為襲禮大夫五諸侯七上公九天子十二稱則此大斂天子當百二十稱上公九十稱諸侯伯子男七十稱今云君百稱者據上公舉全數而言之餘可知也或大斂襲五等同百稱也北領者謂尸在堂也西上者由西階取之便也絞一幅為三不辟者辟擘也言小斂絞全幅析裂其末為三而大斂之絞既小不復擘裂其末襟五幅無紞襟舉尸之襌被也注堅之強解小斂衣少用全幅布為絞欲得堅束力強也堅之急解大斂一幅分為三片之意凡物細則束縳牢急以衣多故須急者也大斂君大夫祭服無算君褶衣褶衾大夫士猶小斂也褶音牒褶夾也君衣尚多去其著也之疏曰祭服謂死者所得用祭服以上也算數也大斂時所有祭服皆用之無限數也注謂君多去其著者經云大夫士猶小斂則復衣復衾也據主人之衣故用復若襚亦得用夾也故士喪禮云襚以褶是也同上此陳小斂衣條凡陳衣者實之篋以下條通用當互考典瑞駔圭璋璧琮琥璜之渠眉疏壁琮以斂尸駔音祖焉以斂尸者於大斂加之也駔讀為組與組馬同聲之誤也渠眉玉飾之溝瑑也以組穿聫六玉溝瑑之中以斂尸圭在左璋在首琥在右璜在足璧在背琮在腹蓋取象方眀神之也疏璧琮者通于天地疏曰於大斂焉加之也者以其六玉所與玉為飾眀在衣裳之外故知在大斂後也駔讀為組詩有執轡如組聲之誤為駔云渠眉玉飾之溝瑑也者此六玉兩頭皆有孔又於兩孔之間為溝渠如溝之兩畔稍髙為眉瑑故云以組穿聨六玉溝瑑之中以斂尸云圭在左以下皆約大宗伯云青圭禮東方之等以尸南首而置此六玉焉云蓋取象方眀神之也者按覲禮設方眀上圭下璧無璧琮此云象者彼注上下之神非天地至貴謂日月之神故上下不用璧琮此中有璧琮者象天地若然此言象方明也者直取置六玉于六處不取玉形之義又按大宗伯璧禮天琮禮地今此璧在背在下琮在腹在上不類者以背為陽腹為隂隨尸腹背而置之故上琮下璧也云疏璧琮者通于天地者天地為隂陽之主人之腹背象之故云疏之通天地也君即位而為椑嵗一漆之藏焉椑蒲厯反徐房益反成椑謂地棺親尸者椑堅著之言也嵗一漆之若未然藏謂虛之不合疏曰君諸侯也言諸侯則王可知也椑杝棺也漆之堅強甓甓然也人君無論少長而體尊備細故一即位而造為此棺也古者天子椑內又有水兕而諸侯無但用杝在內以親尸嵗一漆之者每年一漆示如未成也唯云漆杝則知不漆杝棺外屬等天子之棺四重尚深邃也牛疏曰四重者水牛兕皮二物重故為一重也又杝為第二重也又屬為第三重也又大棺為第四重也四重凡五物也以次而差之天子大棺厚八寸屬椑四寸又二皮六寸合二尺四寸也水兕革棺被之其厚三寸疏云水兕二皮並不能厚三寸故合被之令各厚三寸也二皮能濕故最在裏近尸也杝棺一疏曰杝棺一者椵也村亦能濕故次皮也杝惟一種諸侯無革則杝親尸也君即位為椑是也杝即椵木爾雅云椵杝一物二名名椵又名杝也梓棺二疏云杝棺之外又有屬棺屬棺之外又有大棺與屬棺並用梓故云二也四者皆周疏云四四重也周匝也謂四重之棺上下四方􅊖周匝也唯槨不周下有茵上有枕席故也棺束縮二衡三衽每束一衡亦當為橫衽今小要衽或作漆或作髹疏曰棺束者古棺木無釘故用皮束合之縮二者縮縱也縱束用二行也衡三者橫束三行也衽每束一者衽小要也其形兩頭廣中央小也既不用釘棺但先鑿棺邉及兩頭合際處作坎形則以小要連之今固棺並相對每束之處以一行之衽連之若竪束之處則竪著其衽以連棺蓋及底之木使與棺頭尾之村相固漢時呼衽謂之小要也同上君裏棺用朱緑用雜金鐕鐕子南反以琢著裏鐟所疏曰裏棺謂以繒貼棺裏也朱繒貼四方緑繒貼四角定本經中緑字皆作琢琢謂鐕琢朱繒貼著于棺也用雜金鐟者鐟釘也舊説云用金釘又用象牙雜之以琢朱緑著棺也舍人喪紀共熬榖熬榖者鐟於棺旁所以惑蚍蜉也欲疏曰殯時設之將熬榖以惑蚍蜉又有魚臘香蚍蜉向棺故植此以惑之者也熬君四種入筐加魚臘焉熬煎榖也士喪禮曰熬黍稷各二筐又曰設熬旁各一筐大夫三種加以粱君四種加以稻四筐則手足皆一其餘設于左右疏曰加魚臘者魚臘謂乾臘按郊特牲士臘用兔少牢大夫臘用麋天子諸侯無文當用六獸之屬亦為惑蚍蜉幕人大喪共帷幕帟綬為賔客飾也帷以帷堂或與幕張之於庭帟在柩上疏曰始在帷堂小斂徹之及殯在堂亦帷之也掌次凡喪王則張帟三重張帟柩上承塵也疏曰后與王同司几筵凡喪事設葦席右素几其柏席用萑黼純諸侯則粉純每敦一几柏鄭音椁劉依司農音迫鄭喪事謂凡奠也萑如葦而細者司農云柏席迫地之席葦居其上或曰柏席載黍稷之席元謂柏椁字磨滅之餘椁席藏中神坐之席也敦讀曰燾燾覆也棺在殯則椁燾既窆則如見背謂覆之周禮雖合葬及同時在殯皆異几體實不同祭於廟同几精氣合士藏才浪反之疏曰喪事謂凡奠也者言凡非一之義喪禮始死奠乃至小斂之奠亦設于地未有席至大斂奠乃有席殯後則有朝夕奠朔月奠大夫以上兼有月半奠并有薦新奠葬時又有遷奠祖奠大遣奠葬乃廢奠而虞祭也故鄭云謂凡奠也云棺在殯則椁燾者檀弓云天子菆塗龍輴以椁是也云既窆則如見者見謂道上帳帷荒將入藏以覆棺言見者以其棺不復見唯見帷荒故謂之見也其二處皆當覆故云敦也云皆異几體實不同者解經每敦一几之義凡凶事仍几鄭司農云吉事變几變更其質謂有飾也仍因也因其質謂無飾也顧命牖間南嚮西序東嚮東序西嚮皆仍几元謂吉祭主祭宗廟祼于室饋食于堂繹于祊每事易几神事文示新之也凶事謂凡奠朝夕相因喪禮略疏曰按檀弓云虞而立尸有几筵者據大夫士而言按士喪禮大斂則有席而云虞始有筵者以其几筵相將連言其實虞時始有几其筵大斂即有也天子諸侯禮大初死几筵並有故上云几喪事設葦席右素几也凡几之長短阮諶云几長五尺髙五尺廣五尺馬融以為長三尺舊圖以為几兩端赤中央黑也右陳大斂衣及殯奠之具君將大斂子辨絰即位於序端卿大夫即位於堂廉楹西北面東上父兄堂下北面夫人命婦尸西東面外宗房中南面小臣鋪席商祝鋪絞襟衾衣士盥於盤上士舉遷尸於斂上卒斂宰告子馮之踊夫人東面亦如之子辨絰者未成服辨如爵辨而素大夫之喪子亦辨絰疏曰子辨絰即位於序端者序謂東序端謂序之南頭也卿大夫即位于堂廉楹西者卿大夫謂羣臣也堂廉謂堂基南畔之廉稜之上楹謂南近堂廉者子位既在東序端故羣臣列于基上東楹之西也按隱義云堂廉即堂上近南霤為廉也北面東上者在基上俱北面東頭為上也子在東尸在阼階故在基者以東為上也又兄堂下北面者謂諸父謂諸兄不在仕者以其賤故在堂下而鄉北以東為上也若士則亦在堂下外宗房中南面者外宗君之姑姊妹之女及姨舅之女也輕故在房中而鄉南也皇氏云當在西房以東為上也今謂尸在阼大夫命婦在尸西北外宗等當在東房小臣黼席者謂下管上簟敷于阼階上供之斂也士喪禮云布席如初注云亦下管上簟也鋪于阼階上於堂南北為少南商祝鋪絞襟衾衣者商祝亦是周禮喪祝也其鋪絞襟衾衣等致於小臣所鋪席上以待尸士盥于盤上者士亦喪祝之屬也周禮喪祝上士二人中士四人下士八人是將應舉尸故先盥手於盤上也雜記云士盥于盤北是也士舉遷尸于斂上者斂上即斂處也卒斂者大斂衣裝畢也宰告者大宰也斂畢大宰告孝子道斂畢也子馮之踊者孝子待得告乃馮尸而起踊夫人東面亦如之者亦馮尸而踊嚮者夫人命婦俱東嚮于尸西今獨云夫人馮者命婦賤不得馮也馮竟乃斂于棺注云子辨絰者未成服者成服則著喪冠也此云辨絰是未成服此雖以大斂為文其小斂時子亦辨絰君大夫士之子皆然故雜記云小斂環絰公大夫士一也右大斂天子七日而殯尊者舒卑者速數疏曰天子諸侯既尊重送終禮物其既多許其申遂故日月緩也君大夫鬊瓜實於緑中鬊音舜隅緑當為角謂棺內四也鬊亂髮也將實瓜髮棺中必為小囊盛之此緑或為簍君蓋用漆三衽三束用漆者用塗合牝牡之中也衽小要也際疏曰君蓋用漆者蓋棺上蓋用漆謂漆其衽合棺縫也束謂以皮束棺也棺兩邉各三衽每當衽上輒以牛皮束之故云三衽三束也天子之殯也菆塗龍輴以椁菆木以周龍輴如椁而塗之天子殯以輴車畫轅為龍疏曰菆叢也謂用木叢棺而四面塗之龍輴者殯時輴車載柩而畫轅為龍以椁者亦題湊叢木象椁之形加斧於椁上畢塗屋斧謂之黼白黑文也以刺繡于襂幕加椁以覆棺已乃屋其土盡塗之疏曰斧謂繡覆棺之衣為斧文也先取四面為棺使上與棺齊而上猶開也以棺衣從椁上入覆于棺故云加加斧于椁上也畢塗屋者畢盡也斧覆既竟又四柱為屋覆上而下四面盡塗之也天子之禮也甸師喪事代王受眚災粢盛者祭祝之主也今國遭大喪若云此黍稷不馨使鬼神不逞于王既殯太祝作禱辭授甸人使以禱籍田之神受眚災弭後殃詞疏曰言喪事者謂主喪既殯後甸師氏于太祝取禱禱籍田之神眚過也代主受過災止後殃故為此禱也太祝作禱詞在既殯後者見太祝職云授甸人禱詞在大斂後大斂則殯故知在既殯後太祝大喪言甸人讀禱言猶語也禱六辭之屬禱也甸人喪事代王受眚災太祝為禱辭授之使以禱于籍田之神也使疏曰太祝掌六辭五曰禱故于王既殯作禱銘甸人以禱焉小祝設熬置銘疏曰熬謂熬榖殯在堂時設於棺旁所以惑蚍蜉云置銘者銘謂銘旌書死者名既殯置于西階上所以表柩右殯天子諸侯之喪斬衰者奠為君服皆斬衰唯主人不奠疏曰按士喪禮主人不親奠而此下文之士則朋友奠故知主人不親奠也主人不親奠者以主人悲號思慕不暇執事故也右大斂奠小宗伯辨吉凶之五服司服掌王之吉凶衣服凡凶事服辨服服辨喪冠也其服斬衰齊衰凡喪為天王斬衰為王后齊衰王后小君也諸侯為之不杖期太僕喪紀正王之服位詔法儀詔告也內司服凡祭祀賔客共后之衣服及九嬪世婦凡命婦共其衣服共喪衰亦如之疏曰外命婦喪衰謂王服齊衰於后無服若九婦以下及女御于王服斬衰于后服齊衰也天官追師追丁回反一曰雕追治玉石之名掌王后之首服為九嬪及外內命婦之首服以待祭祀賔客喪紀共笄絰亦如之天官內宰凡喪事佐后使治外內命婦正其服位使其屬事之上士內命婦謂九嬪世婦女御鄭司農云外命婦卿大夫之妻王命其夫后命其婦元謂士妻亦為命婦婦疏曰凡有喪事內宰皆佐后使其屬官治外內之命正其服之精粗位之前後也諸子大喪正羣子之服位疏曰位謂在殯宫外內哭位也正其服者公卿大夫之子為王斬衰與父同故雜記大夫之子得行大夫禮肆師禁外內命男女之衰不中法者且授之杖外命男六卿以出也內命男朝廷卿大夫士也其妻為外命女喪服為夫之君齊衰不杖內命女王之三夫人以下不中法違升數與裁制者鄭司農云三日授子杖五日授大夫杖七日授士杖此舊説也喪大記曰君之喪三日子夫人杖五日既殯授大夫世婦杖無七日授士杖文元謂授杖日數王喪依諸侯與七日授士杖四制云疏曰外內命男女為王雖有齊斬不同其衰皆有升數多少及裁制故禁之使依法也授之杖者外內命男及內命女皆為王斬者有杖授之其外命女為王齊衰無杖故云且者見不定之詞也喪服為夫之君見喪服不杖齊衰章內命女三夫人以下者通九嬪二十七世婦八十一御妻皆為王斬衰而杖也言升數者諸臣妻為夫之君義服衰六升諸臣為王義服斬衰衰三升半冠六升三夫人以下為王正服斬衰衰六升是其數也言裁制者喪服云凡衰外削幅裳內削幅幅三拘已下具有裁制也司農所云授杖之日仍是四制之文也王喪諸臣等無授杖之日數以諸侯之臣與王之臣同斬衰杖竹故授杖日數亦冝同也檀弓云天子崩三日祝先服眀子與夫人亦服則天子之子及后亦服矣五日官長服眀天子三公已下及三夫人已下亦服矣但服杖同時有服即杖矣唯天子服授杖亦當七日矣是以王喪約同諸侯之制也天子崩三日祝先服祝佐含斂先服疏曰祝大祝也服服杖也是喪服之數故呼杖為服祝佐含先病故先杖也然云祝服故子亦三日而杖也五日官長服官長大夫士病疏曰官長大夫士也亦服杖也在祝後故五日也七日國中男女服庶人謂疏曰國中男女謂畿內民及庶人在官者服齊衰三月而除之必待七日者天子七日而殯殯後嗣王成服故民得成服也三月天下服諸侯之大夫者疏曰三月天下服諸侯之大夫為王繐衰既葬而除之也近者亦不待三月今據逺者為言耳然四條皆云服何以知其或杖服或衰服按喪大記云君之喪三日子夫人杖五日既殯授大夫世婦杖又喪服四制云三日授子杖五日授大夫杖七日授士杖按如大記及四制則知今云三日五日是服杖眀矣其七日及三日者唯服而已無杖四制云七日授士杖此云五日士杖者士若有地德深則五日若無地德薄則七日崔氏云此據朝廷之士四制是邑宰之士也檀弓君之喪三日子夫人杖五日既殯授大夫世婦杖三日者死之後三日也為君杖不同日人君禮大可以見親疏也疏曰熊氏云子杖通女子子在室者若嫁為他國夫人則不杖嫁為卿大夫之妻與大夫同五日杖也君之女及內宗外宗之屬嫁為士妻及君之女御皆七日杖也喪大記公之喪諸達官之長杖謂君所命雖有官職不達于君則不服斬謂疏曰達官謂國之卿大夫士被君命者也不達于君府史之類賤不被命是不達于君也不服斬衰但齊三月耳故喪服齊衰三月章有庶人為國君即此是也右成服天府凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之玉鎮大寶器玉瑞玉器之美者禘祫及大喪陳之以華國顧命陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圗在東序允之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房此其行事見于經典路若有大祭祀則出路贊駕説大喪亦如之亦出路當陳之書顧命陳先王寶器又曰大輅在賔階面綴路在阼階面先路在左孰之前次路在右孰之前右陳寶器顧命成王崩康王麻冕黼裳由賔階隮入即位云云詳見上文康王既尸天子遂誥諸侯云云詳見上文成湯既沒伊尹奉嗣王祇見厥祖云云詳見上文春秋文公九年毛伯來求金何不稱使當喪未君也踰年矣何以謂之未君據崩在八年踰年即位即位矣而未稱王也未稱王何以知其即位以諸侯之踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封內三年稱子也踰年稱公矣則曷於其封內三年稱子緣終始之義一年不二君故君薨稱子其既葬稱子緣臣民之心不可曠年無君故踰年稱公緣孝子之心則三年不忍當也不忍當公位禮公羊傳又按曲曰天子未除喪曰豫小子注云謙未敢稱一人春秋傳曰以諸侯之踰年即位亦知天子之踰年即位以天子三年然後稱王亦知諸侯于其封內三年稱子疏曰天子踰年即位無文約魯十二公諸侯三年內稱子亦無文約天子踰年不稱王也是天子諸侯互相明也又凖左傳之義諸侯薨而嗣子即位凡有三時一是始喪即適子之位二是踰年正月即一國正君臣之位三是除喪而見于天子天子命之嗣列為諸侯之位今此踰年即位是遭喪眀年為元年正月即位白虎通云父􅒙稱子某屈于尸柩也既葬稱子者即尊之漸也踰年稱公者緣臣之心不可一日無君緣始終之義一年不二君故踰年即位係臣民之心也文公元年春王正月公即位先君未葬而公即位不可曠年無君葬疏曰諸侯之禮既葬成君先君雖未既踰年而君即位不可曠年無君故也釋例云遭喪繼立者每新年必改元正位百官以序故國史書即位于策以表之文公成公先君之喪未葬而書即位因三正之始眀繼嗣之正表朝儀以固百姓之心此乃國君眀分制之大禮譬周康王麻冕黼裳以行事事畢然後反喪服也杜引顧命康王之事以譬此者彼是既殯此是踰年雖時不同取其暫服吉服事相似耳又按釋例曰尚書顧命天子在殯之遺制也推此亦是以準諸侯之禮矣定公元年夏六月公之喪至自乾侯戊辰公即位諸侯薨五日而殯則嗣子即位癸亥昭公喪至五日殯于宮定公乃即位疏曰公羊穀梁皆云正棺于兩楹之間然後即位按正棺兩楹之間即禮所謂夷于堂者也喪大記君薨之禮云既小斂男女奉尸夷于堂鄭元云士之既殯諸侯之小斂于死者俱三日戊辰去癸亥五日非正棺之日不得為正棺即位也雜記云諸侯行而死歸至于廟門遂入適所殯鄭元云適所殯謂兩楹之間自外來者正棺于兩楹之間尸亦夷之于此因殯焉殯必于兩楹之間者以其死不于室而自外來留之於中不忍逺也鄭取二傳之説言死從外來者殯在兩楹之間若謂殯為正棺則與杜言合矣癸亥公之喪至自乾侯則曷為以戊辰之日然後即位正棺於兩楹之間然後即位公羊傳沈子曰正棺乎兩楹之間然後即位也內之大事日即位君之大事也其不日何也以年決者不以日決也此則其日何也踰年即位厲也厲危也公喪在外踰年六月乃得即位危故日也於厲之中又有義焉先君未葬則後君不得即位未殯雖有天子之命猶不敢况臨諸臣乎以輕喻重也雖為天子所召不敢背殯而往况君喪未葬而行即位之禮以臨諸臣乎背音佩周人有喪魯人有喪周人弔魯人不弔周人曰固吾臣也使人可也魯人曰吾君也親之者也使大夫則不可也君至尊也去父之殯而往弔猶不敢况未殯而臨諸臣乎穀梁傳月正元日舜格于文祖月正正月元日上日也舜服堯喪三年畢將即政故復至文祖廟告文祖者堯文德之祖廟惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳冕冠也踰月即吉服右嗣君即位勉齋黃氏曰按即位之别有四正嗣子之位已見始死條下顧命有王麻冕黼裳道揚末命及康王之誥有惟豫一人釗報誥之語乃既殯之後嗣君即繼體之位之禮今附見於此若踰年合正改元之位三年合正踐祚之位如春秋元年書即位則是踰年正改元之位也月正元日舜格于文祖伊尹以冕奉嗣王歸於亳則是三年正踐祚之位也然崩薨之日或在嵗終則蓋有未殯而踰年者矣故踰年正繼體之位之禮遂無所附喪大記補經亦止于虞禮則三年之禮亦無所附今並列於此記之下其義則見於春秋傳注疏與喪禮及白虎通之説所當通考也居倚廬不塗君為廬宫之大夫士袒之宫謂圍障之也禪袒也謂不障于疏曰此論初遭喪君大夫士居廬之禮居倚廬者謂中門之外東墻下倚木為廬故云居倚廬不塗者但以草夾障不以泥塗之也君為廬宫之者謂廬外以帷障之如宫牆大夫士袒之者袒袒也其廬袒露不帷障也按既夕禮注云倚木為廬在中門外東方北户喪大記宫正大喪則授廬舍辨其親疏貴賤之居廬倚廬也舍堊室也親者貴者居倚廬疏者賤者居堊室雜記曰大夫居廬士居堊室舍疏曰云廬倚廬也者謂于門之外東壁倚木為廬云堊室也者舍對廬為堊室堊室者兩下為之與廬異故云堊室也云親者貴者居倚廬者親謂大功以上貴謂大夫已上者居倚廬云疏者賤者居堊室者疏謂小功緦麻賤謂士二者居堊室知義如此者以其經云辨其親疏貴賤眀當如此解之也又引雜記者彼是諸侯之臣其大夫居廬士居堊室彼注士居堊室亦謂邑宰也朝廷之士亦居廬右喪廬巾車王之喪車五乘木車蒲蔽大􅍜尾櫜疏飾小服皆疏木車不漆者鄭司農云蒲蔽謂嬴蘭車以蒲為蔽天子喪車之儀漢儀亦然大􅍜以大皮為覆笭故書疏為揟杜子春讀揟為妙元謂蔽車旁禦風塵者大白大皮既以皮為覆笭及以其尾為戈戟之韜粗布飾二物之側為之緣若攝服云服讀為箙小箙刀劍短兵之衣此始遭喪所乘為君之道尚微備姦臣也書曰以虎賁百人逆子釗亦為備焉揟嬴魯火反劉又音果笭力丁反劉又音泠揟本又作同思如反韜吐刀反緣恱絹反下同蔔音服素車棼蔽大􅍜素飾小服皆素素車以白土堊車也棼讀為薠麻以為蔽其􅍜服以素繒為緣此卒哭所乘為君之道益著在車可以去戈戟薠扶文反薻車薻蔽鹿淺􅍜革飾故書藻作􅠘杜子春􅠘讀為華藻之藻直為華藻也元謂藻水草蒼色以蒼土堊車以蒼繒為蔽也鹿淺􅍜以鹿夏皮為覆笭又以所治去毛者緣之此既練所乘􅠘音總又音藻李一音蒼會反駹車雚蔽然􅍜髤飾故書駹作龍髤為軟杜子春云龍讀為駹軟讀為黍也元謂駹車邉側有漆飾也雚細葦席也以為蔽者漆則成藩即吉也然果然也髤赤多黑少之色韋也此大祥所乘雚音九髤香求反軟音次漆音次音七垸胡玩反漆車藩蔽犴􅍜雀飾漆車黑車也藩今時小車藩漆席以為之犴胡罕反雀黑多赤少之色韋也此禫所乘右喪車外宗大喪則敘外內朝莫哭者內外宗及外命婦云疏曰經直云外內鄭內外宗及外命婦則內中以兼外宗外中不兼內命婦也經不云內外宗內外命婦者意欲見內是內宗舉內以見外其外中則不得舉外以見內以其內命婦九嬪敘之也故九嬪職云大喪師敘哭者注云后哭衆乃哭內命婦九嬪敘之故鄭亦不言內命婦春官世婦大喪比外內命婦之朝莫哭不敬者而苛罰之苛譴也夕疏曰大喪謂王喪殯後有朝哭事外命婦朝廷卿大夫士之妻內命婦九嬪以下以尊卑為位而哭而有不敬者則呵責罰之春官哭位條內有天子之喪别姓而哭肆師令序哭內宗序哭九嬪師序哭位此條通用當互考朝夕哭不帷緣孝子心欲見殯肂也既踊則施其㧁鬼神尚幽暗也雜記士􅍯入而后朝夕踊備猶盡也國君之喪嫌主人哭入則踊君疏曰此一莭論君喪羣臣朝夕踊哭之事􅍯盡也國喪嗣國孝子雖朝夕先入即位哭必待諸臣皆入列位畢後乃俱踊者也士畢最後故舉士入于畢也所入有前後而相待踊者孝子哀深故前入也踊須相視為節故俟齊也右朝夕哭司服大喪共其奠衣服奠衣服今座上魂衣也鄭疏曰守祧職云遺衣服藏焉云大斂之餘也至祭祀之時則出而陳于座上此則奠衣服者也陳小斂奠條內有封人飾牛牲等七官又陳大斂條內有司几筵設葦席素几皆此條所通用此條後凡奠通用當互考右朝夕奠籩人喪事共其薦籩羞籩謂殷奠時月疏曰殷猶大也大奠朔月半薦新祖奠遣奠之類也奠按士喪禮月半不殷奠注云士月半不復如朔月盛下等者疏云下遵者以下大夫以上有月半奠故士禮月半不殷奠而此有月半奠也設陳小斂條內有封人等七官陳大斂條內有司几筵葦席素几朝夕奠條內有司服共奠衣服皆此條通用此條凡後殷奠通用當考天子諸侯之喪斬衰者奠注見前右朔月月半殷奠按儀禮正經所載惟士喪禮而天子諸侯大夫之禮闕焉勉齋黃氏著儀禮經傳通解因小戴喪大記一篇合周禮禮記諸書以補其闕然後粲然可考今所敘國恤於黃氏禮書中撮取其専言天子喪禮處次第其節奏如前以見三代國哀之制然禮記所言君皆國君也其専言天子者無幾而注疏家以諸侯之禮通之於天子亦可槩見周禮所言雖皆天子之禮然惟職掌所及則載之而不關於職掌者無可考則亦豈無遺軼姑敘其所可知者爾自始死至殷奠敘于此而卜宅以至窆虞則敘于山陵條下至于與臣民通用之禮則自有黃氏専書更不贅述文獻通考卷一百二十
