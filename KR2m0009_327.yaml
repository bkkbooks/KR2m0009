body:
  text: 文獻通考卷三百二十七鄱陽馬端臨貴與著四裔考四扶桑扶桑國者齊永元元年其國有沙門慧深來至荆州説云扶桑在大漢國東二萬餘里地在中國之東其土多扶桑木故以為名扶桑葉似桐初生如笋國人食之實如梨而赤績其皮為布以為衣亦以為錦作板屋無城郭有文字以扶桑皮為紙無兵甲不攻戰其國法有南北獄若有犯輕罪者入南獄罪重者入北獄有赦則放南獄不赦北獄在北獄者男女相配生男八嵗為奴生女九嵗為婢犯罪之身至死不出貴人有罪國人大會坐罪人於坑對之宴飲分訣若死别焉以灰繞之其一重則一身屏退二重則身及子孫三重者則及七世名國王為乙祁貴人第一者為對盧第二者為小對盧第三者為納咄沙國王行有鼓角導從其衣色隨年改易甲乙年青丙丁年赤戊巳年黃庚辛年白壬癸年黑有牛角長以角載物至勝二十斛有馬車牛車鹿車國人飬鹿如中國畜牛以乳為酪有赤梨經年不壞多蒲桃其地無鐡有銅不貴金銀市無租估其婚法則壻往女家門外作屋晨夕灑掃經年而女不悅即驅之相悅乃成婚婚禮大抵與中國同親喪七日不食祖父母喪五日不食兄弟伯叔姑姊妹三日不食設坐神像朝夕拜奠不制縗絰嗣王立三年不親國事其俗舊無佛法宋大明二年罽賔國嘗有比邱五人遊行其國流通佛法經像教令出家風俗遂改女國女國慧深云在扶桑東千里其人容貌端正色甚潔白身體有毛髮長委地至二三月競入水則妊娠六七月産子女人胸前無乳項後生毛根白毛中有汁乳子百日能行三四年則成人矣見人驚避偏畏丈夫食鹹草葉似邪蒿而氣香味鹹梁武帝天監六年有晉安人渡海為風所飄至一島登岸有人居女則如中國人而言語不可曉男則人身而狗頭其聲如犬吠其食有小豆其衣如布築土為墻其形圜其户如竇文身文身梁時聞焉在倭國東北七千餘里人體有文如獸其額上有三文文大直者貴文小曲者賤土俗歡樂物豐而賤行客不齎糧有屋宇無城郭國王所居飾以金銀珍麗繞屋為塹廣一丈實以水銀雨則流於水銀之上市用珍寶大漢大漢梁時聞焉在文身國東五千餘里無兵戈不攻戰風俗並與文身國同而言語異侏儒國侏儒國人長四尺又南有黑齒國祼國去倭四千餘里船行可一年至又西南萬里有海人身黑眼白祼而醜其肉美行者或射而食之長人國長人國在新羅之東人類長三丈鋸牙鉤爪黑毛覆身不火食噬禽獸或摶人以食得婦人以治衣服其國連山數千里有峽固以鐡闔號關門新羅常屯弩士數千守之琉球琉球國居海島在泉州之東有島曰彭湖煙火相望水行五日而至土多山洞其王姓歡斯氏名渴剌兜不知其由來有國世數也彼土人呼之為可老羊妻曰多拔茶所居曰波羅檀洞塹柵三重環以流水樹棘為藩王所居舍其大一十六間雕刻禽獸多鬭鏤樹似橘而葉密條纎如髮之下垂國有四五帥統諸洞洞有小王往往有村村有鳥了帥並以善戰者為之自相樹立主一村之事男女皆以白紵繩纒髮從項後盤繞至額其男子用鳥羽為冠裝以珠貝飾以赤毛形製不同婦人以羅紋白布為帽其形方正織鬭鏤皮并雜毛以為衣製裁不一綴毛垂螺為飾雜色相間下垂小貝其聲如珮綴璫施釧懸珠於頸織藤為笠飾以毛羽有刀矟弓箭劍鈹之屬其處少鐡刀皆薄小多以骨角輔助之編紵為甲或用熊豹皮王乘木獸令左右輿之而導從不過十數人小王乘機鏤為獸形國人好相攻擊人皆驍健善走難死耐創諸洞各為部隊不相救助兩軍相當勇者三五人出前跳噪交言相罵因相擊射如其不勝一軍皆走遣人致謝即共和解收取鬭死者聚食之仍以髑髏將向王所王則賜之以冠便為隊帥無賦斂有事則均稅用刑亦無常凖皆臨事科決犯罪皆斷於鳥了帥不伏則上請於王王令臣下共議定之獄無枷鎖唯用繩縳決死刑以鐡錐大如筯長尺餘鑽頂殺之輕罪用杖俗無文字望月虧盈以紀時節草木榮枯以為年嵗人深目長鼻類於胡亦有小慧無君臣上下之節拜伏之禮父子同床而寢男子拔去髭鬚身上有毛處皆除去婦人以墨黥手為蟲蛇之文嫁以酒肴珠貝為聘或男女相悅便相匹偶婦人産乳必食子衣産後以火自灸令汗出五日便平復以木槽中暴海水為鹽木汁為酢米麴為酒其味甚薄食皆用手遇得異味先進尊者凡有宴會執酒者必得呼名而後飲上王酒者亦呼王名後銜杯共飲頗同突厥歌呼踏蹄一人唱衆皆和音頗哀怨扶女子上膊搖手而舞其死者氣將絶輿至庭前親賔哭泣相弔浴其尸以布帛纒縛之裹以葦席襯土而殯上不起墳子為父者數月不食肉其南境風俗小異人有死者邑里共食之有熊豺狼尤多豬雞無羊牛驢馬厥田良沃先以火燒而引水灌持一插以石為刃長尺餘闊數寸而墾之宜稻梁禾黍麻豆赤豆胡黑豆等木有楓栝松楩楠枌梓竹藤果藥同於江表風土氣候與嶺南相類俗事山海之神祭以殽酒戰鬭殺人便將所殺人祭其神或依茂樹起小屋或懸髑髏於樹上以箭射之或纍石繫幡以為神主王之所居壁下多聚髑髏以為佳人間門户上必安獸頭骨角隋大業元年海師何蠻等云每春秋二時天清風靜東望依稀似有煙霧之氣亦不知幾千里焬帝令羽騎尉朱寬入海求訪異俗得河蠻言遂與蠻俱往同到琉球國言語不通掠一人而反明年令寬慰撫之不從寬取其布甲而歸時倭國使來朝見之曰此夷邪久國人所用帝遣虎賁郎將陳稜等率兵自義安浮至髙華嶼又東行二日至鼊嶼又一日便至琉球不從稜擊走之進至其都焚其宫室虜其男女數千人載軍實而還自爾遂絶義安潮陽部也旁有毗舍耶國語言不通袒祼盱睢殆非人類宋淳熙間其國之酋豪嘗率數百輩猝至泉之水澳圍頭等村多所殺掠喜鐡器及匙筯人閉户則免但取其門環而去擲以匙筯則俯拾之可緩數步官軍擒捕見鐡騎則競剜其甲遂駢首就僇臨敵用鏢鏢以繩十餘丈為操縱蓋愛其鐡不忍棄不駕舟楫惟以竹筏從事可摺疊如屏風急則羣舁之浮水而逃女真女真蓋古肅慎氏世居混同江之東長白山鴨淥水之源南鄰髙麗北接室韋西界渤海鐵甸東瀕海後漢謂之挹婁元魏謂之勿吉隋唐謂之靺鞨隋開皇時曽入貢其族分六部有黑水部即今女真其水掬之則色微黑目為混同江江甚深然才闊百步唐貞觀中靺鞨來朝太宗問其風俗因言及女真之事自是中國始聞其名契丹目之曰慮真地多山林俗勇悍善射獸多野豬野牛驢之類出行以牛馱物遇雨將生牛革以禦之所居以樺皮為屋地多良馬常至中國貿易唐開元中其長來朝拜為勃利州刺史遂置黑水部以部長為都督朝廷為置長史監之訖唐世貢不絶五代時始稱女真後避契丹主宗真諱更為女直俗訛為女質安巴堅吞北方三十六蕃此其一也安巴堅慮其為患誘遷豪右數千家於遼陽南而著籍焉分其勢使不得與本國相通謂之哈斯罕哈斯罕者女真也又曰黃頭女真自咸州東北分界入宫口至束沫江中間所居者以𨽻咸州兵馬司與其國往來無禁謂之輝發輝發者非熟女真亦非生女真也自束沫江之北寧江之東地方千餘里户十餘萬無大君長亦無國名散居山谷間自推豪俠為君長小者千户大者數千則謂之生女真僻處契丹東北隅宋建隆二年遣使溫都爾來三年遣使濟古爾入朝貢方物四年八月遣使貢馬因詔真州曰沙門島人户等地居海嶠嵗有常租而女真逺涉鯨波多輸駿足當風濤之利涉假舟楫以為勞言念辛勤所宜蠲復自今特免逐年夏秋租賦麴錢及顔料雜物州縣差役止令多置舟楫濟渡女真馬往來其在船棧木自前抽納今後給與主駕人力乾德二年又來朝貢開寶二年首領錫沙哩并姪阿里哈首領馬薩結并妻美楞並遣使獻馬及貂皮三年遣使朝貢并齎定安國王烈萬華表以聞五年馬薩結并首領濟古爾來貢馬是年來冦白沙寨掠官馬五匹民一百二十八口於是詔止其貢馬者不令還是夏首領渤海郡三人入貢嘉其效順之意先留貢馬女真悉令放還俄又首領吉逹布來貢馬又有鐵利王子五户并母及子弟連沒六溫迪門沒勿羅附其使貢馬布腽肭臍紫青貂鼠皮太平興國六年又來朝貢雍熙四年契丹以書招之首領遣國人阿納爾持其書至登州以聞詔嘉答之淳化二年首領伊勒希等上言契丹去海岸四百里置三柵柵置兵三千絶其貢獻之路故泛海入朝求發兵與三十首領共平三柵若得師期即先赴本國聚兵以俟太宗但降詔撫諭而不為發兵是冬以渤海不通朝貢詔女真攻之凡獲一級以絹五匹為賞先是契丹伐女真女真衆裁萬人而弓矢精徑又有灰城以水淋之為堅冰不可上距城三百里燔其積聚設伏於山林間契丹既不能攻城野無所取遂引騎去大為山林之兵掩襲殺戮大中祥符三年契丹征髙麗道由女真女真復與髙麗合兵拒之契丹大喪師而還其年國人有為海風飄船至登州者詔給資糧遣歸七年將軍大千機隨髙麗使入貢館餼宴賜之禮並與髙麗使同八年復有使隨髙麗使至天禧三年首領蘇布特復至自言在道淹久所貢馬皆死詔給賜其直女真外又有五國曰圖埒曰佛寧曰溫都曰博和哩曰約尼皆與女真接境自天聖後役屬契丹不復入貢世襲節度使兄弟相傳又云其主本新羅人號完顔氏猶漢言王也女真服其練事以首領推之其先自堪布以下班班可紀堪布生烏嚕烏嚕生巴哈巴哈生綏赫綏赫生舒嚕舒嚕生烏古鼐烏古鼐三子伯曰和哩布叔曰頗拉淑季曰英格英格聚族帳最多謂之英格太師能用其人遂稱強諸部賦斂調發刻箭為號事急者三刻之官之尊者以九曜二十八宿為名職皆曰貝勒自五户推而上之至萬户皆自統兵緩則射獵宗室謂之郎君事無大小皆總之雖卿相亦拜馬前而不為禮役使如奴𨽻凡用兵以戈為前行號硬軍刀棓自副弓矢在後弓力不過七斗箭鏃至六七寸形如鑿入不可出非五十步不射其人十五百皆有長伍長擊柝十長執旗百長挾鼓千人將則旗幟金鼓悉備伍長戰死四人皆斬十長死伍長皆斬百長死十長皆斬將自執旗其下視所向無尊卑皆自馭馬粟粥燔肉為食上下無異品有大事適野環坐畫灰而議自卑者始議畢不聞人聲將軍發大會而飲使人獻策主帥擇而聽焉合者則為特將任其事師還又大會問有功者賞之金帛先舉以示衆衆以為少則增之守一州者許專決僚屬其有官者將決坐之廡間賜以酒尊者杖於堂上已決事如故和哩布四子長曰烏雅舒次曰阿固達次曰烏奇邁次曰舍音又言阿固達為英格之子英格陰懷二心契丹主洪基時識者知其必為東方患又恃功抑服旁近部族或誣以叛亡而取之多持金珠駔駿嵗時遺賂契丹用事臣如是十餘年終洪基朝未有以發也建中靖國元年英格死阿固達立先是女真嵗以北珠貂革名馬良犬及俊鷹海東青貢於契丹海東青者小而健能擒天鵝爪白者尤以為異出於五國之東契丹酷愛之然不能自致女真之東北與五國鄰每嵗大寒契丹必遣使來趣發甲馬數百入五國界即巢穴取之往往爭戰而得國人厭苦及契丹主延禧嗣位責貢尤苛至遣鷹坊子千輩越長白山羅取嵗甚一嵗女真不勝其擾又並邊諸帥東京留守黃龍尹每到官各邀禮物無藝極於是諸部皆有叛意延禧天慶二年釣魚於混同江凡生女真在千里內者以故事皆來會酒酣使諸人歌舞為樂阿固達獨端立直視辭以不能諭之再三訖不聽延禧欲以事誅之樞密使蕭奉先諫乃止四年八月阿固達遂叛用同族尼堪烏舍為謀主尼楚赫伊里羅索棟摩等為將帥敗髙仙夀蕭嗣先等軍五年延禧親征大敗又敗髙仙夀軍陷寧江州又破蕭嗣先軍於白江走張琳吳庸破武朝彥於徠流河女真之起率皆騎兵刻小木牌繫人馬為號每五十人為一隊前二十人被重甲持戈矛後三十人輕甲操弓矢每遇敵則兩人躍馬而出觀陳虛實然後四面結隊馳擊百步之外弓矢齊發勝則整陳緩追敗則復聚而不散其分合出入應變周旋人自為戰及延禧親征女真甚懼繼聞契丹下詔有剪除之語阿固達聚衆以刀刲面仰天而哭曰吾與汝輩起兵苦契丹之暴欲立國耳今乃欲盡行剪除非人人效死恐不能當不如殺我一族而降可轉禍為福諸人羅拜曰事已然願盡死以是戰無不勝髙永昌以渤海叛契丹阿固達初援之敗張琳奪瀋州已而復相攻斬永昌八年正月大敗耶律淳軍於徽州破乾顯等州而歸是年秋盡得遼東長春兩路始用鐵州降人楊朴策稱皇帝建元天輔以旻為名改國號大金以其國産金故也追尊堪布以下皆為帝政和七年朝廷聞女真得遼河地密遣使尋買馬舊好女真以報書方物同至又遣使詣契丹邀十事欲號大金國大聖大明皇帝玉輅衮冕玉寶以弟兄通問嵗分南宋賜幣之半割遼東長春兩路延禧會羣臣議即備冕旒册寶册為東懷皇帝楊朴謂儀物不全用天子之制却其使和議遂絶宣和二年童貫議欲倚之以復燕詔趙良嗣等往聘約夾攻契丹取燕雲阿固達許諾遂議嵗幣如契丹舊數四年正月取中京至古北口延禧奔雲中麯夾山金兵至雲中留守蕭扎拉出降乃急追延禧盡陷朔應諸州阿固達自其國提兵來遣使於我帝待之甚厚禮過遼使數倍命趙良嗣等報聘金以中間訊問斷絶責言但許燕薊六州十二月分三道入燕時契丹燕王淳自立於燕已死其妻蕭后遣使奉表稱臣而固守阿固達至居庸關契丹棄關走馬擴從軍行阿固達謂曰契丹疆土我得十九矣止燕京數州之地留與汝家我以大軍三面掩之令汝家俯拾猶不能取我初聞南軍到盧溝已有入燕者我心亦喜縱令汝家取之我亦將斂軍歸國近乃聞劉延慶一夕燒營而遁何至此耶似此喪師有何誅罰擴云兵折將死將折兵死延慶果敗雖貴亦誅阿固達曰若不行法何以使人汝觀我家用兵有走者否明日抵燕城蕭后已出奔宰相左企弓等迎降阿固達遣擴歸獻捷童貫既不能下燕懼獲罪密令趙良嗣禱金人圖之良嗣至燕金雖許六州而欲自取其租賦良嗣曰租賦隨地豈有與其地而不與稅者尼堪曰燕自我得之賦當歸我若不見與請速追涿易之師母留吾疆良嗣又往議至於再竟於契丹嵗幣外增一百萬緡而求西京五年四月童貫蔡攸入燕燕之子女玉帛職官富室皆席卷而東所得空城而已阿固達由雲中西巡且以朔武蔚三州歸我未幾病卒尼堪斡里雅布遙尊烏奇邁為帝更名晟改元天會諡阿固達曰大聖武元皇帝廟號太祖六年正月遣使告登位時朝廷納平州張覺金人已怨及談稹代童貫宣撫又不與所許粟愈益怒復取蔚州及飛狐靈邱兩縣絶山後交割之議鋭欲敗盟朝廷亟罷稹復用童貫使馬擴辛興宗使尼堪軍至雲中尼堪東歸烏舍攝元帥欲使擴庭參擴不可乃不果見及還貫問所見擴曰金訓習漢兵增飛狐之戍數指言張覺事邀索官民甚峻其心包藏叵測當速營邊備是嵗延禧自夾山領兵出武州烏舍與戰擒之遂滅契丹惟達實林牙與延禧之子梁王入於漠北七年五月來告捷假嵗幣中金帛二十萬詔遣許亢宗賀烏奇邁登位至徠流河所居館宴悉用契丹舊禮綵山倡樂尋橦角抵鬭雞擊鞠與中國不殊其國初無城郭四顧莽然民皆茇舍以居至是方營大屋數千間日役萬人規模稍宏侈矣九月河東奏尼堪還雲中經略南下詔童貫再行貫又遣馬擴往使令且交蔚應州及飛狐靈邱及境尼堪嚴軍以待止得吏卒三人從仍趣庭參首議山後事尼堪曰山後疆土初為大聖皇帝與趙皇跨海交好各立誓書萬世無斁不謂授地未畢貴朝先違約信今當略辨是非時尼堪為伊都輩所怵謂南朝可圖仍不必以衆因糧就兵可也又隆德府義勝軍易州常勝軍多叛降之得中國虛實欲決意南下十二月取朔武欣代四州遂圍太原靖康元年正月圍京師遣使約割太原中山河間三鎮之地以親王宰相為質須金帛以千萬計二月退師十一月乙酉復犯京師丙辰京城陷二年三月立張邦昌為帝二帝三宫北狩五月髙宗即位於南京十二月幸維揚尼堪諸酋分道入冦二年山東陜西相繼陷沒四年立劉豫為皇帝以舊河為界七年廢豫九年歸我陜西河南故地講和十月背盟南下復取陜西河南晟死亶立亶被弒亮立亮被弒雍立雍死璟立璟死允濟立允濟被弒珣立珣死守緒立自晟至守緒凡八世而亡其事迹具見國史以其既據有中原故事迹不入四裔之録云定安定安國本馬韓之種為契丹所攻破其酋帥糾合餘衆保於西鄙建國改元自稱定安國宋開寶三年其國王烈萬華因女真遣使入朝乃附表貢獻方物太平興國中太宗方經營逺略討擊不庭因降詔其國令張掎角之勢其國亦怨寇讎侵侮不已聞中國方用兵北討欲依王師以攄宿忿得詔大喜六年冬會女真遣使朝貢路由本國乃託其使附表來上云定安國王臣烏元明言臣本以髙麗舊壤渤海遺黎保據方隅涉歷星紀仰覆露鴻均之德被漸漬無外之澤各得其所以遂物性而頃嵗契丹恃其強暴入冦境土攻破城寨俘掠人民臣祖考守節不降與衆避地僅存生聚以迄於今而又夫餘府昨背契丹並歸本國災禍將至無大於此所宜受天朝之密畫率勝兵而助討必欲報敵不敢違命臣元明誠懇誠願頓首頓首其末題云元興六年十月日定安國王臣烏元明表上聖皇帝殿前上答以詔書令其發兵協力同伐契丹以詔付女真使令齎以賜之端拱二年其王子因女真使附獻馬雕羽鳴鏑淳化二年其王子大元因女真使上表其後不復至文獻通考卷三百二十七
