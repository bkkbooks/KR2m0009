body:
  text: 文獻通考卷一百三十六鄱陽馬端臨貴與著樂考九革之屬雅部陳氏樂書曰革去故以為器而羣音首焉其卦則坎其方則北其時則冬其風廣莫其律黄鍾其聲一其音讙冬至之器也先王作樂用之以為鼓之屬焉盖鞉所以兆奏鼓者也二者以同聲相應故祀天神以雷鼓雷鼗祭地祇以靈鼓靈鼗享人鬼以路鼓路鼗樂記亦以鼗鼓合而為徳音周官少師亦以鞉鼓升而鼓之也拊狀如革嚢實以糠擊之以節樂陳氏樂書曰拊之為器韋表糠裏状則類鼓聲則和柔倡而不和非徒鏗鏘而已書傳謂以韋為鼓白虎通謂革而糠是也其設則堂上虞書謂搏拊是也其用則先歌周禮所謂登歌令奏擊拊是也書曰搏拊眀堂位言搏拊者以其或搏或拊莫適先後也盖乗水者付之舟作樂者付之拊摶拊之摶従旉有父之用焉荀卿曰架一鐘而尚拊大戴禮曰架一磬而尚拊則拊設於一鐘一磬之東其衆器之父歟荀卿曰鼓其樂之君邪然鼓無當於五聲五聲不得不和其衆聲之君歟樂記曰會守拊鼓堂上之樂衆矣所待以作者在拊堂下之樂衆矣所待以作者在鼓盖堂上則門内之治以拊為之父堂下則門外之治以鼓為之君内則父子外則君臣人之大倫也而樂則實通而合和之此修身及家平均天下所以為古樂之發也與夫新樂之發獶襍子女不知父子豈不有間乎足鼓明堂位曰夏后氏之鼓足左傳曰椘伯棼射王鼓跗盖少昊冐革以為鼓夏后加四足焉周王兵車之鼓有跗豈亦夏制之遺歟楹鼓建鼓陳氏樂書曰明堂位曰殷楹鼓以周官考之太僕建路鼓於大寝之門外儀禮大射建鼓在阼階西南鼓則其所建楹也是楹為一楹而四稜也貫鼓於端猶四植之桓圭也荘子曰負建鼓建鼓可負則以楹貫而置之矣商頌曰置我鞉鼓是也魏晉以後復商置而植之亦謂之建鼓隋唐又棲翔鷺於其上國朝因之其制髙六尺六寸中植以柱設重斗方盖蒙以珠網張以絳紫繡羅四角有六龍竿皆䘖流蘓壁璜以五綵羽為飭竿首亦為翔鷺旁又挟鼙應二小鼓而左右然詩言應田縣鼓則周制應田在縣鼓之側不在建鼓旁矣縣鼓陳氏樂書曰鼓之制始於伊耆氏少昊氏夏后氏加四足謂之足鼓商人貫之以柱謂之楹鼓周人縣而擊之謂之縣鼓而周官鼓人晉鼓鼓金奏鎛師掌金奏之鼓鐘師以鼓奏九夏所謂縣鼓也禮曰縣鼓在西應鼓在東詩曰應田縣鼓則縣鼓周人所造之器始作樂而合乎祖者也以應鼓為和終之樂則縣鼓其倡始之鼓歟盖宫縣設之四隅軒縣設之三隅判縣設之東西李照謂西北隅之鼓合應鍾黄鍾大吕之聲東北隅之鼓合太簇夾鍾姑洗之聲東南隅之鼓合夷則南吕無射之聲依月均而考擊之於義或然議者非之踈矣且三代所尚之色夏后氏以黒商人以白周人以赤則鼓之色稱之亦可知矣三禮圖曰商人加左鞞右應以為衆樂之莭雷鼓雷鼗鼓人以雷鼓鼓神祀大司樂雷鼓雷鼗降天神之樂鄭司農云雷鼓雷鼗皆六面有革可擊康成註雷鼓雷鼗八面靈鼓靈鼗鼓人以靈鼓鼓社祭大司樂靈鼓靈鼗降地祇之樂鄭康成註靈鼓靈鼗六面路鼓路鼗鼓人以路鼓鼓鬼享大司樂路鼓路鼗降人鬼之樂鄭康成註路鼓路鼗四面宋仁宗眀道時改制大樂直史館宋祁上言縣設建鼓初不考擊又無三鼗且舊用諸鼓率多陋敝於是勅元等詳求典故而言曰建鼓四今皆具而不擊别設四散鼓於縣間擊之以代建鼓乾徳四年秘書監尹拙上言散鼓不詳所置之由且於古無文去之便時雖奏可而散鼓於今仍在又雷鼓靈鼓路鼓雖擊之皆不成聲故常頼散鼓以為樂節而雷鼗靈鼗路鼗闕而未製今既修正雅樂謂宜申勅大匠改作諸鼓使擊考有聲及創為三鼗如古之制使先播之以通三鼓罷四散鼓如乾徳詔書奏可時有上言以為雷鼓八面前世用以迎神不載考擊之法而太樂所製以柱貫中故擊之無聲更令改造山趺上出雲以承鼓刻龍以飭柱面各一工擊鼓一工左執鼗以先引凡圜丘降神六變初八面皆三擊推而左旋三歩則止三者取陽數也又載擊以為節率以此法至六成靈鼓路鼓亦如之建鼓植於四隅皆有左鞞右應乾隅左鞞應鍾亥之位也中鼓黄鍾子之位也右應大吕丒之位也艮隅左鞞太簇寅之位也中鼓夹鍾卯之位也右應姑洗辰之位也巽隅右應仲吕已之位也中鼓㽔賔午之位也左鞞林鍾未之位也坤隅右應夷則申之位也中鼓南吕酉之位也左鞞無射戍之位也宜随月建依律吕之均擊之詔可元豐三年詔議樂禮部侍郎范鎮上言太常無雷鼓靈鼓路鼓而以散鼓代之開元中有以盡圖獻者一鼓而八面六面四面明皇用之國朝郊廟或考或不考宫架中惟以散鼓代之不應經義安得為樂㢤不報陳氏樂書曰雷天聲也靈地徳也路人道也天神之樂六變而雷鼓雷鼗六面地祇之樂八變而靈鼓靈鼗八面人鬼之樂九變而路鼓路鼗四面者金之為物能化不能變鬼亦如之金非土不生以土之五加金之四此其樂所以九變歟鄭司農謂雷鼓雷鼗六面則是靈鼓靈鼗四面路鼓路鼗兩面非也古之人辯其聲用鼓人救日月以雷鼓則詔王鼓以救日月亦天事故也㝠氏攻猛獸以靈鼓敺之以攻猛獸亦地事故也司馬振旅王執路鼓太僕建路鼓於大寝之門外以達窮者與遽令以田獵達窮與遽令亦人事故也其所以不同者特不用鼗爾賜伯子男樂則以鼗将之者特不用鼓爾凡此三鼓皆設宫縣之四隅而擊之以節樂以鼓無當於五聲弗得不和故也聖朝景祐中太宗詔太常凡祀天神祀地祇享宗廟宫架毎奏降神四曲送神一曲先播鼗次鳴柷次擊散鼓凡三擊而樂作散鼓随樂毎間一字二擊之以為樂節凡樂終即播鼗戞敔散鼓相間三擊而止然以散鼓代雷靈路鼓用之至於升降等樂復不用鼗鼓臣恐未合先王雅樂也且舊制三鼓皆以木交午相貫以兩端為面故不能聲又竿首為木鳳焉聖朝詔為雷鼓八角冐革為一面承以槃軼轉以金樞髹朱繪雲冠柱以升龍作雷車之象靈鼓六路鼓四飭亦如之其所異者竿首作翔鷺趺作猛而已其為建鼓一也隋制路作鷺豈以竿首有翔鷺而遂誤之邪臣嘗論古者立鼗鼓之制祭祀則先播鼗以兆奏三鼓饗燕則先擊朔鼙以兆奏建鼓盖未嘗並用也後世祀天神祭地祇享人鬼並設建鼓鞞應於四隅又設雷鼓靈鼓路鼓於架内道之左右晉鼓於架内道之中間非先王異祭享别同異之意也雷鼓以馬革乾為馬故也靈鼓以牛革坤為牛故也䕫鼓昔東海流波之山有獸焉其音如雷命之為䕫黄帝得之以作鼓撅以雷獸之骨聲聞五百里以威天下盖有所傳聞然也唐掆鼓有靈䕫吼之曲豈夲此歟鼗麻鞞鞮料鞀鼗小鼓以木貫之有兩耳還自擊雷鼗三鼓靈鼗四鼓路鼗二鼓餘皆一鼓陳氏樂書曰鼓以節之鼗以兆之作樂之道也兆於北方則冬所以兆生物也八音兆於革音則鞉所以兆奏鼓也月令修鞀鞞世紀帝嚳命垂作鞀鞞釋名曰鞞禆也裨助鼓節也盖大者謂之鞞爾雅謂之麻以其音概而長也小者謂之鞀爾雅謂之料以其音清而不亂也盖鼓則擊而不播鼗則播而不擊雷鼓雷鼗六面而工十有二以二人各直一面左播鼗右擊鼓故也靈鼓靈鼗八面而工十有六路鼓路鼗四面而工八人亦若是歟商頌言置我鞉鼓則鞉與鼓同植非有播擊之異與周制差殊矣鬻子曰禹之治天下也縣五聲以聽曰語寡人以獄訟者揮鞀吕氏春秋曰武王有誡謹之鞀由是觀之欲誡者必播鞀鼓矣盖鞀兆奏鼓者也作堂下之樂必先鼗鼓者豈非樂記所謂先鼓以警誡之意歟漢以大鞀施於大儺亦一時制也後世無間焉鞞一夲作鞮國朝始詔復二鞉以備郊廟之樂亦可謂知復古矣鄭滑之東陽記晉嘗遣偏師謝咸攻東陽東陽岑山下民聞嶺上有鼓鞞聲若數萬人咸燒破潰而山鼓亦絶石勒少嘗耕毎聞鞞鐸之聲歸以告母母曰作勞耳鳴非不祥也鼖鼓陳氏樂書曰鼓之小者謂之應大者謂之鼖書顧命鼖鼓在西序周官鼓人鼖鼓鼓軍事司馬中春振旅諸侯執鼖鼓春秋傳曰師之耳目在吾鼓旗又曰一鼓作氣再而衰三而竭則以鼓鼓軍事其可忽乎司馬法千人之師執鼙萬人之師執大鼓䩵人鼓長八尺面四尺中圍加三之一謂之鼖鼓則所謂鼖鼓者大鼓而已鼖鼓軍事則晝以作衆之鼓非夜以警衆之鼜也鄭氏以鼜為鼖誤矣凡此非特用之以和軍旅雖節聲樂亦用之故詩言鼖鼓維鏞以文王能作大事考大功作樂以象其成也鼖鼓路鼓皆謂之大者路者人道之大鼖者人事之大國之大事在祀與戎故鬼享以路軍事以鼖鼛鼓考工記䩵人為臯鼓長尋有四尺鼓四尺倨勾磬折則臯鼓中髙而兩端下鼓鞚之形蠻上廣下狭詩曰鼛鼓弗勝又曰鼓鐘伐鼛盖鼛鼓所以鼓役事也晉鼓晉鼓其制大以短盖所以鼓金奏也鐘師以鐘鼓奏九夏鏄師掌金奏之鼓豈晉鼓歟司馬春振旅軍将執晉鼓吴與越戰載常建鼓韋昭謂建路楹而植之以木柱貫鼓下為趺上為横筍路鼓則刻鷺其顛而兩旁有流蘓晉鼓則否盖晉鼓之建於軍猶路鼓之建於寝也李照制晉鼓為樂節然晉鼓所以鼓金奏非所以節樂也提鼓大司馬春振旅師帥執提鄭氏曰馬上鼓有曲木提持鼓立馬髦上者故謂之提大鼜中鼜小鼜陳氏樂書曰鏄師凡軍之夜三鼜皆鼓之守鼜亦如之掌固曰夜三鼜以戒號鄭氏皆謂鼓之以鼖鼓然鼖雖鼓人用之以鼓軍事諸侯執之以振旅要皆非警夜之鼜鼓也司馬法曰昏鼓四通為大鼜夜半三通為晨戒平旦五通為發眀三鼜之制大致若此鄭氏之說不亦昩乎宋沈約樂志曰長丈二尺鼜鼓凡守備及役事鼓之其言守備則是及鼓役事則非也鼓人不云乎鼛鼓鼓役事曷嘗以鼜鼓合而一之乎盖役事上之所以役下警守下之所以事上役下必以仁未嘗不欲緩故以鼛鼓事上必以義未嘗不欲蚤故以鼜鼓鼜愷之樂比賔射為輕故眡瞭先言賔射而鼜愷獻亦如之然軍之警夜以鼜所以同憂戚也獻功以愷所以同和樂也惟能同憂戚然後可以同和樂故愷樂獻於社而眡瞭奏鐘鼓以樂之若然者人人孰不能出死斷亡而偷㢤朔鼓􅉧鼓周官小師凡小樂事鼓􅉧儀禮太射一建鼓在其南􅉧鼓朔鞞在其北有瞽詩曰應田縣鼓先儒以田為􅉧則朔鼙皆小鼓也以其引鼓故曰􅉧以其始鼓故曰朔後世樂府有左鼙右應之鼓設而不擊用四散鼓在縣四隅掌以為節不合儀禮之制革正之可也􅉧亦在縣亦名鼙應鼓陳氏樂書曰禮器曰縣鼓在西應鼓在東詩曰應田縣鼓爾雅曰小鼓謂之應盖堂下之樂以管為夲器之尤小者也應之為鼓鼙之尤小者也周官小師大祭祀下管擊應鼓徹歌大享亦如之是作樂及其小者乃所以為備也大師大祭祀擊拊鼓􅉧亦此意歟今夫祀天神以雷鼓雷鼗祭地祇以靈鼓靈鼗享人鬼以路鼓路鼗而又擊應鼓􅉧者當堂上擊拊之時則堂下擊應鼓􅉧以應之然後播鼗而鼓矣應施於擊拊又施於歌徹其樂之終始歟鼙鼓陳氏樂書曰鼙卑者所鼓也故周人論司馬所執五鼓推而上之王執路鼓鼓之尤大者也推而下之旅師執鼙鼓之尤小者也尊者執大卑者執小上下之分也司馬法曰萬人之師執大鼓千人之師執鼙儀禮大射應鼙在阼階西建鼓之東朔鼙在西階西建鼓之北鼙與鼓其聲皆以讙為主及北建而用之則鼙常在其左矣古之奏樂先擊西朔而東鼙應之是朔鼙倡始者也應鼙和終者也禮圖謂商人加左鼙右應為衆樂之節盖不考儀禮左應右朔之過也鼙或鼓在卑上於鼓為卑故也或革在卑右以其上革故也革之屬胡部羯鼓羯鼓龜兹髙昌踈勒天竺部之樂也其状如漆桶下承以牙床用兩杖擊之其聲噍殺明烈合太簇一均在雞婁鼓之上都曇答臘之下唐明皇素達音律尤善於此嘗謂羯鼓八音之領神自制曲以奏之宋璟亦謂明皇曰頭如青山峯手如白雨㸃此則羯鼓之能事也羯鼓中大周正樂所傳羯鼓之制其色尚赤上無帶下無座盖與唐代樂圖後世教坊者異矣世俗亦謂之兩杖鼓羯鼓下兩杖鼓羯鼓之制用山桑棬用銅鐡杖用黄檀狗骨花楸然鐡不精練棬不至匀則應絛髙下紐捩不停鼓面緩急若琴暉之頑病者矣杖不絶濕氣而復柔膩則其聲不能發越而響亮戰褭而健舉矣曺嗣王臯為荆南節度有客懐二棬見之臯捧而嘆曰此至寳也必開元中供御棬也已而問之果得於髙力士矣杜鴻漸為三川副元帥成都匠者有以二杖獻之鴻漸示於衆曰此尤物也必常衣襟下收之積時也已而問之果養之脊溝中二十年矣李琬為䨇流縣丞嘗至長安夜聞羯鼓聲曲頗妙謂鼓工曰君所擊者豈非邪婆色雞乎雖至精能然而無尾何也工大異之曰君固知音者具言所以琬曰夫邪婆色雞掘柘急徧觧之工如所教果得諧協而盡其聲矣如柘枝用輝脫觧甘州用結了頭觧之類是也由是觀之深於羯鼓者不過此三人耳豈非用志不分乃凝於神然邪唐明皇遇中春殿庭景物明媚栁杏將吐因謂勝槩若此安可不賞獨髙力士遣取羯鼓上自製春光好詞臨軒奏擊神思自得栁杏頓坼謂左右曰不以我為天公得乎又製秋風髙毎至秋空逈徹奏之逺風儵来庭葉紛墜其妙絶如此檐鼓檐鼓西凉髙麗之器也状如甕而小先冒以革而漆之是其制也都曇鼓都曇鼓扶南天竺之器也其状似腰鼓而小以小槌擊之毛員鼓毛員鼓其制類曇而大扶南天竺之樂器也答臘鼓答臘鼓龜兹疎勒之器也其制如羯鼓抑又廣而短以指揩之其聲甚震亦謂之鼓也後世教坊奏龜兹曲用焉答臘鼓中中答臘鼓大周正樂用之答臘鼓下唐樂圗所傳龜兹疎勒部用之其制大與後世教坊者相類特其設色異耳雞婁鼓上雞婁鼓其形正而圎首尾所擊之處平可數寸龜兹踈勒髙昌之器也雞婁鼓下後世教坊奏龜兹曲用雞婁鼓左手持鼗牢腋挟此鼓右手擊之以為節焉其形如甕腰有環以綬帶係之腋下齊鼓上齊鼓状如漆桶一頭差大設齊於鼓面如麝臍然西凉髙麗之器也齊鼓下大周正樂所傳齊鼓其形状雖不甚相逺其設飭不同兩頭貫以綬帶漢鼓震鼓震鼓之制廣首而纎腹即杖鼓也漢人所用之鼓魏鼓杖鼓正相鼓和細腰鼓鼓鼓昔苻堅破龜兹國獲羯鼓鼓杖鼓腰鼓漢魏用之大者以瓦小者以木類皆廣首纎腰宋蕭思話所謂細腰鼓是也唐有正鼓和鼓之别後周有三等之制右擊以杖左拍以手後世謂之杖鼓拍鼓亦謂之魏鼓毎奏大曲入破時與羯鼓大鼓同震作其聲和壮而有節也今契丹拍鼓如震鼓而小鞉牢鞉牢龜兹部樂也形如路鞉而一柄疊三枚焉古人嘗謂左手播鞉牢右手擊雞婁鼓是也密湏鼓左傳云分唐叔以宻湏之鼓又曰宻湏之鼓與其大輅文王所以大蒐也鼓拌風土記越俗飲燕即鼓拌以為樂取大素圓拌以廣尺五六者抱以着腹以右手五指更彈之以為節舞者揲地擊掌以應拌節而舞焉革之屬俗部掆鼓小鼓上有盖隋大駕鼓吹有掆鼓長三尺朱髹其上工人青地苣文大業中煬帝燕享用之唐開元禮義羅曰掆鼓小鼓也按圖鼓上有盖常先作之以引大鼓亦猶雅樂之奏􅉧與金鉦相應皆有曲焉律書樂圗云掆鼓一曲十揲一曰驚雷震二曰猛虎駭三曰摯鳥擊四曰龍媒蹀五曰靈䕫吼六曰鵰鶚争七曰壮士奮怒八曰熊羆哮吼九曰石盪崖十曰波盪壑並各有辭其辭無傳焉太常鼓吹前部用之羽葆鼓上有丹青羽葆隋書鼓吹車上施層樓四角金龍垂流蘓羽葆唐羽葆之制縣於架上其架飭以五采流蘓植羽也盖鐃鼓羽葆鼓皆飭以丹青形制頗類掆鼓今太常鼓吹後部用之律樂圗云羽葆一部五色十八曲一大和二休和三七徳四騶虞五基王化六纂唐風七厭災精八肇皇運九躍龍飛十珍馬邑十一興晉陽十二濟渭陰十三應聖期十四御宸極十五寧兆庶十六服􅜯荒十七龍池十八破陣樂然則羽葆其節奏如此而已破陣終焉豈後世賞軍功之樂邪昔陶侃平蘓峻除侍中太尉加羽葆鼓吹則其為賞功之樂可知矣今鼓吹騎従者自羽葆鼓等皆馬上擊之其制與隋唐異矣警鼓傳曰嚴警鼓一十二面大将營前左右行列各六面在纛後故大周正樂謂凡鼓施於邊徼謂之警鼓昔椘厲王有警鼓與百姓為戒既而飲酒太過而擊民大驚使人止之居數月警而擊之民莫有起者然則警衆之鼓可不慎其所擊哉隋大業中煬帝制宴享設鼓吹夜警用一曲俱盡次奏大鼓然不和非宴享所當用也鐃鼓五采重盖唐六曲曰凡軍鼓之制有三一曰銅鼓二曰戰鼓三曰鐃鼓其制皆五采為蓋究觀樂圗鐃鼓鼓吹部用之唐朝特設為儀而不擊爾然劉瓛定軍禮謂鼓吹未知其始漢以雄朔野而有之鳴笳以和簫非八音也隋大業中鐃鼓十二曲供大駕六曲供皇太子三曲供王公宴享所用也觀漢鼓吹鐃歌十八曲晉有鼓吹鐃歌古辭十六篇宋有鼓吹鐃歌十萹然則鐃鼓豈非鼓吹鐃歌之鼓邪唐自鐃鼓以下屬鐃鼓部律書樂圗云鐃軍樂也其部四也七曲一曰破陣樂二曰上車三曰行車四曰向城五曰平安六曰懽樂七曰太平各有記也節鼓節鼓不詳所造盖拊與相二器之變也江左清樂有節鼓状如奕局朱髹畫其上中間圎竅適容鼓焉擊之以節樂也自唐以来雅樂聲歌用之傅休奕節鼓賦曰鐄鍾鳴歌九韶興舞口非節不詠手非節不拊是也隋制節鼓上自大駕中自皇太子下達正一品並朱漆畫飭以葆羽其曲十有二唐六典用之所以興止登歌之樂如縣内之柷敔其制五采重盖青樂部以之今太樂升歌用之或以為齊鼓非也鷺鼓畫鷺於鼓鞚鷺鼓精也魯頌振振鷺鷺於飛鼓咽咽醉言歸古之君子仕於伶官傷頌聲之不作故飭鼓以鷺欲其流風存焉或言晉移雷鼓建康宫之端門有䨇鷺哾鼓而飛於雲末或言孫恩破雷門鼓見白鵠飛去俱近乎怪鸖鼓制如鷺鼓唐宫縣之樂有鼗四座而鷺居其一齊武帝夀昌畫殿南閣置白鷺鼓吹二部大周正樂鷺一作鸖二鼓於樂録見之矣鼉鼓建鞚鞚畫鼉頭鼉鼓之名見於詩之靈臺詩人託之其鳴逢逢為靈徳之應非實鼓也司馬相如上林賦曰建靈鼉之鼓然其制不得而詳知連鼓唐張文収燕樂有之今太常鼓吹後部用之方鼓方鼓八面如杖鼓唐大歴中司馬㴞進廣平樂作鼓應黄鍾一均聲朝鼓諫鼓朝鼓有木可提執施於朝則登聞之鼓敢諫之鼓是也昔人有諫鼓之歌盖本諸此大鼓後世大鼓古鼖鼓也其制長八尺唐六典曰凡大駕鼓吹並朱漆畫之是也龍匝鼓鞚其下有趺昔吴王夫差啓蛇門以厭越越人為雷門以攘之擊大鼓於雷門之下而蛇門聞焉唐徳宗自山南還宫而關輔有懐光吐蕃之虞詔太常習樂去大鼓至鄭餘慶為卿始奏復用大鼓今太常鼓吹奏嚴用之雖所以節曲亦所以待暴也常用大鼓葆羽周鞞者十人之長執錞百人之師執鐸千人之師執鼙萬人之将執大鼓隋制大駕用大鼓飭以葆羽工人皂地苣文皇太子王公亦得用之故大駕十五曲皇太子十二曲王公十曲今教坊用焉律書樂圗云大鼓十五曲内三曲嚴用第一曰元麟合邏第二曰元麟他固第三曰元麟䟦至慮餘十二曲警用第一曰元咳大至遊第二曰阿列乾第三曰破達折利紇第四曰賀羽真第五曰鳴都路第六曰勃鳴路䟦第七曰雷折槌第八曰元咳赤頼第九曰赤頼第十曰吐該乞物真第十一曰貪失利第十二曰賀粟胡真中鼓小鼓鼓上負一鼓卧之隋志皇太子有大鼓小鼓而無金鐲大鼓長鳴工人紫帽緋袴褶小鼓中鳴工人青帽青袴褶正一品大鼓長鳴工人紫帽赤布袴褶小鼓中鳴工人青帽青布袴褶世有龍頭大掆中鼓獨掲小鼓随品秩焉掆鼓浪反掲音桀唐樂圖其制有一大鼓鼓上負一小鼓皆卧之律書樂圗云小鼓九曲焉上用八曲嚴警用並屬鼓吹部也第一曲曰漁陽二雞子三警鼓四三鳴五合節六覆七歩八南陽會星九單謡抱鼓桴鼓桴鼓唐燕樂有之其制如大鼓下有趺今太常鐃吹前部用之一曰抱鼓也傳曰在村墅曰抱鼓抱一作桴調擊鼓也交龍鼓以交龍為筍虡下有趺中縣鼓今太常鼓吹部宣徳門外肆赦日用之三杖鼓頭鼓聒鼓和鼓三杖鼓非前代之制唐咸通中有王文舉尤好弄三杖打撩萬不失一近世民間尤尚此樂其器有三等與歌者句拍相附為節一曰頭鼓其形類鞉歌者左右執之以發歌二曰聒鼓􅣠其聲在二鼓之間三曰和鼓此二鼓最大相和成聲其要在乎杖也頭鼓有柄兩耳如鞉聒鼓和鼓有柄無兩耳雲花黄鼓雲花白鼓天子郊祀廟享用雲花黄衣鼓四山陵用雲花白衣鼓二吉凶禮也青鼓赤鼓黒鼓北齊諸州鎮戍各給鼓吹工之多寡以大小等級為差諸王為州給赤鼓皇子増給青鼓上刺史給赤鼓中州以下及諸鎮戍給黒鼓皆有衣角亦如之宋朝沿襲斯制諸州鎮戍未嘗不給鼓角第其色之同異未純於北齊之制也顙鼓其虡如建鼓一本貫之四旁流蘓頂刻白鷺其下縣三鼓唐宫縣之樂四角鼗鼓四座一曰應鼓四旁有小鼓謂之􅉧鼓二曰顙鼓三曰鷺鼓四曰雷鼓皆彩畫其上各安寳輪用彩翠飭之其樂工皆戴平幘衣緋大袖毎色十二人於樂縣内作謂之坐部伎也熊羆鼓上熊羆鼓其形製小而有架具羽葆流蘓之飭唐樂圗所傳羽葆部熊羆十二案用之熊羆鼓下虡如衣架中縣鼓此鼓今太常熊羆十二案用之非古也與唐樂圗所傳制度異矣漏鼓街鼓梁朝宫殿門夜漏盡擊漏鼓以開夜漏上水一刻擊漏鼓以閉五更三籌正衙門擊鼓諸街迎擊小鼓使聲徹皇墻諸門為朝士入朝之節毎正衙開閉及止鼓亦凖此唐鼓後世堂上樂用之未詳所起然為是鼓者盖不知堂上之樂有拊而無鼓矣黄鍾鼓春秋感精符冬日至人主與羣臣左右縦樂五日乃使八能之士撞黄鍾之鐘擊黄鍾之鼓公卿大夫列士亦使八能之士擊黄鍾之鼓鼓黄鍾之瑟吹黄鍾之律則天地之氣以和應黄鍾之音矣亦應時造理之樂也夏至鼓冬至鼓易通卦驗曰冬至鼓用馬革圎徑八尺一寸夏至鼓用牛皮圎徑五尺七寸先王之制未必如此其異帝王世紀曰黄帝殺䕫以其皮為鼓聲聞五百里然則古之冐鼓者亦不必牛馬之皮雖䕫皮亦用之矣聖鼓盛宏之荆州記陽山縣有豫章木可二丈號為聖木秦人伐為鼓顙顙成忽奔逸至桂陽又王韶之始興記息於臨武遂之洛陽因名聖鼓城亦近乎怪云散鼓宋朝初載宫縣之樂設建鼓於四隅徒用為儀而不擊設散鼓四以代之非古制也景祐中易之以三等鼗鼓之制可謂近古矣教坊鼓其制如大鼓蟠龍匝鞚有架有趺今教坊所用鼓制如此撫拍大周正樂有撫拍以韋為之實之以糠撫之以節樂也豈摶拊之變體歟摶拊以作樂所以發中聲而已未聞用之以節樂也撫拍之制其去古逺矣青角赤角黑角革角長五尺形如竹筒本細末大唐鹵簿及軍中用之或以竹木或以皮非有定制也侯景圍䑓城嘗用之大抵胡部俗部通用之器也北齊諸州鎮戍各給鼓吹諸王給赤鼓赤角皇子増給吳鼓長鳴角上州刺史給青鼓青角中州以下及諸州鎮戍給黑鼓黑角器皆有衣並同鼓色焉文獻通考卷一百三十六
