body:
  text: 文獻通考卷三百三十七鄱陽馬端臨貴與著四裔考十四于闐于闐漢時通焉都葱嶺之北二百餘里去長安九千七百里户三萬二千東北至都䕶治所三千九百里南與婼羌接北與姑墨接東北去龜兹千四百里東去鄯善千五百里西通皮山國四百里去東朱俱波國千里西北至疎勒國千五百里其國之西水皆流注西海其東水東注鹽澤即蒲昌海國有阿耨達山據漢書河源出焉名首㧞河亦名樹㧞河或云即黄河也此海七百里入計戌水一名計首水即葱嶺南河同入鹽澤或云阿耨達即崑崙山風俗物產與龜兹畧同後漢建武末莎車王賢强盛攻并于闐徙其主俞林為驪歸王以莎車將軍居徳為于闐王明帝永平中居徳死後于闐將休莫覇自立為王休莫覇死兄子廣徳立後遂滅莎車其國轉强盛從精絶西北至疎勒十三國皆服從而鄯善王亦始强盛自是南道自葱嶺以東唯此二國為大順帝時遣侍子詣闕貢獻元嘉時漢所遣長史王敬入于闐矯詔殺其王建為于闐將輸僰等所殺將討之後竟不能出兵于闐恃此遂驕後魏眞君中太武討吐谷渾慕利延慕利延遂西入于闐殺其王死者甚衆獻文末蠕蠕寇于闐于闐遣使上表曰西方諸國今皆已屬蠕蠕奴世奉大國至今無異故遣使奉獻遙望救援自後每使朝獻梁武帝時凡四遣使通江左獻方物及琉璃甖刻玉佛周建徳三年遣使獻名馬隋大業中頻遣使朝貢時其王姓王氏錦帽金裝冠髮不令人見俗云見王髮年必儉國地方亘千里所都城方八九里部内有大城五小城數十山多美玉有好馬駝騾其刑法與中國畧同風俗物業與龜兹同俗重佛法寺塔僧尼甚衆王尤信尚每設齋日必親自洒掃饋食于闐西五百里有比摩寺云是老子化胡成佛之所云老子至此白日昇天與羣胡辭訣言我暫游天上尋當下生其後出天竺國化為胡王太子自稱曰佛因立此寺俗無禮義多盗賊淫縱自髙昌以西諸國人等深目髙鼻唯此一國貌不甚胡頗類華夏其後并有漢戎盧杅彌渠勒皮山精絶五國故地其居曰西山城勝兵四千人有玉河國人夜視月光盛處必得美玉王居繪室俗機巧言迂大喜事祅神浮屠法然貌恭謹相見皆跪以木為筆玉為印凡得問遺書戴於首乃發之自漢武帝以來中國詔書符節其王傳以相授人喜歌舞工紡織西有沙磧䑕大如蝟色類金出入羣䑕為從初無桑蠶丐鄰國不肯出其王即求婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶帽絮中關守不敢驗自是始有蠶女刻石約無殺蠶蛾飛盡得治繭王姓尉遲氏名屋密本臣突厥唐貞觀六年遣使者入獻後三年遣子入侍阿史那社爾之平龜兹也其王伏闍信大懼使子獻槖駝三百其後隨使者入朝請以子弟宿衛上元初身率子弟酋領七十人來朝擊吐蕃有功帝以其地為毗沙都督府析十州授伏闍雄都督死子璥立開元時獻馬駝豽璥死復立尉遲伏師戰為王死伏闍達嗣立死子珪嗣珪死子勝嗣至徳初以兵赴難因留宿衛乾元三年以其弟葉護曜權知本國事以後絶不復至晉天福三年其王李聖天自稱唐之宗屬遣使來貢髙祖遣供奉官張匡鄴髙居誨等入其國冊聖天為大寳于闐國王匡鄴等自靈州行二年至于闐七年乃還頗記其往來所見山川而不能道聖天世次也居誨記曰自靈州過黄河行三十里始涉沙入党項界曰細腰沙神樹沙至三公沙宿月支都督帳自此沙行四百餘里至黑堡沙沙尤廣遂登沙嶺沙嶺党項牙也其酋曰捻崖天子渡曰亭河至涼州涼州西行五百里至甘州甘州回鶻牙也其南山百餘里漢小月支之故地也有别族號鹿角山沙陀云朱邪氏之遺族也自甘州西始涉磧磧無水載水以行甘州人教晉使者作馬蹄木澁四竅馬蹄亦作四竅而綴之駝蹄則包以釐皮乃可行西北五百里至肅州渡金河西百里出天門關又西百里出玉門關經吐蕃男子冠中國帽婦人辮髮戴瑟瑟云珠之好者一珠易一良馬西至𤓰州沙州二州多中國人聞晉使者來其刺史曹元深等郊迎問使者天子起居𤓰州南十里鳴沙山云冬夏殷殷有聲如雷云禹貢流沙也又東南十里三危山云三苗之所竄也其西渡都鄉河曰陽關沙州西曰仲雲族其牙帳居胡盧磧云仲雲者小月支之遺種也其人勇而好戰𤓰沙之人皆憚之胡盧磧漢明帝時征匈奴屯田於吾盧蓋其地也地無水而常寒多雪每天暖雪銷乃得水匡鄴等西行入仲雲界至大屯城仲雲遣宰相四人都督三十七人候晉使者匡鄴等以詔書慰諭之皆東向拜自仲雲界西始涉磧無水掘地得濕沙人置之胸以止渴又復渡陷河伐檉置水中乃渡不然則陷又西至紺州紺州于闐所置也在沙州西南云去京師九千五百里矣又行二日至安軍州遂至于闐聖天衣冠如中國其殿皆東向曰金冊殿有樓曰七鳯樓以葡萄為酒又有紫酒青酒不知其所釀而味尤美其食粳沃以蜜粟沃以酪其衣布帛有園圃花木俗喜鬼神而好佛聖天居處嘗以紫衣僧五十人列侍其年號同慶二十九年其國東南曰銀州盧州湄州其南千三百里曰玉州云漢張騫所窮河源出于闐而山多玉者此山也漢乾祐元年復遣使入貢宋建隆二年十二月聖天遣使貢圭一以玉為柙使者言國城東有白玉河西有綠玉河次西有烏玉河源出崑崙山去國城西千三百里每歳秋水小之後國人取玉於河謂之撈玉官取之後方許私取以葡萄醖為酒味極醇美乾徳三年五月于闐僧善名善法來朝賜紫衣其冬又有朝使至四年貢方物開寳二年遣使來貢且言本國有玉一塊凡二百三十七斤願以上進乞遣使取之四年其國王書來言破踈勒國得舞象一欲以為獻詔俱許之大中祥符二年其國黒韓王遣回鶻羅厮温等以方物來貢跪上壽上詢其在路幾時去此幾里對曰涉道一年晝行暮息不知里數昔時道路嘗有剽刦今自𤓰沙至于闐道路清謐行旅如流願遣安撫逺俗上曰路逺命使益以勞費爾國今降詔書汝賫往亦與命使無異也天聖三年遣使來貢玉鞍轡白玉帶胡錦獨峯槖駝乳香硇砂詔給還其直别賜襲衣金帶銀器嘉祐八年八月遣使貢方物十一月以其國王為特進歸忠保順􅠫麟黒韓王于闐謂金翅鳥為􅠫麟黒韓蓋可汗之訛使言其王乞此號云熙寧以來逺不踰一二歳近則歳再至所貢珠玉珊瑚翡翠象牙乳香木香琥珀花蕊布硇砂龍鹽胡錦玉鞦轡馬腽肭臍金星石水銀安息雞舌香有所持無表章者每賜以暈錦旋襴衣金帶器幣宰相則盤毬雲錦夾襴地產乳香來輒羣負私與商賈牟利不售則歸諸外府得善價故其來益多元豐初始詔唯賫表及方物馬驢乃聴詣闕乳香以無用不許貢四年遣蕃部阿辛上表稱于闐國僂儸有福力知文法黒汗王書與東方日出處大世界田地主漢家阿舅大官家大畧云路逺傾心相向前三遣使入貢未回重復數百言董氈使導至熙州譯其辭以聞詔前三輩使人皆已朝見錫賚遣發賜勅書諭之神宗嘗問其使去國歳月所經何國及有無鈔掠對曰去國四年道途居其半歴黄頭回紇達靼青唐唯懼契丹鈔掠耳因使之圖上諸國距漢境逺近為書以授李憲八年九月遣使入貢使者為神宗飯僧追福賜錢百萬還其所貢獅子元祐中以其使至無時令熙河間歳一聴至闕八年諸討夏國不許紹聖中其王阿忽都董娥密竭篤又言緬藥家作過别無報效已遣兵攻甘沙肅三州詔厚答其意知秦州游師雄言于闐大食拂菻等國貢奉般次踵至有司憚於供賚抑留邊方限二歳一進夷狄慕義萬里而至此非所以來逺人也從之自是訖於宣和朝貢不絶疎勒疎勒漢時通焉王治疎勒城去長安九千三百里户千五百都白山南百餘里東至都尉所二千二百里南有河西帶葱嶺亦名雪山在國西北百餘里河所出東去龜兹千五百里西去撥汗國一名判汗千里當大月氐大宛康居道南去莎車五六百里北去朱俱波八九百里隋史云東北去突厥牙帳千餘里東南去𤓰州四千六百里在于闐國北千五百里土多稻粟蔗銅鐵綿錦雌黄後漢明帝永平中龜兹王建攻殺疎勒王成自以龜兹左侯兜題為疎勒王漢遣班超刦縛兜題而立成之兄子忠為疎勒王忠後叛反超擊斬之耿恭為戊巳校尉屯車師後王金滿城為匈奴所攻恭引衆入疎勒城中乏水穿井十五丈不得水恭整衣冠向井拜㧞刀刺山飛泉湧出賊遂退安帝元初中疎勒王安國死舅臣盤立為王漸以强盛户至二萬一千順帝永建二年遣使奉獻至靈帝建寧初為季父和得所殺自立為王其後連相殺害漢不能復禁至後魏文成末其王遣使送釋迦牟尼佛袈裟一長二丈餘帝以其審是佛衣當有靈異命焚之置猛火上終日不燃其王戴金獅子冠每歳嘗供送於突厥其都城方五里國内有大城十二小城數十人手足皆六指產子非六指者即不育勝兵有二千人地多沙磧少壤土俗尚詭詐生子亦束頭取匾其人文身碧瞳王姓裴氏自號阿摩支居迦師城突厥以女妻之隋大業中又遣使來唐貞觀九年獻名馬又四年與朱俱波甘棠貢方物儀鳯時吐蕃破其國開元十六年遣大理正喬夢松等冊其君安定為疎勒王天寳十二載首領裴國良來朝授折衝都尉賜紫袍魚袋杜環經行記云㧞汙那國在怛邏厮南千里東隔山去疎勒二千餘里西去本國千餘里城有數十兵有數萬唐天寳十載嫁和義公主於此國土有波羅林林下有毬場又有野䑕遍滿山谷偏宜葡萄馣羅果香棗桃李從此國至西海盡居土室衣羊皮疊布男女皆着靴婦人不飾鉛粉以青黛塗眼而已馣音諳烏孫烏孫國大昆彌治赤谷城烏孫於西域中其形最異今之西域青眼赤鬚狀類彌猴者本其種去長安八千九百里户十二萬口六十三萬勝兵十八萬八千八百人相大祿左右大將二人侯三人大將都尉各一人大監二人大吏一人舍中大吏二人騎君一人東至都護治所千七百二十一里西至康居蕃内地五千里地莽平多雨寒山多松樠莽平謂有草莽而平也樠木名其心似松不田作種樹隨畜逐水草與匈奴同俗國多馬富人至四五千匹民剛惡貪狠無信多寇盗最為强國故服屬匈奴後盛大取覊屬不肯往朝會東與匈奴西北與康居西與大宛南與城郭諸國相接本塞地也大月氐西破走塞王塞王南越懸度大月氐居其地後烏孫昆莫擊破大月氐大月氐徙西臣大夏而烏孫昆莫居之故烏孫民有塞種大月氐種云始張騫言烏孫本與大月氐共在燉煌間今烏孫雖强大可厚賂招令東居故地妻以公主與為昆弟以制匈奴乃令騫齎金幣往昆莫見騫如單于禮謂自比以單于騫大慙謂曰天子致賜王不拜則還賜謂將賜物還歸漢也昆莫起拜其他如故初昆莫有十餘子中子大祿强善將將衆萬餘騎别居大祿兄太子太子有子曰岑陬子侯反太子蚤死謂昆莫曰必以岑陬為太子昆莫哀許之大祿怒乃收其昆弟將衆叛謀攻岑陬昆莫與岑陬萬餘騎令别居昆莫亦自有萬餘騎以自備國分為三大總覊屬昆莫騫既致賜諭旨曰烏孫能東居故地則漢遣公主為夫人結為昆弟共距匈奴不足破也烏孫逺漢未知其大小又近匈奴服屬日久其大臣皆不欲徙昆莫年老國分不能専制乃發使送騫併獻馬數十匹報謝其使見漢人衆富厚言其國其國後乃益重漢匈奴聞其與漢通怒欲擊之又漢使烏孫乃出其南抵大宛月氐相屬不絶烏孫於是恐使使獻馬願得尚漢公主為昆弟天子問羣臣議許曰必先納聘然後遣女烏孫以馬千匹聘漢元封中遣江都王建女細君為公主以妻焉賜乗輿服御物為備官屬宦官侍御數百人贈送甚盛烏孫昆莫以為右夫人匈奴亦遣女妻昆莫昆莫以為左夫人其國謂王曰昆彌亦曰昆莫公主至其國别治宫室而居歳時一再與昆莫㑹置酒飲食昆莫年老言語不通公主悲愁自作歌以述意天子聞而憐之間歳遣使者贈遺昆莫年老欲使其孫岑陬尚公主公主不聴上書言狀詔從其俗岑陬遂妻公主昆莫死岑陬立岑陬者官號也名軍須靡公主死漢復以楚王戊之孫解憂為公主妻之岑陬死季父子翁歸靡立號曰肥王復尚解憂公主宣帝初公主及昆彌上言匈奴連歳侵擊欲𤼵國中精兵自給人馬五萬騎盡力擊匈奴唯天子出兵以救本始三年漢發十五萬騎五將軍分道並出遣校尉常恵持節護烏孫兵昆彌將五萬騎從西方入至匈奴右谷蠡王庭獲四萬級馬牛羊騾槖駝七十餘萬元康二年昆彌上書願以漢外孫元貴靡為嗣解憂主子得令復尚公主詔下公卿議蕭望之等以為烏孫絶域變故難保不可許上美烏孫新立大功難重絶故業許其婚會翁歸靡死國人共立岑陬子泥靡代為昆彌元貴靡不得立乃不復與婚泥靡既立號狂王復尚解憂生一男鴟靡王不與主和又暴惡失衆漢使衛司馬魏和意副候任昌送侍子公主言狂王為烏孫所患苦易誅也遂謀置酒㑹罷使士㧞劒旁下狂王傷上馬馳去其子細沈瘦㑹兵圍和意昌及公主於赤谷城數月城中困急都䕶鄭吉發諸國兵救之乃解去初肥王翁歸靡胡婦子烏就屠狂王傷時驚與諸翖音翕侯俱去居北山中揚言母家匈奴兵來故衆歸之後遂襲殺王自為昆彌宣帝詔立肥王之子元貴靡為大昆彌烏就屠為小昆彌元貴靡後孫雌栗靡立國亂叚㑹宗立其季父伊秩靡為大昆彌哀帝元壽二年伊秩靡與匈奴單于烏珠留名囊知牙斯呼韓邪之子並入朝漢以為榮自烏孫分立兩昆彌後漢用憂勞且無寧歳言或鎭撫之或威制之故多事其後無聞至後魏時亦朝貢其國數為蠕蠕所侵西徙葱嶺姑墨姑墨漢時通焉王治南城去長安八千一百里户三千五百東至都護治所二千里南至于闐馬行十五日北界接烏孫出銅鐵雌黄東通龜兹六百里王莽時其王丞殺温宿王并其國至後魏時役屬龜兹温宿温宿漢時通焉王治温宿城今京兆府醴泉縣北有山名温宿嶺者本因漢時温宿國人令居此因以名山去長安八千三百餘里户二千二百東至都護治所二千三百餘里西至尉頭三百里北至烏孫赤谷六百餘里土地物類所有與鄯善諸國同通姑墨東二百餘里至後魏時亦役屬龜兹烏秅烏秅上一加反下直加反漢時通焉王治烏秅城去長安萬里户五百東北至都䕶治所四千九百北與子合蒲犂西與難兠接山居田石間有白草累石為室人接手自髙山下溪澗中飲水故接連其手如猿飲出小步馬小細也細步言其能蹀足所謂百步千足有驢無牛西有懸度山石溪谷不通以獨索相引而度去陽關五千九百里去都䕶治所五千里其國後魏又通謂之於摩國難兠難兠漢時通焉去長安萬一百里户五千東北至都護治所二千八百里西南至罽賓三百里南至婼羌北與休屠西與大月支接種五穀葡萄果有銀鐵銅作兵與諸國同屬罽賓大宛大宛漢時通焉王治貴王山城去長安萬二千五百里户萬東至都䕶治所四千里北至康居卑闐城千五百里西南至大月氐七百里北與康居南與大月氐接土地風氣物類人俗與大月氐安息同大宛左右以葡萄為酒富人藏酒至萬餘石久者至數十年不敗人嗜酒馬嗜苜蓿多善馬汗血言其先天馬子大宛國中有髙山其上有馬不可得因取五色母馬置其下與集生駒其汗血因號為天馬子始張騫為武帝言之帝遣使者持千金及金馬以請宛善馬宛王以漢絶逺大兵不能至遂殺漢使太初元年拜李廣利為貳師將軍期至貳師取善馬率數萬人至其境攻郁城不下引還往來二歳至燉煌士卒存者十不過一二帝怒其不剋使遮玉門不許入貳師因留屯燉煌又遣貳師率六萬人負私從者不與焉牛十萬馬三萬匹驢槖駝萬數天下騷然益𤼵戌甲卒十八萬置居延休屠今武威張掖郡界以衛酒泉貳師至宛宛人斬王母寡首獻馬漢軍取其善馬數十匹中馬以下牝牡三千匹而立宛貴人昧蔡為王約歳獻馬遂採葡萄苜蓿種而歸貳師再行往返凡四歳自宛以西至安息雖頗異言然大同自相曉知也其人皆深目多髭髯善賈其俗貴女子女子所言丈夫乃决正其地無絲漆不知鑄器及漢使亡卒降教鑄作兵器後漢明帝時宛又獻汗血馬至後魏文成帝和平六年孝文太和三年並遣使獻馬隋時蘇對沙那國即漢大宛也宋膺異物志大宛馬有肉角數寸或有解人語及知音舞與鼓節相應者隋西域圖記云其馬騮馬烏馬多赤耳黄馬赤馬多黑耳唯耳色别自餘毛色與常馬不異又云王姓蘇色匿字底失槃陀積代承襲不絶按今王即底失槃陀之後也莎車莎車國治莎車城去長安九千九百五十里户二千三百三十九口萬六千三百七十三勝兵三千四十九人輔國侯左右將左右騎君備西夜君各一人都尉二人譯長四人東北至都䕶治所四千七百四十六里西至疎勒五百六十里西南至蒲犂七百四十里有鐵山出青玉漢宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死死時萬年在漢莎車國人計欲自託於漢又欲得烏孫心即上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不說莎車王弟呼屠徵殺萬年并殺漢使者自立為王約諸國背漢㑹衛候馮奉世使送大宛客即以便宜發諸國兵擊殺之更立他昆弟子為莎車王諸國悉平威振西域奉世至大宛大宛聞其斬莎車王敬之異於他使得名馬象龍而還馬形似龍帝甚說下議封奉世少府蕭望之以奉世擅發諸國兵雖有功不可為後法後奉使者争發兵要功萬里外為國生事於夷狄不可長不宜受封帝善其議拜奉世光祿大夫匈奴單于因王莽之亂畧有西域唯莎車王延最强不肯附屬元帝時嘗為侍子長於京師慕樂中國亦復參其典法常勅諸子當世奉漢家不可負也天鳯五年延死諡忠武王子康代立光武初康率傍國拒匈奴擁衛故都䕶吏士妻子千餘口檄書河西問中國動静自陳思慕漢家建武五年河西大將軍竇融乃承制立康為漢莎車建功懐徳王西域大都尉五十五國皆屬焉九年康死諡宣成王弟賢代立攻破拘彌西夜國皆殺其王而立其兄康兩子為拘彌西夜王十四年賢與鄯善王安並遣使詣闕貢獻於是西域始通葱嶺以東諸國皆屬賢十七年賢復遣使奉獻請都䕶天子以問大司空竇融以為賢父子兄弟相約事漢欵誠又至宜加號位以鎭安之帝乃因其使賜賢西域都護印綬及車旗黄金錦繡燉煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書收還都護印綬更賜賢以漢大將軍印綬其使不肯易遵迫奪之賢由是始恨而猶詐稱大都護移書諸國諸國悉服屬焉號賢為單于賢浸以驕横重求賦稅數攻龜兹諸國諸國恐懼二十一年冬車師前王鄯善焉耆等十八國俱遣子入侍獻其珍寳及得見皆流涕稽首願得都護天子以中國初定北邊未服皆還其侍子厚賞賜之是時賢自負兵强欲并兼西域攻擊益甚諸國聞都護不出而侍子皆還大憂恐乃與燉煌太守檄願留侍子以示莎車言侍子見留都護尋出冀且息其兵裴遵以狀聞天子許之二十二年賢知都護不至遂遺鄯善王安書令絶通漢道安不納而殺其使賢大怒𤼵兵攻鄯善安迎戰兵敗亡入山中賢殺掠千餘人而去其冬賢復攻殺龜兹王遂兼其國鄯善焉耆諸國侍子久留燉煌愁思皆亡歸鄯善王上書願復遣子入侍更請都護都護不出誠迫於匈奴天子報曰今使者大兵未能得出如諸國力不從心東西南北自在也於是鄯善車師復附匈奴而賢益横媯塞王自以國逺遂殺賢使者賢擊滅之立其國貴人駟鞬為媯塞王賢又自立其子則羅為龜兹王賢以則羅年少乃分龜兹為烏壘國徙駟鞬為烏壘王又更以貴人為媯塞王數歳龜兹國人共殺其王則羅駟鞬而遣使匈奴更請立王匈奴立龜兹貴人身毒為龜兹王龜兹由是屬匈奴矣賢以大宛貢稅減少自將諸國兵數萬人攻大宛大宛王延留迎降賢因將其還國徙拘彌王橋塞提為大宛王而康居數攻之橋塞提在國歳餘亡歸賢復以為拘彌王而遣延留還大宛使貢獻如常賢又徙于闐王俞林為驪歸王立其弟位侍為于闐王歳餘賢疑諸國欲叛召位侍及拘彌姑墨子合王盡殺之不復置王但遣將鎭守其國莎車將在于闐者暴虐為其國人所殺賢乃引兵攻于闐兵敗而走于闐大人休莫覇進圍莎車中流矢死兵乃退于闐立休莫覇兄子廣徳為王匈奴與龜兹諸國共攻莎車不能下賢連被兵革乃與廣徳和後廣徳虜賢妻子而并其國匈奴遣兵將賢質子不居微立為莎車王廣徳又攻殺之更立其弟齊黎為王章帝元和三年長史班超發諸國兵擊莎車大破之由是遂降漢矣班固論曰孝武之世圖制匈奴患其兼從西國結黨南羌乃表河西列四郡開玉門通西域以斷匈奴右臂隔絶南羌月支單于失援自是逺遁而幕南無王庭因文景元黙養人五代天下殷富財力有餘士馬强盛故能睹犀象瑇瑁則建珠崖七郡感蒟醬竹杖則開䍧牱越嶲聞天馬葡萄則通大宛安息自是之後萬里相奉師旅之費不可勝計至於用度不足乃𣙜酒酤筦鹽鐵鑄白金造皮幣算至車船租及六畜人力屈財貨竭因之以凶年羣盜並起是以末年遂棄輪臺之地且下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆逺則葱嶺身熱頭痛懸度之阨淮南杜欽揚雄之論皆以為此天地所以界别區域絶外内也書云西戎即序禹就而序之非上威服致其貢物也西域諸國各有君長兵衆分弱無所統一雖屬匈奴不相親附匈奴能得其馬畜㫋罽而不能統率與之進退與漢隔絶道路又逺得之不為益棄之不為損盛徳在我無取於彼自建武以來西域思漢盛徳咸樂内屬唯其小邑鄯善車師界迫匈奴尚為所拘而其大國莎車于闐之屬數遣使請都䕶置質聖上逺覽古今因時之宜覊縻不絶辭而未許雖大禹之序西戎周公之讓白雉太宗之却走馬義兼之矣亦何以尚兹罽賓罽賓國治循鮮城去長安萬二千二百里不屬都䕶户口勝兵多大國也東北至都護治所六千八百四十里東至烏秅國二千二百五十里東北至難兠國九日行西北與大月氏西南與烏弋山離接昔匈奴破大月氏大月氏西君大夏而塞王南君罽賓塞種分散往往為數國自疎勒以西北休循捐毒之屬皆故塞種也罽賓地平温和有苜蓿雜草奇木檀櫰即槐之類葉大而異梓竹漆種五穀葡萄諸果糞治園田地下濕生稻冬食生菜其民巧雕文刻鏤治宫室織罽刺文繡好治食有金銀銅鐵以為器市列市有列肆亦如中國也以金銀為錢文為騎馬幕為人面錢文面作騎馬形幕面作人面目幕音漫謂平而無文也出犎牛水牛象大狗沐猴孔爵犎牛項上隆起者也罽賓大狗大如驢赤色數里揺鞉以呼之沐猴即獼猴也珠璣珊瑚琥珀璧琉璃孟康曰琉璃青色如玉師古曰魏畧云大秦國出赤白黒黄青綠縹紺紅紫十種琉璃此蓋自然之物采澤光潤異於衆玉其色不恒今俗所用皆銷治石汁加以衆藥灌而為之尤虚脆不眞實非其物也他畜與諸國同自漢武帝始通罽賓自以絶逺漢兵不能至其王烏頭勞數剽漢使烏頭勞死子代立遣使奉獻漢使關都尉文忠送其使王復欲害忠忠覺之乃與容屈王子陰末赴共合謀攻罽賔殺其王立陰末赴為罽賔王授印綬後軍候趙徳使罽賔與陰末赴相失相失意也陰末赴鎻琅當徳琅當長鎻也若今之禁繫人鎻殺副以下七十餘人遣使者上書謝孝元帝以絶域不錄放其使者於懸度絶而不通成帝時復遣使獻謝罪漢欲遣使者報送其使杜欽說大將王鳯曰前罽賓王隂末赴本漢所立後卒畔逆夫徳莫大於有國罪莫大於執殺使者所以不報恩不懼誅者自知絶逺兵不至也有求則卑辭無欲則驕慢終不可懐服凡中國所為通厚蠻夷愜快其欲者為壤比而為寇今懸度之阨非罽賓所能越也其向慕不足以定西域雖不附不能危城郭城郭總謂西域諸國前親逆節惡暴西域故絶而不通今悔過來而無親屬貴人奉獻者皆行賈賤人欲通貨市買以獻為名故煩使者送至懸度恐失實見欺凡遣使送客者欲為防䕶寇害也起皮山南更不屬漢之國四五斥候士百餘人五分夜擊刁斗自守夜有五更故分而持之也尚時為所侵盗驢畜負糧須諸國廪食得以自贍國或貧小不能食或桀黠不肯給擁强漢之節餒山谷之間乞丐無所得離一二旬則人畜棄捐曠野而不反又歴大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然又有三池盤石阪道隘者尺六七寸長者徑三十里臨峥嶸不測之深行者騎步相持繩索相引二千餘里乃到懸度畜墜未平阬谷盡靡碎人墮勢不得相收視險阻危害不可勝言聖王分九州制五服務盛内不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆涉危難之路罷敝所恃以事無用非久長之計也使者業已受節可至皮山而還言已立計遣之不能即止可至皮山也於是鳯白從欽言罽賓實利賞賜賈市其後數年而一至云自後無聞至後魏始通之都善見城隋時謂之漕國在葱嶺之西南隋史曰即漢罽賓國其王姓昭武康國之宗族勝兵萬餘人國法嚴整殺人及賊盗皆死其俗淫祀葱嶺山有順天神者儀制極華金銀為屋以銀為地祠前一魚脊骨其孔中通馬騎出入國王戴金牛頭冠坐金馬座土多稻粟豆麥有硃砂青黛安息青木等香石蜜黑鹽阿魏沒藥白附子北去㠶延七百里東去刦國六百里南去𤓰州六千六百里大業中遣使貢物唐武徳二年遣使貢寳帶金鎻水精醆玻璃狀若酸棗貞觀中獻名馬遣使厚齎賜其國并撫慰天竺處羅㧞王再拜受命遣使導至天竺十六年又入貢國人共傳王始祖曰馨孽至曷襭支傳十二世顯慶三年以其地為修鮮都督府神龍初拜其王修鮮等十一州諸軍事修鮮都督開元七年遣使獻天文及秘文奇藥其王請以子拂林罽婆嗣聴之天寳四載冊其子勃匐準襲王乾元初使者入貢吐呼羅吐呼羅去代一萬二千里東至范陽國西至悉萬斤國中間相去二千里南至連山不知名北至波斯國中間相去一萬里薄提城周匝六十里城南有大水西流名漢樓河土宜五穀有好馬駞騾其王曽遣使入貢㧞豆㧞豆國去代五萬一千里東至多勿當國西至旃那國中間相去七百五十里南至罽陵伽國北至伏那伏且國中間相去九百里國中出金銀雜寳白象水牛氂牛葡萄五穀謝䫻㠶延石汗那謝䫻居吐火羅西南本曰漕矩吒唐顯慶時謂訶達羅支武后改今號東距罽賓東北㠶延皆四百里南婆羅門西波斯北護時健其王居鶴悉那城七千里多鬱金瞿草糞泉灌田國中有突厥罽賓吐火羅種人雜居罽賔取其子弟持兵以禦大食景雲初遣使朝貢後遂臣罽賓開元八年天子冊葛達羅支頡利發誓屈爾為王至天寳中數來朝獻㠶延者或曰望衍曰梵衍那居斯卑莫運山之旁西北與護時健接東南距罽賓西南訶達羅支與吐火羅連境地寒人穴居王治羅爛城有大城四五水北流入烏滸河貞觀初遣使者入朝顯慶三年以羅爛城為寫鳳都督府縛時城為悉萬州授王蔔寫鳯州都督管内五州諸軍事自是朝貢不絶也石汗那或曰斫汙那自縛野底南入雪山行四百里得㠶延東臨烏滸河多赤豹開元天寳中一再朝獻識匿似没役槃俱蜜䕶蜜附識匿或曰屍棄尼曰瑟匿東南直京師九千里東五百里距葱嶺守捉所南三百里屬護蜜西北五百里抵俱蜜初治苦汗城後散居山谷有大谷五酋長自為治謂之五識匿地二千里無五穀人喜攻剽刦商賈播蜜川四谷稍不用王號令俗窟室唐貞觀二十年與似没役槃二國使者偕來朝開元十二年授王布遮波資金吾衛大將軍天寳六載王跌失伽延從討勃律戰死擢其子都督左武衛將軍給祿居蕃似沒者北接石土俗與康同役槃亦與康鄰出良馬俱蜜者治山中在吐火羅東北南臨黒河其王突厥延陀種貞觀十六年遣使者入朝開元中獻胡旋舞女其王那羅延頗言為大食暴賦天子但慰遣而已天寳時王伊悉爛俟斤又獻馬䕶蜜者或曰達摩悉鐵帝曰鑊偘元魏所謂鉢和者亦吐火羅故地東南直京師九千里而贏横千六百里王居塞迦審城北臨烏滸河地寒沍堆阜曲折沙石流漫有豆麥宜木果出善馬人碧瞳顯慶時以其地為鳥飛州王沙鉢羅頡利發為刺史地當四鎭入吐火羅道故役屬吐蕃開元八年冊其王羅旅伊陀骨咄祿多毗勒莫賀達摩薩爾為王十六年與米首領米忽汗同獻方物明年大酋烏鶻達于復朝王死冊其從弟護眞檀嗣王二十六年身入朝宴内殿拜左金吾衛將軍賜紫袍金帶天寳初請絶吐蕃賜鐡劵八載眞檀來朝請宿衛詔授右武衛將軍久乃遣又遣首領朝貢乾元元年王紇設伊俱鼻施來朝賜氏李烏弋山離烏弋山離漢時通焉去長安萬二千二百里不屬都護户口多大國也東北至都護治所六十日行東與罽賓北與撲桃西與犂靬條支犂靬即大秦也犂與驪同靬巨連反行可百餘日乃到條支魏時其國名排持條支條支漢時通焉去陽關二萬二千一百里在葱嶺之西城在山之上周囬四十餘里臨西海水曲環其南及東北三面路絶唯西北隅通陸道土地暑濕田宜稻出犎牛孔雀有大鳥卵如甕人衆甚多往往有小君長安息役屬之以為外國安息以條支為外國如言蕃國善眩其草木畜産五穀果菜食飲宫室布列錢貨兵器金珠之屬皆與罽賓同而有桃㧞獅子犀牛桃㧞一名符㧞似鹿長毛一角者或為天鹿兩角者或為辟邪獅子似大蟲正黄有􅏋耏尾端茸毛大如斗爾雅亦謂之狻猊㧞音步葛反耏亦頰旁毛也􅏋音而占反耏音而其錢獨文為人幕為騎馬絶逺漢使希至自玉門陽關出南道厯鄯善而南行烏弋山南道極矣轉北而東馬行六十餘日至安息後漢和帝永元中班超遣掾甘英使大秦抵條支臨大海欲渡而安息西界船人謂英曰海水廣大往來者逢善風三月乃得渡若遇惡風雨亦有三歳者故入海人皆賫三歳糧海中善使人思土戀慕數有死亡者英乃止安息長老傳聞條支有弱水西王母亦未嘗見也元中記云崑崙之弱水鴻毛不能起也爾雅云觚竹北户西王母日下謂之四荒也自條支乘水西行百餘日近日所入云安息安息漢時通焉王治蕃兠城蕃音盤去長安萬一千六百里在葱嶺之西大宛之西可數千里不屬都䕶北與康居東與烏弋山離西與條支接土地風氣物類人俗與烏弋罽賓同亦以銀為錢文獨為王面幕為夫人面王死輙更鑄錢有大馬大爵大爵頸長鷹身蹄似槖駝色蒼舉頭髙八九尺張翅丈餘食大麥地方數千里最大諸國地臨媯水今謂烏滸河商賈車船行旁國書革旁行為書記今西方胡書皆横行不直下革謂皮不柔者武帝始遣使至安息其王令騎迎於東界木鹿城號為小安息去王都數千里行北過數十城人户相屬因發使隨漢使以大鳥卵及犂靬眩人獻至後漢章帝時治和犢城遣使獻獅子符㧞符㧞形似麟而無角自安息西行三千四百里至阿蠻國從阿蠻西行三千六百里至罽賔國從罽賔南行渡河又西至于羅國九百六十里安息西界極矣自此南乘海乃通大秦其土多海西珍奇異物至後周武帝天和二年其王治蔚搜城遣使貢獻至隋大業五年安息國遣使朝貢王姓昭武與康國王同族都在那蜜水南城有五重環流水宫殿皆為平頭王坐金駞座髙七尺風俗同於康國唯妻其姊妹及母子遞相禽獸此為異也文獻通考卷三百三十七
