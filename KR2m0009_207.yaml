body:
  text: 文獻通考卷二百七鄱陽馬端臨貴與著經籍考三十四史譜牒目録姓源韻譜一卷陳氏曰唐張九齡撰依春秋正典栁氏萬姓録世本圖捃托諸書纂為此譜分四聲以便尋閲古者賜姓别之黃帝之子得姓者十四人是也後世賜姓合之漢髙帝命婁敬項伯為劉氏是也惟其别之也則離析故古者論姓氏推其本同惟其合之也則亂故後世論姓氏識其本異自劉石亂華百宗蕩析夷夏之裔與夫冠冕輿臺之子孫混為一區不可遽知此周齊以來譜牒之學所以貴於世也歟元和姓纂十一卷鼂氏曰唐林寶撰元和中封閻某於諸家姓氏為太原其人乃言非本郡憲宗令宰相命寶纂諸家姓氏李氏時各依四聲類集每韻之內則以大姓為首陳氏曰元和中朔方别帥天水閻某者封邑太原以為言上謂宰相李吉甫曰有司之誤不可再也宜使儒生條其源系考其郡望子孫職任並總緝之每加爵邑則令閲視吉甫以命寶二十旬而成此書絶無善本頃在莆田以數本參校僅得七八後又得蜀本校之互有得失然粗完正矣李氏皇室維城録一卷陳氏曰屯田郎中李衢沔王長史林贊修止於僖宗蓋昭宗時所録也李氏房從譜一卷陳氏曰唐洛陽主簿李匡文撰時為圖譜官聖唐偕日譜一卷陳氏曰前賀州刺史李匡文撰序言前守職圖籍日撰天潢源派譜統務在省略直取相承一葉旁附首分諸房今特從聖唐以來列聖下諸王公主逐帝書出號曰偕日與日齊行之義也匡文字濟翁又有資暇集見於録唐宰相甲族一卷陳氏曰唐韋述蕭穎士等撰自王方慶而下十有四家唐相門甲族諸郡氏譜共一卷陳氏曰不著名氏甲族八十六家氏譜自京兆八姓而下凡三百五十姓唐杜氏家譜一卷陳氏曰唐太子賔客杜信撰唐鮮于氏卓絶譜一卷鼂氏曰唐喬琳撰藝文志有其目天下郡望氏族譜一卷陳氏曰唐李林甫等天寶八載所纂并附五音於後姓苑二卷陳氏曰不著名氏古有何承天姓苑今此以李為卷首當是唐人所為姓解三卷陳氏曰鴈門邵思撰以偏旁字類為一百七十門二千五百六十八氏景祐二年序千姓編一卷陳氏曰不著名氏末云嘉祐八年采真子記以姓苑姓源等書撮取千姓以四字為句每字為一姓題曰千姓編三字亦三姓也逐句文義亦頗相屬殆千字文之比云陳郡袁氏譜一卷陳氏曰袁陟世弼録陶氏譜一卷陳氏曰懷州教授陶直夫録侃之後也帝王系譜一卷陳氏曰武夷吳逹公路撰政和壬辰也自漢迄周顯德每代略具數語其論曹操迫脅君后無復臣禮逆節已顯會其病死故篡竊之惡漏在身後昔人謂其不敢危漢者亦不核其情耳此論與愚意吻合羣史姓纂韻譜六卷陳氏曰永福黃邦先宋顯撰凡史傳所有姓氏皆有韻聚而著其所出建炎元年其兄邦俊宋英為之序古今姓氏書辨證四十卷陳氏曰校書郎史館校勘臨川鄧名世元亞撰其子椿年續成之皇朝百族譜四卷陳氏曰長沙丁維臯撰周益公為之序時紹興末也僅得百二十有三家其闕遺尚多未有能續裒集者周平園序曰君子之著書也有心於勸戒而無意於好惡然後可以施當今而傳來裔昔者世系之學蓋嘗盛矣姓有苑官有譜氏族有志朝廷以是定流品士大夫以是通昏姻然行之一時其弊有不勝言者何也好惡害之也是故進新門則退舊望右膏粱則左寒畯進而右者以為榮榮則夸夸則必侈退而左者以為辱辱則怒怒則必怨以侈臨怨則生乎其時者悉力以逞憾出乎其後者貪名以自欺此正倫所以鑿杜固義府所以陷不辜而無知如崇韜者所以流涕於尚父之墓而不耻也長沙丁公維臯宿學耆儒慨然以譜牒為任未有聞而不求求而不得得而不録也日裒月聚殆且百家而又推其源流條其派别自微以至著由遠以及近疏戚窮逹可指諸掌如嘗從其父兄而友其子弟也如與之同鄉黨而接姻㜕也不亦博而知要也哉維臯不鄙謂豫使序其首豫曰書不待序也然維臯之意不可以不眀蓋世臣巨室則必書讀者可以知先烈之有貽而思保其閥閲也方興未艾則必書讀者可以知將相之無種而思大其門閭也至於四姓小侯重茵疊袞則知無兩漢敗亡之禍勳臣勞舊傳龜襲紫則知無三世道家之忌上以彰國朝人物之盛下以為子孫昭穆之辨向所謂有心於勸戒而無意於好惡者不在茲乎他日其得益多其編益詳上之太史傳之薦紳豫亦將乞其副而寓目焉對千客而不犯一人之諱或可勉也容齋洪氏隨筆曰姓氏之書大抵多謬誤如唐貞觀氏族志今已忘其本元和姓纂誕妄最多國朝所修姓源韻譜又為可笑姑以洪氏一項考之云五代時有洪昌洪杲皆為參知政事豫按此二人乃五代南漢僭主劉龑之子及晟嗣位用為知政事其兄弟本連𢎞字以本朝國諱故五代史追改之元非姓洪氏也此與洪慶善序丹陽𢎞氏云有𢎞憲者元和四年嘗跋輞川圖不知𢎞憲乃李吉甫之字耳其誤正同闕里世系一卷鼂氏曰皇朝孔宗翰修孔子家譜也唐藝文志有孔子系葉傳今亡其家所藏譜雖曰古本止敘承襲者一人故多疏略宗翰元豐末知洪州刋於牘紹興中端朝者續之止於四十九代洪興祖又以史記并孔光孔僖傳及太子賢注與宰相世系諸家校正且作年譜列於卷首史氏譜一卷陳氏曰奉直大夫米憲録蓋國初勳臣米信之後信五世為芾元章又三世為憲右譜牒唐藝文志四卷陳氏曰新唐書中録出别行監中有印本吳氏西齋書目一卷鼂氏曰唐吳兢録其家藏書凡一萬三千四百六十八卷兢自撰書附於正史之末又有續抄書列於後文選著作人名三卷鼂氏曰唐常寶鼎撰纂文選所集文章著作人姓氏爵里行事及其著作之意十三代史目三卷鼂氏曰唐殷仲茂撰輯史記兩漢三國晉宋齊梁陳後魏北齊周隋史籍篇次名氏國朝杜鎬以唐五代書目纘之崇文總目六十四卷鼂氏曰皇朝王堯臣等撰書刋正訛謬條次之凡四十六類計三萬六百六十九卷康定三年景祐中詔張觀李若谷宋庠取昭文史館集賢祕閣書成堯臣及提舉官聶冠卿郭稹加階邑編修官呂公綽王洙刁約歐陽修楊儀陳經各進秩有差國史謂書録自劉向至毋焸所著皆不存由是古書難考故此書多所謬誤陳氏曰時撰定諸儒皆有論議歐公文集頗見數條今此惟六十六卷之目耳題云紹興改定夾漈鄭氏曰崇文總目衆手為之其間有兩類極有條理古人不及後來無以復加也道書一類有九節九節相屬而無雜揉又雜史一類雖不標别然分上下二卷即為二家不勝冗濫及覩崇文九節正所謂大熱而濯以清風也雜史一家隋唐二志皆不成條理今觀崇文之作賢於二志遠矣此二類往往是一手所編惜乎當時不盡以其書屬之也又曰崇文總目出新意每書之下必著説焉據標類自見何用更為之説且為之説也已自繁矣何用一一説焉至於無説者或後書與前書不殊者則強為之説使人意怠且太平廣記者乃太平御覽别出廣記一書專記異事奈何崇文之目所説不及此意但以謂博采羣書以類分門凡是類書皆可博採羣書以類分門不知御覽之與廣記又何異崇文所釋大槩如此舉此一條可見其他大宋史館書目一卷鼂氏曰皇朝史館書總計一萬五千一百四十二卷邯鄲圖書志十卷鼂氏曰皇朝李淑獻臣撰淑若谷之子也載其家所藏圖書五十七類經史子集通計一千八百三十六部二萬三千一百八十六卷其外又有藝術志道書志書志畫志通為八目陳氏曰號圖書十志皇祐己丑自作序以示子孫曰朋圭芻者其子夀朋復圭德芻也成都刻石總目三帙鼂氏曰皇朝劉涇撰元祐中蔡京帥成都以意授涇纂府縣碑板幢柱自東漢初平迄偽蜀廣政凡二百六十八田氏書目六卷鼂氏曰皇朝田鎬撰田偉居荆南家藏書三萬卷鎬偉之子也因成此目元祐中袁默為之序羣書備檢十卷鼂氏曰未詳撰人輯易書詩左氏公羊榖梁二禮論語孟子荀子揚子文中子史記兩漢晉宋齊梁陳後周北齊隋新舊唐五代史書以備檢閲祕書省四庫闕書目一卷陳氏曰亦紹興改定其闕者注闕字於逐書之下集古録跋尾十卷陳氏曰歐陽修撰編述之意序文詳之世所共知不復著集古目録二十卷陳氏曰公子禮部郎官棐叔弼撰公既為跋尾二百九十六篇命棐撮其大要别為目録棐之序云爾今考集中凡三百五十餘跋歐公親書集古録跋六卷廬陵所刻凡二百五十篇視集中闕七之二太宗御製御書目一卷陳氏曰玉宸殿所藏兼有真宗御製序十四篇又本稍多而無序文真宗御製碑頌石本目録一卷陳氏曰凡九十名件乾興所刋板龍圖閣瑞物寶目六閣書籍圖畫目共一卷玉宸殿書數附陳氏曰已上平江虎邱寺御書閣有元頒降印本傳寫得之京兆金石録六卷陳氏曰北平田槩纂元豐五年王欽臣為序自為後序皆記京兆府縣古碑所在覽之使人慨然金石録三十卷陳氏曰東武趙明誠德甫撰其所藏二千卷蓋倣歐陽集古而數則倍之本朝諸家蓄古器物欵識其考訂詳洽如劉原父吕與叔黃長睿多矣大抵好附會古人名字如丁字即以為祖丁舉字即以為伍舉方鼎即以為子産仲吉匜即以為逼姞之類邃古以來人之生世夥矣而僅見於簡册者幾何器物之用於人亦夥矣而僅存於今世者幾何乃以其姓字名物之偶同而實焉余嘗竊笑之惟其傅會之過併與其詳洽者皆不足取信矣惟此書跋尾獨不然好古之通人也明誠宰相挺之之子其妻易安居士李氏為之作後序文亦頗有可觀廣川藏書志二十六卷書跋十卷畫跋五卷陳氏曰徽猷閣待制東平董逌彥遠撰以其家藏書考其本末而為之論説及於諸子而止蓋其本意專為經設也寶墨待訪録二卷陳氏曰禮部侍郎襄陽米芾元章撰記承平時故家所藏晉唐遺迹羣書會記三十六卷陳氏曰鄭樵撰大略世間所有之書非必其家皆有之也夾漈書目一卷圖書志一卷陳氏曰鄭樵記其平生所自著之書志者蓋述其著作之意也集古系時録十卷系地録十一卷陳氏曰鄭樵撰大抵因集古之舊詳考其時與地而系之二書相為表裏秦氏書目一卷陳氏曰濡須秦氏元祐二年有為金部員外郎者聞於朝請以宅舍及文籍不許子孫分割藏六堂書目一卷陳氏曰莆田李氏云唐江王之後有家藏誥命其藏書自承平時今浸以散逸矣吳氏書目一卷陳氏曰奉議郎漳浦吳與可權家藏閩中不經兵火故家文籍多完具然地濕苦蠧損鼂氏讀書志二十卷陳氏曰昭德鼂公武子止撰其序言得南陽公書五十篋合其家舊藏得二萬四千五百卷其守榮州日夕讎校每終篇輒論其大指時紹興二十一年也其所發明有足觀者南陽公未知何人或云开度憲孟也未詳遂初堂書目一卷陳氏曰錫山尤氏尚書袤延之淳熙名臣藏書至多法書尤富嘗燼於火今其存亡幾矣誠齋序略曰延之於書靡不觀觀書靡不記每公退則閉戶謝客日記手抄若干古書其子弟及諸女亦抄書一日謂豫曰吾所抄書今若干卷將彚而目之飢讀之以當肉寒讀之以當裘孤寂而讀之以當友朋幽憂而讀之以當金石琴瑟也乃屬豫序其書目余記序之將借而傳焉中興館閣書目三十卷陳氏曰祕書監臨海陳騤叔進等撰淳熙五年上之中興以來庶事草創網羅遺逸中祕所藏視前世獨無歉焉殆且過之大凡著録四萬四千四百八十六卷蓋亦盛矣其間考究疏謬亦不免館閣續書目三十卷陳氏曰祕書丞吳郡張攀從龍等撰嘉定十三年上以淳熙後所得書纂續前録草率尤甚凡一萬四千九百四十三卷鄭氏書目七卷陳氏曰莆田鄭寅子敬以所藏書為七録曰經曰史曰子曰藝曰方技曰文曰類寅知樞密院僑之子博聞強記多識典故端平初召為都司執法守正出為漳州以沒寶刻叢編二十卷陳氏曰臨安書肆陳思者以諸家集古書録用九域志京府州縣繫其名物而昔人辨正審定之語具著其下其不詳所在附卷末右目録文獻通考卷二百七
