body:
  text: 文獻通考卷一百一鄱陽馬端臨貴與著宗廟考十一祫禘有虞氏禘黃帝趙氏曰虞氏祖顓頊顓頊出於黃帝則所謂禘其祖之所自出夏后氏亦禘黃帝義同舜也殷人禘嚳殷祖契出自嚳周人禘嚳義與殷同禮不王不禘王者禘其祖之所自出而以其祖配之自出謂所系之帝諸侯及其太祖太祖始受封君也世趙伯循曰諸侯有五廟唯太廟百不遷及者言逺祀之所及也不言禘者不王不禘無所疑也不言祫者四時皆祭故不言祫也大夫有大事省於其君干祫及其髙祖有省謂有功德見省記也干者逆上之意也言逆上及於髙祖也楊氏曰愚按天子有祫諸侯祭及其太祖亦有祫大夫無祫惟有大功德見知於其君乃得祫祭及髙祖儀禮喪服不杖期章為人後者為其父母報條子夏傳曰都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其太祖天子及其祖之所自出又楊氏曰按大傳及子夏傳二章皆言大夫祭祖諸侯上及其太祖惟天子禘其祖之所自出所謂禮不王不禘也按鄭氏注禘其祖之所自出以為王者之先祖皆感大微五帝之精以生祖者后稷也祖之所自出者蒼帝靈威仰也遂指禘以為亦祭天之禮混禘於郊捨嚳而言靈威仰其説妖妄支離特甚先儒多攻之蓋祖者后稷也祖之所自出者帝嚳也郊祀只及稷而禘則上及嚳是宗廟之祀莫大於禘故祭法先禘於郊以其所祀之祖最逺故耳於祀天無預也至楊氏引子夏傳以釋祖之所自出其説尤為眀暢云禘大祭也五年一大祭繹又祭也疏云知非祭天之禘者以此文下云繹又祭也為宗廟之祭知此禘大祭亦宗廟之祭也爾雅長發大禘也詩殷頌朱子曰序以此為大禘之詩蓋祭其祖之所出而以其祖配也蘇氏曰大禘之祭所及者逺故其詩厯言商之先君又及其卿士伊尹蓋與祭於禘者也商書曰兹豫大享于先王爾祖其從與享之是禮也豈其起於商之世歟今按大禘不及羣廟之主此宜為祫祭之詩然經無眀文不可考也雍禘太祖也周頌朱子曰祭法周人禘嚳又曰天子七廟三昭三穆及太祖之廟而七周之太祖即后稷也禘嚳於后稷之廟而以后稷配之所謂禘其祖之所自出以其祖配之者也祭法又曰周祖文王而春秋家説三年喪畢致新死者之主於廟亦謂之吉禘是祖一號而二廟禘一名而二祭也今此序云禘太祖則宜為禘嚳於后稷之廟矣而其詩之詞無及於嚳稷者若以為吉褅於文王則與序已不協而詩文亦無此意恐序之誤也此詩但為武王祭文王而徹俎之詩而後通用於他廟耳陳氏曰趙伯循謂禘祭不兼羣廟之主為其踈逺不敢此殆未嘗考之於經也詩頌長發大禘而歌元王桓撥相土烈烈與夫武王之湯中葉之太甲雍禘太祖而歌皇考之武王烈考之文王則不兼羣廟之説其足信哉楊氏曰愚按禘祭不兼羣廟之主此非趙伯循之臆説也大傳云王者禘其祖之所自出以其祖配之則不兼羣廟之主明矣曾子問云祫祭其太廟祝迎四廟之主又云非祫祭則七廟五廟無虛主公羊傳云大事者何大祫也毁廟之主陳於太祖未毁廟之主皆升合食于太祖此皆指祫祭而言並無一言説禘為殷祭則禘不兼羣廟之主又眀矣是以朱子疑長發為大祫之詩疑雍為武王祭文王而徹俎之詩是蓋以理決之而不為詩序所惑也且詩頌長發大禘但述元王以下而上不及於所自出之帝雍禘太祖無一詞及其嚳稷而皆稱述文王武王則安得謂之禘詩乎詩序之不足信於此尤可見矣按爾雅以禘為大祭祭法序禘先於郊夫子答或人之問禘不敢易其對而以為知其説者於天下國家如指諸掌由是後之儒者以禘為祭中之至大者而必推尊其所以大之説故或以祖之所自出為天帝其意必謂郊明堂猶祀天禘大祭也豈止於祀祖而已乎又以禘為并祀羣廟之主其意必謂祫猶並祀羣廟禘大祭也豈止於祀祖及祖之所自出而已乎此二説者趙伯循楊信齋諸公闢之善矣至於大禘之外復有時禘則見於禮記左傳者具有眀文而趙楊二公獨不以為然其意亦必謂禘大祭也不當復以此名時祭然不知祫亦大祭而亦有大祫時祫之分則禘何害其為一名而二祭乎然則以禘為配天以禘為合祀羣祖以禘為非時享其意皆夲於欲推尊禘祭之所以大而不欲小之故耳司尊彛凡四時之間祀追享朝享祼用虎彛蜼彛皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也鄭司農云追享謂禘也祫黃氏曰禘追祭其所自出故為追享詳見祭條司尊彛注楊氏曰司尊彛云凡四時之間祀追享朝享謂禘祫也所用尊彛皆同則禘禮大略當如祫禮禘郊之事則有全蒸蒸升也全其牲體而升之也國語周語天子禘郊之事必自射其牲牲牛也語國語楚禘祭不過繭栗角如繭栗肅同上王聖證論曰昭王問觀射父祀牲何及對曰禘郊不過繭栗射父自謂天子之禘特用繭栗之牲不以禘為祀天也楊氏曰愚按王肅以禘用繭栗之牲而非祀天此言是矣但王肅又以禘為殷祭則與祫無異而不知所謂禘者禘其祖之所自出亦未為得也愚謂祭天用騂犢天子適諸侯諸侯膳用犢尊尊之義也禘者禘其所自出之帝尊而且逺亦用繭栗尊之如天也祖考與天夲一氣祖考近而親故以人道事之所自出之帝尊而且逺故以天道事之也又按禘禮大略雖與祫禮同然大祫則合毁廟未毁廟之主而祭之禘又上及其祖之所自出則禘又大於祫矣馬融王肅皆云禘大祫小此言是也鄭元注經乃云祫大禘小賈逵劉歆則云一祭二名禮無差降彼蓋不深考大傳小記之文與四代禘郊祖宗之義但以禘祫同為殷祭而不知禘為祭其祖之所自出所以徒為此紛紛也鄭氏禘祫志曰祫備五齊三酒禘以四齊二酒祫用六代之樂禘用四代之樂賈公彥曰祫十有二獻禘九獻此蓋注疏家溺於祫大禘小之説然也爾雅曰禘大祭也夫禴祠蒸嘗時祫大祫皆宗廟祭也爾雅特言禘為大祭則禘大於祫可知矣眀堂位言魯以禘禮祀周公於太廟牲用白牡樽用犧樽山罍鬱樽用黃目灌用玉瓚大圭薦用玉豆雕纂爵用玊盞仍雕加以璧散璧角俎用梡嶡其樂則升歌清廟下管象朱干玉戚冕而舞大武皮辨素積裼而舞大夏此蓋王禮也用之於周公之廟已為非禮其後他廟遂僭用之如閔二年夏五月乙丑吉禘於莊公僖八年秋七月禘於太廟用致夫人之類是也荀偃士丐曰魯有禘樂賔祭用之則不惟僭用之於祭亦僭用之於享賔矣此何異魯有佾舞雍徹而其後亦用之於季氏之庭三家之堂也故春秋特書二禘所以譏僭禮之始也而注疏反引之以為先王之正禮不亦誤乎賈公彥曰大祫十有二獻禘大於祫其禮尤隆至於獻數亦當同之但禮文殘缺莫得而見節文之詳爾成王以周公為有勳勞於天下命魯公世世祀周公以天子之禮樂同之於周尊之也魯公謂伯禽也季夏六月以禘禮祀周公於太廟牲用白牡樽用犧樽山罍鬱樽用黃目灌用玉瓚大圭薦用玊豆雕纂息緩反爵用玉盞仍雕加以璧散璧角俎用梡若管反嶡居衛反升歌清廟下管象朱干玉戚冕而舞大武皮辨素積裼而舞大夏昧東夷之樂也任南蠻之樂也納夷蠻之樂於太廟言廣魯於天下也季夏建巳之月也禘大祭也周公曰太廟魯公曰世室羣公稱宫白牡殷牲也樽酒器也犧樽以沙羽為畫飾象骨飾之鬱鬯之器也黃彛也灌酌鬱樽以獻也瓚形如盤容五升以大圭為柄是謂圭瓚纂籩屬也以竹為之雕刻飾其直者爵君所進於尸也仍因也因爵之形為之飾也加加爵也散角皆以璧飾其口也梡爼有四足也嶡為之距清廟周頌也象謂周頌武也以管播之朱干赤大盾也戚斧也冕冠名也諸公之服自衮冕而下如王之服也大武周舞也大夏夏舞也周禮昧師掌教昧樂詩曰以雅以南以籥不僭廣大也樽疏曰夏之季夏非禘祭之月故知是周之季夏犧山罍魯得用天子之樽為犧牛及象之形鑿其背以為樽山罍謂夏后氏之樽薦謂祭時所薦葅醢之屬纂形似筥以竹為之雕鏤其柄盞夏后氏之爵名加謂尸入室饋食競主人酌醴齊酳尸名為朝獻朝獻竟而夫人酌盎齊亞獻名為再獻又名為加於時薦加豆籩也此再獻之時夫人用璧角內宰所謂瑶爵也其璧散者夫人再獻訖諸侯為賔用之以獻尸雖非正加是夫人加爵之後總而言之亦得稱加故此總云加以璧散璧角先散後角便文也梡嶡兩代俎也虞俎名梡梡形四足如案長二尺四寸廣一尺二寸髙一尺諸侯加雲氣天子犧飾之夏俎名嶡嶡亦如梡而橫柱四足中央如距也賀云直有腳曰梡加腳中央橫木曰嶡升歌升堂歌清廟下管堂下吹管以播象武之詩朱干王戚赤盾柄而玉飾斧也冕而舞大武者冕衮冕也大武武王樂也王著衮冕執赤盾玉斧而舞武王伐紂之樂也皮辨素積裼而舞大夏者皮辨三王之服也裼見美也大夏夏禹之樂也王又服辨裼而舞夏后氏之樂也六冕是周制故用冕舞周樂皮辨是三王服故用皮辨舞夏樂也周樂是武武質故不裼夏家樂文文故裼也若諸侯之祭各服所祭之冕而舞故祭統云諸侯之祭也與競內樂之冕而總干率其羣臣以樂皇尸是也昧東夷之樂也任南蠻之樂也者周公德廣非唯用四代之樂亦為蠻夷所歸故賜奏蠻夷之樂於庭也唯言蠻夷則戎狄從可知也君卷冕立於阼夫人副禕立於房中君肉袒迎牲於門夫人薦豆籩卿大夫贊君命婦贊夫人各揚其職百官廢職服大刑而天下大服禕音輝袒音誕副首飾也詩云副笄六珈周禮追師掌王后之首服為副禕王后之上服唯魯及王者之後夫人服之諸侯夫人則自䄖翟而下贊佐也命婦於內則世婦也於外則大夫之妻也祭祀世婦以下佐夫人揚舉也大刑重罪也天下大服知周公之德宜享此也時珈音加追丁回反䄖羊昭反疏曰明祀周公之君與夫人卿大夫命婦行禮之儀尸初入之時君待之於阼夫人立於東房中魯之太廟如天子明堂也此文承上禘祀周公之下知周公之德宜享此也閔公二年夏五月乙酉吉禘於莊公莊公喪制未闋時别立廟廟成而吉祭又不於太廟故詳書以示譏左氏曰速也公羊曰言吉者未可以吉也何以書譏始不三年也榖梁曰吉禘者不吉是也喪事未畢而舉吉祭故非之也趙氏曰魯之用禘蓋於周公廟而上及文王文王即周公之所自出也故此祭唯得於周公廟為之閔公時遂僭於莊公廟行之亦猶因周公廟有八佾季氏遂用之於私庭也以其不追配故直言莊公而不言莊宫明用其禮物耳不追配文王也春秋書吉禘於莊公譏其不當吉又不當禘於莊也僖公八年秋七月禘於太廟用致夫人禘三年大祭之名太廟周公廟致者致新死之主於廟而列之昭穆夫人淫而與殺不薨於寢於禮不應致故書之殺音試左氏曰禘而致哀薑焉非禮也凡夫人不薨於寢不殯於廟不赴於同不祔於姑則弗致也寢小寢也同同盟將葬又不以殯過廟據經哀薑薨葬之文則為殯廟赴同祔姑今當以不薨於寢不得致也公羊曰用者不宜用也致者不宜致也榖梁傳二句同禘用致夫人非禮也趙氏曰譏其非時之禘又譏致夫人也孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也記魯失禮所由也孟獻子魯大夫仲孫蔑也魯以周公之故得以正月日至之後郊天亦以始祖后稷配之獻子欲尊其祖以郊天之月對月禘之非也魯之宗廟猶以夏時之孟月爾明堂位曰季夏六月以禘禮祀周公於太廟夏疏曰獻子言十一月建子冬至既祭上帝故建午至亦可禘祖以兩月日至相對故欲祭祖廟與天相對也故曰七月日至可以有事於祖也此言非也凡大祭宜用首時應禘於孟月於夏家是四月於周為六月故眀堂位云季夏六月以禘禮祀周公於太廟是夏之孟月也獻子捨此義欲以此二至相當以天對祖殊失禮意雜記下趙氏曰禘夲以夏之孟月至孟獻子乃以夏之仲月為之又曰其年數或每年一行或三年一行未可知也孔子曰我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣禮運子曰禘自既灌而往者吾不欲觀之矣朱子曰成王以周公有大勳勞賜魯重祭故得禘於周公之廟以文王為所出之帝而周公配之然非禮矣灌者方祭之始用鬱鬯之酒灌地以降神也魯之君臣當此之時誠意未散猶有可觀自此以後則浸以懈怠而無足觀矣蓋魯祭非禮孔子夲不欲觀至此而失禮之中又失禮焉故發此歎也或問禘之説子曰不知也知其説者之於天下也其如示諸斯乎指其掌朱子曰先王報夲追逺之意莫深於禘非仁孝誠敬之至不足以與此非或人之所及也而不王不禘之法又魯之所當諱者故以不知答之示與視同指其掌弟子記夫子言此而自指其掌言其明且易也蓋知禘之説則理無不明誠無不格而治天下不難矣聖人於此豈真有所不知也哉論語八佾問禘之説朱子曰禘之意最深長如祖考與自家身心未相遼絶祭祀之理亦自易理會至如郊天祀地猶有天地之顯然者不敢不盡其心至祭其始祖已自大假濶逺難盡其感格之道今又推其始祖之所自出而祀之苟非察理之精微誠意之極至安能與於此哉故知此則治天下不難也又曰程先生説禘是禘其祖之所自出併羣廟之王皆祭之祫則止自始祖而下合羣廟之主皆祭之所謂禘之説恐不然故論語集解中止取趙伯循之説問禘之説諸儒多作魯躋僖公於閔公之上昭穆不順故聖人不欲觀之如何曰禘是於始祖之廟推所自出之帝設虛位以祀之而以始祖配即不曾序昭穆故周禘帝嚳以后稷配之王者有禘有祫諸侯只有祫而無禘此魯所以為失禮也楊氏曰愚聞之師曰鄭氏以禘祫皆為魯禮抑不知天子有禘有祫諸侯有祫而無禘成王賜周公以禘禮蓋亦禘於周公之廟爾閔僖二公竊禘之盛禮以行吉祭致夫人春秋常事不書特書閔僖二禘者惡僭竊之始也今乃據春秋書二禘以為魯禮可乎又以禘祫同為殷祭抑不知祫者合毁廟未毁廟之主於太祖之廟而祭之方謂之殷祭禘者禘其祖之所自出於始祖之廟而以始祖配之此祭不兼羣廟之主為其尊逺不敢褻也今乃謂禘為殷祭可乎惟其以禘祫皆為魯禮又以禘祫同為殷祭故後之言禘者皆求之於一祫一禘之中而不求於禘其祖之所自出混禘於祫而遂至於不知有禘遂使二千年來國家大典禮為所汨壞是誰之過與然義理在人心終不可埋沒唐大厯間趙伯循作春秋纂例獨得其説於大傳小記祭法之中以破鄭氏諸儒注疏之繆學士大夫皆是之然其説未眀於上也伏讀國朝會要元豐五年神宗皇帝因論廟祭以為禘者夲以審諦祖之所自出故禮不王不禘蓋王者竭四海之有以奉神明力大可以及逺故於祖禰之外又及其逺祖猶以為未足也推而上之及其祖之所自出自秦漢以來譜牒不明莫知其祖之所自出其禘禮固可廢也宰臣蔡確曰諸儒議論紛紜莫知禘之夲意聖訓發明非臣等所及神宗皇帝聖學髙明當時儒臣有能推廣上意尋繹古典以成之則二千年已廢之禮可復舉行於後世惜也禘之説已明於上而莫有能將順之於下也或曰虞夏殷周四代各有自出之帝則禘禮可行也後世如漢髙祖崛起草野五載而成帝業非有所自出之帝如虞夏商周世系相承可考也則宜何禘乎曰木有本水有源人莫不有所自出之祖若論所自出之根源則厥初生民之祖是也虞夏殷周有所自出之帝故報夲追逺之心上及於黃帝帝嚳而止若報本追逺之心未有所止則必至於厥初生民之祖而後已是以程子祭禮有冬至祭初祖一條以明孝子慈孫報夲追逺深長之思仁孝誠敬無窮之念後來朱子又以初祖之祭似禘而不敢行夫程子未嘗建議於朝修定祭禮所論冬至祭始祖一節亦統言祭禮之大綱未及於尊卑輕重隆殺之差也朱子以初祖之祭似禘而不敢行者以禮不王不禘故也漢世既無太祖廟又不禘及初祖此不可以為法後之君子有能推明大傳小記之文虞夏殷周已行之禮參之以程子朱子精微之論則禘禮可行而古人甚盛之典復見於後世矣又曰愚按禮經唯禘禮為注疏汨壞最甚夫禘王者之大祭王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之見於大傳小記祭法及儀禮子夏傳甚詳且明如此鄭康成見祭法禘文皆在郊上率爾立論謂禘大於郊而以禘為祭天之名既又以地祗宗廟亦是大祭復指禘為祭地祗祭宗廟之名且於大司樂注中立為三禘之説以實之支離泛濫不可收拾諸儒已辨其謬矣若夫以禘為祭宗廟似矣但謂禘為時祭又謂禘為殷祭又與大傳小記祭法大相違背其故何哉蓋以禘為時祭此緣記禮者之誤鄭氏不能察而遂指為夏殷禮趙氏已辨之矣唯以禘為殷祭則其失已久其混淆益甚愚前已言之今併列先儒之説於後庶可參見漢元帝永光四年罷郡國廟詔將軍列侯中二千石諸大夫博士議廟制韋元成等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁迭互也親盡則毁毁廟之主藏乎太祖五年而再殷祭言一禘一祫也師古曰殷大也禘諦也一二祭之祫合也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖之所自出以其祖配之而立四廟言如受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毁親踈之殺示有終也餘見宗廟門哀帝時議毁廟劉歆以為禮去事有殺去除也殺漸也所例反故春秋外傳曰日祭月祀時享嵗貢終王祖禰則日祭曾髙則月祀二祧則時享壇墠則嵗貢大禘則終王服虔曰蠻夷終王乃入助祭各以其珍貢以共大禘之祭也師古曰每一王終新王即位來助祭德盛而遊廣親親之殺也彌逺則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毁廟晉灼曰以情推子以子况祖得人心禮何所違故無毁棄不禘之主也謂下三廟廢而為墟故也自貢禹建迭毁之議惠景及太上寢園廢而為墟失禮意矣漢舊儀宗廟三嵗一大祫祭子孫諸帝以昭穆坐於髙廟諸隳廟神皆合食設左右坐髙祖南面幄繡帳堂上西北隅帳中皆長一丈廣六尺繡禋厚一尺著之以坐幄郤六寸白銀扣扣器每大牢中分之右辨上帝左辨上后尸俱俎餘委肉穆東面皆曲几如髙祖饌陳其尸各配其左坐如祖妣之坐法太常道皇帝入北門羣臣陪位者皆舉手班辟及走逆首伏大鴻臚大行令九儐傳曰起復位而皇帝上堂盥侍中奉觶酒從帝進謁贊享曰嗣曾孫皇帝敬再拜前上巵酒郤行至昭穆之坐次上酒子為昭孫為穆各父子相對也畢却西面坐坐如乘輿坐贊享曰奉髙祖賜賚皇帝起再拜即席以太牢之左辨賜皇帝如祠見夜半入行禮平眀上九巵畢羣臣皆拜因賜胙皇帝出即更衣中詔罷當從者奉引皇帝按西漢書未嘗言禘祫之祀惟漢舊儀載其制頗詳又韋元成傳載諸儒因議毁廟而及禘祫其説并著於此然則以禘為五年之殷祭以禘為祀天以禘為並祭羣廟韋劉諸人所言已如此鄭康成特襲其訛耳劉歆大禘則終王之説是每王一世方一舉禘禮又與五年之説不合云光武建武十八年幸長安詔太常行禘禮於髙廟序昭穆父為昭南向子為穆北向二十六年有詔問張純禘祫之禮不施行幾年宜據經典詳為其制純奏禮三年一祫五年一禘春秋傳曰大祫者何合祭也毁廟之主陳於太祖未毁廟之主皆升合食太祖五年再殷祭漢舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭元始五年諸王公列侯廟會為禘祭又建武十八年親幸長安亦行此禮記説三年一閏天氣小備五年再閏天氣大備三年一祫五年一禘父為昭南嚮子為穆北嚮父子不並坐而孫從王父禘之為言諦諦諟昭穆尊卑之義也禘祭以夏四月陽氣在上隂氣在下故正尊卑之義也祫祭以冬十月五榖成熟物備禮成故合聚飲食也斯典之廢於兹八年謂可如禮施行以時定議上難復立廟遂以合祭髙廟為常後以三年冬祫五年夏禘之時但就陳祭毁廟主而已謂之殷太祖東面惠文武元帝為昭景宣帝為穆惠景昭三帝非殷祭時不祭自是禘祫遂定志及張純傳章帝建初七年八月飲酎髙廟禘祭光武皇帝孝明皇帝甲辰詔書云祖考來假明哲之祀豫末小子質又菲薄仰惟先帝蒸蒸之情前修禘祭以盡孝敬朕得識昭穆之序寄逺祖之思今年大禮復舉加以先帝之坐悲傷感懷樂以迎來哀以送往雖祭亡如在而虛空不知所裁庶或享之豈亡克謹肅雍之臣辟公之相皆助朕之依依今賜公錢四十萬卿半之及百官執事各有差按三年一祫五年一禘之説先儒林氏楊氏皆以為鄭康成因春秋文公二年有祫僖公定公八年有禘遂依約想像而立為此説蓋以魯僭亂之制定為周禮以誤後人然光武建武二十六年詔問張純禘祫之禮而純奏禮三年一祫五年一禘然則其説久矣蓋此語出於緯書緯書起於元成之間而光武深信之當時國家典禮朝廷大事多取決焉故此制遂遵而行之康成蓋以漢禮為周禮非魯禮也魏眀帝太和六年尚書難王肅以曾子問唯祫於太祖羣主皆從而不言禘知禘不合食肅答曰以為禘祫殷祭羣主皆合舉祫則禘可知也袁準正論曰先儒或以為同或以為異然祫及壇墠禘及郊宗石室此所及近逺之殺也大傳曰禮不王不禘諸侯不禘降於天子也若禘祫同貫此諸侯亦不得祫非徒不禘也武宣皇后太和四年六月崩至六年三月有司以今年四月禘告王肅議曰今宜以崩年數按春秋魯閔公二年夏禘於莊公是時縗絰之中至二十五月大祥便禘不復禫故譏其速也去四年六月武宣皇后崩二十六日晚葬除服即吉四時之祭皆親行事今當計始除服日數當如禮須到禫月乃禘趙怡等以為皇帝崩二十七月之後乃得禘祫王肅又奏如鄭元言各於其廟則無以異四時常祀不得謂之殷祭以粢盛百物豐衍備具為殷之者夫孝子盡心於事親致敬於四時比時具物不可以不備無緣儉祭其親纍年而後一豐其饌夫謂殷者因以祖宗並陳昭穆皆列故也毁以為毁廟之主皆祭謂殷者夫毁廟祭於太祖而六廟獨在其前所不合宜非事之理近尚書難臣以曾子問唯祫於太祖羣主皆從而不言禘知禘不合食臣答以為禘祫殷祭羣主皆合舉祫則禘可知也論語孔子曰禘自既灌而往者吾不欲觀之矣所以特禘者以禘大祭故欲觀其成禮也禘祫大祭獨舉禘則祫亦可知也於禮記則以祫為大於論語則以禘為盛進退未知其可也漢光武時下祭禮以禘者毁廟之主皆合於太祖祫者唯未毁之主合而已矣鄭元以為禘者各於其廟原其所以夏商夏祭曰禘然其殷祭亦名大禘商頌長發是大禘之歌也至周改夏祭曰礿以禘唯為殷祭之名周公以聖德用殷之禮故魯人亦遂以禘為夏祭之名是以左傳所謂禘於武宮又曰蒸嘗禘於廟是四時祀非祭之禘也鄭斯失矣至於經所謂禘者則殷祭之謂鄭據春秋與大義乖按太和八年用王肅議袁準曰祫及壇墠禘及郊宗石室此所及逺近之殺也大傳曰禮不王不禘諸侯不禘降殺於天子也若禘祫同貫此諸侯亦不得祫也然則禘大而祫小謂祫為殷祭者大於四時皆大祭也國語曰禘郊不過繭栗蒸不過把握明禘最大與郊同也公羊傳曰大事者何祫毁廟之主陳於太祖夫毁廟之主皆升合食乎太廟何謂也曰夫禘及壇墠則毁廟也俱祭毁廟但所及異耳所及則異毁與未毁則同此論者所惑鄭謂不同是也謂禘不及毁廟則非也劉韶賈逵同毁與未毁是也不别禘祫逺近則非也東晉升平五年五月穆帝崩十月殷興寧三年二月哀皇帝崩明帝太和元年三月皇后庾氏崩廢帝海西公后也十月殷此哀皇帝再周之內庾氏既葬之後殷也太元二十一年十月應殷其年九月孝武崩至隆安三年國家大吉乃循殷事元興三年夏應殷太常博士徐乾等議應用孟秋進用孟冬時孔安國云自太和四年已後殷祭皆用冬夏復詳徐乾議用孟秋非失也安帝義熙三年當殷御史中丞范泰議以章后喪未一周不應殷祠時從太常劉瑾議小君之喪不以廢大禮泰議曰今雖既祔之後得以蒸嘗禮有喪薦廢吉祭祭新主於寢今不設别寢既祔遂祭於廟故四時蒸嘗以寄追逺之思三年一禘以習昭穆之序義夲各異三年喪畢則合食太祖過時而殷無取於限三十月也隆安之初以喪而廢矣瑾議曰臣尋升平已後殷祭皆在周內永和十年至今五十餘載三十月輒殷是依禮五年再殷而泰言非當若臣啓不允則責失奏彈初元帝元興三年四月不得殷祀進用十月若計常限今當用冬若更起端則應四月時尚書奏從領司徒王謐議反初四月為殷祠之始謐議曰有非常之慶有非常之禮殷祭舊準不差至於義熙之慶經古莫二雖曰反正理同受命愚謂履運惟新於是乎始宜用四月太常劉瑾議殷無定月考時致敬且禮意尚簡去年祠雖於日有差而情典允備宜仍以為正徐乾議三年一祫五年一禘經傳經籍不見補殷之文著作郎徐廣議若用三十月今則應用四月於時有殷而遷在冬從太元元年十月殷祠若用常三十月今則應用二年四月是追計辛未嵗十月未合六十月而再殷劉澗之等議泰元元年四月應殷而禮官墮失逮用十月夲非正朝以失為始尚書奏從謐議博士陳舒表三嵗一閏五年祭八年又殷兩頭如四實不盈三又十一年殷十四年殷凡間含二則十年四殷與禮五年再殷其議合矣博士徐禪議春秋左氏傳曰嵗祫及壇墠終禘及郊宗石室許慎稱舊説曰終者謂孝子三年喪終則禘於太廟以致新死者也徐邈議禮五年再殷凡六十月分中每三十月殷也太學博士曹述初難云三年之喪其實二十有五月則五年何必六十月禮天子特礿三時皆祫禘祫雖有定年而文無定月按明堂夏六月以禘禮祀周公則今之四月七月月至孟獻子禘其祖則今之五月春秋文公二年大事於太廟則今之六月邈答曰五年再殷象再閏無取三年喪也祫三時皆可者蓋喪中則吉而祫服終無常故祫隨所遇唯春不祫故曰特礿非殷祀常也禮大事有時日故蒸嘗以時况祫之重無定月乎今據徐邈議每三十月當殷祀賀循祫祭圖太祖東向昭北行南向穆南行北向宋制殷祭皆即吉乃行武帝永初三年九月十日奏傅亮議權制即吉聖代宜耳文帝元嘉六年祠部定十月三日殷祀十三蒸禮太學博士徐道娛議曰按禘祫之禮三年一五年再在四時禮也周禮仲冬享蒸月令季秋嘗稻晉以春蒸曲沃齊十一月嘗太公此並孟仲區分不共之明矣尋殷蒸祀重祭薦禮輕輕尚異月重寧反同且祭不欲數數則黷今隔旬頻享於禮為煩孝武建元元年十一月有司奏依舊令今年十月是殷祠之月領曹郎范義參議依永初三年例須再周之外殷祭尋祭再周來二年三月若以四見殷則猶在禫內下禮官議正國子助教蘇瑋生議按禮三年喪畢然後祫於太祖又云三年不祭唯祭天地社稷為越紼而行事且不禫即祭見譏於春秋求之古禮喪服未終故無祼享之義自漢已來一從權制宗廟朝聘莫不皆吉太學博士徐宏議三年之喪雖從權制再周祥變猶服縞素未為純吉無容以祭謂來年四月未宜便殷十月則允太常丞朱膺之議虞禮云中月而禫是月也吉祭猶未配謂二十七月既禫祭當四時之祭月則未以其妃配哀未忘也推此謂禫不得祭也春秋閔公二年吉禘於莊公鄭注云閔公心懼於難務自尊大以厭其禍凡二十二月而除喪又不禫明禫內不得禘也按舊説三年喪畢遇禘則禘遇祫則祫鄭元云禘以孟夏祫以孟秋今相承用十月如宏所上公羊之文亦以魯閔因紀制耳何必全許素冠行吉禘郎中周景逺參議永初三年九月十日傅亮議曰權制即吉聖代宜耳宗廟大禮宜依舊古典謂徐宏朱膺之議用來二年十月殷祀為允䛇可大眀七年二月有司奏四月應殷祠若事中未得用孟秋領軍長史周景逺議按禮記云天子祫禘祫嘗祫蒸則夏秋冬皆殷晉義熙初僕射孔安國議自太和四年相承殷祭皆用冬夏又云永和十年至今五十餘年用三十月輒殷祀博士徐乾難安國又引晉咸康六年七月殷祠是不専用冬夏時雖不從乾議而安國無以奪之今若以來年四月未得殷祀遷用立秋於禮無違矣詔可梁制三年一禘五年一祫謂之殷祭禘以夏祫以冬皆以功臣配其儀頗同南郊尚書左丞何佟之議曰禘於首夏物皆未成故為小祫於秋冬萬物皆成其禮尤大司勳列功臣有六皆祭於大蒸知祫尤大乃及之也近代禘祫並不及功臣有乖典制宜改詔從之陳制五年再殷殷大祫而合祭也魏文帝大和十三年詔公卿議王鄭言禘祫之是非尚書遊眀根言曰鄭氏之義禘者大祭之名大祭圜丘謂之禘者審諦五精星辰也大祭宗廟謂之禘者審諦其昭穆百官也圜丘常合不言祫宗廟時祫故言祫斯則宗廟祫禘並行圜丘一禘而已宜於宗廟俱行禘祫之禮二禮異故名殊依禮春廢特礿於嘗於蒸則祫嘗祫蒸不於三時皆行禘祫之禮中書監髙閭又言禘祭圜丘與鄭義同者以為有虞禘黃帝黃帝非虞在廟之帝不在廟非圜丘而何又大傳云祖其所自出之祖又非在廟之文論語稱禘自既灌以據爾雅稱禘大祭也諸侯無禘禮唯夏祭稱禘又非宗廟之禘魯行天子之儀不敢専行圜丘之禘改殷之禘取其禘名於宗廟因先有祫遂生兩名其宗廟禘祫之祭據王氏之義祫而禘禘止於一時一時者祭不欲數一嵗三禘愚以為過數詔曰眀根閭等據二家之義論禘祫詳矣至於事取折𠂻猶有未允閭以禘祫為名義同王氏禘祭圜丘事與鄭同無非間然眀根以鄭氏等兩名兩祭並存並用理有未俱稱據二義一時禘祫而闕二時之禮事有難從先王制禮內緣人子之情外協尊卑之序故天子七廟數盡則毁藏主於太祖之廟三年而祫祭之代盡則毁以示有終之義三年而祫以申追逺之情禘祫既是一祭分而兩之事無所據毁廟三年一祫又有不盡四時於禮為闕七廟四時常祭祫則三年一祭而又不究四時於情為簡王以祫為一祭王義為長鄭以圜丘為禘與宗廟大祭同名義亦為當今互取鄭王二義禘祫并為一名從王禘是祭圜丘大祭之名上下同用從鄭若以數則黷五年一禘改祫從禘五年一禘則四時盡禘以稱今情則旅天禮文先禘而後時祭便即施行著之於令永為代法宣武帝景眀中祕書丞孫惠蔚上言魏眀帝以景初三年正月崩至廢帝正始二年積二十五晦為大祥有司以為禫在二十七月到其年四月依禮應祫王肅以為祥月至其年二月宜應祫祭雖各異議至於喪畢之祫眀年之禘其義一焉請取鄭捨王禫終此晦來月中旬禮應大祫六室宗祏升食太祖明年春享咸禘羣廟自兹以後五年為常又古之祭法時祫並行天子先祫後時諸侯先時後祫諸侯先時後祫此施古為當在今則否且禮有升降事有文質適時之制聖人弗違當祫之月宜減時祭從之延昌四年正月宣武帝崩孝眀即位三月時議來秋七月應蒸祭於太祖太常卿崔亮上言今武宣皇帝主雖入廟然蒸嘗時祭猶别寢室至於殷祫宜存古典按禮三年喪畢祫於太祖明年春禘於羣廟又按杜元凱云卒哭而除三年喪畢而禘魏武皇后以太和四年六月崩其月既葬除服即吉四月行事而猶未禘王肅以為既除即吉故特時祭至於禘祫宜存古禮髙堂隆如肅議於是停殷祭又仰尋太和二十三年四月孝文帝崩其年十月祭廟景明元年七月祫於太祖三年春禘於羣廟亦三年乃祫準古禮及晉魏之議并景眀故事愚謂來秋七月祫祭應停宜待三年終乃後禘祫從之致堂胡氏曰宗廟之祭莫重於禘祫而自漢以來諸儒之論紛紜交錯誠如聚訟莫得其要則混然行之不有逹理真儒擇乎經訓而折其𠂻何以破古昔之昏昏示後來之昭昭邪真儒之言曰天子禘諸侯祫大夫享庶人薦此尊卑之等也所以知天子禘者以禮云禮不王不禘知之也所以知諸侯祫者魯侯國當用祫而以賜天子禮樂故春秋中有禘無祫而孔子曰魯之郊禘非禮也言諸侯不當用禘也禘祫者合祭之名耳天子有所自出之帝為東向之尊餘廟以昭穆合食於前是之謂禘諸侯無所自出之帝則合羣廟之主而食於太廟是之謂祫若其時其物則視其所得用而隆殺之矣以此斷禘祫豈不眀哉按以禘祫為共一祭而異名以禘為合祭祖宗審諦昭穆之義漢儒之説也近代諸儒多不以為然獨致堂從之然大傳禮不王不禘王者禘其祖之所自出以其祖配之而即繼之曰諸侯及其太祖大夫士有大事省於其君干祫及其太祖其文意亦似共只説一祭天子則謂之禘所謂不王不禘而祭則及其祖之所自出諸侯則不可以言禘而所祭止太祖大夫士又不可以言祫必有功勞見知於君許之祫則干祫可及髙祖蓋共是合祭祖宗而以君臣之故所及有逺近故異其名所以魯之禘祭者即祫也若大傳文諸侯之下更有一祫字則其義尤明後齊禘祫如梁之制每祭室一太牢始以皇后預祭後周祫禘則於太祖廟亦以皇后預祭其儀與後齊同隋二年一祫以孟冬遷主未遷主合食於太祖之廟五年一禘以孟夏其遷主各食其所遷之廟未遷之主各於其廟禘祫之日則停時享而陳諸瑞物及伐國所獲珍竒於廟庭及以功臣配享唐髙宗上元三年十月當祫而有司疑其年數太學博士史元璨等議以為新君喪畢而祫明年而禘自是之後五年而再祭蓋從禘去前禘五年而祫常在禘後三年禘常在祫後二年魯宣公八年禘僖公蓋二年喪畢而祫明年而禘至八年而再禘昭公二十年禘至二十五年又禘此可知也議者以元璨言有經據遂從之元宗開元六年睿宗崩喪畢而祫明年而禘自是之後禘祫各自計年不相通數凡七祫五禘至二十七年禘祫並在一嵗有司覺其非乃議以為一禘一祫五年再殷宜通數而禘後置祫嵗數逺近二説不同鄭元用髙堂隆先三而後二徐邈先二後三而邈謂為二禘相去為月六十中分三十置一祫焉此最為得遂用其説由是一禘一祫在五年之間合於再殷之義而置祫先後不同焉致堂胡氏曰禮記大傳曰禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大夫士省於其君干祫及其髙祖是天子禘諸侯大夫士祫之正文也終大傳一篇無舛駮於聖王之教者此孔氏所傳也王制乃漢儒刺經為之出於孝文之世其言舛駮於聖王之教者多矣固非孔氏所傳也以義類考之禘祫皆合食也故君子曰禘其所自出之帝為東向之尊其餘合食於前此之謂禘諸侯無所自出之帝則於太祖廟合羣廟之主而食此之謂祫天子禘諸侯祫上下之殺也魯諸侯何以得禘成王追念周公有大勳勞於天下賜魯以天子禮樂使用諸太廟上祀周公於是乎有禘所以春秋言禘不言祫也此稽大傳而折𠂻者也王制之文曰春礿夏禘又曰天子祫禘祫嘗祫蒸又曰諸侯禘一犆一祫又曰諸侯礿則不禘禘則不嘗其言紛錯淆亂莫可按據鄭氏不能辨正又曲為之説春礿夏禘乃夏殷祭名周則改之以禘為殷祭且王制所載六官之事皆周制也此惑於漢儒而不通禘義之一也又曰天子諸侯之喪畢合先君主於祖廟而祭之謂之禘此惑於漢儒不通祫義之二也又曰天子先祫而後時祭此惑於漢儒不通禘祭之三也又曰魯禮三年喪畢而祫於太祖眀年春禘於羣廟此惑於漢儒不通禘義之四也又曰禘殷祭也五年而再殷祭一祫一禘此又自叛其説不曉禘義之五也又曰諸侯祫嵗不禘下天子此又不曉禘義之六也其釋大傳禘祫曰禘其所自出謂郊天也此又斷以已意不曉禘義之七也其失有七而未嘗折𠂻於孔子孔子曰魯之郊禘非禮也則知諸侯無禘而當祫天子無祫而有禘豈不眀白而易知乎後世惟王制之信慿鄭氏所釋而不考祭法大傳及孔子之言唐遂至夏禘冬祫始知其數而瀆也不亦失之逺乎天子諸侯之禮若一與二之辨豈可僭哉魯受成王之賜以臣僭君孔子已深非之况後世遵漢儒之謬以君用臣反不能知其失乎聖君監此則一言而決矣天寶八載制國家系夲仙宗業承聖祖自今以後每禘祫並於太清宫聖祖前設位序正上以明陟配之禮欽若元宗下以盡虔恭之誠無違至道比來每緣禘祫其常享則停事雖適於從宜禮或虧於必備已後每緣禘祫其常享無廢享以素饌三焚香以代三獻致堂胡氏曰唐非李𣆀之裔而以𣆀為祖孝子慈孫豈忍為也使𣆀而果祖也猶非所自出之帝不得與合食之享况非其祖而加之祖考之上是有兩姓之廟也此唐世典禮之大失而當時無一人言者君好諛而臣獻諂故雖以他人為祖而終不得知又况其餘乎德宗貞元七年太常卿裴郁奏曰國家誕受天命纍聖重光景皇帝始封唐公實為太祖中間世數既近在三昭三穆之內故皇家太廟惟有六室其𢎞農府君宣光二祖尊於太祖親盡則遷不在昭穆之數著在禮志可舉而行開元中加置九廟懿獻二祖皆在昭穆是以太祖景皇帝未得居東向之尊今二祖已祧九室惟序則太祖之位又安可不正伏以太祖上配天地百代不遷而居昭穆獻懿二祖親盡廟遷而居東向徴諸故實有所未安請下百僚僉議敕旨依禮禘祫太祖位於西而東向其子孫列為昭穆昭南向而穆北向雖已毁廟之主皆出而序於昭穆殷周之興太祖世逺而羣廟之主皆出其後故其禮易眀漢魏以來其興也暴又其上世微故創國之君為太祖而世近毁廟之主皆在太祖之上於是禘祫不得如古而漢魏之制太祖而上毁廟之主皆不合食唐興以景皇帝為太祖而世近在三昭三穆之內至禘祫乃虛東向之位而太祖與羣廟列於昭穆代宗即位祔元宗肅宗而遷獻祖懿祖於夾室於是太祖居第一室禘祫得正其位而東向而獻懿不合食建中二年太學博士陳京請為獻祖懿祖立别廟至禘祫則享禮儀使顔真卿議曰太祖景皇帝居百代不遷之尊而禘祫之時暫居昭穆屈已以奉祖宗可也乃引晉蔡謨議以獻祖居東向而懿祖太祖以下左右為昭穆由是議者紛然貞元十七年太常卿裴郁議以太祖百代不遷獻懿二祖親盡廟遷而居東向非是請下百僚議工部郎中張薦等議與真卿同太子左庶子李嶸等七人曰真卿所用晉蔡謨之議也謨為禹不先鯀之説雖有其言當時不用獻懿二祖宜藏夾室以合祭法逺廟為祧而壇墠有禱則祭無禱則止之義吏部郎中栁冕等十二人曰周禮有先公之祧遷祖藏於后稷之廟其周未受命之祧乎又有先王之祧其遷主藏於文武之廟其周已受命之祧乎今獻祖懿祖猶周先公也請築别廟以居之司勳員外郎裴樞曰建石室於寢園以藏神主至禘祫之嵗則祭之考功員外郎陳京同官縣尉仲子陵皆曰遷神主於德眀興聖廟京兆少尹韋武曰祫則獻祖東向禘則太祖東向十一年左司郎中陸淳曰議者多矣不過三而已一曰復太祖之正位二曰並列昭穆而虛東向三曰祫則獻祖禘則太祖迭居東向而復正太廟之位為是然太祖復位則獻懿之主宜有所歸一曰藏主夾室二曰置之别廟三曰遷於園寢四曰祔於興聖然而藏諸夾室則無享獻之期置之别廟則非禮經之文遷於寢園則亂宗廟之儀唯祔於興聖為是至十九年左僕射姚南仲等獻議五十七封付都省集議户部尚書王詔等五十五人請遷懿祖祔興聖廟議遂定由是太祖始復東向之位四門博士韓愈獻議曰今輒先舉衆議之非然後申明其説一曰獻懿廟主宜永藏之夾室臣以為不可夫祫者合也毁廟之主皆當合食於太祖獻懿二祖即毁廟主也今雖藏於夾室至禘祫之時豈得不食於太廟乎名曰合祭而二祖不得祭焉不可謂之合矣二曰獻懿廟主宜毁之瘞之臣又以為不可謹按禮記天子立七廟一壇一墠其毁廟之主皆藏於祧廟雖百代不毁祫則陳於太廟而享焉自魏晉已降始有毁瘞之議事非經據竟不可施行今國家德厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位况於毁瘞而不禘祫乎三曰獻懿廟主宜各遷於其陵所臣又以為不可二祖之祭於京師列於太廟也二百年矣今一朝遷之豈惟人聼疑抑恐二祖之靈眷顧依違不即享於下國也四曰獻懿廟主宜祔於興聖廟而不禘祫又以為不可傳曰祭如在景皇帝雖太祖其於屬乃獻懿之子孫也今欲正其子東向之位廢其父之大祭固不可為典矣五曰獻懿二祖宜别立廟於京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為墠去墠為鬼漸而愈逺其祭益稀昔者魯立殤宫春秋非之以為不當取已毁之廟既藏之主而復築宫以祭今之所議與此正同又雖違禮立廟至於禘祫也合食則禘無其所廢祭則於義不通此五説者皆所不可故臣博采前聞求其折中以為殷祖元王周祖后稷太祖之上皆自為帝又其代數已逺不復祭之故太祖得正東向之位子孫從昭穆之列禮所稱者蓋以紀一時之宜非傳於後代之法也傳曰子雖齊聖不先父食蓋言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東向之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情又常祭甚衆合祭甚寡則是太祖所屈之祭至少所伸之祭至多此於伸孫之尊廢祖之祭不亦順乎朱子韓文考異曰今按韓公夲意獻祖為始祖其主當居初室百世不遷懿祖之主則當遷於太廟之西夾室而太祖以下以次列於諸室四時之享則唯懿祖不與而獻祖太祖以下各祭於其室室自為尊不相降厭所謂所伸之祭常多者也禘祫則唯獻祖居東向之位而懿祖太祖以下皆序昭穆南北相向於前所謂祖以孫尊孫以祖屈而所屈之祭常少者也韓公禮學精深蓋諸儒所不及故其所議獨深得夫孝子慈孫報夲反始不忘其所由生之夲意真可為萬世之通法不但可施於一時也程子以為不可漫觀者其謂此類也歟但其文字簡嚴讀者或未遽曉故竊推之以盡其意云貞元十二年祫祭太廟近例祫祭及親拜郊令中使引傳國寶至壇所昭示武功至是上以傳國大事中使引之非宜乃令禮官一人就內庫監引領至太廟焉昭宗大順元年將行禘祭有司請以三太后神主祔享於太廟三后者孝眀太皇太后鄭氏宣宗母恭僖皇太后王氏敬宗母正獻皇太后韋氏文宗母三后之崩皆作神主有故不當入太廟當時禮官建議並置别廟每年五享三年一禘五年一祫皆於夲廟行事無奉神主入廟之文至是亂離之後舊章散失禮院慿曲臺禮欲以三太后祔享太常博士殷盈孫獻議非之議見后妃廟門文獻通考卷一百一
