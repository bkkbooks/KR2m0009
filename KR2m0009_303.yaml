body:
  text: 文獻通考卷三百三鄱陽馬端臨貴與著物異考九恆雨春秋魯隱公九年三月癸酉大雨震電庚辰大雨雪師古曰雨雪雨音于具反大雨雨水也師古曰下雨音于具反後類並同震雷也劉歆以為三月癸酉於歷數春分後一日始震電之時也當雨而不當大雨大雨恆雨之罰也於始震雷八日之間而大雨雪恆寒之罰也劉向以為周三月今正月也當雨水雪雜雨雷電未可以發也既已發也則雪不當復降皆失節故謂之異於易雷以二月出其卦曰豫師古曰坤下震上也言萬物隨雷出地皆逸豫也以八月入其卦曰歸妹師古曰兌下震上也言雷復歸入地則孕育根核保藏蟄蟲師古曰育字與育同核亦荄字也草根曰荄音該避盛陰之害出地則養長華實發揚隱伏宣盛陽之德入能除害出能興利人君之象也是時隱以弟桓幼代而攝立公子翬見隱居位已久勸之遂立師古曰公子翬魯大夫羽父也勸殺桓公已求為太宰翬音揮隱既不許翬懼而易其辭師古曰反謂桓公云隱欲殺之遂與桓共殺隱天見其將然故正月大雨水而雷電是陽不閉陰出涉危難而害萬物天戒若曰為君失時賊弟佞臣將作亂矣後八日大雨雪陰見間隙而勝陽篡殺禍將成也公不寤後二年而殺漢昭帝始元元年七月大水雨自七月至十月成帝建始三年秋大雨三十餘日四年九月大雨十餘日王莽地皇元年九月大雨六十餘日光武建武六年九月大雨連月禾稼更生鼠巢樹上十七年洛陽暴雨壞民盧舍壓殺人傷害禾稼和帝永元十年十三年十四年十五年皆淫雨傷稼安帝永初元年四年秋郡國十淫雨傷稼方儲對䇿日雨不時節妄賞賜也永寧元年郡國三十三淫雨傷稼建光元年京都及郡國二十九淫雨傷稼是時羌反久未平百姓屯戍不解愁苦延光元年郡國二十七淫雨傷稼按本傳陳忠奏以為王侯二千石為女使伯榮獨拜車下柄在臣妾二年郡國五連雨傷稼順帝永建四年司𨽻荆豫兖冀部淫雨傷稼六年冀州淫雨傷稼桓帝延熹二年夏霖雨五十餘日是時大將軍梁冀秉政擅殺其年冀伏誅靈帝建寧元年夏霖雨六十餘日時大將軍竇武謀誅中官事泄為曹節等所害熹平元年夏霖雨七十餘日時宦官曹節等譖殺渤海王悝中平六年夏霖雨八十餘日時靈帝初崩大將軍何進等謀誅廢宦官中常侍張讓等共殺進兵戰京都地死者數千魏明帝太和元年秋數大雨多暴卒雷電非常至殺鳥雀時帝居喪不哀出入弋獵無度奢侈繁興故恆雨為罰四年八月大雨霖三十餘日伊洛河漢皆溢吳孫亮太平二年二月甲寅大雨震電乙卯雪大寒按劉歆以為此時當雨而不當大雨劉向以為既已雷電則雪不當復降皆失時候之異與春秋魯隱同其後亮卒見廢晉武帝泰始六年六月大雨霖甲辰河洛伊沁水同時並溢流四千九百餘家殺二百餘人沒秋稼千三百六十餘頃太康五年七月任城梁國暴雨害豆麥九月南安郡霖雨暴雪樹木摧折害秋稼是秋魏郡西平郡九縣淮南平原霖雨暴水霜傷秋稼惠帝永寧元年十月義陽南陽東海霖雨淹害秋麥元帝太興三年春雨至於夏是時王敦執權不恭之罰也永昌元年春四十餘日晝夜雷電震五十餘日是時王敦興兵王師敗績之應也成帝咸和四年春雨三十餘日恆雷電是時雖斬蘇峻其餘黨猶據守石頭至其滅後淫雨乃霽咸康元年八月乙丑荆州之長沙攸醴陵武陵之龍陽三縣雨水浮漂屋室殺人損秋稼是時帝幼權在於下梁武帝天監七年七月雨至十月乃霽時頻年興師諸軍頗捷而士卒疲敝百姓怨望陰氣畜積之應也陳宣帝太建十二年八月大雨霪霖時始興王叔陵驕恣陰氣強盛之應也明年帝崩後主立叔陵作亂討平之東魏孝靜武定五年秋大雨七十餘日元瑾劉思逸謀殺齊文襄之應也北齊武成河清三年六月庚子大雨晝夜不息至甲辰山東大水人多餓死是歲突厥寇并州陰戎作梗之應後主天統三年十月積陰大雨胡太后淫亂所感武平七年七月大霖雨水潦人户流亡時駱提婆韓長鸞等用事小人專政後周武帝建德三年七月霖雨三旬時衛刺王直潛謀逆亂屬帝幸雲陽宮以其徒襲肅章門尉遲運逆拒破之其日雨霽唐高祖武德六年秋關中久雨少陽曰暘少陰曰雨陽德衰則陰氣勝故常雨太宗貞觀十五年春霖雨高宗永徽六年八月京城大雨顯慶元年八月霖雨更九旬乃止元宗開元二年五月壬子久雨禜京城門十六年九月關中久雨害稼天寶五載秋大雨十二載八月久雨十三載秋大霖雨害稼六旬不止九月閉坊市北門蓋井禁婦人入街市祭元冥太社禜明德門壞京城垣屋殆盡人亦乏食肅宗至德二載三月癸亥大雨至甲戌乃止上元元年四月雨訖閠月乃止二年秋霖雨連月渠竇生魚代宗永泰元年九月丙午大雨至於丙寅大歷四年四月雨至於九月閉坊市北門置土臺臺上置壇立黃幡以祈晴六年八月連雨害秋稼德宗貞元二年正月乙未大雨雪至於庚子平地數尺雪上黃黑如塵五月乙巳雨至於丙申時大飢至是麥將登復大雨霖衆心恐懼十年春雨閏四月間止不過一二日十一年秋大雨十九年八月己未大霖雨憲宗元和四年四月册皇太子寧以雨霑服罷十月再擇日册又以雨霑服罷近常雨也六年七月霖雨害稼十二年五月連雨八月壬申雨至於九月戊子十五年二月癸未大雨八月久雨閉坊市北門宋滄景等州大雨自六月癸酉至於丁亥盧舍漂沒殆盡敬宗寶歷元年六月雨至於八月文宗太和四年夏鄆曹濮等州雨壞城郭廬舍殆盡五年正月庚子朔京城陰雪彌旬開成五年七月霖雨葬文宗龍輴陷不能進宣宗大中十年四月雨至於九月懿宗咸通九年六月久雨禜明德門僖宗乾符五年秋大霖雨汾澮及河溢流害稼廣明元年秋八月大霖雨昭宗天復元年八月久雨後唐莊宗同光三年六月至九月大雨江河決壞民田廢帝清泰元年九月連雨害稼周太祖廣順二年七月暴風雨京師水深二尺諸州皆奏大雨宋太祖開寶元年六月州府二十三大雨水江河泛溢壞民廬舍二年二月車馬駐潞州積雨纍日未止九月京師大雨霖五年五月京師大雨連旬不止諸州皆言大雨霖八年五月京師大雨水九年三月京師大雨水秋又霖雨太宗太平興國五年五月京師連旬雨不止雍熙三年八月京師大霖雨淳化三年九月京師霖雨四年七月京師大雨十晝夜不止五年秋開封府宋亳陳潁泗壽鄧州雨水害稼至道元年四月甲辰京師大雨雷電道上水數尺二年廣南諸州並大雨水真宗咸平四年六月京師大雨漂壞廬舍積潦浸路天禧四年七月京師連雨彌月甲子夜大雨流潦泛溢民舍軍營自是頻雨及冬方止乾興元年二月蘇湖秀三州雨壞民田仁宗天聖四年六月庚寅京師大雨震雷平地水數尺九月壬申京東江淮閩浙諸州雨水七年自春涉夏雨不止嘉祐元年五月丁未晝夜大雨乙亥雨壞太社太稷壇自五月大雨不止水壞官私廬舍城中繫筏渡人四年八月霖雨害稼六年七月河北京西淮南江浙四路淫雨為災閏八月京師久雨英宗治平元年京師自夏歷秋久雨不止真宗及穆獻懿三后陵臺為雨所摧二年八月庚寅大雨地上涌水壞官私廬舍漂殺人畜不可勝數是日御崇政殿宰執而下朝參者十數人而已詔開西華門以泄宮中積水水奔激東殿侍班屋皆摧沒人畜溺死官為葬祭其無主者千五百八十人神宗熙寧七年六月熙州大雨洮河溢陜州大雨漂溺陜平陸二縣九年七月太原府汾河夏秋霖雨水大漲哲宗元祐二年七月丁卯以雨罷集英殿宴四年夏秋霖雨河流泛漲八年自四月常雨至八月晝夜霪霖畿內及諸路大水詔開京師宮觀五日所在令長吏祈禱宰臣呂大防等待罪紹聖元年七月京畿久雨諸路水害稼二年六月久雨九月以久雨罷秋宴三年七月久雨哲宗大升輿在道陷泥中徽宗建中靖國元年二月久雨崇寧元年七月久雨壞京城廬舍民多壓溺死三年六月久雨四年五月京師久雨又自七月至九月所在霖雨傷稼十月始霽宣和元年五月大雨水驟高十餘丈六年秋京畿常雨河北兩浙水災民多流移欽宗靖康元年四月京師大雨天氣清寒又自五月甲申至六月暴雨傷麥夏行秋令高宗建炎二年春霪雨三年二月上至杭州久陰霖雨占曰陰盛下有陰謀時苗劉為逆後五十日伏誅五月霖雨夏寒紹興元年行都雨壞城三百八十丈是歲婺州雨亦敗城郭三年雨自正月元日至於二月尋詔恤刑七月四川霖雨至於越歲正月上謂張浚久屯繁調所致戒以撫民四年六月霪雨害稼蘇湖二州為甚乙未緩賦九月久雨時逆豫連金人入寇十月戊戌上親征而霽五年三月霖雨傷蠶麥行都雨甚庚子慮獄己未發廩九月雨至於明年正月賑都民者再七年十月上如建鄴久雨八年三月積雨至於四月傷蠶麥害稼二十一年夏襄陽府大雨十餘日二十三年六月大雨壞軍壘民田辛酉豫緡蠲賦三十年五月辛卯大風雨語在水傳三十一年四月久雨傷蠶麥害稼三十二年六月浙西大霖雨孝宗隆興元年三月霖雨行都壞城郭三百三十餘丈二年六月霪雨沉陰七月浙西江東大雨霖傷稼八月風雨霖霪踰月乾道二年正月霪雨至於四月夏寒江浙郡國損稼蠶麥不登三年八月霖雨妨穡江浙淮閩禾麻菽粟多腐四年四月陰雨彌月六年五月連雨六十餘日十一月連雨辛巳郊開雲於圜丘百步外有霪雨八年四月四川陰雨七十餘日六月壬寅大雨徹晝夜至於己酉為災九年閏正月霪雨淳熙三年五月淮浙積雨損禾麥八月浙東西江東連雨癸未甲申行都大風雨九月久雨妨穡六年九月連雨己巳將郊而霽八年四月雨腐禾麥五月久雨敗首種十一年四月霪雨十二年五月六月皆霖雨十五年五月荆淮郡國連雨十六年五月浙西湖北福建淮東利西諸道大雨霖光宗紹熙元年春久陰連雨至於三月二年四月福建路霖雨至五月七月利路久雨傷種麥八月行都久雨三年五月江東湖北路連雨七月淮西鎮江襄陽雨害禾麥四年四月霖雨至於五月浙東西江東湖北淮西郡縣壞墟田害蠶麥蔬稑五年八月霖雨浙東西皆害稼九月雨至於十月江東福建皆苦雨寧宗慶元元年正月霖雨二月又雨至三月害麥五月霖雨七月雨至八月二年八月行都霖雨五十餘日三年七月雨連月五年五月行都雨壞城夜壓附城民廬多死者六月浙東霖雨至於八月嘉泰二年六月福建路連雨至於七月三年八月久雨開禧元年七月利路霖雨敗稼十月行都霪雨至明年春三月嘉定三年三月陰雨六十餘日五月潦雨至於六月首種多敗蠶麥不登四年八月霖雨至於九月五年春霪雨至於三月傷蠶麥十一月雨雪積陰至於明年春二月霪雨五月霖雨陰沉浙東西六月雨至於七月七年九月陰雨至於十月害禾麥九年四月霖雨六月大雨霖二十餘日浙東西郡縣為災十年三月連雨至於四月十月霖雨敗穡十一年六月浙西大霖雨十二年六月霖雨彌月十五年七月浙東西霖雨為災十六年五月霖雨浙西湖北江東淮東尤甚八月大風雨敗稼十七年八月霖雨甘露漢宣帝甘露元年甘露降後漢光武建武十二年夏甘露降中元元年郡國頻上言甘露降明帝永平十七年正月甘露降於甘陵章帝建初四年甘露降泉陵洮陽二縣安帝延光三年四月壬戌沛國言甘露降豐縣七月馮翊言甘露降頻陽衙桓宗延熹元年上郡言甘露降魏高貴鄉公甘露元年五月鄴及上谷並言甘露降陳留王咸熙二年四月南深澤縣言甘露降吳孫權黃武二年曲阿言甘露降嘉禾五年武昌言甘露降於禮賓殿赤烏二年零陵言甘露降九年