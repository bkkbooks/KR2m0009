陳王業是也歌于軍中周之愷樂愷歌是也漢有短簫鐃歌之曲凡二十二篇軍中謂之騎吹其曲曰戰城南聖人出之類是也魏因其聲製為克官渡等曲十有二篇晉亦製為征遼東等曲二十篇唐栁宗元亦嘗作為鐃歌十有二篇述髙祖太宗功烈我朝太祖太宗平僣偽一區宇真宗一戎衣而却強敵仁宗海涵春育德如堯舜髙宗再造大功上儷祖宗願詔文學之臣追述功業之盛作為歌詩使知樂者協以音律領之太常以播于天下夔乃自作聖宋鐃歌曲宋受命曰上帝命平上黨曰河之表定維揚曰淮海清取湖南曰沅之上得荆州曰皇威暢取蜀曰蜀土邃取廣南曰時雨霈下江南曰望鍾山吳越獻國曰大哉仁漳泉獻土曰謳歌歸克河東曰伐功繼征澶淵曰帝臨墉美仁治曰維四葉歌中興曰炎精復凡十有四篇上于尚書省書奏詔付太常文獻通考卷一百四十三
