body:
  text: 文獻通考卷五十四鄱陽馬端臨貴與著職官考八學士院學士之職本以文學言語被顧問出入侍從因得參謀議納諫諍其禮尤寵而翰林院者待詔之所也唐制乘輿所在必有文辭經學之士下至卜醫技術之流皆直於别院以備宴見而文書詔令則中書舍人掌之自太宗時名儒學士時召以草制然猶未有名號乾封以後始召文士元萬頃范履氷等草諸文辭常於北門候進止時人謂之北門學士中宗之世上官昭容專其事元宗初置翰林待詔以張說陸堅張九齡等為之掌四方表疏批答應和文章既而又以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制詔書勅開元二十六年又改翰林供奉為學士别置學士院專掌内命凡拜免將相號令征伐皆用白麻其後選用益重而禮遇益親至號為内相又以為天子私人元充其職者無定員自諸曹尚書下至校書郎皆得與選入院一嵗則遷知制誥未知制誥者不作文書班次各以其官内宴則居宰相之下一品之上憲宗時又置學士承㫖唐之學士𢎞文集賢分𨽻中書門下省而翰林學士獨無所屬致堂胡氏曰國家陟降多士當出於中書中書有私徇小則詰責大則黜削可也不當疑其專而分其權翰林初置人才與雜流並處其後雜流不入職清而地禁專以處忠賢文章之士然有天子私人之目内相之稱則非王政設官之體矣王者無私豈云私人相無不統豈云内相是與大臣自設形迹為異同也進退輔弼既與之謀安知無請託之嫌小人處之附下罔上安知無賣主之事故君道公而已矣或曰文章之用至衆中書門下之職至重勢有不得兼也故必委之翰林不可廢也曰自太宗髙宗時尚未有此不聞乏事武氏聚華藻輕薄之人於北門而中宗以宫婢主文柄是何足法者不必逺稽兩漢上法三王直取則於貞觀則於所損益可知矣石林葉氏曰唐翰林院在銀臺之北乾封以後劉禕之元萬頃之徒時宣召草制其間因名北門學士今學士院在樞宻院之後腹背相倚不可南向故以其西廊西向為院之正門而後門北向與集英相直因榜曰北門兩省樞宻院皆無後門惟學士院有之學士朝退入院與禁中宣命徃來皆行北門而正門行者無㡬不特取其便事亦以存故事也又曰唐翰林院本内供奉藝能技術雜居之所以辭臣特書詔其間乃藝能之一爾開元以前猶未有學士之稱或曰翰林待詔或曰翰林供奉如李太白猶稱供奉自張垍為學士始别建學士院於翰林院之南則與翰林院分而為二然猶冒翰林之名蓋唐有𢎞文館學士麗正殿學士故此特以翰林别之其後遂以名官訖不可改然院名至今但云學士而不冠以翰林則亦自唐以來沿襲之舊也容齋洪氏隨筆曰白樂天渭村退居寄錢翰林詩敘翰苑之親近云曉從朝興慶春陪宴栢梁分庭皆命婦對院即儲皇貴主冠浮動親王轡閙裝金鈿相照耀朱紫間熒煌毬簇桃花騎歌廵竹葉觴窪銀中貴帶昂黛内人粧賜禊東城下頒酺曲水傍罇罍分聖酒妓樂借仙倡蓋唐世宫禁與外庭不至相隔絕故杜子美詩户外昭容紫袖垂雙瞻御坐引朝儀又云舍人退食收封事宫女開函近御筵而學士獨稱内相至於與命婦分庭見貴主冠服内人黛粧假仙倡以佐酒他司無此也晉天福五年詔翰林學士院公事宜並歸中書舍人自是舍人晝直者當中書制夜直者當内制至開運元年復詔翰林學士與中書舍人分為兩制各置五員宋翰林學士掌内制制誥赦敕國書及宫禁所用之文辭凡后妃親王公主宰相節度使除拜則學士草詞授待詔書訖以進赦降徳音則先進草大詔命及外國書則具本禀奏得畫亦如之凡拜宰相或事重者宣召面諭㫖則給筆札書所得㫖禀奏歸院具辭以進餘遣内侍授中書省熟狀亦如之若已畫㫖而有未盡則論奏貼正乘輿行幸則侍從以備顧問有所獻納則請對或奏對凡初命為學士皆遣使就第宣詔㫖召入院淳化二年以翰林學士賈黄中蘇易簡同知京朝官考課李沆權判吏部流内銓故事學士掌内庭書詔指揮邊事曉逹機謀天子機事宻命在焉不當豫外司公事蓋防纎㣲間或漏省中語故學士院常在金鑾殿側號為深嚴自國朝太祖以來藉其才用始令判三銓及知太常禮院事天聖元年詔學士遇隻日至晩出宿蓋故事以雙日鎻院隻日降麻也隆興改元詔學士及經筵官内宿稍復祖宗故事石林葉氏曰學士院正㕔曰玉堂蓋道家之名初李肇翰林志末年居翰苑者皆謂凌玉清遡紫霄豈止於登瀛洲哉亦曰登玉堂焉自是遂以玉堂為學士院之稱而不為榜太宗時蘇易簡為學士上嘗語曰玉堂之設但虛傳其說終未有正名乃以紅羅飛白玉堂之署四字賜之易簡即扄鐍置堂上每學士上事始得一開視最為翰林盛事紹聖間蔡魯公為承㫖始奏乞摹就杭州刻榜揭之以避英廟諱去下二字止曰玉堂云沈氏筆談曰學士院玉堂太宗皇帝曾親幸至今唯學士上日許正坐他日皆不敢獨坐故事堂中設視草臺每草制則具衣冠據臺而坐今不復如此但存空臺而已玉堂東承㫖閣子窓格上有火燃處太宗嘗夜幸玉堂蘇易簡為學士已寢遽起無燭具衣冠宫嬪自窓格引燭入照之至今不欲更易以為玉堂一盛事洪氏容齋隨筆曰翰苑故事今廢棄無餘惟學士入朝猶有朱衣院吏雙引至朝堂而止及景靈宫行香則引至立班處公文至三省不用申狀但尺紙直書其事右語云諮報尚書省狀候裁㫖月日押謂之諮報此兩事僅存翰林學士承㫖唐憲宗時始置凡白麻制誥皆内庭代言命輔臣除節將恤災患討不廷則用之宰臣於正衙受付通事舍人若命相之書則通事舍人承㫖皆宣讀訖始下有司乾寧二年陸扆以翰林學士承㫖拜中書侍郎平章事後唐天成三年勅今後翰林學士入院並以先後為定惟承㫖一員出自朕意不計官資先後在學士之上仍編入翰林志宋承㫖不常置以學士久次者為之翰林學士直院權直唐元宗開元二十六年置初以中書務繁乃選文學之士號翰林供奉與集賢學士分掌制誥書命至是改供奉為學士别建學士院專掌内命以張垍劉光謙首居之而集賢所掌於是罷息自後給事中張淑中書舍人張漸竇華等相繼而入焉其後有韓雄閻伯璵孟匡朝陳兼蔣鎮李白等在舊翰林中但假其名而無所職至徳已後軍國務殷其入直者並以文辭共掌詔勅自此北翰林院始無學士之名其後又置東翰林院於金鑾殿之西隨上之所在而遷取其便穩大抵召入者一二人或三四人或五六人出於所命蓋不言數亦有以鴻生碩學經術優長訪問質疑上之所禮者頗列其中初自徳宗建置以來秩序未正延覲之際各超本列暨正元元年九月始别勅令明預班列與諸司官知制誥例同故事中書以黄白二麻為綸命重輕之辨近者所出猶得用黄麻其白麻皆在此院自非國之重事拜授於徳音赦宥者則不得由於斯矣興元元年翰林學士陸䞇奏學士私臣元宗初待詔内庭止於應和詩賦文章而已詔誥所出本中書舍人之職軍興之際促廹應務權令學士代之今朝野乂寧合歸職分其命將相制詔請付中書行遣物議是之敬宗以翰林學士崇重不可褻狎欲别置東頭學士以備曲宴賦詩事未行而帝崩梁開平三年改思政殿為金鑾殿置大學士一員以敬翔為之前朝因金鑾坡以為門名與翰林院相接故為學士者稱金鑾以美之今以金鑾為名非典也後唐同光初又置䕶鑾書制學士以趙鳳為之長興元年翰林學士劉煦奏舊例學士入院除中書舍人即不試餘官皆先試麻制批答詩賦各一道號曰五題後來雖有召試之名無考校之實欲請今後召試新學士權停詩賦祗試麻制批答共三道内賜題目定字數付本院召試從之晉天福五年廢翰林學士院其公事並歸中書舍人開運元年復學士院周顯徳五年詔今後當直下直學士並宜令逐日起居其當直學士仍赴晩朝舊制翰林學士與常參官五日一度起居世宗欲朝夕賜見訪以時事故有是詔宋翰林學士無定員凡他官入院未除學士謂之直院學士俱闕他官暫行文書謂之權直凡奏事用榜子關白三省樞宻院用諮報不名凡初命為學士皆遣使就第宣詔㫖召入院上日勅設會從官侑以樂元豐中始命佩魚自蒲宗孟始也凡執政議事則繫鞋蓋與侍從異禮也政和三年强淵明請以前後所被㫖及案例修為本院勅令格式五年御書摛文堂榜賜學士院靖康元年呉幵等奏大禮鎻院麻三道以上係雙宣學士宿直分撰乞依故事從之承㫖不常置以學士久次者為之闕員則以他官兼直院或權直自國初至行官制百司事失其實多所釐正獨學士院承唐舊典遵而不改乾道九年崔惇詩初以祕書省正字兼翰林權直淳熙五年惇詩再入院議者以翰林乃應奉之所非專掌制誥之地更為學士院權直後復為翰林權直然亦互除二員紹興間嘗除權與正官至三人洪氏容齋隨筆曰治平以前謂翰林學士及知制詔為兩制自翰林罷補外者得端明殿學士謂之換職熙寧之後乃始為龍圖紹興以來愈不及矣修起居注者序遷知制誥其次及辭不為者乃為待制趙康靖馮文簡曾魯公司馬公吕正獻公是也學士闕則次補或為宰相所不樂者猶得侍讀學士劉原甫是也在職未久而外除者為樞宻直學士韓魏公是也亦為龍圖直學士歐陽公是也後來褒擢者僅得待制王時亨是也餘以善去者集英修撰而止耳又曰淳熙十四年九月予以雜學士除翰林學士蔣世修以諫議大夫除御史中丞時施聖與在政府語同列云此二官不常置今咄咄逼人吾軰皆自㸃檢蓋謂其必大用也已而皆不然因考紹興中所除者不暇縷述姑從夀皇聖帝以後至於紹熙五年枚數之為學士者九人仲兄文安公史魏公伯兄文惠公劉忠肅王日嚴王魯公周益公及予其後李獻之也二兄史劉王周皆擢執政日嚴以耆老拜端明致仕惟予出補郡獻之遂踵武為中丞者六人辛企李姚令則黄徳潤蔣世修謝昌國何自然也辛姚黄皆執政惟蔣補郡云按唐之所謂翰林學士只取文學之人隨其官之崇卑入院者皆為學士延覲之際則各隨其元官立班而所謂學士未嘗有一定之品秩也故其尊貴親遇者號稱内相可以朝夕召對參議政事或一遷而為宰相而其孤逺新進者或起自初階或元無出身至試令草麻制甚者或試以詩賦如試進士之法其人皆呼學士自唐至五代皆然至宋則始定制資淺者為直院暫行者為權直於是真為翰林學士者職始顯貴可以比肩臺長舉武政路矣翰林侍讀學士侍讀兼侍讀唐元宗開元三年始命馬懷素褚無量更日侍讀上謂宰相曰朕每讀書有所疑滯無從質問可選儒學之士使入内侍讀待以師傅之禮十三年置集賢院侍讀學士侍讀直學士宋太宗始用著作佐郎吕文仲為侍讀真宗咸平二年以楊徽之夏侯嶠為翰林侍讀學士邢昺為翰林侍講學士始建學士之職其後馮元為翰林侍讀不帶學士又有馬宗元為侍講髙若訥為侍讀不加别名但供職而已天禧三年張知白為刑部侍郎充翰林學士知天雄軍府侍讀學士外使自知白始元豐官制廢翰林侍讀侍講學士不置但為兼官然必侍從以上乃得兼之其秩卑資淺則為說書嵗春二月至端午日秋八月至長至日遇隻日入侍邇英閣輪班講讀元祐七年復增學士之號元符元年省建炎元年詔特差侍從官四員充講讀官遇萬機之暇令三省取㫖就内殿講讀宫觀兼侍讀元豐八年五月資政殿大學士吕公著兼侍讀提舉中太乙宫兼集禧觀公事七月韓維兼侍讀提舉中太乙宫元祐元年端明殿學士范鎮致仕提舉中大乙宫兼集禧觀公事兼侍讀不赴六年馮京兼侍讀充太乙宫使未㡬乞致仕不允仍免經筵進讀中興來如王大資朱丞相勝非張大資浚謝參政克家趙觀文鼎万俟資政卨並以萬夀觀使兼侍讀隆興元年張大資燾以萬夀湯大觀思退以醴泉並兼侍讀乾道五年劉敷制章以佑神兼侍讀臺諫兼侍讀自慶歴以來臺丞多兼侍讀諫長未有兼者紹興十二年春万俟中丞卨羅諫議檝始並兼侍讀自後每除言路必兼經筵矣石林葉氏曰國初侍讀官初無定職但從講官入侍而已宋宣獻夏文莊為侍讀學士始請日讀唐書一傳仍參釋義理後遂為定制又曰國朝經筵講讀官舊皆坐乾興後始立蓋仁宗時年尚幼坐讀不相聞故起立欲其近爾後遂為故事熙寧初吕申公王荆公為翰林學士呉冲卿知諫院皆兼侍講始建議以為六經言先王之道講者當賜坐因請復行故事下太常禮院詳定當韓持國刁景純胡完夫為判院自申公等言蘇子容龔鼎臣周孟陽及禮官王汾劉攽韓忠彦以為講讀官曰侍蓋侍天子非師道也且講讀官一等侍讀仍班侍講上今侍講坐而侍讀立不應為二申公等議遂格今講讀官初入皆坐賜茶唯當講時起就案立講畢復就坐賜湯而退侍讀亦如之蓋乾興之制也翰林侍講學士侍講兼侍講漢顯宗時張酺數侍講於御前張酺侍靈帝以楊賜有重名舉賜侍講於華光殿中又詔劉寛拜大中大夫侍講華光殿雖有侍講之號而未以名官至唐開元十三年始置詳見侍讀門宋咸平二年國子祭酒邢昺為侍講學士其後又有馬宗元為侍講不加别名但供職而已景徳四年以翰林侍講學士邢昺知曹州侍講學士外使自昺始元豐以後官制見侍讀門故事自兩省臺端以上並兼侍講元祐中司馬公休以著作佐郎兼侍講時朝議以文正公之賢故特有是命朝野雜記紹興五年范元長以宗卿朱子發以祕少並兼蓋殊命也乾道六年張敬夫始復以吏部員外郎兼蓋中興後庶官兼侍講者惟此二人若紹興二十五年張扶以祭酒隆興二年王宣子佐以檢正乾道七年林景度以宗卿入經筵亦兼侍講者蓋扶本以言路兼說書就陞其秩宣子時攝版曹景度嘗為右史且有敬夫舊例故稍優之皆有以也熙寧元年龔鼎臣蘇頌劉攽等議不當坐講疏朝廷班制以侍講居侍讀下會要臺諫兼侍講慶歴二年召御史中丞賈昌朝侍講邇英閣故事臺丞無在經筵者上以昌朝長於講說特召之仁宗實録神宗用吕正獻亦止命時赴講筵去學士職中興後王尚書賔為御史中丞建請復開經筵遂命兼侍講自後十五年間繼之者惟王唐公徐師川二人皆上意也紹興十二年春万俟中丞卨羅諫議檝並兼講讀紹興二十五年春董殿院王正言珉並兼侍講非臺丞諫長而以侍講為稱又自此始其後猶或兼說書臺官自尹穡隆興二年五月諫官自詹元宗乾道九年十二月後並以侍講為稱不復兼說書矣朝野雜記修注兼侍講自朱子發後修注官多得兼侍講嘉泰二年八月林伯玉自殿中侍御史兼侍講除起居郎其年閠十二月鄧伯允自右正言兼侍講除起居舍人伯玉改兼權刑侍伯允改兼史編實討非故典也開禧元年八月婁彦開自言路徙奉常兼權中書舍人亦以史院易經筵遂為定例三年十月朱仲文自司諫改奉常兼講如故意者以其兼權史侍故也十一月王簡卿知諫院為左史仍兼崇政殿說書言者猶以為不可罷之嘉定元年黄伯庸自右正言兼侍講除起居舍人兼知舊今故典矣自渡江以後惟王樞密綸以右史兼説書其他無此宫觀兼侍講國初自元豐以來多以宫觀兼侍讀乾道七年寳文閣待制胡銓除提舉佑神觀兼侍講是日以宰執進呈虞允文奏曰胡銓早嵗一節甚髙謂當濶畧録其氣節不宜令遽去朝廷上曰銓固非他人比且除在京宫觀留侍經筵故有是命崇政殿說書兼說書經筵附古無此官宋朝仁宗景祐元年正月命賈昌朝趙希言王宗道楊安國並為崇政殿說書日輪二員祗候初侍講學士孫奭年老乞外因薦昌朝等至是特置此職以命之慶歴二年以趙師民預講官復為崇政殿說書蓋秩卑資淺則為說書不兼侍講元祐間程正叔以布衣為之然范淳夫乃以著作佐郎兼侍講司馬公休又嘗以著作佐郎兼侍講前此未有也趙師明家塾記崇寧中初除說書二人皆以隱逸起蔡崇吕瓘仍遂其性詔以士服隨班朝謁入侍渡江後尹彦明初以祕書兼之中間王龜齡范至能皆以郎官兼亦殊命也朝野雜記近事侍從以上兼經筵則曰侍講庶官則曰崇政殿說書故左史兼亦曰侍講如程敦厚趙衞是也周益公集臺諫兼說書紹興十二年春万俟中丞卨羅諫議檝並兼講讀蓋秦楚材梓是時已兼說書便於傳道自後伯陽繼之每除言路必與經筵矣檜死罷兼自二十五年十月至三十二年臺丞諫長兼經筵者止三人慶元後臺丞諫長暨副端正言司諫已上無不預經筵者正言兼說書自端明巫伋始副端兼說書自端明余堯弼始察官兼說書自少卿陳䕫始朝野雜記修注兼說書自朱子發修注官多得兼侍講開禧三年十一月王簡卿知諫院為左史仍兼崇政殿說書言者以為不可罷之呉氏能改齋漫録曰王荆公所作賈魏公神道碑示景祐元年積官至尚書都官員外郎乃始置崇政殿說書而以公為之然予按傅簡公佳話云太祖少親戎事性好藝文即位未㡬召山人郭無為於崇政殿講書至今講官所領階銜猶曰崇政殿說書云據傅簡公所言則崇政殿說書不始於仁宗景祐元年矣豈中嘗罷之而至是再建邪右翰苑經筵在近代為至清要顯美之官而杜岐公通典敘職官獨闕焉蓋學士講讀之官皆始於唐開元之時講讀隸集賢殿故通典於集賢學士條下附載而翰林學士唐史志以為獨無所隸然自開元建學士院之後居之者多名流至號内相乃畧不敘述則為闕事矣古人有一事必有一官曹雖歴代沿革不同而所掌之事則一也故通典所載唐所置之官而前代無之者則敘其所掌之事以通於前代如通事舍人唐所制也而其事則秦漢以來謁者之任也集賢殿書院唐置也而其事則漢魏以來祕書省之職也然則翰林學士之官獨不可通之於前代乎蓋以言語文字被顧問以翰墨技藝侍中待詔則漢武帝所以處鄒枚嚴徐靈帝所以招鴻都文學之𩔖是也至於出入禁闥特被親遇參謀軍國號稱内相則漢魏以來侍中領尚書事祕書監中書監之𩔖是也若代言典誥之任則武帝所以命司馬相如歴代所以置中書舍人是也但學士院之官所職叢雜不一而其位亦髙卑不等唐多以他官兼之中世以後則所掌者制詔而已至宋則又以唐所置集賢殿講讀之官隸之元豐官制既行而講讀始去翰林之名自為經筵之官矣故以經筵附見學士院之後存其舊也總學士宋朝殿學士有觀文殿大學士學士資政殿大學士學士端明殿學士殿學士資望極峻無吏守無典掌惟出入侍從備顧問而已觀文殿大學士非曾為宰相不除觀文殿學士資政殿大學士及學士並以寵輔臣之去位者端明殿學士惟學士久次者始除近嵗以待簽樞云觀文殿大學士學士宋朝觀文殿即舊日延恩殿也慶歴七年以文明殿學士稱呼同真宗諡號乃改名紫宸殿後又以紫宸殿非人臣所可稱呼乃以延恩殿更名觀文殿皇祐元年詔置觀文殿大學士寵待舊相今後湏曾任宰相乃得除授時賈昌朝由使相右僕射觀文殿大學士判尚書都省觀文殿置大學士自昌朝始三年詔班在觀文殿學士之前六尚書之上自是曾任宰相者出必為大學士熙寧中韓絳宣撫陜西河東得罪罷守本官四年用明堂赦授觀文殿學士宰相不為大學士自絳始中興後非宰相而除者自紹興二十年秦熺始熺知樞密院郊祀大禮使禮成以學士遷且視儀揆路非典故也乾道四年汪徹舊以樞密使為學士遷九年王炎以樞密使為西川安撫使除至慶元間趙彦逾自工部尚書為端明殿學士直以序遷至焉曾為宰相而不為大學士者自紹興元年范宗尹始觀文殿隋煬帝殿名宋初為文明殿學士慶歴七年宋庠言文明殿學士稱呼同真宗諡號兼禁中無此殿額其學士理自當罷乞擇見今正朝或祕殿以名學士乃詔改為紫宸殿學士以參知政事丁度為之時學士多以殿名為官稱丁遂稱曰丁紫宸八年御史何郯以紫宸不可為官稱於是改延恩殿為觀文殿歐陽公云觀文乃隋煬殿名理宜避之蓋當時不知然則朝廷之上不可以無學也即殿名置學士吕氏家塾廣記云觀文殿學士位資政殿學士上蓋初置觀文殿學士職時已有為大資政者故於上加此美職朝廷亦知不當以學士壓大學士但常有人充此二職者故久而不能革正可因無人為此二職時正之也以丁度為之自後非曾任執政者弗除熙寧中王韶以熙河功元豐中王陶以宫僚未歴二府亦除是職蓋異恩也韶猶兼端明殿龍圖學士云資政殿大學士學士國朝資政殿在龍圖閣之東序景徳二年王欽若罷參政真宗特置資政殿學士以寵之在翰林學士下欽若不悅訴於上曰臣向自翰林學士拜參知政事今無罪而罷班反在下是貶也真宗特改置大學士以處之十二月復以欽若為資政殿大學士班在文明殿學士之下翰林學士承㫖之上資政殿置大學士自欽若始自冀公班翰林承㫖上一時以為殊寵祥符初向文簡公以前宰相再入為東宫留守復加此職自是訖天聖末二十餘年不以除人明道元年李文定公知河陽召還始再命之景祐四年王沂公罷相復除三十年間除三人而皆前宰相也宋宣獻公罷參知政事仁宗眷之厚因如此職自冀公後非宰相而除者惟宣獻一人而已康定二年右正言梁適請遵先朝故事定以員數於是詔大學士置二員學士三員紹興十年鄭億年歸自偽庭除資政殿二年加大學士許出入如二府儀億年未嘗秉政十五年秦熺自翰林學士承㫖為資政詔立班恩數同執政十六年秦檜弟梓以端明卒於湖州進大資致仕䘏典同參政是後從臣自端明視政府而序進者遂為常矣端明殿學士端明殿即西京正衙殿也後唐天成元年明宗即位之初四方書奏命樞密使安重誨進讀懵於文義孔循獻議始置端明殿學士命馮道趙鳳俱以翰林學士充班在翰林學士上後有轉改止於翰林學士内選任初如三館例職在官下趙鳳轉侍郎諷任圜特移職在官上後遂為故事晉天福五年廢開運元年復宋朝太宗時程侍郎羽為之後隨殿名改為文明殿學士慶歴中改文明為紫宸後改紫宸為觀文其改置本末見觀文殿學士門明道二年改承明殿為端明殿復置端明殿學士以翰林侍讀學士宋綬為之詔畧曰方奬㧞於名儒特增新於近職俾參顧問益廣謀猷在翰林學士之下自明道訖元豐無前執政為之者近來以待學士之久次者元豐中以前執政為之自曾孝寛始孝寛前為簽書樞密院以見任執政為之自王安禮始安禮自尚書左丞為之知江寧並見續會要政和中嘗改為延康殿建炎二年都省言延寧殿學士舊係端明殿學士詔依舊近拜簽樞者多領焉總閣學士直學士宋朝庶官之外别加職名所以厲行義文學之士髙以備顧問其次與論議典校讐得之為榮選擇尤精元豐中修三省寺監之制其職並罷滿嵗補外然後加恩兼職直龍圖閣省郎寺監長貳補外或領監司帥臣則除之待制雜學士給諫以上補外則除之係一時恩㫖非有必得之理劉忠肅公奏議又言待制學士祖宗以來極天下之選不為定員今不考治行不察流品幸而給諫以上則計日得之乞依元豐官制施行元祐二年詔增復館職及職事官並許帶職尚書二年加直學士中丞侍郎給舍諌議通及一年加待制紹聖三年詔職事官罷帶職非職事之官仍舊中興後學士率以授中司列曹尚書翰林學士之補外者權尚書給諫侍郎則帶直學士待制總待制唐永徽中命𢎞文館學士一人日待制於武徳殿西門文明元年詔京官五品以上清官日一人待制於章善明福門先天末又命朝集使六品以上二人隨仗待制永泰時勲臣罷節制無職事皆待制於集賢門凡十三人特給餐錢以優其禮崔祐甫為相建議文官六品以上更直待制其後著令正待制官日二人備顧問仍有公廨永泰元年敕裴冕等並集賢待制此始有待制之所然則蓋唐設官也宋朝景徳元年置龍圖閣待制以杜鎬戚綸充並依舊充職祥符二年詔班視知制誥列其下元祐令從四品掌侍從備顧問有所獻納則請到或奏對劉摯言待制學士之選太濫見學士門王巖叟亦言待制祖宗之時其選最精出入朝廷纔一二人今立法無定員將一年待制滿朝必有車載斗量之謠龍圖閣學士直學士待制宋朝大中祥符中建龍圖閣在會慶殿西偏北連禁中閣東曰資政殿西曰述古殿閣上以奉太宗御書御製文集及典籍圖畫寳瑞之物及宗正寺所進屬籍世譜有學士直學士待制直閣學士大中祥符三年置以杜鎬為之班在樞密直學士之上六年詔結銜在本官之上直學士景徳四年置以杜鎬為之班在樞密直學士之下祥符六年詔結銜在本官之上待制景徳元年置以杜鎬戚綸為之並依舊充職四年詔班在知制誥之下並赴内殿起居自改官制為學士初復之職或知制誥平出除之天章閣學士直學士待制宋朝天禧四年初建天章閣在會慶殿之西龍圖閣之北明年仁宗即位修天章閣工畢奏真宗御製安於天章閣東曰羣玉殿西曰蘂珠殿北曰夀昌殿南曰延康殿内以桃花文石為流杯之所以在位受天書祥符改曰天章取為章於天之義天聖八年置待制慶歴七年又置學士直學士又有侍講學士慶歴七年初置在龍圖閣學士之下學士罕以命人迄仁宗世纔王摯一人官制舊典云天章閣只除待制不除學士難稱呼也秦堪自顯謨閣進直天章閣以稱呼非便辭詔改龍圖自是天章不為帶職直學士慶歴七年初置天章閣直學士在龍圖閣直學士之下待制天聖八年初置寓直於祕閣與龍圖遞宿尋命范諷鞠詠充職中興後圖籍符瑞寳玩之物若國史宗正寺所進屬籍獨藏於天章閣祖宗御容潛邸旌節亦安奉焉寳文閣學士直學士待制宋朝寳文閣在天章閣之東西序羣玉蘂珠殿之北即舊日夀昌閣慶歴改曰寳文嘉祐八年英宗即位詔以仁宗御書御集藏於寳文閣命王珪撰記立名治平四年神宗即位始置學士直學士待制恩賜如龍圖英宗御書附於閣會要宏詞編題其學士治平四年初置以吕公著兼直學士治平四年初置以邵必為之待制治平四年初置顯謨閣學士直學士待制宋朝元符元年曾布鄧洵仁各申請建閣詔翰林學士中書舍人撰閣名五以聞續建閣藏神宗御集以顯謨為名神宗大新政事故以丕顯文王謨為名徽宗建中靖國元年詔以顯謨閣為熙明閣仍置學士直學士待制續奉㫖仍以顯謨為額此據周益公宏詞編題而續會要云復顯謨舊名年月無考按次年已詔顯謨閣學士直學士如三閣故事復名顯謨則恐在此年矣崇寧元年詔顯謨閣學士直學士待制如三閣故事序位在寳文閣學士直學士待制之下學士直學士待制並建中靖國元年置徽猷閣學士直學士待制大觀二年初建徽猷閣以藏哲宗御集置學士直學士待制敷文閣學士直學士待制紹興十年置藏徽宗聖製置學士等官煥章閣學士直學士待制淳熙間建藏髙宗御製學士等官並十五年置華文閣學士直學士待制慶元二年置藏孝宗御製置學士等官寳謨閣學士直學士待制嘉泰二年置藏光宗御製置學士等官寳章閣學士直學士待制寳慶二年置藏寧宗御製置學士等官總閣職宋朝祖宗以來重之有集賢殿修撰後改右文殿直龍圖閣直祕閣三等政和四年二浙福建諸路監司郡守徃徃交通内官多以應奉有勞遷職遂有未嘗朝覲天子因忽為待制班從官者蔡京不樂六年因增其目置修撰與舊為三等曰集英殿修撰右文殿修撰祕閣修撰直閣與舊為六等曰直龍圖閣天章寳文顯謨徽猷祕閣朝廷除授自此密矣舊貼職無雜壓至是因增置乃定為雜壓蔡攸國史外補紹興十年置直敷文閣淳熙十五年置直煥章閣淳熙令自集撰至直祕閣為貼職中興後直閣為庶官任藩閫監司者貼職各隨髙下而等差之集英殿修撰唐張昌齡為北門修撰孫逖為集賢院修撰修撰之名始於唐宋政和六年置集英殿修撰其增置來歴見貼職門中興後以寵六曹權侍郎之補外者下待制一等右文殿修撰唐有集賢院修撰宋朝元祐元年貼職許内外官帶五年九月詔復置集賢院學士紹聖二年四月詔職事官罷帶職易集賢院學士為集賢院修撰政和六年四月御筆集賢院無此名祕書省殿以右文殿為名見任集賢殿修撰並改作右文殿修撰其職次於集英殿撰為貼職之髙等祕閣修撰政和六年置見貼職門貼職修撰以待館閣之資深者仍多由直龍圖閣遷焉直龍圖閣直天章閣以下附祥符九年以馮元為太子中允直龍圖閣直閣之名始此凡除館職之久次者必選直龍圖閣皆為擢待制之基也直天章閣直寳文閣直顯謨閣直徽猷閣並政和六年置直敷文閣紹興十年置直煥章閣淳熙十五年置直華文閣慶元二年置直寳謨閣嘉泰二年置直寳章閣寳慶二年置直祕閣宋朝以史館昭文館集賢院為三館皆寓崇文院太宗端拱元年詔就崇文院中堂建祕閣擇三館真本書籍萬餘卷及内出古畫墨跡藏其中以右司諫直史館宋泌為直祕閣直館直院則謂之館職以他官兼者謂之貼職元豐以前凡狀元制料一任還即試詩賦各一而入否則用大臣薦而試謂之入館官制行廢崇文院為祕書監建祕閣於中自監少至正字列為職事官罷直館直院之名獨以直祕閣為貼職皆不試而除蓋特以為恩數而已石林燕語又故事外官除館職如祕閣校理直祕閣者必先移書在省執事敘同寮之好乃即館設盛會燕之自崇寧以來外官除館既多此禮寖廢容齋洪氏隨筆曰國朝館閣之選皆天下英俊然必試而後命一經此職遂為名流其髙者曰集賢殿修撰史館修撰直龍圖閣直昭文館史館集賢院祕閣次日集賢祕閣校理官卑者曰館閣校勘史館檢討均謂之館職記注官缺必於此取之非經修注未有直除知制誥者官至員外郎則任之中外皆稱為學士及元豐官制行凡帶職者皆遷一官而罷之而置祕書省官大抵與職事官等反為留滯政和以後增修撰直閣貼職為九等於是才能治辦之吏貴游乳臭之子車載斗量其名益輕南渡以來初除校書正字徃徃召試雖曰館職不卑然其遷敘反不若寺監之逕㨗至推排為郎即失其故歩混然無别矣又曰宋朝儒館仍唐制有四曰昭文館曰史館曰集賢院曰祕閣率以上相領昭文大學士其次監修國史其次領集賢若只兩相則首㕔兼國史惟祕閣最低故但以兩制判之四局各置直官均謂之館職皆稱學士其下則為校理檢討校勘地望清切非名流不得處范景仁為館閣校勘當遷校理宰相龎籍言范鎮有異才恬於進取乃除直祕閣司馬公作詩賀之曰延閣屹中天積書雲漢連神宗重其選謂太宗也國士比為仙玉檻勾陳上丹梯北斗邊帝容瞻日角宸翰照星躔職秩曾無貴光華在得賢其重如此自熙寧以來或頗用賞勞元豐官制行不置昭文集賢以史館入著作局而直祕閣只為貼職至崇寧政宣以處大臣子弟姻戚其濫及於錢榖文俗吏士大夫不復貴重然除此職者必詣館下拜閣乃具盛筵邀見在三館者宴集秋日暴書宴皆得預席若餘日則不許至隨筆有館職名存一則云按學士待制二官始於唐皆以處清望儒臣俾備顧問其初既無專職亦無定員宋因其制而以三館為儲才之地故職名猶多元豐新官制其職名之元不附麗於三省寺監者皆從廢革然除昭文集賢二學士元麗中書門下省外獨翰林學士一官在唐已無所係屬而最為清要故不可廢而諸學士待制則以其為三館清流未欲遽廢故以為朝臣補外加恩之官蓋有同於階官而初無職掌矣龍圖閣為儲祖宗制作之所故其官視三館自後列聖相承代代有宸奎之閣而建官亦如之於是學士直學士待制直閣之官始不可勝計矣野處譏其濫及俗吏童騃然職名既多自不容不濫施也又所謂學士直閣者尊卑不同故難槩稱如觀文為宰相資政為執政端明為簽書龍圖以下為尚書然皆學士也直龍圖煥章等閣為藩閫監司之貼職直祕閣則卑於諸閣然皆直閣也於是舍學士直閣之名而就以所掌殿閣呼之遂有丁紫宸秦天章之稱則以為名稱非便而改以他殿閣然所謂端明龍圖顯謨敷文煥章之𩔖亦俱非人臣之稱謂流傳既久曰某端明曰某龍圖不覺其非宜耳昭文集賢元𨽻兩省既已敘其事於各門殿閣學士待制與翰林學士元皆無所附𨽻故敘殿閣於翰林之後文獻通考卷五十四
