body:
  text: 文獻通考卷一百七十七鄱陽馬端臨貴與著經籍考四經書孔安國尚書序曰先君孔子討論墳典㫁自唐虞以下訖於周芟夷煩亂剪截浮辭舉其宏綱撮其機要足以垂世立敎典謨訓誥誓命之文凡百篇所以恢𢎞至道示人主以軌範也帝王之制坦然眀白可舉而行三千之徒並受其義及秦始皇滅先代典籍焚書坑儒天下學士逃難觧散我先人用蔵其家書於屋壁顔師古曰家語云孔騰字襄畏秦法峻急蔵尚書孝經論語於夫子舊堂中而漢記尹敏傳云孔鮒所蔵二說不同未知孰是漢室龍興開設學校旁求儒雅以闡大猷濟南伏生年過九十失其夲經口以傳授裁二十餘篇以其上古之書謂之尚書百篇之義世莫得聞漢藝文志云尚書經二十九卷注云伏生所授者儒林傳云伏生名勝為秦博士以秦時禁書伏生壁蔵之其後大兵起流亡漢定伏生求其書亡數十篇獨得二十九篇即以教扵齊魯之間孝文時求能治尚書者天下無有聞伏生治之欲召時伏生年九十餘老不能行於是詔太常使掌故鼂錯往受之顔師古曰衛宏定古文尚書序云伏生老不能正言言不可曉使其女傳言教錯齊人語多與潁川異錯所不知凡十二三略以其意屬讀而已陸氏曰二十餘篇即馬鄭所注二十九篇是也孔穎逹曰秦誓夲非伏生所傳武帝之世始出而得行史因以入於伏生所傳之内故云二十九篇也今按此序言伏生失其夲經口以傳授漢書乃言初亦壁蔵而後亡數十篇其說與此序不同盖傳聞異辭爾至於篇數亦復不同者伏生夲但有堯典臯陶謨禹貢甘誓湯誓盤庚髙宗肜日西伯戡黎㣲子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多方多士立政無逸君奭顧命吕刑文侯之命費誓秦誓凡二十八篇今加泰誓一篇故為二十九篇耳其泰誓甚偽之說詳見本篇此未暇論也至魯恭王好治宫室壊孔子舊宅以廣其居於壁中得先人所蔵古文虞夏商周之書及傳論語孝經皆科斗文字王又升孔子堂聞金石絲竹之音乃不壊宅悉以書還孔氏科斗書廢已久時人無能知者以所聞伏生之書考論文義定其可知者為𨽻古定更以竹簡冩之増多伏生二十五篇伏生又以舜典合於堯典益稷合於臯陶謨盤庚三篇合為一康王之誥合於顧命復出此篇并序凡五十九篇為四十六卷其餘錯亂摩滅弗可復知悉上送官蔵之書府以待能者陸氏曰恭王漢景帝子名餘傳謂春秋也一云周易十翼非經謂之傳科斗蟲名蝦蟇子書形似之爲𨽻古定謂用𨽻書以易古文吳氏曰伏生傳於既耄之時而安國為𨽻古文特定其所可知者而一篇之中一簡之内其不可知者盖不無矣乃欲以是盡求作書之本意與夫本末先後之義其亦可謂難矣而安國所増多之書今篇目具在皆文從字順非若伏生之書詰曲聲牙至有不可讀者夫四代之書作者不一乃至二人之手而遂定為二體乎其亦難言矣二十五篇者謂大禹謨五子之歌胤征仲虺之誥湯誥伊訓太甲三篇咸有一徳說命三篇泰誓三篇武成旅獒㣲子之命蔡仲之命周官君陳畢命君牙冏命也復出者舜典益稷盤庚三篇康王之誥凡五篇又百篇之序自為一篇共五十九篇即今所行五十八篇而以序冠篇首者也為四十六卷者孔疏以為同序者同卷異序者異卷同序者太甲盤庚說命泰誓皆三篇共序凡十二篇只四卷又大禹臯陶謨益稷康誥酒誥梓材亦各三篇共序凡六篇只二卷外四十篇篇各有序凡四十卷通共序者六卷故為四十六卷也其餘錯亂摩滅者汨作九共九篇槀飫帝告釐沃湯征汝鳩汝方夏社疑至臣扈典寳明居肆命徂后沃丁咸乂四篇伊陟原命仲丁河亶甲祖乙髙宗之訓分噐旅巢命歸禾嘉禾成王政将蒲姑賄肅慎之命亳姑凡四十二篇今亡承詔為五十九篇作傳於是遂研精覃思博考經籍採摭羣言以立訓傳約文申義敷暢厥㫖庶㡬有補於将来書序序所以為作者之意昭然義見宜相附近故引之各冠其篇首定五十八篇詳此章雖說書序序所以為作者之意而未嘗以為孔子所作至劉歆班固始以為孔子所作既畢會國有巫蠱事經籍道息用不復以聞傳之子孫以貽後代若好古博雅君子與我同志亦所不隐也隋經籍志曰漢濟南伏生口傳二十八篇又河内女子得泰誓一篇獻之伏生作尚書傳四十一篇以授同郡張生張生授千乗歐陽生歐陽生授同郡兒寛寛授歐陽之子世世傳之至曾孫歐陽髙謂之尚書歐陽之學又有夏侯都尉受業於張生以授族子始昌始昌傳族子勝為大夏侯之學勝傳子建别為小夏侯之學故有歐陽大小夏侯三家並立訖漢東京相傳不絶而歐陽最盛初漢武帝時魯恭王壊孔子舊宅得其末孫恵所蔵之書字皆古文孔安國以今文校之得二十五篇其泰誓與河内女子所獻不同又濟南伏生所誦五篇相合安國並依古文開其篇第以𨽻古字寫之合成五十八篇其餘篇簡錯亂不可復讀並送之官府安國又為五十八篇作傳㑹巫蠱事起不得奏上私傳其業於都尉朝朝授膠東庸生謂之尚書古文之學而未得立後漢扶風杜林傳古文尚書同郡賈逵為之作訓馬融作傳鄭𤣥亦為之註然其所傳唯二十九篇又雜以今文非孔舊本自餘絶無師說晋世祕府所有有古文尚書經文今無有傳者及永嘉之亂歐陽大小夏侯尚書並亡濟南伏生之傳唯劉向父子所著五行傳是其本法而又多乖戾至東晋豫章内史梅賾始得安國之傳奏之時又闕舜典一篇齊建武中吳姚方興於大航頭得其書奏上比馬鄭所注多二十八字於是始列國學梁陳所講有孔鄭二家齊代唯傳鄭義至隋孔鄭並行而鄭氏甚㣲自餘所存無復師說又有尚書逸篇出於齊梁之間考其篇目似孔氏壁中書之殘缺者故附尚書之末孔頴達曰孔君作傳值巫蠱不行以終前漢諸儒知孔本五十八篇不見孔傳遂有張覇之徒偽作舜典汨作九共九篇大禹謨益稷五子之歌胤征湯誥咸有一徳典寳伊訓肆命原命武成旅獒冏命二十四篇除九共九篇共卷為十六卷盖亦略見百篇之序故以伏生二十八篇者復出舜典益稷盤庚二篇康王之誥及泰誓共為三十四篇十六卷附以求合於孔氏之五十八篇四十六卷之數也劉向班固劉歆賈逵馬融鄭𤣥之徒皆不見真古文而誤以此為古文之書服䖍杜預亦不之見至晋王肅始似竊見而晋書又云鄭冲以古文授蘇愉愉授梁栁栁之内兄皇甫謐又從栁得之而栁又以授臧曺曺始授梅賾賾乃於前晋奏上其書而施行焉漢書所引泰誓云誣神者殃及三世又云立功立事惟以永年疑即武帝之世所得者律歴志所引伊訓畢命字畫有與古文異同者疑伏生口傳而鼂錯所屬讀者其引武成則伏生無此篇必張覇所偽作者也九峯蔡氏曰按漢儒以伏生之書為今文而謂安國之書為古文以今考之則今文多艱澀而古文反平易㦯者以為今文自伏生女子口授鼂錯時失之則先秦古書所引之文皆已如此恐其未必然也或者以為記錄之實語難工而潤色之雅詞易好故訓誥誓命有難易之不同此為近之然伏生倍文暗誦乃偏得其所難而安國考定於科斗古書錯亂摩滅之餘反専得其所易則又有不可曉者至於諸序之文㦯頗與經不合而安國之序又絶不類西京文字亦皆可疑獨諸序之本不先經則賴安國之序而見石林葉氏曰書五十八篇出於伏生者初三十三篇出於魯恭王所壊孔子宅壁中者増多二十六篇伏生書後傳歐陽歙魯恭王壁中書孔安國為之傳漢興諸儒傳經次第各有從来伏生當文帝時年已老口授鼂錯頗雜齊魯言或不能盡辨他經専門毎輙数家惟書傳一氏安國無所授獨以𨽻古易科斗自以其意為訓觧不及列於學官故自漢訖西晋言書惟祖歐陽氏安國訓觧晩出皇甫謐家所謂二十六篇者雖當時大儒揚雄杜預之徒皆不及見劉向以魯恭王書校伏生本酒誥亡簡一召誥亡簡二字之不同者尤多書非一代之言也其文字各隨其世不一體其授受異同復若此然大抵簡質淵慤不可遽通自立政而上非伊尹周公傳說之辭則仲虺祖乙箕子召公後世以為聖賢不可及者也其君臣相與往来告戒論說則堯舜禹湯文武是也是以其文峻而㫖逺自立政而下其君則成王穆王康王平王其臣則伯禽君陳君牙下至於秦穆公其辭則一時太史之所為也視前為有間矣是以其文亦平易明白意不過其所言孔子取之特以其有合於吾道焉爾自安國學行歐陽氏遂廢今世所見惟伏生大傳首尾不倫言不雅馴至以天地人四時為七政謂金縢作於周公沒後何可盡據其流為劉向五行傳夏侯氏災異之說失孔子本意益逺安國自以為博考經傳採摭羣言其所發明信為有功然余讀春秋傳禮記孟子荀子間與今文異同孟子載湯誥造攻自牧宫不言鳴條春秋傳述五子之歌衍率彼天常一句證康誥父子兄弟罪不相及今文乃無有疑亦未能盡善若荀卿引仲虺曰諸侯能自得師者王得友者霸引康誥惟文王敬忌一人以懌其謬妄有如此者禮記以申勸寕王之徳為田觀寕王以庶言同則亡繹字其乖牾有如此者㣲孔氏則何所取正余於是知求六經殘缺之餘於千載淆亂之後豈不甚難而不可忽哉先公曰歐陽公日本刀歌云傳聞其國居大海土壤沃饒風俗好前朝貢獻屢往来士人往往工詞藻徐福行時書未焚逸書百篇今尚存令嚴不許傳中國舉世無人識古文先王大典蔵夷貊蒼波浩蕩無通津令人感激坐流涕鏽澀短刀何足云詳此詩似謂徐福以諸生帶經典入海外其書乃始流傳於彼也然則秦人一燼之烈使中國家傳人誦之書皆放逸而徐福區區抱編簡以往能使先王大典獨存夷貊可歎也亦可疑也然今世經書往往有外國本云漢志凡書九家四百一十二篇入劉向稽疑一篇師古曰此凡言入者謂七畧之外班氏新入之也其云出者與此同隋志三十二部二百四十七卷通計亡書合四十一部共二百九十六卷唐志二十五家三十三部三百六卷王元感以下不著錄四家二十卷宋三朝志十一部一百一卷宋兩朝志二部一十三卷宋四朝志一十二部一百二十卷宋中興志四十二家五十一部七百一十六卷尚書大傳三卷崇文總目漢濟南伏勝撰後漢大司農鄭𤣥註伏生本秦博士以章句授諸儒故博引異言援經而申證云鼂氏曰勝孝文時年且百歳歐陽生張生從學焉音聲猶有訛誤先後猶有差舛重以篆𨽻之殊不能無失勝終之後數子各論所聞以己意彌縫其闕而别作章句又特撰大義因經屬指名之曰傳劉向校書得而上之陳氏曰凡八十有三篇當是其徒歐陽張生之徒雜記所聞然亦未必當時本書也印板刓闕合更求完善本牟長章句本傳長習歐陽尚書建武時為博士遷河南太守註尚書章句皆本之歐陽氏俗號為牟氏章句周防尚書雜記本傳防師事徐州刺史盖豫受古文尚書建武時以明經舉孝㢘拜郎中撰尚書雜記三十二篇四十萬言後仕至陳留太守孔安國尚書註十三卷鼂氏曰安國古文尚書至晋齊間始顯詳見總論唐孝眀不喜古文以今文易之又頗改其辭如舊無頗今改無陂之類是也按安國既定古文會有巫蠱事不復以聞蔵於私家而已是以鄭康成註禮記韋昭註國語杜預註左氏趙岐註孟子遇引今尚書所有之文皆曰逸書盖未嘗見古文故也然嘗以禮記較說命孟子較泰誓大義雖不逺而文不盡同意者安國以𨽻古定時失之耳陳氏曰考之儒林傳安國以古文授都尉朝第第相承以及塗惲桑欽至東都則賈逵作訓馬融鄭𤣥作傳註觧而逵父徽實受書於塗惲逵傳父業雖曰逺有源流然而兩漢名儒皆未嘗實見孔氏古文也豈惟兩漢魏晋猶然凡杜征南以前所註經傳有援大禹謨五子之歌𦙍征諸篇皆曰逸書其援泰誓則云今泰誓無此文盖伏生書亡泰誓泰誓後出或云武帝末民有獻者或云宣帝時河内女子得之所載白魚火烏之祥實偽書也然則馬鄭所觧豈真古文哉故孔頴逹謂賈馬軰惟傳孔學三十三篇即伏生書也亦未得為孔學矣頴逹又云王肅註書始似竊見孔傳故於亂其紀綱以為太康時皇甫謐得古文尚書於外弟梁栁作帝王世紀往往載之盖自太保鄭冲授蘇愉愉授梁栁栁授臧曺曺授梅賾賾為豫章内史奏上其書時已亡舜典一篇至齊眀帝時有姚方興者得於大航頭而獻之隋開皇中捜索遺典始得其篇夫以孔註厯漢末無傳晋初猶得存者雖不列學官而散在民間故邪然終有可疑者石林葉氏曰今孔氏尚書本所謂古文尚書出魯恭王毁孔子宅所得也孔安國為之傳㑹巫蠱事作不得列於學官故漢儒雖揚雄之徒多未之見西漢所傳歐陽大小夏侯三家而已揚雄法言稱酒誥之篇俄亡矣藝文志所謂劉向以中古文校歐陽大小夏侯經文酒誥脫簡一召誥脱簡二者也惟太史公嘗從安國授書故班固云遷書載堯典禹貢洪範微子金縢諸篇多古文說今史説所引書及叙皆與孔氏夲合其餘諸儒所引字與訓詁或不同者皆出歐陽大小夏侯氏三家也容齋洪氏随筆曰孔安國古文尚書自漢以来不列於學官故左氏傳所引者杜預輙註為逸書劉向說苑臣術篇一章云泰誓曰附下而罔上者死附上而罔下者刑與聞國政而無益於民者退在上位而不能進賢者逐此所以勸善而黜惡也漢武帝元朔元年詔責中外不興㢘舉孝有司奏議曰夫附下罔上者死云云其語與說苑所載正同而諸家註釋至於顔師古皆不能援以為證今之泰誓初未嘗有此語也漢宣帝時河内女子得泰誓一篇獻之然年月不與序相應又不與左傳國語孟子衆書所引泰誓同馬鄭王肅諸儒皆疑之今不復可考朱子語錄孔安國觧經最亂道㸔得只是孔叢子等做出来盖因說書云某嘗疑孔安國書是假書比毛公詩如此髙簡大叚省事漢儒訓釋文字多是如此有疑則闕今此却盡釋之豈有千百年前人說底話收拾於灰燼屋壁中與口傳之餘更無一字訛舛理㑹不得如此可疑也兼小序皆可疑堯典一篇自說堯一代為治之次序至讓於舜方止今却説是譲於舜後方作舜典亦是見一代政事之終始却說厯試諸難是為要受譲時作也至後諸篇皆然况他先漢文章重厚有力量他今大序格致極輕却疑是晋宋間文章况孔書是東晋方出前此諸儒皆不曽見可疑之孔頴逹尚書正義二十卷鼂氏曰穎逹因梁費甝䟽廣之唐儒學傳稱頴逹與顔師古司馬才章王恭王琰撰五經義訓百餘篇號義賛詔改為正義云雖包貫異家為詳博然其中不能無謬冗馬嘉運駮正其失永徽中于志寕張行成髙季輔就加増損始布天下藝文志云頴逹與李子雲王徳韶等撰朱長才蘇徳融隋徳素王士雄趙𢎞智審覆長孫無忌李勣等二十四人刋定唐史志傳記事多參差此為尤甚所記撰著人姓氏頴逹外往往不同陳氏曰其序云歐陽夏侯二家之所說蔡邕碑石刻之古文安國所注寝而不用及魏晋稍興故馬鄭諸儒莫覩其學江左學咸悉祖焉隋初始流河朔為正義者蔡大寳巢猗費甝顧彪文義皆淺略惟劉焯劉炫冣為詳雅然焯穿鑿煩雜炫就而刪焉雖復㣲稍省要好改張前義義更太畧辭又過華未為得也陸徳眀尚書釋文一卷崇文總目皇朝太子中舍陳鄂奉詔刋定始開寳中詔以徳明所釋乃古文尚書與唐眀皇所定今文駮異令鄂刪定其文改從𨽻書盖今文自曉者多故音切彌省陳氏曰徳明言伏生二十餘篇即馬鄭所注是也可證馬鄭非見古文又言梅賾所上亡舜典一篇以王肅注頗類孔氏故取王注從慎徽五典以下為舜典以續孔傳又言若稽古至重華協於帝十二字是姚方興所上孔氏傳夲無或此下更有濬哲文明至乃命以位總二十八字石經尚書十三卷鼂氏曰偽蜀周徳真書經文有祥字皆闕其畫亦闕民字之類盖孟氏未叛唐時所刋也以監本校之禹貢雲土夢作乂倒土夢字盤庚若網在綱皆作綱字按沈括筆談云雲土夢作乂太宗時得古夲因改正以綱為網未知孰是古文尚書十三卷鼂氐曰漢孔安國以𨽻古定五十九篇之書盖以𨽻冩籕故謂之𨽻古其書自漢迄唐行於學官眀皇不喜古文改從今文由是古文遂絶陸徳明獨存其二於釋文而已皇朝吕大防得夲於宋次道王仲至家以較陸氏釋文雖小有異同而大體相類觀其作字竒古非字書傅㑹穿鑿者所能到學者考之可以知制字之夲也夹漈鄭氏曰按易詩書春秋皆有古文自漢以来盡易以今文惟孔安國得屋壁之書依古文而𨽻之安國授都尉朝朝授膠東庸生謂之尚書古文之學鄭𤣥為之注亦不廢古文使天下後學於此一書而得古意不幸遭眀皇更以今文其不合開元文字者謂之野書然易以今文雖失古意但叅之古書於理無碍亦足矣眀皇之時去𨽻書既逺不通變古之義所用今文違於古義尤多臣於是考今書之文無妨於義者從今有妨於義者從古庶古今文義兩不相違曰書考迨武成而未及終編又有書辨訛七卷皆可見矣按漢儒林傳言孔氏有古文尚書孔安國以今文讀之唐藝文志有今文尚書十三卷注言𤣥宗詔集賢學士衞包改古文從今文然則漢之所謂古文者科斗書今文者𨽻書也唐之所謂古文者𨽻書今文者世所通用之俗字也𨽻書秦漢間通行至唐則久變而為俗書矣何尚書猶存古文乎盖安國所得孔壁之書雖為之傳而未得立於學官東京而後雖名儒亦未嘗傳習至隋唐間方顯往往人猶以僻書奥傳視之繕冩傳授者少故所存者皆古物尚是安國所定之𨽻書而未嘗改以從俗字猶今士大夫蓄書之家有竒異之書世所罕見者必是舊夲且多古字是也噫百篇之書遭秦火而亡其半所存者五十八篇而其間此二十五篇者書雖傳而字復不諧於俗傳於漢者為科斗書傳於唐者為𨽻書皆當時之人所罕習者盖出自孔壁之後又復晦昧數百年而學者始得以家傳人誦也尚書廣疏崇文總目偽蜀馮繼先撰以頴逹正義為本小加己意尚書㫁章崇文總目不著撰人名氏按其書略序衆篇大㫖尚書集觧十四卷鼂氏曰皇朝顧臨蔣之竒姚闢孔武仲劉敞王㑹之周範蘇子才朱正夫吳牧所撰後人集之為一編然非全書也胡翼之洪範觧一卷鼂氏曰胡瑗翼之撰皆其門人所録無銓次首尾張晦之洪範觧一卷鼂氏曰皇朝張景晦之撰景當景祐三年為房州恭軍著論七篇楊元素書九意一卷鼂氏曰皇朝楊繪元素撰其序云詩書春秋同出於史而仲尼或刪或脩莫不有筆法焉詩春秋先儒皆言之書獨無其法邪故作㫁堯虞書夏書禪譲稽古商書周書費誓秦誓意九篇蘇眀允洪範論圖一卷鼂氏曰三論皆援經繋傳斥末以歸本二圖一以指歆向之謬一以形其意或云非洵作孫莘老書觧十三卷鼂氏曰覺仕元祐謂康王以䘮服見諸侯為非禮蘇氏之說本此新經尚書十三卷鼂氏曰王雱元澤撰熙寕時頒是書於學官用以取士或少違異輙不中程由是獨行於世六十年而天下學者喜攻其短自開黨禁世人罕稱焉陳氏曰其父安石序之曰熙寕三年臣安石以尚書入侍遂與政而子雱實嗣講事有㫖為之說以進八年下其說太學頒焉雱盖述其父之學王氏三經義此其一也熙寕六年命知制誥呂惠卿充修撰經義以安石提舉脩定又以安石子雱惠卿弟升卿為修撰官八年安石復入相新傳乃成雱盖主是經者也王氏學獨行於世者六十年科舉之士熟於此乃合程度前軰謂如脫墼然按其形模而出之爾士習膠固更䘮亂乃已朱子語錄曰荆公不觧洛誥但云其間煞有不可强通䖏今姑擇其可曉者釋之今人多說荆公穿鑿他却有如此䖏後来人觧書却湏要盡觧王說傷於鑿然其善亦有不可掩䖏王氏洪範傳一卷鼂氏曰王介甫撰以劉向董仲舒伏生眀災異為蔽而思别著此傳以庶徴所謂若者不當訓順當訓如人君之五事如天之雨暘寒燠風而已大意謂天人不相干雖有變異不足畏也東坡書傳十三卷鼂氏曰熙寕以後専用王氏之說進退多士此書駮異其說為多陳氏曰其於𦙍征以為羲和貳於羿而忠於夏於康王之誥以釋衰服冕為非禮曰予於書見聖人之所不取而猶存者有二可謂卓然獨見於千載之後者又言昭王南征不復穆王初無憤恥哀痛之語平王當傾覆禍敗之極其書與平康之世無異有以知周徳之衰而東周之不復興也嗚呼其論偉矣朱子語録或問諸家書觧誰最好莫是東坡曰然又問但若失之太簡曰亦有只消如此觧者東坡書觧却好他㸔得文勢好書義辨疑一卷鼂氏曰楊時中立撰其書専攻王雱之失古三墳書一卷鼂氏曰張天覺言得之於比陽民家墳皆古文而傳乃𨽻書所謂三墳者山氣形也七略隋志皆無之世以為天覺偽撰陳氏曰元豐中毛漸正仲奉使京西得之唐州民舍其辭詭誕不經盖偽書也三墳之名惟見於左氏右尹子革之言盖自孔子定書㫁自唐虞以下前乎唐虞無徴不信不復采取於時固已影響不存去之二千載而其書忽出何可信也况皇謂之墳帝謂之典皆古史也不當如毛所録其偽明甚人之好竒有如此其僻者鼂公武云張商英偽撰以比李筌隂符經石林葉氏曰古三墳書為古文竒險不可識了不知其為何語其妄可知也夹漈鄭氏曰三皇太古書亦謂之三墳一曰山墳二曰氣墳三曰形墳天皇伏羲氏本山墳而作易曰連山人皇神農氏本氣墳而作易曰歸蔵地皇黄帝氏本形墳而作易曰坤乾雖不畫卦而其名皆曰卦爻大象連山之大象有八曰君臣民物陰陽兵象而統以山歸蔵之大象有八曰歸蔵生動長育止殺而統以氣坤乾之大象有八曰天地日月山川雲氣而統以形皆八而八之為六十四其書漢魏不傳至元豐中始出於唐州比陽之民家世疑偽書然其文古其辭質而野其錯綜有經緯恐非後人之能為也如緯書猶見取於前世况此乎且歸蔵至晉始出連山至唐始出則三墳始出於近代亦不為異事也按夫子所定之書其亡於秦火而漢世所不復見者盖杳不知其為何語矣况三墳已見削於夫子而謂其書忽出於元豐間其為􅍝妄可知夹漈好竒而尊信之過矣又况詳孔安國書序所言則墳典書也盖百篇之𩔖也八索易也盖彖象文言之類也今所謂三墳者曰山墳氣墳形墳而以為連山歸蔵坤乾之所由作而又各有所謂大象六十四卦則亦是易書而與百篇之義不類矣豈得與五典並稱乎顔吳范司馬無逸說命解三卷鼂氏曰皇朝吳安時范祖禹司馬康元祐中侍講筵顔復說書崇政殿日所進講說也伊川書說一卷鼂氏曰伊川之門人記其師所談四十餘篇洪範會傳一卷鼂氏曰皇朝孫諤撰諤元祐中博士其說多本先儒頗攻王氏之失二典義一卷陳氏曰陸佃農師撰佃為王氏學長於考訂石林書傳十卷陳氏曰葉夢得少藴撰少藴博極羣書强記絶人書與春秋之學視諸儒最為精耳中興藝文傳曰其為書頗採諸家之説而折衷其是非石林自序曰自世尚經術博士業書者十常三四然第守一說莫能自致其思余竊悲之因叅總數家推原帝王之治論其世察其人以質其所言更相研究折衷其是非頗自紀輯為書二十卷十二萬有餘言書裨傳十三卷陳氏曰太常丞吳棫才老撰首卷舉要曰總説曰書序曰君辯曰臣辯曰考異曰詁訓曰差㸦曰孔傳凡八篇考據詳博書辯訛七卷陳氏曰樞宻院編修官鄭樵漁仲撰其目曰紏􅍝四闕疑一復古二樵以遺逸召用博物洽聞然頗迂僻陳博士書觧三十卷中興藝文志紹興時太學始建陳鵬飛為博士發眀理學為陳博士書觧陳氏曰秦檜子熺嘗從之逰在禮部時熺為侍郎文書不應令鵬飛輙批還之熺寖不平鵬飛說書崇政殿因論春秋母以子貴言公羊說非是檜怒謫惠州以沒今觀其書紹興十三年所序於文侯之命其言驪山之禍申侯啟之平王感申侯之立已而不知其徳之不足以償怨鄭桓公友死於難而武公復娶於申君臣如此而望其振國恥難矣嗚呼其得罪於檜者豈一端而已哉無垢尚書詳說五十卷陳氏曰張九成子韶撰無垢諸經觧大抵援引詳博文意瀾翻似乎少簡嚴而務欲開廣後學之見聞使不墮於淺狭故讀其書者亦往往有得焉程大昌書譜二十卷陳氏曰本以觧經而不盡觧有所發明則篇為一論程大昌禹貢論圖共四卷陳氏曰凡論五十三篇後論八篇圖三十一其於江河淮漢濟黒弱水七大川以為舊傳失實皆辯證之淳熈四年上進宇宙廣矣上下數千載幅員數萬里身不親厯耳目不親聞見而欲决於一心定於一說烏保其皆無牴牾然要為卓然不詭隨傳注者也東莱書說十卷大愚叟書後曰尚書說自秦誓至洛誥凡十八篇伯氏太史己亥之冬口授諸生而筆之册者也惟念伯氏退休里中之日居多以詩書禮樂訓授學者俾其有以自得乎此初未嘗喜為書也然聴之有淺深記之有工拙傳習既廣而漫不可收拾伯氏盖深病之一日客有来告者曰記録之易差固也各述其所聞而復有詳畧得失之異則其差為甚矣非有以審其是學者何從而信之於是然其言取尚書置几間而為之說先之秦誓費誓者欲自其流而上泝於唐虞之際也辭㫖所發不能不敷暢詳至者欲學者易於覽習而有以舍其舊也訖於洛誥而遂以絶筆者以夫精義無窮今姑欲以是而廢夫世之所筆録盖非所以言夫經也未再歳伯氏下世整次讀詩記猶未終篇書及三禮皆未及次第考論而書則猶口授而非傳聞南康史君曽侯取而刋之學官書来求紀其本末義不辭也因書其所知以附於卷末陳氏曰今世有别本全書者其門人續成之非東莱本書也朱子語錄曰呂伯恭解書自洛誥始某問之曰有解不去䖏否曰也無及數日後謂某曰書也是難說今只是强解将去爾要之伯恭却是傷於巧晦庵書說七卷陳氏曰晦庵門人黄士􅐧集其師說之遺以為此書晦庵於書一經獨無訓傳毎以為錯簡脫文䖏多不可强通今惟二典禹謨召誥洛誥金縢有解及九江彭蠡皇極有辯其他皆文集語録中摘出書古經及序共五卷陳氏曰晦庵所録分經與序仍為五十九篇以存古也蔡九峯書集𫝊自序慶元己未冬先生文公令沉作書傳明年先生沒又十年始克成編總若干萬言嗚呼書豈易言哉沉自受讀以来沉潜其義㕘考衆說融㑹貫通乃敢折衷微辭奥㫖乃述舊聞二典禹謨先生盖嘗是正手澤尚新先生改本已附文集中其間亦有經承先生口授指畫而未及盡改者今悉更定見本篇集傳本先生所命故凡引用師說不復識别云尚書講義三十卷陳氏曰㕘政張綱彦正撰綱政和時及第仕三朝歴蔡京王黼秦檜三權臣乃不為屈紹興末預政此書為學官時所作林少頴拙齋書集觧五十八卷陳氏曰少頴從呂紫㣲本中居仁學而太史呂祖謙則其門人也其自序謂初著之時毎日誦正經自首至尾一遍雖有他務不輟平心定氣博採諸儒之說而去取之茍合於義雖近世學者之說亦在所取茍不合於義雖先儒之說亦所不取朱子語録曰林書儘有好䖏但自洛誥以後非其所解黄度文叔書說七卷陳氏曰度篤學窮經老而不倦晩年制閫江淮著述不輟時得新意往往晨夜叩書塾為朋友道之袁爕潔齋家塾書鈔十卷陳氏曰其子喬崇謙録其家庭所聞至君奭而止袁氏家塾讀書記二十三卷陳氏曰題四明袁覺集未詳何人大畧倣呂氏讀詩記集諸說或述己意於後當是潔齋之族尚書精義六十卷陳氏曰三山黄倫彝卿編次或書坊所託梅教授書集解陳氏曰其書三册不分卷不著名未詳何人柯山書解十六卷陳氏曰柯山夏僎元肅撰集二孔王蘇陳林程頤張九成及諸儒之說便於舉子書少傳十八卷陳氏曰新安王炎晦叔撰南塘書說三卷陳氏曰趙汝談撰疑古文非真者五條朱文公嘗疑之而未若此之决也然於伏生所傳諸篇亦多所掊擊觝排則似過甚文獻通考卷一百七十七
