body:
  text: 文獻通考卷一百六十二鄱陽馬端臨貴與著刑考一刑制虞舜象以典刑象法也法用當刑用不越法流宥五刑宥寛也以流放之法寛五刑鞭作官刑以鞭為治官事之刑扑作教刑扑榎椘也不勤道業則榎椘之金作贖刑𤯝災肆赦怙終賊刑註見贖及詳讞門欽哉欽哉惟刑之恤哉流共工扵幽州放驩兠扵崇山竄三苖扵三危殛鯀扵羽山註見徒流門四罪而天下咸服帝曰臯陶蠻夷猾夏寇賊姦宄猾亂也羣行攻劫曰寇殺人曰賊在外曰姦在内曰宄汝作士五刑有服士理官也五刑墨劓剕宫大辟服從也言得輕重之中正五服三就既從五刑謂服罪也行刑當就三處大罪扵原野大夫扵朝士扵市五流有宅五宅三居註見徒流門惟眀克允帝曰臯陶惟兹臣庶㒺或干予正或有也無有干我正言順命汝作士眀扵五刑以弼五教期扵予治刑期扵無刑民恊扵中合扵大中之道時乃功𢡟哉臯陶曰帝徳㒺愆臨下以簡御衆以寛罰弗及嗣賞延扵世嗣亦世俱謂子延及也父子罪不相及而及其賞道徳之政宥過無大刑故無小罪疑惟輕功疑惟重見詳讞門與其殺不辜寧失不經好生之徳洽扵民心兹用不犯扵有司吕刑苖民弗用靈制以刑惟作五虐之刑曰法三苖之君習蚩尤之惡不用善化民而制以重刑惟為五虐之刑自謂得法殺戮無辜爰始淫為劓刵椓黥三苖之主頑凶苦民敢行虐刑以殺戮無辜扵是始大為截人耳鼻㭬陰黥面以加無辜故曰五虐越兹麗刑并制㒺差有辭苗民扵此施刑并制無罪無差有直辭者言淫濫也民興胥漸泯泯棼棼㒺中扵信以覆詛盟三苗之民凟扵亂政起相漸化泯泯為亂棼棼同惡皆無中扵信義以反背詛盟之約虐威庶戮方吿無辜扵上上帝監民㒺有馨香徳刑發聞惟腥三苖虐政作威衆被戮者萬方各吿無罪扵天天視苖民無有馨香之行其所以為徳刑發聞乃惟腥臭皇帝哀矜庶戮之不辜報虐以威遏絶苖民無世在下皇帝帝堯也哀矜衆被戮者之不辜乃報為虐者以威誅遏絶苖民使無世位在下國也丁謐論曰堯典曰象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑怙終賊刑咎繇曰天討有罪五刑五用哉吕刑曰蚩尤惟始作亂延及扵平民㒺不寇賊惟作五虐之刑曰法殺戮無辜爰始淫為劓刵㭬黥按此則肉刑在扵蚩尤之世而堯舜以流放代之故黥劓之文不載唐虞之籍而立刑之數亦不具扵聖人之㫖也禹承舜禪與堯同治必不釋二聖而逺則凶頑固可知矣湯武之王獨将奚取吕刑之云即叔向所謂三辟之興皆叔世也此則近君子有徴之言矣夏作禹刑殷湯制官刑儆扵有位曰敢有恒舞扵宫酣歌扵室時謂巫風敢有殉扵貨色恒扵逰畋時謂淫風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一扵身家必䘮邦君有一扵身國必亡臣下不匡其刑墨具訓扵䝉士邦君卿士則以争臣自匡臣不正君服墨刑鑿其額湼以墨䝉士例謂下士士以争友僕隸自匡正紂無道罪人以族焚炙忠良刳剔孕婦又為炮烙之刑膏銅柱加之以炭令有罪者行焉命曰炮烙之刑醢九族脯鄂侯周西伯獻洛西之地以請除炮烙之刑紂許之周官大司寇之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典新國者新辟地立君之國民未習扵教故用輕法二曰刑平國用中典平國承平守成之國也用中典者常行之法三曰刑亂國用重典亂國篡弑叛􅊇之國用重典者以其化惡伐滅之以五刑糾萬民刑亦法也糾猶察異也一曰野刑上功糾力功農功力勤力二曰軍刑上命糾守命将命也守不失部伍反守劉音狩註同将子匠三曰鄉刑上徳糾孝徳六徳也善事父母為孝四曰官刑上䏻糾職䏻能其事也職職事修理五曰國刑上愿糾暴愿慤慎也暴當為恭字之誤也角愿音願劉又音原依注暴作恭慤苦反以圜土聚教罷民圜土獄城也聚罷民其中困苦以教之為善也民不愍作勞有似扵罷凡害人者寘之圜土而施職事焉以眀刑恥之害人謂為邪惡已有過失麗扵法者以其不改犯法寘之圜土繫教之庶其困悔而䏻改也寘置也施職事以所䏻役使之眀刑書其罪惡扵大方版著其背其䏻改者反扵中國不齒三年反扵中國謂舎之還扵故鄉里也司圜職曰上罪三年而舎中罪二年而舎下罪一年而舎不齒者不得以年次列扵平民其不䏻改而出圜土者殺出謂逃亡以兩造禁民訟入束矢扵朝然後聼之訟謂以其財貨相吿者造至也使訟者兩至既兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢者取其直也詩曰其直如矢古者一弓百矢束矢其百箇與造七報反注同箇古賀反與音餘以兩劑禁民獄入鈞金三日乃致扵朝然後聼之獄謂相吿以罪名者劑今劵書也使獄者各齎劵書既兩劵書使入鈞金又三日乃治之重刑也不劵書不入金則是亦自服不直者也必入金者取其堅也三十斤曰鈞兩劑子随反以嘉石平罷民嘉石文石也㔁之外朝門左平成也成之使善文石之字劉音問音樹凡萬民之有罪過而未麗扵法而害扵州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舎之有罪過謂邪惡之人所罪過者也麗附也未附扵法未著扵法也木在足曰桎在手曰梏役諸司空坐日訖使給百工之役也役月訖使其州里之人任之乃赦之宥寛也反桎音質梏古毒反著直略下附猶著皆同以肺石逹窮民肺石赤石也窮民天民之窮而無吿者肺芳廢反凡逺近惸獨老幼之欲有復扵上而其長弗逹者立扵肺石三日士聼其辭以吿扵上而罪其長無兄弟曰惸無子孫曰獨復猶報也上謂王與六卿也報之者若上書詣公府言事矣長謂諸侯若卿遂大夫正月之吉始和布刑扵邦國都鄙乃縣刑象之法扵象魏使萬民觀刑象挟日而歛之正月朔日布王刑扵天下正歳又縣其書重之同縣音元註及下挟子恊反凡邦之大盟約涖其盟書而登之扵天府涖臨也天府祖廟之藏約扵妙反藏才浪反太史内史司㑹及六官皆受其貳而藏之六官六卿之官也貳副也會古外反下司會皆同凡諸侯之獄訟以邦典定之邦典六典也以六典待邦國之治治直吏反下同凡卿大夫之獄訟以邦法㫁之邦法八法也以八法待官府之治㫁丁亂反下注皆同凡庶民之獄訟以邦成弊之邦成八成也以官成待萬民之治故書弊為憋鄭司農云慗當為弊邦成謂若今時決事比也弊之㫁其獄訟也故春秋傳曰弊獄邢侯小司寇以五刑聼萬民之獄訟附扵刑用情訊之至扵旬乃弊之讀書則用法附猶著也訊言也用情理言之冀有可以出之者十日乃㫁之讀書則用法如今時讀鞫已乃論之凡命夫命婦不躬坐獄訟為治獄吏䙝尊者也不身坐者必使其屬若子弟也凡王之同族有罪不即市鄭司農云刑諸甸師氏禮記曰刑扵隐者不與國人慮兄弟以五聲聼獄訟求民情一曰辭聼觀其出言不直則煩二曰色聼觀其顔色不直則赧三曰氣聼觀其氣息不直則喘四曰耳聼觀其聼聆不直則惑五曰目聼觀其眸子視不直則眊然以八辟麗邦法附刑罰以三刺㫁庶民獄訟之中詳見註並見詳讞門歳終則令羣士計獄弊訟登中扵天府上其所㫁獄訟之數正歳帥其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士遂士以下乃宣布扵四方憲刑禁宣徧也憲表也謂縣之也刑禁士師之五禁士師之職掌國之五禁之法以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸徇之扵朝書而縣扵門閭左右助也助刑罰者助其禁民為非也宫王宫也官官府也國城中也古之禁書亡矣今宫門有符籍官府有無故擅入城門者有離載下帷野有田律軍有囂讙夜行之禁其觕可言者䟽曰古者之禁書在儀禮三千條内而在亡中故舉漢法以况之離載下帷者謂在車離耦耦載而下惟恐是姦非故禁之古之設刑者以刑止刑以殺止殺是欲不使犯罪故扵刑外豫設禁禁民使不犯刑是左右助刑罰使民無麗扵罪也書而縣扵閭門者爾雅云巷門謂之閭則懸扵處處巷閭使知之以五戒先後刑罰毋使罪麗扵民一曰誓用之扵軍旅二曰誥用之扵㑹同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙先後猶左右也誓誥扵書則甘誓大誥之屬禁則軍禮曰無干車無自後射此其類也糾憲未聞掌官中之政令大司寇之官府中也察獄訟之辭以詔司寇㫁獄弊訟致邦令詔司寇若今白聼正法觧也致邦令者以法報之掌士之八成八成者行事有八篇若今時決事比矣一曰邦汋汋讀如酌邦汋者斟酌盗取國家宻事若今時刺探尚書事二曰邦賊為􅊇亂者三曰邦諜為異國反間四曰犯邦令干冐王教令者五曰撟邦令稱詐以有為者撟音矯六曰為邦盜竊取國之寳藏者七曰為邦朋朋黨相阿使政不平者八曰為邦誣誣㒺君臣使事失實若邦凶荒則以荒辯之法治之𤣥謂辯當為貶聲之誤也遭飢荒則刑罰國事有所貶損作權時法也朝士職曰若邦凶荒札䘮寇戎之故則令邦國都家縣鄙慮刑貶令移民通財糾守緩刑移民就賤救困也通財補不足也糾守衛盜賊也緩刑舒民心也凡以財獄訟者正之以傳别約劑傳别中别手書也約劑各所持劵也若今時市買為劵書以别之各得其一訟則按劵以正之也鄉士掌國中謂六鄉之獄在國中各掌其鄉之民數而糾戒之鄉士八人言各者四人而分主三鄉聼其獄訟察其辭辯其獄訟異其死刑之罪而要之二旬而職聽於朝辯異謂殊其文書也要之為其罪法之要辭如今劾矣十日乃以職事治之扵外朝容其自反覆司寇聼之㫁其獄弊其訟扵朝羣士司刑皆在各麗其法以議獄訟麗附也各附致其法以成議也獄訟成士師受中恊日刑殺肆之三日受中謂受獄訟之成也鄭司農云若今二千石受其獄也中者刑罰之中也恊合也和也和合支幹善日若今時望後利日也肆之三日春秋傳曰三日弃疾請尸論語曰肆諸市朝言謂士師既受獄訟之成鄉士則擇其可刑殺之日至時徃涖之尸之三日乃反也若欲免之則王㑹其期免猶赦也期謂鄉士職聼王朝司寇聼之日王欲赦之則用此時親徃議之遂士掌四郊六遂之獄在四郊各掌其遂之民數而糾其戒令遂士十二人言各者二人分一遂聼其獄訟以下同鄉士二旬而聼扵朝以下同鄉士協日就郊而刑殺各扵其遂肆之三日若欲免之則王令三公㑹其期縣士掌野鄭司農云掌三百里至四百里大夫所食𤣥謂地距王城二百里以外至三百里曰野三百里以外至四百里曰縣四百里以外至五百里曰都都縣野之地其邑非王子弟公卿大夫之采地則皆公邑也謂之縣掌其獄焉言掌野者郊外曰野大總言之也獄居近野之縣獄在二百里上縣之縣獄在三百里上都之縣獄在四百里上各掌其縣之民數糾其戒令而聼其獄訟以下同鄉士三旬而職聽於朝以下同鄉士刑殺各就其縣肆之三日若欲免之則王命六卿㑹其期方士掌都家鄭司農云掌四百里至五百里公所食𤣥謂都王子弟及公卿之采地家大夫之采地大都在量地小都在縣地家邑在梢地不言掌其民數民之不純屬王也聼其獄訟之辭辯其死刑之罪而要之三月而上獄訟扵國三月乃上要者又變朝言國以其自有君異之司寇聼其成扵朝羣士司刑皆在各麗其法以議獄訟成平也獄訟成士師受中書其刑殺之成與其聼獄訟者都家之吏自恊日刑殺但書其成與治獄之吏姓名備反覆有失實者訝士掌四方之獄訟謂諸侯之獄訟諭罪刑扵邦國吿曉以麗罪及制刑之本意凡四方之有治扵士者造焉謂讞疑辨事先来詣乃通之扵士師也如今郡國亦時遣主者吏詣廷尉議者四方有亂獄則徃而成之亂獄謂君臣宣淫上下相虐者也徃而成之猶吕歩舒徃治淮南獄朝士凡士之治有期日國中一旬郊二旬野三旬都三月邦國朞期内之治聼期外不聼在期内者聼其外者不聼若今時徒論決滿三月不得乞鞫凡有責者有判書以治則聼判半分而合者謂若今時辭訟有劵書者為治之凡民同貨財者令以國法行之犯令者刑罰之鄭司農云同貨財謂合錢共賈者也𤣥謂富人蓄積者多時收斂之乏時以國服之法出之雖有騰踴其贏不得過此以利出者與取者過則罰之若今時加貴取息坐贓也凡屬責者以其地傳而聼其辭鄭司農云謂訟地畔界者田地町畔相比屬故謂之屬責以地傳而聼其辭以其比畔為證也𤣥謂屬責轉責使人歸之而本主死亡受之歸受之數相抵胃也以其地之人相比近䏻為證者来乃受其辭為治之也凡盜賊軍鄉邑及家人殺之無罪謂盜賊羣軰若軍共攻盜鄉邑及家人者殺之無罪若今時無故入人室宅廬舎上人車船牽引人欲犯法者其時格殺之無罪凡報仇讎者書扵士殺之無罪謂同國不相辟者将報之必先言之扵士若邦凶荒札䘮寇戎之故則令邦國都家縣鄙慮刑貶慮謀也貶猶減也謂當圗謀緩刑且減國用為民困也司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百則罪五百殺罪五百墨黥也先刻其面以墨窒之劓截其鼻也今東西夷或以墨劓為俗古刑人亡逃者之世類與宫者丈夫則割其勢女子閉扵宫中若今官男女也刖㫁足也周改臏作刖殺死刑也書傳曰決闗梁踰城郭而略盜者其刑臏男女不以義交者其刑宮觸易君命年輿服制度姦軌盜攘傷人者其刑劓非事而事之出入不以道義而誦不祥之辭者其刑墨降畔寇賊劫略奪攘矯䖍者其刑死此二千五百罪之目略也其刑書則亡夏刑大辟二百臏辟三百宫辟五百劓墨各千周則變焉所謂刑罰世輕世重者也鄭司農云漢孝文帝十三年除肉刑若司寇㫁獄弊訟則以五刑之法詔刑罰而以辨罪之輕重詔刑罰者處其所應不如今律家所著法司刺掌三刺三宥三赦之法司盟凡民之有約劑者其貳在司盟貳之者檢其自相違約有獄訟者則使之盟詛不信則不敢聼此盟詛所以省獄訟司厲司圜並見徒流門掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪凡囚者謂非盜賊自以他罪拘者也鄭司農云拲者兩手共一木也桎梏者兩手各一木也𤣥謂在手曰梏在足曰桎中罪曰拲手足各一木耳下罪又去桎王同族及命士以上雖有上罪或拲或桎而已弊猶㫁也梏古毒反張揖云參著曰梏偏著曰桎説文云梏手械也所以吿天桎足械也所以質地拲劉云三家姜奉反一家居辱反漢書音義韋昭音拱云兩手共一木曰拲兩手各一木曰梏李竒音恐桎之實反上時掌反及刑殺吿刑于王奉而適朝士加眀梏以適市而刑殺之吿刑扵王以今日當行刑及所刑姓名也其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟奉而適朝者重刑為王欲有所赦且當以付士士鄉士也鄉士加眀梏者謂書其姓名及其罪扵梏而著之也囚時雖有無梏者至扵刑殺皆設之以適市就衆也庶姓無爵者皆刑殺扵市為扵偽反著丁略反徐張慮反凡有爵者與王之同族奉而適甸師氏以待刑殺適甸師氏亦由朝乃徃也待刑殺者掌戮将自市来也文王世子曰雖親不以犯有司正術也所以體異姓也刑扵隐者不與國人慮兄弟也掌戮掌斬殺賊諜而搏之斬以鈇鉞若今要斬也殺以刀刅若今棄市也諜謂姦寇反間者賊與諜罪大者斬之小者殺之搏當為膊諸城上之膊字之誤也膊謂去衣磔之諜音牒搏注作膊同普博反磔也鈇音斧要一遥反間間厠之間去起吕反凡殺其親者焚之殺王之親者辜之親服以内也㷊燒也易曰焚如死如棄如辜之言枯也謂磔之凡殺人者踣諸市肆之三日刑盜扵市踣僵尸也肆猶申也陳也凡言刑盜罪惡莫大焉踣皮北反僵音居良反凡罪之麗扵法者亦如之唯王之同族與有爵者殺之扵甸師氏罪二千五百條上附下附刑五而已扵刑同科者其刑殺之一也凡軍旅田役斬殺刑戮亦如之戮謂膊焚辜肆墨者使守門黥者無妨扵禁御御音禦劓者使守闗截鼻亦無妨以貌醜逺之逺千萬反宫者使守内以其人道絶也今世或然刖者使守囿㫁足驅衛禽獸無急行囿音又㫁丁管反髠者使守積鄭司農云髠當為完謂但居作三年不虧體者也𤣥謂此出五刑之中而髠者必王之同族不宫者宮之為翦其類髠頭而已守積積在隐者宜也髠苦門反積子賜反注同布憲掌憲邦之刑禁正月之吉執旌節以宣布扵四方而憲邦之刑禁以詰四方邦國及其都鄙逹扵四海憲表也謂縣之也刑禁者國之五禁所以左右刑罰者司寇正月市刑扵天下正歳又縣其書扵象魏布憲扵司寇布刑則以旌節出宣令之扵司寇縣書則亦縣之扵門閭及都鄙邦國刑者王政所重故屢丁寧焉詰謹也使四方謹行之凡邦之大事合衆庶則以刑禁號令禁殺戮掌司斬殺戮者凡傷人見血而不以吿者攘獄者遏訟者以吿而誅之司猶察也察此四者吿扵司寇罪之也斬殺戮謂吏民相斬相殺相戮者傷人見血乃為傷人耳鄭司農云攘獄者距當獄者也遏訟者遏止欲訟者也𤣥謂攘猶郤也郤獄者言不受也禁暴氏掌庶民之亂暴力正者撟誣犯禁者作言語而不信者以吿而誅之民之好為侵陵稱詐謾誕此三者亦刑所禁也力正以力強得正也武撟居表反好為呼報反下文則為下注皆為同謾誕諫反一音亡半反又免仙反徐望山反本或作慢誕音但凡國聚衆庶則戮其犯禁者以徇凡奚𨽻聚而出入者則司牧之戮其犯禁者奚𨽻女奴男奴也其聚出入有所使王制司寇正刑眀辟以聼獄訟司寇秋官卿掌刑者辟罪也辟婢亦反注同必三刺以求民情㫁其獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民刺七智反殺也有㫖無簡不聼簡誠也有其意無其誠者不論以為罪附從輕附施刑也求出之使從輕赦從重雖有罪可重猶赦之凡制五刑必即天論制㫁也即就也必即天論言與天意合閔子曰古之道不即人心即或為則論或為倫論音倫理也注同郵罰麗扵事郵過也麗附也過人罪人當各附於其事不可假他以為喜怒也凡聼五刑之訟必原父子之親立君臣之義以權之權平也意論輕重之序慎測淺深之量以别之意思念也淺深謂俱有罪本心有善惡悉其聰眀致其忠愛以盡之盡其情疑獄汜與衆共之衆疑赦之必察小大之比以成之小大猶輕重已行故事曰比成獄辭史以獄成吿扵正正聼之史司寇吏也正扵周鄉師之屬今漢有正平丞秦所置平彼命反正以獄成吿扵大司寇大司寇聼之棘木之下周禮鄉師之屬辨其獄訟異其死刑之罪而要之職聼扵朝司寇聼之朝王之外朝也左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉大司寇以獄之成吿扵王王命三公參聼之王使三公復與司寇及正共平之重刑也周禮王欲免之乃命公會其期三公以獄之成吿扵王王三又然後制刑又當作宥宥寛也一宥曰不識再宥曰過失三宥曰遺忘凡作刑罰輕無赦法雖輕不赦之為人易犯刑者侀也侀者成也一成而不可變故君子盡心焉變更也侀音刑析言破律亂名改作執左道以亂政殺析言破律巧賣法令者也亂名改作謂變易官與物之名更造法度左道若巫蠱及俗禁作淫聲異服竒技竒器以疑衆殺淫聲鄭衛之屬也異服若聚鷸冠瓊弁也竒技竒器若公輸般請以機窆般鷸伊必反徐音述弁皮戀反百間反行偽而堅言偽而辯學非而博順非而澤以疑衆殺皆謂虛華㨗給無誠者也假扵鬼神時日卜筮以疑衆殺今時持䘮葬築盖嫁娶卜數文書使民倍禮違制此四誅者不以聼為其為􅊣大而辭不可眀文王世子公族其有死罪則磬扵甸人公族之罪雖親不以犯有司正術也所以體百姓也犯猶干也術法也百姓或作異姓非刑扵隐者不與國人慮兄弟也弗弔弗為服哭扵異姓之廟為忝祖逺之也素服居外不聼樂私䘮之也骨肉之親無絶也公族無宫刑不翦其類也詳見帝系考皇族門康誥曰嗚呼封敬眀乃罰凡行刑罰必敬眀之欲其謹重人有小罪非𤯝乃惟終自作不典式爾小罪非過誤而故為亂常之事用意如此罪雖小而不可赦有厥罪小乃不可不殺乃有大罪非終乃惟𤯝災適爾既道極厥辜時乃不可殺有大罪而非故犯乃其過誤偶爾如此既自稱道盡輸其情不敢隐匿罪雖大乃不可殺非汝封刑人殺人無或刑人殺人非汝封又曰劓刵人無或劓刵人刑殺劓刵天所以討有罪者非汝封得私用之無或以為可以已施之而妄刑人也王曰外事汝陳時臬司師兹殷罰有倫外事有司之事也臬法也言汝扵外事但陳列是法使有司師此殷罰之有叙者用之爾又曰要囚服念五六日至扵旬時丕蔽要囚要囚獄辭之要者也服念服膺而念之旬十日時三月為囚求生道也蔽㫁也王曰汝陳時臬事罰蔽殷彛用其義刑義殺勿庸以次汝封乃汝盡遜曰時叙惟曰未有遜事義宜也次次舎之次遜順也申言敷陳是法與事罰㫁以殷之常法矣又慮其泥古而不通又謂其刑其殺必察其宜扵時者而後用之既又慮其趍時而循已又謂刑殺不可以就汝封之意既又慮其刑殺雖已當罪而矜喜之心乗之又謂使汝刑殺盡順扵義雖曰是有次序汝當惟謂未有順義之事盖矜喜之心生乃怠惰之心起刑殺之所由不中也可不戒哉已汝惟小子未其有若汝封之心朕心朕徳惟乃知已者語辭之不䏻已也小子幼小之稱言年雖少而心獨善也爾心之善固朕知之朕心朕徳亦惟爾知之将言用罰之事故先發其良心焉凡民自得罪寇攘姦宄殺越人扵貨睯不畏死㒺弗憝越顛越也盤􅏤云顛越不恭瞖強憝惡也自得罪非為人誘䧟以得罪也凡民自犯罪為盜賊姦宄殺人顛越人以取財貨強狠亡命者人無不憎惡之也用罰而加是人則人無不服以其出乎人之同惡而非即乎吾之私心也特舉此以眀用罰之當罪王曰封元惡大憝矧惟不孝不友子弗祇服厥父事大傷厥考心扵父不䏻字厥子乃疾厥子扵弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友扵弟惟弔兹不扵我政人得罪天惟與我民彛大泯亂曰乃其速由文王作罰刑兹無赦大憝即上文之㒺弗憝言寇攘姦宄固為大惡而大可惡矣况不孝之人而尤為可惡者當商之季禮義不明人紀廢壊子不敬事其父大傷父心父不䏻愛子乃疾惡其子是父子相夷也天顯猶孝經所謂天眀尊卑顯然之序也弟不念尊卑之序而不䏻敬其兄兄亦不念父母鞠養之勞而大不友其弟是兄弟相賊也父子兄弟至扵如此茍不扵我為政之人而得罪焉則天之與我民彛必大泯滅而紊亂矣曰者言如此則汝其速由文王作罰刑此無赦而懲戒之不可緩也不率大戞矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由兹義率殺戞法也言民之不率教者固可大寘之法矣况外庶子以訓人為職與庶官之長及小臣之有符節者乃别布條教違道干譽弗念其君弗用其法以病君上是乃長惡扵下我之所深惡人臣之不忠如此刑其可已乎汝其速由此義而率以誅戮之可也按上言民不孝不友則速由文王作罰刑兹無赦此言外庶子正人小臣背上立私則率由兹率殺其曰刑曰殺若用法峻急者盖殷之臣民化紂之惡父子兄弟之無其親君臣上下之無其義非䋲之以法示之以威殷人孰知不孝不義之不可干哉周禮所謂刑亂國用重典者是也然曰速由文王曰速由兹義則其刑其罰亦仁厚而已矣君陳王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削無乗勢位作威扵上無倚法制行刻削之政寛而有制從容以和殷民在辟予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中有弗若扵汝政弗化扵汝訓辟以止辟乃辟狃扵姦宄敗常亂俗三細不宥罪雖小三犯不赦所以絶惡源也穆王作吕刑王曰嗟四方司政典獄非爾惟作天牧主正典獄謂諸侯也非汝惟為天牧民乎言任重是汝也為扵偽反今爾何監非時伯夷播刑之廸言當視是伯夷布刑之道而法之其今爾何懲惟時苖民匪察扵獄之麗其今汝何懲戒乎所懲戒惟是苖民非察扵獄之施刑以取滅亡麗力馳反㒺擇吉人觀扵五刑之中惟時庶威奪貨言苖民無肯選擇善人使觀視五刑之中正惟是衆為威虐者任之以奪取人貨所以為亂㫁制五刑以亂無辜上帝不蠲降咎扵苖苖民任奪貨姦人㫁制五刑以亂加無罪天不潔其所為故下咎罪謂誅之蠲吉縁反咎其乆反苖民無辭扵罰乃絶厥世言苖無以辭扵天罰故堯絶其世申言為至戒王曰嗚呼念之哉念以伯夷為法苖民為戒伯父伯兄仲叔季弟幼子童孫皆聼朕言庶有格命皆王同姓有父兄弟子孫列者伯仲叔季順少長也舉同姓包異姓言不殊也聼從我言庶幾有至命今爾㒺不由慰日勤爾㒺或戒不勤今汝無不用安自居日當勤之汝無有徒念戒而不勤日勤上人實反一音日天齊扵民俾我一日非終惟終在人天整齊扵下民使我為之一日所行非為天所終惟為天所終在人所行天齊扵民絶句馬云齊中也俾我絶句上必爾反馬本作矜矜哀也爾尚敬􅊇天命以奉我一人雖畏勿畏雖休勿休汝當庶幾敬􅊇天命以奉我一人之戒行事雖見畏勿自謂可敬畏雖見美勿自謂有徳美惟敬五刑以成三徳一人有慶兆民頼之其寧惟永先戒以勞謙之徳次教以惟敬五刑所以成剛柔正直之三徳也天子有善則兆民頼之其乃安寧長乆之道王曰吁来有邦有土吿爾祥刑吁嘆也有國土諸侯吿汝以善用刑之道吁况于反馬作于于扵反在今爾安百姓何擇非人何敬非刑何度非及在今爾安百姓兆民之道當何所擇非惟吉人乎當何所敬非惟五刑乎當何所度非惟及世輕重所宜乎度待洛反註同馬云謀造也兩造具備師聼五辭兩謂囚證造至也兩至具備則衆獄官共聼其入五刑之辭造七報反注同五辭簡孚正扵五刑五辭簡核信有罪驗則正之扵五刑五刑不簡正扵五罰不簡核謂不應五刑當正五罰出金贖罪核幸格反五罰不服正扵五過不服不應罰也正扵五過從赦免應應對之應下同五過之疵惟官惟反惟内惟貨惟来五過之所病或嘗同官位或許反囚辭或内親用事或行貨枉法或舊相與徃来皆病所在来馬本作求云有求請賕也其罪惟均其審克之以病所在出入人罪使在五過罪與犯法者同其當清察䏻使之不行五刑之疑有赦五罰之疑有赦其審克之刑疑赦從罰罰疑赦從免其當清察䏻得其理簡孚有衆惟貎有稽簡核誠信有合衆心惟察其貌有所考今重刑之至無簡不聼具嚴天威無簡核誠信不聼理其獄皆當嚴敬天威無輕用刑墨辟疑赦其罰百鍰閱實其罪刻其顙而湼之曰墨刑疑則赦從罰六兩曰鍰鍰黄銕也閱實其罪使與罰各相當辟婢亦反鍰徐戸闗反六兩也鄭及爾雅同説文云六鋝也鋝十一銖二十五分銖之十三也馬同又云賈逵説俗儒以鋝重六兩用官劍重九鋝俗儒近是閱音悦顙素黨反湼乃結反劓辟疑赦其罰惟倍閱實其罪截鼻曰劓刑倍百為二百鍰剕辟疑赦其罰倍差閱實其罪刖足曰剕倍差謂倍之又半為五百鍰剕扶謂反倍差測加反傳云五百鍰也馬云倍二百為四百差者又加四百之三分之一凡五百三十三鍰三分鍰之一也宫辟疑赦其罰六百鍰閱實其罪宫淫刑也男子割勢婦人幽閉次死之刑序五刑先輕轉至重者事之宜大辟疑赦其罰千鍰閱實其罪死刑也五刑宜各入罰不降相因古之制也墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千别言罰屬合言刑屬眀刑罰同屬互見其義以相備見賢遍反上下比罪無僭亂辭勿用不行上下比方其罪無聼僣亂之辭以自疑勿用折獄不可行僭子念反惟察惟法其審克之惟當清察罪人之辭刑以法理其當詳審䏻之上刑適輕下服重刑有可以虧減則之輕服下罪下刑適重上服輕重諸罰有權一人有二罪則之重而輕并數輕重諸刑罰各有權宜并必政反數色住反刑罰世輕世重惟齊非齊有倫有要言刑罰随世輕重也刑新國用輕典刑亂國用重典刑平國用中典凡刑所以齊非齊各有倫理有要義罰懲非死人極扵病刑罰所以懲過非殺人欲使惡人極扵病苦莫敢犯者非佞折獄惟良折獄㒺非在中非口才可以㫁獄惟平良可以㫁獄無不在中正察辭扵差非從惟從察囚辭其難在扵差錯非從其偽辭惟從其本情哀敬折獄眀啟刑書胥占咸庶中正當憐下人之犯法敬㫁獄之􅊣人眀開刑書相與占之使刑當其罪皆庶㡬必得中正之道當丁浪反其刑其罰其審克之其所刑其所罰其當詳審䏻行之無失中正獄成而孚輸而孚㫁獄成辭而信當輸汝信扵王謂上其鞫劾文辟上時掌反下注同鞫九六反劾亥代反玉篇胡得反其刑上備有并兩刑其㫁刑文書上王府皆當具有并兩刑亦具上之王曰嗚呼敬之哉官伯族姓朕言多懼敬之哉吿使敬刑官長諸侯族同族姓異姓也我言多可戒懼以儆之儆音景朕敬扵刑有徳惟刑我敬扵刑當使有徳者惟典刑今天相民作配在下眀清扵單辭今天治民人君為配天在下當承天意聼訟當清審單辭單辭特難聼故言之相如字馬息亮反助也治直吏反民之亂㒺不中聼獄之兩辭民之所以治由典獄之無不以中正聼獄之兩辭兩辭棄虚從實刑獄清則民治無或私家扵獄之兩辭典獄無取有受貨聼詐成私家扵獄之兩辭獄貨非寳惟府辜功報以庶尤受獄貨非家寳也惟聚罪之事其報則以衆人見罪永畏惟罰非天不中惟人在命當長畏懼惟為天所罰非天道不中惟人在教命使不中不中則天罰之天罰不極庶民㒺有令政在扵天下天道罰不中之衆民無有善政在扵天下由人主不中将亦罰之令力呈反王曰嗚呼嗣孫今徃何監非徳扵民之中尚眀聼之哉嗣孫諸侯嗣世子孫非一世自今已徃當何監視非當立徳扵為民之中正乎庶㡬眀聼我言而行之哉哲人惟刑無疆之辭屬扵五極咸中有慶言智人惟用刑乃有無窮之善辭名聞扵後世以其折獄屬五常之中正皆中有善所以然也屬音燭受王嘉師監扵兹祥刑有邦有土受王之善衆而治之者視扵此善刑欲其勤而法之為無疆之辭吕刑一書先儒蔡九峰以為舜典所謂贖刑者官府學校鞭扑之刑耳若五刑則固未甞贖也今穆王贖法雖大辟亦許其贖免矣盖王廵逰無度財匱民勞至其末年無以為計乃為此一切權宜之術以歛民財夫子錄之亦以示戒愚以為未然盖熟讀此書哀矜惻怛之意千載之下猶使人為之感動且拳拳乎訖富惟貨之戒則其不為聚歛征求設也審矣鬻獄取貨末世暴君汙吏之所為而謂穆王為之夫子取之乎且其所謂贖者意自有在學者不䏻詳味經意而深考之耳其曰墨辟疑赦其罰百鍰盖謂犯墨法之中疑其可赦者不遽赦之而姑取其百鍰以示罰耳繼之曰閱實其罪盖言罪之無疑則刑可疑則贖皆當閱其實也其所謂疑者何也盖唐虞之時刑清律簡是以贖金之法止及鞭扑而五刑無贖法至扵周而律之繁極矣五刑之屬至扵三千若一按之律盡從而刑之則何莫非投機觸罟者天下之人無完膚矣是以穆王哀之而五刑之疑各以贖論姑以大辟一條言之夫所犯者死罪而聼其贖金以免誠不可以訓也然大辟之屬二百則豈無疑赦而在可議之列者有如殺人反􅊇之類則是不可不殺雖萬鍰亦難貫死矣而二百之屬其罪不皆至此也以經傳考之其在周則王制之析言破律行偽學非酒誥之羣飲其在漢則列侯坐酎金不敬将帥出師失期之類扵律皆死罪也而其情則可矜其法則可議豈必盡殺之乎此則死罪之疑赦者也意周所以㫁斯獄必在其罰千鍰之科而漢制則不過或除其國或贖為庶人亦其遺意也盖哀矜庶獄乃此書之大㫖贖特其一事序者専以訓夏贖刑言之已失其義而此書之首又止言耄荒度作刑以詰四方夫曰作刑以詰四方者主扵用刑之意也而此書所言大槩哀民之罹扵法而不忍刑之懼有司之不䏻審克而輕用之其意盖期扵無刑而非作刑也故愚疑篇首或有脱簡如耄荒度之語亦難通二序既不得書之意而後之儒者復因穆王有廵逰之事遂扵此書肆為譏評而不復味其辭亦已踈矣以愚觀之一篇之中察獄情之隐痛鑒天道之神眀而示勸戒扵報應之間咨嗟懇惻諄複詳練老者之言也其作扵既聞祈招之後乎是豈復有侈心之可議哉或曰罪疑則降等施刑可矣何必贖乎曰古之議疑罪者降殺一法也虞書所謂罪疑惟輕此書所謂上下比罪上刑適輕下服是也罰贖一法也虞書所謂金作贖刑此書所謂五刑之贖是也固並行而不悖也且其言曰罰懲非死人極扵病盖財者人之所甚欲故奪其欲以病之使其不為惡耳豈利其貨乎至又以為所言臯陶不與三后之列遂使後世以刑官為輕後漢楊賜拜廷尉自以代非法家言曰三后成功臯陶不與盖吝之也亦此書立言之疵啟之陋哉俗儒之論也夫刑以齊民古人重之謹之而非所先也故夫子以政刑不若徳禮而此書曰三后成功惟殷扵民士制百姓扵刑之中以教祇徳盖曰必居以安之食以養之禮以教之然後及扵刑耳豈以臯陶為劣扵禹稷而後之乎然即此章先後輕重之意觀之盖可以眀此書之不為作刑以詰四方而作矣鄭人鑄刑書鑄刑書扵鼎以為國之常法叔向使詒子産書曰始吾有虞扵子虞度也言準度子産以為已法度待落反下同今則已矣已止也昔先王議事以制不為刑辟懼民之有争心也臨事制刑不豫設法也法豫設則民知争端猶不可禁禦是故閑之以義糾之以政糾舉也行之以禮守之以信奉之以仁奉養也制為祿位以勸其從勸從教嚴㫁刑罰以威其淫淫放也懼其未也故誨之以忠聳之以行聳懼也聳息勇反行下孟反教之以務時所急使之以和説以使民説音悦臨之以敬涖之以彊施之扵事為涖涖音利又音類㫁之以剛義㫁恩猶求聖哲之上眀察之官上公王者官卿大夫也忠信之長慈恵之師民扵是乎可任使也而不生禍亂民之有辟則不忌扵上權移扵法故民不畏上長丁丈反並有争心以懲扵書而徼幸以成之因危文以生争緣􅗲幸以成其巧偽􅗲本又作邀古堯反巧如字又苦孝反弗可為矣為治也夏有亂政而作禹刑商有亂政而作湯刑夏商之亂著禹湯之法言不能議事以制夏戸雅反注同周有亂政而作九刑周之衰亦為刑書謂之九刑三辟之興皆叔世也言刑書不起扵始盛之世今吾子相鄭國作封洫在㐮三十年相息亮反洫况域反立謗政作邱賦在四年謗布浪反制參辟鑄刑書制參辟謂用三代之末法參七南反一音三将以靖民不亦難乎詩曰儀式刑文王之徳日靖四方詩頌言文王以徳為儀式故能日有安靖四方之功刑法也靖音静又曰儀刑文王萬邦作孚詩大雅言文王作儀法為天下所信孚信也如是何辟之有言詩唯以徳與信不以刑也民知争端矣将棄禮而徴扵書以刑書為徴錐刀之末将盡争之錐刀之末喻小事錐音佳盡争如字亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國将亡必多制數改法數所角反其此之謂乎復書曰若吾子之言復報也僑不才不䏻及子孫吾以救世也既不承命敢忘大恵以見箴戒為恵晉趙鞅荀寅帥師城汝濱趙鞅趙武孫也荀寅中行荀吴之子汝濱晉所取陸渾地濱音賓行戸郎反遂賦晉國一鼓鐡以鑄刑鼎令晉國各出功力共鼓石為鐡計令一鼓而足因軍役而為之故言遂鑄之樹反令力呈反著范宣子所為刑書焉仲尼曰晉其亡乎失其度矣夫晉國将守唐叔之所受法度以經緯其民卿大夫以序守之序位次也民是以䏻尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法僖二十七年文公蒐被廬修唐叔之法被皮義反廬力居反蒐本又作捜所求反以為􅉀主今棄是度也而為刑鼎民在鼎矣何以尊貴棄禮徴書故不尊貴貴何業之有民不奉上則上失業貴賤無序何以為國且夫宣子之刑夷之蒐也晉國之亂制也范宣子所用刑乃夷蒐之法也夷蒐在文六年一蒐而三易中軍帥賈季箕鄭之徒遂作亂故曰亂制帥所類反若之何以為法蔡史墨曰范氏中行氏其亡乎蔡史墨即蔡墨中行寅為下卿而干上今擅作刑器以為國法是法姦也又加范氏焉易之亡也范宣子刑書中既廢矣今復興之是成其咎擅市戰反復扶又反咎其九反其及趙氏趙孟與焉然不得已若徳可以免鑄刑鼎本非趙鞅意不得已而從之若䏻修徳可以免禍為鄭十三年荀寅士吉射入朝歌以叛杜氏通典議曰按虞舜立法曰象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑𤯝災肆赦怙終賊刑欽哉惟刑之恤哉孔安國注曰陳典刑之義敕天下敬之憂不得其中又按周官司寇建三典正月之吉懸扵象魏使萬人觀之浃日而歛漢宣帝患決獄失中置廷尉平時鄭昌上䟽曰聖王立法眀刑者救衰亂之起也不若刪定律令愚人知所避姦吏無所㺯後之論者即云上古議事不為刑辟夫有血氣必有爭心羣居勝物之始三皇無為之代既有君長焉則有刑罰焉其俗至淳其事至簡人犯者至少何必先定刑名所以因事立制叔向之言可矣自五帝以降法教益繁虞舜聖哲之君後賢祖述其道刑章輕重亦以素設周氏三典懸諸象魏皆先防抵䧟令避罪辜是故鄭昌獻䟽盖以後眀其義當子産相鄭在東周衰時王室已卑諸侯力政區區鄭國介扵晉椘法弛民怠政隳俗微觀時之宜設救之術外抗大國内安疲甿仲尼兄事聞死出涕稱之遺愛非盛徳歟又按孔頴逹正義云子産鑄刑書而叔向責之趙鞅鑄刑鼎而仲尼譏之則刑之輕重不可使人知也聖王雖制刑法舉其大綱但共犯一法情有淺深臨至時事議其輕重也孔議附會叔向之書然詳左氏所載夫子之説第令守晉國舊法以為范宣子所為非善政耳非謂聖王制法不可令人知也秦文公二十年法初有三族罪張晏曰父母兄弟妻子如淳曰父族母族妻族武公三年誅三父等而夷三族以其殺出子寧公子三人長武公為太子次徳次出子寕公卒大庶長弗忌威壘三父廢太子而立出子為君後三父等復共殺出子立武公孝公初衛鞅請變法令令民為什伍而相收司連坐不吿姦者腰斬吿姦者與斬敵首同賞不吿姦者與降敵同罰人有二男以上不分異者倍其賦有軍功者各以律受上賞為私鬭者各以輕重被刑事末利及怠而貧者舉以為收孥扵是太子犯法鞅曰法之不行自上犯之太子君嗣不可施刑刑其傅公子䖍黥其師公孫賈令之初作一日臨渭論囚刑七百餘人渭水盡赤又増加肉刑大辟有鑿顛抽脅鑊烹之刑始皇即位遣将成蟜擊趙反死屯留軍吏皆斬及戮其屍已死者戮其尸其後嫪毐作亂敗其徒二十人皆梟首懸首扵竿曰梟車裂殉滅其宗輕者為鬼薪取薪給宗廟為鬼薪律曰鬼薪作三歳始皇兼吞戰國遂毁先王之法滅禮誼之官専任刑罰躬標文墨晝㫁獄夜理書自程決事日縣石之一縣稱也石百二十斤始皇省讀文書日以百二十斤為程而姦邪並生赭衣塞路囹圄成市天下愁怨潰而叛之三十四年謫治獄吏不直及覆獄故失者丞相李斯請燒詩書百家語有敢偶語詩書者棄市以古非今者族吏見知不舉與同罪令下三十日不燒黥為城旦制曰可三十五年始皇以盧生等誹謗使御史􅊖按問諸生傳相吿引乃自除犯禁者四百六十餘人皆阬之咸陽使天下知之以懲後二世即位以趙髙為郎中令更法律令有罪者相坐收族羣臣諸公子有罪令髙治之殺大臣䝉毅等公子十二人戮死於市十公主磔死於杜財物沒入縣官餘相連坐者不可勝數時山東羣盜大起不䏻禁胡亥責李斯斯懼乃阿意以書對曰夫賢主必能行督責術則人不犯故韓子曰慈父有敗子而嚴家無格虜胡亥悦行督責益嚴刑者相半死人成積扵市以殺人多者為忠臣丞相去疾及李斯與将軍馮劫諫胡亥以寇盜並啟皆苦扵轉戌且止阿房作者胡亥曰君不能禁盜又欲罷先帝所為何以在位遂下之吏去疾劫曰将相不辱皆自殺髙因譛李斯子由為三川守與盜通令髙按問斯髙詐為御史十軰徃訊斯斯以實對輙令搒掠斯急上書髙令棄之不奏後胡亥使人驗斯斯懼如前使者乃誣伏遂具斯五刑腰斬咸陽市夷三族文獻通考卷一百六十二
