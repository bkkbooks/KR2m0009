body:
  text: 文獻通考卷二百七十九鄱陽馬端臨貴與著象緯考二二十八宿東方蒼龍七宿宋中興天文志石氏云東宫青帝其精蒼龍為七宿其象有角有亢有氐有房有心有尾有箕氐胸房腹箕所糞也司春司木司東嶽司東方司鱗蟲三百有六十蒼龍為鱗蟲之長角兩星南北正直著中有平道上天田總是黑星兩相連别有一烏名進賢平道右畔獨淵然最上三星周鼎形角下天門左平星雙雙橫于庫樓上庫樓十星屈曲眀樓中柱有十五星三三相著如鼎形其中四星别名衡南門樓外兩星橫角二星十二度為主造化萬物布君之威信謂之天闕其間天門也其內天庭也故黃道經其中七曜之所行也其眀則太平芒動則國不寧日食右角國不寧月食左角天下道斷金火犯有戰敵金守之大將持政左角為天田為理主刑其南為太陽道五星犯之為旱右角為將主兵其北為太隂道五星犯之為水蓋天之三門猶房之四表也左右角間二星曰平道為天子八達之衢眀正則吉動搖則法駕有虞天田主天子畿內封疆金守之主兵火守之主旱水守之主潦平道西一星曰進賢在太微宫東眀則賢者在位暗則在野又曰主卿相主逸才周鼎三星在攝提西國之神器也不見或移徙則運祚不寧天門二黑星在平星北角之南主天之門為朝聘待客之所眀則四方歸化不見則兵革起邪佞生平星二星在庫樓北平天下之法獄廷尉之象也庫樓十星其六大星為庫南四星為樓在角南一曰天庫兵車之府也旁十五星三三而聚者柱也中央四小星衡也主陳兵其占曰庫中星不見兵四合無星則下臣謀上眀而動搖則兵出四方盡不見則國無君庫樓東北二星曰陽門主守隘塞也南門二星在庫樓南天之外門也主守兵眀則遠方入貢暗則夷狄畔客星守之主兵至宋兩朝天文志角二星距南星去極九十七度半庫樓二星距西北星去極一百二十三度入軫十五度半南門二星距西星去極一百三十七度入軫十一度平道二星距東星去極九十一度入角二度天門二星距西星去極一百四度半入軫十六度平星二星距西星去極一百九度半入軫十六度天田二星距西星去極八十二度半入角二度半周鼎三星距東北星去極六十四度半入角宿七度半亢四星恰似彎弓狀大角一星直上眀折威七箇亢下橫大角左右攝提星三三相似如鼎形折威下左頓頑星兩箇斜安黃色精頑西二星號陽門色若頓頑直下存亢四星九度日月之中道主天子內朝天下之禮法也又曰總攝天下奏事聽訟理獄録功者也亦為疏廟主疾疫其星眀大四海歸王輔臣納忠人無疾疫移動多病不見則天下鼎沸而旱潦作矣大角一星在攝提間天王坐也又為天子梁棟金守之則兵起日食主凶亢南七黑星曰折威主斬殺金火守之夷狄犯邉將有棄市者攝提六星直斗柄之南主建時節伺禨祥攝提為盾以夾擁帝坐也主九卿眀大三公恣橫客星入之聖人受制一曰大臣之象頓頑二星在折威東南主考囚察情偽也陽門在庫樓東北主邉塞險阻之地客星出陽門夷狄犯邉宋兩朝天文志亢四星距南第二星去極九十六度攝提六星其右距北大星去極六十七度入亢七度其左距南星去極七十二度半入亢七度太陽門二星距西星去極一百一十三度入角十度折威七星距西第三大星去極一百三度入亢三度大角二星去極六十六度入亢二度半頓頑二星距東南星去極一百一十二度半入亢四度氐四星似斗側量米天乳氐上黑一星世人不識稱無名一箇招搖梗河上梗河橫列三星狀帝席三黑河之西亢池六星近攝提氐下衆星騎官出騎官之衆二十七三三相連十欠一陳車氐下騎官次騎官下三車騎位天輻兩星在陳傍將軍陳裏振威霜氐十六度下二尺為五星日月中道為天子之路寢眀則大臣妃后奉君不失節如不見或移動則臣將謀內禍亂生矣日月食主內亂木犯之立妃后火犯臣僭上金犯拜將水犯百官憂客星犯婚禮不整彗孛犯暴兵起月暈人不安一曰氐為后妃之府休解之房前二星適也後二星妾也將有徭役之事氐先動星眀大則民無勞天乳在氐北主甘露明則潤澤甘露降招搖一星在梗河北次北斗柄端主胡兵芒角變色搖動則兵革大起梗河二星在大角北天子以備不虞其色變動有兵喪帝席三星在大角西北天子燕樂獻夀之所其星不見大人失位亢池六黑星為泛舟楫主迎送移徙則凶騎官二十七星在氐南天子騎士之象星衆則安不見兵起車騎三黑星在氐西騎官之上都車騎之將也金火犯為災動搖車騎行天輻兩黃星在房西主鸞駕客星來守之則輦轂有憂也騎陳將軍一星在騎官東南主騎將也搖動則騎將出宋兩朝天文志氐四星距西南星去極一百四度半亢池六星距北大星去極七十度半入亢三度天乳一星去極九十二度入氐十四度招搖一星去極五十一度入亢四度半梗河三星距大星去極五十九度入氐二度騎官二十七星距西北星去極一百二十度入氐宿初度車騎三星距東南星去極一百四十度入氐二度帝席三星距東星去極六十七度半入氐宿一度半房四星直下主眀堂鍵閉一黃斜向上鈎鈐兩箇近其傍罰有三星直鍵上兩咸夾罰似房狀房下一星號為日從官兩箇日下出房六度為眀堂天子布政之宫也亦四輔也下第四星上將也次次將也次次相也上星上相也南二星君位北二星夫人位又為四表中間為天衢之大道亦謂之天闕黃道之所經也南間曰陽環亦曰陽道其南曰太陽北間曰隂間亦曰隂道其北曰太隂七曜由乎天衢則天下平和由陽道則主旱喪由隂道則主水兵房星亦曰天駟為天馬主車駕南星曰左驂次左服次右服次右驂亦曰天廄又主開閉為蓄藏之所由也房星眀則王者眀驂星大則兵起星離則人流日月食主昏亂權臣橫彗孛犯之兵起下二星為隂五星犯之為水上二星為陽五星犯之為旱房北二小星曰鈎鈐房之鈐鍵天之管籥主閉藏鍵天心也王者孝則鈎鈐眀近房天下同心遠則天下不和王者絶後房鉤鈐間有星及疏拆則地動河清東咸西咸各四星在房星北日月五星之道也為房之户所以防淫泆也眀則吉暗則凶日月五星犯守之有隂謀火守之兵起罰三星在東咸正西南北而列主受金贖罪正而列則法令太平曲而斜行則刑罰不中日一星在房中道前太陽之精主眀德金火犯守之有憂從官二星在積卒西北宋兩朝天文志房四星距南第二星去極一百一十四度半鍵閉一星去極一百八度入房四度罰三星距南星去極一百八度入心一度半東咸四星距西南星去極一百一十一度入心一度日一星去極一百一十三度入氐十四度半從官二星距西星去極一百二十二度入氐十四度西咸四星距西南星去極一百四度半入氐十五度鈎鈐二小星去極一百九度半入房二度半中興天文志甘氏云日一星在房之西氐之東日者陽宗之精也為雞三足為烏二足雞在日中而烏之精為星以司太陽之行度日生于東故于是在焉心三星中央色最深下有積卒共十二三三相聚心下是心六度一名大火天王位也中星曰眀堂為大辰天子之正位也前星為太子不眀則太子不得位後星為庶子眀則庶子繼心上四尺為日月五星之中道中心眀則化成道昌直則地動移徙不見國亡又曰心變黑色大人有憂直則王失勢動則國有憂離則民流金火犯血光不止土木犯及日月食不吉月暈兵起火來守之國無主客星及孛犯天下兵荒積卒十二星在房心西南五營軍士也微而小則吉眀大搖動兵大起一星亡兵出二星亡兵半出三星亡兵出盡他星守之兵大起近臣誅宋兩朝志心三星距西前星去極一百一十四度半積卒十二星距大星去極一百二十六度半入氐宿十五度尾九星如鉤蒼龍尾下頭五點號龜星尾上天江四橫是尾東一箇名傅説傅説東畔一魚子龜西一室是神宫所以列在后妃中尾十九度后妃之府後宫之場也北之一丈為天之中道上第一星后也次三星夫人次則嬪妾第三星傍一星名曰神宫解衣之內室尾亦為九子星色𣣔均眀大小相承則后妃無妬忌後宫有敘多子孫星微細暗后有憂疾疏遠則后失勢動移則君臣不和天下亂就聚則大水木犯之及月暈則后妃死火犯宫中內亂土犯吉水犯之中有事客星犯大臣誅日月食主飢一曰金火守之後宫兵起龜五星在尾南漢中主占定吉凶眀則君臣和不眀則為乖戾亡則赤地千里火守之兵起在外守之兵罷天江四星在尾之北主太隂不𣣔眀眀而動水暴出參差則馬貴其星不具則津河關道不通熒惑守之有立主客星入河津絶傅説一星在尾後河中主後宫女巫祝祀神靈祈禱子孕故曰主王后之內祭祀以求子孫詩云克禋克祀以弗無子此之象也其星眀大王者多子孫小而暗後宫少子動搖則後宫不安星搖則天子無嗣魚一星在尾後河中主隂事知雲雨之期也大眀則隂陽和風雨時暗則魚多亡動搖則大水暴出漢中則大魚多死火守在南則旱在北則水起宋兩朝天文志尾九星去極一百二十七度半龜五星距南第二星去極一百一十四度半入尾宿十度魚一星去極一百二十六度入尾宿十五度半傅説一星去極一百八度半入尾宿十四度中興天文志石氏云傅説者章祝女巫官一名太祝司天王之內祭祀以祈子孫故有太祝以傅説于神宫或讀傅為傅遂謂之殷相説自莊周妄言夾漈鄭氏曰按傅説一星惟主後宫女巫禱祠求子之事謂之傅説者古有傅母有保母傅而説者謂傅母喜之也今之婦人求子皆祀婆神此傅説之義也偶商之傅説與此同音諸子家更不詳審其義則曰傅説騎箕尾而去殊不知箕尾專主後宫之事故有傅説之佐焉按傅説商之良宰輔也而其星則所主者宫中禱祠以祈子孫其事不類故先儒疑之然諸星中所謂軒轅社稷造父奚仲王良皆古人之名也蓋在天為星辰在人為聖賢於理有之今疑其不類而改以為傅説則過矣箕四星形狀如簸箕箕下三星名木杵箕前一黑是粳皮箕十一度亦謂之天津後宫妃后之位上六尺為天之中道箕一曰天雞主八風凡日月宿在箕東壁翼軫者風起又主口舌主客蠻夷胡貊故蠻夷將動先表箕焉星大眀直則五榖熟君無讒間疏暗則無君世亂五穀貴蠻夷不伏內外有差􅈬聚細微天下憂動則蠻夷有使來離徙則人流若移入河國災人相食月暈金火犯之兵起流星犯大臣叛日宿其野風起杵三星在箕南主杵臼之用也縱為豐橫為飢移徙人失業不見人相食客星入杵臼天下有急變粳一星在箕口前杵臼西北眀則為豐暗為飢不見人相食宋兩朝天文志箕四星距西北星去極一百二十一度半杵三星距中心大星去極一百三十八度入箕宿三度粳一星去極一百一十七度入尾宿十七度半北方元武七宿宋中興志石氏云北方黑帝其精元武為七宿斗有龜蛇蟠結之象牛蛇象女龜象虛危室壁皆龜蛇蟠蚪之象司冬司水司北嶽司北方司介蟲三百有六十王奕曰龜不獨介蟲之長也北冬令其氣蟄藏有縮藏之象焉斗六星其狀似北斗魁上建星三相對天辨建上三三九斗下圓安十四星雖然名鱉貫索形天雞建背雙黑星天籥柄前八黃精狗國四方雞下生天淵十星鱉東邉更有兩狗斗魁前農家丈人狗下眠天淵十黃狗色元斗二十五度天廟也亦曰天機五星貫中日月正道為丞相太宰之位酌量政事之宜褒進賢良稟授爵祿又主兵南二星魁天梁也中央二星天相也北二星杓天府廷也亦為夀命之期將有天子之事占于南斗星盛眀君臣一心天下和平爵祿行芒角動搖天子愁兵起移徙其臣逐日月五星逆入斗天下流蕩孛犯之兵起星小暗則廢宰相及死鱉十四星在南斗南鱉為水蟲歸太隂有星守之白衣會主有水火守之旱建六星在斗背亦曰天旗臨于黃道天之都關也建斗之間七曜之道建為謀事為天鼓為天馬南二星天庫也中央二星市也鈇鑕也上二星旗跗也建動搖則人勞月暈之蛟龍見牛馬疫月食五星犯守大臣相譛臣謀主亦為關梁不通有大水天辨九星在建星北入河市官之長也主列肆闤闠若市籍之事以知市珍也星眀則吉彗星犯守之糴貴兵起天雞二星在狗國北主候時也金火守入兵大起天籥八星在斗南北杓西主鎖籥關閉眀吉暗凶狗國四星在建東北主鮮卑烏丸沃沮眀則邊寇作金火犯守外夷有變太白逆守其國亂客星守犯之有大盜其王且來天淵十星在鱉東南一曰天海主溉灌火守之大旱水守之大水一曰主海中魚鱉狗二黑星在斗魁前主吠守防姦回也不居常處為大災農丈人一星在南斗西南老農主稼穡也其占與粳略同宋兩朝志南斗六星距西第三星去極一百一十九度鱉十四星距東大星去極一百三十度入斗五度天辨九星距西大星去極九十九度半入斗宿初度建六星距西星去極一百一十三度入斗宿四度天籥八星距西大星去極一百一十四度半入尾宿十九度狗二星距東大星去極一百一十八度入斗宿十二度天淵十星距中北星去極一百二十九度入斗宿十七度天雞二星距西星去極一百一十度入斗宿十六度半狗國四星距西北星去極一百二十度入斗宿十八度農丈人一星去極一百二十四度半入箕宿六度半牛六星近在河岸頭頭上雖然有兩角腹下從來欠一腳牛下九黑是天田田下三三九坎連牛上直建三河鼓鼓上三星號織女左旗右旗各九星河鼓兩畔左邉眀更有四黃名天桴河鼓直下如連珠羅堰三烏牛東居漸臺四星似口形輦道東足連五丁輦道漸臺在何許欲得見時近織女牛七度天之關梁日月五星之中道主犧牲其北二星一曰即路二曰聚火又曰上一星主道路次二星主關梁次三星主南越甘氏曰上二星主道路次二星主關梁次二星主南夷中一星主牛移動則牛多殃眀大則王道昌其星曲則糴貴又曰星眀大則關梁通牛貴怒則馬貴不眀失常穀不登細則牛賤中星移上下牛多死小星亡則牛多疫月暈損犢金火犯之兵災水土犯之吉天田九星牽牛南太微東主天子畿內之田其占與角之天田同九坎九黑星在天田東主溝渠所以導達泉源流瀉盈溢眀盛則有災夷狄侵邊不眀則吉河鼓三星在牽牛北天鼓也主軍鼓及鈇鉞一曰三武主天子三將軍中央大星為大將軍左星為左將軍右星為右將軍左星南星也所以備關梁設險阻而拒難也眀大光潤將軍吉動搖差度亂兵起直則將有功曲則將失律右旗左旗各九星在河鼓左右皆天之旗鼓也旗星眀潤將軍吉動搖兵起怒則馬貴旗端四星南北列曰天桴鼓桴也星不眀漏刻失時動搖軍鼓用桴鼓相直亦然織女三星在河北天紀東端天女也主果蓏絲綿寶玉也王者至孝神祇咸喜則織女星俱眀天下和平大星怒角布帛貴又曰三星俱明女功善暗而微天下女功廢不見兵起東足四星曰漸臺臨水之臺也主漏刻律吕之事西足五星曰輦道天子嬉逰之道金火守之御路兵起羅堰三星在牽牛東主堤塘壅蓄水潦灌溉田苗大而眀大水泛濫宋兩朝天文志牛六星距中央大星去極一百八度半天田九星距西北星去極一百一十六度半入斗宿二十二度九坎九星距大星去極一百四十一度半入斗宿二十五度左旗九星距西第四大星去極七十三度半入斗宿二十四度天桴四星距大星去極九十四度入斗宿二十四度半羅堰三星距北星去極一百九度入牛宿四度漸臺四星距東南星去極五十八度入斗宿十度輦道五星距西北星去極四十七度半入斗宿十一度半織女三星距大星去極五十二度半入斗宿五度夾漈鄭氏曰按張衡云牽女織女七月七日相見者即此也爾雅云河鼓謂之牽牛又歌曰東飛百勞西飛燕黃姑織女時相見黃姑即河鼓也音訛耳容齋洪氏隨筆曰宋蒼梧王當七夕夜令楊玉夫伺織女渡河曰見當報我不見當殺汝錢希白洞微志載蘇德哥為徐肇祀其先人曰當夜半可已蓋候鬼宿渡河之後翟公巽作祭儀十卷云或祭于昏或祭於旦皆非是當以鬼宿渡河為候而鬼宿渡河常在中夜必使人仰占以候之葉少藴云公巽博學多聞援證皆有據不肯碌碌同衆所見必過人豫按天下經星終古不動鬼宿隨天西行春昏見於南夏晨見於東秋夜半見於東冬昏見於東安有所謂渡河及常在中夜之理織女昏晨與鬼宿正相反其理則同蒼梧王荒悖小兒不足笑錢翟葉三公皆名儒碩學亦不深考如此杜詩云牛女漫愁思秋期猶渡河牛女年年渡何曾風浪生梁劉孝儀詩云欲待黃昏至含嬌淺渡河唐人七夕詩皆有此説此自是牽俗遣詞之過故杜老又有詩云牽牛出河西織女處其東萬古永相望七夕誰見同神光竟難候此事終朦朧蓋自洞曉其實非他人比也女四星如箕主嫁娶十二諸國在下陳先從越國向東論東西兩周次二秦雍州南下雙鴈門代國向西一晉伸韓魏各一皆北輪楚之一國魏西屯楚城南畔獨燕軍燕西一郡是齊鄰齊北兩邑平原君𣣔知鄭在越下存十六黃星細區分五箇離珠女上星敗瓜珠上瓠瓜生兩箇各五瓠瓜眀天津九箇彈弓形兩星入牛河中橫四箇奚仲天津上七箇仲側扶筐星女十一度下九尺為日月中道天之少府也謂之須女者須賤妾之稱婦職之卑者也主婦女之位其星如婦功之式主布帛裁製嫁娶星眀天下豐女功昌小暗則國藏虛移動則婦女受殃産死者多后妃廢日月食國憂木犯立后火犯女喪金犯災土孛犯損蠶月暈婦人災又曰水守之萬物不成火守之