看區分三粒黃金名鈇鉞一顆真珠北落門門東八魁九箇子門西一宿天綱是電傍兩黑土公吏騰蛇室上二十二室十七度亦謂之營室甘氏為太廟天子之宫也石氏謂之元宫一曰清廟又謂軍糧之府及土功事星眀國昌小不眀祠祀鬼神不享國多疾疫動則有土功兵出野離宫六星兩兩居之分布室壁之間天子之别宫也主隱藏休息之所金火守入則兵起室南六星曰雷電主興雷動蟄眀或動則震雷作壁陳十二星在羽林北橫列營室之南羽林之垣壘也星衆而眀則安寧希而動則兵革起不見天下亂五星入天軍皆為兵起金火水尤甚羽林四十五星三三而聚散在營室之南天軍也主軍騎又主翼王也星衆而明則安寧希而動則兵革起不見天下亂金火水守入兵起斧鉞三星亦曰斧鑕在八魁西北主誅夷不眀則斧鑕不用移動則兵起有星入之皆為大臣誅北落師門一星在羽林西南天之蕃落也亦曰天軍蕃之候門長安北門曰北落門以象此也主非常以候兵眀大則軍安微弱則兵起金火守之有兵災一曰有星守之虜入塞北落東南九黑星曰八魁主張禽獸之官也客星入之多盜賊兵起金火入亦然北落西南一星曰天綱主武帳天子遊獵之所會金火守兵起室西南二星曰土功吏主土功之官也動搖則有修築之事隋志土功吏主司過度騰蛇二十二星在營室北若盤蛇之狀居于河濵謂之天蛇星主水蟲微則國安眀則不寧移南大旱移北大水客星守之水雨為災水物不收宋兩朝天文志室二星距南星去極八十度半雷電六星距西南星去極八十七度入危宿十二度壁陳壘十二星距西第一星去極一百十五度入女宿十一度羽林四十五星距大星去極一百一十七度入危宿十五度半斧鉞三星距北星去極一百三十度入室宿二度北落師門一星去極一百二十六度入危宿十一度半八魁九星距南星去極一百三十九度入壁宿四度半天綱一星去極一百二十九度入危宿五度土公二星距西星去極八十五度入壁宿初度騰蛇二十二星距中大星去極四十四度入危宿九度半宋中興天文志曰甘氏云雷電在室南霹靂在雷電南雲雨在霹靂南土工吏在壁西南蓋雷公電姥雲將雨師與夫霹靂斧吏皆北方水府之精而娵訾為天門故其神棲焉室不得司之也壁兩星下頭是霹靂霹靂五星橫著行雲雨次之曰四方壁上天廄十圓黃鈇鑕五星羽林傍壁九度下九尺為天之中道主文章天下圖書之祕府也亦主土功眀則圖書集道術行小人退君子進星失色大小不同天子重武臣賤文士圖書隱親黨回邪用星動則有土功離徙􅈬聚為田宅事日月食損賢臣五星孛犯兵起土功西南五星曰霹靂主興雷奮擊眀而動用事不眀凶霹靂南四星曰雲雨眀則多雨水火守之大旱天廄十星在東壁北蓋天馬之廄今之驛亭也不見則天下道斷鈇鑕五星在天倉西門刈具也主斬芻飼牛馬眀則牛馬肥微暗則牛馬飢餓并死喪也宋兩朝天文志壁二星距南星去極八十度半霹靂五星距西星去極九十三度入危宿十五度雲雨四星距西北星去極九十五度入室宿五度天廄十星距西星去極四十九度半入壁宿初度西方白虎七宿宋中興天文志石氏云西宫白帝其精白虎為七宿奎象白虎婁胃昴虎三子也畢象虎觜參象麟觜首參身也司秋司金司西嶽司西海司西方司毛蟲三百有六十王奕曰蒼龍朱雀靈龜不獨蟲之長也實為王者嘉瑞故列宿象焉白虎奚預也曰白虎亦瑞獸也爾雅謂之甝胡甘反蓋騶虞之異名也不食生物食自死肉其性至仁五靈之一也以五行嫓之蒼龍木也木得其性則蒼龍見朱鳥火也火得其性則朱鳥見靈龜水也水得其性則靈龜見白虎金也金得其性則白虎見與麟鳳龜俱為王者之瑞故西方七宿配焉漢宣帝時南郡獲白虎宋元嘉中琅琊有白虎史臣俱以為瑞而特書之也奎腰細頭尖似破鞋一十六星繞鞋生外屏七烏奎下橫屏下七星天溷眀司空左畔土之精奎上一宿軍南門河中六箇閣道形附路一星道傍眀五箇吐花王良星良星近上一策名奎十六度天之武庫也石氏謂之天豕亦曰封豕主兵九尺下為天之中道又主溝瀆西南大星所謂天豕目亦曰大將明則天下安動則兵亂客星守入兵起金火守有水災隋志云若帝淫佚政不平則奎有角角動則有兵不出年中或有溝瀆之事又曰奎中星眀水大出日月食五星犯皆有凶奎南七星曰外屏以蔽天溷也占與天囷同天溷七星在外屏南天之厠也不見則人不安移徙亦然天溷南一星曰土司空主水土之事大而黃眀天下安若客星入之多土功天下大疫軍南門一星在將軍西南主誰何出入動搖則軍行不見則兵亂閣道六星在王良前飛道也從紫宫至河神所乘也一曰主道里張衡云天子遊别宫之道一曰王良旗一曰紫宫旗亦所以為旌表而不𣣔其搖動一星不具則輦道不通動搖則宫掖之內兵起附路一星在閣道南傍别道也偹閣道之敗復而乘之也一曰太僕主禦風雨亦遊從之義也一曰占與閣道同王良五星在奎北居河中天子奉車御官也其四星曰天駟旁一星曰王良亦曰天馬其星動為䇿馬故曰王良䇿馬車騎滿野亦曰王梁梁為天橋主禦風雨水道故或占津梁其星移主有兵亦曰馬病客星守之橋不通金火守之皆為兵憂前一星曰䇿王良之御䇿也主天子僕御在王良旁若移在馬後是謂車騎滿野宋兩朝天文志奎十六星距西南大星去極七十二度外屏距西星去極八十九度入壁宿八度半天溷七星距西南星去極九十七度入奎宿三度土司空一星去極一百一十五度少入壁宿九度軍南門一星去極六十六度入奎宿十五度附路一星去極三十五度半入奎宿五度王良五星距西星去極三十七度入壁宿初度婁三星不勻近一頭左更右更烏夾婁天倉六箇婁下頭天庾三星倉東腳婁上十二將軍侯婁十二度下九尺為日月中道亦為天獄主苑牧犧牲供給郊祀亦為興兵聚衆動搖則聚衆星直則有執主之命者􅈬聚國不安金火守之則宫苑之內兵起日月食宫內亂金木火土犯凶水犯吉孛起兵月暈兩軍各退左更五星在婁東山虞也主知山澤林藪之事亦主仁智右更五星在婁西牧師也主官養牧牛馬亦主禮義金火守之山澤有兵其占兩更同兩更者秦爵名天倉六星在婁南倉榖所藏也星黃而大嵗熟西南四星曰天庾積厨粟之所也天將軍十二星在婁北主武兵中央大星天之大將也外小星吏士也大將星搖兵起大將出小星不具兵起宋兩朝天文志婁三星距中星去極七十五度半左更五星距西南星去極七十六度半入婁宿四度半右更五星距東北星去極七十五度入奎宿十四度天倉六星距西北星去極一百四度半入奎宿十一度天庾三星距中大星去極一百二十五度半入婁宿五度天大將軍十二星距大星去極六十度半入婁宿四度胃三星鼎足河之次天廪胃下斜四星天囷十三如乙形河中八星名大陵陵北九箇天船名陵中積尸一箇星積水船中一黑星胃十五度天之厨藏五穀之倉也又名大梁眀則四時和平天下晏然倉廩實不眀則上下失位星少則少穀輸運又云動則有輸運事􅈬聚則穀貴人流暗則凶荒五星犯日月食孛侵並有災天廪四星在昴南一曰天廥張衡云主積蓄黍稷以供享祀春秋所謂御廩也天囷十三星在胃南倉廪之屬主給御糧也眀而黃則嵗豐微變常色則不吉金火守之即災起大陵八星在胃北主陵墓眀而大或中星多則天下多死喪或兵起天船九星在大陵之北居河中一曰舟星主渡亦主水旱不在河中津河不通水泛溢中四星𣣔其均眀即天下安不則兵若喪移徙亦然客彗出入為大水有兵大陵中一星曰積尸眀則死人如山張衡云一名積廪積尸明而大或有傍星多則天下足死喪或兵起若不見而暗皆吉火守則天下大哭泣天船中一星曰積水主候水災宋兩朝天文志胃三星距西南星去極六十七度半天廪四星距南星去極八十五度半入胃宿十二度天囷十三星距大星去極九十一度半入胃宿六度半大陵八星距大星去極五十四度入胃宿七度天船九星距大星去極五十四度半入胃宿十度積尸一星去極五十五度入胃宿四度積水一星去極五十三度入昴宿初度昴七星一聚實不少河西月東各一星月下五黃天隂名隂下六烏芻藁營營南十六天苑形河裏六星名卷舌舌中黑點天讒星礪石舌傍斜四丁昴十一度下為日月中道天之耳目也主西方主獄事又為旄頭胡星也又主喪甘氏云主口舌奏對若眀大則君無佞臣天下安和暗小則佞者被誅搖動則信讒殺忠良張衡云昴明則獄訟平暗則刑罰濫六星與大星等大水有白衣會七星黃兵大起動搖有大臣下獄大而盡動若跳躍者胡兵大起一星不見皆憂兵之象也天河一星在胃東月一星在昴東皆黑星並主女人災福又曰天河主察山林妖變天隂五星在畢柄西主從天子弋獵之臣預隂謀也不明則禁言漏泄天苑十六星在昴畢南如環狀天子之苑囿養禽獸之所也主馬牛羊明則馬牛羊盈希則死芻藁六星在苑西以供牛馬之食也一曰天積天子之藏府也星盛則嵗豐穰希則貨財散張衡云不見則牛暴死火守之則火災起卷舌六星在昴北天讒之外主口語以知讒佞張衡云主樞機曲而靜則賢人用直而動則讒人得志卷舌移出漢則天下多妄言旁星繁則死人如邱山天讒一星在卷舌中主醫巫占與從官同礪石四星在五車北主磨礪鋒刃明則兵起如常則吉金火及客星守之兵動宋兩朝天文志昴七星距西南星去極七十度天河一星去極六十六度入胃宿十度月一星去極七十一度半入昴宿五度天隂五星距西星去極七十五度半入胃宿七度天苑十六星距東北星去極一百七度半入昴宿七度半芻藁六星距西行中星去極一百八度入婁宿十一度卷舌六星去極五十三度入昴宿初度天讒一星去極六十一度半入昴宿半度礪石四星距南第二星去極六十五度入昴宿六度宋中興天文志月與天街皆在昴畢間故昴畢之間為天街黃道之所經也月者隂宗之精也為兔四足為蟾蜍三足兔在月中而蟾蜍之精為星以司太陰之行度月生于西故于是在焉日精在氐房月精在昴畢自司其行度而氐房昴畢乃黃道之所經不得而司之畢恰似瓜義八星出附耳畢股一星光天街兩星畢背傍天節耳下八烏幢畢上橫列六諸王王下四皂天高星節下團圓九州城畢口斜對五車口車有三柱任縱橫車中五箇天潢精潢畔咸池三黑星天關一星車腳邊參旗九箇參車間旗下直建九斿連斿下十三烏天園九斿天園參腳邊畢十七度主邉兵主弋獵其大星曰天髙一曰邉將主四夷之尉也星眀大則遠夷來貢天下安失色則邉兵亂一星亡為兵喪動搖邉城兵起有讒臣離徙天下獄亂􅈬聚法令酷甘氏云畢主街巷隂雨天之雨師也故眀而移動則霖潦及街壅塞眀而定則天下安張衡云畢為天馬一曰日月食邉兵凶將衰木犯有軍功昴畢間二星曰天街三光之道也主伺候關梁張衡云主國界也街南為華夏街北為夷狄金火守之胡夷兵起眀王道正暗兵起附耳一星在畢下天高東南隅主聽得失伺愆邪察不祥星盛則中國微有盜賊邉候警外國反鬭兵連年合移動則佞讒行兵大起邉尤甚入畢兵起天節八星在畢南主使臣之所持也宣威德于四方眀吉暗凶諸王六星在五車南天漢之中主宗社蕃屏王室也眀則諸侯奉上天下安不見宗社傾危四方兵起天高四星在參旗西北近畢此臺榭之髙主遠望氣象不見則官失其守隂陽不和五車五星三柱九星共十四星在畢東北五車主天子五兵張衡云天子兵車舍也西北曰天庫主太白秦也次東北星曰天獄主辰星燕趙也次東南星曰天倉主嵗星衛魯也中央星曰司空主鎮星楚也次西南星曰卿星主熒惑魏也五星有變各以其所主而占之三柱一曰三泉一曰休一曰旗五星均眀柱皆具即人倉廩實不具其國絶食兵且起五車三柱有變各以其國占之三柱出外兵出柱入兵入柱出一月米貴三倍期一年出兩月米貴六倍期二年出三月米貴十倍期三年柱出不與天倉相近米穀運出千里柱倒立尤甚火入守天下旱金入守兵起水入月暈不爾則有赦天潢五星在五車中主河梁濟渡之處也不見則河梁不通咸池三星在五車中天潢南魚囿也金火犯之則有大災隋志云月五星入天潢兵起道不通天下亂易政咸池眀有龍墜死虎狼害人兵起天關一星在五車南畢西北亦曰天門日月五星所行之道也主邉塞事主關閉芒角有兵五星守之貴人多死移徙若與五車合大將軍披甲參旗九星在參西五車之間天旗也眀而希則邉寇不動不然反是隋志參旗一曰天旗一曰天弓主司弓弩之張候變禦難玉井西南九星曰九斿天子之旗也主邉軍進退金火守之兵亂起天苑之南十三星曰天園植果菜之所也曲而鈎則果菜熟不然則否宋兩朝天文志畢八星距右股第一星去極七十五度天街二星距南星去極七十一度入昴宿十度附耳一星去極七十七度畢宿三度天節八星距北星去極八十度半入畢宿三度諸王六星距西星去極七十度入畢宿三度天高四星距東星去極七十四度半入畢宿六度五車五星三柱九星距大星去極四十七度半入畢宿八度半天潢三星距西北星去極五十八度入畢宿十一度咸池三星距南星去極五十一度入畢宿十一度半天關一星去極七十一度半入觜宿初度參旗九星距南第一大星去極八十七度入畢宿六度九斿九星距南星去極一百一十三度入畢宿十二度天園十三星距東北星去極一百二十四度入畢宿五度觜三星相近作參蕊觜上坐旗直指天尊卑之位九相連司怪曲立坐旗邉四鴉大近井鉞前觜一度在參之右角如鼎足形主天之關眀大則天下安五穀熟移動則君臣失位天下旱隋志云觜觽為三軍之候行軍之藏府主葆旅收斂萬物眀則軍儲盈將得勢動而眀盜賊羣行葆旅起動移將有逐者張衡云葆旅野生之可食者金火來守國易政兵起災生日食臣不忠月食君害臣五星犯災生孛客星犯兵起坐旗九星在司怪西北主别君臣尊卑之位明則國有禮暗則反是司怪四星在井鉞前候天地日月星辰禽獸蟲蛇草木之變與天高占同宋兩朝天文志觜三星距西南星去極八十二度半坐旗九星距南星去極六十一度半入參宿八度司怪四星距西星去極七十一度入參宿六度半參總有七星觜相侵兩肩雙足三為心伐有三星足裏深玉井四星右足隂屏星兩扇井南襟軍井四星屏上吟左足下四天厠臨厠下一物天屎沉參十度上為五星日月中道甘氏曰參為忠良孝謹之子眀大則臣忠子孝安吉移動殺忠臣一曰參伐一曰大辰一曰天市一曰鈇鉞主斬刈又為天獄主殺伐又主權衡所以平理也又主邉城為九譯故不𣣔其動也參白獸之體其中三星橫列三將也東北曰左肩主左將西北曰右肩主右將東南曰左足主後將軍西南曰右足主偏將軍故黃帝占參應七將中央三小星曰伐天之都尉也主胡鮮卑戎狄之國故不欲眀又曰七將皆眀天下兵精也王道缺則芒角張伐星眀與參等大臣謀亂兵起參星失色軍散敗芒角動搖邉候有急天下兵起又曰有斬伐之事參左足入玉井中兵大起秦地大水若有喪山石為怪參足若突出玉井則虎狼暴害星差戾王臣二金火來守則國易政兵起災生日月食則田荒米貴五星犯災甚玉井四星在參西右下水象也屏二星在玉井南屏為屏風客星入之四足蟲大疾人亦多死不見則國內寢疾玉井東西四星曰軍井行軍之井也軍井未達將不言渴名取此也又曰主軍營之事天厠四星在屏東溷也主天下疾病黃吉青赤白皆凶不見與屏同天屎一星在厠南色黃則吉他色皆凶兩朝天文志參十星距中星西第一星去極九十二度半玉井四星距西北星去極九十八度少入畢宿十一度半天屏二星距南星去極一百一十五度入畢宿十三度半軍井四星距西南星去極一百五度半入畢宿十四度天厠四星距西北星去極一百一十度半入參宿二度屎一星去極一百一十五度入參宿三度半南方朱鳥七宿中興天文志石氏云南宫赤帝其精朱鳥為七宿井首鬼目柳喙星頸張嗉翼翮軫尾司夏司火司南嶽司南海司南方司羽蟲三百有六十王奕曰朱鳥其以羽蟲之長稱歟而曰鶉首鶉火鶉尾何也師曠禽經鶉鳳也青鳳謂之鶡赤鳳謂之鶉白鳳謂之鷫紫鳳謂之鷟蓋鳳生于丹穴鶉又鳳之赤者故南方七宿取象焉考之月令春其蟲鱗龍鱗之長故東方之宿為蒼龍秋其蟲毛虎毛蟲之長故西方之宿為白虎冬其蟲介龜介蟲之長故北方之宿為元武夏其蟲羽鳳羽蟲之長故南方之宿為朱鳥吳興沈氏以朱鳥為丹鶉豈知四獸皆蟲之長也鶉之微何預井八星行列河中淨一星名鉞井邉安兩河各三南北正天樽三星井上頭樽上橫列五諸侯侯上北河西積水欲覓積薪東畔是鉞下四星名水府水位東邉四星序四瀆橫列南河裏南河下頭是軍市軍市團圓十三星中有一箇野雞精孫子丈人市下列各立兩星從東説闕丘三箇南河東丘下一狼光蓬茸左畔九箇彎弧弓一矢擬射頑狼胸有箇老人南極中春秋出來夀無窮井三十四度甘氏云井八星在河中主泉水日月五星貫之為中道石氏謂之東井亦曰天井主諸侯帝戚三公之位故眀大則封侯建國搖動失色則誅侯戚廢戮三公帝師受殃矣張衡云天之南門也黃道所經為天子之亭候主水衡事法令所取平也王者用法平則井眀而端列鉞一星附井之前主伺奢淫而斬之故不𣣔其眀大與井齊或搖動則天子用鉞于大臣月宿井有風雨之應又曰井為天子府暗芒并日月食五星逆犯大臣謀亂兵起中有六星不欲大眀眀即水災南北兩河各三星分夾東井一曰天高天之闕門主關梁河南曰南戍一曰南宫一曰陽門一曰越門一曰權星主火北河曰北戍一曰北宫一曰隂門一曰胡門一曰衡星主水兩戍之間三光之常道也河戍動搖中國兵起天樽三星在五諸侯南主盛饘粥以給酒食之正也張衡云以給貧餒明則豐暗則荒或言暗吉五諸侯五星在東井東北近北河主刺舉戒不虞又曰治陰陽察得失亦曰主帝心一曰帝師二曰帝友三曰三公四曰博士五曰太史又曰五曰大夫此五者常為帝定疑議星眀大潤澤則天下大治芒角則禍在中張衡又曰五諸侯治陰陽察得失眀而潤大小齊等則國之福又曰赤則豐暗則荒積水一星在河北所以供酒用也不見為災又曰主候水災積薪一星在積水東以偹庖厨之用眀則人主康火守之大旱水府四星在東井西南水官也占與水位同水位四星在東井主水衡又主瀉溢流也故巫咸氏贊曰水位四星㵼溢流移動近北河則國沒為江河若水火及客星守犯之百川盈溢四瀆四星在井南軒轅東是江河淮濟之積精也眀大則水泛溢軍市十三星如錢狀在參東南天軍貨易之市客星及金火守之軍大飢野雞一星在軍市中主變怪也以芒角動搖為兵災移出則諸侯兵起軍市西南二星曰丈人丈人東二星曰子子東二星曰孫丈人主夀考之臣不見人臣不得通子與孫皆侍丈人之側相扶而居不見為災守常無咎闕邱三星在南河東主象魏天子之雙闕諸侯之兩觀也金火守之兵戰闕下狼一星在井東南為野將主殺掠色有常不𣣔變動角而變色動搖盜賊作胡兵起人相食􅏥則人主不靜不居其宫馳騁天下張衡云居非其處則人相食色黃白而眀吉黑凶赤芒角兵起金火守之亦然弧矢九星在狼東南天弓也以備盜賊嘗向狼弧矢動搖不如常者多盜賊眀則兵大起狼弧張害及胡天下乖亂又曰天弓張天下盡兵主與臣相謀張衡云滿則天下兵起老人一星在弧南一曰南極常以秋分之旦見于丙春分之夕沒于丁常以秋分候之南郊眀大則人主有夀天下安寧不見則人主憂兩朝天文志井八星距西扇北第一星去極六十九度鉞一星去極六十九度少入參宿八度半北河三星距東大星去極六十一度半入井宿二十度南河三星距東大星去極八十三度半入井宿二十一度天樽三星距西星去極六十八度入井宿十六度五諸侯五星距西星去極五十六度半入井宿六度半積水一星去極五十四度半入井宿十八度積薪一星去極六十五度半入井宿二十七度水府四星距西星去極七十六度半入參宿七度半水位四星距西星去極七十三度半入井宿十八度四瀆四星距西南星去極八十六度入井宿二度軍市十三星距西北星去極一百七度半入井宿初度野雞一星去極一百九度半入井宿四度半丈人二星距西星去極一百二十八度入參宿四度子二星距西星去極一百二十八度入參宿九度孫二星距西星去極一百二十五度入井宿六度闕邱二星距大星去極九十一度少入井宿十五度狼一星去極一百七度半入井宿十度弧矢九星去極一百一十四度入井宿十五度老人一星去極一百四十三度入井宿三度宋中興天文志南極老人在弧矢南司天下人民夀算蓋北極在丑艮故南極在未坤南極入地三十六度不可得而見也故其精神出地以見乎南謂之南極老人然其出地亦不甚遠故隱見不常見則為祥其勢位等威蓋與中斗相埓以輔上帝故雖在井分井不得而司之也鬼四星册方似木匱中央白者積尸氣鬼上四星是爟位天狗七星鬼下是外厨六間栁星次天社六箇弧東倚社東一星是天紀輿鬼二度為日月五星之中道主死亡疾病張衡云主祠事天日也又主視明察姦謀東北星主積馬東南星主積兵西南星主積布帛西北星主積金玉隨其變占之中央一星名積尸亦曰積尸氣者但見氣而已主死喪祠祀一曰鈇質主誅斬鬼星眀六穀成不眀人散動而光上賦斂重徭役多星徙人愁政令急鬼質𣣔其忽忽不眀則安眀則兵起大臣謀主下流亡甘氏云積尸搖動失色則疾病鬼哭人荒軒轅西四星曰爟亦曰烽爟主烽火􅊀警急占以不眀安靜眀大甚則邉亭警急搖動芒角亦然又曰眀吉暗凶天狗七星在鬼西南狼之北橫河中以守賊也移徙則兵起金火守之人相食外厨六星在栁南天子之外厨也占與天厨同弧南六星為天社在老人東南似栁直眀則吉隋志云共工之子勾龍能平水土故祀以配社其精為星外厨之南一星曰天紀主知禽獸齒嵗金火守之禽獸多死兩朝天文志鬼四星距西南星去極六十九度半爟四星距西北星去極六十度半入井宿二十九度天狗七星距西星去極一百二度入井宿二十二度外厨六星距大星去極九十二度半入鬼宿二度天社六星距西南星去極一百三十四度入井宿十二度天紀一星去極一百一度半入柳宿五度栁八星曲頭垂似栁近上三星號為酒享宴大酺五星守栁十四度上為天之中道甘氏云主飲食倉庫酒醋之位眀大則人豐酒食搖動則大人酒死失色則天下不安飢饉流于道路不過三年必應張衡云栁為朱雀之嗉天之厨宰也主尚食和滋味隋志云又主雷雨一曰天相一曰天庫一曰注又主木功星眀大臣重慎國安厨食具注舉首王命興輔佐出星直天下謀伐其主􅈬聚兵鬭國門酒旗三星在軒轅右角之南酒官之旗也主宴享飲食五星守酒旗天下大酺有酒肉財物之賜及爵宗室兩朝天文志栁八星距西第三星去極八十二度半酒旗三星距西北星去極七十七度入柳宿十四度星七星如鉤栁下生星上十七軒轅形軒轅東頭四內平平下三箇名天相相下稷星橫五靈七星七度甘氏云主后妃御女之位亦為賢士失色芒動則后妃死賢士誅眀大則道化成國盛張衡云七星為朱鳥之頸一名天都主衣裳文繡隋志云主急兵守盜賊故欲眀眀則主道昌暗則賢良不處天下空天子疾動則兵起離則易政日食兵飢婦人災木犯人安火犯旱金土水犯俱災月暈孛犯兵起軒轅十七星在七星北黃帝之神黃龍之體也后妃之主士女職也一曰東陵一曰權星主雷雨之神南大星女主也次北一星夫人也屏也上將也次北一星妃也次將也其次諸星皆次妃之屬也女主南小星女御也左一星少民少后宗也右一星大民太后宗也𣣔其色黃小而眀也張衡云軒轅如龍之體主雷雨之神後宫之象焉陰陽交合盛為雷激為電和為雨怒為風亂為霧凝為霜散為露聚為雲立為虹霓離為背矞分為抱珥此乃十四變皆軒轅主之其星𣣔小而黃眀則吉移徙則國人流逆東西角張而振后敗水火金守之女主惡也漢注曰軒轅為權太微為衡月五星守犯者如衡占內平四星在中台南爟之北平罪之官也眀則刑罰平暗則否酒旗南三星曰天相丞相之象也其占與相星略同稷五星在七星之南主農正也取乎百穀之長以為其號眀大則嵗大豐不眀則儉不見則人相食兩朝天文志星七星距大星去極九十六度軒轅十七星距大星去極七十五度入張宿二度內平四星距西星去極五十二度入張宿六度天相三星距北星去極九十五度入星宿六度天稷五星距大星去極一百三十七度入栁宿十三度中興天文志石氏云中宫黃帝其精黃龍為軒轅首枕星張尾挂栁井體映三台司四季司中嶽司中土司黃河江漢淮濟之水司黃帝之子孫司倮蟲三百六十按張衡靈憲蒼龍連蜷于左白虎猛據于右朱雀奮翼于前靈龜圈脊于後黃龍軒轅于中則是軒轅一星與蒼龍白虎朱雀元武四獸為五矣世之言星者惟知四獸而不知黃龍是求之未盡也孟康曰軒轅為權太微為衡以軒轅一曰權星故為權太微垣主理法平詞如衡之平故曰衡史記正義謂權四星在軒轅尾西非也軒轅西四曰爟星主烽火偹警急不曰權也爟字從火誤為權字張守節不審指以釋此殊為踈繆又曰或謂自有乾象便有此星軒轅果黃帝之神也有黃帝而後有之乎吕氏曰軒轅之星黃龍也兩角有軒轅之象故名之曰軒轅軒轅降神而生黃帝知之故自號曰軒轅云爾號軒轅非名也且如王良奚仲造父皆星名亦其神降而為人人去而復為星也何獨于軒轅疑之按軒轅本天市垣之星而在張宿之分野則南方朱鳥七宿之所司也三垣中外官諸星雖所掌有小大其位有尊卑而未有不𨽻于二十八宿者蓋二十八宿分布周天之躔度分野不可外也中興天文志據石氏星書以黃龍軒轅配四方二十八宿所謂青龍朱鳥元武白虎者分而為五而以為土德寄王鶉火夫五行之不可缺土土之寄王固然矣遂以為爟積水積薪五諸侯天樽闕邱北河南河四瀆水位諸星皆為軒轅之屬按爟以下諸星與軒轅亦俱寄躔于二十八宿者也今𣣔尊軒轅而以諸星屬之則軒轅豈能外二十八宿而自為躔度分野以處諸星乎張六星似軫在星傍張下只是有天廟十四之星册四方長垣少微雖向上星數欹在太微傍天尊一星直上黃張十七度甘氏云主天廟眀堂御史之位上為天之中道若眀大國則盛強失色宗廟不安眀堂宫廢隋志云主珍寶宗廟所用及衣服又主天厨飲食賞賚之事星眀則王者行五禮得天之中動則賞賚離徙天下有逆人􅈬聚有兵金火守之有兵起或云主貢物色細無光王者少子孫日食虧修禮也月食大潦魚行人道火孛犯兵起土水犯國不寧張南十四星曰天廟天子祖廟也客星守之祠官有憂其占與虛梁同長垣四星在少微南主界域及胡夷火守之胡人入中國太白入之九卿謀反少微四星在太微西南北列士大夫之位也一名處士亦天子副主或曰博士官一曰主衛掖門南第一星為處士第二星為議士第三星為隱士第四星為大夫眀大而黃則賢士舉月五星犯守之處士女主憂宰相易兩朝天文志張六星距西第二星去極一百二度半天廟十四星距西北星去極一百十三度半入栁宿十三度長垣四星距南星去極七十六度入張宿十四度少微四星距東南大星去極六十五度半入張宿十五度半翼二十二星大難識上五下五橫著行中心六箇恰似張更有六星在何處三三相連張畔附必若不能分處所更請向前看記取五箇黑星翼下頭欲知名字是東甌翼十九度甘氏云主太微三公化道文籍失色則民流日月交食五星並逆芒動則化道不行文籍壞滅動移則三公廢眀大則化成隋志云翼為天之樂府主俳倡戲樂又主夷狄遠客負海之賔眀大則禮樂興四夷來賔動則蠻夷使來離徙則天子舉兵或云眀則禮樂興暗則政教失日食臣僣月食婦人憂五星孛流客犯大凶東甌五星在翼之南蠻夷星也張衡云主東越穿胸越三夷金火守之其地有兵芒角動移兵內叛兩朝天文志翼二十二星距中央西第二星去極百四度東甌五星距西南星去極一百二十九度入張宿七度軫四星似張翼相近中央一箇長沙子左轄右轄附兩星軍門兩黃近翼是門下四箇土司空門東七烏青邱子青邱之下名器府器府之星三十二以上便為太微宫黃道向二看取是軫十七度甘氏云軫七星主將軍樂府歌歡之事五星犯之失位亡國女子主政人失業賊黨掠人禍生于百日內若眀大則天下昌萬民康四海歸王張衡云軫為冢宰輔臣也主車騎眀大則車騎用一云眀大則車騎用一云明大則車騎動隋志云主載任有軍出入皆占于軫又主死喪眀則車駕備動則車騎用離徙天子憂􅈬聚兵大起軫轄星附軫兩傍主王侯右轄為王者同姓左轄為異姓星眀兵大起逺軫凶軫轄舉南蠻侵張衡云轄不見國有大憂長沙一星在軫之中主夀命也長沙眀則人壽長子孫盛軍門二黃星在青邱西天子六軍之門也主營候豹尾威旗占以移其處為道不通土司空四黃星在軍門南主土功巫咸氏云金火犯之天下田不得耕女不得織隋志云一曰司徒主界域青邱七黑星在軫東南主東方三韓之國占與東甌同軫南三十二星曰器府主樂器之屬也明則樂器調理暗則有咎兩朝天文志軫四星距西北星去極一百三度半右轄星去極一百一十度半入翼宿十六度半左轄星去極一百一度半入軫宿五度軍門二星距西南星去極一百一十二度半入翼宿十三度土司空四星距南星去極一百二十度入翼宿十四度青邱七星距西北星去極一百二十四度半入軫宿五度器府三十二星距西北星去極一百三十七度半入翼宿八度半中興天文志總論曰甘石巫咸三家後代所宗也顧或不深考以故三垣大角之列衛二十八舍內官外官之分𨽻不無異同今于三家參諸説考定二百九十座所以不知者闕如也蓋諸星有以一星為一座者有以二三十星為一座者有相為比附者有相比而不附者杠附華蓋凡十八星為一座衡附庫樓凡二十九星為一座也鉞不附井耳不附畢粳不附箕長沙不附軫鈎鈐鍵閉不附房則以屬吏自為官故也矢得以附弧臼不得以附杵以弧矢一人司之杵臼二人司之故也野雞不附軍市雞自守其所司也南門不附庫樓南門不但為庫樓門也他如積水不附天船積尸不附大陵天讒不附卷舌咸池天潢三淵不附五車石氏甘氏皆有其辨不可臆説也若夫稱名取類傳記錯見則又有不可概舉者北極為北辰水星為辰參為大辰而大火亦曰大辰宋大辰之墟是也見左氏昭十七年孫炎曰龍星眀者以為時刻故曰大辰心在中最眀時刻主焉元枵亦曰天黿星在天黿是也見國語武王伐商星在天黿昭十九年疏天黿元枵别名也娵訾亦曰豕韋嵗在豕韋是也見襄十八年疏豕韋亦名娵訾也鶉尾亦曰鳥帑以害鳥帑是也見襄二十八年裨竈曰嵗棄其次而旅于眀年之次以害鳥帑注南為朱鳥鳥尾曰帑疏曰人妻子為帑鳥尾曰帑妻子為人後鳥尾亦鳥之後故俱以帑為言也氐謂之天根見爾雅天根氐也郭璞曰角亢下繫于氐猶木之有根國語曰天根見而水涸也室謂之定見爾雅云營室謂之定郭璞曰定正也作宫室以營室中為正詩定之方中作于楚宫昴謂之留見史記索隱曰留昴也而毛傳亦以留為昴也畢謂之濁見爾雅濁謂之畢也栁謂之咮丁救反見襄九年咮為鶉火疏曰栁謂之咮咮鳥口也若斯名類昉于堯典詳于爾雅左氏國語諸書而所入之度則未悉也若夫二十八舍諸言度分亦或差殊斗井度視諸舍為濶參僅一度古昏旦至觀弧建為定亦由所見而莫著其度近丗王奕所述十二次二十八度有可考焉按史志言三家所考三垣大角之列衛二十八舍內外官之分𨽻不無異同今按厯代天文志惟宋兩朝及中興志與隋丹元子步天歌能言諸星之分𨽻然大角一星兩朝志以為屬亢中興志以為屬角庫樓十星丹元子以為屬角而兩朝志以為屬軫其為異同大概若此蓋自唐開元中一行所造渾儀其所測宿度已與舊經異而宋太平興國中渾儀所測又與唐異所爭或一二度或三五度以管窺天豈能無誤于是此以為軫彼以為角甲以為氐乙以為房所差者常在裨鄰之次舍則亦不過三五度間耳天道幽遠術家各持一説固未有以訂其是非也至如南斗六星即斗牛之斗則其分野反在北方北斗天樞在張宿十度則其分野反在南方則其理有不可究詰者當俟知星者而質之二十八宿度中興天文志王奕按自古言天者皆曰周天三百六十五度四分度之一何從而知審也曰天本無度因日之行一晝夜所躔濶狹強名曰度蓋日之行也三百六十五日之外又行四分日之一以一年而周于天焉以一日所行為一度故分為三百六十五度四分度之一范蔚宗謂日之所行在天成度在歷成日是也曰天固有其度而二十八宿亦各有度何從而定之一也曰二十八宿亦未始有度也天體沖漠雖分為三百六十五度然其度難别也故作歷者𨽻其度于二十八宿用以紀日月所躔而已蓋天之有度也猶地之有里也二十八宿所分之度猶九州列縣所占之里也二十八宿各有其度則日之行于天也孟春在某星幾度仲春在某星幾度日躔可得而名也九州列縣各有其里則人之行于地也某日至某州幾里某日至某縣幾里驛可得而計也此星度所由起也曰二十八宿之度或濶狹何也曰日之所躔偶與此宿相當此濶狹于是分也故説渾天者曰日之所躔或多或寡適當其星者凡二十八故度之多寡于是生焉井斗之舍非無星也然不與日躔相當故其度不得不濶觜鬼之傍非無星也然日躔一二日而其星適與相當故其度不得不狹也夫其得度濶狹非舉一宿全體盡占此度也南斗六星也舉全體言之合距杓星為度而今歷家距魁第四星為度杓二星則入于箕牽牛六星也舉全體言之合距西二星為度今歷家距中二星為度而西二星則入于斗虛二星也舉全體言之合距北星為度而今歷家距南星為度北星則入于牽牛蓋南斗六星之中杓二星不當日之度而魁第四星當度故距于魁而得二十六度牽牛六星之中西星不當日之度而中二星當度故牽牛距魁而得六度虛二星之中北一星不當日之度而南一星當度故虛距南星而得十度古之造歷假設是法以步日躔或者不察謂二十八宿夲有其度又見某宿得幾度遂謂舉一宿全體在焉則又非矣又按唐志一行所謂虛北星舊圖入虛今測在須女九度危北星舊圖入危今測在虛六度半又奎誤距以西大星故壁損二度奎增二度今復距西南大星即奎壁各得夲度又栁誤距以第四星今復用第三星張中央四星為朱鳥嗉外二星為翼北距以翼而不距以膺故張增二度半七星減二度半今復以膺為距則七星張合得半度吳興沈氏曰二十八宿為二十八星當度故立以為宿前丗測候每或改變如唐書測得畢有十七度半觜只有半度之類皆繆説也星既不當度自不當為宿次自是渾儀度距踈密不等耳凡二十八宿度數皆以赤道為法推黃道有不合度者蓋黃道有斜有直故度數與赤道不等即復以當度星為宿惟虛度未有竒數自是日之餘分厯家取于斗分者此也餘宿則不然沈氏筆談曰豫編校昭文書時預詳定渾天儀官長問豫二十八宿多者三十三度少者止一度如此不均何也豫對曰天事夲無度推厯者無以寓其數乃以日所行分天為三百六十五度有竒日平行三百六十五日有餘而一期天故以一日為一度也既分之必有物記之然後可窺而數于是以當度之星記之循黃道日之所行一期當者止二十八宿星而已度如傘橑當度謂正當傘橑上者故車蓋二十八弓以象二十八宿則如渾儀秦儀所謂度不可見可見者星也日月五星之所由有星焉當度之晝者凡二十有八謂之舍舍所以挈度所以生數也今所謂距度星者是也非不𣣔均也黃道所由當度之星止有此而已按中興志所載王奕之説即沈括之説也王沈二公不知其孰先孰後孰倡孰襲然王説詳而眀沈説簡而當故不嫌並著之云文獻通考卷二百七十九
