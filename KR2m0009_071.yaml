body:
  text: 文獻通考卷七十一鄱陽馬端臨貴與著郊社考四郊梁太祖開平二年十一月自東京赴洛都行郊天禮自石橋備儀仗至郊壇三年正月以河南尹張宗奭為南郊大禮使故事皆以宰相為之今用河南尹充非常例也周太祖廣順三年九月太常禮院奏準敕定郊廟制度洛陽郊壇在城南七里丙巳之地圜丘四成各髙八尺一寸下廣二十丈再成廣十五丈三成廣十丈四成廣五丈十有二陛每節十二等燎壇在泰壇之丙地方一丈髙一丈二尺開上南出戶方六尺請下所司修奉從之時周太祖將拜南郊故修奉之梁太祖南郊二開平三年正月二十四日其年十一月二日後唐莊宗南郊一同光二年二月一日明宗南郊一長興元年二月二十一日周太祖南郊一顯德元年正月一日宋初因唐舊制每歲冬至圜丘正月上辛祈穀孟夏雩祀季秋大享凡四祭昊天上帝親祀則并皇地祇位作壇於國城之南薰門外依古制四成十二陛三壝設燎壇於內壇之外丙地髙一丈二尺又設皇帝更衣大次於壇外東壝東門之內道北南向太祖皇帝乾德元年十一月甲子親郊奉宣祖配大赦改元先是詔以冬至有事南郊有司言冬至乃十一月晦前一日皇帝始郊不應近晦乃改用十六日甲子太常博士和峴言祭不欲數今十一月十六日親祀南郊請權停二十七日南至之祀從之十三日上宿齋於崇元殿翌日服通天冠絳紗袍執鎮圭乘玉輅由明德門出羣臣夾侍鹵簿前導赴太廟五鼓朝享禮畢質明乘輅赴南郊齋於帷宫上初詣太廟乘玉輅左諫議大夫崔頌攝太僕上問儀仗名物甚悉頌應對詳敏上大悅十六日服衮冕執圭合祭天地於圜丘以皇弟開封尹光義為亞獻興元尹光美為終獻將升壇有司具黃褥為道上曰朕潔誠事天不必如此命徹之還宫將駕金輅顧左右曰於典故可乘輦否對以無害乃乘輦壬申以南郊禮成大宴廣政殿號曰飲福自是為例五代以來宰相為大禮使太常卿為禮儀使御史中丞為儀仗使兵部尚書為鹵簿使京府尹為橋道頓遞使宋制大禮頓遞如舊而大禮使或以親王為之又專以翰林學士為禮儀使其儀仗鹵簿使或以他官充是年司徒兼侍中范質為南郊大禮使翰林學士承旨禮部尚書陶穀禮儀使刑部尚書張昭鹵簿使御史中丞劉溫叟儀仗使皇弟開封尹光義橋道頓遞使太平興國元年始鑄五使印石林葉氏曰南郊五使唐制甚詳考於會要才見長慶後有以太常卿為禮儀使御史中丞為大禮使爾不知禮儀大禮何以為别也其以宰相為大禮使禮部尚書為禮儀使御史中丞為儀仗使兵部尚書為鹵簿使開封尹為橋道使者蓋後唐之制故本朝用之但改太常卿為禮儀使爾太常卿既不常置而中丞兵部官或闕則例以學士及他曹尚書侍郎代之大禮掌贊相鹵簿掌儀衛橋道掌頓遞禮儀掌禮物儀仗無正所治事但督察百司不如禮者而已真宗東封西郊嘗專用輔臣天禧後罷至元符初始召並用執政遂著為令長編通考曰恭考太祖南郊凡四自後宿齋朝享儀禮降赦率如初惟開寶四年始用繡衣鹵簿先是大駕鹵簿衣服旗幟止以五綵繪畫至是盡易以繡九年以江表底定方內大同用申報謝乃幸西京以四月有事於南郊先是霖雨彌旬及赴齋宫之日雲物晴霽觀者如堵咸相謂曰我輩少逢亂離不圖今日復覩太平天子儀衛皆相對感泣又考鹵簿凡四等大駕法駕鑾駕黃麾仗大駕郊祀籍田薦獻玉清昭應景靈宫用之按梁太祖始建都於汴然郊壇則在洛都開平二年十一月南郊帝自東京至洛都行禮自石橋備儀仗至郊壇三年正月以河南尹張宗奭為南郊大禮使後唐莊宗同光二年帝祀南郊初梁均王將郊祀於洛陽聞楊劉陷而止其儀物具在至是張全義請上亟幸洛陽謁廟畢即祀南郊從之然則梁唐行郊祀皆在洛陽國初始作郊壇於國城南薰門外開寶九年詔曰定鼎洛邑我之西都燔柴泰壇國之大事今江表底定方內大同袛遹景靈用申報謝乃眷西顧郊兆存焉將飭駕以時巡躬展誠於陽位朕今幸西京以四月有事於南郊宜令有司各揚所職以是觀之藝祖親郊凡四獨是歲行之於洛陽然凡郊必以陽至之月獨是嵗以四月乃是行大雩之禮蓋本非彛典帝以洛都元有郊兆是年又有欲徙都於洛之意故因西幸而特行其禮云太宗太平興國三年十一月丙申郊奉太祖配國初以來南郊四祭及感生帝皇地祇神州凡七祭並以四祖迭配而太祖親郊者四並以宣祖配上即位以宣祖太祖更配是年合祭天地始奉太祖升侑焉雍熙元年郊扈蒙定禮奏言經曰嚴父莫大於配天請以宣祖配天太祖配上帝乃用其議識者非之淳化四年禮儀使蘇易簡上言按唐永徽中以髙祖太宗同配上帝欲望親祀郊丘奉宣祖太祖同配其常祀孟春祈穀孟冬神州季秋大享以宣祖崇配冬至圜丘夏至北郊孟夏雩祀以太祖崇配從之淳化三年禮儀使言皇帝親郊故事在京並去圜丘十里內神祠及所過橋道並差官致祭而獨遺太社太稷文宣武成王等廟今請事出宫前一日遣官致祭從之至道三年十一月時真宗已即位有司上言冬至祀圜丘孟夏雩祀夏至祭方丘請奉太宗配上辛祈穀季秋大享明堂奉太祖配上辛祀感生帝孟冬祀神州地祇奉宣祖配其親郊圜丘奉太祖太宗並配詔可大中祥符四年職方員外郎判太常禮院孫奭言凖禮冬至祀圜丘有司攝事以天神六百九十位從祀今惟有五方上帝及五人神十七位天皇大帝以下並不設位且太昊勾芒惟孟夏雩祀季秋大享及之今乃祀於冬至恐未叶宜詔兩制及崇文院詳定翰林學士鼂逈等言按開寶通禮圜丘有司攝事祀昊天配帝五方帝日月五星中外官衆星總六百八十七位雩祀大享昊天配帝五天帝五人帝五官總十七位方丘祭皇地祇配帝神州嶽鎮海瀆七十一位今司天監所設圜丘雩祀明堂方丘並十七位即是方丘有嶽從祀圜丘無星辰而反以人帝從祀參詳故事實為闕典望如奭所請以通禮神位為定其有增益者如後敕奏可景德三年崇文院檢討陳彭年言禮記月令正月天子以元日祈穀於上帝注云為上辛祈穀郊祀昊天上帝又春秋傳曰啓蟄而郊郊而後耕蓋春氣初至農事方興郊祀昊天以祈嘉穀故當在建寅之月迎春之後矣自晉泰始二年始用上辛不擇立春之先後齊永明元年立春前郊議者欲遷日王儉啓云宋景平元年元嘉六年並立春前郊遂不遷日其後吳操之又云應在立春後然則左氏所記啓蟄而郊乃三代彞章百王不易王儉所啓郊在春前乃後世變禮經籍無聞載詳月令正月元日祈穀則明在正月之辛左氏啓蟄而郊郊而後耕則明在立春之後參較其義煥然無疑來年正月十日立春三日上辛祈穀斯則襲王儉之末議違左氏之明文禮有未安事當復古乾興元年真宗崩詔禮官定遷郊祀配帝乃請孟春上辛祈穀孟冬祭神州地祇以太祖配孟夏雩祀冬至祀昊天上帝夏至祭皇地祇以太宗崇配上辛祀感生帝以宣祖配季秋大享明堂以真宗崇配皇帝親祀郊丘以太祖太宗崇配奏可故事三嵗一親郊不郊輒代以他禮慶賞與郊同而五使皆輔臣不以官之高下天聖二年翰林學士領儀仗御史中丞領鹵簿始用官次天聖五年十一月癸丑郊以翰林學士宋綬攝太僕陪玉輅上問儀物典故綬占對辨給因使綬集羣官撰集天聖鹵簿圖記上之禮儀使請郊後詣玉清昭應景靈宫詔郊前享景靈近臣奏告玉清昭應擇日恭謝大禮使王曾請節廟樂帝曰三年一享不敢憚勞也三獻終增禮生七人各引本寶太祝升殿徹豆三日又齋長春殿謝玉清昭應宫沈氏筆談曰上親郊廟册文皆曰恭薦嵗事先景靈宫謂之朝獻次太廟謂之朝享末乃事於南郊豫集郊式時曾預討論常疑其次序若先為尊則郊不應在廟後若後為尊則景靈宫不應在太廟之先求其所從來蓋有所因按唐故事凡有事於上帝則百神皆預遣使祭告唯太清宫太廟則皇帝親行其册祝皆曰取某月某日有事於某所不敢不告宫廟謂之奏告餘皆謂之祭告唯有事於南郊方為正祠至天寶九載乃下詔曰告者上告下之詞今後太清宫宜稱朝獻太廟稱朝享自此遂失奏告之名册文皆為正祠楊氏曰愚按卜郊受命於祖廟作龜於禰宫疏引禮器魯人將有事於上帝必先有事於頖宫為證禮器注云魯以周公之故得郊於上帝先有事於頖宫告后稷也夫有事謂告祭也郊事至重又尊祖以配天故先告於祖而受命焉乃卜日於禰宫自此以後散齋七日致齋三日齋戒以神明其德將以對越上帝此則古禮然也太祖皇帝乾德六年十一月初行郊祀先是十三日宿齋於崇元殿翼日赴太廟五鼓朝享禮畢質明乘玉輅赴南郊齋於帷宫十六日行郊祀禮夫五鼓朝享於太廟質明乘輅赴南郊齋於帷宫又二日而郊祀此則不拘古禮以義起之深得古人告祭於太廟之意而又不失乎致齋之嚴也其後有司建明或失其中仁宗天聖二年八月太常禮院上言南郊合行薦告之禮望降所用日詔將來玉清昭應宫景靈宫太廟同日行禮後五年禮儀使劉筠奏曰天聖二年南郊制度皇帝自大安殿一日之內數次展禮萬乘之陟降為勞百執之駿奔不暇欲乞將來南郊禮畢别定日詣玉清昭應宫景靈宫行恭謝之禮夫劉筠之請蓋欲避一日頻併之勞也然薦告者郊前之禮也恭謝者郊後之禮也劉筠欲易郊前薦告之禮為郊後恭謝之禮蓋亦以玉清昭應宫景靈宫非禮之正不欲指言其事故為是婉辭以達意也景祐五年十月侍講賈昌朝言朝廟之禮本告以配天享侑之意合於舊典所宜奉行其景靈宫朝謁蓋沿唐世太清宫故事有違經訓固可改革欲望將來朝廟前未行此禮候郊禮畢詣景靈宫謝成如下元朝謁之儀所冀尊祖事天禮簡誠至夫賈昌朝之説即劉筠之説也然劉筠之議婉而明不若賈昌朝之言嚴而正嶽氏愧郯録曰珂前辨南北郊妄意以禮之大者與常禮異折衷古今以俟博識及考元豐六年十月庚辰太常丞吕升卿所奏則先廟後郊當時亦嘗有議之者反覆其論可謂至當而迄不見用於時蓋有弗便乎今雖欲力行不可得也珂故因是而發其餘論焉升卿之言曰近以郊祀致齋之內不當詣景靈宫及太廟朝享遂具奏伏聞止罷景靈宫諸處朝謁而天興殿及太廟朝享如故臣伏以郊丘之祀國之大事有天下者莫重乎享帝臣歷考載籍不聞為祀天致齋乃於其間先享宗廟者也獨有唐天寶之後用田同秀之言立老子廟號曰太清宫是嵗將行郊祀以二月辛卯先躬享焉祀用青詞饋用素饌甲午又親享於太廟丙申乃有事於南郊終唐之世奉而行之莫知其非雖論者以為失禮然考其初致齋之日乃辛卯享於太清宫至丙申殆且五日乃得雍容休息以見上帝也今陛下致齋三日其一日於大慶殿而用其二日三行禮焉古之大祀未有不齋三日而敢與神明交者故經曰齋三日一日用之猶恐不敬二日伐鼓何居蓋先王之於祭祀之齋如此其謹也今陛下行禮於天興殿才齋一日爾其之太廟與郊宫也前祀之一日皆嘗用之矣謂之一日之齋尚非全也夫用一日之齋以修大祀未見其可况非全日乎於以奉宗廟則齋之日不足於以事上帝則齋之儀不專陛下恭嚴寅畏三嵗一修大禮將以受無疆之休其為致齋者乃如此殆未稱昭事之意也今太廟嵗有五大享皆如古矣又於郊祀復修遍享之禮此為何名乎論者曰宗廟之禮未嘗親行故因郊祀恭展薦獻臣曰不然唐太宗時馬周言曰陛下自踐位宗廟之享未嘗親事竊惟聖情以乘輿一出所費無藝故忍孝思以便百姓遂俾唐史不書皇帝入廟何以示來葉良謂此也且人主於宗廟之享自當嵗時躬修其事其不親享者蓋後世之失禮也今日必因郊禮以行之則義尤不可夫因者不致專之謂也七世聖神儼在清廟朝廷不特講嵗時親行之禮而因以享之此非臣之所聞也臣愚以謂今郊禮宜如故事致齋於大慶殿二日徑赴行宫其宫廟親享並乞寢罷或車駕必欲至太廟即乞止告太祖一室以侑神作主之意徹去樂舞以盡尊天致齋之義其天興朝享乞更不行請如新降朝旨俟禮畢而恭謝伏請繼今日以往别修太廟躬祀之制嵗五大享乘輿親臨其一焉仍望自今嵗臘享為首於明年行春祠之禮禴與蒸嘗自次年以敘終之每遇行廟享之時則罷景靈宫一孟朝謁之禮廟享致齋乞於內殿出入如常儀如此則祀天享親兩得其當矣珂按先廟後郊蘇文忠軾嘗引書武成證為周禮而珂固疑其即變禮以為常矣升卿謂古之大祀未有不齋三日而敢與神交者考之武成厥四月丁未祀於周廟越三日庚戌柴望大告武成雖禮之變猶必歷三日而後柴望則升卿之言豈非明據然珂謂升卿之論廟享嵗五大享而臨其一乃殺禮也非備禮也行廟享之時則罷景靈宫一孟朝謁之禮廟享既與景靈宫迭用且致齋內殿出入如常儀乃常禮也非大禮也夫天地大祭也祖宗大祭也隆禮備物不可偏廢其勢必如仁宗祫享之制始合於禮之宜夫嘉祐之行祫也以代三年之郊也輅而齋冕而事門而肆眚皆郊制也前乎元年恭謝乎大慶後乎七年大享於明堂則四年之祫適三年之中也如升卿言是以常禮享祖宗而以大禮祀天地也若每嵗而入廟又三嵗而出郊禮有隆而無殺知其必不能也知乎此又益知乎南北郊之不可以兼舉也分郊而祭舍升卿之説則太廟原廟之享不知其存乎否也茍存也則先南郊祀之先北郊則祀之祖宗之祭二而天地之祭一祖宗三嵗而遍天地六嵗而遍以卑踰尊不可也苟廢也則原廟恭謝之制就可如升卿之説而太廟則不可以乏享也享不可以殺禮也是又於何時增此一郊邪其疏其數將於此乎益無統矣按三嵗親郊而所祭者凡三一日祀原廟二日祀太廟三日詣圜丘行禮此禮始於唐而宋因之楊氏所引劉筠賈昌朝之説則以為前二日之享廟告祭也嶽氏所引吕升卿之説則以為前二日之享廟正祭也然以愚觀之以為告祭則其禮太過以為正祭則其禮無名蓋登極立太子册后上祖宗徽號之類皆典禮之重大而希罕者若三嵗一郊則事天之常禮耳今登極等告祭未嘗親行而獨於三嵗郊祀則親舉告禮此所謂太過也春禴夏禘秋嘗冬蒸三嵗一祫五嵗一禘皆歷代相承宗廟之大祭今此諸祭未嘗親行而獨於三嵗郊祀之前特創一祭此所謂無名也蓋近代以來天子親祠其禮文繁其儀衛盛其賞賚厚故必三嵗始能行之而郊祀所及者天地百神與所配之祖而已於宗廟無預故必假告祭之説就行親祀宗廟之禮焉於事則簡便矣謂之合禮則未也景祐二年十一月乙未郊三聖並侑先是禮院言太祖太宗真宗三廟皆萬世不遷至於南郊以太祖定配二宗迭配將來皇帝親祠且請以三聖皆侑上顯對越之盛次伸遹追之感此後迭配還如前議嵗時常祀則至日圜丘仲夏皇地祇配以太祖孟春祈穀夏雩祀冬祭神州配以太宗孟春感生帝配以宣祖季秋大享配以真宗先是上親製郊廟樂章二十一曲財成頌體告於神明詔宰臣吕夷簡等分造樂章參施羣祀禮院言周官朝日祀五帝則張大次小次説者以為祀昊天上帝亦然大次在壇壝外猶更衣幄小次在壇側今所未行按魏武帝祠廟令降神訖下階就蕞而立須奏樂畢似若不愆烈祖遲祭不速訖也故吾坐俟樂闋送神乃起耳然則武帝坐俟容須别設近次與周官義符請設小次於皇帝版位少東每獻畢降壇若殿就小次俟終獻徹豆復就版位其後有司又言郊廟樽罍數皆凖古而不實三酒五齊明水明酒有司相承名為看器郊廟天地配位惟用祠祭酒分大中祠位二升小祠位一升止一樽酌獻一樽飲福宜詔酒官依法制齊酒分實罍有司取明水對明酒實於上樽禮官以為鄭氏注周禮五齊三酒惟引漢時名酒擬之而無制造法乃仍舊用祠祭酒一等壇殿上下樽罍有司毋設空器並如唐制以井水代明水明酒正配位酌獻飲福舊用酒二升者各增二升從祀神位用舊升數實諸樽罍嶽氏愧郯録曰珂之仕中朝屢攝官涖祠祭每見樽彝之設五齊有其名而實無之惟將事則取具天府蓋止一色公醖耳聞之容臺吏樽羃之下率多空惟一樽僅置杯勺以共祭他日又攝光祿丞得先祭贊閲視酒饌又攝太官令躬酌酒實爵得窺其中蓋皆如言則其初點饌之際執事者徒再唱酒齊之目而已於以驗其名殊而實一也嘗讀周禮正義頗疑醖法不明古制難復考之通鑑長編元豐六年十月甲申光祿卿吕嘉問言光祿掌酒醴祠祭樽罍相承用法酒庫三色法酒以代周禮所謂五齊三酒恐不足以上稱陛下崇祀之意近於法酒庫內酒庫以醖酒法式考之禮經五齊三酒今醅酒其齊冬以二十五日春秋十五日夏十日撥醅甕而浮蟻湧於面今謂之撥醅豈其所謂泛齊邪接取撥醅其下齊汁與滓相將今謂之醅芽豈其所謂醴齊邪既取醅芽置篘其中其齊蔥白色入焉今謂之帶醅酒豈其所謂盎齊邪冬一月春秋二十日夏十日醅色變而微赤豈其所謂醍齊邪冬三十五日春秋二十五日外撥開醅面觀之上清下沉豈其所謂沈齊邪今朝廷因事而醖造者蓋事酒也今踰嵗成熟蒸醖者蓋昔酒也同天節上壽燕所供臘醅酒者皆冬醅夏成蓋清酒也此皆酒非所謂齊也是知齊者因自然之齊故稱名酒者成就而人功為多故享神以齊養人以酒竊恐典禮如此又司樽彝曰醖齊縮酌盎齊沈酌依經傳則泛齊醴齊以事酒和之用茅縮酌其盎齊醍齊沈齊則以清酒和之不用茅縮酌如此則所用五齊不多而供具亦甚易蓋醖酒料次不一此五種者成而皆自然伏望聖斷以今之所造酒與典禮相詳審或不至差謬乞自今年郊廟共奉上批嘉問論證似有理趣今宗廟所實樽彝酒齊未備就且如其説用之於理無害然則當時蓋嘗施用而又前乎慶歷後乎大觀皆經講明具珂後記彌文祲容交舉並修要必不廢特建炎南渡之後有司失其職耳非故事也祖宗毖祀存古之意最為嚴重是説其有稽焉又曰慶歷元年十月十五日同判太常寺吕公弼言按開元禮崇祀録昊天上帝皇地祇六樽太樽為上實以泛齊著樽次之實以醴齊犧樽次之實以盎齊象樽次之實以醍齊壺樽次之實以泛齊山罍為下實以三酒配帝著樽為上實以泛齊犧樽次之實以醴齊象樽次之實以盎齊山罍為下實以清酒皆加明水明酒實於上樽五方北極天皇大帝神州地祇大明夜明太樽實以泛齊五星十二辰河漢象樽實以緹齊中官壺樽五方山林川澤唇樽並實以泛齊外官概樽五方邱陵墳衍原隰散樽並實以清酒衆星散樽實以旨酒皆用明酒各實於上樽宗廟每室設斚彝黃彝著樽之上樽皆實以明水黃彝實鬱鬯著樽實以醴齊又司烜氏以鑑取明水於月鄭康成云鑑類取水者世謂之方諸取月之水欲得陰陽之潔氣也臣謹以古制考五齊三酒即非難得之物將來郊廟祭享宜詔酒官依法制齊酒分實樽罍仍命有司取明水對明酒實於上樽或陰鑑方諸之類未能猝辦請如唐制以井水代之下博士議而奏曰比郊廟祠祀壇殿上下所設樽罍惟酌獻飲福二樽實以祠祭酒餘皆徒設器而不實以五齊三酒明水明酒誠於禮為闕然五齊三酒鄭康成注周禮惟引漢時名酒擬之而無制造之法今欲仍舊用祠祭酒一等其壇殿上下樽罍有司不得更設空器其明水明酒並以井水代之其正配逐位酌獻飲福舊用酒二升者各增二升從祀神位並用舊升數實諸樽罍配以明水明酒從之既曰從其請則自慶歷以來雖欲用之而不能詳其法矣此元豐吕嘉問之請所以有為而發也還考元豐元年七月二日詳定郊廟奉祀禮文所言古之祭祀以五齊薦諸神以三酒酌諸臣其用不同今樽雖具均以法酒實之而無清濁厚薄之異是名物徒存而亡其實也再詳五齊鄭氏以為醴味與酒味異其餘四齊味皆似酒祭祀必用五齊者至恭不尚味而貴多品也若三酒則人所飲也事酒為有事而新作者即今卒造之酒昔酒久醖乃熟故名以昔二者色皆白清酒久於昔酒故色清而味厚欲令法酒庫內酒坊以見造制逐色酒實之從之則三酒當時尚未備五齊固可從而知不知公弼之奏以後復曾講明不禮文之所言乃在嘉問奏論五年之先則遐想中間酒齊醖法之不講亦云久矣珂前記空樽似出有司之吝考之宣和三年七月二十二日尚書省言潭州奏春秋上丁釋奠并祭社稷風雨師等合用樽齊酒醴政和中儀曹曹洪考三禮圖樽受五斗之制遂每樽用其數以一嵗計之至用酒六百六十八石委是虛費今在京釋奠正配位每樽設酒二升從祀每位五合乞下諸路州軍依此從之則在承平時樽已不盈矣慶歷公弼之言有司相承名為看器則雖盡空其樽固無怪云宣和之有司猶有取於節今祠祭乃不然樽固皆有酒可實特先期緘瓶缶以均奉祠者臺皂無遺焉是上不以費靳而下乃以私取不可之大者也嘉祐七年春詔南郊奉太祖定配先是諫官楊畋論水災繇郊廟未順下禮院禮院言對越天地神無二主唐垂拱中始用三祖同配至開元親享遂罷之皇祐詔書南郊三聖並侑後疊配未幾復並侑為定制雖出孝思然頗違禮經下兩制議從之英宗治平二年合祭天地於南郊以太祖配故事皇帝將就版位祠官回班向皇帝須就位乃復侍臣跪讀册至御名則興至是詔以尊奉祠勿回班及興時吕公著攝太僕卿參乘為上言仁宗親祠徹黃道以登虛小次不入上皆循用之正月上辛祈穀慶歷用犢一羊二豕二其日祀感生帝羊二豕二正配簠簋俎各增為二前一日太祝讀祝視祭玉餘如冬至攝事三獻終禮生引司天監罍洗升詣四方帝神位上香奠幣爵并行一獻再拜復治平二年禮院言凖閣門儀制祀天地致齋皇帝不遊幸作樂緣壽聖節在致齋內若用慶歷元年嘉祐七年元會例更用中辛當在十六日又十四日例詣慈孝等寺集禧觀行禮觀燈作樂若遣官攝事無不聽樂元日朝會夀聖節多與上辛相近常改用中辛非尊事天神之意嘉會合禮又不宜徹樂因詔遇元正御殿聖節上夀雖在上辛祠官致齋日亦用樂大宴移日或就賜神宗熙寧元年詔令兩制以上至臺諫官與太常禮院同詳定今年冬至當與未當親行郊禮翰林學士承旨王圭上議曰按王制喪三年不祭唯祭天地社稷為越紼而行事傳謂不敢以畢廢尊也是則居喪而可得見天地也春秋僖公三十三年傳凡君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟杜預以謂新主既特祀於寢則宗廟四時常祀自當如舊是則居喪而可得見宗廟也周公稱商髙宗諒暗三年不言子張疑之以問仲尼仲尼答云何必髙宗古之人皆然髙宗不云服喪三年而云諒暗三年者杜預又謂古者天子諸侯三年之喪既葬而服除諒暗以居心喪不與士庶同禮也然則服除之後郊廟之祭可勿舉乎南齊以前人君嗣位或仍前郊之年或别自為郊下有司議而王儉乃援晉宋以來皆改元即郊而不用前郊之年自漢文以來皆即位而謁廟至唐德宗以後亦踰年而行郊况本朝景德二年真宗居明德皇太后之喪既易月而服除明年遂享太廟而合祀天地於圜丘伏請皇帝將來冬至躬行郊廟之禮其服冕車輅儀物音樂緣神事者皆不可廢詔恭依典禮其車服儀物除神事外令太常禮院詳定以聞禮院看詳欲乞除郊廟及景靈宫禮神用樂外所有鹵簿鼓吹及樓前宫架諸軍音樂皆備而不作其逐處警場止鳴金鉦鼓角從之十一月帝齋於郊宫罷臨觀闕不幸苑囿故事車駕至青城少休即召從臣幸後苑閲水嬉復登端門觀太常警嚴至是帝精意奉祠悉罷遊觀遂減徹門闕亭苑省草木禽獸千七百餘事至十年又罷去寢殿後至寶華門花磚砌道著為定制七年中書門下言凖詔參定南郊青城內殿宇門名請大內門曰泰禋東偏門曰承和西偏門曰迎禧正東門曰祥曦正西門曰景曜後三門曰拱極內門裏東側門曰夤明西側門曰肅成大殿門曰端誠大殿曰端誠殿前東西門曰左右嘉德便殿曰熙成後園門曰寶華從之先時青城殿宇門名每郊命學士院撰進至是著為定式學士院更不撰進楊氏曰愚按注疏云齋於路寢之室唐禮散齋於别殿致齋二日於太極殿又一日於行宫國朝冬祀天禮惟太祖皇帝乾德六年十一月之禮可為後世不易之法其後有司建明非一大概宿齋三日內一日於大慶殿一日於太廟一日於青城髙宗中興之後檢會熙寧在京青城內殿宇門名如曰泰禋曰承和之類悉遵舊式其制可謂周備矣然令儀鑾司預先體倣青城制度絞縛其行事執事陪祠官宿齋幕次亦隨宜絞縛又何其簡略也元豐四年十月八日禮官言古之王者行則嚴輿衛處則厚宫闕所以示威重備非常也故周禮王會同則為壝宫食息則設帷宫漢祀甘泉則有竹宫至於江左亦有瓦殿本朝沿唐舊制親祠南郊行宫獨設青城幔殿宿者有風雨之憂而又無望祭之位且青城之費嵗以萬數臣等欲乞倣青城之制創立齋宫一勞而省重費或遇風雨可以行望祭之禮詔送太常禮院候修尚書省了日取旨是神宗皇帝有意乎立齋宫矣但以修尚書省未畢而猶有所待也其後哲宗皇帝既建齋宫謂臣下曰三嵗一郊青城之費縑帛三十餘萬工又倍之易以屋室一勞永逸所省多矣又徽宗皇帝修建南北郊齋宿宫殿南郊曰齋宫北郊曰帷宫有司請曰事體如一而名稱不同宜並稱齋宫從之祖宗典故粲然可考今青城制度尚沿襲舊例而未革盍亦推廣祖宗之意立為齋宫無事則嚴其扃鐍以待乘輿致齋之日而居焉暫勞而永逸一也宿者無風雨之憂或遇風雨則可以行望祭之禮二也事有關繫甚重循習甚久斷然在所當革而無疑者其此之謂乎按會要載中書門下奏定南郊青城內殿宇門名其事在熙寧七年然楊氏所云元豐四年禮官請創立齋宫詔候修尚書省了日取旨則知齋宫元豐時尚未建而熙寧七年所奏定殿宇之名乃幔殿也然神宗即位初郊齋於郊宫罷臨觀闕不幸池苑遂減徹亭苑省草木禽獸千七百餘事以是觀之則知青城行宫苑囿遊觀之所畢備而獨未建齋殿誠為闕典元豐六年冬至郊祀昊天上帝以太祖配始罷合祭不設皇地祇位先是樞密院陳襄等詳定郊廟禮文上言曰伏承聖意以天地合祭於圜丘為非典禮之正詔令更定臣謹按周禮大司樂以圜鐘為宫冬日至於地上之圜丘奏之六變以祀天神以函鐘為宫夏日至於澤中之方丘奏之八變以祭地祇夫祀必以冬日至者以其陽氣來復於上天之始也故宫用夾鐘於震之宫以其帝出乎震也而謂之圜鐘者取其形以象天也三一之變圜鐘為宫三變黃鐘為角太簇為徴姑洗為羽各一變合陽奇之數也祭必以夏日至者以其陰氣潛萌於下地之始也故宫用林鐘於坤之宫以其萬物致養於坤也而謂之函鐘者取其容以象地也四二之變函鐘為宫太簇為角姑洗為徵南吕為羽各二變合隂偶之數也又大宗伯以禋祀實柴槱燎祀其在天者而以蒼璧禮之以血祭沈貍疈辜祭其在地者而以黃琮禮之皆所以順其陰陽辨其時位倣其形色此二禮之不得不異也故求諸天而天神降求諸地而地祇出得以通精誠而逆福釐以生蒸民以阜萬物此百王不易之禮也去周既逺先王之法不行漢元始中姦臣妄議不原經意附會周官大合樂之説謂當合祭平帝從而用之故天地共犢禮之失自此始矣由漢歷唐千有餘年之間而以五月親祠北郊者惟四帝而已如魏文帝之太和周武帝之建德隋髙祖之開皇唐睿宗之先天皆希濶一時之舉也然而隨得隨失卒無所定垂之本朝未遑釐正恭惟陛下恢五聖之述作舉百王之廢墜臣以謂既罷合祭則南北二郊自當别祀伏望陛下每遇親祠之嵗先以夏日至祭地祇於方丘然後以冬日至祀昊天於圜丘此所謂大者正也然議者或謂先王之禮其廢已久不可復行古者齋居近古者致齋路寢儀衛省用度約賜豫寡故雖一嵗遍祀而國不費人不勞今也齋居逺儀衛繁用度廣賜豫多故雖三嵗一郊而猶或憚之况一嵗而二郊乎必不獲已則三年而迭祭或如後漢以正月上丁祠南郊禮畢次北郊或如南齊以上辛祀昊天而次辛瘞后土不亦可乎臣竊謂不然記曰祭不欲踈踈則怠夫三年迭祭則是昊天大神六年始一親祀無已怠乎記曰大事必順天時二至之郊周公之制也捨是而從後王之失可謂禮歟彼議者徒知茍簡之便而不睹尊奉之嚴也伏惟陛下鑒先王已行之明效舉曠世不講之大儀約諸司儀衛而幸祠宫均南郊之賜豫以給衛士蠲青城不急之務損大農無名之費使臣得以講求故事參究禮經取太常儀注之文以正其訛謬稽大駕鹵簿之式以裁其繁冗惟以至恭之意對越大祇以迎至和格純嘏庶成一代之典以示萬世又曰臣某等恭惟本朝冬至祀天南郊夏至祭地北郊每嵗行之皆合於古猶以有司攝事為未足以盡志於是三年一郊而親行之夫三年一郊而親行之蓋所謂因時制宜者也施之於今誠不可易惟合祭之禮在所當正禮曰魯人將有事於上帝必先有事於泮宫所以然者告祖為配之謂也又曰晉人將有事於河必先有事於惡池齊人將有事於泰山必先有事於配林所以然者先卑後尊之謂也臣等推古以知今推諸侯以知天子欲乞每遇親郊七日戒之後三日宿之時宿太廟以告宿北郊以祭宿南郊以祀所以先太廟者告祖為配也所以先北郊者先卑後尊也雖然自北郊至南郊相去為逺則中道不可以無舍請為帷宫止而後進如允所奏乞下有司施行禮後漢因祠南郊即祠北郊明堂世祖廟及太廟謂之五供唐因祠南郊即祠太清宫及太廟謂之三大禮本朝三嵗郊祠必先景靈宫及太廟蓋因前制然每嵗夏至於北郊自有常祠祀兼常嵗有司攝事於南郊亦不合祭天地其合祭之意止緣親祠欲遍及爾若以親祠欲遍及之則因南郊同時告祭北郊自因舊儀亦不背違禮意近於可行伏乞更賜參酌施行於是詔禮官講求翰林學士張璪以為冬至祀天夏至祀地不易之理今祀地欲改用他月無所據依必不得已宜於郊祀之嵗夏至之日盛禮容興樂舞一如南郊之儀命宰攝事而王存曽肇言今北郊常差中書門下官乃冢宰之任樂舞之類亦開元開寶舊禮所載特近世廢闕二者皆有司攝事常行之典未足以代親祠之重恐於父天母地之文有所未順判太常寺陳薦言議者以天地合祭始於王莽故欲罷之臣按周頌昊天有成命郊祀天地也漢郊祀歌曰惟泰元尊媪神蕃釐泰元天也媪神地也又曰涓選休成天地並况此天地同祀可以概見恐非自王莽始也議者又謂方丘之祀盛夏不躬行宜選冢宰攝祀亦恐未必合古然終不若天地合祭也乞且循舊制知禮院曽肇言今冬至若罷合祭而夏至又使有司行事則於父母天地之義若有隆殺願陛下遇親祠南郊之嵗以夏至日躬欵北郊以合先王之制遂詔罷南郊合祭親祠北郊並依南郊儀如不親祠上公攝事自元豐元年上命樞密直學士陳襄等詳定郊廟奉祀禮文大正歷代典禮之失至是嵗親祀圜丘始用新儀國朝親郊止服衮冕至是稽古始加服大裘而被以衮冕詳定禮文所議禮記曰郊特牲而社稷太牢又曰祭天地之牛角繭栗配位亦特牲書曰用牲於郊牛二是也宋朝儀注昊天上帝皇地祇太祖皇帝之位各設三牲俎非尚質貴誠之義請親祠圜丘方澤正配皆用犢不設羊豕俎及鼎匕有司攝事亦如之郊之祭也器用陶匏以象天地之性樿用白木以素為質今郊祀簠簋樽豆皆非陶又用龍杓未合禮意請圜丘方澤正配位所設簠簋樽豆改用陶器仍以樿為杓祀天之有禋柴猶祭地之有瘞血享廟之有祼鬯皆歆神之始非謂於祭之末燔燒胙餘也至後世之燔瘞牲幣於祭末而不知致神於其始則是備於後而闕於先也請南北郊先行升禋瘞血之禮至薦奠禮畢即如舊儀於壇坎燔瘞牲幣北郊祭皇地祇及神州地祇當為坎瘞埋今乃建壇燔燎祝版考先儒所説地祇即無槱燎之文請祭皇地祇祝版牲幣並瘞於坎不設燎壇熙寧祀儀惟昊天上帝皇地祇髙禖燔瘞犢首自感生帝神州地祇而下皆不燔瘞牲體殊不應禮又按周禮羊人祭祀割羊牲登其首禮記曰升首報陽也首為陽則脅與髀為陰可知矣報陽宜以陽報陰宜以陰各從其類也請自今昊天上帝感生皆燔牲首以報陽皇地祇神州地祇太社太稷凡地祇之祭皆瘞牲之左髀以報陰凡薦享太廟皆升首於室又曰臣等見親祠南郊儀注並云祀前三日儀鑾司鋪御座黃道褥謹按唐故事郊壇宫廟內壝及殿庭天子步武所及皆設黃道褥壇上立位又施赤黃褥將有事命撤之武德正觀之制用紫至德以來用黃開元禮開寶通禮郊廟並不設黃道褥太常因革禮曰舊制皇帝升壇以褥藉地象天黃道太祖命撤之設拜於地和峴乞宣付史館天聖二年儀注又增設郊壇壝門道北御座黃道褥康定初有司建議謂配帝褥用緋以示損於天地而自小次之前至壇上諸位其道褥以黃蓋非典禮是嵗有詔自小次至壇下撤黃道臣等伏詳禮記郊祭之日泛掃反道鄭氏注謂剗令新土在上也其藉神席天地尚質則用蒲越藁鞂宗廟尚文則設莞筵紛純加繅席畫純加次席黼純而已天子受胙乃有席周禮司几筵所謂胙席是也今來郊壇黃道褥欲更不設又言臣等看詳周官外祀皆有兆域蓋設一壝而已後世因之稍增其制東漢壇位天神從祀者甚衆至一千五百一十四神故外設重營以為等限日月在中營內南道而北斗在北之西至於五星中宫宿之屬則其位皆中營二十八宿外宫星之屬則其位皆外營然則為重營者所以等神位也唐因齊隋之制設為三壝天神列位不出內壝而御位特設於壇下之東南若夫公卿分獻文武從祀與夫樂架饌幔則皆在中壝之內而大次之設乃在外壝者所以序祀事也蓋古者神位寡祀事簡故兆守有域以為遮列厲禁而已後世神位既衆祀事亦繁故為三壝以嚴內外之限國朝郊祀壇域率循唐制雖儀注具載圜丘三壝每壝三十五步而有司乃以青繩代內壝誠不足以等神位序祀事嚴內外之限也伏請除去青繩如儀注為三壝從之哲宗元祐七年親郊詔今嵗圜丘宜依熙寧十年故事設皇地祇位以申始見之禮候親祠北郊依元豐六年五月八日指揮南郊鹵簿使兵部尚書蘇軾奏臣謹按漢成帝郊祠甘泉泰畤汾陰后土而趙昭儀常從在屬車間時揚雄待詔承明奏賦以諷其略曰想西王母欣然而上壽兮屛玉女而却虙妃言婦女不當與齋祠之間也臣今備位夏官職在鹵簿凖故事郊祀既成乘輿還齋宫改服通天冠絳紗袍教坊鈞容作樂還內然後后妃之屬中道迎謁已非典禮而况方當祀事未畢而中宫掖庭得在勾陳豹尾之間乎竊見二聖崇奉大祀嚴恭寅畏度越古今四方來觀莫不悅服今車駕方宿齋太廟而內中車子不避仗衛爭道亂行臣愚竊恐於觀望有損不敢不奏乞賜約束仍乞取問隨行合干勾當人施行取進止時軾為鹵簿使𨗳駕內中朱紅車子十餘輛有張紅蓋者爭道亂行於乾明寺前軾於車中草此奏奏入上在太廟馳遣人以疏白太皇太后明日中使傳命申敕有司嚴整仗衛自皇后以下皆不復迎謁中道先時元祐五年五月夏至祭皇地祇命尚書右丞許將攝事將言王者父天母地三嵗冬至天子親祠遍享宗廟祀天圜丘而夏至方澤之祭乃止遣上公則皇地祇遂永不在親祠之典此大闕禮望博詔儒臣講求典故明正祀典為萬世法詔禮部太常寺及兩省侍從官集議以聞於是翰林學士兼侍讀顧臨等八人請合祭天地如祖宗故事俟將來親行北郊之禮則合祭可罷臨與祖禹又言天地特祭經有明文然自漢以來千有餘年不能行之矣宋興一祖六宗皆合祭天地其不合祭者惟元豐六年一郊耳去所易而就所難虛地祇之大祭失今不定後必悔之吏部侍郎范純禮彭汝礪戶部侍郎范子竒禮部侍郎曾肇刑部侍郎王覿豐稷權知開封府韓宗道樞密都承旨劉安世中書舍人孔武仲陳軒太常少卿盛陶宇文昌齡侍御史王畏監察御史董敦逸黃慶基左司諫虞策禮部郎中孫路員外郎歐陽棐太常丞韓治博士朱彥宋景年閻本等二十二人皆主北郊之議而武仲又請以孟冬純陰之月詣北郊親祠如神州地祇之祭杜純議請南郊之嵗設望祠位於苑中置權火夏至命上公攝事每獻舉權火詔依王欽臣議宜如祖宗故事並祭天地一次汝礪肇復上疏論合祭非是文多不載九月三省上顧臨等議太皇太后曰宜依仁宗皇帝故事吕大防言國朝以來大率三嵗一親郊並祭天地宗廟因行赦宥頒賞軍士遂以為常今諸儒獻議欲南郊不設皇地祇位惟祭昊天上帝於祖宗之制未見其可蘇轍曰自熙寧十年神宗皇帝親祠南郊合祭天地今十五年矣皇帝即位又已八年未嘗親見地祇乃朝廷闕典不可不正范百祿言圜丘無祭地之禮記曰有其廢之莫可舉也先帝所廢稽古據經未可輕改大防又言先帝因禮文所建議遂令諸儒議定北郊祀地之禮然未經親行今皇帝臨御之始當親見天地而地祇之位獨不設恐亦未安况本朝祖宗以恩霈四方慶賚將士非三嵗一行則國力有限今日宜為國事勉行權制俟異時議定北郊制度及太廟享禮行之未晚太皇太后以吕大防之言為是蘇頌鄭雍皆以古者人君嗣位之初必郊見天地今皇帝初郊而不祀地恐未合古乃下詔曰國家郊廟特祀祖宗以來命官攝事則三嵗一親郊則先享清廟冬至合祭天地於圜丘元豐間有司援周制以合祭不應古義先帝乃詔定親祠北郊之儀未之及行是嵗郊祀不設皇地祇之位而宗廟之享率如權制朕方修郊見天地之始其冬至日南郊宜依熙寧十年故事設皇地祇位以嚴並况之報厥後躬行方澤之祀則修元豐六年五月之制俟郊禮畢集官詳議典禮以聞禮部尚書蘇軾言恭覩陛下近者至日親祀郊廟神祇享答實蒙休應然則圜丘合祭允當天地之心不宜復有改更竊惟議者欲變祖宗之舊圜丘祀天而不祀地不過以謂冬至祀天於南郊陽時陽位也夏至祀地於北郊陰時陰位也以類求神則陽時陽位不可以求陰也是大不然冬至南郊既祀上帝則天地百神莫不從祀古者秋分夕月於西郊亦可謂陰時陰位矣至於從祀上帝則冬至而祀月於南郊議者不以為疑今皇地祇亦從上帝而合祭於圜丘獨以為不可則過矣書曰肆類於上帝禋於六宗望於山川遍於羣神舜之受禪也自上帝六宗山川羣神莫不畢告而獨不告地祇豈有此理哉武王克商庚戌柴望柴祭上帝也望祭山川也一日之間自上帝而及山川必無南北郊之别也而獨略地祇豈有此理哉臣以此知古者祀上帝并祀地祇矣何以明之詩之序曰昊天有成命郊祀天地也此乃合祭天地經之明文而説者乃以比之豐年秋冬報也曰秋冬各報而皆歌豐年則天地各祭而皆歌昊天有成命也是大不然豐年之詩曰豐年多黍多稌亦有髙廪萬億及秭為酒為醴蒸畀祖妣以洽百禮降福孔皆歌於秋可也歌於冬亦可也昊天成命之詩曰昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之終篇言天而不及地頌以告神明也未有歌其所不祭祭其所不歌也今祭地於北郊獨歌天而不歌地豈有此理哉臣以知周之世祀上帝則地祇在焉歌天而不歌地所以尊上帝故其序曰郊祀天地也議者乃謂合祭天地始於王莽以為不足法臣竊謂禮當論其是非不當以人廢光武皇帝親誅莽者也尚采用元始合祭故事謹按後漢書郊祀志建武二年初制郊兆於洛陽為圜丘八階中又為重壇天地位其上皆南鄉西上此則漢世合祭天地之明驗也又按水經注伊水東北至洛陽縣圜丘東大魏郊天之所凖漢故事為圜丘壇八階中又為重壇天地位其上此則魏世合祭天地之明驗也唐睿宗將有事於南郊賈曽議曰有虞氏禘黃帝而郊嚳夏后氏禘黃帝而郊鯀郊之與廟皆有禘也禘於廟則祖宗合食於太祖禘於郊則地祇羣望皆合食於圜丘以始祖配享蓋有事之大祭非常祀也三輔故事祭於圜丘上帝后土位皆南面則漢嘗合祭矣時禇無量郭山惲等皆以曽言為然明皇天寶元年二月敕曰凡所祠享必在躬親朕不親祭禮將有闕其皇地祇宜就南郊合祭是月二十日合祭天地於南郊自後有事於圜丘皆合祭此則唐世合祭天地之明驗也今議者欲冬至祀天夏至祀地蓋以為用周禮也臣請言周禮與今禮之别古者一嵗祀天者三明堂享帝者一四時迎氣者五祭地者二享宗廟者四此十五者皆天子親祭也而又朝日夕月四望山川社稷五祀及羣小祀之類亦皆親祭此周禮也太祖皇帝受天眷命肇造宋室建隆初郊先享宗廟乃祀天地自真宗以來三嵗一郊必先有事景靈宫享太廟乃祀天地此國朝之禮也夫周之禮親祭如彼其多而嵗嵗行之不以為難今之禮親祭如此其少而三嵗一行不以為易其故何也古者天子出入儀物不繁兵衛甚簡用財有節而宗廟在大門之內朝諸侯出爵賞必於太廟不止時祭而已天子所治不過王畿千里唯以齋祭禮樂為政事能守此則天下服矣是故嵗嵗行之率以為常至於後世海內為一四方萬里皆聽命於上機務之繁億萬倍於古日力有不能給自秦漢以來天子儀物日以滋多有加無損以至於今非復如古之簡易也今之所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得蔭補親屬非周禮也自宰相宗室以下至百官皆有賜賚非周禮也此皆不改而獨於地祇則曰周禮不當祭於圜丘此何義也哉議者必又曰夏至不能行禮則遣官攝祭亦有故事此非臣之所知也周禮大宗伯若王不與祭祀則攝位鄭氏注曰王有故則代行其祭事賈公彥疏曰有故謂王有疾及哀慘皆是也然則攝事非安吉之禮後世人主不能嵗嵗親祭故命有司行事其所從來久矣若親郊之嵗遣官攝事是無故而用有故之禮也議者又必曰省去繁文末節則一嵗可以再郊臣將應之曰古者以親郊為常禮故無繁文今世以親郊為大禮則繁文有不能省也若帷城幔屋盛夏則有風雨之虞陛下自宫入廟自廟出郊冠通天乘大輅日中而舍百官衛兵暴露於道鎧甲具裝人馬喘汗皆非夏至所能堪也王者父事天母事地不可偏異事天則備事地則簡是於父母有隆殺也豈得以為繁文末節而一切欲省去乎國家養兵異於前世自唐之時未有軍賞猶不能歲嵗親祠天子出郊兵衛不可簡省大輅一動必有賞給今三年一郊傾竭帑藏猶恐不足郊賚之外豈有復加若一年再賞國力將何以給分而與之人情豈不失望議者必又曰三年一祀天又三年一祭地此又非臣之所知也三年一郊已為疏濶若獨祭地而不祭天是因事地而愈疏於事天自古未有六年一祀天者如此則典禮愈壞欲復古而背古益逺神祇必不顧享非所以為禮也議者必又曰當郊之嵗以十月神州之祭易夏至方澤之祀則可以免方暑舉事之患此又非臣之所知也夫所以議此者為欲舉從周禮也今以十月易夏至以神州代方澤不知此周禮之經邪變禮之權邪若變禮從權而可則合祭圜丘何獨不可乎十月親祭地十一月親祭天先地後天古無是禮而一嵗再郊軍國勞費之患尚未免也議者必又曰當郊之嵗以夏至祀地祇於方澤上不親郊而通權火天子於禁中望祀此又非臣之所知也書之望秩周禮之四望春秋之三望皆謂山川在四郊者故逺望而祭也今所在之處俯則見地而云望祭是為京師不見地乎此六議者合祭可否之決也夫漢之郊禮尤與古戾唐亦不能如古本朝祖宗欽崇祭祀儒臣禮官講求損益非不知圜丘方澤皆親祭之為是也蓋以時不可行是故參酌古今上合典禮下合時宜較其所得已多於漢唐矣天地宗廟之祭皆當嵗遍今不得嵗遍是故遍於三年當郊之嵗又不能於一嵗之中再舉大禮是故遍於三日此皆因時制宜雖聖人復起不能易也今並祀不失親祭而北郊則必不能親往二者孰為重乎若一年再郊而遣官攝事是長不親事地也三年間郊當祀地之嵗而暑雨不可親行遣官攝事則是天地皆不親祭也夫分祀天地決非今世之所能行願陛下謹守太祖建隆神宗熙寧之禮無更改易郊祀廟享以敉寧上下神祇仍乞下臣此章付有司集議如有異論即須畫一解破臣所陳六議使皆屈伏上合周禮下不為當今軍國之患不可但執周禮更不論今可與不可施行所貴嚴祀大典以時決定取進止貼黃稱唐制將有事於南郊則先朝獻太清宫朝享太廟亦如今禮先二日告原廟先一日享太廟然議者或亦以為非三代之禮臣謹按武王克商丁未祀周廟庚戌柴望相去三日則先廟後郊亦三代之禮也初詔議北郊典禮蘇軾主合祭之説從之者五人劉安世主分祭之説從之者四十人又有三人欲於十月以神州地祗之祭易夏至方丘之祀又有一人欲上不親祠而通爟火天子於禁中望拜既而朝廷復送下三狀再令詳定安世復議略云蘇軾謂合祭圜丘於禮為得不可復改臣等謹按周禮天子親祀上帝凡九國朝三嵗一郊固已疏濶豈可因循謬誤不加考正古者求神以類天陽物也地陰物也嵗月日時方位牲器樂舞皆從其類今議者於聖人成法則棄而不行猥用王莽不經之説至引夫婦同牢私褻之語黷亂天地又引昊天有成命之詩以為證臣等切詳此詩終篇未嘗有合祭之文序乃後儒之辭亦謂成周之世圜丘方澤各歌此詩以為樂章耳如潛之序曰季冬獻魚春薦鮪也豐年之序曰豐年秋冬報也噫嘻之詩曰春夏祈榖於上帝也如此之類不知為一祭邪抑二祭邪若郊祀賜豫乃五代姑息之弊法聖朝寬仁不欲遽罷若分而為二何所不可議者乃欲因此造為險語以動上聽又引禍福殃咎之説劫持朝廷必欲從已甚無謂也大抵臣等所守乃先王之正禮而蘇軾之議皆後世之便宜權之與正決不可合伏望聖慈詳審其當上以體神考之志下以正千載之惑豈勝幸甚方送同議官簽書其徒馳告軾曰若劉承旨議上決恐難答時蘇轍為門下侍郎遂白轍令請降旨罷議安世議狀竟不得上紹聖元年詔罷合祭天地自今因大禮之嵗以夏至之日躬祭地祇於北郊應緣祀事儀物及壇壝道路帷宫等宜令有司參酌詳具以聞蓋用蔡京等議然北郊親祠終帝世未克舉云詳見祀后土門左司員外郎曾旻言周人以氣臭事神近世易之以香按何佟之議以為南郊明堂用沉香本天之質陽所宜也北郊用上和香以地於人親宜加雜馥今令文北極天皇而下皆用濕香至於衆星之位香不復設恐於義未盡禮部太常寺議衆星隨其方色用幣每陛各設香從之文獻通考卷七十一
