body:
  text: 文獻通考卷二百四十三鄱陽馬端臨貴與著經籍考七十集詩集李義山集三卷陳氏曰唐太學博士李商隠義山撰詩話王荆公晩年亦喜稱義山詩以為唐人知學老杜而得其藩籬惟義山一人而已每誦其雪嶺未歸天外使松州猶駐殿前軍永憶江湖歸白髪欲囬天地入扁舟與池光不受月暮氣欲沉山江海三年客乾坤百戰塲之類雖老杜亡以過也義山詩合處信有過人若其用事深僻語工而意不及自是其短世人反以為竒而效之故崑體之弊適重其失義山夲不至是云詩到義山謂之文章一厄以其用事僻澁時稱西崑體然荆公晩年亦或喜之而字字有根蔕如試問火城将䇿探何如雲屋聽窓知未愛京師傳谷口但知鄉里勝壺頭其用事琢句前軰無相犯者漁隠叢話李義山詩楊大年諸公皆深喜之然淺近者亦多如華清宫詩云華清恩幸古無倫猶恐蛾眉不勝人未免被他褒女笑只敎天子暫蒙塵用事失體在當時非所宜言也豈若崔魯華清宫詩云障掩金雞蓄禍機翠華西拂蜀雲飛珠簾一閉朝元閣不見人歸見燕歸又云草遮囬磴絶鳴鸞雲樹深深碧殿寒眀月自來還自去更無人倚玉欄干語意既精深用事亦隠而顯也義山又有馬嵬詩云如何四紀為天子不及盧家有莫愁渾河中詩云咸陽原上英雄骨半是君家養馬來如此等詩庸非淺近乎温庭筠金筌集七卷外集一卷鼂氏曰唐温庭筠夲名岐字飛卿宰相彦博之裔詩賦清麗與李商隠齊名時號温李能逐弦吹之音為側艶之辭為行塵雜由是累年不第終國子助教宣宗嘗作詩賜宫人句有金歩揺遣塲中對之庭筠對以玉跳脫上喜其敏欲用之而嘗作詩忤時相令狐綯終廢斥云張祐詩一卷鼂氏曰唐張祐字承吉清河人樂髙尚客淮南杜牧為度支使善其詩嘗贈之詩曰何人得似張公子千首詩輕萬戸侯嘗作淮南詩有人生只合揚州死禪智山光好墓田之句大中中果終丹陽隠舍人以為䜟云陳録凡十卷許渾丁卯集二卷鼂氏曰唐許渾字用晦圉師之後大和六年進士為當塗大平二令以病免起潤州司馬大中三年為監察御史歴虞部員外睦郢二州刺史嘗分司於朱方丁卯間自編所著因以為名賀鑄本䟦云按渾自序集三卷五百篇世傳夲兩卷三百餘篇求訪二十年得沈氏曾氏夲并取擬元天竺集校正之共得五百四十四篇予近得渾集完夲五百篇皆在然止兩卷唐藝文志亦言渾集兩卷鑄稱三卷者誤也陳氏曰丁卯者其所居之地有丁卯橋蜀夲又有拾遺二卷後村劉氏曰杜牧許渾同時然各為體牧於唐律中常寓少抝峭以矯時弊渾則不然如荆樹有花兄弟樂橘林無實子孫忙之類律切麗密或過牧而抑揚頓挫不及也二人詩不著姓名亦可辨樊川有續别集三卷十之八九皆渾詩牧佳句自多不必又取他人詩益之若丁卯集割去許多傑作則渾詩無一篇可傳矣李逺集一卷陳氏曰唐建州刺史李逺求古撰于鵠集一卷陳氏曰唐于鵠撰與張籍同時未詳何人薛瑩集一卷陳氏曰唐薛瑩撰號洞庭集文宗時人集中多蜀詩其曰壬寅嵗者在前則為長慶四年後則為中和二年未知定何年也薛逢歌詩二卷鼂氏曰唐薛逢陶臣河東人㑹昌元年進士終祕書監持論鯁切以謀畧髙自標顯與楊收王鐸同年登第而逢文藝最優收作相逢有詩云誰知金印朝天客同是沙隄避路人鐸作相逢又有詩云昨日鴻毛萬鈞重今朝山岳一毫輕二人皆怒故不見齒喻鳬集一卷陳氏曰唐烏程尉喻鳬撰開成五年進士潘咸集一卷陳氏曰唐潘咸撰不知何人與喻鳬同時藝文志不載項斯集一卷陳氏曰唐丹徒尉江東項斯子遷撰初受知於張籍水部而楊敬之祭酒亦知之有逢人說項斯之句㑹昌四年進士趙嘏渭南詩三卷鼂氏曰唐趙嘏承祐也㑹昌四年進士終渭南尉杜紫微讀其早秋詩云殘星幾㸃鴈横塞長笛一聲人倚樓因謂之趙倚樓云馬戴集一卷陳氏曰唐馬戴虞臣撰㑹昌四年進士顧非熊集一卷陳氏曰唐盱眙主簿顧非熊况之子㑹昌五年進士薛許昌集十卷鼂氏曰唐薛能字大拙汾州人㑹昌六年登進士第大中末書判中選補盩厔尉辟太原陜虢河陽從事李福鎮滑表署觀察判官歴御史都官刑部貟外郎福徙西蜀奏以自副咸通中攝嘉州刺史造朝遷主客度支刑部郎中俄刺同州京兆尹温漳貶命權知尹事出帥咸化入授工部尚書復節度徐州徙忠武廣眀元年徐軍戍溵水經許能以軍懐舊惠館之城中許軍懼見襲大将周岌乘衆疑怒逐能據城自稱留後因屠其家能政嚴察絶私謁癖於詩日賦一章晚節惑浮屠法奉之唯謹然恣驁倨傲佻輕以忤物及為藩鎮尤易武吏嘗命其子屬櫜鞬雅拜新進士或問其故曰與渠銷彌災咎云容齋洪氏随筆曰能晩唐人詩格調不甚髙而妄自尊大其海棠詩荔枝詩折楊栁十詩序可見而所作皆無過人又别有栁枝詞五首最後一章曰劉白蘓臺總近時當初章句是誰推纎腰舞盡春楊栁未有儂家一首詩自註云劉白二尚書繼為蘓州刺史皆賦楊栁枝詞世多傳唱雖有才語但文字太僻宫商不髙耳其大言如此但稍推杜陵視劉白以下蔑如也今讀其詩正堪一笑劉之詞云城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管别離白之詞云紅板江橋青酒旗館娃宫暖日斜時可憐雨歇東風定萬樹干條各自垂其風流氣槩豈能所可髣髴哉後村劉氏曰能自稱舉太過五言云空餘氣長在天子用平人不但自譽其詩又自譽其材然位歴節鎮不為不用矣卒以驕恣凌忽僨軍殺身其材安在妄庸如此乃敢妄議諸葛可謂小人之無忌憚者李羣玉詩一卷鼂氏曰唐李羣玉文山澧州人曠逸不樂仕進專以吟詠自適詩筆妍麗才力邁健好吹笙羙筆翰親友强赴舉一上而止裴休廉察湖南延郡中大中八年來京師進詩三百篇休復論薦授𢎞文館校書郎集後附其進詩表并除官制太平廣記所載黄陵廟事甚異其絶句在焉陳氏曰裴休以處士薦集後有乞假歸别業及朝士送行詩曹鄴集一卷陳氏曰唐洋州刺史曹鄴撰大中四年進士鄭嵎津陽門詩一卷鼂氏曰唐鄭嵎字賔先大中五年進士津陽即華清宫之外闕嵎開成中過之聞逆旅主人道承平故實眀日馬上裁刻成長句一千四百言自有序云陳氏曰或作愚者非也愚嘗為嶺南節度好着錦半臂非此鄭嵎劉駕集一卷陳氏曰唐劉駕司南撰大中六年進士李頻集一卷陳氏曰唐建州刺史新定李頻徳新撰大中八年進士姚合之壻也李郢端公詩一卷鼂氏曰唐李郢楚望也大中十年進士詩調清麗居餘杭疎於馳競為藩鎮從事兼侍御史陳蛻詩一卷鼂氏曰唐陳蛻未詳其行事集有長安十五詠自序云蛻生長江淮間以詩句從賦僅十餘年矣今我后撫運澤及四海蛻復得為太平人云云蓋肅代間人也栁郯詩一卷鼂氏曰唐栁郯集有與李端盧綸軰相酬贈詩大歴間進士也斷金集一卷鼂氏曰唐李逢吉令狐楚自未第至貴顯所唱和詩也後逢吉卒楚編次之得六十餘篇裴夷直名曰斷金集為之序孟逵詩一卷鼂氏曰唐孟逵字叔之平昌人㑹昌五年陳商下及第儲嗣宗集一卷陳氏曰唐儲嗣宗撰大中十三年進士司馬先軰集一卷陳氏曰唐司馬札撰與儲嗣宗同時李廓集一卷陳氏曰唐武寧節度使李廓撰程之子也于濆集一卷陳氏曰唐于濆子漪撰咸通二年進士李昌符集一卷陳氏曰唐膳部員外郎李昌符撰咸通四年進士司空表聖集十卷陳氏曰唐兵部侍郎司空圖表聖撰咸通十年進士别有全集此集皆詩也其子永州刺史荷為後記聶夷中集一卷陳氏曰唐華隂尉聶夷中撰咸通十二年進士許棠集一卷陳氏曰唐宛陵許棠文化撰亦咸通十二年進士林寛集一卷陳氏曰唐林寛撰與李頻許棠皆同時集有送二人詩周繇集一卷陳氏曰唐周繇撰咸通十三年進士無譏集四卷陳氏曰唐崔魯撰僖宗時人章碣集一卷陳氏曰唐章碣撰亦僖宗時人髙蟾集一卷陳氏曰唐御史中丞髙蟾撰乾符三年進士崔塗集一卷陳氏曰唐崔塗禮山撰光啓四年進士雲臺編三卷宜陽外編一卷鼂氏曰唐鄭谷字守愚宜陽人光啓三年擢髙第遷右拾遺歴都官郎中乾寧四年歸宜春卒於别墅其集號雲臺編者以其扈從華山下觀居所編次云谷詩屬思頗切於理而格韻凡猥語句浮俚不競不為議者所多然一時傳諷號鄭都官而弗名也歐陽氏詩話曰鄭谷詩名盛於唐末號雲臺編而世俗但稱其官為鄭都官其詩極有意思亦多佳句但其格不甚髙以其易曉人家多以教小兒余為兒時猶誦之今其集不行於世矣周朴詩二卷唐處士周朴撰歐公詩話曰唐之晩年詩人無復李杜豪放之格然亦務以精意相髙如周朴者構思尤艱每有所得必極其雕琢故時人稱朴詩月鍜季錬未及成篇已播人口其名重當時如此而今不復傳矣余少時猶見其集其句有云風暖鳥聲碎日髙花影重又云曉來山雨閙雨過杏花稀誠佳句也韓偓詩二卷香匳集一卷鼂氏曰唐韓偓致光京兆人龍紀元年進士累遷諌議大夫翰林學士昭宗幸鳳翔進兵部侍郎承㫖朱全忠怒貶濮州司馬榮懿尉天祐初挈族依王審知而卒香匳集沈括筆談以為和凝所作凝既貴惡其側艶故詭稱偓著或謂括之言妄許彦周詩話髙秀實言元微之詩艶麗而有骨韓偓香匳集麗而無骨李端叔意喜韓偓詩誦其序云咀五色之靈芝香生九竅咽三危之瑞露美動七情秀實云勸不得也石林葉氏曰偓在閩所為詩皆手自寫成卷嘉祐間裔孫奕出其數卷示人龎潁公為漕取奏之因得官詩文氣格不甚髙吾家僅有其詩百餘篇世傳别夲有名香匳集者唐書藝文志亦載其辭皆閨房不雅馴或謂江南韓熙載所為誤以為偓若然何為録於唐志乎熈載固當有之然吾所藏偓詩中亦有一二篇絶相類豈其流落亡聊中姑以為戲然不可以為訓矣又曰韓偓傳自貶濮州司馬後載其事即不甚詳其再召為學士在天祐二年吾家所藏偓詩雖不多然自貶後皆以甲子歴歴自記其所在有乙丑年在袁州得人賀復除戎曹依舊承㫖詩即天祐二年也昭宗前一年已弑蓋哀帝之命也末句云若為将朽質猶擬杖於朝固不徃矣其後又有丁卯年正月聞再除戎曹依前充職詩末句云豈獨鴟夷觧歸去五湖魚艇且餔糟天祐四年也是嘗兩召皆辭唐史止書其一是嵗四月全忠簒其召命自哀帝之世自後復召則癸酉年南安縣之作即梁之乾化二年時全忠亦已被弑眀年梁亡其兩召不行非特避禍蓋終身不食梁禄其大節與司空表聖略相等惜乎唐史不能少發眀之也唐英集三卷陳氏曰唐翰林學士吳融子華撰與偓皆龍紀元年進士張蠙詩一卷鼂氏曰偽蜀張蠙字象文清河人唐乾寧中進士為校書郎櫟陽尉犀浦令建開國拜膳部員外郎後為金堂令王衍與徐后逰大慈寺見壁間書墻頭細雨埀纎草水面囬風聚落花愛之問知蠙句給札令以詩進蠙以二百首獻衍頗重之将召為知制誥宋光嗣以其輕傲止賜白金而已蠙生而頴秀幼能為詩作登單于臺有白日地中出黄河天外來之句為世所稱靈溪集七卷陳氏曰唐校書郎上饒王貞白有道撰乾寧二年進士其集有自序永豐人有藏之者洪景盧得而刻之詩雖多在一時儕軰未為工也翁承贊集二卷陳氏曰唐諌議大夫京兆翁承贊文堯撰乾符二年進士禇載集一卷陳氏曰唐禇載厚之撰王轂集一卷陳氏曰唐王轂虛中撰二人皆乾寧五年進士盧延讓詩一卷鼂氏曰偽蜀盧延讓子善也范陽人唐光化九年進士朗陵雷滿辟滿敗歸王建及僭號授水部員外郎累遷給事中卒官終刑部侍郎延讓師薛能詩不尚竒巧人多誚其淺俗獨吳融以其不蹈襲大竒之牛嶠歌詩三卷鼂氏曰偽蜀牛嶠字延峰隴西人唐相僧孺之後博學有文以歌詩著名乾符五年進士歴拾遺補闕尚書郎王建鎮西川辟判官及開國拜給事中卒集夲三十卷自序云竊慕李長吉所為歌詩輙效之韋荘浣花集五卷鼂氏曰偽蜀韋荘字端已仕王建至吏部侍郎平章事集乃其弟藹所編以所居即杜甫草堂舊址故名偽史稱荘有集二十卷今止存此王駕集一卷陳氏曰唐彭城王駕大用撰大順元年進士自號守素先生喻坦之集一卷陳氏曰唐喻坦之撰張喬集一卷陳氏曰唐進士九華張喬撰喬與許棠張蠙鄭谷喻坦之等同時號十哲喬試京兆月中桂詩擅塲傳於今而登科記無名蓋不中第也髙駢集一卷陳氏曰唐淮南節度使髙駢撰周賀集一卷陳氏曰唐周賀撰嘗為僧名清塞後反初故别夲又號清塞集鼂氏曰清塞字南卿詩格清雅與賈島無可齊名寳歴中姚合為杭因擕書投謁合聞其誦哭僧詩云凍鬚亡夜剃遺偈病中書大愛之因加以冠巾為周賀云李洞詩一卷鼂氏曰唐李洞字才江諸王之孫慕賈島為詩銅鑄其像事之如神時人多誚其僻澁不貴其竒峭唯吳融稱之昭宗時不第逰蜀卒陳氏曰與張喬同時稱餘杭眀經潘熈載編曹唐詩一卷鼂氏曰唐曹唐字堯賔桂州人初為道士咸通中為府從事卒作游仙詩百篇或靳之曰堯賔嘗作鬼詩唐曰何也井底有天春寂寂人間無路月茫茫非鬼詩而何唐乃大哂今集中不見然他詩及神仙者尚多陳氏曰唐有大小游仙詩來鵬集一卷陳氏曰唐豫章來鵬撰咸通舉進士不第任藩集一卷陳氏曰唐任藩撰或作翻客居天台有宿帢幘山絶句為人所稱今城中巾子山也後村劉氏曰唐任藩詩存者五言十首而已然多佳句衆鳥已歸樹旅人猶過山贈僧云半頂髪根白一生心地清居然可愛今人動為千百首而無一可傳者方干詩集一卷鼂氏曰唐方干字雄飛歙人唐末舉進士不第隱鏡湖上徐凝有詩名一見干器之授以詩律其貌寢陋又兎闕而喜凌侮嘗謁廉帥誤三拜人號方三拜将薦於朝而卒門人諡元英先生其甥楊弇與孫郃編次遺詩王贊為序郃又為元英先生傳附王徳輿詩一卷鼂氏曰唐王徳輿集有次韻和鄭畋詩知其懿僖間人也沈彬集一卷鼂氏曰南唐沈彬保大中以尚書郎致仕居髙安集中有與韋荘杜光庭貫休詩唐末三人皆在蜀疑其同時避亂嘗入蜀云上李昪山水圖詩在焉熊皦屠龍集五卷鼂氏曰晉熊皦後唐清泰二年進士為延安劉景岩從事天福中說景岩歸朝擢右司諌坐累黜上津令集有陶穀序陳沆賞皦早梅云一夜欲開盡百花猶未知曰太妃容徳於是乎在陳氏曰集中多下第詩蓋老於塲屋者杜荀鶴唐風集十卷鼂氏曰唐杜荀鶴池州人大順二年進士善為詞句切理宣州田頵重之嘗以牋問至梁祖薦為翰林學士主客員外恃勢侮易搢紳衆怒欲殺之而未及天祐初病卒有顧雲序荀鶴自號九華山人陳録作三卷幕府燕談杜荀鶴詩鄙俚近俗惟宫詞為唐第一云早被嬋娟誤欲粧臨鏡慵承恩不在貌敎妾若為容風暖鳥聲碎日髙花影重年年越溪女相憶採芙蓉故諺云杜詩三百首惟在一聨中正謂風暖日髙之句也此句歐公詩話以為周朴詩詠史詩三卷陳氏曰唐邵陽胡曾撰凡一百五十首曽咸通末為漢南從事羅江東集十卷陳氏曰唐羅隠昭諌撰劉滄詩一卷鼂氏曰唐劉滄字蘊靈大中八年進士詩頗清麗句法絶類趙嘏羅鄴集一卷鼂氏曰唐羅鄴撰曹松集一卷鼂氏曰唐曹松夢徴也舒州人學賈島為詩天復元年與王希羽劉象柯崇鄭希顔同登第年皆七十餘號五老牓時以新平内難聞放進士喜特敕授校書郎而卒陳氏曰别夲與印夲互有詳畧但别夲大遊仙十三首乃曹唐詩也羅虬比紅兒詩一卷鼂氏曰唐羅虬撰皇朝方性天註虬詞藻富贍與其族人隠鄴齊名時號三羅從鄜州李孝恭籍中有杜紅兒者善歌常為副使者屬意副使聘鄰道虬請紅兒歌贈之以綵孝㳟不令受虬怒拂衣起詰旦手刃之既而追其寃作絶句詩百篇借古人以比其艶盛行於世唐彦謙鹿門詩一卷鼂氏曰唐唐彦謙字茂鄴并州人咸通末進士中和王重榮表河中從事歴節度副使晉絳二州刺史重榮遇害貶漢中掾興元楊守亮留署判官遷副使閬壁刺史卒彦謙才髙負氣無所摧屈博學多藝尤能七言詩師温庭筠故格體類之世稱耳聞眀主提三尺眼見愚民盜一抔蓋彦謙句也自號鹿門先生有薛廷珪序後村劉氏曰揚劉諸人師李義山可也又師唐彦謙唐詩雖雕斵對偶然求如一抔三尺之聨惜不多見五言叙亂離云不見泥函谷俄驚火建章剪茅行殿濕伐栢舊陵香語猶渾成未甚破碎若西崐酬唱集對偶字面雖工而佳句可録者殊少宜為歐公所厭也秦韜玉投知小録三卷鼂氏曰唐秦韜玉字中眀京兆人有詞藻工歌吟險而好進為田令孜所善僖宗幸蜀令孜引為工部侍郎中和二年賜進士第編入春牓東浮集九卷陳氏曰唐荆南崔道融撰自稱東歐散人乾寧乙卯永嘉山齋編成蓋避地於此今闕第十卷唐詩三卷陳氏曰崔道融撰皆四言詩述唐中世以前事實事為一篇篇各有小序凡六十九篇裴說集一卷陳氏曰唐裴說撰天祐三年進士状頭唐蓋将亡矣說後為禮部員外郎世傳其寄邉衣古詩甚麗此集無之僅有短律而已非全集也其詩有避亂一身多之句劉徳仁詩集一卷鼂氏曰唐劉徳仁公主之子長慶中以詩名五言清瑩獨歩文塲者開成後昆弟皆居顯仕獨自苦於詩舉進士二十年竟無所成嘗有寄所知詩云外族帝王恩中朝親故稀翻令浮議者不許九霄飛及卒詩僧棲白以絶句弔之曰忍苦為詩身到此氷魂雪魄已難招直教桂子落墳上生得一枝寃始銷唐求集一卷陳氏曰唐唐求撰與顧非熊同時藝文志不載李山甫集一卷陳氏曰唐魏博從事李山甫撰唐末進士不第邵謁集一卷陳氏曰唐國子生曲江邵謁撰集後有胡賔王者為之序言其沒後降巫賦詩自稱邵先軰殆若今世請大仙之類邪李推官披沙集六卷陳氏曰唐李咸用撰其八世孫兼孟達居宛陵亦能詩嘗為台州出其家集求楊誠齋作序誠齋序畧曰推官公詩如見後却無語别來長獨愁如危城三面水古樹一邉春如月眀千嶠雪灘急五更風如煙殘偏有㷔雪甚却無聲如春雨有五色灑來花旋成如雲蔵山色時還媚風約溪聲静又囬如未醉已知醒後憶欲開先為落聲愁蓋征人凄苦之情孤愁窈𦕈之聲騷客婉約之靈風物榮悴之英所謂周禮盡在魯矣讀之使人發融冶之歡於荒寒無聊之中動慘戚之感於笑談方懌之後國風之遺音江左之異曲孰謂其果弦絶歟黄御史集誠齋序畧曰詩至唐而盛至晩唐而工御史黄公之詩尤竒如聞鴈一聲初觸夢半白已侵頭餘燈依古壁片月下滄洲如逰東林寺寺寒三伏雨松偃數朝枝如退居青山寒帶雨古木夜啼猿此與韓致光吳融軰並逰未知何人徐行後長也永豐君自言其集乆逸其父考功公始得之僅數卷而已其後永豐又得詩文五卷於吕夏卿之家又得逸詩於翁承贊之家又得銘碣於浮屠老子之宫而後御史公之文復傳於二百年之後按唐藝文志御史諱滔字文江光啓中為四門博士其集舊曰黄滔集云于武陵集一卷周濆集一卷陳光集一卷劉威集一卷陳氏曰皆唐人于武陵大中進士餘莫詳何時濆集仍藝文志不載胡笳十八拍一卷鼂氏曰唐劉商撰漢蔡邕女琰為胡騎所掠因胡人吹蘆葉以為歌遂翻為琴曲其辭古淡商因擬之以叙琰事盛行一時商彭城人擢進士第歴臺省為郎好道術隠義興胡父渚世傳其仙去鼎國詩三卷鼂氏曰後唐李雄撰雄洛鞏人荘宗同光甲申嵗逰金陵成都鄴下各為詠古詩三十章以三國鼎峙故曰鼎國李有中詩二卷鼂氏曰南唐李有中嘗為新塗令與水部郎中孟賔于善賔于稱其詩如方干賈島之徒賔于晉天福中進士也有中集中有贈韓張徐三舍人詩韓乃熙載張乃洎徐乃鉉也春月詩云乾坤一夕雨草木萬方春頗佳他皆稱是殷文珪集一卷陳氏曰唐殷文珪撰乾寧五年進士後仕南唐其子曰崇義歸朝更姓名即湯恱也盧士衡集一卷陳氏曰後唐盧士衡撰天成二年進士劉昭禹集一卷陳氏曰湖南天䇿府學士桂陽劉昭禹撰符䝉集一卷陳氏曰題符侍郎同光三年進士也同年四人䝉初為状頭覆試為第四李建勲集一卷陳氏曰南唐宰相李建勲撰孟賔于集一卷陳氏曰五代進士孟賔于撰仕湖南江南廖匡圖集一卷陳氏曰湖南從事廖匡圖撰江為集一卷陳氏曰五代建安江為撰為王氏所誅當漢乾祐中劉一集一卷陳氏曰似唐末五代人藝文志不載其詩怪而不律亦不工文丙集一卷陳氏曰稱布衣文丙所業未詳何人蒋吉集一卷蘓拯集一卷王周集一卷陳氏曰皆未詳何人皎然杼山集十卷鼂氏曰唐僧皎然字清晝吳興人謝靈運十世孫攻篇什徳宗詔録夲納集賢院集前有于頔序并贈晝上人詩陳氏曰顔魯公為刺史與之酬倡其後刺史為作集序所居龍興寺之西院今天寧寺是也又嘗居杼山寺在妙喜唐史藝文志顔眞卿為刺史集文士撰韻海鏡源預其論著貞元中集賢御書院取其集蔵之石林葉氏曰唐詩僧皎然居湖州妙喜今寳積寺是其故廬自言謝靈運後詩祖其家法自許甚髙顔魯公為守時與張志和陸鴻漸皆為客意其人品亦必不凡吾嘗至妙喜訪其遺跡無復有但山巓墳存耳其詩十卷尚行於世無甚令人喜者以為優於唐詩僧可也觀其詩評亦貶駮老杜如論送髙三十五書記詩云崆峒小麥熟且願休王師請君問主将安用窮荒為以為四句已前不見題則其所知可見矣僧靈澈詩集一卷澈姓湯字源澄越州人劉夢得序曰如芙蓉園新寺詩云經來白馬寺僧到赤烏年謫汀州云青蠅為弔客黄耳寄家書可謂入作者閫域豈特雄於詩僧間邪雪浪齋日記靈澈詩僧中第一如海月生殘夜江春入暮年窻風枯硯水山雨慢琴弦前軰評此詩云轉石下千仞江寳月詩一卷鼂氏曰唐僧貫休撰字徳隠姓姜氏婺州人後入蜀號禪月大師初吳融為之序其弟子曇域削去别為序引偽蜀乾徳中獻之靈一集一卷陳氏曰唐僧與皇甫曾同時無可集一卷陳氏曰唐僧賈無可撰島弟也碧雲詩一卷鼂氏曰唐僧虛中詩也司空圖嘗以詩贈之云十年太華無知已只得虛中一首詩白蓮集一卷陳氏曰唐僧齊已撰長沙胡氏栁白集一卷修睦東林集一卷尚顔供奉集一卷陳氏曰皆唐僧自貫休而下盡唐末人也修睦死於維揚朱瑾之難薛洪度詩一卷鼂氏曰唐薛濤字洪度西川樂妓工為詩當時人多與酬贈武元衡奏校書郎大和中卒李肇云樂妓而工詩者濤亦文妖也陳氏曰號薛校書世傳奏授恐無是理殆一時州鎮褒借為戲如今世白帖借補之類邪濤得年最長至近八十李季蘭集一卷陳氏曰唐女冠與劉長卿同時相譏調之語見中興間氣集魚元機集一卷陳氏曰唐女冠坐妬殺女婢抵死花蘂夫人詩一卷鼂氏曰偽蜀孟昶愛姬青城費氏女幼能屬文長於詩宫詞尤有思致蜀平以俘輸織室後有罪賜死伍喬集一卷陳氏曰夲江南進士後歸朝李九齡集一卷陳氏曰洛陽李九齡撰乾徳二年進士第三人文獻通考卷二百四十三
