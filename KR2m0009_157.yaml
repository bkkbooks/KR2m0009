body:
  text: 文獻通考卷一百五十七鄱陽馬端臨貴與著兵考九教閲周禮大司馬中春教振旅司馬以旗致民平列陳如戰之陳辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲以教坐作進退疾徐疏數之節遂以搜田有司表貉誓民鼓遂圍禁火弊獻禽以祭社中夏教茇舍如振旅之陳羣吏撰車徒讀書契辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅遂以苖田如搜之法車弊獻禽以享礿中秋教治兵如振旅之陳王載太常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅遂以獮田如搜田之法羅弊致禽以祀祊中冬教大閲前期羣吏戒衆庶修戰法虞人萊所田之野為表百步則一為三表又五十步為一表田之日司馬建旗於後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐羣吏聼誓於陳前斬牲以左右徇陳曰不用命者斬之中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初遂以狩田以旌為左右和之門羣吏各帥其車徒以敘和出左右陳車徒有司平之旗居卒間以分地前後有屯百步有司巡其前後險野人為主易野車為主既陳乃設驅逆之車有司表貉於陳前中軍以鼙令鼓鼓人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小禽私之獲者取左耳及所弊鼓皆駴車徒皆譟徒乃弊致禽饁獸於郊入獻禽以享蒸以上注並見田獵門此不再録臧僖伯曰春搜夏苖秋獮冬狩搜索擇取不孕者苖為苖除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也皆於農隙以講事也各隨時事之間三年而治兵入而振旅雖四時講武猶復三年而大習出曰治兵始治其事入曰振旅治兵禮畢整衆而還振整也旅衆也歸而飲至以數軍實飲於廟以數車徒器械及所獲也昭文章車服旌旗明貴賤辨等列等列行伍順少長出則少者在前還則在後所謂順也習威儀也魯桓公六年大閲公羊曰大閲者何簡車徒也大簡閲兵車使可任用而習之何以書蓋以罕書也比年簡徒謂之搜三年簡車謂之大閲五年大簡車徒謂之大搜榖梁曰大閲者何閲兵車也修教明諭國道也平而修戎事非正也禮因四時田獵以習用戎事平謂不因田獵無事而修之莊公八年正月師次于郎甲午治兵榖梁出曰治兵習戰也入曰振旅習戰也治兵而陳蔡不至矣師次於郎以俟陳人蔡人兵事以嚴終故曰善陳者不戰此之謂也善為國者不師道政齊禮鄰國望之歡如親戚何師之為善師者不陳師衆素嚴不須耀兵列陳善陳者不戰軍陳嚴整敵望而畏之莫敢與戰善戰者不死投兵勝地故無死者善死者不亡民盡其命無奔敵背亡公羊祠兵者何出曰祠兵入曰振旅其禮一也皆習戰也楚子將圍宋使子文治兵於暌子文時不為令尹故使之治兵習號令也暌楚邑也終朝而畢不戮一人子文欲委重於子玉故略其事子玉復治兵於蒍蒍邑楚終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒賀子玉堪其事蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣茍入而賀何後之有三百乘二萬二千五百人晉文公搜於被廬作三軍軍閔元年晉獻公作二今復大國之禮謀元帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之夲也君其試之乃使郤縠將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之毛偃之兄命趙衰為卿讓於欒枝先軫使欒枝將下軍先軫佐之荀林父御戎魏犫為右漢承秦制三時不講唯十月車駕幸長安水南門會五營士為八陳進退名曰乘之武帝太初二年令天下膢五曰如淳曰立秋貙膢伏儼日膢音劉劉殺也師古曰續漢書作貙劉膢劉義各通耳漢儀注云立秋之日斬牲於郊東門外以薦陵廟武官肄兵習戰陳之儀漢制常以九月都試太守都尉令長丞相會都試課殿最韓延夀為東郡太守都試騎士治飾兵車畫龍虎朱爵延夀黃袍方領駕四馬傳總建幢棨植羽葆鼓車歌車功曹引車皆駕四馬載棨戟五騎為伍分左右部軍假司馬千人持幢旁轂歌者先居射室望見延夀車噭咷楚歌延夀坐射室騎吏持戟夾陛列立騎士從者帶弓鞬羅後令騎士兵車四面營陳被甲鞮鞪居馬上抱弩負蘭又使騎士戲車弄馬盜驂及治飾車甲三百萬以上於是蕭望之劾延夀上僭不道坐棄市東漢制以立秋之日自郊禮畢始揚威武斬牲於郊東門以薦陵廟其儀乘御戎路白馬朱鬛躬執弩射牲牲以鹿麛太宰令謁者各一人載獲車馳駟送陵廟還宫遣使者齎束帛以賜武官武官肄兵習戰陳之儀斬牲之禮名曰貙劉兵官皆肄孫吳兵法六十四陳名曰乘之立春遣使者齎束帛以賜文官貙劉之禮祠先虞執事告先虞已烹鮮時有司乃逡巡射牲獲車畢有司告事畢明帝永平元年六月初令百官貙膢安帝延光二年十一月校獵上林苑安帝初鄧太后臨朝俗儒世士以為文德可興武功宜廢遂寢搜狩之禮息戰陳之法故猾賊縱橫乘此無備馬融以為文武之道聖賢不墜五材之用無或可廢元初二年上廣成頌以諷諫依舊文重述搜狩之義作頌一篇并封上靈帝中平五年望氣者言以為京師當有大兵兩宫流血大將軍司馬涼假司馬伍岩説大將軍何進曰太公六韜有天子將兵事可以威厭四方進以為然入言之於帝於是乃詔進大發四方兵講武於平樂觀下起大壇上建十二重五采華蓋髙十丈壇東北為小壇復建九重華蓋髙九文列步兵騎士數萬人結營為陳天子親出臨軍駐大華蓋下進駐小華蓋下禮畢帝躬擐甲介馬稱無上將軍行陳三匝而還詔使進領兵屯於觀下是時置西園八校尉以小黃門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎都尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍校尉淳于瓊為佐軍校尉又有左右校尉帝以蹇碩壯健而有武略特親任之以為元帥督司𨽻校尉以下雖大將軍亦領屬焉帝自黃巾之起留心戎事問討虜校尉蓋勳曰吾講武如是何如對曰臣聞先王耀德不觀兵今寇在逺而設近陳不足以昭果毅祗黷武耳獻帝建安二十一年有司奏古四時講武按漢西京承秦制三時不講唯十月都試金革今兵戈未偃士衆素習可無四時講武但以立秋擇吉日大朝車騎號曰閲兵上合禮名下承漢制是冬閲兵魏王曹操親執金鼓以令進退魏文帝嗣魏王位其年秋閲兵於郊公卿相儀王御華蓋親金鼓之節明帝太和元年十月閲兵於東郊晉武帝太始四年九月咸寧元年太康四年六年冬皆自臨宣武親大閲習衆軍然不自令進退自惠帝以後其禮遂廢東晉元帝太興四年詔左右衛及諸營教習依大習儀成帝咸和中詔內外諸軍戲兵於南郊之場其地因名鬬場自後藩鎮相倣諸方伯往往閲習然朝廷無事焉宋文帝依故事肄習衆軍兼用漢魏之禮其後以時講武於講武堂餘見田獵門後魏明帝永興五年以九月十月帝親行貙劉之禮孝成帝和平三年因嵗除大儺遂耀兵示武更為制令步兵陳於南騎士陳於北各擊鐘鼓以為節度其步兵所衣青赤黑黃别為部隊楯矟矛戟相次周回轉易以相赴就有飛龍騰蛇之變為函箱魚鱗四門之陳凡十餘法跪起前却莫不應節陳畢南北二軍皆鳴鼓角衆盡大譟各令騎將六千人去來挑戰步兵更進退以相拒擊南敗北捷以為威觀自後以為常後齊常以季秋皇帝講武於都外有司先萊野為場為三軍進止之節又别墠於北陽輿駕停觀遂命將簡士教衆為戰陳之法凡為陳少者在前長者在後其還則長者在前少者在後長者持弓矢短者持旌旗勇者持鉦鼓刀楯為前行戰士次之槊者次之弓箭為後行將帥先教士目使習見旌旗指麾之蹤發起之意旗卧則跪教士耳使習金鼓動止之節聲鼓則進鳴金則止教士心使知刑罰之苦賞賜之利教士手使習持五兵之便戰鬬之備教士足使習跪起及行列嶮泥之塗前五日皆請兵嚴於場所依方色建旗為和門都墠之中及四角皆建五采牙旗應講武者各集於其軍戒鼓一通軍士皆嚴備二通將士貫甲三通步軍各為直陳以相俟大將各處軍中立旗鼓下有司陳小駕鹵簿皇帝武辨乘革輅大司馬介胄乘奉引入行殿百司陪列位定二軍迭為客主先舉為客後舉為主從五行相勝法為陳以應之後周仲春教振旅大司馬建大麾於萊田之所鄉稍之官以旗物鼓鐸鉦鐃各帥其人而致誅其後至者建麾於後表之中以集衆庶質明偃麾誅其不及者乃陳徒騎如戰之陳大司馬北面誓之軍中皆聼鼓角以為進止之節田之日於所萊之北建旗為和門諸將帥徒騎序入其門有司居門以平其人既入而分其地險野則徒前而騎後易野則騎前而徒後既陳皆坐乃設驅逆騎有司表貉於陳前以太牢祭黃帝軒轅氏於狩地為墠建二旗列五兵於坐側行三獻禮遂搜田致禽以祭社仲夏教苃舍如振旅之陳遂以苗田如搜法致禽以享礿仲秋教練兵如振旅之陳遂以獮田如搜法致禽以祀祊仲冬教大閲如振旅之陳遂以狩田如搜法致禽以享蒸隋大業七年征遼東衆軍將發御臨朔宫親授節度每軍大將亞將各一人騎兵四十隊隊百人百人置一纛十隊為一團團有偏將一人第一團皆青絲連光甲鐵具裝青纓拂建狻猊旗第二團絳絲連珠犀甲獸文具裝赤纓拂建貔貅旗第三團白絲連明光甲鐵具裝素纓拂建辟邪旗第四團烏絲連元犀甲獸文具裝黑纓拂建六駭旗前部鼓吹一部大鼓小鼓及鼙長鳴中鳴等各十八具棡鼓金鉦各二具後部鐃吹一部鐃二面歌簫及笳各四具節鼓一面篳篥橫笛各四具大角十八具又步卒八十隊分為四團團有偏將一人第一團每隊給青隼蕩幡一第二團每隊黃隼蕩幡一第三團每隊蒼隼蕩幡一第四團每隊烏隼蕩幡一長槊楯弩及甲鍪等各稱兵數受降使者一人給二馬軺車一乘白獸幡及節每一騎吏三人車輻白從十二人承詔慰撫不受大將制戰陳則為監軍軍將發候大角一通步卒第一團出營東門東向陳第二團出營南門南向陳第三團出營西門西向陳第四團出營北門北向陳陳四面團然後諸團嚴駕立大角三通則鐃鼓俱振第一團引行隊間相去各十五步次第二團次前部鼓吹弓矢一隊合二百騎建蹲獸旗匏槊二張大將在其次鞬馬二十匹次大角次後部鐃吹次第四團次受降使者次及輜重戎車散兵等亦有四團第一輜重出收東面陳分為兩道夾以行第二輜重出收南面陳夾以行第三輜重出收西面陳夾以行第四輜重出收北面陳夾以行亞將領五百騎建騰豹旗殿軍後至營則第一團騎陳於東面第二團騎陳於南面鼓翊大將軍居中駐馬南面第三團騎陳於西南面第四團騎陳於北面合為方陳四面外向步卒翊輜重入於陳內以次安營定四面陳者引入營亞將率驍騎遊奕督察其安營之制以車外布間設馬槍次施兵幕內安雜畜事大將亞將等就牙帳馬步陳與軍中散兵交為兩番五日而代於是每日遣一軍發相去四十里連營漸進二十四日續發而盡首尾相繼鼓角相聞旌旗亘九百六十里天子六軍次發兩部前後先置又亘八十里通諸路合三十軍亘千四十里諸軍各以帛為帶長尺五寸濶二寸題其軍號為記御營內者合十衛三臺五省九寺並分𨽻內外前後左右六軍亦各題其號不得自言臺省王公以下至於兵馬私𨽻悉以綴於衣領各軍記帶諸軍並給幡數百有餘事使人交相去來執以行執幡而離夲軍者他軍驗記帶知非夲部兵則所在斬之唐太宗嘗引諸衛將卒習射於顯德殿詳見兵制髙宗顯慶二年十一月講武於􅘷水之南行三驅之禮設次於尚書臺以觀之漢南郡太守馬融講尚書於其地因以得名後改講武臺五年三月八日又講武於并州城北上御飛閣羣臣臨觀之左衛大將軍張延師為左右驍武等六衛左羽林騎士屬焉右武候大將軍梁建方為右軍左右威領武候等六衛右羽林騎士屬焉一鼓而誓衆再鼓而整列三鼓而交前左為曲直圓鋭之陳右為方鋭直圓之陳三挑而五變步退而騎進五合而各復位武太后聖歷二年欲以季冬講武有司請延至孟春王方慶上疏曰謹按禮記月令孟冬之月天子命將帥講武習射御角力此乃三時務農一時講武蓋王者常事安不忘危之道也孟春之月不可以稱兵兵者金也金性克木春盛德在木金氣以害盛德逆生氣孟春行冬令則水潦為敗雪霜大摯首種不入按蔡雍月令章句太隂休少陽尚微而行冬令以導水氣故水潦至而敗生物也雪霜大摯摧傷物也太隂干時雨雪而霜故傷首種種謂宿麥也麥以秋種故謂之首種入收也為沍寒所傷故至春不長今月令首種稷非麥今孟春講武是行冬令以隂故犯陽氣害發生之德臣恐水潦敗物雪霜損稼宿麥不登無所收入也請至明年孟冬教習以順天道從之元宗先天二年十月講武於􅌐山之下徴兵二十萬戈鋋金甲照耀天地列大陳於長川坐作進退以金鼓之聲節之帝親擐戎服持大槍立於陳前以虧失軍容坐兵部尚書郭元振於纛下將斬之宰臣劉幽求張説跪於馬前諫曰元振推戴上皇有大功雖違軍令不可加刑乃捨之流新州給事中知禮儀唐紹以草軍儀有失斬之薛訥為左軍節度衆以元帥及禮官得罪諸節部頗亦失序唯訥及解琬軍不動上令輕騎召訥等至軍門不得入禮畢特加慰勞唐開元禮皇帝講武儀注仲冬之月講武於都外前期十有一日所司奏請講武兵部承詔遂命將帥簡軍士有司先芟萊除地為場方一千二百步四出為和門又於其內墠地為步騎六軍營域處所左右廂各為三軍皆上軍在北中軍次之下軍在南東西相向中間相去三百步五十步立表一行凡立五行表間前後各相去五十步為三軍進止之節又别墠地於北廂南向為車駕停觀之處前三日尚舍奉御設大次及御座於其中如常儀前一日講武將帥及士卒集於墠所禁止喧譁依方色建旗為和門於都墠之中及四角皆建以五綵牙旗旗鼓甲仗威儀悉備於墠所大將以下各有統帥如常式步軍入將被甲胄乘馬教騎大將亦乘馬教習士衆為戰陳之法凡教為陳少者在前長者在後其還則長者在前少者在後長者持弓矢短者持戈矛力者持旌旗勇者持鉦鼓刀楯為前行持矟者次之弓箭為後行將帥先教士衆習見旌旗指麾之蹤旗卧即跪旗舉即起金鼓進止之節聲鼓即進鳴金即止知刑罰之害賞賜之利持五兵之便戰鬭之備習串跪起及行列險隘之路講武日未明十刻軍士皆嚴備五刻將士皆貫甲步軍各為直陳以相俟將軍依儀各依格備物大將軍各依格處分軍中立於旗鼓之下凡六軍鼓各一十二鉦一角四並於其軍後表之下車駕出宫如常式講武日未明七刻捶一鼓為一嚴三嚴時節前一日侍中奏裁出宫以剛日侍中奏開宫殿門及城門未明五刻捶二鼓為再嚴侍中版奏請中嚴文武官應從者俱先置文武官皆公服所司為小駕依圖陳設未明二刻捶三鼓為三嚴諸衛各督其隊與鈒戟以次入陳於殿庭諸侍衛之官各服其器服諸侍臣俱詣西階下奉迎侍中負璽如式乘黃令進革輅於太極殿前皇帝服武辨之服餘並如圜丘儀駕至墠所兵部尚書介胄乘馬奉引至講武所入自都墠北和門兩步軍之北當空南向黃門侍郎奏稱請降輅還侍位皇帝降輅入大次而觀兵部尚書停於東廂西向三仗小退以通觀路領軍減小駕騎士立於都墠之四周侍臣依左右廂立於大次之前東西北上文武九品以上皆公服文東武西在侍臣之外十步重行北上諸州使人及蕃客先集於都墠北和門外東方南方立於道東西方北方立於道西皆向輅而立於北為上駕至和門奉禮曰可拜在位者皆再拜皇帝入次謁者引諸州使人鴻臚卿引蕃客東方南方立於大次東北南向以西為上西方北方立於大次西北南向以東為上若有觀者立於都墠騎士仗外四周任意然後講武諸州使人及蕃客立定吹大角三通中軍將各以令鼓二軍俱擊鼓三鼓有司偃旗步士皆跪二軍諸帥果毅以上各集於中軍大將旗鼓之下左廂中軍大將立旗鼓之東西面諸軍將立於旗鼓之南北面東上右廂中軍大將立於旗鼓之西東面諸軍將立於旗鼓之南北面西上以聼誓大將誓曰今行講武以教人戰進退左右一如軍法用命有常賞不用命有常刑可不勉之誓訖左右三軍各長史二人振鐸分循以警衆諸果毅各以誓詞遍告其所部遂聲鼓有司舉旗士衆皆起騎從皆行及表擊鉦騎從乃止又擊三鼓有司偃旗士衆皆跪又擊有司舉旗士衆皆起騎驟徒趨及表乃止整列位定東軍一鼓舉青旗為直陳西軍亦鼓而舉白旗為方陳以應之次南軍亦鼓舉赤旗為鋭陳北軍亦鼓而舉黑旗為曲陳以應之次東軍鼓而舉黃旗為圓陳西軍亦鼓而舉青旗為直陳以應之次西軍鼓而舉白旗為方陳東軍亦鼓而舉赤旗為鋭陳以應之次東軍鼓而舉黑旗為曲陳西軍亦鼓而舉黃旗為圓陳以應之凡陳迭為主客先舉者為客後舉者為主從五行相勝之法為陳以應之每變陳二軍各選刀楯之士五十人挑戰於兩軍之前第一第二挑戰迭為勇怯之狀第三挑戰為敵均之勢第四第五挑戰為勝敗之形每將變陳先鼓而為直陳然後變從餘陳之法五陳畢兩軍俱為直陳又擊三鼓有司偃旗士衆皆跪又聲鼓舉旗士衆皆起騎從徒走左右軍俱至中表相擬擊而還每退至一行表跪起如前遂復其初侍中跪奏請觀騎軍又侍中稱制曰可侍中俯伏興二軍吹角擊鼓士衆俱進及表乃止皆如步軍唯無起跪耳騎軍東西迭為主客為相勝之陳皆如步軍之法每陳各八騎挑戰於兩陳之間如步軍法五陳畢俱大擊鼓而前盤馬相擬擊而罷遂振旅而還凡步軍二軍之士備則滿數省則減之損益隨時唯不得減將節凡相擬擊皆不得以刃相及凡步士逐退過中表二十步而止不得過也騎士不在此例若因田狩則令講武軍士之外先期為圍觀訖乘馬鼓行親禽如别禮狩訖乘輅振旅而還如常儀講武罷侍中跪奏稱侍中臣某言講武禮畢請還俯伏興皇帝降御輿侍衛如常儀皇帝升輅太僕卿立授綏升訖敕車右升千牛將軍升輅陪乘黃門侍郎奏請鑾駕發引以下如圜丘還宫儀唯不作鼓吹不撞㽔賔解嚴訖將士各還明日羣官奉參起居如别儀開元八年八月敕四方雖安不可忘戰故周禮以軍禁紏邦國以搜狩習戎旅不教人戰是謂棄之宜差使於兩京及諸州簡取十萬人務求灼然驍勇不須限以蕃漢皆放番役差科唯令團伍教練辨其旗物簡其騎徒攻取進退之方陳威儀貴賤之等俾少長有禮疾徐有節將以伐叛懷服保大定功協於師貞以𢎞武備肅宗至德二年八月御鳳翔府門大閲五年正月御翔鸞閣習武自後遂廢文宗大中六年五月敕天下軍府有兵馬處宜選會兵法能弓馬人充教練使每年依禮教習仍於其時申兵部梁開平元年十月駕幸繁臺講武至二年七月改為講武臺按地理志夲西漢梁孝王所築謂之吹臺其後有繁氏居其側故里人呼之為繁臺宋太祖皇帝建隆三年十一月講武於近郊六軍之容甚盛帝每御講武殿親臨教閲其法刻木為箭鏃裹以氊罽命強者兩兩相射避即捶之取其不避者又以木挺為馬撾施韋鞘俾馳騎相擊取其尤勝者各分等級以遷𨽻之自是師旅皆精鋭太宗太平興國二年將伐太原詔築講武堂於西郊九月大閲上與從官登而觀焉是冬又觀飛山兵射連弩發機石於臺下帝循太祖舊制親閲武藝御便坐時召上軍觀步射擊刺列為行伍或召宰相親王臨觀間亦幸殿前班閲馬射行幸池苑亦令諸軍衛士騎射雕盤截桞枝或於庭中令射毛毬淳化五年八月召天武士卒教射於殿庭弓力有至石三斗以引強平射者為上等艱於引滿者别為一等其諸淺軟者又為一等各量其材力而遷𨽻之至道元年九月又閲禁旅有挽強至一石五斗連三十發而有餘力又令騎兵步兵各數百東西列陳挽強彀弩視其進退發矢如一容止中節上曰此殿庭間數百人耳猶兵威可觀况堂堂之陳數萬成列者乎真宗咸平二年八月大閲諸軍於東郊其儀最備詔有司擇地於含暉門外之東武村為廣場乙丑夜三鼓殿前侍衛馬步軍二十萬分出諸門丙寅上乘馬以出宗室近臣尚書侍郎御史中丞給諫上將軍節度觀察防禦團練刺史並别駕從賜以窄袍上至行宫諸軍陳於臺前左右相向步騎交屬諸班衛士翼侍於臺後有司奏成列上升臺東向召從臣坐而觀之殿前都指揮使王超執方旗以節進退又於兩陳中起候臺相望使人執旗以應之初舉黃旗則諸軍旅拜舉赤旗則騎進舉青旗則步進每旗動則鼓作鼓作則士進皆三挑而後退次舉白旗則諸軍復再拜呼萬嵗有司奏陳堅而整士勇而厲欲再舉上曰可止矣遂舉黑旗以振旅軍於左者略右陳以還由臺前出西北隅軍於右者略左陳以還由臺前出西南隅以歸御東華門閲諸軍還營翊日近臣諸軍將校以內職皆賜飲其後又幸飛山教場觀發機石連弩及便坐日閲召募新軍時令習戰陳之狀率如兩朝舊規其事悉見兵志仁宗時案閲訓練之制禁軍月奉五百以上皆日習武技三百以下或習或給役其後别募廂軍亦閲武技號教閲廂軍戍川廣者舊不訓練嘉祐以後稍習焉凡諸營日習之法以鼓聲為節騎兵五習步兵四習以教坐作進退非施於兩軍相當者然自祖宗已來中外諸軍皆用之明道二年樞密使王曉上言天下廂軍止給役而未嘗習以武技宜取材勇者訓肄升補禁軍天子可其奏康定元年帝御便殿閲諸軍陳法上封者言諸軍止教坐作進退雖整肅可觀然臨敵難用請自今遣官閲陳畢令解鐙以弓弩射營置弓三等自一石至八斗弩四等自二石八斗至二石五斗以次閲習詔行之陜西河東河北路是嵗詔教士不袵帶金甲緩急不足以應敵自今諸軍各豫鎧甲十馬甲五令迭披帶又命諸軍班聼習雜武技勿輒禁止神宗熙寧三年初置保甲四年始詔以時肄習武事詳見兵志門五年詔以涇原路蔡挺衙教陳隊於崇政殿引見仍頒行於諸路其法五伍為隊為陳陳橫列騎兵二隊亦五伍列之其出皆以鼓為節束草象人而射焉中則有賞馬步皆前三行槍刀後二行弓弩附隊以虎蹲弩床子弩各一射與擊刺迭出皆聞金即退預籍人馬之強者隱於隊中遇可用則别出為竒帝以其點閲周悉常有出野之備故令頒行六年帝初置內教法旬一御便殿閲武技程其能否而勸沮之元豐元年詔立在京秋校試諸軍技藝格第為上中下三等步射六發而三中為一等二中為二等一中為第三等馬射五發驟馬直射三矢背射二矢中數第如步射法弩射自六中至二中床子弩及炮自三中至一中為及等並賞銀有差槍刀并標排手角勝負計所勝第賞其弓弩墜落或縱矢不及堋或挽弓破體或局而不張或矢不滿或弩跖不上牙或擭不發或身倒足落並為不合格即射已中賞餘箭不合格者降一等無可降者罷之十一月京西將劉元上言馬軍教習不成請降補步軍又不成降廂軍詔下令諸軍約一季不能學者如所請降之二年立府界集教大保長法以昭宣使入內侍省副都知王中正東上閣門使狄咨兼提舉府界教保甲大保長總二十二縣為教場十一所大保長凡二千八百二十五人每十人一色事藝置教頭一凡禁軍教頭二百七十都教頭三十使臣十弓以八斗九斗一石為三等弩以二石四斗二石七斗三石為三等馬射九斗八斗為二等其材力超拔者為出等當教時月給錢三千日給食官豫戎械戰袍又具銀楪酒醪以為賞犒三年大保長藝成乃立團教法以大保長為教頭教保丁焉凡一都保以相近者分為五團即夲團都副保正所居聚教之以大保長藝成者十人衮教五日一周之五分其丁以其一為騎二為弓三為弩府界法成乃推之三路各置文武官一人提舉三年內教法格并圗其象頒行之步射執弓發矢運手舉足移步及馬射馬使蕃槍馬上野戰格鬬步用􅝑排皆有法象凡千餘言使軍士習誦焉趙卨言今欲大閲漢蕃陳隊且以萬二千五百人為法旌旗麾幟各隨方色戰國時大將之旗以龜為飾蓋取前列先知之義今中亦宜以龜為號其八隊旗别繪天地風雲熊虎鳥蛇天地則狀其方圓風雲則狀其飛揚熊虎則狀其猛厲鳥蛇則狀其翔盤之勢以備大閲而樞密院以為陳隊旗號若繪八物慮士衆難辨且其間亦有無形可繪者遂詔大閲旗幟上依方色仍異其形制令勿雜而已詔樞密院曰唐李靖兵法世無全書雜見通典離析訛舛又官號物名與今稱謂不同武人將佐多不能通其意令樞密院檢詳官與王震曽旻王白郭逢原等校正分類解釋令今可行帝諭近臣曰黃帝始置八陳法敗蚩尤於涿鹿諸葛亮造八陳圗於魚復平沙之上纍石為八行晉桓溫見之曰常山蛇勢也文武皆莫能識之此即九軍陳法也後至隋韓擒虎深明其法以授其甥李靖靖以時遇久亂將臣通曉其法者頗多故造六花陳以變九軍之法便世人不能曉之大抵八陳即九軍九軍者方陳也六花陳即七軍七軍者圓陳也蓋陳以圓為體方陳者內圓而外方圓陳即內外俱圓矣故以圓物驗之則方以八包一圓以六包一此九軍六花陳之大體也六軍者左右虞候軍各一為二虞候軍左右廂各二為四廂軍與中軍共為七軍八陳者加前後二軍共為九軍夲朝祖宗以來置殿前馬步軍三帥即中軍前後軍帥之别名而馬步軍都虞候是為二虞候軍天武捧日龍神衛四廂是為四廂軍也中軍帥總制九軍即殿前都虞候專總中軍一軍之事務是其名實與古九軍及六花陳相符而不少差也今論兵者俱以唐李筌太白隂經中所載陳圗為法失之逺矣朕嘗覽近日臣僚所獻陳圗皆妄相眩惑無一可取果如此輩之説則兩敵相遇必須遣使豫約戰日擇一寬平之地仍夷阜塞壑誅草伐木如射圃教場方可盡其法耳以理推之知其不可用也決矣今可約李靖法為九軍營陳之制然李筌之圖乃營法非陳法也朕採古之法酌今之宜曰營曰陳夲出於一法而已止曰營行曰陳在竒正言之則營為正陳為竒也於是以八月大閲九軍陳於城南荆家陂已事坼營回軍賜遂等下指揮馬步諸軍銀絹有差哲宗元祐元年髙翔上言乞依舊教閲御陳與新陳法相兼從之元豐七年詔已降五陳法令諸將教習其舊教陳法並罷蓋九軍營陳為方圓曲直鋭凡五變是為五陳至是復令與舊教御陳互教四年右司諫蘇轍上言諸道禁軍自置將以來日夜按習武藝將兵皆早晚兩教新募之士或終日不得休息今平居無事朝夕虐之以教閲使無遺力以治生事衣食殫盡憔悴無聊緩急安得其死請使禁軍除新募未習之人其餘日止一教朝請郎任公裕言軍中誦習新法愚懵者頗以為苦夫射志於中而擊刺格鬬期於勝豈必盡能如法樞密院亦以為元降教閲新法自合教者指授不當令兵衆例誦詔從之徽宗宣和八年詔州軍禁軍出戍外常留五分在州教閲髙宗建炎元年始頒密院教閲格法專習制禦鐵騎摧鋒破敵之藝習全副執帶出入短樁神臂弓長柄膊刀馬射穿甲施用棍棒並每年比擬春秋教閲法别立新格行下一日短樁神臂弓給箭十隻射親去垜一百二十步長柄膊刀謂長一丈二尺以上用氊皮裹為頭者餘教閲振華軍稱膊刀凖此引鬬五十次不令刀頭低墜至地并每營揀選二十人閲習放炮打親旨長柄膊刀手夲色相鬬并短樁神臂弓手長柄膊刀手施用棍棒各擊虛三十次炮手閲習施放七稍大炮排日就營教閲凡經兩閲者每五十人為一隊全副執帶教習分合一次教習分合隨隊多少分𨽻五軍謂如五百人每隊五人人即每軍兩隊之類人多依此每軍各置旗號以顔色樣制物號為别謂前軍用緋旗以飛鳥為號後軍用皂旗以龜為號左軍用青旗以蛟為號右軍用白旗以虎為號中軍用黃旗以神人為號又别以顔色樣制物號錯招旗分旗差教頭掌之舉招旗則五軍以旗相應合而成陳舉分旗則五軍以旗相應分而成隊左右前却或分藏為伏或分出為竒並舉旗為號並更鳴小金應鼓為號以備瞻望旗號不及預約伏藏之處慢打小金即伏急打應鼓即竒兵出陳趨戰急打小金即伏兵出所有春秋大教推賞自依海行格法詔依孝宗乾道二年十一月詔以二十四日幸白石教場大閲其日上幸候潮門外大教場進早膳次幸白石教場登臺上御甲胄三衙統制統領官等起居畢舉黃旗諸軍皆三呼萬嵗拜訖三衙合教為三陳馬軍上馬打團教場舉白旗三司馬軍首尾相接舉紅旗向臺合圍聼一金止軍馬各就圍地作圓形排立射生官兵隨鼓聲出馬射獐兔再一金止疊金射生官兵各歸陳隊舉黃旗射生官兵就御臺下獻所獲是日有將校能隻手運大刀者數入刀皆重數十斤賞賚諸將及士卒有差四年十月四日殿前司言凖已降旨令三司祗備教閲今躬親相視龍王堂北江岸以東茅灘一帶平地可作教場已修築將壇將來三司馬步軍並各全裝披帶衣甲執色器械至日先赴教場下方營排辦候聖駕升臺聼金鼓起居畢依資次變陳教閲所有聖駕出郊除禁衛所窠差儀衛外欲於夲司入陳馬軍內摘差護聖馬軍八百人騎執槍旗帶弓箭軍器作十六隊於儀衛前後各分八隊隊各五十人往回沿路各動隨軍鼓笛大樂及摘差夲司入教陳隊內諸軍步親隨一千人統領將官三員執弓槍帶刀斧軍器至日先赴將臺下各分左右於後壁周圍留空地三十步以容禁衛外作三重環立依已降旨窠差入教及從駕往回并圍臺擺齪二千人騎外有用不足千一百十三人又兩忠毅軍寨馬軍共二百十人騎欲於內撥三百人騎前一日於赭山以來打圍射獐兔俟教陳畢以射到獐兔至御臺下進獻從之十六日上幸茅灘抽摘諸軍人馬全裝執仗前一日於教場東列幕宿營是日三衙管軍與各軍統制統領將佐全裝披帶導駕乘馬至護聖步軍大教場亭更御甲胄到灘上登臺三衙起居畢權主管殿前司王逹奏三司人馬齊舉黃旗諸軍呼拜者三逹奏請以次變陳教閲中軍鳴角倒門角旗出營馬步軍簇隊收鼓訖連三鼓馬軍上馬步人撮起旗槍四鼓舉白旗中軍鼓聲旗應變方陳為備敵之形别髙一鼓步軍四向作禦敵之勢且戰且前馬軍出陳作戰鬬之勢别髙一鼓各分歸地分五鼓舉黃旗變圓陳為自環內固之形如前節次訖三鼓舉赤旗變鋭陳諸軍相屬魚貫斜列前利後張為衝敵之形亦依前節次訖王逹奏人馬教絶取旨擺當頭舉青旗變放教直陳收鼓訖一金止重鼓三馬軍上馬步人齪落旌坐擊刺無不中節上大悅犒賞倍之士卒歡呼謝恩如儀鳴角簇隊訖放教拽隊步人分東西引拽馬軍交頭於御臺下隨隊呈試驍鋭大刀武藝繼而進呈車炮煙槍及赭山打圍射生馬步軍統制蕭鷓巴以所獲獐鹿等就御臺下進獻人馬拽絶大閲儀注其日皇帝至祥曦殿行門禁衛等並戎服迎駕常起居皇帝至知閣門官以下修注御帶環衛官等並戎服常起居宰執以下並戎服常起居訖皇帝乘馬出從駕官從駕至候潮門大教場御幄殿下馬入幄更衣訖依已降旨惟宰執管軍知閣御帶環衛官從駕侍從已下免從駕皇帝被金甲出幄行門禁衛等迎駕奏萬福從駕官應奉臣僚並免奏萬福皇帝乘馬皇太子親王並自大教場帶全裝甲乘馬從駕宰執使相正任管軍知閣御帶環衛官並戎服從駕至教場臺下馬升臺入幄從駕官宰執親王使相正任知閣御帶環衛官升臺於幄殿分東西相向立管軍並令全裝衣甲帶御器械執骨朵升臺於幄殿稍南面西立俟入內官唱排立皇帝出幄行門禁衛等迎駕奏萬福皇帝出閣門分引殿前馬步三司統制統領官常起居訖次三司將佐以下聼鼓聲常起居次殿帥執骨朵赴御座前奏教直陳俟教閲畢再赴御座前奏教圓陳俟教閲畢再赴御座前奏教鋭陳俟教閲畢再赴御座前奏教閲畢歸侍立內侍傳旨與殿前太尉某諸軍謝恩承旨訖轉與撥發官引三司統制統領將佐再拜謝恩訖各歸夲軍皇帝起入幄更衣訖皇帝出幄皇帝坐舍人引宰執墩後立俟進御茶床舍人贊就坐宰執躬身應喏訖直身立就座進第一盞酒起立墩後俟皇帝飲酒訖舍人贊就座躬身應喏訖直身立俟宰執酒至接盞飲酒訖付殿侍次舍人贊喫食並如儀至第四盞傳旨宣勸訖御藥傳旨不拜舍人承旨贊不要拜贊就座第五盞宣勸如第四盞儀酒食畢舉御茶床舍人分引宰執於幄殿重行立御藥傳旨不拜舍人承旨訖揖宰執躬身贊不要拜各祗候直身立降踏道歸幕次皇帝起乘馬至車子院下馬皇帝出幄至車子院門樓上親王使相正任并戎服俟駕至車子院門樓上相向立得旨宣管軍知閣御帶環衛官飲酒並戎服於御座前相向立出賜親王酒再拜謝訖次賜使相正任并管軍知閣御帶環衛官酒訖逐班再拜謝訖依舊相向立次親王執盞進皇帝酒皇帝飲酒訖一班再拜謝訖俟皇帝觀看畢起降車子院門樓歸幄親王已下退從駕臣僚免奏萬福乘馬從駕皇帝乘馬出車子院門行門禁衛等迎駕奏萬福皇帝乘馬至候潮門外大教場應從駕臣僚免奏萬福應從駕官並戎服乘馬從駕回皇帝乘馬入和寧門至祥曦殿上下馬還宫餘倣此淳熙四年十二月大閲殿步兩司諸軍於茅灘十年十一月上幸龍山教場大閲淳熙間立定槍手及射射鐵簾賞格槍手以竄刺多寡為十二等支銀兩髙下有差殿步行司江上諸軍亦如之射射鐵簾以步數逺近犒賞緡錢亦有差江南西路安撫司將領陳植言軍中升加添進事藝的在硬弓徑弩有如弓弩手百步取勝使敵人不敢輕進而謂之長兵者是也萬一弓弩射不及逺致敵人衝突我陳之前則與無矢同矣今所在按拍唯務持滿為合格殊不知不過垜者為不應法既不應法雖合格復何所用乞自今以往弓手以六十步為額弩手止以一百步為額庶幾彎拾有力施放和易按拍之時必期於滿鏃合格過垜應法如是則朝廷可以得實效而無濫賞矣望以弓弩手降付有司重别參校擇而行之詔令承旨司同殿前步軍司看詳申樞密院十六年光宗即位詔以十月內擇日幸城南大教場大閲紹熙二年樞密院言殿步司諸軍弓箭手帶甲六十步射一石二斗力箭十二隻六箭中垜為夲等弩手帶甲一百步射射四石力箭十二隻五箭中垜為夲等槍手駐足舉手攛刺以四十竄並為夲等令各處主帥委統制統領官精加比較夲等外取升加最多人每軍五千五百人以上弓手取一十五名弩手取一十五名槍手取一十五名保明解赴主帥審實解密院取旨再試各選取出等髙強二名特與補轉兩官資其餘元解到比試不中人令各司每名犒設錢五貫候將來袞同再試如事藝一同弓弩手令射逺躬親比較槍手令格鬬勝負比較殿步軍司就來春拍試一次校副尉以下至白轉至承信郎住拍軍兵自長行轉至副都頭住拍詔從之寧宗慶元二年詔以今冬幸茅灘教閲嘉泰二年十月上幸候潮門外教場大閲文獻通考卷一百五十七
