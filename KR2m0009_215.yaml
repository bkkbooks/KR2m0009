body:
  text: 文獻通考卷二百十五鄱陽馬端臨貴與著經籍考四十二子小説家漢藝文志小説者流其源葢出於稗官稗傍卦切音粺草似糓而實細也李如淳曰稗音􅟈家排九章細米為粺街談巷説其細碎之言也昔王者欲知閭巷之風俗故立稗官使稱説之今世偶語為稗顔師古又曰稗音稊稗之稗不與􅟈排同也稗官小官名漢名臣奏唐林請省置吏公卿大夫至都官稗官各減十三是也街談巷語道聽塗説者之所造也孔子有曰雖小道必有可觀者焉致逺恐泥是以君子弗為也然亦弗之滅也閭里小智之所及亦使綴而不忘如或一言可采此亦芻蕘狂夫之議也漢志十五家一千三百八十篇隋志二十五部合一百五十九卷唐志三十九家四十一部三百八卷失姓名二家李恕以下不著録七十八家三百二十七卷宋三朝志一百四十六部一千一百五十二卷宋兩朝志四十六部一百一十三卷宋四朝志四十六部四百一十二卷宋中興志二百三十二家二百六十部一千九百五十五卷燕丹子三卷中興藝文志丹燕王喜太子此書載太子丹與荆軻事周氏渉筆曰燕丹荆軻事既卓佹傳記所載亦甚崛竒今觀燕丹子三篇與史記所載皆相合似是史記事本也然烏頭白馬生角機橋不發史記則以怪誕削之進金擲鼃膾千里馬肝截美人手史記則以過當削之聽琴姬得隠語史記則以徴所聞削之司馬遷不獨文字䧺深至於識見高明超出戰國以後其書芟削百家誣謬亦豈可勝計哉今世祗謂太史公好竒亦未然也又如許由伊尹范蠡亦多疑辭惟信孔氏門人傳録太過如五帝本紀孔子世家其間秕妄居多是亦未能充其類也鼂氏曰不題撰人神異經一卷陳氏曰稱東方朔撰張茂先傳十洲記一卷鼂氏曰漢東方朔撰班固贊言朔之談諧逢占射覆其事浮淺童兒牧豎莫不眩耀而後世好事者因取竒言怪語附著之朔豈謂此書之類乎陳氏曰亦稱東方朔撰二書詭誕不經皆假托也漢書本傳叙朔之辭末言劉向所録朔書具是矣世所傳他事皆非也贊又言朔之談諧其事浮淺行於衆庻而後世好事者因取竒言怪語附著之朔故詳録焉史家欲祛妄惑可謂明矣洞冥記四卷拾遺一卷鼂氏曰後漢郭憲子横撰其序言漢武明雋特異之主東方朔因滑稽浮誕以匡諫洞心於道教使冥跡之奥昭然顯著故曰洞冥陳氏曰題漢武别國洞冥記其别録又於御覽中抄出然則四卷亦非全書也凡若是者藏書之家備名數而已無之不足為損有之不足為益况於詳略尤非所計也唐志入神僊家周盧注博物志十卷盧氏注六卷殷文奎啟注晉張華讀三十車書作博物志四百武帝以為繁只作十卷鼂氏曰晉張華撰載厯代四方竒物異事兩本前六卷略同無周氏注者稍多而無後四卷周名日用西京賦曰小説九百起自虞初周人也其小説之來尚矣然不過志夢卜紀譎怪記談諧之類而已其後史臣務採異聞往往取之故近時為小説者始多及人之善惡甚者肆喜怒之私變是非之實以誤後世至於譽桓温而毁陶侃褒盧杞而貶陸贄者有之今以志怪者為上褒貶者為下云陳氏曰其書作竒聞異事華能辯龍鮓識劒氣其學固然也王子年拾遺記十卷鼂氏曰梁蕭綺叙録晉王嘉字子年嘗著書百二十篇載伏羲以來異事前世竒詭之説書逸不完綺綴拾殘缺而叙之名山記一卷陳氏曰亦稱王子年即前之第十卷大抵皆詭誕嘉苻秦時人見晉書藝術傳世説新語十卷重編世説十卷鼂氏曰宋劉義慶撰梁劉孝標注東漢以後事分三十八門唐藝文志云劉義慶世説八卷劉孝標續十卷而崇文總目止載十卷當是孝標續義慶元本八卷通成十卷耳家本有二一極詳一殊略略有稱改正未知誰氏所定然其目則同劉知㡬頗言此書非實録予亦云陳氏曰今本三卷叙録二卷叙録者近世學士新安汪藻彦章所為也首為考異繼列人物世譜姓字異同末記所引書目按唐志作八卷劉孝標續十卷自餘諸家所藏卷第多不同叙録詳之此本董令升刻之嚴州以為晏元獻公手自校定刪去重複者髙氏緯略曰義慶採擷漢晉以來佳事佳話為世説新語極為精絶而猶未為竒也梁劉孝標注此書引援詳確有不言之妙如引漢魏呉諸史乃子傳地理之書皆不必言只如晉氏一朝史及晉諸公别傳譜録文章凡一百六十六家皆出於正史之外紀載特詳聞見未接實為注書之法殷芸小説十卷鼂氏曰宋殷芸撰述秦漢以來雜事予家本題曰劉餗李淑以為非陳氏曰邯鄲書目云或題劉餗非也今此書首題秦漢魏晉宋諸帝注云齊殷芸撰非劉餗明矣故其叙事止宋初葢於諸史傳記中抄集或稱商芸者宣祖廟未祧時避諱也述異記二卷鼂氏曰梁任昉撰昉家藏書三萬卷天監中採輯前世之事纂新述異皆時所未聞将以資後來屬文之用亦博物之意唐志以為祖同所作誤也續齊諧記一卷陳氏曰梁奉朝請呉均撰齊諧志怪本荘子語也唐志又有東陽無疑齊諧志今不傳此書殆續之者歟北齊還寃志二卷陳氏曰顔之推撰古今同姓名録一卷陳氏曰梁元帝撰有陸善經者續之至五代時隋唐嘉語一卷劉餗小説三卷陳氏曰並唐右補闕劉餗鼎卿撰博異志一卷鼂氏曰題曰谷神子纂序稱其書頗箴規時事故隠姓名或曰名還古而竟不知其姓志怪之書也陳氏曰記唐初及中世事卓異記一卷鼂氏曰唐李翺撰或題云陳翺開成中在襄陽記唐室君臣功業殊異者二十七類陳氏曰記當時君臣卓絶盛事集異記二卷鼂氏曰唐薛用弱撰集隋唐間談詭之事一題古異記首載徐佐卿化鶴事陸氏集異記二卷鼂氏曰唐陸勲纂語怪之書也凡三十二事言犬怪者居三之一稽神異苑十卷鼂氏曰題云南齊焦度撰雜編傳記鬼神變化及草木禽獸妖怪譎詭事按焦度南安氐也質訥朴戇以勇力事髙帝决不能著書又卒於建元四年而所記有梁天監中事必非也唐志有焦路窮神秘苑十卷豈即此書而相傳之訛歟朝野僉載補遺三卷鼂氏曰唐張鷟文成撰分三十五門載唐朝雜事鷟自號浮休子盖取荘子其生也浮其死也休之義容齋洪氏曰僉載紀事皆瑣尾摘裂且多媟語陳氏曰其書本三十卷此特其節略耳别求之未獲㝠報記二卷陳氏曰唐吏部尚書京兆唐臨本徳撰辨疑志三卷陳氏曰唐宣武行軍司馬呉郡陸長源撰辨俚俗流傳之妄宣室志十卷鼂氏曰唐張讀聖朋撰纂輯仙鬼靈異事名曰宣室志者取漢文召見賈生論鬼神之義苖台符為之序封氏見聞記五卷鼂氏曰唐封演撰分門記儒道經籍人物地里雜事且辨説訛謬葢著其所見聞如此陳氏曰前紀典故末及雜事頗有可觀劉公嘉話一卷鼂氏曰唐韋絢撰劉公謂禹錫絢字文明執誼子也咸通中節度義武幼從學於禹錫録其話言戎幕閑談一卷鼂氏曰唐韋絢撰太和中為李徳裕從事記徳裕所談平泉草木記一卷鼂氏曰唐李徳裕撰記其别墅竒花異草樹石名品仍以嘆詠其羙者詩二十餘篇附於後平泉即别墅地名元怪録十卷鼂氏曰唐牛僧孺撰僧孺為宰相有聞於世而著此等書周秦行紀之謗盖有以致之也陳氏曰唐志十卷又言李復言續録五卷館閣書目同今但有十一卷而無續録續元怪録十卷鼂氏曰李復言續僧孺書分仙術感應三門周秦行紀一卷鼂氏曰唐牛僧孺自叙所遇異事賈黄中以為韋瓘所撰瓘李徳裕門人以此誣僧孺洽聞記三卷鼂氏曰唐鄭常撰記古今神異詭譎事凡百五十六條或題曰鄭遂甘澤謡一卷鼂氏曰唐袁郊撰載譎異事九章咸通中久雨卧疾所著故曰甘澤謡陳氏曰咸通戊子自序以其春雨澤應故有甘澤成謡之語以名其書河東記三卷鼂氏曰唐薛漁思撰亦記譎怪事序云續牛僧孺之書酉陽雜爼二十卷續酉陽雜爼十卷鼂氏曰唐叚成式撰自序云縫掖之徒及怪及戯無侵於儒詩書為大羮史為折爼子為醯醢大小二酉山多藏竒書故名篇曰酉陽雜爼分三十門為二十卷其後續十卷陳氏曰所記固多譎怪其標目亦竒詭如天咫玉格壺史貝編尸穸之類成式文昌之子因話録六卷鼂氏曰唐趙璘撰字澤章大中時為衢州刺史記唐史逸事劇談録三卷鼂氏曰康駢字駕言撰乾符中登進士第書咸載唐世故事唐語林十卷鼂氏曰未詳撰人效世説體分門記唐世名言新増嗜好等十七門餘皆仍舊史話三卷鼂氏曰不題撰人自後漢及江左朝野雜事皆記之資暇三卷鼂氏曰唐李匡義濟翁撰序稱世俗之談類多訛誤雖有見聞黙不敢證故著此書上篇正誤中篇譚原下篇本物以資休暇云芝田録一卷鼂氏曰叙謂嘗憇緱氏故取潘岳酉征賦名其書記隋唐雜事未詳何人總六百條朝廷卓絶事一卷鼂氏曰唐陳岠撰記唐朝忠賢卓絶五十事杜陽雜編三卷鼂氏曰唐蘇鶚字徳祥撰光啟中進士家武功杜陽川雜録廣徳以至咸通時事雲溪友議三卷鼂氏曰唐范攄撰記開元以後事攄五溪人故以名其書陳氏曰咸通時人唐志三卷今本十二卷談賔録十卷鼂氏曰唐朝璩子温撰皆唐朝史之所遺文武間人乾􅍧子三卷鼂氏曰唐温庭筠撰序謂語怪以悦賔無異􅍧味之適口故以乾􅍧名書陳氏曰序言不爵不觥非炰非炙能悦諸心聊甘衆口庻乎乾􅍧之義􅍧與饌同字從肉見古禮經尚書故實一卷鼂氏曰唐李綽編崇文總目謂尚書即張延賞也綽記延賞所談故又題曰尚書談録按其書稱嘉貞為四世祖疑非延賞也陳氏曰其書首言賔䕶尚書河東張公三代相門謂嘉貞延賞𢎞靖𢎞靖盧龍失御貶賔客分司綽唐末人未必及𢎞靖𢎞靖之後文規次宗彦逺皆不登八座未詳所謂唐志即以為延賞尤不然家學要録一卷鼂氏曰唐栁珵採其曽祖彦昭祖芳父冕家集所記累朝典章因革時政得失著此録小説之尤者也常侍言㫖一卷鼂氏曰唐栁珵記其世父芳所著凡六章末有劉出求及上清傳附異聞集十卷鼂氏曰唐陳翰編以傳記所載唐朝竒怪事類為一書陳氏曰唐末人見唐志而第七卷所載王魁乃本朝事當是後人勦入之耳聞竒録一卷陳氏曰不著名氏當是唐末人松窻録一卷鼂氏曰唐韋叡撰記唐朝故事瀟湘録十卷陳氏曰唐校書郎李隠撰館閣書目云爾唐志作栁詳未知書目何據也幽閑鼓吹一卷鼂氏曰唐張固撰紀唐史遺事二十五篇懿僖間人知命録一卷陳氏曰唐劉愿撰凡二十事前定録一卷陳氏曰唐崇文館校書鍾輅撰凡二十二事别本又有續録二十四事雜纂一卷陳氏曰唐李商隠義山撰俚俗常談鄙事可資戯笑以類相從今世所稱殺風景葢出於此又有别本稍多皆後人附益巽岩李氏曰用諸酒杯流行之際可謂善謔其言雖不雅馴然所訶誚多中俗病聞者或足以為戒不但為笑也盧氏雜説一卷陳氏曰唐盧言撰廬陵官下記二卷陳氏曰段成式撰為吉州刺史時唐缺史三卷陳氏曰唐髙彦休撰自號參寥子乾符中人北里志一卷鼂氏曰唐孫棨撰記大中進士游俠平康事孫光憲言棨之意在譏盧相擕也葢擕之女與其甥通擕知之遂以妻之殺家人以滅口云五泉筆端三卷又别一卷陳氏曰不著名氏有序中和三年作末有䟦云扶風李昭徳家藏之書也即故淮海相公孫又稱黄巢䧟洛之明年䟦亦不知何人别一本號玉泉子比此本少數條而多五十二條無序䟦録其所多者為一卷三水小牘三卷陳氏曰唐皇甫牧遵美撰天祐中人三水者安定屬邑也醉鄉日月三卷陳氏曰唐皇甫松子竒撰唐人飲酒令此書詳載然今人皆不能暁也龍城録一卷陳氏曰稱栁宗元撰龍城謂栁州也羅浮梅花夢事出其中唐志無此書葢依托也或云王銍性之作朱子語録曰栁文後龍城録雜記王銍所為也子厚叙事文字多少筆力此記衰弱之甚皆寓古人詩文中不可暁知底於其中似暗影出唐朝新纂三卷陳氏曰融州副史石文徳撰豪異秘纂一卷陳氏曰無名氏所録五事其扶餘國王一則所謂虬須客者也樹萱録一卷陳氏曰不著名氏序稱纂尚書滎陽公所談者亦不知何人又云普聖圜丘之明年普聖者僖宗由普王踐位也書雖見唐志今亦未必真本或云劉燾無言所為也續樹萱録一卷容齋洪氏隨筆曰頃在秘閣抄書得續樹萱録一卷其中載隠君子元撰夜見呉王夫差與唐諸詩人吟詠事李翰林詩曰芙蓉露濃紅壓枝幽禽感秋花畔啼玉人一去未回馬梁間燕子三見歸張司業曰緑頭鴨兒咂萍藻採蓮女郎笑花老杜舍人曰鼓鼙夜戰北忩風霜葉㳂階貼亂紅三人皆全篇杜工部曰紫領寛袍漉酒巾江頭蕭散作閑人白少傅曰不因霜葉辭林去的當山翁未覺秋李賀曰魚鱗甃空排嫩碧露桂稍寒掛團璧三人皆未終篇細味其體格語句往往逼真後閲秦少游集有秋興九首皆擬唐人前所載咸在焉闗子東為秦集序云擬古數篇曲盡唐人之體正謂是也何子楚云續萱録乃王性之所作而托名他人今其書才有三事其一曰賈博諭一曰全若虛一曰元撰詳命名之義葢取諸子虚亡是公云雲仙散録一卷陳氏曰稱唐金城馮贄撰天復元年叙馮贄者不知何人自言取家世所蓄異書撮其異説而所引書名皆古今所不聞且其記事造語如出一手政如世俗所行東坡杜詩注之類然則所謂馮贄者及其所蓄書皆子虚烏有也亦可謂枉用其心者矣容齋洪氏隨筆曰俗間所傳淺妄之書如所謂雲仙散録老杜事實之類皆絶可笑然士大夫或信之孔傳續六帖採摭唐事殊有工而悉載雲仙録中事自穢其書近世南劒州學刋散録可毁文獻通考卷二百十五
