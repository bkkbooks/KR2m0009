body:
  text: 文獻通考卷一百四十七鄱陽馬端臨貴與著樂考二十散樂百戲散樂非部伍之正聲其來尚矣其雜戲蓋起於秦漢有魚龍曼延假作獸以戲髙絙鳳皇安息五桉並石季龍所作見鄴中記都盧尋橦今之緣竿見西京賦丸劒丸一名鈴見西京賦戲車山車興動雷見李尤長樂觀賦跟挂腹旋並緣竿所作見傳元西都賦吞刀履索吐火並見西京賦激水轉石嗽霧扛鼎並見李尤長樂觀賦象人見西漢書韋昭曰今之假面怪獸舍利之戲若此之類不為不多矣然其詭怪百出驚俗駭觀非所以善民心化民俗適以滔堙心耳歸於淫蕩而已後漢天子臨軒設樂舍利獸從西方來戲於殿前激水化成比目魚跳躍嗽水作霧翳日而化成黃龍長八丈出水遊戲輝輝日光以兩繩繫兩柱相去數丈二倡女對舞行於繩上切肩而不傾如是雜變總名百戲江左猶有髙絙紫鹿跂行鱉食齊王捲衣笇鼠夏育扛鼎巨象行乳神龜抃戲背負靈嶽桂樹白雪畫地成川之伎晉成帝咸康七年散騎侍郎顧臻表曰末代之樂設禮外之觀逆行連倒四海朝覲言觀帝庭而足以蹈天頭以履地反天地之順傷彛倫之大乃命太常悉罷之其後復髙絙紫鹿又有天台山伎齊武帝嘗遣主書董仲民按孫興公賦造莓苔石橋道士捫翠之狀尋省焉梁又設跳鈴劒擲倒獼猴幢青紫緑緣髙絙變黃龍弄龜等伎陳氏因之後魏道武帝天興六年冬詔太樂總章鼓吹增修雜戲造五兵角抵麒麟鳳皇仙人長蛇白象白武及諸畏獸魚龍辟邪鹿馬仙人車髙絙百尺長趫幢跳丸以備百戲大饗設之於殿前明元帝初又增修之撰合大曲更為鐘鼓之節角抵戲本六國時所造秦因而廣之漢興雖罷至武帝復采用之元封中既廣開上林穿昆明池營千門萬户之宫設酒池肉林以饗四夷之客作巴渝都盧海中碭極李奇曰碭極樂名漫衍魚龍角抵以觀示之角者角其伎也兩兩相當角及伎藝射御也蓋雜伎之總稱云或曰蚩尤氏頭有角與黃帝鬬以角抵人今冀州有樂名蚩尤戲其民兩兩載牛角而相抵漢造此戲豈其遺象邪北齊神武平中山有魚龍爛漫俳優侏儒山車巨象拔井種瓜殺馬剝驢等奇怪異端百有餘物名為百戲後周武帝保定初詔罷元會殿庭百戲宣帝即位鄭譯奏徴齊散樂並會京師為之蓋秦角抵之流也而廣召雜伎增修百戲魚龍漫衍之伎常陳於殿前纍日繼夜不知休息隋文帝開皇初周齊百戲並放遣之煬帝大業二年突厥染干來朝帝欲夸之總追四方散樂大集東都於華林苑積翠池側帝令宫女觀之有舍利繩柱等如漢故事又為夏育扛鼎取車輪石臼大盆器等各於掌上而跳弄之并二人戴竿其上舞忽然騰透而換易千變萬化曠古莫儔染干大駭之自是皆於太常教習每歲正月萬國來朝留至十五日於端門外建國門內綿絙八里列為戲場百官赴棚夾路從昏達曙以縱觀之至晦而罷伎人皆衣錦繡繒綵其歌者多為婦人服鳴環佩飾以花髦者殆三萬人初課京兆河南製此服而兩京繒錦為之中虛六年諸夷大獻方物突厥啓人以下皆國主親來朝賀乃於天津街盛陳百戲自海內凡有伎藝無不總萃崇侈器玩盛飾衣服皆用珠翠金銀錦罽絺繡其營費巨億萬關西以安德王雄總之東都以齊王暕總之金石匏革之聲聞數十里外彈絃擫管以上萬八千人大列炬火光燭天地百戲之盛近古無比自是每年以為常焉唐髙祖即位孫伏伽上言百戲散樂大非正聲隋末大見崇用是謂淫風不可不改乃者太常於民間借婦女裙襦五百餘具以充散樂之服欲於元武門遊戲臣竊思之非詒厥孫謀之道也傳曰樂則韶武以此言之散樂非功成之樂請並廢之髙宗時天竺獻伎能自斷手足刳剔腸胃帝惡其驚人敕西域關津不得令入中國大抵散樂雜戲多幻術皆出西域始於善幻人至中國後漢安帝時自是歷代有之睿宗時婆羅門獻樂舞人倒行而以足舞極銛刀鋒倒植於地抵目就創以歷臉中又於背上吹篳篥其腹上曲終而亦無傷又伏伸其手兩人躡之旋身繞手百轉無已漢代有橦末伎又有盤舞晉代加之以杯為之杯盤舞梁有長橋伎跳鈴伎躑倒伎跳劒伎今並存又有舞輪伎蓋今之戲車輪者透三峽伎蓋今之透飛梯之類也髙絙伎蓋今之戲繩者也梁有獼猴幢伎今有緣竿伎又有獼猴緣竿伎未審何者為是又有弄碗珠伎歌舞戲有大面撥頭踏搖娘窟􅓓子等戲元宗以其非正聲置教坊於禁中以處之婆羅門樂七篳篥二齊鼓一散樂用橫笛一拍板一腰鼓三其餘雜戲變態多端皆不足稱也代面出於北齊蘭陵王長恭才武而貌美常著假面以對敵嘗擊周師金墉城下勇冠三軍齊人壯之為此舞以效其指麾擊刺之容謂之蘭陵王入陳曲陳氏樂書曰象人之戲始於周之偃師而百戲之作見於後漢故大豫樂少府屬官承革令典黃門鼓吹百戲師二十七人北齊清商令丞掌百戲及鼓吹樂大業中諸夷來貢方物乃於天津街盛陳百戲動以萬餘人唐宣宗每幸十六宅諸王無少長悉命預坐必大合樂列百戲則百戲之樂其所從來久矣然隋皇陳之天津街以吒夷人唐帝用之內殿以宴百辟非所以正百官而風天下也君子無取焉撥頭出西域胡人為猛獸所噬其子求獸殺之為此舞以象也踏搖娘生於隋末河內有人醜貌而耽酒常自號郎中醉歸必毆其妻妻美色善自歌乃歌為怨苦之詞河朔演其曲而被之管絃因寫其妻之容妻悲訴每搖其身故號踏搖云近代優人頗改其制度非舊音也窟􅓓子亦曰魁􅓓子作偶人以戲善歌舞本喪樂也漢末始用之於嘉會北齊後主髙緯尤所好髙麗之國亦有之今閭市盛行焉若尋常享會先一日具坐立部樂名上太常太常封上謂所奏御注而下及會先奏坐部伎次奏立部伎次奏蹀馬次奏散樂然所奏部伎並取當時進止無凖定排闥戲唐昭宗光化中孫德昭之徒刃劉季述帝反正命樂工作樊噲排闥戲以樂焉角力戲壯士裸袒相搏而角勝負每羣戲既畢左右軍雷大鼓而引之豈亦古者習武而變歟瞋面戲唐有此戲其狀以手舉足加頸上時劉吃陀奴能不用手而腳自加頸何其妙邪衝狹戲透劒門戲漢世卷簟席以矛插其中伎兒以身投從中過之張衡所謂衝狹燕濯胸突鋒鋩也後世攢劒為門伎者裸體擲度往復不傷亦衝狹之變歟蹴掬戲蹴毬戲踏鞠之戲蓋古兵勢也漢兵家有蹴鞠二十五篇李尤鞠室銘曰員鞠方牆放象隂陽法月衝對二六相當霍去病在塞外穿域踏鞠亦其事也蹴毬蓋始於唐植兩修竹髙數丈絡網於上為門以度毬毬工分左右朋以角勝負否豈非蹴鞠之變歟踏毬戲踏毬用木毬髙尺餘伎者立其上圎轉而行也絙戲漢世以大絲繩繫兩柱頭間相去數丈兩倡對舞行於繩上對面道逢肩相切而不傾張衡所謂跳丸劒之揮霍走索上而相逢是也梁三朝伎謂之髙絙或曰戲繩今謂之踏索焉劇戲宋朝戲樂鼓吹部雜劇員四十二雲韶部雜劇員二十四鈞容直雜劇員四十亦一時之制也五鳳戲唐明皇在東洛大酺於五鳳樓下命三百里內守令率聲樂赴闕較勝負而賞罰焉時河內守令樂工數百人於車上皆衣以錦繡服箱之牛蒙以猛獸皮及為犀象形狀觀者駭目時元魯山遣樂工數十人聨袂歌于蒍于之文明皇聞而嘆之曰賢人之言也其後謂宰臣曰河內之人其在塗炭乎促命召還授以散秩每賜宴設酺會御勤政樓昧爽陳仗盛列旗幟或被金甲或衣短後繡袍太常陳樂衛尉張幕後諸蕃酋長就食郡邑教坊大陳山車旱船尋橦走索丸劒角抵戲馬鬬雞又令宫嬪數百飾珠翠衣錦繡自帷內出擊雷鼓為破陳太平上元等樂又引大象犀牛入場拜舞動中音律每正月望夜又御勤政樓作樂達官戚里並設看樓觀之夜闌遣宫嬪於樓前歌舞何其盛歟奈何不知好樂無荒而君臣幾於同謔卒墮天寶之禍豈不誠有以召之邪猿騎戲鳳皇戲石虎鄴中記述虎正會殿前作樂髙絙龍魚鳳皇安息五桉之屬莫不畢備有額上緣橦至上鳥飛左回右轉又以橦著口齒上亦如之設馬車立木橦其車上長二丈橦頭安橫木兩伎各坐木一頭或鳥飛或倒挂又依伎兒作獼猴之形走馬上或在馬脅或在馬頭或在馬尾走如故名為猿騎初晉中朝元會設卧騎倒顛騎自東華門馳至神虎門皆其類也其術亦可謂妙矣奈何戎狄之戲非中華之樂也在石虎樂之可也若真主樂之豈所宜哉今軍中亦有馬戲伎者其名甚衆但不謂猿騎爾參軍戲樂府雜録述弄參軍之戲自後漢館陶令石聘有贓犯始也蓋和帝惜其才特免其罪每遇宴樂即令衣白夾衫命優伶戲弄辱之經年乃釋謂之後為參軍者誤也唐開元中有李仙鶴善為此戲明皇特授韶州同正參軍是以陸鴻漸撰詞云韶州參軍蓋由此矣武宗朝有曹叔度劉泉水咸通以來有范博康上官唐卿吕敬儉馮季臯亦其次也趙書謂石勒參軍周延為館陶令如此豈傳聞之誤邪假婦戲唐大中以來孫乾飯劉璃瓶郭外春孫有態善為此戲僖宗幸蜀時戲中有劉真者尤能之後隨車駕入都籍於教坊蘇葩戲後周士人蘇葩嗜酒落魄自號郎中每有歌場輒自入歌舞故為是戲者衣緋袍戴席帽其面赤色蓋象醉舞也何其辱士類邪唐鼓架部非特有蘇郎中之戲至於代面鉢頭踏搖娘羊頭渾脫九頭師子弄白馬益錢尋橦跳丸吞刀吐火旋盤筋斗悉在其中矣都盧伎緣橦之伎衆矣漢武帝時謂之都盧都盧國名其人體輕而善緣也又有跟挂腹旋皆因橦以見伎張衡西京賦侲童程材上下翩翩突倒投而跟挂若將絶而復聨百馬同轡騁足並馳橦末之伎態不彌彎弓射乎西羌又顧發乎鮮卑此皆橦上戲作之狀至梁時設三朝大會四十九等其二十三刺長追華橦伎三十二青絲橦伎三十三一繖華橦伎三十四雷橦伎三十五金輪橦伎三十六白虎橦伎三十八獼猴橦伎三十九啄木橦伎四十五案橦呪願伎雖有異名要之同為緣橦之一戲也唐曰竿木今曰上竿蓋古今異名而同實也鳳書伎宋齊以來三朝設鳯凰銜書伎是日侍中於殿前跪取其書舍人受書升殿跪奏皆有歌詞梁武帝即位克自抑損乃下詔罷之後魏有鳳凰伎亦其類也藏挾伎藏挾幻人之術蓋取物象而懷之使觀者不能見其機也雜旋伎蓋取雜器圓旋於竿標而不墜也弄槍伎蓋工裸帶數環捲一工立數十步外連擲十餘槍以度之既畢乃以一捲受其槍也蹴瓶伎蓋蹴其瓶使上於鐡鋒杖端或水晶丸與瓶相值回旋而不失也擎戴伎蓋兩伎以手相抵戴而行也拗腰伎蓋翻折其身手足皆至於地以口銜器而復立也飛彈伎蓋置丸於地反張其弓飛丸以射之也宋朝雜樂百戲有踏毬蹴毬踏蹻藏挾雜旋弄鎗鋺瓶齪劒踏索尋橦筋斗拗腰透劒門飛彈丸女伎百戲之類皆隸左右軍而散居每大饗燕宣徽院按籍召之錫慶院宴會諸王賜會及宰相筵設特賜樂者即第四部充鼓吹鼓吹者蓋短簫鐃歌蔡雍曰軍樂也黃帝岐伯所作以揚德建武勸士諷敵也周官曰師有功則凱樂左傳晉文公勝楚振旅凱而入司馬法曰得意則凱歌雍門周説孟嘗君鼓吹於不測之泉説者云鼓自一物吹自竽籟之屬非簫鼓合奏别無一樂之名也然則短簫鐃歌此時未名鼓吹矣應劭漢鹵簿圖惟有騎執菰菰即笳不云鼓吹而漢代有黃門鼓吹漢享宴食舉樂十三曲與魏代鼓吹長簫伎簫伎録並云絲竹合作執節者歌又建初録云務成黃爵元雲逺期皆騎吹曲非鼓吹曲此則列於殿庭者為鼓吹今之從行鼓吹為騎吹二曲異也又孫權觀魏武軍作鼓吹而還應是此鼓吹魏晉代給鼓吹甚輕牙門督將五校悉有鼓吹晉江左初臨川太守謝摛每寢夢聞鼓吹有人為占之曰君不得生鼓吹當得死鼓吹摛擊杜韜戰沒追贈長水校尉葬給鼓吹焉謝尚為江夏太守詣安西將軍庾翼於武昌咨事翼以鼓吹賞尚射破便以其副鼓吹給之齊梁至陳則甚重矣各製曲詞以頌功德焉至隋亡陳氏樂書曰隋大駕鼓吹有掆鼓長三尺朱髹其上工人青地苣文大業中煬帝宴饗用之唐開元禮儀維曰掆鼓小鼓也按圖鼓上有蓋常先作之以引大鼓亦猶雅樂之奏􅉧與金鉦相應皆有曲焉律書樂圖云掆鼓一面十揲一曰驚雷震二曰猛虎駭三曰摯鳥擊四曰龍媒蹀五曰靈夔吼六曰雕鶚爭七曰壯士奮怒八曰熊羆哮吼九曰石蕩崖十曰波蕩壑並各有辭其辭無傳焉太常鼓吹前部用之中宗時欲自妃主及五品以上母妻婚葬之日特給鼓吹宫官亦然是不知鼓吹之作本為軍容也昔黃帝涿鹿有功以為警衛鉦鼓有靈夔孔雀雕鶚爭石墜崖壯士怒之類自昔功臣備禮得用之矣今夫郊祀天地唯有宫縣而無案架則知軍樂之用尚不給於神祀况可接於閨閫者哉又曰隋書鼓吹車上施層樓四角金龍垂流蘇羽葆唐羽葆之制縣於架上其架飾以五采流蘇植羽也蓋鐃鼓羽葆鼓皆飾以丹青形制頗類掆鼓今太常鼓吹後部用之律樂圖云羽葆一部五色十八曲一太和二休和三七德四騶虞五基王化六纂唐風七厭炎精八肇皇運九躍龍飛十殄馬邑十一興晉陽十二濟渭隂十三應聖期十四御宸極十五寧兆庶十六服遐荒十七龍池十八破陳樂然則羽葆其節奏如此而已破陳終焉豈後世賞軍功之樂邪昔陶侃平蘇峻除侍中太尉加羽葆鼓吹則其為賞功之樂可知矣今鼓吹騎從者自羽葆鼓等皆馬上擊之其制與隋唐異也唐文宗太和三年八月太常禮院奏謹按凱樂鼓吹之歌曲也周官大司樂王師大獻則奏凱樂注云獻功之樂也又司馬之職師有功則凱樂獻於社注云兵樂曰凱司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝楚振旅凱以入魏晉以來鼓吹曲章多述當時戰功是則歷代獻捷必有凱歌太宗平東都破宋金剛其後蘇定方執賀魯李績平髙麗皆備軍容凱歌入東都謹檢正觀顯慶開元禮書並無儀注今參酌古今備其陳設及奏歌曲之儀如後凡命將征討有大功獻俘馘者其日備神策兵衛於東門外如獻俘常儀其凱樂用鐃吹二部笛篳篥簫笳鐃鼓每色二人歌工二十四人樂工等乘馬執樂器次第陳列如鹵簿之式鼓吹令丞前導分行於兵馬俘馘之前將入都門鼓吹振作迭奏破陳樂應聖期賀朝歡君臣同慶樂等四曲破陳樂詞曰受律辭元首相將討叛臣咸歌破陳樂共賞太平人應聖期詞曰聖德期昌運雍熙萬宇清乾坤資化育海嶽共休明闢土欣耕稼銷戈遂偃兵殊方歌聖澤執贄賀升平賀朝歡詞曰四海皇風被千年德永清戎衣更不著今日告功成君臣同慶樂詞曰主聖開昌歷臣忠奉大猷君看偃革後便是太平秋候行至太社及太廟門工人下馬陳列於門外據周禮大司樂注云獻於祖大司馬云先凱樂獻於社謹詳禮義則社廟之中似合奏樂伏以尊嚴之地鐃吹歡譁既無明文或乖肅敬今請並各於門外陳設不奏歌曲俟告獻禮畢復導引奏曲如儀至皇帝所御樓前兵仗旌門外二十步樂工皆下馬徐行前進兵部尚書介胄執鉞於旌門內中路前導周禮師有功則大司馬左執律右秉鉞以先凱樂注云律所以聽軍聲鉞所以示將威今吹律聽聲其術久廢請以秉鉞以存禮文次協律郎二人公服執麾亦於門外分導鼓吹令丞引樂工等至位立定太常卿於樂工之前跪具官臣某奏事請奏凱樂協律郎舉麾鼓吹大振作遍奏破陳樂等四曲樂闋協律郎偃麾太常卿又跪奏樂畢兵部尚書太常卿退樂工等並旌門外立訖然後引俘馘入獻及稱賀如别儀别有獻俘儀注如俘囚引出方退伏請宣付當司編入新禮乃令樂工教習依奏陳氏樂書曰唐六曲曰凡軍鼓之制有三一曰銅鼓二曰戰鼓三曰鐃鼓其制皆五采為重蓋究觀樂圖鐃鼓鼓吹部用之唐朝特設為儀而不擊爾然劉巘定軍禮謂鼓吹未知其始漢以雄朔野而有之鳴笳以和簫非八音也隋大業中鐃鼓十二曲供大駕六曲供皇太子三曲供王公宴饗所用也觀漢有鼓吹鐃歌十八曲晉有鼓吹鐃歌古辭十六篇宋有鼓吹鐃歌十篇然則鐃鼓豈非鼓吹鐃歌之鼓邪唐自鐃鼓以下屬鐃鼓部律書樂圖云鐃軍樂也其部四色七曲一曰破陳樂二曰上車三曰行車四曰向城五曰平安六曰歡樂七曰太平各有詞也宋朝鹵簿大駕六引官開封令無鼓吹開封牧二十三人掆鼓金鉦各一大鼓十鐃鼓一簫笳大橫吹各二笛及簫篳篥及笳各一太常卿同上司徒六十四人掆鼓金鉦各一大鼓長鳴各十六鐃鼓一簫笳大鼓吹各四節鼓一笛及簫篳篥及笳各四御史大夫兵部尚書並同開府牧其大駕前部千六十四人鼓吹令二員府史四主帥八掆鼓金鉦各十二主帥二十長鳴一百二十主帥四鐃鼓十二歌拱宸管或以篳篥充簫笳各二十四主帥十大橫吹百二十節鼓二笛簫篳篥笳桃皮篳篥各二十四主帥四掆鼓金鉦各十二主帥十小鼓中鳴各百二十主帥四羽葆鼓十二歌拱宸管或以笛充簫笳各二十四後部四百八十人鼓吹丞二員典事四主帥四羽葆鼓十二歌拱宸管或以篳篥充簫各二十四主帥二笳二十四主帥四鐃鼓十二歌拱宸管以笛充簫笳各二十四主帥八小橫吹百二十笛篳篥笳桃皮篳篥各二十四若親祠輿駕出宫則宣德門太廟南郊警場千一百一十六人鼓吹令丞各二員職掌四府典史八都知一院官録事一歌篳篥簫笛共百八金鉦二十四奏嚴鼓鳴角大橫吹小橫吹各百二十歌笛各九十六節鼓三笳百四十四篳篥九十六桃皮篳篥四十八通主轄人員共千二百七十五凡大駕鼓吹通五引用工千五百三十法駕三分損一用二引開封牧御史大夫各十六工小駕八百一十六工初太祖受命承五代之後損省浮長而鼓吹局工多闕每舉大禮一切取於軍隸以足之至一品以下葬應給者亦取於營隸後遂為常大禮車駕宿齋所止夜設警場每奏先作金鉦四次大角四次金鉦二十四次大角鼓百二十次橫吹等作一曲如是者三疊謂之一奏三奏少止五分其夜而奏之乘輿至青城祀前一日御闕門觀嚴警亦勞賜焉若巡幸則夜奏以行宫前人數減於大禮用八百八十人太祖皇帝建隆四年十一月南郊鹵簿使張昭言凖舊儀鑾駕將出宫入廟赴南郊齋宿皆有夜警晨嚴之制唐憲宗親郊時禮儀使髙郢奏稱據鼓吹局申齋宿夜奏嚴是夜警恐與捶鼓版奏三嚴事不同况其時不作樂懸不鳴鼓吹務要清潔其致齋夜奏三嚴請不行詳酌禮典奏嚴之設本緣警備事體與作樂全殊况齋宿之夜千乘萬騎宿於儀仗之中茍無鼓漏之徼巡何以警衆多之耳目望依舊禮施行從之乾德四年判太常寺和峴言郊祀有夜警晨嚴六州十二時及鼓吹回仗時駕前導引三曲見闕樂章望差官撰進下寺教習應奉詔諸樂章令峴修撰教習供應程氏演繁露曰六州歌頭本鼓吹曲也近世好事者倚其聲為吊古詞如秦亡草昧劉項起吞併者是也音調悲壯又以古興亡事實文之聞其歌使人慷慨良不與豔詞同科誠可喜也本朝鼓吹止有四曲十二時導引降仙臺并六州為四每大禮宿齋或行幸遇夜每更三奏名為警場真宗至自幸亳親饗太廟登歌始作聞奏嚴遂詔自今行禮罷乃奏政和七年詔六州改名崇明祀然天下仍謂之六州其稱謂已熟也今前輩集中大祀大恤皆有此詞先是角工不足常取於州縣及營兵以充祥符中命籍兵二百餘工使長隸太常以閲習焉凡大樂充庭則鼓吹局設熊羆十二案於宫懸之外率一案用十工龍鳯鼓一金錞一羽葆鼓一歌工三簫二笳二凡大角三曲警嚴用之大梅花小梅花曲鼓吹五曲御製奉禋歌舊有六州十二時導引降仙臺真宗崇奉真聖亦設儀衛故别有導引二曲也其餘大小鼓橫吹曲悉不傳唐末大亂舊聲皆盡國朝惟大角傳三曲而已其鼓吹四曲悉用教坊新聲車駕出入奏導引及降仙臺警嚴奏六州十二時皆隨月用宫仁宗既定雅樂并及鼓吹且謂警嚴一奏不應再用其曲親製奉禋歌以備三疊又詔聶冠卿李照造辭以配聲下本局歌之是年郊祀遂用焉皇祐親饗明堂御製合宫歌熙寧親郊導引還青城增降仙臺曲仁宗皇祐二年帝謂輔臣曰明堂直端門而致齋於內奏嚴於外恐失靜恭之意因下太常禮議而議者言警場本古之鼓鼜所謂夜戒守鼓者也故王者師行吉行皆用之今乘輿宿齋其儀衛本緣祀事則警場亦因以警衆非徒取觀聽之盛恐不可廢若以奏嚴之音去明堂近則請列於宣德門百步之外俟行禮時罷奏一嚴亦足以稱虔恭祀事之意帝復謂輔臣曰既不可廢則祀前一夕邇於接神宜罷之神宗元豐中獻言者論鼓吹樂以為害雅欲調治之令與正聲相得楊傑言正樂者先王之德音所以感召和氣格降鬼神移變風俗而鼓吹者軍旅之樂耳蓋鼓角橫吹起於西域聖人存四夷之樂所以一天下也存軍旅之樂示不忘武備也鞮鞻氏掌四夷之樂與其聲歌祭祀則吹而歌之燕亦如之今大祀車駕所在則鼓吹與武嚴之樂陳於門而更奏之以備警嚴大朝會則鼓吹列於宫架之外其器既異先代之器而施設槩與正樂不同國初以來奏大樂作鼓吹備而不作同名為樂而用實異雖其音聲間有符合而宫調稱謂不可淆亂故大樂以十二律吕名之鼓吹之樂則曰正宫之類而已若以律吕變易胡部宫調則名混同而樂相紊亂矣遂不復行徽宗政和七年議禮局奏曰古者王師克捷必奏凱所以耀武事旌勳伐黃帝涿鹿有功命岐伯作凱樂以勸士諷敵故其曲有靈夔吼雕鶚爭石墜崖壯士怒之名周官王師大獻則令奏凱樂樂師凡軍大獻則教凱歌漢有朱鷺等十八曲魏晉而下莫不沿存尚皆謂鐃歌鼓吹曲各易其名以紀功烈今所設鼓吹唯備警衛而己未有鐃歌之曲非所以彰休德而揚偉績也乞詔儒臣討論撰述因事命名審協聲律播之鼓吹俾工師習之凡王師大獻則令鼓吹具奏以聳羣聽從之十二月詔六州改名崇明祀十二時改名稱告禮導引改名熙事備成六引內者備而不作大禮車駕宿齋所止夜設警場用一千二百七十五人奏嚴用金鉦大角大鼓角用大小橫吹篳篥簫笳笛歌六州十二時每更二奏之髙宗紹興十三年太常寺言將來郊祀大禮排設大駕鹵簿儀仗并六引共用鼓吹八百八十四人內鼓吹令丞二人昨在京本寺自有令丞如闕以次充攝目今並闕人又府史典史各四人舊係本寺人吏充攝緣人吏將來並充贊者等已上並乞差殿司指揮使以上充又指揮使二人舊係殿司差撥又帥兵官四十六人舊係殿前馬步二司差受宣人充今乞並令逐司依舊歌色四十八人金鉦十七人掆鼓十七人大鼓一百一十人小鼓六十人長鳴六十人中鳴六十人鐃鼓十七人拱宸管三十六人羽葆鼓十二人􅓋篥二十九人桃皮􅓋篥二十四人笳八十七人大橫吹七十人小橫吹六十人簫八十七人笛二十九人節鼓一名已上舊係差本寺鼓吹局樂工一百餘人不足並於逐司貼差雜攢樂人充今鼓吹局樂工節目並闕其前項合用人數並乞令逐司依名色人數下諸軍及將下剗刷稍諳樂藝之人從之先是在京排設嚴更警場用奏嚴鼓一百二十四面金鉦二十四面鳴角一百二十隻至是以地步窄狹難以排設止用鼓角各六十金鉦二十並差用殿前司中軍人物孝宗隆興二年兵部言奉明詔大禮乘輿服御除玉輅平輦等外所用人數並從省約內鼓吹合用八百四十一人止用五百八十八人警場合用二百七十五人止用一百三十人按漢志言漢樂有四其三曰黃門鼓吹樂天子宴羣臣之所用四曰短簫鐃歌樂軍中之所用則鼓吹與鐃歌自是二樂而其用亦殊然蔡雍言鼓吹者蓋短簫鐃歌而俱以為軍樂則似漢人已合而為一但短簫鐃歌漢有其樂章魏晉以來因之大槩皆敘述頌美時主之功德而鼓吹則魏晉以來以給賜臣下上自王公下至牙門督將皆有之且以為葬儀蓋鐃歌上同乎國家之雅頌而鼓吹下儕於臣下之鹵簿非惟所用尊卑懸絶而俱不以為軍中之樂矣至唐宋則又以二名合為一而以為乘輿出入警嚴之樂然其所用掆鼓金鉦鐃鼓簫笳橫吹長鳴􅓋篥之屬皆俗部樂也故郊祀之時太常雅樂以禮神鼓吹嚴警以戒衆或病其雅鄭雜襲失齋肅寅恭之誼者此也又鼓吹本軍中之樂郊禋齋宿之時大駕鹵簿以及從官六軍百執事輿衛繁多千乘萬騎旅宿以將事蓋雖非征伐而所動者衆所謂軍行師從是也則夜警晨嚴之制誠不可廢至於册寶上尊號奉天書虞主祔廟皆用之則不類矣文獻通考卷一百四十七
