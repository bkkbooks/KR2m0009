body:
  text: 文獻通考卷二百一鄱陽馬端臨貴與著經籍考二十八史故事各門總故事隋經籍志曰古者朝廷之政發號施令百司奉之藏於官府各修其職守而弗忘春秋傳曰吾視諸故府則其事也周官御史掌治朝之法太史掌萬民之約契與質劑以逆邦國之治然則百司庶府各藏其事太史之職又總而掌之漢時蕭何定律令張蒼制章程叔孫通定儀法條流派别制度漸廣晉初甲令已下至九百餘卷晉武帝命車騎將軍賈充博引羣儒刪采其要增律十篇其餘不足經遠者為法令施行制度者為令品式章程者為故事各還其官府縉紳之士撰而録之遂成篇卷然亦隋代遺失今據其見存謂之舊事篇宋三朝藝文志曰西漢有掌故之吏以主故事則名之所起不其遠乎魏相為丞相務在奉行故事孔光領樞機亦守法度修故事耳然則師古之學當世之要務隋唐載故事數十家皆臺閣府署舊制及諸遺風曩迹之事今所存惟二三書又取後之纂類附近者著之隋志二十五部四百四卷唐志十七家四十三部四百九十六卷失名姓二十五家裴矩以下不著録十六家九十卷宋三朝志十六部八十六卷宋兩朝志六部六十三卷宋四朝志六十四部九百二十卷宋中興志一百七十家一百八十九部一千九百九卷右故事隋經籍志曰古之仕者名書於所臣之䇿各有分職以相統治周官冡宰掌建邦之六典而御史數凡從政者然則冡宰總六卿之屬以治其政御史掌其在位名數先後之次焉今漢書百官表列衆職之事記在位之次蓋亦古之制也漢末王隆應劭等以百官表不具乃作漢官解詁漢官儀等書是後相因正史表志無復百僚在官之名矣縉紳之徒或取官曹名品之書撰而録之别行於世宋齊已後其書益繁而篇卷零疊易為亡散又多瑣細不足可紀故刪其見存可觀者編為職官篇隋志二十七部三百三十六卷通計亡書三十六部四百三十三卷唐志十九家二十六部二百六十二卷失姓名十家六典以下不著録二十九家二百八十卷宋三朝志三十四部二百一十三卷宋兩朝志八部三十二卷宋四朝志十二部一百三十二卷宋中興志三十六家四十二部四百一十三卷右職官隋經籍志曰刑法者先王所以懲罪惡齊不軌者也書述唐虞之世五刑有服而夏后氏正刑有五科條三千周官司冦掌三典以刑邦國司刑掌五刑之法麗萬民之罪太史又以典法逆於邦國內史執國法以考政事春秋傳曰在九刑不忘然則刑書之作久矣蓋藏於官府懼人之知爭端而輕於犯及其末也肆情越法刑罰僭濫至秦重之以苛虐先王之正刑滅矣漢初蕭何定律九章其後漸更增益令甲巳下盈溢架藏晉初賈充杜預刪而定之有律有令有故事梁時又取故事之宜於時者為梁科後齊武帝時又於麟趾殿刪正刑典謂之麟趾格後周太祖又命蘇綽撰大統式隋則律令格式並行自律以下世有改作事在刑法志漢律久亡故事駁議又多零失今録其見存可觀者編為刑法篇唐志二十八家六十一部一千四卷失姓名九家自開元新格以下不著録十三家三百二十三卷宋三朝志四十三部六百九十四卷宋兩朝志三十四部三百七十七卷宋四朝志一百一十二部一萬七千三百卷宋中興志八十七家九十四部三千九百三十卷右刑法隋經籍志曰昔者先王之化民也以五方土地風氣所生剛柔輕重飲食衣服各有其性不可遷變是故疆理天下物其土宜知其利害逹其志而通其欲齊其政而修其教故曰廣谷大川異制人居其間異俗書録禹别九州定其山川分其圻界條其物産辨其貢賦斯之謂也周則夏官司險掌建九州之圗周知山林川澤之阻逹其道路地官誦訓掌方志以詔觀事以知地俗春官保章以星土辨九州之地所封之域以觀妖祥秋官職方掌天下之圗地辨四夷八蠻九貉五戎六狄之人與其財用九榖六畜之數周知利害辨九州之國使同其貫司徒掌邦之土地之圗與其人民之教以佐王擾邦國周知九州之域廣輪之數辨其山林川澤邱陵墳衍原隰之名物及土會之法然則其事分在衆職而冡宰掌建邦之六典實總其事太史以典逆冡宰之治其書蓋亦總為史官之職漢初蕭何得秦圗書故知天下要害後又得山海經相傳以為夏禹所記武帝時計書既上太史郡國地志固亦在焉而史遷所記但述河渠而已其後劉向略言地域丞相張禹使屬朱貢條記風俗班固因之作地理志其州國郡縣山川夷險時俗之異經星之分風氣所生區域之廣户口之數各有攸敘與古禹貢周官所記相埒是後載筆之士管窺末學不能及遠但記州郡之名而已晉世摯虞依禹貢周官作畿服經其州郡及縣分野封略事業國邑山陵水泉鄉亭道里土田民物風俗先賢舊好靡不具悉凡一百七十卷今亡而學者因其經歷並有紀載然不能成一家之體齊時陸澄聚一百六十家之説依其前後遠近編而為部謂之地理書任昉又增陸澄之書八十四家謂之地記陳時顧野王抄撰衆家之言作輿地志隋大業中普詔天下諸郡條其風俗物産地圗上於尚書故隋代有諸郡物産土俗記一百五十一卷區宇圗志一百二十九卷諸州圗經集一百卷其餘記注甚衆今任陸二家所記之內而又别行者各録在其書之上自餘次之於下以備地理之記焉隋志一百三十九部一千四百三十二卷通計亡書合一百四十部一千四百二十四卷唐志六十三家一百六部一千二百九十二卷失姓名三十一家李播以下不著録五十三家九百八十九卷宋三朝志九十五部二千三百二十九卷宋兩朝志二十八部一百八十三卷宋四朝志四十二部六百七十七卷宋中興志三百二十二家三百三十六部三千四百七十一卷右地理宋中興藝文志前史時令皆入子部農家類惟中興館閣書目别為一類列之史部以諸家之所載不專為農事故也今從之凡十七家十八部一百九十九卷右時令隋經籍志曰氏姓之書其所由來遠矣書稱别生分類傳曰天子建德因生以賜姓周家小史定系世辨昭穆則亦史之職也秦兼天下剗除舊迹公侯子孫失其本系漢初得世本敘黃帝以來祖世所出而漢又有帝王年譜後漢有鄧氏官譜晉世摯虞作族姓昭穆記十卷齊梁之間其書轉廣後魏遷洛有八氏十姓咸出帝族又有三十六族則諸國之從魏者九十二姓世為部落大人者並為河南洛陽人其中國士人則第其門閥有四海大姓郡姓州姓縣姓及周太祖入關諸姓子孫有功者並令為其宗長仍撰譜録紀其所承又以關內諸州為其本望其鄧氏官譜及族姓昭穆記晉亂已亡自餘亦多遺失今録其見存者以為譜系篇隋志四十一部三百六十卷通計亡書合五十三部一千二百八十卷唐志十七家三十九部一千六百一十七卷宋三朝志五十三部一百五十四卷宋兩朝志九部六十二卷宋四朝志十六部七十九卷宋中興志五十三家五十九部二百二十三卷右譜系隋經籍志曰古者史官既司典籍蓋有目録以為綱紀體制湮滅不可復知孔子刪書别為之序各陳作者所由韓毛二詩亦皆相類漢時劉向别録劉歆七略剖析條流各有其部推尋事迹疑即古之制也自是之後不能辨其流别但記書名而已博覽之士疾其渾漫故王儉作七志阮孝緒作七録並皆别行大體雖凖向歆而遠不逮矣其先代目録亦多散亡今總其見存編為目録篇隋志三十部二百一十四卷唐志十九家二十二部四百六卷失姓名二家毋以下不著録十二家一百五十四卷宋三朝志目録十六部一百四十一卷宋兩朝志十一部九十二卷宋四朝志六部三十卷宋中興志四十六家五十一部五百二十一卷右目録貞觀政要十卷鼂氏曰唐吳兢撰以唐之極治貞觀為最故采時政之可備勸戒者上之於朝凡四十篇陳氏曰前題衛尉少卿兼修國史按新舊書列傳兢未嘗為此官而書亦不記嵗月但其首稱良相傳中安陽公中書令河東公亦未詳為何人館閣書目云神龍中所進當考翰林盛事一卷陳氏曰唐剡尉常山張著處晦撰記儒人盛事自武德中迄於天寶首載張文成七登科者即著之祖也衣冠盛事一卷陳氏曰唐武功蘇特撰太和辨謗略三卷鼂氏曰唐李德裕撰先是唐次録周秦迄隋忠賢罹讒謗事德宗覽之不悅後憲宗以為善命令狐楚等廣之成十卷太和中文盛上之陳氏曰李德裕以令狐楚所著刪其繁蕪益以唐事裁成三卷集賢裴潾為之序元和書今不存邯鄲書目亦止有前五卷秦傳玉璽譜一卷陳氏曰題博陵崔逄修協律郎嚴士元重修河東少尹魏德謨潤色國璽傳一卷傳國璽記一卷陳氏曰傳無名氏所記止唐肅宗記稱嚴士元與前大同小異玉璽雜記一卷陳氏曰徐景撰乾元元年七月記唐志有徐景玉璽正録即此書也楚寶傳一卷陳氏曰杜確撰肅宗乾元二年楚州尼真如獻寶事八寶記一卷陳氏曰無名氏大觀二年唐文宗朝備問一卷陳氏曰不著名氏雜録唐朝典故通典二百卷鼂氏曰唐宰相杜佑撰先是劉秩采經史自黃帝迄天寶末制度沿革廢置論議得失倣周禮六官法為政典三十五篇房琯稱才過劉向佑以為未盡因廣之參以新禮為二百篇以食貨選舉職官禮樂刑法州郡邊防八門分類敘載世推該洽三十六年成書德宗時上之續通典二百卷陳氏曰翰林學士承旨大名宋白太素等撰咸平三年奉詔四年九月書成起唐至德初迄周顯德末王欽若言杜佑通典上下數千載為二百卷而其中四十卷為開元禮今之所載二百餘年亦如前書卷數時論非其重復國朝通典二百卷陳氏曰不著名氏或言魏鶴山所為似方草創未成書也凡通典會要前書及館閣書目皆列之類書按通典載古今制度沿革會要專述典故非類書也唐會要一百卷鼂氏曰皇朝王溥撰初唐蘇冕敘高祖至德宗九朝沿革損益之制大中七年詔崔鉉等撰次德宗以來事至宣宗大中之年以續冕書溥又采宣宗以後事共成百卷建隆二年二月奏御詞簡禮備太祖覽而嘉之詔藏於史閣陳氏曰按唐志蘇冕會要四十卷續會要四十卷楊紹復等撰崔鉉監修而會要稱杭州刺史蘇辨與兄冕續國朝故事為是書辨聚書至二萬卷次於集賢藝閣五代會要三十卷鼂氏曰皇朝王溥等撰采梁至周典故纂次建隆初上之三朝國朝會要一百五十卷鼂氏曰皇朝章得象天聖中被詔以國朝故事因革制度編次宋綬馮元李淑王舉正王洙同修得象監總慶歷四年書成上之六朝國朝會要三百卷鼂氏曰神宗朝以會要止於慶歷命王圭續之起於建隆之元迄於熙寧十年通舊書增損成是書總一十一類八百五十八門其間禮樂政令之大綱儀物事為之細目有關討論顧無不載文簡事詳一代之典備矣節國朝會要十二卷鼂氏曰皇朝范師道以章得象書繁多節其要以備檢續會要三百卷陳氏曰監修仙井虞允文并甫等上自紹興十年編修起元豐元年迄靖康之末乾道六年書成巽岩李氏序略曰徽宗初詔王覿曾肇續編元豐至元符尋復詔起治平四年止崇寧五年凡四十年二書皆弗克成政和末有司獨上帝系后妃吉禮三類總一百一十卷其書則通章得象王圭所編稍益以熙寧後事而此三類外皆未遑暇運遭百六史記放絶光堯壽聖太上皇帝甚憫焉紹興九年詔館職續編三十一年又降趣旨然闕簡破牘掇落匪易皇帝陛下纂修洪緒敷時繹思更命宰臣提舉閲再嵗乃克成書斷自神宗之初迄於靖康之末凡六十年總三百卷分二十一類六百六十六門竊惟五朝大政前書備載類仍舊章鮮所開創逮神哲徽欽之御世因時適變道與前異大抵革於熙寧復於元祐旋革於紹聖又復於元符再革遂臻崇觀政宣之豐豫以及靖康六十年間業廣事詳方䇿所記視前倍蓰今兹綴集於零落散亡之餘十僅得其六七誠不足允符神旨然科條粗舉部類各分禮樂兵財之大原儒術刑法之要指取賢斂才之品式設官分職之制度九州之别合四夷之服叛槩見於斯凡厥討論尚或有取容齋洪氏隨筆曰國朝會要自元豐三百卷之後至崇寧政和間復置局修纂宣和初王黼秉政罷修書五十八所時會要已進一百十卷餘四百卷亦成但局中欲節次覬賞故未及上既有是命局官以謂若朝廷許立限了畢不過三兩月可以投進而黼務悉矯蔡京所為故一切罷之官吏既散文書皆為棄物矣建炎三年外舅張淵道為太常博士時禮寺典籍散佚亡幾而京師未陷公為宰相言宜遣官往訪故府取見存圗籍悉輦而來以備掌故此若緩而甚急者也宰相不能用其後逆豫竊據鞠為煨燼吁可惜哉中興會要二百卷陳氏曰監修晉江梁克家叔子等上乾道六年既進續會要有旨自建炎元年續修止紹興三十二年九月成書國朝會要總類五百八十八卷陳氏曰李心傳所編合三書為一刻於蜀中其板今在國子監三朝聖政録十卷鼂氏曰皇朝富弼上言乞選官置局將三朝典故編成一書即命王洙余靖孫復歐陽修編修分别事類成九十六門陳氏曰其書初名太平故事凡九十六門每事之後各釋其意至紹興八年右朝議大夫吕源得舊卵本刋正增廣名政要釋明䇿偹上之於朝館閣書目指政要為寶訓非也三朝寶訓三十卷陳氏曰翰林學士李淑等撰天聖五年監修國史青社王曾奏乞用唐吳兢貞觀政要故事取三朝聖語政事及臣僚奏對不入正史者别為一書與國史實録並行至十年書成詔以寶訓為名其後進讀於邇英今館閣書目以為二十卷富弼所上者非也乃政要耳王氏揮麈録曰仁宗即位方十嵗章獻明肅太后臨朝章獻素多知謀分命儒臣馮章靖元孫宣公奭宋宣獻綬等采托歷代君臣事迹為觀文覽古一書祖宗故事為三朝寶訓十卷每卷十事又纂郊祀儀仗為鹵簿書三十卷詔翰林待詔高克明等繪畫之極為精妙敘事於左令傅母輩日夕侍上展玩之解釋誘進鏤板於禁中元豐末哲宗以九嵗登極或有以其事啓於宣仁聖烈皇后者亦命取板摹印倣此為帝學之權輿分錫近臣及館殿時大父亦預其賜明清家因有之紹興中為秦伯陽所取三朝訓鑒圗十卷陳氏曰學士李淑楊偉等修纂慶歷八年偉初奉旨檢討三朝事迹乞與淑共編且乞製序皇祐元年書成頃在莆日有售此書者亟求觀之則已為好事者所得蓋當時御府刻本也卷為一册凡十事事為一圗飾以青赤亟命工傳録凡字大小行廣狹設色規模一切從其舊斂袵鋪觀如生慶歷皇祐間目睹聖作明述之盛也按館閣書目載此書云繪采皆闕至續書目乃云得其全未知果當時刻本乎抑亦摹傳也按三朝寶訓一書直齋書録解題以為宰相王曾奏請編修成於天聖十年凡三十卷揮麈録以為章獻命儒臣所修成於天聖初年凡十卷殊不相吻合然揮麈録所言禁中刻本且有繪圗則似即此三朝訓鑒圗十卷之書然直齋以此書為慶歷皇祐時所修纂則又與揮麈録所謂仁皇初年傅母輩侍上展玩之語深不合矣當俟考訂精者質之仁宗政要四十卷鼂氏曰皇朝張唐英撰仁皇訓典六卷陳氏曰翰林侍講范祖禹撰元祐八年經筵所上凡三百十七條大略亦用寶訓體兩朝寶訓二十卷陳氏曰禮部郎中長樂林希子中編進用天聖故事也元豐六年表上神宗寶訓二十卷鼂氏曰皇朝林虙撰虙希之姪也剽聞神宗聖政輒稱記録分一百門以續五朝寶訓崇寧上於朝歷代年號并宫殿等名一卷陳氏曰丞相饒陽李昉明叔在翰苑時所纂朝制要覽五十卷陳氏曰屯田郎中宋咸撰此書傳於陸放翁書其後曰先君會稽公晚嵗喜觀間為子弟講論因革率至夜分會稽公者宰元鈞也其書作於嘉祐中皆國初故實觀之使人有感焉景德會計録六卷鼂氏曰皇朝丁謂謂之撰謂景德中纂三司户口稅賦之入及兵食吏祿之費會計天下每嵗出納贏虧之數書成奏御陳氏曰謂時為三司使序言嵗收兩京十七路帳籍四萬四百有七日入疾徐事一千五百文移倍之以李吉甫國計簿賈耽國要圗總其目得四十列為六卷一户賦二郡縣三課入四嵗用五祿食六雜記大抵取景德中一年為準皇祐會計録六卷鼂氏曰皇朝田况元鈞撰况兩為三司使謂夏戎阻命之後增兵比之景德幾一倍加之吏員益繁經費日侈民力日疲乃約丁謂會計録以皇祐財賦所入多於景德而其出又多於所入著成此書上之庶幾朝廷稽祖宗之舊省浮費以裕斯民云陳氏曰元鈞倣景德之舊取一嵗最中者為準又為儲運一篇以補其闕春明退朝録三卷陳氏曰龍圗閣學士常山宋敏求次道撰所記多故實其父宣獻公綬居第在春明坊如鼂氏稱昭德也先朝政範一卷陳氏曰直集賢院徂徠石介守道編進自任將至悔過凡十二篇尊號録一卷丞相安陸宋庠公序撰大意以為徽號夸詡非古而我祖宗往往謙遜不居猶願超然遠覽盡屏前號其愛君以德者歟至神宗遂却不受至於今行之輔弼名對四十卷天禧中前進士劉顔編自漢迄五代為四十門青社賑濟録一卷丞相富文忠公弼青州救荒施行文牘也元豐問事録二卷光祿寺丞李德芻撰德芻邯鄲李淑之子元豐中為詳定官制檢討文字詔旨所問奏藁録為此書官制局紀事一卷李德芻奉旨編録置局以來命官等事中書備對十卷鼂氏曰皇朝元豐三年畢仲衍承詔編次曰周官所謂要會者正今日中書所宜有自漢至唐莫知議此今編成十卷凡一百二十五門附五十八事李清臣嘗與許將書云備對乃吳正憲公居宰路以聖問多出意表故令中書掾畢君為之其時預有畫旨諸司遇取會不許濡滯如此尚歷數年乃就後多有改革然事亦可槩見也蔣魏公逸史二十卷容齋洪氏隨筆曰蔣魏公逸史頴叔所著也多記當時典章文物之舊有數百册兵火間盡失之其曾孫芾始捃托遺藁而成此書將以奏御以其副上之太史且板行之傳之天下後世既而不果蔣公在熙寧元祐崇寧時為博聞強識然閲其論述頗有可議恨不及丞相在日與之言大槩辨訂官制之訛誤也吕申公掌記一卷陳氏曰丞相申國吕公著晦叔撰在相位所記人材已用未用名姓及事當行已行條目元祐榮觀集五卷陳氏曰左朝奉大夫權太學正汪浹撰記元祐六年視學本末并羣臣所上詩賦頌表之類張舜民藝叟為之序泰陵故事二十卷陳氏曰不著名氏皆敘宣仁臨朝九年中制誥表章奏議之屬尊堯録八卷陳氏曰延平羅從彥仲素撰從彥師事楊時而李侗又師從彥所謂南劒三先生也從彥當靖康初以為本朝之禍起於熙豐不遵祖宗故實故采四朝事為此録又李沆寇凖王旦王曾杜衍韓琦范仲淹富弼司馬光程皓名輔巨儒十人言行附於其後末有别録一卷專載司馬光論王安石陳瓘論蔡京奏疏欲上之朝不果嘉定中太守劉元濟得其書奏之且為板行本朝事實三十卷陳氏曰右承議郎李伋撰雜録故事不成條貫統紀皇朝治迹統類七十三卷陳氏曰眉山彭百川叔融撰略用袁樞通鑑本末條例為前集四十卷中興後事為後集三十三卷皇朝事類樞要二百五十卷陳氏曰蜀人張和卿編集為一百五十門蓋舉子答䇿之具也長樂財賦志十六卷陳氏曰知漳州長樂何萬一之撰往在鄞學訪同官薛師雍子然几案間有書一編大略述三山一郡財計而纍朝詔令申明沿革甚詳其書雖為一郡設於天下實關通問所從得薛曰外舅陳止齋修圗經欲以為財賦一門後緣卷帙多不果入因借録之書無標目以意命之曰三山財計本末及來莆田謂鄭寅子敬道之鄭曰家有何一之長樂財賦志豈此邪復借觀之良是其間亦微有增損末又有安撫司一卷併抄録附益為全書內治聖鑑二十卷陳氏曰起居舍人兼嘉王府贊讀清江彭龜年子壽撰取列聖修身齊家教子訓齊宗室防制外戚宦官􅉏御等事以紹熙五年表上之光宗稱善且曰祖宗家法最善漢唐不及也高宗聖政草一卷陳氏曰陸遊在隆興初奉詔修高宗聖政草創凡例多出其手未成而去私篋不敢留藁他日追記得此録之而書其後凡二十條高宗孝宗聖政編要二十卷陳氏曰高宗聖政五十卷孝宗聖政五十卷乾道淳熙中所修皆有御製序此二帙書坊抄節以備舉子應用之儲也孝宗聖政十二卷陳氏曰亦書坊抄節比前為稍詳按孝宗聖政係陳止齋奉詔擬御製序言起初潛至內禪掇其最凡得六百四十一條為五十卷紹興三年序會稽和買事宜七卷陳氏曰浙東帥番陽洪邁景盧提舉常平三山鄭湜補之集初承平時預買令下守越者無遠慮凡一路州縣所不受之數悉受之故越之額特重以匹計者十四萬六千九百居浙東之半人户百計規免皆詭為第五等户而四等以上户之害日益甚於是有為畝頭均科之説者帥鄭丙少嘉憲邱崈宗卿張詔君卿頗主之由淳熙十一年以後略施行而議者多以創科五等户為不便參政李彥頴秀叔尚書王希吕仲行先後帥越皆言之而王畫八事尤力會光廟亦以為貽窮貧之害户部尚書葉翥叔羽奏乞先減四萬四千餘匹止以十萬為額而後均敷詔從之仍令侍從集議皆乞關併詭挾遂詔邁湜措置既畢以施行次第類成此書時紹熙元年也劉忠肅救荒録五卷陳氏曰王居仁撰淳熙乙未樞密劉珙共父帥江東救荒本末嘉定乙亥真景元刻之漕司以配韓富公青社之編而以劉公行狀諡議附於後西漢會要七十卷東漢會要四十卷武學博士清江徐天麟仲祥撰以二史所載漢家制度典章散於紀傳表者倣唐以來會要體分門編纂其用力勤矣其言范曄志藁為謝儼蠟以覆車劉昭因曄遺緒注而補之夫既曰蠟以覆車安得復有遺緒蓋未考昭之所著實司馬紹統續漢書志也仲祥乙丑進士世有史學其世父夢莘商老著北盟會編父得之思叔為左氏國紀兄筠孟堅作漢官考皆行於世漢制叢録三十三卷袁夢麟應祥撰以二漢所紀典故分門編類凡二十五門平陽會四卷通直郎知平陽縣汪季良子駟撰平陽號難治為浙東三陽之冠季良治有聲乃以一邑財計自兩稅而下為二十一篇終於嵗會旁通沿革本末大略偹矣又為外篇五條如砧基副本催科檢放及書手除科敷之類以為此財用所從出也季良端明應辰之孫佳士且能吏也得年不永士論惜之唐昌記二卷知昌化縣趙希克家撰錢譜十卷鼂氏曰右梁顧烜嘗撰錢譜一卷唐張台亦有錢録兩卷皇朝紹聖間孝美以兩人所纂舛錯增廣成十卷分八品云貨泉録一卷鼂氏曰右皇朝陶嶽撰記五代諸侯擅改錢幣之由幽州嶺南福建湖南江南五國續錢譜十卷鼂氏曰右皇朝董逌撰逌之祖嘗得古錢百令逌考次其文譜之以前世帝王世次為序且言梁顧烜唐封演之譜浸汙蔽固不可用其譜自太昊葛天氏至堯舜夏商皆有錢幣其穿鑿誕妄至此泉志十五卷陳氏曰洪遵景嚴撰記歷代錢寶浸銅要略一卷陳氏曰張甲撰稱德興草澤紹聖元年序蓋膽水浸鐵成銅之始甲參政子公之祖治金録一卷陳氏曰泉司吏所為也鄭夾漈通志略莆田鄭樵漁仲撰淳熙間經進自序略曰江淹有言修史之難無出於志誠以志者憲章之所係非老於典故者不能為也不比紀傳紀以年包事傳以事繫年儒學之士皆能為之惟有志難其次莫如表所以范曄陳壽之徒能為紀傳而不敢作表志志之大原起於爾雅司馬遷曰書班固曰志蔡雍曰意華嶠曰典張勃曰録何法盛曰説餘史並承班固謂之志皆詳於浮言略於事實不足以盡爾雅之義臣今總天下之大學術而條其綱目名之曰略凡二十略百代之憲章學者之能事盡於此矣其五略漢唐諸儒所得而聞其十五略漢唐諸儒所不得而聞也曰氏族略六書略七音略天文略地理略都邑略諡略器服略樂略藝文略校讎略圗譜金石略災祥略昆蟲草木略凡十五略出臣胸臆不涉漢唐諸儒議論曰禮略職官略選舉略刑罰略食貨略凡前五略雖本諸前人之典亦非諸史之文也按鄭氏此書名之曰通志其該括甚大卷首序論譏詆前人高自稱許蓋自以為無復遺憾矣然夷考其書則氏族六書七音等略考訂詳明議論精到所謂出臣胸臆非諸儒所得聞者誠是也至於天文地理器服則失之太簡如古人器服之制度至詳今止樽罍一二而謂之器服略可乎若禮及職官選舉刑罰食貨五者則古今經制甚繁沿革不一故杜岐公通典之書五者居十之八然杜公生貞元間故其所記述止於唐天寶今通志既自為一書則天寶而後宋中興以前皆合陸續銓次如班固漢書續史記武帝以後可也今通志此五略天寶以前則盡寫通典全文略無增損天寶以後則竟不復陸續又以通典細注稱為己意附其旁而亦無所發明通志此五略中所謂臣按云云低一字寫者皆通典細注耳疏略如此乃自謂雖本前人之典而亦非諸史之文不亦誣乎夾漈譏司馬子長全用舊文間以里俗采托未備筆削不遑又譏班孟堅全無學識專事剽竊自高祖至武帝七世盡竊遷書不以為慚至其所自為書則不堪檢點如此然則著述豈易言哉又按此書刋本元無卷數止是逐略分為一二耳中興四朝藝文志别史類載通志二百卷其後敘述云中興初鄭樵采歷代史及他書自三皇迄隋為書曰通志倣遷固為記傳而改表為譜志為略則其為書似是節抄刪正歷代之正史如高峻之小史蘇子由之古史而非此二十略之書也但二十略序文後言於紀傳即其舊文從而損益制誥書疏置之别録唐書五代史本朝大臣所修非微臣敢議故紀傳及隋若禮樂刑政務存因革故引而至唐云則亦略言其作書之意豈彼二百卷者自為一書亦名之曰通志而於此序附言其意邪或併二十略共為一書邪當俟續考右故事文獻通考卷二百一
