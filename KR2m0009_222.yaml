body:
  text: 文獻通考卷二百二十二鄱陽馬端臨貴與著經籍考四十九子醫家漢藝文志醫經者原人血脈經絡骨髓隂陽表裏以起百病之本死生之分而用度針石湯火所施師古曰針所以刺病也石謂砭石即石針也古者攻病則有砭令其術絶矣調百藥齊和之所宜至齊之得齊音劑猶磁石取鐡以物相使拙者失理以愈為劇以生為死漢藝文志經方者本草石之寒溫量疾病之淺深假藥味之滋因氣感之宜辨五苦六辛致水火之齊以通閉解結反之於手及失其宜者以熱益熱以寒增寒精氣內傷不見於外是所獨失也故諺曰有病不治常得中醫漢志醫經七家二百一十六卷漢志經方十一家二百七十四卷隋志醫方二百五十六部四千五百一十三卷唐志明堂經脈類一十六家三十五部二百三十一卷失姓名十六家甄權以下不著録二家十卷唐志醫術六十四家一百二十部四千四十六卷失姓名三十八家王方慶以下不著録五十五家四百八卷宋三朝志經脈四十六部一百四十卷醫術一百九十一部二千九十九卷宋兩朝志經脈二十九部四十五卷醫術八十四部二百二十六卷宋四朝志三十六部二百九卷宋中興志一百七十九家二百九部一千二百五十九卷黃帝素問二十四卷鼂氏曰昔人謂素問者以素書黃帝之問猶言素書也唐王砯注砯謂漢藝文志有黃帝內經十八卷素問即其經之九卷兼靈樞九卷乃其數焉先是第七亡逸砯時始獲乃詮次注釋凡八十一篇分二十四卷今又亡刺法本論二篇砯自號啓元子醫經之傳於世者多矣原百病之起愈者本乎黃帝辨百藥之味性者本乎神農湯液則稱伊尹三人皆古聖人也憫世疾苦親著書以垂後而世之君子不察乃以為賤技恥習之由此故今稱醫者多庸人治之失理以生為死者甚衆激者至云有病不治常得中醫豈其然乎故豫録醫頗詳隋志以此書為首今從之陳氏曰黃帝與岐伯問答三墳之書無傳尚矣此固出於後世依託要是醫書之祖也唐太僕令王砯注自號啓元子按漢書但有黃帝內外經至隋志乃有素問之名又有全元起素問注八卷嘉祐中光祿卿林億國子博士髙保衡承詔校定補注亦頗采元起之説附見其中其為篇八十有一王砯者寶應中人也靈樞經九卷鼂氏曰王砯謂此書即漢志黃帝內經十八卷之九也或謂好事者於皇甫謐所集內經倉公論中抄出之名為古書也未知孰是呂楊注八十一難經五卷鼂氏曰秦越人撰吳呂廣注唐楊元操演越人渤海人家於盧授桑君祕術明洞醫道世以其與黃帝時扁鵲相類乃號之為扁鵲采黃帝內經精要之説凡八十一章以其為趣深逺未易了故名難經元操編次為十三類陳氏曰漢志亦但有扁鵲內外經而已隋志始有難經唐志遂屬之越人皆不可考難當作去聲讀丁德用注難經五卷鼂氏曰德用以楊元操所演甚失大義因改正之經文隱奧者繪為圖德用濟陽人嘉祐末其書始成陳氏曰序言太醫令呂廣重編此經而楊元操復為之注覽者難明故為補之且間為之圖首篇為診候最詳凡二十四難蓋脈學自扁鵲始也虞庶注難經五卷鼂氏曰皇朝虞庶注庶仁夀人寓居漢嘉少為儒已而棄其業習醫為此書以補呂楊所未盡黎泰辰治平間為之序金匱玉函經八卷鼂氏曰漢張仲景撰晉王叔和集設答問雜病形證脈理參以療治之方仁宗朝王洙得於館中用之甚效合二百六十二方陳氏曰林億等校正此書王洙於館閣蠧簡中得之曰金匱玉函要略方上卷論傷寒中論雜病下載其方并療婦人乃録而傳之今書以逐方次於證候之下以便檢用其所論傷寒文多節略故但取雜病以下止服食禁忌二十五篇二百六十二方而仍其舊名仲景傷寒論十卷鼂氏曰漢張仲景述晉王叔和撰次按名醫録云仲景南陽人名機仲景其字也舉孝亷官至長沙太守以宗族二百餘口建安紀年以來未及十稔死者三之二而傷寒居其七乃著論二十二篇證外合三百九十七法一百一十二方善醫者或云仲景著傷寒論誠不刋之典然有大人之病而無嬰孺之患有北方之藥而無南方之治此其所闕者蓋陳蔡以南不可用柴胡白虎二湯治傷寒其言極有理陳氏曰其文辭簡古奧雅又名傷寒卒病論凡一百一十二方古今治傷寒者未有能出其外者也脈經三卷鼂氏曰題云黃帝撰論診脈之要凡二十一篇王叔和脈經十卷鼂氏曰晉王叔和撰按唐甘伯宗名醫傳曰叔和西晉髙平人性度沉靖博通經方精意診處尤好著述其書纂岐伯華他等論脈要訣所成敘隂陽表裏辨三部九候分人迎氣口神門條十二經二十四氣奇經八脈五臟六腑三焦四時之疴纎悉備具咸可按用凡九十七篇皇朝林億等校正脈訣一卷鼂氏曰題曰王叔和皆歌訣鄙淺之言後人依託者然最行於世脈訣機要三卷脈要新括一卷陳氏曰通真子撰不著名氏熙寧以後人也以叔和脈訣有臲卼鄙俗處疑非叔和作以其不類故也乃作歌百篇按經為注又自言常為傷寒括要六十篇其書未之見巢氏病源候論五卷鼂氏曰隋巢元方等撰元方大業中被命與諸醫共論衆病所起之源皇朝舊制監局用此書課試醫生昭陵時詔校本刻牘頒行宋綬為序陳氏曰元方隋太醫博士其書惟論病證不載方藥今按千金方諸論多本此書業醫者可以參考雷公炮炙三卷鼂氏曰宋雷斆撰胡洽重定述百藥性味炮熬煮炙之方其論多本之於乾寧晏先生斆稱內究守國安正公當是官名未詳天元玉策三十卷鼂氏曰啓元子撰即唐王砯也書推五運六氣之變唐人物志云砯仕至太僕令年八十餘以夀終金寶鑑三卷鼂氏曰衛嵩撰嵩仕至翰林博士崇文總目云不詳何代人述脈候徵驗要妙之理寶藏暢微論三卷鼂氏曰五代軒轅述撰青霞君作寶藏論三篇著變煉金石之訣既詳其未善因刋其謬誤增其闕漏以成是書故曰暢微時年九十實乾亨二年也聖濟經十卷鼂氏曰徽宗皇帝御製因黃帝內經採天人之賾原性命之理明營衛之清濁究七八之盛衰辨逆順之盈虗為書十篇凡四十二章陳氏曰辟雍學生昭武吳褆注通真子傷寒訣一卷鼂氏曰題曰通真子而不著名氏用張長沙傷寒論為歌詩以便覽者脈訣之類也醫門玉髓一卷陳氏曰不知作者皆為歌訣論五臟六腑相傳之理傷寒百問三卷鼂氏曰題曰無求子大觀初所著書醫經正本書一卷陳氏曰知進賢縣沙隨程逈可久撰專論傷寒無傳染以救薄俗骨肉相棄絶之敝運氣論奧三卷鼂氏曰宋朝劉溫舒撰溫舒以素問氣運最為治病之要而答問紛揉文辭古奧讀者難知因為三十論二十七圖上於朝五運指掌賦圖一卷陳氏曰葉玠撰脈粹一卷鼂氏曰宋朝蕭世基撰世基常閲素問及歷代醫經患其難知因綴緝成一編治平中姚誼序之南陽活人書二十卷鼂氏曰宋朝朱肱撰序謂張長沙傷寒論其言雅奧非精於經絡者不能曉會頃因投間設其對問補苴綴緝僅成卷軸作於己巳成於戊子計九萬一千三百六十八字陳氏曰肱以仲景傷寒方論多以類聚為之問答本號無求子傷寒百問方有武夷張藏作序易此名仲景南陽人而活人者本華他語肱吳興人祕丞臨之子中書舍人服之弟登第仕至朝奉郎直祕閣傷寒微旨論二卷陳氏曰不著作者序言元祐丙寅必當時名醫也其書頗有發明傷寒證治三卷鼂氏曰宋朝王實編實謂百病之急無踰傷寒故略舉病名法及世名醫之言為十三篇總方百四十六首或云潁州人官至外郎龎安常之高弟也傷寒救俗方一卷陳氏曰寧海羅適正之尉桐城民俗惑巫不信藥因以藥施人多愈遂以方書召醫參校刻石以救迷俗紹興中有王世臣彥輔者序之以傳補注神農本草二十卷鼂氏曰宋朝掌禹錫等補注舊説本草經神農所作而藝文志所不載平帝紀詔天下舉知方術本草者本草之名蓋起於此梁之録載神農本草三卷書中有後漢郡縣名蓋上世未著文字師學相傳至張機華他始為編述嘉祐初詔禹錫與林億蘇頌張洞等為之補注以開寶本草及諸家參校采拾遺逸刋定新舊藥各一千八十二種總二十卷大觀本草三十一卷陳氏曰唐愼微撰不知何人仁和縣尉艾晟作序名曰經史證類本草按本草之名始見漢書平帝紀樓護傳舊經止一卷藥三百六十五種陶隱居增名醫别録亦三百六十五種因注釋為七卷唐顯慶又增一百十四種廣為二十卷謂之唐本草開寶中又益一百三十三種蜀孟昶又嘗增益謂之蜀本草及嘉祐中掌禹錫林億等重加校正更為補注以朱墨書為之别凡新舊藥一千八十二種蓋亦備矣今愼微頗復有所增益而以墨蓋其名物之上然亦殊不多也石林葉氏曰神農本草初但三卷所載甚略議者考其記出産郡名以為東漢人所作梁陶隱居始增修為七卷然陶氏不至東北其論證多謬語唐顯慶中蘇恭請重修於是命長孫無忌等廣定遂為二十卷亦未盡也自是偽蜀韓保升與術家各自補緝辨證者不一開寶中别加詳定嘉祐初復詔掌祕監禹錫蘇魏公諸人再論次遂大備蓋神農本草外雜取他書凡十六家云圖經本草二十卷目録一卷鼂氏曰宋朝蘇頌等撰先是詔掌禹錫林億等六人重校神農本草纍年成書奏御又詔郡縣圖上所産藥本用永徽故事重命編述於是頌再與禹錫等裒集衆説類聚銓次各有條目云嘉祐六年上證類本草三十二卷鼂氏曰皇朝唐愼微纂合兩本草為一書且集書傳所記單方附之於本條之下殊為詳博本草廣義二十卷鼂氏曰皇朝寇宗奭編以本草二部著撰之人或執用己私失於商確併考諸家之説參之事實核其情理證其脫誤以成此書陳氏曰其書引援辨證頗可觀采紹興校定本草二十二卷陳氏曰醫官王繼先等奉詔撰紹興二十九年上之刻板修內司每藥為數語辨説淺俚無高論子午經一卷鼂氏曰題云扁鵲撰論針砭之要成歌詠蓋後人依託者銅人針灸圖三卷鼂氏曰皇朝王惟德撰仁宗嘗詔惟德考次針灸之法鑄銅人為式分臟腑十二經旁注俞冗所會刻題其名并為圖法并主療之術刻板傳於世夏竦為序明堂者謂雷公問道黃帝授之故名云明堂針灸圖三卷鼂氏曰題曰黃帝論人身俞冗及灼灸禁忌存真圖一卷鼂氏曰皇朝楊介編崇寧間泗州刑賊於市郡守李夷行遣醫併畫工往親決膜摘膏肓曲折圖之盡得纎悉介校以古書無少異者比歐希範五臟圖過之逺矣實有益醫家也王莽時捕得翟義黨王孫慶使太醫尚方與巧屠共刳剝之量度五臟以竹筳導其脈知所始終云可以治病亦是此意膏肓灸法二卷陳氏曰清源莊綽季裕集點烙三十六黃經一卷鼂氏曰不著撰人唐世書也國史補云自茗飲行於世世人不復病黃疸肘後百一方三卷陳氏曰晉葛洪撰梁陶隱居增補本名肘後救卒方率多易得之藥凡八十六首陶併七首加二十二首共為一百一首取佛書人有四大一大輒有一病之義名之千金方三十卷鼂氏曰唐孫思邈撰思邈博通經傳洞明醫術著用藥之方診脈之訣針灸之穴禁架之法以至導引養生之要無不周悉後世或能窺其一二未有不為名醫者然議者頗恨其獨不知傷寒之數云陳氏曰自為之序名曰千金備急要方以為人命至重有貴千金一方濟之德踰於此其前類例數十條林億等新纂千金翼方三十卷鼂氏曰思邈著千金方復掇集遺軼以羽翼其書成一家之言林億等謂首之以藥録次之以婦人傷寒小兒養性辟穀退居補益雜病瘡癰色脈針灸而禁經終焉者皆有指意云陳氏曰其末兼及禁術用之多驗外臺祕要方四十卷鼂氏曰唐王燾撰燾在臺閣二十年久知宏文館得古方書數千百卷因述諸病證候附以方藥符禁灼灸之法凡一千一百四門天寶中出守房陵及太寧郡故以外臺名其書孫兆以燾謂針能殺生人不能起死人取灸而不取針譏其為醫之敝豫獨以其言為然陳氏曰自為序天寶十一載也其書博采諸家方論如肘後千金世尚多有之至小品深師崔氏許仁則張文仲之類今無傳者猶間見於此書云凡醫書之行於世皆仁廟朝所校定也按會要嘉祐二年置校正醫書局於編修院以直集賢院掌禹錫林億校理張洞校勘蘇頌等並為校正後又命孫竒高保衡孫兆同校正每一書畢即奏上億等皆為序下國子監板行并補注本草修圖經千金方翼金匱要略傷寒悉從摹印天下皆知學古方書矣産寶二卷鼂氏曰唐咱殷撰殷蜀人大中初白敏中守成都其家有因免乳死者訪問名醫或以殷對敏中迎之殷集備驗方藥二百七十八首以獻其後周頲又作三論附於前龍樹眼論三卷鼂氏曰佛經龍樹大士者能治眼疾假其説集治七十二種目病之方文獻通考卷二百二十二
