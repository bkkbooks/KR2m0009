body:
  text: 文獻通考卷二百九十八鄱陽馬端臨貴與著物異考四火災春秋桓公十四年八月壬申御廪災董仲舒以為先是四國共伐魯魯君臣內怠政事外侮四鄰非能保守宗廟終其天年者也劉向以為御廪夫人八妾所舂米之藏以奉宗廟時夫人有淫行通於齊侯挾逆心欲弒桓公天戒若曰夫人不可以奉宗廟莊公二十年齊火災劉向以為齊桓好色以妾為妻嫡庶屢更故致火災僖公二十年五月乙巳西宫災董仲舒以為僖娶於楚而齊媵之脅公立為夫人西宫小寢夫人所居也若曰妾何為居此宫誅去之意也宣公十六年成周宣榭火榭所以藏樂器宣其名也董仲舒劉向以為十五年王札子殺召伯毛伯天子不能誅天戒若曰不能行政令何以禮樂為而藏之成公三年二月甲子新宫災榖梁以為宣宫一曰宣公弒子赤而立不當列於羣祖故天災其廟襄公九年春宋災晉侯聞之問士弱曰宋災於是乎知有天道何故對曰古之火正或食於心或食於咮以出入火師古曰咮音竹救反是故咮為鶉火心為大火陶唐氏之火正閼伯居商邱祀大火而火紀時焉相土因之故商主大火商人閲其禍敗之釁必始於火是以知有天道公曰可必乎對曰在道國亂亡象不可知也韋昭曰大亂之君天不復告故無象説曰古之火正謂火官也掌祭火星行火政季春昏心星出東方而咮七星鳥首正在南方則用火季秋星入則止火以順天時救民疾帝嚳則有祝融堯時有閼伯民賴其德死則以為火祖配祭火星故曰或食於心或食於咮也相土商祖契之曾孫師古曰契讀曰偰音先列反字或作卨其用同耳據諸典籍相土即卨之孫今云曾孫未詳其意代閼伯後主火星宋其後也世司其占故先知火賢君見變能修道以除凶亂君亡象天不譴告故不可必也三十年五月甲午宋災劉向以為先是宋公聽讒而殺太子痤應火不炎上之罰也昭公六年六月丙戌鄭災是春三月鄭人鑄刑書士文伯曰火見鄭其火乎火未出而作火以鑄刑器藏爭辟焉著刑於鼎故稱刑器法設下爭故云爭辟火而象之不火何為説曰火星出於周五月而鄭以三月作火鑄鼎刻刑辟書以為民約是為刑器爭辟故火星出與五行之火爭明為災其象然也又棄法律之占也九年夏四月陳火時楚靈王滅陳鄭裨竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年嵗五及鶉火而後陳卒亡楚克有之天之道也説曰顓頊以水王陳其族也師古曰陳舜後也舜本出顓頊今兹嵗在星紀後五年在大梁大梁昴也金為水宗得其宗而昌故曰五年陳將復封楚之先為火正故曰楚所相也天以一生水地以二生火天以三生木地以四生金天以五生土五位皆以五而合而陰陽易位故曰妃以五成然則水之大數六火七木八金九土十故水以天一為火二牡木以天三為土十牡土以天五為水六牡火以天七為金四牡金以天九為木八牡陽竒為牡隂耦為妃師古曰竒音居宜反故曰水火之牡也火水妃也於易坎為水為中男離為火為中女蓋取諸此也自大梁四歲而及鶉火四周四十八歲凡五及鶉火五十二年而陳卒亡火盛水衰故曰天之道也哀公十七年七月己卯楚滅陳昭公十八年五月壬午宋衛陳鄭災董仲舒以為象王室將亂天下莫救故災四國言亡四方也定公二年五月雉門及兩觀災師古曰雉門公宫南門也兩觀謂闕董仲舒劉向以為此皆奢僭過度者也先是季氏逐昭公昭公死於外師古曰謂死於乾侯定公即位不能誅季氏又用其邪説淫於女樂而退孔子師古曰齊人歸女樂季桓子勸定公受之君臣相與觀之廢朝禮三日孔子乃行天戒若曰去髙顯而奢僭者一曰門闕號令所由出也今舍大聖而縱有罪亡以出號令矣京房易傳曰君不思道厥妖火燒宫哀公三年五月辛卯桓釐宫災董仲舒劉向以為此二宫不當立違禮者也哀公又以季氏之故不用孔子孔子在陳聞魯災曰其桓釐之宫乎以為桓季氏之所出釐使季氏世卿者也四年六月辛丑亳社火師古曰亳社殷社也董仲舒劉向以為亡國之社所以為戒也師古曰存其社者欲使君常思敬慎懼危亡者也天戒若曰國將危亡不用戒矣春秋火災屢於定哀之間不用聖人而縱驕臣將以亡國不明甚也一曰天生孔子非為定哀也蓋失禮不明火災應之自然象也漢惠帝四年十月乙亥未央宫凌室災藏冰之室丙子織室災織作之室劉向以為太后立魯元公主女為皇后凌室所以供養飲食織室所以奉宗廟衣服與春秋御廪同又天戒若曰皇后亡奉宗廟之德將絶祭祀其後帝崩后亡子取后宫美人子立之呂后崩諸呂為亂大臣誅之而立文帝惠后幽廢髙后元年五月丙申趙叢臺災劉向以為時呂氏女為趙王后嫉妬將為讒口以害趙王王不悟卒見憂死文帝七年六月癸酉未央宮東闕罘罳災師古曰罘罳謂連闕曲閣也以覆重刻垣墉之處其形罘罳然一曰屏也罘音浮闕與其兩傍俱災也劉向以為東闕所以朝諸侯之門也罘罳在其外諸侯之象也漢封諸侯王連城數十賈誼等以為違古制度必將叛逆先是淮南濟北皆謀反其後七國舉兵而誅景帝中五年八月己酉未央宫東闕災時栗太子以罪廢自殺丞相周亞夫下獄死武帝建元六年六月丁酉遼東髙廟災四月壬子髙園便殿火董仲舒對以春秋時亳社兩觀桓釐廟災四者皆不當立天皆燔其不當立者以示魯今髙廟不當居遼東髙園殿不當居陵旁於禮亦不當立與魯所災同按古者諸侯不敢祖天子則髙廟不當立於遼東也古者墓以藏體魄廟以宅神靈故祭於廟不祭於墓則髙園殿不當居陵旁也二者皆失禮之事謂天燔其不當立者以示警猶之可也而仲舒所對纍數百言至謂天災若語陛下視親戚貴屬在諸侯逺正最甚者忍而誅之如吾燔遼東髙廟視近臣在國中處旁仄及貴而不正者忍而誅之如吾燔髙園殿大槩勸帝以多行殺戮而於郡國陵墓不當立廟之説略無所發明帝采其説而使仲舒弟子吕步舒治淮南獄深竟黨與坐死者甚衆蓋此對徒足以啓帝之忍心而略不能革漢之失禮矣故秪取其兩言而餘語則盡削之云武帝太初元年十一月乙酉未央宫柏梁臺災先是大風發其屋夏侯始昌先言其災日後有江充巫蠱衛太子事昭帝元鳯元年燕城南門災劉向以為時燕王使邪臣通於漢為讒賊謀逆亂南門者通漢道也四年五月丁丑孝文廟正殿災劉向以為是嵗正月上加元服有明哲之性而大將軍光久秉政不歸亡周公之德將為國害故正月加元服五月而災見古之廟皆在城中孝文廟始出居外天戒若曰去貴而不正者宣帝既立光猶秉政驕溢過制妻顯弒后隨以誅滅宣帝甘露元年四月丙申中山太上皇廟災甲辰孝文廟災元帝初元三年四月乙未孝武園白鶴館災劉向以為先是前將軍蕭望之光祿大夫周堪輔政為佞臣石顯許章等所譖望之自殺堪廢黜明年白鶴館災園中五里馳逐走馬之館五里者言周回五里不當在山陵昭穆之地天戒若曰去貴近逸遊不正之臣將害忠良後章坐走馬上林下烽馳逐免官夜於上林苑下舉火馳射也永光四年六月甲戌孝宣杜陵園東闕南方災時上復用周堪張猛等石顯終欲害之園陵小於朝廷闕在司馬門中內臣顯之象也孝宣親而貴門闕法令所從出也天戒若曰去法令內臣親而貴者必為國害後顯卒害猛按魯哀公三年桓僖宫災左傳載孔子在陳聞火曰其桓僖乎杜征南注以為桓僖親盡而廟不毁故天示以災公羊傳之説亦然蓋踰禮制而以諂瀆事神則神亦不享其祭故天降之災非曰桓僖有以獲罪於天而火焚其廟也至仲舒劉向則謂以季氏之故桓則季氏所出而僖則使季氏世卿者於是以為其咎不在當時之君而歸過於祖宗其説鑿矣至其論漢世以來之災異如髙廟之火以為為諸侯王大臣文廟之火以為為霍光宣廟之火以為為石顯夫諸侯王之過制霍光之專擅石顯之姦欺所以致之者時君之過也於先代何預且曰貴而不正者天燔之是天欲示警於子孫而焚其祖宗之廟蓋亦迂逺而不切矣况宗廟人主所嚴事者也災延宗廟變異不小不思側身修行以謝天地祖宗而方且以驕恣專擅之臣擬之以為天惡而欲燔之以示戒其説不亦謬乎成帝建始元年正月乙丑皇考廟災初宣帝為昭帝後而立父廟於禮不正又時大將軍王鳳擅朝將害國家故天見象鴻嘉三年八月乙卯孝景廟北闕災十一月甲寅許皇后廢永始元年正月癸丑大宮凌室災戊午戾后園南闕災時趙飛燕大幸許后既廢上將立之故天見象於凌室與惠帝四年同應又戾后起於微賤與趙氏同應天戒若曰微賤亡德之人不可以奉宗廟將絶祭祀四年四月癸未長樂宫臨華殿及未央宫東司馬門災六月甲午孝文霸陵園東闕南方災長樂宫成帝母王太后所居也未央帝所居也霸陵太宗盛德園也時太后三弟相續秉政舉宗居位充塞朝廷將害國家故天象仍見哀帝建平三年正月癸卯桂宫鴻寧殿災帝祖母傅太后所居也時傅太后欲與成帝母等號齊尊大臣以諫獲罪後三年帝崩傅氏誅滅平帝元始五年七月己亥髙皇帝原廟殿門災盡時平帝幼王太后臨朝委政王莽將篡漢祚墮髙帝宗廟故天象見也王莽地皇三年二月霸橋災數千人以水沃救不滅後漢光武建武六年十二月雒陽市火二十四年正月戊子雷雨霹靂火災髙廟北門明帝永平元年六月己亥桂陽火飛來燒城寺章帝建初元年十二月北宫火燒壽安殿延及右掖門元和三年六月丙午雷雨火燒北宫朱爵西闕和帝永元八年十二月丁巳南宫宣室殿火時帝幸北宫竇太后在南宫明年竇太后崩十三年八月己亥北宫盛饌門閣火時和帝幸鄧貴人隂氏以罪廢死立鄧貴人為皇后十五年六月辛酉漢中城固南城門災此孝和皇帝將絶世之象也其後二年帝崩殤帝及平原王皆早夭和帝世絶安帝永初元年十二月河南郡縣火燒殺百五人二年河南郡縣又失火燒五百八十四人四月甲寅漢陽河陽城中失火燒殺三千五百七十人先是和帝崩立殤帝復早夭平原王勝有廢疾乃更立清河王子是為安帝四年三月戊子杜陵園火元初四年二月壬戌武庫火燒兵物一百一十五種直千萬以上時羌叛大發兵禦之積十餘年天下厭苦兵役延光元年八月戊子陽陵園寢殿災凡災發於先陵此太子將廢之象也若曰不當廢太子以自翦如火不當害先陵之寢也明年上以讒言廢皇太子為濟隂王後二年宫車晏駕中黃門孫程等十九人起兵殿省誅賊臣立濟隂王四年秋七月乙丑漁陽城門樓災順帝永建三年七月丁酉茂陵園寢殿災古今注曰二年五月戊辰守宫失火燒宫藏財物盡四年河南郡縣失火燒人六畜陽嘉元年恭陵廡災及東西幕府火古今注曰十二月河南郡國火燒廬舍殺人太尉李固以為奢僭所致陵之初造禍及枯骨規廣治之尤飾又上欲更造宫室益臺觀故火起幕府燒材木永和元年十月丁未承福殿火臣昭按楊厚傳是災先是爵號阿母宋娥為山陽君后父梁商本國侯又多益商封啇子冀不襲父爵别封襄邑侯皆過差非禮漢安元年三月甲午雒陽劉漢等百九十七家為火所燒古今注曰火或從室屋間物中不知所從起數月乃止後四年宫車比三晏駕建和元年君位乃定桓帝建和六年五月癸丑北宫掖庭中德陽殿火及左掖門時梁冀挾姦譖殺太尉杜喬是後梁太后崩梁氏誅滅延熹四年正月辛酉南宫嘉德殿火戊子丙署火二月壬辰武庫火五月丁卯原陵長夀門火先是亳后因賤人得幸號貴人為后上以后母宣為長安君封其兄弟受寵隆崇又多封無功者去年春白馬令李雲坐直諫死至此彗除心尾火連作五年正月壬午南宮丙署火四月乙丑恭北陵東闕火戊辰虎賁掖門火五月康陵園寢火甲申中藏府承祿署火七月己未南宮承善闥內火六年四月辛亥康陵東署火七月甲申平陵園寢火八年二月己酉南宮嘉德署黃龍千秋萬嵗殿皆火四月甲寅安陵園寢火閏月南宮長秋和歡殿後鉤盾掖庭朔平署各火十一月壬子德陽前殿西閣及黃門北寺火殺人袁山松書曰是時連月有火災諸官寺或一日再三發又夜有訛言擊鼓相驚陳蕃劉志茂上疏諫曰古之火皆君弱臣強極隂之變也前始春而獄刑慘故火不炎上前入春節連寒木氷暴風折樹又八九州郡並言隕霜殺菽春秋晉執季孫行父木為之冰夫氣𢎞則景星見化錯則五星開日月蝕災為已然異為方來恐卒有變必於三朝唯善政可以已之願察臣前言不棄愚忠則元元幸甚書奏不省九年三月癸巳京都夜有火光轉行民相驚譟袁山松書曰是時宦豎專朝鈎黨事起上尋無嗣陳蕃竇武為曹節等所害天下無復紀綱靈帝熹平四年五月延陵園災光和四年閏月辛酉北宮東掖庭永巷署災陳蕃諌云楚女悲而西宮災不御宮女怨之所致也五年五月庚申德陽前殿西北入門內永樂太后宮署火中平二年二月己酉南宮雲臺災庚戌樂城門災南宮中門延及北闕道西燒嘉德和歡殿案雲臺之災自上起榱題數百同時並然若就縣華鐙其日燒盡延及白虎威興門尚書符節蘭臺夫雲臺者乃周家之所造也圖書術籍珍玩寶怪皆所藏在也京房易傳曰君不思道厥妖火燒宮是時黃巾作慝七州二十八郡同時俱發百姓死傷過半靈帝虐侈滋甚官非其人政以賄成天戒若曰放賢賞淫何以舊典為故焚其臺門祕府也其後三年靈帝暴崩繼以董卓之亂火三日不絶京都邱墟獻帝初平元年八月霸橋災其後三年董卓見殺魏明帝太和五年五月清商殿災初帝為平原王納河南虞氏為妃及即位不以為后更立典虞車工卒毛嘉女為后后本仄微非所宜升以妾為妻之罰也青龍元年六月洛陽宮鞠室災二年四月崇華殿災延於南閣繕復之至三年七月此殿又災帝問高堂隆此何咎也於禮寧有祈禳之義乎對曰夫災變之發皆所以明教誡也惟率禮修德可以勝之易傳曰上不儉下不節孽火燒其室又曰君高其臺天火為災此人君茍飾宮室不知百姓空竭故天應之以旱火從高殿起也按舊占曰災火之發皆以臺榭宮室為誡今宜罷散作役務從節約清掃所災之處不敢於此有所營造萐莆上所甲反下音甫嘉禾必生此地以報陛下虔恭之德帝不從遂復崇華殿改曰九龍以郡國前後言龍見者九故以為名多棄法度疲衆逞欲以妾為妻之應也吳孫亮建興元年十二月武昌端門災改作端門又災內殿門者號令所出殿者聼政之所時諸葛恪執政矜慢放肆孫峻總禁旅險害終著恪喪衆殄人峻授政於綝綝廢亮也太平元年二月朔建業火時孫綝執政矯詔殺呂據滕允明年又殺朱異棄法律逐功臣之罰也孫休永安五年二月城西門北樓災六年十月石頭小城火時嬖人張布專國多行無禮孫皓建衡二年三月大火燒萬家死者七百人時皓制令詭暴棄法度誅名士後宮女謁盛行晉武帝太康八年三月乙丑震災西閣楚王所止坊及臨商觀窗十年四月癸丑崇賢殿災十月庚辰含章鞠室修成堂前廡景坊東屋暉章殿南閣火時有上書曰漢王氏五侯兄弟迭任今楊氏三公並在大位故天變屢見竊為陛下憂之由是楊珧音遙求退是時帝納馮紞都敢反之間廢張華之功聽楊駿之讒離衛瓘之寵此逐功臣之罰也明年宮車晏駕其後楚王承竊發之旨戮害二公身亦不免震災其坊又天意乎惠帝元康五年閏月庚寅武庫火張華疑有亂先命固守然後救火是以纍代異寶王莽頭孔子屐其逆反漢高祖斷白蛇劒及二百萬人器械一時蕩盡是後愍懷見殺太子之罰也天戒若曰冢嗣將傾社稷將泯禁兵無所復施皇旅又將誰衛帝后不悟終喪四海八年十一月高原陵火時賈后凶恣賈謐專朝惡罪宜見誅絶之應永興二年七月甲午尚書諸曹火起延崇禮闥及閣道夫百揆主化之本王者棄法律之應也後清河王覃入嗣不終於位又殺太子之罰也孝懷帝永嘉四年十一月襄陽火燒死者三千餘人時王如自號大將軍司雍二州牧衆四五萬攻略郡縣此下陵上陽失其節之應也元帝太興中王敦鎮武昌武昌災火起興衆救之於此而發於彼東西南北數十處俱應數日不絶舊説所謂濫炎妄起雖興師衆不能救之之謂也干寶以為此臣而君行亢陽失節是為王敦陵上有無君之心故災也永昌二年正月癸巳京都大火三月饒安東光安陵三縣火燒七千餘家死者萬五千人明帝太寧元年正月京都火是時王敦威侮朝廷多行無禮內外臣下咸懷怨毒極隂生陽也成帝咸和二年五月京師火康帝建元元年七月庚申吳郡災穆帝永和五年六月震災石季龍太武殿及兩廟端門震災月餘乃滅金石皆盡其後季龍死大亂遂滅亡海西公太和中郤愔為會稽太守六月大旱災火燒數千家延及山隂倉米數百萬斛炎煙蔽天不可撲滅此亦桓溫強盛將廢海西極陰生陽之應也孝武帝寧康元年三月京都風火大起是時桓溫入朝志在陵上少主踐位人懷憂恐此與太寧火事同太元十年正月國子學生因風放火焚房百餘間是後考課不厲賞黜無章蓋有育才之名而無收賢之實此不哲之罰先兆也十三年十二月乙未延賢堂災是月景申螽斯則百堂及客館驃騎府庫皆火於時朝多弊政衰陵日兆不哲之罰皆有象類主相不悟終至亂亡會稽王道子寵幸尼及姏武酣反老女稱母各樹用其親戚乃至出入宮掖禮見人主天戒若曰登延賢堂及客館者多非其人故災之也又孝武帝更不立皇后寵幸微賤張夫人夫人驕妬皇子不繁乖螽斯則百之道故災其殿焉道子復賞賜不節故府庫被災斯亦其罰也安帝隆安二年三月龍舟二乘災是水沴火也其後桓元篡位帝乃播越天戒若曰王者流遷不復御龍舟故災之耳元興元年八月庚子尚書下舍曹火時桓元遙録尚書故天火示不復居也三年盧循攻略廣州刺史吳隱之閉城固守其十月壬戌夜火起時百姓避寇盈滿城內隱之懼有應賊者但務嚴兵不先救火由是府舍焚蕩燒死者萬餘人因遂散潰悉為賊擒義熙四年七月丁酉尚書殿中吏部曹火九年京都大火燒數千家十一年京都所在大行火災吳界尤甚火防甚峻猶日不絶王𢎞時為吳郡晝在聽事見天上有一赤物下狀如信幡遙集路南人家屋上火即大發𢎞知天為之災故不罪火主此帝室衰微之應也宋文帝元嘉五年正月戊子都下大火七年十二月都下火延燒大社北墻二十九年三月壬午都下火齊東昏侯永元二年七月甲申宮內火惟東閣內明帝舊殿數區及太極殿以南得存餘皆蕩盡梁武帝天監元年五月有盜入南北掖燒神武門總章觀時帝初即位而火燒觀闕不祥之甚既而太子薨皇孫不得立及帝暮年惑於朱異之口果有侯景之亂宮室多被焚燒天誡所以先見也普通二年五月琬琰殿火延燒後宮三千餘間中大通元年朱雀航華表災明年同泰寺災大同三年朱雀門災水沴火也時帝崇尚佛道宗廟牲牷皆以麵代之又數詣寺捨身為奴王公以下贖之天變數見而不悟後卒以亡陳武帝永定三年重雲殿災東魏孝靜天平二年十一月閶闔門災是時齊神武作宰而大野拔斬樊子鵠以州來降神武聽讒而殺之司空元暉免逐功臣大臣之罰也武定五年八月廣宗郡火燒數千家後齊後主天統三年九龍殿災延燒西廊四年昭陽宣光瑶華三殿災延燒龍舟是時讒言任用正士道消祖孝徵作歌謡斛律明月以誅死讒夫昌邪勝正之應也京房易傳曰君不思道厥妖火燒宮隋文帝開皇十四年將祠泰山令使者致石象神祠之所未至數里野火歘起燒像碎如小塊時帝頗信讒言猜阻骨肉滕王瓚失志而死創業功臣多被夷滅故天見變而帝不悟其後太子勇竟被廢戮煬帝大業十二年顯陽門災舊名廣陽則帝之姓名國門之崇顯號令之所由出也時帝不遵法度驕奢荒怠信讒害忠天意若曰害廣陽也唐太宗貞觀四年正月癸巳武德殿北院火二十三年三月甲弩庫火高宗永徽五年十二月乙巳尚書司勳庫火顯慶元年九月戊辰恩州吉州火焚倉廪甲伏民居二百餘家十一月己巳饒州火武太后證聖元年正月丙申夜明堂火武太后欲避正殿徹樂宰相姚璹以為火因人非天災也不宜貶損后乃御端門觀酺引建章故事復作明堂以厭之是歲內庫災燔二百餘區萬歲通天元年三月壬寅撫州火久視元年八月壬子平州火燔千餘家中宗景龍二年二月東都凌空觀災元宗開元五年十一月乙卯定陵寢殿火是歲洪州潭州災延燒州署州人見有物赤而暾暾飛來旋即火發十五年七月甲戌興教門樓柱災是年衡州災延燒三百餘家州人見有物大如甕赤如燭籠所至火即發十八年二月丙寅大雨雪俄而雷震左飛龍廄災占曰天火燒廄兵大起十月乙丑東都宮佛光寺火天寶二載六月東都應天門觀災延燒左右延福門經日不滅京房易傳曰君不思道天火燔其宮室九載三月華嶽廟災時帝將封西嶽以廟災乃止十載八月丙辰武庫災燔兵器四十餘萬武庫甲兵之本也肅宗寶應元年十二月己酉太府左藏庫火代宗廣德元年十二月辛邜夜鄂州大風火發江中焚舟三十艘延及岸上民居二千餘家死者數千人大歷十年二月莊嚴寺浮圖災初有疾風震電俄而火從浮圖中出德宗貞元元年江陵度支院火焚江東租賦百餘萬十三年正月東都尚書省火十九年四月家令寺火憲宗元和二年七月洪州火燔民舍萬七千家七年六月鎮州甲仗庫災主吏坐死者百餘人八年江陵大火十一年十一月甲戌元陵火李師道起宮室於鄆州將謀亂既成而火文宗太和二年十一月甲辰禁中昭德寺火延至宣政東垣及門下省宮人死者數百人三年十月癸丑仗內火四年三月陳州許州火燒萬餘家十月浙西火八年三月揚州火皆燔民舍千區五月己巳飛龍駒中廄火十月揚州市火燔民舍數千區十二月禁中昭成寺火開成二年六月徐州火延燒居民三百餘家四年十二月乙邜乾陵火丁丑晦揚州市火燔民舍數千家武宗會昌元年五月潞州市火三年六月西內神龍寺火萬年縣東市火焚廬舍甚衆六年八月葬武宗辛未靈駕次三原縣夜大風行宮幔城火僖宗乾符四年十月東都聖善寺火昭宗大順二年六月乙酉幽州市樓災延及數百步七月癸丑甲夜汴州相國寺佛閣災是日暮微雨震電或見有赤塊轉門譙藤網中周而火作頃之赤塊北飛轉佛閣藤網中亦周而火作既而大雨暴至平地水深數尺火益甚延及民居三日不滅後唐明帝天成四年十一月汝州火燒羽林軍營五百餘間先是司天奏熒惑入羽林請京師為火備至是應之長興二年四月汴州封禪寺門上忽有火起延燒近寺廬舍相次黎陽縣亦火後晉高祖天福三年十一月襄州奏火焚居民千餘家周世宗顯德五年四月吳越王錢宏俶奏十日夜杭州火焚燒府署殆盡上命中使齎詔恤問宋太祖建隆元年宿州火燔民舍萬餘區二年三月內酒坊火燔舍百八十區酒工死者三十餘三年正月滑州甲仗庫火燔儀門及軍資庫一百九十區兵器錢帛並盡開封府通許鎮民家火燔廬舍三百四十餘區二月安州牙吏施延業家火燔民舍并顯義軍營共六百餘區五月京師相國寺火燔舍百餘區海州火燔數百家死者十八人乾德四年二月嶽州衙署廪庫火燔市肆民舍殆盡官吏踰城僅免三年陳州火燔民舍數千區潭州火燔民舍五百區踰月民死者三十六人是春諸州言火者甚衆八月衡州火燔公署倉庫民舍僅存者千餘區五年京師建隆觀火開寶二年八月辰州廨火及燔軍資庫五年七月忠州廨火倉庫殆盡七年九月亳州永城縣火燔民舍一千八十四區八年四月洋州火燔州廨民舍千七百區亳州永城縣火燔軍營民舍千九百八十區死者九人太宗太平興國七年八月益州西倉災雍熙元年五月丁丑乾元文明二殿災初夕隂雲雷震火起月華門翊日辰巳方止二年九月庚戌夜楚王元佐宮火燔舍數百區王自是以疾廢於家端拱元年二月雲安軍威棹營火二年三月衡州火燔州縣官舍倉庫軍營三百餘區又崇賢坊有烏銜火燔數十處七日不滅淳化三年十月蔡州懷愛軍營火燔汝河橋民居官舍三千餘區死者數人十二月建安軍城西火燔民舍官廨等殆盡四年二月永州保安津舍火飛焰過江燒州門及民屋三百餘家真宗咸平二年四月池州倉火燔米八萬七千斛景德元年正月平敵軍營火焚居民廬舍甚衆四年十一月郢州火倉庫並盡大中祥符元年正月桂州甲仗庫災二年四月升州火燔軍營民舍殆盡七年雄州甲仗庫火八年二月甲寅宗正寺火四月壬申夜榮王元儼宮火自三鼓北風甚癸酉亭午乃止延燔承天祥符門內藏左藏庫朝元門崇文院祕閣天書法物內香藥庫九年五月甲子左天廄坊草場火天禧二年二月戊寅北宅蔡州團練使德雍院火延燔數百區三年春京師多火六月永州軍營火延民舍數百區仁宗天聖七年六月丁未玉清昭應宮災初大中祥符元年詔建宮以藏天書七年宮始成凡三千六百一十楹至是火發夜中大雷雨至曉而盡明道元年八月壬戌修文德殿成是夜中火延燔崇德長春滋福會慶延慶崇徽天和承明八殿景祐三年七月庚子太平興國寺火起閣中延燔開先殿及寺舍數百楹是夕大雨電寶元三年六月丁丑益州火焚民廬舍三千餘區康定元年六月乙未南京鴻慶宮神御殿火慶歷三年十一月丙寅上清宮火八年正月壬午江寧府火初李景在江南大建宮室府事其制多倣帝室至是一夕而焚惟存一廳乃玉燭殿也至和二年并州太宗神御殿火嘉祐三年正月溫州火燔屋萬四千間死者五十人神宗治平四年十二月壬子夜睦親宮火焚九百餘間甲寅廣親宮又火熙寧六年二月丙申永昌陵上宮火燔東城門七年九月壬子三司火自己至戌焚屋千八十楹案牘殆盡十年正月仙韶院火撤屋二百五十楹三月丙子開封府火元豐元年八月雍州火焚官舍千三百四十六區諸軍衣萬餘襲榖帛軍器百五十萬四年六月衡州火燒官舍民居七千二百楹又欽州亦大雷震火焚城屋五年二月洞真宮火八年二月辛巳開寶寺火時寓禮部貢院於寺點檢試卷官翟曼陳方馬希孟焚死吏卒死者十四人哲宗元祐元年三月宗室宮院火六年十二月開封府火紹聖三年三月初七日尚書省火尋撲滅上諭執政禁中屢火方醮禳已罷春宴仍不御垂拱殿三日四年七月甲子禁中火元符元年四月宗室宮院火徽宗建中靖國元年六月壬寅集禧觀火大雨中久而後滅崇寧二年六月太一宮火三年三月辛丑大內火政和三年四月蘇州火延燒公私屋一百七十餘間五月辛丑京師大盈倉火是嵗成都府大慈寺溫州純州皆火八年九月掖庭大火自甲夜逹曉大雨如傾火益熾凡爇五千餘間後苑廣聖宮及宮人所居幾盡焚死者甚衆欽宗靖康元年十二月丙子夜尚書省火延燒禮祠工刑吏部拆尚書省牌擲火中禳之乃息二年三月戊戌天漢橋火焚百餘家頃之都亭驛又火己酉保康門火高宗紹興元年十月乙酉行在越州大火民多露處令有司賑緡粟弛材葦之征十二月辛未越州再火吏部文書多焚乙酉降旨移蹕錢塘二年正月丁巳宣州大火燔城中民舍幾盡五月庚辰行在臨安府大火頃刻跨山亘六七里燔民舍一萬數千家十二月甲午行都大火燔吏刑工部御史臺官府民廬軍壘盡乙未旦乃熄銓選文書無存者令户部發廪賑焚室三年九月庚申行都闕門外民廬火燔者甚廣令户部發廪以賑命有司修火政四年正月戊寅行都火燔闤闠民廬數千家六年二月行都屢火通燔千餘家詔沿流州縣幾執姦間者以李光言而止十二月行都大火燔民廬萬餘家人有灼死者時上以劉豫入寇親征都民之暴露者多凍死令留守秦檜發戶部米以賑七年二月丁酉太平州大火州治宣撫司及官舍民廬帑藏文書皆盡民之死於火者甚衆録事參軍呂應中死其職當塗縣丞李致虛亦死焉九年二月己卯行都火七月壬寅復火十年十月行都火燔民廬官舍延及省部十一月丁巳溫州大火燔州學酤征舶等務永嘉縣治及民廬千餘家十一年七月婺州大火燔郡獄倉場務寺觀甚廣民廬幾燬其半九月甲寅建康府火燔府治三千餘區民廬三千餘家十二年三月丙申行都火二月辛巳鎮江府火燔倉米數萬石芻六萬束民居之焚者尤衆是月太平池州及蕪湖縣火皆燔民廬四月庚辰行都火九月甲子行都民居火經夕漸近太室而滅乙丑令有司撤火道周廟垣二十步十七年十二月辛亥靜江府火燔民舍甚衆二十年正月壬午行都火燔吏部文書皆盡二十六年潭州南嶽廟火即請復作廟令有司給以緡粟二十九年四月鎮江府火焚軍壘民廬令有司豫財賑粟雍熙乾道元年春德安府應城縣廄驛火二年冬真州六合縣武鋒軍壘火十二月婺州火自是火患不息人火之也九年九月台州火經夕至於翌日晝漏半燔郡獄縣治醖務及民廬七千餘家淳熙元年十二月丁巳泉州火燔城樓民舍五十餘家令有司賑恤二年六月戊午潭州南嶽廟火令有司給錢萬五千緡粟三千斛改作八月嚴州火令守臣恤之十一月癸亥麗正門內東廡災是嵗瀘州火郡上焚室之書不實部刺史張之俱坐貶秩三年九月大內射殿災延及東宮門四年十一月辛酉鄂州南市火暴風通夕燔民舍千餘家令漕臣郡守賑恤之五年四月庚寅興州沙市火燔民舍三百四十餘家人有焚死者十一月和州牧營火燔一百六十區禁旅畨上者居之也七年二月江陵府沙市大火燔民舍數千家江艦焚溺不可勝計灼死者甚衆八月溫州試士丁酉火作於貢闈上令籍元卷姓名再試防其溢於外貫也八年正月揚州火九年九月合州大火燔民居幾盡官舍僅有存者十二年八月溫州火燔城樓居民廬四百餘家十月鄂州大火燔民居萬餘家江風暴作結廬於隄泊艦於岸者焚溺無遺令守臣恤之且止民毋隄居十四年五月大內武庫火戎器不害六月庚寅行都寶蓮山民居火延七百餘家救焚將校有死者令守臣以緡粟賑之五月成都府市火燔民舍萬家令帥臣賑恤之十六年九月南劍州大火民居存者無幾光宗紹熙元年八月壬寅處州火延州市及民舍數百家二年四月行都傳法寺火延及民廬言者以戚里土木為孽火數起之應時中宮建廟第都民之應徙者多是月徽州大火自庚子至於壬寅夜燔州治樵樓官舍郡獄緡帑庫務凡十九所五百二十餘區延户廬一千五百家令部使者賑之粟五月己巳金州火燔州治官舍帑藏保勝軍器庫城內外民舍甚廣令總餉及常平使者賑之三年正月己巳行都火通夕至於庚午闤闠焚者半十一月又火燔民居五百餘家十二月甲辰鄂州火至於乙巳燔民居八百家市井樓簾無存者寧宗慶元二年八月己酉永州州市火燔民廬三百家皆令守臣賑恤之三年五月甲申金州都統司中軍壘舍火焚一千三百餘區閠六月乙酉又火燔二千餘區令豫緡錢營其壘六年七月戊戌徽州火燔民舍八百餘家延郡獄官舍甚廣令守臣賑恤之嘉泰元年三月戊寅行都大火至於四月辛巳燔御史臺司農寺將作軍器監進奏文思御輦院太史局軍頭皇城司法物庫御厨班直諸軍壘及民居五萬八千九十七家城內外亘十餘里灼死之可知者五十有九人而踐死者不可計都城九燬其七時百官皆僦舟以居是夕火作於寶蓮山御史臺胥楊浩居舍諌議大夫程松請戮浩以謝都民再疏始黥萬安軍猶免決自是都民訛自相驚亡賴因以縱火為姦利壬午上降次貶食下哀痛之詔內出帑錢一十六萬三千五百七十餘緡米六萬五千一百九十餘石賑焚室三年正月丁酉襄陽府火作而風暴僅燔民舍六十家選鋒軍校于友直死於救焚帥漕臣上其功贈二秩官其二子十一月甲午福州火民舍之焚者四百餘家四年三月丁卯行都大火燔尚書省中書省樞密院六部右丞相府制勑糧料院親兵營修內司延及學士院內酒庫內宮門廡夜召禁旅入撲太室撤廟廡神主移御壽慈宮册寶隨之戊辰旦火及和寧門鴟禁卒張隆飛梯斧鴟門以下不火是夕火分數道燎民廬三千七十餘家詔出內帑緡錢豐儲倉米以賑己巳神主回御太室時省部皆寓治驛寺壬申上避路朝下罪己詔乙亥令百官直言時政闕失六月盱眙軍天長縣禁旅戍壘火鎧械為盡八月壬辰鄂州外南市火燔民舍五百餘家開禧二年二月癸丑夀宮火乙卯上降次去樂四月壬子行都火燔民居數百家詔出封樁緡錢豐儲倉粟以賑嘉定二年八月己巳信州火燔民廬二百家九月丁酉吉州火燔五百餘家是嵗瀘州火延及民廬一千餘家皆令郡賑恤之四年閏二月己卯紹興府嵊縣浦橋火燔百餘家三月滁州火燔民居甚廣皆令各郡賑恤之十月撫州火辛卯福州一夕再火燔城門僧寺民廬千餘家死者數人五年五月己未和州火燔民廬二千家八年八月辛丑湖州火燔寺觀及民廬三百家九年七月甲戌南劍州沙縣火燔縣門官舍及民廬一千一百餘家有死者令各郡賑恤之十一年二月行都火燔民居數百家九月己巳禁垣外萬松嶺民舍火延及四百八十餘家令出緡粟賑之十二年二月庚寅安豐軍故步鎮火燔民廬千餘家死傷於焚者五十餘人令郡守賑恤之八月庚午慶元府火燔官舍民廬第宅寺觀甚衆詔縣焚室而弛其年租賦十一月壬子行都火燔城內民廬數萬家禁壘百二十區賑軍民緡粟令臨安府帥臣安集焚徙者且弛材葦之征十七年四月丁卯西和州焚軍壘及繞城民廬二千餘家人火之也守臣尚震午聞敵焚之而遁敵實不至六月丁亥嶽州火燔嶽陽樓郡獄帑庫以及民居八十家己丑又火燔百餘家火異周武王伐紂師渡孟津既濟有火自上復於下至於王屋流為烏其色赤其聲魄云注見羽蟲之異威烈王三年冬十一月晉有火下於北方有聲如鼓漢成帝河平四年六月山陽火生石中改元為陽朔朔始也以火生石中言陽氣之始後漢桓帝延熹九年三月癸巳京師有火光轉行人相驚譟晉惠帝永康元年帝納后羊氏將入宮衣中忽有火衆咸怪之後后竟坐廢光熙元年五月范陽國地燃可以㸑穆帝升平元年涼州城東池中有火姑臧澤水中有火石虎時石燃於泰山八日而滅苻堅時關中土燃無火而煙氣大起方數十里中月餘不滅齊武帝永明十一年先是魏地謡言赤火南流喪南國是嵗有沙門從北齎此火至火赤於常火而微云以療疾貴賤爭取之多得其驗二十餘日都下大盛咸云聖火詔禁之不止火灸至七炷而疾愈吳興邱國賔密以還鄉邑人楊道慶虛疾二十年依法灸即差唐太宗貞觀十三年三月壬寅雲陽石燃方丈晝則如灰夜則有光投草木則焚厯年乃止火失其性而沴金也幽州坊谷地常有火長慶三年夏遂積水為池近水沴火也宋太祖開寶七年六月棣州有火自空墜於城北有物如龍詳見龍蛇之異太宗端拱元年瀘州鹽井竭遣工入視忽有聲如雷火焰突出工被傷髙宗紹興三十二年建昌軍新城縣有巨室篋中時有火光燔衣帛過半而篋不焚近孽火也赤眚赤祥左氏傳魯襄公時宋有生女子赤而毛棄之隄下宋平公母共姬之御者見而收之因名曰棄長而美好納之平公生子曰佐後宋臣伊戾讒太子痤而殺之先是大夫華元出奔晉華弱奔魯華臣奔陳華合比奔衛劉向以為時則火災赤眚之明應也京房易傳曰尊卑不别厥妖女生赤毛漢惠帝二年天雨血於宜陽一頃所劉向以為赤眚也時諸呂用事讒口妄行殺三皇子髙帝三子建立非嗣立後宫子為惠帝嗣及呂太后崩大臣共誅滅諸呂僵尸流血京房易傳曰歸獄不解兹謂追非厥咎天雨血兹謂不親民有怨心不出三年無其宗人又曰佞人祿功臣僇天雨血武帝建元四年有風赤如血哀帝建平四年四月山陽湖陵雨血廣三尺長五尺大者如錢小者如麻子後二年帝崩王芥擅朝誅貴戚丁傅大臣董賢等皆放徙逺方與諸呂同象誅死者少雨血亦少王莽始建國四年夏赤氣出東南竟天後漢桓帝建和三年秋七月北地廉雨肉似羊肋肋脅骨也或大如手近赤祥也時梁太后攝政兄冀専權枉殺李固杜喬等天下寃之其後梁氏誅滅魏公孫淵時襄平北市生肉長圍各數尺有頭目口喙無手足而動搖此赤祥也占曰有形不成有體不聲其國滅亡淵尋為魏所誅吳戍將鄧喜殺豬祠神治畢懸之忽見一人頭往食肉喜引弓射中之咋咋助陌反作聲繞屋三日近赤祥也後人白喜謀北叛闔室受誅京房易妖曰山見葆江於邑巴有兵狀如人頭赤色晉武帝太康五年四月壬子魯國池水變赤如血十年十月河隂有赤雪三頃此赤祥也是後四載而帝崩王室遂亂惠帝元康五年三月呂縣有流血東西百餘步此赤祥也至元康末窮凶極亂僵尸流血之應也干寶以為後八載而封雲亂徐州殺傷數萬人是其應也永康元年三月尉氏雨血夫政刑舒緩則有常燠赤祥之妖此嵗正月送愍懷太子幽於許宫天戒若曰不宜緩恣姦人將使太子寃死惠帝愚眊不悟是月愍懷遂斃於是王室成釁禍流天下淖奴效反齒殺齊湣眉隕反占曰天雨血霑衣天以告也此之謂乎京房易傳曰歸獄不解兹謂追非厥咎天雨血兹謂不親下有怨心不出三年亡其宗人又曰佞人祿功臣戮天雨血也永寧二年十一月壬寅夜赤氣竟天隱隱有聲永興二年十月赤氣見於北方東西竟天愍帝建興元年河東雨肉劉聰偽建興元年雨血於東宫延明殿徹瓦在地者深五寸又雨血平陽廣袤十里平陽地震其崇明觀陷為池水赤如血赤氣至天有赤龍奮迅而去流星起於牽牛入紫微龍形委蛇其光照地落於平陽北十里視之則肉臭聞於平陽長三十步廣二十七步肉傍常有哭聲晝夜不止數日聰后劉氏産一蛇一獸各害人而走尋之不得頃之見於隕肉之傍時聰納劉殷三女為后逆骨肉之綱亂人倫之則隕肉諸妖其眚亦大俄而劉氏死哭聲自絶石虎末雨血周遍鄴城梁武帝天監十五年七月荆州市殺人而身不僵首墮於地動口張目血如竹箭直上丈餘然後如雨細下是嵗荆州大旱近赤祥寃氣之應陳宣帝大建十四年正月御座幄下見一物如車輪色正赤尋而帝患無故大呌數聲而崩後主至德二年十二月有赤物隕於太極殿前初下鐘皆鳴又嘗進白飲忽變為血又有血霑殿階瀝瀝然至御榻俄而國亡北齊武成河清二年太原雨血劉向曰血者隂之精傷害之象僵尸之類明年周師與突厥入并州大戰城西伏尸百餘里京房易飛候曰天雨血染衣國亡君戮亦後主亡國之應四年有物隕於殿庭色赤形如赤漆鼓帶小鈴衆星隨者如小鈴四月婁太后崩武平中有血點地自咸陽王斛律明月宅而至於太廟天戒若曰殺明月則宗廟隨而覆矣後主不悟國祚竟絶隋煬帝大業十三年上徙居丹陽將遜居江左有石自江浮入於揚子日光四散如血上甚惡之次年遇弒唐髙祖武德七年河間王孝恭征輔公祏宴羣師於舟中孝恭以金碗酌江水將飲之則化為血孝恭曰碗中之血公祏授首之祥武德初突厥國中雨血三日武太后光宅初宗室岐州刺史崇真之子橫杭等夜宴忽有氣如血腥武后時來俊臣家井水變赤如血井中夜有吁嗟嘆惋聲俊臣以木棧之木忽自投十步外長安中井水晉祠水赤如血中宗時成王千里家有血點地及奩箱上有血淋􅅹腥聞數步又中郎將東夷人毛婆羅炊飯一夕化為血中宗景龍二年七月癸巳赤氣際天光燭地三日乃止赤氣血祥也元宗天寶六載少陵原楊慎矜父墓封域內草木皆流血慎矜令浮屠史敬思禳之退朝祼而桎梏於叢棘間如是數旬流血不止十二載李林甫第東北隅每夜火光起或有如小兒持火出入者近赤祥也十三載汝南葉縣南有土塊鬪中有血出數日不止肅宗寶應元年八月庚午夜有赤光亘天貫紫微漸移東北彌漫半天代宗大厯十三年二月太僕寺有泥像左臂上有黑汗滴下以紙承之血也德宗貞元二年十一月壬午日沒有赤氣五出於黑雲中亘天十二年九月癸卯夜有赤氣如火見北方上至北斗十七年福州劍池水赤如血二十一年正月甲戌雨赤雪於京師憲宗元和十四年二月鄆州從事院門前地有血方尺餘色甚鮮赤不知所從來以為自空而墮也穆宗長慶元年七月戊午河水赤三日止敬宗寶厯元年十二月乙酉夜西北有霧起須臾遍天霧止有赤氣或淺或深久而乃散文宗太和元年四月庚戌北方有赤氣中有數白氣間之六月乙卯夜西北有赤氣八月癸卯京師見赤氣滿天二年閏三月乙卯北方有赤氣如血懿宗咸通七年鄭州永福湖水赤如凝血者三日僖宗乾符六年中書政事堂忽旦有死人血汚滿地不知主名又御井水色赤而腥泄之得一死女子腐爛近赤祥也中和二年七月丙午夜西北方赤氣如綘際天光啓元年正月潤州江水赤凡數日宋神宗熙寧二年十一月每夕有赤氣見西北隅如火至人定乃滅哲宗元祐三年七月丁卯夜東北方明如晝俄成赤氣內有白氣經天徽宗建中靖國元年正月朔夕有赤氣起東北彌亘西方久之中出白氣二及赤氣將散復有黑氣在其傍欽宗靖康元年九月戊寅有赤氣隨日出髙宗建炎元年八月庚午東北方有赤氣占曰血祥是嵗金人再犯京師遂南牧兵禍拏結流血之象也四年五月洞庭湖夜赤光見東北亘天如火明照湖心上下一色俄轉東南此赤祥也後金兵犯湘沔又鍾相孔彥舟曹火星劉超彭筠楊么巨盜相繼荼毒一道即其驗也紹興七年正月乙酉北方有赤氣逹旦辛卯東北有赤氣如火在牛斗間十一月癸卯南方有赤氣東西北皆赤雲自日入至於甲夜皆赤祥也八年九月甲申赤氣出紫微垣十八年八月丁亥九月甲寅皆有赤氣如火二十年十一月建昌軍新城縣永安村風雪大作夜半若數百千人行聲語笑歌哭雜擾匆遽而凝寒隂黑咫尺莫辨窺之無所睹明旦雪深有人畜鳥獸迹流血汙染十餘里入山乃絶近血妖亦赤祥也二十七年三月乙酉赤氣出紫微垣七月壬申赤氣隨日入三十年二月壬申皆有赤氣如火三十二年春淮水溢中有赤氣如凝血先是金國主完顔亮入寇駐揚州為其下所弒至是始遁淮水凝血逆氣之應也鄭景純曰血水類同屬於坎後連嵗旱亦其驗也孝宗隆興二年十一月庚寅日入後赤雲隨之乾道元年八月壬午赤氣中天自日入至於甲夜六年十月庚午赤氣隨日出十一月丁丑赤雲隨日入至於甲夜七年七月壬寅十月戊午己未八年十月乙巳丙午淳熙三年八月丁酉戊戌皆有赤氣隨日入出十三年行都民舍有血自地中出濺屋梁汙人衣近赤祥也十四年十一月癸丑甲寅有赤氣隨日入出光宗紹熙三年春潼川路久旱日月星皆帶赤氣四年十一月甲戌赤雲夜見白雲間之近赤白祥也寧宗慶元六年十月赤氣夜發橫天嘉泰四年二月庚申夜有赤雲間以白氣東北亘天後八日國有大火言者以為火祥嘉定六年十月乙卯赤氣隨日出十一月辛卯赤氣隨日入文獻通考卷二百九十八
