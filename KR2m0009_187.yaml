body:
  text: 文獻通考卷一百八十七鄱陽馬端臨貴與著經籍考十四經儀注隋經籍志儀注之興由來久矣自君臣父子六親九族各有上下親疏之别養生送死弔恤賀慶則有進止威儀之數唐虞以上分之為三在周因而為五周官宗伯所掌吉凶賔軍嘉以佐王安邦國親萬民而太史執書以協事之類是也是時典章皆具可履而行周衰諸侯削除其籍至秦又焚而去之漢興叔孫通定朝儀武帝時始祀汾隂后土成帝時初定南北之郊節文漸具後漢又使曹褒定漢儀是後相承世有制作然猶以舊章殘闕各遵所見彼此紛爭盈篇滿牘而後世多故事在通變或一時之制非長久之道載筆之士刪其大綱編於史志而或傷於淺近或失於未達不能盡其指要遺文餘事亦多散亡今聚其見存者以為儀注篇漢志四家一百一十五卷隋志五十九部一千二十九卷通計亡書合六十九部三千九十四卷唐志六十一家一百部一千四百六十七卷知姓名三十二家竇維洗金以下不著録四十九家八百九十三卷宋三朝志三十一部一百二十九卷宋兩朝志二十一部四百三十九卷宋四朝志五十五部三千七百七十三卷宋中興志七十九家九十四部一千六百七卷宋志又十部三百八十三卷元入禮門今釐入儀注門宋志諡志十二家一百七十四卷按諡者國家送終之大典今歷代史志俱以諡法入經解門則倫類失當今除周公諡法春秋諡法二項入禮門而歷代之諡法則俱附於儀注之後庶以類相從云叔孫通朝儀本傳漢王已并天下諸侯共尊為皇帝於定陶通就其儀號髙帝悉去秦儀法為簡易羣臣欲爭功醉或妄呼拔劒擊柱上患之通説上曰夫儒者難與進取可與守成臣請徵魯諸生與臣弟子共起朝儀采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之於是通使徵魯諸生三十餘人及上左右為學者左右謂近臣也為學謂素有學術與其弟子百餘人綿蕞野外應劭曰立竹及茅索營之習禮儀其中也如淳曰謂以茅翦樹地為纂位尊卑之次也習之月餘通曰上可試觀上使行禮曰吾能為此乃令羣臣習肄七年長樂宮成行之先公曰按史言通制禮大抵皆襲秦故少所改變其書後與律令同藏於理官法家又復不傳臣民莫有見者夫天高地下而禮制行矣豈專為尊君抑臣哉叔孫之制禮也不過度帝所能為髙帝之觀之也不過曰吾今知皇帝之貴而已夫豈知其出於人心天理之本然哉故書之録也與律令同其藏也在理官然則非禮也刑禁之書而已曹褒漢禮本傳肅宗章和二年欲制定禮樂褒乃上疏請著成漢禮章下大常大常巢堪以為一世大典非褒所定不可許帝知羣僚拘牽難與圖始朝廷禮憲宜以時定乃下詔曰漢遭秦餘禮壞樂崩且因循故事未可觀省有知説者各盡所能褒乃復上疏具陳禮樂之本制改之意拜褒侍中召元武司馬班固問改定禮制之宜固曰京師諸儒多能説禮宜廣招集共議得失帝曰諺言作舍道旁三年不成會禮之家名為聚訟亙生疑異筆不得下昔堯作大章一夔足矣乃召褒詣嘉德門令小黃門持班固所上叔孫通漢儀十二篇敕褒曰此制散略多不合經今宜依禮條正便可施行於南宮東觀盡心集作褒既受命乃次序禮事依凖舊典雜以五經讖記之文撰次天子至於庶人冠昏吉凶終始制度以為百五十篇寫以二尺四寸簡其年十二月奏上帝以衆論難一故但納之不復令有司平奏會帝崩和帝即位褒乃為作章句帝遂以新禮二篇冠後大尉張酺等奏褒擅制漢禮破亂聖術宜加刑誅帝雖寢其奏而漢禮遂不行致堂胡氏曰孔子刪詩定書繫易作春秋而不述禮樂之制何也禮因人情為之節文樂以象功故難立一成不變之制也殷因於夏周因於殷其或繼周者皆不免於有損有益夏質殷忠而周文其不可一也明矣雖然聖人必因事以明其義蓋其數可陳祝史有司之所能預也其義難知非仁且智則不能本人情而約之於中道也故或先王有之而不宜於今之世或古未之有而可以義起神而明之存乎其人而已曹褒之志蓋亦深見叔孫通之儀有未當者故憤然欲正之而章帝亦以是命之若請博徵名儒遲以年歲猶庶幾乎不大違戾有可行者而身當重任決以獨見才數月間遽成百五十篇且又雜以讖記之文蓋不待見其書而可逆知舛駁不純乎古之正禮矣一世大典既鮮克留意者幸而有之其成就乃爾豈不惜哉按三代之禮亡於秦繼秦者漢漢之禮書則前有叔孫通後有曹褒然通之禮雜秦儀褒之禮雜讖緯先儒所以議其不純也然自古禮既亡今傳於世者惟周官儀禮戴記而其説未備鄭康成於三書皆有注後世之所欲明禮者每稽之鄭注以求經之意而鄭注則亦多雜讖緯及秦漢之禮以為説則亦必夲於通褒之書矣此三書者漢隋唐三史藝文志俱無其卷帙則其書久亡故後世無述焉然魏晉而後所用之禮必祖述此者也故托二傳中所言二家著述之旨以為儀注之首漢舊儀四卷衛敬仲撰隋志四卷今夲止三卷獨斷二卷鼂氏曰漢左中郎將蔡雍纂雜記自古國家制度及漢朝故事王莾無髮蓋見於此公武得孫蜀州道夫夲乃閣下所藏陳氏曰言漢世制度禮文車服及諸帝世次而兼及前代禮樂舒台二郡皆有刋夲向在莆田嘗録李氏夲大略與二夲同而上下卷前後錯互因並見之江都集禮一百四卷崇文總目隋諸儒撰初煬帝以晉王為揚州總管鎮江都令諸儒集周漢以來禮制因襲下逮江左先儒論議命潘徽為之序凡一百二十卷今亡闕僅存一百四卷開元禮一百五十卷陳氏曰唐集賢院學士蕭嵩王仲邱等撰唐初有貞觀顯慶禮儀注不同而顯慶又出於許敬宗希旨傅會不足施用開元十四年通事舍人王函請刪禮記舊文而益以今事張説以為禮記不可改易宜折𠂻貞觀顯慶以為唐禮乃詔徐堅李鋭施敬夲撰述蕭嵩王仲邱繼之書成唐五禮之文始備於是遂以設科取士新史禮樂志大略采托著於篇然唐初已降凶禮於五禮之末至顯慶遂削去國恤一篇則敬宗諂諛諱惡鄙陋亡稽卒不正也開元禮百問二篇陳氏曰不著名氏以古今異制設為問答凡百條開元禮義鑑一百卷崇文總目唐蕭嵩撰既定開元禮又以禮家名物繁夥更取歷代沿革隨文釋義與禮並行開元禮京兆義羅十卷崇文總目不著撰人名氏據開元已有義鑑申衍其説今此又網羅其遺墜云開元禮類釋二十卷崇文總目不著撰人名氏以唐禮繁重故彚其名物粗為申釋大唐郊祀録十卷陳氏曰唐太常禮院修撰王涇撰考次歷代郊廟沿革之制及其工歌祝號而圖其壇屋陟降之序貞元中上之禮閣新儀三十卷陳氏曰唐太常修撰韋公肅撰録開元以後禮文損益至元和十年其一卷為目録按館閣書目云卷數雖存而書不全又復差亙重出今夲不爾但目録稍誤南豐曽氏序曰禮閣新儀三十篇韋公肅撰記開元以後至元和之變禮史館祕閣及臣書皆三十篇集賢院書二十篇以參相校史館及祕閣及臣書多復重其篇少者入集賢院書獨具然臣書有目録一篇以考其次序蓋此書夲三十篇則集賢院書雖具然其篇次亦亂既正其脫謬因定著從目録而禮閣新儀三十篇復完夫禮者其夲在於養人之性而其用在於言動視聽之間使人之言動視聽一於禮則安有放其邪心而窮於外物哉不放其邪心不窮於外物則禍亂可息而財用可充其立意微其為法逺矣故設其器制其物為其數立其文以待其有事者皆人之起居出入吉凶哀樂之具所謂其用在乎言動視聽之間者也然而古今之變不同而俗之便習亦異則法制度數其久而不能無弊者勢固然也故為禮者其始莫不宜於當世而其後多失而難遵亦其理然也失則必改制以求其當故羲農以來至於三代禮未嘗同也後世去三代蓋千有餘歲其所遭之變所習之便不同固已逺矣而議者不原聖人制作之方乃謂設其器制其物為其數立其文以待其有事而為其起居出入吉凶哀樂之具者當一二以追先王之迹然後禮可得而興也至其説之不可求其制之不可考或不宜於人不合於用則寧至於漠然而不敢為使人之言動視聽之間蕩然莫之為節至患夫為罪者之不止則繁於為法以禁之故法至於不勝其繁而犯者亦至於不勝其衆豈不惑哉蓋上世聖人有為耒耜者或不為宮室為舟車者或不為棺椁豈其智不足為哉以謂人之所未病者不必改也至於後聖有為宮室者不以土處為不可變也為棺椁者不以衣薪為不可易也豈好為相反哉以謂人之所以既病者不可因也又至於後聖則有設兩觀而更采椽之質攻文梓而易瓦棺之素豈不能從儉哉以謂人情之所好者能為之莭而不能變也由是觀之古今之變不同而俗之便習亦異則亦屢變其法以宜之何必一一以追先王之迹哉其要在於養民之性防民之欲者夲末先後能合乎先王之意而已此制作之方也故元樽之尚而薄酒之用太羔之先而庶羞之飽一以為貴夲一以為親用則知有聖人作而為後世之禮者必貴爼豆而今之器用不廢也先辨冕而今之衣服不禁也其推之皆然然後其所改易更革不至乎拂天下之勢駭天下之情而固已合乎先王之意矣是以羲農以來至於三代禮未嘗同而制作之如此者未嘗異也後世不推其如此而或至於不敢為或為之者特出於其勢之不得已故茍簡而不能備希闊而不常行又不過用之於上而未有加之於民者也故其夲在於養人之性而其用在於言動視聽之間者歷千餘歲民未嘗得接於其耳目况於服習而安之者乎至其陷於罪戾則繁於為法以禦之其亦不仁也哉此書所紀雖其事已淺然凡世之記禮者亦皆有所夲而一時之得失具焉昔孔子於告朔愛其禮之存况著於一代之典籍哉故其書不得不貴因為之定著以俟夫論禮者考而擇焉續曲臺禮三十卷陳氏曰唐太常博士太原王彥威撰元和十三年嘗獻曲臺新禮三十卷至長慶中又自元和之末次第編録下及公卿士庶婚姻喪祭之禮并目録為三十卷通前為六十一卷按此惟續書而亦無目録前書則未之見也館閣書目亦無之文宗朝彥威仕為尚書節度使五禮精義十卷崇文總目唐太常博士韋彤撰首載唐禮參引古義申釋其文服飾圖三卷鼂氏曰唐李德裕編共五十五事咸鎬故事一卷鼂氏曰唐韋慎微撰纂長安自元日至除夜朝廷慶賀事崇豐二陵集禮太常丞裴瑾封叔撰桞子厚序略曰自開元制禮大臣諱避去國恤章而山陵之禮無所執世之不學者乃妄取預凶事之説而大典闕焉由是纍聖山陵皆托拾殘闕附比倫類已乃斥去其後莫能徵永貞元和間天禍仍遘自崇陵至於豐陵德宗葬崇陵順宗葬豐陵不能周歲司空杜公杜黃裳由太常相天下連為禮儀使擇其僚以備損益於是河東裴瑾以太常丞隴西辛祕以博士用焉內之則攢塗祕器象物之宜攢與菆同徒丸切殯也祕器作棺象物塗車芻靈之屬外之則復土斥土因山之制漢文紀張武為復土將軍謂穿壙下棺又惠帝紀斥土注斥開也謂開土地為冡壙又文帝贊因其山不起墳上之則顧命典册興文物以受方國方一作萬下之則制服節文頒憲則以示四方由其肅恭禮無不備且晏夲作具包并總統千載之盈縮羅絡旁午百氏之異同搜羅翦截而畢得其中顧問關決而不悖於事議者以為司空公得其人而邦典不墜裴氏乃悉取所刋定及奏復於上辨列於下聨百執事之儀以為崇豐二陵集禮藏之於大常書閣君子以為愛禮而近古焉五服志三卷崇文總目不著撰人名氏據江都開元二禮參引先儒所論重輕之制蓋唐人所編次云喪服加減一卷崇文總目不著撰人名氏雜記服制增損文無倫次開寶通禮二百卷鼂氏曰皇朝劉溫叟等撰開寶中詔溫叟同李昉盧多遜扈蒙楊昭儉賈黃中和峴陳諤損益開元禮為之附益以國朝新制朱子語録曰開寶禮全體是開元禮但略改動五禮新儀其間有難定者皆稱御製以決之如禱山川者只開元禮內有祖宗時有開寶通禮科學究試默義須是念得禮熟方得禮官用此等人為之介甫一切罷去盡令做大義故今之禮官不問是甚人皆可做某嘗聞朝廷須留此等專科如史科亦當有開寶通禮義纂一百卷崇文總目皇朝翰林學士盧多遜等撰多遜既定新禮復因開元禮義鑑增益為開寶通禮義纂一百卷上之詔與通禮並行太常新禮四十卷陳氏曰提舉編修賈昌朝子明等上景祐四年同知太常禮院浦城吳育春卿言夲院所藏禮文故事未經刋修請擇官參定至慶歷四年始成凡通禮所存悉仍其舊裒其異者列之為一百二十篇編修官孫祖德李宥張方平呂公綽曽公亮王洙孫瑜余靖刁約太常因革禮陳氏曰皇朝姚闢蘇洵撰嘉祐中歐陽修言禮書文書放軼請禮官編修六年用張洞奏以命闢洵至治平二年乃成詔賜以名李清臣云開寶已修輯三禮書推其要歸嘉祐尤悉然繁簡失中訛闕不補豈有拘而不得騁乎何楦釀之甚也鴈湖李氏跋古者經禮三百曲禮三千自後世以禮著書者僅存其大槩或闕其彌文經禮粗詳曲禮盡廢以故往往不可復考嘉祐獨於損益去取同異之際莫不咸在時知制誥張環奏以為國朝禮不合古制欲命大臣與禮官釐正紬繹然後傳之永久蘇先生爭之以為今亦編集故事使後世毋忘之耳非曰制為典禮遂使遵而行之也遇事而載之不擇善惡是記事之體也蓋其凡例條目之定論若此而昧者顧謂繁簡失中以楦釀目之抑未之思歟其書以開寶通禮為夲而以儀注例册附見之且參以實録封禪記鹵簿記大樂記及他書經禮曲禮於是兩備張文定謂其事業不得舉而措之於天下獨新禮百篇今為太常施用者此也封禪記五十卷鼂氏曰皇朝丁謂等撰大中祥符元年詔謂與李宗諤陳彭年以景德五年正月三日天書降於左承天門鴟吻之上迄十月泰山修封事迹儀注詔誥編次成書上之御製序冠之於首祀汾隂記五十卷鼂氏曰皇朝丁謂撰大中祥符三年八月降祀汾隂御札至明年春禮成四年詔謂與陳彭年編次事迹儀注踰二年成書上之吉凶書儀二卷鼂氏曰皇朝胡瑗翼之撰略依古禮而以今禮書疏儀式附之天聖鹵簿記十卷陳氏曰翰林學士常山宋綬公垂撰始太祖朝鹵簿以繡易畫號繡衣鹵簿真宗時王欽若為記二卷闕於繪事弗可詳識綬與馮元孫奭受詔質正古義傅以新制車騎人物器服之品皆繪其首者名同飾異亦别出焉天聖六年十一月上之其考訂援證詳洽可稽大饗明堂記二十卷紀要二卷陳氏曰宰相河汾文彥博寬夫等撰國朝開創以來三歲親郊未嘗躬行大享之禮皇祐二年詔以季秋擇日有事於明堂而罷冬至郊祀直龍圖王洙言國家每歲大享止於南郊寓祭不合典禮古者明堂宗廟路寢同制今大慶殿即路寢也九月親祀當於大慶殿行禮詔用其言禮成命彥博及次相宋庠參預髙若訥編修為記上親製序文已而彥博以簡牘繁多别為記要首載聖訓欲以大慶為明堂禮官之議適與聖意合云元豐郊廟禮文三十卷鼂氏曰皇朝楊完撰元豐初以郊廟禮文訛舛詔陳襄李清臣王存黃履何洵直孫諤楊完就太常寺檢討歷代沿革以詔考其得失又命陸佃張璪詳定後以前後嘗進禮文獨令完編類五年成書奏御其書雖援據廣博而雜出衆手前後屢見繁猥為甚云閣門儀制十二卷陳氏曰學士李淑等修定皆朝廷禮式也政和五禮新儀二百四十卷目録五卷陳氏曰議禮局官知樞密院鄭居中尚書白時中慕容彥逢學士強淵明等撰首卷祐陵御製序文次九卷御茟指揮次十卷御製冠禮餘二百二十卷局官所修也石林葉氏曰國朝典禮初循用唐開元禮舊書一百五十卷太祖開寶初始命劉溫叟盧多遜扈蒙三人補緝遺逸通以今事為開寶通禮二百卷又義纂一百卷以發明其旨且依開元禮設科取士嘉祐初歐陽文忠公知太常禮院復請續編以姚闢蘇洵掌其事為太常因革禮一百卷議者病其太簡元豐中蘇子容復議以開寶通禮及近歲詳定禮文分有司儀注沿革為三門為元豐新禮不及行至大觀中始修之鄭逹夫主其事然時無知禮舊人書成頗多抵牾後亦廢朱子語録曰唐有開元顯慶二禮顯慶已亡開元襲隋舊為之夲朝修開寶禮多夲開元而頗加詳備及政和間修五禮一時姦邪以私智損益疏略抵牾更沒理會又不如開元禮政和五禮撮要十五卷陳氏曰紹興中有范其姓者為湖北漕取品官士庶冠昏喪祭為一編刻板學宫不著名以武昌志考之為漕者有范正國范寅秩不知其為誰也政和冠昏喪祭禮十五卷陳氏曰紹興中南康黃灝商伯為禮官請於政和五禮內掇取品官庶人禮摹印頒之郡縣從之其實即前十五卷書也訓俗書一卷陳氏曰許洞天撰述廟祭冠笄之禮而拜掃附於末謝絳希深王舉正皆有序跋淳化三年進士希深之舅也孟氏家祭禮一卷陳氏曰唐侍御史平昌孟詵撰曰正祭節祠薦新義例凡四卷徐氏家祭禮一卷陳氏曰唐左金吾衛倉曹參軍徐潤撰鄭氏祠饗禮一卷陳氏曰唐侍御史鄭正則撰范氏寢堂時饗禮一卷陳氏曰唐涇縣尉南陽范傅式殿中侍御史傅正修定賈氏家祭禮一卷陳氏曰唐武功縣尉賈頊撰劉嶽書儀歐陽氏歸田録曰嶽書儀婚禮有女坐壻之馬鞍父母為之合髻之禮不知用何經義據嶽自敘云以時之所尚者益之則是當時流俗之所為爾嶽當五代干戈之際禮樂廢壞之時不暇講求三王之制度茍取一時世俗所用吉凶儀式略整齊之固不足為後世法矣然而後世猶不能行之今嶽書儀十已廢其七八其一二僅行於世者皆苟簡粗略不如夲書就中轉失乖謬可為大笑者坐鞍一事耳新定寢祀禮一卷陳氏曰不知作者中興館閣書目有此書云前後有序題太常博士陳致雍撰集今此夲亦前後有序意其是也致雍晉江人及仕夲朝文獻通考卷一百八十七
