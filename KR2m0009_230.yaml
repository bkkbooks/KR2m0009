body:
  text: 文獻通考卷二百三十鄱陽馬端臨貴與著經籍考五十七集賦詩别集吳氏曰漢時未以集名書故漢藝文志載賦頌歌詩一百家皆不曰集晉荀朂分書為四部其四曰丁部宋王儉撰七志其三曰文翰志皆無集名至梁阮孝緒為七録始有文集録隋經籍志遂以荀况等賦皆謂之集而又有别集史官謂别集之名漢東京所創按閔馬父論商頌之亂曰韋昭注輯成也蓋東京别集之名實本於劉歆之輯略而輯略又本於商頌之輯云宋兩朝藝文志曰别集者人别為集古人但以名氏命篇南朝張融始著玉海之號後世爭效制為集名一家至有十數者爵里年氏各立意義或相重復而文亦不勝其繁矣鼂氏曰昔屈原作離騷雖詭譎不槩諸聖而英辨藻思閎麗演迤發於忠正蔚然為百代詞章之祖衆士慕嚮波屬雲委自時厥後綴文者接踵於道矣然軌轍不同機杼亦異各名一家之言學者欲矜式焉故别而聚之命之為集蓋其原起於東京而極於唐至七百餘家當晉之時摯虞已患其凌雜難觀嘗自詩賦以下彚分之曰文章流别後世祖述之而為總集蕭統所選是也至唐亦且七十五家嗚呼盛矣雖然賤生於無所用或其傳不能廣值水火兵冦之厄因而散失者十八九亦有長編巨軸幸而得存而屬目者幾希此無他凡以其虛辭濫説徒為觀美而已無益於用故也今録漢迄唐附以五代本朝作者其數亦甚衆其間格言偉論可以扶持世教者為益固多至於虛辭濫説如上所陳者知其終當泯泯無聞猶可以自警則其無用亦有用也是以不加銓擇焉右例言漢藝文志傳曰不歌而誦謂之賦登高能賦可以為大夫言感物造專古端字因物動志則造辭義之端緒材知深美可與圖事故可以為列大夫也古者諸侯卿大夫交接鄰國以微言相感當揖讓之時必稱詩以諭其志蓋以别賢不肖而觀盛衰焉故孔子曰不學詩無以言也春秋之後周道寖壞聘問歌咏不列於侯國學詩之士逸在布衣而賢人失志之賦作矣大儒荀卿及楚臣屈原離讒憂國皆作詩以風咸有惻隱古詩之義其後宋玉唐勒漢興司馬相如枚乘及揚子雲競為侈麗閎衍之詞沒其風諭之義是以揚子雲悔之曰詩人之賦麗以則辭人之賦麗以淫辭人後代為文辭之人如孔氏之門人用賦也則賈誼登堂相如入室矣如其不用何自孝武立樂府而采歌謡於是有代趙之謳秦楚之風皆感於哀樂緣事而發亦可以觀風俗知薄厚云序詩賦為五種隋經籍志曰漢武帝命淮南王為楚辭章句旦受詔食時而奏之其書今亡後漢校書郎王逸集屈原已下迄於劉向逸又自為一篇并敘而注之今行於世隋時有釋道騫善讀之能為楚聲音韻清切至今傳楚辭者皆祖騫公之音漢志賦二十家三百六十一篇又賦二十一家二百七十四篇入揚雄八篇漢志賦又二十五家百三十六篇又雜賦十二家二百三十三篇漢志歌詩二十八家三百一十四篇隋志楚辭十部二十九卷通計亡書十一部四十卷唐志楚辭七部二十二卷宋中興志楚辭九家十二部二百四卷右賦詩隋志四百三十七部四千三百八十一卷通計亡書合八百八十六部八千一百二十六卷唐志七百三十六家七百五十部七千六百六十八卷失姓名一家元宗以下不著録四百六家五千一十二卷宋三朝志五百五十四部四千六百四十五卷宋兩朝志一百七十七部一千五百一十七卷宋四朝志二百五十一部六千八百四十九卷宋中興志一千一家一千二百六十六部一萬七千四百二十六卷楚辭十七卷鼂氏曰後漢校書郎王逸叔師注楚屈原名平為懷王左徒博聞強志嫺於辭令後同列心害其能而讒之王怒疏平平自傷忠而被謗乃作離騷經以諷不見省納及襄王立又放之江南復作九歌天問九章逺遊卜居漁父大招自沉汨羅以死其後楚宋玉作九辨招魂漢賈誼作惜誓淮南小山作招隱士東方朔作七諌嚴忌作哀時命王褒作九懷劉向作九歎皆擬其文而哀平之死於忠至漢武時淮南王安始作離騷傳向典校經書分為十六卷東京班固賈逵各作離騷章句餘十五卷闕而不説至逸自以為南陽人與原同土悼傷之復作十六卷章句又續為九思取班固二序附之為十七篇按漢書志屈原賦二十五篇今起離騷經至大招凡六九章九歌又十八則原賦存者二十四篇耳并國殤禮魂在九歌之外十一則溢而為二十六篇不知國殤禮魂何以繫九歌之末又不可合十一為九然則謂大招為原辭可疑也夫以招魂為義恐非自作或曰景差蓋近之其卷後有蔣之翰跋云鼂美叔家本也陳氏曰逸之注雖未能盡善而自淮南王安以下為訓傳者今不復存其目僅見於隋唐志獨逸注幸而尚傳興祖又從而補之於是訓詁名物始詳矣楚辭釋文一卷鼂氏曰未詳撰人其篇次不與世行本同陳氏曰古本無名氏洪氏得之吳郡林虙德祖其篇次不與今本同今本首騷經次九歌天問九章逺遊卜居漁父九辨招魂大招惜誓招隱七諫哀時命九懷九歎九思釋文亦首騷經次九辨而後九歌天問九章逺遊卜居漁父招隱士招魂九懷七諫九歎哀時命惜誓大招九思洪氏按王逸九章注云皆解於九辨中則釋文篇第蓋舊本也後人始以作者先後次序之耳朱侍講按天聖十年陳説之序以為舊本篇第混并乃考其人之先後重定其篇第然則今本説之所定也余按楚辭劉向所集王逸所注而九歎九思亦列其中蓋後人所益也歟補注楚辭十七卷考異一卷鼂氏曰未詳撰人凡王逸章句有未盡者補之自序云以歐陽永叔蘇子瞻鼂文元宋景文家參考之遂為定本又得姚廷輝本作考異且言辨騷非楚辭本書不當録陳氏曰洪興祖撰興祖少時從栁展如得東坡手校楚辭一卷凡諸本異同皆兩出之後又得洪玉父而下本十四五家參校遂為定本始補王逸章句之未備者成書又得姚廷輝本作考異附古本釋文之後其末又得歐陽永叔孫莘老蘇子容本於關子東葉少協校正以補考異之遺洪於是書用力亦勤矣重編楚辭十六卷鼂氏曰族父吏部公重編獨離騷經仍故為首篇其後以逺遊九章九歌天問卜居漁父大招九辨招魂惜誓七諫哀時命招隱九懷九歌為次而去九思一篇其説曰按八卷屈原遭憂所作故首篇曰離騷經後篇皆曰離騷餘皆曰楚辭今本所第篇或不次第於是遷逺遊九章次離騷經在九歌上以原自敘其意近離騷經也而九歌天問乃原既放之後攄憤所作者故遷於下卜居漁父自序之餘意也故又次之大招古奧疑原作非景差辭沉淵不返故以終焉為楚辭上八卷九辨招魂皆宋玉或曰九辨原作其聲浮矣惜誓𢎞深或以為賈誼作蓋近之東方朔嚴忌皆漢帝廷臣淮南小山之辭不當先忌王褒漢宣帝時人後淮南小山至劉向最後作故其次序如此皆西漢以前文也為楚辭下八卷王逸東漢人九思視向以前所作相闊矣又十七卷非舊録故去之又頗刪逸離騷經訓釋淺陋者而録司馬遷原傳冠其首云續楚辭二十卷鼂氏曰族父吏部公編擇後世文賦與楚辭類者編之自宋玉以下至本朝王令凡二十六人計六十篇各為小序以冠其首而最喜沈括以為辭近原蓋深探其用意疾隨其步趨而與之偕然亦暇而不迫也變離騷二十卷鼂氏曰族父吏部公編公既集續楚辭又擇其餘文賦大意祖述離騷或一言似之者為一編其意謂原之作曰離騷餘皆曰楚辭今楚辭又變而乃始曰變離騷者欲後世知其出於原也猶服盡而係其姓於祖云所録自楚荀卿至本朝王令凡三十八人通九十六首陳氏曰鼂補之無咎撰去九思一篇入續楚辭定著十六卷篇次亦頗改易又不與陳説之本同續變二篇皆楚辭流𣲖其曰變者又以其類離騷而少變之也新序三篇述其意甚詳然其去取之際或有不能曉者楚辭贅説四卷陳氏曰右司郎宣城周紫芝少隱撰嘗為哀湘賦以反賈誼揚雄之説又為此書頗有發明楚辭集説八卷辨證二卷陳氏曰侍講新安朱熹元晦撰以王氏洪氏注或迂滯而逺於事情或迫切而害於義理遂别為之注其訓詁文義之外有當考者則見於辨證所以祛前注之蔽陋而發明屈子之微意於千載之下忠魂義魄頓有生氣其於九歌九章尤為明白痛快至謂山海經淮南子殆因天問而著書説者反取二書以證天問可謂髙世絶識毫髮無遺恨者矣公為此注在慶元退居之時序文所謂放臣棄子怨妻去婦蓋有感而托者也其生平於六經皆有訓傳而其殫見洽聞發露不盡者萃見於此書嗚呼偉矣其篇第視舊本益賈誼二賦而去諌歎懷思屈子所著二十五篇為離騷而宋玉以下則曰續離騷其言七諫以下辭意平緩意不深切如無所疾痛而強為呻吟者為名言也朱子自序曰自屈原賦離騷而南國宗之名章繼作通號楚辭大抵皆祖原意而離騷深逺矣竊嘗論之原之為人其志行雖或過於中庸而不可以為法然皆出於忠君愛國之誠心原之為書其辭旨雖或流於跌宕怪神怨懟激發而不可以為訓然皆生於繾綣惻怛不能自已之至意雖其不知學於北方以求周公仲尼之道而獨馳騁於變風變雅之末流以故淳儒莊士或羞稱之然使世之放臣屏子怨妻去婦抆淚謳吟於下而所天者幸而聼之則於彼此之間天性民彛之善豈不足以交有所發而增夫三綱五常之重此豫之所以每有味於其言而不敢直以辭人之賦視之也然自原著此辭至漢未久而説者已失其趣如太史公蓋未能免而劉安班固賈逵之書世復不傳及隋唐間為訓解者尚五六家又有僧道騫者能為楚聲之讀今亦漫不復存無以考其説之得失而獨東京王逸章句與近世洪興祖補注並行於世其於訓詁名物之間則已詳矣顧王書之所取舍與其題號離合之間多可議者而洪皆不能有所是正至其大義則又皆未嘗沉潛反覆嗟歎咏歌以尋其文詞指意之所出而遽欲取喻立説旁引曲證以強附於其事之已然是以或以迂滯而逺於事情或以迫切而害於義理使原之所為一鬱而不得申於當年者又晦昧而不得白於後世豫於是益有感焉疾病呻吟之暇聊據舊編粗加櫽括定為集注八卷庶幾讀者得以見古人於千載之上而死者可作又足以知千載之下有知我者而不恨於來者之不聞也嗚呼悕矣是豈易與俗人言哉朱子語録曰楚辭不甚怨君今被諸家解得都成怨君不成模樣九歌是託神以為君言人間隔不可企及如已不得親近於君之意以此觀之他便不是怨君至山鬼篇不可以君為山鬼又倒説山鬼欲親人而不可得之意今人解文字不看大意只逐句解意却不貫楚些沈存中以些為咒語如今釋子念娑婆訶三合聲而巫人之禱亦有此聲此却説得好蓋今人只求之於雅不求之於俗故下一半都曉不得楚辭平易後人學做者反艱深了都不可曉離騷初無竒字只恁説將去自是好後來如魯直恁地著力做只是不好楚辭後語六卷陳氏曰朱熹撰凡五十二篇以鼂氏續變二書刋定而去取則嚴而有意矣朱子自序曰楚辭後語目録以鼂氏所集録續變二書刋補定著凡五十二篇鼂氏之為此書固主為辭而亦不得不兼取於義今因其舊則其考於辭也宜益精而擇於義也當益嚴矣此余之所以兢兢而不得不致其謹也蓋屈子者窮而呼天疾痛而呼父母之辭也故今所欲取而使繼之者必其出於幽憂窮蹙怨慕凄涼之意乃為得其餘韻而宏衍巨麗之觀歡愈快適之語宜不得而與焉至論其等則又必以無心而冥會者為貴其或有是則雖逺且賤猶將汲而進之一有意於求似則雖迫真如揚栁亦不得已而取之耳若其義則首篇所著荀卿子之言指意深切詞調鏗鏘君人者誠能使人朝夕諷誦不離於其側如衛武公之抑戒則所以入耳而著心者豈但廣厦細旃明師勸誦之益而已哉此固余之所為眷眷而不能忘者若髙唐神女李姬洛神之屬其辭若不可廢而皆棄不録則以義裁之而斷其為禮法之罪人也高唐卒章雖有思萬方憂國害開聖賢輔不逮之云亦屠兒之禮佛倡家之讀禮耳幾何其不為獻笑之資而何諷之有哉其息夫躬栁宗元之不棄則鼂氏已言之矣至於揚雄則未有議其罪者而余獨以為是其失節亦蔡琰之儔耳然琰猶知愧而自訟若雄則反訕前哲以自文宜又不得與琰比矣今皆取之豈不以夫琰之母子無絶道而雄則欲因反騷而著蘇氏洪氏之貶辭以明天下之大戒也陶翁之辭鼂氏以為中和之發於此不類特以其為古賦之流而取之是也抑以其自謂晉臣恥事二姓而言則其意亦不為不悲矣序列於此又何疑焉至於終篇特著張夫子呂與叔之言蓋又以告夫遊藝之及此者使知學之有本而反求之則文章有不足為者矣其為微文碎義又各附見於本篇此不暇著悉云龍岡楚辭説五卷陳氏曰永嘉林應辰渭起撰以離騷章分假釋為二十假九歌九章諸篇亦隨長短分之其推屈子不死於汨羅比諸浮海居夷之意其説甚新而有理以為離騷一篇辭雖哀痛而意則宏放與夫直情徑行勇於踣河者不可同日語且其興寄髙逺登昆崙歷閬風指西海陟升皇皆寓言也世儒乃以為實者何哉然沉湘之事傳自司馬遷賈誼揚雄皆未嘗有異説漢去戰國未逺恐非虛語也新校楚辭十卷翼騷一卷洛陽九詠一卷陳氏曰昭武黃伯思長睿撰其序言屈宋諸騷皆書楚語作楚聲紀楚地名楚物故可謂之楚辭若些只羌誶蹇紛侘傺者楚語也悲壯頓挫或韻或否者楚聲也沅湘江澧修門夏首者楚地也蘭茝荃藥蕙若薠蘅者楚物也既以諸家本校定又以太史公屈原傳至陳説之之序附以今序别為一卷目以翼騷洛陽九詠者伯思所作也宋玉集一卷陳氏曰楚大夫宋玉撰史記屈原傳言楚人宋玉唐勒景差之徒皆原之弟子也而玉之辭賦獨傳至以屈宋並稱於後世餘人皆莫能及按隋志集三卷唐志二卷今書乃文選及古文苑中録出者未必當時本也枚叔集一卷陳氏曰漢𢎞農都尉淮隂枚乘撰叔其字也隋志梁時有二卷亡唐志復著録今本乃於漢書及文選諸書抄出者董仲舒集一卷陳氏曰漢膠西相廣川董仲舒撰隋唐志皆二卷今惟録本傳中三䇿及古文苑所載士不遇賦詣公孫𢎞記室書二篇而已其序篇略本傳語亦載古文苑仲舒平生著書如玉杯繁露清明竹林之類其泯沒不存者多矣所傳繁露亦非本真也劉中壘集五卷陳氏曰漢中壘校尉劉向子政撰前四卷封事並見漢書九歌見楚辭末請雨華山賦見古文苑揚子雲集五卷鼂氏曰漢揚雄子雲也古無雄集皇朝談愈好雄文患其散在篇籍離而不屬因綴繹之四十餘篇陳氏曰大抵皆録漢書及古文苑所載按宋玉而下五家皆見唐以前藝文志而三朝志俱不著録崇文總目僅有董集一卷而已蓋古本多已不存好事者於史傳及類書中鈔録以備一家之作充藏書之數而已二十四針一卷鼂氏曰揚雄撰今廣德所刋本校集中無司空尚書博士太常四針集中所有皆據古文苑而此四針或云崔駰或云崔子玉疑不能明也蔡中郎集十卷鼂氏曰後漢蔡雍伯喈也陳留圉人仕至左中郎將後為王允所害雍博學好詞章術數天文妙操音律在東觀欲補漢紀自陳十意及付獄乞黥刖以成書不能得遂死獄中所著文章百四篇今録止存九十篇而銘墓居其半或曰碑銘或曰神誥或曰哀讚其實一也嘗自云為郭有道碑獨無愧辭則其他可知已凡文集其人正傳者止掇論其文學之辭及略載鄉里所終爵位或死非其理亦附見餘歷官與其善惡率不録若史逸其行事者則雜取他書詳載焉庶後有考陳氏曰唐志二十卷今本闕亡之外才六十四篇其間有稱建安年號及為魏宗廟頌述者非雍文也卷末有天聖癸亥歐陽靜所書辨證甚詳以為好事者雜編他人之文相混非本書致堂胡氏曰伯喈才士也而短於識文章翰墨又非班馬之儔假令續成漢史不過與范曄伯仲耳陳思王集十卷鼂氏曰魏曹植子建也太祖子文帝封植為陳王卒年三十一諡曰思年十歲餘誦讀詩論及辭賦數十萬言善屬文援筆立成自少至終篇籍不離手按魏志景初中撰録植所著賦頌詩銘雜論凡百餘篇隋志植集三十卷唐志植集二十卷今集十卷比隋唐本有亡逸者而詩文近二百篇反溢於本傳所載不曉其故陳氏曰今本二十卷與唐志同其間亦有采取御覽書鈔類聚諸書中所有意皆後人附益然則非當時全書矣其或引摯虞流别集此書國初已亡猶是唐人舊傳也陳孔璋集十卷陳氏曰魏丞相軍謀掾廣陵陳琳孔璋撰魏志文帝為五官中郎將及平原侯植皆好文學山陽王粲仲宣北海徐幹偉長廣陵陳琳孔璋陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹並見友善自邯鄲淳繁欽路粹丁廙楊修荀綽等亦有文采而不在七人之列世所謂建安七子者也但自王粲而下才六人意子建亦在其間邪而文帝典論則又以孔融居其首并粲琳等謂之七人植不與焉今諸家詩文散見於文選及諸類書其以集傳者仲宣子建孔璋三人而已余家有仲宣集王粲集八卷鼂氏曰後漢王粲仲宣也髙平人為魏侍中粲博物多識強記善屬文舉筆便成無所改定時人以為宿製然正復精意覃思亦不能加著詩賦論議垂六十篇今集有八十一首按唐藝文志粲集十卷今亡兩卷其詩文反多於史所紀二十餘篇與曹植集同阮籍集十卷鼂氏曰魏阮籍嗣宗也尉氏人籍志氣宏放博覽羣籍尤好莊老屬文不留嗜酒能嘯善彈琴當其得意忽忘形體雖不拘禮教而發言元逺晉帝輔政為從事中郎後求為步兵校尉嵇康集十卷鼂氏曰魏嵇康叔夜也譙國人康美詞氣有儀土木形骸不自藻飾學不師受博覽該通長好莊老屬文元逺以魏宗室婚拜中散大夫景元初鍾會譖於晉文帝遇害陳氏曰康本姓奚自會稽徙譙之銍縣嵇山家其側遂氏焉取嵇字之上志本也所著文論六七萬言今存於世者僅如此唐志猶有十五卷張司空集三卷鼂氏曰晉張華茂先也范陽人惠帝時為司空為趙王倫所害華學業優博詞藻溫麗圖緯方伎等書莫不詳覽家有書三十乘天下竒祕悉在博物洽聞世無與比集有詩一百二十哀詞册文二十一賦三陳氏曰前二卷為四言五言詩後一卷稱册祝哀誄等文陸機集十卷鼂氏曰晉陸機士衡也抗之子少有異才文章冠世服膺儒術非禮不動吳滅退居舊里閉門勤學積有十年太康末入洛成都王頴令機率師伐長沙王乂至河橋大敗為頴所誅初造張華華重其名如舊相識嘗謂之曰人常恨才少而子更患多葛洪著書亦稱歎焉所著文章凡三百餘篇今存詩賦論議箋表碑誄一百七十餘首以晉書文選校正外餘多舛誤機仕終平原內史陸雲集十卷鼂氏曰晉陸雲士龍也吳郡人惠帝時為中書侍郎會兄機兵敗同遇害雲六歲能屬文性清正有才理與機齊名雖文章不及而持論過之所著文章三百四十九篇新書十篇雲仕終清河內史劉司空集十卷陳氏曰晉司空中山劉琨越石撰前五卷差全可觀後五卷闕誤或一卷數行或斷續不屬殆類鈔節者末卷劉府君誄尤多訛未有别本可以是正陶靖節集十卷鼂氏曰晉陶淵明元亮也一名潛潯陽人蕭統云淵明字元亮晉書云潛字元亮宋書云潛字淵明或云字深明名元亮按集中孟嘉傳與祭妹文皆自稱淵明當從之晉安帝末起為州祭酒桓元篡位淵明自解而歸州召主簿不就躬耕自資劉裕起兵討元誅之為鎮軍將軍淵明恭其軍事未幾遷建威恭軍淵明見裕有異志乃求為彭澤令去職潛少有高趣好讀書不求甚解著五栁先生傳以自况世號靖節先生今集有數本七卷梁蕭統編以序傳顔延之誄載卷首十卷者北齊陽休之編以五孝傳聖賢群輔録序傳誄分三卷益之詩篇次差異按隋經籍志潛集九卷又云梁有五卷録一卷唐藝文志潛集五卷今本皆不與二志同獨吳氏西齋目有潛集十卷疑即休之本也休之本出宋庠家云江左舊書其次第最有倫貫獨四八目後八儒三墨二條疑後人妄加東坡蘇氏曰吾於詩人無所好獨好淵明詩淵明詩不多然質而實綺癯而實腴自曺劉沈謝李杜諸人莫能及也山谷黃氏曰寧律不諧而不使句弱用字不工而不使語俗此庾開府所長也然有意於為詩也至於淵明則所謂不煩繩削而自合者雖然巧於斧斤者多疑其拙窘於撿括者輒病其放孔子曰􅑔武子其智可及也其愚不可及也淵明之拙與放豈可為不知者道哉要當與一邱一壑者共之耳龜山楊氏曰淵明詩所不可及者沖淡深邃出於自然若曽用力學然後知淵明詩非著力之所能及也朱子語録曰淵明詩人皆説平淡據某看他自豪放但豪放得來不覺耳其露出本相者是詠荆軻一篇平淡底人如何説得這樣言語出來西山真氏曰豫聞近世之評詩者淵明之辭甚高而其指則出於莊老康節之辭若卑而其指則原於六經以余觀之淵明之學正自經術中來故形之於詩有不可掩榮木之憂逝水之歎也貧士之詠簟瓢之樂也飲酒末章有曰羲農去我久舉世少復真汲汲魯中叟彌縫使其淳淵明之智及此豈元虛之士可望邪雖其遺榮辱一得喪真有曠逹之風細玩其辭時亦悲涼感慨非無意世事者或者徒知義熙以後不著年號為恥事二姓之驗而不知其眷眷王室蓋有乃祖長沙公之心獨以力不得為故肥遁以自絶食薇飲水之言銜木填海之喻至深痛切顧讀者弗之察耳淵明之志若是又豈毁彛倫而外名教者可以同日語乎後村劉氏曰陶公如天地間之有慶雲醴泉是惟無出出則為祥瑞且饒坡公一人和陶可也靖節年譜一卷年譜辨證一卷雜記一卷陳氏曰吳郡吳仁傑斗南為年譜張演季長辨證之又雜記晉賢論靖節語此蜀本也卷末有陽休之宋庠序録私記又有治平三年思悅題稱永嘉不知何人也靖節詩注四卷贈端明殿學士番陽湯文清公漢撰以述酒一篇為晉恭帝哀詞蓋劉裕既受禪使張偉以毒酒鴆帝偉自飲而卒乃令兵人踰垣進藥帝不肯飲兵人以被掩殺之故哀帝詩托名述酒其自序云陶公詩精深髙妙測之愈逺不可漫觀也不事異代之節與子房五世相韓之義同既不為狙擊震動之舉又時無漢祖者可托以行其志故每寄情於首陽易水之間又以荆軻繼二疏三良而發咏所謂拊已有深懷履運增慨然者讀之亦可以深悲其志也已平生危行言孫至述酒之作始直吐忠憤然猶亂以廋辭千載之下讀者不省為何語是此翁所深致意者迄不得白於後世尤可以使人增欷而纍歎也余竊窺見其旨因加箋釋以表暴其心事及他篇有可以發明者併著之又按詩中言本志少説固窮多夫惟忍於飢寒之苦而後能存節義之間西山之所以有餓夫也世士貪榮祿事豪侈而髙談名義自方於古人余未之信也鮑參軍集十卷鼂氏曰宋鮑照明逺也上黨人世祖以為中書舍人後臨川王子頊鎮荆州照為參軍子頊敗為亂兵所殺初孝武好文自謂人莫能及照悟其旨為文多鄙言纍句當時謂照才盡實不然也事見沈約書而李延壽史乃以世祖為文帝集有唐虞炎序云為宋景所害倘見於他書乎陳氏曰照東海人唐人避武后諱改為昭沈約宋書李延壽南史皆作照而館閣書目直以為昭且云上黨人非也謝惠連集五卷鼂氏曰宋謝惠連也元嘉七年為彭城王法曹行參軍十歲能屬文為雪賦以髙麗見竒族兄靈運每見其新文曰張華重生不能易也謝宣城集五卷鼂氏曰齊謝朓元暉也陽夏人明帝初自中書郎出為東海太守東昏時為江祏黨譖害之朓少學有美名文章清麗善草𨽻尤長五言沈約嘗云二百年來無此詩也文選所録朓詩近二十首集中多不載今附入陳氏曰集本十卷樓照知宣州止以上五卷賦與詩刋之下五卷皆當時應用之文衰世之事可采者已見本傳及文選餘視詩劣焉無傳可也後村劉氏曰詩至三謝如玉人之攻玉錦人之機錦極天下之工巧組麗而去建安黃初逺矣唐子西語録云三謝詩靈運為勝當就文選中寫出熟讀自見其優劣也又云江左諸謝詩文見文選者六人希逸無詩宣逺叔源有詩不工今取靈運惠連元暉詩合六十四篇為三謝詩是三人者至元暉語益工然蕭散自得之趣亦復少減漸有唐風矣於此觀世變也又云靈運在永嘉因夢惠連遂有池塘生春草之句元暉在宣城因登三山遂有澄江淨如練之句二公妙處蓋在於鼻無堊目無膜爾鼻無堊斤將曷運目無膜箆將曷施所謂混然天成天球不瑑者歟靈運如矜名道不足適已物可忽清暉能娛人遊子淡忘歸元暉詩如春草秋更緑公子未西歸大江流日夜客心悲未央等語皆得三百篇之餘韻是以古今以為竒作孔德璋集一卷陳氏曰齊太子詹事山陰孔稚圭德璋撰北山移文其所作也沈休文集十五卷别集一卷又九卷陳氏曰梁特進吳興沈約休文撰約有文集百卷今所存者唯此而已十五卷者前二卷為賦餘皆詩也别集雜録詩文不分卷九卷者皆詔草也館閣書目但有此九卷及詩一卷凡四十八首吳均集三卷鼂氏曰梁吳均叔宰也史稱均博學才俊體清拔有古氣好事效之謂之吳均體有集二十卷唐世搜求止得十卷今又亡其七矣舊題誤曰吳筠筠乃唐人此詩殊不類而其中有贈栁貞陽周興嗣輩詩固已知其非筠又有蕭子雲贈吳朝請入東詩蓋在武帝時為奉朝請則知為均也無疑矣蕭子雲詩八蕭子顯朱異平筠王僧孺詩各一附顔之推譏均集中有破鏡賦今已亡之江淹集十卷鼂氏曰梁江淹文通也濟陽人梁初為散騎常侍封醴陵侯少好學不事章句留情於文章晚節才思微退人謂才盡著述百餘篇自撰為前後集今集凡二百四十九篇魏晉間名人詩文之行於世者往往羡於史所載如曹植王粲及淹皆是也豈後人妄附益之歟何遜集二卷鼂氏曰梁何遜仲言也東海人終水部員外郎遜少能詩州舉秀才范雲見其文嗟賞曰觀文人質則過懦麗則傷俗能清濁古今見之何生矣沈約謂每讀卿詩一日三復猶不能已與劉孝綽俱以文章見重於世謂之何劉王僧孺集其文為八卷今亡逸不全陳氏曰本傳集八卷館閣書目今所傳止此庾開府集二十卷鼂氏曰周庾信子山也南陽人梁元帝時為散騎常侍聘西魏遂留長安孝閔時終司憲大夫信在梁與徐陵文並綺麗世號徐庾體有滕王逌序陳氏曰信肩吾之子仕梁及周其在揚都有集四十卷及江陵又有三卷皆兵火不存今集止自入魏以來所作而哀江南賦實為首冠陰鏗集一卷鼂氏曰陳陰鏗子堅也幼聰慧五歲能誦詩賦日千言及長博涉史傳尤工五言詩徐陵言之於世祖使賦安樂宮援筆立成纍遷散騎常侍有集三卷隋已亡其二今所存十數詩而已杜少陵嘗贈李太白詩首云李侯有佳句往往似陰鏗今觀此集白蓋過之逺矣甫之愼許可乃如此稽聖賦三卷陳氏曰北齊黃門侍郎琅琊顔之推撰其孫師古注蓋擬天問而作中興書目稱為李淳風注右别集文獻通考卷二百三十
