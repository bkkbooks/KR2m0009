body:
  text: 文獻通考卷二百九十七鄱陽馬端臨貴與著物異考三水災仁宗乾興元年蘇湖秀水壞民田是歲十月京東淮南水災天聖四年六月建州邵武軍大水壞廬舍溺人庚寅京師及河南府鄭州大水九月京東江淮兩浙福建諸州軍雨水壞民廬舍是歲汴水決溢六年七月江寧府揚真潤三州江水溢壞廬舍雄霸州大水八月永興軍山水暴漲溺死居民是月河決楚王掃七年六月河北大水眀道二年京師水壞軍營府庫景祐元年泗州淮汴溢七月澶州河決橫隴掃三年虔吉等州水四年六月杭州江潮溢壞堤千餘丈八月越州大水漂溺居民寶元元年建州水康定元年滑州河溢慶歷八年六月河決澶州商胡掃是歲河北大水皇祐元年二月河北黃御二河並決注於乾寧軍河朔頻年水災二年鎮定復大水並邊尤被其害三年七月河決大名府館陶縣郭固口嘉祐元年六月京師及京東西河北水潦害民田雨壞社稷壇及官私廬舍數萬區城中繫筏渡人七月京東西荆湖北路水災淮水自夏秋暴漲環浸泗州城是歲諸路江河決溢河北尤甚民多流亡六年淮水溢英宗治平元年京師許蔡陳潁唐泗濠楚廬夀杭宣鄂洪施渝州光化軍俱有水災二年八月庚寅京師大雨地上涌水壞廬舍漂人畜神宗熙寧元年秋霸州山水漲溢保定軍大水害稼壞官私廬舍城壁漂溺居民河決恩冀州漂溺居民二年八月河決滄州饒安漂溺居民移縣治於張為村泉州大風雨水與潮相衝泛溢損田稼官私廬舍四年八月金州大水毁城壞官私廬舍七年六月熙州大雨洮河泛溢陜州大雨漂溺陕平陸二縣八年四月潭衡邵道州江水溢壞官私廬舍九年七月太原府汾河夏秋霖雨水大漲十月潮州海陽潮陽二縣海潮漲溢壞廬舍溺居民十年七月河決曹村下掃澶淵絶流河南徙又東滙於梁山張澤濼凡壞郡縣四十五官亭民舍數萬田三十萬頃洺州漳河決注城大雨水二丈河陽河水湍漲壞南倉溺居民元豐元年齊州章邱河水溢壞公私廬舍城壁漂溺居民舒州山水暴漲浸官私廬舍四年四月澶州臨河縣小吳河溢北流漂溺居民五月淮水泛漲七月泰州海風駕大雨漂浸州城壞公私舍數千楹七年七月河北東西路北京館陶河溢水入府城壞官私廬舍八月趙邢洺磁相州河水泛溢壞城郭軍營是年相州漳河決溺臨漳縣居民懷州黃沁河泛溢大雨水損稼壞廬舍城壁磁州諸縣鎮夏秋漳滏河水泛溢相州臨漳縣斛律口決壞官私廬舍傷田稼損居民哲宗元祐八年京畿京東西淮南河北諸路大水紹聖元年京畿曹濮陳蔡等州水害稼元符元年河北京東等路大水二年六月陜西京西河北大水河溢流漂人民廬舍徽宗崇寧元年京城水壞廬舍溺人大觀元年夏京畿大水詔工部都水監疏導至於八角鎮河北京西河溢漂溺民户十月蘇湖水災二年秋黃河決陷沒邢州巨鹿縣三年七月階州久雨江溢四年夏鄧州大水漂沒順陽縣政和五年六月江寧府太平宣州水災八月蘇湖常秀等諸郡水災七年瀛滄州河水決滄州城不沒者三板民死百餘萬八年夏江淮荆浙諸路大水民流移漂溺者衆分遣使者賑濟發運使任諒坐不奏泗州壞官私廬舍等勒停宣和元年五月大雨水驟髙十丈餘犯都城自西北牟駝岡連萬勝門外馬監居民盡沒前數日城中井皆渾宣和殿後井水溢蓋水信也至是詔都水使者決西城索河隄殺其勢城南居民冢墓俱被浸遂壞籍田親耕之稼水至益猛直冒安上南薰諸門城守凡半月已而入汴汴渠將溢於是募人決下流由城北入五丈河下通梁山濼乃平十一月東南州縣水災髙宗紹興二年閏四月徽嚴州水害稼三年七月丙子泉州水壞城郭廬舍五年秋西川郡國水六年冬饒州雨水壞城四百六十餘丈十六年潼川府東南江溢水入城浸民廬十八年八月越眀婺州水二十八年六月興利二州大安軍大水流民廬壞橋棧死者甚衆九月江東淮南數郡水浙東西沿江海郡縣大風水平江紹興湖常秀潤為甚三十年五月畿縣於潛臨安湖州安吉等三縣山水暴出漂民廬壞田桑人溺死甚衆三十二年四月淮水溢數百里漂民田廬死者甚衆六月浙西郡縣山湧暴水漂民室壞田覆舟孝宗隆興元年八月浙東西州縣大風水越蘇湖及崇德縣為甚二年七月蘇湖常秀潤升宣池太平廣德廬和光夀春無為及淮東郡皆大水浸城郭壞廬舍墟田軍壘舟行㕓市纍日人溺死甚衆越月積陰苦雨水患益甚乾道元年六月常湖水壞墟田二年八月溫州大風海濤流溢沿江民廬鹽場覆舟溺死者二萬餘人江濱胔骼尚七千餘人三年六月廬舒蘄州水壞苗稼漂人畜七月臨安府天目山湧暴水決臨安縣五鄉民廬二百八十餘家人多溺死八月上虞縣湖秀州水壞民田廬時積潦至於九月禾稼皆腐江東水溢於山江西隆興四縣為甚四年七月衢州大水敗城三百餘丈漂民廬孳牧壞禾稼江陵建寧紹興饒信皆水五年夏秋溫台凡三大風水漂民廬壞稼溺人甚衆黃巖縣為甚六年五月蘇升宣溫湖秀太平廣德大水城市有深丈餘者江西亦大水八年五月吉筠臨江隆興皆大水六月四川郡縣大水嘉眉卭蜀永康金堂尤甚九年五月嚴吉饒信池太平建康隆興廣德軍水漂民居壞墟田分水縣沙塞四百餘畝六月湖北郡縣水淳熙元年七月錢塘大風濤決臨安府江堤一千六百六十餘丈漂民居六百三十餘家三年八月台州大風雨海濤溪流合激為大水決江岸壞民廬溺人是月行都及浙東西江東郡邑多水四年五月建寧福南劒大雨水漂民廬數千家錢塘江濤大溢敗堤一百八十餘丈眀州瀕海風濤敗堤漂沒民田九月大風雨駕海濤錢塘餘姚上虞定海鄞縣敗堤溺人五年六月階州水壞城郭福州興化俱大水六年夏秋衢溫台湖秀太平寧國水壞墟田溺人八年五月嚴州紹興府大水流民舍敗堤岸腐禾稼徽江州亦水十年五月信州襄陽及江東西浙東數郡水秋台州水八月雷州大風激海濤沒瀕海民舍溺人九月福漳州大風雨水暴至瀕海聚落廬舍人舟皆流入海漳城半沒十一年四月和州水五月階州白江水溢壞隄及民舍溺人七月眀州大風雨山水暴至浸城覆舟殺人十二年六月婺州水是歲鄂州水浸民廬自夏徂冬乃退十四年汀州水十五年五月淮甸大雨水淮水溢廬濠楚無為安豐髙郵盱眙軍皆漂民室壞田稼荆江溢鄂州大水漂民室三千餘家復嶽澧江陵常德德安漢陽皆水至六月建寧隆興袁撫臨江皆水圯民廬十六年五月沅靖州山水溢沿江下辰州常德府城沒一丈五尺漂民廬舍六月鎮江潼川俱水溢壞民廬及田光宗紹熙二年五月建寧水福州水浸城屬縣漂沒民廬利州潼川嘉陵興州綿果合金龍漢崇慶懷安石泉大安俱有水患民溺死甚衆三年五月常德雨水浸民田廬徽宣池廣德皆水七月台州襄陽江陵荆門復州俱水鎮江水損稼四年安豐紹興寧國廣德筠州水害稼興國贛州江州江陵皆水七月臨江隆興吉州水圯民廬自夏及秋江西九州三十七縣皆水興化風激海濤沒田廬五年五月池州寧國太平紹興皆水八月行都及眀台溫嚴常平江鎮江寧國江隂常德皆水寧宗慶元元年六月台州諸縣大風雨山洪濤並作沒田廬無算二年秋浙東郡國大水三年九月紹興婺州水害稼五年秋台溫衢婺水漂廬溺人六年五月嚴衢婺饒信徽南劒建寧及江西郡國皆大水自庚午至甲戌漂民廬害稼嘉泰二年七月汀州建寧福州南劔及江西郡邑水害苗稼開禧元年九月淮漢水溢荆襄二年五月婺州東陽山崩洪漂聚落五百四十餘所湮田二萬餘頃三年江浙淮郡縣水鄂漢尤甚嘉定二年六月西和利州成州閬州遂寧皆水七月台州海濤流圯民廬溺人三年四月嚴衢婺徽大水行都水浸民廬西湖溢瀕湖民居皆圯五年五月嚴州台州水六年六月嚴州及臨安紹興湖州屬縣皆水九年五月行都及紹興嚴衢婺台處信饒福漳泉興化十二郡大水漂田廬害稼十年冬浙江濤溢圯瀕江廬舍覆舟溺人蜀漢二州大江沒城郭十二年畿縣鹽官海失故道潮汐衝平野三十餘里至是侵縣治鹽場多圯十五年七月紹興水衢婺徽嚴暴流與江濤合圯田廬害稼十六年五月江淮浙荆蜀郡縣水蘇湖常秀池鄂楚太平廣德為甚鄂州江湖合漲城市沉沒纍月不泄是秋江濤溢圯沿江民廬畿縣及福漳泉興化大水壞田稼十五六十七年五月福建大水建寧南劔尤甚建昌大水圯民廬城郭敗稼水異此即前史五行志所謂火沴水也世以河清為祥而以水變赤為妖其為水異一也故並載於此史記魯襄公二十三年穀洛水鬭將毁王宫劉向以為近火沴水也周靈王將壅之有司諫曰不可長民者不崇藪不墮山不防川不竇澤竇穴也今吾執政毋乃有所辟邪辟也而滑夫二川之神滑亂也使至於爭明明水道也以防王宫室王而飾之毋乃不可乎言為欲防固王宫使水不得毁故遏飾二川懼及子孫王室愈卑王卒壅之以傳推之以四瀆比諸侯穀洛其次卿大夫之象也為卿大夫將分爭以危亂王室也後數年有如日者五是歲早霜靈王崩景王立二年儋括欲殺王而立王弟佞夫佞夫不知景王并誅佞夫及景王死五大夫爭權或立子猛或立子朝王室大亂京房易傳曰天子弱諸侯力政厥異水鬭考王二年河水赤於晉龍門三日秦武王三年渭水赤者三日昭王三十四年渭水又赤三日劉向以為近火沴水也秦連相坐之法棄灰於道者黥網密而刑虐加以武伐橫出殘賊鄰國至於變亂五行氣色謬亂天戒若曰勿為刻急將致敗亡昔三代居三河河洛出圖書秦居渭陽而渭水數赤瑞異應德之效也京房易傳曰君湎於酒淫於色賢者潛國家危厥異流水赤也後漢光武二十四年六月丙申沛國睢水逆流一日一夜止安帝永初六年河東池水變色皆赤如血水變占曰水化為血者好任殘賊殺戮不辜延及親戚水當為血時鄧太后猶専政元初二年潁州襄城臨水化為血京房占曰水化為血兵且起桓帝延熹八年四月濟陰東郡濟北河水清襄楷説見水災門靈帝建寧四年二月河水清致堂胡氏曰水性潤下而質不同或清或濁或輕或重或弱或悍或黑或白或寒或溫或甘或淡是其質也若大河之質則黃濁數千里而不可澄汰者也凡物反常為妖濁而忽清猶地而出堆阜山而沸泉湧非所當有變異之象也故襄楷言自古未有河清者後世乃以為大慶君臣動色載於年號著於邑名形於歌詠紀於史牒不亦異乎至若大海朝宗衆流自非並岸風水激薄沙泥渾汙之處則萬里渟瀅未嘗濁也而佞人諂媚又有以海清為賀者不亦異之甚乎晉武帝太康五年六月任城魯國池水皆赤如血按劉向説近火沴水聽之不聰之罰也穆帝升平三年二月涼州城東池中有火四年四月姑臧澤水中又有火此火沴水之妖也明年張天錫殺中護軍張雍雍執政之人也安帝元興二年十月錢塘臨平湖水赤桓元諷吳郡使言開除以為已瑞俄而元敗苻堅時長安有水影逺觀若水視地則見人至堅晚年而止宋文帝元嘉二十四年夏四月河濟俱清二十五年冬青州城南逺望見地中如水有影謂之地鏡孝武孝建五年河濟清齊東昏侯永元元年七月辛未淮水變赤如血陳宣帝大建十四年七月時後主已即位江水赤如血自建康西至荆州後主禎明中江水赤自方州東至海洪範五行傳曰火沴水也法嚴刑酷傷水性也五行變莭陰陽相干氣色繆亂皆敗亂之象也京房易占曰水化為血兵且起其後為隋所滅禎明二年四月郢州南浦水黑如雲黑水在關中而今淮南水黑荆揚之地陷於關中之應後齊武成河清元年四月河濟清襄楷曰河諸侯象濁反清諸侯將為天子之象後十餘載隋有天下後周靜帝大象元年六月咸陽池水變血與大建十四年同占是時刑罰嚴急未幾國亡隋煬帝大業三年武陽郡河清數里鏡徹十二年龍門又河清後二歲唐受禪唐髙祖武德元年七月新豐鸚鵡谷水清世傳此水清天下平開皇初暫清復濁至是復清七年閏七月長安古城鹽渠水生鹽色紅而味甘狀似方印九年二月蒲州河清襄楷以為河諸侯象清陽明之效也太宗貞觀十四年二月陜州泰州河清十六年正月懷州河清十七年十二月鄭州滑州河清二十三年四月靈州河清髙宗永徽元年正月濟州河清二年十二月衛州河清五年六月濟州河清十六里調露二年夏豐州河清武后時來俊臣井水變赤如血井中常有吁嗟聲長安初醴泉坊太平公主第井水溢流又并州文水縣猷水竭武氏井溢長安中晉州祠水赤如血中宗神龍二年二月壬子洛陽城東七里地色如水樹木車馬歷歷見影漸移至都月餘乃滅長安街中往往見水影昔苻堅之將死也長安嘗有是景龍四年三月庚申京師井水溢占曰君凶又曰兵將起元宗開元二十二年八月清夷軍黃帝祠古井湧浪二十五年五月淄州棣州河清二十九年亳州老子祠九井涸復湧肅宗乾元二年七月嵐州合河關河三十里清如井水四日而變寶應元年九月甲午泰州至陜州二百餘里河清澄徹見底代宗大歷末深州束鹿縣中有水影長七八尺遙望見人馬往來如在水中及至前則不見水德宗建中四年五月乙巳滑州濮州河清十四年閏五月乙丑滑州河清貞元四年自陜至河隂河水黑流入汴至汴州城一宿而復十七年福州劒池水赤如血二十一年夏越州鏡湖竭是歲朗州熊武五溪水鬭占曰山崩川竭國必亡又曰方伯力政厥異水鬭穆宗長慶元年七月河水赤三日止九月靈州奏黃河清從陕至定逺界二百五十里見底文宗開成二年夏旱揚州運河竭宣宗大中八年正月陕州河清懿宗咸通七年鄭州永福湖水赤如凝血者三日八年七月泗水下邳雨湯殺鳥雀水沸於火則可以傷物近火沴水也雨者自上而降鳥雀民象僖宗光啓元年正月潤州江水赤凡數日中和三年秋汴水入於淮水鬬壞船數艘廣明元年汝州峴陽峰龍池涸近川竭也宋真宗咸平元年五月撫州王羲之墨池水色變黑如雲大中祥符元年五月丁丑泰山王母池水變紅紫色四年二月己未河中府寶鼎縣瀵泉有光如燭焰四五炬其聲如雷郭璞注爾雅曰河東汾陰縣有水口如車輪許噴沸涌出其深無限名之為瀵即此也泉本八眼其一尤沸猛上祀后土畢臨觀之七眼皆湧此獨澄然若鑑詔賜泉北五龍廟曰神淵三年八月解州鹽池紫泉場水次二十許里不種自生其味特嘉命屯田員外郎何敏中往祭池廟八月東池水自成鹽僅半池潔白成塊晶瑩異常祀汾陰經度制置使陳堯叟繼獻凡四千七百斤分賜近臣及諸軍列校神宗元豐四年十月環州河水變甘徽宗大觀元年八月乾寧軍河清二年十二月陕州河清同州韓城縣郃陽縣至清及百里涉春不變自是迄政和宣和諸路數奏河清輒遣郎官致祭宰臣等率百官拜表賀歲以為常髙宗紹興十四年五月饒州樂平縣何衝里田隴數十百頃當霽天無雲田水如為物所吸聚為一直西行髙平地數尺不假隄防而水自行里南程氏家井水溢亦髙數尺夭矯如長虹聲如雷穿墻毁樓二水鬭於杉墩且前且却約十刻乃解各反故壑與史記周穀洛水鬭同占京房曰天子弱諸侯力政厥異水鬭醴泉漢宣帝甘露二年詔曰醴泉滂流枯稿榮茂赦天下後漢光武中元元年夏京師醴泉涌出飲之者痼疾皆愈惟眇蹇者不瘳明帝永平十一年醴泉出隋文帝開皇二年京師承明里醴泉出唐元宗天寶三年三月武威郡奏番禾縣嘉瑞鄉天寶山有醴泉湧出僖宗文德元年九月雲韶殿前穿井得甘泉宋太宗雍熙二年五月鳯翔府言岐山縣有泉耆舊相傳時平則流世亂則竭自唐室中葉此泉遂竭至大中年復流觀察使崔珙奏之詔書褒美賜號潤德泉碑刻猶在自後復竭今忽涌溢别出細泉數派畫圖以聞真宗大中祥符元年二月醴泉出蔡州汝陽縣鳯源鄉有疾者飲之皆愈又相州永安縣韓陵山牧童掊地得泉深尺餘汲取不竭飲者宿疾皆愈時或愆雨禱之必應四月丁巳兖州乾封縣民王用田中有童兒掊土得小青錢數十爭取之錢墜石罅因發石有湧泉二十四眼味極甘美又枯石河復有湧泉二十五眼又一眼出曽阜之上信宿勢加倍又别引數派雙魚躍其中有果實流出似李而小味甚甘及今古錢百餘封禪經度制置使王欽若貯水馳驛以獻分賜近臣詔設欄格謹護之六月詔建亭以靈液為額天禧二年閏四月京師拱聖第十九營有湧泉疾癘者飲之皆愈詔建道觀名曰祥源神宗熙寧元年五月京師開化坊醴泉出徽宗政和五年正月河陽陽臺觀醴泉出黑眚黑祥王莽地皇元年二月壬申日正黑莽惡之後漢靈帝光和元年六月丁丑有黑氣墮所御溫德殿庭中東觀記曰墮所御溫德殿庭中如車蓋隆起奮迅五色有頭體長十餘丈形貌似龍晉懷帝永嘉五年十二月黑氣四塞近黑祥也帝尋淪陷王室邱墟是其應也愍帝建興二年正月己巳朔黑霧著人如墨連夜五日乃止此近黑祥也其四年帝降劉曜元帝永昌元年十月京師大霧黑氣蔽天日月無光十一月帝崩宋文帝元嘉三十年正月乙亥朔會羣臣於太極前殿有青黑氣從東南來覆映宫上二月甲子元凶劭弒逆梁元帝承聖三年六月有黑氣如龍見於殿內近黑祥也黑周所尚色今見於殿內周師入梁之象其年為周所滅帝遇害陳宣帝大建五年六月西北有黑雲屬地𣪚如豬者十餘洪範五行傳曰當有兵起西北時後周將王軌軍於呂梁眀年擒吳明徹軍皆覆沒唐代宗大歷二年十月戊戌黑氣如塵彌漫於北方黑氣陰沴也德宗貞元四年七月自陕至河陰河水黑流入汴至汴州城下一宿而復近黑祥也占曰法嚴刑酷傷水性也五行變莭陰陽相干氣色繆亂皆敗亂之象十四年潤州有黑氣如隄自海門山橫亘江中與北固山峙又有白氣如虹自金山出與黑氣交將旦而沒宣宗大中四年正月壬寅黑氣如帶東西際天懿宗咸通十四年七月僖宗即位是月黑氣如盤自天屬含元殿庭宋元豐末嘗有物大如席夜見寢殿上而神宗登遐元符末又數見而哲宗山陵至大觀間漸晝見政和元年以後大作每得人語聲則出先若列屋摧倒之聲其形僅丈餘髣佛如龜金眼行動硜硜有聲黑氣蒙之不大了了氣之所及腥血四灑兵刃皆不能施又或變人形亦或為驢自春歷夏晝夜出無時遇冬則罕見多在掖庭宫人所居之地亦嘗及內殿後習以為常人亦不大怖宣和末寖少出而亂遂作徽宗政和三年夏至宰臣何執中奉祠北郊有黑氣數丈出齋宫行一里許入壇壝繞祭所皆近人穿燈燭而過俄又及於壇禮將畢忽不見徽宗宣和二三年春夏之際洛陽府畿間忽有物如人或蹲踞如犬其色正黑不辨眉目始夜則出掠小兒傷食之後雖白晝入人家為惡所至喧然不安謂之黑漢有力者夜執槍棒自衛亦有託以作禍者如此二歲乃熄已而北征事起其後卒成播遷之禍髙宗建炎三年二月甲寅日初出兩黑氣如人形夾日旁至巳時初刻乃散黑氣陰沴也亦兵象孝宗乾道四年春舒州雨黑米堅如鐵破之米心通黑淳熙十一年十二月戊辰夜畿縣新城深浦天雨黑水終夕盈甽十六年六月京城錢塘門旦啓黑風入揚沙石塗人驚避寧宗慶元元年徽州黃山民家古井風雨之夕黑氣出其中波浪噴涌皆黑祥也文獻通考卷二百九十七
