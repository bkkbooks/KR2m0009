body:
  text: 文獻通考卷一百八十九鄱陽馬端臨貴與著經籍考十六經小學漢藝文志易曰上古聖人結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬夬揚於王庭言其宣揚於王者朝庭其用最大也古者八歳入小學故周官保氏掌養國子教之六書師古曰保氏地官之屬也保安也謂象形象事象意象聲轉注假借造字之夲也師古曰象形謂畫成其物隨體詰屈日月是也象事即指事也謂視而可識察而見意上下是也象意即㑹意也謂比類合誼以見指撝武信是也象聲即形聲謂以事為名取譬相成江河是也轉注謂建一首同意相受考老是也假借謂本無其字依聲託事令長是也文字之義總歸六書故曰立字之本焉漢興蕭何草律師古曰草創造之亦著其法曰太史試學童能諷書九千字以上乃得為史又以六體試之課最者以為尚書御史史書令史韋昭曰若今尚書蘭䑓令史也臣瓚曰史書今之太史也吏民上書字或不正輙舉劾六體者古文竒字篆書𨽻書繆篆蟲書師古曰古文謂孔子壁中書竒字即古文而異者也篆書謂小篆蓋秦始皇使程邈所作也𨽻書亦程邈所獻主於徒𨽻從簡易也繆篆謂其文屈曲纒繞所以摹印章也蟲書謂為蟲鳥之形所以書幡信也皆所以通知古今文字摹印章書幡信也古制書必同文不知則闕問諸故老至於衰世是非無正人用其私師古曰各任私意而為字故孔子曰吾猶及史之闕文也今亡矣夫師古曰論語載孔子之言謂子文字有疑則當闕而不說孔自言我初渉學尚見闕文今則皆無任意改作也蓋傷其寖不正史籕篇者周之史官教學童書也與孔子壁中古文異體蒼頡七章者秦丞相李斯所作也爰歴六章者車府令趙髙所作也博學七章者太史令胡母敬所作也文字多取史籕篇而篆體復頗異所謂秦篆者也是時始造𨽻書矣起於官獄多事茍趨省易師古曰趨讀曰趣謂趨向之也易音弋䜴反施之於徒𨽻也漢興閭里書師合蒼頡爰歴博學三篇斷六十字以為一章凡五十五章并為蒼頡篇師古曰并合也總合以為蒼頡篇也武帝時司馬相如作凡將篇無復字師古曰復重也元帝時黄門令史㳺作急就篇成帝時將作大匠李長作元尚篇皆蒼頡中正字也凡將則頗有出矣至元始中徵天下通小學者以百數各令記字於庭中揚雄取其有用者以作訓纂篇順續蒼頡又易蒼頡中重復之字凡八十九章臣復續揚雄作十三章韋昭曰臣班固自謂也作十三章後人不别疑在蒼頡下篇三十四章中凡一百二章無復字六藝羣書所載略備矣蒼頡多古字俗師失其讀宣帝時徵齊人能正讀者張敞從受之傳至外孫之子杜林為作訓故并列焉隋經籍志說者以為書之所起起自黄帝蒼頡比類象形謂之文形聲相益謂之字著於竹帛謂之書故有象形諧聲指事㑹意轉注假借六義之别古者童子示而不誑六年教之數與方名十歳入小學學書計二十而冠始習先王之道故能成其徳而任事然自蒼頡迄於漢初書經五變一曰古文即蒼頡所作二曰大篆周宣王時史籕所作三曰小篆秦時李斯所作四曰𨽻書程邈所作五曰草書漢初作秦世既廢古文始用八體有大篆小篆刻符摹印蟲書署書殳書𨽻書漢時以六體教學童有古文竒字篆書𨽻書繆篆蟲鳥并藁書楷書懸針垂露飛白等二十餘種之勢皆出於上六書因事生變也魏世又有八分書其字義訓讀有史籕篇蒼頡篇三蒼埤蒼廣蒼等諸篇章訓詁說文字林音義聲韻體勢等諸書自漢佛法行於中國又得西域胡書能以十四字貫一切音文省而意廣謂之婆羅門書與八體六文之義殊别今取以附體勢之下又後魏初定中原軍容號令皆以夷語後染華俗多不能通故録其夲言相傳教習謂之國語今取以附音韵之末又後漢鐫刻七經著於石碑皆蔡邕所書魏正始中又立一字石經相承以為七經正字後魏之末齊神武執政自洛陽徙於鄴都行至河陽值岸崩遂没於水其得至鄴者不盈大半至隋開皇六年又自鄴京載入長安置於祕書内省議欲補緝立於國學尋屬隋亂事遂寢廢營造之司因用為柱礎貞觀初祕書監臣魏徵始收聚之十不存一其相承傳拓之夲猶在祕府并秦帝刻石附於此篇以備小學宋三朝藝文志曰漢志六藝以爾雅附孝經六書為小學隋沿其制唐録有詁訓小學二類爾雅為詁訓偏傍音韵雜字為小學今合為一自齊梁之後音韵之學始盛顧野王玉篇陸法言切韵尤行於世漢志十家三十五篇入揚雄杜林二家二篇漢志爾雅以下四部二十六篇漢志元附孝經今釐入小學隋志一百八部四百四十七卷通計亡書合一百三十五部五百六十九卷唐志六十九家一百八部七百二十一卷失姓名二十三家徐浩以下不著録二十三家二千四十五卷宋三朝志六十七部六百八卷宋兩朝志二十部一百四十二卷宋四朝志二十二部二百七十七卷宋中興志一百二十八家一百五十五部一千一百一十三卷爾雅三卷鼂氏曰世傳釋詁周公書也餘篇仲尼子夏叔孫通梁文増補之晉郭璞注文字之學凡有三其一體製謂㸃畫有縱横曲直之殊其二訓詁謂稱謂有古今雜俗之異其三音韵謂呼吸有清濁髙下之不同論體製之書說文之類是也論訓詁之書爾雅方言之類是也論音韵之書沈約四聲譜及西域反切之學是也三者雖各名一家其實皆小學之類而藝文志獨以爾雅附孝經類經籍志又以附論語類皆非是今依四庫目置於小學之首陳氏曰晉𢎞農太守河東郭璞景純注按漢志爾雅二十篇今書惟十九篇志初不著撰人名氏璞序亦但稱興於中古隆於漢氏而已至陸氏釋文始謂釋詁為周公所作其說蓋夲於魏張揖所上廣雅表言周公制禮以道天下著爾雅一篇以釋其義今俗所傳二篇或言仲尼所増或言子夏所益或言叔孫通所補或言沛郡梁文所考皆解家所說先師口傳疑莫能明也舊有劉歆樊光李廵孫炎之學今惟郭氏行於世朱子語録曰爾雅是取傳注以作後人却以爾雅證傳注爾雅非是只是據諸處訓釋所作趙岐說孟子爾雅皆置博士在漢書亦無可考爾雅釋文一卷陳氏曰唐陸徳明撰爾雅音訓二卷崇文總目不著撰人名氏以孫炎郭璞二家音訓為尚狭頗増益之爾雅疏十卷鼂氏曰舊有孫炎髙璉疏皇朝以其淺略命邢昺杜鎬等别著此書陳氏曰邢昺撰其叙云為注者劉歆樊光李廵孫炎雖各名家猶未詳備惟郭景純最為稱首其為義疏者惟俗間有孫炎髙璉皆淺近今奉勅校定以景純為主共其事者杜鎬而下八人止齋陳氏䟦爾雅疏曰古者重小學爾雅所為作也漢興除秦之禁常置博士列於學官至今漢儒書行於世如毛氏詩訓許氏說文揚氏方言之類蓋皆有所夲云隋唐以來以科目取士此書不課於舉子由是寖廢韓退之以古文名世尚以注蟲魚為不切則知誦習者寡矣國初諸儒獨追古依郭氏注為之疏爾雅稍稍出比於熙豐三經行學者非字說不學自先儒注疏皆罷絀而爾雅益廢余憶為兒時入鄉校有以爾雅問題者余用能辨䑕豹不識蟛蜞為對其事至淺諸老先生徃徃驚嘆以為博也郡有刋疏并音釋若干卷以久不就字畫多殘闕金華趙君子良來為推官繕補之始頗可讀趙徵余言因叙此書之所以廢且見子良之志子良學於東萊呂伯恭氏於余為同年進士名善珍爾雅音略三卷鼂氏曰偽蜀毋昭裔撰爾雅舊有釋智騫及陸元朗釋文昭裔以一字有兩音或三音後生疑於呼讀乃釋其文義最明者為定小爾雅一卷鼂氏曰孔子古文也見於孔鮒書陳氏曰漢志有此書亦不著名氏唐氏有李軌解一卷今館閣書目云孔鮒撰蓋即孔叢子第十一篇也曰廣詁廣言廣訓廣義廣名廣服廣器廣物廣鳥廣獸凡十章又度量衡為十三章當是好事者抄出别行爾雅新義二十卷陳氏曰陸佃撰其於是書用力勤矣自序以為雖使郭璞擁篲清道䟦望塵躅可也以愚觀大率不出王氏之學與劉貢父所謂不徹薑食三牛三鹿戱笑之語殆無以大相過也書云玩物䘮志斯其為䘮志也𢎞矣頃在南城傳寫凡十八卷其曽孫子遹刻於嚴州為二十卷注爾雅三卷陳氏曰鄭樵撰其言爾雅出自漢代箋註未行之先蓋馮詩書以作爾雅爾雅明則百家箋註皆可廢爾雅應釋者也箋註不應釋者也言語稱謂宮室器服草木蟲魚鳥獸之所命不同人所不能識者故為之訓釋義理人之所夲有無待注釋有注釋則人必生疑反舎經之言而疑注解之言或者復舎注解之意而泥己之意以為經意此其為說雖偏而論注釋之害則名言也博雅十卷鼂氏曰隋曹憲撰魏張揖嘗採蒼雅遺文為書名曰廣雅憲因揖之說附以音解避煬帝諱更之為博云後有張揖表憲後事唐太宗嘗讀書有竒難字輙遣使問憲憲具為音注援驗詳覆帝歎賞之陳氏曰魏博士張揖撰凡不在爾雅者著於篇仍用爾雅舊目館閣書目云今逸但存音三卷今書十卷而音附逐篇句下不别行揖又有埤蒼三蒼訓詁雜字古文字訓凡四書見唐志今皆不𫝊蜀爾雅三卷陳氏曰不著撰人名氏館閣書目按李邯鄲云唐李商隠採蜀語為之當必有據埤雅鼂氏曰皇朝陸佃農師撰書載蟲魚鳥獸草木名物喜採俗語然佃王安石客也而學不専主王氏亦似特立者陳氏曰釋魚釋獸以及於鳥蟲馬木草而終之以釋天所以為爾雅之輔也此書夲號物性門類其初嘗以說魚說木二篇上之朝編纂將就而永裕上賔不及再上既注爾雅遂成此書其於物性精詳所援引甚博而亦多用字說急就章一卷鼂氏曰漢史㳺撰唐顔師古注游元帝時為黄門令凡書三十二章雜記姓名諸物五官等字以教童䝉急就者謂字之難知者緩急可就而求焉自昔善小學者多書此故有皇象鍾繇衛夫人王羲之所書𫝊於世陳氏曰其文多古語古字古韵有足觀者方言十三卷崇文總目漢揚雄子雲撰晉郭璞注今世所傳文或謬缺與先儒所引時有差云鼂氏曰雄齎素油問上計孝㢘異語悉集之題其首曰輶軒使者絶代語釋别國方言予𫝊夲於蜀中後用國子監刋行夲校之多所是正其疑者兩存之然監夲以秋佳為秋侯以㪅為更引𫝊糊其口於四方作糊予口未必盡得也陳氏曰首題輶軒使者絶代語末載答劉歆書具詳著書夲末其略云天下上計孝㢘及内郡衛卒㑹者常抱三寸弱翰齎素油四尺以問其異語歸即以鉛摘次之於槧葛洪西京雜記言子雲好事常懐鉛題集從諸記訪殊方絶域之語蓋夲雄書所云也容齋洪氏隨筆曰今世所傳揚子雲輶軒使者絶代語釋别國方言凡十三卷郭璞序而解之其末又有漢成帝時劉子駿與雄書從取方言及雄答書以予考之殆非也雄自序所為文漢史夲𫝊但云經莫大於易故作太𤣥𫝊莫大於論語作法言史篇莫善於蒼頡作訓纂箴莫善於虞箴作州箴賦莫深於離騷反而廣之辭莫麗於相如作四賦雄平生所為文盡於是矣初無所謂方言漢藝文志小學有訓纂一篇儒家有雄所序三十八篇注云太𤣥十九法言十三樂四箴二雜賦有雄賦十二篇亦不載方言觀其答劉子駿書稱蜀人嚴君平按君平夲姓荘漢顯宗諱荘改曰嚴法言所稱蜀荘沈㝠蜀荘之才之珍吾珍荘也皆夲字何獨至此書而曰嚴又子駿只從之求書而答云必欲脅之以威陵之以武則縊死以從命也何至是哉既云成帝時子駿與雄書而其中乃云孝成皇帝反覆牴牾又書稱汝潁之間先漢人無此語也必漢魏之際好事者為之云釋名八卷陳氏曰漢徵士北海劉熙成國撰序云名之於實各有類義百姓日稱而不知其所以然之意故撰天地隂陽四時邦國都鄙車服䘮紀下及民庶應用之器即物名以釋義凡二十七篇說文解字三十卷鼂氏曰漢許慎纂李陽冰刋定偽唐徐鉉再是正之又増加其闕字陳氏曰凡十四篇并序目一篇各分上下卷凡五百四十部九千三百五十三文重一千一百六十三雍熙中右散騎常侍徐鉉奉詔校定以唐李陽冰排斥許氏為臆說末有新定字義三條其音切則以唐孫愐韵為定容齋洪氏隨筆曰許叔重在東漢與馬融鄭康成不甚相先後而所著說文引用經傳多與今文不同聊摭逐書十數條以示學者其字異而音同者不載所引周易百榖草木麗乎土為草木䕻乎地服牛乘馬為犕音備牛乘馬夕惕若厲為若夤其文蔚也為斐也乘馬班如為驙如天地絪緼為天地壹所引書帝乃殂落為勛乃殂竄三苖為塞也音倅三苖又圜圜升雲半有半無獂有爪而不敢以撅及以相陵懱維緢有稽之句皆云周書今所無也所引詩既伯既禱為既禡既禂新䑓有泚為有玼焉得諼草為安得藼草論語荷蕢為荷臾䙝裘為絬衣又有跢予之足一句孟子源源而來為謜謜接淅為滰淅滰其兩反乾瀆采也左傳尨涼為牻涼芟夷為癹音發夷國語觥飯不及壺飱為侊飯不及一食如此者甚多說文字源一卷崇文總目唐李騰集初李陽冰為滑州節度使李勉篆新驛記賈耽鎮滑州見陽冰書歎其精絶因命陽冰姪騰集許慎說文目録五百餘字刋於石以為世法云說文解字韵譜十卷鼂氏曰南唐徐鍇撰鍇以許慎學絶取其字分譜四聲殊便檢閲然不具載其解為可恨頗有意再編之說文解字繫傳四十卷陳氏曰南唐校書郎廣陵徐鍇楚金撰為通釋三十篇部叙二篇通論三篇袪要類聚錯綜疑義系述各一篇鍇至集賢學士右内史舎人不及歸朝而卒鍇與兄鉉齊名或且過之而鉉歸朝通顯故名出鍇上此書援引精博小學家未有能及之者巽岩李氏序曰漢和帝永元十二年太尉祭酒許叔重始為說文觧字十四篇凡五百四十部其文九千三百五十三後二十一年當安帝建光元年叔重子冲乃且以獻晉東萊㡉令呂忱繼作字林五卷以補叔重所闕遺者於叔重部叙初無移徙忱書甚簡顧為他說揉亂且𫝊寫訛脫學者鮮通今徃徃附見說文蓋莫知自誰氏始古文籕文疑是呂忱始増入今或以附見説文或在陽冰以前若說文元自有此則林罕不應謂忱補許氏遺闕也戎字當時増入上字則說文元自有矣更詳之陳左將軍顧野王更因說文造玉篇三十卷梁武帝大同末獻之其部叙既有所升降損益其文又増多於叔重唐上元末處士孫强復脩野王玉篇愈増多其文今行於俗間者强所脩也叔重專為篆學而野王雜以𨽻書用世既久故篆學愈㣲野王雖曰推夲叔重而追逐世好非復叔重之舊自强以下固無譏焉大歴間李陽冰獨以篆學得名時稱中興更刋定說文仍祖叔重然頗出私意詆訶許氏學者恨之南唐二徐兄弟實相與反正由舊故鍇所著書四十篇總名繋𫝊蓋尊許氏若經也惜其書未布而鍇亡夲朝雍熙三年鍇兄鉉初承詔與句中正葛湍王惟恭等詳校說文今三十卷内繋𫝊徃徃錯見豈其家學同源果無異𣲖與鍇亡恙時鉉苦許氏偏旁奥宻不可意知因令鍇以切韻譜其四聲庶㡬檢閲力省功倍又為鍇篆名曰說文韻譜其書當與繋𫝊並今韻譜或刻諸學官而繋𫝊訖莫光顯余蒐訪歳久僅得其七八闕卷誤字無所是正毎用太息蓋嘗謂小學放絶久矣欲崇起之必以許氏為宗而鉉鍇兄弟最其親近者如陽冰林罕郭忠恕等輩俱當収拾採掇聚為一書使學者復覩純全似非小補顧力有所不及耳韻譜仍便於檢閲然局以四聲則偏旁要未易見乃因司馬光所上類篇依五音先後悉取說文次苐安排使若魚貫然開編即可了也說文所無而類篇新入者皆弗取若有重音則但舉其先而略其後􅢖許氏夲在上去入聲而類編在平聲亦移載平聲大抵皆以類編為定類篇者司馬光治平末所上也先是景祐初宋祁鄭戩建言見行廣韵乃陳彭年丘雍等景徳末重脩繁省失當有誤科試乞别刋定即詔祁戩與賈昌朝同修而丁度李淑典領之寳元二年書成賜名集韵度等復奏集韵添字極多與彭年雍等前所脩玉篇不相參恊乞别為類篇即以命洙洙尋卒命胡宿代之宿奏委掌禹錫張次立同加校讎宿遷又命范鎮代之鎮出而光代之乃上其書目集韵類篇列於學官而廣韵玊篇㣲矣然小學放絶講習者寡獨幸其書具存耳所謂廣韵則隋仁夀初陸法言等所共纂次而唐儀鳳後郭知𤣥等又附益之時號切韻天寳末陳州司法孫愐者以切韵為謬略復加刋正别為唐韵之名在夲朝太平興國及雍熙景徳皆嘗命官討論大中祥符元年改賜新名曰廣韵今號集韵則又寳元改賜也切韵廣韵皆不如集韵之最詳故司馬光因以修類篇集韵部叙或與廣韵不同鍇修韵譜尚因之今五音先後並改從集韵蓋類篇亦以集韵為定故也嗚乎學無小而古則謂字書之學為小何哉亦志乎學當由此始爾凡物雖㣲必有理存何况斯文幼而講習磨礲浸灌之久逮其長也於窮理乎何有不則躐等陵節君子不貴也今學者以利禄之路初不假此遂一切棄捐不省喜字書者求其心畫端方已絶不可得但肆筆趂姿媚耳偏旁横竪且昏不知矧其文之理耶先儒解經固未始不用此匪獨王安石也安石初是説文覃思頗有所悟故其解經合處亦不為少獨恨求之太鑿所失更多不幸驟貴附和者益衆而鑿愈甚蓋字有六義而彼乃一之雖欲不鑿得乎科試競用其説元祐嘗禁之學官導諛紹聖復用嗜利禄者靡然風從鑿説横流汨䘮道真此吾蘇氏所以力攻王氏而不肯置也若一切置此弗道則又非是夫國家既不以此試士為士者可以自學矣乃未嘗過而問焉余竊哀之雖老矣猶欲與後生共講習此故先為此五音韵譜且叙其指意云又後序曰某在武陵嘗與賈直孺之孫端脩因徐楚金兄弟説文解字韵譜别以類編所次五音先後作五音譜其部叙仍用許叔重舊次蓋楚金兄弟夲志止欲便於檢閲故專以聲相從叔重當時部叙固不暇存既不存當時部叙則於偏旁一切都置之宜矣然偏旁一切都置則字之有形而未審厥聲者豈不愈難於檢閲乎此寳元所以既修集韵必脩類篇脩類篇蓋補集韵之不足處也集韵類篇兩者相順則字之形聲乃無所逃檢閲之難果非所患故某初作五音譜不敢紊叔重部叙舊次其偏旁皆按堵如故獨依類篇取集韵翻切所得夲音以序安頓粲然珠連不相雜揉古文竒字畢陳立見頗自謂於學者披閲徑㨗不愧楚金兄弟之言矣書既成未敢出也㑹得請歸眉山惟吾鄉家氏三世留意篆學多所纂述毎欲持此書相與考評精觕或増或損而去鄉踰一星終及歸則舊遊零落盡矣後生雖多俊才不復肯以小學為事所謂五音譜者遂束之髙閣兹來遂寧適與餘杭虞仲房相遇仲房能為古文竒字聲溢東南凡江浙偏旁與其他金石刻多仲房筆其乘暇則出五音譜求是正焉仲房喜曰此要書也便可刋刻與後學共之復何待某曰姑徐之試為我更張其不合者已而仲房謂某曰五音譜發端實因徐氏則此譜宜以徐氏為夲則所謂以聲相從其平上去入自有先後固不容顛倒叔重部叙亦何可獨異蓋即用徐氏舊譜參取集韵卷第起東終甲而偏旁各以形相從悉依類篇今若此則說文解字形聲具存此譜於檢閲豈不愈徑㨗但不免移徙叔重部叙耳某曰叔重部叙舊次起一終􅕀世固未有能通其說者楚金實始通之其書要自别行兩不傷賦詩斷章取所求而已復何待亟謂仲房鏤板流布嗟夫小學放絶久矣自是其復興乎若論小學源委則載前記矣繇崇寧以來用篆籕名一時者吴興則張有謙仲歴陽則徐競明叔而仲房最所善者獨張謂某曰明非謙敵也謙作復古編其筆法實繼斯冰其辯形聲分㸃畫剖判真偽計較毫釐視楚金兄弟及郭恕先尤精宻其有功於許氏甚大今其書具在明何敢望耶某曰明非謙敵信然謙不務進取用心於内成此書時年五十餘矣晚又棄家為黄冠師殆世外士陳了翁實愛之重之特識篇首夫豈若明之攀援姻戚茍入書藝局登進未㡬旋遭汰斥乎兩人相去何翅九牛毛因是亦可得吾仲房胷懐夲趨遂并復古編重刋刻云又曰舊編五音譜凡許氏所無類篇新入者皆弗取若有重音則但舉其先而略其後雖許氏夲在上去入聲而類篇在平聲亦移載平聲大抵皆以類篇為定今編既改部叙從徐氏則其五音先後亦不復用類篇但取許氏夲音次第之庶學者易曉二書要須各行乃曲當云字林五卷陳氏曰晉㡉令呂忱撰太一山僧雲勝註按隋唐志皆七卷三朝國史志惟一卷董氏藏書志三卷其集說文之漏畧者凡五篇然雜揉錯亂未必完書也巽岩李氏曰隋唐志皆云七卷恐誤今五卷具在此說文部叙初無欠闕不應五卷外更有兩卷崇文及邯鄲總目並無忱書余獨得之豫章但恨轉寫脫誤且他說雜揉其間非復忱書舊夲也忱所増古文籕文今說文多已附見疑後人因忱書悉收繫許氏若許氏先自有之忱又何補焉隋氏又載宋揚州督護吴恭字林音義五卷忱書今間有音獨無吴恭姓名仍無卷標署隋篇次苐篇首又題太一山僧雲勝註亦不知雲勝者何許人忱書要為可惜除古文籕文已附見說文外他字亦多收繫類篇尚有未收繫者故忱夲書不可遽使散落須求善夲校正之玉篇三十卷鼂氏曰梁顧野王撰唐孫彊又嘗増字僧神珙反紐圓附於後陳氏曰大約夲說文以後漢反切音未備但云讀如某其反切皆後人所加多踈樸脱誤至梁時四聲之學盛行故此書不復用直音矣其文字􅢖増多然雅俗雜居非如説文之精覈也又以今文易篆字益以舛訛世人以篆軆難通今文易曉故説文遂罕習要當尋其夲原也像文玊篇二十卷崇文總目唐釋慧力撰據野王之書裒益衆説皆標文示象玊篇解疑三十卷崇文總目道士謝利貞撰刪略野王之説以解字文重修玉篇三卷崇文總目皇朝詔翰林學士陳彭年與史館校勘吴鋭直集賢院丘雍等重加刋定證俗音字四卷崇文總目齊黄門侍郎顔之推正時俗文字之謬援諸書為据凡三十五目廣韵五卷鼂氏曰隋陸法言撰其後唐孫愐加字凡四萬二千三百八十三前有法言長孫愐三序陳氏曰開皇初有劉臻等八人同詣法言共為撰集長孫訥言為之箋注唐朝轉有加増至開元中陳州司法孫愐著成唐韵夲朝陳彭年等重脩中興書目云不知作者按國史志有重脩廣韵皇朝陳彭年等景祐集韵亦稱真宗令陳彭年丘雍等因陸法言韵就為刋益今此書首載景徳祥符勅牒以大宋重脩廣韵為名然則即彭年等所脩也景祐集韵十卷陳氏曰直史館宋祁鄭戬脩定學士丁度李淑典領字訓皆夲説文餘凡例詳見於序説文所無則引他書為解字五萬三千五百二十五比舊増二萬七千三百三十一名苑丞相温文正公司馬光撰自序竊以為備萬物之體用者無過於字包衆字之形聲者無過於韵今以集韵夲為正先以平上去入衆韻正其聲次以説文解字正其形次以訓詁同異辯其理次以經傳諸書之言證其實命曰名苑其有法制云為時遷物變者亦畧叙其沿革欲人知其源流變態云爾至於魚蟲草木之類雖纎苛煩碎非慷慨君子所當用心然亦重名之一節爾至於三才道徳禮樂善惡真偽之名輔佐世治其功亦不細哉所謂文武之道未墜於地在人賢者識其大者不賢者識其小者将來君子好學樂道庶㡬亦有取焉類篇四十九卷鼂氏曰皇朝景祐中丁度受詔脩類篇至熙寕中司馬光始奏書文三萬一千三百一十九重音二萬一千八百四十六以説文為夲陳氏曰丁度等既修集韻奏言今添字既多與顧野王玉篇不相參恊乞委修韵官别為類篇與集韵並行自寳元迄治平及成書歴王洙胡宿范鎮司馬光始上之熙寧中頒行凡十五篇各分上中下以説文為夲而例有九云潁濵蘇氏序曰雖有天下甚多之物茍有以待之無不各獲其處也多而至於失其處者非多罪也無以待之則十百而亂有以待之則千萬若一今夫字書之於天下可以為多矣然而從其有聲也而待之以集韵天下之字以聲相從者無不得也從其有形也而待之以類篇天下之字以形相從者無不得也既已盡之以其聲矣而又究之以其形而字書之變曲盡蓋天聖中諸儒始受詔為集韵書成以其有形存而聲亡者未可以責得於集韵也於是又詔為類篇凡受詔若干年而後成夫天下之物其多而至比於字書者未始有也然而多不獲其處豈其無以待之昔周公之為政登龜取黿攻梟去蛙之説無不偹具而孔子之論禮至於千萬而一有者皆預為之説夫此将以應天下之無窮故待天下之物使皆有處如待字書則物無足治者凡為類篇以説文為夲而其例有八一曰槻同部而呐㕯異部凡同意而異形者皆兩見也二曰天一在年一在真凡同意而異聲者皆一見也三曰叟之在草之在於凡古意之不可知者皆從其故也四曰氛古气類也而今附雨䪩古口類也而今附音凡變古而有異義者皆從今也五曰壼之在口無之在林凡變古而失其真者皆從古也六曰􆂑之附天􅙷之附人凡字之後出而無據者皆不得特見也七曰王之為玉朋之為朋凡字之失故而遂然者皆明其由也八曰邑之加邑白之加凡集韵之所遺者皆載於今書也推此八者以求其詳可得而見也凡十四篇目録一篇文若干文獻通考卷一百八十九
