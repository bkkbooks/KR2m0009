body:
  text: 文獻通考卷九十二鄱陽馬端臨貴與著宗廟考二天子宗廟秦二世元年下詔增始皇寢廟犧牲及山川百祀之禮令羣臣議尊始皇廟羣臣皆頓首言曰古者天子七廟諸侯五大夫三雖萬世世不軼毁今始皇為極廟四海之內皆獻貢職增犧牲禮咸備毋以加先王廟或在西雍今岐州雍縣或在咸陽天子儀當獨奉酌祠始皇廟自襄公以下軼毁所置凡七廟羣臣以禮進祠以尊始皇廟為帝者祖廟漢髙祖十年秋七月太上皇帝崩葬萬年八月令諸侯王皆立太上皇廟於國都班固贊曰漢帝夲系出自唐帝降及于周在秦作劉涉魏而東遂為豐公豐公蓋太上皇父其遷日淺墳墓在豐鮮焉及髙祖即位置祠祀官則有秦晉梁荆之巫應劭曰先人所在之國悉致祠巫祝博求神靈之意也文頴曰巫掌神之位次者也范氏世事於晉故祠祀有晉巫范會支庶留秦為劉氏故有秦巫劉氏隨魏都大梁故有梁巫後徙豐豐屬荆故有荆巫也世祠天地綴之以祀豈不信哉綴言不絶也按漢髙帝承秦之敝禮制隳廢既即天子位而七廟未嘗立至太上皇崩始詔郡國立廟而皇祖以上無聞焉班史髙紀贊始有豐公之名且言致祠祀有秦晉荆梁之巫觀注家所言則是自晉而秦自秦而梁自梁而荆似各有祖廟各有巫以主其祀事然郊祀志言梁巫祠天地天社天水房中堂上之屬晉巫祠五帝東君雲中君巫社巫祠族人炊之屬秦巫祠社主巫保族纍之屬荆巫祠堂下巫先司命施糜之屬注見雜祀門則諸巫所掌者乃祀典神祇之祠非祖廟也所謂世祠天地綴之以祀者豈是以諸祖配諸神而祠之而各處有巫主其事邪不可得而詳也惠帝即位令郡國諸侯王立髙廟四年帝為東朝長樂宫孟康曰朝太后于長樂宫及間往師古曰非大朝時中間小謁見數蹕煩民師古曰妨其往來也作復道方築武庫南如淳曰作復道方始築武庫南也師古曰復音方目反叔孫通因請間師古曰請空隙之時不欲對衆言之曰陛下何自築復道髙帝寢衣冠月出遊髙廟服虔曰持髙廟中衣月旦以遊於衆廟已而復之應劭曰月旦出髙帝衣冠備法駕名曰遊衣冠如淳曰髙祖之衣冠藏在宫中之寢三月出遊其道正值今之所作復道下故言乘宗廟道上行也晉灼曰黃圗髙廟在長安城門街東寢在桂宫北服言衣藏於廟中如言宫中皆非也師古曰諸家之説皆未允也謂從髙帝陵寢出衣冠遊於髙廟每月一為之漢制則然而後之學者不曉其意謂以月出之時而夜遊衣冠失之逺也子孫奈何乘宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟原重也先已有廟今更立之故云重也渭北衣冠月出遊之益廣宗廟大孝之本上乃詔有司立原廟致堂胡氏曰天子七廟致其誠敬足矣而又作原廟云益廣大孝之本則通之妄也其言曰人主無過舉有七廟又作原廟非過舉乎且衣冠出遊於禮何據中庸記宗廟之禮陳其宗器設其裳衣非他所也謂廟中也非他時也謂祭祀之時也今以死者衣冠月出遊之於禮褻矣然則通所以諌帝者無一而當則不若帝以數蹕煩民而築復道之為是也使後世有致隆於原廟而簡於太廟者則通説啓之矣楊氏曰叔孫通既諌漢惠帝作復道又請以復道為原廟益廣大孝之本以一時率爾之言立千萬世不易之制其言欲益廣大孝之本不知宗廟之輕自此始也夫宗廟之禮貴乎嚴而不欲其褻人主事宗廟之心欲其専不欲其分既有宗廟又有原廟則事死如事生事亡如事存之心有所分矣宗廟之體極乎嚴原廟之體幾乎褻人情常憚於嚴而安於褻則藏祀之禮反移於原廟故宗廟之禮雖重而反為虗文矣如李清臣所謂略於七廟之室而祠於佛老之側窮土木之巧殫金碧之彩作於盛暑纍月而後成費以十巨萬禮官不議而有司不言及其成也不為木主而為之象不為禘祫蒸嘗之祀而行一酌之奠之禮又楊時所謂舍二帝三王之正禮而從一繆妄之叔孫通是也抑又有大不安於心者聖眀相繼仁孝愛敬之至通乎神眀而宗廟之禮未嘗親祀祗遣大臣攝行時享夫豈仁聖之本心哉蓋既有宗廟又有原廟則心分而不専末既有所重則本必有所輕其勢然也先公曰成周之制不惟鎬京有廟岐周洛邑皆有焉于周受命自召祖命是岐周有廟也蓋岐是周之所起有舊廟在焉周公城洛邑祀文王是洛邑有廟也蓋營洛而特為廟焉先王立廟未有無故者亦未嘗立兩廟於京師五年帝思髙祖之志樂沛以沛宫為髙祖廟髙祖所教歌兒百二十人皆令為吹樂後有闕輒補之漢舊儀髙廟蓋地六頃三十畝四步堂上東西五十步南北三十步祠日立九旗堂下撞千石鐘十枚聲聞百里寢廟者象生有衣冠履帶几杖起居日四上食卧床帷帳原宗廟者朝廷行大禮封拜諸侯王酎金原宗廟在北城外遊衣冠嘗百果文帝四年作顧成廟服虔曰廟在長安城南文帝作應劭曰文帝自為廟制度卑狹若顧望而成猶文王靈臺不日成之故曰顧成如淳曰身存而為廟若尚書之顧命也景帝廟號德陽武帝廟號龍淵昭帝廟號徘徊宣帝廟號樂遊元帝廟號長夀成帝廟號陽池景帝元年冬十月詔曰蓋聞古者祖有功宗有德師古曰祖始也始受命也宗尊也有德可尊制禮樂各有由歌者所以發德也舞者所以眀功也髙廟酎張晏曰正月旦作酒八月成名曰酎酎之言純也至武帝時因八月嘗酎會諸侯廟中出金助祭所謂酎金也師古曰酎三重釀醇酒也味厚故以之薦宗廟酎音直枚反奏武德文始五行之舞孟康曰武德髙祖所作也文始舜舞也五行周舞也武德者其舞人執干戚文始舞執羽籥五行舞冠冕衣服法五行色見禮樂志孝惠廟酎奏文始五行之舞孝文皇帝臨天下通關梁不異逺方張晏曰孝文十二年除關不用傳令逺近若一除誹謗去肉刑賞賜長老收恤孤獨以遂羣生遂成也逹也減耆欲不受獻耆音嗜罪人不帑蘇林曰刑不及妻子師古曰帑與孥同不誅亡罪不私其利也除宫刑出美人重絶人之世也朕既不敏弗能勝識師古曰敏材智速疾也勝識盡知之此皆上世之所不及而孝文皇帝親行之師古曰上世謂古昔帝王德厚侔天地利澤施四海靡不獲福眀象乎日月而廟樂不稱朕甚懼焉其為孝文皇帝廟為昭德之舞以眀休德然後祖宗之功德施於萬世永永無窮朕甚嘉之其丞相列侯中二千石禮官具禮儀奏丞相臣嘉等奏曰申屠嘉陛下永思孝道立昭德之舞以眀孝文皇帝之盛德皆臣嘉等愚所不及臣謹議世功莫大於髙皇帝德莫盛於孝文皇帝髙皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟諸侯王列侯使者侍祠天子所獻祖宗之廟張晏曰王及列侯嵗時遣使詣京師侍祠助祭如淳曰若光武廟在章陵南陽太守稱使者往祭是也不使侯王祭者諸侯不得祖天子凡臨祭宗廟皆為侍祭師古曰張説是也既云天子所獻祖宗之廟非謂郡國之廟也請宣布天下制曰可中元四年春三月起德陽宫臣瓉曰是景帝廟也帝自作之諱不言廟故言宫武帝建元六年春二月遼東髙廟災夏四月髙園便殿火師古曰凡言便殿便室便坐者皆非正大之處所以就便安也園者于陵上作之既有正寢以象平生正殿又立便殿為休息間晏之處耳説者不曉其意乃解云便殿便室皆是正名斯大惑矣尋石建韋元成孔光等傳其義可知便讀如本字上素服五日董仲舒對曰春秋之道舉往以眀來按春秋魯定公哀公時季氏之惡已熟而孔子之聖方盛夫以盛聖而易熟惡季孫雖重魯君雖輕其勢可成也故定公二年兩觀災哀公三年桓宫釐宫災四年亳社災兩觀桓釐廟亳社四者皆不當立天皆燔其不當立者以示魯欲其去亂臣而用聖人也今髙廟不當居遼東髙園殿不當居陵旁於禮亦不當立與魯所災同天災若語陛下視親戚貴屬在諸侯逺正最甚者忍而誅之如吾燔遼東髙廟乃可視近臣在國中處旁仄及貴而不正者忍而誅之如吾燔髙園殿乃可云爾在外而不正者雖貴如髙廟猶災燔之况諸侯乎在內而不正者雖貴如髙園殿猶燔災之况大臣乎此天意也西山真氏曰仲舒對䇿言天人相與之際以為天心仁愛人君而欲止其亂又謂人君所為美惡之極與天地流通而往來相應此皆藥石之至言也至火災之對則傅會甚矣况又導人主以誅殺與前所謂尚德不尚刑者何其自相戾邪夫親戚之驕僣近臣之専橫夫豈無道以裁制之豈必誅殺而後快哉史稱仲舒居家推説其意草稿未上主父偃竊其書奏焉上召視諸儒仲舒弟子吕步舒不知其師書以為大愚於是下仲舒吏當死詔赦之仲舒遂不敢復言災異其後淮南衡山反上思仲舒前言使吕步舒持斧鉞治淮南獄以春秋誼顓斷於外不請既還事上皆是之史又言淮南衡山江都謀反迹見公卿尋端治之竟其黨與坐死者數萬人夫謀反不過數人而坐死者若是其衆豈非仲舒前言有以發帝之忍心與按髙廟不當居遼東髙園殿不當居陵旁此正論也春秋桓宫僖宫災孔子在陳聞火曰其桓僖乎公羊傳亦謂毁廟不當復立故災若引是為對革正宗廟之重復褻慢不如禮者以眀尊無二上之義則不至流傳元成之時樂因循而憚改作以來衆議之紛紛矣今捨所當言而他及其非所宜何哉宣帝本始二年詔曰朕以眇身奉承祖宗夙夜惟念孝武皇帝躬履仁義選眀將討不服丐奴逺遁平氐羌昆眀南越百蠻鄉風欵塞來享建太學修郊祀定正朔協音律封泰山塞宣房符瑞應寶鼎出白麟獲功德茂盛不能盡宣而廟樂未稱其議奏有司奏請宜加尊號六月庚午尊孝武廟為世宗廟奏盛德文始五行之舞應劭曰宣帝復采昭德之舞為盛德舞以尊世宗廟也諸帝廟皆常奏文始四時五行舞也天子世世獻武帝巡狩所幸之郡國皆立廟時詔列侯二千石博士議羣臣大議庭中皆曰宜如詔書長信少府夏侯勝獨曰武帝雖有攘四夷廣土斥境之功然多殺士衆竭民財力奢泰無度天下虛耗百姓流離物故者半蝗蟲大起赤地數千里或人民相食畜積至今未復亡德澤於民不宜為立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也人臣之誼宜直言正論非茍阿意順指議已出口雖死不悔於是丞相義御史大夫廣眀劾奏勝非議詔書毁先帝不道及丞相長史黃霸阿縱勝不舉劾俱下獄有司遂請尊孝武廟為世宗廟奏盛德文始五行之舞天子世世獻納以眀盛德武帝巡狩所幸郡國凡四十九皆立廟如髙祖太宗焉元帝永光四年十月罷祖宗廟在郡國者五年毁太上皇孝惠皇帝寢園廟建昭元年罷孝文太后孝昭太后寢園時祖宗廟在郡國六十八合百六十七所師古曰六十八者郡國之數也百六十七所宗廟之數也而京師自髙祖下至宣帝與太上皇悼皇考各自居陵旁立廟師古曰悼皇考者宣帝之父即史皇孫并為百七十六又園中各有寢便殿如淳曰黃圗髙廟有便殿是中央正殿也師古曰如説非也凡言便殿便室者皆非正大之處寢者陵上正殿若平生露寢矣便殿者寢側之便殿耳日祭於寢月祭於廟時祭於便殿寢日四上食廟嵗二十五祠如淳曰月祭朔望加臘為二十五晉灼日漢儀注宗廟一嵗十二祠五月嘗麥六月十月三伏立秋貙婁又嘗粢八月先夕饋飱皆一太牢酎祭用九太牢十月嘗稻又飲蒸二太牢十一月嘗十二月臘二太牢又每月一太牢如閏加一祀與此上十二為二十五祠便殿嵗四祠又月一遊衣冠而昭靈后武哀王昭哀后孝文太后孝昭太后衛思后戾太子戾后各有寢園與諸帝合凡三十所一嵗祠上食二萬四千四百五十五用衛士四萬五千一百二十九人祝宰樂人萬二千一百四十七人養犧牲卒不在數中至元帝時貢禹奏言古者天子七廟今孝惠孝景廟皆親盡宜毁及郡國廟不應古禮宜正定天子是其議未及施行而禹卒永光四年乃下詔先議罷郡國廟曰朕聞眀王之御世也遭時為法因事制宜往者天下初平逺方未賔因嘗所親以立宗廟師古曰親謂親臨幸處也蓋建威銷萌一民之至權也師古曰銷遏逆亂使不得萌生今賴天地之靈祖宗之福四方同軌蠻貊貢職師古曰同軌言車轍皆同示教化齊也久遵而不定令疏逺卑賤共承尊祀殆非皇天祖宗之意朕甚懼焉傳不云乎吾不與祭如不祭其與將軍列侯中二千石二千石諸大夫博士議郎議丞相元成御史大夫鄭𢎞太子太傅嚴彭祖少府歐陽地餘諌大夫尹更始等七十人皆曰臣聞祭非自外至者也繇中出生於心也故唯聖人為能享帝孝子為能享親立廟京師之居躬親承事四海之內各以其職來助祭尊親之大義五帝三王所共不易之道也詩云有來雍雍至止肅肅相維辟公天子穆穆春秋之義父不祭於支庶之宅君不祭於臣僕之家王不祭於下土諸侯臣等愚以為宗廟在郡國宜無修臣請勿復修奏可因罷昭靈后武哀王昭哀后衛思后戾太子戾后園皆不奉祠裁置吏卒守焉罷郡國廟後月餘復下詔曰蓋聞眀王制禮立親廟四祖宗之廟萬世不毁所以眀尊祖敬宗著親親也朕獲承祖宗之重惟大禮未備戰栗恐懼不敢自顓其與將軍列侯中二千石二千石諸大夫博士議元成等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁迭互也親盡則毁故云迭也毁廟之主藏乎太祖五年而再殷祭言一禘一祫也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖自出以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毁親疏之殺示有終也周之所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七非有后稷始封文武受命之功者皆當親盡而毁成王承二聖之業制禮作樂功德茂盛廟猶不世以行為諡而已謂之成王則是以行表諡也禮廟在大門之內不敢逺親也臣愚以為髙帝受命定天下宜為帝者太祖之廟世世不毁承後屬盡者宜毁今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮太上皇孝惠孝文孝景廟親盡宜毁皇考廟親未盡如故悼王考於元帝祖也大司馬車騎將軍許嘉等二十九人以為孝文皇帝除誹謗去肉刑躬莭儉不受獻罪人不孥不思其利出美人重絶人類賔賜長老收恤孤獨德厚侔天地利澤施四海宜為帝者太宗之廟廷尉忠以為孝武皇帝改正朔易服色攘四夷宜為世祖之廟諌大夫更始等十八人以為皇考廟上序於昭穆非正禮宜毁於是上重其事重難也依違者一年乃下詔曰蓋聞王者祖有功而宗有德尊尊之大義也存親廟四親親之至恩也髙皇帝為天下誅暴除亂受命而帝功莫大焉孝文皇帝國為代王諸吕作亂海內搖動然羣臣黎庶靡不一意北面而歸心猶謙辭固讓而後即位削亂秦之迹興三代之風是以百姓晏然咸獲嘉福德莫盛焉髙皇帝為漢太祖孝文皇帝為太宗世世承祀傳之無窮朕甚樂之孝宣皇帝為孝昭皇帝後於義一體師古日一體謂俱為昭也禮孫與祖俱為昭宣帝之于昭帝為從孫故云於義一體孝景皇帝廟及皇考廟皆親盡其正禮儀元成等奏曰祖宗之廟世世不毁繼祖以下五廟而迭毁今髙皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上孝惠廟皆親盡宜毁太上廟主宜瘞園孝惠皇帝為穆主遷於太祖廟寢園皆無復修奏可議者又以為清廟之詩言交神之禮無不清靜今衣冠出遊有車騎之衆風雨之氣非所謂清靜也祭不欲數數則瀆瀆則不敬宜復古禮四時祭於廟諸寢園日月間祀皆可勿復修間音工莧反上亦不改也眀年元成復言古者制禮别尊卑貴賤國君之母非適不得配食則薦於寢身沒而已陛下躬至孝承天心建祖宗定迭毁序昭穆大禮既定孝文太后孝昭太后寢祠園宜如禮勿復修奏可五年夏復戾園秋復太上皇寢廟園原廟文頴曰髙祖已有廟在長安惠帝更於渭北作廟謂之原廟昭靈后武哀王昭哀后衛思后園師古日昭靈后髙祖母武哀王髙祖兄昭哀后髙祖姊衛思后戾太子母也竟寧元年三月復孝惠皇帝寢園孝文太后孝昭太后寢園罷郡國廟及當毁廟後嵗餘韋元成薨匡衡為丞相上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上詔問衡意欲復之衡深言不可上疾久不平衡惶恐禱髙祖孝文孝武廟曰嗣曽孫皇帝恭承洪業夙夜不敢康寧思育休烈以章祖宗之盛功故動作接神必因古聖之經往者有司以為前因所幸以立廟將以繫海內之心非為尊祖嚴親也今賴宗祖之靈六合之內莫不附親廟宜一居京師天子親奉郡國廟可止毋修皇帝祗肅舊禮尊重神眀即告於祖宗而不敢失今皇帝有疾不豫乃夢祖宗見戒以廟楚王夢亦有其序皇帝悼懼即詔臣衡復修立謹按上世帝王承祖禰之大禮皆不敢不自親郡國吏卑賤不可使獨承又祭祀之義以民為本間者嵗數不登百姓困乏郡國廟無以修立禮凶年則嵗事不舉以祖禰之意為不樂是以不敢復如誠非禮義之中違祖宗之心咎盡在臣衡當受其殃大被其疾墜在溝瀆之中皇帝至孝肅慎宜蒙佑福唯髙皇帝孝文皇帝孝武皇帝省察右饗皇帝之孝開賜皇帝眉夀亡疆令所疾日瘳平復反常永保宗廟天下幸甚又告謝毁廟曰往者大臣以為在昔帝王承祖宗之休典取象於天地天序五行人親五屬師古曰五屬謂同族之五服斬縗齊縗大功小功緦麻也天子奉天故率其意而尊其制是以禘嘗之序靡有過五受命之君躬接於天萬世不墮繼列以下五廟而遷墮毁也音火規反上陳太祖間嵗而祫其道應天故福祿永終太上皇非受命而屬盡義則當遷又以為孝莫大於嚴父故父之所尊子不敢不承父之所異子不敢同禮公子不得為母伸為後則於子祭於孫止李竒曰不得伸尊其父也公子去其所生而為大宗後尚得私祭其母為孫則止不得祭公子母也眀繼祖不復顧其私祖母也尊祖嚴父之義也寢日四上食園廟間祠皆可亡修間工莧反皇帝思慕悼懼未敢盡從惟念髙皇帝聖德茂盛受命溥將欽若稽古承順天心師古曰傅廣也將大也欽敬也若善也稽考也子孫本支陳錫亡疆師古曰詩大雅文王之篇曰陳錫載周侯文王孫子文王孫子本支百世陳敷也載始也本夲宗也支支子也言子孫承受敷錫初始之福故得永久無窮竟也是之謂陳錫亡疆也誠以為遷廟合祭久長之䇿髙皇帝之意乃敢不聼即以令日遷太上孝惠廟孝文太后孝昭太后寢將以昭祖宗之德順天人之序定亡窮之業今皇帝未受兹福乃有不能共職之疾皇帝願復修立承祀臣衡等咸以為禮不得於禮不合也如不合髙皇帝孝惠皇帝孝文皇帝孝武皇帝孝昭皇帝孝宣皇帝太上皇孝文太后孝昭太后之意罪盡在臣衡等當受其咎今皇帝尚未平詔中朝臣具復毁廟之文臣衡中朝臣咸復以為天子之祀義有所斷禮有所承違統背制不可以奉先祖皇天不祐鬼神不享六藝所載皆言不當無所依緣以作其文事如失指罪乃在臣衡當深受其殃皇帝宜厚蒙祉福嘉氣日興疾病平復永保宗廟與天亡極羣生百神有所歸息諸廟皆同文久之上疾連年遂盡復諸所罷寢廟園皆修祀如故初上定迭毁禮獨尊孝文廟為太宗而孝武廟親未盡故未毁上於是乃復申眀之曰孝宣皇帝尊孝武廟曰世宗損益之禮不敢有與焉他皆如舊制唯郡國廟遂廢云容齋洪氏隨筆曰按匡衡平生佞諛専附石顯以取大位而此一節獨據經守禮其禱廟之文殆與金縢之祝册相似而不為後世所稱述漢史又不書於本傳憎而知其善可也五月帝崩毁太上皇孝惠孝景皇帝廟罷孝文孝昭太后昭靈后武哀王昭哀后寢園帝既崩匡衡奏言前以上體不平故復所罷祠卒不蒙福按衛思后戾太子戾后園親未盡師古曰言不當毁也孝惠孝景帝廟親盡宜毁及太上皇孝文孝昭太后昭靈后昭哀后武哀王祠請悉罷勿奉奏可成帝河平元年復太上皇寢廟園初髙后時患臣下妄非議先帝宗廟寢園官故定著令敢有擅議者棄市至元帝改制蠲除此令成帝時以無繼嗣故復太上皇寢廟園世世奉祠昭靈后武哀王昭哀后并食於太上寢廟如故又復擅議宗廟之令按太上皇親盡也以髙帝之父而不毁悼皇考私親也以宣帝之父而不毁雖非禮之正猶云可也至武哀王則髙帝之兄昭哀后則髙帝之姊見師古注文自當各有後裔奉其墳墓祭祀今乃立寢園與諸帝同而使天子世世祠之不經尤甚矣髙帝之姊而稱后於義尤不通哀帝即位丞相孔光大司空何武奏言永光五年制書髙皇帝為漢太祖孝文皇帝為太宗建昭五年制書孝武皇帝為世宗損益之禮不敢有與臣愚以為迭毁之次當以時定非令所為擅議宗廟之意也臣請與羣臣雜議奏可於是光祿勳彭宣詹事滿昌博士左咸等五十三人皆以為繼祖宗以下五廟而迭毁後雖有賢君猶不得與祖宗並列子孫雖欲褒大顯揚而立之鬼神不享也孝武皇帝雖有功烈親盡宜毁太僕王舜中壘校尉劉歆議曰漢興冒頓始強破東胡禽月氏氏讀曰支并其土地地廣兵強為中國􅊣南越尉他總百粵自稱帝故中國雖平猶有四夷之患且無寧嵗一方有急三面救之是天下皆動而被其􅊣也孝文皇帝厚以貨賂與結和親猶侵暴無已甚者興師十餘萬衆近屯亰師及四邉嵗發屯備虜其為患久矣非一世之漸也諸侯郡守連胸奴及百粵以為逆者非一人也胸奴所殺郡守都尉略取人民不可勝數孝武皇帝愍中國罷勞無安寧之時乃遣大將軍驃騎伏波樓船之屬南滅百粵起七郡北攘胸奴降昆邪十萬之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起元莵樂浪以斷胸奴之左臂西伐大宛并三十六國結烏孫起敦煌酒泉張掖以鬲婼羌裂胸奴之右肩師古曰婼而遮反單于孤特逺遁於幕北四垂無事斥地逺境起十餘郡師古曰斥開也逺廣也功業既定乃封丞相為富民侯以大安天下富實百姓其規橅可見師古曰橅讀為模又招集天下賢俊與協心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆爭之心至今纍世賴之單于守藩百蠻服從萬世之基也中興之功未有髙焉者也髙帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以發德音也禮記王制及春秋穀梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而葬諸侯五日而殯五月而葬此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故德厚者流光德薄者流卑流謂流風餘福春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也師古曰言非常數故云變也茍有功德則宗之不可預為設數故於殷太甲為太宗太戊曰中宗武丁曰髙宗師古曰太甲湯之孫太丁之子也太戊太庚之子雍己之弟也武丁小乙之子周公為無逸之戒舉殷三宗以勸成王由是言之宗無數也然則所以勸帝者之功德博矣以七廟言之孝武皇帝未宜毁以所宗言之則不可謂無功德禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功德皆兼而有焉凡在於異姓猶將特祀之况於先祖或説天子五廟無見文又説中宗髙宗者宗其道而毁其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿剪勿伐召伯所茇思其人猶愛其樹况宗其道而毁其廟乎迭毁之禮自有常法無殊功異德固以親疏相推及至祖宗之序多少之數經傳無眀文至尊至重難以疑文虗説定也孝宣皇帝舉公卿之議用衆儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁上覽其議而從之制曰太僕舜中壘校尉歆議可歆又以為禮去事有殺師古曰去除也殺漸也去音邱吕反殺音所例反其下並同也故春秋外傳曰日祭月祀時享嵗貢終王祖禰則日祭曽髙則月祀二祧則時享壇墠則嵗貢張晏曰去祧為壇墠掃地而祭也師古曰祧是逺祖也築土為壇除地為墠祧他堯反墠音善大禘則終王服虔曰蠻夷終王乃入助祭各以其珍貢以共大禘之祭也師古曰每一王終新王即位乃來助祭德盛而遊廣親親之殺也如淳曰遊亦流也彌逺則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毁廟晉灼曰以情推子以子况祖得人心禮何所違故無毁棄不禘之主也謂下三廟廢而為虛者也自貢禹建迭毁之議惠景及太上寢園廢而為虛師古曰虛讀曰墟失禮意矣致堂胡氏曰斷大論者以仲尼為據則無失矣書曰天子七廟歆謂七廟是也而以七為正法以宗為變不可常數則不知何所據而云然也祖考所當事者人之至情也或三廟或五廟或七廟禮之隆殺也有功德則宗之無則莫之宗焉是為人子孫得選擇祖考於情則逆於禮則違曽是以為孝乎平帝元始四年尊孝宣廟為中宗孝元廟為髙宗天子世世獻祭時王莽為安漢公欲諂太皇太后以斬郅支功奉尊元帝廟為髙宗太后晏駕後當以禮配食云及莽改號太后為新室文母絶之於漢不令得體元帝墮壞孝元廟更為文母太后起廟獨置孝元廟故殿以為文母纂食堂既成名曰長夀宫以太后在故未謂之廟莽置酒長夀宫請太后既至見孝元廟廢徹塗地太后驚泣曰此漢家宗廟皆有神靈與何治而壞之且使鬼神無知又何用廟為如令有知我乃人之妃妾豈宜辱帝之堂以陳饋食哉飲酒不樂而罷漢兵起莽惡髙廟神靈遣虎賁武士入髙廟拔劒四面提擊斧壞戶牖桃湯赭鞭鞭灑屋壁令輕車校尉居其中光武帝建武二年正月立髙廟於雒陽四時裕祀髙祖為太祖文帝為太宗武帝為世宗如舊餘帝四時春以正月夏以四月秋以七月冬以十月及臘一嵗五祀三年正月立親廟雒陽祀父南頓君以上至舂陵節侯時冦賊未夷方務征伐祀儀未設至十九年盜賊討除戎事差息於是五官中郎將張純與太僕朱浮奏言禮為人後者則為之子既事大宗大宗謂元帝則降其私親今禘祫髙廟陳序昭穆而舂陵四世君臣並列以卑厠尊不合禮意昔髙帝以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠臣愚謂宜除今親廟以則二帝舊典願下有司博採其議詔下公卿大司徒戴涉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元皇帝尊為祖父可親奉祠成帝以下有司行事别為南頓君立皇考廟其祭上至舂陵節侯羣臣奉祠以眀尊尊之敬親親之恩時議有異不著上可涉等議詔曰以宗廟處所未定且祫祭髙廟其成哀平且祠祭長安故髙廟其南陽舂陵嵗時各且因故園廟祭祀園廟去太守治所逺者在所令長行太守事侍祠惟孝宣帝有功德其上尊號曰中宗於是雒陽髙廟四時加祭孝宣孝元凡五帝其西廟成哀平三帝主四時祭於故髙廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮南頓君以上至節侯皆就園廟南頓君稱皇考廟巨鹿都尉稱皇祖考廟鬱林太守稱皇曽祖考廟節侯稱皇髙祖考廟在所郡縣侍祠眀帝即位以光武帝撥亂中興更為起廟號曰世祖廟以元帝於光武為穆故雖非宗不毁也後遂為常東漢制髙廟令一人六百石守廟掌案行掃除無丞世祖廟令一人六百石如髙廟漢儀帝之主九寸前方後圎圍一尺后主七寸圍九寸木用栗永平三年十月蒸祭光武廟初奏文始五行武德之舞眀帝臨終遺詔遵儉無起寢廟藏主於光烈皇后更衣别室志云光武廟更衣孝章即位有司奏言孝眀皇帝聖德淳茂功烈光於四海仁風行於千載而深執謙謙無起寢廟掃地而祭除日祀之法省送終之禮遂藏主於光烈皇后更衣别室臣以為更衣在中門之外處所殊别宜尊廟曰顯宗其四時禘祫於光武之堂間祀悉還更衣共進武德之舞如孝文皇帝祫祭髙廟故事制曰可續漢書五年冉殷祭三年一祫五年一禘父為昭南向子為穆北向禘以夏四月祫以冬十月禘之為言諦諦審昭穆尊卑之義祫者合也冬十月五穀成故骨肉合飲食於祖廟謂之殷祭四時正祭外有五月嘗麥三伏立秋嘗粢盛酎十月嘗稻等謂之間祀即各於更衣之殿更衣者非正處也園中有寢有便殿寢者陵上正殿便殿寢側之别殿即更衣也章帝臨崩遺詔無起寢廟如先帝故事和帝即位不敢違上尊號曰肅宗後帝承尊皆藏主於世祖廟積多無别是後顯宗但為陵寢之號殤帝生三百餘日而崩鄧太后攝政以尚嬰孩故不列於廟就陵寢祭之而已安帝以讒􅊣大臣廢太子及崩無上宗之奏後以自建武以來無毁者故遂常祭因以其陵號稱恭宗沖質二帝皆小崩梁太后攝政以殤帝故事就陵寢祭凡祠廟訖三公分祭之梁太后臨朝以殤帝幼崩廟次宜在順帝下大常馬訪奏宜如詔書諌議大夫吕勃以為應依昭穆之序先殤帝後順帝詔下公卿大鴻臚周舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖公於閔上孔子譏之書曰有事於太廟躋僖公傳曰逆祀也及定公正其序經曰從祀先公為萬世法也今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂吕勃議是也太后從之遂下詔曰孝殤皇帝雖不永休祚而即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵上先後相踰失其次序非所以奉宗廟之重垂無窮之制昔定公追正順祀春秋善之其令恭陵次康陵憲陵次恭陵以序親秩為萬世法靈帝時京都四時所祭髙廟五主世祖廟七主少帝三陵追尊后三陵凡牲用十八太牢皆有副倅故髙廟三主親毁之後亦但殷祭之嵗奉祠獻帝即位初平中相國董卓左中郎將蔡雍等以和帝以下功德無殊而有過差不應為宗及餘非宗者追尊三后皆奏毁之四時所祭髙廟一祖二宗及近帝四凡七廟時有司奏議宗廟迭毁左中郎將蔡雍議曰漢承秦滅學之後宗廟之制不用周禮每帝即世輒立一廟不止於七不列昭穆不定迭毁孝元帝時丞相匡衡御史大夫貢禹始建大議請依典禮孝文孝武孝宣皆以功德茂盛為宗不毁孝宣尊崇孝武廟稱世宗中正大臣夏侯勝猶執異議不應為宗至孝成皇帝議猶不定太僕王舜中壘校尉劉歆據經傳義處不可毁上從其議古人據正重順不敢私其君父如此其至也後遭王莽之亂光武皇帝受命中興廟稱世祖孝眀皇帝政參文宣廟稱顯宗孝章皇帝至孝蒸蒸仁恩博大廟稱肅宗比方前世得禮之宜此以下政事多釁權移臣下嗣帝殷勤各欲褒崇至親而臣下懦弱莫敢執夏侯之直今聖朝遵古復禮以求厥中誠合事宜孝元皇帝世在第八光武皇帝世在第九故以元帝為考廟尊而奉之孝明遵述亦不敢毁孝和以下穆宗威宗之號皆宜省去五年而冉殷祭祫食於太祖以遵先典議遂施行按西都郊祀之制因秦五畤未嘗有祭天之禮東都宗廟之制代代稱宗未嘗有祧遷之法此二失者因循既久不能革正然郊天之禮至王莽而後定七廟之法至董卓而後定蓋權姦擅國意所欲行不復依違顧忌故反能矯纍代之失然禮雖稍正而國且亡矣可勝慨哉又按蔡雍所㝎髙祖廟一祖二宗及近帝四為七廟其説似矣但以和安順桓四帝功德無殊而有過差奏毁之則所謂近帝四者乃光武眀帝章帝靈帝也按古之所謂天子七廟者自太祖及祖功宗德之後其下四世則當代人主之髙曽祖父也此四代者不以有功而存不以有過而廢今以獻帝言之靈其父也桓其祖也安其曽祖也和其髙祖也今捨其髙曽祖三世而以其父上繼五世之祖於義何所當乎當時此議雖一出董卓帝無所預然東漢自和帝而後皇統屢絶安帝以清河王之子入繼和帝順桓二帝以河間王之孫入繼安帝靈帝以河間王之曽孫入繼桓帝至靈帝方有親子為獻帝是則獻帝之所謂父者親父所謂髙祖曽祖及祖者乃所繼之大宗也自安順以來既入嗣大位即以非禮崇其私親之父母而昧兩統二父之義往往於大宗與私親隂有厚薄伯喈豈亦習聞時指隂有諂附邪不然何所祧毁者皆所嗣之大宗而竟以靈帝上繼章帝初不問其世次之懸隔是豈得為知禮者乎魏文帝受禪追尊大父曰大皇帝諱嵩後漢太尉大長秋騰養子也考曰武皇帝以洛京宗廟未成乃祠武帝於建始殿親執饋奠如家人禮晉志曰禮將營宫室宗廟為先庶人無廟則祭於寢帝者行之非禮甚矣眀帝太和三年追尊髙祖大長秋曰髙皇夫人吳氏曰髙皇后並在鄴廟之所祠則文帝之髙祖處士沛國譙人曺萌曽祖髙皇萌之子騰祖大皇帝共一廟考太祖武皇帝特一廟百代不毁所祠止於親廟四室其年十一月洛京廟成則以親盡遷處士主置園邑使宗正曹恪持節迎髙祖以下神主共一廟猶為四室而已景初元年六月羣公更奏㝎七廟之制曰武皇帝肇造洪業為魏太祖文帝繼天革命為魏高祖上集成大命宜為魏烈祖於太祖廟北為二祧其左為文帝廟號曰髙祖昭祧其右擬眀帝號曰烈祖穆祧其眀帝時見在造廟及稱祖當時之制非前代舊規也三祖之廟萬世不毁其餘四廟親盡迭遷一如周后稷文武廟祧之禮吳孫權不立七廟以父堅嘗為長沙太守乃於臨湘縣立堅廟依後漢奉南頓故事令太守奉祠後又尊堅廟曰始祖廟而不在京師於建業立兄長沙桓王廟子亮立眀年於宫東立權廟曰太祖廟既不在宫南又無昭穆之制晉武帝受禪追尊皇祖宣王為宣皇帝伯考景王為景皇帝考文王為文皇帝太始二年有司奏置七廟帝重其役詔宜權立一廟於是羣臣議奏上古清廟一宫尊逺神祇逮至周室制為七廟以辨宗祧聖旨深宏逺迹上世敦崇唐虞舍七廟之繁華遵一宫之逺旨舜承堯禪受終於文祖遂陟帝位蓋三十載月正元日乂格於祖此則虞氏不改唐廟因仍舊宫可依有虞氏故事即用魏廟奏可於是追祭征西將軍豫章府君潁川府君京兆府君與宣皇帝景皇帝文皇帝為三昭三穆是時宣皇未升太祖虗位所以祠六世與景帝為七廟其禮則據王肅説也七月又詔曰前奏就魏舊廟誠亦有凖然祗奉明主情猶未安宜更營造於是改創宗廟廟制於中門外之左通為屋四阿殿制堂髙三尺隨見廟數為室代滿備遷毁神主尺二寸后主一尺與尺二寸中間木以栗六年因廟陷當改創羣臣議奏曰古者七廟異所自宜如禮又曰古雖七廟自近代以來皆廟七室於禮無廢於情為敘亦隨時之宜至十年乃更改作於宣陽門外窮極壯麗然坎位之制猶如初耳武帝崩遷征西六世祖惠帝崩遷豫章五世祖元帝既即位上繼武帝於元為禰如漢光武上繼元帝故事也時西京湮沒江左建廟皆更新造尋以登懷帝之主又遷潁川四世祖位雖七室其實五世蓋從刁協議以兄弟為世數故也時宗廟始建舊儀多闕或以惠懷二帝應各為世則潁川世數過七宜在迭毁事下太常賀循以為禮兄弟不相為後不得以承代為世殷之盤庚不序陽甲漢之光武不繼成帝别立廟寢使臣下祭之此前代之眀典而承繼之著義也惠帝無後懷帝承統弟不後兄則懷帝自上繼世祖不繼惠帝當同殷之陽甲漢之成帝議者以聖德沖逺未便改舊諸如此禮通所未論是以惠帝尚在太廟而懷帝復入數則盈八盈八之理由惠帝不出非上祖宜遷也下世既升上世乃遷遷毁對代不得相通未有下升一世而上毁二世者也惠懷二帝俱繼世祖兄弟旁親同為一世而上毁亦為一世今以惠帝之崩已毁豫章懷帝之入復毁潁川如此則一世再遷祖位橫析求之古義未見此例惠帝宜出尚未輕論况可輕毁一祖而無義例乎潁川既無可毁之理則見神之數居然自八此蓋有由而然非謂數之常也既有八神則不得不於七室之外權安一位也至尊於惠懷俱是兄弟自上後世祖不繼二帝則二帝之神行應别出不為廟中恆有八室也又武帝初成太廟時正神止七而楊元后之神亦權立一室永熙元年告世祖諡於太廟八室此是茍有八神不拘於七之舊例也又議者以景帝俱已在廟惠懷一例景帝盛德元功王基之本義著祖宗百世不毁故所以特在本廟且亦世代尚近數得相容安神而已無逼上祖如王氏昭穆既滿終應别廟也以今方之既輕重義異又七廟七世之親昭穆父子位也若當兄弟旁滿輒毁上祖則祖位空懸世數不足何取於三昭三穆與太祖之廟然後成七哉今七廟之義出於王氏從禰已上至於髙祖親廟四世髙祖已上復五世六世無服之祖故為三昭三穆并太祖而七也故世祖㝎郊廟禮京兆潁川曽髙之親豫章五世征西六世以應此義今至尊繼統亦宜有五六世之祖豫章六世潁川五世俱不應毁今既云豫章先毁又當重毁潁川此為廟中之親惟從髙祖已下無復髙祖以上二世之祖於王氏之義三昭三穆廢闕其二甚非宗廟之本所據承又違世祖祭征西豫章之意於一王定禮所闕不少時尚書僕射刁協與循異議循答義深備辭多不載竟從循議焉於時百度草創舊禮未備毁主權居側室至太興三年正月乙卯詔曰吾雖上繼世祖然於懷愍皇帝皆北面稱臣今祠太廟不親執觴酌而令有司行事於情禮不安可依禮更處太常恆言今聖上繼武皇帝宜凖漢世祖故事不親觴爵又曰今上承繼武帝而廟之昭穆四世而已前太常賀循博士傅純並以為惠懷及愍宜别立廟然臣愚謂廟室當以客主為限無拘常數殷世有二祖三宗若拘七室則當祭禰而已推此論之宜還復豫章潁川以全七廟之禮驃騎長史溫嶠議凡言兄弟不相入廟既非禮文且光武奮劒振起不䇿名於孝平務神其事以應九世之讖又古不共廟故别立焉今上以䇿名而言殊於光武之事躬奉蒸嘗於繼既正於情又安矣大常恆欲還二府君以全七世嶠謂是宜驃騎將軍王導從嶠議嶠又曰其非子者可直言皇帝敢告某皇帝又若以一帝為一世則不祭禰反不及庶人帝從嶠議悉施用之於是乃更㝎制還復豫章潁川於昭穆之位以同惠帝嗣武故事而惠懷愍三帝自從春秋尊卑之義在廟不替也元帝崩豫章復還然元帝神位猶在愍帝之下故有坎室者十也眀帝崩潁川又遷猶十室也於時續廣太廟故三遷主並還西儲名之曰祧以凖逺廟成帝崩康帝承統以兄弟一世故不遷京兆始十一室也穆帝永和二年有司奏十月殷祭京兆府君當遷祧室昔征西豫章潁川三府君毁主中興之初權居天府在廟門之西咸康中太常馮懷表續太廟奉還於西儲夾室謂之為祧疑亦非禮今京兆遷入是為四世逺祖長在太祖之上昔周室太祖世逺故遷有所歸今晉廟宣皇為主而四廟居之是屈祖就孫也殷祫在上是代太祖也領司徒蔡謨議四府君宜改築别室若未展者當入就太廟之室人莫敢卑其祖文武不先不窋殷祭之日征西東面處宣皇之上其後遷廟之主藏於征西之祧祭薦不絶護軍將軍馮懷議禮無廟者為壇以祭可立别室藏之至殷禘則祭於壇也輔國將軍譙王司馬無忌等議禘諸儒謂太王王季遷主藏於文武之祧如此府君遷主宜在宣帝廟中然今無寢室宜變通而改築又殷祫太廟征西東面尚書郎孫綽與無忌議同曰太祖雖位始九五而道以從暢替人爵之尊篤天倫之道所以成教本而光百代也尚書郎徐禪議禮去祧為壇去壇為墠嵗祫則祭之今四祖遷主可藏之石室有禱則祭於壇墠又遣禪至會稽訪處士虞喜喜答曰漢世韋元成等以毁主瘞於園魏朝議者云應埋兩階之間且神主本在太廟若今側室而祭則不如永藏又四君無追號之禮益眀應毁而無祭是時簡文為撫軍將軍與尚書郎劉邵等奏四祖同居西祧藏主石室禘祫乃祭如先朝舊儀時陳留范宣兄子問此禮宣答曰舜廟所以祭皆是庶人其後世逺而不毁不居舜廟上不序昭穆今四君號猶依本非以功德致祀也若依虞主之瘞則猶藏子孫之所若依夏主之埋則又非本廟之階宜思其變别築一室親未盡則禘祫處宣帝之上親盡則無緣下就子孫之列其後太常劉遐等同蔡謨議博士或疑陳於太祖者皆其後之毁主憑按古義無别前後之文也禹不先鯀則遷主居太祖之上亦何疑也於是京兆遷入西儲同謂之祧如前三祖遷主之禮故正室猶十一也穆帝崩哀帝海西並為兄弟無所登除簡文帝上繼元皇帝世秩登進於是潁川京兆二主復還昭穆之位至簡文崩潁川又遷按漢光武既即帝位以昭穆當為元帝後遂祀昭宣元於太廟躬執祭禮而别祀成哀以下於長安使有司行事此禮之變也然其時漢已為王莽所篡光武起自匹夫誅王莽夷羣盜以取天下雖曰中興事同創業又其祖長沙定王與武帝同出景帝則於元成服屬已為疏逺先儒胡致堂謂雖逺祖髙帝而不紹元帝自帝其舂陵侯以下四親而祠之於義亦未為大失者此也則成哀而下行既非尊屬又已逺姑不廢其祀可矣至於晉元帝以琅邪王而事惠懷愍簡文以會稽王而事成帝以下諸君君臣之義非一日矣一旦入繼大統即以漢世祖為比遽欲自尊而於其所嘗事之君於行為姪者即擯之而不親祀此何禮邪况又取已祧之逺祖復入廟還昭穆之位則所以嚴事宗廟者不幾有同兒戲乎孝武帝太元十二年始改作太廟殿正室十四間東西儲各一間合十六間棟髙八丈四尺備法駕遷神主於行廟征西至京兆四主及太孫各用其位之儀服四主不從帝者儀是與太康異也及孝武崩京兆又遷如穆帝之世四祧故事文獻通考卷九十二
