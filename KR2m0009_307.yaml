body:
  text: 文獻通考卷三百七鄱陽馬端臨貴與著物異考十三雷震成王時秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐秦始皇五年冬雷漢惠帝五年冬十月雷景帝六年十二月雷霖雨昭帝元鳯五年十一月大雷王莾始建國二年十二月雷後漢光武建武七年遼東冬雷草木實和帝元興元年冬十一月壬午郡國四冬雷時皇子數不遂皆隠之民間是歲宮車晏駕殤帝生百餘日立以為君帝兄平原王有疾不立卒皆夭無嗣殤帝延平元年九月乙亥陳留雷有石隕地四安帝永初六年十月丙戌郡國六冬雷京房占曰天冬雷地必震又曰教令擾又曰雷以十一月起黄鍾二月大聲八月闔藏此以春夏殺無辜不湏冬刑致災蟄蟲出行不救之則冬溫風以其來年疾病其救也恤㓜孤振不足議獄刑貰謫罰災則消矣古今注曰明帝永平七年十月丙子越嶲雷七年十月戊子郡國三冬雷元初元年十月癸巳郡國三冬雷三年十月辛亥汝南樂浪冬雷四年十月辛酉郡國五冬雷六年十月丙子郡國五冬雷永寧元年十月郡國七冬雷建光元年十月郡國七冬雷延光四年郡國十九冬雷是時太后攝政上無所與太后既崩阿母王聖及皇后兄閻顯兄弟更秉威權上遂不親萬㡬從容寛仁任臣下古今注曰順帝永和四年四月戊午雷震擊高廟世祖廟外槐樹桓帝建和三年六月乙卯雷震憲陵寢屋先是梁太后聽兄冀枉殺李固杜喬靈帝熹平六年冬十月東萊冬雷中平四年十二月晦雨水大雷電雹獻帝初平三年五月丙申無雲而雷四年五月癸酉無雲而雷魏明帝景初中洛陽城東橋城西洛水浮橋桓楹同日三處俱時震尋又震西城上候風木飛烏時勞役大起帝尋晏駕吳孫權赤烏八年夏震宮門柱又擊南津大橋桓楹孫亮建興元年十二月朔大風震電是月又雷雨義同前説亮終廢晉武帝太康六年十二月甲申朔淮南郡震電七年十二月己亥毘陵雷電南沙司鹽都尉戴亮以聞十年十二月癸卯廬江建安雷電大雨惠帝永康元年六月癸卯震崇陽陵標西南五百步標破為七十片是時賈后陷害鼎輔寵樹私戚與漢桓帝時震憲陵寢同事也后終誅滅永興二年十月丁丑雷震懷帝永嘉四年十月震電愍帝建興元年十一月戊辰會稽大雨震電己巳夜赤氣曜於西北是夕大雨震電庚午大雪按劉向説雷以二月出八月入今此月震電者陽不閉藏也既發泄而明日便大雪皆失節之異也是時劉淵僭號平陽李雄稱制於蜀九州幅裂西京孤微為君失時之象也赤氣赤祥也元帝太興元年十一月乙卯暴雨雷電永昌二年七月丙子朔雷震太極殿柱十二月會稽吳郡雷震電成帝咸和元年十月己巳會稽郡大雨震三年六月辛卯臨海大雷破郡府内小屋柱十枚殺人九月二日壬午立冬會稽雷電四年十一月吳郡會稽震電穆帝永和七年十月壬午雷雨震電升平元年十一月庚戌雷乙丑又雷五年十月庚午東南方雷孝武帝太元五年六月甲寅雷震含章殿四柱并殺内侍二人十年十二月雷聲在南方十四年七月甲寅雷震燒宣陽門西柱安帝隆安二年九月壬辰雷雨元興三年永安皇后至自巴陵將設儀導入宮天雷震人馬各一俱殪於計反焉義熙四年十一月辛卯朔西北方疾風發癸丑雷六月甲寅雷震太廟破東鴟尾徹柱又震太子西池合堂是時帝不親烝嘗故天震之明簡宗廟也西池是明帝為太子時所造次故號太子池及安帝多病患無嗣故天震之明無後也六年正月甲寅雷又雪十二月壬辰大雷九年十一月甲戌雷乙亥又雷陳宣帝大建元年七月大雨震萬安陵華表又震慧日寺刹瓦官寺重閣門下一女子震死京房易飛候曰雷雨霹靂邱陵者逆先人令為火殺人者人君用讒言殺正人時蔡景歴以奸邪任用又僕射陸繕以讒毁獲譴發病而死十年三月震武庫時帝好兵頻年北伐内外虚竭將士勞弊既克淮南又進圗彭汴毛喜切諫不納由是吳明徹諸軍皆没遂失淮南之地武庫者兵器之所聚也而震之天戒若曰宜戢兵以安百姓帝不悟又大興軍旅其年六月又震太皇寺刹莊嚴寺露槃重陽閣東樓鴻臚府門太皇莊嚴二寺陳國奉佛之所重陽閣每所遊晏鴻臚賓客禮儀之所在而同歲震者天戒若曰國威已䘮不務修德後必有恃佛道躭宴樂棄禮儀而亡國者陳之君臣竟不悟至後主之代災異屢起懼而於太皇寺捨身為奴以祈㝠助不恤國政耽酒色棄禮法不修鄰好以取敗亡北齊後主武平元年夏震丞相段孝先南門柱京房易傳曰震及貴臣門及屋者不出三年佞臣被誅後歲和士開被戮唐太宗貞觀十一年四月甲子震乾元殿前槐樹震耀天之威怒以象殺戮槐古者三公所樹也武后延載元年六月淮南偃師縣李材村有震電入民家地震裂闊丈餘長十五里深不可測所裂處井厠相通或衝冢墓柩出平地無損李國姓震電威刑之象地陰類也證聖元年正月丁酉雷雷者陽聲出非其時臣竊君柄之象長安四年五月丁亥震雷大風拔木人有震死者代宗永㤗元年二月甲子夜震霆自是無雷至六月甲申乃雷大歴十年四月甲申雷電暴風拔木飄瓦人有震死者京畿害稼者七縣德宗建中元年九月乙卯雷四年四月丙子東都畿汝節度使哥舒曜攻李希烈進軍至潁橋大雨震電人不能言者十三四馬驢多死貞元十四年五月己酉夏至始電憲宗元和十一年冬雷穆宗長慶二年六月乙丑大風震電落太廟鴟尾破御史臺樹文宗太和八年七月辛酉定陵臺大雨震廡下地裂二十有六步占曰士庻分離大臣專恣不救大敗武宗會昌三年五月甲午始雷懿宗咸通四年十二月震雷僖宗乾符二年十二月震雷雨雹昭宗乾寧四年李茂貞遣將符道昭攻成都至廣漢震雷有石隕於帳前宋太祖建隆三年四月癸巳宿州日無雨雷霆暴作軍校傅韜震死是夜半風雷起於京師開封縣署役夫劉延嗣萬進震死頃之進復蘇言有烟焰自牖入室因駭仆徧體焦灼乾德二年正月辛巳雷聲起京師西南東行有電五月戊戌大名府大雨雷震焚稾聚四年七月海州雷震長吏㕔土木多圯傷刺史梁彦超開寶七年六月易州雷震死耀武軍士八人八年八月卭州延貴鎮震死民費貴及其四子太宗太平興國二年七月瀛州景城縣霆震死牛商馮乂端拱二年八月興化軍民劉政震死有文在胷中曰大不孝九月丙午夜半雷聲起京師西北淳化三年七月泗州大風雨震僧伽㙮柱至道元年三月甲戌京師雷未發聲召司天監丞趙昭益問之云按占雷不發聲寛政之應也七月泗州大風雨雷震僧伽㙮及壞鐘樓真宗咸平元年正月戊寅京師西北有雷電十一月瀛州順安軍並東北有雷三年十月黄州西北雷聲如盛夏時十一月真定府東南雷四年十月乙巳京師西南雷電閏十二月大名府雷五年九月辛亥京師雷六年十一月甲午京師暴雷震司天言國家發號布德未及黎庻時議改元肆赦詔宰相增廣條目采民病悉除之景德三年九月丙寅夕京師大震電大中祥符元年正月癸未京師西北雷五年十二月己巳京師西北雷電九年五月殿侍張信奉南海祝版乘驛至唐州震死徽宗大觀三年十月戊子大雷電雨高宗紹興五年十月丁巳雷六年十月丙午雷九年十月丁卯雷十一年十一月己酉雷十五年十月辛卯雷十二月甲寅雷十六年溫州大雷電龍翔寺震死者六人十九年十月甲寅雷二十一年二月卒未南安軍大雷電大庾縣治震死者四人十一月辛未夜震雷十二月癸酉雷二十二年十二月戊寅己卯雷二十六年十二月甲子雷孝宗乾道二年十一月戊辰日南至大震雷癸酉䇿免相葉顒魏杞七年正月丙戌雷自是迄夏無雷淳熙十二年十一月戊午雷十二月丁丑雷十三年正月雷後三十五日有雪十四年十一月冬雷十六年七月大雷震太廟齋殿光宗紹熙二年正月雷雪三年正月庚戌朔雷四年十一月己卯日南至辛巳雷五年十月大雷震寧宗慶元元年春無雷開禧三年十月卒未雷嘉定三年十月雷五年七月雷雨震太廟鴟吻十月冬雷六年閏九月雷電十年正月朔雷十一年九月辛巳明堂禮成肆赦雷電十四年十六年俱冬雷物自鳴即五行志所謂鼓妖也無形有聲無雲而雷謂之鼓妖今所載凡不當鳴而鳴者皆入焉左傳僖公三十二年十二月己卯晉文公卒庚辰將殯於曲沃出絳柩有聲如牛劉向以為近鼓妖也喪凶事聲如牛怒象也將有急怒之謀以生兵革之禍時秦穆公遣兵襲鄭晉要之崤阸以敗其師晉不惟舊而聽虐謀結怨强國四被秦㓂禍流數世凶惡之效也考王十三年晉無雲而雷威烈王三年十一月晉有火下於北方其聲如鼓秦二世元年天無雲而雷劉向以為雷當託於雲猶君託於臣陰陽之合也二世不恤下下民怨叛是歲陳勝起趙高作亂秦遂亡一曰易震為雷為䫉不㳟也漢成帝元延元年四月丁酉無雲而有雷聲光耀耀四面下至地止哀帝建平二年四月乙亥朔御史大夫朱博為丞相少府趙元為御史大夫臨延登受策有大聲如鐘鳴師古曰延入而登殿也漢舊儀云丞相御史大夫初拜皇帝延登親詔也殿中郎吏陛者皆聞焉師古曰陛謂埶兵列於階側上以問黄門侍郎揚雄李尋尋對曰洪範所謂鼓妖也師法以為人君不聰為衆所惑空名得進則有聲無形不知所從生其傳曰歲月日之中則正卿受之今以四月日加辰巳有異是為中焉正卿謂埶政大臣也宜退丞相御史以應天變然雖不退不出期年其人自蒙其咎師古曰期年十二月也䝉猶被也期音基揚雄亦以為鼓妖聽失之象也朱博為人彊毅多權謀宜將不宜相恐有凶惡亟疾之怒師古曰亟急也音居力反八月博元坐為奸謀博自殺元減死論京房易傳曰令不修本下不安金毋故自動若有音元壽元年九月孝元廟殿門銅龜蛇鋪首鳴如淳曰門鋪首作龜蛇之形而鳴呼也門之鋪首所以銜環者也王莽天鳯三年十月戊辰王路朱鳥門鳴晝夜不絶崔發等曰虞帝闢四門達四聰門鳴者明當修先聖之禮招四方之士也於是令羣臣皆賀所舉四行從朱鳥門入而對䇿焉後漢獻帝建安七八年中長沙醴陵有大山常大鳴如牛呴聲積數年後豫章賊攻没醴陵縣殺掠吏民晉惠帝元康元年三月有聲若牛出許昌城十二月廢愍懷太子幽於許宮明年賈后遣黄門孫憲殺太子擊以藥杵聲聞於外是其應也蘇峻在歴陽外營將軍鼓自鳴如人弄鼓者峻手自破之曰我鄉土時有此則城空矣俄而作亂夷滅此聽不聰之罰也石季龍末洛陽城西北九里石牛在青石趺甫於反上忽鳴聲聞四十里季龍遣人打落兩耳及尾鐡釘釘上音丁下都定反四脚尋而季龍死孝武太元十五年三月己酉朔東北方有聲如雷按劉向説以為雷當託於雲猶君託於臣無雲而雷此君不恤於下下人將叛之象也及帝崩而天下漸亂孫恩桓元交陵京邑吳興長城夏架山有石鼓長丈餘面徑三尺所下有盤石為足鳴則聲如金鼓三呉有兵至安帝隆安中大鳴後有孫恩之亂齊武帝永明十一年七月上不豫徙御延昌殿始登階而殿屋鳴吒上惡之至八月崩梁武帝天監四年十一月天清朗西南有電光有雷聲二洪範五行傳曰雷霆託於雲猶君託於人也君不恤天下故人怨叛是歲交州刺史李凱反十九年九月西北隠隠有聲如雷赤氣下至地是歲盜殺東莞瑯琊二郡守以胊山引魏軍中大通六年十二月西南有聲如雷其年北梁州刺史蘭欽舉兵反陳宣帝太建二年十二月西北有聲如雷其年湘州刺史華皎舉兵反北齊文宣天保四年四月西南有聲如雷時帝不恤天下興師旅後周武帝建德六年正月西方有聲如雷未幾吐谷渾宼邊隋文帝開皇十四年正月旦廓州連雲山有聲如雷時五𦍑反叛侵邊二十年無雲而雷京房易飛候曰國將易君下人不静小人先命國凶有兵甲後數歲帝崩漢王諒舉兵反是年十一月京都大風地大震鼓皆應浄刹寺鐘三鳴佛殿門鎖自開銅像自出户外鐘鼓自鳴者近鼓妖也揚雄以為人君不聰為衆所惑空名得進則鼓妖見時獨孤后干政楊素權傾人主帝聽二人之讒黜高熲廢太子勇晉王釣虚名而見立煬帝大業中滏陽石鼓頻歲鳴其後天下大亂兵戎並起唐高祖武德二年三月太行山聖人崖有聲占曰有㓂至三年二月丁丑京師西南有聲如崩山近鼓妖説者以為人君不聰為衆所惑則有聲無形不知所從生武后天授元年九月檢校内史宗秦客拜日無雲而震近鼓妖也元宗開元二十八年六月吐蕃圍安戎城斷水路城東山鳴石坼湧泉二德宗貞元十三年六月丙寅天晦街鼓不鳴僖宗中和二年十月西北方無雲而雷昭宗天復三年十月甲午有大聲出於宣武節度使㕔事近鼓妖也後唐莊宗同光三年九月丁未夜徧天陰雲北方有聲如雷雉皆雊俗呼曰天狗墜宋高宗紹興七年五月汴京無雲而雷是歲偽齊亡三十年十月庚戌晝漏半無雲而雷癸亥日過中無雲而雷孝宗淳熙十四年六月甲申昧爽上將禱雨太一宮乘輿未駕有大聲發自内及於和寧門人馬辟易相踐藉有失巾屨者近鼓妖也光宗紹熙二年溫州瑞安縣感應侯廟鼓自鳴後日邑有巨㓂舁鼓去先是鼓上有書曰鼓響盜長鼓壞盜敗㓂果以旬日就僇與晉志隆安石鼓鳴孫恩同占物自動即五行志所謂木沴金也志中惟載金石自動今所載凡非動物而自動者皆入焉周威烈王二十三年九鼎震金震木動之也時周室衰微號令不從以亂金氣鼎者宗廟之寶器宗廟將遷故震動也是歲晉三卿韓魏趙分晉地王命以為諸侯其後秦遂滅周而取九鼎九鼎之震木沴金失衆心漢成帝元延元年正月長安章城門門牡自亡晉灼曰西出南頭第一門也牡是出籥者師古曰牡所以下閉者也亦以鐡為之非出籥也京房易傳曰饑而不損兹謂泰厥災水厥咎牡亡妖辭曰闗動牡飛辟為亡道臣為非厥咎亂臣謀簒易妖傳辭變故谷永對曰章城門通路寢之路凾谷闗距山東之險城門闗守國之固固將去焉故牡飛也平帝元始元年二月乙未義陵寢神衣在柙中哀帝陵也丙申旦衣在外牀上寢令以急變聞祠以太牢王莽地皇元年七月杜陵便殿乘輿虎文衣廢藏在室匣中者出自樹立堂上良久乃委地吏卒見者以聞莽惡之魏齊王正始末河南尹李勝治㕔事有小材激墮撾受符石彪頭斷之此木沴金也勝後旬日而敗晉惠帝元康八年五月郊禖壇石中破為二此木沴金也郊禖壇求子之神位無故自毁太子將亡之妖也明年愍懷廢死孝武帝太元十年四月謝安出鎮廣陵始發石頭金鼓無故自破木沴金之異也天戒若曰安徒揚經畧之聲終無其實鉦鼓不用之象也月餘以疾還而薨梁武帝大同十二年曲阿建陵隧口石騏驎動木沴金也動者遷移之象天戒若曰園陵無主石驎將為人所移也後竟國亡太清元年帝捨身光嚴重雲殿游仙化生皆震動三日乃止當時謂之祥瑞識者以為非動而動在洪範為妖以比石虎之敗殿壁畫人頸皆縮入頭之類又送辟邪二於建陵左雙角者至陵所右獨角者將引於車上振躍者三車兩轅俱折因換車未至陵二里所又躍者三每一振則車側人莫不聳奮去地三四尺車輪陷入土三寸木沴金也劉向曰失衆心令不行言不從以亂金氣也石為陰臣象也臣將為變之應武帝暮年君臣唯講經談元朝綱紊亂令不行言不從之咎也其後致侯景之亂元帝承聖二年正月己卯江夏宮南門籥牡飛北齊武成河清四年殿上石自起兩兩相擊眭孟以為石陰類下人象殿上石自起者左右親人離叛之應也及周師東伐寵臣尉相願乞扶貴和兄弟之徒皆叛入周周武帝建德元年濮陽郡有石像郡官令載向府將刮取金在道自躍投地如此者再乃以大繩縛著車壁又絶繩而下時帝既滅齊又事淮南征伐不息百姓疲敝失衆心之應也唐武后長壽中東都天宮寺泥像皆流汗霡霂中宗神龍中東都白馬寺鐡像頭無故自落於殿門外元宗天寶五載四月宰臣李適之常列鼎爼具膳羞中夜鼎躍相鬬不解鼎耳及足皆折穆宗長慶中新都大道觀泥人生鬚數寸拔之復生後晉出帝開運元年七月一日夜大雷雨明德門内井亭有石槽槽有龍首其夕漂行數步而龍首斷焉識者云石國姓也而龍首既斷大不吉之象晉祚果終開運宋太祖乾德五年十一月許州開元觀老君像自動時知州宋偓以聞六年正月簡州普通院毗盧佛像自動神宗元豐元年邕州佛像動揺初像嘗動而交人入㓂又動而州大火其後儂智高叛復動於是知州錢師孟投之江中高宗紹興二年宣州有鐡佛像坐高丈餘自動迭前迭却若傴而就人者數日既而郡有火火勝金火氣盛金失其性而為變怪也二十年二月溫州戒福寺有銅佛像頂珠自動光彩激射終日不少停數日火作寺焚與宣州鐡佛同占皆火沴金也孝宗淳熙九年春德興縣民家有鏡自飛舞與日光相射物自壞即五行志所謂金沴木也春秋文公十三年太室屋壞近金沴木木動也先是冬僖公薨十六月乃作主後六月又吉禘於太廟而致僖公左氏説曰登僖於閔上逆祀也又未三年而吉禘前後亂賢父聖祖之大禮太室屋壞象魯自是而陵夷將墮周公之祀也漢景帝三年十二月吳二城門自傾大船自覆劉向以為近金沴木木動也先是吳王濞以太子死於漢稱疾不朝陰與楚王戊謀為逆亂城猶國也其一門名曰楚門一門曰魚門呉地以船為家以魚為食天戒若曰與楚所謀傾國覆家吳王不寤正月與楚俱起兵身死國亡京房易傳曰上下咸誖厥妖城門壞師古曰誖惑也音布内反宣帝時大司馬霍禹所居第門自壞時禹内不順外不敬見戒不改卒受滅亡之誅哀帝時大司馬董賢第門自壞時賢以私愛居大位賞賜無度驕慢不敬大失臣道見戒不改後賢夫妻自殺家徙合浦後漢桓帝延熹五年太學門無故自壞襄楷以為大學前疑所居本傳楷書無前疑之言也其門自壞文德將喪教化廢也是後天下遂至喪亂桓帝永康元年十月壬戍南宮平城門内屋自壞金沴木木動也其十二月宮車晏駕靈帝光和元年南宮平城門内屋武庫屋及外東垣屋前後頓壞蔡邕對曰平城門正陽之門與宮連郊祀法駕所由從出門之最尊者也武庫禁兵所藏東垣庫之外障易傳曰小人在位上下咸悖厥妖城門内崩潛潭巴曰宮瓦自墮諸侯强陵主此皆小人之顯位亂法之咎也其後黄巾賊先起東方庫兵大動皇后同父兄何進為大將軍同母弟苖為車騎將軍兄弟並貴盛皆統兵在京都其後進欲誅廢中官為中常侍張讓段珪等所殺兵戰宮中闕下更相誅滅天下兵大起三年二月公府駐駕廡自壞南北三十餘間中平二年二月癸亥廣陽城門外上屋自壞獻帝初平二年三月長安宣平城門外屋無故自壞至三年夏司徒王允使中郎將呂布殺太師董卓夷三族袁山松曰李傕等攻破長安城害允等興平元年十月長安市門無故自壞至二年春李傕郭汜鬬長安中傕廹刼天子移置郿塢盡燒宮室殿宇城門官府民舍放兵宼抄公卿以下魏文帝黄初七年正月幸許昌城南門無故自崩帝心惡之遂不入還洛陽此金沴木木之動也五月宮車晏駕京房易傳曰上下咸悖厥妖城門壞晉武帝太康五年五月宣帝廟地陷梁折八年正月太廟殿又陷改作廟基及泉其年九月遂更營新廟遠致名材雜以銅柱至十年四月乃成十一月庚寅梁又折天戒若曰地陷者分離之象梁折木不曲直也明年帝崩王室遂亂惠帝太安二年成都王頴使陸機率衆向京師擊長沙王乂軍始引而牙竿折俄而戰敗機誅頴奔死元帝大興二年六月吳郡米廡無故自壞天戒若曰夫米廡貨糴之屋無故自壞此五糓踴貴所以無糴賣也是歲遂大饑死者千人焉明帝太寧元年周筵自歸王敦既立其宅宇所起五間六梁一時躍出墜地餘桁猶亘柱頭此金沴木也明年五月錢鳯謀亂遂族滅筵而湖熟尋亦為墟矣安帝元興元年五月丙子會稽王世子元顯將討桓元建牙竿於揚州南門其東者難立良久乃正近沴妖也而元顯尋為元所擒三年五月樂賢堂壞時帝嚚眊無樂賢之心故此堂見沴義熙九年五月國子聖堂壞天戒若曰聖堂禮樂之本無故壞業祚將墜之象未及十年而禪位焉陳文帝天嘉六年秋七月儀賢堂無故自壓近金沴木也時帝盛修宮室百姓失業故木失其性後主禎明元年六月宮内水殿若有刀鋸砍伐之聲其殿因無故而倒七月朱雀船又無故自沉時後主盛修園囿不虔宗廟水殿者遊宴之所朱雀船者國門之大路無故自壞天戒若曰宮室毁津路絶後竟為隋所滅宗廟為墟後齊孝昭帝將誅楊愔乘車向省入東門幰竿無故自折帝甚惡之歲餘而崩武成河清三年長廣郡㕔事梁忽剥若人狀太守惡而削去之明日復然長廣帝本封也木為變不祥之兆其年帝崩後主武平七年秋穆后將入晉陽向北宮辭胡太后至宮内門所乘七寶車無故陷入於地牛沒四足是歲齊滅后被虜於長安後周武帝建德六年青城門無故自崩青者東方色春宮之象也時皇太子無威儀禮節青城門無故自崩者皇太子不勝任之應帝不悟明年太子嗣立果為無道周室危亡實自此始隋煬帝大業中齊王暕於東都起第新構寢堂其栿無故而折時上無太子天下皆以暕次當立公卿屬望暕遂驕恣呼術者令相又為厭勝之事堂栿無故自折木失其性奸謀之應也天見變以戒之暕不悟後竟得罪於帝唐高祖武德元年八月戊戌突厥始畢可汗衙帳無故自壞中宗即位金雞竿折雞竿所以肆赦始登大號而雞竿折不祥神龍中有羣狐入御史大夫李承嘉第其堂無故壞又秉筆而管直裂易之又裂元宗開元五年正月癸卯太廟四室壞天寶十四載哥舒翰帥師守潼闗前軍啓行牙門旗至坊門觸落槍刄衆以為不祥代宗永泰二年三月辛酉中書敕庫壞德宗貞元四年正月庚戌朔德宗御含元殿受朝賀質明殿階及欄檻三十餘間自壞衞士死者十餘人含元路寢大朝會之所御也正月朔一歲之元王者之事天所以儆者重矣文宗太和九年鄭注為鳯翔節度使將之鎮出開遠門旗竿折僖宗光啓初揚州府署門屋自壞故隋之行臺門也制度甚宏麗云宋高宗紹興三年八月辛亥尚書省後樓屋無故自壞文獻通考卷三百七
