body:
  text: 文獻通考卷二百四十六鄱陽馬端臨貴與著經籍考七十三集歌詞花間集十卷陳氏曰蜀歐陽烱作序稱衞尉少卿字𢎞基者所集未詳何人其詞自溫飛卿而下十八人凡五百首此近世倚聲塡詞之祖也詩至晩唐五季氣格卑陋千人一律而長短句獨精巧高麗後世莫及此事之不可曉者放翁陸務觀之言云爾南唐二主詞一卷陳氏曰中主李璟後主李煜撰卷首四闋應天長望逺行各一浣溪紗二中主所作重光嘗書之墨迹在盱江鼂氏趙云先皇御製歌詞余嘗見之於麥光紙上作撥鐙書有鼂景迂題字今不知何在矣餘詞皆重光作陽春錄一卷陳氏曰南唐馮延巳撰高郵崔公度伯易題其後稱其家所藏最為詳確而尊前花間諸集往往謬其姓氏近傳歐陽永叔詞亦多有之皆失其眞也世言風乍起為延巳作或云成幼文也今此集無有當是幼文作長沙本以寘此集中殆非也家宴集五卷陳氏曰序稱子起失其姓名雍熙丙戌歲也所集皆唐末五代人樂府視花間不及也末有清和樂十八章為其可以侑觴故名家宴也珠玉集一卷陳氏曰晏元獻公殊撰其子幾道嘗言先公為詞未嘗作婦人語以今考之信然張子野詞一卷陳氏曰都官郎中吳興張先子野撰李常公擇為六客堂子野與焉所賦詞卒章云也應傍有老人星蓋以自謂是時年八十餘矣東坡倅杭數與唱酬聞其買妾為之賦詩首末皆用張姓事吳興志稱其晚年漁釣自適至今號張釣魚灣死葬弁山下在今多寶寺按歐陽集有張子野墓誌死於寶元中者乃博州人名姓字偶皆同非吳中之子野也古今詩話云客有謂張子野曰人皆謂公為張三中卽心中事眼中淚意中人也公曰何不目為張三影客不曉公曰雲破月來花弄影嬌柔嬾起簾櫳捲花影柳徑無人墜飛絮無影此余平生所得意也又高齊詩話云子野嘗有詩云浮萍斷處見山影又長短句雲破月來花弄影又云隔墻送過鞦韆影並膾炙人口世謂張三影苕溪漁隱云細味二說當以古今詩話所載三影為勝東坡曰子野詩筆老健歌詞乃其餘波耳湖州西溪詩云浮萍斷處見山影野艇歸時聞草聲與予和詩云愁似鰥魚知夜永懶同蝴蝶為春忙若此之類亦可追配古人而世俗但稱其歌詞昔周昉畫人物皆入神品而世但知有周昉士女蓋所謂未見好德如好色者也杜壽域詞一卷陳氏曰京兆杜安世壽域撰未詳其人詞亦不工六一詞一卷陳氏曰歐陽文忠公修撰其間多有與花間陽春相混者亦有鄙䙝之語一二厠其中當是仇人無名子所為也樂章集九卷陳氏曰栁三變耆卿撰景祐元年進士官至屯田員外郎世號栁屯田初磨勘及格昭陵以其浮薄罷之後乃更名永其詞格固不高而音律諧婉語意妥帖承平氣象形容曲盡尤工於羈旅行役若其人則不足道也藝苑雌黃栁之樂章人多稱之然大槩非羈旅窮愁之詞則閨門淫媟之語若以歐陽永叔蘇子瞻黃魯直張子野秦少游輩較之萬萬相遼彼其所以傳名者直以言多近俗俗子易曉故也東坡詞二卷陳氏曰蘇文忠公軾撰集中戚氏敘穆天子西王母事世不知所謂李端叔䟦詳之蓋在山中燕席間有歌此闋者坐客言調美而詞不典以請於公公方觀山海經即敘其事為題使妓再歌之隨其聲塡冩歌竟篇就纔㸃定五六字而已李端叔時在幕府目擊必不誣或言非坡作豈不見此䟦邪山谷黃氏曰東坡居士曲世所見者幾百首或謂於音律小不諧居士詞橫放傑出自是曲子内縛不住者後山詩話東坡以詩為詞如敎坊雷大使之舞雖極天下之工要非本色山谷詞一卷陳氏曰黃太史庭堅撰鼂無咎言魯直間作小詞固高妙然不是當家語自是著腔子唱好詩淮海集一卷陳氏曰秦觀撰鼂無咎言少游詞如斜陽外寒鴉數㸃流水遶孤村雖不識字人亦知是天生好言語鼂無咎詞一卷陳氏曰鼂補之撰鼂嘗云今代詞手惟秦七黃九他人不能及也然二公之詞亦自有不同者若鼂無咎佳者固未多遜也後山詞一卷陳氏曰陳師道撰閑適集一卷陳氏曰鼂端禮次膺撰熙寧六年進士兩為縣令忤上官坐保甲事中以危法廢徙晩乃以承事郎為大晟府協律三閱月而卒其從姪說之志其墓鼂叔用詞一卷陳氏曰鼂冲之撰壓卷漢宮春梅詞行於世或云李漢老作非也小山集一卷陳氏曰晏幾道叔原撰其詞在諸名勝中獨可追逼花間高處或過之其人雖縱弛不羈而不茍求進尚氣磊落未可貶也山谷黄氏小山集序曰晏叔原臨淄公之莫子也磊瑰權奇疎於顧忌文章翰墨自立規模常欲軒輊人而不受世之輕重諸公雖愛之而又以小謹望之遂陸沉於下位平生潛心六藝玩思百家持論甚高未嘗以治世余嘗怪而問焉曰我槃姍㪍窣猶獲罪於諸公憤而吐之是唾人面也乃獨嬉弄於樂府之餘而寓以詩人句法精壯頓挫能動搖人心士大夫傳之以為有臨淄之風爾罕能味其言也余嘗論叔原固人英也其癡亦自絶人愛叔原者慍而問其目曰仕宦連蹇而不能一傍貴人之門是一癡也論文自有體不肯一作新進士語此又一癡也費資千百萬家人饑寒而面有孺子之色此又一癡也人百負之而不恨已信人終不疑其欺已此又一癡也乃共以為然雖若此至其樂府可謂俠邪之大雅豪士之鼓吹其合者高唐洛神之流其下者豈減桃葉團扇哉余少時間作樂府以使酒玩世道人法秀獨罪余以筆墨勸淫於我法中當犁舌之獄特未見叔原之作邪雖然彼富貴得意室有倩盼慧女而主人好文必當市購千金家求善本曰獨不得與叔原同時邪若乃妙年美士近知酒色之娛苦節臞儒晩悟裙裾之樂鼓之舞之使宴安酖毒而不悔是則叔原之罪也哉靖眞集二卷後集一卷陳氏曰周邦彦美成撰多用唐人詩語櫽括入律混然天成長調尤善鋪敘富艶精工詞人之甲乙也東山寓聲樂府三卷陳氏曰賀鑄方囘撰以舊譜塡新詞而别為名以易之故曰寓聲宛邱張氏序略曰余友賀方囘博學業文而樂府之詞妙絶一世携一編示予大抵倚聲而為之詞皆可歌也其盛麗如游金張之堂而妖冶如攬嬙施之袪幽索如屈宋悲壯如蘇李覽者自知之東堂詞一卷陳氏曰毛滂澤民撰本以斷魂分付潮囘去見賞東坡得名而他詞雖工未有能及此者百家詩序云元祐中東坡守杭澤民為法曹掾公以衆人遇之秩滿辭去是夕宴客有籍妓歌贈别小詞卒章云今夜山深處斷魂分付潮囘去坡問誰所作妓以毛法曹對公語坐客曰郡僚有詞人不及知某之罪也翼日折簡追還留連數月澤民由此知名溪堂詞一卷陳氏曰謝逸無逸撰竹友詞一卷陳氏曰謝薖幼槃撰冠栁集一卷陳氏曰王冠通叟撰號王逐客世傳霜瓦鴛鴦其作也詞格不高以冠栁自名則可見矣姑溪集一卷陳氏曰李之儀端叔撰聊復集一卷陳氏曰安定郡王趙令畤德麟撰後湖詞一卷陳氏曰蘇庠養直撰大聲集五卷陳氏曰万俟雅言撰嘗遊上庠不第後為大晟府製撰周美成田不伐皆為作序石林詞一卷陳氏曰葉夢得少藴撰蘆川詞一卷陳氏曰三山張元幹仲宗撰坐送胡邦衡詞得罪秦相者也赤城詞一卷陳氏曰陳克子高撰詞格頗高麗晏周之流亞也簡齋詞一卷陳氏曰陳與義撰劉行簡詞一卷陳氏曰劉一止撰嘗為曉行詞盛傳於京師號劉曉行順庵樂府五卷陳氏曰康與之伯可撰與之父倬惟章詭誕不檢事見揮麈錄與之又甚焉嘗挾吳下妓趙芷以遁與蘇師德仁仲有隙遂興蘇玭訓直之獄玭仁仲之子而常同子正之壻也與之受知於子正一朝背之士論不齒周南仲嘗為作傳道其實如此所傳康伯可詞鄙䙝之甚此集頗多佳語陶定安世為之序王性之蘇養直皆稱之而其人不自愛如此不足道也樵歌一卷陳氏曰朱敦儒希眞撰初寮詞一卷陳氏曰王安中撰丹陽詞一卷陳氏曰葛勝仲撰酒邊集一卷陳氏曰户部侍郎向子諲伯恭撰自號薌林致堂胡氏序曰詩出於離騷楚詞而離騷者變風變雅之意廹而哀傷者也其發乎情則同而止乎禮義則異名之曰曲以其曲盡人情耳方之曲藝猶不逮焉其去曲禮則益遠矣然文章豪放之士鮮不寄意於此者隨亦自掃其跡曰謔浪遊戲而已唐人為之最工者栁耆卿後出掩衆製而盡其妙好者以為不可復加及眉山蘇氏一洗綺羅香澤之態擺脫綢繆宛轉之度使人登高望遠舉首高歌而逸懐浩氣超乎塵垢之外於是花間為皂𨽻而栁氏為輿臺矣薌林居士歩趨蘇堂而嚌其胾者也觀其退江北所作於後而進江南所作於前以枯木之心幻出葩華酌元酒之樽棄置醇味非染而不色安能及此潄玉集一卷陳氏曰易安居士李氏清照撰元祐名士李格非文叔之女嫁東武趙明誠德甫晩歲頗失節别本分五卷得全詞一卷陳氏曰趙忠簡鼎元鎭撰焦尾集一卷陳氏曰韓元吉撰放翁詞一卷陳氏曰陸游撰石湖詞一卷陳氏曰范成大撰友古詞一卷陳氏曰左中大夫莆田蔡伸伸道撰自號友古居士君謨之孫相山詞一卷陳氏曰王之道彦猷撰浩歌集一卷陳氏曰蔡柟堅老撰于湖詞一卷陳氏曰張孝祥安國撰稼軒詞四卷陳氏曰寶謨閣待制辛棄疾幼安撰信州本十二卷視長沙為多可軒曲林一卷陳氏曰盱江黃人傑叔萬撰王武子詞一卷陳氏曰未詳其名字樂齋詞一卷陳氏曰向滈豐之撰鳯城詞一卷陳氏曰三山黃定泰之撰乾道壬辰榜首竹坡詞一卷陳氏曰周紫芝撰介庵詞一卷陳氏曰趙彦端撰竹齋詞一卷陳氏曰吳興沈瀛子壽撰書丹詞一卷陳氏曰眉山程垓正伯撰王稱季平為作序燕喜集一卷陳氏曰曹冠宗臣撰退圃詞一卷陳氏曰鎭洮馬寧祖奉先撰省齋詩餘一卷陳氏曰衡陽廖行之天民撰克齋詞一卷陳氏曰苕溪沈端節約之撰敬齋詞一卷陳氏曰臨川吳鎰仲權撰逃禪集一卷陳氏曰清江楊無咎補之撰世所𫝊江西墨梅即其人也袁去華詞一卷陳氏曰豫章袁去華宣卿撰樵隱詞一卷陳氏曰毛幵平仲撰盧溪詞一卷陳氏曰王庭珪民瞻撰知稼翁集一卷陳氏曰考功郎官莆田黃公度師憲撰紹興戊午大魁坐與趙忠簡徃來得罪秦檜流落嶺表更化召對為郎未幾死年纔四十八呂聖求詞一卷陳氏曰檇李呂渭老聖求撰宣和末人嘗為朝士退齋詞一卷陳氏曰長沙侯延慶季長撰壓卷為天寧節萬年歡又有庚寅京師作水調則大觀元年金谷遺音一卷陳氏曰石孝友次仲撰歸愚詞一卷陳氏曰葛立方常之撰信齋詞一卷陳氏曰葛郯謙問撰澗壑詞一卷陳氏曰䨇井黃談子黙撰嬾窟詞一卷陳氏曰東武侯寘彦周撰其曰母舅鼂留守者謙之也紹興中以直學士知建康王周士詞一卷陳氏曰長沙王以寧周士撰哄堂集一卷陳氏曰盧炳叔易撰定齋詩餘一卷陳氏曰三山林淳太冲撰漫堂集一卷陳氏曰豐城鄧元南秀撰養拙堂詞集一卷陳氏曰董鑑明仲撰坦庵長短句一卷陳氏曰趙師俠介之撰晦庵詞一卷陳氏曰李處全粹伯撰淳熙中侍御史近情集一卷陳氏曰鄱陽王大受仲可撰野逸堂詞一卷陳氏曰歴陽張孝忠正臣撰松坡詞一卷陳氏曰京鏜仲遠撰黙軒詞一卷陳氏曰豫章劉徳秀仲洪撰慶元中為僉樞岫雲詞一卷陳氏曰長沙鍾將之仲山撰嘗為編修官西樵語業一卷陳氏曰廬陵楊炎止濟翁撰雲溪樂府四卷陳氏曰魏子敬撰未詳何處人西園鼓吹二卷陳氏曰徐得之思叔撰李東老詞一卷陳氏曰李叔獻東老撰東浦詞一卷陳氏曰韓玉温甫撰李氏花蕚集五卷陳氏曰廬陵李氏兄弟五人洪子大漳子清泳子永洤子召淛子秀皆有官閥好庵遊戲一卷陳氏曰莆田方信孺孚若撰開禧中使入北廷後至廣西漕鶴林詞一卷陳氏曰簡池劉光祖徳修撰紹熙名臣為御史起居郎晩以雜學士終蜀之耆徳有文集未見笑笑詞集一卷陳氏曰臨江郭應祥承禧撰嘉定間人自南唐二主詞而下皆長沙書坊所刻號百家詞其前數十家皆名公之作其末亦多有濫吹者市人射利欲富其部帙不暇擇也蕭閑集六卷陳氏曰蔡伯堅撰靖之子陷敵者吳彦高詞一卷陳氏曰吳激彦高撰米元章之壻亦陷北二人皆貴顯白石詞五卷陳氏曰姜䕫堯章撰西溪樂府一卷陳氏曰姚寛令威撰洮湖詞一卷陳氏曰金壇陳從古睎顔撰審齋詞一卷陳氏曰東平王千秋錫老撰海野詞一卷陳氏曰曾覿撰孝宗潛邸人怙寵依勢世號曾龍者也龍名大淵蓮社祠一卷陳氏曰張掄才甫撰梅溪詞一卷陳氏曰汴人史達祖邦卿撰張約齋鎡為作序不詳何人竹屋詞一卷陳氏曰高觀國賓王撰亦不詳何人高郵陳造併與史二家序之劉改之詞一卷陳氏曰襄陽劉過改之撰冷然齋詩餘一卷陳氏曰蘇洞召叟撰蒲江集一卷陳氏曰永嘉盧祖臯申之撰欵乃集八卷陳氏曰昭武嚴次山撰欵音曖乃如字余嘗辨之甚詳花翁詞一卷陳氏曰孫惟信季蕃撰蕭閑詞一卷陳氏曰疁子耕撰註坡詞二卷陳氏曰僊溪𫝊榦撰註琴趣外篇三卷陳氏曰江陰曹鴻註葉石林詞註清眞詞二卷陳氏曰曹杓季中註自稱一壺居士復雅歌詞五十卷陳氏曰題鮦陽居士序不著姓名末卷言宮詞音律頗詳然多有調而無曲樂府雅詞十二卷拾遺二卷陳氏曰曾慥編曾氏自序畧曰予所藏名公長短句裒合成編或後或先非有銓次多是一家難分優劣渉諧謔則去之名曰樂府雅詞調笑集句歐公一代儒宗風流自命詞章窈𦕈世所矜式當時小人或作豔曲繆為公詞今刪除凡三十有四家雖女流亦不廢此外有百餘闋平日膾炙人口或不知姓名則類於卷末以俟詢訪標曰拾遺云草堂詩餘二卷類分樂章二十卷羣公詩餘後編二十二卷五十大曲十六卷萬曲類編十卷陳氏曰皆書坊編集者陽春白雪五卷陳氏曰趙粹夫編取草堂詩餘所遺以及近人之作文獻通考卷二百四十六
