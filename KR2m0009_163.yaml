body:
  text: 文獻通考卷一百六十三鄱陽馬端臨貴與著刑考二刑制漢髙祖初入咸陽與父老約法三章曰殺人者死傷人及盜抵罪傷人有曲直盜賊有多少故言抵抵至也當也餘悉除秦苛法兆民大悦然大辟尚有三族之誅先黥劓斬左右趾笞殺梟其首葅其骨肉扵市葅為醢也其誹謗詈詛又先㫁舌故謂之具五刑彭越韓信之屬皆受此戮其後又制曰有耐罪以上請之應劭曰此輕罪不髠其耏鬢曰耐杜林以為法度之宇當從寸故改耏為耐言耐罪以上皆當先請也顔師古曰耐頬傍毛也音而後以三章之法不足以禦姦遂令蕭何攟摭秦法謂收拾也取其宜扵時者作律九章漢承秦制蕭何定律除參夷連坐之罪增部主見知之條益事律擅興廐戸三篇合為九篇叔孫通益律所不及傍章十八篇又制獄疑者各讞所屬官長皆移廷尉廷尉不䏻決具為奏附所當比律令以聞孝恵即位制爵五大夫吏六百石以上及宦皇帝而知名者有罪當盜械者皆頌繫宦皇帝而知名謂雖非五大夫爵六百石而早事恵帝特為所知故亦優之盜者逃也恐其逃亡故著械也頌者容也言見寛容但處曹吏舍不入狴牢也上造以上及内外公孫耳孫有罪當刑及當為城旦舂者皆耐為鬼薪白粲上造爵滿十六者也内外公孫謂王侯内外孫也耳孫元孫之子也今以上造有功勞内外孫有骨肉屬施徳布恵故事從其輕也城旦者旦起治城舂者婦人不預外徭但舂作米皆四歳刑也今皆就鬼薪白粲取薪給宗廟為鬼薪坐擇米使正白為白粲皆三歳刑也民年七十以上若不滿十歳有罪當刑者皆完之不加肉刑髠􅚎也先公曰古者刑不上大夫漢之待公卿大夫與士庶無等級皆習秦氣象蕭曹秦吏習見不知改而何亦身自當之恵帝雖差立條式然特以為恩恵不著法令文帝時絳侯下獄賈生極言以諫然終不能變也髙后元年詔曰前日孝恵皇帝言欲除三族罪妖言令議未決而崩今除之孝文元年盡除收孥相坐律令詔丞相太尉御史法者治之正所以禁暴而衛善人也今犯法者已論而使無罪之父母妻子同産坐之及收朕甚勿取其議左右丞相周勃陳平奏言父母妻子同産相坐及收所以累其心使重犯法收之之道所由来乆矣臣之愚計以為如故便帝曰法正則民慤罪當則民從牧民而道之以善者吏也既不能道又以不正之法罪之是法反害扵民為暴者也朕未見其便宜熟計之平勃乃曰陛下幸加大恵扵天下使有罪不收無罪不相坐甚盛徳臣等所不及也臣等謹奉詔除收律相坐法其後新垣平謀為􅊇復行三族之誅容齋洪氏随筆曰漢族誅之法毎輕用之袁盎䧟鼂錯但云方今計獨有斬錯耳而景帝使丞相以下劾奏遂至父母妻子同産無少長皆棄市主父偃䧟齊王扵死武帝欲勿誅公孫丞相争之遂族偃郭觧客殺人吏奏觧無罪公孫大夫議欲族觧且偃觧二人本不死因議者之言殺之足矣何遽至族乎用刑之濫如此孝文所行獨新垣平一事為盛徳之玷然此事所闗甚重盖其寵新垣平也惑扵求仙希福之説而淫謟之祀訖漢世而未䏻正者以此其誅新垣平也復行收孥相坐之律而濫酷之刑訖漢世而未能除者亦以此帝恭儉仁賢之主而此二事失禮失刑遂令後嗣遵而守之以為漢家制度不敢革正惜哉二年詔曰古之治天下者朝有進善之旌誹謗之木所以通治道而来諫者也今法有誹謗妖言之罪師古曰髙后元年詔除妖言令今又有之則是中間曾重設此條也是使衆臣不敢盡情而上無由聞過失也将何以来逺方之賢良其除之民或祝詛上以相約而後相謾師古曰謾欺也初為要約共行祝詛後相欺誑中道而止無實事也謾音慢吏以為大􅊇劉曰祝詛上以相約漢俗如此猶後漢傳云不直者不敢祝少實也故謂大􅊇其有他言吏又以為誹謗此細民之愚無知抵死朕甚不取自今以来有犯此者勿聼治致堂胡氏曰妖言令之始設也必謂其揺民惑衆有姦宄賊亂之意者及其失也則暴君權臣假此名以警懼中外塞言路也故賈論秦曰忠諫者謂之誹謗深計者謂之妖言夫忠臣為上盡忠深計必剴切君身探未然之事陳危亡之戒不止扵近在目前者自小人觀之曰是特揚君過以賣直未然之事危亡之形汝安得知之殆誹謗妖言耳此䇿既行使中外之人鉗口結舌人君不聞其過淪扵危亡而不悟然則其所謂謗者乃天下之忠而其自為者乃天下之妖也夫既以忠諫深計為誹謗妖言則指鹿為馬指野鳥為鸞指菌為芝指氛祲為慶雲指雹曰不為災也指彗曰所以除舊而布新也蝗生則曰不食嘉榖也日食則曰陰雲蔽之也地震則曰官府無傷也霖雨則曰秋稼自茂也水湧泛溢則曰民無流死者也歳饑則曰路未甞有餓者也凡賢否是非治亂得失一切反理詭道倒言而􅊇説之欺惑世主使淪扵危亡其罪豈特誹謗之比其為妖也不亦大乎嗚呼文帝除此令其享國長世宜哉按古者庶人謗商旅議夫子曰天下有道則庶人不議則誹謗古所有也周公曰小人怨汝詈汝又曰否則厥口詛祝晏子曰人民苦病夫婦皆詛雖其善祝豈䏻勝億萬人之詛則祝詛亦古所有也然未甞以此罪人至秦之立法則犯此二者皆坐以大􅊇而誅夷之漢髙帝入闗約法三章除秦苛嬈而首及誹謗偶語之酷則當亟除之矣而卒不曾除至髙后元年有詔除其法矣而又不克除文帝之時復有此詔然自景武而後則一用秦法凡張湯趙禹江充息夫躬之徒所為誣害忠鯁傾䧟骨肉坐以深文中以危法者不曰誹謗不道則曰詛祝上有惡言盖此二法者終漢之世未甞除也四年絳侯周勃有罪逮詣廷尉詔獄時人吿勃反勃下吏恐不知置辭吏稍侵辱之勃以千金與獄吏吏書牘背示曰以公主為證公主孝文女勃子勝之尚之故獄吏教引為證薄太后為言帝乃使持節赦勃復爵邑勃既出曰吾甞将百萬軍安知獄吏之貴也賈誼上䟽曰古者㢘恥節禮以治君子故有賜死而無戮辱是以黥劓之罪不及大夫今自王侯三公之貴皆天子所改容而禮之也而令與衆庶同黥劓髠刖笞傌棄市之法被僇辱者不太廹乎夫甞已在貴寵之位今而有過廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之輸之司寇編之徒官司寇小吏詈罵而篣笞之殆非所以令衆庶見也是時丞相周勃免就國人有吿勃謀反逮繫長安獄治卒無事故誼以此譏上上深納其言養臣下有節是後大臣有罪皆自殺不受刑至武帝時稍復入獄自寗成始十三年詔除肉刑太倉令淳于公有罪當刑詔獄逮繫長安師古曰逮及也辭之所及則追捕之故謂之逮一曰逮者在道将送防禦不絶若今之傳送囚也淳于公無男有五女當行㑹逮罵其女曰生子不生男緩急非有益其少女緹縈自傷悲泣師古曰緹縈女名也緹音他弟反廼随其父至長安上書曰妾父為吏齊中皆稱其㢘平今坐法當刑妾傷夫死者不可復生刑者不可復屬師古曰屬聨也音之欲反雖後欲改過自新其道亡繇也妾願沒入為官婢以贖父刑罪使得自新書奏天子天子憐悲其意遂下令曰制詔御史盖聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三孟康曰黥劓二刖左右趾合一凡三也而姦不止其咎安在非乃朕徳之薄而教不眀與吾甚自愧故夫訓道不純而愚民䧟焉詩曰愷弟君子民之父母言君子有和樂簡易之徳則其下尊之如父親之如母也今人有過教未施而刑已加焉或欲改行為善而道亡繇至朕甚憐之夫刑至㫁支體刻肌膚終身不息師古曰息生也何其刑之痛而不徳也豈為民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免孟康曰其不亡逃者滿其年數得免為庶人具為令師古曰使更為條制丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由来者乆矣陛下下眀詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至甚盛徳臣等所不及也臣謹議請定律曰諸當完者完為城旦舂臣瓉曰文帝除肉刑皆有以易之故以完易髠以笞代劓以􅎂左右趾代則今既曰完矣不復云以完代完也此當言髠者完也當黥者髠鉗為城旦舂當劓者笞三百當斬左趾者笞五百當斬右趾及殺人先自吿及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪皆棄市李竒曰命逃亡也復扵論命中有罪也晉灼曰命者名也成其罪也師古曰趾足也當斬右足者以其罪次重故従棄市也殺人先自吿謂殺人而自首得免罪者也吏受贓枉法謂曲公法而受賂者也守縣官財物而即盜之即今律所謂主守自盜者也殺人害重受贓盜物贓汙之身故此三罪已被論名而又犯笞亦皆棄市也今流俗書本笞三百笞五百之上及劓者之下有籍笞字復有笞罪亦云復有籍笞罪皆後人妄加耳舊本無也罪人獄已決完為城旦舂滿三歳為鬼薪白粲鬼薪白粲一歳為𨽻臣妾𨽻臣妾一歳免為庶人師古曰男子為𨽻臣女子為𨽻妾鬼薪白粲滿三歳為𨽻臣𨽻臣一歳免為庶人𨽻妾亦然也𨽻臣妾滿二歳為司寇司寇一歳及作如司寇二歳皆免為庶人如淳曰罪降為司寇故一歳正司寇故二歳也其亡逃及有耐罪以上不用此令師古曰扵本罪中又重犯者也前令之刑城旦舂歳而非禁錮者完為城旦舂歳數以免李竒曰謂文帝作此令之前有刑者臣昧死請制曰可按古者五刑皆肉刑也孝文詔謂今有肉刑三而姦不止註謂黥劓斬趾三者遂以髠鉗代黥笞三百代劓笞五百代斬趾獨不及宫刑至景帝元年詔言孝文皇帝除宫刑出美人重絶人之世也則知文帝并宫刑除之至景帝中元年赦徒作陽陵者死罪欲腐者許之而武帝時李延年司馬遷張安世兄賀皆坐腐刑則是因景帝中元年之後宫刑復用而以施之死罪之情輕者不常用也孝文時禁網䟽濶選張釋之為廷尉罪疑者予民是以刑罰大省至扵㫁獄四百有刑措之風焉孝景元年下詔曰加笞與重罪無異重罪謂死刑幸而不死不可為人謂不能自起居也其定律笞五百者曰三百笞三百者曰二百孝文既除肉刑外有輕刑之名内實殺人斬右趾者又當死斬左趾者笞五百當劓者笞二百率多死師古曰斬右趾棄市故人多死以笞五百代斬左趾笞三百代劓笞數既多亦不活也故下是詔七月詔曰吏受所監臨以飲食免重受財物賤買貴賣論輕師古曰帝以為當時律條吏受所監臨賂遺飲食即坐免官爵扵法為重而受所監臨財物及賤買貴賣者論決太輕故令更議改之廷尉與丞相更議著令廷尉信謹與丞相議曰時丞相申屠嘉吏及諸有秩受其官屬所監所治所行所将師古曰行謂按察也音下更反其與飲食計償費勿論師古曰計其所費而償其直勿論罪也他物若買故賤賣故貴皆坐贓為盜沒入贓縣官他物謂非飲食吏遷徙罷免受其故官屬所将監治財物奪爵為士伍免之李竒曰有爵者奪之使為士伍有位者免官也師古曰此説非也謂奪其爵令為士伍又免其官職即今律所謂除名士伍從士卒之伍也無爵罰金二斤令沒入所受有能捕吿畀其所受贓中二年改磔曰棄市應劭曰先此諸死刑皆磔扵市改曰棄市自非妖􅊇不復磔也勿復磔四年詔曰長老人所尊敬也鰥寡人所哀矜也其著令年八十以上八歳以下孕者未乳乳産師侏儒樂師瞽者侏儒短人不䏻走當鞫繫者頌繫之頌讀曰容容寛不桎梏死罪欲腐者許之腐宫刑也丈夫割勢不能復生子如腐木不生實中六年下詔曰加笞者或至死而笞未畢朕甚憐之其減笞三百曰二百笞二百曰一百又曰笞者所以教之也其定箠令箠䇿也所以擊也丞相劉舎御史大夫衛綰請笞者箠長五尺其本大寸其竹也末薄半寸皆平其節當笞者笞臀如淳曰然則先時笞背也毋得更人謂行笞者不更易人也畢一罪乃更人自是笞者得全然酷吏猶以為威死刑既重而生刑又輕民易犯之孝武即位外事四夷之功内盛耳目之好徴發煩數百姓貧耗窮民犯法酷吏擊㫁姦宄不勝扵是招進張湯趙禹之屬條定法令作見知故縦監臨部主之法師古曰見知人犯法不舉吿為故縦而所監臨部主有罪并連坐也緩深故之罪孟康曰孝武欲急刑吏深害及故入人罪者皆寛緩急縦出之誅師古曰吏釋罪人疑以為縦出則急誅之亦言尚酷其後姦猾巧法轉相比况禁網寖宻師古曰寖漸也其下亦同律令凡三百五十九章大辟四百九條千八百八十二事死罪決事比萬三千四百七十二事師古曰比以例相比况也文書盈扵几閣典者不能徧覩是以郡國承用者駮師古曰不曉其指用意不同也或罪同而論異姦吏因緣為市師古曰㺯法而受財若市買之交易所欲活則傅生議所欲䧟則予死比師古曰傅讀曰附議者咸寃傷之自公孫宏以春秋之義䋲下張湯以峻文決理扵是見知之法生而廢格沮誹窮治之獄用湯奏顔異九卿見令不便不入言而腹非論死是後有腹誹之法又作沈命法沈匿也敢蔽匿盜賊者沒其命也曰羣盜起不發覺發覺而弗捕滿品二千石以下至小吏主者皆死天下歳㫁獄以千萬數張湯為廷尉所治即上意所欲罪予監史深刻者上意所欲釋予監史輕平者所治即豪必舞文巧詆即下戸羸弱時口言雖文致法上裁察扵是徃徃釋湯所言下戸羸弱湯欲佐助雖具文奏之又口奏言雖律令之文合致此罪聼上裁察盖為此人希恩宥上徃徃釋其人盖未奏之前口預言之杜周為廷尉大抵倣湯善伺上意所惡者因而䧟之所欲䧟者乆繫待問微見寃状客謂周曰君為天下決平不循三尺法専以人主意指為獄獄者固如是乎周曰三尺安在哉前主所是著為律後主所是䟽為令當時為是何古之法乎義縱以鷹擊毛摯為治言如鷹隼之擊奮毛羽執取飛鳥也為定襄太守縱至掩定襄獄中重罪三百餘人及賓客昆弟私入相視者亦二百餘人縦一切捕鞫曰為死罪觧脱一切皆捕之也以為觧脱死罪盡殺之是日皆報殺四百餘人奏請得報而論殺郡中不寒而慄竟坐事誅嚴延年為河南太守其治務在摧折豪強扶助貧弱貧弱雖䧟法曲文以出之其豪傑侵小民者以文内之飾文而入之為罪衆人所謂當死者一朝出之所謂當生者詭殺之詭違正理而殺之吏民莫䏻測其意深淺戰慄不敢犯禁按其獄皆文致不可得反致至宻也言其文案整宻也反音幡吏忠盡節者厚遇之如骨肉皆親嚮之出身不顧以是治下無隐情然疾惡太甚中傷者多尤巧為獄文善史書所欲誅殺奏成扵手中主簿親近史不得聞知奏可論死奄忽如神冬月傳屬縣囚㑹論府上總集郡府而論殺流血數里河南號曰屠伯竟以政治不道棄市容齋洪氏随筆曰漢武帝建元六年遼東髙廟長陵髙園殿災董仲舒居家推説其意草稿未上主父偃竊其書奏之上召視諸儒仲舒弟子吕歩舒不知其師書以為大愚扵是下仲舒吏當死詔赦之仲舒遂不敢復言災異此本傳所書而五行志載其對曰漢當亡秦大敝之後承其下流又多兄弟親戚骨肉之連驕揚奢侈恣睢者衆故天災若語陛下非以太平至公不能治也視親戚貴屬在諸侯逺正最甚者忍而誅之如吾燔髙園殿廼可云爾在外而不正者雖貴如髙廟猶災燔之况諸侯乎在内不正者雖貴如髙園殿猶燔災之况大臣乎此天意也其後淮南衡山王謀反上思仲舒前言使吕歩舒持斧鉞治淮南獄以春秋誼顓㫁扵外不請既還奏事上皆是之凡與王謀反列侯二千石豪傑皆以罪重受誅二獄死者數萬人嗚呼以武帝之嗜殺時臨御方數歳可與為善廟殿之災豈無他説而仲舒首勸其殺骨肉大臣與平生學術大為乖剌馴致數萬人之禍皆此書啟之也然則下吏幾死盖天所以激歩舒云使其就戮非不幸也按漢儒如賈誼董仲舒最為醇正然至其論諸侯王則皆主扵誅殺仲舒此對與天人三䇿議論逈别真西山亦謂太史公言賈誼眀申韓今讀政事書藹然有洙泗典刑未見其為申韓之學至諸侯王皆衆髖髀等語然後知太史公之説不繆孟子曰子以為有王者作将比今之諸侯而誅之乎其教之不改而後誅之乎聖賢處事固不同也盖諸侯王雖漢初之深患然根連株逮而誅鋤之扵後固不若建法立制而防閑之扵初也孝文時淮南濟北亦甞搆逆討而戮之罪止其身未甞深竟黨與亦不聞復有後患何必誅及二萬餘人哉孝宣本始四年詔郡國律令可蠲除以安百姓者條奏詔曰間者吏用法巧文寖深是朕之不徳也夫決獄不當使有罪興邪不辜䝉戮當重而輕使有罪者起邪之心無辜者反䧟罪辟決獄不平也父子悲恨朕甚傷之今遣廷史與郡鞫獄任輕祿薄廷史廷尉史也以囚辟決獄事為鞫謂疑獄也其為置廷平秩六百石貟四人其務平之以稱朕意扵是選于定國為廷尉求眀察寛恕黄霸等以為廷平季秋後請讞時上常幸宣室齋居而決事宣室在前殿之側布政教之地重用刑故齋戒以決之獄刑號為平矣時廷尉史路溫舒上言臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言師古曰遏止也音一曷反故盛服先王不用扵世忠良切言皆鬰扵胸師古曰鬰積也譽諛之聲日滿扵耳虚美熏心實禍蔽塞師古日熏氣烝也音勲此乃秦之所以亡天下也方今天下頼陛下恩厚亡金革之危饑寒之患父子夫妻勠力安家然太平未洽者獄亂之也夫獄者天下之大命也死者不可復生㡭者不可復屬師古曰㡭古絶字屬連也音之欲反書曰與其殺不辜寧失不經師古曰虞書大禹謨載咎繇之言辜罪也經常也言人命至重治獄宜慎寧失不常之過不濫無罪之人所以崇寛恕也今治獄吏則不然上下相敺以刻為眀師古曰敺與驅同深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離扵市被刑之徒比肩而立大辟之計歳以萬數此仁聖之所以傷也太平之未洽凡以此也夫人情安則樂生痛則思死棰椘之下何求而不得故囚人不勝痛則飾辭以視之師古曰視讀曰示吏治者利其然則指道以眀之上奏畏卻則鍜鍊而周内之晉灼曰精熟周悉致之法中也師古曰卻退也畏為上所卻退卻音邱略反盖奏當之成師古曰當謂處其罪也雖咎繇聼之猶以為死有餘辜師古曰咎繇作士善聼獄訟故以為喻也何則成鍊者衆文致之罪眀也是以獄吏専為深刻殘賊而亡極媮為一切如淳曰媮茍且也一切權時也不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對師古曰畫獄木吏尚不入對况真實乎期猶必也議必不入對此皆疾吏之風悲痛之辭也故天下之患莫深扵獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也臣聞烏鳶之卵不毁而後鳳凰集師古曰鳶䲭也音弋全反誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汙瑾瑜匿惡國君含詬師古曰春秋左氏傳載晉大夫伯宗之辭詬恥也言山藪之有草木則毒害者居之川澤之形廣大則能受扵汙濁人君之善御下亦當忍恥病也詬音垢唯陛下除誹謗以招切言開天下之口廣箴諫之路掃亡秦之失尊文武之惪省法制寛刑罰以廢治獄則太平之風可興扵世永履和樂與天亡極天下幸甚師古曰與天長乆無窮極也上善其言乃有是詔涿郡太守鄭昌上䟽言聖王立法眀刑者非以為治救衰亂之起也今眀王躬垂眀聼雖不置廷平獄将自正若開後嗣不若刪定律令律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末也政衰聼怠則廷平将招權而為亂首矣致堂胡氏曰楊惲之死以兩言曰南山蕪穢縣官不足為盡力如此而已人君行事不當扵人心天下得以議之豈有戮一夫鉗一喙而䏻沮弭者以兩言狂易而殺㢘潔剛直之士若刈草菅曾無顧惜之意宣帝扵是乎失君道矣方是時執天下之平民自以為不寃者于定國也趙盖韓楊之死定國以為當乎不當乎以為當則此四臣者皆良臣也後世評者謂其罪皆應司寇之議雖有死罪尚不殺也以為不當則定國甞奏惲為妖惡言大逆不道則廣漢寛饒延夀之戮亦必經廷尉之當矣然則四臣死非其罪不特宣帝之過丞相御史執金吾皆有責而廷尉則負責之尤者也地節四年詔曰父子之親夫婦之道天性也雖有禍患䝉死而存之誠愛結扵心仁厚之至也自今子首匿父母妻匿夫孫匿大父母皆勿坐其父母匿子夫匿婦大父母匿孫罪殊死皆上請廷尉以聞九月詔曰令甲死者不可生文穎曰蕭何承秦法所作為律今經律是也天子詔所增損不在律上者則為令令甲者前帝第一令也如淳曰令有先後故有令甲乙丙刑者不可息息滅也若黥劓創瘢不可滅也此先帝所重而吏未稱今繫者或以掠辜若饑寒瘐死獄中瘐病也囚徒病律名為瘐瘐音庾何用心逆人道也朕甚痛之其令郡國歳上繫囚以掠笞若瘐死者所坐名縣爵里名其人名也縣其屬縣也爵其身之官爵里其所居之邑里也丞相御史課殿最以聞元康四年詔曰朕念夫耆老之人髪齒墮落血氣既衰亦無逆亂之心今或罹扵文法執扵囹圄不得終其年命朕甚憐之自今以来諸年八十非誣吿殺傷人他皆勿坐黄龍元年詔吏六百石位大夫有罪先請武帝時吏二千石有罪先請元帝初下詔曰夫律令者所以抑暴扶弱欲其難犯而易避也今律煩多而不約自典文者不能分眀而欲羅元元之不逮不逮言意識所不及豈刑中之意哉其議律可蠲除輕減者條奏惟是便安百姓而已初元元年省刑罰七十餘事除光祿大夫以下至郎中保父母同産之令成帝河平中詔曰甫刑云五刑之屬三千大辟之罰其屬二百今大辟之刑千有餘條律令煩多百有餘萬言竒請他比日以益滋師古曰奇請謂常文之外主者别有所請以定罪也他比謂引他類以比附之稍增條律也其與中二千石博士及眀習律令者議減死刑及可蠲除約省者令較然易知條奏書不云乎惟刑之恤哉其審核之務準古法朕将盡心覽焉有司無仲山父将眀之材不能因時廣宣主恩建立眀制為一代之法而徒鉤摭微細毛舉數事以塞責而已鴻嘉元年定律令年未滿七歳賊鬬殺人及犯殊死者上請廷尉以聞得減死哀帝即位除誹謗抵欺法平帝元始元年令公列侯嗣子有罪耐以上先請四年勅婦女非身犯法及男子年八十以上七歳以下家非坐不道詔所名捕他皆無得繫其當驗者即驗問師古曰就其所居而問班固西漢刑法志論曰漢道至盛厯今二百餘載師古曰今謂撰志時考自昭宣元成哀平六世之間㫁獄殊死率歳千餘口而一人如淳曰率天下犯律者千口而有一人死耐罪上至右趾三倍有餘李竒曰耐從司寇以上至右趾為千口三人刑古人有言曰滿堂而飲酒有一人鄉隅而悲泣師古曰鄉讀曰嚮則一堂皆為之不樂王者之扵天下譬猶一堂之上也故一人不得其平為悽愴扵心今郡國被刑而死者歳以萬數天下獄二千餘所其寃死者多少相覆獄不減一人此和氣所以未洽者也原獄刑所以蕃若此者禮教不立刑法不眀民多貧窮豪傑務私姦不輙得獄犴不平之所致也服䖍曰鄉亭之獄曰犴臣瓉曰獄岸獄訟也師古曰小雅小宛之詩云宜岸宜獄瓉説是也書云伯夷降典悊民惟刑師古曰周書甫刑之辭也悊知也言伯夷下禮法以道人人習知禮然後用刑也言制禮以止刑猶隄之防溢水也今隄防陵遲禮制未立死刑過制生刑易犯饑寒並至窮斯濫溢豪傑擅私為之囊橐師古曰有底曰囊無底曰橐言容隐姦邪若囊橐之盛物姦有所隐則狃而寖廣師古曰狃串習也寖漸也狃音汝救反此刑之所以蕃也孔子曰古之知法者䏻省刑本也今之知法者不失有罪末矣師古曰省謂減除之絶扵未然故曰本也不失有罪事止聼訟所以為末又曰今之聼獄者求所以殺之古之聼獄者求所以生之與其殺不辜寧失有罪今之獄吏上下相驅以刻為眀深者獲公名平者多患害諺曰鬻棺者欲歳之疫非憎人欲殺之利在扵人死也今治獄吏欲䧟害人亦猶此矣凡此五疾獄刑所以尤多者也自建武永平民亦新免兵革之禍人有樂生之慮與髙恵之間同而政在抑強扶弱朝無威福之臣邑無豪傑之侠以口率計㫁獄少扵成哀之間什八可謂清矣師古曰十少其八也然而未能稱比隆扵古者以其疾未盡除而刑本不正善乎孫卿之論刑也曰世俗之為説以為治古者無肉刑師古曰治古謂上古至治之時也治音文吏反有象刑墨黥之屬菲履赭衣而不純師古曰菲草履也純縁也衣不加縁示有恥也菲音扶味反純音之允反是不然矣以為治古則人莫觸罪邪豈獨無肉刑哉亦不待象刑矣師古曰人不犯法則象刑無所施也以為人或觸罪戾而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉凡制刑之本将以禁暴惡且懲其末也師古曰懲止也殺人者不死傷人者不刑是恵暴而寛惡也故象刑非生扵治古方起扵亂今也如淳曰古無象刑也所有象刑之言者近起今人惡刑之重故遂推言古之聖君但以象刑天下自治夫征暴誅悖治之威也殺人者死傷人者刑是百王之所同也未有知其所由来者也故治則刑重亂則刑輕李竒曰世所以治者乃刑重也所以亂者乃刑輕也犯治之罪固重犯亂之罪固輕也書云刑罰世重世輕此之謂也師古曰周書甫刑之辭也言刑輕重各随其時所謂象刑惟眀者言象天道而作刑師古曰虞書益稷曰咎繇方祗厥叙方施象刑惟眀言敬其次叙施其法刑皆眀白也安有菲履赭衣者哉孫卿之言既然又因俗説而論之曰禹承堯舜之後自以徳衰而制肉刑湯武順而行之者以俗薄扵唐虞故也今漢承衰周暴秦極敝之流俗已薄扵三代而行堯舜之刑是猶以鞿而御駻突孟康曰以䋲縛馬口謂之鞿普灼曰鞿古覊字也如淳曰駻音捍突惡馬也師古曰馬絡頭曰覊也違救時之宜矣且除肉刑者本欲以全民也今去髠鉗一等轉而入扵大辟以死㒺民失本恵矣師古曰㒺謂羅網也故死者歳以萬數刑重之所致也至乎穿窬之盜忿怒傷人男女淫佚吏為姦贓師古曰佚讀與逸同若此之惡髠鉗之罰又不足以懲也故刑者歳十萬數民既不畏又曾不恥刑輕之所生也故俗之能吏公以殺盜為威専殺者勝任奉法者不治亂名傷刑不可勝條是以㒺宻而姦不塞刑蕃而民愈嫚師古曰塞止也蕃多也音扶元反嫚與慢别必世而未仁百年而不勝殘誠以禮樂闕而刑不正也是宜惟思所以清源正本之論刪定律令籑二百章以應大辟孟康曰籑音撰其餘罪次扵古當生今觸死者皆可募行肉刑李竒曰欲死邪欲腐邪及傷人與盜吏受贓枉法男女淫亂皆復古刑為三千章詆欺文致微細之法番蠲除師古曰詆謂誣也音丁禮反如此則刑可畏而禁易避吏不専殺法無二門輕重當罪民命得全合刑罰之中殷天人之和李竒曰殷亦中順稽古之制成時雍之化成康刑措雖未可致孝文㫁獄庶㡬可及矣容齋洪氏随筆曰虞書象刑惟眀象者法也漢文帝詔始云有虞氏之時畫衣冠異章服以為戮而民弗犯武帝詔亦云唐虞畫象而民不犯白虎通云畫象者其衣服象五刑也犯墨者䝉巾犯劓者赭著其衣犯髕者以墨其髕犯宫者屝屝草屨也大辟者布衣無領其説雖未必然揚䧺法言唐虞象刑惟眀説者引前詔以證然則唐虞之所以齊民禮義榮辱而已不専扵刑也秦之末年赭衣半道而姦不息國朝之制減死一等及胥吏兵卒配徙者湼其面而刺之本以示辱且使人望而識之耳乆而益多毎郡牢城營其額常溢殆至十餘萬兇盜處之恬然盖習熟而無所恥也羅隐䜛書云九人冠而一人髽髽者慕而冠者勝九人髽而一人冠則冠者慕而髽者勝正謂是歟老子曰民常不畏死奈何以死懼之若使民常畏死則為惡者吾得執而殺之孰敢可謂至言荀卿謂象刑為治古不然亦正論也按古者五刑大辟至重墨至輕孝文除肉刑以髠鉗代墨以笞代劓剕其後復減笞數定箠令則刑制益寛矣然景武以後習為嚴酷死刑至多寗成傳稱成抵罪髠鉗是時九卿死即死少被刑而成刑極自以為不復收又王吉龔遂王式皆坐輔導昌邑王無状減死鉗為城旦舂何並傳並為潁川太守時鍾元為尚書令元弟威為郡掾贓千金並過辭元元免冠為弟請一等之罪如淳曰減死罪一等蚤就髠鉗並不許卒論殺威以是觀之則知當時死刑至多而生刑反少髠鉗本以代墨乃刑之至輕者然減死一等即止於髠鉗進髠鉗一等即入於死而笞箠所以代剕劓者不聞施用矣王莽居攝翟義劉信起兵討莽莽敗之夷其三族誅及種嗣至皆同坑以棘五毒并𦵏之其後陳良終帶叛入匈奴莽求得行㷊如之刑燒殺之及天下兵起董忠反莽敗之莽令剉忠收其家族以醇醯毒藥白刅叢棘埋之西漢獄名中都官獄宣紀徐氏曰按後漢百官志云孝武以下置中都官獄二十六所各令長名廷尉詔獄周勃詣廷尉詔獄上林詔獄成紀罷上林詔獄師古曰漢舊儀云上林詔獄主治苑中禽獸宫館事郡邸獄宣紀曾孫坐收郡邸獄註云漢舊儀郡邸獄治天下郡國上計者掖庭祕獄劉輔繫掖庭祕獄三輔黄圗云武帝改永巷為掖庭置獄焉共工獄劉輔𫝊徙繫共工獄註考工也若盧詔獄王商詣若盧詔獄都船獄王嘉致都船獄都司空獄竇嬰劾繫都司空又伍被𫝊為左右都司空詔獄書居室灌夫𫝊劾夫繫居室註云後改為保宫保宫李陵母繫保宫内官東方朔𫝊昭平君獄繋内官請室袁盎𫝊絳侯反繋請室註獄也導官張湯𫝊廷尉謁居弟繫導官暴室宣紀註云暴室宫人獄水司空伍被𫝊註云上林有水司空主囚徒官容齋洪氏随筆曰漢以廷尉主刑獄而中都他獄亦不一宗正屬官有左右都司空鴻臚有别火令丞郡邸獄少府有若盧獄令考工共工獄執金吾有寺互都船獄又有上林詔獄水司空掖庭祕獄暴室請室居室徒官之名張湯𫝊蘇林曰漢儀註獄二十六所東漢志云孝武帝所置世祖皆省之東漢洎唐雖鞫囚非一所然不至如是其多國朝但有大理及臺獄元豐紹聖間蔡確章惇起同文館獄之類非故事也後漢世祖建武二年詔曰頃獄多寃人用刑深刻朕甚愍之孔子云刑罰不中則民無所措手足其與中二千石諸大夫博士議郎議省刑罰桓譚上䟽曰今法令決事輕重不齊或一事殊法同罪異論姦吏得因緣為市所欲活則傅生議所欲䧟予死比是為刑開二門也今可令通義理眀習法律者校定科比一其法度班下郡國蠲除故條如此天下知方而獄無寃濫矣三年七月詔曰吏不滿六百石至墨綬長相有罪先請男子八十以上十歳以下及婦人從坐者自非不道詔所名捕皆不得繫當驗問者即就驗女徒雇山歸家前書音義曰令甲女子犯徒遣歸家每月出錢雇人扵山伐木名曰雇山七年詔中都官三輔郡國出繫囚非犯殊死皆一切勿按其罪見徒免為庶人耐罪亡命以上除之十一年詔曰天地之性人為貴其殺奴婢不得減罪十二年髙山侯梁統上䟽請嚴刑不報統䟽曰臣竊見元帝初元五年輕殊死刑三十四事哀帝建平元年輕殊死刑八十一事其四十二事手殺人者減死一等二帝共輕殊死刑一百二十三事自後人輕犯法吏易殺人臣愚以為刑罰不茍務輕務其中也是以五帝有流殛放殺之誅三王有大辟刻肌之刑所以為除殘去亂也髙帝定法𫝊之後代文帝遭世康平因時施恩省去肉刑相坐之法天下㡬平武帝值中國全盛征伐逺方百姓罷弊豪強犯禁姦吏㺯法故重首匿之科著知縱之律凡首匿者為謀首藏匿罪人至宣帝時除子匿父母妻匿夫孫匿大父母罪餘至殊死上請知縦謂見知故縦武帝時立見知故縦之罪使張湯等置律並見前書宣帝履道要以御海内臣下奉憲不失繩墨天下稱安孝元孝哀即位日淺丞相王嘉輕為穿鑿虧除先帝舊約成律嘉𫝊及刑法志並無其事統與嘉時代相接所引當不妄但班書略耳凡百餘事臣取其尤妨政者條奏伏請擇其善者而從之定不易之典時廷尉議以為崇刑峻法非眀主急務遂罷之十四年羣臣請増科禁不許羣臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦宄不勝宜増科禁以防其源詔下公卿杜林奏曰古之眀王深識逺慮動居其厚不務多辟周之五刑不過三千大漢初興詳覽失得破矩為圜斵雕為樸蠲除苛政更立䟽網海内歡欣人懐寛徳及至其後漸以滋章吹毛索疵詆欺無限果桃莱茹之饋集以成贓小事無妨扵義以為大戮故國無㢘士家無全行至扵法不䏻禁令不能止上下相遁為敝彌深臣愚以為宜如舊制不合翻移帝從之十八年詔曰今邉郡盜榖五十斛罪至扵死開殘吏妄殺之路其蠲除此法同之内郡二十八年詔死罪囚皆一切募下蠶室女子宫蠶室宫刑獄名宫刑者畏風須煖作窨室蓄火如蠶室因以名焉女子宫謂幽閉也三十一年復有是詔二十九年詔令天下繫囚自殊死以下及徒各減本罪一等其餘贖罪輸作有差袁純註云不孝不道者不在此限東漢有中都官獄二十六所唯廷尉及洛陽有詔獄立春之日下寛大書曰制詔三公方春東作敬始謹微動作從之罪非殊死且勿案驗皆須麥秋眀帝即位詔施刑及郡國囚徒在中元元年四月己夘赦前所犯而後捕繫者悉免其刑中二千石下至黄綬貶秩贖論者悉皆復秩還贖赦隴西囚徒減罪一等十二月甲寅詔天下亡命殊死以下聼得贖論死罪入縑二十疋右趾至髠鉗城旦舂十疋全城旦舂至司寇作三疋其未發覺詔書到先自吿者半入贖永平三年正月詔有司詳刑謹罰眀察单辭夙夜匪懈以稱朕意八月詔三公募郡國中都官死罪繫囚減罪一等勿笞屯朔方五原之邉縣其大逆無道殊死者一切募下蠶室亡命者令贖罪各有差十五年詔亡命自殊死以下贖罪各有差見贖刑門眀帝善刑理法令分眀日晏坐朝幽枉必逹㫁獄得情號居前代十二十㫁其二言少刑也椘王英以謀􅊇死窮治椘獄累年坐死徙者甚衆韓朗言其寃帝自幸洛陽獄錄囚徒理出千餘人時天旱即大雨馬后亦以為言帝惻然感悟夜起彷徨由是多所降宥詳見詳讞門帝性褊察好以耳目隐發為眀近臣尚書以下至見提曵常以事怒郎藥崧以杖撞之崧走入牀下帝怒甚疾言曰郎出崧乃曰天子穆穆諸侯皇皇未聞人君自起撞郎帝乃赦之是時朝廷莫不悚慄争為嚴切以避誅責安帝時大司農劉據以職事被譴召詣尚書傳呼促歩又加以捶撲左雄上言九卿位亞三事班在大臣行有珮玉之節動有庠序之儀孝眀皇帝始有撲罰皆非古典帝納之是後九卿無復捶撲者肅宗初詔有司絶鉆鑚諸慘酷之科鉆持也説文曰鐡鋷也其炎反鑚臏刑謂鑚去其臏骨也鑚音作唤反觧妖惡之禁除文致之請讞五十餘事定著扵令文致謂前人無罪文飾致扵法中也時承永平故事吏尚嚴切尚書決事率近扵重陳寵上䟽曰陛下即位數詔羣僚𢎞崇晏安而有司執事未悉奉承典刑用法猶尚深刻㫁獄者急扵篣格酷烈之痛執憲者煩扵詆欺放濫之文或因公行私逞縦威福今宜蕩滌煩苛之法輕簿箠椘以濟羣生全廣至徳以奉天心帝納寵言毎事務厚乃有是詔建初五年二月詔二千石理寃獄錄輕繫三月詔曰孔子曰刑罰不中則民無所措手足今吏多不良擅行喜怒或案不以罪廹脅無辜致令自殺者一歳且多扵㫁獄甚非為人父母之意也有司其議糾舉之七年詔天下繫囚減死一等勿笞詣邉戍妻子自随占犯殊死一切募下蠶室其女子宫繫囚鬼薪白粲已上皆減本罪輸司寇作亡命贖死罪入縑有差見贖罪門元和二年正月詔曰方春生養萬物莩甲宜助陽以育時物其令有司罪非殊死且勿案驗及吏人條書相吿不得聼受冀以息事寧人聼順天氣立秋如故七月詔曰律十二月立春不以報囚月令冬至之後有順陽助生之文而無鞫獄㫁刑之政朕咨訪儒者稽之典則以為王者生殺宜順時氣其定律毋以十一月十二月報囚漢舊事㫁獄報重常盡三冬之月是時帝始改用冬初十月而已元和二年旱長水校尉賈宗等上言以為㫁獄不盡三冬故陰氣微弱陽氣發泄招致災旱事在扵此帝以其言下公卿議陳寵奏曰夫冬至之節陽氣始萌故十一月有蘭射干芸荔之應時令曰諸生蕩安形體天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地以交萬物皆出蟄虫始振人以為正夏以為春三微成著以通三統周以天元殷以地元夏以人元若以此時行刑則殷周歳首皆當流血不合人心不稽天意月令曰孟冬之月趣獄刑無留罪眀大刑畢在立冬也又仲冬之月身欲寜事欲静若以降威怒不可謂寧若以行大刑不可謂静議者咸曰旱之所由咎在改律臣以為殷周㫁獄不以三微而化致康平無有災害自元和以前皆用三冬而水旱之異徃徃為患由此言之災害自為他應不以改律秦為虐政四時行刑聖漢初興改從簡易蕭何草律季秋論囚俱避立春之月而不計天地之正三王之春實頗有違陛下探幽析微允執其中革百載之失建永年之功上有迎承之敬下有奉微之恵稽春秋之文當月令之意聖功美業不宜中疑書奏帝納之遂不復改三年廷尉郭躬條諸重文可從輕者四十一事奏之事皆施行七月詔曰律云掠者唯得榜笞立掠問也榜擊也音彭説文曰笞擊也立謂立而考訊之又令兩箠長短有數箠長短見景帝時自徃者大獄以来掠拷多酷鉆鑚之屬大獄謂椘王英等事鉆鋷也國語曰中刑用鑚鑿皆謂慘酷其肌膚也慘苦無極念其痛毒怵然動心書曰鞭作官刑豈云若此宜及秋冬理獄眀為其禁按自建武以来雖屢有省刑薄罰之詔然上下相胥以苛酷為能而拷囚之際尤極殘忍獨行傳載椘王英坐反誅其所䟽天下名士有會稽太守尹興名乃徴興詣廷尉獄其功曹陸續主簿梁宏駟勲等及掾史五百餘人詣洛陽詔獄就拷詣吏不堪椘痛死者大半唯續宏勲掠拷五毒肌肉消爛終無異詞戴就仕郡倉曹掾刺史歐陽參奏太守成公浮贓罪遣部從事按之收就扵錢塘縣獄幽囚拷掠五毒參至又燒鋘使就挟扵肘腋毎上彭考彭即榜也因止飯食不肯下肉焦毁墮地者掇而食之又令卧覆船下以馬通薫之馬通馬矢也一夜一日不死又復燒地以大鍼刺指爪中使以杷土爪悉墮落訖眀公浮之誣乃舍之且興不過以姓名罥罣反形未具公浮為人誣以贓罪陸續戴就所坐不過以郡功曹不肯證成太守之罪及非同謀之人而乃窮極慘酷如此則罪情稍重而不肯誣服者拷死扵狴犴之下盖不可勝計矣又詔郡國中都官繫囚減死一等勿笞詣邉縣妻子自随餘如七年詔十二月詔曰書云父不慈子不孝兄不友弟不恭不相及也徃者妖言大獄所及廣逺一人犯罪禁至三屬莫得垂纓仕宦王朝如有賢才而沒齒無用朕甚憐之非所謂與之更始也諸以前妖惡禁錮者一皆蠲除之以眀棄咎之路但不得宿衛而已章和元年詔郡國中都官繫囚減死罪一等詣金城犯殊死者一切募下蠶室其女子宫繫囚鬼薪白粲以上減罪一等輸作贖縑有差文獻通考卷一百六十三
