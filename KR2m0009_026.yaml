body:
  text: 文獻通考卷二十六鄱陽馬端臨貴與著國用考四賑恤周禮遺人掌邦之委積以待施惠鄉里之委積以恤民之囏厄門關之委積以飬老孤郊里之委積以待賔客野鄙之委積以待羈旅縣都之委積以待凶荒委積者廩人倉人計九穀之數足國用以其餘共之所謂餘法用也職內邦之移用亦如此也皆以餘財共之少曰委多曰積廩人掌九穀之數以待國之匪頒賙賜稍食以歲之上下數邦用以知足否以詔穀用以治年之豐凶凡萬民之食食者人四釜上也人三釜中也人二釜下也此皆謂一月食米也六斗四升曰釜若食不能人二釜則令邦移民就穀詔王殺邦用漢髙祖二年關中大飢米斛萬錢人相食令民就食蜀漢文帝六年大旱蝗發倉庾以賑貧民武帝四年山東被水災民多飢乏於是天子遣使虛郡國倉廩以賑貧民猶不足又募豪富人相假貸尚不能救乃徙貧民於關以西及充朔方以南新秦中七十餘萬口衣食皆仰給於縣官數嵗貸與産業使者分部護冠蓋相望費以億計元鼎二年詔曰水潦移於江南迫隆冬至朕懼其飢寒不治江南之地火耕水耨方下巴蜀粟致之江陵遣博士中等分循行告所抵無令重困吏民有救賑飢民免其厄者具以名聞河內貧民傷水旱萬餘家汲黯以便宜持節發河內倉粟以賑貧民請歸闕伏矯制罪上賢而釋之昭帝元鳯三年詔曰乃者民被水災頗匱於食朕虛倉廩使使者賑困乏其止四年毋漕三年以前所賑貸非丞相御史所請邊郡受牛者勿收責武帝始開邊徙民屯田皆與犁牛後丞相御史復間有所請今敕自上所賜豫勿收責丞相所請乃令其顧稅耳宣帝本始四年詔曰今嵗不登已遣使者賑貸困乏使農移就業丞相以下至都官令丞上書入穀輸長安倉助貸貧民以車船載穀入關得無用傳傳傳符也欲穀之多故不問其出入元帝初元元年詔振業貧民資不滿千錢者賦貸種食永光元年赦天下令各務農無田者皆假之貸種食如貧民永光四年詔所貸貧民勿收責成帝河平四年賑貸瀕河郡水傷不能自存者避水他郡國所在冗食之冗散廩食使生活不占著户給役使也永始二年詔曰關東比嵗不登吏民以義收食貧民入穀物助縣官賑贍者已賜直其百萬以上加賜爵右更欲為吏補三百石其吏也遷二等三十萬以上賜爵五大夫吏亦遷二等民補郎十萬以上家無出租賦三歲萬以上一年光武建武六年令郡國有穀者給廩髙年鰥寡孤獨篤癃無家不能自存者眀帝永平十八年賜鰥寡孤獨篤癃不能自存者穀人三斛章帝建初十六年詔貧民有田業而匱乏者貸種種勿收責以後凡各處水旱飢饉賑貸非通行天下者不書獻帝興平元年三輔大旱帝出太倉米豆作糜食飢人時穀一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使侍御史侯汶出太倉米豆為飢人作糜粥經日而死者如故帝疑賑恤有虛乃親於御座前量試作糜乃知非實使侍中劉艾出責有司收侯汶考實杖五十自是之後多得全濟魏文帝黃初二年冀州大蝗民飢遣使開倉廩以賑之眀帝景初元年冀兖徐豫四州遇水遣使循行沒溺死亡及失産財者所在開倉賑給之吳大帝赤烏三年民飢詔開倉廩以賑貧窮晉成帝咸康元年揚州諸郡飢遣使開倉賑給宋文帝元嘉中三吳水潦穀貴人飢彭城王義康立議以東土災荒人稠穀踴富商蓄米日成其價宜班下所在隱其虛實令積蓄之家聽留一年儲餘皆勒使糶貨為制平價又沿淮嵗豐令三吳飢人即以貸給使強壯轉運以贍老弱又詔以會稽宣城二郡米穀百萬斛賜遭水人二十年諸州郡水旱人大飢遣使開倉賑恤魏孝文太和元年詔州郡水旱蝗人飢開倉賑恤七年以冀定二州飢詔郡縣為粥於路以食之定州上言為粥所活者九十四萬七千餘口冀州上言為粥所活者七十五萬一千七百餘口宣武延昌元年州郡十一大水詔開倉賑恤以京師穀貴出倉粟八十萬石以賑恤貧民隋文帝開皇十四年關中大旱民飢上遣左右視民食得豆屑雜粳以獻為之流涕不御酒殆將一期乃帥民就食於洛陽敇斥候不得輒有驅逼男女參厠於仗衛之間遇扶老擕幼輒引馬避之慰勉而去至艱險之處見負擔者令左右扶助之唐太宗謂黃門侍郎王圭曰開皇間大旱隋文帝不許賑給而令百姓就食山東比至末年天下儲積可供五十年煬帝恃其富饒侈心無厭卒亡天下但是倉庾之積足以備凶年其餘何用哉唐太宗貞觀二年山東旱遣使賑恤飢民鬻子者出金寶贖還之以後發常平義倉賑恤事並見市糴考兹不再録周顯德六年淮南飢上命以米貸之或曰民貧恐不能償上曰民猶子也安有子倒懸而父不為解者安責其必償也致堂胡氏曰稱貸所以惠民亦以病之惠者紓其目前之急也病者責其他日之償也其責償也或嚴其期或徵其耗或取其息或豫之以米而使之歸錢或貧無可償而督之不置或胥吏詭貸而徵諸編民凡此皆民之所甚病也有司以豐取約豫為術聚斂之臣以頭會箕斂為事大旱而稅不蠲水潦而稅不蠲蝗蝻螟賊而稅不蠲長官督稅不登數則不書課民户納欠不破産則不落籍出於民力尚如此而况貸於公者其責償固不遺餘力矣世宗視民猶子匡救其乏而不責其必償仁人之心王者之政也宋太祖皇帝建隆三年遣使賑貸揚泗飢户部郎中沈義倫使吳越還言揚泗飢民多死郡中軍儲尚有餘萬斛倘以貸民至秋收新粟公私俱利有司沮之曰若來嵗不稔孰任其咎義倫曰國家以廩粟濟民自當召和氣致豐年寧憂水旱邪此當斷自宸衷上從之三月詔賜沂州飢民種食又詔賑宿蒲晉慈隰相衛州飢開寶四年劉鋹平詔賑廣南管內州縣鄉村不接濟人户委長吏於省倉內量行賑貸候豐稔日令只納元數八年平江南詔出米十萬石賑城中飢民太宗太平興國八年以粟四萬石賑同州飢淳化二年詔永興鳯翔同華陜等州嵗旱以官倉粟貸之人五斗仍給復三年五年命直史館陳堯叟等往宋亳陳潁等州出粟以貸飢民每州五千石及萬石仍更不理納真宗咸平二年詔出米十萬石賑兩浙貧民五年遣中使詣雄霸瀛莫等州為粥以賑貧民兩浙提刑鍾離瑾言百姓闕食官設糜粥民競赴之有妨農事請下轉運司量出米賑濟家得一斗從之仁宗英宗一遇災變則避朝變服損膳徹樂恐懼修省見於顔色惻怛哀矜形於詔令其德厚矣災之所被必發倉廩賑貸或平價以糶不足則轉漕他路粟以給又不足則誘富人入粟秩以官爵災甚則出內藏或奉宸庫金帛或鬻祠部度僧牒東南則留發運司嵗漕米或數十萬或百萬石濟之賦租之未入入未備者或縱不取或寡取之或倚格以須豐年寬逋負休力役賦入之有支移折變者省之應給蠶鹽若和糴及科率追呼不急妨農者罷之薄關市之征鬻牛者免算利有可與民共者不禁水鄉則蠲蒲魚果蓏之稅民流亡者關津毋責渡錢過京師者分遣官諸城門賑以米所至舍以官第為淖糜食之或賦以間田或聽𨽻軍籍老幼不能自存者聽官司收飬因飢疫若厭溺死者官為瘞埋祭之厭溺死者加賜其家錢粟蝗為害則募民捕以錢若粟易之蝗子一升至易菽粟三升或五升下詔州郡戒長吏存拊其民緩縲繫省刑罰飢民劫囷窖者薄其罪且以戒監司俾察官吏之老疾罷愞不任職者間遣內侍存問災甚則遣使安撫其前後所施大略如此初天下沒入户絶田官自鬻之至嘉祐二年樞密使韓琦請留勿鬻募人耕收其租别為倉貯之以給州縣郭內之老幼貧疾不能自存者謂之廣惠倉領以提點刑獄嵗終具出納之數以上三司户不滿萬留田租千石萬户倍之户二萬留三千石三萬留四千石五萬留六千石七萬留八千石十萬以上留萬石田有餘則鬻如舊四年詔改𨽻司農寺州選官二人主出納嵗十月則遣官驗視應受米者書其名於籍自十一月始三日一給米人一升幼者半之次年二月止有餘乃及諸縣量其大小而均給之其大略如此慶歷八年河北京東西大水大飢人相食詔出二司錢帛賑之流民入京東者不可勝數知青州富弼擇所部豐稔者五州勸民出粟得十五萬斛益以官廩隨所在貯之擇公私廬舍十餘萬區散處其人以便薪水官吏自前資待闕寄居者皆給其祿使即民所聚選老弱者廩之山林河泊之利有可取以為生者聽流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝率五日輒遣人以酒肉糧飯勞之人人為盡力流民死者為大冢葬之謂之叢冢自為文祭之及流民將復其業又各以逺近受糧凡活五十餘萬人募而為兵者又萬餘人上聞之遣使慰勞就遷其秩弼曰救災守臣職也辭不受前此救災者皆聚民城郭中煮粥食之飢民聚為疾疫及相蹈藉死或待次數日不食得粥皆僵仆名為救人而實殺之弼所立法簡便周至天下傳以為法時知鄆州劉夔亦發廩賑飢民賴全活者甚衆盜賊衰止賜書褒奬曾鞏救災議曰河北地震水災隳城郭壞廬舍百姓暴露乏食主上憂憫下緩刑之令遣拊循之使恩甚厚也然百姓患於暴露非錢不可以立屋廬患於乏食非粟不可以飽二者不易之理也非得此二者雖主上憂勞於上使者旁午於下無以救其患塞其求也有司建言請發倉廩與之粟壯者人日二升幼者人日一升主上不旋日而許之賜之可謂大矣然有司之所言特常行之法非審計終始見於衆人之所未見也今河北地震水災所毁壞者甚衆可謂非常之變也遭非常之變者必有非常之恩然後可以振之今百姓暴露乏食已廢其業矣使之相率日待二升之廩於上則其勢必不暇乎他為是農不復得修其畎畝商不復得治其貨賄工不復得利其器用間民不復得轉移執事一切棄百事而專意於待升合之食以偷為性命之計是直以餓殍之義飬之而已非深思逺慮為百姓長計也以中户計之户為十人壯者六人月當受粟三石六斗幼者四人月當受粟一石二斗率一户月當受粟五石難可以久行也則百姓何以贍其後久行之則被水之地既無秋成之望非至來嵗麥熟之時未可以罷自今至於來嵗麥熟凡十月一户當受粟五十石今被災者十餘州州以二萬户計之中户以上及非災害所被不仰食縣官者去其半則仰食縣官者為十萬户食之不遍則為施不均而民猶有無告者也食之遍則當用粟五百萬石而足何以辦此又非深思逺慮為公家長計也至於給授之際有淹速有均否有真偽有會集之擾有辨察之煩措置一差皆足致弊又羣而處之氣久蒸薄必生疾癘此皆必至之害也且此不過能使之得旦暮之食耳其餘屋廬構築之費將安取哉屋廬構築之費既無所取而就食於州縣必相率而去其故居雖有頽牆壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者必棄之而不暇顧甚則殺牛馬而去者有之伐桑棗而去者有之其害可謂甚也今秋氣已半霜露方始而民露處不知所蔽蓋流亡者亦已衆矣如不可止則將空近塞之地失戰鬬之民此衆士大夫之所慮而不可謂無患者也空近塞之地失耕桑之民此衆士大夫所未慮而患之尤甚者也何則失戰鬬之民異時有警邊戍不可以不增爾失耕桑之民異時無事邊糴不可以不貴矣二者皆可不深念歟萬一或出於無聊之計有窺倉庫盜一囊之粟一束之帛者彼知已負有司之禁則必鳥駭鼠竄竊弄鋤挺於草茅之中以扞遊徼之吏強者既囂而動則弱者必隨而聚矣不幸或連一二城之地有枹鼓之警國家胡能晏然而已乎况今外有夷狄之可慮內有郊祀之將行安得不防之未然銷之於未萌也然則為今之策下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則今被災之州為十萬户如一户得粟十石得錢五千下户常産之資平日未有及此者也彼得錢以完其居得粟以給其食則農得修其畎畝商得治其貨賄工得利其器用間民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廩於上而勢不暇乎他為豈不逺哉此可謂深思逺慮為百姓長計者也由有司之説則用十月之費為粟五百萬石由今之説則用兩月之費為粟一百萬石况貸之於今而取之於後足以振其艱乏而終無損於儲蓄之實所實費者錢五巨萬貫而已此可謂深思遠慮為公家長計者也又無給授之弊疾癘之憂民不必去其故居茍有頽牆壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者皆得而不失况於全牛馬保桑棗其利又可謂甚也雖寒氣方始而無暴露之患民安居足食則有樂生自重之心各復其業則勢不暇乎他為雖驅之不去誘之不為盜矣夫飢寒餓殍之民而與之升合之食無益於救災補敗之數此常行之弊法也今破去常行之弊法以錢與粟一舉而振之足以救其患復其業河北之民聞詔令之出必皆喜上之足賴而自安於畎畝之中負錢與粟而歸與其父母妻子脫於流離轉死之禍則戴上之施而懷欲報之心豈有已哉天下之民聞國家措置如此恩澤之厚其孰不震動感激悅主上之義於無窮乎如是而人和不可致天意不可悅者未之有也英宗治平四年河北旱民流入京師待制陳薦請以糶便司陳粟貸民户二石從之御史中丞司馬光上疏曰聖王之政使民安其土樂其業自生至死莫有離散之心為此之要在於得人以臣愚見莫若謹擇公正之人為河北監司使之察災傷州縣守宰不勝者易之然後多方那融斗斛各使賑濟本州縣之民若斗斛數少不能周遍者且須救土著農民各據版籍先從下等次第賑濟則所給有限可以豫約矣若富室有蓄積者官給印歷聽其舉貸量出利息候豐熟日官為收索示以必信不可誑誘則將來百姓爭務蓄積矣如此飢民知有可生之路自然不棄舊業浮遊外鄉居者既安則行者思反若縣縣皆然豈得復有流民哉神宗熙寧元年降空名度牒五百道付兩浙運司令分賜本路召人納米或錢賑濟帝以內侍有自淮南來者言宿州民飢多盜繫囚衆本路不以聞詔遣太常博士陳充等視宿亳等州災傷又詔河北災傷州軍劫盜死罪者並減死刺配廣南牢城年豐如舊司馬光上疏論曰臣竊聞降敇下京東京西災傷州軍如人户委是家貧偷盜斛斗因而盜財者與減等斷放未知虛的若果如此深為不便臣聞周禮荒政十有二散利薄征緩刑弛力舍禁去幾率皆推寬大之恩以利於民獨於盜賊愈更嚴急所以然者蓋以飢饉之嵗盜賊必多殘害良民不可不除也頃年嘗見州縣官吏有不知治體務為小仁者或遇凶年有劫盜斛斗者小加寬縱則盜賊公行更相劫奪鄉村大擾不免廣有收捕重加刑辟或死或流然後稍定今若朝廷明降敇文豫言偷盜斛斗因而盜財者與減等斷放是勸民為盜也百姓乏食官中當輕徭薄賦開倉賑貸以救其死不當使之相劫奪也今歲府界京東京西水災極多嚴刑峻法以除盜賊猶恐春冬之交飢民嘯聚不可禁禦又况降敇以勸之臣恐國家始於寬仁而終於酷暴意在活人而殺人更多也按溫公此奏乃言之於英宗治平年間非此時所上今姑附此六年詔自今災傷用司農常法賑救不足者並預具當修農田水利工役募夫數及其直上聞乃發常平錢斛募飢民興修不如法賑救者委司農劾之七年賜環慶路安撫司度僧牒千以備賑濟漢蕃飢民元豐元年詔以濱棣滄州被水災令民第四等以下立保貸請常平糧有差仍免出息帝曰賑濟之法州縣不能舉行夫以政殺人與刃無異今出入一死罪有司未嘗不力爭至於凶年飢嵗老幼轉死溝壑而在位者殊不恤此出於政事不修而士大夫不知務也九年知太原府韓絳言在法諸老疾自十一月一日州給米豆至次年三月終止河東地寒與諸路不同乞自十一月一日起支至次年二月終止如有餘即及三月終從之賑貧始於嘉祐中罷鬻諸路户絶田以夏秋所輸之課給老幼貧疾不能自存者神宗以來其法不廢自蔡京置居飬院安濟坊給常平米厚至數倍差官卒充使令置火頭具飲膳給以衲衣絮被州縣奉行過當費用既多不免率斂貧者樂而富者擾矣元豐間詔青齊淄三州被水之民老幼疾病無依者給口食如乞丐法哲宗元祐六年翰林學士承旨知杭州蘇軾言浙西二年諸郡災傷今嵗大水蘇湖常三州水通為一杭州死者五十餘萬蘇州三十萬未數他郡今既秋田不種正使來嵗豐稔亦須七月方見新穀變故未易度量乞令轉運司約度諸郡合糶米斛數目下諸路封樁及年計上供赴浙西諸郡糶賣詔賜米百萬斛錢二十餘萬緡賑濟災傷紹聖元年帝以京東河北之民乏食流移未歸詔給空名假承務郎敇十太廟齋郎補牒十州助教不理選限敇三十度牒五百付河北東西路提舉司召人入錢粟充賑濟東萊吕氏曰荒政條目始於黎民阻飢舜命棄為后稷播時百穀其詳見於生民之詩到得後來如所謂禹之水湯之旱民無菜色荀子禹十年水湯七年旱而天下無菜色者其荒政制度不可考及至成周自大司徒以荒政十有二聚萬民周禮地官大司徒以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑其詳又始錯見於六官之書然古者之所謂荒政以三十年之通制國用則有九年之蓄出禮記王制遇嵗有不登為人主者則貶損減省喪荒之式見於小行人之官札喪凶荒厄窮為一書周禮秋官當時天下各自有廩藏所遇凶荒則賑發濟民而已當時措置與後世不同所謂移民平糴皆後世措置且自周論之太宰以九式均節物用三曰喪荒之式又遺人掌縣鄙之委積以待凶荒而大司徒又以薄征散利凡諸侯莫不有委積以待凶荒凶荒之嵗為符信發粟賑飢而已當時斂散輕重之式未嘗講侯甸采衛皆有饋遺不至於穀價翔踴如弛張斂散之權亦不曾講惟到春秋戰國王政既衰秦飢乞糴於晉魯飢乞糴於齊出左傳嵗一不登則乞糴於鄰國所謂九年之制度已自敗壞見管子輕重一篇無慮百千言不過君民互相攘奪收其權於君上已非君道所謂荒政一變為斂散輕重先王之制因壞到後來斂散輕重之權又不能操所以啓姦民幸凶年以謀禍害民轉死於溝壑至此一切急迫之政五代括民粟不出粟者死與斂散輕重之法又殆數等大抵其法愈壞則其術愈粗論荒政古今不同且如移民易粟孟子特指為茍且之政已非所以為王道秦漢以下却謂之善政漢武帝詔令水潦移於江南方下巴蜀之粟致之江陵本紀元鼎二年詔唐西都至嵗不登關中之粟不足以供萬乘荒年則幸東都自髙祖至眀皇不特移民就粟其在髙宗時且有逐糧天子之語後來元宗溺於茍安不出長安並出通鑑以此論之時節不同孟子所謂茍且之政乃後世所謂善政且三十年之通制國用須必世百年而可行亦未易及此後之有志之士如李悝之平糴法非先王之政豐年收之甚賤凶年出之振飢此又思其次之良規到得平糴之政不講一切趣辦之政君子不幸遇凶荒之年不得已而講要之非常行使平糴之法常行則穀價不貴四民各安其居不至於流散各可以自生飬至於移民移粟不過以餓殍之飬飬之而已若設糜粥其策又其下者王莽末年民愈貧困常苦枯旱穀價翔貴北邊及青徐地人相食雒陽以東米石二千莽遣三公將軍開東方諸倉振貸窮乏又分遣大夫謁者教民煮术為酪酪不可食流民入關者數十萬人置飬贍宫以廩之吏盜其廩飢死者十七八大抵荒政統而論之先王有預備之政上也使李悝之政修次也所在蓄積有可均處使之流通移民移粟又次也咸無焉設糜粥最下也雖然如此各有差等有志之士隨時理會便其民戰國之時要論三十年之通計此亦虛談則可以行平糴之法如漢唐坐視無策則移民通財雖不及先王亦不得不論又不得已而為糜粥之飬隨所遇之時就上面措置得有法亦可大抵論荒政統體如此今則所論可行者甚多試舉六七條且如漢載粟入關中無用傳宣帝本始四年嵗不登民以車船載穀入關毋得用傅出本紀後來販粟者免稅此亦可行之法此法一行米粟流通如後世勸民出粟散在鄉里以田里之民令豪户各出穀散而與之此一條亦可行又如富鄭公在青州處流民於城外所謂室廬措置種種有法當時寄居遊士分掌其事不以吏胥與於其間富鄭公自鄆移青會河朔大水民流京東公以為從來拯救當聚之州縣人既猥多倉廩不能供散以粥飯欺弊百端由此人多飢死死者氣薰蒸疾疫隨起居人亦致病弊是時方春野有青菜公出榜要路令飢民散入村落擇所部豐稔者三州勸民出粟得十五萬斛益以官廩隨所在貯之各因坊村擇寺廟及公私空屋又因山岩為窟室以處流民富民不得陂澤之利分遣寄居間官往主其事間有健吏募流民中有曾為吏胥走𨽻者皆給其食令供簿書給納守禦之役借民倉以貯擇地為場掘溝為限與流民約三日一支出納之詳一如官府公推其法於境內吏之所至手書酒炙之饋日至人人欣戴為之盡力比麥熟人給路糧遣歸餓死者無幾為大冢葬之謂之叢冢其間強壯堪為禁卒者募得數千人奏乞撥充諸軍自是天下流民處多以青州為法又如趙清獻公在會稽不減穀價四方商賈輻輳出言行録熙寧中以大資政知越州兩浙旱蝗米價踴貴餓死者十五六諸州皆榜衢路禁人增米價公獨榜衢路令有米者曽價糶之於是諸州米商輻輳詣越米價更賤民無餓死者此一條亦是可行之法凡六七條皆近時可舉而行者自此推之不止六七條亦見歷世大綱須要參酌其宜於今者大抵天下事雖古今不同可行之法古人皆施用得遍了今但則舉而措之而已今所論荒政如平糴之政條目尤須講求自李悝平糴至漢耿夀昌為常平倉元帝以後或廢或罷到宋朝遂為定制仁宗之世韓魏公請罷鬻沒官之田募人承佃為廣惠倉散與鰥寡孤獨慶歷嘉祐間既有常平倉國朝淳化三年置景德三年於京西河北河東陜西淮南兩浙置天禧四年詔益梓夔州荆湖南北廣南東西路並置又有廣惠廣濟倉賑恤所以仁宗德澤洽於民三倉蓋有力至王荆公用事常平廣惠量可以支給盡糶轉以為錢變而為青苗取三分之息百姓遂不聊生廣惠之田賣盡熙寧二年制置三司條例司言乞令河南京東淮南轉運司施行常平廣惠倉出納乃預備之法廣惠倉斛斗除依律合支老疾乞丐人據數量苗其餘並令常平倉監官通管一般轉易其兩倉見錢依陜西出俵青苗錢例每於夏秋未熟以前召人户請領令隨稅送納斛斗內有願請本色斛斗或納時價貴願納見錢皆聽仍於京東淮南河西三路先行此法措置四年詔賣廣惠倉田雖得一時之利要之竟無根底元祐間雖復章惇又繼之三倉又壞論荒政者不得不詳考髙宗建炎元年詔勸誘富豪出粟米濟糶飢民賞各有差糶及三千石以上與守闕進義校尉一萬五千石以上與進武校尉二萬石以上取旨優異推賞已有官蔭不願補授名目當比類施行紹興二十八年浙東西田苗損於風水詔出常平米賑糶更令以義倉賑濟在法水旱檢放及七分以上者濟之詔自今及五分處即撥義倉米賑濟孝宗隆興二年霖雨害稼出內帑銀四十萬兩付户部變糴以濟之其年淮民流於江浙十數萬官司雖濟而米斛有限乃詔民間不曾經水災處占田萬畝者糶三千石萬畝以下糶一千石三年臣僚言日前富家放貸約米一斗秋成還錢五百其時米價既平糶四斗始克償之農民豈不重困詔應借貸米穀只還本取利不過五分七年中書門下省言湖南江西旱傷立賞格以勸積粟之家凡出米賑濟係崇尚義風不與進納同無官人一千石補進義校尉願補不理選限將仕郎者聽以上補官或進士則免文解及補上州文學迪功郎各有差文臣一千石減二年磨勘選人轉一官以上循資及占射差遣有差武臣亦如之五千石以上文武臣並取旨優與推恩臣僚言諸路旱傷乞以展放展閣責之運司糴給借貸責之常平司覺察妄濫責之提刑司體量措置責之安撫司上諭宰執曰轉運只言檢放一事恐他日賑濟之類必不肯任責虞允文奏曰轉運司管一路財賦謂之省計凡州郡有餘不足通融相補正其責也淳熙八年詔支會子二十二萬併浙東路常平義錢內支一十萬貫付提舉朱熹措置賑糶十年江東憲臣尤袤召入言東南民力凋弊中人之家至無數月之儲前年旱傷江南之南康江西之興國俱是小壘南康飢民一十二萬二千有竒興國飢民七萬二千有竒且祖宗盛時荒政著聞者莫如富弼之在青州趙抃之在會稽在當時已是非常之災夷考其實則青州一路飢民止十五萬幾及南康一軍之數會稽大郡飢民才二萬二千而已以興國較之已是三倍至於賑贍之米弼用十五萬抃用三萬六千今江東公私合力賑救為米一百四十二萬去歲江西賑濟興國一軍除民間勸誘所得出於官者自當七萬其視青州一路會稽一郡所費實相倍蓰則知今日公私誠是困竭不宜復有小歉國家水旱之備止有常平義倉頻年旱暵發之略盡今所以為預備之計唯有多出緡錢廣儲米斛而已又言救荒之政莫急於勸分昨者朝廷立賞格以募出粟富家欣然輸納故庚子之旱不費支吾者用此策也自後輸納既多朝廷吝於推賞多方沮抑或恐富家以命令為不信乞詔有司施行浙東提舉朱熹與丞相王淮書曰今上自執政下及庶僚內而侍從外而牧守皆可以交結附託而得明公不此之愛而顧愛此迪功文學承信校尉十數人之賞以為重惜名器之計愚亦不知其何説也大抵朝廷愛民之心不如惜費之甚是以不肯為極力救民之事明公憂國之念不如愛身之切是以但務為阿諛順旨之計此其自謀可謂盡矣然自旁觀論則亦可謂不思之甚也寧宗嘉定二年起居郎賈從熟言出粟賑濟賞有常典多者至命以官固足示勸然應格霑賞者未有一二偏方小郡號為上户者不過常産耳今不必盡責以賑濟但隨力所及或糶或貸廣而及於一鄉狹而及於一都有司核實量多寡與之免役一次少者一年或半年庶幾官不失信民必樂從從之文獻通考卷二十六
