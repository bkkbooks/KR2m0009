body:
  text: 文獻通考卷四十七鄱陽馬端臨貴與著職官考一官制總序伏犧氏以龍紀故為龍師名官師長也龍化其官長故為龍師春官為青龍夏官為赤龍秋官為白龍冬官為黑龍中官為黄龍張晏曰庖犧氏將興神龍負圖而至因以名師與官也共工氏以水紀故為水師水名共工氏以諸侯霸有九州者以受水瑞故水名官神農氏以火紀故為火師火名火徳也故為炎帝春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火也神農有火星之瑞因以名師與官也黄帝雲師雲名黄帝受命有雲瑞故以雲紀事春官為青雲夏官為赤雲秋官為白雲冬官為黑雲中官為黄雲也黄帝有景雲之應因以名師與官也少皥摯之立也鳯鳥適至故鳥紀為鳥師而鳥名鳯鳥氏歴正也鳯鳥知天時故以為歴正之官元鳥氏司分也元鳥燕也以春分來秋分去伯趙氏司至也伯趙伯勞也以夏至鳴冬至止青鳥氏司啓也青鳥鶬鷃也以立春鳴立秋止鷃音晏丹鳥氏司閉也丹鳥鷩雉也以立秋來立冬去入大水為蜃以上四鳥皆歴正之屬祝鳩氏司徒也祝鳩䳡鳩也䳡鳩孝故為司徒主教民鴡鳩氏司馬也鴡鳩王鴡也摯而有别故為司馬主法制鳲鳩氏司空也鳲鳩鴶鵴也鳲鳩平均故為司空平水土鳲音尸鴶音秸鵴音菊爽鳩氏司寇也爽鳩鷹也摯故為司寇主賊盗鶻鳩氏司事也鶻鳩鶻鵰也春來冬去故為司事鶻音骨鵰音陟交反似山鵲而小至春多聲五鳩鳩民者也鳩聚也治民尚聚故以鳩為名五雉為五工正五雉雉有五種西方曰鷷雉東方曰鶅雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉利器用正度量夷民者也夷平也九扈為九農正扈止也止人使不淫放也扈有九種春扈鳻鶞夏扈切元秋扈切藍冬扈切黄棘扈切丹行扈唶唶宵扈嘖嘖桑扈切脂老扈鴳鴳以九扈為九農之號各隨其宜以教民事者也鶞音勅倫反唶子夜反嘖壯革反自顓頊以來不能紀遠乃紀於近為民師而命以民事徳不能致遠瑞始以民事命官此郯子對魯昭公之辭仲尼聞之曰吾聞之天子失官學在四夷乃見於郯子而學之又有五行之官是謂五官社稷五祀是尊是奉五官之君長能修其業者死配食於五行之神為王者所尊奉春官木正曰勾芒正官長也取木生勾曲而有芒角其祀重也夏官火正曰祝融祝融明貌也其祀黎也秋官金正曰蓐收秋物摧蓐而可收也其祀該也冬官水正曰元㝠水陰而幽㝠其祀修及熙焉中官土正曰后土土為羣物主故稱后也其祀勾龍焉在家則祀中霤在野則祀社唐堯之代命羲和欽若昊天歴象日月星辰敬授人時重黎之後羲氏和氏世掌天地四時之官故堯命之使敬順昊天昊天言元氣廣大星四方中星辰日月所㑹歴象其分節敬記天時以授人也此舉其目下别序之分命羲仲宅嵎夷曰暘谷宅居也東表之地稱嵎夷𤾉明也日出於谷而天下明故稱𤾉谷𤾉谷嵎夷一也羲仲居治東方之官寅賔出日平秩東作寅敬賔導秩序也歲起於東而始就耕謂之東作東方之官敬導出日平均次序東作之事以務農也申命羲叔宅南交申重也南交言夏與春交舉一隅以明之此居治南方之官平秩南訛敬致訛化也掌夏之官平序南方化育之事敬行其教以致其功四時同之亦舉一隅分命和仲宅西曰昧谷昧㝠也日入於谷而天下㝠故曰昧谷昧谷曰西則嵎夷東可知此居治西方之官掌秋天之政寅餞納日平秩西成餞送也日出言導日入言送因事之宜秋西方萬物成平序其政助成物也申命和叔宅朔方曰幽都平在朔易北稱朔亦稱方言一方則三方見矣北稱幽則南稱明從可知也都謂所聚也易謂歲改易於北方平均在察其政以順天常上總言羲和敬順昊天此分别仲叔各有所掌允釐百工庶績咸熙允信釐治工官績功咸皆熙廣也言定四時成歲歴以告時授事則能治百官衆功皆廣歎其善内有百揆四岳四岳分主四方諸侯者也周禮正義曰四岳四時之官主四岳之事始羲和之時主四岳者謂之四伯至其死分岳事置八伯皆王官其八伯唯驩兠共工放齊鯀四人而已餘四人無文可知故書傳云惟元祀巡狩四岳八伯堯始以羲和為六卿春夏秋冬者并掌方岳之事是為四岳出則為伯其後稍死分置八伯以九州而言八伯者據畿外八州也畿内不置伯以鄉遂之吏主之四岳之外更有百揆之官者但堯初天官為稷至堯試舜天官之任謂之百揆舜又命禹為百揆皆天官也外有州牧侯伯外置州牧十二及五國之長按陶唐氏以前之官所治者天事也虞夏以後之官所治者民事也太古法制簡略不可得而詳知然以經傳所載考之則自伏犧以至帝堯其所命之官大率為治歴明時而已蓋太古洪荒歩占之法未立天道幽遠非有神聖之德者不足以知之而位天地育萬物定四時成歳功乃君相職業一大事月令其帝太皥其神勾芒鄭氏注以為此蒼精之君木官之臣自古以來著德立功是也蓋此數聖人者生則知四時之事殁則為四時之神然太皥炎帝少皥顓頊所歴者四時而勾芒祝融蓐收元㝠后土則顓頊之時始有此五人者並世而生能任此五官之事至帝堯時則占中星之法置閏餘之法漸已著明然其命官猶以羲和為第一義自是四子之後世守其法居其官至舜攝政之時雖以在璿璣玉衡齊七政為首事然分命九官則皆以治民而未嘗及天事蓋累聖相承其法至堯而備世官自足以掌之不必别求賢哲之輔以專其任也三代官制至周而尤詳然觀成王所以命官若三公三孤則僅有爕理隂陽寅亮天地二語為天事而冢宰以下俱民事也然尚承襲上古之官名而所謂六官則天官掌治地官掌教春官掌禮夏官掌兵秋官掌刑冬官掌土略不及天地四時之事至於馮相氏保章氏挈壺氏則不過三百六十屬吏之一蓋至是而治天事之官事冞易而秩冞卑矣虞舜有天下以伯禹作司空使宅百揆禹代鯀為崇伯入為天子司空治洪水有成功言可用之棄后稷播百穀契作司徒敷五教布五常之教臯繇作士正五刑士理獄官垂作共工利器用垂臣名共謂供其百工職事伯益作虞育草木鳥獸虞掌山澤之官伯夷秩宗典三禮秩序宗尊也三禮天地人之禮伯夷臣名姜姓䕫典樂教胄子胄長也謂元子以下至卿大夫子弟以歌詩蹈之舞之教長國子中和秪庸孝友和人神命䕫使勉之龍作納言出納帝命納言喉舌之官聼下言納於上受上言宣於下必以信蓋亦為六官以主天地四時也崔靈恩曰自顓頊以來命南正重司天北正黎司地故重黎之後世掌天地官號曰羲和唐堯受之乃置天地四時之官命羲和之後使復舊職而掌天地之事又分命羲仲羲叔和仲和叔使主四時為六卿之任及其末年舜攝百揆改地官為司徒秋官為士冬官為司空春官為秩宗故尚書曰乃命羲和欽若昊天分命和仲和叔等使主四時之事又云百姓不親五品不遜契為司徒敬敷五教地官之事也臯繇作士五刑有服秋官之任也禹作司空以平水土冬官之職也伯夷為秩宗典朕三禮此春官之所司也又周禮正義曰稷為天官羲和為夏官共為六官夏后氏之制亦置六卿甘誓曰乃召六卿是也其官名次猶承虞制禮記曰夏后氏官百天子有三公九卿二十七大夫八十一元士殷制天子建天官先六太曰太宰太宗太史太祝太士太卜典司六典典法也此蓋殷時制也周制太宰為天官大宗曰宗伯宗伯為春官太史以下屬焉太士以神仕者天子之五官曰司徒司馬司空司士司寇典司五衆衆謂羣臣也此亦殷時制也周制司士屬司馬太宰司徒宗伯司馬司寇司空為六官天子之六府曰司土司木司水司草司器司貨典司六職府主藏六物之稅此亦殷時制也周制皆屬司徒司土土均也司木山虞也司水川衡也司草稻人也司器角人也司貨丱人也丱咅革猛反天子之六工曰土工金工石工木工獸工草工典制六材此亦殷時制也周制皆屬司空土工陶旊也金工築冶鳬㮚鍜桃也石工玉人磬人也木工輪輿弓廬匠車梓也獸工函鮑韗韋裘也唯草工職亡蓋謂作萑葦之器韗音吁援反旊音方往反五官致貢曰享貢功也享獻也致其歳終之㓛於王謂之獻也太宰歳終則令百官府各正其治受其會聼其致事而詔王廢置也五官之長曰伯謂為三公也周禮九命作伯千里之内為王畿千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯屬連卒州猶聚也伯帥正亦長也凡長皆因賢侯為之殷之州長曰伯虞夏及周皆曰牧八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯老謂上公周成王既黜殷命參考殷官制為周禮以作天地四時之名謂之六卿改太宰為天官冢宰太宗為春官宗伯司徒為地官司馬為夏官司寇為秋官司空為冬官立天官冢宰掌邦治地官司徒掌邦教春官宗伯掌邦禮夏官司馬掌邦政秋官司寇掌邦刑冬官司空掌邦事六官之職皆總屬於冢宰故論語曰君薨百官總已以聽於冢宰爾雅曰冡大也冢宰則太宰於百官無所不主各有徒屬周於百事崔靈恩曰王者之興須變人情必有改官之禮周禮所以興也歲終天子齋戒受諫諫當所有改為六卿以百官之成質於天子質猶平也平其計要百官齋戒受質受平報也然後休老勞農享食之也成歳事斷計要也制國用自周衰官失而百職亂戰國並爭各有變易秦兼天下建皇帝之號立百官之職不師古始罷侯置守太尉主五兵丞相總百揆又置御史大夫以貳於相漢初因循而不革隨時宜也其後頗有所改孟康注漢書曰大司馬左右前後將軍侍中常侍散騎諸吏為中朝丞相以下至六百石為外朝王莽簒立慕從古官而吏民弗安亦多虐政遂以亂亡當更始之時官爵皆羣小賈豎語曰竈下養中郎將爛羊胃騎都尉爛羊頭關内侯光武中興務從節約并官省職費減億計後漢建武六年詔曰百姓遭難户口耗少而官吏尚繁於是司𨽻州牧條奏并省四百餘縣吏職減損十置其一廢丞相與御史大夫而以三司綜理衆務洎於叔世事歸臺閣論道之官備員而已魏與呉蜀多依漢制晉氏繼及大扺畧同山公啓事曰晉制諸坐公事者皆三年乃得叙用其中多有好人今逍遙無事臣以為畧依左遷法隨資裁減之亦足懲戒而官不失其用詔善之又傅元奏曰諸官有病滿百日不差宜令去職優其禮秩既差而復用泰元六年改制減費損吏士職員凡七百人時議省州郡縣半吏以赴農功荀朂議以為省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清靜此清心也漢文垂拱幾致刑措此省事也光武并合吏員縣官國邑纔置十一此省官也魏太和中遣王人四出減天下吏員正始中亦并合郡縣此省吏也今必欲求之於本則宜以省事為先設官分職委事責成量能授任思不出位若欲省官竊謂九寺可并於尚書蘭臺宜省付三府至東晉桓温又表曰愚謂門下三省祕書著作通可减半古以九卿綜事不專尚書今事歸内臺則九卿為虛設皆宜省并若郊廟籍田之屬臨時權兼事訖省矣爰及宋齊亦無改作宋時制新長吏以父母疾去官禁錮三年山隂令沈叔在父疾去職御史中丞鄭鮮之上議曰所以為其制者涖官不久則奔競互生故杜其欲速之情以申考績之實耳今父母之疾而加以罪名損義疾理莫此為大詔從之於是自二品以上父母及為祖父母後者墳墓崩毁及疾病放屬輙去並不禁錮官司有三臺五省之號三臺蓋兩漢舊名五省謂尚書中書門下祕書集書省也郡縣有三歲為滿之期宋州郡縣居職以三周為小滿梁武受終多遵齊舊然而定諸卿之位分配四時說在列卿中置戎秩之官百有餘號武帝時置百二十五號將軍為二十四班陳遵梁制不失舊物陳依梁制年未滿三十者不得入仕唯經學生䇿試得第諸州迎主簿西曹左奏及經為挽郎得仕必有奇才異行殊勲别降恩㫖敘用者不在常例其官唯論清濁從濁得微清即勝於遷後魏昭成之即王位初置官司分掌衆職以燕鳳為右長史許議為郎中令然而其制草創名稱乖疎皇始元年道武平并州始建臺省置百官封公侯將軍刺史太守尚書郎等官悉用文人天興中太史言天文錯亂當改王易政故官號數革初道武制官皆擬遠古雲鳥之義諸曹走使謂之鳬鴨取飛之迅疾也以伺察候宫禁謂之白鷺取其延頸遠視他皆𩔖此至孝文太和中王肅來奔為制官品百司位號皆准南朝改次職令以為永制凡守令以六年為滿後經六年乃敘又作考格以之黜陟又宣武帝行考陟之法任事上中者三年升一階散官上第者四載登一級孝明以後授受多濫自明帝孝昌以後天下多難刺史太守皆為當部督雖無兵事並立佐僚所在頗為煩擾及東魏靜帝時齊神武作相高隆之表請自非實在邊要見有兵馬者悉皆斷之又時諸朝貴多假常侍以取貂蟬之餙隆之自表解侍中并陳諸假侍服者請亦罷之又自軍國多事冒竊官者不可勝數隆之奏請撿括得五萬餘人而羣小喧囂隆之懼而止北齊創業亦遵後魏臺省位號多𩔖江東以門下省掌獻納諫正中書省管司王言祕書省典司經籍集書省掌從容諷議中常侍省掌出入門閤御史臺察糾彈劾後主臨御爵祿犬馬御馬及犬乃有儀同郡公之號籍以旃罽食物十餘種其宫婢閹人商人胡人雜户歌舞人見鬼人濫富貴者萬數至末年太宰三師大司馬大將軍三公等官並增員而授或二或三不可稱數後周之初據關中猶依魏制及平江陵之後别立憲章酌周禮之文建六官之職其他官亦兼用秦漢他官謂將軍都督刺史太守之𩔖隋文帝踐極百度伊始復廢周官還依漢魏其於庶僚頗有損益凡官以四考而代又制凡官以理去職聽並執笏至煬帝初存稽古多復舊章百官不得計考增級如有徳行功能灼然顯著者擢之大業三年始行新令有三臺五省五監十二衞十六府殿内尚書門下内史祕書五省也謁者司𨽻御史三臺也少府長秋國子將作都水五監也左右翊左右驍左右武左右屯左右禦左右候十二衞也左右備身左右監門等凡十六府也或是舊名或是新置諸省及左右衞武候領軍監門府為内官自餘為外官於時天下繁富四方無虞衣冠文物為盛矣既而漸為不道百度方亂號令日改官名月易圖籍散逸不能詳備唐職員多因隋制雖小有變革而大較不異高祖制文官遭父母喪者聼去職貞觀六年大省内官凡文武定員六百四十有二而已顯慶元年初制拜三師三公親王尚書令雍州牧開府儀同三司驃騎大將軍左右僕射並臨軒册授太子三少侍中中書令諸曹尚書諸衞大將軍特進鎭軍輔國大將軍光禄大夫太子詹事太常卿都督及上州刺史在京者朝堂受冊又制文武官五品以上老及病不因罪解者並聽同致仕例龍朔二年又改京司及百官之名改尚書省為中臺門下省為東臺中書省為西臺其餘官司悉改之咸亨元年復舊至於武太后再易庶官或從宜創號改尚書省為文昌臺門下省為鸞臺中書省為鳯閣御史臺為肅政臺及諸寺衞等名又置控鶴府宫員或參用古典改六尚書為天地四時之官天授二年凡舉人無賢不肖咸加擢拜大置試官以處之試官蓋起於此也試者未為正命凡正官皆稱行守其階高而官卑者稱行階卑而官高者稱守官階同者並無行守字太后務收物情其年二月十道使舉人并州石艾縣令王山耀等六十一人並授拾遺補闕懷州錄事參軍崔獻可等二十四人並授侍御史并州錄事參軍徐昕等二十四人並授著作郎魏州内黄縣尉崔宣道等二十二人並授衞佐校書御史等故當時諺曰補闕連車載拾遺平斗量杷推侍御史椀脫校書郎試官自此始也於時擢人非次刑網方密雖驟歴榮貴而敗輪繼軌神功元年制曰自今本色出身解天文者進轉官不得過太史令音樂者不得過太樂鼓吹署令醫術者不得過尚藥奉御隂陽卜筮者不得過太卜令解造食者不得過司膳寺諸署令又制其有從勲官品子流外國官參佐視品等出身者自今不得任京清顯要等官若累階應至三品者不得進階每一階酬勲兩轉如先有上柱國者聽廻授朞以上親必有異行奇材别立殊效者不拘此例神龍初官復舊號凡武太后所改之官二年三月又置員外官二千餘人國初舊有員外官至此大增加兼超授諸閹官為員外官者亦千餘人中書令李嶠初自地官尚書貶通州刺史至是召拜吏部侍郎嶠志欲曲行私惠求名悅衆冀得重居相位乃奏請六置員外官多引用勢家親識至是嶠又自覺銓衡失序官員倍多府庫由是減耗於是遂有員外員外官其初但云員外至永徽六年以蔣孝璋為尚藥奉御員外特置仍同正員自是員外官復有同正員者其加同正員者唯不給職田耳其祿俸賜與正官同單言員外者則祿俸減正官之半檢校試攝判知之官攝者言勅攝非州府版署之命檢校者云檢校某官判官者云判某官事知者云知某官事皆是詔除而非正命逮乎景龍官紀大紊復有斜封無坐處之誦興焉景龍中有太平安樂長寧宜城等諸公主及上官氏與其母沛國夫人鄭氏上官柴氏賀婁氏女巫隴西夫人趙氏皆樹用親識亦多猥濫或出身臧獲或由於屠販多因賂貨累居榮秩咸能别於側門降墨勅斜封以授焉故時人號為斜封官時既政出多門遷除甚衆自宰相至於内外員外官及左右臺御史多者則數踰十倍皆無㕔事可以處之故時人謂之三無坐處謂宰相御史及員外官也先天以來始懲其弊元宗御極宰相姚元崇宋璟兼吏部尚書大革姦濫十去其九時有殿中侍御史崔涖太子中允薛昭諷帝曰先朝所授斜封官恩命已布而姚元崇宋璟等沮先帝之明歸怨陛下道路謗讟天下稱寃奈何與萬人為仇敵恐有非常之變上以為然乃下詔曰諸縁斜封别勅授官先令停任官並量材敘用監察御史柳澤又上疏極言不可其斜封官得免罪戾已沐恩私旬月之内頻煩降㫖前勅令至冬處分後勅又令替人却停將何以止姦邪將何以懲風俗至開元二十五年刋定職次著為格令此格皆武徳貞觀之舊制永徽初已詳定之至開元二十五年再刪定焉至二十八年又省文武六品以下官三百餘員及諸流外番官等蓋尚書省以統會衆務舉持繩目門下省以侍從獻替規駮非宜中書省以獻納制册敷揚宣勞祕書省以監錄圖書殿中省以供修膳服内侍省以承㫖奉引尚書門下中書祕書殿中内侍凡六省御史臺以肅清僚庶九寺太常光禄衞尉宗正太僕大理鴻臚司農大府為九寺五監少府將作國子軍器都水為五監以分理羣司六軍左右羽林左右龍武左右神武為六軍十六衞左右衞左右驍衞左右武左右威左右領軍左右金吾左右監門左右千牛為十六衞以嚴其禁禦一詹事府二春坊有左右春坊又有内坊掌閤内諸事三寺家令寺率更寺太僕寺十率左右衞左右司禦左右清道左右監門左右内侍凡十率府俾乂儲宫牧守督䕶分臨畿服京府置牧餘府州置都督都䕶太守設官以經之置使以緯之按察採訪等使以理州縣節度團練等使以督府軍事租庸轉運鹽鐵青苖營田等使以毓財貨其餘細務因事置使者不可悉數其轉運以下諸使無適所治廢置不常故不别列於篇自六品以下率由選曹居官者以五歲為限於是百司具舉庶績咸理亦一代之制焉一歲為一考四考有替則為滿若無替則五考而罷六品以下吏部注擬謂之㫖授五品以上則皆勅除自至徳之後天下多難甄才錄效制勅特拜繁於吏部於是兼試員外郎倍多正員至廣徳以來乃立制限州縣員外兼試等官各有定額並云額内溢於限者不得視職其有身𢃄京官冗職資名清美兼州縣職者云占闕焉即如正員之例官以三考而代無替四考而罷由是官有常序焉唐自太宗時已有員外置其後又有特置同正員至於檢校兼守判知之𩔖皆非本制又有置使之名或因事而置事已則罷或遂置而不廢其名𩔖繁多莫能徧舉肅代以後盗賊兵興府庫無蓄積朝廷專以官爵賞功諸將出征皆給空名告身自開府特進列卿大將軍下至中郎將聽臨事注名其後又聽以信牒授人官爵有至異姓王者諸軍但以職任相統攝不復計官資高下及清渠之敗復以官爵授散卒由是官爵輕而貨重大將軍告身一通纔易一醉凡應募入軍者一切衣金紫至有朝士僮僕衣金紫稱大官而執賤役者名器之濫至是而極張廵在雍邱纔領一縣千兵而大將六人官皆開府特進徳宗避難於奉天渾瑊之童奴曰黄岑力戰即封渤海郡王至於僖昭之世遂有促船郭使君看馬李僕射之號徳宗幸梁州在道民有獻瓜菓者上欲試以散官陸贄言軍興以來財賦不足以供賜而職官之賞興焉方今之病在於爵輕設法貴之猶恐不重若又自棄何以勸人夫誘人之方惟名與利名近虛而於教為重利近實而於徳為輕專實利而不濟之以虛則耗匱而物力不給專虛名而不副之以實則誕慢而人情不趨夫突銛鋒排患難者則以是賞之竭筋力展勤効者又以是酬之若獻瓜菓者受試官則彼人將曰吾以忘軀命獲官而彼以獻瓜菓得官是乃國家以吾之軀命同之瓜菓矣宋朝設官之制名號品秩一切襲用唐舊然三師三公不常置宰相不專用三省長官中書門下並列於外又别置中書於禁中是謂政事堂與樞密院對掌大政天下財賦内庭諸中外筦庫悉𨽻三司中書省但掌冊文覆奏考帳門下省主乗輿八寳朝會位版流外較考諸司附奏挾名而已臺省寺監官無定員無專職悉皆出入分莅庶務故三省六曹二十四司互以他官典領雖有正官非别勅不治本司事事之所寄十亡二三故中書令侍中尚書令不與朝政侍郎給事不領省職左右諫議無言責而起居郎起居舍人不執記事之筆中書常闕舍人門下罕除常侍補闕拾遺改為司諫正言而非特㫖供職亦不任諫諍至於僕射尚書丞郎郎中員外居其官不知其職者十常七八祕書殿中二省名存實廢惟内侍所掌猶髣髴故事九寺五監尤為空官六統軍十六衞每遇大禮朝會但遣官攝事以備儀範天聖中始以環衞官補宗室子東宫官不常置公主無邑司節度使不食本鎭租賦藩府除授雖帯都督之名而實不行都督之事京府以及四方大鎭皆有牧尹而𩔖非親王不除諸路無觀察採訪而觀察防禦團練刺史特以為右列叙遷之寵雖有正任遙領大率不親本州之務諸司使副有東班西班又有横班横班之有職事者獨閤門客省四方館畧有典掌其他悉無所領此其大槩也至於官人授受之别則有官有職有差遣官以寓禄秩叙位著職以待文學之選而差遣以治内外之事其次又有階有勲有爵故士人以登臺閣陞禁從為顯宦而不以官之遲速為榮滯以差遣要劇為貴途而不以階勲爵邑有無為輕重時人為之語曰寧登瀛不為卿寧抱槧不為監虛名之不足砥礪天下也如此自眞宗仁宗以來議者多以正名為請咸平中楊億首言文昌會府有名無實宜復其舊既而言者相繼乞復二十四司之制至和中呉育亦言尚書省天下之大有司而廢為閒所當漸復之然朝論異同未遑釐正神宗即位慨然欲更其制熙寕末始命館閣校唐六典元豐三年以摹本賜羣臣乃置局中書命翰林學士張璪等詳定八月下詔肇新官制凡省臺寺監領空名者一切罷去而易之以階九月詳定所上言寄祿會明堂禮成近臣遷秩即用新制而省臺寺監之官各還所職矣五年省臺寺監法成六年尚書新省成帝親臨幸召六曹長貳以下詢之職事因戒敕焉初新階尚少而轉行者易以混雜及元祐初於朝議大夫六階以上始分左右既又以流品無别乃詔寄禄官悉分左右詞人為左餘人為右紹聖中罷之崇寧初以議者有請自承直至將仕郎凡換選人七階大觀初又增宣奉至奉直大夫四階政和末自從政至迪功郎又改選人三階於是文階始備而武階亦詔易以新名正使為大夫副使為郎而横班十二階使副亦然故有郎官大夫之首者繼又以新名未具增置宣正履正大夫郎凡十階通為横班而文武官制益加詳矣大抵自元祐以後漸更元豐之制二府不分班奏事樞密加置簽書徽省則既罷復建户部則不領右曹專典常平而總於其長起居郎舍人則通記起居而不分言動館職則增置校勘黄本凡此皆與元豐稍異也其後蔡京當國率意自用然動以繼志為言首更開封守臣為尹牧由是府分六曹縣分六案又内侍省職悉倣機庭之號已而修六尚局建三衙郎又更兩省之長為左輔右弼易端揆之稱為太宰少宰是時員既濫冗名且紊雜故官有視秩甚者走馬承受陞擁使華黄冠道流亦預朝品元豐之制至此大壞及宣和末王黼用事方且追咎元祐紛更乃請設局以修官制格目為名書未成而邊事起矣官數唐六十員虞六十員尚書云建官惟百鄭𤣥云虞官六十唐官未聞堯舜同道或皆六十并屬官而言則皆有百夏百二十員尚書云夏商官倍則二百鄭𤣥曰百二十殷二百四十員明堂位二百鄭𤣥曰二百四十周六萬三千六百七十五員内二千六百四十三人外諸侯國官六萬一千三十二人按禮記王制計之商制同右杜氏通典所載唐虞夏商之官員數往往以傳聞異辭故於注兩存之至周之官數則以為出於禮記王制今考之其所謂外諸侯官六萬一千三十二人者以王制云殷時天下諸侯國千七百七十三内大國二百四十九次國五百一小國一千二十三大國次國則皆三卿五下大夫二十七上士唯小國二卿其大夫與士如大國次國之數大凡列國卿大夫士有六萬一千三十二人其數是矣獨所謂内官二千六百四十三人者未知何據謹按周家之官數莫詳於周禮今以周禮太宰以下及其屬稽其員數之可考者除冬官一篇已亡無所稽據外而五官所掌其有命官而難考員數者如山虞每大山中士二人中山下士六人小山二人川衡每大川下士十二人之𩔖是也又有元無命官者如酒人漿人之為奄女御女祝之為女方相氏之為狂夫蠻𨽻罪𨽻之為徒𨽻是也若此之外則其數未嘗不昭然可考大槩為公者三人為卿者二十四人六官六六六卿六世婦宫十二中大夫共六十八人下大夫共二百九十三人上士共一千一百三十三人中士共四千五百三十六人下士共一萬九千二百零九人自公而至下士總計二萬五千二百六十六人此則周禮所載内官可考之數也與前數殊不脗合今姑具載其目於后以俟考訂之精詳者共評之周禮命官員數公鄉老每二鄉公一人鄭注王置六鄉則公有三人卿太宰一天官大司徒一地官鄉大夫每鄉卿一人注六鄉則卿六人各主一鄉之事然總屬司徒非六官兼鄉大夫也地官大宗伯一春官世婦每宫卿二人注王后六宫則十二人疏謂此為奄卿春官大司馬一夏官大司寇一秋官司空一冬官已亡不能知其官數員數然司空之為卿一人不言可知也右卿共二十四人中大夫小宰二司會二右天官共四人小司徒二師氏一州長每州一凡三十州計三十人遂大夫每遂一人六遂計六人遂人二右地官共四十一人小宗伯二大司樂二内史一右春官共五人小司馬二戎右二大馭二戎僕二校人二職方氏四右夏官共十四人小司寇二大行人二右秋官共四人右中大夫共六十八人下大夫宰夫四太府二司會四内宰二右天官共十二人鄉師四黨正每黨一人凡一百五十黨計一百五十人保氏一司市二司門二遂師四縣正每縣一人凡三十縣計三十人廪人二右地官共一百九十五人肆師四世婦每宫四人六宫當二十四人冢人二墓大夫二樂師四太師二大卜二太祝二太史二巾車二右春官共四十八人軍司馬四射人二司士二諸子二虎賁氏二太僕二司甲二司弓矢二齊右二齊僕二職方氏八右夏官共三十人士師四小行人四右秋官共八人右下大夫共二百九十三人上士宰夫八宫正二膳夫二醫師二太府四玉府二司㑹八司書二職内二職歳四職幣二内宰四内小臣奄上士四鄭注奄稱士者異其賢愚按此必奄官之受爵命如後來内侍省官之𩔖如酒人等只稱奄幾人則泛泛趨走之奄與府史等也右天官共計四十六人鄉師八族師每族一凡七百五十族計七百五十人載師二縣師二師氏二司市四泉府四司門四司關二掌節二遂師八鄙師每鄙一人凡一百五十鄙計一百五十人土均二稻人二廪人四舍人二右地官共九百四十八人肆師八天府一職䘮二樂師八小師四卜師四大祝四䘮祝二太史四内史四外史四巾車四都宗人二家宗人二右春官共五十三人輿司馬八司勲二掌固二候人六射人四司右二小臣四繕人二戎右二道右二道僕十二田僕十二校人四土方氏五右夏官共六十七人鄉士八職金二司儀八掌客二右秋官共二十人右上士共一千一百三十三人中士宰夫十六宫正四宫伯二膳夫四庖人四内饔四外饔四獸人四獻人二食醫二疾醫八酒正四宫人四玉府四内府二外府二司會十六司書四職内四職歲八職幣四司䘮二内宰八典婦功二右天官共一百十八人鄉師十六閭胥每閭一凡三千閭計三千人封人四鼓人六牛人二載師四閭師二縣師四遣人二均人二保氏二司諫二司救二司市八質人二㕓人二泉府