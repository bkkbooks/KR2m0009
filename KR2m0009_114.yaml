body:
  text: 文獻通考卷一百十四鄱陽馬端臨貴與著王禮考九后妃命婦以下首飾服章制度周官追師掌王后之首服為副編次追衡笄為九嬪及外内命婦之首服以待祭祀賓客鄭司農云追冠名副者婦人之首飾元謂副之言覆所以覆首為之飾其遺像若今歩摇矣服之從王祭祀編編列髮為之其遺像若今假紒矣服之以桑也次次第髮長短為之所謂髲髢服之以見王王后之燕居亦纚笄總而已追猶治也詩云追琢其章王后之衡笄皆以玉為之惟祭祀有衡垂於副之兩旁當耳其下以紞懸瑱詩云玼兮玼兮其之翟也鬒髮如雲不屑髢也玉之瑱也是也笄卷髮者内外命婦衣鞠衣襢衣者服編衣褖衣者服次外内命婦非王祭祀賓客佐侯之禮自於其家則亦降焉少牢饋食禮曰主婦纚笄宵衣是也昏禮女次純衣攝盛服耳主人爵弁以迎移袂褖衣之袂凡諸侯夫人於其國衣與王后同何疏曰按詩有副笄六珈謂以六物加於副上未知用物故鄭注詩云副既笄而加飾古之制所有未聞是也鄭必知三翟之首服副鞠衣展衣首服編褖衣首服次者王之祭服有六首服皆冕則后之祭服有三首服皆副可知陳氏禮書曰副者翟之配以配褘翟則禮所謂副褘是也以配揄翟則詩所謂副笄六珈其之翟也是也褖衣之配禮所謂女次純衣是也然則編為鞠衣展衣之配可知矣禮男子冠婦人笄男子免婦人髽婦人之飾不過以髮與笄而已則副之覆首若歩揺編之編髮若假紒次之次第其髮為髲髢云者蓋有所傳也莊子曰秃而施髢詩曰鬒髮如雲不屑髢也左傳曰衛莊公髠已氏之妻髮以為吕姜髢說文曰髲益髮也蓋髢所以益髮而鬒髮者不屑焉詩曰被之僮僮則被之不特髲髢也少牢曰主婦被錫衣移袂則被錫者非髲髢也鄭氏皆以為髲髢非是又曰婦人首飾副也編也次也纚笄也觀士昏禮女次純衣姆纚笄宵衣特牲禮主婦纚笄宵衣則副編次之下纚笄其飾也楚語司馬子期欲以妾為内子訪之左史倚相曰吾有妾而愿欲笄之其可乎蓋古之為妾者不笄士姆纚笄亦攝盛也鄭氏曰王后之燕居亦纚笄總而已此不可考内司服掌王后之六服褘衣揄狄闕狄鞠衣展衣褖衣素沙鄭司農曰褘衣是畫衣也祭統夫人副褘立於東房揄狄闕狄畫羽飾展衣白衣也䘮大記復者朝服君以卷夫人以屈狄世婦以襢衣屈音聲與闕相似襢與展相似皆婦人之服鞠衣黄衣也素沙白衣也元謂狄當為翟翟雉名伊雉而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰揺王后之服刻繒為之形而采畫之綴於衣以為文章褘衣畫翬者揄翟畫揺者闕翟刻而不畫此三者皆祭服從王祭先王則服褘衣祭先公則服揄翟祭羣小祀則服闕翟鞠衣黄桑服也色如鞠塵象桑葉始生月令三月薦鞠衣於上帝告桑事展衣以禮見王及賓客之服字當為襢䄠之為言亶亶誠也褖衣御於王之服亦以燕居男子之褖衣黒則是亦黑也六服備於此矣褘揄狄展聲相近縁字之誤也以下推次其色則闕狄赤揄狄青褘衣元婦人専尚一徳無所兼連衣裳不異其色素沙者今之白繒也六服皆袍制以白縳為裏使之張顯今世有沙縠者名出於此六疏曰素沙非服名六服之外别言之者此素沙與上服為裏使之張顯但婦人之服不殊裳上下連則此素沙亦上下連也王之吉婦有九韋弁以下常服有三與后鞠衣以下三服同但王之祭服有六后祭服唯三翟者天地山川社稷之等后夫人不與故三服而已辨外内命婦之服鞠衣展衣褖衣素沙内命婦之服鞠衣九嬪也展衣世婦也褖衣女御也外命婦者其夫孤也則服鞠衣其夫卿大夫也則服展衣其夫士也則服褖衣三夫人及公之妻則闕狄以下乎侯伯之夫人揄狄子男之夫人亦闕狄唯二王後褘衣以疏曰内外命婦不得有六服唯得鞠衣以下三服亦素沙為裏鄭必知九嬪以下服鞠衣以下者但九嬪下有世婦女御三等鞠衣以下服亦三等故知鞠衣以下者九嬪也展衣以下者世婦也褖衣者女御也玉藻王后褘衣夫人揄狄夫人三夫人亦侯伯之夫人也王者之後夫人亦褘衣疏曰三夫人與三公同對王為屈三公執璧與子男同則三夫人與子男夫人同故鄭注司命疑而不定云三夫人其闕狄以下乎為兩解之也云王者之後夫人亦褘衣者以禮記每云君衮冕夫人副褘王者之後自行正朔與天子同故祭其先王服上服也若祭先公則降焉魯祭先公則降焉魯祭文王周公其夫人亦褘衣故眀堂位云君衮冕立於阼階夫人副褘立於房中是也君命屈狄再命褘衣一命襢衣士褖衣君女君也屈周禮作闕謂刻繒為翟不畫也此子男之夫人及其卿大夫士之妻命婦也褘當為鞠字之誤也禮天子諸侯命其臣后夫人亦命其妻以衣服所謂夫尊於朝妻榮於室也疏曰君謂女君子男之妻也被后所命故云君命屈狄者屈闕也狄亦翟也直刻雉形闕其彩畫故云闕翟也冄命禕衣者冄命謂子男之卿禕當為鞠謂子男之卿妻服鞠衣也一命襢衣者襢展也子男大夫一命其妻則服展衣也所謂士褖衣者蓋謂子男士不命其妻服褖衣唯世婦命於奠繭其他則皆從男子奠猶獻也凡世婦已下蠶事畢獻繭乃命之以其服天子之后夫人九嬪及諸侯之夫人夫在其位則妻得服其服矣嬪疏曰凡獻物必先奠於地故云奠猶獻也三夫人九其位既尊不湏獻繭自然得命也世婦以下位卑用獻繭得命言以下則女御亦然經唯云世婦舉貴者陳氏禮書曰王之服襌而無裏后之服裏而不襌以陽成於竒而隂成於偶也崔靈恩謂王后三翟數皆十二王者之後諸侯夫人三公而下夫人雉數如命數於理或然屨人掌王及后之服屨與赤舄黑舄赤繶黄繶青句素屨葛屨王后吉服六唯祭有舄元舄為上褘衣之舄也下有青舄赤舄鞠衣以下皆屨耳黄繶者王后元舄之飾王及后之赤舄皆黒飾后之青舄白飾飾疏曰天元與地黄相對為繢次故知王后之元舄黄云王及后之赤舄皆黑飾后之青舄白飾者以舄皆對方以繢次為飾故義然也詳見王服舄注下辨外内命夫命婦之命屨功屨散屨注見王服舄注下飾正義曰褘衣元舄首副從王見先王揄狄青舄首服副從王見先公闕翟赤舄首服副從王見羣小祀鞠衣黄屨首服編以告桑之服襢衣白屨首服編以禮見王之服褖衣黑屨首服次以御於王之服后服六翟三等三舄元青赤鞠衣以下三屨黄白黑婦人質不殊裳屨舄皆同裳色也漢制太皇太后皇太后入廟幗簪珥珥耳璫垂珠也釋名云簪達也所以達官於後也一曰笄笄係也所以抅冠使不墜簪以瑇瑁為擿長一尺端為華勝上為鳳皇爵以翡翠為毛羽下有白珠垂黄金鑷左右一横簪之以安幗諸簪珥皆同制其擿有等級焉皇后謁廟假結歩揺簪珥歩揺以黄金為山題貫白珠為桂枝相繆一爵九華熊虎赤羆天鹿辟邪南山豐大特六獸詩所謂副笄六珈者詩傳曰副者后夫人之首飾編髮為之笄衡笄也珈笄飾之最盛者所以别尊卑也鄭元曰珈之言加也副既笄而加飾如今歩揺上飾古制未聞其南山豐大特按史記秦文公二十七年伐南山大梓豐大特徐廣注云今武都故道有怒特祠圖大牛上生樹木有牛從木中出後見於豐水中諸爵獸皆以翡翠為毛羽金題白珠璫繞以翡翠為華云貴人助蠶制大手髻黑瑇瑁又加簪珥長公主加歩揺公主大手髻皆有簪珥公卿列侯中二千石二千石夫人紺繒幗黄金龍首銜白珠魚須擿長一尺為簪珥太皇太后皇太后入廟服紺上皂下蠶服青上縹下皆深衣制徐廣曰則單衣也縹音疋繞反隠領袖緣貴人助蠶服純縹上下長公主見㑹自公主封君皆以上帶綬以采組為緄帶各如其綬色黄金辟邪首為帶鐍飾以白珠公卿列侯中二千石夫人入廟佐祭者服皁絹上下助蠶者縹絹上下自二千石夫人以上至皇后皆以蠶衣為朝服公主貴人妃以上嫁娶得服錦綺羅縠繒采十二色重緣袍特進列侯以上錦繒采十二色六百石以上重練采九色禁丹紫紺三百石以上五采青絳黄紅綠二百石以上四采青黄紅綠賈人緗縹而已緗布黄色魏制貴人夫人以下助蠶皆大手髻七䥖音奠蔽髻黑瑇瑁又加簪珥九嬪以下五䥖世婦三䥖諸王妃長公主大手髻七䥖蔽髻其長公主得有歩揺皆有簪珥公特進列侯卿校世婦以下夫人紺繒幗黄金龍首銜白珠魚須擿長一尺為簪珥其服制不依古法多以文繡晋依前代皇后首飾則髻歩揺簪珥歩揺以黄金為山題貫白珠為桂枝相繆八爵九華熊虎赤羆天鹿辟邪南山豐大特六獸諸爵獸皆以翡翠為毛羽金題白珠璫繞以翡翠為花皇后謁廟依前漢制服皁上縹下隠領袖緣元康六年詔以純青服助蠶之服純縹為上下自公主以上皆帶綬以采組為緄帶各如其綬色金辟邪首為帶玦公特進列侯世婦中二千石夫人入廟助祭者皁絹上下助蠶者緇絹上下自二千石以上至皇后皆以蠶衣為朝服宋依漢制太后入廟祭祀首飾翦氂幗皇后親蠶首飾假髻歩揺八爵九華加以翡翠復依晋法皇后十二䥖歩揺大手髻公主㑹見三夫人手髻七䥖蔽髻公夫人五䥖世婦三䥖其長公主得有歩揺公特進列侯夫人二千石命婦年長者紺繒幗太后皇后入廟服袿䙱圭屬大衣謂之褘衣公主㑹見封君以上皆帶綬以采為緄帶各如綬色公特進列侯夫人卿校世婦二千石命婦年長者入廟佐祭皁絹上下助蠶則青絹上下自皇后至二千石命婦皆以蠶衣為朝服按漢劉向曰古者天子至於士王后至於命婦必佩玉尊卑各有其制皇后至命婦所佩玉古制不存今與外同制齊因宋制公主㑹見大手髻不易舊法袿䙱用繡為衣裳黄綬貴嬪夫人貴人王太妃長公主封君皆紫綬六宫郡公侯夫人青綬陳因前制皇后首飾假髻歩揺簪珥歩揺並如晉制開國公侯太夫人夫人大手髻七䥖蔽髻九嬪及公夫人五䥖世婦三䥖其長公主得有歩揺公特進列侯卿校中二千石夫人紺繒幗黄金龍首銜白珠魚須擿長尺為簪珥皇后謁廟袿䙱大衣皁上皁下親蠶則青上縹下隠領袖緣貴妃嬪佩于闐玉獸頭鞶九嬪佩采玉瓄玉自二千石以上至皇后皆以蠶衣為朝服後魏天興六年詔有司始制冠冕各依品秩以示等差然未能皆得舊法北齊依前制皇后首飾假髻歩揺十二䥖八爵九華内命婦以上蔽髻唯以䥖數花釵多少為品秩二品以上金玉飾三品以下金飾内命婦左右昭儀三夫人視一品假髻九䥖三品五䥖蔽髻四品三䥖五品一䥖又有宫人女官第二品七䥖蔽髻三品五䥖四品三䥖五品一䥖七品大手髻八品偏髾音稍髻皇太子妃假髻歩揺九䥖郡長公主七䥖蔽髻太子良娣視九嬪女侍中五䥖内外命婦宫人女官從蠶各依品次還著蔽髻皇后助祭朝㑹以褘衣祠郊禖以揄翟小宴以闕翟親蠶以鞠衣禮見皇帝以展衣宴居以褖衣六服俱有蔽膝織成緄帶内外命婦以上從五品以上金章紫綬服揄翟雙佩山元玉九嬪視三品銀章青綬鞠衣佩水蒼玉世婦視四品銀印青綬展衣八十一御女視五品銅印墨綬褖衣又有宫人女官服闕翟三品鞠衣四品展衣五品六品褖衣七品八品九品青紗公服皇太子妃璽綬同皇太子服揄翟從蠶則青綬紗公服郡長公主王國太妃纁朱綬章服佩同内命婦一品郡長君元朱綬闕翟章佩與公主同郡君縣公主佩水蒼玉餘與郡長君同太子良娣九嬪服縣主青朱綬餘與良娣同女侍中假金印紫綬服鞠衣佩水蒼玉縣君銀蒼青朱綬餘與女侍中同太子孺子同世婦太子家人同御女鄉主鄉君素朱綬佩水蒼玉餘與御女同外命婦皆如其夫若夫假章印綬佩妻則不假一品二品服闕翟三品服鞠衣四品展衣五品緣衣内外命婦宫人從蠶則各依品次皆服青紗公服其外命婦綬帶鞶囊皆凖其夫公服之例百官之母詔加太夫人者朝服公服各與其命婦服同後周制皇后首飾花釵十有二樹諸侯之夫人亦皆以命數為之節三妃王公夫人以下又各依其命一命再命者俱以王為節后服十有二等其翟衣六從皇帝祀郊禖享先皇朝皇太后則服翬衣祭隂社朝命婦則服褕衣祭羣小祀受獻繭則服鷩衣採桑則服鳪衣黄色音卜從皇帝見賔客聽女教則服鵫衣白色音罩食命婦歸寜則服衣元色音祑俱十有二等以翬翟為領褾各有二臨婦學及法道門燕命婦有時見命婦則蒼衣春齋及祭還則青衣夏齋及祭還則朱衣採桑齋及採桑還則黄衣秋齋及祭還則素衣冬齋及祭還則元衣自青衣而下其褾領以相生之色諸公夫人九服其翟衣翟皆九等俱以褕翟為領褾各九自褕衣以下鷩鳪鵫朱黄素元等九也自朱衣而下其褾領亦用相生之色諸侯夫人自鷩衣而下八其翟衣翟皆八等俱以翟為褾領無褕衣諸伯夫人自鳪衣而下七其翟衣翟皆七等俱以鳪翟為領褾又無鷩衣諸子夫人自鵫衣而下六其翟衣翟皆六等俱以鵫翟為領褾又無鳪衣諸男夫人自衣而下五其翟衣翟皆五等俱以翟為領褾又無鵫衣三妃三公夫人之服九鳪衣鵫衣衣青衣朱衣黄衣素衣元衣絹衣其翟亦九等以鳪翟為領褾各九三孤之内子自鵫衣而下八翟皆八等以鵫翟為領褾各八九嬪六卿之内子自衣而下七翟皆七等以翟為領褾各七上媛上大夫之孺人自青衣而下六中媛中大夫之孺人自黄衣而下四御婉士之婦自素衣而下三中宫六尚緅子侯反衣諸命袟之服曰公服其餘常服曰私服隋因之皇后首飾花十二樹皇太子妃公主王妃三師三公及公夫人一品命婦並用九樹侯夫人二品命婦並八樹伯夫人三品命婦並七樹子夫人世婦及皇太子昭訓四品以上官命婦並六樹男夫人五品命婦並五樹女御及皇太子良娣三樹皇后以下小花並如大花之形皇后褘衣鞠衣青衣朱衣四等褘衣深青質織成領袖文以翬翟五采重行十二等素紗内單黼領羅縠褾襈色皆以朱蔽膝隨裳色以緅為緣用翟三章大帶隨衣裳飾以朱緣之錦青緣革帶青襪舄舄以金飾白玉佩元組綬章采尺寸同於乘輿祭及朝㑹大事服之鞠衣黄羅為質織成領袖蔽膝革帶及舄隨衣色餘凖禕衣親蠶服也青衣去大帶及佩綬金飾履禮見天子則服之朱服如青服有金璽盤螭鈕文曰皇后之璽冬正大朝則并璜琮各以笥貯進於座隅皇太后同后服而貴人以下並亦給印三妃服褕翟金章龜鈕文從其織成紫綬金縷獸頭鞶囊佩于闐玉九嬪服闕翟金龜鈕文從織成佩采瓄玉媫妤銀縷織成他如嬪服美人才人鞠衣銀印珪鈕獸爪鞶囊佩水蒼玉餘同寶林服展衣艾綬鞶囊佩玉同媫妤承衣刀人采女褖衣無印綬皇太子妃服揄翟衣九章金璽龜鈕素沙内單黼領羅襈色皆同朱蔽膝二章大帶同褘衣青緣革帶朱襪青舄舄加金飾佩瑜玉纁朱綬獸頭鞶囊凡大禮見皆服之唯侍親桑則用鞠衣佩綬與褕衣同良娣鞠衣銀印青綬獸爪鞶囊餘同世婦寶林八子展衣銅印佩水蒼玉艾綬諸侯王太妃妃長公主三公夫人一品命婦褕翟繡為九章佩山元玉獸頭鞶囊綬同夫色公夫人縣主二品命婦亦褕翟繡八章從親桑同鞠衣自此以下佩皆水蒼玉侯伯夫人三品命婦亦服褕翟繡為七章子夫人四品命婦服闕翟刻赤繒為翟綴衣上為六章男夫人五品命婦闕翟五章若從親蠶皆同鞠衣唐皇后之服三褘衣者受冊助祭朝㑹大事之服也深青織成為之畫翬赤質五色十二等素紗中單黼領朱羅縠褾襈蔽膝隨裳色以緅領為緣用翟為章三等青衣革帶大帶隨衣色裨紐約佩綬如天子青襪舄加金飾鞠衣者親蠶之服也黄羅為之不畫蔽膝大帶革帶舄隨衣色餘同褘衣鈿釵襢衣者燕見賓客之服也十一鈿服用雜色而不畫加雙佩小綬去舄加履首飾大小華十二樹以象衮冕之旒又有兩博鬢皇太子妃之服有三揄翟者受冊助祭朝㑹大事之服也青織成文為揺翟青質五色九等素紗中單黼領朱羅縠褾襈蔽膝隨裳色用緅為領緣以翟為章二等青衣革帶大帶隨衣色鈿釵禮衣者燕見賓客之服也九鈿其服用雜色制如鞠衣加雙佩小綬去舄加履首飾花九樹有兩博鬢命婦之服六翟衣者内命婦受冊從蠶朝㑹外命婦嫁及受冊從蠶大朝㑹之服也青質繡翟編次於衣及裳重為九等青紗中單黼領朱縠褾襈裾蔽膝隨裳色以緅為領緣加文繡重雉為章二等大帶隨衣色以青衣革帶青襪舄佩綬兩博鬢飾以寶鈿一品翟九等花釵九樹二品翟八等花釵八樹三品翟七等花釵七樹四品翟六等花釵六樹五品翟五等花釵五樹寶鈿視花樹之數鈿釵禮衣者内命婦常參外命婦朝參辭見禮㑹之服也制同翟衣加雙佩小綬去舄加履一品九鈿二品八鈿三品七鈿四品六鈿五品五鈿禮衣者六尚寶林御女采女女官七品以上大事之服也通用雜色制如鈿釵禮衣唯無首飾佩綬公服者常供奉之服也去中單蔽膝大帶九品以上大事常供奉亦如之半袖裙襦者東宫女史常供奉之服也公主王妃佩綬同諸王花釵禮衣者親王納妃所給之服也大袖連裳者六品以下妻九品以上女嫁服也青質素紗中單蔽膝大帶革帶韈履同裳色花釵履笄兩博鬢以金銀雜寶飾之庶人女嫁有花釵以金銀瑠璃塗飾之連裳青質青衣革帶韈履同裳色婦人燕服視夫百官女嫁廟見攝母服五品以上媵降妻一等妾降媵一等六品以下妾降妻一等宋朝皇后之服常服龍鳳珠翠霞帔其唐制三等褘衣鞠衣禮衣仍存其名太宗端拱二年禁婦人戴假髻非命婦不得服泥金銷金真珠装綴衣服仁宗㓜皇太后聽政天聖元年詔議皇太后禮服而太常禮院言開寶禮皇太后當禕衣以青衣革帶青綬舄白玉雙佩黑組雙大綬素紗中單蔽膝大帶首飾花十二株受冊親蠶朝㑹諸大事則服之又隨制后服四等其四曰朱衣以緋羅為之宴見賓客則服之今議每朝謁神御往還乘輦服朱衣而加蔽膝革帶大帶寶装綬佩襪金飾履悉如衣之色常視事去蔽膝革帶佩綬或衣鞠衣則以黄羅為之亦用寶装綬大帶履命内史周文質如所議以製至二年五月上之眀道元年詔以二月耕籍而皇太后恭謝於宗廟乃命王舉正李淑同禮官講籍田禮及皇太后謁廟儀禮官議謂皇太后宜凖皇帝衮服減二章衣去宗彛裳去藻下佩劍金龍花十六株前後垂珠翠各十二旒以袞衣為名詔名其冠曰儀天又言皇太后乘玉輅服褘衣九龍花釵冠行禮服袞衣冠儀天冠皇太妃皇后乗重翟車服鈿釵禮衣以緋羅為之具蔽膝革帶佩綬履其冠用十二株花釵太廟行禮並服褘衣詔可之敇有司製禮衣及重翟以下六車太后遂以車服謁太廟天聖三年令命婦許以金為首飾及為釵蔘釧纒珥環毋得為牙魚飛魚竒巧飛動若龍形其用銀毋得塗金非命婦之家毋得衣珠玉凡帷帟幙幔簾旌牀襦毋得純錦徧繡慶歴二年詔曰朕躬至儉之化以率天下何廼流俗尚淪奢薄浮華相趋蠧用罙廣銷潰珍寶變夸服裳效魚龍之飾奸輿輦之制積踰法度公冐典刑頃在先朝嘗詔執事者嚴為之禁仍開購賞用警弗率比年亦嘗申飭之如聞未習猶復抵冐宜先宫掖下暨民庶一皆屏絶自内廷后宫以下毋得衣銷金貼金縷金間金蹙金圏金解金剔金陷金明金泥金楞金脊金闌金盤金織金線金撚金等服臣庶犯者必致之法皇祐元年詔婦人所服冠高毋得踰四寸廣毋得踰一尺梳長毋得踰四寸毋以角為之先時宫中尚白角冠梳人爭效之謂之内様其冠名曰垂肩等肩至有長三尺者梳長亦踰尺議者以為服妖故禁止焉神宗元豐八年禮部言太皇太后生辰舊所供奉物於令式宜增一倍冠朶舊用九花舊用五至是各增為十二八月禮部又言皇太妃冠服之屬減皇后五分之一詔詳定而鄧温伯等言皇太妃冠服禮令不載亦無故事於是從禮部所請而冠朶用牙魚徽宗大觀四年宰相奏皇后受冊冠服當辦具帝以鄭后自陳頭冠用珠數多請服為妃時冠增篦挿三枝遂不復改製政和三年議禮局上所定皇后服飾制度首飾花十二株小花如大花之數並兩博鬢冠飾以九龍四鳳褘衣深青織成翟文素質五色十二等青紗中單黼領羅縠褾襈蔽膝隨裳色以緅為領緣用翟為章三等大帶隨衣色朱裏紕其外上以朱錦下以緑錦鈕約用青組以青衣革帶白玉雙佩黑組雙大綬小綬三間施玉環三章采尺寸與乘輿同青襪舄舄加金飾受冊朝謁景靈宫服之鞠衣黄羅為之蔽膝大帶革帶舄隨衣色餘同褘衣唯無翟文親蠶服之妃首飾花九株小花如大花之數並兩博鬢冠飾以九翬四鳳揄翟青羅繡為揺翟之形編次於衣青質五色九等素紗中單黼領羅縠褾襈蔽膝隨裳色以緅為領緣以揺翟為章二等大帶隨衣色下朱裏紕其外餘倣皇后冠服之制受冊服之皇太子妃冠服之制首飾花九株小花如大花之數並兩博鬢揄翟青織成為之文為文翟之形青質五色九等素紗中單黼領羅縠褾襈褾襈皆以朱色蔽膝隨裳色以緅為領緣以揺翟為章二等大帶隨衣色下朱裏紕其外上以朱錦下以緑錦紐約用青組以青衣革帶白玉雙佩純朱雙大綬章采尺寸與皇太子同受冊朝㑹服之鞠衣黄羅為之蔽膝大帶革帶隨衣色餘與揄翟同唯無翟從蠶服之詔頒行高宗中興後皇后之服首飾褘衣佩綬襪舄依政和新議與皇太后同孝宗乾道中中宫常服有司進真紅大袖紅羅生色為領紅羅長裙紅霞帔藥玉為墜背子用紅羅衫子用黄紅紗襠袴以白紗裙以明黄短衫以粉紅紗為之文獻通考卷一百十四
