body:
  text: 文獻通考卷一百八鄱陽馬端臨貴與著王禮考三朝儀神宗初即位御史中丞王陶奏劾宰相韓琦不押常朝班陶坐黜知陳州陶疏略曰忽千官瞻視之庭蔑如房闥艱再拜表儀之禮重若邱山琦與曾公亮皆待罪故事朝廷以宰相日奏事垂拱退詣文德殿押常朝班或已過辰正緣中書聚廳見客有急速公事商量若必須輪宰相赴文德殿押班必於常朝事務太有妨滯故御史臺放班行之數十年非始於琦等陶以論事不行疑琦沮之故以此劾琦上不直陶黜之熙寧元年詔自今授外任者許令轉訖朝辭二年監察御史裏行張戩程皓言每欲奏事必俟朝旨或朝政有闕及聞外事而機速後時則已無所及况往復待報必由中書萬一事干政府則或致沮格請依諫官例牒閣門求對或有急奏即許越次登對庶幾遇事入告毋憂失時詔依所請三年知制誥宋敏求等言文德殿入閣儀制考之國朝會要與今儀制所載頗或異同按今文德殿唐宣政殿也紫宸殿唐紫宸殿也然祖宗朝皆嘗御文德殿入閣唐制常設仗衛於宣政殿或遇上坐紫宸即喚仗入閣如此則當御紫宸殿入閣方協舊制請下兩制及太常禮院詳定詔學士院議翰林學士承旨王圭等言按入閣者乃唐隻日紫宸殿受常朝之儀也唐宣政殿即今文德殿唐紫宸殿今紫宸殿也唐制天子坐朝必立仗於正衙若止御紫宸即喚正衙仗自宣政殿東西閣門入故為入閣五代以來遂廢正衙立仗之制今閣門所載入閣儀者止是唐常朝之儀非為盛禮不可遵行從之自是入閣之禮遂罷之敏求又言本朝以來惟入閣乃御文德殿視朝今既不用入閣儀即文德殿遂闕視朝之禮請下兩制及太常禮院約唐制御宣政殿裁定朔望御殿儀以備正衙視朝之制詔學士院詳定儀注學士韓維等以入閣圖增損裁定上儀曰朔日不值假前五日閣門關諸司排辦前一日有司供帳於文德殿其日左右金吾將軍常押本衛仗判殿中省官押細仗先入殿庭東西對列文武官等分東西序立諸軍將校分入北向立朝堂引贊官引彈奏御史二員入殿門踏道當下殿北向立次催文武班分入並東西相向對立諸軍將校即於殿庭北向立班其班次並御史臺祗應皇帝服靴袍垂拱殿坐鳴鞭內侍閣門管軍依朔望常例起居次引樞密宣徽使三司使副樞密直學士內客省使以下至醫官待詔及修起居注官二員並大起居皇帝乘輦至文德殿後閣門奏班齊皇帝自後閣出殿上索扇升榻鳴鞭扇開簾捲儀鸞使焚香喝文武官就位四拜起居雞人唱時舍人於彈奏御史班前西向喝大起居御史由文武班後至對立位次引左右金吾將軍合班於宣制石南大起居班首出班躬奏軍國內外平安歸位再拜各歸東西押仗位通喝舍人於宣制石南北向對立舍人退於西階次揖宰臣親王以下躬奏文武百僚宰臣某姓名以下起居分引宰臣以下橫行諸軍將校仍舊立閣門使喝大起居舍人引宰臣至儀石北俯伏跪致詞祝曰訖其詞曰文武百僚宰臣全銜臣某姓名等言孟春之吉伏惟皇帝陛下膺受時祉與天無窮臣等無任歡呼忭蹈之至歸位五拜閣門使揖中書由東階升殿樞密使帶平章事以上由西階升殿侍立並依圖給事中一員以知門下封駮事官充歸左省位立轉對立於給事中之南如罷轉對官每遇御史臺前期牒請文官二員並依轉對官例先於閣門投進奏狀吏部侍郎及刑法官立於轉對官之南兵部侍郎於右省班南與吏部侍郎東西相向立定搢笏各出班籍置笏上吏部兵部侍郎以知審官東西院官充刑法官以知審刑大理寺官充親王使相以下分班出引轉對官於宣制石南宣徽使殿上承旨宣答如儀次吏部兵部侍郎及刑法官對揖出見謝辭班自從别儀次彈奏御史無彈奏對揖出如有彈奏並如儀引給事中至宣制石南揖躬奏殿中無事喝祗候揖西出次引修起居注官次立排立供奉官以下各合班於宣制石南躬喝祗候揖分班出喝文武官等門外祗候出索扇垂簾皇帝降座鳴鞭舍人當殿承旨放仗四色官􅣠鞾急趨至宣制石南稱奉敕放仗金吾將軍并判殿中省官對拜訖隨仗出親王使相節度使至刺史學士臺省官文武百僚諸軍將校等並序班朝堂謝賜茶酒皇帝御垂拱殿座中書樞密及請對官奏事不引見謝辭班後殿座臨時取旨其日遇有德音制書御札仍候退御垂拱殿座制箱出外應正衙見謝辭文武臣僚並依御史臺儀制喚班依序分入於文武班後以北為首分東西相向重行異位依見謝辭班序位餘押班臣僚於班稍前押班候刑法官對揖出分引近前揖躬舍人當殿宣班引轉對班見謝辭並如紫宸殿儀樞密使不帶平章事參知政事至同簽書樞密院事宣徽使並立於宣制石稍北宰臣親王樞密帶平章事使相繫押班者立於儀石南餘官並立於宣制石南並合贊喝閣門使引並如儀贊喝訖係中書樞密並揖升殿謝辭揖西出其合問聖體者並如儀餘官分班出彈奏御史候見謝辭班絶對揖出其朝見如謝都城門外御筵及詔赴闕謝茶藥撫問之類不可合班者各依别班中謝對賜酒食等並門賜其係正衙見門謝辭亦門外喝放應正衙見謝辭臣僚前一日於閣門投詣正衙榜子閣門下奏目又投正衙狀於御史臺四方館應朔日或得旨罷文德殿視朝止御紫宸殿起居其已上奏目正衙見謝辭班並放免依官品隨赴紫宸殿引或值改依常朝文德殿自有百官班日並如舊儀應外國蕃客見辭候喚班先引赴殿庭東邊依本國職次重行異位立候見謝辭班絶西向躬舍人當殿通班轉於宣制石南北向立贊喝如儀西出其酒食分物並門賜如有進奉候彈奏御史出入進奉入惟御馬及擔床自殿西偏門入東偏門出其進奉出入文武官起居舍人通某國進奉宣徽使喝進奉出節次如紫宸殿儀式候進奉出給事中奏殿中無事出其後殿再坐合引出者從别儀其日賜茶酒宰臣樞密於閣子親王於本廳使相宣徽使觀文殿大學士至寶文閣直學士兩省官待制三司副使文武百官皇親使相以下至率府副率及四廂都指揮使以下至副都頭並於朝堂如朝堂位次不足即於朝堂門外序次管軍節度使至四廂都指揮使節度使兩使留後至刺史並於客省廳詔依所定合班圖載卷末元豐元年詔右諫議大夫宋敏求權御史中丞蔡確樞密副使承旨張誠一直舍院同判太常寺李清臣詳定正旦御殿儀注敏求等遂上朝會儀二篇令式四十卷詔頒行元正冬至大朝會儀注前期有司設御座於大慶殿東西房於御座之左右少北東西閣於殿後百官宗室客使次於朝堂之內外五輅先陳於庭兵部設黃麾仗於殿之內外太樂令展宫架之樂於橫街南鼓吹令分置十二案於宫架外協律郎二人一位於殿上西階之前楹一位於宫架西北俱東向陳輿輦御馬於龍墀繖扇於沙墀貢物於宫架之南東西相向餘則列於大慶門之外冬至不設貢物扶侍執事侍立官及諸司使副立於左右樞密院諸房副承旨承制以下立於殿下東西相向重行異位北上典儀設三師三公侍中中書令左右僕射開府儀同三司位於丹墀香案之南少東次尚書左丞位於其後皆面北西上親王位於香案之南少西北面東上上壽則知同知樞密院事位於親王之後門下侍郎位於其東次左散騎常侍次給事中左諫議大夫次左司諫正言皆重行位於其後觀文資政殿大學士學士端明殿學士位於次南並西面北上中書侍郎位於其西次右散騎常侍次中書舍人右諫議大夫次右司諫正言皆重行位於其後翰林學士承旨至寶文閣學士位於次南次樞密直學士以下次待制皆重行位於其後並東面北上起居郎舍人夾香案東西相向契丹使位於龍墀上少西北面東上宗姓節度使以下至率府副率位於橫街南分東西相對班各重行異位北上左右巡使位於次南東西相向宫架前少東則特進以下至未升朝官班各重行異位北面西上夏國使在宫架之東軍員位於其後夏國人從次之宫架前少西則御史臺班節度以下又位於西並重行北面東上皆視特進退一列外高麗國使在宫架之西軍員位於其後高麗人從次之諸蕃客位於次西陪位進奏官位於宫架之南諸道貢舉解首位於其後皆北面而設敘班位於大慶門外東西相對以北為上中書侍郎諸方鎮表案於右給事中祥瑞案於左冬至不設給事中位祥瑞案下同其日闢大慶門列黃麾仗張旗幟羣官宗室使各服其服以俟太樂令帥樂工入太常卿立於宫架前協律郎就舉麾位中書侍郎以諸方鎮表給事中以祥瑞案令令史對舉侍衛官各就列輦出至西閣降輦符寶郎奉寶俱詣閣奉迎有司引祕書監以下次御史知雜以下次宗姓及外任防禦使以下就位侍中版奏中嚴復位少頃奏外辦閣簾捲殿上鳴蹕太樂令令撞黃鍾之鐘右五鐘皆應內侍承旨索扇扇合皇帝服通天冠絳紗袍御輿出西閣協律郎俯伏舉麾興奏乾安之樂鼓吹振作皇帝出自西房降輿即御座南向扇開殿下鳴蹕協律郎偃麾戞敔樂止罏煙升符寶郎奉寶置御座前尚書左右丞以上門下中書省官及待制以上至大學士正議大夫以上御史中丞以上宗姓及外正任觀察使以上契丹使班分東西各以次入奏正安之樂就位樂止中書侍郎押表案入詣西階下東向立給事中押祥瑞案入詣東階下西向立押樂官歸本班起居畢復案位三師以下至尚書左右丞親王以下至百官及御史臺官外正任契丹使俱就北向位贊者曰拜在位者皆再拜舞蹈三稱萬歲再拜訖又再拜太尉將升中書令門下侍郎俱降至兩階下立冬至門下侍郎不奏下同太尉詣西階下行則樂作至位樂止升階中書令門下侍郎各於案取所奏以次升中書令取方鎮官最高一表分東西立太尉詣御座前北向俯伏跪奏文武百僚太尉具官臣某等言元正起祚萬物咸新冬至云晷運推移日南長至伏惟皇帝陛下膺乾納祜與天同休俯伏興降階侍中詣東階升殿立俟太尉還位贊者曰拜在位者皆再拜舞蹈三稱萬歲再拜引侍中進當御座前承旨退臨階西向稱有制贊者曰拜在位皆再拜宣曰履新之慶冬至云履長之慶與公等同之贊者曰拜在位者皆再拜舞蹈三稱萬歲再拜侍中少退引北向班各分東西序立中書令進當御座前北向俯伏跪奏中書令具官臣某奏諸方鎮表搢笏讀訖執笏俯伏興少退東向立門下侍郎詣御座前奏祥瑞如諸方鎮表儀奏畢置所奏於案南中書侍郎給事中俱還本班案退戶部尚書詣橫街南承制位俯伏跪奏具官某言諸州貢物請付所司俯伏興侍中前承旨退西向曰制可侍中少退舍人曰拜戶部尚書再拜還本班次引禮部尚書就位俯伏跪奏具官臣某言諸蕃貢物請付所司俯伏興侍中前承旨退西向曰制可侍中少退舍人曰拜禮部尚書再拜還本班冬至不奏祥瑞貢物太史令就位俯伏跪奏具官臣某年某月日雲物祥瑞請付史館俯伏興侍中前承旨退西向曰制可侍中少退舍人曰拜太史令再拜還本班侍中進當御座前俯伏跪奏侍中具官臣某言禮畢俯伏興還位內侍承旨索扇扇合殿下鳴蹕太樂令令撞㽔賓之鐘左五鐘皆應協律郎跪俯伏舉麾興太樂令令奏乾安之樂鼓吹振作皇帝降座御輿入自東房還東閣扇開偃麾戞敔樂止侍中奏解嚴百官退還次有司設食案太樂令設登歌於殿上二舞入架於架南預坐當升殿者位於御座之前文武相向異位重行以北為上非升殿者位於東西廊下尚食奉御設夀奠於殿上之東楹少南南向設坫於尊南加爵一尊奠酒爵以金玉器充有司設上下羣官酒尊於殿下東西廂侍衛官及執事者各立於其位百官入就位侍中版奏中嚴復位少頃奏外辦閣簾捲殿上鳴蹕太樂令令撞黃鍾之鐘右五鐘皆應內侍承旨索扇扇合皇帝服通天冠絳紗袍御輿出東閣協律郎俯伏舉麾興奏乾安之樂鼓吹振作皇帝出自東房降輿即御座南向扇開殿下鳴蹕協律郎偃麾戞敔樂止爐煙升三師以下至尚書左右丞親王以下至同知樞密院事及百官御史臺官外正任契丹使俱就北向位贊者曰拜在位者皆再拜三稱萬歲北向班分東西立光祿卿詣橫街南北向俯伏跪奏具官臣某言請允羣臣上壽俯伏興侍中詣東階升進御座前承旨臨退階西向曰制可侍中少退舍人曰拜光祿卿再拜訖復位三師以下就北向位贊者曰拜在位者皆再拜三稱萬歲太尉自東階升詣酒尊所北向尚食奉御酌酒一爵授太尉太尉搢笏執爵詣御座前跪進皇帝執爵太尉執笏俯伏興少退當御座前俯伏跪奏文武百官太尉具官臣某等稽首言元正首祚冬至云天正長至臣等不勝大慶謹上千萬歲壽俯伏興退降階復位贊者曰拜在位者皆再拜三稱萬歲侍中承旨退臨階西向宣曰舉公等觴贊者曰拜在位者皆再拜三稱萬歲北向班分東西序位太尉自東階升侍立皇帝舉第一爵作和安之樂飲訖樂止太尉受虛爵復於坫降階三師以下復北向位贊者曰拜在位皆再拜舞蹈三稱萬歲又再拜侍中自東階升進御座前俯伏跪奏侍中具官臣某言請延公王等升殿俯伏興降階復位侍中承旨退稱有制贊者曰拜在位者皆再拜宣曰延公王等升殿贊者曰拜在位者皆再拜舞蹈三稱萬歲再拜公王等詣東西階升於席後立尚食奉御進酒殿中監省酒以進皇帝第二爵升殿羣官就橫行位舍人曰各賜酒贊者曰拜上下羣官皆再拜三稱萬歲舍人曰就坐太官令行酒羣官搢笏受觶作正安之樂文舞入立宫架北觴行一周太官奏樂止尚食奉御進食置御座前又詔羣官食太官令奏作盛德升聞之舞曲舞作三成止出殿中監進皇帝第三爵酒羣官立於席後登歌作嘉禾之曲飲訖樂止殿中監受虛爵舍人就坐羣官皆坐太官令行酒作正安之樂武舞進觴又行一周樂止尚食奉御進食置御座前又設羣官食太官令奏酒周巡食遍如前儀作天下大定之舞曲舞作三成止出殿中監進皇帝第四爵酒登歌作靈芝之曲其禮如第三爵太官令行酒如第二爵又一周樂止舍人曰可起百僚立於席後侍中進當御座前俯伏跪奏侍中具官臣某言禮畢俯伏興與羣官俱降復位贊者曰拜羣官皆再拜舞蹈三稱萬歲再拜起分東西序立內侍承旨索扇扇合殿下鳴蹕太樂令令撞㽔賓之鐘左五鐘皆應協律郎跪俯伏舉麾興太樂令令奏乾安之樂鼓吹振作皇帝降座御輿入自東房還閣扇開戞敔樂止侍中奏解嚴有司承旨放仗羣官再拜乃退宋敏求又言考工記天子執冒四寸以朝諸侯未有臨臣子而執鎮圭唐六典元正冬至大朝會止有進爵之禮開寶通禮始著元會執圭出自西房淳化中又以上壽進酒以內侍捧圭臣等遠稽周制近考唐禮皆為未合其元會受朝賀請不執鎮圭上夀準此宋朝正冬行大朝會禮立班圖四載卷末太祖十一建隆二年乾德四年五年六年開寶九年並元會乾德三年四年五年開寶二年三年並冬會建隆二年五月受朝太宗十一太平興國五年六年八年雍熙三年淳化元年三年並元會太平興國二年端拱元年淳化四年並冬會太平興國三年九年並五月受朝真宗八咸平五年景德元年四年大中祥符六年並元會咸平三年景德四年大中祥符八年並冬會咸平四年五月受朝仁宗十天聖五年慶歷元年三年七年皇祐五年嘉祐元年七年並元會天聖七年明道元年冬會天聖八年五月受朝神宗三熙寧五年元豐六年並元會熙寧二年冬會哲宗三元祐五年紹聖三年並元會元符元年五月受朝徽宗四大觀二年政和八年宣和六年並元會政和二年冬會三年九月引進使李端慤言近朔望御文德殿視朝初寒盛暑數煩清蹕而紫宸之朝歲中罕御請朔日御文德既望坐紫宸庶幾正衙內殿朝儀並舉從之十一月侍御史知雜事滿中行言文德正衙之制尚存常朝之虛名襲橫行之謬例有司失於申請未能釐正兩省臺官文武百官赴文德殿東西相向對立宰臣一員押班聞傳不坐則再拜而退謂之常朝遇休假併三日以上應內殿起居官畢集謂之橫行自宰臣親王以下應見謝辭者皆先赴文德殿謂之過正衙然在京釐務之官例以别敕免參宰臣押班近年已罷而武班諸衛本朝又不常置故今之赴常朝者獨御史臺官與審官待次階官而已今垂拱內殿宰臣以下既已日參而文德常朝仍復不廢舛謬倒置莫此為甚至於橫行參假與夫見謝辭官先過正衙雖沿唐之故事然必俟天子御殿之日行之可也入一圖在後哲宗即位禮部言冬至正旦在諒暗當罷朝賀欲令羣臣於東上閣門內東門表賀從之元祐七年五月吏部尚書王存言自今文德殿侍朝特免侍從官轉對專責以朝夕論思之效於體為得從之紹聖四年臣僚言文德殿侍朝輪官轉對蓋襲唐制其來久矣祖宗以來每遇轉對侍從之臣皆預元祐臣僚請免侍從轉對續詔執事官權侍郎以上並免自此轉對止於卿監郎官而已請自今視朝轉對依元豐以前條制從之元符元年令諸路監司朝辭日令閣門取旨上殿徽宗重和元年臣僚言比年以來二三大臣奏對留身讒疏善良請求相繼甚非朝廷至公之體詔自今惟蔡京五日一朝許留身餘非除拜遷秩因謝及陳乞罷免並不許獨班奏事令閣門報御史臺彈劾政和七年明堂成聽朝頒常視朔禮制局列上明堂七議見明堂門宣和四年臣僚言祖宗舊制有五日一轉對者今惟月朔行之有許朝官轉對者今惟待制以上預焉比年以來緣明堂行視朝之禮歲不過一再而已則是畢歲而論思者無幾矣請過不視朔即令具章投進以備乙夜之觀從之髙宗紹興十二年十月臣僚言正旦一歲之首冬至一陽之復聖人重之制為朝賀之禮上世以來未之有改主上臨御十有六年正至朝賀初未嘗講豈艱難之際不遑暇歟兹者太母還宫國家大慶四方來賀亶維其時欲望自今冬至元正舉行朝賀之禮以明天子之尊庶幾舊典不至廢墜建炎之初鑾輿南幸庶事未備而朝會之儀未暇舉焉正至但循例宰臣率文武百官拜表稱賀而已紹興改元以道君皇帝淵聖皇帝北狩權宜皇帝躬率百僚遙拜畢次御常御殿朝參官起居至是臣僚建言詔命有司舉行之臣僚又奏乞明詔有司講求祖宗故實常朝視朝正衙便殿朝會之儀舉而行之以隆帝業用稱萬邦百辟尊君之心天下幸甚詔令禮部太常寺閣門同共討論尋討論在京月朔日文德殿視朝紫宸殿日參望參垂拱殿日參四參假日崇政殿坐聖節垂拱殿上壽今乞先次宰臣率百僚拜表奏請皇帝御正殿視朝若降指揮許允其合行事務續令逐處條具申請詔從之十一月三日權禮部侍郎王賞等言契勘朝會之制正旦冬至及慶賀受朝係御大慶殿其文德紫宸垂拱殿禮制不同月朔視朝則御文德殿謂之前殿正衙仍設黃麾半仗其餘紫宸垂拱皆係側殿不設儀仗今來已降指揮依臣僚所請乞降朝會之儀緣元正在近大慶殿之禮事務至多欲乞先舉行文德殿視朝之制其朝會合服朝服并設樂上夀間飲三周設祥瑞表案等並乞候來年冬至前别行取旨詔依從之十三年閣門言依在京遇大禮年分冬至大朝會及次年正旦朝會權罷十四年九月有司言來年正旦大朝會請權以文德殿合設黃麾大仗五千二十七人欲權減三分之一合設八寶於御座之東西登歌宫架樂舞五輅輿輦法物繖扇及諸州諸蕃貢物行在致仕官諸路貢士舉人在京先生法師左右街道官等並令趁赴立班合差太史令一員奏雲物祥瑞詔從之建炎以來朝野雜記大朝會者紹興十二年十月詔來歲舉行之王望之為禮部侍郎言排辦不及請自來年冬至既而不果十五年正月朔旦乃克行用黃仗三千三百五十人視東都舊儀損三之一時無大慶殿遂權於崇政殿行之以殿狹輦出房不鳴鞭他如故事是日設宫架樂百官朝服上夀如儀自是一行而止紹興三十二年九月時孝宗已即位閣門言太上皇帝巡幸以來上御後殿繼朝廷復興舊典於紹興十三年二月四日初御前殿特令四參官起居伏自皇帝登寶位止係後殿日分今已降旨九月十二日初御前殿欲乞是日皇帝御垂拱殿四參官起居從之隆興二年九月閣門言在京及行在舊例御前殿日分值雨雪及泥濘得旨放朝參郎改後殿坐今後乞依例取旨從之建炎以來朝野雜記舊羣臣朝殿遇雨開隔門起居紹興中申行之又詔從駕遇雨賜雨具景靈宫遇雨或地濕分東西廂立班皆特恩也乾道七年四月詔為暑熱依年例自五月十三日並後殿坐并放見謝辭及參假官候秋涼日取旨今後準此文獻通考卷一百八
