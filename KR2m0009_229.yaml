body:
  text: 文獻通考卷二百二十九鄱陽馬端臨貴與著經籍考五十六子雜藝術唐志十一家二十部一百四十四卷失姓名八家張彥逺以下不著録十六家一百一十七卷宋三朝志四十八部一百五卷宋兩朝志十七部二十三卷宋四朝志一十三部二十九卷宋中興志五十八家六十部一百一十二卷古畫品録一卷鼂氏曰南齊謝赫撰言畫有六法分四品夫秋之奕延壽之畫伯樂之相馬􅑔戚之飯牛以至曹丕之彈棋袁彥之摴蒱皆足以擅名天下昔齊侯禮九九而仲尼賢博奕良有以哉經著大射投壺之禮蓋正己養心之道存焉顧用之何如耳安可直謂之藝而一切廢之故豫取射訣畫評奕經算術博戲投壺相馬牛等書同次之為一類按鼂陳二家書録以醫相牛馬及茶經酒譜之屬俱入雜藝術門蓋仍前史之舊今以醫相牛馬之書名附醫方相術門茶酒經譜附種植入農家門其餘藝技則自為此一類云齊梁畫目録一卷陳氏曰唐竇蒙子泉録續畫記一卷鼂氏曰唐李嗣真撰補謝赫之缺又有古今畫人名一卷後畫録一卷鼂氏曰唐僧彥宗撰品長安名畫凡二十七人唐朝畫斷一卷陳氏曰唐翰林學士朱景元撰一名唐朝名畫録前有目録後有天聖三年商宗儒後序與畫斷大同小異名畫獵精六卷鼂氏曰唐張彥遠纂彥逺字愛賔記歷代畫工名姓自史皇以降至唐朝及論畫法并裝背禠軸之式鑒别閲玩之方歷代名畫記十卷陳氏曰張彥遠撰彥遠家世藏法書名畫收藏鑒識自謂有一日之長既作法書要録又為此記且曰有好事傳余二書書畫之事畢矣五代名畫記一卷陳氏曰大梁劉道醇撰嘉祐四年陳詢直序五代名畫補遺一卷鼂氏曰皇朝劉道成纂符嘉應撰序云胡嶠嘗有梁朝名畫録因廣之故曰補遺名畫見聞志六卷乃看畫之綱領也鼂氏曰皇朝郭若虗撰若虗以張愛賓之畫絶筆永昌元年因續之歷五代止國朝熙寧七年分敘論紀藝故事近事四門陳氏曰元豐中自序稱大父司徒公未知何人郭氏在國初無顯人但有郭承祐耳其書欲續張彥逺之後書畫史二卷鼂氏曰米芾元章撰輯本朝公卿士庶家藏法書名畫論其優劣真偽宋朝名畫評三卷鼂氏曰皇朝劉道成纂符嘉應撰集本朝畫工之名世者第其品以王瓘之為神品云在吳生上益州名畫録三卷鼂氏曰皇朝黃休復纂唐乾初至宋乾德歲休復在蜀中自彚圗畫之精者五十八人品以四格陳氏曰中興書目以為李略撰而謂休復書今亡按此書有景祐三年序不著名氏而取休復所録明甚又有休復自為後序則固未嘗亡也未知題李略者與此同異山水受筆法一卷陳氏曰唐沁水荆浩浩然撰德隅堂畫品一卷陳氏曰李豸方叔撰趙令畤德麟官襄陽行橐中諸畫方叔皆為之評品元符元年也林泉高致集一卷陳氏曰徽猷閣待制河陽郭思撰其父熙字淳夫善畫思元豐五年進士既貴追述其父遺迹事實待制許光疑為之序曰書記畫訓畫意畫題畫訣而序又稱詩歌贊記詔誥銘志今本缺廣川畫跋五卷陳氏曰董逌撰畫繼十卷陳氏曰鄧椿公壽撰以繼郭若虛之後張彥遠志止會昌元年若虛志止熙寧七年今書止乾道三年射評要略一卷鼂氏曰李廣撰凡十五篇陳氏曰依託也鄙淺無竒嚴悟射訣一卷鼂氏曰唐王思永撰思永學射法於成都工曹嚴悟成書十篇每篇首必稱師曰九鏡射經一卷射訣一卷陳氏曰唐檢校太子詹事韋韞撰制弓矢法三篇射法九篇又敘其學射之初有張宗者授之訣為射訣射訓一卷陳氏曰監察御史張仲殷撰中興書目云本朝人果也不當名犯廟諱射議一卷陳氏曰元城王越石仲寶撰凡七條益津射格一卷鼂氏曰宋朝錢師益序以五善圖及武陵格疏密不同參酌為之增廣射譜七卷陳氏曰淳熙中詔進士習射書坊為此以射利末二卷為盧宗邁射法亦簡投壺經一卷鼂氏曰唐上官儀奉敕刪定史元道續注采周顒郝同梁簡文數家書為之唐志有其目木射圖一卷鼂氏曰唐陸秉撰為十五筍以代侯擊地毬以觸之飾以朱墨字以貴賤之朱者仁義禮智信溫良恭儉讓墨者慢傲佞貪濫仁者勝濫者負而行一賞罰焉溫公投壺新格一卷鼂氏曰宋朝司馬光君實撰舊有投壺格君實惡其多取竒中者以為僥幸因盡改之文房四譜五卷鼂氏曰宋朝蘇易簡撰集古今筆硯紙墨本東坡實繼以賦頌述作有徐鉉序墨譜一卷鼂氏曰宋朝董秉撰熙寧間人秉患世人徒知祖李之名而不知形模之異同製作之精粗故作圖以著其源流補蘇易簡之缺文云墨苑三卷陳氏曰趙郡李孝美伯陽撰曰圖曰式曰法元符中馬涓李元膺為之序硯譜二卷又名北海公硯録鼂氏曰宋朝唐詢撰硯之故事及其優劣以紅絲石為第一端石次之歙硯圗譜一卷陳氏曰太子中舍知婺源縣唐積撰治平丙午歲歙硯説一卷又辨歙硯説一卷陳氏曰皆不著姓名硯史一卷陳氏曰米芾撰硯箋一卷陳氏曰高似孫撰間堂雜記四卷陳氏曰不著姓名述文房四譜而首載唐氏硯録續文房四譜五卷陳氏曰司農卿李洪秀頴撰古鼎記一卷鼂氏曰唐吳協撰記古人鑄鼎本源及其形製鼎録一卷陳氏曰梁中書侍郎虞荔撰古今刀劍録一卷陳氏曰梁陶𢎞景撰印格一卷鼂氏曰宋朝鼂克一撰克一張文潛甥也文潛嘗為序之其略曰克一既好古印章其父補之愛之尤篤悉録古今印璽之法謂之圖書譜自秦以來變制異狀皆能言其故余頗愛其用心不移致精於末務使有傳焉香譜一卷鼂氏曰宋朝洪芻駒父撰集古今香法有鄭康成漢宮香南史小宗香真誥嬰香戚夫人迫駕香唐員半干香所記甚該博然通典載歷代祀天用水沉香獨遺之何邪香嚴三昧十卷侯氏萱堂香譜一卷又侯氏萱堂香録二卷譜或曰録陳氏曰並不知何代人作南蕃香録一卷陳氏曰知泉州葉廷圭撰九章算經九卷鼂氏曰未詳撰人姓名或曰周公九章者一方田二算粟三衰分四少廣五商功六均輸七盈不足八方程九句股魏劉徵唐李淳風嘗為之注則此術起於漢之前矣算經一卷陳氏曰夏侯陽撰大抵乘除法也隋志二卷唐一卷甄鸞注今本無注元豐京監本求一算經一卷鼂氏曰未詳撰人六問算法五卷氏曰唐龍受益撰并化零歌附算經三卷陳氏曰張邱建撰有序首言算者不患乘除之為難而患分之為難是以序列諸分之本元宣明約通之要法按唐志作一卷甄鸞注今本稱漢中郎守前司𨽻甄鸞注太史令李淳風等注釋算學博士劉孝孫撰細草細草者乘除法實之詳悉也應用算法一卷陳氏曰夷門叟郭京元豐三年序稱平陽竒士蔣舜元撰凡八篇曰釋數田畝粟米端匹斤稱修築差分雜法總為百五十七問前志在歷算類按射御書數均一藝也不專為歷算設故列於此將作營造法式三十四卷看詳一卷鼂氏曰皇朝李誠撰熙寧中敕將作監編修法式誠以為未備乃考究經史并詢討匠氏以成此書頒於列郡世謂喻晧木經極為精詳此書殆過之陳氏曰熙寧初始詔修定至元祐六年書成紹聖四年命誠重修元符三年上崇寧二年頒印前二卷為總釋其後曰制度曰功限曰料例曰圖樣而壕寨石作大小木調鏇鋸作泥瓦彩畫刷飾又各分類匠事備矣彈棊經一卷鼂氏曰未詳撰人序稱世説曰魏武帝好彈棊宮中皆效之難得其局以粧奩之蓋形狀相類就蓋而彈之俗中因謂魏宮粧奩之戲按西京雜記云劉向作彈棊典論云前代馬合卿張公子皆善彈棊然則起於漢朝非自魏始世説誤矣陳氏曰張柬之撰五木經一卷并圖例陳氏曰唐李翺撰元革注蓋摴蒱之戲也摴蒱經一卷摴蒱格一卷鼂氏曰不題撰人序摴蒱古之戲也劉毅李安民慕容寶之徒皆擲盧不聞餘采今以盧梟為上雉犢次之象棊一卷又棊勢二卷鼂氏曰皇朝尹洙撰凡五圖今世所行者不與焉溫公七國象棊一卷鼂氏曰司馬光君實撰周秦韓魏趙楚齊燕實八國而云七者周室不與焉廣象戲圖一卷濟北鼂補之無咎撰自序曰象戲戲兵也黃帝之戰驅猛獸以為陳象獸之雄也故戲兵而以象戲名之余為兒時無他弄見設局布棊為此戲者縱橫出竒愕然莫測以為小道可喜也稍長觀諸家陳法雖畫地而守規矩有截而變化舒卷出入無倪其説亦可喜暇時因求所謂象戲者欲按之以消永日蓋局縱橫路十一棊三十二為兩軍耳意苦而狹也嘗試以局縱橫路十九棊九十八廣之意少放焉然按圖置物計步而使終亦膠柱而已矣而智者用之則十九者之間盡強弱之形九十八者之間盡死生之勢而十九九十八之外死生強弱可循環於無窮飽食終日得吾説而為之則涿鹿之縱觀猶目前矣忘憂集三卷鼂氏曰皇朝劉仲甫編載唐韋延祐棊訣并古今棊圖忘憂清樂集一卷陳氏曰棊待詔李逸民撰集通遠集一卷陳氏曰無名氏視清樂為略象棊神機集一卷陳氏曰稱杉楊葉茂卿撰釣鼇圖一卷鼂氏曰不題撰人凡四十類各有一詩採珠局一卷鼂氏曰不題撰人序云王公而不知其名凡三十餘類亦各有一詩捉卧甕人事數一卷鼂氏曰皇朝李庭中撰以畢卓嵇康劉伶阮孚山簡阮籍儀狄顔回屈原陶潛孔融陶侃張翰李白白樂天為目有趙昌言序陳氏曰此篇與釣鼇圖採珠格局勸酒玉燭詩名一卷皆酒邊雅談三象戲圖一卷陳氏曰伋陽成師仲編雙六格一卷鼂氏曰不題撰人其法左右十二梁設二朋朋各十五子一白一黑用明瓊二各以其采由右歸左子單則他子得擊兩子以上他子雖相當不得擊故武后夢雙六不勝狄仁傑所以云無子也葉子格戲一卷鼂氏曰不著撰人世傳葉子婦人也撰此戲晚唐之時三國圖格一卷金龍戲格一卷打馬格一卷旋棊格一卷鼂氏曰並不題撰人漢官儀新選一卷鼂氏曰皇朝劉敞撰則取西漢之官而附其列傳黜陟可戲笑雜編之以為博奕之一物進士采選一卷陳氏曰趙明逺景昭撰此元豐末改官制時遷除格例也打馬圖式一卷陳氏曰鄭寅子敬撰用五十馬打馬賦一卷陳氏曰易安李氏撰用二十馬以上三者各有不同今世打馬大略與古摴蒱相類譜雙一卷陳氏曰洪遵集此戲今人不復為希古集一卷陳氏曰括蒼何宗姚取投壺新式及馮氏射法為一編文獻通考卷二百二十九
