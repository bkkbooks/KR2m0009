body:
  text: 文獻通考卷三百二十八鄱陽馬端臨貴與著四裔考五南杜氏通典邊防總序曰南蠻其在唐虞與之要質故曰要服夏商之時漸為邊患暨於周代黨衆彌盛故詩曰蠢爾荆蠻大邦為讐至楚王時蠻與羅子共敗楚師殺其將屈瑕莫敖不設備故敗縊於荒谷羣帥囚於冶父楚師復振遂屬於楚及吳起相悼王南并蠻越遂有洞庭蒼梧之地今長沙衡陽等郡也秦昭王使將伐楚略取蠻夷置黔中郡今武陵澧陽及黔中五溪中諸郡地漢興以後時有冦盜其西南諸夷夜郎之屬悉平定置郡縣今夜郎播州犍為即古夜郎地公孫述時夜郎大姓為漢保境後漢初從番禺江奉貢光武建武中武陵蠻帥單程今武陵澧陽黔中寧夷盧溪等郡即漢武陵郡大冦郡縣漢將劉尚戰敗數嵗方平順帝時武陵太守增其租賦蠻又舉種反殺鄉吏東晉時沔中蠻因劉石亂後漸徙於陸渾以南偏滿山谷宋齊以後荆雍二州今荆南江陵郡雍州襄陽郡各置校尉以撫寧之羣蠻酋帥互受南北朝封爵至後魏末暴患滋甚僭稱侯王屯據峽路斷絶行旅周武帝遣陸騰大破之其獠初因蜀李勢亂後自蜀漢山谷出侵擾郡縣至梁時州郡每嵗伐獠以自利及後周平梁益梁漢川益蜀川自爾遂同華人矣以其黔中東謝西謝自古不臣中國唐貞觀以後置羈縻州領之盤瓠種盤瓠種昔帝嚳時患犬戎入冦乃訪募天下有能得犬戎之吳將軍頭者妻以少女時帝有畜狗名曰盤瓠遂銜其將軍首而至乃以女配之杜氏通典曰按范曄後漢史蠻夷傳皆怪誕不經大抵諸家所序四夷亦多此類未詳其本出且因而商略之曄云髙辛氏募能得犬戎之將軍頭者購黃金千鎰邑萬家妻以少女按黃金周以前為斤秦以二十兩為鎰三代以前分土自秦漢分人又周末始有將軍之官其吳姓宜自周命氏曄皆以髙辛之代何不詳之甚又宋史曄被收後於獄中與諸甥姪書自序云六夷諸序論筆勢放縱實天下之竒作其中合者往往不減過秦篇嘗共比方班氏非但不愧之而已按班賈序事豈復語怪而曄紕謬若此又何不減不愧之有乎盤瓠得女負走入南山在國之南即五溪之中山止石穴中生六男六女因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形衣裳斑斕語言侏離其後滋蔓號曰蠻夷有邑君長名渠帥曰精夫相呼為姎徒説文曰姎女人自稱姎我也烏郎反所居皆深山重阻人迹罕至長沙黔中五溪蠻皆是也一辰溪二酉溪三巫溪四武溪五沅溪秦昭王使白起伐楚略取蠻夷始置黔中郡漢興改為武陵郡今武陵澧陽黔中寧夷盧溪盧陽靈溪潭陽郡地皆是也嵗令大人輸布一匹小口二丈是謂賨布説文曰賨南蠻賦才冬反雖時為冦盜而郡國討平之後漢光武建武二十三年十二月武陵蠻精夫相單程等大冦郡縣遣武威將軍劉尚發南郡今江陵巴東夷陵長沙今長沙衡陽巴陵郡武陵今澧陽武陵黔中郡也兵萬餘人乘船泝流自沅水入武溪擊之沅水出牂牱故且蘭東北經靈溪長沙巴陵郡入洞庭通江也武陵溪在今盧溪郡靈溪縣尚輕敵深入悉為所沒又遣伏波將軍馬援將兵至臨沅今武陵郡武陵縣即漢臨沅縣地擊破之單程等飢困乞降會援病卒謁者宗均為置吏以司之羣蠻遂平歷章和安順四朝纍反叛攻劫州郡討平之永和初武陵太守上書以蠻夷卒服可比漢人增其租賦議者皆以為可尚書令虞詡獨奏曰自古聖王不臣異俗非德不能及威不能加其獸心貪婪難率以禮是故羈縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢稅多少所由來久矣今猥增之必有怨叛計其所得不償所費帝不從其冬澧中漊中蠻漊水出今澧陽郡縣漊音婁果爭布非舊約遂殺鄉吏舉種反自後至桓靈二帝又纍反叛攻劫州郡討破之蜀先主章武初吳將李異屯巫柿歸今巴東郡縣先主遣將軍吳班攻破之於是武陵五溪蠻夷相率響應今黔中道謂之五溪其後種落布在諸郡縣居武陵者為五溪蠻而宜都天門巴東建平江北諸郡蠻所居皆深山重阻人迹罕至焉自晉劉石亂後諸蠻無所忌憚故其族漸得北遷陸渾以南滿於山谷宛洛蕭條略為邱墟矣魏道武泰常八年蠻王梅安率渠帥數千朝京師求留質子以表忠欵詔拜官褒慰之延興中太陽蠻首桓誕誕元子元誅誕亡入蠻中蠻推為主擁河水以北滍葉以南八萬餘落遣使內附孝文嘉之拜誕征南將軍荆州刺史襄陽王後降為公其後蠻首田益宗雷婆思等俱率衆內屬景明三年魯陽蠻伯燕四年東荆州蠻樊素等反俱討平之永寧初東荆州表太守桓叔興前後招慰太陽蠻歸附者一萬七百户請置郡十六縣五十詔從之叔興誕子也三年梁遣兵討江沔破掠諸蠻遣兵擊走之其後纍遣將圍廣陵楚城諸蠻並為前驅自汝水以南蠻暴掠連年攻討散而復合其暴滋甚又有冉氏田氏向氏者陬落尤盛餘則大者萬家小者千户更相崇僭稱王侯屯據三峽斷遏水路荆蜀行人至有假道者周文略定伊瀍聲教南被諸蠻畏服武成初文州蠻及冉令賢向五子等叛討平之隋置辰州以處蠻唐置錦州溪州巫州敘州皆其地也唐季蠻酋分據其地自署刺史晉天福中馬希範襲父業有湖南溪州刺史彭士愁等以溪錦蔣州歸馬氏立銅柱為界宋建隆四年慕容延釗平湖湘知溪州彭允林前溪州刺史田洪贇等列狀歸順詔仍其官父死則以其子繼之太平興國二年梅山洞蠻首領率衆冦劫商人詔遣使招諭猶冦暴不止乃發潭州兵擊平之八年溪錦敘巫四州蠻相率詣辰州願比內郡民輸租稅詔不許自後首領入貢不絶每加賞賜存恤之最大者曰彭氏彭氏世有溪州州有三曰上中下又有龍賜天賜忠順保靜感化永順州六懿安逺新給富來寧南順髙州十一總二十州皆置刺史而以下溪州刺史兼都誓主十九州皆𨽻焉謂之誓下州誓下州將承襲都誓主率蠻酋合議子孫若弟姪親黨人當立者具州名移辰州州為保證申鈐轄司以聞乃賜勑告印符受命者隔江北望拜謝州有押案副使及校吏聽自補置彭氏自允殊文勇儒猛相繼為下溪州刺史天禧中儒猛叛亡辰州發兵捕之執其子仕漢等歸京師儒猛降授仕漢殿直處之西京後輒遁歸天聖初以狀白辰州自言父老兄亡潛歸本道願放還家屬詔徙其家京師舍以官第未幾儒猛言仕漢逃歸引羣蠻為亂遣别子仕端等殺人朝廷嘉其忠降詔奬諭自咸平以來始聽二十州納貢嵗有賜蠻以為利有罪則絶之熙寧初天子方用兵以威四夷湖北提刑趙鼎言陜州洞酋刻剝無度蠻衆願內附屬辰州布衣張翹亦上書言南北江利害遂以章惇察訪湖北經制蠻事北江諸蠻𨽻辰州在黔之西南阻五溪漢黔中地為羈縻州三十六而下溪州為大彭氏世居之南江諸蠻自辰州逹於長沙各有溪洞本唐郡縣五代失守諸酋分據其地曰敘曰峽曰中勝曰元則舒氏居之曰蔣曰錦曰懿曰晃則田氏居之曰富曰鶴曰保順曰天賜曰古則向氏居之惇既經制於是南江之舒氏北江之彭氏梅山之蘇氏誠州之楊氏相繼納土創立城寨使之比內地為王民置沅誠二州元祐初傅堯俞等言置二州以來設官屯兵費巨萬計公私騷然荆湖兩路為之空竭乃廢誠州為渠陽軍而沅州至今為郡時朝廷方務休息痛懲邀功生事者廣西張整融州溫嵩坐擅殺蠻人皆置之罪詔諭湖南北及廣西路曰國家疆理四海務在柔逺頃荆湖諸蠻近漢者無所統一因其請吏量置城邑以撫治之邊臣邀功獻議創融州道路侵逼洞穴致生疑懼朝廷知其無用旋即廢罷邊吏失於撫遏遂爾扇搖其叛酋楊晟臺等並免追討諸路所開道路創置堡寨並廢自後五溪郡縣棄而不問崇寧以來開邊拓土之議復熾於是安化上三州及思廣洞蒙光明樂安洞程大法都丹團黃光明靖州西道楊再立辰州覃都管罵等各願納土輸貢賦又令廣西招納左右江四百五十餘洞宣和中議者以為招致熟蕃接武請吏竭金帛繒絮以啖其欲捐高爵厚俸以侈其心開辟荒蕪草創城邑張皇事勢僥幸賞恩入版圖者存虛名充府庫者亡實利不毛之地既不可耕狼子野心頑又莫革建築之後西南夷獠交冦而溪洞之蠻亦復跳梁士卒死於干戈官吏沒於王事生民肝腦塗地往往有之以此知納土之議非徒亡益而又害之所由生也莫若俾帥臣監司條具建築以來財用出入之數商較利病可省者省可併者併減戍兵省漕運而夷狄可撫邊鄙可無患矣乃詔悉廢所置州郡復祖宗之舊云崇寧初改誠州為靖州紹興初監察御史明槖言溪洞歸明官應湖南邊郡及二廣皆有之自崇觀以來員數寖多當時務要優恤添差州郡指使及酒稅之類本不取其才任及諸州措置隘寨闕人把拓又令管押兵夫而所管押者皆鄉民也其歸明官生長溪洞初無愛民之意亦不習朝廷法令貪婪無厭鞭笞推辱無所赴訴議者欲令帥臣措置適宜既不致歸明官失所生怨亦無使逺民受害詔廣南荆湖路帥臣措置以聞隆興初右正言尹穡言湖南州縣地界與溪洞蠻徭連接以故省民與徭人交結往來擅易田産其間豪猾大姓規免稅役多以産寄徭人户下內虧國賦外滋邊隙省地與徭人相連舊有界至者宜詔湖南帥臣遣吏親詣其處明立封堠自今不許省民將田産典賣與徭人及私以産業寄隱若已前賣入徭户難以遽行改追止令置籍如徭人願退還省地田産者縣以官錢代還之仍委曲榜諭從之嘉泰三年湖南安撫趙亮勵言湖南九郡皆與溪洞相接其地濶逺南接二廣北連湖右其人狼子野心不能長保其無事或因飢饉或因讐怨或因劫掠或至殺傷州縣稍失隄防則不安巢穴越界生事為今日計莫若先事選擇土豪為徭人所信服者為總首以任彈壓之責潛以馭之凡細微爭鬭止令總首彈壓開諭勸解自無浸淫之患蓋總首者語言嗜好皆與之同朝夕相接婚姻相通習知其利害審察其情偽而其力足以惠利之每遇飢嵗則糴粟以賑其困乏徭人莫不感悅而聽從其言若先借補名目使得藉此以榮其身而見重於鄉曲彼必自愛惜而盡忠於公家如此則徭民之衆可坐以制之然亦須五年彈壓委有勞效然後正補以所借之官所捐者虛名所得者實利安邊之策莫急於此詔令本路諸司相度條具諸司言趙亮勵所言謂以蠻徭治蠻徭其策莫良宜詔本路監司遵守從之嘉定初柳州黑風洞徭人羅世傅出掠省地飛虎統制邊寧戰沒遂為江西湖南之擾明年知隆興府趙希懌知潭州史彌堅同共招降之二年李元礪羅孟二又率衆犯江西攻破龍泉縣知隆興府王居安擒獲之七年臣僚言夫熟户山徭洞丁有田不許擅鬻頃畝多寡山畬濶狹各有界至任其耕種但以丁名繫籍每丁量納課米三斗悉無其他科配熟户山徭洞丁樂其有田之可耕生界有警極力為衛蓋欲保守田業也近年以來生界徭獠其沒省地而州縣無以禁戢者皆繇不能遵守良法有以致之夫溪洞之専條山徭洞丁田地不許與省民交易蓋慮其窮困而無所顧藉不為我用今州郡謾不加恩山徭洞丁有田者悉聽其與省民交易但利牙契所得而又省民得田輸稅在版籍常賦之外可以資郡帑泛用而山徭洞丁之米挂籍自如催督嚴峻多不聊生往往奔入生界溪洞受顧以贍口腹或為鄉導或為徒伴引惹生界出沒省地駸駸不已為害甚大宜明敇湖廣監司行下諸郡凡屬溪洞山徭洞丁田業不得擅與省民交易犯者以違制論仍歸其田庶山徭洞丁有田可耕不致妄生邊釁實綏靖逺民之良䇿從之石湖范氏桂海虞衡志徭本盤瓠之後其地山溪髙深介於巴蜀湖廣間綿亘數千里椎髻跣足衣斑斕布褐名為徭而實不供征役各自以逺近為伍以木葉覆屋種禾黍粟豆山芋雜以為糧截竹筒而炊暇則獵食山獸以續食嶺蹬險厄負戴者悉著背上繩繫於額僂而趨俗喜讐殺猜忍輕死又能忍飢行鬭左腰長刀右負大弩手長鎗上下山險若飛兒始能行燒鐡石烙其跟跖使頑木不仁故能履棘茨根枿而不傷兒始生稱之以鐡如其重漬之毒水兒長大煆其鋼以製刀終身用之試刀必斬牛仰刃牛項下以肩負刀一負即殊者良刀也弩名偏架弩隨跳躍中以一足蹶張背手傅矢往往命中鎗名掉鎗長二丈餘徒以護弩不恃以取勝戰則一弩一鎗相將而前執鎗者前却不常以衛弩執弩者口銜刀而手射人敵或冒刃逼之鎗無所施弩人釋弩取口中刀奮擊以救度險整其行列退去必有伏弩土軍弓手輩與之角技藝爭地利往往不能決勝也嵗首祭盤瓠雜揉魚肉酒飯於木槽扣槽羣號為禮十月朔日各以聚落祭都貝大王男女各成列連袂相擕而舞謂之踏徭意相得則男咿鳴躍之女羣負所愛去遂為夫婦不由父母其無配者俟來嵗再會女三年無所向父母或欲殺之以其為人所棄云樂有盧沙銃鼓胡盧笙竹笛之屬其合樂時衆音競閧擊竹筒以為節團欒跳躍呌咏以相之嵗暮羣操樂入省地州縣扣人門乞錢米酒炙如儺然徭之屬桂林者興安靈川臨桂義寧古縣諸邑皆迫近山徭最強者曰羅曼徭麻園徭其餘如黃沙甲石嶺屯褒江贈腳黃村赤水藍思巾江竦江定花冷石白面黃意大利小平灘頭丹江閃江等徭不可勝數山谷間稻田無幾天少雨稑種不收無所得食則四出犯省地求斗升以免死久乃玩狎雖豐嵗猶剽掠沿邊省民與徭犬牙者風聲氣習及筋力技藝略相當或與通婚姻結怨仇往往為徭鄉導而分鹵獲徭既自識徑路遂數數侵軼邊民遂不能誰何攻害田廬剽榖粟牛畜無嵗無之踉蹡篁竹飄忽往來州縣覺知則已趠入巢穴官軍不可入但分屯路口山多蹊不可以遍防加久成勞費又徭人常以山貨沙板滑石之屬竊與省民博鹽米山田易旱乾若一切閉截無所得食且冒死突出為毒滋烈沿邊省民因與交關或侵負之與締仇怨則又私出相讐殺余既得其所以然乾道九年夏遣吏經理之悉罷官軍専用邊民籍其可用者七千餘人分為五十團立之長副階級相制毋得與徭通為之器械教習使可捍小冦不待報官徭犯一團諸團鳴鼓應之次告諭近徭亦視省民相團結毋得犯法則通其博易之路不然絶之彼見邊民已結形格勢禁不可輕犯幸得通博買有鹽米之利皆歡然聽命最後擇勇敢吏將桑江歸順五十二徭頭首深入生徑羅曼等洞尤狠戾素不賔化者亦以近徭利害諭之悉從乃為置博易場二一在義寧一在融州之榮溪天子誕節首領得赴屬縣與犒宴諸徭大悅伍籍遂定保鄣隱然萬一逺徭弗率必須先破近徭近徭欲動亦須先勝邊團始能越至城郭然亦難矣既數月諸徭團長袁臺等數十人詣經略司謁謝悉紫袍巾裹橫梃犒以銀碗綵絁鹽酒勞遣之又各以誓狀來其略云某等既充山職今當鈐束男姪男行持棒女行把麻任從出入不得生事者上有太陽下有地宿其翻背者生兒成驢生女成豬舉家滅絶不得翻靣説好背靣説惡不得偷寒送暖上山同路下水同船男兒帶刀同一邊一點一齊同殺盜賊不用此欵者並依山例山例者誅殺也蠻語鄙陋不欲沒其實略志於此余承乏帥事二年諸徭無一迹及省地遂具以條約上聞詔許遵守行之廪君種廪君種不知何代初巴氏樊氏曋音審氏相氏鄭氏五姓皆出於武落鍾離山在今夷陵郡巴山縣其上有赤黑二穴巴氏之子生於赤穴四姓之子皆生黑穴未有君長共立巴氏子務相是為廪君從夷水下至鹽陽按今夷陵郡巴山縣清江水一名夷水一名鹽水其源出清江縣西都亭山廪君於是君乎夷城四姓皆臣之巴梁間諸巴皆是也即巴漢之地按范曄後漢史云四姓之子未有君長俱事鬼神乃共擲劒於石穴約能中者奉以為君務相乃獨中之又令各乘土船約能浮者當以為君餘姓悉沉惟務相獨浮因共立之是為廩君乃乘土船從夷水下鹽陽鹽水有神女謂廩君曰此地廣大魚鹽所出願留共居廪君不許鹽神暮輒來宿詰朝即化為蟲與諸蟲羣飛掩蔽日光天地晦冥積十餘日廩君伺其便因射殺之天乃開明廪君於是居於夷城四姓皆臣之廪君死魂魄化為白虎巴氏以虎飲人血故以人祠焉是皆怪誕以此不取戰國時秦惠王并巴中以巴氏為蠻夷君長其人歲出賦二千一十六錢三歲一出義賦千八百錢其人户出幏布八丈二尺雞羽三十鍭説文曰幏布南蠻反夷布也幏音公亞毛詩四鍭既均儀禮鍭矢一乘鄭元曰鍭猶候也候物而射之三十鍭百二十也鍭音侯漢興南郡太守靳強奏請一依秦時故事至光武建武二十三年南郡奏潳山蠻雷遷等始反叛潳音屠武威將軍劉尚討破之徙其種人七千餘口置江夏界中其後沔中蠻是也漢之江夏郡今竟陵富水安陸齊安漢陽江夏蘄春郡地是也和帝永元十三年巫蠻許聖等漢之巫縣今雲安郡巫山縣也以郡收稅不均反叛發荆州諸郡兵今江陵夷陵澧陽武陵長沙衡陽等郡地也討破之復悉徙置江夏靈帝光和三年江夏蠻復反冦患纍年廬江太守陸康討破之漢廬江即今郡地漢末張魯居漢中以鬼道教百姓賨人敬信巫覡多往奉之值天下大亂自巴西之宕渠遷於漢中楊車坂抄掠行旅百姓患之號為楊車巴魏武克漢中李特之祖將五百餘家歸之拜為將軍遷於略陽北土號之為巴氐特父慕為東羌獵將特少仕州縣見異當時雄武沉毅有大度元康中氐齊萬年反關中擾亂頻嵗大飢百姓流移就食相與入漢川者數萬特隨流人入蜀聚巴西勇壯為冦盜遂據梁益傳其弟流子雄僭即帝位傳班期壽勢六世而亡板楯蠻板楯蠻秦昭襄王時有一白虎於蜀巴漢之境傷害千餘人昭王乃募有能殺虎者賞邑萬家時有巴郡閬中夷今閬中郡縣廖仲等射殺白虎昭王以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不算一户免其一頃田之租稅雖有十妻不輸口算之錢傷人者論殺人得以賧錢贖死何承天纂文曰賧蠻夷贖罪貨也賧徒濫反盟曰秦犯夷輸黃龍二雙夷犯秦輸清酒一鍾夷人安之至漢髙帝為漢王發夷人還三秦今關中秦川也秦地既定乃遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘户乃嵗入口錢四十巴人呼賦為賨謂之賨人焉代號為板楯蠻夷閬中有渝水其人多居水左右天性徑勇初為漢前鋒數陷陳俗喜歌舞高帝命樂人習之所謂巴渝舞也遂代代服從至後漢以後郡守常率以征伐靈帝光和三年巴郡板楯蠻叛今通川潾山南平涪陵南川清化雲安始寧巴川南賔南浦閬中南充安嶽盛山等郡地則巴川之地是也冦掠三蜀及漢中諸郡即漢川諸郡今漢中安康洋川房陵郡地皆是也靈帝乃問益州計吏考以征伐方略漢中計吏程苞對曰板楯七姓以射殺白虎立功先代復為羌人其人勇猛善戰昔安帝永初中羌入漢川郡縣破壞得板楯救之羌死敗殆盡故號為神兵至桓帝建和二年羌復大入實賴板楯連摧破之前車騎將軍馮緄南征武陵緄古本反亦倚板楯以成其功近益州郡縣亂今漢川蜀川郡縣地太守李顯之亦以板楯討而平之忠功如此本無惡心但長吏鄉亭更賦至重僕役箠楚過於奴虜闕庭悠逺不能自聞含怨呼天叩心窮谷故邑落相聚以致叛戾非有謀主僭號以圖不軌今但遣明能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降服及漢末天下亂自巴西之宕渠今符陽郡遷於漢中楊車坂抄掠行旅號為楊車巴魏武克漢中李特之祖將五百家歸魏武又遷於略陽北復號之為巴氐略陽今天水郡龍城縣蜀後主劉禪建興十一年涪陵屬國人夷反今涪陵郡地車騎將軍鄧芝往討皆破平之其沔中蠻至晉時劉石亂後漸得北遷陸渾以南滿於山谷宋時荆州置南蠻校尉今江陵郡巴東夷陵雲安等郡地雍州置寧蠻校尉以領之今襄陽南陽郡地如蠻人順附者一户輸榖數斛其餘無事宋人賦役嚴苦貧者不復堪命多逃亡入蠻蠻無徭役強者又不供官稅結黨連群動有數百千人州郡力弱則起為盜賊種類稍多户口不可知也文帝元嘉中天門今澧陽郡地漢中令宋矯之徭賦過重蠻不堪命蠻田向求等為冦破漊中虜掠百姓及劉道産善撫諸蠻前後不附官者莫不順服皆引出平土多緣沔為居道産亡後蠻又反叛孝武帝出為雍州時巴東今巴東建平今巴郡宜都今夷陵郡天門四郡蠻為冦諸郡人户流散百不存一孝武即位後大明中西陽夷今弋陽郡皆反叛沈慶之率江雍荆河州諸軍討破之江今潯陽鄱陽章郡臨川廬陵等郡地雍已具上荆河今廬江同安郡也明帝順帝時尤甚雖遣攻討終不能禁荆州為之虛弊齊高帝時武陵西溪蠻田思飄武帝永明初黔陽蠻田豆渠武陵黔陽皆今五溪中也湘川蠻陳雙李答並冦掠州郡討平之湘川今長沙衡陽也其後雍司州蠻司州今義陽弋陽郡與後魏通助荒人桓天生侵害齊境六年除田駟路為試守北遂安左郡太守田驢王為試守宜人左郡太守田何代為試守新平左郡太守皆郢州蠻帥並漢沔間蠻也其左郡亦兹地焉郢州今江夏漢陽郡地後魏孝文太和中襄陽蠻酋雷婆思率户千餘內徙求居太和川詔給廪食後開南陽全有沔北之地今武當南陽漢東等郡蠻人安堵不為冦賊宣武帝景明初大陽蠻酋田育邱等共二萬八千户叛齊附魏詔置四郡十八縣魯陽蠻今臨汝郡魯山縣也魯伯燕等聚衆萬餘攻逼潁陽詔遣左衛將軍李崇討平之斬級數千徙萬餘家於河北諸州及六鎮尋叛南走六鎮今單于府馬邑郡界也所在追討比及於河殺之皆盡梁武帝遣兵沿沔破掠諸蠻又遣蔡令孫等三將步騎五千侵南荆之西沿漢上下今襄陽郡之上武當郡以東地破略諸蠻後魏遣蠻帥桓叔率蠻夏二萬餘人擊之斬令孫等俘虜二千餘人其後因六鎮秦今天水郡地隴今汧陽郡地所在反叛荆今南陽淮安郡地郢今汝南義陽郡蠻大擾動斷三鴉路今南陽郡向城縣北至臨汝郡至於襄城今臨汝郡縣汝水處處鈔劫百姓多被其害自後魏與宋齊梁之時淮汝江漢間諸蠻渠帥互有所屬皆授封爵焉及魏末為暴滋甚有冉氏向氏田氏者陬落尤盛大者萬家小者千户更相崇樹僭稱王侯屯據三峽斷遏水路荆蜀行人至有假道者西魏文帝大統十一年沔漢諸蠻擾動大將軍楊忠擊破之其唐州蠻田魯嘉亦叛唐州今淮安郡自號荆河州伯遣王雄討之後周明帝時蠻帥冉令賢向五子王等反攻陷白帝今雲安郡武帝天和初詔開府陸騰討斬之蠻衆大潰斬首萬餘級騰乃積其骸骨於水邏城側為京觀後蠻蛋見者輒大號哭自此狠戾之心輟矣信州舊理白帝騰更於蜀先主故城南八陳之北臨江岸築城移置信州又以巫縣信陵秭歸今雲安巴東二郡界並是峽中要險於是築城置防以為襟帶焉按後漢史其在黔中五溪長沙間則為盤瓠之後其在峽中巴梁間則為廩君之後種落繁盛侵擾州郡或移徙交雜亦不可得詳别焉通典言按後漢史其在黔中五溪長沙間者則為盤瓠之種其在峽中巴梁間者則為廪君之後其後種落繁盛侵擾州郡或移徙交錯不可得而詳别今按通典所敘板楯蠻魏晉以後之事南史謂之荆揚蠻北史謂之蠻獠而俱以為其源出自盤瓠不言板楯然六朝時蠻漸徙而之北則亦無由究其源流宗派矣姑兩存之南平蠻南平蠻東距智州南屬渝州西接南州北涪州户四千餘多瘴癘山有毒草沙虱蝮蛇人樓居梯而上名為干欄婦人橫布二幅穿中貫其首號曰通美髮髻垂於後竹筒三寸斜穿其耳貴者飾以珠璫俗女多男少婦人任役婚法女先以貨求男貧者無以嫁則賣為婢男子左袵露髮徒跣其王姓朱氏號劒荔王唐貞觀三年遣使內欵以其地𨽻渝州又有寧氏世為南平渠帥陳末以其帥猛力為寧越太守陳亡自以為與陳叔寶同日而生當代為天子乃不入朝隋兵阻瘴不能進猛力死子長真襲刺史及討林邑長真出兵攻其後又率部落從征遼東焬帝授官遣還又以其族人寧宣為合浦太守隋亂皆以其地附蕭銑武德初以寧越鬱林之地降自是交愛諸州始通長真死子據襲刺史其地西南接烏蠻昆明哥蠻大小播州部族數十居之宋治平中熟夷李光吉梁秀等三族據其地各有衆數千家間以威勢誘脅漢户有不從者屠之沒入土田往往投充客户謂之納身稅賦皆里胥代償藏匿亡命數以其徒偽為生獠劫邊民官軍追捕輒遁去習以為常密賂黠民覘守令動靜稍築城堡繕器甲逺近患之熙寧三年轉運使孫固判官張詵使兵馬使馮儀葉簡杜安行圖之以禍福開諭因進兵復賔化寨平蕩三族以其地賦民凡得租三萬五百石絲綿一萬六千兩以賔化寨為隆化縣𨽻涪州建榮懿扶歡兩寨其外銅佛埧者𨽻渝州南州縣地皆膏腴自光吉等平他部族據有之朝廷因補其土人王才進充巡檢委之控扼才進死部族無所統數出盜邊朝廷命熊本討平之建埧為南平軍以渝州南州涪州隆化𨽻焉元豐四年有楊光震者助官軍破乞弟殺其黨阿訛大觀二年木攀首領趙秦播州夷族楊光榮各以地內屬詔建溱播二州後皆廢東謝東謝渠帥姓謝氏南蠻别種在黔中之東地方千里其俗無文字刻木為約巢居刀劒不離其身冠熊皮被猛獸革酋長名元深代襲其一族不育女自云髙姓不可下嫁唐貞觀三年元深入朝冠烏熊皮冠若今之旄頭以金絡額身披毛帔韋皮行縢而著履貞觀中開其地為應州𨽻黔州都督府今黔中郡所管羈縻州西趙西趙蠻在東謝之南並南蠻别種其界東至夷子西至昆明南至西洱河山洞深阻莫知里數南北十八日行東西二十三日行其風俗與東謝同趙氏代為酋長有萬餘户自古不臣中國唐貞觀三年遣使入朝二十一年以其地置朝州以首領趙唐為刺史牂牱牂牱渠帥姓謝氏舊臣中國代為本土牧守隋末大亂遂絶唐貞觀中其酋遣使修職貢勝兵戰士數萬於是列其地為牂州唐黔中郡羈縻州昆明蠻一曰昆彌以西洱河為境即葉榆河也距京師九千里土歊濕宜粳稻人辮首左袵與突厥同逐水草畜牧夏處髙山冬入深谷尚戰死惡病亡勝兵數萬武德中嶲州治中吉偉使南寧因至其國諭使朝貢求內屬發兵戍守自是嵗與牂牱使皆來龍朔三年矩州刺史謝法成招慰北樓等七千户內附總章三年置祿火湯望州咸亨三年昆明十四姓率户二萬內附析其地為殷州總州敦州以安輯之殷州居戎州西北總州居西南敦州居南逺不過五百餘里近三百里其後又置盤麻等四十一州皆以首領為刺史昆明九百里即牂牱國也兵數出侵地數千里元和八年上表請盡歸牂牱故地開成元年鬼主阿內屬會昌中封其别帥為羅殿王世襲爵其後又封别帥為滇王皆牂牱蠻也東距辰州二千四百里其南千五百里即交州也無城郭土熱多霖雨稻粟再熟無徭役戰乃屯聚刻木為契盜者倍三而償殺人者牛馬三十俗與東謝同首領亦姓謝氏充州充州牂牱别部與牂牱鄰境勝兵二萬唐黔中郡羈縻州唐貞觀中朝貢列其地為充州開元中牂牱酋長元齊死孫嘉藝襲官封其後乃以趙氏為酋長天寶中其裔趙珍裔有戰功閣羅鳯叛宰相楊國忠授珍裔黔中都督屢敗南詔護五溪十餘年天下方亂其部獨寧終工部尚書貞元元和以訖開成朝貢不絶石湖范氏桂海虞衡志曰南方曰蠻亦曰西南蕃今郡縣之外羈縻州洞雖故皆蠻地猶近省民供稅役故不以蠻命之過羈縻則謂之化外真蠻矣區落連亘湖廣接於西戎種類殊詭不可勝計此等前世蓋嘗內附建黔南帥府於融州以統之今融帥已罷一切化外也融在徭洞之南蕃蠻之東蕃蠻時出州縣城郭以蜜臘草香等貿易每嵗聖節亦有出赴燕設者其稱大小張大小王龍石騰謝等謂之西南蕃地與牂牱接人椎髻跣足或著木履衣青花斑布以射獵讐殺為事持木牌標槍木弩藥箭相鈔掠而峩州以西又有羅坐夜回計利流求萬壽多嶺阿誤等蠻謂之蠻酋酋自謂太保大抵與山獠相似但有首領耳其人椎髻以白紙繫之云尚與諸葛武侯制服也西南蕃俗大抵介别男夫甚剛妻女甚潔夫婦異居妻所居深藏不見人夫過其妻挂劒於門而後入或期於深山不褻穢其居謂否則鬼神禍之此諸蠻皆未嘗為害故其事亦不能詳知又有漢蠻者十年前大理馬至橫山此蠻亦附以來衣服與中國略同能通華言自云本諸葛武侯戍兵聞其種人絶少按三國志初無留戍事唐史有西屠夷乃馬伏波兵留不去者初止十户隋末至三百户皆姓馬號馬留人與林邑分唐境疑漢蠻即此類其南連雍州南江之外稍有名稱者羅殿自把以國名羅孔特磨白衣九道等以道名此皆成聚落地皆近南詔羅在融宜之西雍之西北唐會昌中封其帥為羅殿王世襲爵嵗以馬至橫山互市亦有移至雍稱守羅國王羅呂押馬者稱西南謝蕃知武州節度使都大照會羅殿國文字按唐史東謝蠻居黔州西謝氏世酋長部落尊畏之然則謝蕃蓋羅殿之巨室又知其地近牂牱自把本小蠻尤凶狡嗜利其賣馬於橫山少拂意即拔刃向人亦嘗有所殺傷雍管亦殺數蠻以相當事乃已今其國王曰阿已生三嵗而立其臣阿謝柄國善撫其衆諸蠻比多附之至有精騎萬計阿已年十七阿謝乃歸國政阿已猶舉國以聽之諸蠻之至雍管賣馬者風聲氣習大抵略同其人多深目長身黑靣白牙以錦纒椎髻短褐徒跣戴笠荷氊珥刷牙金環約臂背長刀腰弩箭箙腋下佩皮篋胸至腰駢束麻索以便乘馬取馬於羣但持長繩走前擲馬首絡之一投必中刀長三尺甚利出自大理者尤竒性好潔數人共飯一柈中植一七置杯水其傍少長共七而食探七於水抄飯一哺許摶之柈令圓淨始加之匕上躍以入口蓋不欲汚七妨他人每飯極少飲酒亦止一杯數咽始能盡蓋腰腹束於繩故也食鹽礬胡椒不食彘肉食已必刷齒故常皓然甚惡穢氣野次有穢必坎而覆之雍人每以此制其忿戾投以穢器輒躍馬驚走獠獠蓋蠻之别種往代初出自梁益之間自漢中逹於卭笮川谷之間所在皆有北自漢中西南及越嶲以來皆有之笮才各反俗不辨姓氏又無名字所生男女長幼次第呼之其丈夫稱阿謨阿假婦人阿夷阿等之類皆其語之次第稱謂也依樹積木以居其上名曰干欄干欄大小隨其家之口數往往推一酋帥為主亦不能逺相統攝父死則子繼若中國之黨族也獠王各有鼓角一雙使其子弟自吹擊之好殺害多仇怨不敢逺行性同禽獸至於忿怒父子不相避惟手有兵刃者先殺之若殺其父走避於外求得一狗以謝其母然後敢歸母得狗謝不復嫌恨若報怨相攻擊必殺而食之遞相劫掠不避親戚賣如豬狗而已亡失兒女一哭便止被賣者號哭不服逃竄避之乃將買人捕逐若亡叛獲便縛之但經被縛者即服為賤𨽻不敢更稱良矣惟執楯持矛不識弓矢用竹為簧羣聚鼓之以為音節為絈布色至鮮淨大狗一頭買一生口性尤畏鬼所殺之人美鬚髯者必剝其靣皮籠之於竹及燥號之曰鬼鼓舞祀之以求福利俗尚淫祀至有賣其昆季妻孥盡者乃自賣以供祭焉鑄銅為器大口寬腹名曰銅㸑既薄且輕易於熟食蜀本無獠晉李勢時諸獠始出巴西渠川廣漢陽安資中犍為梓潼今蜀川之內布在山谷十餘萬落攻破郡縣為益州大患自桓溫破蜀之後力不能制又蜀人東流山險之地多空獠遂挾山傍谷與人參居參居者頗輸租賦在深山者乃為匪人至梁武帝梁益二州今漢川蜀川郡縣也歲歲伐獠以自禆潤公私頗藉為利後魏宣武帝正始初將夏侯道遷舉漢中附魏宣武帝遣尚書邢巒為梁益二州刺史以鎮之其後以梁益二州控攝嶮逺乃立巴州在今清化郡以統諸獠後以巴酋帥嚴始欣為刺史又立隆城鎮隆鎮所綰獠二十萬户所謂北獠也嵗輸租布魏明帝孝昌初據城叛入梁益二州並遣將討之攻陷巴州執始欣斬之後梁州為梁氏所陷今漢中郡自此又屬梁矣後周武帝平梁達奚武平之益尉遲逈平之令所在撫慰其與華人雜居者亦頗從賦役然天性暴亂旋致擾動每嵗命隨近州鎮出兵討之獲其生口以充賤𨽻謂之壓獠焉復有商旅往來者亦資以為貨公卿逮於人庶之家有獠口者多矣其種類滋蔓保據巖壑依林走險若履平地性又無知殆同禽獸諸夷之中最難以道義招懷也劒南諸獠唐武德貞觀間數冦州縣者不一巴州山獠王為馨叛梁州都督龎玉梟其首又破餘黨符陽白石二縣獠其後眉州獠反益州行臺郭行方大破之未幾又破洪雅二州獠俘男女五千口是嵗益州獠亦反都督竇軌請擊之太宗報曰獠依山險當拊以恩信脅人以兵威豈為人父母意邪貞觀七年東西玉洞獠反以右屯衛大將軍張士貴為龔州道行軍總管討平之十二年巫州獠叛夔州都督齊善行擊破之俘男女三千餘口鈞州獠叛桂州都督張寶德討平之明州山獠又叛交州都督李道彥擊走之是嵗巴洋集壁四州山獠叛攻巴州遣右武候將軍上官懷仁破之於壁州虜男女萬餘明年遂平十四年羅竇諸獠叛以廣州都督黨仁𢎞為竇州道行軍總管擊之虜男女七千餘人太宗再伐髙麗為船劒南諸獠皆半役雅卭眉三州獠不堪其擾相率叛詔發隴右峽兵二萬以茂州都督張士貴為雅州道行軍總管與右衛將軍梁建方平之髙宗初琰州獠叛梓州都督謝萬嵗充州刺史謝法興黔州都督李孟嘗討之萬嵗法興入洞招慰遇害顯慶二年羅竇生獠酋領多胡桑率衆內附上元末納州獠叛冦故茂都掌二縣殺吏民焚廨舍詔黔州都督發兵擊之大歷二年桂州山獠叛陷州刺史李良遁去貞元中嘉州綏山縣婆籠川生獠首領甫枳兄弟誘生蠻為亂剽居人西川節度使韋臯斬獠招其首領勇于等出降或請增柵東陵界以守臯不從曰無戎而城害所生也獠亦自是不擾境戎瀘間有葛獠居依山俗林箐踰數百里俗喜叛州縣撫視不至必合黨數千人持排而戰奉酋帥為王號曰婆能出入前後植旗大中末昌瀘二州刺史貪沓以弱繒及羊強獠市米麥一斛得直不及半羣獠訴曰當為賊取死耳刺史召二吏榜之曰皆爾屬為之非吾過獠相視大笑遂叛立酋長始艾為王踰梓潼所過焚剽刺史劉成師誘降其黨斬首領七十餘人餘衆遁至東川節度使柳仲郢諭降之始艾稽首謝罪仲郢貰遣之石湖范氏桂海虞衡志曰獠依山林而居無酋長版籍蠻之荒忽無常者也以射生食動為活蟲豸能蠕動者皆取食無年甲姓名一村中推有事力者曰郎火餘但稱火嵗首以土杯十二貯水隨辰位布列郎火禱焉乃集衆往觀若寅有水而卯涸則知正月雨二月旱自以不差諸蕃嵗賣馬於官道其境必要取貨及鹽牛否則梗馬路官亦以鹽綵和謝之其稍稍漸有名稱曰上下者則入蠻類舊傳獠有飛頭鑿齒鼻飲白衫花靣赤裩之屬二十一種今右江西南一帶甚多殆百餘種唐房千里異物志言獠婦生子即出夫憊卧如乳婦不謹則病其妻乃無苦唐志言飛頭獠者頭欲飛周項有䀶如縷妻子共守之及夜如病頭忽亡比旦還又有烏武獠地多瘴毒中者不能飲藥故自鑿齒文獻通考卷三百二十八
