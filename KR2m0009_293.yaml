body:
  text: 文獻通考卷二百九十三上鄱陽馬端臨貴與著象緯考十六上星晝見漢安帝永初二年正月戊子太白晝見占為强臣前志曰太白晝見强國弱小國强女主昌時鄧氏方盛五年六月辛丑太白晝見經天春秋漢含孳曰陽弱辰逆太白經天註云陽弱君柔不堪鉤命决曰天失仁太白經天元初四年正月乙未太白晝見丙上以下書日晝見者皆太白晝見也順帝永建二年二月癸未太白晝見三十九日閏月乙酉見東南維四十一日五年閏月庚子六年十月乙卯永和二年五月戊申三年二月辛巳戊子在熒惑西南光芒相犯三月壬子六月丙午八月乙夘俱太白晝見太白者將軍之官又為西州晝見隂盛與君争明熒惑與太白相犯為兵䘮是時大將軍梁商父子秉勢故太白常晝見也漢安二年正月己亥太白晝見七月甲申見韓揚占曰天下有䘮一曰有白衣之㑹眀年八月順帝崩又眀年冲帝崩孝桓元嘉元年二月戊午太白晝見永興二年閏月丁酉見時上幸後宫采女鄧猛後四年梁后崩梁冀誅猛立為后恩寵甚盛永夀元年九月己酉晝有流星長二尺其色黄白延熹九年七月太白晝見經天為兵憂在大人後一年桓帝崩大傅陳蕃大將軍竇武等謀誅宦官不克皆枉死魏文帝黄初四年六月甲申太白晝見按劉向五紀論曰太白少隂弱不得專行故以己未為界不得經天而行經天則為晝見其占為兵䘮為不臣為更王强國弱小國强是時孫權受魏爵號而稱兵距守五年十月乙夘見占同上六年十一月丙寅見南斗遂厯八十餘日恒見占曰呉有兵明年孫權遣張彌等將兵萬人錫公孫淵為燕王淵斬彌等虜其衆明帝青龍三年五月丁亥見積三十餘日以晷度推之非秦魏則楚時諸葛亮據渭南宣帝與相持孫權寇合肥入淮沔天子親東征蜀本秦地則為秦魏楚兵悉起矣四年三月己巳太白與月俱加景晝見月犯太白占同上景初元年十月壬申見在尾厯二百餘日恒晝見占曰尾為燕有兵時公孫淵自立為燕王置百官𤼵兵距守宣帝討滅之晉恵帝元康六年十月乙未太白晝見永康元年見占曰為不臣是月賈后殺太子趙王倫廢殺后及張華眀年倫簒位永寧元年自正月至扵閏月五星互經天縦横無常𫝊曰日陽君道也星隂臣道也日出則星亡臣不得専也晝而星見午上者為經天其占為不臣為更王今五星悉經天天變所未有也石氏説曰辰星晝見其國不亡則大亂是後台鼎方伯互執大權二帝流亡遂至六夷更王迭據華夏亦載籍所未有也其四月嵗星晝見五月太白晝見占同前二年四月癸酉嵗星晝見占曰為臣强時齊王冏㝎亰都因留輔政専慠無君成都河間長沙王討之冏兵敗夷滅成帝咸康四年四月己巳太白晝見在桞占為兵為不臣明年石虎大寇沔南内外戒嚴穆帝永和十年七月庚午太白晝見晷度推之灾在秦鄭時桓温伐苻堅破其嶢桞軍十二月慕容恪攻齊十二年六月庚子見在東井占如上升平四年十二月庚辰見哀帝興寧元年十月太白晝見在亢占亢為朝廷有兵䘮為臣强時桓温方擅兵明年庾后崩簡文咸安二年太白晝見在七星孝武寧康二年十二月甲申太白晝見在氐氐兖州分野太元元年八月癸酉見在氐二年九月壬午見在角六年九月丙子見七年十一月太白又晝見在斗占曰吴有兵䘮八年四月甲子又晝見在參占曰魏有兵䘮是月桓冲征沔漢楊亮伐蜀並㧞城畧地八月苻堅自將百萬入寇攻没夀陽劉牢之謝元等破之堅衆大潰至九年六月太后禇氏崩八月謝元出屯彭城經略中州九年七月庚戌見十一月丁巳又見十年四月乙亥晝見扵畢昴占曰魏國有兵䘮是時苻堅大衆奔潰趙魏兵連相攻堅為姚萇所殺十一年三月戊申見在東井占曰秦有兵臣强六月甲申又見扵輿鬼占曰秦有兵時魏姚萇苻登連兵相征不息甲午嵗星晝見在胃占曰魯有兵臣强十二年慕容垂寇東阿翟遼寇河上姚萇假號安㝎苻登自立隴上呂光竊據涼土十二年六月癸夘見在栁十月庚午見在斗十三年正月庚戌又晝見十四年四月己巳太白晝見扵桞六月辛邜又晝見扵翼九月庚寅又晝見扵軫十六年四月癸卯朔見十七年七月丁丑見十月丁酉又晝見十八年六月又晝見十九年五月又晝見扵桞六月辛酉又晝見扵輿鬼九月又見扵軫二十年七月丁亥見在太微占曰太白入太微國有憂晝見亢為兵䘮二十一年二月壬申太白晝見三月癸卯太白連晝在羽林占曰有强臣有兵䘮中軍兵起三月太白晝見扵胃占曰中軍兵起安帝隆安元年四月丁丑太白晝見在東井占曰秦有兵䘮六月姚興攻洛陽郗恢遣兵救之冬萇死子泓代立二年六月戊辰攝提移度失常嵗星晝見在胃兖州分野是年郗恢遣兵伐慕容寳扵滑臺敗而還閏月太白晝見在羽林十一月犯東上相五年正月太白晝見自去年十二月在斗晝見至是月元興元年三月戊子太白犯五諸侯因晝見占曰諸侯有誅義熙元年七月庚辰見在翼軫占曰為臣强荆州有兵䘮三年正月丙子見在奎五月己丑見在參占曰益州有兵䘮臣强六年六月甲午見七月太白犯少微而晝見七年六月見在翼九年五月壬辰太白犯右執法晝見恭帝元熙元年七月己夘太白晝見自義熙元年至是太白經天者九革代更王臣失君之象也宋文帝元嘉五年十一月日食星晝見梁武帝天監四年六月壬戌嵗星晝見占曰嵗色黄潤立竿影見大熟是嵗大穰米斛三十又曰星與日争光武且弱文且强自此後帝崇尚文儒躬自講説終扵太清不修武備普通四年十一月太白晝見六年五月己酉太白晝見六月癸未太白經天太清三年太白晝見占曰有大䘮天下革政更王强國弱小國强其年帝為侯景所幽崩陳廢帝光大二年九月戊午太白晝見占曰太白晝見國更政易王其年十二月帝廢為臨海王周武帝天和元年十月乙夘太白晝見經天隋文帝開皇元年三月甲申太白晝見占曰為臣强為革政四月壬午嵗星晝見占曰大臣强有逆謀王者不安其後劉昉等謀反伏誅二十年十月太白晝見占曰大臣强為革政易王右僕射楊素熒惑髙祖廢太子勇明年改元皆陽失位及革政易王之驗也唐髙祖武徳元年五月庚午太白晝見占曰兵起臣强二年九月庚寅見九年五月見六月丁巳經天己未又經天在秦分己夘見七月辛亥晝見甲寅晝見八月丁巳晝見太白上公經天者隂乗陽也太宗貞觀二十二年七月太白晝見髙宗永徽元年五月己未太白晝見十二月乙未見四年六月己丑見龍朔元年六月辛巳太白晝見經天永隆元年五月丁酉太白晝見經天是為隂乗陽陽君道也中宗景龍三年六月癸巳太白晝見在東井亰師分野元宗開元十四年十月甲寅太白晝見肅宗至徳二載七月己酉太白晝見經天至扵十一月戊午不見厯秦周楚鄭宋燕之分代宗永泰元年九月辛夘太白晝見經天大厯八年八月己丑太白入太微晝見占曰兵入天廷十一年閏八月丁酉太白晝見經天憲宗元和九年七月太白入南斗至十月出乃晝見穆宗長慶元年三月庚戌太白犯五車因晝見至扵七月以厯度推之在唐及趙魏之分占曰兵起二年九月太白晝見四年三月庚午太白犯東井北轅遂入井中晝見經天七日而出因犯輿鬼亰師分也六月己丑太白犯軒轅右角因晝見至扵九月占曰相凶文宗太和六年四月己丑太白晝見九年夏見自軒轅至扵翼軫開成二年六月己酉見僖宗乾符二年四月庚辰太白晝見在昴三年七月常星晝見昭宗光化三年十一月丁未太白犯月因晝見天復元年五月自丁酉至扵己亥太白晝見經天在井度後唐莊宗同光三年六月甲子太白晝見己巳見眀宗天成元年七月庚申太白晝見長興二年五月癸亥見閏五月己巳嵗晝見八月戊子太白晝見十月壬辰太白晝見四年五月癸夘太白晝見末帝清泰元年五月己未太白晝見漢髙祖天福十二年四月丙子太白晝見隠帝乾祐二年四月壬午太白晝見周太祖廣順二年太白經天宋太宗太平興國八年三月丙寅有星晝出西南當未地青白尾迹二丈餘没扵東南有光明占曰未地有兵是年西戎入寇宥州擊敗之淳化元年七月辛夘太白在角西南一尺許司天言據躔次當行中道南乗左角主有謀不成按書太白形最大星中無比去太陽四十五度内晝見則占臣今占候太白晝見盖去日極逺自然之理也真宗咸平三年六月太白晝見占曰為兵䘮四年丙寅太白晝見在南斗五年三月丙午有星晝出心至南斗没赤光丈餘九月丁未有星晝出紫微垣如半升噐貫北斗没六年六月庚午有星晝出東方色黄白有尾迹占曰兵偃民樂之象甲午太白晝見八月庚午太白晝見景徳元年六月戊午有星晝出西南方赤黄有尾迹速流丈餘没十一月太白晝見占曰秦有兵二年四月甲辰太白晝見三年七月乙巳太白晝見庚辰又晝見十二月太白晝見四年三月庚申有星晝見出南方大中祥符元年七月庚申太白晝見八月己丑有星晝出中天如太白有尾迹急流東南近日没二年五月乙亥有星晝出東方如太白尾迹赤黄流至日北没占曰蠻夷起兵其年黎州蠻擾四年六月丙午太白晝見八月乙巳太白晝見六年五月乙巳有星晝出南方赤光迸逸若五升噐照地明壬午太白晝見七年七月癸夘太白晝見十一月癸未有星晝出日西南大如盌尾迹二丈餘濶三寸許青白色西流而没占曰為旱火明年榮王宫火九年五月庚午太白晝見天禧三年六月辛夘太白晝見占曰女主昌八月辛夘又晝見四年七月丁巳太白晝見五年八月丙午太白晝見仁宗天聖元年十一月壬辰太白晝見占曰有兵兵罷無兵兵起不利先舉天聖二年六月丁夘晝漏上星出中天赤黄色有尾迹西南緩行入濁占曰大使以兵事出其方行緩事遲三年六月壬戌太白晝見十二月戊寅見五年五月壬寅見明道元年七月見三十日慶厯三年八月甲寅見皇祐三年四月丙午見至和元年五月壬辰見九月己丑見十月辛夘見三年四月己丑見占曰太白少隂晝見扵丙其占為兵為不臣嘉祐二年六月己未見占如上九月戊戌晝漏上中天有星出狼大如杯東南速行至濁没尾迹青白占曰流星大者使大今晝而星流主大使出狼星有盗賊侵掠之事四年正月庚戌太白晝見占曰太白少隂弱不得専行故以己未為界不得經天而行經天則晝見其占為兵䘮為不臣强國弱小國强以日宿推之屬秦魯分宜扵其地謹備兵寇以應天象七月辛丑見占曰西戎秦地防邉事十月乙丑晝漏上星出天將軍西南行至濁没色青白尾迹凝天良久散五年三月乙未嵗星晝見占曰為臣强為兵宼今推考嵗星在女度屬青齊分宜扵其地嚴設警備九月庚寅太白晝見六年六月乙丑太白星晝見壬申嵗星晝見占曰日者陽君道也星者隂臣道也日出則星亡臣不得専也今晝而星見其占為不臣及兵賊事以分野占之在衛分十一月癸丑晝星出東北維去地五丈許大如盌向東北緩行入濁尾迹青白占曰流星晝出大臣災色青白為兵憂又主隂謀事以分野日辰推之在魯衛分及北狄鴈門七年五月戊午太白見占皆同四年七月事六月丙子嵗星見占曰臣有不忠者七月己酉太白經天復見占曰兵䘮民災臣不順命不救則四夷大動蠻貊来侵十月乙未見占曰為不臣為兵䘮八年七月癸亥嵗星晝見占曰臣强屬趙翼分英宗治平元年正月戊戌太白晝見占同嘉祐七年十月六月辛酉見占曰秦分兵䘮壬戍嵗星見占曰臣强二年六月己丑晝有星出中天大如盌西速行至濁没尾迹赤黄占曰流星晝見明大民災兵革動速行入濁其下隂謀相奪七月庚申