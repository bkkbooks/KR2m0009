皇子為王王淮陽汝南河閒臨江長沙廣川其三年七國反漢遣大將軍周亞夫討平之吴王亡走粤粤攻而殺之齊趙諸國兵皆敗中三年正月丁亥金木合於觜觽為白衣之㑹其五月甲午金木俱在東井戊戌金去木留守之二十日占曰傷成於戉木為諸侯誅将行於諸侯也十一月庚午夕金火合於虚相去一寸占曰為鑠為喪虚齊也四年四月丙申金木合於東井占曰為白衣之㑹井秦也其五年四月乙巳水火合於參占曰國不吉參梁也其六年四月梁孝王死五月城陽王濟隂王死六月成陽公主死出入三月天子四衣白臨邸第後元年五月壬午火金合於輿鬼之東北不至栁出輿鬼北可五寸占曰為鑠有喪輿鬼秦也丙戌地大動鈴鈴然民大疫死棺貴至秋止後漢章帝建初五年二月戊辰木火俱在參五月戊寅木水在東井黄帝星經曰木守東井有土功之事一曰大水郗萌曰歳星守參后當之熒惑守大人當之和帝永元二年正月乙夘金木俱在奎丙寅水又在奎巫咸曰辰守奎多水火災亦為旱古今注曰土在東井奎主武庫兵三星會又為兵喪辛未水金木在婁亦為兵又為匿謀郗萌曰辰守婁有兵兵罷無兵兵起巫咸石氏云多火災古今注丙寅水在奎土在東井金在婁木火在昴五年四月癸巳太白熒惑辰星俱在東井黄帝經曰五星及客星守井皆為水石氏曰為旱又曰太白入東井㽞一日以上乃占大臣當之期三月若一年逺五年東井秦地為法三星合内外有兵又為法令及水其六年七月水大漂沒人民傷五穀九月遣兵征叛胡七年二月癸酉金火俱在參巫咸占曰熒惑守參多火災海中占曰為旱太白守參國有反臣郗萌曰有攻戰伐國也戊寅金火俱在東井郗萌曰熒惑守井百川皆滿太白又従舍盖二十日流國又曰雜糴貴又将相死八月甲寅水土金俱在軫春秋緯曰五星有入軫者皆為兵大起巫咸占曰五星入軫者司其出入而數之期二十日皆為兵發司始入處之率一日期十日軍罷石氏星經曰辰星守軫嵗水郗萌曰鎮星出入㽞舍軫六十日不下必有大喪春秋緯曰太白入軫兵大起郗萌曰太白守軫必有死王十一月甲戌金火俱在心雒書曰太白守心後九年大饑十二月己卯有流星起文昌入紫宮消丙辰火金水俱在斗流星入紫宮金火在心皆為大喪三星合軫為白衣之㑹金火俱在參東井皆為外兵有死將三星俱在斗有戮將若有死相八年四月樂成王黨七月樂成王宗皆薨將兵長史吴棽坐事徵下獄誅元興元年閏七月辛亥金水俱在氐孝殤帝延平元年正月丁酉金火在婁金火合為爍為大人憂是歳八月帝崩孝靈光和三年十月歳星熒惑太白三合於虚相去各五六寸如連珠占曰火木金三合為喪至中平六年宮車晏駕虚齊地眀年瑯琊王據薨孝獻建安十八年秋歳星鎮星熒惑俱入太微逆行㽞守帝坐百餘日占曰歳星入太微人主改魏明帝太和四年十一月壬戌太白犯歳星占曰有大兵五年三月諸葛亮以大衆寇天水宣帝為大将軍拒退之青龍二年二月己未太白犯熒惑占曰大兵起有大戰是年四月諸葛亮據渭南吴亦起兵應之魏東西奔命晉惠帝元康三年鎮星歳星太白三星聚於畢昴占曰為兵喪畢昴趙地也後賈后䧟殺太子趙王廢后又殺之斬張華裴頠遂簒位廢帝為太上皇天下從此遘亂連禍永寧二年十一月熒惑太白鬭於虚危占曰大兵起破軍殺将虚危又齊分也十二月熒惑襲太白於營室占曰天下兵起亡君之戒一曰易相初齊王冏之京都因留輔政遂專傲無君是月成都河間檄長沙王乂討之冏乂交戰攻焚宮闕冏兵敗夷滅乂殺其兄上軍將軍實以下二千餘人泰安二年成都又攻長沙於是公私饑困百姓力屈泰安三年正月熒惑犯歳星占曰有戰七月左衛將軍陳奉帝伐成都六軍敗績光熙元年九月鎮星犯歳星占曰鎮與歳合為内亂是時司馬越專權終以無禮破滅内亂之應也十二月癸未太白犯鎮星占曰為内兵有大戰是後河間王為東海王越所殺眀年正月東海王越殺諸葛玫等五月汲桑破馮嵩殺東燕王八月茍晞大破汲桑懐帝永嘉六年七月熒惑歳星太白聚牛女之間徘徊進退按占曰牛女揚州分是後兩都傾覆而元帝中興揚土元帝建武元年五月癸未太白熒惑合於東井占曰金火合曰爍為䘮是時愍帝䝉塵於平陽七月崩於寇庭太興二年七月甲午歳星熒惑㑹於東井八月乙未太白犯歳星合於翼占曰為兵饑三年六月丙辰太白與歳星合於房占同上永昌元年王敦攻京師六軍敗績王敦尋死成帝咸康三年十一月乙丑太白犯歳星於營室占曰為兵饑四年二月石季龍破幽州遷萬餘家以南五年季龍衆五萬寇沔南略七千餘家而去又騎二萬圍䧟邾城殺略五千餘人四年十二月癸丑太白犯鎮星在箕占曰王者亡地七年慕容皝自稱燕王七年三月太白熒惑合於太微中犯左執法眀年顯宗崩八年十二月己酉太白犯熒惑於胃占曰大兵起其後庾翼大發兵謀伐石季龍専制上流康帝建元元年八月丁未太白犯歳星在軫占曰有大兵是年石季龍将劉寧寇沒狄道穆帝永和四年五月熒惑入婁犯鎮星占曰兵大起有喪災在趙其年石季龍死来年冉閔殺石遵及諸胡十萬餘人其後褚裒北伐喪衆而薨六年三月戊戌熒惑犯歳星占曰為戰七年三月戊子歳星熒惑合於奎其年劉顯殺石祗及諸胡帥中土大亂十二年七月丁夘太白犯鎮星在栁占曰周地有大兵其年八月桓溫伐苻健退因破姚㐮於伊水定周地升平二年八月戊午熒惑犯鎮星在張占曰兵大起三年八月庚午太白犯鎮星在太微中占曰王者惡之五年十月丁夘熒惑犯歳星在營室占曰大臣有匿謀一曰衛地有兵時桓溫擅權謀移晉室海西公太和元年八月戊午太白犯歳在太微中三年六月甲寅太白掩熒惑在太微端門中六年海西公廢簡文咸安二年正月己酉歳星犯鎮星在須女占曰為内亂七月帝崩桓温擅權謀殺侍中王坦之等内亂之應孝武寧康二年十一月癸酉太白掩熒惑在營室占曰金火合為爍為兵喪太元元年七月苻堅伐凉州破之虜張天錫太元十年十二月己丑太白犯歳星占曰為兵饑是時河朔未平兵連在外冬大饑十七年九月丁丑歳星熒惑鎮星同在亢氐十二月癸酉鎮星去熒惑歳星猶合占曰三星合是謂驚立絶行内外有兵䘮與饑改立王公十九年十月太白鎮星熒惑辰星合於氐十二月癸丑太白犯歳星在斗占曰為亂饑為内兵斗吴越分至隆安元年王恭等舉兵顯王國寶之罪朝廷殺之是後連歳水旱饑安帝隆安元年二月歳星熒惑皆入羽林占曰中軍兵起四月王恭等舉兵内外戒嚴元興元年八月庚子太白犯歳星在上將東南占曰楚兵饑一曰災在上将二年桓元簒位劉裕盡誅桓氏二年十月丁丑太白犯鎮星在婁占同上三年二月壬辰太白熒惑合於羽林劉裕起義兵桓元逼帝東下義熈二年十二月丁未熒惑太白皆入羽林又合於壁三年正月慕容超寇淮北徐州至下邳八月遣劉敬宣伐蜀三年二月癸亥熒惑鎮星太白辰星聚於奎婁從鎮星也徐州分是時慕容超僭號於齊兵連徐兖連歳寇抄至於淮泗姚興譙縦僭號秦蜀盧循及魏南北交侵其五年劉裕北殄慕容超其六月辛夘熒惑犯辰星在翼占曰天下兵起八月己夘太白掩熒惑占曰有大兵其四年姚略遣衆征赫連勃勃大為所破五年四月甲戌熒惑犯辰星在東井占曰皆為兵十二月辛丑太白犯歳星在奎占曰大兵起魯有兵是年四月劉裕討慕容超六年二月滅慕容超於魯地七年七月丁夘歳星犯鎮星在參占曰歳鎮合為内亂一曰益州戰不勝亡地是時朱齡石伐蜀後竟滅之眀年誅謝混劉毅八年十月甲申太白犯鎮星在東井占曰秦有大兵九年二月庚午熒惑鎮星皆犯東井占曰秦有兵三月壬辰歳星熒惑鎮星太白聚於東井從歳星也東井秦分十三年劉裕定關中其後遂移晉祚十四年十月癸巳熒惑入太微犯西蕃上将仍順行至左掖門内㽞二十日乃逆行至恭帝元熈元年三月五日出西蕃上將西三尺許又順還入太微時鎮星在太微熒惑繞鎮星成鈎已其年四月庚戌從端門出占曰熒惑與鎮星鈎已天庭天下更紀十二月安帝母弟瑯琊王踐阼是曰恭帝来年禪於宋宋文帝元嘉二十三年二月金火水合於柬井梁武帝普通七年正月癸邜太白歳星在牛相犯占曰其國君凶易政眀年三月改元大赦陳武帝永定三年六月庚子鎮星在鉞與太白并占太白與鎮合為疾為内兵文帝天嘉五年四月庚子太白歳星合在奎金在南木在北相去二尺許壬寅太白歳星合在婁相去一尺許六年正月己亥太白犯熒惑相去二寸占曰其野有兵喪改立侯王九月乙巳太白又犯熒惑明年帝崩少帝廢廢帝光大元年八月壬午鎮星辰星合於軫九月戊午辰星太白相犯占曰改立侯王二年九月庚戌太白逆行與鎮星合在角占曰為白衣之㑹又曰所合之國為亡地為疾兵十二月廢帝為臨海王太建二年薨宣帝太建十一年四月己丑歳星太白辰星合於東井十三年十二月癸酉辰星在太白上甲戌辰星太白交相掩占曰大兵在野大戰魏道武天賜四年二月癸亥金水土聚節閔帝普泰元年十月歳星熒惑鎮星太白聚於觜參色甚明大占曰當有王者興其月齊高祖起於信都至中興二年破爾朱兆開覇業齊文宣天保十年六月庚子鎮星犯井鉞與太白并占曰子為元枵齊之分野君有戮死者大臣誅鑕斧用其眀年常山王誅楊愔等廢少帝武成河清四年正月己亥太白犯熒惑相去二寸在奎甲辰太白熒惑歳星合在婁占曰甲為齊三星若合是謂驚立絶行其分有兵喪改立侯王後主武平三年八月癸未鎮星歳星太白合於氐宋之分野占曰其國有内外䘮改立侯王四月陳将吴眀徹寇彭城右僕射崔季舒等諌帝不宜北幸并州帝怒並誅之内外兵喪之應周武帝保定二年十一月壬午熒惑犯歳星於危南五年太白熒惑歳星合於婁天和二年五月己丑歳星與熒惑合在井宿相去五尺井為秦分占曰其國有兵為饑旱大臣匿謀下有反者若亡地閏六月丁酉歳星太白合在栁相去一尺七寸栁為周分占曰為内兵又曰主人凶憂失城是歳陳湘州刺史華皎率衆来附遣兵援之因而南伐衛公直與陳将戰於沌口王師失利遂沒陳天和六年六月庚辰熒惑太白合在張宿相去一尺占曰主人兵不勝所合國有殃建徳元年三月丙辰熒惑太白合於壁占曰其分有兵喪不可舉事用兵必受殃改立侯王其月誅晉公䕶等及其黨詔以齊公憲為大冢宰七月丙午辰與太白合於井相去七寸占曰其下之國必以重德致天下後半年平齊致天下之應二年十一月壬子太白掩鎮星在尾占曰鎮星為女主尾為後宮眀年皇太后崩三年十一月丙子歳星與太白相犯光芒相及在危占曰其野兵人主凶失其城邑宣政元年六月壬午癸丑木火金三星合在井占曰其國霸又曰内外有兵喪改立王侯七月丙辰熒惑太白合於七星相去二尺八寸占曰君憂又曰其國有兵改立王侯有徳興無徳亡後一年改置四輔官𫝊位太子改立王侯之應也宣帝大象元年四月戊子太白歳星辰星合在井占曰是謂驚立是謂絶行其内外有兵喪改立侯王其五月趙陳越代滕五王並入國後二年隋受命宇文氏宗族相繼誅滅十月乙酉熒惑在虚與鎮星合占曰兵大起將軍為亂大人惡之是月相州段德舉謀反伏誅眀年把公宇文亮舉兵反擒殺之二年七月壬子歳星太白合於張九月甲申熒惑歳星合於翼唐高祖武德元年七月丙午鎮星太白辰星聚於東井關中分也二年三月丙申鎮星太白辰星復聚於東井九年六月己夘歳星辰星合於東井占曰為變謀太宗貞觀十八年五月太白辰星合於東井占曰為兵謀十九年六月丙辰太宗征高麗次安市城太白辰星合於東井史記曰太白為主辰星為客為蠻夷出相從而兵在野為戰高宗永徽元年七月辛酉歳星太白合於栁在秦分占曰兵起中宗景龍元年十月丙寅太白熒惑合於虚危占曰有䘮睿宗景雲二年七月鎮星太白合於張占曰内兵太極元年四月熒惑太白合於東井元宗天寶九載八月五星聚於尾箕熒惑先至而又先去尾箕燕分也占曰有徳則慶無徳則殃十四載二月熒惑太白鬭於畢昴井鬼間至四月乃伏十五載五月熒惑鎮星同在虚危中天芒角大動揺占者以為北方之宿子午相衝災在南方肅宗至徳二載四月壬寅歳星熒惑太白辰星聚於鶉首從歳星也罰星先去而歳星留占曰歳星熒惑為陽太白辰星為陰隂主外邦陽主中邦陽與陰合中外相連以兵八月太白芒怒掩歳於鶉火又晝見經天鶉火周分也乾元元年四月熒惑鎮星太白聚於營室太史南宫沛奏其地戰不勝衛分也代宗大歴三年七月壬申五星並出東方占曰中國利八年閏十一月壬寅太白辰星合於危齊分也十年正月甲寅歳星熒惑合於南斗占曰饑旱吴越分也一曰不可用兵七月庚辰太白辰星合於栁京師分也德宗建中二年六月熒惑太白鬭於東井四年六月熒惑太白復鬭於東井京師分也金火罰星鬭者戰象也興元元年春熒惑守歳星在角亢占曰有反臣角亢鄭地貞元四年五月乙亥歳星熒惑鎮星聚於營室占曰其國亡地在衛分六年閏三月庚申太白辰星合於東井占曰為兵憂戊寅熒惑犯鎮星在奎魯分也憲宗元和九年十月辛未熒惑犯鎮星又與太白合於女在齊分十年六月辛未歳星熒惑太白辰星合於東井占曰中外相連以兵十一年五月丁夘歳星辰星合於東井六月己未復合於東井占曰為變謀而更事十一月戊子鎮星熒惑合於虚危十二月鎮星太白辰星聚於危皆齊分也十四年八月丁丑嵗星太白辰星聚於軫占曰兵喪在楚分與南方夷貊之國十五年三月鎮星太白合於奎占曰内兵徐州分也十二月熒惑鎮星合於奎占曰主憂穆宗長慶二年二月甲戌歳星熒惑合於南斗占曰饑旱八月丙寅熒惑犯鎮星在昴畢因㽞相守占曰主憂四年八月庚辰熒惑犯鎮星於東井鎮星既失行犯鉞而熒惑復往犯之占曰内亂敬宗寶歴二年八月丁未熒惑鎮星復合於東井輿鬼間文宗太和二年九月歳星熒惑鎮星聚於七星三年四月壬申歳星犯鎮星占曰饑四年五月丙午歳星太白合於東井六年正月太白熒惑合於羽林十月太白熒惑鎮星聚於軫八年七月庚寅太白熒惑合相犯推歴度在翼近太微占曰兵起開成三年六月丁亥太白犯熒惑於張占曰喪四年正月丁巳熒惑太白辰星聚於南斗推歴度在燕分占曰内外兵䘮改立王公冬歳星熒惑俱逆行失色合於東井京師分也武宗㑹昌二年六月乙丑熒惑犯歳星於翼占曰旱四年十月癸未太白熒惑合於南斗咸通中熒惑鎮星太白辰星聚於畢昴在趙魏之分詔鎮州王景崇被衮冕軍府稱臣以厭之僖宗文徳元年八月歳星鎮星太白聚於張周分也占曰内外有兵為河内河東地昭宗光化三年十月太白鎮星合於南斗占曰吴越有兵後唐荘宗同光二年八月甲申歳星熒惑合在翼十四度三年九月丙辰太白歳星相犯眀宗天成二年正月甲戌熒惑歳星相犯三年春正月壬申金火合於奎九月庚辰鎮星歳星合於箕辛巳太白熒惑合於軫十二月壬寅金木相犯於斗晉出帝開運元年十二月癸丑太白犯辰漢高祖天福十二年六月鎮星太白歳星熒惑聚於張占者云有帝王興於周者高祖起義自平陽趨洛以應之及隱帝将嗣位又封周王暨周太祖登位以姬姓之後復繼宗周天人之符乃有所屬隱帝乾祐二年九月庚戌太白犯鎮丁夘太白犯歳鎮自元年八月己丑入太微垣犯上将執法内屏謁者鉤已往来至是歳十一月辛亥而出凡四百四十三日十一月辛酉太白犯木周太祖廣順元年十一月辰星歳星合宿於尾幽燕之分占其地合有變兼主饑饉疾疫宋太祖建隆三年十一月壬申歳星熒惑合於房乾徳四年六月己亥太白熒惑合於張五年三月五星如連珠聚於奎當魯分從鎮星晨見東方占曰有徳受慶大人奄有四方子孫蕃昌從鎮星王者以重致天下重福眀年眞宗降誕六年正月壬寅歳星鎮星太白合於婁開寶三年五月庚戌太白鎮星合於畢相去二寸許六月乙未太白歳星合於東井相去四寸許五年十月甲辰太白熒惑合於牽牛太宗雍熈二年七月丙戌熒惑歳星合於軫三年五月丙戌熒惑太白合於畢四年十二月丁巳太白鎮星歳星合於南斗魁端拱二年九月乙巳鎮星熒惑合於南斗相去尺餘十一月壬辰歳星熒惑合於危淳化二年正月癸丑鎮星太白合於須女三月癸丑太白歳星合於婁太白在歳星南三年正月丙辰太白熒惑合於婁歳星在胃日官鄭昭晏言測金火行度合相犯今火行而南金稍北有若相避五年六月丙午歳星太白合於栁相去三寸許至道元年五月庚戌歳星太白太隂同度不相犯乙夘鎮星熒惑合於東壁相去七寸許丙辰太白歳星合於七星不相犯真宗景徳三年七月己酉辰星歳星太白合於栁四年七月五星當聚鶉火既而近太陽同時伏占曰猶臣避君之明九月戊子歳星合於翼大中祥符元年九月乙酉太白歳星合於角亢占在兖州之野其年東封泰山十月庚寅五星順行同色六年正月癸巳五星順行五色占曰天下兵偃天禧二年八月癸丑歳星熒惑合於張占曰東宫大慶其年仁宗升儲仁宗天聖元年三月丁丑火犯木占曰天下受福二年九月戊申金犯火三年五月癸巳金水相犯於井五年六月辛夘火犯土壬辰掩土七年五月辛未金犯土在畢宿一度半八年六月乙酉金犯火景祐元年閏六月庚辰金犯土二年五月丁亥又犯土九月辛巳火犯土相去二寸許在張六度三年五月丁亥日官言太歳及歳星在北方宜飭備邉四年九月辛亥火犯土在翼十五度康定元年九月壬申水犯土慶歴三年九月甲申金犯木皇祐三年十一月丁丑火犯土至和三年九月乙巳金犯木嘉祐三年閏十二月甲戌火犯木躔斗四度占曰有子孫喜燕分有兵五年正月壬辰金犯木占曰為戰陣大将有憂宜飭兵備六年三月癸巳火又犯木在營室占曰衛地有兵又為赦令七月己丑金犯土躔井十二度占曰秦分兵饑七年正月庚申又犯木占曰為饑為兵營室衛分六月丁丑又犯火在翼一度半占曰内有盗臣又為兵事翼楚分也八年四月己丑又犯木在胃占曰趙分兵饑是日熒惑晨見東方先是自七年八月庚辰夕伏積二百四十九日祈禳於集英殿其日始見五月庚申火犯木在昴四度占曰子孫之福又宜察趙分兵謀之事慶歴三年十一月壬辰五星皆在東方占曰中國安寧英宗治平元年十一月庚午水犯金在尾十六度占曰辰星與太白合為隂謀為兵憂在燕趙分二年四月丁巳金犯木占曰為兵饑亦主后妃有憂戊子金犯土在張五度占曰太子不安周分有兵八月己亥火犯木躔栁七度半占曰秦分有兵謀亦為赦令十月丙申又犯土在翼二度占曰南楚之分兵起三年十二月癸卯金犯火躔危四度占曰有兵謀事神宗治平四年九月癸巳太白犯鎮主兵㦯饑十月甲子熒惑犯鎮主兵大起十一月乙卯又犯歳主赦及天下受福熙寧元年十一月己丑太白犯熒惑主兵客敗主勝㦯防逆謀三年正月己未熒惑犯歳主赦或子孫喜十月乙酉太白犯鎮主有兵八年三月庚寅又犯鎮主燕分兵十年七月癸酉又犯歳主秦分饑元豐二年五月庚寅熒惑犯歳主兵四年十月乙亥又犯太白主兵五年三月丙戌太白犯鎮主兵戰女主災十二月丙寅辰犯歳主兵七年十一月甲寅太白犯歳主大將凶哲宗元祐元年閏二月戊申八年四月乙夘太白犯熒惑皆主兵起紹聖元年閏四月庚午熒惑犯鎮主兵起及後宫宜崇福三年九月丙午太白犯鎮主楚分有兵元符元年十二月乙未太白犯熒惑主大兵西國敗二年十月乙巳太白犯鎮主鄭分饑及後宫憂十二月辛亥熒惑犯鎮主兵起及後宫徽宗崇寧三年四月丙辰熒惑犯鎮主兵起大戰又曰女子當之十一月庚寅太白犯辰主國不安先起兵者凶大觀元年十二月乙酉太白犯熒惑主君病太子憂二年正月甲寅太白犯歳主大戰民饑王者有賊十月丁酉太白犯鎮主太子不安十一月壬申太白犯歳主大戰民饑王者有賊三年三月辛未太白犯歳四年二月辛巳太白犯歳占同五月甲辰熒惑犯歳主兵大起冊太子有赦政和元年二月辛丑太白犯鎮主兵饑太子不安十二月乙未太白犯鎮占同三年七月乙丑熒惑犯太白主君亡天下兵起四年十月甲子熒惑犯歳主兵起冊太子有赦七年正月癸卯熒惑犯歳占同宣和二年十月己夘太白犯熒惑主君亡天下兵起三年閏五月壬午熒惑犯歳主兵起冊太子有赦七年七月乙未太白犯歳主王者有賊大戰民饑欽宗靖康元年六月辛丑太白犯歳占同六月丙辰土火金木聚主大盪其下兵喪並起君子憂小人流髙宗建炎四年六月戊子熒惑與鎮合於亢占主兵䘮旱是歳敵再犯淮立偽齊江湖羣盜大起鄭后計至次年隆祐太后崩十一月辛丑太白歳星合於南斗占為戰大將死又西方凶於是張浚以五路之師敗於富平誅趙哲自秦州退軍興州次年陕西皆䧟紹興元年十一月乙夘太白與鎮星合四年三月乙亥辰星與太白合於畢占為兵憂又曰西方有兵不戰是秋岳飛敗敵於襄鄧張憲破之於唐州襄漢悉平五年正月乙卯太白鎮合於南斗閏二月丙午熒惑歳星合於昴占為内亂臣有謀為旱為饑北軍困是歳亢旱七年四月丁巳金火合於東井占為爍為䘮其下之國不可舉事用兵又曰大人憂主兵不勝有破軍殺将又曰有兵兵罷國安於是王倫歸敵許和又許還河南諸州五月乙亥水金火三星合於井占是謂驚立絶行有兵喪民饑是年劉豫為金人所廢甲申火木金合於栁戊子水火金木合於栁占謂大盪有兵䘮君子憂小人流閏十月丁夘火水合於氐占為北軍用兵舉事大敗九年三月癸夘金火合於井度占為爍為喪其下之國不可舉兵又曰有破死將於是金人入東京河南陕西相繼䧟九月丁未水木合於角庚申金木合於角占大将死十月壬申金木合於氐占同次年岳飛死於獄十年十一月丁未金土合於危占為疾為内兵十二月戊子土金合於室十一年三月庚子朔土金復合於室十七年五月乙丑木與金合占大將死白衣㑹十九年六月壬戌金星行犯土星占太子不安憂於是秦檜動揺皇子七月丁未金木水合於張占其分國内外有兵災民饑改立王侯是歳完顔亮弑其主亶而自立二十八年十月乙未水星順行犯土星占夏寒雨雪妨女后閏六月己巳火星犯木星占冊太子當有赦眀年始正皇子名孝宗隆興元年七月壬寅熒惑辰星合於栁占周分赤地千里又為饑有覆軍殺将在秋為兵或大旱是年有宿離之敗乾道四年二月壬子水金合於胃占為變謀為兵憂同夜昏度瞻見金土晨度瞻見木火水是為水金火土木星俱見占五星並見其年必惡八月己亥水金火土木五星又俱見六年五月乙亥五星俱見七月乙巳火星犯木在畢占冊太子當有赦次年立恭王惇為皇太子十月庚申五星俱見八年十月癸卯五星見九年三月辛丑火木合於栁四月乙丑火木合於星占皆云為内亂臣有謀又云當其野旱以饑亡是歳浙東江東西湖北諸州旱淳熈十三年閏七月戊午夜五星皆夕伏至戊辰五星伏聚在軫又至八月乙亥日月五星俱聚軫占謂易行有徳受慶亡徳受殃光宗紹熈四年三月辛巳水星與金星㑹於昴宿内占為兵起為變謀寧宗慶元元年四月辛酉木金合於井占為白衣㑹將相死六月庚午金木合於井占西方凶又歳星所在太白從之伐者利三年八月甲戌金火木三星合於翼占三星合是謂驚立絶行其分國内外有兵䘮兵饑改立王侯後二年光宗上僊四年八月甲戌火與土合於虚占為兵亂旱䘮五年八月辛丑火星犯木星占冊太子當有赦六年四月癸巳火土合於室及火犯土星占為憂主孽卿㑹大人惡之又曰女子當之於是慈懿皇后李氏光宗皇帝相繼崩嘉泰二年正月丁巳金火水合於南斗占三星合為驚立絶行於是金國盗起邉釁始開五月庚戌火星順行犯土星占大戰開禧二年二月壬申金木土三星合於昴宿占其分國内外有兵䘮民饑改立王侯文獻通考卷二百九十三下
