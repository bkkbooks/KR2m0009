廨錢回昜生利以給公用至是蘇孝慈等以為所在官司因循往昔皆以公廨錢出舉興生唯利是求煩擾百姓奏皆給地以營農回易取利一皆禁止十七年詔在京及在外諸司公廨在市回易及諸處興生並聼唯禁出舉收利云唐凡京諸司各有公廨田司農寺給二十六頃殿中省二十五頃少府監二十二頃太常寺二卜頃京兆府河南府各十七頃太府寺十六頃吏户部各十五頃兵部內侍省各十四頃中書省將作監各十三頃刑部大理寺各十二頃尚書都省門下省太子左春坊各十一頃工部十頃光祿寺太僕寺祕書省各九頃禮部鴻臚寺都水監太子詹事府各八頃御史臺國子監京縣各七頃左右衛太子家令寺各六頃衛尉寺左右驍衛左右武衛左右威衛左右領軍衛左右金吾衛左右監門衛太子左右春坊各五頃太子左右衛率府太史局各四頃宗正寺左右千牛衛太子僕寺左右司衛率府左右清道率府左右監門率府各三頃內坊左右內率府率更府各二頃在外諸司公廨田亦各有差大都督府四十頃中都督府三十五頃下都督都護上州各三十頃中州二十頃官總監下州各十五頃上縣十頃中縣八頃下縣六頃上收監上鎮各五頃上縣及中下收司竹監中鎮諸軍折衝府各四頃諸冶監諸倉監下鎮上關各三頃牙市監諸屯監上戍中關及津各二頃其津隸都水使者不給下關一頃五十畝中戍下戍嶽瀆各一頃諸京官文武職事各有職分田一品十二頃二品十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畝八品二頃五十畝九品二頃並去京城百里內給其京兆河南府及京縣官人職分田亦準此即百里內地少欲於百里外給者亦聼之諸州及都護府親王府官人職分之田亦各有等差二品十二頃三品十頃四品八頃五品七頃六品五頃京城縣亦準此七品四頃八品三頃九品二頃五十畝鎮戍關津嶽瀆及在外監官五品五頃六品三頃五十畝七品三頃八品二頃九品一頃五十畝三衛中郎將上府折衝都尉各六頃中府五頃五十畝下府及諸郎將各五頃上府果毅都尉四頃中府三頃五十畝下府三頃上府長史别將各三頃中府下府各二頃五十畝親王府典軍五頃副典軍四頃千牛備身左右太子千牛備身各二頃諸州上折衝府兵曹二頃中府下府各一頃五十畝其外軍校尉一頃二十畝旅帥一頃隊正副各八十畝皆於領側州縣界內給其校尉以下在本縣及去家百里內領者不給其田亦借民佃植至秋冬受數而已諸職分陸田限三月三十日稻田限四月三十日以前上者並入後人以後上者入前人其麥田以九月三十日為限各前人耕未種後人酬其功直已自種者準租分法其價六斗已下者依舊定不得過六斗並取情願不得抑配開元十年六月敕所置職田本非古法爰自近制是以因循事有變通應須刪改其內外所給職田從今年九月以後並宜停給十八年六月京官職田特令準令給受復用舊制自大歷以來關中匱竭時物騰貴內官不給乃減外官職田三分之一以給京官俸每嵗通計給文武正員員外官及內侍省間廄五坊南北衙宿衛并教坊內人家糧等凡給米七十萬石宋天聖間詔罷天下職田悉以嵗入租課送官具數上三司計直而均給之朝廷方議措置令未下天子閲具獄見吏有賄敗者多惻然傷之詔復給職田即毋得多占佃户及無田而配出所租違者以枉法論後十餘年至慶歷中詔限職田有司始申定其數政和八年臣僚上言尚書省措置縣令自不滿五千户至滿萬户遞增給職田一頃夫天下圭租多寡不均久矣縣令所得亦參差不齊多至九百斛如淄川之高苑八百斛如常州之江隂六百斛如常州之宜興自是而降或四五百或二三百凡在河北京東西荆湖之間少則有至三二十斛者閩廣有自來無圭租處川陜西路自守倅至簿尉又以一路嵗入均給令獨不得而獨有今欲一概增給一頃豈可得哉詔令職田頃畝未及條格者催促摽撥乾道間臣僚言職田所以養亷亦或啓其不亷蓋交競於差遣之時多取於收斂之日以其所以養亷者為貪也紹興間懼其不均則詔諸路提刑司依法摽撥官多田少即於鄰近州縣通融頃管數足又詔將空間之田為他司官屬所占者撥以足之仍先自簿尉始其有無職田選人并親民小使臣每員月支茶湯錢十貫文內雖有職田每月不及十貫者皆與補足所以厚養亷之利也懼其病民則委通判縣令核實除其不可力耕之田損其已定過多之額凡職租不許輒令保正催納或抑令折納見錢或無田平白監租或以虛數勒令代納或額外數過多取皆申嚴禁止之令察以監司坐以贓罪所以防其不亷之害也罷廢未幾而復舊拘借未久而給還移充糴本轉收馬料旋復免行皆所以示優恩厲清操也若其頃畝多寡且有成式知藩府謂三京穎昌京兆成都太原建康江陵延安興仁隆德開德臨安府秦陽潭廣州二十頃發運轉運使副總管總管知節鎮十五頃知餘州及廣濟淮陽無為臨江廣德興國南康南安建昌邵武興化漢陽永康軍并路分鈐轄十頃發運轉運判官提舉淮南浙江南荆湖東西河北路鹽事官通判藩府八頃知餘軍及監並通判節鎮州鈐轄安撫副使都監路分都監將官發運司幹辦公事七頃通判餘州及軍滿萬户縣令六頃藩府判官録事參軍州學教授並謂承務郎以上者都監發運轉運司主管文字滿五千户縣令副將官五頃節鎮判官録事參軍州學教授並謂承務郎以上者轉運司王管帳司不滿五千户縣令滿萬户縣丞餘州都監走馬承受公事主管機宜文字同巡檢都大巡河提點馬監四頃節度掌書記觀察支使藩府及節鎮推官巡檢縣鎮寨都監監寨主巡捉私茶鹽駐泊捉賊在城監當餘州判官州學教授謂承務郎以上者軍監都監三頃五十畝軍監判官餘州推官餘州及軍監録事參軍巡檢縣鎮寨都監寨主巡捉私茶鹽駐泊捉賊在城監當藩府及節鎮曹官州學教授謂承直郎以上滿五千户縣丞滿萬户縣簿尉巡轄馬遞鋪鎮寨監當及監堰三頃餘州及軍監曹官州學教授謂承直郎以上不滿五千户縣丞滿五千户縣尉簿巡轄馬遞鋪縣鎮寨監當及監堰二頃五十畝不滿五千户縣簿尉巡轄馬遞鋪縣鎮寨監當及監堰二頃文獻通考卷六十五
