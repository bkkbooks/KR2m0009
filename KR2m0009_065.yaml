body:
  text: 文獻通考卷六十五鄱陽馬端臨貴與著職官考十九祿秩周班爵祿之制天子一位公一位侯一位伯一位子男同一位凡五等也君一位卿一位大夫一位上士一位中士一位下士一位凡六等大國君十卿祿卿祿四大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿趙岐曰庶人在官者未命為士者次國君十卿祿卿祿三大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿小國君十卿祿卿祿二大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿皆祿足以代耕也卿祿與君祿皆十分之一大夫與卿各相加士不得耕以祿代耕也及乎周衰諸侯惡其害已而去其籍諸侯恣行惡其法度之害已而滅去其籍故今周禮司祿之官闕其職也故其詳不可得而聞矣蓋其略也孟子天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸視比也諸侯之下士祿食九人中士食十八人上士食三十六人下大夫食七十二人卿食二百八十八人君食二千八百八十人次國之卿食二百一十六人君食二千一百六十人小國之卿食百四十四人君食千四百四十四人次國之卿命於君者亦如小國之卿凡制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差農夫皆受田於公田有五等收入不同也庶人在官者謂府史之屬官長所除不命於天子國君者分或為糞故諸侯之下士視上農夫祿足以代耕也王制漢制祿秩自中二千石至百石各有等差宣帝又益天下吏百石以下俸十五漢書曰若食一斛則益五斗又應劭注漢書曰張敞蕭望之言曰夫倉廪實而知禮節衣食足而知榮辱今小吏俸率不足常有憂父母妻子之心雖欲潔身為廉其勢不能請以什率增天下吏俸宣帝乃益天下吏俸什二而漢書言十五兩存其説至成帝陽朔二年除八百石五百石秩除八百就六百除五百就四百綏和二年又益吏三百石以下俸凡吏比二千石以上年老致仕者三分故祿以一與之終其身其時亦有俸錢之差但本史文不具耳故元帝時貢禹上書曰臣為諌議大夫秩八百石俸錢月九千二百廪食太官又拜為光祿大夫秩一千石俸錢月萬二千祿賜愈多家日以益富中二千石月俸百八十斛二千石百二十斛比二千石百斛千石八十斛六百石七十斛四百石五十斛比四百石四十五斛三百石四十斛比三百石三十七斛二百石三十斛比二百石二十七斛百石十六斛自四百石至二百石為長吏吏理也主理其縣內百石以下有斗食佐史之秩顔師古曰漢官名秩簿云斗食月俸一十斛佐史月俸八斛也一説斗食者歲俸不滿百石計日而食一斗二升故云斗食也是為小吏本史王莽詔曰自公卿以下一月之祿十斛緵布二匹或帛一匹豫每念之今俸祿一嵗六十斛以差增上至四輔而為萬斛孟康曰緵八十縷也後漢大將軍三公俸月三百五十斛風俗通曰漢制三公一歲共食萬石按此則有出蓋舉大數也至建武二十六年增百官俸其千石以上減於西京舊制六百石以下增於舊秩本史永初四年又減百官及州郡縣俸各有差凡諸受俸皆取半錢榖延平中定制中二千石月俸錢九千米七十二斛真二千石錢六千五百米三十六斛比二千石錢五千米三十四斛千石錢四千米三十斛六百石錢三千五百米二十一斛四百石錢二千五百米十五斛三百石錢二千米十二斛二百石錢一千米九斛一百石錢八百米四斛八斗凡中二千石丞比千石真二千石丞長史六百石比二千石丞比六百石令相千石者丞尉皆四百石其六百石者丞尉皆三百石長相四百石及三百石者丞尉皆二百石諸侯公主家丞秩皆比三百石諸邊障塞尉諸陵校尉皆二百石有常例者不署秩本志大將軍三公臘賜錢榖各二十萬牛肉二百斤粳米二百斛特進侯以下各有差立春之日遣使者賜文官司徒司空帛三十匹九卿十五匹武官太尉大將軍各六十匹執金吾諸校尉各三十匹武官倍文官漢官儀獻帝建安八年頒賜三公以下金帛由是三年一賜以為常制本史晉制諸公及開府位從公有品秩第一食俸日五斛給絹春百匹秋二百匹綿二百斤特進食俸日四斛春服絹五十匹秋絹百五十匹綿一百五十斤光祿大夫食俸日三斛春賜絹五十匹秋百匹綿百斤尚書令食俸月五十斛春月三十匹秋七十匹綿七十斤太子太傅少傅食俸日三斛春賜絹五十匹秋百匹綿百斤右通典所載歷代祿秩惟不及魏晉今於晉書百官志録出前條以補之但志所載惟及諸公開府位從公者與特進光祿大夫尚書令太子二傅而餘官祿秩皆無可考則亦未為全備也宋氏以來州郡秩俸及雜供給多隨土所出無有定準永元初詔二品清官以上應食祿者有二親或祖父母年登七十並給見錢其郡縣田祿以芒種為斷此前去官者則一年秩祿皆入前人此後去者悉入後人元嘉末又改此制計月分祿武帝初即位制凡中二千石加公田一頃齊氏衆官有僮幹之役而不詳其制永明五年制二品清官行僮幹杖不得出十張融坐鞭幹錢敬道杖五十免官又梁王諶為吏部郎坐鞭曹申免官幹者若門僕之類也梁天監初定九品令帝於品下注一品秩為萬石第二第三品為中二千石第四第五品為二千石及侯景之亂國用常𥚹京官文武月唯别得廪食多遙帶一郡縣官而取其祿秩焉揚徐等大州比令僕班揚州督王畿理建康徐州督重鎮理京口並外官刺史最重者尚書令僕射官品第三也寧桂等小州比參軍班寧州理建寧今雲南郡桂州理始安今郡並與外官刺史最輕者公府參軍官品第六也丹陽郡吳郡會稽等郡同太子詹事尚書班丹陽尹理建康吳郡會稽即今郡並列郡重者詹事尚書官品第三也高原晉康等小郡三班而已高原晉康即今郡並列郡最輕者梁武帝定九品後其內官吏為十八班以班多者為貴同班者即以居下為劣則與品第高下不倫當是其時更以清濁為差耳本史既略不可詳審焉大郡六班小縣兩轉方至一班品第既殊不可委載其州郡縣祿米絹布絲綿當處輸臺附倉庫若給刺史守令等先準其所部文武人物多少由敕而裁凡如祿秩既通所部兵士給之其家得蓋少諸王諸主出閣就第婚冠所須及衣裳服飾并酒米魚鮭香油紙燭等並受官給之王及主壻外祿者不給解任還京仍公給後魏初無祿秩者至孝文太和八年始班俸祿罷諸啇人以簡民事户增調三匹榖三斛九升以為官司之祿均預調為二匹之賦祿之後贓滿一匹者死其祿每季一請於是百官受祿有差至十年議民官依户給俸本史又曰初邊方小郡太守數户而已一請止六尺絹歲不滿匹北齊官秩一品嵗八百匹二百匹為一秩從一品七百匹一百七十五匹為一秩二品六百匹一百五十匹為一秩從二品五百匹一百二十五匹為一秩三品四百匹一百匹為一秩從三品三百匹七十五匹為一秩四品二百四十匹六十匹為一秩從四品二百匹五十匹為一秩五品一百六十匹四十匹為一秩從五品一百二十匹三十匹為一秩六品一百匹二十五匹為一秩從六品八十匹二十匹為一秩七品六十匹十五匹為一秩從七品四十匹十匹為一秩八品三十六匹九匹為一秩從八品三十二匹八匹為一秩九品二十八匹七匹為一秩從九品二十四匹六匹為一秩祿率一分以帛一分以粟一分以錢事繁者優一秩平者守本秩間者降一秩長兼試守者亦降一秩官非執事不朝拜者皆不給祿州郡縣制祿之法刺史守令下車各前取一時之秩上上州刺史嵗秩八百匹與司州牧同上中上下各以五十匹為差中上降上下一百匹中中及中下亦以五十匹為差下上降中下一百匹下中下下亦以五十匹為差上郡太守嵗秩五百匹降清都尹五十匹上中上下各以五十匹為差中上降上下四十匹中中及中下各以三十匹為差下上降中下四十匹下中下下各以二十匹為差上上縣嵗一百五十匹與鄴臨漳成安三縣同上中上下各以十匹為差中上降上下三十匹中中及中下各以五匹為差下上降中下二十匹下中下下各以十匹為差州自長史下逮於史吏郡縣自丞以下逮於掾佐亦皆以帛為秩郡有尉者尉減丞之半皆以其所出常調課給之自一品以下至流外勳品各給事力一品至三十人下流外勳品或以五人為等或以四人三人二人一人為等繁者加一等平者守本力間者降一等諸州刺史守令以下幹及力皆聼敕乃給其幹出所部之人一幹輸絹十八匹幹身放之力則郡縣白直充後周秩下士一百二十五石中士以上至於上大夫各倍之上大夫是為四千石卿二分孤三分公四分各益其一公因盈數為萬石其九秩一百二十石八秩至於七秩每二秩六分而下各去其一二秩一秩俱為四十石凡班祿視年之上下畝至四釜為上年上年頒其正三釜為中年中年頒其半二釜為下年下年頒其一無年為凶荒不頒祿隋京官正一品祿九百石下每以百石為差至正四品是為三百石從四品二百五十石其下每以五十石為差至正六品是為一百石從六品九十石以下每以十石為差至從八品是為五十石食封及官不判事者並九品皆不給祿其給皆以春秋二季刺史太守縣令則計戶而給祿各以户數為九等之差大州六百二十石其下每以四十石為差至於下下則三百石大郡二百四十石其下每以三十石為差至於下下則一百石大縣百四十石其下每以十石為差於下下則六十石其祿唯及刺史二佐及郡守縣令本志文帝時嘗以百僚供費不足臺省府寺咸置廨錢收息取給工部尚書蘇孝慈以為官人爭利非興化之道上表請罷從之公卿以下及給職田各有差本志義寧二年唐王為相國罷外官給祿每十斛給地二十畝唐武德中外官無祿貞觀二年制有上考者乃給祿後遂定給祿俸之制以民地租充之京官正一品七百石從一品六百石正二品五百石從二品四百六十石正三品四百石從三品三百六十石正四品三百石從四品二百六十石正五品二百石從五品一百六十石正六品一百石從六品九十石正七品八十石從七品七十石正八品六十七石從八品六十二石正九品五十七石從九品五十二石諸給祿者三師三公及太子三師三少若在京國諸司文武官職事九品以上并左右千牛備身左右太子千牛並依官給其春夏二季春給秋冬二季秋給凡京文武官每嵗給祿總一十五萬一千五百三十三石二斗自至德之後不給其在外文武官九品以上準官皆降京官一等給其文武官在京長上者則不降諸給祿應降等者正從一品各以五十石為一等二品三品皆以三十石為一等四品五品皆以二十石為一等六品七品皆以五石為一等八品九品皆以二石五斗為一等其俸錢之制京司諸官初置公廨令行署及蕃官興易以充其俸貞觀十二年罷公廨置胥士七千人取諸州上户為之準防閣例而收其課三嵗一更計員少多而分給焉貞觀十五年以府庫尚虛敕在京諸司依舊置公廨給錢充本置令史府史胥士等令回易納利以充官人俸諫議大夫褚遂良上疏言其不便太宗納之停諸司捉錢依舊本府給月俸二十一年復依故制置公廨給錢為之本置令史府胥士等職賈易收息以充官俸永徽元年悉廢胥士等更以諸州租庸腳直充之其後又令薄賦百姓一年稅錢依舊令高户及典正等掌之每月收息以充官俸其後又以稅錢為之而罷其息利凡京文武正官每嵗供給俸食等錢并防閣庶僕及雜錢等總一十五萬三千七百二十貫員外官不在此數外官則以公廨田收及息錢等常食公用之外分充月料先以長官定數其州縣少尹長史司馬及丞各減長官之半尹大都督府長史副都督别駕及判司準二佐以職田數為加減其參軍及博士減判司主簿縣尉減縣丞各三分之一謂內外員外官同正員者祿料賜會食料一事以上並同正員其不同正員者祿賜食料亦同正員餘各給半職田並不給自乾元之後以常賦不給內外官俸祿各減其半內供奉及裏行不帶本官者祿俸食料防閣庶僕一事以上並同正官帶官者聼從多處給若帶外官者依京官給食料賜會與京官同諸檢校及判試知等官不帶內外官者料度一事以上準員外官同正員例給若檢校及判試知處正官見闕者兼給雜用其職田不應入正官者亦給其侍御史殿中及監察御史知試並同內供奉裏行例儀鳯二年制內外官俸食防閣邑士白直等宜令王公以下率口出錢以充給焉調露元年九月職事五品以上準舊給仗身武太后光宅元年九月以京官八品九品俸料授簿諸八品每年給庶僕三人九品二人又有親事帳內六品七品子為親事八品九品子為帳內限年十八以上舉諸州共率萬人為之凡王公以下及文武職事三品以上帶勳官者則給之其親事府帳內府官附在王侯篇三師三公開府儀同三司一百三十人嗣王郡王一百八人上柱國帶二品以上職事九十五人帶三品職事六十九人柱國帶二品以上職事七十九人帶三品職事六十二人上護軍帶二品以上職事七十三人帶三品職事五十五人護軍帶二品以上職事六十三人帶三品職事三十六人諸州縣之官流外九品以上皆給白直二品四十人三品三十二人四品二十四人五品十六人六品十人七品七人其七品佐官六人八品五人九品四人諸州縣官流內九品以上及在外監五品以上皆給執衣隨身驅使典執筆硯其監官於隨近州縣取充二品十八人三品十五人四品十二人五品九人六品七品各六人八品九品各三人關津嶽瀆官並不給分為三番每周而代不願代者聼之初以民丁中男充為之役使者不得踰境後皆捨其身而收其課課入所配之官遂為恆制鎮戍之官以鎮戍上中下為差上鎮給仗身四人中下鎮將副各三人中下鎮副各二人倉曹兵曹戍主副各一人其伏身十五日一時收資六百四十開元十年正月省王公以下視品官參佐及京官五品以上官仗身職員凡京司文武職事官五品以上給防閣一品九十六人二品七十二人三品四十八人四品三十二人五品二十四人六品以下給庶僕六品五人七品四人八品三人九品二人公主邑士八十人郡主六十人縣主四十人特封縣主三十四人京官仕兩職者從多給凡州縣官皆有白直二品四十人三品三十二人四品二十人五品十六人六品十二人七品六人八品五人九品四人凡諸親王府屬並給士力數如白直其防閣庶僕白直士力納課者每年不過二千五百執衣元不過一千文防閣庶僕舊制季分月俸食料雜用即有分諸官應月給開元二十四年六月乃撮而同之通謂之俸料一品月俸料八千食料千八百雜用千二百防閣十五千通計共二十又六千三品月俸五千食料千一百雜用九百防閣十千通計十七千四品月俸三千五百食料七百雜用七百防閣六千六百六十七通計十一千五百六十七五品月俸三千食料六百雜用六百防閣五千通計九千二百六品月俸二千食料四百雜用四百庶僕二千五百通計五千三百七品月俸千七百五十食料三百五十雜用三百五十庶僕千六百通計四千五十八品月俸千三百五十食料三百雜用三百庶僕六百通計二千五百五十九品月俸千五十食料二百五十雜用二百庶僕四百通計千九百其數目國初以來即有中開色目或有加減今方為定制員外官帶同正者不減正員官食料錢不帶同正者減半致仕官建中三年九月敕所請半祿料及賜物等並宜從敕出日於本貫及寄住處州府支給至貞元四年四月敕其宴會及朔望朝參並依恆式自今已後宜準此諸州縣不配防人處城及倉庫門各二人須守護者取年十八已上中男及殘疾據見在數均為番地勿得偏併每番一旬每城門各四人倉庫門各二人其倉門每萬石加一人石數雖多不得過五人其京兆河南府及赤縣大門各六人庫門各三人其須修理官廨及祗承官人聼量配驅使若番上不到應須徴課者每番間月不得過一百七十忙月不得過二百文滿五旬者殘疾免課調中男免雜徭其州城郭之下户數不登者通取於他縣總謂之門夫其後舉其名而徴其資以給郡縣之官其門之多少課之高下任土作制無有常數天寶五載制郡縣白直計數多少同料錢加稅以充之不得配丁為白直十四載八月制兩京文武官九品以上正員官自今以後每月給食雜用防閣庶僕等宜十分率加二分其同正官加一分仍永為常式乾元元年制外官給半料以職田不給料令度支使量間劇司給手力課員外官一切無料大歷三年通計京城諸司每月給手力資錢凡四萬七千五百四十六貫四十文並以天下青苖錢充初以常賦不給乃稅人墾田畝十有五錢資用窘急不暇成熟候苖青即征之故謂之青苖錢主其任者為青苖使貞元四年正月敕京文武官員及兩京府縣官總三千七百七貫據元給及雜加每當錢五萬一千四百四貫六百一十七文一年都當六十一萬六千八百五十五貫四百文天寶七載九月敕五品以上正元清官諸道節度使及太守等並聼常蓄絲竹以展歡娛行樂盛時式覃中外至八載六月敕其男口給使王公家不過二十人其職事官一品不得過十人三品不得過八人四品不得過六人五品不得過四人京文武清官六品七品不得過二人八品九品不得過一人百官家蓄絲竹及給使口並是朝恩優寵資給故附於庶僕俸料之後建中三年令文武百官每月料錢一百貫已上者三分減一八十貫以上者五分減一餘減有差三十貫以下者不減待兵革寧後依舊興元元年乃詔凖元數支給元和七年中書門下奏國家依品制俸官一品月俸三十千職田祿米大約不過千石一品以下多少可知艱難以來網禁漸弛於是增置使額厚請俸錢故大歷中權臣月俸有至九千貫者列郡刺史無大小給皆千貫常衮為相始立限約至李泌又量其間劇隨事增時謂通濟理難減削然有名存職廢額去俸存間劇之間厚薄頓異乃命詳定減省十五年敕近者每嵗給費量入不充外官俸祿據數抽貫今幸遇豐登八方寧謐其度攴所凖敕應給用錢每貫抽五十文都計一百五十萬貫文並宜停抽大中六年中書門下奏應諸州刺史既欲責其潔已須令俸祿稍充但以厚薄不同等級無制致使俸薄處無人願去祿厚處終日爭先應中下州司馬軍事俸料共不滿一百千者請添至一百千緊上州添至一百五十千雄望州添至二百千先已過者即仍舊梁開平三年詔百官俸料委左藏庫依則例全給漢乾祐三年敕諸道州府令録判官主簿宜令等第支與俸户逐户每月納錢五百與除二稅外免放諸雜差遣不得更種職田所定俸户於中等無色役人户內置不得差令當直及赴衙參若是令録判司主簿除本分人數外剩占俸户及令當直手力更納課錢並許百姓陳告周顯德五年中書奏諸道州府縣官及軍事判官並宜則例定料錢及米麥等以來年支給其內外官課户莊户俸户柴炭紙筆户等並停如今後更有人户願充此等户者仰本州勒充軍户配本州牢城執役宋興咸平間知制誥楊億上疏言唐制內外官俸錢支外有祿米職田又給防閣庶僕親事帳內執衣白直門夫各以官品差定其數歲收其課資於家本司又有公廨田食本錢以給公用自唐末離亂國用不充百官俸錢並減其半自餘别給一切權罷官於半俸之中已是除陌又於半俸三分之內其二分以他物給之鬻於市㕓十裁得其三曾糊口之不及豈代耕之足云昔漢宣帝下詔云吏能勤事而俸祿薄欲其無侵漁百姓難矣遂加吏俸著於策書竊見今之結髮登朝陳力就列其俸也不能致九人之飽不及周之上農其祿也未嘗有百石之入不及漢之小吏若乃左右僕射百僚之師長位莫崇焉月俸所入不及軍中千夫之師甚可駭也豈稽古之意哉欲乞百官俸祿雜給並循舊制既豐其稍入可責以廉隅直限以常員理當減於舊費又唐虞之制也乾興已後俸祿添給傔人餐錢之制更革為多至嘉祐始著於祿今自宰相而下至嶽瀆廟主簿凡四十一等熙寧以來悉用嘉祐祿今無所損益元豐一新官制職事官職錢以寄祿官高下分行守試三等大率官以祿令為準而在京官司供給之數皆併為職錢如大夫為郎官既請大夫俸矣又給郎官職錢視嘉祐時賦祿為優至崇寧間蔡京秉政吳居厚張康國輩貪鄙為徒於寄祿官俸錢職事官職錢外復增供給食料等錢如京僕射俸外又請司空俸其餘傔從錢米並支本色餘執政皆然視元豐制祿之法增倍矣中興俸祿之制參用嘉祐元豐政和之舊少所增損惟兵興之始宰執請受權支三分之一或支三分之二或支賜一半隆興及開禧自陳損半支給皆權宜也其後內外官有添支料錢職事官有職食厨食錢職纂修者有折食錢在京釐務官有添支錢添支米選人使臣職田不及者有茶湯錢其餘祿粟傔人悉還疇昔今合新舊制而參紀之元豐定制以官寄祿中興重加修定文臣請俸開府儀同三司料錢一百貫特進九十貫春冬衣絹各二十五匹小綾十匹春羅一匹冬綿五十兩金紫光祿大夫銀青光祿大夫料錢各六十貫春冬絹各二十匹小綾七匹春羅一匹冬綿五十兩宣奉大夫正奉大夫正議大夫通奉大夫料錢各五十貫春冬絹各十七匹小綾五匹春羅一匹冬綿五十兩通議大夫大中大夫中大夫中奉大夫中散大夫料錢各四十五貫春冬絹各十五匹小綾三匹春羅一匹冬綿五十兩朝議大夫奉直大夫朝請大夫朝散大夫朝奉大夫以上料錢各三十五貫春冬絹各十三匹春羅一匹冬綿三十兩奉儀郎料錢二十貫春冬絹各十匹春羅一匹冬綿三十兩通直郎料錢十八貫春冬絹各七匹春羅一匹冬綿三十兩宣教郎料錢十五貫春冬絹各五匹冬綿十五兩宣義郎料錢十二貫春冬絹各五匹冬綿十五兩承事郎料錢十貫春冬絹各五匹冬綿十五兩承奉郎料錢八貫承務郎料錢七貫元豐以來釐務止支驛料大觀二年定支以上料錢一分見錢二分折支每貫折錢在京四百文在外四百文到任添給驛料承直郎料錢二十五貫茶湯錢十貫厨料米六斗麵一石五斗藁四十束柴二十束馬一匹春冬絹六匹綿十二兩儒林郎料錢二十貫茶湯錢十貫厨料米六斗麵一石五斗藁二十束柴十五束春冬絹各五匹綿十兩文林郎料錢十五貫茶湯錢十貫厨料米六斗麵一石五斗藁二十束柴十五束春冬絹各五匹綿十兩從仕郎從政郎修職郎以上料錢各十五貫茶湯錢十貫米麥各二石迪功郎料錢十二貫茶湯錢十貫米麥各一石五斗以上錢折支中給一半見錢一半折支每貫折見錢七百文釐務日給滿替日住武臣請俸太尉料錢一百貫春服羅一匹小綾及絹各十匹冬服小綾一十匹絹二十匹綿五十兩正任節度使在光祿大夫之下初除及管軍同料錢四百祿粟一百五十石承宣使在通議大夫之下料錢三百貫祿粟一百石觀察使在中大夫之下料錢各二百貫祿粟一百石米麥十五石防禦使在中散大夫以下料錢二百貫祿粟一百石米麥各一十二石五斗團練使在中散大夫之下料錢一百五十貫祿粟七十石米麥各九石諸州刺史在中散大夫之下料錢一百貫祿粟五十石來麥各七石五斗自承宣使以下不帶階官者為正任帶階官者