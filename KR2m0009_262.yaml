body:
  text: 文獻通考卷二百六十二鄱陽馬端臨貴與著封建考三春秋列國傳授本末事迹吳太伯與弟仲雍皆周太王之子王季厯之兄季厯賢而有聖子昌太王欲立季厯以及昌太伯仲雍乃奔荆蠻文身斷髮示不可用以避季厯季厯立太伯在荆蠻自號句吳荆蠻義之歸者千餘家立為吳太伯太伯卒弟仲雍立仲雍子季簡傳叔達周章熊遂柯相疆鳩夷餘橋疑吾柯盧周繇屈羽夷吾禽處轉頗髙句卑去齊夀夢諸樊餘祭餘昧僚闔廬夫差凡二十五傳而吳為越所滅齊太公呂尚薑姓蓋四嶽苖裔以漁釣干西伯西伯立為師武王立師尚父佐武王伐商有天下乃封之於齊營邱子丁公伋傳乙公癸公哀公胡公獻公武公厲公文公成公莊公釐公襄公桓公孝公昭公懿公惠公頃公靈公莊公景公悼公簡公平公宣公康公凡二十八傳而齊為田和所併魯周公武王弟佐武王伐紂有天下相成王封魯曲阜子魯公伯禽傳考公煬公幽公魏公厲公獻公真公武公懿公伯御孝公惠公隱公桓公莊公閔公僖公文公宣公成公襄公昭公定公哀公悼公元公穆公共公康公景公平公文公頃公凡三十五傳而魯為楚所滅燕召公奭與周同姓姬氏文王武王之時自陕以西召公主之既克商乃封召公於北燕自召公以下九世至惠侯傳釐侯頃侯哀侯鄭侯繆侯宣侯桓侯莊公襄公桓公宣公昭公武公文公懿公惠公悼公共公平公簡公獻公孝公成公湣公釐公桓公文公易王王噲昭王惠王武成王孝王王喜凡四十三傳而燕為秦所滅潁濵蘇氏曰燕國於蠻貊之間禮樂微矣春秋之際未嘗出與諸侯會盟至於戰國亦以耕戰自守安樂無事未嘗被兵文公二十八年蘇秦入燕始以縱橫之事説之自是兵交中國無復寧嵗六世而亡吳自太伯至夀夢十七世不通諸侯自巫臣入吳教之乘車戰射與晉楚力爭七世而亡燕吳雖南北絶逺興亡之迹大略相似彼説客䇿士借人之國以自快於一時可矣而為國者因而循之猖狂恣行以速滅亡何哉夫起於僻陋之中奮於諸侯之上如商周先王以德服人則可不然皆禍也丹欲以一七首斃秦正使能害秦王亦何救於秦之滅燕而况不能哉此又蘇秦所不取也容齋洪氏隨筆曰北燕在春秋時最為僻小能自見於中國者不過三四大率制命於齊七雄之際為齊所取後賴五國之力樂毅為將然後勝齊然卒於得七十城不能守也故蘇秦説趙王曰趙北有燕燕固弱國不足畏也燕王曰置人國小西迫強秦南近齊趙齊趙強國也又曰天下之戰國七而燕處弱焉獨戰則不能有所附則無不重昭王謂郭隗曰孤極知燕弱小不足以報齊蘇代曰一齊之強燕猶不能支奉陽君曰燕弱國也東不如齊西不如趙趙長平之敗壯者皆死燕以二千乘攻之為趙所敗太子丹請荆軻曰燕小弱數困於兵何足以當秦楚漢之初趙王武臣為燕軍所得趙厮養卒謂其將曰一趙尚易燕况以兩賢王滅燕易矣彭寵以漁陽叛即時夷滅十六國之起中華多故稱燕稱趙者多矣未嘗有只據燕薊之地者也獨安祿山以三十年節制之威又兼領河東乘天寶政亂出不意而舉兵史思眀繼之雖為天下之禍旋亦殄滅至於藩鎮擅地所謂范陽盧龍固常受制於天雄成德也劉仁恭守光父子僭竊一方唐莊宗遣周德威攻之克取巡屬十餘州如拾地芥石晉割賂契丹仍其舊國恃以為強然晉開運陽城之戰德光幾不免周世宗小振之立下三關但太平興國失於輕舉又不治敗將喪師之罪致令披猖以迄於今若以謂幽燕為用武之地則不然也蔡武王伐商立武庚以管叔蔡叔監殷管叔以殷叛周公討之殺管叔放蔡叔其子蔡胡率德改行周公以為卿士叔卒乃封胡於蔡蔡仲子蔡伯傳宮侯厲侯武侯信侯釐侯共侯戴侯宣侯桓侯哀侯繆侯莊侯文侯景侯靈侯平侯悼侯昭侯成侯聲侯元侯侯齊凡二十四傳而蔡為楚所滅曹曹叔振鐸武王弟武王克殷封振鐸於曹振鐸子太伯傳仲君平宮伯孝伯夷伯幽伯戴伯惠伯石甫繆公桓公莊公釐公昭公共公文公宣公武公平公悼公聲公隱公靖公伯陽凡二十五傳而曺為宋所滅陳舜傳禹天下而舜子商均為封國夏后之時或失或續至周武王克殷紂乃復求舜後得媯滿封之於陳以奉舜祀是為胡公子申公傳桓公孝公慎公幽公釐公武公夷公厲公利公莊公宣公穆公共公靈公惠公懷公湣公凡十九傳而陳為楚所滅把夏后禹之後殷時或封或絶周武王克殷求禹之後得東樓公封之於把以奉夏后氏祀東樓公子西樓公傳題公謀娶公武公靖公共公德公桓公孝公文公平公悼公隱公釐公湣公哀公幽公簡公凡十九傳而把為楚所滅衛康叔周武王母弟克商立武庚令管蔡霍叔監之武王崩三監挾武庚叛周公討平之乃封康叔於殷故墟康叔子康伯傳考伯嗣伯康伯靖伯貞伯頃侯釐侯武公莊公桓公宣公惠公懿公戴公文公成公穆公定公獻公殤公靈公出公莊公悼公敬公昭公懷公慎公聲公成侯平侯嗣君懷君元君君角凡三十七傳而衛為秦所滅宋微子殷帝乙元子紂庶兄武王崩武庚叛周公討誅之乃封微子於宋奉殷祀微子卒弟微仲立傳宋公丁公湣公煬公厲公釐公惠公哀公戴公武公宣公穆公殤公莊公湣公桓公襄公成公昭公文公共公平公元公景公昭公悼公休公辟公剔成偃凡三十二傳而宋為齊所滅晉唐叔虞周武王子成王弟成王封叔虞於唐叔虞子燮傳武侯成侯厲侯靖侯釐侯獻侯穆侯殤叔文侯昭侯孝侯鄂侯哀侯小子侯湣侯武公獻公惠公懷公文公襄公靈公成公景公厲公悼公平公昭公頃公定公出公哀公幽公烈公孝公靜公凡三十八傳而晉為韓趙魏所分楚其先出自帝顓頊髙陽其後為重黎至周成王時舉文武勤勞之後而封熊繹於楚蠻封以子男之田姓芈氏居丹陽熊繹生熊艾熊熊勝熊楊熊渠熊摰紅熊延熊勇熊嚴熊霜熊徇熊咢若敖霄敖蚡冒武王文王杜敖成王穆王莊王共王康王郟敖靈王平王昭王惠王簡王聲王悼王肅王宣王威王懷王頃襄王考烈王幽王哀王王負芻自熊繹至負芻四十一傳而楚為秦所滅越其先禹之苗裔少康之庶子封於會稽以奉禹祀文身斷髮披草萊而邑後二十餘世至於允常允常子句踐傳鼫與不夀翁翳之侯無疆自允常以後凡八傳而越為楚所滅鄭桓公友周厲王少子宣王庶弟宣王封友於鄭桓公子武公傳莊公厲公昭公子亹子儀文公穆公靈公襄公悼公成公釐公簡公定公獻公聲公哀公共公幽公繻公君乙凡二十三傳而鄭為韓所滅趙其先與秦共祖至周幽王時叔帶去周如晉事晉文侯五世而後生趙夙晉獻公賜趙夙耿夙生趙衰盾宣子朔莊子武文子成景叔鞅簡子毋恤襄子浣獻侯列侯籍始命為諸侯武公敬侯成侯肅侯武靈王惠文王孝成王悼襄王幽穆王遷自列侯籍至幽繆王遷十傳而趙為秦所滅魏其先畢公髙之後與周同姓其後絶封為庶人或在中國或在夷狄其苖裔曰畢萬事晉獻公獻公賜畢萬魏萬生犫武子悼子絳昭子嬴荼獻子侈桓子文侯斯始命為諸侯武侯惠王襄王哀王昭王安釐王景湣王王假自文侯斯至王假凡九傳而魏為秦所滅韓其先與周同姓其後苖裔事晉得封於韓原曰韓武子或言邘晉應韓皆武王之子韓侯在宣王時其後國滅而後裔事晉復封於韓或言韓萬是曲沃桓叔之子萬即武子也武子後三世有韓厥獻子起宣子頃貞子不信簡子莊子虎康子啓章武子景侯虔始為諸侯列侯文侯哀侯懿侯昭侯宣惠王襄王釐王桓惠王王安自景侯虔至王安十一傳而韓為秦所滅齊陳完陳厲公他之子厲公為蔡人所殺完不得立奔齊為工正完卒諡敬仲敬仲生稚湣須無文子無宇桓子開武子乞僖子常成子盤襄子白莊子太公和始為諸侯桓王威王宣王湣王襄王王建自太公和至王建七傳而齊為秦所滅秦其先帝顓頊之苖裔孫曰女修生子大業大業生大費即伯益其後至周孝王時有非子為王主馬於汧渭之間孝王分土為附庸邑之秦使續嬴氏祀號曰秦嬴秦嬴生秦侯公伯秦仲莊公襄公文公寧公武公德公宣公成公繆公康公共公桓公景公哀公惠公悼公厲共公躁公懷公靈公簡公惠公獻公孝公惠文王武王昭襄王孝文王莊襄王始皇帝二世皇帝自秦嬴三十四傳至始皇而并天下二世而亡右春秋十二列國戰國七雄太史公作史記有各國世家敘述已為詳􅊀兹不復具録姑略敘各國得封之由與傳授之世系而已至於邾莒許滕薛郳以下諸國其事實之見於春秋左氏內外傳及傳記諸書者頗詳史記以其國小不復作世家後來無述焉故托各國事實之可考者仿世家之例備述於後至其世系之傳授得封分地受姓受爵之源委苟有可考者則書之難書者闕之所敘述一依史傳元文而不敢有所去取刪潤避不敏也邾邾曺姓子爵出自陸終第五子晏安之後武王克商封其苖裔曺挾於邾為附庸國在魯國鄒縣今濟州城南有邾婁城國在某縣本杜預注左傳今為某處本鄭樵考今諸國地名後同魯隱公元年公即位而欲求好於邾故與邾子克盟於蔑十月鄭人以王師虢師伐衛南鄙請師於邾邾子使私於魯大夫公子豫豫請往魯公不許遂行及邾人鄭人盟於翼五年宋人取邾田邾告於鄭曰請君釋憾於宋敝邑為道鄭人以王師會之伐宋入其郛七年魯伐邾為宋討也桓公八年魯伐邾十五年邾人朝于魯十七年魯及邾子克盟於趡尋蔑之盟莊公十六年邾子克卒僖公元年魯敗邾師於偃虛邱之戍將歸者也虛邱邾地邾人既送哀薑還齊人殺之因戍虛邱欲以侵魯公以義求齊齊送薑氏之喪而邾人懼乃歸故公要而敗之二十二年邾滅須句魯伐邾取須句反其君焉八月邾人以須句故伐魯僖公卑邾不設備戰於升陘魯師敗績三十三年魯伐邾取訾婁以報升陘之役邾人不設備秋襄仲復伐邾文公七年魯伐邾取須句置文公子焉僖公取須句反其君後復為邾所取今魯再取之邾文公子叛在魯故魯使之為須句大夫十三年邾文公卜遷於繹繹邾邑魯國鄒縣北有繹山史曰利於民不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷於繹五月邾文公卒君子曰知命十四年邾文公之卒也公使弔焉不敬邾人來討伐魯南鄙故惠伯伐邾文公元妃齊薑生定公二妃晉姬生捷災文公卒邾人立定公捷災奔晉晉趙盾以諸侯之師八百乘納捷災於邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還宣公十年魯伐邾取繹成公十三年會晉諸侯之師伐秦十八年邾宣公即位朝于魯襄公元年邾子朝於魯會晉諸侯之師圍宋彭城伐鄭四年邾莒伐鄫魯臧紇救鄫侵邾魯師敗於狐駘六年魯穆叔如邾聘且修平平四年狐駘戰十一年會晉及諸侯伐鄭會於蕭魚十四年會晉及諸侯於向遂從晉侯及諸侯之師伐秦十五年邾伐魯南鄙魯告於晉晉將為會以討邾莒晉侯有疾乃止十六年會晉及諸侯於湨梁晉以魯故執邾宣公十七年邾伐魯南鄙為齊故也齊未得志於魯邾故助之十九年晉及諸侯盟於督楊執邾悼公以其伐魯故遂次於泗上疆魯田正邾魯之界取邾田自漷水歸之於魯邾田在漷水北今更以漷為界故曰取邾田二十年會晉及諸侯盟於澶淵邾人驟伐魯魯以諸侯之事弗能報秋孟莊子伐邾以報之二十一年邾大夫庶其以漆閭邱奔魯季武子以公姑姊妻之皆有賜於其從者二十二年會晉及諸侯於沙隨二十二年邾畀我奔魯畀我庶其之黨二十五年會晉及諸侯於夷儀二十七年晉楚及諸侯盟於宋齊人請邾不與盟二十八年邾悼公朝於魯昭公十一年魯孟僖子會邾莊公盟於祲祥十三年晉會諸侯於平邱邾莒訴於晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉公不見魯公執季孫意如十八年邾襲鄅入之盡俘以歸既而反鄅夫人舍其女十九年宋為鄅故伐邾圍蟲三月取之乃盡歸鄅俘邾人郳人徐人會宋公同盟于蟲二十三年邾人城翼邾邑還將自離姑亦邾邑從離姑則道經魯之武城公孫鉏曰魯將御我欲自武城還循山而南徐鉏邱弱茅地三子邾大夫曰道下遇雨將不出是不歸也謂此山道下濕遂自離姑武城人塞其前以兵塞前道斷其後之木而弗殊邾師過之乃推而蹶之遂取邾師獲鉏弱地邾人訴於晉晉執魯行人叔孫婼使與邾大夫坐坐訊曲直叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之乃不果坐韓宣子使邾人聚其衆將以叔孫與之士彌牟曰子弗良圗而以叔孫與其讎叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一館士伯聽其辭而訴諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏欲使邾人見叔孫之屈辱先歸邾子次年乃歸叔孫二十五年會晉及諸侯於黃父三十一年邾黑肱以濫奔魯黑肱邾大夫濫東海昌慮縣定公二年邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之其明年邾子在門臺臨廷閽以瓶水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投於床廢於爐炭爛遂卒莊公卞急而好潔故及於是冬魯仲孫何忌及邾子盟于郯十四年魯大搜于比蒲邾子來會十五年邾隱公朝魯執玉髙其容仰定公受玉卑其容俯子貢觀之曰二君者皆將死亡哀公二年魯伐邾將伐絞絞邾邑邾人愛其土故賂以漷沂之田乃盟於句繹七年魯伐邾及范門邾郭門猶聞鐘聲邾不禦冦大夫諌不聽茅成子請告於吳成子邾大夫不許曰魯擊柝聞於邾吳二千里不三月不至何及於我且國內豈不足言足以距魯成子以茅叛魯師入邾處其公宮師晝掠邾衆保於繹師宵掠以邾子益歸獻於亳社囚諸負瑕負瑕故有繹負瑕魯邑魯得邾邑繹民使在負瑕故使相就辱之邾茅夷鴻以束帛乘韋自請救於吳曰魯弱晉而逺吳馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟於鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乘君之二也二敵也魯以八百乘賦貢於吳言其國大邾賦六百乘君之私也為私屬以私奉二唯君圖之吳子從之八年吳為邾故伐魯克武城次於泗上取盟而還齊侯如吳請師將以伐魯乃歸邾子邾子又無道吳子使太宰子餘討之囚諸樓臺栫之以棘使大夫奉太子革以為政十年邾隱公奔魯齊甥也故遂奔齊公會吳子邾子郯子伐齊南鄙二十一年魯哀公及齊侯邾子盟于顧二十二年邾隱公自齊奔越曰吳為無道執父立子越人歸之太子革奔越二十四年邾子又無道越人執之以歸而立公子何何亦無道二十七年越子使后庸來聘且言邾田封於駘上欲使魯還邾田封境至駘上盟於平陽邾後改曰鄒鄒與魯鬨鬨鬭聲也鄒穆公問於孟子曰吾有司死者三十三人而民莫之死也誅之則不可勝誅不誅則疾視其長上之死而不救如之何則可也孟子對曰凶年飢嵗君之民老弱轉乎溝壑壯者散而之四方者幾千人矣而君之倉廪實府庫充有司莫以告是上慢而殘下也曽子曰戒之戒之出乎爾者反乎爾者也夫民今而後得反之也君無尤焉君行仁政斯民親其上死其長矣邾後為魯所滅邾世次邾儀父克邾子瑣文公蘧蒢定公玃且宣公牼悼公華莊公穿隱公益姑桓公革公子何四年獲麟穆公莒莒嬴姓子爵國在城陽莒縣今密州出自少皥之後武王封輿期於莒莒夷君無諡而有號自兹輿期十一世至兹丕始見於春秋魯隱公二年莒子娶於向向薑不安莒而歸莒人入向以薑氏還冬紀子伯莒子盟於密四年莒伐杞取牟婁八年魯公及莒人盟於浮來成紀好也閔公二年魯共仲弒閔公奔莒僖公立以賂求共仲於莒而殺之僖公二年莒人來求賂於魯以還慶父故魯公子友敗諸酈獲莒子之弟拿二十五年衛人平莒於魯乃盟於洮修衛好及莒平也二十六年魯公會莒兹丕公􅑔莊子盟於向尋洮之盟文公十八年莒紀公生太子僕又生季他愛季他而黜僕且多行無禮於國僕因國人以弒紀公以其寶玉奔魯宣公命與之邑季文子使司寇出諸竟宣公四年魯公及齊侯平莒及郯二國宿有怨莒人不肯魯伐莒取向十三年齊師伐莒莒事晉而不事齊故也成公七年晉侯及諸侯同盟於馬陵莒服故也莒本屬齊齊服晉故莒從之八年晉使申公巫臣如吳假道於莒與渠邱公立於池上曰城已惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也世有思開封疆者有縱其暴掠者勇夫重閉况國乎九年楚子重自陳伐莒圍渠邱渠邱城惡衆潰奔莒楚入渠邱莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也襄公四年邾莒伐鄫魯救鄫侵邾敗于狐駘六年莒滅鄫八年莒伐魯東鄙以疆鄫田莒既滅鄫魯侵其西界故莒伐魯東鄙正之九年會晉及諸侯之師伐鄭同盟于戲十年會晉及諸侯於柤伐鄭莒人間諸侯之有事也故伐魯東鄙諸侯有討鄭之事十一年會晉及諸侯於蕭魚十二年莒伐魯東鄙圍台魯季武子救台入鄆取其鐘以為公盤十四年會諸侯及吳於向晉執莒公子務婁以其通楚使也會諸侯之師伐秦十六年晉會諸侯於湨梁命歸侵田以魯故執邾宣公莒黎比公前年邾莒伐魯晉未能討故也且曰通齊楚之使二十年魯及莒平孟莊子會莒人盟於向督揚之盟故也莒數伐魯前諸侯盟督揚以和解之二十三年齊侯還自伐晉遂襲莒門于且于傷股而退明日將復戰期于夀舒莒地把殖華還齊大夫載甲夜入且于之隧宿于莒郊明日先遇莒子于蒲侯氏近莒邑莒子重賂之使無死曰請有盟以盟要二子令無死戰華周對曰貪貨棄命君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲杞梁莒人行成勝大國懼故速成二十九年會晉及諸侯城把三十年會晉及諸侯于澶淵宋災故三十一年莒黎比公生去疾及展輿既立展輿又廢之黎比公虐國人患之十一月展輿因國人以攻莒子弒之乃立去疾奔齊齊出也展輿吳出也昭公元年魯季武子伐莒取鄆諸侯會于虢莒人告於會楚告於晉曰尋盟未退而魯伐莒瀆齊盟請戮其使乃執叔孫豹趙武子為之請於楚曰魯雖有罪而執事不辟難畏威而敬命矣子若免之以勸左右可也莒魯爭鄆為日久矣苟無大害於其社稷可無亢也楚人許之乃免叔孫莒展輿立而奪羣公子秩公子召去疾於齊齊公子鉏納去疾展輿奔吳魯叔弓帥師疆鄆田因莒亂也於是莒務婁瞀胡及公子滅明以大厖與常儀靡奔齊三子展輿黨大厖常儀靡莒二邑四年魯取鄫莒亂著邱公立而不撫鄫鄫叛而歸魯五年莒牟夷以牟婁及防兹奔魯牟夷大夫牟婁防兹二邑莒人訴於晉魯昭公朝於晉晉侯將止之范獻子曰不可乃歸公公至自晉莒人來討不設􅊀叔弓敗諸蚡泉莒未陳也十年魯季平子伐莒取郠十二年魯昭公如晉至河乃復取郠之役莒人訴於晉晉有平公之喪未之治也故辭公十三年為取郠故晉將以諸侯討魯邾人莒人復訴於晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公執季孫意如十四年莒著邱公卒郊公不戚郊公著邱公子國人弗順欲立著邱公之弟庚輿庚輿莒共公蒲餘侯莒大夫惡公子意恢而善於庚輿郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之十二月蒲餘侯兹夫殺意恢郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田十九年齊髙發帥師伐莒莒子奔紀鄣莒邑使孫書伐之孫書陳無宇之子子占也初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紡焉以度而去之因紡纑連所紡以度城而藏之以待外攻者欲因以執讎者也及師至則投諸外或獻諸子占子占使師夜縋而登登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出齊乃入紀二十二年齊北郭啓帥師伐莒莒子將戰苑羊牧之莒大夫諌曰齊帥賤其求不多不如下之大國不可怒也弗聽敗齊師於夀餘齊侯伐莒莒子行成司馬竈齊大夫如莒蒞盟莒子如齊涖盟盟於稷門之外莒於是乎大惡其君二十三年莒子庚輿虐而好劒苟鑄劒必試諸人國人患之又將叛齊烏存莒大夫帥國人以逐之庚輿將出聞烏存執殳立於道左懼將止死苑羊牧之曰君過之烏存以力聞可矣何必以弒君成名遂奔魯齊人納郊公庚輿而下微不復見後四世而楚滅之秦昭襄王五十二年楚人遷魯於莒而取其地莒世次兹丕公紀公庶其厲公季他渠邱公宋黎比公密州展輿著邱公去疾庚輿郊公莒子任共公是年卒即獲麟許許薑姓男爵出自堯四嶽伯夷之後周武王封其苗裔文叔於許以續太嶽之嗣地在潁川許昌縣今許州是也魯隱公十一年公會鄭伯於郲謀伐許也秋七月公會齊侯鄭伯伐許庚辰傅於許壬午入許許莊公奔衛齊侯以許讓公公曰君謂許不共不共職貢故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏許叔莊公之弟曰天禍許國鬼神實不逞於許君而假手於我寡人寡人唯是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使糊其口於四方其况能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子獲鄭大夫公孫獲若寡人得沒於地天其以禮悔禍於許無寧兹許公復奉其社稷唯我鄭國之有請謁焉如舊昏媾其能降以相從也無滋他族實逼處此以與我鄭國爭此土也吾子孫其覆亡之不暇而况能禋祀許乎寡人之使吾子處此不唯許國之為亦聊以固吾圉也乃使公孫獲處許西偏曰凡而器用財賄無置於許我死乃亟去之吾先君新邑於此王室而既卑矣周之子孫日失其序夫許太嶽之胤也神農之後堯四嶽也天而既厭周德矣吾其能與許爭乎莊公二十九年鄭人侵許僖公四年會齊侯及諸侯之師侵蔡伐楚次於陘許穆公卒於師葬之以侯禮六年齊侯及諸侯之師伐鄭以其逃首止之盟秋楚子圍許以救鄭諸侯救許乃還冬蔡穆侯將許僖公以見楚子於武城楚子退舍武城猶有忿志故蔡將許君歸楚武城楚地許男面縳銜璧大夫衰絰士輿櫬縳手於後唯見其面以璧為贄手縳故銜之將受死故衰絰輿櫬楚子問諸逄伯對曰昔武王伐殷微子啓如是武王親釋其縳受其璧而祓之祓除凶之禮焚其櫬禮而命之使復其所楚子從之三十三年晉陳鄭伐許討其二於楚也文公五年許僖公卒成公二年晉伐齊楚令尹子重為陽橋之役以救齊王卒盡行彭名御戎蔡景公為左許靈公為右二君弱皆強冠之楚遂及諸侯盟於蜀蔡侯許男不書乘楚車也三年許恃楚而不事鄭鄭子良伐許四年鄭公孫申帥師疆許田前年鄭伐許取其田許人敗諸展陂鄭伯伐許取鉏任泠敦之田展陂許地晉欒書帥師救許伐鄭取泛祭楚子反救鄭鄭伯與許男訟焉皇戍攝鄭伯之辭子反不能決也五年許靈公訴鄭伯於楚六月鄭悼公如楚訟不勝楚人執皇戍及子國故鄭伯求成于晉八年晉欒書侵蔡遂侵楚侵沈鄭伯將會晉師門于許東門大獲焉過許見其無􅊀因攻之九年鄭伯如晉晉人討其二於楚執諸銅鞮冬鄭人圍許示晉不急君也是則公孫申謀之曰我出師以圍許示不畏晉為將改立君者而紓晉使勿亟遣使如晉晉必歸君十四年八月鄭子罕伐許敗焉戊戌鄭伯復伐許入其俘許人平以叔申之封四年鄭公孫申疆許田許人敗之不得定其封疆今許以是所封田求和於鄭十五年許靈公畏逼于鄭請遷于楚辛丑楚公子申遷許于葉葉今南陽葉縣許畏鄭南依楚襄公三年許靈公事楚不會於雞澤晉知武子帥師伐許十六年許男請遷于晉許欲叛楚晉以諸侯會湨梁遂遷許許大夫不可晉人歸諸侯唯以師討許之不肯遷鄭子蟜聞將伐許遂相鄭伯以從諸侯之師鄭與許有宿怨故其君親行師次於棫林伐許次於函氏皆許地晉荀偃帥師伐楚敗楚師遂侵方城之外復伐許而還二十六年許靈公如楚請伐鄭十六年晉伐許他國皆大夫獨鄭伯自行故許恚欲報之曰師不興孤不歸矣八月卒于楚楚子曰不伐鄭何以求諸侯十月楚子伐鄭入南里墮其城涉於泛而歸然後葬許靈公昭公四年許男如楚楚子止之遂止鄭伯復田江南許男與焉使椒舉如晉求諸侯二君待之楚以諸侯滅賴遷賴於鄢楚子欲遷許於賴使鬭韋龜與公子棄疾城之而還為許城也九年楚公子棄疾遷許于夷實城父此時改城父為夷城父縣屬譙郡取州來淮北之田以益之益許田伍舉授許男田然丹遷城父人於陳以夷濮西田益之以夷田在濮水西者與城父人遷方城外人於許成十五年許遷於葉因謂之許今許遷於夷故以方城外人實其處傳言靈王使民不安十八年楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭十五年平王復遷邑許自夷還居葉恃楚而不事鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不専於楚自以舊國不専心以事楚鄭方有令政許曰余舊國也許先鄭封鄭曰余俘邑也隱十一年鄭滅許而復存之故曰我俘邑葉在楚方城外之蔽也為方城外之蔽障土不可易易輕也國不可小謂鄭許不可俘讐不可啓君其圗之楚子説使王子勝遷許於葉實白羽於傳時白羽改為析十九年許悼公瘧飲太子止之藥卒太子奔晉定公四年許遷于容城六年鄭遊速帥師滅許以許男斯歸因楚敗也許世次穆公新臣僖公業昭公錫我靈公寧悼公買許男斯元公成二年獲麟滕滕姫姓侯爵文王子叔繡之後也地在兖州龔丘今徐州有故滕城魯隱公七年滕侯卒未同盟故不計以名十一年滕侯薛侯來朝爭長薛侯曰我先封薛祖奚仲夏所封在周之前滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯曰君與滕君辱在寡人周之宗盟異姓為後寡人若朝於薛不敢與諸任齒君若辱貺寡人則碩以滕君為請薛侯許之乃長滕侯桓公二年滕子來朝滕本侯今稱子蓋時王所黜僖公十九年宋襄公以會召諸侯執滕宣公嬰齊文公十二年滕昭公朝魯始朝於公也宣公九年滕昭公卒宋人圍滕因其喪也十年滕人恃晉而不事宋故宋師伐滕成公十三年會晉侯及諸侯之師伐秦敗秦師於麻隧襄公元年會晉及諸侯之師圍宋彭城二年會晉及諸侯之師于戚遂城虎牢六年滕成公朝魯始朝公也元年會晉及諸侯伐鄭同盟于戲十年會晉及諸侯于柤遂滅逼陽十一年會晉及諸侯伐鄭會于蕭魚十四年會晉及諸侯吳師于向伐秦二十年會晉及諸侯于澶淵二十五年會晉及諸侯于夷儀二十七年晉楚諸侯會于宋宋人請滕不與盟三十年會宋及諸侯于澶淵宋災故三十一年魯襄公卒滕成公來會葬惰而多涕子服惠伯曰滕君將死矣怠於其位而哀己甚兆於死所矣能無從乎昭公三年滕子原卒魯仲弓如滕葬滕成公四年會楚子及諸侯于申十三年會劉子晉侯及諸侯盟于平邱二十五年會晉及諸侯于黃父定公元年晉魏舒合諸侯之大夫于狄泉將以城成周宋仲幾不受功曰滕薛郳吾後也欲使三國代宋受功役也滕文公為世子將之楚過宋而見孟子孟子道性善言必稱堯舜世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣成覸謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉顔淵曰舜何人也豫何人也有為者亦若是公明儀曰文王我師也周公豈欺我哉今滕絶長補短將五十里也猶可以為善國書曰若藥不瞑眩厥疾不瘳滕定公薨世子使然友問於孟子然後行事然友反命定為三年之喪問為國孟子曰民事不可緩也民之為道也有恆産者有恆心無恆産者無恆心茍無恆心放僻邪侈無不為矣及陷於罪然後從而刑之是罔民也焉有仁人在位罔民而可為也是故賢君必恭儉禮下取於民有制夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也夫世祿滕固行之矣詩云雨我公田遂及我私由此觀之雖周亦助也設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以眀人倫也人倫明於上小民親於下有王者起必來取法是為王者師也使畢戰問井地孟子曰夫仁政必自經界始經界不正井地不均穀祿不平是故暴君汙吏必慢其經界經界既正分田制祿可坐而定也夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子請野九一而助國中什一使自賦卿以下必有圭田圭田五十畝餘夫二十五畝死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦方里而井井九百畝其中為公田公事畢然後敢治私事所以别野人也此其大略也若夫潤澤之則在君與子矣文公問孟子曰滕小國也間於齊楚事齊乎事楚乎對曰是謀非吾所能及也無己則有一焉鑿斯池也築斯城也與民守之效死而民弗去則是可為也又問曰齊人將築薛築薛以逼滕吾甚恐如之何則可孟子對曰昔者大王居邠狄人侵之去之岐山之下居焉非擇而取之不得已也茍為善後世子孫必有王者矣君子創業垂統為可繼也若夫成功則天也君如彼何哉強為善而已矣周赧王二十九年宋滅滕上距孟子時四十餘年滕世次滕侯穀宣侯嬰齊孝侯轍昭公元文侯夀成公原悼侯寧頃公結隱公虞母四年獲麟薛薛任姓侯爵黃帝之後奚仲封於薛地在薛縣今徐州薛城至獻侯始朝魯與諸侯盟會隱公十一年滕侯薛侯來朝爭長公使羽父請於薛侯乃長滕侯襄公二年會晉及諸侯於戚遂城虎牢九年會晉及諸侯伐鄭十年會晉及諸侯于柤伐鄭十一年會晉及諸侯之師伐鄭盟于蕭魚十四年會晉及諸侯于向伐秦十六年會晉及諸侯於湨梁二十年會晉及諸侯於澶淵二十五年會晉及諸侯於夷儀三十年會晉及諸侯於澶淵宋災故昭公十三年會晉及諸侯盟于平邱二十五年會晉及諸侯盟于黃父定公元年晉魏舒合諸侯之大夫于狄泉將以城成周宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國于周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然言踐土盟薛亦宋役薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲為夏禹掌車服大夫奚仲遷於邳仲虺居薛以為湯左相仲虺奚仲之後若復舊職將承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徴於人宋徴於鬼宋罪大矣乃執仲幾以歸定公十三年薛弒其君比薛世次薛侯獻侯穀襄公定薛公比惠公夷五年獲麟容齋洪氏隨筆曰左傳載魯哀公大夫云禹合諸侯於塗山執玉帛者萬國今其存者無數十焉漢公孫卿語武帝云黃帝萬諸侯而神靈之封君七千按王制所紀九州凡千七百七十有三國多寡殊不侔以理推之一君會朝所將吏卒姑以百人計之則萬國之衆當為百萬塗山之下將安所歸宿乎其為躗言無可疑者所謂存者數十考諸經傳可見者唯薛耳薛之祖奚仲為夏禹掌車服大夫自此受封歷商及周末始為宋偃王所滅其享國千九百餘年傳六十四代三代諸侯莫之與比薛壤地褊小以詩則不列於國風以世家則不列於史記而春秋二百四十二年之間視同儕邾杞滕鄫獨未嘗受大國侵伐則其為邦亦自有持守之道矣小邾小邾曺姓子爵出自邾挾之後夷父顔有功於周周封其子友於郳為附庸地在東海昌慮縣東北郳城今沂州齊桓公霸郳君附從進爵為子始列諸侯謂之小邾子莊公五年郳犂來來朝名未王命也未受爵命為諸侯十五年諸侯為宋伐郳郳附庸屬宋而叛故齊桓伐之鄭人間之而侵宋僖公七年小邾子來朝始得王命而來朝也襄公二年會晉及諸侯城虎牢七年小邾穆公朝魯亦始朝公也九年會晉及諸侯之師伐鄭十年會晉及諸侯于柤十一年會晉及諸侯伐鄭盟于蕭魚十四年會晉及諸侯之師于向伐秦二十年會晉及諸侯盟澶淵二十二年會晉及諸侯於沙隨三十年會晉及諸侯盟澶淵宋災故昭公三年小邾穆公來朝季武子欲卑之不欲以諸侯禮待之穆叔曰不可曺滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉一睦謂小邾逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之四年會楚及諸侯于申十三年會晉及諸侯盟于平邱十七年小邾穆公來朝公與之宴季平子賦采菽穆公賦菁菁者莪昭子曰不有以國其能久乎嘉其能答賦言其賢故能久有國十九年邾人郳人徐人會宋公同盟于蟲先時宋為鄅故討邾取蟲二十五年會晉及諸侯於黃父定公元年晉合諸侯之大夫城成周宋仲幾不受功曰滕薛郳吾役也欲使三國代宋受功役哀公四年宋人執小邾子小邾子無道於民故稱人以執十四年小邾射以句繹來奔射小邾大夫句繹地名曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事於小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能文獻通考卷二百六十二
