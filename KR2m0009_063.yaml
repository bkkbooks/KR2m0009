body:
  text: 文獻通考卷六十三鄱陽馬端臨貴與著職官考十七京尹三輔河南尹周官有內史秦因之掌治京師漢景帝二年分置左右內史武帝太初元年更名右內史為京兆尹絶高曰京十億曰兆大衆所聚故曰京兆更名左內史為左馮翊馮輔翊佐也初秦官有主爵中尉掌列侯漢景帝中元六年更名都尉武帝太初元年更名右扶風扶助風化也與左馮翊京兆尹是為三輔治長安城中三輔黃圗曰長安以東為京兆長陵以北為左馮翊渭城以西為右扶風皆治在城中故趙廣漢歎曰亂吾治者三輔也誠得兼之直差異耳銀章青綬進賢兩梁冠絳朝服佩水蒼王秩異凡州所監郡為京師置尹一人丞一人王尊王章王駿並為京尹皆有名京師稱曰前有趙張後有三王漢初三輔治長安後漢都雒陽置河南尹以三輔陵廟所在不改其號但減其秩與太守同後漢延篤宇叔固及邊鳯皆為京兆尹並有雄名語曰前有趙張後有邊延趙張謂趙廣漢及張敞後漢左馮翊右扶風屬司𨽻尋省魏晉為京兆太守至後周都關中又為京兆郡隋京兆郡置尹并佐吏合二百四十四人唐京兆府本為雍州置牧一人以親王為之太宗為秦王中宗為英王睿宗為相王時並居其任多以長史理人開元元年改雍州為京兆府置牧如故掌宣風導俗肅清所部或以親王居閣而遙領焉初雍州置别駕以二牧之事永徽中改别駕為長史開元初改雍州長史為京兆尹總理衆務凡前代帝王所都皆曰尹南朝曰丹陽尹後魏初曰代尹東魏曰魏尹齊曰清都尹河南尹其地在周為王城成王命君陳分正東郊成周曰尹兹東郊蓋唐河南牧之任亦留守之始秦兼天下置三川守三川河洛伊也秦末李由為三川守漢興更名三川為河南後增守為太守王莽改太守為大尹改河南大尹為保忠信卿光武中興徙都洛陽改太守為尹章綬服秩與京兆同主京都特奉朝請李膺為河南尹魏晉皆為河南尹後魏太和中遷都洛陽又置河南尹東魏置洛州刺史後周置洛州總管尋罷之隋初為洛州刺史復為河南內史至大業初為荆河州刺史又為河南太守尋為河南尹與京兆同唐武德四年置洛州都督貞觀十七年改為刺史顯慶二年置東郡改刺史為長史而洛州本置牧一人以親王為之中宗為周王時及衛王重俊實居其任多以長史理人至開元元年改洛州為河南府改長史為尹其牧尹之制一如京兆諸曹僚佐亦如之各有少尹二員通判府事京兆少尹魏晉以來治中之任隋文帝改為司馬焬帝又改為贊治後又改為丞武德初復為治中永徽元年以太皇帝諱改為司馬本一貟太極元年雍洛二州各加司馬一員分為左右開元元年並改為少尹開元以後增置太原府為北京官屬制置悉同兩京初武太后長夀元年以并州后之故里改為北都神龍初廢開元十一年又以并州高祖起義之始復置太原府號曰北京初開元元年正月於蒲州置中都改州為河中府至六月而罷後上元元年復置岐州為鳯翔府又以益州為成都府五代都汴為開封尹宋朝牧尹不常置太宗真宗皆嘗尹京後親王無繼者權知府一人以待制以上充掌正畿甸之事中都之獄訟皆受而聽焉小事則裁決大事則稟奏若承旨已斷者刑部御史臺無輒紏察典司轂下建隆以來為要劇之任崇寧三年蔡京乞罷權知府置牧尹各一員専總府事牧以皇子領尹以文臣充四朝志尹以親王為之號判南衙凡命知府必𢃄權字以翰林為之翰林學士及雜學士若待制則權發遣而已以河南府為西京應天府為南京大名府為北京皆置留守崇寧中蔡京奏京畿四輔置輔郡屏衛京師以潁昌府為南輔襄邑縣升為拱州為東輔鄭州為西輔澶州為北輔知州兼都總依三路帥臣法中興駐驆杭州建炎三年改杭州為臨安府守臣𢃄浙西安撫多卿監從臣兼紹興三年詔臨安府有奏稟事許不隔班上殿乾道七年皇太子領臨安府尹就東宮為廨廢臨安府通判簽判職官置少尹判官推官少尹依淳化判官例差侍從以上判官依天聖令用郎官以上餘曹掾依舊府官庭參仍拜小事少尹裁決徒流以上悉按判準表奏則係皇太子銜申中書以下文移則少尹簽書九年皇太子辭免臨安府尹其知通簽推判官並復置留守留守周之君陳似其任也此後無聞後漢和帝南巡祠園廟張禹以太尉兼衛留守晉張方劫惠帝幸長安僕射荀藩等與其遺官在洛陽為留臺承制行事號為東西臺至安帝時劉裕置留臺具百官後魏孝文南伐以太尉元丕廣陵王羽留守京師並加使持節唐太宗貞觀十七年親征遼東置京城留守以房元齡充蕭瑀為副其後車駕不在京都則置留守以右金吾大將軍為副咸亨二年高宗幸洛陽以雍州長史李晦為西京留守其後車駕發京都則置留守以右金吾大將軍為副留守太原府亦置尹及少尹以尹為留守少尹為副留守謂之三都留守宋制天子巡狩親征則命親王或大臣總留守事建隆元年親征澤潞以樞密使吳延祚為東京留守其西南北京留守各一人以知府事兼之西京河南南京應天北京大名分記留守司掌宫鑰及京城守衛修葺彈壓之事畿內錢榖兵民之政建炎初京城有副留守以檢校少傅寧武軍節度使范訥充留守以侍衛親軍都指揮使遂安軍承宣使郭仲荀副之又有西京留守並係執政從臣充兼節制軍馬其後武林建業並建行宮武林視汴都而建業視三都焉紹興四年參知政事孟庾為行宮留守從權措置百司事務六年有行宮同留守以左通奉大夫孟庾提舉萬夀觀兼侍讀充詔二留守並權赴尚書省治事是年八月三省已降指揮三省樞密院常程事務並聽行宫留守司與決詔秦檜孟庾並權赴尚書省治事都廂宋朝大中祥符元年置京新城外八廂真宗以都門之外居民頗多舊例惟赤縣尉主其事至是特置廂吏命京府統之天禧五年增置九廂熙寧三年五月詔以京朝官曾歷通判知縣者四人分治京城四廂其先差使臣並罷凡民有鬬訟事輕者得以決遣從知開封韓維之請九月詔許留後使臣一員分左右廂管勾十一月臣僚言逐廂一月之內斷決事件不多欲止令京朝官二員分領二廂決斷所舊來四廂使仍舊存留以備諸般差使元祐四年知開封謝景溫請於新城內外左右置二廂通為四廂四年罷紹聖元年復置紹興中臨安府先依開封例於城外南北廂置主管公事近又於城內左右廂添置官二員分減在城詞訟其後臣僚言將在城左右廂廢罷其廂官二員移往城南北廂紹興二十六年六月侍御史周方崇言臨安府先依開封府例於城外南北廂置主管公事近又於城內左右廂添置官二員欲令減在城詞訟本府每日詞訟十有七八並判送二廂逐廂公吏徇情曲法非理追人並不係公行遣送下詞訟既多有非廂官所能行者一切不決州府既不與決兩廂又不行遣人户怨嗟緣臨安府與昔日開封府繁簡不同本府長官置吏不少見今城南北廂官全闕欲乞將在城左右廂廢罷其廂官二貟却移往城北廂所有城內詞訴令本府依前自行理決從之郡太守郡守秦官秦滅諸侯以其地為郡置守丞尉各一人守治民丞佐之尉典兵漢景帝中元二年更名郡守為太守凡在郡國皆掌治民進賢勸功決訟檢姦常以春行所主縣秋冬遣無害吏按訊諸囚平其罪法論課殿最按律有無害都吏言如公平吏漢書蕭何以文無害為沛主吏掾并舉孝亷漢制嵗盡遣上計掾史各一人條上郡內衆事謂之計偕簿郡為諸侯王國者置內史以掌太守之任宣帝以為太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化每拜刺史守相輒親見問觀其所繇退而考察以質其言質正常稱曰與我共治者惟良二千石乎是以漢世良吏於是為盛稱中興焉元帝建昭二年益三河大郡太守秩凡戶十二萬為大郡帝又下制令諸侯王相位在太守下成帝綏和元年省內史以相治民則相職為太守哀帝初御史大夫王嘉上疏曰公卿以下變易促急數改更政事吏或居官數月而退送故迎新交錯道路二千石輕賤吏人慢易則有離叛之心前山陽亡徒縱橫吏士臨難莫肯仗節死義者以守相威權素奪也故成帝悔之詔二千石不以故縱為罪賜金以厚其意誠以國家有急取辦於二千石二千石尊重難危乃能使下故尚書章文必有敢告之字乃下所以丁寧告者之辭今二千石刺史三輔縣令有材任職者若有過差宜可闊略令盡力者有所勸此方今急務國家之利也王莽改太守曰大尹後漢亦重其任或以尚書令僕射出為郡鍾離意黃香桓榮胡廣是也或自郡守入為三公虞延第五倫和虞鮑昱是也三國時有郡守國相內史晉郡守皆加將軍無者為耻王導永嘉末選丹陽太守加輔國將軍導上箋曰昔魏武達政之主也荀文若功臣之最也封不過亭侯倉舒愛子之寵贈不過别部司馬今者臨郡不問賢愚皆加重號輒有鼓蓋有不得者為耻導叨名竊位取紊彝典謹送鼓蓋加崇之物請從導始帝嘉而從之初泰始中詔守相三載一巡屬縣必以春此古者所以述職省俗宣風展義也又山公啓事曰晉制春夏農月不遷改長吏郡守縣令之屬以其妨農事故也晉宋守相內史並銀章青綬進賢兩梁冠後魏初郡置三太守説在刺史篇孝文初二千石能靜二郡至三郡者遷為刺史説在縣令篇太和中次職令郡太守內史相縣令並以六年為限北齊制郡為上中下三等每等又有上中下之差自上上郡至下下郡凡九等後周郡太守各以户多少定品命隋郡太守如北齊九等之制至開皇三年罷天下諸郡以州統縣楊尚希上表曰當今郡縣倍多於古十羊九牧人少官多請存要去間併小為大帝嘉之遂罷諸郡大業三年又改州為郡郡置太守唐武德元年改郡為州改太守為刺史加號持節總管則加使持節按魏晉制有使持節持節假節使持節得戮二千石以下持節得戮無官人若軍事得與使持節同假節惟軍事得戮犯令者皆是刺史兼總軍戎若唐採訪節度使也自宋齊以降雖天下分裂其州郡漸衆及隋開皇初有州二百一十郡五百八以官煩人弊遂廢郡便以州親人則刺史如太守之職自後雖官名屢改而職事不易蓋制置之際不詳源本因襲舊名遂有持節諸軍之虛稱其屬官别駕以下録事功户諸曹參軍事亦多漢晉之制若唐之節度採訪副使判官之任本置别駕乘一車行部其參軍録事皆佐戎旅今並無其實豈所謂必也正名者乎又按加刺史持節軍事之名以為榮寵則邊荒萬里三數百户小郡亦同此號又無以别逺近大小之差輕重間劇之異也顯慶元年都督府及上州各置執刀十五人中州下州各置十人後加號為使持節諸軍事而實無節但頒銅魚符而已天寶元年改州為郡刺史為太守漢文帝二年初與郡守為銅虎符竹使符説在符寶郎篇至隋開皇七年又别頒青龍符於東方總管刺史西方以騶虞南方朱雀北方元武九年又頒木魚符於總管刺史雌一雄二至十年悉頒木魚符於五品以上官義寧二年罷竹使符頒銀菟符於諸郡唐武德元年又改銀菟符為銅魚符自是州郡史守更相為名其實一也太宗初理天下也重親人之任書督守之名於屏俯仰視焉其人善惡必書其下是以州郡無不率理貞觀中賈敦實為饒陽令有能名時制大功以下不得聨職敦實兄敦頤復為瀛州刺史朝廷以其兄弟亷謹許令同州竟不遷替時人榮之逮貞觀之末升平既久郡士多慕省閣不樂外任其折衝果敢有材力者先入為中郎郎將次補郡守其輕也如是武太后臨朝垂拱二年諸州都督刺史宜準京官𢃄魚長安四年納言李嶠同平章事唐休璟奏曰竊以物議重內官而輕外職凡所出守多因貶纍非所以澄風俗安萬人臣請擇才於臺閣省寺之中分典大州共康庶政臣等請輟近侍率先具寮太后乃令書名採之中者當行於是鳯閣侍郎韋嗣立御史大夫楊再思等二十人中之皆以本官檢校刺史後二十人內以政績可稱者獨常州刺史薛光謙徐州刺史司馬鍾二人而已當時復有為員外刺史者永昌中成王李千里歷遷襄州員外刺史神龍初以譙王重福之妃張易之甥也貶重福為濮州員外刺史皆不領州務開元中定天下州府自京都及都督都護府之外以近畿之州為四輔同華岐蒲四州謂之四輔八年都督刺史品卑者借緋魚袋按武德令三萬户以上為上州永徽令二萬戶以上為上州顯慶元年九月敕户滿三萬以上為上州二萬以上為中州先以為上州中州者仍舊至開元十八年三月敕太平時久户口日殷宜以四萬户以上為上州二萬五千户為中州不滿二萬户為下州六千户以上為上縣三千户以上為中縣不滿三千户為下縣其餘為六雄鄭陜汴絳懷魏六州為六雄十望宋亳滑許汝晉洛虢衛相十州為十望十緊初有十緊州後入緊者甚多不復具列及上中下之差凡戶四萬以上為上州二萬五千以上為中州不滿二萬為下州亦有不約户口以别敕為上州者又謂近畿者為畿內州户雖不滿四萬亦為上州其親王任中下州刺史者亦為上州王去任後即依舊式天寶中通計天下上州一百九中州二十九下州一百八十九總三百二十七州也時南海太守劉巨鱗以贓罪詔杖殺之自至德後州縣凋弊刺史之任大為精選諸州始有兵鎮刺史皆加團練使故其任重矣五代時仍刺史之號後唐時以二十五月為限宋太祖開基革五季之患召諸鎮會於京師賜第以留之分命朝臣出守列郡號權知軍州事軍謂兵州謂民政焉其後文武官參為知州軍事二品以上及𢃄中書樞密院宣徽使職事稱判太守掌總理郡政宣布條教導民以善而紏其姦慝嵗時勸課農桑旌别孝悌其賦役錢榖獄訟之事兵民之政皆總焉凡法令條制悉意孝行以率所屬有赦宥則以時宣讀而頒告於治境舉行祀典察郡吏德義材能而保任之若疲軟不任事或姦貪冒法則按劾以聞遇水旱以法賑濟安集流亡無使失所若河南應天大名府則兼留守司公事太原府延安府慶州渭州熙州秦州則兼經略安撫使馬步軍都總管定州真定府瀛州大名府京兆府則兼安撫使馬步軍都總管瀘州潭州廣州桂州雄州則兼安撫使兵馬鈐轄潁昌府青州鄆州許州鄧州則兼安撫使兵馬巡檢其餘大蕃府或沿邊州郡或當一道衝要者並兼兵馬鈐轄巡檢都監或𢃄沿邊安撫提轄兵甲沿邊溪洞都巡檢餘州軍則否其屬官有無及員數多寡皆視其地望之高下與職務之繁簡而置之建炎元年詔河北京東西路除帥臣外舊差文臣知州去處許通差武臣一次後詔要郡𢃄本路兵馬鈐轄次要郡𢃄本路兵馬都監紹興三年罷元年七月詔要郡文臣𢃄本路兵馬鈐轄武臣副之次要郡文臣𢃄本路兵馬都監武臣副之令逐州改正稱呼至紹興三年臣僚言既與異時沿邊事體不同又於今日諸州統制無補徒著名位以成虛文詔並罷之五年令郡守除授罷並令上殿凡從官出知郡者特許不避本貫詔應守臣以三年為任六年詔控扼去處守臣並以三年為任九年罷令郡守並𢃄提舉學事九月禮部言知建昌軍李長民奏宣和以前應知通令佐階銜並帶主管學事自軍興以來中輟今欲郡縣依舊法給銜從官以上知郡係帶提舉學事餘郡知通縣令佐並帶主管學事給銜從之孝宗乾道三年令不任守臣不為郎中書門下省言勘會已降指揮非曾任守臣及監司不得除郎官著入條令淳熙中令郡守罷帶主管學事郡尉京輔屬國等都尉附郡尉秦官有郡尉掌佐守典武職甲卒漢凡郡口二十萬舉一人典兵禁備盜賊景帝更名曰都尉武帝元鼎四年又置三輔都尉各二人譏出入邊郡置農都尉主屯田殖榖又置屬國都尉主蠻夷降者中興建武七年省諸郡尉并職太守無都試之役漢舊儀曰民年二十三為正一嵗以為衛士一嵗為材官騎士習射御馳陳八月太守都尉令長相丞尉會都試課殿最水軍為樓船亦習戰射年五十六老衰乃得免為民就田今乃罷其役焉每有劇賊郡臨時置都尉事訖罷又省關都尉唯邊郡往往置都尉及屬國都尉宋志曰光武省郡尉後往往置東南西北四部都尉稍有分縣治民北郡安帝以西羌盛三輔有陵園之守乃復置右扶風都尉於雍京兆虎牙都尉於長安自後無聞至隋焬帝時别置都尉領兵與郡不相知又置京輔都尉立府於潼關主兵鎮唐無其制按自秦置三十六郡而郡官有守有尉有丞然考之西漢百官表稱郡守掌治郡秩二千石有丞秩六百石郡尉掌佐守典武職秩比二千石有丞秩亦六百石是守尉皆二千石而俱有丞以佐之尉之尊蓋與守等非丞掾以下可擬也酷吏傳言周陽由為守視都尉如令為都尉陵太守奪之治明守不可卑視尉也然武帝欲以寧成為郡守公孫𢎞言成為濟南都尉其治如狼牧羊不可令治民又帝拜吾邱夀王為東郡都尉帝以夀王故不復置太守是時軍旅數發年嵗不熟多盜乃賜夀王璽書曰子在朕前之時知略輻湊以為天下少雙及至連十餘城之守任四千石之重守尉皆二千石夀王兼二任故云四千石也職事並廢盜賊縱橫甚不稱前時夀王謝罪又翟義為南陽都尉行太守事行縣至宛以事按宛令下之獄威震南陽則知漢時都尉蓋不特典軍而未嘗不行太守之事也魏晉以後無都尉之官然晉郡守皆加將軍之號唐郡守曰使持節諸軍事宋朝則大郡皆兼兵馬總管兵馬鈐轄而小壘亦曰軍州事或帶節制軍馬則秦漢所謂都尉之職歷代以太守兼任之亦以一郡掌兵權之官不可下於太守故不别置官而守就治其事循宰相之兼元樞是也通典敘郡尉而以置之郡佐之末非是故今以次郡守郡丞别駕長史司馬通判秦置郡丞以佐守在邊為長史掌兵馬漢因之于定國條州大小為設吏員治中别駕諸郡從事秩六百石晉因之而省郡丞唯丹陽不省宋梁以下復置至隋改别駕治中為長史司馬蓋隋以州為郡無復軍府則州府之職參為郡官故有長史司馬煬帝罷之而置通守又置郡贊治後又改為丞位在通守下至唐而郡丞廢矣武德元年改丞為别駕十年改雍州别駕曰長史高宗即位改别駕皆為長史别駕以皇族為之開元始通用庶姓以二都督刺史之職天寶八載諸郡始廢别駕元宗由潞州别駕入定內難登大位乃廢别駕下郡置長史一員上元二年諸郡始置别駕别駕一人從四品百官志德宗時復省元和長慶之際兩河用兵禆將有功者稱東宫王府官久次當進及受代於京師者常數十人訴宰相以求官文宗詔宰相韋處厚建議復置兩輔六雄十望十緊州别駕宋藝祖懲五代藩鎮之弊乾德初下湖南始置諸州通判命刑部郎中賈玭等充建隆四年詔知府公事並須長史通判簽議連書方許行下時大郡置兩員西京南京天雄成德益杭并晉荆南潭廣秦定等州餘置一員州不及萬户不置廣南小州有試秩充通判兼知州者正刺史以上及諸司使副知州者雖小郡亦特置天聖三年中書門下言新授虢州團練使田敏知隰州自來防團刺史赴本任及知州無同判處權置同判候差朝臣及內職知州即行省掌倅二郡政與長史均禮凡兵民錢榖户口賦役獄訟聽斷之事可否裁決與守通簽所部官有善否及職事修廢得刺舉以聞至景德宋興三十四年户口寖息解州以滿萬户置通判自是諸郡多滿萬户矣宣和二年詔諸州茶鹽香礬並委通判此事據續會要但通判掌常平水利免役等錢續會要既不載而中興以後通判掌經制總制錢會要亦不載當考建炎初諸州通判二員減一員紹興五年以後旋行申請添置帥府通判並以兩員為額司馬本主武之官自魏晉以後刺史多帶將軍開府者則置府寮司馬為軍府之官理軍事晉謝奕字無奕桓溫辟為安西司馬在溫座岸幘嘯咏如常溫曰我方外司馬也宋制司馬銅印墨綬絳朝服武冠至隋廢州府之任無復司馬而有治中焉治中舊州職也舊謂隋以前州廢遂為郡官説在州佐後治中篇開皇三年改治中為司馬隋房恭懿為澤州司馬有異績遷德州司馬理為天下之最文帝曰此乃上天社稷之所祐豈朕寡薄能致之乎遷海州刺史煬帝又改司馬及長史併置贊治一人尋又改贊治為郡丞唐武德初復為治中貞觀二十三年高宗即位遂改諸州治中並為司馬長安元年洛雍并荆掦益六州置左右司馬各一員四年復舊太極元年又置四大都督府置左右司馬各一員所職與長史同白居易江州司馬廳記自武德以來庶官以便宜制事大攝小重侵輕郡守之職總於諸侯帥郡佐之職移於部從事故自五大都督府至於上中下郡司馬之事盡去惟員與俸在凡內外文武官左遷右移者遞居之凡執役事上與給事於省寺軍府者遙署之凡仕久資高耄昏懦弱不任事而時不忍棄者實涖之涖之者進不課其能退不殿其不能才不才一也若有人蓄器貯用急於兼濟者居之雖一日不樂若有飬志忘名安於獨善者處之雖終身無悶官不官係乎時也適不適在乎人也江州左匡廬右江湖土高氣清富有佳境刺史守土臣不可逺觀遊羣吏執事官不敢自暇佚惟司馬綽綽可從容於山水詩酒間由是郡南樓山北樓水湓亭百花亭風篁石巖瀑布廬宫源潭洞東西二林寺泉石松雪司馬盡有之矣茍有志於吏隱者捨此官何求焉按唐六典上州司馬秩五品嵗廩數百石月俸六七萬官足以亢身食足以給家州民康非司馬功郡政壞非司馬罪無言責無事憂噫為國謀則尸素之尤蠧者為身謀則祿仕之優穩者豫佐是郡行四年矣其心休休如一日二日何哉識時知命而已又安知後之司馬不有與吾同志者乎因書所得以告來者按漢所置郡佐只丞及長史而已其後又有治中别駕至魏晉間始有司馬本主武之官自後長史司馬與治中别駕迭為廢復然歷代皆並設二員至唐而司馬多以處遷謫蓋視為冗員故宋只設通判一官佐郡守不仍前代之舊云容齋洪氏隨筆曰今世士大夫既貴不可復賤淳化中北戎入寇以殿前都虞候曹璨知定州時趙安易官宗正少卿已知州遂就徙通判同時有羅延吉者既知彭祁絳三州而除通判廣州滕中正知興元府而通判河南袁郭知楚鄆二州會秦王廷美遷置房州詔崇儀副使閻彥進知州而以郭通判州事范正辭既知戎淄二州而通判棣深又陳若拙歷知單州殿中侍御史西川轉運使召歸會李至守洛乃表為通判久之柴禹錫鎮涇州復表為通判連下遷而皆非貶降近不復有矣按藝祖之設通判本欲懲五季藩鎮専擅之弊而以儒臣臨制之號稱監州蓋其官雖郡佐而其人間有出於朝廷之特命不以官資之崇庳論如野處所言是也其與後來之泛泛以半刺稱者不侔矣教授漢郡國有文學文翁治蜀起學成都市招下縣子弟以為學官弟子武帝時天下郡國皆立學校官自文翁為之始云平帝時郡國曰學縣道邑侯國曰校校學置經師一人鄉曰庠聚曰序序庠置孝經師一人魏晉以下郡國並有文學即博士助教之任唐六典隋潘徽為州博士唐府郡置經學士各一人掌以五經教授開元二十六年敇州縣每鄉之內各置一學仍擇師資令其教授宋初有四書院廬山白鹿洞太平興國二年知江州周述言廬山白鹿洞學徒常數十百人望賜九經詔乃從其請嵩陽書院至道二年賜額及印本九經嶽麓書院咸平四年鄆州守臣李允則奏嶽麓山書院修廣舍宇有書生六十餘人聽誦乞下國子監降釋文等書詔從之應天府書院祥符二年新建書院詔以曹誠為助教國初有戚同文者通五經業高尚不仕聚徒教授常百餘人許讓郭承範董循陳與王礪滕涉皆其門人同文卒後無能繼其業者至是始有是命并賜院額此四書院之外又有茅山書院未建州學也乾興元年兖州守臣孫奭私建學舍聚生徒乞請太學助教楊光輔充本州講從之餘鎮未置學也景祐四年詔藩鎮始立學他州勿聽也寶元元年潁州守臣蔡齊請立學時大郡始有學而小郡猶未置也自明道景祐間纍詔州郡立學賜田給事學校相繼而興近制惟藩鎮立學頴為支郡齊以為言而特許之慶歷四年詔諸路州軍監各令立學學者二百人以上許更置縣學於是州郡不置學者鮮矣又置教授以三年為一任以經術行義訓導諸生掌其課試之事而紏正不如規者委運司及長史於幕職州縣官內薦教授或本處舉人舉有德藝者充當時雖置教授或用兼官或舉士人委於漕司而未𨽻朝廷也熙寧六年詔諸路學官並委中書門下選差至是教授始命於朝廷矣元豐元年州府學官共五十三員諸路惟大郡有之軍監蓋未盡有也元祐元年詔齊廬宿常等州各置教授一員自是以後列郡多有教官矣建炎三年教授並罷紹興三年復置四十二州十二年詔興教授官州軍令吏部申尚書省選差十三年詔諸州軍並各置教授其禮部長二正係所𨽻合依崇寧大觀格法許按劾體量及歲舉改官從司業高閲之請也二十六年詔並不許兼他職令提舉司掌切遵守從知郢州路採訪使之請也若試教官則始於元豐元豐七年立法試學官上等為博士下等為正録願授教授者聽中丞胡宗愈言學者初登科遂顓師席非是詔內外學官經任年至三十方得在選又有薦舉學官法紹聖初乃令中制科及進士第在上五人禮部奏名在上三人府監廣文館第一人或從太學上舍得第即不試而用元符元年詔學官嵗一試紹興五年罷試學官科十五年詔試諸州教授自來春始添差教授則始於政和政和三年詔公行添差諸州教授朱子漳州教授廳壁記教授之為職其可謂難矣惟自任重而不茍者知之其以為易而無難者則茍道也何也曰教授者以天子之命教其邦人凡邦之士廩食縣官而充弟子員者多至五六百餘少不下百十數皆惟教授者是師其必有以率厲化服之使躬問學蹈繩矩出入不悖所聞然後為稱此非反之身而何以哉是可不為難矣哉不特此爾又當嚴先聖先師之典祀領護廟學而守其圖書服器之藏其體至重下至金榖出內之纎悉亦皆獨任之嗚呼是亦難矣然凡仕於今者無大小莫不有所臨制統攝其任無劇易必皆具文書使可覆視是以雖甚弛者亦有所難而不敢肆獨教授官雖有統若其任之本諸身者則非簿書期會之所能察至其具於有司而可考者上之人又以其儒官優容之雖有不合不問以是為便故今之仕者反利焉而喜為之而孰知所以充其任者如彼其難哉故曰惟自任重而不茍者知之其以為易而無難者則茍道也録事參軍司功事司倉學司兵參軍經博士司士等參軍中醫學博士正户通守司五官掾督郵司理司法後漢有郡主簿官在漢魏間及江左為督郵主簿皆太守自辟除晉置本為公府官非州郡職也掌總録衆曹文簿舉彈善惡後代刺史有軍而開府者並置之後魏洎隋皆有録事參軍及罷郡以州統縣皆吏部選除之煬帝置郡有東西曹掾及主簿唐武德復為録事參軍開元改司録參軍掌正違失涖符印後唐應順間州置録事參軍三考者主劇縣以上定格滯壅故也宋朝沿唐制州有録事參軍然不盡置也諸府為司録諸州為録事乾興元年丁度申請諸州始各置録事參軍慶歷二年河西河東陜西諸州權令京官知録事參軍熙寧三年詔繁難去處録事參軍並差職官知縣及奏舉縣令人充政和三年尚書省言州建六曹參軍參軍之稱起於行軍之際恐不當襲録事參軍欲改為司録奉聖旨參軍改為掾建炎初復舊名録事掌州縣庶務紏諸曹稽違乾道中汪大猷申請依司理例不兼他職從之司功參軍兩漢有功曹史主選署功勞後漢范滂字孟博汝南太守宗資請為功曹委任政事拙拔幽陋不軌者皆掃迹謡曰汝南太守范孟博南陽宗資主畫諾又岑晊字公孝南陽太守成瑨請為功曹謠曰南陽太守岑公孝𢎞農成瑨但坐嘯又許劭字子將為郡功曹府中聞子將為吏莫不改操歸行歷代皆同北齊諸州有功曹參軍隋亦然及罷郡置州以曹為名者改曰司煬帝罷州置郡改曰司功書佐唐改曰司功參軍開元初京尹屬官及諸都督府並曰功曹參軍而列郡則曰司功參軍令掌官員祭祀禮樂學校選舉表疏醫筮考課喪葬之事司倉參軍兩漢有倉曹史主倉庫北齊以下並同功曹唐亦掌倉廩庖厨財物㕓市之事司兵參軍漢司𨽻屬官有兵曹從事史蓋有軍事則置之以主兵事至北齊以後並同功曹唐掌軍防烽驛傳送馬門禁田獵儀仗之事司士參軍兩漢無聞北齊以後與功曹同唐掌管河津營造橋梁廨宇之事參軍事後漢靈帝時陶謙以幽州刺史參司空車騎張溫軍事晉時軍府乃置為官員中軍羊祜置參軍二人太尉楊濬置參軍六人歷代皆有至隋為郡官謂之書佐唐改為參軍掌直侍督守無常職有事則出使前代又有行參軍者晉河間王顒以太宰輔政始置之掌使命歷代皆有唐惟王府有之餘則無矣經學博士漢郡國皆有文學掾漢鄭崇為郡文學後漢光武問功臣曰諸卿不遭際會自度爵祿何所至乎鄧禹曰臣少嘗學問可郡文學歷代多闕隋潘徽為州博士唐府郡置經學博士各一人掌以五經教授學生多寒門鄙儒為之助教學生各有差醫博士一人唐開元十一年七月制置階品同録事每州寫本草百一集驗方與經史同貯其年九月御撰廣濟方五卷頒天下貞元十二年二月御撰廣利方五卷頒天下自今以後諸州府應闕醫博士宜令長史各自訪求選試取人藝業優長堪效用者具以名聞已出身人及前資官便與正授其未出身且令權知四考後州司奏與正授餘準恆式吏部更不須選集中正魏置中正之始已具州中正篇晉諸中正率一國所推臺閣取信後魏孝明正光元年罷諸郡中正北齊郡縣皆有之他史多闕隋初有後罷而有州都唐並無此官每歲貢士符書所關及鄉飲酒之禮則司功參軍主其事通守隋煬帝置每郡各一人位次太守而京兆河南謂之內史今無五官掾後漢有之署功曹及諸曹事今無督郵漢有之掌監屬縣有東西南北中部謂之五郡督郵也故督郵功曹之極位漢尹翁歸為東河督郵時太守田延年分河東二十八縣為兩部閎孺部汾北翁歸部汾南舉法皆得其罪屬縣長吏雖中傷莫有怨者右司功參軍司倉司兵司士中正五官掾督郵七職宋無司理五代以來諸州皆有馬步獄以牙校充馬步都虞候掌刑法謂之馬步院宋太祖慮其任私高下其手開寶六年始置諸州司寇參軍以新進士及選人為之後改為司理掌獄訟勘鞫之事不兼他職元祐定令上州從八品中下州九品司法兩漢有決曹賊曹掾主刑法歷代皆有或謂之賊曹法曹墨曹隋唐更革與司户同唐掌律令定罪盜賊贓贖之事宋沿唐制諸州置司法參軍掌議法斷刑品同司戶紹興三年權行減罷後復舊司户漢魏以下有户曹掾主民户北齊以下與功曹同隋有户曹參軍文帝時為司户參軍煬帝為司户書佐唐開元復為户曹參軍掌户口籍帳婚姻田宅雜徭道路之事在府為曹在州為司梁開平省六曹掾屬留户曹一員通判六曹宋朝沿唐制諸州置司户參軍掌户籍賦稅倉庫交納元祐令中州從八品下州從九品乾道六年汪大猷乞令司户専差主倉庫縣令周官有縣正四百里為縣各掌其縣之政令而賞罰之春秋時列國相滅多以其地為縣則縣大而郡小故傳云上大夫受縣下大夫受郡周書作雒篇曰千里百縣縣有四郡縣邑之長曰宰曰尹曰公曰大夫晉謂大夫魯衛謂之宰楚謂之公尹其職一也孔子為中都宰一年四方皆則之由中都宰為司空至於戰國則郡大而縣小矣故甘茂謂秦武王曰宜陽大縣名曰縣其實郡也漢制列侯所食縣曰國皇太后公主所食曰邑有蠻夷曰道凡縣萬户以上為令減萬户為長侯國為相秩次亦如之皆秦制也漢因之漢書曰凡縣大率方百里民稠則減稀則曠成帝綏和元年長相墨綬哀帝建平二年復黃綬秋冬集課上計於所屬郡國胡廣云秋冬嵗盡各計縣户口墾田錢榖入出盜賊多少上集簿丞尉以下嵗詣郡課校其功功多尤為最者於庭慰勞勉之以勸其後負多尤為殿者於後曹對責以紏怠慢也又漢官曰明帝臨觀見洛陽令車騎意河南尹及至而非尤其泰盛敕去軒綏時偃師長治有能名以事詣臺因取賜之下縣遂以為故事其郡有鹽官鐵官工官都水官者隨事廣狹置令長及丞秩序皆如縣道無分土給均吏後漢凡郡縣出鹽多者置鹽官主鹽稅出鐵多者置鐵官主鼓鑄有工多者置工官主稅物有水池及漁利多者置水官主平水收漁稅所在諸縣均差吏更給之署吏隨事不具縣員晉制大縣令有治績官報以大郡山公啓事曰溫令許竒等並見能名雖在職各日淺宜顯報大郡以勸天下詔曰按其資歷悉自足為郡守各以在職日淺則宜盡其政績不宜速他轉也不經宰縣不得入為臺郎宋諸縣署令銅印墨綬進賢兩梁冠自晉宋以後令長國相皆如漢制後魏縣置三令長説在刺史篇孝文初制縣令能靜一縣劫盜者兼理二縣即食其祿能靜二縣者兼理三縣三年遷為郡守二千石能靜二郡者兼理至三郡亦如之三年遷為刺史太和中次職令其祿甚厚後魏孝文以北平府長史裴聿中書侍郎崔亮並清貧欲以俸祿優之乃以亮帶野王令聿帶溫縣令時人榮之其後令長用人益雜但選勤舊令史為之而縉紳之流耻居其位北齊制縣為上中下三等每等又有上中下之差自上上縣至下下縣凡九等然猶因循後魏用人濫雜至於士流耻居之元文遙遂奏於武成帝請革之乃密令搜掦世胄子弟恐其辭訴總召集神武門宣旨慰諭而遣自此縣令始以士人為之隋縣有令有長煬帝以大興長安河南洛陽四縣令並增正五品諸縣皆以所管間劇及衝要之處以為等級唐縣有赤三府共有六縣畿八十二望七十八緊百一十一上四百四十六中二百九十六下五百五十四七等之差京都所治為赤縣京之旁邑為畿縣其餘則以户口多少資地美惡為差凡一千五百七十三縣令各一人五代任官凡齷齪無能者始注為縣令故天下之邑率皆不治甚者誅求刻剝猥瑣萬狀宋朝建隆元年應天下諸縣除赤畿外有望緊上中下四千户為望三千户以上為緊二千户以上為上千户以上為中不滿千户為中下五百户以下為下也掌總治民政勸課農桑凡户口賦役錢榖賑濟給納之事皆掌之有孝悌行義聞於鄉閭者申州激勸以勵風俗有戎兵則兼兵馬都監或監押三年始以朝臣為知縣其間復參用京官或幕職為之朝臣知縣自大理正奚嶼監察御史王祐等始天聖間天下多缺官而令選尤猥下貪庸耄懦為清流所不與而久不得調乃為縣令人數言其病民乃詔為舉法以重令選凡知州轉運使嵗舉現任判司簿尉有罪非贓私有出身三考無出身四考堪為令者一人或二人自是人重為令令選稍精慶歷間詔天下知縣非鞫獄母得差政和二年詔縣令以十二事勸課農桑宜各遵行上副朝廷一曰敦本業二曰興地利三曰戒遊手四曰謹時候五曰戒茍簡六曰厚蓄積七曰偹水旱八曰戒宰牛九曰置農器十曰廣栽植十一曰恤苖户十二曰無妄訟自政和以來太平盛時人皆重內輕外士大夫皆輕縣令之選吏部兩選不注者甚多然後議所以增重激勸之法宣和五年縣令止差六十以下人從利運判王敏之之請也靖康初詔初改官必為縣七月詔三省申明舊制今後不以堂除吏部人凡初改官未曾實歷知縣者不許别除差遣紹興七年詔將寺監丞簿等任滿已改官人未歷民事者各與堂除知縣一次並借緋章服九年詔吏部自後縣令差文臣臣僚奏建炎以來始注武臣為害甚衆故也乾道元年詔京官知縣以二年為任雖屢有更革卒以三年為任二年詔吏部依四川専法施行以三十箇月為任從吏部陳之茂請三年詔依舊以三年為任九年復以二年為任從吏部李彥頴請淳熙三年復以三年為任從王師愈之請也二年御筆今後非兩任縣令不除監察御史初改官人必作令謂之須入紹興初數申嚴之後或廢孝宗在位持之甚嚴慶元初復詔除殿試上三名省元外並作邑五年又令試大理評事官已改官未歷縣人並親民一次著為令舊捕盜改官人並試邑自後雖宰相子殿試科甲人無不宰邑者矣縣丞主簿縣尉漢氏縣丞尉多以本部人為之三輔縣則兼用他郡諸縣皆有主刑獄囚徒後漢署文書典知倉獄署諸曹掾史凡諸縣署丞皆銅印黃綬進賢一梁冠自晉後無丞宋惟建康有獄丞及夫隋氏革選盡用他郡人漢已下皆用一人唐置京縣丞三員北京太原晉陽各置一人高宗始為品官吏部選授為縣令之二宋初不置丞天聖中因蘇耆請開封兩縣始各置丞一員在簿尉之上仍於有出身幕職令録內選充時兩赤縣簿尉多差出外本縣闕官故耆有此請皇祐中詔赤縣丞並除新改官人熙寧四年編修條例所言諸路州軍繁劇縣令户二萬已上增置縣丞一員以幕職官或縣令人充元祐元年詔應因給納常平免役置丞並行省罷如委是事務繁劇難以省罷處令轉運使存留崇寧二年宰臣蔡京言熙寧之初修水土之政行市易之法興山澤之利皆王政之大請縣並置丞一員以掌其事國史外補云縣丞昔大邑有之至是不以邑之大小皆得置丞使主管常平坑冶農田水利大觀三年詔昨增置縣丞內除舊額及萬戶以上縣令委是事務繁冗并雖非萬户實有山澤坑冶之利可以興修去處依舊存留外餘皆減罷建炎元年詔縣丞係嘉祐以前員闕并萬户處存留一員餘並罷紹興三年以淮東纍經兵火權罷縣丞十八年置海陵丞一員嘉定後小邑不置丞以簿兼主簿漢晉有之自漢以來皆令長自調用至於隋始置之唐主簿上轄赤縣置二人他縣一人武德初以流外為之高宗始以為品官吏部選授掌付事勾稽省署抄目紏正縣內非違宋朝開寶三年詔諸縣千户以上置令簿尉四百户以上置令尉今知主簿事四百户以下置簿尉主簿兼知縣事咸平四年王欽若言川峽縣五千户以上請並置簿自餘仍舊以尉兼從之天禧五年劒州梓潼等各增主簿皇祐五年詔南川縣置主簿嘉祐五年婺州義烏永康武義浦江四縣置主簿熙寧四年陜西河東沿邊城寨置主簿縣尉漢大縣兩尉小縣一人漢官儀後漢百官志長安有四尉分為左右部城東南置廣部尉是為左部城西北置明部尉是為右部並四百石黃綬大冠主追捕盜賊伺察姦非魏因之晉洛陽建康皆置左部尉宋齊梁陳並因之餘縣如漢制諸縣道尉銅印黃綬朝服武冠北齊郡縣置三尉隋改為正後置尉又分為户曹法曹唐初因隋制武德元年萬年縣法曹孫伏伽論事是也武德中復改為正七年復為尉赤縣置六員他縣各有差分判諸司事高宗時為品官吏部選授五代久廢而盜賊鬭競則屬鎮將宋朝建隆三年始每縣復置尉一員在主簿之下俸賜與主簿同其鎮將只許勾當鎮下煙火爭競公事至和二年開封祥符兩縣增置一員元豐五年詔重立法地縣尉並差使臣元祐元年蘇轍言舊法縣尉皆用選人近嵗並用武臣自改法已來未聞盜賊為之衰息請復舊法詔除沿邊縣尉依舊外餘並差選人崇寧元年詔重立法地縣尉舊差武臣處並依元豐法按後之稱縣佐曰丞簿尉然而漢書百官志所載只丞尉而已簿雖起於漢而志無之又丞尉雖皆縣佐而各有印綬簿獨無蓋古者官府皆有主簿一官上自三公及御史府下至九寺五監以至州郡縣皆有之所職者簿書蓋曹掾之流耳漢人所謂高士不為者御史府之主簿也容齋隨筆言元豐令文寺監主簿専以鈎考簿書為職不得與卿丞聨署文書然則主簿之官雖在雄要之司猶為卑賤而况縣乎後漢繆肜為縣主簿縣令被章見考吏皆畏懼自誣而肜獨證其枉考掠苦毒換五獄閲四年令卒自免又寧陽縣主簿詣關訴其縣令之枉積七八歲不省虞詡言主簿所訟乃君父之怨百上不逹是有司之過仇覽為蒲亭長考城令王渙聞其以德化人署為主簿以是觀之則主簿之在漢其視縣令猶掾史之視使長安得與丞尉等後來以簿先於尉非古義也鎮戍關市官隋鎮置將副戍置主副關市置令丞唐因之各有上中下三等關令古官戍主晉宋之顯職鎮將後周之通班今以其卑賤與隋制同故舉隋而已宋制諸鎮監官掌巡邏盜竊及火禁之事兼征稅𣙜酤則掌其出納會計鎮寨凡杖罪以上並解本縣餘聽決遣文獻通考卷六十三
