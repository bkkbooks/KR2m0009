body:
  text: 文獻通考卷十八鄱陽馬端臨貴與著征𣙜考五𣙜茶唐德宗建中元年納户部侍郎趙賛議稅天下茶漆竹木十取一以為常平本錢時軍用廣常賦不足所稅亦隨盡亦莫能充本儲及出奉天乃悼悔下詔亟罷之貞元九年復稅茶先是諸道鹽鐵使張滂奏去嵗水災詔令減稅今之國用須有供儲伏請於出茶州縣及茶山外商人要路委所由定三等時估每十稅一充所放兩稅其明年已後所得稅錢外貯若諸州遭水旱賦稅不辦以此代之詔可仍委張滂具處置條目每嵗得錢四十萬貫茶之有稅自此始然稅無虚嵗遭水旱處亦未嘗以稅茶錢拯贍致堂胡氏曰茶者生人之所日用也其急甚於酒然王鉷楊慎矜韋堅以及劉晏皆置而不征猶為忠厚天地生物凡以養人取之不可悉也張滂稅茶則悉矣凡言利者未嘗不假托美名以奉人主私欲滂以茶稅錢代水旱田租是也既以立額則後莫肯蠲非惟不蠲從而增廣其數其法嚴峻者有之矣至於官盡𣙜之商旅不得貿遷而必與官為市在私則終不能禁而椎埋惡少竊販之害興偶有敗獲姦人猾吏相為囊橐獄迄不直而治所由歴株連枝蔓致良民破産接村比里甚則盗賊出焉在公則收貯不䖍發泄不時至於朽敗與新斂相妨或没入竊販無所售用於是舉而焚之或乃沉之殃民害物咸弗恤也其原則在於得數十萬緡錢而已夫弛山澤之禁以予民王政也必不得已聽商旅貿遷而薄其征茶也者東南所有西北所無雖曰薄征其入於王府者亦不貲矣息盗奪止訟獄佐國用其利亦大矣張滂王涯豈足效哉穆宗即位兩鎮用兵帑蔵空虛禁中起百尺樓費不勝計鹽鐵使王播乃增天下茶稅率百錢增五十江淮浙東西嶺南福建荆襄茶播自領之兩川以户部領之天下茶加斤至二十兩播又奏加取焉右拾遺李珏上疏諫曰𣙜茶起於養兵今邊境無虞而厚斂傷民不可一也茗飲人之所資重賦稅則價必增貧弱益困不可二也山澤之饒其出不貲論稅以售多為利價騰踴則市者稀不可三也文宗時王涯為相判二使復置𣙜茶自領之使徙民茶樹於官場𣙜其舊積者天下大怨令狐楚代為鹽鐵使兼𣙜茶使復令納𣙜加價而已李石為相以茶稅皆歸鹽鐵復貞元之舊武宗即位鹽鐵轉運使崔珙又增江淮茶稅是時茶商所過州縣有重稅或掠奪舟車露積雨中諸道置邸以收稅謂之搨地錢故私犯益起大中初鹽鐵轉運使裴休請釐革橫稅以通舟船商旅既安課利自厚又正稅茶商多被私販茶人侵奪其利今請委强幹官吏先於出茶山口及廬夀淮南界内布置把捉曉諭招收量加半稅給陳首帖子令所在公行更無苛奪所冀招懐窮困下絶姦欺使私販者免犯法之憂正稅者無失利之欺從之休著條約私鬻三犯皆三百斤乃論死長行羣旅茶雖少亦死顧載三犯至五百斤居舍儈保四犯至千斤皆死園户私鬻百斤以上杖脊三犯加重徭伐園失業者刺史縣令以縱私鹽論廬夀淮南皆加半稅稅商給自首之帖天下稅益增倍貞元江淮茶為大模一斤至五十兩諸道鹽鐵使于悰每斤增稅五錢謂之剰茶錢自是斤兩復舊按陸羽傳羽嗜茶著經三篇言茶之原之法之具尤備天下益知飲茶矣時鬻茶者至畫羽形置煬突間為茶神有常伯熊者因羽論復廣著茶之功其後尚茶成風囘紇入朝始驅馬市茶羽貞元末卒然則嗜茶𣙜茶皆始於貞元間矣宋制𣙜貨務六江陵府真州海州漢陽軍無為軍蘄州之蘄口乾徳二年八月始令京師及建安漢陽等軍蘄口置務太平興國二年又於江陵府襄復州無為軍增置務端拱二年又於海州置務淳化四年廢襄復州務其後京城務但會給交鈔往還而不積茶貨又有場十三蘄州曰王祺石橋洗馬又有黄梅場景徳二年廢黄州曰麻城廬州曰王同舒州曰太湖羅源夀州曰霍山麻歩開順口光州曰商城子安又買茶之處江南則宣歙江池饒信洪撫筠袁州廣徳興國臨江建昌南康軍兩浙則杭蘇明越婺處溫台湖南則江陵府潭澧鼎岳鄂鎮歸峽州荆門軍福建則劍南建州䖍吉郴辰州南安軍皆折稅課本州買給民用山場之制領園户受其租餘悉官市之又別有民户折稅課者其出鬻皆在本場諸州所買茶折稅受租同山場悉送六𣙜務鬻之江陵府受本府及潭鼎澧岳歸峽州茶真州務受潭袁池吉饒撫洪歙江宣岳州臨江興國軍茶海州務受杭湖常睦越明溫台衢婺州茶漢陽軍務受鄂州茶無為軍務撫吉州臨江軍而增南康軍茶蘄口務受潭州興國軍茶凡茶有二𩔖曰片曰散片茶烝造實捲摸中串之惟建劒則既烝而研編竹為格置焙室中最為精潔他處不能造其名有龍鳳石乳的乳白乳頭金蠟面頭骨次骨末骨麤骨山挺十二等龍鳳皆團片石乳頭乳皆狹片名曰京的乳亦有闊片者乳以下皆闊片以充嵗貢及邦國之用洎本路食茶江浙荆湖舊貢新茶芽者三十餘州有嵗中再三至者大中祥符元年上憫其勞詔罷之餘州片茶有進寶雙勝寶山兩府出興國軍仙芝嫩蘂福合禄合運合慶合指合出饒池州泥片出䖍州綠英金片出袁州玉津出臨江軍靈川福州先春早春華英來泉勝金出歙州獨行靈草綠芽片金金茗出潭州大拓枕出江陵大小巴陵開勝開捲小捲生黄翎毛出岳州雙上綠芽大小方出岳辰澧州東首淺山薄側出光州總二十六名其兩浙及宣江鼎州止以上中下或第一至第五為號散茶有太湖龍溪次號末號出淮南岳麓草子楊樹雨前雨後出荆湖清口出歸州茗子出江南總十一名江浙又有以上中下第一至第五為號者凡買價蠟面茶每斤自三十五錢至一百九十錢有十六等片茶每大片自六十五錢至二百五錢有五十五等散茶每一斤自十六錢至三十八錢五分有五十九等嵗課山場八百六十五萬餘斤和市江南一千二十萬餘斤兩浙一百二十七萬九千餘斤荆湖二百四十七萬餘斤福建三十九萬三千餘斤其貿鬻蠟茶每斤自四十七錢至四百二十錢有十二等片茶自十七錢至九百一十七錢有六十五等散茶自十五錢至百二十一錢有一百九等至道末賣錢二百八十五萬二千九百餘貫天禧末增四十五萬餘貫天下茶皆禁唯川陜廣聽民自賣不得出境太祖皇帝乾徳二年詔民茶折稅外悉官買敢蔵匿不送官及私販鬻者没入之論罪主吏私以官茶貿易及一貫五百并持仗販易為官私擒捕者皆死太平興國二年重定法務輕減主吏盗官茶販鬻錢三貫以上黥面送闕下茶園户輙毁敗其叢樹者計所出茶論如法八年詔禁偽茶又詔民間舊茶園荒廢者蠲之當以茶代稅而無茶者許輸他物淳化三年詔盗官茶販鬻十貫以上黥面配本州牢城雍熙後用兵乏於饋餉多令商人輸芻糧塞下酌地之遠近不為其直取市價而後增之授以要券謂之交引至京師給以緡錢又移文江淮荆湖給以顆末鹽及茶端拱二年置折中倉聽商人輸粟京師優其直給江淮茶鹽三年八月監察御史薛映祕書丞劉式等上言向者朝廷制置緣江𣙜貨八務以貯南方之茶便於商人貿易今四海無外諸務皆宜廢罷令商人就出茶州府官場算買既大省輦運又商人皆得新茶詔從之遂以三司鹽鐵副使雷有終為諸路茶鹽制置使左司諫張觀與映副之令商𣙜利害次年四月廢緣江𣙜貨八務聽商人就出茶州軍買販大減𣙜務茶價詔既下商人頗以江路囘遠非便有司以損其直虧失嵗計為言七月復置緣江八務罷制置使副至道初劉式猶固執前議西京作坊使楊允恭上言商人雜市諸州茶新陳相糅兩河陜西諸州風土各有所宜非參以多品則商旅少利罷𣙜務令就茶山買茶不可行上欲究其利害之說令宰相召鹽鐵使陳恕副使判官與式允恭定議召問商人皆願如淳化所減之價不然者即望仍舊有司職於出納既難於減損皆同允恭之說式議遂寢即以允恭為江南兩浙發運兼制置茶鹽使西京作坊副使李廷遂著作郎王子與副之二年從允恭等請禁淮南十二州軍鹽官鬻之商人先入金帛京師及揚州折博務者悉償以茶自是鬻鹽得實錢茶無滯積嵗課增五十萬八千餘貫允恭等皆被賞止齋陳氏曰乾徳時東南六路閩浙歸職方餘尚未平太祖𣙜法蓋禁南商擅有中州之利故置場以買之自江以北皆為禁地太平興國中樊若水奏江南諸州茶官市十分之八其二分量稅聽自賣踰江渉淮乗時射利紊亂國法望嚴禁之則謂乾徳𣙜法也自若水建議其法始密凡茶之利一則官賣以實州縣一則沿邊入中糧草算請以省餽運一則𣙜務入納金銀錢帛算請以贍京師而河東北互市川陜折博又以所有易所無而其大者最在邊備蓋祖宗以西北宿兵供億之費重困民力故以茶引走商賈而虚估加擡以利之其後理財之臣往往以遺利在民數務更張然大槩無過李諮林特二法二法大槩以抑茶商及邊民耳故林特以見錢買入中賤價交鈔而以實錢算茶然猶以五十千或五十五千算茶百千則是去虚估加擡未遠也至李諮復祖劉式之意淳化三年祕書丞劉式起請令商旅自就園户置茶於官場貼射廢𣙜貨務始斷然罷去買納茶本使客自就山園買茶而官場坐收貼納之利行之三年而罷然當時議者徒咎諮法不能惜留在京見錢而不及其刻剝商賈之怨景祐以後西邊事興始復行加擡法嘉祐四年天下無事仁皇慨然一切弛禁當時詔書曰上下征利垂二百年江湖之間幅員數千里為陷穽以害吾民尚慮幸於立異之人因緣為姦之黨妄陳奏議以惑官司必寘明刑用懲狂謬自此茶不為民害者六七十載矣此韓琦相業也至蔡京始復𣙜法於是茶利自一錢以上皆歸京師其子蔡絛自記之曰公始說上以茶務若所入厚專以奉人主此京本意而西北邊糧草名曰便糴而均糴結糴貼糴括糴之名起蓋以官告度牒之𩔖等第抑配而邊民不聊生矣京之誤國𩔖如此凡園户嵗課作茶輸其租餘則官悉市之其售於官者皆先受錢而後入茶謂之本錢百姓嵗輸稅願折茶者亦折為茶謂之折稅此收茶之法凡民鬻茶者皆售於官其以給日用者謂之食茶出境則給券商賈之欲貿易者入錢若金帛京師𣙜貨物以射六務十三場茶給券隨所射予之謂之交引願就東南入錢若金帛者計直予茶如京師凡茶入官以輕估其出以重估縣官之利甚博而商賈轉致於西北以致散於夷狄其利又特厚此鬻茶之法自西北宿兵既多饋餉不足因募人入中芻粟度地里遠近增其虚估給券以茶償之後又益以東南緡錢香藥象齒謂之三說而塞下急於兵食欲廣儲峙不愛虛估入中者以虛錢得實利人競趨焉及其法既弊則虛估日益高茶日益賤入實錢金帛日益寡而入中者非盡行商多其土人既不知茶利厚薄且急於售錢得券則轉鬻於茶商或京師坐賈號交引鋪者獲利無幾茶商及交引鋪或以券取茶或收畜貿易以射厚利繇是虛估之利皆入豪商巨賈券之滯積雖二三年茶不足以償而入中者以利薄不趨邊備日蹙茶法大壞景德中丁謂為三司使嘗計其得失以謂邊糴纔及五十萬而東南三百六十餘萬茶利盡歸商賈當時以為至論厥後雖屢變法以捄之然不能亡弊天聖元年有司請罷三說行貼射之法即李諮所陳見上文景祐中葉清臣上疏言嘗計茶利嵗入以景祐元年為率實本錢外實收息錢五十九萬餘緡天下所售受食茶及本息嵗課亦祗及三十四萬緡而茶商見行六十五州軍所收稅錢已及五十七萬緡若令天下通商祗收稅錢自是數倍即𣙜務山場及食茶之利盡可籠取又况不廢度支之本不置𣙜場之官不興輦運之勞不濫徒黥之辟臣意議者謂𣙜賣有定率征稅無􅉓準通商之後必虧嵗計臣按管氏鹽鐵法計口受賦茶為人用與鹽鐵均必令天下通行以口定賦民獲善利又去嚴刑口出數錢人不厭取時下其議皆以為不可行至嘉祐中何鬲王嘉麟上書請罷給茶本錢縱園户貿易而官收租錢與所在征算歸𣙜貨務以償邊糴之費時韓琦富弼等執政力主其說乃議弛禁以三司嵗課均賦茶户謂之租錢與諸路本錢悉儲以待邊糴自是唯蠟茶禁如舊餘茶肆行天下矣論者尤謂朝廷志於便人欲省刑罰其意良善然茶户困於輸錢而商賈利薄販鬻者少州縣征稅日蹙給費不充學士劉敞歐陽修等頗論其事畧言昔時百姓之摘山者皆受錢於官今也顧使納錢於官受納之間利害百倍先時百姓冒法販茶者被罰耳今悉均賦於民賦不時刑亦及之是良民代冒法者受罪先時大商賈為國貿遷而州郡收其稅今大商富賈不行則稅額不登且乏國用時朝廷方排衆論而行之敞等言不從民之種茶者領本錢於官而盡納其茶官自賣之敢蔵匿及私賣者有罪此國初之法以十三場茶買賣本息并計其數罷官給本錢使商人與園户自相交易一切定為中估而官收其息如茶一斤售錢五十有六其本錢二十有五官不復給但使商人輸息錢三十有一謂之貼射此天聖之法園户之種茶者官收租錢商賈之販茶者官收征算而盡罷禁𣙜謂之通商此嘉祐之法治平中嵗入蠟茶四十八萬九千餘斤散茶二十五萬五千餘斤茶户租錢三十二萬九千八百五十五緡又儲茶錢四十七萬四千三百二十一緡而内外總入茶稅錢四十九萬八千六百緡推是可見茶法得失矣吳氏能改齋漫錄曰建茶務仁宗初嵗造小龍小鳳各三百斤大龍大鳳各三百斤入香不入香京挺共二百斤蠟茶一萬五千斤小龍小鳳初因蔡君謨為建漕造十斤獻之朝廷以其額外免勘明年詔第一綱盡為之故東坡志林載溫公曰君謨亦為此邪神宗熙寧七年始遣三司幹當公事李杞入蜀經畫買茶於秦鳳熙河博馬與成都路漕司議合事方有端而王韶言西人頗以善馬至邊所嗜惟茶乏茶與市即詔趣杞據見茶計水陸運至又以銀十萬兩帛二萬五千度僧牒五百付之假常平及坊場餘錢以著作佐郎蒲宗閔同領其事初蜀之茶園皆民兩稅地不殖五榖惟宜種茶賦稅一例折輸絹紬綿草各以其直折輸役錢亦視其賦民賣茶資衣食與農夫業田無異而稅額總三十萬杞被令經度即諸州創設官場嵗增息為四十萬而重禁𣙜之令其輸受之際往往壓其斤重侵其價直既而運茶積滯嵗課不給乃建議於彭漢二州嵗買布各十萬疋以折脚費實以布息助茶利亦未免積滯復建議嵗易解鹽十萬席顧運囘東船載入蜀而禁商販未幾鹽法復難行宗閔乃議川陜路民茶息收十之三盡賣於官場更嚴私交易之令稍重至徒刑仍没緣身所有物以待給賞於是蜀茶盡𣙜民始病矣知彭州吕陶言川陜四路所出茶貨比方東南諸處十不及一諸路既許通商兩川却為禁地虧損治體莫甚於斯只如解州有鹽池民間煎者乃是私鹽晉州有礬山民間煉者乃是私礬今川蜀茶園乃百姓已物顯與解鹽晉礬事體不同恭惟仁聖䘏民之心必不如此又言國家置市易司籠制百貨嵗出息錢不過十之二必以一年為率今茶場司不以一年為率務重立法盡𣙜民茶隨買隨賣取息十之三或今日買十千之茶明日即作十三千賣之客旅日以官本變轉殊不休已比至嵗終不可勝算豈止三分而已此於市易之條自相違戾又客旅及儈人以𣙜茶不許私交市共邀難園户於外預商計裁價園户畏法懼罪且欲變貨營生窮迫之間勢不獲已則一聽客言斤收實錢七分賣之官餘三分留為客人買茶之息如此則園户有三分之虧而官中名得其息自是園户本錢客人無所費也乞下本路體量更改不報自熙寧七年至元豐八年蜀道茶場四十一京西路金州為場六陜西賣茶為場三百三十二稅息至李稷加為五十萬及陸師閔為百萬云五年以福建茶陳積乃詔福建茶在京京東西淮南陜西河東仍禁𣙜餘路通商王子京為轉運副使言建州蠟茶舊立𣙜法自熙寧權聽通商自此茶户售客人茶甚良官中所得唯常茶稅錢極微南方遺利無過於此仍行𣙜法元祐初罷子京事任令福建禁𣙜州軍仍其舊元豐中宋用臣都提舉汴河隄岸創奏修置水磨凡在京茶户擅磨末茶者有禁並赴官請買而茶鋪入米豆雜物拌和者有罰募人告者有賞訖元豐末嵗獲息不過二十萬商旅病焉元豐修置水磨止於在京及開封府界諸縣未始行於外路及紹聖復置其後遂於京西鄭滑州潁昌州河北澶州皆行之哲宗元祐二年熙河秦鳳涇原三路茶仍官為計置永興鄜延環慶許通商凡以茶易榖者聽仍舊毋得踰轉運司和糴價其所博斗斛勿取息侍御史劉摯上言蜀地𣙜茶之害園户有逃以免者有投死以免者而其害猶及隣伍欲伐茶則有禁欲增植則加市故其俗論謂地非生茶也實生禍也願選使者考茶法之弊欺以蘇蜀民右司諫蘇轍上言盗賊之法贓及二貫止徒一年出賞五千今民有以錢八百和買茶四十斤者輙徒一年賞三十千立法茍以自便不顧輕重之宜蓋造立茶法皆傾險小人不識事件且備陳五害詔遣黄廉等體量紹聖元年陜西復行禁𣙜凡茶法並用元豐舊條徽宗崇寧元年右僕射蔡京議大改茶法奏言自祖宗立額𣙜之法嵗收淨利凡三百二十餘萬而諸州商稅七十五萬貫有奇食茶之算不在焉其盛時幾五百餘萬緡慶厯之後法制寖壞私販公行遂罷禁𣙜行通商之法自後商旅所至與官為市四十餘年利源寖失謂宜荆湖江淮兩浙福建七路所産茶仍舊禁𣙜官買勿復科民即産茶州縣隨所置場申商人園户私易之禁凡置場地園户皆籍名數嵗鬻於官吏皆用倉法園户自前茶租折稅仍舊産茶州軍許其民赴場輸息量限斤數給短引於旁近郡縣便鬻餘悉聽商人於𣙜貨務入納金銀緡錢或並邊糧草即本務給鈔取便算請於場别給長引從所指州軍鬻之商稅自場給長引沿路登時批發至所指地然後計稅盡輸則在道無苛留買茶本錢以度牒及鹽鈔諸色封樁坊場常平剰錢通三百萬緡為率給諸路諸路措置各分命官詔悉聽焉俄定諸路措置茶事官置司湖南於潭州湖北於荆南淮南於揚州兩浙於蘇州江東於江寧府江西於洪州其置場所在蘄州即其州及蘄水縣夀州以霍山開順光州以光山固始舒州即其州及羅源太湖黄州以麻城廬州以舒城常州以宜興湖州即其州及長興德清安吉武康睦州即其州及清溪分水桐廬遂安婺州即其州及東陽永康浦江處州即其州及遂昌青田蘇杭越各即其州而越之上虞餘姚諸曁新昌剡縣皆置焉衢台各即其州而溫州以平陽大法既定其制置節目不可毛舉四年京復議更革遂罷官置場商旅並即所在州縣或京師請長短引自買於園户茶貯以籠篰官為抽盤循第敘輸息訖批引販賣茶事益加密矣長引許往他路限一年短引止於本路限一季按京崇寧元年所行乃禁𣙜之法是年所行乃通商之法但請引抽盤商稅苛於祖宗之時耳大觀三年計七路一嵗之息一百二十五萬一千九百餘緡𣙜貨物再嵗一百十有八萬五千餘緡京專用是以舞智固權自是嵗以百萬緡輸京師所供私奉掊息滋厚盗販公行民滋病矣政和二年大增損茶法凡請長引再行者輸錢百緡即往陜西加二萬茶以百二十斤短引輸緡錢二十茶以二十五斤私造引者如川錢引法嵗春茶出集民户約三嵗實直及今價上户部茶籠篰並官製聽客買定大小式嚴封印之法長短引輙竄改增減及新舊對帶繳納申展住賣轉鬻科條悉具初客販茶用舊引者未嚴斤重之限影帶者衆於是又詔凡販長引斤重及三千斤者須更買新引對賣不及三千斤者即用新引以一斤帶二斤鬻之而合同場之法出矣場置於産茶州軍而簿給於都茶務凡不限斤重茶委官秤製毋得止憑批引為定有贏數即没官别定新引限程及重商旅規避秤製之禁凡十八條若避匿鈔劄及擅賣皆坐以徒復慮茶法猶輕課入不羡定園户私賣及有引而所賣踰數保内有犯不告並如煎鹽亭户法短引及食茶關子輙出本路坐以二千里流賞錢百萬大抵茶鹽法主於蔡京務巧掊利變改法度前後罷復不常民聽眩惑髙宗建炎初於真州印鈔給賣東南茶鹽以提領真州茶鹽為名三年置行在都茶場罷合同場一十八處惟洪州江州興國軍潭州建州各置合同場監官一員罷食茶小引建炎三年九月㫖别印小引毎引五貫文許販茶六十斤比附短引增添斤重暗虧引錢損害茶法住罷淳熙二年復置凡茶鹽經從而把隘官軍以捜檢姦細為名而騷擾者依軍法施行明年以罰太重減徒三年捕私茶賞罰依鹽事指揮祖宗應犯𣙜貨並不根究來厯止以見在為坐嘉祐著令今户部言不係出産州軍捕獲私販茶鹽可以不究來厯其出産州軍私販者並係亭竈園户為之一槩不究無以杜私販之弊詔自茶鹽外其餘𣙜貨並不根究來厯他日都省又言應犯私茶鹽不得信憑供指妄有追呼詔從之紹興二十七年令凡商販淮南長引茶令秤發官司先問客人所指住賣州縣經由場務及合過官渡並背批月日姓名即時放行如不行批引縱放私茶與正犯茶人一等犯罪蓋自𣙜場轉入虜中其利至博淮河私渡譏禁甚嚴然民觸犯法禁自若寧宗嘉泰四年知隆興府韓邈奏户部茶引嵗有常額隆興府惟分寧産茶他縣並無而豪民武斷者乃請引認租借官引以窮索一鄉無茶者使認茶無食利者使認食利所至驚擾乞下省部非産茶縣並不許人户擅自認租他路亦比𩔖施行從之四川茶建炎元年四月成都路運判趙開言𣙜茶買馬五害請用嘉祐故事盡罷𣙜茶而令漕司買馬或未能然亦當減額以蘇園户輕價以恵行商如此則私販衰而盗賊息矣朝廷遂擢開同主管川陜茶馬二年十一月開至成都大更茶法倣蔡京都茶場法印給茶引使商人即園户市茶百斤為一大引除其十勿算置合同場以譏其出入重私商之禁為茶市以通交易每斤引錢春七十夏五十市利頭子在外所過征一錢五分引與茶隨違者抵罪自後引息錢至一百五萬緡紹興復提舉官又旋增引錢至十四年每引收十二道三百文視開之初又增一倍矣自熙豐來蜀茶官事權出諸司之上而其富亦甲天下時以其嵗剰者上供舊博馬皆以粗茶乾道末始以細茶遺之然蜀茶之細者其品視南方已下惟廣漢之趙坡合州之水南峩睂之白芽雅安之蒙頂土人亦珍之然所産甚微非江建比也乾道初川秦八場馬額共九千餘匹川馬五千匹秦馬四千匹淳熙以後為額共萬二千九百九十四匹自後所市未嘗及焉建茶建炎二年葉濃之亂園丁散亡遂罷嵗貢紹興四年明堂始命市五萬斤為大禮賞十二年興𣙜場取蠟場為𣙜場本禁私販官盡𣙜之上供之餘許通商官收息三倍上供龍鳳及京鋌茶嵗額視承平纔半蓋高宗以錫賚既少懼傷民力故裁損其數云坑冶周官卝人掌金玉錫石之地而為之厲禁以守之若以時取之則物其地圖而授之物色占其形色之鹹淡也授之教取者之處巡其禁令齊管仲言鹽鐵之利漢桑宏羊建議𣙜鹽鐵東漢以後鹽鐵本末並見鹽鐵門不再錄漢武帝行幸囘中詔曰往者朕郊見上帝泰山見金宜更鑄黄金為麟趾褭蹄以協瑞焉東坡仇池筆記曰王莽敗時省中黄金六十萬斤陳平四萬斤間楚董卓郿塢金亦多其餘三五十斤者不可勝數近世金不以斤計雖人主未有以百金與人者何古多而今少也鑿山披沙無虛日金為何往哉頗疑寶貨神變不可知復歸山澤邪石林葉氏曰漢時賜臣下黄金每百斤二百斤少亦三十斤雖燕王劉澤以諸侯賜田生金亦二百斤楚梁孝王死有金四十餘萬斤蓋幣輕故米賤金多也按如二公之說則金莫多於漢然民間之淘取官府之徵斂史未嘗言之度未必如後世之甚也三代之時服食器用下之貢獻有程上之用度有節未嘗多取於民後之言利者始以為山海天地之蔵上之人當取其利以富國而不可為百姓豪强者所擅其說發於管仲而盛於桑𢎞羊孔僅之徒然不過曰鹽曰鐵則以其適於民用也金為天地之祕寶獨未聞有征𣙜之事漢法民私鑄鐵者釱左趾博士使郡國矯詔令民鑄農器者罪至死鐵官凡四十郡而不出鐵者又置小鐵官徧於天下獨未聞有犯金之禁鐵至賤也而𣙜之析秋毫金至貴也而用之如泥沙然則國家之征利無資於金也貨殖傳所載蜀卓氏山東程鄭宛孔氏魯丙氏稱為尤富然皆言其擅鐵冶之利而未聞有蔵金之事然則豪强之致富不由於金也上下之間好尚如此蓋猶有古人不貴難得之貨之遺意云後漢明帝永平十一年漅湖出黄金廬江太守取以獻後魏宣武帝延昌三年有司奏長安驪山今昭應縣有銀礦二石得銀七兩其秋恒州今代郡安邊馬邑又上言白登山今馬邑郡界有銀礦八石得銀七兩錫三百餘斤其色潔白有踰上品詔並置銀官常令採鑄又漢中舊有金户千餘家常於漢水沙金年終輸之後臨淮王彧為梁州刺史奏罷之按酉陽雜俎魏明帝時昆明國貢避寒鳥常吐金屑如粟蜀都賦金沙銀礫注永昌有水出金如糠在沙中南史夷貊傳林邑國有金山石皆赤色其中生金金夜則出飛状如螢火此皆沙金之見於史傳者昔時遐方裔夷所産今則東南處處有之矣唐凡金銀鐵錫之冶一百八十六陜宣潤饒衢信五州銀冶五十八銅冶九十六鐵山五錫山二鉛山四汾州礬山七貞觀初侍御史權萬紀上言宣饒二州銀大發采之嵗可得數百萬緡帝曰朕之所乏者非財也但恨無嘉言可以利民耳卿未嘗進一賢退一不肖而專言稅銀之利欲以桓靈視我邪乃黜萬紀還家麟徳二年廢峽山銅冶四十八開元十五年初稅伊陽五重山銀錫天寶五載李林甫為相謂李適之曰華山有金鑛采之可以富國主上未知也他日適之因奏事言之上以問林甫對曰臣久知之但華山陛下本命王氣所在鑿之非宜故不敢言上以林甫為愛己薄適之慮事不熟適之自是失恩徳宗時户部侍郎韓洄建議山澤之利宜歸王者自是𨽻鹽鐵使元和時天下銀冶廢者四十嵗采銀萬二千兩銅二十六萬六千斤鐵二百七萬斤錫五萬斤鉛無常數二年禁采銀一兩以上者笞二十遞出本界州縣官吏節級科罪開成元年復以山澤之利歸州縣刺史選吏主之其後諸州牟利以自殖舉天下不七萬緡不能當一縣之茶稅宣帝增河湟戍兵衣絹五十二萬餘疋裴休請復歸鹽鐵使以供國用增銀冶二鐵山七十一廢銅冶二十七鉛山一天下嵗率銀二萬五千兩銅六十五萬五千斤鉛十一萬四千斤錫萬七千斤鐵五十三萬二千斤後唐長興二年敇今後不計農器燒器動使諸物並許百姓逐便自鑄造諸道監冶除依常年定數鑄辦供軍熟鐵并器物外祗管出生鐵比已前價各隨逐處見定高低毎斤一例減十文貨賣雜便熟鐵亦任百姓自鍊廵檢節級勾當賣鐵場官并鋪户一切並廢鄉村百姓祗於夏秋苖畝上納農器錢一文五分足隨夏秋二稅送納晉天福六年赦節文諸道鐵冶三司先條流百姓農具破者須於官場中賣鑄時却於官場中買鐵今後許百姓取便鑄造買賣所在場院不得禁止攪擾宋興金銀銅鐵鉛錫之貨凡諸軍産金有五曰商饒歙撫州南安軍至道元年廢邵武軍院二年又廢成州二院饒州舊禁商人市販頗致爭訟大中祥符五年從凌策之請除其禁官收算焉産銀有三監曰桂陽鳳州之開寶本七房冶開寶五年賜名建州之龍焙又有五十一場曰饒州之徳興䖍州之寶積信州之寶豐建昌之馬茨湖㸔都越州之諸曁衢州之南山北山金水舊又有靈山場大中祥符二年廢處州之慶成望際道州之黄富福州之寶興漳州之興善毗婆大深岩洞汀州之黄焙龍門寶安南劍州之龍逄寶應王豐杜唐髙才贍國新豐岩梅營龍泉順昌邵武軍之焦阮龍門小杉青女三溪黄上同福磥磜南安軍之穏下廣州之上雲韶州之樂昌螺阮靈源連州之同官英州之賢徳堯山竹溪恩州之梅口春州之陽江三務曰秦州隴城隴州興元府太平興國四年於五臺置冶後廢秦州舊有太平監後去其名又賀州有寶盈場及杭州務後並省産銅有三十五場饒處建英州各一信州南安軍各二汀州三漳州四邵武軍八南劒州十二饒州曰興利建州曰同徳英州曰禮平信州曰鉛山南安軍曰南康城下汀州曰鍾僚餘皆與銀場同一務曰梓州之銅采國初坊隴二州亦置場後廢又嘉州亦有採場咸平六年置産鐵有四監曰大通兗州之萊蕪萊蕪監領杏山阜陽何家魯東汶陽萬家宜山七冶舊又有石門大叔道士等冶景徳中以鐵數不登並廢汶陽南魯西冶太中祥符七年廢徐州之利國相州之利成又有十二冶曰河南之凌雲虢州之麻荘同州之韓山鳳翔之赤谷磑平儀州之廣石河蘄州之囘嵐甆窑黄州之龍陂袁州之貴山興國軍之慈湖英州之黄石二十務曰晉磁鳳澧道渠合梅州各一陜州之集津耀州之榆林坊州之玉華䖍州之上平符竹黄平青堂吉州之安福汀州之莒溪古田龍興羅村二十五場曰信州之丁溪新溪鄂州之聖水荻洲樊源安樂龍興大雲建州之晩化南劒州之毫村東陽武夷平林塗阬安福萬足桃源交溪婁杉湯泉立沙黄溪邵武軍之萬徳寶積連州之牛鼻又有沂州鄫城冶磁州苑城冶齊州龍山冶澤淄秦潭利英白欝林州皆舊出鐵後並廢産鉛有三十六場務曰越建連英春州各一韶州南安軍各二衢州汀州各三漳州四邵武軍八南劒州十二並與銀銅場同名産錫有九場曰河南之長水䖍州之安遠南安之城下南康之上猶道州之黄富賀州之太平川石場潮州之黄岡循州之大任舊信州有鉛場後廢産水銀有四場曰秦階商鳳州産朱砂有三場曰商宜州富順太祖皇帝開寶三年詔曰古者不貴難得之貨後代賦及山澤上加侵削下益抏敝毎念兹事深疾於懷未能捐金於山豈忍奪人之利自今桂陽監嵗輸課銀宜減三分之一太宗至道二年有司言鳳州山内出銅卝定州諸山出銀鑛請置官署掌其事上曰地不愛寶當與衆庻共之不許至道末天下嵗課銀十四萬五千餘兩銅四百一十二萬二千餘斤鐵五百七十四萬八千餘斤鉛七十九萬三千餘斤錫二十六萬九千餘斤天禧末金一萬四千餘兩銀八十八萬三千餘兩銅二百六十七萬五千餘斤鐵六百二十九萬三千餘斤鉛四十四萬七千餘斤錫二十九萬一千餘斤水銀二千餘斤朱砂五千餘斤然金銀除坑冶丁稅和市外課利折納互市所得皆在焉開寶五年詔罷嶺南道媚川都採珠先是劉鋹於海門鎮募兵能探珠者二千人號媚川都凡採珠者必以索繫石被於體而没焉深者至五百尺溺死者甚衆及平嶺南廢之仍禁民採取未幾復官取容州海渚亦産珠官置吏掌之自太平興國二年貢珠百斤七年貢五十斤徑寸者三八年貢千六百一十斤皆珠場所採金銀銅鐵鉛錫之冶總二百七十一金産登萊商饒汀南恩六州冶十一銀産登虢秦鳳商隴越衢饒信䖍郴衡漳汀泉福建南劒英韶連春二十三州南安建昌邵武三軍桂陽監冶八十四銅産饒信䖍建漳汀泉南劒韶英梓十一州邵武軍冶四十六鐵産登萊徐兖鳳翔陜儀虢邢磁䖍吉袁信澧汀泉建南劒英韶渠合資二十四州興國邵武二軍冶七十七鉛産越衢信汀南劒英韶連春九州邵武軍冶三十錫産商虢䖍道潮賀循七州冶十六又有丹砂産商宜二州冶二水銀産秦鳳商階四州冶五皆置吏主之然大率山澤之利有限或暴發輙竭或採取嵗久所得不償其費而嵗課不足有司必責主者取盈仁宗英宗毎下赦書輙委所在視冶之不發者或廢冶或蠲主者所負嵗課率以為常而有司有請亦輙從之無所吝故冶之興廢不常而嵗課增損係焉皇祐中嵗得金萬五千九十五兩銀二十一萬九千八百二十九兩銅五百一十萬八百三十四斤鐵七百二十四萬一千一斤鉛九萬八千一百五十一斤錫三十三萬六百九十五斤水銀二千二百一斤其後以赦書從事或有司所請廢冶百餘既而山澤興發至治平中或增冶或復故者總六十八是嵗視皇祐金減九千六百五十六銀增九萬五千三百八十四銅增一百八十七萬鐵錫增百餘萬鉛增二百萬獨水銀無增損又得丹砂二千八百餘斤今之論次諸冶以治平中所有云天聖中登萊採金嵗益數千兩帝命奬官吏王曾曰採金多則背本趨末者衆不宜誘之景祐中登萊民饑詔弛金禁聽民自取後嵗豐然後復故吳氏能改齋漫錄曰登萊州産金自太宗時已有之然尚少至皇祐中始大發民廢農桑采掘地採之有重二十餘兩為塊者取之不竭縣官𣙜買嵗課三千兩中書備對諸路坑冶金數萊州金四千一百五十兩房州金六十六兩登州金三十九兩商州金三十九兩饒州金三十四兩沅州金一百三十二兩汀州金一百六十七兩邕州金七百四兩神宗熙寧元年詔天下寶貨坑冶不發而負嵗課者蠲之七年廣西經畧司言邕州填乃峒産金請置金場後五年凡得金為錢二十五萬緡四年以所産薄詔罷貢金八年知熙州王韶奏本路銀銅坑發詔令轉運市易司共計之以所入為熙河糴本七月詔近坑冶坊郭鄉村并淘採烹鍊人並相為保保内及於坑冶有犯知而不糾或停盗不覺者論如保甲法元豐元年是嵗諸路坑冶金總計萬七百一十兩銀二十一萬五千三百八十五兩銅千四百六十萬五千九百六十九斤鐵五百五十萬一千九十七斤鉛九百十九萬七千三百三十五斤錫二百三十二萬一千八百九十八斤水銀三千三百五十六斤朱砂三千六百四十六斤十四兩有奇七年坑冶凡一百三十六所領於虞部哲宗紹聖二年江淮荆湖等坑冶司言新發坑冶漕司慮給本錢往往停閉不當請令本司同遣官詳度從之湖南漕司言潭州益陽縣近發金苖以碎礦淘金賦𣙜入官請修立私出禁地之制從之徽宗崇寧四年湖北置溪金場監官以其嵗收金千兩鈐轄司請置官故也大觀二年詔金銀坑發雖告言或方檢視而私開淘取以盗論九月銀銅坑冶舊不𨽻知縣縣令者並令兼監賞罰減正官一等政和元年張商英言湖北産金非止辰沅靖溪洞其峽州夷陵宜都縣荆南府枝江江陵縣赤湖城至鼎州皆商人淘採之地漕司既乏本錢提舉司買止千兩且無專司定額請置專切提舉買金司有金苖無官監者許遣部内州縣官及使臣掌幹詔提舉官措畫以聞仍於荆南置司政和二年詔工部以坑冶所收金銀銅鉛錫鐵水銀朱砂物數置籍籖注嵗半消補上之尚書省自是户工部尚書省皆有籍鉤考然所憑惟帳状至有額而無收有收而無額乃責之縣丞監官及曹部奉行者而更督遞年違負之數九月措置陜西坑冶蔣彝奏本路坑冶收金千六百兩他物有差詔輸大觀西庫彝增秩官屬各減磨勘年六年詔承買坑冶嵗計課息錢十分蠲一以頻年無買者欲優假之故也五月中書言劉芑計置萬永州産金甫及一嵗收二千四百餘兩詔特與增秩宣和元年石泉軍江溪沙磧麩金許民隨金脉淘採立課額或以分數取之坑冶國朝舊有之官置場監或民承買以分數中賣於官舊例諸路轉運司本錢亦資焉其物悉歸之内帑崇寧以後廣搜利穴𣙜賦益備凡屬之提舉司者謂之新坑冶用常平息錢與剩利錢為本金銀等物往往皆積之大觀庫自蔡京始也政和間數罷數復然告發之處多壞民田承買者立額重或舊有今無而額不為損政和間臣僚言諸路産鐵多民資以為用而課息少請倣茶鹽法𣙜而鬻之於是户部言詳度官置爐冶收鐵給引召人通市苖脉微者令民出息承買以所收中賣於官毋得私相貿易從之先是元豐六年京東漕臣吳居厚奏徐鄆青等州嵗製軍器及上供簡鐵之𩔖數多而徐州利國萊蕪二監嵗課鐵少不能給請以鐵從官興煽計所獲可多數倍詔從其請自是官𣙜其鐵且造器用以鬻於民至元祐罷之其後大觀初涇源皇城使裴絢上言石河鐵冶令民自採煉中賣於官請禁民私相貿易農具器用之𩔖悉官為鑄造其冶坊已成之物皆以輸官而償其直乃詔毋得私相貿易如所奏而農具器用勿禁於是官自賣鐵唯許鑄䥱户市之欽宗靖康元年諸路坑冶苖礦微或舊有今無悉令蠲損凡民承買金銀並罷高宗建炎三年詔福建廣南自崇寧以來嵗買上供銀數浩大民力不堪嵗減三分之一七年工部言知台州黄岩縣劉覺民乞依熙寧法以金銀坑冶召百姓採取自備物料烹煉十分為率官收二分其八分許坑户自便貨賣江西運司相度江州等處金銀坑冶亦乞依熙豐法從之十四年詔見今坑冶立酌中課額委提刑轉運司不得别有抑勒抱認虛數令有力之家計囑幸免切致下户受弊孝宗隆興二年鑄錢司言坑冶監官嵗收買金及四千兩銀及十萬兩銅錫及四十萬斤鉛及一百二十萬斤者各轉一官知通令丞部内坑冶毎年比租額增剩者推賞有差寧宗嘉定十四年臣僚言産銅之地莫盛於東南如括蒼之銅廊南算孟春黄渙峯長㧞殿山爐頭山莊等處諸曁之天富永嘉之潮溪信上之羅桐浦城之因奬尤溪之安仁杜唐洪面子坑五十餘所多係銅銀共産大場月解淨銅萬計小場不下數千銀各不下千兩為利甚博至今雙瑞西瑞十二岩之坑出銀繁澣大定永興等場銀鉛並産興盛日久又信之鉛山與處之銅廊皆是膽水春夏如湯以鐵投之銅色立變浸銅以生鐵煉成薄片置膽水槽中浸漬數日上生赤煤取刮入爐三煉成銅大率用鐵二斤四兩得銅一斤淳熙元年七月指揮信州鉛山場浸銅毎發二千斤為一綱應副饒州永平監鼓鑄夫以天地之間顯畀坑冶而屬吏貪殘積成蠧弊諸處檢踏官吏大為民殃有力之家悉務辭遜遂至坑源廢絶礦條湮閉間有出備工本為官開浚元佃之家方施工用財未享其利而譁徒誣脅甚至黥配估籍寃無所訴此坑冶所以失陷也文獻通考卷十八
