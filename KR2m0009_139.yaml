body:
  text: 文獻通考卷一百三十九鄱陽馬端臨貴與著樂考十二木之屬雅部陳氏樂書曰木者所以合止樂之器其卦則巽其方東南之維其時春夏之交其風清明其律夾鍾其聲一其音直立夏之氣也先王作樂斫之以為敔柷之屬焉樂記曰作為椌楬德音之音柷敔以椌楬為用椌楬以柷敔為體二者之聲一合一止未嘗不相待也柷椌擊敔楬戞籈止柷敔不知誰所造樂記曰聖人作為椌楬謂柷敔也椌苦江反楬若八反柷如漆桶方二尺四寸深一尺八寸中有椎柄連底旁開孔內手於中擊之以舉樂敔狀如伏虎背上有二十七齟齬碎竹以擊其首而􅊇戞之以止樂宋仁宗明道時禮官言柷舊以方畫木為之外圗以時卉則可矣而中設一色非稱也先儒之説曰有柄連底挏之鄭康成以為投椎其中撞之今當創法垂久用明制作之意有所本焉柷之中東方圖以青隱而為青龍南方圗以赤隱而為丹鳳西方圗以白隱而為騶虞北方圗以黑隱而為靈龜中央圗以黃隱而為神蚓撞擊之法宜用康成之法奏可陳氏樂書曰周官小師掌教播鼗柷敔周頌有瞽亦曰鼗磬柷圉蓋堂下樂器以竹為夲以木為末則管籥夲也柷敔末也柷之為器方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊也隂始於二四終於八十隂數四八而以陽一主之所以作樂則於衆樂先之而已非能成之也有兄之道焉此柷所以居宫縣之東象春物之成始也敔之為器狀類伏虎西方之隂物也背有二十七齟齬三九之數也櫟之長尺十之數也陽成三變於九而以隂十勝之所以止樂則能以反為非特不至於流而失已亦有足禁過者焉此敔所以居宫縣之西象秋物之成終也書曰戛擊禮曰楷擊樂記曰聖人作為椌楬荀卿曰鞉柷拊椌楬似萬物蓋柷敔以椌楬為體椌楬以戛楷擊為用也爾雅曰所以歌敔謂之止所以鼓柷謂籈則柷以合樂而作之必鼓之欲其止者戒之於蚤也敔以節樂而止之必鼓之欲其籈者潔之於後也然樂之出虛故其作樂虗椌必欲空琴必用桐拊必用粳皆以虛為夲也及其止則歸於實焉此敔所以為伏虎形歟然樂之張陳戛擊必於堂上柷敔必於堂下何邪曰柷敔器也戛擊所以作器也器則卑而在下作器者尊而在上是作樂者在下所以作之者在上在上命物者也在下受命者也豈非貴賤之等然邪今夫堂上之樂象廟朝之治堂下之樂象萬物之治荀卿以拊柷椌楬為似萬物則是以堂上之拊亦似之誤矣柷敔椌楬皆一物而異名荀卿以柷椌離而二之亦誤矣華談新論謂椌楬不如流鄭之樂真有意哉止者柷之考拊名也籈櫟敔之名也宋朝太樂柷為方色以圗瑞物東龍西虎南鳳北龜而底為神蚓敔因唐制用竹以二尺四寸折為十二莖樂將先止擊其首次三戞齟齬而止與舊敔四面畫山卉用木櫟齟齬者異矣雖曰因時制宜要之非有意義孰若復古之為愈哉先儒以柷為立夏之音又謂乾主立冬隂陽終始故聖人承天以制柷敔一何疏邪晉宋故事四廂各有柷敔同時戞作亦非古人之制也隋牛𢎞罷之不亦宜乎舂牘周制春官笙師掌教舂牘應雅以教祴樂教之視暸舂牘以竹大五六寸長七尺短者一二尺其端有兩空髹畫以兩手築地應長六尺五寸其中有椎雅狀如漆筒而弇口大二圍長五尺六寸以羊韋鞔之有兩紐疏畫祴夏之樂牘應雅教其舂者謂以築地笙師教之則三器在庭可知也疏舂以人兩手築地凡牘應雅皆舂之所為以此三樂築地與祴樂為節舂杵亦謂之頓相相助也以節樂也或謂梁孝王築睢陽城擊鼓為下杵之節睢陽掠用舂牘後代因之陳氏樂書曰應樂如鷹之應物其獲也小矣故小鼓謂之應所以應大鼓所倡之聲也小舂謂之應所以應大舂所倡之節也周官笙師掌教牘應牘長七尺應則如桶而方六尺五寸中象柷有椎連底左右相擊以應柷也斯不亦大小之辨乎禮圖其形正圓而外皆朱唐樂圗及大周正樂皆內黑外朱然以禮推之一在木下為夲在木上為末在木中為朱則木之為物含陽於內南方之火所自而藏也故應以木為之而內外朱焉固其理也彼持內黑之説真臆論歟木之屬俗部大拍版小拍版拍版長濶如手重大者九版小者六版以韋編之胡部以為樂節蓋以代抃也抃擊其節也情發於中手抃足蹈抃者因其聲以節舞龜兹部伎人彈指為歌舞之節亦抃之意也唐人或用之為樂句明皇嘗令黃幡綽撰譜幡綽乃畫一耳進之明皇問其故對曰但能聰聽則無失節奏可謂善諷諫矣宋朝教所用六版長寸上鋭薄而下圎厚以檀若桑木為之豈亦柷敔之變體歟立均伶州鳩曰律所以立均出度也韋昭謂其制以木長七尺繫之以絲以均鐘聲以出大小清濁之度漢大豫樂有之宋均曰長八尺而施弦然古之神瞽考中聲而量之以制度則三五合而為八尺而施弦固足以考中聲均鐘音而出度也韋昭七尺之説豈亦溺於七音之失後世京房之凖晉之十二笛梁之四通皆所以考律和聲而説者以為定律之器始於管種於鐘移於笛衍於通蓋立均之變體也胡人有五旦五耽之名亦均之異名歟腰鼓腰鼓之制非特用土也亦有用木為之者矣土鼓瓦音也木鼓木音也其制同其音異禰衡衣綵衣所擊者是也撞木古者撞鐘擊磬必以濡木以上兩堅不能相和故也海中有魚曰鯨有獸曰蒲牢素憚鯨魚擊鯨則蒲牢鳴猶晉有石鼓不鳴取蜀中桐材斫為魚形擊之則鳴後世猶是作蒲牢於鐘上而狀鯨魚以撞之則石磬之器亦上削桐為魚形以擊之張衡謂發鯨魚鏗華鐘是也八音之外梵具玉螺具之為物其大可容數升蠡之大者也南蠻之國取而吹之所以節樂也今之梵樂用之以和銅鈸釋氏所謂法螺赤土國吹螺以迎隋使是也梁武之樂有童子伎倚歌梵具玉蠡唐貞元中五印度種落有鰾國王子獻樂器躬總樂凡一十二笛皆演釋氏經唄吹蠡擊鼓或歌且舞纓絡四垂珠璣粲發周流萬變爛然可觀蠡聲若竽籟林邑每擊鼓以警衆吹蠡以即戎則蠡又不特用於樂矣骨管牙管哀笳以羊骨為管而無孔惟恤禮用之今鼓吹備而不用以觱篥代之鹵簿與熊羆十二案工員尚存焉宋朝更以紅象牙管竅而吹之其聲與律隔八相吹仍存羊骨舊制焉玳瑁笛宋嘉祐中王疇欲定大樂嘗就成都房庶取玳瑁古笛以校金石然則笛之為器豈特玉與竹哉桃皮管桃皮觱篥桃皮卷而吹之古謂之管木亦謂之桃皮觱篥其聲應簫笳橫吹之南蠻髙麗之樂也今鼓吹部其器亦存嘯葉銜葉而嘯其聲清震橘柚尤善或云卷蘆葉而為之形如笳者也筍虡周禮冬官梓人為筍虡樂器所縣橫曰筍植曰虡天下之大獸五脂者膏者裸者羽者鱗者脂牛羊屬膏豕屬裸謂虎豹貔􅣝鳥獸淺毛者之屬羽鳥屬鱗龍蛇之屬也宗廟之事脂者膏者以為牲致美味也裸者羽者鱗者以為筍虡貴野聲也厚唇弇口出目短耳大胸耀後大體短脰若是者謂之裸屬恆有力而不能走其聲大而宏有力而不能走則於任重宜大聲而宏則於鐘宜若是者以為鐘虡是故擊其所縣而由其虡鳴耀讀為哨頎小也宏聲音大也弇於檢反耀所教反哨音稍目疏云凡猛獸有力者皆前粗後細故云大胸耀後出短耳注不言何物恐是麟獅之屬鋭喙決吻數目顅脰小體騫腹若是者謂之羽屬恆無力而輕其聲清揚而逺聞無力而輕則於任輕宜其聲清揚而逺聞則於磬宜若是者以為磬虡故擊其所縣而由其虡鳴吻口腃也顅長脰貌故書顅或作牼鄭司農云牼讀為鬝頭無髮之鬝數音促顧苦顔反鬝苦顔反鬢秃也疏鳥乃喙長決物食之時則以近喙本決故云決吻數目目視急也鷹屬獸有力而聲大故以為鐘虡鐘大器也禽鳥無力而聲清揚揚者發也磬小物故以此為虡擊其所縣若其聲之出於所刻者之上小首而長搏身而鴻若是者謂之鱗屬以為筍摶圜也鴻傭也二疏云上論鐘磬之虡用鳥獸不同此論者之筍同用龍蛇鱗物凡攫閷援簭之類必深其爪出其目作其鱗之而謂筍虡之獸也深猶藏也作猶起也之而頰􅝋閷色界反援音袁簭音筮頰􅝋許慎曰忽反秃也深其爪出其目作其鱗之而則於視必撥爾而怒苟撥爾而怒則任重宜且其匪色必似鳴矣匪采貌疏云鱗之而頰之有髭髯處也匪與有匪君子之匪同采色也雕刻之工精妙則才施采色雖鐘磬未擊其物已似能鳴矣若刻畫不精則無精神則其狀頽如委墜此及下經覆釋上文鐘虡之獸攫著則殺之援攬則噬之如此必藏爪出目作其鱗之而皆可畏之貌也􅝋劉炫音壼讀之為是鐘筍磬筍橫木兩端刻龍蛇鱗物之形鐘虡植木刻猛獸之形為之趾磬虡植木刻羽鳥之形為之趾業業大枝也所以飾筍為縣也捷業如鋸齒或曰畫之崇牙樅也上飾刻畫之為重牙即業之上齒也樅峻峙貌樹羽置羽也置之於筍虡之角上璧翣畫繪為翣戴以璧垂五采羽於其下樹於簨之角上曹氏曰業虡崇牙樹羽皆所以垂鐘磬也其置飾則有漸明堂位曰夏后氏之龍簨虡商之崇牙周之璧翣蓋橫木為簨飾以鱗屬植木為虡飾以裸羽之屬又加大版於其上形捷業然謂之業此夏后氏之制也至商人又於龍簨之上制畫為重牙以挂垂紘所謂崇牙也周人又畫繒為翣戴以璧玉垂五采羽於其下所謂植羽也陳氏樂書曰樂出於虛而寓於器本於情而見於文寓於器則器異異虡見於文則文同同筍鐘虡飾以裸屬磬虡鉓以羽屬器異異虡故也鐘磬之筍皆飾以鱗屬其文若竹之有筍然文同同筍故也筍則橫枝設於崇牙其形髙以峻虡則植之設之以業其形直以舉是筍之上有業業之上有崇牙筍之兩端又有璧翣鄭氏謂戴璧垂羽是也蓋簨虡所以架鐘磬崇牙璧翣所以飾筍虡夏后氏飾以龍商飾以崇牙而無璧翣至周則極文而三者具矣故周頌曰設業設虡崇牙樹羽是也鬻子謂大禹銘於筍虡曰教寡人以道者擊鼓教以義者擊鐘教以事者振鐸語以憂者擊磬語以訟獄者揮鞀其言雖不經見彼蓋有所受亦足考信矣周官典庸器祭祀帥其屬設筍虡吉禮也大喪廞筍虡凶禮也喪禮旌旗璧翣與筍虡同者為欲使人勿之有惡焉爾筍亦為簨者以生東南故也亦為虡者以樂出虗故也又曰秦始皇建千石之鐘立萬石之虡漢儀髙廟撞千石之鐘十枚豈亦襲秦之侈心之弊而不釐正之邪李尤銘曰漢因於周由若重規人因秦器事有可施其言過矣漢魏以來有四廂金石之樂其架少則或八或六多則十六二十至隋唐始益為三十六架髙宗蓬萊宮充庭有七十二架飾筍以飛龍飾趺以飛廉飾虡以摯獸上列植羽旁垂流蘇武后稱制飾宫縣之樂廟朝以五采軒縣以以朱五郊各從方色非三代之制也宋朝依倣古制天子宮縣鎛鐘十二虡編鐘十二虡編磬十二虡凡三十六虡各依辰次每鎛鐘左右設編鐘編磬每辰次列三架令太常按習御制曲譜宮縣每奏一聲鎛鐘一擊之編鐘磬三擊之清濁先後互相為應大昭小鳴和之道也虡亦為鐻者莊周述梓慶將削木為鐻未嘗敢以耗氣齊七日忘吾四肢然後入山林觀天性區别見成鐻然後加手故見者驚猶鬼神抑何妙哉古者鐘磬虡皆取中虗之木故擊其所縣令由其虡鳴今鐘磬之虡以實木為之故其鳴不由虡非先王制作之意九龍虡其上為蟠龍昔吳闔閭代椘破九龍之鐘虡淮南子述之為其不足法後世故也其椘人之侈心乎大架小架編鐘磬之虡也漢魏以來有四廂金石之樂其樂縣之架少則或六或八多則十六二十至唐始益為三十六架髙宗蓬萊宮有七十二架其大小之辨可知矣假安節雅樂部宫縣四面五架即古簨虡也其上安金銅仰陽以鷺鷀孔雀羽裝之兩面𬗟以流蘇以綵翠􅌧為之十二律鐘上有九乳依月律排之每面石磬及編鐘各一架各列編磬十二亦依律呂編之雲韶部用玉磬四架亦可謂詳矣熊羆架熊羆架十二悉髙丈餘用木雕之其狀如床上安版四旁為欄其中以登梁武帝始設十二案鼓吹在樂縣之外以施殿庭宴饗用之圖熊羆以為飾故也隋煬帝更於案下為熊羆貙豹騰倚之狀象百獸之又施寶幰於上用金彩飾之奏萬宇清月重輪等三曲亦謂之十二案樂非古人朴素之意也文獻通考卷一百三十九
