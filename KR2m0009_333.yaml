body:
  text: 文獻通考卷三百三十三鄱陽馬端臨貴與著四裔考十西羌杜氏通典邉防序略曰西羌出自三苗蓋姜姓也其國近衡山今長沙衡陽零陵江華等郡地及舜徙之三危三危山在今燉煌郡燉煌縣界漢金城之西南羌地是也今金城㑹寧安鄉西平等郡之西南地濵於賜支續漢書云河關西可千餘里有河曲羌謂之賜支蓋析支也接漢河關縣屬金城郡則今安鄉郡也其賜支在其西又按風俗通云羌者其先夲戎賤主牧羊故羌字從羊至於河首綿地千里南接蜀漢徼外蠻夷西北鄯善車師諸國所居無常依随水草地少五穀産牧為業其俗氏族無定或以父名母姓為種號妻後母納嫠嫂嫠音離如北邊之俗故國無鰥寡種繁熾廣志云羌與北狄同其人魯鈍饒妻妾多子姓一人生子數十或至百人嫁女得髙貲者聘至百犢女披大華氊以為盛服一狗皮直數十四在古不立君臣無相統一强則分種為酋豪弱則為人附落更相抄掠以力為雄殺人償死無他禁令其兵長在山谷短於平地不能持乆而果於觸突以戰死為吉利病終為不祥甚耐寒苦同之禽獸昔夏啓之子太康失國四夷皆叛及后相立乃征畎夷即犬戎也夷者四蕃之總號七年然後来賔至於后泄始加爵命由是服從泄啓八代孫帝芒之子后桀之亂畎夷入居邠岐之間邠今新平郡岐今扶風郡成湯既興伐而攘之及殷室中衰諸戎皆叛至於武丁征西戎鬼方克之武丁髙宗易曰髙宗伐鬼方也後漢史西羌傳云武丁征西戎鬼方三年乃克故其詩曰自彼氐羌莫敢不来王言因髙宗討伐然後氐羌朝享按商頌曰撻彼殷武奮伐荆楚罙入其阻裒荆之旅言殷道衰荆楚背叛髙宗能出兵伐之羙其功也又曰惟汝荆楚居國南鄉昔有成湯自彼氐羌莫敢不来享莫敢不来王言成湯之時逺夷西方氐羌之國皆来朝見汝居中國之南方乃背叛乎此責之之辭非謂髙宗時氐羌也時髙宗亦伐荆楚蔚宗不詳誤引此詩以附合也又按竹書周王季伐西落鬼戎後漢章帝紀有司述眀帝功徳又云克伐鬼方開通西域則鬼方宜是西羌也或云鬼隂類鬼方即北方斯乃臆斷諸家因謂之北狄誤矣及武乙暴虐犬戎寇邉周古公踰梁山在今好畤縣西北而避於岐下在今扶風郡界及王季遂伐西落鬼戎竹書紀年曰武乙三十五年周王季伐西落鬼戎自是之後更伐始呼翳徒之戎皆克之竹書紀年曰太丁七年周人伐始呼之戎㨗其三大夫也及武王伐商羌髳率師髳音矛會於牧野至穆王時戎狄不貢王乃西征犬戎獲其五王遂遷戎於太原夷王衰弱及宣王立召秦莊公興兵伐破之其後侵盗不已至幽王昏虐西戎寇周殺幽王於驪山驪山今京兆府界周乃東遷洛邑及平王之末周遂陵遲戎逼諸夏自隴山以東及乎伊洛徃徃有戎於是渭首有狄䝠邽冀之戎狄䝠並今隴西郡邽冀並今天水郡䝠音桓邽音珪涇北有義渠之戎今安化郡地洛川有大荔之戎今洛交中部郡地渭南有驪戎即今昭應縣伊洛間有楊拒泉臯之戎潁洛以西有蠻氏之戎今潁川郡地間在中國與諸夏盟㑹後晉滅驪戎今昭應縣是時伊洛戎强東侵曹魯襄王時秦晉自𤓰州今燉煌晉昌郡地遷陸渾之戎於伊川允姓之戎遷於渭汭允姓隂戎之祖與三苗俱放三危即𤓰州也至襄王時魯僖公之二十二年秦晉遷陸渾之戎於伊川夲在秦晉西北二國誘而徙之遂從戎號至今為陸渾縣焉水口曰汭今京兆府北新平彭原之間一云汭在新平宜禄縣亦有宜祿水東及轘轅今河南府陽翟縣界在河南山北者號曰隂戎河南山北自今上洛郡以東至陸渾秦穆公得戎人由余遂覇西戎開地千里由余其先晉人亡入戎及晉悼公又使魏絳和諸戎復修覇業其後隂戎之種遂以滋廣與晉伐周左傳魯昭公九年晉大夫梁丙率隂戎以伐潁潁周邑隂戎即陸渾戎也景王使詹桓伯責晉平公曰允姓之姦居於𤓰州伯父恵公歸自秦而誘以来使偪我諸姬入我郊甸戎有中國晉之咎也後陸渾戎叛晉荀吳滅之後楚執蠻氏而盡囚其人至周貞王八年秦厲公滅大荔取其地趙亦滅北戎韓魏後稍并伊洛隂戎滅之其遺脫者皆走西踰汧隴汧音牽自是中國無戎寇唯餘義渠種焉是為强盛屢為人患及昭王起兵滅之始置隴西今天水隴西金城㑹安寜鄉河池和政等郡地北地今安定彭原安化平凉靈武寜朔及五原等郡地上郡焉今上郡洛交銀川新秦朔方中部延安咸寜等郡地戎夲無君長夏后氏末及商周之際或從侯伯征伐有功天子爵之以為蕃服春秋時陸渾蠻氏戎稱子戰國時大荔義渠稱王及其衰亡餘種皆反舊為酋豪始皇兵務東向故得繁息秦平天下蒙恬西逐諸羌出塞漢初尚㣲弱景帝時研種求徙於狄道安故今金城郡縣武帝又西逐渡河湟初開河西置四郡今武威張掖酒泉燉煌等郡地其後先零種圍枹罕今安鄉郡縣零音憐枹音浮漢兵擊平之始置䕶羌校尉至宣帝代又寇金城今金城㑹寜西平安鄉等郡地趙充國立屯田且討且招降者三萬餘人置金城属國以處之自後賔服後漢光武建中初寇金城馬援討破降之徙七千口扵三輔今京兆馮翊扶風汧陽等郡地和帝以後又反叛豪滇零稱天子南入益州今漢川漢中等郡地東犯趙魏今趙魏鄴等郡地也寇及雍城今河内郡北故城也十餘年然後破散順帝永和中又叛漢将馬賢戰殁後叚熲窮討及靈帝末方始平定自光武以後匈奴少事唯西羌屢梗焉魏晉二代時亂關隴不至大傷害永嘉以後吐谷渾興焉夲遼東鮮卑晉時數百户西附於隂山属晉亂遂吞併諸羌而有其地至其孫葉延遂為强國後魏末其主夸吕自號可汗建官多效中國洎隋煬帝遣觀王雄大破之其主伏允逺遁收其地列置郡縣鎮戍後轉衰弱唐初吐蕃始興焉其帥後魏末自臨松郡丞故其主有贊府之號後魏臨松郡今張掖郡張掖縣髙宗時遂滅吐谷渾盡有其地将軍薛仁貴等大敗於大非川儀鳯中工部尚書劉審禮又率兵十八萬敗殁於青海調露中中書令李敬元又大敗於大非川武太后如意初王孝傑方大破之始復龜兹等鎮萬嵗通天初又寇梁州都督許欽眀戰殁因贊府殺其名將諸欽陵之後累破敗遂劣於曩時矣羌無弋羌無弋爰劍者秦厲公時為秦所拘執以為奴𨽻不知爰劍何戎之别也後得亡歸而秦人追之藏於巖穴中得免與劓女遇合於野女恥其状被髮覆面羌人因以為俗遂俱亡入三河間三河即黄河析支河湟中河今金城隴西安鄉郡之西南諸羌共畏事之推以為豪以射獵為事爰劍教之田畜種人依之者益衆羌人謂奴為無弋以爰劍甞為奴𨽻故因名之其後世世為豪至爰劍曽孫忍時秦獻公初立欲復穆公之迹穆公覇有西戎今欲復之忍季父卬畏秦之威将其衆種人附落而南出析支河曲西數千里與羌絶逺不復交通其後子孫分别各自為種任随所之或為氂牛種越嶲羌是也今越嶲地或為白馬種廣漢羌是也今梓潼遂寜以西徳陽郡地或為参狼種武都羌是也今武都郡忍及弟舞獨留湟中忍生九子為九種舞生十七子為十七種羌人興盛從此起矣及忍子硏立硏豪健故羌中號其後為硏種秦始皇時兵務東向故種人得以繁息秦既兼天下使䝉恬將兵略地西逐諸戎北却衆狄築長城以界之至漢景帝時研種留何率種人求守隴西塞今天水隴西等郡地於是徙留何等於狄道安故至臨洮氐道羌道並今隴西金城安鄉臨洮等郡及武帝征伐四夷又西逐諸羌乃渡河湟築令居塞在今西平郡西北初開河西列置四郡酒泉武威張掖燉煌並今郡通道玉門隔絶羌胡於是障塞亭燧出長城外數千里時先零羌與封飬牢姐種解仇結盟姐音紫與匈奴通合兵十餘萬共攻令居安故地在今金城郡遂圍枹罕漢遣将軍李息將軍討平之始置䕶羌校尉統領焉羌乃去湟中依西海鹽池之左右今酒泉郡之北千餘里鹽池漢遂因山為塞河西地空稍徙人以實之至宣帝時諸羌又相與解仇寇攻金城帝遣後将軍趙充國将兵討之充國欲以屯田於臨羌東至浩亹浩亹縣即今金城郡廣武縣地浩音閣亹音門臨羌縣在西平郡界務威信招降罕开及刼掠者解散虜謀乃擊之开音牽時已𤼵諸郡兵六萬人酒泉太守辛武賢奏言請即擊之天子下書令充國博議徃返者三四遂兩從其志武賢出擊羌降破數千人詔罷兵獨充國留屯田明年五月充國奏言羌夲可五萬人軍凡斬首七千六百級降者三萬一千二百人溺湟饑死者五六千人定計遺脱與煎聓黄羝並各是羌種俱亡者不過四千人初置金城属國以處降羌從爰劍種五世至研研最豪健自後以研為種號十三世至燒當復豪健其子孫更以燒當為種號自元帝以後數十年四夷賔伏邉塞無事至王莾末豪滇良内侵燒當元孫及後漢初遂寇金城隴西司徒掾班彪上言今凉州部郡時凉州部除三輔外今安定平凉郡之西天水隴西諸郡悉屬焉皆有降羌被髪左袵而與漢人雜䖏習俗既異言語不通數為小吏黠人所見侵奪窮恚無聊故致反叛夫蠻夷寇亂皆為此也請依舊制益州部今漢川巴蜀川即當時益州是置蠻夷騎都尉幽州部今范陽上谷安邉及漁陽北平即當時幽州置領烏桓校尉凉州部置䕶羌校尉皆持莭領䕶理其怨結嵗時循行問其疾苦又數遣使驛通導動静使塞外羌夷為吏耳目州部因此可得儆備今宜復如舊以眀威防光武從之即以牛邯為䕶羌校尉及邯卒而職省建武十一年先零種寇臨洮今和政郡地隴西太守馬援破降之後徙置天水今郡地隴西今隴西及金城郡南境地是扶風三郡今扶風汧陽新平等郡地皆是自燒當至滇良世居河北大允谷後徙大小榆中榆中在今金城西平等郡之間由是始强至扵子滇吾永平初漢遣中郎將竇固等擊破降之徙七千口置三輔而滇吾諸弟迷吾等數為寇盗章帝時馬防等討破之於臨洮索西迷吾等悉降防乃築索西城在今和政郡界是自後㦯降㦯叛少有寜嵗和帝時迷吾子迷唐復将兵向塞金城守侯覇及諸郡率兵破之羌衆折傷種人瓦解迷唐遂孤弱不滿千人逺踰賜支河首即析支河依彂羌居眀年安定降羌燒何種脇諸種數百人反叛安定郡今安定平凉㑹寜郡東境是郡兵擊滅之時西海及大小榆左右無復羌寇隃糜相曹鳳上言隃麋縣名在今汧陽郡界隃音俞西戎為害前丗所患臣且以近事言之自建武以来其犯法者常從燒當種起所以然者以其居大小榆土地肥羙又近塞内諸種易以為非難以攻伐南得種存種存别種羌以廣其衆北阻大河因以為固又有西海魚鹽之利緣山濵水以廣田畜故能强大常雄諸種恃其權勇招誘諸胡今者衰困黨援壊沮親属離叛餘勝兵者不過數百流亡逃竄逺依發羌臣愚以為宜及此時建復西海郡縣漢武逐諸羌置西海郡在今酒泉郡北千二百里欲復立之規固二榆廣設屯田隔塞羌胡交關之路遏絶狂狡窺欲之源又殖榖富邉省委輸之役國家可以無一方之憂扵是拜鳯為金城西部都尉将徙徒出屯龍耆龍耆即龍支今西平郡縣後金城長史上官鴻開置歸義建威屯田二十七部侯霸復上置東西邯屯田五部邯水名也分流左右在今寧塞郡增逢留二部帝皆従之列屯夹河合四十部其功垂立至永初中諸郡羌叛乃罷迷唐失衆病死有一子来降户不滿數十滇吾曾孫麻奴初随父東號降居安定時諸降羌布在郡縣皆為吏人豪右所徭役積滿愁怨安帝永初九年麻奴兄弟因此遂與種人俱西出塞先零别種歸湳豪滇零與種羌大為寇掠湳奴感反征西校尉任尚率諸郡兵與滇零等戰扵平襄地在今天水郡尚軍大敗於是滇零自稱天子於北地招集武都参狼上郡西河今西河銀川昌化郡諸雜種衆遂大盛東犯趙魏南入益州遂寇鈔三輔斷隴道湟中諸縣粟石萬錢百姓死亡不可勝數諸郡屯兵救之三輔三輔即京兆扶風馮翊也今京兆扶風汧陽馮翊等郡地衆羌乗勝漢兵數挫當煎勒姐種攻沒破羌縣今西平郡湟水縣界種羌又沒臨洮今和政郡和政縣界軍營乆出無功有廢農桑乃詔任尚將吏兵還屯長安置京兆虎牙都尉扵長安扶風都尉扵雍今扶風郡縣如西京三輔故事至四年大將軍鄧隲議欲棄凉州虞詡曰不可今羌所以不敢入㩀三輔為心腹之害者以凉州在後故也其土人所以摧鋒無反顧之心者為臣属於漢故也若棄其境域徙其人衆安土重遷必生異志如使雄豪相聚席卷而東雖虎賁為卒白起太公為將亦恐不足禦當今之計者宜令四府九卿各辟彼州數人其牧守令長子弟皆除為冗官外以勸勵答其功勤内以拘致防其邪計誠䏻如此則可無患於是四府皆從詡議時漢中太守鄭勤戰死羌勢轉盛遂徙金城郡居襄武漢金城郡理允吾縣地今郡廣武縣漢襄武縣屬隴西縣地即今隴西郡縣是羌衆入寇河東至河内百姓相驚多南奔渡河使北軍中候朱寵將五營士屯孟津詔魏郡今魏鄴等郡地趙國今趙郡地常山今郡地中山今博陵郡地繕作塢堠六百一十六所羌既轉盛而二千石令長多内郡人並無守戰意皆争上徙郡縣以避寇難朝廷従之遂移隴西徙襄武漢隴西郡理狄道縣地即今金城郡縣安定徙羙陽漢安定郡理臨涇縣地在今郡縣也漢羙陽縣属右扶風地在今京兆府三原縣上郡徙衙上郡理膚施縣地在今上郡隴泉縣漢衙縣属左馮翊地今是白水縣百姓戀土不樂去舊遂乃刈其禾稼發撤室屋夷營壁破積聚時連旱蝗饑荒而驅䠞刼掠流離分散随道死亡咸棄捐老弱或為人僕妾喪其大半滇零死子零昌立元初元年遣兵屯河内今郡地通谷衝要三十三所皆為塢壁設鳴鼓零昌進兵寇雍城今河内郡地遣任尚為中郎將将羽林緹騎五營子弟屯三輔尚臨行懐令虞詡説尚曰懐縣今河内郡武陟縣地也使君頻奉國命討逐寇賊三州屯兵二十餘萬人棄農桑疲苦從役未有功效勞費日滋若此出不尅誠為使君危之尚曰憂惶乆矣詡曰兵法弱不攻强走不逐飛自然之勢也今虜皆馬騎日行數百来如風雨去如絶弦以歩追之勢不相及所以曠日無功也為使君計者莫若罷諸郡兵令出錢數千二十人共市一馬如此可捨甲胄馳輕兵以萬騎之衆逐數千人之虜首尾掩截其道自窮便人利事大功立矣尚即上言用其計乃遣輕騎鈔擊斬首數百級眀年秋漢又築馮翊北界今馮翊之北洛交以南候塢五百所自後頻破之諸羌瓦解三輔益州益州今洋川漢中等郡之地無復寇警自羌叛十餘年間兵連師老不蹔寜息軍旅之費轉運委輸用二百四十餘億府帑空竭帑他朗反延及内郡邉人死者不可勝數并凉二州遂至虛耗并州部領上郡朔方五原西河太原雲中定襄鴈門代郡上黨等郡今上郡中部延安咸寜洛交銀川新秦朔方九原榆林西河昌化太原樓煩鴈門定襄安邉馬邑雲中上黨樂平等郡地也按秦地除三輔屬司𨽻外並属凉州自後隴西上郡武威張掖仍寇盗不息上郡今上郡中部延安咸寜等郡地武威張掖並今郡地順帝永建四年尚書僕射虞詡上疏曰臣聞禹貢雍州之域厥田惟上上且沃野千里糓稼殷積又有龜兹鹽池以為人利漢上郡龜兹縣有鹽池在今上郡銀川之間水草豐羙土宜産牧北阻山河乗阨㩀險因渠以溉水舂河漕水舂即水碓也河漕通船運也用功省少而軍糧饒足故孝武皇帝及光武築朔方朔方即今郡開西河置上郡皆為此也而元元被災衆羌内潰郡縣兵荒二十餘年夫棄沃壤之饒捐自然之財不可謂利離山河之阻守無險之䖏難以為固今三郡未復前因羌寇徙隴西安定北地上郡四郡之人今言復三郡者當為隴西理㐮武捍蔽京師尚逺不要更移餘三郡須復夲䖏是園陵單外園陵謂長安諸陵園也單外謂無守也而公卿容頭過身但計所費不圗其安宜開聖聽考行所長書奏帝乃復三郡使謁者郭璜督促徙者各歸舊縣繕城郭置候驛既而激河浚渠為屯田省内郡費嵗一億計遂令安定北地上郡及隴西金城北地今彭原安化靈武五原寜朔等郡地常儲榖粟令周數年至陽嘉元年以湟中地廣更增置屯田五部并前為十部二年復置隴西南部都尉如舊制漢南部都尉在隴西郡臨洮縣今和政縣永和中以来機為并州刺史劉乗為凉州刺史大将軍梁商謂機等曰戎狄荒服言其荒忽無常而統領之道亦無常法臨事制宜略依其俗今二君素姓嫉惡欲分眀白黒孔子曰人而不仁嫉之已甚亂也况戎狄乎其務安羌胡防其大故忍其小過機等天性虐刻遂不能從到州之日多所擾發五年夏且凍傅難種羌等遂反叛金城與西塞及湟中今西平郡西地雜種羌大寇三輔扵是拜馬賢為征西将軍将左右羽林五校士及諸州郡兵十萬人討之又於扶風漢陽隴道扶風今汧陽扶風新平等郡地也漢陽隴道並今天水郡地作塢壁三百所置屯田以保聚百姓賢軍大敗賢及二子皆戰没扵是東西羌遂大㑹鞏唐種三千餘騎寇隴西北地又燒園陵掠關中殺傷長吏武威太守趙冲追擊冲雖戰没而前後多所斬獲羌由是衰耗自永和羌叛十餘年間費用八十餘億諸将多斷盗牢廪私自潤入牢價直皆以珍寳貨賂左右上下放縱不恤軍事士卒不得其死者白骨相望扵野桓帝延熹二年燒當八種寇隴右以叚熲為校尉将兵及湟中義從羌二千人擊破之追討南渡河募先登懸索相引刀折矢盡且鬬且行晝夜相攻割肉食雪三十餘日遂至河首積石山山在今西平安鄉郡界出塞二千餘里前後斬首虜并受降各萬餘人會叚熲坐事徴羌遂陸梁覆没營塢寇患轉盛中郎将皇甫規張奐雖累破之而寇不已復遣叚熲擊之自春及秋無日不戰虜遂饑困敗散凡破西羌斬首二萬三千級獲生口數萬西羌於是弭定東羌先零等自覆沒馬賢後既降又叛帝以問熲曰狼子野心難以恩納唯當白刅加領耳計其所餘三萬餘落居近塞内乆亂并凉累侵三輔西河上郡已各内徙安定北地復至單危自雲中五原西至漢陽二千餘里今榆林郡即漢雲中五原郡地漢陽今天水郡匃奴種羌並擅其地是為癕疽伏疹留滯脅下如不加誅轉就滋大若以騎五千歩兵萬人車三千輛三冬兩夏足以破定無慮用費為錢五十四億如此可令羣羌破盡匃奴長服内徙郡縣得反夲土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起於兹作害今不暫疲人則永寜無期帝許之靈帝建寜初熲與先零諸種戰斬首八千餘級熲復追之且破且追士皆重趼既到涇陽今平凉郡平凉縣地餘寇四千落悉散入漢陽山谷間時張奐上言東羌雖破餘種難盡熲性果慮輕負敗難常宜且恩降可無後悔詔書下熲熲復上言曰臣夲知東羌雖衆而軟弱易制所以比陳愚慮思為永寜之筭而張奐説虜强難破宜用招降云臣兵連年累見折衂又言一氣所生不可誅盡山谷廣大不可空静臣伏念周秦之際戎狄之害中興以来羌寇最盛誅之不盡雖降復叛今先零雜種累以反覆攻没縣邑剽掠人物上天震怒假手行誅臣自動兵衆和師克自橋門以西落川以東今金城㑹寜平凉等郡之地非為深險絶域之地車騎安行無慮折衂按奐駐軍二年不能平寇誕辭空説僭而無徴何以言之昔先零作寇趙充國徙居内地前當煎亂邉馬援遷之三輔始服終叛至今為梗故逺識之士以為深憂今傍郡户口單少數為羌所瘡毒而欲令降徒與之雜居是猶種枳棘扵良田飬虺蛇扵室内也故臣奉大漢之威建長乆之策欲絶其夲根不使能植夲規三嵗之費用五十四億今適周年所耗未半而餘寇殘燼将向殄滅臣每奉詔書軍不内御願卒斯言一以任臣臨時量宜不失權便二年熲遂進營逼諸羌大敗之扵瓦亭山在今平凉郡蕭關縣羌衆潰東奔復聚射虎谷分守諸谷上下門又先令千人扵西縣今天水郡上邽縣地結竹為柵廣二十歩長四十里遮之然後兵擊之窮山深谷之中䖏䖏破之斬其渠帥以下萬九千級獲畜産諸物不可勝數扵是東羌悉平凡百八十戰斬三萬八千六百餘級牛馬羊驢駱駝四十二萬七千五百餘頭費用四十四億将士死者四百餘人自爰劍後子孫支分凡百五十種其九種在賜支賜支即析支河首以西及在蜀漢徼北参狼在武都勝兵數千人其五十二種衰少不能自立分散為附落或絶滅無後或引而逺去其八十九種唯鍾最强勝兵十餘萬其餘大者萬餘人小者數千人更相鈔盗盛衰無常大凡順帝時勝兵可二十萬人發羌唐旄等絶逺未常徃来氂牛白馬羌在蜀漢其種别名號皆不可知也中平元年北地降羌先零種及枹罕河關羣盗因黄巾大亂乃與漢中羌義從胡北宫伯玉等反寇隴右致金城人邉章韓遂共殺金城太守韓懿攻燒州郡入寇三輔侵逼園陵詔遣破虜将軍董卓討羌大破之興平元年馮翊降羌反寇諸縣郭汜樊稠擊破之斬首數千級姚氏姚弋仲南安赤亭羌人世為羌酋其先燒當雄於洮罕之間七世孫填虞漢中元末寇擾西州為揚虚侯馬武所敗徙出塞虞九世孫遷那率種人内附漢朝嘉之假冠軍将軍西羌校尉歸順王䖏之於南安之赤亭那元孫柯廻為魏鎮西将軍綏戎校尉西羌都督廻生弋仲少英毅衆畏而親之晉永嘉之亂東徙榆眉戎夏襁負随之者數萬自稱䕶西羌校尉雍州刺史扶風公後歸劉曜曜以為平西将軍封平襄公曜亡復事石勒勒以弋仲行安西将軍六夷左都督石氏之亡遣使降晉詔拜持莭六夷大都督車騎大将軍開府儀同三司大單于髙陵郡公弋仲死子襄嗣自稱大将軍大單于引兵圗關中兵敗為苻生所殺襄弟萇降於生苻堅以為龍驤将軍封益都侯堅敗於淮南歸長安萇叛之自稱大将軍大單于萬年秦王後襲堅執而弑之遂僣即皇帝位國號秦傳子興泓三十二年而亡湟中月氏胡湟中月氏胡其先大月氏之别也在張掖酒泉地月氏王為匈奴冒頓所殺餘種分散西踰葱嶺其羸弱者南入山阻依諸羌居止及漢将霍去病破匈奴取西河池開湟中今西平郡地於是月氏来降與漢人錯居雖依附縣官而首施兩端首施猶言首尾其從漢兵戰鬬随勢强弱被服飲食言語畧與羌同亦以父名母姓為種其大種有七勝兵合九千餘人分在湟中及今居又數百户在張掖號曰義從胡後漢靈帝中平初與北宫伯玉等殺䕶羌校尉泠徴金城太守陳懿遂寇亂隴右焉今天水郡以西北范曄論曰羌戎之患三代尚矣漢世方之匈奴頗為衰寡而中興以後邉難漸大朝規失綏御之和戎帥騫然諾之信故永初中群種蠭起遂解仇嫌結盟詛陸梁三輔建號稱制東侵趙魏之郊南入漢蜀之鄙塞湟中斷隴道燒陵園剽城市傷敗踵係羽書日聞并凉之士特衝殘弊自西戎作逆未有陵斥上國若斯其熾者也和熹以女君親政威不外接朝議憚兵力之損情存茍安或以邉州難援宜見捐棄或懼疽食浸滛莫知所限謀夫廻遑猛士疑慮遂徙西河四郡之人雜寓關右之縣𤼵屋伐樹塞其戀土之心燔破貲積以防顧還之思於是諸將鄧隲任尚馬賢皇甫規張奐之徒争設雄䂓更奉征討馳騁東西奔救首尾揺動數州之境日耗千金之資至於假人增賦借奉侯王引金錢縑綵之珍徴糧粟鹽鐡之積所以賂遺購賞轉輸勞来之費前後數十巨萬或梟尅酋健摧破附落降俘載路牛羊滿山軍書未奏其利害而離叛之状已言矣故得不酧失功不半勞官人屈竭烈士憤喪叚熲受事専掌軍任䝉沒氷雪履千折之道始殄西種卒定東寇若乃䧟擊之所殱傷追走之所崩籍其能穿竄草石自脱於鋒鏃者百不一二而張奐盛稱戎狄一氣所生不宜誅盡流血汙野傷和致妖是何言之迂乎羌雖外患實深内疾若攻之不根是飬疴於心腹也根謂盡其根夲惜哉寇敵略定矣而漢祚亦衰焉嗚呼昔先王疆理九土判别畿荒知夷貊殊性難以道御故斥逺諸華薄其貢職唯與辭要而已若二漢禦戎之方失其夲矣何則先零侵境充國遷之内地宣帝時後将軍趙充國擊先零還於金城郡置属國以處降羌當煎作寇馬援徙之三輔貪其暫安之勢信其馴服之情計日用之權宜忽經世之逺略豈夫識㣲者之為乎氐氐者西戎之别種在冉駹東北今通化郡地之東北廣漢之西今梓潼遂寜徳陽郡地之北其種非一或號青氐或號白氐或稱蚺氐蚺而占反此蓋中國人即其服色而名之也土地險阻有麻田出漆蜜銅鐡椒蠟氐人勇戅抵冒貪貨死利居於河池一名仇池方百頃四面斗絶仇池山在今同谷郡上禄縣數為邉寇郡縣討之則依固自守其俗語不與中國及羌胡同各自有姓如中國之姓其衣服尚青俗能織布善田種畜羊豕牛馬驢騾婚姻備六禮知書疏多知中國語由與中國錯居故也元封三年氐人反進兵討破之分徙酒泉郡昭帝元鳯初氐人復叛遣大鴻臚田廣眀将三輔太常徒討破之至後漢初氐人悉附隴蜀及隗囂滅其酋豪乃背公孫降漢隴西太守馬援上復其王侯君長賜以印綬後囂族人隗茂反攻殺武都太守氐人豪齊鐘留為種類所敬信威服諸豪與郡丞孔奮擊茂破斬之其後亦時寇盗郡縣不足為大患魏武之初諸氐戎或叛或伏乃令夏侯妙才討之因徙武都之種於秦川以禦蜀晉時關隴屢為氐羌所擾孟觀西討因擒氏帥齊萬年華隂令江統深惟四夷内侵宜杜其萌乃作徙戎論曰春秋之義内諸夏而外夷狄以其言語不通贄幣不同法俗詭異種類乖殊或居絶域之外山河之表﨑嶇險阻之地與中國壤土隔不相侵渉賦役不及正朔不加故曰天子有道守在四夷其氣貪婪凶悍不仁四夷之中戎狄為甚弱則畏服强則侵叛雖聖賢之代大徳之君咸未能以道化率導而以恩徳柔懐也當其强也以殷之髙宗武丁而憊於鬼方有周文王而患昆夷獫狁漢祖困於白登孝文軍於覇上及其弱也周公来九譯之貢中宗宣帝納單于之朝以元成之㣲而猶四夷賔服此其已然之效也故匈奴求守邉塞而侯應陳其不可單于屈膝未央蕭望之議以不臣是以有道之君不牧夷狄也唯以待之有備禦之有常雖稽顙執贄而邉城不弛固守為寇賊强暴而兵甲不加逺征期令境内獲安疆場不侵而已及至周室失統諸侯専征以大兼小轉相殘滅封疆不固而利害異心戎狄乗間得入中國或招携安撫以為己用故申繒之禍顛覆宗周襄公要秦遽興姜戎當春秋時義渠大荔居秦晉之域陸渾戎處伊洛之間捜瞞之属瞞莫干反害及濟東侵入齊宋陵虐邢衛齊桓攘之存亡繼絶北伐山戎以開燕路故仲尼稱管仲之力嘉左袵之功逮至春秋之末戰國方盛楚吞蠻氏晉翦陸渾趙開渝中之地秦滅義渠之種始皇帝之并天下也南兼百越北走匈奴五嶺長城戍卒億計雖師役煩殷寇賊横暴然一切之功戎虜奔却當時中國無復四夷也漢興都長安關中之郡號曰三輔禹貢雍州宗周酆鎬之舊也及建武中以馬援領隴西太守討叛羌徙其餘種於關中居馮翊河東空地而與華人雜䖏數代之後族類蕃息既恃其强且苦漢人侵之永初之元騎都尉王宏使西域調發羌氐以為行衛於是羣羌奔駭互相扇動二州之戎一時俱𤼵覆沒将守屠破城邑鄧隲之征棄甲委兵輿屍喪帥前後相繼諸戎遂熾至於南入蜀漢東掠趙魏唐突軹關今濟源縣侵及河内今郡地乃遣北軍中候朱寵将五營士卒於孟津今河陽縣拒羌十年之中夷夏俱弊任尚馬賢僅乃克之此所以為害尤重累年不定者雖由禦之者無方将非其才亦豈不以寇發心腹害起肘腋疹篤難療瘡大遲愈之故㢤自此之後餘燼小有際會輙復侵叛馬賢忸􅏸終於覆敗段熲臨衝自西徂東雍州之戎常為國患中代之寇唯此為大漢末之亂關中殘滅魏興之初與蜀分隔疆埸之戎一彼一此魏武令夏侯妙才討叛氐阿貴千萬等後因㧞棄漢中遂徙武都之種於秦川欲以弱寇强國捍禦蜀虜此蓋權宜之計一時之勢非所以為萬代之利也今者當之已受其弊矣夫關中土沃物豐厥田上上加以涇渭之流溉其潟鹵鄭國白渠灌浸相通黍稷之饒畝號一鐘帝王之都每以為居未聞氐羌宜在此土也非我族類其心必異氐羌志態不與華同而因其衰弊遷之畿服士庶翫習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆盛則生其姦心以貪悍之性挟憤怒之情候隙乗便輙為横逆而居封域之内無障塞之隔掩不備之人收散野之積故能為禍滋蔓暴害不測此必然之勢已騐之事也當今之宜宜及兵威方盛衆未能定徙馮翊今郡地北地今彭原郡新平今郡安定今郡界内諸羌著先零罕开析支之地徙扶風今郡地始平今金城武功縣地京兆之氐今京兆府地出還隴右著隂平今郡地武都之界武都今郡地廪其道路之糧令足自致各附夲種反其舊土使属國撫夷就安集之戎晉不雜並得其所上合徃古即序之義下為盛代永乆之規縱有猾夏之心風塵之警則逺絶中國隔閡山河雖為寇暴所害不廣是以充國子眀能以數萬之衆制羣羌之命有征無戰全軍獨克雖有謀謨深計廣大逺圗豈不以華夷異䖏戎夏區别要塞易守之固得其成功者哉難者曰方今關中之禍暴兵二載征戍之勞老師十萬水旱之害荐饑累荒疫癘之災札瘥夭昬凶逆既戮悔惡初附且欵且畏咸懐危懼百姓愁苦異人同慮冀寜息之有期若枯旱之思雨誠宜鎮之以安悦而子方欲作役起徙興功造事使疲悴之衆徙自猜之寇以無穀之人遷乏食之虜恐勢盡力屈緒業不卒羌戎離散心不可一前害未及弭而後變復横出矣答曰羌戎猾夏擅相署號攻城野戰傷害牧守連兵聚衆載離寒暑矣而今異類瓦解同種土崩老㓜繫虜丁壯降散禽離獸迸不能相一子以此等為尚挟餘資悔惡反善懐我徳恵而来柔附乎將勢窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力勢窮道盡故也然則我制其短長之命而令其進退由己矣夫樂業者不易事安居者無遷志方其自疑危懼畏怖促遽故可制以兵威使之左右無違也迨其死亡流散離逷未鳩與關中之人户皆為讐故可遐遷逺䖏令其心不懐土也夫聖賢之謀事也為之於未有理之於未亂道不著而平徳不明而成今子遭弊事之終而不圗更制之始愛易轍之勤得覆車之軌何哉且關中之人百萬餘口率其少多戎狄居半䖏之遷之必須口實若有窮乏糁粒不繼者故當仰關中之榖以全生生之計必無擠於溝壑而不為侵掠之害今我遷之傳食而至附其種族自使相贍而秦地之人得其半榖此為濟行者以廪糧遺居者以積倉寛關中之逼去盗賊之源除朝夕之損建終年之益若憚暫舉之小勞而忘永逸之𢎞策惜日月之煩費而遺累代之寇敵非所謂能開物成務創業垂統崇夲拓跡謀及子孫者也并州之胡夲實匈奴桀惡之寇也漢宣之代凍餒殘破國内五裂後合為二呼韓邪遂衰弱孤危不能自存依阻塞下委質柔服建武中南單于復来降附遂令入塞居於漠南數代之後亦輙叛戾故何熈梁覲戎車屢征中平中靈帝時以黄巾賊起發調其兵部衆不從而殺羌渠南單于也由是於扶羅羌渠之子求助於漢以討其賊仍值代喪亂遂奔舋而作鹵掠趙魏寇至河南建安中又遣右賢王去卑誘質呼厨泉於扶羅之弟聴其部落散居六郡太原西河平陽上黨樂平地今郡地新興今雲中定襄郡地咸熈之際以一部太極分為三率泰始之初又増為四於是劉猛内叛猛即元海之叔父右賢王連結外虜近者郝散之變𤼵於榖逺恵帝元康中匈奴郝散反攻城邑謀殺長吏於榖逺即今陽城郡太康縣今五部之衆户至數萬人口之盛過於西戎然其天性驍勇弓馬便利倍於氐羌若有不虞風塵之慮則并州之城可為寒心也滎陽句驪夲居遼東塞外正始中幽州刺史毋邱儉伐其叛者徙其餘種户落百數子孫孶息孶音茲今已千計數代之後必至殷熾今百姓失職猶或亡叛犬馬肥充則有噬齧况於他族能不為變夫為邦者患不在貧而在不均憂不在寡而在不安以四海之廣士庶之富豈須外徙逺人然後取足哉此等皆可申諭發遣還其夲域慰彼覊旅懐土之思釋我華夏纎芥之憂恵此中國以綏四方也未及十年而劉石亂華時人服其深識於是羣雄迭據中原其為戰國者三十六載而劉元海為之禍首初後漢建安中氐酋楊騰為部落大帥騰子駒勇健多計略始據仇池於上平地立宫室果園倉庫其地東接秦嶺西接宕昌八百里南去漢中四百里北至岐州三百里户夲有十萬漸漸分減焉駒後有名千萬者魏拜為百頃氐主千萬孫飛龍漸强盛晉武帝假平西将軍還居略陽楊氐與苻氐同出略陽略陽地今天水郡隴城縣無子飬外甥令狐荗捜為子晉恵帝元康初避齊萬年之亂率部落還保百頃自號右賢王關中人士奔流者多依之自茂捜至姪曾孫纂皆降附於晉受官爵苻堅遣将楊安苻雅等討纂克之徙其人於關中空百頃之地初茂捜孫宋奴二子佛奴佛狗奔苻堅以女妻佛奴子定以為尚書領軍将軍及堅敗於淮南關中擾亂定盡力奉堅堅死将家奔隴右徙理歴城歴城在今同谷郡西十里去仇池九十里置倉儲於百頃招合夷夏人得千餘家進平天水略陽郡天水略陽並今天水郡地遂有秦州之地今天水隴西同谷武都隂平郡地後與乞伏乾歸戰定軍敗見殺佛狗子盛先襲位分諸四山氐羌為二十部䕶軍各為鎮戍不置郡縣至子難當時宋梁州刺史理漢中甄法䕶刑政不理難當舉兵襲梁州法䕶委鎮奔洋州今洋川郡難當遂有漢中之地宋文帝元嘉十年難當自為大秦王號年曰建義置百官後傾國南寇規有蜀土不克乃還宋文帝遣龍驤将軍斐方眀等討難當方眀等至漢中長驅而進直到武興攻下辨今同谷郡同谷縣取白水克仇池難當於是将妻子奔後魏難當從弟文度自立為武都王後魏遣将皮歡喜破殺之弟文𢎞自為武都王至孫紹先為後魏将邢巒傅竪眼所破滅以其國為武興鎮今順政郡後改鎮為東益州後唐永為刺史氐人反攻圍州城永殁氐遂削平城堞因此復為氐地西魏文帝大統四年南岐州氐苻安夀反攻陷武都自號大皇遣侯莫陳順等討破之周文帝於武興又置東益州以紹先子辟邪為刺史辟邪㩀州反吐羅協與趙昶討平之苻氐苻洪字廣世略陽臨渭氐人世為西戎酋長始其家池中蒲生長五丈五莭如竹形時咸謂之蒲家因以為氏父懐歸為部落小帥先是隴右大雨百姓謡曰雨若不止洪水必起故因名洪好施多權略驍武善騎射晉永嘉之亂宗人蒲光等推洪為盟主劉曜僣號長安洪歸曜拜率義侯曜敗洪西保隴山又降於石虎拜冠軍将軍委以西方之事累有戰功封西平郡公其部下賜爵關内侯者二千餘人虎死洪降晉有衆十萬詔以為征北大将軍都督河北諸軍事冀州刺史廣川郡公洪以䜟文有草付應王遂改姓苻氏自稱大将軍大單于三秦王洪死子健去秦王之號稱晉官爵遣使告喪自稱晉安西大将軍雍州刺史率衆西行入潼關取長安遂僣即皇帝位國號秦傳生堅丕登五世四十四年而亡文獻通考卷三百三十三
