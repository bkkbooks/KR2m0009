body:
  text: 文獻通考卷一百八十六鄱陽馬端臨貴與著經籍考十三經樂西漢藝文志自黃帝下至三代樂各有名周衰禮樂俱壞樂尤微眇以音律為莭師古曰眇細也言其道精微莭在音律不可具於書眇亦讀曰妙又為鄭衛所亂故無遺法漢興制氏以雅樂聲律世在樂官頗能紀其鏗鏘鼓舞而不能言其義六國之君魏文侯最為好古孝文時得其樂人竇公師古曰桓談新論云竇公年百八十歲兩目皆盲文帝竒之問曰何因至此對曰臣年十三失明父母哀其不及衆技教鼓琴臣導引無所服餌獻其書乃周官大宗伯之大司樂章也武帝時河間獻王好儒與毛生等共采周官及諸子言樂事者以作樂記獻八佾之舞與制氏不相逺其內史丞王定傳之以授常山王禹禹成帝時為謁者數言其義獻二十四卷訖劉向校書得樂記二十三篇與禹不同其道寖以益微師古曰漸也鼂氏曰古之為國者先治身故以禮樂之用為本後世為國者先治人故以禮樂之用為末先王欲明德於天下深推其本必先修身而修身之要在乎正心誠意故禮以制其外樂以養其內內之不貞之心無自而萌外之不義之事無由而蹈一身既修而天下治矣是以禮樂之用不可須臾離矣後世則不然設法造令務以整治天下自適其暴戾恣睢之心謂躬行率人為迂闊不可用若海內平定好名之主然後取禮之威儀樂之莭奏以文飾其治而已則其所謂禮樂者實何益於治亂成敗之數故曰後世為國者先治人以禮樂之用為末雖然禮文在外為易見歷代猶不能廢至於樂之用在內微密要眇非常情所能知故自漢以來指樂為虛器雜以鄭衛夷狄之音雖或用於一時旋即放失無復存者况其書哉今裒集數種姑以補書目之闕焉爾陳氏曰劉歆班固雖以禮樂著之六藝略要皆非孔氏之舊也然三禮至今行於世猶是先漢舊傳而所謂樂六家者影響不復存矣竇公之大司樂章既已見於周禮河間獻王之樂記亦已録於小戴則古樂已不復有書而前志相承乃取樂府教坊琵琶羯鼓之類以充樂類與聖經並列不亦悖乎晚得鄭子敬氏書目獨不然其為説曰儀注編年各自為類不得附於禮春秋則後之樂書固不得列於六藝今從之而著於子録雜藝之前按古者詩書禮樂皆所以垂世立教故班史著之六藝以為經籍之首流傳至於後世雖有是四者而俱不可言經矣故自唐有四庫之目而後世之所謂書者入史門所謂詩者入集門獨禮樂則俱以為經於是以歷代典章儀注等書厠之六典儀禮之後歷代樂府教坊諸書厠之樂記司樂之後猥雜殊甚陳氏之言善矣然樂者國家之大典古人以與禮並稱而陳氏書録則置之諸子之後而儕之於技藝之間又大不倫矣雖後世之樂不可以擬古然既以樂名書則非止於技藝之末而已况先儒釋經之書其反理詭道為前賢所擯斥者亦沿經之名得以入於經類豈後世之樂書盡不足與言樂乎故今所敘録雖不敢如前志相承以之擬經而以與儀注讖緯並列於經解之後史子之前云漢志凡樂六家百六十五篇出淮南劉向等琴頌七篇隋志四十二部一百四十二卷通計亡書合四十部一百六十三卷唐志三十一家三十八部二百五十七卷失姓名九家張文收以下不著録二十家共九十三卷宋三朝志四十五部四百九卷宋兩朝志三十三部一百七十四卷宋四朝志二十一部三百一十卷宋中興志六十四家七十一部六百五十五卷樂府雜録一卷崇文總目唐假安節撰其事蕪駁不倫鼂氏曰記唐開國以來雅鄭之樂並其事始末歷代樂儀崇文總目唐協律郎徐景安撰總序律吕起周漢訖於唐著唐樂章差為詳悉大樂令壁記崇文總目唐協律郎劉貺撰分樂元正樂四夷樂合三篇古樂府樂府古題要解共十二卷崇文總目唐吳兢撰釋古樂曲所以名篇之意鼂氏曰兢纂采漢魏以來古樂府詞凡十卷又於傳記及諸家文集中采樂府所起本義以釋解古題云樂府解題崇文總目不著撰人名氏與吳兢所撰樂府古題頗同以江南曲為首其後所解差異玉臺新録十卷鼂氏曰陳徐陵纂唐李康成云昔陵在梁世父子俱事東朝特見優遇時承華好文雅尚宫體故采西漢以來詞人所著樂府艷詩以偹諷覽且為之序玉臺後集十卷鼂氏曰唐李康成采梁蕭子範迄唐張赴二百九人所著樂府歌詩六百七十首以續陵編序謂名登前集者今並不録唯庾信徐陵仕周陳既為異代理不可遺云後村劉氏曰鄭左司子敬家有玉臺後集天寶間李康成所撰自陳後主隋煬帝江總庾信沈宋王楊盧駱而下二百九人詩六百七十首彚為十卷與前集皆徐陵所遺落者往往其時諸人之集尚存其中多有佳句樂府古今解題崇文總目唐郗昻撰或云王昌齡撰未詳孰是舊云古今樂府解題又云古題所載曲名與吳兢所撰樂府解題頗異復有唐李百藥詞今定為樂府古今解題聲律要訣十卷崇文總目唐田琦撰推本律呂及制管定音之法文雖近俗而於樂理尤詣焉鼂氏曰唐上黨郡司馬田疇撰序謂一切樂器依律呂之聲皆須本月真響若但執纍黍之文則律呂隂陽不復諧矣故據經史參校短長為此書云羯鼓録一卷崇文總目唐南卓撰羯鼓夷樂與都曇答鼓皆列於九部至唐開元中始盛行於世卓所記多開元天寶時曲云陳氏曰卓唐為婺州刺史琴操三卷崇文總目晉廣陵相孔衍撰述詩曲之所從總五十九章陳氏曰止一卷不著名氏中興書目云晉廣陵守孔衍以琴調周詩五篇古操引共五十篇述所以命題之意今周詩篇同而操引財二十一篇似非全書也琴譜三均手訣崇文總目宋謝莊撰敘唐虞至宋世善琴者姓名及古典名言琴通三均謂黃鐘中吕無射琴經陳氏曰托名諸葛亮淺俚之甚琴手勢譜一卷崇文總目唐道士趙邪利撰記古琴指法為左右手圖二十一種陳氏曰一名彈琴古手法金風樂一卷崇文總目唐玄宗撰蓋琴曲名琴書三卷崇文總目唐翰林待詔趙惟暕撰略述琴製敘古諸典及善琴人姓名陳氏曰惟暕稱前進士滁州全椒尉琴譜三十卷崇文總目唐陳康士撰按康士作琴曲一百章譜十三卷宫調二十章商調十章角調五章徴調七章琴調五章黃鍾十章離憂七章沉湘七章側蜀七章縵角七章玉女五章其譜散亡今書舊目有琴調六卷琴譜一卷殘缺無首尾所裁乃楚角宫黃鍾側蜀琴調數篇餘皆亡琴譜序一卷崇文總目陳康士等撰康士字安道以善琴知名嘗操琴曲百篇譜十三卷進士薑阮皮日休皆為序以述其能康士譜今别行琴調四卷崇文總目陳康士撰楚調五章黃鍾調二十章側蜀瑟調皆一章離騷譜一卷崇文總目陳康士撰依離騷以次聲大唐正聲新扯琴譜一卷崇文總目唐陳拙纂集琴家之説不專聲譜廣陵止息譜一卷崇文總目唐呂渭撰晉中散大夫嵇康作琴調廣陵散説者以魏氏散亡自廣陵始晉雖暴興終止息於此康避魏晉之禍託之於鬼神河東司户參軍李良輔云袁孝已竊聼而寫其聲後絶其傳良輔傳之於洛陽僧思古思古傳於長安張老遂著此譜總三十三拍至渭又增為三十六拍東杓引譜一卷崇文總目唐協律郎李約撰約患琴家無角聲乃造東杓引七拍有麟聲繹聲以備五音無射商九調譜一卷崇文總目唐蕭祐撰祐因胡笳推無射商自創為九調琴雅略一卷崇文總目唐殿中侍郎齊嵩撰概言創制音器之略琴聲律圖一卷崇文總目唐恭陵署令王大力承詔撰國琴制度以六十律旋宮之法次其上前序歷引諸家律呂相生之術琴德譜一卷崇文總目唐因寺僧道英撰述吳蜀異音及辨析指法道英與趙邪利同時蓋從邢利所授沈氏琴書一卷崇文總目沈氏撰不著名首載嵇中散四弄題趙師法撰次有悲風三峽流泉渌水昭君下舞間弦并胡笳四弄題盛通師撰蓋諸家曲譜沈氏集之琴説一卷陳氏曰唐工部尚書李勉撰琴説一卷陳氏曰唐待詔薛易簡撰衡州來陽尉教坊記一卷鼂氏曰唐崔令欽撰開元中教坊特盛令欽記之率鄙俗事非有益於正樂也琵琶故事一卷鼂氏曰未詳何人所纂陳氏曰假安節撰張淡正琴譜一卷崇文總目茅仙逸人張淡正撰不詳何代人解琴指法琴譜二卷崇文總目梁開平中王邈撰小胡笳子十九拍一卷崇文總目偽唐蔡翼撰琴曲有大小胡笳大胡笳十八拍沈遼集世名沈家聲小胡笳又有契聲一拍共十九拍謂之祝家聲祝氏不詳何人所載乃小胡笳子阮咸譜一卷琴調一卷崇文總目偽唐蔡翼撰琴雜説一卷崇文總目不著撰人名氏蓋琴家雜集器圖聲訣之略琴調三卷崇文總目不著撰人名氏無射商角諸譜皆亡其曲名琴譜四卷崇文總目不著撰人名氏凡四大曲一曰别鶴林其三皆失其名而譜存今留以待知琴者琴略一卷崇文總目不著撰人名氏序有七例頗抄歷代善琴者各為門類又載拍法及雜曲名琴式圖二卷崇文總目不著撰人名氏以琴制度為圖雜載趙邪利指訣又有白雲先生三訣陳氏曰三訣凡一卷稱天台白雲先生三樂譜一卷崇文總目不著撰人名氏載商調三樂譜琴譜纂要五卷崇文總目不著撰人名氏圖琴制度及載古曲譜曲名琴書正聲九卷崇文總目不著撰人名氏集遊春緑水幽居坐愁思秋思楚明光易水鳳歸林接興白雲凡十數譜琴譜三卷崇文總目不著撰人名氏雜録琴譜大小數曲其前一大曲亡其名舊本或云李翺用指法與諸琴法無異而云翺者豈其所傳歟阮咸調弄二卷崇文總目不著撰人名氏阮咸金羽調一卷降聖引譜一卷崇文總目不著撰人名氏載降聖引一篇譜一首不詳何代之曲阮咸譜二十卷阮咸曲譜一卷崇文總目不著撰人名氏有宮商角徵無射宮無射商金羽碧玉凄涼黃鍾調凡十篇總十二卷琴義一卷陳氏曰稱野人劉籍撰琴曲詞一卷陳氏曰不知作者凡十一曲辭皆鄙俚大周正樂一百二十卷崇文總目周翰林學士竇儼撰顯德中儼奉詔集綴其書博而無次樂苑五卷崇文總目不著撰人名氏敘樂律聲器凡二十篇周優人曲辭二卷崇文總目周吏部侍郎趙上交翰林學士李昉諫議大夫劉濤司勳郎中馮古纂録燕樂優人曲辭景祐大樂圖二十卷崇文總目皇朝司封員外郎集賢校理聶冠卿撰景祐二年大樂署以律凖考定雅樂獻之上召祠部員外郎集賢校理李照問鍾律大要照請用黍尺求聲遂命照制新樂冠卿討論故事據經義多所損益以御制樂曲及鍾律議説制器之法與古今樂器圖象之異為書一百二十六篇上之大樂圖義二卷崇文總目皇朝大常博士直史館宋祁撰受詔考試太常樂工因集古樂鍾律器用之説上列為圖從釋其義并今樂署闕典所當釐補者更為雜論七篇奏之皇祐樂記三卷鼂氏曰皇朝胡瑗等撰皇祐二年下詔曰國初循用王朴樂太祖患其聲髙令和峴減下一律然猶未全命瑗同阮逸等二十餘人再定四年樂成奏之上御紫宸殿觀焉此其説也陳氏曰阮逸胡瑗撰凡十二篇首載詔旨次及律度量衡鐘磬鼓鼎鸞刀圖其形製刋校頒之天下虎丘寺有本當時所頒藏之名山者也其末志頒降歲月實皇祐五年十二月二十一日用蘇州觀察使印長二押字余平生每見承平故物未嘗不起敬因録藏之一切依元本摹寫不少異景祐廣樂記陳氏曰翰林侍講學士馮元等撰闕八卷景祐元年判太常寺燕肅建言鍾律不調欲以王朴律凖更加考詳詔宋祁與集賢校理李照共領其事詔言朴律太髙比古樂約髙五律遂欲改大樂制管鑄鐘并引校理聶冠卿為檢討官又詔元等修撰樂書為一代之典三年七月書成然未幾照樂廢不用景祐樂府奏議一卷皇祐樂府奏議一卷陳氏曰胡瑗撰三聖樂書一卷陳氏曰宋祁子京撰補亡樂書三卷大樂演義三卷鼂氏曰皇朝房庶撰古律既亡後世議樂者縱黍為之則尺長律管容黍為有餘王朴是也橫黍為之則尺短律管容黍為不足胡瑗是也故庶欲造以一千二百黍納之律管中黍盡乃得九十分為黃鍾之長其説大要以律生尺耳范蜀公本之以製雅樂石林葉氏曰元祐中昭陵命胡瑗阮逸更造新樂將成宋景文得蜀人房庶所作樂書補亡三卷上之以為知樂庶自言嘗得古文漢書律歷志言其度起於黃鍾之長用子榖秬黍中者一黍字下脫之起積一千二百黍八字乃與下文之實字相接而人不悟故歷世皆以纍黍為尺當如漢志以秬黍中者千二百實管中為九十分以定黃鍾之長而加一分以為尺則漢志所謂一為一分者黃鍾九十分之一而非一黍之一也又言樂有五音今無正徵音國家以火德王而亡本音尤非是范景仁力主其説時方用纍黍尺故庶但報聞罷崇寧中更定大晟樂始申景仁之説而增徵音然漢書卒未嘗補其脫字蓋不知庶之所自本也陳氏曰庶説惟范鎮是之時胡瑗阮逸制樂已有定議遂格不行元豐四年庶子審權作演義以述父之意其後元祐初范蜀公自為新樂奏之於朝蓋用其説云范蜀公樂書一卷鼂氏曰景仁論樂宗房庶潛心四十餘年出私財鑄樂器元祐中上之五音會元圖鼂氏曰未知何人撰謂樂各有譜但取篳栗譜為圖以七音十二律使俗易見樂書二百卷陳氏曰祕書省正字三山陳暘撰建中靖國初進之為禮書陳祥道其兄也其書雅俗胡部音器歌舞下及優伶雜戲無不備載博則博矣未免於穢蕪也暘紹聖初制科終禮部侍郎楊誠齋序曰其書逺自唐虞三代近逮漢唐本朝下逮子史百氏內自王制外逮戎索網羅放失貫綜煩悉放鄭而一之雅引今而復之古使人味其論玩其圖忽乎先王金鐘天球之音粲乎前代鷺羽玊戚之容後有作者不必求之於野證之於把宋而損益可知焉大晟樂書二十卷雅樂圖譜陳氏曰大中大夫開封劉炳子蒙撰大晟者本方士魏漢津妄出新意以裕陵指節定尺律傅會身為度之説炳為大司樂精為緣飾又有圖譜一卷隆韶道百和集一卷陳氏曰保義郎大晟府按協律姚公立撰以律呂節氣隂陽為説凡四十九條樂府詩集一百卷鼂氏曰皇朝郭茂倩編次取古今樂府分十二門郊廟歌辭十二燕射歌辭三鼓吹曲辭五橫吹曲辭五相和歌辭十八清商曲辭八舞曲歌辭五琴曲歌辭四雜曲歌辭十八近代曲辭四雜謠歌辭七雜樂府詞十一通為百卷包括傳記辭曲略無遺軼琴筌十卷鼂氏曰皇朝茍以道撰記造琴法彈琴訣并譜琴史六卷陳氏曰吳郡朱長文伯原撰唐虞以來迄本朝琴之人與事備矣製琴法一卷陳氏曰不知何人撰大胡笳十九拍一卷陳氏曰題隴西董庭蘭撰連劉商辭又云祝家聲沈家譜不可曉也琴譜八卷陳氏曰鄞學魏邸舊書有之己卯分教傳録亦益以他所得譜琴操譜十五卷調譜四卷陳氏曰參政歷陽張巖尚翁以善鼓琴聞一時余從其子佖得此譜琴譜十六卷陳氏曰新昌石孝隆君大所録律呂新書二卷中興藝文志曰蔡元定季通撰其法以律生尺如房庶范鎮之論亦祖兩漢志蔡雍説及我朝程子張子又主淮南大史小司馬之説以九分為寸朱子序曰南狩今六十年學士大夫因仍簡陋遂無復以鍾律為意者吾友蔡君季通乃獨心好其説而力求之旁搜逺取巨細不捐積之纍年乃若冥契著書兩卷凡若干言豫嘗得而讀之愛其明白而淵深縝密而通暢不為牽合傅會之談而橫斜曲直如珠之不出於盤其言雖多出於近世之所未講而實無一字不本於古人已試之成法蓋若黃鍾圍徑之數則漢斛之積分可考寸以九分為法則淮南太史小司馬之説可推五聲二變之數變律半聲之例則杜氏之通典具焉變宮變徵之不得為調則孔氏之禮疏因亦可見至於先求聲氣之元而因律以生尺則尤所謂卓然者而亦班班雜見於兩漢之志蔡雍之説與夫國朝會要以及程子張子之言顧讀者不深考其間雖或有得於此者而又不能無失於彼是以晦蝕紛拏無復定論抑季通之為此書詞約理明初非難讀而讀之者往往未及終篇輒已欠伸思睡固無由了其歸趣獨以豫之頑頓不敏乃能熟復數過而僅得其旨意之倣佛季通亦許豫能知己故屬以序而不得辭焉朱子語録曰季通律書分明是好却不是暗説自有按據樂舞新書中興藝文志吳仁傑撰論關雎者二論風雅頌者九論笙鏞雅頌者二論大雅小雅者一論二南者二論雅者九凡二十五篇文獻通考卷一百八十六
