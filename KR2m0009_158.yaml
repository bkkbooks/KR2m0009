body:
  text: 文獻通考卷一百五十八鄱陽馬端臨貴與著兵考十車戰周武王戎車三百兩兵車百夫長所載車稱兩一車步卒七十二人凡二萬一千人舉全數虎賁三百人勇士稱也若虎賁獸言其猛也皆百夫長與受戰於牧野詩與爾臨衝以伐崇墉臨臨車也衝衝車也衝孔氏曰臨者在上臨下名者在傍突之稱二車不同牧野洋洋檀車煌煌檀木之堅者以為兵車煌煌明也駟騵彭彭騮馬白腹曰騵彭彭強盛也維師尚父時維鷹揚涼彼武王肆伐大商會朝清明六韜武王問於太公曰以車與騎步所當幾何公曰車者軍之羽翼也所以陷堅陳要強敵遮北走也易戰之法一車當步卒八十人八十人當一車一車當六騎六騎當一車十乘敗千人百乘敗萬人此其大數也置車之吏數五車而一長十車而一吏五十車而一率百乘而一將易戰之法五車為列前後相去四十步左右十步險戰之法車必循道十車為聚二十車為屯前後相去二十步左右六步隊間三十六步五車一長縱橫相去一里各返故道選車士之法取年四十以下長七尺五寸已上走能遂馬及馳而乘之前後左右上下周旋能超乘旌旗力彀八石弩射前後皆便習者武車之士不可不厚也車戰之地凡車之死地有十其勝地有八往而無還者車之死地也越絶險阻乘敵逺行者車之竭地也前易後險者車之困地也陷之險阻而難出者車之絶地也圯下漸澤黑土黏埴者車之勞地也左險右易上陵抑阪者車之逆地也殷草橫畝犯歷深澤者車之拂地也車少地易與步不敵者車之敗地也後有溝瀆左有新水右有險阪者車之壞地也日夜霖雨旬日不止道路潰陷前不能進後不能解者車之陷地也此十者車之死地也敵之前後行陳未定即陷之旌旗擾亂人馬數動即陷之士卒前後相顧前往而疑後恐而怯即陷之三軍卒驚皆薄而起即陷之戰於易地暮不能解即陷之逺行而暮舍三軍恐懼即陷之此八者車之勝地也西麓周氏曰古者戰陳士卒必與車乘相麗左傳云卒乘輯睦公乘無人卒列無長車馳卒奔乘晉師先偏後伍亦為卒乘列故毁車崇卒必有自來而古書未有記戰騎者要之升陑入隧山澗稠阻非車所能用其必藉卒以濟而未嘗不屬於車乘耳武王革車三百兩虎賁三千人自百夫長以上皆乘車非車外又有虎賁之士也六韜均兵分車步騎各有屬險戰之法十車為聚二十車為屯前後相去二十步左右六步夫險形豈有相似者乃與平地一概區截已是虗談易戰一車當步卒八十人一騎當步卒八人一車當十騎險戰一車當步卒四十人一騎當步卒四人一車當六騎夫車步騎相當得勢者勝安有定形不然車之所蹂騎之所馳何止當幾人而已徒以易險兩字對相裁減不待知兵者知其謬也戰騎出丐奴所謂控弦引弓管子載騎寇始服専指北狄唐太宗謂蕃兵唯徑馬奔衝者六國時燕趙邉胡始用之秦遂有騎卒將曹操始為戰騎陷騎遊騎之法且云車徒常教以正騎隊常教以竒此書論戰騎翼其兩傍掩其前後全是後代褁陳拐子馬事非古法也周禮巾車革路龍勒條纓五就建大白以即戎以封四衛革路鞔之以革而漆之無他飾龍龐也以白黑飾韋雜色為勒條讀為絛其樊及纓以絛絲飾之而五戎不言樊字蓋脫耳大白殷之旗猶周大赤蓋象正色也即戎謂兵事四衛四方諸侯守衛者蠻服以內是也車僕掌戎路之萃廣車之萃闕車之萃蘋車之萃輕車之萃萃猶副也此五者皆兵車所謂五戎也戎路王在軍所乘也廣車橫陳之車也闕車所謂補闕之車也蘋猶屏也所用對敵自蔽隱之車也輕車所用馳敵致師之車也春秋傳曰公喪戎路又曰其君之戎分為二廣則諸侯戎路廣車也又曰師斿闕四十乘孫子八陳有蘋車之陳又日馳車千乘五者之制及萃數未盡聞也書曰武王戎車三百兩故書蘋作平杜子春云蘋車當為軿車其字當為萃書亦或為萃凡師共革車各以其萃五戎者共其一以為王優尊者所乘也而萃各從其元焉疏王雖乘一路四路皆從以優尊也此戎路即巾車所謂革也巾車所掌五戎之正此所掌五戎之倅會同亦如之巡守及兵車之會則王乘戎路乘車之會王雖乘金路猶共以從不失備也考工記車有六等之數車軫四尺謂之一等戈祕六尺有六寸既建而迤崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車戟常崇於殳四尺謂之五等酋矛常有四尺崇於戟四尺謂之六等此所謂兵車也軫輿後橫木崇髙也八尺曰尋倍尋曰常殳長丈二戈殳戟矛皆插車騎騎車傍也鄭司農云迤讀為移從風之移謂著戈於車邪傍也酋發聲直謂矛疏有刃曰戈矛戟無刃曰殳殳主擊戈矛戟主刺戟兵車圗曰車有六等戈崇於軫人崇於戈殳崇於人崇於殳矛崇於戟此六數也車之六建夷矛建於酋矛之前酋矛建於戟之前戟建於殳之前殳建於戈與人之前此六建也而軫則不與焉八尺曰尋倍尋曰常凡兵無過三其身過而無已則不能用又害人也戈建而迤取止戈為武之意入必後其刃不以刃向國焉不及弓矢者以人佩故也詩元戎十乘以先啓行戎車既安如輊如軒元大也夏后氏曰鈎車先正也殷曰寅車先疾也周曰元戎先良也軍前曰啓後曰殿元戎十乘以先軍行之前者所謂選鋒也輊車之覆而前也軒車之郤而後也戎車既安正矣從後視之如輊從前視之如軒是適調也元戎甲士三人同載左持弓右持矛中御戈殳戟殳插於騎上建鳥章白斾鳥章畫急疾之鳥張逸云隼是也白斾繼旐者謂繼帛猶通帛為斾亦是絳也此旟而言旐者散則通名小戎俴收五楘梁輈遊環脅驅隂靷鋈續文茵暢轂駕我騏馵小戎兵車也天子戎車謂之元戎諸侯謂之小戎俴淺也收軫也軫車前後兩端橫木所以收斂所載故名收焉凡車之制廣皆六尺六寸其平地任載者為大車則軫深八尺兵車則軫深四尺四寸比之為淺故曰俴收五五束也楘歷録也梁輈輈上句衡也一輈五束束有歷録輈轅也梁輈輈上曲鉤衡衡者軛也輈從軫以前稍曲而上至衡則居衡之上而向下鉤之衡則橫於輈下而輈形穹窿上曲如屋梁然又以皮革五處束之其文章歷録然也遊環靷環也遊在背上所以禦出也脅驅謹駕其所以出入也靷環以皮為之引兩驂馬之外轡貫其中而執之所以制驂使不得外出也此環當兩服馬之背上遊移前却無定處故謂之遊環亦謂之靳左傳曰如驂之有靳脅驅亦以皮為之前係於衡之兩端後係軫之兩端當服馬兩脅外以驅驂馬使不得內入也隂掩軌也靷所以引也鋈白金也續續靷也掩軌謂輿下三面材以板木橫側車前所以隂映此軌也輈在軌前橫木映軌故鄭氏云掩軌在軾前垂輈上謂隂板垂輈上也此車衡之長唯六尺六寸止容二服驂馬頸不當衡别以皮為二靷係於隂板之上令驂馬引引亦謂之靷左傳曰兩靷將絶是橫軌之前别有驂馬二靷也文茵車中所坐之褥用虎皮有文采也暢長也轂所以貫車輪者大車之轂一尺有丰兵車之轂三尺三寸比大車為長故曰暢轂騏騏文也馬左足白曰馵四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜孔阜甚肥大也騏馬青黑色駵赤身黑鬛中中服也騧黃馬黑喙驪黑色驂兩騑也車駕四馬內兩馬謂之服外兩馬謂之騑盾干也畫龍於盾合而載之以為車上之衛必載二者備破毁也觼環之有舌者軜驂內轡也置觼於軾前以繫軜故謂之觼軜亦銷沃白金以為飾也驂之外轡則御者執之俴駟孔羣厹矛鋈錞蒙伐有苑虎韔鏤膺交韔二弓竹閉緄縢俴駟四馬皆以淺薄之金為甲欲其輕而易於馬之旋習也孔羣言甚調和也厹矛三隅刃也刃有三角鋈錞矛之下端平底者亦以白金沃之蒙雜色伐中干也盾之别名苑文貌畫雜羽之文於盾上也虎虎皮韔弓室也鏤刻金飾也膺馬帶也鏤金以飾馬當胸帶也交二弓於韔備折毁也閉弓檠也儀禮作䪐緄繩縢約也以竹為閉而以繩約之於弛弓之裏檠弓體使正也陳氏禮書曰古者之用兵也險野人為主易野車為主則險野非不用車而主於人易野非不用人而主於車車之於戰動則足以衝突止則足以營衛將卒有所芘兵械衣裘有所齎詩曰君子所依小人所腓則車之為利大昔周伐鄭鄭為魚麗之陳先偏後伍伍承彌縫桓五年邲之戰楚君之戎分為二廣廣有一卒卒偏之兩宣十二年楚巫臣使於吳以兩之一卒適吳舍偏兩之一焉成七年考之周禮五伍為兩四兩為卒司馬法二十五人為兩百人為卒卒兩則人也偏則車也杜預十五乘為大偏九乘為小偏其尤大者又有二十五乘之偏則周魚麗之偏二十五乘之偏也楚二廣之偏十五乘之偏也巫臣所舍之偏九乘之偏也先偏後伍伍從其偏也卒偏之兩兩從其偏也先其車足以當敵後其人足以待變則古者車戰之法略可知也或者謂晉人以什共車必克房琯以車戰取敗遂以為用車不若用人與騎之愈是不知晉人之克非什之利用什之幸也房琯之敗非車之不利用車之罪也古者教民以射御為藝君子以射御為能故孔子曰吾執射乎執御乎詩稱叔假之多才則曰叔善射忌又良御忌古人相率以射御如此則登車而不能御參乘而不能射者鮮矣房琯之用車有是人乎不然巫臣教吳以乘車而能取勝於楚何也戎車之制不可以考姑倣小戎以見之又曰祥車曠左所以虛神位也乘君之乘車不曠左不敢虛君位也左必式不敢安君位也蓋乘車之禮君處左車右處右僕處中故造車者必慎於左考工記所謂終日馳騁左不揵是也乘車者不敢曠左戎右所謂會同充革車是也器物不敢措之於左月令所謂載耒耜於參保介之御間是也後世魏公子虛左以迎侯生秦皇虛左以迎太后皆古之遺制耳此特乘車為然若兵車則馭者在左戎右在右將帥居中昔晉伐齊郤克將中軍解張御鄭緩為右郤克傷矢流血及屨鼓音未絶曰余病矣解張曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病夫郤克傷矢而未絶鼓音則將在鼓下矣解張傷手而血殷左輪則御在車左矣然此將帥所乘也若士卒所乘則左人持弓右人持矛中人御故書戒左不攻於左右不攻於右御非其馬之正言左右而又言御則御在中可知也左傳稱秦師過周北門左右免胄而下言左右下則御在中不下可知也僖三十三年楚樂伯曰致師者左射以菆是左人持弓也宣十二年欒針為晉侯右曰寡君使針持矛焉成十六年衛太子為簡子禱曰蒯瞶不敢自佚備持矛焉是右人持矛也襄二年蓋御無定位右有常處故將帥車則御在左士卒車則御居中右人之持矛雖將帥士卒之車不同而所居常在右所職常持矛也凡此皆三人乘車之法也太僕凡車旅田役贊王鼓王之乘車有御與戎右又有太僕則四駟乘矣春秋之時侯叔夏御莊叔綿房甥為右富父終生駟乘杜預曰駟乘四人乘車北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也徒步兵也軼突也公子突曰使勇而無剛者嘗寇而速去之嘗試也勇則能往無剛則不恥退君為三覆以待之覆伏兵也戎輕而不整貪而不親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之戎人之前遇覆者奔祝𣆀逐之衷戎師前後擊之盡殪為三部伏兵祝𣆀率勇而無剛者先犯戎而速奔以遇二伏兵至後伏兵起戎還走𣆀反逐之戎前後及中三處受敵故曰衷戎師殪死也戎師大奔後駐軍不復繼也十一月甲寅鄭人大敗戎師晉城濮之戰車七百乘韅靷鞅靽五萬二千五百人在背曰韅在胸曰靷在腹曰鞅在後曰靽言駕乘修備也邲之戰欒武子曰楚君之戎分為二廣君之親兵廣有一卒卒偏之兩十五乘為一廣司馬法百人為卒二十五人為兩車十五乘為大偏今廣十五乘亦用舊偏法復以二十五人為承副右廣初駕數及日中左則受之以至於昏內官序當其夜內官近官序次也以待不虞不可謂無備楚子為乘廣三十乘分為左右右廣雞鳴而駕日中而説説舍也左則受之日入而説許偃御右廣飬由基為右彭石御左廣屈蕩為右楚王更迭載之故各有御右章氏曰車戰之法每車用甲士三人步卒七十二人行則以車為衛居則以車為營一車之間又有倅車見周禮車僕春秋如韓原之戰輅秦伯將止之鞍之戰韓厥中御而從齊侯鄢陵之戰郤至遇楚子韓厥從鄭伯邲之戰楚子乘廣以逐趙旃用車以戰而使敵人便得與吾元帥相接則是環衛之車不設也蓋古者車戰之法前後整齊必有護衛前後行列元帥未易動搖也至春秋列國用之往往軍伍不整而元帥每以車逐利混然左右率無定法故敵人得以及之終春秋之世致敗者未有不由車戰之無法而輕動搖也惟繻葛之戰二拒用事若原繁髙渠彌以中軍奉公未嘗輕動搖深得古法晉申公巫臣使於吳以兩之一卒適吳舍偏兩之一焉司馬法百人為卒二十五人為兩車九乘為小偏十五乘為大偏蓋留九乘車及一兩二十五人令吳習之也與其射御教吳乘車教之單陳教之叛楚置其子狐庸焉使為行人於吳晉中行穆子敗無終及羣狄於太原即大鹵也無終山戎崇卒也崇聚也將戰魏舒曰彼徒我車所遇又厄地險不便車以什共車必克更增十人以當一車之用困諸厄又克車每困於厄道今去車故為必克請皆卒去車為步卒自我始乃毁車以為行魏舒先自毁其屬車為步陳五乘為三伍乘車者車三人五乘十五人今改去車更以五人為五分為三伍荀吳之嬖人不肯即卒斬以徇魏舒輒斬之荀吳不恨所以能立功為五陳以相離兩於前伍於後専為右角參為左角偏為前拒皆臨時處置之名以誘之翟人笑之未陳而薄之大敗之傳言荀吳能用善謀按兵雖曰凶器然古之以車戰其坐作進退整暇有法未嘗掩人之不備而以竒取勝也故韓厥遇齊侯則奉觴加璧郤至遇楚子則免胄趨風可以死則為千犨之請矢可以無死則為庾公之叩輪所謂殺人之中又有禮焉雖春秋伯國之君臣其志在於爭城爭地然於勍敵之人初不迫於險固如此至戎狄之侵中國則雲合鳥散輕進易退於是車之雍容不足以當其徒之慓疾遂至捨車而用徒然彼長於徒我長於車今捨吾之長技而與之搏是以兵豫敵也故必設覆以誘之未陳而薄之然後可以取勝而車戰之法廢矣秦漢以後之用兵其戰勝攻取者大概皆如鄭之禦戎晉之敗狄耳何嘗有堂堂正正之舉乎漢夏侯嬰破李由軍於雍邱以兵車趣戰疾破之灌嬰以御史大夫將軍車騎别追項籍至城東破之武帝時衛青軍出塞擊胸奴以武剛車自環為營張晏曰兵車也而縱五千騎往當胸奴霍去病少侍中貴不省士其從軍上為遣太官齎數十乘既還重車餘棄梁肉而士有飢者李陵擊胸奴與單于相值圍陵軍陵居兩山間以大車為營引士出營外為陳連戰士卒矢傷三創者載輦兩創者將車一創者持兵戰陵曰吾士氣少衰而鼓不起何也軍中豈有女子乎乃搜車中得隨軍妻婦皆斬之復戰按先儒因考西漢書此數條以為車戰之制漢尚用之然詳考其辭則是以車載糗糧器械止則環以為營耳所謂甲士三人左持弓右持矛中執綏之法已不復存矣後漢光武造戰車可駕數牛上作樓櫓置於塞上以拒胸奴靈帝時陽璇為零陵守制車數十乘以禦賊魏武帝新書攻車七十五人守車一隊共二十五人田豫與虜戰亦用車而戰晉馬隆擊鮮卑樹機能以衆數萬據險拒之隆以山狹隘乃作扁箱車地廣則為鹿角車營路狹則為木屋施於車上轉戰而前行千餘里殺傷甚衆遂平涼州劉裕伐南燕以車四千乘為左右翼方軌徐進與燕兵戰於臨朐敗之裕伐秦假道於魏魏遣軍徼之裕遣白直隊主丁旿帥仗士七百人車百乘渡北岸去水百餘步為却月陳兩端抱河車置七仗士事畢使竪一白旄魏人不解其意皆未動裕先命寧朔將軍朱超石戒嚴白旄既舉超石率二千人馳往赴之齎大弩百張一車益二十人設彭排於轅上魏人圍之超石以大鎚及矟千餘張禦之魏師奔潰魏太武真君四年北征柔然騎十萬車十五萬兩旌旗千里遂度大漠柔然怖畏不復敢南向隋遣諸將與突厥戰皆戎車步騎相參與鹿角為方陳唐髙宗調露元年突厥阿史德溫傳反以裴行儉為定襄大總管統兵討之先時饋糧數為虜鈔軍餒死行儉乃詐為糧車三百乘伏壯士五輩齎陌刀徑弩以羸兵挽進又伏精兵衝其後虜果掠車羸兵走險賊驅就水草解鞍牧馬方取糧車中而壯士突出伏兵至殺獲幾盡自是糧車無敢近者元宗時哥舒翰節度隴右造戰車蒙以狻猊肅宗至德初李光弼守太原史思明來攻光弼徹民屋為櫑石車車二百人挽之石所及輒數十人賊死傷十二房琯將兵復兩京至便橋陳濤斜琯效春秋時戰法以牛車二千乘馬步夾之既戰賊乘風譟牛悉髀栗賊縱火焚之人畜大亂官軍死傷者四萬人馬燧為河東節度使為戰車冒以狻猊象列戟於後行以載兵止則為陳遇險則制衝冒討田悅推火車焚其將楊朝光柵進擊大破之宋真宗咸平四年吳淑請復古車戰之法曰衛青李陵劉裕馬隆皆以車而勝近符彥卿破敵陽城亦拒馬為行寨夫胸奴所長者騎兵也茍非連車以制之則何以禦其奔突哉故用車戰為便其制取常用車接其衝軛駕以牛車上置槍以刃外向列士卒於車外賊至射之乃出騎兵擊之此制敵要術也戰之用車一陳之鎧甲也故可以行止為營陳賊至則斂兵附車以拒之賊退則乘勝出兵以擊之出則藉此為所居之地入則以此為所居之宅故人心有依不懼敵騎之陵突也景德初契丹入寇大將李德隆以澶淵不足守命士卒掘濠塹以大車數十乘重壘環之步騎處中戎馬數萬來攻其營禦之遁去仁宗至和二年韓琦言郭固就民車約古制為兵車臨陳禦敵緩急易集其車前鋭後方上置七槍為前後二拒此馬燧戰車載兵甲止為營陳也又以民車之箱增為重箱髙四尺四寸用革挽之吳起所謂革兵掩戶挽輪籠轂是也臣以為可用於平川之地臨陳以折奔衝下營以為寨腳今令固自賫車式進呈試之以固為衛尉寺丞范仲淹上議攻云延安之西慶州之東有賊界百餘里侵入漢地唐馬燧造戰車行載兵甲止為營陳此路山坡大車難進當用小車二十兩銀絹錢二十萬賞有功將吏神宗時以北人將入境遣中貴人取兩河民車為備民大驚擾上問沈括曰卿知籍車之事乎括曰車戰之利見於歷世但古人所謂輕車者兵車也今之民車重大以牛挽之日不能行三十里少蒙雨雪跬步不進故俗謂之太平車恐兵間不可用耳上喜曰無人如此語朕遂罷籍車之令徽宗時涇原邢恕建兵車之議下令創造買牛以駕凡數千乘已而蔡碩又請河北置五十將兵器仍為兵車萬乘蔡京主其説行之姦吏旁緣即日散行郡縣掠民緡錢矣崇寧三年河北陜西都轉運司皆奏兵車用許彥圭所定式則車大而費財實多依往年二十將兵車式輕小易用復可省費詔卒用許彥圭式行下時熙河轉運副使李復先奏曰古者師行固嘗用車然井田法廢已久且今之用兵與古不同古者兵不妄加征戰有禮不為詭遇動皆有法又多在平原易野故車可以行而敵人不敢輕犯今之用兵盡在極邊下寨駐車各以保險為利車不能上又戰陳之交一進一退車不能及或為敵所襲逐車又不及收臣於戎馬間觀之屢矣乃至糧糗衣服器械有不能為用者而况於車乎臣聞此議出於許彥圭彥圭因姚麟上其説為身謀朝廷但以麟邊人熟邊事遂然之而不知彥圭輕妄麟立私恩以誤國計昔唐房琯用車戰大敗於陳濤斜當時在畿邑平地尚如此况今欲用於峻坂溝谷之間乎且戰車此常車濶六七寸運不合轍昨東來者牽挽不行致兵夫典賣衣物自賃牛具終日而進六七里率多逃亡戰車棄於道路未造則有配買物材雇差夫匠之擾既成又艱於運致然則其為諸路之患其費不知其幾千萬矣彥圭茍望一官之進上欺朝廷下害百姓此而不誅何以懲後臣今乞便罷造已造者不復運來以寬民力其後彥圭卒得罪欽宗靖康末樞密將官劉浩在河北募兵創造戰車其法有左右角前後拒各用卒二十五人每車計百人髙宗建炎初宗澤造戰車法運車者十有一執器械輔車者四十有四每車計五十五人李綱造戰車法兩竿雙輪上設皮籬以捍矢石下施鐵裙以衛人足旁施鐵索聨可為營四人推竿以運車一人登車以發矢二十人執軍器發車之兩旁每車用二十五人其法竟不及施蓋自渡江後東南沮洳之區險隘之地不以車為主也髙宗紹興二年布衣王大智獻車式上命為樞密計議官明年車成而不可用罷之上謂輔臣曰車制雖古然用各有宜况其物料多南方所無且古人用車亦或不利如驂絓而止之類蓋用車於戰陳間亦非利器也席益曰古人之戰彼此皆用車至於彼徒我車已有侵軼之慮而後人每以車敵騎其敗固宜房琯陳濤斜是也孝宗隆興初宰臣進呈陳敏軍中措置教習車陳陳康伯曰數年前陳敏增制造行下三衙相度有車樣陳圖見在上曰車戰古法平原曠野可以備馳突耳亦卒不用寧宗開禧初中郎將厲仲方者為歷陽守嘗造戰車九牛弩未及用而罷去周虎繼之或謂虎用其戰車敗敵於清水鎮不知其詳何如也舟師水戰魯襄公二十四年楚子為舟師以伐吳舟師水軍不為軍政不設賞罰之差無功而還昭公十七年吳伐楚陽丐為令尹戰於長岸大敗吳師獲其乘舟艅艎舟名使隨人後至者守之環之及泉環周也盈其隧炭陳以待命隧出入道吳公子光請於衆曰喪先王之乘舟豈唯光之罪衆亦有焉請藉取之以救死衆許之使長鬛者三人長髭鬛與吳人異形詐為楚人潛伏於舟側曰我呼艅艎則對師夜從之三呼皆迭對楚人殺之楚師亂吳人大敗之取艅艎以歸昭公二十四年楚子為舟師以略吳疆沈尹戍曰此行也楚必亡邑不撫民而勞之吳不動而速之速召也吳踵楚躡楚踵迹而疆場無備邑能無亡乎越大夫胥犴勞王於豫章之汭汭水曲越公子倉歸王乘舟歸遣也倉及夀夢帥師從王夀夢越大夫王及圉陽而還圉陽楚地吳人踵楚而邉人不備遂滅巢及鍾離而還定公四年蔡侯吳子唐侯伐楚舍舟於淮汭吳乘舟從淮水過蔡而舍之舍置也自豫章與楚夾漢豫章漢東江北地名左司馬戍謂子常曰子沿漢而與之上下沿漢上下遮勿令渡我悉方城外以毁其舟以方城外人毁吳所舍舟還塞大隧直轅𡨕厄三者漢東之隘道子濟漢而伐之我自後擊之必大敗之既謀而行武城黑謂子常黑武城大夫曰吳用木也我用革也用重器不可久也不如速戰史皇謂子常楚人惡子而好司馬若司馬毁吳舟於淮塞城口而入城口三隘道之總名是獨克吳也子必速戰不然不免乃濟漢而陳自小别至於大别二别在江夏界三戰皆敗哀公十年吳城𨝍溝通江淮於𨝍江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵韓江是漢武帝時東越數反覆朱買臣因言東越王居保泉山一人守險千人不得上今聞越王更徙南行去泉山五百里居大澤中今發兵浮海直指泉山陳舟列兵席卷南行可破滅也上乃拜買臣為會稽太守詔買臣到郡治樓船備糧食水戰具歲餘買臣受詔與韓説俱擊破東越元鼎五年南粵相國吕嘉反詔粵人及江淮以南樓船十萬師往討之衛尉路博德為伏波將軍出桂陽下湟水主爵都尉楊僕為樓船將軍出豫章下橫浦故歸義粵侯二人為戈船下瀨將軍出零陵或下離水或抵蒼梧使馳義侯因巴蜀罪人發夜郎兵下牂牁江咸會番禺武帝時有樓船有戈船張晏曰越人於水中負大舟又有蛟龍之害故置戈於船下因以為名臣瓚曰伍子胥書有戈船以載干戈因謂之戈船也有下瀨瀨湍也吳越謂之瀨中國謂之磧伍子胥書有下瀨船有橫海江淮青齊皆有樓船軍擊南粵救東甌則用江淮會稽樓船滅朝鮮則用齊樓船又開昆明池以習水戰元狩三年發謫吏穿昆明池臣瓚曰西南夷傳有越雋昆明國有滇池方三百里漢使求身毒國而為昆明所閉今欲伐之故作昆明池象之以習水戰在長安西南周回四十里後漢光武建武九年公孫述遣其將田戎等據荆門虎牙橫江水起浮橋開樓立攢柱以絶水道結營跨山以塞陸路距漢兵岑彭屯津鄉數攻田戎不克十一年帝遣吳漢率誅虜將軍劉隆等三將發荆州兵凡六萬餘人騎五千匹與彭會荆門彭裝戰船數十艘吳漢以諸郡棹卒多費糧榖欲罷之彭以蜀兵盛不可遣上書言狀帝報彭曰大司馬習用步騎不曉水戰荆門之事一由征南公為重而已彭令軍中募攻浮橋偏將軍魯竒應募而前時東風狂急竒船逆流而上直衝浮橋而攢柱有反把鉤竒船不得去竒等乘勢殊死戰因飛炬焚之風怒火盛橋樓崩燒彭悉軍順風並進所向無前蜀兵大亂溺死者數千人獻帝建安十三年曹操南擊劉表取荆州追劉備於當陽備遣諸葛亮求救於孫權操遺權書曰今治水軍八十萬衆方與將軍會獵於吳長史張昭曰將軍大勢可以拒操者長江也今操得荆州奄有其地劉表治水軍蒙衝鬭艦乃以千數操悉浮以沿江此為長江之險已與我共之矣不如迎之周瑜曰今北土未平而操舍鞍馬仗舟楫與吳越爭衡又今盛寒馬無藁草驅中國士衆逺涉江湖之間不習水土必生疾病此數者用兵之患而操皆犯之瑜請得精兵數萬人保為將軍破之權從之遣兵三萬人令瑜拒操與操遇於赤壁時操軍已有疾疫初一交戰不利引次江北瑜部將黃蓋曰今寇衆我寡難與持久操軍方進船艦首尾相接可燒而赱也乃取蒙衝鬬艦十艘載燥荻枯柴灌油其中褁以帷幕上建旌旗豫備走舸繫於其尾先以書遺操詐云欲降時東南風急蓋以十艦最著前中江舉帆餘船以次俱進操軍吏士皆出立營觀指言蓋降去北軍二里餘同時發火火烈風猛船往如箭燒盡北船延及岸上營落頃之煙熖障天人馬燒溺死者甚衆瑜等率輕鋭繼其後靁鼓大震北軍大壞操引軍從華容道步走引軍北敗二十四年孫權使吕蒙襲關羽於江陵蒙至潯陽盡伏其精兵􅖻􅑳中使白衣搖櫓作商賈人服晝夜兼行羽所置江邊屯候盡收縳之故羽不聞知至江陵羽將士悉以城降晉武帝謀伐吳詔王濬修舟艦乃作大船連舫百二十步受二千餘人以木為城起樓櫓開四出門其上皆得馳馬往來又畫鷁首怪獸於船首以懼江神舟楫之盛自古未有時造船木柿蔽江而下吳建平太守吾彥取以白吳主曰晉必有攻吳之計宜增建平兵皓不從太康元年王濬伐吳攻丹陽克之吳人於江磧要害之處並以鐵鎖橫截之又作鐵錐長丈餘暗置江中以逆距船濬乃作大筏數十方百餘步縳草為人被甲持仗令善水者以筏先行遇鐵錐輒著筏而去又作大炬長十文大數十圍灌以麻油在船前遇鎖然炬燒之須臾融液斷絶於是船無所礙順流徑造三山孫皓遣遊擊將軍張象率舟師萬人禦濬象衆望旗而降濬兵甲滿江旌旗燭天吳人大懼安帝義熙六年盧循因劉裕北伐乘虗襲建康率衆數萬方艦而下裕引兵南還拒之出輕利鬬艦躬提幡鼓衆軍騰踴爭先軍中多萬鈞神弩所至摧陷裕自中流􅕚之因風水之勢賊艦悉泊西岸岸上軍先備火萬具悉焚之賊衆大敗太尉劉裕率師伐秦王鎮惡請率水軍自河入渭直至渭橋鎮惡所乘皆蒙衝小艦行船者悉在艦內泝渭而進艦外不見有行船人北土素無舟楫莫不驚異以為神宋文帝時垣護之從王元謨攻魏滑臺護之以百舸為前鋒元謨既敗魏軍悉牽元謨水軍大艚連以鐵鎖三重斷河以絶護之還路河水迅急護之中流而下每至鐡鎖以長柯斧斷之魏人不能禁惟失一舸餘並全梁韋睿拒魏軍魏人先於邵陽洲兩岸為兩橋立柵數百步跨淮通道睿裝大艦使梁郡太守馮道根等為水軍會淮水暴漲睿即遣之鬬艦競發皆臨魏壘以小船載草灌之以膏焚其橋風怒火盛敢死之士拔柵斫橋水又漂疾倐忽之間橋柵盡壞道根等身自搏戰軍人奮呼無不一當百魏人大潰孝元帝承聖元年湘東王繹遣王僧辨等討侯景景使侯子鑒拒之使人戒子鑒曰西人善水戰勿與爭鋒若步騎一交必當可破汝但結營岸上引船入浦以待之子鑒乃捨舟登岸閉營不出僧辨等停軍蕪湖十餘日景大喜以為西師畏之乃復命子鑒為水戰之備僧辨至姑熟子鑒帥步騎萬餘人度洲於岸挑戰又以鵃千艘載戰士僧辨麾細船皆令退縮留大艦夾泊兩岸子鑒之衆謂水軍欲退爭出趨之大艦斷其歸路鼓譟大呼合戰江中景兵大敗陳武帝時徐嗣徽引齊人渡江據蕪湖帝詔文育還都嗣徽等乃列艦於青墩至於七磯以斷文育歸路及夕文育鼓譟而發嗣徽等不能制而文育反攻之嗣徽驍將鮑砰獨以小艦殿文育乘單舴艋跳入砰艦斬砰仍牽其艦而還賊衆大駭梁王琳引合肥巢湖之衆舳艫相次而下陳侯瑱率軍進屯檻洲明日合戰琳軍少却及夕東北風吹其舟艦並壞夜中有流星墜於賊營及旦風靜琳入浦以鹿角繞岸不敢復出時西魏將史寧躡其上流瑱聞之知琳不能持久收軍却據湖浦以待其斃及史寧至圍郢州琳恐衆潰乃率船東下去蕪湖十里而泊明日齊人遣兵助琳瑱令軍士晨炊蓐食頓蕪湖尾以待之將戰有微風至自東南衆軍施拍縱火定州刺史章昭逺采平虜大艦中江而進琳軍大敗脫走以免者十二三歐陽紇據嶺南反陳將章昭逹督衆軍討之紇乃出頓涯口多聚沙石盛以竹籠置於水柵之外用遏船艦昭逹居其上流裝艦造拍以臨賊柵又令其軍人銜刀潛行水中斫竹籠籠篾皆解因縱大艦隨流突之賊衆大敗隋文帝將伐陳命楊素造戰艦大艦名五牙上起樓五層髙百餘尺左右前後置六拍竿並髙五十尺容戰士八百人次曰黃龍置兵百人自餘平乘舴艋各有等差開皇八年伐陳素親帥黃龍數千艘銜枚而下舟艦被江旌甲曜日素坐平乘大船容貌雄偉陳人望之皆懼曰清河公即江神也唐趙郡王孝恭及李靖擊蕭銑帥戰艦二千餘艘東下大破銑軍乘勝直抵江陵入其外郭又攻水城拔之大獲舟艦靖命盡散之江中諸將皆曰破敵所獲當藉其用奈何棄之靖曰蕭銑之地南出嶺表東距洞庭吾懸軍深入若攻城而下援兵見之必謂江陵已破未敢輕進往來窺伺動踰旬月吾取之必矣銑援兵見舟艦果疑不進靖進圍之銑內外阻絶乃降梁王彥章攻晉晉人以鐵鎖斷德勝口彥章隂遣人具舟命甲士六百人皆持巨斧又令舟載鞴炭燒斷之因以巨斧斬浮橋遂破南城吳越王錢鏐大舉伐吳以錢傅瓘為諸軍都指揮使帥戰艦五百艘自東洲以進吳遣彭彥章陳汾拒之傅瓘命每船皆載灰豆及沙戰於狼山江吳船乘風而進傅瓘引舟避之既過自後隨之吳回船與戰傅瓘使順風揚灰吳人不能開目及船舷相接傅瓘使散沙於已船而散豆於吳船豆為戰血所漬吳人踐之皆僵仆傅瓘因縱火焚吳船吳兵大敗梁賀瓌攻德勝南城以竹笮聫艨艟十餘艘蒙以牛革設睥睨戰格如城狀橫於河流以斷晉之救兵使不得度晉王引兵救之陳於北岸不得進遣善遊者入南城守將言矢石將盡陷在頃刻晉王募能破艨艟者親將王建及應募選效節敢死士得三百人被鎧操斧帥之乘舟而進將至艨艟流矢雨集建及使操斧者入艨艟間斧其竹笮又以木􅑥載新沃油然火於上流縱之隨以巨艦實甲士鼓譟攻之艨艟既斷隨流而下梁兵焚溺殆半周顯德三年攻唐之壽州唐人大發樓船蔽川而下泊於濠泗周師頻不利唐將林仁肇水陸並進又以船載薪蒸乘風縱火將焚浮梁周將張永德使習水者候其船下縻以鐵鎖急引輕船擊之唐人既不得近溺者甚衆奪艦數十四年帝還自壽春以南方水軍敏鋭乃於京城汴水側開地造船艦數百艘招誘南卒教習北人水戰數月之後縱橫出沒殆勝唐兵命右驍衛大將軍王環將水軍數千自閔河沿頴入淮唐人見之大驚帝乃將騎循北岸諸將循南岸追唐兵水軍自中流而下唐兵戰溺死及降者殆四萬人獲戰船糧仗十萬數遂克夀州帝自攻濠州王審琦拔其水寨唐人屯戰船數百於城北植巨木於淮水以限周兵帝命水軍攻之拔其木焚戰艦七十餘艘斬首二千餘級又聞唐有戰船數百艘在渙水東欲救濠州將兵夜發水陸擊之大破唐兵於渦口克泗州又聞唐戰船數百艘泊渦口上自將親軍自灌北進命太祖皇帝自淮南進諸軍以水軍自中流進兵迫唐兵乘勝爭進且戰且行金鼓聲聞數十里追至楚州西北大破之所獲戰船燒沈之餘得三百餘艘士卒殺溺之餘得七千餘人唐之戰船在淮上者於是盡矣五年上欲引戰艦自淮入江阻北神堰不得渡欲鑿楚州西北濠水以通其道遣使行視還言地形不便計功甚多上自往視之授以規畫發楚州民夫浚之旬日而成用功甚省巨艦數百艘皆逹於江唐人大驚以為神宋太祖皇帝乾德初鑿大池於京城之南引蔡水以注之造樓船百艘選精兵號水虎捷習戰池中開寶六年詔以新池為講武池七年將有事於江南是嵗凡五臨幸觀習水戰九年四月幸金明池習水戰上御水心殿命從臣列坐以觀戰艦角勝鼓譟以進往來馳突為回旋擊刺之狀顧謂侍臣曰兵棹之技南方之事也今已平定固不復用但時習之不忘武功耳訖真宗朝嵗習不輟髙宗建炎元年右僕射李綱言當於沿河沿淮沿江帥府置水兵二軍要郡别置水兵一軍須要郡别置中軍招集善波操舟便利之人擬立軍號曰凌波樓船軍從之四年夏四月烏珠入境自明州回歸韓世忠先屯焦山以邀其歸路烏珠遣人約日會戰世忠伏兵擊之俘獲甚衆及其舟千餘艘敵終不得濟復使致詞願還所掠益以名馬求假道世忠不從與相持於黃天蕩世忠以海艦進泊金山下將戰世忠預命工煆鐵相連為長綆貫一大鈎以授士之驍捷者平旦敵以舟噪而前世忠分海舟為兩道出其背每縋綆則曵一舟而入虜竟不得濟乃求與世忠語世忠酬答如響時於所佩金鳳瓶傳酒縱飲示之烏珠見世忠整暇色益沮乃求假道甚恭世忠曰是不難但迎還兩宫復舊疆土歸報明主足相全也兀术既為世忠所厄欲自建康謀北歸不得去或教以蘆場地鑿大渠二十餘里上接江口在世忠之上遂傍治城西南隅鑿渠一夜渠成次早出舟世忠大驚金人悉趨建康世忠尾擊敗之敵終不得濟乃揭榜募人獻所以破海舟之策有教其於舟中載土以平版鋪之穴船板以擢槳侯風息則出江有風則勿出海舟無風不可動也以火箭射其篛蓬則不攻自破矣一夜造火箭成是日引舟出江其疾如飛天霽無風海舟皆不能動以火箭射海舟篛蓬世忠軍亂焚溺而死者不可勝數世忠與餘軍至瓜步棄舟而陸奔還鎮江紹興三十一年敵亮渝盟入侵李寶以舟師禦之至東海縣時敵兵已圍海州寶麾兵登岸敵驚出意外亟引去於是魏勝出城迎寶寶遣辨士四人招納降附時山東豪傑王世修輩皆各以義旗聚衆爭應為援寶與子公佑引舟師至密之膠西石臼島而敵舟已出海口泊唐島相距止一山候風即南不知王師之猝至也寶伺敵未覺遣其將曺洋黃端禱於石臼神祈風助順忽風自南來衆喜爭奮引帆握刃俄頃過山薄敵鼓聲震蕩虜驚失措敵帆皆以錦纈為之彌亘數里忽為波濤捲聚一隅窘促搖兀無復行次寶命以火箭射之煙熖隨發延燒數百火不及者猶欲前拒寶命健士躍登其舟以短兵擊刺殪之舟中其餘簽軍皆中原舊民脫甲而降者三千餘人獲酋首完顔鄭嘉努等六人斬之惟統軍韓保衡未發舟不可獲旋聞自經死得獻議造人倪詢等皆淮浙姦民且為敵鄉導者又獲其統軍印與偽詔文書器甲糧斛以萬計寶欲乘勝以進而聞敵亮已濟淮遂旋師駐東海視緩急為援遣小舟奏捷既至上命降詔奬之除寶靖海節度沿海制置使十一月亮親統細軍駐和州之雞籠山臨江築壇刑馬祭天必欲由采石而渡朝廷詔王權赴行在以李顯忠代之命虞允文趣顯忠交權兵時顯忠未至權聼留水軍舟船咸在允文督軍士決戰於是統制張振王琪等列江岸以待之而以海鰍船載精兵駐中流迎敵布陳甫畢亮以小紅旗麾舟絶江而來諸將盡伏山崦敵未之覺一見大驚欲退不可敵舟皆旋為之底極不平舟中之人皆不能施盡為官軍所殺明日允文又命戚新引舟師直楊林河口駐舟江心齊力射敵敵見舟無歸路於下流縱火自焚官軍亦於上流焚其舟凡百八十敵引去誠齊楊氏海鰌賦後序曰采石戰艦曰蒙衝大而雄曰海鰌小而駛其上為城堞屋壁皆堊之紹興辛巳敵亮至江北掠民船指麾其衆欲濟我舟伏於七寶山後令曰旗舉則出江先使一騎偃旗於山之頂伺其半濟忽山上卓立一旗舟師自山下河中兩旁突出大江人在舟中踏車以行船但見船行如飛而不見有人敵以為紙船也舟中忽發一霹靂炮蓋以紙為之而實之以石灰硫黃炮自空而下落水中硫黃得水而火作自水跳出其聲如雷紙裂而石灰散為煙霧眯其人馬之目人物不相見吾舟馳之壓敵舟人馬皆溺大敗之云孝宗隆興元年九月詔諸州召募水手於手上刺某州水軍字以革冒代之敝四年樞密院言潮州守臣傅自修欲於本軍禁軍闕額人數內撥三指揮二百人専防海道以諳識水勢人充建炎以來朝野雜記平江許浦水軍本明州定海水軍也舊𨽻沿海制置司防扞海道乾道中改𨽻殿前司以三千人為額五年冬又改為御前水軍八年春併歸許浦鎮置副都統制統之淳熙四年冬詔以七千人為額五年秋又增額五百人江隂水軍舊自泉州調發乾道三年陳正獻在樞管以其勞費奏留屯二千人於江隂軍而沿海制置司又别屯千人逮淳熙末纍增至四千人分三將此外左翼軍亦有水軍三千人摧鋒軍二千人福州延祥寨千人而鎮江建康府池江鄂州御前諸帥亦各有水軍多者數千人少者千餘人其後殿司又有澉浦水軍而淮隂靖安唐灣采石諸水軍則皆冠以御前之號文獻通考卷一百五十八
