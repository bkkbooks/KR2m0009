body:
  text: 文獻通考卷二百三十一鄱陽馬端臨貴與著經籍考五十八集别集唐太宗集三卷陳氏曰唐太宗皇帝本集四十卷館閣書目但有詩一卷六十九首而已今此本第一卷賦四篇詩六十五首後二卷為碑銘書詔之屬而訛謬頗多世所𫝊太宗之文見於石刻者如帝京篇秋日效庾信體詩三蔵聖教序皆不在又晉書紀傳論稱制曰者四皆太宗御製也今獨載宣武二紀論而陸機王羲之𫝊論不預焉宣紀論復重出其他亦多有非太宗文雜厠其中者非善本也東臯子五卷陳氏曰唐太樂丞太原王績無功撰文中子王通仲淹之弟也仕隋為正字嗜酒簡放不樂仕進晩以太樂吏焦革善釀求為其丞不問流品亦阮嗣宗歩兵之意也革死乃歸於所居立杜康祠為文祭之以焦革配自號東臯子其友吕才鳩訪遺文編成五卷為之序有醉鄉記𫝊於世其後陸淳又為之序周氏渉筆曰舊𫝊四聲自齊梁至沈宋始定為唐律然沈宋體製時帶徐庾未若王績剪裁鍜鍊曲盡清元真開迹唐詩也如云牧人驅犢返獵馬帶禽歸琴曲惟留古書名半是經九月九日一篇野人迷節候端坐隔塵埃忽見黄花吐方知素節回映巖千段發臨浦萬株開香氣徒盈把無人送酒来盖淵明古體蟠屈入八句中渾然天成又唐末諸家所不能也無功放逸傲世而詩句如此豈其真得於自然乎獨坐云問君尊酒外獨坐更何須有客談名理無人索地租三男婚令族五女嫁賢夫百年隨分了未羡陟方壺無功本席世家之盛師友之門恩誼暖熱生理不干其心因得以一意世外不屈節求人所謂福慧雙入者邪鼂氏曰隋大業中舉孝弟亷潔授六合丞棄官耕東臯自號東臯子唐書以為𨼆逸集有吕才序稱其幼岐嶷年十五謁楊素占對英辯一座盡傾以為神仙童子薛道衡見其登龍門憶禹賦歎曰今之庾信也且載其卜筮之驗者數事楊盈川集二十卷鼂氏曰唐楊烱也華隂人顯慶六年舉神童授校書郎終婺州盈川令烱博學善屬文與王勃盧照隣駱賓王以文辭齊名海内稱王楊盧駱四才子亦曰四傑烱自謂吾媿在盧前耻居王後張説曰盈川文如縣河酌之不竭耻王後信愧盧前謙也集本三十卷今多亡逸王勃集二十卷鼂氏曰唐王勃子安也通之孫麟徳初劉祥道薦其才對策髙等授朝散郎沛王召署府修撰以戲為諸王鬬雞檄髙宗怒斥出府父為交趾令勃往省溺海死勃屬文初不精思先磨墨數升酌飲引被覆面臥及寤援筆成篇不易一字時人謂之腹藁有劉允濟序盧照隣幽憂子集十卷鼂氏曰唐盧照隣昇之也范陽人調新都尉病去官𨼆具茨山下手足攣廢疾久訣親戚自沈潁水照隣自以當髙宗時尚吏已獨儒武后尚法已獨黄老后封嵩山聘賢士已廢著五悲文今在集中自號幽憂子駱賓王集十卷鼂氏曰唐駱賓王也義烏人武后時數言事得罪貶臨海丞不得志棄官去文明中徐敬業亂署府佐為敬業傳檄天下斥武后罪后讀之矍然及敗亡不知所之後宋之問逢之於靈𨼆寺已祝髪為浮屠矣賓王七嵗能屬文妙於五言詩中宗詔求其文得百餘篇命郗雲卿次序之陳氏曰其首卷有魯國郗雲卿序言賔王光宅中廣陵亂伏誅莫有収拾其文者後有勅捜訪又有四五本卷數亦同而次序先後皆異序文視前加詳而云廣陵起義不㨗而遁本𫝊亦言敗而亡命不知所終與蜀序合朝野僉載云駱賓王為文好以數對如秦地重關一百二漢家離宫三十六之類時號算博士容齊洪氏隨筆曰王勃等四子之文皆精切有本原其用駢儷作記序碑碣盖一時體格如此而後来頗議之杜詩云王楊盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬古流正謂此耳身名俱滅以責輕薄子江河萬古流指四子也韓公滕王閣記云江南多㳺觀之美而滕王閣獨為第一及得三王所為序賦記等壯其文辭注謂王勃作㳺閣序又云中丞命為記竊喜載名其上詞列三王之次有榮耀焉則韓之所以推勃亦為不淺矣勃之文今存者二十卷云蘇許公集二十卷鼂氏曰唐蘇頲廷石也武功人調露三年進士賢良方正異等除左司禦府胄曹元宗時中書舍人知制誥開元四年同紫微黄門平章事頲幼敏悟一覽五千言輙覆景龍後與張説以文章顯時號燕許李徳裕謂近世詔誥惟頲序事外為文章韓休為序集本四十六卷今亡其半矣陳子昻集十卷鼂氏曰唐陳子昻伯玉也梓州人文明初舉進士上書召見累擢拾遺新唐書稱子昻聖厯初解官歸養父喪廬墓縣令段簡貪暴脅取其賂不厭逮捕死獄中沈下賢獨云為武承嗣所殺未知孰是子昻少以豪侠使氣及冠折節為學精究墳籍耽愛黄老易象尤善屬文唐興文章承徐庾餘風天下祖尚至是始變雅正故雖無風節而唐之名人無不推之柳儀曹曰張説以著述之餘攻比興而莫能極張九齡以比興之暇攻著述而不克備唐興以来稱是選而不怍者子昻而已陳氏曰黄門侍郎盧藏用為序又有别𫝊繫之卷末子昻死時才四十二為神鳳頌明堂議納忠貢諛于孽后之朝大節不足言然其詩文在唐初實首起八代之衰者韓退之薦士詩言國朝盛文章子昻始髙蹈非虛語也盧序亦簡古清壯非唐初文人可及後村劉氏曰唐初王楊沈宋擅名然不脱齊梁之體獨陳拾遺首倡髙雅冲淡之音一掃六代之纎弱超于黄初建安矣太白韋柳繼出皆自子昻發之如世人拘目見酣酒笑丹經崑崙有瑤樹安得采其英如林居病時夂水木澹孤清閑卧觀物化悠悠念羣生青春始萌達朱火已滿盈徂落方自此慮歎何時平如務光讓天下商賈競刀錐已已行采芝萬世同一時如吾愛鬼谷子青谿無垢氛囊括經世道遺身在白雲舒可彌宇宙卷之不盈分豈徒山木夀空與麋鹿羣如臨岐泣世道天命良悠悠昔日殷王子玉馬遂朝周寳鼎淪伊榖瑤臺成古丘西山傷遺老東陵有故侯皆蟬蜕翰墨畦逕讀之使人有眼空四海神逰八極之興按陳拾遺詩語髙妙絶出齊梁誠如先儒之論至其他文則不脱偶儷卑弱之體未見其有以異於王楊沈宋也然韓吏部柳儀曹盛有推許韓言國朝盛文章子昻始高蹈柳言備比興著述二者而不怍則不特稱其詩而已二公非輕以文許人者此論所未諭本𫝊載其興明堂建太學等疏其言雖美而陳之於牝朝則非所宜史贊所謂薦珪璧於房闥以脂澤汙澷之信矣宋之問考功集十卷鼂氏曰唐宋之問延清也汾州人武后召與楊烱分直習藝館諂事太平公主為考功員外郎睿宗初貶欽州賜死自魏建安訖江左詩律屢變至沈約庾信以音韻相婉附屬對精密及之問佺期又加靡麗回忌聲病約句準篇如錦繡成文學者宗之號沈宋徐堅嘗論之問之文如良金美玉無施不可其為當時所重如此沈佺期集五卷鼂氏曰唐沈佺期雲卿也相州人及進士第由協律郎累遷𢎞文館直學士嘗侍中宗宴舞回波為弄辭以悦帝還賜牙緋陳氏曰自沈約以来始以音韻對偶為詩至佺期之問益加靡麗學者號沈宋唐律盖始於此二人皆以附二張進之問尤無行石林葉氏曰黄大臨云魯直晚喜沈佺期宋之問詩以為與杜審言同時老杜五言不惟出其家法亦參得二人之妙也責宜州並不以書同行箧中惟有佺期集一部然魯直文字中未嘗及當是不示人以朴也吾嘗問大臨詩中所甚愛者舉海外逢寒食春来不見餳洛陽新甲子何日是清明一篇以為二十字中婉而有味如人序百許言者然今歴論節氣有清明無寒食流俗但以清明前為寒食既不知清明安能知寒食此不可解也杜審言集十卷鼂氏曰杜審言必簡也襄陽人預之後裔擢進士恃才傲世嘗對武后賦歡喜詩后歎重其文與李嶠崔融蘇味道為文章四友集有詩四十餘篇而已張燕公集三十卷鼂氏曰唐張説道濟也洛陽人永昌元年賢良方正䇿第一累遷鳳閣舍人睿宗時兵部侍郎平章事開元十八年終左丞相燕國公説為文精壯長於碑志朝廷大述作多出其手嘗典集賢圖書之任論撰國史晚謫岳州詩益悽惋人謂得江山助陳氏曰説與蘇頲號燕許大手筆家未有蘇許公集李嶠集一卷鼂氏曰李嶠巨山也贊皇人擢進士第制䇿甲科為監察御史武后時同鳳閣鸞臺平章事嶠富才思前與王勃楊烱中與崔融蘇味道齊名晚諸人沒為文章宿老學者取法集本六十卷未見今所録一百二十詠而已或題曰單題詩有張方注張九齡曲江集二十卷鼂氏曰張九齡子夀也曲江人長安二年進士調校書郎以道侔伊呂科䇿髙等為左拾遺開元中為中書令卒諡文獻九齡風度醖籍幼善屬文元宗朝知制誥雅為帝知為相諤諤有大臣節及貶荆州惟文史自娛朝廷許其勝流徐堅論九齡之文如輕縑素練實濟時用而窘邉幅柳宗元以九齡兼攻詩文但不能究其極爾集後有姚子彦所撰行狀吕温撰真讚鄭宗珍撰諡議徐浩撰墓碑及贈司徒勅詞陳氏曰曲江本有元祐中郡人鄧開序自言得其文於公十世孫蒼梧守唐輔而刋之卷末行狀神道碑諡議蜀本無之王右丞集十卷鼂氏曰唐王維摩詰也太原人開元九年進士終尚書右丞維幼能屬文工草𨽻善畫名盛安禄山反陷賊中賊大宴凝碧池賦詩痛悼詩聞行在後得免死代宗訪維文章於弟縉裒集十卷上之李肇記維漠漠水田飛白鷺隂隂夏木囀黄鸝以為竊李嘉祐者今嘉祐集無之豈肇厚誣乎陳氏曰建昌本與蜀本次序皆不同大抵蜀刻唐六十家集多異於他處本而此集編次尤無倫維詩清逸追逼陶謝輞川别墅圖畫摹傳至今嘗與裴廸同賦各二十絶句集中又有與廸書畧曰夜登華子岡􅜁水淪漣與月上下寒山逺火明滅林外深巷寒犬吠聲如豹村墟夜舂復與疎鐘相間此時獨坐僮僕静嘿毎思曩昔携手賦詩當待春中卉木蔓發輕鯈出水白鷗矯翼露濕青臯麦雉朝雊倘能從我逰乎余每讀之使人有飄然獨往之興廸詩亦佳然他無聞於世盖亦髙人也􅜁川在藍田縣西南二十里本宋之問别圃維後表為清源寺終墓其西張鷟龍筋鳳膸判十卷鼂氏曰唐張鷟字文成辭章藻麗嘗八中制科此乃其書判也凡一百首陳氏曰鷟調露中進士事迹見張薦𫝊薦之祖也唐以書判㧞萃科選士此集凡百題自省臺寺監百司下及州縣類事屬辭盖待選預備之具也自號浮休子洪氏容齋隨筆曰唐史稱張鷟早慧絶倫以文章瑞朝廷屬文下筆輙成今其書𫝊於世者朝野僉載龍筋鳳膸判是也僉載紀事𤨏尾擿裂且多媟語百判純是當時文格全類俳體但知堆垜故事而於蔽罪議法處不能深切殆是無一篇可讀一聨可采如樂天甲乙判則讀之愈多使人不厭也儲光羲集五卷鼂氏曰唐儲光羲也魯人登開元十四年進士第嘗為監察御史後從安禄山偽署賊平貶死王昌齡詩六卷鼂氏曰唐王昌齡少伯也江寧人開元十五年進士為祕書郎又中宏詞不護細行貶龍標尉以世亂歸鄉里為刺史閭丘曉所殺昌齡工詩縝密而思清時謂王江寧云常建詩一卷鼂氏曰唐常建也開元十五年進士歐陽永叔嘗愛竹徑通幽處禪房花木深之句乃建詩也劉長卿集鼂氏曰唐劉長卿字文房開元末第進士至徳中監察御史以檢校祠部員外為轉運使判官知淮西岳鄂轉運留後觀察呉仲孺誣奏貶潘州南巴縣尉㑹有為之辨者除睦州司馬終隨州刺史長卿剛而犯上故兩逢斥廢詩雖窘於才而能鍜鍊權徳輿嘗謂為五言長城今集詩九卷雜文一卷顔真卿文一卷鼂氏曰唐顔真卿清臣也萬年人博學工辭章開元二十二年進士又登制科代宗時為太子太師使李希烈為希烈所害世謂真卿忤楊國忠李輔國元載楊炎盧把拒安禄山李希烈廢斥者以至於死而不自悔天下一人而已學問文章往往雜於神仙浮屠之説不皆合於理而所為乃爾者盖天性然也陳氏曰真卿之推五世孫師古曾姪孫按館閣書目嘉祐中宋敏求惜其文不𫝊乃集其刻於金石者為十五卷今本序文劉敞所作乃云吳興沈侯編輯而著沈之名留元剛刻於永嘉為後序則云劉原父所序即宋次道集其刻於金石者也又不知何據元剛復為之年譜益以拾遺一卷多世所𫝊帖語且以行狀碑𫝊為附録魯公之裔孫裕自五代時官温州與其弟綸祥皆徙居永嘉樂清本朝世復其家且時褒録其子孫有登科者原父劉氏序畧曰魯公極忠不避難臨難不違義是其塵垢糠粃猶將祗飾而誦習之以勸事君况其所自造之文乎然公殁且三百年未有祖述其書者其在舊史施之行事盖有存焉而雜出𫝊記流於簡牘則百而一二銘載功業藏於山川則十而一二非好學不倦周流天下則不能徧知而盡見彼簡牘者有盡而山川者有壊不幸而不𫝊則又至於千萬而一二未可知也蕭頴士集十卷鼂氏曰唐蕭穎士茂挺也梁宗室之後舉進士開元二十三年中第為史館待制安禄山反竄山南節度崔圓授揚州工曹至官信宿而去客死汝南逆旅門人諡曰文元先生穎士善觀書一覽即誦通百家譜系書籕嘗教授濮陽時號蕭夫子李林甫惡不附已故數罷去閻士和盛推頴士文章以為聞蕭氏之風者童子羞稱曹陸唐書云穎士作伐櫻桃賦以詆李林甫君子恨其褊按集中載其辭有曰每俯臨乎蕭牆姦囬得而窺伺盖謂林甫之必致冦也其後果階禄山之亂唐遂不振然則穎士可謂知㡬矣宜褒而反加以貶詞何哉陳氏曰門人柳并為序穎士梁鄱陽王之裔敏悟夙成負才尚氣見惡於李林甫卒不遇以死夀亦逮中年孟浩然詩一卷鼂氏曰唐孟浩然也襄陽人工五言詩𨼆鹿門山年四十乃㳺京師一日諸名士集祕省聨句浩然句曰微雲淡河漢疎雨滴梧桐衆皆欽伏張九齡王維雅稱道之維私邀入禁林遇元宗臨幸浩然匿牀下維以聞上曰素聞其人因召見命自誦所為詩至不才明主棄之句上曰不求進而誣朕棄人命放歸所著詩二百一十首宜城處士王士源序次為三卷今并為一又有天寳中韋縚序嚴從中黄子三卷鼂氏曰唐嚴從開元中為著作郎春宫侍讀集賢院學士卒自號中黄子當時命太子侍文呂向訪遺文於家得訓老經頌等八篇序而為三卷李翰林集二十卷鼂氏曰唐李白太白也白集舊十卷唐李陽氷序咸平中樂史别得白歌詩十卷凡歌詩七百七十六篇又纂雜著為别集十卷宋次道治平中得王文獻及唐魏萬所纂白詩又裒唐類詩洎石刻所𫝊者通李陽氷樂史集共一千一篇雜著六十五篇曾子固乃考其先後而次第之云白蜀人天寳初至長安眀皇召為翰林供奉頃之不合去安禄山反明皇在蜀永王璘節度東南白時卧廬山迫致之璘敗坐繫潯陽獄崔渙宋若思驗治白以為罪薄釋白囚使謀其軍乾元元年終以汙璘事長流夜郎以赦得釋過當塗以卒始終更渉如此此白之詩書所自序可考者也舊史稱白山東人為翰林待詔又稱白在宣城謁見永王璘遂辟為從事而新書又稱白流夜郎還潯陽坐事下獄宋若思釋之者皆不合於白之自序盖史誤也予按杜甫詩亦以白為山東人而蘇子瞻嘗恨白集為庸俗所亂則白之自序亦未可盡信而遂以為史誤近蜀本又附入左綿邑人所裒白𨼆處少年所作詩六十篇尤為淺俗白天才英麗其辭逸蕩雋偉飄然有超世之心非常人所及讀者自可别其真偽也陳氏曰唐志有草堂集二十卷李陽氷所録也今按陽氷序文但言十喪其九而無卷數又樂史序文稱李翰林集十卷别収歌詩十卷校勘為二十卷又於館中得賦序書表贊頌等亦為十卷號為别集然則三十卷者樂史所定也家藏本不知何處本前二十卷為詩後十卷為雜著首載陽氷史及魏顥曾鞏四序李華劉全白范傅正裴敬碑志卷末又載新史本𫝊而姑孰十詠笑矣悲来草書三歌行亦附焉復著東坡辯證之語其本最為完善别有蜀刻大小二本卷數亦同而首卷專載碑序餘二十三卷歌詩而雜著止六卷有宋敏求後序言舊集歌詩七百七十六篇又得王溥及唐魏萬本同裒唐類詩諸編洎石刻所𫝊廣之無慮千篇以别集雜著附其後曾鞏盖因宋本而次第之者也以校舊藏本篇數如其言然則蜀本即宋本也邪末又有元豐中毛漸題云以宋公編類之勤曾公考次之詳而晏公又能鏤板以𫝊於世乃晏知止刻於蘇州者然則蜀本盖𫝊蘇本而蘇今不復有矣南豐曾氏序畧曰白以汙永王璘事長流夜郎㑹赦得釋如潯陽金陵徘徊歴陽宣城二郡其族人陽氷為當塗令白過之以病卒年六十有四時寳應元年也白之詩連類引義雖中於法度者寡然其辭閎肆雋偉殆騷人所不及近世所未有也舊史稱白有逸才志氣宏放飄然有超世之心余以為實録而新書不著其語故録之使覽者得詳焉潁濵蘇氏云李白詩類其為人駿發豪放華而不實好事者喜名而不知義理之所在也語用兵則先登陷陣不以為難語㳺侠則白晝殺人不以為非此豈其誠能也白始以詩酒奉事明皇遇讒而去所至不改其舊永王将竊據江淮白起而從之不疑遂以放死今觀其詩固然唐詩人李杜稱首今其詩皆在杜甫有好義之心白所不及也漢髙祖歸豐沛作歌曰大風起兮雲飛揚威加海内兮歸故鄉安得壯士兮守四方髙帝豈以文字髙世者哉帝王之度固然發於中而不自知也白詩反之曰但歌大風雲飛揚安用壯士守四方其不達理如此老杜贈白詩有細論文之句謂此類也哉朱子語録曰作詩先用看李杜如士人治本經本既立方可看蘇黄諸家太白詩如無法度乃從容於法度中盖聖於詩者古風五十篇多是學陳子昻感遇詩有全用他句處太白去子昻未逺其尊慕如此然多為人所亂有一篇分而為二者有二篇合而為一者太白詩不専是豪放亦有雍容和緩底如首篇大雅夂不作多少和緩太白始終學選詩所以好子美詩好處亦是傚選詩䕫州諸詩不然也岑參集十卷鼂氏曰唐岑參南陽人文本裔孫天寳三年進士累官補闕超居郎出為嘉州刺史杜鴻漸表置幕府為職方郎中兼侍御史罷終於蜀參博覽史籍尤工綴文屬辭清尚用心良苦其有所得往往超㧞孤秀度越常情毎篇絶筆人競𫝊諷至徳中裴越薦杜甫等嘗薦其識度清逺議論雅正佳名早立時輩所仰可以備獻替之官云集有杜確序李嘉祐詩二卷鼂氏曰唐李嘉祐别名從一趙州人天寳七年進士為祕書正字袁台二州刺史善為詩綺靡婉麗有齊梁之風時以比吳均何遜云髙適集十卷集外文二卷别詩一卷鼂氏曰髙適達夫也一字仲武渤海人天寳八年舉有道科中第永泰初終散騎常侍五十始為詩即工以氣質自髙毎一篇出好事者輙𫝊布云賈至集十卷鼂氏曰唐賈至字幼㡬洛陽人天寳十年以明經擢第累官至起居舍人知制誥從駕幸西川當撰𫝊位冊既進稾上曰先天誥命乃父為之今兹冊命爾又為之兩朝大典出卿父子可謂繼美矣大歴中終散騎常侍集李邯鄲淑家本蘇弁編次常仲孺為之序以墓銘序碑列於后今亡其半矣蘇子瞻嘗作吕恵卿責詞有元兇在位之語仇人乃曰世惟宋太子劭謂之元兇因誣其指斥殊不知曹子建責躬詩有曰元兇是率盖自謂也今至集制誥中有除魏仲犀徐歸道詞亦以元兇指禄山是豈獨劭為元兇邪世多疑子瞻失詞因表出之陳氏曰唐志二十卷别十五卷李淑書目云至集有三本又有十卷者有序今本無序中興館閣本亦同文獻通考卷二百三十一
