body:
  text: 文獻通考卷一百九十七鄱陽馬端臨貴與著經籍考二十四史傳記溫公日記一卷陳氏曰司馬光熙寧在朝所記凡朝廷政事臣僚差除及前後奏對上所宣諭之語以及聞見雜事皆記之起熙寧元年正月至三年十月出知永興而止巽岩李氏曰文正公初與劉道原共議取實録正史旁采異聞作資治通鑑後紀屬道原早死文正起相元祐後終卒不果成今世所傳記聞及日記并朔記皆後紀之具也自嘉祐以前甲子不詳則號記聞嘉祐以後乃名日記若朔記則書略成編矣始文正子孫藏其書祖廟謹甚黨禍既解乃稍出之旋經離亂多所亡逸此八九紙草藁或非全幅間用故牘又十數行别書牘背往往剪開黏綴事亦有與正史實録不同者蓋所見所聞所傳聞之異必兼存以求是此文正長編法也王氏日録八十卷鼂氏曰皇朝王安石介甫撰紹聖間蔡卞合曾布獻於朝添入神宗實録陳瑩中謂安石既罷相悔其執政日無善狀乃撰此歸過於上掠美於己且歷詆平生不悅者欲以欺後世於是著尊堯集及日録不合神道論等十數書此書起熙寧元年四月終七年三月再起於八年三月終於九年六月安石兩執國柄日也然無八年九月以後至九年四月事蓋安石攻吕惠卿時瑩中謂蔡卞除之安石罵惠卿之語其事當在此際也陳氏曰本朝禍亂萌於此書陳瓘所謂尊私史而壓宗廟者其強愎堅辨足以熒惑主聼鉗制人言當其垂殁時欲以此書秉畀炎火豈非其心有所愧悔歟既不克焚流毒遺禍至今為梗悲夫書本八十卷今止有其半四明尊堯集一卷陳氏曰司諫延平陳瓘瑩中撰專辨王安石日録之誣僣不孫與配食坐像之為不恭瓘初在諫省未以安石為非合浦所著尊堯集猶回隱不直末乃悔之復為此書以謂蔡卞專用日録以修神宗實録薄神考而厚安石尊私史而壓宗廟於是編類其語得六十五條總而論之坐此羈管台州朱子讀兩陳諫議遺墨跋日録固為邪説然諸賢攻之亦未得其要領是以言者瀆而聽者疑用力多而見功寡也蓋嘗即其書而考之則凡安石之所以惑亂神祖之聰明而變移其心術使不得遂其大有為之志而反為一世禍敗之原者其隱微深切皆聚此書而其詞鋒筆勢縱橫捭闔煒煜譎誑又非安石之口不能言非安石之手不能書也以為蔡卞撰造之言固無是理况其見諸行事深切著明者又已相為表裏亦不侍晚年懟筆有所增加而後為可罪也然使當時用其垂絶之智舉而焚之則後來載筆之士於其帷幄之間深謀密計雖欲畢力搜訪極意形容勢必不能得之如此之悉而傳聞間異詞虛實相半亦不能使人無溢惡之疑且如勿令上知之語世所共傳終以手筆不存故使陸佃得為隱諱雖以元祐衆賢之力爭辨之苦而不能有以正也此見陸佃供答史院取問狀何幸其徒自為失計出此真迹以暴其惡於天下便當托其肆情反理之實正其迷國誤朝之罪而直以安石為誅首是乃所謂自然不易之公論不唯可以訂已往之謬而又足以開後來之惑奈何乃以畏避嫌疑之故反為迂曲回互之言指為撰造增加誣偽謗詆之書而欲加刋削以滅其迹乎此書之作實在建中崇寧之間且其言猶以日録為蔡卞之所記而其後了翁合浦尊堯之書亦未直攻安石也至於大觀初年而後四明之論始作雖謂天使安石自寫誣悖之心然猶有懟筆增加歸過神考之云則終未免於有所回互避就而失之者也朱子語録問四明尊堯集曰只似討閙却不於道理上理會只於利害上見得於道理全疏如介甫心術隱微處他都不曾改得却只是把持如云謂太祖濫殺有罪謂真宗矯誣上天皆把持語也龜山集中有攻日録數段却好蓋龜山長於攻王氏曾相手記三卷鼂氏曰紹聖初元祐黨禍起曾布知公論所在故對上之語多持兩端又輒增損以著此書云紹聖甲戌日録一卷元符庚辰日録一卷陳氏曰丞相南豐曾布子宣撰記在政府奏對施行及宫禁朝廷事林氏野史八卷陳氏曰同知樞密院長樂林希子中撰希不得志於元祐起從章惇甘心下遷西掖草諸賢謫詞者也而此書記熙寧元豐以來事頗平直不類其所為或言此書作元祐之前其後時事既變希亦隨之書藏不毁久而時事復變其孫懋於紹興中始序而行之耳王氏揮麈録曰林子中野史世多傳之其間議論與平日所為極為背馳殊不可曉豈非知公論之不可掩欲蓋其迹於天下後世邪邵氏辨誣一卷鼂氏曰邵伯溫撰辨蔡卞章惇邢恕誣罔宣仁欲廢哲宗立徐邸事邵氏聞見録二十卷鼂氏曰邵伯溫子文撰記國朝雜事迄紹興之初序言早以其父之故親接前輩得前言往行為多類之成書其父雍也陳氏曰又有後録三十卷其子傳所作不専記事在子録小説類傳信録十卷鼂氏曰皇朝鮮于綽大受撰言國朝雜事多元豐後朝廷政事得失人物賢否也國史後補五卷陳氏曰蔡絛撰絛京之愛子京末年事皆出於絛絛見攸既叛父亦與絛不咸此書大略為其父自解而滔天之惡終有不可隱蓋者其間所載宫闈禁密非臣庶所得知亦非臣庶所宜言既出絛筆事遂傳世殆非人力也北征紀實二卷陳氏曰蔡絛撰敘伐燕本末歸罪童貫蔡攸亦欲為京文飾然京罪不可掩也金人背盟録七卷圍城雜記一卷避戎夜話一卷金國行程十卷南歸録一卷朝野僉言一卷鼂氏曰皇朝汪藻編記金人叛契丹迄於宣和乙巳犯京城圍城雜記等五書皆記靖康時事也陳氏曰朝野僉言不著名氏有序建炎元年八月繫年録稱夏少曾未詳何人南歸録直祕閣沈琯撰亦記燕山事避戎夜話吳興石茂良太初撰靖康要録五卷陳氏曰不知誰撰自欽廟潛邸迄靖康元年十二月事靖康傳信録一卷陳氏曰丞相李綱伯紀撰丁未二月靖康奉使録一卷陳氏曰鄭望之撰靖康拾遺録一卷陳氏曰何烈撰又名靖康小史又名草史孤臣泣血録三卷拾遺一卷陳氏曰丁特起撰裔夷謀夏録七卷陳氏曰汪藻撰陷燕記一卷陳氏曰賈子莊撰記燕山初陷事子莊不知其名蔡靖客也靖康録一卷靖康遺録一卷陳氏曰録太學生朱邦基撰遺録為太學生沈良撰金人犯闕記一卷陳氏曰草茅方冠撰汴都記一卷靖康野録一卷陳氏曰並不著撰人名氏悲喜記一卷陳氏曰圍城中人作書與所親曰中美知府者具述晉亂本末自稱名曰暘皆不知何人也東都事略一百五十卷陳氏曰承議郎知龍州眉山王稱季平撰其書紀傳附録略具體但無志耳附録用五代史例也淳熙中上其書得直祕閣其所紀太簡略未得為全書建炎中興記一卷陳氏曰耿延禧撰建炎日歷五卷鼂氏曰宰相汪伯彥撰記太上皇帝登極時事陳氏曰敘元帥開府至南都踐極吕忠穆答客問一卷陳氏曰宰相濟南吕頤浩元直撰吕忠穆勤王記一卷陳氏曰左宣教郎臧梓撰記建炎復辟事渡江遭變録一卷丞相上蔡朱勝非藏一撰記苖劉作難至復辟事建炎復辟記一卷無名氏建炎通問録一卷宣教郎傅雱撰建炎初李丞相綱所進北狩聞見録一卷幹當龍德宫曹勛功顯撰按曹勛時扈從北狩以徽廟御札間道走行在所以建炎二年七月至南京北狩行録一卷蔡絛王若沖撰戊申維揚録一卷無名氏維揚過江録一卷尚書左丞葉夢得少藴撰己酉航海記一卷中書舍人李正民撰又名建炎居邠記建炎假道髙麗録一卷楊應誠撰取道遼東奉使金朝不逹而還紹興講和録二卷無名氏亂華編三十三卷知盱𣅿軍東平劉荀子卿編其前有小序數語云方石敬塘割幽燕遺契丹之日孰知為本朝造禍之原哉逮王安石創新法為辟國之謀又孰知紹述者召禍之酷哉所集雜史傳記近三十種荀忠肅丞相諸孫也元祐黨籍列傳譜述一百卷龔頤正撰以諸臣本傳及志狀家傳遺事之類集成之其事迹微晦史不可見者則采拾諸書為之補傳凡三百九人其闕者四人而已淳熙中史院取其書以備編輯四朝國史採擇時洪邁奏請乞將龔頤正甄録授和州文學托胄用事後賜出身詳見編年類頤正給事中原之曾孫也紹興正論二卷序稱瀟湘野夫不著名氏録文武官不附和議及忤秦檜得罪者紹興正論小傳二十卷宗正寺主簿鄞樓昉暘叔撰以正論中姓名倣元祐黨傳為之三朝北盟會編二百五十卷直祕閣清江徐夢莘商老撰輯諸書二百餘家分上中下上為政宣二十五卷中為靖康七十五卷下為炎興一百五十卷北盟集補五十卷夢莘以前書銓載不盡者五家續編次於中下二帙以補其闕靖康炎興各為二十五卷中興十三處戰功録一卷參政眉山李璧季章撰中興以來禦冦立功惟此十三處編為一書所謂司勳藏其二者也開禧乙丑北事將作其書成順昌録一卷鼂氏曰紹興十年劉錡破女真於順昌城下其徒記其功云建炎以來朝野雜記甲乙集共四十卷陳氏曰李心傳撰上自帝系帝德朝政國典下及見聞瑣碎皆録之蓋南渡以來野史之最詳者西陲泰定録九十卷陳氏曰李心傳撰記吳曦叛逆以及削平本末起嘉泰辛酉迄嘉定辛未為三十七卷其後蜀事益多又增修至辛巳之冬通為九十卷仍頗用太史年表例并記國家大政令防邊大節目首尾二十年紹運圖一卷鼂氏曰未詳何人撰自伏羲至皇朝神廟五德之傳及記事皆著於篇漢史二十卷陳氏曰丞相陽羡蔣芾子禮撰其曾祖魏公之竒頴叔所記遺事殆數百册兵火散失捃托遺藁得六百六十事為十九門淳煕改元書成為之序國史編年政要四十卷國朝實録列傳舉要十二卷皇朝宰輔拜罷録一卷續百官公卿表二十卷質疑十卷中興藝文志蔡幼學撰幼學採國史實録等書為國朝編年政要以擬紀起建隆訖靖康又為國朝實録列傳以擬傳起國初止神宗朝又為宰輔拜罷録起建隆盡紹熙年經而官緯之又以司馬光百官公卿表起建隆訖治平乃為續表終紹熙經緯如宰輔圖上方書年記大事下列官詳記除罷遷卒月日而大事止及靖康後未及録以擬表又為備志以擬志而未成文獻通考卷一百九十七
