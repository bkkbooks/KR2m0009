body:
  text: 文獻通考卷四十一鄱陽馬端臨貴與著學校考二太學魏志王肅傳自初平之元至建安之末天下分崩人懐茍且紀綱既衰儒道尤甚至黄初元年之後新主乃復始掃除太學之灰炭補舊石碑之缺壞備博士之員録依漢甲乙以考課申告州郡有欲學者皆遣詣太學太學始開有弟子數百人至太和青龍中中外多事人懷避就雖性非觧學多求詣太學太學諸生有千數而諸博士率皆麤踈無以教弟子弟子本亦避役竟無能習學冬來春去嵗嵗如是又雖有精者而臺閣舉格太髙加不念統其大義而問字指墨法㸃注之間百人同試度者未十是以志學之士遂復陵遲而來求浮虚者各競逐也正始中有詔議圎丘普延學士時郎官及司徒領吏二萬餘人雖復分布見在京師者尚且萬人而應書與議者略無㡬人又是時朝堂公卿以下四百餘人其能操筆者未有十人多皆相從飽食而退嗟夫學業沈隕乃至於此是以區區私心常貴乎數公者各處荒亂之際而能守志彌篤者也數公謂董遇賈洪邯鄲淳薛夏隗禧蘇林樂詳等七人為儒宗黄初五年立太學制五經課試之法置春秋榖梁博士時慕學者始詣太學為門人滿二嵗試通一經者稱弟子不通一經者罷遣選舉補官並如後漢建和之制明帝太和二年詔申勅郡國貢士以經學為先四年詔曰世之質文隨教而變兵亂以来經學廢絶後生進趣不由典謨豈訓導未洽将進用者不以徳顯乎其郎吏學通一經才任牧民博士課試擢其髙第者亟用其浮華不務道本者皆罷退之齊王正始中劉馥上言黄初以来崇立太學一十餘年而成者盖寡由博士選輕諸生避役髙門子孫恥非其倫故學者雖有其名而無其實雖設其教而無其功宜髙選博士取行為人表經任人師者掌教國子依遵古法使二千石以上子孫年從十五皆入太學明制黜陟陳榮辱之路明帝時髙柔上䟽曰今博士皆經明行修一國清選而使遷除限不過長懼非所以崇顯儒術帥勵怠惰也宜隨學行優劣待以不次之位敦崇道教以勸學者於化為𢎞按兩漢博士皆名儒而由博士入官者多至公卿今觀劉馥髙柔所言則知魏時博士之遴選既不精而博士之遷陞亦復有限矣呉主孫休永夀元年立學制曰古者建國教學為先所以遵理為時養器也宜按舊制置學官立五經博士覈取應選加其寵禄見吏之中及将吏子弟有志好者各令就業一嵗課試差其品第加以位賞使見之者樂其榮聞之者羡其稱以惇王化以正風俗晉武帝初太學生三千人太始八年有司奏太學生七千餘人才任四品聼留詔曰已試經者留之大臣子弟堪受教者令入學其餘遣還郡國咸寜二年起國子學法周禮國之貴游子弟國子受教於師者也恵帝元康元年以人多猥雜欲辨其涇渭於是制立學官第五品以上得入國學東晉元帝時太常賀循言尚書被符經置博士一人又多故歴紀儒道荒廢學者能兼明經義者少且春秋三傳俱出聖人而義歸不同自前代通儒未有能通得失兼而學之者也况今學義甚頽不可令一人總之今宜周禮儀禮二經置博士二人春秋三傳置三人其餘則經置一人合八人太常車允上言按二漢舊事博士之職唯舉明經之士選轉各以本資初無定班魏及中朝多以侍中常侍儒學最優者領之職雖不同漢氏盡於儒士之用其揆一也今博士八人愚謂宜依魏氏故事擇朝臣一人經學最優者不繫位之髙下常以領之毎舉大常共研厥中其餘七人自依常銓選大興初欲脩立學校唯周易王氏尚書鄭氏古文孔氏毛詩周官禮記論語孝經鄭氏春秋左傳杜氏服氏各置博士一人其儀禮公羊榖梁及鄭易皆省不置博士太常荀崧上䟽曰昔武皇帝崇儒術以賈馬鄭杜伏孔王何之徒章句傳注衆家之學置博士十九人二十州之中師徒相傳學士如林猶選張華劉寔居太常之官以重儒教伏聞節省之制皆三分置二博士舊員十有九人准古計今猶未中半九人以外猶宜增置周禮左氏公羊榖梁春秋臣以為宜各置一人以傳其學遇王敦難不行征南軍司戴邈上言喪亂以來庠序隳廢議者或謂平世尚文遭亂尚武此言似之而實不然夫儒道深奥不可倉卒而成比天下平泰然後修之則廢墜已久矣又貴游之子未必有斬将搴旗之才從軍征戍之役不及盛年使之講肄道義良可惜也世道久喪禮俗日弊如火之消膏莫之覺也今王業肈建萬物權輿宜篤道崇儒以勵風化從之成帝咸康三年國子祭酒袁瓌太常馮懐以江左浸安請興學校帝從之乃立太學徴生徒而士大夫習尚老莊儒術終不振致堂胡氏曰東晉請建學校者惟戴邈與袁馮三君子懇懇言之而終不能革清談之俗還孔孟之教任是責者其庾亮乎先公曰是時趙亦下書令郡國立五經博士初勒置大小博士至是復置國子博士南北之學並興而江左雖微中原喪亂則自若也孝武太元初於中堂立行太學於時無復國子生置太學生六十人國子生權銓大臣子孫六十人事訖罷其國子生見祭酒博士單衣角巾執經一卷以代手版自穆帝至孝武並以中堂為太學太元九年尚書謝石請興復國學以訓胄子頒下州郡普修鄉校帝納其言明年選公卿二千石子弟生增造廟房屋百五十五間而品課無章君子恥與其列國子祭酒殷茂上言臣聞舊制國學生皆取冠族華胄比例皇儲而中混雜蘭艾遂令人情恥之詔雖褒納竟不施行秦王堅臨太學考學生經義上第擢叙者八十三人又作教武堂於渭城命太學生明隂陽兵法者教授諸将陽平公融坐擅起學舎為有司所紏髙泰謂王猛曰昔魯僖公以泮宫發頌齊宣王以稷下垂聲今陽平公開建學宫追蹤齊魯不聞明詔褒美乃更煩有司舉劾乎乃止自永嘉之亂庠序無聞及堅之僭頗留心儒學宋武帝詔有司立學未就而崩文帝元嘉二十年立國學二十七年廢帝雅好藝文使丹陽尹廬江何尚之立元學太子率更令何承天立史學司徒叅軍謝元立文學散騎常侍雷次宗立儒學為四學司馬氏曰易曰君子多識前言徃行以畜其徳孔子曰辭逹而已矣然則史者儒之一端文者儒之餘事至於老莊虚無固非所以為教也夫學者所以求道天下無二道安有四學哉齊髙帝建元四年詔立國學以張緒為祭酒置學生百五十人取王公以下子孫年十五以上二十以下家上都二千里為限帝崩乃以國諱廢學先公曰齊髙即位之初求直言崔祖思以為人不學則不知道此逆亂之所由生宜開文武二學使人依方習業優殊者待以不次此國學之所以置歟南史儒林傳叙言國學時或建置而勸課未博建之不能十年取文具而已宋齊一也張緒見謂風流在清簡寡欲之目以為有正始之風善清言而已師道恐不止於清言然當時以為極選矣是春置學秋以國哀罷曾不及嵗江左之學校如此武帝永明三年詔立學初宋太宗置總明觀以集學士亦謂之東觀上以國學既立省總明觀召公卿以下子弟置生二百二十人其年秋中悉集時王儉領國子祭酒詔於儉宅開學士館以總明四部書充之又詔儉以家為府自宋世祖好文章士大夫悉以文章相尚無以専經為業者儉少好禮樂及春秋言論造次必於儒者由是衣冠翕然更尚儒術儉十日一還學監試諸生巾卷在庭劔衛令史儀容甚盛作觧散髻斜挿簪朝野慕之相與倣傚儉以宰相領祭酒令國子生單衣角巾執經代手版東昏侯永元初詔依永明舊事廢學時有司奏國學太學兩存焉國子助教曹思文上表曰今制書始下而廢學先聞将恐觀國之光者有所闕也若以國諱官廢昔晉武立學爰洎建元百餘年中未嘗暫廢其間豈無國諱永明以徳太子故廢斯非古典今之國學即古之太學天子入國學以行禮也太子入國學以齒讓也太學之與國學斯是晉代殊其士庻異其貴賤耳然貴賤士庶皆須教國學太學兩存之可也梁武帝天監四年置五經博士各一人又置胄子律博士五年置集雅館以招逺學又詔皇太子及王侯之子年在從師者皆入學幸國子學䇿試胄子賜訓授之司各有差致堂胡氏曰史稱武帝雅好儒術至是置五經博士開館宇招後進四館所養士踰千人射䇿通明者除吏又修孔子廟以示尊師他日又幸國子監親臨講肄且令皇太子及王侯之子年可從師者皆入學可謂勤矣然儒風不振人才不出何也帝心尚佛自天監改元即不肉食此躬行也故特以美行興學養士故人不從其令而從其意意乃身率令乃文具其後綱維不立人紀胥廢國破身隕為萬世笑盖始於此人主心術所尚可不慎哉陳天嘉以後稍置學官雖博延生徒成業盖寡其所采掇盖亦梁之遺儒後魏道武帝初定中原始於平城立太學置五經博士生員千餘人天興二年増國子太學生員三千人帝問博士李先曰天下何物最善可以益人神智對曰書籍帝曰書籍凡有㡬何如何可集對曰自書契以來世有滋益以至於今不可勝計苟人主所好何憂不集珪從之命郡縣大索書籍送平城又命集博士儒生比衆經文字義類相從者凡四萬餘字號曰衆文經明年特改國子為中書學立教授博士太武始光三年别立太學於城東後徴盧元髙允等令州郡各舉才學於是人多砥礪儒術轉興孝文太和中改中書為國子又開皇子之學建明堂辟廱及遷都洛陽立國子太學四門小學又詔求天下遺書祕閣所無有禆時用者加以厚賞宣武時復詔營國學樹小學於四門大選儒生以為小學博士員四十人雖黌宇未立而經術彌顯時天下承平學業大盛故燕齊趙魏之間横經著錄不可勝數大者千餘人小者猶數百州舉茂異郡舉孝亷對揚王庭每年逾衆正光三年始置國子生三十六人齊時師保疑丞皆賞勲舊國學博士徒有虚名唯國子一學生徒數十人耳胄子以通經進仕者唯博陵崔子發廣平宋游卿而已周武帝保定三年幸太學以太傅燕公于謹為三老而乞言焉天和元年詔諸胄子入學但束脩於師不勞釋奠釋奠者學成之祭自今永以為式隋文帝開皇中令國子寺不𨽻太常自前代皆屬太常也仁夀元年詔以天下學校生徒多而不精唯簡留國子學生七十人太學四門及州縣學並廢前殿内将軍河間劉炫上表切諌不聼又改國子為太學水心葉氏曰仁夀元年减國子學生止留七十人太學四門州縣學並廢當時國子千數則所散遣者數千萬人豈不駭動雖有諫者皆不聼史臣以為其暮年精華稍竭致然時方遣十六使廵省風俗而詔以為徒有名錄空度嵗時未有徳為代範才任國用良由設學之理多而未精至三年七月下詔令州縣捜揚賢哲則云雖求傅巖莫見幽人徒想崆峒未聞至道惟恐商歌於長夜抱闗於夷門㫖意懇切且限以三旬咸令進路徴召将送必須以禮則所謂精華将竭有所厭怠者亦未然盖其心實謂空設學校未足以得人耳古之為教使材者必由學舜周公之論是也漢以後傳經師章句而已材者由於學則枉以壞不材者由於學則揠以成教之無本而不行取之雖驟而不獲則學之盛衰興廢盖未易言也先公曰劉炫上表言學校不宜廢而帝不納由其不學故也牛竒章不可辭其責矣其後盗賊群起經籍道息而炫亦以飢死哀哉而水心乃以為帝心實謂空設學校未足以得人材然則廢之誠是歟煬帝即位後開庠序國子郡縣之學盛於開皇之初徴辟儒生逺近畢至使相與講論得失於東都之下納言定其差次以奏聞於時舊儒多已凋亡惟信都劉士元河間劉光伯㧞萃出類學通南北博及古今後生鑽仰諸經議䟽搢紳咸宗師之既而外事四夷戎馬不息師徒怠散盗賊群起方領矩歩之徒亦轉死溝壑經籍湮没於煨燼矣唐制凡學六皆𨽻於國子監國子學生三百人以文武三品以上子孫若從二品以上曾孫及勲官二品縣公京官四品帶三品勲封之子為之太學生五百人以五品以上子孫職事官五品朞親若三品曽孫及勲官三品以上有封之子為之四門學生千三百人其五百人以勲官三品以上無封四品有封及文武七品以上子為之八百人以庶人之俊異者為之律學生五十人書學生三十人算學生三十人以八品以下子及庶人之通其事者為之京都學生八十人大都督中都督府上州各六十人下都督府中州各五十人下州四十人京縣五十人上縣四十人中縣中下縣各三十五人下縣二十人國子監生尚書省補祭酒統焉州縣學生州縣長官補長史主焉凡館二門下省有𢎞文館生三十人東宫有崇文館生二十人以皇緦麻以上親皇太后皇后大功上親宰相及散官一品功臣身食實封者京官職事從三品中書黄門侍郎之子為之凡博士助教分經授諸生未終經者無易業凡生限年十四以上十九以下律學十八以上二十五以下凡禮記春秋左氏傳為大經詩周禮儀禮為中經易尚書春秋公羊傳榖梁傳為小經通二經者大經小經各一若中經二通三經者大經中經小經各一通五經者大經皆通餘經各一孝經論語皆兼通之凡治孝經論語共限一嵗尚書公羊傳榖梁傳各一嵗半易詩周禮儀禮各二嵗禮記左氏傳各三嵗學書日紙一幅間習時務䇿讀國語説文字林三蒼爾雅凡書學石經三體限三嵗説文二嵗字林一嵗凡算學孫子五曹共限一嵗九章海島共三嵗張邱建夏侯陽各一嵗周髀五經算共一嵗綴術四嵗緝古三嵗記遺三等數皆兼習之旬給假一日前假博士考試讀者千言試一帖帖三言講者二千言問大義一條總三條通二為第不及者有罰嵗終通一年之業口問大義十條通八為上六為中五為下併三下與在學九嵗律生六嵗不堪貢者罷歸諸學生通二經俊士通三經已及第而願留者四門學生補太學太學生補國子學每嵗五月有田假九月有授衣假二百里外給程其不帥教及嵗中違程滿三十日事故百日縁親病二百日皆罷歸既歸罷條其狀下之屬所五品以上子孫送兵部准䕃配色毎嵗仲冬州縣館監舉其成者送之尚書省髙祖武徳元年詔皇族子孫及功臣子弟於祕書外省别立小學太宗貞觀五年以後數幸國學於門下别置𢎞文館於東宫置崇文館遂増創學舎一千二百間國學太學四門亦增生員其書算各置博士凡三百六十員其屯營飛騎亦給博士授以經業無何髙麗百濟新羅髙昌吐蕃諸國酋長亦遣子弟請入國學於是國學之内八千餘人國學之盛近古未有髙宗龍朔二年東都置國子監明年以書學𨽻蘭臺算學𨽻祕閣律學𨽻詳刑上元二年加試貢士老子䇿明經二條進士三條國子監置大成二十人取已及第而聰明者為之試書日誦千言并日試䇿所業十通七然後補其禄俸同直官通四經業成上於尚書吏部試之登第加一階放選其不第即習業如初三嵗而又試三試而不中第從常調武后聖歴二年鳯閣舎人韋嗣立上言國家自永淳以來二十餘載國學廢散胄子衰缺時輕儒學之官莫存章句之選入垂拱已後文明在辰盛典鴻休日書月至因藉際㑹入仕尤多陛下誠能下明制發徳音廣開庠序大敦學校三館生徒即令追集王公以下子弟不容别求仕進皆入國學服膺訓典崇飾館廟尊尚儒師則四海之内靡然向風矣中宗神龍二年勅學生在學各以長幼為序初入學皆行束脩之禮禮於師國子太學各絹三疋四門學絹二疋俊士及律書算學州縣各絹一疋皆有酒脯其束脩三分入博士二分助教又每言國子監所管學生國子監試州縣學生當州試並選藝業優長者為試官監試洪氏容齋隨筆曰唐六典國子生初入置束帛一篚酒一壺脩一案為束脩之禮太學四門律學書學算學皆如國子之法其習經有暇者命習𨽻書并國語説文字林三蒼爾雅毎旬前一日則試其所習業乃知唐世士人多工書盖在六館時以為常習其説文字林蒼雅諸書亦欲貴以結字合於古義不特銓選之時方取楷書遒美者也束脩之禮乃於此見之開元禮載皇子束脩束帛一篚五疋酒一壺二斗脩一案三脡皇子服學生之服至學門外陳三物於西南少進曰某方受業於先生敢請見執篚者以篚授皇子皇子跪奠篚再拜博士答再拜皇子還避遂進跪取篚博士受幣皇子拜訖乃出其儀如此州縣學生亦然詔宗室三等以下五等以上未出身願宿衛及任國子生聼之其學業成而堪貴者宗正寺試送監舉如常法三衛番下日願入學者聼附國子學太學及律館習業蕃王及可汗子孫願入學者附國子學讀書𤣥宗開元五年始令鄉貢明經進士見訖國子監謁先師學官開講問義有司為設食清資五品以上官及朝集使皆往閲禮焉七年又令𢎞文崇文國子生季一朝參又勅州縣學生年二十五以下八品子若庻人以二十一以下通一經及未通經而聰悟有文詞史學者入四門學為俊士即諸州貢舉省試不第願入學者聼開元十一年上置麗正書院聚文學之士祕書監徐堅太常博士㑹稽賀知章等或修書或侍講以張説為脩書使以總之有司供給優厚中書舎人陸堅以為此屬無益於國徒為靡費欲悉奏罷之張説曰自古帝王於國家無事之時莫不崇宫室廣聲色今天子獨延禮文儒發揮典籍所益者大所損者微陸子之言何不逹也上聞之重説而薄堅帝愛鄭䖍之材欲置左右以其不事事更為置廣文館以䖍為博士䖍聞命不知廣文曹司何在訴宰相宰相曰上増國學置廣文館以居賢者令後世言廣文博士自君始不亦美乎䖍乃就職久之雨壞廡舎有司不復修完寓治國子館自是遂廢天寳十二載勅天下罷鄉貢舉人不由國子及郡縣學者勿舉選十四年復鄉貢代宗廣徳二年詔曰古者設太學教胄子雖年榖不登兵革或動而爼豆之事不廢頃年戎車屢駕諸生輟講宜追學生在館習業度支給厨米蕭昕時為國子祭酒建崇太學以樹教本帝悟其言詔群臣有籍於朝及神䇿六軍子弟肄業者聼補生員二月釋奠於國子監命宰相帥常參官魚朝恩率六軍諸将徃聼講子弟皆服朱紫為諸生朝恩既貴顯乃學講經為文僅能執筆辨章句遽自謂才兼文武人莫敢與之抗國子監成以魚朝恩行内侍監判國子監事中書舎人常衮言成均之任當用名儒不宜以宦者領之不聼命宰相以下送朝恩上先公曰先王之禮受成獻馘於學漢期門羽林之士悉通一經然則釋奠講經宰相帥常參官武臣率六軍諸将徃聼未為失也而魚朝恩判監事則非也以薫腐之餘而列之熊羆之士不二心之臣之上豈惟章甫逄掖羞之介胄之夫亦以為辱矣徳宗貞元六年時𢎞文崇文生未補者務取闕員以補速於登第而用䕃乖實至有假市門資變易昭穆及假人試藝者乃詔宜據式考試假代者論如法歸崇敬為國子司業皇太子欲臨國學行齒胄禮崇敬以學與官名皆不正乃建議古天子學曰辟廱以制言之壅水環繚如璧然以誼言之以禮樂明和天下云爾在禮為澤宫故前世或曰璧池或曰璧沼亦言學省漢光武立明堂辟廱靈臺號三廱宫晉武帝臨辟廱行鄉飲酒禮别立國子學以殊士庻永嘉南遷惟有國子學隋大業中更名國子監今聲名之盛辟廱獨闕請以國子監為辟廱省祭酒司業之名非學官所宜業者栒簴大板今學不教樂於義無當請以祭酒為太師氏位三品司業為左師右師位四品近世明經不課其義先取帖經顓門廢業傳授義絶請以禮記左氏春秋為大經周官儀禮毛詩為中經尚書周易為小經各置博士一員公羊榖梁春秋共准一中經通置博士一員博士兼通孝經論語依章䟽講觧徳行淳潔文詞雅正形容莊重可為師表者委四品以上各舉所知在外給𫝊七十者安車蒲輪敦遣國子太學四門三館各立五經博士品秩生徒有差舊博士助教直講經直律館算館助教請皆罷教授法學士謁師贄用腵脩一束酒一壺衫布一裁色如師所服師出中門延入與坐割脩㪺酒三爵止乃發篋出經摳衣前請師為説經大略然後就室朝晡請益師二時堂上訓授道義示以文行忠信孝弟睦友旬省月試時考嵗貢眡生徒及第多少為博士考課上下有不率教者檟楚之國子移禮部為太學生太學又不變徙之四門四門不變徙本州之學復不變繇役如初終身不齒雖率教九年學不成者亦歸之本州禮部考試法請罷帖經於所習經問大義二十而得十八論語孝經十得八為通䇿三道以本經對通二為及第其孝行聞鄉里者舉觧具言試日義闕一二許兼收焉天下鄉貢如之習業考試並以明經為名得第授官與進士同有詔尚書省集百官議皆以習俗久制度難分明省禁非外司所宜名周官世職者稱氏國學非世官不得名辟廱省太師氏大抵憚改作故無施行者憲宗元和二年置東都監生一百員自天寳後學校益廢生徒流散永泰中雖置西監生而館無定員於是始定生員西京國子館生八十人大學七十人四門三百人廣文六十人律館二十人書算館各十人東都國子館十人太學十五人四門五十人廣文十人律館十人書館三人算館二人而已韓愈復請國子監生徒䟽曰國家典章崇重庠序近日趨競未復本原至使公卿子弟恥逰太學工商凡冗或取上庠今聖道大明儒風復振恐須革正以贊鴻猷今請國子館並依六典其太學館量許取無資䕃有才業人充如有資䕃不補學生應舉者請禮部不在收試限請牒送法司科罪縁今年舉期已近伏請去上都五百里内特賜非時收補其五百里外且任鄉貢至來年春一時收補其厨糧度支先給二百七十四人今請准新補人數量加支給又論新注學官牒准今年赦文委國子祭酒選擇有經藝堪訓導生徒者以充學官近年吏部所注多循資叙不考藝能至今生徒不自勸勵伏請非専通經傳博渉墳史及進士五經諸色登科人不以比擬其新授官上日必加研試然後放上以副聖朝崇儒尚學之意文宗太和七年赦節文應公卿士族子弟取來年正月已後不先入國學習業者不在應明經進士之限武宗㑹昌五年制公卿百官子弟及京畿内士人寄客修明經進士業者並𨽻名太學外州寄土人並𨽻名所在官學咸通中劉允章為禮部侍郎請諸生及進士第並謁先師衣青衿介幘以還古制又建言羣臣輸光學錢治庠序宰相五萬節度使四萬刺史萬詔可梁開平三年國子監奏修建文宣王廟請率在朝及天下見任官俸錢每貫尅留一十五文後唐天成三年正月中書門下奏伏以祭酒之資歴朝所貴爰從近代不重此官况屬聖朝方勤庶政須𢎞雅道以振儒風望令宰臣一員兼判國子祭酒勅宜令宰臣崔協兼判其年八月十一日宰臣兼判國子祭酒崔協奏請國子監每年秪置監生二百員侯觧送至十月三十日滿數為定又請頒下諸道州府各置州學如有鄉黨備諳文行可舉者錄其事實申監司方與觧送但一身就業不得影庇門戸兼太學書生亦依此例不得因此便取公牒輙免本戸差役又每年於二百人數内不繫時節有投名者先令學官考試校其學業深淺方議收補姓名勅宜依五年正月五日國子監奏當監舊例初補監生有束脩錢二千及第後光學錢一千竊縁當監諸色舉人及第後多不於監司出給光學文抄及不納光學錢秪守選限年滿便赴南曹參選南曹近年磨勘選人並不收竪監司光學文抄為慿請自今後欲准徃例應色舉人及第後並先於監司出給光學文抄并納光學錢等各有所業等第以備當監逐年公使奉勅宜准徃例自今後凡補監生須令情願於監中修學則得給牒收補仍據所業次第逐季考試申奏如收補年深未聞藝業虗沾補牒不赴試期亦委監司具姓名申奏按五代弊法凡官府公使錢多令居官者自出其費宰相則有光省錢御史則有光臺錢至於監生亦令其出光學錢則貧士何所從出既徴其錢復不蠲其役待士之意亦太簿矣然史所言多有未曾授業輙取觧送者徃徃亂離之際其居學者亦皆茍賤冒濫之士耳文獻通考卷四十一
