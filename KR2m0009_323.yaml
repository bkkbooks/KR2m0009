body:
  text: 文獻通考卷三百二十三鄱陽馬端臨貴與著輿地考九古南越自嶺而南當唐虞三代為蠻夷之國是百越之地亦謂之南越或云南越之君亦夏禹之後按甌越閩越禹後少康之庶子所封之地即南越非其種也故輿地志云東南有二越其義詳矣或曰自交趾至於會稽七八千里百越雜處各有種姓故不得盡云少康之後古謂之雕題謂雕題刻其額也禮記王制曰南方曰雕題非禹九州之域又非周禮職方之限晉書隋書並謂交廣之地為禹貢揚州之域今稽其封略考其鎮藪則禹貢職方皆不及此故列於九州之外在天文牽牛婺女則越之分野得漢之蒼梧鬱林合浦交趾九真南海日南皆其分也今南海義寧海豐恩平南陵招義臨賀髙要潯江感義臨江扶南晉康臨封開陽髙涼始安之南境平樂蒙山正平開江連城鬱林平琴安城賀水常林象郡龍城融水朗寧南潘懷澤寧仁新興普寧陵水南昌寧越㝎川寧浦橫山修德龍池安南武峩龍水欣城九真福祿文陽日南承化銅陵永㝎玉山合浦安樂海康蒼梧懷德臨潭樂古溫水湯泉等郡是也兼得椘之交漢零陵桂陽今始安之北境及始興皆宜屬楚秦始皇略㝎揚越謫戍五方南守五嶺自北徂南入越之道必由嶺嶠時有五處塞上嶺一也今南安郡大庾嶺是騎田嶺二也今桂陽郡臘嶺是都龐嶺三也今江華郡永明嶺是氓渚嶺四也亦江華界白芒嶺是越城嶺五也今始安郡北零陵郡南臨源嶺是西自衡山之南東窮於海一山之限也後遣任囂攻取陸梁之地遂平南越置郡此為南海今南海始興義寧海豐恩平南陵臨賀髙要感義晉康臨封開陽高涼連城新興銅陵懷德等郡是桂林今始安平樂蒙山開江潯江蒼梧臨江鬱林平琴安城賀水常林象郡龍城融水朗寧懷澤寧浦橫山修德龍池永㝎等郡是象今招義南潘普寧陵水南昌㝎川寧越安南武峩龍水欣城九真福祿文陽日南承化玉山合浦安樂海康溫水湯泉等郡是置南海尉以典之所謂東南一尉者也任囂病且死召趙他謂曰番禺負山險阻南北東西數千里可以為國遂以趙他為南海尉秦末趙他遂王其地漢因封之他後數代其相吕嘉反叛武帝使伏波將軍路博德討平之分秦南海桂林象郡置蒼梧鬱林合浦日南九真交趾并舊九郡是元封初又遣軍自合浦徐聞入南海至大洲方千里略得之置儋耳珠崖二郡至元帝時以其數反罷棄之後兼置交趾刺史領七郡其餘土宇自漢以後歷代開拓今臨潭扶南正平樂古珠崖昌化延德瓊山萬安等郡是後漢建武中交趾女子徵側妹徵二反於是九真日南合浦蠻俚皆應之自立為交趾帝使馬援平㝎交部始調立城郭置井邑至獻帝乃立為交州領郡七時張津為交趾刺史士燮為交趾太守共上表請立為州置牧初理龍編縣即今安南府是也乃置交州牧徙理蒼梧廣信縣即今郡蒼梧縣也建安十六年又徙理南海番禺縣即今郡縣也尋又移理龍編其邊州詔使持莭給鼓吹以重威鎮加九錫六佾之舞漢末其地並屬吳仍分為廣州領郡三理番禺後蜀以建寧太守遙領交州晉平蜀亦然及平吳仍舊交廣二州並因前代交領郡七廣領郡六宋分為廣州領郡十七理番禺交州領郡五理龍編越州領郡三理臨漳今合浦郡齊並因之廣州領郡三十三交州領郡九越州領郡十二梁陳以來廢置混雜不能悉舉唐分十五部此為嶺南道五代時為劉氏所據宋乾德四年平南漢始盡得嶺南之地分為廣南東路西路五嶺之南人雜夷獠不知教義以富為雄父子别業父貧乃有質身於子者其富豪並鑄銅為大鼓初成懸於庭中置酒以招同類又多搆讐怨欲相攻擊則叩此鼓到者如雲有鼓者號為都老羣情推服尉他於漢自稱蠻夷大長老夫臣他故里人呼其所尊為長老也言訛故又稱都老云珠崖環海尤難賔服是以漢室嘗罷棄之漢元帝時珠崖數反叛賈捐之上書言不可煩中國師徒請罷棄命從之大抵南方遐阻人強吏懦豪富兼并役屬貧弱俘掠不忌古今是同其性輕悍易興迷莭自尉他徵側之後無代不有携亂故蕭齊志云慿恃遠險隱伏巖障恣行冦盜略無編户爰自前代至於唐朝多委舊德重臣撫寧其地也古南越歷代沿革之圖秦時為郡三南海郡桂林郡象郡漢時為郡七縣五十五南海郡六縣番禺陽博羅中宿龍川四會揭鬱林郡十二縣布山臨塵安廣定周阿林增食廣鬱中留潭中桂林領方雍雞蒼梧郡十縣廣信富謝沭荔高要臨封陽猛端溪乘川浦賀陵馮交趾郡十縣嬴􅖮西安㝎龍茍漏由麊泠朱北帶徐于編昜鳶稽合浦郡五縣徐聞高涼合浦臨允朱盧日南郡五縣朱吾比景盧容西捲象林九真郡七縣胥浦無移風切編都龎餘發咸歡無晉時為郡十七縣一百二十一南海郡六縣番禺夷四會增城博羅龍川平臨賀郡六縣臨賀川謝沭馮乘封陽興安富始安郡七縣始安永始陽平豐平樂荔浦常安熙高涼郡三縣安寧高涼恩平始興郡七縣曲江陽桂陽宿山始興含洭湞陽中高興郡五縣廣化海安化平黃陽西平蒼梧郡十二縣廣信農城端溪元溪髙要臨允建陵新寧鄣平猛陵都羅武城鬱林郡九縣布山武阿林安新邑始晉平方熙廣建鬱平領桂林郡八縣潭中武武豐軍粟平陽城驣羊平龍剛夾合浦郡六縣合浦官南平蕩昌徐聞毒質珠日南郡五縣象林盧容朱吾西捲比景交趾郡十四縣龍編交興茍漏北帶望海稽徐嬴􅖮西于曲昜武寧朱鳶安定南定海平九德郡八縣九德浦咸歡都南陵胥陽洨陽遂扶苓曲九真郡七縣胥浦原移風松津梧建初常樂扶樂武平郡七縣武平封武興安溪進山根寧安武扶新昌郡六縣麊泠道嘉寧吳定封山臨西西寧浦郡五縣寧浦連道吳定昌平平山隋時為郡十八縣一百四十七南海郡十五縣南海清遠曲江浛洭始安政賔翁源增城化蒙寶安樂昌四會懷