廢順州以龍淳溫水龍化南河四縣併入有雞籠山龍化水北流隋縣宋廢禺州以峩石扶萊羅辨三縣併入有勾漏山鬼門關化州秦屬象郡二漢屬合浦郡唐置辨州或為陵水郡屬嶺南道領縣三石龍化陵羅龍後廢龍化宋開寶五年廢陵羅又以廢羅州之吳川來屬太平興國五年改名化州屬廣西路貢銀髙良薑領縣二治石龍石龍隋縣有石龍江陵水羅水吳川本羅州宋廢其州并入吳川一縣來屬有黎山吳川水白州秦屬象郡二漢屬合浦郡唐平蕭銑於此置南州尋改為白州或為南昌郡屬嶺南道領縣五博白龍豪南昌周建寧羅後廢龍豪宋開寶五年廢南昌建寧周羅并作博白一縣政和元年廢以其地𨽻鬱林州三年復紹興間復廢為縣𨽻鬱林州貢銀縮砂領縣一博白唐縣有博白山博白水周羅山周羅水緑珠江緑珠井牢州秦為象郡地二漢屬日南郡吳省晉平吳復置宋分置南流郡齊梁曰定川郡隋屬合浦郡唐置義州後改為智州又改為牢州或為定川郡屬嶺南道領縣三南流宕定川川宋開寶五年廢牢州以定川宕川併入南流為一縣屬鬱林州詳見鬱林州下欽州晉以前與白州同宋齊以來置宋夀郡梁又置安州隋平陳郡廢而安州如故後改安州為欽州煬帝初州廢置寧越郡唐為欽州或為寧越郡屬嶺南道領縣五欽江內靈山保遵化亭京宋屬廣西路開寶五年廢遵化欽江內亭三縣貢髙良薑翡翠毛領縣二治靈山靈山唐縣有桂山欽水羅彌水安遠唐保京縣宋改有安京山如洪江羅浮山水武峩州土地與安南府同唐置武峩州或為武峩郡屬嶺南道領縣五武勞武如馬梁武緣峩山宋為雍州所管右江道羈縻州廉州秦象郡地漢置合浦郡後漢同吳改為珠官晉又為合浦郡宋因之兼置臨瘴郡及越州領郡三治於此時西江督護陳伯紹請置遂以為刺史始立州鎮穿山為城門威服狸獠齊又因之煬帝改為祿州尋改為合州又廢州置合浦郡唐置廉州州界有瘴江或為合浦郡屬嶺南道領縣四合浦蔡龍封山大亷宋開寶五年廢封山蔡龍大亷移州治於長沙場置石康縣太平興國八年改太平軍移治海門鎮咸平元年復舊屬廣西路貢銀領縣二治合浦合浦漢縣有合浦銅船湖珠池石康本常樂州宋并為縣雷州秦象郡地二漢以後並屬合浦郡地梁分置合州大同末以合肥為合州此為南合州隋平陳不改煬帝初州廢屬合浦郡唐置雷州或為海康郡屬嶺南道領縣三海康徐遂溪聞宋開寶五年廢徐聞遂溪屬廣西路貢斑竹領縣一海康有擎雷山擎雷水冠頭一寨禺州秦屬象郡唐置宕州後改為東峩州又改為禺州或為溫水郡屬嶺南道領縣四峩石陸川溫水扶萊宋開寶五年廢禺州以其四縣併作北流一縣屬容州詳見容州下宜州土地與安南府同秦屬象郡後沒於蠻夷唐開置粵州乾封中更名宜州天寶元年曰龍水郡屬嶺南道領縣四龍水東璽崖山天河五代時為楚馬氏所有後入南漢省崖山東璽宋淳化元年以柳州洛曹縣來屬慶歷三年廢芝州以其地來屬屬廣西路貢生豆䓻草豆䓻銀領縣五治龍水龍水唐縣有武鵝山龍口江洛曹唐縣有洛稜山天河唐縣有溪江欣城唐芝州治思恩唐環州地後沒蠻夷慶歷八年來屬芝州土地與安南府同唐為芝州或為欣城郡屬嶺南道領縣一欣城宋慶歷三年𨽻宜州詳見宜州下崖州海中之洲也其洲方千里漢武置珠崖儋耳二郡昭帝省儋耳并珠崖元帝又罷珠崖郡以其阻絶數反故罷棄之與今海康郡之徐聞縣對自徐聞徑渡便風揚帆一日一夕即至梁置崖州隋置珠崖郡唐為崖州屬嶺南道領縣四舍城文昌澄邁臨髙宋廢屬瓊州而以唐之振州為崖州詳見瓊州下儋州土地與珠崖郡同漢置儋耳郡唐置儋州或為昌化郡屬嶺南道領縣五義倫洛昌化富感恩陽羅南漢廢富羅宋廢洛陽熙寧六年降為昌化軍屬廣西路貢髙良薑銀領縣三治宜倫宜倫隋義倫縣宋改有毗耶山耶山倫江昌化隋縣有昌化石南崖江感恩隋縣有感勞山湳龍江吉陽軍土地與崖州同隋置臨振郡唐置振州或為延德郡領縣五寧逺臨延德落吉陽川屯南漢省延德臨川落屯宋開寶五年改振州為崖州熙寧六年降為珠崖軍政和七年改吉陽郡今軍城非崖與振之舊乃舊吉陽縣基也貢髙良薑領縣二治寧逺寧逺隋縣吉陽唐縣熙寧六年二縣並省為鎮紹興復為縣瓊州土地與珠崖郡同唐割崖州置瓊州或為瓊山郡屬嶺南道領縣五瓊山樂曽口顔容瓊會羅自乾封後沒山洞蠻貞元五年復七年省容瓊五代時省曾口顔羅宋開寶五年廢崖州以舍城文昌澄邁三縣來屬熙寧四年省舍城大觀元年割樂會𨽻萬安軍是年以黎母山夷洞建鎮州賜軍額為靖海軍莭度政和元年州廢以其地及軍額來歸屬廣西路貢銀檳榔領縣四治瓊山瓊山唐縣有瓊山澄邁隋縣有澄邁山文昌唐縣有紫貝山那射水臨髙唐縣有南歸水萬安州土地與珠崖同唐置萬安州或為萬安郡屬嶺南道領縣四萬安富雲陵水博遼南漢省富雲博遼宋屬廣西路至大觀元年以瓊州樂會縣來𨽻貢銀領縣三治萬寧萬寧唐縣有赤隴山金仙水陵水唐縣有靈山陵柵水樂會唐縣有湳泰水安南都護府古駱越之地秦屬象郡漢交趾日南二郡界今南方夷人其足大指開廣若並足而立其趾則交故名交趾後漢因之兼置交州領郡七治於此晉宋齊並因之晉領郡七家領郡五齊領郡九皆治於此宋又置宋平郡齊因之亦為交趾郡地梁因之隋平陳廢郡置交州煬帝初州廢置交趾郡唐為交州後改曰安南都護府屬嶺南道貢蕉檳榔鮫革蚺蛇膽翠羽領縣八宋平宋置宋平郡在此朱鳶吳軍晉縣地舊置武平郡鳶以專反龍編漢舊縣太平交趾漢龍編縣地武平吳舊縣平道齊置昌國縣南定唐縣宋初為丁璉所據其後黎氏李氏陳氏世據安南之地石湖范氏桂海虞衡志曰余按交趾之名其來最久王制曰南方曰蠻雕題交趾有不火食者矣蓋涅其面額至今猶然太史公書北至於幽陵南至於交趾西至於龍沙東至於蟠木日月所照莫不砥屬言極南也漢武帝始置交趾郡在洛陽南萬一千里厯代置守今獨為蠻方記曰南方曰蠻雕題交趾有不火食者矣記與雕題同言則其人形必小異交州記云交趾之人出南定縣足骨無莭身有毛卧者更扶始得起山海經亦言交脛國人交脛郭璞云腳脛曲戾相交故謂之交趾今安南地乃漢唐郡縣其人百骸與華無異愛州唐薑公輔實生之何嘗有交脛等説或傳安南有播流山環數百里皆如鐡圍不可攀躋中有土田惟一竅可入而常自窒之人物詭怪不與外人通疑此是古交趾地必有能辨之者愛州秦象郡地漢武帝置九真郡後漢同晉亦屬九真郡宋齊因之梁置愛州隋為九真郡唐為愛州或為九真郡屬嶺南道貢紗絁孔雀尾領縣六九真安順崇平日南並漢居縣地無編漢舊縣又有漢西于縣故城今在縣東軍寧宋無此州福祿州土地與九真郡同唐總章初智州刺史謝法成招慰生獠昆明北樓等七千餘落以故唐林州地置福祿州或為福祿郡屬嶺南道貢白蠟紫領縣三柔遠唐林福祿宋無此州長州歷代地理與福祿州同唐立長州天寶元年曰文陽郡貢金領縣四文陽銅蔡長山其常宋無此州歡州古越裳氏國重九譯者也秦屬象郡二漢屬九真郡吳分置九德郡晉宋齊因之隋置歡州後為日南郡唐為歡州或為日南郡屬嶺南道貢金金泊黃屑象牙犀角沉香斑竹領縣四九德晉縣越裳吳縣懷歡浦陽晉縣宋無此州峯州古文朗國有文朗水亦陸梁地秦屬象郡二漢屬交趾郡吳分置新興郡晉改為新昌郡宋齊因之陳置興州隋平陳郡廢改為峰州煬帝初州廢并入交趾郡唐武德四年以交趾郡之嘉寧置峰州屬嶺南道貢銀藤器白蠟蚺蛇膽豆蔻領縣五嘉寧承化新昌並漢麊泠縣地麊音麋嵩山珠祿宋無此州陸州秦象郡地漢以來屬交趾郡梁分置黃州及寧海郡隋平陳郡廢改黃州為玉州煬帝初州廢併地入寧越郡唐復置玉州上元二年改為陸州州界有陸水或為玉山郡屬嶺南道貢銀玳瑁鼊皮翠羽甲香領縣三烏雷寧海華清宋無此州巖州土地與合浦郡同唐調露中析橫貴二州立以巖岡之地因以為名天寶時曰常樂郡屬嶺南道貢金領縣四常樂恩封髙城石巖宋無此州湯州秦屬象郡唐置湯州或為湯泉郡屬嶺南道貢金領縣三湯泉渌水羅韶宋無此州瀼州隋大將軍劉方始開此路置鎮守尋廢不通唐貞觀中清平公李宏莭尋劉方故道開置瀼州以達交趾今州在鬱林之西南交趾之東北州界有瀼水其後或為臨潭郡屬嶺南道貞元後沒於蠻夷名存而已領縣四瀼江波零鵠山𢎞遠宋無此州籠州唐貞觀十二年清平公李宏莭招降生蠻置籠州或為扶南郡屬嶺南道領縣七武勒武禮羅籠扶南龍賴武觀武江宋無此州環州唐李宏莭開招生蠻置或為正平郡屬嶺南道領縣八福零正平龍源饒勉思恩武名歌良蒙都宋無此州古州土地與瀼州同唐李宏莭開夷獠置屬嶺南道貢蠟領縣三樂山古書樂興宋無此州田州唐開元中開蠻洞立田州或為橫山郡屬嶺南道領縣五都救惠佳武龍橫山如賴宋無此州山州歷代地理與歡州同唐立山州或為龍池郡屬嶺南道領縣二貞元末廢龍池盆山宋無此州演州歷代地理與歡州同唐武德五年立歡州貞觀九年改為演州而别立歡州十六年州廢入歡州廣德二年析歡州復立本忠義郡亦曰龍池郡又曰演水郡元立六縣後廢思農武郡武容金四縣屬嶺南道領縣二忠義龍池宋無此州林州秦象郡漢日南地東漢因之晉宋以後為林邑所據隋大業中平林邑立沖州尋改為林邑郡唐初立林州貞觀九年綏懷林邑乃寄治於歡州之南境漢末日南郡象林縣功曹區連殺縣令自立為林邑王後有范熊范文范諸農相繼自立纍世不賔至隋平之立沖州後改為林邑郡唐貞觀中其君長修職貢乃於歡州南境僑立林州及林邑縣以羈縻之非正林邑也屬嶺南道貞元末廢領縣三林邑漢象林縣金龍海界宋無此州景州歷代地理與林州同隋大業元年平林邑立蕩州尋改為比景郡唐初并為七州又更名曰南景州貞觀二年綏懷林邑乃寄治於歡州之南境八年曰景州比景漢晉屬日南郡後為林邑所據比讀如芘蔭之芘晉九真太守灌邃討林邑其王范佛降乃於其國五月五日立八尺表日景在表南九寸一分故自比景以南皆開北户以向日唐於歡州南境僑立景州及比景縣非正比景也屬嶺南道貞元末廢領縣三比景由文朱吾宋無此州按演林景三州秦漢為郡縣漢末沒於林邑隋復取之唐初置此三郡至貞元間方廢而唐史地理志及杜氏通典俱不載故取歐陽忞輿地廣記中所載以補之文獻通考卷三百二十三
