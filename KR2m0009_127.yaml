body:
  text: 文獻通考卷一百二十七鄱陽馬端臨貴與著王禮考二十二山陵葬禮南郊請諡請諡於南郊先是太常寺已依例集諡號於尚書省侍從臺諫兩省官監察御史以上赴尚書省集諡郎官以上書諡考功擬諡詔恭依諡號既定翰林學士撰諡議諡議既定攝太傅上諡議投進入内次日奉皇帝命上諡冊寳於靈座前攝太傅以宰臣為之南郊請諡儀注其日文武百僚並赴南郊幕次各服其服行事官服祭服陪位官服常服吉帶有司設權置諡議匣案褥位於午階下稍西東向次設禮科御史臺閤門太常寺分引文武百僚入詣午階下之南北向立次引奉禮郎太祝太官令詣陪位班之前褥位北向立次引讀諡議官詣諡議案之後褥位立次引舉諡議官詣讀諡議官之後褥位立次禮直官引太傅詣階下稍東西向褥位立贊者曰拜在位官皆再拜奉禮郎太祝太官令升壇各就位立禮直官引太傅詣盥洗位搢笏盥手帨手執笏詣爵洗位搢笏洗爵拭爵執笏升壇詣昊天上帝神位前搢笏跪三上香奉禮郎搢笏跪奉玉幣授太傅凡執事並搢笏事已執笏太傅受玉幣奠玉幣執爵三祭酒於茅苴奠爵執笏俛伏興少立太祝跪讀祝文太傅再拜降壇復位少立禮直官再引太傅詣諡議幕權置位立舉諡議官跪舉諡議匣興執事者先捧諡議案詣昊天上帝神位前當中置於褥位太傅搢笏捧諡議匣升壇至位跪奠諡議置於案上執笏興少退立次讀諡議官詣諡議官後立舉諡議官跪舉諡議讀諡議官跪讀諡議訖復位舉諡議官奠諡議舉諡議匣興執事者先捧案降壇置於褥位舉諡議官舉匣降壇太傅後從至權置位置定太傅舉諡議官俱復位立贊者曰拜在位官皆再拜次考功郎官詣諡議權置位前立舉諡議官詣諡議案舉諡議以授考功郎官受之加於笏上退歸本班太傅率行事官詣望燎位有司取祝版幣帛升燎壇燎訖文武百僚退令書諡議官並歸次考功郎官以諡議付本部以俟書畢投進皇太后諡則攝太尉率百官詣太廟告於祖宗后諡告太廟儀注前一日有司進入内中至日文武百僚徑赴告廟處奉上冊寳太尉讀冊寳官舉冊寳官並入内於殿門外幕次俟諡冊寳降出至殿門上太尉以下迎拜訖權退俟諡冊寳入門於殿西階下東向權置位定冊北寳南太尉以下權退歸幕次有司實設酒脯排辦訖御史臺閤門分引文武百僚入就位禮直官引班首以下立定次引太尉詣殿下東西向立奉禮郎太祝太官令立於庭中北向西上立讀冊寳官舉冊寳官立於冊寳之後東向以北為上立定禮直官贊拜贊者曰拜在位官皆再拜訖先引奉禮郎太祝太官令各入就位次禮直官引太尉詣盥洗位搢笏盥手帨手洗爵拭爵執笏升階詣僖祖室香案訖搢笏跪上香再上香三上香奉禮郎西向跪奉幣太尉受幣奠幣執爵三祭酒於茅奠爵執笏俛伏興少立俟太祝東向搢笏跪讀祝文訖太尉再拜訖次詣翼祖室次詣宣祖室次詣太祖室次詣太宗室次詣真宗室次詣仁宗室次詣英宗室次詣神宗室次詣哲宗室次詣惠恭皇后室行禮並如上儀訖降階復位立禮直官引太尉詣冊權置位搢笏奉冊舉冊官搢笏舉冊至殿上當中褥位跪奠冊執笏興少退立舉冊官跪舉冊讀冊官搢笏跪讀冊文訖執笏興舉冊文訖執笏興舉冊官舉冊降階至權置位置冊後立次引太尉降階詣寳權置位搢笏奉寳舉寳官搢笏舉寳至殿上當中褥位跪奠寳執笏興少退立舉寳官跪舉寳讀寳官搢笏跪讀寳訖執笏興舉寳官舉寳降階至權置位置定於寳位後立太尉降階復位西向立禮直官贊拜贊者曰拜在位官皆再拜有司奉冊寳至幄文武百僚退太尉以下詣望瘞位立定有司瘞幣帛祝版訖各宿冊寳幄之側據紹興元年隆祐太后儀注餘依此諡冊諡寳攝太傅既率百官請諡進諡議入内訖次日候内降出諡冊諡寳官次日率百官上於靈座前攝太傅係上冊寳官又詔宰執一員奉冊寳不攝一員讀冊文攝中書令一員讀寳文攝侍中又差舉冊官舉玉官以郎中等官為之皇帝諡寳用玉一紐以執政篆寳文如髙宗諡寳則以聖武文憲孝皇帝之寳字為文餘並倣此皇后諡寳曽垂簾者用玉不曽垂簾者用金上諡冊寳於靈座前儀注前一日上諡冊寳太𫝊等官並常服黑帶去魚詣殿門外幕次太常寺贊引祗應人禮部職掌及儀衛親從官等並於殿門外隨地排立以俟進請諡冊寳内侍官請降諡冊寳將出次引奉諡冊官奉諡寳官於内侍處受冊寳於殿門上幄次權置定次禮直官贊者引太傅以下詣殿門下隨地立班再拜訖如值雨或泥濘免拜權退側身立俟有司奉迎儀衛進行太傅以下從至幄次權安奉訖太傅以下退歸本司宿齋其日文武百僚入詣幕次有司設權置冊寳褥位於殿下東向次奉諡冊寳入太傅以下行禮官並後從至殿階下東向權置位冊北寳南太傅以下權退歸幕次俟有司排辦畢備御史臺閤門太常寺分引文武百僚詣殿東裏外隨地之宜立班定次禮直官引讀冊中書令讀寳侍中詣冊寳之後褥位立次引舉寳官於讀冊中書令讀寳侍中之後立次引奉諡冊寳官詣冊寳案之東南向立次引奉上諡冊寳太傅詣殿下褥位西向立定禮直官贊太傅躬拜在位官皆再拜訖次引太傅升殿詣香案前搢笏三上香跪一酹茶三奠酒執笏俛伏興再拜訖降階復位少立次再引太傅詣殿下褥位北向俛伏跪奏稱太傅臣某言奉詔謹奉上大行皇帝諡冊寳奏訖俛伏興退復位奉諡冊官詣冊案前立次舉冊官詣冊案搢笏跪舉冊匣興凡舉冊寳皆禮部職掌助舉職掌先捧冊案升殿詣殿上香案前置於褥北向次奉諡冊官搢笏奉諡冊以引太傅詣冊匣之後搢笏興少退稍西褥位東向立舉冊官執笏興少立次引讀冊中書令升殿詣冊案之後北向立舉冊官搢笏跪舉冊讀冊中書令搢笏跪讀冊訖執笏興降復位舉冊官奠冊舉冊匣興職掌先捧冊案於殿上稍東褥位置定舉冊官舉冊匣跪置於案上舉冊官執笏興降復位初讀冊官讀冊將畢次引奉冊寳官詣寳案前舉寳官搢笏跪舉寳盝興職掌先捧寳案升詣殿上香案前置於褥位北向次奉諡寳官搢笏奉寳盝次引太傅降階於寳盝之後搢笏次奉諡寳官以寳盝授太傅太傅受訖奉諡寳官執笏退復位立次舉寳官舉行太傅升殿至褥位北向跪奠寳盝於案上太傅執笏興少退稍西褥位東向立次舉寳官執笏興少立次引讀寳侍中升殿詣寳案之後北向立舉寳搢笏跪舉寳次讀寳侍中搢笏跪讀寳訖執笏興降復位立舉寳官奠寳舉寳盝興職掌先捧寳案於殿上稍東褥位置定舉寳官舉寳盝跪於案上舉寳執笏興降復位立次引太傅降復位西向立定禮直官贊太傅躬拜在位官皆再拜如值雨泥濘随宜於殿裏外并廊上趲那立班次移班稍東進名班首出班致詞復位再拜奉慰退諡冊寳於本殿安奉令本殿官交割權行収掌至發引日降出付禮部陳列奉上諡冊寳合用擡擎諡冊寳輦官二十四人人員節級二人執擎治冊寳法物天武官二十二人人員一人儀衛皇城司親事二十人人員一人令御輦院殿前司皇城司衛仗司依數差撥照應又俟發引日於梓宫前儀衛司排列擡擎依此追諡寳冊於攢宫啓攢前三日奏告天地宗廟社稷宫觀其日俟總䕶使先差執政一員為之行啓攢禮畢奏還梓宫還殿安奉訖行事陪位官並服初喪服内不曽製孝服者常服黒帶就位立班皇帝服初喪之服詣帳即御座簾降引太常卿當幄前跪奏請皇帝行啓攢祭奠之禮簾捲前導官導皇帝出幄詣殿上褥位西向立奏請拜皇帝再拜舉哭在位官皆再拜舉哭前導皇帝詣香案前北向立奏請皇帝三上香跪内侍進茶酒奏請皇帝酹茶三奠酒俛伏興奏請少立讀祝文訖奏請哭再拜皇帝哭再拜在位官皆哭再拜前導皇帝還褥位西向立奏請拜皇帝再拜在位官皆再拜前導官導皇帝歸御幄簾降奏禮畢百官奉慰如上儀自是百僚並服初喪服朝一臨臨退不易服至發引奉辭靈駕畢易常服黒帶自啓攢後未祔廟前臨安府内外禁樂諸路准此發引三日前差官奏告用大昇轝并龍輴一副先下文思院製造總䕶使一員執政為之橋道頓遞使一員侍從為之主管梓宫前并囘程應干事務一員内侍為之並先差紹熙元年四月二十九日太常寺檢㑹故事差攝太傅持節導梓宫題冊寳監鏁元宫太常少卿執翣者障梓宫攝司徒率梓宫官升大昇轝及引梓宫即元宫又攝司空復土九鍤監察御史監鏁元宫少府監進龍輴將作監捧梓宫登龍輴兼鏁元宫宗正卿充九虞及掩元宫饗官差題虞主官并題神主官殿前司依例差彈壓將官一員甲軍一百人用鹵簿儀仗依例權以儀衛服青紫褐衫執持儀物充代主管禁衛所先相度差撥其沿路引導宿頓排設用警塲鼓吹挽歌依例係總䕶使同橋道頓遞使前二日都大主管官禮部太常寺先就貢院按閲一警塲合用金鉦一十二人鼓手六十人鳴角六十人逐色教頭共五人武嚴教頭三人管轄人員二人部押使臣一人一鼓吹合用鼓吹令丞職掌府典史引樂官共一十人歌色一十六人篳篥色三十六人笛色三十六人簫八人大鼓一十六人節鼓一人金鉦四人擡擎人兵共一十人一挽歌合用押教一人執色四十八人挽詞翰林學士中書舍人撰二十首文臣職事官各二首導引歌詞學士院撰前一日先於太常寺教習其排設鼓吹警塲及擡擎節級軍兵借差殿前歩軍司人并太常寺所差人吏職級樂正係紹興二十九年例借請本身請給一月候四日依條除尅是日行啓奠祖奠遣奠禮攝太傅後從皇帝行禮又差攝侍中少傅等官所有祭器用牙牀三張並先下文思院製造陪位行事官外餘文武百官並免立班於城外奉辭靈駕其哀諡冊寳於梓宫前禁衛内排列沿路排祭依例壓祭絹内宰相使相各五十疋侍從臺諫各三十匹管軍知省知閤御帶御藥門司直殿等各二十匹六曹郎官寺監卿少等各一十匹淳熙十四年例其經過州縣合行排祭不係經過州縣並免至攢宫前一日差官奏告紹熙五年閠十月七日橋道頓遞使司言將來梓宫發引渡江依舊例梓宫前後官司除内人船外並於前兩日渡江庶得整肅不致諠譁從之十日御史臺又言勘㑹梓宫發引日百官出城奉辭合設文臣路祭一座乞依例應臣選人並照本身料錢每三十貫文省於臨安府送納令本府排辦候畢如有支不盡錢繳納左藏庫從之大行皇后喪免設祭十一月十四日詔靈駕發引其排立禁衛諸班直親從等子并殿前司擺齪經由道路坊巷官兵折食錢依淳熙十五年例令户部日下特與倍支啓奠有司設牙牀牲牢禮饌太傅宰執總護使皇親侍中前導官及應陪位官外餘文武官並免立班徑赴城外候靈駕奉辭合行事陪位官就位立班皇帝服縗至御幄即座侍衛之官各服初喪之服簾降太史局報時前三刻太常卿當幄前跪奏請皇帝行啓奠之禮簾捲前導官導皇帝出幄詣殿上褥位西向立奏請拜舉哭皇帝再拜舉哭在位官皆再拜舉哭内侍官奉盤匜帨巾酒爵以進奏請去杖盥手帨手洗爵拭爵前導官導皇帝詣靈座前太傅後從凡升降及祖奠遣奠禮皆太傅後從奏請跪三上香進幣爵酒官西向跪進幣次進爵酒奏請受幣奠幣執爵三祭酒奠爵俯伏興奏請執杖少立哭止讀文訖奏請哭再拜皇帝哭再拜在位者皆哭再拜前導官導皇帝還褥位西向立奏請拜靈駕少駐俟權置定輦官等並權退如有皇太后即服縗服先詣梓宫前舉哭行燒香禮俟皇太后燒香禮畢然後有司設牙牀行啓奠禮有皇太子同太傅等官立班祖奠俟啓奠既徹後有司設牙牀禮饌應行事陪位官詣殿下北向立太常卿當幄前跪奏請皇帝行祖奠之禮簾