卿所奏從之今欲乞依漢唐及仁宗山陵故事虞主更不題諡俟祔廟前期一日恭依勅命書題神主詔恭依二十九年十一月十三日太常寺又言顯仁皇后將來掩攢宫合行九虞祭依禮例掩攢宫畢行第一虞其第二第三第四第五虞並係在路合於宿頓宗正卿行禮其第六虞在京日係在瓊林苑今欲乞渡江訖令宗正卿行禮禮畢迎虞主入慈寧宫奉安皇帝服袍履導於慈寧宫門外有司奉安訖皇帝行安神之禮其第七第八第九虞依典故皇帝行禮百官倍位或差有司侍祠則百官便不陪位詔恭依三十二年二月二十七日太常少卿王普言謹按通典神主之制有匱有趺其匱底蓋俱方底自下而上蓋從上而下與齊今太廟祖宗帝后主之匱有蓋無底雖於祏室牙牀各設趺座然祭享遷奉之時惟匱蓋以覆神主在中不免欹側動揺有乖嚴奉豈渡江之後失其舊制邪兹者恭文顯徳仁孝皇帝神主虞主之匱欲依通典並造底蓋仍乞漆造祖宗帝后神主匱底庶得合於禮制兼亦便於遷奉詔依第一虞至第六虞祭太常卿既行掩攢宫之禮並如遷奠之儀惟不用陪位官掩攢之後總護使以下並易常黒帶奉迎虞主依例用細仗五百人常鼓吹一百三十人下兵部太常寺差撥及神主祔廟日同山陵等使並隨還京文武百僚合出城奉迎虞主官並常服黒帶其日威儀僧道儀衛親從等並詣權安虞主幄次前排立禮直官引禮儀使升詣虞主香案前搢笏上香再上香三上香執笏降復位再拜在位官皆再拜訖次引禮儀使都大主管官以下詣虞主幄前褥位立班定禮直官贊躬拜禮儀使拜在位官皆再拜次引禮儀使升詣虞主香案前搢笏三上香執笏降復位再拜在位官皆再拜訖次引禮儀使都大主管官升詣殿幄分立定禮直官引内謁者詣虞主腰輿前俛伏跪奏稱内謁者臣某言請虞主進行奏訖俟虞主進行至宫門外禮儀使以下並權退以俟皇帝行奉迎之禮其僧道儀衛親從等止於宫門外退虞主將至皇帝自内服履袍歸御幄簾降禮直官太常博士太常卿於幄前俟虞主將至殿前扶持夾侍捧腰輿入殿禮直官太常卿當幄前俛伏跪奏稱太常卿臣某言請皇帝奉迎虞主行安神之禮奏訖俛伏興退復位簾捲前導官導皇帝出幄詣殿門内奉迎虞主升殿至殿上權駐前導官導皇帝於殿上稍東褥位少立次引内謁者詣虞主腰輿前俛伏跪奏稱内謁者臣某言請虞主降輿升座權安奉奏訖俛伏興退内侍扶捧虞主升座啓匱於後以巾覆之訖少退前導官導皇帝詣殿下褥位西向立奏請拜皇帝再拜訖前導官導皇帝升殿詣虞主香案前奏請皇帝上香再上香三上香又奏請皇帝再拜訖前導官導皇帝降階復位西向立俟内侍啓巾捧匱覆虞主訖前導官導皇帝歸御幄簾降禮直官太常博士引太常卿當幄前俛伏跪奏稱太常卿臣某言禮畢奏訖俛伏興前導官導皇帝還内百官進名奉慰次宗正卿以酒脯行安神禮如有太皇太后皇太后俟内侍奉虞主升座後前導官導皇帝權歸御幄次提舉官奏請太皇太后皇太后詣虞主前北向立内侍官啓匱於後以羅巾覆之訖少退太皇太后皇太后行安神燒香禮如宫中之儀訖退淳熙十五年二月宰執進呈虞主祭乃吉禮合用靴袍上曰只用布折上巾黒帶布袍可也第七至第九虞祭並皇帝親行禮間日而祭其日有司設牙牀牲牢醴饌行禮前御史臺閤門太常寺先引文武百官詣几筵殿裏外立班定次禮直官引讀文官詣殿上東向立進幣爵酒官詣殿上西向立酌酒官於殿上酒罇之後北向立定次禮直官太常博士引太常卿詣幄前立定皇帝入御幄簾降禮直官太常博士引太常卿當幄前俯伏跪奏稱太常卿臣某言請皇帝行虞祭之禮奏訖俯伏興退復位簾捲前導官導皇帝出幄詣殿上褥位西向立内侍啓虞主匱於後以羅巾覆之訖奏請皇帝再拜在位官皆再拜以内侍進盤匜沃内侍奏請皇帝帨手内侍進爵又奏請皇帝洗爵内侍進巾又奏請皇帝拭爵訖前導官導皇帝詣虞主前奏請皇帝跪三上香進幣爵酒官搢笏跪先進幣次進爵酒又奏請皇帝受幣奠執爵三祭酒於茅苴奠爵訖俛伏興又奏請少立讀祝文官搢笏跪讀祝文訖奏請拜皇帝再拜在位官皆再拜前導官導皇帝還褥位西向立奏請拜皇帝再拜在位官皆再拜訖内侍啓虞主巾捧匱覆虞主訖前導官前導皇帝歸御幄簾降禮直官太常博士次引太常卿當幄前俛伏跪奏稱太常卿臣某言禮畢訖俛伏興退復位前導官退陪位行事官以次退文武百僚進名奉慰第八第九虞並如上儀第七第八第九虞祭禮例間日行禮九虞既畢以祔廟前二日皇帝親行卒哭之禮如太史局所選祔廟日辰稍遠則合三日一虞九日行九虞禮畢以祔廟前二日卒哭大行皇后掩攢後行禮行第一虞虞主將囘行第二虞禮畢奉迎几筵殿安奉皇帝行安神燒香禮如宫中之儀畢次行第三虞第四虞第五虞第六虞第七虞第八虞第九虞並係太常卿行事逐日一祭祭禮畢次行卒哭祭次迎奉祔廟卒哭其日有司設牙牀牲牢禮饌行事陪位官就位立班皇帝御幄簾降次引皇太子宰執從駕官立班太常當幄前跪奏請皇帝行卒哭之祭簾捲前導皇帝出幄詣殿上褥位西向立内侍啓虞主匱於後以白羅巾覆之皇太后虞主覆以青羅巾奏請拜皇帝再拜在位官皆再拜内侍奉盤匜帨手巾酒爵以進奏請皇帝盥手帨手洗爵拭爵前導官前導皇帝詣虞主前奏請皇帝跪三上香進幣爵酒官跪進幣次進爵酒奏請皇帝受幣奠幣執爵酒三祭酒於茅苴奠爵俛伏興奏請少立讀祝文官跪讀祝文訖奏請拜皇帝再拜在位官皆再拜前導官導皇帝還褥位西向立内侍啓虞主巾捧匱覆虞主前導官導皇帝歸御幄簾降奏禮畢百官進名奉慰大行皇后卒哭係南班宗室正任行禮百官吉服赴後殿門進名奉慰神主祔廟用細仗二百人紹興十五年四月添作五百人差官奏告仍行享太廟别廟禮差初獻亞獻官差侍從一員題祔廟神主神主祔廟合添一室先令兩浙運司計㑹太常寺修盖又造室牌一面先進請御書修製畢皇帝行寧神奉辭之禮其日儀仗鼓吹僧道儀衛等於門外排立皇帝詣几筵殿前御幄簾降太常卿當幄前跪奏請皇帝行寧神奉辭之禮簾捲前導官導皇帝出幄詣几筵殿上褥位西向立内侍啓虞主匱於後以白羅巾覆虞主訖皇太后虞主則用青羅巾奏請拜皇帝再拜前導官導皇帝詣虞主香案前奏請皇帝三上香又奏請皇帝再拜前導官導皇帝詣殿門外御幄簾降輦官擎腰輿詣几筵殿下置定内謁者詣虞主前跪奏請虞主降座升輿進行奏訖内侍啓羅巾以匱覆虞主扶持夾侍捧腰輿官奉虞主升腰輿輦官擎輿進行虞主將至宫門御幄簾捲前導官導皇帝歩導虞主進行至宫門前導官導皇帝詣褥位西向立内謁者侍虞主前跪奏請虞主少駐扶侍夾侍輦官以下並權退有司陳香案等前導官導皇帝詣香案前北向奏皇帝再拜又奏請皇帝三上香又奏請皇帝再拜前導官導皇帝歸御幄簾降奏禮畢輦官擎虞主腰輿進行儀仗鼓吹威儀僧道儀衛前引禮儀使都大主管官後從詣太廟皇帝還内大行皇后祔廟其日以鼓吹金吾仗及本殿儀衛從物導引虞主祔太廟親王南班宗室皆騎導文武百僚吉服陪位設登歌宫駕樂舞其諡冊寳於虞主前陳列至太廟収奉於冊寳殿其虞俟祔廟畢赴太廟冊寳殿權行安奉紹興七年徽宗及顯肅皇后祔廟有司言今梓宫未還乞依景徳元年眀皇后故事行埋重虞祭祔廟之禮太常寺言檢㑹山園陵故事梓宫發引日皇帝於宣徳門外奉辭百僚於板橋奉辭其掩皇堂日奏請神靈上虞主訖埋重於皇堂隧道次行第一虞至瓊林苑行第七虞祭畢迎虞主於集英殿皇帝於殿門奉迎百僚於板橋奉迎至殿皇帝行安神燒香之禮訖次有司行第八虞至第九虞祭畢皇帝行卒哭之祭至祔廟前一日皇帝齋於垂拱殿祔廟日自集英殿導至宣徳門外奉辭有司奉虞主至太廟行祔廟之禮於故事即無該在廟門外埋重之文今來欲北附故事於祔廟前擇日自几筵殿迎重於報恩廣孝觀權行安奉是日皇帝先次几筵前燒香如行宫之儀畢還内次宰執率百僚燒香畢退禮儀使率合迎重有司奉迎詣本觀俟時奏請神靈上虞主訖埋重於本觀利方次太常卿行第一虞祭夙興第二虞祭已後每日依禮例行一虞祭至第七虞祭畢迎奉虞主還几筵殿日百僚於行宫門外奉迎至几筵殿門皇帝服履袍奉迎前導虞主升殿畢次詣逐位行禮訖還内次有司行第八第九虞祭至祔廟前二日皇帝行卒哭之禮祔廟前一日皇帝齋於内殿有司不奏刑殺文書至祔廟日皇帝自几筵殿導虞主至行宫門外奉辭畢禮儀使奉虞主詣太廟奏請神靈上神主訖以次行祔廟之禮今來欲依眀徳皇太后攢殯故事先行虞祭畢次行卒哭而後祔廟若將來迎奉梓宫到合遵用永安陵故事行改葬之禮更不立虞主從之文獻通考卷一百二十七
