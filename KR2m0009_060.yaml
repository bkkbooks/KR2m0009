body:
  text: 文獻通考卷六十鄱陽馬端臨貴與著職官考十四東宮官總叙凡三王敎世子必以禮樂樂所以脩内禮所以脩外禮樂交錯於中發形於外是故其成也懌恭敬而溫文中心也懌恱也立太傅少傅以養之欲其知父子君臣之道也言養者積浸成長也太傅審父子君臣之道以示之少傅奉世子以觀太傅之徳行而審諭之太傅在前少傅在後謂其在學時也入則有保出則有師謂燕居出入時也漢班彪上書曰昔成王為孺子出則周公召公入則太顛閎天南宫适散宜生左右前後皆正禮是以敎諭而徳成也師也者敎之以事而諭諸徳者也保也者慎其身以輔翼之而歸諸道者也慎其身者謹安䕶之秦漢以下始加置詹事中庶子及諸府寺等官亦有以他官而監䕶者漢孝宣帝欲令中郎将許舜監䕶太子家疏廣以為示狭非所以廣太子也後漢順帝立太子居承光宮以侍御史种暠監䕶有中常侍卒乘衣車来載太子太子太傅杜喬憂懼不能止開門将出而暠至手劍當車曰太子國之儲副人命所繋常侍来無尺一何以得将太子去何知不與内寵姦臣共挟邪謀今日之事有死而已乃遣喬詣臺啓白得中奉敕乃聽之自魏眀帝以後久曠東宫制度闕廢官司不具吳孫權即位孫登為太子兼置四友等官以諸葛恪為左輔張休為右弼顧譚為輔正都尉陳表為翼正都尉是為四友於是東宫號為多士晋初詹事左右率庶子中舎人諸官並未置惟置衛率令典兵二傅并攝衆事至咸寜元年始置詹事以領宮事宋孝武置東宫率更令等官其中庶子庶子中舎人舎人洗馬各減舊員之半後周加置太子諫議貟四人至隋罷詹事分東宫置門下坊典書坊北齊已有典書坊以分統諸局北門下内史二省門下坊有左庶子二人内舎人四人録事二人統司經宫門内直典膳藥藏齋師等六局典書坊有右庶子二人舎人通事舎人各八人領内坊唐置詹事府以統衆務置左右二春坊以領諸局龍朔二年改門下坊為左春坊典書坊為右春坊咸亨初復舊景雲元年又改為之左春坊置左庶子二人中允二人司議郎四人錄事二人左諭德一人左贊善大夫五人崇文館校書郎八人亦統六局六局之中唯改齋師為典設餘局名與隋同其六局長官唯司經置洗馬宫門置大夫餘各置監以局名冠之所職如其名龍朔中改宫門大夫及諸監並為郎遂為永制也右春坊置右庶子二人中舎人二人舎人四人録事二人右諭徳一人右贊善大夫五人通事舎人八人兼領内坊内坊置典内二人掌閤内諸事諸坊局小吏各有差因隋制也宋仍唐制東宮有六傅下至率更令僕右官存而無職司至道元年建儲闈置賓客二人左右庶子諭徳中舎各一人並以他官兼充左右春坊鑄印置吏貟及太子登極則省春坊司累朝皆然真宗在東宫建堂習射名繼照堂有勾當官三人以諸司使及内侍充仁宗在東宫肄學建堂名資善堂有都監一人以入内侍都知押班充太子六傅太子師保二傅殷周已有逮乎列國秦亦有之孝公時商鞅設法黥太子師傅是也漢高帝以叔孫通為太子太傅位次太常後亦有少傅髙帝東征留太子監闗中兵謂張良曰子房雖病彊卧而傅太子時叔孫通為太傅留侯行少傅事又䟽廣字仲翁為太傅兄子受為少傅父子並為師傅朝廷以為榮又韋元成丙吉並為太傅又匡衡王丹並為少傅後漢太傅禮如師不領官屬而少傅主太子官屬漢魏故事太子於二傅執弟子禮皆為書不曰令少傅稱臣而太傅不臣吳薛綜綜子瑩瑩子兼三代並為太子少傅晉太始三年武帝始建置東宫各置一人尚未置詹事官事無大小皆由二傅少傅立草太傅書真以為儲訓並有功曹主簿五官秩與後漢同皇太子先拜諸傅然後答之如弟子事師之禮二傅不得上䟽曲敬武帝後以儲副體尊遂命諸公居之以本位重故或行或領時侍中任愷武帝所親敬復使領之盖一時之制也咸康元年以給事黄門侍郎楊珧為詹事掌宫事二傅不復領官屬及楊珧為衛将軍領少傅復省詹事遂崇廣傅訓命太尉賈充領太保司空齊王攸領太傅所置吏屬復如舊二傅皆進賢兩梁冠黑介幘五時朝服佩水蒼玉晉令曰太子太保銀印青綬其後太尉汝南王亮車騎将軍楊駿司空衛瓘石鑒皆領傅保猶不置詹事以終武帝之代惠帝元康元年復置詹事二傅給菜田六頃田騶五十人夏後不及田者食俸一年給赤耳安車一乘又愍懐建宫乃置六傅三太三少以景帝諱師故改太師為太帥通省尚書事詹事文書闗由六傅職官要錄曰晉太子六傅各有丞一人自元康之後諸傅或三或四或六渡江之後有太傅少傅不立師保宋有太傅少傅各兼丞一人其保傅並銀章青綬齊與宋同武帝時以王儉為少傅舊太子敬二傅同至是朝議接少傅以賔友之禮梁太傅位視尚書令少傅視左僕射職官要錄曰三少舊視左僕射冠服同三太也陳因之自宋以下惟有傅而無師保後魏有太師太傅太保謂之東宫三師少師少傅少保謂之東宫三少孝眀在東宫宣武皇帝欲以霍光為太子師傅光固辭帝令太子南靣再拜宫臣皆從太子拜光北靣立不敢答拜唯西面拜謝而出乃授光太子少傅北齊皆有之出則三師在前三少在後後周不置隋與北齊同唐六傅不必備唯其人太子出則乘輅備儀以為後從貞觀中太宗撰太子接三師之儀出殿門迎太子先拜三師答拜每門讓三師坐與三師書前名惶恐後名惶恐再拜先天元年十二月詔東宮三師三少宜開府置令丞各一人𨽻詹事府尋罷宋朝師傅不常設仁宗升儲置三少各一人李文定公昉以參知政事兼掌賔客及陞左相遂進兼少傅此宰相兼官僚之所從始也丁謂兼少師馮拯兼少傅曹利用兼少保是時實為東宫官餘多以前宰執為致仕官若太子太師太傅太保以待宰相官未至僕射者及樞密使致仕亦隨本官高下除授太子少師少傅少保以待前執政其少師非經顧命不除若本官至尚書即除少傅丞郎給諫只除少保若因遷轉則遞進一官至太師即遷司空矣天禧末皇太子同聽政乃以首相兼少師樞密曹利用兼賔客自後神宗欽宗孝宗光宗在東宫皆不置開禧三年史同知彌逺自詹事入樞府乃進兼賔客已而太子侍立遂以錢丞相象祖兼太子少傅眀年景獻太子立並置二相錢左相改兼少師史右相兼少傅未幾右相丁内艱左相亦去位又眀年右相起復遂進兼少師焉太子賔客漢髙帝時有四人年老以上慢侮逃匿山中義不為漢臣謂之四皓東園公綺里季夏黄公甪里先生髙帝不能致及将廢太子太子迎四人至侍從太子鬚眉皓白衣冠甚偉髙帝旣見曰煩公幸卒䕶太子太子由是不廢至孝武帝又爲太子立博望苑使通賔客晉元康元年愍懐太子始之東宮惠帝詔曰遹㓜蒙今出止東宫雖賴師傅羣賢之訓其逰處左右宜得正人能相長益者太保衛瓘司空隴西王泰太子太傅楊濟太子少師裴楷太子少傅華廙各道義之門有不肅之訓其令五人更往来與太子習數備賔友也其時雖非官而謂之東宫賓客皆選文義之士以侍儲皇其後無聞唐顯慶元年正月以太子太傅兼侍中韓瑗中書令来濟禮部尚書許敬宗左僕射兼太子少師于志寜並為皇太子賓客遂為官貟定置四人掌調䕶侍從規諫凡太子有賔客之事則為上齒盖取象於四皓焉資位閑重其流不雜天寶中賀知章自太子賓客度為道士還鄉捨宅為觀元宗賦詩贈别時議榮之宋至道元年建儲乃置賓客二人以他官兼天禧四年參政任中正樞副錢惟演參政王曾並兼太子賓客執政兼東宫官自此始中興後賔客罕除開禧三年景憲太子立始以執政兼賓客後復省太子詹事少詹丞主簿司直詹事秦官應劭曰詹省也給也漢因之掌皇后太子家皇后太子各置詹事隨其所在以名官漢官曰詹事位長秋上亦宦者主中諸官後漢志曰初成帝鴻嘉三年省詹事職并大長秋是後皇后當法駕出則中謁中宦者職吏權兼詹事奉引訖罷官者誅後尚書選兼職吏一人奉引此皆皇后詹事也漢時太子門大夫庶子洗馬舎人皆屬二傅其太子家令丞率更令丞僕中盾衛率等官並屬詹事後漢省詹事而太子官悉屬少傅魏復置詹事領東宫衆務晉不置至咸寜元年復置以掌宮事事具六傅篇及永康中復不置自太安以来又置終孝懐之代其職擬尚書令掌三令四率中庶子庶子洗馬舎人等官銀印青綬介幘進賢兩梁冠綘朝服佩水蒼玉宋與晉同齊置府領官屬齊沈文季為太子詹事梁陳任總宫朝後魏有太子左右詹事北齊東宫衆事無大小皆統之領三寺二坊及左右衛後周置太子宫正宫尹隋開皇初置詹事二年罷之唐復置詹事府詹事一人掌内外衆務紏弹非違總判府事置少詹事一人以貳之龍朔二年改詹事為端尹詹事府為端尹府少詹事為少尹咸亨初復舊垂拱元年又改詹事為宮尹少詹事為少尹神龍初復舊丞秦官漢因之後漢省魏晉隋詹事省置至晉永康中詹事特置丞一人掌文書闗通六傅過江多用員外郎遷尚書郎宋齊因之梁陳制一梁冠皁朝服銅印墨綬後魏北齊並有之後魏楊昱字元略為詹事丞孝眀為太子尚在懐抱其所出入唯乳母而已不令官僚聞知昱諌曰太子動止宜令翼從陛下若召太子必降手勅令臣下咸知乃詔曰自此已後非朕手勅勿令児出宫宫臣在直從至萬嵗門隋初置一人唐置二人掌文武官簿帳朝集假使分判府事主簿一人晉始置自後歴代皆有唐因之掌府事勾稽監印紙筆司直二人唐龍朔三年置桂坊比御史臺置令一人比大夫司直二人比侍御史掌彈劾宫府寮其後廢桂坊以司直𨽻詹事府宋東宫官有詹事仁宗陞儲置詹事二人神宗欽宗陞儲並置二人皆以他官兼登位後省乾道元年莊文太子立置詹事二人踰月詔太子詹事遇東宮講讀日並往陪侍七年光宗正儲位以敷文閣直學士王十朋敷文閣待制陳良翰為太子詹事不兼他官非常制也太子庶子中允人司議郎事舎諭徳中舎人崇舎人學通贊善文舘士洗馬内直文學典設校書等正字宫門郎典膳藥藏古者天子有庶子之官周官謂之諸子職諸侯卿大夫之庶子掌其戒令與其敎理有大事則帥國子而致於太子惟所用之秦因之置中庶子庶子員宋志云後漢置中庶子按齊人鄒陽上疏云秦皇帝任中庶子蒙嘉之言而匕首竊發則秦官眀矣漢因之有庶子員五人史丹王商歐陽地餘並為中庶子王莽改曰中尚翼子後漢員五人職如侍中而庶子無員職如三署中郎凡庶子主宮中并諸吏之適子及支庶版籍魏因之在吴為親近之官晉中庶子庶子各四員職比散騎常侍及中書監令皆以俊茂者為之或以郡守參選鄭黙為中庶子朝廷以為太子官屬宜稱陪臣黙上言皇太子體皇極之尊無私於天下宫臣皆受命天朝不得同之藩國事遂施行又王珣啟以桓謙為中庶子曰東宮之選中庶子總管門下尤不可不得其才若釋奠中庶子扶左庶子扶右宋與晉同武官平巾幘綘朝服元嘉初詔二率中庶子隨太子入直上宮十四年又詔還直東宮至齊其庶子用人卑雜梁天監七年詔革選其年以太子中舎人司徒從事中郎為之凡中庶子四人以功髙者一人為祭酒行則負璽前後部䕶駕與功高中舎人一人共掌其坊之禁令庶子四人掌侍從左右獻納得失與功髙通事舎人一人共掌其坊之禁令冠服並同前代陳因梁制後魏亦有中庶子庶子官北齊門下坊中庶子四人領之典書坊庶子四人領之隋分為左右庶子各二人分統門下典書二坊事唐亦各二人分掌左右春坊事龍朔二年改左右庶子為左右中䕶咸亨初復舊左擬侍中右擬中書令貞觀中詔曰皇太子與百官書䟽未有制式近代以来例皆名目無以别貴賤今凡處分論事之書皇太子並宜稱令右庶子以下署名宣奉行書其餘與諸親及師傅等書不在此限中允司議郎司經洗馬文學校書正字典膳藥藏内直典設宮門等局郎丞崇文館並屬右春坊中舎人舎人通事舎人並屬左春坊諭徳贊善亦左右分𨽻中允後漢太子官屬有之職在中庶子下洗馬上漢制太子五日一朝其非朝日即使僕及中允朝朝請問起居其後無聞宋齊有中舎人是其職也唐貞觀初改太子中舎人為中允置二員其後復置中舎人龍朔二年又改中允為左贊善大夫咸亨元年復為中允而左贊善仍置焉中允掌侍從禮儀駮正啟奏并監藥及通判坊局事若庶子闕則監封題職擬黄門侍郎永徽三年以皇太子諱忠改為内允太子遜位而官復舊司議郎唐貞觀五年皇太子上表請置史職用司箴誡乃於門下坊置太子司議郎四人精選名士以居之龍朔中分為左右以左司議郎替司議郎以右司議郎替舎人咸亨初復舊掌侍從規諫駮正啓奏并録東宫記注分判坊事職擬給事中中舎人晉咸寜初置中舎人四人以舎人才學之羙者為之與中庶子共掌文翰在中庶子下洗馬上晉陸雲為中舎人凡奏事文書皆綜典之監和嘗藥月檢奏直臣名更直五日典文䟽如中書郎宋亦四人齊有一人梁時功髙者一人與中庶子祭酒共掌其坊之禁令陳因之後魏北齊並有之隋曰内舎人四員屬門下坊煬帝減二人唐中舎人二員掌侍從令書奏疏通判坊事擬中書侍郎永徽三年以皇太子諱忠改為内舎人太子遜位而官復舊或謂之太子中書舎人孝和實録曰王友真太子中書舎人舎人秦官也漢因之比郎中選良家子孫晁錯鄭當時並為太子舎人後漢無員更直宿衛如三署郎中凡帝初即位未有太子太子官屬皆罷唯舎人不省屬少府魏因之晉有十六人職比散騎中書侍郎從駕則正直從次直守妃出則次直從宋有四人齊有一人梁有十六人掌文記陳因梁制後魏亦有之北齊典書坊置二十人隋典書坊有八人煬帝改為管記舎人減四員唐復為太子舎人四人掌侍從表啓宣行令㫖分判坊事龍朔二年改為右司議郎咸亨元年復舊通事舎人齊中庶子屬官有通事守舎人庶子下有内典書通事舎人二人掌宣傳令㫖内外啓奏梁亦有之視南臺御史多以餘官兼職陳因之北齊門下坊有通事舎人八人至隋亦有之煬帝改為宣令舎人八員唐復為通事舎人亦有八員掌引𨗳辭見承㫖勞問左右諭德龍朔三年初置太子左右諭徳各一員掌侍從贊諭職比常侍左右贊善大夫龍朔二年置左贊善大夫替中允置右贊善大夫替中舎人咸亨元年中允舎人復舊而贊善大夫别自為官左右各五人掌侍從翊飬比諫議大夫崇文館學士魏文帝始置崇文觀以王肅為祭酒其後無聞貞觀中置崇賢館有學士直學士員掌經籍圗書敎授諸王屬左春坊龍朔二年改司經局為桂坊管崇賢館而罷𨽻右春坊兼置文學四員司直二員司直正七品上職為東宮之憲司府門北向以象御史臺也其後省桂坊而崇賢又屬左春坊後沛王賢為皇太子避其名改為崇文館其學士例與𢎞文館同洗馬秦官漢亦曰先馬如淳曰前驅也國語曰勾踐親為夫差先馬先㦯作洗後漢員十六人職如謁者太子出則當直者前驅𨗳威儀也漢選郎中補安帝時太子謁廟洗馬髙山冠非乘從時著小冠魏因之晉有八人職如謁者准祕書郎進賢一梁冠黑介幘絳朝服掌圗籍釋奠講經則掌其事餘與後漢同宋與晉同齊置一人梁有典經局又置八人掌文翰尤為清選皆取甲族有才名者為之位視通直郎陳因之北齊典經坊洗馬二人隋曰司經局置洗馬四人煬帝減二人唐司經局洗馬二人龍朔二年改洗馬為司經大夫三年改司經局為桂坊一云析司經局置桂坊司經大夫通判坊事罷𨽻左春坊咸亨初復舊掌侍奉及經史圗籍判局事文學漢時郡及王國並有文學而東宫無聞魏武置太子文學自後並無至後周建徳三年太子文學十人後省龍朔三年置太子文學四員屬桂坊桂坊廢而屬司經開元中定制為三貟掌侍奉分掌四部書判書坊事校書宋孝建中洗馬有校書吏四人自後無聞北齊有太子校書隋太子校書有六人唐四人掌讐校經籍正字隋太子正字二員煬帝改為正書唐復為正字亦置二人掌刋正文字典膳郎漢魏以来並有太子食官局至北齊門下坊始别置典膳局有監丞各二人隋如北齊之制唐典膳局有郎二人丞二人郎掌進膳嘗食之事丞貳之乾封元年皇太子久在内不出典膳丞邢文偉請減膳其年右史闕宰臣進擬數人髙宗曰邢文偉嫌我児不讀書不肯與肉喫此人甚直可用遂拜焉藥藏郎北齊門下坊領藥藏局有監丞各二人侍藥四人隋如北齊之制唐藥藏局有郎二人丞二人郎掌和劑醫藥之事丞貳之内直郎齊有太子内直兵局内直兵史二人梁有直内主璽主衣扶侍等局各置有司以丞其事陳因之北齊門下坊領殿内局有内直監二人副監四人隋如北齊制唐内直局有郎二人丞二人掌符璽繖扇几案衣服之事丞貳之典設郎南齊置居局齋庫丞二人梁齋内局各置有司以丞其事陳因之北齊門下坊有齋師局有太子齋師内閤師各二人隋如北齊制唐典設局有郎四人掌凡大祭祀湯沐洒掃鋪陳之事宮門郎秦有太子門大夫漢因之員二人漢官儀曰門大夫選四府掾屬職比郎将漢官儀曰安帝時太子謁廟門大夫乘從冠兩梁冠魏因之晉太子門大夫准公車令掌通牋表及宮門禁防宋因之梁代視謁者僕射陳因之北齊謂之門大夫坊并統伶官隋煬帝改門大夫為宮門監唐初為宫門大夫其門宫局有監郎二人丞二人郎掌東宫殿門管鑰及啟閉之事丞貳之宋制東宫官有左右庶子諭徳舊不常設每儲闈之建隨宜制官以備寮寀多以他官兼領仁宗神宗陞儲庶子諭徳各置二人欽宗陞儲置一人乾道中庶子諭徳除左不除右七年詔庶子諭徳輪日入宫仍同供職事太子侍讀侍講唐太宗為秦王府有侍講及為太子亦置焉其後或置㦯否開元初十王宅引辭學子書者入敎亦命名為侍讀而初不設侍講之官至宋神宗陞儲時始定制置侍講侍讀各一人中舎人舎人至道天禧建儲各置一人神宗欽宗登儲皆置中興後省嘉泰初始除王元實後以館職任伯起兼之慶元令太子舎人與中舎人皆從七品而中舎人又在舎人上然故事未嘗除資善堂大中祥符八年仁宗肄學始置至紹興五年孝宗以建國公就傅就禁中置學館建資善堂以范冲朱震為翊善舊制有翊善贊讀直講中興以後增置說書小學敎授開禧初皇子初封榮王命程少逸趙子中領贊讀不稱王府而以資善繋銜盖以未出閤之故乾道七年禮部太常寺言討論東宫開講并節朔賀慶辭謝禮儀宫僚講讀無已行故事當依倣講筵稍殺其禮每遇講讀詹事以下至講讀官上堂並用賔禮參見依官職序坐皇太子正席講讀官迭起如延英儀講罷復位節朔不受宫僚參賀元日冬至詹事以下牋賀謝辭初以常見之禮後離位致辭復位就坐茶湯罷詹事初上参見皇太子拜皇太子答拜庶子等初上參見皇太子拜皇太子受拜庶子諭徳及講讀官雖有坐受之禮止是五禮新儀所載兼日逐致拜之禮近例皆已不行或遇合致拜日更不參酌天禧至道故事施行並從之按天禧二年左庶子張士遜等言臣等日請資善堂參見皇太子雖令升階列拜然後跪受望令皇太子坐受參見詔不許至道元年皇太子每見賔客必先拜迎送常降階及門太子家令丞署主簿食官署典倉署司藏家令秦官屬詹事服䖍曰太子稱家故曰家令漢因之有丞主倉榖飲食職似司農少府漢代太子食湯沐邑十縣家令主之後漢則屬少傅主倉榖飲食魏因之晉又兼主刑獄榖貨飲食職比廷尉司農少府其家令率更令及僕為太子三卿太康八年進品與中庶子二率同自漢至晉家令在率更下宋則居上銅印墨綬進賢兩梁冠絳朝服主内茵褥牀几諸供中之物及官奴婢月用錢庫内鹽米車牛刑獄齊因之自宋齊以来清流者不為之至梁天監六年武帝以三卿陵替乃詔革選家令視常侍黄門陳因之後魏亦曰三卿北齊家令有功曹主簿領食官典倉司藏等三署及領内防令丞隋掌刑法食膳倉庫奴婢等煬帝改為司府令唐復為家令寺置家令一人唯不主刑法餘與隋同龍朔二年改家令寺為宫府寺家令為宫府大夫咸亨初復舊丞二人主簿一人領食官署典倉署司藏署署令各一人丞各二人丞漢家令有丞後無聞宋書云家令丞一人晉置宋齊以後並有之後周無隋家令丞二人唐因之龍朔二年改為宫府丞咸亨元年復舊掌判寺事主簿晉家令有主簿宋齊因之自後無北齊家令有主簿員隋亦然唐因之掌印并及勾舉食官署令丞漢詹事屬官有食官令長丞後漢亦有而屬少傅主飲食晉太子食官令職如太官令宋則屬中庶子齊則屬詹事掌厨膳之事梁食官局屬庶子陳因之後魏亦有北齊有食官令丞又别領器局酒局二丞隋家令寺統食官令丞令一人丞二人唐因之掌飲膳之事典倉署令後漢太子倉令屬少傅主倉榖魏以下無聞後魏有之北齊家令寺領典倉署令丞典倉署又别領園丞隋家令寺統典倉令丞令一人丞二人唐因之掌榖藏出納及醯醢庶羞之事司藏署令晉家令有主物吏四人梁有錫賜庫局丞庶子又有東宮衛庫丞北齊家令寺領司藏署令丞司藏又别領仗庫興作二局丞隋家令統司藏署令一人丞二人唐因之掌藏庫財貨營繕之事宋有主管左右春坊事二人以内臣兼同主管左右春坊事二人以武臣兼承受官一人以内侍兼仁宗神宗陞儲位並有之中興後孝宗光宗正儲位及莊文景獻太子皆置其官太子率更令丞主簿率更令秦官顔師古曰掌知漏刻故曰率更漢因之有丞主簿庶子舎人更直職似光祿勲而屬詹事後漢因之後屬少傅魏因之晉主宫殿門户及賞罰事職如光祿勲衛尉而屬詹事宋制銅印墨綬進賢兩梁冠絳朝服梁陳後魏並有之北齊領中盾署掌周衛禁防漏刻鐘鼓亦屬詹事隋掌伎樂漏刻有令丞録事各一人唐因之加掌皇族次序及刑法事龍朔二年改率更寺為司更寺改令為大夫咸亨初復舊丞主簿各一人丞後漢率更置丞一人歴代悉有唯後周無唐因隋掌判禮樂刑罰之事主簿晉置一人宋無齊有之自後無聞北齊隋又有之唐因之掌印及勾舉太子僕丞主簿廐牧署僕秦官漢因之又有長丞主車馬又有太子廐長一人亦主車馬後漢因之而屬少傅職如太僕太子五日一朝其非太子朝日即與中允入問起居魏因之晉主輿馬兼主親族如太僕宗正從駕乘安車次家令而屬詹事宋齊並有之梁視黄門郎陳因之後魏亦有北齊詹事領僕寺置令丞功曹主簿領廐牧署令隋僕寺置僕一人掌皇族親踈車輿騎乘領廐牧署令唐因之加掌儀仗喪葬而不掌親族龍朔二年改僕寺為馭僕寺改僕為大夫咸亨初復舊丞主簿各一人統廐牧署丞梁有之陳因之後魏北齊隋並有之唐因之主簿晉置宋無齊有之梁陳後魏無北齊隋皆有之唐因之廐牧署令丞漢有太子廐長丞屬詹事後漢亦有而屬少傅主車馬魏晉因之齊東宮屬有内廐局外廐局皆有丞梁陳因之後魏有之北齊則曰廐牧署令丞車輿局丞隋僕寺統廐牧署令丞唐因之掌車馬閑廐牧畜之事左右衛率府副率長史以下官屬衛率府秦官漢因之屬詹事後漢主門衛徼循衛士而屬少傅魏因之晉武帝建東宫置衛率初曰中衛率太始五年分為左右衛率各領一軍惠帝時愍懐太子在東宫又加前後二衛率晋志曰凡太子出前衛率導在前黄麾