承平之制移置居䨇闕之左登聞鼓院古者朝有誹謗之木敢諫之皷所以通治道而来諫者也宋朝曰鼓司以内臣掌之鼓在宣徳門南街北廊至道三年命太子中舎王濟勾當皷司用朝臣勾當自此始景徳四年詔改為登聞鼓院掌諸上封而進之以達萬人之情𨽻司諫正言凡文武臣寮閤門無例通進文字並先經登聞鼓院進状未經鼓院者檢院不得収接建炎元年因舊制置局於闕門之前髙宗即位於南亰召李綱為宰相綱奏曰今艱難之際四方休戚利害日欲上聞而士民之願効其智慮者尤多而檢院鼓猶未置恐非所以通下情而急先務也三年専𨽻諫院進奏院唐藩鎭皆置邸京師以大将主之謂之上都留後大歴十二年改為上都知進奏院官五代以来支郡不𨽻藩鎮補人為者聽其置邸𨽻藩鎮者兼掌焉宋緣舊制皆本州鎮補人為進奏官其軍監塲務轉運司則差知後官則副知掌之逐州就亰師各置進奏院太平興國六年諸州罷知後之名簡知後官得李楚等百五十人並充進奏官命供奉官張文璨提轄諸道進奏院監官以亰朝官及三班使臣充掌受詔勅及諸司符牒辨其州府軍監以頒下之并受天下章奏案牘状牒以奏御及分授諸司中興以来𨽻門下後省給事中㸃檢訖乾道九年依舊𨽻後省合傳報事令後省錄付報行官誥院宋初於右掖門置院四司誥身案並集於此以備中書除改本司郎官各主其事淳化五年始専置官司於省内凡官誥各以本司誥身印印之文臣用吏部武臣用兵部王公命婦用封加勲用司勲掌文武官将校誥身及封贈官誥院提舉一人以知制誥充判院一人以帯職亰朝官充元豐五年行官制文武誥身屬吏部蕃官誥屬兵部封贈及命婦誥屬司封加勲并将校誥屬司勲官誥院四部誥身案及吏人隨事𨽻本部七年并司封司勲誥身案入吏部預書庫收掌崇寜四年吏部轉置造官誥局五年罷令尚書右選主管大觀元年復置尋改為官誥院仍𨽻左右司三年復罷歸吏部政和三年六月詔依舊置官誥院差官二員主管少府監鑄印記吏部製造誥身案記為文中興以来因仍不改審計院宋朝以三司使總邦計司各有院以秉中外泉榖出入之政盖㑹計之府也然案牘從委典者不能徧察而姦容焉淳化三年始用户部使樊知古奏剔其冗籍復别為院置官専領之以聴稍食之要貳置院之初特掌騎兵徒兵給受之數猶未及諸司也元豐三年合歩騎兩院為一遂以其一主諸司自宮禁朝廷下至斗食佐史凡賦禄者以式法審其名數而稽其辭受唯郊賜給已乃審禄有疑予則詔以法凡四方之計籍上於大農則逆其㑹凡有司議調度㑹賦出則諏焉設員二曰左右㕔分案六史八人其名舊為諸軍諸司専勾司建炎元年避髙宗御諱改諸軍諸司審計官糧料院宋初仍舊制以三司大将軍為都糧料使自開寶六年以著作佐郎陸光範充改用京官自此始太平興國五年分諸司馬軍歩軍為三院八年以馬軍歩軍合為一院雍熙四年命供奉官陳處晦勾當諸司糧料供奉官曾祚勾當馬歩軍糧料自後復分馬歩軍為兩院或以諸司使副分主之端拱二年復以京朝官主之元豐末併馬歩軍與諸司為二院𨽻太府寺掌以法式頒廩禄凡文武百官諸司諸軍俸料以劵准給中興以来行在有諸軍諸司糧料院鎮江建康有分差諸軍糧料院鄂州有分差户部糧料院四川總所有分差户部魚闗糧料院分差利州戸部糧料院𣙜貨務都茶塲榷貨務掌折博斛米金帛之屬以朝官諸司使副内侍二人監太平興國中以先平嶺南及交趾諸國入貢通闗市議於亰師置𣙜易院大中祥符中併入𣙜貨務建炎中興又創都茶塲給賣茶引隨行在所於𣙜貨務置塲雖分兩司而提轄監官並通銜管幹建炎四年詔𣙜貨務都茶塲依舊𨽻左右司其提領措置並罷其都茶塲仍令提轄榷貨務官兼行提轄尋徙越州一務塲於建康又併眞州一務塲歸建康紹興五年詔建康鎭江兩務塲只是給賣鈔引三十二年詔三省今後選差文臣充監更不差武臣乾道六年詔依舊通差武臣先是課入不立額唯視舊嵗為等差是嵗始昈分有定數嵗總為錢二百四十萬萬行都受藏之所為數八十萬萬於建康者一百二十萬萬於鎭江者四十萬萬雜買雜賣務宋朝雜買務舊曰市買司太平興國四年改至道中廢咸平復置以亰朝及三班内侍三人監掌和市百物凡官禁官物所需以時供納雜賣務景徳四年置掌受内外幣餘之物計直以待出貨或凖折支用以内侍及三班二人監後亦差文武朝官紹興六年詔雜買務雜賣塲置提轄官一員文思院宋朝太平興國三年置掌造金銀犀玉工巧之物金彩繪素装鈿之飾以供輿輦册寳法物及凡器服之用𨽻少府監熙寜三年詔文思院兩界監官立定文臣一員武臣一員朝廷選差其内侍勾當官並罷紹興三年詔少府監併歸文思院其上下界監官從工部辟差工部言所轄文思院舊分上下界監官三員内一員文臣係亰朝官上界造作金銀珠玉下界造作銅鐵竹木雜料欲依舊分為上下界從之隆興二年詔併禮物局入文思院左藏庫掌受四方財賦之入以待邦國之經費其原盖起於周職内主賦入職歳主賦出而邦布之入出則外府又主之皆其職也晉始置左右藏令唐於左右藏分建東西庫以太府少卿知出納於左長慶門之東宋初左右止一庫置使領焉太平興國二年分為二庫淳化三年分置左右藏各二庫四年廢右併入左政和六年脩建新庫以東西庫為名中興因仍東西庫各以文臣監武臣同監其東幣帛絁紬之屬在焉其西金銀泉劵絲纊之屬在焉紹興二十七年詔户部於轄下丞簿内選一員兼充左藏庫提轄官此提轄所由始也孝宗即位詔将御前樁管激賞庫撥歸左藏庫以左藏南庫為名専一樁管應副軍期支遣於是有東西南三庫尋罷南庫大抵國家用度多靡於贍軍西蜀湖廣江淮之賦𩔖歸四總領所以餉諸屯其送京者殆無幾唯閩浙悉輸焉東西庫歳入以端計者率百四十萬以緡計者率二千萬給遣稱是而大軍居十之七宮禁百司禄賜纔三之間有非泛浩繁之費則請於朝徃徃出内帑封樁以補所闕監官凡五人分帑而治舊以京朝官為之今唯才是用故四選通得人建炎以来朝野雜記曰六院官檢鼓糧審官誥進奏也例以京官知縣有政績者為之亦有自郡守除者則繼即除郎如鹿伯可是也故恩數略視職事官而不入雜壓紹興十一年胡汝眀以料院除監察御史遂遷副端乾道後相繼入臺者有宋敦書蕭之敏陳升卿傅淇等數人而六院彌重號為察官之儲矣淳熙初龔實之秉政其内弟林宓幹辦審計司遇郊恩而林尚京秩乃白上以六院官班寺監丞之上林用是得封贈父母龔後為謝廓然所論南竄此其一事也紹興二年夏六院官始復入雜壓在九寺簿之下焉又曰六院官入雜壓事甲記已具淳熙四年既削去近歳乃復舉行其班在五寺主簿之下太學博士之上六院官通計十二人皆得轉對但不入品耳然六院以為邑有政績者為之故例為察官之選又曰四提轄謂榷貨務都茶塲雜買務雜賣塲文思院左藏東西庫是也𣙜貨務塲掌醝茗香礬鈔引之政令紹興初沿宣政舊例置提領官率以故省吏為之後乃改用士人行在建康鎭江三務塲歲入凡二千四百萬緡建康一千二百萬行在八百萬鎭江四百萬皆以都司提領不係户部之經費而在建康鎭江者分屬總領所焉開禧末以總所侵用儲積錢始徑𨽻提領官不屬總所買務賣塲盖唐宫市之遺制近制凡宮禁月料朝省紙劄文思院之製造和劑局之脩合皆所取給焉至若斥左帑封樁之幣餘編估打套則賣塲掌之紹興六年始置提轄官總其事先是四轄官外補則為州内遷則寺監丞簿亦有徑為雜監司或入三館者乾道八年十二月𣙜貨王禋除福建市舶左藏王楫除九路鑄錢淳熈七年三月熊子復自文思校書郎近歲望稍輕徃徃更遷六院官或出為添倅非曩日之比矣總宫觀宋朝設祠禄之官以佚老優賢祖宗時員數絶少官制舊典云祖宗待臣以禮雖年及掛冠未嘗直令致仕皆以宮觀處之假以祿耳熈寜以後乃增焉是時方經理時政患疲老不任事者廢職欲悉罷之乃使任宮觀以食其祿時相王安石亦欲以此處異議者遂詔宮觀毋限員並差知州人以三十月為任在亰宮觀宋朝舊制以宰相執政充使或丞郎學士以上充副使兩省或五品以上為判官内侍官或諸司使副政和改武臣官制以使為大夫副使為郎為都監又有提舉提㸃主管官其戚里近屬及前宰執留京師者多除宫觀以示優禮之意紹興二十一年在京宫觀依在外宫祠以三十箇月為任又紹興五年詔任在京觀請給人從前宰執依見任減十分之二閣學士已上依六曹侍郎直學士已上依中書舎人太中大夫已上依左右司郎中任樞密都承旨閣學士已上依天曹尚書直學士已上依六曹侍郎太中大夫已上依中書舎人宫觀使唐天寳七載以給事中楊釗充九成宫使宫使之名自此始南部新書宋朝祥符中眞宗建玉清昭應宮王魏公旦為首相始命充使宫觀置使自此始又有景靈宫會靈觀使然每為宰相兼職天聖元年呂夷簡為相時朝廷崇奉之意稍緩因請罷使名熙寜中富鄭公弼領集禧觀使居洛此宮觀使居外之所從始也徽宗建玉清萬夀宫乃命宰執兼使副用眞廟故事也近以前宰執奉朝請者領在京宫觀使而在外舊相只除提舉宫觀非祖宗優待宰相之體靖康以来猶未釐正盖朝廷未暇講也政和八年太師魯國公蔡亰少傅太宰鄭居中少保少宰余深檢校太保領樞宻院事童貫並兼充神霄玉清萬夀宮使知樞密院事鄧洵門下侍郎薛昂中書侍郎白時中尚書左丞王黼宣和殿大學士蔡攸並兼充副使渡江後前執政在經筵者不以官高卑率為觀使若他官則使相已上乃得之其居外者必官至三少乃除淳熙中崇憲靖王自節度使拜使相封郡王中書進熟擬提舉洞霄宫周文忠當制引故事宗室使相外居者當得觀使上批如所請紹熈初趙文定以使相判潼川府乞奉祠乃除醴泉觀使非舊典也開禧末陳勉之以特進罷相不帯職乃亦除觀使盖章逵之侍郎當制失之翊日李季章進呈改提舉洞霄宮合故典矣天禧以前崇觀以後宫觀使之名甚衆渡江以後宮觀不復置而觀使有三前宰相則得醴泉宗戚則得萬壽又其次則得佑神云宣政間又有提㸃宫觀官在提舉之下主管之上今省提舉宫觀宋朝眞宗時東西太一宮提舉以兩省兩制丞郎官為之掌奉齋醮之事天聖七年玉清宫災遂罷使而景靈㑹靈祥源三宮觀以學士舎人管勾李若谷罷參政為資政殿大學士提舉會靈觀自是學士待制知制誥皆得為提舉晏元獻以舊相提舉萬壽觀武臣李端愿止得管勾祥源觀今朝官亦云提舉非故事也在外宮觀嶽祠宋朝宫觀皆俟力請而後授侍從而上任宮觀者絶少若因責降改作主管方且差焉熙寜初王安石相異已者方直除宫觀大抵宮觀非自陳而朝廷特差者如降黜之例二年詔杭州洞霄宫亳州眀道宫華州雲臺觀建州武夷觀台州崇道觀成都府玉局觀建昌軍仙都觀江州太平觀洪州玉隆觀五嶽廟並依嵩山崇福宮舒州靈仙觀置管勾或提舉提㸃官四年詔宫觀嶽廟留官一員餘聽如分司致仕例從便居住六年詔卿監職司以上提舉餘官管勾當者又詔年六十以上者乃聽差毋過兩任兼用執政恩例者通不得過三任後蔡京用事增廣職任崇寜三年添宫觀十政和三年添宫觀三十名見續㑹要多不錄選人亦許乞嶽廟宣和王黼用事外開新邊以熙寜法革之一切不恤士夫於是失祿矣文獻通考卷六十
