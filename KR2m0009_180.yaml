body:
  text: 文獻通考卷一百八十鄱陽馬端臨貴與著經籍考七經禮漢藝文志曰帝王質文世有損益至周曲為之防事為之制師古曰委曲防閑每事為制也故曰禮經三百威儀三千韋昭曰周禮三百六十官也三百舉成數也臣瓉曰禮經三三百謂冠婚吉凶周禮三百是官名也師古曰禮經百韋說是也威儀三千乃謂冠婚吉凶葢儀禮是及周之衰諸侯將踰法度惡其害已皆滅去其籍自孟子時而不具至秦大壊漢興魯髙堂生傳士禮十七篇訖孝宣時后蒼最明戴徳戴聖慶普皆其弟子三家立扵學官禮古經者出扵魯淹中蘓林曰里名也及孔氏學七十篇文相似多三十九篇及明堂隂陽王史氏記所見多天子諸侯卿大夫之制雖不能備猶瘉倉等推士禮而致扵天子之說師古曰瘉與愈同愈勝也也劉氏曰孔氏學七十篇即安國所得壁中書學七十當作學十七五十六篇除十七正多三十九也隋經籍志曰漢初有髙堂生傳十七篇又有古經出扵淹中而河間獻王好古愛學收集餘燼得而獻之合五十六篇並威儀之事而又得司馬穰苴兵法一百五十五篇及朙堂隂陽之記並無敢傳之者唯古經十七篇與髙堂生所傳不殊而字多異自髙堂生至宣帝時后蒼最朙其業乃為曲臺記蒼授梁人戴徳及徳従兄子聖沛人慶普扵是有大戴小戴慶氏三家並立後漢唯曺元傳慶氏以授其子褒然三家雖存並微相傳不絶漢末鄭𤣥傳小戴之學後以古經校之取其扵義長者作注為鄭氏學其喪服一篇子夏先傳之諸儒多為注觧今又别行而漢時有李氏得周官周官葢周公所制官政之法上扵河間獻王獨闕冬官一篇獻王購以千金不得遂取考工記以補其處合成六篇奏之至王莽時劉歆始置博士以行扵世河南緱氏杜子春受業扵歆因以教授是後馬融作周官傳以授鄭𤣥𤣥作周官注漢初河間獻王又得仲尼弟子及後學者所記一百三十一篇獻之時亦無傳之者至劉向考校經籍檢得一百三十篇向因第而叙之而又得朙堂隂陽記三十三篇孔子三朝記七篇王氏史氏記二十一篇樂記二十三篇凡五種合二百十四篇戴徳刪其煩重合而記之為八十五篇謂之大戴記而戴聖又刪大戴之書為四十六篇謂之小戴記漢末馬融遂傳小戴之學融又足月令一篇眀堂位一篇樂記一篇合四十九篇而鄭𤣥受業於融又為之注今周官六篇古經十七篇小戴記四十九篇凡三種唯鄭注立扵國學其餘並多散亡又無師說漢志凡禮十三家五百五十五篇按三代之禮其流傳扵漢世周官儀禮戴記三書而已藝文志所述皆三書也然其末則以古封禪羣祀二十二篇封禪議對十九篇漢封禪羣祀三十六篇議奏三十八篇繼之而皆以為禮家按封禪秦漢之事難厠其書扵禮經之後今析入儀注門凡削四家一百一十五篇云隋志一百三十六部一千六百二十二家通計亡書二百一十一部二千一百八十六卷唐志六十九家九十六部一千八百二十七卷失姓名七家元行沖以下不著録十六家一百九十五卷宋三朝志四十部一千五十六卷内十一部入儀注門宋兩朝志三部五十二卷内一部入儀注門宋四朝志二十五部三百六十七卷内一部入儀注門宋中興志六十四家九十一部一千二百六十五卷儀禮注十七卷韓文公讀儀禮余嘗苦儀禮難讀且又行扵今者葢寡沼襲不同復之無由考扵今誠無所用云然文王周公之法制具在扵是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度邪扵是掇其大要竒辭奥㫖著扵篇學者可觀焉惜吾不及其時揖讓進退扵其間嗚呼盛哉鼂氏曰儀禮十七篇鄭氏注西漢諸儒得古文禮凡五十六篇髙堂生傳士禮十七篇為儀禮喪服傳一卷子夏所為其說曰周禮為本聖人體之儀禮為末聖人履之為本則重者在前故宗伯序五禮以吉凶賔軍嘉為次為末則輕者在前故儀禮先冠婚後䘮祭朱子語録知看儀禮有緒甚善此書雖難讀然却多是重複倫類若通則其先後彼此展轉參照足以互相發眀久之自通貫也禮書如儀禮尚完備如他書儀禮是經禮記是觧儀禮且如儀禮有冠禮禮記便有冠義儀禮有昏禮禮記便有昏義以至燕射之禮莫不皆然只是儀禮有士相見禮禮記却無士相見義後来劉原甫補成一篇學禮記下言語只是觧他儀禮儀禮不是古人預作一書如此初間只是以義起漸漸相襲行得好只管巧至扵情文極細宻極周緻處聖人見此意思好故録成書今儀禮多是士禮如河間獻王得古禮五十六篇乃孔壁所藏之書其中却有天子諸侯禮所以班固言愈扵推士禮以致天子諸侯之禮是班固作漢書時其書尚在鄭康盛亦及見之今注疏中有引援處不知是甚時失了可惜漢時儒者專門名家自一經之外都不暇講故先儒謂聖經不亡於秦火而壊扵漢儒其說亦好温公論景帝太子既亡當時若立獻王為嗣則漢之禮樂制度必有可觀陳振叔亦儘得見其說儀禮云此乃儀更須有禮書儀禮只載行禮之威儀所謂威儀三千是也禮書如云天子七廟諸侯五大夫三士二之類是說大經處這是禮須自有箇文字儀禮疏五十卷鼂氏曰唐賈公彦撰齊黄慶隋李孟悊各有疏義公彦刪二疏為此書國朝嘗詔邢昺是正之朱子語録曰儀禮疏說得不甚分眀先公儀禮注疏序曰余生五十八年未嘗讀儀禮之書一日従敗箧中得景徳中官本儀禮疏四帙正經注語皆標起止而疏文列其下葢古有朙經學究專科如儀禮經注學者童而習之不待屑屑然登載本文而已熟其誦數矣王介甫新經既出士不讀書如余之扵儀禮者皆是也然不敢付之茫昧幽冥將尋訪本書傳抄庶幾創通大義然余老矣懼其費日力而卒無所補也長児䟦曰家有監本儀禮經注可取而附益之以便觀覧意欣然命之整緝釐為九帙手自㸃校并取朱氏禮書與其門人髙弟黄氏楊氏諸家續補之編分章析條題要其上遂為完書拊而歎曰兹所謂儀禮者歟韓昌黎之言豈欺我哉其為書也扵竒辭奥㫖中有精義妙道焉扵纎悉曲折中有朙辨等級焉不惟欲人之善其生且欲人之善其死不惟致嚴扵冠昏朝聘鄉射而尤嚴扵喪祭後世徒以其推士禮而逹之天子以為殘闕不可考之書徐而觀之一士也天子之士與諸侯之士不同上大夫與下大夫不同等而上之固有可得而推者矣周公之經何制之備也子夏之傳何文之竒也康成之注公彦之疏何學之博也小子識之古禮十七卷釋文一卷釋誤三卷陳氏曰永嘉張淳忠甫所校乾道中太守章貢曾逮仲躬刻之首有目録一卷載大小戴劉向篇第異同以古監本巾箱本杭細本嚴本校定識其誤而為之序謂髙堂生所傳士禮爾今此書兼有天子諸侯卿大夫禮決非髙堂所傳其篇數偶同自陸徳朙賈公彦皆云然不知何所據也朱子曰張淳云如劉歆所言則髙堂生所得獨為士禮而今儀禮乃有天子諸侯大夫之禮居其大半疑今儀禮非髙堂生之書但篇數偶同耳此則不深考扵劉說所訂之誤又不察其所謂士禮者特略舉首篇以名之其曰推而致扵天子者葢專指冠昏喪祭而言若燕射朝聘則士豈有是禮而可推邪朱子語録曰儀禮人所罕讀難得善本而鄭注賈疏之外先儒舊說多不復見陸氏釋文亦甚疏略近世永嘉張淳忠甫校定印本又為一書以識其誤號為精宻然亦不能無舛謬張忠甫所校儀禮甚子細然却扵目録中冠禮𤣥端處便錯了但此本較他本為最勝又謂漢初未有儀禮之名疑後學者見十七篇中有儀有禮遂合而名之古禮經傳通觧二十三卷集傳集注十四卷陳氏曰朱熹撰以古十七篇為主而取大小戴及他書傳所載繋扵禮者附入之二十三卷已成書闕書數一篇其十四卷草定未刪改曰集傳集注云者葢此書初名也其子在刻之南康一切仍其舊云中興藝文志熹書為家禮三卷鄉禮三卷學禮十一卷邦國禮四卷王朝禮十四卷其曰儀禮經傳通觧者凡二十三卷熹晚歳所親定惟書數一篇缺而未補其曰儀禮集傳集注者即此書舊名凡十四卷為王朝禮而卜筮篇亦闕熹所草定未及刪改朱子語録曰儀禮禮之根本而禮記乃其枝葉禮記本秦漢上下諸儒觧釋儀禮之書又有他書附益扵其間今欲定作一書先以儀禮篇目置扵前而附禮記扵其後如射禮則附以射義似此類已得二十餘篇若其餘曲禮少儀又自作一項而以類相従若疏中有說制度處亦當采取以益之禮書異時必有兩本其據周禮分經傳不多取國語雜書迂僻蔓衍之説者吾書也其黜周禮使事無統紀合經傳使書無間别多取國語雜記之書使傳者疑而習者蔽非吾書也答應仁仲書曰前賢常患儀禮難讀以今觀之只是經不分章記不隨經而注疏各為一書故使讀者不能遽曉今定此本盡去諸弊恨不得令韓文公見之也先公曰愚按記不隨經注疏各為一書讀者不䏻遽曉此猶古易之彖象文言繋辭各自為書鄭康成所以欲省學者兩讀而為今易也文公扵禮書之離者合之扵易書之合者離之是亦學者所當知也古禮經傳續通觧二十九卷陳氏曰外府丞長樂黄榦直卿撰榦晦庵之壻號勉齋始晦庵著禮書喪祭二禮未及論次以屬榦續成之朱子語録賀孫因問祭禮附祭儀如說孝許多如何来得曰便是祭禮難附兼祭儀前所説多是天子禮若儀禮所存唯少牢饋食特牲饋食禮是諸侯大夫禮兼又只是有饋食若天子祭便合有初間祭腥等事如所謂建設朝事燔燎羶薌若附儀禮此等皆無入頭處意問欲將周禮中天子祭禮逐項作一總腦却以禮記附如疏中有說天子皆編出因云某已衰老其間合要理會文字皆起得箇頭在及見其成與不見其成皆未可知萬一不及見此書之成諸公千萬勉力整理得成此書所係甚大古禮扵今實是難行當祭之時獻神處少只說酌奠卒祝迎尸以後都是人自食了主人獻尸尸又酢主人酢主婦酢祝及佐食宰賛衆賔等交相勸酬甚繁且久所以季氏之祭至扵繼之以燭竊謂後世有大聖人者作與他整理一過令人蘓醒必不一一如古人之繁但放古人大意簡而易行耳温公儀人所憚行者只為閑辭多長篇浩翰令人難讀其實行禮處無多某嘗修祭儀只就中間行禮處分作五六叚甚簡易曉後被人竊去亡之矣信齋楊氏序曰昔文公朱先生既修家鄉邦國王朝禮以喪祭二禮屬勉齋黄先生編之先生服膺遺訓取向来喪禮藁本精專修改書成凡十有五卷復伏讀曰大哉書乎秦漢而下未有也近世以来儒生習誦知有禮記而不知有儀禮士大夫好古者知有唐開元以後之禮而不知有儀禮今因其篇目之僅存者為之分章句附傳記使條理朙白而易考後之言禮者有所据依不至扵棄經而任傳遺本而宗末王侯大夫之禮闗扵綱常者為尤重儀禮既闕其書後世以来處此大變者咸幽冥而莫知其原取具臨時沿襲鄙陋不經特甚可為慨嘆今因小戴喪大記一篇合周禮禮記諸書以補其闕而王侯大夫之禮莫不粲然可考扵是喪禮之本末經緯莫不悉備既而又念喪禮條目散濶欲撰儀禮喪服圖式一卷以提其要而附古今沿革扵其後草具甫就而先生沒矣嗚呼此千載之遺憾也先生所修祭禮本經則特牲少牢有司徹大戴禮則釁廟以上四卷未分章句入注疏所補者則自天神地祗百神宗廟以至因事而祭者如建國遷都廵狩師田行役祈禳及祭服祭器事序始終其綱目尤為詳備先生嘗為復言祭禮用力甚久規模已定每取其書繙閱而推朙之間一二條方欲加意修定而未遂也嗚呼禮莫重扵喪祭文公以二書屬之先生其責任至不輕也先生扵二書也推朙文王周公之典辨正諸儒異同之論掊撃後世蠧壊人心之邪説以示天下後世其正人心扶世教之功至逺也而喪服圖式祭禮遺藁尚有未及訂定之遺恨後之君子有能繼先生之志者出而成之是先生之所望也抑復又聞之先生曰始余創二禮粗就奉而質之先師先師喜謂余曰君所立喪祭禮規模甚善他日取吾所編家鄉邦國王朝禮其悉用此規模更定之嗚呼是又文公拳拳之意先生欲任斯責而卒不果也豈不痛哉同門之士以復預聞次輯之略不可以無言也復因敬識其始末以告来者喪禮一十五卷前以繕寫喪服圖式今别為一卷附扵正卷帙之外以俟君子亦先生平日之志云又曰嘉定己邜喪禮始克成編以次將修祭禮即以其書稿本授復曰子其讀之葢欲復通知此書本末有助纂輯也復受書而退啟緘伏讀皆古今天下大典禮其闗係甚重其條目甚詳其經傳異同註疏牴牾上下數千百載間是非淆亂紛錯甚衆自此朝披夕閱不敢釋卷時在勉齋左右隨事咨問抄識以待先生筆削不幸先生即世遂成千古之遺憾日邁月征今十餘年南康學宫舊有家鄉邦國王朝禮及張侯虙續刋喪禮又取祭禮稿本併刋而存之以待後之學者故四方朋友皆有祭禮稿本未有取其書而修定之者顧復何人敢任其責伏自惟念齒髮浸衰曩日幸有所聞不可不及時傳述竊不自揆遂据稿本參以所聞稍加更定以續成其書凡十四卷云集釋古禮十七卷釋宫一卷綱目一卷陳氏曰廬陵李如圭寳之撰紹興癸丑進士嘗為福建撫幹釋宫者經所載堂室門庭今人所不曉者一一釋之中興藝文志儀禮既廢學者不復誦習㦯不知有是書乾道間有張淳始訂其訛為儀禮識誤淳熈中李如圭為集釋出入經傳又為綱目以别章句之指為釋宫以論宫室之制朱熹嘗與之校定禮書葢習扵禮者周禮十二卷鼂氏曰鄭𤣥注漢武帝時河間獻王開獻書之路得周官有五篇失冬官一篇乃募以千金不得取考工記以補其闕至孝成時劉歆校理祕書始得序列著扵録略為羣儒排棄歆獨以為周公致太平之跡永平時杜子春初能通其讀鄭衆鄭興亦嘗傳受康成皆引之以參釋異同云陳氏曰按藝文志曰周官經六篇本注云王莽時劉歆置博士顔師古曰即今之周禮也亡其冬官以考工記足之愚嘗疑周禮六典與書周官不同周官司徒掌邦教敷五典擾兆民司空掌邦土居四民時地利二官各有攸司葢自唐虞九官禹契所職則已然矣今地官扵教事殊略而田野井牧鄉遂稼穡之事殆皆司空職耳周官初無邦事之名今所謂事典者未知定為何事書闕亡而以考工記足之天下之事止扵百工而已邪先儒固有疑扵是書者若林孝存以為武帝知周官末世瀆亂不經之書作十論七難以排棄之何休亦以為六國隂謀之書甚者或謂劉歆附益以佐王莽者也惟鄭康成博覧以為周公致太平之迹故其學遂行扵世愚按此書多古文竒字名物度數可考不誣其為先秦古書似無可疑愚所疑者邦土邦事灼然不同其他繁碎駁雜與夫劉歆王安石一再用之而亂天下猶未論也𤣥之學出扵扶風馬融而參取杜子春鄭大夫鄭司農之説子春河南緱氏人生漢末至永平初尚在年九十餘鄭衆賈逵皆受業焉大夫者河南鄭興少贛也司農者鄭衆仲師興之子也融字季長朱子語録曰周禮一書好看廣大精宻周家法度在裏許但未敢令學者看此非是不可學亦非是不當學只為學有先後先須理會自家身心合做底學周禮却自後一截事而今把来説看還有一句干渉吾人身心上事否周禮規模皆是周公做但其言語是他人做如今時宰相提舉勅令豈是宰相一一下筆有不是䖏周公須與改至小可處或未及改或是周公晚年作此書某所疑者但恐周公立下此法却不曾行得盡後世皆以周禮非聖人書其間細碎處雖可疑其大體直是非聖人做不得潁濵蘇氏曰言周公所以治周者莫詳扵周禮然以吾觀之秦漢諸儒以意損益之者衆矣非周公之完書也何以言之周之西都今之闗中也其東都今之洛陽也二都居北山之陽南山之隂其地東西長南北短短長相補不過千里古今一也而周禮王畿之大四方相距千里如畫棋局近郊逺郊甸地稍地小都大都相距皆百里千里之方地實無所容之故其畿内逺近諸法類皆空言耳此周禮之不可信者一也書稱武王克商而反商政列爵惟五分土為三故孟子曰天子之制地方千里公侯百里伯七十里子男五十里不能五十里不逹扵天子附扵諸侯曰附庸鄭子産亦云古之言封建者葢若是而周禮諸公之地方五百里諸侯四百里諸伯三百里諸子二百里諸男百里與古説異鄭氏知其不可而為之說曰商爵三等武王増以子男其地猶因商之故周公斥大九州始皆益之如周官之法扵是千乗之賦自一成十里而出車一乗千乗而千成非公侯之國無以受之吾竊笑之武王封之周公大之其勢必有所并必有所徙一公之封而子男之國為之徙者十有六封數大國而天下盡擾此書生之論而有國者不為也傳有之曰方里而井十井為乗故十里之邑而百乗百里之國而千乗千里之國而萬乗古之道也不然百乗之家為方百里萬乗之國為方數圻矣故無是也語曰千乗之國攝乎大國之間千乗雖古之大國而扵衰周為小然孔子猶曰安見方六七十如五六十而非邦也者然則雖衰周列國之强家猶有不及五十者矣韓氏羊舌氏晉大夫也其家賦九縣長轂九百其餘四十縣謂一縣而百乗則可謂一縣而百里則不可此周禮之不可信者二也王畿之内公邑為井田鄉遂為溝洫此二者一夫而受田百畆五口而一夫為役百畆而稅之十一舉無異也然而井田自一井而上至扵一同而方百里其所以通水之利者溝洫澮三溝洫之制至扵萬夫方三十二里有半其所以通水之利者遂溝洫澮川五利害同而法制異為地少而用力博此亦有國者之所不為也楚蒍掩為司馬町原防井衍沃葢平川廣澤可以為井者井之原阜堤防之間狭不可井則町之杜預以町為小頃町皆因地以制廣狭多少之異井田溝洫葢亦然耳非公邑必為井田而鄉遂必為溝洫此周禮之不可信者三也三者既不可信則凡周禮之詭異逺扵人情者皆不足信也古之聖人因事立法以便人者有矣未有立法以强人者也立法以强人此迂儒之所以亂天下也五峯胡氏曰謹按孔子定書周官六卿冢宰掌邦治統百官均四海者也今以劉歆所成周禮考之太宰掌建邦之六典夫太宰統五官之典以為治者也豈扵五官之外更有治典哉則掌建六典歆之妄也太宰之屬六十小宰也司㑹也司書也職内也職嵗也職幣也是六官之所掌辭繁而事複類皆期㑹簿書之末俗吏掊克之所為而非賛冢宰進退百官均一四海之治者也古之君國子民者以義為利不以利為利故百乗之家不畜聚斂之臣與其有聚斂之臣寕有盜臣今天官有宰夫者考郡都鄙縣之治乗其財用之出入凡失財用物辟名者誅之其足用長財善物者賞之夫君相守恭儉不尚末作使民務本此足用長財之要也百官有司謹守其職豈敢踰越制度自以足用長財為事若劉歆之說是使百官有司不守三尺上下交征利椎剥其民以危亡其國之道非周公致太平之典也古之王者守禮寡欲由義而行無所忌諱不畏灾患今天官甸師乃曰喪事代王受眚災此楚昭宋景之所不為者也而謂周公立以為訓開後王忌諱之端乎先王之制凡官府次舍列扵庫門之外所以别内外嚴貴賤也今宫正乃比宫中之官府次舎之衆寡又曰去其竒衺之民則是嬪妃官吏衆庶雜䖏亷陛不嚴而内外亂矣宫伯掌王宫之士庶子鄭𤣥以為諸吏之適庶宿衛王宫者也天子深居九重面朝後市謹之以門衛嚴之以城郭溝池環之以鄉遂縣都藩之以侯甸男邦采衛守之以夷蠻戎狄周匝四垂中天下而立定四海之民今周公乃扵宫中置諸吏又以其士庶子衛王宫何示人不廣而自削弱如此也王后之職恭儉不妬忌帥夫人嬪婦以承天子奉宗廟而已矣今内宰凡建國左右立市豈后之職也哉内小臣掌王后之命后有好事扵四方則使往有好令扵卿大夫則亦如之閽人掌守王宫中門之禁說者以為二官奄者墨者也婦人無外事以貞潔為行若外通諸侯内交羣下則將安用君矣夫人臣尚無境外之交曾謂后而可乎古者不使刑人守門公家不畜刑人大夫不飬士遇諸塗弗與之言周公作立政戒成王以䘏左右綴衣虎賁欲其皆得俊乂之人今反以隐宫刑餘近日月之側開亂亡之端乎寺人内豎賤人非所貴也内祝掌宫中禱祠禳禬之事夫祭祀之禮天子公卿諸侯大夫士行之扵外后妃夫人嬪婦供祭服籩豆扵内凡天地宗廟山川百神祀有典常又安用此么麽禱祠禳禬扵宫中此殆漢世女巫執左道入宫中乗妃姬争妬與為厭勝之事耳劉歆乃以為太宰之屬置扵王宫其誣周公也甚矣冢宰當以天下自任故王者内嬖嬪婦敵扵后外寵庶孽齊扵嫡宴逰無度衣服無章賜予無節法度之廢將自此始雖在内庭為冢宰者真當任其責也若九嬪之婦法世婦之宫具女御之功事女史之内政典婦之女功乃后夫人之職也王安石以為統扵冢宰則王所以治内可謂至公而盡正矣夫順理而無阿私之謂公由理而無邪曲之謂正修身以齊家此王者治國平天下之定理所自盡心者也茍身不能齊家而以付之冡宰為王也悖理莫甚焉又可謂之公正乎噫安石真姦人哉四方貢職各有定制王者為天下主財奉禮義以飬天下無非王者之財也不可以有公私之異今大府乃有貳貢之餘財以共玩好之用不幾有如李唐之君受裴延齡之欺㒺者乎王府乃有王之金玉良貨賄之藏不㡬有如漢桓靈置私庫者乎内府乃有四方金玉齒革良貨賄之獻而共王之好賜不㡬有如李唐之君受四方羡餘之輕侮者乎王裘服宜夫人嬪婦之任也今既有司裘又有縫人屨人等九官則皆掌衣服者也膳夫酒正之職固不可廢又有腊人鹽人等十有六官則皆掌飲食者也醫師之職固不可廢又有獸醫等五官皆醫事也帷幕次舎之事固不可廢而皁𨽻之所作也亦置五官焉凡此既不應冗濫如是且皆執技以事上役扵人者也而以為冢宰進退百官均一四海之屬何也漢興經五伯七雄聖道絶滅大亂之後陳􅊭為相尚不肯任廷尉内史之事周公承文武之徳相成王為太師乃廣置宫闈猥褻衣服飲食技藝之官以為屬必不然矣其末則又有夏采之官焉專掌王崩復土者也嗚呼安得是不祥之人哉禮官臨大變一時行之可矣乃預置官以俟王崩而行其職何不祥之甚也太宰之屬六十有二考之未有一官完善者則五卿之屬可知矣而可謂之經與易詩書春秋配乎按周禮一書先儒信者半疑者半其所以疑之者特不過病其官冗事多瑣碎而煩擾耳然愚嘗論之經制至周而詳文物至周而備有一事必有一官毋足怪者有如閹閽卜祝各設命官衣膳泉貨俱有司屬自漢以来其規模之瑣碎經制之煩宻亦復如此特官名不襲六典之舊耳固未見其為行周禮而亦未見其異扵周禮也獨與百姓交渉之事則後世惟以簡易濶略為便而以周禮之法行之必至扵厲民而階亂王莽之王田市易介甫之青苗均輸是也後之儒者見其效騐如此扵是疑其為歆莽之偽書而不可行或以為無闗雎麟趾之意則不能行愚俱以為未然葢周禮者三代之法也三代之時則非直周公之聖可行雖一凡夫亦能行之三代而後則非直王莽之矯詐介甫之執愎不可行而雖賢哲亦不能行其故何也葢三代之時寰宇悉以封建天子所治不過千里公侯則自百里以至五十里而卿大夫又各有世食禄邑分土而治家傳世守民之服食日用悉仰給扵公上而上之人所以治其民者不啻如祖父之扵其子孫家主之扵其臧獲田土則少而授老而收扵是乎有鄉遂之官又從而視其田業之肥瘠食指之衆寡而為之斟酌區畫俾之均平如上地家七人之類是也貨財則盈而斂乏而散扵是乎有泉府之官又従而補其不足助其不給或賖或貸而俾之足用所以飬之者如此司徒之任則自卿大夫州長以至閭胥比長自遂大夫縣正以至里宰鄰長嵗終正嵗四時孟月皆徵召其民考其徳藝紏其過惡而加以勸懲司馬之任則軍有將師有帥卒有長四時仲月則有振旅治兵茇舎大閱之法以旗致民行其禁令而加以誅賞所以教之者如此上下葢弊弊焉察察焉㡬無寧日矣然其事雖似煩擾而不見其為法之弊者葢以私土子人痛痒常相闗脉絡常相屬雖其時所謂諸侯卿大夫者未必皆賢然既世守其地世撫其民則自不容不視為一體既視為一體則姦弊無由生而良法可以世守矣自封建變而為郡縣為人君者宰制六合穹然扵其上而所以治其民者則諉之百官有司郡守縣令為守令者率三嵗而終更雖有龔黄之慈良王趙之朙敏其始至也茫然如入異境積日累月方能諳其土俗而施以政令徃徃朞月之後其善政方可紀纔再朞而已及𤓰矣其有疲愞貪鄙之人則視其官如逆旅傳舎視其民如飛鴻土梗發政施令不過授成扵吏手既授成扵吏手而欲以周官之法行之則事煩而政必擾政擾而民必病教飬之恩恵未孚而追呼之苛嬈已極矣是以後之言善政者必曰事簡夫以周禮一書觀之成周之制未嘗簡也自土不分胙官不世守為吏者不過年除嵗遷多為便文自營之計扵是國家之法制率以簡易為便慎無擾獄市之說治道去太甚之說遂為經國庇民之逺猷所以臨乎其民者未嘗有以飬之也苟使之自無失其飬斯可矣未嘗有以教之也苟使之自毋失其教斯可矣葢壤土既廣則志慮有所不能周長吏數易則設施有所不及竟扵是法立而姦生令下而詐起處以簡靖猶或庶㡬稍渉繁夥則不勝其瀆亂矣昔子産聼鄭國之政其所施為者曰都鄙有章上下有服田有封洫廬井有伍此俱周官之法也然一年而輿人誦之曰孰殺子産吾其與之三年而誦之曰子産而死誰其嗣之按鄭國土地褊小其在後世則一郡耳夫以子産之賢智而當一郡守之任其精神必足以周知情偽其念慮必足以洞究得失決不至如後世承流宣化者之以茍且従事也而周制在當時亦未至盡隳但未能悉復先王之舊耳然稍欲更張則亦未能遽當扵人心必俟磨以嵗月然後昔之謗讟者轉而為謳歌耳况賢不及子産所涖不止一郡且生乎千載之後先王之制久廢而其遺書僅存乃不察時宜不恤人言而必欲行之乎王介甫是也介甫所行變常􅊭而為青苗諉曰此周官泉府之法也當時諸賢極力争之蘇長公之言曰青苗雖云不許抑配然其間願請之户必皆孤貧不濟之人家若自有贏餘何至與官交易此等鞭撻已急則繼之逃亡逃亡之餘則均之鄰保蘇少公之言曰出納之際吏縁為姦法不能禁錢入民手雖良民不免非理費用及其納錢雖富民不免違限受責如此則鞭笞必用而州縣多事矣是皆言官與民賖貸之非便也葢常平者糴糶之法也青苗者賖貸之法也糴糶之法以錢與粟兩相交易似未嘗有以利民而以官法行之則反為簡便賖貸之法捐錢以予民而以時計息取之似實有以濟民而以官法行之則反為繁擾然糴糶之說始扵魏文侯常平之法始扵漢宣帝三代之時未嘗有此而賖貸之法則周官泉府明言之豈周公經制顧不為其簡易者而欲為其繁擾者乎謂周禮為不可信之書則左氏傳言鄭饑子皮以子展之命餼國人粟户一鍾宋饑司城子罕請扵平公出公粟以貸使大夫皆貸司城氏貸而不書為大夫之無者貸宋無饑人齊陳氏以家量貸而以公量收之則春秋之時官之扵民固有賖貸之事也雖當時未嘗取二分之息如青苗之為然熈寧諸賢所言非病其取息之多也葢以為貧者碩貸貸與之而不能償則虧官富者不碩貸抑配予之而并令保任貧者代償所逋則損民兩無所益固不若常􅊭之交手相付聼従民便之為簡易兩得也然左氏所述鄭宋齊之事謂之善政以為羙談未嘗見其有熈豐之弊何也葢鄭宋齊列國也其所任者罕氏樂氏陳氏則皆有世食禄邑與之分土而治者也介甫所宰者天下也其所任者六七少年使者四十餘軰與夫州縣小吏則皆干進徇時之徒也然非鄭宋齊之大夫盡賢而介甫之黨盡不肖也葢累世之私土子人者與民情常親親則利病可以周知故法雖繁而亦足以利民暫焉之承流宣化者與民情常踈疎則情偽不能洞究故法雖簡而猶懼其病民也以青苗賖貸一事觀之則知周禮所載凡法制之瑣碎煩宻者可行之扵封建之時而不可行之扵郡縣之後必知時適變者而後可以語通經學古之說也文獻通考卷一百八十
