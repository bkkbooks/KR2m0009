太平興國五年析閩縣置懐安貢荔枝圓眼鹿角菜紫菜紅花蕉布領縣十二治閩侯官閩隋縣有南臺江越王山長樂山侯官唐縣有螺江閩山福山福清唐福唐縣晉更今名有練門江連江唐縣有連江古田唐縣永泰唐縣崇寧間改為永福長溪唐縣有白水江永正唐縣乾興元年改為羅源閩清唐梅溪縣閩改寧徳閩縣有大海懐安宋縣有洪塘江泉州秦漢土地與長樂郡同晉為晉安郡宋齊以後因之自隋以來屬泉州唐神龍以後始移置泉州於此或為清源郡屬江南道領縣四晉江田南安莆仙逰閩王氏置同安清溪永春徳化長泰五縣南唐為清源軍節度宋太平興國初改平海軍四年以莆田仙遊二縣屬興化軍五年以長泰屬漳州六年析晉安置恵安屬福建路貢綿蕉葛領縣七治晉江晉江唐縣有泉山晉江東安宋縣有洛陽江清溪閩縣有廬山溪南安隋縣有桃林溪永春閩桃源縣徳化閩縣有赤水同安閩縣有東西溪漳州厯代土地與長樂郡同唐分其地置漳州或為漳浦郡屬江南道領縣三漳浦龍龍溪巖南唐改南州尋以泉州長㤗來屬宋復為漳州屬福建路貢甲香鮫魚皮領縣四治龍溪龍溪梁縣有九龍山漳浦唐縣有李澳溪龍巖唐縣長泰閩縣汀州厯代土地與長樂郡同晉分建安郡置晉安郡又立新羅縣汀州始基於此唐開元二十六年開撫福二州山洞置汀州因長汀以為名或為臨汀郡屬江南道領縣三長汀沙寧化閩以沙縣屬南劒州宋淳化五年以上杭武平二場並為縣元符五年析長汀寧化置清流縣紹興三年以連城堡為縣汀在山谷斗絶之地溪水自北發源至州境而東遂南流入海是天下之水皆東惟汀水獨南南丁位也以水合丁為文屬福建路貢蠟燭領縣六治長汀長汀唐縣有鄞江溪寧化唐縣上杭武平清流連城南劒州閩以建州永平鎮置鐔州及龍津縣後州廢南唐改延平鎮俄置為劒州以汀州之沙縣福州之尤溪來屬又陞永順場為順昌縣宋太平興國四年加南字以建州將樂𨽻焉屬福建路貢土茴香領縣五治劒浦劒浦南唐縣有延平津順昌南唐縣沙唐縣天沙水尤溪唐縣將樂唐縣有將溪邵武軍宋太平興國五年以建州邵武縣建為軍仍以歸化建寧二縣來屬六年又析邵武置光澤屬福建路貢紵領縣四治邵武邵武隋縣有邵武溪光澤有紫溪泰寧建寧南唐縣興化軍宋太平興國四年以泉州游洋百丈三鎮地置太平軍尋改又以莆田仙遊二縣來屬又析莆田置興化屬福建路貢綿葛布領縣三治莆田莆田唐縣有壺公山入海仙遊唐縣有大目溪興化有百丈溪游洋溪潮州亦古閩越地秦屬南海郡秦末屬尉佗漢初屬南越後亦屬南海郡後漢因之晉置東官郡又分置義安郡宋齊因之梁置東揚州後改為瀛州及陳而廢隋平陳置潮州煬帝初置義安郡唐復為潮州或為潮陽郡屬嶺南道領縣三海陽程潮陽鄉南漢以程鄉置恭州宋因之宣和三年割海陽三鄉置掲陽縣屬廣南東路貢蕉布甲香鮫魚皮領縣三治海陽海陽晉縣有朔鳯山孱水惡溪潮陽唐縣有曾山濁溪揭陽宋縣梅州南漢以潮州程鄉縣置恭州宋開寳四年改為梅州屬廣東路貢銀布領縣一程鄉南齊縣有西陽山程江文獻通考卷三百十八
