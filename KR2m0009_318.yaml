body:
  text: 文獻通考卷三百十八鄱陽馬端臨貴與著輿地考四古揚州禹貢曰淮海惟揚州北距淮東南距海舊曰南距海今改為東南具註序目篇彭蠡既瀦陽鳥攸居彭蠡澤名今在潯陽郡彭澤縣水所停日瀦陽鳥隨陽之鳥也言彭蠡之水既聚則陽鳥所共居之陽鳥鴻鴈之屬三江既入震澤底定三江謂北江中江南江也震澤呉太湖名今呉興郡界底致也篠簜既敷篠箭竹簜大竹也敷謂布地而生草夭木喬夭盛貌喬髙也夭音於驕反厥土塗泥地界濕島夷卉服海曲謂之島夷海中之夷卉服絺葛之屬也卉許貴反沿於江海逹於淮泗順流而下曰沿沿江入海自海入淮自淮入泗舜置十二牧揚州其一周禮職方曰東南曰揚州其山曰㑹稽今在㑹稽郡山隂縣藪曰具區川曰三江浸曰五湖川水之通流者也五湖在呉郡吳興晉陵三郡其利金錫竹箭民二男五女畜宜鳥獸鳥孔雀翡翠之屬獸犀象之屬榖宜稻揚州以為江南之氣躁勁厥性輕揚亦曰州界多水水波揚也在於天官斗則呉之分野漢之㑹稽九江丹陽章郡廬江廣陵六安臨淮皆其分也今廣陵淮隂鍾離夀春永陽厯陽廬江同安宣城丹陽晉陵呉郡呉興餘杭新定新安㑹稽餘姚臨海縉雲永嘉東陽信安鄱陽潯陽章郡臨川廬陵宜春南康建安長樂清源漳浦臨汀等郡地也按呉國之分雖强盛之時殊不全得揚州之地今配星次且約漢書其厯代所屬則各具於諸郡兼得楚及南越之交漢之江夏汝南地今蘄春弋陽宜屬楚漢之南海之地今潮陽宜屬越之地亦古流服之國春秋時屬呉越二國越滅呉盡并其地戰國時屬楚秦兼天下置郡此為九江今廣陵淮隂鍾離夀春永陽厯陽廬江同安蘄春弋陽鄱陽章郡臨川廬陵南康宜春等郡是障今宣城新安新定丹陽郡之西境及呉興郡之西境皆是㑹稽今丹陽郡之東境晉陵呉郡餘杭㑹稽餘姚東陽信安縉雲臨海永嘉呉興郡之東境皆是閩中今建安長樂清源漳浦臨汀等郡皆是南海郡之東境今潮陽郡是漢改九江曰淮南國及封皇子長為淮南王封劉濞為呉王二國盡得揚州之地武帝置十三州此為揚州領郡六後漢因之理厯陽漢末移理夀春劉繇又移理曲阿厯陽夀春並今郡縣曲阿今丹陽郡丹陽縣濞疋備反三國時淮南屬魏而江南屬呉也魏晉亦置揚州理夀春平吳領郡十八理建業今丹陽郡江寧縣元帝度江揚州遂為王畿領江東浙江地宋孝武分浙江東為東揚州後罷揚州以其地為王畿而東揚州直云揚州尋復舊領郡十八理建康即建業順帝改刺史曰牧又分置南兖州領郡九理廣陵南徐州領郡十七理京口今丹陽郡南荆河州領郡十三理厯陽江州領郡九理湓陽齊並因前代唯徙置豫州領郡理夀春北兖州領郡七理淮隂今郡北徐州領郡五理鍾離今郡梁陳分裂不可詳焉唐分置十五部此為淮南道廣陵廬江蘄春同安永陽鍾離夀春淮隂厯陽弋陽江南道丹陽晉陵呉郡餘杭㑹稽餘姚東陽新定信安呉興縉雲臨海永嘉新安長樂清源建安臨汀漳浦潮陽江南西道宣城章郡鄱陽南康臨川廬陵潯陽宜春五代淮南江東西為南唐兩浙為吳越閩為王氏其後南唐取閩至宋開寳八年取南唐太平興國三年呉越納土始盡有揚州之地為淮南東西路浙東西路江東西路福建路揚州人性輕揚而尚鬼好祀每王綱解紐宇内分崩江淮瀕海地非形勢得之與失未必輕重故不暇先爭然長淮大江皆可距守呉晉宋齊梁陳皆縁江淮要害之地置兵閩越遐阻僻在一隅憑山負海難以徳撫漢武帝時朱買臣上言東越王數反居泉山之上一人守險千人不得上永嘉之後帝室東遷衣冠避難多所萃止藝文儒術斯之為盛今雖閭閻賤品處力役之際吟詠不輟蓋亦因顔謝徐庾之風焉古揚州厯代沿革之圖春秋時可考者十二國吳越楚東境是舒黄弦蓼巢蔣六桐鍾離秦時為郡五九江郡障郡閩中郡㑹稽郡南海郡東境是漢時為郡國七縣九十七廬江郡十二縣舒安居巢潯陽龍舒皖臨湖陵雩婁滋襄灊湖松樅陽九江郡十五縣夀春邑厯陽逡遒當塗成徳鍾離槖臯合肥隂陵東城博鄉曲陽建陽全椒阜陵㑹稽郡二十六縣呉羡曲阿暨鳥傷錫毘陵隂餘暨章陽諸無山句太丹徒烏餘姚鄮婁餘上虞鄞海鹽塘剡富由拳冶末程杭錢春回浦丹陽郡十七縣宛陵故鄣於潜句容江乘丹春榖石秣陵湖涇陽城熟陵陽蕪湖黟凓陽歙宣城豫章郡十八縣南昌餘汗廬陵柴桑彭澤贛鄱陽淦厯陵城艾新南平建成宜春海昏雩都鄔陽南壄安廣陵國四縣廣陵江都髙郵平安六安國五縣六蓼安豐安風陽泉臨淮郡南境縣見徐州江夏郡東境是縣見荆州南海郡東境是縣見南粤晉時為郡國二十二縣二百有五廣陵郡八縣淮隂浦射陽都輿淮江海陽廣陵鹽瀆臨淮郡十縣盱眙淮東陽司髙山下贅其徐潘旌郵陵吾相髙淮南郡十六縣夀春阿成徳陽下蔡椒義城陵西曲陽平厯全阜鍾離合肥逡遒隂陵當塗東城烏江廬江郡十縣陽泉襄舒湖安灊舒皖六潯陽龍居巢臨弋陽郡七縣西陽弋陽車犬蘄春邾西陵期思丹陽郡十一縣建鄴永世江寧溧陽丹陽江乘于湖句容蕪湖湖熟秣陵宣城郡十一縣宛陵懐安宣城石城陵陽春安呉廣臨城寧涇榖徳國新安郡六縣始新遂安黟歙海寧黎陽鄱陽郡八縣廣晉葛鄱陽晉樂安陵陽興餘汗鄡陽厯毘陵郡七縣丹徒無曲阿陽錫武進延陵毘陵既呉郡十一縣呉桐嘉興建海鹽夀鹽官海錢塘婁富陽廬徳昌虞呉興郡十縣烏程故臨安安餘杭原武康長東遷潜鄣吉鄉城於㑹稽郡十縣山隂始寧上虞永餘姚諸句章剡興暨鄞鄮臨海郡八縣章安安臨海横始豐陽固陽永寧寧海松東陽郡九縣長山豐永康定烏傷遂呉寧安安陽昌太末信豫章郡十六縣南昌康海昏豐新淦永建城建望蔡呉艾樂城修昌平豫章彭澤新呉宜豐鍾陵臨川郡十縣臨江宜西豐安南城西東興新南豐城黄浦寧建永廬陵郡十縣西昌遂髙昌吉石陽興巴邱陽南野昌興陽平豐東安成郡七縣平都廣宜春鄉興新喻永新安福萍南康郡五縣贛雩都平固南康揭陽晉安郡八縣原豐晉新羅温宛平江安麻同安侯官羅建安郡七縣建安延呉興武平東平建陽將樂邵隋時為郡二十七縣一百二十二江都郡十六縣江陽安宜江都山陽海陵盱眙寧海鹽城髙郵清流全椒六合永福句容延陵曲阿鍾離郡四縣鍾離定逺化明塗山淮南郡四縣夀春安豐霍邱長平弋陽郡六縣光山思樂安定城殷城固始期厯陽郡二縣厯陽烏江廬江郡七縣合肥開化廬江襄安慎霍山渒水同安郡五縣懐寧宿松太湖望江同安蘄春郡五縣蘄春浠水蘄水黄梅羅田丹陽郡三縣江寧當塗溧水宣城郡六縣宣城涇南陵秋浦永世綏安新安郡三縣休寧歙黟鄱陽郡三縣鄱陽餘千弋陽毘陵郡四縣晉陵江隂無錫義興呉郡五縣呉崑山常熟烏程長城遂安郡三縣雉山遂安桐廬餘杭郡六縣錢塘康富陽餘杭於潜鹽官武永嘉郡四縣括蒼永嘉松陽臨海㑹稽郡四縣㑹稽句章剡諸暨東陽郡四縣金華永康鳥傷信安豫章郡四縣豫章豐城建昌建城九江郡二縣湓城彭澤臨川郡四縣臨川南城崇仁邵武廬陵郡四縣廬陵太和安福新淦宜春郡三縣宜春萍鄉新喻南康郡四縣贛䖍化雩都南康建安郡四縣閩建安南安龍溪義安郡五縣海陽程鄉潮陽海寧萬川唐時為州四十一縣二百有九揚州七縣楚州五縣濠州三縣夀州五縣滁州三縣和州三縣廬州五縣舒州五縣蘄州四縣光州五縣宣州十縣昇州四縣池州四縣歙州六縣饒州五縣信州四縣潤州六縣常州五縣蘇州七縣湖州五縣杭州八縣睦州六縣越州七縣明州四縣台州五縣處州六縣温州四縣婺州七縣衢州四縣江州三縣洪州七縣撫州四縣吉州五縣袁州三縣䖍州七縣建州五縣福州十縣泉州四縣漳州三縣汀州三縣潮州三縣宋時為州五十九縣二百有九揚州三縣泰州四縣通州二縣真州二縣髙郵軍二縣楚州四縣濠州二縣夀州五縣滁州三縣和州三縣廬州三縣無為軍三縣舒州五縣蘄州四縣光州四縣寧國府六縣建康府五縣池州六縣太平州三縣廣徳軍二縣徽州六縣饒州六縣信州六縣鎮江府四縣常州四縣江隂軍一縣平江府五縣嘉興府四縣湖州六縣臨安府九縣嚴州六縣紹興府八縣慶元府六縣台州五縣處州六縣温州四縣婺州七縣衢州五縣江州五縣南康軍三縣隆興府八縣撫州四縣吉州八縣袁州四縣贛州十縣瑞州三縣建昌軍四縣臨江軍三縣南安軍三縣建寧府四縣福州十一縣泉州七縣漳州四縣汀州六縣南劒州五縣邵武軍四縣興化軍三縣潮州三縣梅州一縣揚州春秋時屬呉故左傳云呉城䢴溝䢴音寒以通江淮是也呉滅屬越越滅屬楚秦滅楚屬九江郡漢為廣陵國後屬荆國後更屬吳景帝更名江都國武帝更名廣陵國後漢為廣陵郡魏為重鎮文帝黄初六年征呉幸廣陵故城臨江觀兵見江濤歎曰天所以限南北也使張遼乘舟與曹休至海陵是嵗遼薨於江都後屬吳孫亮建興二年使衛尉馮朝城廣陵晉亦為廣陵郡東晉末以廣陵控接三齊故青兖二州刺史皆鎮於此宋亦置廣陵郡文帝兼置南兖州領郡九理於此齊並因之梁亦曰南兖州北齊改為東廣州復曰南兖州後周改為吳州隋初為揚州置總管府煬帝初府廢又為江都郡後帝徙都而喪國焉煬帝置江都太守秩與京尹同唐初為兖州後改為䢴州後又改為揚州為大都督府其後或為廣陵郡屬淮南道置大都督淮南節度領縣七江都六江陽揚海陵天髙郵合子長呉改江都府置興化縣南唐以海陵興化二縣屬泰州周復為大都督節度宋因之屬淮東路開寳四年以髙郵置軍雍熙二年以揚子屬建安軍至道二年又以六合𨽻建安元祐初領淮南東路兵馬鈐轄中興後本路安撫及兩淮制置司貢白苧布莞席銅鏡領縣三治江都江都隋縣有蕪城呉公臺雷塘廣陵唐江陽縣南唐改有召伯埭䢴溝熙寧五年廢入江都天長唐縣偽唐置建武軍又改雄州周改天長軍宋至道時軍廢為縣有𤓰歩山六合山赤岸山石梁山中興後割𨽻盱眙軍泰州本唐揚州海陵縣南唐置州以揚州之興化楚州之鹽城二縣來屬周為團練宋降為軍事屬淮東路後復以鹽城𨽻楚州貢隔織領縣四治海陵海陵漢縣有孤山大海運河興化偽呉縣有千人湖泰興偽唐縣乾徳二年移治柴墟鎮如臯偽唐縣通州本唐鹽亭場南唐立為静海制置院周陞為静海軍屬揚州俄改為州析其地為静海海門二縣以𨽻焉州之東北正係海口南接大江宋因之屬淮東路貢獐皮鹿皮鰾膠領縣二治静海静海周縣有狼山蔡港餘慶石港西寨五寨海門周縣真州本唐揚州揚子縣之白沙鎮南唐改迎鑾鎮宋乾徳二年陞為建安軍雍熙二年以永正來屬至道二年又以六合𨽻焉大中祥符六年建為真州貢麻紙領縣二治永正永正唐揚子縣偽唐改後復為揚子有運河淮子河六合隋縣有𤓰歩山六合山楊葉山赤岸山石梁溪髙郵軍本唐揚州髙郵縣宋開寳四年建為軍屬淮東路地形四隅皆低為沮洳蒲葦之澤城基特髙狀如覆盂建炎二年陞為承州割泰州興化來𨽻領縣二治髙郵髙郵漢縣興化見㤗州下楚州春秋時屬吳吳將伐齊自廣陵掘江通淮即此也戰國時屬楚秦屬九江郡漢屬臨淮郡後漢屬廣陵郡下邳國晉屬臨淮廣陵二郡地東晉為重鎮元帝以劉隗屯守穆帝時中郎將荀羡北征詩序云淮隂舊鎮地形都要水陸交通易以觀釁沃野有開殖之利方舟運漕無地屯兵乃營立城池焉安帝時立山陽郡宋因之齊扼清泗臨淮守險有平陽石鼈田稻豐饒其後僑立兖州齊郡因以兖州為重鎮梁初得之後入後魏隋初廢山陽郡後置楚州煬帝初州廢并入江都郡唐武徳四年為東楚八年改為楚州或為淮隂郡屬淮南道領縣五山陽淮鹽城安盱眙隂宜呉順化軍節度南唐以鹽城屬泰州周為防禦宋乾徳元年以盱眙屬泗州開寳九年以鹽城還𨽻屬淮東路建炎間金人陷揚承二鎮楚勢孤危紹興以來屢戰屢失末年乃復寳慶間以逆全之亂降為淮安軍又以寳應縣為寳應州貢紵布領縣四治山陽山陽漢射陽縣地有石鼈淮水漣河淮隂唐縣有淮水沙河鹽瀆寳應本安宜縣唐寳應年間改冇運河白水陂鹽城唐縣有射陽湖九鹽場濠州春秋末鍾離子之國昔禹㑹諸侯於塗山即其地也今鍾離縣西百里有塗山是也左傳註曰山在夀春縣東北太康地記云塗山古當塗國應劭曰禹所聚㑹塗山侯國即此也舊有當塗縣晉安帝立馬頭郡北齊因之隋改為塗山縣今廢魯成公時叔孫僑如㑹呉於鍾離昭公時楚子為舟師以略呉疆呉遂滅巢及鍾離而還楚平王時呉之邊邑卑梁女子與楚邊邑鍾離小僮爭桑兩家交怒相攻遂滅卑梁人卑梁大夫怒發邑兵攻鍾離楚王聞之怒發國兵滅卑梁吳王聞之大怒亦發兵使公子光攻楚遂滅鍾離居巢楚恐而城郢則鍾離互為呉楚之邊邑戰國時屬楚秦屬九江郡二漢因之晉初屬淮南郡後僑置徐州安帝時置鍾離郡宋齊因之兼置徐州領郡理於此亦為重鎮明帝時頻為後魏攻圍徐州刺史蕭恵休蕭坦守不下而退梁因之北齊改鍾離郡為西楚州隋改曰濠州因濠水為名濠音豪煬帝復置鍾離郡唐為濠州或為鍾離郡屬淮南道領縣三鍾離定招義逺宋乾徳元年以招義屬泗州為團練屬淮西路乾道初移戍藕塘開禧城定逺嘉定復舊貢絹糟魚領縣二治鍾離鍾離漢舊縣有袁術所築荆山堰及梁武帝築浮山堰基有濠水荘周觀魚處定逺漢曲陽縣有古隂陵城即漢兵追項羽羽失道之所夀州戰國時楚地秦兵擊楚楚考烈王東徙都夀春命曰郢即此地也今郡羅城即考烈王所築今郡子城即宋武帝所築秦滅楚虜王負芻其地為九江郡江自廬江分為九道後項羽封英布為九江王都六即此也漢髙帝更名淮南國武帝復為九江郡後漢因之兼置揚州領郡六理於此袁術為曹公所擊敗奔九江後遂僭號以九江太守為淮南尹魏曰淮南郡仍舊揚州為重鎮毌邱儉諸葛誕為刺史皆鎮於此三國時江淮為戰爭之地其間數百里無復人居晉平呉其人各還本故復立為淮南郡兼置揚州領郡十八理於此其後中原亂胡寇屢南侵又以蘇峻祖約之亂淮南人南渡江者轉多乃於江南僑立淮南郡及當塗逡遒等縣逡七循反遒音秋東晉亦為重鎮明帝時祖約為守後陷石勒季龍死後復理之今郡西十五里即謝元破苻融之處晉伏滔云彼夀春者南引汝潁之利東連三呉之富北接梁宋平途不過七日西接陳許水陸不出千里外有江湖之阻内冇淮淝之固龍泉之陂良田萬頃舒呉之貢利盡蠻越也宋屬淮南郡初晉元帝永昌中荆河州刺史祖約鎮於此後或理江北或理江南無定所也至宋義熙十二年劉義慶又鎮此以撫邊荒扞禦疆場齊因之兼置荆河州領郡理於此為重鎮齊髙帝初遣垣崇祖鎮夀陽謂之曰我新冇天下後魏必以送劉昶兵為辭夀春賊之所衝深為之備俄而魏大將王肅送劉昶兵二十萬掩至而敗還後魏曰揚州蕭齊東昏永元初守將裴叔業以城叛降後魏梁置南荆河州武帝普通七年剋之擒魏將李憲尋改為南荆河州後周曰揚州隋文帝改曰夀州煬帝初復為郡唐為夀州或為夀春郡屬淮南道領縣五夀春盛安豐霍霍邱唐山呉忠正軍節度周以潁州下蔡來屬徙州治焉在淮北宋因之開寳中廢霍山盛唐政和六年陞為夀春府屬淮西路以府之六合縣即霍山為六安軍中興後下蔡沒於金以安豐縣為軍四縣并𨽻焉貢葛布石斛領縣五治下蔡下蔡古蔡國唐縣有硤石山夀春隋縣冇八公山淮水淝水安豐漢縣有芍陂灌水九井蓼城霍邱隋縣有安陽山豐水決水六安唐縣冇霍山大别山滁州戰國時屬楚秦及二漢九江郡之地晉屬淮南郡宋屬新昌郡齊置南譙郡梁屬南譙州梁末屬北齊兼置新昌郡又徙南譙州於新昌即今郡是也隋初廢新昌郡改南譙為滁州煬帝初州廢併其地入江都郡唐復置滁州或為永陽郡屬淮南道領縣三宋同宋因之屬淮東路貢絹領縣三治清流清流隋縣有清流水滁水瑯琊山全椒漢縣梁置北譙郡北齊改為臨滁郡隋復為縣來安即唐永陽縣偽唐改有石山來安水和州戰國時楚地秦屬九江郡二漢因之漢末兼置揚州領郡六自夀春徙治於此呉為重鎮築濡湏塢魏屢攻圍不㧞晉為淮南郡地東晉為厯陽郡宋因之兼置南豫州領郡十三治於此齊梁並因之梁末屬北齊置和州及厯陽郡隋煬帝初州廢而厯陽郡如故唐復為和州或為厯陽郡屬淮南道領縣三宋同宋屬淮西路建炎後為姑熟金陵藩屏北距北界二百二十五里貢紵布練布領縣三治厯陽厯陽漢縣有濡湏水合山古梁山寨烏江本鳥江亭漢東城縣梁置江都郡北齊改為密江郡陳臨江郡後周鳥江郡隋後為縣冇項亭含山唐縣有大峴亭廬州古廬子國春秋舒國之地昔成湯放桀周芮伯命巢左傳曰自廬以往又曰徐人取舒舒國今舒城縣皆此地也戰國時屬楚地秦屬九江郡漢為廬江九江二郡後漢亦然魏為重鎮使張遼守之孫權率十萬衆攻圍遼以八百人破之明帝時以滿寵都督揚州諸軍鎮於此寵上表言合肥西北三十里有竒險可依更立城名新城孫權欲攻圍新城以其逺水積二十餘日不敢下船而退晉為淮南廬江二郡地梁置汝隂郡及南豫州尋改為合州為重鎮隋初為廬江州煬帝初州廢置廬江郡唐為廬州或為廬江郡屬淮南道領縣五合肥江慎舒巢廬城呉昭順軍節度周改保信軍宋因之屬淮西路太平興國三年以巢廬江二縣置無為軍中興後置本路安撫使貢紗絹蠟石斛領縣三治合淝合淝漢縣夏水出城又東與淝水合入巢湖有濡湏水北齊分置北陳郡慎楚白公勝邑隋縣有滁水舒古舒國唐縣有龍舒水無為軍宋太平興國三年以廬州巢縣無為鎮建為軍以巢廬江二縣來屬屬淮西路貢絹領縣三治無為無為有梅山江水焦水巢古巢伯國漢居巢縣有東關山居巢山直湖廬江漢龍舒縣隋改今名舒州古皖國也春秋時有皖國史記皖夏姓臯陶之後亦舒國之地説見廬州戰國時屬楚秦屬九江郡二漢屬廬江郡獻帝時吳克皖城遂為重鎮晉安帝置晉熙郡宋齊皆因之梁置豫州後改為晉州北齊改曰江州陳又曰晉州隋初曰熙州煬帝置同安郡唐為舒州或為同安郡屬淮南道領縣五宋同宋屬淮西路為徳慶軍節度紹興十七年改安慶軍慶元元年陞為府貢白紵白术領縣五治懐寧懐寧晉縣冇天柱山皖水宿松隋縣有雷水江水自鄂陵分為九𣲖㑹於此縣界洲上三百餘里合流謂之九江口東得武林洲即桑落洲之尾望江漢皖縣地晉大雷戍在此陳置大雷郡太湖隋縣有司空山太湖桐城唐縣有盛唐山大江樅陽水蘄州春秋以來皆楚地秦屬九江郡二漢屬江夏郡呉為蘄春郡晉省屬弋陽郡北齊置雍州後周改曰蘄州隋煬帝初州廢置蘄春郡唐復為蘄州或為蘄春郡屬淮南道領縣四宋同宋屬淮西路元祐八年又以蘄水縣石橋鎮為羅田縣貢紵布簟領縣五治蘄春蘄春漢縣北齊置齊昌郡有新水温水黄梅隋縣冇黄梅水蘄水唐縣有蘭溪水廣濟唐縣有蔡山出大龜又有積布山青林湖光州春秋時黄國也亦弦國之地魯僖公五年楚人滅弦弦在弋陽車犬縣車犬徒計反秦屬九江郡二漢屬汝南江夏二郡魏分置弋陽郡晉齊皆因之梁末置光州後魏置弋陽郡北齊為南郢州後周為淮南郡隋煬帝初為弋陽郡唐為光州或為弋陽郡屬淮南道領縣五定城仙固始殷光山居城宋廢商水縣入固始屬淮西路為光山軍節度紹興末改蔣州尋復舊貢石斛葛布領縣四治定城定城古黄國漢弋陽縣故城有淮水光山古弦國漢西陽縣晉光城縣有光山柴水固始楚孫叔敖所封寝邱之地北齊置北建州後周置澮州仙居古弦子國唐縣寧國府春秋時屬呉後屬越越滅屬楚秦屬障郡二漢為丹陽郡呉為重鎮孫皓時以何植為牛渚督晉師來伐遣王渾向牛渚晉武帝分置宣城郡丹陽郡移於建康是也宋齊梁陳皆因之陳以為重鎮隋平陳廢郡置宣州煬帝改為宣城郡唐為宣州或為宣城郡屬江南道領縣十宣城當涇平塗溧水南陵太綏安陽寧國陽溧青呉寧國軍節度使南唐分入江寧而此州領縣六宋因之屬江東路開寳末以廣徳蕪湖繁昌來屬太平興國二年以蕪湖繁昌屬太平州四年以廣徳置軍乾道二年升為寧國府貢紵布黄連筆領縣六治宣城宣城漢縣有昭亭山句溪涇漢縣冇涇水南陵梁縣冇漳淮水寧國唐縣太平唐縣旌徳唐縣建康府本潤州江寧縣唐至徳二載以縣置昇州上元二年廢光啟三年復以潤之上元句容宣之溧陽溧水四縣置昇州屬江南道呉為金陵府南唐改江寧府置蕪湖銅陵繁昌三縣又以宣州之當塗廣信來屬尋以當塗為雄逺軍復以池州之青陽來屬宋平江南復為昇州節度以廣徳蕪湖繁昌屬宣州青陽銅陵屬池州天禧二年陞為江寧府建康節度屬江東路建炎三年改為建康府即府治建行宫沿江置江東安撫制置司貢筆領縣五治上元江寧上元唐縣有蔣山雞籠山方山幕府山青溪元武湖江寧唐縣有慈姥山鳯臺山秦淮白鷺洲溧陽漢縣有平陵山二鶴山溧水隋縣有丹陽湖石臼湖句容漢縣有茅山鎮天禧間改名常寧有茅山華陽洞池州本宣州地唐武徳四年以宣州之秋浦南陵二縣置貞觀元年州廢縣還𨽻宣州永泰元年復析宣州之秋浦青陽饒州之至徳即建徳置屬江南道領縣四秋浦陽至徳埭青石南唐為康化軍節度後為軍事以青陽𨽻江寧開寳末以昇州之青陽銅陵江州之東流三縣來屬屬江東路貢紙紅白薑領縣六治貴池貴池隋秋浦縣呉改有秀山貴池青陽唐天寳中析涇南陵秋浦置有九華山五溪水建徳唐析鄱陽秋浦置至徳縣𨽻饒州呉改今名石埭唐析青陽秋浦置銅陵南唐縣有銅官山東流南唐縣太平州本宣州地南唐於江寧當塗置新和州後改雄逺軍宋開寳八年改平南軍太平興國二年陞為太平州又以宣州之蕪湖繁昌二縣𨽻焉屬江東路貢紗領縣三治當塗當塗晉縣有牛渚山采石磯九井山姑熟溪蕪湖南唐縣繁昌南唐縣有大江廣徳軍本宣州廣徳縣地宋太平興國四年建為軍端拱元年以郎歩鎮為建平縣𨽻焉屬江東路貢茶芽領縣二治廣徳廣徳唐縣冇丹井山桐水建平宋縣有南渏湖徽州春秋時屬呉後屬越越滅屬楚秦屬障郡二漢屬丹陽郡呉孫權分丹陽立新都郡晉平呉改曰新安宋齊並因之隋平陳置歙州煬帝初州廢置新安郡唐為歙州或為新安郡屬江南道領縣六宋同宋屬江東路宣和三年改為徽州貢白紵紙領縣六治歙歙漢縣有靈山休寧隋縣冇浙溪水績溪唐析歙縣置有三天子障山黟隋縣祈門唐析黟及饒之浮梁置婺源唐縣有婺水饒州春秋時楚之東境後屬呉楚昭王時呉伐楚取番是也戰國屬楚秦屬九江郡二漢屬豫章郡呉主孫權分置番昜郡初治番昜縣後徙治呉芮故城晉宋齊因之梁置呉州陳廢隋置饒州以其産物豐饒煬帝初置番昜郡唐復為饒州或為番昜郡屬江南道領縣五番昜餘樂平浮弋陽干梁乾元元年以弋陽屬信州南唐置徳興縣宋端拱元年陞安仁場為縣屬江東路貢麩金竹簟領縣六治番昜番昜漢縣有番江彭蠡湖餘干漢餘汗縣隋改今名有餘干水浮梁唐縣有新昌水樂平唐縣有樂安江徳興南唐縣有銀山