body:
  text: 文獻通考卷一百七十鄱陽馬端臨貴與著刑考九詳讞平反髙宗上元三年左威大將軍權善才右監門中郎將范懐義斫昭陵柏木大理奏以官減外並除名上特令殺之大理丞狄仁傑執奏稱罪不當死上不從仁傑執奏曰法懸象魏徒罪死罪具有差等古人云假使盜長陵一抔土陛下何以加之今陛下以昭陵一株柏殺二將軍千載之後謂何臣不敢奉詔上乃止武后謀革命大開告密之門以誅異議者法官競為深酷惟司刑丞徐有功杜景儉獨存平恕被告者皆曰遇來侯必死遇徐杜必生酷吏所誣搆者有功皆為直之前後所活數十百家嘗廷爭獄事太后厲色詰之左右為戰栗有功神色不撓爭之彌切太后雖好殺知有功正直甚敬憚之嘗謂有功曰卿比按獄失出何多對曰失出人臣之小過好生聖人之大德后黙然司刑丞李日知亦尚平恕少卿胡元禮欲殺一囚日知以為不可往復數四元禮怒曰元禮不離刑曺此囚終無生理日知曰日知不離刑曺此囚終無死法竟以兩狀列上日知果直推事使奏瀛州人李仁怛等三十七人被告稱謀反曺斷並處斬父母妻子流三千里有功執曰元淑里正元得户人緣祖紛爭因相言告或以反逆相喚或將奔叛相牽反逆須有同謀奔叛寜無叶契無謀無契口語口陳即以實論頗亦苛酷搶檊元無影響星文本自參差縱使實有反言只根換其宗姓因根稱有正是口陳徒侣絶無明非實反賊盗律云口陳欲反之言心無真實之計流三千里疏云口陳欲叛者杖八十准依告狀並是口陳之言原究犯情皆非心實之計忝居商度用此當宜如不使推請從鄙見如將未允終須重推録奏勅依得宗君哲狀稱無反可尋請依徐丞見流三千里奉敕依㑹赦免魏元忠為張易之等所譛坐貶官太子僕崔貞慎等八人餞元忠於郊外易之詐為告宻人柴眀狀稱貞慎與元忠謀反太后使監察御史馬懐素鞫之曰兹事皆實略問速以聞中使督促數四曰反狀皎然何稽留如此懐素請柴眀對質太后曰我自不知柴眀處但據狀鞫之安用告者懐素據實以聞太后怒曰卿欲縱反者耶對曰臣不敢縱反者元忠以宰相讁官貞慎等以親故追送若誣以為反臣實不敢昔欒布奏事彭越頭下漢祖不罪况元忠之刑未如彭越而陛下欲誅其送者乎且陛下操生殺之柄欲加之罪取决聖衷可矣若命臣推鞫臣不敢不以實聞太后曰汝欲全不罪耶對曰臣智識愚淺實不見其罪太后意觧貞慎等由是獲免許州人楊元嗣告張昌宗嘗召術士李𢎞泰占相𢎞泰言昌宗有天子相勸於定州造佛寺則天下歸心太后命韋承慶及司刑卿崔神慶御史中丞宋璟鞫之神慶神基之弟也承慶神慶奏言昌宗欵稱𢎞泰之語尋已奏聞準法首原𢎞泰妖言請收行法璟與大理丞封全慎奏昌宗寵榮如是復召術士占相志欲何求𢎞泰稱筮得純乾天子之卦昌宗倘以𢎞泰為妖妄何不即執送有司雖云奏聞終是包藏禍心法當處斬破家請收付獄窮理其罪太后乆之不應璟又曰倘不即收繫恐其揺動衆心太后曰卿且停推俟更檢詳文狀璟退左拾遺江都李邕進曰向觀宋璟所奏志安社稷非為身謀願陛下可其奏太后不聼尋敕璟揚州推按又敕璟按幽州都督屈突仲翔贓汙又敕璟副李嶠安撫隴蜀璟皆不肯行奏曰故事州縣官有罪品髙則侍御史卑則監察御史按之中丞非軍國大事不當出使今隴蜀無變不識陛下遣臣出外何也臣皆不敢奉制司刑少卿桓彦範上疏以為昌宗無功荷寵而包藏禍心自招其咎此乃皇天降怒陛下不忍加誅則違天不祥且昌宗既云奏訖則不當更與𢎞泰往還使之求福禳灾是則初無悔心所以奏者擬事發則云先已奏陳不發則俟時為逆此乃姦臣詭計若云可捨誰為可刑况事已再發陛下皆釋不問使昌宗益自負得計天下亦以為天命不死此乃陛下養成其亂也茍逆臣不誅社稷亡矣請付鸞臺鳳閣三司考竟其罪疏奏不報崔元暐亦屢以為言太后令法司議其罪元暐弟司刑少卿昇處以大辟宋璟復奏收昌宗下獄太后曰昌宗已自奏聞對曰昌宗為飛書所逼窮而自陳勢非得已且謀反大逆無容首免若昌宗不伏大刑安用國法太后温言觧之璟聲色逾厲曰昌宗分外承恩臣知言出禍從然義激於心雖死不恨太后不悅楊再思恐其忤㫖遽宣勅令出璟曰聖主在此不煩宰相擅宣勅命太后乃可其奏遣昌宗詣臺璟庭立而按之事未畢太后遣中使召昌宗持勅赦之璟歎曰不先擊小子腦裂負此恨矣太后乃使昌宗詣璟謝璟拒不見元宗開元十八年冀州武强縣令裴景僊犯乞取贓積五千疋事發上大怒令集衆殺之大理卿李朝隠奏曰景僊縁是乞贓罪不至死又景僊曽祖故司空寂往屬締搆首参元勲載初年中家䧟非罪凡其兄弟皆被誅夷唯景僊獨存今見承嫡據贓未當死坐准犯猶入議條十世宥賢功實宜録一門絶祀情或可哀願寛暴市之刑俾就投荒之役則舊勲不棄平典斯允手詔不許朝隠又奏曰有斷自天處之極法生殺之柄人主合専輕重有條臣下當守枉法者枉理而取十五疋便抵死刑乞取者因乞為贓數千疋止當流坐若令乞取得罪便處斬刑後有枉法當科欲加何辟所以為國惜法期守律文非敢以法随人曲矜僊命射魏苑驚馬漢橋初震皇赫竟從廷議豈威不能制而法貴有常又景僊曽祖定為元勲恩倍常數若寂勲都棄僊罪特加則叔向之賢何足稱者若敖之鬼不其餒而捨罪念功乞垂天聼遂决杖一百配流張瑝為父復讐殺楊汪事見刑制門肅宗至德二年將軍王去榮以私怨殺本縣令當死上以其善用礮壬辰敕免死以白衣於陕郡効力中書舎人賈至不即行下上表以為去榮無狀殺本縣之君易曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣若縱去榮可謂生漸矣議者謂陕郡初復非其人不可守然則他無去榮者何以亦能堅守乎陛下若以礮石一能即免誅死今諸軍技藝絶倫者其徒實繁必恃其能所在犯上復何以止之若止捨去榮而誅其餘者則是法令不一而誘人觸罪也今惜一去榮之材而不殺必殺十如去榮之材者不亦其傷益多乎夫去榮逆亂之人也焉有逆於此而順於彼亂於富平而治於陕郡悖於縣君而不悖於大君歟伏惟眀主全其逺者大者則禍亂不日而定矣上下其事令百官議之太子太師韋見素等議以為法者天地大典帝王猶不敢擅殺而小人得擅殺是臣下之權過於人主也去榮既殺人不死則軍中凡有伎能者亦自謂無憂所在暴横為郡縣者不亦難乎陛下為天下主愛無親疏得一去榮而失萬姓何利之有於律殺本縣令列於十惡而陛下寛之王法不行人倫道屈臣等奉詔不知所從夫國以法理軍以法勝有㤙無威慈母不能使其子陛下厚養戰士而每戰少利豈非無法耶今陕郡雖要不急於法也有法則海内無憂不克况陕郡乎無法則陕郡亦不可治得之何益而去榮末抜陕郡不以之存亡王法有無家國乃為之輕重此臣等所以區區願陛下守貞觀之法上竟捨之德宗時詔中書門下選律學之士取至德以來制敕奏讞掇其可為法者藏之而不名書憲宗元和六年九月富平縣人梁悅為父報讐殺人自投縣請罪敕復讎殺人固有彛典以其申寃請罪視死如歸自詣公門發於天性志在狥節本無求生寜失不經特減死宜决一百配流循州於是史官職方員外郎韓愈獻復讐議曰伏奉今月五日敕復讐據禮經則義不同天徵法令則殺人者死禮法二事皆王教大端有此異同固資論辨宜令都省集議聞奏者伏以子復父讐見於春秋見於禮記見於周官見於子史不可勝數未有非而罪之者也最詳於律而律無其條非闕文也蓋以為不許復讐則傷孝子之心而乖先王之訓許復讐則人將倚法専殺無以禁止其端矣夫律雖本於聖人然而行之者有司也經之所眀者制有司也丁寜其義於經而深沒其文於律者其意將使法吏一斷於法而經術之士得引經而議也周官曰凡殺人而義者令勿讐讐之則死義宜也明殺人而不得其宜者子得讐也如百姓相讐者也公羊傳曰父不受誅子復讐可也不受誅者罪不當誅也誅者上施於下辭非百姓之相殺者也又周官曰凡報讐者書於士殺之無罪言將復讐必言於官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自専訪議羣下臣愚以為復讐之名雖同而其事各異或百姓相讐如周官所稱可議於今者或為官吏所誅如公羊所稱不可行於今者又周禮所稱將復讐先告於士則無罪者若孤稚羸弱抱微志而伺敵人之便恐不能自言於官未可以為斷於今也然則殺之與赦不可一例宜定其制曰凡有復父讐者事發具其事由下尚書省集議奏聞酌其宜而處之則經律無失其㫖矣栁宗元為栁州刺史民莫誠救兄莫蕩以竹刺莫果右臂經十二日身死其莫誠禁在龍城縣凖律以他物毆傷十二日辜辜内死者各依殺人論宗元上桂管觀察府狀右奉牒凖律文處分者竊以莫誠赴急而動事出一時觧難為心豈思他物救兄有急難之戚中臂非必死之瘡不幸致殂揣非本意按文固當恭守撫事似可哀矜斷手方追於深衷周身不遑於逺慮律宜無赦使司眀至當之心情或未安守吏切惟輕之願伏乞俯賜興哀特從屈法去全微命以慰逺黎穆宗長慶二年四月刑部員外郎孫革奏准京兆府申雲陽力人張涖欠羽林官騎康憲錢米憲徵理之涖乗醉拉憲氣息將絶憲男買得年十四將救其父以涖角觝力人不敢揮觧遂持木􅓩擊之首見血後三日致死者准律父為人所毆子往救擊其人折傷减凡鬬三等至死者依常律則買得合當死刑伏以律令者用防兇暴孝行者以開教化今買得救父難是性孝非暴擊張涖是心切非兇以髫丱之嵗正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之親春秋之義原心定罪周書所以訓諸罸有權今買得生被皇風㓜符至孝哀矜之宥伏在聖慈職當讞刑合申善惡謹先具事由陳奏伏兾下中書門下商量敕㫖康買得尚在童年能知子道雖殺人當死而為父可哀若從沈命之科恐失原情之義宜付法司減死罪一等處分長慶二年白居易上言據刑部及大理寺所斷准律非因鬬爭無事而殺者名為故殺今姚文秀有事而殺者則非故殺據大理寺直崔元式所執准律相爭為鬬相擊為毆交鬬致死始名鬬殺今阿王被打狼籍以致於死姚文秀撿驗身上一無傷損則不得名為相擊阿王當夜已死何名相爭既非鬬爭又蓄怨怒即是故殺者又按律疏云不因鬬爭無事而殺名為故殺此言事者謂鬬爭之事非該他事今大理刑部所執以姚文秀怒妻有過即不是無事既是有事因而毆死則非故殺者此則唯用無事兩字不引爭鬬上文如此是使天下之人皆得因事殺人殺人了即曰我有事而殺非故殺也如此可乎且天下之人豈有無事而殺人者足明事謂爭鬬之事非他事也又凡言鬬毆死者謂事素非憎嫌偶相爭鬭一毆一擊不意而死如此則非故殺以其本原無殺心今姚文秀怒妻頗深挾恨既乆毆打狼籍當夜便死察其情狀不是偶然此非故殺孰為故殺若以先因爭罵不是故殺即如有謀殺人者先引相罵便是交爭一爭之後以物毆殺即曰我因事而殺非故殺也如此可乎况阿王既死無以辨眀姚文秀自云相爭有何憑據伏以獄貴察情法須可乆若崔元式所議不用大理寺所執得行實恐被毆死者自此長寃故殺人者從今得計奉勅姚文秀殺妻罪在十惡若從宥免是長兇愚其律縱有互文在理終須果斷宜依白居易狀委所在重杖一頓處死敬宗寳歴三年京兆府有姑鞭婦致死者奏請斷以償死刑部尚書栁公綽議曰尊毆卑非鬬也且其子在以妻而戮其母非教也遂減死論後唐眀宗天成二年御史臺刑部大理等奏准各律例諸斷罪而無正條者其應出罪者則舉重以眀輕其應入罪者則舉輕以眀重疏云斷罪無正條謂一部律内犯無罪名者准雜律不應得為而為者笞四十謂律令無條理不可為者杖八十疏云雖犯輕重觸類𢎞多金科玉條包羅難盡其有在律在令無有正條若不輕重相眀無文可以比附臨時處斷量情為罪庻補遺闕故立此條其情輕者笞四十事理重者杖八十奉敕宜依其年七月洺州平恩縣百姓髙𢎞超其父暉為鄉人王感所殺𢎞超挾刃殺感携其首自陳大理寺以故殺論尚書刑部員外郎李殷夢復曰伏以挾刃殺人按律處死投獄自首降罪垂文髙𢎞超既遂報讐固不逃法戴天罔愧視死如歸歴代以來事多貸命長慶二年有康買得父憲為力人張涖乗醉拉憲氣息將絶買得年十四以木鍤擊涖後三日致死敕㫖康買得尚在童年能知子道雖殺人當死而為父可哀若從沈命之科恐失度情之義宜減死處分又元和六年富平人梁悅殺父之讐投縣請罪敕㫖復讐殺人固有彛典以其伸寃請罪自詣公門發於天性本無求生寜失不經特宜減死方今眀時有此孝子其髙𢎞超若使須歸極法實慮未契鴻慈奉敕可減死一等長興二年四月大理正劇可乆奏准開成格應盗賊須得本贓然後科决如有推勘因而致死者以故殺論臣請起今以後若因而致死無故即請減一等别増病患而死者從辜限正賊減本罪五等中書門下覆奏今後凡闗賊徒若推勘因而致死者有故以故殺論無故減一等如栲次因増疾患候騐分眀如無他故雖辜内致死亦以減等論從之至晉天福六年五月十五日尚書刑部員外郎李象奏據刑法統類節文云盗賊未見本贓推勘因而致死者故者以故殺論無故者減一等又云今後或有故者以故殺論無故者或景跡顯然支證不謬堅恃姦惡不招本情以此致死請減故殺罪三等其或妄被攀引終是平人以此致死請減故殺罪一等臣按上文云有故殺者以故殺論此即是矣其無者亦坐減罪即恐未當假如官司或有刑獄未見本情不可全不詰問據言有故者則是曾行拷捶及違令式或麤枷大棒强相抑壓以此致死者並屬有故無故者則是推勘之司不曾拷掠又不違法律亦不堅有抑壓此則並屬無故不可坐刑假若有犯事人舊患疾病推勘之際卒暴身亡不可亦坐推司減等之罪又據斷獄律云若依法使杖依數拷决而邂逅致死者勿論邂逅謂不期致死而死且彼言拷决尚許勿論此云無故却令坐罪事實相背理有未通請今後推勘之時致死者若實無故請依邂逅勿論之義詳定院奏臣等㕘詳若違法栲掠及託法挾情以致其死但有情故者依故殺論若雖不依法拷掠却非託法挾情以致其死而無情故者請減故殺一等若本無情故又依法拷掠或未拷掠或詰問未詰問及不抑壓因他故致死並屬邂逅勿論之義從之按有罪者拘滯囹圄官不時科决而令其瘦死此誠有國者之所宜矜憫然既曰盗賊則大者可殺小者可刑其推勘淹時而不即引伏者皆大猾巨蠧也邂逅致死而以故殺論過矣宋太祖皇帝開寳三年詔諸道州府應大辟罪决訖録其案朱書格律斷辭禁儀日月官典姓名以聞委刑部覆視五代用兵以來藩侯䟦扈率多枉法殺人朝廷務行姑息之政多置不問刑部按覆之制遂廢至是乃有是詔又金州防禦使仇超等坐故入人死罪除名流海島自是人知奉法矣五年陕州言民范義超周顯德中以私怨殺同里人常古真家十二口古真小子留留脫走得免至是長大擒義超訴於官有司引赦當原上曰豈有殺一家十二口而可以赦論即命斬之太宗興國五年涇州言定縣婦人怒夫前妻之子婦斷其喉而殺之下詔曰刑憲之設蓋厚於人倫孝慈所生實由乎天性矧乃嫡繼之際固有愛憎之殊法貴原心理難共貫自今繼母殺傷夫前妻之子及姑殺婦者並以凡人論九年鳳翔司理楊酀許州司理張睿並坐掠治平人及亡命卒致死大理處酀等公罪刑部覆以私罪詔曰法寺以酀等本非用情宜從公過議法刑部以其擅行掠治合以私罪定刑雖所執不同亦未為乖當國家方重惜人命欽恤刑章豈忍無辜之人死於酷吏之手宜如刑部之議自今諸道敢有擅掠囚致死者悉以私罪論端拱元年廣安軍民安崇緒録禁軍訴繼母馮嘗與父知逸離今來占奪父貲産欲與已子大理定崇緒訟母罪死太宗疑之判大理寺張佖固執前斷遂下臺省集議徐鉉議曰伏詳安崇緒詞理雖繁今但當定其母馮與父曾離與不離如已離異即須令馮歸宗如不曽離即崇緒准法訴母處死今詳案内不曾離異其證有四崇緒所執父書只言遂州公論後母馮自歸本家便為離異固非事實又知逸在京阿馮却來知逸之家數年後知逸方死豈可並無論訴遣斥其證一也本軍初勘有族人安景泛證云已曾離異諸親具知及欲追尋諸親景泛便自引退其證二也知逸有三處莊田馮却後來自占兩處小妻髙占一處髙來取馮莊課曽經論訟髙即自引退不曾離絶其證三也本軍曽收崇緒所生母蒲勘問亦稱不知離絶其證四也又自知逸入京之後阿馮却歸以來凡經三度官司勘鞫並無離異狀况不孝之刑教之大者崇緒請依刑部大理寺元斷處死右僕射李昉等四十三人議曰據法寺定斷以安崇緒論嫡母馮罪便合處死臣等深為不當若以五母皆同即阿蒲雖賤乃是安崇緒之親母崇緒本以田業為馮强占親母衣食不充所以論訴若從法寺斷死則知逸負何辜而絶嗣阿蒲處何地而託身臣等㕘詳田業並合歸崇緒馮亦合與蒲同居終身供侍不得有闕馮不得擅自貨易莊田并本家親族亦不得來主崇緒家務如是則男雖庶子有父業可安女雖出嫁有本家可歸阿馮終身又不乏養所有罪犯並准赦原詔從昉等議鉉佖各奪一月俸真宗咸平三年天下斷死罪八百人上覽囚簿憮然動容語宰執曰雜犯死罪條目至多官吏倘不用心豈無枉濫耶故事死罪獄具三覆奏盖其重慎何代罷之遂命檢討沿革終慮淹繫不克行也仁宗天聖初燕肅判刑部上奏言唐大理卿胡演進月囚帳太宗曰其間有可矜者豈宜一以律斷因詔凡大辟罪令尚書九卿讞之又詔凡決死刑亰師五覆奏諸州三覆奏自是全活甚衆貞觀四年斷死罪二十九開元二十五年財五十八今天下生齒未加於唐而天聖三年斷大辟二千四百三十六視唐幾至百倍京師大辟雖一覆奏而州郡之獄有疑及情可憫者至上請而法寺多所舉駁官吏率得不應奏之罪故皆増飾事狀移情就法失朝廷欽恤之意望准唐故事天下死罪皆得一覆奏議者必曰待報淹延臣則以為漢律皆以季秋論囚又唐自立春至秋分不決死刑未聞淹延以害漢唐之治也下其章中書王曽以謂天下皆一覆奏則必死之人徒充滿狴犴而久不得决請獄疑若情可矜者聼上請遂下詔曰朕念生齒之蕃抵冐者衆法有髙下情有重輕而有司巧避微文一切致之重辟豈稱朕好生之志哉其令天下死罪情理可矜及刑名疑慮者具案以聞有司毋得舉駁時天聖四年也其後雖法不應奏吏當坐罪者審刑院貼奏草率以㤙釋著為例名曰貼放於是吏無所牽制請讞者率多為減死頼以生者蓋莫可勝數焉慶歴間寧州童子年九嵗毆殺人當棄市帝以童孺争鬬無殺心止命罰金入死者家開封民聚童子教之有因榎楚死者為其父母所訟府上具獄當抵死宰相以為可矜帝曰情雖可矜法亦難屈命杖脊捨之神宗熈寜元年詔謀殺已傷按問欲舉自首從謀殺減二等論初登州言有婦阿云於母服嫁韋惡韋寢陋謀殺不死按問欲舉自首審刑大理論死用違律為㛰奏裁貸之知州許遵言當減謀殺罪二等請論如敕律乃送刑部刑部斷如審刑大理遵不服請下兩制議詔翰林學士司馬光王安石同議二人不同遂各為奏光言凡議法者當先原立法之意然後可以斷獄按律其於人損傷不在自首之例釋謂犯殺傷而自首者得免所因之罪仍從故殺傷者葢以於人損傷既不在自首之例而别因有犯如為盗刼囚略賣人之類本無殺傷之意而致殺傷人者慮有司執文并不許首故申明因犯殺傷而自首者得免所因之罪然殺傷之中自有二等其處心積慮巧詐百端掩人不備則謂之謀直情徑行略無顧慮公然殺害則謂之故謀者重故者輕今因犯他罪致殺傷人他罪得首殺傷不原若從謀殺則太重若從鬬殺則太輕故参酌其中從故殺傷法也其直犯殺傷更無他罪者惟未傷可首已傷不在首限今許遵欲以謀與殺分為兩事按謀殺故殺皆是殺人若以謀與殺為兩事則故與殺亦為兩事也彼平居謀慮不為殺人當有何罪而可首者以此知謀字止因殺字生文不得别為所因之罪若以刼鬬與謀皆為所因之罪從故殺傷法則是鬭傷自首反得加罪一等也云獲貸死已是寛恩遵為之請欲天下引以為例開姦兇之路長賊殺之源非教之善者也臣愚以為宜如大理寺所定安䂖言刑統殺傷罪名不一有因謀有因鬭有因刼囚竊囚有因略賣人有因被囚禁拒捍官司而走有因强姦有因厭魅呪咀此殺傷而有所因者也惟有故殺傷則無所因故刑統因犯殺傷而自首得免所因之罪仍從故殺傷法其意以為於法得首所因之罪既已原免而法不許首殺傷刑名未有所從唯有故殺傷為無所因而殺傷故令從故殺傷法至今因犯過失殺傷而自首則所因之罪已免唯有傷殺之罪未除過失殺傷非故殺傷不可亦從故殺傷法故刑統令過失者從本過失法至於鬭殺傷則所因之罪常輕殺傷之罪常重則自首合從本法可知此則刑統之意唯過失與鬭當從本法其餘殺傷得免所因之罪皆從故殺傷罪科之則於法所得首之罪皆原而於法所不得首之罪皆不免其殺傷之情本輕者自從本法本重者得以首原今刑部以因犯殺傷者謂别因有犯遂致殺傷竊以為律但言因犯不言别因則謀殺何故不得為殺傷所因之犯又刑部以始謀專為殺人即無所因之罪竊以為律謀殺人者徒三年已傷者絞已殺者斬謀殺與已傷已殺自為三等刑名因有謀殺徒三年之犯然後有已傷已殺絞斬之刑名豈得稱别無所因之罪今法寺刑部乃以法得首免之謀殺與法不得首免之已傷合為一罪其失律意明甚臣以為亡謀殺已傷按問欲舉自首合從謀殺減二等論然竊原法寺刑部所以自来用例斷謀殺已傷不許首免者葢為律䟽但言假有因盗殺傷盗罪得免故殺傷罪仍科遂引為所因之罪止謂因盗殺傷之類盗與殺傷為二事與謀殺殺傷類例不同臣以為律疏假設條例其於出罪則當舉重以包輕因盗傷人者斬尚得免所因之罪謀殺傷人者絞絞輕於斬則其得免所因之罪可知也然議者或謂謀殺已傷情理有甚重者若開自首則或啟姦臣以為有司議罪惟當守法情理輕重則敇許奏裁若有司輙得捨法以論罪則法亂於下人無所措手足矣御史中丞滕甫猶請再選官定議詔送翰林學士呂公著韓維知制誥錢公輔於是公著等言安石光所論敕律悉已明備所争者惟謀為傷因不為傷因而已臣等以為律著不得自首者凡六科而於人損傷不在自首之例釋謂犯殺傷而自首者得免所因之罪仍從故殺傷法葢自首者但免所因之罪而尚從故殺傷法則所因之謀罪雖原免而傷者還得傷之罪殺者還得殺之刑也且律於器物至不可備償則不許首今於人損傷尚有可當之刑而必使償之以死不已過乎古初立法殺人者死傷人者抵罪後世因刼殺而傷者則增至於斬因謀殺而傷者則增入於絞倘有不因先謀則不過徒杖三等之科而已豈深入於絞斬乎若首其先謀則傷罪仍在是傷不可首而因可首則謀為傷因亦已明矣律所以設首免之科者非獨開改惡之路恐犯者自知不可免死則欲遂其惡心至於必殺今若由此著為定論塞其原首之路則後之首者不擇輕重有司一切按文殺之矣朝廷雖欲寛宥其可得乎茍以為謀殺情重律意不通其首則六科之中當著謀殺已傷不在自首之例也編敕所載但意在致人於死並同已傷及傷與不傷情理兇惡不至死者許奏裁今令所因之謀得用舊律而原免已傷之情復以後敕而奏决則何為而不可也臣等以為宜如安石所議便制曰可大理寺審刑刑部法官皆釋罪於是法官齊恢王師元蔡冠卿等皆以公著等所議為不當又詔安石與法官集議安石與師元冠卿反覆論難師元等益堅其説明年二月庚子詔自今謀殺人已死自首及按問欲舉並奏取敇裁而判部劉述丁諷奏庚子詔書未盡封還中書於是安石奏以為律意因犯殺傷而自首得免所因之罪仍從故殺傷法若已殺從故殺法則為首者必死不須奏裁為從者自有編敕奏裁之文不須復立新制與唐介等數爭議於帝前卒從安石議是月甲寅詔自今謀殺人自首及按欲舉並以去年七月詔書從事其謀殺人已死為從者雖當首减依嘉祐敇兇惡之人情理巨蠧及謀殺人傷與不傷奏裁收還庚子詔書劉述等又奏以為不當以敕頒御史臺大理寺審刑院及開封府而不頒之諸路入誤引刑一司敕請中書樞密院合議中丞呂誨御史劉琦錢顗皆請如述等奏下之二府帝以為律文甚明不須合議而曾公亮等皆以博盡同異厭塞言者為無傷乃以衆議付樞密院文彦博以為殺傷者欲殺而傷也即已殺者不可首呂公弼以為殺傷於律不可首請自今已後殺傷依律其從而加功自首即奏裁陳升之韓絳議與安石略同時富弼入相帝令弼與安石議弼謂安石以謀與殺分為二事以破析律文盍從衆議安石不可弼乃辭以病八月遂詔謀殺人自首及按問欲舉並依今年二月甲寅敕施行詔開封府推官王堯臣劾劉述丁諷王師元以聞述等皆貶司馬光言阿云之獄中材之吏皆能立斷朝廷命兩制兩府定奪者各一敕出而復收者一收而復出者各一争論從横至今未定夫執條㩀例者有司之職也原情制義者君相之事也分争辨訟非禮不决禮之所去刑之所取也阿云之事陛下試以禮觀之豈難决之獄哉彼謀殺為一事為二事謀為所因不為所因此苛察繳繞之論乃文法俗吏之所争豈明君賢相所當留意邪今議論歳餘而後成法終為棄百代之常典悖三綱之大義使良善無告姦兇得志豈非徇其枝葉而忘其根本之所致邪不報初安石議行司勲員外郎崔台符舉手加額曰數百年誤用刑名今乃得正安石喜其附已明年六月擢判大理寺蘇州民張朝之同堂兄以槍戳死朝父逃去朝執而殺之審刑大理當朝十惡不睦死罪案既上参知政事王安石言朝父為從兄所殺而朝報殺之罪止加役流會赦應原帝從安石議特釋朝不問初曾公亮以中書論正刑名為非安石曰有司用刑名不當則審刑大理當論正審刑大理用刑名不當則差官定議議既不當即中書自宜論奏取决人主此乃所謂國體豈有中書不可論正刑名之理五年洪州民有犯徒而斷杖者其餘罪會恩免官吏失出當劾中書堂後官劉衮駁議以為律因罪人以致罪罪人遇恩者凖罪人原法洪州官吏當原又請自今官司出入人罪者皆用此令而審刑院大理寺以謂出入人罪乃官司誤致罪於人難用此令其失出者宜如衮議從之六年御史臺言大理寺斷邵武軍興元府奏案刑部郎中杜紘議以為不當詔下御史臺審定自侍郎崔台符以下三人皆無所可否獨紘獻議詔台符等各罰金初邵武軍奏讞婦與人姦謀殺其夫已定夫因醉歸姦者殺之法寺當婦謀殺為從而紘議婦加功罪應死又興元府奏讞梁懐吉往視出妻之病因寄粟其子輙取食之懐吉毆其子死法寺以盗粟論而當懐吉雜犯死罪引赦原而紘議出妻受寄粟而其子輙費用不入捕法議既上御史臺論紘議不當亦詔罰金仍展年磨勘八年尚書省言諸獲盗有已經殺人及元犯强姦强盗貸命斷配之人再犯捕獲者有司例用知人欲告或按問自首减免法且律文知人欲告及按問者欲舉自首之類减等斷遣者為其情非巨蠧有改過自新之心故行寛貸至於姦盗與餘犯不同難以例减請諸强盗已殺人并强姦或元犯强盗貸命若持杖三人以上知人欲告按問欲舉而自首因人首告應减者並不在减等之例從之元豐八年詔自今應諸州鞫訊强盗情理無可愍刑名無疑慮而輙奏請並令刑部舉駁重行朝典無得用例破條從司馬光之請也光言殺人不死傷人不刑堯舜不能以致治近刑部奏鈔兖懐耀三州之民有鬭殺者皆當論死今乃妄作情理可憫或刑名疑慮奏裁刑部即引舊例一切貸之凡律令敇式或不盡載則有司引例以决今鬭殺當死自有正條而刑部承例不問可否盡免死决配作奏鈔施行是殺人者不死其鬭殺條律無所用也請自今諸州所奏大辟情理無可憫刑名無疑慮令刑部還之使依法處斷實有可憫疑慮令刑部具其實於奏鈔後先擬處斷令門下省審覆如或不當及用例破條即令門下省駮奏取㫖勘從之元祐元年閏二月給事中范純仁言四方奏讞去年未改法以前歳奏大辟凡二百六十四死者止二十五人所活垂及九分自去年改法至今未及百日所奏案凡一百五十四死者乃五十七人所活纔及六分已上臣固知未改法前全活數多其間必有曲貸然猶不失罪疑惟輕之仁自改法後所活數少其間必有濫刑則深虧寜失不經之義請自今四方奏大辟案並令刑部大理寺再行審覆略具所犯及元奏因依令執政取㫖裁斷或所奏不當亦原其罪如此則無寃濫之獄詔大辟刑名疑慮情理可憫令刑部㸔詳無得枉濫四月尚書省言逺方奏讞待報淹繫甚衆請川廣福建荆南路罪人情輕法重當奏斷者申安撫或鈐轄司酌情决斷訖奏從之門下侍郎韓維言天下奏案必斷於大理詳議於刑部然後上之中書决於人主近歳有司昧於知法便文自營但因州郡所請依違其言即上中書貼例取㫖故四方奏讞日多於前欲望刑清事省難矣自今大理寺受天下奏案其有刑名疑慮情理可憫須具情法輕重條律否則指所斷之法令刑部詳審次第上之詔刑部立法以聞紹聖元年權刑部侍郎杜紘言諸州大辟本非疑慮其間有因奏裁遂獲免死而已决者不得䝉宥是囚之生死惟奏與否而已詔刑部大理寺申明立法徽宗崇寜三年大理寺言熈寜四年詔獄案不當奏而奏者大辟疑慮可憫免勘其餘並具官吏所坐刑法於案後取㫖原之元祐初流罪以下不應奏而奏者勿坐故有司皆知免戾不復詳法用刑率多奏上是致奏牘滋多有煩朝廷處斷請自今並依熈寜法從之五年詔民以罪麗法情有重輕則法有增損故情重法輕情輕法重舊有取㫖之令今有司惟以情重法輕則請加罪而法重情輕則不聞奏减是樂於罪人而難於用恕非所以為欽恤也自今宜遵舊法取㫖使情法輕重各適其中否則以違制論從之宣和六年臣僚言元豐舊法有情輕法重情重法輕若大辟刑名疑慮並許奏裁比来諸路以大辟疑慮决於朝廷者大理寺類以不當劾之夫情理巨蠧罪状明白裁奏以幸寛貸固在所戒然有疑而難决者一切劾之則官吏莫不便文自營臣恐天下無復以疑獄奏矣願詔大理寺並依元豐法從之髙宗紹興元年以道路不通請死囚應奏讞者權令降等斷遣慮滯獄也三年詔諸路大辟應奏者從提刑司具因依繳奏四年詔宣州奏檀偕殺人疑慮獄案令刑部重行擬斷申尚書省初宣州民葉全二者盗檀偕窖錢偕令耕夫阮授阮㨗殺全二等五人棄屍水中當斬屍不經驗奏裁詔授㨗並杖脊流三千里偕貸死杖脊配瓊州孫近為中書舎人駮之命更擬始近之提㸃浙東刑獄也紹興民俞富捕盗而併殺盗妻近奏富與盗别無私讐願貸死詔從之法寺援以為比執前擬不變近又言富執本縣判状捕刼盗殺拒捕之人并及妻偕乃私用威力被殺者五人所犯不同乃詔御史臺㸔詳侍御史辛炳等言偕係故殺衆證分明以近降申明條法不應奏輔臣進呈朱勝非曰疑獄不當奏而輙奏者法不論罪縁近以宣州有觀望欲併罪之上曰宣州可貸今若加罪則後来實有疑慮者亦不復奏陳矣乃詔偕論如律法寺當職丞評刑部郎官各贖金有差二十六年詔申嚴州郡妄奏出人死罪之禁右正言凌哲上疏曰臣聞髙祖入關悉除秦法與民約三章耳所謂殺人者死實居其首焉司馬光有言殺人者不死雖堯舜不能致治斯言可謂至當矣臣竊見諸路州軍勘到大辟雖刑法相當者類以為可憫奏裁遂獲貸配前此臣僚累當論列而比年尤甚無他居官者無失入坐累之虞為吏者有放意鬻獄之事上下相䝉莫之悛革貸死愈衆殺人愈多殆非以辟止辟之道也臣嘗取會到自去歳郊祀後距今大辟奏裁者無慮五十有餘人姑撫其略而言之汀州雷七處州徐環兒郭公彦䕫州冉臯此四人者情理兇惡實犯故殺鬭殺之條葢常赦所不原者於法既無疑慮於情又無可憫今各州勘結刑寺㸔詳並皆奏裁貸减彼殺人者可謂幸矣顧被殺者銜恨九原不知何時而已也臣恐强暴之風日益滋長善良之人莫能自保其於刑政為害非細欲望特降睿㫖應今後諸州軍大辟若情犯委實疑慮方得具奏其情法相當實無可憫者自合依法申夲路憲司詳覆施行當職官吏及刑寺日後將别無疑慮情非可憫奏案輙引例减貸以破正條並許臺臣彈劾嚴置典憲庻使用刑平允惡人重於犯法上覽奏曰但恐諸路减裂實有疑慮情理可憫之人一例不奏有失欽恤之意令刑部坐條及前後指揮行下容齋洪氏隨筆曰州郡疑獄許奏讞葢朝廷之仁恩然不問所犯重輕及情理蠧害一切縱之則為壊法耿延年提㸃江東刑獄専務全活死囚其用心固善然南康婦人謀殺其夫甚明曲貸其命累勘官翻以失入被罪予守贛一將兵逃至外邑殺村民於深林民兄後知之畏申官之費即焚其尸事發繫獄以殺時無證尸不經驗奏裁刑寺輙定為斷配予持勅不下復奏論之未下而此兵死於獄因記元豐中宣州民葉元以同居兄亂其妻而殺之又殺兄子而强其父與嫂約契不訟於官鄰里發其事州以情理可憫為上請審刑院奏欲貸神宗曰罪人已前死姦亂之事特出於葉元之口不足以定罪且下民雖為無知抵冒法禁固宜哀矜然以妻子之愛既殺其兄仍戕其姪又罔其父背逆天理傷敗人倫宜以毆兄至死律論此㫖可謂至明矣二十七年十月盗發烏江縣王公衮母冢有司釋之公衮手殺盗事聞其兄佐為吏部員外郎乞納官以贖公衮之罪詔令給舎議時給舎楊椿等大略謂發冢開棺者律當絞公衮始獲盗不敢殺而歸之吏獄成而吏出之使揚揚出入閭巷與齊民齒則地下之辱沉痛鬱結終莫之伸為人子者尚得自比於人椿等謂公衮殺掘冢法應死之人為無罪納官贖弟之請當不許故縱失刑有司之罪宜如律上是之詔公衮降一官佐依舊供職紹興府當職官皆抵罪孝宗乾道六年臣僚言國家立法議罪最為詳備大抵共毆傷殺人必有首有從甲為首則乙以下皆從甲於法合坐死罪自乙而下並當先次决遣在外州郡如甲情理可憫方許奏裁如駐蹕之地凡罪應死者必奏徒流以下申御史臺取㫖施行此定制也今有司不務遵行成法纔事渉大辟不問首從俱奏又流徒以下多作情重㸔詳取㫖則合先次决遣之人豈得不例遭禁繫請今後大辟只許以為首坐應死罪者奏為從而不應坐死者先次决遣流徒罪不許牽引情重取㫖不然則坐以不應奏而奏之罪從之淳熈十三年臣僚言恭覩國朝法令諸大辟情理昭然不應奏者具奏欵申提刑司詳覆論决其有情輕法重情重法輕刑名疑慮應奏裁者徑從本州申奏録副本申提刑司訪聞諸路憲臣間有固執偏見凡所部獄案不問應奏皆令申上俟其㸔詳之後方許聞奏推其本心固欲審克力不逮志竟成淹滯至有一郡之獄凡十八案申上累月不報遂致一路之獄積四百餘件終歳待報而不决請令刑部檢坐慶元敕令徧符諸路州軍合應奏者州郡徑自照條聞奏不必俟憲司囬報庻使獄無淹滯從之中書舎人葛邲言乾道六年指揮强盗並依舊法議者以為持杖脅人以盗財者亦死是脅人與殺人等死恐非所以為良民地後来遂立六項並依舊法處斷外餘聼依刑名疑慮奏裁自此指揮已行之後非特刑名疑慮者不死而在六項者亦為不死法出姦生徒為胥吏受贓之地若犯强盗者不别輕重而一於死則死者必多又非所以示好生之徳也乞下有司詳議立為定法從之其後言者又謂强盗茍不犯六項雖累行刼至十數次以上並贓至百千貫皆可以貸命謂宜除六項指揮外其間行刼至兩次以上雖是為從亦合依舊法處斷乃詔自今應强盗除六項指揮外其間有累行刼至兩次以上雖是為從亦依舊法處斷有情實可憫者方行奏裁所謂六項者謂為首及下手傷人下手放火因而行姦殺人加功已曾貸命再犯之人也寜宗開禧元年八月知衡州張訢言國家斷獄備極詳審茍有疑慮奏裁别推又有殺人無證一條斷獄註云殺人屍不經驗與無證佐者若勘鞫證佐逃死及雖有證而於法不許為證者同夫屍不經驗與證佐逃死事固顯然往往州郡引用失當遂致抵牾葢謀殺刼殺則有佐而必無證鬭殺故殺則有證必無佐夫謂之證者旁證之謂也謂之佐者助己之謂也曰證曰佐自是二事茍有其一皆可以表殺人之然否至於不許為證正謂殺害人親屬等人慮其私於黨與法故不許近日曲法者凡是重囚多作無證具奏且行兇之時相助協力到官之後自相供通謂之有佐可也何必更求有證至如行兇之人親屬旁援到官固無由證之理例拘親屬不許為證承舛襲訛寖失本意請行下刑寺及敇令所明施行刑寺奏實如訢請行下諸路自今後不許將無證有佐無佐有證之獄入疑慮之色奏裁從之三年三月吳曦以反逆誅族屬悉當連坐詔付從官給舎刑部法寺集議合得刑名吏部尚書兼給事中陸峻等議曰竊詳反逆罪父子年十六已上皆絞伯叔父兄弟之子合流三千里自有正條外所有十五以下及母女妻妾子妻妾祖孫兄弟姊妹敕無罪名律止沒官比之伯叔父兄弟之子服屬尤近即顯沒官重於流三千里葢緣坐沒官雖貸而不死世為奴婢律比畜産此法雖存而不見於用其母女妻妾子妻妾祖孫兄弟姊妹合於流罪上議刑竊緣上條所載止為謀反疏文云臣下將圖逆節者今吳曦建號稱備極僭擬反逆已成上件條未足以盡其罪請特出睿斷施行詔吳曦叛逆族屬悉合誅戮朕念其先世不忍夷㓕除曦妻男並决重杖處死外其男十五以下并女及生子之妾並分送二廣逺惡州軍編管内女已出嫁者免親兄弟有官人除名勒停應吳璘位下子孫並移徙出蜀分往湖廣諸州居住吳玠位下子孫與免連坐通主吳璘墳墓祭祀令四川宣撫置司取見服屬官職照應施行訖聞奏文獻通考卷一百七十
