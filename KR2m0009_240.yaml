body:
  text: 文獻通考卷二百四十鄱陽馬端臨貴與著經籍考六十七集别集石湖集一百三十六卷陳氏曰參政吳郡范成大至能撰初以起居郎使金附奏受書事抗論於其殿陛間歸時益被上眷以至柄用石湖在太湖之濵姑蘇臺之下去城十餘里面湖為堂號鏡天閣又一堂扁石湖二字阜陵宸翰也今日就荒毁更數年恐無復遺迹矣一再過之為之慨然誠齋序其集曰公訓誥具西漢之爾雅賦篇有杜牧之之刻深騷辭得楚人之幽遠序山水則柳子厚序任俠則太史遷至於大篇決流短章斂芒縟而不釀縮而不僒清新嫵媚奄有鮑謝奔逸雋偉窮追太白求其隻字之陳陳一唱之嗚嗚而不可得也今四海內詩人不過三四而公皆過之無不及者豫於詩豈敢以千里畏人者而於公獨斂袵焉周益公集二百卷年譜一卷附録一卷陳氏曰丞相文忠益公廬陵周必大子充撰一字𢎞道其家既刋六一集故此集編次一切視其凡目其間有奉詔録親征録龍飛録思陵録凡十一卷以其多及時事托言未刋人莫之見鄭子敬守吉募工人印得之余在莆田借録為全書然漫其數十處益公自號平園叟後村劉氏曰平園晚作益自磨礪然散語終是洗滌詞科氣習不盡惟所撰林艾軒志銘極簡嚴有古意渭南集三十卷劒南詩藁續藁八十七卷陳氏曰華文閣待制山陰陸遊務觀撰左丞佃之孫紹興末召對賜出身隆興初為密院編修官鄉用矣坐漏泄省中語阜陵以為反覆斥遠之後以夔倅入蜀益自放肆不護細行自號放翁在蜀九年乃歸晚由嚴陵召為南宫舍人將內禪周益公薦其直北門上終不用及韓氏用事遊既挂冠久矣有幼子澤不逮為托胄作南園記起為大蓬遂以次對再致仕嘉定庚午年八十六而終遊才甚高幼為曾吉父所賞識詩為中興之冠他文亦佳而詩最富至萬餘篇古今未有故文與詩别行渭南者封渭南縣伯復齋制表二卷陳氏曰刑部侍郎王秬嘉叟撰初寮安中之孫紹興乾道間名士也陸放翁與之厚善盤洲集八十卷陳氏曰丞相文惠公鄱陽洪適景伯撰忠宣之長子方奉使時文惠甫十三歲後與其弟遵同中壬戍宏博科本名造後改焉又三年乙丑弟邁繼之世號三洪其自淮東總領入為太常少卿一年而入右府又半年而拜相然在位僅三閲月為林安宅所攻而去嘗一帥越間居十六年而終小隱集七十卷陳氏曰樞密文安公洪遵景嚴撰其進用最先於兄弟而得年不永薨於淳熙元年野處類藁二卷陳氏曰翰林學士文敏公洪邁景盧撰其全集未見誠齋集一百三十三卷陳氏曰寶謨閣學士文節公廬陵楊萬里廷秀撰當淳熙末為大蓬論思陵配享不合去及韓托胄用事召之卒不至自次對遷至學士聞開禧出師不食而死自作江湖集序曰豫少作有詩千餘篇至紹興壬午皆焚之大槩江西體也今所存曰江湖集者蓋學后山及半山及唐人者也荆溪集序豫之詩始學江西諸君子既又學后山五字律既又學半山老人七字絶句晚乃學絶句於唐人學之愈力作之愈寡嘗與林謙之屢歎之謙之云擇之之精得之之艱又欲作之之不寡乎之官荆溪嘗以告日作詩忽若有寤於是辭謝唐人及王陳江西諸君子皆不敢學而後欣如也南海集序豫好為詩初好之既而厭之紹興壬午豫詩始變豫乃喜既而又厭之至乾道庚寅詩又變淳熙丁酉詩又變時假守毗陵友人尤延之云豫詩每變每進今老矣未知能變否能變矣未知能進否程文簡集二十卷陳氏曰吏部尚書新安程大昌泰之撰每卷分上下其實四十卷也博學長於考究著述甚多皆傳於世樵隱集十五卷陳氏曰信安毛幵平仲撰禮部尚書友之子負才傲世仕止州倅與尤遂初厚善臨終以書别之囑以志墓延之既為銘又序其集梁溪集五十卷陳氏曰禮部尚書錫山尤袤延之撰家有遂初堂藏書為近世冠鄭景望集三十卷陳氏曰宗正少卿永嘉鄭伯熊景望撰歸愚翁集二十六卷陳氏曰秀州判官鄭伯英景元撰近世永嘉學者推二鄭伯熊紹興乙丑進士自隆興初為館職王府東宫官至少司成宗正鄉用矣每小不合輒乞去卒於建寧守伯英癸未甲科第四人以親養三十年不調竟不出二人皆豪傑之士也水心葉氏序曰余嘗嘆章蔡氏擅事秦檜終成之更五六十年閉塞經史滅絶理義天下以佞諛鄙淺成俗豈惟聖賢之常道隱民彜并喪矣於斯時也士能以古人源流前輩出處終始執守慨然力行為後生率非壞傑特起者乎吾永嘉二鄭公是已蓋長曰伯熊字景望季曰伯英字景元大鄭公恂恂少而德成經為人師深厚悃愊無一指不夲於仁義無一言而不關於廊廟而景元俊健果決論事憤發思得其志則必欲盡洗紹聖以來弊政復還祖宗之舊非隨時默默茍為祿仕者也景望徇道寂寞視退如進官至宗正少卿而止初景元中進士第第四人少卿喜而笑曰子一日先我矣然既任秀州判官遂以親辭終其身二十餘年不復仕朝廷亦卒不徴用何者諸公貴人知其才大氣剛中心畏之方以其自重不浪出無能害己為幸而不暇以廢格科目摧折名士為己責故也豈不悲哉自二鄭公後儒豪接踵而永嘉與為多然皆兄事景元方其家居得朋友通共有無並坐接席不知歲月遷改自謂如華胥至樂故其講習見聞尤精而片辭半簡必獨出肺腑不規倣衆作也夫孔翠鸞凰矜其華采顧影自耀為世珍惜是既然矣若夫蛟龍之興雲雨則雷電皆至霮䨴百里豈區區然露小技衒細巧而足哉余懼覽者未察因次其夲末如左晦庵集一百卷紫陽年譜三卷陳氏曰侍講文公新安朱熹元晦撰年譜李方子公晦所述其門人也勉齋黃氏曰周程張邵之書所以繼孔孟道統之傳歷時未久微言大義鬱而不彰為之裒集發明而後得以盛行於世太極先天圖精微廣博不可涯涘為之解剝條畫而後天地本原聖賢藴奧不至於泯沒程張門人祖述其學所得有淺深所見有踈密先生既為之區别以悉取其所長至或識見小偏流於異端者亦必研窮剖析而不沒其所短南軒張公東萊呂公同出其時先生以其志同道合樂與之友至或見識少異亦必講磨辨難以一其歸至若求道而過者病傳注誦習之煩以為不立文字可以識心見性不假修為可以造道入德守虛靈之識而昧天理之真借儒者之言以文佛老之説學者利其簡便詆訾聖賢捐棄經典猖狂呌呶側僻固陋自以為悟立論愈下者則又崇奬漢唐比附三代以便其計功謀利之私二説並立高者陷於空無下者溺於卑陋其害豈淺淺哉先生力排之俾不至亂吾道以惑天下於是學者靡然向之先生教人以大學論孟中庸為入道之序而後及諸經以為不先乎大學則無以提綱挈領而盡論孟之精微不參之以論孟則無以融會貫通而極中庸之旨趣然不會其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉其於讀書也又必使之辨其音釋正其章句玩其辭求其意研精覃思以究其所難知平心易氣以聽其所自得然為己務實辨别義利毋自欺謹其獨之戒未嘗不三致意焉蓋亦欲學者窮理反身而持之以敬也從遊之士迭誦所習以質其疑意有未諭則委曲告之而未嘗倦問有未切則反復戒之而未嘗隱務學篤則喜見於言進道難則憂形於色講論經典商略古今率至夜半雖疾病支離至諸生問辨則脫然沉痾之去體一日不講學則惕然常以為憂摳衣而來遠自川蜀文詞之傳流及海外至於敵人亦知慕其道窔問其起居窮鄉晚出家蓄其書私淑諸人者不可勝數先生既沒學者傳其書信其道者益衆亦足以見理義之感於人者深矣繼往聖將微之緒啓前賢未發之機辨諸儒之得失闢異端之訛繆明天理正人心事業之大又孰有加於此者至若天文地志律歷兵機亦皆洞究淵微文詞字畫騷人才士疲精竭神嘗病其難至先生未嘗用意而亦皆動中規繩可為世法是非資稟之異學行之篤安能事事物物各當其理各造其極哉學修而道立德成而行尊見之事業者又如此秦漢以來迂儒曲學既皆不足以望其藩墻而近代諸儒有志乎孔孟周程之學者亦豈能以造其閫域哉嗚呼是殆天所以相斯文焉篤生哲人以大斯道之傳也習庵集十二卷陳氏曰戶部侍郎曾逮仲躬撰文清公幾之子東萊呂太史集十五卷别集十六卷外集五卷附録三卷陳氏曰著作郎東萊呂祖謙伯恭撰其弟祖儉編録凡家範尺牘之類編之别集策問宏詞程文之類總之外集年譜遺事則見附録太史曾文清外孫隆興癸未鎖廳甲科宏詞亦入等仕未逹得末疾奉祠年才四十五卒於淳熙辛丑平生著述皆略舉端緒未有成書者學者惜之大愚叟集十一卷陳氏曰太府寺丞呂祖儉子約撰祖謙弟也慶元初上封事論救祭酒李祥謫高安以沒寓居大愚寺故以名集千巖擇藁七卷外編三卷續編四卷陳氏曰知峽州三山蕭德藻東夫撰嘗宰烏程後遂家焉楊誠齋序其集曰近世詩人若范石湖之清新尤梁溪之平淡陸放翁之敷腴蕭千巖之工致皆余所畏也濟溪老人遺藁一卷陳氏曰通判明州濟源李迎彥將撰永嘉周浮沚先生之壻與先大父為襟袂集中有送先君子赴戊子秋試詩首句籍甚人言易已東蓋先君治易故也集序周益公作泝庵集四十卷陳氏曰新津任淵子淵撰紹興乙丑類試第一人仕至潼川憲嘗注山谷后山詩行於世新津有天社山故稱天社任淵方舟集五十卷後集二十卷陳氏曰資陽李石知幾撰石有盛名於蜀少嘗客蘇符尚書家紹興末為學官乾道中為郎歷麾節皆以論罷趙丞相雄其鄉人也素不善石石以是晚益困其自序云宋魋魯倉今猶古也歸愚集二十卷陳氏曰吏部侍郎葛立方常之撰勝仲之子丞相邲之父也以郎官攝西掖忤秦相得罪更化召用言者又以為附會沈該罷去遂不復起綺川集十五卷陳氏曰太常寺主簿歸安倪稱文舉撰紹興八年進士齊齋之父象山集二十八卷外集四卷陳氏曰知荆門軍金溪陸九淵子靜撰與其兄九齡子壽乾淳間名士也象山在貴溪結茅其上與士友講學山形如象故名朱子答項平父書曰大抵子思以來教人之法惟以尊德性道問學為用力之要今子靜所説專是尊德性而熹平日所論却是問學上多了所以為彼學者多持守可觀而看得義理全不子細又别説一種杜撰道理遮蓋不肯放下而熹自覺雖於義理上不敢亂説却於緊要為己為人者多不得力今當返身用力去短集長庶不墮一偏耳又答孫敬甫書曰陸氏之學在近年一種浮淺頗僻議論中固自卓然非其儔匹其徒博習亦有能修其身能治其家以施之政事之間者但其宗旨本自禪學中來不可掩諱當時若只如鼂文元陳忠肅諸人分明招認著實受用亦自有得力處不必如此隱諱遮藏改名換姓欲以欺人而人不可欺徒以自欺而自陷於不誠之域也然在吾輩須知其如此而切為所惑若於吾學果有所見則彼之言釘釘膠粘一切假合處自然解拆破散收拾不來矣切勿與辨以啓其紛拏不遜之論而反為卞莊子所乘也少時喜讀禪學文字見杲老與張侍郎書云左右既得此欛柄入手便可改頭換靣却用儒家言語説向士夫接引後來學者其意大略如此不能盡記其語後見張公經解文字一用此策但其遮藏不密線索漏處多故讀者一見便知其所自來難以純自託於儒者若近年則其為術益精為説寖巧拋閃出沒頃刻萬變而幾不可辨矣然自明者觀之亦見其徒爾自勞而卒不足以欺人也但杲老之書近見藏中印本却無此語疑是其徒已知此陋而陰削去之近得江西一後生書有兩語云瞚目扼腕而指本心奮髯切齒而談端緒此亦甚中其鄉學之病也潔齋袁氏集序曰先生自始知學講求大道不得弗措久而寖明又久而大明此心此理貫通融會美在其中不勞外索揭諸當世曰學問之要得其本心而已心之本真未嘗不善有不善者非其初然也孟子嘗言之矣向為身死而不受今為宮室之美妻妾之奉所識窮乏得我而為之此之謂失其本心其言昭晰如是而學者不能深信謂道為隱而不知其著謂道為邈而不知其近求之愈過道愈湮鬱至先生始大發之如指迷塗如藥久病迷者悟病者愈不越於日用之間而本心在是矣學者親承師訓向也跂望聖賢若千萬里之隔乃今知與我同本培之溉之皆足以敷榮茂遂豈不深可慶哉嗚呼先生之惠後學𢎞矣先生之言率由中出上而啓沃君心下而切磨同志又下而開曉黎庶及其他雜然著述皆此心也儒釋之所以分義利之所以别剖析至精如辨白黑遏俗學之橫流援天下於既溺吾道之統盟不在兹乎林艾軒集二十卷工部侍郎林光朝撰後村劉氏序略曰以言語文字行世非先生意也先生乾淳間大儒國人師之朱文公於當世之學間有異同惟於先生加敬然先生學力既深下筆簡嚴高處逼檀弓榖梁平處猶與韓並驅在當時片簡隻字人已貴重今其存者如􅒖嶁之碑岐陽之鼓矣先生殁六十年微言散軼復齋陳公某所序者僅十之二三外孫方之泰討求裒拾彚為二十卷勤於李漢趙德矣施正憲集六十七卷外集三卷陳氏曰知樞密院廣信施師點聖與撰其在政府六年上眷未衰慨然勇退引去不可回識者壯其決趙南塘汝談其壻也為序其集而傳之適齋類藁八卷陳氏曰奉新袁去華宣卿撰紹興乙丑進士改官知石首縣而卒善為歌詞嘗賦長沙定王臺見稱於張安國為書之梅溪集三十二卷續集五卷陳氏曰詹事樂清王十朋龜齡撰丁丑大魁立朝剛正劉珙作序劉氏集序略曰公始以諸生對策廷中一日數萬言被遇太上皇帝親擢冠多士取其言行之及佐諸侯入册府事今上於初濳又皆以忠言直節有所裨補上亦雅敬信之登極之初即召以為侍御史納用其説公知上意以必復土疆必雪讎恥為己任其所言者莫非修德行政任賢討軍之實而於分别邪正之際尤致意焉平居無所嗜好顧喜為詩渾厚質直懇惻條暢如其為人不為浮靡之文論事取極已意然其規模宏闊骨骼開張出入變化俊偉神速世之盡力於文字者往往反不能及其他片言半簡雖或出於脫口肆筆之餘亦無不以仁義忠孝為歸而皆出於肺腑之誠然非有所勉強慕效而為之也蓋其所稟於天者純乎陽德剛明之氣是以其心光明正大舒暢洞逹無所隱蔽而見於事業文章一皆如此海內有志之士聞其名誦其言觀其行而得其心無不斂袵心服至於小人雖以一時趨向之殊或敢巧為謗詆然其極口不過以為迂闊近名不切時務至其大節之偉然者則不能有以毫髮點汚也酒隱集三卷陳氏曰宣州司理趙育去病撰其父鼎臣承之號竹隱畸士也四六類藁三十卷陳氏曰起居郎建安熊克子復撰皆四六應用之文也亦無過人者克以王丞相季海薦驟用王時在樞府趙溫叔當國莫知其所從來頗疑其由徑沮之上意向之不能回也拙菴雜著三十卷外集四卷陳氏曰工部侍郎東平趙磻老渭師撰門下侍郎野之姪以婦翁歐陽懋待制澤入任從范石湖使金虞丞相并父亦薦之遂擢用知臨安坐殿司招兵事謫饒州雙溪集二十卷陳氏曰知郴州東陽曹冠宗臣撰由舍選登甲科坐為秦塤假手奪官再赴廷試得初品止齋集五十二卷陳氏曰中書舍人永嘉陳傅良君舉撰三山本五十卷水心葉氏墓志曰初講城南茶院時諸老先生傳科舉舊學摩蕩鼓舞受教者無異辭公未三十心思挺出陳編宿説披剝潰敗竒意芽甲新語懋長士蘇醒起立駭未曾有皆相號召雷動從之雖縻他師亦籍名陳氏由是其文擅於當世公不自喜悉謝去獨崇敬鄭景望薛士龍師友尊之入太學則張欽夫呂伯恭相視遇兄弟也公之從鄭薛也以克己兢畏為主敬德集義於張公盡心焉至古人經制三代治法又與薛公反復論之而呂公為言本朝文獻相承所以垂世立國者然後學之內外本末備矣公猶不已年經月緯晝驗夜索詢世舊翻吏牘搜斷簡採異聞一事一物必稽於極而後止千載之上珠貫而絃組之若目見其身相旋其間呂公以為其長不獨在文字也文獻通考卷二百四十
