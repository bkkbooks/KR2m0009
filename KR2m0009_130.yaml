body:
  text: 文獻通考卷一百三十鄱陽馬端臨貴與著樂考三歴代樂制宋太祖皇帝受命以竇儼兼太常儼奏改周樂文舞崇徳之舞為文徳之舞武舞象成之舞為武功之舞改樂章十二順為十二安蓋取治世之音安以樂之義祭天為髙安祭地為靜安宗廟為理安天地宗廟登歌為嘉安皇帝臨軒為隆安王公出入為正安皇帝飲食為和安皇帝受朝皇后入宫為順安皇太子軒懸出入為長安正冬朝㑹為永安郊廟俎入為豐安祭享酌獻飲福受胙為禧安祭文宣王武成王同用永安籍田先農用靜安五月有司上言僖祖文獻皇帝室奏大善之舞順祖惠元皇帝室奏大寧之舞翼祖簡恭皇帝室奏大順之舞宣祖昭武皇帝室奏大慶之舞從之其後和峴奏陛下揖讓得天下宜先奏文舞按尚書舜受堯禪元徳升聞乃命以位請改文舞為元徳升聞之舞尚書武王一戎衣而天下大定請改武舞為天下大定之舞從之建隆初用王朴樂上謂其聲髙近於哀思詔和峴考西京表尺令下一律比舊樂始和暢詳見律呂真宗咸平四年太常寺言樂工習藝匪精每祭享止奏黄鍾宫一調未嘗隨月轉律望示條約監察御史艾仲孺復上言請修飾樂器調正音律乃詔翰林學士李宗諤等編録律吕法度樂物名數目曰樂纂又裁兩署工人試補條式及肄習程課眀年八月上御崇政殿張宫懸閲試召宰相親王臨觀宗諤執樂譜立侍先以鐘磬按律凖次令登歌鐘磬塤箎琴阮笙簫各二色合奏箏琴筑三色合奏迭為一曲後以擊鐘為六變九變又為朝㑹上夀之樂及文武二舞鼓吹導引警夜之曲精習上甚悦舊制巢笙和笙每變宫之際必換管絃難於遽易樂工單仲辛遂改為之一定之制不復旋易與諸調皆協今令仲辛誕唱八十四調遂超補副樂正賜𫀆笏銀帶自餘皆賜衣帶緡錢又賜宗諤等器幣有差自是樂府制度頓有倫理先是惟天地感生帝郊廟用樂親祀用宮懸有司攝事正用登歌自餘大祀未暇備樂時既罷兵垂意典禮眀年乃詔自今諸大祀並宜用樂皆同感生帝六變如通禮所載太祖室酌獻奏大定之曲太宗室酌獻奏大盛之曲大中祥符元年以將行封禪詔改酌獻昊天上帝禧安之樂為豐安皇地祗徳安之樂為禪安飲福禧安之樂為祺安之樂别又制天書樂章瑞安靈文二曲每親行禮用之又作醴泉神芝慶雲靈鵲瑞草五曲施於朝㑹五年聖祖降奏薦獻聖祖文舞曰發祥流徳之舞武舞曰降真觀徳之舞自是玉清昭應宫親薦皆備樂同三十六簴景靈宫以宫之庭狹止用二十真宗廟室酌獻奏大眀之曲仁宗景祐二年時承平久上留意禮樂之事先是判太常寺燕肅言大樂制器嵗久金石不調願以王朴所造律凖考按乃命館職宋祁李照同預至是肅等上所考定樂器上臨閲奏郊廟五十一曲因問照樂何如照對樂音髙命詳陳之照言王朴律凖視古樂髙五律視禁坊胡部樂髙二律擊黄鍾才應仲吕擊夾鍾才應夷則是冬行夏令春召秋氣蓋五代之亂雅樂廢壊朴創意造律凖不合古法用之本朝卒無福應又編鐘鏄鐘無大小輕重厚薄長短之差銅錫不精聲韻失美大者陵小者抑非中度之器相傳以為唐舊鐘亦有朴所製者昔軒轅氏命伶倫截竹為律復令神瞽協其中聲然後聲應鳯鳴而管之參差亦如鳯翅其樂傳之夐古不刋之法也願聼臣依神瞽律法試鑄編鐘一簴可使度量權衡協和詔許之仍令就錫慶院鑄之照請下潞州求上黨縣羊頭山秬黍及下懐州河内縣取葭莩製玉律以候氣從之尋以王曽呂夷簡為都大管勾鑄造大樂編鐘蔡齊同都大管勾仍以入内都知閻文應提舉照既鑄成編鐘一簴以奏御遂建請改制大樂取京縣秬黍累尺成律鑄鐘審之其聲猶髙更用太府布帛尺為法乃下太常制四律照自為律管之法以九十黍之量為四百二十星率一星占九抄一黍之量得四星六抄九十黍得四百二十星以為十二管定法舊太常鐘磬十六枚為一簴而四清聲相承不擊照言十二律聲已備餘四清聲乃鄭衞之樂可去侍讀學士馮元等駮之詳見編鐘條下照謂舊聲髙乃以太府尺為法照獨任所見更造新器而新聲極下起五月造至八月成議者以為迂誕罷之上尋出御製景祐樂髓新經六篇賜近臣其一釋十二均二明主所事三辨音聲四圖律吕相生并祭天地宗廟所用律及隂陽數配五十二管之長短六論歴代度量衡皆本之於隂陽配之以四時建之於日月通之於鞮竺演之於壬式遁甲之法既而右司諫議韓𤦺等言照所造樂不依古法率以意為律度請復用舊樂詔下其議而晏殊等言李照新樂比舊樂下三律衆論以為無所考據請郊廟復用和峴所定舊樂乃詔太常雅樂悉仍舊制照所造勿復施用皇祐二年五月眀堂禮儀使言眀堂所用皆當隨月用律九月以無射為均五天帝各用本音之樂閏十一月詔中書門下集兩制太常官制局於祕閣詳定大樂翰林學士王堯臣請命天章閣待制趙師民預詳定仍乞借髙若訥所校十五等古尺又召國子監直講胡瑗益州進士房庶同議大樂四年冬知制誥王洙等獻新樂議者以為鐘磬皆不合古遂復命近臣詳定仍命參政劉沆梁適監議而當議者各安所習久而不決乃命諸家各作鍾律以獻五年九月親臨視之遷胡瑗阮逸等官而議者謂黄鍾為萬事根本故尺量權衡皆起於黄鍾至隋用累黍為尺而制律容受卒不能合及平陳得古樂遂用之唐興因其聲以制樂其器無法而其聲猶不失於古五代之亂大樂淪散王朴始用尺定律而聲與器皆失之故太祖患其聲髙特減一律至是又減半然太常樂比唐聲猶髙五律比今燕樂髙三律上雖勤勞制作未能得其當者有司失之於以尺生律也其後詔改名大安帝御紫宸殿奏太常新定大安之樂八月詔南郊始用舊樂其新定大安之樂常祀及朝㑹用翰林學士胡宿上言自古無並用二樂之禮今舊樂髙新樂下相去一律難並用且新樂未施郊廟先用朝㑹非先王薦上帝享祖考之意帝以為然初李照斥王朴樂音髙乃作新樂下其聲太常歌工病其太濁歌不成聲私賂鑄工使減銅齊而聲稍清歌乃協然照卒莫之辨又朴所製編鐘皆側垂照瑗皆非之及照將鑄鐘給銅於鑄䥱務得古編鐘一工人不敢毁乃藏於太常鐘不知何代所作其銘云粤朕皇祖寳龢鐘粤斯萬年子子孫孫永寳用叩其聲與朴鐘夷則清聲合而其形側垂瑗後改鑄正其鈕使下垂叩之弇鬱而不揚其鎛鐘又長甬而震踔聲不和著作郎劉義叟謂人曰此與周景王無射鐘無異上將有眩惑之疾嘉祐元年正月帝御大慶殿受朝前一夕殿庭設仗衞既具而大雨雪至壓宫架折帝於宫中跣而告天遂暴感風眩人以義叟之言為驗仁宗廟室酌獻奏大仁之曲英宗廟室酌獻奏大英之曲神宗元豐三年詔劉几范鎮楊傑詳定大樂初傑言大樂之失一曰歌不永言聲不依永律不和聲蓋金聲舂容失之則重石聲温潤失之則輕土聲凾胡失之則下竹聲清越失之則髙絲聲纎微失之則細革聲隆大失之則洪匏聲叢雜失之則長木聲無餘失之則短惟人禀中和之氣而有中和之聲八音律呂皆以人聲為度言雖永不可以逾其聲今歌者或詠一言而濫及數律或章句已闋而樂音未終所謂歌不永言也請節其煩聲以一聲歌一言且詩言人志詠以為歌五聲隨歌是謂依永律呂協奏是謂和聲先儒以為依人音而制樂託樂器以寫音樂本效人非效樂者也今祭祀樂章並隨月律聲不依永以詠依聲律不和詠以聲和律非古制也二曰八音不諧鐘磬缺四清聲虞樂九成以簫為主商樂和平以磬為依周樂合奏以金為首鐘磬簫者衆樂之所宗則天子之樂用八鐘磬簫衆樂本乃倍之為十六且十二者律之本聲而四者應聲也本聲重大為君父應聲輕清為臣子故其四聲曰清聲或曰子聲也李照議樂始不用四清聲是有本而無應也八音何從而諧哉今巢笙和笙其管十九以十二管發律吕之本聲以七管為應聲用之已久而聲至和則編鐘磬簫宜用四子聲以諧八音三曰金石奪倫樂奏一聲諸器皆以其聲應既不可以不及又不可以有餘今琴瑟塤箎笛笙阮箏筑奏一聲則鏄鐘特磬編鐘編磬擊三聲聲煩而掩衆器遂至奪倫則鏄鐘特磬編鐘編磬節奏與衆器同宜勿連擊帝乃下鎮几參定鎮作律尺等欲圖上之而几之議律主於人聲不以尺度求合其樂大抵即李照之舊而加四清聲遂奏成第加恩賚而鎮謝曰此劉几樂也臣何預焉鎮又言八音無匏土二音笙竽以木斗攢竹而以匏裹之是無匏音也塤器以木為之是無土音也八音不具以為備樂安可得哉不報初傑欲銷王朴舊鐘意新樂成雖不善更無舊鐘可校乃詔許借朴鐘為清聲不得銷毁後輔臣至太常按試前一夕傑乃陳朴鐘已弊者一縣樂工不平夜易之而傑不知明日輔臣至傑厲聲云朴鐘甚不諧美使樂工叩之韻甚佳傑大沮哲宗元祐三年范鎮上所成樂書並其圖法賜詔褒美徽宗崇寧元年詔置講議局以大樂之制譌謬殘缺太常樂器弊壊琴瑟制度參差不同簫篴之屬樂工自備每大合樂聲韻淆雜而皆失之太髙箏筑阮秦晉之樂也乃列於琴瑟之間熊羆按梁隋之制也乃設於宫架之外笙不用匏舞不成象曲不叶譜樂工率農夫市賈遇祭祀朝㑹則追呼於阡陌閭閻之中教習無素瞢不知音議樂之臣以樂經散亡無所依據秦漢之後諸儒自相非議不足取法乃博求知音之士而蜀人魏漢津上言臣聞黄帝以三寸之器名為咸池其樂曰大卷三三而九乃為黄鍾之律禹效黄帝之法以聲為律以身為度用左手中指三節三寸謂之君指裁為宫聲之管又用第四指三節三寸謂之臣指裁為商聲之管又用第五指三寸謂之物指裁為羽聲之管第二指為民為角大指為事為徵民與事君臣治之以物養之故不用為裁管之法得三指合之為九寸則黄鍾之律定矣黄鍾定餘律從而生焉臣今欲請帝中指第四指第五指各三節先鑄九鼎次鑄帝座大鐘次鑄四韻清聲鐘次鑄二十四氣鐘然後均絃裁管為一代之樂詔可其年七月景鐘成次年帝鼐八鼎成八月新樂成列於崇政殿有旨先奏舊樂三闋曲未終帝曰舊樂如泣聲揮止之既奏新樂天顔和豫詔賜名曰大晟專置大晟府大司樂一員典樂二員並為長貳大樂令一員協律郎四員以其樂施之郊廟朝㑹棄舊樂不用又詔春秋釋奠賜宴辟雍貢士鹿鳴聞喜宴悉用大晟樂屏去倡優淫哇之聲仍令選國子生教習樂舞政和三年議禮局上親祠登歌宫架二舞及大祠中祠登歌二舞之制詳見樂懸門五月詔曰大晟之樂己薦之郊廟而未施於燕饗比詔有司以大晟樂播之教坊試於庭殿五聲既具無怗懘噍急之聲嘉與天下共之可以所進樂頒之天下其舊樂悉禁於是令尚書省立法新徵角二調曲譜已經按試者並令大晟府刋行後續有譜依此其宫商羽調曲譜自從舊新樂器五聲八音方全塤箎匏笙石磬之類已經按試者大晟府畫圖疏説頒行教坊均容直開封府各頒降二副開封府用所頒樂器眀示依式造鬻教坊均容直及中外不得違今樂敢髙下其聲或别為他聲或移改増損樂器舊來淫哇之聲如打斷哨笛砑鼓十般舞小鼓腔小笛之類與其曲名悉行禁止違之者與聽之者悉坐罪蔡攸國史補初漢津獻説請帝三指之三寸三合而為九為黄鍾之律又以中指之徑圍為容盛度量權衡皆自是而出又謂有太聲有少聲太者清聲陽也天道也少者濁聲隂也地道也中聲其間人道也合三才之道備隂陽竒耦然後四序可得而調萬物可得而理當時以為迂怪劉昺之兄煒以曉樂律進未幾而卒昺始主樂事乃建白謂太少不合儒書以太史公書黄鍾八寸七分琯為中聲奏之於初氣班固書黄鍾九寸琯為正聲奏之於中氣因請帝指時止用之中指又不得徑圍為容盛故後凡制器不能成劑量工人但隨律調之大率有非漢津之本説者大樂繇建隆迄崇寧凡六改作始太祖以雅樂聲髙不合中和乃詔和峴以王朴律凖較西京銅望臬石尺為新度以定律呂於是歴建隆後有和峴樂仁宗留意樂律判太常寺燕肅言器久不諧復以朴凖考正時李照以知音聞謂朴凖髙五律與古制殊請依神瞽法鑄編鐘既成遂請改定雅樂乃下三律鍊白石為磬範中金為鐘圖三辰五靈為器之飾於是景祐中有李照樂未幾諫官御史交論其非竟復舊制其後詔集侍從禮官參定聲律而阮逸胡瑗實主其事更造磬鐘止下一律以大安名之鐘聲弇鬱震掉不和滋甚遂獨用之常祀朝㑹焉於是皇祐中有阮逸樂神宗御歴嗣守成憲未遑有所制作間從言者緒正一二知禮院楊傑條上舊樂之失召范鎮劉几與傑參議几傑請遵行祖訓一切下王朴二律用仁宗所制編鐘追考成周用樂之序辨正二舞容節而鎮欲求一稃二米真黍以律生尺改修鍾量廢四清聲詔悉從几傑議樂成奏之郊廟於是元豐中有楊傑劉几樂范鎮以為聲雜鄭衛退而請太府銅制律造樂哲宗初以樂來上按試於庭以李照樂下一律於是元祐中有范鎮樂楊傑復議其失以為出鎮一家之學卒置不用徽宗欲制作以文太平有方士魏漢津始破先儒累黍之非用夏禹以身為度之説請帝三指為黄鍾之律度鑄帝鼐景鐘謂之雅樂賜名曰大晟頒之天下播之教坊於是崇寧以來有魏漢津樂右四朝史志序言宋樂中興以前其制屢易本末大槩如此然李照阮逸劉几之樂行而隨廢范鎮之樂元未嘗行至大晟樂既成始盡棄舊樂以其制頒行天下蓋建隆之樂至崇寧而始盡變耳嘗試論之樂之道雖未易言然學士大夫之説則欲其律吕之中度工師之説則不過欲其音韻之入耳今宋之樂雖屢變然景祐之樂李照主之太常歌工病其太濁歌不成聲私賂鑄工使減銅齊而聲稍清歌乃叶而照卒不知元豐之樂楊傑主之欲廢舊鐘樂工不平一夕易之而傑亦不知崇寧之樂魏漢津主之欲請帝中指寸為律徑圍為容盛其後止用中指寸不用徑圍且制器不能成劑量工人但隨律調之大率有非漢津之本説者而漢津亦不知然則學士大夫之説卒不能勝工師之説是樂制雖曰屢變而元未嘗變也蓋樂者器也聲也非徒以資議論而已今訂正雖詳而鏗鏘不韻辨折雖可聼而考擊不成聲則亦何取焉然照傑漢津之説亦既私為工師所易而懵不復覺方且自詭改制顯受醲賞則三人者亦豈真為審音知律之士其暗悟神解豈足以希荀朂阮咸張文収輩之萬一也哉髙宗建炎元年就維揚行郊祀禮凡鹵簿樂舞禮文多未備嚴更警塲至就取中軍金鼓權一時之用紹興饗眀堂舊樂皆燬於維揚乃相度裁減權用遇雨望祭禮例止設登歌通作宫架之樂其部色合用樂工止四十七人乃招収承平舊工以補之上初即位下詔朕方日極憂念屏遠聲樂不令過耳承平典故雖實廢名存亦所不忍悉從減罷至紹興十年禮部侍郎施坰奏昨内外暫止用樂今徽考大事已畢慈寧又已就飬其時節上夀禮宜舉樂一如舊制禮部尋言太母還宫國家大慶四方來賀自今冬至元正舉行朝賀之禮依國朝故事合設大仗及用樂舞等庶眀天子之尊舊典不至廢墮詔俟來年舉行十三年郊祀詔修圜壇有司言大禮排設備樂宮架樂辦一料外登歌樂依在京夏祭例合用兩料其樂器登歌則用編鐘編磬各一架柷敔二搏拊鼓二琴五色自一三五七至九絃各二瑟四笛四塤箎簫並二巢笙和笙各四并七星九曜閏餘匏笙各一麾幡一宫架則用編鐘編磬各十二架柷敔二琴五色各十瑟二十六巢笙及簫並一十四七星九曜閏餘匏笙各一竽笙十塤一十二箎一十八笛二十晉鼓一建鼓四麾幡一乃從太常下之兩浙江南福建州郡又下之廣東荆湖南北刷取舊管大樂上於行都有闕則下軍器所製造并添修雅飾遇雨則油帕排設用樂牀而樂器寖備其樂工以太常寺所請詔依在京例選擇行止畏謹人召募合登歌宫架用四百四十人同日分詣太社太稷九宫貴神每祭各用樂正二人執色樂工掌事掌器三十六人三祭共一百一十四人文舞武舞計用一百二十八人就用文舞番充其二舞引頭二十四人各行募補所募樂工舞師照在京例分三等廪給其募到樂正掌事掌器自六月一日教習引舞色長文武舞頭舞師并分詣樂工等自八月一日教習所貴樂藝精熟不至疎鹵而樂工漸集十四年正旦朝㑹始陳樂舞在庭公卿奉觴獻夀據元豐詳定朝㑹樂第一爵登歌奏和安之曲堂上之樂隨歌而發第二爵笙入乃奏瑞曲惟吹笙而餘樂不作第三爵奏瑞曲堂上歌堂下笙一歌一吹相間第四爵合樂仍奏瑞曲而上下之樂交作今悉倣舊典首奏和安次奏嘉木成文滄海澄清瑞粟呈祥三曲其樂專以太蔟為宫太蔟之律生氣湊達萬物於三統為人正於四時為孟春故元㑹用之時命給事中叚拂等討論景鐘制度按大晟樂書黄帝有五鐘一曰景鐘景者大也黄鍾者樂之所自出而景鐘又黄鍾之本故為樂之祖惟天子郊祀上帝則用之自齋宫詣壇則擊之以召至陽之氣氣既聞聲闋衆樂乃作祀事既畢陞輦又擊之是年内出御製郊祀大禮天地宗廟樂章及詔宰執學士院兩省官刪修郊祀大禮樂章付太常肄習天子親祀南郊圜鍾為宫三奏黄鍾為角一奏太蔟為徵一奏姑洗為羽一奏樂凡六成歌景安用文徳武功之舞饗眀堂夾鍾為宫三奏黄鍾為角太蔟為徵姑洗為羽各二奏樂凡九成歌誠安用右文化成威功睿徳之舞前二日朝獻景靈宫圜鍾為宫三奏黄鍾太蔟姑洗各一奏凡六成所奏樂與南郊同歌興安用發祥流慶降真觀徳之舞前一日朝饗太廟黄鍾為宫三奏大吕為角太蔟為徵應鍾為羽皆二奏樂凡九成歌興安所用文武二舞與南郊同僖祖廟用基命之樂舞翼祖廟用大順之樂舞宣祖廟用天元之樂舞太祖廟用皇武之樂舞太宗廟用大定之樂舞真宗仁宗廟樂舞曰熙文曰美成英宗神宗廟樂舞曰治隆曰大眀哲宗徽宗欽宗廟樂舞曰重光曰承元曰端慶皆以無射宫奏之每歲祀昊天上帝者凡四正月上辛祈榖孟夏雩祀季秋饗眀堂冬至祀圜丘是也圜鍾為宫樂奏六成與南郊同乃用景安之歌帝臨嘉至神娭錫羡之舞祀地祇者二夏至祀皇地祇凾鍾為宫太蔟為角姑洗為徴南吕為羽樂奏八成乃用寧安之歌儲靈錫慶嚴恭將事之舞立冬後祀神州地祇樂奏八成歌寧安與祀皇地祇同名而異曲用廣生儲祐厚載凝福之舞孟春上辛祀感生帝赤熛怒其歌大安其樂舞則與歲祀昊天同三年一祫及時饗太廟九成之樂興安之歌與大禮前事朝饗同而用孝熙昭徳禮洽儲祥之舞太社太稷用寧安八成之樂與歲祀地祇同至於親御翰墨製贊宣聖及七十二弟子以廣先朝崇儒右文之聲天子視學親行酌獻定釋奠為大祀用凝安九成之樂郡邑行事則樂止三成云他如親饗先農親祀髙禖則敞壇壝奏樂舞按習於同文館法惠寺親耕籍田則據宣和舊制陳設大樂而引呈耒耜䕶衞耕根車儀仗鼓吹至以二千人為率先農樂用靜安髙禖樂用景安皇帝親行三推禮樂用乾安孝宗乾道元年郊祀詔禮文依藝祖乾徳郊天例務從省約於是肄樂工伎率至減半壇下宫架二百七人省十之一琴二十八瑟十二人各省其半笙簫笛可省者十有八人箎塤可省者一十人其閑慢樂色量省人數淳熙六年行眀堂禋禮命禮官參酌南郊眀堂儀注用紹興成憲而兼酌元豐大觀舊典定為後世法程其用樂作止之節前三日太常設登歌於壇上稍南北向設宫架於壇南内壝之外立舞表於酇綴之上眀堂登歌設於堂上前楹間宫架設於庭中前一日設協律郎位二一於壇上樂簴西北一於宫架西北押樂官位二太常丞於登歌樂簴北太常卿於宫架北省牲之夕押樂太常卿及丞入行樂架協律郎展視樂器祀之日樂正率工人二舞以次入皇帝乘輿自青城齋殿出樂正撞景鐘降輿入大次景鐘止眀堂不用景鐘服大裘衮冕自正門入協律郎跪俛伏舉麾工鼓柷宫架乾安之樂作凡升降行止皆奏之眀堂奏儀安至午階版位西向立協律郎偃麾戞敔眀堂至阼階下樂止凡樂皆協律郎舉麾而後作偃麾而後止禮儀使奏請行事宫架作景安之樂眀堂作誠安文舞進左丞相等升詣神位前樂作六成止皇帝執大圭再拜内侍進御匜帨宫架樂作帨手畢樂止禮儀使前導升壇宫架樂作至壇下樂止升自午階眀堂升自阼階登歌樂作至壇上樂止登歌嘉安之樂作眀堂至堂上作鎮安奠鎮圭奠玉幣於上帝樂止詣皇地祇太祖太宗神位前如上儀禮儀使導還版位登歌樂作降階樂止眀堂降自阼階宫架樂作至版位樂止奉俎官入正門宫架豐安之樂作眀堂作僖安跪奠俎訖樂止内侍以御匜帨進宫架樂作帨手拭爵樂止禮儀使導升壇宫架樂作至午階樂止升自午階登歌樂作至壇上樂止眀堂無升壇登歌僖安之樂作眀堂作慶安詣神位前三祭酒少立樂止讀冊皇帝再拜每詣神位並如之禮儀使導還版位登歌樂作降階樂止宫架樂作至版位樂止奏請還小次宫架樂作入小次樂止武舞進宫架正安之樂作眀堂作穆安舞者立定樂止亞獻升詣酌罇所西向立宫架正安之樂作眀堂皇太子為亞獻作穆安三祭酒以次酌獻如上儀樂止終獻亦如之奏請詣飲福位宫架樂作至午階登歌樂作將至位樂止登歌僖安之樂作眀堂作胙安飲福禮畢樂止禮儀使導還版位登歌樂作降階樂止宫架樂作至版位立樂止眀堂不降階徹豆登歌熙安之樂作眀堂作歆安送神宫架景安之樂作一成止眀堂作誠安詣望燎望瘞位宫架樂作至位樂止眀堂有燎無瘞瘞畢還大次宫架乾安之樂作眀堂作憇安至大次樂止皇帝乘大輦出大次樂正撞景鐘鼓吹振作降輦還齋殿景鐘止百官宗室班賀於端誠殿奏請聖駕進發軍樂引導至麗正門大樂正令奏采茨之樂進入門樂止眀堂就賀於紫宸殿不奏采茨廼御麗正門肆赦前期太常設宫架樂於門之前設鉦鼓於其西皇帝升門至御閣大樂正令撞黄鍾之鐘右五鐘皆應乾安之樂作升御座樂止金雞立太常擊鼓囚集鼓聲止宣制畢大樂正令撞㽔賔之鐘左五鐘皆應皇帝還御幄樂止乘輦降門作樂引導至文徳殿降輦樂止建炎以來朝野雜記太常寺大樂局祀天神祭地祗饗宗廟應用大樂名件凡三十四種歌色一也笛色二也塤色三也箎色四也笙色五也簫色六也編鐘七也編磬八也鎛鐘九也特磬十也五琴色十一也瑟色十二也柷敔十三也搏拊十四也晉鼓十五也建鼓十六也鞞應鼓十七也靁鼓祭天神用十八也靁鼗鼓同上十九也靈鼓祭地祗用二十也靈鼗鼓同上二十一也露鼓饗宗廟用二十二也露鼗鼓二十三也雅鼓二十四也相鼓二十五也單鼗鼓二十六也旌纛二十七也金鉦二十八也金錞二十九也單鐸三十也雙鐸三十一也鐃鐸三十二也奏座三十三也麾幡三十四也此外又有景鍾者天子親祀上帝則用之非祠官所常用寧宗嗣位禮樂之事遵式舊典未嘗敢有改作先是孝宗廟奏用大倫之樂舞光宗祔廟奏用太和之樂舞詔恭依上初纂承當中興六七十載之間士多嘆樂典之久墜類欲蒐講古制以補聖世遺軼於是姜䕫進大樂議於朝䕫言紹興大樂多用大晟所造有編鐘鎛鐘景鐘有特磬玉磬編磬三鐘三磬未必相應塤有大小簫箎篴有長短笙竽之簧有厚薄未必合度琴瑟絃有緩急燥濕軫有旋復柱有進退未必能合調總衆音而言之金欲應石石欲應絲絲欲應竹竹欲應匏匏欲應土而四金之音又欲應黄鍾不知其果應否樂曲知以七律為一調而未知度曲之義知以一律配一字而未知永言之㫖黄鍾奏而聲或林鍾林鍾奏而聲或太蔟七音之協四聲各有自然之理今以平入配重濁以上去配輕清奏之多不諧協八音之中琴瑟尤難琴必每調而改絃瑟必每調而退柱上下相生其理至妙知之者鮮又琴瑟聲微常見蔽於鐘磬簫鼓之聲匏竹土聲長金石常不能以相待往往考擊失宜消息未盡至於歌詩一句而鐘四擊一字而竽一吹未叶古人槁木貫珠之意況樂工茍焉占籍擊鐘磬者不知聲吹匏竹者不知穴操琴瑟者不知絃同奏則動手不均迭奏則發聲不屬比年人事不和天地多忒由大樂未有以格神人召和氣也宫為君為父商為臣為子宫商和則君臣父子和徵為火羽為水南方火之位北方水之宅常使水聲衰火聲盛則可助南而抑北宫為夫徴為婦商雖父宫實徴之子常以婦助夫子助母而後聲成文徴盛則宫唱而有和商盛則徴有子而生生不窮休祥不召而自至災害不祓而自消聖主方將講禮郊見願詔求知音之士考正太常之器取所用樂曲條理五音櫽括四聲而使之叶和然後品擇樂工其上者教以金石絲竹匏土歌詩之事其次教以戞擊干羽四金之事其下不可教者汰之雖古樂未易遽復而追還祖宗盛典實在兹舉文獻通考卷一百三十
