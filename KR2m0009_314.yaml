body:
  text: 文獻通考卷三百十四鄱陽馬端臨貴與著物異考二十龜異禹治水時神龜自洛出負文而列於背赤文朱字其數皆九禹因而第之以為九疇宋元王二年江使神龜於河至於泉陽漁者豫且舉網得而囚之索隐曰且音子余切泉陽人網元龜者置於籠中夜半龜來見夢於宋元王曰我為江使於河而幕網當吾路泉陽豫且得我我不能去身在患中莫可告語王有德義故來告訴元王惕然而悟乃召博士衞平而問之索隐曰宋元君之臣也曰今寡人夢見一丈夫延頸而長頭衣元繡之衣而乘輜車來見夢於寡人曰我為江使於河而幕網當吾路泉陽豫且得我我不能去身在患中莫可告語王有德義故來告訴是何物也衞平乃援式而起徐廣曰式音勅仰天而視月之光觀斗所指定日處鄉規矩為輔副以權衡四維已定八卦相望視其吉凶介蟲先見乃對元王曰今昔壬子索隐曰今昔猶昨夜也以今日言之謂昨夜為今昔宿在牽牛河水大會鬼神相謀漢正南北正義曰漢天河江河因期南風新至江使先來白雲壅漢萬物盡留斗柄指日使者當囚元服而乘輜車其名為龜王急使人問而求之王曰善於是王乃使人馳而往問泉陽令曰漁者㡬何家名誰為豫且豫且得龜見夢於王王故使我求之泉陽令乃使吏按籍視圖水上漁者五十五家上流之廬名為豫且泉陽令曰諾乃與使者馳而問豫且曰今昔汝漁何得豫且曰夜半時舉網得龜莊子曰得白龜圓五尺使者曰今龜安在曰在籠中使者曰王知子得龜故使我求之豫且曰諾即系龜而出之籠中獻使者使者載行出於泉陽之門正晝無見風雨晦㝠雲蓋其上五采青黄雲雨並起風將而行入於端門見於東廂身如流水潤澤有光望見元王延頸而前三歩而止縮頸而卻復其故處元王見而怪之問衞平曰龜見寡人延頸而前以何望也縮頸而復是何當也衞平對曰龜在患中而終昔囚王有德義使人活之今延頸而前以當謝也縮頸而卻欲急去也元王曰善哉神至於此乎不可久留趣駕送龜勿令失期衞平對曰龜者是天下之寳也先得此龜者為天子且十言十當十戰十勝生於深淵長於黄土知天之道明於上古游三千嵗不出其域安平静正動不用力夀蔽天地莫知其極與物變化四時變色居而自匿伏而不食春倉夏黄秋白冬黑明於隂陽審於刑德先知利害察於禍福以言而當以戰而勝王能寳之諸侯盡服王勿遣也以安社稷元王曰龜甚神靈降於上天陷於深淵在患難中以我為賢德厚而忠信故來告寡人寡人若不遣也是漁者也漁者利其肉寡人貪其力下為不仁上為無德君臣無禮何從有福寡人不忍奈何不遣衞平對曰不然臣聞盛德不報重寄不歸天與不受天奪之寳今龜周流天下還復其所上至蒼天下薄泥塗還徧九州未嘗愧辱無所稽留今至泉陽漁者得而四之江河必怒務求報仇自以為侵因神與謀淫雨不霽水不可治若為枯旱風而揚埃蝗蟲暴生百姓失時王行仁義其罰必來此無他故其祟在龜後雖悔之豈有及哉王勿遣也於是元王向日而謝索隐曰蓋欲神之以謝天之賜向日者天之光明著見者也再拜而受擇日齋戒甲乙最良乃刑白雉及與驪羊以血灌龜於壇中央以刀剝之身全不傷脯酒禮之横其腹腸荆支卜之必制其創理達於理文相錯迎使工占之所言盡當邦福重寳徐廣曰福音副蔵也聞於傍鄉殺牛取革被鄭之桐徐廣曰牛革桐為鼔也草木畢分化為甲兵戰勝攻取莫如元王元王之時衞平相宋宋最彊龜之力也故云神至能見夢於元王而不自出漁者之籠身能十言盡當不能通使於河還報於江賢能令人戰勝攻取不能自留於刀鋒免剝刺之患聖能先知亟見而不能令衞平無言魏陳留王咸寧二年二月朐䏰縣獻靈龜歸於相府晉咸康中豫州刺史毛寳戍邾有一軍人於武昌市買得白龜長五尺置瓮中養之漸大放江中後邾城邅石虎攻䧟赴江者莫不沉溺所養龜人被甲投水中覺如墮一石上須㬰視之乃是先所放白龜既抵岸廻顧而去苻堅時髙陸人穿井得龜大三尺皆有八卦堅命太卜池養之粟後死藏其骨於太廟其夜廟丞髙虜夢龜謂之曰我本出將歸江南邅時不遇隕命秦庭又有人夢中謂虜曰龜三千六百嵗而終終必妖興亡國之徴也隋文帝開皇中掖庭宫每夜有人來挑宫人宫司以聞帝曰門衞甚嚴人何從入當是妖精耳因戒宫人曰若逢但斬之其後有物如人來登床宫人抽刀斬之若中枯骨其物落床而走宫人逐之因入池而沒明日帝涸池得一龜徑尺餘上有刀跡殺之遂絶龜者水居而靈隂謀之象晉王諂媚宫掖求嗣之應云唐武后大足初䖍州獲龜六眼一夕而失肅宗上元二年有鼉聚於揚州城門上節度使鄧景山以問族弟珽對曰鼉介物兵象也德宗貞元三年潤州魚鱉蔽江而下皆無首文宗太和三年魏博管内有蟲狀如龜其鳴晝夜不絶近龜孽也秦宗權在蔡州州中忽地裂有石出髙五六尺廣袤丈餘正如大龜宋太宗太平興國二年二月鑿金明池既掘地有龜出殆踰萬數太平興國間永州益州饒州萬安永州新州俱獻六目龜廬州獻龜大如掌綠毛覆甲潤澤可愛蘇州獻白龜大如錢其色瑩潔兖州衞州獻金龜餘不及錄真宗大中祥符二年四月有黑龜甚衆沿汴水下龜介族黑北方色是嵗契丹國母卒仁宗至和元年二月癸亥信州貢綠毛龜嘉祐八年十月鼎州芝草叢生下得異龜徽宗大觀元年閏十月丙戌都水使者趙霆行河得兩首龜以為瑞蔡京信之曰此齊小白所謂象罔見之而覇者也鄭居中曰首豈容有二而京主之意不可測命棄龜政和四年端州進六目龜五年博州進白龜宣和四年䧺州地大震元武見於州之正寢有龜大如錢蛇若朱漆筯相逐而行宣撫焚香再拜以銀奩貯二物俄而死髙宗紹興八年五月汴京太康縣大雷雨下氷龜數十里隨大小皆龜形具手足卦文龜猶歸也龜又介物兵象也氷有消釋之象此汴京將復歸而釋兵也時秦檜主和議罷兵自是神州陸沉孝宗乾道五年舒州民獻龜駢生二首不能伸縮郡守張棟縱之潛山近龜孽也寧宗嘉定十四年春楚州境上龜大小死者蔽野後十年歸正人李全叛死又龜者介蟲也是時被介胄死者何可勝數蟲異漢武帝元鼎五年秋蛙與蝦蟇羣鬭時四將軍衆十萬征南越開九郡蛙黽也似蝦蟇而長脚其色青元帝建昭元年八月有白蛾羣飛蔽日從東都門至軹道師古曰蛾成羣若今之蠶蛾類是也成帝建始元年六月有青蠅無萬數言其極多雖欲以萬數之而不可得集未央宫殿中朝者坐公卿以下朝會坐也後漢光武建武三年野蠶成繭吳孫權黄龍二年有野蠶成繭如卵晉武帝太康四年㑹稽彭蜞及蟹皆化鼠甚衆復大食稻為災恵帝元康中洛陽南山有䖟武庚反作聲曰韓尸尸識者曰韓氏將尸也言尸尸者盡死也其後韓謐誅而韓族殱焉此青祥也苻堅將為赦與王猛苻融密議於露堂悉屏左右堅親為赦文猛融供進紙墨有一大蒼蠅自牖間鳴聲甚大集於筆端驅而復來俄而長安街巷市里人相吿曰官今大赦有司以聞堅謂融猛曰禁中無耳屬之理事何從泄也於是敕外窮推之咸言有一小兒衣黑衣大呼於市曰官今大赦須臾不見堅歎曰其蒼蠅乎聲狀非常吾固惡之梁武帝天監十一年新昌濟陽二郡野蠶成繭太清二年益州市有飛螽萬羣螫人死周静帝大象元年八月所在螘羣鬭各四五尺死十七八唐太宗貞觀十二年六月滁州言野蠶成繭於山阜十三年野蠶食槲葉成繭大如柰其色綠凡收六千五百七十石至十四年又收八千三百石元宗天寳五載九月太原奏文水縣冬蠶成繭德宗貞元十四年四月江西溪澗魚頭皆戴蚯蚓穆宗長慶四年五月淄青奏登州蓬萊山谷間約四十里野蠶成繭其絲可織文宗太和元年鄭注篋中藥化為蠅數萬飛去十月陳許奏界内野蠶自生桑上三遍成繭連綿九十里百姓收拾得並抽繰得絲綿并織成紬絹開成二年京城有蟻聚長五六十歩闊五尺至一丈厚五寸至一尺宋太祖乾德四年八月京兆府野蠶成繭其絲纎潤可愛開寳六年漢陽軍獻蛤有文隐起成龍長五寸許金色鱗甲皎然七年正月齊州獻野蠶繭二萬枚五月開封府封邱縣民程鐸家𤼵蠶簇有繭聨屬自成被七月開封府陽武縣民家野蠶成繭真宗大中祥符元年五月開封府酸棗縣民程矩家蠶繭自成被色輕重密緻柔滑非人功可及五年五月藤州鐔津縣野蠶成繭是州不産絲蠶此食山柘而成緘絲以獻六年八月亳州譙縣民李賁園桑野蠶成繭奉祀經度制置使丁謂采蠶繰絮以獻仁宗景祐四年五月滑州靈河縣民黄慶家蠶自成被長二丈五尺闊四尺嘉祐二年十月深州言野蠶成繭被於原野哲宗元祐六年閏八月定州七縣野蠶成繭七年五月濰州北海縣蠶自織如絹成領帶元符元年七月真定府藁城縣野蠶成繭八月真定府行唐縣野蠶成繭九月祁州深澤縣野蠶成繭織絍成萬疋二年年六月房州房陵縣野蠶成蠒徽宗政和元年九月河南府野蠶成繭四年湘州野蠶成繭五年南京野蠶成繭織紬五疋綿四十兩聖繭十五兩蝗蟲蜚蝝蝻春秋桓公五年秋螽師古曰螽即阜螽即今之蝩蟲也螽音終蝩音之庸反劉歆以為貪虐取民則螽介蟲之孽也與魚同占劉向以為介蟲之孽屬言不從是嵗公獲二國之聘取鼎易邑師古曰二國宋鄭也宋以郜鼎賂公鄭以泰山之田易許田也興役起城師古曰謂五年夏城祝邱也諸螽畧皆從董仲舒説云莊公二十九年有蜚劉歆以為負蠜也性不食穀食穀為災介蟲之孽師古曰蜚音扶味反蠜音煩劉向以為蜚色青近青眚也非中國所有南越盛暑男女同川澤淫風所生為蟲臭惡師古曰蜚者中國所有非南越之蟲未詳向所説是時莊公取齊淫女為夫人既入淫於兩叔故蜚至天戒若曰今誅絶之尚及不將生臭惡聞於四方莊不悟其後夫人與二叔作亂二嗣以殺師古曰二嗣謂子般及閔公也卒皆被辜師古曰謂二叔哀姜皆不得其死也已解於上董仲舒指畧同僖公十五年八月螽劉向以為先是僖有鹹之會後城縁陵是嵗復以兵為牡邱會使公孫敖帥師及諸大夫救徐兵比三年在外文公三年秋雨螽于宋劉向以為先是宋殺大夫而無罪有暴虐賦歛之應穀梁傳曰上下皆合言甚上下皆合螽之多董仲舒以為宋三世内取三世謂襄成昭也内取於國之大夫也取讀曰娶大夫専恣殺生不中故螽先死而至劉歆以為螽為穀災卒遇賊隂墜而死也八年十月螽時公伐邾取須朐城郚宣公六年八月螽劉向以為先是宣伐莒向後比再如齊謀伐萊十三年秋螽公孫歸父會齊伐萊十五年秋螽宣亡熟嵗數有軍旅冬蝝生師古曰爾雅曰蝝蝮蜪説者以為螽蝗之類蝮音蒲北反蜪徒高反劉歆以為蝝螕之有翼者孟康曰螕音蚍蜉食穀為烖黑眚也董仲舒劉向以為蝝螟始生也一曰螟始生是時民患上力役解於公田解讀曰懈宣是時初税畝税畝就民田畝擇羙者税其什一亂先王制而為貪利故應是而蝝生屬嬴蟲之孽襄公七年八月螽劉向以為先是襄興師救陳滕子郯子小邾子皆來朝夏城費哀公十二年十二月螽是時哀用田賦師古曰言重歛也觧在刑法志劉向以為春用田賦冬而螽十三年九月螽十二月螽比三螽虐取於民之效也師古曰比頻也劉歆以為周十二月夏十月也火星既伏蟄蟲皆畢天之見變因物類之宜不得以螽是嵗再失閏也周九月夏七月故傳曰火猶西流司歴過也秦始皇四年十月蝗蟲自東方來蔽天漢景帝中三年秋蝗先是匈奴冦邊中尉不害魏不害將車騎材官士屯髙栁四年夏蝗武帝建元五年五月大蝗元光五年秋螟六年秋蝗先是五將軍衆三十萬伏馬邑欲襲單于是嵗四將軍征匈奴元鼎五年秋蝗是嵗四將軍征南粤及西南夷開十餘郡元封六年秋蝗先是兩將軍征朝鮮開三郡太初元年夏蝗從東方飛至燉煌三年秋復蝗元年貳師將軍征大宛天下奉其役連年征和三年秋蝗四年夏蝗先是一年三將軍衆十餘萬征匈奴貳師七萬人没不還平帝元始二年秋蝗徧天下時王莽秉政王莽地皇三年夏蝗從東方來蜚蔽天至長安入未央宫緣殿閤草木盡後漢光武二十八年郡國共八十蝗二十九年四月威武酒泉清河京兆魏郡𢎞農蝗三十一年郡國大蝗明帝永平四年酒泉大蝗從塞外入十五年蝗起泰山彌行兖豫和帝永元四年蝗八年五月河内陳留蝗九月京都蝗九年蝗從夏至秋先是西羌數反遣將軍將北軍五校征之安帝永初四年夏蝗是時西羌冦亂軍衆征距連十餘年䜟曰主失禮煩苛則旱之魚螺變為蝗蟲五年夏九州蝗京房占曰天生萬物百穀以給民用天地之性人為貴今蝗蟲四起此為國多邪人朝無忠臣蟲與民争食居位食祿如蟲矣不救致兵起其救也舉有道置於位命諸侯試明經此消災也六年三月去蝗處復蝗子生古今註曰郡國四十八蝗七年夏蝗元初元年夏郡國五蝗二年夏郡國二十蝗延光元年六月郡國蝗順帝永建五年郡國十二蝗是時鮮卑寇朔方用衆征之永和元年秋偃師蝗去冬烏桓寇沙南用衆征之桓帝永興元年七月郡國三十二蝗是時梁冀秉政無謀獻茍貪權作虐春秋考異郵曰貪擾生蝗二年六月京都蝗永夀三年六月京都蝗延熹元年五月京都蝗臣昭按劉歆傳皆逆天時聽不聰之禍也養奮對策曰侫邪以不正食禄饗所致謝沈書曰九年揚州六郡連水旱蝗害也靈帝熹平六年夏七州蝗先是鮮卑前後三十餘犯塞是嵗䕶烏桓校尉夏育破鮮卑中郎將田晏使匈奴中郎將臧旻將南單于以下三道並出討鮮卑大司農經用不足殷歛郡國以給軍糧三將無功還者少半光和元年詔策問曰連年蝗蟲至冬踊其咎焉在蔡邕對曰臣聞易傳曰大作不時天降災厥咎蝗蟲來河圖祕徴篇曰帝貪則政暴而吏酷酷則誅深必殺主蝗蟲蝗蟲貪苛之所致也是時百官遷徙皆私上禮西園以為府蔡邕對曰蝗蟲出息不急之作省賦歛之費進清廉黜貪虐分損承安屈省别藏以贍國用則其救也易曰得臣無家言有天下者何私家之有獻帝興平元年夏大蝗是時天下大亂建安二年五月蝗魏文帝黄初三年七月冀州大蝗人饑按蔡邕説蝗者在上貪苛之所致也是時孫權歸順帝因其有西陵之役舉大衆襲之權遂背叛也晉武帝㤗始十年六月蝗是時荀賈任政疾害公直恵帝永寧元年郡國六蝗懷帝永嘉四年五月大蝗自幽并司冀至於秦雍草木牛馬毛鬛皆盡是時天下兵亂漁獵黔黎存亡所寄惟司馬越茍晞而已競為暴刻經畧無章故有此孽愍帝建興四年五月大蝗去嵗劉曜頻攻北地馮翊趜允等悉衆禦之卒為劉曜所破西京遂潰五年帝在平陽司冀青雍螽元帝太興元年六月蘭陵合鄉蝗害禾稼乙未東莞蝗蟲縱横二百里害苖稼七月東海彭城下邳淮西郡蝗蟲害禾豆八月冀青徐三州蝗食生草盡至於二年是時中州淪喪暴亂滋甚也二年五月淮陵臨淮淮南安豐廬江等五郡蝗蟲食秋麥是月癸丑徐州及揚州江西諸郡蝗吳郡百姓多餓死去年王敦并領荆州苛暴之釁自此興矣孝武帝太元十五年八月兖州蝗是時慕容氏逼河南征戍不已故有斯孽十六年五月飛蝗從南來集堂邑縣界害苖稼是年春發江州兵營甲士三千人家口六七千配䕶軍及東宫後尋散亡殆盡又邊將連有征役故有斯孽劉聰末年河東大蝗唯不食黍豆靳凖率部人收而埋之哭聲聞於十餘里後乃鑽土飛出復食黍豆石虎時河朔大蝗初穿地而生二旬則化狀若蠶七八日而臥四日蜕而飛彌亘百草唯不食三豆及麻苻健時蝗蟲大起自華隂至隴山食百草無遺牛馬相噉毛宋文帝元嘉三年秋旱且蝗梁武帝大同初蝗籬門松栢葉皆盡京房易飛候曰食祿不益聖化天視以蟲蟲無益於人而食萬物也時公卿皆以虚澹為羙不親職事無益食物之應也北齊文宣天保八年河北六州河南十二州蝗畿人皆祭之時外築長城内修三臺役者不止九年山東又蝗十年幽州大蝗河清二年并汾晉東雍南汾五州蟲旱傷稼後周武帝建德二年關中大蝗隋文帝開皇十六年并州蝗時秦孝王俊裒刻百姓盛修邸第後獲譴死唐髙祖武德六年夏州蝗蝗之殘民若無功而祿者然皆貪撓之所生先儒以為人主失禮煩苛則旱魚螺變為蟲蝗故以為魚孽太宗貞觀二年六月京畿旱蝗太宗在苑中掇蝗祝之曰人以穀為命百姓有過在予一人但當蝕我無害百姓將吞之侍臣懼帝致疾遽以為諫帝曰所冀移災朕躬何疾之避遂吞之是嵗蝗不為災三年五月徐州蝗秋德戴廓等州蝗四年秋觀兖遼等州蝗二十一年秋渠泉二州蝗髙宗永徽元年夔絳雍同等州蝗秋陳州蝗永淳元年三月京畿蝗無麥苖六月雍岐隴等州蝗武后長夀二年台建等州蝗元宗開元三年七月河南河北蝗四年夏山東蝗食稼聲如風雨二十五年貝州蝗有白鳥數千萬羣飛食之一夕而盡禾稼不傷代宗廣德二年秋蝗關輔尤甚斗米千錢德宗興元元年秋螟蝗自山而東際於海晦天蔽野草木皆盡貞元元年夏蝗東自海西盡河隴羣飛蔽天旬日不息所至草木葉及畜毛靡有孑遺餓殣枕道民蒸蝗曝颺去翅足而食之憲宗元和元年夏鎮冀等州蝗穆宗長慶三年秋洪州螟蝗害稼八萬頃文宗開成元年夏鎮州河中蝗害稼二年六月魏博昭義淄青滄州兖海河南蝗三年秋河南河北鎮定等州蝗草木葉皆盡五年夏幽魏博鄆曺濮滄齊德淄青兖海河陽淮南虢陳許汝等州螟蝗害稼占曰國多邪人朝無忠臣居位食祿如蟲與民争食故比年蟲蝗武宗會昌元年七月關東山南鄧唐等州蝗宣宗大中八年七月劔南東川蝗懿宗咸通三年六月淮南河南蝗六年八月東都同華陜虢等州蝗七年夏東都同華陜虢及京畿蝗九年江淮關内及東都蝗十年夏陜虢等州蝗不絀無德虐取於民之罰僖宗乾符二年蝗自東而西蔽天光唘元年秋蝗自東方來羣飛蔽天二年荆襄蝗斗米錢三千人相食淮南蝗自西來行而不飛浮水緣城入揚州府署竹樹幢節一夕如剪幡幟畫像皆齧去其首撲不能止旬日自相食盡後梁太祖開平元年六月許陳汝蔡潁五州蝝生有野禽羣飛蔽空食之皆盡後唐莊宗同光三年九月鎮州奏飛蝗害稼晉髙祖天福七年四月山東河南關西諸郡蝗害稼至八年四月天下諸道州飛蝗害稼草木葉皆盡詔州縣長吏捕蝗華州節度使楊彦珣雍州節度使趙瑩命百姓捕蝗一斗以祿粟一斗賞之時蝗旱相繼人民流遷饑者盈路關西餓殍尤甚死者十有七八朝廷以軍食不充分命使臣諸道括借粟麥晉氏自此衰矣後漢隐帝乾祐元年七月青鄆兖齊濮沂密邢曹皆言蝝生開封府奏陽武雍邱襄邑等縣蝗開封尹侯益遣人以酒肴致祭尋為鸜鵒食之皆盡勅禁羅弋鸜鵒以其有吞蝗之異也二年五月博州奏有蝝生化為蝶飛去宋州奏蝗一夕抱草而死差官祭之復命尚書侍郎段希堯祭東嶽太府卿劉皥祭中嶽皆慮蟲螟為災故也宋太祖建隆元年七月澶州蝗二年五月濮州范縣蝗三年七月兖濟德磁洺五州有蝝生真定府深州蝻蟲生四年六月澶濮曹絳等州有蝗懷州蝗生乾德二年四月相州蝻蟲食桑五月趙州昭慶縣有蝗東西四十里南北二十里是夏河南河北陜西諸州皆蝗三年七月諸路有蝗淄州民韓贊斷手指以祭開寳二年八月真定府冀磁州蝗太宗太平興國二年六月磁州有黑蟲羣飛食桑夜出晝隐食葉殆盡閏七月衞州蝻蟲生六年七月河南府宋州蝗七年四月唐州比陽縣蝻蟲生有飛鳥食之盡河南府滑州蝻蟲生五月大名府陜州陳州蝗七月鄆州陽穀縣蝻蟲生九年七月泗州蝝蟲食桑雍熙二年四月天長軍蝝蟲食苗三年七月濮州鄄城縣有蝗俄自死淳化元年四月鄆州中都縣蝻蟲生七月單州碭山縣蝗曹州濟隂縣有蝗自北來飛亘天有聲二年三月亳州蝻蟲生遇雨而死六月淄澶濮州乾寧軍並蝗生七月寧邊軍有蛤滄州蝻蟲食苗棣州有飛蝗自北來害稼三年六月甲申京師有蝗起東北趣西南蔽空如雲翳日七月貝許滄沂蔡汝商兖單等州淮陽平定静戎軍蝗俄抱草自死至道二年六月亳宿密州蝗生食苗七月許州長葛陽翟二縣有蝻蟲食苗齊州歴城長清等縣有蝗三年七月單州蝻蟲生真宗景德元年八月陜濱棣州蟲害稼二年六月京東諸州蝻蟲生三年八月德博州蝝生四年九月陳州宛邱縣鄆州東阿須城二縣蝗大中祥符二年五月雄州蝻蝗食苗三年六月開封府咸平尉氏二縣蝻蟲生四年六月開封府祥符縣有蝗七月河南府及京東蝗生食苗葉八月開封府祥符咸平中牟陳留雍邱封邱六縣蝗生九年六月京畿京東西河北路蝗蝻繼生彌覆郊野食民田殆盡入公私廬舎七月辛亥過京師羣飛翳空至淮南趣河東及霜寒始斃天禧元年二月開封府京東西河北河東陜西江淮兩浙荆湖百三十州軍蝗蝻復生多去嵗蟄者和州蝗生卵如稻粒而細六月江淮大風多吹蝗入江海或抱草木僵死二年四月江隂軍蝻蟲生仁宗天聖五年七月丙午邢洺州蝗甲寅趙州蝗不食苗是嵗京兆府旱蝗六年五月己夘河北京東蝗明道元年十月中甲寅濠州蝗二年七月庚辰開封界京東西河北河東陜西蝗景祐元年六月乙夘開封府淄州蝗諸路募民掘蝗子萬餘石寳元元年六月曹濮單三州蝗慶歴四年春淮南旱蝗京師飛蝗蔽天神宗熙寧元年秀州蝗五年河北大蝗六年四月河北諸路蝗是嵗江寧府飛蝗自江北來七年夏開封府界及河北路蝗七月咸平縣鸜鵒食蝗八年八月淮西蝗陳潁州蔽野九年夏開封府畿京東河北陜西蝗五月京湖南路地生黑蟲化蛾飛去全州生黑蟲食苗黄雀來食之皆盡元豐四年六月河北蝗秋開封府界蝗五年夏又蝗六年夏又蝗五年沂州蝗哲宗元符元年八月髙郵軍言飛蝗抱草死徽宗崇寧元年夏開封府界京東河北淮南等路蝗二年諸路蝗令有司酺祭三年四年連嵗大蝗其飛蔽日來自山東及府界惟河北尤甚宣和三年諸路蝗髙宗建炎二年六月京師淮甸大蝗令長吏修酺祭紹興二十九年七月盱眙軍楚州處界三十里蝗為風所墜風止復飛回淮北敵知天佑自是不敢桀三十二年六月江東淮南北郡國蝗飛入湖州境聲如風雨自癸巳至於七月丙申飛徧畿縣餘杭仁和錢塘皆蝗丙午蝗入京城八月山東大蝗江淮諸道乏食令𤼵廩萬石以賑癸丑頒祭酺禮式孝宗隆興元年七月大蝗辛丑詔羣臣言闕失八月丙子上降次貶食詔諸道暴察寃賑災蠲賦重匿災之罰休息江淮襄蜀科調民忘凶年八月壬申癸酉飛蝗過都蔽天日徽宣湖三州及浙東郡縣害稼遂下捕蝗之令九月京東大蝗襄隨蝗甚民為乏食二年夏畿縣餘杭大蝗令漕臣察獄涖捕乾道元年六月淮西蝗憲臣姚岳貢死蝗為瑞上斥其佞坐黜淳熙三年八月淮北飛蝗楚州盱眙軍界如雲陣風雷者逾時遇大雨皆死稼用不害九年六月滁州全椒縣和州歴陽烏江縣蝗乙夘飛蝗過都遇大雨墮仁和界蘆蕩茅穂令徙瘞之七月淮甸大蝗其揚泰州窖撲蝗五千斛餘郡或日捕數十車羣飛絶江墮鎮江府皆害稼令淮浙郡國捕除十年六月淮浙舊蝗遺育害稼十四年七月畿縣仁和蝗蝗始生令捕除之不為災光宗紹熙二年七月泰州蝗自髙郵縣五年八月楚和州蝗寧宗嘉泰二年浙西大蝗自丹陽入武進若煙霧蔽天其墮亘十餘里常之三縣捕八千餘石湖之長興捕數百石時浙東近郡亦蝗開禧三年夏秋旱大蝗羣飛蔽天先是浙西郡縣首種不入或種豆粟皆既於蝗漢志言魯宣公秋蟲以為宣無熟嵗數有軍旅又漢武帝比年秋蝗興師征四夷之應時韓侂胄開邊兵禍連結故有此孽也嘉定元年五月江浙大蝗乙丑上懼災損膳露禱六月乙酉有事於圜丘方澤且祭酺七月又酺攽酺式於郡國二年四月又蝗下捕蝗令五月丁酉令諸郡修酺祀六月辛未飛蝗入畿縣令守臣修酺祭七年六月浙郡蝗八年四月北境飛蝗越淮而南江淮郡蝗食禾苗山林草木皆盡乙夘飛蝗入畿縣己亥祭酺令蝗郡如式以祭是嵗自夏徂秋蝗患不息諸道捕蝗者以千萬石計饑民競捕官以粟易之九年五月浙東蝗丁巳令郡國酺祭令諸道部使者督捕之是嵗薦饑官以粟易蝗者計千百斛及冬校比而賞罰之十年四月楚州蝗螟虸蚄蟲春秋隐公五年秋螟董仲舒劉向以為時公觀漁於棠貪利之應也劉歆又以為逆臧僖伯之諫貪利區霿以生臝蟲之孽也八年九月螟時鄭伯以邴將易許田有貪利心京房易傳曰臣安祿兹謂貪厥災蟲蟲食根德無常兹謂煩蟲食葉不絀無德蟲食本與東作争茲謂不時蟲食節蔽惡生孽蟲食心莊公二年秋螟董仲舒劉向以為先是衞侯朔出奔齊齊侯會諸侯納朔許諸侯賂齊人歸衞寳魯受之貪利應也漢文帝後六年秋螟是嵗匈奴大入上郡雲中烽火通長安遣三將軍屯邊三將屯京師後漢章帝七八年間郡縣大螟傷稼語在魯恭傳而紀不錄時章帝用竇皇后讒害宋梁二貴人廢皇太子靈帝熹平四年六月𢎞農三輔螟蟲為害時靈帝用中常侍曹節等讒言禁錮名士謂之黨人中平二年七月三輔螟蟲為害晉武帝咸寧元年七月郡國螟九月青州又螟是月郡國有青蟲食禾稼四年司冀兖豫荆揚郡國二十螟九年八月郡國二十四螟九月蟲又傷秋稼時帝聽讒䛕寵任賈充楊駿故有蟲蝗之災不絀無德之罰惠帝元康三年九月帶方等六縣螟食禾葉盡永寧元年七月梁益凉三州螟時齊王冏執政貪苛之應十月南安巴西江陽太原新興北海青蟲食禾葉甚者十傷五六十二月郡國六螟唐太宗貞觀二十一年八月萊州螟元宗開元二十一年八月榆關虸蚄蟲害稼入平州界有羣雀來食之一日而盡二十六年榆關虸蚄蟲害稼羣雀來食之天寳三載青州紫蟲食田有鳥食之代宗廣德元年秋虸蚄蟲害稼關中尤甚斗粟千錢穆宗長慶四年絳州虸蚄蟲害稼文宗太和元年秋河東同虢等州虸蚄蟲害稼四年河南黑蟲食田宋太祖建隆二年九月華州渭南縣虸蚄蟲害稼乾德六年七月階州虸蚄蟲生太宗太平興國二年七月邢州鉅鹿沙河二縣歩屈蟲食桑麥殆盡五年七月濰州虸蚄蟲食稼殆盡七年九月邠州虸蚄蟲生食稼端拱二年七月施州虸蚄蟲生害稼真宗大中祥符四年八月兖州虸蚄蟲生有蟲青色隨齧之化為水仁宗天聖五年五月戊辰磁州蟲食桑六年庚戌同華等州旱虸蚄蟲食苗髙宗紹興元年秋紹興府湖州螟浙東西郡國螟多為穀災二年台州螟二十九年秋浙東江東西郡縣螟三十年十月江浙郡國螟蝝孝宗乾道三年八月江東郡縣螟螣淮浙諸路多以青蟲食穀穂為災六年秋浙西江東螟蟲為害九年秋吉贛州臨江南安軍皆有螟淳熙二年秋浙江淮郡縣間有螟害四年秋昭州螟五年昭州薦有螟螣七年秋永州螟八年秋江州螟十二年八月平江府有蟲聚於禾穂惟油可墮一夕大雨盡滌十四年秋江州興國軍螟十六年秋溫州螟寧宗慶元三年秋浙東蕭山山隂縣婺州浙西富陽鹽官淳安永興縣嘉興府皆螟四年秋江東鉛山縣蟲食穀田無遺穗嘉定十四年明台溫婺衢蟊螣為災十五年秋贛州螟十六年秋永道州螟䑕妖春秋成公七年正月鼷䑕食郊牛角師古曰鼷小䑕也即今所謂甘䑕者音奚改卜牛又食其角劉向以為近青祥亦牛禍也不敬而傋霿之所致也昔周公制禮樂成周道故成王命魯郊祀天地以尊周公至成公時三家始顓政魯將從此衰天愍周公之德痛其將有敗亡之禍故於郊祭而見或云䑕小蟲性盗竊鼷又其小者也牛大畜祭天尊物也角兵象在上君威也小小鼷䑕食至尊之牛角象季氏乃陪臣盜竊之人將執國命以傷君威而害周公之祀也改卜牛鼷䑕又食其角天重語之也重音直用反成公怠慢昏亂遂君臣更執於晉至於襄公晉為湨梁之會天下大夫皆奪其君政湨梁之㑹諸侯皆在而魯叔孫豹晉荀偃宋向戌衞􅑔殖鄭公孫蠆小邾之大夫盟是奪其君政也其後三家逐昭公卒死於外㡬絶周公之祀董仲舒以為鼷䑕食郊牛皆養牲不謹也京房易傳曰祭天不謹厥妖鼷䑕齧郊牛角定公十五年正月鼷䑕食郊牛牛死劉向以為定公知季氏逐昭公罪惡如彼親見孔子為夾谷之會齊人歸鄆讙龜隂之田聖德如此反用季桓子淫於女樂而退孔子無道甚矣是嵗五月定公薨牛死之應京房易傳曰子不子䑕食其郊牛哀公元年正月鼷䑕食郊牛劉向以為天意汲汲於用聖人逐三家故復見戒也哀不寤身奔於越漢昭帝元鳳元年九月燕有黄䑕啣其尾舞王宫端門中宫之正門王往視之䑕舞如故王使吏以酒脯祠舞不休一日一夜死近黄祥時燕刺王旦謀反將死之象也其月發覺伏辜京房易傳曰誅不原情厥妖䑕舞門師古曰不原情者不得其夲情成帝建始四年九月長安城南有䑕啣黄蒿栢葉上民冢栢及榆樹上為巢桐栢尤多師古曰桐栢本亭名衞思后於其地葬也巢中無子皆有乾䑕矢數十時議臣以為恐有水災䑕盜竊小蟲夜出書匿今晝去穴而登木象賤人將居顯貴之位也桐栢衞后園所在也其後趙皇后自微賤登至尊與衞后同類趙后終無子而為害明年有鳶焚巢殺子之異也師古曰鳶䲭也音弋全反天象仍見甚可畏也仍頻也一曰皆王莽竊位之象云京房易傳曰臣私禄㒺辟李竒曰辟君也擅私爵禄誣罔其君厥妖䑕巢魏齊王正始中中山王周南為襄邑長有䑕從穴出語曰王周南爾以某日死周南不應䑕還穴後至期更冠幘皂衣出語曰周南汝日中當死又不應䑕復入穴斯須更出語如向日適欲中䑕入須㬰復出出入轉更數語如前日適中䑕曰周南汝不應我復何道言絶顛蹶而死即失衣冠取視具如常䑕按班固以為黄祥時曹爽専政競為比周故䑕作變也晉太康時彭蜞化為䑕見蟲異門陳後主禎明二年四月羣䑕無數自蔡州岸入石頭淮至青塘兩岸數日死隨流出江近青祥也京房易飛候曰䑕無故羣居不穴衆聚者其君死未㡬亡國唐髙祖武德元年秋李密王世充隔洛水相拒密營中䑕一夕渡水盡去占曰䑕無故皆夜去邑有兵太宗貞觀十三年建州䑕害稼二十一年渝州䑕害稼髙宗顯慶三年長孫無忌第有大䑕見於庭月餘出入無常後忽然死龍朔元年十一月洛州猫䑕同處䑕隐伏象盗竊猫職捕囓而反與同象司盜者廢職容姦𢎞道初梁州倉有大䑕長二尺餘為猫所囓數百䑕反嚙猫少選聚萬餘䑕州遣人捕擊殺之餘皆散去中宗景龍元年基州䑕害稼睿宗景雲中有蛇䑕鬬於右威衞營東街槐樹蛇為䑕所傷鬭者兵象元宗開元二年韶州䑕害稼千萬餘羣天寳元年十月魏郡有猫䑕同乳甚於同處代宗大歴十三年六月隴右節度使朱泚於兵家得猫䑕同乳以獻懿宗咸通十二年汾州孝義縣民家䑕多茹蒿芻巢樹上䑕穴居去穴登木賤人將貴之象僖宗乾符三年秋河東諸州多䑕穴屋壞衣三月止䑕盜也天戒若曰將有盜矣昭宗乾寧末陜州有蛇䑕鬭於南門之内蛇死而䑕亡去後唐潞王清泰三年三月有蛇䑕鬭於師子門外䑕殺蛇其年十二月晉髙祖起兵於太原宋太祖建隆元年夏相金均房商五州䑕食苗二年正月商州䑕食苗太宗太平興國七年十一月岳州䑕害稼九月京西民獻白䑕二髙宗紹興十六年廣州清逺縣韶州翁源縣英德府真陽縣䑕食稼千萬為羣時廣東久旱凡羽鱗皆化為䑕有獲䑕於田者腹猶蛇文漁者夜設網旦視數百鱗皆䑕自夏徂秋為患數月方息嵗為饑孝宗乾道九年隆興府䑕害稼千萬為羣甚於螟蝗淳熙五年八月淮東通泰楚髙郵黑䑕食禾田無遺穗淮民大饑時江陵府十五里外羣䑕以千萬計蔽塞通逵其色黑白青黄相雜與人并行為車馬所踐死者不可勝計凡三月乃息光宗紹熙四年饒州民家有二小䑕食牛角三徙牛牢不免角穿肉瘠以斃春秋書鼷䑕食牛角京房易傳曰祭天不謹為郊牛也不與民牛同占特䑕妖爾寧宗慶元元年六月鄱陽縣民家一猫帶數十䑕行止食息皆同如母子相哺者民殺猫而䑕䑛其血䑕象盜猫職捕而反相與同處司盜廢職之象也與唐龍朔洛州猫䑕同占文獻通考卷三百十四
