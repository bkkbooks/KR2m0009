body:
  text: 文獻通考卷一百七十二鄱陽馬端臨貴與著刑考十一赦宥魏文帝即位改元黃初大赦五年東巡幸許昌宮水軍御龍舟循蔡潁浮淮幸夀春揚州界將吏士民犯五歲刑以下皆原除之至廣陵赦青徐二州明帝即位大赦二年赦繫囚非殊死以下五年皇太子生大赦青龍二年大赦景初元年大赦二年大赦齊王即位正月大赦八月以帝親政大赦四年立皇后大赦嘉平元年誅曹爽大赦三年大赦四年立皇后大赦六年二月誅李豐夏侯元大赦四月立皇后大赦髙貴鄉公即位大赦二年誅母邱儉文欽特赦淮南士民為儉欽所詿誤者又以隴右四郡及金城連年受敵或亡叛投賊其親戚留在本土不安者特赦之甘露二年五月誅諸葛誕赦淮南將吏士民為誕所詿誤者九月大赦陳留王即位大赦景元四年平蜀特赦益州士民咸熙元年誅鍾會特赦諸在益土者二年大赦晉武帝泰始元年受禪即位大赦逋債負皆勿收除舊嫌解禁錮亡官失爵者悉復之四年大赦五年曲赦交址九真日南五歲刑六年赦五歲刑以下七年雍梁秦三州飢赦其境內殊死以下又曲赦益州南中四郡殊死以下八年大赦咸寧元年春大赦改元二年二月赦五歲刑以下十月立皇后大赦五年大赦太康元年平吳大赦五年大赦十年太廟成祫祭大赦惠帝即位大赦永平元年誅楊駿大赦二年大赦四年赦夀春上谷居庸上庸地震被災者六年大赦十年曲赦雍涼二州八年大赦永康元年正月大赦四月趙王倫等廢賈后大赦八月曲赦洛陽十一月立皇后大赦永寧元年四月趙王倫誅帝復位大赦六月立皇太子大赦八月大赦泰安元年赦司冀兖豫四州十二月河間王顒表誅齊王冏大赦二年赦五歲刑八月張方入京師大赦十月張方殺長沙王義大赦永興元年正月大赦改元三月立成都王頴為皇太弟大赦七月戊戌陳昣討頴大赦庚申頴敗王師大赦八月張方迎帝幸其營大赦十一月方劫帝幸長安大赦十二月立豫章王熾為太弟大赦是歲大赦凡七二年大赦光熙元年大赦懷帝即位大赦永嘉元年正月大赦改元三月立皇太子大赦二年正月大赦十二月大赦三年曲赦河南郡四年正月大赦愍帝永嘉六年入長安為皇太子大赦建興元年即位大赦二年大赦三年四月大赦六月大赦元帝建武元年即晉王位大赦大興元年即皇帝位大赦二年大赦永昌元年大赦改元四月王敦反入石頭大赦明帝即位大赦二年正月赦五歲刑以下十月誅王敦大赦惟敦黨不原三年立皇太子大赦成帝即位大赦咸和元年正月大赦改元十月赦百里內五歲以下刑三年二月蘇峻反入石頭大赦四年誅蘇峻大赦五年正月大赦七年正月大赦八年正月赦五歲刑以下咸康元年加元服大赦二年立皇后大赦五年正月大赦六年三月大赦八年正月大赦康帝即位大赦建元元年十一月大赦穆帝即位大赦永和二年正月大赦三年大赦五年正月大赦九年正月大赦升平元年正月帝加元服大赦八月立皇后大赦逋租宿負皆勿收五年正月大赦哀帝即位大赦隆和元年正月大赦興寧元年二月大赦廢帝即位大赦太和元年曲赦梁益二州三年三月大赦六年四月大赦簡文帝即位大赦孝武帝即位大赦寧康二年正月大赦三年正月大赦太元元年正月帝加元服大赦五月以地震大赦四年正月大赦五年四月赦五歲刑以下六月以比歲荒歉大赦自太元三年以前逋租宿債蠲除之六月赦五歲刑以下七年八月大赦八年三月大赦十一月以破苻堅大赦九年十月以元象乖度大赦十一年三月大赦十二年正月大赦十五年三月大赦十七年正月大赦除逋租宿債安帝即位大赦隆安二年十月大赦四年正月大赦七月大赦元興元年正月大赦十二月桓元擅政曲赦廣陵彭城大逆以下三年二月劉裕討桓元置留臺承制大赦惟桓元一族不宥五月帝反政於江陵大赦凡諸畏逼屈事逆命者一無所問義熙元年大赦改元唯桓元桓振一族及同黨不在原例三年春大赦五年正月大赦六年五月大赦八年八月大赦十一年正月大赦九月大赦十二年以伐姚泓大赦十四年正月大赦恭帝即位大赦宋武帝即位大赦改元逋租宿債勿收其犯鄉論清議贓汙淫盜一皆蕩滌與之更始長徒之身特皆原遣亡官失爵禁錮奪勞一依舊凖裴子野論曰昔重華受終四凶流放武王克殷頑民遷洛天下之惡一也鄉論清議除之過矣其年八月立皇太子赦見罪人二年正月祀南郊大赦裴子野曰夫郊祀天地修歲事也赦彼有罪夫何為哉三年詔刑罪無輕重悉原之少帝即位大赦景平元年正月大赦改元二年五月傅亮等以太后令廢帝是日赦死罪以下文帝即位大赦改元元嘉二年帝親政祀南郊大赦三年正月討謝晦大赦四年正月曲赦建業百里內六年立皇太子大赦八年六月大赦十年正月大赦七月曲赦梁益秦三州十一年曲赦梁南秦二州劔閣以北十二年正月大赦十三年三月大赦十四年正月祀南郊大赦十六年皇太子冠大赦十七年十月大赦十九年四月大赦二十一年親耕籍田大赦二十三年四月大赦二十四年正月大赦二十六年三月大赦二十七年十一月大赦孝武以元嘉三十年四月即位大赦六月曲赦建業二百里內孝建元年大赦改元三年皇太子納妃大赦大明元年大赦改元三年討誅竟陵王誕大赦七年二月大赦十一月曲赦南豫州殊死以下十二月大赦前廢帝即位大赦景和元年正月大赦改元十一月大赦明帝即位大赦三年曲赦豫南豫青冀四州後廢帝即位大赦元徽元年大赦改元順帝即位大赦齊髙帝受禪即位大赦弛逋債及犯鄉論清議贓汙淫盜者蕩滌如宋初二年大赦武帝即位大赦永明元年祀南郊大赦改元三年祀南郊赦三百里內罪應入重者降一等餘依赦制四年宥殊死以下七年祀南郊大赦八年大赦十一年曲赦南兖兖豫司徐五州廢帝即位大赦隆昌元年大赦改元海陵王即位大赦明帝即位大赦改元建武四年大赦東昏侯永元元年大赦改元二年曲赦都下及徐兖二州三年祀南郊大赦和帝即位大赦梁武帝受禪即位大赦一如宋齊天監二年祀南郊曲赦益州死囚以下三年大赦四年祀南郊大赦五年大赦七年以皇子繹生赦大辟以下未結正者八年祀南郊大赦十年祀南郊大赦十一年曲赦揚徐二州十二年祀南郊赦大辟罪以下十四年皇太子冠大赦十六年耕籍田赦罪人十七年大赦十八年受佛戒赦罪人普通元年正月大赦二年祀南郊大赦三年大赦四年祀南郊大赦六年正月祀南郊大赦七月大赦七年赦死罪以下大通元年曲赦東豫州中大通元年正月祀南郊大赦十月設無遮會大赦三年祀南郊大赦五年祀南郊大赦大同元年大赦三年正月祀南郊大赦八月設無礙食大赦四年大赦六年曲赦司豫徐兖四州及都下十年大赦中大同元年大赦太清元年正月祀南郊大赦四月捨身大赦二年曲赦交愛德三州及南豫州簡文帝即位大赦大寶元年大赦改元元帝即位大赦敬帝即位大赦太平元年大赦陳武帝受禪即位大赦一如宋齊梁故事永定二年祀南郊大赦文帝即位大赦天嘉元年大赦改元三年大赦四年九月曲赦都下十二月大赦五年曲赦都下及建安晉陽二郡六年曲赦都下天康元年大赦廢帝即位大赦光大元年大赦改元宣帝太建元年即位大赦二年大赦三年大赦四年大赦六年赦江右淮北諸州十年大赦十一年大赦後主太建十四年正月即位大赦七月大赦至德元年大赦改元十一月大赦三年大赦四年大赦正明元年大赦後魏道武帝天興元年定國號為魏大赦改元遷都平城二年赦京師天賜元年大赦明元帝永興元年即位大赦改元神瑞元年大赦泰常元年大赦太武帝即位大赦神麚元年大赦延和元年大赦二年大赦太延元年大赦四年大赦太平真君元年皇孫生大赦九年大赦十一年曲赦定冀相三州死罪以下正平元年大赦文成帝即位大赦興光元年二月曲赦京師七月皇子生大赦太安元年曲赦京師死囚以下二年立皇太子大赦四年大赦五年赦京師死罪已下和平元年大赦改元六年大赦獻文帝即位大赦天安元年大赦改元皇興元年皇子生大赦改元四年大赦孝文帝元興二年曲赦京師及河西秦涇枹罕涼州及諸鎮四年曲赦仇池五年曲赦京師死罪承明元年六月大赦九月曲赦京師太和元年大赦二年曲赦京師三年三月曲赦京師十月大赦四年曲赦京師五年大赦七年皇子生大赦十年大赦十二年大赦十六年頒新律令大赦十九年曲赦徐豫梁相四州二十年曲赦京師二十三年大赦宣武景明元年大赦改元二年二月大赦七月大赦正始元年大赦三年正月皇子生大赦八月曲赦涇秦岐涼河五州永平元年大赦三年皇子生大赦延昌元年大赦孝明帝即位正月大赦八月大赦熙平元年大赦改元二年大赦神龜二年大赦正光三年大赦五年大赦孝昌元年大赦二年大赦武泰元年大赦敬宗即位大赦改元二年七月大赦三年誅爾朱榮大赦節閔帝即位大赦改元廢帝即位大赦改元孝武帝即位大赦改元永熙三年入長安大赦文帝即位大赦改元大統三年以獲神璽大赦四年立皇后大赦九年大赦十三年大赦十四年皇孫生大赦十六年大赦孝靜帝即位大赦改元天平三年大赦四年大赦元象元年大赦興和元年五月立皇后大赦十一月新宮成大赦二年大赦武定元年大赦三年大赦五年大赦六年以旱赦罪人有差七年大赦齊文宣帝天保元年五月即位大赦改元十月曲赦并州北齊赦日武庫令設金雞及鼓於閶闔門外之右勒集囚徒於闕前撾鼓千聲脫枷鎖遣之九年四月大赦十一月大赦廢帝即位大赦孝昭帝即位大赦武成帝即位大赦河清元年立皇后太子大赦四年傳位太子大赦後主天統三年二月加元服大赦十一月以大明殿成大赦四年太上皇崩大赦武平元年皇子生大赦三年立皇后大赦五年大赦七年正月大赦十二月大赦周孝閔帝即位大赦孝明帝即位大赦二年大赦武成元年大赦武帝即位大赦保定四年大赦天和三年大赦建德元年正月大赦改元四月立皇太子大赦三年大赦五年以取齊并州大赦六年平齊詔去年大赦頒宣未及之處悉從赦例宣帝大成元年正月大赦改元二月傳位皇太子大赦時帝以髙祖刑書要制為太重而除之又數行赦宥京兆郡丞樂運上疏以為虞書所稱眚災肆赦謂過誤為害當緩赦之吕刑云五刑之疑有赦謂刑疑從罰罰疑從免也謹尋經典未有罪無輕重溥天大赦之文豈可數施非常之惠以肆姦宄之惡乎帝不納靜帝二年天元崩大赦隋文帝受禪即位大赦改元開皇三年正月將遷新都大赦九月大赦六年大赦七月曲赦江陵及同州八年以伐陳曲赦陳國九年以平陳大赦十五年二月大赦四月大赦十九年大赦開皇末王伽為齊州參軍被州使送流囚李參等七十餘人詣京師時流人並枷鎖傳送次滎陽伽憫其辛苦悉呼而謂之曰卿輩既犯國刑虧損名教身嬰縲紲此其職也今復重勞援卒豈獨不愧於心哉參等辭謝伽曰汝等雖犯憲法枷鎖亦大苦辛吾欲與汝等脫去行至京師總集能不違期不皆拜謝曰必不敢違伽於是悉脫枷停援卒與期曰某日當至京師如致前却吾當為汝受死舍之而去流人感恱依期而至一無離叛上聞而驚異召見與語稱善久之於是悉召流人并令擕負妻子俱入賜宴於殿庭而赦之乃下詔曰凡在有生含靈稟性咸知好惡並識是非若臨以至誠明加勸導則俗必從化人皆遷善往以海內亂離德教廢絶官人無慈愛之心兆庶懷姦詐之意所以獄訟不息澆薄難理朕受命上天安飬萬姓思導聖法以德化人朝夕孜孜意本如此而伽深識朕意誠心宣導參等感悟自赴憲司明率土之人非為難教良是官人不加示曉致令陷罪無由自新若使官盡王伽之儔人皆李參之輩刑措不用其何逺哉於是擢伽為雍令政有能名仁夀元年大赦二年曲赦益州煬帝大業元年正月大赦改元十月赦江淮以南三年頒律令大赦五年大赦九年大赦十年大赦十一年曲赦太原鴈門死罪以下恭帝即位大赦改元唐制赦日武庫令設金雞及鼓於宮城門外之右勒集囚徒於闕前撾鼓千聲訖宣制放其赦書頒諸州用絹寫行下律曰曾赦及降者盜者準枉法猶徴正贓餘贓非見在收贖之物限內未送者並從赦降原諸赦前當罪不斷者若處輕為重宜改從輕處重為輕即依輕法其常赦所不免者依常律常赦所不免謂雖會大赦猶處死及流若除名免所居官移鄉者赦書定罪名合從輕者不待引律比附入重違者各以故失論諸以赦前事相告言者以其罪罪之官司受而為理者以故入人罪論至死者各加後流若事須追究者不用此律追究謂婚姻良賤赦限外蔽匿應改正徴收及追見贓之類唐髙祖武德元年五月上受隋禪即皇帝位大赦改元四年七月以王世充竇建德既平天下略定大赦時赦令既下而王竇餘黨尚有逺徙者治書侍御史孫伏伽請曰今兹大赦既云常赦不原者皆赦除非直赦其有罪亦是與天下更新因何既赦而復徙之且世充尚蒙寬宥况於餘黨所宜縱釋上從之九年六月秦王世民誅太子建成齊王元吉大赦天下八月太宗即皇帝位赦天下貞觀四年以克突厥赦天下六年上親録囚徒放死罪三百九十人歸於家令明年秋來就刑其後應期畢至乃詔悉赦之歐陽氏曰信義行於君子而刑戮施於小人刑入於死者乃罪大惡極此又小人之尤甚者也寧以義死不茍幸生而視死如歸此又君子之尤難者也方唐太宗之六年録大辟囚三百餘人縱使還家約其自歸以就死是以君子之難能期小人之尤者以必能也其囚及期而卒自歸無後者是君子之所難而小人之所易也此豈近於人情或曰罪大惡極誠小人矣及施恩德以臨之可使變而為君子蓋恩德入人之深而移人之速有如是者矣曰太宗之為此所以求此名也然安知夫縱之去也不意其必來以冀免所以縱之乎又安知夫被縱而去也不意其自歸而必獲免所以復來乎夫意其必來而縱之是上賊下之情也意其必免而復來是下賊上之心也吾見上下交相賊以成此名也烏有所謂施恩德與夫知信義者哉不然太宗施德於天下於兹六年矣不能使小人不為極惡大罪而一日之恩能使視死如歸而存信義此又不通之論也然則何為而可曰縱而來歸殺之無赦而又縱之而又來則可知為恩德之致爾然此必無之事也若夫縱而來歸而赦之可偶一為之爾若屢為之則殺人者皆不死是可為天下之常法乎不可為常者其聖人之法乎是以堯舜三王之治必本於人情不立異以為髙不逆情以干譽九年赦天下十四年赦雍州長安繫囚大辟以下十七年立晉王治為皇太子赦天下二十三年三月赦天下六月上崩髙宗即位赦天下上嘗謂侍臣曰凡赦唯及不軌之輩古言曰小人之幸君子之不幸也一歲再赦善人喑啞凡飬稂莠者傷禾稼惠姦宄者賊良人昔文王作罰刑兹無赦夫小仁者大仁之賊故我有天下以來不甚放赦今四海安靜禮義興行數赦即愚人常冀僥幸唯欲犯法不能改過當須慎赦髙宗永徽三年立陳王忠為皇太子赦天下六年立武氏為皇后赦天下顯慶元年改元赦天下四年太子加元服赦天下五年平百濟赦天下龍朔二年赦天下乾封元年封泰山赦天下咸亨元年赦天下上元元年赦天下二年立雍王賢為皇太子赦天下儀鳯元年赦天下三年赦天下調露元年赦天下永隆元年立英王哲為皇太子赦天下永淳元年赦天下宏道元年赦天下武后光宅元年正月改元赦天下二月睿宗立赦天下九月赦天下垂拱元年赦天下三年赦天下四年赦天下天授元年十一月赦天下九月改唐為周赦天下是年用周正以十一月為嵗首長夀元年赦天下延載元年赦天下天册萬歲元年正月大赦九月加尊號赦天下獲嘉縣主簿劉知幾上表言皇業權輿天地開闢嗣君即位黎元更始則時藉非常之慶以申再造之恩今六合清晏而赦令不息近則一年再降逺則每嵗無遺至於違法悖禮之徒無賴不仁之輩編户則寇攘為業當官則贓賄是求而元日之朝指期天澤重陽之節佇降皇恩如期忖度咸樂釋免咸為各垂結正罪當斷決竊行貨賄方便規求故致稽延畢霑寬宥用使俗多頑悖時罕廉隅為善者不預恩光作惡者獨承徼幸若乃方正直言之士守善嫉惡之夫每欲攬轡埋輪效鷹鸇而報國褰帷露冕去蝥賊以安人而遇赦無以效其功閲恩無所施其巧古語云小人之幸君子之不幸斯之謂也望今後頗節於赦使黎民知禁姦宄肅清又海內具僚九品以上每嵗逢赦必賜階勳遂使緋服衆於青衣象版多於木笏皆榮非德舉位罕才望稍息私恩使有善者愈效忠勤無才者咸知勉勵疏奏太后頗嘉之萬歲通天元年赦天下神功元年赦天下聖歷元年正月大赦天下九月復立廬陵王為皇太子赦天下二年赦天下久視元年五月赦天下十月赦天下長安元年赦天下二年祀南郊赦天下中宗神龍元年正月壬午朔赦天下甲辰太子監國赦天下丙午中宗復位赦天下二年立皇后甲子赦天下三年赦天下景龍元年赦天下二年二月赦天下十一月赦天下三年祀南郊赦天下睿宗即位赦天下二年制太子監國赦天下三年正月耕籍田赦天下五月祭北郊赦天下玄宗即位八月赦天下即神龍三年改先天元年十月謁太廟赦天下開元元年誅太平公主赦天下五月