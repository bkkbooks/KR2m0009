從其類也今祭社稷儀注不用血祭皆違經禮請祭社稷以埋血為始郊天先祭血次薦腥次薦爓次薦熟社稷五祀先薦爓次薦熟至於羣小祀薦熟而已近世社稷五祀不薦爓皆未應禮請社稷五祀先薦爓次薦熟古者祭社君南向於北墉下所以答陰也今社壝内不設北墉而有司攝事乃設東向之位於禮非是請太社壝内設北墉以備親祠南向答陰之位其有司攝事則立北墉下少西王制曰天子社稷皆太牢諸侯社稷皆少牢今自太社太稷下至郡縣社稷皆用少牢而祭殊不應禮夫為一郡邑報功者當用少牢為天下報功者當用太牢所有春秋祈報太社太稷請於羊豕之外加以角握二並從之七年詔諸州社稷於壇側建齋㕔三楹以備望祭徽宗政和三年議禮局上五禮新儀太社壇廣五丈髙五尺四出陛五色土為之太稷壇在西如社壇之制社以石為主其形如鐘長五尺方二尺剡其上培其下半州縣社壇方二丈五尺髙三尺四出陛稷壇如社壇之制四門同一壝二十五歩壇飾各隨方色幬以黃土五年知歙州歙縣盧知原言社稷之祭郡邑以長吏及以次官充三獻官著於甲令比來州郡多委曹掾攝事請申嚴有司應奉祀官非實有疾故不得輙委他官行禮從之髙宗紹興元年禮官請歳以春秋二仲及臘前祭太社太稷設位於天慶觀以酒脯一獻明年望祭於臨安天寧觀八年改祀於惠昭齋宫以言者為用血祭始用羊豕皆四籩豆皆十有二備三獻如祀天地之儀徙齋宫之櫺星門於南除其地以設牲器十四年詔築壇壝於觀橋之東壇成立石主置太社令一員孝宗淳熙四年命臨安守臣更立望祭殿及庖室齋廬其儀皆如祭神州唯設太社太稷位於壇之南方北向后土句龍氏后稷氏位於其西東向祀社稷儀注陳設前祀二日本司修除壇之内外設祀官次於壇西門之外道北南向祀日掌事者設神位版於壇上席以莞執罇罍者設祭器掌饌者實之正配每位籩八在神位前左重三行豆八在神位前右重三行俎二在籩豆外分左右槃一在籩豆之間簠簋各一在二俎之間設罇二於壇上西北隅配位之罇在西俱南向西上罇置於坫加以勺羃設洗二各於子陛之西南向社稷各一罍在洗西加勺羃篚在洗東北肆置巾爵設三獻位於壇西北祝位二又於其西俱道北南向東上又設祝位於稷壇上東向南上設初獻飲福位於稷壇上神座之東北南向設望瘞位於瘞埳之南北向東上開瘞埳各於壇之北壬地方深取足容物南出陛置香爐合并燭於神座之前幣置篚陳於左祝版置坫陳於右行禮祀日質明諸祀官各服其服贊禮者引三獻官以下入就位立贊禮者少前初獻之左贊請行事執事者瘞血贊唱者曰拜獻官以下皆再拜訖祝詣社壇升自西陛就位東向立俟初獻將詣罍洗祝詣社壇跪取幣於篚興立於社神座左贊禮者引初獻詣社壇罍洗北南向執罍者酌水初獻搢笏盥手執篚者取巾於篚授初獻帨手訖即受巾奠於篚初獻執笏升自子陛詣社神座前南向搢笏跪三上香祝以幣東向跪授初獻訖興詣配位前南向立初獻受幣奠於社神座前執笏俛伏興再拜訖引初獻詣后土神座前西向如上儀訖祝次詣稷神座前東向立初獻降壇詣稷壇罍洗升獻並如社壇之儀訖降還位祝復位立少頃引初獻再詣社壇罍洗南向執罍者酌水初獻搢笏盥手帨手訖又取爵以授初獻執罍者酌水初獻洗爵又授巾初獻拭爵訖巾奠於篚初獻執笏升自子陛執事者引初獻詣社神酒罇所舉羃酌酒於爵初獻詣社神座前南向搢笏跪執爵三祭酒奠爵執笏俛伏興少退南向立初獻將詣罍洗祝詣社壇持版於社神座之右西面跪讀祝訖初獻再拜祝奠版於神座右坫興次詣配位前北向立執事者引初獻詣配位酒罇所舉羃酌酒於爵初獻詣后土氏神座前西向跪執爵三祭酒奠爵初獻執笏俛伏興少退西向立祝持版於后土神座之右北面跪讀祝畢初獻再拜祝奠版於神座右坫興詣稷神座前西向立初獻降壇詣稷壇罍洗盥帨洗爵訖升自子陛執事者詣稷神酒罇所舉羃酌酒於爵初獻詣稷神座前南向搢笏跪執爵三祭酒奠爵執笏俛伏興少退南向立祝持版於稷神之右西面跪讀祝畢初獻再拜祝奠版於神座右坫興次詣配位前北向立執事者引初獻詣配位酒罇所舉羃酌酒於爵初獻詣后稷氏神座前西向跪執爵三祭酒奠爵執笏俛伏興少退西向立祝持版於后稷神座之右北面跪讀祝畢初獻再拜祝奠版於神座右坫興初獻降復位次引亞獻詣社壇罍洗北南向搢笏盥手帨手洗爵執笏升自西陛詣社神座前南向搢笏跪執爵三祭酒奠爵執笏俛伏興再拜次詣后土氏神座前如上儀訖降壇詣稷壇罍洗升獻並如社壇之儀訖降復位次引終獻詣社稷壇罍洗升獻如亞獻之儀降復位次引初獻詣稷壇升自子陛詣飲福位南向立執事者各以爵酌酒合置一爵持爵詣初獻之左西向立初獻再拜搢笏跪受爵祭酒啐酒奠爵執饌者以俎減社稷神座前胙肉合置一俎上又以豆取稷黍飯合置一豆先以飯授初獻受訖又以俎授初獻受訖皆以授執饌者初獻取爵飲卒爵執事者受虗爵復於坫初獻執笏俛伏興再拜降復位引初獻以下詣社稷壇望瘞位北向立執事者以篚詣神位跪取祝版幣及饌物牲之左髀寘於埳以火焚半贊禮者曰可瘞寘土半埳訖贊禮者少前贊禮畢引初獻以下出退舊制用羊豕各一口籩十二菱芡栗鹿脯榛實乾桃乾䕩乾棗形鹽魚鱐糗餌粉餈豋二太羮鉶鼎三鉶羮盤一毛血簋二黍稷簠二稻粱豆十二芹筍葵菁韮􅋳食魚醢豚拍鹿臡醯醢糝食兎俎八羊腥七體羊熟十一羊腥胃肺羊熟腸胃肺豕腥七體豕熟十一豕腥膚豕熟膚罇罍二十四實以酒並同皇地祗七年權禮部侍郎齊慶胄奏郡縣春秋祈報社稷壇壝器服之度升降跪起之節鄙野不經請以祥符所頒祭器圖制元豐郊廟祀禮政和五禮新儀與其沿革及今所用冕服壇壝之制祭祀之儀參類為書鏤版以賜禮官謂祥符祭器圖制以竹木今臨安上丁上戊及祀風雷亦用之請以祥符圖製及郡縣壇壝冕服祀儀類為一書命臨安守臣刻之摹上禮部下之四方名曰淳熙編類祀祭儀式從之朱子州縣社稷壇説州縣社壇方二丈五尺四歩今每歩六分之一凡言方者皆徑也此言方二丈五尺者從東至西二丈五尺從南至北二丈五尺也壝二十五歩其説亦然髙三尺既言壇高三尺又言壇分三級則是以一尺為一級也四出陛此陛之級即壇之級也但於四面陛之兩旁各以石砌作慢道隔斷使其中為陛級外為壇級可也稷壝如社壇之制社以石為主其形如鐘長二尺五寸方一尺一寸剡其上培其下半舊法惟社有主而稷無主不曉其意恐不可以己意增添其言壇上之南方非壇之中也葢神位坐南向北而祭器設於神位之北故此石主當壇上南陛之上若在壇中央即無設祭處矣四門同一壝二十五歩壝方二十五歩者亦是徑二十五歩謂從東至西二十五歩以大計之六尺為歩則為十五丈也四角築土為壝高三尺許使壇上與齋㕔相望得見壝上不用瓦葢以磚兩面砌使其走水尤為堅固四門當中開門古法不言闊狹恐湏闊一丈餘庶幾行禮執事之人往來寛展不相妨礙兩旁各立一華表髙一丈許上以横木貫之如門之狀華表於禮無文但見州縣有如此者或恐易得損壞不作亦得但壇面二丈五尺乃是上一級之數下面更兩級一級湏展一尺即壇脚湏徑二丈九尺壇飾各隨方色上葢以黄土古者社稷不屋有明文不用磚砌無所考然亦不言磚砌者中原土密雖城壁亦不用磚今南方土疎不砌恐易壞赤土飾之又恐僭於郊壇不可用也瘞坎於壇之北壬地南出陛方深取足容物瘞坎在壇之北壬地即是合在北壝門内兩壇邊各於中央下日隔取壬地各用磚石砌作一小天井深閣三四尺許其南作踏道上下閉時以土實之臨祭即令人取去土掃令潔淨祭畢即使人持幣及祝版之屬從踏道下送入坎中然後下土築實依條差人守視又曰右出政和五禮新儀以行事儀考之二壇東西相並坐南向北石主在壇上之南方北門壝外空地湏令稍寛可容獻官席位空地之北乃作齋㕔以備風雨設獻官位獻官南面行事社各植以土之所宜木壇壝等當用古尺不當用大尺文獻通考卷八十二
