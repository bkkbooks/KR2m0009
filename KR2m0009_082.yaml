body:
  text: 文獻通考卷八十二鄱陽馬端臨貴與著郊社考十五社稷王為羣姓立社曰太社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社為于偽反不羣衆也大夫以下謂下至庶人也大夫得特立社與民族居百家以上則共立一社今時里社是也郊特牲曰唯為社事單出里疏曰王為羣姓立社曰太社者羣姓謂百官以下及兆民言羣姓者包百姓也太社在庫門内之右故小宗伯云右社稷王自為立社曰王社者其王社所在書傳無文或曰與太社同處王社在太社之西崔氏云王社在藉田王自所祭以供粢盛今從其説故詩頌云春籍田而祈社稷是也其諸侯國社亦在公宫之右侯社在籍田大夫以下成羣立社曰置社者大夫以下謂包士庶成羣聚而居其羣衆滿百家以上得立社為衆特置故曰置社大夫至庶人等共在一處也大夫北面之臣不得自專土地故不得特立社社以為民故與民居百家以上則可以立社知百家者詩頌云百室盈止殺時犉牡故曰百家言以上皆不限多少報祭法非白虎通曰王者所以有社稷者為天下求福功人土不立非榖不食土地廣博不可徧敬也五榖衆多不可一一而祭也故封土立社示有土尊稷五榖之長故封稷而祭之也王者自親祭社稷何社者土地之神也土生萬物天下之所主也尊重之故自祭也其壇大如何春秋文義曰天子之社稷廣五丈諸侯半之其色如何春秋傳曰天子有太社焉東方青色南方赤色西方白色北方黑色上冒以黄土故將封東方諸侯青土苴以白茅謹敬潔清也諸侯祭社稷王制禮運小宗伯掌建國之神位右社稷左宗廟庫門内雉門外之左右掌疏曰言右社稷左宗廟者按匠人亦云左祖右社彼其營作此掌其成事位次耳地道尊右故社稷在右是尚尊尊之義此據外神在國中者社稷為尊故鄭注郊特牲云國中神莫大於社祭義注周尚左者據内神而言若據衣服尊卑先王衮冕先公鷩冕亦貴於社稷故云周尚左各有所對故注不同也又曰鄭知庫門内雉門外者後鄭義以雉門為中門故知雉門外庫門内之左右也春官白虎通曰社稷在中門之外外門之内何尊而親之與先祖同也不置中門内何敬之示不䙝瀆也匠人營國左祖右社王宫所居也祖宗廟而疏曰左右前後者據王宫所居處中言之冬官封人掌設王之社壝壝維癸反社之細也壝謂壇及堳埒也不言稷者稷疏曰云掌設王之社壝者謂王之三社三稷之壇及壇外四邊之壝皆設置之直言壝不言壇舉外以見内内有壇可知也又曰壝謂壇及堳埒也者堳埒即壝經不言壇故鄭兼見之也按孝經緯社是五土總神稷是原隰之神原隰則是五土之一耳故云稷社之細舉社則稷從之矣故言社不言稷也云社謂后土者舉配食者而言耳凡封國設其社稷之壝封國建諸侯立其國之封五疏云設其社稷之壝者按禹貢徐州貢色土孔注云王者封五色土為社建諸侯則各割其方色土與之使立社幬以黄土苴以白茅茅取其潔黄取王者覆四方是封諸侯立社稷之法也令社稷之職將祭之時令諸有職事於社稷者也郊特牲曰唯為社事單出里唯為社田國人畢作唯為社邱乘共粢盛所以報本反始也為于偽反單音丹乘繩證反共音恭疏曰春秋祭社皆有職事令之者使其各依職司而行故湏令之也地官小司徒凡建邦國立其社稷疏曰言邦國者謂立畿外諸侯邦國立其社稷者諸侯亦有三社三稷謂國社侯社勝國之社皆有稷配之同上内宰凡建國佐后立市祭之以隂禮市朝者君所以建國也建國者必面朝後市王立朝而后立市隂陽相成之義鄭司農云佐后立市者始立市后立之也祭之以隂禮者市中之社先后所立社也隂禮婦人之祭禮朝直遥反疏曰王者建國非定一所隨世而遷謂若自契至湯八遷太王遷岐文王遷豐武王遷鎬成王營洛皆是建國故云凡以該之云建國者必面朝後市乃冬官匠人文云王立朝者即三朝皆王立之也而后立市者即此文是也祭之以隂禮者市乃先后所立故以隂禮為市之社亦先后所立社也天官黄氏曰社祭土稷祭榖郊丘祭天地天子之禮也土穀之祭逹乎上下故方丘與社皆地祭也而宗伯序祭有社無示舉社則其禮逹乎上下舉示則天子獨用之鼓人職曰以靁鼓鼓神祀以靈鼓鼓社祭不曰示祭而曰社祭亦見其禮之逹乎上下也大司樂靁鼓靁鼗以祀天神靈鼓靈鼗以祭地示是則示祭社祭其用同矣非天子不祭天而天子與庶人皆得祭社尊父親母之義也陳氏禮書曰社所以祭五土之示稷所以祭五穀之神五穀之神而命之稷以其首種先成而長百穀故也稷非土無以生土非稷無以見生生之效故祭社必及稷以其同功均利而養人故也祭法王社侯社無預農事故不置稷大社國社則農之祈報在焉故皆有稷先儒謂王社或建於大社之西或建於籍田然國語王籍則司空除壇農正陳籍禮而歴代所祭先農而已不聞祭社也故詩曰春籍田而祈社稷非謂社稷建於籍田也其言王社建於大社之西於國社亡國社與天子同其祭用少牢與天子異先儒謂天子社廣五丈諸侯半之天子社五色冒以黄而諸侯受土各以其方之色亦冒以黄其言雖不經見然五土數黄正色則天子社廣五丈冐以黄信矣諸侯之禮常半天子天子六軍諸侯三軍天子六卿諸侯三卿天子六宫諸侯三宫天子辟雍諸侯泮宫天子之馬十二閑諸侯之馬六閑則社半五丈信矣禹貢徐州貢土五色以為社則大社五色諸侯受土各以其方之色信矣又曰大夫以下其社之大者則二千五百家為之周禮所謂州社是也其小則二十五家亦為之左傳所謂書社千社是也左傳昭二十五年齊侯致千社於魯哀十五年齊人與衞地自濟以西禚媚杏以南書社五百杜氏注二十五家為一社鄭氏謂百家以上共立一社若今時里社此以漢制明古也左傳有清邱之社月令仲秋命民社先儒以為自秦以下民始得立社然禮言大夫以下則民社不始於秦州長若以嵗時祭祀州社則屬其民而讀法屬音燭云疏曰此歲時謂歲之二時春秋耳春祭社以祈膏雨望五穀豐熟秋祭社者以百穀豐稔所以報功故云祭祀州社也凡讀法皆因節㑹以聚民今既祭因聚民而讀法凡州之大祭祀涖其事大祭祀謂州社稷也涖臨也社疏曰言大祭祀謂州社稷者以上文云歳時祭祀州此經又因言州之大祭祀故知還是上文州社也知有稷者以其天子諸侯三社皆稷對之黨祭禜族祭酺故此特言州社也地官閭胥凡春秋之祭祀既比則讀法注曰祭祀謂州社詳見百神篇禜酺條仲春擇元日命民社郊特牲疏曰社祭一歳有三仲春命民社一也詩云以社以方謂秋祭二也孟冬大割祠于公社三也右天子諸侯大夫之制州社民社附大司徒設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野社稷后土及田正之神壝壇與堳埒也田主田神后土田正之所依也詩人謂之田祖所宜木謂若松栢栗也若以松為社者則名松社之野以别方面疏曰謂於中門之外右邊設大社大稷王社王稷又於廟門之屏設勝國之社稷其社稷外皆有壝埒於四面也句龍生時為后土官有功於土死配社而食棄為堯時稷官立稼穡之事有功於民死乃配稷而食名為田正也故云社稷后土及田正之神雙言之耳云田主田神謂郊特牲云先嗇與神農一也以神農為主祭尊可以及卑故使后土田正二神慿依之同壇共位耳田正則郊特牲所云司嗇一也又引詩人謂之田祖者詩云以御田祖毛云田祖先穡籥章亦云凡國祈年於田祖鄭云田祖始耕田者謂神農也地官哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗朱子曰宰我孔子弟子名予三代之社不同者古者立社各樹其土之所宜木以為主也八佾問古者各樹其所宜木以為社不知以木造主還便以樹為主朱子曰看古人意思只以樹為社主使神依焉如今人説神樹之類敬白虎通曰社稷所以有樹何尊而識之使民人望見之又所以表功也尚書無逸篇曰大社唯松東社唯栢南社唯梓西社唯栗北社唯槐陳氏曰後世宋有櫟社豐有枌榆社先儒謂諸侯社皆立樹以為主以象其神大夫以下但各以地之所宜木立之於義或然小宗伯立軍社王出軍必有事於社及遷廟而以其主行社主曰軍社遷主曰祖春秋傳曰軍行祓社釁鼓祝奉以從書曰用命賞于祖不用命戮于社社之主蓋用石為之石疏曰按許慎云今山陽俗祠有石主社既以土為壇是土之類故鄭云社主蓋以石為之無正文故云蓋以疑之也陳氏禮書曰鄭氏注社之主蓋用石為之唐神龍中議立社主韋叔夏等引吕氏春秋及鄭元義以為社主用石又後魏太平中大社石主遷於社宫是社主用石矣又檢舊社主長二尺五寸方一尺七寸在禮無文按韓詩外傳云天子大社方五丈諸侯半之蓋以五是土數故壇方五丈其社主長五尺方二尺剡其上以象物生方其下以體地體理其半以根在土中而本末均也過尺二寸其短以寸計之唐之時舊主二尺五寸方一尺七寸蓋有所傳然也而議者謂宜長五尺方二尺埋其半於土中此臆論也古者天子諸侯有載社之禮而陳侯嘗擁社以見鄭子展襄二十二年左傳果埋其半則不可迎而載果石長五尺方二尺則不可取而擁右社主社木天子祭社稷皆太牢諸侯祭社稷皆少牢王制社按書曰乃于新邑羊一牛一豕一是天子用太牢也郊特牲而社稷太牢郊特牲隂祀用黝牲毛之隂祀祭地北郊及社稷也黝讀為幽黑也毛之取純毛也地官牧人以血祭祭社稷隂祀自血起貴氣臭也社稷土穀之神有德者配食焉疏曰此地之次祀先薦血以歆神且社稷亦土神故舉社以表地示鼓人亦云靈鼓鼓社祭亦舉社以表地此其類也云隂祀自血起者對天為陽祀自煙起貴氣臭同也春官大宗伯次祀用牲幣元謂次祀又有社稷春官肆師鬯人掌共秬鬯而飾之秬鬯不和鬱者飾之謂設巾疏曰云此直共秬黍之酒無鬱也鄭知飾之謂設巾者按羃人云以疏布巾羃八尊畫布巾羃六彛眀秬鬯之酒尊亦設巾可知林羃人疏曰舉天地則四望山川社稷澤皆用疏布皆是尚質之義也凡祭祀社壝用大罍壝唯癸反欲鬼反罍音雷善壝謂委土為壇墠所以祭也大罍瓦罍墠音疏曰四邊委土為壝於中除地為墠墠内作壇謂若三壇同墠之類也此經云社壝謂若封人及大司徒皆云社壝皆直據外壝而言也祭春官餘見器條三獻文謂祭社稷五祀其神稍尊比羣小祀禮儀為文飾也疏曰希冕三章祭社稷五祀故知三獻祭社稷五祀也禮器三獻爓爓似廉反五三獻祭社稷祀爓沈肉於湯也同上王祭社稷則希冕書曰希繡希讀為絺或作黹字之誤也希刺粉米無畫也其衣一章裳二章凡三也黹展几反又張里反疏曰希刺粉米無畫也者衣是陽應畫今希冕三章在裳者自然刺繡但粉米不可畫今雖在衣亦刺之不變故得希名故鄭特言粉米也春官司服大司樂乃奏太蔟歌應鍾舞咸池以祭地示地示所祭於北郊及社稷春官鼓人以靈鼓鼓社祭靈鼓六面鼓也社祭祭地祗也疏曰郊特牲社祭土神地之道故舉社以表地祇大宗伯亦云血祭祭社稷五祀亦舉社以表地祇其實地之大小之祭皆用靈鼓地官舞師敎帗舞帥而舞社稷之祭祀帗音拂繒有柄色疏曰帗舞用五詳見祭物樂舞載芟春籍田而祈社稷也良耜秋報社稷也豐年秋冬報也右祭社稷禮物樂舞肆師社之日涖卜來歲之稼社祭土為取財焉卜者問後歲稼所宜之疏曰此社亦是秋祭社之日也言涖卜來歲稼者祭社有二時謂春祈秋報報者報其成熟之功今卜者來歲亦如今年宜稼亦不但春稼秋穡不言穡而言稼者秋穡由於春稼故據稼而言之郊特牲云社祭土而主隂氣也取財於地取法於天故云社祭土而取財焉春官厲山氏之有天下也其子曰農能殖百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社厲力世反左傳作烈山共音恭厲山氏炎帝也起由厲山或曰有烈山氏棄后稷名也共工氏無錄而王謂之霸在太皥炎帝之間疏曰其子曰農能殖百穀者農謂厲山氏後世子孫名柱能殖百穀故國語云神農之名柱作農官因名農是也夏之哀也周棄繼之者以夏末湯遭大旱七年欲變置社稷故廢農祀棄以配稷之神其子曰后土能平九州故祀以為社者是共工後世子孫為后土之官后君也為君而掌土能治九州五土之神故祀以為配社之神祭法蔡墨曰共工氏有子曰句龍為后土共工在太皥後神農前以水名官其子句龍能平水土故死而見祀知疏曰言工共有子謂後世子耳亦不句龍之為后土在於何代后土為社疏曰句龍既為后土又亦配社故言后土為社也稷田正也掌播殖也籍疏曰周語云宣王不千畆虢文公諫曰民之大事在農是故稷為大官然則百穀稷為其長遂以稷名為農官之長正長也稷是田官之長有烈山氏之子曰柱為稷烈山氏神農世諸侯山疏曰魯語及祭法皆云烈氏之有天下也其子能殖百穀故祀以為稷言有天下則是天子矣杜注不得為諸侯也賈逵鄭元皆云烈山炎帝之號杜言神農世諸侯者按帝王世紀神農本起烈山然則初封烈山為諸侯後為天子猶帝堯初為唐侯然也此及魯語皆云其子曰柱祭法云其子曰農者劉炫云蓋柱是名其官曰農猶呼周棄為稷自夏以上祀之祀柱反上時掌周棄亦為稷棄周之始祖能播百穀湯既勝夏廢柱而以棄代之其疏曰棄為周之始祖能播殖百穀經傳備有其事以後世有天下號國曰周故以周冠棄棄時未稱周也自商以來祀之傳言蔡墨之博物疏昭公二十九年左氏傳郊特牲曰社稷之義先儒所解不同鄭康成之説以社為五土總神稷為原隰之神句龍以有平水土之功配社祀之稷有播種之功配稷祀之鄭必為此説者按郊特牲云社祭土而主隂氣又云社所以神地之道又禮運云命降於社之謂殽地又王制云祭天地社稷為越紼而行事據此諸文故知社即地神稷是社之細别名曰稷稷乃原隰所生故以稷為原隰之神若賈逵馬融王肅之徒以社稷句龍稷祭后稷皆人鬼也非地神故聖證論王肅難鄭云禮運云祀帝於郊所以定天位祀社於國所以列地利社若是地應云定地位而言列地利故知社非地也為鄭學者馬昭之等通之云天體無形故須云定位地體有形不須云定位故唯云列地利肅又難鄭云祭天牛角繭栗而用特牲祭社牛角尺而用太牢又祭天地大裘而冕祭社稷絺冕又唯天子令庶民祭社社若是地神豈庶民得祭地乎為鄭學者通之云以天神至尊而簡質事之故牛角繭栗而用特牲服大裘天地至尊天子至貴天子祭社是地之别體有功於人報其載養之功故用太牢貶降於天故角尺也祭用絺冕取其隂類庶人䝉其社功故亦祭之非是方澤之地也肅又難鄭云召誥用牲于郊牛二明后稷配天故知二牲也又云社于新邑牛一羊一豕一明知唯祭句龍更無配祭之人為鄭學者通之云是后稷與天尊卑既别不敢同天牲句龍是上公之神社是地祗之别尊卑不甚縣絶故云配同牲也肅又難鄭云后稷配天孝經有配天明文后稷不稱天也祭法及昭二十九年傳云句龍能平水土故祀以為社不云祀以配社明知社即句龍也為鄭學者通之云后稷非能與天同功唯尊祖配之故云不得稱天句龍與社同功故得云祀以為社而得稱社也肅又難云春秋説伐鼓于社責上公不云責地祇眀社是上公也又月令命民社鄭注云社后土也孝經注云后稷土也句龍為后土鄭既云社后土則句龍也是鄭自相違戾為鄭學者通之云伐鼓責上公者以日食臣侵君之象故以責上公言之句龍為后土之官其地神亦名后土故左傳云君戴皇天而履后土地稱后土與句龍稱后土名同而實異也鄭注云后土者謂地神也非謂句龍故中庸云郊社之禮注云社祭地也又鼓人云以靈鼓鼓社祭注云社祭祭地祗也是社為地祗也神朱子曰或説稷是邱陵原隰之神或云穀神㸔來穀較是社是土神又問曰社如何有神曰能生物便是神也楊氏曰王鄭之學互有得失若鄭云句龍有平水土之功配社祀之后稷有播種之功配稷祀之則鄭説為長右社稷配祭喪祝掌勝國邑之社稷之祝號以祭祀禱祠焉勝國邑所誅討者社稷者若亳社是矣存之者重神也葢奄其上而棧其下為北牖疏曰以祭祀禱祠者祭祀謂春秋正祭禱祠謂國有故祈請求福曰禱得福報賽曰祠云勝國邑所誅討者據武王伐紂取其社稷而事之故云若亳社是也據其地則曰亳據彼國喪亡即為亡國之社稷此注勝之即為勝國之社稷是以郊特牲云喪國之社春秋謂之亳社也君自無道被誅社稷無罪故存之是重神也公羊曰揜其上即屋之也棧其下者非直不受天陽亦不通地隂春官士師若祭勝國之社稷則為之尸以刑官為尸略之也周謂亡殷之社為亳社今疏曰按鳬鷖詩宗廟社稷七祀皆稱公尸不使刑官祭勝國之社稷士師為尸故鄭云用刑官為尸略之也秋官右勝國社稷傳社祭土而主隂氣也疏曰土謂五土山林川澤邱陵墳衍原隰以時祭之故云社祭土土是隂氣之主故云而主隂氣也君南鄉於北墉下答隂之義也墻謂之墉社内北墻在疏曰墉墻也社既主隂隂宜在北故祭社時以社南設主壇上北面而君來在北墻下而南鄉祭之是對隂之義也日用甲用日之始也國中之神莫貴於社疏曰社是國中之貴神甲是旬日之初始故用之也營月令疏曰召誥戊午乃社于新邑用戊者周公告洛邑位成非常祭也天子大社必受霜露風雨以逹天地之氣也大音泰逹大社王為羣姓所立生疏曰是解社不屋義也通也風雨至則萬物霜露降則萬物成故不為屋以受霜露風雨是故喪國之社屋之不受天陽也薄社北牖使隂眀也喪息浪反社絶其陽通其隂而已薄社殷之殷始都薄薄又作亳歩各反屋疏曰周立殷社以為戒天是生法以其無生義故隔之令不受天之陽也白虎通云王者諸侯必有戒社者何示有存亡也眀為善者得之為惡者失之周立殷社為戒而屋之塞其三面唯開北牖示絶陽而通陰陰明則物死也社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示本也中霤亦土神也疏曰言立社之祭是神明於地之道故也地載萬物者釋地所得神之由也天垂象者地有其物天上皆垂其象所謂在天成象在地成形也取財於地者財並在地出為人所取也取法於天者人知四時早晩皆放日月星辰以為耕作之候是取法於天所取法者故尊而祭之天子祭天是也所取財者故親而祭之一切親地而共祭社是也故教民美報焉者此結祀社也地既為民所親故與庶民祭之以教民美報故也中霤謂土神卿大夫之家主祭土神於中霤示本也者以土神生財以養官之與民故皆主祭土神蓋所以示其生養之本也唯為社事單出里唯為社田國人畢作唯社邱乘共粢盛所以報本反始也為於偽反乘時證反又徒徧反共音恭粢音資則單出里皆往祭社於都鄙二十五家為里畢作人盡行非徒羡也邱十六井也四邱六十四井曰甸或謂之乘乘者以於車賦出長轂一乘也甸徒練反又繩證反疏曰社事祭社事也單盡里居也社既為國之本故若祭社則合里之家並盡出故云單出里也此惟每家出一人不人人出也田獵也畢盡也作行也既人人得社福故若祭社先為社獵則國中之人皆盡行無得住家也唯社邱乘共粢盛者嚮説祭社用牲此明祭社用米也邱乘者都鄙井田也九夫為井四井為邑四邑為邱四邱為乘唯祭社而使邱乘共粢盛也粢稷也稷曰明粢在器曰盛庾蔚曰粢盛所須者少故邱乘共之也皇氏曰若天子諸侯祭社則用籍田之穀大夫以下無籍田若祭社則邱乘之民共之示民出力也單出里皆徃祭社於都鄙者按周禮都鄙公卿大夫采地公卿大夫祭社其里之人皆往就祭此據采地言之故云往祭社於都鄙必知據采地者以經云唯社邱乘邱乘是采地井田之制故舉采地言焉所以報本反始也者結美報也郊特牲社天子之祭也春田祭社明堂位命降於社之謂殽地殽户教反土謂教令由社下者也社土地之主也周禮㑹之法有五地之物生疏曰殽效也命者政令之命降下於社謂從社而來以降民也社即地也指其神謂之社指其形謂之地法社以下教令故云之謂殽地地有五土生物不同人君法地亦養物不一也禮運祀社於國所以列地利也疏曰地出財故云列地利也亦即是命降於社之謂殽地也同上以我齊眀與我犧羊以社以方朱子曰齊音咨賦也齊與粢同曲禮曰稷曰明粢此言齊明便文以協韻耳犧羊純色之羊也社后土也以句龍氏配方秋祭四方報成萬物周禮所謂羅弊獻禽以祀祊是也四小雅甫田神大雅雲漢方社不莫朱子注曰方祭方社祭土也起大事動大衆必先有事乎社而後出謂之宜有事祭也周官所謂宜乎社於社及君以軍行祓社爾雅大左傳帥師者受服周禮祝太師宜於社肆師凡師甸用牲於社宗則為位功愷樂獻於社並見内祭篇甸條大司馬若師有小宗伯凡天地之大烖類宗廟社稷則為位見祈禳條迺月令大割祠于公社見百神篇䄍條大雅緜詩立冢土戎醜攸行朱子注曰冡土大社也亦大王所立而後因以為天子之制也戎醜大衆也起大事動大衆必先有事乎社而後出謂之宜孟子曰民為貴社稷次之朱子曰社土神稷穀神建國則立壇壝以祀之云云犧牲旣成粢盛旣潔祭祀以時然而旱乾水溢則變置社稷盛音成神祭祀不失禮而土穀之不能為民禦災捍患則毁其壇壝而更置之亦年不順成八蜡不通之意是社稷雖重於君而輕於民也盡心下大傳曰重社稷故愛百姓鄭子産伐陳入之陳侯免擁社以待於朝免喪服擁社抱社主示服五免音問喪冠也擁芳勇反襄公二十年左氏傳莊公如齊觀社莊公二十三年齊因祀社蒐軍實以示客公往觀之曹劌諫曰夫齊棄太公之法而觀民於社太公齊始祖太公望也君為是舉舉動也而往觀之非故業也何以訓民土發而社助時也土發春分也周語曰土乃脉發社者助時祈福為農始也今齊社而往觀旅非先王之訓也旅衆也天子祀上帝上帝上天也諸侯會之受命焉助祭受政命也諸侯祀先王先公先王謂若宋祖帝乙鄭祖厲王之屬也先公先君也卿大夫佐之受事焉事職事也臣不聞諸侯之相會祀也祀又不法不法為觀民國語魯語哀公四年六月辛丑亳社災穀梁子曰亳社者亳之社也亳亡國也亳即殷也殷都於亳故國謂之亳社亡國之社以為廟屏戒也立亳之社於廟之外以為屏蔽取其不得通天人君瞻之而致戒心其屋亡國之社不得逹上也必為之作屋不使上通天也緣有屋故言災公羊子曰蒲社災蒲社者何亡國之社也疏曰蒲社者先世之亡國在魯境者公羊解以為蒲者古國之名天子滅之以封伯禽取其社以戒諸侯使事上今災之者若曰王教絶云爾左氏穀梁以為亳社者武王滅殷遂取其社賜諸侯以為有國之戒社者封也封土為社其言災何據封土非火所能燒亡國之社葢揜之揜其上而柴其下故火得燒之揜柴之者絶不得使通天地四方以為有國之戒蒲社災何以書記災也戒社者先王所以威示教戒諸侯使事上也是後宋事彊呉齊晉前驅滕薛夹轂魯衞驂乘故天去戒社若曰王教滅絶云爾疏曰春秋説文謂十三年黃池之會時也胡氏曰古者祭地於社猶祀天於郊也故泰誓曰郊社不修而周公祀于新邑亦先用二牛於郊後用太牢於社也記曰天子將出類於上帝宜於社又曰郊所以明天道社所以神地道周禮以禋祀祀昊天上帝以血祭祭社稷而别無地示之位四圭有邸舞雲門以祀天神兩圭有邸舞咸池以祀地而别無祭社之説則以郊對社可知矣後世既立社又立北郊失之矣楊氏曰愚按禮經天子祭天地諸侯祭社稷祭莫重於天地而社稷其次也胡氏乃合祭地祭社二者而一之何也曰社者五土之神是亦祭地也而有廣狹之不同曰里社則所祭者一里之地而已曰州社則所祭者一州之地而已諸侯有一國其社曰侯社則所祭者一國之地一國之外不及也天子有天下其社曰王社則所祭者天下之地極其地之所至無界限也故以祭社為祭地惟天子可以言之凡胡氏所引皆天子社也但云後世既立社又立北郊失之矣此皆未然有正祭有告祭冬至祭天於南郊順陽時因陽位夏至祭地於北郊順陰時因隂位以類求類故求諸天而天神降求諸地而地示出所謂正祭也匠人營國左祖右社以社與祖對尊而親之若因事而告地則祭地亦可矣記曰天子將出類於上帝宜於社之類是也説者曰類者依郊祀正禮而為之也宜者有事乎社求福佑也此所謂告祭也知祭各有義不可以一説拘則知聖人制禮精微之意矣漢高祖初起禱豐枌榆社鄭氏曰枌榆鄉名師古曰以此樹為神因立名葢高祖里社也二年東擊項籍還入關因命縣為公社猶官社立靈星祠以后稷配見祭星門四年天下已定詔御史令豐治枌榆社常以時春以羊彘祠之梁巫祠天社秦巫祠社主即五社主也十年令縣常以春二月及臘祠稷以羊彘民里社各自裁以祠謂隨其時具之豐儉也漢舊儀官大社及大稷一歲各再祠大祝令常以二月八月以一太牢使者監祠南向立不拜天下祠社稷社者古司空主平水土共工氏之子句龍氏能平水土植百穀祭於社以報其功稷者司馬官長助后稷耕種祭於稷以報其功祠社稷各官長諸侯丞相中二千石二千石以下令長侍祠平帝時大司馬王莽上書帝王建立社稷百王不易社者土也宗廟王者所居稷者百穀之主所以奉宗廟共粢盛人所食以生活也王者莫不尊重親祭自為之主禮如宗廟詩曰乃立冢土師古曰大雅緜之詩也冡大也土土神為大社也又曰以御田祖以祈甘雨師古曰小雅甫田之詩也田祖稷神也言設樂以御祭於神為農求甘雨也禮記曰唯祭宗廟社稷為越紼而行事李竒曰引棺車謂之紼當祭天地五祀則越紼而行事不以私喪廢公祀師古曰紼引車索也聖漢興禮儀稍定已有官社未立官稷臣瓚曰高帝除秦社稷立漢社稷禮所謂大社也時又立官社配以夏禹所謂王社也見漢祀令而未立官社至此始立之世祖中興不立官稷相承至今也遂於官社後立官稷以夏禹配食官社后稷配食官稷稷種穀樹師古曰穀樹楮樹也其子類榖故於稷種徐州牧歲貢五色土各一斗光武建武二年立太社稷於洛陽在宗廟之右方壇無屋有門墻而已二八月及臘一歲三祠皆太牢具使有司祠郡縣置社稷太守令長侍祠牲用羊豕唯州所治有社無稷以其使官古者師行平有載社主不載稷也漢儀朔前後各二日皆牽羊酒至社下以祭日日有變割羊以祠社用救日何休注公羊傳曰日有食之鼓用牲于社求乎陰之道也以朱絲縈社或曰脅之或曰為䦣恐人犯之故縈之也何休曰脅之與責求同義社者土地之主也月者土地之精也上繫於天而犯日故鳴鼓而攻之脅其本也朱絲縈之助陽抑陰也或曰為闇者社者土地之主尊也為日光盡天闇冥恐人犯歴之故縈之然此説非也先言鼓後言用牲者明先以尊者命責之後以臣子禮接之所以為順也白虎通曰日食必救之陰侵陽也鼓攻之以陽責陰也故春秋日食鼓用牲于社所以必用牲者社地别神也尊之不敢虛責也日食大水則鼓用牲大旱則雩祭求雨非虛言也助陽責下求陰之道也魏自漢後但太祖有稷官社無稷故常二社一稷也至明帝景初中立帝社博士孔鼂議漢氏及魏初皆立一社一稷至景初之時更立太社太稷又特立帝社云禮記祭法云王為羣姓立社曰太社言為羣姓下及士庶皆使立社非自立也今並立二社一神二位同時俱祭於事為重於禮為黷宜省除一社以從舊典劉喜難曰祭法為羣姓立社若如鼂議當言王使不得言為下云王為羣姓立七祀諸侯自為立五祀若是使羣姓私立何得踰於諸侯而祭七祀乎却為羣姓立七祀乃王之祀也夫人取法於天取財於地普天率土無不奉祀而何言乎一神二位以為煩黷明帝時祭社但稱皇帝王肅議太尉等祭祀但稱名不稱臣每有事須告皆遣祝史晉武帝太康九年詔曰社實一神其併二社之祀車騎司馬傅咸表曰祭法王社太社各有其義穀梁傳曰天子親耕故自立社為籍而報也國以人為本人以穀為命為百姓立社而祈報焉事異體殊此社之所以有二武帝外祖王肅景侯之論曰王社亦謂春祈籍田秋而報之也其論太社則曰王者布下圻内為百姓立之謂之太社不自立之於京師也景侯此論據祭法大夫以下成羣立社曰置社景侯解曰今之里社是太社天子為人而祀故稱天子社郊特牲曰天子太社必受霜露風雨夫以羣姓之衆王者通為立社故稱太社若夫里社其數不一葢以里所為名左氏傳盟於清邱之社是也人間之社不稱太矣若復不立之京都當安所立乎前被勅尚書召誥云社于新邑唯一太牢不立二社之明義也郊特牲曰社稷太牢必據一牢之文以明社之無二則稷無牲矣説者則曰舉社則稷可知茍可舉社以明稷何獨不舉一以明二國之大事在祀與戎若有過而除之不若過而存之存之有義除之無據周禮封人掌設社壝無稷字今帝社無稷葢出於此然國主社稷故經傳動稱社稷周禮王祭社稷則絺冕此王社有稷之文也封人設社壝無稷字説者以為約文從可知也謂宜仍舊立二社而加立帝社之稷禹貢惟土五色景侯解曰王者取五色土為太社封四方諸侯各割其方色土者覆四方也如此太社復為立京都也詔曰社實一神而相襲二位衆議不同何必改作其使仍舊一如魏制元帝建武元年依洛京立二社一稷宋仍晉舊無所改作齊武帝永明十一年修儀其神一位北向稷東向齋官社壇東北南向立以西為上諸執事西向立以南為上稷名太稷祠部郎中何佟之議按禮記郊特牲社祭土而主陰氣也君南向於北墉下答陰也王肅云陰氣北向故君南向以答之為言是相對之稱知古祭社北向設位齋官南向眀矣近代相承帝社南向太社及稷並東向而齋官在帝壇北西向於神背行禮又名稷為稷社甚乖禮意謂二社語其義則殊論其神則一位並宜北向稷若北向則成相背稷是百穀之總神非陰陽之主宜依先東向齋官在社壇東北南向立以西為上諸執事西向立以南為上稷依禮無兼稱若欲尊崇正可名太稷豈得云稷社邪治禮學士議曰郊特牲云君南向答陽也臣北向答君也若以陽氣在南則立應北向陰氣向北則立宜向南今二郊一限南向皇帝奠幣東西向故知壇墠無係於陰陽設位寧拘於南北羣神小祠類皆南面薦饗之時北向行禮葢欲伸靈祇之尊表求幽之理議與佟之相難凡三往返有司議治禮無的然明據佟之議乃行也梁社稷在太廟西天監四年以太常省牲太常丞牽牲太祝令贊牲至大同初又加官稷并前為五壇其初蓋晉元帝建武元年所創有太社帝社太稷凡三壇門墻並隨其方色每以仲春仲秋并令郡國縣祠社稷先農及臘又各祠社稷於壇百姓則二十五家為一社其舊社及人稀者不限其家春秋祠水旱禱祈祠具通其豐約舊太社廪犧吏牽牲司農省牲太祝吏贊牲天監中明山賔議郊特牲云社者神地之道國主社稷實為重今公卿貴臣親執盛禮而令微吏牽牲頗為輕末且司農省牲又非其義太常禮官實當斯職禮祭社稷無親牽牲之文謂宜以太常省牲廪犧令牽牲太祝令贊牲帝唯以太祝贊牲為疑又以司農省牲於禮似傷廪犧吏執紖即事誠卑議以太常丞牽牲餘依山賔議於是遂定陳依梁舊而帝社以三牲首餘以骨體薦粢盛為六飯粳以敦稻以牟黄梁以簠白梁以簋黍以瑚粢以璉其義本之齊制敦音對後魏天興二年置太社太稷帝社於宗廟之右為方壇四陛以二月八月日用戊皆太牢句龍配社周棄配稷皆有司侍祠北齊立太社帝社太稷三壇於國右每仲春仲秋元辰及臘各以一太牢祭焉皇帝親祭則司農卿省牲進熟司空亞獻司農終獻隋文帝開皇初建社稷並列於含光門内之右仲春仲秋吉戊各以一太牢祭牲色用黒孟冬下亥又臘祭之郡縣二仲月並以少牢各祭百姓亦各為社唐社稷亦在含光門内之右仲春仲秋二時戊日祭太社太稷社以句龍配稷以后稷配武德九年親祠太社詔令四方别其姓類命為宗社京邑庶士臺省羣官里閈相從共遵社法以時供祀各申祈報具立節文眀為典制高宗咸亨五年以宗邑等社事屬煩擾罷之睿宗神龍元年改先農壇為帝社壇於太壇西立帝稷壇禮同太社太稷其壇不備方色異於太社時祝欽眀與禮官等奏經典並無先農之文永徽年中猶名籍田垂拱以後改為先農然先農與社本是一神其先農壇請改為帝社以應王社之義其祭先農改為帝社仍請准令用孟春吉辰祭后土以句龍配從之又其年五月詔於東都建置太社令禮官議定社主太常少卿韋叔夏等引呂氏春秋及鄭元議以為社主用石又按後魏天平四年四月太社石主遷於社宫是社主用石矣又檢舊社主長二尺六寸方一尺七寸禮官博士議社主制度長短在禮無文按韓詩外傳云天子太社方五丈諸侯半之葢以土是五數故壇方五丈其社主請准五數長五尺准陰之二數方二尺剡其上以象物生方其下以象地體埋其半以根在土中而本末均也則神道設教法象有慿其尺請用古尺又檢舊社稷壇上四方布以方色唯中央數尺飾以黄土禮官韋叔夏等又議曰韓詩外傳曰天子太社廣五丈各分置四方色訖上冒以黃土象王者覆彼四方據此合用黃土遍覆壇上今檢舊壇之上亦備方色唯中央數尺飾以黃土則是覆被之道有所不及既乖舊制請准古改造於是以方色飾壇之四面及四陛其上則以黃土覆之元宗開元十九年正月三十日勅普天率土崇德報功饗祀惟殷刲割滋廣非可以全惠養之道協靈祗之心其春秋二時社及釋奠天下諸州府縣等並停牲牢惟用酒脯務存修潔足展誠敬自今以為常式至二十二年三月二十五日勅春秋祈報郡縣常禮比不用牲豈云血祭陰祀貴臭神何以歆自今以後州縣祭祀特以牲牢宜依常式其年六月二十八日勅大祀中祀及州縣社稷依式合用牲牢餘並用酒脯至貞元五年九月十二日國子祭酒包佶奏春秋祭社稷准禮天子社稷皆太牢至大歴六年十月十三日勅中祀少牢社稷是中祠至今未改勅㫖宜准禮用太牢天寳三載詔社稷列為中祀頗紊大猷自今以後社稷及日月五星並升為大祀仍以四時致祭唐開元禮仲春仲秋上戊祭太社后土配太稷后稷配每坐籩豆各十簋簠各二鉶爼各二舊樂用姑洗之均三變社稷之祀於禮為尊豈同邱陵止用三變合依地祇用函鍾之均八變之樂皇帝仲春仲秋上戊祭太社太稷儀攝事附齋戒如前祭方丘儀陳設前祭三日尚舎直長施大次於社宫西門之外道北南向尚舎奉御鋪御座衞尉設文武侍臣次於大次之後文官在左武官在右俱南向設諸祭官次於齋坊