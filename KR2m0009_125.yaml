始合葬漢積祀四百魏晉祚卒不長亦其驗也今若更擇吉地附近乾陵取從葬之義使神有知無所不通若其無知合亦何益山川精氣上為列星葬得其所則神安而後嗣昌失其宜則神危而後嗣損願割私愛使社稷久長中宗不納中宗崩葬定陵在京兆府富平縣界六月二日崩十一月己酉葬睿宗崩葬橋陵在京兆府奉天縣界五月十二日崩十月庚午日葬致堂讀史管見言明皇於睿宗孝養素薄故其崩也五月而遽葬以為薄於其親然愚嘗考之自漢以來並未嘗守天子七月而葬之制如隋以前歴代葬期多只在一兩月之内蓋以預規山陵而嗣君又急於從吉故也雖至孝如晉武帝魏孝文亦廹於其臣下之請不免徇近代之制惟以禍亂不克葬者方有數月之淹如梁武帝父子是也至唐髙祖崩五月而葬則以升遐之後方營山陵故少遲於前代虞世南諫疏可見及太宗預為壽域則又不及五月髙宗以後或遲或速大槩不越五六月雖少遲於近代而終未能復古禮明皇蓋亦循故事耳致堂豈未之考邪橋陵陪葬名氏節愍太子重俊宜城公主金城公主長寧公主城安公主定安公主鄎國公主彭國公主駙馬李思訓開元十七年元宗因拜橋陵至金粟山覩岡巒有龍盤鳳翔之勢謂左右曰吾千秋後宜葬於此後遂追先㫖葬焉天寶二年制每歲以九月一日薦衣於陵寢又以寒食薦餳粥鷄毬雷車五月五日薦衣扇十三載制獻昭乾定橋五署改為臺令丞各陞一階自後諸陵例皆稱臺唐開元禮皇帝謁陵行宫距陵十里設坐於齋室設小次於陵所道西南大次於寢西南侍臣次於大次西南陪位者次又於西南皆東向文官於北武官於南朝集使又於南皆相地之宜前行二日遣太尉告於廟皇帝行至宫即齋室陵令以玉冊進署設御位於陵東南隅西向有岡麓之閡則隨地之宜又設位於寢宫之殿東陛之東南西向罇坫陳於堂户東南百官行從宗室客使位神道左右寢宫則分方序立大次前其日未明五刻陳黄麾大仗於陵寢三刻行事官及宗室親五等諸親三等以上并客使之當陪者就位皇帝素服乘馬華蓋繖扇侍臣騎從詣小次步出次至位再拜又再拜在位皆再拜又再拜少選太常卿請辭皇帝再拜又再拜奉禮曰奉辭在位者再拜皇帝還小次乘馬詣大次仗衞列立以俟行百官宗室諸親客使序立次前皇帝步至寢宫南門仗衞止乃入繇東序進殿陛東南位再拜升自東階北向再拜又再拜入省服玩收拭帳簀進太牢之饌加珍羞皇帝出罇所酌酒入三奠爵北立太祝二人持玉冊於户外東向跪讀皇帝再拜又再拜乃出户當前北向立太常卿請辭皇帝再拜出東門還大次宿行宫若太子諸王公主陪葬栢城者皆祭寢殿東廡功臣陪葬者祭東序為位奠饌以有司行事或皇后從謁則設大次寢宫東先朝妃嬪次於大次南大長公主諸親命婦之次又於其南皆東向以行帷具帳謁所内謁者設皇后位於寢宫東大次前少東先朝妃嬪位西南各於次東司贊位妃嬪東北皆東向皇帝既發行宫皇后乘四望車之大次改服假髻白練單衣内典引導妃嬪以下就位皇后再拜陪者皆拜少選遂辭又拜陪者皆拜皇后還寢東大次陪者退皇后鈿釵禮衣乘輿詣寢宫先朝妃嬪大長公主以下從至北門降輿入大次詣寢殿前西階之西妃嬪公主位於西司贊位妃嬪東北皆東向皇后再拜在位者皆拜皇后繇西階入室詣先帝前再拜復詣先后前再拜進省先后服玩退西廂東向立進食皇后乃降西階位辭再拜妃嬪皆拜詣大次更衣皇帝過乃出寢宫北門乘車還天子不躬謁則以太常卿行陵所司撰日車府令具軺車一馬清道青衣團扇曲蓋繖列俟於太常寺門設次陵南百步道東西向右校令具雜器以備灑掃太常卿公服乘車奉禮郎以下從至次設卿位兆門外之左陵官位卿東南執事又於其南皆西向奉禮郎位陵官之西贊引二人居南太常卿以下再拜在位皆拜謁者導卿贊引導衆官入奉行復位皆拜出乘車之他陵有芟治則命之自開元十七年以後無親謁陵故事𤣥宗崩葬泰陵在京兆府奉天縣界四月五日崩次年三月辛酉葬泰陵陪葬名氏贈揚州大都督髙力士肅宗崩葬建陵在京兆府醴泉縣界四月十八日崩次年三月庚午日葬建陵陪葬名氏尚父汾陽王郭子儀元和九年左金吾衞大將軍郭釗奏亡祖子儀陪葬建陵欲於墳所種植松楸勅如遇年月通便陵寢修營宜令所司許其種植寶歴二年二月太常奏追尊孝敬皇帝以下四陵宜停朝拜事孝敬皇帝恭陵讓皇帝惠陵奉天皇帝齊陵承文皇帝順陵前件四陵昔年追尊大號皆是恩制縁情而行當時已不合經典今乃二時朝拜上擬祖宗切以情禮之差過猶不及謹按禮記及歴代禮文并國朝故事皇帝旁親無服又云五代而親屬盡伏以四陵親非祖宗事無故德縁情權制禮合變更有司因循尚為常典况今宗廟之上遷代已逺尊卑降殺朝拜須停勅㫖依奏代宗崩葬元陵在京兆府富平縣界五月二十日崩十月己酉葬無陪葬葬代宗時發引帝見輼輬車不當馳道移指丁未之間問其故有司曰陛下本命在午不敢衝也上哭曰安有枉靈駕而謀自利乎命改轅直午而行貞元十四年令有司修葺陵寢以昭陵舊宫先因火焚毁故詔百官詳議議者多云舊宫既被焚爇請移就山下或有議請修舊宫者上意亦不欲移由是復以山上為定於是遣左諫議大夫平章事崔損完修八陵使及所司計獻昭乾定泰五陵各造屋三百七十八間橋陵一百四十間元陵三十間唯建陵不復創造但修葺而已所縁陵寢中帷幄床蓐一事已上並令制置上親閱焉德宗崩葬崇陵在京兆府雲陽縣界正月崩十月葬無陪葬順宗崩葬豐陵在京兆府富平縣界正月崩七月葬無陪葬憲宗崩葬景陵在京兆府奉天縣界正月崩五月葬景陵陪葬名氏惠昭太子寧孝明太后鄭氏懿安太后郭氏賢妃王氏穆宗崩葬光陵在京兆府奉天縣界正月崩十一月葬光陵陪葬名氏恭僖太后王氏正獻太后蕭氏敬宗崩葬莊陵在京兆府三原縣界十二月崩次年七月葬莊陵陪葬名氏悼懐太子普文宗崩葬章陵在京兆府富平縣界正月崩八月葬無陪葬武宗崩葬端陵在京兆府三原縣界三月崩八月葬端陵陪葬名氏賢妃王氏宣宗崩葬正陵在京兆府雲陽縣界八月崩次年二月葬正陵陪葬名氏媫妤柳氏懿宗崩葬簡陵在京兆府富平縣界七月崩次年二月葬無陪葬僖宗崩葬靖陵在京兆府奉天縣界三月崩十二月葬無陪葬昭宗崩葬和陵在河南府緱氏縣界梁太祖崩葬宣陵在洛京伊闕縣六月五日崩十月十日葬後唐同光三年六月勅關内諸陵頃因喪亂類遭穿發多未掩修其下宫殿宇法物等各令奉陵州府據所管陵園修製仍四時各依例薦饗逐陵各差近陵百姓二十户放雜差役以備灑掃其壽陵等一十陵亦一例修掩量差陵户仍授尚書工部郎中李途京兆少尹完修奉諸陵使後唐莊宗崩葬雍陵在洛京新安縣四月崩次年七月葬明宗崩葬徽陵在洛京洛陽縣十一月崩次年四月葬末帝泰清三年車駕北幸路當徽陵乃至陵所朝謁晉髙祖崩葬顯陵在洛京壽安縣六月十三日崩十月十日葬漢髙祖崩葬睿陵在洛京都城縣正月二十七日崩十一月二十七日葬隱帝崩葬潁陵在許州陽翟縣十一月二十一日崩八月十二日葬周太祖崩葬嵩陵在鄭州新鄭縣正月十七日崩四月十二日葬先時帝屢戒晉王曰昔吾西征見唐十八陵無不發掘者此無他惟多藏金玉故也我死當衣以紙衣斂以瓦棺速營葬勿久留宫中壙中無用石以甓代之工人徒役皆和雇勿以煩民葬畢募近陵民三十户蠲其雜徭使之守視勿修下宫勿置守陵宫人勿作石羊虎人馬惟刻石至陵前云周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或違吾吾不福汝世宗顯德元年六月車駕征太原囘拜嵩陵至陵所哀泣感左右祭奠而退賜奉陵將吏及近郊人金帛有差世宗崩葬慶陵在鄭州管城縣六月十九日崩十一月一日葬㳟帝崩葬順陵在慶陵之側文獻通考卷一百二十五
