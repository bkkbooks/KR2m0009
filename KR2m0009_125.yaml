body:
  text: 文獻通考卷一百二十五鄱陽馬端臨貴與著王禮考二十山陵魏武王崩遺令無藏金玉珍寶髙陵建安二十五年正月庚子崩二月丁卯葬文帝黄初二年十月表首陽山東為壽陵帝自作終制曰禮國君即位為椑存不忘亡也椑音扶歴反臣松之按禮天子諸侯之棺各有重數棺之親身者曰椑昔堯葬榖林通樹之禹葬會稽農不易畝吕氏春秋堯葬於榖林通樹之舜葬於紀市㕓不變其肆禹葬會稽不變人徒故葬於山林則合乎山林封樹之制非上古也吾無取焉壽陵因山為體無為封樹無立寢殿造園邑通神道夫葬也者藏也欲使人之不得見也骨無痛癢之知冡非棲神之宅禮不墓祭欲存亡之不黷也為棺槨足以朽骨衣衾足以朽肉而已故吾營此邱墟不食之地欲使易代之後不知其處無施葦炭無藏金銀銅鐵一以瓦器合古塗車芻靈之義棺但漆際會三過飯含無以珠玉無施珠𥜗玉匣諸愚俗所為也季孫以璠璵歛孔子歴級而救之譬之暴骸中原宋公厚葬君子謂華元樂莒不臣以為棄君於惡漢文帝之不發霸陵無求也光武之掘原陵封樹也霸陵之完功在釋之原陵之掘罪在明帝而釋之忠以利君明帝孝以害親也忠臣孝子宜思仲尼邱明釋之之言鑒華元樂莒明帝之戒存其所以安君定親使魂靈萬載無危斯則賢聖之忠孝矣自古及今未有不亡之國亦無不掘之墓也喪亂以來漢氏諸陵無不發掘至乃燒取玉匣金縷骸骨并盡是焚如之刑也豈不重痛哉禍由乎厚葬封樹桑霍為我戒不亦明乎其皇后及貴人以下不隨王之國者有終沒皆葬澗西前又以表其處矣蓋舜葬蒼梧二妃不從延陵葬子逺在羸博魂而有靈無不之也一澗之間不足為逺若違今詔妄有所變改造施吾為戮尸地下戮而重戮死而重死臣子為蔑死君父不忠不孝使死者有靈將不福汝其以此詔藏之宗廟副在尚書祕書三省按魏武父子遺令俱欲薄葬世傳曹公疑冢七十有餘其防患至矣秦始皇髙齊神武俱厚葬且殺匠徒以滅口然易代之後不免發掘三人俱英雄而末著識逹則曹為優云始武帝葬髙陵有司依漢立陵上祭殿至黄初三年詔曰先帝躬履節儉遺詔省約子以述父為孝臣以繫事為忠古不墓祭皆設於廟先帝髙平陵上殿皆毁壊車馬還廐衣服藏府以從先帝儉德之志遂革上陵之禮及齊王在位九載始一謁髙平陵七年帝崩葬首陽陵自殯及葬皆以終祭從事五月丁巳崩六月戊寅葬明帝將送葬曹眞陳羣王朗等以暑熱固諫乃止孫盛曰夫窀穸之事孝子之極痛也人倫之道於斯為重故天子七月而葬同軌畢至夫以義感之情猶盡臨隧之哀况乎天性發中敦禮者重之哉魏氏之德仍世不基矣昔華元厚葬君子以謂棄君於惡羣等之諫棄孰甚焉明帝景初二年帝崩葬髙平陵正月丁亥崩二月癸丑葬帝崩殯於九龍殿尚書訪曰當以明皇帝諡告四祖祝文於髙皇稱元孫之子云何王肅曰禮稱曾孫某謂國家也荀爽鄭元說皆云天子諸侯事曾祖已上皆稱曾孫又訪按漢既葬容衣還儒者以為宜如文皇帝故事以存時所服王肅曰禮雖無容衣之制今須容衣還而後虞祭宜依尸服卒者上服之制生時䙝服可隨所存至於制度則不如禮孔子曰祭之以禮亦為此也諸侯之上服則命服也天子不為命服然亦所以命服之上也按漢氏西京故事月游衣冠則容衣也言冠以正服不以䙝衣也尚書又訪容衣還羣臣故當在帳中常塡衛見王肅曰禮不墓祭而漢氏正月上陵神座在西序東向百辟計吏前告郡之榖價人之疾苦欲先帝魂靈聞知時蔡邕以為禮有煩而不可去事亡如存况今無塡衞之禁而合於如事存之義可見於門内拜訖入帳臨乃除服晉武帝泰始二年八月詔曰此上旬先帝棄天下之日便已周年思慕煩毒欲詣陵瞻侍以盡哀憤主者具行備安平王孚尚書令裴秀等奏陛下至孝縗麻雖除哀毁蔬食有損神和秋節尚有餘暑謁見山陵悲感摧傷宜降抑聖情以慰萬國帝曰朕得奉瞻山陵以敘哀憤體氣自佳耳又曰今當見山陵何心無服其以縗絰行詳見國恤門晉宣王遺令子弟羣官皆不得謁陵景文遵㫖武帝猶再謁崇陽陵景帝陵一謁峻平陵文帝陵然遂不敢謁髙原陵宣帝陵至惠帝復止也晉尚書問按禮天子七月葬新議曰禮無吉駕象生之斾四海遏密八音豈有釋其縗絰以服元黄黼黻哉雖於神明哀素之心已不稱矣輙除鼓吹吉駕鹵簿孫毓駮尚書顧命成王新崩傳遺命文物權用吉禮又禮卜家占宅朝服推此無不吉服也又巾車斾遣車及葬執蓋從方相元衣裳此鹵簿所從出也今之吉駕亦象生之義凶服可除鼓吹吉服可設而不作摯虞曰按漢魏故事將葬設吉凶鹵簿皆有鼓吹新禮無吉駕導從之文愚按禮葬有祥車曠左則今之容車也春秋鄭大夫公孫蠆卒天子追賜大輅使以行禮又士喪禮有道車乘車以象生存此兼有吉駕明文既有吉駕則宜有導從宜定新禮設吉服導從其凶服鼓吹宜除銘旌建太常畫日月星辰杜云九仞旒委地杜元凱喪服要集云遣車易以轝牀舉奠祭之具及器藏物皆覆以白練漢魏故事大喪及大臣之喪執紼者輓歌新禮以為輓歌出於漢武帝役人之勞歌聲哀切遂以為送終之禮雖音曲摧愴非經典所制違禮設銜枚義方在號慕不宜以歌為名除不輓歌摯虞以為輓歌因倡和而為摧愴之聲銜枚所以全哀此亦以感衆雖非經典所載是歴代故事詩稱君子作歌惟以告哀以歌為名亦無所嫌宜定新禮如舊詔從之武帝崩葬峻陽陵四月己酉崩五月辛未葬惠帝崩葬太陽陵十一月庚午崩十二月己酉葬元帝崩葬建平陵明帝徒跣至於陵所永昌元年閏十一月己丑崩次年二月葬係太寧元年元帝崩後諸公始有謁陵辭陵之事蓋由義同友執率情而舉也成帝時中宫亦年年拜陵議者以為非禮遂止穆帝時禇太后臨朝又拜陵帝時㓜也孝武崩驃騎將軍會稽王導子曰今雖制釋服至於朔日月半諸節自應展情陵所以一周為斷於是至陵變服單衣煩瀆無准非禮也及安帝元興元年左僕射桓謙奏百僚拜陵起於中興非晉舊典積習生常遂為近法尋武帝詔乃不使人主諸王拜陵及義熙初又復江左之舊自漢魏以來羣臣不拜山陵王導以元帝睠同布衣匪惟君臣而已每一崇進皆就拜不勝哀戚由此詔百官拜陵自導始明帝崩葬武平陵七月戊子崩九月辛丑葬成帝咸康七年皇后杜氏崩有司奏大行皇后陵所作凶門栢歴門號明陽端門詔曰門如所處凶門栢歴大為繁費停之按蔡謨說以二瓦器始死之際繫於木裹以葦席置庭中近南門為重今之凶門是其象也禮記虞而作主今未葬未有主故以重當之禮稱為主道此其義也范堅又曰凶門非禮禮有懸重形似凶門後人出門以表喪俗遂行之簿帳即古弔幕之類也是時又詔曰重壤之下豈宜崇飾陵中惟潔掃而已有司又奏依舊選公卿以下六品子弟六十人為輓郎詔又停之成帝崩葬興平陵六月癸巳崩七月丙辰葬康帝徒行送葬至閶闔門乃升素輿至陵所康帝崩葬崇平陵九月戊戌崩十月乙丑葬穆帝永和八年峻平崇陽二陵崩景帝文帝陵帝臨三日遣殿中都尉王惠如洛陽以衛五陵穆帝崩葬永平陵五月丁巳崩七月戊午葬哀帝崩葬安平陵二月丙辰崩三月壬申葬簡文帝崩葬髙平陵七月己未崩十月丁卯葬孝武帝崩葬隆平陵九月庚申崩十月甲申葬安帝義熙十二年劉裕北伐秦將姚光以洛陽降兼司空髙密王恢之修謁五陵安帝崩葬休平陵十二月戊寅崩正月庚申葬恭帝崩葬冲平陵宋崔元凱喪儀云銘旌今之旐也天子丈二尺皆施跗樹於壙中遣車九乘謂結草為馬以泥為車疏布四面有障置壙四角以載遣奠牢肉斬取骨脛車各一枚武帝崩葬丹陽建康縣蔣山初寧陵五月癸亥崩七月己酉葬武帝母孝懿蕭皇后崩遺令漢世帝后陵皆異處今可於塋域之外别為一壙一遵徃式乃開别壙與興寧合墳初武帝微時貧約過甚孝皇之殂葬禮多闕帝遺㫖太后百嵗後不須祔葬至今故稱后遺令云文帝每歲正月謁初寧陵孝武明帝亦每歲拜初寧長寧陵文帝崩葬長寧陵二月甲子崩三月癸巳葬孝武帝崩葬丹陽秣陵縣巖山景寧陵五月庚申崩七月丙午葬明帝崩葬臨沙縣莫府山髙寧陵正月己亥崩七月戊寅葬齊髙帝崩梓宫於東府前渚升龍舟葬於武進泰安陵於升龍舟卒哭内外反吉三月壬戌崩四月丙午葬武帝崩葬景安陵七月戊寅崩八月丙寅葬明帝崩葬興安陵梁武帝崩葬脩陵五月丙辰崩十二月乙卯葬簡文帝崩葬莊陵十月壬寅崩次年侯景平以四月乙丑日葬陳永定三年七月武帝崩尚書左丞庾特云晉宋以來皇帝大行儀注未祖一日告南郊太廟奏䇿奉諡梓宫將登輼輬侍中版奏已稱某諡皇帝遣奠出於階下方以此時乃讀哀䇿而前代䇿文猶稱大行皇帝請明加詳正國子博士知禮儀沈文阿等謂應劭風俗通前帝諡未定臣子稱大行以别嗣主近檢梁儀自梓宫將登輼輬版奏皆某諡皇帝登輼輬伏㝷今祖祭以奉䇿諡哀䇿既在庭遣祭不應猶稱大行且哀䇿篆書藏於元宫請依梁儀以傳無窮詔可武帝崩六日成服時朝臣共議大行皇帝靈座俠御人衣服吉凶之制博士沈文阿議宜服吉劉師知議云既稱成服本備喪禮按梁昭明太子薨成服俠侍之官悉著縗斬唯著鎧不異此即可擬愚謂六日成服俠靈座須服縗絰中書舍人蔡景歴江徳藻謝岐等同師知議時以二議不同乃啓取左丞徐陵決斷陵云鹵簿吉簿伍中公卿以下導引者爰及武賁鼓吹執蓋奉車並是吉服豈容俠御獨為縗絰若言公卿胥吏並服縗絰此與梓宫部伍有何差别若言文物並吉司事者凶豈容杖絰而奉華蓋縗衣而升玉輅邪同博士議謝岐議曰靈筵祔宗廟梓官還山陵實如左丞議但山陵鹵簿備有吉凶從靈輿者儀服無變從梓宫者皆服苴縗爰至士禮悉同此置此自是山陵之儀非關成服今謂梓宫靈扆共在西階稱為成服亦無鹵簿直是爰自胥吏上至王公四海之内必備縗絰按梁昭明太子薨畧是成例豈容凡百士庶悉此日服重而侍中至於武衛最是近官反鳴玉紆青與吉不異左丞既推以山陵事愚意或謂與成服有殊衆議不能決乃具録二議奏聞上從師知議武帝崩葬萬安陵六月丙午崩八月丙申葬文帝崩葬永寧陵四月癸酉崩六月丙寅葬宣帝崩葬顯寧陵正月甲寅崩二月癸巳葬後魏道武帝崩葬盛樂金陵天賜六年十月戊辰崩永興二年七月甲寅葬明元帝崩葬雲中金陵十一月己巳崩十二月庚子葬太武帝崩葬雲中金陵文成帝崩葬雲中金陵五月崩八月葬獻文帝崩葬雲中金陵孝文太和十四年太皇太后馮氏崩帝哀毁過禮諸王公詣闕上表請時定兆域及依漢魏故事幷太皇太后終制既葬公除詔曰自遭禍罰慌惚如昨奉侍梓宫猶希髣髴山陵遷厝所未忍聞王公復上表固請詔曰山陵可依典冊喪服之宜情所未忍帝欲親至陵所詔諸常從之具悉可停之其武衛之官防侍如法葬太后於永固陵帝謁陵王公固請公除不從按古者天子之喪七月而葬左傳以為同軌至荀卿子曰天子之喪動四海屬諸侯又曰天子七月諸侯五月大夫士三月皆使其須足容事事足容成成足容文文足容備曲容備物之謂道矣須待也謂所待之期也事喪具也道者委曲容物備物者也蓋以萬乘之尊四海之廣喪期至於三年則必備物盡禮以致其孝勿之有悔焉耳此古孝子之心也秦漢以來習為短喪之制例以既葬釋服於是惟恐葬期之不促自兩漢至六朝人主之喪大行在殯少有及兩月者是天子而不克行大夫士之禮也魏孝文力行古道獨為三年之喪而其臣狃於歴代之制固請釋服欲釋重服則必先促葬期而帝答詔曰侍奉梓宫猶希彷彿山陵遷厝所未忍聞固請而始葬既葬而終不釋服賢矣哉孝文帝崩葬長陵四月丙午崩五月丙申葬初帝孝於文明太后乃於永固陵東北里餘營壽宫遂有終焉瞻望之志及遷洛陽乃自表瀍西以為山陵之所而方山虛宫號曰萬年堂云方山即永固陵宣武帝崩葬景陵正月丁巳崩二月甲午葬孝明帝崩葬定陵二月癸丑崩三月乙酉葬齊神武帝葬於鄴西北漳水之西號義平陵齊世子澄虛葬神武於漳水之西潛鑿成安鼓山石窟佛頂之旁為穴納其柩而塞之殺其羣匠及齊之亡也一匠之子知之發石取金而逃文宣帝崩葬武寧陵十月甲午崩次年二月丙申崩孝昭帝崩葬文静陵武成帝崩葬永平陵十二月辛未崩次年二月甲申𦵏周文帝崩葬成陵孝閔帝崩葬靜陵明帝崩葬昭陵四月辛丑崩五月辛未葬武帝崩葬孝陵六月丁酉崩七月己未葬宣帝崩葬定陵五月己酉崩七月丙申葬隋文帝崩葬太陵與獨孤后同墳異穴士庶赴葬者皆聽入視陵内七月丁未崩十月乙卯葬煬帝初葬吳公臺下後改葬雷塘唐髙祖崩葬獻陵在京兆府三涼縣界五月六日崩十月庚寅葬貞觀九年髙祖崩詔定山陵制度依漢長陵故事務存崇厚時限既促功役勞弊祕書監虞世南上封事曰臣聞古之聖帝明王所以薄葬者非不欲崇髙光明珍寳異物以厚其親然審而言之髙墳厚壠珍物必備此通為親累非曰孝也是以深思逺慮安於菲薄以為長久萬代之計割其常情以定之耳今為丘壠如此其内雖不藏珍寶亦無益之萬代之後人但見髙墳大冡豈謂無金玉也臣之愚計以為漢文霸陵既因山勢雖不起墳自然髙敞今之所卜地勢即平不可不起宜依白虎通所陳周制為三仞之墳其方中制度事事減少事竟之日刻石於陵側書今封大小髙下之式明器所須皆以瓦木合於禮文一不得用金銀銅鐵使後代子孫並皆遵奉一通藏之宗廟豈不美乎且臣下除服用三十六日已依霸陵今為墳壠又以長陵為法非所依也伏願深覽古今為長久之慮書奏不報虞世南又上疏曰漢家即位之初便營陵墓近者十餘歲逺者十五年方始成就今以數月之間而造數十年事其於人力亦以勞矣漢家大郡五十萬户即日人衆未及徃時而工役與之一等此臣所致疑也又公卿上奏請遵遺詔務從節儉太宗乃令中書侍郎岑文本謂曰朕欲一如遺詔朕臣子之心不忍頓為儉素如欲稱朕崇厚之志復恐百代之後不免有廢毁之憂朕為此不能自決任卿等平章必令得所勿置朕於不孝之地因出虞世南封事付所司詳議以聞司空房元齡等議曰謹按漢髙祖長陵髙九尺光武陵髙六尺漢文魏文並不封不樹因山為陵竊以長陵制度過為宏侈二丈立規又傷矯俗光武中興明主多依典故遵為成式實謂攸宜伏願仰遵故命俯順禮經詔曰朕既為子卿等為臣愛敬罔極義猶一體無容固陳節儉陷朕於不義也今便敬依來議於是山陵制度頗有減省唐凡國陵之制皇祖以上至太祖陵皆朔望上食元日冬至寒食伏臘社冬一祭皇考陵朔望及節祭而日進食又薦新於諸陵其物五十有六品始將進御所司必先以送太常與尚食滋味薦之如宗廟貞觀十三年正月一日太宗朝於獻陵先是日宿設黄麾仗周衞陵寢至是質明七廟子孫及諸侯百寮蕃夷君長皆陪列於司馬門内太宗至小次降輿納履哭於闕門西面再拜慟絶不能興禮畢改服入於寢宫執饌閲視髙祖及先後服御之物匍匐床前悲慟左右侍御莫不欷歔十八年帝謂侍臣曰昔漢家皆先造山陵既逹始終身復親見又省子孫經營不頓費人功古者因山為墳此誠便事九嵕山孤聳逈絶因而旁鑿可置山陵處朕有終焉之理乃詔營山陵於九嵕山之上足容一棺而已務從儉約又佐命功臣義深舟楫追念在昔何日忘之漢氏相將陪陵又給東園祕器篤終之義恩意深厚自今以後功臣密戚及德業佐時者如有薨亡賜塋地一所及賜以祕器使窀穸之時喪事無闕凡功臣密戚請陪陵葬者聽之以文武分為左右而列墳髙四丈已下三丈已上若父祖陪陵子孫從葬者亦如之若宫人陪葬則陵户為之成墳凡諸陵皆置留守領甲士與陵令日知廵警左右兆域内禁人無得塟埋古墳則不毁之獻陵陪葬名氏楚國太妃萬氏館陶公主河間王孝恭襄邑王神符清河王誕韓王元嘉彭王元則道王元慶鄭王元懿虢王元鳳酆王元亨徐王元禮滕王元嬰鄧王元裕魯王元䕫霍王元軌江王元祥密王元曉幷州總管張綸榮國公樊興平原郡公王長楷譚國公邱和巢國公錢九龍刑部尚書劉德威刑部尚書沈叔安十年十一月葬文德皇后長孫氏於昭陵帝為文刻之石稱皇后節儉遺言薄葬以為盗賊之心止求珍貨既無珍貨復何所求朕之本意亦復如此王者以天下為家何必物在陵中乃為己有今因九嵕山為陵鑿石之工纔百餘人數十日而畢不藏金玉人馬器皿皆用土木形具而已庶幾姦盗息心存歿無累當使百世子孫奉以為法上念后不已於苑中作層觀望昭陵嘗引魏徴同登使視之徵熟視曰臣昏眊不能見上指示之徵曰以為陛下望獻陵若昭陵則臣固見之矣上泣為毁觀太宗崩葬昭陵在京兆府醴泉縣因九嵕層峰鑿山南西深七十五尺為元宫山旁巖架梁為棧道懸絶百仞繞山二百三十步始逹元宫門頂上亦起遊殿五月己巳崩八月庚寅葬文德皇后即元宫後有五重石門其門外於䨇棧道上山起舍宫人供養如平常及太宗山陵畢宫人亦依故事留棧道准舊山陵使閻立德奏曰元宫棧道本留擬有今日今既始終永畢與前事不同謹按故事唯有寢宫安神供奉之法而無陵上侍衞之儀望除棧道固同山嶽上嗚咽不許長孫無忌等援引禮經重有表請乃依奏上欲闡揚先帝徽烈乃令