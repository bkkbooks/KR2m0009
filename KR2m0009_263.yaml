body:
  text: 文獻通考卷二百六十三鄱陽馬端臨貴與著封建考四春秋列國傳授本末事跡隨隨姬姓侯爵地在義陽隨縣今隨州桓公六年楚武王侵隨使薳章求成焉薳章楚大夫軍於瑕以待之隨人使少師董成隨大夫董正也鬭伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益鬭伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭詐稱功德以欺鬼神也公曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也謂民力適完則六畜既大而滋皮毛無疥癬兼備無所缺也奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉德而無違心也所謂馨香無讒慝也故務其三時修其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐八年隨少師有寵楚鬭伯比曰可矣讎有釁不可失也夏楚子合諸侯于沈鹿黄隨不㑹使薳章讓黄楚子伐隨軍於漢淮之間季梁請下之勿許而後戰所以怒我而怠冦也少師謂隨侯曰必速戰不然將失楚師隨侯禦之望楚師季梁曰楚人尚左君必左君楚王也無與王遇且攻其右右無良焉必敗偏敗衆乃擕矣少師曰不當王非敵也弗從不從季梁謀戰於速杞隨師敗績隨侯逸鬭丹獲其戎車與其戎右少師秋隨及楚平楚子將不許鬭伯比曰天去其疾矣謂少師見獲而死隨未可克也乃盟而還莊公四年楚武王荆尸授師孑焉以伐隨尸陳也荆亦楚也更為楚兵陣之法子者㦸也楚始於此參用㦸為陣將齊謂授兵於廟入告夫人鄧曼曰余心蕩鄧曼歎曰王禄盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉若師徒無虧王薨於行國之福也王遂行卒於樠木之下令尹鬭祈莫敖屈重除道梁溠營軍臨隨隨人懼行成時祕王喪故為竒兵更開直道溠水在義陽厥縣西東南入鄖水梁橋也隨人不意其至也故懼而行成莫敖以王命入盟隨侯且請為㑹於漢汭而還濟漢而後發喪楚武王即位之三十五年伐隨隨曰我無罪楚曰我蠻夷也今諸侯皆為叛相侵或相殺我有敝甲欲以觀中國之政請王室尊吾號隨人為之周請尊楚王室不聽還報三十七年楚熊通怒曰吾先鬻熊文王之師也早終成王舉我先公乃以子男田令居楚蠻服皆率服而王不加位我自尊耳乃自立為武王與隨人盟而去於是始開濮地而有之五十一年周召隨侯數以立楚為王楚怒以隨背己伐隨武王卒師中而兵罷按此史記楚世家所紀言伐隨王卒而兵罷即左傳所紀莊公四年是也左傳不言楚脇隨請於周而自尊之説今録之以廣異聞僖公二十年隨以漢東諸侯叛楚冬楚鬭榖於莵帥師伐隨取成而還定公五年吳破楚入郢鬭辛與其弟巢以楚王奔隨吳人從之謂徐人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之周室何罪君若惠顧周室施及寡人以奬天衷君之惠也漢陽之田君實有之楚子在公宫之北吳人在其南子期似王昭王兄公子結也逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭吳曰以隨之辟小而密邇於楚楚實存之世有盟誓至於今未改若難而棄之何以事君執事之患不唯一人一人楚王若鳩楚竟敢不聽命鳩集也吳人乃退鑪金初宦於子期氏實與隨人要言要言毋以王與吳并脱子期王使見王喜欲引見之以比王臣辭曰不敢以約為利約為要言也王割子期之心以與隨人盟郯郯嬴姓子爵地在今淮陽軍有古郯城宣公四年魯公及齊侯平莒及郯莒郯二國有宿怨故魯齊共平之莒人不肯魯伐莒取向成公七年吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之恤振整也旅衆也無弔者也夫言不能相愍恤也詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受亂上謂霸主吾亡無日矣君子曰知懼如是斯不亡矣九年晉士爕聘於魯言伐郯也以其事吳故魯賂之使緩師范文子不可曰君命無貳失信不立禮無加貨事無二成公私不兩成君後諸侯是寡君不得事君也􅝂將復之季孫懼使宣伯帥師㑹晉人齊人邾人伐郯襄公七年郯子來朝始朝公也昭公十七年郯子來朝魯公與之宴昭子問焉曰少皥氏鳥名官何也郯子曰吾祖也我知之昔者黄帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皥氏以龍紀故為龍師而龍名我髙祖少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏司歴也元鳥氏司分者也伯趙氏司至者也青鳥氏司啟者也丹鳥氏司閉者也祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也言黄帝以來受命皆有雲火水龍鳯之瑞故就以名官顓頊氏德不能致逺瑞故以民事命官仲尼聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信虞虞姬姓公爵出自太王子仲雍生季簡季簡生叔達叔達生周章虞仲及武王克商求太伯仲雍之後得周章己為吳君别封其弟虞仲於周之北地在故夏墟河東大陽縣今陜州平陸縣有虞城桓公十年初虞叔有玉虞公之弟虞公求旃弗獻既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此其以賈害也乃獻又求其寳劔叔曰是無厭也無厭將及我遂伐虞公故虞公出奔共池僖公二年晉荀息請以屈産之乗與垂棘之璧假道於虞以伐虢公曰是吾寳也對曰若得道於虞猶外府也公曰宫之竒存焉宫之竒虞之忠臣對曰宫之竒之為人也懦而不能强諫且少長於君君暱之雖諫將不聽乃使荀息假道於虞曰冀為不道入自顛軨伐鄍三門前是冀伐虞至鄍鄍虞邑河東大陽縣東北有顛軨坂冀之既病則亦唯君故言虞報伐冀使病將假道故稱虞强以悦其心也今虢為不道保於逆旅以侵敝邑之南鄙敢請假道以請罪於虢虞公許之且請先伐虢喜於厚賂而欲求媚也宫之竒諫不聽遂起師夏晉里克荀息帥師㑹虞師伐虢滅下陽先書虞賄故也五年晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啟寇不可翫一之謂甚其可再乎諺所謂輔車相依唇亡齒寒者其虞虢之謂也公曰晉吾宗也豈害我哉對曰太伯虞仲太王之昭也太伯不從是以不嗣虢仲虢叔王季之穆也虢仲虢叔王季子文王母弟為文王卿士勲在王室藏於盟府將虢是滅何愛於虞且虞能親於桓莊乎其愛之也桓莊之族何罪而以為戮不唯偪乎親以寵偪猶尚害之况以國乎公曰吾享祀豐潔神必據我對曰臣聞之鬼神非人實親惟德是依周書曰皇天無親惟德是輔又曰黍稷非馨明德惟馨又曰民不易物惟德繄物如是則非德民不和神不享矣神所馮依將在德矣若晉取虞而明德以薦馨香神其吐之乎弗聽許晉使宫之竒以其族行曰虞不臘矣在此行也晉不更舉矣八月晉侯圍上陽十二月晉滅虢師還館於虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢於王虞所命祀自太伯作吳五世而武王克殷封其後為二其一虞在中國其一吳在蠻夷十二世而晉滅中國之虞中國之虞滅二世而夷蠻之吳興虢虢姬姓公爵出自王季子虢仲文王弟也仲與虢叔為王卿士勲在王室藏於盟府而文王友愛二弟謂之二虢武王克商封仲於𢎞農陜縣東南之虢城今鳯翔府周室東遷虢公忌父林父俱為天子之相隱公三年鄭武公莊公為王卿士王貳於虢王欲分政於虢不專任鄭伯鄭伯怨王王曰無之故周鄭交質王崩周人將畀虢公政鄭祭足帥師取温之麥秋又取成周之禾周鄭交惡八年虢公忌父始作卿士於周莊公十八年虢公晉侯朝王王饗禮命之侑王之覲羣后始則行饗禮先置醴酒示不忘古飲宴則命以幣物侑助也所以助歡敬之意言備設也皆賜玉五㲄馬三匹非禮也䨇玉為㲄王命諸侯名位不同禮亦異數不以禮假人言侯不當與公同賜也虢公晉侯鄭伯使原莊公逆王后於陳陳媯歸於京師實惠后十九年王子頹作亂衞師燕師伐周立子頹二十年鄭伯和王室不克遂以王歸冬王子頽享五大夫樂及徧舞鄭伯聞之見虢叔曰寡人聞之哀樂失時殃咎必至今王子頹歌舞不倦樂禍也夫司寇行戮君為之不舉而况敢樂禍乎奸王之位禍孰大焉臨禍㤀憂憂必及之盍納王乎虢公曰寡人之願也二十一年胥命於弭同伐王城鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫鄭伯享王於闕西辟王廵虢守虢公為王宫於玤虢地王與之酒泉鄭伯之享王也王以后之鞶鑑予之鞶帶而以鑑為飾也今西方羌胡為然虢公請器王予之爵鄭伯由是始惡於王二十六年秋虢人侵晉冬虢人又侵晉三十年樊皮叛王周大夫王命虢公討樊皮虢公入樊執樊仲皮歸於京師三十二年有神降於莘有神聲以接人莘虢地也惠王問之内史過曰若之何對曰以其物享焉其至之日亦其物也享祭也若以甲乙日至祭先脾玉用蒼服尚青以此類祭之王從之内史過徃聞虢請命虢請於神求賜土田之命反曰虢必亡矣虐而聽於神神居莘六月虢公使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎吾聞之國將興聽於民將亡聽於神神聰明正直而壹者也依人而行唯德是予虢多涼德其何土之能得虢公夢在廟有神人面白毛虎爪執鉞立於西阿西榮也公懼而走神曰無走帝命曰使晉襲於爾門公拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑神也天事官成官成禍福各以官象成也公使囚之且使國人賀夢舟之僑告其族曰衆謂虢不久吾乃今知之君不度而賀大國之襲於己也何瘳吾聞之也大國道小國襲焉曰服小國傲大國襲焉曰誅民疾君之侈也是以遂於逆命今嘉其夢侈必展是天奪其鑒而益其疾也民疾其態天又誑之大國來誅出令而逆宗國既卑諸侯逺已内外無親其誰云救之吾不忍視也將行以其族適晉閔公二年虢公敗犬戎於渭汭舟之僑曰無德而禄殃也殃將至矣僖公二年晉假道于虞以伐虢虞公許之晉里克荀息帥師㑹虞師伐虢滅下陽下陽虢邑虢公敗戎於桑田晉卜偃曰虢必亡矣亡下陽而不懼而又有功是天奪之鑒而益其疾也必易晉而不撫其民矣不可以五稔五年晉復假道於虞以伐虢八月晉侯圍上陽問於卜偃曰吾其濟乎對曰克之公曰何時對曰童謠云丙之晨龍尾伏辰龍尾尾星也日月之會曰辰日在尾故尾星伏不見均服振振取虢之旂戎事上下同服振振盛貎也鶉之賁賁天策焞焞火中成軍虢公其奔焞焞火星也賁賁鳥星之體也天策傅説星時近日星微焞焞無光耀也言丙子平旦鶉火中軍事有成功也已上皆童謠言童齔未有念慮之感而㑹成嬉戲之言似若有鄉者或中或否其九月十月之交乎謂夏之九月十月也丙子旦日在尾月在策是夜日月合朔於尾月行疾故至旦而過在策鶉火中必是時也冬十二月晉滅虢虢公醜奔京師紀紀姜姓侯爵地在東莞劇縣今臨胊縣東壽光縣西周夷王時紀侯譖齊哀公於周周烹哀公隱公元年紀人伐夷夷國在城陽莊武縣二年紀裂繻逆女于魯紀大夫冬魯伯姬歸于紀紀子帛莒子盟于密桓公五年齊侯鄭伯朝于紀欲以襲之紀人知之六年魯㑹紀侯于成紀來諮謀齊難也冬紀侯來朝魯請王命以求成于齊公告不能紀微弱不能自通于天子欲因公以請王命公無寵於王故告不能莊公元年齊師遷紀郱鄑郚齊欲滅紀故徙其三邑之民而取其地三年紀季以入于齊紀於是乎始判季紀侯弟紀邑判分也分為附庸始此魯公次于滑將㑹鄭伯謀紀故也鄭伯辭以難四年紀侯不能下齊以與紀季盡以國與季夏紀侯大去其國違齊難也公羊傳大去者何滅之孰滅之齊滅之曷為不言齊滅之為襄公諱故也春秋為賢者諱何賢乎襄公復讎也何讎爾逺祖也哀公烹乎周紀侯譖之以襄公之為於此焉者事祖禰之心盡矣逺祖者幾世乎九世矣九世猶可以復讎乎雖百世可也邢邢姬姓侯爵地在廣平襄國縣隋改曰龍岡今邢州隱公五年曲沃莊伯以鄭人邢人伐翼閔公元年狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親暱不可棄也宴安酖毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢僖公元年齊師及諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉夏邢遷于夷儀諸侯城之十八年邢人狄人伐衞圍莵圃衞侯以國讓父兄子弟及朝衆曰茍能治之燬請從焉衆不可而後師於訾婁狄師還狄還邢獨留拒衞十九年衞人伐邢以報莵圃之役於是衞大旱卜有事於山川不吉寗莊子曰昔周饑克殷而年豐今邢方無道諸侯無伯天其或者欲使衞討邢乎從之師興而雨二十年齊狄盟于邢為邢謀衞難也於是衞方病邢二十四年衞人將伐邢禮至曰不得其守國不可得也禮至衞大夫守謂邢正卿國子我請昆弟仕焉乃徃得仕二十五年春衞人伐邢二禮從國子廵城掖以赴外殺之正月丙午滅邢禮至為銘曰余掖殺國子莫余敢止惡其不知耻詐以滅同姓而反銘功芮芮姬姓伯爵國在馮翊臨晉縣芮鄉今陜州芮城縣武王時巢伯來朝芮伯作旅巢命成王時芮伯為司徒與太保彤伯畢公衞侯毛公同受顧命立康王厲王説榮夷公芮良夫曰良夫即芮伯王室其將卑乎夫榮夷公好專利而不知大難夫利百物之所生也天地之所載也而或專之其害多矣天地百物皆將取焉胡可專也所怒甚多而不備大難以是教王王能乆乎又作桑柔之詩以刺王桓公三年芮伯萬之母惡芮伯之多寵人也故逐之出居於魏四年秋秦師侵芮敗焉小之也冬王師秦師圍魏執芮伯以歸秦為芮所敗故伐魏執芮伯將納之九年秋虢仲芮伯梁伯荀侯賈伯伐曲沃十年秋秦人納芮伯萬於芮申申姜姓侯爵其先神農之後為唐虞四岳受封於申國在南陽宛縣今信陽軍宣王時入為王卿士出為南方侯伯尹吉甫作崧髙之詩以美其事幽王娶申女為后生太子宜臼後寵褒姒廢申后及太子申侯怒與繒繒姒姓之國西夷犬戎攻殺幽王驪山下虜褒姒盡取周賂以去諸侯乃即申侯共立故幽王太子宜臼為平王東遷洛邑平王遣兵戍申周人怨思作揚之水之詩以刺之魯莊公六年楚武王伐申過鄧十八年楚文王與巴人伐申而驚其師申後為楚所滅楚滅申春秋無明文然僖公二十五年楚以申息之師伐商密其時息已亡則所謂申息皆楚邑也申滅於楚可知二十八年楚師敗於城濮楚子使謂子玉曰大夫若入其若申息之老何亦一證按申伯為蕃翰於宣王之時及幽王廢申后而申侯召犬戎伐周弑王然則以世考之召戎弑君之申侯即為蕃翰者之子也平王東遷王室微弱而方且遣兵戍申以召譏刺蓋申侯忘父之忠而召犬戎以禍王室平王復忘父之讎而勤兵師以戌母家皆非善繼志之孝子也鄫鄫姒姓子爵夏后氏之後地在瑯琊鄫縣今襄邑縣東南幽王末申侯與鄫人召西夷犬戎攻王殺王驪山下僖公十四年鄫季姬來寧于魯季姬魯女鄫夫人公怒止之以鄫子之不朝也夏遇于防而使來朝十六年齊㑹諸侯于淮謀鄫且東畧也鄫為淮夷所病故城鄫役人病有夜登邱而呼曰齊有亂不果城而還十九年宋襄公使邾文公用鄫子於次睢之社欲以屬東夷睢水受汴東經陳留梁譙沛彭城縣入泗此水次有妖神東夷皆社祠之用人以祭宣公十八年邾人戕鄫子于鄫自虐其君曰弑自外曰戕襄公四年公如晉聽政晉侯享公公請屬鄫鄫小國欲得使屬魯如須句顓臾之比使助魯出貢賦也晉侯不許孟獻子曰以寡君之密邇於仇讎而願固事君無失官命晉官徵發之命也鄫無賦於司馬晉司馬掌諸侯賦為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉晉侯許之冬十月邾人莒人伐鄫魯臧紇救鄫侵邾敗于狐駘五年魯穆叔覿太子於晉以成屬鄫書曰叔孫豹鄫太子巫如晉言比諸魯大夫也九月穆叔以屬鄫為不利使鄫大夫聽命於㑹鄫近魯境故欲以為屬國既而與莒有忿魯不能救恐致譴責故復乞還之六年莒人滅鄫鄫恃賂也晉人以鄫故討魯曰何敢亡鄫季武子如晉見且聽命八年莒人伐魯東鄙以疆鄫田莒既滅鄫魯侵其西界故伐魯東鄙以正其封也昭公四年九月取鄫言易也莒亂著邱公立而不撫鄫鄫叛而來故曰取凡克邑不用師徒曰取右以上言鄫亡事本左氏傳如公羊榖梁二家於襄公四年所書莒人滅鄫則以為莒女為鄫夫人而無子有女還嫁之於莒有外孫遂取以為鄫太子而立之蓋莒未嘗取鄫之地鄫未嘗滅特以外姓主國祀故以滅書而鄫之亡在昭公四年蓋魯滅之非莒也上距春秋所書莒人滅鄫凡二十九年郕郕姬姓伯爵地在東平剛父縣西南有郕鄉隱公五年衞之亂也郕人侵衞故衞師入郕十年齊人鄭人入郕討違王命也莊公八年魯師齊師圍郕郕降於齊師仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由夏書曰臯陶邁種德德乃降姑務修德以待時乎秋師還文公十一年郕太子朱儒自安于夫鍾郕邑國人弗徇弗順也十二年郕伯卒郕人立君太子以夫鍾與郕邽來奔公以諸侯逆之非禮也故書曰郕伯來奔巴巴姬姓子爵地在巴郡江州縣今渝州江津桓公九年巴子使韓服告於楚請與鄧為好楚子使道朔楚大夫將巴客以聘於鄧鄧南鄙鄾人攻而奪之幣殺道朔及巴行人楚子使薳章讓於鄧鄧人弗受言非鄾人所攻夏楚使鬭亷及巴師圍鄾鄧養甥帥師救鄾三逐巴師不克鬭亷衡陳其師於巴師之中以戰而北偽北走也鄧人逐之背巴師而夾攻之鄧師大敗鄾人宵潰荘公十八年楚文王即位與巴人伐申而驚其師巴人畔楚而伐那處取之遂門於楚閻敖楚大夫游涌而逸楚子殺之其族為亂巴人因之以伐楚楚子禦之大敗於津文公十六年楚大饑戎伐之庸人帥羣蠻叛楚楚子伐庸秦人巴人從楚師遂滅庸哀公十八年巴人伐楚圍鄾楚邑初右司馬子國之卜也觀瞻曰如志子國未為令尹時卜為右司馬得吉兆如其志觀瞻楚開卜大夫觀從之後也故命之命以為右司馬及巴師至將卜帥王曰寧如志何卜焉寜子國也使帥師而行請承承佐王曰寢尹工尹勤先君者也柏舉之役寢尹吳由于以背受戈工尹固執燧象奔吳師三月楚公孫寧吳由于薳固敗巴師於鄾故封子國於析君子曰惠王知志江江姓爵未詳國在汝南安陽縣今信陽縣之東南新息縣之西僖公二年齊侯宋公江人黄人盟于貫服江黄也江黄楚與國始來服齊不召而至三年及齊宋㑹于陽榖四年及齊侯及諸侯之師侵蔡蔡潰遂伐楚盟于召陵文公三年楚師圍江晉先僕伐楚以救江冬晉以江故告於周欲假天子之威以伐楚王叔桓公晉陽處父伐楚以救江門於方城遇息公子朱而還子朱楚大夫伐江之帥也聞晉師起而江兵觧故晉亦還四年楚人滅江秦伯為之降服出次不舉過數降服素服也出次辟正寢不舉去盛饌鄰國之禮有數今秦伯過之大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也秦江同盟不見於春秋不告故不書黄黄嬴姓爵未詳國在光州定城有黄故城又云登州黄縣桓公八年楚子合諸侯于沈鹿楚地黄隨不㑹使薳章讓黄莊公十九年楚子禦巴師大敗于津還鬻拳弗納遂伐黄敗黄師於踖陵黄地僖公二年齊宋江黄盟于貫始服齊也三年及齊宋㑹於陽榖四年齊會諸侯及江黄伐陳十一年黄人不歸楚貢楚人伐黄黄恃齊故十二年黄人恃諸侯之睦於齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黄息息姬姓侯爵國在汝南今蔡州新息縣隱公十一年鄭息有違言以言語相違恨息侯伐鄭鄭伯與戰於竟息師大敗而還君子是以知息之將亡也不度德不量力不親親不徵辭不察有罪言語相恨當明徵其辭以審曲直不宜轉鬭犯五不韙而以伐人其喪師也不亦宜乎十年蔡哀侯娶於陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賓不禮敬也息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之九月楚敗蔡師於莘以蔡侯獻舞歸十四年蔡哀侯為莘故繩息媯以語楚子繩譽也楚子如息以食入享遂滅息以息媯歸鄧鄧曼姓侯爵國在河南新野今潁川陵縣桓公七年鄧侯吾離朝于魯九年巴子使韓服告於楚請與鄧為好楚子使道朔將巴客聘於鄧鄧南鄙鄾人攻而奪之幣殺道朔及巴行人楚子使薳章讓鄧鄧人弗受夏楚及巴師圍鄾鄧師大敗莊公六年楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥皆鄧甥仕於舅氏者請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬臍其及圖之乎圖之此為時矣鄧侯曰人將不食吾餘對曰若不從三臣之言抑社稷實不血食而君焉取餘弗從還明年楚子伐鄧十六年楚復伐鄧滅之梁梁嬴姓伯爵國在馮翊夏陽縣今同州桓公九年虢仲芮伯梁伯荀侯賈伯伐曲沃僖公六年晉侯使賈華伐屈夷吾不能守盟而行將奔狄郤芮曰後出同走罪也不如之梁梁近秦而幸焉乃之梁以梁為秦所親幸秦既大國且穆姬在焉欲因以求入十八年梁伯益其國而不能實也多築城邑而無民以實之命曰新里秦取之十九年遂城而居之冬梁亡不書其主自取之也初梁伯好土功亟城而不處民罷而弗堪則曰某寇將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁滑滑姬姓伯爵國在河南緱氏縣僖公二十年滑人叛鄭而服於衞鄭公子士洩堵寇帥師入滑二十四年鄭之入滑也滑人聽命師還又即衞鄭公子士洩堵俞彌帥師伐滑王使伯服游孫伯如鄭請滑鄭伯怨王之與衞滑乃不聽王命而執二子二十二年秦師襲鄭及滑鄭商人弦髙以乘韋先牛十二犒師孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還鄀鄀元姓爵未詳國本在商密秦楚界上小國其後遷於南郡鄀縣僖公二十五年秦晉伐鄀楚鬭克屈禦寇以申息之師戍商密即鄀别邑秦人過析隈入而係輿人以圍商密昏而傅焉析楚邑隈隱蔽之處係縳輿人詐為克析得其囚俘者昏而傅城不欲令商密知囚非析人宵坎血加書偽與子儀子邊盟者商密人懼曰秦取析矣戍人反矣乃降秦師秦師囚申公子儀息公子邊以歸即鬭克屈禦寇文公五年初鄀叛楚即秦又貳於楚夏秦人入鄀頓頓姬姓子爵國在汝隂今陳州南頓縣僖公二十五年秦晉伐鄀楚令尹子玉追秦師弗及遂圍陳納頓子於頓頓廹於陳而出奔楚故楚圍陳納頓子襄公四年楚人使頓間陳而侵伐之故陳人圍頓定公十四年頓子牂欲事晉背楚而絶陳好楚公子結陳公孫佗帥師滅頓胡沈胡姬姓子爵國在汝隂縣西北胡城今潁川西沈姒姓子爵國在汝南平輿縣今蔡州汝陽縣東文公三年晉率諸侯之師伐沈以其服於楚也沈潰成公八年晉欒書侵蔡遂侵楚楚師之還也謂六年與晉遇繞角時晉侵沈獲沈子嘉襄公二十八年胡子沈子朝于晉宋之盟故也胡沈楚屬宋之盟曰晉楚之從交相見故朝晉昭公二十三年吳伐州來楚以諸侯之師救州來吳公子光曰諸侯之從於楚者衆而皆小國胡沈之君㓜而狂陳大夫齧壯而頑頓與許蔡疾楚政七國同役而不同心乃分師以先犯胡沈及陳三國敗獲胡子髠沈子逞及陳夏齧舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔楚師大奔定公四年晉㑹諸侯于召陵沈人不㑹晉人使蔡伐之蔡公孫姓帥師滅沈以沈子嘉歸殺之麇麇姓嬴子爵國近楚在今均州鄖鄉文公十年楚子陳侯鄭伯蔡侯次于厥貉將伐宋麇子逃歸十一年楚子伐麇成大心敗麇師於防渚潘崇復伐麇至于鍚穴皆麇地十六年楚大饑麇人率百濮聚於選將伐楚選楚地百濮夷也蒍賈曰麇與百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷濮夷無屯聚見難則散歸萊萊姓未詳子爵國在東萊黄縣宣公七年魯公㑹齊侯伐萊九年齊侯伐萊襄公二年齊侯伐萊萊人使正輿子賂夙沙衞以索馬牛皆百匹夙沙衞齊寺人索揀好者齊師乃還齊侯使諸姜宗婦來魯送齊姜葬召萊子萊子不㑹故晏弱城東陽以偪之東陽齊境上六年齊侯滅萊萊恃謀也恃賂夙沙衞唐唐姬姓侯爵屬楚之小國地在義陽安昌縣東南今隨州唐城縣宣公十二年楚子圍鄭晉師救鄭楚子使唐狡與蔡鳩居告唐惠侯曰不榖不德而貪以遇大敵不榖之罪也然楚不克君之羞也敢藉君靈以濟楚師使潘黨率游闕四十乘從唐侯以為左拒以從上軍乃敗晉師於邲定公三年唐成公如楚有肅爽馬楚令尹子常欲之弗與亦三年止之肅爽駿馬名唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗竊馬者自拘曰君以弄馬之故隱君身隱憂也棄國家羣臣請相夫人以償馬必如之相助也夫人謂養馬者唐侯曰寡人之過也二三子毋辱皆賞之四年冬蔡侯吳子唐侯伐楚五戰入郢楚子奔隨申包胥如秦乞師五年秦子蒲子虎帥師救楚大敗吳師遂滅唐舒羣舒巢舒偃姓子爵國在廬江舒縣舒鳩偃姓子爵舒之别封廬江南有舒城東夷也舒庸姓爵俱失其國亦在廬江巢姓爵俱失國在廬江六縣東舒巢皆楚屬國文公十二年楚成嘉為令尹羣舒叛楚夏子孔執舒子平及宗子遂圍巢子孔即成嘉平舒君名宗巢二國羣舒之屬十四年楚莊王立子孔潘崇將襲羣舒使公子爕與子儀守而伐舒蓼即羣舒二子作亂城郢而使賊殺子孔不克而還八月二子以楚子出將如商密廬戢黎及叔麇誘之遂殺鬭克及公子爕廬楚地戢黎廬大夫鬭克即子儀也宣公八年楚為衆舒叛故伐舒蓼滅之二國名楚子疆之正其界也及滑芮盟吳越而還成公七年楚申公巫臣奔晉使於吳教之叛楚吳始伐楚伐巢伐徐成公十八年舒庸人以楚師之敗也敗於鄢陵道吳人圍巢伐駕圍釐虺巢駕釐虺楚四邑遂恃吳而不設備楚公子槖師襲舒庸滅之襄公二十四年吳人為楚舟師之役故此年夏楚為舟師以伐吳召舒鳩人舒鳩人叛楚楚子師於荒浦舒鳩地使沈尹夀與祁犁讓之二人楚大夫舒鳩人敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不貳吾又何求若猶叛我無辭有庸乃還二十五年舒鳩人卒叛楚令尹子木伐之及離城舒鳩城吳人救之子木遽以右師先先至舒鳩子强息桓子㨗子駢子盂帥左師以退五人不及子木與吳相遇而退吳人居其間七日子强曰乆將墊隘慮水雨隘乃禽也不如速戰請以私卒誘之簡師陳以待我簡閲精兵駐後為陳我克則進奔則亦視之視其形勢而救助之乃可以免不然必禽從之大敗吳師遂圍舒鳩舒鳩潰八月楚滅舒鳩戴戴姓爵俱未詳國在陳留外黄縣今開封封邱縣隱公十年宋人衞人入鄭蔡人從之伐戴八月鄭伯圍戴克之取三師焉三國之軍在戴故鄭合圍之宋衞既入鄭而以伐戴召蔡人蔡人怒故不和而敗南燕南燕姞姓伯爵國在東郡燕縣今滑州胙城隱公五年鄭人侵衞牧牧衞地以報東門之役衞人以燕師伐鄭鄭祭足原繁洩駕以三軍軍其前使曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人北制鄭邑六月鄭二公子以制人敗燕師于北制莊公二十年衞師燕師伐周納王子頹宿宿風姓男爵國在東平無鹽縣今鄆州須城東隱公八年宿男卒莊公七年宋人遷宿宋强遷之而取其地文異於邢遷州州姜姓公爵國在濟隂定陶縣今京南府桓公五年州公如曹度其國危遂不復六年自曹來朝書曰實來不復其國也榖榖嬴姓伯爵國在南陽筑鄉縣今襄陽榖城桓公八年榖伯綏來朝于魯荀賈荀姬姓侯爵國在絳州荀城又云漢栒邑賈姬姓伯爵國在同州蒲城縣桓公九年虢仲芮伯梁伯荀侯賈伯伐曲沃遂遂姓爵俱未詳國在濟北蛇邱縣今濟州鉅野莊公十三年齊侯㑹諸侯于北杏以平宋亂宋萬殺閔公遂人不至夏齊侯滅遂而戌之十七年遂因氏頜氏工婁氏須遂氏四族遂之强宗也饗齊戍醉而殺之齊人殱焉貳軫鄖絞州蓼貳軫鄖絞州爵姓俱未詳蓼偃姓臯陶之後爵未詳貳軫絞地缺鄖國在江夏雲杜縣東南今安州州在南郡華容縣東南蓼在義陽棘陽縣東南湖陽城今夀州霍邱縣桓公十一年楚屈瑕將盟貳軫鄖人軍於蒲騷即鄖邑將與隨絞州蓼伐楚師莫敖患之鬭亷曰鄖人軍其郊必不誡且日虞四邑之至也四邑隨絞州蓼君次於郊郢以禦四邑郊郢楚地我以鋭師宵加於鄖鄖有虞心而恃其城莫有鬭心若敗鄖師四邑必離從之遂敗鄖師於蒲騷卒盟而還十二年楚伐絞軍其南門莫敖屈瑕曰絞小而輕輕則寡謀請無扞采樵者以誘之扞衞也從之絞人獲三十人明日絞人爭出驅楚役徒於山中楚人坐其北門而覆諸山下大敗之為城下之盟而還羅羅熊姓爵未詳國在南郡枝江縣今襄陽宜城桓公十二年楚伐絞師分涉於彭彭水在新城昌魏縣羅人欲伐之使伯嘉諜之三廵數之伯嘉羅大夫諜伺也廵徧也十三年楚屈瑕伐羅鬭伯比送之還謂其禦曰莫敖必敗舉趾髙心不固矣遂見楚子曰必濟師難言將敗故只請益師楚子辭焉不觧其㫖故拒之入告夫人鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君若不鎮撫其不設備乎夫故謂君訓衆而好鎮撫之召諸司而勸之以令德見莫敖而告諸天之不假易也不然夫豈不知楚師之盡行也楚子使頼人追之不及莫敖使徇於師曰諫者有刑及鄢亂次以濟遂無次且不設備及羅羅與盧戎兩軍之盧戎南蠻大敗之譚譚姓未詳子爵國在濟南平陵縣今齊州歴城莊公十年齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至冬齊師滅譚譚子奔莒弦道栢弦子爵姓未詳道栢姓爵俱未詳弦國在弋陽軑縣今光州仙居北道國在汝南安陽縣南今蔡州確山有故道城柏國在汝南西平縣栢亭今蔡州西平縣僖公五年楚鬭榖於莵滅弦弦子奔黄於是江黄道栢方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡權權姓爵俱未詳國在南郡當陽縣今荆門軍莊公十八年楚武王克權使鬭緍尹之以叛圍而殺之遷權於那處楚地使閻敖尹之及文王即位與巴人伐申而驚其師巴人叛楚而伐那處取之遂門於楚攻楚城門閻敖游涌而逸涌水在南郡華容縣楚子殺之其族為亂冬巴人因之以伐楚十九年楚子禦之大敗于津須句須句風姓子爵國在東平須昌縣東北今鄆州須城僖公二十一年任宿須句顓臾風姓也實司太皥與有濟之祀太皥伏羲四國伏羲之後故主其祀任今任城縣顓臾在泰山南武陽縣東北四國封近於濟故世祀之以服事諸夏與諸夏同服王事邾人滅須句須句子奔魯因成風也成風為之言於公曰崇明祀保小寡周禮也蠻夷猾夏周禍也邾廹近諸戎雜用夷禮若封須句是崇皥濟而修祀紓禍也二十二年伐邾取須句反其君焉禮也文公七年魯伐邾取須句寘文公子焉非禮也須句為邾所滅僖公取其地再封之復為邾所取今魯再取之邾文公之子叛在魯故使為須句大夫䕫䕫芈姓子爵國在建平秭歸縣今歸州僖公二十六年䕫子不祀祝融與鬻熊祝融髙辛之火正楚之逺祖鬻熊祝融之十二世孫也䕫乃為楚之别封故亦世紹其祀也楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄於䕫熊摯楚嫡子有疾不子能嗣位故别封為䕫吾是以失楚又何祀焉廢其常祀而飾詞文過秋楚成得臣鬭宜申帥師滅䕫以䕫子歸庸庸姓爵俱未詳國在上庸縣今房州庸縣文公十六年楚大饑庸人率羣蠻以叛楚楚人謀徙於阪髙蒍賈曰不可我能徃寇亦能徃不如伐庸乃出師使廬戢黎侵庸戢黎盧大夫及庸方城方城庸地庸人逐之囚子揚忩黎官屬三宿而逸曰庸師衆羣蠻聚焉不如復大師還復句澨師起王卒合而後進師叔曰不可楚大夫姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北唯裨鯈魚人實逐之裨鯈魚庸三邑庸人曰楚不足與戰矣遂不設備楚子乗馹㑹師於臨品馹傳車也分為二隊子越自石溪子貝自仭以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸崇崇姓爵俱未詳國在今雍州鄠縣東宣公元年晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成蕭蕭姓爵俱未詳宋附庸國地今徐州蕭縣宣公十二年楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊遂傅於蕭還無社與司馬卯言號申叔展還無社蕭大夫司馬卯申叔展皆楚大夫無社素識叔展故因卯呼之叔展曰有麥麯乎曰無有山鞠窮乎曰無麥麯鞠窮所以禦濕欲使無社逃泥水中無社不觧故曰無軍中不敢正言故繆語河魚腹疾奈何叔展言以無禦濕將病曰目於眢井而拯之無社意觧欲入井故使叔展視廢虛井而求拯也若為茅絰哭井則已叔展又教結茅以表井須哭乃應以為信明日蕭潰申叔視其井則茅絰存焉號而出之傳言蕭人無守心偪陽偪陽妘姓子爵國在彭城偪陽縣今沂州承縣襄公十年晉㑹諸侯於柤荀偃士匄請伐偪陽而封宋向戌焉以宋常事晉而向戌有賢行故欲封之荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克孟氏之臣秦堇父輦重如役步挽重車如師偪陽人啟門諸侯之士門焉見啟門故攻之縣門發鄒人紇抉之以出門者門者諸侯之士在門内者紇鄒邑大夫仲尼父紇多力抉舉縣門出在内者狄虒彌建大車之輪而䝉之以甲以為櫓彌魯人也蒙覆也櫓大盾左執之右㧞㦸以成一隊百人為隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絶之偪陽人縣以試外勇者隊則又縣之蘇而復上者三主人辭焉乃退嘉其勇故辭謝不復縣帯其斷以徇於軍三日帯其斷布以示勇諸侯之師久於偪陽荀偃士匄請於荀罃曰水潦將降懼不能歸請班師知伯怒投之以機出于其間出偃匄之間曰汝成二事而後告余二事伐偪陽封向戌余恐亂命以不女違汝既勤君而興諸侯牽帥老夫以至於此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎不任受如此責七日不克必爾乎取之五月庚寅荀偃士匄帥卒攻偪陽親犯矢石甲午滅之以與向戌向戌辭曰君若辱鎮撫宋國而以偪陽光啟寡君羣臣安矣其何貺如之若專賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃予宋公以偪陽子歸獻於武宫謂之夷俘諱俘中國故謂之夷偪陽妘姓也使周内史選其族納諸霍人禮也霍晉邑内史掌爵禄廢置者使選偪陽宗族賢者令居霍奉妘姓之嗣善不滅姓周史示有王命頼頼姓未詳子爵國在義陽隨縣今蔡州褒信縣昭公四年楚子㑹諸侯伐吳執齊慶封殺之遂以諸侯滅頼頼子面縛衘璧肉袒輿襯從之造於中軍王問諸椒舉對曰成王克許許僖公如是王親釋其縛受其璧焚其襯王從之遷頼於鄢鄢楚邑楚子欲遷許於頼使鬭韋龜與公子棄疾城之而還為許城也鄅鄅䢵姓子爵國在瑯琊開陽縣今臨沂縣昭公十八年鄅人藉稻其君出自藉稻蓋履行之邾人襲鄅鄅人將閉門邾人羊羅攝其首焉斬得閉門者頭遂入之盡俘以歸鄅子曰余無歸矣從孥於邾邾莊公反鄅夫人而舍其女十九年鄅夫人宋向戌之女也故向寧請師二月宋公伐邾圍蟲邾邑三月取之乃盡歸鄅俘耿霍魏焦滑揚耿姬姓爵未詳國在平陽皮氏縣今河中府龍門縣霍姬姓爵未詳國在平陽永安縣今晉州霍邑魏姬姓爵未詳國在河東河北縣今陜州平陸有魏城焦姬姓爵未詳國在𢎞農陜縣今陜州有焦城滑姬姓伯爵國在河南緱氏縣今拱州揚姬姓爵未具國在河東今晉州洪洞縣閔公元年晉侯作二軍晉本一軍公將上軍太子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫襄公二十九年晉司馬女叔侯曰虞虢焦滑霍揚韓魏皆姬姓也晉是以大若非侵小將何所取按如司馬女叔侯之説則滑為晉所滅然僖公三十二年秦穆公襲鄭以鄭有備滅滑而還則滅滑者秦非晉也吕相絶秦書有殄滅我費滑散離我兄弟之語則方以是聲秦滅姬姓諸侯之罪豈晉所滅者又别一滑邪當考文獻通考卷二百六十三
