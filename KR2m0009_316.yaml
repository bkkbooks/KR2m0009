按今博陵郡界有堯城為堯始封之國當時徙於此地後遷平陽及夏禹所都之地禹都或為今太原或在今平陽或在今河東郡安邑或在今河南府陽翟也亦高辛氏子實沉及金天氏子臺駘之所居焉左傅曰帝遷高辛氏子實沉於大夏主參金天氏之裔曰允格臺駘以處太原註云大夏太原晉陽縣也周成王又封弟太叔虞於此成王滅唐而封太叔故參為晉星是也叔虞子爕改為晉侯唐有晉水故改為晉中國曰太原夷狄曰大鹵晉荀吴敗狄於大鹵即太原晉陽縣也晉大鹵太原大夏夏虚晉陽六名其實一也春秋時為晉國後為趙邑智伯與韓魏圍晉陽嵗餘引汾水灌城不没者三版晉滅屬趙秦置太原郡二漢因之兼置并州領郡九理於此曹公圍袁紹於鄴時袁紹外甥高幹為并州刺史牽招說幹曰并州左有恒山之險右有大河之固北有强胡速迎紹并力觀變幹不能用之魏改為太原國并州仍舊晉因之領郡國六理於此後魏為太原郡兼置并州北齊後周皆因之隋初廢郡置并州又改為太原郡唐為并州高祖匡隋室起義兵於長夀元年置北都後復為并州開元十一年改為太原府天寳元年加號為北京屬河東道宋同又為河東節度領縣十三太原祁晉陽次文水谷榆孟太陽曲陽樂平陽清源城夀廣交後唐為西京又為北京周太祖即位劉旻據河東稱帝都其地宋太平興國四年平劉繼元降為緊州軍事毁其城移治於榆次縣又廢太原縣以平定樂平二縣屬平定軍交城屬大遼監七年移治唐明鎮寳元二年以大通監交城縣𨽻州嘉祐四年復為太原府河東節度使領河東路經畧安撫使大觀元年陞大都督府劉安世曰河東晉地也昔髙辛氏遷閼伯於商邱主參今應天是也遷實沉於大夏主商今太原是也且參商不相能久矣物不兩大故國初但曰并州不加府號有深意也又本朝下河東在戊寅三年重午日實火土旺日此參水神所忌故克之時宋受命已十九年矣而晉始服且太祖太宗嘗親征而得太原正以其地控扼西北下瞰長安纔數百里棄太原則長安京城不可都矣靖康元年五月李綱為宣撫使督諸軍救太原九月九日太原䧟晉之地屬本朝纔一百四十九年郡城故老傳晉并州刺史劉琨所築其中又有三城一曰大明城董安于所築又一城東魏静帝置晉陽宫於此隋更名新城又一城開皇十六年築今名倉城貢大銅鑑甘草人参礜石領縣十治陽曲陽曲唐縣有汾水羊腸坂黄河千里一曲此當其陽有天門關赤塘關及二寨太谷隋縣有蔣谷水太谷山榆次春秋石言魏榆之地隋縣夀陽晉舊縣盂古仇猶國之地隋縣交城有少陽山狐突山汾水文水文水漢大陵縣有文水大陵城祁晉大夫祁奚之邑漢縣有胡甲水清源隋縣有清源水平晉隋晉陽縣太平興國中改有介山晉水晉祠濳邱潞州春秋時初為黎國後狄人奪其地晉伯宗數狄罪曰奪黎氏地赤狄潞子嬰兒為晉所滅其地盡屬焉戰國初為韓之别都以逺韓近趙後卒降趙秦置上黨郡上黨者言其地極高與天為黨漢魏晉後魏不改後周置潞州隋置韓州煬帝初復置上黨郡唐為潞州或為上黨郡後以為大都督府昭義軍節度屬河東道宋同領縣十上黨長子留壺關潞城襄垣武鄉銅鞮黎城屯渉梁改正義軍後唐改安義軍俄復為昭義軍宋太平興國初改昭德軍二年以銅鞮武鄉二縣屬威勝軍後領河東路兵馬鈐轄兼提舉澤絳州威勝軍屯駐泊本城兵馬廵檢事建中靖國初陞為隆德府靖康後陷於金貢人参蜜墨領縣八治上黨上黨隋縣有太行羊頭山藍水雞鳴水濁漳靖康時兩河之民多保聚太行長子周史辛甲所封之地隋縣有鹿谷山𤼵鳩山神農井羊頭山長平關潞城古潞子國漢舊縣屯留漢縣有三峻水絳水壺關漢縣以山形似壺嘗置關有抱犢山羊腸坂襄垣趙襄子所築漢縣有銅鞮水黎城古黎侯國隋縣有白嚴山故壺口關渉春秋渉侯國隋縣晉州古堯舜之都所謂平陽也春秋時屬晉戰國屬魏秦為河東郡地二漢因之魏分置平陽郡晉因之劉淵稱漢僭位建都於此後魏為平陽郡兼置唐州後改為晉州置總管府東魏北齊皆為重鎮隋初改平陽為平河郡尋廢煬帝初置臨汾郡唐為晉州或為平陽郡屬河東道宋同領縣九臨汾岳洪洞趙襄陵霍神山冀汾西陽城邑氏梁為定昌軍節度後唐改建雄軍宋太平興國六年廢沁州以和川來屬為建雄軍節度政和六年陞為平陽府靖康後陷於金金𨽻河東南路文公朱熹曰太行山之極髙處平陽晉州蒲坂山之盡頭堯舜所都也其地磽瘠人民朴陋儉嗇惟堯舜能都之後世泰侈不能都矣貢蜜蠟燭領縣十治臨汾臨汾漢平陽縣有姑射山又有故堯城縣潏汾沁平營五水洪洞晉大夫羊舌肸邑隋縣有霍山霍水襄陵晉襄公之陵又有趙襄子墓因以為名宋建二寨神山唐縣霍邑漢彘縣周人流厲王於此有霍山即職方氏冀州之鎮禹貢所謂岳陽有彘水隋縣趙城古造父之邑有姑射山女媧墓政和二年以趙氏始封之地又四面阻險陞為慶源汾西後魏置郡隋為縣宋置五寨冀氏後魏縣有三交水岳陽隋為千畆縣晉侯千畝之戰即此也後改岳陽和川隋縣代州古唐國之地春秋時晉有之及三卿分晉其地屬趙趙襄子殺代王而取其地趙武靈王破樓煩而置雲中鴈門代郡後北境屬燕秦為太原鴈門二郡之境漢魏晉因之後魏置梁城繁畤二郡後周置肆州隋文帝時為代州煬帝初州廢置鴈門郡唐為代州或為鴈門郡郡城後魏所置郡南三十里有東陘關甚險固屬河東道宋同領縣五鴈門五繁畤崞唐林臺宋景德二年省唐林縣以郡為鴈門郡防禦其地三面臨邊自古匈奴入冦之路最號要害與忻州相應援置十三砦守之靖康後陷於金金𨽻河東北路貢麝香青碌領縣四治鴈門鴈門漢廣武縣有夏屋山趙襄子殺代王之地又有龍泉水參合陂東陘關五臺隋縣有五臺山慮虒水渾河崞隋縣其城石門關繁畤隋縣其城三面枕澗東接峻坂極為險固滹沱河源出焉絳州春秋時為晉國即故絳與新田之都也戰國時地屬魏秦屬河東郡秦末其地屬魏豹漢定魏地還屬河東郡後漢因之魏晉屬河東平陽二郡地後魏置東雍州其龍門萬泉即屬秦州西魏後周以為重鎮後周改曰絳州兼置正平郡隋初郡廢煬帝初州廢復置絳郡唐為絳州或為絳郡屬河東道宋同領縣七宋同後唐以河中府稷山來屬宋為絳郡防禦貢防風蠟燭墨領縣七治正平正平隋縣有汾水澮水龍谷水晉虒祁宫曲沃春秋時晉所都新田之地隋縣有絳山臺駘祠陘庭城太平後魏縣有汾水關翼城春秋晉翼邑隋縣有古熒庭城稷山隋縣有玉壁城為後周重鎮齊神武再攻圍不克絳春秋晉武公自曲沃徙此後魏縣有絳水宋置三寨垣隋縣有古臯落城即周召分陜之地今縣界東北六十里有召原廟與古棠木西魏於此置召郡以備東魏河中府唐虞所都蒲坂地春秋時地屬魏晉獻公滅魏以封大夫畢萬萬畢公高之後魏犨祖父也畢萬之後十代至文公列為諸侯與韓趙三分晉地屬魏至惠王以安邑近秦乃徙都大梁秦為河東郡歴兩漢不改博物志云有山澤近鹽沃土之人不才漢興少有名人大衣冠三代皆衰絶魏晉亦然後魏以為河東郡兼置雍州及屬秦州後周改為蒲州亦兼置河東郡隋初郡廢煬帝初州廢復置河東郡唐初為蒲州開元九年置中都改為河中府尋罷如舊乾元元年復為府為河中節度屬河東道領縣八宋同後漢以聞喜安邑解三縣屬解州宋改䕶國軍節度大中祥符四年以寳鼎為慶成軍又以府兼提舉解州慶成軍兵馬廵檢事屬陜西路建炎元年沒於金金屬河東南路貢五味子龍骨領縣八治河東河東漢蒲坂縣春秋秦晉戰於河曲即其地有蒲津關後魏大統四年造浮橋九年築城為防唐開元十二年兩岸開東西門各造鐵牛四鐵人四其牛下並鐵柱連腹入地丈餘并前後鐵柱十六媯汭水今有舜廟在焉其廟周宇文䕶所造又有雷首山夷齊居其陽所謂首陽山也有風陵堆與潼關相對桑泉有三疑山漢解縣故城今縣東西猗氏舊漢縣猗頓所居古郇國也有古令狐城左傳晉文公從晉反國濟河圍令狐即此安邑堯舜舊都今縣西有鳴條陌湯與桀戰於此有鹽池與解為兩池解隋虞鄉縣武德初改有鹽池及紫泉監虞鄉漢解縣地後於虞鄉城置解縣更於解西五十里别置虞鄉縣寳鼎漢汾隂縣有后土祠湯廟永樂武德初分芮城縣置解州五代漢以河中府解縣置州又以安邑聞喜二縣來屬宋為防禦郡屬陜西永興軍路其地即夏桀鳴條之野有沃鹽之利建炎以來州民卲興力戰終不能守遂沒於金金𨽻河東南路又割陜之平陸夏芮城三縣來𨽻貢鹽花領縣三詳見河中府慶成軍本河中府寳鼎縣大中祥符四年建為軍𨽻河中府七年置屬京師領縣一滎河即寳鼎縣大中祥符時改詳見河中府慈州春秋時晉之屈邑獻公子夷吾所居禹貢壺口之山在焉戰國時為魏地秦及二漢屬河東郡魏晉屬平陽郡東魏置定陽郡及南汾州北齊改南汾州為西汾州後周改為汾州隋初郡廢置耿州居耿吉城後復為汾州煬帝初州廢置文成郡唐為慈州或為文城郡屬河東道宋同領縣五吉昌城昌寧城吕香文仵周廢仵城吕香二縣宋為團練州熙寧五年廢州以吉鄉𨽻隰州即縣治置吉鄉軍使仍省文城為鎮𨽻焉又以鄉寧𨽻晉州襄陵縣元祐元年復吉鄉軍為慈州靖康後陷於金金為耿州尋又改為吉州貢柴胡領縣三治吉鄉吉鄉漢北屈縣左傳屈産之乘是其地唐改名有壺口山文城有孟門山與龍門相對龍門之上古龍門禹所鑿漢北屈縣鄉寧後魏昌寧縣後唐改隰州春秋時晉之蒲城也七國時屬魏秦二漢為河東郡地魏晉屬平陽郡後魏北齊為沁州後周置沁州及龍泉郡隋初郡廢後復置西汾州尋又改為隰州煬帝初州廢置龍泉郡唐為隰州或為大寧郡屬河東道宋同領縣六宋同宋為團練熙寧五年廢慈州以吉鄉縣𨽻州即縣治置吉鄉軍使仍省文城縣為鎮𨽻焉元祐元年復慈州七年以州之上平永寧兩關俯逼西界以州為次邊靖康沒於金金𨽻河東南路貢蜜蠟領縣六治隰川隰川漢蒲子縣春秋時蒲城晉重耳所居蒲後周縣有五鹿山蒲谷川水溫泉唐縣有湯泉天井關置三寨永和隋縣有索陁谷永和關石樓隋縣有百井谷屈産泉建三寨太寧唐北屈縣地忻州戰國時屬趙秦為太原郡地二漢因之後魏置肆州後周徙肆州於鴈門郡隋初置新興郡及雲州後改新興郡為忻州因忻口為名煬帝初廢雲州及忻州以其地屬樓煩定襄二郡唐復分置忻州以忻川水為名或為定襄郡漢有定襄郡在今馬邑郡地屬河東路宋同領縣二宋同宋為團練靖康後没於金金𨽻河東北路貢解玉砂麝領縣二治秀容秀容隋縣有雲母山忻川水藍水肆盧川水有石嶺關宋建四寨定襄漢陽曲縣唐改有石嶺關甚險固汾州春秋時晉地六國時屬趙秦屬太原郡二漢屬太原西河二郡地魏因之晉屬太原郡西河國地後魏又為西河郡兼置汾州北齊置南朔州後周改曰介州隋置西河郡唐為汾州或為西河郡屬河東道領縣五隰城義平遙石介休孝靈宋因之靖康後沒於金金𨽻河北東路貢土絁石膏領縣五治西河西河唐縣有偈泉山汾水中陽唐孝義縣宋改有勝水平遥後魏縣有鹿臺山嬰澗水介休漢縣有雀䑕谷及介之推祠靈石隋縣東南有高壁嶺汾水關皆險固之處澤州春秋時屬晉後屬韓其後屬趙至秦破趙於長平阬卒四十萬即此地也秦為上黨郡地漢屬河東上黨二郡地後漢因之魏晉亦同後魏以其地置建州及髙都長平安平三郡北齊亦為建州及置平陽髙都二郡後周併二郡為髙平郡隋初郡廢置澤州濩澤為名煬帝初州廢置長平郡唐為澤州或為髙平郡屬河東道宋同領縣六宋同宋因之禹貢底柱析城至於王屋太行皆在州境是全有太行之險固靖康後没於金金𨽻河北東路貢白石英禹餘糧人参領縣六治晉城晉城唐縣有太行山丹水又有天井關髙平漢泫氏縣西北有泫谷水故名有頭顱山秦白起阬趙卒築臺於壘中因山為臺故光狼城白起築陽城漢濩澤縣有嶕嶢山濩澤水析城山禹貢所謂底柱析城也端氏韓趙魏分晉封晉君於此漢為縣陵川漢泫氏縣地隋為縣沁水隋縣有沁水鹿臺山馬邑城遼州春秋時屬晉戰國初屬韓後屬趙秦為上黨郡二漢因之晉為樂平郡後魏為遼陽郡隋屬太原郡唐武德三年分并州地置遼州八年改為箕州先天元年改為儀州或為樂平郡屬河東道宋同領縣四宋同梁改為遼州宋因之熙寧七年二月州廢省平城和順二縣為鎮入遼山縣𨽻平定郡省榆社縣為鎮入威勝軍武鄉縣元豐八年復置州縣並復靖康後没於金金𨽻河東南路貢人参領縣四治遼山遼山漢垣縣地隋為縣有箕山青谷山遼陽山遼陽水榆社晉置武鄉縣石勒生於此有漚麻池和順即韓之閼與邑隋縣也平城隋縣憲州本樓煩監牧嵐州刺史領之唐貞元十五年别置監牧使龍紀元年李克用表置州領樓煩元池天池三縣治樓煩屬河東道宋同宋咸平五年以州卑隘多水潦移治静樂軍之静樂縣遂廢軍又廢天池元池二縣入静樂樓煩改𨽻嵐州熙寧三年廢憲州以静樂𨽻嵐州十年復其州仍領静樂政和五年賜郡名汾源靖康末太原義士張横有衆二千往來嵐憲間紹興五年九月敗金人於憲州後卒陷於金貢麝香領縣一静樂漢汾陽縣地有隋煬帝汾陽宫有管涔山劉曜敗處汾水所出嵐州春秋晉國之分晉滅之後為胡地有樓煩王居焉趙武靈王破樓煩而取其地其後北屬燕秦二漢為太原郡地晉末陷於劉淵及魏末於其地置嵐州隋煬帝置樓煩郡唐為嵐州或為樓煩郡屬河東道宋同領縣四宜芳谷合河嵐静樂宋太平興國五年以嵐谷𨽻岢嵐軍咸平二年以静樂𨽻静樂軍五年以憲州樓煩來屬故郡城魏置岢嵐鎮交置軍為突厥之要衝靖康後陷於金金𨽻河東北路貢麝香領縣三治宜芳宜芳有古秀容城即漢汾隂縣屬太原郡積粟所在謂之羊腸倉石磴縈委若羊腸焉合河唐縣以蔚汾二水西與黄河合因以為名樓煩唐縣石州戰國初趙之離石邑後為秦魏二國之境秦本紀云秦昭王伐趙取離石是也秦為太原郡地二漢屬西河郡南單于庭即左國城晉屬西河國劉淵起事於此後石勒置永石郡北齊置懷政郡後改為離石郡兼置西汾州後周改西汾為石州隋初郡廢而石州如故煬帝初州廢置石郡唐為石州或為昌化郡屬河東道宋同領縣五宋同宋因之元豐五年置葭蘆吴堡二寨𨽻州舊帶嵐石隰三州都廵檢使是年置葭蘆吳堡寨緣邊都廵檢使遂令三州各帶沿邊都廵檢使元符二年陞葭蘆寨為晉寧軍以州之臨泉縣𨽻焉大觀三年復以定胡縣𨽻晉寧軍武經邊防云嵐石隰三州西北至黄河置城戍關度河外入麟州路捍夏國界嘗合三州為一路又石州為治所置州兵及遣戍外又領蕃捉生一千六百二人紹興九年太行忠義人王忠值取石州等十二郡次年復陷金金𨽻河東北路割隰之溫泉來屬貢蜜蠟領縣五治離石離石漢舊縣後南單于庭左國城在此有離石水一名赤洪水高歡大破爾朱兆於赤洪嶺蓋近此臨泉唐縣有臨泉水平夷後周縣有寧鄉水方山隋縣有赤洪水定胡隋置孟門關其地險固唐為縣宋有三寨威勝軍本唐沁州之地春秋時屬晉後屬韓又屬趙秦二漢為上黨郡地魏晉亦同後魏屬義寧郡隋初置沁州煬帝廢為沁源縣屬上黨郡唐復為沁州或為陽城郡屬河東路領縣三沁源川綿上和宋太平興國二年於潞州銅鞮縣界亂栁石圍中建為軍以銅鞮武鄉來屬六年廢沁州以沁源縣𨽻焉寶元二年以大道通監綿上縣來𨽻屬河東路靖康後没於金金為沁州𨽻河東路貢土絁領縣四治銅鞮銅鞮春秋晉羊舌赤之邑漢縣有銅鞮山銅鞮水武鄉唐縣有湼霍山沁水沁源後魏縣有霍山沁水綿上介子推隠所中有沁水平定軍宋太平興國二年以鎮州廣陽寨建為軍四年以并州平定樂平二縣來屬屬河東路靖康後没於金金人為州𨽻河東北路貢絹領縣二治平定平定唐廣陽縣宋改有二寨樂平晉縣有荆山臯落山漳水一出樂平縣小山名清漳一出今潞州長子縣𤼵鳩山名濁漳寧化軍本嵐州地劉崇置固軍太平興國四年徙軍城稍南改為寧化縣五年置軍屬河東路靖康後没於金貢絹領縣一寧化有雪山建四寨岢嵐軍宋太平興國五年以嵐州嵐谷縣建為軍景德中築畏城於草城川口以為控扼其草城川峩婆谷洪谷朝谷四路皆契丹界靖康後陷於金金為州𨽻河東北路貢絹領縣一嵐谷唐縣有岢嵐山雪山岢嵐水火山軍本嵐州地劉崇置雄勇鎮宋太平興國七年建為軍徙治鎮西三十里有雄勇偏頭董家横谷桔桿䕶水六寨屬河東道貢柴胡保德軍宋淳化四年析憲州地置定羌軍景德元年改屬河東道貢絹大通監宋太平興國四年以并州交城縣鐵冶建為監六年廢沁州以綿上縣來屬屬河東路舊領交城綿上二縣天聖元年改交城監寶元二年復是年以監及交城縣𨽻太原府綿上縣𨽻威勝軍靖康後没於金永利監宋太平興國四年平太原徙鹽務於平晉縣本鹵縣也咸平四年建為監屬河東路寶元二年以𨽻太原府靖康後没於金營州殷時為孤竹國地漢徒河縣之青山在郡城東百九十里棘城即顓頊之墟在郡城東南一百七十里春秋時地屬山戎戰國時屬燕秦并天下屬遼西郡二漢及晉皆因之慕容皝以栁城之北龍山之南所謂福德之地也乃營制宫廟改栁城為龍城遂遷都龍城號新宫曰和龍宫皝時有黑龍白龍各一鬭於龍山皝率屬僚觀之祭以大牢二龍交首嬉戯解角而去皝大悅號曰和龍宫後燕慕容寳北燕馮䟦相繼都之至慕容寳為馮䟦所滅至馮𢎞為後魏所滅也後魏置營州後周武帝平齊其地猶為髙寳寧所據隋文帝時討平寳寧復以其地為營州煬帝初州廢置遼西郡唐復為營州或為栁城萬嵗通天元年為契丹所陷聖歴二年僑治漁陽開元五年又還治栁城置平盧軍東有鎮安軍本燕郡守捉城貞元二年為軍城西有五守捉城屬河北道唐末劉仁恭以遺契丹後唐莊宗滅仁恭而取其地既滅梁復陷契丹迄晉漢周及宋皆不能取宋宣和末契丹没於金唐貢人葠麝香豹尾骨􅙡領縣一栁城有龍山鮮卑山在縣東北二百里棘城之東塞外亦有鮮卑山在遼西之北一百里未詳孰是青山石門山白狼山白狼水又有漢夫黎縣故城在東南其龍山即慕容皝祭龍所也有饒樂水故徒河縣和龍城室韋靺鞨諸部並在東北逺者六千里近者二千里餘西北與奚接北與契丹相接平州殷時孤竹國春秋時山戎肥子二國地也今盧龍縣有古孤竹城伯夷叔齊之國也戰國時屬燕秦為右北平及遼西二郡之境二漢因之晉屬遼西郡後魏同隋初置平州煬帝初州廢置北平郡唐因之屬河北道唐末劉仁恭以遺契丹後唐莊宗取之後復陷契丹契丹改平州為遼興府以榮灤二州𨽻之號為平州路迄晉漢周及宋皆不能取宋宣和末契丹將亡其將張㲄以郡來降隨没於金唐貢熊鞹蔓荆實人参領縣三治盧龍盧龍漢肥如縣有碣石山碣然而自立在海旁故名之晉太康地志曰築長城所起自碣石在今高麗舊界非此碣石也漢遼為界臨榆關在縣城東一百八十里盧龍塞在城西北二百里石城漢舊縣馬城古海陽城檀州春秋及戰國並為燕地秦漢並屬漁陽郡後魏置密雲郡兼置安州後周改安州為元州隋徙元州於漁陽今漁陽郡尋復於今郡置檀州煬帝初改置安樂郡唐為檀州或為密雲郡屬河北道後晉髙祖初起以遺契丹迄漢周及宋皆不能取宋宣和時與金合兵攻契丹五年金人以州來歸七年金入冦首取其地唐貢人葠麝香領縣二治密雲密雲有潞水自塞外流入燕樂後魏置廣陽郡有長城薊州戰國時屬燕秦置漁陽縣郡二漢因之隋文帝徙元州於此并立總管府煬帝初廢置漁陽郡唐屬幽州開元十八年析幽州置薊州或為漁陽郡屬河北道後晉没於契丹迄漢周及宋皆不能取宣和間與金合兵攻破契丹五年金人以州地來歸七年復没於金唐貢白膠領縣三治漁陽漁陽舊漢縣有鮑邱水又名潞水古北戎無終子國也一名山戎凡三名七國時屬燕燕後以為右北平縣神龍中開平敵渠傍海穿漕以避海難又其北漲水為溝以拒契丹三河玉田古無終縣幽州古之幽州蓋舜分冀州為之置十二牧此其一也言北方太隂故以幽冥為號幽州因幽都山以為名也山海經有幽都山今列北荒矣昔顓頊都於帝邱其地北至幽陵即此殷復省幽州入冀州周禮職方曰東北曰幽州其山曰醫無閭唐在遼東於栁城郡東置祠遥禮藪曰貕養貕養澤在東萊郡昌陽縣界川曰河泲河在滄州無𨽻縣界舊泲合在今北海郡博昌縣界今無泲即濟水浸曰菑時菑在今淄川郡淄川縣界時在今北海郡臨淄縣界其利魚鹽民一男三女畜宜四擾馬牛羊豕也穀宜三種稷黍稻初武王定殷封召公奭於燕及秦滅燕以其地為漁陽上谷右北平遼西遼東五郡漢髙帝分上谷郡置涿郡武帝置十三州此為幽州領郡國十其後開東邊置元莵樂浪等郡亦皆屬焉元莵樂浪等郡並今遼水之東宜在禹貢青州之域後改燕國曰廣陽郡後漢置幽州並因前代理於薊今縣晉亦置幽州領郡國七理於涿今范陽縣晉亂陷於石勒慕容儁苻堅後入於魏其後分割不可詳也今之幽州謂范陽郡古涿鹿也應劭曰黄帝與蚩尤戰於涿鹿是也即燕國之都焉謂之渤碣之間亦一都會也薊縣燕之所都渤即渤海郡碣碣石也秦為上谷郡之地漢髙帝分置燕國後又分燕置涿郡及廣陽國有獨鹿鳴澤獨鹿山名鳴澤澤名皆在於此後漢為涿廣陽二郡地魏更名范陽郡晉為燕范陽二國兼置幽州領郡國七理於此慕容儁常都之後魏置幽州北齊置東北道行臺後周置燕范陽二郡隋初並廢煬帝初併置涿郡唐為幽州或為范陽郡又為大都督府後唐為盧龍節度石晉初没於契丹至宋僅得永清縣置霸州得盧臺軍地置乾寧軍餘悉為契丹所有契丹改為燕山府建為燕京以轄檀順景薊涿易六郡號為燕京路宣和間與金合兵攻契丹五年以其地來歸七年金入冦郭藥師以燕山叛降之遂没於金紹興二十年金主亮徙都之改為大興府號中都唐貢綾綿絹角弓人葠栗領縣九治薊薊燕國都碣石宫漢為薊縣舊置燕都有桑乾水慕容儁都於此地幽都本薊縣地隋於營州之境汝羅故地置遼西郡以處粟末靺鞨降人武德元年曰燕州領三縣遼西瀘河懐逺土貢豹尾尋省瀘河六年自營州遷於幽州城中以首領世襲刺史貞觀元年省懐逺開元二十五年徙治幽州北桃谷山天寳元年屬歸德郡建中二年為朱滔所據因廢為縣廣平天寳元年析薊置三載省至德後復置潞漢舊縣有潞河漢平谷故城在今縣北又漢樂安縣古城在西北武清夲雍奴天寳初更名永清舊會昌縣天寳初更名安次漢舊縣良鄉漢舊縣唐初名曰固節神龍初更昌平漢舊縣古居庸關在縣西淮南子云天下九塞居庸是其一也舊置東燕州有狼山涿州本幽州地唐大歴四年節度使朱希彩表析幽州之范陽歸義固安置屬河北道石晉初没於契丹漢周俱不能取至宋僅得歸義一縣以置雄州又得新鎮地以置保定軍餘悉没契丹至宣和間與金人夾攻契丹契丹將郭藥師以州來降七年金入冦陷於金唐置縣五治范陽范陽漢涿縣在范水之陽有督亢陂溉田膏腴荆軻獻圖於秦即此地歸義漢易縣公孫瓚於此築城臨易河通遼海唐武德間更名有拒馬水固安漢方城縣地新昌大歴四年析固安置新城太和六年以故督亢地置順州在范陽郡城唐天寳初置尋又改為順義歸化二郡屬河北道石晉初没於契丹宋宣和時與金夾攻契丹五年金以州地來歸七年金入冦復取其地唐領縣二治賔義賓義屬順義郡懷柔在順州之北境屬歸德郡媯州春秋戰國並屬燕秦為上谷郡地二漢因之晉屬廣寗郡後魏孝明帝廢北齊置北燕郡隋屬涿郡唐武德七年討平髙開道後置北燕州貞觀八年改為媯州其後或為媯川郡屬河北道石晉沒於契丹契丹改為可汗州宋宣和末金滅遼取其地唐貢樺皮胡祿甲榆􅐴矢麝領縣二治懷戎懷戎漢潘縣地漢上谷郡城在此有涿鹿山及蚩尤城阪泉池及涿水有磨笄山趙襄子姊自殺在其地有祠北九十里有長城開元中張說所築有居庸塞鐵門關媯川蔚州周禮并州川曰嘔夷浸曰淶易嘔夷水在靈邱縣界淶水在飛狐縣界戰國初屬趙後又屬燕秦漢晉屬代郡後魏置懷荒禦夷二鎮東魏置北靈邱郡後周置蔚州隋置上谷郡唐初没突厥武德六年置州并置靈邱飛狐二縣僑治陽曲七年僑治繁畤八年僑治秀容故北恒州城貞觀五年破突厥復故地還治靈邱開元初徙治安邊至德二載更為安邊郡石晉時陷契丹宋宣和五年契丹守將陳翊以州來降六年金攻翊殺之復取其地唐貢熊鞹豹尾松實領縣三治靈邱靈邱漢舊縣有趙武靈王陵飛狐漢廣昌地飛狐口在縣北即漢之飛狐道與媯川郡山相連隋置今縣安邊開元時改為興唐縣朔州戰國屬燕秦屬代鴈門二郡地漢為定襄鴈門二郡地後漢屬雲中鴈門二郡漢末因亂又置新興郡漢末大亂匈奴侵邊自定襄以西盡雲中鴈門之間遂空建安中魏武王集荒郡之人立新興郡晉懷帝時劉琨表以鮮卑猗盧為大單于封代公徙馬邑即其地也其後為拓䟦魏建都於今郡北兼置懷朔鎮及遷洛後遂於郡北三百餘里置朔州葛榮之亂又廢北齊復置朔州隋初置總管府煬帝初府廢置代郡尋屬馬邑郡後魏初雲中在今郡北三百餘里定襄故城北齊置朔州在故郡西南故城一名平城地後移於馬邑即今故城也唐初為朔州或為馬邑郡建中中節度使馬燧徙治馬邑後復故治後唐為振武軍石晉初没於契丹宋宣和五年契丹守將韓正以州來降尋為金人所逐西取其地唐貢白鵰羽豹尾甘草領縣二治善陽善陽有秦馬邑城武州塞此地亦漢定襄縣地後魏桑乾郡北齊廣安郡有紫河𤼵源於此馬邑漢舊縣開元中析善陽於大同軍城置雲州戰國屬趙秦置雲中郡二漢因之晉屬新興郡後魏道武帝自雲中徙都平城即此雲中今馬邑北魏平城即今郡隋雲内縣常安鎮也置代尹自天興元年都平城至孝文帝太和十九年遷洛陽後改代尹為萬年尹隋初屬馬邑郡唐貞元十四年自朔州北定襄城徙治定襄縣永淳元年為黙啜所破徙其民於朔州開元十八年復置後為大同軍節度屬河東道石晉時沒契丹契丹號為西京宣和末金滅契丹取其地唐貢犛牛尾鵰羽領縣一雲中漢舊縣隋曰雲内縣白登山白登臺漢髙祖被圍於此有故髙栁城参合陂後魏盛樂縣並在今郡界單于臺在今縣西北百餘里武帝元封元年勒兵十八萬騎出長城北登單于臺易州春秋至戰國屬燕秦置上谷郡晉書曰在谷之上頭故曰上谷二漢屬涿郡晉為范陽國後魏亦為上谷郡隋初置昌黎郡後兼置易州煬帝初州廢置上谷郡唐因之屬河北道宋惟得遂城置安肅廣信二軍得蒲城南境以益保州餘地悉以雍熙四年陷於契丹武經邊防云易州石晉割賂契丹按五代史易州不在十六州數職方考亦稱五代俱有易州武經誤也宣和四年契丹將髙鳳以郡來降宣和末没於金唐貢紬綿墨領縣六治易易有淶易二水有燕臺昭王求賢處又有漢范陽縣故城在縣東南容城漢舊縣遂城古遂武也秦築長城之所起淶水漢逎縣滿城舊永樂縣五囘開元中析易置并置樓亭板城二縣天寳後省應州唐末置後唐天成七年升彰國軍節度石晉時没於契丹宋宣和五年應州守將蘇京以州來降京尋為女真所逐復取應州領縣二治金城金城後唐明宗其縣人也故升彰國軍而以金城為望縣混源新州唐末置後唐同光二年升威勝軍節度屬河東道石晉時沒於契丹改為奉聖州其地在雲中府之東領縣四治永興永興礬石龍門懷安儒州唐末置石晉時没於契丹領縣一縉山武州唐末置屬河東道後唐改為毅州石晉時没於契丹契丹改為歸化州南至新州七十里宣和五年來歸六年築固疆堡尋復為女真所取領縣一文德單于大都督府戰國屬趙秦漢雲中郡地唐龍朔三年置雲中都䕶府又移瀚海都䕶府於磧北瀚海都䕶舊曰燕然都䕶府二府以磧為界麟德元年改雲中都䕶府為單于大都䕶府領縣一金河有長城有金河土城紫河及像水又南流入河李陵臺王昭君臺文獻通考卷三百十六
