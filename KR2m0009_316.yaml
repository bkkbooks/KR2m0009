body:
  text: 文獻通考卷三百十六鄱陽馬端臨貴與著輿地考二古冀州禹貢曰冀州既載載始也冀州堯都故禹理州自此而始也以唐虞之都不言封畧餘州所至即是其境矣壺口雷首至於太岳壺口山在今文成郡吉昌縣太岳在今平陽郡霍邑縣即霍山也雷首在今河東郡河東縣此山凡有九名即歴山首陽山薄山襄山甘棗山中條山渠猪山獨山等名是也既修太原至於岳陽太原今太原府岳陽即霍山也亦曰太岳覃懷底績至於衡漳覃懐近河地名今河内郡也底致也績功也衡漳謂漳水横流而入河在今廣平郡西北肥鄉縣界也厥土惟白壤柔土曰壤恒衛既從大陸既作恒衛二水名也恒水出恒山在今博陵郡恒陽縣界衛水在今常山郡靈夀縣西山所出大陸澤鄭元云在鉅鹿北言水從故道可以耕作今趙郡象城縣界島夷皮服海曲曰島居島夷而衣其皮夾右碣石入於河碣石海邊山名在今北平郡盧龍縣也言禹夾行此山之右入河逆上也舜以冀州南北濶大分衛水為并州燕以北為幽州並置牧周禮職方曰河内曰冀州山曰霍藪曰楊紆爾雅云秦有楊紆而此以為冀州藪未詳其義及所在也川曰漳浸曰汾潞漳水出今上黨郡長子縣界汾水出今樓煩郡静樂縣山潞水出今密雲郡密雲縣也其利松柏人五男三女畜宜牛羊穀宜黍稷其地險易帝王所都亂則冀安弱則冀强荒則冀豐故曰冀州其在天官昴畢則趙之分野漢之真定常山中山涿郡之高陽鄚州鄉廣平鉅鹿河間渤海之東平舒中邑文安束州成平章武河以北也南至浮水繁陽内黄斥邱西有太原定襄雲中五原上黨皆其分也今鄴郡廣平鉅鹿信都趙郡博陵河間文安饒陽高平上黨樂平陽城太原定襄雲中單于鴈門之西南境樓煩之南境西河之東境皆是也尾箕則燕之分野漢之漁陽右北平遼西遼東上谷代郡鴈門涿郡之易容城范陽北新城故安涿縣良鄉新昌及渤海之安次皆其分也今上谷范陽順義歸化歸德媯川漁陽密雲北平栁城馬邑安邊鴈門之東北境樓煩之北境皆是也兼得秦魏衛之交漢之西河今昌化之北境西河之西境宜屬秦漢之髙陽以東盡河内今河東平陽文城太寧昌化之南境絳郡陜郡之河北河内之西境並宜屬魏漢之河南野王朝歌今河内之東境汲郡皆宜屬衛矣秦平天下置郡為鉅鹿今常山信都趙郡之東北境博陵郡之西境鉅鹿之北境饒陽之南境兼兖州之域景城之南境皆是也邯鄲今廣平鄴郡鉅鹿之南境趙郡之西南境皆是也上谷今上谷范陽文安河間媯川歸化順義歸德饒陽之北境趙博陵之東境及兖州之域景城之北境皆是也漁陽今漁陽密雲郡地皆是也右北平今北平郡遼西今栁城及北平郡之東境皆是也河東今河東絳郡陜郡之北境平陽太寧文城等郡皆是也上黨今上黨高平樂平陽城等郡皆是也太原今太原西河昌化定襄及鴈門之南境樓煩等郡皆是也代郡今安邊及馬邑之北境皆是也鴈門今馬邑之南境鴈門之北境皆是也雲中今雲中單于府是也及三川郡之北境今河内郡漢武置十三州此為冀州領郡國九幽州領郡國十并州領郡九古冀州西境則屬司隸今河東絳郡平陽河内汲郡後漢並因前代為冀州理於鄗鄗今趙郡高邑縣袁紹曺公理鄴鄴今郡縣鄗呼各反幽州理薊今范陽郡縣并州理晉陽今太原府魏並因之晉置冀州領郡國十三理房子今趙郡縣幽州領郡國七理涿今范陽郡是也并州領郡國六恵帝之後其地淪沒於劉元海石勒慕容雋又為苻堅所陷堅敗慕容垂據之後屬後魏自此分割不可詳焉唐分置十五部此為河北道范陽汲郡鄴郡廣平饒陽河間常山博陵信都趙郡鉅鹿文安上谷北平密雲媯川漁陽栁城歸德順義歸化等郡河東道河東絳郡平陽太原上黨西河高平太寧昌化文城陽城定襄樂平鴈門樓煩安邊雲中馬邑等郡兼分入都畿河内郡關内道單于唐末營平二州陷於契丹梁初劉仁恭父子據幽燕繼而為晉王所滅晉滅梁稱唐唐末石敬瑭叛以幽涿薊檀順瀛莫蔚朔雲應新媯儒武寰十六州賂契丹資其兵伐唐為晉晉亡漢繼之漢亡為周劉旻據河東周世宗伐契丹取瀛莫二州周亡宋受命太宗以太平興國四年平劉繼元盡得河東之地宋承唐制冀州之境為河北河東兩路其後又分河北為東西二路宣和間遣使約女真夾攻遼取石晉所沒之地十六州遼既亡金人止以薊景檀順涿易六州二十四縣來歸遼將張㲄又以平州來降繼復為金所取靖康後冀地盡沒於金冀州堯都所在疆域尤廣梁州境宇雖遐逺而雜以夷獠中夏唯冀州最大山東之人性緩尚儒仗氣任俠太行恒山之東而鄴郡髙齊國都浮巧成俗自北齊之滅衣冠士人多遷關内惟伎巧商販及樂户移實郡郭由是人情險詖至今好為訴訟山西土瘠其人勤儉而河東魏晉以降文學盛興魏豐樂侯杜君畿為河東守開置學官親執經教授郡中化之自後河東特多儒者閭里之間習於程法并州近狄俗尚武藝左右山河古稱重鎮寄任之者必文武兼資焉古冀州歴代沿革之圖春秋時可考者二十二國晉衛邢魏霍耿北燕邘揚冀郇雍鼓肥黎潞陽共鮮虞赤狄無終山戎秦時為郡十三鉅鹿郡邯鄲郡太原郡上黨郡河東郡三川郡北境鴈門郡遼西郡右北平郡漁陽郡上谷郡代郡雲中郡漢時為郡國二十四縣三百七十三恒山郡十八縣元氏陽石邑門桑中陘靈夀子蒲吾邱上曲九井房中南封斯行唐關平棘鄗樂陽平臺都鄉魏郡十八縣鄴魏館陶繁陽斥邱元城沙期内黄陽清淵裴梁黎即武始邯㑹隂安平思邯溝武安鉅鹿郡二十縣鉅鹿宋子南􅒋楊氏廣阿臨平象氏陽廮陶下曲貰鄡陶新市鄉堂陽鄉安定武柏安敬武歴鄉樂信趙國四縣邯鄲易陽柏人襄國真定國四縣眞定藁城肥纍緜曼河間國四縣樂成候井武隧弓高廣平國十六縣廣平任張曲朝平南南和曲列人廣斥章周曲梁鄉平利平鄉陽臺廣年城鄉中山國十四縣盧奴苦陘北平安國北新城望唐曲逆都深澤新市新處毋極陸成安險河内郡十八縣懷州汲共武德平臯波歌山陽武河陽朝修溫壄王獲嘉軹沁水隆慮蕩隂信都國十七縣信都武歴博邑扶栁觀津辟陽高隄南宫廣川下樂鄉平隄桃西梁昌成東昌修太原郡二十一縣晉陽離葰人氏界休孟榆次于茲狼鄔中都孟平陶上艾汾陽慮虒京陵陽邑陽曲廣武大陵原平祁廣陽國四縣薊方城廣陽隂鄉涿郡二十九縣涿陽逎吾穀邱城故安蠡容易南深澤鄚范廣望髙陽臨鄉州鄉益昌安平陽鄉樊輿西鄉成陽良鄉水利鄉垣饒中武阿陵阿武高郭新昌上黨郡十四縣長子襄屯留壺余吾泫銅鞮高沾氏垣關氏都涅潞陭氏陽阿穀遠河東郡二十四縣安邑河北大陽左邑猗氏汾隂解喜蒲坂澤聞濩端氏楊臨汾屈垣蒲皮氏絳長修讘平陽彘北子狐騏襄陵西河郡三十六縣富昌陽騶虞街鵠澤經平定狼美稷中樂徒臯大成武廣田千章圜隂增山益䦨圜陽平周廣衍鴻門武車藺猛宣虎離石土軍穀羅西都饒陸方利山博陵是隰成官臨水平隂觬鹽鴈門郡十四縣善無樓煩沃陽武州繁畤􅓭陶中陵劇陽隂館平崞城埒馬邑强隂代郡十八縣桑乾延道人狋當城廣高栁且馬城平班氏陵氏昌如邑城陽原東安陽參合平舒代靈邱鹵雲中郡十一縣雲中沙陵咸陽原陽陶林沙南楨陵北輿犢和武泉陽夀定襄郡十二縣成樂武臯桐過安都武武武進武襄隂定駱陶城要襄復陸上谷郡十五縣沮陽夷泉上下潘瞀輿落軍都昌平居庸廣寧雊涿鹿且居茹女祁寧漁陽郡十二縣漁陽安狐奴路谷樂奚雍奴獷平泉州要陽平白檀滑鹽右北平郡十六縣平剛薋無終徐無石城聚陽廷陵土垠俊靡白狼夕陽昌城驪成廣成宇平明遼西郡十四縣且慮如海陽從新安平肥賓交黎栁城陽樂令支狐蘇徒河文城臨渝絫晉時為郡國二十九縣一百九十五安平國八縣信都廣下博經武邑栁宗武遂觀津扶趙國九縣房子鄉元氏平鄡平棘陽高邑下曲中邱柏人鉅鹿國二縣廮陶鉅鹿章武國四縣東平舒文安章武東州頓邱郡四縣頓邱繁陽隂安衛魏郡八縣鄴黄長樂黎陽魏斥邱安陽蕩隂内汲郡六縣汲朝歌共林慮獲嘉修武河内郡九縣野王山州溫懐軹陽平臯河陽沁水博陵國四縣安平饒陽安國南深澤常山郡八縣真定井陘石邑九門靈夀唐上曲陽南行蒲吾河間國六縣樂城武垣成平易城中水鄚中山國八縣盧奴唐魏昌平新市都北安喜蒲隂望樂平郡五縣沾上艾夀陽轑陽樂平太原國十三縣晉陽陽陽曲大榆次祁于離陶盂京狼孟邑陵平陵中都鄔上黨郡十縣潞銅屯留湼壺關垣長子鄉泫氏鞮襄武高都廣平郡十五縣廣平南邯鄲任易陽梁武安人渉肥襄國和曲列鄉臨水廣年斥漳平恩河東郡九縣安喜解聞喜蒲坂垣北汾陽河大陽猗氏髙陽國四縣博陸高陽北新蠡吾平陽郡十二縣平陽襄楊讘陵端氏絳邑永安濩澤蒲子臨汾狐北屈皮氏鴈門郡八縣廣武平崞馬􅓭陶原邑平城葰人繁畤西河國四縣離石隰城中陽介休代郡四縣代廣昌平舒富城新興郡五縣九原定襄雲中廣牧晉昌范陽國八縣涿陽良鄉城方城范容長鄉逎固安北平郡四縣徐無土垠俊靡無終燕國十縣薊國安次泉州昌平雍奴軍都狐奴廣陽潞安廣寗郡三縣下洛涿鹿潘遼西郡三縣陽樂肥如海陽上谷郡二縣沮陽居庸隋時為郡三十縣二百有七常山郡八縣真定房行唐靈石邑陘山夀滋陽九門井長平郡六縣丹川川沁水端氏濩澤高平陵魏郡十一縣安陽水鄴滏臨漳臨成安林靈泉臨堯城洹陽水慮淇汲郡八縣衞河汲水隋興澶黎陽内黄湯隂臨文城郡四縣吉昌文城伍城昌寧臨汾郡七縣臨汾岳陽襄陵冀氏楊霍邑汾西龍泉郡五縣隰川永和樓山石樓蒲西河郡六縣隰城上介休永安平遥靈石綿離石郡五縣離石修化定胡平夷太和鴈門郡五縣鴈門繁畤靈邱五臺崞馬邑郡四縣善陽神武雲内開陽樓煩郡三縣静樂臨泉秀容定襄郡一縣大利太原郡十五縣晉陽夀太原榆交城太汾陽樂文水和祁陽次谷平順遼山平城石艾盂襄國郡七縣龍岡柏南和邱人平鄉沙河鉅鹿内武安郡八縣永年邯肥鄉臨清漳安鄲洺平思洺水武河東郡十縣河東北桑泉氏汾隂鄉龍門邑芮城河猗虞安夏絳郡八縣正平太平翼城垣絳曲沃稷山聞喜安樂郡二縣燕樂密雲博陵郡十縣鮮虞極北平豐唐深恒陽安新樂毋義澤平隋昌河内郡十縣河内嘉溫新濟源修河陽共安昌獲鄉武城王屋河閒郡十三縣河間高陽文安饒陽樂夀博野束城清苑景城長蘆平舒曾城鄚信都郡十二縣長樂武强堂陽南宫衡水斌強棗强鹿城武邑下博蓚阜城趙郡十一縣平棘大高邑柏贊皇房元氏藁廮陶鼔欒城陸鄉子城城上黨郡十縣上黨渉長子城鄉潞城銅鞮屯留沁源襄垣黎涿郡九縣薊昌良鄉懐安次平戎涿固安潞雍奴上谷郡六縣易淶水逎遂城永樂飛狐遼西郡一縣栁城北平郡一縣盧龍漁陽郡一縣無終唐時為州四十三縣二百二十一縣名已見各州條下此不重具恒州九縣相州十一縣邢州九縣定州十一縣懷州五縣磁州三縣深州四縣瀛州六縣莫州六縣冀州九縣趙州九縣并州十三縣潞州十縣晉州九縣代州五縣絳州七縣蒲州八縣澤州六縣汾州五縣忻州二縣隰州六縣慈州五縣儀州四縣憲州三縣嵐州四縣沁州三縣營州一縣平州三縣檀州二縣薊州三縣幽州十一縣涿州五縣順州三縣媯州二縣蔚州三縣朔州二縣雲州一縣易州六縣應州二縣新州二縣儒州一縣武州一縣單于大都䕶府一縣宋時為州四十七縣一百七十四縣名已見各州條下此不重具真定府九縣相州六縣邢