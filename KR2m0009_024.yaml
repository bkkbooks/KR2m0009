body:
  text: 文獻通考卷二十四鄱陽馬端臨貴與著國用考二歷代國用宋興而吳蜀江南荆湖南粵皆號富強相繼降附祖宗因其畜守以恭儉簡易方是時天下生齒尚寡而養兵未甚蕃任官未甚冗佛老之徒未甚熾外無夷狄金繒之遺百姓各安其生不為巧偽放侈故上下給足府庫羡溢承平既久户口嵗增兵籍益廣吏員益衆佛老夷狄耗蠧中國縣官之費數倍昔時百姓亦稍縱侈而上下始困於財矣仁宗承之給費寖廣天聖初始命有司取景德一嵗用度較天禧所出省其不急者初自祥符天書既降齋醮糜費甚衆至是始大省齋醮宴賜及減諸宮觀衛卒自是道家之奉有節土木之費省矣至寶元中陜西用兵調度百出縣官之費益廣賈昌朝上言江淮嵗運糧六百餘萬以一嵗之入僅能充期月之用三分二在軍旅一在冗食先所畜聚不盈數載天下久無事而財不藏於國又不在民倘有水旱軍戎之急計將安出於是議省冗費減皇后及宗室婦郊祠所賜之半著為式於是皇后嬪御宗室刺史各上俸錢以助軍帝亦罷左藏庫月進錢千二百緡公卿近臣亦減郊祠所賜銀絹著為式時三司使王堯臣取陜西河北河東三路未用兵前及用兵後嵗出入財用之數會計以聞寶元元年未用兵陜西錢帛糧草入一千九百七十八萬出一千一百五十一萬用兵後入三千三百六十三萬出三千三百六十三萬有竒蓋視河東北尤劇以兵屯陜西特多故也元昊請臣西兵既解而調用無所減即下詔切責邊臣及轉運司趣議蠲除科率稍徙屯兵還內地汰其老弱官屬羡溢則并省之又命較近嵗天下財賦出入之數送三司取一嵗中數以為定式初真宗時內外兵九十一萬二千宗室吏員受祿者九千七百八十五寶元以後募兵益廣宗室蕃衍吏員嵗增至是兵百二十五萬九千宗室吏員受祿者萬五千四百四十三祿廪俸賜從而增廣又景德中祀南郊內外賞賚緡錢金帛總六百一萬至是饗明堂增至一千二百餘萬故用度不得不屈范鎮上言古者宰相制國用今中書主民樞密院主兵三司主財各不相知故財已匱而樞密院益兵不已民已困而三司取財不已中書視民之困而不知使樞密減兵三司寬財者制國用之職不在中書也願使中書樞密院通知兵民財利大計與三司量其出入制為國用則天下民力庶幾少寬至英宗治平二年內外入一億一千六百一十三萬八千四百五出一億二千三十四萬三千一百七十四非常出者又一千一百五十二萬一千二百七十八是嵗諸路積一億六千二十九萬二千九十三而京師不與焉蘇軾䇿别曰人君之於天下俯己以就人則易為功仰人以援己則難為力是故廣取以給用不如節用以亷取之為易也臣請得以小民之家而推之夫民方其困窮時所望不過十金之資計其衣食之費妻子之奉出入於十金之中寬然而有餘及其一旦稍稍畜聚衣食既足則心意之欲日以漸廣所入益衆而所欲益以不給不知罪其用之不節而以為求之未至也是以富而愈貪求愈多而財愈不供此其為惑未可以知其所終也盍亦反其始而思之夫嚮者豈能寒而不衣飢而不食乎今天下汲汲乎以財之不足為病何以異此國家創業之初四方割據中國之地至狹也然嵗嵗出師以誅討僭亂之國南取荆楚西平巴蜀而東下并潞其費用之衆又百倍於今可知也然天下之士未嘗思其始而惴惴焉患今世之不足則亦甚惑矣夫為國有三計有萬世之計有一時之計有不終月之計古者三年耕必有一年之蓄以三十年之通則可以九年無飢也嵗之所入足用而有餘是以九年之蓄常間而無用卒有水旱之變盜賊之憂則官可以自辦而民不知若此者天不能使之災地不能使之貧四夷盜賊不能使之困此萬世之計也而其不能者一嵗之入才足以為一嵗之出天下之産僅足以供天下之用其平居雖不至於虐取其民而有急則不免於厚賦故其國可靜而不可動可逸而不可勞此亦一時之計也至於最下而無謀者量出以為入用之不給則取之益多天下晏然無大患難而盡用衰世茍且之法不知有急則將何以加之此所謂不終月之計也今天下之利莫不盡取山陵林麓莫不有禁關有征市有租鹽鐵有𣙜酒有課茶有算則凡衰世茍且之法莫不盡用矣譬之於人其少壯之時豐健勇力然後可以望其無疾以至於壽考今未五六十而衰老之候具見而無遺若八九十者將何以待其後邪然天下之人方且窮思竭慮以廣求利之門且人而不思則以為費用不可復省使天下而無鹽鐵酒茗之稅將不為國乎臣有以知其不然也天下之費固有去之甚易而無損存之甚難而無益者矣臣不能盡知請舉其所聞而其餘可以類求焉夫無益之費名重而實輕以不急之實而被之以莫大之名是以疑而不敢去三嵗而郊郊而赦赦而賞此縣官有不得已者天下吏士數日而待賜此誠不可以卒去至於大吏所謂股肱耳目與縣官同其憂樂者此豈亦不得已而有所畏邪天子有七廟今又飾老佛之宮而為之祠固已過矣又使大臣以使領之嵗給以巨萬計此何為者也天下之吏為不少矣特患未得其人茍得其人則凡民之利莫不備舉而其患莫不盡去今河水為患不使濵河州郡之吏親行其災而責之以救災之術顧為都水監夫四方之水患豈其一人坐籌於京師而盡其利害天下有轉運使足矣今江淮之間又有發運祿賜之厚徒兵之衆其為費豈可勝計哉蓋嘗聞之里有畜馬者患牧人欺之而盜其芻菽也又使一人焉為之廄長廄長立而馬益癯今為政不求其本而治其末自是而推之天下無益之費不為不多矣臣以為凡若此者日求而去之自毫釐以往莫不有益惟無輕其毫釐而積之則天下庶乎少息也曽鞏議經費曰臣聞古者以三十年之通制國用使有九年之蓄而制國用者必於嵗杪蓋量入而為出國之所不可儉者祭祀也然不過用數之仂則先王養財之意可知矣蓋用之有節則天下雖貧其富易致也漢唐之始天下之用嘗屈矣文帝太宗能用財有節故公私有餘所謂天下雖貧其富易致也用之無節則天下雖富其貧亦易致也漢唐之盛時天下之用常裕矣武帝明皇不能節其制度故公私耗竭所謂天下雖富其貧亦易致也宋興承五代之敝六聖相繼與民休息故生齒既庶而財用有餘且以景德皇祐治平校之景德户七百三十萬墾田一百七十萬頃皇祐户一千九十萬墾田二百二十五萬頃治平户一千二百九十萬墾田四百三十萬頃天下嵗入皇祐治平皆一億萬以上嵗費亦一億萬以上景德官一萬餘員皇祐二萬餘員治平并幕職州縣官三千三百有餘其總三萬四千員景德郊費六百萬皇祐一千二百萬治平一千三十萬以二者校之官之衆一倍於景德郊之費亦一倍於景德官之數不同如此則皇祐治平用財之端多於景德也誠詔有司按尋載籍而講求其故使嵗之數入官之多門可考而知郊之費用財之多端可考而知然後合議其可罷者罷之可損者損之使天下之入如皇祐治平之盛而天下之用官之數郊之費皆同於景德二者所省者蓋半矣則又以類而推之天下之費有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之其約者必本其所以約之由而從之如是而力行以嵗入一億萬以上計之所省者十之三則嵗有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也古者言九年之蓄者計每嵗之入存十之三耳蓋約而言之也今臣之所陳亦約而言今其數不能盡同然要其大致必不遠也前世於凋弊之時猶能易貧而為富今吾以全盛之勢用財有節其所省者一則吾之一也其所省者二則吾之二也前世之所難吾之所易可不論而知也伏惟陛下沖靜質約天性自然乘輿器服尚方所造未嘗用一竒巧嬪嬙左右掖庭之間位號多闕躬履節儉為天下先所以憂憫元元更張庶事之意至誠惻怛格於上下其於明法度以養天下之財又非陛下之所難也按東坡南豐二公之論足以盡昭陵以來國計之本末然大槩其所以疲弊者曰養兵也宗俸也冗官也郊賚也而四者之中則冗官郊賚尤為無名故二論特詳焉所謂去之甚易而無損存之甚難而無益所謂其浮者必求其所以浮之自而杜之其約者必本其所以約之由而從之誠名言也神宗以國用不足留意理財熙寧元年謂文彥博等曰當今理財最為急務養兵備邊府庫不可以不豐大臣宜共留意節用乃命翰林學士司馬光御史中丞滕甫同看詳裁減國用制度帝曰宮中如私身有俸及八十千者嫁一公主至費七十萬緡如沈貴妃月俸八十萬皆浮於祖宗之時帝以勤儉率天下詔龍圖天章閣及禁中諸殿欄俱不用氊覆勵精為治大修憲度內自百司府寺外薄四海事為之制物為之法雖藏氷治竈畜羊之小事亦思有以節省帝患增置官司費財王安石反謂增創官司所以省費中書言諸倉主典役人增祿不厚不可責其亷謹請增至一萬八千九百緡復盡增選人之祿三司上新增吏祿數京師嵗增四十一萬三千四百餘緡監司諸州六十八萬九千八百餘緡時主新法者皆謂吏祿既厚則人知自重不敢冒法可以省刑然良吏實寡賕取如故往往陷重辟議者不以為善帝謂輔臣曰比閲內藏庫籍文具而已財貨出入初無關防前此嘗以龍腦真珠鬻於𣙜貨務數年不輸直亦不鈎考蓋領之者中官數十人惟知謹扄鑰塗窗牖以為固密安能鈎考其出入多少與所蓄之數乃令户部太府寺於內藏諸庫皆得檢察置庫百餘年至是始編閲焉初藝祖嘗欲積縑帛二百萬以裕內藏又别儲於景福殿元豐元年帝乃更景福殿庫名自製詩以揭之曰五季失固玁狁孔熾藝祖肇邦思有懲艾爰設內府基以募士曽孫保之敢忘厥志凡三十二庫後積羡贏又揭以詩曰每虔夕惕心妄意遵遺業顧豫不武姿何日成戎捷哲宗元祐元年議者謂熙寧以前上供無額外之求州縣無非法之斂自後獻利之臣不原此意惟務刻削以為己功事有所減如禁軍闕額與差出衣糧清汴水腳外江綱船之類例皆賫轉運司封樁上供即用度有增又令自辦上供名額嵗益加多有司財用日惟不足必至多方以取於民非法之征其原於此因請罷熙寧以來舊上供額外所創封樁錢物及內外封樁禁軍闕額奉給等樞密院議悉罷封樁慮諸路觀望於搜補兵備或闕緩急之事乃詔三路嶺南被邊勿封樁仗帥臣以占募餘路封樁仍舊詔曰邦賦之入蓋有常制若不裁減浮費量入為出深慮有誤國計宜令户部尚書侍郎同相度裁減條析以聞右司諌蘇轍奏臣竊聞熙寧以來天下財賦文帳皆以時上於三司至熙寧五年朝廷患其繁冗始命曽布刪定法式布因上言三部胥吏所行職事非一不得專意點磨文帳近嵗因循不復省閲乞於三司選吏二百人顓置一司委以驅磨是時朝廷因布之言於三司取天下所上帳籍視之至有到省三二十年不發其封者蓋州郡所發文帳隨帳皆有賄賂各有常數常數已足者皆不發封一有不足即百端問難要足而後已朝廷以其言為信帳司之興蓋始於此張設官吏費用錢物至元豐三年首尾七八年間帳司所管吏僅六百人用錢三十九萬貫而所磨出失陷錢止一萬餘貫朝廷知其無益遂罷帳司而使州郡應申省帳皆申轉運司內錢帛糧草酒麴商稅房園夏秋稅管額納畢鹽帳水腳鑄錢物料稻糯帳本司别造計帳申省其驛料作院欠負修造竹木雜物舟船柴炭修河物料施利橋船物料車驢草料等帳勘勾訖架閣蓋謂錢帛等帳三司總領國計須知其多少虛實故帳雖歸轉運司而又令别造計帳申省至於驛料等帳非三司國計虛贏所係故止令磨勘架閣又諸路轉運司與本部州軍地里不遠取索文字近而易得兼本道文帳數目不多易以詳悉自是內外簡便頗稱允當今户部所請收天下諸帳臣未委為收錢帛等帳邪為并收驛料等帳邪若盡收諸帳為依熙寧以前不置帳司不添吏人邪為依熙寧以來復置帳司復添吏人邪若依熙寧以前則三二十年不發封之弊行當復見若依熙寧以來則用吏六百人磨出失陷錢一萬餘貫而費錢三十九萬貫之弊亦將復見臣乞朝廷下户部令仔細分析聞奏然竊詳司馬光元奏自改官制以來舊日三司所掌事務散在六曹及諸寺監户部不得總天下財賦帳籍不盡申户部户部不能盡天下錢穀之數欲乞令户部尚書兼領左右曹其舊三司所管錢穀財用事有散在五曹及諸寺監者並乞收歸户部推其本意蓋欲使天下財用出納卷舒之柄一歸户部而户部周知其數而已今户部既已專領財用而元豐帳發轉運司常以計帳申省不為不知其數也雖更盡收諸帳亦徒益紛紛無補於事矣臣謂帳法一切如舊甚便乞下三省公議然後下户部施行蘇轍元祐會計録收支敘曰古者三年耕必有一年之蓄以三十年之通制國用則九年之蓄可跂而待也今者一嵗之入金以兩計者四千三百而其出之不盡者二千七百銀以兩計者五萬七千而其出之多者六萬錢以千計者四千八百四十八萬除末鹽錢後得此數而其出之多者一百八十二萬并言未破應在及泛支給賜得此數紬絹以匹計者一百五十一萬而其出之不盡者七十四萬草以束計者七百九十九萬而其出之多者八百一十一萬然則一嵗之入不足以供一嵗之出矣故凡國之經費折長補短常患不足小有非常之用有司輒求之朝廷待內藏末鹽而後足臣身典大計以為是偷嵗月可也數嵗之後將有不勝其憂者矣是以轍嘗推原其故方今禁中奉養有度金玉錦繡不逾其舊宫室不修犬馬不玩有司循守法制謹視出入之節未嘗有失也而其弊安在天下久安物盈而用廣亦理之常也顧所以處之何如耳臣請歷舉其數宗室之衆皇祐節度使三人今為九人矣兩使留後一人今為八人矣觀察使一人今為十五人矣防禦使四人今為四十二人矣百官之富景德大夫三十九人景德為諸曹郎中今為二百三十人矣朝奉郎以上一百六十五人景德為員外郎今為六百九十五人矣承議郎一百二十七人景德為博士今為三百六十九人矣奉議郎一百四十八人景德為三丞今為四百三十一人矣諸司使二十七人今為二百六十人矣副使六十三人今為一千一百一十一人矣供奉官一百九十三人今為一千三百二十二人矣侍禁三百一十六人今為二千一百一十七人矣三省之吏六十人今為一百七十二人矣其餘可以類推臣不敢以遍舉也昔者郎止前行卿有定員今之大夫朝議皆無限法尚書侍郎歷改三曹而今之正議銀青合而為一官秩并增不知其義夫國之財賦非天不生非地不養非民不長取之有法收之有時止於是矣而宗室官吏之衆可以禮法節也祖宗之世士之始有常秩者俟闕則補否則循資而已不妄授也仁宗末年任子之法自宰相以下無不減損英宗之初三載考績增以四嵗神宗之始宗室袒免之外不復推恩袒免之內以試出仕此四事者使今世欲為之將以為逆人心違舊法不可言也而况於行之乎雖然祖宗行之不疑當世亦莫之非何者事勢既極不變則敗衆人之所共知也今朝廷履至極之勢獨持之而不敢議臣實疑之誠自今日而議之因其勢循其理微為之節文使見任者無損而來者有限今雖未見其利要之十年之後事有間矣賈誼言諸侯之變以為失今不治必為痼疾今臣亦云茍能裁之天下之幸也左司郎中張汝賢復請下諸路轉運司會計自熙寧以前一嵗出入之數及常供泛用之差并熙寧復參考焉且條畫某事之費因某法而用今某法既改則某費可罷要亦省不急之用量入為出則無不足之憂從之元豐初作元豐庫嵗發坊場百萬緡輸之大觀時又有大觀東西庫徽宗崇寧後蔡京為相增修財利之政務以侈靡惑人主動以周官惟王不會為説每及前朝愛惜財賦減省者必以為陋至於土木營造率欲度前規而侈後觀元豐官制既行賦祿視嘉祐治平既優京更增供給食料等錢於是宰執皆增京又專用豐亨豫大之説諛悅帝意始廣茶利嵗以一百萬緡進御以京城所主之於是費用寖廣其後又有應奉司御前生活所營繕所蘇杭造作局御前人船所其名紛如大率皆以竒侈為功嵗運花石綱一石之費至用三十萬緡牟取無藝民不勝弊時用度日繁左藏庫異時月費緡錢三十六萬至是衍為一百二十萬緡又三省密院吏員猥雜有官至中大夫一身而兼十餘俸者故當時議者有俸入超越從班品秩幾於執政之言吏祿濫冒已極以史院言之供檢三省幾千人蔡京又動以筆貼於𣙜貨務支賞給有一紙至萬緡者京所侵私以千萬計朝論益喧户部言本部嵗用六百餘萬緡悉倚上供官吏違負者請以分數為科罪之等不及九分者罪以徒多者更加之嵗首則列次年之數聞於漕司考實申部從之是年以無額錢物督限未嚴乃更一季為一月靖康元年言者論天下財用嵗入有常須會其數宜量入為出比年以來有御前錢物朝廷錢物户部錢物其措置裒斂取索支用各不相知天下常賦多為禁中私財上溢下漏而民益重困欲以命户部取索措置其事且曲折得以周知大數而不失盈虛緩急之宜上至宫禁須索下逮吏卒廪餼一切付之有司格以法度示天下以至公詔從其請高宗建炎元年詔諸路無額上供錢依舊法更不立額自來年始紹興五年川陜宣撫司奏四川上供錢帛乞依舊留充贍軍俟邉事寧息如舊上曰祖宗積儲內帑本以備邉陲緩急之用今方多故軍旅未息宜從所請龍圖閣學士四川都轉運使李逮言唐劉晏理財謂亞管蕭是時天下嵗入緡錢千二百萬而管𣙜居其半今四川一隅之地𣙜鹽𣙜酒并諸色窠名錢已三倍晏數彼以千二百萬貫贍六師恢復中原而有餘今以三千六百萬貫贍一軍屯駐川陜而不足計司雖知冗濫力不能裁節雖知寬剩亦未敢除減但日夜憂懼嵗計不足而已十一年始命上供羅復輸內藏庫其後綾紗絹亦如之三十年户部奏科撥諸路上供米斛內外諸軍嵗費米三百萬斛而四川不與焉巽岩李氏曰唐分天下之賦為三曰上供送使留州及裴垍相憲宗更令諸道觀察調度先取於所治州不足乃取於屬州送使之餘與上供者悉輸度支當時兵費皆仰度支未嘗别為之名凡度支錢悉係省也今所謂係省特唐留州及送使錢耳送使錢既無幾其上供錢則往往移以贍軍移上供以贍軍此天子之甚盛德也孝宗乾道二年詔孫大雅奏漢制上計之法朕以為可行於今令侍從臺諌參考古制進呈先是知秀州孫大雅置本州拘催上供錢格自來上且言漢制嵗盡郡國詣京師奏事至中興則嵗終遣吏上計於正月旦天子幸德陽殿臨軒受賀而屬郡計吏皆覲以詔殿最今也不然未嘗有甘泉上計之制而臣始為之蓋法漢之大司農郡國四時上月旦見錢穀簿其逋未畢各具列之意以為書也於是監察御史張敦實劉貢言一縣必有一縣之計一郡必有一郡之計天下必有天下之計天下之計總郡縣而嵗考焉三代遠矣方册可得而知者自禹九州成賦中邦因南巡狩而至大越登茅山而會諸侯號其山曰會稽後立會稽郡漢書注云以其會諸侯之計於此也逮至周官所載最為詳悉天官冢宰之屬理財居其半掌財用而言嵗終則會者凡十又大府之職嵗終則以貨賄之入出會之小宰之職嵗終則令群吏致事鄭氏注云若今之上計也漢承秦後蕭何收其圖籍知張蒼善算於是令以列侯居相府領郡國上計者此則漢初之制專命一人以掌天下所上之計也至武帝建元三年詔吏民有明當世之務習先聖之術者縣次續食令與計偕注云計者上計簿使也郡國每嵗遣詣京師上之元封五年三月朝諸侯王列侯受郡國計太初元年十二月又受計於甘泉天漢三年又受計於泰山之明堂太始四年三月又受計於泰山之明堂是則終武帝之世五十餘年之間一受計於帝都三受計於方嶽或以三月或以十二月之不同也至宣帝黃龍元年正月下詔曰方今天下少事而民多貧盜賊不畢其咎安在上計簿文具而已務為欺謾以避其課令御史察計簿疑非實者案之使真偽無相亂是則在宣帝之時郡國所上計簿已不能無弊矣光武中興嵗終遣吏上計遂為定制正月旦天子幸德陽殿臨軒受賀而屬郡計吏皆在列置大司農掌之其逋未畢各具列之今孫大雅所陳者是也然西漢言郡國上計東漢言屬郡計吏則遠方者在東漢未必偕至矣漢之大司農則今之户部也竊見户部掌天下之財計有上限中限末限之格法有月催旬催五日一催之期會每於嵗終獨以常平收支户口租稅造册進呈而於諸郡諸色窠目尚略焉是於三代嵗終則會與兩漢上計之法為未備也然而去古逾遠文籍愈煩在西漢已不免文具之弊况今日能盡革其偽乎在東漢止於屬郡之內况今日川廣之遠能使其如期畢至乎臣等愚見莫若嵗終令户部盡取天下州郡一嵗之計已足未足虧少虧多之數並皆造册正月進呈兼採漢初之制丞相選差一人考核户部所上計而明州郡之殿最則三代兩漢之制皆兼該而無不舉之處矣詔户部措置其後户部言諸路州軍嵗起上供諸色窠名錢帛各有條限年額數目本部每年預期行下逐路監司及州軍依限催納其嵗終具常平收支并稅租課利旁通係取前二年數户部本年數造册進呈內不到路分次年附進今來張敦實等奏陳嵗終令户部盡取天下州郡一嵗之計已足未足虧少虧多之數造册正月進呈緣諸路州軍地里遠近不同竊慮次年正月未能盡實申到若候取會齊足攢造亦恐後時今欲立式遍下諸路州軍各以本州每嵗應於合發上供窠名錢帛糧斛數目置籍照條限鈎考發納嵗終開具造册須管次年正月了畢詣闕投進降付户部參考將拖欠州軍取旨黜責施行上曰如此措置甚善從之是年宰執進呈户部收支細數見管只四十二萬而未催之錢乃二百八十餘萬是知乾道仁民之政不盡斂以歸國而財賦之藏於州縣如此淳熙十年詔左藏南庫撥𨽻户部嘗試考昔驗今至道中嵗入一千二百餘萬天禧末嵗入三千六百餘萬嘉祐嵗入三千六百八十餘萬熙寧嵗入五千六十餘萬寧宗時嵗入六千餘萬然則土地之廣狹財賦之多少可以考矣司版曹之計者尚忍求詳生財之方乎葉適應詔條奏財總論曰財用今日之大事也必盡究其本末而後可以措於政事欲盡究今日之本末必先考古者財用之本末蓋考古雖若無益而不能知古則不知今故也夫財之多少有無非古人為國之所患而今世乃以為其患最大而不可整救此其説安從出哉蓋自舜禹始有貢賦之法以會計天下之諸侯比於堯嚳以前為密矣今禹貢之所載是也然總秸米粟不及於五百里之外九州之貢入貢於今世乃充庭之儀品蓋千百之一二耳周公之為周治其財用視舜禹則已詳然王畿千里之外法或不及千里之內猶不盡取蓋三代之所取者正天下之疆理而借民力以治公田為其無以阜通流轉則作幣鑄金以權之當是之時不聞其以財少為患而以財多為功也雖然此其事遠矣鹽策末利起自春秋魯之中世田始有稅然諸侯各以其國自足而無煎熬逼迫之憂蓋漢文景之盛而天下之財不以入關中人主不租稅天下而諸侯若吳人者亦不租稅其田光武明章未聞其以財少自困而中年常更盜賊夷狄之難內外征討亦不大屈惟秦始皇豪暴有頭會箕斂之譏漢武帝奢侈有均𣙜征算之政而西園聚錢大鬻天下之官爵以致之蓋兩漢雖不足以言三代而其以財為病非若今世也雖然此其事遠矣分為三國裂為南北無嵗不戰無時少安且其運祚迫蹙禍變煩興至於調度供億猶自有序而亦豈若今日之貧窘漏底哉此皆具載册書可即而見者雖然此其事遠矣隋最富而亡唐最貧而興唐之取民以租以庸以調過此無取也而唐之武功最多闢地最廣用兵最久師行最勝此其事則差近而可知矣致唐之治有唐之勝其不待多財而能之也決矣然則其所以不若唐者非以財少為患也故財之多少有無非古人為國之所患所患者謀慮取捨定計數必治功之間耳非如今日以一財之不足而百慮盡廢奉頭竭足以較錙銖譬若慵夫淺人劫劫焉徒知事其口腹而已者也以財少為患之最大而不可整救其説稍出於唐之中世盛於本朝之承平而其極甚乃至於今日其為國之名物采章精神威望一切銷耗內之所以取悅於民外之所以示威於敵者一切無有習為寬緩迂遠之常説以文其無用而盡力於茍且督迫鞭撻疲民舞小文而謂之有能陛下回顧而加聖思必有大不可安者故臣以為不究古者財之本末循而至於本朝以去其錯謬而不合於常經者則無以知財之多少有無不足為國家之患此而不知則天下之大計皆不可得而預論而况望其有所施行以必成效哉又曰唐末藩鎮自擅財賦散失更五代而不能收加以非常之變屢作排門空肆以受科斂之害而財之匱甚矣故太祖之制諸鎮以執其財用之權為最急既而僭偽次第平一諸節度伸縮惟命遂強主威以去其尾大不掉之患者財在上也至於太宗真宗之初用度自給而猶不聞以財為患及祥符天禧以後內之蓄藏稍以空盡而仁宗景祐明道天災流行繼而西事暴興五六年不能定夫當仁宗四十二年號為本朝至平極盛之世而財用始大乏天下之論擾擾皆以財為慮矣當是時也善人君子以為昔之已取者固不可去而今之所少者不可復取皆甘心於不能所謂精悍駔儈之吏亦深自藏不敢奮頭角以裒斂為事雖然極天下之大而無終嵗之儲愁勞苦議乎鹽茗𣙜貨之間而未得也是以熙寧新政重司農之任更常平之法排兼并專斂散興利之臣四出候望而市肆之會關津之要微至於小商賤𨽻什百之獲皆有以征之蓋財無乏於嘉祐治平而言利無甚於熙寧元豐其借先王以為説而率上下以利曠然大變其俗矣崇觀以來蔡京專國柄託以為其䇿出於王安石曽布呂惠卿之所未工故變鈔法走商賈窮地之寶以佐上用自謂其蓄藏至五千萬富足以備禮和足以廣樂百侈並鬭竭力相奉不幸黨與異同屢復屢變而王黼又欲出於蔡京䇿畫之所未及者加以平方臘則加斂於東南取燕山則重困於北方而西師凡二十年關陜尤病然後靖康之難作矣方大元帥建府於河北而張慤任饋餉之責者鹽鈔數十萬緡而已及來維揚而黃潛善呂頤浩葉夢得之流汲汲乎皆以𣙜貨自營而收舊經制錢之議起矣况乎大將殖私軍食自制無復承統轉運所至剗刷攫拏朝廷科降大書文移守令丞佐持巨校將五百追捉鄉户號痛無告贓貪之人又因之以為己利而經總制之窠名既立添酒折帛月樁和糴皆同常賦於是言財之急自古以來莫今為甚而財之乏少不繼亦莫今為甚也自是以後辛巳之役甲申之役邊一有警賦斂輒增既增之後不可復減嘗試以祖宗之盛時所入之財比於漢唐之盛時一再倍熙寧元豐以後隨處之封樁役錢之寬剩青苖之結息比治平以前數倍而蔡京變鈔法以後比熙寧又再倍矣王黼之免夫至六千餘萬緡其大半不可鉤考然要之渡江以至於今其所入財賦視宣和又再倍矣是自有天地而財用之多未有今日之比也然其所以益困益乏皇皇營聚不可一朝居者其故安在夫計治道之興廢而不計財用之多少此善於為國者也古者財愈少而愈治今者財愈多而愈不治古者財愈少而有餘今者財愈多而不足然善為國者將從其少而治且有餘乎多而不治且不足乎而况於多者勞而少者逸豈惡逸喜勞而至是哉故臣請陳今日財之四患一曰經總制錢之患二曰折帛之患三曰和買之患四曰茶鹽之患四患去則財少財少則有餘有餘則逸有餘而逸以之求治朝令而夕改矣右水心外藁所上財總論二篇足以見歷代理財之大槩及中興以後財愈多而事愈不立之深病故備載之於國用考之終至其所言經總制和買折帛錢則各具本門左藏庫者國家經費所貯係幫支三衙百官請給及宗廟宮禁非泛之費并將校衛卒閣門醫職近侍請給皆出焉左藏南庫本御前樁管激賞庫紹興休兵後秦檜取户部窠名之可必者盡入此庫户部告乏則與之由是金幣山積士大夫指為瓊林大盈之比高宗嘗出數百萬緡以佐調度淳熙末始併歸户部左藏封樁庫孝宗所創其法非奉親非軍需不支至淳熙末年往往以犒軍或造軍器為名撥入內庫或睿思殿或御前庫或修內司有司不敢執內藏庫即祖宗時舊置元豐三十二庫崇寧後為大觀東西庫秦檜用事時每三宮生辰及春秋內教冬年寒食節與諸局所進書皆獻令幣由是內帑山積紹興末詔除太后生辰及內教外餘並減半孝宗初又併進書禮物罷之紹熙初始數取封樁錢入內藏御前甲庫者紹興中置凡乘輿所需圖畫什物有司不能供者悉於甲庫取之故百工伎藝之巧者皆出其間日費毋慮數百千禁中既有內酒庫而甲庫所釀尤勝以其餘酤賣頗侵户部課額以此庫儲常不足臣僚以為言乃罷之三省樞密院激賞庫者渡江後所創自建炎龍興賞膳始減至維揚及臨安又減紹興四年秋趙元鎮為川陜荆襄都督既而不行遂以督府金錢入此庫十年秦檜之當國以兀术畔盟用兵須犒賜之物乃計畝率錢遍天下五等貧民無免者然兵未嘗舉而所斂錢盡歸激賞庫其後嵗支至三十八萬緡堂厨萬五千東厨萬二千玉牒所日歷敕令所國史院尚書省犒設中書門下密院支費各有差議者指為冗費後減二十萬緡孝宗時再減十萬緡合同憑由司者宫禁所取索也嵗取金銀錢帛率以百萬計版曹照數除破不能裁節修內司掌宮禁營繕嵗輸緡錢二十萬以給其費後減其半𣙜貨務都茶場者舊東京有之建炎二年始置於揚州明年置於江陵紹興三年置於鎮江及吉州五年省吉州務而行在務移於臨安嵗收茶鹽香息錢豐儲倉者紹興二十六年始置韓尚書仲通在版曹請别儲粟百萬斛於行都以備水旱號豐儲其後鎮江建康關外四川皆有之東南三總領所掌利權皆有定數然軍旅飢饉則告乞於朝惟四川在遠錢幣又不通故無事之際計臣得以擅取豫之權而一遇軍興朝廷亦不問諸州軍資庫者嵗用省記也舊制每道有計度轉運使嵗終則會諸郡邑之出入盈者取之虧者補之故郡邑無不足之患自軍興計司常患不給凡郡邑皆以定額窠名豫之加賦增員悉所不問由是州縣始困近嵗離軍添差大為州郡之患紹興十一年四月己未初用張循王奏離軍將佐並與添差州郡患無以給二十七年六月丙辰兵部奏大郡毋過百人次郡半之小郡三十人為額從之而宗室戚里歸明歸正甚至於樂藝賤工胥史雜流亦皆添差慶元一郡而添差四十員盡本府七場務所入不足以給四員總管之俸其間有十五年不徙任者計其俸入錢二十餘萬緡米十餘萬斛揚州會府也嵗輸朝廷錢不滿七八萬而本州支費乃至百二十萬緡民力安得不困紹熙初議者請裁定朝廷經費然後使版曹盡會一嵗之入正其舊籍削去虛額擇諸路監司之愛民而知財計者俾之稽考調度蠲其煩重以寬民力朝廷未克行今之為郡者但能撙節用度譏察滲漏使嵗計無乏已號過人無復及民之政矣公使庫者諸道監帥司及州軍邊縣與戎帥皆有之蓋祖宗時以前代牧伯皆斂於民以佐厨傳是以制公使錢以給其費懼及民也然正賜錢不多而著令許收遺利以此州郡得以自恣若帥憲等司則又有撫養備邊等庫開抵當賣熟藥無所不為其實以助公使耳公使苞苴在東南為尤甚揚州一郡每嵗饋遺見於帳籍者至十二萬緡江浙諸郡酒每以嵗遺中都官嵗五六至至必數千瓶淳熙中王仲行尚書為平江守與祠官范致能胡長文厚一飲之費率至千餘緡時蜀人有守潭者又有以總計攝潤者視事不半嵗過例饋送皆至四五萬緡供宅酒至二百餘斛孝宗怒而絀之九年正月戊子三月乙未然其風蓋未殄也東南帥臣監司到罷號為上下馬鄰路皆有饋計其所得動輒萬緡近嵗蜀中亦然其會聚之間折爼率以三百五十千為凖有一身而適兼數職者則併受數人之饋獻酬之際一日而得二千餘緡其無藝如此頃嵗陳給事峴為蜀帥馮少卿憲為成都漕就以所遺元物報之陳怒奏其容覆贓吏朝廷移之逮陳敗乃得直時芮國器侍郎趙子直丞相相繼為江西漕凡四方之聘幣皆不入於家斥其資置養濟院於南昌以養貧者朱少卿時敏為潼川守受四方之饋每以其物報之趙德老鎮成都受而别儲之臨行以散宗室之貧者此皆廉節之可紀者也惟總領所公使錢以料次取於大軍庫故斂不及民然正賜不多而嵗用率十數萬每嵗終上其數於户部輒以勞軍除戎器為名版曹知而不詰也所謂公使醋錢者諸郡皆立額白取於屬縣縣斂於民吏以輸之小邑一嵗亦不下千緡人尤以為怨謂宜罷互送而損遺利使上下一體而害不及民則合祖宗制公使之意矣右左藏庫以下皆建炎以來朝野雜記所載宋朝渡江後帑藏之大概而其制多承東京之舊至軍資庫公使庫則皆財賦之在州郡者也夫以經總制月樁錢觀之則其徴取於州郡者何其苛細以軍資公使庫觀之則其儲蓄之在州郡者又何其寬假也夫其徴取之苛細則民宜痛受椎剝之苦儲蓄之寬假則吏宜大肆侵盜之惡而俱不然何也蓋國家之賦斂雖重而所以施於百姓者常有慘怛忠厚之意故民無怨讟州郡之事力雖裕而所以勵士大夫者一皆禮義廉恥之維故吏少貪汙又宋承唐之法分天下財賦為三曰上供曰送使曰留州然立法雖同而所以立法之意則異唐之法起於中葉之後蓋版籍隳廢體統陵夷藩方擅財賦以自私而朝廷不知人主又多好殖私財節鎮刺史往往取經常之賦以供內府之所進奉上之人因而利之遂不復能究其嵗入之數而茍為是姑息之舉則其意出於私也宋之法立於承平之時蓋拊民以仁馭吏以禮而人主未嘗有耽欲黷貨之事雖內藏之蓄積常捐以助版曹則州郡之財賦固已其不必盡歸之京師又使為監司郡守者厨傳支吾官給其費則不取之於民而因以行寬裕之政則其意出於公也然此法沿襲既久得失相半其得者則如前所云而其失者蓋自中興以來朝廷之經費日夥則不免於上供之外别立名色以取之州郡如經總制月樁錢之類是也州郡之事力有限則不免於常賦之外别立名色以取之百姓如斛靣米頭子錢之類是也蓋其所以倚辦責成於州郡者以其元有樁留之賦然有限之樁留不足以給無藝之徴取又其法立於倥傯之時州郡利源之厚薄事力之優劇不能審訂斟酌而一概取之故郡計優裕幸而長吏又得廉幹之人則撙節奉上之外其餘力又可代輸下户之逋懸對補無名之窠額若郡計凋弊不幸而長吏又值貪庸之輩則經常之賦入不登於版曹而並緣之漁獵已遍及於閭閻矣愚常備論其事於經總制錢之末雖然仁厚之澤所以著在人心者何也蓋雖愧於取民有制之事而每有視民如傷之心故奉行之者不敢亟疾所謂不從其令而從其意者是也雖不免季世征斂之法而能行之以士君子忠厚之心故蒙被者不見其苛嬈所謂不任法而任人者是也文獻通考卷二十四
