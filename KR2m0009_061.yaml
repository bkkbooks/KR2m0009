body:
  text: 文獻通考卷六十一鄱陽馬端臨貴與著職官考十五司𨽻校尉司𨽻周官也掌五𨽻之法辨其物而掌其政令五𨽻謂罪𨽻四翟之𨽻也物謂衣服兵器之屬帥其民而捕盜賊漢武帝征和四年初置司𨽻校尉持節從中都官徒千二百人中都官京師諸官府捕巫蠱督大姦猾督謂察視之後罷其兵察三輔三河𢎞農晉志曰漢武帝初置十三州刺史各一人又置司𨽻校尉察三輔三河𢎞農七郡元帝初元四年去節後諸葛豐為司𨽻又加節尋復去之司𨽻去節自豐始也諸葛豐為司𨽻無所回避侍中許章以外屬貴幸賔客犯法與章相連豐欲劾奏適逢章出豐駐車舉節招章曰下欲收之章馳去豐奔車逐之章遂入殿得免因此成帝遂收豐節成帝元延四年省綏和二年哀帝復置但為司𨽻除校尉字冠進賢冠屬大司空比司直司𨽻掌察皇太子以下行馬內事皆主之専道而行専席而坐初除皆謁兩府兩府謂丞相御史也唯涓勳初為司𨽻不肯謁丞相御史大夫後為翟方奏免乂漢書曰鮑宣字子都眀經為司𨽻丞相孔光行園陵官屬行馳道中宣使斂止丞相掾史沒入其車馬摧辱宰相又王駿為司𨽻校尉奏免丞相匡衡又蓋寬饒為司𨽻亦無所回避後漢復為司𨽻校尉所部河南尹河內右扶風左馮翊京兆尹河東𢎞農凡七郡治河南洛陽北齊書曰後漢凡皇族不得典三河蓋忌其親而惜形迹之地無所不糾唯不察三公後漢江馮上言宜令司𨽻校尉督察三公陳元議以為不宜使有司省察公輔乃止廷議處九卿上朝賀處公卿下鮑永為司𨽻鮑恢為都官從事並不避強禦詔䇿曰貴戚且當斂手以避二鮑又中常侍王甫曹節等用事尚書令陽球常唾手拊髀曰當令陽球作司𨽻此輩敢爾及後拜司𨽻遂表劾王甫自臨考父子皆死於杖下曹節見甫尸乃收淚入言球罪帝徙為衛尉球叩頭曰願假臣一月必令豺狼鴟梟悉伏其辜又李膺字元禮拜司𨽻校尉張讓弟朔為野王令貧殘無道畏膺而逃藏讓舍柱中膺率將吏破柱取朔付獄殺之自是宦官屏氣休沐不敢復出帝問其故並叩頭泣曰畏李司𨽻凡司𨽻屬官有從事史十二人其都官從事史至為雄劇主察百官之犯法者魏晉司𨽻與二漢同劉聰僣號置左右司𨽻司𨽻於端門外坐在諸卿上絶席其入殿按本品秩在諸卿下不絶席初以司𨽻官屬制置如州儀而俗稱之司州見太康記及魏晉乃以京輔所部定名置司州以司𨽻校尉統之及東晉渡江罷司𨽻校尉官變其職為揚州刺史後魏北齊為司州牧後周有司𨽻下大夫掌五𨽻及徒者捕盜賊囚執之事屬大司冦隋初有雍州牧後煬帝置司𨽻臺有大夫一人掌諸巡察薛道衡為司𨽻大夫别駕二人分察畿內一人按東都一人按京師後又罷司𨽻臺裴藴為御史大夫欲重已權令虞世基奏罷司𨽻刺史以下官屬而留司𨽻從事之名不為常員臨時選京官清眀者權攝以行唐無司𨽻校尉而有亰畿採訪使亦其職也州牧刺史黃帝立四監以治萬國唐有九州舜置十二州有牧夏為九州牧殷周八命曰牧秦置監察御史漢興省之至惠帝三年又遣御史監三輔郡察詞訟所察之事凡九條監者二歲更之常以十月奏事十二月還監其後諸州復置監察御史文帝十三年以御史不奉法下失其職乃遣丞相史出刺并督察監察御史武帝元封元年御史止不復監五年乃置部刺史掌奉詔六條察州凡十二州焉漢制刺史以六條問事非條所問即不省一條強宗豪右田宅踰制以強凌弱以衆暴寡二條二千石不奉詔書遵承典制背公向私旁詔守利侵漁百姓聚斂為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則任賞煩擾刻暴剝截黎元為百姓所疾山崩石裂祅祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙榮勢請託所監六條二千石違公下比阿附豪強通行貨賂割損正令居部九歲舉為守相成帝綏和元年以為刺史位下大夫而臨二千石輕重不相凖乃更為州牧秩真二千石位次九卿九卿缺以髙第補是時何武與翟方進奏曰古選諸侯賢者以為州伯今部刺史居牧伯之位選第大吏所薦位高至九卿所惡立退任重職大春秋之義用貴理賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖請罷刺史更置州牧以應古制奏可哀帝建平二年復為刺史時朱博又奏曰漢家丘置郡縣部刺史奉使典州督察郡國吏人安寧故事居部九歲舉為守相其有異材功效著者輒登擢秩卑賞厚咸勸功樂進今增秩為牧以高第補九卿其中材則茍自守而已恐功效陵夷姦宄不禁臣請罷牧置刺史如故奏可元壽二年復為牧後漢光武建武十八年復為刺史外十二州各一人其一州屬司𨽻校尉漢刺史乘傳周行郡國無適所治中興所治有定處舊常以八月巡行所部常以秋分行部郡國各遣二吏迎之界上録囚徒考殿最初歲盡詣京都奏事中興但因計吏不復自詣京師建武十一年初斷州牧自還奏事雖父母之喪不得去職元嘉元年初聽刺史二千石行三年服延熹二年復斷之或謂州府為外臺謝夷吾為荆州刺史第五倫薦之曰尋功簡能為外臺之表聽察聲實為九伯之冠靈帝中平五年改刺史惟置牧是時天下方亂豪傑各欲據有州郡而劉焉劉虞並自九卿出領州牧州牧之任自此重矣舊制州牧奏二千石長吏不任位者事皆先下三公三公遣掾史按驗然後黜退光武即位用法眀察不復委三府故權歸舉刺之吏魏晉為刺史任重者為使持節都督輕者為持節皆銅印墨綬進賢兩梁冠絳朝服領兵者武冠而晉罷司𨽻校尉置司州江左則揚州刺史自魏以來庶姓為州而無將軍者謂之單車刺史庶姓謂非帝族凡單車刺史加督進一品都督進二品不論持節假節晉制刺史三年一入奏甲午詔書曰刺史銜命國之外臺其非所部而在境者刺史并糾之宋與魏同梁刺史受之眀日辭宮廟而行皆持節後魏天錫二年又制諸州置三刺史皇室一人異姓二人比古之上中下三士也郡置三太守縣置三令長孝文太和中次職令自後魏北齊則司州曰牧而北齊制州為上中下三等每等又有上中下之差自上上州至下下州凡九等後周則雍州曰牧而制刺史初除奉辭之日備列鹵簿凡總管刺史則加使持節諸軍事以此為常及蘇綽為六條之制初文帝秉魏政令百官誦習其牧守令長非通六條及計帳者不得居官六條之制其略曰其一先治心心不清淨則思慮妄生見理不眀是以治民之要在於清心而已其二敦教化其三盡地利其四擢賢良其五恤獄訟其六均賦役靜帝大象元年詔總管刺史及行兵者加持節餘悉罷之隋雍州置牧餘州並置刺史亦同北齊九等之制總管刺史加使持節至開皇三年罷郡以州統縣自是刺史之名存而職廢後雖有刺史皆太守之互名理一郡而已非舊刺史之職按魏置使持節寵奉使官之任隋氏廢郡而以刺史牧人既非使官則合罷持節之稱其時制置不以名實相副為意仍舊存之後改為太守亦復不省所以使持節之名及於邊逺小郡乃不徴典故之失刺史縣令三年一遷諸有兵處則刺史𢃄軍事以統之煬帝乃别置都尉領兵兵不屬郡十四年改九等州縣為上中下凡三等煬帝大業初復罷州置郡為司𨽻臺大夫一人巡察畿內又有司𨽻刺史房彥謙嘗為之其刺史十四人巡察畿外諸郡亦有六條之制與漢六條不同從事四十人副刺史巡察每年二月乘軺巡郡縣十月入奏唐武德元年罷郡置州改太守為刺史而雍州置牧至神龍二年二月分天下為十道置巡察使二十人一道二人以左右臺及內外官五品以下堅眀清徑者為之兼按郡縣再期而代至景雲二年改置按察使道各一人開元十年省十七年復置二十三年改置採訪處置使其有戍旅之地即置節度使仍各置印天寶九載三月敕本置採訪使令舉大綱若大小必由是一人兼理數郡自今已後採訪使但採察善惡舉其大綱自餘郡務所有奏請並委郡守不須干及理於所部之大郡至德之後改採訪使為觀察觀察皆并領都團練使其僚屬隨事增置分天下為四十餘道大者十餘州小者二三州各因其山川區域為制諸道增減不恆使名沿革不一舉其職例則皆古之刺史云都督總管節度團練都統等使附後漢光武建武初征伐四方始權置督軍御史事竟罷建安中魏武為相始遣大將軍督之而袁紹分沮授所統諸軍為三都督紹以沮授郭圗淳于瓊各典一軍魏武征孫權還又使夏侯惇督二十六軍魏文帝黃初三年始置都督諸州軍事或領刺史又上軍大將軍曹真都督中外諸軍假黃鉞則總統外內諸軍矣眀帝太和四年司馬宣王征蜀加號大都督髙貴鄉公正元二年司馬文王都督中外諸軍尋加大都督晉受魏禪則都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下使持節得殺二千石以下持節殺無官位人若軍事得與使持節同假節唯軍事得殺犯軍令者及伐吳之役以賈充為使持節假黃鉞大都督總統六師兼給羽葆鼓吹緹幢兵萬人騎二千置左右長史司馬從事中郎增參軍騎司馬各十人帳下司馬二十人大車官騎各三十人太康中都督知軍事刺史理人各用人也惠帝末乃并任非要州則單為刺史庾翼都督征討諸軍事鎮襄陽綏懷招納立客館置典賓參軍江左以來都督中外尤重惟王𨗳等權重者乃居之宋氏人臣則無居者惟江夏王義恭得假黃鉞假黃鉞則専戮節將非人臣常器又有都督諸州諸軍事者則為常職舊曰監某州諸軍事文帝即位改監為都督後魏有都督中外諸軍事永安以後近遠多事置京畿大都督總攝軍人立府置佐後周改都督諸軍事為總管則總管為都督之任矣又有大都督帥都督都督至隋三都督並以為散官煬帝改大都督為校尉帥都督為旅帥都督為隊正唐武德七年改上大都督為驍騎尉大都督為飛騎尉帥都督為雲騎尉都督為武騎尉按此則都督之名微矣隋文帝以并益荆揚四州置大總管并益揚三州以親王臨統唯荆州以韋世康為之時論以為美其餘總管府置於諸州列為上中下三等加使持節煬帝悉罷之唐諸州復有總管亦加號使持節刺史加號持節武德元年諸州總管亦加號使持節五年以洺荆并幽交五州為大總管府七年改大總管府為大都督府總管府為都督府舊洺州已置都督府武德四年廢府置大行臺復有行軍大總管者蓋有征伐則置於所征之道以督軍事武德以來亦有元帥之號太宗為秦王加西討元帥中宗為周王為洮河道元帥睿宗為相王為并州道行軍元帥安祿山反後天寶十五載哥舒翰為諸道兵馬元帥其後李光弼郭子儀復為副元帥李峘李若幽李勉又為兵馬都統蓋從其宜也太極初以并益荆揚為四大都督府開元十七年加潞州為五焉其餘都督定為上中下等上都督府五中都督府十三下都督府十六前後制置改易不恆難可偹敘凡大都督府置大都督一人掌所管都督諸州城隍兵馬甲仗食糧鎮戍等親王為之多遙領其任亦多為贈官長史居府以總其事各有長史司馬録事功曹以下官屬因員數多少與諸州府有差其職事不異具郡佐篇分天下州縣制為諸道每道置使理於所部即採訪防禦等使也其邊方有寇戎之地則加以旌節謂之節度使自景雲二年四月始以賀拔延嗣為涼州都督充河西節度使其後諸道因同此號得以軍事專殺行則建節府樹六纛外任之重莫比焉本皆兼度支營田使開元九年十一月敕其河東河北不須别置並令節度使兼充有副使一人副二使行軍司馬一人申習法令自漢魏至隋總戎出征則刺史都督將軍等官置長史司馬諸曹參軍為之寮佐按官置司唐本制大總管乃前代専征之任其寮佐亦多同之自後改為節度大使署副使判官以為寮佐如前代長史已下之任然長史司馬及諸曹是曰官名副大使副使判官乃為使職有所改易合隨府主置大使則有副使已下今若改名使府不合設官充其寮吏蓋因授任者莫詳其源既有副使又置司馬參雜重設遂為其例况不標於甲令固須區别著定恆規也判官二人分判倉兵騎胄四曹事副使及行軍司馬通署掌書記一人掌表奏書檄齊書曰宋江夏王義恭取邱巨源為掌書記參謀無員或一人或二人參議謀畫隨軍四人分使出入開元中凡八節度使磧西河西隴右朔方河東幽州劍南嶺南此八節度也後更增加兼改名號蓋古之持節都督江左四中郎將近代行軍總管之任凡將帥出行兵滿萬人以上則置長史司馬倉兵等曹參軍若萬人以下員數遞減自至德以來天下多難諸道皆聚兵增節度使為二十餘道其非節度使者謂之防禦使以採訪使并領之採訪理州縣防禦理軍事初節度與採訪各置一人天寶中始一人兼領之乾元中始置都統使監總管諸道或領三道或領五道皆古方嶽牧伯之任也上元末省都統後又改防禦使為都團練守捉使皆主兵事而無旌節寮屬亦減有副使一人掌二使事判官二人分判軍事自永泰以來都團練使稍有加置參謀者若朝覲則置留後擇其人而任之宋武帝起義討桓元既平京口向建業以孟昶為長史總攝後事及討司馬休之伐荆州以中軍將軍劉道鄰監留府事皆留後之任也自後無代無之不復遍舉都護漢宣帝地節二年初置西域都護為加官也或以騎都尉諫議大夫使護西域三十六國有副校尉始以鄭吉為之後廢至後漢永平十七年復置班超為西域都護大破焉耆尉犁斬其王自是西域降伏納質者五十餘國晉宋以後有都護之官亦其任也齊書曰廣州西南有二江川源深逺别置督護専征討之任陳伯超為西江都護沈顗為南江都護唐永徽中始於邊方置安東安西安南安北四大都護府後又加單于北庭都護府麟德元年改雲中都護為單于都護府置都護一人掌所統諸藩慰撫征討斥堠安輯蕃人及諸賞罰敘祿勳功總判府事副都護二人掌二都護事其安北單于則置一人長史司馬各一人録事功曹倉曹戶曹兵曹法曹參軍各一人參軍事三人其安北單于唯有司馬倉曹兵曹各一人餘並不置觀風俗使唐貞觀八年分遣蕭瑀李靖楊恭仁王圭竇靜李大亮劉德威皇甫無逸韋挺李襲譽張亮杜正倫趙智等巡省天下延問疾苦觀風俗之得失察政刑之苛弊以後不復置巡察按察巡撫等使貞觀二十年遣大理卿孫伏伽等二十一人以六條巡察四方多所舉刺太宗命褚遂良一其類以聞乃親自臨決牧宰以下以能官進擢者二十人罪死者七人流罪以下免黜數百人天授二年發十道存撫使以右肅政御史中丞知大夫事李嗣真等為之時分巡天下者皆左右臺官神龍二年敕左右臺內外五品已上官識理通眀無屈撓者二十人分為十道巡察使二周年一替以亷按州郡景龍二年置十道按察使分察天下至開元八年五月復置十道按察使以陸象先王皎等為之正元八年以江淮荆襄陳宋河朔水災遣中書舍人奚陟左庶子姚齊語祕書少監雷成京兆少尹韋武為諸道宣撫使賑給災荒均平賦役疏決囚繫懲肅官吏元和四年以旱災復遣左司郎中鄭敬等為諸道宣撫使黜陟使貞觀八年發十八道黜陟大使二十年遣大理卿孫伏伽等以六條巡察四方黜陟官吏開元二十一年遣使以崔翹等為之天寶五載遣使以席豫等為之至德二載遣使以虢王等為之建中元年以庾何等為之自建中以後省採訪處置使開元二十二年初置十道採訪處置使以御史中丞盧絢等為之仍置印二十五年命諸道採訪使考課官人善績三年一奏永為常式天寶九載敕採訪使但察訪善惡舉其大綱自餘郡務所有奏請並委郡守不須干及乾元元年詔近緣狂寇亂常每道分置節度其管內緣徴遣及文牒兼使命來往州縣應命非不艱辛仍加採訪轉益煩擾其採訪使置來日久并諸道黜陟使宜且停待後當有處分其年改為觀察處置使容齋洪氏隨筆曰唐世於諸道置按察使後改為採訪處置使治於所部之大郡既又改為觀察其有戎旅之地即置節度使分天下為四十餘道大者十餘州小者二三州但令訪察善惡舉其大綱然兵甲財賦民俗之事無所不領謂之都府權勢不勝其重能生殺人或専私其所領州而虐視支郡元結為道州刺史作舂陵行以為諸使誅求符牒二百餘通又作賊退示官吏一篇以為忍苦裒斂陽城守道州賦稅不時觀察使數誚責又遣判官督賦城自囚於獄判官去復遣官來按舉韓愈送許郢州序云為刺史者恆私於其民不以實應乎府為觀察使者常急於其賦不以情信乎州財已竭而斂不休人已窮而賦愈急韓臯為浙西觀察使封杖決安吉令孫澥至死一時所行大抵類此然每道不過一使臨之耳今之州郡按制控刺者率五六人而臺省不預毁譽善否隨其意好又非唐時一觀察使比也按野處所言以為唐之州縣不過一使臨之而宋則有帥漕憲倉四司故州縣之官尤難以奉承展布蓋唐制一道兵政屬之節度使民事屬之觀察使然節度多兼觀察又各道雖有度支營田招討經略等使然亦多以節度使兼之蓋使名雖多而主其事者每道一人而已至宋則監司各自有建臺之所每司專有長官專有掾佐而號令之行於統屬者始煩矣然宋之監司雖多而一司猶不過一人專之也若夫司存鼎立而每司之稱牧伯刺史者比肩數人而以臨乎其郡每郡則稱守者比肩數人而以臨乎其縣每縣則稱宰者比肩數人而以臨乎其民則其誅求之苛密奉承之不易易又振古所無也度支營田使開元十年敕度支營田若一使專知宜同為一額共置判官兩人元和十三年詔曰事關軍旅並屬節制務係州縣悉歸亷察二使所領實曰管轄諸道度支營田承前各置使自艱虞以後名制因循方鎮除授之時或有兼𢃄此職遂令綱目所在各殊今日務修舊章思一法度去煩就理衆心為宜唯别置營田處其使且令仍舊其忠武鳳翔武寧魏博山南東道橫海邠寧義成河陽等道度支營田使及淮南度支近已停省其餘諸道並凖此處分初景雲開元間節度度支營田等使諸道並不置又一人兼領者甚少艱難以來優寵節將天下擁旄者常不下三十人例銜節度度支營田觀察四使其邊界藩鎮增置名額者又不一前後六十餘年雖嘗增減官員及使額而度支營田以兩河諸將兼領故朝廷不議停廢至是羣盜漸息宰臣等奏罷之租庸使開元十一年宇文融除殿中侍御史勾當租庸地稅使天寶二年陕郡太守韋堅兼知勾當租庸使六載楊國忠加諸郡租庸使至德元載第五琦除監察御史充江淮租庸使廣德元年考功郎中裴諝為河東道租庸鹽鐵等使永泰元年京兆尹第五琦奏租庸使請一切並停唯差判官一人巡官二人催遣從之兩稅使建中三年初分置汴東西水陸運兩稅鹽鐵使包佶崔縱分為之八年以東都河南江淮嶺南山南東道兩稅等錢物令户部侍郎轉運使張滂主之東渭橋以東諸道巡院並𨽻滂以關輔河東劒南山南西道財物令户部尚書度支使班宏主之其後宏滂互有短長宰相趙憬陸贄具以其事上聞由是參用大歷故事如劉晏韓滉所分焉元和四年制令鹽鐵使楊子留後宜兼充淮南浙西東宣歙福建等道兩稅使其江陵留後宜兼充荆南山南東道鄂嶽江西湖南嶺南等道兩稅使度支山南西道分巡院官宜兼充劒南東西川山南西道兩稅使其硤內五監舊屬鹽鐵使宜割屬度支使便委山南西道兩稅使兼知糶貨各奉所職期於悉心戶口使開元十二年宇文融除御史中丞充諸色安輯户口使天寶四載户部郎中王鉷加勾當户口色後使蘇氏駮曰九寺三監東宫三寺十二衛及京兆河南府是王者之有司各勤所守以奉職焉尚書省舊章立程度以頒之御史臺按格令採姦濫以繩之中書門下立百司之體要察羣吏之能否善績著而必進敗德聞而且貶政有恆而易守事歸本而難失經遠之理舍此奚據洎姦臣廣言利以邀恩多立使以示寵尅下民以厚斂張虛數以獻狀上心蕩而益奢人望怨而成禍使天子有司守其位而無其事受厚祿而虛其用宇文融首倡其端楊奢矜王鉷繼遵其軌楊國忠終成其亂仲尼云寧有盜臣而無聚斂之臣誠哉是言前車既覆後轍未改求逹化本不亦難乎洪氏容齋隨筆曰楊國忠為度支郎領十五餘使至宰相凡領四十餘使第署一字不能盡胥吏因是恣為姦欺新舊唐史皆不詳載其職按其拜相制前銜云御史大夫判度支權知太府卿事兼蜀郡長史劒南節度度支營田等副大使本道兼山南西道採訪處置使兩亰太府司農出納監倉祠祭木炭宫市長春九成宫等使關內道及京畿採訪處置使拜右相兼吏部尚書集賢殿崇元館學士修國史太清太微宮使自餘所領又有管當租庸鑄錢等使以是觀之槩可見矣宫市之事咸謂起於德宗貞元不知天寶中已有此名且用宰臣充使也韓文公作順宗實録但云舊事宫中有要市外物令官吏主之與人為市隨給其直正元末以宦者為使亦不及天寶時已有之也轉運使唐先天二年李傑始名務先始為水陸發運使蓋使名之起開元二十一年裴耀卿以侍中充江南淮南轉運使而崔希逸蕭旻為副蓋副使始此天寶以韋堅充勾當轉運使第五琦充諸色轉運使劉晏充諸路轉運使其後韓滉杜悰杜讓能崔昭緯皆以宰相充使而諸道分置巡院皆統於此五代罷巡院始置轉運使宋朝藝祖開基懲五季之亂藩臣擅有財賦不歸王府自乾德以後僭偽略平始置諸道轉運使以總利權開寶六年廣南平除徐澤為判官蓋轉運判官始此其轉運使之名國初但曰勾當某路水陸計度轉運事官高者則曰某路計度轉運使太平興國初皆曰使兩省以上則為都轉運使又置副使與諸路判官焉又置同勾當轉運事俄罷諸路副使真宗每用兵或令都部署兼轉運使王師征討則有隨軍轉運使事畢即停至道中詔曰天下物宜民間利病惟轉運使得以周知令更互赴闕延見詢問焉慶歷中皆𢃄按察之任六年罷之三年詔諸路轉運使並兼按察使每嵗具官吏能否先是歐陽修請遣使按察官吏賈昌朝言轉運以按察官吏故令兼而領之六年赦書以為所過煩擾吏不能安其職遂並罷之先是判官與轉運爭權而罷至嘉祐中復置熙寧二年詔轉運使用本資序人即充資序下一等為權二等為權發遣中興以來逐路都轉運使除授不常惟使副判官常置舊制轉運司除授皆命詞給誥渡江已後例給敕命後稍復舊轉運使副命詞運判則否六年諸路運判亦命詞給誥光宗紹熙以來使副運判不雙除屬官有主管文字一員幹辦公事人員又有凖備差遣員多寡不一東萊呂氏曰國初未嘗有監司之目其始除轉運使止因軍興専主糧餉至班師即停罷如太祖時平澤潞則命户部侍郎高防兵部侍郎邊光範充北路轉運使用師湖南則命部判官滕白充南面給事中沈義倫充京西水陸轉運使是也至於命何幼沖充東面劉仁遂充西面曹翰充南面胡玩充北面皆水陸轉運使太宗時如劉保勳為河東城西四面轉運使樂沖為太原管內水陸轉運使郭泌為御河至關南水陸轉運使王在田為陸路轉運使崔邁為水路判官或謂路或謂道或曰知或曰同或曰同知或為幹當皆緣用武責以餽運之職也太祖開寶五年命二參政事薛居正呂餘慶兼領提舉諸州水陸轉運使眀年薛居正沈義倫拜相呂餘慶去位遂以居正義倫二相兼提舉水陸漕事纍朝以武臣為帥守而兼漕事則太祖朝均州刺史襄州荆門至石門關兵馬都總管曹翰兼西南面水陸轉運使襄州節度使潘美廬州節度使尹崇珂同知廣州軍州事並兼嶺南轉運使太宗朝右武衛大將軍濵州團練使知通利軍王賓兼河北轉運使又以賔知揚州兼發運司真宗朝定州駐泊都總管山南東道節度使同平章事王顯兼河北水陸都轉運使顯總領定髙陽三路又領河北都轉運使副都總管侍衛馬步軍都虞候天平軍節度使王超充轉運副使此皆武臣任帥守兼漕也太祖朝知容州毋守素知雍州范旻通判桂州符嗣各知本管轉運事太宗朝知廣州李符兼諸州轉運使知洪州王眀兼江南西路轉運使真宗朝知益州宋太初兼川陕四路都轉運使參知政事判天雄軍府王欽若都大提舉江北轉運使此皆文臣任帥守兼漕也始轉運一司𨽻州縣與夫廢置皆在一時初無定制所掌者軍需糧餉而已自髙保寅知懷州州𨽻河陽時趙普為河陽帥與保寅素有隙事多抑制保寅不能平手疏請罷支郡會左拾遺李幹亦言諸州藩鎮支屬州郡多俾親吏掌其關市頗不便於商賈滯天下之貨望不令有所統攝以分方面之權尊奬王室亦強幹弱枝之術也時太平興國二年也遂詔邠寧涇源鄜坊延丹陕虢襄均房復鄧唐澶濮宋亳鄆濟滄德曹單青淄兖沂貝冀滑衛鎮深趙定祈等州先𨽻藩鎮令直屬京師郡長吏得自奏事自是而後邊防盜賊刑訟金榖按亷之任皆委於轉運使又節次以天下土地形勢俾之分路而治矣繼增轉運使判官以京官為之於是轉運使於一路之事無所不總也太宗淳化二年五月詔轉運使司命常參官一人糾察州軍刑獄四年十月詔刑獄司宜從省罷委轉運司振舉之以此知轉運司總刑獄之事也真宗大中祥符二年五月廣南西路轉運使言如洪寨主殿直李文著以輕兵掩襲蠻賊文著中流矢死其隨文著將校八人本司並斬訖七年八月梓州轉運使寇瑊言本使公宇在梓遂州去戎瀘地遠或戎人緩急寇邉難於照應請置資州詔從之以此知轉運司總邊防之事也至道元年八月荆湖轉運使何士宗請執政大臣出領外郡應合申轉運司公事只書通判以下姓名太京謂宰相等曰大臣品位雖崇若出臨外藩即轉運使所部要係州府不係品位此朝廷典憲不可輕改並仍舊貫由是觀之轉運使權可謂重矣然又疑其權太重復置朝臣於諸路為承受公事是機察漕司也真宗即位省罷承受之官景德間遂建提點刑獄一司實分轉運使之權又以武臣𢃄閣職者副之熙寧中議罷武臣提刑或謂真宗時以武臣提刑令機察漕司也監司之官既衆所領之職又分諸路復以知州𢃄一路安撫鈐轄等名目自領軍事而轉運司所職催科徴賦出納金榖應辦上供漕輦綱運數事而已仁宗慶歷中患漕司權輕令𢃄按察使後二年江東漕臣楊紘王綽與提刑王鼎頗務深刻號江東三虎其餘刻轢州郡窘辱大臣者多矣朝廷又患之遂罷轉運按察名皆非太宗真宗時委任轉運使意也富弼等論𢃄按察使而不察司吏以朝會速配率多為能又謂轉運使依資循例而入多非其人郡縣官守因循人受其弊又謂不由舉主擇所以大半不才皆確論也然而太宗時轉運使皆人主親自選擇故淳化五年十一月上曰多士滿朝朕試令索班簿閲之周行之人魚貫櫛比不勝其衆矣比於其中求一才中轉運使三司判官者了不能得雖多亦奚以為臣以此知轉運使自人主親擇之也淳化三年正月詔宰相參知政事樞密副使三司使翰林學士尚書丞郎兩省給舍以上御史中丞各於京朝官內保舉堪任轉運使者一人臣以是知宰相執政侍從官皆舉薦人才而人主親擇之也神宗謂文彥博等曰諸道帥臣轉運使職任至重一道慘舒係焉宜謹擇其人久於其任漢宣循名責實胥用此道彥博等對曰為治之要無以易此故熙寧元豐諸路漕臣率多舉職今軍興之際調度日繁理不可緩而諸路轉運使推擇非才任用不一又非慶歷比也然臣區區之愚竊謂太宗用李幹之言罷藩鎮支屬而委任轉運使真宗朝士大夫論列言其不便者多矣仁宗景祐三年十一月詔懷遠軍本𨽻宜州自今奏事無得專逹是亦復支郡之意也然以今日之勢觀之宜修支郡之制增藩鎮之權以壯國勢而一道亷按之任恐可改也神宗即位之初因知揚州徐緩告謝甚衰嘗與富弼曾公亮輩議分置藩郡令按察支屬而大臣無有能上當聖意者熙豐紹符崇觀政宣更數十年不能行神宗之意蓋有待於今日也不然則願如太宗之時盡減監司之目獨存轉運一司其親擢舉薦委任賜豫悉用祖宗初制仍𢃄按察之名其久任如真宗用宋摶於河東十有一年不除代者勞效顯著則增秩賜金簡慢不職則削官奪賜乘驛入奏更互赴闕以至給印歷却委諸司一作州長吏書績皆以太宗真宗為法比之復支郡利害固不同然亦愈於因循不振之弊也安撫使梁武帝普通五年魏以酈道元為大使慰撫六鎮大使始此隋文帝開皇九年詔遣柱國韋滉安撫嶺外又仁壽四年以楊素為并州道行軍總管河北道安撫大使唐貞觀初遣大使十三人巡省天下諸州水旱則有巡察安撫存撫之名節度使兼之則有副使天授二年發十道存撫使職聖歷中狄仁傑為河北道安撫德宗貞元間又置副使宋舊不常置自咸平二年以翰林學士王欽若為四川安撫使知制誥梁皓為陕西安撫使安撫使之名始此其後景德三年始置河北沿邊安撫使以雄州守臣為之而陕西沿邉諸州亦有安撫使慶歷二年詔置湖南安撫司八年詔置河北四路安撫以韓琦王拱辰賈昌朝等充諸路使皇祐四年詔廣桂二州𢃄經略安撫使熙寧五年罷諸路經略安撫司崇寧二年置河南安撫使宣和二年置輔郡內頴昌府𢃄京西安撫使宣和三年臣僚言睦賊猖獗乞以杭越知州兼本路安撫鎮撫一方詔杭越州江寧府守臣並𢃄安撫使詔洪州守臣可依江寧府安撫使凡諸路安撫逐州知州兼以直祕閣以上充掌總護諸將統制軍旅察治姦宄以肅清一道凡兵民之政皆掌焉帥其屬而聽其獄訟頒其禁令定其賞罰稽其錢榖甲械出納之名籍其行以法若事難専決則具可否稟奏即干機速邉防及士卒抵罪則聽以便宜裁斷係邉任則綏御夷狄撫寧疆圉若甲兵屯戍芻粟餽運則視其緩急盈虛而移用之掌凡戰守之事建炎元年李綱請沿河沿淮沿江置安撫使兼馬步軍都總管以文臣充二年令將兵處知州𢃄管內安撫使後省四年置鎮撫使罷逐路安撫使後罷鎮撫使置安撫使如故時諸路又有安撫大使自兩浙西路劉光世始二品以上為帥即為安撫大使提刑宋太宗淳化二年以司門員外郎董循等一十一人分充諸路轉運司提點刑獄四年省景德四年真宗謂王旦曰朕慮四方刑獄官吏未盡得人一夫受寃即召災沴今軍民事務雖有轉運使且地遠無由知先帝嘗選朝臣為諸路提點官獄今可復置仍以使臣副之於是置諸路提點刑獄公事以朝臣充始命屯田李拱為之副以武臣閣門祗候以上充天禧四年加勸農使俄改提點刑獄勸農使又以武臣為副使天聖六年悉罷眀道二年復置嘉祐中有武臣同提點河東刑獄竊用公庫銀器及樂倡首飾議者謂武臣不可為監司罷之治平元年罷提點刑獄而委轉運司熙寧二年諸路提點刑獄復差文臣其武臣並罷史臣曰上以武臣罕習吏文多不足以舉察所部人材故罷之人皆以為便十年復置提點京畿刑獄掌察所部疑留獄訟勸課農桑而按其官吏之不法别其廉吏以逹於朝元豐因之總郡國之庶獄核其情實而覆以法督治姦盜申理寃濫則𨽻提刑司嵗察所部廉能而保任之若疲軟或冒法則隨其職事劾奏宣和初詔江西廣東增置武提刑一員然遇闕帥不許武憲兼攝建炎元年以盜賊未衰諸路無武臣提刑處權添差一次專管捉殺四年罷之孝宗乾道六年詔諸路分置武臣提刑一員臣僚乞依故事加同字不從於是武憲橫於四方淳熙末上知其不便遂不復除止除朝臣一員其屬有幹辦公事一員檢法官一員東萊呂氏曰太宗皇帝即位之久天下無事淳化二年五月詔應諸路轉運使各命常參官一人専知糾察州軍刑獄公事管內州府十日一具囚帳供報有疑獄未決即馳傳以示之郡縣敢稽留大獄久而不決及偏辭按讞情不得實官吏用情者並以聞佐史小吏已下得以便宜按劾從事此初置外路刑獄官之詔也是時猶𨽻轉運司然行之二年勞擾無補於是淳化四年十月降詔曰比者申命使臣分聽獄訟徒經歲序蔑有平反既莫副於哀矜諒祗為於勞優其諸路決遣刑獄司宜從省罷委轉運司振舉之真宗景德四年乃謂先帝常選朝臣諸路提點刑獄遂復置之不𨽻轉運别為一司稍重其權矣當時約束曰所至專察囚禁詳審案牘州縣不得迎送聚會所部每旬具繫囚犯由訊鞫次第申報當檢舉催督在繫淹久者即馳往案問出入人罪者移牒覆勘劾官吏以聞諸色詞狀逐州斷遣不當已經轉運司披斷未允者並收接施行官吏貪濁弛慢者具名以聞敢有庇匿並當加罪仍借緋紫以三年為任增給緡錢如轉運使之數內出御前印紙為歷書績效中書樞密院籍其姓名代還者課議功行賞如刑獄枉濫不能摘舉官吏弛慢不能彈奏務從畏避者置以深罪竊覩當日詔旨専為刑禁詞訟寃枉天禧中已兼勸農一事至仁廟朝天聖六年正月詔令諸路提點刑獄司朝臣使臣交割本職公事與轉運使副令轉運司條所省事件以聞既罷兩年天聖八年九月復置仍令所至毋得送迎其吏人約舊數裁減之降詔十月九日是月壬申却權罷又三年至眀道二年冬復置自後提刑一司雖専以刑獄為事封樁錢榖盜賊保甲軍器河渠事務寖繁權勢益重而轉運司所總惟財賦綱運之責而已司局愈多官吏益衆而事愈不治今日之弊正在按察之官不一也臣故著提刑廢置約束之詳以備朝廷採擇提舉即漢耿壽昌常平之任也自衛李悝制平糴之法漢人因之則謂之常平焉然漢人特置倉而猶領之於大司農也宋朝淳化中建常平倉景祐元年令轉運司舉長史舉所部官專領之然猶𨽻漕臣熙寧遣使提領此蓋提舉常平之所始也三年制置三司條例言河北陕西已差官提舉常平廣惠倉餘路欲差胡朝宗張復侯叔獻曾誼等並為提舉官九年府界畿內亦専置提舉常平倉一員不令司農丞兼領提舉常平司操常平斂散之法申嚴免役之政令治荒修廢賑民艱厄則𨽻提舉司嵗察所部廉能而保任之若疲軟或犯法則隨其職事劾奏又哲宗正史職官提舉常平司常平義倉免役市易坊場河渡水利之法因民之有無歲之豐凶而斂散賑濟之凡役錢視其産之厚薄人吏廪祿視其執役之輕重凡市易掌斂市之不售貨之滯於民用者乘其貿易以平物價皆舉行其政令以裕民力而阜邦財掌按察官吏之事元祐初罷紹聖九年復置政和改元詔江淮荆浙六路共置茶鹽提舉一員宣和三年詔河北亰東路推行新法鈔鹽可添置提舉官一員此提舉茶鹽之所始也國朝茶鹽事舊𨽻發運司元豐間或以轉運常平官兼提舉或以提刑兼領知通提轄政和以後始専置官吏既而諸路皆置建炎元年詔提舉常平司併歸提刑司二年八月復諸常平官還其糴本自青苖錢不散外常平免役之政皆掌之三年復置四年詔逐路提刑司茶鹽司並依舊分東西路紹興二年詔荆湖北路復置提舉茶鹽司四年詔廣西茶鹽司官吏並罷其職事委漕臣五年詔諸路提舉常平併入茶鹽司仍以提舉常平茶鹽等公事為名九年置經制司改常平官為經制某路幹辦常平等公事未幾經制司罷復為常平官久之復置提舉東南以茶鹽司兼領四川以提刑司兼領又中興系年録紹興十五年户部侍郎王鐵言常平法望復置提舉官乃命諸路茶鹽官改充提舉常平茶鹽惟四川廣西以憲臣淮西京西以漕臣兼領仍令檢察所部州有擅用常平錢物者按劾以聞乃别置官吏然常平錢皆取以贍軍今特掌義倉及水利役法賑濟等事而已無復平糴之政矣熙寧初置提舉常平司勾當公事於通判幕職內選差一員不妨本職紹興十五年改為幹辦公事依漕屬例此常平幹也宣和三年置茶鹽提舉屬官一員此茶鹽幹也故提舉司存二幹官以此文獻通考卷六十一
