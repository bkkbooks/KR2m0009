body:
  text: 文獻通考卷二百四十四鄱陽馬端臨貴與著經籍考七十一集詩集寇忠愍詩三卷鼂氏曰寇凖字平叔華州人太平興國中登進士科淳化五年參知政事定策立真宗為皇太子景德元年拜平章事契丹入寇決親征之䇿凡三入相真宗不豫皇后豫政凖白上請太子監國因令楊億草制且進億以代丁謂詰朝凖被酒漏言纍貶雷州司戶徙衡州司馬卒仁宗時贈中書令諡忠愍嘗封萊國公初篤學喜屬文尤長詩什多得警句在相位論議忠直不顧身謀仇邪媒孽既以謫死或又謗之云在相位時與張齊賢相傾朱能為天書降乾祐凖知而不言曽子固眀其不然曰審如是丁謂拂須固足以悅之司馬溫公訓儉文亦言其奢侈子孫丐於海上然以史考之萊公蓋無子也集有范雍敘共二百四十首野水無人渡及江南春二首皆在獨到海只十里之詩已亡其全篇矣陳氏曰巴東集三卷公初以將作監丞知巴東縣自擇其詩百餘篇且為之序今刻於巴東忠愍公集三卷乃河陽守范雍得公詩二百首為三卷今刻板道州張刑部詩王介甫序君詩眀而不華喜諷道而不刻切其唐人善詩者之徒歟君並楊劉生楊劉以其文詞染當世學者迷其端原靡然窮日力以摹之粉墨青朱顚錯叢厖無文章黼黻之序其屬情籍事不可考據也方此時自守不汚者少矣君詩獨不然其自守不汚者邪魏仲先草堂集二卷巨鹿東觀集二卷鼂氏曰魏野字仲先陜州人志清逸以吟詠自娛忘懷榮利隱於陜之東郊手植竹木繞以流泉鑿土袤丈曰樂天洞前立草堂為詩清苦句多警策與寇凖王旦善每往來酬唱祀汾隂嵗召不起卒贈著作郎集有薛田序巨鹿東觀集乃野之子間集其父詩四百篇以贈著作故以東觀名集潘逍遙詩三卷鼂氏曰皇朝潘閬字逍遙大名人通易春秋尤以詩知名太宗嘗召對賜進士第將官使之不就王繼恩與之善繼恩下獄捕閬甚急久之弗得咸平初來京師尹收繫之真宗釋其罪以為滁州參軍後卒於泗上與王禹稱孫何栁開魏野交好最密集有祖無擇序錢易張逵皆碣其墓附於集後蘇子瞻少年時過一山院見壁上有句云夜涼知有雨院靜若無僧而不知何人詩今集有此聨乃閬夏日宿西禪院詩也小説中謂閬坐盧多遜黨嘗追捕非也陳氏曰閬嘗賜及第後坐追奪變姓名僧服入中條山卒於泗州又有嚴陵刻夲同但少卷末三首東里楊聘君集一卷陳氏曰處士鄭圃楊朴契元撰太宗嘗召對拜郎中不受以其子為長水尉滕工部集一卷陳氏曰滕白撰篇首寄陳搏知為國初人又有右省懷山中及臺中寄朱從事詩則其揚歷清要亦多矣史傳亡所見未有考也王嵒集一卷陳氏曰王嵒撰集中有春日感懷上滕白郎中蓋亦國初人又有聖駕親征河東及有甲午避寇全家欲下荆南之語則是李順亂蜀之嵗嵒蓋蜀人也漁舟集一卷陳氏曰處士成都郭震希聲撰自稱汾陽山人李畋為作集序淳化四年忽作詩曰朝出東門遊東門好春色青青原上草莫放征馬食詣闕獻書言蜀利病未幾順賊已作矣王初歌詩集一卷陳氏曰王初撰未詳何人有延平天慶觀詩當是祥符後人也書臺集三卷陳氏曰處士南隆朱有大有撰自稱雲臺山人天禧中王晦叔守蜀以古風六十言遺之書臺者其所居坊名也甘棠集一卷陳氏曰知制誥上蔡孫僅鄰幾咸平元年進士第一人後其兄何一榜嘗從何通判陜府以所賦詩集而序之首篇曰甘棠思循吏故以名集僅兄弟皆不壽故不大顯錢希白歌詩二卷陳氏曰翰林學士吳越錢易希白撰廢王倧之子咸平二年進士第二人景德二年制科初錢氏歸國羣從皆補官獨易與兄昆不見録遂刻志讀書皆第進士昆至諫議大夫易子彥逺眀逸又皆以賢良方正入等宋興父子兄弟制舉登科者惟錢氏一門易有集百五十卷未見家止有此及滑稽集四卷而已林和靖詩三卷西湖紀逸一卷鼂氏曰林逋字君復杭州錢塘人少刻志為學結廬西湖之孤山真宗聞其名詔郡縣常存遇之善行書喜為詩其語孤峭澄淡臨終作一絶曰茂陵他日求遺藁猶喜初無封禪書或刻石置之其墓中賜諡曰和靖先生清風集一卷陳氏曰職方員外郎鮑當撰石曼卿集一卷鼂氏曰石延年字曼卿南京宋城人舉進士不中為三班奉職改太常寺太祝遷祕閣校理氣貌雄偉喜論事善書札縱酒不羈世多傳其仙去其詩如春隂紅梅及樂意相關禽對語生香不斷樹交花鶯聲不逐春光老花影常隨日腳流之句至今諷詠焉陳氏曰其詩自為序石介復為作序其仕以三舉進士為三班奉職出處詳見歐公所作墓志歐公詩話曰石曼卿自少以詩酒豪放自得其氣貌偉然詩格竒峭又工於書筆畫遒徑體兼顔栁為世所珍余家嘗得南唐後主澄心堂紙曼卿為余以此紙書其籌筆驛詩詩曼卿平生所自愛者至今藏之號為三絶真余家寶也曼卿卒後其故人有見之者云恍惚如夢中言我今為鬼仙也所主芙蓉城欲呼故人往逰不得忿然騎一素騾去如飛其後又云降於亳州一舉子家又呼舉子去不得因留詩一篇與之余亦略記其一聨云鶯聲不逐春光老花影長隨日腳流神仙事怪不可知其詩頗類曼卿平生語舉子不能道也張浮休評曼卿詩如飢鴈夜歸巖氷春拆俊爽有餘而不可尋繹朱子語録因舉曼卿詩極有好處如仁者雖無敵王師固有征無私乃時雨不殺是天聲長篇某舊於某人處見曼卿親書此詩大字氣象方嚴遒徑極可寶愛真所謂顔筋栁骨令人喜蘇子美字逺不及矣如籌筆驛詩意中流水逺愁外舊山青又樂意生香之句極佳惜不見全集後村劉氏曰曼卿詩惟籌筆驛詞翰俱妙人所傳誦及樂意相關禽對語生香不斷樹交花一聨為伊洛中人所稱他作苦不甚見晚得其集石徂徠作序稱其與穆參軍以古文自任而曼卿尤豪於詩石自序性懶有作不能録早時解記數百篇過壯記益衰近幾盡廢有收百篇來者覽之或尚能識或如非已言久乃能辨遂併近詩存三百篇藏之於家歐公尤重其人范公有鑿幽索祕破堅發竒髙凌虹霓清出金石之評集中華山泰山嵩山五言長篇各一首筆力在薛能之上餘警句尚多五言云行人晚更急歸鳥夕無行天寒河影淡山凍瀑聲微水盡天不盡人在天盡頭草白有時榮髮白不再好人生不如春髮白不如草弋下失冥鴻網細遺巨鵾風徑香逾逺天寒色更鮮秋天買不斷無意學金錢七言云洛渚微波長映步漢宫香水不濡肌獨步世無吳苑艷渾身天與漢宫香恥居湯武干戈域寧死唐虞揖遜區汾河不斷天南流天色無情淡如水南朝文物盡清賢不事風流即放言三百年間却堪笑絶無人可定中原中散向人踈懶甚步兵因酒過差多皆清拔有氣骨吕文靖集五卷陳氏曰丞相許國文靖公夀春吕夷簡坦夫撰文靖不以文鳴而其詩清潤和雅未易及也陳亞之集一卷鼂氏曰陳亞字亞之性滑稽喜賦藥名詩仕至司封郎中藥名詩始於唐人張籍有江臯嵗暮相逢地黃葉霜前半下枝之詩人謂起於亞實不然也陳氏曰咸平五年進士有集三卷藥名詩特其一體耳如馬嘶曾到寺犬吠乍行村吏辭如賀日民送自迎時皆佳句不在此集也金陵覽古詩三卷陳氏曰虞部員外郎楊備撰億之弟也李問集一卷陳氏曰國子博士廣陵李問舜愈撰蘇才翁集一卷鼂氏曰蘇舜元字才翁子美兄也工草𨽻詩章豪麗鼂君成集十卷别集一卷陳氏曰新城令鼂端友君成撰東坡為作序補之其子也東坡序略曰鼂君成君子人也吾與之遊三年知其為君子而不知其能文與詩而君亦未嘗一語及此者其後君既沒其子補之出君之詩三百六十篇讀之而驚曰嗟乎詩之指雖微然其美惡髙下猶有可以言傳而指見者至於人之賢不肖其深逺茫昧難知蓋甚於詩今吾尚不能知君之能詩則其所謂知君之為君子者果能盡知之乎君以進士得官所至民安樂之惟恐其去然未嘗以一言求於他人凡從事二十三年而後改官以沒由此觀之非獨吾不知舉世莫知之也君之詩清厚靜深如其為人而每篇輒出新意竒語宜為人所共愛其勢非君深自覆匿人必知之而其子補之於文無所不能博辨俊偉絶人逺甚將必顯於世吾是以知有其實而辭其名者之必有後也杜師雄詩一卷鼂氏曰宋朝杜默字師雄徂徠人石介作三豪篇所謂歌之豪者蘇子瞻頗陋之鄭成之集十卷鼂氏曰宋朝鄭褒字成之閩人登進士第慕韓愈為文陳詁為編次其集張景為之序將歸集一卷鼂氏曰未詳何人有題林逋隱居詩當是昭陵時人也徐仲車詩一卷鼂氏曰宋朝徐積字仲車東莞人黃虞部詩一卷鼂氏曰宋朝黃觀昭陵時嘗將漕成都邵堯夫擊壤集二十卷鼂氏曰宋朝邵雍堯夫隱居洛陽熙寧中與常秩同召力辭不起邃於易數始為學至二十年不施枕榻睡其精思如此歌詩蓋其餘事亦頗切理盛行於時卒諡康節集自為序朱子語録康節之學其骨髓在皇極經世書其花草便是詩韓持國詩三卷鼂氏曰韓維字持國億之子也與其兄子華玉汝俱位宰相持國最能詩世傳其酴醿絶句他多稱是注荆公詩十五卷陳氏曰參政眉山李壁季章撰謫居臨川時所作助之者曽極景建魏鶴山作序石林詩話曰荆公少以意氣自許故詩語惟其所向不復更為涵蓄如天下蒼生待霖雨不知龍向此中蟠又濃緑萬枝紅一點動人春色不須多又平治險穢非無力潤澤焦枯是有才之類皆直道其胸中事後為羣牧判官從宋次道盡假唐人詩集博觀而約取晚年始盡深婉不迫之趣乃知文字雖工拙有定限然必視其幼壯雖公方其未至亦不能力強而遽至也又曰荆公晚年詩律尤精嚴造語用字間不容髮然意與言會言隨意遣渾然天成殆不見有牽率排比處如含風鴨緑鱗鱗起弄日鵝黃裊裊垂讀之初不覺有對偶至細數落花因坐久緩尋芳草得歸遲但見舒間容與之態耳而字字細考之皆經櫽括權衡者其用意亦深刻矣嘗與葉致逺諸人和頭字韻詩往返數四其末篇云名譽子真居谷口事功新息困壺頭以谷口對壺頭其精切如此後數月取本追改云豈愛京師傳谷口但知鄉里勝壺頭今集中兩本並存漫叟詩話荆公定林後詩精深華妙非少作之比嘗作嵗晚詩云月映林塘靜風涵笑語涼俯窺憐淨緑小立佇幽香携幼尋新菂扶衰上野航延緣久未巳嵗晚惜流光自以比謝靈運議者亦以為然後山詩話魯直謂荆公之詩莫年方妙然格髙而體下如云自聞青秧底復作龜兆坼乃前人所未道又云扶輿度陽焰窈窕一川花謂包含數個意雖前人亦未道然學三謝失於巧耳又云荆公詩云力去陳言誇末俗可憐無益費精神而公平生文體數變莫年詩益工用意益苦故言不可不謹也張浮休評王介甫詩如空中之音相中之色欲有執著而曽不可得臨川詩選一卷陳氏曰汪藻彥章得半山别集皆罷相山居時老筆過江失之遂於臨川集録出又言有表啓十餘篇不存一字注東坡詩四十二卷年譜目録各一卷司諌吳興施元之德初與吳郡顧景蕃共為之元之子宿從而推廣且為年譜以傳於世陸放翁作序頗言注之難蓋其一時事實既非親見又無故老傳聞有不能盡知者噫豈獨坡詩哉注杜詩者非不多往往穿鑿附會皆臆決之過也張浮休評子瞻詩如武庫初開戈矛森然觀者不覺神􅋏若一一尋之不無利鈍放翁陸氏序略曰唐詩人最盛名家者以百數惟杜詩注者數家然槩不為識者所取近世有蜀人任淵嘗注宋子京黃魯直陳無已三家詩頗稱詳贍若東坡先生之詩則援據閎博指趣深逺淵獨不敢為之説某頃與范公至能會於蜀因相與論東坡詩慨然謂余足下當作一書發眀東坡之意以遺學者某謝不能後二十五年某告老居山隂吳興施宿武子出其先人司諌公所注數十大篇屬某作序司諌公以絶識博學名天下且用功深歷嵗久又助之以顧君景蕃之􅔜洽則於東坡之意蓋幾可以無憾矣山谷集十一卷外集十一卷别集二卷陳氏曰黃庭堅魯直撰江西所刻詩𣲖即豫章前後集中詩也别集者慶元中莆田黃汝嘉增刻山谷編年詩集三十卷年譜二卷陳氏曰山谷詩文其甥洪氏兄弟所編斷自進德堂以後今外集所載數卷有晚年刪去者故任子淵所注亦惟取前集而已監丞黃畇子耕者其諸孫也即會稡别集復盡取其平生詩以嵗月次第編録且為之譜今刋板括蒼後山集六卷外集五卷陳氏曰陳師道無已撰亦於正集中録出入詩𣲖江西宗𣲖之説出於吕本中居仁前輩固有議其不然者矣後山雖曰見豫章之詩盡棄其學而學焉然其造詣平淡真趣自然實豫章之所闕也注黃山谷詩二十卷注後山詩六卷陳氏曰新津任淵子淵注鄱陽許尹為序大抵不獨注事而兼注意用工為深二集皆取前集陳詩以魏衍集記冠焉後村劉氏曰國初詩人如潘閬魏野規規晚唐格調寸步不敢走作楊劉則又專為昆體故優人有撏扯義山之誚蘇梅二子稍變以平淡豪俊而和之者尚寡至六一坡公巍然為大家數學者宗焉然二公亦各極其天才筆力之所至而已非必煆錬勤苦而成也豫章稍後出會稡百家句律之長究極歷代體製之變搜獵竒書穿穴異聞作為古律自成一家雖隻字半句不輕出遂為本朝詩家宗祖在禪學中比得達磨不易之論也其內集詩尤善信乎其自編者頃見趙履常極宗師之近時詩人惟趙得豫章之意有絶似之者又曰後山樹立甚髙其議論不以一字假借人然自言其詩師豫章公或曰黃陳齊名何師之有余曰射較一鏃奕角一著惟詩亦然後山地位去豫章不逺故能師之若問秦鼂諸人則不能為此言矣此惟深於詩者知之文師南豐詩師豫章二師皆極天下之本色故後山詩文髙妙一世然題太白畫像云江西勝士與長吟後來不憂身陸沉勝士謂饒德操也按德操此詩去手汚吾足之作大爭地位太白非德操遂陸沉邪似非篤論盧載雜歌詩一卷陳氏曰盧載厚元撰集中有與胡則錢惟演往來詩琴軒集一卷陳氏曰題南榮浪翁李有慶撰與石昌言任師中同時卷末贈答十二絶闕其六其曰癸巳嵗者殆皇祐中邪元章簡詩集十卷陳氏曰參政元絳厚之撰劉景文集十卷陳氏曰左藏庫使知隰州劉季孫景文撰環慶死事將平之子也東坡嘗薦之坡在杭季孫寄詩有四海共知霜鬢滿重陽曽插菊花無之句其詩慷慨有氣如其為人廣諷味集五卷陳氏曰吏部侍郎南京王欽臣仲至撰海門集八卷陳氏曰渤海張重撰有上蘇子瞻內翰詩又有張伯玉遊鑑湖晚歸詩伯玉知越州當嘉祐末而東坡為翰苑在元祐間重皆與同時特未詳其人王岐公宫詞一卷陳氏曰王圭禹玉撰逸民鳴一卷陳氏曰盱江李樵撰泰伯之姪孫湛推官集一卷陳氏曰長樂湛鴻季潛撰紹聖初韓昌國序青山集三十卷陳氏曰朝奉郎當塗郭祥正功父撰初見賞於梅聖俞後見知於王介甫仕不達而卒李端叔晚寓其鄉祥正與之爭名未嘗同堂至為俚語以譏誚之則其為人不足道也張浮休評郭祥正詩如大排筵席二十四味終日揖讓而適口者少方祕校集十卷陳氏曰莆田方惟深子通撰其父屯田龜年葬吳遂為吳人與朱伯原善以女嫁伯原之子嘗舉進士冠其鄉不第晚得興化軍助教年八十三以卒王荆公最愛其詩精詣警絶始余得其詩二卷乃其姪孫蕭山宰翺所編後乃知莆中嘗刋板為十卷且載程俱致道所作墓志於末曽慥詩選直以為姑蘇人者誤也詩選又言荆公愛其春江渺渺一絶手書之遂載臨川集曽紆南遊記舊亦云而其詩則客帆收浦者也二詩皆不在今集中豈以臨川集已收故邪二本大略同亦微有出入慶湖遺老集九卷拾遺二卷陳氏曰朝奉郎共城賀鑄方回撰自序言外監知章之後且推本其初出王子慶忌以慶為姓居越之湖澤今所謂鏡湖者本慶湖也避漢安帝父清河王諱改為賀氏慶湖亦轉為鏡未知其説何所據也其東山樂府張文濳序之鑄後居吳下葉少藴為作傳詳其出處且言與米芾齊名然鑄生皇祐壬辰視米芾猶為前輩也操縵集五卷陳氏曰周邦彥撰亦有全集中所無者司馬才仲夏陽集兩卷鼂氏曰司馬槱字才仲溫公之姪孫元祐初與王當輩同中賢良科調官錢塘喜賦宫體詩故世傳其為鬼物所祟而卒司馬才叔逸堂集十卷鼂氏曰司馬棫字才叔才仲之弟也登進士第亦嘗應賢良以黨錮不召詩雖纎艷比其兄稍莊雅得全居士集三卷陳氏曰趙鼎元鎮撰全集號忠正德文其曽孫壁别刋其詩附以樂府陸遊曰忠簡謫朱崖臨終自書銘旌曰身騎箕尾歸天上氣作山河壯本朝嗚呼可不謂偉人乎髙隱集七卷陳氏曰髙隱處士蘄春林敏功子仁撰嘗以春秋鄉薦不第有詩文百卷號蒙山集兵火後不存無思集四卷陳氏曰林敏修子來撰敏功之弟後村劉氏曰三林詩極少曽端伯作髙隱小傳云有詩文百二十卷今所存十無一二兄弟皆隱君子不獨以詩重柯山集二卷陳氏曰齊安潘大臨邠老撰所謂滿城風雨近重陽者也後村劉氏曰東坡文濳先後謫黃州皆與邠老遊其詩自云師老杜然有空意無實力余舊讀之病其深蕪後見夏均父讀邠老詩亦有深蕪之評溪堂集五卷補遺二卷陳氏曰臨川謝逸無逸撰漫叟詩話謝無逸學古髙傑文詞煆煉篇篇有古意尤工於詩冷齋夜話無逸工詩能文黃魯直讀其詩曰鼂張流也恨未識之耳無逸詩曰老鳳垂頭噤不語枯木槎牙噪春鳥又曰貪夫蟻旋磨冷官魚上竿又曰山寒石髮瘦水落溪毛雕皆為魯直所稱賞竹友集七卷陳氏曰謝邁幼槃撰逸之弟後村劉氏曰吕紫微評無逸詩似康樂幼槃詩似元暉按康樂一字百錬乃出冶元暉尤麗密無逸輕快有餘而欠工緻幼槃差苦思其合元暉者亦少然弟兄在政宣間科舉之外有岐路可進身韓子蒼諸人或自鬻其技至貴顯二謝乃老死布衣其髙節亦不可及日涉園集十卷陳氏曰廬山李彭商老撰公祥之從孫後村劉氏曰商老公擇尚書家子弟也東坡山谷文諸公皆與往還頗博覽強記然詩體拘狹少變化清非集二卷陳氏曰豫章洪朋龜父撰老圃集一卷陳氏曰諌議大夫洪芻駒父撰西渡集一卷陳氏曰中書舍人洪炎玉父撰洪氏弟兄四人其母黃魯直之妹不淑早世所為賦毁壁者也龜父舉進士不第其季羽鴻父坐上書元符入籍終其身芻炎皆貴而芻靖康失節貶廢羽詩不傳後村劉氏曰三洪與徐師川皆豫章之甥龜父警句往往前人所未道然早卒惜不多見駒父詩尤工初與龜父遊梅仙觀龜父有詩卒章云願為龍鱗嬰勿學蟬骨蛻是以直節期乃弟矣駒父後居上坡晚節不終不特有愧於舅氏亦有愧於長君也玉父南渡後為少蓬聞師川召有懷駒父詩云欣逢白鶴歸華表更想黃龍出羽淵然師川卒不能返駒父於鯨波之外玉父愛兄之道至矣余讀而悲之岷山百境詩二卷鼂氏曰王宷字道輔少有能詩名世謂其詩初若不經意然遣辭屬意清麗絶人自號南陔居士宣和中以狂譎被譖伏誅楊天隱詩十卷鼂氏曰皇朝楊恬字天隱潼川人文獻通考卷二百四十四
