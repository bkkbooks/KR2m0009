body:
  text: 文獻通考卷九十鄱陽馬端臨貴與著郊社考二十三雜祠淫祠大宗伯以疈辜祭四方百物疈孚逼反鬯注疏見四方禮春官人凡祭祀疈事用散注疏見祭器條鼓人凡祭祀百物之神鼓兵舞帗舞者兵謂干戚也帗列五采繒為之有秉皆舞者所執舞疏曰云鼓兵舞帗舞者天地之小神所舞不過此兵帗舞二事按下舞師山川用兵舞社稷用帗舞今此小神等若義近山川者舞兵舞義近社稷者舞帗舞故六舞之中唯言此二舞而已按司兵云祭祀授舞者兵鄭亦云授以朱干玉戚必知兵舞是干戚者見禮記云干戚之舞祭統又用朱干玉戚並是大武之舞是知兵舞干戚也又知帗舞列五采繒為之有秉者按樂師注帗析五采繒今靈星舞子持之是舉今以曉古故知之也地官一獻質謂祭羣小祀也疏曰祭羣小祀最卑但一獻而已其禮質略一獻孰一獻祭羣小祀也孰而已並禮器王祭羣小祀則元冕羣小祀林澤墳衍四方百物之屬元者衣無文裳刺黻而已凡冕服皆元衣纁裳疏曰以其祭服衣本是元今元冕一章仍以元為名眀衣上無畫一章者刺黻於裳而已周立夀星祠於下杜亳亳湯所都濟隂亳縣師古曰亳即京兆亳縣有亳亭非湯之都也時奉焉又立杜主祠因宣王殺杜伯射王故周人尊其鬼以嵗時奉祠惠王十五年有神降於莘惠王十五年魯莊公三十二年降下也言自上而下有聲像以接人也莘虢地也王問於內史過內史周大夫過名也掌爵祿廢置及䇿命諸侯孤卿大夫也曰是何故固有之乎故事也固猶常也對曰有之國之將興其君齊眀衷正齊一也衷中也精潔惠和其德足以昭其馨香惠愛也馨香芳馨之升聞也其惠足以同其民人同一也神享而民聼民神無怨故眀神降之觀其政德而均布福焉國之將亡其君貪冒辟邪淫泆荒怠粗穢暴虐其政腥臊馨香不登腥臊臭惡也登上也若馨香不上聞於神神不享也傳曰黍稷非馨眀德唯馨其刑矯誣以詐用法曰矯加誅無罪曰誣百姓攜貮攜離二二心也眀神不蠲蠲潔也而民有逺志欲叛也民神怨痛無所依懷懷歸也故神亦往焉觀其苛慝而降之禍苛煩也慝惡也是以或見神以興亦或以亡昔夏之興也融降於崇山融祝融也崇崇髙山也夏居陽城崇髙所近也其亡也回祿信於耹隧回祿火神再宿為信耹隧地名商之興也檮杌次於丕山檮杌鯀也過信曰次丕大邳山在河東其亡也夷羊在牧夷羊神獸牧商郊牧野也周之興也鸑鷟鳴於岐山三君云鸑鷟鳯之别名也詩云鳯凰鳴矣於彼髙岡其在岐山之脊其衰也杜伯射王於鄗鄗鄗京杜國伯爵唐氏之後也春秋傳曰宣王殺杜伯而不辜後三年宣王會諸侯田於囿日中杜伯起於道左衣朱衣冠朱冠操朱弓朱矢射宣王中心折脊而死也是皆眀神之志者也志記也見記録在史籍也王曰今是何神也對曰昔昭王娶於房曰房后康王之子昭王也房國名實有爽德協於丹朱爽二也協合也丹朱堯子也丹朱憑身以儀之生穆王焉憑依也儀匹也詩云實維我儀言房后之行有似丹朱丹朱憑依其身而匹偶焉生穆王也是實臨照周之子孫而禍福之夫神一不逺徙遷言神一心依慿於人不逺遷也若由是觀之其丹朱之神乎王曰其誰受之對曰在虢言神在虢虢其受之王曰然則何為何為在虢曰臣聞之道而得神是謂逢福逢迎也淫而得神是為貪禍以貪取禍也今虢少荒其亡乎王曰吾其若之何對曰使太宰以祝史帥狸姓奉犧牲粢盛往獻焉太宰王卿也掌祭祀之式玉帛之事祝太祝也掌祈福祥史太史也掌次王位狸姓丹朱之後是也其神必歆故帥之以往也凡純色謂之犧也無有祈也祈求也無有祈請禮之而已王曰虢其幾何對曰昔堯臨民以五五五年巡狩也今其胄見胄後也謂丹朱之神神之見也不過其物物數也若由是觀之不過五年王使太宰忌父周公忌也帥傅氏及祝史傅氏狸姓也在周為傅氏奉犧牲玉鬯往獻焉玉鬯鬯酒之圭長尺二寸有瓉所以灌地降神之器內史過從之虢從從太宰而往也內史不掌祭祀王以其賢以聼之也虢公亦使祝史請土焉祝史虢之祝史祝應史嚚內史過歸以告王曰虢必亡矣不禋於神而求福焉神必禍之潔祀曰禋不親於民而求用焉人必違之用用其財力也精意以享禋也享獻也慈保庶民親也慈愛也保養也今虢公動匱百姓以逞其違離民怒神而求利焉不亦難乎十九年晉取虢惠王十九年魯僖之五年也秦文公東獵汧渭之間夢黃蛇自天而下屬地其口止於鄜衍乃作鄜畤後九年文公獲若石云於陳倉北阪城祠之質如石似肝陳倉之北阪上城中也其神或嵗不至或嵗數來也常以夜光輝若流星從東方來集於祠城若雄雉其聲殷殷云野雞夜鳴師古曰殷殷聲也云傳聲之亂也言陳寶若來而有聲則野雞皆鳴以應之也雉即是野雞以一牢祠之名曰陳寶作陳寶祠臣瓉曰陳倉縣有寶夫人祠或一嵗二嵗與葉君合葉君神來時天為之殷殷雷鳴雉為之雊也若正義曰晉太康地志云秦文公時陳倉人獵得獸彘不知名牽以獻之逢二童子童子曰此名為媦常在地中食人腦即欲殺之拍捶其首媦亦語曰二童子名陳寶得雄者王得雌者霸陳倉人乃逐二童子化為雌雉上陳倉北阪為石秦祠之搜神記云其雄者飛至南陽其後光武起於南陽皆如其言也始皇既併天下東遊海上禮祠名山大川及八神見山川門而雍又有日月參神諸祠見祭星門又有四海九臣十四臣諸布諸嚴諸逐之屬皆淫祠也未聞其義百有餘廟西亦有數十祠於湖有周天子祠於下邽有天神豐鎬有昭眀天子辟池於杜亳有五社主之祠夀星祠而雍菅廟祠亦有杜主杜主故周之右將軍即杜伯其在秦中最小鬼之神也鬼雖小而有神靈各以嵗時奉祠唯雍四畤上帝為尊其光景動人民唯陳寶漢髙祖初起兵徇沛為沛公祀蚩尤釁鼓旗二年東擊項籍入關立北畤有司進祠上不親往悉召故秦祀官復置太祝太宰如其故儀禮因令縣為公社李竒曰猶官社下詔曰吾甚重祠而敬祭今上帝之祭及山川諸神當祠者各以其時禮祠之如故後四嵗天下已定詔御史令豐治枌榆社常以時春以羊彘祠之令祝立蚩尤之祠於長安置祠祝官女巫其梁巫祠天地天社天水房中堂上之屬晉巫祠五帝東君雲中君巫社巫祠族人炊之屬服虔曰東君以下皆神名也師古曰東君日神也雲中君謂雲神也巫社巫祠皆古巫之神也族人炊古主炊母之神也炊謂饎爨也秦巫祠社主巫保族纍之屬師古曰社主即上所云五社主也巫保族纍二神名纍力追反荆巫祠堂下巫先司命施糜之屬師古曰堂下在堂之下巫先巫之最先者也司命説者云文昌苐四星也施糜其先常施設糜鬻者也九天巫祠九天師古曰九天者謂中央鈞天東方蒼天東北旻天北方元天西北幽天西方浩天西南朱天南方炎天東南陽天也其説見淮南子一説云東方旻天東南陽天南方赤天西南朱天西方成天西北幽天北方元天東北變天中央鈞天也皆以嵗時祠宫中其河巫祠河於臨晉而南山巫祠南山秦中秦中者二世皇帝也張晏曰以其強死魂魄為厲故祠之成帝時匡衡奏罷之各有時日武帝七年上求神君舍之上林中磃氏館磃音斯神君長陵女子以乳死見神於先後宛若産乳而死也兄弟妻謂先後古謂娣姒今人俗呼之以為妯娌宛若字也宛若祠之其室民多往祠平原君亦往祠其後子孫以尊顯平原君武帝外祖母也及上即位則厚禮置祠之內中聞其言不見其人云亳人謬忌奏祠泰一方置夀宫神君見祀星門後人復有言古天子常以春解祠祠黃帝用一梟破鏡見祀前代門冥羊用羊祠馬行用一青牡馬泰一皋山君用牛武夷君用乾魚隂陽使者以一牛令祠官領之如其方眀年齊人少翁以方見上上有所幸李夫人卒少翁以方蓋夜致夫人及竈鬼之貌云天子自帷中望見焉乃拜少翁為文成將軍賞賜甚多以客禮禮之文成言上即欲與神通宫室被服非象神神物不至乃作畫雲氣車及各以勝日甲乙五行相尅之日如火勝金用丙丁日不用庚辛日也駕車辟惡鬼又作甘泉宫中為臺室畫天地泰一諸鬼神而置祭具以致天神居嵗餘其方益衰神不至乃見誅元封元年公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城拜卿為中大夫遂至東萊宿留之數日毋所見見大人迹云是嵗旱天子既出而無名乃禱萬里沙萬里沙神祠也在東萊曲城過祠泰山還至瓠子自臨塞決河湛祠而去湛讀作沉謂沉祭具於水中也既滅兩粵粵人勇之乃言粵人信鬼而其祠皆見鬼數有效昔東甌王敬鬼夀百六十嵗後世怠慢故衰耗乃命粵巫立粵祝祠安臺無壇亦祠天神帝百鬼天帝之神及百鬼而以雞卜持雞骨卜如鼠卜上信之粵祠雞卜自此始太初元年西伐大宛蝗大起丁夫人雒陽虞初等丁夫人其先丁復本越人封陽都侯夫人其後以詛軍為功丁姓夫人名以方祠詛胸奴大宛焉諸所興祠如薄忌泰一及三一冥羊馬行赤星五牀寬舒之祠宫皆祠名以嵗時致禮凡六祠皆太祝領之至如八神諸眀年几山他名祠行過則祠去則已方士所具祠各自主其人終則已祠官不主他祠皆如故天漢二年秋止禁巫祠道中者文頴曰始漢家於道中祠排禍咎移之于行人百姓以其不經今止之也師古曰非也祕祝移過文帝久已除之今此總禁百姓巫覡於道中祠祭耳宣帝時南郡獲白虎獻其皮爪上為立祠又以方士言為隨侯劒寶玉寶璧周康寶鼎立四祠於未央宫中又祠太室山於即墨三戶山於下密師古曰即墨下密皆膠東之縣也祠天封宛火井於鴻門如淳曰地理志西河鴻門縣有天封宛火井祠火從地中有又立嵗星辰星太白星熒惑南斗祠於長安城旁又祠參山八神於曲城師古曰東萊之縣也蓬山石社石鼓於臨朐師古曰臨朐齊郡縣也朐音劬地理志蓬山作逹山也之罘山於腄成山於不夜萊山於黃應劭曰腄音甀晉灼曰腄不夜黃縣皆屬東萊師古曰腄音丈瑞反成山祠日萊山祠月又祠四時於琅琊蚩尤於夀良師古曰東郡之縣也京師近縣鄠則有勞谷五牀山日月五帝仙人玉女祠雲陽有徑路神祠祭休屠王也師古曰休屠胸奴王號也徑路神本胸奴之祠也休音許蚪反屠音除又立五龍山仙人祠及黃帝天神帝原水凡四祠於膚施膚施上郡之縣也或言益州有金馬碧雞之神金形似馬碧形似雞可醮祭而致於是遣諌大夫王褒使持節而求之漢舊儀祭先隴西西縣人先山山上皆有畦畤如種菜畦畦中各一土封祭西王母於石室皆在所二千石令長奉祠祠已胙皆瘞埋餘祭具而去成帝時丞相匡衡奏罷五畤及陳寶祠復條奏長安厨官給祠郡國候神方士使者所祠凡六百八十三所其二百八所應禮及疑無眀文可奉祠如故其餘四百七十五所不應禮或復重復扶目反重文庸反請皆罷奏可夲雍舊祠二百三所唯山川諸星十五所為應禮云若諸布諸嚴諸逐皆罷社主有五祠置其一又罷髙祖所立梁晉秦荆巫九天南山萊中之屬及孝文渭陽孝武薄忌泰一三一黃帝冥羊馬行泰一皋山山君武夷夏后啓母石萬里沙八神延年之屬及孝宣參山蓬山之罘成山萊山四時蚩尤勞谷五牀仙人玉女徑路黃帝天神原水之屬皆罷候神方士使者副佐本草待詔七十餘人皆歸家師古曰本草待詔謂方藥本草而待詔者眀年匡衡坐事免官爵衆庶多言不當變動祭祀者又初罷甘泉泰畤作南郊日大風壞甘泉竹宫折拔畤中樹木十圍以上百餘天子異之以問劉向對曰家人尚不欲絶種祠師古曰家人謂庶人之家也種祠繼嗣所傳祠也况於國之神寶舊畤且甘泉汾隂及雍五畤始立皆有神祇感應然後營之非茍而已也武宣之世奉此三神禮敬敕備敕整也神光尤著祖宗所立神祇舊位誠未易動及陳寶祠自秦文公至今七百餘嵗矣漢興世世常來光色赤黃長四五丈直祠而息音聲砰隱野雞皆雊直當也息止也當祠處而止也砰普萌反每見雍太祝祠以太牢遣候者乘傳馳詣行在所報神之來也傳張戀反以為福祥髙祖時五來文帝二十六來武帝七十五來宣帝二十五來初元元年以來亦二十來此陽氣舊祠也及漢宗廟之禮不得擅議皆祖宗之君與賢臣所共定古今異制經無眀文至尊至重難以疑説正也前始納貢禹議後人相因多所動搖易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之後上以無繼嗣令皇太后下詔復甘泉泰畤汾隂后土及雍五畤陳寶祠在陳倉者又復長安雍及郡國祠著眀者且半成帝末年頗好鬼神亦以無繼嗣故多上書言祭祀方術者皆得待詔祠祭上林苑中長安城旁費用甚多然無大貴盛者太中大夫谷永説上曰臣聞眀於天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠及言世有仙人服食不終之藥䢣興輕舉䢣古遙字逺也興舉也起也謂起而逺去也登遐倒景如淳曰在日月之上反從下照故其景倒遐亦逺也覽觀縣圃浮遊蓬萊李竒曰崑崙九成上有所謂縣圃縣圃之上即閶闔天門耕耘五德朝種暮穫晉灼曰翼氏風角五德東方甲南方丙西方庚北方壬中央戊種五色禾於此地而耕耘也與山石無極師古曰言獲長夀比於山石無窮也黃冶變化晉灼曰黃者鑄黃金也道家言冶丹沙令變化可鑄作黃金也堅氷淖溺晉灼曰方士詐以藥王若陷氷丸投之氷上氷即消液因假為神仙道使然也或日謂冶金令可餌也師古曰或説非也淖濡甚也音女教反化色五倉之術者李竒曰思身中有五色腹中有五倉神五色存則不死五倉存則不飢皆姦人惑衆挾左道懷詐偽以欺罔世主師古曰左道邪僻之道非正義也聼其言洋洋滿耳若將可遇師古曰洋洋美盛之貌也求之蕩蕩如係風捕景終不可得是以眀王距而不聼聖人絶而不語若周史萇𢎞欲以鬼神之術輔尊靈王會朝諸侯而周室愈微諸侯愈叛楚懷王隆祭祀事鬼神欲以獲福助卻秦師而兵挫地削身辱國危秦始皇初并天下甘心於神仙之道遣徐福韓終之屬多齎童男童女入海求神采藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以仙人黃冶祭祠事鬼使物入海求神采藥貴幸賞賜纍千金大尤尊盛至妻公主爵位重絫震動海內絫古纍字元鼎元封之際燕齊之間方士瞋目扼掔言有神仙祭祀致福之術者以萬數其後平等皆以術窮詐得誅夷伏辜至初元中有天淵玊女巨鹿神人轑陽侯師張宗之姦紛紛復起師古曰轑陽侯江仁也元帝時坐使家丞上印綬隨宗學仙免官轑音遼夫周秦之末三五之隆三謂三王五謂五帝已嘗専意散財厚爵祿竦精神舉天下以求之矣曠日經年靡有毫釐之驗足以揆今經曰享多儀儀不及物惟曰不享師古曰周書洛誥之辭也言祭享之道唯以潔誠若多其容儀而不及禮物則不為神所享也論語説曰子不語怪神唯陛下距絶此類毋令姦人有以窺朝者上善其言致堂胡氏曰天子事七廟郊上帝望于山川而遍于羣神羣神謂何等也日月星辰風雨之屬則從類於上帝矣林麓邱陵水澤之屬則包舉於山川矣帝王無妄祭無徼福然則凡載於秩典者其皆有功德垂世如祭法所謂法施於民以死勤事以勞定國能禦大災能扞大患及上古君臣之賢聖者歟非此族也則非所事矣漢興禮廢之後先王祭法既不傳自秦以來乃多淫祀至武帝用方士言而尤盛焉皆無所經見率意建立逮於季世凡七百餘祀一嵗萬七千祠其不度可知矣貢禹匡衡皆請罷之是也然稽泉臺之義不必毁撤姑存而勿舉可也劉向資氣精忠為漢賢大夫豈永衡所敢望然學少不純頗信異端鴻寶祕書其所舊習今兹種祠之論謂皆有感應而後營之者何考之未詳歟是皆山呼巨迹之類以欺武帝者豈當據以為實也善乎谷永之言曰眀天地之性而知萬物之情則不可惑以神怪罔以非類以永諂邪而能及此向反不及乎尺有所短寸有所長其果然矣哀帝即位寢疾博徵方術士京師諸縣皆有侍祠使者盡復前世所常興諸神祠官凡七百餘所一嵗二萬七千祠云王莽末年崇鬼神淫祀自天地六宗以下至諸小鬼神凡千七百所用三牲鳥獸三千餘種後不能備乃以雞當鶩鴈大當麋鹿范曄論曰臧文仲祀爰居孔子以為不知漢書郊祀志著自秦以來訖於王莽典祀或有未修而爰居之類衆焉世祖中興蠲除非常修復舊祀方之前事邈殊矣章帝元和二年詔曰山川百神應祀者未盡其議增修羣祀宜享祀者殤帝延平元年詔罷祀官不在祀典者本紀注云東觀記曰鄧太后性不好淫祠桓帝即位十八年好神仙事初使中常侍之陳國苦縣祠老子又親祠老子於濯龍文罽為壇飾淳金扣設華蓋之座用郊天樂也延熹八年壞郡國諸房祀本記表紀云壞諸淫祀祠魏文帝黃初五年詔曰先王制禮所以昭孝事祖大則郊社其次宗廟三辰五行名山大川非此族也不在祀典叔世衰亂崇信巫史至乃宫殿之內戶牖之間無不沃酹甚矣其惑也自今其敢設非禮之祭巫祝之言皆以執左道論著於令晉武帝泰始元年詔曰昔聖帝眀王修五嶽四瀆名山川澤各有㝎制所以報隂陽之功故也然以道涖天下者其鬼不神其神不傷人故祝史薦而無愧辭是以其人敬慎幽冥而淫祀不作末世信道不篤僣禮黷神縱欲祈請曽不敬而逺之徒偷以求幸妖妄相煽舍正為邪故魏朝疾之其按舊禮具為之制使功著於人者必有其報而妖淫之鬼不亂其間二年正月有司奏春分祠厲殃及禳祠詔曰不在祀典除之穆帝升平中何琦論五嶽祠曰今非典之祠可謂非一考其正名則淫昏之鬼推其糜費則百姓之蠧而山川大神更為簡闕今元憝已殱宜修舊典詳見祭山川門宋武帝永初二年普禁淫祀由是蔣子文祠以下皆絶孝建初更修蔣侯祠所在山川漸皆循復眀年立九州廟於雞籠山大聚羣臣加蔣侯爵位至相國大都督中外諸軍事加鍾山王蘇侯驃騎大將軍四方諸神咸加爵秩後魏自入中國以來雖頗用古禮祀天地宗廟百神而猶循其舊俗所祀胡神甚衆太武時崔浩請存合於祀典者五十七所其餘重復及小神悉罷之孝文時自天地社稷以下合千七十五所嵗用牲七萬五千五百頭詔曰朕承天事神以育羣品而咸秩處廣用牲甚衆夫神眀正直享德與信何必在牲其令有司非天地宗廟社稷之祀皆用酒脯太和十四年詔自先朝以來享祀凡千二百餘處今欲減省務從簡易先常有水火之神四十餘名及城北星辰今圜丘之下既祭風伯雨師司中司命等眀堂祭五祀皆有此四十神悉罷之初每以正月吉日於庭設幕中置松柏樹設五帝座至孝文詔曰禮云自外至者無主不止此既無祖配揆之古典實無所取又探册之祭可悉罷之北齊後主末年祭非其鬼至於躬自鼓儛以事胡天鄴中遂多淫祠此風逮唐不絶後周欲招來西域又有拜胡天制皇帝親焉其儀並從夷俗淫僻不可紀唐武后時河南道巡撫大使狄仁傑以吳楚多淫祠奏焚其一千七百餘所獨留夏禹吳太伯季札伍貟四祠元宗開元二年詔祠龍池右拾遺蔡孚獻龍池篇公卿以下一百三十萹詔太常寺考其詞合音律者為龍池樂章十首又詔置壇及祠堂每仲春將祭則奏之十八年有龍見於興慶池因祀而見也敕太常卿韋縚草祭儀縚奏曰臣謹按周禮以疈辜祭四方百物祭法曰能出雲為風雨者皆曰神龍者四靈之畜亦百物能為雲雨亦曰神也禮有公食大夫饗之文即生曰食亦曰饗矣其饗之日合用仲春之月易曰震為龍震者東方春用事於二月也饗之法請用二月有司筮日池旁設壇官致齋設籩豆如祭雨師之儀以龍致雨也其牲用少牢樂用鼓鐘奏姑洗歌南吕鄭元云風師雨師及小祀用此樂凡六樂者三變而致鱗物今享龍亦請三變舞用帗舞樽用散酒以一獻周禮曰凡祭羣小祀用之也詔從之肅宗至德二年八月道士李國正奏皇室仙系修崇靈路請於昭應縣南三十里山頂置天華上宫露臺天地三婆父皇道君太古天皇中古伏羲媧皇等祠堂并置灑掃宫戶一百人又於縣之南義扶谷故湫置祠堂並許之昭應縣令梁鎮上疏其略曰天地婆父祀典無文言甚不經義無可取若陛下特與天地建祖宗之廟必上天貽向背之責又夫湫者龍之窟也龍得水則神無水則螻蟻之匹也故知水存則龍在水竭則龍亡今湫竭已久龍安所在何必崇飾祠宇豐潔薦奠其三皇五帝則兩京及所都之處已建宫觀祠廟時設齋醮享祀其湫既竭不可更置祠堂又不當更為天地建立宗廟臣並請停其三皇道君天皇伏羲女媧等既先各有廟望並於本祠依禮齋祭制曰可宋京城東舊有五龍即唐開元中因興慶宫池設壇常以仲春祭之宋因唐禮行其祀用中祠禮大中祥符元年詔飾神帳又城西南隅有九龍堂四年賜名普濟堂皇祐三年葺其廟訛傳池水能愈疾都人日赴不可勝計乃塞其池德安公廟在亰城北作坊即夷門山神也景德中葺其廟加封爵令開封府春秋設祭崔府君廟在京城北相傳唐滏陽令設為神主幽冥事廟在磁州淳化初民有於此置廟後詔修廟宇賜名護國廟及送衣服供具景德元年重修每嵗春秋令開封府遣官致祭後封護國顯應公要册湫在寧州真寧縣按舊記古有五池今四竭一在山之半周一百六十步潨注不益凡嵗旱祈禱無不應後人立祠其旁乾符三年封應聖侯光化二年進封普濟王太宗在晉邸嘗有神告事具符瑞志太平興國二年閏七月詔曰要册湫神普濟王宅於水府幽贊上元功烈顯著嚴祀有常宜加崇號以表靈休特改封顯聖王增飾祠宇春秋奉祀仍立碑以紀其事雍熙二年令有司改造禮衣冠劒及祭器端拱二年冬旱祈雪即日大雨雪遣使送銀香爐等天禧二年夏乾州旱取湫水禱雨詔本州祭醮鎮戎軍有朝那湫即秦漢湫淵祠也是嵗四月賜廟名靈澤靈顯王廟在鄭州城東僕射陂側是陂本後魏賜僕射李沖唐末建廟因陂為名俗傳李靖神也後唐天成二年册贈靖為太保晉加號靈顯王建隆元年正月太祖臨幸因遣內侍葺祠宇每嵗春秋二祀景德元年遣使增修二年又修後殿四年車駕朝陵命入內都知石知顒致祭祀汾隂回親幸登東北亭觀陂顯靈廟在安陵東北舊有蛇王祠景德四年賜名大中祥符四年朝陵遣官以中祠例致祭昭聖靈惠二廟並在河南永安縣界先是陵域附山而髙常苦乏水景德中朝陵車駕至則泉源瀵湧濟用無闕詔封泉神為昭應公廟曰昭聖大中祥符四年再朝陵遣官致祭以中祠禮時祀汾隂經度制置使陳堯叟議𨗳徘徊泉緣山麓入邑中眀年三陵副使江守訓立廟泉側賜名靈惠泰山玉女池在太平頂池側有石像泉源素壅而濁東封先營頓置泉忽湍涌上徙升山其流自廣清泠可鑑味甚甘美經度制置使王欽若請浚治之像頗摧折詔皇城使劉承圭易以玉石既成上與近臣臨觀遣使礱石為龕奉置舊所令欽若致祭上為作記炳靈公廟在泰山下後唐長興三年詔以泰山三郎為威雄將軍大中祥符元年十月封禪畢親幸加封令兖州增葺祠宇經度制置使王欽若自言嘗夢覩神又於廟北壖建亭名曰靈感三水府神者偽唐保大中封馬當上水府為廣祐寧江王采石中水府為濟逺定江王金山下水府為靈肅鎮江王大中祥符二年八月詔改封上水府為福善安江王中水府為順聖平江王下水府為昭信泰江王令九江太平潤州遣官祭告杭州吳山廟即濤神也大中祥符五年夏江濤毁岸遣內侍白崇慶致祭濤勢驟息五月詔封神為英烈王令本州每春秋二仲就廟建道場三晝夜及以素饌祠神眀應公廟在潤州焦山大中祥符七年上以京江多覆溺之患是山在江中近海門禱祈有應詔封山神以公爵仍製文告之刻石廟中廣惠王廟宣州昭亭山神也唐景福中封昭威侯偽唐保大中加為王景德元年正月知州裴莊表言靈應請加朝命詔封焉廣濟王廟秦蜀守李氷祠也偽蜀封大安王又封應聖靈感王開寶五年詔修廟七年改號廣濟王嵗一祀英顯王廟在劒州即梓潼神張亞子仕晉戰沒人為立廟唐元宗西狩追命左丞僖宗入蜀封濟順王咸平中王均為亂官軍進討忽有人登梯衝指賊大呼曰梓潼神遣我來九月二十日城陷你輩悉當夷滅賊射之倐不見及期果克城招安使雷有終以聞詔改王號修飾祠宇仍令少府造衣冠法物祭器靈濟公廟在梓州射洪縣白崖山下唐中書舍人陸弼貶涪州刺史卒葬山側土人立廟水旱禱之必應偽蜀封洪濟王大中祥符六年詔封公號䢼亭廟在南康軍䢼亭湖上能使行舟分風上下先是江中有蛟為害東晉旌陽令許遜斬之小蛟逸去後頗為害行舟多覆溺者大中祥符三年內侍趙履信奉使過滄湖有龍長十餘丈自空而下須臾暴雨因焚香祝之異日龍自湖中復乘雲而上又有木筏過湖忽有巨蟒登筏筏遂沉俗言即廟神也遂詔官吏祭蛟又改蛇山為吳山立廟山側下即其穴六年十月上作戒蛟文遣中使齎往刻石仍致祭自是頗有靈應祠山廟在廣德軍土人言其靈應逺近多以耕牛為獻偽唐以來聼鄉民租賃每一牛嵗輸絹一匹供本廟之費其後以絹悉入官景德二年知軍崔憲請量給絹完葺祠宇上曰此載在祀典當官為崇飾因詔本軍葺之神宗元豐三年詔加號江州盧山太平興國觀九天採訪使者為應元保運真君蜀州青城山丈人觀九天丈人為儲福㝎命真君六年太常寺言博士王古請自今諸神祠加封無爵號者賜廟額已賜廟者加封爵初封侯再封公次封王先有爵位者從其本婦人之神封夫人再封妃其封號者初二字再加四字神仙封號初真人次真君如此則錫命馭神恩禮有序從之哲宗元祐三年廣南經略司言儂冦之亂康州趙師旦封州曹覲雍州蘇緘戰死請為立祠載祀典從之紹聖二年禮部侍郎黃裳請詔天下州軍籍所祠廟略敘本末如圗經命曰某州祀典從之徽宗建中靖國元年封皮場土地廟神為靈貺侯其後纍封眀靈昭惠王崇寧元年方士魏漢津請備百物之象鑄九鼎四年三月九鼎成詔於中泰一宫之南為殿以奉安各周以垣上施睥睨墁以方色之土外築垣環之名曰九成宫中央曰帝鼐其色黃祭以土王日為大祠幣用黃樂用宫架北方曰寶鼎其色白祭以冬至幣用皂東北曰牡鼎其色白祭以立春幣用皂東方曰蒼鼎其色碧祭以春分幣用青東南曰岡鼎其色緑祭以立夏幣用緋南方曰彤鼎其色紫祭以夏至幣用緋西南曰阜鼎其色黑祭以立秋幣用白西方曰皛鼎其色赤祭以秋分幣用白西北曰魁鼎其色白祭以立冬幣用皂八鼎皆為中祠樂用登歌享用素饌復於帝鼐之宫立大角鼎星之祠大觀三年詔以鑄鼎之地作寶成宫總屋七十區中置殿曰神靈以祀黃帝東廡殿曰成功祀夏后氏西廡殿曰持盈祀周成王及周公旦召公奭後置堂曰昭應祀唐李艮及隱士嘉成侯魏漢津又詔每嵗八月二十五日舉祀事祀黃帝依感生帝神州地祇為大祠幣用黃樂用宫架祝文依祀聖祖稱嗣皇帝臣名其成功持盈二殿禮用中祠幣各用白昭應堂禮用小祀並以素饌按三代之九鼎未聞有神司之而列之祀典也崇寧時用方士之説鑄鼎而名以其方色祭之則不知司鼎者何神歟至於因采首山銅之説而祀黃帝因貢金九牧之説而祀夏后因定鼎郟鄏之説而祀成王周召然此三數聖賢之所以當祀者固不以鼎也若魏漢津則當時獻言鑄鼎之方士耳亦尸而祝之俾侑食於聖賢褻慢不經甚矣四年封英靈順濟龍王為靈順昭應安濟王詳定九域圗志所言郡邑祠廟多出流俗一時建置初非有功烈於民者請申敕禮官纂修祀典頒之天下以倣先王之命祀與圗志實相表裏從之尋令禮部太常寺修祀典已賜爵及曽封爵者為一等功德顯著無封額者為一等若民俗所建祠無功德為一等各係上尚書省參詳可否若兩處廟號不同者取一髙爵為定從之八月詔天下五龍神皆封王爵青龍神封廣仁王赤龍神封嘉澤王黃龍神封孚應王白龍神封義濟王黑龍神封靈澤王政和元年詔開封府應神祠不在祀典者毁之凡毁一千三十八區仍禁軍民擅立神祠欽宗靖康元年詔佑聖真武靈應真君加號佑聖助順真武靈應真君三聖廟靈威公進封威成王靈佑公追封威烈王靈顯公追封威惠王髙宗紹興十一年太常卿陳桷等言自來神祠加賜廟額及封王公侯爵等給降敕告自有定式昨自渡江後來神祠加封合給告者止命詞給敕竊恐未稱褒崇之意大觀三年三月二十三日詔神祠封王侯真人真君婦人封妃夫人者並給告賜額降敕欲乞自今後每遇神祠封王公侯真人真君婦人之神封妃夫人者並乞命詞給告其道釋封太師塔額神祠賜廟額及封將軍並乞依舊降敕從之二十三年七月二十一日將作監主簿孫祖夀言聖王之制祭祀非忠勞于國功德及民者不與祀典間者禁止淫祠不為不至而愚民無知至於殺人以祭巫鬼篤信不疑湖廣夔峽自昔為甚近嵗此風又寖行於他路往往隂遣其徒越境千里營致生人以販奴婢為名每至嵗閏屠害益繁雖異姓至親亦不遑恤今浙東又有殺人而祭海神者四川又有殺人而祭鹽井者守令不嚴禁之生人實被其害今嵗閏在季冬良民罹其非橫者必多若不早為之所則弗及矣欲望申嚴法令戒飭監司州官之吏治之縱之眀示賞罰增入考課令格加之鄉保連坐誥誡禁止期於革心毁撤巫鬼淫祠從之文獻通考卷九十
