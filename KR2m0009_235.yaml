body:
  text: 文獻通考卷二百三十五鄱陽馬端臨貴與著經籍考六十二集别集薛簡肅公文集四十卷參知政事薛奎宿藝撰歐陽公序略曰公絳州正平人自少以文行推於鄉里既舉進士獻其文百軸於有司由是名動京師平生所為文至八百餘篇何其盛哉公之事業顯矣其為文章氣質純深而徑正蓋發於其志如其為人云劉公是集七十五卷鼂氏曰劉敞字原父袁州人慶歷中舉進士廷試第一纍遷知制誥出知永興為人明白俊偉自六經百氏下至傳記無所不通為文章尤敏贍好摹倣古語句度在西掖時嘗食頃草九制各得其體英宗嘗語及原父韓魏公對以有文學歐陽公曰其文章未佳特博學可稱耳公是劉氏文集後序曰古今之文人多矣其能道胸中之藴積暢物理之有無合衆美以為已用超倫類而獨得使其語言如其心其馳騁極所欲瓌偉竒正放肆自若非夫豪傑之士不能至是故自申韓管商慎墨屈原之倫其道未必皆是而其書傳焉雖然猶之貴文也若夫原性命之統貫誠明之本考百子之雜博判其真偽雖至於六經可折衷也極帝王之治奉事有功雖在於今日可按行也是好古博雅之士所以貴乎學聖人而得其道真者嗚呼先生之文優出於前人者在是矣傳曰情深而文明氣盛而化神惟深故能通天下之志以極萬物之理則文有不明者乎盛如四時煦育賦豫雕刻衆形萌芽夭條無有不備是之謂神故古今之士智有所不周文有所不明由其情之蹇淺也知其一不知其二善於此不善於彼由其氣窳而化狹也嗚呼先生可謂備矣石林葉氏曰慶歷後歐陽文忠公以文章擅天下世莫敢抗衡者劉原父雖出其後以博學通經自許文忠亦以是推之作五代史新唐書凡例多問春秋於原父書梁入閣事之類原父即為剖析辭辨風生文忠論春秋多取平易原父每深言經旨文忠有不同原父間以謔語酬之文忠久或不能平復忤韓魏公終不得為翰林學士將死戒其子弟毋得遽出其文集後百年世好定當有知我者故貢父次其集藏之不肯出私諡曰公是先生貢父平生亦好諧謔慢侮公卿與荆公素厚坐是相失及死弟子私諡公非先生朱子曰劉才思極多每作文多法古絶相似有幾件文字學禮記春秋説學公穀文勝貢父劉侍讀氣平文緩乃自經術中來比之蘇公誠有髙古之趣但亦覺詞多理寡苦無甚發明竹溪林氏曰劉原父於諸經錯綜貫穿自得於心不肯下荆公荆公實畏之尚書義更定武成先後脫簡皆從原父劉公非集六十卷陳氏曰中書舍人劉攽貢父撰號公非先生敞兄弟俊敏博洽同登慶歷六年進士第敞本首冠以內兄王堯臣為編排官引嫌遂得第二仕早貴而不永年才五十攽歷州縣二十年晚乃遊館學元祐中始掌外制敞子奉世仲馮亦有名官至執政世稱三劉朱子語録曰劉貢父文字工於摹倣學公羊儀禮孫明復睢陽子集十卷鼂氏曰孫復字明復晉州人居泰山深於春秋自石介以次皆師事之年四十未娶李丞相迪以其弟子妻之慶歷中范文正公富鄭公言之於朝除國子監直講嘗對邇英閣説詩上欲以為侍講楊安國沮之而寢李泰伯退居類稿十二卷續稿八卷常語三卷周禮致太平論十卷後集六卷陳氏曰太學説書南城李覯泰伯撰其自序曰天將夀我與所為固未足也不然斯亦足以藉手見古人矣類稿慶歷所録續稿皇祐所録後集則門人傅野編泰伯不喜孟子常語專辨之朱子語録曰李泰伯文實得之經中雖淺然皆自大處起議論首卷潛書民言好如古潛夫論之類周禮論好如宰相掌人主飲食男女事某意如此今其論皆然文字氣象大段好甚使人愛之亦可見其時節方興如此老蘇父子自史中戰國䇿得之故皆自小處起議論歐公喜之李不軟帖不為所喜少微集三十卷陳氏曰職方貟外郎會稽齊唐祖之撰齊浣之後天聖八年進士兩應制科皆為首選以切直報罷居鑑湖東北去城五里名其山曰少微其集顧臨為之序樂全先生集四十卷陳氏曰參政文定公南都張方平安道撰初舉茂材異等再舉賢良方正皆中其科識略過人知蘇洵父子於布衣惡王安石於考試進士之日皆人所不能及夀八十五薨於元祐中於當時最為耆德然頗不為司馬公所喜東坡蘇氏文集序曰孔北海志大而論髙功烈不見於世然英偉豪傑之氣自為一時所宗其論盛孝章郗鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之姿綜練名實之意自見於言語至出師表簡而盡直而不肆大哉言乎與伊訓説命相表裏非秦漢以來以事君為説者所能至也常恨二人之文不見其全今吾樂全先生張公安道其庶幾乎嗚呼士不以天下之重自任久矣言語非不工也政事文學非不敏且博也然至於臨大事鮮不忘其故失其守者其器小也公為布衣則頎然已有公輔之望自少出仕至老而歸未嘗以言徇物以色假人雖對人主必同而後言毁譽不動得喪若一真孔子所謂大臣以道事君者世逺道散雖志士仁人或少貶以求用公獨以邁往之氣行正大之言用之則行舍之則藏上不求合於人主故雖貴而不用用而不盡下不求合於士大夫故悅公者寡不悅者衆然至言天下偉人則必以公為首公盡性知命體乎自然而行乎不得已非蘄以文字名世者也然自慶歷以來訖元豐四十餘年所與人主論天下事見於章疏者多矣或用或不用而皆本於禮義合於人情是非有考於前而成敗有驗於後及其他詩文皆清遠雄麗讀者可以想見其為人信乎其有似於孔北海諸葛孔明也昔曾魯公嘗為軾言公在人主前論大事他人終日反復不能盡者公必數言而決粲然成章皆可書而誦也言雖不盡用然慶歷以來名臣為人主所敬莫如公者胡文恭公集七十卷陳氏曰樞密副使文恭公晉陵胡宿武平撰晉陵之胡自文恭始大其猶子宗愈仍執政子孫為侍從九卿者以十數紹興世將承公亦其後至今為名族蔡君謨集十七卷鼂氏曰蔡襄君謨興化人天聖中舉進士在慶歷四諫官選中纍遷至翰林學士權三司使嘗知福泉杭三州文章清遒粹美工書為宋朝第一陳氏曰集三十六卷近世始刻於泉州王十朋龜齡為序余嘗宦莆至其居去城三里荔子號玉堂紅者正在其處矮屋欲壓頭猶是當時舊物歐公所撰墓志石立堂下真迹及諸公書帖多有存者京卞同郡晚出欲自附於名閥自稱為族弟本傳云爾襄孫佃唱名第一京時當國以族孫引嫌降第二佃終身恨之鄭毅夫鄖溪集五十卷鼂氏曰鄭獬字毅夫安州人少俊異為詩賦有聲廷試第一纍遷知制誥入翰林學士王安石不悅之乘宰相在告除獬知杭州為文有豪氣峭整無長語與滕達道少相善並嗜酒落魄無檢操人目之為滕屠鄭沽云陳氏曰皇祐五年進士首選坐知開封府不肯用按問新法為王安石所惡而出廷試圜丘象天賦時獬與滕甫俱有場屋聲甫賦首曰大禮必簡圜丘自然自謂人莫能及獬賦但倒一字曰禮大必簡丘圜自然甫聞之大服果居其次云曾子固南豐類稿五十卷鼂氏曰曾鞏字子固南豐人元豐中為中書舍人卒子固師事歐陽永叔早以文章名天下壯年其文慓鷙奔放雄渾瓌偉其自負要自劉向藐視韓愈以下也晚年始在掖垣屬新官制方除目填委占紙肆書初若不經意及屬草授吏所以本法意原職守為之訓敕者人人不同贍裕雅重自成一家歐公門下士多為世顯人議者獨以子固為得其傳猶學浮屠者所謂嫡嗣云陳氏曰王震為之序年譜朱熹所輯也按韓持國為神道碑稱類稿五十卷續四十卷外集十卷本傳同之及朱公為譜時類稿之外但有别集六卷以為散逸者五十卷而别集所傳其什一也開禧乙丑建昌守趙汝礪丞陳東得於其族孫濰者校而刋之因碑傳之舊定著為四十卷然所謂外集者未知何當則四十卷亦未必合其舊也朱子語録曰南豐文字確實他初亦只是學為文却因學文漸見些子道理故文字依傍道理不為空言只是關鍵緊要處也説得寬緩不分明緣他見處不徹本無根本工夫所以如此但比之東坡則又較質而近理東坡則華艷處多曾子開曲阜集四十卷奏議十二卷西掖集十二卷內制五十卷外制三十卷鼂氏曰曾肇字子開子固之弟也登進士第元祐中為中書舍人元符末再入西掖遂為翰林學士前後歷陳潁宋泰海和金陵真定九郡帥守坐兄子宣貶亦以散官汀州安置崇寧末移台州居京口而終封曲阜侯陳氏曰肇元祐中為西掖元符中再入故别名庚辰外制集肇制誥溫潤典雅其草兄布拜相制汪玉山稱之以為得命次相之體蘇明允嘉祐集十五卷鼂氏曰蘇洵字明允眉山人至和中歐陽永叔得明允書二十二篇大愛其文辭以為賈誼劉向不過也以書獻除校書郎與姚子張同編太常因革禮百卷書方成而卒治平史臣謂永叔所獻明允之文甚美大抵兵謀權利機變之言也陳氏曰洵初入京師益帥張文定薦之歐陽公世皆知之而有雷簡夫者為雄州以書薦之張歐及韓魏公尤力張之知洵由簡夫世罕知之雷之書文亦慨慷偉麗可喜南豐曾氏哀詞曰明允始舉進士又舉茂材異等皆不中歸焚所為文閉户讀書五六年所有既富矣乃始復為文蓋少或百字多至千言其指事析理引物托諭侈能盡之約逺能見之近大能使之微小能使之著煩能不亂肆能不流其雄壯俊偉若決江河而下也其輝光明白若引星辰而上也朱子語録曰老蘇文雄渾其父子為文自史中戰國䇿得之皆自小處起議論看老蘇六經論則是聖人全是以術欺天下老蘇門只就孟子學作文不理會他道理然其文亦實是好蘇東坡前集四十卷後集二十卷奏議十五卷內制十卷外制三卷和陶集四卷應詔集十卷鼂氏曰蘇軾子瞻洵之長子也軾生十年其母授以書聞古今成敗輒能語其要比冠學通經史屬文日數千言嘉祐中歐陽永叔考試禮部進士梅聖俞與其事得其論刑賞以示永叔至驚喜以為異人欲以冠多士疑曾子固所為乃置之第二等後以書謝永叔見之語客曰老夫當避此人放出一頭地又以直言薦之答䇿入上等英宗在藩邸聞其名欲以唐故事召入翰林宰相不可知湖州以表謝上言事者摘其語以為謗遣官逮赴御史臺初子瞻當王安石紛更法度之際見其事不便於民則賦詩以諷焉言者從而擠陷欲置之死神宗薄其過責置黃州溫公相哲宗纍擢中書舍人除翰林學士承旨紹聖中坐草責吕惠卿制直書其罪誣以訕謗安置惠州徙昌化元符初北還卒於常州初好賈誼陸贄書論古今治亂不為空言既責黃州杜門深居馳騁翰墨其文一變平生遇事所為詩騷銘記書校論撰率皆過人晚喜陶淵明詩和之幾遍為人英辨竒偉於書無所不通所作文章才落筆四海已皆傳誦下至閭閻田里外至夷狄莫不知名門下賔客亦皆一世豪傑其盛本朝所未有也立朝知無不為世稱其忠義嘗自比范滂孔融議者不以為過在黃州日自號東坡居士世因不呼其名止目之為東坡云陳氏曰杭蜀夲同但杭本無應詔集朱子語録東坡文字明快但傷於巧議論有不正當處後來到中原見歐公諸人了文字方稍平大抵已前文字却平正亦不會大假巧説自三蘇文出學者始日趨於巧坡文雄健有餘只下字有不帖實處東坡文只是大勢好不可逐一字去檢點東坡善議論有氣節其文字晚年不衰蓋是夾雜些佛老添得又閙熱也蘇子由欒城集前集五十卷後集二十四卷第三集十卷應詔集十二卷鼂氏曰蘇轍子由洵之次子也年十九中進士第二十舉直言因所問極言得失䇿入或欲黜之仁宗不許擢商州推官以兄得罪從坐謫筠州監酒宣仁臨朝相溫公擢中書舍人代子瞻為翰林學士未幾拜尚書左丞紹聖初責置雷州後北還凡居雷循七年居許十六年杜門理舊學於是詩春秋傳老子解古史書皆成自謂得聖賢遺意陳氏曰欒城真定府縣也蘇氏望趙郡欒城元魏時屬趙郡故云晚居潁濱自號潁濱遺老故集或名東坡蘇氏曰子由之文實勝僕而世俗不知乃以為不如其為人深不願人知之其文如其為人故汪洋淡泊有一唱三歎之聲而其秀傑之氣終不可沒作黃樓賦乃稍自振厲若欲以警發憒憒者而或者便謂僕代作此尤可笑是殆見吾善者機也朱子語録東坡文字較明白子由文字不甚分曉平園周氏曰吾友陸務觀當今詩人之冠冕數勸豫哦蘇黃門詩退取欒城集觀之殊未識其旨趣甲申閏月郊居無事天寒踞爐如餓鴟劉子澄忽自城中寄此卷相示快讀數過溫雅髙妙如佳人獨立姿態易見然後知務觀於此道真先覺也三蘇年表三卷陳氏曰右奉議郎孫汝聽撰汝聽當是蜀人敘述甚詳東坡别集四十六卷陳氏曰坡之曾孫給事嶠季真刋家集於建安大略與杭本同蓋杭本當坡公無恙時已行於世矣麻沙書坊又有大全集兼載志林雜説之類亦雜以潁濱及小坡之文且間有訛偽勦入者有張某為吉州取建安本所遺盡刋之而不加考訂中載應詔䇿論蓋建安本無應詔集也王介甫臨川集一百三十卷鼂氏曰王安石字介甫撫州臨川人慶歷三年進士纍除制誥神宗在藩邸見其文異之召為翰林學士熙寧三年拜中書門下平章事熙寧七年罷明年再入相九年罷卒年六十六諡文公其壻蔡卞謂自先王澤竭士習卑陋不知道德性命之理安石奮乎百世之下追堯舜三代通乎晝夜隂陽所不能測而入於神著雜説凡數萬言其言與孟軻相上下晚以所覺考字畫竒耦橫直深造天地陰陽造化之理著字説包括萬象與易相表裏崇寧初卞之兄京秉政詔配文宣王廟近時議者謂自紹聖以來學術政事敗壞殘酷貽禍社稷實出於安石云陳氏曰方嘉祐以前名重一世迹其文學論議操守使不至大位則光明俊偉不可瑕疵者老蘇曰使斯人而不用也則吾言為過而斯人有不遇之嘆孰知其禍之至此哉何其知之明也東坡蘇氏曰文字之衰未有如今日者也其源出於王氏王氏之文未必不善也而患在於好使人同已自孔子不能使人同顔淵之仁子路之勇不能以相移而王氏欲以其學同天下地之美者同於生物而不同於所生惟荒瘠斥鹵之地彌望皆黃茅白葦此則王氏之同也王魏公集二十卷陳氏曰尚書左丞王安禮和甫撰近時厚之順伯其曾孫也王校理集六十卷陳氏曰祕閣校理王安國平父撰安國雖親安石弟意向頗不合尤惡吕惠卿卒為所陷坐鄭俠事奪官歸田里亦會惠卿方叛安石故也尋復之命下而卒南豐曾氏序略曰平甫自少已桀然以材髙見於世為文思若決河語出驚人一時爭誦之其學問尤敏而資之以不倦至晚愈篤博覽強記於書無所不通其明於是非得失之理為尤詳其文閎富典重其詩博而深矣世皆謂平甫之詩宜為樂歌薦之郊廟其文宜為典册施諸朝廷而不得用於世然其文之可貴人莫得而掩也古今作者或能文不必工於詩或長於詩不必有文平甫獨兼得之其於詩尤自喜其憂喜哀樂感激怨懟之情於詩見之故詩尤多也廣陵集二十卷陳氏曰揚州布衣王令逢原撰令少年有盛名王介甫尤重之年二十八而卒其妻吳氏安石夫人之女弟也守志不嫁一女遺孕嫁吳師禮其子曰説所謂吳傅朋也令之墓安石銘之後有劉發者為之傳吳氏之墓其姪王雲銘之奉使死磁州者也石林葉氏曰王逢原作騷文極工蓋非徒有意言語嘗渡揚州江中流慨然有感乃作江上詞既以為未極其意又作山中詞寄示王荆公荆公讀中篇不覺失聲嘆曰秦漢後乃有斯人邪自以為不及於是與之交益密逢原早死文字多散落二詞世少有見者後村劉氏曰昔讀廣陵集草草用朱筆點出妙處晚年遂再選一番本朝諸人惟逢原别是一種風調如靈芝慶雲出為祥瑞半山崛強於歐蘇無所推讓非苟嘆服後生者王深父文集二十卷王回深父福州侯官人舉進士中第為亳州衛真縣主簿卒於治平二年年四十三南豐曾氏文集序曰當先王之迹熄六藝殘缺道術衰微天下學者無所折𠂻深甫於是奮然獨起因先王之遺文以求其意得之於心行之於已其動止語默必考於法度而窮達得喪不易其志也文集二十卷其辭反覆辨達有所開闡其卒蓋將歸於簡也其破去百家傳注推散缺不全之經以明聖人之道於千載之後所以振斯文於將墜回學者於既溺可謂道德要言非世之别集而已也後之潛心於聖人者將必由是而有得則其於世教豈小補而已哉嗚呼深父其志方強其德方進而不幸死矣故其澤不加於天下而其言止於此然觀其所可考者豈非孟子所謂名世者歟其文有片言半簡非大義所存皆附而不去者所以明深父之於其細行皆可傳於世也西麓周氏曰王深父學於歐陽公與王介甫曾子固劉原甫遊其文出歐陽體而尤純淡序事曲折不窮特壯偉不及也至於摘經傳語以為賦詞短而意深有味其言哉文章自漢魏以來體益下至唐中世韓栁作興之習俗相沿未遽盡革加以五代亂離死生於矛戟中而文章喪矣國初漸欲修復古文天聖明道以後歐陽公與穆伯長尹師魯石守道數君子以大手筆倡之流傳於後遂以歐陽公為宗文章髙下固自有時哉以吾觀之數君子之功誠不可泯沒然其離合盛衰關於世道似亦非偶然者古詩逮齊梁浮靡不振唐自陳子昻氏以前猶未數也開元天寶之盛李杜之光焰始長矣同時王摩詰孟浩然韋蘇州片言隻字皆不入俗借無李杜詩不得不變也王深父曾子固不遇歐陽公亦豈作落霞孤鶩等語哉水心葉氏曰聞之吕氏讀王深父文序使人長一格事君責難愛人抱關諸賦可以熟玩自王安石王回始有幽逺遺俗之思異於他人而回不志於利能充其言非安石所能及少假不死及安石之用未知與曾鞏常秩何如士之出處固難言也王子直文集王向子直深父之弟南豐文集序曰子直自少已著文數萬言與其兄弟俱名聞天下可謂魁竒拔出之才而其文能馳騁上下偉麗可喜者也讀其書知其與漢以來名能文者俱列作者之林未知其孰先孰後考其意不當於理者亦少矣然子直晚自以為不足而悔其少作更欲窮探力取極聖人之指要大行則欲發而見之事業窮居則欲推而托之文章將與詩書之作者並而文未知其孰先孰後也然不幸早世故雖有難得之材獨立之志而不得及其成就此吾徒與子直之兄深甫所以為恨也西麓周氏曰子直之於深甫猶潁濱之於東坡也芝蘭之叢無不香者然子直時有英氣而能力自蟠屈以就法度可謂有意於文章也王容季文集王冏容季子直之弟南豐文集序曰敘事莫如書其在堯典述命羲和宅土測日晷星候氣揆民緩急兼蠻夷鳥獸其財成輔相備三才萬物之理以治百官授萬民興衆功可謂博矣然其言不過數十其於舜典則曰在璿璣玉衡以齊七政蓋堯之時觀天以歷象至舜又察之以璣衡聖人之法至後世益備矣曰七者則日月五星曰政者則羲和之所治無不在焉其體至大蓋一言而盡可謂微矣其言微故學者所不得不盡心能盡心然後能自得之此所以為經而歷千餘年蓋能得之者少也易詩禮春秋論語皆然其曰測之而益深窮之而益逺信也世既衰能言者益少承孔子者孟子而已承孟子者揚子而已揚子之稱孟子曰知言之要知德之奧若揚子亦足以幾乎此矣其次能敘事使可行於逺者若子夏左邱明司馬遷韓愈亦可謂拔出之材其言庶乎有益者也吾友王氏兄弟曰回深父曰向子直曰冏容季皆善屬文長於敘事深父尤深而子直容季蓋能稱其兄者也皆可謂拔出之材令其克夀得就其志則將紹六藝之遺言其可禦哉又為墓銘曰容季孝弟純篤尤克意學問自少已能為文章尤長於敘事其所為文出輒驚人為人自重不馳騁衒鬻亦不孑孑為名日與其兄講唐虞孔子之道以求其內言行出處常擇義而動其磨礱灌養而不止者吾未能量其所至也不幸其志未就其材未試而短命死矣初容季之伯兄回深甫以道義文章退而家居學者所宗而仲兄向子直亦以文學器識名聞當世容季又所立如此學士大夫以為此三人者皆世不常有藉令有之或出於燕或出於越又不可得之一鄉一國也未有同時並出於一家如此之盛若將使之有為也而不幸輒死皆不得至於夀考以盡其材是有命矣按侯官三王之文蓋宗師歐公者也其大家正氣當與曾蘇相上下故南豐推服其文而深悲其早世然鼂陳二家書録並不收入四朝國史藝文志僅有王深父集才十卷則止有曾序所言之半而子直容季之文無傳焉亦不能知其卷帙之多少可惜也華陽集一百卷鼂氏曰皇朝王圭禹玉其先成都人故號華陽後居開封少好學日誦數千言及長博通羣書慶歷二年廷試第二嘉祐初入翰林至熙寧三年始參大政凡為學士者十五年後拜相薨年六十七諡文恭陳氏曰圭典內外制十八年集中多大典册詔令其詩號至寶丹以其好為富貴語也在相位無所建明人目為三旨相公元豐末命圭本無異論亦緣其備首相不能早發大議依違遷延以召讒賊云文獻通考卷二百三十五
