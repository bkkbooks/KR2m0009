body:
  text: 文獻通考卷一百二十一鄱陽馬端臨貴與著王禮考十六國恤漢髙祖十二年夏四月甲辰帝崩於長樂宫丁未發喪大赦天下五月丙寅葬長陵已下已下棺也皇太子羣臣皆反至太上皇廟羣臣曰帝起細微撥亂世反之正平定天下為漢太祖功最髙上尊號曰髙皇帝丙寅太子即皇帝位即葬日也賜給喪事者二千石錢二萬六百石以上萬五百石二百石以下至佐史五千視作斥上者將軍四十金斥上壙上也二千石以下有差漢舊制皇帝崩三日小斂室中牖下作栗木主長八寸前方後圎圍一尺置牖中望外內張綿絮以彰外以皓木大如指長三尺四枚纒以皓皮四方置牖中主居中央七日大斂棺椁以稻糲飯羊舌祭之牖中已葬收主為木函藏廟太室中西墻壁坎中去地六尺一寸當祠則設座於坎中下祠之出主置篋蓋上立之牖中髙皇帝主長九寸上林給栗木長安祠廟作神主東園祕棺則梓棺素木長丈三尺崇廣四尺髙皇帝崩含以珠纒以緹繒十二重以玉為襦如鎧狀連縫之以黃金為縷腰以下玉為札長廣二寸半為柙下至足亦縫以黃金為縷請諸衣衾斂之凡乘輿衣服已御輒藏之崩皆以斂不制裁一尺新繒帛也帝初登遐朝臣稱曰大行皇帝魏孫育曰大行之稱起於漢氏漢書曰大行在前殿又曰大行無遺詔諡法大行受大名小行受小名初崩未諡而嗣帝已立臣下所稱辭宜有異故謂之大行言其有大德行必受大名若稱諡也文帝後七年夏六月帝崩于未央宫遺詔曰朕聞之蓋天下萬物之萌生靡不有死死者天地之理物之自然奚可甚哀當今之世咸嘉生而惡死厚葬以破業重服以傷生吾甚不取且朕既不德無以佐百姓今崩又使人重服久臨以罹寒暑之數師古曰罹音離遭也哀人父子傷長老之志損其飲食絶鬼神之祭祀以重吾不德謂天下何朕獲保宗廟以眇眇之身託于天下君王之上二十有餘年矣賴天之靈社稷之福方內安寧臣瓉曰方四方也內中也猶云中外靡有兵革朕既不敏常畏過行以羞先帝之遺德惟年之久長懼于不終今乃幸以天年得復供飬于髙廟朕之不眀與嘉之其奚哀念之有師古曰帝自言或者豈朕見之不眀乎以不可加為嘉耳然朕自謂得終天年供飬髙廟為可嘉之事無所哀念也今俗語猶然其意可曉其令天下吏民令到出臨三日皆釋服無禁取婦嫁女祠祀飲酒食肉自當給喪事服臨者皆無踐伏儼曰踐剪也謂無斬衰也孟康曰踐跣也晉灼曰漢語作跣跣徒跣也師古曰孟晉二説是也絰帶無過三寸無布車及兵器應劭曰無以布衣車及兵器也服虔曰不施輕車介士也師古曰應説是也無發民哭臨宫殿中殿中當臨者皆以旦夕各十五舉音禮畢罷非旦夕臨時禁無得擅哭臨以下師古曰為下棺也音義與髙紀同服大紅十五日小紅十四日纎七日釋服服虔曰皆當言大功小功布也纎細布衣也應劭曰紅者中祥大祥以紅為領緣纎者禫也凡三十六日而釋服矣此以日易月也晉灼曰漢書例以紅為功也師古曰紅與功同服晉二説是也此喪制者文帝自率已意創而為之非有取于周禮也何為以日易月乎三年之喪其實二十七月豈有三十六月之文禫又無七月也應氏既失之于前而近代學者因循謬説未之思也他不在令中者皆以此令比類從事布告天下使眀知朕意霸陵山川因其故無有所改應劭曰因山為藏不復起墳山下川流不遏絶就其水名以為陵號歸夫人以下至少使應劭曰夫人已下有美人良人八子七子長使少使皆遣歸家重絶人類令中尉亞夫為車騎將軍屬國悍為將屯將軍師古曰典屯軍以備非常郎中令張武為復土將軍如淳曰主穿壙填瘞事師古曰穿壙出土下棺也已而填之又即以為墳故云復土復反還也音扶目反發近縣卒萬六千人發內史卒萬五千臧郭穿復土屬將軍武師古曰即張武也賜諸侯王以下至孝悌力田金錢帛各有數乙巳葬霸陵公非劉氏曰文帝制此喪服斷自己葬之後其未葬之前服斬衰漢諸帝自崩至葬有百餘日者未葬則服不除矣按翟方進傳後母終既葬三十六日起視事以身􅍯漢相不敢踰國家之制此其證也説者遂以日易月又不通既葬之日皆大繆也考之文帝意既葬除重服制大紅小紅所以漸即吉耳致堂胡氏曰文帝減節喪紀負萬世譏責以小仁害大仁固有罪矣然遺詔所論者謂吏民耳太子嗣君豈吏民歟而景帝冒用此文乃自短三年之制是不為君父服斬縗自景帝始也且天子之所以不遂服三年者何謂哉謂妨政事邪謂費財用邪謂防攝政之人邪謂妨政事孰先于國家之大憂也謂費財用即不得不可以為恱財用固所以行禮也謂防攝政之人則自堯舜至周末未聞有攝政之人而奪喪君之國者至於為臣民嫁娶祠祀之故則用輕廢重尤為不倫揆之以理稽之以事無一而可不法堯舜三代乃安然以刻薄之景帝為師而無所戒懼特謂位尊勢隆得以自便是不知理義之為大也寥寥千載惟晉武欲行古制而尼於裴杜之邪説獨魏孝文天性仁􅌋斷以不疑雖不盡合禮文而哀戚之情溢於杖絰讀其史者猶惻然感動想見其為人建業諸帝卒未有及之者豈不惜哉按後之儒者皆以為短喪自孝文遺詔始以為深譏然愚考之三年之喪自春秋戰國以來未有能行者矣子張問曰書云髙宗諒隂三年不言何謂也子曰何必髙宗古之人皆然蓋時君未有行三年喪者故子張疑而問之而夫子答以古禮皆然蓋亦歎今人之不能行也滕文公問喪禮于孟子欲行三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也魯最為秉禮之國夫子稱其一變可以至道而尚不能行此則他國可知漢初禮文大率皆承秦舊秦無禮義者也其喪禮固無可考然杜預言秦燔書籍率意而行亢上抑下漢祖草創因而不革乃至率天下皆終重服旦夕哀臨經罹寒暑禁塞嫁娶飲酒食肉制不稱情是以孝文遺詔斂畢便葬葬畢制紅禫之文以是觀之則孝文之意大概欲革秦之苛法耳蓋古人所謂方喪三年所謂為天王斬衰者亦以資於事父以事君其義當然然檀弓言天子崩三日祝先服五日官長服七日國中男女服三月天下服又言君之喪諸達官之長杖則亦未嘗不因其官之崇卑情之淺深而有所隆殺秦務欲尊君卑臣而驅之以一切之酷法意其所以令其臣民者哭臨之期衰麻之制必有刻急而不近人情者是以帝矯其敝釋其重服而為大功小功纎釋其久臨而為三十六日詔語忠厚懇惻與異時振貸勸課等詔皆仁人之言豈可訾也帝之詔固不為嗣君而設而景帝之短喪亦初不緣遺詔也何也蓋古者天子七月而葬諸侯五月而葬雖通喪必以三年然亦以葬後為即吉之漸宋桓公卒未葬而襄公會諸侯于葵邱故書曰宋子貶之也晉悼公卒既葬未終喪而平公會諸侯於溴梁則書以晉侯矣晉獻公卒奚齊未葬而遇殺則稱君之子卓既葬而遇弒則稱君眀未葬則不可眀其為君也自春秋以來諸侯多不能守五月之制蓋欲急于從吉也滕文公五月居廬未有命戒蓋孟子雖誨以三年之喪而文公僅能五月未葬之前守諒隂之制耳然亦當時所無也至秦始皇以七月崩於沙邱九月葬漢髙祖崩凡二十二日而葬葬之一日而惠帝即位文帝崩凡七日而葬葬之三日而景帝即位蓋葬期愈促矣必葬而即位者可知其以吉禮即位也必促葬期者可知其決不能諒隂三年也景帝之所遵者惠帝之法惠帝之所遵者春秋以來至亡秦之法耳豈孝文遺詔為之乎劉公非言翟方進後母死葬後三十六日起視事以身備漢相不敢踰國家之制以為眀證然詳孝文之詔既不為嗣君而設亦未嘗以所謂三十六日者為臣下居私喪之限制也俗吏薄孝敬而耽榮祿是以並緣此詔之語遂立短喪之法以便其私至方進之時遂指為漢家之法耳平帝元始五年崩于未央宫大赦天下有司議曰禮臣不殤君皇帝年十有四嵗宜以禮斂加元服奏可王莽欲眩惑天下示忠孝使吏六百石以上皆服喪三年東漢志皇帝不豫太醫令丞將醫入就進所宜藥嘗藥監近臣中常侍小黃門皆先嘗藥過量十二公卿朝臣問起居無間太尉告請南郊司徒司空告請宗廟告五嶽四瀆羣祀並禱求福疾病公卿復如禮登遐皇后詔三公典喪事百官皆衣白幘不冠閉城門宫門近臣中黃門持兵虎賁羽林郎中署皆嚴宿衛宫府各警北軍五校繞宫屯兵黃門令尚書御史謁者晝夜行陳三公啓手足色膚如禮皇后皇太子哭踊如禮沭浴如禮守宫令兼東園匠將女執事黃綿緹繒金縷玉柙如故事漢舊儀曰帝崩含以珠纒以緹繒十二重以玉為襦如鎧狀連縫之以黃金為縷腰以下以玉為札長一尺一寸半為柙下至足亦縫以黃金縷請諸衣衾斂之凡乘輿衣服已御輒藏之崩皆以斂飯含珠玉如禮禮稽命徴曰天子飯以珠含以玉諸侯飯以珠含以珠卿大夫士飯以珠含以貝槃冰如禮周禮凌人天子喪供夷槃冰鄭元曰夷之言尸也實冰于槃中置之尸床之下所以寒尸也漢禮器制度大槃廣八尺長一丈二尺深三尺漆赤中也百官哭臨殿下是日夜下竹使符告郡國二千石諸侯王應劭曰凡與郡國守相竹使符皆以竹箭五枚長五寸鐫刻書第一至第五張晏曰符以代古之圭璋從簡易也此下大喪符木猶斯比竹使符到皆伏哭盡哀漢舊制發兵皆以銅虎符其餘徴調竹使而已符第合會為大信見杜詩傅小斂如禮東園匠考工令奏東園祕器表裏洞赤虞文畫日月鳥龜龍虎連璧偃月牙檜梓宫如故事大斂于兩楹之間五官左右虎賁羽林五將各將所部執虎賁戟屯殿端門陛左右廂中黃門持兵陛殿上夜漏羣臣入晝漏上水大鴻臚設九賔隨立殿下謁者引諸侯王立殿下西面北上宗室諸侯四姓小侯在後西面北上治禮云三公就位殿下北面特進次中二千石列侯次二千石六百石博士在後羣臣陪位者皆重行西上位定大鴻臚言具謁者以聞皇后東向貴人公主宗室婦女以次立後皇太子皇子在東西向皇子少退在南北面皆伏哭大鴻臚傳哭羣臣皆哭三公升自阼階安梓宫內圭璋諸物近臣佐如故事嗣子哭踊如禮周禮駔圭璋璧琮琥璜之渠眉疏璧琮以斂尸鄭司農曰駔外有捷盧也謂圭璋璧琮琥璜皆為開渠為眉瑑沙除以斂尸令汁得流去也鄭元曰以斂尸者以大斂焉加之也渠眉玉飾之溝瑑也以組穿聨六玉溝瑑之中以斂尸圭在左璋在首琥在右璜在足璧在背琮在腹蓋取象方眀神之也疏璧琮者通于天地東園匠武士下釘衽截去牙喪大記曰君蓋用漆三柱三束鄭元注曰衽小腰太常上太牢奠太官食監中黃門尚食次奠執事者如禮太常大鴻臚傳哭如儀三公奏尚書顧命太子即日即天子位於柩前請太子即皇帝位皇后為皇太后奏可羣臣皆出吉服入會如儀太尉升自阼階當柩御坐北面稽首讀策畢以傳國玉璽綬東面跪授皇太子即皇帝位中黃門掌兵以玉具隨侯珠斬蛇寶劒授太尉告令羣臣羣臣皆伏稱萬嵗或大赦天下遣使者詔開城門宫門罷屯衛兵羣臣百官罷入成喪服如禮文帝遺詔無布車及兵器應劭曰不施輕車介士三公太常如禮故事百官五日一會臨故吏二千石刺史在京都郡國上計掾史皆五日一會天下吏民發喪臨三日文帝遺詔先葬二日皆旦晡臨既葬釋服無禁嫁娶祠祀文帝遺詔文有飲食酒肉自當給喪事服臨者皆無踐踐徒跣也佐史以下布衣冠幘絰帶無過三寸臨庭中文帝遺詔武吏布幘大冠大司農出見錢榖給六丈布置以葬大紅十五日小紅十四日纎七日釋服應劭曰紅者中祥大祥以紅為領纎禫也凡三十六日而釋部刺史二千石列侯在國者及關內侯宗室長吏及因郵奉奏諸侯王遣大夫一人奉奏弔臣請驛馬露布奏可太皇太后皇太后崩司空以特牲告諡事於祖廟如儀長樂太僕少府大長秋典喪事三公奉制度他皆如禮儀光武中元二年二月戊戌帝崩于南宫前殿遺詔曰朕無益百姓皆如孝文皇帝制度務從省約文帝葬皆以瓦器不以金銀銅錫為飾因其山不起墳刺史二千石長吏皆無離城郭無遣吏及因郵奏説文曰郵境上行書舍也光武崩趙熹為太尉受遺詔典喪禮時藩王皆在京師自王莽篡亂舊典不存皇太子與東海王等雜上同席熹乃正色扶下諸王以眀尊卑顯宗崩熹復典喪事冉奉入行禮事修奉顯宗永平十八年八年壬子帝崩遺詔無起寢廟藏主於光烈皇后更衣别室沖帝崩太后以揚徐盜賊強盛恐驚優至亂欲須所徴諸侯王到乃發喪李固對曰帝雖年幼猶天下之父今日崩亡人神感動豈有臣子反共掩匿乎昔秦皇亡於沙邱胡􅕀趙髙隱而不發卒害扶蘇以亡國近北鄉侯薨閻后兄弟及江京等亦共掩蔽遂有孫程手刃之事此天下大忌不可之甚也太后從之趙典為厨亭侯帝崩時禁藩國諸侯不得奔弔典獨慨然解印綬符策赴縣而馳到京師州郡及大鴻臚並執處其罪公卿百寮嘉典之義表請以租自贖詔書許之魏武王以禮送終之制襲稱之數繁而無益俗又過之先自制送終衣服四篋題識其上春秋冬夏曰有不諱隨時以斂金珥珠玉銅鐵之物一不得送遺命百官當臨殿中者十五舉音葬畢便除文帝黃初三年作終制見山陵門帝崩國內服三日眀帝時毛皇后崩未葬詔宜稱大行尚書孫育奏武宣皇后崩未葬時稱太后文德皇后崩侍中蘇林議皇后皆有諡未葬宜稱大行以為古禮無稱大行之文按漢天子稱行在所言不常居崩曰大行者不返之稱也未葬未有諡不言大行則嫌與嗣天子同號至于后崩未葬禮未立后宜無所嫌故漢氏諸后不稱大行謂未葬宜直稱皇后詔曰稱大行所以别存亡之號故事亦然今當如稱議稱大行晉文帝之喪臣民皆從權制三日除服既葬武帝亦除之然猶素冠蔬食哀毁如居喪者秋八月帝將謁崇陽陵群臣奏言秋暑未平恐帝悲感摧傷帝曰朕得奉瞻山陵體氣自佳耳又詔曰漢文不使天下盡哀亦帝王至謙之志當見山陵何心無服其議以縗絰從行郡臣自依舊制尚書令裴秀奏曰陛下既除而復服義無所依若君服而臣不服亦未之敢安也詔曰患情不能跂及耳衣服何在諸君勤勤之至豈茍相違遂止中軍將軍羊祜謂傅元曰三年之喪雖貴遂服禮也而漢文除之毁禮傷義今主上至孝雖奪其服實行喪禮若因此復先王之法不亦善乎元曰以日易月已數百年一旦復古難行也祜曰不能使天下如禮且使主上遂服不猶愈乎元曰主上不除而天下除之此為但有父子無復君臣也乃止戊辰羣臣奏請易服復膳詔曰每感念幽冥而不得終苴絰之禮以為沈痛況當食稻衣錦乎適足激切其心非所以相解也朕本諸生家傳禮來久何至一旦便易此情于所天相從已多可試省孔子答宰我之言無事紛紜也遂以疏素終三年司馬公曰三年之喪自天子達于庶人此先王禮經百世不易者也漢文師心不學變古壞禮絶父子之恩虧君臣之義後世帝王不能篤于哀戚之情而羣臣諂諛莫肯釐正至於晉武獨以天性矯而行之可謂不世之賢君而裴傅之徒固陋庸臣習常玩故不能將順其美惜哉泰始四年皇太后崩有司奏前代故事倚廬中施白縑帳蓐素床以布巾裹革軺音遙輦版輿細犢車皆施縑裹詔不聽但令以布衣車而已其餘居喪之制不改禮文有司又奏大行皇太后當以四月二十五日安厝故事虞著衰服既虞而除其內外官寮皆就朝晡臨位御服訖各還所次除衰服詔曰夫三年之喪天下之達禮也受終身之愛而無數年之報奈何葬而便即吉情所不忍也有司又奏世有險易道有汚隆所遇之時異誠有由然非忽禮也方今戎馬未𣪚王事至殷交須聽斷以熙廣績昔周康王始登翼室猶戴冕臨朝降于漢魏既葬除釋諒隂之禮自逺代而廢矣惟陛下割髙宗之制從當時之宜詔曰夫三年之喪所以盡情致禮葬已便除所以不堪也當敘吾哀懷言用斷絶奈何奈何有司又固請詔曰不能篤孝勿以毁傷為憂也誠知衣服末事耳然今思存草土率當以吉物奪之乃所以重傷至心非見念也每代禮典質文皆不同耳何為限以近制使達喪闕然乎羣臣又固請帝流涕久之乃許然猶素冠蔬食以終三年如文帝之喪十年武元楊皇后崩既葬帝及羣臣除喪即吉先是尚書祠部奏從博士張靖議皇太子亦從制俱釋服博士陳逵議以為今制所依蓋漢帝權制興于有事非禮之正皇太子無有國事自然終服有詔更詳議尚書杜預以為古者天子諸侯三年之喪始同齊斬既葬除喪服諒隂以居心喪終制不與士庶同禮漢氏承秦天下為天子修服三年漢文帝見其下不可久行而不知古制更以意制祥禫除喪即吉魏氏直以訖葬為節嗣君皆不復諒隂終制學者非之久矣然竟不推究經傳考其行事専為王者三年之喪當以縗麻終二十五月嗣君茍若此則天子羣臣皆不得除喪雖志在居篤更逼而不行至今世主皆從漢文經典由處制者非制也今皇太子與尊同體宜復古典卒哭除縗麻以諒隂終制于義既不應不除又無取于漢文乃所以篤喪禮也于是尚書僕射盧欽尚書魏舒問杜預證據所依預云傳稱三年之喪自天子達此謂天子絶期惟有三年喪也非謂居喪縗服三年與士庶同也故后世子之喪而叔向稱有三年之喪二也周公不言髙宗服喪三年而云諒隂三年此釋服心喪之文也叔向不譏景王除喪而譏其燕樂已早眀既葬應除而違諒隂之節也春秋晉侯享諸侯子産相鄭伯時簡公未葬請免喪以聽命君子謂之得禮宰咺來歸惠公仲子之賵傳曰弔生不及哀此皆葬除服諒隂之證先儒舊説往往亦見學者未之思耳喪服諸侯為天子亦斬縗豈可謂終服三年邪上考七代未知王者君臣上下縗麻三年者謂下推將恐百世之主其理一也非必不能乃事勢不得故知聖人不虛設不行之制仲尼曰禮所損益雖百世可知此之謂也於是欽舒從之遂命預造議奏曰禮記三年之喪自天子達又云父母之喪無貴賤一也又云端縗喪車皆無等此通謂天子居喪衣服之節同於凡人心喪之禮終於三年亦無服喪三年之文然繼體之君猶多荒寧自從廢諒隂之制至令髙宗擅名于往代子張致疑於當時此乃賢聖所以為譏非譏天子不以服終喪也秦燔書籍率意而行亢上抑下漢祖草創因而不革乃至率天下皆終重服旦夕哀臨經罹寒暑禁塞嫁娶飲酒食肉制不稱情是以孝文遺詔斂畢便葬葬畢制紅禫之除雖不合髙宗諒隂之義近于古典故傳之後嗣於時預修陵廟故斂葬得在浹辰之內因以定制近至眀帝存無陵寢五旬乃葬安在三十六日此當時經學疏略不師前聖之病也魏氏革命以既葬為節合於古典然不垂心諒隂同譏前代自泰始開元陛下追尊諒隂之禮慎終居篤允臻古制超絶于殷宗天下歌德誠非靖等所能原本也天子諸侯之禮當以具矣諸侯惡其害已而削其籍今其存者惟士喪一篇戴聖之記雜錯其間亦難以取正天子之位至尊萬幾之政至大羣臣之衆至廣不同之于凡人故大行既葬祔祭於廟則因疏而除之已不除則羣臣莫敢除故屈已以除之而諒隂以終制天下之人皆曰我王之仁也屈已以從宜皆曰我王之孝也既除而心喪我王猶若此之篤也凡臣子等亦焉得不自勉以崇禮此乃聖制移風易俗之本髙宗所以致雍熙豈惟縗裳而已哉若如難者更以權制自居疑於屈伸厭一業反降欲以職事斷則父在為母期父卒三年此以至親屈於至尊之義也出母之喪以至親為屬而長子不得有制體尊之義升降皆從不敢獨也況皇太子配二之至尊與國為體固宜逺遵古禮近同時制屈除以寬諸下協一代之成典君子之於禮有直而行曲而報有經而等有順而去之存諸內而已禮云非玉帛之謂喪云惟縗麻之謂乎此既臣等所謂經制大義且即實近言亦有不安今皇太子至孝蒸蒸發于自然號咷之慕匍匐殯宫大行既奠往而不反必想像平故仿偟寢殿若不變從諒隂則東宫臣僕義不釋服此為永福官屬當獨衰麻從事出入殿省亦難以繼今將吏雖蒙同二十五月之事寧至于大臣亦奪其制昔翟方進自以身為漢相居喪三十六日不敢踰國典而況于皇太子臣等以為皇太子宜如前奏除服諒隂終制於是太子遂以厭降之議從國制除縗麻諒隂終制晉尚書問今大行崩含章殿安梓宫宜在何殿博士卞榷楊雍議曰臣子尊其君父必居之以正所以盡孝敬之心今太極殿古之路寢梓宫宜在太極殿依周人殯于西階既殯之後别奠下室之饌朝夕轉易諸所應設祭朔望牲用宜所施行按禮具答榷雍議按禮天子日食少牢月朔太牢喪禮下室之饌如他日宜隨御膳朝夕所常用也朔望則奠用太牢􅍯物又問按景帝故事施倚廬于九龍殿上東廂今御倚廬為當在太極殿下諸王廬復應何所權琳議按尚書顧命成王崩康王居于翼室先儒云翼室于路寢今宜於太極殿上諸王宜各於其所居為廬朝夕則就位哭臨成帝咸康七年皇后杜氏崩詔外官五日一入臨內官朝一入而已康帝建元元年正月晦承恭杜皇后周忌有司奏至尊期年應改服詔曰君親名教之重也權制出於近代耳于是素服如舊固非漢魏之典也咸康中恭皇后山陵司徒西曹屬王濛議立奔赴之制曰三代垂文觀時損益今服教之地逺於古之九服若守七月之斷逺近一概者懼非通制請王畿以外南極五嶺非守見職周年不至者宜勤注黃紙有爵土者剈降永嘉中江統議不奔山陵但三年不敘於義為輕今更立如牒若方伯授用雖未有王命猶不與停𣪚同今見在官即吉之後去職不及凶事無所貶責萬里外以冉周為限自此以內眀依前牒雖在父母喪其責不異黃門郎徐衆等駁濛云若如濛議見在官者已拘于制度不得奔赴至於既去雖不及哀臣子之情何得不暫致身哉臣謂喪紀雖過去職者故宜還赴詔可濛又申述前議曰喪紀有數吉凶有斷豈可當于縞素既終而制無限之責哉若除喪使奔當以何服素服敘哀則在廷已吉陵無哭禮若元冠致敬宜曰朝謁非奔喪之謂若服外更立限斷則不知所準若不計逺近同服內則立制漫而無斷詔又付尚書左丞王彪之議云昔太寧之難奔赴無過三年之限恭皇后不宜踰先制禮為君之母妻居處飲食衎爾君已除喪而後聞喪不稅而責其奔此臣所疑也且宜一依濛所上詔曰令輕此制于名教為不盡矣今直以議者既衆不必改先制宜依濛所上施行八年成帝崩尚書殷融上言司徒西曹屬王濛以周年為限不及者除名付之鄉論臣以為夫名教興於義厚忠孝發于自然不嚴而著不肅而成者也舊禮國有大諱外任不得離部冗𣪚之人發哀公巷初無課限有不奔之制按永平初先帝稱宣帝遺詔乃不得令子弟詣陵惟蕩隂奔赴多不逮及始為其制以篤一時顧觀人情未有肅愧徒興簡默正足以彰至道之不𢎞表臣子之不義宜遵前代聞凶行喪三日而已詔曰孝慈起於自然忠厚發于天成若道不喪豈有今弊弊至醨薄反之何期况以今日之弊而欲廢凖式于頽俗求自仁于吾朝其于理化也無乃迂乎融曰重啓依王濛所上為條制康帝建元初融又議定不應奔赴山陵據周魯有喪而魯人不弔孔子所答曽子當謂國內卿大夫耳非如今日見在方外者也尚書僕射顧和議按禮記曽子問父母之喪既引及塗聞君薨如之何榖梁傳曰周人魯人各有喪周人弔魯人不弔周人雖有喪遣可也魯人當親行事故不弔也哀帝章皇太妃薨帝欲服重江彪啓先王制禮應在緦服詔欲降期彪又啓厭屈私情所以上嚴祖考于是制緦麻三月孝武帝寧康二年七月簡文帝崩冉周而遇閏博士謝攸孔粲議魯襄二十八年十二月乙未楚子卒實閏月而言十二月者附正于前月也喪事先逺則應用博士吳商之言以閏月祥謝安王邵鄭襲殷康袁宏殷茂車允劉遵劉耽意皆同康曰過七月而未及八月豈可謂之踰期必所不了則當從其重者宏曰假值閏十二月而不取者此則嵗未終固不可得矣漢書以閏為後九月眀其同體也襲曰中宗肅祖皆以閏月崩祥除之變皆用閏之後月先朝尚用閏之後月今閏附七月取之何疑亦合逺日申情之言又閏是後七而非八也豈踰月之嫌乎尚書令王彪之侍中王混中丞譙王恬右丞戴諡等議異彪之曰吳商中才小官非名賢碩儒公輔重臣為時所凖則者又取閏無證據直攬逺日之義越祥忌限外取不合卜逺之理又丞相桓公嘗論云禮二十五月大祥何緣越期取閏乃二十六月乎於是啓日或以閏附七月宜用閏月餘者或以閏名雖附七月而實以三旬别為一月故應以七月除者臣等與中軍將軍沖參詳一代大禮宜凖經典三年之喪十三月而練二十五月而畢禮之眀文也陽秋之義閏在年內則略而不數眀閏在年外則不應取之以越期忌之重禮制祥除必正期月故也己酉晦帝除縞即吉徐廣論曰凡辨義詳禮無顯據眀文可以折中則禮疑從重喪易寧戚順情通物固有成言矣彪之不能徴援正義有以相屈俱以名位格人君子虛受心無適莫豈其然哉執政從之過矣武帝以來國有大喪輒廢樂終三年惠帝太安元年太子喪未除及元會亦廢樂穆帝永和中為中原山陵未修復頻年元會廢樂是時太后臨朝后父褚裒薨元會又廢樂孝武太元六年為皇后王氏喪亦廢樂孝武崩太傅録尚書事會稽王道子議山陵之後通婚嫁不得作樂以一期為斷孝武寧康中崇德太后褚氏崩后于帝為從嫂或疑其服博士徐藻議以為資父事君而敬同又禮其夫屬父道者其妻皆母道也則夫屬君道妻亦后道矣服后宜以資父之義魯譏逆祀以眀尊尊今上躬奉康穆哀皇及靖后之禮致敬同于所天豈可敬之以君道而服廢于本親謂應服齊縗期于是帝制期服孝武帝太元十五年淑媛陳氏卒皇太子所生也有司參詳母以子貴贈淑媛為夫人置家令典喪事太子前衛率徐邈議喪服傳稱與尊卑者為體則不服其私親又君父所不服子亦不敢服故王公妾子服其所生母練冠麻衣既喪而除非五服之常則謂之無服從之安帝隆安四年孝武太皇太后李氏崩疑所服何澄王雅車允孔安國徐廣議太皇太后名位允正體同皇極理制􅍯盡情禮彌申陽秋之義母以子貴既稱夫人禮服從政故成風顯夫人之號昭公服三年之喪子於父之所生體尊義重且禮祖不厭孫固宜遂服無屈而緣情立制若嫌眀文不存則疑斯從重謂應同於為祖母後齊衰期永安皇后無服但一舉哀百官亦一期詔可宋武帝永初元年黃門侍郎王準之議鄭元喪制二十七月而終學者云得禮按晉初用王肅議祥禫共月遂以為制江左以來唯晉朝施用縉紳之士猶多遵鄭義宜使朝野一體詔可永初三年武帝崩蕭太后制三年之服文帝元嘉十七年七月元皇后崩兼司徒給事中劉溫持節監喪神武門設凶門柏厯至西上閣皇太子于東宫崇正殿及永福省並設廬諸皇子未有府第者于西廨設廬太子心喪三年心喪有禫無禫禮無成文代或兩行皇太子心喪畢詔使博議有司奏喪禮有禫以祥變有漸不宜便除即吉故其間服以綅縞也心喪已經十三月大祥十五月祥禫變除禮畢餘情一周不應復有冉禫宜下以為永制詔可後魏自道武以來及諸帝悉依漢魏之制既葬公除孝文帝太和十四年太皇太后馮氏殂帝勺飲不入口者五日哀毁過禮中部曺華隂楊椿諌曰陛下荷祖宗之業臨萬國之重豈可同匹夫之節以取僵仆羣下惶灼莫知所言且聖人之禮毁不滅性縱陛下欲自賢于萬代其若宗廟何帝感其言為之一進粥于是諸王公等皆詣闕表請時定兆域及依漢魏故事並太皇太后終制既葬公除詔曰自遭禍罰慌惚如昨奉侍梓宫猶希髣佛山陵遷厝所未忍聞冬十月王公復上表固請詔曰山陵可依典册衰服之宜情所未忍帝欲親至陵所戊辰詔諸常從之具􅊖可停之其武衛之官防侍如法癸酉葬文眀太皇太后于永固陵甲戍帝謁陵王公固請公除詔曰比當别敘在心己卯又謁陵庚辰帝出至思賢門右與羣臣相慰勞太尉丕等進言曰臣等以老朽之年厯奉纍聖國家舊事頗所知聞伏惟逺祖有大諱之日唯侍送梓宫者凶服左右皆盡從吉四祖三宗因而不改陛下以至孝之性哀毁過禮伏聞所御三食不滿半溢晝夜不釋絰帶臣等叩心絶氣坐不安席願少抑至慕之情奉行先朝舊典帝曰哀毁常事豈足關言朝夕食粥粗可支任諸公何足憂怖祖宗情専武略未修文教朕今仰稟聖訓庶習古道論時此事又與先世不同朕且以所懷别問尚書遊眀根髙閭等公可聽之帝因謂眀根等曰聖人制卒哭之禮授服之變皆奪情而漸今則旬日之間言及即吉特成傷理對曰臣等伏尋金册遺旨踰月而葬葬而即吉故于下葬之初奏練除之事帝曰朕惟中代所以不遂三年之喪蓋由君上違世繼主初立君德未流臣義不洽故身襲衮冕行即位之禮朕誠不德在位過紀足令億兆知有君矣于此之日而不遂哀慕之心使情禮俱失深可痛恨髙閭曰杜預晉之碩學論自古天子無有行三年之喪者以為漢文之制暗與古合雖叔世所行事可承踵是以臣等慺慺干請帝曰竊尋金册之旨所以奪臣子之心令早即吉者慮廢絶政事故也羣公所請其志亦然朕今仰奉册令俯順羣心不敢暗默不言以荒庶政唯欲縗麻廢吉禮朔望盡哀誠情在可許故専欲行之如杜預之論於孺慕之君諒隂之主蓋亦誣矣祕書丞李彪曰漢眀德馬后保養章帝母子之道無可間然及后之崩葬不淹旬尋已從吉然漢章不受譏眀德不損名願陛下遵金册遺令割哀從議帝曰朕所以眷戀縗絰不從所議者實情不能忍豈徒茍免嗤嫌而已哉今奉終儉素一已遵仰遺册但痛慕之心事繫於豫庶聖靈不奪至願耳髙閭曰陛下既不除服於上臣等獨除服於下則為臣之道不足又親御縗麻復聽朝政吉凶事雜臣竊為疑帝曰朕今逼于遺册唯望至期雖不盡禮藴結差申羣臣各以親踈貴賤逺近為除服之差庶幾稍近於古易行于今羣臣又言春秋蒸嘗事難廢闕帝曰自先朝以來恆有司行事朕賴蒙慈訓常親致敬今昊天降罰人神喪恃想宗廟之靈亦輟歆祀脫行饗薦恐乖冥旨羣臣又言古者葬而即吉不必終禮此乃二漢所以經綸治道魏晉所以綱理庶政也帝曰既葬即吉蓋季俗多亂權宜救世耳二漢之盛魏晉之興豈曰簡略喪禮遺忘仁孝哉平日之時公卿每稱當今四海晏安禮樂日新可以恭美唐虞比盛夏啇及至今日即欲苦奪朕志使不踰於魏晉如此之意未解所由李彪曰今雖治化清晏然江南有未賔之吳漠北有不臣之虜是以臣等猶懷不虞之慮帝曰魯公帶絰從戎晉侯墨衰敗敵固聖賢所許如有不虞雖越紼無嫌而况衰麻乎豈可于晏安之辰豫念軍旅之事以廢喪紀哉古人亦有稱王者除縗而諒隂終喪者若不許朕縗服則當除衰拱默委政冢宰二事之中惟公卿所擇遊眀根曰淵默不言則大政將曠仰順聖心請從衰服太尉丕曰臣與尉元厯事五帝魏家故事尤諱之後三月必迎神于西禳惡于北具行吉禮自皇始以來未之或改帝曰若能以道事神不迎自至茍失仁義雖迎不來此乃平日所不當行况居喪乎朕在不言之地不應如此喋喋但公卿執奪朕情遂成往復追用悲絶遂號慟羣官亦哭而辭出致堂胡氏曰孝文慕古力行尤著于喪禮其始終情文亦粲然可觀矣自漢以來未之有也後世孺慕之君可不景仰而先王是憲乎方孝文之欲三年也在廷之臣無一人能將順其美者莫不沮遏帝心所陳每下若非孝文至情先定幾何不為邪説所惑邪禮曰百官􅍯百物具不言而事行者扶而起齊縗之喪蓋對而不言也若夫八事之權非經禮也今孝文百官􅍯矣百物具矣是宜三日而粥三月而沭期三月而練冠三年而祥使禮廢而復起如古之髙宗焉而羣臣狃于漢制雜以國俗使其君不得自由其初守禮違衆欲行通喪甚力其終也不能三年于是期而祥改月而禫是用古者父在為母之服不中節矣無乃不得其本遂殺其末邪夫禮惟其當而已施之當則如被衮冕而執鎮圭施之不當是衣狐白裘而坐諸草莾也豈不惜哉宣武帝延昌四年正月帝崩於式乾殿侍中中書監太子少傅崔光等奉迎太子于東宫入自萬嵗門至眀陽殿哭踊久之欲待眀乃行即位之禮太尉崔光曰天位不可暫曠何待至眀光等請太子止哭立于東序于忠元昭扶太子西面哭十數聲止光奉册進璽綬太子跪受服皇帝衮冕之服御太極殿前光等降自西階夜直羣臣立于庭中北面稽首稱萬嵗按先儒言古者天子崩太子即位其别有四始死則正嗣子之位顧命所謂逆子釗于南門之外延入翼室是也既殯則正繼體之位顧命所謂王麻冕黼裳入即位是也踰年正改元之位春秋所書公即位是也三年正踐祚之位舜格于文祖及伊尹以冕服奉太甲歸于亳是也漢以來遵短喪之制廢諒隂之説以日易月則踰年三年即位之禮不復聞大槩於縗絰之中行嗣服之吉禮矣然漢髙祖以四月甲辰崩五月丙寅葬其日惠帝即位則在崩後二十三日文帝以六月已􅕀崩乙巳葬景帝以丁未即位則在崩後九日葬後三日蓋西都人主皆預為陵寢故升遐之後不復循古者七月之制蓋有自崩至葬不及旬日者是以嗣君即位多在既葬之後至東漢則葬期漸遲于是始制令以大行柩前即位而厯代遵之蓋猶在既殯之後也今魏宣武方崩而太子不俟眀即位毋乃太促乎且當時魏傳世既久時屬承平有何急迫之虞而於親肉未寒之時不待旦而襲其位乎孝文賢主力追古道以行親喪肅宗幼沖輔臣無識不能導之以率乃祖攸行而有此過舉魏德告終有由矣後周武帝母叱奴太后崩帝居倚廬朝夕供一溢米羣臣表請纍旬乃止及葬帝袒跣之陵所詔曰三年之喪達于天子但軍國務重須自聽朝縗麻之禮率遵前典百僚宜依遺令既葬而除公卿固請依權制周主不許卒由三年之制五服之內亦令依禮致堂胡氏曰自漢文短喪之後能斷然行三年者惟晉武帝魏孝文周髙祖可謂難得矣然春秋之義責􅍯賢者晉武既為裴杜所惑行禮不􅍯魏孝文之禮若􅍯矣而服非所服周髙祖縗麻苫塊卒三年之制最為賢行然推眀通喪止于五服之內不及羣臣非所以教天下著於君臣之義也而又在喪頻出逰幸無門庭之冦興師伐鄰此皆禮所不得為者由髙祖不學左右無稽古之臣以輔成之也使髙祖至心如魏晉二君而講禮如孝文之詳訓臣下以方喪三年不出逰幸不動兵革以終禮制雖三代何以加諸文獻通考卷一百二十一
