body:
  text: 文獻通考卷一百八十二鄱陽馬端臨貴與著經籍考九經春秋漢藝文志曰古之王者世有史官君舉必書所以慎言行昭法式也左史記言右史記事事為春秋言為尚書帝王靡不同之周室既微載籍殘缺仲尼思存前聖之業乃稱曰夏禮吾能言之把不足徵也殷禮吾能言之宋不足徵也文獻不足故也足則吾能徵之矣師古曰論語載孔子之言徵成也獻賢也孔子自謂能言夏殷之禮而杞宋之君文章賢材不足以成之故我不得成此禮也以魯周公之國禮文備物史官有法故與左丘眀觀其史記據行事仍人道師古曰仍亦因也因興以立功就敗以成罰假日月以定歷數藉朝聘以正禮樂有所褒諱貶損不可書見口授弟子弟子退而異言師古曰謂人執所見各不同也丘眀恐弟子各安其意以失其真故論本事而作傳明夫子不以空言説經也春秋所貶損大人當世君臣有威權勢力其事實皆形于傳是以隱其書而不宣所以免時難也及末世口説流行故有公羊穀梁鄒夾之傳四家之中公羊穀梁立於學官鄒氏無師夾氏未有書隋經籍志曰遭秦滅學口説尚存漢初有公羊穀梁鄒氏夾氏四家並行王莽之亂鄒氏無師夾氏亡初齊人胡母子都傳公羊春秋授東海嬴公嬴公授東海孟卿孟卿授魯人眭孟眭孟授東海嚴彭祖魯人顔安樂故後漢公羊有嚴氏顔氏之學與穀梁三家並立漢末何休又作公羊解説而左氏漢初出於張蒼之家本無傳者至文帝時梁太傅賈誼為訓詁授趙人貫公其後劉歆典校經籍考而正之欲立於學諸儒莫應至建武中尚書令韓歆請立而未行時陳元最眀左傳又上書訟之于是乃以魏郡李封為左氏博士後羣儒蔽固者數廷爭之及封卒遂罷然諸儒傳左氏者甚衆永平中能為左氏者擢髙第為講郎其後賈逵服虔並為訓解至魏遂行于世晉時杜預又為經傳集解穀梁范寧注公羊何休注左氏服虔杜預注俱立國學然公羊穀梁但試讀文而不能通其義後學三傳通講而左氏唯傳服虔至隋杜氏盛行服義及公羊穀梁浸微今殆無師説先公曰論春秋者言夫子感麟而作作起獲麟而文止於所起踰再歲而夫子夢奠矣故歐陽公謂此夫子既老而成之書春秋緯演孔圖云孔子修春秋九月而成卜之得陽豫之卦是春秋二百四十二年之書以九月而成漢志凡春秋二十三家九百四十八篇省太史公四篇按班固七略無史門故以古來及秦漢之史附於春秋之末後世史書漸多故志藝文者以史自為一部難以厠之聖經之後矣故今析班志春秋略內世本十五篇至漢大年記五篇入史門凡削九家四百一十一篇云隋志九十七部九百八十三卷通計亡書合一百三十部一千一百九十一卷唐志六十六家一百部一千一百六十三卷失姓名五家王元度以下不著録二十三家四百三卷宋三朝志七十二部六百五十八卷宋兩朝志十七部一百一十四卷宋四朝志三十六部三百七十五卷宋中興志一百二十九家一百七十四部二千二百七十一卷春秋正經十二卷鼂氏曰以左氏經為本其與公穀不同者注於下春秋經一卷陳氏曰每事為一行廣德軍所刋古監本晦庵又刻于臨漳四經之一其于春秋獨無所論著惟以左氏經文刻之李燾仁甫又定春秋古經一卷眉山李氏古經後序曰漢藝文志有春秋古經十二篇經十一卷隋唐志同古經十二篇十一卷者本公羊穀梁二家所傳吳士燮始為之注隋氏載焉又有賈逵春秋三家經訓古十二卷宋三家經二卷唐志又有李鉉春秋二傳異同十一卷李氏三傳異同例十三卷馮伉三傳異同三卷元和國子監修定春秋加減一卷士燮賈逵宋及李馮元和諸書今皆不存獨抱遺經者莫適為正蓋公羊得立學官最先穀梁次之左氏最後故士燮但注二家不及左氏賈逵既立左氏始通三家逵燮并宋以下異同加減文字悉已亡佚莫知其舉厝何也隋末唐初左學特盛二家浸微陸德眀音義隋經籍志皆云自杜預集解左氏合經傳為一正觀十六年孔頴逹承詔修疏永徽四年長孫無忌等重上正義丘眀傳學愈益盛矣而仲尼遺經無復單行學者或從杜解抄出獨存左氏擯落二家幸陸德眀與頴逹同時于太學自著音義兼存二家本書仍各注左氏别字顧亦無決擇德眀為國子博士正觀十七年也惟正元末陸淳纂例列三傳經文差繆凡二百四十一條自言考校從其有義理者然往往亦言未知孰是兼恐差繆不止二百四十一條惜啖趙集傳今俱失墜無從審覆耳唐志陸質集注春秋二十卷又集傳春秋纂例十卷春秋微旨二卷春秋辨疑七卷今存者惟纂例微旨辨疑耳余患苦此久矣嘗欲即三家所傳純取遺經心以為是者則大書之仍細書其不然者於其下數十年間遊走東西志弗獲就會潼川謝疇元錫來從余逰其治春秋極有功因付以斯事居三月而書成旁搜逺引不一而足反説以約厥功彌著余撫其書喜甚亟刻板與學者共之昔司馬遷言春秋文成數萬張晏曰春秋才萬八千字遷誤也今細數之更闕一千四百二十八字數最易見者尚爾錯誤何况聖人筆削之旨乎余鄉所謂心以為是者衆未必以為是也亦獨纂例考校從其有義理者云耳既心以為是則於證據操舍必具成説其説自當别出兹第刻春秋純經庶學者相與盡心焉仍用漢志舊名題曰春秋古經十二公各為一篇不復分為十一卷蓋卷第于經義初無當也按春秋古經雖漢藝文志有之然夫子所修之春秋其本文世所不見而自漢以來所編古經則俱自三傳中取出經文名之曰正經耳然三傳所載經文多有異同則學者何所折𠂻如公及邾儀父盟於蔑左氏以為蔑公穀以為昧則不知夫子所書者曰蔑乎曰昧乎築郿左氏以為郿公穀以為微則不知夫子所書曰郿乎曰微乎會於厥憗公穀以為屈銀則不知夫子所書曰厥憗乎曰屈銀乎若是者殆不可勝數蓋不特亥豕魯魚之偶誤其一二而已然此特名字之訛耳其事未嘗背馳於大義尚無所關也至于君氏卒則以為聲子魯之夫人也尹氏卒則以為師尹周之卿士也然則夫子所書隱三年夏四月辛邜之死者竟為何人乎不寧惟是公羊穀梁于襄公二十一年皆書孔子生按春秋惟國君世子生則書之子同生是也其餘雖世卿擅國政如季氏之徒其生亦未嘗書之於册夫子萬世帝王之師然其始生乃鄹邑大夫之子耳魯史未必書也魯史所不書而謂夫子自紀其生之年於所修之經決無是理也而左於哀公十四年獲麟之後又復引經以至十六年四月書仲尼卒杜征南亦以為近誣然則春秋本文其附見于三傳者不特乖異未可盡信而三子以其意增損者有之矣蓋襄二十一年所書者公穀尊其師授而增書之也哀十六年所書者左氏痛其師亡而增書之也俱非春秋之本文也三子者以當時口耳所傳授者各自為傳又以其意之所欲增益者攙入之後世諸儒復據其見于三子之書者互有所左右而發眀之而以為得聖人筆削之意于千載之上吾未之能信也易有彖象本與卦爻為二而王弼合之詩書有序本與經文為二而毛萇孔安國合之春秋有三傳亦本與經文為二而治三傳者合之先儒務欲存古於是取其已合者復析之命之曰古經然彖象之與卦爻序之與經毛孔王三公雖以之混為一書尚未嘗以己意增損於其間苟復析之即古人之舊矣獨春秋一書三傳各以其説與經文參錯而所載之經文又各乖異蓋事同而字異者及邾儀父盟于蔑于昧之類是也事字俱異者尹氏君氏之類是也元未嘗書其事而以意增入者孔子生孔丘卒是也然則自三傳中所取出之經文既有乖異又有增益遽指以為夫子所修之春秋可乎然擇其差可信者而言之則左氏為優何也蓋公羊穀梁傳直以其所作傳文攙入正經不曾别出而左氏則經自經而傳自傳又杜元凱經傳集解序文以為分經之年與傳之年相附則是左氏作傳之時經文本自為一書至元凱始以左氏傳附之經文各年之後是左氏傳中之經文可以言古經矣然獲麟而後引經以至仲尼卒則分眀增入杜注亦自以為春秋本終于獲麟弟子欲記聖師之卒故採魯史記以續夫子之經而終於此然則既續之于獲麟之後寧保其不增益之于獲麟之前如公榖所書孔子生之類乎是亦未可盡信也春秋左氏傳三十卷劉子駿曰左丘眀好惡與聖人同親見夫子而公榖在七十子後傳聞之與親見其詳略不同也杜元凱曰左丘眀受經于仲尼以為經者不刋之書也故傳或先經以始事或後經以終義或依經以辨理或錯經以合異隨義而發其例之所重舊史遺文略不盡舉非聖人所修之要故也身為國史躬覽載籍必廣記而備言之其文緩其旨逺將令學者原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之趨七住反又七俱反若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之通體其微顯闡幽裁成義類者皆據舊例而發義指行事以正褒貶諸稱書不書先書故書不言不稱書曰之類皆所以起新舊發大義謂之變例然亦有史所不書即以為義者此蓋春秋新意故傳不言凡曲而暢之也其經無義例因行事而言則傳直言其歸趣而已非例也陳氏曰自昔相傳以為左丘眀撰其好惡與聖人同者也而其末記晉智伯反喪于韓魏在獲麟後二十八年去孔子沒亦二十六年不應年少後亡如此又其書稱虞不臘矣見于嘗酎及秦庶長皆戰國後制故或疑非孔子所稱左丘眀别自是一人為史官者其釋經義例雖未盡當理而具得當時事實則非二傳之比也朱子語録曰左氏之病是以成敗論是非而不本于義理之正嘗謂左氏是箇猾頭熟事趨炎附勢之人左氏傳是箇博記人做只是以世俗見識斷當世事皆功利之説國秀問三傳優劣曰左氏曾見國史考事頗精只是不知大義專去小處理會往往不曾講學孔子作春秋當時亦須與門人講説所以公榖左氏得箇源流只是漸漸訛舛當初若全無傳授如何鑿空撰得石經左氏傳三十卷鼂氏曰不題所書人姓氏亦無年月按文不闕唐諱及國朝諱而闕祥字當是孟知祥僣位後刋石也春秋公羊傳十二卷鼂氏曰戴宏序云子夏傳之公羊髙髙傳其子平平傳其子地地傳其子敢敢傳其子夀至漢景帝時夀乃與弟子胡母子都著以竹帛其後傳董仲舒以公羊顯于朝又四傳至何休為經傳集話其書遂大傳鄭玄曰公羊善于讖休之注引讖為多石經公羊傳十二卷鼂氏曰皇朝田况皇祐初知成都日刋石國史藝文志云偽蜀刻五經備注傳為世所稱以此言觀之不應無公榖豈初有之後散毁邪春秋榖梁傳十二卷鼂氏曰應劭風俗通稱榖梁名赤子夏弟子糜信則以為秦孝公同時人阮孝緒則以為名俶字元始皆未詳也自孫卿申公至蔡千秋江翁凡五傳至漢宣帝好之遂盛行于世石經榖梁傳十二卷鼂氏曰其後不載年月及所書人姓氏按文不闕唐及偽蜀諱而闕恆字以故知刋石當在真宗以後意者亦是田况也朱子語録問公榖如何曰據他説亦是有那道理但恐聖人當初無此等意如孫眀復趙匡啖助陸淳胡文定皆説得好道理皆是如此但後世因春秋去考時當如此區處若論聖人當初作春秋時其意不解有許多説話公羊榖梁考事甚疏然理義却精此二人乃是經生傳得許多説話往往不曽見國史問公榖傳大槩皆同曰所以林黃中説止是一人但看文字疑若非一手者或曰疑當時皆有所傳授其後門人弟子始筆之于書耳曰想得皆是齊魯間儒其所著之書恐有所傳授但皆雜以己意所以有差舛其有合道理者疑是聖人之舊春秋左氏經傳集解三十卷鼂氏曰晉杜預元凱集劉子駿賈景伯父子許惠卿潁子嚴之注分經之年與傳之年相附故題曰經傳集解其發眀甚多古今稱之然其弊則棄經信傳如成公十三年麻隧之戰傳載秦敗績而經不書以為晉直秦曲則韓役書戰時公在師復不須告克獲有功亦無所諱于左傳之例皆不合不曰傳之繆而猥稱經文闕漏其尤甚者至如此陳氏曰其述作之意序文詳之矣專修丘眀之傳以釋經後世以為左氏忠臣者也其弊或棄經而信傳于傳則忠矣如經何夾漈鄭氏曰杜預解左氏顔師古解漢書所以得忠臣之名者以其盡之矣左氏未經杜氏之前凡幾家一經杜氏之後後人不能措一辭漢書未經顔氏之前凡幾家一經顔氏之後後人不能易其説縱有措辭易説之者如朝月曉星不能有其眀也如此之人方可以解經茍為文言多而經旨不見文言簡而經旨有遺自我説之後後人復有説者皆非箋釋之手也傳注之學起惟此二人其殆庶幾乎其故何哉古人之言所以難眀者非為書之理意難眀也實為書之事物難眀也非為古人之文言難眀也實為古人之文言有不通于今者之難眀也能眀乎爾雅之所作則可以知箋注之所當然不眀乎爾雅之所作則不識箋注之旨歸也善乎二子之通爾雅也顔氏所通者訓詁杜氏所通者星歷地理當其顔氏之理訓詁也如與古人對談當其杜氏之理星歷地理也如羲和之步天如禹之行水然亦有所短杜氏則不識蟲魚鳥獸草木之名顔氏則不識天文地理孔子曰知之為知之不知為不知是知也杜氏為星歷地理之言無不極其致至于蟲魚鳥獸草木之名則引爾雅以釋之顔氏于訓詁之言甚暢至于天文地理則濶略焉此為不知為不知也其他紛紛是何為者釋是何經眀是何學公羊傳詁解十二卷陳氏曰漢司空掾任城何休邵公撰休為太傅陳蕃屬蕃敗坐禁錮作解詁覃思不窺門十七年又作公羊墨守左氏膏肓榖梁廢疾黨禁解拜議郎終諌議大夫其書多引讖緯其所謂黜周王魯變周文從殷質之類公羊皆無眀文蓋為其學者相承有此説也三科九旨詳具疏中榖梁傳集解十二卷鼂氏曰自漢魏以來榖梁注解有尹更始唐固糜信孔演江熙等十數家而范寧皆以為膚淺于是帥其長子泰中子雍小子凱從弟邵及門生故吏商略名例博採諸儒同異之説成其父汪之志嘗謂三傳之學榖梁所得最多諸家之解范寧之論最善陳氏曰晉豫章太守順陽范寧武子撰寧嘗謂王何之罪深于桀紂著論以排之仕為中書侍郎其甥王國寶憚之乃相驅扇因求外補抵罪會赦免寧以為春秋惟榖梁氏無善釋故為之注解其序云升平之末先君稅駕于吳帥門生故吏兄弟子姪研講六籍三傳蓋寧父汪為徐兖二州北伐失利屏居吳郡時也汪沒之後始成此書所集諸家之説皆記姓名其稱何休曰及鄭君釋之者即所謂發墨守起廢疾也稱邵曰者寧從弟也稱泰曰雍曰凱曰者其諸子也汪范晷之孫晷在良史傳自晷至泰五世皆顯于時寧父子祖孫同訓釋經傳行于後世可謂盛矣泰之子曄亦著後漢書以不軌誅死其家始亡春秋繁露十七卷鼂氏曰漢董仲舒撰史稱仲舒説春秋事得失聞舉玉杯繁露清眀竹林之屬數十篇十餘萬言皆傳于後世今溢而為八十二篇又通名繁露皆未詳隋唐卷目與今同但多訛舛崇文總目其書盡八十二篇義或宏博非出近世然其間篇第亡舛無以是正又即用玉杯題篇疑後人取而附著云陳氏曰按隋唐及國史志卷皆十七崇文總目凡八十二篇館閣書目止十卷萍鄉所刻亦財三十七篇今本乃樓攻愧得潘景憲本卷篇皆與前志合然亦非當時本書也先儒疑辨詳矣其最可疑者本傳載所著書百餘篇清眀竹林繁露玉杯之屬今總名曰繁露而玉杯竹林則皆其篇名此決非其本真况通典御覽所引皆今書所無者尤可疑也然古書存于世希矣姑以傳疑存之可也又有寫本作十八卷而但有七十九篇考其篇次皆合但前本楚莊王在第一卷首而此本乃在卷末别為一卷前本雖八十二篇而闕文者三實七十九篇也程氏演繁露曰右繁露十七卷紹興間董某所進臣觀其書辭意淺薄間掇取董仲舒策語雜置其中輒不相倫比臣固疑非董氏本書矣又班固記其説春秋凡數十篇玉杯繁露清眀竹林各為之名似非一書今董某進本通以繁露冠書而玉杯清眀竹林特各居其篇卷之一愈益可疑他日讀太平寰宇記及杜佑通典頗見所引繁露語言顧董氏今書無之寰宇記曰三皇驅車抵谷口通典曰劍之在左蒼龍之象也冠之在首玄武之象也四者人之盛飾也此數語者不獨今書所無且其體致全不相似臣然後敢言今書之非本真也牛享問崔豹冕旒以繁露者何答曰綴玉而下垂如繁露也則繁露也者古之冕旒似露而垂是其所從假以名書也以杜樂所引推想其書皆句用一物以發己意有垂旒凝露之象焉則玉杯竹林同為託物又可想見也漢魏間人所為文名有連珠者其聨貫物象以達己意略與杜樂所引同如曰物勝權則衡殆形過鏡則影窮者是其凡最也以連珠而方古體其殆繁露之所自出歟其名其體皆契合無殊矣又曰淳熙乙未豫佐達監館本有春秋繁露既嘗書所見于卷末而正定其為非古矣後又因讀太平御覽凡其部彚列敘古繁露語特多如曰禾實于野粟缺于倉皆竒怪非人所意此可畏也又曰金干土則五榖傷土干金則五榖不成張湯欲以鶩當鳬祠祀宗廟仲舒曰鶩非鳬鳬非鶩愚以為不可又曰以赤統者幘尚赤諸如此類亦皆附物著理無憑虛發語者然後益自信豫所正定不謬也御覽太平興國間編輯此時繁露之書尚存今遂逸不傳可歎也已春秋決事比崇文總目漢董仲舒撰丁氏平黃氏正初仲舒既老病致仕朝廷每有政議武帝數遣廷尉張湯問其得失于是作春秋決疑二百三十二事動以經對至吳太史令吳汝南丁季江夏黃復平正得失今頗殘逸止有七十八事按此即獻帝時應劭所上仲舒春秋斷獄以為幾焚棄于董卓蕩覆王室之時者也仲舒通經醇儒三策中所謂任德不任刑之説正心之説皆本春秋以為言至引正誼不謀利眀道不計功以折江都王尤為深得聖經賢傳之旨趣獨災異之對引兩觀桓僖亳社火災妄釋經意而導武帝以果于誅殺與素論大相反西山真公論之詳矣決事比之書與張湯相授受度亦災異對之類耳帝之馭下以深刻為眀湯之決獄以慘酷為忠而仲舒乃以經術附會之王何以老莊宗旨釋經昔人猶謂其罪深于桀紂况以聖經為緣飾淫刑之具道人主以多殺乎其罪又深于王何矣又按漢刑法志言自公孫𢎞以春秋之義繩下張湯以峻文決理于是見知腹誹之獄興湯傳又言湯請博士弟子治春秋尚書者補廷尉史蓋漢人專務以春秋決獄陋儒酷吏遂得以因緣假飾往往見二傳中所謂責備之説誅心之説無將之説與其所謂巧詆深文者相類耳聖賢之意豈有是哉常秩謂孫復所學春秋商君法耳想亦有此意春秋釋例十五卷鼂氏曰晉杜預注凡四十部集左傳諸例及地名譜第歷數皆顯其同異從而釋之發眀尤多昔人稱預為左氏忠臣而預自以為有傳癖觀此尤信陳氏曰唐劉蕡為之序崇文總目凡五十三例左氏膏肓九卷崇文總目漢司空掾何休始撰答賈逵事因記左氏所短遂頗流布學者稱之後更刪補為定今每事左方輒附鄭康成之學因引鄭説竄寄何書云書今殘逸第七卷亡陳氏曰何休著公羊墨守等三書鄭康成作針膏肓起廢疾發墨守以排之休見之曰康成入吾室操吾矛以伐我乎今其書多不存惟范寧榖梁集解載休之説而鄭君釋之當是所謂起廢疾者今此書並存二家之言意亦後人所録館閣書目闕第七篇今本亦正闕宣公而于第六卷分文十六年以後為第七卷當并合其十卷止于昭公亦闕定哀固非全書也而錯誤殆未可讀未有他本可正春秋述議傳崇文總目隋東亰太學博士劉炫撰本四十篇唐孔頴逹正義蓋據以為説而增損之今三十九篇亡春秋正義三十六卷崇文總目唐國子祭酒孔頴逹撰按漢張蒼賈誼尹咸鄭衆賈逵皆為詁訓然參用公榖二家至晉杜預專治左氏其後有沈文阿蘇寬劉炫皆據杜説貞觀中頴達據劉學而損益之長孫無忌等又復損益其書乃定皇朝孔維等奉詔是正鼂氏曰自杜預專治左氏學其後沈文阿蘇寬劉炫皆有義疏而炫性矜伐雅好非毁規杜氏之失一百五十餘事義特淺近然比諸家猶有可觀今書據以為本其有疏漏以沈氏補焉陳氏曰自晉宋傳杜學為義疏者沈蘇劉沈氏義例粗可經傳極疏蘇氏不體本文惟攻賈服劉炫好規杜失比諸義疏猶有可觀春秋公羊疏三十卷崇文總目不著撰人名氏援證淺局出于近世或云徐彥撰皇朝邢昺等奉詔是正始令太學傳授以備春秋三家之旨鼂氏曰其書以何氏三科九旨為宗本其説曰何氏之意三科九旨正是一事爾總而言之謂之三科析而言之謂之九旨新周故宋以春秋當新王此一科三旨也所見異辭所聞異辭所傳聞異辭此二科六旨也內其國而外諸夏內諸夏而外夷狄此三科九旨也陳氏曰廣川藏書志云世傳徐彥不知何代意其在貞元長慶後也春秋榖梁傳疏十二卷崇文總目唐國子四門助教楊勛撰皇朝邢昺等奉詔是正令太學傳授春秋摘微四卷鼂氏曰唐盧同撰其解經不用傳然旨意甚疏韓愈謂春秋三傳束髙閣獨抱遺經究終始蓋實録也祖無擇得之于金陵崇文總目所不載巽巖李氏曰同治春秋不以傳害經最為韓愈所稱今觀其書亦未能度越諸子不知愈所稱果何等義也舊聞同解惠公仲子曰聖辭也而此乃無之疑亦多所亡逸云春秋集傳纂例辨疑共十七卷崇文總目唐給事中陸淳纂初淳以三家之傳不同故采獲善者參以啖助趙匡之説為集傳春秋又本褒貶之意更為微旨條别三家以朱墨記其勝否又托三家得失與經戾者以啖趙之説訂正之為辨疑鼂氏曰啖助字叔佐閩人趙匡字伯循天水人微旨自為序公武嘗學春秋閲古今諸儒之説多矣大抵啖趙以前學者皆專門名家茍有不通寧言經誤其失也固陋啖趙以後學者喜援經擊傳其或未眀則憑私臆決其失也穿鑿均之失聖人之旨而穿鑿之害為甚啖氏製統例分别疏通其義趙氏損益多所發揮今纂而合之凡四十篇陳氏曰初潤州丹陽主簿趙郡啖助叔佐眀春秋傳洋州刺史河東趙匡伯循質從助及伯循傳其學助考三傳舍短取長又集前賢注釋補以己意為集傳集注又撮其綱例目為統助卒質與其子異繕録以詣伯循請損益焉質隨而纂會之大歷乙邜嵗書成質本名淳避憲宗諱改焉故其書但題陸淳助之學以為左氏敘事雖多解意殊少公榖傳經密于左氏至趙陸則直謂左氏淺于公榖誣謬實繁皆孔門後之門人但公榖守經左氏通史其體異爾丘眀夫子以前賢人如史佚遲任之流焚書之後學者見傳及國語俱題左氏遂引以為丘眀且左傳國語文體不倫序事多乖定非一人所為也蓋左氏廣集諸國之史以解春秋子弟門人見事迹多不入傳或復不同故各隨國編之以廣異聞自古豈止一丘眀姓左乎按漢儒以來言春秋者惟宗三傳三傳之外能卓然有見于千載之後者自啖氏始不可沒也唐志有質集注二十卷今不存然纂例辨疑中大略具矣又有微旨二卷未見質梁陸澄七世孫仕通顯黨王叔文侍順宗東宫會卒不及貶然則其與不通春秋之義者相去無幾耳春秋加減一卷崇文總目唐元和時國子監承詔修定以此經字文多少不同故志其增損以防差駮陳氏曰稱元和十三年國子監奉敕定不著人名校定偏旁若五經文字之類此本作小繢册財十餘板前有睿思殿書籍印末稱臣雩校定蓋承平時禁中書也不知何為流落在此春秋折衷論三十卷崇文總目唐陳嶽撰以三家異同三百餘條參求其長以通春秋之義鼂氏曰其書以左傳為上公羊為中榖梁為下比其異同而折衷之嶽唐末十上春官晚乃從鍾傳辟為江西從事春秋指掌崇文總目唐試左武衛兵曺李瑾撰瑾集諸家之説為序義凡例各一篇稱孔頴逹正義為五篇采托餘條為碎玉一篇集先儒異同辨正得失為三篇取劉炫規過申證其義為三篇大抵專依杜氏之學以為説云巽巖李氏曰其第一卷新編目録多取杜氏釋例及陸氏纂例瑾所自著無幾而序義以下十四卷但分門抄録孔頴逹左氏正義皆非瑾所自著也學者第觀正義及二例則此書可無且瑾之意特欲以備科試應猝之用耳初不為經設也其名宜曰左氏傳指掌不當專繫春秋本朝王堯臣崇文總目及李俶圖書志皆以先儒異同規過序例等篇為瑾筆削蓋誤矣寫本或訛舛復用正義刪修之乃可讀惟篇首數序瑾所自著者既無參考亦不敢以意改定姑仍其誤云春秋通例崇文總目唐陸希聲撰因三家之例裁正其冗以通春秋之旨春秋圖崇文總目唐張傑撰以春秋所載車服器用都城井邑之制繢而表之春秋指元崇文總目唐張傑撰摘左氏傳文申釋其義春秋精義崇文總目不著撰人名氏彚事于上分抄杜氏孔頴逹言數家之説參釋文演左氏傳諡族圖崇文總目不著撰人名氏以左氏學世譜增廣之貫穿系序差無遺略春秋名號歸一圖二卷崇文總目偽蜀馮繼元撰以春秋官諡名字裒附初名之左鼂氏曰左氏所書人不但稱其名或字或號或爵諡多互見學者苦之繼元皆取以繫之名下云巽巖李氏曰昔丘眀傳春秋于列國君臣之名字不一其稱多者或至四五始學者蓋病其紛錯難記繼元集其同者為一百六十篇音同者附焉于左氏抑亦微有所助云宋大夫莊堇秦右大夫詹據傳未始有父字而繼元輒增之所見異本若子韓晢者蓋齊頃公孫世族譜與傳同而繼元獨以為韓子晢與楚鄭二公孫黑共篇蓋誤也陳氏曰左傳所載君臣名氏字諡互見錯出故為此圗以一之周一魯二齊三晉四楚五鄭六衛七秦八宋九陳十蔡十一曺十二吳十三邾十四杞十五莒十六滕十七薛十八許十九雜小國二十左氏傳引帖新義崇文總目偽蜀進士蹇遵品撰擬唐禮部試進士帖經舊式核經具對春秋纂例崇文總目偽唐人薑虔嗣撰以春秋左氏公榖三家之傳學者鈔集之文帝王歷紀譜三卷崇文總目不著撰人名氏其序言周所封諸侯子孫散于他國孔子修春秋而譜其世系上採帝王歷紀而條次之蓋學春秋所録今本題云荀卿撰者非也鼂氏曰題曰秦相荀卿撰載周末列國世家故一名春秋公子血脈圖頗多疏略決非荀卿所著且卿未嘗相秦豈世别有一荀卿邪巽巖李氏曰其載帝王歷紀殊少序諸侯卿大夫之世頗詳而崇文總目止名帝王歷紀譜今從之舊題云秦相荀卿撰荀卿未嘗相秦其繆妄立見蓋田野陋儒依託以欺末學耳故筆削最無義例前後抵牾不可遍舉而所著族系又與世本不同質之司馬遷杜預亦復差異不知撰者果證據何書也其血脈間有強附橫入灼然非類者要當釐正之顧不敢輕改姑仍其舊使學者自擇焉篇首尾雜引左氏傳中語事既殘缺不屬字畫訛舛尤甚往往不可句讀參考左氏傳略加是正十僅得四五云其他政如棼絲結髮未易一二爬梳也春秋論崇文總目皇朝祕書監胡旦撰多托杜氏之失禆經旨春秋龜鑑崇文總目不著撰人名氏述春秋周及諸侯世次齊魯大國公子公孫初不詳備其後傳寫又失其次序今存以備討閲春秋世譜一卷崇文總目不著撰人名氏凡七卷起黃帝至周見于春秋諸國世系傳久稍失其次矣按隋唐書目春秋大夫世族譜十三卷顧啓期撰而杜預釋例自有世族譜一卷今書與釋例所載不同而本或題云杜預撰者非也疑此乃啓期所撰云鼂氏曰不著撰人名氏譜左氏諸國君臣世系獨秦無世臣春秋宗族名諡譜崇文總目不著撰人名氏略采春秋三傳諸國公卿大夫姓名諡號春秋二十國年表一卷陳氏曰不知何人作周而下次以魯蔡曺衛滕晉鄭齊秦楚宋杞陳吳邾莒薛小邾按館閣書目有年表二卷元豐中楊彥齡撰自周之外凡十三國仍總記蠻夷戎狄之事又按董氏藏書志年表無撰人自周至吳越凡十國又有附庸諸國别為表凡征伐朝覲會同皆書今此表止記即位及卒皆非二家書也春秋集傳十五卷崇文總目皇朝王沿纂沿患學者自私其家學而是非多異失聖人之意乃集三傳之説刪為一書又見祕書目有先儒春秋之學頗多因啓求之得董仲舒等十餘家沿自以先儒猶為未盡者復以己意箋之鼂氏曰集三傳解經之文沿字聖源大名人好春秋所至以春秋斷事此書仁宗朝嘗奏御詔直昭文館後官至天章閣待制春秋經社六卷鼂氏曰皇朝孫覺撰其學亦出于啖趙凡四十餘門論議頗嚴陳氏曰覺從胡安定遊門弟子以千數别其老成者為經社覺年最少儼然居其間衆皆相服此殆其時所作也文獻通考卷一百八十二
