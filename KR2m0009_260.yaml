body:
  text: 文獻通考卷二百六十鄱陽馬端臨貴與著封建考一上古至周封建之制黄帝之時神農氏世衰謂神農氏後代子孫道德衰薄非指炎帝之身也諸侯相侵伐暴虐百姓而神農氏弗能征於是軒轅乃習用干戈征不享諸侯咸来賔從而蚩尤最為不恭莫能伐炎帝欲侵陵諸侯諸侯咸歸軒轅軒轅乃修德振兵以與炎帝戰於阪泉之野三戰然後得其志謂黄帝克炎帝之後蚩尤作亂不用帝命黄帝乃徴師諸侯與蚩尤戰於涿鹿之野遂禽殺蚩尤蚩尤當時諸侯之強者而諸侯咸尊軒轅為天子代神農氏是為黄帝天下有不順者黄帝從而征之平者去之置左右大監監於萬國上監去聲下監平聲監若周召分陕也萬國和而鬼神山川封禪與為多焉舜正月上日受終于文祖上日朔日終謂堯終帝位之事文祖堯文德之祖廟也輯五瑞既月乃日覲四嶽羣牧班瑞于羣后輯斂既盡覲見班還后君也舜斂公侯伯子男之瑞圭璧盡以正月中乃日日見四嶽及九州牧監還五瑞於諸侯與之正始嵗二月東廵守至于岱宗柴既班瑞之明月乃東廵燔柴乃祭天告至也望秩于山川東嶽諸侯境内名山大川如其秩次望祭之如五嶽視三公四瀆視諸侯之類肆覲東后協時月正日同律度量衡合四時之氣節月之大小日之甲乙使齊一也律法制及尺丈斛斗斤兩皆均同律隂吕陽律也修五禮吉凶軍賔嘉五玉五等諸侯所執三帛諸侯世子執纁公之孤執元附庸之君執黄二生卿執羔大夫執鴈是也一死士執雉䞇如五器噐圭璧也卒乃復器還䞇不還也五月南廵守至于南岳如岱禮八月西廵守至于西岳如初十有一月朔廵守至于北岳如西禮歸格于藝祖用特廵守四嶽然後歸告至文祖廟特一牛也五載一廵守羣后四朝各朝於方嶽之下敷奏以言明試以功車服以庸按封建莫知其所從始也三代以前事迹不可考召㑹征討之事見於史記黄帝紀廵守朝覲之事見於虞書舜典故摭其所紀以為事始禹承唐虞之盛塗山之會諸侯執玉帛者萬國及其衰也有二窮孔甲之亂遭桀行暴諸侯相兼逮湯受命其能存者三千餘國方於塗山十損其七其後紂作滛虐周武王致商之罪一戎衣而天下治定五等之封凡千七百七十三國又減湯時千三百國鄭氏曰春秋傳曰禹㑹諸侯於塗山執玉帛者萬國言執玉帛者則是惟謂中國耳中國而言萬國則是諸侯之地有方百里有方七十里有方五十里禹承堯舜而然矣要服之地内方七千里乃能容之夏末既衰夷狄内侵諸侯相并土地減國數少殷湯承之更制中國方三千里之界亦分為九州而建此千七百七十三國焉周公復唐虞之舊域分其五服為九其要服之内亦方七千里而因殷諸侯之數廣其土增其爵耳臨川王氏曰禹㑹諸侯執玉帛者萬國此左氏之妄也禹之㑹塗山在東方不過見東方諸侯耳豈使四海之内㑹於一山之下哉以禹之時有萬國則不當指塗山而言也書曰萬國總四海之内大畧而言且九州之地今可以見若皆以為國則山川沮澤不可以居民獨立一君孰為之民乎慈湖楊氏曰堯舜協和萬邦春秋傳稱禹㑹諸侯執玉帛者萬國此言其大數耳使不滿亦可言萬或倍萬亦可言萬如言萬物萬民奚止於萬耶皆舉其大畧言之耳先儒顧必欲整整釋所謂萬數鄭康成謂州十有二師者州立十二人為諸侯師盖百國一師州十有二師則州千二百國也八州九千六百國餘四百國在畿内則整整為萬國不多一不少一吁可哂哉公羊說殷三千諸侯周千八百諸侯孝經說亦云周千八百諸侯此㦯據古志而云漢博士求其說而不可得遂為之說曰四海之内九州州方千里州建百里之國三十云云凡二百一十國八州千六百八十國又天子之縣内方百里之國九云云凡九十三國以應周千八百諸侯之數武王之興不期而㑹盟津者八百諸侯康成遂又謂三分有二則殷末千二百諸侯牽合可笑之甚獨不思諸侯之建不知其所始其為君為長者地醜德齊莫能相尚其間聖人出焉舉天下咸歸服之是為帝為王夫所謂為君為長者皆諸侯也大小多少之數豈得而預定則又豈能新立法更易之増損之以合王制所言之數耶武王克商滅國者五十爾餘率因其舊則周所封建亦不多矣詎能盡更而易之雖有功德則加地有罪則削地其有功有罪者亦不見數姑仍其舊乃勢之常而漢儒為是等等差差不可少有増損之制則亦不思之甚矣先公曰愚按禹㑹塗山執玉帛者萬國𫝊夏商及周文武之間止千七百餘國盟津之㑹雖曰八百諸侯然未嘗有以名字自見者曽不如庸蜀羌髳微盧彭濮之猶以其號自見者何也異時周家所資以藩屛王室者皆周所自封之諸侯而古諸侯無所存者如奚仲之後為薛臯陶之後為六蓼僅見於春秋時此所謂古諸侯也然皆小國寡民凛不自保於强大之間而終以見滅耳栁子厚言封建非聖人意也勢也資以滅夏者湯不得而廢資以滅商者武王不得而廢也蘇黄門言商周之初上古諸侯碁布天下植根深固是以新故相繼勢如犬牙數世之後皆為故國不可復動是則然矣今以當時事勢推之所謂古諸侯者土地人民其存餘㡬亦何不可廢不可動之有武王周公定周之初封建可也郡縣亦可也聖人之心以公而不以私封建則世守其國家而以天下之地與天下為公郡縣則更易其守令而以天下之權為一人之私公私之分而享國之久近存焉耳王制凡四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大川不以封其餘以為附庸閒田八州州二百一十國閒音閑十建立也立大國三十十三公也立次國六十六卿也立小國百二十十二小卿也名山大澤不以封者與民同財不得障管亦賦稅之而已此大界方三千里三三而九方千里者九也其一為縣内餘八各立一州此殷制也周公制禮九州大界方七千里七七四十九方千里者四十有九其一為畿内餘四十八八州各有方千里者六設法一州封地方五百里者不過四謂之大國又封方四百里者不過六又封方三百里者不過十一謂之次國又封方二百里者不過二十五及餘方百里者謂之小國盈上四等之數并四十六一州二百一十國則餘方百里者百六十四也凡處地方千里者五方百里者五十九餘方百里者四十一附庸地也天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以肦其餘以祿士為間田縣内夏時天子所居州界名也殷曰畿詩殷頌曰邦畿千里惟民所止周亦曰畿畿内大國九者三公之田三為有致仕者副之為六也其餘三待封王之子弟次國二十一者卿之田六亦為有致仕者副之為十二又三為三孤之田其餘六亦待封王之子弟小國六十三大夫之田二十七亦為有致仕者副之為五十四其餘九亦以待封王之子弟三孤之田不副者以其無職佐公論道耳雖有致仕猶可即而謀焉朌讀為班凡九州千七百七十三國天子之元士諸侯之附庸不與與音預禹不與不在數中也春秋傳曰㑹諸侯於塗山執玉帛者萬國言執玉帛則是惟謂中國耳中國而言萬國則是諸侯之地有方百里有方七十里有方五十里者禹承堯舜而然矣要服之内地方七千里乃能容之夏末既衰夷狄内侵諸侯相并土地減國数少殷湯承之更制中國方三千里之界亦分為九州而建此千七百七十三國焉周公復唐虞之舊域分其五服為九其要服之内亦方七千里而因殷諸侯之數廣其土増其爵耳孝經說曰周千八百諸侯布列五千里内此又改周之法闗盛衰之中三七之間以為說也終此說之意五五二十五方千里者二十五也其一為畿内餘二十四州各有方千里者三其餘諸侯之地大小則未得而聞也朱子語録曰封國之制漢儒之說只是立下一箇算法非惟施之當今不可行求之昔時亦有難暁處且如九州之地冀州極濶河東河北皆在焉雍州亦濶陕西五路皆屬焉若青兖徐豫則疆界有不足者矣設如夏時封建之國至商革命之後不成地多者削其國以予少者如此則彼未必服或以生亂又如周王以原田予晋文其民不服至於伐之盖世守其地不肯遽從他人若封王子弟必湏有空地方可封左氏載齊地蒲姑氏因之而後太公因之若成王不得蒲姑之地太公亦未有頓放處此諸侯出軍之制周禮大司徒凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一職方氏凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則十一伯方二百里則二十五子方百里則百男以周知天下尚書武成列爵惟五分土惟三孟子萬章北宮錡問周室班爵祿孟子曰公侯皆方百里伯七十里子男五十里不能五十里者不達於天子附於諸侯曰附庸左傳子産曰天子之地一圻列國一同唐氏曰學者見司徒建邦國封疆與武成分土之等孟子班祿之制不合因謂周禮非周公之制為周禮者又强為之說曰周九州之界方七千里周公變商湯之制雖小國地皆方百里是皆未深考之耳費誓曰魯人三郊三遂左氏曰成國不過半天子之軍諸侯之大者三軍可也然則大國三軍出於三郊三遂副之周制然矣牧誓曰武王戎車三百兩虎賁三百人御事司徒司馬司空然則大國三軍三卿為之帥一軍之戎車百二十五乗商制然矣商周諸侯之軍制既同分土之制安得而異周之九服即禹之五服烏覩所謂七千里者周公相武王滅國者五十而所立七十一國分土之制遽過於商大者二十四倍小者猶三倍何所容之後儒不能通則曰是兼附庸誠是也抑不思百里之地提封萬井三分去一為六萬夫之地悉以家一人率之為兵六萬尚不足三郊三遂七萬五千人之數為車六百乗亦不足千乗之數所謂園㕓宅田土田賈田官田賞田牛田牧田與卿大夫公子弟之采邑於何容之家既役其一人百畆又征其什一他無餘地車輦馬牛干戈之屬於何出之百畆之分以中農計之足食七人什取其一則十夫而食七人古庶人在官次等之祿也六萬夫之稅足當中農夫六千人而已三鄉之吏九千四百六十人於何給之尚未言三遂之吏與其百官之衆府史胥徒之祿宗廟朝廷之禮王國之朝貢四鄰之邦交於何取用也百里之地不足為公侯之國明甚况七十里止二萬九千四百夫之地五十里止一萬五千夫之地其不能為諸侯之國抑又明矣然則子産孟子之言非歟曰二子何可非也抑古人之為言省文而互見詳而考之未有不合者古之為國有軍有賦王六軍大國三軍次國二軍小國一軍此軍也出於國之郊者也天子萬乗諸侯千乗此賦也出於成國者也自軍言之則方百里而具三軍方七十里而具二軍方五十里而具一軍推而上之方二百里而具六軍自賦言之則方千里而具萬乗二百一十里而具千乗通軍與賦而言之則方千里者為兵車萬九百乗推而下之方百里者為方五十里者四五十里具一軍又五十里者為一遂合為兵車二百五十乗餘方五十里者一定出賦五十乗軍賦合三百乘男之國也由是推而上之七十里而具二軍又七十里而具二遂略當一同合為兵車五百乘加一同定出賦百乘軍賦合六百乘伯之國也百里而具三軍又百里而具三遂合為兵車七百五十乘加二同有半定出賦二百五十乘軍賦合千乘公之國也伯二同則方百四十一里公四同有半則方二百一十一里子下同於男侯上同於公是謂分土惟三自是而外則附庸也山川也土田也雖未必皆其所有皆在封疆之内矣今夫顓㬰昔者先王以為東䝉主且在邦域之中矣此附庸在封疆之證也居常與許復周公之宇此土田在封疆之證也奄有龜蒙遂荒大東奄有鳬繹遂荒徐宅此山川在封疆之證也封疆之内附庸山川土田皆在焉然皆非出軍制賦之壌故地方七百里而止於革車千乘則舉封疆而言雖七百里猶可而况五百里四百里三百里二百里百里乎故於天子言千里者兼軍賦而言之於諸侯言百里七十里五十里者獨舉軍制而言也於天子言萬乘者以賦法通率也於諸侯言千乘者兼軍賦而言也於諸公言五百里諸侯言四百里伯言三百里子言二百里者包山川土田附庸於封疆也於諸男言百里者獨舉其出軍賦之封疆也凡此者皆省文而互見若異而相通何嘗纎毫牴牾哉且先王之於諸侯豈其封疆一定而遂無所勸懲哉公之地錫之山川土田附庸合五百里而止侯伯子亦然男之百里所自有有慶而益以地則豈以百里為拘哉存男之百里以見自有之封疆耳公侯伯子慶而益責而削皆在封疆之中矣此周公之定制而成王廣魯以七百里則廣周公云爾非周公之制所得而拘也於齊有賜履焉於衛有封畛土略焉於韓侯有奄受北國焉山川土田附庸㦯得其全㦯得其偏皆封疆之數也與武成孟子之言盖相表裏矣然則其食者半三之一四之一諸儒之說孰是乎曰皆非也鄭司農謂所食租稅之數男適五十里是大國貢輕小國貢重也鄭康成謂公以一易侯伯以再易子男以三易是大國土沃而小國土瘠九等自不易至再易而止未有三易者豈諸侯之地皆無不易者哉康成之說既不通司農之說又倒置輕大而重小是侮弱而畏强也豈所謂裒多益寡稱物平施周道如砥其直如矢者哉子産曰先王班貢輕重以列列尊貢重甸服也甸非侯甸之甸乃祭公所謂邦内甸服也畿外諸侯則列尊貢重矣公半侯伯三之一子男四之一不亦尊重而卑輕乎康成曰大國貢重正之也小國貢輕字之也其意是矣奈何以一易冄易三易為說也授之沃壌而貢重予之瘠土而貢輕是乃適當然烏在其為正之字之㢤當以王食其半三之一四之一為正然王食豈盡取其所稅㢤諸侯以什一取民王又以什一取諸侯則四之一者是乃四十之一耳甸稍縣都皆無過十二於其什一之中槩取其二焉此甸服之所以列卑貢重歟職方氏七伯當為什一伯注說為是陳氏禮書曰夫列爵惟五所以稱其德分土惟三所以等其功徳異而功有所同故公侯之地同於百里子男之地同於五十里地同而附庸有所異故諸公之地方五百里諸侯之地方四百里諸伯之地方三百里諸子之地方二百里諸男之地方百里盖三等之地正封也五等之附庸廣封也正封則尺地莫非其土一民莫非其臣尊者嫌於盛而無所屈卑者嫌於削而無所立故公之地必下而從侯男之地必上而從子至於廣封則欲上之政令有所統而不煩下之職貢有所附而不費又非諸侯得以擅之也而尊者不嫌於太多卑者不嫌於太寡故公之地必五百里而異於侯男之地止百里而異於子也朱氏語録曰向来君舉進制度說周禮封疆方五百里是周圍五百里徑只百二十五里方四百里徑只百里方三百里徑只七十五里方二百里徑只五十里方百里者徑只二十五里自竒其說與王制等語相合然本文方千里之地以封公則四公以封侯則六侯以封伯則七伯以封子則二十五子以封男則百男其地已有定數此說如何可通况男國二十五里之小則國君即今之一耆長耳何以為國君按諸侯分封受地之多寡周禮大司徒職方氏所載與王制及子産孟子所言不合鄭注以為合山川附庸而言先儒遂欲融㑹二說而一之如陳祥道唐仲友之論特為明暢故􅊀錄之若止齊徑圍之說則侯伯子之地僅可脗合而公之地多二十五里男之地僅得五十里之半其與王制孟子所言均之為齟齬不合耳右分封之制司馬九畿之圖二百六十卷二十三職方氏大行人九服同制行人只言貢故鎮夷同於蕃國若論地域鎮夷猶在九州之内禹貢五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米甸服畿内之地也甸田服事也以皆田賦之事故謂之甸服五百里者王城之外四面皆五百里也禾本全曰總刈禾曰銍半藳也半藁去皮曰秸謂之服者三百内去王城為近非惟納總銍秸而又使之服輸將之事也獨於秸言之者總前二者而言也粟穀也内百里為最近故并禾本總賦之外百里次之只刈禾半藁納也外百里又次之去藁麤皮納也外百里為逺去其穗而納穀也外百里為尤逺去其穀而納米也盖量其地之逺近而為納賦之輕重精粗也此分甸服五百里而為五等者也五百里侯服百里采二百里男邦三百里諸侯侯服者侯國之服甸服外四面又各五百里也采者卿大夫邑地男邦男爵小國也諸侯諸侯之爵大國次國也先小國而後大國者大可以禦外侮小得以安内附也此所謂分侯服五百里而為三等也五百里綏服三百里揆文教二百里奮武衛綏安也謂之綏者漸逺王畿而取撫安之義侯服外四面又各五百里也揆度也綏服内取王城千里外取荒服千里介於内外之間故内三百里揆文教外二百里奮武衛文以治内武以治外聖人所以巖華夏之辨者如此此分綏服五百里而為二等也五百里要服三百里夷二百里蔡要服去王畿已逺皆夷狄之地其文法畧於中國謂之要者取要約之義特羈縻之而已綏服外四面又各五百里也蔡放也左傳云蔡二叔是也流放罪人於此也此分要服五百里而為二等也五百里荒服三百里蠻二百里流荒服去王畿益逺而經畧之者視要服為尤畧也以其荒野故謂之荒服要服外四面又各五百里也流流放罪人之地蔡與流皆所以處罪人而罪有輕重故地有逺近之别也此所謂分荒服五百里而為二等也蔡氏曰今按毎服五百里五服則二千五百里南北東西相距五千里故益稷篇言弼成五服至于五千然堯都冀州冀之北境并雲中涿易亦恐無二千五百里藉使有之亦皆沙漠不毛之地而東南財賦所出則反棄於要荒以地勢考之殊未可暁但意古今地土盛衰不同當舜之時冀北之地未必荒落如後世耳亦猶閩浙之間舊為蠻夷淵藪而今富庶繁衍遂為上國土地興廢不可以一時概也周制九畿曰侯甸男采衛蠻夷鎮蕃毎畿亦五百里而王畿又不在其中併之則一方五千里四方相距為萬里盖倍禹服之數也漢地志亦言東西九千里南北一萬三千里先儒皆疑禹服之狭而周漢地廣或以周服里數皆以方言㦯以古今尺有長短或以為禹直方計而後世以人迹屈曲取之要之皆非的論盖禹聲教所及則地盡四海而其疆理則止以五服為制至荒服之外又别為區畫如所謂咸建五長是已周漢則盡其地之所至而疆畫之也周禮大司馬乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿職方氏乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰蕃服大行人邦畿方千里其外方五百里謂之侯服嵗一見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四嵗一見其貢服物又其外方五百里謂之衛服五嵗一見其貢材物又其外方五百里謂之要服六嵗一見其貢貨物九州之外謂之蕃國世一見各以其所貴寳為摰國語周語祭公謀父諫穆王曰先王之制邦内甸服邦外侯服侯衛賔服蠻夷要服戎狄荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享嵗貢終王唐氏曰堯命治水弼成五服自王畿而至荒服面各二千五百里九州之境方五千里為方千里者二十五九州之外東漸西被朔南暨聲教者不在五服之内則與九州之法實同無毫厘差矣學者惑於五百里之說謂周公斥大封域九州之界方七千里非也又謂夷鎮皆在九州之外亦非也㦯謂周之境廣於禹貢五百里雖稍異於鄭氏亦未盡知禹貢也若如二說則不惟不與禹貢合周官既言六服又言五服祭公謀父周人也不言九服而言五服何㢤盖九服五服一也自禹貢一面言之率五百里為限周禮以二面言之率以二百五十里為限則自鎮畿而内二畿而當一服與弼成五服至于五千無纎毫牴牾者周公祭公之說亦不待釋而眀矣惟蕃畿在九州之外即所謂東漸西被朔南暨聲教者也周官以二百五十里率之亦非地域止於此也夷鎮尚在九州之内以其荒服使之終王各摰所寳同於蕃國行人之言與周官六服合矣不謂夷鎮即在九州之外也然則商制如何曰詩頌曰邦畿千里維民所止肇域彼四海自邦畿至四海知其與禹貢周禮同制也又曰自彼氐𦍑莫敢不来享莫敢不来王中舉来享外舉来王知其與祭公之言合也况作康誥之初周禮未制已言侯甸男邦采衛則周因商禮其可知矣然則王制言四海之内九州州方千里四海之内斷長補短方三千里說者謂商之制有諸乎曰王制漢文帝博士所作自春秋而降四夷交侵中國之境土褊矣王制采六經而作欲行諸當時此乃據所見境土言之豈商制哉方五千里為方千里者二十五由堯迄周無異制也况禹貢五服自侯服而外已有百里二百里三百里之别與周九畿何異哉今具圗以見禹貢周禮祭父所言皆同制并畿内郊甸稍縣都納總銍秸粟米之制具著焉右畿服之制文獻通考卷二百六十
