  - {type: page-break, offset: 0, content: '', id: KR2m0009_WYG_038-1a, image: WYG0610/WYG0610-0802a.png}
body:
  text: 文獻通考卷三十八鄱陽馬端臨貴與著選舉考十一舉官後唐莊宗同光二年自唐末喪亂搢紳之家或以告敕鬻於族姻遂亂昭穆至有舅叔拜甥姪者選人偽濫者衆郭崇韜欲革其弊請令銓司精加考核時南郊行事官千二百人注官者才數十人塗毁告身者十之九選人或號泣道路或餒死逆旅眀宗天成二年制選人或因逺地干戈私門事故遂至過格今後如過格十年外不在赴集之限又據長定格選人中有隱憂者殿五選伏以人倫之貴孝道為先既有負於尊親定不公於州縣有傷風化須峻條章今後諸色官員內有隱憂冒榮者勘責不虛終身不齒其入仕告敕並付所司焚毁三年敕北京及河北諸道攝官內有莊宗御署及朕署便與據正官資敘其偽朝授官勘驗不虛亦同告身例處分興元以西曾授偽蜀爵命敕到後一周年為限各於本罷任處投狀分析申奏點勘出限不敘理中書奏吏部流外銓諸色選人試判兩節並不優劣等第與官資其業文者任徴引古今不業文者但據事理判斷可否不當罪在有司吏部南曹關今年及第進士內三禮劉瑩等五人所試判語皆同勘狀稱晚逼試期偶拾得判草寫淨實不知判語不合一般者敕貢院擢科考詳所業南曹試判激勸效官劉瑩等既不攻文只合直書其事豈得相傳藁草侮瀆公場及至定期覆試果聞自懼私歸宜令所司落下放罪許再赴舉其年十月敕訪聞每年及第舉人牒試吏部關試判題雖有判語全無祗見各書未詳仍或正身不至如斯乖謬須議去除此後關送舉人委南曹官吏準格考試如是進士并經學及第人曾親筆硯其判語即須緝搆文章辨明治道如是委無文章許直書其事不得祗書未詳如關試時正身不到又無請假文書却牒貢院申奏停落按唐以試判入仕五季因之然以此三條觀之其為文具可知也有如流外銓必胥吏之徒非以文學進身者則所對不責其引徴古今但據事理判斷誠是也至於及第進士而乃一詞莫措傳寫定本雷同欺誑至煩國家立法明開曾親筆硯委無文章兩途以處之則烏取其為進士乎况正身多不至則所謂試者不過上下相與為欺耳可無試也長興二年敕舉選之衆例是艱辛曾因兵火之餘多無敕甲不有詳延之路永為遐棄之人其失墜告身者先取本人狀當授官之日何人判銓與何人同官上任與何人交代仍勘歷任處州縣如實則别取命官三人保明施行周世宗顯德元年初令翰林學士兩省官舉令録除官之日署舉者姓名若貪穢敗官連坐宋朝之制凡入仕有貢舉奏蔭攝署流外從軍五等吏部銓唯注擬州縣官舊幕職皆使府辟召國朝但吏曹擬授京諸司六品以下官皆無選中書特授周朝每藩郡有闕或遣朝官權知太祖始削外權牧伯之闕止令文臣權涖其後內外皆非本官之職但以差遣為資歷京朝官則審官院主之使臣則三班院主之少卿監以上刺史副率內職中書樞密院主之太祖皇帝建隆三年詔常參官并翰林學士內有嘗佐藩郡及歷州縣官者各保舉堪充幕職令録一人不必以親為避但條析具實以聞當於除授制書署其舉主他日有所犯不如舉狀連坐之知制誥髙錫奏請許人訐告濫舉所告不實者罪之得實者白身授以官有官者優擢非仕宦者賞緡錢從之四年詔自前藩鎮多奏初官人為掌書記頗越資序自今歷兩任有文學者方得奏舉又詔陶榖等於見任前任幕職州縣官中舉堪為藩郡通判者一人如謬舉量事連坐又詔自今諸州吏民不得即詣京師舉留節度觀察防禦團練等使刺史知州通判幕職州縣等官若實以治行尤異著名吏民固欲借留或請立碑頌德者許即於本處陳述以俟上報真宗咸平時復詔禁之乾德二年詔翰林學士等四十二人各舉才堪通判者各一人又詔吏部南曹以人才可副升擢者送中書門下引驗以聞上慮銓衡止憑資歷或英才沈於下僚故也開寶四年詔自今諸州不得以攝官視事其闕員處即時以聞當委有司除注十一月又詔近以諸道攝官悉令罷去及慮若更民政欲著吏能雷同遐棄良可惜也宜委有司按其歷任經三攝無曠敗即以名聞任偽署者不在此限五年先時令諸州印發春季選人文解自千里至五千里外分定日限為五等各發離本處及京百司文解並以正月十五日前到省餘季準此若州府違限及解狀內少欠事件不依程式本判官録事參軍本曹官罰置殿選諸州員闕並仰申闕解除以木夾重封題號逐季入遞合格日四時奏年滿俟敕下凖格取本司文解赴集流外銓據狀申奏依四時取解參選至是國家取荆益交廣闢土既廣吏員多闕是以嵗常放選選人南曹投狀判成送銓銓司依次注授其後選部闕官即特詔免解非時赴集謂之放選習以為常取解季集之制有名而無實矣太宗太平興國元年先是選人試判三道考為三等二道全通一道稍次而文翰俱優為上一道全通二道稍次而文稍堪為中三道全次而文翰紕繆為下判上者職事官加一階州縣官超一資判中依資判下入同類惟黃衣人降一資至是詔增為四等以三道全次文翰無取者為中下依舊格判下之制以三道全不通而文翰紕繆者為下殿一選六年令諸路轉運使下所屬州府令長吏擇見任判司簿尉之清廉眀幹者具以名聞當驛召引對授以知縣之任八年詔自今應臨軒所選官吏並送中書門下考其履歷審取進止時上選用庶僚不專委有司皆引對觀其敷納有可采者悉與超擢復慮因緣矯飾徼幸冒進乃有是詔雍熙二年令翰林學士兩省御史臺尚書省官各於京官幕職州縣中舉可升朝者一人四年詔曰進賢推士當務至公行爵出祿固無虛授茍畢得其材實亦何吝於寵章近者諸處奏薦多涉親黨既非得舉徒啓幸門將塞津溪宜行告諭自今諸路轉運使及州郡長吏並不得擅舉人充部內官其有闕員即時具奏端拱三年令宰相以下至御史中丞各舉朝官一人為轉運使是日詔曰國家詳求幹事之吏外分主計之司雖曰轉輸得兼按察總覽郡國職任尤重物情舒慘靡不由之尚慮徼功固當責實交相繩檢於理攸宜自今轉運使凡釐革庶務平反獄訟漕運金榖成績居最及有建置之事果利於民者令諸州嵗終件析以聞非殊異者不得條奏詔三司三館職事官已升擢者不在論薦其有懷材外任未為朝廷所知者方得奏舉四年令內外官所保舉人有變節踰濫者舉主自首原其罪上勵精求治聽政之暇因索兩省兩制清望官名籍問朝士有德望者悉令舉官仍令自今中外官所舉之人並須析其爵里及歷任殿最以聞不得有隱所舉責實無驗者罪之如得狀者有賞典真宗咸平二年祕書郎陳彭年請復舉官自代之制詔祕書直學士馮拯陳堯叟參詳之拯等上言竊詳往制常參官及節度觀察防禦使刺史少尹畿赤令并七品以上清望官授訖三日內於四方館上表讓一人以自代其表付中書門下每官闕則以見舉多者量而授之今緣官品制度沿革不同伏請令兩省御史臺官尚書省六品以上諸司四品以上授訖具表讓一人自代於閣門投下方得入謝在外者授訖三日內具表附驛以聞詔可景德元年詔內外羣官所保舉人亦有中道變遷但或不令言上必恐負纍滋多宜令比類並許陳首當懲責其人特免連坐四年又令舉官所舉差遣本人在所舉任內犯贓即用連坐之制其改他任犯贓元舉主更不連坐大中祥符二年詔幕職州縣官初任者或未熟吏道羣官勿得薦舉三年四月詔自今每年終翰林學士以下常參官並同舉外任京朝官三班使臣幕職州縣官各二人眀言治行堪何任使或自己諳委或衆共推稱至時令閣門御史臺計會催促如年終無舉官狀即具奏聞當行責罰如十二月內差出亦須舉官後方得入辭諸司使副承制崇班曾任西北邉川廣鈐轄親民者亦同此例諸路轉運使副提點刑獄官知州通判結罪奏舉部內官屬不限名數眀言在任勞績如無人可舉及顯有踰濫者亦須指述不得顧避以次年二月二十五日以前到京如有違限委都進奏院具名以聞當依不申考帳例科罪三司使副即結罪舉奏在京掌事京朝官使臣仍令中書置籍先列被舉人名銜次列歷任功過及舉主姓名薦舉度數一本留中書一本常以五月一日進內次年籍內仍計向來功過及薦舉度數使臣即樞密院置籍兩省尚書省御史臺官凡出使回並須採訪所至及經歷鄰近郡官治迹善惡以聞轉運使副提點刑獄官知州通判到闕各具前任部內官治迹能否如鄰近及經由州縣訪聞羣官善惡亦許同奏先於閣門投進後方得入見或朝廷要人任使及有不治州縣難了公事並於上件籍內選擇過犯數少舉任及課績數多并資歷相當者差委仍於宣敕內盡列舉主姓名或能一任幹集即特與遷轉茍不集事本犯雖不去官亦移間慢僻逺處內外羣臣併舉及三人幹事者仰中書樞密院具名取旨當議甄奬如並舉三人不集事坐罪不至去官亦仰奏裁當行責降或得失相參亦與折當天禧三年吏部銓言本司令録稍多員闕甚少請權借審官院京朝官知縣闕注擬一任詔審官院以五千户以下縣借之仁宗天聖六年詔審刑院舉常參官在京刑法司者為詳議官大理寺詳斷刑部詳覆法直官皆舉幕職州縣曉法令者為之自請試律者須五考有舉者乃聽試律三道疏二道又斷中小獄案二道通者為中格時舉官擢人不常其制國子監闕講官嘗詔諸路轉運使舉經義通明者或欲不次用人又嘗詔近臣舉常參官歷通判無贓罪而才任繁劇者已之親及執政近屬毋得舉欲官諸邉要亦嘗詔節度使至閣門使知州軍鈐轄諸司使舉殿直以上材勇使邊任者或令三司使下至天章閣待制舉奏之邊有警又或詔諸轉運使提點刑獄升朝官舉所部官才任將帥者三路知州通判縣令皆詔近臣舉廉幹吏選任之毋拘資格至於文行之士錢榖之才刑名之學各因時所求而薦焉而守選者更郊赦減與赴調後立法所舉未遷而罪贓暴露者免劾自天聖後進者頗多物議患其冗始戒近臣非受詔毋輒舉官又下詔風厲毋以薦舉為阿私其任用已至部使者毋得復薦失舉而已擢用聽自言不實弗為負又詔磨勘遷京官者增四考為六考增舉者四人為五人犯私罪又加一考舉者雖多無本道使者亦為不應格議者以身言書判為無益乃罷之而試判者亦名文具因循無所去取御史王端以為法用舉者兩人得為令為令無過譴遷職事官知縣又無過譴遂得改京官乃是用舉者兩人保其三任也朝廷初無參伍考察之法偶幸無過輒信而遣之是以碌碌之人皆得自進因仍弗革其弊將深乃定令被薦為令任內復有舉者始得遷否則如常選無輒升補時增設禁限常參官已授外任毋得奏舉京官見任知州通判升朝官兵馬都監諸司副使以上及在京員外郎嘗任知州通判諸司副使嘗任兵馬都監者乃聽眀年流內銓復裁內外臣僚嵗貢數文臣待制至侍御史武臣自觀察使至諸司副使舉吏各有等數毋得輒過而被舉者須有本部監司長吏按察官乃得磨勘睦州團練推官栁三變到官未踰月而知州吕蔚薦之侍御史知雜郭勸言蔚未覩善狀而薦之蓋私之也乃限到官一考方得薦又詔選人六考改官而嘗犯私罪者加一考知雜御史觀察使以上歲舉京官不得過二人其嘗參官毋得復舉自是舉官之數省矣又命監司以所部州多少劇易之差為舉令數非本部無輒舉其後又增舉主至三員蓋官冗之弊浸極故保薦之法大抵初略而後詳也仁宗朝尤以選人遷京官為重雖有司引對法當與帝亦省察其當否乃可之蘇軾䇿别曰國家取人有制䇿有進士有眀經有諸科有任子有府史雜流凡此者雖衆無害也其終身進退之決在乎召見改官之日此尤不可以不愛惜慎重者也今之議不過曰多其資考而責之以舉官之數且彼有勉強而已資考既足而舉官之數亦以及格則將執文墨以取必於我雖千百為輩莫敢不盡與臣竊以為今之患正在於任文太過是以為一定之制使天下可以嵗月必得甚可惜也方今之便莫若使吏六考以上皆得以名聞於吏部吏部以其資考之逺近舉官之衆寡而次第其名然後使一二大臣雜治之參之以其材器之優劣而定其等嵗終而奏之以詔天子廢置度天下之吏每嵗以物故罪免者幾人而增其數以所奏之等補之及數而止使其豫奪亦雜出於賢不肖之間而無有一定之制則天下之吏不敢有必得之心將自奮厲磨淬以求聞於時而向之所謂用人之大弊者將不勞而自去然而議者必曰法不一定而以才之優劣為差則是好惡之私有以啓之也臣以為不然夫法者本以存其大綱而其出入變化固將付之於人昔者唐有天下舉進士者羣至於有司之門唐之制惟有司之信也是故有司得以搜羅天下之賢俊而習知其為人至一日之試則固已不取也唐之得人於斯為盛今以名聞於吏部者每嵗不過數十百人使一二大臣得以訪問參考其才雖有失者蓋已寡矣如必曰任法而不任人天下之人必不可信則夫一定之制臣亦未知其果不可以為姦也又曰夫天下之吏不可以人人而知也故使長吏舉之又恐其舉之以私而不得其人也故使長吏任之他日有敗事則以連坐其過惡重者其法均且夫人之難知自堯舜病之矣今日為善而眀日為惡猶不可保况於十數年之後其幼者已壯其壯者已老而猶執其一時之言使同被其罪不已過乎天下之人仕而未得志也莫不勉強為善以求舉惟其既已改官而無憂是故蕩然無所不至方其在州縣之中長吏親見其廉謹勤幹之節則其勢不可以不舉彼又安知其終身之所為哉故曰今之法責人以其所不能者謂此也一縣之長察一縣之屬一郡之長察一郡之屬職司者察其屬郡者也此三者其屬無幾耳其貪其廉其寬猛其能與不能不可謂不知也今且有人牧牛羊者而不知其肥瘠是可復以為牧人歟夫為長而屬之不知則此固可以罷免而無足惜者今其屬官有罪而其長不即以聞他日有以告者則其長不過為失察而去官者又以不坐夫失察天下之微罪也職司察其屬郡郡縣各察其屬此非人之所不能而罰之甚輕亦可怪也今之世所以重發贓吏者何也夫吏之貪者其始必詐廉以求舉舉者皆王公貴人其下者亦卿大夫之列以身任之居官莫不愛其同類等夷之人故其樹根牢固而不可動連坐者常六七人甚者至十餘人此如盜賊質劫良民以求茍免耳為法之弊至於如此亦可變矣如臣之䇿以職司守令之罪罪舉官以舉官之罪罪職司守令今使舉官與所舉之罪均縱又加之舉官亦無如之何終不能逆知終身之廉者而後舉特推之於幸不幸而已茍以其罪罪職司守令彼其勢誠有以督察之臣知貪利小人無容足之地又何必於舉官焉難之石林葉氏曰祖宗時監司郡守薦部吏初無定員有其人則薦之故人皆謹重不肯輕舉改官人每歲遂至數倍事有欲革弊而反以為弊固不得不謹其初治平中賈直孺為中司嘗以為言朝廷終莫能處蓋人情沿習既久雖使復舊亦不可為也英宗時御史中丞賈黯又言今京朝官至卿監凡二千八百餘員可謂多矣而吏部奏舉磨勘選人未引見者至二百五十餘人臣不敢逺引前代且以先朝事較之方天聖中法尚簡選人以四考改官而諸路使者薦部吏數未有限而在京臺閣及常參官嘗任知州通判者雖非部吏皆得薦時磨勘改官者歲才數十人後資考頗增而知州薦吏視屬邑多少裁定其數又常參官不許薦士其條約比天聖漸繁而改官者固已衆矣然磨勘應格者猶不越旬日即引對未有待次者也皇祐中始限監司奏舉之數其法益密而磨勘待次者已不減六七十人皇祐及今才十年耳而猥多至於三倍向也法疏而其數省今也法密而其數增此何故哉正在薦吏者嵗限定員務充數而已如一郡之守嵗許薦五人而歲終不滿其數則人人以為遺已當舉者避謗畏譏欲止不敢此薦者所以多而真才實廉未免慁於無能也謂宜眀詔天下使有人則薦不必滿所限之數天子納其言下詔申敕焉眀年詔中外臣僚歲得舉京官者視元數以三分率之減一分舉職官有舉者三人任滿選如法所以分減舉者數省京官也是歲判吏部流內銓蔡抗言奏舉京官人尚多度二年引對乃可畢計每歲所舉無慮千九百員被舉者既多則磨勘者愈衆且今天下員多闕少率三人而待一闕若不稍改後將除吏愈艱臣愚以為可罷知雜御史觀察使以上嵗得舉官法從之自是舉官之數彌省矣治平三年命宰執舉館職各五人先是上謂中書曰水潦為災言事者云咎在不能進賢何也歐陽修曰今年進賢路狹往時入館有三路今塞其二矣進士髙科一路也大臣薦舉一路也因差遣例除一路也往年進士五人以上皆得試第一人及第有不十年即至輔相者今第一人兩任方得試而第二人以下不復試是髙科路塞矣往時大臣薦舉即召試今只令上簿候缺人乃試是薦舉路塞矣惟有因差遣例除者半是年勞老病之人此臣所謂薦舉路狹也上納之故有是命韓琦曾公亮趙槩等舉蔡延慶以下凡二十人皆令召試宰臣以人多難之上曰既委公等舉之茍賢豈患多也先召試蔡延慶等十人餘須後時石林葉氏曰國朝以史館昭文館集賢院為三館皆寓崇文院其實無别舍但各以庫藏書列於廊廡間爾直館直院謂之館職以他官兼者謂之貼職凡狀元制科一任還即試詩賦各一而入否則用大臣薦而試謂之入館官制行廢崇文院為祕書監建祕閣於中自監少至正字列為職事官罷直閣直院之名而書庫仍在獨以直祕閣為貼職之首皆不試而除蓋時以為恩數而已治平四年陳汝羲試學士院中等除集賢校理御史吳中言比擇十人先試館職而汝羲亦預漸至冗濫兼詩賦非所以經國治民請用兩制薦舉仍罷試詩賦代之以䇿詔兩制詳議其年試胡宗愈輩仍用詩賦熙寧元年罷試詩賦而更以䇿論二年王介等五人始以䇿論試於學士院皆除館職後比年有試者蘇稅陳睦李清臣劉摯王欽臣等皆以試除四年太常丞許將以所業獻召試為集賢校理五年呂公弼薦王安禮材堪大用召對稱旨欲峻用之其兄安石辭乃以為崇文院校書曾布常舉鄧潤甫可備經筵館職詔取潤甫應制科進卷視之擢為集賢校理舊制凡設試以待命士而入之銓注者自蔭補銓試之外有進士律義武臣呈試材武及刑法等官而銓試所受為特廣蔭補初赴選皆試律暨詩已任而無勞績舉薦及無免試恩皆試判熙寧更制以後槩試律義斷案議後又增試經義中選者皆得隨銓擬注是銓試之凡也按是時進士選人之守選者亦皆試而後放然特詳於蔭補云四年詔曰故事二府初入舉所知者三人將以觀大臣之能比年多因請謁干譽薦者不公其令中書樞密院舉人皆眀言才業所長堪任何事以副朕為官擇人之意熙寧元年陳升之拜相循例薦侯叔獻程皓皆與堂除又升一任帝曰薦士不考才實以輔臣故例得進秩升任此何為也於是罷兩府初入舉官之制熙寧二年御史乞罷堂選知州曾公亮執不可帝曰精擇判審官人付之何為不可王安石曰中書所總已多通判亦有該堂選者徒留滯不能精擇歸之有司宜也按課試儒生有司之事也今以禮部考校為未當而必俟乎親䇿進退百官宰相之事也今以中書選擇為留滯而一付之審官輕重失倫矣况司牧之任千里休戚所係非他官比而廟堂一不之問則所謂中書所總已多者其事豈有重於進賢退不肖者乎三年置審官西院舊制文臣京朝官審官院主之武臣內殿崇班至諸司使樞密院主之供奉以下三班院主之至是詔曰樞輔之任重矣不當親有司之事其以審官為東院别置西院專領閣門祗候以上諸司使磨勘常程差遣又詔川陜福建廣南七路之官罷任迎送勞苦其令轉運司立格就注免其赴選著為令後增湖南為八路帝以舊舉官往往緣求請得之多且濫欲革去奏舉而槩以公法乃詔內外舉官法皆罷令吏部審官院參議選格五年詔堂選堂占悉罷吏部始立定選官格其法各隨所任職事以入任功狀立格以待擬注權開封府推官蘇軾上言大抵名器爵祿人所奔趨必使積勞而後遷以眀持久而難得則人各安其分不敢躁求今若多開驟進之門使有意外之得公卿侍從跬步可圖其得者既不肯以僥幸自名則其不得者必皆以沉淪為歎使天下常調舉生妄心耻不若人何所不至欲望風俗之厚豈可得哉選人之改京官常須十年以上洊更險阻計析毫釐其間一事聱牙常至終身淪棄今乃以一人之薦舉而與之猶恐未稱章服隨至使積勞久次而得者何以厭服哉夫常調之人非守則令員多闕少久已患之不可復開多門以待巧者若巧者侵奪已甚則拙者迫怵無聊利害相形不得不察故近歲朴拙之人愈少巧進之士益多惟陛下重之惜之哀之救之如近日三司獻言使天下郡選一人催驅三司文字許之先次指射以酬其勞則數年之後審官吏部又有三百餘人得先占闕常調待次不其愈難此外勾當發運均輸按行農田水利已振監司之體各懷進用之心轉對者望以稱旨而驟遷奏課者求為優等而速化相勝以力相髙以言而名實亂矣惟陛下以簡易為法以清淨為心使姦無所緣而民德歸厚臣之所願厚風俗者此之謂也按罷諸司之薦舉付銓選於吏部此熙寧所立之法蓋所以示至公而絶幸門也今東坡公所言乃如此豈此法特所以待守常安分之人而阿諛時指附會新法如所謂六七少年使者四十餘輩則初不在此限乎哲宗元祐時司諫蘇轍言祖宗舊法凡任子年及二十五方許出官自餘進士諸科初命及己任而應守選者非逄恩不得放選先朝患官吏不習律令欲誘之讀法乃減任子出官年數除去守選之法槩令試法通者隨得注官自是天下爭誦律令於事不為無補然人人習法則試無不中故蔭補者例減五年而選人無復選限吏部員多闕少聞今已用元祐四年夏秋闕官冗至此亦極矣宜追復祖宗守選舊法而選滿之日兼行先朝試法之科此亦今日之便也蔭補入學肄業一年不犯上三等罰方許就銓試詳見學校門御史上官均言定差不便有七諸路赴選中試乃差八路隨意即射不均一也諸路吏選有待試有需次率及七年方成一任略計八路就注若及七年已更三任矣不均二也八路雖坐愆停罷隨許射注而吏選無愆犯人既須試法又待次大率四年方再得祿况八路待次又許權攝祿無虛日不均四也八路士人得特奏名者免試就注家便年髙力憊不復望進往往營私廢職其弊五也仕八路久知識既多士人就射夲路不無親故請囑其弊六也八路監司地逺而專便使蕩滅功過名次人亦不敢爭校故有力者多得優便而孤寒滯卻其弊七也定差本意止因省迓送雇費然事極弊生八路闕常有餘吏部闕常不足今立法互季迭用而運司定差猶占其半是半均半不均也如聞迓送雇直嵗計不堪多用坊場河渡錢已可給用請併八路定差盡歸吏部殊為均便左僕射司馬光言臣竊惟為政之要莫若得人百官稱職則萬務咸治然人之才性各有所能或優於德而嗇於材或長於此而短於彼雖臯夔稷契止能各守一官况於中人安可求備是故孔門以四科論士漢室以數路得人若指瑕掩善則朝無可用之人茍隨器授任則世無可棄之士臣誤蒙甄擢備位宰相謹選百官乃其職業而智識淺短見聞褊狹知人之難聖賢所重寰宇至廣俊彥如林或以恬退滯淹或以孤寒遺逸被褐懷玉豈能周知若專引知識則嫌於挾私難服衆心若止循資序則官非其人何以致治莫若使在位逹官人舉所知然後克叶至公野無遺賢矣臣欲乞朝廷設十科舉士一曰行義純固可為師表科有官無官人皆可舉二曰節操方正可備獻納科舉有官人三曰智勇過人可備將帥科舉文武有官人四曰公正聰眀可備監司科舉知州以上資序五曰經術精通可備講讀科有官無官人皆可舉六曰學問該博可備顧問科同上七曰文章典麗可備著述科同上八曰善聽獄訟盡公得實科舉有官人九曰善治財賦公私俱便科舉有官人十曰練習法令能斷請讞科同上應職事官自尚書至給舍諫議寄祿官自開府儀同三司至大中大夫職自觀文殿大學士至待制每嵗須得於十科中舉三人非謂每科舉三人各隨所知於十科內一嵗共舉三人其狀云臣切見某人有何行能並須指陳實事不得徒飾虛辭位在上者得舉下下不得舉上臣今保舉堪充某科如蒙朝廷擢用後不如所舉謂舉行義純固而違犯名教之類及犯入已贓臣甘伏朝典不辭候奏狀到日付中書省置簿抄録舉主及所舉官姓名别置合舉官臣僚簿歲終不舉及人數不足按劾施行或遇在京及外方有事須令差官體量相度點檢磨勘剗刷催促推勘定奪則委執政親檢逐簿各隨所舉之科選差令試管勾上件事務若能辦集即别置簿記其勞績遇本科職任有闕謂若經筵或學官有闕即用行義純固經術精通等科臺諫有闕即用節操方正科之類則委執政親檢逐簿選名實相稱或舉主多有勞績之人補充仍於本人除官敕告前盡開坐舉主姓名於後或不如所舉其舉主從貢舉非其人律科罪犯正入已贓舉主減三等科罪若因受賄徇私而舉之罪名重者自從重法期在必行不可寬宥雖見為執政官朝廷所不可輟者亦須降官示罰所貴人人重謹所舉得人光又言朝廷執政只八九人若非交舊無以知其行能不惟涉徇私之嫌兼所取至狹豈足以盡天下之賢才若採訪毁譽則愛譽憎毁情偽萬端與其聽遊談之言曷若使之結罪保舉故臣奏設十科以舉士其中一科公正聰眀可備監司誠知請屬挾私所不能無但有不如所舉者嚴加譴責無所寬宥則今後自然謹擇不敢妄舉矣詔皆從之詔大臣奏舉館職並如制召試除授其朝廷特除不用此令先是右正言劉安世言祖宗之待館職也儲之英傑之地以飭其名節觀以古今之書而開益其聰眀稍優其廪不責以吏事所以滋長德器養成其名卿賢相也自近歲以來其選寖輕或緣世賞或以軍功或酬聚斂之能或徇權貴之薦未嘗較試遂獲貼職多開幸門恐非祖宗德意望眀詔執政詳求文學行誼審其果可長育然後召試非試毋得輒命庶名器重而賢能進至是乃降詔命而言未盡行安世復奏祖宗時入館鮮不由試惟其望實素著治狀顯白或纍持使節或移鎮大藩欲示優恩方令貼職今既過聽臣言追復舊制又有所謂朝廷特除不在此限則是不問人材髙下資歷深淺但非奏舉皆可直除名為更張弊源尚在願倣故事資序及轉運使方可以特命除授庶塞僥幸重館職之選二年殿中侍御史呂陶言郡守提封千里生聚萬衆所係休戚而不察能否一以資格用之凡再為半刺有薦者三人則得之矣不公不眀十郡而居三四是天下之民半失其養請令內外從臣嵗舉可為守臣者各三各略資序而採公言庶其可以擇才庇民也詔內外待制大中大夫以上嵗舉再歷通判資序堪任知州者一人籍於吏部遇三路及一州而四縣者其守臣有闕先差本資序人次案籍以及所薦者八月殿中侍御史韓川言近委大中大夫以上嵗舉守臣而薦所不及雖課入優等皆未預選此倚薦以為信也然大中大夫以上率在京師唯馳騖請求因緣宛轉者常多得之迹逺地寒雖歷郡久治狀著課入上考偶以無薦則反在通判下不許入三路及四縣州且州以縣之多少而分簡劇亦為未盡蓋繁簡在事不在縣固有縣多事不繁亦有縣少事不簡者願參以考績之實著為通令仍不以縣之多少而為簡劇詔吏部立法以聞已而嵗舉積多吏部無闕以授四年遂罷大中大夫以上嵗舉法唯奉詔乃舉焉紹聖元年吏部侍郎彭汝礪乞稍責吏部甄别能否凡京朝官才能事效茍有可録尚書暨郎官銓擇而以名聞三省分三年考察之髙則引對次即試用下者還之本選若資歷舉薦應入高而才行不副許奏而降其等凡皆略許出法而加升絀嵗各毋過三人徽宗政和六年臣僚言知縣縣丞凡百七十餘闕無願注者命吏部措置已而吏部取在選應入者隨其資序自上而下不以願否徑自差注如硬差法遂有貫戶福建而強注四川者明年上知其逺難赴特許便鄉差注路雖逺毋過三十驛已注者聼改注重和元年臣僚言八路定差歲久弊多嘗究其原在付非其人而又舉職不專也且四選之在吏部尚書侍郎專總其事而八路則委之轉運既以軍儲吏祿供饋支移為已責而差注視為末務乃付之主管文字官其人又以稽考簿書檢勘行移為先而不復究心差注乃付之士案率吏胥擬定而僉廳特視成書判而已幾何而不廢法哉比年以來賄賂公行隨其厚薄為注闕之髙下甚者曰某闕供給厚遺我一季之得則可差矣某地圭租優歸我一料之資則以汝往矣茍賤不廉之士亦增賕以市而取償於至官之後間有剛正而無賂者則定差之牘脫漏言詞隱落節目暨其上部必致退却待其參會重上已半歲所矣士大夫以身在八路勢須畏忌若必投訴是訴所涖監司也以是闕多而不調者衆宜督察典領之官嵗終取吏部退難有無多寡為之課而賞罰之可以公擬注而絶吏賕從之仍立為法升改薦任之法選人用以進資改秩京朝官用以升任舊悉有制自熙寧後又從而損益之故舉皆限員而嵗又分舉制益詳矣先時選人應改官必對便殿舊制五日一引不過二人其後待次者多至有踰二年乃得引帝憫其留滯至元豐四年乃詔每甲引四人以便之二年定十六路提點刑獄歲舉京官縣令額京東西河東路京官七人職官三人縣令四人成都府梓州江南東西路京官五人職官三人縣令四人建利州荆湖南北廣南東西路京官四人職官三人縣令二人夔州路京官三人職官二人縣令二人六年詔察訪官舉京官職官縣令者河東兩浙十二人餘路十人升陟不限數選人任中都官者舊未有薦舉法至是詔其屬有選人六員者嵗得舉三員又定提舉市易司歲舉京官五員元祐元年嵗舉升陟始立額如舉改官及職令之數復通判舉法詔歲舉京官縣令各一員仍間迭而舉用孫覺言吏部選人改官嵗以百人為額紹聖元年右司諫朱勃言選人初受任雖有能者法未得舉為京官而有挾權善請求者職官縣令舉員既足又併改官舉員求之詔歷任通及三考而資序已入幕職令録方許舉之改官又言選人改官嵗限百人而元祐變法三人為甲月三引見積纍至今待次者亡慮二百八十餘人以數而計歷二年三季始得畢見請酌元豐令增損之詔依元豐五日而引一甲甲以三人歲毋過一百四十人俟待次不及百人别奏定大觀四年裁減國學長二歲舉改官而立之數大司成十五員祭酒司業各八員政和三年尚書省修立改官格承直郎至登仕郎六考將仕郎七考有改官舉主而職司居其一即與磨勘如因坐公私愆犯各隨輕重加考及舉官有差從之七年臣僚言官冗吏員增多本因入流日衆熙寧郊禮文武奏補總六百一十一員元豐六年選人磨勘改京朝官總一百三十有五員近考之吏部政和六年郊恩奏補約一千四百六十有竒選人改官約三百七十有奇其來既廣吏員益衆欲節其來惟嚴守磨勘舊法不可茍循妄豫而已且今之磨勘有局務減考第者有用逺減舉官者有用酬賞比類者有因大人特舉者有託因事到闕而不用滿任者有約法違礙許先次而改者凡皆棄法用例法不能束而例日益繁茍不裁之將又倍蓰於今而未可計也請詔三省若吏部舊有正法自當如故餘皆毋得用例詔惟川廣水土惡弱之地許減舉如制餘悉用元豐法從事其崇寧四年之制勿行髙宗建炎初詔即駐蹕所置吏部時四選散亡名籍莫考始下諸道州府軍監條具屬吏寓官之爵里年甲出身歷任功過舉主到罷月日編而籍之詔京畿京東西河北河東士夫在部注授雖銓未中而年及者皆聽注官二年詔京官赴行在者令吏部審量非政和以後進書頌及直赴殿試之人乃聼參選在部知州軍通判簽判及京朝官知縣監當舊以三年為任者令權以二年為任兵休仍舊以赴調者萃東南選法留滯故也四年言者論近世銓衡之官守法不立自京黼用事有詣堂及吏部闕者判一取字雖已注人亦奪豫之甚至部有佳闕密獻以自效為寒逺患踰二十年望眀戒吏部長二自今堂中或取部闕並須執守毋得供報從之紹興元年詔館職選人到任及一年通理四考並自陳改官選人改官舊無定數紹興以後多不過九十人少或至五十人紹興二十年八十八人二十五年六十八人三十年七十四人三十一年五十人捕盜及職事官皆不在數三十二年遂至一百十三人孝宗患之隆興元年四月詔以百員為額乾道三年七月又通四川為百二十員七年十月有司請不限員奏可時虞丞相當國也淳熙初上以官冗稍嚴升改之令於是六年引見改官不及七十員而捕盜在焉周洪道為吏部尚書七年二月因請以七十員為額是年四月又增八十員職事官并引見改官六十五人四川換給一十五人特旨改官不與十三年三月又詔職事官改官在八十員嵗額之外自是歲改京官者僅百員今遂為永制奏舉京官祖宗時無定數有其人則舉之太平興國後諸州通判亦得舉京官熙寧中取以為提舉常平官員數元祐中嘗暫復之至紹聖又罷淳熙六年九月上以嵗舉京官數濫命給舍臺諫議之王仲行傅希呂時兼給事中乃請六曹寺監戶部右曹郎官同歲減舉員三之一諸路監司減四之一禮部國子監長二減三之二前執政歲減二員諸州無縣者歲止一員嵗終不除運副而判官補發者不理為職司奏可慶元元年十一月復詔判官補發副狀理為職司又詔職司狀不得用二紙用姚察院愈奏也在京選人舊無外路監司薦舉渡江後詔以六部長二作職司乾道七年九月罷之惟館學官通理四考不用舉主改官蓋纍聖優賢之意二年呂頥浩言近世堂除多侵部注士人失職宜倣祖宗故事外自監司郡守及舊格堂除通判內自察官省郎已上館職書局編修官外餘闕并寺監丞法寺官六院等武臣自凖備將領正副將已上其部將巡尉指使以下並歸部注從之三年右僕射朱勝非等上吏部七司敇令格式一百八十八卷自渡江後文籍散佚會廣東轉運司以所録元豐元祐吏部法來上乃以省記舊法及續降指揮詳定而成此書五年詔自今注擬並選擇非老疾及不曾犯贓與不緣民事被罪之人時建議者云州縣親民莫如縣令今率限以資格雖貪懦之人一或應格則大官大職得以自擇請詔監司郡守條上劇邑遴選清平廉察之人如前日預十科之目者為之二十二年右諌議大夫林大鼐上言曰中興之初恩或非泛人得僥幸有以從軍而改秩者有以捕盜而改秩者有以登對而改秩者今則朝廷無事謹惜名器改秩無他惟有舉薦一路而貪躁者速化廉靜者陸沉臣欲取考第員數增減以便之增一任者減一員十考者用四十二考者用三十五考者用二如減舉法行須實歷縣令不得仍請嶽祠其或負犯殿選自如常坐士有應此格者行無玷闕年亦蹉跎無非孤寒老練安義分之人望付有司條上以弭奔競議者以進士登科門蔭子弟才沾一命不復參部多干堂除有紊銓法詔禁之二十九年敇令所刪定官聞人滋請凡在官者歷任及十考以上無公私過犯雖舉削不及格許降等升改或疑其太濫則取吏部纍年改官酌中人數立為限隔舉狀年勞參酌並用於是天子以其議下近臣而中書舍人洪遵給事中王希亮等上議曰自一命已上仕於州縣之間雖有真賢實廉勢不能自逹於上故為之立薦舉之法必使之歷任六考所以遲其嵗月而責其赴功必使之舉官五員所以多其保任而必其可用若舉之而非其人有才而不見舉是則監司郡守之罪而非法之不善也今如議臣所請則有力者惟圖見次無才者茍冀終更率不過出官十餘年可以坐待京秩此不可一也今欲酌每嵗改官之員減其分數以待無舉削者則當被舉之人必有失職淹滯之嘆此不可二也京官易得馴至郎位任子之恩愈不可減非所以救末流之弊此不可三也夫祖宗之法非有大害未易輕議今一旦取二百年成法而易之此不可四也臣以為如故便滋議遂寢三十一年詔初官有出身三考無出身四考方聽受監司郡守京削之薦三十二年吏部侍郎凌景夏言國家設銓選以聼羣吏之治其掌於七司著在令甲則所守者法也今升降於胥吏之手有所謂例焉長二有遷改郎曹有替移來者不可以復知去者不能以盡告索例而不獲雖有強眀健敏之才不復致議引例而不當雖有至公盡理之事不復可伸貨賄公行姦弊滋甚嘗覩漢之公府則有辭訟比以類相從使不良吏不得生因緣尚書則有決事比以省請讞之弊比之為言猶今之例臣謂今吏部七司亦宜許置例册凡換給之期限戰功之定處去失之保任書填之審實奏薦之限隔酬賞之用否凡經申請或白堂或取旨者每一事已命郎官以次擬定而長二書之於册永以為例每半嵗則上於尚書省仍關御史臺而詳焉如是則巧吏無所施而銓敘平允矣先是劉珙為吏部員外郎有才智善摘檢姦弊一日命泛中庭張幕設案置令式其中使選集者得出入翻閲與吏辨吏愕眙不能對時議翕然稱之孝宗隆興元年詔選人歷十二考已上無贓私罪與減舉主一員用聞人滋之言也舊舉主須員足乃以其牘上若舉主物故或罷免則不計故有得薦牘十餘而不克磨勘者淳熙中始有逐旋放散之令人皆便之乾道二年令科舉前一嵗量留司戶簿尉職官教官窠闕以待黃甲進士又詔見任在京監當六部架閣等如係京朝官以上須實歷知縣一任始聼關升通判資序初改秩者如之是時多以堂除理實歷越次關升故有斯詔先是有出身人許注教官理為作縣是嵗詔自今有出身曾任縣令初改官許注教官餘並先注知縣自是改秩者無不製邑矣淳熙元年參知政事龔茂良言官人之道在朝廷則當量人才在銓部則宜守成法夫法本無弊而例實敗之法者公天下而為之者也例者因人而立以壞天下之公者也昔者之患在於用例破法比年之患在於因例立法故謂吏部者例部也今七司法自晏敦復裁定不無疏略然已十得八九有司守之以從事可以無弊而循情廢法相師成風蓋用例破法其害小因例立法其害大法常靳例常寬今至於法令繁多官曹冗濫蓋繇此也望詔有司裒集參附法及乾道續降申眀重行考定非大有抵捂者弗去凡涉寬縱者悉刋正之庶幾國家成法簡易眀白賕謝之姦絶冒濫之門塞矣於是詔從修焉既而吏部尚書蔡洸以改官奏舉磨勘差注等條法分門編類冠以吏部條法總類為名十一月參知政事龔茂良進吏部七司敇令格式申眀三百卷詔頒行焉三年吏部言六十不得入選今文臣武臣皆有隱減年甲之弊詔禁之時州郡上闕狀稽違多畀人私攝乃詔下諸道轉運司州委通判縣委縣丞監司委屬官以時申發稽違隱漏者罪之光宗紹熙二年吏部侍郎羅點言銓量之法得以察其人物核其功過而進退之而有司奉行寖成文具羣趨而進一揖而退是非賢否一不暇問甚者循習舊例才注差遣更不銓量伏請自今令長二從容接談稍問以事除癃疾已有定法如絶不通曉及有過尤者别與注擬從之寧宗慶元中制初改官人必作令謂之須入中興以來數申嚴其令今除殿試上三名南省元外並令作邑自後雖宰相子甲科人無不宰邑者矣文獻通考卷三十八
