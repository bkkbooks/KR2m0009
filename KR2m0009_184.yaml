body:
  text: 文獻通考卷一百八十四鄱陽馬端臨貴與著經籍考十一經論語孟子西漢藝文志論語者孔子應答弟子時人及弟子相與言而接聞扵夫子之語也當時弟子各有所記夫子既卒門人相與輯而論篹故謂之論語師古曰輯與集同篹與撰同漢興有齊魯之說𫝊齊論語者昌邑中尉王吉少府宋畸御史大夫貢禹尚書令五鹿充宗膠東庸生唯王陽名家師古曰王吉字子陽故謂之王陽𫝊魯論語者常山都尉龔奮長信少府夏侯勝丞相韋賢魯扶卿前將軍蕭望之安昌侯張禹皆名家張氏最後而行扵世隋經籍志張禹夲授魯論晚講齊論後遂合而考之刪其煩惑除去齊論問王知道二篇従魯論二十篇為定號張侯論當世重之周氏包氏為之章句馬融又為之訓又有古論語與古文尚書同出章句煩省與魯論不異唯分子張為二篇故有二十一篇孔安國為之𫝊漢末鄭𤣥以張侯論為夲參考齊論古論而為之註魏司空陳羣太常王肅博士周生烈皆為義說吏部尚書何晏又為集觧是後諸儒多為之註齊論遂亡古論先無師說梁陳之時唯鄭𤣥何晏立於國學而鄭氏甚㣲周齊鄭學獨立至隋何鄭並行鄭氏盛扵人間其孔叢家語並孔氏所𫝊仲尼之㫖爾雅諸書觧古今之意幷五經總義附扵此篇漢志論語十二家二百二十九篇隋志二十九家一百九十八卷唐志三十家三十七部三百二十七卷失名姓三家韓愈以下不著録二家十二卷宋三朝志十六部一百三十九卷宋兩朝志二部二十卷宋四朝志十三部七十八卷宋中興志五十五家六十三部四百九十八卷何晏論語注十卷鼂氏曰魏何晏集觧其序自云據魯論包咸周氏孔安國馬融鄭康成陳羣王肅周生烈八家之說與孫邕鄭冲曺羲荀顗集諸家訓觧為之按漢時論語凡有三而齊論有問王知道兩篇詳其名當是必論内聖之道外王之業未必非夫子之最致意者不知何說而張禹獨遺之禹身不知王鳯之邪正其不知此固宜然勢位足以軒輊一世使斯文遂喪惜哉按齊論多於魯論二篇曰問王知道史稱為張禹所刪以此遂無傳且夫子之言禹何人而敢刪之然古論語與古文尚書同自孔壁出者章句與魯論不異唯分堯曰子張問以下為一篇共二十一篇則問王知道二篇亦孔壁中所無度必後儒依倣而作非聖經之夲真此所以不傳非禹所能刪也皇侃論語疏十卷鼂氏曰梁皇侃撰古今論語之注多矣何晏集七家復采古論語註為集觧行扵世侃今又引衛瓘繆播欒肇郭象蔡謨袁宏江惇蔡奚李充孫綽周懐范寗王珉凡十三家之說成此書其序稱江熈所集世謂其引事雖時詭異而援證精博為後學所宗云韓李論語筆觧十卷鼂氏曰唐韓愈退之李翺習之撰前有祕書丞許勃序云韓李相與講論共成此書按唐人通經者寡獨兩公名冠一代葢以此然四庫邯鄲書目皆無之獨田氏書目有韓愈論語十卷筆觧兩卷此書題曰筆觧而兩卷亦不同陳氏曰館閣書目云祕書丞許勃為之序今夲乃王存序云得扵錢塘汪充而無許序石經論語十卷鼂氏曰右偽蜀張徳鈞書闕唐諱立石當在孟知祥未叛之前其文脫兩字誤一字又述而第七舉一隅下有而示之三字三人行必有我師焉上又有我字衛靈公第十五敬其事而後其食作後食其禄與李鶚夲不同者此也論語井田義圖崇文總目不著撰人名氏述周井田之法其曰論語者葢為論語學者引用云論語正義十卷鼂氏曰皇朝邢昺等撰亦因皇侃所採諸儒之說刋定而成書陳氏曰唐人止為五經疏而不及孝經論語至昺始奉詔為之按唐藝文志亦有賈公彦論語疏十五卷當攷王令論語十卷鼂氏曰皇朝王令逢原撰解堯曰篇云四海不窮困則天禄不永終矣王安石書新義取之王介甫論語觧十卷王元澤口義十卷陳用之論語十卷鼂氏曰王介甫撰并其子雱口義其徒陳用之觧紹聖後皆行扵塲屋或曰用之書乃鄒浩所著託之用之云東坡論語觧十卷潁濱論語拾遺潁濵自序予少為論語解子瞻謫居黄州為論語說盡取以徃今見扵書十二三也大觀丁亥閑居潁川為孫籕簡筠講論語子瞻之說意有所未安時為籕等言凡二十七章謂之論語拾遺恨不得質之子瞻也鼂氏曰蘇軾子瞻為論語觧沒後子由以其說之未安者辯正之伊川論語說十卷鼂氏曰伊川門人記其師所解論語也不為文辭直以俚語記之范醇夫論語說十卷鼂氏曰元祐中所進數稱引劉敞程頥之說謝顯道論語觧十卷鼂氏曰顯道少師程正叔朱子語録上蔡論語觧言語極多看得透時他只有一兩字是𦂳要問謝氏之說多華掞先生曰胡侍郎嘗教人看謝氏論語以其文字上多有發越處吕與叔論語觧十卷鼂氏曰與叔雖程正叔之徒觧經不盡用其師說尹彦眀論語觧十卷鼂氏曰彦眀程氏門人紹興中自布衣召為崇政殿說書被㫖訓觧多採純夫之說朱子語録曰論語中程先生及和靖說只扵夲文上添一兩字甚平淡然意味深長須當子細看要見得他意味方好問精義中尹氏說多與二程同何也曰二程說得已眀尹氏只說出處王定國論語十卷王鞏定國撰秦少游序略曰定國坐罪斥海上罷還詣東上閤門奏書曰臣無状幸縁先臣之故獲齒仕版不能慎事䧟扵罪戾念無以自贖間因職事之暇妄以所見註成論語十卷未敢以進唯陛下裁鍳之眀日詔御藥院取其書去未報而神宗棄天下嗚呼自熈寧初王氏父子以經術得幸下其說扵太學凡置博士試諸生皆以新書従事不合者黜罷之而諸儒之論廢矣定國扵時處放逐之中蠻夷瘴癘之地乃能自信不惑論著成一家之言至天子聞之取其書非其氣過人何以及此姑掇其大槩使夫覧之者知定國著書之時為如此又知神宗嚮經術亦非主扵一家而已汪氏論語直解十卷鼂氏曰汪革信民撰撫州人紹聖中試禮部為天下第一嘗語人曰吾鄉有二相一為天下之福一為天下之禍葢指晏元獻王荆公也即此可見其觧經淵源所自云景迂論語講義十卷鼂氏曰従父詹事公撰多取古人之說以正近世之失楊氏注論語十卷鼂氏曰楊氏中立伊川門人也游氏論語觧十卷陳氏曰游酢定夫伊川門人論語釋言十卷陳氏曰葉夢得少藴撰張氏論語觧二十卷陳氏曰張九成撰五峯論語指南一卷陳氏曰胡宏仁仲撰評論黄祖舜沈大亷之說竹西論語感發十卷陳氏曰中書舎人江都王居正撰凡十卷論語探古二十卷陳氏曰畢良史撰二十卷洪興祖論語說中興藝文志其說多可采謂此書始扵不愠終於知命葢君子儒論語續解考異說例共十二卷中興藝文志吳棫撰自謂考研甚衆獨於何晏集觧邢昺疏所得為多又謂孔門弟子之言多未盡善而註信經疏信註太過嘗作指掌十卷亡扵兵火僅追記大略以觧何晏集解之未盡未安者故曰續觧又考他書之文之說異扵論語者為考異又為說例有集語眀原微言略例答問正統權道弟子雜說凡十篇多發眀陳氏曰其所援引百家諸史傳出入詳洽所稱欒肇駮王鄭之說間取一二肈晉人隋唐志載論語釋二卷駮二卷按董逌藏書志釋已亡駮幸存而崇文總目及諸藏書家皆無有棫葢嘗見其書也館閣書目亦不載玉泉論語學十卷陳氏曰工部侍郎喻樗子才撰樗與張子韶諸公友善坐此得罪秦檜汪端眀應辰其壻也曾吉甫論語義二卷陳氏曰禮部侍郎曾㡬撰胡文定公門人也南軒論語說十卷陳氏曰侍講廣漢張栻敬夫撰論語集義三十四卷陳氏曰朱熹撰集二程張氏及范祖禹吕希哲吕大臨謝良佐游酢楊時侯仲良周孚先凡十一家初名精義後刻扵豫章郡學始名集義其所言外自託於程氏而竊其近似之言以文異端之說者葢指張無垢也無垢與宗杲逰故云爾朱子語録曰讀論語須將精義看一段次看第二段將兩段比較孰得孰失孰是孰非又將第三段比較如前又總一章之說而盡比較之其間須有一說合聖人之意或有兩說有三說有四五說皆是乂就其中比較疏宻如此便是格物及看得此一章透徹則知便至或自未有見識只得就這裏挨一章之中程子之說多是門人之說多非然初看時不可先萌此心門人所記亦多有好處蜚卿曰若只將程子之說為主如何曰不可只得以理為主然後看他底看得一章直是透徹然後看第二章亦如此法若看得三四篇此心便熟數篇之後迎刄而觧矣讀書考義理似是而非者難辨且如精義中惟程先生說得的當確至其門人非惟不盡得夫子之意雖程子之意亦多失之今讀語孟不可便道精義都不是都廢了須借他做箇梯階去尋求將来自見道理知得他是非方是自家所得處論語集注十卷陳氏曰朱熹撰大略夲程氏學通取注疏古今諸儒之說間復斷以己意晦庵先生平生講解此為第一所謂毫髪無遺憾者矣朱子語録曰集註如秤上秤来無異不髙些不低些如看得透存飬熟甚生氣質集註添一字不得減一字不得看集註時不可遺了𦂳要字葢觧中有極散緩者有緩急之間者有極𦂳要者某下一字時直是秤等輕重方敢寫出集註乃集義之精髓問集註引前軰之說而增損改易夲文其意如何曰其說有病不欲更就下面安註脚問集註中有兩存何者為長曰使某見得長底時豈復存其短底只為二說皆通故並存之然必有一說合聖人之夲但不可知耳復曰大率兩說前一說勝集註某自三十歳便下工夫到而今改猶未了不是草草看者朱在過庭所聞曰集註扵正文之下正觧說字訓文義與聖經正意如諸家之說有切當眀白者即引用而不沒其姓名如學而首章先尹氏而後程子亦只是順正文觧下来非有髙下去取也章末用圏而列諸家之說者或文外之意而於正文有所發眀不容略去或通論一章之意反覆其說切要而不可不知也論語或問十卷陳氏曰朱熹撰集註既成復論次其取舎之所以然別為一書而篇首述二書綱領與讀者之要法其與集註實相表裏學者所當並觀也朱子文集集註後来改定處多遂與或問不相應又無工夫修得或問故不曾𫝊出今莫若只就正經上玩味有未通處參考集註更自思索為佳不可恃此未定之書便以為是也石鼓論語答問三卷陳氏曰戴溪岷隐撰溪初仕領石鼓書院山長所與諸生講說者也其說切近眀白晦庵亦稱其近道論語通釋十卷陳氏曰黄幹撰其書兼載或問發眀婦翁未盡之意論語意原一卷陳氏曰不知作者論語夲㫖一卷陳氏曰建昌軍教授永嘉姜得平撰論語大意二十卷陳氏曰海陵卞圜撰晦庵語類二十七卷陳氏曰蜀人以晦庵語録類成編處州教授東陽潘墀取其論語一類増益其所未備刋於學宫論語紀䝉六卷陳氏曰國子司業臨海陳耆卿夀老撰葉水心為之序耆卿學扵水心者也嘗主麗水簿嘉定初年成此書孔子家語十卷王肅註後序曰孔子家語者皆當時公卿士大夫及七十二弟子之所諮訪交相對問言語也既而諸弟子各自記其所問焉與論語孝經並時弟子取其正實而切事者別出為論語其餘則都集録之名之曰孔子家語凡所論辯疏判較歸實自夫子夲㫖也屬文下辭徃徃頗有浮說煩而不要者亦由七十二子各共叙述首尾加之潤色其材或有優劣故使之然也孔子既沒而㣲言絶七十二弟子終而大義乖六國之世儒道分散逰說之士各以巧意而為枝葉唯孟軻荀卿守其所習當秦昭王時荀卿入秦昭王従之問儒術荀卿以孔子之語及諸國事七十二弟子之言凡百餘篇與之由此秦悉有焉始皇之世李斯焚書而孔子家語與諸子同列故不見滅髙祖克秦悉斂得之皆載扵二尺竹簡多有古文字及吕氏專漢取歸藏之其後被誅亡而孔子家語乃散在人間好事者或各以意增損其言故使同是一事而輒異辭孝景皇帝末年募求天下遺書扵時亰師士大夫皆送官得吕氏之所𫝊孔子家語而與諸國事及七十子辭妄相錯雜不可得知以付掌書與曲禮衆篇亂簡合而藏之祕府元封之時吾仕亰師竊懼先人之典辭將遂泯沒扵是因諸公卿大夫私以人事募求其副悉得之乃以事類相次撰集為四十四篇又有曾子問禮一篇自別屬曾子問故不復録其諸弟子書所稱引孔子之言者夲不存乎家語亦以其已自有所傳也是以皆不取也將来君子不可不鑑博士孔衍言臣祖故臨淮太守安國逮仕扵孝武皇帝之世以經學為名以儒雅為官讃眀道義見稱前朝時魯共王壊孔子故宅得古文科斗尚書孝經論語世人莫有能言者安國為改今文讀而訓傳其義又撰次孔子家語既畢訖㑹值巫蠱事起遂各廢不行扵時然其典雅正實與世相傳者不可同日而論也光禄大夫向以其為時所未施行故尚書則不記扵別録論語則不使名家也臣竊惜之且百家章句無不畢記况孔子家古文正實而疑之哉又戴聖皆近世小儒以曲禮不足而乃取孔子家語雜亂者及子思孟軻荀卿之書以裨益之總名曰禮記今見其已在禮記者則便除家語之夲篇是為滅其原而存其末也不亦難乎臣之愚以為宜如此為例皆記録別見故敢冒昧以聞奏上天子許之未即論定而遇帝崩向又病亡遂不果立鼂氏曰序註凡四十四篇劉向校録止二十七篇後王肅得此扵孔子二十四世孫猛家朱子語録曰家語雜記得不純却是當時書孔叢子是後来自撰出又與吕伯恭書曰遺書愚意所刪去者亦須抄出逐段略註刪去之意方不草草若只暗地刪却久逺易惑人記論語者只為如此留下家語至今作病痛也陳氏曰孔子二十四世孫猛所傳魏王肅為之註肅闢鄭學猛嘗受學扵肅肅従猛得此書與肅所論多合従而證之遂行扵世云博士安國所得壁中書也亦未必然其間所載多已見左氏傳大戴禮諸書右論語趙氏題辭曰孟子以儒道游扵諸侯思濟斯民然不肯枉尺直尋時君咸謂之迂濶扵事終莫能聼納其說扵是退而論集所與髙第弟子公孫丑萬章之徒難疑答問又自撰其法度之言著書七篇二百六十一章三萬四千六百八十五字又有外書四篇性善辯文說孝經為正其文不能宏深不與内篇相似似非孟子夲真後世依倣而作者也秦焚經籍其書號為諸子得不泯絶孝文時論語孝經孟子爾雅皆置博士後罷傳記博士獨立五經而已按前史藝文志俱以論語入經類孟子入儒家類直齋陳氏書録觧題始以語孟同入經類其說曰自韓文公稱孔子傳之孟軻軻死不得其傳天下學者咸曰孔孟孟子之書固非荀揚以降所可同日語也今國家設科語孟並列扵經而程氏諸儒訓解二書常相表裏故合為一類今従之漢志孟子十一篇隋志三家二十八卷亡書九卷唐志六家四十五卷宋三朝志五家二十七卷宋四朝志九家九十二卷宋中興志二十二部二百入十五卷趙岐註孟子十四卷鼂氏曰岐字臺卿後漢人為章指析為十四篇其序云軻戰國時以儒術干諸侯不用退與公孫丑萬章之徒難疑答問著書七篇三萬四千六百八十五字秦焚書以其書號諸子故得不泯絶又為外書四篇其書不能宏深似非孟子夲真也按韓愈以此書為弟子所會集與岐之言不同今考其書載孟子所見諸侯皆稱諡如齊宣王梁恵王梁襄王滕定公滕文公魯平公是也夫死然後有諡軻無恙時所見諸侯不應皆前死且恵王元年至平公之卒凡七十七年軻始見恵王目之曰叟必已老矣決不見平公之卒也後人追為之眀矣則岐之言非也荀子載孟子三見齊王而不言弟子問之曰我先攻其邪心揚子載孟子曰夫有意而不至者有矣未有無意而至者也今書皆無之則知散軼也多矣岐謂秦焚書得不泯絶亦非也或曰豈見扵外書邪若爾則岐又不當謂其不能宏深也四註孟子中興藝文志題揚雄韓愈李翺熈時子四家註㫖意淺近葢依託者陸善經註孟子七卷崇文總目善經唐人以軻書初為七篇因刪去趙岐章指與其註之繁重者復為七篇云孟子音義正義共十六卷鼂氏曰皇朝孫奭等採唐張鎰丁公著所撰参附益其闕古今註孟子者趙氏之外有陸善經奭撰正義以趙註為夲其不同者時時兼取善經如謂子莫執中為子等無執中之類大中祥符中書成上扵朝陳氏曰舊有張鎰丁公著為之音俱未精當奭方奉詔校定撰集正義遂討論音釋疏其疑滯備其闕遺石經孟子十四卷鼂氏曰皇朝席旦宣和中知成都刋石寘扵成都學宫云偽蜀時刻六經扵石而獨無孟子經為未備夫經大成扵孔氏豈有闕邪其論既繆又多誤字如以頻顣為類不可勝紀五臣觧孟子十四卷鼂氏曰皇朝范祖禹孔武仲吳安詩豐稷吕希哲元祐中同在經筵所進講義貫穿史籍雖文辭㣲渉豐縟然觀者誠知勸講自有體也伊川孟子觧十四卷鼂氏曰程正叔撰横渠孟子觧二十四卷鼂氏曰張子載撰幷孟子統說附扵后百家孟子觧十二卷鼂氏曰集古今諸儒自皮日休至强至賈同百餘家觧孟子成一編王安石王雱許允成孟子觧共四十二卷鼂氏曰介甫素喜孟子自為之觧其子雱與其門人許允成皆有註釋崇觀間塲屋舉子宗之潁濵孟子觧一卷陳氏曰其少年時所作凡二十四章王逢原孟子觧五卷陳氏曰所講纔盡二篇其第三篇盡二章而止尹氏孟子觧十四卷陳氏曰尹彦眀所著十四卷未成不及上而卒張無垢孟子觧十四卷張南軒孟子說十七卷晦庵孟子集註或問各十四卷石鼓孟子答問三卷陳夀老孟子紀䝉十四卷說並見論語條下續孟子二卷崇文總目林慎思撰慎思以為孟子七篇非軻著書而弟子共記其言不能盡軻意因傳其說演而續之刪孟二篇鼂氏曰皇朝馮休撰休觀孟軻書時有叛違經者疑軻沒後門人妄有附益刪去之著書十七篇以眀其意前乎休而非軻者荀卿刺軻者王充後乎休而疑軻者温公與軻辯者蘇東坡然不若休之詳也疑孟一卷鼂氏曰皇朝司馬光君實撰光疑孟子書有非軻之言者著論是正之凡十一篇光論性不以軻道性善為然翼孟朝奉大夫臨川陸筠嘉材撰周平園序曰嘉材平生篤志孟子著翼孟音解九十一條擇春秋左氏傳荘列楚辭西漢書說文之存古文者深思互考遂成此書如以折枝為磬折腰肢讀樂酒若樂山樂水角招為韶眸子為牟殺三苖夲作二女果作婐之類皆粲若白黒至論舜生扵諸馮遷扵負夏卒扵鳴條視漢儒所記檀弓蒼梧之語孰近孰逺孰信孰疑此古今學議論所未及也且舜居河東歴山雷澤各有其地而越人別指歴山舜井象田仍以餘姚上虞名縣風土記曲為之辭人不謂然葢異端之作其来也久扵舜平居附會已類此况身後乎所謂九疑之葬二妃之溺宜退之黄陵碑云皆不可信彼孔安國觧書以陟方訓升遐其說尤拘書固曰升髙必自下陟遐必自邇陟豈專訓升乎然退之近捨孟子而逺引竹書紀年何也余每嘆恨不得質疑扵韓門而喜嘉材嗜古著書有益後覺藏其夲迨三十年今嗣子新融水尉孝溥追叙先志請題卷首始為推而廣之昔唐彭城劉軻慕孟子而命名著翼孟三卷白樂天記其事頼以不朽嘉材視劉何愧特余非樂天比其能使嘉材不朽乎尊孟辯七篇陳氏曰建安虞允文隐之撰以司馬公有疑孟及李遘泰伯常語鄭厚叔折衷皆有非孟之言故辯之為五卷後二卷則王充論衡刺孟及東坡論語說中與孟子異者亦辨焉右孟子文獻通考卷一百八十四
