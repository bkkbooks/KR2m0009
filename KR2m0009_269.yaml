body:
  text: 文獻通考卷二百六十九鄱陽馬端臨貴與著封建考十東漢列侯漢舊制列侯奉朝請在長安者皆位次三公中興以來惟以功徳賜位特進者在三公下次車騎將軍賜位朝侯在九卿下次五校尉賜位侍祠侯其次下土小國侯以肺腑親公主子孫奉墳墓於京師亦隨時朝見是為猥諸侯也漢官儀曰皇后父兄率為特進侯朝㑹位次三公故章帝啓馬太后曰漢典舅氏之封侯猶皇子之為王其功臣四姓為諸侯侍祠侯皆在卿校之下明帝為四姓小侯開立學校置五經師外戚樊氏郭氏隂氏馬氏為四姓以非列侯故曰小侯列侯歸國者不受茅土不立宫室以户數租入為節諸紹封者皆食故國半租罪侯歸不得臣吏民初漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同蕃王諸王女皆封鄉亭翁主儀服同鄉亭侯漢書謂齊厲王姊為紀翁主以紀氏所生因以為號章帝惟特封東平憲王蒼瑯琊孝王京女為縣公主其後安帝桓帝妹亦封長公主同之皇女其皇女封公主者所生之子襲母封為列侯皆傳國於後鄉亭之封則不傳襲永初元年鄧太后詔封清河孝王慶女十一人皆為鄉公主分食邑俸列侯國置相其秩各如本縣主治民如令長不臣也但納租於侯以户數為限其官隨國大小為増減食邑千户以上置家丞庶子各一人此家臣也使理家事不滿千户則不置家丞舊置行人洗馬門大夫等官又悉省諸公主各置家令一人東觀書曰其主薨無子置傅一人守其家功臣侯太傅高宻侯鄧禹南陽新野人以杖䇿從帝渡河運籌將兵入闗拜大司徒建武元年封酇侯食邑萬户二年更封梁侯食四縣十三年以功高定封為高密侯永平元年薨謚元侯帝分禹封為三國長子震為高密侯襲為昌安侯珍為夷安侯少子鴻永平中為小侯高密侯震子乾成褒子某嗣爵昌某弟襲母爵為舞隂侯昌安侯襲子藩夷安侯珍子良無後康珍子紹封中山太守全椒侯馬成南陽棘陽人世祖討河北從征伐以擊斬李憲功建武七年封平舒侯二十七年定封全椒侯三十二年卒子衞香徙封棘陵侯豐元邑醜桓帝時以罪失國昌延熹二年以成元孫復封為益陽亭侯大司馬廣平侯吳漢南陽宛人世祖討王郎漢説漁陽太守彭寵以郡歸帝賜號建䇿侯擊羣賊先登陷陣帝即位拜大司馬更封舞陽侯建武二年封廣平侯食四縣十一年討公孫述滅之二十年薨諡忠侯子哀侯成嗣為奴所殺二十八年分漢封為三國成子旦為灈陽侯奉漢嗣旦弟盱為筑陽侯成弟國為新蔡侯漢兄尉為將軍從征戰死封尉子彤為安陽侯帝以漢功大復封弟翕為褒親侯吳氏侯者凡五國旦無子國除盱子勝河南尹阜成侯王梁漁陽安陽人為郡吏與太守彭寵以漁陽歸光武從平河北與㓂恂南拒洛陽北守天井闗帝即位拜大司空封武强侯十三年増邑定封封阜成侯十四年卒官子禹嗣堅石坐父弟與楚王英謀反誅左將軍膠東侯賈復南陽冠軍人為縣掾下江兵起復亦聚衆數百人歸漢後北渡河從光武擊青犢五校羣盜破之帝即位為執金吾封冠軍侯渡河攻朱鮪降之建武二年益封穰朝陽二縣十三年定封膠東侯食郁秩壯武下密即墨挺胡觀陽凡六縣三十一年卒諡剛侯子忠嗣敏坐誣告母殺人國除肅宗更立復小子邯為膠東侯邯弟宗為即墨侯各一縣育邯子長參宗子建瑯琊太守祝阿侯陳俊南陽西鄂人少為郡吏光武徇河北為安集掾從擊銅馬五校破之建武二年封新處侯破張步董憲十三年増邑定封祝阿侯二十三年卒子浮嗣專諸篤建威大將軍好畤侯耿弇扶風茂陵人父況王莽時為朔調連率莽改上谷郡曰朔調太守曰連率莽敗更始立弇奉奏詣長安至宋子㑹王郎起兵乃馳謁光武説帝𤼵漁陽上谷兵攻㧞邯鄲誅王郎為大將軍從擊銅馬赤眉青犢尢來大槍諸盜破之光武即位拜建威大將軍封好畤侯食好畤美陽二縣定彭寵取張豐張步十三年増户邑永平元年卒諡愍侯子忠嗣馮良協隃麋侯霸弇弟況少子況以上谷郡歸光武後封隃麋侯卒子霸嗣文金喜顯援牟平侯舒弇弟亦況子況初封牟平舒襲封襲寶坐罪自殺國除箕復封牟平侯恒别封陽亭侯驃騎大將軍參蘧侯杜茂南陽冠軍人歸光武於河北為中堅將軍常從征伐帝即位拜大將軍封樂鄉侯建武二年封苦陘侯擊五校平之拜驃騎大將軍十三年増邑封脩侯十五年坐罪免官削户邑定封參蘧鄉侯十九年卒子元嗣坐罪國除奉茂孫復封安樂亭侯執金吾雍奴侯㓂恂上谷昌平人王郎起恂說上谷太守耿況以郡歸光武拜偏將軍號承義侯從破羣賊拜河内太守轉輸軍糧建武二年拜潁川太守封雍奴侯邑萬户從討隗囂拜執金吾十二年卒諡威侯子損嗣釐襲恂同産弟及兄子妹以軍功封列侯者八人終其身不傳於後積弩將軍昆陽侯傅俊潁川襄城人世祖徇襄城以縣亭長迎軍從破王㝷等世祖討河北從軍建武二年封昆陽侯三年破秦豐七年卒諡威侯子昌嗣坐罪貶闗内侯鐵昌子復封高置亭侯征南大將軍舞陽侯岑彭南陽棘陽人王莽時守本縣長漢兵起彭守宛攻之數月食盡乃降大司徒伯升義之封為歸徳侯光武徇河内彭與太守韓歆迎降拜刺姦大將軍從平河北帝即位圍洛陽令彭說降朱鮪建武二年遷征南大將軍討鄧奉擊秦豐破之封舞陰侯九年討公孫述大破之為述遣刺客所殺諡壯侯子遵嗣伉把熙福世祖思彭功復封遵弟淮為穀陽侯左曹合肥侯堅鐔潁川襄城人世祖討河北署主簿從平河北擊破大槍帝即位拜揚化將軍封㶏强侯與諸將攻洛陽降朱鮪六年定封合肥侯二十六年卒子鴻嗣浮雅征西大將軍夏陽侯馮異潁川父城人漢兵起異以郡掾監五縣城守拒漢間出行屬縣為漢兵所執光武署為主簿從渡河北從破王郎封應侯與㓂恂合勢拒朱鮪擊鮪破之建武二年封陽夏侯入闗代鄧禹討赤眉大破之定闗中擊隗囂拜征虜將軍十年薨諡節侯子彰嗣普有罪國除晨安帝時復封世祖思異功復封彰弟訢為祈鄉侯上谷太守淮陽侯王霸潁川潁陽人漢兵起霸率賓客從光武從擊破㝷邑從渡河北討王郎斬之得其璽綬封王鄉侯建武二年封富波侯討周建擊盧芳破之十三年増邑户更封向侯上谷太守三十年定封淮陵侯永平二年卒子符嗣度歆建義大將軍鬲侯朱祐南陽宛人漢兵起伯升拜大司徒以祐為䕶軍從世祖討河北常力戰陷陣為偏將軍封安陽侯世祖即位拜建義大將軍更封堵陽侯擊鄧奉秦豐降之十三年増邑封鬲侯食邑七千三百户二十四年卒子商嗣演沖信都太守阿陵侯任光南陽宛人漢兵起率衆從軍與世祖破㝷邑更始至洛陽以光為信都太守王郎起郡國皆降之光獨以郡迎世祖拜左大將軍封武成侯共擊郎滅之建武元年更封阿陵侯五年卒子隗嗣屯勝世征虜將軍潁陽侯祭遵潁川潁陽人光武破王㝷等署為門下史從征河北以為刺姦將軍建武二年拜征虜將軍封潁陽侯擊張滿鄧奉張豐等破之六年與諸將討隴蜀九年卒諡成侯無子國除豫章太守中水侯李忠東萊黄人王莽時為新博屬長莽改信都國曰新博都尉曰屬長更始立忠與任光同奉世祖以為右大將軍封武固侯建武二年更封中水侯食邑三千户從平龎萌董憲等十四年遷豫章太守十九年卒子威嗣純廣驃騎大將軍櫟陽侯景丹馮翊櫟陽人為上谷屬令更始立遣使者徇上谷世祖引見丹拜偏將軍號奉義侯從擊王郎破之從征河北帝即位拜驃騎大將軍封櫟陽侯二年薨子尚嗣苞臨無子國除遽苞弟封監亭侯右將軍槐里侯萬脩扶風茂陵人更始時為信都令與太守任光等迎世祖拜偏將軍封造義侯從平河北建武二年更封槐里侯病卒子普嗣徙封泫氏侯親徙封扶柳侯無子國除豐脩曽孫復封曲平亭侯熾恭虎牙大將軍安平侯蓋延漁陽要陽人為彭寵䕶軍王郎起與吳漢等同歸光武從平河北帝即位以延為虎牙將軍建武二年更封安平侯討劉永董憲龎萌等皆平之十三年増封定食萬户十五年薨子扶嗣側坐謀反國除恢延曽孫復封盧亭侯遂太常靈夀侯邳彤信都人初為王莽和成卒正莽分鉅鹿為和成郡世祖徇河北彤舉城降王郎起彤與信都獨不附郎以二郡迎世祖軍拜後大將軍㧞邯鄲封武義侯建武元年更封靈夀侯行大司空事帝入洛陽拜太常六年卒子湯嗣某無子國除音彤孫復封平臺侯柴衞尉安成侯銚期潁川陜人光武略地至潁川召署賊曹掾從徇薊拜偏將軍從擊王郎破之拜虎牙大將軍擊破銅馬赤眉青犢等帝即位封安成侯食邑五千户五年拜衞尉十年卒諡忠侯子丹嗣舒羽蔡帝復封丹弟統為建平侯驍騎將軍昌城侯劉植鉅鹿昌城人王郎起植與宗族聚兵數千人據昌城迎世祖以為驍騎將軍説降真定王劉揚從平河北建武二年更封植為昌城侯討密縣賊戰歿子向嗣述坐與楚王英反謀國除喜植弟與植同謀迎帝以功封觀津侯歆植兄亦同謀封浮陽侯二人皆傳國於後東郡太守東光侯耿純鉅鹿騎都尉世祖渡河純迎謁王郎反純自邯鄲率宗族從帝封耿鄉侯從平王郎破銅馬帝即位封高陽侯拜東郡太守六年定封東光侯十三年卒諡成侯子阜嗣坐罪國除盱復封高亭侯騰忠緒植純從弟為輔威將軍封武邑侯宿純從弟至代郡太守封遂鄉侯訢純弟為赤眉將軍封著武侯横野大將軍山桑侯王常事跡已見更始所立諸王下城門校尉朗陵侯臧宫潁川陜人少為亭長游徼率賔客入下江兵中為校尉從光武征戰至河北以為偏將軍從破羣賊數陷陣却敵建武二年封成安侯與岑彭吳漢共滅公孫述十三年増邑更封酇侯十五年定封朗陵侯永平元年卒諡愍侯子信嗣震松坐罪國除由松弟紹侯大司空固始侯李通事跡見更始所立諸王下捕虜將軍揚虚侯馬武南陽湖陽人王莽末入緑林中遂與漢兵合世祖破王尋拜振威將軍與謝躬等攻王郎從擊羣賊常為軍鋒帝即位以為侍中騎都尉封山都侯討劉永擊隗囂十三年定封揚虚侯永平四年卒子檀嗣坐兄與楚王英謀國除震武孫紹封漻亭侯側大司空安豐侯竇融扶風平陵人王莽末從王邑軍敗於昆陽莽亡以軍降更始大司馬趙萌萌薦融為鉅鹿太守融見更始新立東方尚擾不欲出闗以累世在河西乃辭鉅鹿萌為言得為張掖屬國都尉更始敗武威張掖酒泉金城燉煌共推融行河西五郡大將軍事建武五年遣使奉書獻馬於洛陽與五郡太守㑹兵討隗囂八年帝西征融朝見高平第一詔以安豐陽泉蓼安安風四縣封融為安豐侯隴蜀平與五郡太守奏事京師拜大司空永平二年卒諡戴侯穆坐罪死嘉萬全㑹宗武驃騎將軍愼侯劉隆南陽宗室更始拜為騎都尉從世祖於河内與諸將共拒朱鮪等建武二年封亢父侯四年討平李憲十三年増邑封竟陵侯坐罪免明年復封為扶樂鄉侯以擊交趾功更封長平侯三十年定封愼侯中元二年卒諡靖侯子安嗣太傅宣徳侯卓茂南陽宛人初辟為丞相孔光府史後遷密令王莽居攝以病免更始立以茂為侍中祭酒以年老乞骸骨世祖即位先訪求茂茂詣河陽謁拜為太傅封褒徳侯食邑二千户建武四年卒子崇嗣徙封汎鄉侯棽訢隆無子國除建武二年正月悉封諸功臣為列侯梁侯鄧禹廣平侯吳漢皆食四縣餘各有差下詔曰諸將業逺功大誠欲傳於無窮其顯效未酬名籍未立者大鴻臚趣上朕將差而録之博士丁恭議曰古帝王封諸侯不過百里强幹弱枝所以為治也今封四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者也乃遣謁者即授印綬䇿曰在上不驕高而不危制節謹度滿而不溢敬之戒之傳爾子孫長為漢藩陰鄉侯陰識貴人之兄也以軍功當増封識叩頭曰天下初定將帥有功者衆臣托屬掖庭仍加爵邑不可以示天下此為親戚受賞國人計功也帝從之帝令諸將各言所樂皆占美縣河南太守丁綝獨求封本鄉或問其故綝曰綝能薄功微得鄉亭厚矣帝從其志封新安鄉侯帝使郎中馮勤典諸侯封事勤差量功次輕重國土逺近地勢豐薄不相踰越莫不厭服焉致堂胡氏曰古之亡國皆以無道帝言是也未聞以地多而亡者則有中否焉先王分土三等自百里而殺柄制輕重足以有邦小則財賦甲兵亦能自守大則禮樂征伐不得僭行自唐虞迄三代襲為成法漢初既不能復光武再造宜稽古以有為因丁恭之言詳立善制而又率意所欲茍簡建置且是時以功勲錫茅土豈皆有道之人邪土宇既廣所入既厚滿而不溢誰克臻兹故聖王之法必闗盛衰焉十三年大饗將士頒爵冊勲功臣増邑更封凡三百六十五人范曄論曰中興二十八將前世以為上應二十八宿未之詳也然咸能感㑹風雲奮其智勇稱為佐命亦各志能之士也議者多非光武不以功臣任職至使英姿茂勲委而勿用然原夫深圖逺算固將有以焉爾若乃王道既衰降及霸徳猶能授受惟庸勲賢皆序如管隰之迭升桓世先趙之同列文朝可謂兼通矣降自秦漢世資戰力至於翼扶王運皆武人崛起亦有鬻繒屠狗輕􅠕之徒或崇以連城之賞或任以阿衡之地故勢疑則隙生力侔則亂起蕭樊且猶縲紲信越終見葅戮不其然乎自兹以降迄於孝武宰輔五世莫非公侯遂使縉紳道塞賢能蔽壅朝有世及之私下有抱闗之怨其懐道無聞委身草莽者亦何可勝言故光武鑒前事之違存矯枉之志雖㓂鄧之高勲耿賈之鴻烈分土不過大縣數四所加特進朝請而已觀其治平臨政課職責咎將所謂導之以政齊之以刑者乎若格之功臣其傷已甚何者直繩則虧䘮恩舊撓情則違廢禁典選徳則功不必厚舉勞則人或未賢參任則羣心難塞並列則其蔽未逺不得不校其勝否即以事相權故高秩厚禮允答元功峻文深憲責成吏職建武之世侯者百餘若夫數公者則與參國議分均休咎其餘並優以寛科全其封禄莫不終以功名延慶於後昔留侯以為高祖悉用蕭曹故人而郭伋亦譏南陽多顯鄭興又戒功臣專任夫崇恩偏授易啓私溺之失至公鈞被必廣招賢之路意者不其然乎永平中顯宗追感前世功臣乃圖畵二十八將於南宮雲臺其外又有王常李通竇融卓茂合三十二人故依其本第係之篇末以志功臣之次云爾廷尉西華侯鄧晨南陽新野人娶光武姊元漢兵起晨將賔客從更始立以為偏將軍從擊破尋邑王郎反與光武㑹鉅鹿下從擊邯鄲帝即位封房子侯拜中山汝南太守徵為廷尉封西華侯二十五年卒諡恵侯子棠嗣固國福無子國除光武復封晨長子汎為吳房侯奉公主之祀中郎將征羌侯來歙南陽新野人光武祖姑之子更始即位以歙為吏以病去更始敗東詣洛陽拜大中大夫奉詔説隗囂遣子入質囂叛與祭遵等征之十一年攻公孫述破其兵述遣刺客害之贈中郎將征羌侯帝以歙有平羌隴之功故改汝南之當鄉縣為征羌國諡節侯子裒嗣歴定虎帝嘉歙忠節復封歙弟由為宜西侯伏波將軍新息侯馬援扶風茂陵人王莽時為新成大尹莽末避地涼州依隗囂説囂歸光武囂使援奉書洛陽遣子入質後囂𤼵兵拒漢援諫不從從帝西征囂平之拜隴西太守擊羌破之交趾反討平之拜伏波將軍封新息侯後征武溪蠻病卒為梁松所譖收侯印綬肅宗時諡忠成侯子廖等見外戚侯門按史言伏波輔佐中興之功不減雲臺諸將獨以椒房之戚不得預焉然鄧晨光武姊壻也來歙光武祖姑之子也晨之捨宗從義歙之捐軀徇國其功烈雖劣於㓂鄧馮耿而賢於臧宮馬武邳彤銚期之流逺矣盖三公者俱非泛泛之外戚而徒以依乘取恩澤侯之比也故叙其事於雲臺功臣侯者之次慶吾劉永將建武三年以斬永首來降封列侯韓湛為吳漢校尉以擊斬董憲封列侯安邱侯張步王莽末起兵據瑯琊既而受劉永命後斬永將蘇茂來降封安邱侯八年坐謀反誅漁浦侯意帛李憲軍士憲敗走帛斬其首來降封建忠侯彭寵為漁陽太守王郎之起獨以郡歸光武封建忠侯後反誅不義侯子密彭寵蒼頭寵反子密斬其首來降封鐫羌侯隗恂隗囂長子囂遣入侍拜胡騎校尉甘侯後囂叛帝數遣書諭之不從乃誅恂而討之向義侯王遵隗囂將數勸囂歸漢囂叛諫辭甚切不從乃與家屬東詣京師拜大中大夫封上洛侯陽都侯伏湛瑯琊東武人建武三年拜大司徒封後徙封不其侯邑三千六百户十三年卒子歙嗣光晨無忌質完為曹操所殺國除則鄉哀侯侯霸河南密人建武四年拜大司徒十三年薨追封則鄉侯食二千六百户子昱嗣建昌袁氏曰漢初丞相選用列侯至武帝用公孫宏起自疏逺未有爵邑於是封平津侯丞相封侯自此始光武中興尚仍前制伏湛代鄧禹為大司徒封陽都侯湛免以侯霸代之止封闗内侯凡歴九年而薨帝始下詔曰漢家舊制丞相拜日封為列侯朕以軍師暴露功臣未封縁忠臣之義不欲相踰未及爵命奄然而終因追封霸為則鄉侯其比西京之制雖未鐫削亦淹緩矣自是之後位三公者皆不復有茅土之封惟靈帝初陳蕃為太傅録尚書事竇太后優詔封為高鄉侯蕃固辭不受自是宰相封侯之制遂廢扶陽侯韓歆南陽人以大司徒封坐直言免自殺栒邑侯宋宏京兆長安人建武二年為大司空封後徙封宣平侯卒無子國除節鄉正侯趙熹南陽宛人建武二十七年拜太尉帝崩受遺詔典喪禮封肅宗即位進為太傅録尚書事建初五年薨子代嗣直淑無子國除陽武侯朱浮沛國蕭人以從光武定北邊建武二年封舞陽侯食三縣後徙封父城侯二十年為大司徒徙封新息侯永平中坐單辭所告賜死成義侯梁統安定烏氏人以武威太守與河西大將軍竇融等同歸漢封後更封高山侯後定封陵鄉侯子松嗣坐誹謗下獄死國除富平侯張純京兆杜陵人高祖父安世為大司馬封富平侯純少襲爵土遭王莽簒封者多廢純以敦謹保全前封建武初先來詣闕得復國二十三年為大司空中元元年薨諡節侯子奮嗣甫吉無子國除陽平侯桓焉沛郡龍亢人榮之孫順帝為皇太子被廢焉力爭不能順帝既立拜太傅以前廷議守正封後為太尉順典賜爵闗内侯陵陽侯丁鴻潁川定陵人父綝王莽末世祖略地潁川綝説其宰降後征伐有功封定陵新安鄉侯後徙封陵陽食邑五千户建初四年徙封魯陽鄉侯和帝時為司徒六年薨子湛嗣浮夏平鄉侯謝安下邳人順帝末羣盜起安率衆斬盜首徐鳳封邑三千户右鄉侯度尚山陽湖陸人桓帝時為荆州刺史坐破平羣盜封烏程東鄉侯抗徐丹陽人為長沙太守與度尚俱坐平盜封鄳侯鄧邯南陽新野人中興初以功封仕至渤海太守子鳳嗣安鄉侯張禹趙國襄國人安帝即位以定䇿功封食邑千二百户後拜太尉子盛龍鄉侯徐防沛國銍人安帝即位以定䇿封千一百户拜太尉卒子衡嗣育陽安樂鄉侯胡廣南郡華容人以定策立桓帝封梁冀誅坐奪爵土安國亭侯袁湯汝南南陽人袁安子以豫定䇿立桓帝封後遷太尉逢基定潁侯郭鎭潁川陽翟人郭躬子為尚書坐與孫程等誅江京閻景立順帝功封食邑二千户拜廷尉卒子賀嗣福亭侯尹勤南陽人為司空以定䇿立安帝封無子國除定逺侯班超扶風平陵人坐使西域為都䕶安集諸國納質内屬功封邑千户卒子雄嗣始坐罪誅臨晉侯楊賜𢎞農華陰人楊震孫靈帝時為太傅司徒以師傅恩封千五百户薨子彪嗣建安十一年奪封蓩亭侯楊衆震曽孫獻帝時拜侍中以步從帝東還封宜陽鄉侯尹勲河南人為尚書令坐預誅梁冀功與僕射霍諝尚書張敬歐陽參李偉虞放周永並封亭侯高陽鄉侯蔡邕陳留圉人獻帝時以左中郎將從遷都長安封後董卓誅為王允所殺邟鄉侯黄瓊江夏安陸人桓帝時為太尉以師傅恩不阿梁氏封邑千户固辭許之後為司空孫琬獻帝初為司徒更封陽泉鄉侯夀成亭侯皇甫規安定朝那人為度遼將軍坐平賊討羌功封邑二百户新豐縣侯叚熲武威姑臧人為并州刺史坐討羌胡功封邑萬户後為太尉王甫誅熲下獄死逯鄉侯劉寬𢎞農華陰人代叚熲為太尉以先䇿黄巾逆謀封六百户子松高陽鄉侯陳蕃汝南平輿人靈帝即位以太傅輔政封與竇武謀誅宦官為曹節等所殺温侯王允太原祁人獻帝初遷都長安為司徒以從遷功封二千户後誅董卓為卓部曲李傕等所殺槐里侯皇甫嵩安定朝那人以左中郎將討平賊張角封食槐里美陽兩縣八千户後拜太尉薨西鄉侯朱雋㑹稽上虞人以右中郎將討平賊張角功封後更封錢塘侯斄鄉侯董卓隴西臨洮人靈帝中平元年為破虜將軍坐討𦍑功封邑千户靈帝崩大將軍何進召卓將兵脅太后誅宦官卓既入廢少主立獻帝遷太尉更封郿侯改拜太師封弟旻為鄠侯刼帝西遷王允與士孫端等討而誅之容邱侯劉虞東海郯人為幽州牧以討平反者張純等功封後拜大司馬進封襄賁侯公孫瓚襲而殺之薊侯公孫瓚遼西令支人為奮武将軍以討黄巾有功封後殺劉虞取幽州袁紹攻而殺之溧陽侯陶謙為徐州刺史以擊破黄巾功封遷徐州牧後為曹操所擊敗死邟鄉侯袁紹汝南汝陽人為司隸校尉與何進謀召董卓以兵誅宦官以事忤卓出奔卓拜紹渤海太守封侯紹以渤海起兵討卓領冀州牧獻帝都許以紹為太尉封鄴侯後拜大將軍兼督冀青幽并四州引兵攻許為曹操所敗死武成侯劉表山陽高平人為荆州刺史討平宗賊李傕入長安表遣使入貢拜荆州牧封武成侯建安十三年卒曹操取其地温侯吕布五原九原人為董卓騎都尉封都亭侯司徒王允與布宻謀討卓卓既誅拜奮威將軍封温侯後據兗州曹操取其地而殺之被陽侯歐陽歙樂安千乘人王莽時為長社宰世祖即位為河南尹封被陽侯九年更封夜侯徴為大司徒後坐贓下獄死子復嗣無子國除褒成侯孔志魯人父均平帝時以孔子後封王莽敗失國建武十三年以志襲封卒子損嗣曜完外戚侯夀張恭侯樊宏南陽湖陽人世祖舅帝即位拜光禄大夫封長羅侯十五年更封夀張二十七年卒子儵嗣徙封燕侯汜時建盼尚射陽侯丹宏弟建武十三年封元鄉侯尋宏兄子建武十三年封更父侯忠宏族兄建武十三年封平望侯茂宏少子建武二十七年封陽安節侯郭况眞定人郭后弟建武十七年封永平二年卒子璜嗣竇憲誅坐死新郪侯竟后從兄以從征伐功封永平中卒子嵩嗣勤無子國除發干侯匡竟弟建武末卒子勲嗣駿無子國除南䜌侯陳茂郭后叔父梁之壻以恩澤封原鹿貞侯隂識南陽新野人光烈皇后之前母兄更始時封陰徳侯建武元年封陰鄉侯十五年封原鹿侯永平二年卒子躬嗣璜淑璜弟鮪吳房侯綱識姪孫和帝陰后之父後坐事綱自殺鮦陽侯慶識弟興之子永平元年封卒子琴嗣萬全桂㶏强侯博慶弟永平元年封順陽安侯馬廖明徳皇后之兄建初四年封永平四年卒子遵嗣徙封程鄉侯卒無子國除鄧太后詔封廖孫度為潁陽侯潁陽侯防廖弟建初四年封六千户後坐罪徙封翟鄉侯卒子鉅嗣許陽侯光防弟建初四年封六千户竇憲誅憲奴誣告光罪自殺朗光子鄧太后詔紹封合鄉侯章帝建初元年欲封爵諸舅太后不聼明年夏旱言事者以為不封外戚之故有司因此上奏宜依舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黄霧四塞不聞霔雨之應又田蚡竇嬰寵貴横恣傾覆之禍為世所傳故先帝防謹舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國常謂我子不當與先帝子等今有司奈何欲以馬氏比陰氏乎吾為天下母而身服大練食不求甘左右皆著帛布無香薫之飾者欲身率下以為外親見之當傷心自勑但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍蒼頭衣綠褠領袖正白顧視御者不及逺矣故不加譴怒但絶歲用而已兾以黙愧其心而猶懈怠無憂國忘家之慮知臣莫若君况親屬乎吾豈可上負先帝之㫖下虧先人之徳重襲西京敗亡之禍哉固不許帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虚奈何令臣獨不加恩三舅乎且衞尉年尊兩校尉有大病如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙謙之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言受髙祖約無軍功非劉氏不侯今馬氏無功於國豈得與陰郭中興之后等邪常觀富貴之家禄位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求温飽耳今祭祀則受四方之珍衣食則䝉御府餘資斯豈不足而必當得一縣乎吾計之熟矣勿有疑也夫至孝之行安親為上今數遭變異穀價數倍憂惶晝夜不安坐卧而欲先營外封違慈母之拳拳乎吾素剛急有胷中氣不可不順也若陰陽調和邊境清淨然後行子之志吾但當含飴弄孫不能復闗政矣四年天下豐稔方陲無事帝遂封三舅廖防光皆為列侯廖等辭遜不得已受封爵而退武陽侯竇憲章徳皇后之兄和帝即位后臨朝拜大將軍封食邑二萬户後坐罪自殺郾侯篤汝陽侯景夏陽侯瓌皆憲弟同時封憲敗皆自殺樂平侯梁棠和帝母梁貴人父竦之子和帝親政後封卒子安國嗣乗氏侯雍單父侯翟皆棠弟與棠同時封上蔡侯鄧隲南陽人和熹皇后兄永初元年封食邑萬户后崩中黄門等誣告隲弟悝罪坐徙羅侯死葉侯悝隲弟同時封元初五年卒子廣宗嗣封葉侯后崩中黄門譖而殺之西平侯宏隲弟同時封元初二年卒子廣德嗣甫德廣德弟封都鄉侯西華侯閶隲弟同時封卒子忠嗣廣德甫德忠並為中黄門譖死北宜春侯閻暢安思皇后父元初三年封邑五千户四年卒子顯嗣更封長社縣侯食邑萬三千五百户後坐罪誅乗氏侯梁商順烈皇后之父襲父雍封子冀嗣拜大將軍建和元年益封萬三千户永興二年坐罪誅桓帝元嘉元年以梁冀有援立之功欲褒崇殊典乃大㑹公卿議其禮特進胡廣太常羊溥司隸校尉祝恬大中大夫邊韶等咸稱冀之勲德其制度賚賞宜比周公賜之山川土田附庸司空黄瓊獨建議曰冀前以親迎之勞増邑三千又其子亦加封賞昔周公輔相成王制禮作樂化致太平是以大啟土宇開地七百今諸侯以户邑為制不以里數為限蕭何識高祖於泗水霍光定傾危以興國皆益户増封以顯其功冀可比鄧禹合食四縣賞賜之差同於霍光朝廷從之潁陽侯不疑冀弟潁陰侯馬不疑子襄邑侯允冀子城父侯桃允子西平侯蒙冀弟冀敗並坐誅南頓侯鄧演桓帝鄧后之兄后立封子康嗣沘陽侯康昆陽侯統淯陽侯秉皆演兄弟同時封槐里侯竇武桓思皇后之父后立封五千户桓帝崩靈帝立輔政拜大將軍更封聞喜侯與陳蕃等謀誅宦官為所害脩侯董重河間人靈帝母孝仁董后兄子帝即位封帝崩何進奏其罪自殺不其鄉侯宋鄷扶風平陵人靈帝宋皇后之父后立封后廢坐死愼侯何進南陽宛人靈思皇后兄后立以功封帝崩為大將軍輔政謀誅宦官不克為張譲等所殺濟陽侯苖進弟進敗俱死宦者侯鄛鄉侯鄭衆南陽犫人和帝十四年以誅竇憲功封食邑千五百户永初元年和熹皇后益封三百户元初元年卒養子閎嗣安石讎衆曽孫封闗内侯龍亭侯蔡倫桂陽人元初元年鄧太后以倫久宿衞封邑三百户安帝時坐罪死國除雍鄉侯李閏安帝時為小黄門譖鄧悝等廢平原王坐是封三百户都鄉侯江京安帝時與李閏同封帝崩孫程等誅之而立順帝浮陽侯孫程涿郡新城人安帝時江京等譖廢太子帝崩程等誅京迎太子立之為順帝封萬户陽嘉元年卒養子夀嗣華容侯王康與孫程同立順帝功封九千户酈侯王國與孫程同功封九千户湘南侯黄龍與孫程同功封五千户西平昌侯彭愷與孫程同功封四千二百户中廬侯孟淑與孫程同功封四千二百户復陽侯李建與孫程同功封四千二百户廣宗侯王成祝阿侯張賢臨沮侯史汎廣平侯馬國范縣侯王道褒信侯李元山都侯楊佗下雋侯陳予析縣侯趙封枝江侯李剛俱與孫程同功各封四千户夷陵侯魏猛與孫程同功封二千户東阿侯苖光與孫程同功封千户是為十九侯孫程卒賜諡剛侯王康王國彭愷王成趙封魏猛六人皆早卒黄龍楊佗孟淑李建張賢史汎王道李元李剛九人坐罪減租四分之一惟馬國陳予苖光保全封邑東鄉侯籍建都鄉侯良賀二人俱順帝為太子時小黄門帝立以勞封費亭侯曹騰沛國譙人以預定䇿立桓帝功與長樂太僕州輔等七人皆封亭侯卒養子嵩嗣新豐侯單超河南人以預誅梁冀功封二萬户原武侯徐璜下邳良城人以預誅梁冀功封萬五千户東武陽侯具瑗魏郡元城人以預誅梁冀功封萬五千户上蔡侯左悺河南平隂人以預誅梁冀功封萬三千户後坐罪自殺汝陽侯唐衡潁川郾人以預誅梁冀功封萬三千户誅梁冀時又封小黄門劉普趙忠等八人為鄉侯高鄉侯侯覽山陽防東人以預誅梁冀功封後坐罪自殺育陽侯曹節南陽新野人以預定䇿立靈帝功封長安鄉侯後以誣奏陳蕃竇武等罪將兵殺之封育陽侯邑三千户又誣奏渤海王悝反殺之増封七千六百户冠軍侯王甫與曹節同惡誣殺陳蕃竇武渤海王悝等封七千六百户光和二年司隸校尉陽球奏其罪誅之朱瑀共普張亮王尊騰是皆以誣殺陳蕃竇武功封瑀華容侯千五百户普亮等五人各三百户都鄉侯吕强河南成臯人靈帝時例封宦者以强為鄉侯强辭讓懇惻固不敢當帝聽之後為趙忠等誣譖自殺都鄉侯趙忠安平人以預誅梁冀功封後與張讓等殺何進作亂袁紹勒兵誅之張讓潁川人靈帝時與趙忠同封列侯後與趙忠作亂殺何進刼質天子為追兵所急投河死右東漢列侯姓名之見於史傳可考者按范史世祖本紀所載建武十三年功臣増邑更封者已該三百六十五人外戚恩澤封者已該四十五人今考之自世祖至獻帝十三傳凡二百年間以功勲位望封侯者纔一百二十九人外戚四十一人宦者六十五人然則姓名之湮没無傳者多矣王侯號靈夀王彭城靖王未封賜號靈夀王未有國邑取其美名重熹王樂成靖王未封賜號重熹王承義侯寇恂成義侯梁統興義侯景貺奉義侯景丹輔義侯厙鈞扶義侯辛彤助義侯竺曽褒義侯史苞褒親侯吳翕褒德侯卓茂歸德侯劉諷褒成侯孔志孔僖顯親侯竇友建䇿侯吳漢建功侯蓋延宣恩侯陰陸討姦侯杜習折姦侯燕廣征羌侯來歙破虜侯須沈不義侯蒼頭子宻破羌侯榆鬼率衆王烏倫率衆侯其至鞬徐氏曰按漢世封侯皆以縣邑其後或以鄉亭皆視其所食之邑而名之至於功名顯著則有特加美名者西都信武冠軍富民博陸之類是也東漢因之時有美號至於彭寵蒼頭以奴弑主而封之不義侯夫果不義則不應封爵使其功可封則非可言不義矣光武於是失之按秦漢以來所謂列侯者非但食其邑入而已可以臣吏民可以布政令若闗内侯則惟以虚名受廪禄而已然西都景武而後始令諸侯王不得治民漢置内史治之自是以後雖諸侯王亦無君國子民之實不過食其所封之邑入况列侯乎然所謂侯者尚裂土以封之也至東都始有未與國邑先賜美名之例如靈夀王征羌侯之類是也至明帝時有四姓小侯乃樊氏郭氏陰氏馬氏諸外戚子弟以小年獲封者又肅宗賜東平王蒼列侯印十九枚令王子年五嵗以上能趨拜者皆令帶之此二者往往皆是未有土地先佩侯印受俸廪盖至此則列侯有同於闗内侯者矣文獻通考卷二百六十九
