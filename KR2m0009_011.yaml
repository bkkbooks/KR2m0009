body:
  text: 文獻通考卷十一鄱陽馬端臨貴與著戶口考二歷代戶口丁中賦役宋太祖皇帝建隆元年戶九十六萬七千三百五十三乾德元年平荆南得戶十四萬二千三百湖南平得戶九萬七千三百八十八三年蜀平得戶五十三萬四千二十九開寶四年廣南平得戶十七萬二百六十三八年江南平得戶六十五萬五千六十五九年天下主客戶三百九萬五百四此係會要所載本年主客戶數如前行所載開寶八年平江南以前戶數出通鑑長編通算只計二百五十六萬六千三百九十八與會要不合當考詔更定縣望以戶四千以上為望次為緊為上為中為中下凡五等乾德元年令諸州嵗奏男夫二十為丁六十為老女口不預開寶四年詔曰朕臨御以來憂恤百姓所通抄人數目尋常别無差徭只以春初修河蓋是與民防患而聞豪要之家多有欺罔併差貧闕豈得均平特開首舉之門明示賞罰之典應河南大名府宋亳宿潁青徐兖鄆曹濮單蔡陳許汝鄧濟衛淄濰濵棣滄德貝冀澶滑懷孟磁相邢洺鎮博瀛莫深揚泰楚泗州髙郵軍所抄丁口宜令逐州判官縣令佐子細通檢不計主戶牛客小客盡底通抄差遣之時所冀共分力役敢有隱漏令佐除名典吏決配募告者以犯人家財賞仍免三年差役太宗雍熙元年令江浙荆湖廣南民輸丁錢以二十成丁六十入老并身有疾廢者免之至道元年詔復造天下郡國戶口版籍自唐末四方兵起版籍亡失故戶稅賦莫得周知至是始命復造焉至道三年天下主客戶四百一十三萬二千五百七十六真宗大中祥符四年詔除兩浙福建荆南廣南舊輸身丁錢凡四十五萬四百貫三司使丁謂言東封及汾隂賞賜億萬加以蠲復諸路租賦除免口算聖澤寬大恐有司經費不給上曰國家所務正為澤及下民但敦本抑末節用謹度自然富足初湖廣閩浙因偽國舊制嵗斂丁身錢米所謂丁口之賦大中祥符間詔除丁錢而米輸如故至天聖中婺秀二州猶輸丁錢轉運司以為言乃除之其後龎籍請罷漳泉州興化軍丁米有司持不可皇祐三年帝命三司首減潭永桂陽監丁米以最下數為凖嵗減十餘萬石既而漳泉興化軍亦第損之嘉祐四年復命轉運司裁定郴永桂陽與道衡二州所輸丁米及錢絹雜物無業者弛之存業者減半後雖進丁而復增取時廣南猶或輸丁錢亦命轉運司條上自是所輸無幾矣天禧五年天下主客八百六十七萬七千六百七十七口一千九百九十三萬三百二十詔諸州縣自今招來戶口及創居入中開墾荒田者許依格式申入戶口籍無得以客戶增數舊制縣吏能招增戶口縣即申等仍加其俸緡至有析客戶者雖登於籍而賦稅無所增入故條約之仁宗天聖七年天下主客戶一千一十六萬二千六百八十九口二千六百五萬四千二百三十八慶厯八年天下主客戶一千七十二萬三千六百九十五口二千一百八十三萬六十四嘉祐八年天下主客戶一千二百四十六萬二千三百一十七口二千六百四十二萬一千六百五十一英宗治平三年天下主客戶一千二百九十一萬七千二百二十一口二千九百九萬二千一百八十五神宗熙寧八年天下主客戶一千五百六十八萬四千五百二十九口二千三百八十萬七千一百六十五湖廣承偽政舊輸丁米大中祥符以後屢裁損猶不均四年詔屯田貟外郎周之純往廣東相度均之元豐二年七月提舉廣西常平劉誼言廣西一路戶口二十萬而民出役錢至十九萬緡先用稅錢敷出稅數不足又敷之田米田米不足復算於身丁夫廣西之民身之有丁也既稅以錢又算以米是一身而輸二稅殆前世弊法今既未能蠲除而又益以役錢甚可憫也至於廣東西監司提舉司吏一月之給上同令録下倍攝官乞裁損其數則兩路身丁田米亦可少寬遂詔月給錢遞減二千嵗遂減一千二百餘緡按廣南丁錢史所載大中祥符間盡蠲之獨丁米未除今觀誼之言則尚有丁錢也作法於貪難革而易復可畏哉元豐六年天下主客戶一千七百二十一萬一千七百一十三口二千四百九十六萬九千三百右以上係國朝會要所載戶口數目今考元豐三年檢正中書戶房公事畢仲衍經進中書備對內載天下四亰一十八路戶口主客數目微為不同又有各路細數今具録於后天下總四京一十八路戶主客一千四百八十五萬二千六百八十四主一千一十萬九千五百四十二內四十一萬九千五百二十二戶元供弓箭手僧院道觀山涇山團徭典佃喬佃船居黎戶不分主客女戶今並附入主戶數客四百七十四萬三千一百四十四內一萬五百二十二戶元供交界浮居散戶蕃部無名目戶今並附入客戶數口主客三千三百三十萬三千八百八十九主二千三百四十二萬六千九百九十四內六十八萬三千八百八十三口元供弓箭手山徭童行僧道蜒船居黎戶今入主口數客九百八十七萬六千八百九十五內一萬一百二十八口元供浮居散戶今入客戶數丁主客一千七百八十四萬六千八百七十三主一千二百二十八萬四千六百八十五內二十九萬八千二百七十五口不分主客客五百五十六萬二千一百八十八東亰開封府縣二十二開封祥符陳留雍邱襄邑咸平太康扶溝尉氏鄢陵中牟管城新鄭陽武酸棗長垣封邱白馬韋城胙城東明考城戶主一十七萬一千三百二十四口主二十九萬五千九百一十二客八萬五千一百八十丁主二十一萬二千四百九十三亰東路州一十五兖徐曹青鄆密齊濟沂登萊單濮濰淄縣七十八戶主八十一萬七千九百八十三客五十五萬二千八百一十七口主一百六十六萬九百三客八十八萬五千七百七十四丁主九十五萬七千五百五十四客五十六萬五千六百九十三亰西路州一十四許孟陳襄鄧隨金房汝蔡郢均唐潁府一河南軍一信陽縣七十九戶主三十八萬三千二百二十六客二十六萬八千五百一十六口主六十四萬四千七百五十七客四十五萬八千一百三十丁主四十萬七百四十客二十六萬九千六百二十三河北路州二十三定澶相恩邢滄懷衛博磁洺棣深瀛雄霸祁冀趙德濵莫保府二大名真定軍十一永靜乾寧信安廣信安肅保定順安保順德清永寧北平縣一百四戶主七十六萬五千一百三十客二十一萬九千六十五口主一百四十七萬三千六百八十三客四十萬七千五百一丁主七十七萬三千八百九十一客二十萬五千四百六十七陜府西路州二十六陕同華耀邠涇秦鄜延解隴成鳳虢坊丹階商寧原慶渭環熙岷河府三亰兆鳳翔河中軍六慶成鎮戎保安康定通逺德順縣一百一十八戶主六十九萬七千九百六十七客二十六萬四千三百五十一口主二百一萬五千四百三十六客七十四萬六千三百六十八丁主一百六萬七千九百三十六客四十二萬五千六百五十一河東路州十四潞晉麟府代絳隰欣汾澤憲嵐石豐府一太原軍七威勝寧化平定岢嵐火山保德吉鄉監一大通縣七十三戶主三十八萬三千一百四十八客六萬七千七百二十一口主七十五萬二千三百一客一十三萬八千三百五十八丁主三十七萬二千三百九十客七萬七千四百六十二淮南路州一十八揚壽廬宿濠和蘄海楚舒泰泗亳光滁黃真通軍一無為縣六十九戶主七十二萬三千七百八十四客三十五萬五千二百七十口主一百三十九萬三千五百五十五客六十三萬七千三百二十六丁主闕客闕兩浙路州一十四杭越蘇潤湖婺明常衢溫台秀睦處縣七十九户主一百四十四萬六千四百六客三十八萬三千六百九十口主二百六十萬五千四百八十四客六十一萬八千二百一十五丁主一百六十二萬九千五百三十二客二十九萬八千二十七江南東路州七宣歙江池饒信太平府一江寧軍二廣德南康縣四十八戶主九十萬二千二百六十一客一十七萬一千四百九十九口主一百六十萬九千六百一十二客二十八萬九千八百四十三丁主一百一萬九千一百三十四客一十八萬六千二十七江南西路州六洪虔吉袁撫筠軍四興國建昌臨江南安縣四十七戶主八十七萬一千七百二十客四十九萬三千八百一十三口主二百一萬六百四十六客一百六萬五千二百一丁主八十八萬四千三百二十九客三十八萬七百九十八荆湖南路州七潭衡永郴邵全道監一桂陽縣三十三戶主四十五萬六千四百三十一客三十五萬四千六百二十六口主一百一十五萬三千八百七十二客六十七萬四千二百五十八丁主六十二萬二千九百三十三客三十二萬二千五百四十六荆湖北路州九鄂安嶽鼎澧峽歸辰沅府一荆南縣四十五戶主三十五萬五百九十三客二十三萬八千七百九口主七十萬二千三百五十六客五十萬九千六百四十四丁主二十八萬五千五百二十六客二十萬七千六百二十四福建路州六福建泉南劒漳汀軍二邵武興化縣四十五戶主六十四萬五千二百六十七客三十四萬六千八百二十口主一百三十六萬八千五百九十四客六十七萬四千四百三十八丁主七十九萬七百一十九客五十六萬二百三十成都府路州一十二眉綿漢彭蜀嘉邛簡黎雅茂威府一成都軍一永康監一陵井縣五十八戶主五十七萬四千六百三十客一十九萬六千九百三口主二百七十八萬九千二百二十五客八十六萬四千五百二十三丁主六十八萬五千二十客二十七萬七百二十四梓州路州一十一梓遂果資普合榮渠昌戎瀘軍二懷安康安監一富順縣四十九戶主二十六萬一千五百八十五口主八十八萬五千五百一客五十二萬八千二百一十四丁主三十七萬四千六百六十九客三十萬五千五百二十九利州路州九利閬洋文劒興巴蓬龍府一興元縣三十九戶主一十七萬九千八百三十五客一十二萬二千一百五十六口主四十萬二千八百七十四客二十四萬五千九百九十二丁主一十九萬五千三百八十七客一十四萬四千五百九十一夔州路州九夔忠萬施開逹涪渝黔軍三雲安梁山南平監一大寧縣三十一戶主六萬八千三百七十五口主二十一萬五千五百九十五客二十五萬二千四百七十二丁主一十四萬九千七十客一十七萬一千一十七廣南東路州一十四廣韶循潮連南雄英賀封端新康惠南恩縣四十戶主三十四萬七千四百五十九客二十一萬八千七十五口主八十一萬二千一百四十七客三十二萬二千五百一十二丁主七十三萬五千七百四十七客二十六萬二千五十九廣南西路州二十四桂容雍象昭梧藤龔潯貴柳宜賔橫融化髙雷白欽鬱林廉瓊順軍三萬安昌化朱崖縣六十戶主一十六萬三千四百一十八客七萬八千六百九十一口主五十八萬四千六百四十一客四十七萬九百四十六丁主二十七萬三千六百七十四客四十一萬九千三百一十六哲宗元祐六年天下主客戶一千八百六十五萬五千九十三口四千一百四十九萬二千三百一十一元符二年天下主客戶一千九百七十一萬五千五百五十五口四千三百四十一萬一千六百六徽宗崇寧元年天下主客戶共升戶三十萬三千四百九十五口四十萬九千一百六十三增入元符元數計戶二千零一萬九千五十口四千三百八十二萬七百六十九政和三年詳定九域圗志蔡攸何志同言本所取會天下戶口數類多不實且以河北二州言之德州主客戶五萬二千五百九十九而口才六萬九千三百八十五霸州主客戶二萬二千四百七十七而口才三萬四千七百一十六通二州之數率三戶四口則戶版刻隱不待校而知之乞詔有司申嚴法令務在核實從之八月淮南轉運副使徐閎中言九域志在元豐間主客戶共一千六百餘萬大觀初巳二千九十一萬乞詔諸路應奏戶口嵗終再令提刑提舉司參考同保從之六年戶部言淮南轉運司申政和格知通令佐任內增收漏戶一千至二千戶常格一縣戶口多者止及三萬脫漏難及千戶少得應賞之人繇此不盡心推括看詳令佐任內增收漏戶八百戶升半年名次一千五百戶免試三千戶減磨勘一年七千戶減二年一萬二千戶減三年知通隨所管縣通理比令佐加倍從之按以史傳考之則古今戶口之盛無如崇寧大觀之間然觀當時諸人所言則版籍殊欠核實所紀似難憑覽者詳之髙宗紹興三十年天下主客戶一千一百三十七萬五千七百三十三口一千九百二十二萬九千八紹興五年詔諸路經殘破州縣親民官到任據見存戶口實數批上印歷滿任日亦如之以考殿最八年尚書劉大中奏自中原陷沒東南之民死於兵火疫癘水旱以至為兵為緇黃及去為盜賊餘民之存者十無二三姦臣虐用其民誅求過數丁鹽紬絹最為疾苦愚民寧殺子而不願輸生女者又多不舉民何以至是哉乞守令滿日以生齒增減為殿最又詔應州縣鄊村五等坊郭七等以下戶及無等第貧乏之家生男女不能養贍者於常平錢內人支四貫文省仍委守令勸諭父老曉譬禍福若奉行如法所活數多監司保明推賞孝宗乾道二年諸路主客戶一千二百三十三萬五千四百五十口二千五百三十七萬八千六百八十四淳熙八年臣僚言飢饉之時遺棄小兒為人收養者於法不在取認之限聽養子之家申官附籍依親子孫法昨葉夢得守潁昌嵗大飢仍為空名劵坐上件法印版付里胥凡有收養者給其劵所全活甚衆乞下州縣鏤版諭民通知又詔申嚴建劒汀邵四州不舉子之禁光宗紹熙四年諸路主客戶一千二百三十萬二千八百七十三口二千七百八十四萬五千八十五寧宗嘉定十六年諸路主客戶一千二百六十七萬八百一口二千八百三十二萬八十五兩浙路戶二百二十二萬三百二十一口四百二萬九千九百八十九江南東路戶一百四萬六千二百七十二口二百四十萬二千三十八江南西路戶二百二十六萬七千九百八十三口四百九十五萬八千二百九十一淮南東路戶一十二萬七千三百六十九口四十萬四千二百六十一淮南西路戶二十一萬八千二百五十口七十七萬九千六百一十二廣南東路戶四十四萬五千九百六口七十七萬五千六百二十八廣南西路戶五十二萬八千二百二十口一百三十二萬一千二百七荆湖南路戶一百二十五萬一千二百二口二百八十八萬一千五百六荆湖北路戶三十六萬九千八百二十口九十萬八千九百三十四福建路戶一百五十九萬九千二百一十四口三百二十三萬五百七十八亰西路戶六千二百五十二口一萬七千二百二十一成都府路戶一百一十三萬九千七百九十口三百一十七萬一千三利州路戶四十萬一千一百七十四口一百一萬六千一百一十一潼川府路戶八十四萬一千一百二十九口二百一十四萬三千七百二十八夔州路戶二十萬七千九百九十九口二十七萬九千九百八十九右國朝會要所載戶口南渡前無各路數目故以中書備對所書元豐各路數編入而南渡後莫盛於寧宗嘉定之時故備書之身丁錢者東南淮浙湖廣等路皆有之自馬氏據湖南始取永道郴州桂陽軍荼陵縣民丁錢絹米麥嘉祐四年詔無業者與除放有業者減半然道州丁米每嵗猶為二千石人甚苦之紹興五年守臣趙坦請以二分敷於田畝一分敷於民丁詔下其議漕司言如此則貧民每丁當輸二斗有竒乞盡敷於田畝言者以為太重請損其一分詔漕司相度四月甲辰六年樞密院檢詳王迪又請兩路丁錢隨田稅帶納八月己亥不果行十四年知永州羅長源言於朝遂盡放湖南諸郡丁錢十月庚子然上供樁數則如故後十餘年楊良佐邦弼為漕乃奏除之江東諸郡丁口鹽錢李氏有國日所制也蓋以泰州及靜海軍今通州鹽貨計口俵散收錢入官其後失淮南而鹽不可得既又令折綿絹輸之民益以為病明道二年范文正公為江淮安撫乞會一路主戶以見在鹽價於春時給鹽食用隨夏稅送納價錢奏可其後謂之蠶鹽者此也兩浙身丁錢者始未行鈔法以前嵗計丁口官散蠶鹽每丁給鹽一斗輸錢百六十有六謂之丁鹽錢皇祐中許民以紬絹依時直折納謂之丁絹自鈔法既行之後鹽盡通商而民無所給每丁仍增錢為三百六十謂之丁身錢大觀中始令三丁納絹一匹當時納錢未有陪費其後物價益貴乃令每丁輸絹一丈綿一兩皆取於五等下戶民甚病之建炎三年詔以一半折絹一半納見錢十一月丁未於是嵗為絹二十四萬匹綿百萬兩錢二十萬緡紹興初又用嚴守顔為言曾得解人免丁錢三年四月甲午二十五年上念浙民之困免丁絹錢綿一年以內府錢帛償戶部八月己丑乾道元年孝宗以兩浙嵗潦又免災傷郡邑身丁錢十三萬七千緡絹十六萬三千匹皆有竒二月癸卯唯臨安以駐蹕所在每三年一下詔除之嵗滿復然至開禧元年十二月御筆浙路身丁錢自今永與除免恩施浸博矣先是紹興末呂公雅廣問為浙漕以湖州丁絹多所隱漏乃給申帖付民戶俾自排丁名得四十萬丁每丁為錢千四百絹八尺有竒三十一年四月丁亥明年守臣陳之茂因請折絹以五千為匹仍止嵗額為定不以添丁而增賦詔皆可之正月丁巳自是湖州以五丁科一匹矣未幾又增以七千為一匹乾道八年余處恭為烏程令請於朝乞以七丁科一匹曾欽道秉政奏行之自是為例兩淮丁錢者不知所從始乾道末詔民戶一丁充民丁者本名丁錢勿輸七年八月丙辰二廣丁錢亦不知其所始廣西郡縣貧薄凡民間父祖年六十以上而身丁未成者亦行科納謂之挂丁錢紹熙初詔令本路監司約束二年郊赦申明大抵丁錢多偽國所創余嘗謂唐之庸錢楊炎已均入二稅而後世差役復不免焉是力役之征既取其二也本朝王安石令民輸錢以免役而紹興以後所謂耆戶長保正雇錢復不給焉是取其三也合丁錢而論之力役之征蓋取其四矣而一有邊事則免夫之令又不得免焉是取其五也孟子曰有布縷之征有穀粟之征有力役之征用其一緩其二用其二則民有殍用其三而父子離今布縷之征有所折稅有和預買川路有激賞而東南有丁絹是布縷之征三也穀粟之征有稅米有義倉有和糴川路謂之勸糴而斗面加耗之輸不與是穀粟之征亦三也通力役之征而論之蓋用其十矣民安得不困乎余惡夫世之俗吏不知財賦本末源流故以趣辦為能而撥其本也故詳録其事以待上問而出焉閩浙湖廣丁錢在國初嵗為四十五萬緡大中祥符四年七月嘗除之後又復西漢戶口至盛之時率以十戶為四十八口有竒東漢戶口率以十戶為五十二口可凖周之下農夫唐人戶口至盛之時率以十戶為五十八口有竒可凖周之中次自本朝元豐至紹興戶口率以十戶為二十一口以一家止於兩口則無是理蓋詭名子戶漏口者衆也然今浙中戶口率以十戶為十五口有竒蜀中戶口率以十戶為二十口弱蜀人生齒非盛於東南意者蜀中無丁賦於漏口少爾昔陸宣公稱租庸調之法曰不校閲而衆寡可知是故一丁授田決不可令輸二丁之賦非若兩稅鄉司能開闔走弄於其間也自井田什一之後其惟租庸調之法乎右二假係建炎以來朝野雜記所載宋朝丁錢本末及歷代戶口詳略之槩其考訂精核故書之水心葉氏曰為國之要在於得民民多則田墾而稅增役衆而兵強田墾稅增役衆兵強則所為而必從所欲而必遂是故昔者戰國相傾莫急於致民商鞅所以壞井田開阡陌者誘三晉願耕之民以實秦地也漢末天下殫殘而三國爭利孫權搜山越之衆以為民至於帆海絶徼俘執島居之夷而用之諸葛亮行師號為秉義不妄虜獲亦拔隴上家屬以還漢中蓋蜀之亡也為戶二十四萬吳之亡也為戶五十餘萬而魏不能百萬而已舉天下之大不當全漢數郡之衆然則因民之衆寡為國之強弱自古而然矣今天下州縣直以見入職貢者言之除已募而為兵者數十百萬人其去而為浮屠老子及為役而未受度者又數十萬人若此皆不論也而戶口昌熾生齒繁衍幾及全盛之世其衆強富大之形宜無敵於天下然而偏聚而不均勢屬而不親是故無墾田之利無增稅之入役不衆兵不強反有貧弱之實見於外民雖多而不知所以用之直聽其自生自死而已而州縣又有因其丁中而裁取其絹價者此其意豈以為民不當生於王之土地而征之者歟夫前世之致民甚難待其衆多而用之有終不得者今欲有內外之事因衆多已成之民率以北向夫孰敢爭者而論者曽莫以為意此不知其本之甚者也以臣計之有民必使之闢地闢地則增稅故其居則可以為役出則可以為兵而今也不然使之窮居憔悴無地以自業其駑鈍不才者且為浮客為傭力其懷利強力者則為商賈為竊盜茍得旦暮之食而不能為家豐年樂嵗市無貴糶而民常患夫斗升之求無所從給大抵得以稅與役自通於官者不能三之一有田者不自墾而能墾者非其田此其所以雖蕃熾昌衍而其上不得而用之也嗚呼亦其勢之有不得不然者矣夫吳越之地自錢氏時獨不被兵又以四十年都邑之盛四方流徙盡集於千里之內而衣冠貴人不知其幾族故以十五州之衆當今天下之半計其地不足以居其半而米粟穀帛之直三倍於舊雞豚菜茹樵薪之鬻五倍於舊田宅之價十倍於舊其便利上腴爭取而不置者數十百倍於舊蓋秦制萬戶為縣而宋齊之間山隂最大而難治然猶不過三萬而兩浙之縣以三萬戶率者不數也夫舉天下之民未得其所猶不足為意而此一路之生聚近在畿甸之間十年之後將以救之乎夫迹其民多而地不足若此則其窮而無告者其上豈宜有不察者乎田無所墾而稅不得增徒相聚摶取攘竊以為衣食使其俗貪淫詐靡而無信義忠厚之行則將盡棄而魚肉之乎噫此不可不慮也漢之末年荆楚甚盛不惟民戶繁實地著充滿而材智勇力之士森然出於其中孫劉資之以爭天下及其更唐五代不復振起今皆為下州小縣乃無一士生其間者而閩浙之盛自唐而始且獨為東南之望然則亦古所未有也極其盛而將坐待其衰此豈智者之為乎且其土地之廣者伏藏狐兔平野而居虎狼荒墟林莽數千里無聚落姦人亡命之所窟宅其地氣蒸鬱而不遂而其狹者鑿山捍海擲決遺利地之生育有限民之鋤耨無窮至於動傷隂陽侵敗五行使其地力竭而不應天氣亢而不屬肩摩袂錯愁居戚處不自聊賴則臣恐二者之皆病也夫分閩浙以實荆楚去狹而􅈬廣田益墾而稅益增其出可以為兵其居可以為役財不理而自富此當今之急務也而論者則又將日慮其因徙而變夫豈有不變之術而未之思乎抑聽其自變者乎奴婢傭賃品官占戶周官大宰以九職任萬民八曰臣妾聚斂疏材九曰間民無常職轉移執事臣妾男女貧賤之稱轉徙執事若今傭賃也酒人奚三百人古者從坐男女沒入縣官為奴其少才知以為奚今之侍史官婢漢髙祖令民得賣子五年詔民以飢餓自賣為人奴婢者皆免為庶人文帝勸務農桑帥以儉節未有兼并之害故不為民田及奴婢為限賈誼曰嵗惡不入請賣爵子又曰今人賣僮者為之繡衣絲履偏諸緣納之間中是古天子后服所以廟而不晏者也鼂錯勸帝募民徙塞下募民以丁奴婢贖罪及輸奴婢欲以拜爵者女子緹縈願沒入為官婢以贖父罪四年免官奴婢為庶人武帝建元元年赦吳楚七國帑輸在官者吳楚七國反時其首事者妻子沒入為官奴婢帝即位哀而赦之司馬相如傳卓王孫僮客八百人程鄭亦數百人董仲舒説上曰宜少近古限民名田以贍不足塞兼并之路去奴婢除專殺之威不得專殺奴婢也其後府庫並虛乃募民能入奴婢得以終身復為郎增秩楊可告緡遍天下告民匿緡錢不算者乃分遣御史廷尉正監分曹即治郡國緡錢得民財物以億計奴婢以千萬數其沒入奴婢分諸苑養狗馬禽獸及與諸官官益雜置多謂雜置官貟分掌衆事徙奴婢衆而下河漕度四百萬石及官自糴乃足元帝時貢禹言官奴婢十餘萬遊戲無事稅良民以給之宜免為庶人杜延年坐官奴婢乏衣食免官今按豪家奴婢細民為飢寒所驅而賣者也官奴婢有罪而沒者也民以飢寒至於棄良為賤上之人不能有以賑救之乃復效豪家兼并者之所為設法令其入奴婢以拜爵復役是令飢寒之民無辜而與罪𨽻等也况在官者十餘萬人而復稅良民以養之則亦何益於事哉成帝永始四年詔曰公卿列侯親屬近臣多蓄奴婢被服綺縠其申飭有司以漸禁之哀帝即位詔曰諸侯王列侯公主吏二千石及豪富民多蓄奴婢田宅亡限其議限例有司條奏諸侯王奴婢二百人列侯公主百人關內侯吏民三十人年六十以上十嵗以下不在數中諸名田畜奴婢過品皆沒入縣官官奴婢年五十以上免為庶人王莽名天下奴婢曰私屬不得買賣光武建武二年五月詔曰民有嫁妻賣子欲歸父母者悉聽之敢拘執論如律紀下同六年十一月詔王莽時吏人沒入為奴婢不應舊法者皆免為庶人七年吏人遭飢亂及為青徐賊所掠為奴下妻欲去留者悉聽之敢拘制不還以賣人法從事十一年詔曰天地之性人為貴其殺奴婢不得減罪八月癸亥詔曰敢灸灼奴婢論如律所灸灼者為廢民十一月壬午詔除奴婢射傷人棄市律十二年三月詔隴蜀民被掠為奴婢自訟者及獄官未報一切免為庶民十三年十二月甲寅詔益州民自八年以來被掠為奴婢者皆一切免為庶民或依託為人下妻欲去者悉聽之拘留者比青徐二州以掠人法從事十四年十二月癸卯詔益涼二州奴婢自八年以來自訟在所官一切免為庶民賣者無還直殤帝延平元年詔諸官府郡國王侯家奴婢姓劉及疲癃羸老皆上其名務令實悉安帝永初四年諸沒入為官奴婢者免為庶人晉武帝平吳之後令王公以下得蔭人以為衣食客及佃客官品第一第二者佃客無過五十戶三品十戶四品七戶五品五戶六品三戶七品二戶八品九品一戶詳見職田門晉元帝太興四年詔曰昔漢二祖及魏武皆免良人武帝時涼州覆敗諸為奴婢亦皆復籍此纍代成規也其免中州良人遭難為揚州諸郡僮客者以備征役東晉寓居江左以來都下人多為諸王公貴人左右佃客典計衣食客之類皆無課役官品第一第二佃客無過四十戶每品減五戶至第九品五戶其佃穀皆與大家量分其典計官品第一第二置三人第三第四置二人第五第六及公府參軍殿中監監軍長史司馬部曲督關外侯材官議郎以上一人皆通在佃客數中官品第六以上并得衣食客三人第七第八二人第九品舉輦迹禽前驅強弩司馬羽林郎殿中虎賁持椎斧武騎虎賁持鈒色立反冗從虎賁命中武騎一人其客皆注家籍其課丁男調布絹各二丈絲三兩綿八兩祿絹八尺祿綿三兩二分租米五石丁女並半之男年十六亦半課年十八正課六十六免課其男丁每嵗役不過二十日其田畝稅米二升蓋大率如此其度量三升當一升稱則三兩當今一兩尺則一尺二寸當今一尺按此即漢人封君食邑戶之遺意然漢不過每戶嵗賦二百錢而此所賦乃過重者蓋封君所得只是口賦而漢人有田者官别賦之晉以來人皆授田無無田之戶是以戶賦之入於公家及私屬皆重又一品所占不過四十戶非漢列侯動以千戶萬戶計者比也後魏令每調奴任耕婢任績者八口當未娶者四耕牛十頭當奴婢八詳見田賦門孝文太和九年詔均天下人田諸男夫十五以上受露田四十畝婦人二十畝奴婢依良諸麻布之土男夫及課别給麻田十畝婦人五畝奴婢依良皆從還受之法詳見田賦門周武帝天和元年詔江陵人年六十五以上為官奴婢者已令放免其公私奴婢年七十以外者所在官私贖為庶人建德元年又詔江陵所獲俘虜充官口者悉免為百姓容齋洪氏隨筆曰元魏破江陵盡以所俘士民為奴無問貴賤蓋北方夷俗皆然也自靖康之後陷於金人者帝子王孫宦門仕族之家盡沒為奴婢使供作務每人一月支稗子五斗令自舂為米得一斗八升用為餱糧嵗支麻五把令緝為裘此外更無一錢一帛之入男子不能緝者則終嵗裸體敵或哀之則使執㸑雖時負火得暖氣然才出外取柴歸再坐火邊皮肉即脫落不日輒死惟喜有手藝如醫人繡工之類尋常只團坐地上以敗席或蘆籍襯之遇客至開筵引能樂者使奏技酒闌客散各復其初依舊環坐刺繡任其生死視如草芥云唐制凡反逆相坐沒其家為官奴婢反逆家男女及奴婢沒官皆謂之官奴婢男年十四以下者配司農十五以上者以其年長令逺亰師配嶺南為城奴也一免為審戶再免為雜戶三免為良人皆因赦宥所及則免之凡免皆因恩言之顯慶二年敕放諸奴婢為良及部曲客女者聽之皆由家長手書長比見任之半其南口請以蜀蠻人沒官奴婢年六十以上及廢疾者並免賤永昌元年越王正被誅家僮勝衣田者千餘人於是制王公已下奴婢有數萬嵗通天元年敕士庶家僮僕有驍勇者官酬主直並令討擊契丹大足元年敕以北緣邊州縣不得畜突厥奴婢天寶八載敕京畿及諸郡百姓有先是給使在私家驅使者限敕到五日內一切送內侍省其中有是南口及契劵分明者各作限約定數驅使雖王公之家不得過二人其職事官一品不得過十二人二品不得過十人三品不得過八人四品不得過六人五品不得過四人京文武清官六品七品不得過二人八品九品不得過一人其嗣郡王郡主縣主國夫人諸縣君等請各依本品同職事及京清資官處分其有别承恩賜不在此限其蔭家父祖先有者各依本蔭職減比見任之半其南口請以蜀蠻及五溪嶺南夷獠之類大歷十四年詔雍府嵗貢奴婢使之離父母之鄊絶骨肉之戀非仁也宜罷之元和四年敕嶺南黔中福建等道百姓多被公私掠賣為奴婢宜令所在長吏切加捉搦并審細勘責委知非良人百姓乃許交關犯者凖法處分八年敕嶺南諸道不得輒以良口餉遺販易長慶元年詔禁登萊州及緣海諸道縱容海賊掠賣新羅人口為奴婢四年敕諸司諸使各勘官戶奴婢有廢疾及年七十者凖格免賤從良會昌五年中書門下奏天下諸寺奴婢江淮人數至多其間有寺已破廢全無僧衆奴婢既無衣食皆自營生洪潭管內人數倍多一千人以下五百人以上處計必不少並放從良百姓旨依大中九年禁嶺南諸州貨賣男女如有以男女傭賃與人貴分口食任於當年立年限為約不得將出外界昭宗大順二年敕天下州府及在京諸軍或因收虜百姓男女宜給內庫銀絹委兩軍收贖歸還父母其諸州府委本道觀察使取上供錢充贖不得壓良為賤後唐同光二年赦應百姓婦女俘虜他處為婢妾者不得占留一任骨肉識認天成元年敕京城諸道若不是正口不得私書契劵輒賣良人周顯德五年新定刑統詃誘良口勾引逃亡奴婢與貨賣所盜資裝者其詃誘勾引之人伏請處死良口奴婢準律處分居停主人重斷或分受贓物至三匹以上處死將良口於蕃界貨賣居停主人知而不告官者亦處死宋太祖皇帝開寶二年詔奴婢非理致死者即時檢視聽其主速自收瘞病死者不須檢視四年詔應廣南諸郡民家有收買到男女為奴婢轉將傭雇以輸其利者今後並令放免敢不如䛇旨者決杖配流淳化二年詔陕西沿邊諸郡先嵗飢貧民以男女賣與戎人宜遣使者與本道轉運使分以官財物贖還其父母至道二年詔江南兩浙福建州軍貧人負富人息錢無以償沒入男女為奴婢者限詔到並令檢勘還其父母敢隱匿者治罪真宗咸平元年詔川陕路理逋欠官物不得估其家奴婢價以償六年詔士庶家雇僕有犯不得黥其面天禧三年詔自今掠賣人口入契丹界者首領並處死誘致者同罪未過界者決杖黥配大理寺言按律諸奴婢有罪其主不請官司而殺者杖一百無罪而殺者徒二年又諸條主驅部曲至死者徒一年故殺者加一等其有愆犯決罰至死及過失殺者勿論自今人家傭賃當明設要契及五年主因過驅決至死者欲望加部曲一等但不以愆犯而殺者減常人一等如過失殺者勿論從之文獻通考卷十一
