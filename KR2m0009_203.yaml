body:
  text: 文獻通考卷二百三鄱陽馬端臨貴與著經籍考三十史職官刑法歷代宰相年表三十四卷李燾仁甫撰其自序略曰古之所謂相者一而已初未嘗使他人參二乎其間堯相舜舜相禹禹相臯陶臯陶既沒乃相益湯相伊尹傳所謂仲虺為湯左相者不足信也周家並建三公而一公實兼冡宰故旦奭夾輔成王而誕保文武受命者專屬之旦旦歸於豐奭乃專政蓋其名三公其實一相耳自秦以降名實浸以兩失間有瓌偉絶特負賢相之稱功烈赫然著見於一時者亦必得君之專歷年之久而莫或參二之故也權出於一而莫或參二之雖姦雄或得以肆其惡攘竊天下傾國敗家不可禁遏然而一相之任終不可分者唐虞夏商之成法也彼徒見趙高王莽曹操司馬懿其禍如此之酷也而不察夫帝王之所以隆盛其為利蓋亦博哉不能還治其本而反疑其末並列兼制使相牽引而相遂失其職矣夫任相不獲其利而蒙其禍是君之不明非相之權果不可使出於一也既奪其職分其權則所謂相者特一大有司耳其何以總百官治萬事而亮天工邪凡相取其德耳故曰惟尹躬暨湯咸有一德而舜禹臯陶之胥命必孜孜以德為言彼誠知所本者歟本之不知則其選用益雜而多端矣選用雜而多端故其稱號亦顛倒錯亂無有定制或居其位而不得聞其政或當軸秉鈞而身乃為他官名實紏紛賢不肖溷淆其多或至十三四人而其少猶不下四五輩古所謂相寧若此乎然而治亂安危所係今猶古也其所以得相及所以失相者要不可不知按諸舊史惟前漢及唐頗有譜牒其他率皆不具脫略抵牾迷失本真乃旁搜逺取推究前後悉用司馬遷經緯之法追為年表起漢元訖周顯德昔之參機務執樞要者莫不咸在事有本末附見於下否則略之使其人與其官皆相傳而不絶觀宰相之出處進退何如而天下安危治亂在目中矣其足以補前代之缺文揭當今之逺鑑乎合一千五百三十四年離為三十四卷天禧以來御史年表李燾仁甫撰其自序曰御史法官也其責不專於言而天禧選用則與諌官俱任言責臺雖有等級也而義所當擊則卑者亦得徑行其權勢氣力又出諌官上祖宗之聖算神術備矣今亦斷自天禧以來取丞雜三院姓名悉列之表若其人必天子自擇而宰相優容之乃能有濟猶諫官也天禧以來諫官年表李燾仁甫撰其自序略曰古者自公卿大夫士至於工商莫不皆有言責輻輳並進而天子斟酌焉未嘗以言責專付一官以言責專付一官則由漢武帝失之武帝誠不喜諫者初置諫大夫猶未限員東京循舊弗改後乃寖微晉洎江表絶不復置拓跋魏復置其員亦不可知高齊緣孝經之文始有七人之限夫以天下之衆而敢言者才七人尚足謂治邪恭惟祖宗明目達聰協於虞舜任言責者不一天禧别置諫院禮秩優異他官莫擬崇廣言路諫官御史權勢氣力乃與宰相等蓋當時所用諫官御史必取天下第一流非學術才行俱備為一世所高者莫在此位或誤選試旋加汰斥言而當者曾不十年徑登宰輔其名迹皆可考見嗚呼盛哉今斷自天禧置院以來作諫官年表并列古今之變為二説以附著之其一曰諫官必天子自擇而宰相勿與其二曰宰相雖不得與擇諫官必優容之乃克有濟右職官律文十二卷音義一卷陳氏曰自魏李悝漢蕭何以來更三國六朝隋唐因革損益備矣本朝天聖中孫奭等撰音義自名例至斷獄歷代異名皆著之唐令三十卷式二十卷陳氏曰唐開元宋璟蘇頲盧從願等所刪定藝文志卷數同更同光天福校定至本朝淳化中右贊善大夫潘憲著作郎王泗校勘其篇目條例頗與今見行令式有不同者南豐曽氏序曰唐令三十篇以常員定職官之任以府衛設師徒之備以口分永業為授田之法以租庸調為斂財役民之制雖未及三代之政然亦庶幾乎先王之意矣讀其書嘉其制度有庶幾乎古者而惜其不復行也故綴其大要可記者論之於此焉刑統三十卷鼂氏曰皇朝竇儀以尚書判大理寺與法官蘇曉奚嶼張希護等修定古者議事以制使民不知所爭也後世鑄刑書使民知所避也雖若不同所以為民之意則一然議事以制者委重於人鑄刑書者委重於法委重於人則上之人將輕重由心以虐其下委重於法則下之人將徵於書以慢其上其為失也亦均要之以人行法不使偏重然後為得耳陳氏曰初范質既相周建議律條繁廣輕重無據特詔詳定號大周刑統凡二十一卷至是重加詳定建隆四年頒行金科易覽三卷鼂氏曰崇文總目有唐趙綽金科易覽一卷田氏書目有蕭緒金科易覽三卷當是綽初撰一卷緒刪改析之為三爾疑獄一卷鼂氏曰晉和凝撰纂史傳決疑獄事其上卷凝書也下中卷凝子㠓所續天聖編勑三十卷鼂氏曰天聖中宋庠龎籍受詔改修唐令參以今制而成凡二十一門官品一户二祠三選舉四考課五軍防六衣服七儀制八鹵簿九公式十田十一賦十二倉庫十三廄牧十四關市十五捕亡十六疾醫十七獄官十八營繕十九喪葬二十雜二十一斷例四卷元豐斷例六卷鼂氏曰皇朝王安石執政以後士大夫頗重意律令此熙豐紹聖中法寺決獄比其六卷則元豐中法寺所斷罪節文也刑名斷例十卷陳氏曰不著名氏以刑統勑令總為一書惜猶未備也嘉祐驛令三卷陳氏曰三司使梁國張方平安道等修定前一卷為條貫勑後二卷為則例令官吏幫支驛劵衙官傔從之類皆據此也元豐廣案二百卷鼂氏曰皇朝元豐初置新科明法或類其所試成此書元豐刑部敘法通用一卷陳氏曰末載申明至紹興淳熙以後諸路將官通用勑二十卷鼂氏曰皇朝崇寧中修刑統賦兩卷鼂氏曰皇朝傅霖撰或人為之注決獄龜鑑二十卷鼂氏曰皇朝鄭克編次五代和凝有疑獄集近時趙同有疑獄事類皆未詳盡因增廣之依劉向晏子春秋舉其綱要為之目録分二十門陳氏曰克因和氏之書分二十門推廣之凡二百七十六條三百九十五事起鄭子産迄本朝律心四卷鼂氏曰未詳撰人纂刑統綱要也宣和軍馬司勑十三卷令一卷陳氏曰宣和時所修紹興勑十三卷令五十卷格三十卷式三十卷政和以後赦十五卷鼂氏曰皇朝張守等紹興中被旨編修紹興刑統申明一卷陳氏曰開寶以來纍朝訂正與刑統並行者慶元勑十二卷令五十卷格三十卷式三十卷目録一百二十二卷隨勑申明十二卷總二百五十六卷陳氏曰丞相豫章京鏜仲逺等慶元四年表上國朝自建隆以來世有編勑每修定號為新書中興至此凡三修矣其有續降指揮謂之後勑以待他時修入云紹興貢舉法五十卷陳氏曰丞相万俟卨等紹興二十六年表上紹興監學法二十六卷目録二十五卷申明七卷對修釐正條法四卷共六十二卷陳氏曰宰相秦檜等紹興十三年表上嘉泰條法事類八十卷陳氏曰天台謝深甫子肅等嘉泰二年表上初吏部七司有條法總類淳熙新書既成孝宗詔倣七司體分門修纂别為一書以事類為名至是以慶元新書修定攽降此書便於檢閲引用惜乎不併及刑統也嘉定吏部條法總類五十卷陳氏曰嘉定中以開禧重修七司法并慶元泛行法在京通用法大宗正司法參定凡改正四百六十餘條視淳熙總類增多十卷七年二月攽行役法撮要一百八十九卷陳氏曰提舉編條宰相京鏜等慶元六年上自紹興十七年正月以後至慶元五年七月以前為五十五門又八十二小門門為一卷外為參詳目録等卷雖多而文甚少其書於州縣差役極便於引用右刑法文獻通考卷第二百三
