body:
  text: 文獻通考卷三百四十四鄱陽馬端臨貴與著四裔考二十一突厥下西突厥大邏便木杆可汗之子初木杆與沙鉢畧可汗有隙因分為二大邏便即阿波可汗其國居烏孫之故地東至突厥國西至雷翥海南至疎勒北至瀚海在京師西北七千里自焉耆國西北七日行至其南庭自南庭又正北八日行至其北庭鐡勒龜兹及西域諸國皆歸附之其人雜有都陸及弩矢畢葛邏禄處月處密伊吾等諸種風俗大抵與突厥同唯言語㣲異其官有葉護有設有特勒常以可汗子弟及宗族為之又有乙斤屈利啜閻洪達頡利發吐屯俟斤等官皆代襲其位大邏便既為處羅侯可汗所擒其國立鞅素特勒之子是為泥利可汗至其子達漫號泥㙭處邏可汗即大邏便之種落與北突厥處邏可汗號同非一人也其母向氏夲中國人生達漫而泥利卒而向氏又嫁其弟婆實特勒隋開皇末婆實與向氏詣長安處邏可汗居無常處然多在烏孫故地立小可汗分統所部一在石國北以制諸胡一居龜兹北其地名應婆每五月八日相聚祭神嵗遣重臣向其先代所居之窟致祭焉煬帝大業六年帝将西討吐谷渾遣侍御韋節召處邏㑹於大斗拔谷其國人不從邏謝使者辭以故適㑹其酋長射匱使求婚裴矩因奏曰處邏不朝自恃强大臣請以計弱之分裂其國則易制也射匱者都六之子達頭之孫達頭舊為西面可汗初與沙鉢畧有隙遂分為别部因東可汗雍虞閭死後自立為歩迦可汗達頭死後其孫射匱微弱不得為可汗代為可汗君臨西面今聞其失職附𨽻於處邏故遣使来以結援耳願厚禮其使拜為大可汗突厥勢分兩從我矣帝從之遂召其使者言處邏不順之意稱射匱有好心吾将立為大可汗令發兵誅處邏然後當為婚也射匱聞而大喜興兵襲之處邏大敗棄妻子東走髙昌帝遣裴矩将向氏親要左右往曉諭之遂入朝處邏可汗隋煬帝大業中與特勒大奈入朝從征髙麗遇江都之亂從宇文化及至河北唐初歸京師封歸義郡王處邏與始畢有隙始畢使人殺之太宗即位以禮改葬闕達設初居於㑹寕有部落三千餘騎至隋末自稱闕可汗武徳初遣使内屬厚加撫慰尋為李軌所滅特勒大奈隋大業中與曷薩那可汗同歸中國及從煬帝討遼東以功授金紫光禄大夫後分其部落於樓煩㑹髙祖舉兵大奈率其衆以從隋将桑明和襲義軍扵飲馬泉諸軍多已奔退大奈将數百騎出明和後掩其不備擊大破之諸軍復振拜光禄大夫及定京城以力戰功賞物五千叚賜姓史氏武徳初從太宗討薛舉又從平王世充竇建徳劉黑闥並有殊功賜宫女三人雜綵萬餘叚貞觀三年累遷右武衛大将軍檢校豐州都督封竇國公實封三百户十二年卒贈輔國大将軍初曷薩那之朝隋也為煬帝所留其國人遂立薩那之叔父射匱為可汗始開土宇東至金山西臨西海自玉門以西諸國皆役屬之遂與北突厥為敵乃建庭扵龜兹北三彌山尋卒弟統葉䕶可汗代立統葉䕶可汗勇而有謀善攻戰遂北并鐡勒西拒波斯南接罽賔悉歸之控弦數十萬覇有西域據舊烏孫之地又移庭於石國北千里其西域諸國王悉授頡利𤼵并遣吐屯一人監統之督其征賦西戎之盛未有也武徳三年遣使貢條支巨卵時北突厥作患髙祖厚加撫結與之并力以圖北蕃統葉䕶許以五年冬大軍當𤼵頡利可汗聞之大懼復許葉䕶通和無相征伐統葉䕶尋遣使來請婚髙祖謂侍臣曰西突厥去我懸逺急疾不相得力今来請婚計将安在封徳彛對曰當今之務莫若逺交而近攻正可權許其婚以威北狄待三數年後中國全盛徐思其宜髙祖許之婚令髙平王道立至其國統葉䕶大悅遇頡利可汗頻嵗入冦西蕃路梗由是未果為婚貞觀元年遣真珠統俟斤與道立来獻萬釘寳鈿金帶馬五千匹時統葉䕶自負强盛無恩於國部落咸怨葛邏禄種多叛之頡利可汗不欲中國與之和親數遣兵入寇又遣人謂統葉䕶曰汝若迎唐家公主要湏經我國中而過統葉䕶患之未克婚為其伯父所殺而自立是為莫賀咄俟屈利毘可汗令分統突厥種類為小可汗及此自稱大可汗國人不附弩矢畢部共推泥熟莫賀設為可汗泥熟不從時統葉䕶之子咥力特勒避莫賀咄之難亡在康居泥熟遂迎而立之是為乙毘沙鉢羅肆葉䕶可汗連兵不息俱遣使来朝各請婚於我太宗不許諷令各保所部無相征伐其西域諸國及鐡勒先役屬於西突厥者悉叛之國内虚耗肆葉䕶既是舊主之子為衆心所歸其西面都陸可汗及莫賀咄可汗二部豪帥多来附之又興兵以擊莫賀咄大敗莫賀咄遁於金山尋為咄陸可汗所害國人乃奉肆葉護為大可汗肆葉䕶可汗立大發兵北征鐡勒薩延陁逆撃之反為所敗肆葉䕶性猜狠信讒無統馭之畧有乙利可汗者於肆葉䕶功最多由是授小可汗以非罪族滅之羣下震駭莫能自固肆葉䕶素憚泥熟而隂欲圖之泥熟遂適焉耆其後設卑達官與突厥弩矢畢二部豪帥潛謀擊之肆葉䕶以輕騎遁於康居尋卒國人迎泥熟扵焉耆而立之是為咄陸可汗咄陸可汗者亦稱大度可汗父莫賀設夲𨽻統葉䕶武徳中常至京師時太宗居藩務加懐柔與之結盟為兄弟既被推為可汗遣使詣闕請降太宗賜以名號及鼓纛貞觀七年遣鴻臚寺少卿劉善因至其國冊授為吞河婁拔奚利邲咄陸可汗眀年泥熟卒其弟同俄設立是為沙鉢羅咥利失可汗咥利失可汗咥徙結切以貞觀九年上表請婚獻馬五百匹朝廷唯厚加撫慰未許其婚俄而其國分為十部每部令一人統之號為十設每設賜以一箭故號十箭焉又分十箭為左右廂各置五箭其左廂號為五咄六部落置五大啜管一箭右廂號為五弩矢畢置五大俟斤管一箭其後或稱一箭為一部落大箭頭為大首領五咄六部落居碎葉以東五弩矢畢部落居於碎葉以西自是都號為十姓部落咥利失既不為衆所歸部衆擕貳為其統吐屯所襲麾下亡散咥利失以左右百餘騎拒之戰數合統吐屯不利而去咥利失奔其弟歩利設與保焉耆其阿悉吉闕俟斤與統吐屯等召國人将立欲谷設為大可汗以咥利失為小可汗統吐屯為人所殺欲谷設兵又為其俟斤所破咥利失復得故地弩矢畢處月處密等並歸咥利失十二年西部竟立欲谷設為乙毘咄陸可汗與咥利失中分自伊列河以西屬咄陸以東屬咥利失咄陸可汗又建庭扵烏鏃曷山西謂之北庭自厥越失拔悉彌駮馬結骨火燖觸木昆諸國皆臣之十三年咥利失為吐屯俟利𤼵與欲谷設通謀作難咥利失窮蹙奔於鏃汗而死弩矢利部落酋帥迎咥利失弟伽那之子薄布特勒而立之是為乙毘畧沙鉢羅葉䕶可汗乙毘可汗既立建庭於雖合水北謂之南庭東以伊列河為界自龜兹鄯善且末吐火羅焉耆石國史國何國穆國康國皆受其節度累遣使朝貢太宗降璽書慰勉貞觀十五年令左領軍将軍張大師冊授焉賜以鼓纛扵時咄陸可汗與葉䕶頻相攻擊㑹咄陸遣使詣闕太宗諭以敦睦之道咄陸兵衆漸强西域諸國復来歸附未幾咄陸遣石國咄屯攻葉䕶擒之送扵咄陸尋為所殺咄陸可汗既并其國弩矢畢諸姓不服咄陸皆叛之咄陸復率兵擊吐火羅破之遣兵冦伊州安西都護郭孝恪率輕騎二千自烏骨邀撃敗之咄陸又遣處月䖏密等圍天山縣孝恪又擊走之孝恪乘勝進據處月俟斤所居之城追奔及扵曷索山斬首千餘級降其處密之衆而歸咄陸初以泥熟啜自擅取而斬之以徇尋為泥熟啜部将胡録屋所襲衆多亡逸其國大亂貞觀十五年部下屈利啜等謀欲廢咄陸各遣使詣闕請立可汗太宗遣使齎璽書立莫賀咄乙毘可汗之子是為乙毘射匱可汗乙毘立乃𤼵弩矢畢兵就白水撃咄陸大敗之咄陸自知不為衆所附乃西走吐火羅國中國使人先為咄陸所拘者射匱悉以禮資送歸長安復遣使貢方物請賜婚太宗許之令割龜兹于闐疎勒朱俱波葱嶺等五國以充聘禮及太宗崩賀魯反叛射匱部落為其所併阿史那賀魯者曵歩利設射匱特勒之子也阿史那歩真既来歸國咄陸可汗乃立賀魯為葉護以繼歩真居於多邏斯川在西州直北千五百里統處月處密姑蘇葛邏禄畢失五姓之衆其後咄陸西走吐火邏國射匱可汗遣兵迫逐賀魯不常厥居貞觀二十三年乃率其部落内屬詔居庭州尋授左驍衛将軍瑶池都督永徽二年與其子咥運率衆西遁據咄陸可汗之地總有西域諸部建牙扵雙河及千泉自號沙鉢邏可汗統攝咄陸弩矢畢十姓其咄陸有五啜弩矢畢有五俟斤各有所部勝兵數十萬並羈屬賀魯其咄陸有五啜一曰處月木昆律啜二曰胡禄居律啜賀魯以女妻之三曰攝舍提􅚐啜四曰突騎賀羅陁啜五曰䑕尼陁處半啜弩矢畢有五俟斤一曰阿息結闕俟斤最為强盛二曰哥舒闕俟斤三曰拔塞幹􅚐沙鉢俟斤四曰阿悉結尼熟俟斤五曰哥舒處半俟斤西域諸國亦多附𨽻焉賀魯尋立咥運為賀咄葉護數侵擾西蕃諸部又進冦庭州三年詔遣左武候大将軍梁建方右騎衛大将軍契苾何力率燕然都䕶所部廻紇兵五萬騎討之前後斬首九千級虜渠帥六十餘人四年咄陸可汗死其子真珠葉護與五弩矢畢請撃賀魯破其牙帳斬首千餘級顯慶二年遣左屯衛将軍蘇定方燕然都䕶任雅相副都䕶蕭嗣業左驍衛大将軍瀚海都督廻紇婆閏等率師討擊仍使右武衛大将軍阿史那彌射左屯衛大将軍阿史那歩真持節為安撫大使定方至曵咥河西賀魯率胡禄屋闕啜等二萬餘騎列陣而待定方率嗣業總管任雅相與之交戰賊衆大敗斬其大首領護都答吐荅反達官等二百餘人賀魯及闕啜輕騎奔竄渡伊麗河兵馬溺死者甚衆嗣業至千泉賀魯建牙之處彌射進軍伊麗水處密處月部落率衆来降彌射進次雙河賀魯先使歩失達官鳩集散卒據栅拒戰彌射歩真攻之大潰又與蘇定方攻賀魯於葉水大破之賀魯與咥運欲投䑕耨設至石國之蘇咄城傍人馬飢乏城主伊沮達官詐将酒食出迎賀魯信其言入城遂被拘執蕭嗣業既至石國䑕耨設乃以賀魯之屬俘至京師令獻扵昭陵及大社髙宗特免死分其種落置崑陵濛池二都護府其所役屬諸胡國皆分置州府西盡扵波斯並𨽻安西都護府四年賀魯卒詔葬于頡利墓側刻石以紀其事阿史那彌射者室黠蜜可汗五代孫也初室黠蜜為十大首領有兵十萬衆往平西域諸胡國自立為可汗號彌射在夲蕃為莫賀咄葉䕶與族兄歩真有隙以貞觀十三年率所部處月處密入朝授右監門大将軍其後歩真遂自立為咄陸葉䕶其部落多不服委之遁去歩真擕家屬入朝授左屯衛大将軍彌射從太宗征髙麗有功封平襄縣伯顯慶二年轉左武衛大将軍及討賀魯乃册立彌射為興昔亡可汗兼左衛大将軍崑陵都護分押賀魯下五咄陸部落歩真授繼往絶可汗兼右衛大将軍濛池都護仍分押五弩矢畢部落因令與盧永慶等准其部落大小職位髙下節級授刺史以下官龍朔中又令彌射歩真俱率所部從䫻于畢反海道大總管蘇海政討龜兹歩真嘗欲并彌射歩落遂密告海政云彌射欲謀反請以計誅之時海政兵纔數千懸師在彌射境内遂集軍吏而謀曰彌射若反我軰即無噍類今宜先舉事則可克㨗乃偽稱有敕令大總管齎物數百萬叚分賜可汗諸首領由是彌射率其麾下随例請物海政盡收斬之其後西蕃盛言彌射非反為歩真所誣而海政不能審察濫行誅戮武太后臨朝以十姓無主數年部落多散垂拱初遂擢授彌射子右豹韜衛翊府中郎元慶為左玉鈐衛将軍兼崑陵都護令襲興昔亡可汗押五咄陸部落步真子斛瑟邏為右玉鈐衛将軍兼濛池都護押五弩矢畢部落尋進授元慶右衛大将軍如意元年為来俊臣誣搆謀反被害其子獻配流崖州長安三年召還累授右驍衛大将軍襲父興昔亡可汗充安撫招慰十姓大使獻夲蕃漸為黙啜及烏質勒所侵遂不敢還國開元中累遷右金吾大将軍卒於長安阿史那歩真者在夲蕃授右屯衛大将軍與彌射討平賀魯加授驃騎大将軍行右衛大将軍濛池都護繼往絶可汗押五弩矢畢部落尋卒其子斛瑟羅夲蕃為步利設垂拱初授右玉鈐衛将軍兼濛池都䕶襲繼往絶可汗押五弩矢畢部落天授元年拜左衛大将軍改封竭忠事主可汗仍兼濛池都護尋卒子懐道神龍中累授右屯衛大将軍光禄卿轉太僕兼濛池十姓可汗自垂拱以後十姓部落頻被突厥黙啜侵掠死散殆盡乃随斛瑟羅統六七萬人徙居内地西突厥阿史那氏扵是遂絶突騎施烏質勒者西突厥之别種也初𨽻在斛瑟羅下號為莫賀達于後以斛瑟羅用法嚴酷擁衆背之尤能撫恤其部落由是為逺近諸胡所歸附其下置都督二十員各統兵戈七千人常屯聚碎葉西北界後漸攻陷碎葉徙其牙帳居之東北與突厥為鄰西與諸胡國相接至庭州斛瑟羅以部衆削弱自武太后時入朝不敢還蕃其地並為烏質勒所并及卒其長子娑葛代統其衆詔便立娑葛為金河郡王仍賜以宫女四人初娑葛代父統兵烏質勒下部将闕啜忠節甚忌之以兵部尚書宗楚客當朝任勢密遣使齎金七百兩以賂楚客請停娑葛統兵楚客乃遣御史中丞馮嘉賔充使至其境隂與忠節籌其事并自致書以申意在路為娑葛逰兵所䕶遂斬嘉賔仍進兵攻陷火燒等城遣上表欲索楚客頭景龍三年娑葛弟遮弩恨所分部落少扵其兄遂叛入突厥黙啜請為導以討娑葛黙啜乃留遮弩遣兵二萬人與其左右來討娑葛擒之與遮弩俱殺之黙啜兵還娑葛下部将蘇禄鳩集餘衆自立為可汗蘇禄者突騎施别種也頗善綏撫十姓部落漸歸附之有衆二十萬遂雄西域之地尋遣使來朝開元三年制授蘇禄為左羽林衛大将軍金方道經畧大使特遣侍御史解忠順齎璽書冊立為忠順可汗自是每年遣使朝獻上乃立史懐道女為金河公主以妻之時杜暹為安西都䕶公主遣牙官齎馬千匹詣安西互市使者宣公主教與暹暹曰阿史那氏女豈合宣敎與吾節度使邪杖其使者留而不遣其馬經寒雪盡死蘇禄大怒發兵分冦四鎮㑹暹入為相趙頤貞代為安西都護城中乆乏由是四鎮貯積及人畜並為蘇禄所掠而去安西僅全俄又遣使入朝獻方物十八年蘇禄使至京師上御丹鳯樓設宴時突厥先遣使入朝是日亦來同宴與蘇禄使爭長突厥使曰突騎施國小夲是突厥之臣不宜居上蘇禄使曰今日此宴乃為我設不合居下中書門下及百僚遂扵東西幕下兩處分坐突厥使在東突騎施使在西宴訖厚賚而遣蘇禄性尤清儉每戰伐有功所克䕶盡分與将士及諸部落其下愛之甚為其用潛又遣使南通吐蕃東附突厥及吐蕃亦嫁女與之蘇禄既以三國女為可敦又分立數子為葉護費用漸廣先既不為積貯晩年抄掠所得者留不分之又因風病一手攣縮其下諸部心始擕貳有大首領莫賀達于都摩度兩部落為强盛百姓又分為黄姓黑姓兩種互相猜阻二十六年莫賀達于勒兵夜攻蘇禄殺之都摩度初與莫賀達于連謀俄又相背立蘇禄之子吐火仙為可汗以輯其餘衆與莫賀達于自相攻擊莫賀達于遣使告安西都護盖嘉運嘉運率兵討之大破都摩度之衆臨陣擒吐火仙并收得金河公主而還又欲立史懐道之子昕為可汗以鎮撫之莫賀達于不許曰討平蘇禄夲是我之元謀若立史昕為主則國家何以賞扵我乃不立史昕便令莫賀達于統衆二十七年嘉運率将士詣闕獻俘上御花蕚樓以宴之仍命将吐火仙獻扵太廟俄又黄姓黑姓自相屠殺各遣使降附至徳後中國多故不暇治也乾元初黑姓可汗阿多裴羅猶能遣使者入朝大歴後葛邏禄盛徙居碎葉川二姓微至臣役於葛禄斛瑟羅餘部附回鶻及其破滅有特龎勒居焉耆城葉護餘部保金莎領衆至二十萬唐末為諸蕃所侵部族㣲弱亦常来朝貢後唐天成二年其首領張慕晋等来朝貢長興二年其首領杜阿熟來朝晋天福六年其首領遣使薛同海以下十七人來朝貢鐡勒鐡勒之先匈奴之苖裔也種類最多自西海之東依據山谷往往不絶獨洛河北有僕骨同羅韋紇拔野古覆羅並號俟斤䝉陳吐如紇期結渾斛薛等諸姓勝兵可二萬伊吾以西焉耆之北傍白山則有契弊薄落職乙咥蘇婆那曷烏護骨紇也咥於尼護等勝兵可二萬金山西南有薛延陁咥勒兒十盤達契等萬餘兵康國北傍阿得水則有訶咥曷嶻撥忽吨千貝海曷比悉阿嵯蘇拔也未渇達等三萬餘兵傍嶷海東西蘇路羯三索咽蔑促薛忽等諸姓咽因結反八千餘兵拂菻東則有恩屈阿蘭北振九離伏嗢昏等嗢烏沒反近二萬人北海南則都波等雖姓氏各别總謂為鐡勒並有君長屬東西兩突厥随水草流移人性凶忍善扵騎射貪婪尤甚以冦掠為生近西邉者頗為藝植多牛羊而少馬突厥國有東西征討皆資其用以制北荒十六國慕容垂時塞北後魏末河西並云有敕勒部鐡勒盖言訛也隋大業元年突厥處邏可汗擊鐡勒諸部厚其稅斂又猜忌薛延陁等恐為變遂集其魁帥數百人盡誅之由是一時反叛拒處邏遂立俟利發俟斤契弊歌楞為易勿真莫河可汗居貪汗山復立薛延陁内俟斤字也咥為小可汗處邏既敗莫河始大焉甚得衆心為鄰國所憚伊吾髙昌焉耆諸國悉附之其俗大抵與突厥同唯丈夫婚畢就便妻家待産乳男然後歸此其異也大業三年遣使貢方物自是不絶薛延陁薛延陁鐡勒之别部前燕慕容儁時匈奴單于賀刺頭率部三萬五千来降陁盖其後與薛部雜居因號薛延陁可汗姓壹利吐氏代為强族初蠕蠕之滅也並屬於突厥而部中分在鬱督軍山者東屬扵始畢在貪汗山者屬於葉護其主夷男唐貞觀中遣使朝聘為毘伽可汗居大漠之北俱淪水南去長安萬四千餘里後鐡勒僕骨同羅共撃薛延陁大敗太宗以其破亡遣江夏王道宗左衛大将軍阿史那社爾為瀚海道安撫使初薛延陁真珠毘伽可汗遣使請婚太宗許以女妻之徴可汗備親迎之禮詔幸靈州與之禮㑹延陁先無府藏調斂其國且行萬里既渉沙磧無水草而羊馬多死遂後期太宗扵是停幸靈州既而聘羊馬損耗将半於是返其使者羣臣或云許公主以妻延陁邉境得以休息納其獻聘不可失信於蕃人宜在速成太宗曰君等知古而不知今昔漢家匈奴强而中國弱所以厚飾子女嫁與單于今中國强而北狄弱漢兵千人堪撃其數萬延陁所以伏服稽顙恣我所為不敢驕慢者以新得立為君長雜居非其夲屬将倚大國用服其衆彼同羅僕骨等十餘部落兵各數萬足制延陁所以不敢發者以延陁為我所立懼中國也若今以女妻之大國子壻増崇其禮深結黨援雜姓部落更尊服之夷狄之人豈知恩義微不得意勒兵南下所謂養獸自噬也今不與其女使命頗簡諸姓部落知吾棄之其爭擊延陁必矣既而李思摩數侵掠之延陁復使突利失冦定襄掠百姓太宗遣英國公李勣援之虜已出塞而還太宗以璽書責讓之可汗乃遣使致謝復請發兵助軍太宗優詔答而止焉㑹毘伽可汗卒子拔灼立時王師征遼謀入冦知有備不果拔灼性卞尅好殺國人不安其貴臣阿波設率衆與唐使者遇於靺鞨東鄙小戰不利還怖國人曰唐兵至矣衆大擾諸部遂潰拔灼遁去俄為回紇所殺盡屠其宗立毘伽昆弟子咄摩支為可汗上言願保鬱督軍山帝詔崔敦禮與李勣慰安之隂詔勣等曰降則撫之叛則擊之勣至咄摩支大駭隂欲拒戰外好言乞降勣縱兵擊斬五千餘級係老弱三萬遂滅其國咄摩支匄降拜右武衛将軍賜田宅後三年餘部叛以右領軍大将軍失執思力討平之永徽時延陁部亡散者悉還髙宗為置嵠彈州處安之僕骨僕骨者鐡勒之别部習俗與突厥畧同在多濫東境勝兵萬餘與同羅宿敦鄰好最居北偏先臣扵頡利苦頡利亂政後附薛延陁貞觀中遣使朝貢及延陁之滅也其大酋婆匐使利發歌藍伏延詣闕内附同羅同羅者鐡勒之别部也在薛延陁之北去長安萬七千五百里户萬五千俗與突厥畧同初臣頡利苦頡利之政亂太宗時其酋俟利發時健啜遣使内附中間無聞洎天寳初其酋帥阿布思以萬餘帳来降處之朔方河南之地給其廩食每嵗仍費繒絮數十萬叚其河曲郡縣倉廩為之空虚至十年背叛劫掠諸姓部落遂還漠北尋為廻紇所破黨衆離散阿布思後奔葛邏禄北庭節度程千里購之以獻戮於京師安禄山反劫其兵用之號曵落河曵落河猶言健兒云都波都波者鐡勒别種南去回紇十三日行分為三部自相統攝結草為廬無牛羊不知耕稼土多百合草取其根以為糧兼捕魚射獵為食而衣貂鹿之皮貧者緝鳥羽以為服婚姻富者以馬貧用鹿皮及草根為聘禮死亡以木櫃盛屍置山中或懸於樹上送𦵏哭泣畧與突厥類莫知四時之候國無刑罰偷盗倍徴其贓貞觀二十一年遣使朝貢拔野古拔野古亦鐡勒之别部在僕骨東境勝兵萬其地豐草盛人皆殷富其酋俟利發屈利失貞觀二十一年舉其部来降其地東北千餘里曰康干河投松木入水二年乃化為石其色青有國人居住其人謂之康干石其松為石以後仍似松文人皆著木脚氷上逐鹿以耕種射獵為業國多好馬又出鐡風俗與鐡勒同言語稍别唐貞觀三年與僕骨同羅奚霫同入朝二十一年大俟利發屈利失舉部内屬置幽陵督府拜屈利失右武衛大将軍即為都督顯慶時與思結僕固同羅叛遣鄭仁泰討斬其渠帥天寳間能自來朝多濫葛多濫葛在薛延陁東濵同羅水勝兵萬人自古未嘗通中國延陁已滅其酋俟斤多濫葛末與廻紇皆朝以其地為燕然都督府就授其酋世為都督斛薛斛薛亦鐡勒之别部在多濫葛北境兩姓合居勝兵七千既來朝列其地為州縣阿䟦阿䟦亦鐡勒之别部在多濫葛西北勝兵千七百隋代號訶㗌部是也遷徙無常所唐初来朝以地為雞田州開元中􅎤跌思泰自突厥來其後光顔光進皆以戰功至大官賜姓李氏附屬籍契苾羽契苾亦曰契苾羽在焉耆西北鷹娑川多濫葛之南其酋哥楞自號可汗弟莫賀咄特勒皆有勇莫賀咄死子何力紐率其部來歸時貞觀六年也詔處之甘凉間以其地為榆溪州永徽四年以其部為賀蘭都督府𨽻燕然都護何力有戰功忠節臣也太和中其種帳附扵振武云鞠國鞠國在拔野古東北五百里六日行至其國有樹無草但有地苔無羊馬家畜鹿如中國牛馬使鹿牽車可勝三四人人衣鹿皮食地苔其俗聚木為屋尊卑共處其中俞俞國在鞠國東十五日行其土地寛大百姓衆多風俗與拔野古同少牛馬多貂䑕大漠大漠國在鞠國北饒羊馬人極長大長者至丈三四尺問其國云北有骨師國與大漠相接白霫白霫居鮮卑故地直京師東北五千里與同羅僕骨接避薛延陁保奥支水冷陘山南契丹北烏羅渾東靺鞨西㧞野古地圓袤二千里山繚其外勝兵萬人業射獵以赤皮緣衣婦貫銅釧以子鈴綴襟其部有三曰居延曰無若沒曰潢水其君長臣突厥頡利可汗為俟斤唐貞觀中再来朝後列其地為寘顔州以别部為居延州即用俟斤為刺史顯慶五年授酋長李含珠為居延都督含珠死弟厥都繼之後無聞焉庫莫奚庫莫奚其先東部鮮卑宇文之别種初為慕容皝所破遺落者竄匿松漠之間其地今栁城郡之北其俗甚不潔而善射獵好為冦掠魏登國三年道武親自出討至弱水南大破之獲馬牛羊豕十餘萬魏既入中原諸種與庫莫奚滋盛及開遼海置戍和龍諸夷震懼各獻方物文成獻文之世嵗致名馬孝文二十年入冦安州擊走之後復欵附求入塞交易許之嵗常朝獻至武定以來不絶齊時亦入貢及突厥興而臣屬之後稍强盛分為五部一曰辱紇主二曰莫賀弗三曰契箇四曰木崑五曰室得理饒樂水北即鮮卑故地一曰如洛環水盖饒樂之訛也每部置俟斤一人為其帥随逐水草頗同突厥有阿㑹氏五部中為盛諸部皆歸之其俗死者以葦薄裹屍懸之樹上其後欵附至隋代號曰奚突厥稱蕃人後亦遣使入朝奚部落並在今栁城郡東北二千餘里唐開元五年二月奚首領李大酺入朝封從外甥女辛氏為固安公主以妻之八年大酺戮死共立其弟魯蘇為主請仍以固安公主為妻允之契丹可突于反脇奚衆附突厥魯蘇不能制奔榆闗趙含章討平之衆稍自歸明年酋李詩部落五千帳來降以其地為歸義州授其酋都督李詩死子延寵嗣後與契丹叛詔立他酋婆固為都督昭信王以定其部落元宗世八入朝獻至徳以後朝獻不絶元和元年君梅落身入朝拜檢校司空歸誠郡王賜姓李氏然隂結回鶻室韋兵犯西城振武憲宗世四朝獻太和四年復冦邉盧龍李載義破之大中元年北部諸山奚悉叛盧龍張仲武禽酋渠燒帳落二十萬咸通九年其王入朝是後契丹方强奚不敢亢而舉部役屬當唐之末居隂凉川在營府之西幽州之西南皆數百里有人馬二萬騎分為五部一曰阿薈部二曰啜米部三曰粤質部四曰奴皆部五曰黑訖支部後徙居琵琶川在幽州東北數百里地多黑羊馬􅦇前蹄堅善走其登山逐獸下上如飛契丹阿保機彊盛室韋奚霫皆服屬之奚人常為契丹守界上而苦其苛虐奚王去諸怨叛以别部西徙媯州依北山射獵常採北山麝香人參賂劉守光以自託其族至數千帳始分為東西奚去諸之族頗知耕種嵗借邉民荒地種穄秋熟則来穫窖之山下人莫知其處爨以平底瓦鼎煮穄為粥以寒水觧之而飲去諸卒子掃剌立後唐荘宗滅劉守光賜掃剌姓李更其名紹威卒子拽剌立同光以後紹威父子數遣使朝貢初紹威娶契丹女舍利逐不魯之姊為妻後逐不魯叛亡入西奚紹威納之晋髙祖入立割幽州鴈門以入於契丹是時紹威與逐不魯皆已死耶律徳光已立晋北歸拽剌迎謁馬前徳光曰非爾罪也負我者掃剌與逐不魯爾乃發其墓粉其骨而颺之後徳光滅晋拽剌常以兵從其後不復見扵中國自去諸徙媯州自别為西奚而東奚在琵琶川者亦為契丹所并不復能自見云文獻通考卷三百四十四
