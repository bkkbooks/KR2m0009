body:
  text: 文獻通考卷三百四十四鄱陽馬端臨貴與著四裔考二十一突厥下西突厥大邏便木杆可汗之子初木杆與沙鉢略可汗有隙因分為二大邏便即阿波可汗其國居烏孫之故地東至突厥國西至雷翥海南至疏勒北至瀚海在京師西北七千里自焉耆國西北七日行至其南庭自南庭又正北八日行至其北庭鐡勒龜兹及西域諸國皆歸附之其人雜有都陸及弩矢畢葛邏祿處月處密伊吾等諸種風俗大抵與突厥同唯言語微異其官有葉護有設有特勒常以可汗子弟及宗族為之又有乙斤屈利啜閻洪達頡利發吐屯俟斤等官皆代襲其位大邏便既為處羅侯可汗所擒其國立鞅素特勒之子是為泥利可汗至其子達漫號泥㙭處邏可汗即大邏便之種落與北突厥處邏可汗號同非一人也其母向氏夲中國人生達漫而泥利卒而向氏又嫁其弟婆實特勒隋開皇末婆實與向氏詣長安處邏可汗居無常處然多在烏孫故地立小可汗分統所部一在石國北以制諸胡一居龜兹北其地名應婆每五月八日相聚祭神嵗遣重臣向其先代所居之窟致祭焉煬帝大業六年帝將西討吐谷渾遣侍御韋節召處邏會於大斗拔谷其國人不從邏謝使者辭以故適會其酋長射匱使求婚裴矩因奏曰處邏不朝自恃強大臣請以計弱之分裂其國則易制也射匱者都六之子達頭之孫達頭舊為西面可汗初與沙鉢略有隙遂分為别部因東可汗雍虞閭死後自立為步迦可汗達頭死後其孫射匱微弱不得為可汗代為可汗君臨西面今聞其失職附𨽻於處邏故遣使來以結援耳願厚禮其使拜為大可汗突厥勢分兩從我矣帝從之遂召其使者言處邏不順之意稱射匱有好心吾將立為大可汗令發兵誅處邏然後當為婚也射匱聞而大喜興兵襲之處邏大敗棄妻子東走髙昌帝遣裴矩將向氏親要左右往曉諭之遂入朝處邏可汗隋煬帝大業中與特勒大奈入朝從征髙麗遇江都之亂從宇文化及至河北唐初歸京師封歸義郡王處邏與始畢有隙始畢使人殺之太宗即位以禮改葬闕達設初居於會寧有部落三千餘騎至隋末自稱闕可汗武德初遣使內屬厚加撫慰尋為李軌所滅特勒大奈隋大業中與曷薩那可汗同歸中國及從煬帝討遼東以功授金紫光祿大夫後分其部落於樓煩會髙祖舉兵大奈率其衆以從隋將桑明和襲義軍于飲馬泉諸軍多已奔退大奈將數百騎出明和後掩其不備擊大破之諸軍復振拜光祿大夫及定京城以力戰功賞物五千假賜姓史氏武德初從太宗討薛舉又從平王世充竇建德劉黑闥並有殊功賜宫女三人雜綵萬餘假貞觀三年纍遷右武衛大將軍檢校豐州都督封竇國公實封三百户十二年卒贈輔國大將軍初曷薩那之朝隋也為煬帝所留其國人遂立薩那之叔父射匱為可汗始開土宇東至金山西臨西海自玉門以西諸國皆役屬之遂與北突厥為敵乃建庭于龜兹北三彌山尋卒弟統葉護可汗代立統葉護可汗勇而有謀善攻戰遂北并鐡勒西拒波斯南接罽賔悉歸之控弦數十萬霸有西域據舊烏孫之地又移庭於石國北千里其西域諸國王悉授頡利發并遣吐屯一人監統之督其征賦西戎之盛未有也武德三年遣使貢條支巨卵時北突厥作患髙祖厚加撫結與之并力以圖北蕃統葉護許以五年冬大軍當發頡利可汗聞之大懼復許葉護通和無相征伐統葉護尋遣使來請婚髙祖謂侍臣曰西突厥去我懸逺急疾不相得力今來請婚計將安在封德彛對曰當今之務莫若逺交而近攻正可權許其婚以威北狄待三數年後中國全盛徐思其宜髙祖許之婚令髙平王道立至其國統葉護大悅遇頡利可汗頻嵗入冦西蕃路梗由是未果為婚貞觀元年遣真珠統俟斤與道立來獻萬釘寶鈿金帶馬五千匹時統葉護自負強盛無恩於國部落咸怨葛邏祿種多叛之頡利可汗不欲中國與之和親數遣兵入寇又遣人謂統葉護曰汝若迎唐家公主要須經我國中而過統葉護患之未克婚為其伯父所殺而自立是為莫賀咄俟屈利毗可汗令分統突厥種類為小可汗及此自稱大可汗國人不附弩矢畢部共推泥熟莫賀設為可汗泥熟不從時統葉護之子嘻力特勒避莫賀咄之難亡在康居泥熟遂迎而立之是為乙毗沙鉢羅肆葉護可汗連兵不息俱遣使來朝各請婚於我太宗不許諷令各保所部無相征伐其西域諸國及鐡勒先役屬於西突厥者悉叛之國內虛耗肆葉護既是舊主之子為衆心所歸其西面都陸可汗及莫賀咄可汗二部豪帥多來附之又興兵以擊莫賀咄大敗莫賀咄遁於金山尋為咄陸可汗所害國人乃奉肆葉護為大可汗肆葉護可汗立大發兵北征鐡勒薩延陀逆擊之反為所敗肆葉護性猜狠信讒無統馭之略有乙利可汗者於肆葉護功最多由是授小可汗以非罪族滅之羣下震駭莫能自固肆葉護素憚泥熟而隂欲圖之泥熟遂適焉耆其後設卑達官與突厥弩矢畢二部豪帥潛謀擊之肆葉護以輕騎遁於康居尋卒國人迎泥熟于焉耆而立之是為咄陸可汗咄陸可汗者亦稱大度可汗父莫賀設夲𨽻統葉護武德中常至京師時太宗居藩務加懷柔與之結盟為兄弟既被推為可汗遣使詣闕請降太宗賜以名號及鼓纛貞觀七年遣鴻臚寺少卿劉善因至其國册授為吞河婁拔奚利邲咄陸可汗眀年泥熟卒其弟同俄設立是為沙鉢羅嘻利失可汗嘻利失可汗嘻徙結切以貞觀九年上表請婚獻馬五百匹朝廷唯厚加撫慰未許其婚俄而其國分為十部每部令一人統之號為十設每設賜以一箭故號十箭焉又分十箭為左右廂各置五箭其左廂號為五咄六部落置五大啜管一箭右廂號為五弩矢畢置五大俟斤管一箭其後或稱一箭為一部落大箭頭為大首領五咄六部落居碎葉以東五弩矢畢部落居於碎葉以西自是都號為十姓部落嘻利失既不為衆所歸部衆擕二為其統吐屯所襲麾下亡散嘻利失以左右百餘騎拒之戰數合統吐屯不利而去嘻利失奔其弟步利設與保焉耆其阿悉吉闕俟斤與統吐屯等召國人將立欲谷設為大可汗以嘻利失為小可汗統吐屯為人所殺欲谷設兵又為其俟斤所破嘻利失復得故地弩矢畢處月處密等並歸嘻利失十二年西部竟立欲谷設為乙毗咄陸可汗與嘻利失中分自伊列河以西屬咄陸以東屬嘻利失咄陸可汗又建庭于烏鏃曷山西謂之北庭自厥越失拔悉彌駮馬結骨火燖觸木昆諸國皆臣之十三年嘻利失為吐屯俟利發與欲谷設通謀作難嘻利失窮蹙奔於鏃汗而死弩矢利部落酋帥迎嘻利失弟伽那之子薄布特勒而立之是為乙毗略沙鉢羅葉護可汗乙毗可汗既立建庭於雖合水北謂之南庭東以伊列河為界自龜兹鄯善且末吐火羅焉耆石國史國何國穆國康國皆受其節度纍遣使朝貢太宗降璽書慰勉貞觀十五年令左領軍將軍張大師册授焉賜以鼓纛于時咄陸可汗與葉護頻相攻擊會咄陸遣使詣闕太宗諭以敦睦之道咄陸兵衆漸強西域諸國復來歸附未幾咄陸遣石國咄屯攻葉護擒之送于咄陸尋為所殺咄陸可汗既并其國弩矢畢諸姓不服咄陸皆叛之咄陸復率兵擊吐火羅破之遣兵冦伊州安西都護郭孝恪率輕騎二千自烏骨邀擊敗之咄陸又遣處月處密等圍天山縣孝恪又擊走之孝恪乘勝進據處月俟斤所居之城追奔及于曷索山斬首千餘級降其處密之衆而歸咄陸初以泥熟啜自擅取而斬之以徇尋為泥熟啜部將胡録屋所襲衆多亡逸其國大亂貞觀十五年部下屈利啜等謀欲廢咄陸各遣使詣闕請立可汗太宗遣使齎璽書立莫賀咄乙毗可汗之子是為乙毗射匱可汗乙毗立乃發弩矢畢兵就白水擊咄陸大敗之咄陸自知不為衆所附乃西走吐火羅國中國使人先為咄陸所拘者射匱悉以禮資送歸長安復遣使貢方物請賜婚太宗許之令割龜兹于闐疏勒朱俱波蔥嶺等五國以充聘禮及太宗崩賀魯反叛射匱部落為其所併阿史那賀魯者曵步利設射匱特勒之子也阿史那步真既來歸國咄陸可汗乃立賀魯為葉護以繼步真居於多邏斯川在西州直北千五百里統處月處密姑蘇葛邏祿畢失五姓之衆其後咄陸西走吐火邏國射匱可汗遣兵迫逐賀魯不常厥居貞觀二十三年乃率其部落內屬詔居庭州尋授左驍衛將軍瑶池都督永徽二年與其子嘻運率衆西遁據咄陸可汗之地總有西域諸部建牙于雙河及千泉自號沙鉢邏可汗統攝咄陸弩矢畢十姓其咄陸有五啜弩矢畢有五俟斤各有所部勝兵數十萬並羈屬賀魯其咄陸有五啜一曰處月木昆律啜二曰胡祿居律啜賀魯以女妻之三曰攝舍提􅚐啜四曰突騎賀羅陀啜五曰鼠尼陀處半啜弩矢畢有五俟斤一曰阿息結闕俟斤最為強盛二曰哥舒闕俟斤三曰拔塞幹􅚐沙鉢俟斤四曰阿悉結尼熟俟斤五曰哥舒處半俟斤西域諸國亦多附𨽻焉賀魯尋立嘻運為賀咄葉護數侵擾西蕃諸部又進冦庭州三年詔遣左武候大將軍梁建方右騎衛大將軍契苾何力率燕然都護所部回紇兵五萬騎討之前後斬首九千級虜渠帥六十餘人四年咄陸可汗死其子真珠葉護與五弩矢畢請擊賀魯破其牙帳斬首千餘級顯慶二年遣左屯衛將軍蘇定方燕然都護任雅相副都護蕭嗣業左驍衛大將軍瀚海都督回紇婆閏等率師討擊仍使右武衛大將軍阿史那彌射左屯衛大將軍阿史那步真持節為安撫大使定方至曵嘻河西賀魯率胡祿屋闕啜等二萬餘騎列陳而待定方率嗣業總管任雅相與之交戰賊衆大敗斬其大首領護都答吐答反達官等二百餘人賀魯及闕啜輕騎奔竄渡伊麗河兵馬溺死者甚衆嗣業至千泉賀魯建牙之處彌射進軍伊麗水處密處月部落率衆來降彌射進次雙河賀魯先使步失達官鳩集散卒據柵拒戰彌射步真攻之大潰又與蘇定方攻賀魯於葉水大破之賀魯與嘻運欲投鼠耨設至石國之蘇咄城傍人馬飢乏城主伊沮達官詐將酒食出迎賀魯信其言入城遂被拘執蕭嗣業既至石國鼠耨設乃以賀魯之屬俘至京師令獻于昭陵及大社髙宗特免死分其種落置崑陵濛池二都護府其所役屬諸胡國皆分置州府西盡于波斯並𨽻安西都護府四年賀魯卒詔葬于頡利墓側刻石以紀其事阿史那彌射者室黠蜜可汗五代孫也初室黠蜜為十大首領有兵十萬衆往平西域諸胡國自立為可汗號彌射在夲蕃為莫賀咄葉護與族兄步真有隙以貞觀十三年率所部處月處密入朝授右監門大將軍其後步真遂自立為咄陸葉護其部落多不服委之遁去步真擕家屬入朝授左屯衛大將軍彌射從太宗征髙麗有功封平襄縣伯顯慶二年轉左武衛大將軍及討賀魯乃册立彌射為興昔亡可汗兼左衛大將軍崑陵都護分押賀魯下五咄陸部落步真授繼往絶可汗兼右衛大將軍濛池都護仍分押五弩矢畢部落因令與盧永慶等準其部落大小職位髙下節級授刺史以下官龍朔中又令彌射步真俱率所部從䫻于畢反海道大總管蘇海政討龜兹步真嘗欲并彌射步落遂密告海政云彌射欲謀反請以計誅之時海政兵才數千懸師在彌射境內遂集軍吏而謀曰彌射若反我輩即無噍類今宜先舉事則可克捷乃偽稱有敕令大總管齎物數百萬假分賜可汗諸首領由是彌射率其麾下隨例請物海政盡收斬之其後西蕃盛言彌射非反為步真所誣而海政不能審察濫行誅戮武太后臨朝以十姓無主數年部落多散垂拱初遂擢授彌射子右豹韜衛翊府中郎元慶為左玉鈐衛將軍兼崑陵都護令襲興昔亡可汗押五咄陸部落步真子斛瑟邏為右玉鈐衛將軍兼濛池都護押五弩矢畢部落尋進授元慶右衛大將軍如意元年為來俊臣誣搆謀反被害其子獻配流崖州長安三年召還纍授右驍衛大將軍襲父興昔亡可汗充安撫招慰十姓大使獻夲蕃漸為默啜及烏質勒所侵遂不敢還國開元中纍遷右金吾大將軍卒於長安阿史那步真者在夲蕃授右屯衛大將軍與彌射討平賀魯加授驃騎大將軍行右衛大將軍濛池都護繼往絶可汗押五弩矢畢部落尋卒其子斛瑟羅夲蕃為步利設垂拱初授右玉鈐衛將軍兼濛池都護襲繼往絶可汗押五弩矢畢部落天授元年拜左衛大將軍改封竭忠事主可汗仍兼濛池都護尋卒子懷道神龍中纍授右屯衛大將軍光祿卿轉太僕兼濛池十姓可汗自垂拱以後十姓部落頻被突厥默啜侵掠死散殆盡乃隨斛瑟羅統六七萬人徙居內地西突厥阿史那氏于是遂絶突騎施烏質勒者西突厥之别種也初𨽻在斛瑟羅下號為莫賀達于後以斛瑟羅用法嚴酷擁衆背之尤能撫恤其部落由是為逺近諸胡所歸附其下置都督二十員各統兵戈七千人常屯聚碎葉西北界後漸攻陷碎葉徙其牙帳居之東北與突厥為鄰西與諸胡國相接至庭州斛瑟羅以部衆削弱自武太后時入朝不敢還蕃其地並為烏質勒所并及卒其長子娑葛代統其衆詔便立娑葛為金河郡王仍賜以宫女四人初娑葛代父統兵烏質勒下部將闕啜忠節甚忌之以兵部尚書宗楚客當朝任勢密遣使齎金七百兩以賂楚客請停娑葛統兵楚客乃遣御史中丞馮嘉賔充使至其境隂與忠節籌其事并自致書以申意在路為娑葛逰兵所護遂斬嘉賔仍進兵攻陷火燒等城遣上表欲索楚客頭景龍三年娑葛弟遮弩恨所分部落少于其兄遂叛入突厥默啜請為導以討娑葛默啜乃留遮弩遣兵二萬人與其左右來討娑葛擒之與遮弩俱殺之默啜兵還娑葛下部將蘇祿鳩集餘衆自立為可汗蘇祿者突騎施别種也頗善綏撫十姓部落漸歸附之有衆二十萬遂雄西域之地尋遣使來朝開元三年制授蘇祿為左羽林衛大將軍金方道經略大使特遣侍御史解忠順齎璽書册立為忠順可汗自是每年遣使朝獻上乃立史懷道女為金河公主以妻之時杜暹為安西都護公主遣牙官齎馬千匹詣安西互市使者宣公主教與暹暹曰阿史那氏女豈合宣教與吾節度使邪杖其使者留而不遣其馬經寒雪盡死蘇祿大怒發兵分冦四鎮會暹入為相趙頤貞代為安西都護城中久乏由是四鎮貯積及人畜並為蘇祿所掠而去安西僅全俄又遣使入朝獻方物十八年蘇祿使至京師上御丹鳯樓設宴時突厥先遣使入朝是日亦來同宴與蘇祿使爭長突厥使曰突騎施國小夲是突厥之臣不宜居上蘇祿使曰今日此宴乃為我設不合居下中書門下及百僚遂于東西幕下兩處分坐突厥使在東突騎施使在西宴訖厚賚而遣蘇祿性尤清儉每戰伐有功所克護盡分與將士及諸部落其下愛之甚為其用潛又遣使南通吐蕃東附突厥及吐蕃亦嫁女與之蘇祿既以三國女為可敦又分立數子為葉護費用漸廣先既不為積貯晚年抄掠所得者留不分之又因風病一手攣縮其下諸部心始擕二有大首領莫賀達于都摩度兩部落為強盛百姓又分為黃姓黑姓兩種互相猜阻二十六年莫賀達于勒兵夜攻蘇祿殺之都摩度初與莫賀達于連謀俄又相背立蘇祿之子吐火仙為可汗以輯其餘衆與莫賀達于自相攻擊莫賀達于遣使告安西都護蓋嘉運嘉運率兵討之大破都摩度之衆臨陳擒吐火仙并收得金河公主而還又欲立史懷道之子昕為可汗以鎮撫之莫賀達于不許曰討平蘇祿夲是我之元謀若立史昕為主則國家何以賞于我乃不立史昕便令莫賀達于統衆二十七年嘉運率將士詣闕獻俘上御花蕚樓以宴之仍命將吐火仙獻于太廟俄又黃姓黑姓自相屠殺各遣使降附至德後中國多故不暇治也乾元初黑姓可汗阿多裴羅猶能遣使者入朝大歷後葛邏祿盛徙居碎葉川二姓微至臣役於葛祿斛瑟羅餘部附回鶻及其破滅有特龎勒居焉耆城葉護餘部保金莎領衆至二十萬唐末為諸蕃所侵部族微弱亦常來朝貢後唐天成二年其首領張慕晉等來朝貢長興二年其首領杜阿熟來朝晉天福六年其首領遣使薛同海以下十七人來朝貢鐡勒鐡勒之先胸奴之苖裔也種類最多自西海之東依據山谷往往不絶獨洛河北有僕骨同羅韋紇拔野古覆羅並號俟斤蒙陳吐如紇期結渾斛薛等諸姓勝兵可二萬伊吾以西焉耆之北傍白山則有契弊薄落職乙嘻蘇婆那曷烏護骨紇也嘻於尼護等勝兵可二萬金山西南有薛延陀嘻勒兒十盤達契等萬餘兵康國北傍阿得水則有訶嘻曷嶻撥忽吨千貝海曷比悉阿嵯蘇拔也未渴達等三萬餘兵傍嶷海東西蘇路羯三索咽蔑促薛忽等諸姓咽因結反八千餘兵拂菻東則有恩屈阿蘭北振九離伏嗢昏等嗢烏沒反近二萬人北海南則都波等雖姓氏各别總謂為鐡勒並有君長屬東西兩突厥隨水草流移人性凶忍善于騎射貪婪尤甚以冦掠為生近西邉者頗為藝植多牛羊而少馬突厥國有東西征討皆資其用以制北荒十六國慕容垂時塞北後魏末河西並云有敕勒部鐡勒蓋言訛也隋大業元年突厥處邏可汗擊鐡勒諸部厚其稅斂又猜忌薛延陀等恐為變遂集其魁帥數百人盡誅之由是一時反叛拒處邏遂立俟利發俟斤契弊歌楞為易勿真莫河可汗居貪汗山復立薛延陀內俟斤字也嘻為小可汗處邏既敗莫河始大焉甚得衆心為鄰國所憚伊吾髙昌焉耆諸國悉附之其俗大抵與突厥同唯丈夫婚畢就便妻家待産乳男然後歸此其異也大業三年遣使貢方物自是不絶薛延陀薛延陀鐡勒之别部前燕慕容俊時胸奴單于賀刺頭率部三萬五千來降陀蓋其後與薛部雜居因號薛延陀可汗姓一利吐氏代為強族初蠕蠕之滅也並屬於突厥而部中分在鬱督軍山者東屬于始畢在貪汗山者屬於葉護其主夷男唐貞觀中遣使朝聘為毗伽可汗居大漠之北俱淪水南去長安萬四千餘里後鐡勒僕骨同羅共擊薛延陀大敗太宗以其破亡遣江夏王道宗左衛大將軍阿史那社爾為瀚海道安撫使初薛延陀真珠毗伽可汗遣使請婚太宗許以女妻之徴可汗備親迎之禮詔幸靈州與之禮會延陀先無府藏調斂其國且行萬里既涉沙磧無水草而羊馬多死遂後期太宗于是停幸靈州既而聘羊馬損耗將半於是返其使者羣臣或云許公主以妻延陀邉境得以休息納其獻聘不可失信於蕃人宜在速成太宗曰君等知古而不知今昔漢家胸奴強而中國弱所以厚飾子女嫁與單于今中國強而北狄弱漢兵千人堪擊其數萬延陀所以伏服稽顙恣我所為不敢驕慢者以新得立為君長雜居非其夲屬將倚大國用服其衆彼同羅僕骨等十餘部落兵各數萬足制延陀所以不敢發者以延陀為我所立懼中國也若今以女妻之大國子壻增崇其禮深結黨援雜姓部落更尊服之夷狄之人豈知恩義微不得意勒兵南下所謂養獸自噬也今不與其女使命頗簡諸姓部落知吾棄之其爭擊延陀必矣既而李思摩數侵掠之延陀復使突利失冦定襄掠百姓太宗遣英國公李績援之虜已出塞而還太宗以璽書責讓之可汗乃遣使致謝復請發兵助軍太宗優詔答而止焉會毗伽可汗卒子拔灼立時王師征遼謀入冦知有備不果拔灼性卞尅好殺國人不安其貴臣阿波設率衆與唐使者遇於靺鞨東鄙小戰不利還怖國人曰唐兵至矣衆大擾諸部遂潰拔灼遁去俄為回紇所殺盡屠其宗立毗伽昆弟子咄摩支為可汗上言願保鬱督軍山帝詔崔敦禮與李績慰安之隂詔績等曰降則撫之叛則擊之績至咄摩支大駭隂欲拒戰外好言乞降績縱兵擊斬五千餘級係老弱三萬遂滅其國咄摩支丐降拜右武衛將軍賜田宅後三年餘部叛以右領軍大將軍失執思力討平之永徽時延陀部亡散者悉還髙宗為置溪彈州處安之僕骨僕骨者鐡勒之别部習俗與突厥略同在多濫東境勝兵萬餘與同羅宿敦鄰好最居北偏先臣于頡利苦頡利亂政後附薛延陀貞觀中遣使朝貢及延陀之滅也其大酋婆匐使利發歌藍伏延詣闕內附同羅同羅者鐡勒之别部也在薛延陀之北去長安萬七千五百里户萬五千俗與突厥略同初臣頡利苦頡利之政亂太宗時其酋俟利發時健啜遣使內附中間無聞洎天寶初其酋帥阿布思以萬餘帳來降處之朔方河南之地給其廩食每嵗仍費繒絮數十萬假其河曲郡縣倉廩為之空虛至十年背叛劫掠諸姓部落遂還漠北尋為回紇所破黨衆離散阿布思後奔葛邏祿北庭節度程千里購之以獻戮於京師安祿山反劫其兵用之號曵落河曵落河猶言健兒云都波都波者鐡勒别種南去回紇十三日行分為三部自相統攝結草為廬無牛羊不知耕稼土多百合草取其根以為糧兼捕魚射獵為食而衣貂鹿之皮貧者緝鳥羽以為服婚姻富者以馬貧用鹿皮及草根為聘禮死亡以木匱盛尸置山中或懸於樹上送葬哭泣略與突厥類莫知四時之候國無刑罰偷盜倍徴其贓貞觀二十一年遣使朝貢拔野古拔野古亦鐡勒之别部在僕骨東境勝兵萬其地豐草盛人皆殷富其酋俟利發屈利失貞觀二十一年舉其部來降其地東北千餘里曰康干河投松木入水二年乃化為石其色青有國人居住其人謂之康干石其松為石以後仍似松文人皆著木腳氷上逐鹿以耕種射獵為業國多好馬又出鐡風俗與鐡勒同言語稍别唐貞觀三年與僕骨同羅奚霫同入朝二十一年大俟利發屈利失舉部內屬置幽陵督府拜屈利失右武衛大將軍即為都督顯慶時與思結僕固同羅叛遣鄭仁泰討斬其渠帥天寶間能自來朝多濫葛多濫葛在薛延陀東濵同羅水勝兵萬人自古未嘗通中國延陀已滅其酋俟斤多濫葛末與回紇皆朝以其地為燕然都督府就授其酋世為都督斛薛斛薛亦鐡勒之别部在多濫葛北境兩姓合居勝兵七千既來朝列其地為州縣阿跋阿跋亦鐡勒之别部在多濫葛西北勝兵千七百隋代號訶㗌部是也遷徙無常所唐初來朝以地為雞田州開元中􅎤跌思泰自突厥來其後光顔光進皆以戰功至大官賜姓李氏附屬籍契苾羽契苾亦曰契苾羽在焉耆西北鷹娑川多濫葛之南其酋哥楞自號可汗弟莫賀咄特勒皆有勇莫賀咄死子何力紐率其部來歸時貞觀六年也詔處之甘涼間以其地為榆溪州永徽四年以其部為賀蘭都督府𨽻燕然都護何力有戰功忠節臣也太和中其種帳附于振武云鞠國鞠國在拔野古東北五百里六日行至其國有樹無草但有地苔無羊馬家畜鹿如中國牛馬使鹿牽車可勝三四人人衣鹿皮食地苔其俗聚木為屋尊卑共處其中俞俞國在鞠國東十五日行其土地寬大百姓衆多風俗與拔野古同少牛馬多貂鼠大漠大漠國在鞠國北饒羊馬人極長大長者至丈三四尺問其國云北有骨師國與大漠相接白霫白霫居鮮卑故地直京師東北五千里與同羅僕骨接避薛延陀保奧支水冷陘山南契丹北烏羅渾東靺鞨西拔野古地圓袤二千里山繚其外勝兵萬人業射獵以赤皮緣衣婦貫銅釧以子鈴綴襟其部有三曰居延曰無若沒曰潢水其君長臣突厥頡利可汗為俟斤唐貞觀中再來朝後列其地為置顔州以别部為居延州即用俟斤為刺史顯慶五年授酋長李含珠為居延都督含珠死弟厥都繼之後無聞焉庫莫奚庫莫奚其先東部鮮卑宇文之别種初為慕容皓所破遺落者竄匿松漠之間其地今栁城郡之北其俗甚不潔而善射獵好為冦掠魏登國三年道武親自出討至弱水南大破之獲馬牛羊豕十餘萬魏既入中原諸種與庫莫奚滋盛及開遼海置戍和龍諸夷震懼各獻方物文成獻文之世嵗致名馬孝文二十年入冦安州擊走之後復欵附求入塞交易許之嵗常朝獻至武定以來不絶齊時亦入貢及突厥興而臣屬之後稍強盛分為五部一曰辱紇主二曰莫賀弗三曰契箇四曰木崑五曰室得理饒樂水北即鮮卑故地一曰如洛環水蓋饒樂之訛也每部置俟斤一人為其帥隨逐水草頗同突厥有阿會氏五部中為盛諸部皆歸之其俗死者以葦薄裹尸懸之樹上其後欵附至隋代號曰奚突厥稱蕃人後亦遣使入朝奚部落並在今栁城郡東北二千餘里唐開元五年二月奚首領李大酺入朝封從外甥女辛氏為固安公主以妻之八年大酺戮死共立其弟魯蘇為主請仍以固安公主為妻允之契丹可突于反脅奚衆附突厥魯蘇不能制奔榆關趙含章討平之衆稍自歸明年酋李詩部落五千帳來降以其地為歸義州授其酋都督李詩死子延寵嗣後與契丹叛詔立他酋婆固為都督昭信王以定其部落元宗世八入朝獻至德以後朝獻不絶元和元年君梅落身入朝拜檢校司空歸誠郡王賜姓李氏然隂結回鶻室韋兵犯西城振武憲宗世四朝獻太和四年復冦邉盧龍李載義破之大中元年北部諸山奚悉叛盧龍張仲武禽酋渠燒帳落二十萬咸通九年其王入朝是後契丹方強奚不敢亢而舉部役屬當唐之末居隂涼川在營府之西幽州之西南皆數百里有人馬二萬騎分為五部一曰阿薈部二曰啜米部三曰粵質部四曰奴皆部五曰黑訖支部後徙居琵琶川在幽州東北數百里地多黑羊馬􅦇前蹄堅善走其登山逐獸下上如飛契丹阿保機強盛室韋奚霫皆服屬之奚人常為契丹守界上而苦其苛虐奚王去諸怨叛以别部西徙媯州依北山射獵常採北山麝香人參賂劉守光以自託其族至數千帳始分為東西奚去諸之族頗知耕種嵗借邉民荒地種穄秋熟則來穫窖之山下人莫知其處爨以平底瓦鼎煮穄為粥以寒水解之而飲去諸卒子掃剌立後唐莊宗滅劉守光賜掃剌姓李更其名紹威卒子拽剌立同光以後紹威父子數遣使朝貢初紹威娶契丹女舍利逐不魯之姊為妻後逐不魯叛亡入西奚紹威納之晉髙祖入立割幽州鴈門以入於契丹是時紹威與逐不魯皆已死耶律德光已立晉北歸拽剌迎謁馬前德光曰非爾罪也負我者掃剌與逐不魯爾乃發其墓粉其骨而揚之後德光滅晉拽剌常以兵從其後不復見于中國自去諸徙媯州自别為西奚而東奚在琵琶川者亦為契丹所并不復能自見云文獻通考卷三百四十四
