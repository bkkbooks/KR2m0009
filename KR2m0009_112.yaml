body:
  text: 文獻通考卷一百十二鄱陽馬端臨貴與著王禮考七君臣冠冕服章秦滅禮學郊社服用皆以袀元以從冕旒前後邃延蔡邕獨斷曰袀繒也以水徳尚袀音均漢承秦敝西京二百餘年猶未能有所制立漢舊儀凡齋皆衣元紺繒也衣絳領褎緣絝䌩涑革帶鴻紺幘長冠絣青衣幘領褎絝䌩白帶求兩皁緣衣貙婁霜幘衣冬射獵衣流黄仲夏衣黄西漢史不言朝祭服章之制惟漢舊儀所載如此然其説終不眀白云文帝時賈誼上疏曰今民賣僮者僮謂隸妾為之繡衣絲履偏諸緣服䖍曰如牙條以作履緣師古曰偏諸若今之織成以為要襻及褾領者也古謂之車馬裙其上為乘車及騎從之象也内之閑中閑賣奴婢門是古天子后服所以廟而不宴者也入廟則服之宴處則不著蓋貴之也而庶人得以女婢妾白縠之表薄紈之裏緁以偏諸晉灼曰以偏諸緁著衣也師古曰緁音妾謂以偏諸緶著之也緶音歩千反美者黼繡黼者織為斧形繡者刺為衆文是故天子之服今富人大賈嘉㑹召客者以被墻古者以奉一帝一后而節適得其節而合宜今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皂綈綈厚繒也而富民墻屋被文繡天子之后以緣其領庶人嬖妾緣其履此臣所謂舛也宣帝時魏相采易隂陽及眀堂月令奏曰天子之義必純取法天地而觀於先聖高皇帝所述書天子所服第八第八天子衣服之制於施行詔第八曰大謁者臣章受詔長樂宫曰令羣臣議天子所服以安治天下相國臣何御史大夫臣昌蕭何周昌謹與將軍臣陵王陵太子太傅臣通叔孫通等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年夀永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春應劭曰四時各舉所施行政事服䖍曰主一時衣服禮物朝祭百事也李舜舉夏兒湯舉秋貢禹舉冬高帝時自有一貢禹四人各職一時大謁者襄章奏制曰可按西漢服章之制於史無所考見班固叙傳言漢初定與民無禁師古注謂漢不設車旗衣服之禁今觀賈誼所言可見然魏相奏謂高皇帝書有天子所服第八則服制未嘗無其書相所奏既不詳備而史記無𫝊焉蓋周之經制歴春秋戰國數百年典籍湮沒不存及七雄僭王國自為政尤無所究詰秦出自西戎不習禮文之事而其立意大槩欲是今而非古尊己而卑人故滅六國之後獲其君之冠則以賜侍人獲其君之車則以為副車又烏能參考損益以復先王車旗衣服之制漢初用事者椎朴少文不過盡遵秦規而已後漢眀帝永平二年春正月辛未宗祀光武皇帝於眀堂帝及公卿列侯始服冠冕衣裳玉佩絇履以從事漢官儀曰天子冠通天諸侯王冠逺遊三公諸侯冠進賢三梁卿大夫尚書二千石博士冠兩梁二千石以下至小吏冠一梁天子公卿特進諸侯祀天地眀堂皆冠平冕天子十二旒三公九卿諸侯七其纓各如其綬色永平二年初詔有司采周官禮記尚書臯陶篇天子冕服從歐陽氏説乘輿備文日月十二章刺繡文三公九卿特進侯朝侯侍祠侯從夏侯氏説三公諸侯用山龍九章九卿以下用華蟲七章皆備五采大佩赤舄絇履以承大祭冕皆廣七寸長尺二寸前圓後方朱綠裏元上前垂四寸後垂三寸繫白玉珠為十二旒蔡邕獨斷云九旒也以其綬采色為組纓三公諸侯七旒青玉為珠卿大夫五旒黑玉為珠皆有前無後各以其綬采為組纓旁垂黈纊郊天地祀眀堂則冠之衣裳玉佩備章采其大佩則衝牙雙瑀璜皆以白玉乘輿絡以白珠公卿諸侯以采絲百官執事者冠長冠即劉氏冠也以高祖所冠故以為祭服皆祗服五嶽四瀆山川宗廟社稷諸壇秩祠皆袀元服絳緣領袖為中衣絳襪示其赤心奉神也其五郊迎氣衣幘袴襪各如方色云百官不執事者各服長冠袀元以從大射於辟雍公卿諸侯大夫行禮者冠委貎衣元端素裳鄭元曰端者取其正也鄭衆曰衣襦裳為端執事者冠布弁衣緇麻衣皁領袖下素裳若冠通天冠服深衣之制有袍隨五時色梁劉照曰袍者或曰周公抱成王宴居故施袍孔子衣逢掖之衣逢掖其袖合而逢大似近今袍者也今下至賤吏小史皆通制袍單衣皁緣領袖中衣為朝服云凡冠衣諸服旒冕長冠委貎皮弁爵弁建華方山巧士衣裳文繡赤舄服絇履大佩皆為祭服其餘悉為常用朝服唯長冠諸王國謁者以為常朝服云宗廟以下祠祀皆冠長冠皁繒袍單衣絳緣領袖中衣絳絝袜五郊各從其色焉東觀記永平二年正月公卿議南北郊東平王蒼議曰高皇帝始受命創業制長冠以入宗廟光武受命中興建眀堂立辟雍陛下以聖眀奉遵以禮服龍衮祭五帝禮缺樂崩久無祭天地冕服之制接尊事神潔齊盛服敬之至也日月星辰山龍華藻天王衮冕十有二旒以則天數旂有龍章日月以備其文今祭眀堂宗廟圓以法天方以則地服以華文象其物宜以降神肅雝備思博其𩔖也天地之禮冕冠裳衣宜如眀堂之制蓋古者君臣佩玉尊卑有度上有如今蔽膝貴賤有殊佩所以章徳服之衷也所以執事禮之共也故禮有其度威儀之制三代同之五伯迭興戰兵不息佩非戰器非兵旗於是解去紱佩留其繫璲徐廣曰今名璲為縌以章表之故詩曰鞙鞙佩璲此之謂也鞙鞙佩玉貌璲瑞也鄭元箋曰佩璲者以瑞玉為佩佩之鞙鞙然紱佩既廢秦乃以采組連結於璲光眀章表轉相結受故謂之綬漢承秦制用而弗改故加之以雙印佩刀之飾至孝眀皇帝乃為大佩衝牙雙瑀璜皆以白玉乘輿絡以白珠公卿諸侯以采絲其視冕旒為祭服云魏氏多因漢法其所損益之制無聞通典按後漢志孝眀皇帝永平二年詔從歐陽夏侯二家所説制冕服乘輿刺繡文公卿以下織成文據晉志云魏眀帝以公卿衮黼之飾擬於至尊多所減損始制服刺繡公卿織成未詳孰是晉受命遵而無改天子郊祀天地眀堂宗廟元會臨軒介幘通天冠平冕冕皁表朱綠裏廣七寸長二尺二寸加於通天冠上前圓後方垂白玉珠十有二旒以朱組為纓無緌佩白玉華珠黄大旒綬黄赤紺縹上敷沼反下右暗反四采衣皁上絳下前三幅後四幅衣畫而裳繡為日月星辰山龍華蟲藻火粉米黼黻之象凡十二章素帶廣四寸朱裏以朱緣裨音卑服冕也飾其側中衣以絳緣其領袖赤皮為絳袴袜望發反赤舄未加元服者空頂介幘其釋奠先聖則皁紗袍絳緣中衣絳袴袜黑舄其臨軒亦衮冕也其朝服通天冠高九寸金博山顔黑介幘絳紗袍皁緣中衣其拜陵黑介幘單衣其雜服有青赤黄白緗黑色介幘五色絳袍五梁進賢冠逺遊冠平上幘武冠其素服白㡊苦洽反單衣後漢以來天子之冕前後旒用真白玉珠魏眀帝好婦人之飾改以珊瑚珠晉初仍舊不改及過江服章多闕而冕飾以翡翠珊瑚雜珠侍中顧和奏舊禮冕十二旒用白玉珠今美玉難得不能備可用白璇音旋珠從之革帶古之鞶帶也謂之鞶革文武衆官牧守丞令下及騶寺皆服之其有囊綬則以綴於革帶其戎服則以皮絡帶代之八座尚書荷紫以生紫為袷古洽字囊綴之服外加於左肩昔周公負成王制此服衣至今以為朝服或云漢時用盛音成奏事負之以行未詳也袴褶之制未詳所起近世凡車駕親戎中外戒嚴服之服無定色冠黑㡌綴紫褾褾以繒為之長四寸廣一寸腰有絡帶以代鞶中官紫褾外官絳褾又有纂嚴戎服而不綴褾行留文武悉同其畋獵廵幸則惟從官戎服帶鞶革文官不下纓武官服冠漢制一嵗五郊天子與執事者所服各如方色百官不執事者服常服絳衣以從魏祕書監秦静曰漢氏承秦改六冕之制但元冠絳衣而已魏已來名為五時朝服又有四時朝服自皇太子已下隨官受給百官雖服五時朝服據今止給四時朝服闕秋服三年一易諸假印綬而官不給鞶囊者得自具作其但假印不假綬者不得佩綬鞶古制也漢世著鞶囊者側在腰間或謂之傍囊或謂之綬囊然則以紫囊盛綬也或盛或散各有其時笏古者貴賤皆執笏其有事則搢之於腰帶所謂搢紳之士者搢笏而垂紳帶也紳垂長三尺笏者有事則書之故常簪筆今之白筆是其遺象三臺五省二品文武簪之王公侯伯子男卿尹及武官不簪加内侍位者乃簪之手版即古笏矣尚書令僕射尚書手版頭復有白筆以紫皮囊之名曰笏宋因之宋制平天冕服不易舊法更名曰蔽膝未加元服釋奠先聖視朝拜陵等服及雜色紗裙武冠素服並沿舊王公助祭郊廟章服降殺亦如之冠委貎者衣黑而裳素中衣以皁領袖元冠韋弁絳韋戎衣復依漢法袴褶因晉不易腰有絡帶以代鞶革中官紫褾外官絳褾又有纂嚴戎服而不綴褾行留文武悉同畋獵廵幸唯從官戎服帶鞶革元嘉中廵幸蒐狩救廟水火皆如之眀帝泰始四年詔曰車服之飾象數是遵故盛皇留範列聖垂制服近改定今修成六服沿時變禮所施之事各有條叙便可載之典章朕以大冕純玉繅元衣黄裳祀天宗眀堂又以法冕元衣絳裳祀太廟元正大㑹朝諸侯又以飾冕紫衣紅裳小㑹宴亭送諸侯臨軒㑹王公又以繡冕朱衣裳征伐講武校獵又以紘冕青衣裳耕稼享國子又以通天冠朱紗袍為聽政之服泰始六年正月有司奏被勅皇太子正冬朝賀合著衮冕九章下儀曹郎邱仲起議按周禮公自衮冕以下鄭注衮冕以至卿大夫之元冕皆其朝聘天子之服也伏尋古之上公尚得服之皇太子以倅副之尊率土瞻仰愚謂宜式遵盛典服衮九章以朝賀詔可齊因宋制平天冠服不易舊法郊廟臨朝所服也舊衮服用織成建武中眀帝以織太重乃采畫為之如金飾銀薄時亦謂為天衣通天冠服絳紗袍皁緣中衣乘輿臨朝所服臣下皆同拜陵則黑介幘服無定色舉哀臨䘮白袷單衣亦謂之素服王公助祭平冕服山龍以下九章卿七章皆畫皁絳繒為之袴褶相因不改梁因齊制平天冠服衣畫而裳繡十二章素帶朱裏以朱緣裨飾其側更名赤皮為鞸或云鞸之名其來已久餘同舊法又有通天冠服絳紗袍皁緣中衣黑是為朝服元正賀畢還儲更衣出所服也其釋奠先聖則皁紗袍絳緣中衣絳袴韈黑舄拜陵則箋布單衣又有白袷單衣以代古之疑縗天監三年何佟之議公卿以祭服裏有中衣即今中單也後漢從夏侯氏説祭服絳緣領袖為中絳袴韈示其赤心奉神也今中衣絳緣足有所眀無俟於袴既非聖法謂不可施遂依議除之七年周舍議按禮有虞氏皇而祭深衣而養老鄭元云皇是畫鳳皇羽也又按禮加衮冕則衮是衣有虞氏言皇皇亦是衣非冕今衮服宜畫鳳皇以示差降又王僧崇云尋冕服無鳳應改為翟又裳有圓花於禮無礙是畫飾如葩蘤耳蘤音于美反藻米黼黻並乖古制今請改正並去圓花帝曰古日月星辰此以一辰攝三物也山龍華蟲又以一山攝三物也藻火粉米又以一藻攝三物也是為九章今衮服畫龍則宜畫鳳孔安國云華者花也則為花非疑若一向畫翟差降之文復將安寄帝又曰禮王祀昊天服大裘而冕大裘不存其於質敬恐未有盡五經博士陸瑋等並云王祀昊天服大裘眀諸臣禮不得同自魏以來皆用衮服今請依古更制大裘詔可瑋等又按鄭元注司服云大裘羔裘也既無所出未為可據按六冕之服皆元上纁下今宜以繒為之其制式如裘其裳以纁皆無文繡詔可又制黑幘單衣宴㑹服之九年司馬筠等議云按玉藻諸侯元冕以祭裨冕以朝雜記又云大夫冕而祭於公弁而祭於已今之尚書上異公侯下非卿士止有朝衣本無冕服既從齋祭不容同於在朝宜依太常及博士諸齋官例著白衣絳襈中單竹葉冠陳因之永定元年武帝即位徐陵曰乘輿御服皆採梁制帝曰今天下初定務從節儉應用繡織成者並可彩畫至文帝天嘉初悉改易之其皇太子絳紗袍皁領白紗中衣白帶大小㑹祠廟朔望五日還朝皆朝服常還上宫則朱服若釋奠及朝絳緣中單絳袴襪元舄侍祀衮衣九章白紗絳緣中單絳繒韠赤舄絳韈皇太子舊有五時朝服自梁天監之後則朱服諸王朝服朱衣絳紗袍皁緣中衣素帶黑舄若加餘官則服其加官之服開國公侯伯子男並朝服紗朱衣若助祭郊廟皆衮元上纁下山龍以下九章備五采大佩赤舄絇履餘文官朝服武賁中郎將羽林監絳紗縠單衣州刺史絳朝服直閤將軍諸殿主帥朱衣正直絳衫從則襧襠衫太子衛率率更令丞皁朝服殿中將軍員外將軍州郡都尉司馬中通事舍人太子通事等並朱服元衣赤幘袴褶太子二傅所服武冠絳褠殿前威儀武賁散給使閤將鼓吹士帥副太子鹵簿㦸吏所服後周設司服之官掌皇帝十二服祀昊天上帝則蒼衣五方上帝各隨方色朝日用青衣祭皇地祇用黄衣夕月用素衣神州社稷用元衣享先皇加元服納后朝諸侯則十二章享諸先帝食三老五更耕籍等自龍以下九章祀星辰視朝大射饗羣臣等八章羣祀臨太學入道法門燕射養庶老適諸侯家七章其九章以下衣重衮山鷩裳重黼黻俱十有二等通以升龍為領褾廵兵即戎則韎韋為衣裳田獵則皮弁白布衣而素裳也諸公之服九章服之章數隨冕而降其一其八章以下衣重藻粉米裳重黼黻俱九等皆以山為領褾諸侯服八章而下俱八等皆以華蟲為領褾諸伯皆七章而下俱七等以火為領褾諸子服六章俱六等皆以宗彜為領褾諸男服五章皆以藻為領褾三公之服有九章有六衣重藻與粉米裳重黼黻俱為九等皆以宗彜為領褾三孤之服有八章有五衣重藻與粉米裳重黼黻為八等公卿服有七章有四衣重粉米裳重黼黻為七等皆以粉米為領褾大夫之服有六章有三衣重粉米裳重黼黻為六等中大夫之服有五章有三衣重粉米為五等下大夫服有四章有三衣重粉米為四等士則祀弁爵弁元冠服皆元衣其裳上士以元中士以黄下士雜裳謂前元後黄庶士元冠服其在官府吏之屬服緇衣裳武帝初服常冠以皁紗全幅向後幞髮仍裁為四脚致堂胡氏曰君子大復古重變古非泥於古也以生人之具皆古之聖人因時制宜各有法象意義不可以私智更改之也用歩卒而車戰法亡開阡陌而井地法亡建郡縣而封建法亡以日易月而通䘮之禮廢從事鞍馬而轡軾之儀絶習為便易而冕黻不復用尚以盃案而簋席不復施大抵視便利為安日趨於茍簡而聖王所作法象意義不復可見有天下者以智力得之凡所施設是今而非古如宣帝所謂漢家自有制度者豈不可歎之甚哉以周家紗幞一事論之此後世巾幘朝冠之所自始也古者賔祭䘮燕戎事其冠皆各有所宜紗幞既行諸冠由此漸廢紗而用漆更為兩帶上結兩帶後垂蓋自李唐以來而已然矣此又四脚之變也自是以後則又以大帶之垂者左右横之而其頂則起後平前方為六角若天子侍衛之近者則又武其一脚翹其一脚稽之法象果何所則求之意義果何所據然而行之數百年莫有以為非也至於總而簪弁則屬之道家者流非道家之得也乃自老莊而後為之徒者其服變革未盡猶有古士服之餘製焉耳治天下者莫大於禮禮莫眀於服服莫重於冠必欲盡善其必考古而立制夫亦何獨冠為然哉宣帝既傳位於太子自稱天元皇帝所居稱天臺冕二十四旒車服旗鼓皆加於前王之數既自比上帝不欲羣臣同已常自帶綬及冠通天冠加金附蟬顧見侍臣弁上有金蟬及王公有綬者並令去之隋高祖將改周制下詔曰朕初受天命赤雀來儀兼姬周已還於兹六代三正廻復五徳相生總以言之並宜火色垂衣已降損益可知尚色雖殊常兼前代其郊丘廟社可依衮冕之儀朝㑹衣裳宜盡用赤昔丹烏木運姬有太白之旗黄星尚徳曹乘黑首之馬在祀與戎其尚恒異今之戎服皆可尚黄在外常所著者通用雜色祭祀之服須合禮經宜集通儒詳議太子庶子攝太常少卿裴正奏曰竊見後周制冕加為十二既與前禮數乃不同而色應五行又非典故謹按三代之冠其名各别六等之冕承用區分璪玉五采隨班異飾都無迎氣變色之文唯月令者起於秦代乃有青玉赤玉白駱黑衣與四時而色變全不言於弁冕五時冕色禮既無文稽於正典難以經證且後魏以來制度咸闕天興之嵗草創繕修所造車服多參胡制故魏収論之稱為違古是也周氏因襲將為故事大象承統咸取用之輿輦衣冠甚多迂怪今皇隋革命憲章前代其魏周輦輅不合制者已勅有司盡令除廢然衣冠禮器尚且兼行乃有立夏衮衣以赤為質迎秋平冕用白成形既越典章須革其謬謹按續漢書禮儀志云立春之日京都皆著青衣秋夏悉如其色逮於魏晉迎氣五郊行禮之人皆同此制考尋故事唯幘從衣色今請冠及冕色並用元唯應著幘者任依漢晉制曰可於是定令採用東齊之法乘輿衮冕垂白珠十有二旒以組為纓色如其綬黈纊充耳玉笄元衣纁裳衣山龍華蟲火宗彛五章裳藻粉米黼黻四章衣重宗彛裳重黼黻為十二等衣褾領織成升龍白紗内單黼領青褾襈裾革帶玉鉤䚢大帶素帶朱裏紕其外上以朱下以綠隨裳色龍火山三章鹿盧玉具劔火珠鏢首白玉雙佩元組雙大綬六采元黄赤白褾緣純元質長二丈四尺五百首廣一尺小雙綬長二尺六寸色同大綬而首半之間施三玉環朱韈赤舄舄加金飾祀圜丘方澤感帝眀堂五郊雩䄍封禪朝日夕月宗廟社稷籍田廟遣上將征還飲至加元服納后正月受朝及臨軒拜王公則服之通天冠加金博山附蟬十二首施珠翠黑介幘玉簪導絳紗袍深衣製白紗内單皁領褾襈裾絳紗蔽膝白假帶方心曲領其革帶劔佩綬舄與上同若未加元服則雙童髻空頂黑介幘雙玉導加寳飾朔日受朝元㑹及冬㑹諸祭還則服之武弁金附蟬平巾幘餘服具服講武出征四時蒐狩大射禡𩔖宜社賞祖罰社纂嚴則服之黑介幘白紗單衣烏皮履拜陵則服之白紗㡌白練裙襦烏皮履視朝聴訟及宴見賔客皆服之白帢白紗單衣烏皮履舉哀則服之程氏演繁露曰隋志宋齊之間天子宴私著白高帽士庶以烏太子在上省則帽以烏紗在永福省則白紗隋時以白㡊通為慶弔之服國子生亦服白紗巾也晉著白接䍦竇苹酒譜曰接䍦巾也南齊垣崇祖守夀春著白紗帽肩輿上城今人必以為怪古未有以白色為忌也郭林宗遇雨墊巾李賢注云周遷輿服雜事曰巾以葛為之形如㡊㡊苦洽反本居士野人所服魏武造㡊其巾乃廢今國子學生服焉以白紗為之是其制皆不忌白也樂府白紵歌曰質如輕雲色如銀制以為袍餘作巾袍以先驅巾拂塵呉兢樂府要解按舊史白紵呉地所出則誠今之白紵列子所謂阿錫而西子之舞所謂白紵紛紛鶴翎亂者是也今世人麗粧必不肯以白紵為衣古今之變不同如此唐六典天子服有白紗帽其下服如裙襦襪皆以白視朝聼訟燕見賔客皆以進御則猶存古制也然其下注云亦用烏紗則知古制雖存未必肯用多以烏紗代之則習見忌白久矣世傳眀皇幸蜀圖山谷間老叟出望駕有著白巾者釋者曰服諸葛武侯也此不知古人不忌白也皇太子衮服元衣纁裳衣山龍華蟲火宗彛五章裳藻粉米黼黻四章織成為之白紗内單黼領青褾襈裾革帶金鈎䚢大帶素帶不朱裏亦紕以朱緑韍隨裳色火山二章玉具劔火珠鏢首瑜玉雙佩朱組雙大綬四綵赤白縹紺純朱質長丈八尺三百二十首廣九寸小雙綬長二尺六寸色同大綬而首半之間施二玉環朱襪赤舄以金飾侍從皇帝祭祀及謁廟加元服納妃則服之逺遊冠服絳紗袍白紗内單皁領褾襈裙白假帶方心曲領絳紗蔽膝韈舄其革帶劔佩綬與上同謁廟還宫元日朔日入廟釋奠則服之逺遊冠公服絳紗單衣革帶金鈎䚢假帶方心紛長六尺四寸廣二寸四分色同其綬金縷鞶囊韈履五日常朝則服之衮冕服九章同皇太子王公開國公初受冊執贄入朝祭祀親迎則服之三公助祭者亦服之鷩冕服七章衣華蟲火宗彜三章裳藻粉米黼黻四章侯伯初受冊執贄入朝祭祀親迎則服之毳冕服五章衣宗彜藻粉米三章裳黼黻二章子男初受冊執贄入朝祭祀親迎服之絺冕服三章正三品以下從五品以上助祭則服之自王公以下服章皆繡為之祭服冕皆簪導青纊充耳元衣纁裳白紗内單黼領絺冕以下内單青領青褾襈裾革帶鈎䚢大帶王三公及公侯伯子男素帶不朱裏皆純其外上以朱下以綠正三品以下從五品以上素帶紕其垂外以元内以黄約皆用青紐朱韍几韍皆隨裳色衮鷩毳火山二章絺山一章劔珮綬韈赤舄爵弁服從九品以上助祭則服之其制服元衣纁裳無章白絹内單青領褾襈裾革帶大帶練帶紕其垂内外以緇紐約用青組爵韠韈赤履白帢白紗單衣烏皮履上下通服之委貎冠未冠則雙童髻空頂黑介幘皆深衣青領烏皮履上下通服四門生服之朝服亦名具服絳紗單衣白紗内單皂領袖皁襈革帶鈎䚢假帶曲領方心絳紗蔽膝韈舄綬劒珮從五品以上陪祭朝饗拜表凡大事則服之六品以下從七品以上去劒珮綬餘並同自餘公事皆從公服亦名從省服絳紗單衣革帶鈎䚢假帶方心韈履紛鞶囊從五品以上陪祭朝饗拜表凡大事則服之六品以下從七品以上去劔珮綬餘並同自餘公事皆從公服亦名從省服絳紗單衣革帶鈎䚢假帶方心韈履紛鞶囊從五品以上服之絳褠衣公服褠衣即單衣不垂胡者也袖狹形直如褠内餘同從省流外五品以下九品以上服之左右衛左右武衛左右武候大將軍領左右大將軍並武弁絳朝服劒珮綬侍從則平巾幘紫衫大口袴褶左右衛左右武衛左右武候將軍領左右將軍左右監門衛將軍太子左右衛左右宗衛左右内率等左右監門郎將及諸副率並武弁絳朝服劒珮綬侍從則平巾幘紫衫大口袴直閤將軍直寢直齋太子直閣武弁絳朝服劔珮綬侍從則平巾幘絳衫大口袴隋文始服黄百官常服同於庶人皆著黄袍帝朝服亦如之惟以十三環為異也致堂胡氏曰服章之設所以辨上下定民志也莫卑乎民莫尊乎天子而服同一色上下無所辨民志何由定僭亂由此而生矣古之聖王自奉儉約惡衣菲食而事天地宗廟臨朝廷百官則等級分眀故冕十有二章黻􅓨幅舄衡紞紘綖以昭其度藻率鞸鞛鞶厲游纓以昭其數威嚴尊重禮無與二然後人主之勢隆非廣已以造大理當然也故晏平仲為大國之卿一狐裘三十年澣衣濯冠以朝君子譏其隘曰難乎其為下也隋文儉約施之宫閫之中燕私之用可也與庶人同服而坐乎廟朝儉不中禮不足以為法矣珽天子之笏長尺二寸方而不折以球玉為之笏度二尺有六寸中博二寸其殺六分去一晉宋以來謂之手版此乃不經今還謂之笏以法古名自西魏以降五品以上通用象牙六品以下兼用竹木煬帝時師旅務殷車駕多行幸百官行從唯服袴褶而軍旅間不便至大業六年後詔從駕渉逺者文武官等皆戎衣貴賤異等襯用五色五品以上通著紫袍六品以下兼用緋綠吏胥以青庶人以白屠商以皂士卒以黄唐制天子之服十四大裘冕者祀天地之服也廣八寸長一尺二寸以板為之黑裘纁裏無旒金飾玉簪導組帶為纓色如其綬黈纊充耳大裘繒表黑羔表為緣纁裏黑領褾襟緣朱裳白紗中單皂領青褾襈裾朱韈赤舄鹿盧玉具劒火珠鏢首白玉雙佩黑組大雙綬黑質黑黄赤白縹綠為純以備天地四方之色廣一尺長二丈四尺五百首紛廣二寸四分長六尺四寸色如綬又有小雙綬長二尺六寸色如大綬而首半之間施三玉環革帶以白皮為之以屬珮綬印章鞶囊亦曰革帶博三寸半加金鏤玉鉤䚢大帶以素為之以朱為裏在腰及垂皆有裨上以朱錦貴正色也下以綠錦賤間色也博四寸紐約貴賤皆用青組博三寸黻以繒為之隨裳色上廣一尺以象天數下廣二尺以象地數長三尺朱質畫龍火山三章以象三才其頸五寸兩角有肩廣二寸以屬革帶朝服謂之鞸冕服謂之黻衮冕者踐阼享廟征還遣將飲至加元服納后元日受朝賀臨軒冊拜王公之服也廣一尺二寸長二尺四寸金飾玉簪導垂白珠十二旒采絲組帶為纓色如綬深青衣纁裳十二章日月星辰山龍華蟲火宗彞八章在衣藻粉米黼黻四章在裳衣畫裳繡以象天地之色也自山龍以下每章一行為等每行十二衣褾領畫以升龍白紗中單黻領青褾襈裾韍繡龍山火三章舄加金飾鷩冕者有事逺主之服也八旒七章華蟲火宗彜三章在衣藻粉米黼黻在裳毳冕者祭海岳之服也七旒五章宗彝藻粉米在衣黼黻在裳絺冕者祭社稷饗先農之服也六旒三章絺粉米在衣黼黻在裳元冕者䄍祭百神朝日夕月之服也五旒裳刺黼二章自衮冕以下其制一也簪導劒珮綬皆同通天冠者冬至受朝賀祭還燕羣臣養老之服也二十四梁附蟬十二首施朱翠金博山黑介幘組纓翠緌玉犀簪導絳紗袍朱裏紅羅裳白紗中單朱領褾襈裾白裙襦絳紗蔽膝白羅方心曲領白韈黑舄白假帶其制垂二絛帛以變祭服之大帶天子未加元服以空頂黑介幘雙童髻雙玉導加寶飾三品以上亦加寶飾五品以上雙玉導金飾六品以下無飾緇布冠者始冠之服也天子五梁三品以上三梁五品以上二梁九品以上一梁武弁者講武出征蒐狩大射禡𩔖宜社賞祖罰社纂嚴之服也有金附蟬平巾幘弁服者朔日受朝之服也以鹿皮為之有攀以持髮十有二􅋒玉簪導絳紗衣素裳白玉雙珮革帶之後有鞶囊以盛小雙綬白韈烏皮履黑介幘者拜陵之服也無飾白紗單衣白裙襦革素韈烏皮履白紗㡌者視朝聽訟宴見賔客之服也以烏紗為之白裙襦白韈烏皮履平巾幘者乘馬之服也金飾玉簪導冠支以玉紫褶白袴玉具裝珠寶鈿帶有鞾白帢者臨䘮之服也白紗單衣烏皮履皇太子之服六衮冕者從祀謁廟加元服納妃之服也白珠九旒紅絲組為纓犀簪導青纊充耳黑衣纁裳凡九章龍山華蟲火宗彝在衣藻粉米黼黻在裳白紗中單黼領青褾襈裾革帶金鉤䚢大帶瑜玉雙珮朱組雙大綬朱質赤白縹紺為純長一丈八尺廣九寸三百二十首黻隨裳色有火山二章白韈赤舄朱履加金塗銀釦飾鹿盧玉具劔如天子逺遊冠者謁廟還宫元日朔日入朝釋奠之服也以具服逺遊冠三梁加金博山附蟬九首施朱翠黑介幘髮纓翠緌犀簪導絳袍紅裳白紗中單黑領褾襈裾白裙襦白假帶方心曲領絳紗蔽膝白韈赤舄朔日入朝通服袴褶公服者五日常朝元日冬至受朝之服也逺遊冠絳紗單衣白裙襦革帶金鉤䚢假帶瑜玉雙珮方心紛金縷鞶囊紛長六尺四寸廣二寸四分色如大綬烏紗㡌者視事及燕見賔客之服也白裙襦烏皮履弁服者朔望視事之服也鹿皮為之犀簪導組纓九􅋒絳紗衣素裳革帶鞶囊小綬雙珮自具服以下皆白韈烏皮履平巾幘者乘馬之服也金飾犀簪導紫褶白袴起梁珠寶鈿帶鞾進徳冠者亦乘馬之服也九􅋒加金飾有袴褶常服則有白裙襦羣臣之服二十有一衮冕者一品之服也九旒青􅋒為珠貫三采玉以組為纓色如其綬青纊充耳寶飾角簪導青衣纁裳九章龍山華蟲火宗彜在衣藻粉米黼黻在裳皆絳為繡遍衣白紗中單黼領青褾襈裾朱襪赤舄革帶鉤䚢大帶黻隨裳色金寶玉飾劒鏢首山元玉珮綠綟綬綠質綠紫黄赤為純長一丈八尺廣九寸二百四十首郊祀太尉攝事亦服之鷩冕者二品之服也八旒青衣纁裳七章華蟲火宗彝在衣藻粉米黼黻在裳銀裝劒珮水蒼玉紫綬素質紫黄赤為純長一丈六尺廣八寸一百八十首革帶之後有金鏤鞶囊金飾劔水蒼玉珮朱韈赤舄毳冕者三品之服也七旒寶飾角簪導五章宗彝藻粉米在衣黼黻在裳韍二章山火紫綬如二品金銀鏤鞶囊金飾劒水蒼玉佩朱韈赤舄絺冕者四品之服也六旒三章粉米在衣黼黻在裳中單青領韍山一章銀縷鞶囊自三品以下皆青綬青質青白紅為純長一丈四尺廣七寸一百四十首金飾劒水蒼玉佩朱韈赤舄元冕者五品之服也以羅為之五旒衣韍無章裳刺黻一章角簪導青衣纁裳其服用紬大帶及裨外黑内黄黑綬紺質青紺為純長一丈二尺廣六寸一百二十首象笏上圓下方六品以竹木上挫下方金飾劔水蒼玉佩朱韈赤舄三品以下私祭皆服之平冕者郊廟武舞郎之服也黑衣絳裳革帶烏皮履爵弁者六品以下九品以上從祭之服也以紬為之無旒黑纓角簪導青衣纁裳白紗中單青領褾襈裾革帶鉤䚢大帶及裨内外皆緇爵韠白韈赤履五品以上私祭皆服之武弁者武官朝參殿庭武舞郎堂下鼓人鼓吹按工之服也有平巾幘武舞緋絲布大褏白練􅗩襠螣蛇起梁帶豹文大口袴烏皮鞾鼓人朱褠衣革帶烏皮履鼓吹按工加白練􅗩襠弁服者文官九品公事之服也以鹿皮為之通用烏紗牙簪導纓一品九􅋒二品八􅋒三品七􅋒四品六􅋒五品五􅋒犀簪導背朱衣素裳革帶鞶囊小綬雙佩白韈烏皮履六品以下去􅋒及鞶囊綬佩六品七品綠衣八品九品青衣進賢冠者文武朝參三老五更之服也黑介幘青緌紛長六尺四寸廣四寸色如其綬三品以上三梁五品以上兩梁九品以上及國官一梁六品以下私祭皆服之侍中中書令左右散騎常侍有黄金璫附蟬貂尾侍左者左珥侍右者右珥諸州大中正一梁絳紗公服殿庭文武郎黄紗袍黑領襈白練􅗩襠白布大口袴革帶烏皮履逺遊冠者親王之服也黑介幘三梁青緌金鉤䚢大帶金寶飾劍玉鏢首纁朱綬朱質赤黄縹紺為純長一丈八尺廣九寸二百四十首黄金璫附蟬諸王則否法冠者御史大夫中丞御史之服也一名解廌冠髙山冠者内侍省内謁者親王司閣謁者之服也委貎冠者郊廟文舞郎之服也有黑絲布大褏白練領褾絳布大口袴革帶烏皮履却非冠者亭長門僕之服也平巾幘者武官衛官公事之服也金飾五品以上兼用玉大口袴烏皮鞾白練裙襦起梁帶陪大仗有裲襠螣蛇朝集從事州縣佐史岳瀆祝史外州品子庶民任掌事者服之有緋褶大口袴紫附褠文武官騎馬服之則去裲襠螣蛇袴褶之制五品以上細綾及羅為之六品以下小綾為之三品以上紫五品以上緋七品以上緑九品以上碧裲襠之制一當胸一當背短袖覆膞螣蛇之制以錦為表長八尺中實以綿象蛇形起梁帶之制三品以上玉梁寶鈿五品以上金梁寶鈿六品以下金飾隠起而已黑介幘國官視品府佐謁府國子太學四門生俊士參見之服也簪導白紗單衣青襟褾領革帶烏皮履朱冠者冠則空頂黑介幘雙童髻去革帶書筭律學生州縣學生朝參則服烏紗㡌白裙襦青領朱冠者童子髻介幘者流外官行署三品以上登歌工人之服也絳公服以縵緋為之制如絳紗單衣方心曲領革帶鈎䚢假帶襪烏皮履九品以上則絳褠衣制如絳公服而狹袖形直如溝不垂緋褶大口絝紫附褠去方心曲領假帶登歌工人朱連裳革帶烏皮履殿庭加白練􅗩襠平巾緑幘者尚食局主膳典膳局典食大官署食官署供膳奉觶之服也青絲布袴褶羊車小吏五辮髻紫碧腰襻青耳屩漏刻生漏童總角髻皆青絲布袴褶具服者五品以上陪祭朝享拜表大事之服也亦曰朝服冠幘纓簪導絳紗單衣白紗中單黑領袖黑褾襈裾白裙襦革帶金鈎䚢假帶曲領方心絳紗蔽膝白韈烏皮舄劒紛鞶囊雙珮雙綬六品以下去劒佩綬七品以上以白筆代簪八品九品去白筆白紗中單以履代舄從省服者五品以上公事朔望朝謁見東宫之服也亦曰公服冠幘纓簪導絳紗單衣白裙襦革帶鈎䚢假帶方心韈履紛鞶囊雙佩烏皮履六品以下去紛鞶囊雙佩三品以上有公爵者嫡子之婚假絺冕五品以上子孫九品以上子爵弁庶人婚假絳公服初隋文帝聽朝之服以赭黄文綾袍烏紗帽折上巾六合韚與貴臣通服唯天子之帶有十三鐶文官又有平頭小様巾百官常服同於庶人至唐高祖以赭黄袍巾帶為常服腰帶者搢垂頭於下名曰䤩尾取順下之義一品二品銙以金六品以上以犀九品以上以銀庶人以鐵既而天子袍衫稍用赤黄遂禁臣民服親王及三品二王後服大科綾羅色用紫飾以玉五品以上服小科綾羅色用朱飾以金六品以上服絲布交梭雙紃綾色用黄六品七品服用綠飾以銀八品九品服用青飾以鍮石勲官之服隨其品而加佩刀礪紛帨流外官庶人部曲奴婢則服紬絹絁布色用黄白飾以鐵銅太宗時又命七品服龜甲雙巨十花綾色用緑九品服絲布雜綾色用青其後以紫為三品之服金玉帶銙十三緋為四品之服金帶銙十一淺緋為五品之服金帶銙十深綠為六品之服淺綠為七品之服皆銀帶銙九深青為八品之服淺青為九品之服皆鍮石帶銙八黄為流外及庶人之服銅鐵帶銙七程氏演繁露曰韓退之詩不知官高卑玉帶垂金魚若從國朝言之則極品有不得兼者然唐制不爾也唐制五品以上皆金帶至三品則兼金玉帶通鑑眀皇開元初勅百官所服帶三品以上聽飾以玉是退之之客皆三品之上亦足詫矣宋朝玉帶雖出特賜須得閣門關子許服方敢用以朝謁則體益以重然唐裴晉公得特賜乃于闐玉也暨病亟具表返諸上方其自占辭曰内府之珍先朝所賜既不合將歸地下又不敢留在人間謹以上進不知故事當進如隨身魚符之𩔖邪抑晉公自以意創此舉也宋朝親王皆服玉帶元豐中創造玉魚賜嘉岐二王易去金魚不用自此遂為親王故事又前世所未有者按此紫緋綠青為命服昉於隋煬帝廵游之時而其制遂定於唐此史傳所紀也然夏侯勝謂士若眀經取青紫如拾地芥揚子雲亦言紆青拖紫丹朱其轂則漢時青紫亦貴官之服西漢服章之制無所考見史言郊社祭服承秦制用袀元袀紺色也東漢則百官之服皆袀元不聞以青紫如淳注雖有五時服至朝皂服皂衣皂衣即元服也豈服章雖用袀元而青紫乃其時貴官燕居之服非㣲賤者所可服歟唐初士人以棠苧襴衫為上服貴女功之始也一命以黄再命以黑三命以纁四命以綠五命以紫士服裋褐庶人以白中書令馬周上議禮無服衫之文三代之制有深衣請加襴袖褾襈為士人上服開骻者名曰缺骻衫庶人服之又請裹頭者左右各三襵以象三才重繫前脚以象二儀詔皆從之太尉長孫無忌又議服袍者下加襴緋紫綠皆視其品庶人以白太宗嘗以幞頭起於後周便武事者也方天下偃兵採古制為翼善冠自服之又製進徳冠以賜貴臣玉􅋒制如弁服以金飾梁花趺三品以上加金絡五品以上附山雲自是元日冬至朔望視朝服翼善冠衣白練裙襦常服則有袴褶與手巾幘通用翼善冠進徳冠制如幞頭皇太子乘馬則服進徳冠九􅋒加金飾犀簪導亦有絝褶燕服用紫其後朔望視朝仍用弁服朱子語録問幞頭所起曰亦不知所起但諸家小説中班駮時見一二如王彥輔塵史猶畧言之某少時尚見唐時小説極多今皆不復存矣唐人幞頭初止以紗為之後以軟遂斫木作一山子在前襯起名曰軍容頭其說以為起於魚朝恩一時人爭效之其先幞頭四角有脚兩脚係向前兩脚係向後後來遂横兩脚以鐵線張之然惟人主得裹此世所畫唐眀皇已裹兩脚者但比今甚短後來藩鎮遂亦僭用想得士大夫因此亦皆用之但不知幾時展得如此長五代時猶是惟人君得裹兩脚者然皆莫可考也桐木山子相承用至本朝遂易以藤織者而以紗冐之近時方易以漆紗嘗見南溪沙漠一士夫家尚収得上世所藏幞頭猶是藤織坯子唐製又有兩脚上下者亦莫可曉又曰幞頭本是偃脚垂下要束得𦂳今却做長脚問横渠說唐莊宗取伶官幞頭帶之後遂成例曰不是如此莊宗在位亦未能便化風俗兼是伶人所帶士大夫亦未肯帶之見畫本唐明皇已帶長脚幞頭或云藩鎮僭禮為之後遂為此樣或云乃是唐宦官要得常似新様故以鐵線挿帶中又恐壞其帶以桐木為一幞頭骨子常令幞頭髙起如新謂之軍容頭後來士大夫學之令匠人為我斫個軍容頭来盖以木為之故謂之斫及唐末宦者之禍人皆以此為讖王彦輔塵史說得有来歴恐是如此後来覺得不安到本朝時又以藤做骨子以紗糊其上後又覺見不安到仁宗時方以漆紗為之髙宗給五品以上隨身銀魚袋以防召命之詐出内必合之三品以金飾袋垂拱中都督刺史始賜魚天授二年改佩魚皆為龜其後三品以上龜袋飾以金四品以銀五品以銅龜袋始於魏唐改魚袋至武后改魚為龜中宗初罷龜袋復給以魚郡王嗣王亦服金魚袋景龍中令特進佩魚散官佩魚自此始也然員外試檢校官猶不佩魚景雲中詔衣紫者魚袋以金飾之衣緋者以銀飾之開元初駙馬都尉從五品者假紫金魚袋都督刺史品卑者假緋魚袋五品以上檢校試判官皆佩魚中書令張嘉貞奏致仕者佩魚終身自是百官賞緋紫必兼魚謂之章服當時服朱紫佩魚者衆矣按炙轂子魚袋古之算袋魏文帝易以龜取其先知歸順之義唐改以魚袋取其合魚符之義自一品至六品以下皆佩唐初卿大夫殁追取魚袋永徽中勅生平在官用為褒飾亡没追収情所不忍五品以下亡殁隨身魚袋不追顯慶元年長孫無忌等曰武徳初撰衣服令天子祀天地服大裘冕按周郊被衮以象天戴冕藻十有二旒與大裘異月令孟冬天子始裘以禦寒若啓蟄祈穀冬至報天服裘可也季夏迎氣龍見而雩如之何可服故歴代唯服衮章漢眀章始采周官禮記制祀天地之服天子備十二章後魏周隋皆如之伏請郊祀天地服衮冕罷大裘又新禮皇帝祭社稷服絺冕四旒三章祭日月服元冕三旒衣無章按今文四品五品之服也三公亞獻皆服衮孤卿服毳鷩是天子同於大夫君少臣多非禮之中且天子十二為節以法天烏有四旒三章之服若諸臣助祭冕與王同是貴賤無分也若降王一等則王服元冕羣臣服爵弁既屈天子又貶公卿周禮此文久不用矣猶祭祀之有尸侑以君親而拜臣子硩蔟蟈氏之職不通行者蓋多故漢魏承用衮冕今新禮親祭日月服五品之服請循歴代故事諸祭皆用衮冕制曰可無忌等又曰禮皇帝為諸臣及五服親舉哀素服今服白袷禮令乖舛且白袷出近代不可用乃改以素服自是鷩冕以下天子不復用而白袷廢矣武后延載元年五月内出繡袍以賜文武三品以上官其袍文仍各有訓誡諸王飾以磐石及鹿宰相飾以凰池尚書飾以對鴈左右衛將軍飾以對麒麟左右武衛飾以對虎左右鷹揚衛飾以對鷹左右千牛衛飾以對牛左右豹韜衛飾以對豹左右玉鈴衛飾以對鶻左右監門衛飾以對獅子左右金吾衛飾以對豸又銘其襟帶各為八字廻文其詞曰忠正貞直崇慶榮職文昌翊政勲彰慶陟懿冲順彰義忠慎光廉正躬奉謙感忠勇元宗開元四年二月制軍將在陣賞借緋紫本是從戎缺骻之服一得之後遂别造長袍逓相倣效又入蕃使則勅借緋紫者使廻合停自今以後衙内宜專定殿中侍御史糾察唐初賞朱紫者服於軍中其後軍將亦賞以假緋紫有從戎缺骻之服不在軍者服長袍或無官而冐衣緑有詔殿中侍御史糾察諸衛大將軍中郎以下給袍者皆易其繡文千牛衛以瑞牛左右衛以瑞馬驍衛以虎武衛以鷹威衛以豹領軍衛以白澤金吾衛以辟邪八年勅諸笏三品已上前詘後直五品以上前詘後挫並用象九品以上任用竹木上挫下方聽依品爵報笏假版官者亦依此例張九齡傳九齡體有藴籍故事公卿皆搢笏於帶而後乘馬九齡獨常使人持之因設笏囊自九齡始徳宗貞元十五年膳部郎中歸崇敬以百官朔望朝服袴褶非古禮上疏云按三代典禮兩漢史籍並無袴褶之制亦未詳所起之由隋代以來始有服者請罷之詔可按袴褶魏晉以來以為車駕親戎中外戒嚴之服晉制雖有其說而不言其制然既曰戒嚴服之必戎服也至隋煬帝時廵游無度詔百官從行服褶袴軍旅間不便遂令改服戎衣為紫緋緑青之服則所謂袴褶者又似是褒衣長裾非鞍馬征行所便者與戒嚴之説不𩔖唐時以袴褶為朝見之服開元以來屢勑百官朝參應服袴褶而不服者令御史糾彈治罪盖以為六品以下之通服韻書訓褶為袴又為袷也然袴裳也袷衣之交領也則不知所謂袴褶者一物乎二物乎唐輿服志羣臣服條内有緋褶大口袴則似是二物然不知所謂緋褶者衣乎裳乎當俟精識考古之士而訂之復考畢仲衍中書備對冕服條下袴褶注云紫緋緑各從本服白綬中單白羅方心曲領白綾袴本品官導駕則騎而從之詳其説所謂紫緋緑即後來之公服而非祭服朝服也祭服青衣朝服緋衣不分紫緋綠三等但所謂白綬者今之公服所無而中單白羅方心曲領後之衣公服者亦未嘗服之盖古人盛服必有中單冕弁朝祭之服皆有之多以白為之而緣以朱繡之屬意公服之初制亦必有此後來流傳既久寖從簡便而朝服之裏所衣者非中單乃流俗不經之服如所謂紫袍皂之𩔖是也文獻通考卷一百十二
