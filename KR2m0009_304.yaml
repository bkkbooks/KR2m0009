body:
  text: 文獻通考卷三百四鄱陽馬端臨貴與著物異考十恆暘春秋僖公二十一年夏大旱董仲舒劉向以為齊桓既死諸侯從楚僖尤得楚心外倚強楚炕陽失衆又作南門勞民興役諸雩旱不雨略皆同説宣公七年秋大旱是夏宣與齊侯伐萊襄公五年秋大雩先是楚伐宋取彭城鄭畔中國附楚襄與諸侯共圍彭城城鄭虎牢以禦楚有炕陽動衆之應八年九月大雩時作三軍季氏盛二十八年八月大雩先是比年晉使荀吳齊使慶封來聘是夏邾子來朝襄有炕陽自大之應昭公三年八月大雩劉歆以為昭公居喪不哀炕陽失衆六年九月大雩時魯莒連兵有炕陽動衆之應十六年九月大雩先是昭公母夫人歸氏薨昭不戚與三年同占二十四年八月大雩時魯襲邾師邾訴於晉晉執我行人叔孫婼二十五年七月上辛大雩季辛又雩旱甚也劉歆以為時后氏與季氏有隙公信讒伐季氏為所敗出奔齊定公十年九月大雩時公侵鄭城中城圍鄆莊公三十一年冬不雨是歲一年而三築臺奢侈不恤民僖公二年冬十月不雨三年春正月不雨夏四月不雨六月雨時南敗邾東敗莒有炕陽之應文公二年自十二月不雨至於秋七月文公即位天子使叔服會葬毛伯賜命又會晉侯於戚公子遂如齊納幣又與諸侯盟上得天子外得諸侯沛然自大躋僖公主大夫始顓事謂季孫行父也十年自正月不雨至於秋七月先是公子遂會四國而救鄭楚使越椒來聘秦人歸襚有炕陽之應十三年自正月不雨至於秋七月先是曹伯把伯滕子來朝郕伯來奔秦伯使遂來聘季孫行父城諸及鄆二年之間五國趨之內城二邑炕陽失衆一日不雨而五穀皆熟異也文公時大夫始專盟會公孫敖會晉侯又會諸侯盟於垂隴故不雨而生者陰不出氣而私自行以象施不由上出臣下作福而私自成一曰不雨近常陰之罰君弱也秦始皇十二年天下大旱六月至八月乃雨漢惠帝五年夏大旱江河水少溪谷絶先是發民男女十四萬六千人城長安是歲城乃成文帝三年秋天下旱是秋胸奴寇邊發兵擊之出塞其秋濟北王興居反討平之後六年天下大旱時胸奴大入上郡雲中烽火通長安遣三將軍屯邊又三將軍屯京師九年春大旱景帝中三年秋大旱後二年秋大旱武帝建元四年六月旱元光六年夏大旱是歲四將軍征胸奴元朔五年春大旱是歲六將軍衆十餘萬征胸奴元狩三年夏大旱是歲發天下故吏伐棘上林穿昆明池元封六年秋大旱天漢元年夏大旱其三年夏大旱先是二師將軍征大宛還三將軍征胸奴李陵沒不還征和元年夏大旱是歲始治巫蠱明年衛皇后太子敗昭帝始元六年大旱先是大鴻臚田廣明征益州暴師連年元鳯五年夏大旱宣帝本始元年夏大旱東南數千里先是五將軍衆二十萬征胸奴神爵元年秋大旱是歲後將軍趙充國征西羌元帝建昭二年大旱成帝永始三年四年夏大旱平帝建平四年春大旱後漢世祖建武三年七月洛陽大旱五年夏旱京房易傳曰欲德不用兹謂張厥災荒其旱陰雲不雨變而赤因四陰衆出過時兹謂廣其旱不生上下皆蔽兹謂隔其旱天赤三月時有雹殺飛禽上緣求妃兹謂僭其旱三月大溫亡雲君高臺府兹謂犯陰侵陽其旱萬物根死有火災庶位踰節兹謂僭其旱澤物枯為火所傷春秋考異郵曰國大旱寃獄結旱者陽氣移精不施君上失制奢淫僭差氣亂惑天則旱徵見又云陰厭陽移君淫民惡陰精不舒陽偏不施又云陽偏民怨徵也在所以感之者上奢則求多求多則下竭下竭則潰君不仁管子曰春不收枯骨伐枯木而起去之則夏旱方儲對䇿曰百姓苦士辛煩碎責租稅失中暴師外營經歷三時內有怨女外有曠夫王者熟推其祥揆合於天圗之事情旱災可除夫旱者過日天王無意於百姓恩德不行萬民煩擾故天應以無澤是時天下僭逆者未盡誅軍多過時古今注曰建武六年六月九年春十二年五月二十一年六月明帝永平元年五月八年冬十一年八月十三年八月十八年三月並旱章帝章和二年夏旱時章帝崩後竇太后兄弟用事奢僭古今注曰建初二年夏雒陽旱四年夏元和元年春並旱按楊終傳建初元年大旱穀貴終以為廣陵楚淮陽濟南之獄徙者數萬人吏民怨曠上疏云久旱孔藂曰建初元年大旱天子憂之侍御史孔豐上疏曰臣聞為不善而災報得其應也為善而災至遭時運也陛下即位日淺視民如傷而不幸耗旱時運之會耳非政教所致也昔成湯遭旱因自責省畋散積減御損食而大有年意者陛下未為成湯之事焉天子納其言而從之三日雨即降轉拜黃門郎典東觀事和帝永元六年秋京師旱時雒陽有寃囚和帝幸雒陽寺録囚徒理寃囚收令下獄抵罪行未還宮澍雨降古今注曰永元二年郡國十四旱十五年丹陽郡國二十二並旱或傷稼安帝古今注曰永初元年郡國八旱分遣議郎請雨按本紀二年五月旱皇太后幸雒陽寺録囚徒即日雨六月京師郡國四十大水雖得水無救為災安帝永初六年夏旱古今注曰三年郡國八四年五年夏並旱七年夏旱元初元年夏旱二年夏旱三年夏旱時西羌冦亂軍屯相繼連十餘年六年夏旱古今注曰建光元年郡國四旱延光元年郡國五並旱傷稼順帝永建三年夏旱五年夏旱陽嘉二年夏旱時李固對䇿以為奢僭所致也臣昭按本紀元年二月京師旱郎顗傳人君恩澤不施於民祿去公室臣下專權所致也又周舉傳三年河南三輔大旱五穀傷災天子親自露坐德陽殿東廂請雨沖帝永嘉元年夏旱時沖帝幼崩太尉李固勸太后及兄梁冀立嗣帝擇年長有德者天下賴之則功名不朽年幼未可知如後不善悔無所及時太后及冀貪立年幼欲久自專遂立質帝八歲此不用德古今注曰本初元年二月京師旱桓帝元嘉元年夏旱是時梁冀秉政妻子並受封寵踰節延熹元年六月旱京房占曰人君無施澤惠利於下則致旱也不救必蝗蟲害穀其救也貰謫罪行寬大惠兆民勞功吏賜鰥寡稟不足按陳蕃上疏宮女多聚不御憂悲之感以致水旱之困也靈帝熹平五年夏旱蔡雍作伯夷叔齊碑曰熹平五年天下大旱禱請名山求獲答應時處士平陽蘇騰字元成夢陟首陽有神馬之使在道明覺而思之以其夢陟狀上聞天子開三府請雨使者與郡縣户曹掾吏登山升祠手書要曰君况我聖主以洪澤之福天尋興雲即降甘雨也六年夏旱光和五年夏旱六年夏旱是時常侍黃門僭作威福獻帝興平元年秋長安旱是時李傕郭汜專權縱肆獻帝起居注曰建安十九年夏四月旱魏明帝大和二年五月大旱元年已來崇廣宮府之應也又是春宣帝擒孟逹張郃破諸葛亮斃馬謖亢陽自大又其應也太和五年三月自去冬十月至此月不雨辛巳大雩齊王正始元年二月自去冬十二月至此月不雨去歲曹爽白帝轉宣帝為太傅外示尊崇內實欲令事先由己時宣帝功蓋魏朝欲德不用之應也高貴鄉公甘露三年正月自去秋至此月旱時文帝圍諸葛誕衆出過時之應也初壽春秋夏常雨淹城而此旱踰年城陷乃大雨咸以誕為天亡吳孫權嘉禾四年自十月不雨至於夏孫亮五鳯二年大旱百姓飢是年征役煩興軍士怨叛此亢陽自大勞役失衆之罰也其役彌歲故旱亦竟年孫皓寶鼎元年春夏旱時皓遷都武昌勞役動衆之應晉武帝泰始七年五月閏月旱大雩八年五月旱是時帝納荀朂邪説留賈充不復西鎮而任愷漸疏上下皆蔽之應也及李熹魯芝李允等並在散職近欲德不用之謂也九年自正月旱至於六月祈宗廟社稷山川癸未雨十年四月旱去年秋冬採擇卿校諸葛沖等女是春五十餘人入殿簡選又取小將吏女數千人母子號哭於宮中聲聞於外行人悲酸是殆積陰生陽上緣求妃之應也咸寧二年五月旱大雩至六月乃澍之戊反又音樹雨太康二年旱自去冬至此春三年四月旱乙酉詔司空齊王攸與尚書廷尉河南尹録訊繫囚事從蠲宥五年六月旱此年正月天陰解而復合劉毅上疏曰必有阿黨之臣姦以事君者當誅而不赦也帝不答是時荀朂馮紞僭作威福亂朝尤甚六年三月青梁幽冀郡國旱六月濟陰武陵旱傷麥七年夏郡國十三大旱八年四月冀州旱九年夏郡國三十三旱扶風始平京兆安定旱傷麥十年二月旱太熙元年三月旱自太康後雖正人滿朝不被親仗而賈充荀朂楊駿馮紞等迭居要重所以無年不旱者欲德不用上下皆蔽庶位踰節之罰也惠帝元康七年七月秦雍二州大旱疾疫關中飢米斛萬錢因此氐羌反叛雍州刺史解系敗績而飢疫荐與洊同在見反臻戎晉並困朝廷不能振詔聽相賣鬻其九月郡國五旱永寧元年自夏及秋青徐幽并四州旱十二月又郡國十二旱是年春三王討趙王倫六旬之中數十戰死者十餘萬人懷帝永嘉三年五月大旱襄平縣梁水淡池竭河洛江漢皆可涉是年三月司馬越歸京都遣兵入宮收中書令繆播等九人殺之皆僭踰之罰也又四方諸侯多懷無君之心劉元海石勒王彌李雄之徒賊害百姓流血成泥又其應也五年自去冬旱至此春去歲十一月司馬越以行臺自隨斥黜宮衛無君臣之節愍帝建興元年六月揚州旱去年十二月淳于伯寃死之應元帝大興元年六月又旱干寶曰殺淳于伯之後旱三年是也刑罰妄加羣陰不附則陽氣勝之罰也元帝大興四年五月旱是時王敦陵僭已著永昌元年夏大旱是年三月王敦有石頭之變二宮陵辱大臣誅死僭踰無上故旱尤甚也其閏十一月京都大旱川谷並竭明帝太寧三年自春不雨至於六月成帝咸和元年夏秋旱是時庾太后臨朝稱制言不從而僭踰之罰也二年夏旱五年五月大旱六年四月大旱八年秋七月旱九年自四月不雨至於八月咸康元年六月旱是時成帝沖弱未親萬幾內外之政決之將相此僭踰之罰連歲旱也至四年王導固讓太傅復子明辟是後不旱殆其應也時天下普旱會稽餘姚特甚米斗直五百人有相鬻者二年三月旱三年六月旱時王導以天下新定務在遵養不任刑罰遂盜賊公行頻五年亢旱亦舒緩之應也康帝建元元年五月旱穆帝永和元年五月旱是時帝在襁褓褚太后臨朝如明穆太后故事五年七月不雨至於十月六年夏旱八年夏旱九年春旱升平三年冬大旱四年冬大旱哀帝隆和元年夏旱是時桓溫強恣權制朝廷踰僭之罰也海西公太和元年夏旱四年冬旱涼州春旱至夏簡文帝咸安二年十月大旱飢自永和至是嗣主幼沖桓溫陵僭用兵征伐百姓怨苦孝武帝寧康元年三月旱是時桓溫入覲高平陵闔朝致拜踰僭之應也三年冬旱太元四年夏大旱八年六月旱十年七月旱飢初八年破苻堅九年諸將略地有事徐豫楊亮趙統攻討巴沔是年正月謝安又出鎮廣陵使子琰進次彭城頻有軍役十三年六月旱去歲北府遣戍胡陸荆州經略河南是年夏郭銓置戍野王又遣軍破黃淮十五年七月旱十七年秋旱至冬是時烈宗仁恕信任會稽王道子政事舒緩又茹千秋為驃騎咨議竊弄主相威福又邱尼乳母親黨及婢僕之子階緣近習臨部領衆又所在多上春禁囚不以其辜建康獄吏枉暴既甚此又僭踰不從寃濫之罰安帝隆安二年冬旱寒甚四年五月旱五年夏秋大旱十二月不雨時孫恩作亂桓元疑二迫殺殷仲堪而朝廷即授以荆州之任司馬元顯又諷百僚悉使敬已內外騷動兵甲煩興此皆陵僭憂愁之應也元興元年七月大飢九月十月不雨泉水涸二年六月不雨冬又旱時桓元奢僭十二月遂篡位三年八月不雨義熙四年冬不雨六年九月不雨八年十月不雨九年秋冬不雨十年九月旱十二月又旱井瀆多竭是時軍役煩興宋文帝元嘉八年夏六月旱大雩二十八年三月大旱孝武大明八年東諸郡大旱甚者米一斗數百都下亦至百餘錢餓死者十六七梁武帝天監元年大旱米斗五千人多餓死洪範五行傳曰君持亢陽之節興師動衆勞人過度故旱災應初帝起兵襄陽破張沖敗陳伯之及平建康前後連戰百姓勞敝及即位後復與魏交兵不止之應也簡文帝大寶元年夏大旱人相食都下尤甚陳宣帝太建十二年春不雨至四月先是周師掠淮北始興王叔陵等諸軍敗績淮北地皆沒於周是其應也後魏孝文太和十五年自正月不雨至於四月宣武景明四年旱正始元年旱永平二年旱三年冀定二州旱延昌元年自二月不雨至五月孝明神龜元年自正月不雨至六月正元二年旱孝靜帝天平二年大旱東魏天平四年并肆汾建晉絳秦陜等諸州大旱人多流散是歲齊神武與西魏戰於沙苑敗績死者數萬武定二年冬春旱先是西魏師入洛陽神武親帥軍大戰於邙山死者數萬後齊天保九年夏大旱先是大發卒築長城四百餘里勞役之應也乾明元年春旱先是發卒數十萬築金鳯聖應崇光三臺窮極侈麗不恤百姓亢陽之應也河清二年四月并晉已西五州旱是歲發卒築軹關突厥二十萬衆毁長城寇恆州後主天統二年春旱是時大發卒起大明宮隋開皇四年已後京師頻旱時遷都龍首建立宮室百姓勞敝亢陽之應也大業四年燕代緣邊諸郡旱時發卒百餘萬築長城帝親巡塞表百姓失業道殣相望八年天下旱百姓流亡時發四海兵帝親征高麗六軍凍餓死者十八九十三年天下大旱時郡縣鄉邑悉遣築城發男女無少長皆就役唐武德三年夏旱至於八月乃雨四年自春不雨至於七月雨少陰之氣其氣毁則不雨少陰者金也金為刑為兵刑不辜兵不戢則金氣毁故常為旱火為盛陽陽氣強悍故聖人制禮以節之禮失則僭而驕亢以導盛陽火勝則金衰故亦旱於五行土實制水土功興則水氣壅閼又常為旱天官有東井主水事天漢天江亦水祥也水與火仇而受制於土土火謫見若日蝕過分而未至與七曜循中道之南皆旱祥也七年秋關內河東旱貞觀元年夏山東大旱二年春旱三年春夏旱四年春旱自太上皇傳位至此而比年水旱九年秋劍南關東州二十四旱十二年吳楚巴蜀州二十六旱冬不雨至於明年五月十七年春夏旱二十一年秋陜絳蒲夔等州旱二十二年秋開萬等州旱冬不雨至於明年三月永徽元年京畿雍同絳等州十旱二年九月不雨至於明年二月四年夏秋旱光婺滁潁等州尤甚顯慶五年春河北州二十二旱總章元年京師及山東江淮大旱二年七月劔南州十九旱冬無雪咸亨元年春旱秋復大旱儀鳯二年夏河南河北旱三年四月旱永隆二年關中旱霜大飢永淳元年關中大旱飢二年夏河南河北旱永昌元年三月旱神功元年黃隨等州旱久視元年夏關內河東旱長安二年春不雨至於六月三年冬無雪至於明年二月神龍二年冬不雨至於明年五月京師山東河北河南旱飢太極元年春旱七月復旱開元二年春大旱十二年七月河東河北旱帝親禱雨宮中設壇席暴立三日九月蒲同等州旱十四年秋諸道州十五旱十五年諸道州十七旱十六年東都河南宋亳等州旱二十四年夏旱永泰元年春夏旱二年關內大旱自三月不雨至於六月大歷六年春旱至於八月建中三年自五月不雨至於七月興元元年冬大旱貞元元年春旱無麥苖至於八月旱甚灞滻將竭井皆無水六年春關輔大旱無麥苖夏淮南浙西福建等道大旱井泉竭人暍且疫死者甚衆七年揚楚滁壽澧等州旱十四年春旱無麥十五年夏旱十八年夏申光蔡州旱十九年正月不雨至七月甲戌乃雨永貞元年秋江浙淮南荆南湖南鄂嶽陳許等州二十六旱元和三年淮南江南江西湖南廣南山南東西皆旱四年春夏大旱秋淮南浙西江西江東旱七年夏揚潤等州旱八年夏同華二州旱十五年夏旱寶歷元年秋荆南淮南浙西江西湖南及宣襄鄂等州旱太和元年夏京畿河中同州旱六年河東河南關輔旱七年秋大旱八年夏江淮及陜華等州旱九年秋京兆河南河中陜華同等州旱開成二年春夏旱四年夏旱浙東尤甚會昌五年春旱六年春不雨冬又不雨至明年二月大中四年大旱咸通二年秋淮南河南不雨至於明年六月九年江淮旱十年夏旱十一年夏旱廣明元年春夏大旱中和四年江南大旱飢人相食景福二年秋大旱光化三年冬京師旱至於四年春宋建隆二年京師夏旱冬又旱三年京師春夏旱河北大旱霸州苖皆焦仆又河南河中府孟澤濮鄆齊濟澶滑延隰宿等州並春夏不雨四年京師夏秋旱又懷州旱乾德元年冬京師旱二年正月京師旱夏不雨冬無雪是歲河南府陜虢麟博靈州旱河中府旱甚四年春至夏京師不雨江陵府華州漣水軍旱五年正月京師旱秋復旱冬無雪開寶元年冬京師無雪二年夏至七月京師不雨三年春夏京師旱冬無雪邠州夏旱五年春京師旱冬又旱六年冬京師旱七年京師春夏旱冬又旱河南府晉解州夏旱滑州秋旱八年春京師旱是歲關西飢旱甚太平興國二年正月京師旱三年春夏京師旱四年冬京師旱七年春京師旱孟虢絳密瀛衛曹淄州旱九年夏京師旱秋江南大旱雍熙二年冬京師旱三年冬京師旱四年冬京師旱端拱二年五月京師旱秋七月至十一月旱上憂形於色蔬食致禱是歲河南登萊深冀旱甚民多飢死詔發倉粟貸之人五斗淳化元年正月至四月不雨京師民飢上蔬食祈雨河南鳯翔大名京兆府許滄單汝乾鄭同州旱二年春京師大旱蝗冬復大旱是歲河南北河東陜西及亳建淮陽等三十六州軍旱三年夏京師不雨河南府許汝亳滑商州旱五年六月京師旱疫遣太醫和藥救之至道元年京師春旱冬無雪二年春夏京師旱冬無雪咸平元年春夏京畿旱又江浙淮南荆湖四十六州軍旱二