不明賞罰不行周失之舒秦失之急故周衰亡寒歲秦滅亡燠年漢武帝元狩六年冬亡冰先是比年遣大將軍衛青霍去病攻祁連絶大幕窮追單于斬首數十萬級還大行慶賞乃閔海內勤勞遣博士褚大等六人持節巡行天下存賜鰥寡假豫困乏舉遺逸獨行君子郡國有以便宜上者丞相御史以聞天下咸喜昭帝始元二年冬亡冰是時上年九歲大將軍霍光秉政始行寬緩欲以説下後齊天保八年三月大熱人或暍死劉向五行傳曰視不明用近習賢者不進不肖不退百職廢壞庶事不從其過在政教舒時帝狂躁荒淫無度之態唐天寶元年冬無冰謂陰失節也又曰知罪不誅其罰燠夏則暑殺人冬則物華實蓋當寒反燠象宜刑而賞之也貞元十四年夏大燠元和九年六月大燠長慶二年冬少雪不冰凍草木萌荑如正月廣明元年十一月暖如仲春宋淳化二年冬京師無冰大中祥符二年京師冬溫無冰天聖五年夏秋大暑毒氣中人占者曰此洪範所謂恆燠也嘉祐六年冬京師無冰治平四年冬無雪元豐八年冬無雪元祐元年冬無雪四年冬無雪五年冬無冰雪紹興五年五月大燠四十餘日草木焦稿山石可灼人死於暑者甚衆三十一年冬無雪乾道三年冬溫少雪無冰五年冬溫亡雪六年冬復溫無雪無冰紹熙三年潼川路不雨氣燠如仲夏日月皆赤榮州尤甚慶元元年冬無雪四年冬無雪越歲春燠而雷六年冬燠無雪桃李華蟄蟲不藏管子曰臣乘君威則陰侵陽盛冬不冰時韓托胄擅朝陰脅陽之象開禧三年冬少雪嘉定元年春燠如夏六年冬燠無冰有雷昆蟲不蟄八年夏五月大燠草木枯稿百泉皆竭行都斛水百錢江淮杯水數十錢暍死者甚衆九年冬無雪十三年冬無冰臘無雪越歲春暴燠土燥泉竭文獻通考卷三百四
