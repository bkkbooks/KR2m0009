body:
  text: 文獻通考卷二百三十鄱陽馬端臨貴與著經籍考五十九集别集元子十卷琦玗子一卷文編十卷鼂氏曰唐元結次山也後魏之裔天寶十三載進士復舉制科授右金吾兵曹累遷容管經畧使始在商餘山稱元子逃難入琦玕洞稱琦玕子或稱浪士漁者稱爲聱叟酒徒呼為漫叟及官呼爲漫郎因以命其所著結性耿介有憂道憫世之意逄天寶之亂或仕或隱自謂與世聱牙豈獨其行事而然其文辭亦如之然其辭義幽約譬古鐘磬不諧於俚耳而可尋玩在當時名出蕭李下至韓愈稱數唐之文人獨及結云陳氏曰蜀本但載自序江州本以李商隱所作序冠其首蜀本拾遺一卷中興頌五規二惡之屬皆在焉江本分置十卷容齋洪氏隨筆曰元次山有文編十卷李商隱作序今九江所刻是也又有元子十卷李紓作序予家有之凡一百五篇其十四篇已見於文編餘者大抵澶漫矯亢而第八卷中所載方國二十國事最爲譎誕其畧云方國之盡身皆方其俗惡圓設有問者曰汝心圓則兩手破胸露心曰此心圓邪圓國則反是言國之三口三舌相乳國之口以下直爲一竅無手國足便於手無足國膚行如風其說頗近山海經固已不韙至云惡國之男長大則殺父女長大則殺母忍國之父母見子如臣見君無鼻之國兄弟相逢則相害觸國之子孫長大則殺之如此之類皆悖理害敎於事無補次山中興頌與日月爭光此書雖不作可也惜哉高氏子畧曰元子曰人之毒於鄉毒於國毒於鳥獸草木不如毒其形毒其命人之媚於時媚於君媚於朋友郡縣不如媚於廐媚於室人之貪於權貪於位貪於取求聚積不如貪於道貪於閑靜人之忍於毒忍於媚忍於詐惑貪溺不如忍於貧苦忍於棄廢英哉斯言次山平生辭章奇古不蹈襲其視栁栁州又英崛唐代文人惟二公而已猶有一説頌者所以美盛德之形容也如江漢諸詩所以寫宣王中興之美者皆係之雅唐旣中興而磨崖一碑乃以頌稱漫郎豈不能致思於此邪初結居商餘山著書其序謂天寶九載庚寅至十二載癸巳一萬六千五百九十五言分十卷是蓋有意存焉卷首有元氏家錄具紀其世次杜工部集二十卷集外詩一卷註杜詩二十卷蔡興宗編杜詩二十卷趙次公註杜詩五十九卷鼂氏曰唐杜甫子美也審言之孫元宗朝獻太清宮享廟及郊奏賦三篇使待制集賢院宰相試文再遷右衛率府胄曹終於劒南參謀檢校工部員外曠放不自檢好論天下大事高而不切少與李白齊名時號李杜數當寇亂挺節無汙爲歌詩傷時橈弱情不忘君人憐其忠云集有王洙原叔王琪君玉序本朝自原叔以後學者喜觀甫詩世有爲之註者數家率皆鄙淺可笑有托原叔名者其實非也呂微仲在成都時嘗譜其年月近時有蔡興宗者再用年月編次之而趙次公者又以古律詩雜次第之且為之註兩人頗以意改定其誤字云陳氏曰按唐志六十卷小集六卷王洙原叔蒐裒中外書九十九卷除其重複定取千四百五篇古詩三百九十九近體千有六起太平時終湖南所作視居行之次若歲時爲先後别錄雜著為二卷合二十卷寶元二年記遂爲定本王琪君玉嘉祐中刻之姑蘇且爲後記元稹墓銘亦附第二十卷之末又有遺文九篇治平中太守裴集刋附集外蜀本大畧同而以遺文入正集中則非其舊也世言子美詩集大成而無韻者幾不可讀然開元以前文體大畧如此若三大禮賦辭氣壯偉又非唐初餘子所能及也校定杜工部集二十二卷陳氏曰祕書郎黄伯思長睿所校旣正其差誤參考歲月出處異同古律相間凡一千四百四十七首雜著二十九首别爲二卷李丞相伯紀爲序呉筠宗元先生集十卷鼂氏曰唐呉筠撰前有權德輿序筠字貞節華隂人生十五年隱於南陽天寶初召至京師請為道士居嵩山已有敕待詔翰林筠知祿山將亂求還茅山許之乃東遊㑹稽徃來天台剡中與李白孔巢父酬唱大歴中卒弟子諡為宗元先生筠通經義美文詞性高鯁其待詔翰林也特承恩顧高力士素奉佛嘗短筠於帝故所著文賦深詆釋氏頗爲通人所譏云陳氏曰筠舉進士不中第爲道士居嵩陽觀待詔翰林爲高力士所惡而斥事見隱逸傳傳稱筠所善李白孔巢父歌詩相甲乙巢父詩未之見也筠詩固不碌碌然豈能與太白相甲乙哉獨孤及毗陵集二十卷鼂氏曰唐獨孤及至之也洛陽人天寶十三載舉洞曉元經科代宗初為太常博士舒濠二州刺史政最徙常州卒於官及幼有成人之量徧覽五經觀其大義而有章句學爲文以立憲誡世褒賢遏惡爲用長於議論唐實錄稱韓愈師其爲文云集門人有李舟梁肅前後序末載崔祐甫碑誌陳氏曰及子曰郁字古風亦有名韓退之誌其墓楊評事文集楊凌撰柳子厚作後序曰楊君少以篇什著聲於時其炳耀尤異之詞諷誦於文人滿盈於江湖達於京師晩節徧悟文體尤邃叙述學富識遠才涌未已其雄傑老成之風與時增加旣獲是而夭季年所作尤善其爲鄂州新城頌諸葛武侯傳論餞送梓潼陳衆甫汝南周愿河東裴秦武都符義甫泰山羊士諤隴西李鍊凡六序廬山禪居記辭李常侍啟遠遊賦七夕賦皆文人之選已用是陪陳君之後言子昻也其可謂具體者歟濮陽吳君文集十卷唐呉德光撰武陵人也柳子厚序畧曰其爲詞賦有戒茍冒陵僭之志其爲詩歌有交大人王公之義其爲誄志弔祭有孝恭慈仁之誠而舉六經聖人之大㫖發言成章有可觀者毛欽一集二卷陳氏曰唐荆州長林毛欽一撰長林今荆門屬縣欽一上諸公書自稱毛欽一字傑而或以傑爲名唐人以字行者多矣自號雲夢子開元中人戎昱集三卷鼂氏曰唐戎昱撰初李亷察桂林月夜聞鄰居吟咏之音清暢遲明訪之乃昱也卽延為幕賔因飲席調其侍兒微知其意卽贈之昱感怍賦詩有恩合死前詶之句又爲衛伯玉荆南從事歴辰䖍二州刺史陳氏曰其姪孫爲序言弱冠謁杜甫於渚宮一見禮遇集中有哭甫詩世所傳在家貧亦好之句昱詩也劉虞部集十卷陳氏曰唐虞部郎中劉商子夏撰武元衡爲序集中有送弟歸懐州舊業序言高祖當武德經綸勲在三府按武德功臣有劉文靖𢎞基政會史皆有傳文靖之後誅絶𢎞基政會傳後無所考未詳何人之後也胡笳十八拍行於世梁補闕集二十卷陳氏曰唐右補闕翰林學士安定梁肅敬之撰崔恭爲之序首稱其從釋氏爲天台大師元浩之弟子今按獨狐及集後序稱門下生頗述師承之意韓愈亦言其佐助陸相貢士所與及第者皆赫然有聞然則梁固名儒善士也而獨以爲師從釋氏者何哉陸宣公奏議十二卷鼂氏曰唐陸贄敬輿也嘉興人大歴八年進士中博學宏詞書判拔萃科德宗初爲翰林學士從奉天還爲中書舍人平章事贄在奉天日下詔書數百初如不經思逮成皆周盡人情嘗爲帝言今盜徧天下宜痛自悔以感人心誠不吝改過以言謝天下使臣持筆無所忌庶叛者革心上從之故下制書雖武夫悍卒無不感動流涕議者謂興元戡難功雖爪牙宣力蓋腹心有助焉舊翰苑集外有牓子集五卷議論集三卷元祐中蘇子瞻乞校正進呈改從今名疑是時裒諸集以成云陳氏曰權德輿爲之序稱制誥集十三卷奏草七卷中書奏議七卷今所存者翰苑集十卷牓子集十二卷序又稱别集文賦表狀十五卷今不傳東坡蘇氏乞校正陸䞇奏議上進劄子曰臣等猥以空疎備員講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所爲竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多𫝊於古人若已經效於世間不必皆從於已出伏見唐宰相陸贄才本王佐學爲帝師論深切於事情言不離於道德智如子房而文則過辯如賈誼而術不疎上以格君心之非下以通天下之志但其不幸仕不遇時德宗以苛刻爲能而贄諫之以忠厚德宗以猜疑爲術而贄勸之以推誠德宗好用兵而贄以消兵爲先德宗好聚斂而贄以散財爲急至於用人聽言之法治邊馭將之方罪已以收人心改過以應天道去小人以除民患惜名器以待有功如斯之流未易悉數可謂進苦口之藥石鍼害身之膏肓使德宗盡用其言則貞觀可得而復臣等每退自西閣卽相與吿言以陛下聖明必喜贄議論但使聖賢之相契卽如臣主之同時昔馮唐論頗牧之賢則漢文爲之太息魏相條鼂董之對則孝宣以致中興若陛下能自得師莫若近取諸贄夫六經三史諸子百家非無可觀皆足爲治但聖言幽遠末學支離譬如山海之崇深難以一二而推擇如贄之論開卷了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕寫進呈願陛下置之坐隅如見贄面反覆熟讀如與贄言必能發聖性之高明成治功於歲月朱子語錄曰陸宣公奏議極好㸔這人極會議論事理委曲説盡更無滲漏雖至小底事被他處置得亦無不盡如後面所論二税之弊極佳人言陸宣公口説不出只是寫得出今觀奏議中多云今日早面奉聖㫖云云臣退而思之云云疑或然也權丞相集五十卷鼂氏曰權德輿載之也秦州人未冠以文章稱諸儒間貞元十年知制誥累官中書舍人元和五年以禮部尚書平章事德輿三歲知變四聲四歲能詩賦積思經術無不貫綜自始學至老未曾一日去書其文雅正贍縟當時公卿功德卓異者皆所銘記雖動止無外飾其醖藉風流自然可慕貞元元和間爲縉紳羽儀其兩漢辯亡論世祖封不義侯議世多稱之嘗自纂制誥集五十卷楊憑為序今亡逸文集孫憲孫編次楊嗣復爲序陳氏曰德輿父臯以不汙祿山見卓行傳其子璩爲中書舍人劾李訓亦能世其家性寛和而大體文亦純雅宏贍三世名迹可謂名門矣墓碑韓昌黎所爲序文言九年掌誥自纂錄爲五十卷不在此集内今未之見韓昌黎集四十卷集外文一卷鼂氏曰韓愈字退之南陽人貞元八年進士累擢知制誥進中書舍人遷吏部侍郎為京兆尹與李紳不協紳出愈罷爲兵部俄復舊劉昫唐書稱愈恃才肆意盭孔孟之㫖若南人妄以柳宗元爲羅池神而愈碑以實之李賀父名晉肅不應進士而愈爲作諱辯又爲毛頴𫝊譏戱不近人情此文章之甚紕繆者新書稱愈三歲而孤自知讀書比長盡通六經百家學性明銳不爲詭隨每言文章自相如子長後作者不世出故深探本原卓然樹立成一家言造端置詞要爲不蹈襲前人者議者謂舊史譏其文章甚紕繆固不待辯而新史褒其造端置辭不蹈襲前人亦未爲知愈蓋愈之置辭字字悉有據依其造端如毛頴傳進學解之類皆有所師範云其集屢經名人是正其舛訛絶少但編次殊失倫類有暇者宜再編之李漢文集序略曰先生幼孤自知讀書爲文日記數千百言比壯經書通念曉析酷排釋氏諸史百子皆搜抉無隱汗瀾卓踔奫泫澄深詭然而蛟龍翔蔚然而虎鳳躍鏘然而韶鈞鳴日光玉潔周情孔思千態萬貎卒澤於道德仁義炳如也洞視萬古悠惻當世遂大拯頺風敎人自爲時人始而驚中而笑且排先生益堅終而翕然隨以定嗚呼先生於文摧陷廓清之功比於武事可謂雄偉不常者矣本𫝊贊曰愈以六經之文爲諸儒倡障隄末流反刓以樸剗僞以眞粹然一出於正刋落陳言横騖别驅汪洋大肆無牴牾聖人者又云其原道原性師説數十篇皆奧衍宏深與孟軻揚雄相爲表裏而佐佑六經云至其他文造端置辭要不爲蹈襲前人者惟愈爲之沛然有餘至其徒李翺李漢皇甫湜從而效之遂不及遠甚程子曰韓退之晚年爲文所得甚多學本是修德有德然後有言退之因學文日求其所未至遂有所得亦近世豪傑之士如原道中言語雖有病然自孟子而後能將許大見識尋求者才見此人歐公詩話曰退之筆力無施不可而嘗以詩爲文章末事故其詩曰多情懐酒伴餘事作詩人也然其資談笑助諧謔叙人情狀物態一寓於詩而曲盡其妙此在雄文大手固不足論而予獨愛其工於韻也蓋其得韻寛則波瀾横溢泛入傍韻乍還乍離出入囘合殆不可拘以常格如此日足可惜之類是也得韻窄則不復傍出而因難見巧愈險愈奇如病中贈張十八之類是也余嘗與聖俞論此以謂譬如善馭良馬者通衢廣陌縦横馳逐惟意所之至於水曲蟻封疾徐中節而不少蹉跌乃天下之至工也聖俞戱曰前史言退之爲人木强若寛韻可自足而輙傍出窄韻獨用而反不出豈非其拗强而然與坐客皆爲之笑也陳氏曰李漢序公文言辱知最厚且親收拾遺文無所失墜者懼後之人僞妄輙附益其中也外有註論語十卷傳學者順宗實錄五卷列於史官不在集中今實錄在外集然則世所謂外集者自實錄外皆僞妄或韓公及其壻所刪去也南陽者唐東都之河陽春秋傳晉於是始啓南陽者也新書以爲鄧州非是方崧卿年譜辯之詳矣韓文公志五卷陳氏曰金堂樊汝霖澤之撰汝霖嘗爲韓集譜註四十五卷又集其碑誌祭文序譜之屬爲一編此是也譜註未之見汝霖宣和六年進士仕至瀘帥以卒玉山汪端明志其墓韓昌黎集四十卷外集一卷附錄五卷年譜一卷舉正一卷外抄八卷陳氏曰年譜洪興祖撰莆田方崧卿增考且撰舉正以校其同異而刻之南安外集但據嘉祐蜀本劉煜所錄二十五篇而附以石刻聯句詩文之遺見於他集者及葛嶠刻柳文則又以大庾丞韓郁所編註諸本號外集者并考疑誤輯遺事共爲外抄刻之校定韓昌黎集四十卷外集十卷陳氏曰晦庵朱侍講熹以方氏本校定凡異同定歸一多所發明有益後學外集皆如舊本獨用方本益大顚三書愚按方氏用力於此集勤矣外集刪削甚嚴而存此書以見其邀速常語初無崇信之說但欲明世間問答之僞而不悟此書爲僞之尤也蓋由歐公䟦語之故不知歐公自以易大傅之名與己意合從而實之此自通人之一蔽東坡固嘗深辯之然其謬妄三尺童子所共識不待坡公也今朱公决以爲韓筆無疑方氏未足責晦翁識高一世而其所定者廼爾殆不可解今按外集第七卷曰疑誤者韓郁注云潮州靈山寺所刻末云吏部侍郎潮州刺史者非也退之自刑部侍郎貶潮晚乃由兵部爲吏部流俗但稱韓吏部爾其書蓋國初所刻故其謬如此又潮本韓集不見有此書使靈山舊有此刻集時何不編入可見此書之妄也然其妄甚白亦不待此而明朱子韓文考異序曰南安韓文出莆田方氏近世號爲佳本予讀之信然然猶恨其不盡載諸本同異而多折𠂻於三本也原三本之見信杭蜀以舊閣以官其信之也則宜然如歐陽公之言韓文印本初未必誤多爲校讎者妄改亦謂如羅池碑改步爲涉田氏廟改天明爲王明之類耳觀其自言爲兒童時得蜀本韓文於隨州李氏計其歲月當在天禧中年且其書已故敝脱畧則其摹印之日與祥符杭本蓋未知其孰先孰後而嘉祐蜀本又其子孫明矣然而猶曰二十年間聞人有善本者必求而改正之則固未嘗必以舊本爲是而悉從之也至於祕閣官本則亦民間所獻掌故令史所抄而一時館職所校耳其所傳者豈眞作者之手藁而正之者豈盡劉向揚雄之倫哉讀者正當擇其文理意義之善者而從之不當但以地望形勢爲重輕也抑韓子之爲文雖以力去陳言為務而又必以文從字順各識其職爲貴讀者或未得此權度則其文理意義正自有未易言者是以予於此書姑考諸本之同異而兼存之以待覽者之自擇區區妄意雖或竊有所疑而不敢偏有所廢也柳柳州文集四十五卷外集二卷鼂氏曰唐柳宗元子厚也河東人貞元九年進士中博學宏詞科授校書郎終於柳州刺史宗元少精敏絶倫爲文章卓偉精微旣竄斥湮厄感欝一寓諸文倣離騷數十篇讀者悲惻在柳州進士走數千里從學經指授者文辭皆有法世號柳柳州劉禹錫序之韓退之言吾嘗評其文深雄雅健似司馬子長崔蔡不足多也安定皇甫湜於文章少所推讓亦以退之之言爲然陳氏曰劉禹錫序言編次其文爲三十二通退之之誌若祭文附第一通之末今世所行本皆四十五卷又不附志文非當時本也或云沈元用所傳穆伯長本柳先生集四十五卷外集二卷别錄二卷摭異一卷音釋一卷附錄二卷事迹本末一卷陳氏曰方崧卿既刻韓集於南安其後江陰葛嶠爲守復刋柳集以配之别錄而下皆嶠所裒集也别錄者龍城錄及法言注五則龍城近世人之僞作重校添注柳文四十五卷外集二卷陳氏曰姑蘇鄭定刋於嘉興以諸家所註輯爲一編曰集註曰補註曰章曰孫曰韓曰張曰董氏而皆不註其名其曰重校曰添註則其所附益也韓柳音辯二卷陳氏曰南劔敎授新安張敦頤撰紹興八年進士也劉賔客文集三十卷外集十卷鼂氏曰唐劉禹錫夢得也中山人貞元九年進士登博學宏詞科貶朗州司馬元和十年召還欲任以南省郎作元都觀看花詩譏忿當路出爲播州刺史裴度以母老爲請得易連州入爲主客郎中復作游元都詩以詆權近俄分司東都遷賔客㑹昌時加檢校禮部尚書卒禹錫少工文章恃才而廢老年寡所合乃以文章自適素善詩晚節尤精白居易推爲詩豪嘗言其詩在處應有神物䕶持禹錫早與柳宗元爲文章之友稱劉柳晚與白居易爲詩友號劉白雖詩文似少不及然能抗衡二人間信天下之奇才也陳氏曰集本四十卷逸其十卷常山宋次道裒輯其遺文得詩四百七篇雜文二十二篇爲外集然未必皆十卷所逸也夢得自言吾友柳議曹嘗謂吾文雋而膏味無窮炙而愈出也後村劉氏曰劉賔客夢得所作詩雄渾老蒼沈着痛快小家數不能及絶句尤工又曰夢得歴德順憲穆敬文武七朝其詩尤多感慨惟在人雖晚達於樹比冬青之句差閑婉答樂天云莫道桑榆晚餘霞尚滿天亦足以見其精華老而不竭韋處厚集七十卷唐中書侍郎平章事韋處厚撰劉禹錫序畧曰按公未爲近臣以前所著詞賦讚論記述銘志皆文士之詞也以才麗爲主自入爲學士至宰相以徃所執筆皆經綸制置財成潤色之詞也以識度爲宗觀其發德音福生人沛然如時雨褒元老論功臣穆然如景風命相之冊和而莊命將之誥昭而毅薦賢能其氣似孔文舉論經學其博似劉子駿發十難以摧言利者其辯似管夷吾裴晉公集二卷陳氏曰唐宰相裴度中立撰李觀文編三卷外集二卷鼂氏曰唐李觀元賔也華之從子貞元八年進士中宏詞科終太子校書郎觀爲文不襲前人時謂與韓愈相上下議者以觀文未極愈老不休故擅名陸希聲大順中編觀文爲之序以爲觀尚辭故辭勝理愈尚質故理勝辭雖愈窮老終不能加觀之辭觀後愈死亦不能逮愈之質云其後蜀人趙昻又得其安邊書至鼂錯論一十四首爲後集二卷頃年予從父詹事公掌誥命嘗以四之日爲四日不學者閧然以為非今觀集中亦云爾乃知本於此陳氏曰元賔與韓退之貞元八年同年進士明年試博學宏詞觀中其科而愈不在選顏子不貳過論其年所試文也又一年觀年二十九而卒愈爲之志銘使觀不死豈可量哉歐陽集十卷鼂氏曰唐歐陽詹行周也泉州人終國子四門助敎閩人不肯北官及常衮爲觀察使興學勸士舉進士自詹始與韓愈李觀李絳貞元八年聯第皆天下選時稱龍虎榜云此集李貽孫纂韓退之作詹哀辭稱詹甚美大意謂詹覔舉京師將以爲父母榮也又云其德行信於朋友而唐小説載詹惑太原一妓爲賦高城已不見况復城中人之詩卒為之死今集中亦載焉若然則詹之志豈在其父母哉有德行者乃爾耶陳氏曰詹亦韓愈同年進士考其集中各有明水賦詹亦蚤死愈爲之哀辭尤拳拳焉李翺作傳而李集不載其序福唐廉使李貽孫所爲也詹之爲人有哀辭可信已黄璞何人斯乃有太原函髻之謗好事者喜傳之不信愈而信璞異哉高城不可見之句樂府此類多矣不得以為實也呂衡州集十卷鼂氏曰唐呂溫和叔也一字化光河中人貞元十四年進士以善韋執誼王叔文起家再命左拾遺同張薦使吐蕃元和初使還累遷知御史雜事再貶道州刺史徙衡州溫從梁肅爲文章規摹左氏藻贍精富流輩推尚劉禹錫爲編次其文序之云古之爲書先立言而後體物賈生之書首過秦而荀卿亦後其賦故斷自人文化成論至諸葛武侯廟記爲上篇今集先賦詩後雜文非禹錫本也陳氏曰溫本善韋王偶使絶域得免在八司馬之數而終以好刻敗與竇羣羊士諤昵比傾誣宰相李吉甫謫死屨校不懲至於滅耳此所以爲小人歟文獻通考卷二百三十二
