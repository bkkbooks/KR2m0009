body:
  text: 文獻通考卷三百四十三鄱陽馬端臨貴與著四裔考二十突厥上突厥之先平涼今平涼郡雜胡也蓋胸奴之别種姓阿史那氏後魏太武滅且渠氏且渠牧犍都姑臧謂之北涼為魏所滅阿史那以五百家奔蠕蠕代居金山城狀如兜鍪俗呼兜鍪為突厥因以為號或云其國先於西海之上為鄰國所滅男女無少長盡殺之有一兒年且十嵗以其小不忍殺之乃刖足斷臂棄於大澤中有牝狼每銜肉至其所此兒因食之得以不死其後遂與狼交狼有孕焉負至於西海之東止於山上其山在髙昌西北有洞穴狼入其中遇得平壤茂草地方二百餘里後狼生十男長大外託妻孕其後各為一姓阿史那即其一也子孫蕃育漸至數百家經數代相與穴處而臣於蠕蠕又云先出於索國在胸奴之北其部落大人曰阿謗步兄弟十七人其一曰伊質泥帥都狼所生也謗步等性並愚癡國遂被滅泥帥都既别感異氣能徴召風雨娶二妻云是夏神冬神之女一孕而生四男其大兒名訥都陸設衆奉為主號為突厥都陸所生子皆以母族為姓阿史那是其一也號阿賢設此説雖殊然俱狼種也後魏末其酋帥土門部落稍盛始至塞上通中國至西魏大統十二年乃求婚於蠕蠕蠕蠕主阿那瓌大怒使人罵辱之曰爾是我煆奴何敢發是言也土門發兵擊蠕蠕大破之於懷荒北阿那瓌自殺土門遂自號伊利可汗後魏太武帝時蠕蠕王社崙已自號可汗突厥因之猶古之單于也號其妻為可賀敦亦猶古之閼氏也其子弟謂之特勒别部領兵者謂之設其大官屈律啜次阿波次頡利發吐屯次俟斤其初國貴賤官號凡有十等或以形體或以老少或以顔色鬢髮或以酒肉或以獸名其勇健者謂之始波羅亦呼為英賀弗肥粗者謂三大羅大羅便酒器也似角而粗短體貌似之故以為號此官特貴唯其子弟為之又謂老為哥利故有哥利逹官謂馬為賀蘭故賀蘭蘇尼闕蘇尼掌兵之官也謂黑色者為珂羅便故有珂羅啜官甚髙耆年者為之謂髮為索葛故有索葛吐屯此如州郡官也謂酒為匐你熱汗熱汗掌監察非違釐整班次謂肉為安禪故有安禪具泥掌家事如國官也有時置附鄰可汗鄰狼名也取其貪殺為稱亦有可汗位在葉護下者或有居家大姓相呼為遺可汗者突厥呼屋為遺言屋可汗也木杆可汗土門之子名俟斤一名燕尹狀貌竒異面廣尺餘其色甚赤眼若琉璃性剛暴而多智西破蠕蠕嚈噠東走契丹北並契骨威服塞外諸國其地東自遼海以西西至西海萬餘里南自沙漠北至北海五六千里皆屬焉其俗如古之胸奴其異者其主初立近侍重臣者舁之以氈隨日轉九廽每一廽臣下皆拜訖乃扶令乘馬以帛絞其頸使才不至絶然後釋而急問之曰你能作幾年可汗其主既神情瞀亂不能詳定多少臣下等隨其所言以驗修短之數其後大官有葉護次設特勒次俟利發次吐屯發餘小官凡二十八等皆代襲焉兵器有角弓鳴鏑甲矟刀劍其佩飾則兼有伏突旗纛之上施金狼頭侍衛之士謂之附離夏言亦狼也蓋夲狼生志不忘舊其徵發兵馬及科稅雜畜輒刻木為數並一金鏃箭臘封印之以為信契候月將滿輒為寇鈔其刑法反叛殺人者皆死淫者割勢而腰斬之鬭傷人目者償之以女無女則輸婦損折支體者輸馬盜者則償贓十倍有死者停尸於帳子孫及諸親屬男女各殺羊馬陳於帳前以刀剺面且哭剺理之反血淚俱流如此者七度乃止春夏死者候草木落秋冬死者候華葉榮茂然後坎而瘞之於墓所立石建標其石多少依平生所殺人數是日男女咸盛服飾會於葬所男有悅愛於女者歸即遣人聘問父母多不違也雖遷徙無常而各有地分可汗處於都斤山每嵗率諸貴人祭其先窟又以五月中旬集他人水拜祭天神又都斤西五百里有髙山逈出上無草樹謂為勃登疑梨夏言地神也其書字類胡而不知年歷唯以草青為記男子好摴蒱女踏鞠飲馬酪取醉歌呼相對敬鬼神俟斤既盛使於西魏請誅蠕蠕主事具蠕蠕篇後周武帝納其女為后至他鉢可汗木杆之弟以攝圗為爾伏可汗乙息記可汗之子也乙息記廢攝圗而立俟斤俟斤即木杆可汗也統其東面又以其弟但耨可汗子為步離可汗居西方爾伏與步離皆小可汗耨內沃反控弦數十萬中國憚之周齊爭結婚姻傾府藏事之乃嵗給繒綵十萬段突厥在京師者待以優禮衣錦食肉者常以千數他鉢益驕曰使我在南兩兒孝順何憂貧也齊有沙門惠琳掠之突厥中因謂他鉢曰齊國富強皆為有佛法遂説以因緣果報之理他鉢聞而信之建一伽藍遣使聘齊求淨名涅槃華嚴等經他鉢亦躬自齋戒繞塔行道恨不生內地及齊滅齊定州刺史范陽王髙紹義自馬邑奔之他鉢立紹義為齊帝召集所部云欲為之復讐入寇幽州周以趙王招女為千金公主嫁之始執送紹義他鉢病卒攝圗立為大可汗號沙鉢略可汗治都斤山以他鉢之子菴羅降居獨洛水稱第二可汗木杆之子太邏便乃謂沙鉢略曰我與爾俱可汗子各承父業爾今極尊我獨無位何也沙鉢略以為阿波可汗還鎮所部沙鉢略勇而得衆北狄皆歸附之周武帝之婚於木杆也突厥錦衣肉食在長安者以萬數隋初並罷遣之突厥大怒千金公主聞周滅故悉衆為冦縱兵自木硤石門兩道入武威天水安定金城上郡𢎞化延安六畜咸盡文帝下詔曰往者周齊抗衡分割諸夏突厥之虜俱通二國周人東慮恐齊好之深齊氏西虞懼周交之厚謂虜意輕重國遂安危蓋並有大敵之憂思減一邉之防也朕以為厚斂兆庶多惠豺狼未嘗感恩資而為賊節之以禮不為虛費省徭薄賦國用有餘因入賊之物加賜將士息道路之民務為耕織清邉制勝成策在心凶醜愚暗未知深旨將大定之日比戰國之時乘昔世之驕結今時之恨近者盡其巢穴俱犯北邉蓋上天所忿驅就齊斧諸將令行義兼含育有降者納有違者死其不敢南望求服威刑何用侍子之朝寧勞渭橋之拜乃以河間王𢎞髙熲虞慶則出塞擊之沙鉢略敗走時虜飢甚不得食於是粉骨為糧又多災死者極衆而沙鉢略襲擊阿波大破之阿波西奔逹頭可汗逹頭者名玷厥沙鉢略之從父也舊為西面可汗逹頭即西突厥步迦可汗既而大怒遣阿波率兵而東與沙鉢略相攻於是分為東西部自此分為二國焉迭相侵掠沙鉢略因擊阿波為阿拔國部落乘虛掠妻子隋遣軍為擊阿拔敗之所獲悉與沙鉢略沙鉢略大喜乃立約以磧為界因上表曰大突厥伊利俱盧設始波羅莫可汗臣攝圖言突厥自天置以來五十餘載地過萬里士馬億數常力兼戎夷抗禮華夏在於北狄莫之與大今被霑德義仁化所及禮讓之風自朝滿野竊以天無二日土無二主豈敢阻兵偷竊名號今便歸心有道永為藩附謹遣男臣窟舍真奉表以聞後卒帝為廢朝三日後葉護可汗沙鉢略之弟西征阿波生擒之既而上書請阿波死生之命髙熲進曰骨肉相殘教之蠧也宜存養以示寬大帝曰善頡伽施多那都藍可汗沙鉢之子名雍虞閭後與西面泥利可汗連結阿波可汗既為處羅侯可汗所擒其國乃立鞅素特勒之子時突利可汗居北方沙鉢略弟處羅侯之子名染千遣使求婚開皇中帝妻以宗女安義公主帝欲離間北狄故特厚禮遣牛𢎞蘇威斛律孝卿相繼為使突厥前後使入朝三百七十輩突利夲居北方以尚主之故南徙度斤舊鎮錫賚優厚雍虞閭怒曰我大可汗也反不如染干朝貢遂絶數為邉患雍虞閭與玷厥舉兵攻染干盡殺其兄弟子姪遂入蔚州今安邉郡染干夜以五騎與隋使長孫晟歸朝拜為意利珍豆啓人可汗華言智意健也於朔州今馬邑郡築大利城以居之安義公主死又以宗女義成公主妻之部落歸之甚衆雍虞閭又擊之帝復令入塞遂於河南在夏勝二州之間今朔方榆林郡發役掘塹數百里東西距河盡為啓人畜牧之地詔楊素史萬嵗等擊雍虞閭頻破之雍虞閭旋為部下所殺是嵗泥利可汗及葉護俱被鐡勒所敗并奚霫五部內徙霫先立反啓人遂有其衆煬帝大業三年幸榆林啓人來朝大悅詔贊拜不名位在諸侯王上厚其部落酋長二千五百人賜物二十萬假帝親巡雲中泝金河在今榆林郡而東北幸啓人所居在今馬邑郡啓人奉觴上夀跪伏甚恭明年朝於東都禮賜益厚啓人卒其子咄吉立是為始畢可汗裴矩以突厥始畢可汗部衆漸盛獻策分其勢欲以宗女嫁其弟叱吉設拜為西面可汗叱吉不敢受又詐誘其謀臣使蜀胡悉殺之始畢怨恨不朝十一年煬帝避暑於汾陽宮八月始畢率其衆落入寇圍帝於鴈門詔諸郡發兵赴援始畢引去隋末亂離中國人歸之者無數遂大強盛勢陵中夏迎蕭皇后置定襄薛舉竇建德王世充劉武周梁師都李軌髙開道之徒雖僣尊號俱北面稱臣受其可汗之號東自契丹西盡吐谷渾髙昌諸國皆臣之控弦百萬戎狄之盛近代未之有也唐起義太原劉文靜聘其國引以為援始畢遣特勒康利獻馬千匹會於絳郡又遣二千騎助軍從平京城及髙祖受隋禪以後賞賜不可勝紀始畢使骨咄祿特勒來朝賜宴於太極殿奏九部樂錫賚甚厚二年春始畢帥兵渡河至夏州賊帥梁師都出兵會之謀入抄掠四月授馬邑賊帥劉武周兵百餘騎遣入句注又遣兵大集欲侵太原是月始畢卒其子什鉢苾毗質反以年幼不堪嗣位立為泥步設使居東偏直幽州之北立其弟俟利弗設是為處羅可汗又以隋義成公主為妻使人入朝告喪髙祖為之舉哀廢朝三日詔百官就館弔其使者遣內史舍人鄭德挺往弔處羅賻物三萬段先是隋煬帝蕭后及齊王暕之子政道陷於竇建德三年春處羅迎之至於牙所立政道為王凡中國人在虜庭者悉𨽻之行隋正朔置百官居於定襄城有徒萬餘時太宗奉詔討劉武周師次太原處羅遣其弟步利設率二千騎與官軍會六月處羅至并州總管李仲文出迎勞之留三日城中美婦人多為所掠仲文不能制俄而處羅死義成公主以其子奧射設醜弱廢不立之遂立處羅之弟咄苾是為頡利可汗啓人第三子又納隋義成公主為妻以始畢之子什鉢苾為突利可汗按始畢父啓人可汗染千夲突利可汗今更稱突利蓋襲其先號遣使入朝告處羅死髙祖為之罷朝三日遣百官就館弔其使咄苾初為莫賀設牙直五原之北時薛舉猶據隴右遣其將宗羅㬋攻陷平涼郡北與頡利結連髙祖遣光祿卿宇文歆齎金帛以賂頡利歆説之令與薛舉絶初隋五原太守張長遜因亂以其所部五城𨽻於突厥歆因説頡利遣長遜入朝以五原地歸於我頡利並從之因發突厥兵及長遜之衆並會於太宗軍所頡利承父兄之資兵馬強盛有慿陵中夏之志髙祖以中原初定未遑外略每優容之賜豫不可勝計頡利言辭悖傲求請無厭四月頡利自率萬餘騎與馬邑賊苑君璋將兵六千人共攻鴈門定襄王李大恩擊走之於是大懼更請和好獻魚膠數十斤令二國同於此膠髙祖五年春大恩奏言突厥飢荒馬邑可圖詔大恩與殿內少監獨孤晟帥兵討苑君璋期以二月會於馬邑晟後期不至大恩不能獨進頓兵新城以待之頡利遣數萬騎與劉黑闥合軍進圍之大恩敗績沒於陳六月劉黑闥又引突厥萬餘騎入抄河北頡利復自率五萬騎南侵至於并州太宗帥師出蒲州道以討之時頡利攻圍并州又分兵入汾潞等州掠男女五千餘口聞太宗兵至蒲州乃引兵出塞七年八月頡利突利二可汗又入寇原州連營南上太宗北討頓兵於豳州頡利率萬餘騎奄至城西乘髙而陳將士大駭太宗乃親率百騎馳詣虜陳告之曰國家與可汗誓不相負何為背約深入吾地我秦王也故來一決可汗若自來我當與可汗兩人獨戰若欲兵馬總來我唯百騎相禦耳頡利弗之測笑而不對太宗又前令騎告突利曰爾往與我盟急難相救爾今將兵來何無香火之情也亦宜早出一決勝負突利亦不對太宗因縱反間於突利突利悅而歸心焉其叔姪內離頡利因遣使請和許之八年七月頡利領十餘萬騎大掠朔州又襲將張瑾於太原瑾全軍沒脫身奔於李靖靖出師拒戰頡利不得進屯於并州太宗帥師討之次蒲州頡利引去九年七月頡利又率十餘萬騎進冦武功京師戒嚴己卯進冦髙陵行軍總管左武候大將軍尉遲敬德與之戰於涇陽大破之獲俟斤阿史德烏沒啜斬首千餘級癸未頡利遣其腹心執失思力來朝自張形勢云兵百萬今至矣太宗謂之曰我與突厥面自和親汝則背之我實無愧又義軍入京之初爾父子並親從我賜爾玉帛前後極多何故全忘大恩自誇強盛我當先戮爾矣思力懼而請命太宗縶之於門下省太宗與侍中髙士亷中書令房元齡將軍周範馳六騎幸渭水之上與頡利隔津而語責以負約其酋帥大驚皆下馬羅拜而衆軍徑至頡利見軍容大盛又知思力就拘由是大懼太宗獨與頡利臨水交言麾諸軍却而陳焉蕭瑀以輕敵固諫於馬前上曰吾已籌之矣突厥所以掃其境內直入渭濵應是聞我國家初有內難我新登九五將謂不敢拒之今若閉門虜必大掠強弱之勢在今一舉我故獨出一以示輕之又耀軍容使之必戰事出不意乘其不圖虜入既深理當自懼與戰則必尅與和則必固制服北狄自兹始矣是日頡利請和詔許之乙酉又幸城西刑白馬頡利同盟於便橋之上頡利引兵而退蕭瑀進曰初頡利之未和謀臣猛將各欲戰而陛下不以為疑既而虜自退其䇿安在上曰我觀突厥之兵雖衆而不整可汗獨在水西酋帥皆來謁我因而襲擊其衆勢同拉朽然我所以不戰者即位日淺為國之道安靜為務一與虜戰必有死傷又凶虜一者或當懼而修德結怨於我為患不細我今卷甲韜戈啖以玉帛頑虜驕恣必自此始破亡之漸其在兹乎九月頡利獻馬三千匹羊萬口上不受詔頡利所掠中國户口者令歸之貞觀元年陰山以北薛延陀回紇拔也古等十餘部皆相率叛之擊走其欲谷設頡利遣突利討之師又敗績輕騎奔還頡利怒拘之十餘日突利由是怨憾內欲背之二年突利遣使奏言與頡利有隙奏請擊之詔秦武通以并州兵馬隨便應接三年薛延陀自稱可汗於漠北遣使來貢方物頡利稱臣求尚公主頡利每委任諸胡疏逺族類胡人貪冒性多翻覆以故法令滋章兵革嵗動國人患之諸部擕二頻年大雪六畜多死國中大餒頡利用度不給復重斂諸部由是下不堪命內外多叛之上以其請和後復援梁師都令兵部尚書李靖代州都督張公瑾出定襄道并州都督李績右武衛將軍邱行恭出通漢道左衛大將軍柴紹出金河道衛孝節出恆安道薛萬徹出暢武道並受靖節度以討之十二月突利可汗及郁討設蔭奈特勒等並率所部來奔四年正月李靖進屯惡陽嶺夜襲定襄頡利驚擾因徙牙於磧口胡酋康蘇密等遂以隋蕭后及楊政道來降二月頡利計窘竄於鐡山兵尚數萬使執失思力入朝謝罪請舉國內附太宗遣鴻臚卿唐儉將軍安修仁持節安撫之頡利稍自安靖乘間襲擊大破之遂滅其國復定襄恆安之地斥土界至於大漠頡利乘千里馬獨騎奔於從姪沙鉢羅部落三月行軍副總管張寶相率衆掩至沙鉢羅營生擒頡利送於京師太宗赦之令還其家口館於大僕廪食之頡利鬱鬱不得志與其家人或相對悲歌而泣上見其羸憊授虢州刺史以彼土多麞鹿縱其畋獵庶不失物性頡利辭不願往遂授右衛大將軍賜以田宅八年卒令其國人葬之從其俗禮焚尸灞水之東贈歸義王諡曰荒其舊臣故祿逹官吐谷渾邪自刎以殉渾邪者頡利之母婆施氏之媵臣也頡利初誕以付渾邪至是感義而死太宗聞而異之贈中郎將乃葬於頡利墓側令中書侍郎岑文本制頡利及渾邪之碑以紀之突利可汗什鉢苾者始畢之嫡子頡利之姪也隋大業中突利年數嵗始畢遣領其東牙之兵號為泥步設隋淮南公主之入北也遂妻之頡利嗣立以為突利可汗牙直幽州之北管奚霫等數十部徴稅無度諸部多怨之貞觀初奚等並來歸附頡利怒其失衆遣北征薛延陀又喪師旅遂囚而撻焉突利初自武德時深自結託太宗亦以恩意撫之結為兄弟與盟而去後頡利政亂驟徴兵於突利拒之不與尋為頡利所攻遣使來乞師太宗因令將軍周範屯太原以圖進取突利乃率其衆來奔太宗禮之甚厚頻賜以御膳四年授右衛大將軍封北平郡王食實封七百戶以其下兵衆置順州都督府仍拜為順州都督遣率部落還畨太宗謂曰昔爾祖啓人亡失兵馬一身投隋隋家竪立遂至強盛荷隋之恩未嘗報德至爾父始畢反為隋家之患自爾以後無嵗不侵擾中國天實禍淫大降災變爾衆散亂死亡略盡既事窮後乃投我今所以不立爾為可汗者正為啓人前事故也改變前法欲中國久安爾宗族永固是以授爾都督當須依我國法整齊所部如違當獲重罪五年徴入朝至并州道病卒年二十九太宗為之舉哀令中書侍郎岑文夲為其碑文子賀羅鶻嗣突利弟結社率貞觀初入朝歷位中郎將十三年從幸九成宫陰結部落得四十餘人并擁賀羅鶻相與夜犯御營踰第四重幕引弓亂發殺衛士數十人折衝孫武開率兵奮擊乃退北走渡渭水欲奔其部落尋皆捕斬之詔原賀羅鶻流於嶺表頡利之敗也其部落或走薛延陀或走西域而來降者甚衆酋豪首領至者皆拜將軍布列朝廷五品以上百餘人殆與朝士相半唯柘羯不至詔使招慰之時突厥降者十餘萬人詔議所宜咸言突厥擾中國久今天喪之非慕義自歸請悉籍降俘內兖豫間處使習耕織百萬人虜可化為齊人是中國有加戶而漠北遂空也中書令溫彥博請如漢建武時置降胸奴留五原塞全其部落以為扞蔽不革其俗因而撫之實空虛之地且示無所猜若內兖豫則乖本性非涵育之道祕書監魏徵建言突厥世為中國仇今其來降不即誅滅當遣還河北彼鳥獸野心非我族類弱則伏強則叛其天性也且秦漢以鋭師猛將擊取河南地為郡縣者以不欲使迫近中國也陛下奈何以河南居之且降者十萬若令數年孳息略倍而近在畿甸心腹疾也彥博曰不然天子於四夷若天地養萬物覆載安全之今突厥破滅餘種歸命不加哀憐而棄之非天地蒙覆之義而有阻四夷之嫌臣謂處以河南蓋死而生之亡而存之彼世將懷德何叛之為徴曰魏時有胡落分處近郡晉已平吳郭欽江統勸武帝逐出之不能用劉石之亂卒傾中夏陛下必欲引突厥居河南所謂養虎自遺患者也彥博曰聖人之道無不通故曰有教無類彼創殘之餘以窮歸我我全護之收處內地將教以禮法職以耕農又選酋良入宿衛何患之恤且光武置南單于卒無恙於是中書侍郎顔師古給事中杜楚客禮部侍郎李百藥等皆勸帝不如使處河北樹首長俾統部落視地多少令不相臣國小權分終不得亢衡中國長轡逺馭之道也帝主彥博語卒度朔方地自幽州屬靈州建順祐化長四州為都督府剖頡利故地左置定襄都督右置雲中都督二府統之自結社率之反太宗始患之上書者多云處突厥於中國殊謂非便乃徙於河北立右武候大將軍化州都督懷化郡王思摩為乙彌泥熟俟利苾可汗賜姓李氏率所部建牙於河北思摩者頡利族人也始畢處羅以其貌似胡人不類突厥疑非阿史那族類故歷處羅頡利代常為夾畢特勒終不得典兵為設武德初數來朝貢封為和順郡王及其國亂諸部多歸中國唯思摩隨逐頡利竟與同擒太宗嘉其忠夲統頡利舊部落居於河南之地勝兵四萬馬萬匹錫其土南至於大河北至白道川以北接薛延陀為種落初集憚薛延陀不肯出太宗遣司農卿郭嗣夲賜延陀璽書曰前破突厥止為頡利一人除百姓之害所以廢而黜之實不貪其土地利其人馬也自黜廢頡利以後恆欲更立可汗是以所降部落等並置河南任其放牧今戶口羊馬日向滋多元許册立不可失信至秋間即欲遣突厥渡河復其國土我册爾延陀日月在前今突厥理是居後後者為小前者為大爾在磧北突厥居磧南各守土境若其踰越故相抄掠我即將兵各問其罪此約既定非但有便爾身貽厥子孫長守富貴也於是命禮部尚書趙郡王孝恭齎册書就思摩部落築壇於河上以拜之并賜之鼓纛突厥及胡在諸州安置者並令渡河北還其舊部又以左屯衛將軍阿史那忠為左賢王左武衛將軍阿史那泥熟為右賢王以二之薛延陀聞思摩渡河北慮其部落翻附磧北先畜輕騎伺至而擊之太宗遣敕止之時思摩下部衆渡河者凡十萬勝兵四萬人思摩不能撫衆皆不愜服至十七年相率叛之南渡河請分處於勝夏二州之間詔許之思摩遂輕騎入朝尋授右衛將軍從征遼東為流矢所中太宗親為吮血其見顧遇如此未幾卒於京師贈兵部尚書夏州都督陪葬昭陵立墳以象白道山詔立碑於化州突厥中突厥别部車鼻可汗亦阿史那之族也代為小可汗牙在金山之北頡利可汗之敗北荒諸部將推為大可汗遇薛延陀為可汗車鼻不能當遂率所部歸於延陀為人勇烈有謀略頗為衆所附延陀惡而將誅之車鼻知其謀竄歸於舊所其地去京師萬里勝兵三萬人自稱乙注車鼻可汗西有葛邏祿北有結骨皆附𨽻之遣其子沙鉢羅特勒來朝請身自入朝太宗遣徴之竟不至太宗大怒貞觀二十三年遣左衛郎將髙侃濳引廽紇僕骨等兵衆襲擊之其酋長歌邏祿泥熟闕俟利發反拔塞匐處木昆莫賀咄俟斤等率部落背車鼻相繼來降永徽元年侃軍次阿息山車鼻聞之召所部兵皆不赴遂擕其妻子從數百騎而遁其衆盡降侃率精騎追車鼻獲之送於京師乃獻於社廟又獻於昭陵髙宗數其罪而赦之拜左武衛將軍賜宅於長安處其餘衆於鬱督軍山置狼山都督以統之車鼻長孫羯漫陀先統拔悉密部車鼻未敗前遣其子菴鑠入朝太宗嘉之拜左屯衛將軍更置新黎州以統其衆車鼻既敗之後於是突厥盡為封疆之臣於是分置單于瀚海二都護府單于領狼山雲中桑乾三都督蘇農等十四州瀚海領金微新黎等七都督仙崿賀蘭等八州各以其首為都督刺史髙宗東封泰山狼山都督葛邏祿吐利等首領二十餘人並從至嶽下勒名於封禪之碑自永徽以後二十餘年北鄙無事調露元年單于管內突厥首領阿史德溫奉職二部落相率反叛立泥熟匐為可汗二十四州並叛應之髙宗遣鴻臚卿蕭嗣業右千牛將軍李景嘉率衆討之反為溫敗兵士死者萬餘人又以禮部尚書裴行儉為定襄道行軍大總管率太僕少卿李思文營州大都督周道謨等統衆三十餘萬討擊溫大破之泥熟匐為其下所殺並擒奉職而還永崇元年突厥又迎頡利從兄之子阿史那伏念於夏州將渡河立為可汗諸部落復響應從之又令裴行儉率師討之伏念窘急詣行儉遂虜伏念詣京師斬於東市永淳二年突厥阿史那骨咄祿復反叛骨咄祿者頡利之疏屬其父本是單于右廂雲中都督尉舍利元英下首領代襲吐屯啜伏念既破骨咄祿鳩集亡散入總林山聚為盜有衆五千餘人又抄掠九姓得羊馬甚多漸至強盛乃自立為可汗以其弟默啜為殺咄悉匐為葉護因溫彥博議處河南諸部落分為六州後漸滋繁至阿史那元珍習中國風俗知邉塞虛實在單于檢校降戶部落嘗坐事為單于長史王本立所拘縶會骨咄祿入冦元珍請依舊檢校部落本立許之因而便投骨咄祿咄祿得之甚喜立為阿波大逹于專統兵馬事進寇蔚州都督崔智辨擊之反為所殺文明元年又寇朔州殺掠吏人垂拱二年骨咄祿又寇朔代等州左玉鈐衛中郎將淳于處平為陽曲道總管與副中郎將蒲英等率兵赴援行至欣州與賊戰大敗死者五千餘人三年骨咄祿又寇昌平令左鷹揚衛大將軍黑齒常之擊却之其年八月寇朔州復以常之為燕然道大總管擊賊於黃花堆大破之追奔四千餘里賊衆遂散走磧北右監門衛中郎將爨寶璧又率精兵萬三千人出塞窮追反為骨咄祿所敗全軍盡沒寶璧輕騎遁歸初寶璧見常之破賊遽表請窮其餘黨武太后令常之與寶璧計議遙為聲援寶璧貪功先行又令人出塞二千餘里覘候見元珍等部落皆不設備遂率衆掩襲之既至又遣人報賊令得設備出戰遂為賊所覆寶璧坐此伏誅武太后大怒因改骨咄祿為不卒祿元珍後率兵討突騎施臨陳戰死骨祿天授中卒默啜者骨咄之弟也骨咄祿死時其子尚幼默啜遂篡其位自立為可汗長夀三年率衆寇靈州殺掠吏人武太后遣白馬寺僧薛懷義為代朔道行軍大總管領十八將軍以討之既不遇賊尋班師焉默啜俄遣使來朝武太后大恱册授左衛大將軍封歸國公賜物五千假明年復遣使請和又加授遷善可汗萬嵗通天元年契丹首領李盡忠孫萬榮反叛攻陷營府默啜遣使上言請還河西降户即率部落兵馬為國討擊契丹許之默啜遂攻討契丹部衆大潰盡俘其家口默啜自此兵衆漸盛武太后尋遣使册立默啜為特進頡跌大單于立功報國可汗聖歷元年默啜表請與武太后為子並言有女請和親初咸亨中突厥諸部來降附者多處之豐勝靈夏朔代等六州謂降户默啜至是又索此降户及單于都護府之地兼請農器種子武太后初不許默啜大怒言辭甚慢拘我使人司賔卿田歸道將害之時朝廷懼其兵勢納言姚璹建議請許其和親遂盡驅六州降户數千帳並種子四萬餘石農器三千事以上與之默啜寖強由此也其年武太后令魏王武承嗣男淮陽王延秀就納其女為妃遣右豹韜衛大將軍閻知微攝春官尚書大齎金帛送赴虜庭行至黑沙南庭默啜謂知微等曰我女擬嫁與李家天子兒爾今將武家兒來我突厥積代以來降附李家聞李家天子種未總盡唯有兩兒在我今將兵助立遂收延秀等拘之别所偽號知微為可汗與之率衆十餘萬襲我靜難及平狄清夷等軍靜難軍使左玉鈐衛將軍慕容元崱以兵五千人降虜進寇媯檀等州武太后令司農卿武重規為天兵中道大總管武威衛將軍沙吒忠義為天兵西道總管幽州都督張仁亶為天兵東道總管率兵三十萬擊之左羽林衛大將軍閻敬容為天兵西道後軍總管統兵十五萬以為後援默啜又出恆州道寇蔚州陷飛狐縣俄進攻定州殺刺史孫彥髙焚燒百姓廬舍虜掠男女無少長皆殺之武太后大怒又改默啜號為斬啜尋又圍逼趙州長史唐波若翻城應之刺史髙睿抗節不從遂遇害武太后乃立廬陵王為皇太子令統河北道行軍大元帥軍未發而默啜盡殺所掠趙定等州男女八九萬人從五回道而去所過殘殺不可勝紀沙吒忠義及後軍總管李多祚等皆持重不敢戰河北道元帥納言狄仁傑總兵十萬追之無所及二年默啜立其弟咄悉匐為左廂察骨咄祿子默矩為右廂察各主兵馬二萬餘人又立其子匐俱為小可汗位在兩察之上仍主處木昆等十姓兵馬四萬餘人又號為拓西可汗自是連嵗寇邉久視元年掠隴右諸監馬萬餘匹長夀三年默啜遣使莫賀逹于請以女妻皇太子之子武太后令太子男恩平王重俊義興王重明廷立見之默啜遣大臣移力貪汗入朝獻馬千匹及方物以謝許親之意武太后宴之於宿羽亭太子相王及朝集使三品以上並會焉重賜以遣之中宗即位默啜又寇靈州鳴沙縣靈武軍大總管沙叱忠義拒戰敗績死者六千餘人賊遂進寇原會等州掠隴右郡牧馬萬餘匹而去忠義坐免景雲二年三月張仁願於河北築三受降城先是朔方軍北與突厥以河為界河北岸有拂雲祠突厥將入寇必先詣祠祭酹求福因牧馬料兵候氷合渡河時默啜盡衆西擊婆葛仁願乘虛奪取漠南之地築三城首尾相應絶其南寇之路留年滿兵助成其功以拂雲祠為中城與東西相去各四百里皆據津濟遙相應接北拓三百餘里於牛頭胡那山北置烽堠百八十所自是突厥不得度山放牧朔方更無寇掠減鎮兵數萬人初羣議不同睿宗竟用仁願計時咸陽兵二百餘人逃歸仁願盡擒斬於城下軍中股栗盡力六旬而三城俱就本不置壅門及曲敵或問之仁願曰兵法貴在攻取不宜退守寇若至此即當並力出戰廽顧望城猶須斬之何用守備生其退歸之心其後常元楷為朔方總管始築壅門默啜西擊婆葛破滅之契丹及奚自神功之後常受其徴役其地東西萬餘里控弦四十萬自頡利之後最為強盛自恃兵威虐用其衆默啜既老部落漸多逃散開元二年遣其子移沮可汗及同俄特勒妹壻大拔頡利發石阿失畢率精騎圍逼北庭右驍衛將軍郭虔瓘嬰城固守俄而出兵擒同俄特勒於城下斬之虜因退縮大拔懼不敢歸擕其妻來奔制授左衛大將軍封燕北郡王封其妻為金山公主賜宅一區奴婢十人馬十匹物千段明年十姓部落左廂咄陸啜右廂五弩失畢五俟斤及子壻髙麗莫離支髙文簡􅎤跌都督思太等各率其衆相繼來降前後總萬餘帳令居其河南之舊地授髙文簡左衛員外大將軍封遼西郡公􅎤跌思太為特進右衛員外大將軍兼􅎤跌都督樓煩郡公自餘首領封拜賜物各有差默啜女壻阿史得胡祿俄又歸朝授以特進其秋默啜與九姓首領阿思布等戰於磧北九姓大潰人畜多死思布率衆來降四年默啜又北討九姓拔曳固戰於獨樂河拔曳固大敗默啜負勝輕歸而不設備遇拔曳固逆率頡質略於柳林中突出擊默啜斬之便與入蕃使郝靈佺傳默啜首至京師骨咄祿之子闕特勒鳩合舊部殺默啜子小可汗及諸弟並親信略盡立左賢王默棘連是為毗伽可汗毗伽以開元四年即位本蕃號為小殺性仁友自以得國是闕特勒之功固讓之闕特勒不受遂以為左賢王專掌兵馬是時奚契丹相率欵塞突騎施蘇祿自立為可汗突厥部落頗多擕二及召默啜時衙官暾欲谷為謀主初默啜下衙官盡為闕特勒所殺暾欲谷以女為小殺可敦遂免死廢歸落及復用年已七十餘蕃人盡敬伏之俄而降户阿悉爛􅎤跌思太等復自河西叛歸初降戶之南也左衛大將軍單于副都護張知運盡收其器仗令渡河而蕃人怨怒御史中丞薑晦為巡邉使蕃人訴無弓矢不得射獵晦悉給還之故有抗敵之具張知運不設備與降戶戰於青岡嶺大敗臨陳生擒知運擬將送與突厥朔方總管薛訥率兵追討之賊至大斌縣又為將軍郭知運所擊賊衆大潰散投黑山呼延谷釋張知運而去上以張知運喪師斬之以徇小殺既得降户謀欲南入為寇暾欲谷曰唐主英武人和年豐未有間隙不可動也我衆新集猶尚疲羸須且息養三數年始可觀變而舉小殺又欲修築城壁造立寺觀暾欲谷曰不可突厥人户寡少不敵中國百分之一所以常能抗拒者正以隨逐水草居處無常射獵為業人皆習武強則進兵抄掠弱則竄伏山林唐兵雖多無所施用若築城而改變舊俗一朝失利必將為唐所併且寺觀之法教人仁弱本非用武爭強之道不可置也小殺等深然其計八年冬御史大夫王晙為朔方大總管奏請西徴拔悉密東發奚契丹兩蕃期以明年秋初引朔方兵數道俱入掩突厥衙帳於稽落河上小殺聞之大恐暾欲谷曰拔悉密今在北庭與兩蕃東西相去極逺勢必不合王晙兵馬計亦無能至此必若能來候其臨到即移衙帳向北三日唐兵糧盡自然去矣且拔悉密輕而好利聞命必是先來王晙與張嘉貞不協奏請有所不愜必不敢動若晙兵馬不來拔悉密獨至即擊取之勢易為也拔悉密果臨突厥衙帳而王晙兵及兩蕃不至拔悉密懼而引退突厥欲擊之暾欲谷曰此衆去家千里必將死戰未可擊也不如以兵躡之去北庭二百里暾欲谷分兵間道先掩北庭因縱卒擊拔悉密之衆盡為突厥所擒并虜其男女而還暾欲谷回兵因出赤亭以掠涼州羊馬時楊敬述為涼州都督遣副將及判官元澄出兵邀擊之暾欲谷曰敬述若守城自固即與連和若出兵相當即領軍戰我今乘勝必有功矣敬述下兵至那契丹遇賊元澄令兵士揎臂持滿仍急結其袖會風雪凍裂盡墮弓矢由是官軍大敗元澄脫身而走敬述坐削除官爵白衣檢校涼州事小殺由是大振盡有默啜之衆俄又遣使請和乞與元宗為子許之仍請尚公主上但厚賜而遣之十三年上將東巡中書令張説謀欲加兵以備突厥兵部郎中裴光庭曰封禪告成之事忽此徴發豈非名實相乖説曰突厥比雖請和獸心難測且小殺者仁而愛人衆為之用闕特勒驍武善戰所向無前暾欲谷深沈有謀老而益壯李靖徐績之流也三虜協心動無遣䇿知我舉國東巡萬一窺邉何以禦之光庭請遣使召其大臣扈從即突厥不敢不從又亦難為舉動説然其言乃遣中書直省袁振攝鴻臚卿往突厥以告其意小殺與妻及闕特勒暾欲谷等環坐帳中設宴謂振曰吐蕃狗種唐國與之為婚奚及契丹舊是突厥之奴亦尚唐家公主突厥前後請結和親獨不蒙許何也袁振曰可汗既與皇帝為子父子豈合婚姻小殺等曰兩蕃亦蒙賜姓猶得尚公主但依此例有何不可且聞入蕃公主皆非天子女今之所求豈問真假頻請不得亦實羞見諸蕃振許為奏請小殺乃遣大臣阿史得頡利發入朝貢獻因扈從東巡令仗內馳射扈封畢厚宴賜遣之然卒不許和親自是比年遣大臣入朝吐蕃以書約同寇邉默棘連不從封上其書帝嘉之詔朔方西受降城許互市嵗賜帛數十萬默棘連死國人共立其子為伊然可汗八年卒其弟嗣立為苾伽骨咄祿可汗明年遣使來朝獻登俐俄為其左殺判闕特勒所殺遂立毗加可汗子又為骨咄葉護所殺立其弟又殺之葉護乃自為可汗天寶初其大部回紇葛邏祿拔悉密並起攻葉護殺之尊拔悉密之長為頡跌伊施可汗於是回紇葛邏祿自為左右葉護亦遣使者來告國人奉判闕特勒子為烏蘇米施可汗以其子葛臘哆為西殺帝使使者諭令內附烏蘇不聽其下與拔悉密等三部共攻烏蘇米施米施遁亡其西葉護阿布思及葛臘多率五千帳降以葛臘哆為懷恩王三載拔悉密等殺烏蘇米施傳首京師獻太廟其弟白眉特勒鶻隴匐立是為白眉可汗於是突厥大亂國人推拔悉密酋為可汗詔朔方節度使王忠嗣以兵乘其亂抵薩河內山擊其左阿波逹于十一部破之獨其右未下而回紇葛邏祿殺拔悉密可汗奉回紇骨力裴羅定其國是為骨咄祿毗伽闕可汗明年殺白眉可汗傳首獻毗伽可汗妻骨咄祿婆匐可敦率衆自歸天子御花蕚樓宴羣臣賦詩美其事封可敦為賔國夫人嵗給粉直二十萬始突厥國於後魏大統時至是滅後或朝貢皆舊部九姓云其地盡入回紇始其族分國於西者曰西突厥文獻通考卷三百四十三
