body:
  text: 文獻通考卷二十一鄱陽馬端臨貴與著市糴考二常平義倉租税齊管仲相桓公通輕重之權曰嵗有凶穰故榖有貴賤令有緩急故物有輕重上令急於求米則民重米緩於求米則民輕米所緩則賤所急則貴人君不理則畜賈游於市謂賈人之多蓄積也乗民之不給百倍其本矣給足也以十取百故萬乗之國必有萬金之賈千乗之國必有千金之賈者利有所并也國多失利則臣不盡忠士不盡死矣計本量委則足矣委積也然而民有饑餓者穀有所藏也謂富人多藏穀也民有餘則輕之故人君歛之以輕民不足則重之故人君散之以重民輕之之時官為歛糴人重之之時官為散之凡輕重歛散之以時即凖平守凖平使萬室之邑必有萬鍾之藏藏鏹千萬六斛四斗為鍾鏹錢貫千室之邑必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘奉謂供奉耒耜器械種饟糧食必取贍焉故大賈畜家不得豪奪吾民矣豪謂輕侮之管子曰夫物多則賤寡則貴散則輕聚則重人君知其然故視國之羡羡餘也羊見反不足而御其財物榖賤則以幣與食布帛賤則以幣與衣視物之輕重而御之以準故貴賤可調而君得其利則古之理財賦未有不通其術焉穀賤則以幣與食布帛賤以幣與衣者與當為易隨其所賤而以幣易取之則輕重貴賤由君上也桓公問管子曰終身有天下而勿失有道乎對曰請勿施於天下獨施之於吾國國之廣狹壤之肥磽有數終嵗食餘有數彼守國者守穀而已矣曰某縣之壤廣若干某縣之壤狹若干國之廣狹肥磽人之所食多少其數君素皆知之則必積委幣委蓄也各於州縣里蓄積錢幣所謂萬室之邑必有萬鍾之藏藏鏹千萬千室之邑必有千鍾之藏藏鏹百萬於是縣州里受公錢公錢即積委之幣秋國穀去參之一去減也邱呂反君下令謂郡縣屬大夫里邑皆藉粟入若干榖重一也以藏於上者一其穀價而收藏之國榖三分則二分在上矣言先貯幣於縣邑當秋時下令收糴也則魏李悝行平糴之法上熟糴三捨一中熟糴二捨一下熟中分之盖出於此今言去三之一者約中熟為準耳泰春國榖倍重數也泰夏賦穀以理田土泰秋田榖之存子者若干今土歛穀以幣人曰無幣以榖則人之三有歸於上矣言當春穀貴之時計其價以穀賦與人秋則歛其幣雖設此令本意收其穀人既無幣請輸穀故歸於上重之相因時之化舉無不為國筴重之相因若春時榖貴與穀也時之化舉若秋時穀賤收穀也因時之輕重無不以術權之則彼諸侯之穀十吾國榖二十則諸侯穀歸吾國矣諸侯榖二十吾國穀十則吾國穀歸於諸侯矣故善為天下者謹守重流重流謂嚴守榖價不使流散而天下不吾洩矣洩散也吾穀不敢出彼重之相歸如水之就下吾國嵗非凶也以幣藏之故國穀倍重諸侯之穀至也是藏一分以致諸侯之一分也利不奪於天下大夫不得以富侈以重藏經國常有十國之筴也此以輕重御天下之道也魏文侯相李悝曰糶甚貴傷人此人謂糶工商甚賤傷農人傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使人無傷而農益勸今一夫挾五口治田百畝嵗收畝一石半為粟百五十石除十一之税十五石餘百三十五石食人月一石半五人嵗終為粟九十石餘有四十五石石三十為錢千三百五十除社閭嘗新春秋之祠用錢三百餘千五十衣人率用錢三百五人終嵗用千五百不足四百五十少四百五十不足不幸疾病死喪之費及上賦歛又未與此此農夫所以常困有不勸耕之心而令糶至於甚貴者也是故善平糴者必謹觀嵗有上中下熟上熟其收自四餘四百石平嵗百畝收百五十石今大熟四倍收六百石計人嵗終長四百石官糴三百石此為糴三舍一也中熟自三餘三百石自三四百五十石也終嵗長三百石官糴二百石此為糴二而舍一也下熟自倍餘百石自倍收三百石終嵗長百石官糴其五十石云下熟糴一謂之中分百石之一也小饑則收百石平嵗百畝之收收百五十石今小饑收百石收三分之二也中饑七十石收二分之一也大饑三十石收五之一也以此推之大小中饑之率故大熟則上糴三而舎一中熟則糴二下熟則糴一使人適足價平則止小饑則發小熟之所歛官以歛藏出糶中饑則發中熟之所歛大饑則發大熟之所歛而糶之故雖遇饑饉水旱糶不貴而人不散取有餘以補不足也行之魏國國以富強按古今言糶糴歛散之法始於齊管仲魏李悝然管仲之意兼主於富國李悝之意專主於濟民管仲言人君不理則畜賈游於市乗民之不給百倍其本此則桑孔以來所謂理財之道大率皆宗此説然山海天地之藏闗市物貨之聚而豪強擅之則取以富國可也至於農人服田力穡之贏餘上之人為制其輕重時其歛散使不以甚貴甚賤為患乃仁者之用心若諉曰國家不取必為兼并者所取遂歛而不復散而資以富國誤矣漢五鳳中嵗數豐穰榖至石五錢農人少利大司農中丞耿壽昌奏言故事嵗漕闗東穀四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡穀足供京師可省闗中漕卒過半又令邊郡皆築倉以榖賤時増其價而糴以利農穀貴時減價而糶名曰常平倉民便之後漢明帝永平五年作常平倉按後漢書劉般傳顯宗欲置常平倉公卿議者多以為便般對以為常平外有利民之名而内實侵刻百姓豪右因縁為姦小民不得其平置之不便帝乃止然則豈後來卒置之與般所言者後世常平之弊常平起於孝宣之時盖至東漢而其弊已如此矣晉武帝欲平一江表時榖賤而布帛貴帝欲立平糴法用布帛市穀以為糧儲議者謂軍資尚少不宜以貴易賤泰始二年帝乃下詔曰古人權量國用取贏散滯有輕重平糴之法此事久廢希習其宜而官蓄未廣言者異同未能逹通其制更令國寳散於穰嵗而上不收貧人困於荒年而國無備豪人富商挾輕資藴重積以管其利故農夫苦其利而末作不可禁也至四年乃立常平倉豐則糴儉則糶以利百姓齊武帝永明中天下米穀布帛賤上欲立常平倉市積為儲六年詔出上庫錢五千萬於京師市米買絲綿紋絹布揚州出錢千九百一十萬治建業今江寧郡南徐州二百萬治京口今丹陽郡各於郡所市糴南荆河州二百萬治夀春市絲綿紋絹布米大麥江州五百萬治潯陽市米胡麻荆州五百萬今江陵郢州三百萬治江夏皆市絹綿布米大小豆大麥胡麻湘州二百萬今長沙市米布蠟司州二百五十萬治汝南今義陽郡西荆河州二百五萬治歴陽南兗州二百五十萬治廣陵雍州五百萬治襄陽市絹綿布米使臺傳並於所在市易後魏孝文時祕書丞李彪上奏曰今山東饑京師儉臣以為宜折州郡常調九分之二京師都度支嵗用之餘各立官司年豐糴積於倉時儉則減私之十二糶之如此人必立田以買官絹又務貯錢以取官粟年豐則常積嵗凶則直給明帝神龜正光之際自徐揚内附之後收内兵資與人和糴積為邊備也北齊河清中令諸州郡皆别置富人倉初立之日准所領中下戸口數得一年之糧逐當州穀價賤時斟量割當年義租充入齊制嵗每人出墾租二石義租五斗墾租送臺義租納郡以備水旱穀貴下價糶之賤則還用所糴之物依價糴貯後周文帝創制六官司倉掌辨九穀之物以量國用足蓄其餘以待凶荒不足則止餘用足則以粟貸人春頒秋歛隋文帝開皇十四年闗中大旱人饑帝幸洛陽因令百姓就食從官並准見口賑給不以官位為限隋文帝開皇三年衛州置黎陽倉陜州置常平倉華州置廣通倉轉相灌注漕闗東及汾晉之粟以給京師置常平監五年工部尚書長孫平奏古者三年耕而餘一年之積九年作而有三年之儲雖水旱為災人無菜色皆由勸導有方蓄積先備請令諸州百姓及軍人勸課當社共立義倉收穫之日隨其所得勸課出粟及麥於當社造倉窖貯之即委社司執帳檢校每年收積勿損敗若時或不熟當社有饑饉者即以此穀賑給自是諸州儲峙委積至十五年以義倉貯在人間多有費損詔曰本置義倉止防水旱百姓之徒不思久計輕爾費損於後乏絶又北境諸州異於餘處靈夏甘𤓰等十一州所有義倉雜種並納本州若人有旱儉少糧先給雜種及遠年粟十六年又詔秦渭河廓豳隴涇寕原敷丹延綏銀等州社倉並於當縣安置又詔社倉凖上中下三等税上戸不過一石中户不過七斗下户不過四斗致堂胡氏曰賑饑莫要乎近其人隋義倉取之於民不厚而置倉於當社饑民之得食也其庶㡬乎儲備如此他日闗中大旱民猶不免食粟糠豆屑帝親帥之如洛陽就食况素無備乎百姓知擠於溝壑耳後世義倉之名固在而置倉於州郡一有凶饑無狀有司固不以上聞也良有司敢以聞矣比及報可委吏屬出而文移反覆給散艱阻監臨胥吏相與侵没其受惠者大扺近郭力能自逹之人耳縣邑鄉遂之逺安能扶攜數百里以就龠合之廩哉能賑者其弊如此若逢迎上意不言水旱坐視流散無矜恤之心則國家大禍由此而起如王莽之末年元魏之六鎮煬帝之四方魚爛河決不可收壅矣必欲有備無患當以隋文當縣置社倉為法而擇長民之官行䘏農之政其庶有瘳乎唐制凶荒則有社倉賑給不足則徙民就食諸州尚書左丞戴胄建議自王公以下計墾田秋熟所在為義倉嵗凶以給民太宗善之乃詔畝税二升粟麥秔稻土地所宜寛鄉歛以所種狹鄉據青苖簿而督之田耗十四者免其半耗十七者皆免商賈無田者以其户為九等出粟自五石至五斗為差下下户及夷獠不取嵗不登則以賑民或貸為種至秋而償其後洛相幽徐齊并秦蒲州又置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年皆著於令開元七年敕闗内隴右河南河北五道及荆揚襄夔綿益彭蜀資漢劒茂等州並置常平倉其本上州三千貫中州二千貫下州一千貫每糴具本利與正倉帳同申二十二年勅應給貸糧本州録奏待勅到三口以下給米一石六口以下兩石七口以下三石給粟凖米計折二十五年定式王公以下每年户别據所種田畝别税粟二升以為義倉其商賈户若無田及不足者上上豆税五石上中以下遞減各有差諸出給雜種凖粟者稻穀一斗五升當粟一斗其折納糙米者稻三石折納糙米一石四斗天寳八載凡天下諸色米都九千六百六萬二千二百二十石和糴一百一十三萬九千五百三十石闗内五十萬九千三百四十七石河東十一萬二百二十九石河西三十七萬一千七百五石隴右十四萬八千二百四石諸色倉糧總千二百六十五萬六千六百二十石北倉六百六十一萬六千八百四十石太倉七萬一千二百七十石含嘉倉五百八十三萬三千四百石太原倉二萬八千百四十石永豐倉八萬三千七百二十石龍門倉二萬三千二百五十石正倉糧總四千二百一十二萬六千一百八十四石闗内道百八十二萬一千五百一十六石河北道百八十二萬一千五百一十六石河東道一千五十八萬九千百八十石河西道七十萬二千六十五石隴右道二十七萬二千七百八十石劒南道二十二萬三千九百四十石河南道五百八十二萬五千四百一十四石淮南道六十八萬八千二百五十二石江南道九十七萬八千八百二十五石山南道十四萬三千八百八十二石義倉糧總六千三百一十七萬七千六百六十石闗内道五百九十四萬六千二百一十二石河北道千七百五十四萬四千六百石河東道七百三十萬九千六百一十石河西道二十八萬八千四百三石隴右道二十萬三十四石劔南道百七十九萬七千二百二十八石河南道千五百四十二萬九千七百六十三石淮南道四百八十四萬八百七十二石江南道六百七十三萬九千二百七十石山南道二百八十七萬一千六百六十八石常平倉糧總四百六十萬二千二百二十石闗内道三十七萬三千五百七十石河北道百六十六萬三千七百七十八石河東道五十三萬五千三百八十六石河西道三萬一千九十石隴右道四萬二千八百五十石劒南道萬七百十石河南道百二十一萬二千四百六十四石淮南道八萬一千一百五十二石山南道四萬九千一百九十石江南道六十萬二千三十石二十八年敕諸州水旱皆待奏報然後賑給道路悠遠徃復淹遲宜令給訖奏聞天寳六載太府少卿張瑄奏准敕節文貴時賤價出糶賤時加價收糴若百姓未辦錢物者量事賒糶至粟麥熟時徴納臣商量其餘糶者至納錢日若粟麥雜種等時價甚賤恐更廻易艱辛請加價便與折納自太宗時置義倉及常平倉以備凶荒髙宗以後稍假義倉以給他費至神龍中略盡元宗復置之其後第五𤦺請天下常平倉皆置庫以蓄本賤至是趙贊又言自軍興常平倉廢垂三十年凶荒潰散餒死相食不可勝計陛下即位京城兩市置常平倉官雖頻年少雨米不騰貴可推而廣之宜兼儲布帛請於兩都江陵成都揚汴蘇洪置常平輕重本錢上至百萬緡下至十萬積米粟布帛絲麻貴則下價而出之賤則加估而收之諸道津㑹置吏閲商賈錢每緡税二十竹木茶漆十之一以贍常平本錢德宗納其䇿屬軍用蹙迫亦隨而耗竭不能備常平之積貞觀開元後邊土西舉髙昌龜兹焉耆小勃律北抵薛延陀故地縁邊數十州戍重兵營田及地租不足供軍於是初有和糴牛仙客為相有彭果獻䇿廣闗輔之糴京師糧廪益羡自是元宗不復和糴於東都按唐都闗中而闗輔土地所入不足以供軍國之用故常恃轉漕東南之粟而東南之粟必先至東都然後浮河渭泝流以入闗是以其至也冞難故開元以前嵗若不登天子嘗移蹕就食於東都自牛仙客獻䇿和糴然後始免此行然肅代之後既無東幸之事東南餽餉稍不至則上下皇皇立有菜色之憂三代以前京畿千里自甸服百里賦納􅖽至於五百里米而五百里之外皆諸侯國不過任土作貢以輸王府而賦税米粟則未嘗徴之當時宗廟百官有司與後世不殊然賦税取之千里之内而自足不聞其責餉運於畿外之諸侯糴米粟於畿内之百姓也然則不能量入為出以制國用雖竭天下之力以奉之多為法以取之秪益見其不足耳天寳中嵗以錢六千萬緡賦諸道和糴斗増三錢每嵗遞輸京倉者百餘斛米賤則少府加估而糴貴則賤價而糶貞元初吐蕃刼盟召諸道兵十七萬戍邊闗中為吐蕃蹂躪者二十年北至河曲人户無幾諸道代兵月給粟十七萬斛皆糴於闗中宰相陸贄以闗中穀賤請和糴可至百餘萬斛計諸縣船車至太倉穀價四十餘米價七十則一年和糴之數當轉運之二年一斗轉運之資當和糴之五斗減轉運以實邊存轉運以備時要江淮米至河隂者罷八十萬斛河隂米至太原倉者罷五十萬太原米至東渭橋者罷二十萬以所減米糶江淮水災州縣斗減時價五十以救之京城東渭橋之糴斗増時估三十以利農以江淮糴米及減運直市絹帛遺上都帝乃命度支増估糴粟三十三萬斛然不能盡用贄議貞元四年詔京兆府於時價外加估和糴差清強官先給價直然後貯納續令所司自般運載至太原先是京畿和糴多被抑配或物估踰於時價或先歛而後給直追集停擁百姓苦之及聞是詔皆忻便樂輸憲宗即位之初有司以嵗豐熟請畿内和糴當時府縣配户督限有稽違則迫蹙鞭撻甚於税賦號為和糴其實害民白居易上疏曰和糴之事以臣所觀有害無利何者凡曰和糴則官出錢人出穀兩和商量然後交易今則不然配户督限蹙迫鞭撻甚於税賦何名和糴今若令有司出錢開塲自糴比時價稍有優饒利之誘人人必情願且本請和糴惟圖利人人若有利自然願來今若除前之弊行此之便是真為和糴利人之道又必不得已則不如折糴折糴者折青苖税錢使納斗斛免令賤糶别納見錢在於農人亦真為利况度支比來所支和糴價錢多是雜色匹段百姓又須轉賣然後將納税錢至於給付不免侵偷貨易不免損折所失過本其弊可知今若量折税錢使納斗斛則既無賤糴麥粟之費又無轉賣匹段之勞利歸於人羙歸於上則折糴之便豈不昭然由是而論則配户不如開塲和糴不如折糴亦甚明矣臣久處村間曽為和糴之户親被迫蹙實不堪命臣近為畿尉曽領和糴之司親自鞭撻所不忍聞伏望宸衷俯賜詳察元和六年制京畿舊穀已盡粟麥未登宜以常平義倉粟二十四萬石貸借百姓諸道州府有乏糧處依例借貸淮南浙西宣歙等道元和二年賑貸並停徴容至豐年然後填納元和七年户部奏今年冬諸州和糴貯粟澤蔡四十萬石鄭滑易定各一十五萬石夏州八萬石河陽一十萬石太原二十萬石靈武七萬石振武豐勝鹽州各五萬石凡一百三十萬石令於時價每斗加十文所冀人知勸農國有常備十二年詔諸道應遭水州府以當處義倉斛斗據所損多少量事賑給訖具數聞奏十三年户部侍郎孟簡奏天下州府常平義倉等斗斛請凖舊例減估出糶但以石數奏申有司更不收管州縣得專以利百姓從之長慶元年以京北京西和糴擾人罷之四年詔於闗内闗外折糴和糴一百五十萬石用備饑歉寳歴元年以兩京河西大稔委度支和糴二百萬斛以備災沴開成元年户部奏應諸州府所置常平義倉伏請今後通公私田畝别納粟一升逐年添貯義倉歛之至輕事必通濟嵗月稍久自致盈充縱逢水旱之災永絶流亡之慮從之太和間以天下回殘錢置常平義倉本錢嵗増市之非遇水旱不増者判官罰俸書下考州縣假借以枉法論宋太祖皇帝乾德元年詔曰多事之後義倉廢寢嵗或小歉失於豫備宜令諸州於所屬縣各置義倉自今官所收二税石别税一斗貯之以備凶歉給與民三年詔民有欲借義倉粟充種食者令州縣即計口給計以聞勿俟報義倉不足當發公廪者奏待報四年詔曰諸州義倉用振乏絶頗聞重疊輸送未免勞煩宜罷之太宗端拱二年置折中倉許商人輸粟優其價令執劵抵江淮給其茶鹽每一百萬石為一界禄仕之家及形勢户不得輙入粟淳化三年京畿大穰物價甚賤分遣使臣於京城四門置塲増價以糴令有司虚近倉以貯之俟嵗饑即減價糶與貧民五年令諸州置惠民倉如穀稍貴即減價糶與貧民不過一斛真宗咸平二年於福建置惠民倉真宗景德三年詔於京東京西河北河東陜西淮南江南兩浙各置常平倉惟沿邊州郡則不置以逐州户口多少量留上供錢一二萬貫小州或二三千貫付司農司係帳三司不問出入委轉運使併本州委幕職一員專掌其事每嵗秋夏加錢收糴遇貴減價出糶凡收糴比市價量増三五文出糶減價亦如之所减不得過本錢大率萬户嵗糴萬石止於五萬石或三年以上不經糶即回充糧廪别以新粟充數天禧四年詔荆湖川陜廣南並置常平倉又詔諸州通河及大路人烟繁處多糴其僻在山險之處止約本處主客户收糴咸平六年出内府綾羅錦綺計直百八十萬貫與河北轉運使定價市鬻糴粟實邊景德元年内出銀三十萬付河北經度貿易軍糧自兵罷後凡邊州積穀可給三嵗即止市糴大中祥符初連嵗登稔乃令河北河東陜西増糴靡限常數初河東既下減其租賦是後有司言其地沃民勤多積穀乃請每嵗和糴隨常賦輸送其直多折色給之又京東西河北陜西切須糧食則州縣括民家所積量市之謂之推置取上户版籍酌其輸租而均糴之謂之對糴皆非常制江淮湖浙諸州置塲和糴以裨嵗漕天聖三年權三司使范雍言天下和買和糴夏秋糧草雖逐處開塲多被經販行人小估價例外面添錢收買候過時乘宫中急市即添價却將糴買者中賣致糧草怯弱枉費官錢不便乞行下及早開塲依見賣時估趂時糴買不得容信作弊又臣僚言入中諸般糧草凖備軍需其中有所定物價髙大所入糧草低弱盖因逐處官員自將收獲職田及月俸餘剰或糴米買麤弱斗斛支糴以互相容𨼆致虧損官錢軍人請得惡弱口糧或形嗟怨乞嚴禁絶從之陜西糴穀嵗預給青苖錢自天聖中罷不復給河北舊有便糴之法聽民輸粟邊州而京師給以緡錢錢不足即移文外州給之又折以象牙香藥景德元年三司請令河北有輸藁入官者凖便糴粟麥例給八分緡錢二分象牙香藥其廣信安肅北平粟麥悉以香藥博糴從之自有事二邊戍兵寖廣師行饋運仰於博易有司務優物估以來輸入仁宗留意兵食發内藏庫金帛以助糴者前後不可勝數寳元中出内庫珠直緡錢三十萬以賜三司因諭輔臣曰此無用之物既不欲捐棄不若散之民間收其直助邊亦可紓吾民之歛神宗留意邊備務廣儲蓄熙寧五年詔以銀絹各二十萬賜河東經畧安撫司聽人賖買收本息封樁以備邊費自是三路封樁所給不可勝計或取之三司或取之他路轉運司或賜常平錢或鬻爵給度牒而出内藏錢帛不與焉元豐元年詔河東路十三州嵗給和糴錢八萬餘緡自今罷之以其錢付轉運司市糧草時三司户部副使陳安石言十三州二税三十九萬二千餘石和糴八十二萬四千餘石所以災傷舊不除免盖十三州税輕又本路恃為邊儲理不可闕其和糴舊支錢布相半數既畸零民病入州縣之費以鈔貿易於市人略不食半公家實費民間乃得虚名欲自今罷支糴錢嵗支與沿邊州郡市糧草封樁遇災傷據民不能輸數補填如無災傷三年一免輸朝廷用其議五年詔以開封府界諸路封樁闕額禁軍及淮浙福建等路剰鹽息錢並輸糴便司為本尋詔瀛定澶等州各置倉凡封樁三司毋闗預委度支副使蹇周輔專其事結糴熙寧八年劉佐體量川茶因便結糴熙河路軍儲得七萬餘石詔運給焉未幾商人王震言結糴多散官或浮浪之人有經年方輸者詔措置熙河財用孫逈究治以聞寄糴元豐二年糴便糧草王子淵論綱舟利害因言商人入中嵗小不登必邀厚價故設内郡寄糴之法以權輕重俵糴熙寧八年令中書計運米百萬石費約三十七萬貫帝怪其多王安石因言俵糴非特省六七十萬緡嵗漕之費且河北入中之價權之在我遇斗斛貴住糴即百姓米無所糶自然價損非唯實邊亦免傷農帝以為然乃詔嵗以米鹽錢鈔在京粳米總六十萬貫石付都提舉市易司貿易度民田入多寡預給錢物秋成於澶州北京及緣邊糴粟麥封樁即物價踴權止入中聽糴便司兑用須嵗豐補償均糴政和元年童貫宣撫陜西奏行之以人户家業田土頃畝均敷上等則所均斛斗數多下等數少五年言者謂均糴之法推行徃徃不齊故有不先樁本錢已糴而不償其直或不度州縣之力而敷數過多有一户而糴數百石者於是詔諸路毋輒均糴既而州縣以和糴為名裁價低下轉運司程督愈峻科率倍於均糴之數詔約止之博糴熙寧七年詔河北轉運提舉司置塲以常平及省倉嵗用餘糧減直聽民以絲綿綾絹増價博買後秋成博糴崇寧五年詔陜西錢重物輕委轉運司措置以銀絹絲紬之𩔖博糴斛斗以平物價兑糴熙寧九年詔淮南常平司於麥熟州郡及時兑糴元祐二年嘗以嵗豐麥賤下諸路廣糴詔後價若與本相當即許變轉兑糴括糴元符元年涇原經畧使章楶請並邊糴買務牓諭民毋得與公爭糴即官儲有乏括索蓄家量存其所用盡糴入官按古之國用食租衣税而已毋俟於糴也平糴法始於魏李悝然豐則取之於民歉則捐以濟民凡以為民而已軍國之用未嘗仰此歴代因之自唐始以和糴充他用至於宋而糴遂為軍餉邊儲一大事熙豐而後始有結糴寄糴俵糴均糴博糴兑糴括糴等名何其多也推原其由盖自眞宗仁宗以來西北用兵糧儲缺乏遂以茶鹽貨物召商人入中而姦商黠賈遂至低價估貨髙價入粟國家急仰軍儲又法令素寛致有此弊後來懲其弊所以只糴之於民而不復墮商人之計然至於計其家産而均敷之量其蓄積而括索之甚至或不償其直或強敷其數則其為民病有不可勝言者盖始也官為商所虧終也民又為官所虧其失一也先是常平倉領於司農寺景祐初始詔諸路轉運使與州長吏舉所部官專主常平錢粟既而淮南轉運使呉遵言本路丁口百五十萬而常平錢粟纔四十餘萬嵗饑不足以捄䘏願自經畫為二百萬他毋得移用從之數年間常平積有餘而兵食不足乃命司農出常平錢百萬緡助三司給軍費久之數移用畜藏無幾自景祐初畿内饑詔出常平粟貸中一户三斛慶歴中詔京西發常平粟以賑貧民自是數以賑貸而聚歛者或増舊賈以糶欲以市恩詔戒之又詔嵗歉發以濟饑者不復督取然常平之積不厚亦以出多入少故也自乾德初置義倉未久而罷明道二年詔議復之不果景祐中集賢校理王琪上疏行隋唐故事請復置大略請宜令五等以上户計夏税二斗别輸一升隨税以入水旱減税則免輸擇便地别置倉貯之領於轉運使今以一中郡計之正税嵗入十萬石則義倉嵗得五千石推而廣之可備饑歉兼并之家占田廣則義倉所入多中下之家占田狹則義倉所入少及水旱賑給則兼并之家未必待此而中下之民實受其賜損有餘補不足天下之利下其事㑹議而議者異同遂詔止令上三等户輸粟已而復罷慶歴初賈黯又請立民社義倉然牽於衆論終不果行治平三年常平入五十萬一千四十八石出四十七萬一千一百五十七石神宗熙寧二年九月制置三司條例司請以常平廣惠倉見在斗斛遇貴量減市價糶遇賤量増市價糴可通融轉運司苖税及錢斛就便轉易者亦許兑換仍以見錢依陜西青苖錢例願豫給者聽之令隨税納斗斛半為夏料半為秋料内有願請本色或納時價貴願納錢者皆許從便如遇災傷許展至次料豐熟日納非惟足以待凶荒之患民既受貸則轉運之家不得乗新陳不接以邀倍息又常平廣惠之物收藏積滯必待年凶物貴然後出糶所及不過城市游手之人今通一路有無貴發賤歛以廣蓄積使農人得以趨時赴事而兼并不得乗其急凡以為民而公家無所利其入亦先王散惠興利以為耕歛補助之意也欲量諸路錢穀多少分遣官提舉仍先自河北京東淮南三路施行有緒乃推之諸路其廣惠倉除量留給老疾貧窮人外餘並用常平轉移法並從之時天下常平錢穀見在一千四百萬貫石諸路各置提舉一員以朝官為之管勾一員京官為之或共置二員開封府界一員凡四十一人按青苖錢所以為民害者三曰徴錢也取息也抑配也今觀條例司所請曰隨租納斗斛如以價貴願納錢者聽則未嘗專欲徴錢也曰凡以為民公家無利其入則未嘗取息也曰願給者聽則未嘗抑配也盖建請之初姑為此美言以惑上聽而厭衆論而施行之際實則不然也初王安石欲行青苖法條例司檢詳文字蘇轍曰以錢貸民使出息二分本非為利然出納之際吏縁為姦法不能禁錢入民手雖良民不免非理費用及其納錢雖富民不免違限如此則鞭笞必用州縣多事矣唐劉晏掌國計未嘗有所假貸有尤之者晏曰使民僥倖得錢非國之福使吏倚法督責非民之便吾雖未嘗貸而四方豐凶貴賤知之未嘗逾時有賤則糴有貴必糶以此四方無甚貴甚賤之病安用貸為晏之言則漢常平法耳今推行此法晏之功可立俟也安石乃止㑹河北轉運司幹當公事召議事奏乞度牒數千道為本錢於陜西轉運司行青苖法春散秋歛與安石意合請施之河北安石遂行之四方蘇轍以議不合罷熙寧二年帝閲羣臣奏以儀鸞司官孫思道言坐倉事善之坐倉者以諸軍餘糧願糶入官者計價支錢復儲其米於倉也詔條例司條例以聞條例司請如嘉祐附令敷坐倉故事行之曽公亮謂支米有量數不同難以立價帝曰家各有斗人自知其所得之多寡雖定價庸何傷然此法第以䘏軍班防監人可也安石曰誠然今立價自一千至六百過此則軍人自糶與民間所定價亦適平更増數錢未至傷民價錢賤於所定則軍人受患矣帝曰善而司馬光恐其動衆因經筵進對為帝言之呂惠卿曰諸軍糶石米止得八百募其願以一千糶之何以致動衆王珪亦曰外郡用錢四十可致斗米至京師今京師乏錢支用錢百坐倉糴一斗此極非計異日帝又謂執政坐倉糴米何如珪等皆起對曰坐倉甚不便朝廷近罷之甚善帝曰未嘗也光曰坐倉之法盖因小郡乏米而庫有餘錢故反就軍人糴米以給次月之糧出於一時之急計耳今京師有七年之儲而府庫無錢更糴軍人之米使積久陳腐其為利害非臣所知也惠卿曰今京師坐倉得米百萬石則減東南嵗漕百萬石轉易為錢以供京師何患無錢光曰臣聞江淮之南民間乏錢謂之錢荒而土宜粳稻彼人食之不盡若官不糴取以供京師發泄必甚賤傷農矣且民有米而官不用米民無錢而官必使之出錢豈通財利民之道乎元符以後又有低價抑糴之弊詔禁之三年詔青苖錢不許抑配令諸路提㸃刑獄官體量覺察禁止敢沮遏願請者按罰亦如之初勅㫖放青苖並聽從便而提舉司務以多散為功又民富者不願取而貧者乃欲得之即令隨户等髙下分配又令貧富相兼十人為保首王廣亷在河北第一等給十五貫第二等十貫第三等五貫第四等一貫五百第五等一貫民喧然以為不便而廣亷入奏言民間歌舞聖德㑹言者交攻朝廷不得已乃降是詔判大名府韓琦言詳熙寧二年詔書務在優民不使兼并乗其急以邀倍息皆以為民公家無所利其入今乃鄉村自第一等而下皆立借錢貫陌三等以上更許増數坊郭有物業抵當者依青苖例支借且鄉村三等并坊郭有物業户乃從來兼并之家也今皆多得借錢每借一千令納一千三百則是官放息錢與初抑兼并濟困乏之意絶相違戾欲民信服不可得也且愚民一時借請則甚易納則甚難故自制下以來官吏惶惑皆謂若不抑散則上户必不願請下户與無業客户或願請而將來必難催納將來必有行刑督索及勒干係書手典押耆户長同保人等均賠之患朝廷若謂陜西嘗放青苖錢官有所得而民以為便此乃轉運司因軍儲有闕適自冬涉春雨雪及時麥苖滋盛決見成熟行於一時可也今乃差官置司以為每嵗常行之法而取利三分豈陜西權宜之比哉上乃出𤦺奏示執政曰琦真忠臣朕始謂利民不意乃害民如此且坊郭安得有青苗而使者强與之乎王安石勃然曰茍從所欲雖坊郭何害因難𤦺奏曰陛下修常平法所以助民至於收息亦周公遺法也上終以𤦺説為疑與安石問難安石翌日遂稱疾不出上諭執政罷青苖法曽公亮陳升之即欲奉詔趙抃獨欲俟安石出令自罷之連日不决上更以為疑安石再視事入謝上勞問曰青苖法朕誠為衆論所惑今思此事一無所害極不過失陷少錢物耳何足恤安石曰但力行之勿令小人故意壞法如預買紬絹行之已久亦何嘗失陷錢物安石既視事持之益堅人言不能入矣初安石在告曽公亮陳升之等舉行前詔乃刪去毋得抑遏不散之語安石復視事志氣愈悍乃面責曽公亮等公亮不能抗右諫議大夫司馬光言彼言青苖錢不便者大率但知所遣使者或年少位卑倚勢作威陵轢州縣搔擾百姓止論今日之害耳臣所憂乃在十年之後非今日也夫民之所以有貧富者由其材性愚智不同富者智識差長憂深思逺寧勞筋骨惡衣菲食終不肯取債於人故其家常有贏餘而不至狼狽也貧者啙窳偷生不為逺慮一醉日富無復贏餘急則取債於人積不能償至於鬻妻賣子凍餒填溝壑而不知自悔也是以富者常借貸貧民以自饒而貧者常假貸富民以自存雖苦樂不均然猶彼此相資以保其生今縣官乃自出息錢以春秋貸民民之富者皆不願取貧者乃欲得之提舉官欲以多散為功故不問民之貧富各隨户等抑配與之富者與債仍多貧者與債差少多者至十五緡少者不減千錢州縣官吏恐以逋欠為負必令貧富相兼共為保甲仍以富者為之魁首貧者得錢隨手皆盡將來粟麥小有不登二税且不能輸况於息錢固不能償吏督之急則散而之四方富者不去則獨償數家所負力竭不逮則官必為之倚閣春債未了秋債復來歴年浸深債負益重或值凶年則流轉死亡幸而豐稔則州縣之吏並催積年所負之債是使百姓無有豐凶長無蘇息之期也貧者既盡富者亦貧臣恐十年之外富者無㡬何矣富者既盡若不幸國家有邊隅之警興師動衆凡粟帛軍須之費將誰從取之臣不知今者天下所散青苖錢凡幾千萬緡若民力既竭加以水旱之災州縣之吏果有仁心愛民者安得不為之請於朝廷乞因郊赦而除之朝廷自祖宗以來以仁政養民豈可視其流亡轉死而必責其所負其勢不得不從請者之言也然則官錢幾千萬緡已放散而不反矣官錢既放散而百姓又困竭但使閭胥里長於收督之際有乞取之資此可以謂之善計乎且常平倉者乃三代聖王之遺法非獨李悝耿壽昌能為之也穀賤不傷農穀貴不傷民民頼其食而官收其利法之善者無過於此比來所以隳廢者由官吏不得其人非法之失也今聞條例司盡以常平倉錢為青苖錢又以其穀換轉運司錢是欲盡壞常平專行青苖也國家每遇凶年供軍倉自不能足用固無羡餘以濟饑民所頼者只有常平倉錢穀耳今一旦盡作青苖錢散之向去若有豐年將以何錢平糴若有凶年將以何穀賙贍乎臣竊聞先帝嘗出内藏庫錢一百萬緡助天下常平倉作糴本前日天下常平倉錢穀共約一千餘萬貫石今無故盡散之他日若思常平之法復欲收聚何時得及此數乎臣以為散青苖錢之害猶小而壞常平倉之害尤大也條例司奏專疏駁韓𤦺所言皆王安石自為之既而𤦺又言今䝉制置司以臣所言皆為不當看詳疏駁事件多刪去臣元奏要切之語曲為沮格及引周禮國服為息之説文其繆妄將使無復敢言其非者且古今異宜周禮所載不可施於今者其事非一况今天下田税已重又非周禮什一之法更有農具牛皮鹽錢麯錢鞋錢之𩔖凡十餘件謂之雜錢每夏秋起納官中更以紬絹斛斗低估價直令民以此雜錢折納又每嵗散官鹽與民謂之蠶鹽折納絹帛更有預備收賣紬絹如此之𩔖不可悉舉皆周禮田税什一之外加歛之物取利己厚傷農已深奈何更引周禮國服為息之説謂放青苖錢乃周公太平已試之法此則誣汙聖典蔽惑睿明老臣不得不太息而慟哭也且坊郭有物力人户從來不曽見肯零糴常平倉斛斗者此盖制置司以青苖為名欲多借錢與坊郭有業之人以望收利之多假稱周禮太平已試之法以為無都邑鄙野之限以文其曲説惟陛下深詳其妄翰林學士范鎮言陛下初詔云公家無所利其入今提舉司以户等給錢皆令出三分之息物議紛紛皆云自古未有天子開課塲者王安石曰鎮所言若非陛下略見周禮有此豈得不為愧耻光又言青苖錢雖不令抑勒而使者皆諷令抑配如開封府界十七縣惟陳留姜潛張勅榜縣門及四門聽民自來請則給之卒無一人來請以此觀之十六縣恐皆不免於抑勒也知青州歐陽修言田野之民蠢然安知周官泉府為何物但見官中放債每錢一百文要二十文利耳臣愚以為必若使天下曉然知非為利則乞除去二分息但納本錢又言夏料錢於春中俵散猶是青黄不接之時尚有可説若秋料於五月俵散正是蠶麥成熟人户不乏之時何名濟闕直是放債取利耳若二麥不熟則夏料尚欠豈宜更俵秋料錢以此而言秋料可罷不散中書言修擅止給青苖錢欲下問罪詔放罪改知蔡州知亳州富弼亦坐論青苖移鎮知山隂縣陳舜愈不肯奉行移􅃺自劾曰方今小民匱乏願貸之人徃徃有之譬如孺子見飴􅁡孰不染指爭食然父母疾止之恐其積甘生病故耆老戒其鄉黨父兄誨其子弟未嘗不以貸貰為不善治生今乃官自出錢誘以便利督以威刑非王道之舉况正月放夏料五月放秋料而所歛亦在當月百姓得錢便出息輸納實無所利是使民取青苖錢乃别為一賦以弊之也坐謫監南康鹽酒税七年上患俵常平官吏多違法安石曰若俵常平稍多縣分專置一主簿令早入暮出給納役錢及常平度不過置五百員費錢三十萬貫今嵗收息至三百萬但費三十萬不為冗費也上從之至元祐元年罷帝以久旱為憂翰林承㫖韓維言畿縣近日督青苖甚急徃徃鞭撻取足民至伐桑為薪以易錢旱災之際重罹此苦帝頗感悟著作佐郎黄顔言給納青苖錢穀乞詔州縣視年豐荒為給散多少毋以元散數為額七月帝以諸路旱災常平司未能賑濟諭輔臣曰天下常平倉若以一半散錢取息一半減價糶貴使二者如權衡之相依不得偏重民必受賜自是詔諸路州縣據已支見在錢穀通數常留一半外方得給散九年詔司農寺自今兩經倚閣常平錢人户更不得支借錢斛帝謂天下常平錢穀十常七八散在民間又連嵗災傷倚閣迨半止務多給計息為功不計督索艱難豈惟虧失官物兼百姓被鞭撻必衆故也十年提舉兩浙路常平言災傷累年丁口減耗凡九年以前逃絶户已請青苖錢斛見户有合攤填者乞需豐熟日理納外更有全甲户絶輸償不足或同甲内死絶止存一二貧户難以攤納者更乞立法從之元豐元年詔常平倉錢穀當輸錢而願入穀若金帛者官立中價示民物不盡其錢者足以錢錢不盡其物者還其餘直又聽民以金帛易穀而有司少加金帛之直凡錢穀當給若糶皆用九年詔書通取留一半之餘六年户部言準朝㫖諸路散歛常平物可自行法至今酌三年歛散之中數取一年為格嵗終較其増虧今以錢糧榖帛貫石匹兩定年額散一千一百三萬七千七百七十二歛一千三百九十六萬五千四百五十九比元豐三年散増二百一十四萬八千三百四十二歛増一百三萬四千九百六十三四年散増三百七十九萬九千九百六十四歛虧一百九十八萬六千五百一十五詔三年四年散多歛少及散歛俱少處户部下提舉司具析以聞八年八月詔給散青苖不許抑配仍不立定額時哲宗已即位哲宗元祐元年二月詔提舉官累年積蓄錢榖財物盡樁作常平倉錢物委提㸃刑獄交割主管依舊常平倉法左正言朱光庭言天下青苖錢除支俵外見在錢數尚多乞並用收糴可存留斛斗凡遇豐年則添價以糴遇嵗饑則減價以糶大饑則貸之候豐嵗輸還更不出息門下侍郎司馬光劄子言常平之法公私兩利此乃三代之良法也向者有因州縣闕常平糴本錢雖遇豐嵗無錢收糴又有官吏怠慢厭糴糶之煩雖遇豐嵗不肯收糴又有官吏不能察知在市斛斗實價只信憑行人與蓄積之家通同作弊當收成之時農人要錢急糶之時故意小估價例令官中收糴不得盡入蓄積之家直至過時蓄積之家倉廪盈滿方始頓添價中糶入官是以農夫糶榖止得賤價官中糴榖常用貴價厚利皆歸蓄積之家又有官吏雖欲趂時收糴而縣申州州申提㸃刑獄提㸃刑獄司申司農寺取候指揮比至回報動渉累月已至失時穀價倍貴是致州縣常平倉斛斗有經隔多年在市價例終不及元糴之價出糶不行堆積腐爛者此乃法因人壞非法之不善也四月詔再立常平穀錢給歛出息之法限二月或正月以散給一半為額民間絲麥豐熟隨夏税先納所輸之半願併納者止出息一分左司諌王巖叟中丞劉摯右司諌蘇轍等交章言其非右僕射司馬光劄子乞約束州縣抑配青苖錢曰先朝初散青苖本為利民故當時指揮立取人户情願不得抑配自後因提舉官速要近功務求多散諷脅州縣廢格詔書名為情願其實抑配或舉縣勾集或排門抄劄亦有無頼子弟謾昧尊親錢不入家亦有他人冒名詐請莫知為誰及至追催皆歸本户朝廷深知其弊故悉罷提舉官不復立額考校訪聞人情安便昨於四月二十六日有勅令給常平錢斛限二月或正月只為人户欲借者及時得用又令半留倉庫半出給者只為所給不得輙過此數又令取人户情願亦不得抑配一遵前朝本意慮恐州縣不曉朝㫖本意將謂朝廷復欲多散青苖錢穀廣收利息勾集抑配督責嚴急一切如向日置提舉官時今欲續降指揮令諸路提㸃刑獄司告示州縣並須候人户自執状納保赴縣乞請常平錢穀之時方得勘㑹依條支給不得依前勾集抄劄強行抑配仍仰提㸃刑獄常切覺察如有官吏以此為法騷擾者即時取勘施行若提㸃刑獄不切覺察委轉運安撫司覺察聞奏從之録黄過中中書舍人蘇軾奏曰臣伏見免役之法已盡革去而青苖一事乃獨因舊少加損益欲行紾臂徐徐月攘一雞之道熙寧之法本不許抑配而其害至此今雖復禁其抑配其害猶在也昔者州縣並行倉法而受納之際十費二三今既罷倉法不免乞取則十費五六必然之勢也又官吏無状於給散之際必令酒務設鼓樂倡優或闗撲賣酒牌農民至有徒手而歸者但每散青苖即酒課暴増此臣所親見而為流涕者也二十年間因欠青苖至賣田宅僱妻女溺水自縊者不可勝數朝廷忍復行之與臣謂四月二十六日指揮以散及一半為額與熙寧之法初無小異而今月二十日指揮猶許人户情願未免於設法罔民便一時非理之私而不慮後日催納之患三者皆非良法相去無幾也今者已行常平糶糴之法惠民之外官亦稍利如此足矣何用二分之息以賈無窮之怨臣雖至愚深為朝廷惜之欲乞特降指揮青苖錢斛後更不給散所有已請過者候豐熟日分作五年十料隨二税送納或乞聖慈念其累嵗出息已多自第四等以下人户並與放免庶使農民自此息肩亦免後世有所譏議兼近日謫降呂惠卿告詞云首建青苖次行助役若不盡去其法必致姦臣有詞流傳四方所損不細所有上件録黄臣未敢書名行下初同知樞密院范純仁以國用不足建請復青苖錢四月二十六日指揮盡純仁意時司馬光方以疾在告不與也已而臺諌共言其非不報光尋具劄子乞約束抑配蘇軾又繳奏乞盡罷之光始大悟遂力疾入對於簾前曰近者不知是何姦邪勸陛下復行此事純仁失色却立不敢言青苖錢遂罷不復散按元祐初温公入相諸賢並進用革新法之病民者如救頭然青苖助役其尤也然既曰罷青苖錢復行常平倉法矣未幾而復有再給散出息之令而其建請乃出於范忠宣雖曰温公在告不預知然公其時有奏乞禁抑配奏中且明及四月二十六日勅令給錢斛之説則非全不預知也後以臺諌交章論列舎人不肯書黄遂大悟而不復再行耳至於役法則諸賢之是熙寧而主僱募者居其半故差僱二者之法雜然並行免役六色之錢仍復徴取然則諸賢雖號為革新法而青苖助役之是非可否胸中盖未嘗有一定之見宜熙豐之黨後來得以為辭也然熙寧之行青苖也既有二分之息提舉司復以多散為功遂立各部定額而有抑配之弊其行助役也既取一分之寛剰而復徴頭子錢民間輸錢日多而僱人給直日損遂至寛剰積壓此皆其極弊處至紹聖國論一變羣姦唾掌而起於紹述故事宜不遺餘力然考其施行之條畫則青苖取息止於一分且不立定額抑配人户助役錢寛剰亦不得過一分而蠲減先於下五等人户則聚歛之意反不如熙寧之甚矣觀元祐之再行青苖復徴六色役錢則知興利之途雖君子不能盡窒之觀紹聖之青苖取息役錢寛剰皆止於一分則知言利之名雖小人亦欲少避之要之以常平之儲貴發賤歛以賑凶饑廣畜儲其出入以粟而不以金且不取息亦可以懲常平積滯不散侵移他用之弊則青苖未嘗不可行晦菴之説如此以坊塲撲買之利及量徴六色助役之錢以資僱役所徴不及下户不取寛剰亦可以免當役者費用破家之苦則助役未嘗不可行二蘇之説如此介甫狠愎不能熟議緩行而當時諸賢又以決不可行之説激之羣憸因得以行其附㑹謀進之計推波助瀾無所不至故其征利毒民反出後來章蔡諸人之上矣紹聖紹述之事章惇為之宗主然惇元祐時嘗言保甲保馬一日不罷則有一日害如役法熙寧初以僱代差行之太速故有今弊今復以差代僱當詳議熟講庶幾可行而限止五日其弊將益甚矣其説不惟切中元祐之病亦且深知熙豐之非然則後來之所以攘臂稱首者正張商英所謂熱荒要做官而民間之利病法度之是非未嘗不了然胸中也其姦人之雄與紹聖二年户部尚書蔡京乞下有司檢㑹熙寧元豐青苖條約參酌増損立為定制淮南轉運副使莊公岳言自元祐罷提舉官錢穀為他司侵借所存無幾欲乞追還向所侵借令當職官依限給散以濟乏闕隨夏秋税償納勿立定額自無抑民失財之弊右承議郎董遵言青苖之制乞嵗收一分之息給散本錢不限多寡各從人願仍勿推賞其出息至寡則可以抑兼并之家賞既不行則可以絶邀功之吏詔並送詳定重修勅令所徽宗政和八年御筆常平歛散法利天下甚博而比年以來諸路欠闕至未及散而遽取之甚失神考制法之意令常平司恪遵條令歛散必時違者以大不恭論宣和五年詔州縣每嵗支俵常平錢穀多是形勢户請求及胥吏詐冒支請令天下州縣每嵗散錢穀既畢即揭示請人數目逾月歛之庶知為偽冒者得以陳訴高宗建炎二年臣僚言常平和糴州縣視為文具以新易舊法也間有損失蠧腐而未嘗問不許借貸法也間有悉充他用而實無所儲詔委官徧行按視紹興九年宗丞鄭鬲乞以常平錢於民輸賦未畢之時悉數和糴即詔行之上因諭宰執曰常平法不許他用惟時賑饑取於民者還以予民也二十八年趙令詪言州縣義倉米積欠陳腐乞出糶及水旱災荒不拘檢放及七分便許賑濟沈該奏在法義倉止許賑濟若出糴恐失初意乃令量糶三之一樁收價錢次年收糴撥還孝宗乾道八年知台州唐仲友言鰥寡孤獨老幼疾病之人乞依乾道九年依例取撥常平義倉賑給上命以常平米低價出糶以義倉米賑濟寧宗慶元四年臣僚言州縣受納苖米於法義倉米合於當日支撥而因循於州用不復撥還人户納苖稍及分數例多折納價錢其帯義倉錢並不許撥此因納苖而失陷義倉也至如紹興府人户就行在省倉送納湖田米其合納義倉多不催理此因湖田納米而失陷也如淮浙鹽亭户納鹽以折二税其合納義倉多是不曽拘催此因納鹽而失陷也常平失於兑換因致陳損此倉庾陳腐之弊也常平米止許逓留一年以新納秋苖換易支遣常平專法主管官替移無拖欠失陷方與批書離任今公然兑借陽為自劾更不補還此州縣兑移之弊也常平和糴合專置倉厫今州縣多因受納以收到出剰撥歸常平倉贏落價錢此收糴官吏之弊也諸没官産業并户絶僧道田賣到錢數及亡僧衣鉢錢法當拘入常平州縣侵漁鮮曽撥正此出賣官産之弊也若乃吏胥之禄合於免役錢内支給而所催役錢在州則主管官應副人情在縣佐以為公用已催之數既不以供支遣又於方塲錢内撥支未嘗入以為出如公吏差出其本身初不請常平錢乃詭名借請或元非差出而妄作縁故至於吏胥自有定額今守倅視常平錢米為他司錢物吏額日増請給日廣常平司委而不問若夫借請在法二分尅納今或一例借欠動至數百千例不除尅此其弊不一也倘不為之隄防懲革則儲蓄日寡荒政無備乞明詔諸路提舉常平官講求措置亟去前弊責令諸州毎季以本州及屬縣收支常平義倉等錢米逐項細數申常平司不得泛言都數然後參照條法逐一審訂稍有失收失支勒令填納或有情弊必寘於法嘉定十一年五月臣僚言頃嵗議臣有請計義倉所入之數除負郭縣就州輸納外餘令逐縣置數自行收受非惟革州郡侵移之弊抑亦省凶年轉般之勞曩時州倉隨苖𢃄納同輸一鈔今正苖輸之州義倉輸之縣則輸為兩輸鈔為二鈔矣曩時䑕雀之耗蠧吏卒之需求一切倚辦於正税而義倉不預焉今付之於縣既無正税獨有此色耗蠧需求又不能免矣於是議臣有請令人户義倉仍舊隨正税就便就州作一鈔輸納而州縣復有侵移之弊臣聞紹興初臺臣嘗請通計一縣之數截留下户苖米於本縣納開禧初議臣之請亦如之盖截留下户之税米以補一縣之義倉其餘上户則隨正税而輸之州州得以補償其截留下户之數州不以為怨縣得此米别項儲之以備賑濟使窮民不致於艱食則縣不以為撓一舉而三利得此上䇿也惟是負郭之義倉則就州輸送自如舊制至於屬縣之義倉則令丞同主之每嵗之終令丞合諸鄉所入之數上之守貳守貳合諸縣所入之數上之提舉常平提舉常平合一道之數上之朝廷令丞替移必批印紙考其盈虧以議殿最從之社倉淳熙八年十一月浙東提舉朱熹言乾道四年間建民艱食熹請於府得常平米六百石請本鄉土居朝奉郎劉如愚共任賑濟夏受粟於倉冬則加二計息以償自後逐年歛散或遇少歉即蠲其息之半大饑即盡蠲之凡十有四年得息米造成倉厫及以元數六百石還府見管米三千一百石以為社倉不復收息每石只收耗米三升以故一鄉四十五里間雖遇凶年人不闕食請以是行於司倉時陸九淵在勅令局見之歎曰社倉幾年矣有司不復掛牆壁所以逺方無知者遂編入賑恤門凡借貸者十家為甲甲推其人為之首五十甲則本倉自擇一公平曉事者為社首正月告示社首下都結甲其有藏匿逃軍及作過無行止人互相覺察及有税錢衣食不闕者並不得入甲仍問人户願與不願入甲開具一家大人若干口小兒若干口大人一石小兒減半五嵗以下不預請甲頭加請一倍社首親自審訂虚實取各人親手押字𩔖聚齊備齎赴本倉再自審其無弊然後逐一排定甲頭寫上都簿明載某人借若干石依正簿給闗與甲頭收執請榖仍分兩時支散初當下田時次當耘耨時秋禾成熟還穀不得過八月三十日納足穀有濕惡不實者罰之嘉定末真徳秀帥長沙行之然今所在州縣間有行之者皆以熹之已行者為式凶年饑嵗人多賴之然事久而弊或主者倚公以行私或官司移用而無可給或拘納息米而未嘗除免甚者拘催無異正賦良法美意胥此焉失必有仁人君子以公心推而行之斯民庶乎其有養矣朱子建安五夫社倉記曰予惟成周之制縣都各有委積以待凶荒而隋唐所謂社倉者亦近古之良法也今皆廢矣獨常平義倉尚有古法之遺意然皆藏於州縣所恩不過市井惰游軰至於深山長谷力穡逺輸之民則雖饑餓至死而不能及也又其為法太密使吏之避事畏法者視民之殍而不肯發徃徃全其封鐍逓相傳授或至累數十年不一訾省一旦甚不獲已然後發之則已化為浮埃聚壤而不可食矣夫以國家愛民之深其慮豈不及此然而未有所改者豈不以里社不能皆可任之人欲一聽其所為則恐其計私以害公欲謹其出入同於官府則鉤校靡密上下相遁其害又有甚於前所云者是以難之而有弗暇耳又金華社倉記曰抑凡世俗所以病乎此者不過以王氏之青苖為説耳以予觀於前賢之論而以今日之事騐之則青苖者其立法之本意固未為不善也但其給之也以金而不以穀其處之也以縣而不以鄉其職之也以官吏而不以鄉人士君子其行之也以聚歛亟疾之意而不以慘怛忠厚之心是以王氏能行之於一邑而不能行之於天下子程子嘗極論之而卒不免悔其已甚而有激也高宗紹興間於江浙湖南博糴博糴極邊糧草毎嵗自三司抛數下庫務先封樁緊便鈔然後召人入糴也所謂緊便鈔謂水路緊便處緊便鈔謂上三山塲𣙜務也多者給官誥少者給度牒於是或以鈔引數多不售而吏縁為姦人情大擾於是減損其價勸誘富實積粟之家不拘官户編户至於斗面加擡有禁專斗乞取有禁凡朝廷降金銀錢帛和糴而州縣阻節不即支還者有罰四川有對糴米謂如税户甲家當輸百石則又科糴百石所輸倍於正税皆軍興後科配也紹興八年侍御史蕭振言經制司糴米一例抛降數目如此則諸州不免抛下諸縣科與百姓年例又添一番科率經制一司張官置吏止為收糴一事如何抛與諸州乞别選官置塲收糴從之十五年詔禁州縣減尅價錢横歛脚費如盤量出剰監官計剰數科罪十八年户部奏免和糴而命三總領置塲糴之孝宗乾道三年詔州縣只以本錢坐倉收糴毋得強配於民四年糴本不給度牒闗引只降㑹子品搭錢糧每石價錢二貫五百文又令人户自行量槩凡江西湖南民間不便於闗子令兩路繳回淳熙四年詔四川旱傷處免糴上諭執政曰聞總司糴米皆散在諸處萬一軍興而屯駐處無米臨時豈不悞事大抵賑糶米可嵗循環以備凶荒樁積米須留於要害屯軍所在庶幾軍民皆便文獻通考卷二十一
