body:
  text: 文獻通考卷三百二十六鄱陽馬端臨貴與著四裔考三豆莫婁豆莫婁國在勿吉北千里舊夫餘也室婁之東至海方二千餘里其人土著有居室倉庫多山陵廣澤於東夷之域最為平敞地宜五榖不生五果其人長大性强勇謹厚不冦抄其君長皆以六畜名官邑落有豪帥飲食亦用豆有麻布衣製類髙麗而帽大其國大人以金銀飾之用刑嚴急殺人者死沒其家人為奴婢性淫尤惡妬者殺之尸於國南山上至腐或言濊貊之地也百濟百濟即後漢末夫餘王仇台之後馬韓五十四國百濟其一也初以百家濟因號百濟後漸强大兼諸小國晉時句驪既畧有遼東百濟亦畧有遼西晉平唐栁城北平之間自晉以後吞併諸國據有馬韓故地其國東西四百里南北九百里南接新羅北距髙麗千餘里西限大海處小海之南國西南海中有三島出黃漆樹似小棕樹而大六月取汁漆物噐若黃金其光奪目自晉代受蕃爵自置百濟郡義熙中以百濟王夫餘映為使持節百濟諸軍事宋齊並遣使朝貢授官封其人土著地多下濕率皆山居其都治建居㧞城王號於羅瑕百姓呼為鞬吉支夏言並王也王妻號於陸夏言妃也官有十六品曰左率曰逹率曰恩率曰徳率曰柰率曰扞率以上冠飾銀花將徳紫帶施徳皂帶固徳赤帶季徳青帶對徳文督皆黃帶武督佐軍振武克虞皆白帶統兵以逹率徳率扞率為之人庶及餘小城咸分𨽻焉其衣服男子畧同髙麗拜謁之禮以兩手據地為敬婦人衣似袍而䄂㣲大在室者編髪盤於首後垂一道為飾出嫁者乃分為兩道焉兵有弓箭刀矟俗重騎射兼愛墳史其秀異者頗解屬文又解隂陽五行用宋元嘉歴以建寅月為嵗首亦解醫藥卜筮占相之術有投壺樗蒱等雜戲然尤尚奕碁僧尼寺塔甚多而無道士賦税以布絹麻米等婚娶之禮畧同華俗父母及夫死者三年持服餘親則葬訖除之氣候温暖五榖雜果菜蔬及酒醴肴饌樂噐之屬多同於内地唯無駞驢騾羊鵝鴨等云其王以四仲之月祭天又每祭嵗四祠其始祖仇台之廟大姓有八族沙氏燕氏劦氏音狹解氏眞氏國氏木氏苩氏音白國西南人島居者十五所皆有城邑王餘映卒子餘毗立毗卒子慶代立慶卒子牟都立都卒子牟大立每王立必遣使詣江南請命俱授以鎮東大將軍都督百濟諸軍百濟亦遣使稱藩奉貢於魏尋為髙麗所破衰弱累年遷居南韓地梁普通二年王餘隆復遣使奉表稱累破髙麗今始與通好隆卒子明嗣北齊時亦通使焉齊亡遣使通周隋開皇初遣使貢方物拜其王餘昌上開府帶方郡公百濟王平陳之嵗奉表賀八年遣使入貢屬興遼東之役請為軍道帝厚其使遣之髙麗頗知其事以兵侵其境餘昌卒子餘璋立大業時遣使入貢請討髙麗焬帝許之命覘髙麗動静然餘璋内與髙麗通和挾詐以闚中國後隋亂貢使遂絶唐武徳四年王夫餘璋遣使入貢自是數朝貢且訟髙麗梗道太宗貞觀初詔使者平其怨又與新羅世仇數相侵帝賜璽書和其怨璋上表謝然兵亦不止璋卒子義慈立義慈事親孝與兄弟友時號海東曾子明年與髙麗連和伐新羅取四十餘城發兵守之又謀取党項城絶貢道新羅告急帝遣使齎詔書諭解聞帝新討髙麗乃取新羅七城乆之又奪十餘城因不朝貢髙宗立乃遣使者來帝詔義慈曰海東三國開基舊矣地國犬牙比者隙爭侵校無寧嵗新羅髙城重鎮皆為王并歸窮於朕丐王歸地昔齊桓一諸侯尚存亡國况朕萬方主可不恤其危邪王所兼城宜還之新羅所俘亦俾還王不如詔者任王决戰朕將𤼵契丹諸國度遼深入王毋後悔永徽六年新羅訴百濟髙麗靺鞨取北境三十城顯慶五年乃詔左衛大將軍蘓定方等發新羅兵討之自成山濟海百濟守熊津口定方縱擊虜大敗王師乗潮帆以進趨真都城一舍止虜悉衆拒復破之斬首萬餘級㧞其城義慈挾太子隆走北鄙定方圍之次子泰自立為王率衆固守義慈孫文思曰王太子固在叔乃自王若唐兵解去如我父子何與左右縋而出民皆從之泰不能止定方令士超堞立幟泰開門降定方執義慈隆及小王演酋長五十八人送京師平其國五部三十七郡二百城户七十六萬乃析置熊津馬韓東明金漣徳安五都督府擢酋渠長治之命郎将劉仁願守百濟城左衛郎将王文度為熊津都督九月定方以所俘見詔釋不誅義慈病死贈衛尉􅀸許舊臣赴臨詔𦵏孫皓陳叔寳墓左授隆司稼􅀸文度濟海卒以劉仁軌代之璋從子福信嘗將兵乃與浮屠道琛據周留城反迎故王子夫餘豐於倭立為王西都皆應引兵圍仁願龍朔元年仁軌𤼵新羅兵徃救道琛立二壁熊津口仁軌與新羅兵夾擊之奔入壁爭梁墮溺者萬人新羅兵還道琛保仁孝城自稱領軍將軍福信稱霜岑將軍告仁軌曰聞唐與新羅約破百濟無老懦皆殺之􅂌以國我與其受死不若戰仁軌遣使齎書答説道琛倨甚館使者於外嫚報曰使人官小我國大將禮不當見徒遣之仁軌以衆少乃休軍飬威請合新羅圖之福信俄殺道琛并其兵豐不能制二年七月仁願等破之熊津㧞支羅城夜薄真峴比明入之斬首八百級新羅餉道乃開仁願請濟師詔右威衛將軍孫仁師為熊津道行軍總管發齊兵七千徃福信顓國謀殺王豐率親信斬福信與髙麗倭連和仁願已得齊兵士氣振乃與新羅王全法敏率歩騎而遣劉仁軌率舟師自熊津江偕進趨周留城豐衆屯白江口四遇皆克火四百艘豐走不知所在偽王子夫餘忠勝忠志率殘衆及倭人請命諸城皆復仁願勒軍還留仁軌代守帝以夫餘隆為熊津都督俾歸國平新羅故憾招還遺人麟徳二年與新羅王㑹熊津城刑白馬以盟辭曰徃百濟先王罔顧逆順不敦鄰不睦親與髙麗倭共侵削新羅破邑屠城天子憐百姓無辜命行人修好先王負險恃遐侮慢弗恭皇赫斯怒是伐是夷但興亡繼絶王者通制故立前太子隆為熊津都督守其祭祀附仗新羅長為與國結好除怨恭天子命永為藩服右威衛將軍魯城縣公仁願親臨厥盟有貳其徳興師動衆明神監之百殃是降子孫不育社稷無守世世毋敢犯乃作金書鐡劵藏新羅廟中仁願等還隆畏衆攜散亦歸京師儀鳯時進帶方郡王遣歸藩是時新羅强隆不敢入舊國寄治髙麗死武后又以其孫敬襲王而其地已為新羅渤海靺鞨所分百濟遂絶新羅新羅魏時新盧國焉其先本辰韓種也辰韓始有六國稍分為十二新羅其一也初曰新盧或曰斯羅其國在百濟東南五百餘里亦在髙麗東南兼有漢時樂浪郡之地東濵大海魏將毋邱儉討髙麗破之奔沃沮其後復歸故國留者遂為新羅焉故其人雜有華夏髙麗百濟之屬兼有沃沮不耐韓濊之地其王本百濟人自海逃入新羅遂王其國國小不能自通使聘苻堅時其王樓寒遣使衛頭朝貢堅曰卿言海東之事與古不同何也答曰亦猶中國時代變革名號改易今焉得同梁武帝普通二年王姓慕名秦始使人隨百濟獻方物其俗呼城曰健牟羅其邑在内曰喙評在外曰邑勒亦中國之言郡縣也國有六喙評五十二邑勒土地肥羙宜植五榖多桑麻果菜鳥獸物産畧與華同至隋文帝時遣使來貢其王姓金名真平隋東蕃風俗記云金姓相承三十餘葉其王至今亦姓金按梁史云姓慕未詳中間易姓之由文帝拜為樂浪郡公新羅王其先附屬於百濟後因百濟征髙麗人不堪戎役相率歸之遂至强盛因襲加羅任那諸國滅之並三韓之地其西北界犬牙出髙麗百濟之間地多山險雖與百濟搆隙百濟不能圖之無文字刻木為信語言待百濟而後通朝服尚白好祠山神八月望日大宴賚官吏射其庭官以親屬為上其族第一骨第二骨以自别兄弟女姑姨從姊妹皆聘為妻王族為第一骨妻亦其族生子皆為第一骨不娶第二骨女雖娶常為妾媵官有宰相侍中司農卿太府令凡十有七等第二骨得為之事必與衆議號和白一人異則罷宰相家不絶禄奴僮三千人甲兵牛馬豬稱之畜牧海中山須食乃射息米榖於人償不滿傭為奴婢王姓金貴人姓朴民無氏有名食用栁柸若銅瓦元日相慶是日拜日月神男子褐袴婦長􅃭見人必跪則以手据地為恭不粉黛率羙髪以繚首以珠綵飾之男子剪髪鬻冒以黒巾市皆婦女貨販冬則作竈堂中夏以食置氷上畜無羊少驢驘多馬馬雖髙大不善行初百濟伐髙麗來請救悉兵徃破之自是相攻不置後獲百濟王殺之結怨滋深唐武徳四年王真平遣使入朝後三年拜柱國封樂浪郡王新羅王貞觀五年獻女樂二詔歸之真平卒無子立女善徳為王國人號聖祖皇姑十七年為髙麗百濟所攻使者來乞師㑹帝伐髙麗詔率兵犄角善徳使兵五萬入髙麗南鄙㧞水口城以聞善徳卒妹真徳襲王明年遣子文王弟子春秋等來朝因請改章服從中國制内出珍服賜之又詣國學觀釋奠講論髙宗永徽元年攻百濟破之遣春秋子法敏入朝真徳織錦為頌以獻曰巨唐開洪業巍巍皇猷昌止戈成大定興文經百王統天崇雨施治物體含章深仁諧日月撫運邁時康幡旗既赫赫鉦鼓何鍠鍠外夷違命者剪覆被天殃淳風凝幽顯遐邇競呈祥四時和玉燭七耀廵萬方維岳降宰輔維帝任忠良五五成一徳照我唐家唐帝羙其意擢法敏太府卿五年真徳死帝為𤼵哀贈開府儀同三司賜綵叚三百遣使弔祭以春秋襲王明年百濟髙麗靺鞨共伐取其三十城使者來請救帝命蘇定方討之以春秋為嵎夷道行軍總管遂平百濟龍朔元年死法敏襲王以其國為雞林州大都督府授法敏都督咸亨五年納髙麗叛畧百濟地守之帝怒詔削官爵以其弟右驍衛大將軍仁問為新羅王自京師歸國詔劉仁軌等𤼵兵討之上元二年二月仁軌破其衆於七重城以靺鞨兵浮海畧南境斬獲甚衆詔李謹行為安東鎮撫大使屯買肖城三戰虜皆北法敏遣使入朝謝罪貢篚相望仁問乃還辭王詔復法敏官爵然多取百濟地遂抵髙麗南境矣置尚良康熊全武漢朔溟九州州有都督統郡十或二十郡有太守縣有小守開耀元年死子政明襲王遣使者朝丐唐禮及佗文辭武后賜吉凶禮及文詞五十篇死子理洪襲王死弟興光襲王元宗開元中數入朝獻果下馬朝霞紬魚牙紬海豹皮又獻二女帝曰女皆王姑姊妹違本俗别所親朕不忍留厚賜還之又遣子弟入太學學經術帝間賜興光瑞文錦五色羅紫繡紋袍金銀精噐興光亦上異狗馬黃金羙髢諸物初渤海靺鞨掠登州興光擊走之帝進興光寧海軍大使使攻靺鞨二十五年死帝尤悼之贈太子太保命使弔祭子承慶襲王邢璹徃使帝詔璹曰新羅號君子國知詩書以卿惇儒故持節徃宜演經誼使知大國之盛又冊其妻朴為妃承慶死詔使者弔臨以其弟憲英嗣王帝在蜀遣使泝江至成都朝正月大歴初憲英死子乾運立甫丱遣金隠居入朝待命詔遣使弔祭冊命之㑹其宰相爭權相攻國大亂三嵗乃定於是嵗朝獻建中四年死國人共立宰相金良相嗣貞元元年遣使持節命之是年死立良相從父弟敬信襲王十四年死無子立嫡孫俊邕明年遣使持冊未至而俊邕死子重興立永貞元年遣使冊命後三年使者金力竒來謝且言徃嵗冊故主俊邕為王母申太妃妻叔妃而俊邕不幸冊今留省中臣請授以歸又為其宰相及王之弟丐門㦸詔皆可凡再朝貢七年死彦昇立來告䘮遣使弔且冊命新王及妃長慶寶歴間再遣使者來朝留宿衛彦昇死子景㣲立太和五年遣使冊弔如儀開成初遣子義琮謝願留衛見聽明年遣之五年鴻臚寺籍質子及學生嵗滿者一百五人皆還之有張保臯鄭年者皆善鬬戰工用鎗年復能沒海履其地五十里不噎其勇健保臯不及也年以兄呼保臯保臯以齒年以藝常不相下自其國皆來為武寧軍小將後保臯歸新羅謁其王曰遍中國人以新羅為奴婢願得鎮清海使賊不得掠人西去清海海路之要王與保臯萬人守之自太和後海上無鬻新羅人者保臯既貴於其國年飢寒客漣水一日謂戍主馮元規曰我欲東歸乞食於張保臯元規曰若與保臯所負何如奈何取死其手年曰飢寒死不如兵死快况死故鄉邪年遂去至謁保臯保臯飲之極歡㑹聞大臣殺其王國亂無王保臯分兵五千人與年持年泣曰非子不能平禍難年至其國誅反者立王以報王遂召保臯為相以年代守清海㑹昌後朝貢不復至後唐同光元年王金朴英遣使來朝貢長興四年權知國事金漙遣使來朴英漙世次卒立史皆失記自晉以後不復至沃沮東沃沮在髙句麗蓋馬大山之東濵大海而居其地形東北狹西南長可千里北與挹婁夫餘南與濊貃接户五千無大君王世世邑落各有長帥其言語與句麗大同時時小異漢初燕亡人衛滿王朝鮮時沃沮皆屬焉漢武帝元封三年伐朝鮮殺滿孫右渠分其地為四郡以沃沮城為元菟郡後為夷貃所侵徙郡句麗西北今所謂元莵故府是也沃沮還屬樂浪漢以土地廣逺在單太嶺之東分置東部都尉治不耐城别主嶺東七縣時沃沮亦皆為縣漢光武六年省邊郡都尉由此罷其後皆以其縣中渠帥為縣侯不耐爭麗沃沮諸縣皆為侯國夷狄更相攻伐唯不耐濊侯至今猶置功曹主簿諸曹皆濊民作之沃沮諸邑落渠帥皆自稱三老則故縣國之制也國小廹於大國之間遂臣屬句麗句麗復置其中大人為使者使相主領又使大加統責其租税貂布魚鹽海中食物千里擔負致之又送其羙女以為婢妾遇之如奴僕其土地肥羙背山向海宜五榖善田種人性質直强勇少牛馬便持矛歩戰食飲居處衣服禮節有似句麗其𦵏作大木槨長十餘丈開一頭作户新死者皆假埋之才使覆形皮肉盡乃取骨置槨中舉家皆共一槨刻木如生形隨死者為數又有瓦䥶置米其中編縣之於槨户邊魏毋邱儉討句麗句麗王宫走沃沮遂進師擊之沃沮邑落皆破之斬獲首虜三千餘級宫奔北沃沮北沃沮一名置溝婁去南沃沮八百餘里其俗南北皆同與挹婁接挹婁喜乘船冦抄北沃沮畏之夏月恒在山岩深穴中為守備冬月冰凍船道不通乃下居村落王頎别遣追討宫盡其東界問其耆老海東復有人不耆老言國人嘗乘船捕魚遭風見吹數十日得一島上有人言語不相曉其俗常以七月取童女沉海又言有一國亦在海中純女無男又説得一布衣從海中浮出其身如國人衣其兩袖長三丈又得一破船隨出在海岸邊有一人項中復有面生得之與語不相通不食而死其域皆在沃沮東大海中挹婁挹婁云即古肅慎之國也周武王及成王時皆貢楛矢石砮爾後千餘年雖秦漢之盛不能致也魏常道鄉公景元末來貢獻楛矢石砮弓甲貂皮之屬其國在不咸山北在夫餘東北千餘里濵大海南與北沃沮接不知其北所極廣袤數千里土地多山險車馬不通人形似夫餘而言語各異有五榖牛馬麻布出赤玉好貂無君長其邑落各有大人處於山林之間土氣極寒常為穴居以深為貴大家接至九梯好養豕食其肉衣其皮冬以豕膏􅂗身厚數分以禦風寒夏則祼􅃝以尺布蔽其前後其人臭穢不潔作厠於中圜之而居無文墨以言語為約坐則箕倨以足挾肉啖之得凍肉坐其上令温暖土無鹽燒木作灰灌之取汁而食俗皆編髮將嫁娶男以毛羽挿女頭女和則持歸然後致禮聘之婦貞而女淫貴壮而賤老死者其日即𦵏之於野交木作小椁殺豬積其上以為死者之糧性凶悍以無憂哀相尚父母死男女不哭泣有哭者謂之不壮相盗竊無多少皆殺之雖野處而不相犯有石砮皮骨之甲國東北有山出石其利入鐡將取之必先祈神其人衆雖少而多勇力處山險又善射弓長四尺力如弩矢用楛長尺八寸青石為鏃鏃皆施毒中人即死隣國畏其弓矢卒不能服也便乘船好冦盗隣國患之東夷飲食類皆用爼豆惟挹婁獨無法俗最無綱紀晉元帝初又詣江左貢其石砮至成帝時通貢於石虎四年方逹虎問之答曰毎候牛馬向西南卧者三年矣是知有大國所在故來焉勿吉黒水靺鞨勿吉國在髙麗北一曰靺鞨邑落各有長不相總一其人勁悍於東夷最强言語獨異常輕豆莫婁等國諸國亦患之去洛陽五千里自和龍北二百餘里有善玉山北行三十日至祁黎山又北行七日至洛瓌水水廣里餘又北行十五日至太岳魯水又東北行十八日到其國國有大水闊三里餘名速末水其部類凡有七種其一號粟末部與髙麗接勝兵數千多驍武每冦髙麗其二伯咄部在粟末北勝兵七千其三安車骨部在伯咄東北其四拂涅部在伯咄東其五號室部在拂涅東其六黑水部在安車西北其七白山部在粟末東南勝兵並不過三千而黑水部尤為勁健自拂涅以東矢皆石鏃即古肅慎氏也東夷中為强國所居多依山水渠帥曰大莫弗瞞咄國南有從太山者華言太皇俗甚敬畏之人不得山上溲汙行經山者以物盛去上有熊羆豹狼皆不害人人亦不敢殺也地卑濕築土如堤鑿穴以居開口向上以梯出入其國無牛有馬車則歩推相與耦耕土多粟麥穄菜則有葵水氣鹹生鹽於木皮之上亦有鹽池其畜多豬無羊嚼米為酒飲之亦醉婚嫁婦人服布裙男子衣豬皮裘頭挿虎豹尾俗以溺洗手面於諸夷最為不潔初婚之夕男就女家執女乳其妻外淫人有告其夫夫輙殺妻而後悔必殺告者由是姦淫事終不發人皆善射以射獵為業角弓長三尺箭長尺二寸常以七八月造毒藥傅矢以射禽獸中者立死煑毒藥氣亦能殺人其父母春夏死立埋之塚上作屋令不雨濕若秋冬死以其尸餌貂貂食其肉則多得之魏孝文延興中遣乙力支朝獻太和初又貢馬五百疋乙力支稱初𤼵其國乘船溯難河西上至大沴河沉船於水南出陸行度洛孤水從契丹西界逹和龍自云其國先破髙句麗十落密共百濟謀從水道并力取髙麗遣乙力支奉使大國謀其可否詔勅三國同是藩附宜共和順勿相侵擾乙力支乃還從其來道取得本船泛逹其國九年復遣使侯尼支朝明年復入貢其傍有大莫盧國覆鐘國莫多回國庫婁國素和國具弗伏國匹黎國㧞大何國都羽陵國庫伏真國魯婁國羽真侯國前後各遣使朝獻太和十三年勿吉復遣使貢楛矢方物於京師七年又遣使人婆非等五百餘人朝貢景明四年復遣使侯力歸朝貢自此迄於正光貢使相尋爾後中國紛擾頗或不至延興二年六月遣使貢方物至齊朝貢不絶隋開皇初相率遣使貢獻文帝詔其使曰朕聞彼土人勇今來實副朕懐視爾等如子爾宜敬朕如父對曰臣等僻處一方聞内國有聖人故來朝拜既親奉聖顏願長為奴僕其國西北與契丹接毎相刼掠後因其使來文帝誡之使勿相攻擊使者謝罪帝厚勞之令宴飲於前使者與其徒皆起舞曲折多戰鬭容上顧謂侍臣曰天地間乃有此物常作用兵意然其國與隋懸隔唯粟末白山為近焬帝初與髙麗戰頻敗其衆渠帥突地稽率其部降拜右光禄大夫居之桞城與邊人來徃悦中國風請被冠𢃄帝嘉之賜以錦綺而褒寵之及遼東之役突地稽率其徒以從每有戰功賞賜甚厚十三年從幸江都放還桞城李密遣兵邀之僅而得免至髙陽沒於王須㧞未幾遁歸羅藝唐武徳五年渠長阿固郎始來太宗貞觀二年乃臣附所獻有常以其地為燕州帝伐髙麗其北部反與髙麗合髙惠真等率衆援安市每戰靺鞨常居前帝破安市執惠真収靺鞨兵三千餘悉坑之開元十年其酋倪屬利稽來朝元宗即拜勃利州刺史於是安東都䕶薛泰請置黑水府以部長為都督刺史朝廷為置長史監之賜府都督姓李氏名曰獻誠以雲麾將軍領黑水經畧使𨽻幽州都督訖帝世朝獻者十五大厯世凡七貞元一來元和中再初黑水西北又有思慕部益北行十日得郡利部東北行十日得窟説部亦號窟説稍東南行十日得莫曵皆部又有拂涅虞婁越喜鐡利等部其地面距渤海北東際於海西抵室韋南北袤二千里東西千里拂涅鐡利虞婁越喜時時通中國而郡利窟説莫曵皆不能自通今存其朝京師者附左方拂涅亦稱大拂涅開元天寶間八來獻鯨睛貂䑕白兎鐡利開元中六來越喜七來貞元中一來虞婁貞觀間再來貞元一來後渤海盛靺鞨皆役屬之不復與王㑹矣後唐同光二年黑水兀兒遣使來其後常來朝貢自登州泛海出青州明年黑水胡獨鹿亦遣使來兀兒胡獨鹿若其兩部酋長各以使來而其部族世次立卒史皆失其紀至長興三年胡獨鹿死子桃李花立嘗請中國後不復見云渤海渤海本粟末靺鞨附髙麗者姓大氏髙麗滅率衆保挹婁之東牟山地直營州東二千里南北新羅以泥河為境東窮海西契丹築城郭以居髙麗逋殘稍歸之唐萬嵗通天中契丹盡忠殺營州都督趙翽反有舍利乞乞仲象者與靺鞨酋乞四比羽及髙麗餘種東走度遼水保太白山之東北阻奥婁河樹壁自固武后封乞四比羽為許國公乞乞仲象為震國公赦其罪比羽不受命后詔將軍李楷固等擊斬之時仲象已死其子祚榮引殘痍遁去楷固窮躡度天門嶺祚榮因髙麗靺鞨兵拒楷固楷固敗還於是契丹附突厥王師道絶不克討祚榮即并比羽之衆恃荒逺乃建國自號震國王遣使交突厥地方五千里户十餘萬勝兵數萬頗知書契盡得夫餘沃沮弁韓朝鮮海北諸國中宗時使侍御史張行岌招慰祚榮遣子入侍睿宗先天中遣使拜祚榮為左驍衛大將軍渤海郡王以所統為忽汗州都督自是始去靺鞨號專稱渤海元宗開元七年祚榮死其國私諡為髙王子武藝立斥大土宇東北諸夷畏臣之私改年曰仁安帝賜典冊襲王并所領未幾黑水靺鞨使者入朝帝以其地建黑水州置長史臨總武藝召其下謀曰黑水始假道於我與唐通異時請吐屯於突厥皆先告我今請唐官不吾告是必與唐腹背攻我也乃遣弟門藝及舅任雅相𤼵兵擊黑水門藝嘗質京師知利害謂武藝曰黑水請吏而我擊之是背唐也唐大國兵萬倍我與之産怨我且亡昔髙麗盛時士三十萬抗唐為敵可謂雄强唐兵一臨掃地盡矣今我衆比髙麗三之一王將違之不可武藝不從兵至境又以書固諌武藝怒遣從兄壹夏代將召門藝將殺之門藝懼讒路自歸詔拜左驍衛將軍武藝使使暴門藝罪惡請誅之有詔處之安西好報曰門藝窮來歸我誼不可殺已投之惡死地并留使者不遣别詔鴻臚少卿李道邃源復諭㫖武藝知之上書斥言陛下不當以妄示天下意必殺門藝帝怒道邃復漏言國事皆左除而陽斥門藝以報後十年武藝遣大將張文休率海賊攻登州帝馳遣門藝發幽州兵擊之使太僕卿全思蘭使新羅督兵攻其南㑹大寒雪袤丈士凍死過半無功而還武藝望其弟不已募客入東都狙刺於道門藝格之得不死河南捕刺客悉殺之武藝死其國私謚武王子欽茂立改元大興有詔嗣王及所領欽茂因是赦境内天寶末欽茂徙上京直舊國三百里忽汗河之東訖帝世朝獻者二十九寳應元年詔以渤海為國欽茂王之進檢校太尉大厯中二十五來以日本舞女十一獻諸朝貞元時東南徙東京欽茂死私諡文王子宏臨早死族弟亢義立一嵗猜虐國人殺之推宏臨子華璵為王復還上京改年中興死謚成王欽茂少子嵩鄰立改元正厯有詔授右驍衛大將軍嗣王建中貞元間凡四來死諡康王子元瑜立改元永徳死諡定王弟言義立改年朱雀並襲王如故事死諡僖王弟明忠立改年大始立一嵗死諡簡王從父仁秀立改年建興其四世祖野野勃祚榮弟也仁秀頗能討伐海北諸部開大境宇有功詔檢校司空襲王元和中凡十六朝獻長慶四寳厯凡再大和四年仁秀死諡宣王子新徳蚤死孫彛震立改年咸和明年詔襲爵終文宗世來朝十二㑹昌凡四彛震死弟䖍晃立死元錫立咸通時三朝獻初其王數遣諸生詣京師太學習識古今制度至是遂為海東盛國地有五京十五府六十二州以肅慎故地為上京曰龍泉府領龍湖渤三州其南為中京曰顯徳府領盧顯鐡湯榮興六州濊貉故地為東京曰龍原府亦曰柵城府領慶鹽穆賀四州沃沮故地為南京曰南海府領沃晴椒三州髙麗故地為西京曰鴨淥府領神栢豊正四州曰長領府領瑕河二州夫餘故地為夫餘府常屯勁兵捍契丹領扶仙二州鄭頡府領鄭髙二州挹婁故地為定理府領定潘二州安邊府領安瓊二州率賔府領華益建三州拂􅄺故地為東平府領伊䝉沱黑比五州鐡利府領廣汾蒲海義歸六州越喜故地為懐逺府領逹越懐紀富羙福邪芝九州安逺府領寧郿慕常四州又郢銅涑三州為獨奏州涑州以其近涑沫江葢所謂粟末水也龍原東南瀕海日本道也南海新羅道也鴨淥朝貢道也長領營州道也夫餘契丹道也俗謂王曰可毒夫曰聖主曰基下其命為敎王之父曰老王母太妃妻貴妃長子曰副王諸子曰王子官有宣詔省中臺省政堂省有左右相左右平章侍中常侍諌議又有左六司忠仁義部右六司智禮信部各有郎中員外又有武員左右衛大將軍之屬大抵憲象中國之度服章亦有紫緋淺緋綠及牙笏金銀魚之制餘俗與髙麗契丹畧等幽州節度府與相聘問自營平距京師葢八千里而逺梁開平元年王大諲譔遣王子來貢方物二年三年及乾化二年俱遣使來貢後唐同光二年遣王子來朝又遣姪學堂親衛大元謙試國子監丞三年及天成元年俱遣使入貢進兒口女口先是契丹大首領邪律安已堅兵力雄盛東北諸蕃多臣屬之以渤海土地相接常有吞併之志是嵗率諸番部攻渤海國夫餘城下之改夫餘城為東丹府命其子托雲留兵鎮之未幾安巴堅死命其弟率兵攻夫餘城不克而還四年及長興二年三年四年清泰二年三年俱遣使貢方物周顯徳元年渤海國烏思羅等三十人歸化其後隔絶不通宋太平興國四年太宗平晉陽移兵幽州其酋帥大鸞河率小校李勲等十六人部族三百騎來降以鸞河為渤海都指揮使六年賜烏舍城浮渝府渤海琰府王詔畧曰兹維契丹犯我封畧今欲鼓行深入大殱醜類素聞爾國密邇冦讐勢廹併吞力不能制因而服屬困於宰割當靈旗破敵之際是鄰邦雪憤之日所宜盡出族帳佐子兵􅄡俟其剪滅沛然封賞幽薊土宇復歸中朝朔漠之外悉以相與朂乃恊力朕不食言時將率兵大舉北伐故降是詔蝦夷蝦夷海島中小國也其使鬚長四尺尤善弓矢挿箭於首令人載之而立數十歩無不中者唐顯慶四年十月隨倭國使至入朝文獻通考卷三百二十六
