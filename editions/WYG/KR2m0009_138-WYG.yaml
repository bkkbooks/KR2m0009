body:
  text: 文獻通考卷一百三十八鄱陽馬端臨貴與著樂考十一匏之屬雅部陳氏樂書曰匏之為物其性輕而浮其中虚而通笙則以匏為母象植物之生焉其卦則艮其方東北之維其時春冬之交其聲尚議其律大吕太蔟其風融其音啾立春之氣也先王作樂以之為笙竽之屬焉記曰歌者在上匏竹在下國語曰匏竹利制盖匏竹相合而成聲得清濁之適故也笙巢笙世本云随作笙未審何代人禮記曰女媧之笙簧説文曰笙正月之音物生故謂笙十三簧象鳳之身列管匏中施簧管端宫管在中央三十六簧曰竽宫管在左旁十九簧至十三簧曰笙其他皆相似也大笙謂之簧小笙謂之和詩傳云吹笙則簧鼓矣盖笙中之簧也周禮春官大司樂笙師掌教龡竽笙鄭衆云竽三十六簧笙十三簧教之眡瞭也龡音吹爾雅曰笙十九簧曰巢十三簧曰和漢章帝時零陵文學奚景於舜祠得笙白玉管後代易之以竹耳釋名曰笙生也象物貫地而生竹母曰匏以匏為之故曰匏陳氏樂書曰萬物盈乎天地之間入乎坎則革而趨新故其音革而為鼓成乎艮則始作而施生故其音匏而為笙古者造笙以曲沃之匏汶陽之篠列管匏中而施簧管端則羙在其中鍾而為宫盖所以道達冲氣律中太蔟立春之音也故有長短之制焉有六合之和焉故五經析疑曰笙者法萬物始生道達隂陽之氣故有長短黄鍾為始法象鳳凰盖笙為樂器其形鳯翼其聲鳯鳴其長四尺大者十九簧謂之巢以衆管在匏有鳯巢之象也小者十三簧謂之和以大者唱則小者和也儀禮有之三笙一和而成聲是也大射儀樂人宿縣於阼階東笙磬西面其南笙鐘盖笙艮音也於方為陽鐘兊音也於方為隂周官笙師掌教吹笙共其鐘笙之樂以教祴夏書曰笙鏞以間是鼓應笙之鐘而笙亦應之也眡瞭掌擊笙磬詩曰笙磬同音則磬乾音也與笙同為陽聲是擊應笙之磬而笙亦應之也笙磬則異器而同音笙鐘則異音而同樂儀禮有衆笙之名而簜在建鼓之間盖衆笙所以備和奏洽百禮豈特應鐘磬而已㢤鹿鳴所謂鼓瑟鼓琴吹笙鼓簧應琴瑟之笙也賔之初筵曰籥舞笙鼓應鼓之笙也檀弓孔子十日而成笙歌儀禮歌魚麗笙由庚笙之類應歌之笙也然則笙之為用豈不備㢤此帝舜用之所以鳳儀子晉吹之所以鳯鳴也記曰女媧之笙簧世本曰隨作笙簧庸詎知隨非女媧氏之臣乎黄帝制律以伶倫造鐘以營援則女媧作笙竽以隨不足疑矣宋朝李照作巢笙合二十四聲以應律吕正倍之聲作和笙應笙竽合清濁之聲又自制大笙上之太樂亦可謂之復古制矣今太常笙濁聲十二中聲十二清聲十二俗呼為鳳笙孟蜀王所進樂工不能吹雖存而不用比者按清濁正三倍聲皆得相應誠去四清聲吹之雖用之雅樂亦惡在其為不可㢤今巢笙之制第一管頭子應鍾清聲第二管二中音黄鍾正聲應中音子三第三管應鍾正聲應頭子四第四管南吕正聲應第五子五中吕管無射正聲無應六大托管蕤賔濁聲應托聲七第七管大吕正聲無應八大韵管姑洗濁聲有應第五子南吕清聲應第四管十中音子黄鍾清應中音十一托聲管㽔賔正聲應大托十二著聲管姑洗正聲應大韵十三仙吕管夾鍾正聲無應十四髙聲管太蔟正聲十五平調子林鍾清聲十六平調管林鍾正聲十七後韵太蔟濁聲應商聲十八義聲管夷則正聲無應十九托聲管中吕正聲無應聲和笙鳯笙陳氏樂書曰傳曰大笙音聲衆而髙也小者音相和也斯不然笙無大小之辨乎説文曰笙正月之音十三簧象鳳身盖其簧十二以應十二律也其一以象閏也宋朝登歌用和笙取其大者倡則小者和非阮逸所謂其聲清和也用十三簧非阮逸所謂十九簧也巢和若均用十九簧何以辨大小之器㢤阮逸謂竽笙起第四管為黄鍾巢笙起中音管為黄鍾和笙起平調為黄鍾各十九簧皆有四清聲三濁聲十二正聲以編鐘四清聲參驗則和笙平調子是黄鍾清也竽笙第五子是太簇清也中吕管是大吕清也中音子是夾鍾清也既已謂之竽矣謂之笙矣安得合而一之為竽笙邪儀禮所謂三笙一和者不過四人相為倡和爾孰謂竽和之類耶蔡邕月令章句日李秋之月上下入學習吹笙所以通氣也管簫笙竽皆以吹鳴者也大竽小竽竽亦笙也今之笙竽以木代匏而漆之殊愈於匏荆梁之南尚仍古制南蠻笙則是匏其聲尤劣陳氏樂書曰昔女媧氏使隨裁匏竹以為竽其形参差以象鳥翼火類也火数二其成数則七焉冬至吹黄鍾之律而間音以竽冬則水王而竽以之則水器也水數一其成数則六焉因六而六之則三十六者竽之簧数也因七而六之則四十二寸者竽之長数也月令仲夏調笙竽淮南子謂孟夏吹笙竽盖不知此周官笙師掌教吹竽笙則竽亦笙類也以笙師教之雖異器同音皆立春之氣也樂記曰聖人作為鼗鼓椌楬塤箎然後為之鐘磬竽瑟以和之是樂之倡始者在鼗鼓椌楬塤箎其所謂鐘磬竽瑟也特其和終者而已韓非子日竽者五聲之長竽先則鐘瑟皆隨竽倡則諸音皆和豈聖人制作之意㢤説文曰竽管三十六簧象笙以竽宫管在中故也後世所存多二十三管具二均聲焉宋朝宋祁曽於樂府得古竽有管而無簧列管参差及曲頸皆為鳳飾樂工皆以為無用之器惟葉防欲更造使具清正倍三均之聲是不知去二變四清以合乎聲律之正也通禮義纂曰漢武帝時邱仲作笙竽三十六管豈以邱仲作尺四寸之笛遂誤以為竽耶竽聲重濁與巢相和堂下之樂也樂法圖曰吹竽有以知法度竽音調則度数得矣簧陳氏樂書曰月令中央土律中黄鍾之宫則樂之有簧以宫管在中也莫非簧也有笙中之簧有非笙中之簧鹿鳴曰吹笙鼓簧荘子言簧鼓笙中之簧也君子陽陽曰左執簧巧言曰巧言如簧非笙中之簧也傳稱王遥有五舌竹簧今民間有鐵葉之簧豈非簧之變體歟匏之屬胡部十七管竽十九管竽二十三管竽宋朝大樂諸工以竽巢和併為一器率取胡部十七管笙為之所異者特以宫管移之左右而不在中爾雖名為雅樂實胡音也􅂉二十三管􅂉十九管二十三管則兼乎四清二變十九管則兼乎十二律七音要皆非古制也李照雖更制大竽然不䏻革舊器而兼用之亦未為深知樂也埒竽樂府録謂埓竽形類小鐘以手埒之則鳴矣非古制也如簧而無觜雅簧三禮圖有雅簧上下各六聲韵諧律亦一時之制也潛夫論曰簧削鋭其頭有傷害之象塞蠟蜜有口舌之類皆非吉祥善應也然則巧言如簧而詩人所以傷讒良有以也唐樂圖以線為首尾直一線一手貫其紐一手鼓其線横加口中呼吸成音真野人之樂耳竹簧震靈簧漢武内傳西王母命侍女許飛瓊鼓震靈之簧神仙傳王遥有五舌竹簧三在石室中遥自取其二以其一與室中人對鼓之然則震靈之簧豈亦竹簧歟震為蒼筤竹故也胡蘆笙瓢笙唐九部夷樂有胡蘆笙宋朝至道初西南蕃諸蠻入貢吹瓢笙豈胡蘆笙耶胡􅵰如簧無觜後魏宣武恱胡聲樂有胡鼓胡􅵰玉篇謂􅵰笙匏之屬俗部竽笙近代竽笙十九簧盖後人象竽倍聲因以名之然竽笙異器而同和故周官竽與笙均掌之以笙師焉既謂之竽矣安得又為之笙乎古人之制必不然矣世人􅂉謂大笙謂之簧是不知笙中有簧而簧非笙也鳳翼笙参差竹其制如兩生之竹而共一匏昔王子晉之笙其制象鳯翼亦名参差竹盖嘗於緱山月下吹之唐太和中有尉遲章尤妙於此宣宗已降有范漢恭其子師保在陜州亦曲盡父藝咸通以後有相存質楊敬元並稱妙手義管笙二管十七簧宋朝大樂所傳之笙並十七簧舊外設二管不定置謂之義管每變均易調則更用之世俗之樂非先王之制也雲和笙漢武帝内傳西王母命侍女董䨇成吹雲和之笙盖其首象雲也與雲和琴雲和筝類矣十七管笙唐樂圖所傳十七管之笙通黄鍾二均聲清樂用之十二管笙唐樂圖所傳十二管之笙讌樂用之十二月笙十二枚後周鄭譯獻新樂十二月各一笙每笙十六管宣帝令與斛斯證議證駮之曰六律十二管還相為宫然一笙十六管總一百九十二管既無相生之理又無還宫之義深恐鄭聲亂樂未合古制竊謂不可帝納之停譯所獻其制今亡篍篍吹筩也言其聲秋秋然也急就章箛篍起居課後先言箛簧及篍為作休之節今闤闠間欲相號令乃吹指為節此吹筩之遺制歟擊竹擊竹之制近世民間多有之盖取竹兩片緊厚者治而為之其長数寸手中相擊為節與歌指相和焉方之漸離所善者固異矣竹之屬雅部陳氏樂書曰竹之為物其節直而有制其心虛而能通而利制之音所由出也其卦則震其方則東其時則春其聲尚議其律姑洗其風明庶其音濫春分之氣也先王作樂竅之以為簫管之屬焉䇾簫筊簫簫世本曰舜所造其形参差象鳯翼長二尺爾雅曰編二十二管長一尺四寸曰䇾十六管長尺二寸者曰筊凡簫一名籟前代有洞簫今無其器蔡邕曰簫編竹有底大者二十三管小者十六管長則濁短則清以蜜蠟實其底而増減之則和然則邕時無洞簫矣陳氏樂書曰荀卿曰鳳凰于飛其翼若干其聲若簫盖簫之為器編竹而成者也長則聲濁短則聲清其狀鳳翼其音鳳聲中吕之氣夏至之音也然鳳凰聲中律吕以五行推之乃南方朱鳥則火禽也火生数二成数七而夏至又火用事之時二七十四則簫之長尺有四寸盖取諸此爾雅大簫謂之䇾小者謂之筊郭璞謂大者長尺四寸小者尺二寸是也然尺四寸者二十四管無底而善應故謂之䇾尺二寸者十二管有底而交鳴故謂之筊盖應十二律正倍之聲也郭璞大者二十三管小者十六管失之矣簫者隂氣之管也坤以二四為六而地􅁆至十而止故大者二十四管小者十二管取隂氣自然之数韶簫舜作十管韶簫長尺有二寸其形參差象鳳翼所以應十二之數聲之所由生也風俗通之論疑有所本矣􅂉以三尺言之母乃太長乎釋名曰簫肅也其聲肅肅而清也葦籥竹籥籥不知誰所造按禮記葦籥伊耆氏之樂則伊耆已有籥矣周禮有籥師掌教國子秋冬吹籥歴代文舞之樂所執羽籥是也詩所謂左手執籥右手秉翟爾雅云籥如笛三孔而短小廣雅云七孔大者日産中者曰仲小者曰箹中丁仲反箹音握陳氏樂書曰易曰震為萑葦為蒼筤竹爾雅曰葦醜芀郭璞曰其類皆有芀秀葭蘆葦也則葦籥竹籥皆震音也盖太極元氣函三為一行於十二辰而律吕具矣始動於子参之於丑得三而籥之為器本於黄鍾之龠竅而三之所以通中聲而上下之律吕之所由生也古之人始作樂器而葦籥居其先焉震為六子之首籥為衆樂之先其斯以為稱始乎葦伊耆氏施於索饗也成乎竹周人以之本始農事也或以伊耆為堯然堯時八音已具豈特葦籥土鼓而已哉豳籥陳氏樂書曰詩者中聲所止也籥者中聲所通也土者中聲所本也周官籥章掌土鼓豳籥者以其迎寒逆暑必以中聲之詩奏之中聲之鼓龡之中聲之籥則所道者中徳所詠者中聲所順者中氣無徃不為中和之紀矣簅籥仲籥筠籥陳氏樂書曰大籥謂之産中謂之仲小謂之筠籥之大者其聲生出不窮非所以為約也小者其聲則約而已若夫大不至於不引小不至於太約此所以謂之仲也然則鄭郭王孔之籥豈其中者歟毛萇六孔之籥豈其大者歟􅢖然皆不出乎中聲而廣雅有七孔籥為笛之説豈傅㑹七音而遂誤乎竹律陳氏樂書曰天有六氣降生五味天有六甲地有五子故六律六吕而成天道所以宣揚六氣九徳究極中和順天地之體合鬼神之徳通五行之性遂萬物之情者也是故上古聖人本隂陽别風聲審清濁鑄金作鐘主十二月之聲效升降之氣立和適之音然鐘難分别又截竹為管謂之律者聲之清濁率法以長短為制故也黄帝以聴為之逺取諸物也夏禹以聲為之近取諸身也今夫王者制事立法物度軌則一本於六律六律為萬事根本雖法存形器而道契精㣲探賾索隠鈎深致逺窮天下之妙者莫不凖焉豈非八音之管轄五聲之喉衿也京房欲益中吕一分且合黄鐘九寸是使周元之度六甲無遷移歸餘之法五嵗無再閏之期失隂陽之大紀乖律呂之本原也管力結反篎音妙爾雅曰長尺圍寸并漆之有底大者曰簥音嬌中者曰小者篎古者以玉為管舜時西王母獻白琯是也月令均琴瑟管簫蔡邕章句曰管者形長尺圍寸有孔無底其器今亡説文曰管如箎六孔十二月之音詩云嘒嘒管聲周禮孤竹之管於圜丘奏之孫竹之管於方丘奏之隂竹之管於宗廟奏之鄭元云孤竹竹特生者也孫竹竹枝根之未生者隂竹生於山北者陳氏樂書曰樂以木為末竹為本古者以候氣律管截而吹之濁倍其聲為堂下之樂頭管所以和衆樂之聲以其探本故也爾雅大者謂之簥以聲大而髙也小者謂之篎以其聲小而深也其中謂之則其聲不小不大不髙不深如黒土之在水中也盖其状如箎笛而六竅又有底焉長尺圍寸併兩漆而吹之漢大予樂有焉其所主治相為終始所以道隂陽之聲十二月之音也女媧始為都良管以一天下之音為班管以合日月星辰之㑹帝嚳展管有虞氏下管則管為樂器其來尚矣至周而大備教之於小師播之於瞽矇吹之於笙師辨其聲用則孤竹之竒禮天神孫竹之衆禮地祗隂竹之幽禮人鬼各從其聲類故也後世為䨇鳳管以足律音豈得古制歟禮記文王世子曰登歌清廟下管象武郊特牲曰歌者在上匏竹在下仲尼燕居曰升歌清廟示徳也下而管象示事也祭義日昔周公有勲勞於天下成王賜之升歌清廟下而管象燕禮大射儀升歌鹿鳴四牡皇皇者華下管新宫周之升歌不過清廟鹿鳴四牡皇皇而下管不過象武新宫則舜升歌下管之詩雖不經見要之歌以示徳管以示事一也徳成於上歌以詠之於堂上事成而下管以吹之於堂下豈非以無所因者為上有所待者為下邪廣雅管象簫長八寸圍寸八有孔無底豈以後世之制言之歟周頌言磬筦將將商頌言嘒嘒管聲依我磬聲則堂上之磬堂下之管其聲未嘗不相應然則所依者磬聲而已都良管班管昔女媧氏命娀陵氏制都良之管以一天下之音又命聖氏為班管合日月星辰名曰充樂至於帝嚳命咸墨吹笭展管亦因是也孤竹管孫竹管隂竹管陳氏樂書曰先王之制管所以道達隂陽之聲然陽竒而孤隂偶而羣陽大而寡隂小而衆陽顯而明隂幽而晦孤竹之管與圜鍾之宫合以之降天神取其竒而孤也孫竹之管與函鍾之宫合以之出地祇取其少而衆也隂竹之管與黄鍾之宫合以之禮人鬼取其幽而晦也易曰方以類聚物以羣分於斯見矣篴陳氏樂書曰周官笙師掌教吹籥簫箎篴管五者皆出於笙師所教無非竹音之雅樂也杜子春謂如今時所吹五孔竹篴則是為當讀為滌蕩之滌非矣漢部所用雅笛七竅不知去二變以全五聲之正也蔡邕曰形長尺圍寸無底有穴今亡大抵管笛一法爾唐制尺八取倍黄鍾九寸為律得其正也漢邱仲笛以後一穴為商音晋荀勉笛法以後一穴為角謂九寸穴上開也宋朝太常笛無尺寸第依編架黄鍾為合聲然兼二變而吹之未盡得先王雅樂之制今太常笛從下而上一穴太蔟半竅為大吕次上一穴為姑洗半竅為夾鍾次上一穴為仲吕次上一穴為林鍾半穴為㽔賓次上一穴為南吕半穴為夷則變聲為應鍾謂用黄鍾清與仲吕䨇發為變聲半竅為無射後一穴為黄鍾清中管起應為首為宫其次上穴大吕為商又次上穴夹鍾為角又次上穴仲吕為變徴又次上穴蕤賓為正徴又次上穴夷則為羽變宫為無射謂後穴與第三穴䨇變是也如此即不用半竅謂之十二律用兩笛成曲也今按習所用以太常半竅法起間聲亦叶律施用大箎小箎世本云暴辛公所造舊志云一曰管非也雖不知暴辛公何代人而非舜前人明矣舜時西王母獻琯則是已有此器辛公安得造箎乎爾雅曰大箎謂之沂音銀箎以竹為之長尺四寸圍三寸一孔上出寸三分名曰翹横吹之小者尺二寸廣雅云八孔今有胡吹非雅樂也蔡邕月令章句云箎竹也六孔有距横吹之詩云仲氏吹箎陳氏樂書曰箎之為器有底之笛也暴辛公善之非其所作者也大者尺有四寸隂数也其圍三寸陽數也小者尺有二其則全於隂数要皆有翹以通氣一孔達寸有二分而横吹之或容覆或􅅗伏箎為不齊者也爾雅大塤謂之嚚嚚則六孔交鳴而喧嘩沂則一孔而其聲清辯或曰箎之為言啼也或曰沂之為言悲也豈其聲自空而出若嬰兒之悲啼然邪周官笙師教吹塤箎詩曰伯氏吹壎仲氏吹箎又曰天之牖民如壎如箎是壎箎異器而同樂伯仲異體而同氣故詩人取以况焉世本以箎為管沈約非之當矣先儒言箎有六孔七孔八孔十孔之説以中聲論之六孔六律之正聲也八孔八音之正聲也十孔五聲正倍之聲也葢其大小異制然邪鄭司農有七孔之異論未免泥乎七音之失也箎吹孔如酸棗宋朝箎六孔而横吹下一穴在底節外次四穴在前一穴在後太常箎無尺寸第依編架黄鍾為合聲然兼七竅而用之未純乎雅樂也節外一穴為太蔟半穴為大吕次上一穴為姑洗半穴為夾鍾又次上一穴為蕤賔半竅為仲吕又次上一穴為林鍾又次上一穴為南吕半竅為夷則七竅全開為應鍾半竅為無射黄鍾大吕太蔟夹鍾哨吹各有清聲和爾雅曰徒吹謂之和葢聲過則滛中則和故也周禮之吹作龡此其意歟簜書於海岱惟揚言篠簜既敷繼之以瑶琨篠簜孔安國以竹箭為篠大竹為簜則簜之為竹特大於篠其笙簫之類歟儀禮大射儀簜在建鼓之間此之謂也竹之屬胡部觱篥悲篥笳管頭管風管觱篥本名悲篥出於胡中其聲悲或云儒者相傳胡人吹角以驚馬後乃以笳為首竹為管陳氏樂書曰觱篥一名悲篥一名笳管羌胡龜兹之樂也以竹為管以蘆為首狀類胡笳而九竅所法者角音而甚悲篥胡人吹之以驚中國馬焉唐天后朝有陷寃獄者其室配入掖庭善吹觱篥乃撰别離難曲以寄哀情亦號怨回鶻焉後世樂家者流以其旋宫轉器以應律管因譜其音為衆器之首至今鼓吹教坊用之以為頭管是進今之新聲加于古之雅樂之上不幾於以新亂舊乎降之雅樂之下作之國門之外可也宋朝元會乗輿行幸並進之以冠雅樂非先王下管之制也然其大者九竅以觱篥名之小者六竅以風管名之六竅者猶不失乎中聲而九竅者其失盖與太平管同矣今教坊所用上七空後三空以五凡工尺上一四六勾合十字諧其聲漆觱篥唐九部夷樂有漆觱篥雙觱篥胡部安國樂有雙觱篥唐樂圗所傳也銀字觱篥銀字管唐徳宗朝有將尉遲青素善觱篥冠絶古今時幽州有王麻奴河北推為第一手後詣尉遲令於髙般渉調中吹勒部羝曲曲終尉遲頷頥而已謂麻奴曰何必髙般涉也即自取銀字管於般渉中吹之麻奴恭聽愧謝自此不復言律矣元和太和以來有黄日遷楚林尚六六史敬約史漢瑜之徒皆雅能者然方尉遲邈乎天冠而地履也懿皇命史敬約以觱篥初㺯通調上謂是曲乃誤拍乃隨曲撰一成此曲十八管簫唐樂圖所傳之簫凡十八管取五聲四清倍音通林鍾黄鐘二均聲而梁部用之二十一管簫此簫取七音而三倍之龜兹部所用豈宜存之歌簫隋煬帝七年征遼東簫及笳各四面則後亦用簫吹者矣非古制也唐鐃吹部有鼓簫笳并歌四種凡七曲本諸此歟歌簫笳工服武弁衣褠衣角帯雙角長鳴角書記所不載或云羌胡以驚中國馬馬融又云出吴越谷間黄帝會群臣於泰山作清角之音似兩鳯雙鳴二龍齊吟丹蛇繞首雄虹帯天横吹雙角之實不過如此樂錄亦云蚩尤氏率魍魎與黄帝戰於涿鹿之野黄帝乃命吹角為龍吟以禦之晉庾翼與燕王書曰今致畫長鳴角一雙幡眊副是其遺志也沈約徐廣並謂經史所不載則黄帝之説豈先儒傅會言之邪中鳴􅉫邏逈其制􅁼膽瓶陳氏樂書曰胡角本應胡笳之聲通長鳴中鳴凡有三部魏武帝北征烏丸越沙漠軍士聞之靡不動鄉闗之思於是武帝半減之為中鳴其聲尤更悲切盖其制並五采衣幡掌畫蛟龍五采脚故律書樂圖以為長鳴一曲三聲並馬上嚴警用之第一曰龍吟二曰彪吼三曰阿聲其中鳴一曲二聲一為盪聲二為牙聲亦馬上警用之也其大者謂之􅉫邏逈胡人用之本所以驚中國馬非中蕐所宜用也宋朝審定音樂更制鼓吹雖角之尺度均一聲比鍾律内之乗輿行幸外之郡邑警備莫不奏之以為警嚴是用羌胡之音以和軍旅以節聲樂曷為不易之以先王雅樂以為鼓吹乎存之有虧中國之制削之則華音息起非强中國弱夷狄之意歟隋大角工平巾幘絳衫白大口袴内宫鼓樂服色凖之大鼓長鳴工服青地苣文警角陳氏樂書曰晉大司馬桓温屯中堂夜吹警角御史中丞司馬恬奏劾大不敬厥明温見之歎曰此兒乃敢彈我真可畏也又陸士衡為河北都督内懐憂懣聞衆軍警角鼓吹謂其司馬孫極曰我今聞此不如蕐亭鶴鳴然則軍中用警角尚矣衛公兵法曰軍城及野營行軍在外日出沒時撾鼓千搥三百三十三搥為通皷音止角音動吹十二聲為一疊三角三鼓而昏明畢也宋張興世謂父曰天子鼓角非田家翁所吹然則桓温人臣屯中堂而用之雖欲勿劾得乎哉宋朝警角天下郡邑並得用之非特武嚴之士也然用之邊郡可也徧用諸郡邑恐未為盡善之制也大胡笳大箛杜摯笳賦云李伯陽入西戎所造晉先蠶儀注車駕住吹小箛發吹大箛箛即笳也又有胡笳漢舊筝笛錄有其曲不記所出本末大胡笳似觱篥而無孔後世鹵部用之豈張博望所傳摩阿兠勒之曲邪晉有大箛小箛蓋其遺志也沈遼集大胡笳十八拍世號為沈家聲小胡笳十九拍末拍為契聲世號為祝家聲唐陳懐古劉充渚甞勘停歇句度無謬可謂備矣楚調有大胡笳鳴小胡笳鳴並琴筝笙得之亦其遺聲歟杜賦以為老子所作非也蘆笳胡人卷蘆葉為笳吹之以作樂漢筝篴錄有其曲李陵有胡笳互動之説是也吹鞭漢有吹鞭之號笳之類也其状大類鞭馬者今牧童多卷蘆葉吹之小胡笳小箛陳氏樂書曰昔先蠶儀注凡車駕所止吹小箛發大箛其實胡笳也古之人激南楚吹胡笳叩角動商鳴羽發徵風雲為之搖動星辰為之變度况人乎劉疇嘗避亂塢壁賈胡欲害之者百數疇援而吹之為出塞之聲動逰客之思羣胡卒泣遯而去劉越石為胡騎圍之者數重越石終夜奏之群胡卒棄圍而奔由此觀之笳聲之感人如此其深施之於戎貉可也晉之施於車駕儀注不㡬失古之遺意邪劉疇事出曺嘉之晉書劉越石事出世説蘆管胡人截蘆為之大概與觱篥相類出於北國唐宣宗善吹蘆管自製楊桞枝新傾杯二曲有數拍不均嘗命俳優辛骨􅙡拍不中因瞋視骨􅙡憂懼一夕而斃唐咸通中丞相李蔚自大梁移鎮淮海嘗構池亭目曰賞心有小校薜楊陶因獻朱崖李相陸暢元白所撰蘆管歌篇一軸次出其管兹亭奏之盖其管絶㣲每於一觱篥管中常容三管桂􅁐叢談所載胡箎小箎沈約曰胡箎出於胡吹非雅器也今太樂雅箎長一尺二寸則箎之小者非尺有四寸之大者也孔上出三分名翹後世有笛吹謂之小箎豈亦出胡吹歟箎或作龢與龠不齊故也羌笛五孔胡笛陳氏樂書曰馬融賦笛以為出於羌中舊制四孔而已京房因加一孔以備五音風俗通漢武帝時邱仲作尺四寸笛後更名羌笛焉宋書云有胡笛小箎出於鼓吹豈梁之胡歌邪靈帝好擫笛而漢室以傾明皇喜品簫而唐祚㡬墜以聲律身度之主耽滔堙心耳之音則天下何以觀化為哉然而不亂且亡未之有也唐雅曰籥謂之笛七孔有黄鍾大吕為二均聲盖不考笙師籥篴異器之過也古者羌笛有落梅花曲開元中有李謨善吹獨歩當時越州刺史皇甫政月夜泛鑑湖命謨吹笛謨為之盡妙時有一老父泛舟聼之因奏一聲湖波搖動笛遂中裂即探懐中一笛以畢其曲政視之有三龍翔舟而聼老人曲終以笛付謨謨吹之竟不能聲而老父亦失所在矣大中以來有王六六王師簡亦妙手也大横吹小横吹並以竹為之笛之􅁼也律書樂圖云横吹胡樂也昔張博望入西域傳其法於西京得摩訶兠勒一曲李延年因之更造新聲二十八觧乗輿以為武樂漢時常給邉將魏晋以後二十八觧又不復存其所用者唯黄鶴壟頭水出關入關出塞入塞折楊桞黄覃子赤之楊望行人十四曲也唐樂所載大横吹部有角鼓角笛簫笳觱篥七色小横吹部有角笛簫笳觱篥桃皮觱篥六色惟大横吹三十四曲内三曲馬上警嚴用之一曰懽樂樹二曰空口蓮三曰賀六渾其餘二十一曲備擬所用一曰靈泉崔二曰達和若輪空三曰白浄王子四曰他賢逸勒五曰鳴和羅純羽六曰歎度熱七曰吐九利純比倫八曰元比敦九曰植普離十曰胡笛爾笛十一曰鳴羅特罰十二曰比久伏大汗十三曰於理真斤十四曰素和斛律十五曰鳴䌫真十六曰烏鐵甘十七曰特介漢十八曰度賔哀十九曰阿若於樓達二十曰大賢真二十一曰破陣樂陳氏樂書曰古者更鹵簿作鼓吹鼓吹之樂在魏晉則輕在江左則重至隋始分為四等一掆鼓二鐃鼓三大横吹四小横吹唐又别為五部一鼓吹二羽葆三鐃吹四大横吹五小横吹大駕則晨嚴夜警施之鹵簿為前後部皇后皇太子以下咸有等差迨於宋朝總號鼓吹云龍頭笛横吹自北國梁横吹曲曰下馬吹笛是也今教坊用横八孔鼓吹世俗號為龍頸笛笛首為龍頭有綬𢃄下垂義觜笛如横笛而加觜西梁樂也而今髙麗亦有用焉竹之屬俗部雅簫二十四頌簫十六禮圖雅簫尺有二寸二十四彄頌簫尺有四寸十六彄郭璞大簫二十三管小簫十六管葢二十四管備律吕清濁之聲先王之制也十六管兼十二律四清而為之豈古制哉今教坊所用長五六寸十六管有底而四管不用非古人制作之意也籟簫莊周曰地籟則衆竅是已人籟則比竹是已郭璞謂簫一名籟廣雅亦曰籟謂之簫蓋簫籟比竹而成聲猶天地之籟籟風竅而怒號也許慎以籥為籟是不知籥如篴而三竅未嘗比竹為之吕氏春秋有吹籟見越王者上下宫商和而越王不喜未為知音者也短簫短簫鐃歌單吹鼓吹之樂也廣樂記有二十一管簫羽葆鐃吹横吹部用之豈短簫歟其曲有悲思翁艾如張上之回戰城南元雲朱鷺之類是也何承天謂黄帝使岐伯作之以揚徳蓋有所受歟崔豹古今注曰漢樂有黄門鼓吹天子所以燕樂羣臣短簫鐃歌鼓吹之常亦以賜有功諸侯也讌樂簫二十一管讌樂之簫凡二十一管具正均七聲左清倍右濁倍通五均焉世俗之樂也與龜兹部所用者大同小異爾唐貞觀中景雲見河水清張率更制為景雲河清歌名曰讌樂當時元㑹第一奏是也清樂簫十七管教坊簫十七管唱簫和簫景祐樂記教坊所用之簫凡十七管以觱篥十字記其聲然清樂所用十七管其聲法不同故並存之宋樂有唱簫各二人和簫十人亦一時制也鼓吹簫十二管景祐樂記十三管之簫凡三種鼓吹部用之李沖簫二十三管唐李沖所傳之簫凡二十三管雖制作不同亦一時之制也豈惑於郭璞大簫之説邪鳯簫洞冥記帝常夕東望有青雲焉俄見雙鵠集於臺上有頃化為神女舞於臺下握鳯管之簫舞落霞之琴歌清娱春波之曲亦隣於怪也陳氏樂書曰白虎通曰簫者中吕之氣也易説曰夏至之樂補以簫春秋説曰夏至作樂間以簫笙然則簫為中吕之樂夏至之音豈不信哉月令仲夏之月令樂師均管簫亦此意也七孔籥劉熈釋名曰籥躍也氣躍而出也古者取卯地之竹以為籥春分之音萬物振躍而出也然三漏之籥所以通中聲先王之樂也七漏之籥所以備二變世俗之樂也聶崇義禮圖所傳并今太常所用者三孔而已豈亦得先王之制歟霜條箎八孔劉熙釋名曰箎啼也聲自孔出如嬰兒啼聲也廣雅曰箎以竹為之長尺四寸有六孔前一後四頭一月令仲夏之月調箎蓋調之使和故也洞冥記所謂吹霜條之箎亦豈過是東觀漢記明帝幸南陽舊宅作雅樂奏鹿鳴用塤箎和之以娱嘉賔信乎一時之和樂也陳氏樂書曰禮言吹箎掌之笙師詩言吹箎主之仲氏則箎亦笙􅁼而仲氏以况中聲焉先王之雅樂也故後世推善吹者前有伍子胥後有朝雲而已洛陽伽藍記述後魏河間王琛有朝雲者善吹箎能為團扇歌壠上聲及琛為秦州刺史屢討叛羌不勝因令朝雲吹之羌人聞者皆感泣而降故秦語曰快馬健兒不如老嫗吹箎信乎樂之感人如此茍以之移風易俗天下胡為而不寧哉古史考曰古有箎尚矣蘇成公善箎而記者因以為作誤也或謂暴辛公所造亦無據矣舊志以箎為管是不知箎春分之音而管十二月之音也雙管黄鍾管大吕管樂法圖云東律主黄鍾聖人吹管知律管音調則度律歴正矣然則黄鍾之管九寸與長尺之制異矣九寸之管主黄鍾則十寸之管應十日可知矣揚雄曰聲生於日言黄鍾如此則大吕管可知矣唐李冲謂管有一定之聲絃多舒緩之變故捨旋宫琵琶制旋宫雙管法雖在於簡易道實䆒於精㣲矣然大吕管通五均則是黄鍾管通七均非也七星管廣雅曰管象箎長尺圍寸有六孔無底風俗通説文皆曰管漆竹長一尺六孔十二月之音象物貫地而牙故也蔡邕章句管者形長一尺圍寸有孔無底其器今亡以三者推之管象箎而六孔長尺圍寸而無底十二月之音也唐之七星管古之長笛也一定為調合鐘磬之均各有短長應律吕之度蓋其狀如箎而長其數盈尋而七竅横以吹之旁一竅幎以竹膜而為助聲唐劉係所作也用之雅樂豈非溺於七音歟班固曰黄帝作律以玉為管長尺六孔為十二月音其言十二月音則是至於論以玉為管是不考黄帝取嶰竹之過也顧况有七星管歌有龍呌四澤欲興兩鳯引九雛驚宿鳥之句雙鳳管雙鳳管蓋合兩管以定十二律之音管端施兩簧刻鳳以為首左右各四竅左具黄鍾至仲吕之聲右具蕤賔至應鍾之聲古者截候氣律管併而吹之以達六隂六陽之聲其制不過如此升之雅樂可也太平管太平管形如跋膝而九竅是黄鍾一均所異者頭如觱篥爾唐天寳中史盛所作也然九竅則陽數之窮失古人所以道中聲之意也駱駝管以曲竹為之其首如槖駝因以立名唐樂圖有之非古制也跋膝管跋膝管其形如篴而短與七星管如箎而長者異矣唐清樂部用之然亦七竅具黄鍾一均其失又與七星管同矣拱辰管六孔宋乾德中太常和峴論樂器中有裁手笛其制如雅笛而小其長九寸與黄鍾之管相埒其竅有六與雅聲相應然四竅左右兩竅在右笛工兩手交义而拱之如拱揖之狀因更名曰拱辰管而鼓吹登歌用焉與唐吕才歌白雲焉滔太一樂等列之宫縣旋宮為八十四調亦可謂進雅矣然旋宮之制不本於周官之三宮八十四調尚溺於七音之失未全乎古樂之法也既而太宗造九弦之琴列之太樂而拱辰亦自此廢豈非有意於復古歟昭華管昔漢髙祖入咸陽周行府庫珠珍異寳不貲其尤驚異者有笛長二尺三寸其名曰昭華琯焉簫管尺八管中管竪篴簫管之制六孔旁一孔加竹膜焉足黄鍾一均聲或謂之尺八管或謂之竪篴或謂之中管尺八其長數也後世宮縣用之竪篴其植如篴也中管居長篴短篴之中也今民間謂之簫管非古之簫與管也容齋洪氏隨筆曰逸史云開元末一狂僧住洛南囘向寺一老僧令於空房内取尺八來乃笛也謂曰汝主在寺以愛吹尺八謫在人間此常吹者也汝當囘可將此付汝主僧進於元宗持以吹之宛是先所御者孫夷中仙隱傳房介然善吹竹笛名曰尺八將死預將管打破告諸人曰可以同將就壙亦謂此云尺八之為樂名今不復有吕才傳云貞觀時祖孝孫增損樂律太宗詔侍臣舉善音者王珪魏徵盛稱才製尺八凡十二枚長短不同與律諧契太宗召才參論樂事尺八之所出見於此無由曉其形製也爾雅釋樂亦不載雅笛六孔笛之為樂所以滌蕩邪心歸之雅正者也後世雅笛之制非竅而為五以合五聲必竅而為六以叶六律傅緯有六孔之説豈雅笛歟古者論笛之良不過衡陽之簳也故師曠得其雄宋意得其雌焉蓋無異於伶倫斷嶰谷雌雄之竹以為律呂也由是觀之舜之簫韶九成鳳凰至於來儀庸詎知非其雌雄之竹邪長笛六孔如尺八而長短笛尺餘昔人有吹笛而歌曰閑夜寂以清長笛亮且鳴則長笛六孔具黄鍾一均如尺八而長晉桓子野之所善馬融之所頌伏滔之所賦王子猷之所聞相如之所善蔡邕之所制也魏明帝時令和永受笛聲以作律歌聲濁者用長笛長律歌聲清者用短笛短律古歌詞曰長笛續短笛晉劉和善吹裁音十二以應律劉和之東箱長笛四尺二寸今樂府所用短笛長尺有咫此笛長短之辨也雙笛五孔雙笛之制蓋起於後世馬融賦之詳矣昔京君明素識音律因四孔之笛更加一孔以備五音焉竪笛六孔竪笛之制六孔具黄鍾一均聲應十二律之調升之雅樂可也後世宮縣用之不亦可乎晉時黄鍾笛三尺八寸奚縱又減為三尺六寸五分豈原於此歟手笛六孔如雅笛而小和峴論太樂手笛之制如雅笛而小其長九寸與黄鍾律管等矣其孔有六與羌笛同矣昔宗同善吹以為新引唐雲朝霞善吹以為新聲孫處善吹而作犯調李牟善奏而風至皆一時妙手也七孔笛風俗通曰笛滌也所以滌邪穢納之雅正也長尺四寸七孔樂書曰笛之滌也可以滌蕩邪氣出揚正聲七孔下調漢部用之蓋古之造笛剪雲夢之霜筠法龍吟之異韻所以滌蕩邪氣出揚正聲者也其制可謂善矣然用七孔以通七音非先王之制也十二律笛陳氏樂書曰漢蔡邕推五聲十二律還相為宮之法制有十二律故黄鍾之笛正聲應黄鍾下徵應林鍾長二尺八寸四分四釐有竒正聲調法黄鍾為宮應鍾為變宮南呂為羽林鍾為徵蕤賔為變徵姑洗為角太蔟為商然宮生徵黄鍾生林鐘徵生商林鍾生太蔟商生羽太蔟生南呂羽生角南呂生姑洗角生變宮姑洗生應鍾變宮生變徵應鍾生蕤賔下徵調法林鍾為宮南呂為商應鍾為角黄鍾為變徵太蔟為徵姑洗為羽蕤賔為變宫清角之調姑洗為宮蕤賔為商林鍾為角南呂為變徵應鍾為徵黄鍾為羽太蔟為變宫凡笛體用角律其長者八之短者四之空中實容長者十六三宮三十一變也伏空四所以便事用也大吕之笛正聲應大呂下徵應夷則長二尺六寸六分三釐有竒太蔟之笛正聲應太蔟下徵應南呂長二尺五寸三分一釐有竒夾鍾之笛正聲應夾鍾下徵應無射長二尺四寸姑洗之笛正聲應姑洗下徵應應鍾長二尺二寸三分三釐有竒蕤賔之笛正聲應蕤賔下徵應大呂長三尺九寸九分五釐有竒林鍾之笛正聲應林鍾下徵應太蔟長三尺七寸九分七釐有竒夷則之笛正聲應夷則下徵應夾鍾長三尺六寸南吕之笛正聲應無射下徵應中呂長三尺二寸應鍾之笛正聲應應鍾下徵應蕤賔長三尺九寸九分六釐有奇其法可謂詳矣然不知去二變以全五音去六十律以全十二律其於先王之制不亦逺乎十二箱笛陳氏樂書曰十二箱笛之制其長短之度増損有所不同故晉荀勉作律笛十二以正雅樂黄鍾箱笛三尺八寸元嘉中鍾宗之減為三尺七寸奚縱又減五分為三尺三寸七分縱又減一寸一分為三尺二寸六分姑洗箱笛三尺五寸宗之減為二尺九寸七分縱又減五分為二尺九寸二分蕤賔箱笛二尺九寸宗之減為二尺六寸縱又減二分為二尺五寸八分自餘律笛無所損益一仍蔡邕之制而已至梁武帝又制十二笛寫四通聲飲古鐘玉律并周世古鍾焉故黄鍾笛三尺八寸大吕三尺六寸太蔟三尺四寸夾鍾三尺二寸姑洗三尺一寸中呂二尺九寸蕤賔二尺八寸林鍾二尺七寸夷則二尺六寸南呂二尺五寸無射二尺四寸應鍾二尺三寸然黄鍾之元九合天地之氣故其笛十有八調上生者悉倍其韻下生者傳差一調半上生悉五指應飲下生者悉三指應飲下生中呂雖云不復生至於數窮復本又得上生黄鍾天地自然之數也黄鍾十八調下生林鍾七調黄鍾笛三拍聲應林鍾笛飲聲林鍾七調上生太蔟十四調林鍾笛五指聲應太蔟笛應聲太蔟十四調下生南吕五調半太蔟笛三指聲應南呂笛飲聲南呂五調半上生姑洗十一調南呂笛五指聲應姑洗笛飲聲姑洗十一調下生應鍾四調姑洗三指聲應應鍾笛飲聲應鍾四調上生蕤賔八調應鍾笛五指聲應蕤賔笛飲聲蕤賔八調上生大吕十六調蕤賔笛五指聲應大呂笛飲聲大吕十六調下生夷則六調大吕笛三指聲應夷則笛飲聲夷則六調上生夾鍾十二調夷則笛五指聲應夾鍾笛飲聲夾鍾十二調下生無射四調半夾鍾笛三指聲應無射笛飲聲無射四調半上生中呂九調無射笛五指聲應中呂笛飲聲雖當時號為雅樂考之先王之制其不及逺矣柯亭笛昔蔡邕嘗經㑹稽柯亭見屋東十六椽竹取以為笛果有異聲晉桓伊善音樂為江左第一有蔡邕柯亭笛常自保而吹之至於為王徽之作三調弄豈得已哉文士傳柯亭為高還亭誤矣煙竹笛國史補載李舟嘗於村舍得煙竹笛以遺李牟堅並鐵石牟得之當時號為第一手月夜泛江倚舟吹之其聲寥亮逸發往往異於他笛希代之器也俄有客至請笛吹之呼吸盤辟應指粉碎舟亦失客所在疑其為蛟龍云鳯鳴笛昔黃帝使伶倫採竹於嶰谷以為律斬竹於昆溪以為笛或吹之以作鳳鳴或法之以作龍吟由是觀之古人制作未有不貴其有循而體自然也文獻通考卷一百三十八
