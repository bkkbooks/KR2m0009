body:
  text: 文獻通考卷七十七鄱陽馬端臨貴與著郊社考十雩禱水旱附春秋左氏傳龍見而雩龍見建巳之月蒼龍宿之體昏見東方萬物始盛待雨而大故祭天逺為百榖祈膏雨也月令仲夏命樂師修鞀大刀反鞞歩西反鼓均琴瑟管簫執干戚戈羽調竽笙竾箎同簧飭鐘磬柷敔為将大雩帝習樂也修均執調飭者治其器物習其事之意疏曰鞀鼗鼓持其柄揺之兩耳自擊鞞鼓人以雷鼓鼓神祀之屬小鼓在大鼓旁鞀導也所以導樂作鞞裨也裨助鼓節琴長三尺六寸六分五絃瑟長八尺一寸二十七絃管長尺圍寸併漆之有底如箎六孔并兩而吹之簫編二十二管長尺四寸今賣􅄳飴所吹者干盾也戚斧也戈鉤矛㦸羽鳥羽周禮羽舞皇舞之屬竽三十六簧笙十三簧列管瓠中施簧管端大者十九簧箎以竹為之長尺四寸圍三寸一孔上出寸三分名翹横吹之又云八孔箎啼也聲如嬰兒啼簧者竽笙之名氣鼓之而為聲簧横也於管頭横施之柷如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊其椎敔如伏虎背上有二十七齟齬刻以木長尺擽之修者謂修理舊物均者均平其聲執者操執營為調者和調音曲飭者整頓器物也命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈榖實陽氣盛而常旱山川百源能興雲雨者也衆水始所出為百源必先祭其本乃雩雩吁嗟求雨之祭也雩帝謂為壇南郊之旁雩五精之帝配以先帝也自鞀鞞至柷敔皆作曰盛樂凡他雩用歌舞而已百辟卿士古者上公若句龍后稷之𩔖也春秋傳曰龍見而雩雩之正當以四月凡周之秋五月之中而旱亦修雩禮以求雨因著正雩此月失之矣天子雩上帝諸侯以下雩上公周冬及春夏雖旱禮有禱無雩疏曰將雩祀帝先命有司祈祀山川百源百縣謂諸侯也既雩之後則命諸侯祈祀古之有功於民者以先帝配者五人帝也引春秋傳曰龍見而雩者欲明正雩在四月不在五月也云凡周之秋五月之中旱亦修雩禮以求雨者釋此經大雩在五月之中為五月不雨修雩祭作記者言五月之雩是常雩故記之於五月也郊特牲疏曰其雩祭五天帝則於國城南故鄭注論語云沂水在魯城南雩壇在其上是也通典曰建巳月雩五方上帝其壇名曰雩禜於南郊之旁命樂正習盛樂舞皇舞楊氏曰愚按啓蟄而郊龍見而雩此詩頌所謂春夏祈榖於上帝也龍見而雩與周禮所掌春秋所書不同周禮司巫帥巫而舞雩為旱而雩也春秋書雩二十有一因旱而雩也龍見而雩乃建巳之月萬物始盛待雨而長聖人為民之心切逺為百榖祈膏雨與啟蟄之郊其意同是以樂則必用盛樂與他祭獨不同聲音之號所以詔告於天地之間以逹神明也郊非不用樂也以禮為主雩非不用禮也以樂為主各随其宜也但注言雩五精之帝疏言春夏秋冬共成嵗功則不可偏祭一帝其言似矣然天一而已矣因時迭王則有五帝之名易曰帝出乎震是也祭於四郊則有五帝之位小宗伯兆五帝於四郊是也注疏謂夏雩總祭五帝是一天而有五祭祭於南郊乎抑兼祭於四郊乎其義何居自注疏之說行諸儒莫之能決有雩祀五方上帝五人帝五官於南郊者如唐貞觀禮是也有雩祀昊天上帝於圜丘者如唐顯慶禮是也及開元中起居舍人王仲邱奏祀昊天上帝於圜丘尊天位也然雩祀五帝既乆請二帝並行以成大享帝之義既祀昊天上帝又祀五帝與明堂並祀上帝五帝之禮同歸於誤此則學禮者之所深惜而不可以不辨也右孟夏大雩大司徒以荒政十有二聚萬民十有一曰索鬼神荒凶年也鄭司農云救饑之政十有二品索鬼神求廢祀而修之雲漢之詩所謂靡神不舉靡愛斯牲者也地官司巫若國大旱則帥巫而舞雩雩旱祭天子於上帝諸侯於上公之神鄭司農云魯僖公欲焚巫尫以其舞雩不得雨尫音汪國有大烖則帥巫而造巫恒元謂恒乆也巫乆者先巫之故事司疏曰後鄭之意以恒為先世之巫乆故所行之事今巫見國大烖則帥領女巫等往造所行之事案視舊所施為而法之注春官巫女巫旱暵則舞雩凡邦之大烖歌哭而請曰女舞旱祭崇隂也故檀弓曰嵗旱繆公召縣子而問焉曰吾欲暴巫而奚若曰天則不雨而望之愚婦人無乃已疏乎有歌者有哭者冀以悲哀感神靈也繆疏曰此歌者憂愁之歌若雲漢之詩是也暵呼旱反音穆縣音元暴蒲卜反舞師敎皇舞帥而舞旱暵之事旱暵之事謂雩也暵熱氣也元謂皇析五采羽為之亦如帗翟疏曰謂皇折五采羽為之亦如帗者鍾氏染鳥羽象鳥鳳皇之羽皆五采此舞者所執亦以威儀為飾言皇是鳳皇之字明其羽五采其制亦如帗舞若然帗舞羽舞皇舞形制皆同也物又見祭樂條稻人旱暵共其雩斂稻人共雩斂稻急水者也鄭司農云雩事所發斂榖疏曰餘官不言共雩斂於此官特言共者以稻是水急須水故旱時特使共雩之發斂也地官湯之時大旱七年雒坼川竭煎沙爛石於是使人持三足鼎祝山川教之祝曰政不節耶使人疾邪苞苴行邪讒夫昌邪宫室營邪女謁盛邪何不雨之極也蓋言未已而天大雨故天之應人如影之隨形響之效聲者也詩云上下奠瘞靡神不宗言疾旱也東漢鍾離意傳注云帝王紀曰成湯大旱七年齋戒剪髮㫁爪以已為犧牲禱於桑林以六事自責説苑齊大旱之時景公召羣臣問曰天不雨久矣民且有饑色吾使人卜之祟在髙山廣水寡人欲少賦斂以祠靈山可乎羣臣莫對晏子進曰不可祠此無益也夫靈山固以石為身以草木為髮天乆不雨髮將焦身將熱彼獨不欲雨乎祠之無益景公曰不然吾欲祠河伯可乎晏子曰不可祠此無益也夫河伯以水為國以魚鼈為民天乆不雨水泉將下百川竭國將亡民將滅矣彼獨不用雨乎祠之何益景公曰今為之奈何晏子曰今誠避宫殿暴露與靈山河伯共憂其幸而雨乎於是景公出野暴露三日天果大雨民盡得種樹景公曰善哉晏子之言可無用乎其惟有徳也說苑齊景公之時天大旱三年卜之曰必以人祠乃雨景公下堂頓首曰凡吾所以求雨者為吾民也今必使吾以人祠乃且雨寡人将自當之言未卒而天大雨新序雜事衞大旱卜有事於山川不吉有事祭也寗荘子曰昔周饑克殷而年豐今邢方無道諸侯無伯天其或者欲使衞討邢乎從之師興而雨僖公十九年左氏傳鄭大旱使屠擊祝款竪柎有事於桑山柎音附三子鄭大夫斬其木不雨子産曰有事於山蓻山林也蓻音藝蓻飬䕶令繁殖而斬其木其罪大矣奪之官邑昭公十六年左氏傳春秋榖梁傳定公元年九月大雩雩月雩之正也秋大雩非正也冬大雩非正也秋大雩之為非正何也冬禾稼既成猶雩則非禮可知秋禾稼始苖嫌當須雨故問也毛澤未盡人力未竭未可以雩也邵曰凡地之所生謂之毛公羊傳曰錫之不毛之地是也言秋百榖之潤澤未盡也人力未盡謂耕耘之功未畢耘音云雩月雩之正也月之為雩之正何也其時窮人力盡然後雩雩之正也何謂其時窮人力盡是月不雨則無及矣是年不艾則無食矣是謂其時窮人力盡也雩之必待其時窮人力盡何也雩者為旱求者也求者請也古之人重請何重乎請人之所以為人者讓也請道去讓也則是舍其所以為人也是以重之焉請哉請乎應上公古之神人有應上公者通乎隂陽君親帥諸大夫道之而以請焉道之謂君必為先也其禱詞曰方今大旱野無生稼寡人當死百姓何辜不敢煩民請命願撫萬民以身塞無状禱亦請也此即請辭也請艾魚廢反為旱於偽反去讓羗吕反焉於䖍反夫請者非可詒託而往也必親之者也是以重之詒託猶假寄詒以之反月令大雩帝疏曰按春秋桓五年秋大雩傳云書不時僖十一年秋八月大雩十三年秋九月大雩成公三年秋大雩七年冬大雩襄五年秋大雩傳曰旱八年九月大雩傳曰旱十六年秋大雩十七年秋九月大雩二十八年秋八月大雩傳曰旱昭三年秋八月大雩傳曰旱六年九月大雩傳曰旱八年秋大雩十六年秋九月大雩傳曰旱二十四年秋八月大雩傳曰旱二十五年秋七月上辛大雩季辛又雩傳曰秋書再雩旱甚定元年秋九月大雩七年大雩九月大雩十二年秋大雩僖二十一年夏大旱宣七年秋大旱荘三十一年冬不雨僖二年冬十月不雨三年正月不雨夏四月不雨六月雨傳曰自十月不雨至於五月不曰旱不為災文二年自十有二月不雨至於秋七月十年云自正月不雨至於秋七月十三年云自正月不雨至於秋七月是春秋之中不雨有七大旱有二大雩有二十一都并有三十荘三十一年冬不雨以冬時旱氣已過故不數僖二十一年夏大旱宣七年秋大旱二旱災成故不數昭二十五年一月再雩祇是一旱之事為再雩一雩不數定七年秋大雩九月大雩亦一時之事而為二雩一雩不數成七年冬大雩榖梁云冬無為雩明亦不數三十之中去此六事不數唯有二十四在就二十四之中分為四部桓五年秋大雩說雩禮是一部也僖二年冬十月不雨僖三年正月不雨夏四月不雨說禱禮是二部也文二年文十年文十三年皆云自某月不雨至於秋七月說旱不為災是三部也此三部總有七條於二十四去七條餘有十七條說旱氣所由故鄭釋廢疾云春秋凡書二十四旱考異郵說云分為四部各有義焉是其事也陳氏禮書曰春秋書雩二十有一皆在七月以後左氏曰龍見而雩過則書蓋龍見建巳之月而建巳乃陽充之時隂氣所以難逹也故雩祀作焉過此而後雩此春秋所以譏也大雩禮之盛也猶所謂大旅大饗趙氏謂雩稱大國偏雩誤矣詩序曰夏祈榖於上帝月令曰大雩帝則雩祀昊天上帝及五帝也鄭氏謂雩祀五精之帝然周禮稱上帝與五帝不同則上帝非止五帝也月令曰令百縣雩祀百辟卿士則百辟卿士之祭亦曰雩也鄭氏曰天子雩上帝諸侯雩上公然周禮小祝小祭祀逆時雨寜風旱則百辟亦天子所祀也祭法有雩禜之壇春秋之時魯以南門為雩門先儒皆以魯之舞雩在城南鄭氏曰雩為壇於南郊之旁其說蓋有所受也古者雩斂在稲人雩樂以皇舞以女巫皇與女隂也則舞所以達陽中之隂而已董仲舒祈雨之術閉南門縱北門蓋亦古者達隂之意也然則雩祀上帝必升煙後世乃謂用火不可以祈水而為坎以瘞就陽不可以求隂而移壇於東梁禮雩必自郊徂宫後世或祈山林川澤羣廟百辟卿士然後及於上帝亦梁禮也北齊及唐皆然雩樂以舞為盛後世或選善謳者歌詩而已皆非古也北齊禮右因旱而雩莊公二十五年秋大水鼓用牲于社于門左氏曰亦非常也凡天災有幣無牲天災日月食大水也祈請而已不用牲也疏曰天之見異所以譴告人君欲令改過修善非為求人飲食既遇天災随時即告唯當告請而已是故有幣無牲若乃亢旱厯時霖雨不止然後禱祀羣神求弭災沴者設禮以祭祭必有牲詩雲漢之篇美宣王為旱禱請自郊徂宫無所不祭云靡神不舉靡愛斯牲是其為旱禱祭皆用牲非日月之眚不鼓眚猶災也月侵日為眚隂陽逆順之事賢聖所重故特鼓之疏曰傳稱日月之眚日月並言則月食亦有鼓榖梁子曰髙下有水災曰大水救日以鼓兵救水以鼓衆救日以鼓兵者謂伐鼓以責隂陳兵示禦侮救水以鼓衆者謂擊鼓聚衆也皆所以發陽也鄭大水龍鬬於時門之外洧淵時門鄭城門也國人請為禜焉子産弗許曰我鬭龍不我覿也龍鬬我獨何覿焉禳之則彼其室也淵龍之室吾無求於龍龍亦無求於我乃止也昭公十九年左氏傳漢承秦滅學正雩禮廢旱太常祝天地宗廟董仲舒春秋春旱求雨令縣邑以水日令民禱社稷家人祠户毋伐名木毋斬山林暴巫聚蛇八日於邑東門之外為四通之壇方八尺植蒼繒八其神共工祭之以生魚八元酒具清酒搏脯擇巫之潔清辨口利辭者以為祝祝齋三日服蒼衣先再拜乃跪陳陳已復再拜乃起祝曰昊天生五榖以飬人今五榖病旱恐不成敬進清酒搏脯再拜請雨雨幸大㴻奉牲禱以甲乙日為大青龍一長八丈居中央為小龍七各長四丈於東方皆東鄉其間相去八尺小僮八人皆齋三日服青衣舞之田嗇夫亦齋三日服青衣而立之諸里社通之於閭外之溝取五蝦蟇錯置社之中池方八尺深一尺置水蝦蟇焉具清酒搏脯祝齋三日服蒼衣拜跪陳祝如初取三嵗雄鷄與三嵗豭豬皆燔之於四通神宇令民闔邑里南門置水開里北門具老豭豬一置之里北門之外市中亦置一豭豬聞彼鼓聲皆燒豬尾取死灰骨埋之開山泉積薪而焚之決通橋道之壅塞不行者決瀆之幸而得雨報以豚一酒鹽黍財足以茅為席母㫁夏求雨令縣邑以水日家人祀竈毋舉土功更大浚井暴釡於壇杵臼以術七日為四通之壇於邑南門之外方七尺植赤繒七其神蚩尤祭之赤雄鷄七元酒具清酒搏脯祝齋三日服赤衣拜跪陳祝如春以丙丁日為赤大龍一長七丈居中又為小龍六長三丈五尺於南方皆南鄉其間相去七尺壮者七人皆齋三日服赤衣而舞之司空嗇夫亦齋三日服赤衣而立之鑿社而通之閭外之溝取五蝦蟇錯置社之中池方七尺深一尺酒脯祭齋衣赤拜跪陳祝如初取三嵗雄鷄豭豬燔之四通神宇開隂閉陽如春也季夏禱山陵以助之令縣邑一徙市於邑南門之外五日禁男子無得入市家人祠中霤毋過土功聚巫市旁為之結蓋為四通之壇於中央植黄繒五其神后稷祭之以母􅓞五母音模禮謂之淳母􅓞音移周禮曰􅓞食元酒具清酒搏脯令各為祝齋三日衣黄衣餘皆如春祠以戊巳日為大黄龍一長五丈居中央又為小龍四各長二丈五尺於中央皆南鄉其間相去五尺丈夫五人皆齋三日服黄衣而舞之老者亦齋三日衣黄衣而立之亦通社中於閭外溝蝦蟇池方五尺深一尺他皆如前秋暴巫尫至九日毋舉火事煎金器家人祠門為四通之壇於邑西門之外方九尺植白繒九其神太皥祭之桐木魚九元酒具清酒搏脯衣白衣他如春以庚辛日為大白龍一長九丈居中央為小龍八各長四丈五尺於西方皆西鄉其間相去九尺鰥者九人皆齋三日服白衣而舞之司馬亦齋三日衣白衣而立之蝦蟇池方九尺深一尺他如前冬舞龍六日禱於名山以助之家人祠井毋壅水為四通之壇於邑北門之外方六尺植黒繒六其神元㝠祭之以黒狗子六元酒具清酒搏脯祝齋三日衣元衣祝禮如春以壬癸日為大黒龍一長六丈居中央又為小龍五各長三丈於北方皆北鄉其間相去六尺老者六人皆齋三日衣黒衣而舞之尉亦齋三日服黒衣而立之蝦蟇池皆如春四時皆庚子日令吏民夫婦皆偶處凡求雨大體丈夫欲藏而居女子欲和而樂應龍有翼法言曰象龍之致雨艱矣哉龍乎龍乎新論曰劉歆致雨具作土龍吹律及諸方術無不備設譚問求雨所以為土龍何也曰龍見者輙有風雨興起以迎送之故緣其象𩔖而為之武帝元封六年旱女子及巫丈夫不入市董仲舒奏江都王云求雨之方損陽益隂願大王無收廣陵女子為人祝者一月租賜諸巫者諸巫毋大小皆相聚於郭門為小壇以脯酒祭女獨擇寛大便處移市市使無内丈夫丈夫無得相從飲食令吏妻各往視其夫皆到即起兩注而已成帝五年六月始命諸官止雨朱繩反縈社擊鼓攻之是後水旱常不和干寳曰朱絲縈社社太隂也朱火色也絲屬離天子伐鼓於社責羣隂也諸侯用幣於社請上公也伐鼓於朝退自責也此聖人厭勝之術也漢舊儀孟夏龍見而始雩壇在城東南引龜山為沂水至壇西南行曰雲水曲中壇上舞雩舊制求雨太常禱天地宗廟社稷山川已塞各如具常祭牢禮四月立夏後旱乃求雨禱求雨到七月畢塞之秋冬春三時不求雨按漢世未嘗舉雩祀通典謂漢承秦滅學正雩禮廢而漢舊儀以為有雩壇且指龜山沂水以言其所即論語言曾㸃樊遲所逰之地蓋魯國祀天之所去漢都甚逺非國城南郊之外也然漢人舉祀事大槩多即前代舊祀之地如雍五畤祀上帝則因秦所建其他如作明堂奉髙旁祀后土汾隂之𩔖皆以為古者嘗於其地祠祭然則豈魯沂水之雩壇舊趾尚存漢曽就其地立壇舉雩祀邪後漢制自立春至立夏盡立秋郡國上雨澤若少府郡縣各掃除社稷其旱也公卿官長以次行雩禮何休注公羊傳曰君親之南郊以六事謝過自責使童男女各八人舞而呼雩故謂雩也春秋繁露曰大旱雩祭而請雨大水鳴鼓而攻社天地之所為隂陽之所起或請焉或攻焉何如也曰大旱陽滅隂也陽滅隂者尊厭卑也固其義也雖太甚拜請之而已敢有加也大水者隂滅陽也隂滅陽者卑勝尊也以賤陵貴者逆節故鳴鼓而攻之朱絲而脅之為其不義此亦春秋之不畏強禦也變天地之位正隂陽之序貞行其道而不忌其難義之至也閉諸陽衣皁興土龍山海經云大荒東北隅中有山名凶犂土邱應龍處南極殺蚩尤與夸父不得復上故下數旱旱而為應龍之状乃得大雨郭璞曰今之土龍本此氣應則自然㝠感非人所能立土人舞僮二佾七日一變如故事反拘朱索社伐朱鼓禱賽以少牢如禮晉武帝咸寧二年春旱因後漢舊典諸旱處廣加祈請五月祈雨於社稷山川穆帝永和時議制雩壇於國南郊之旁依郊壇近逺阮諶云壇在已地按得衛宏漢儀稱魯人為雩壇在城東南諸儒所說皆云壇而今作墠論語樊遲從逰於舞雩之下魯城東南有舊跡存祈上帝百辟旱則祈雨大雩社稷山林川澤舞僮八佾六十四人皆元服持羽翳而歌雲漢之詩戴邈議云周冬及春夏旱禮有禱無雩夫旱日淺則災微日乆則災甚微則祈小神社稷之屬甚乃大雩帝耳按春秋左傳之義春夏無雨未成災雩而得雨則書雩不得雨則書旱明災成也然則始雩未得便告饑饉之甚為歌哭之請博士議雲漢之詩宣王承厲王撥亂遇災而懼故作是歌今晉中興奕葉重光豈比周人耗斁之辭乎漢魏之代别造新詩晉室太平不必因故司徒蔡謨議曰聖人迭興禮樂之制或因或革雲漢之詩興於宣王今歌之者取其修徳禳災以和隂陽之義故因而用之齊明帝建武二年旱雩以武帝配饗於雩壇祠部郎中何佟之議曰皇齊以武帝配五精於明堂今亦宜配饗於雩壇矣今武帝遏宻未終自可不奏樂至於旱祭舞雩蓋是嗟吁之義既非懽樂此不渉嫌祝史稱祠仰祈靈澤舞雩無闕梁武帝天監元年有事雩壇壇於南郊之左髙及廣輪四丈周十二丈四陛帝以為雨既𩔖隂而求之正陽其謬已甚東方既非盛陽而為生養之始則雩壇應在東方祈晴亦宜此地遂移於東郊十年帝又以雩祭燎柴以火祈水於理為乖於是停用柴燎從坎瘞典時儀曹郎朱异議曰按周宣雲漢之詩毛注有瘞埋之文不見燎柴之說若以五帝必柴則明堂又無其事大同五年又築雩壇於籍田兆内四月後旱則祈雨行七事一理寃獄及失職者二賑鰥寡孤獨三省徭輕賦四舉進賢良五黜退貪邪六命㑹男女䘏怨曠七徹膳羞施樂縣而不作天子降法服七日乃祈社稷七日乃祈山林川澤常興雲雨者七日乃祈羣廟之主於太廟七日乃祈古来百辟卿士有益於人者七日乃大雩上帝徧祈前祈所有事者大雩禮於壇用黄牯牛一祈五天帝及五人帝各依其方以太祖配位於青帝之南五官配食於下七日乃去樂又徧祈社稷山林川澤就故地處大雩國南除地為墠舞僮六十四人皆衣元衣為八列各執羽翳毎列歌雲漢詩一章而舞旱而祈㴻則報以太牢皆有司行事唯雩則不報也若郡縣邑旱請雨則五事同時並行五事謂黜退貪邪以上如前守令皆齋潔三日乃祈社稷七日不雨更齋祈如初三變仍不雨復齋祈其界山林川澤常興雲雨者祈而㴻亦各有報陳因梁故事武帝時以徳皇帝配廢帝以文帝配牲用黄牛而以清酒四升洗其首其壇墠配享歌舞皆如梁禮天子不親奉則太宰太常光祿行三獻禮其法皆採齊建武二年舊典後魏文成帝和平元年四月旱詔州郡於其界内神無大小悉灑掃薦以酒脯年登之後各随本秩祭以牲牢北齊以孟夏龍見而雩祭太微宫五精帝於南郊之東為圓壇廣四十五尺髙九尺四面各一陛為三壝外營相去深淺并燎壇一如南郊若建午申未之月不雨則使三公祈五帝於雩壇禮用玉帛有燎不設樂選伎工端潔善謳詠者使歌雲漢之詩於壇南其儀如郊禮隋制雩壇國南十三里啟夏門外道左髙一丈周二十丈孟夏龍見則雩五方上帝配以五人帝於上太祖配饗五官從祀於下牲用犢十各依方色若京師孟夏後旱則祈雨行七事如梁之七事七日祈嶽鎮海瀆及諸山川能興雲雨者又七日祈社稷及古來百辟卿士有益於人者又七日乃祈宗廟及古帝王有神祠者又七日乃修雩祈神州又七日仍不雨復從嶽瀆以下祈禮如初秋分以後不雩但禱而已皆用酒脯初請後二旬不雨者即徙市禁屠皇帝御素服避正殿減膳徹樂或露坐聼政百官斷傘扇令家人造土龍雨㴻則命有司報州縣祈雨理寃獄存鰥寡孤獨掩骼埋胔潔齋祈於社稷七日乃祈界内山川能興雲雨者徙市㫁屠雨㴻有報唐武徳初定令每嵗孟夏雩祀昊天上帝於圜丘景皇帝配牲用蒼犢二五方上帝五人帝五官並從祀用方色犢十太宗貞觀時雩祀於南郊髙宗顯慶時行雩禮於圜丘元宗開元十一年孟夏後旱則祈雨審理寃獄賑恤窮乏掩骼埋胔先祈嶽鎮海瀆及諸山川能興雲致雨者皆於北郊遥祭而告之又祈社稷宗廟每以七日皆一祈不雨還從嶽瀆如初旱甚則大雩秋分後不雩初祈後一旬不雨即徙市禁屠殺㫁扇造大土龍雨足則報祀祈用酒脯醢報凖常祀皆有司行事已齋未祈及所經祈者皆報祀起居舍人王仲邱議按貞觀禮孟夏雩祀五方上帝五人帝五官於南郊顯慶禮則雩祀昊天上帝於圜丘按鄭元注月令云雩於上帝者天之别號元屬昊天祀於圜丘尊天位也然雩祀五帝既乆亦請二禮並行以成大雩帝之義唐開元禮孟夏雩祀昊天上帝於圜丘以太宗文武聖皇帝配籩豆等如冬至儀都十七座又祀五帝於壇第一等五人帝於壇第二等籩豆各四簠簋俎各一也又祀五官於内壝之外每座籩豆各二餘各一其儀並如冬至圜丘時旱祈太廟將祈有司卜日如别儀前二日守宫設祈官以下次各於常所右校掃除内外又為瘞塪於北門之内道西方深取足容物前一日諸祈官清齋於廟所諸衛令其屬晡後一刻各以其方器服守衞廟門奉禮設版位於内外並如常儀設望瘞位於堂之東北當瘞塪西南又設奉禮位於瘞塪東北南向贊者二人在西少退太廟令拂拭神幄又帥其屬以罇坫罍洗篚羃制幣篚入設皆如常儀執罇罍篚羃者各位於罇罍篚羃之後太官令先饌酒脯醢告日未明三刻諸告官以下各服其服太廟令良醖令之屬入實罇罍及幣每室春夏用兩犧罇秋冬用兩著罇一實眀水為上一實醴齊次之山罍二一實元酒為上一實清酒次之幣以白各長一丈八尺未明二刻奉禮帥贊者先入就位贊引引御史博士太廟令宫闈令太祝以下入當階間北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖升行掃除於上太廟令以下升自東階入開塪室奉出獻祖以下九室神主各置於座如常儀訖各引就位質明謁者引祈官以下俱就門外位謁者引祈官贊引引執事者次入就位立定奉禮曰再拜祈官以下皆再拜謁者進祈官之左白有司謹具請行事退復位太官令出帥進饌陳於東門之外初太官令出諸太祝俱取幣於篚各立於罇所謁者引祈官升自東階詣獻祖廟室户前