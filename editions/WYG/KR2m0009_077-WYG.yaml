君叚干木扁鵲張儀吳起單雄信廟雍熈後多遣宰相近臣至道後又於寺觀建道塲復遣常參官或内侍詣嶽瀆致祠咸平後祈禱又增玉清昭應景靈宫㑹靈祥源觀泰一宫或親幸致禱真宗咸平元年以旱遣使禱衞州百門廟白鹿山百門廟以祈禱有應賜名靈源廟内出李邕祈雨法以甲乙日擇東方地作壇取土造青龍長吏齋三日詣龍所汲流水設香案茗果餈餌率羣官鄉老日再至祝酹不得用音樂巫覡以致媟瀆雨足送龍水中餘四方皆如之飾以方色大凡日干及建壇取土之里數器之大小龍之脩廣皆取五行生成數焉詔頒諸路及令祀雨師雷神又以畫龍祈雨法付有司鏤板頒下其法擇潭洞或湫濼林木深邃之所以庚辛壬癸日刺史縣令帥耆老齋潔先以酒脯告社令訖築方壇三級髙一尺濶丈三尺壇外二十歩界以白繩壇上植竹枝張畫龍其圖以縑素上畫黒魚左顧環以天黿十星中為白龍吐雲黒色下畫水波有龜亦左顧吐黒氣如綫和金銀朱丹飾龍形又設皂幡刎鵝頸取血置槃中楊枝洒水龍上俟雨足三日賽以豭取畫龍投水中神宗元豐四年詳定郊廟奉祀禮文所言近詔宗祀明堂配以上帝其餘從祀羣神悉罷今祈榖大雩猶循舊制皆羣神從祀恐與詔㫖相戾請孟春祈榖孟夏大雩惟祀上帝以太宗皇帝配餘從祀羣神悉罷又請改築雩壇於國南以嚴祀事並從之禮部言雩壇當立於圜丘之左已地其髙一丈廣輪四丈周十二丈四出陛為三壝各二十五歩周垣四門一如郊壇之制從之熈寧元年帝幸寺觀祈雨詔在京舉望祭禮諸路分禱嶽鎮海瀆名山大川又幸相國寺天清寺集禧醴泉觀祈雨雨足幸西太一宫報謝元豐四年詳定禮文所言案禮記祭法曰埋少牢於泰昭祭時也雲漢之詩曰靡愛斯牲周禮太祝注曰禬禜皆有牲是祈禱有牲也請祈禱郊廟社稷皆用少牢從之髙宗紹興後孟夏雩祀上帝在城西惠照院望祭齋宫行禮其後又於圜壇行禮紹興八年以時雨愆候令臨安府差官迎請天竺觀音赴法慧寺建置道塲如法祈求候到宰執率侍從前詣燒香其後每祈水旱則迎天竺觀音入城或就明慶寺建道塲或差官就天竺寺祈禱孝宗淳熈十四年七月太常寺言亢陽為沴檢㸃國朝典禮凡京都旱則祈嶽鎮海瀆及諸山川能興雲雨者於北郊望告又祈宗廟社稷及雩祀上帝皇地祗詔命宰臣以下分詣祭告八月三日獲感應復命報謝宰執進呈太常寺乞謝雨王淮等奏初疑後時而禮官謂有祈必有報上曰既是天地宗廟社稷宫觀亦不容已淮等奏報謝只是酒脯上曰如何無牲牢淮等奏國朝典禮祈用酒脯謝如常祀且紹興以来並只是酒脯惟雩祀用牲然雩無報謝之禮上問前日雩祭禮儀及歌雲漢之詩樂工能之否淮等奏三獻並用宰執一篇之詩工人兩日習歌亦如法文獻通考卷七十七
