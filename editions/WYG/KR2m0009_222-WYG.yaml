body:
  text: 文獻通考卷二百二十二鄱陽馬端臨貴與著經籍考四十九子醫家漢藝文志醫經者原人血脉經絡骨髓隂陽表裏以起百病之本死生之分而用度鍼石湯火所施師古曰鍼所以刺病也石謂砭石卽石鍼也古者攻病則有砭令其術絶矣調百藥齊和之所宜至齊之得齊音劑猶磁石取鐡以物相使拙者失理以瘉爲劇以生爲死漢藝文志經方者本草石之寒溫量疾病之淺深假藥味之滋因氣感之宜辯五苦六辛致水火之齊以通閉解結反之於手及失其宜者以熱益熱以寒增寒精氣内傷不見於外是所獨失也故諺曰有病不治常得中醫漢志醫經七家二百一十六卷漢志經方十一家二百七十四卷隋志醫方二百五十六部四千五百一十三卷唐志明堂經脉類一十六家三十五部二百三十一卷失姓名十六家甄權以下不著錄二家十卷唐志醫術六十四家一百二十部四千四十六卷失姓名三十八家王方慶以下不著錄五十五家四百八卷宋三朝志經脉四十六部一百四十卷醫術一百九十一部二千九十九卷宋兩朝志經脉二十九部四十五卷醫術八十四部二百二十六卷宋四朝志三十六部二百九卷宋中興志一百七十九家二百九部一千二百五十九卷黄帝素問二十四卷鼂氏曰昔人謂素問者以素書黄帝之問猶言素書也唐王砯注砯謂漢藝文志有黄帝内經十八卷素問即其經之九卷兼靈樞九卷廼其數焉先是第七亡逸砯時始獲乃詮次注釋凡八十一篇分二十四卷今又亡刺法本論二篇砯自號啟元子醫經之傳於世者多矣原百病之起瘉者本乎黄帝辯百藥之味性者本乎神農湯液則稱伊尹三人皆古聖人也憫世疾苦親著書以垂後而世之君子不察乃以為賤技恥習之由此故今稱醫者多庸人治之失理以生為死者甚衆激者至云有病不治常得中醫豈其然乎故予錄醫頗詳隋志以此書為首今從之陳氏曰黄帝與岐伯問答三墳之書無傳尚矣此固出於後世依託要是醫書之祖也唐太僕令王砯注自號啟元子按漢書但有黄帝内外經至隋志乃有素問之名又有全元起素問注八卷嘉祐中光祿卿林億國子博士髙保衡承詔校定補注亦頗采元起之説附見其中其為篇八十有一王砯者寶應中人也靈樞經九卷鼂氏曰王砯謂此書卽漢志黄帝内經十八卷之九也或謂好事者於皇甫謐所集内經倉公論中抄出之名為古書也未知孰是呂楊注八十一難經五卷鼂氏曰秦越人撰吳呂廣注唐楊元操演越人渤海人家於盧授桑君秘術明洞醫道世以其與黄帝時扁鵲相類乃號之為扁鵲采黄帝内經精要之説凡八十一章以其爲趣深逺未易了故名難經元操編次為十三類陳氏曰漢志亦但有扁鵲内外經而已隋志始有難經唐志遂屬之越人皆不可考難當作去聲讀丁德用注難經五卷鼂氏曰徳用以楊元操所演甚失大義因改正之經文隱奥者繪為圖德用濟陽人嘉祐末其書始成陳氏曰序言太醫令呂廣重編此經而楊元操復為之註覽者難明故爲補之且間為之圖首篇為診候最詳凡二十四難蓋脉學自扁鵲始也虞庶注難經五卷鼂氏曰皇朝虞庶注庶仁夀人寓居漢嘉少為儒已而棄其業習醫為此書以補呂楊所未盡黎泰辰治平間為之序金匱玉函經八卷鼂氏曰漢張仲景撰晉王叔和集設答問雜病形證脉理參以療治之方仁宗朝王洙得於館中用之甚効合二百六十二方陳氏曰林億等校正此書王洙於館閣蠧簡中得之曰金匱玉函要畧方上卷論傷寒中論雜病下載其方并療婦人乃録而傳之今書以逐方次於證候之下以便檢用其所論傷寒文多節略故但取雜病以下止服食禁忌二十五篇二百六十二方而仍其舊名仲景傷寒論十卷鼂氏曰漢張仲景述晉王叔和撰次按名醫錄云仲景南陽人名機仲景其字也舉孝亷官至長沙太守以宗族二百餘口建安紀年以來未及十稔死者三之二而傷寒居其七乃著論二十二篇證外合三百九十七法一百一十二方善醫者或云仲景著傷寒論誠不刋之典然有大人之病而無嬰孺之患有北方之藥而無南方之治此其所闕者蓋陳蔡以南不可用柴胡白虎二湯治傷寒其言極有理陳氏曰其文辭簡古奥雅又名傷寒卒病論凡一百一十二方古今治傷寒者未有能出其外者也脉經三卷鼂氏曰題云黄帝撰論診脉之要凡二十一篇王叔和脉經十卷鼂氏曰晉王叔和撰按唐甘伯宗名醫傳曰叔和西晉髙平人性度沉靖博通經方精意診處尤好著述其書纂岐伯華佗等論脉要訣所成叙隂陽表裏辯三部九候分人迎氣口神門條十二經二十四氣奇經八脉五臟六腑三焦四時之疴纎悉備具咸可按用凡九十七篇皇朝林億等校正脉訣一卷鼂氏曰題曰王叔和皆歌訣鄙淺之言後人依託者然最行於世脉訣機要三卷脉要新括一卷陳氏曰通真子撰不著名氏熙寜以後人也以叔和脉訣有臲卼鄙俗處疑非叔和作以其不類故也乃作歌百篇按經爲注又自言常為傷寒括要六十篇其書未之見巢氏病源候論五卷鼂氏曰隋巢元方等撰元方大業中被命與諸醫共論衆病所起之源皇朝舊制監局用此書課試醫生昭陵時詔校本刻牘頒行宋綬為序陳氏曰元方隋太醫博士其書惟論病證不載方藥今按千金方諸論多本此書業醫者可以參考雷公炮炙三卷鼂氏曰宋雷斆撰胡洽重定述百藥性味炮熬煑炙之方其論多本之於乾寧晏先生斆稱内究守國安正公當是官名未詳天元玉策三十卷鼂氏曰啟元子撰即唐王砯也書推五運六氣之變唐人物志云砯仕至太僕令年八十餘以夀終金寶鑑三卷鼂氏曰衛嵩撰嵩仕至翰林博士崇文總目云不詳何代人述脉候徵驗要妙之理寶藏暢微論三卷鼂氏曰五代軒轅述撰青霞君作寶藏論三篇著變煉金石之訣旣詳其未善因刋其謬誤增其闕漏以成是書故曰暢微時年九十實乾亨二年也聖濟經十卷鼂氏曰徽宗皇帝御製因黄帝内經採天人之賾原性命之理明營衛之清濁究七八之盛衰辯逆順之盈虗爲書十篇凡四十二章陳氏曰辟廱學生昭武吳褆注通眞子傷寒訣一卷鼂氏曰題曰通眞子而不著名氏用張長沙傷寒論爲歌詩以便覽者脉訣之類也醫門玉髓一卷陳氏曰不知作者皆爲歌訣論五臟六腑相傳之理傷寒百問三卷鼂氏曰題曰無求子大觀初所著書醫經正本書一卷陳氏曰知進賢縣沙隨程逈可乆撰專論傷寒無傳染以救薄俗骨肉相棄絶之敝運氣論奥三卷鼂氏曰宋朝劉温舒撰溫舒以素問氣運最為治病之要而答問紛揉文辭古奥讀者難知因爲三十論二十七圖上於朝五運指掌賦圖一卷陳氏曰葉玠撰脉粹一卷鼂氏曰宋朝蕭世基撰世基常閲素問及歴代醫經患其難知因綴緝成一編治平中姚誼序之南陽活人書二十卷鼂氏曰宋朝朱肱撰序謂張長沙傷寒論其言雅奥非精於經絡者不能曉㑹頃因投閑設其對問補苴綴緝僅成卷軸作於己巳成於戊子計九萬一千三百六十八字陳氏曰肱以仲景傷寒方論多以類聚爲之問答本號無求子傷寒百問方有武夷張藏作序易此名仲景南陽人而活人者本華佗語肱吳興人祕丞臨之子中書舍人服之弟登第仕至朝奉郎直祕閣傷寒微㫖論二卷陳氏曰不著作者序言元祐丙寅必當時名醫也其書頗有發明傷寒證治三卷鼂氏曰宋朝王寔編寔謂百病之急無踰傷寒故畧舉病名法及世名醫之言爲十三篇總方百四十六首或云潁州人官至外郎龎安常之高弟也傷寒捄俗方一卷陳氏曰寜海羅適正之尉桐城民俗惑巫不信藥因以藥施人多愈遂以方書召醫參校刻石以捄迷俗紹興中有王世臣彦輔者序之以傳補注神農本草二十卷鼂氏曰宋朝掌禹錫等補注舊說本草經神農所作而藝文志所不載平帝紀詔天下舉知方術本草者本草之名蓋起於此梁之錄載神農本草三卷書中有後漢郡縣名蓋上世未著文字師學相傳至張機華佗始為編述嘉祐初詔禹錫與林億蘇頌張洞等爲之補注以開寶本草及諸家參校采拾遺逸刋定新舊藥各一千八十二種總二十卷大觀本草三十一卷陳氏曰唐愼微撰不知何人仁和縣尉艾晟作序名曰經史證類本草按本草之名始見漢書平帝紀樓䕶傳舊經止一卷藥三百六十五種陶隱居增名醫别錄亦三百六十五種因注釋爲七卷唐顯慶又增一百十四種廣為二十卷謂之唐本草開寶中又益一百三十三種蜀孟昶又嘗增益謂之蜀本草及嘉祐中掌禹錫林億等重加校正更爲補注以朱墨書爲之别凡新舊藥一千八十二種蓋亦備矣今愼微頗復有所增益而以墨蓋其名物之上然亦殊不多也石林葉氏曰神農本草初但三卷所載甚畧議者考其記出産郡名以爲東漢人所作梁陶隱居始增修爲七卷然陶氏不至東北其論證多謬語唐顯慶中蘇恭請重修於是命長孫無忌等廣定遂爲二十卷亦未盡也自是僞蜀韓保昇與術家各自補緝辯證者不一開寶中别加詳定嘉祐初復詔掌祕監禹錫蘇魏公諸人再論次遂大備蓋神農本草外雜取他書凡十六家云圖經本草二十卷目錄一卷鼂氏曰宋朝蘇頌等撰先是詔掌禹錫林億等六人重校神農本草累年成書奏御又詔郡縣圖上所産藥本用永徽故事重命編述於是頌再與禹錫等裒集衆説類聚銓次各有條目云嘉祐六年上證類本草三十二卷鼂氏曰皇朝唐愼微纂合兩本草爲一書且集書傳所記單方附之於本條之下殊為詳博本草廣義二十卷鼂氏曰皇朝寇宗奭編以本草二部著撰之人或執用己私失於商確併考諸家之說參之事實覈其情理證其脫誤以成此書陳氏曰其書引援辯證頗可觀采紹興校定本草二十二卷陳氏曰醫官王繼先等奉詔撰紹興二十九年上之刻板修内司每藥爲數語辯説淺俚無高論子午經一卷鼂氏曰題云扁鵲撰論鍼砭之要成歌詠蓋後人依託者銅人鍼灸圖三卷鼂氏曰皇朝王惟德撰仁宗嘗詔惟德考次鍼灸之法鑄銅人爲式分臟腑十二經旁注俞冗所會刻題其名并為圖法并主療之術刻板傳於世夏竦爲序明堂者謂雷公問道黄帝授之故名云明堂鍼灸圖三卷鼂氏曰題曰黄帝論人身俞宂及灼灸禁忌存眞圖一卷鼂氏曰皇朝楊介編崇寜間泗州刑賊於市郡守李夷行遣醫併畵工徃親決膜摘膏肓曲折圖之盡得纎悉介校以古書無少異者比歐希範五臟圖過之逺矣實有益醫家也王莽時捕得翟義黨王孫慶使太醫尚方與巧屠共刳剝之量度五臟以竹筳導其脉知所始終云可以治病亦是此意膏肓灸法二卷陳氏曰清源莊綽季裕集㸃烙三十六黄經一卷鼂氏曰不著撰人唐世書也國史補云自茗飲行於世世人不復病黄癉肘後百一方三卷陳氏曰晉葛洪撰梁陶隱居增補本名肘後救卒方率多易得之藥凡八十六首陶併七首加二十二首共爲一百一首取佛書人有四大一大輙有一病之義名之千金方三十卷鼂氏曰唐孫思邈撰思邈博通經傳洞明醫術著用藥之方診脉之訣鍼灸之穴禁架之法以至導引養生之要無不周悉後世或能窺其一二未有不爲名醫者然議者頗恨其獨不知傷寒之數云陳氏曰自爲之序名曰千金備急要方以為人命至重有貴千金一方濟之德踰於此其前類例數十條林億等新纂千金翼方三十卷鼂氏曰思邈著千金方復掇集遺軼以羽翼其書成一家之言林億等謂首之以藥錄次之以婦人傷寒小兒養性辟穀退居補益雜病瘡癰色脉鍼灸而禁經終焉者皆有指意云陳氏曰其末兼及禁術用之多驗外臺祕要方四十卷鼂氏曰唐王燾撰燾在臺閣二十年乆知宏文館得古方書數千百卷因述諸病證候附以方藥符禁灼灸之法凡一千一百四門天寶中出守房陵及太寜郡故以外臺名其書孫兆以燾謂鍼能殺生人不能起死人取灸而不取鍼譏其爲醫之敝予獨以其言爲然陳氏曰自為序天寶十一載也其書博采諸家方論如肘後千金世尚多有之至小品深師崔氏許仁則張文仲之類今無傳者猶間見於此書云凡醫書之行於世皆仁廟朝所校定也按會要嘉祐二年置校正醫書局於編修院以直集賢院掌禹錫林億校理張洞校勘蘇頌等並爲校正後又命孫竒高保衡孫兆同校正毎一書畢卽奏上億等皆爲序下國子監板行并補注本草修圖經千金方翼金匱要略傷寒悉從摹印天下皆知學古方書矣產寶二卷鼂氏曰唐昝殷撰殷蜀人大中初白敏中守成都其家有因免乳死者訪問名醫或以殷對敏中迎之殷集備驗方藥二百七十八首以獻其後周頲又作三論附於前龍樹眼論三卷鼂氏曰佛經龍樹大士者能治眼疾假其説集治七十二種目病之方文獻通考卷二百二十二
