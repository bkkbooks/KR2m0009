body:
  text: 文獻通考卷四十五鄱陽馬端臨貴與著學校考六幸學飬老按古者天子之視學多為飬老設也雖東漢之時猶然自漢以後飬老之禮浸廢而人主之幸學者或以講經或以釋奠葢自爲一事矣故今以二事合爲一門云有虞氏深衣而養老凡養老之服皆其時王所與羣臣燕之服也有虞氏質深衣而已孔頴達云人君飬老有四種一是飬三老五更二是子孫爲國死難而王飬死者父祖三是飬致仕之老四是引户校年飬庶人之老四代皆然養國老於上庠養庶老於下庠而用燕禮庠飬也上庠右學大學也在西郊下庠左學小學也在國中王宮之東也其禮尚矣憲養氣體而不乞言憲法也飬之爲法其德行曰五帝則有斯也有善則記之爲惇史惇史史孝厚者也夏后氏燕衣而養老改虞制而尚黒衣裳養國老於東序養庶老於西序而用饗禮東序東膠也亦大學在國中王宮之東西序在西郊殷人縞衣而養老殷尚白而縞衣裳養國老於右學飬庶老於左學而用食禮食音似下同周制元衣而養老元衣素裳飬國老於東膠膠之言糾也飬庶老於虞庠虞庠在國之西郊皆學名也異者四代相變耳或上西或上東或貴在國或貴在郊周之小學為有虞氏之庠制是以謂之虞庠云其所謂立鄉學亦如之兼用虞燕夏饗殷食之禮兼用之備隂陽也凡飲飬陽氣凡食飬隂氣陽用春夏隂用秋冬夏官羅氏仲春羅春鳥獻鳩以養國老月令仲秋天子飬衰老授几杖行糜粥飲食五十養於鄉六十飬於國七十飬於學達於諸侯八十拜君命一坐再至九十使人受凡三王飬老皆引年乞言合語之禮皆小樂正詔之於東序凡大合樂必遂飬老外饔邦饗耆老孤子則掌其割烹之事酒正饗耆老孤子皆共其酒無酌數凡有秩酒者以書契授之有秩酒謂老臣王制九十曰有秩遺人門關之委積以飬老孤門關出入皆有稅所稅得者國用之外留之以飬老孤司門以其財養死政之老與其孤財即門關之委積死政之老乃死國政事者之父母也槁人若饗耆老孤子士庶子共其食禮運三公在朝三老在學内則凡飬老五帝憲憲法也飬之為法其德行三王有乞言又從之求善言可施行也五帝憲飬氣體而不乞言有善則記之爲惇史三王亦憲既飬老而後乞言亦微其禮皆有惇史惇史史孝厚者也微其禮者依違之言求而不切也樂記食三老五更於太學天子袒而割牲執醤而饋執爵而酳冕而總干所以教諸侯之弟也三老五更互言耳皆老人更知三德五事者也冕而總干親在舞位也周名大學曰東膠祭義貴老爲其近於親也昔者有虞氏貴徳而尚齒夏后氏貴爵而尚齒殷人貴冨而尚齒周人貴親而尚齒貴謂燕賜有加於諸臣也尚謂有事尊之扵其黨也虞夏殷周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也是故朝廷同爵則尚齒七十杖於朝君問則席八十不俟朝君問則就之而弟達乎朝廷矣君問則席為之布席于堂上而與之言就之就其家也天子廵守諸侯待於境天子先見百年者八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也壹命齒於鄉里再命齒於父族三命而不齒族有七十者弗敢先此謂鄉射飲酒時也齒者謂以年次立若坐也三命列國之卿也不復齒席之於賔東不敢先族之七十者謂既一人舉觶乃入也雖非族亦然承齒扵族故言族爾七十者不有大故不入朝若有大故而入君必與之揖讓而后及爵者謂致仕在家者其入朝君先與之爲禮而後乃揖其所謂卿大夫中庸燕毛所以序齒也燕謂既祭而燕也燕以髪色爲坐祭時尊之也至燕親之也齒亦年也禮書曰天子之於老也其所飬也三國老也庶老也死政者之老也歲飬之也三仲春也季春也仲秋也周禮羅氏羅春鳥獻鳩以飬國老在仲春月令飬衰老授几杖在仲秋文王世子曰凡大合樂必遂飬老鄭氏云大合樂謂春入學釋菜合舞秋頒學合聲於是時也天子則眎學焉遂飬老此飬老於仲春仲秋者也月令季春之末擇吉日大合樂天子乃率三公九卿諸侯大夫親往視之大合樂亦必飬老此又飬老於季春者也若夫簡不帥敎出征受成以訊馘告凡天子入學莫不飬老此又不在歳飬之數也夫貴胄謂之國子則貴而老者謂之國老賤者謂之庶人則賤而老者謂之庶老國子與庶人之俊者同其學所以一道徳國老與庶老異其學所以别分義故有虞氏飬國老於上庠飬庶老於下庠夏后氏飬國老於東序飬庶老於西序殷人飬國老於右學飬庶老於左學周人飬國老於東膠飬庶老於虞庠而又有死政者之老焉故羅氏獻鳩以飬之者國老也司徒以保息飬之者庶老也司門以其財飬之者死政者之老也若夫外饔酒正槁人所謂耆老者總三者而言之也鄭氏謂三老五更各一人皆年老更事致仕者也名三五者取象三辰五星天所因以照明天下者皇氏謂人君飬老有四種一是飬三老五更二是子孫爲國難而死者父祖三是飬致仕之老四是引户校年庶人之老熊氏云天子視學飬老一歳有七鄭氏云凡飲飬陽氣凡食飬陰氣陽用春夏陰用秋冬是四時飬老凡四也文王世子凡大合樂必遂飬老大合樂謂春入學舎莱合舞秋頒學合聲又季春大合樂天子視學亦飬老是七也然則古者建國必立三卿鄉飲酒必立三賔而飬老必立三老故禮曰三公在朝三老在學三公非一人則三老五更非各一人矣漢志以德行年高老者一人爲老次一人爲更故永平中拜桓榮爲五更建初中拜伏恭爲三老而鄭氏以此爲三代之制誤矣晉亦以王祥爲五更先王父事三老兄事五更則三老五更乃羣老之尤者而致仕之老固在其間皇氏離而二之亦誤矣月令無冬夏飬老之文周禮禮記特言春饗秋食而已熊氏謂飬老歳有七亦誤矣又禮記言天子視學遂適東序飬老則視學飬老皆同日也鄭氏謂用其明日亦誤矣飬老之禮外饔掌割烹酒正共酒槁人共食羅氏共鳩方其飬也必先釋奠於先老遂設三老五更羣老之席位適饌省醴飬老之珍具遂發咏焉登歌清廟下管象武天子袒而割牲執醤而饋執爵而酳冕而總干則乞言憲行之養著而孝悌之化行矣有司告以樂闋王乃命公侯伯子男及羣吏曰反飬老㓜於東序而終之以仁此所謂一舉事而衆皆知其徳之備也禮言凡飬老有虞氏以燕禮而服深衣夏后氏以饗禮而服燕衣殷人以食禮而服縞衣周人修而兼用之而服元服蓋虞氏以燕則以恩勝禮夏后氏以饗則以禮勝恩殷人以食則趣恩禮之中而周則文備故修而兼用之周官外饔言饗耆老此周人以饗禮飬老也行葦言飲射而繼之以祈黄耉此周人以燕禮飬老也祭義曰食三老五更於大學此周人以食禮飬老也然元衣燕衣也燕衣非冕服及總干而舞必冕服者以舞者樂之成故特服冕以明至誠有加而無殺也冕而總干施於食禮而記稱食嘗無樂者考之於詩商頌言顧予烝嘗而有鞉鼓淵淵嘒嘒管聲小雅言以往烝嘗而有鍾鼓既戒鼓鍾送尸則嘗有樂矣樂師饗食諸侯序其事令奏鍾鼓鍾師凡享食奏燕樂籥師賔客享食鼔羽籥之舞則食有樂矣其曰食嘗無樂蓋非商周之制也漢明帝飬老之禮其曰乘輿先到辟雍禮殿御坐東廂遣使者安車迎三老五更天子迎於門屏交禮道自阼階三老升自賔階至階天子揖如禮三老升東面三公設几九卿正屨天子親袒割牲執醤而饋執爵而酳祝哽在前祝噎在後五更南面公進供禮亦如之明日皆詣闕謝其飬特三老五更二人而已羣老不與焉非古禮之意也文王世子天子視學大昕鼓徵所以警衆也昧爽擊鼓以召衆衆至然後天子至乃命有司行事興秩節祭先聖先師焉興舉也秩常也節猶禮也使有司攝其事舉常禮祭先聖先師不親祭之者視學觀禮耳非爲彼報也有司卒事反命告祭畢天子乃入始之飬也又之飬老之所適東序釋奠於先老親奠之者已有所事也疏曰時天子視學在虞庠之中有司釋奠既畢天子乃從虞庠入反於國明日乃之東序而飬老故曰始之飬也周立三代學又立周之大學於東謂之東膠立小學於西郊謂之虞庠天子尋常視學則於東膠中唯行飬老之禮若始立學則既視學畢然後適東序飬老之處親釋奠於先世之老既畢遂設三老五更羣老之席位焉若非始立學則不釋奠於先老也遂設三老五更羣老之席位焉三老五更各一人也皆年老更事致仕者也天子以父兄飬之示天下之孝弟也各以三五者取象於三辰五星天所因以照明天下者羣老無數其禮亡以鄉飲酒禮言之席位之處則三老如賔主五更如介羣老如衆賓更疏蔡邕以更字為叟叟老稱又以三老為三人五為五人適饌省醴飬老之珍具遂發咏焉退修之以孝飬也發咏謂以樂納之退修之謂既迎而入獻之以醴獻畢而樂闋反登歌清廟反謂獻羣老畢皆升就席也反就席乃使工登歌清廟以樂之既歌而語以成之也言父子君臣長㓜之道合德音之致禮之大者也既歌謂樂正告工歌備也語談說也歌備而旅旅而說父子君臣長㓜之道說合樂之所美以成其意鄉射記曰古者於旅也語下管象舞大武大合衆以事達有神興有徳也象武王伐紂之樂也以管播其聲又爲之舞皆於堂下衆謂所合學士也達有神明天授命周家之有神也興有徳美文王武王有德師樂爲用前歌後舞正君臣之位貴賤之等焉而上下之義行矣有司告以樂闋闋終也告君以歌舞之樂終此所吿者謂無算樂王乃命公侯伯子男及羣吏曰反飬老㓜於東序終之以仁也羣吏鄉遂之官王扵燕末而命諸侯時朝㑹在此者曰各反飬老㓜如王家東序之禮王制將出學小胥大胥小樂正簡不率敎以告於大樂正大樂正以告於王王命三公九卿大夫元士皆入學不變王親視學不變王三日不舉注見大學考天子出征受成於學出征執有罪反釋奠於學以訊馘告仲春之月上丁命樂正習舞釋菜天子乃率三公九卿諸侯大夫親往視之季春之末擇吉日大合樂天子乃帥三公九卿諸侯大夫親往視之禮書曰天子視學四飬老也簡不帥敎也出征受成也以訊馘告也飬老必於仲春季春而簡不帥敎出征受成以訊馘告者無常時雖有常時其入學也亦必飬老焉書大傳宣王問於子春曰寡人欲行孝弟之義爲之有道乎子春曰昔者衛聞之樂正子曰文王之治岐也五十者杖於家六十者杖於鄉七十者杖於國見君揖八十者杖於朝見君揖君曰趣見客毋俟朝以朝乘車轜輪御爲僕送至於家而孝弟之義達於諸侯九十杖於朝見君建杖君曰趣見毋俟朝以朝送之舍卜筮巫醫御於前祝哽祝噎以食乘車轜輪胥與就膳徹送至於家君如有欲問明日就其室以珍從而孝弟之義達於四海學禮帝入東學上親而貴仁則親踈有序而恩相及矣帝入南學上齒而貴信則長㓜有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不匱矣帝入北學上貴而尊爵則貴賤有等而下不隃矣隃與踰同謂越制成王年十五亦入諸學觀禮布政四學者東序瞽宗虞庠及四郊之學也春氣温飬故上親夏物盛小大殊故尚齒秋物成實故貴徳冬時物藏於地爲象於天半見也故尚爵帝入太學承師問道退習而考於太傅太傅罰其不則而達其不及則德智長而治道得矣此五學者既成於上則百姓黎民化輯於下矣傳曰天子入太學祭先聖則齒嘗爲臣者弗臣所以見敬學與尊師也後漢顯宗永平二年三月上始帥羣臣飬三老五更於辟雍行大射之禮郡縣道行鄉飲酒於學校皆祀聖師周公孔子牲以犬於是七郊禮樂三雍之義備矣飬三老五更之儀先吉日司徒上太傅若講師故三公人名用其徳行年耆高者一人爲老次一人爲更皆服都紵大袍單衣皁縁領袖中衣冠進賢扶玉杖五更亦如之不杖皆齋於太學講堂其日乘輿先到辟雍禮殿御座東廂遣使者安車迎三老五更天子迎於門屏交禮道自阼階三老升自賔階至階天子揖如禮三老升東面三公設几九卿正屨天子親袒割牲執醤而饋執爵而酳祝哽在前祝噎在後五更南面公進供禮亦如之明日皆詣闕謝恩以見禮遇大尊顯故也中元元年初建三雍顯宗即位親行其禮天子始冠通天衣日月備法物之駕盛清道之儀坐明堂而朝羣后登靈臺以望雲物袒割辟雍之上尊飬三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶縉紳之人圜橋門而觀聼者蓋億萬計乃下詔曰光武皇帝建三朝之禮而未及臨饗𦕈𦕈小子屬當聖業間暮春吉辰初行大射令月元日復踐辟雍尊事三老兄事五更安車轜輪供綏執授侯王設醤公卿饌珍朕親袒割執爵而酳祝哽在前祝噎在後升歌鹿鳴下管新宮八佾具修萬舞於庭朕固薄德何以克當易陳負乘詩刺彼已永念慙疚無忘厥心三老李躬年耆學明五更桓榮授朕尚書詩曰無德不報無言不酬其賜躬榮爵關内侯食邑五千户三老五更以二千石祿飬終厥身其賜天下三老酒人一石肉四十斤有司其存耆耄恤㓜孤惠鰥寡稱朕意焉永平八年十月臨辟雍飬三老五更三老老人知天地人事者五更老人知五行更代之事安帝以魯丕爲三老又以李充爲三老楊統位至光祿大夫爲國三老元初四年詔曰月令仲秋養衰老授几杖行糜粥方今八月按比之時郡縣多不奉行雖有糜粥糠粃泥土相雜不可飲食長吏怠事莫有躬親甚違詔書飬老之意其務崇仁恕賑䕶寡獨稱朕意焉按古人飬老之禮有飬於鄉者所謂五十飬於鄉王命公侯伯子男及羣吏曰反飬老於東序大司徒以保息六保萬民二曰飬老是也有飬於國者天子視學設三老五更羣老之席位執醤親饋執爵親酳是也漢初每鄉及縣皆有三老歲首則使人存問賜以束帛酒肉或賜以爵乃古人飬於鄉之意而國學飬老天子親講之禮則至東漢始行之然東漢亦時有下郡縣存問飬老之詔此其一也餘不悉錄靈帝以袁逢爲三老賜以玉杖玉杖長九尺端以鳩爲飾鳩者不噎之鳥欲令老人不噎也譙周曰漢中興定禮儀羣臣欲令三老答天子拜城門校尉董鈞駁曰飬三老所以教事父之道也若答拜是使天下答子拜也詔從鈞議譙周論之曰禮尸服上服猶以非親之故答子拜士見異國君亦答拜是皆不得視猶子也虞喜曰且據漢儀於門屏交禮交禮即答拜中興謬從鈞議後革之深得其意魏高貴鄉公甘露二年天子親帥羣司行飬老之禮於太學命王祥爲三老鄭小同爲五更祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之聞者莫不砥礪東晉成穆孝武三帝皆以講經親詣學釋奠孝武以太學在水南懸逺有司議依穆帝升平元年於中堂權立太學釋奠禮畢㑹百官六品以上後魏孝文帝太和十六年詔以前司徒尉元爲三老前大鴻臚卿㳺明根爲五更於明堂設國老位庶老位於階下皇帝再拜三老親袒割牲執醤而饋執爵而酳於五更行肅拜之禮賜國老庶老衣服有差既而三老言曰自古人所崇莫重於孝順然五孝六順天下之所先願陛下重之以化四方帝曰孝順之道天地之經今承三老明言銘之朕懐五更言曰夫至孝通靈至順感幽故詩云孝弟之至通於神明光於四海願陛下念之以濟黎庶帝曰五更助三老以言至範敷展徳音當克已復禮以行來授禮畢乃賜歩輓一乘詔曰三老可給上公之祿五更可食九卿之俸供飬之味亦同其例北齊制仲春令辰陳飬老禮先一日三老五更齋於國學皇帝進賢冠元紗袍至辟雍入總章堂列宮懸王公以下及國老庶老各定位司徒以羽儀武賁安車迎三老五更於國學並進賢冠元服黑舄素帶國子生黒介幘青衿單衣乘馬從以至皇帝釋劍執珽迎於門内三老至門五更去門十步皆降車以入皇帝拜三老五更攝齊答拜皇帝揖進三老在前五更在後升自右階就筵三老坐五更立皇帝升堂北面公卿升自左階北面三公授几杖卿正屨國老庶老各就位皇帝拜三老羣臣皆拜不拜五更乃坐皇帝西向肅拜五更進珍羞食親袒割牲執醤而饋執爵而酳以次進五更又設酒酏於國老庶老皇帝升御座三老乃論五孝六順典訓大綱皇帝虚躬請授禮畢而還又都下及外州人年七十以上賜鳩杖黄帽有勑則給不爲常也後周武帝保定三年詔以太傅燕國公于謹爲三老賜延年杖皇帝幸太學以食之三老入門皇帝迎拜門屏之間三老答拜設三老席於中楹南面太師晉國公宇文䕶升階設几於席三老升席南面憑几而坐大司㓂楚國公豆盧寧升階正舄皇帝升立於斧扆之前西向有司進饌皇帝跪授醤豆親袒割牲三老食訖皇帝又親跪授爵以酳撤去皇帝北面立訪道三老乃起立於席後皇帝曰猥當天下重任自惟不才不知政理之要公其誨之三老答曰木從繩則正后從諌則聖自古明王聖主皆虛心納諌以知得失天下乃安惟陛下念之又曰爲國之本存乎忠信是以古人云去食去兵信不可失國家興廢在於賞罰若有功必賞有罪必罰則爲善者日益爲惡者日止若有功不賞有罪不罰則天下善惡不分下人無所措手足又曰言行者立身之本言出行隨誠冝相顧陛下三思而言九慮而行若不思不慮必有過失天子之過事無大小如日月之蝕莫不知者願陛下愼之三老言畢皇帝再拜受之三老答拜禮成而出唐高祖武德七年幸國子學親臨釋奠唐制仲秋吉辰皇帝親飬三老五更於太學所司先奏定三師三公致仕者用其德行及年高者一人爲三老次一人爲五更設三老座於西楹之東近北南面設五更座於西階上東向設國老三人座於三老座西俱不屬焉設衆國老座於堂下西階之西東面北上五品以上致仕者爲國老六品以下致仕者爲庶老天寳八載閏六月制其天下百姓丈夫七十五以上婦人七十以上宜各給中男一人充侍仍任自簡擇至八十以上依常式處分餘並如開元禮宋太祖皇帝建隆元年幸國子監詔加飾祠宇及塑繪先聖先賢先儒之像帝親製文宣王兖國公二贊太宗端拱元年幸國子監謁文宣王畢升輦將出西門顧見講座左右言學官李覺方聚徒講書即詔覺令對御講說覺曰陛下六飛在御臣何敢輒陞高座帝爲降輦令有司張帟幕設别座詔覺講易之泰卦從臣皆列坐覺因述天地感通君臣相應之㫖帝甚悅特賜帛百疋眞宗咸平二年幸國子監召學官說書賜以金帛仁宗天聖二年幸國子監召直講兼諸王府侍講馬龜符講說賜判監馮元以下及學官器幣有差高宗紹興十三年國學大成殿成明年國子司業高閌請幸學上從之詔畧曰偃革息民恢儒建學聲明丕闡輪奐一新爾等攄望幸之忱述諸儒之志逺繼橋門之盛願觀雲輿之臨請既方堅理宜從欲將欵謁於先聖仍備舉於舊章三月上服靴袍乘輦入監止輦於大成殿門外入幄羣臣列班於庭上出幄升東階跪上香執爵三祭酒再拜羣臣皆再拜上降入幄分奠從祀如常儀尚舍先設次於崇化堂之後及堂上之中南向設御座閤門設羣臣班於堂下如月朔視朝之儀宰輔從臣次於中門之外上乘輦幸太學降輦於堂入次更衣講官入就堂下講位北向執經官學生皆立於堂下東西相向上出次升御座羣臣起居如儀乃命三公宰輔以下升堂皆就位左右史侍立講書及執經官北面起居再拜皆命之升立於御座左右學生北面再拜分立於兩廡北上内侍進書案牙籖以經授執經官賜三公宰輔以下坐講席羣臣皆起降階東西相向立執經官降講官進前致詞乃降北面再拜左右史降乃賜茶三公以下北面再拜升各立扵位後學生北面再拜分兩廡立上下皆就坐賜茶畢三公以下降階學生自兩廡降階北面再拜羣臣以次出上降座還次乘輦還宮時命禮部侍郎秦熺執經司業高閌講易之泰遂幸飬正持志二齋賜閌三品服學官遷秩諸生授官免舉賜帛有差上既奠拜注視貌像翼翼欽慕覽唐明皇及太祖眞宗徽考所製贊文命有司悉取從祀諸贊皆録以進上遂作先聖及七十二子贊冠以序文親灑宸翰以方載之五月丙辰登之綵殿備儀衞作樂命監學之臣自行宮北門迎置學宮揭之大成殿上及二廡孝宗淳熈四年幸太學如紹興之儀命禮部侍郎李燾執經祭酒林光朝講大學唐開元禮皇帝皇太子視學儀視學前一日所司灑掃學堂之内外尚舍設大次於學堂之後守宫設皇太子次於大次之東皆隨地之宜並如常儀尚舍設御位學堂上北壁下當中南向監司設講榻於御座之西南向設執讀座於前楹間當講榻北向尚舍又設皇太子座於御座東南西向設文官三品以上座於皇太子之南少退重行西向北上設武官三品以上座於講榻西南當文官重行東面北上設侍講座於執讀西北武官之前東向北上其執如意者一人立於侍講之南東面設論議座於講榻之前西階下典儀設版位皇太子於東階東南西面執經於西階西南東面文官三品以上於皇太子東南重行西面北上武官三品以上於執經西南侍講執讀執如意等於執經之後重行東面北上學生分於文武官之後皆重行北上設典儀位於東階之西贊者二人在南差退俱西面出宫前出宫三日本司宣攝内外各供其職其日應從駕文武官依時刻集朝堂諸衛陳設仗衛侍中版奏外辦皇帝乘馬文武侍從並如常行幸之儀駕将至祭酒帥監官學官學生等奉迎扵路左學生青衿服駕至大次門外降入如常視學皇帝既入大次執經侍講執讀執如意等及學官各服公服典儀帥贊者先入就位謁者贊引引文武三品以上及執經以下學生等入就堂下位皇太子立於學堂門外之東西向如常侍中版奏外辦皇帝出大次升自北階即御座南向坐侍臣及近侍量人從升典儀一人升就東階上西面立舍人引皇太子就位立諸衛率庶子等量人從入立扵皇太子東南西向北上奉禮曰再拜贊者承傳皇太子以下在位者皆再拜侍中跪奏稱請勅皇太子及公王等升坐又侍中稱制曰可侍中詣東階上西面稱勅皇太子及公王等升殿上典儀承傳階下贊者又承傳皇太子以下應坐者皆再拜訖通事舍人引皇太子及羣官坐者各升座訖其公服者脱履扵階下及降納皆如常執讀讀所講經執經釋義訖遂行如意侍講者執如意就論議坐以次論難侍中跪奏禮畢羣官皆起通事舍人各降堂下位若有勅賜㑹則侍中前承制降詣堂下宣勅及太官下食案等並如常儀皇帝降座還大次侍衛如常儀羣官以下㑹訖皆出執經以下改服常服學生仍青衿服鑾駕還宫皇帝既還大次侍中量時刻版奏外辦皇帝出次文武官陪從還宫如來儀初駕出國子祭酒帥監官學官學生等奉辭於路左如常式皇帝飬老於太學儀陳設前三日尚舍直長設大次於學堂之後隨地之冝設三老五更次於學堂南門外之西羣老次於其後俱東向設羣官次文官於門外之東重行西向武官於羣老之西重行東向皆北上前一日尚舍奉御設御座於堂上東序西向莞筵紛純加藻席畫純次席黼純設三老座於西楹之東近北南向設五更座於西階上東向設國老三人座於三老座西俱不屬焉皆莞筵紛純加藻席畫純設衆國老座於堂下西階之西東面北上皆蒲筵緇布純加莞席元帛純若三品以上則莞筵紛純加藻席畫純凡五品以上致仕者爲國老設庶老座於國老之後皆蒲筵繬布純六品以下致仕者爲庶老太樂令展宫懸於學堂之庭設登歌於堂上及舉麾位等皆凖元㑹之儀典儀設文官五品以上位於懸東六品以下在其南俱重行西向北上武官五品以上位於懸西六品以下在其南當文官俱重行東向北上蕃客分方位於文武官六品之南若有諸州使人分位於文武官九品之後學生分位於文武官之後奉禮設門外如設次之式尚舍奉御設罇於東楹之西北向左元酒有坫以置爵飬老仲秋之月擇吉辰皇帝親飬三老五更於太學所司先奏定三師三公致仕者用其徳行及年高者一人爲三老次一人爲五更尚食先具牢饌鑾駕將至通事舍人引先置之官皆就門外位學生俱靑衿服入就位鑾駕至太學門廻輅南向侍中跪奏請降俛伏興皇帝降輅乘輿入大次繖扇侍衛如常通事舍人引文官五品以上從駕之官皆就門外位太樂令帥工人二舞就位如正㑹之禮通事舍人引羣官客使入就位鑾駕出宫量時刻遣使迎三老五更於其第三老五更俱服進賢冠具服乘安車前後導從如常禮其國老庶老則有司先戒之鑾駕既至太學三老五更及羣老等俱赴集其次羣老各服其服太常少卿贊三老五更俱出次引立於學堂南門外之西東面北上奉禮贊羣老出次引立於三老五更之後太常博士引太常卿升立於學堂北户之内當户北向侍中版奏外辦皇帝出户侍衛如常侍中負寳陪從如式殿中監進大珪皇帝執大珪博士引太常卿太常卿引皇帝毎太常卿前導皆博士先引協律郎跪俛伏舉麾太和之樂作皇帝降迎三老於門内之東西面立侍臣從立皇帝之後太常卿與博士退立於左皇帝立定樂止三老五更皆杖各二人夾扶左右太常少卿引道惇史執筆以從三老入門舒和之樂作三老五更立於門西東面北上奉禮引羣老入立於其後初三老立定樂止太常卿前奏請再拜退復位皇帝再拜三老五更去杖攝齊以答再拜畢皇帝揖進三老在前五更從仍杖夾扶如初至階皇帝揖升俱就座後揖立樂止侍衛之官量人從升皇帝西面再拜三老三老南面答再拜皇帝西向再拜五更答再拜休和之樂作三老五更俱坐三公授几九卿正屨訖殿中監尚食奉御進珍羞及黍稷等皇帝省之遂設於三老前樂止太常卿引皇帝詣三老座前執醤而饋訖太常卿引皇帝詣酒罇所取爵侍中贊酌酒訖太常卿引皇帝進執爵而酳尚食奉御以次進珍羞酒食於五更前國老庶老等皆坐又設酒食於國老庶老前國老庶老等皆食皇帝即座太樂令引工升奏韶和之樂三終三老乃論五孝六順典訓大綱格言宣於上惠音被於下皇帝乃虚躬請授惇史執筆錄善言善行終二舞作於懸中訖禮畢三老以下降筵太常少卿及奉禮引導皆如初太常卿引皇帝從以降階太和之樂作皇帝逡廵立於階前樂止三老五更出舒和之樂作太常卿引皇帝升立於階上三老五更出門樂止侍中前奏禮畢退復位太常卿引皇帝降還大次三老五更升安車導從而還通事舍人引羣官及學生等以次出明日三老詣闕表謝鑾駕還宫如常儀文獻通考卷四十五
