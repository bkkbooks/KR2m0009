body:
  text: 文獻通考卷二百七十鄱陽馬端臨貴與著封建考十一魏封建諸侯王任城威王彰建安二十一年封鄢陵侯文帝即位以功増邑五千并前萬户黄初二年進爵為公三年立為任城王四年薨子楷嗣徙封中牟五年改封任城縣太和六年復改封任城國食五縣二千五百户青龍三年坐罪削縣二千户正始七年徙封濟南二千户并増邑四千四百户陳思王植建安十六年封平原侯十九年徙封臨菑侯二十二年増邑至萬户文帝即位坐罪貶爵安鄉侯三年立為鄄城王邑二千五百户四年徙封雍邱六年増户五百太和元年徙封浚儀三年徙封東阿六年以陳四縣封為陳王邑三千五百薨子志嗣徙封濟北王蕭懷王熊早薨後追封王子哀王炳嗣食邑二千五百户薨無子國除豐愍王昻早卒黄初二年追諡曰豐悼公三年以樊安公均子琬嗣嘉平六年襲爵為豐王累増邑至二千七百户薨子亷嗣相殤王鑠早薨太和三年追封子潛嗣薨偃邑二千五百户無子國除鄧哀王冲早卒以宛侯據子琮奉冲後景初元年坐罪削邑貶爵為侯正始七年轉封平陽公累増邑并前千九百户彭城王據建安十六年封范陽侯二十二年徙封宛侯黄初二年進爵為公三年為章陵王又徙義陽又徙彭城及濟隂景初元年坐罪削爵二千户三年復景元中累増邑并前四千六百户燕王宇建安十六年封都鄉侯二十二年改封魯陽侯黄初二年進爵為公三年為下邳王五年改封單父縣太和六年封燕王累増邑至五千五百户薨奐後入繼大宗即帝位沛穆王林建安十六年封饒陽侯二十二年徙封譙黄初二年進爵為公三年為譙王五年改封譙縣七年徙鄄城太和六年徙沛累増邑至四千七百户薨子緯嗣中山恭王衮建安二十一年封平鄉侯二十二年徙東陽侯黄初二年進爵為公三年為北海王又徙贊濮陽及中山青龍元年坐削邑二年復三年卒子孚嗣増邑至三千四百户濟陽懷王玹建安十六年封西鄉侯早卒以沛王林子贊襲爵薨復以贊弟邑紹薨子恒嗣累増邑至千九百户陳留恭王峻建安二十一年封郿侯後徙襄邑黄初三年進爵改封襄邑又改陳留薨子澳嗣累増邑至四千七百户范陽閔王矩早卒詔以樊安公均子敏嗣封臨晉侯黄初五年改封范陽王七年徙句陽増邑至三千四百户子焜嗣趙王幹建安二十年封髙平亭侯再徙頼亭𢎞農黄初二年封燕王又改河間樂城鉅鹿乃封趙王増邑至五千户楚王彪建安二十一年封夀春侯徒封汝陽弋陽吳夀春白馬乃改封楚王坐犯禁削縣繼而復所削封至三千户嘉平元年令狐愚王凌等謀立彪都許昌凌敗彪自殺至正元元年封子嘉為常山真定王郿戴公子整建安二十二年封郿侯薨無子詔以彭城王據子範奉整後子闡嗣增封至千八百户樊安公均建安二十二年封薨子抗嗣徙封抗蘇屯留薨子諶嗣累封至千九百户東平靈王徹建安二十二年封歴城侯黄初三年為廬江王徙夀張東平坐罪削邑繼復所削薨子翕嗣累封至三千四百户樂陵王茂二十二年封萬歲亭侯改封平輿乗氏中邱聊城乃封王又改曲陽坐罪削繼復徙樂陵増邑至五千户右太祖二十五男其得封傳國者十七人贊哀王協早薨太和五年追封子尋嗣増户至三千薨無子國除北海悼王蕤黄初七年立為陽平縣王後改封北海薨以瑯琊王子贊嗣徙封昌鄉饒安文安増邑至三千五百户東武陽懷王鑒黄初六年立薨無子國除東海定王霖黄初三年立為河東王改封館陶東海薨子啓嗣累増邑至六千二百户子高貴鄉公髦入繼大宗嗣帝位元城哀王禮黄初二年封秦公三年改京兆王又改元城薨尋以任城王楷子梯嗣改封梁王累増邑至四千五百户邯鄲懷王邕黄初二年封淮南公三年封王又改陳及邯鄲薨以任城王楷子温嗣改封魯陽累増邑至四千四百户清河悼王貢黄初三年封薨無子國除廣平哀王儼黄初三年封薨無子國除右文帝子八王黄初五年詔曰先王建國隨時而制漢祖増秦所置郡至光武以天下損耗并省郡縣以今比之益不及焉其改封諸王皆為縣王陳思王傳時法制待藩國既自峻廹寮屬皆賈豎下才兵人給其殘老大數不過二百人又植以前過事復減半十一年中而三徙都常汲汲無歡遂𤼵疾薨正始間宗室曹冏上書曰古之王者必建同姓以明親親必樹異姓以明賢賢親親之道專用則其漸也微弱賢賢之道偏任則其敝也劫奪先聖知其然也故博求親疎而並用之故能保其社稷歴紀長久今魏尊尊之法雖明親親之道未備或任而不重或釋而不任臣竊惟此寢不安席謹撰合所聞論其成敗曰昔夏商周歴世數十而秦二世而亡何則三代之君與天下共其民故天下同其憂秦王獨制其民故傾危而莫救也秦觀周之敝以為小弱見奪於是廢五等之爵立郡縣之官内無宗子以自毗輔外無諸侯以為藩衞譬猶芟刈股肱獨任胸腹觀者為之寒心而始皇晏然自以為子孫帝王萬世之業也豈不悖哉故漢祖奮三尺之劍驅烏集之衆五年之中遂成帝業何則伐深根者難為功摧枯朽者易為力理勢然也漢監秦之失封植子弟及諸吕擅權圖危劉氏而天下所以不傾動者徒以諸侯强大磐石膠固故也然高祖封建地過古制故賈誼以為欲天下之治安莫若衆建諸侯而少其力文帝不從至於孝景猥用鼂錯之計削黜諸侯遂有七國之患蓋兆𤼵高帝釁鍾文景由寛之過制急之不漸故也所謂末大必折尾大難掉尾同於體猶或不從况乎非體之尾其可掉乎武帝從主父䇿下推恩之令自是之後遂以陵夷子孫微弱衣食租税不預政事至於哀平王氏秉權假周公之事而為田常之亂宗室王侯或乃為之符命頌莽恩德豈不哀哉由斯言之非宗子獨忠孝於惠文之間而叛逆於哀平之際也徒以權輕勢弱不能有定耳賴光武皇帝挺不世之姿擒王莽於已成紹漢嗣於既絶斯豈非宗子之力也而曽不監秦之失䇿襲周之舊制至於桓靈閹宦用事君孤立於上臣弄權於下由是天下鼎沸姦宄並争宗廟焚為灰燼宫室變為榛藪太祖皇帝龍飛鳯翔掃除凶逆大魏之興於今二十有四年矣觀五代之存亡而不用其長䇿覩前車之傾覆而不改於轍迹子弟王空虛之地君有不使之民宗室竄於閭閻不聞邦國之政權均匹夫勢齊凡庶内無深根不㧞之固外無磐石宗盟之助非所以安社稷為萬世之業也且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟並據而宗室子弟曽無一人間厠其間與相維制非所以强幹弱枝備萬一之虞也今之用賢或超為名都之主或為偏師之帥而宗室有文者必限小縣之宰有武者必致百人之上非所以勸進賢能褒異宗室之禮也語曰百足之蟲至死不僵以其扶之者衆也此言雖小可以譬大是以聖王安不忘危存不忘亡故天下有變而無傾危之患矣冏冀以此論感悟曹爽爽不能用陳夀評曰魏氏王公既徒有土國之名而無社稷之實又禁防壅隔同於囹圄位號靡定大小嵗易骨肉之恩乖棠棣之義廢為法之弊一至於此乎袁子曰魏興承大亂之後民人損減不可則以古始於是封建侯王皆使寄地空名而無其實王國使有老兵百餘人以衞其國雖有王侯之號而乃儕於匹夫縣隔千里之外無朝聘之儀鄰國無㑹同之制諸侯游獵不得過三十里又為設防輔監國之官以伺察之王侯皆思為布衣而不能得既違宗國藩屏之義又虧親戚骨肉之恩魏列侯魏黄初三年初制封王之庶子為鄉公嗣王庶子為鄉侯公之庶子為亭伯其後定制凡國王公侯伯子男六等次縣侯次鄉侯次亭侯次闗内侯又置名號侯爵十八級闗中侯爵十七級皆金印紫綬闗外侯十六級銅印龜紐墨綬五大夫十五級銅印環紐亦墨綬自闗内侯皆不食租虛封爵自魏始而有保傅相常侍侍郎郎中令中尉大農文學友謁者大夫諸雜署令丞公主有家令僕丞行夜督郵王太妃有家令僕丞公孫康遼東襄平人漢末父度據遼東至康以斬袁尚功封襄平侯子淵嗣明帝時拜大司馬封樂浪公景初元年遣使徵之淵發兵反遣司馬懿討誅之張燕常山真定人本羣盜聚衆河北太祖將平冀州遣使求佐王師拜平北將軍封安國亭侯邑五百户薨子方嗣融張繡武威祖厲人漢末聚衆於祖厲後領衆屯宛與劉表合太祖南征以衆降封宣威侯以軍功増邑至二千户薨子泉嗣坐反誅國除張魯沛國豐人據漢中太祖討平之出降封閬中侯邑萬户封魯五子及閻圃等皆為列侯子富嗣夏侯惇沛國譙人以從征吕布功封高安鄉侯増邑至二千五百户薨諡忠侯子充嗣廙劭河内人韓浩沛國人史渙俱以忠勇顯掌禁兵封侯附惇傳夏侯淵惇族弟以軍功封博昌亭侯後守漢中為劉先主所襲戰死諡愍侯子衡嗣績褒曹仁太祖從弟以征伐功進封陳侯増邑至三千五百户薨諡忠侯子泰嗣轉封寗陵侯初泰弟楷範皆為列侯仁弟純以征伐功封高陵亭侯邑三百户卒諡威侯子演嗣曹洪太祖從弟以征伐功封野王侯二千一百户薨諡恭侯子馥嗣太祖分洪户封子震為列侯族父瑜官至衞將軍封侯曹休太祖族子以征伐功封長平侯増邑至二千五百户薨諡壯侯子肇嗣興文帝分休户三百封肇弟纂為列侯曹真太祖族弟以軍功封東鄉侯累増户至二千九百薨諡元侯子爽嗣明帝崩受遺輔少主加侍中武安侯邑萬二千户坐擅權為司馬懿所誅夷明帝思真功封其五子羲訓則彦皚皆為列侯文帝分真邑二百户封弟彬為列侯夏侯尚淵從子以軍功封昌陵鄉侯薨諡悼侯子元嗣坐謀誅司馬師為師所誅夷荀彧頴川頴隂人太祖平袁紹以彧前後籌䇿功封萬嵗亭侯累増邑至二千户薨諡敬侯子惲嗣甝頵荀攸彧從子與彧同時以籌策功封陵樹亭侯増邑至七百户子適嗣彪賈詡武威姑臧人以説張繡降太祖功封都亭侯進封魏夀鄉侯増邑至八百户薨諡肅侯子穆嗣模田疇右北平無終人太祖征烏丸疇將衆為向導破虜以功封亭侯邑五百户固辭不受何䕫陳郡陽夏人太祖時參軍事文帝為太子以䕫為少傅帝即位封成陽亭侯邑三百户薨諡靖侯子曽嗣鍾繇潁川長社人太祖時馬騰韓遂擁强兵擅闗中乃以繇為侍中持節督闗中魏國初建為相國文帝受禪進封崇高鄉侯増邑至千八百户薨諡成侯子毓嗣文帝分毓户邑封繇弟演及子劭孫豫列侯駿華歆平原高唐人魏國建為御史大夫文帝即位拜相國封安樂侯明帝即位封博平侯増邑至千三百户薨諡敬侯子表嗣文帝時分歆户邑封歆弟緝列侯王朗東海人魏國建以軍祭酒領魏郡太守文帝即位為司空封樂平鄉侯明帝即位封蘭陵侯増邑至十二百户薨諡成侯子肅嗣文帝分朗邑封朗兄子詳為列侯程昱東郡東阿人以從討破袁譚尚功封安國亭侯文帝即位封安鄉侯増邑至八百户薨諡肅侯子武嗣克良郭嘉潁川陽翟人從征伐以籌䇿功封洧陽亭侯増邑至千户薨諡貞侯子率嗣深獵董昭濟隂定陶人説太祖移駕都許以謀䇿功封千秋亭侯後進爵樂平侯邑千户薨諡定侯子胄嗣劉􅁮淮南成惪人太祖文帝時為侍中征討預謀畫明帝時以功封東亭侯邑三百户薨諡景侯子㝢嗣蔣濟楚國平阿人太祖時為丞相主簿文明時仕至散騎常侍預軍國謀議齊王即位進爵昌陵亭侯薨諡景侯子秀嗣凱劉放涿郡人魏國建為祕書郎文明時為中書監掌機密封西鄉侯齊王即位以定䇿増邑至一千一百户薨諡敬侯子正嗣孫資太原人自太祖以來與劉放俱任中書掌機密封陽亭侯齊王即位以定䇿増邑至千户薨諡貞侯子宏嗣劉靖沛國相人太祖時表靖父馥為揚州刺史恩惠大行戰守有備馥卒子靖為河南尹有父風封廣陵亭侯邑三百户諡景侯子煕嗣司馬朗河内温人太祖時為丞相主簿從征伐明帝即位録其功封朗子昌武亭侯邑百户子洪嗣梁習陳郡柘人文帝時為并州刺史政治為天下最封申門亭侯邑百户薨子施嗣張既馮翊高陵人文帝時為凉州刺史以擊胡功封西鄉侯増邑至四百户薨諡肅侯子緝嗣坐與李豐同謀誅司馬師見殺賈逵河東襄陵人太祖時為丞相主簿從征伐文帝受禪以功封陽里亭侯四百户薨諡肅侯子充嗣任峻河南中牟人太祖征伐峻常居守置屯田給軍糧以功封都亭侯邑三百户薨諡成侯子先嗣蘇則扶風武功人文帝時為䕶羌校尉以征羌功封都亭侯邑三百户薨諡剛侯子怡嗣愉怡弟襲封杜畿京兆杜陵人為河東太守十六年治為天下最文帝踐祚封豐樂亭侯邑百户諡戴侯子恕嗣張遼鴈門馬邑人太祖時為將破袁譚攻孫權有功文帝即位封晉陽侯邑増至二千六百户諡剛侯子虎嗣統樂進陽平衞國人太祖時為軍司馬以征伐功封廣昌亭侯増邑至千二百户諡威侯子綝嗣肇于禁泰山鉅平人太祖時以征伐功封益夀亭侯増邑至千二百户後禦闗羽於樊軍敗降羽文帝時自吳還卒諡厲侯子圭嗣張郃河間人太祖時以征伐功封鄭侯後増邑至四千三百户卒諡壯侯子雄嗣明帝以郃功分其邑封郃四子列侯徐晃河東楊人太祖時征伐有功文帝即位封陽平侯増邑至三千一百户諡壯侯子蓋嗣霸明帝分晃子孫二人列侯李典山陽鉅野人太祖時從軍以功封都亭侯邑三百户薨諡愍侯子禎嗣李通江夏平春人以軍功封都亭侯増邑至四百户諡剛侯子朞嗣臧霸泰山華人太祖攻袁紹時霸為瑯琊相以精兵入青州封都亭侯文帝即位封良成侯増邑至三千五百户諡威侯子艾嗣明帝以霸前後功封子三人列侯文聘南陽宛人為劉表大將太祖征荆州劉琮降聘詣太祖後以禦闗羽孫權功封新野侯増邑至千九百户諡壯侯子休嗣武呂䖍任城人太祖時為泰山太守以平宼功封益夀亭侯増邑至六百户子翻嗣桂許褚譙國譙人太祖時從征伐有功文帝立封萬嵗亭侯増邑至七百户諡壯侯子儀嗣綜龎惪南安狟道人初從張魯太祖定漢中乃降封闗門亭侯與曹仁共攻闗羽不克死之諡壯侯封其二子皆為列侯衞覬河東安邑人太祖時以治書侍御史鎮闗中招懐有功文帝立封陽吉亭侯増邑至三百户諡敬侯子瓘嗣傅嘏北地泥陽人黄初中為侍中尚書髙貴鄉公時進封武鄉亭侯以勸司馬師討毋邱儉功増邑至千二百户諡元侯子祗嗣陳羣潁川許昌人太祖時辟為西曹掾文帝在東宫待以交友之禮即位封昌武亭侯帝寢疾與曹真司馬懿等並受遺詔輔明帝封潁隂侯増邑至千三百户諡靖侯子泰嗣恂温恂弟紹封陳矯廣陵東陽人太祖時為司空掾文帝即位以佐命功封東鄉侯邑六百户諡貞侯子本嗣粲徐宣廣陵海西人太祖時為司空掾明帝即位為尚書封津陽亭侯邑二百户諡貞侯子欽嗣衞臻陳留襄邑人太祖時參丞相軍事文帝踐祚封安國亭侯正始中進爵長垣侯邑千户諡敬侯子烈嗣盧毓涿郡涿人太祖時為丞相法曹齊王即位為僕射封髙樂亭侯後封容城侯二千三百户諡成侯孫藩嗣和洽汝南西平人初從劉表太祖定荆州辟為丞相掾明帝即位封西陵鄉侯邑二百户薨諡簡侯子禽嗣常林河内温人文帝為五官將時林為功曹帝即位封樂陽亭侯薨諡貞侯子旹嗣静旹弟紹封杜襲潁川定陵人太祖時為丞相軍祭酒文帝即位封武平亭侯累封至五百五十户諡定侯子㑹嗣趙儼潁川陽翟人太祖時為司空掾屬主簿明帝即位進封都鄉侯邑六百户薨諡穆侯子亭嗣裴潛河東聞喜人太祖時為丞相理曹掾明帝即位封清陽亭侯邑二百户薨諡貞侯子秀嗣韓暨南陽堵陽人太祖平荆州辟為丞相士曹掾文帝即位封宜城亭侯邑二百户薨諡恭侯子肇嗣邦崔林清河東武城人太祖時為丞相掾明帝時為司空封安陽亭侯邑六百户魏三公封列侯自林始薨諡孝侯子述嗣高柔陳留圉人太祖辟為丞相倉曹屬明帝即位封延夀亭侯齊王時以預誅曹爽功封安國侯為太尉増邑至四千户薨諡元侯孫渾嗣孫禮涿郡容城人文帝時為尚書齊王時遷司空封大利亭侯邑一百户薨諡景侯孫元嗣王觀東郡廩邱人太祖時為文學掾歴仕文明二帝高貴鄉公即位既誅曹爽封觀陽鄉侯後増邑至二千五百户遷司空薨諡肅侯子悝嗣辛毗潁川陽翟人初從袁紹太祖克鄴表毗為議郎文帝時封廣平亭侯薨諡肅侯子敞嗣滿寵山陽昌邑人太祖時為汝南太守以戰功封安昌亭侯明帝即位封昌邑侯増邑至九千六百户薨諡景侯子偉嗣田豫漁陽雍奴人太祖時為丞相軍謀掾文帝初為䕶烏丸校尉以討胡功封長樂亭侯増邑至五百户薨子彭祖嗣郭淮太原陽曲人文帝時為鎮西長史討平闗中叛胡封射陽亭侯後進封陽曲侯邑凡二千七百八十户分三百户封一子亭侯薨諡貞侯子統嗣正徐邈燕國薊人太祖時為丞相軍謀掾文帝立以討叛羌功封都亭侯邑三百薨諡穆侯子武嗣胡質楚國夀春人太祖時為丞相屬文帝即位為征東將軍都督青徐諸軍事積榖備邊薨追封陽陵亭侯邑百户諡貞侯子威嗣王㫤太原晉陽人文帝時為兖州刺史後以戰功封京陵侯討母邱儉文欽諸葛誕等破之増邑至四千七百户薨諡穆侯子渾嗣王基東萊曲城人文帝時為中書侍郎高貴鄉公即位封常樂亭侯後以預討文欽等功増邑至五千七百户薨諡景侯子徽嗣王凌太原祁人太祖時為丞相掾文帝即位為兖州刺史後以戰功封南鄉侯邑千三百五十户司馬懿秉政凌謀立楚王彪事覺懿討之自殺母邱儉河東聞喜人父興黄初中為武威太守以討叛胡功封高陽鄉侯儉襲父爵後以討公孫淵功進封安邑侯邑三千九百户司馬師專政儉矯太后詔起兵討之兵敗死諸葛誕瑯琊陽都人明帝時為御史中丞後以討吳功封高平侯邑三千五百户為征東將軍司馬昭秉政誕舉兵降吳昭討之兵敗死鄧艾義陽棘陽人為司馬懿掾屬後以破文欽等功封方城鄉侯拒姜維破之遷征西將軍増邑至六千六百户以平蜀功為太尉増邑二萬户封二子亭侯邑各千户鍾㑹譖而殺之鍾㑹潁川長社人太傅繇小子高貴鄉公即位以謀討母邱儉等功封東武亭侯邑三百户後以平蜀功為司徒進封縣侯増邑萬户封子二人亭侯邑各千户坐反誅右魏世諸侯王及列侯之見於史傳而可考者按漢人嘗稱萬户侯蓋列侯大者多食萬户魏則雖親王所食未有及萬户者漢光武封功臣如鄧寇軰皆以元功食四縣范􅁮猶以為懲韓彭之戮存矯枉之志故不大其封土使之得以功名自終魏則諸王所食不過一縣蓋封建之制至曹魏而規模益貶矣然以天下户口之數考之西漢盛時至一千餘萬而魏氏不過六十六萬有竒蓋郡國所上户口猶不及漢十之一則宜其分封之户數不能如漢制也又兩漢户賦輕而魏晋以來户賦重受封者皆食其户賦則輕者不容不多而重者不容不少矣張繡傳言時天下户口減耗十裁一存諸將封未有滿千户者而繡獨以功封二千户亦一證也文獻通考卷二百七十
