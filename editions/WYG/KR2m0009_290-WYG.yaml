body:
  text: 文獻通考卷二百九十鄱陽馬端臨貴與著象緯考十三月五星凌犯神宗治平四年正月庚申月入東井主風雨又犯軒轅大星主嵗饑母后親屬咎罰五月甲申月犯左執法主執法官憂八月熒惑犯軒轅大星主女主災十二月熒惑犯亢主民疫熙寧元年正月庚辰填退犯上相主大臣有咎八月甲寅熒惑犯天江第二星主水壊城邑民饑十月丙戌嵗入氐主后有喜亦主赦二年正月戊寅月入東井主風雨七月辛巳太白犯輿鬼東南星主兵十一月丙子填犯亢距星主逆臣有謀五榖傷民流亡三年二月辛卯熒惑入天籥主防姦盗或火五月癸巳熒惑退犯天江主旱九月月掩天關主有亂臣更天子法令或典司闗津者有罪十月戊午熒惑犯壘壁陣西北星主兵四年正月乙未月犯天闗主有亂臣更法令亦主掌闗津者有罪四月犯天江主津梁不通八月甲子犯壘壁陣西第一星主軍兵憂十一月丁亥辰犯罰南一星宜察獄五年正月乙丑熒惑犯天江東第一星主大旱或大水六月己酉太白犯畢距星主兵起將有咎七月癸巳月犯羽林軍西第一星主兵出十一月戊午熒惑犯外屏西第二星主民不安六年正月甲子月犯東咸西南第二星主隂謀及民饑六月癸未太白犯東上相主相有咎亦主兵䘮七月丙寅太白犯南斗距星主國有兵事亦主外國有使来十月辛巳月犯外屏西第五星主人民不安七年正月丁未填犯天江東北第一星主江河決溢土功興六月月犯天江北星主邊逺道路阻塞十一月熒惑犯左執法又入太微垣主大臣有憂八年正月癸卯月犯司怪北第一星主有怪異事閏四月甲戌太白犯輿鬼西北星主大將憂民多疫七月庚午月犯狗國西南星主三韓鮮卑烏丸獫狁之屬有咎十月戊戌月犯外屏西第三星主民憂九年正月辛未月犯長垣第一星主胡夷兵動六月辛卯嵗入東井有軍在外亦有川瀆之事七月丁丑嵗犯天罇西星主貧餒闕食十月庚子月犯五諸侯西第四星主將相憂十一月乙亥月犯箕東北星主暴風雨十年四月丙戌熒惑犯輿鬼東北星主魚鹽貴九月己酉太白入太微垣主廷尉丞相御史有黜者十二月辛卯月掩輿鬼西北星主將有咎或大臣黜元豐元年四月庚申月入南斗主大臣辱女主災七月戊戌熒惑犯天罇西北星主秦分民饑十二月壬戌太白犯建西第二星主大臣互譖毁外國有使至二年二月壬戌熒惑入犯輿鬼東北星主兵馬出四月己卯月犯日星下主下不順宜以赦宥應之七月癸未月犯雲雨東北星主多雨十二月庚戌犯軒轅太民主大臣黜三年六月癸巳太白犯畢距第二星主邊兵敗七月丁卯熒惑入東井主無兵兵起有兵兵罷十二月癸未月犯建西第三星主大臣相譖四年三月壬辰月入東井主貴臣死七月庚戌熒惑入氐主有賊臣宜宫中慎火十月壬戌月犯雲雨西北星主多雨水五年二月辛酉月犯水位第一星主水流溢七月乙巳熒惑入輿鬼主金玉用有大赦秦分没軍殺將十月丁巳月入犯雲雨西南星主雨澤成萬物六年三月己亥熒惑犯東上相主大臣有咎六月戊戌熒惑入犯氐東南星主慎火八月癸未熒惑犯天江南第二星主旱十二月庚辰月掩犯畢距第二星主邊兵動女主憂七年三月壬寅月犯畢距星主多雨四月丁亥嵗犯羅堰主糧貴十月甲午月犯心大星主王者憂八年二月乙酉熒惑犯東咸主人民有疾疫旱災六月丙子月犯建第四星主大臣相譖八月甲戍太白犯軒轅軒轅者黄帝之神黄龍之體后妃之所主職今太白行犯以所主占之十一月癸卯月犯畢大星主大臣死又主有邊兵若七日有風雨即解之哲宗元祐元年二月甲戌月犯左執法主大臣有憂又主大臣有免者四月辛丑月犯罰主掌罰者憂八月月犯畢大星主多雨十月丙午月入太微垣犯右執法主大臣有憂將相有免者二年三月月犯建主有兵又主大臣相譖五月戊辰月犯羅堰星主水溢十一月甲戌月犯罰主罰贖平三年七月甲子嵗犯天罇主給濟貧乏十二月甲寅熒惑犯天籥主掌管籥官有咎宜察闗鍵四年三月丁亥月犯天江主河津不通四月犯氐主兵起將臣有憂七月乙亥犯罰星主罰贖平九月辛卯月入太微垣軌道吉五年正月辛巳月入太微垣犯内屏主輔臣有免者四月庚寅月掩畢為女主有憂當以赦令除咎十月庚子月犯羽林軍主大臣有憂亦主兵將黜六年三月庚辰填星犯東井主水旱不時四月己亥填星入太微行軌道吉七年三月戊戌月入氐主政令行臣下忠孝四月癸亥月犯進賢宜舉俊賢搜遺逸七月辛未月犯司怪主怪異事十二月壬戌太白犯雲雨主有雨澤萬物成八年正月丙申月犯進賢主進賢之官有憂六月己酉太白犯諸王東第二星主宗臣憂七月甲申月犯心距星主大臣憂十月月犯外屏主民人憂紹聖元年二月月犯斗主風雨不時四月丙午月犯五諸侯第二星主大臣憂八月丙子月犯箕東北星主多風及糴貴十一月丙午太白犯咸西南第一星主兵二年正月甲寅月犯角距星主大臣誅有獄事五月己酉犯箕東北星主多風又主后憂災八月犯外屏西第一星主民不安十一月犯輿鬼東北星主民多疾三年二月庚辰太白入昴主大赦七月癸巳太白入東井將軍惡之先起兵者敗又主有大水十一月壬戌月犯鈎星主多盜四年二月己亥月犯天門東星隂陽不調四月庚子犯西星主盗賊劫掠人民七月丁巳熒惑掩犯積薪主大旱兵起十月癸巳填犯進賢主賢者得罪黜免元符元年正月丙辰填犯進賢占同上六月乙未月犯雲雨主多雨澤七月乙丑熒惑犯氐宜詧臣下及修火禁十月甲午辰入氐主貴臣暴憂法官有獄事二年正月壬戌犯天門東星主隂陽不順四月丁丑月犯井東扇北第三星主水官有黜刑政不平又主風雨七月壬子犯建西第三星主大臣相譖十月己未熒惑犯進賢主賢臣退黜三年正月辛未熒惑犯氐東南星主君憂又主將相有憂四月壬寅熒惑退行犯亢南第一星主亂兵疾疫九月太白犯南斗西第二星主小人在位兵革欲興十二月丙辰月入氐主天下兵起徽宗建中靖國元年二月癸卯月犯軒轅右角太民主大饑人流女主有憂四月乙巳月犯罰星主法令曲八月丁酉月犯建第二星主大臣相譖十月甲辰熒惑犯平道西第一星主隠士升又主天下大亂崇寧元年正月己巳月犯水位西第四星主水溢流閏六月庚辰太白犯進賢主賢者黜十月乙丑月入畢口主君臣憂兵二年二月壬戌熒惑犯昴主胡人聚中國匈奴兵起五月己亥月犯雲雨東北主雨不時八月丙子太白入氐主糴貴十月甲子熒惑犯亢南第一星主有亂臣三年三月癸亥太白犯昴距星主胡王死又主臣有謀易政令四月壬子熒惑犯壘壁陣西第五星主兵大起七月戊戌太白犯積薪主大旱民流十一月己丑月入太微垣主有姦人在主側四年三月壬寅熒惑犯井鉞主斧鉞用七月庚辰太白犯罰主賞罰失平十二月填犯建第二星主臣下相譖五年正月戊申月入太微垣主四夷兵盛五月辛丑月入氐主兵動八月丁卯熒惑犯天街南主邊兵動十月乙丑熒惑犯昴東南星主饑疫大觀元年正月丁未太白犯外屏主障蔽四月戊午太白入井主政急民流五月甲午月犯進賢主蔽賢九月己丑月犯天籥主闗籥不禁十二月丁未月犯建主大臣相譖二年二月癸巳月入太微垣犯内屏主姦人在國四月癸巳月犯壘壁陣主用兵七月癸酉熒惑犯司怪主水旱不時九月壬申月入太微垣主四夷兵盛三年二月己丑月入太微垣犯内屏主上下失禮輔臣免五月辛亥太白犯天狗主隂謀十二月丙申嵗犯外屏主障蔽四年正月戊申月犯天街主邊兵動六月乙亥月犯進賢主賢人退閏八月丙午填犯泣主䘮十月庚寅太白犯江主水政和元年二月乙卯月犯南斗主大臣后妃憂六月己酉月入羽林軍主兵起七月壬申月犯狗主守禦不嚴二年六月辛亥熒惑入井主先舉兵者将死九月丁卯嵗犯鬼主君憂民饑三年正月乙亥熒惑犯太微垣内屏主上下失禮輔臣免六月戊午太白入太微垣犯右執法凶九月庚寅熒惑犯天江主旱十月乙丑月犯鬼主秦分有兵四年十一月庚寅熒惑犯進賢主賢人得罪貶死五年正月乙亥熒惑犯亢主有亂臣疾疫六月壬子月犯狗主守禦臣憂九月甲申月犯昴主匈奴憂十月丙辰月入鬼主君臣憂六年閏正月嵗犯亢主佞臣用六月辛未月犯心大星主人主憂七月辛亥嵗犯亢主臣為亂十二月癸亥入氐主賊臣在内七年正月丁酉熒惑犯鍵閉宜戒行幸七月乙未熒惑犯天江主旱十月丙辰填星犯畢主兵起西北而不戰八年正月丁亥熒惑犯外屏主蔽障六月己巳月犯雲雨主雨澤九月癸亥熒惑犯進賢主賢者得罪十月戊申熒惑入氐主宫中火災宣和元年九月熒惑犯壘壁陣主兵作十一月己未月犯鬼主將軍死大臣黜國有憂二年正月己酉月犯畢主天下有變令十月庚辰熒惑犯亢主有亂臣民多疾三年正月戊申熒惑犯南斗主破軍殺將暴兵起十一月丙戌月犯罰主刑罰用四年三月甲戌嵗犯􅄧主北征胡五年正月壬戌月犯畢主天下有變令五月甲寅太白犯鬼主有兵謀九月己未熒惑犯司怪主水旱不時十一月太白犯房主人君将相憂六年正月己巳月入氐主兵大作十月丁巳月犯畢主天下有變令刑急臣叛七年五月壬辰太白犯畢主邉兵起民饑六月丁巳月入羽林軍主兵興十二月丙辰月入太微垣主君弱臣强四夷兵盛欽宗靖康元年三月庚戌月入太微垣主君弱臣强四夷兵盛五月壬申太白入鬼犯積尸氣主亂臣在内兵起大臣將軍誅七月己卯月入羽林軍主兵起十月丙辰月入太微垣主四夷兵盛十一月庚午太白犯亢主君自將兵二年二月丁卯月入太微垣主大國破亡月犯五緯神宗治平四年正月辛亥月犯辰主上卿憂八月辛未犯太白主將二心癸酉掩嵗主邉兵九月壬寅犯太白主鄭楚分兵十月戊辰掩填星主楚分流民又犯熒惑主荆楚兵熙寧元年二月丁巳犯填主宫女出楚分流民四月壬子犯嵗主楚分兵或饑五年四月癸亥犯填占同閏七月庚申犯熒惑主察䜛臣或貴人有咎六年九月甲辰掩太白主燕分兵十年九月庚午犯嵗主周分饑十二月壬辰犯嵗占同仍有邉兵元豐七年十月甲午犯辰主兵校尉有憂八年八月戊寅犯填主後宫有出者十一月戊戌犯嵗主衛分饑民流亦為邉兵庚子犯填主後宫有憂及民流土功興哲宗元祐三年七月庚午犯太白主秦分兵十月壬辰犯嵗四年三月丙子又犯皆主秦分兵饑七月辛卯犯填十月癸丑掩之皆主後宫有出者六年九月癸卯犯熒惑主有兵十二月甲戌掩嵗主鄭分饑邉兵動八年十二月丁巳犯熒惑主有兵戰小吏憂紹聖元年六月甲戌犯太白主秦分兵九月辛酉犯填十二月癸未又犯皆主後宫宜崇福及主民流二年正月庚戌又犯主周分下陵上及後宫憂四月壬申又犯主民流三年九月戊戌犯嵗主齊分饑有邉兵四年七月丁丑犯熒惑主兵戰小吏憂元符二年八月壬辰犯嵗十一月辛巳十二月戊申又犯皆主晉分民流饑三年六月癸夘犯熒惑主小吏死貴人出大將亡徽宗建中靖國元年五月辛未犯填主下犯上后災民流亡崇寧元年七月丁亥犯太白主强侯作難國戰不勝民靡散五年二月戊子犯熒惑主兵起大将死貴人出大觀二年十二月戊子犯熒惑占同四年七月戊午犯嵗主邉兵動民饑流亡政和元年正月己巳犯嵗占同宣和元年正月乙夘犯填主下犯上人民流三年八月戊申犯熒惑主兵起小吏死大将亡貴人出四年八月庚戌犯填主下犯上後宫災民流亡七年十一月乙酉犯熒惑主貴人出兵起將亡髙宗建炎三年三月乙未月入氐占曰兵動是夜土犯亢占曰臣有謀是月苗𫝊劉正彦作亂至秋伏誅五月丙午嵗星逆行犯房占将相有憂扵是呂頤浩相杜充降敵七月辛巳太白入太微垣占邪臣伏誅次年張浚奏誅范瓊癸巳嵗星犯鈎鈐占曰王者失政近臣起亂是冬上将謀航海避敵禁兵謀作亂伏兵誅之八月癸丑熒惑入鬼犯積尸占賊在君側又軍死将亡扵是敵大入浙西殺人如麻閏八月丙戌太白犯心占兵興殃在貴人又主王者惡之次逼明堂纔一舍上甚懼壬寅稍北歸黄道甲子熒惑犯太微垣占上将為天子所誅丙寅熒惑入太微垣占天下不安草澤天文耿静言熒惑行當在已今超過午入太㣲扵法為凶十一月乙巳熒惑出太微垣東左掖門己酉犯垣東上相徘徊不去是嵗敵大入江浙湖南上航海幸温台来春始還越四年正月癸亥太白犯建星占大臣相譖八月辛夘犯五諸侯占将相憂九月趙鼎罷紹興元年正月乙亥朔熒惑入羽林占有叛臣起是春李成叛二月癸夘月犯五諸侯西第五星占将相憂四月癸酉月犯權星占主有逆賊火災冬越州火辛巳月犯心占大臣有憂未㡬范宗尹罷相八月辛未月復犯心未㡬張浚罷秦檜相癸酉月犯昴占敵主死期不出五年應在四年烏竒邁殂九月乙巳月入羽林占兵起己巳月犯太白占强國以戰敗十月吴玠大敗烏珠扵和尚原十月丁丑熒惑犯執法占大臣憂庚辰順行出太微垣東北掖門十一月辛丑熒惑犯進賢占賢者得罪免黜先是婁寅以言宗社大計擢監察御史秦檜惡之諷言者論而黜之二年正月丙申熒惑入氐占天子失其宫是月上移蹕臨安二月辛未月犯五諸侯第四星占将相有憂扵是呂頤浩與秦檜不協檜罷相五月乙亥熒惑犯氐東南星占将相有憂又有火災未㡬臨安火七月甲戌熒惑犯天江占曰大旱次年旱三年七月癸亥月入南斗行魁中占大臣憂其後呂頤浩罷十一月丁巳月犯壘壁陣西第六星占兵起是月偽齊引兵㓂淮烏珠聚兵㓂蜀吴玠擊却之辛未熒惑犯氐占多火災扵是臨安四月火災十二月辛未月犯昴占敵主死應在次年丙申月犯鬼占秦分有兵次年春烏珠犯大散闗吴玠破之辛丑熒惑犯房北第一星占將相憂又曰馬貴扵是吴玠始通西馬四年二月壬戌月犯東諸侯第一星占將相憂其秋朱勝非罷五月辛亥熒惑犯輿鬼占有兵謀斧鉞用十月丙子熒惑犯壘壁陣西北戊戌又犯第六星占兵大起是日上親征發臨安以殿前司及神武中軍従十二月丙戌月犯昴西北星占敵主死天子破匈奴不出三年扵是金主烏竒邁殂亶代立五年二月庚戌填犯建星太白四月壬子嵗星犯井鉞占斧鉞用十一月己丑太白犯壘壁陣占兵起甲午月入井占如之扵是大舉伐劉豫十二月己夘熒惑犯天江占旱次年旱六年五月辛夘太白犯畢上謂輔臣曰金星犯畢占邉有敗兵當諭張浚令諸帥戒飭守邉者雖自有分野亦不得不戒明年六月酈瓊殺呂祉以其軍降劉豫六月己未月犯􅄧占敵主死明年尼堪死十二月辛酉嵗入鬼占大臣災相黜扵是趙鼎罷七年正月癸亥月逆行入鬼犯積尸占王者憂國有兵䘮三月壬午亦然扵是徽宗寧徳訃至三月辛巳月犯牛宿西第一星占臣将黜又曰大臣將兵扵是冬張浚罷趙鼎復相呂頤浩守建康四月甲午熒惑入井占兵旱是秋旱五月丁丑月犯建星占大臣相譖時張浚與趙鼎不協上疏毁之癸酉月犯牛南星占下有憂将軍死厥應在九年吴玠薨十年岳飛被譖死也八月丙申月犯房北第二星占次相憂扵是張浚以酈瓊叛罷相俄貶永州十二月戊午金入羽林軍占天子以軍自守其夜月犯房北第一星占將相憂扵是始議講和九年正月辛夘月入東井其四月癸丑六月乙亥八月丙申十月甲子十二月己未皆復犯井占諸侯貴人死是嵗呂頤浩吴玠李綱相繼薨二月己巳月入氐其四月癸亥六月戊午八月癸丑亦如之占兵動扵是金人始歸河南陕西俄復興兵取之四月癸亥月犯氐占天下兵起六月戊午復入氐是嵗金人既敗盟諸將各出師敗之九月壬戌月犯天髙占將死臣誅十二月丁巳復犯天髙次年趙鼎再貶岳飛下獄死十年正月戊子木入氐占有赦甲辰留其七月辛未復入氐占當有善令其嵗太平年豐立后有喜後二年立后吴氏三月辛夘月入氐六月七月八月十二月皆入氐同占兵起是嵗烏珠再入㓂諸將進取大㨗十一年十一月乙夘月入太微垣占大臣有憂將相有免者若期三年有為天子所誅扵是岳飛下獄死韓世忠罷丙辰月犯進賢占賢者得罪明年胡銓貶張戒勒停自此賢者多貶黜死亡不可勝數十二年月犯氐井畢入太微者相仍扵是張浚罷劉光世薨十四年正月庚申月入畢掩大星占隂國有憂是嵗金人伐蒙不克乃冊之為帝十七年五月壬戌木順行入東井占天下有川瀆之事扵是浙西建康同日大水九月己夘金入太微垣占屬楚地扵是漳州盗起十九年正月辛丑火犯亢占大人多疾有不臣其年秦檜始以病告七月戊申火星犯南斗占丞相有事次年施全刺秦檜不中而誅八月戊午月入南斗十月辛未火順行犯壘壁陣次年信州建州皆有盗起二十年七月己夘月犯角宿距星占大人憂有獄事是時連起大獄八月癸亥月犯畢宿距星占敵主死二十一年十一月戊申月犯昴星占敵主死将軍死皆為完顔亮将亡之兆二十二年正月丙辰月犯心東星占大臣有憂是嵗八月韓世忠薨二十三年三月戊申月犯南斗是嵗浙西水二十四年六月丙午月犯羅堰是秋大水十月乙未月掩建星占大臣相譖二十九年正月乙亥月犯氐距星占女后後宫災是秋顯仁太后崩二月癸夘入氐方口内占兵動是嵗凡四扵是金主亮遷汴謀叛盟七月辛亥火星入鬼宿犯積尸氣占兵䘮旱災兵在西北軍死將亡次年逆亮兵五十萬屯宿泗謀入㓂三十年正月戊戌月入氐占兵動二月乙丑亦如之是嵗凡五六月壬申金星順行入東井占先起兵者敗將軍犯罪政急民流明年金亮入宼三十一年正月甲申月犯東井是嵗凡七二月入氐是嵗凡三皆兵兆也七月壬辰金星順行犯角距星占天下大戰道路不通三十二年正月戊寅嵗星退行入太微垣占軌道吉又曰天下喜或有赦其年五月乙未木順行入太微垣占同是年孝宗受禪庚申月入井是嵗凡八孝宗隆興元年二月己巳月入東井是嵗凡三癸夘月入羽林軍為兵起是嵗凡三二年正月戊子月入羽林軍是嵗凡八其冬敵犯淮南辛亥熒惑犯房宿占將軍亂國君將相憂扵是張浚罷未㡬洪适罷己巳月犯長垣其閏十一月戊辰亦如之占長垣四星占主邉界城墻以備敵兵扵是金人使来欲割四郡卒與之乾道元年三月辛未月入羽林軍是年凡八二年六月乙酉月入斗八月庚辰亦如之占女后憂太子辱九月庚戌月犯哭星主悲泣事十一月戊午月犯權星占曰女后憂明年皇后夏氏崩太子愭薨三年四月壬申月犯五諸侯占將相憂是年吳璘薨癸丑月掩南斗占大臣太子辱風雨不時丁丑月犯房占為將相憂庚辰月復入南斗魁是嵗兩浙水旱其冬葉顒魏杞罷相四年二月丁巳月入羽林軍是嵗凡十六年二月丁未月入羽林占為兵起是嵗凡三九年六月癸亥火星犯太微垣西扇右執法星占大臣有憂十月庚午木犯太微垣右執法占將相執法臣憂十二月亦如之眀年虞允文以帥蜀薨扵興元淳熙二年七月戊子月犯房宿占將相執法憂次年葉衡貶四年七月辛酉火犯氐宿占將相憂眀年龔茂良罷貶五年正月壬戌土星留守諸王星明年魏王愷薨六年十一月己未月犯木占齊分嵗荒民流亡眀年江浙淮西湖北旱除民賦賑恤之八年正月己未月入東井是嵗凡六閏三月丁未月入太微垣是嵗凡六十三年七月甲申月掩心宿八月己夘月掩大星十四年三月戊午月行犯心宿距星占大臣有憂是冬梁克家薨四月辛夘月入羽林軍是嵗凡三五月月犯心宿大星又犯中央星占人主有憂是年冬髙宗上仙六月庚寅月行入斗宿内占大臣太子憂是冬太子參决辭不許十月壬辰火星留守五諸侯占諸侯貴人死次年恩平郡王璩薨十五年正月壬子木星行犯房宿北第一星占將相憂二月己巳木星留守房宿占有赦天下和平次年光宗受禪大赦六月己丑太隂犯􅄧占敵主死明年正月金主雍殂十六年正月辛丑土星留守氐宿方口内占守氐有徳令土功興又云皇后太子喜嵗安扵是二月立后光宗紹熙元年五月己未太隂行在斗宿距星西北占風雨不時臣將黜死女后憂二年八月庚寅火星入鬼宿犯積尸占在西北軍將死亡三年正月己酉火星入太微垣内留守占太微垣在翼軫之宿北天子之庭五帝之座十二諸侯之府今熒惑入中留天子惡之是時上有疾久不視朝四月丁巳火星犯太微垣右執法星占有逆賊宫中不安八月甲辰金星行犯權星左角少民星占女后宗族災又云大臣當之四年十月丁酉火星入太微垣内徘徊内屏者凡四閲月占宫中不安嵗饑又曰有䘮次年六月孝宗上仙十一月己巳火星犯上相星占上相有罪次年留正黜五年八月壬辰火星犯房宿占將相憂扵是羅㸃卒次年趙汝愚貶死十一月庚戌木犯諸王星占諸侯宗臣災寧宗慶元元年六月丁夘金入東井占先起兵者敗將軍死政急民流九月丙戌火入太微垣占有逆賊二年八月乙亥木犯權星次年慈福太皇太后崩三年二月辛亥月入畢占隂國有憂天子用誅罰急臣叛將相災或邉兵入四年三月乙巳木星入太微垣犯右執法六月乙丑土星犯壘壁陣星西方第五星占爲兵起十月戊午月行入太微垣内至次年凡四並同此為四裔姦人来聽伺之象嘉泰元年五月丁丑火星細行不行黄道為死色占為變色有䘮是嵗臨安大火三日乃息三年七月戊子木星行入羽林軍四年三月壬申月犯權星占有逆賊并火災六月戊申入羽林軍七月丙子又入羽林軍時出師北伐開禧元年正月己夘火星留守五諸侯星従西第四星占諸侯兵死是嵗吴曦反扵蜀俄伏誅三月己巳月入太微垣四月戊申月入羽林軍二年六月丙寅月入羽林軍内占為兵起七月乙未木星犯井宿鉞星占為斧鉞用又為亂兵起三年二月癸丑月犯五車東南星占兵起駕道不通己未火星退留守權星占女后有憂扵是成肅太皇太后崩九月乙亥木星順行入鬼宿在積尸氣鑕星西南占大臣災又犯鑕星兵䘮王者疾斧鉞用是冬侂胄誅斬蘇師旦嘉定元年二月丙午月犯􅄧占敵主死次年金人戕其主允濟二年二月乙酉火星退行犯太微垣上相星三月己酉火星留守太微垣中占為大臣有憂扵是五月有羅日愿謀變六月甲申月行掩土星是為月蝕土星占月犯土星則其地下犯上又曰凡月蝕五星其分有災或亡地扵是李元礪反扵郴州連破數縣十月乙丑月食火星占月食火星其地亂五年正月丁巳月入東井扵是久雨八年正月辛未月入東井占水旱不時是夏大旱蝗九年正月丙寅月入東井扵是兩浙江東有水災十年七月乙酉金星行犯角占天下大戰道路不通是冬金人冦四川眀年山東李全来歸十一年八月己丑木星留守東井占為三軍大起扵是金人犯随棗陽十二年四月壬申土退行入氐宿方口内占天下有兵期不出四年又曰將有亡地者扵是金人䧟興元六月庚辰金星順行入井占大水先起兵者敗將軍犯罪政急民流是嵗莫簡反扵蜀十三年二月庚寅木星順行犯鬼占民饑人君憂是嵗秋景獻太子薨十六年正月戊申木星留守氐宿距星占嵗豐后有喜甲寅降生皇子雜星變秦末項羽救鉅鹿枉矢西流枉矢所觸天下之所伐射滅亡象也物莫直扵矢今蛇行不䏻直而枉者執矢者亦不正以象項羽執政亂也羽遂合従阬秦人屠咸陽凡枉矢之流以亂伐亂也漢孝文後二年正月壬寅天欃夕出西南嵗星之精占曰為兵䘮其六年十一月匃奴入上郡雲中漢起三軍以衛京師八月天狗下梁埜孝景三年七月天狗下占為破軍殺將狗又守禦類也天狗所降以戒守禦其年吴楚反攻梁梁堅城守遂伏尸流血其下中三年六月壬戌蓬星見西南在房南去房可二丈大如二斗器色白癸亥在心東北可長丈所甲子在尾北可六丈丁夘在箕北近漢稍小且去時大如桃壬申去凡十日占曰蓬星出必有亂臣房心間天子宫也是時梁王欲為漢嗣使人殺漢爭臣袁盎漢按誅梁大臣斧鉞用梁王恐懼布車入關伏斧鉞謝罪然後得免孝昭始元中蓬星出西方天市東門行過河鼓入營室中梁成恢曰蓬星出六十日不出三年下有亂臣戮死扵市詳見五星凌犯元鳳五年四月燭星見奎婁間占曰有土功胡人死邉城和其六年正月築遼東元菟城二月度遼将軍范明友擊烏桓還莽地皇四年王尋王邑圍昆陽有營頭星墮軍上詳見雲氣門漢靈帝熹平二年四月有星出文昌入紫微宫蛇行有首尾無身赤色有光炤垣墻占曰文昌為上將貴相後六年司徒劉羣為中常侍曹節所譖下獄死光和中國皇星東南角去地一二丈如炬火狀十餘日不見占曰國皇星為内亂外内有兵喪其後黄巾賊張角燒州郡朝廷遣將討平斬首萬餘級中平六年宫車晏駕大将軍何進令司𨽻校尉袁紹私募兵千餘人隂跱雒陽城外竊呼并州牧董卓使將兵至京都共誅中官對戰南北宫闕下死者數千人燔燒宫室遷都西亰及司徒王允與将軍呂布誅卓卓部曲將郭氾李傕旋兵攻長安公卿百官吏民戰死者且萬人天下之亂皆自内發晉恵帝永熙元年三月妖星見南方占曰妖星出天下大兵將起是月賈后殺太子趙王倫尋廢后殺張裴又廢帝自立扵是三王並起迭捴大權元康四年九月甲午枉矢東北行竟天六年六月景午夜有枉矢自斗魁東南行按占曰以亂伐亂北斗主執殺出斗魁居中執殺者不直之象也是後趙王殺張裴廢賈后因自簒盗以至屠滅以亂伐亂之應也一曰氐帥齊萬年反之應也光熙元年五月枉矢西南流時司馬越西破河間兵奉迎大駕尋收繆允何綏等肆無君之心天下惡之及死而石勒焚其屍柩是其應也元帝太興三年四月壬辰枉矢出虛危没翼軫占曰枉矢所觸天下之所伐翼軫荆州之分野太寧二年王敦殺譙王承及甘卓而敦又梟夷是其應也穆帝升平二年十二月枉矢自東南流扵西北其長半天四年十月庚戌天狗見西南占曰有大兵流血孝武太元二十年九月有蓬星如粉絮東行南厯女虛至哭星占曰蓬星見不出三年必有亂臣戮死扵市時王國寳交構朝廷二十一年帝崩安帝隆安四年王恭等興兵朝廷殺國寳梁武帝普通元年九月乙亥有星晨見東方光爛如火占曰國皇見有内難有急兵反叛其三年義州刺史文僧朗以州叛陳後主至徳元年正月壬戌蓬星見占曰必有亡國亂臣後帝扵太皇寺捨身作奴以祈㝠福不恤國政用施文慶等以至亡國隋文帝仁夀四年六月庚午有星入扵月中占曰有大䘮有大兵亡國破軍殺將七月帝崩煬帝大業十二年九月戊午有枉矢出北斗魁委曲蛇形注扵南斗占曰主以兵去天之所伐亦曰以亂伐亂後二年宇文化及弑帝僭號唐武后光宅元年九月二十九有星如半月見西方肅宗上元元年閏四月二十一日妖星見扵西方長數丈至五月滅昭宗乾寧元年七月妖星見非彗非孛不知其名時人謂之妖星或曰惡星天復元年五月有三赤星各有鋒芒在南方既而西方北方東方亦如之頃之又各増一星凡一十六星少時先従北滅占曰濛星也見則諸侯兵相攻己巳夕有星當箕下如炬火炎炎上衝人初以為燒火也髙丈餘乃隕占曰機星也主天下有亂天祐元年四月有星状如人首赤身黒在北斗下紫微中占曰天衝也天衝抱極泣帝前血濁霧下天下寃後三日而黒風晦暝二年四月庚子夕西北隅有星類太白上有光似彗長三四丈色如赭辛丑夕色如縞或曰五車之水星也一曰昭眀星也三年十二月昏東方有星如太白自地徐上行極緩至中天如上弦月乃曲行頃分之為二占曰有大孽後唐眀宗天成元年三月惡星入天庫流星犯天棓宋髙宗紹興三十一年六月己巳北斗天權星東北有一小星出光似彗太史指以為含譽非也孝宗淳熙十四年五月有星出濁際大與日等入時與日相摩蕩髙宗在徳夀宫登臺見之召䏻天文者修武郎王道問之道跪奏曰是謂蓬星見則有兵然分非南朝金人應之耳出語所親曰非兵也䘮爾某不敢言是冬髙宗不豫遂上仙扵是金人亦有大䘮敵亦應天道云按雜星變者出扵五緯彗孛客星之外前史間載之至宋天文志則失扵紀録而所書流星最多往往錯見扵流星條下矣獨中興志有此二則故載之扵此而餘則見流星門云文獻通考卷二百九十
