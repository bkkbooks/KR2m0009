body:
  text: 文獻通考卷三十六鄱陽馬端臨貴與著選舉考九舉官虞書帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉敷納以言明試以功車服以庸臯陶曰都亦行有九徳亦言其人有德乃言曰載采采載行采事也稱其人之有徳必舉事以為驗禹曰何臯陶曰寛而粟寛𢎞莊栗柔而立愿而恭亂而敬亂治也擾而毅擾順也毅果也直而温簡而亷性簡易而有亷隅剛而塞剛斷而實塞强而義彰厥有常吉哉明九徳之常以擇人而官之日宣三徳夙夜浚明有家九徳中有其三宣布夙早浚思也卿大夫稱家言能日日布行三徳早夜思之可以為卿大夫日嚴祇敬六德亮采有邦嚴敬其身行六徳可為諸侯翕受敷施九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝周官舉能其官惟爾之能稱匪其人惟爾不任按古人之取士蓋將以官之然則舉士之與舉官非二途也三代之時法制雖簡而考核本明毁譽既公而賢愚自判往往當時士之被舉未有不入官者也降及後世巧偽日甚而法令亦滋多遂以科目為舉士之途銓選為舉官之途二者各自為防閑檢校之法至唐則以試士屬之禮部試吏屬之吏部於是科目之法銓選之法日新月異不相為謀蓋有舉於禮部而不得官者不舉於禮部而得官者則士所以進身之塗轍亦復不一不可比而同之也於是立舉士舉官兩門以統之然三代兩漢之時二者本是一事故摭其事實原其法意之詳於士者入舉士門詳於官者入舉官門然大槩未嘗各自立法如後世之為也故所紀多互見必參考然後得之秦自孝公納商鞅策富國强兵為務仕進之塗唯闢田與勝敵而已至始皇遂平天下漢髙祖十一年詔曰賢士大夫既與我定有天下而不與吾共安利之可乎有肯從吾游者吾能尊榮之布告天下其有意稱明徳者御史中執法郡守必身勸勉遣詣丞相府署行義及年有而不言覺免詳見舉士門景帝詔曰有市籍貲多得官亷士寡欲易足今貲算十以上乃得官貲少則不得官朕甚憐之減至四算算得官詳及注見貲選門漢制凡郡國之官非傅相其他既自署置又調僚屬及部人之賢者舉為秀才亷吏而貢於王庭多拜為郎居三署無常員或至千人屬光禄勲故卿校牧守居閑待詔或郡國貢送公車徵起悉在焉光禄􅈴復於三署中銓第郎中歲舉秀才亷吏出為他官以補闕員武帝元封五年以名臣文武欲盡詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之累而立功名負俗謂被世譏論也夫泛駕之馬跅㢮之士亦在御之而已其令州郡察吏民有茂材異等可為將相及使絶國者先公曰汲黯常諫帝曰陛下求賢甚勞未盡其用輒已殺之以有限之士供無已之誅臣恐天下賢材將盡陛下誰與共為治乎帝笑曰有材不肯盡用與無材同不殺何施蓋至是名臣文武欲盡則黯之説十餘年而遂驗矣帝徒知殺之之易而不知招之之難也無怪乎詔下而無有應舉者雖然帝於是春秋髙而血氣亦寖定矣元帝永光元年詔丞相御史舉質樸淳厚謙遜有行者光禄歲以此科第郎從官師古曰始令丞相御史舉此四科人以擢用之而見在郎及從官又令光禄每歲依此科考校定其第髙下用知其人賢否也按西都舉人之法如孝亷及賢良方正有未仕而舉者有既仕而舉者至是復詔舉此四科盖未仕者則以此開選舉之門而既仕者就以此定考課之法也成帝陽朔二年奉使者不稱詔丞相御史與中二千石二千石雜舉可充博士位者使卓然可觀元延元年詔以日食星隕令北邊二十二郡舉勇猛知兵法者各一人哀帝建平元年詔大司馬列侯中二千石州牧守相舉孝弟淳厚能直言通政事延於側陋可親民者各一人東漢之制選舉於郡國屬功曹於公府屬東西曹於天臺屬吏曹尚書亦曰選部光武建武十二年詔三公舉茂材各一人亷吏各一人左右將軍歲察亷吏各二人光禄歲舉郎茂材四行各一人察亷吏三人中二千石歲察亷吏一人監御史司𨽻州牧歲舉茂材各一人改前漢常侍曹尚書為吏部尚書其所進用加以歲月先後之次又詔三公以四科辟召見辟舉門舊制光禄舉三署郎以髙功久次才德尤異者為茂材四行四行淳厚質樸謙遜節儉也明帝永平九年令司𨽻校尉部刺史歲上墨綬長吏視事三歲以上理狀尤異者各一人與計偕上章帝時詔復用前漢丞相故事以四科辟士凡所舉士先試之以職乃得充選其徳行尤異不宜試職者疏於他狀舉非人兼不舉者罪武帝因董仲舒之言立制故事在丞相府今復用之第一科補西曹南閣祭酒二科補議曹三科補四辭八奏四科補賊决和帝永元五年詔曰選舉良材為政之本科别行能必由郷曲而郡縣舉吏不加簡擇故先帝明敇在所令試之以職乃得充選又德行尤異不湏經職者别著狀上而宣布以來出入九年二千石曾不承奉恣心從好司𨽻刺史訖無糾察今新䝉赦令且復申敇後有犯者顯明其罰在位不以選舉為憂督察不以發覺為務非獨州郡是以庶官非人下民被傷由法不行故也安帝永初二年詔王主官屬墨綬下至郎謁者其經明任博士居鄉里有亷清孝順之稱國相歲移名與計偕上尚書公府通調令得外補永初五年詔三公特進九卿校尉舉列將子孫明曉戰陣任將帥者安帝時三府任輕陳忠上疏曰今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公延光二年詔選三署郎及吏人能通古文尚書毛詩榖梁春秋各一人順帝陽嘉元年詔曰間者以來吏政不勤故災咎屢臻盜賊多有退省所由皆以選舉不實官非其人令刺史二千石之選歸任三司三公也其簡叙先後情覈髙下歲月之次文武之宜務存厥中二年郎顗上疏曰今選舉牧守委任三府長吏不良既咎州郡州郡有失豈得不歸貢舉者書奏帝復使對尚書顗對曰今選舉皆歸三司非有周召之才而當則哲之重每有選用輒參之掾屬公府門巷賔客填集送去迎來財貨無已其當遷者競相薦謁各遣子弟充塞道路開長姦門興致浮偽非所謂率由舊章尚書職在機衡宮禁嚴宻私曲之意差不得通偏黨之恩或無所用選舉之任不如還在機宻按自光武不任三公事歸臺閣故選舉之任亦在尚書今陳忠之説如彼而郎顗之説復如此要之三公與尚書均是人也得其人則皆能舉賢失其人則皆不免徇私茍欲徇私則何所不至而謂其職在機衡宫禁嚴宻私意不得通疎矣永和三年令大將軍三公舉故刺史二千石及見令長郎謁者四府掾屬剛毅武猛謀謨任將帥者各二人特進卿校尉各一人左雄舉故冀州刺史馮直任將帥直嘗坐贓受罪周舉以此劾奏雄雄曰詔書使我選武猛不使我選清髙舉曰詔書使郡選武猛不使郡選貪汚也桓帝時綱紀隳紊凡所選用莫非情故時議以州郡相阿人情比周乃制婚姻之家及兩州之人不得相臨遂有三互法三互謂婚姻之家及兩州不得交互為官是時史弼遷山陽太守其妻鉅野薛氏女以三互自上轉拜平原相禁網益宻選用艱難幽冀二州久缺而公府限以三互經時不補議郎蔡邕上言曰幽冀舊壤缺職經時而三府選舉踰月不定而坐設三互自坐留閡昔韓安國起自徒中朱買臣出於幽賤並以才宜還守本邦豈復顧循三互限以末制願蠲除近禁無拘三互以差厥中書奏不省靈帝時呂强上言舊典選舉委任三府三府有選參議掾屬咨其行狀度其器能受試任用責以成功若無可察然後付之尚書舉劾請下廷尉覆按虚實行其誅罰今但任尚書或復敇用如是三公得免選舉之負尚書亦復不坐責賞無歸豈肯空自勞苦乎黄琬為五官中郎將陳蕃為光禄勲深相敬待數與議事舊制光禄舉三署郎以髙功久次才徳尤異者為茂材四行時權富子弟多以人事得舉而貧約守志者以窮退見遺京師為之謠曰欲得不能光禄茂材於是琬蕃同心顯用名士平原劉醇河東朱山蜀郡殷參等並以才行䝉舉蕃琬遂為權富郎所見中傷坐免官禁錮曹公初建魏府以毛玠崔琰為東曹掾吏銓衡人物選用先尚勤儉於是天下士人皆砥礪名節務從約損和洽言於公曰天下大器在位與人不可以一節儉也儉素過中自以處身則可以此格物所失或多今朝廷之儀吏有著新衣好車者不謂之亷潔至令士大夫故汙辱其衣藏其輿服朝府大吏或自挈壺飱以入官寺夫立教觀俗貴處中庸為可繼也今崇一槩難堪之行以檢殊途勉而為之必有疲瘁古之大敎務在通人情而已凡激詭之行則容偽矣魏文帝立九品官人之法州郡皆置中正見舉士門漢昭烈既崩諸葛孔明秉政懲惡舉善量能授任不計資叙時犍為郡守李嚴以楊洪為功曹嚴未去郡而洪以才能已為蜀郡守洪門下書佐何祇有才策洪未去郡而祇已為廣漢郡守孫氏有江東選曹尚書主選舉吳郡暨艶性峭刻好清議為尚書以郎署混淆多非其人艶欲激濁揚清别其善否乃覈選三署皆貶髙就下降損數等其居位貪婪志節卑汚者皆以為軍吏置之營府於是怨聲囂然競言艶用私情虧公法艶坐自殺明帝太和之後俗用浮靡遞相標目而夏侯諸葛何鄧之儔有四聰八達之稱帝深所嫉惡於是士大夫之有名聲者或禁錮廢黜以懲之帝曰選舉莫取有名名如畫地作餅不可啖也吏部尚書盧毓曰名不足以致異人而可以得常士常士畏敎慕善然後有名其後士人多務進趨亷遜道缺劉寔著崇譲論以矯之其畧曰古聖王之化天下所以貴譲者欲以出賢才息爭競也夫人情莫不欲已之賢也故勸令讓賢以自明賢也豈假讓不賢哉故讓道興賢能之人不求而自至矣至公之舉自立矣百官之副亦豫具矣一官缺擇衆官所讓最多者而用之審之道也在朝之士相譲於上下皆化之推賢讓能之風從此生矣為一國所讓則一國士也天下所共推則天下士也推讓之風行則賢不肖灼然殊矣故非時獨乏賢也時不貴讓一人有先衆之譽毁必隨之名不得成使之然也雖令稷契復存亦不復全其名矣能否混雜優劣不分士無素定之價官職有缺主選之吏不知所用但按官次而舉之同才之人先用者非勢家之子則必為有勢者之所念也非能獨賢因其先用之資而復遷之無已不勝其任之病發矣夫一時在官之人雖雜有凡猥之材其中賢明者亦多矣豈可謂皆不知讓賢為貴邪直以時皆不讓習以成俗故遂不為耳人臣初除皆通表上聞名之謝章所由來尚矣原謝章之本意欲進賢能以謝國恩也昔舜以禹為司空禹拜稽首讓於稷契及咎繇益譲熊羆伯夷譲䕫龍唐虞之時衆官初除莫不皆譲也謝章之義盖取於此季代不能譲賢虚謝見用之恩而已相承不變習俗之失也夫叙用之官得通章表者其譲賢推能乃通其不能有所譲徒費簡紙者皆絶不通人臣初除各思推賢能而譲之矣譲文付主者掌之三司有缺擇三司所譲最多者而用之此為一公缺三公已豫選之矣且主選之吏不必任公而選三公不如令三公自共選一公為詳也推之四征尚書郡守皆然夫衆官百郡之譲與主者共相比不可同歲而論也賢愚皆譲百姓耳目盡為國耳目夫人情爭則欲毁已所不如譲則競推於勝已故世爭則毁譽交錯優劣不分難得而詳也時譲則賢智顯出能否之羙歴歴相次不可得而亂也當此時也能退身修已者譲之者多矣雖欲守貧賤不可得也馳騖進取而欲人見譲猶却行而求前也夫如此愚智皆知進身求通非修之於已則無由矣浮聲虚論不禁而自止矣齊王嘉平初夏侯元請使官長各考其屬能否而中正則惟考行跡詳見舉士門晉武帝泰始七年詔公卿以下舉將帥各一人太康九年令内外羣官舉清能㧞寒素又令舉守令之才晉依魏氏九品之制内官吏部尚書司徒左長史外官州有大中正郡國有小中正皆掌選舉凡吏部選用必下中正徵其人居及祖父官名山濤為吏部尚書再居職共十有餘年每一官缺輒啓擬數人詔㫖有所向然後顯奏隨帝意所欲為先故帝之所用或非舉首衆情不察以濤輕重任意或譖之於帝故帝手詔戒濤曰夫用人惟才不遺疎逺單賤天下便化之而濤行之自若一年之後衆情乃寢濤所奏甄㧞人物各為題目時稱山公啟事侍中彭權遷當選代按雍州刺史郭奕髙簡有雅量在朝廷足以肅正左右衞將軍王濟才髙羙茂後來之冠此二人誠顧問之秀聖意倘惜濟主兵者驍騎將軍荀愷智器明敏其典宿衞終不減濟博士祭酒庾純强正有學義亦堪此選國學初建王荀已亡純能其事宜當小留粗立其制不審宜爾有當聖㫖者否又尚書令缺宜得其人征南大將軍祜體義立政可以肅整朝廷又云有疾苦者大將軍雖不整正湏筋力戎馬間猶宜得健者征北大將軍瓘貞正靜一中書監荀朂達練事物三者皆人彦不審有可參舉者不王戎遷尚書左僕射領吏部始為甲午制凡選舉皆先治百姓然後授用司𨽻傅咸奏戎曰書稱三載考績三考黜陟幽明今内外羣官居職未期而戎奏還既未定其優劣且送故迎新相望道路巧詐由生傷農害政戎不仰依堯舜典謨而驅動浮華虧敗風俗宜免戎官戎與賈郭通親竟得不坐戎與時卷舒自經典選未嘗進寒素退虚名但與時浮沉户調門選而已王戎有人倫鑒識嘗目山濤如璞玉渾金人皆欽其寳莫能名其器王衍神姿髙徹如瑤林瓊樹自然是風塵表物謂裴頠拙於用長荀朂工於用短陳道寜䋿䋿初六反如束長竿族弟敦有髙名戎惡之敦每候戎戎輒託疾不之見敦後果為逆亂其鑒賞先見如此按西晉時以吏部尚書執用人之柄山濤王戎相繼居是職二人雖賢否不同而皆有知人之鑒巨源啟事中所處分者内則要地外則方面戎所評議者亦一時名勝非後進小吏也蓋當時尚書權任之重如此後來居是職者既未嘗有二公之鍳識且其所權衡不過么麽㣲官所謂唯取年勞不簡賢否使義均行鴈次若貫魚勘簿呼名一吏足矣數人而用何謂銓衡者是也近世葉水心言今之大臣以堂除與人者乃昔日銓選常行之事大臣不知其職任有大於此者而止以堂除為宰相之大權則毋怪銓選為奉行文書之地也使今日銓選得稍稍自用若堂除之選盡歸銓部然後大臣知職任而銓選亦能少助朝廷用人尚書侍郎不虚設矣此語足以箴後來之失然後來之大臣茍非作姦擅權固位植黨者其於用人亦不過謹守資格以為寡過之地毋以異於吏部之銓衡如蕭何之以大將舉韓信狄仁傑之以宰相舉張柬之其事亦寥寥矣九品之法漸敝中正任久愛憎由已遂計官資以定品格天下唯以居位為貴尚書僕射劉毅上言九品始因魏初喪亂是軍中權時之制非經久之典也宜用土斷復古鄉舉里選之法因言九品有八損而官才有三難人物難知一也愛憎難防二也情偽難明三也凡官不同事人不同能今九品不狀才能之所宜而以九等為例以品取人或非才能之所長以狀取人則為本品之所限若狀得其實猶品狀相妨况不實者乎詳見舉士門按既曰九品中正之官設之於州縣是即鄉舉里選之遺意然未仕者居鄉有履行之善惡所謂品也既仕者居官有才能績效之優劣所謂狀也品則中正可得而定狀則非中正可得而知今欲為中正者以其才能之狀著於九品則宜其難憑要知既入仕之後朝廷自合别有考課之法而復以中正所定之品目第其升沉拘矣况中正所定者又未必允當乎宋營陽王時以蔡廓為吏部尚書廓謂傅亮曰選事若悉以見付不論不然不能拜也亮以語録尚書徐羡之羡之曰黄散以下悉以委蔡吾徒不復措懐自此以上故宜互參同異廓曰我不能為徐干木署紙尾遂不拜干木羡之小字黄紙録尚書與吏部尚書連名故云署紙尾宋黄門第五品也文帝元嘉中限年三十而仕郡縣以六周而代刺史或十餘年及孝武即位仕者不復拘老幼守宰以三周為滿時中軍録事參軍周朗上疏曰欲為敎者宜以二十五家選一長百家置一帥男子十三至十七皆令學經十七至二十皆令習武訓以書記圖緯忠孝仁義之禮亷讓恭勤之則授以兵經戰略軍部舟騎之容挽强擊刺之法習經者五年有成而言之司徒習武者三年善藝亦升之司馬若七年而經不明五年而勇不達即更求其言行考其事業必不足取者雖公卿子弟長歸農畝終身不得為吏兼述農桑生植之本及禮敎刑政之端帝省之不悦左衛將軍謝莊以其時搜才路狹又上表曰九服之曠九流之難提鈞懸衡委之選部一人之鑒易限而天下之才難原以易限之鑒照難原之才使國無遺授野無滯器其可得乎請普令大臣各舉所知以付尚書銓用不從帝又不欲重權在下乃分吏部置兩尚書以散其權裴子野曰官人之難尚矣居家視其孝友鄉黨察其誠信出入觀其志義憂難取其智謀煩之以事以求其理臨之以利以察其亷周禮始於學校論之州里告諸六事然後貢於王庭其在漢家州郡積其功能五府舉為掾屬三公參其得失尚書奏之天子一人之身所閲者衆故能官得其才罕有敗事魏晉易是所失𢎞多夫厚貌深衷險如谿壑擇言觀行猶懼弗周况今萬品千羣俄析乎一面庶僚百位專斷於一司於是囂風遂行不可抑止干進務得兼加諂黷無復亷恥之風謹愿之操官邪國敗不可紀綱假使龍作納言舜居南面而治致平章不可必也况後之官人者哉孝武雖分曹為兩不能反之於周漢朝三暮四其庸愈乎顔竣為吏部尚書留心選舉奏無不可後謝莊代竣意多不行竣容貎嚴毅莊風姿甚羙賔客喧訴嘗歡笑答之人言顔竣嗔而予人官謝莊笑而不與人官按自魏晉以來州郡無上計之事公府無辟召之舉士之入仕者始則中正别其賢否次則吏部司其升沉而已所以尚書之權最重而其於人恩怨亦深故賈充與任愷爭權則啟令其典選俾之易生間隙蔡廓以主闇時艱不欲居通塞之地蓋非精於裁鑒者不能稱其任而恬於權勢者多不樂居其位也齊因宋代限年之制鄉舉里選不覈才德其所進取以官婚胄籍為先遂令甲族以二十登仕後門以三十試吏故有增年矯貎以圖進者詳見舉士門左僕射王儉請解領選謂褚淵曰選曹之始近自漢末今若反古使州郡貢計三府辟士與衆共之猶賢一人之意古者選衆今則不然竒才絶智所以見遺於草澤也淵曰誠如卿言但行之已久卒難為改也梁初無中正制年二十五方得入仕天監中制九流常選年未三十不通一經者不得為官詳見舉士門陳依梁制凡年未三十不得入仕唯經學生策試得第諸州迎主簿西曹左奏及嘗為挽郎得未壯而仕諸郡唯正王為丹陽尹經迎得出身者亦然庶姓尹則否有髙才異行殊勲别降恩㫖叙用不在常例凡選無定時隨缺則補官有清濁以為升降從濁得清則勝於遷若有遷授吏部先為白牒列數十人名尚書與參掌者共署奏敇或可或否其可者則下於選曹量貴賤别内外隨才補用以黄紙録名八座通署奏可乃出以付於典名典名書其名帖鶴頭板修容整儀送所授之家其别發詔除者即宣付詔局詔局草奏聞敕可黄紙寫出門下門下答詔請付外施行又敇可付選司行名得官者不必待行名到但聞詔出明日即入謝後詣尚書上省拜受若拜王公則臨軒凡拜官皆在午後初武帝承侯景喪亂之後綱維頽壞制度未立百官無復考校殿最之法但更年互遷驟班進秩法無可稱者後徐陵孔奐繼為吏部尚書差有其序後魏州郡皆有中正掌選舉每以季月與吏部銓擇可否其秀才對策第居中上表叙之文成帝和平三年詔曰今選舉之官多不以次令班白處後晩進居先豈所謂彜倫攸叙也諸曹選補宜各書勞舊才能其後中正所銓但在門第吏部彛倫仍不才舉崔浩為冀州大中正薦冀定相幽并五州士數十人各起家為郡守景穆帝謂浩曰先召之人亦州郡選也在職已久勤勞未答令先補前召外任郡縣以新召者代為郎吏又守宰人宜使更事者浩固爭而遣之髙允曰崔公其不免乎茍遂其非而較勝於上何以能濟郭祚為吏部尚書特絜清重惜官位至於銓授假令得人必徘徊久之然後下筆即云此人便已貴矣由是事頗為稽滯每招怨讟然而所㧞用者量材稱職士論歸之孝文勵精求治内官通班以上皆自考覈以為黜陟見考課門任城王澄為吏部尚書詔澄簡舊臣初魏自公侯以下迄於選臣動有萬數冗散無事澄品為三等量其優劣盡其能否咸無怨言自太和以前精選中正德髙鄉國者充其邊州小郡人物單鮮者則併附他州其在遐陋者則闕而不置當時稱為簡當頗為得人及宣武孝明之時州無大小必置中正既不可悉得其人故或有庸鄙者操銓覈之權而選叙頽紊至正始元年冬乃罷諸郡中正時有以雜類冒登清流遂令在位者皆五人相保無人保任者奪官還役清河王懌以官人失序上表曰孝文帝制出身之人本以門品高下有恒若准資䕃自公卿令僕之子甲乙丙丁之族上則散騎祕著下逮御史長兼皆條例昭然文無虧沒自此或身非三事之子解褐公府正佐地非甲乙之類而得上宰行僚自兹以降亦多乖舛且參軍事專非出身之職今必釋褐而居祕著本為起家之官今或遷轉以至斯皆仰失先准有違明令非所謂式遵遺範奉順成規此雖官人之失相循已久然推其彌漫抑亦有由何者信一人之明當九流之廣必令該鑒氏族辨照人倫才識有限固難審悉所以州置中正之官清定門胄品藻高卑四海畫一專尸衡石任實不輕故自置中正以來暨於太和之日莫不高擬其人妙盡兹選皆湏名位重於鄉國才德允於具瞻然後可以品裁州郡綜覈人物今之所置多非其人乞明為敕制使官人選才備依先㫖無令能否乖方違才易務并革選中正一依前軌庶清源有歸流序允穆靈太后詔依表施行而終不能用征西將軍冀州大中正張彛之子仲瑀上封事請銓别選格排抑武夫不使預清品於是武夫憤怒羽林虎賁千餘人焚彛第殺其父子詔斬其兇强者八人餘大赦以安之張彛既死靈太后乃命武官得依資入選既而官員少應調者多選曹無以處之及崔亮為吏部侍郎乃奏為格制官不問賢愚以停解日月為斷雖復官需此人停日後者終不得取庸才下品年月久者則先擢用時沉滯者皆稱其能亮甥劉景安貽書規之亮答曰昔有中正品其才第上之尚書據狀量人授職此乃與天下羣賢共爵人也吾謂當爾之時無濫舉矣而汝猶云十收六七况今日之選專歸尚書以一人之鑒照察天下劉毅所云一吏部兩郎中而欲究鑒人物何異以管窺天而求其博哉今勲人甚多又羽林入選武夫倔起而不解書計唯可彍弩前驅指蹤捕噬而已忽令佩組乘軒求其烹鮮之效未嘗操刀而使剸割又武人至多官員至少不可周溥設令十人共一官猶無官可授况一人冀一官何由不怨哉吾近面執不宜使武人入選請賜其爵厚其禄既不見從是以權立此格限以停年耳水心葉氏曰按蕭寳寅傳載魏世外官代還六年方叙内官四年為限今亮立此格專以停罷後歲月斷之不總計其平生資歴抑新進㧞滯淹故為有意利柄在已人不得干雖曰失之猶有所獲不若後世沈塗考任無復止法容僥倖長躁求使士大夫皆傲然取必於上其得失相較又逺矣先公曰按停年格立於武人入選之後武人入選始於羽林作亂之餘此當時事情也通鑑述崔亮答書削去本㫖已為未然胡氏葉氏之論古今得失則然矣而停年之所以立弗深考也後甄琛元修義城陽王徽相繼為吏部尚書利其便已踵而行之自是賢愚同貫涇渭無别魏之失才從亮始也及辛雄為吏部郎中上疏曰自神龜以來專以停年為選士無善惡歲久先叙職無劇易名到授官執案之吏以差次日月為功能銓衡之人以簡得老舊為平直且庸劣之人莫不貪鄙委斗筲以共理之重託碩䑕以百里之命皆貨賄是求肆心縱意其制雖煩不勝其欲致令徭役不均發調違謬聚斂盈門囚執滿道蓋助陛下理天下者唯在守令最湏簡置以康國道但郡縣選舉由來所輕貴遊雋才莫肯居此宜改其弊以定官方請上等郡縣為第一清中等為第二清下等為第三清選補之法妙盡才具如不可並後地先才不得拘以停年竟無銓革三載黜陟有稱者補在京名官如前代故事不歴郡縣不得為内職則人思自勉上下同心枉屈可申强暴自息書奏會帝崩及孝莊帝初詔求徳才文藝政事强直者縣令郡守刺史皆叙其志業具以表聞得三人以上縣令太守刺史賞一階舉非其人者黜一階凡官郡守縣令六年為滿滿後六年為叙薛琡為吏部郎中上言使選曹唯取年勞不簡賢否義均行鴈次若貫魚勘簿呼名一吏足矣數人而用何謂銓衡請積勞之中有材堪牧人者在先用之限其餘不堪者既壯藉其力豈容老而棄之將佐丞尉去人稍逺小小當否未為多失宜依次補序以酬其勞不報東魏元象中文襄王髙澄秉政攝吏部尚書乃革後魏崔亮年勞之制務求才實自遷鄴以後掌大選知名者不過數四文襄年少高朗其弊也疎袁聿修沈宻謹厚所傷者細楊遵彦風流辯給所取失於浮華唯辛術貞明簡實新舊參舉管庫必擢門閥不遺衡鑒之羙一人而已至孝昭帝皇建二年詔内外執事官從五品以上三府主簿録事參軍諸王文學侍御史廷尉三官尚書郎中中書舍人每在三年之内各舉一人或夙在朝倫沈屈未用或先官後進今見停散或白屋之人巾褐未釋其髙才良器允文允武理識深長幹具通濟操履凝峻學業宏贍諸如此軰隨取一長無待兼資方充舉限舉薦之文指論事實隨能量用必陳所堪不得髙談謬加褒飾所舉之人止在一職三載之内有犯死罪以下刑罪以上舉主准舉人之犯各罰其金自鞭以下舉主勿論若未經三載而更餘轉通計後官日月合滿三周凡所舉人必主事立功禆益時政不限年之逺近舉主之賞亦當非次被舉之人别當擢授其違限不舉依式罰金又擁旄作鎭任總百城分符共理職司千里凡其部統理宜委悉刺史於所管之内下郡太守縣令丞尉府佐録事參軍以降州官州官都主簿以下但霑在吏職及前為官并白人等並聽表薦太守則曹掾以下及管内之人亦聽表舉其大州中州下州畿内上郡中郡並三年之内各舉一人其不入品州并自餘郡守不在舉限楊愔典選二十餘年奬擢人倫以為巳任然取士多以言貎時致謗言以為愔之用人似貧士市𤓰取其大者水心葉氏曰魏以停年致亂髙氏反之觀此則奔走一時材用以赴功名自不係君德也銓叙羣彦雖曰吏部之職然宰相知人能盡器使乃職業中一大事後周以吏部中大夫一人掌選舉小吏部下大夫一人以貳之初覇府時蘇綽為六條詔書其四曰擢賢良綽深思本始懲魏齊之失罷門資之制其所察舉頗加精謹及武帝平齊廣收遺逸乃詔山東諸州舉明經幹理者上縣六人中縣五人下縣四人樂遜上疏論選舉曰選曹賞録勲賢補擬官爵必宜與衆共之有明揚之授使人得盡心如覩白日其材有升降功有厚薄禄秩所加無容不審即如州郡選置猶集鄉閭况天下選曹不取人物若方州列郡自可内除此外付選曹銓叙者既非機事何足可宻人生處世以榮禄為重修身履行以基身名逢時既難失時為易其選置之日宜令衆心明白然後呈奏使功勤見知品物稱悦隋文帝開皇七年制諸州歲貢三人工商不得入仕開皇十八年詔京官五品以上及總管刺史並以志行脩謹清平幹濟二科舉人牛𢎞為吏部尚書髙構為侍郎選舉先德行而後文材最為稱職當時之制尚書舉其大者侍郎銓其小者則六品以下官咸吏部所掌自是海内一命以上之官州郡無復辟署矣牛𢎞問於劉炫曰魏齊之時令史從容而已今則不遑寜處其事何由炫曰往者州唯置紀綱郡置守丞縣唯令而已其所事具僚則長官自辟受詔赴任每州不過數十今則不然大小之官悉是吏部纎介之迹皆屬考功所以繁也省官不如省事省事不如清心官事不省而欲從容其可得乎𢎞甚善其言而不能行自後周以降選無清濁及盧愷攝吏部尚書與侍郎薛道衡陸彦師等甄别物𩔖頗為清簡而譖愬紛紜愷及道衡皆除名沈既濟曰選法之難行久矣夫天産萬𩔖羙寡而惡衆人分九流君子孤而小人羣雖消長迭有而善惡不常此古今之通理然也將退不肖而懲其濫必懸法以示人而俾人知懼舉善以勸而不仁自逺可以隂隲而潛移之故難明斥其惡而强擠也暨􅝰張彛皆以不及是而敗悲夫斯理甚明蓋非英明之君不可以語焉故崔毛當魏武而政舉盧薛值隋文而身墜時難不其然乎煬帝制百官不得計考增級其功德行能有昭然者乃擢之大業三年始置吏部侍郎一人分掌尚書職事時武夫參選多授文職八年詔曰頃自班朝治人乃由勲叙㧞之行陣起自勇夫蠧政害人寔由於此自後諸授勲官並不得授文官職事帝自江都幸涿郡御龍舟渡河入永濟渠敕選部門下内史御史四司於前船選補受選者三千餘人徒歩隨船三千餘里不得處分死者什一二致堂胡氏曰甚矣羙才難得而凡馬之衆也夫自江都至涿郡隨舟徒行自東南而極北逖矣而受選之士三千餘人甘於重趼逐逐而不去以至死亡者於以見此三千餘人皆恣睢嵬瑣之流耳委以章綬錯諸百姓之上處於庶務之間決知其不免於瘝曠之負也故善為天下者如漢光武唐太宗皆減省吏員而賢才是擇唯恐其壅於上聞也專顧已私者不為官擇人入仕者數倍於員闕以收其虚譽而嶄然見頭角者則消磨汰斥之惟恐其與已軋也於是服膺官使新故更代往往恣睢嵬瑣之流而天下之禍亂起矣文獻通考卷三十六
