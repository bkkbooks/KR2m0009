body:
  text: 文獻通考卷三百三十鄱陽馬端臨貴與著四裔考七驃國唐正元十八年春正月南詔使來朝驃國王始遣其弟悉利移來朝華言謂之驃自謂突羅朱闍婆人謂之徒里拙古未嘗通中國魏晉間有著西南異方志及南中八郡者云永昌古哀牢國也傳聞永昌西南三千里有驃國君臣父子長幼有序然無見史傳者今其聞南詔異牟尋歸附心慕之乃因南詔重譯遣子朝貢東北距南詔􅫗苴城六千八百里凡去上都萬四千里在永昌故郡南二千里餘其國境東西三千里往來通聘者迦羅婆提等二十國役屬者道林王等九城食境土者羅君潛等二百九十八部落東鄰眞臘國西接東天竺國南盡溟海北通南詔些樂城界其王姓困沒長名摩羅惹其國相名摩訶斯那其王近適則輿以金繩牀逺適則乘象嬪御甚衆侍御常數百人其羅城構以甎甓周一百六十里壕㟁亦構以甎相傳本是舍利佛城内有居人數萬家佛寺百餘區其堂宇皆錯以金銀幄以丹彩地以紫鑛覆以錦􅄢其俗好生惡殺其土宜菽粟稻粱無麻麥其理無刑名桎梏之具犯罪者以竹五本束之伏犯者撻其背數止五輕者止三殺人者戮之男女七嵗則落髮止寺住桑門至二十五悟佛理乃復為居人其衣服悉以白㲲與朝霞繞腰而已不衣繒帛云出於蠶為傷生也獻其國樂凡二十二曲與樂工三十五人來朝樂曲皆演釋氏經論之詞意二十一年四月封彌臣國嗣王道勿禮為彌臣國王焉咸通三年二月遣使貢方物西原蠻西原蠻居廣容之南邕桂之西有甯氏者相承為豪又有黄氏居黄橙洞其隸也其地西接南詔唐天寶初黄氏強與韋氏儂氏脣齒為宼害據十餘州韋氏周氏恥不肯附黄氏攻之逐於海濵至德初首領黄乾曜眞崇鬱與陸州武陽朱蘭洞蠻皆叛推武承斐韋敬簡為帥僭號中越王廖殿為桂南王莫淳為柘南王相支為南越王梁奉為鎮南王羅誠為戎成王莫潯為南海王合衆二十萬綿地數千里署置官吏攻桂管十八州所至焚廬舍掠士女更四嵗不能平乾元初遣中使慰曉諸首領賜詔書赦其罪約降於是西原環古等州首領方子彈甘令暉羅承韋張九解宋原五百餘人請出兵討承斐等歲中戰二百斬黄乾曜眞崇鬱廖殿莫淳梁奉羅誠莫潯七人承斐等以餘衆面縛詣桂州降盡釋其縛差賜布帛縱之其種落張侯夏永與夷獠梁崇牽覃問及西原酋長呉功曹復合兵内宼陷道州據城五十餘日桂管經畧使邢濟擊平之執呉功曹等餘衆復圍道州刺史元結固守不能下進攻永州陷邵州留數日而去湖南團練使辛京杲遣將王國良戍武崗嫉京杲貪暴亦叛有衆千人侵掠州縣發使招之且服且叛建中元年城溆州以斷西原國良乃降貞元十年黄洞首領黄少卿者攻邕管圍經畧使孫公器請發嶺南兵窮討之德宗不許命中人招諭不從俄陷欽横潯貴四州少卿子昌沔趫勇前後陷十三州氣益振乃以唐州刺史楊旻為容管招討經畧使引師掩賊一日六七戰皆破之侵地悉復元和初邕州擒其别帥黄承慶明年少卿等歸欵拜歸順州刺史弟少髙為有州刺史未幾復叛又有黄少度黄昌瓘二部陷賓巒二州據之十一年攻欽横二州邕管經畧使韋悦破走之取賔巒二州是歲復屠巖州桂管觀察使裴行立輕其軍弱首請發兵盡誅叛者徼幸有功憲宗許之行立兵出擊彌更三歲妄奏斬獲二萬罔天子為解自是邕容兩道沒傷疾疫死者十八以上調費闕亡繇行立陽旻二人當時莫不咎之及安南兵亂殺都䕶李象古擢唐州刺史桂仲武為都䕶逗留不敢進貶安州刺史以行立代之尋召還卒長慶初以容管經畧使留後嚴公素為經畧使上表請討黄氏兵部侍郎韓愈建言曰南討損傷􅊐南人希賊之所處洞壘荒僻假如盡殺其人得其地在國計不為有益容貸羈縻比之禽獸來則捍禦去則不追未有虧損朝廷願因改元大慶普赦其罪遣官以天子恩意宣諭必能聽命乃選材用威信者處以經畧處理得方宜無侵叛不納後黄賊更攻邕州陷左江鎭攻欽州陷千金鎭明年又宼欽州是歲黄昌瓘遣其黨陳少竒二十人歸欵請降敬宗納之黄氏儂氏據州十八經畧使至遣一人詣治所稍不得意輒侵掠諸州横州當邕江官道嶺南節度使常以兵五百戍守不能制太和中經畧使董昌齡遣子蘭討平峒穴夷其種黨諸蠻畏服有違命者必嚴罰之十八州歲輸貢賦道路清平其後儂洞最强結南詔為助懿宗與南詔約和二洞數構敗之邕管節度使辛讜以從事徐雲䖍使南詔結和齎美貨啖二洞首領儂金勒等與之通歡金勒聽命宋時儂氏世為廣源州首領州在邕州西南鬱江之源地峭絕深阻産黄金丹砂頗有邑居聚落自交趾蠻據有安南而廣源雖號邕管羈縻其實服役於交趾初有儂全福者知儻猶州其弟存祿知萬涯州全福妻弟儂當道知武勒州一日全福殺存祿當道并有其地交趾怒舉兵虜全福及其子智聰以歸其婦阿儂本左江武勒族也轉至儻猶州全福納之全福見虜阿儂遂嫁商人生子名智髙生十三年殺其父商人曰天下豈有二父邪因冒儂姓與其母奔雷火峒其母又嫁特磨道儂夏卿久之智髙復與其母出據儻猶州建國曰大厯交趾復拔儻猶州執智髙釋其罪使知廣源州又以雷火頻婆回峒及思浪州附益之居四年内怨交趾襲據安德州僭稱南天國改年景端皇祐五年宼邕州明年交趾發兵討之不克廣西轉運使蕭固遣邕州指使开贇往刺候而贇擅𤼵兵攻智髙為所執因問中國虛實贇為陳大畧説智髙内屬乃遣贇還奉表請歲貢方物未聽又以馴象金銀來獻朝廷以其役屬交趾拒之後復齎金函書以請知邕州陳珙上聞不報智髙旣不得請又與交趾為仇且擅山澤之利遂招納亡命數出敝衣易穀食紿言峒中飢部落離散邕州信其㣲弱不設備也乃與廣州進士黄瑋黄師宓反其黨儂建侯儂志忠等日夜謀入宼一夕焚其巢穴紿其衆曰平生積聚今為天火焚無以為生計窮矣當拔邕州據廣州以自王否則兵死四年四月率衆五千沿鬱江東下攻破横山寨遂破邕州執知州陳珙等害之智髙僭號仁惠皇帝改年啓歴時天下久安嶺南州縣無備一旦兵起倉卒守將多棄城遁故智髙所向得志相繼破横貴龔潯藤梧封端康九州所至焚府庫殺官吏進圍廣州五十餘日不克解去又破昭賔二州復據邕州陳曉等兵敗朝廷命狄青為宣撫使督諸軍進兵絶崑崙關智髙悉衆拒戰大敗夜焚城遁由合江口入大理國智髙自起至平幾一年暴踐一方吏民不勝其毒朝廷為下赦令拊瘡痍智髙旣敗其母阿儂入保特磨依其夫儂夏卿收殘衆三千餘人復欲入宼安撫使余靖督部吏𤼵峒兵入特磨掩襲之獲阿儂及智髙弟智光等檻送京師棄市智髙不知所終儂氏又有宗旦者知雷火峒稍桀黠嘉祐二年嘗入宼知桂州蕭固招之内屬補以官七年宗旦父子請以所屬城洞永為王民詔各遷一官賜賚有差是歲儂夏卿儂亮亦自特磨來歸皆其族也石湖范氏桂海虞衡志曰儂智髙反朝廷討平之因其疆域參唐制分析其種落大者為州小者為縣又小者為洞凡五十餘所推其長雄者首領籍其民為壯丁以籓籬内郡障防外蠻緩急追集備禦制如官軍其酋皆世襲分隸諸寨總隸於提舉左江四寨二提舉右江四寨一提舉寨官民官也知寨主簿各一員掌諸洞財賦左江屯永平太平右江屯橫山掌諸洞烟火民丁以官兵盡䕶之大抵人物獷悍風俗荒怪不可盡以中國敎法繩治姑羈縻之而已有知州權州監州知縣知洞皆命於安撫若監司給文帖朱記其次有同𤼵遣權發遣之屬謂之官典各命於其州毎村圑又推一人為長謂之主戸餘民皆稱提陀猶言百姓也洞丁有爭各訟諸酋酋不能決若酋自爭則訟諸寨或提舉又不能決訟諸邕管次至帥司而止皇祐以前知州補授不過都知兵馬使僅比㣲校智髙之亂洞人立功始有補班行者諸洞知州不敢坐其上視朝廷爵命尚知尊敬元豐以後漸任中州官近歲洞酋多寄籍内地納粟補授無非大小使臣或敢詣闕陳獻利害至借補閤職與帥守抗禮其為招馬官者尤與州縣相狎子弟有入邕州應舉者招致游士多設耳目州縣文移未下已先知之輿騎居室服用皆擬公侯如安平州之李棫田州之黄諧皆有强兵矣民田計口給民不得典賣惟自開荒者由巳謂之祖業口分田知州别得養印田猶圭田也權州以下無印記者得蔭免田旣各服屬其民又以攻剽山獠及博買嫁娶所得生口男女相配給田使耕敎以武伎世世隸屬謂之家奴亦曰家丁强壯可敎勒者謂之田子甲亦曰馬前牌皆青布巾跣足總謂之洞丁舊一州多不過五六百人今有以千計者元豐中嘗籍其數十餘萬老弱不與此籍久不脩矣洞丁往往勁㨗能辛苦穿皮履上下山不頓其械器有桶子甲長槍手摽偏刀逷􅣏牌山弩竹箭桄榔箭之屬其相讎殺彼此布陣各張兩翼以相包裹人多翼長者勝無他竒民居苫茅為兩重棚謂之麻欄上以自處下蓄牛豕棚上編竹為棧但有一牛皮為裀席牛豕之穢升聞棧罅習慣之亦以其地多虎狼不爾則人畜俱不安深廣民居亦多如此洞人生理尤苟簡冬編鵝毛木綿夏緝蕉竹麻紵為衣摶飯掬水以食家具藏土窖以備宼掠土産生金銀銅鈆綠丹砂翠羽洞緂綀布茴香草果諸藥各逐其利不困乏今黄姓尚多而儂姓絶少葢智髙亂後儂氏善良許從國姓故今多姓趙氏舉洞純一姓者婚姻自若酋豪或聚數妻皆曰媚娘洞官之家婚嫁以麤豪汰侈相髙聘送禮儀多至千擔少亦半之壻來就親女家於五里外結草屋百餘間與居謂之入寮兩家各以鼓樂迎男女至寮女婢妾百餘壻僮僕至數百成禮之夕兩家各盛兵為備小有言則兵刅相接成婚後壻常抽刅妻之婢妾迕意卽手殺之自入寮能多殺婢則妻黨畏之否則謂之懦半年而後歸夫家人逺出而歸者止於三十里外家遣巫提竹籃迓脱歸人帖身衣貯之籃以前導還家言為行人收魂歸也親始死被髮持缾罋慟哭水濵擲銅錢紙錢於水汲歸浴屍謂之買水否則隣里以為不孝此州縣雖曰羈縻然皆耕作省地歲輸税米於官始時國家規模宏逺以民官治理之兵官鎭壓之以諸洞財力養官軍以民丁備招集驅使上下相維有臂指之勢洞酋雖號知州縣多服皂白布袍類里正户長參寨官皆横梃自稱某州防遏盗賊大抵見知寨如里正之於長官奉提舉如卒伍之於主將視邕管如朝廷望經畧帥府則如神明號令風靡保障隱然比年不然諸洞不供租賦故無糧以養提舉之兵提舉兵力單弱故威令不行寨官非惟惰不舉職且日走洞官之門握手為市提舉官亦不復威重與之交關通賄其間有自愛稍欲振舉諸洞必共汙染之使以罪去甚則酖焉原其始皆邊吏冒法徇利致然此弊固未易悉數也故事安撫經畧使初開幕府頒鹽綵徧犒首領以公文下敎謂之委曲大畧使固守邊界存䘏壯丁云邕州守臣舊不輕付屯卒將五千人京師遣人作司大兵城邊備甚飭比來邕州經費匱闕觸事廢弛但存羸卒數百人城壁器械頽壞不脩安撫都監司事體朘弱州洞桀黠無所忌至掠省民客旅縳賣於交趾諸蠻又招收省民不逞及配隸亡命者以益田子甲反隱然平視安撫都監司此非持久計慶歴廣源之變為鑒豈逺哉焦僥國焦僥國後漢時通焉明帝永平中西南夷焦僥貢獻安帝永初中永昌徼外焦僥種夷陸賴等三千餘口舉種内附獻象牙水牛封牛其人長三尺穴居善游鳥獸懼焉其地草木冬落夏生撣國撣音擅國後漢時通焉和帝永元中其國王雍由調遣譯奉國珍寶和帝賜金印紫綬安帝永寧初復遣使朝賀獻樂及幻人能變化吐火自支觧易牛馬頭又善跳丸數乃至十自言我海西人海西即大秦也撣國西南大秦明年元會安帝作樂於庭封雍由調為漢大都尉兩㸑蠻兩㸑蠻自曲州靖州西南昆川曲軛晉寧喻獻安寧距龍和城通謂之西爨白蠻自彌鹿升麻二川南至歩謂之東爨烏蠻西爨自云本安邑人七世祖晉南寧太守中國亂遂王蠻中梁元帝時南寧州刺史徐文盛召詣荆州有爨瓚者據其地延袤二千餘里土多駿馬犀象明珠旣死子震翫分綂其衆隋開皇初遣使朝貢命韋世冲以兵戍之置恭州協州昆州未幾叛史萬歲擊之至西洱河滇池而還震翫懼而入朝文帝誅之諸子沒為奴唐髙祖即位以其子𢎞逺為昆州刺史奉父喪歸而益州刺史叚綸遣俞大施至南寧治共範川誘諸部皆納欵貢方物太宗遣將擊西爨開青蛉㺯棟為縣爨蠻之西有徙莫祗蠻儉望蠻貞觀二十三年内屬以其地為傍望覽邱求五州隸郎州都督府白水蠻地與靑蛉弄棟接郎州亦隸弄棟西有大勃弄小勃弄二州蠻其西與黄𤓰葉榆西洱河接其衆完富與蜀埒無酋長喜相讎怨永徽初大勃弄楊承顚私署将帥寇麻州都督任懷玉招之不聽高宗以左領軍將軍趙孝祖為郎州道行軍總管與懷玉討之至羅仵侯山其酋秃磨蒲與大鬼主都于以衆塞菁口孝祖大破之夷人尚鬼謂主祭者為鬼主每歲户出一牛或一羊就其家祭之送鬼迎鬼必有兵因以復仇云孝祖屢破降諸部西南夷遂定元宗時諸爨互相並起攻稍離弱貞元中置都督府於峯州領羈縻州十八烏蠻與南詔世婚姻其種分七部落土多牛馬無布帛衣皮俗尚巫鬼無拜跪之節其語四譯乃通中國大部落有大鬼主百家則置小鬼主勿鄧部地方千里有卭部六姓又有東欽蠻粟蠻雷蠻夢蠻散處黎嶲戎數州之鄙隸勿鄧其南七十里有兩林部落其南有豐琶部落兩林地雖陜而諸部推為長號都鬼主勿鄧豐琶兩林皆謂之東蠻天寶中皆受封爵及南詔陷嶲州遂羈屬吐蕃貞元中復通欵以數為吐蕃攻獵乃遺韋臯書乞兵攻吐蕃臯遣兵大破吐蕃於北谷獲其鎧仗牛馬詔封其鬼主苴那時等皆為郡王給印章袍帶歲給其部鹽綵後唐天成中山後兩林蠻遣其大鬼主來貢宋開寶二年兩林蠻王子及邛部州蠻都鬼主入貢詔嘉納之賜以器幣由黎州南行七百里至其地又一程至嶲州今廢空城中但有浮圖一又二程至建昌城又十七程至雲南三年七月又朝貢八年又入貢太平興國初遣使貢名馬方物乞頒正朔詔加其官優奬之淳化元年黎州蠻乞互市詔增給其直自是訖眞宗朝入貢不絶每優詔加官厚賜遣之天聖八年十月卭部州蠻王黎在遣使入貢時占城龜兹沙州亦皆入貢至以家自隨晏殊因請圖其人物衣冠并訪道里風俗以上史官詔可明道元年黎在請三歲一貢詔諭道路遐逺許五年一至卭部於諸蠻中最驕悍狡譎招集蕃漢亡命侵攘他種閉其道以專利熙寧三年首領苴尅遣使來賀登極自稱大渡河南卭部山前山後百蠻都首賜勅書器幣襲衣銀帶苴尅死詔以其子韋則襲封懷化校尉大渡河南卭部州都鬼主乾道九年詔以崖韈承襲兄􅂪備金紫光祿大夫懷化校尉都鬼主如故從西川宣撫司請也淳熙元年吐蕃種落侵犯邊境崖韈率衆掩殺詔令四川宣撫司具功狀聞奏二年制置使范成大奏兩林蠻王第籠畏首領崖來等攻卭部州之襲甕城不克虜掠而去崖韈遣人追逐已下黎州隄防之七年樞密院編脩官李嘉謀言黎州邊面近則有曰卭部州曰河南蠻曰女兒城蠻曰靑差口吐蕃曰五部落逺則大小雲南州之三邊大抵諸蕃環列今以馬故日至太守之庭彼旣狎玩始有内侮之心自今宜令通判專任市馬太守專任邊事詔市馬令通判專任外餘守臣措置八年崖韈死其姪墨崖承襲依例授官詔自今黎民屯戍土軍禁軍竝聽黎州守臣節制其西兵遇有邊事亦聽守臣節制從編修官李嘉謀之言也寧宗嘉定九年卭部州為雲南所逼折歸雲南初卭部鬼主部庫與其親族崖則内自攻崖則結兩林蠻為援部庫聞之懼求救雲南喜其附已遂起兵攻兩林蠻滅之蠻族素忠順自國初以來蔽遮雲南之路故雲南與中國絶及是黎州失籓籬之蔽矣自黔恭以西至涪瀘嘉叙自階文折而東南至威茂黎雅被邊十餘郡綿亘數千里剛夷惡獠殆千萬種自治平之末訖於靖康大抵皆通互市奉職貢雖時有剽掠如鼠竊狗偷不能為深患云松外諸蠻松外諸蠻數十其部大者五六百戸小者二三凡百數十姓趙楊李董為貴族皆擅山川不能相君長有城郭文字頗知陰陽歴數自夜郎滇池以西皆莊蹻之裔有稻麥粟豆絲麻薤蒜桃李以十二月為歲首布幅廣七寸正月蠶生二月熟男子氈革為帔女衣絁布裙衫髻盤如髽飯用竹筲摶而噉之鳥杯貯羮如雞彛徒跣有舟無車死則坎地殯舎左屋之三年乃葬以蠡蚌封棺父母喪斬縗布衣不澡者四五年近者二三年為人所殺者子以麻括髮墨面衣不緝居喪婚嫁不廢亦弗避同姓壻不親迎富室娶妻納金銀牛羊酒女所齎亦如之有罪者樹一長木擊鼓集衆其下强盗殺之富者貰死燒屋奪其田盗者倍九而償贓姦淫則强族輸金銀請和而棄其妻處女嫠婦不坐凡相殺必報力不能則其部助之祭祀殺牛馬親聯畢會助以牛酒多至數百人唐貞觀中嶲州都督劉伯英上疏言松外諸蠻率暫附亟叛請擊之西洱河天竺道可通也居數歲太宗以右武候將軍梁建方發蜀十二州兵進討酋帥雙舎拒戰敗走殺獲十餘萬群蠻震駭走保山谷建方諭降者七十餘部户十萬九千署首領􅂪和為縣令餘衆感悦西洱河蠻亦曰河蠻道繇郎州走三千里建方遣其兵自嶲州道千五百里掩之其帥楊盛大駭欲遁去使者好語約降乃遣首領十人納欵軍門建方振旅還二十二年西洱河大首領楊斂松外首領􅂪羽皆入朝授官秩顯慶元年西洱河大首領楊棟附顯和蠻大首王羅祁郎昆黎盤四州大首領王伽衝率部落四千人歸附入朝貢方物其後茂州西南築安戎城絶吐蕃通蠻之道生羌為吐蕃鄉導攻拔之增兵以守西洱河諸蠻皆臣吐蕃開元中首領始入朝授刺史㑹南詔􅂪歸義拔大和城乃北徙更羈制於浪穹詔浪穹詔已破又徙雲南柘城黎州領羈縻奉上等州二十六開元十七年又領羈縻夏梁卜貴等州三十一尾濮尾濮漢魏以後在興古郡今雲南郡地西南千五百里徼外其人有尾長三四寸欲坐輒先穿地為穴以安其尾尾折便死居木上食人俗又噉其老者唯識母不識父其俗有賔客殺老以供厨故賔婚有日老者必泣其地有稷及陸稻多鹽井饒犀象有弓矢革鎧以赤猱猴皮垂錫珠翡翠為冠幘按木濮卽尾濮也又扶南土俗傳云拘利東有蒲羅中人人有尾長五六寸其俗食人按其地竝西南蒲羅葢尾濮之地名木綿濮木綿濮土有木綿樹多葉又生房甚繁房中綿如蠶所作其大如捲音拳文面濮文面濮其俗劖面以靑畫之劖音讒折腰濮折腰濮其俗生子皆折其腰赤口濮赤口濮在永昌南其俗折其齒劖其唇使赤又露身無衣服黑􅈎濮黑􅈎濮在永昌西南山居耐勤苦其衣服婦人一幅布為裙或以貫頭丈夫以榖皮為衣其境出白蹄牛犀象琥珀金桐華布又諸濮之域皆出楛矢爾雅曰南至於濮鈆周書王會卜人丹沙注云卜人西南之蠻丹沙所出今按卜人葢濮人也按諸濮與哀牢地相接故附之交趾交趾本漢初南越之地漢武帝平南越分其地為儋耳珠厓南海蒼梧鬱林合浦交趾日南九眞凡九郡置交趾刺史以領之後漢置交州晉宋齊因之又為交趾郡陳亦因之隋平陳廢郡置州煬帝初廢州置郡唐武徳中改交州總管府至德中改安南都䕶府朱梁貞明中土豪曲承美專有其地送欵於末帝因授承美節鉞時劉陟擅命􅊐表遣將李和順伐承美執之乃并其土宇後有楊廷藝紹洪皆受廣南偽署繼為交趾節度使紹洪卒州將呉昌岌遂居其位昌岌死其弟昌文承襲宋乾德初昌文死其參謀呉處玶峰州刺史矯知䕶武寧州刺史楊暉牙將杜景碩等爭立管内十二州大亂部民嘯聚起為宼盗攻交州先是楊廷藝以牙將丁公著攝驩州刺史兼禦蕃都督部領即其子也公著死部領繼之至是部領與其子璉率兵擊敗處玶等賊黨潰散境内安堵部民德之乃推部領為交州帥號曰大勝王署其子璉以為節度使凡三年璉襲父位立七年聞太祖克平嶺表遂遣使貢方物上表内附制授璉檢校太師靜海軍節度使安南都護其進奉使皆命以官八年遣使貢犀象香藥是歲秋制授開府儀同三司檢校太師封交趾郡王太宗即位璉又貢方物璉死弟璿尚幼嗣立大將黎桓擅權刼遷璿於别第舉族禁錮代總其衆太宗聞之怒議舉兵弔伐太平興國五年詔孫全興張璿崔亮以陸路兵自邕州路入劉澄賈湜王僎等以水路兵自廣州路入是歲黎桓遣使貢方物仍為丁璿上表乞襲位上察其欲緩王師寢不報是時王師進討破賊萬餘衆斬首萬餘級六年春又破賊於白藤江口斬首千餘級獲戰艦二百艘甲胄萬計轉運使侯仁寶率前軍先進全興等頓兵花步七十日以俟澄仁寶累促之不進及澄至并軍由水路至多羅村不遇賊復擅廽花步桓詐降以誘仁寶遂為其所害轉運許仲宣馳奏其事遂班師上遣使就劾澄湜僎澄尋病死湜等具伏竝僇於邕州市全興至闕亦下吏坐誅餘抵罪有差仁寶贈工部侍郎七年桓懼朝廷終行討滅復以丁璿為名遣使貢方物上表謝罪八年桓自稱權交州三使留後遣牙將入貢上表自陳上賜詔書因而撫之仍諭以遣丁璿母子及其親屬盡室來歸當降制授卿節麾時黎桓已專據其土不聽命是歲五月上言占城國水陸象馬數萬來宼蠻以部兵擊走之繫斬千計雍熙二年復遣使貢方物上表求正領節鎭三年秋又遣使入貢儋州言占城國人蒲羅遏率其族百餘衆内附言為交州所逼故也是歲十月制授桓檢校太保使持節都督交州諸軍事安南都䕶充靜海軍節度使交州管内觀察處置等使封京兆郡侯賜食邑功臣號端拱元年加檢校太尉淳化元年加特進遣左正言直史館宋鎬往使鎬歸闕上令條列山川形勢事跡以聞鎬等具奏曰去歲秋末抵交州境桓遣牙内都指揮使丁承正等以船九艘卒三百人至太平軍來迎由海口入大海冒涉風濤頗歴危險經半月至白藤徑入海汊乘潮而行凡宿泊之所有茅舎三間營葺尚新目為館驛至長州漸近本國桓張皇虛誕務為誇詫盡出舟師戰櫂謂之耀軍自是宵征抵海岸至交州僅十五里有茅亭五間題曰茅徑驛至城一百里驅部民畜妄稱官牛數不滿千揚言十萬又廣率其民混為軍旅衣以雜色之衣乘船鼓噪近城之山虛張白旗以為陳兵之象俄而擁從桓至展郊迎之禮斂馬側身問皇帝起居畢按轡偕行時以㯽榔相遺馬上食之此風俗待賔之厚意也城中無居民止有茅竹屋數十百區以為軍營而府署湫溢題其門曰明德門桓質陋而目眇自言近歲與蠻宼接戰墜馬傷足受詔不拜信宿之後乃張筵飲宴又出臨􅆜以為娯賔之游桓跣足持竿入水標魚每中一魚左右皆呌譟歡躍凡有宴㑹預坐之人悉令解帶冠以帽子桓多衣纈及紅色之衣帽以眞珠為餙或自歌勸酒莫能曉其辭嘗令數十人扛大蛇長數丈饋於使館且曰若能食此當治之為饌以獻焉又羈送二虎以備縱觀皆却之不受士卒殆三千人悉㸃額曰天子軍量以禾穗日給令自舂為食兵器止有弓弩木牌梭槍竹槍弱不可用桓輕脱殘忍眤比小人腹心閹􅆆五七軰錯立其側好狎飲以手令為樂凡官屬善其事者擢居親近左右有小過亦殺之或鞭其背一百至二百賔佐小不如意亦捶之三十至五十黜為閽吏怒息乃召復其位有木塔其制樸陋桓一日請同遊覽地無寒氣十一月猶衣夾衣揮扇四年進封桓交趾郡王五年遣牙校費崇德等來脩貢然桓性本凶狠負阻山河屢為宼害漸失藩臣之禮至道元年春廣西路轉運使張觀欽州如洪鎭兵馬監押衛昭美皆上言有交趾戰船百餘艘寇如洪鎭掠居民刼廪實而去其夏桓所管蘇茂州又以鄕兵五千宼邕州所管祿山都廵檢楊文傑擊走之太宗志在撫寧荒服不欲問罪旣而遣李若拙賫詔并美玉帶往賜旣至桓出郊迎然辭氣尚悖慢謂若拙曰向者刼如洪鎭乃外境蠻賊也皇帝知此非交州兵否若使交果叛命當首攻番禺次擊閩越豈止如洪鎭而已若拙從容以語折之桓頓首謝眞宗卽位封南平王兼侍中桓遣使來貢賜詔書慰奬先是使至交州桓卽以貢賦為辭因緣賦歛上聞之止令疆吏召受綸命而不復專遣使者景德元年遣其子攝驩州刺史明提來貢懇加恩使至本道慰撫遐裔許之三年桓卒立中子龍鉞兄龍全刼庫財而遁其弟龍廷殺龍鉞自立兄明䕶率扶䦨寨攻戰明提以國亂不能還詔廣州優加資給乃以邵􅁮為沿海安撫使令曉譬之􅁮貽書交州諭以朝廷威德如其自相魚肉久無定位偏師問罪則黎氏盡滅矣明䕶懼即奉龍廷主軍事欲脩貢詔許之乃遣弟峯州刺史明昶等入貢詔授龍廷檢校太尉靜海軍節度處置等使安南都䕶御史大夫上柱國交趾郡王賜食邑功臣號仍賜名至忠又追贈桓中書令南越王官其進奉使大中祥符元年東封畢加同平章事增食邑功臣號至忠遣使入獻三年求互市於邕州詔止仍舊制止許於廉州及如洪寨互市葢以邕為邊隅控扼之所或直趨内地事非便故也至忠裁年二十六苛虐不法國人不附大校李公藴尤為至忠親任嘗令以黎為姓其年遂圖至忠逐殺其弟明提明昶等自稱留後遣使奉貢上曰黎桓不義而得公藴尤而效之甚可惡也然以蠻俗不足責遂用桓故事授公藴檢校太傅節度都䕶御史大夫上柱國交趾郡王實封功臣號後加同平章事開府儀同三司又官其進奉使其後或間歲或仍歲以方物入貢天禧中進封南平郡王檢校太尉仁宗即位入貢加檢校太師天聖六年卒子徳政遣使告哀詔命使弔祭贈公藴侍中南越王授德政襲爵明道初加同平章事景祐初部人陳公永等六百餘人内附德政遣兵千餘境上捕逐之詔遣還仍詔德政毋輒誅殺尋遣使入貢加檢校太師三年其甲峒及諒州門州蘇茂州廣源州大發峒丹波縣等蠻宼邕州之思陵州西平州石西州及諸峒畧居人馬牛焚室廬而去下詔責問且令捕酋首正其罪以聞寶元元年進封南平王康定元年慶歴三年六年七月俱遣使入貢詔官其貢使初德政發兵取占城朝廷疑其内蓄姦謀乃訪自唐以來所通道路凡十六處令轉運使杜杞度其要害而戍守之然其後亦未嘗宼邊前後累貢馴象皇祐二年邕州誘其蘇茂州韋紹嗣紹欽等三千餘人入居省地德政表求所誘詔盡還之仍令德政約束邊户毋得侵犯其後儂智髙反德政率兵二萬由水路欲入助王師朝廷優賜而却其兵至和二年德政卒子日尊遣人告哀詔遣使弔祭贈官及命日尊世襲如故事嘉祐三年貢異獸四年宼欽州思廪管五年與甲峒賊宼邕州詔知桂州蕭固轉運使宋咸提刑李師中同議掩擊之詔安撫使余靖等發兵討捕靖遣諜誘占城同廣南兩路兵甲趨交趾日尊惶怖上表待罪詔未得舉兵聽其貢奉八年入貢四月以仁宗皇帝遺留物賜日尊加同平章事神宗即位進封南平王加開府儀同三司二年表言占城國乆缺貢臣親帥兵討之虜其王詔官其使自是日尊自帝其國僭稱法天應運崇仁至道慶成龍祥英武睿文尊德聖神皇帝尊公藴為太祖神武皇帝國號大越偽改元寶象又改神武五年日尊卒子乾德嗣來告哀詔遣使弔贈授乾德襲封如故乾德幼母黎氏號太妃與宦人李尚吉同主國事於是知桂州沈起籍溪峒丁為王民擅納知恩倩州儂善美於内地帝慮其妄𤼵以激蠻禍亟罷之代以劉彛乾德乞還善美并其屬民七百人不許彛又言廣源州劉紀以兵畧邕管歸化州儂智會率其子進安逆戰有功詔授進安供奉官初廣西屯北兵二十指揮交人畏之彛奏罷正兵而用槍仗手分戍聽偏校言以為安南可取大治戈船交人來互市率皆遏絶表疏上訴亦不得通八年冬遂分三道入宼一自欽州一自廣府一自崑崙關連陷欽廉二州廉土丁八十守城皆驅令負擔登舟已而盡殺之又陷邕州殺守將蘇緘屠其民五萬餘口詔以趙卨為安南道行營都總管經畧招討使李憲為副使帥大軍南征尋罷憲而以宣徽南院使郭逵為招討使改卨副之九年十二月破蠻决里隘次富良江蠻以精兵乘船逆戰逵擊破之殺其王子洪眞乾德懼遣使奉表詣軍門納欵富良去其國不逺逵不敢渡官軍八萬死者什六得其廣源州門州思浪州蘇茂州及桄榔縣而還逵卨皆得罪詔改廣源為順州命西上閤門使陶弼知州事餘皆卽用其酋長乾德乞再修職貢還所奪州縣詔報之曰卿撫有南交世受王爵而乃背德奸命切暴邊城棄祖考忠順之圖煩朝廷討伐之舉師行深入勢蹙始歸迹其罪尤在所絀削今遣使修貢上章致恭詳觀辭情灼見悛悔朕撫綏萬國不異邇遐但以邕欽廉之民遷刼炎陬久失鄉井俟盡送還省界即以廣源等賜交州乾德初約歸三州官吏千人久之才送民二百二十一口男子年十五以上皆刺額曰天子兵二十以上曰投南朝婦人刺左手曰官客以舟載之而泥其户牖中設燈燭日行一二十里則止而偽作更鼓以報凡數月乃至葢以紿示海道之遠也順州落南深置戍鎭守被罹瘴霧多病沒陶弼亦終於官朝廷知其無用乃悉以四州一縣還之然廣源舊隸邕管羈縻本非交趾所有也元豐五年獻馴象二犀角象齒百六年以追捕儂智會為辭犯歸化州又遣其臣黎文盛來廣西辨理順安歸化境界經畧熊本遣左江廵檢成卓與議文盛稱陪臣不敢爭執詔以文盛能遵乾德恭順之意賜之袍帶及絹五百疋仍以八隘之外保樂六縣宿桑二峒予乾德哲宗立加同中書門下平章事元祐中又數上表求勿惡勿陽峒地詔不許二年遣使入貢進封南平王徽宗時累加開府儀同三司檢校太師大觀初貢使至京乞市書籍有司言法不許詔嘉其慕義除禁書卜筮陰陽歴算術數兵書勅令時務邊機地里外餘書許買政和末又詔以交人自熈寧以來全不生事特寛和市之禁宣和元年加乾德守司空建炎元年乾德上表乞禁本道邊兵逃入省地詔令廣西經畧司約束四年入貢邊事未寧免使人詣闕所進方物除華靡不受餘就界所交從本路提刑司依例計價回賜其表遞進令學士院降勅書回答自後毎遇入貢即行之紹興二年乾德卒子陽煥立八年陽煥卒子天祚立俱遣使弔祭贈官襲封如故事九年廣西帥司言乾德有側室子奔入大理改姓趙名智之自號南平王知陽煥死大理遣還欲與天祚爭位天祚與之敵又聞趙智之欲進奉借兵見已説諭約四詔却之自後貢奉不絶累加功臣號二十五年加檢校太師増食邑孝宗即位加功臣號隆興二年遣使尹子思等入貢九年復遣入貢自上即位每遣使來邊吏以聞諭使歸國至是懇忱備至上錄其善意許焉至館於懷逺驛禮部以安南使久不至移文客省詢訪土俗人物圖畫衣貌如舊制焉淳熈元年正月引見安南進奉副使二年詔安南入貢禮意可嘉令有司討論賜國名典故以聞於是特賜安南國名制南平王李天祚特授依前官封安南國王仍加守謙功臣上以天祚嗣位四十年故厚其禮封以安南國焉舊日章奏行移止稱安南道加封之後浸自尊大文書稱國不復可改矣押伴安南進奉梁衎言安南入貢所過州縣差夫數多自靜江水路可至容州又自北流遵陸一百二十里至鬱林自鬱林州水路可至廣州皆有回脚鹽船運鹽牛車可顧自廉航海一日之程即交趾則從靜江而南二千餘里可不役一夫而辦詔逐路帥臣詳具陳行旣而尹子思等以為涉夏水溢乞依例由欽州路以歸二年安南國請印以安南國王之印六字為文賜之其印比附樞密尚書省印方二寸仍給牌皆以銅鑄塗金為飾三年賜安南國歴日有司言天祚已薨其子未有封爵欲作賜安南國王嗣子龍翰勅書從之四年授龍翰襲爵故事其王初立即封交趾郡王久之進南平王死則贈侍中南越王時詞臣周必大行制曰即樂國以肇封既從世襲極眞王而錫命何待次升言不復封郡王葢異禮也五年上表進方物稱謝九年廣西經畧司言安南國已辦方物投進上曰象乃無用之物經由道路重擾吾民却不受其入貢之物十受一光宗登極經畧司言安南國修章表備土宜貢賀詔受一分於界首交割本司言紹興中夀皇登極貢物盡行收受今若止受十一之數却恐本國致疑禮部勘當如隆興例全受不回賜寧宗嗣位依例賜器幣加食邑功臣號嘉定五年龍翰薨詔遣弔祭贈官如故事以子昊旵襲封其爵位給賜如龍翰始封之制自李公藴簒奪之後至昊旵傳八世其名曰日曰乾曰陽曰天曰龍皆有僣上之意而累朝以其僻在海隅不復與較也石湖范氏桂海虞衡志曰今安南國地接漢九眞日南諸郡及唐驩愛等州東南薄海接占城占城林邑也東海路通欽廉西出諸蠻西北通邕州在邕州東南隅去左江太平寨最近自寨正南行至桄榔花歩渡富良白藤兩江四程可至又自寨東南行過丹特羅小江自諒州入六程可至自右江温潤寨則最逺由欽州渡海一日至歴代為郡縣國朝遂在化外丁氏黎氏李氏代擅其地熙寧間乾德初立其大臣用事嗾之叛八年遂八宼陷邕欽廉三州朝廷命郭逵等討之賊驅象拒戰官軍以大刀斬象鼻象奔却自蹂其徒大兵乗之賊潰乗勝㧞桄榔縣知縣交主之壻逃伏草間窺見王師獲賊擘食之以為天神歸報其主曰茍可逃命子孫勿犯大朝大軍次富良江去都護府四十里殺偽太子擒其大將乾德大懼奉表乞降會北兵多病瘴乃詔赦交趾還其五州朝廷以逵不能遂取交州黜為武衞上將軍是役也調民夫八十七萬有竒金榖稱是迄無駿功大率自端拱迄嘉祐以來兩江州洞數為蠻所侵軼潛舉以外鄉蘇茂廣源甲洞等處入交趾者六十二村故至今長雄諸蠻乾德死子陽煥立陽煥死乾德有遺腹子屬之占城奉而立之或云有黎牟者乾德妻黨也嘗為李氏養子殺遺腹子而立冒姓李氏名天祚實紹興九年其國人猶稱黎王二十六年遣使入貢朝廷因以李氏官爵命之天祚貌豐晳今生三十九年矣有兄嘗知諒州謀奪其位事覺流雪河州髠為浮屠凡與廣西帥司及邕州通訊問用二黑漆板夾繫文書刻字於板上謂之木夾文書稱安南都護府天祚不列銜而列其將佐數人皆僭官稱有云金紫光祿大夫守中書侍郎同判都護府者其意似以都護府如州郡簽㕔也帥司邊州報其文書亦用木夾桂林掌故有元祐熈寧間所藏舊案交人行移與今正同印文曰南越國印近年乃更用中書門下之印中國之治略荒逺邊吏又憚生事例置不問由來非一日矣其國之官稱王宗族稱天王班凡族稱承嗣餘稱支嗣有内職外職内職治民曰輔國太尉猶宰相也左右郎司空左右郎相左右諫議大夫内侍員外郎以上為内職外職治兵曰樞密使金吾太尉都領兵領兵使又有判及同判安南都護府皆為外職仕者或科舉或任子或入貲科舉最貴工技奴婢之子孫不許應舉入貲始為吏職再入貲補承信郎可累遷為知州在官者無俸給但付一方之民俾得役屬耕漁以取利勝兵卸龍武勝龍翼蟬殿光武王階捧日保勝等皆有左右每軍止二百人横刺字於額曰天子兵又有雄略勇捷等九軍充給使如廂軍兵士月一踐更暇則耕種工藝自給正月七日人給錢三百紬絹布各一疋如紬綱而䝉之以綿月給禾十束以元日犒軍人得大禾飯一柈魚鮓數枚其地多占米故以大禾為貴正月四日酋椎牛饗其臣七月五日為大節人相慶遺官僚以生口獻其酋翌日酋開宴酬之酋居樓四層上以自居第二層御宙居之中人也第三層箇利就居之老鈴下之屬也第四層軍士居之又有水晶宮天元殿等諸僭擬名字門别有一樓猶榜曰安南都護府屋皆朱漆柱畫龍鶴仙女交人無貴賤皆椎髻跣足酋平居亦然但珥金簪衣黄衫紫裙餘皆服盤領四裙皂衫不繫腰衫下繫皂裙珥銀鐡簪曳皮履執鸛羽扇戴螺笠皮履以皮為底施小柱以拇指夾之而行扇編鸛羽以辟蛇螺笠竹絲縷織狀如田螺最為工緻婦人多哲與男子絶異好着綠寛袖直領皆以皂裙束之酋出入以人輓車貴僚坐幅布上掛大竹兩夫舁之名抵鵶歲時不供先病不服藥夜不燃燈上巳日男女集會為行列結五色綵為毬歌而抛之謂之飛駞男女自成列女受駞男婚以定宫門有大鐘樓民訴事即撞鐘大辟或付仇家使甘心盜賊斮手足指逃亡斷手足謀叛者埋身土中露其頭旁植長竿挽竹繫其髻使其頸伸利鍤一剗之其頭剡標竿杪客死境外鞭尸大罵以為背國土産生金及銀銅朱砂珠貝犀象翠羽車渠諸香及鹽漆吉貝之屬果惟有甘橘香圓㯽榔扶留藤新舊縣隔一小江皆出香新州故眞臘地侵得之不能造紙筆求之省地其人少通文墨閩人附海舶往者必厚遇之因命之官咨以決事凡文移詭亂多自遊客出相傳其祖公藴亦本閩人又其國土人極少半是省民南州客旅誘人作婢僕擔夫至州洞則縛而賣之一人取黄金二兩州洞轉賣入交趾取黄金三兩歲不下數百千人有藝能者金倍之知文書者又倍面縛驅行仰繫其首俾不省來路旣出其國各認買主為奴終身皆刺額上為四五字婦人刺胷乳至肋拘繫嚴酷逃亡必殺又有秀才僧道伎術及配隷亡命逃奔之者甚多不能鼓鑄泉貨純用中國小銅錢皆商旅洩而出者按掠賣婢奴與士人遊邊及透漏錢寶出外界三者法禁具在今玩弊如此蓋安撫都監沿邊溪洞司不得人邊政頺靡姦宄肆行所致日滋月長未艾也及邊吏多無財用植立竊斗升癘土茍活待盡而已何暇顧邊防國事者宜痛心疾首焉然交人自熈寧敗降後亦不復敢猖獗南陲奠枕且百年紹興十二年妖人譚友諒􅇡入思浪州詐稱奉使諭下州洞天祚大恐已而帥司檄安南捕友諒邕州又以偽官告身招之友諒與歸順首領二十餘人各奉其銅印地圖土物詣横山知邕州趙願縛友諒赴帥司斬之首領悉送還安南皆死交趾安居至今無議之者乾道八年春上言願朝賀聖主登極詔廣西經略司貢使來者免至廷方物受什一其秋復有詔下經略司買馴象十以備郊祀鹵簿經略李德逺浩用木夾事移交趾買之蠻報不願賣願以備貢明年春余至官屢引前詔却其貢祀期寖近朝命督象若星火蠻復款塞六象及方物將至塞下若不許貢皆引歸小蕃寧敢與朝廷為市余以其狀聞且移書時相謂欲却其貢併象勿須可也祀以一純二精寧乏此俄有金字牌下差官押伴至闕比及桂林已秋末以十象為賀登極綱五象為進奉大禮綱表字如蠅頭僅可見其象飾禮物則有金御乗象羅我羅我如鞍架之狀及金裝象牙鞘金象額金銀裏象鈎連同心帶金間銀裝象額金銀裝朱纒象藤條金鍍銅裝象脚鈴裝象銅鐸連鐡索御乗象繡坐簟裝象㹈牛花朶御乗象朱梯御羅我同心龍頭帶等餘物則有金銀鈔鑼沉水香等大使稱中衞大夫尹子思正使承議郎李邦正副使忠翊郎阮文獻其下有職員書狀宫都衙通引知客監綱孔目行首押衙敎練象公長行防授官之屬此等入朝則稍更其服器使者幞頭靴笏紅鞋金帶犀帯毎夸以金箱之又以香膏沭髪如漆裹細摺烏紗巾足加履韈使者乗凉轎釘較髹漆甚飭蓋得至中國盡變椎髻徒跣抵鴉之制先是紹興二十六年嘗入貢參知政事施公大任帥桂循舊例以刺字報謁且用行㕑宴於其館余悉罷之使者私謂衙校曰施參政惠顧厚今奈何悉罷去余使人諭之曰經略使司與安南都護府埒經略使與南平王比肩使者是都護府小官纔與桂林曹掾官比法當廷參不然不見也使者屈服遂廷參其歸也至欲列拜余使人掖之曰免拜余奏其事且著於籍以為定制又辨今安南非古交趾已見輿地考交州條下不再錄文獻通考卷三百三十
