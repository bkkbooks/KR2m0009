body:
  text: 文獻通考卷二十鄱陽馬端臨貴與著市糴考一均輸市易和買周官泉府掌以市之征布斂市之不售貨之滯於民用者以其賈買之物揭而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後予之凡賒者祭祀無過旬日喪紀無過三月凡民之貨者與其有司辨而授之以國服為之息注見錢幣考水心葉氏曰熙寧大臣慕周公之理財為市易之司以奪商賈之贏分天下以債而取其什二之息曰此周公泉府之法也天下之為君子者又從而争之曰此非周公之法也周公不為利也其人又從而解之曰此真周公之法也聖人之意六經之書而後世不足以知之以此嗤笑其辨者然而其法行而天下終以大敝故今之君子真以為聖賢不理財言理財者必小人而後可矣夫泉府之法斂市之不售貨之滯於民用者以其賈買之其賒者祭祀喪紀皆有數而以國服為之息若此者真周公所為也何者當是時天下號為齊民未有特富者也開闔斂散輕重之權一出於上均之田而使之耕築之室而使之居衣食之具無不畢與然而祭祀喪紀猶有所不足則取於常數之外若是者周公不與則誰與之將無以充其用而恤之也則民一切仰上而其費無名故賒而貸之使以日數償而以其所服者為息且其市之不售貨之滯於民用者民不足於此而上不斂之則為不仁然則二者之法非周公誰為之蓋三代固行之矣今天下之民不齊久矣開闔斂散輕重之權不一出於上而富人大賈分而有之不知其幾千百年也而遽奪之可乎奪之可也嫉其自利而欲為國利可乎嗚呼居今之世周公固不行是法矣夫學周公之法於數千嵗之後世異時殊不可行而行之者固不足以理財也謂周公不為是法而以聖賢之道不出於理財者是足為深知周公乎且使周公為之固不以自利雖百取而不害而况其盡與之乎然則奈何君子避理財之名茍欲以不言利為義坐視小人為之亦以為當然而無怪也徒從其後頻蹙而議之厲色而争之耳然則仁者固如是邪愚論見錢幣考漢武帝元封元年置均輸官桑𢎞羊以諸官各自市相争物以故騰躍而天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國各往往置均輸鹽鐵官令遠方各以其物如異時商賈所轉販者為賦而相灌輸置平凖於京師都受天下委輸召工官治車諸器皆仰給大農大農諸官盡籠天下之貨物貴則賣之賤則買之如此富商大賈亡所牟大利則反本而萬物不得騰躍故抑天下之物名曰平凖天子以為然而許之一嵗之中諸均輸五百萬匹民不益賦而天下用饒是時嵗小旱上令百官求雨卜式言曰縣官當食租衣稅而已今𢎞羊令吏坐市列販物求利烹𢎞羊天乃雨昭帝時霍光輔政令郡國舉賢良文學之士使丞相御史相與語人疾苦文學曰理人之道防淫佚之原廣教道之端抑末利而開仁義無示以利然後教化可興而風俗可移也今郡國有均輸與人争利散敦厚之樸成貪鄙之行是以百姓就本寡而趨末衆夫末修則人侈本修則人懿懿則財用足侈則饑寒生願罷均輸以進本退末大夫曰匈奴背叛數為宼暴備之則勞中國不備則侵盗不止先帝哀邊人之愁苦為虜所俘乃修鄣塞飾烽燧屯戍以備之邊用不足故置均輸蕃貨長財以助邊費今議者欲罷之是内空府庫之財外乏執備之用罷之不便夫國有沃野之饒而不足於食者器械不備也有山海之貨而不足於財者商工不備也隴蜀之丹砂毛羽荆揚之皮革骨象江南之柟梓竹箭燕齊之魚鹽氊裘兖豫州之漆絲絺紵養生奉終之具也待商而通待工而成故聖人作為舟楫之用以通川谷服牛駕馬以達陵陸致遠窮深所以交庶物而便百姓也文學曰有國有家者不患貧而患不安故天子諸侯不言利害大夫不言得失蓄仁義以風之勵徳行以化之是以近者親附遠者說徳王者行仁政無敵於天下惡用費哉夫導人以徳則人歸厚示人以利則人俗薄俗薄則背義而趨利趨利則百姓交於道而接於市夫排困市井防塞利門而民猶為非况上為之利乎傳曰諸侯好利則大夫鄙大夫鄙則士貪士貪則庶人盗是開利孔為人罪梯也夫古之賦稅於人也因其所工不求其拙農人納其榖工女效其織今釋其所有責其所無百姓賤賣貨物以便上求間者郡國或令作布絮吏恣留難與之為市吏之所入非獨濟陶之縑蜀漢之布也亦人間之所為耳行姦賣平農人重苦女工再稅未見輸之均也縣官猥發闔門擅市則萬人並收並收則物騰躍騰躍則商賈牟利自市則吏容姦豪而富商積貨儲物以待其急輕賈姦吏收賤以取貴未見凖之平也蓋古之均輸所以齊勞逸而便貢輸非以為利而賈物大夫曰往者郡國諸侯各以其物貢輸往來煩難物多苦惡不償其費故郡置輸官以相給運而便遠方之貢故曰均輸開委府於京師以籠貨物賤則買貴則賣是以縣官不失實商賈無所牟利故命曰平凖凖平則民不失職均輸則人不勞故平凖均輸所以平萬物而便百姓也古之立國家者開本末之塗通有無之用故易曰通其變使人不倦故工不出則農用乏商不出則寶貨絶農用乏則榖不殖寶貨絶則財用匱故均輸所以通委財而周緩急是以先帝開均輸以足人財王者塞人財禁闗市執凖守時以輕重御人豐年則貯積以備乏絶凶年嵗儉則行幣物流有餘而拯不足戰士或不得祿今山東被災頼均輸之蓄倉廩之積戰士以奉饑人以振故均輸之蓄非所以賈萬人而專奉兵師之用亦所以振困乏而備水旱也古之賢聖理家非一室富國非一道理家養生必於農則舜不甄陶而伊尹不為庖故善為國者以末易本以虚易實今山澤之材均輸之蔵所以御輕重而役諸侯也先公曰今按桑大夫均輸之法大概驅農民以效商賈之為也然農民耕鑿則不過能輸其所有必商賈懋遷乃能致其所無今驅農民以效商賈則必釋其所有責其所無如賢良文學之說矣太史公平凖書云令遠方各以其物貴時商賈所轉販者為賦而相灌輸此說疑未明班孟堅採其語曰令遠方各以其物如異時商賈所轉販者而相灌輸此說渙然矣蓋作如異時三字是謂驅農民以效商賈之為也東萊吕氏尊遷抑固是以取書而不用志語然義理所在當惟其明白者取之是以通鑑取志語云水心葉氏曰平凖書直叙漢事明載聚斂之罪比諸書最簡直然觀遷意終以為安寧變故質文不同山海輕重有國之利按書懋遷有無化居周譏而不征春秋通商恵工皆以國家之力扶持商賈流通貨幣故子産拒韓宣子一環不與今其詞尚存也漢髙祖始行困辱商人之策至武帝乃有算船告緡之令鹽鐵𣙜酤之入極於平凖取天下百貨居之夫四民交致其用而後治化興抑末厚本非正論也使其果出於厚本而抑末雖偏尚有義若後世但奪之以自利則何名為抑恐此意遷亦未知也王莽簒位於長安及五都立五均官莽有所興造必欲依古經文劉歆言周有泉府之官收不售與欲得即易所謂理財正辭禁民為非者也莽乃下詔曰夫周禮有賒貸樂語有五均樂語樂元語河間獻王所傳道五均事言天子取諸侯之士以立五均則市無二賈四民常均傳記各有斡焉今開賒貸張五均設諸斡者所以齊衆庶抑并兼也遂於長安及五都立五均官更名長安東西市令及洛陽邯鄲臨淄宛成都市長皆為五均司市稱師東市稱京西市稱畿洛陽稱中餘四都各用東西南北為稱皆置交易丞五人錢府丞一人工商採金銀銅連錫登龜取貝者皆自占司市錢府順時氣而取之諸取衆物鳥獸魚鱉百蟲於山林水澤及畜牧者嬪婦蠶桑織紝紡績補縫工匠醫卜及他方技商販賈人坐肆列里區謁舍居處所在為區謁舍今客舍皆各自占所為於其所在之縣官除其本計其利十一分之而以其一為貢敢不自占占不以實盡没入所采取而作縣官一嵗諸司市常以四時中月實定所掌為物上中下之賈各自用為其市平毋拘他所衆民賣買五榖布帛絲綿之物周於民用而不售者均官有以考檢厥實用其本賈取之無令折錢萬物昂貴過平一錢則以平賈賣與民其賈低賤減平者聽民自相與市以防貴庾者庾積也積物待貴民欲祭祀喪紀而無用者錢府以所入工商之貢但賒之毋過旬日喪紀毋過三月民或乏絶欲貸以治産業者均受之除其費計所得收息毋過嵗什一按古人立五均以均市價立泉府以收滯貨而時其買賣皆所以便民也所謂國服為息者乃以官物賒貸與民則取其息耳今莽借五均泉府之說令民採山澤者畜牧者紡織者以至醫巫技藝各自占所為而計其息十一分之一以其一為貢則是直攫取之耳周公何嘗有此法乎噫古人之立法惡商賈之趨末而欲抑之後人之立法妬商賈之獲利而欲分之東漢章帝時尚書張林上言宜自交趾益州上計吏來市珍寶收採其利武帝所謂均輸也謂租賦并僱運之直官總取而官轉輸於京曰均輸詔議之尚書僕射朱暉曰按王制天子不言有無諸侯不言多少食祿之家不與百姓争利今均輸之法與賈販無異非明主所宜行帝不從其後用度益奢齊武帝永明中天下米榖布帛賤上欲立常平倉市積為儲六年詔出上庫錢五千萬於京師市米買絲綿綾絹布詳見市糴門唐徳宗時趙贊請置常平官兼儲布帛於兩都江陵成都揚汴蘇洪置常平輕重本錢上至百萬緡下至十萬積米粟布帛絲麻貴則下價而出之賤則加估而收之并𣙜商賈錢以贍常平本錢從之屬軍用迫蹙亦隨而耗竭不能備常平之數徳宗時宫中取物於市以中官為宫市使置白望數十百人以藍敝衣絹帛尺寸分裂酬其直又索進奉門户及脚價錢有齎物入市而空歸者每中官出沽漿賣餅之家皆徹肆塞門諫官御史言其弊而中官言京師百姓頼宫市以養帝以為然順宗即位乃罷之按京師百姓頼宫市以養之語出於中官之口此輩逢君之惡豈能顧義理之是非生民之休戚然王莽之五均介甫之易市亦皆以為便百姓而行之且舉周官泉府之法以緣飾其事然則名為效周公而識見乃此閹之流耳宋太宗皇帝太平興國七年詔應劒南東西川峽路從前宫市及織錦綺鹿胎透背六銖欹正龜殻等宜令諸州自今只織買綾羅紬絹布木綿等餘並罷之宋朝如舊制調絹紬布絲綿以供軍需又就所産折科和市其纎麗之物則東京有綾錦院初平蜀得錦工百人始置院所織有錦鹿胎花羅縐縠綾絁咸平初嘗停織機百餘令織絹西京真定府青益梓州亦有場院主織錦綺鹿胎透背潭州舊有綾錦務淳化四年廢江寧府潤州有織務江寧嵗無定額潤州萬疋又婺州嵗買萬疋潤州務舊十二日為一疋王子與制置江淮疋減一日嵗終不如數至被笞箠景徳三年詔復舊梓州有綾綺場又益州市買院亦織熟色綾及彭錦漢邛蜀眉陵簡遂資榮普州懷安軍皆織大小絹欹正花鈔大名府具滄徳博棣杭越湖婺州和市小綾廬夀州折科小綾乾徳四年蓬州請以租絲配民織綾給其工直詔不許舊濟州有機户十四嵗受直織綾開寶三年詔廩給者送闕下餘罷之湖州亦有織綾務太平興國中從轉運使熊延吉之請停務女工五十人悉縱之至道元年杭州置織務嵗市諸州絲給其用後罷又亳州市縐紗大名府織縐縠廬夀州亦折科白縠青齊鄆濮淄濰沂密登萊衡永全州市平絁廬夀濠泗和泰光州高郵漣水軍亦折科官絁又東京𣙜貨務嵗入中平羅小綾各萬疋以供服用及嵗時賜與諸州折科和市皆無常數唯内庫所需則有司下其數充足而止五年又詔官中買物有元不出産處毋得抑配擾民大中祥符三年河北轉運使李士衡言本路嵗給諸軍帛七十萬民間罕有緡錢常預假於豪民出倍稱之息及期則輸賦之外先償逋欠以是工機之利愈薄請令官司預給帛錢俾及時輸送則民獲利而官亦足用從之仍令優予其直自是諸路亦如之或蠶事不登則許以大小麥折納仍免其倉耗及頭子錢吳氏能改齋漫錄曰本朝預買紬絹謂之和買絹按玉壺清話與澠水燕談二書皆以為始於祥符初因王旭知潁州時大饑出府錢十萬緡與民約曰來年蠶熟每貫輸一縑謂之和買自爾為例而澠水燕談又以為其後李士衡行之陜西民以為便今行天下於嵗首給之然予按范蜀公東齋記事稱是太宗時馬元方為三司判官建言方春乏絶時預給庫錢貸之至夏秋令輸絹於官預買紬絹蓋始如此以三書考之當以范說為是蓋范嘗為史官耳予讀詩人袁陟世弼所為墓誌序其當仁宗時為太平州當塗知縣且言江南和市紬絹豫給民錢郡縣或以私恵人而不及農者當塗尤甚世弼所為條約細民始均得之乃知太宗之所以恵愛天下多矣而其後以鹽代錢以為縑直又其後也鹽亡而額存然後知左氏所謂作法於涼其說不誣矣國初凡官所需物多有司下諸州從風土所宜及民産厚薄而率買謂之科率開寶三年令天下諸州凡絲綿紬絹麻布香藥毛翎箭笴皮革筋角等所在約支二年之用不得廣有科市以致煩民淳化五年詔諸州科買物非風土所出多課民轉市於他處及調役飛輓不均者件析以聞當議均減止齋陳氏曰和預買始於太平興國七年然折錢未有定數如轉運使輙加重詔㫖禁絶之熙寧理財多折見錢而諸郡猶有添起貫陌不等之弊朝廷隨即行遣今之困民莫甚於折帛而預和市尤為無名之斂然建炎初行折帛亦止二貫户部每嵗奏乞指揮未為常率四年為三貫省紹興二年為三貫五百省四年為五貫二百省五年七貫省七年八貫省至十七年有㫖稍損其價兩浙紬絹每疋七貫文内和買六貫五百文綿每兩四百文江東路紬絹每疋六貫文則科折之重至此極矣不可不務寛之也皇祐中詔曰三司嵗下諸路科買多出倉猝故物價翔踴傷民其度民所堪先期告戒若府庫有備勿復收市嘉祐三年樞密副使張屏請罷民間科率及營造不急之物其庫務物之闕供者在所以官分售之於是置減省司於三司命韓絳陳升之等總其事自是多所裁損矣初京師有雜買務雜買場以主禁中貿易景祐中嘗詔須庫物有缺乃聽市於雜買務皇祐中帝謂輔臣曰國朝懲唐宫市之弊置務以京朝官内侍參主之以防侵擾而近嵗非所急物一切收市擾人甚矣乃申景祐之令使皆給實直其後内東門市民間物或累嵗不償錢有司請自今悉開雜買務以見錢售之内出金帛欲易錢者舊付雜賣場至是又悉請送左蔵庫計直易錢詔皆可之至嘉祐中復詔金帛付雜賣場以三司判官監視平估以售毋抑配小民英宗治平四年三司言在京糯米有餘蓄請令發運司損和糴數五十萬石市金帛上京儲之𣙜貨務備三路軍需從之神宗熙寧三年御史程顥言京東漕司王廣亷和買紬絹增數抑配率錢千課絹一疋其後和買并稅絹疋皆輸錢一千五百詔條析以聞時王安石右廣廉顥言不行祖宗時官市布帛依時直以濟用度其有預給直俾偕嵗賦以輸公上謂之和預買然價輕而物重民力浸困其後官不給直而賦取益甚矣時右正言李常亦言廣廉以陳汝羲所進羡餘錢五十餘萬緡隨和買絹錢分配於常稅折科放買外更取二十五萬緡請以顥言付有司行之不從七月以京東預買紬絹并息錢五十萬緡賜常平場司按熙寧初王介甫秉政專以取息為富國之務然青苗則春散秋斂是以有賒貸之息市易則買賤賣貴是以有貿易之息至於和買則官以錢買民之紬絹而已息錢惡從出蓋當時言利小人如王廣亷輩以千錢配民課絹一疋其後疋絹令輸錢一千五百是假和買紬絹之名配以錢而取其五分之息如明道所言可見其刻又甚於青苗矣四年遣李元輔變運川峽四路司農物帛中書言物帛至陜西擇省様不合者貿之糴糧儲於邊期以一年畢五年户部上其數凡八百十六萬一千七百八十四兩三百四十六萬二千緡有奇均輸市易熙寧二年制置三司條例司言今天下財用無餘典領之官拘於弊法内外不相知盈虚不相補諸路上供嵗有常數豐年便道可以多致而不能贏年儉物貴難以供億而不敢不足遠方有倍蓰之輸中都有半價之鬻徒使富商大賈乗公私之急以擅輕重斂散之權今發運使實總六路之賦入而其職以制置茶鹽礬酒稅為事軍儲國用多所仰給宜假以錢貨資其用度周知六路財賦之有無而移用之凡糴買稅斂上供之物皆得徙貴就賤用近易遠令預知中都帑蔵年支見在之定數所當供辦者得以從便變易蓄買以待上令稍收輕重斂散之權歸之公上而制其有亡以便轉輸省勞費去重斂寛農民庶幾國用可足民財不匱詔令本司具條例以聞而以發運使薛向領均輸平凖事賜内蔵錢五百萬緡上供米三百萬石時議慮其為擾多以為非向既董其事乃請置官設屬帝曰兹事鼎新脫有紛紜須朝廷堅主之使得自擇其屬若委以事而制於朝廷是教玉人雕琢也向於是辟置衞琪孫珪張穆之陳倩為屬又請有司具六路嵗所當上供之數中都嵗所用及見儲度可支嵗月凡當計置幾何皆預降付有司從之權開封府推官蘇軾言均輸立法之初其說尚淺徒言徙貴就賤用近易遠然而廣置官屬多出緡錢豪商大賈皆疑而不敢動以為雖不明言販賣然既已許之變易變易既行而不與商賈争利未之聞也夫商賈之事曲折難行其買也先期而予錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今官買是物必先設官置吏簿書廩祿為費已厚非良不售非賄不行是以官買之價比民必貴及其賣也弊復如前商賈之利何緣而得朝廷不知慮此乃捐五百萬緡以予之此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多矣諫官李常論均輸不便他日帝語宰執曰朕問常何以名均輸常言買賤賣貴而已朕諭以禹貢納粟納秸此即均輸之意豈買賤賣貴哉王安石曰常所言乃平凖非均輸也蓋常亦不曉均輸之名耳帝復以手詔褒諭薛向然均輸後訖不能成元豐二年帝因論薛向建京師買鹽鈔法無成事語侍臣曰新進之人輕議更法其後見法不可行猶遂非憚改均輸之法如齊之管仲漢之桑𢎞羊唐之劉晏其智僅能推行况其下者乎朝廷措置終始所當重惜雖少年所不快意然於國計甚便姑静以待之五年詔曰天下商旅物貨至京多為兼并之家所困宜出内蔵庫錢帛選官於京師置市易務先是有魏繼宗者自稱草澤上言京師百貨所居市無常價貴賤相傾富能奪貧能與乃可以為天下於是中書奏在京師市易務監官二提舉官一勾當公事官一許召在京諸行鋪牙人充本務行人牙人内行人令供通已所有或借他人産業金銀充抵當五人已上充一保遇有客人物貨出賣不行願賣入官者許至務中投賣勾行人牙人與客人平其價據行人所要物數先支官錢買之如願折博入官物者亦聽以抵當物力多少許令均分賒請相度立一限或兩限送納價錢若半年納即出息一分一年納即出息二分以上並不得抑勒若非行人見要物而實可以收蓄變轉亦委官司折博收買隨時估出賣不得過取利息其三司諸司庫務年計物若比在外科買省官私煩費即亦一就收買故降是詔又以贊善大夫户部判官吕嘉問提舉在京市易務仍賜内蔵庫錢一百萬緡京東市錢八十七萬緡為市易本錢其餘合有交鈔及折博物令三司應副時三司起請市易十三條其一云兼并之家較固取利有害新法令市易務覺察按置御批削去此條七月諭王安石聞市易極苛細人皆怨謗如𣙜貨鬻氷則民鬻雪者皆不售市梳樸則梳樸貴市脂麻則脂麻貴安石皆辯解之以為鬻氷由園苑梳樸為兼并者欲占脂麻以不稔自當貴耳上又謂市易鬻果太煩碎罷之如何安石曰立法當論有害於人與否不當以煩碎廢也七年詔權三司使曾布翰林學士吕恵卿同究詰市易事先是帝出手詔付布謂市易司市物頗害小民之業衆言諠譁布乃引監市易務魏繼宗之言以為吕嘉問多取息以干賞商旅所有者盡收市肆所無者必索率賤市貴鬻廣裒贏餘是挾官府為兼并也王安石具奏明其不然乃更令恵卿偕布究詰之布即上行人所訴並疏恵卿姦欺狀且言臣自立朝以來每聞徳音未嘗不欲以王道治天下今市易之為虐固已凛凛乎間架除陌之事矣嘉問奏近差官往湖南販茶陜西販鹽兩浙販紗皆未敢計息臣以為如此政事書之簡牘不獨唐虞三代所無厯觀奏漢以來衰亂之世恐未之有也五月乃詔章惇曽孝寛即軍器監鞫布所究市易事又令户房㑹財賦數與布所陳異而吕嘉問亦以雜買物多入月息錢不覺皆從公坐有差未幾布裭職與嘉問皆出守郡魏繼宗仍奪秩勒停初市易之建布實預之後揣帝意有疑遂急治嘉問而恵卿與布有宿怨故卒擠之而市易如故九年中書言市易息錢并市利錢總收百三十三萬二千緡有奇詔吕嘉問等推恩有差自後凡二年一較十年定上界本錢以七百萬緡為額不足以嵗所收息益之其貸内帑錢嵗償以息二十萬緡元豐二年詔市易舊法聽人賒錢以田宅或金銀為抵當無抵當者三人相保則給之皆出息十分之二過期不輸息外每月更罰錢百分之二貪人及無頼子弟多取官貨不能償積息罰愈滋囚繫督責徒存虚數實不可得於是都提舉市易王居卿建議以田宅金銀抵當者減其息無抵當徒相保者不復給自元豐二年正月一日以前本息之外所罰錢悉蠲之凡數十萬緡負本息者延其半年衆議頗以為愜按均輸市易皆建議於熙寧之初然均輸卒不能行市易雖行之而卒不見其利何也蓋均輸之說始於桑𢎞羊均輸之事備於劉晏二子所為雖非知道者所許然其才亦有過人者蓋以其隂籠商販之利潛制輕重之權未嘗廣置官屬峻立刑法為抑勒禁制之舉迨其磨以嵗月則國富而民不知所以史記唐書皆亟稱之以為後之言利者莫及然則薛向之徒豈遽足以希其萬一宜其中道而廢也然所謂徙貴就賤用近易遠則夫祖宗時以賦稅而支移折變以茶鹽而入中糧草即其事矣茍時得能吏以斡運之使其可以裕國而不至困民豈非理財之道固不必親行販易之事巧奪商賈之利而後為均輸也介甫志於興利茍慕前史均輸之名張官置吏廢財勞人而卒無所成誤矣至於市易則假周官泉府之名襲王莽五均之跡而下行黠商豪家貿易稱貸之事其所為又遠出桑劉之下今觀其法制大槩有三結保貸請一也契要金銀為抵二也貿遷物貨三也是三者桑劉未嘗為之然自可以富國則其才豈後世所能及然貸息抵當貿遷之事使富家為之假以嵗月豈不獲倍蓰千萬之利今考之熙寧五年賜内蔵庫及京東路錢為市易本共一百八十七萬緡至九年中書言市易息錢並市利錢僅總收百三十三萬二千緡有奇嗚呼以縣官而下行黠商豪家之事且貿遷圗利且放償取息以國力經營之以國法督課之至使物價騰踴商賈怨讟而孳孳五年之間所得子本蓋未嘗相稱也然則是豈得為善言利乎桑劉有知寧不笑人地下又按鄭介夫熙寧六年進流民圖狀言自市易法行商旅頓不入都競由都城外徑過河北陜西北客之過東南者亦然蓋諸門皆凖都市易司指揮如有商貨入門並須盡數押赴市易司賣以此商稅大虧然則市易司息錢所獲蓋不足以補商稅之虧矣熙寧三年王韶置秦鳳市易司於古渭城六年置兩浙市易司於杭州又置夔路市易司於黔州十二月置成都市易司八年置廣州市易司又置鄆州市易司熙寧六年詳定行户利害所言乞約諸行利入厚薄納免行錢以祿吏與免行户祗應自今禁中買賣并下雜買務仍置市易估市物之低昂凡内外官司欲占物價則取辦焉皆從之鄭俠奏議跋云京城諸行以計利者上言云官中毎所需索或非民間用物或雖民間用物間或少缺率皆數倍其價收買供官今立法每年計官中合用之物令行人衆出錢官為預收買准備急時之用如嵗終不用即出賣不過收二分之息特與免行所貴於行人不至於急時枉用數倍之價至於破壞鋟本此法固善若要深合民心上等行人多出中等助之下等貧乏特與免官中只取足用無冀其餘則善矣洎至立法更不辨上中下之等一例出錢富者之幸貧者之不幸其不願者固多而願者少矣才立法隨有指揮元不係行之人不得在街市賣壞錢納免行錢人争利仰各自詣官投充行人納免行錢方得在市賣易不赴官自投行者有罪告者有賞此指揮行凡十餘日之間京師如街市提瓶者必投充茶行負水擔粥以至麻鞋頭髲之屬無敢不投行者適因獻丞相書言及是又黎東美之前得子細陳述相次聞已有指揮些少擎負販賣者免投行然已踰萬緡之數三月二十七日聖㫖所先放乃此免行錢也元豐三年詔免行月納錢不及百者皆除之凡除八千六百五十四人哲宗元祐元年外内監督市易及功場浄利錢許以所入息并罰錢比計若及官本者並釋之紹興四年復置市易務唯以錢交市收息毋過二分勿令貸請元符三年市易務改名平凖務哲宗紹聖元年户部言兩浙蠶絲薄今嵗和買并稅紬絹請令四等下户輸錢易左帑等紬絹用之徽宗建中靖國元年尚書省言預買錢多人户願請比嵗例增給詔諸路提舉司假本司剰利錢同漕司來嵗市紬絹計綱赴京左司員外郎陳瓘言預買之息重於常平數倍人皆以為苦何謂願請今復創增雖名濟乏實聚斂之術大觀元年以坊郭户預買有家至千疋或四五百疋者令諸路漕司詳度以聞政和元年臣僚言兩浙因紹聖中王同老之請和買并稅紬絹疋有頭子錢又收市例錢四十例外約增數萬緡以分給典吏等多者千餘緡少者五百緡於是詔罷市例錢政和六年成都路官户預買許減其半後河北諸路皆如之既而臣僚言二浙官户猥多請均和預之數乃照舊嘗全利者如舊七年詔和預買絹本以利民比或稍償雜物或徒給虛券為民害多其令漕司㑹一路之數分下州縣經畫不以錢而以他物不以正月而以他月給者以違制論髙宗建炎三年車駕初至杭州朱勝非為相兩浙運副王琮言本路上供和買紬絹嵗為一百一十七萬疋每疋折納錢兩千計三百五萬緡省以助國用詔許之東南折帛錢自此始折帛和買非古也國初二稅輸錢米而已咸平三年始令州軍以稅錢物力科折帛絹而於夏科輸之此夏稅折帛之所從始也大中祥符九年内帑發下三司預市紬絹時青齊間絹疋直八百紬六百官給錢率増二百民甚便之自後稍行之四方寶元後改給鹽七分錢三分崇寧三年鈔法既變鹽不復支三分本錢亦無九月御筆朕累下寛恤之詔而迫於經費未能悉如所懷今聞江南和預買絹其弊尤甚可下江浙減四分之一以寛民力仍俵見錢違寘之法二年户部請諸路上供絲帛並半折錢如兩浙例於是左相吕頤浩視師右相秦檜奏從之江淮閩廣荆湖折帛錢自此始時江浙湖北夔路嵗額紬三十九萬疋江南川廣湖南兩浙絹二百七十三萬匹東川湖南綾羅絁七萬疋四川廣西路布七十七萬疋成都府錦綺千八百餘疋皆有奇神武右軍統制張俊置到産業乞蠲免應干和買等事紹興四年詔特依後省言國家兵革未息用度至廣粒米寸帛悉出民力陛下哀憫元元權俾士大夫及勲戚之家與編户一等科敷蓋欲寛民力均有無今俊獨得免則當均在餘户是使為俊代輸也人心謂何兼方今大將不止俊一人使各援此例求免何以拒之望命有司檢㑹官户科敷及和預買等見行條法劄俊使知詔令以次官書行後省又言從俊之請則恩加於將帥而害及於編户望收還前詔乃所以安俊其命遂寢越數年俊乞免嵗輸和買絹俊時為少傅淮西宣撫使三省擬本嵗特賜俊絹五千疋庶免起例上以示俊因諭之曰諸將皆無此獨汝欲開例朕固不惜但恐公議不可汝自小官朕拔擢至此須當自飭如作小官時乃能長保富貴為子孫之福俊惶悚力辭賜絹俊喜殖産其罷兵而歸嵗收租米六十萬斛右司諫王瑨言軍興以來費用百出州縣科敷有不能免已詔官户並同編户所以寛下民也諸寺院之多産者𩔖請求貴臣改為墳院冀免科敷朝廷優禮大臣特從所請然官户既不免墳院豈緣官户得免哉况今前宰執員數不少所在僧徒僥倖干請使莊産多者獨免則合科之物歸之下户非官户同編户之意也詔户部申嚴行下詔諸路憲臣覈州縣已未支還和買本錢實數來上初魏矼在考功建言州縣和預買絹不給本錢乞就折民間應納役錢使官無受給之弊民無請給之勞尋下轉運常平司議冬十月兩浙轉運司言本路嵗用和買本錢七十三萬餘緡無可那撥而常平司言此錢既充和買則役人無以給之其議遂止按折帛元出於和買其始也則官給錢以買之其後也則官不給錢而白取之又其後也則反令以每疋之價折納見錢而謂之折帛倒置可笑如此則官價之不給久矣今乃甫詔諸路憲臣覈州縣已未支和買本錢實數來上豈其時上之人元未知邪或官吏肆為欺蔽復以和買名色妄有支破邪魏矼之說固為當理然役錢者應納之物也折帛者横取之物也官惟其乏錢是以不免横取於民若其可蠲則自當明蠲横取之折帛錢正不必以應納之役錢比折也四年十一月初令江浙民户悉納折帛錢六年兩浙轉運使李迨始取婺秀湖州平江府嵗計寛剰錢二十二萬八千緡有奇依折帛錢條限起發十七年詔減折帛錢江南每疋為六千兩浙七千和買六千五百綿江南每兩三百兩浙四百自來年始孝宗乾道四年宰執進呈度支郎官劉師尹奏江浙四路折帛錢紹興初年立價折納至十一年頓增一倍十二年九月赦書止令折十之一十五年又詔兩浙夏稅紬絹疋減一貫和預買減一貫二百江東西減兩貫緣州縣不盡遵依暗有增添乞裁減以寛民力上曰朕未嘗妄用一毫只為百姓可從之冬十有二月甲辰詔兩浙江東西路乾道五年夏稅和買折帛錢並權與減半輸納一年如州縣過取一文以上許人户詣檢鼓院進狀陳訴淳熙十一年臣僚言浙東和買紹興路偏重浙西臨安府偏重尋諭兩浙漕臣錢冲之臨安守臣張杓條奏又言和買科取人皆規避田愈多則析户愈不一其始也敷及上户而中户不與其後也上户巧為規避而中戸不得免乾道二年每物力户二十一千敷和買一疋至淳熙七年十五千敷一疋數年後可知也其弊皆由不以田畝均敷其害至此惟平江一郡和買皆畝均故民之詭名少望先自浙東西行以畝均敷之法則民不偏受其害汪義端言若和買用畝頭均敷則上户頓減而下户頓增蓋下五等人户元不預和買但每丁有丁絹有丁綿有丁鹽錢今又以畝頭均受上户和買則是以一小民之身些小薄瘠之産而納數項之稅賦合將逐縣浮財物力只照舊例均敷於四等以上為是光宗紹熙元年臣僚言廣徳軍兩縣物力不多而和預買絹乃二萬六千餘疋視他郡十倍其數民何以堪户部㸔詳紹興三年已減一萬一千一百餘疋後因守臣胡彦國於經界時妄復元數民不勝困於是江東運副林岍奏增復之數姑減一半漕司通融代納三分之一餘二分倚閣今本部更與抱認一分餘一分令本軍措置從之三年臣僚言今日取民已重未能蠲除使之均平民亦無怨然有甚不均者夏稅和買之有折帛官户則多納本色秋米之有加耗官户則止納正數和糴非正賦不得已而取之乃止敷民户而不及官户夫有官君子居位食祿正宜率先鄉里以應公上之需乃恃勢自私如此不均孰甚焉望申嚴諸州縣應折變加耗科敷之𩔖官民户並一概輸納違許内外臺劾奏從之祕書郎孫逢吉言和買為民間白着之賦雖正月給散本錢之法尚載令甲而人户鈔旁亦有見錢請給之文然上下皆知其為文具也中興之初絹價暴增疋至十貫高宗念下户重困乃令上户輸絹下户輸錢於是有折帛之名疋折六貫或七貫和議既定物帛稍賤又令輸紬者以八分折錢輸絹者以三分折錢餘輸本色遂為定制朝廷以經費之故未能裁損州縣又於此外苛取民力安得不重困哉侍御史林大中論江浙四路和買之弊略謂今日東南所入之數較之祖宗時已不啻數倍掌計之人倘循中制取之一嵗之入自足以給一嵗之用茍為國斂怨所得少而所失多矣時東南諸路嵗起紬三十九萬疋浙東上供八萬淮衣福衣八千浙西上供九萬二千淮衣萬六千江東上供九萬淮福衣二萬七千江西上供五萬二千淮福衣萬五千湖北上供三百皆有奇絹二百六十六萬疋浙東上供四十三萬六千淮福衣五萬三千天申大禮八千浙西上供三十八萬一千淮福衣十三萬八千天申大禮萬疋江東上供四十萬六千淮福衣十三萬九千天申大禮八千江西上供三十萬四千淮福衣六萬七千天申大禮八千已上皆有奇淮東天申大禮五萬九百五十淮西大禮三千七百湖南天申大禮四百廣東天申大禮四千六百廣西天申大禮六千五百綾羅絁三萬餘疋浙西綾八千七百婺州羅二萬湖南平絁三千其淮福衣及天申大禮與綾羅紬總五十二萬疋有奇皆起正色其紬絹二百五十六萬餘疋約折錢一千七百餘緡而綿不與焉葉適應詔條奏言何謂和買之患也自州縣而後至於民民猶怨州縣而後及於朝廷和買則正取之民而民固以二稅為常賦也豈宜使經用有不足於二稅之内而復有所求哉經用不足則大正其名實可也承平已前和買之患尚少民有以乏錢而須賣官有以先期而便民今也舉昔日和買之數委之於民使與夏稅並輸民自家力錢之外浮財營運生生之具悉從折計且若此者上下皆明知其不義獨困於無策而莫之敢蠲耳陛下斷然出命以號天下曰自今並罷和買之為上供者所用紬絹惟軍衣未可裁損其他宫禁官吏時節支賜格令之所應與者一切不行可也和買既罷取民之名正義聲暢於海内矣又曰何謂折帛之患支移折變昔者之弊事固多矣而今莫甚於折帛折帛之始以軍興絹價大踴至十餘千而朝廷又方乏用於是計臣始創為折帛其說曰寛民而利公其後絹價既平而民之所納折帛錢乃三倍於本色既有夏稅折帛又有和買折帛且本以有所不足於夏稅而和買以足之今乃使二者均折於事何名而取何義乎其事無名其取無義平居自治其國且不可而况欲大有為於天下乎雖然折帛之為錢多矣所資此以待用者廣矣陛下必鉤考其凡目而後可以有所是正若經總制錢不減和買折帛不罷舍目睫之近而游視於八荒此方召不能為將良平不能為謀者也寧宗嘉泰二年判建康府吳琚奏本府在城上元江寧兩縣昨因兵火遂將營運和買綿絹數在外三縣内句容除元額外增絹二千一十九疋綿二萬一百六十兩繼嘗請減於朝而時相無田土在句容謂秦檜獨不與減今欲與盡減續增之綿永除下邑偏重之害本府自行承認減數並可嘉定十一年夏五月臣僚言鄱陽為邑經界之初稅錢額管八千六百四十二貫有奇每稅錢一百文敷和買六尺四寸八分有畸吏緣為姦有增益積至嘉定九年遂及七尺五寸六分又且見寸收尺謂之合零就整去年復頓增三寸以最小崇徳一鄉言之嘉定九年分額管五百貫文有奇敷和買絹九百三十餘疋去年只管九百四十貫有奇乃增至九百五十五疋可知其他乞明詔有司痛為革絶從之市舶互市宋初承周制與江南通市乾徳二年不許商旅渉江於建陽漢陽蘄口置三𣙜署通其交市開寶三年徙建安𣙜署於揚州及江南平𣙜署仍舊置專掌茶貨互市者自漢初與南粤通關市其後匈奴和親亦與通市後漢與烏桓北單于鮮卑通交易後魏之宅中夏亦於南陲立互市隋唐之際常交戎夷通其貿易開元定令載其條目後唐復通北戎互市此外高麗囘鶻黑水諸國亦以風土所産與中國交易右宋三朝國史食貨志略言厯代互市之概今錄於此開寶四年置市舶司於廣州以知州兼使通判兼判官止齋陳氏曰是時市舶雖始置司而不以為利淳化二年始立抽解二分然利殊薄元豐始委漕臣覺察拘攔已而又置官望舶而泉杭密州皆置司崇寧置提舉九年之間收置一千萬矣政和四年施述奏市舶之設元符以前雖有而所收物貨十二年間至五百萬崇寧經畫詳備九年之内收至一千萬其後廢置不常今惟泉廣州提舉官如故北蕃在太祖時雖聽緣邊市易而未有官署太平興國二年始令鎮易雄覇滄州各置𣙜務命常參官與内侍同掌輦香藥犀象及茶與交市後有范陽之師乃罷不與通端拱元年復詔許互市二年復禁之淳化二年置𣙜如舊制尋復罷景徳初通好北戎乃復於雄覇州安肅軍置三𣙜場凡官鬻物如舊而綿漆器秔糯所入有錢銀布羊馬槖駝嵗獲四十餘萬東夷西戎南蠻溪洞皆聽與邊人市易景徳四年夏州納欵於保安軍置𣙜場以繒帛羅綺易羊馬牛駝玉氈毯甘草以香藥甆漆器薑桂等物易蜜蠟麝臍毛褐羊角硇砂柴胡蓯蓉紅花翎毛非官市者聽與民交易仁宗時詔杭明廣三州置市舶司海舶至者視所載十算其一而市其三海舶嵗入象犀珠玉香藥之𩔖皇祐中總其數五十三萬有餘陜西𣙜場二天聖中并代路亦請置場和市許之及元昊反即詔陜西河東絶其互市廢保安軍𣙜場後又禁陜西並邊主兵官與屬羗交易久之元昊請臣數遣使求復互市慶厯六年從其請復為置場於保安鎮戎二軍嵗售馬二千匹羊萬口繼言驅羊馬至無放牧之地為徙保安軍場於順寧寨既而畨商卒無至者朝廷亦不詰英宗治平四年河東經畧司言夏人匄通和市初夏人攻慶州大順城詔罷嵗賜禁邊民毋得私貿易至是上章謝罪復許之神宗熙寧八年市易司請假奉宸庫象犀珠直二十萬緡於𣙜場貿易至明年終償其直從之九年詔立與化外人私相貿易罪賞法河北漕司請也河北四𣙜場自治平四年其物貨專掌於三司之催轄司而度支賞給案判官置簿督之至是以私販者衆故有是命哲宗元祐元年杭明廣三州市舶是年收錢糧銀香藥等五十四萬一百七十三緡疋斤兩叚條箇顆臍隻粒支二十三萬八千五十六緡疋斤兩叚條箇顆臍隻粒五年刑部言賈人由海道往外蕃請令以賈物名數并所詣之地報所在州召保毋得參帶兵器或違禁及可造兵器物官給以文慿若擅乗船由海入界河及住高麗新羅登萊州境者罪以徒住北界者加等宣和七年以度僧牒給舶司為折博本廣南福建兩浙五百至三百各有差髙宗紹興二年邕州守臣言大理請入貢上諭大臣令賣馬可也進奉可勿許臣僚言邕欽廉三州與交趾海道相連亡頼之徒掠賣人口販入其國貿易金香以小平錢為約詔監司守倅巡捕覺察四年詔川陜即永康軍威茂州置博易場移廣西買馬司於邕管嵗捐金帛倍酬其直然言語不通一聽譯者髙下其手吏因緣為姦非守倅廉明則弊倖滋甚凡蠻人將以春二月市馬必先遣數十騎至寨謂之小隊如先失其心則馬不至矣言者謂當厚其繒綵待以恩禮十二年盱眙軍建𣙜場置官監凖平撘息不得過三分兌賣入官别撘息與北官博易應造軍器之物及犬馬等並禁其淮西京西陜西𣙜場如之於是沿淮上下東自揚楚西際光夀禁止私渡凡南客販到草末茶止許本場折博不得令南北客相見北使所過有博易者許接送伴使應副十九年罷國信所博易二十四年詔四川茶馬復置黎州在城及雅州碉門靈門兩寨博易場詳見茶考二十九年詔存盱眙軍𣙜塲外餘並罷建炎元年六月詔市舶多以無用之物枉費國用取悅權近自今有以篤褥香指環瑪瑙猫兒眼睛之𩔖博買前來及有虧蕃商者皆重寘其罪令提舉按察惟宣賜臣僚象笏犀帶取材舶司每令揀選堪用者起發凡舶舟之來最大者為獨檣舶能載一千婆蘭胡人謂三百斤為一婆蘭也次曰牛頭舶比獨檣得三之一次三木舶次料河舶遞得三之一也紹興十七年十一月詔三路舶司蕃商販到龍腦沉香丁香白豆䓻四色並抽解一分餘數依舊法先是十四年抽解四分蕃商訴其太重故也上因問御史臺檢法張闡舶嵗入幾何闡奏抽解與和買嵗計之約得二百萬緡上云即此即三路所入皆常賦之外未知户部如何收附如何支使令輔臣取實數以聞隆興二年臣僚言熙寧初創立市舶以通貨物舊法抽解有定數而取之不苛納稅寛其期而使之待價懷遠之意實寓焉邇來抽解名色既多兼迫其輸納使之貨滯而價減所得無幾恐商旅不行乞下市舶司約束從之既而市舶司條具利害謂抽解舊法十五取一其後十取其一又後擇其良者如犀牙十分抽二又博買四分真珠十分抽一又博買六分舶户懼抽買數多所販止是麤色雜物照得象牙珠犀比他貨至重乞十分抽一之外更不博買且三路舶船各有司存舊法召保給據起發囘日各於發舶處抽解近緣兩浙舶司申請隨便住舶變賣遂壞成法乞下三路照舊法施行兼商賈由海道興販其間或有盗賊風波逃亡者囘期難以程限乞令召物力户充保自給公憑日為始若在五月内囘舶與優饒抽稅如滿一年内不在饒稅之限滿一年之上許從本司根究責罰施行若有透漏充保物力户同坐從之見任官將錢寄附綱首客旅過蕃買物者有罰舶至抽解和買入官外違法抑買許蕃商越訴計贓坐罪國家三路舶司嵗入固不少然金銀銅鐵海舶飛運所失良多而銅錢之泄尤甚民用日以枵法禁雖嚴姦巧愈密商人貪利而暮夜貿遷黠吏受賕而縱釋莫問其弊卒不可禁矣六年詔諸市舶綱首能招誘舶船抽解物貨累價及五萬貫補助以上者補官有差監官推賞其後監官等止將海商入蕃興販便作招誘計數該賞者多而發到香貨下色者皆充數紐估乃詔舶司相度措置毋容僥倖文獻通考卷二十
