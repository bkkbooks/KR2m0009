body:
  text: 文獻通考卷二鄱陽馬端臨貴與著田賦考二歴代田賦之制王莽末天下旱蝗黄金一斤易粟一斛至光武建武二年野榖旅生麻菽尤盛野蠶成繭被於山阜人收其利至五年野榖漸少田畝益廣焉建武六年十二月詔曰頃者師旅未觧用度不足故行什一之税今軍士屯田糧儲差積其令郡國收見田租三十而税一如舊制建武十五年詔州郡檢覆墾田帝以天下墾田多不以實自占又户口年紀互相增減乃下詔州郡檢覆於是刺史太守多為詐巧苟以度田為名聚民田中并度廬屋里落民遮道啼呼或優饒豪右侵刻羸弱時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川𢎞農可問河南南陽不可問帝詰吏由趣吏不肯伏抵言於長夀街得之帝怒時東海公陽年十二侍側曰吏受郡𠡠當欲以墾田相方耳河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖帝令虎賁将詰問吏吏乃首服十六年河南尹張伋及諸郡守十餘人坐度田不實下獄死章帝建初三年詔度田為三品秦彭為山陽太守興起稻田数千頃毎於農月親度頃畝分别肥瘠差為三品各立文簿藏之鄉縣於是姦吏跼蹐無所容詐乃上言宜令天下齊同其制詔書以其所立條式頒令三府並下州縣詔以布帛為租時榖貴縣官給用不足尚書張林上言榖所以貴由錢賤故也可盡封錢一取布帛為租以通天下之用從之和帝永興元年墾田七百三十二萬一百七十頃八十畝百四十歩安帝延光四年墾田六百九十四萬二千八百九十二頃三十三畝八十五歩元初元年詔除三輔三嵗田租更賦口算順帝建康元年墾田六百八十九萬六千二百七十一頃五十六畝一百九十四步據建康元年户九百九十四萬六千九百九十毎户合得田七十畝有竒冲帝永嘉元年墾田六百九十五萬七千六百七十六頃二十畝百有八步質帝夲初元年墾田六百九十三萬一百二十三頃三十八畝桓帝延熹八年初令郡國有田者畝税斂錢畝十錢也按章帝時以榖貴乃封錢以布帛為租則錢帛盖嘗迭用矣此所謂畝税斂錢乃出於常賦三十取一之外今所謂税錢始此靈帝中平二年税天下田畝十錢又名修宫錢帝欲鑄銅人而國用不足乃詔調民田畝税十錢陸康上疏曰哀公增賦而孔子非之豈有取奪民物以營無用之銅人捐捨聖戒自蹈亡國之法哉仲長統昌言曰今欲張太平之紀綱立至化之基址齊民財之豐寡正風俗之奢儉非井田實莫由也今當限夫田以斷兼并去末作以一夲業通肥饒之率計稼穡之入令畝收三斛斛取一斗未為甚多一嵗之間則有數年之儲雖興非法之役恣奢侈之欲廣愛幸之賜猶未能盡也不循古法規為輕税及至一方有警一面被災未逮三年校計蹇短坐視戰士之蔬食立望餓殍之滿道如之何為君行此政也二十税一名之曰貊况三十税一乎夫薄吏祿以豐軍用緣於秦征諸侯續以四夷漢承其業遂不改更危國亂家此之由也今田無常主民無常居吏食日稟班禄未定可為法制畫一定科租税什一更賦如舊今者土廣人稀中地未墾雖然猶當限以大家勿令過制其地有草者盡曰官田力堪農事乃聴受之若聴其自取後必為姦也崔寔政論曰昔聖人分口耕耦地各相副今青徐兖冀人稠土狭不足相供而三輔左右及凉幽州内附近郡皆土曠人稀厥田宜稼悉不墾發今宜遵故事徙貧人不能自業者於寛地此亦開草闢土振人之術也魏武初平袁氏以定鄴都令收田租畝粟四升户絹二疋而綿二斤餘皆不得擅興藏強賦弱吳孫權黄武五年陸遜以所在少榖表令諸将增廣農畝權報曰甚善今孤父子親自受田車中八牛以為四耦雖未及古人亦欲與衆均等其勞也晉武帝平吳之後置户調之式丁男之户嵗輸絹三疋綿三斤女及次丁男為户者半輸其諸邉郡或三分之二逺者三分之一夷人輸賨在公反布户一疋逺者或一丈男子一人占地七十畝女子三十畝其外丁男課田五十畝丁女二十畝次丁男半之女則不課男女年十六以上至六十為正丁十五以下至十三六十一以上至六十五為次丁十二以下六十六以上為老小不事遠夷不課田者輸義米户三斛遠者五斗極逺者輸算錢人二十八文又限王公田宅及品官占田見職田門按兩漢之制三十而税一者田賦也二十始傅人出一算者户口之賦也今晉法如此則似合二賦而為一然男子一人占田七十畝丁男課田五十畝則無無田之户矣此户調所以可行歟元帝為晉王課督農功詔二千石長吏以入榖多少為殿最其非宿衛要任皆宜赴農使軍各自佃作即以為廩太興元年詔曰徐揚二州土宜三麥可督令熯地投秋下種至夏而熟繼新故之交相以周濟所益甚大後軍将軍應詹表曰一夫不耕天下必有受其饑者而軍興已來征戰運漕朝廷宗廟百官用度既已殷廣下及工商流寓童僕不親農桑而㳺食者以十萬計不思開立羙利而望國足人給豈不難哉間者流人奔東吳東吳今儉皆已還反江西良田曠廢未乆火耕水耨為功差易宜簡流人興復農官功勞報賞皆如魏氏故事一年中與百姓二年分税三年計賦税以使之公私兼濟則倉盈庾溢可計日而待也成帝咸和五年始度百姓田取十分之一率畆税米三升是後頻年水旱田稅不至咸康初算田稅米空懸五十餘萬斛尚書諸曹以下免官哀帝即位乃減田租畝收二升孝武帝太元二年除度定田收租之制王公以下口稅三斛唯蠲在身之役八年又增税米口五石按晉制子男一人授田七十畝以畝收三升計之當口税二斛一斗以畝收二升計之當口稅一斛四斗今除度定田收租之制而口税三斛增至五石則賦頗重矣豈所謂王公以下云者又非泛泛授田之百姓歟當考前燕慕容皝以牧牛給貧家田於苑中公收其八二分入私有牛而無地者亦田苑中公收其七三分入私記室封裕諫曰魏晉雖道消之世猶削百姓不至於七八持官牛田者官得六分百姓得四分私牛而官田者與官中分臣猶曰非明王之道而况增乎蜀李雄賦丁嵗榖三斛女丁半之調絹不過數丈綿數兩事少役稀百姓富實宋文帝元嘉中始興太守徐豁上言武吏年滿十六課米六十斛事見丁口門宋孝武帝大明初山隂縣人多田少孔靈符表請徙無貲之家於餘姚鄮莫侯反鄞三縣墾起湖田帝令公卿博議咸曰夫訓農修政有國所同土著之人習翫日乆如京師無田不聞徙居他縣山隂豪族富室頃畝不少貧者肆力非為無處又緣湖居人魚鴨為業小人習始既難勸之未易逺廢之疇方翦荆棘率課窮乏其事彌難帝違衆議徙人並成良業齊髙帝初竟陵王子良上表言宋武帝時遣臺使督郡縣或尺布之逋曲以當疋百錢餘税且增為千故誑質作尚方寄繋東冶百姓駭廹不堪其命恣意贓賄無人敢言貧薄禮輕即生謗讟愚謂凡諸檢課宜停遣使明下符㫖審定期限如有違越隨事糾坐則政有恒典人無怨咨子良又唘曰今所在榖價雖和室家饑嗛苦簟反縑纊雖賤騈門躶質而守宰務在裒刻圍桑品屋以准貲課致令斬樹發瓦以充重賦破人販産要利一時東郡使人年無常限郡縣相承准令上直每至州臺使命切求縣急乃有畏失嚴期自殘軀命亦有斬絶手足以避徭役守令不務先富人而唯言益國豈有人貧於下而國富於上邪又泉鑄嵗逺𩔖多翦鑿江東大錢十不一在公家所受必須輪郭遂買夲一千加子七百猶求請無地且錢布相半為制永乆或聞長宰須令輸錢進違舊科退容姦利欲人康泰其可得乎又啓曰諸賦税所應納錢不限小大但令所在兼折布帛若雜物是軍國所須者聴隨價准直不必盡令送錢於公不虧其用在私實荷其渥昔晋氏初遷江左草剏絹布所直十倍於今賦調多少因時增減永初中官布一疋直錢一千而人所輸聴為九百漸及元嘉物價轉賤私貨則疋直六百官受則疋准五百所以每欲優人必為降落今入官好布疋下百餘其四人所送猶依舊制昔為刻上今為刻下甿庻空儉豈不由之救人拯弊莫過減賦略其目前小利取其長乆大益無患人貲不殷國用不阜也自東晋寓居江左百姓南奔者並謂之僑人往往散居無有土著而江南之俗火耕水耨土地卑濕無有蓄積之貲諸蠻陬俚洞霑沐王化者各隨輕重收財物以裨國用又嶺外酋帥因生口翡翠眀珠犀象之饒雄於鄉曲者朝廷多因而署之收其利歴宋齊梁陳皆因而不改其軍國所須雜物隨土所出臨時折課市取乃無恒法定令列州郡縣制其任土所出以為徴賦其無貫之人不樂州縣編者為浮浪人樂輸亦無定數任量唯所輸終優於正課焉都下人多為諸王公貴人左右佃客典計衣食客之𩔖皆無課役見品官占户門後魏明元帝永興中頻有水旱神瑞二年又不熟於是分簡尤貧者就食山東勑有司勸課田農自是人皆力勤嵗數豐穰畜牧滋息太武帝初為太子監國曾令有司課畿内之人使無牛家以人牛力相貿墾植鋤耨其有牛家與無牛家一人種田二十畝償以新鋤功七畝如是為差至與老少無牛家種田七畝老少者償以鋤功二畝皆以五口下貧家為率各列家别口數所種頃畝明立簿目所種於地首標題姓名以辨播殖之功魏令毎調一夫一婦帛一疋粟一石人年十三以上未娶者四人出一夫一婦之調奴任耕婢任績者八口當未娶者四耕牛十頭當奴婢八其麻布之鄉一夫一婦布一疋下至半以此為降大率十疋中五疋為公調二疋為調外費三疋為内外百官俸孝文延興四年詔州郡人十丁取一以充行户收租五十石以備年糧太和八年始准古班百官之禄以品第各有差先是天下户以九品混通户調帛二疋絮二斤粟二十石又人帛一疋二丈委之州庫以供調外之費至是户增帛三疋粟二石九斗以為官司之禄復增調外帛滿二疋所調各隨其土所出其司冀雍華定相蔡洛荆河懐兖陜徐青齊濟南河東徐等州貢綿絹及絲其餘郡縣少桑蠶處以麻布充孝明帝時張普惠上䟽曰伏聞尚書奏復絲麻之調遵先皇之令軌復髙祖之舊典仰惟髙祖廢大斗去長尺改重秤所以愛百姓從薄賦和軍國雖綿麻之用故立幅度之規億兆荷輕賦之饒不但於綿麻而已故歌舞以供其賦奔走以役其勤天子信於上億兆樂於下自兹以降漸漸長濶百姓怨嗟聞於朝野宰輔不尋其夲知天下之怨綿麻不察其幅廣度長秤重斗大革其所弊存其可存而特放綿麻之調以恱天下之心此所謂悦之不以道愚臣所以未悦者也尚書既知國少綿麻不惟法度之翻易人言之可畏便欲去天下之大信棄已行之成詔遵前之非遂後之失奏求還復綿麻以充國用不思庫中大有綿麻而郡官共竊利之臣以為於理未盡何者今官人請調度造衣物必量度絹布疋有丈尺之盈尤不計其廣絲綿斤兩兼百銖之賸未聞依律罪州郡者若一疋之濫一斤之惡則鞭户主連及三長此所謂敎人以貪也今百官請俸祗樂其長闊并欲厚重無復准極得長濶厚重者便云其州能調絹布精闊且長横發羙稱以亂視聴此百司所以仰負聖明者也今若必復綿麻謂宜先令四海知其所由明立嚴禁復夲幅度新綿麻之典依太和之税其在庫絹布并及絲綿不依典制者請遣一尚書與太府卿左右蔵令依今官度官秤計其斤兩廣長折給請俸之人均常俸之數年俸所出以市綿麻亦應周其一嵗之用使天下知二聖之心愛人惜法如此則髙祖之執中興於神龜明明慈信昭布於無窮孰不幸甚正光後國用不足乃先折天下六年租調而徴之百姓怨苦孝文太和元年詔曰去年牛疫死大半今東作既興人須肄業有牛者加勤於常嵗無牛者倍傭於餘年一夫治田四十畝中男二十畝無令人有餘力地有遺利時李安世上疏曰臣聞量人畫野經國大式邑地相參致治之夲井税之興其來日久田萊之數制之以限盖欲使土不曠功人罔遊力雄擅之家不獨膏腴之羙單陋之夫亦有頃畝之分竊見州縣之人或因年儉流移棄賣田地漂居異鄉事涉數代三長既立始返舊墟廬井荒凉桑榆改植事已歴逺易生假冒強宗豪族肆其侵凌逺認魏晉之家近引親舊之驗年載稍久鄉老所惑羣證雖多莫可取據各附親知互有長短兩證徒具聴者猶疑争訟遷延連紀不判良疇委而不開柔桑枯而不採欲令家豐嵗儲人給資用其可得乎愚謂今雖桑井難復宜各均量審其經術令分藝有准力業相稱細人獲資生之利豪右靡餘地之盈無私之澤乃播均於兆庻如阜如山可有積於比户矣又所爭之田宜限年斷事乆難明悉屬今主然後虚詐之人絶於覬覦守分之士免於凌奪帝深納之均田之制始於此矣九年下詔均給天下人田諸男夫十五以上受露田四十畝不栽樹者謂之露田婦人二十畝奴婢依良丁牛一頭受田三十畝限止四牛所授之田率倍之二易之田再倍之以供耕休及還受之盈縮人年及課則受田老免及身沒則還田奴婢牛随有無以還受諸桑田不在還受之限但通入倍分田於分雖盈不得以充露田之數不足者以露田充倍諸初受田者男夫一人給田二十畝課蒔餘種桑五十樹棗五株榆三根非桑之土夫給一畝依法課蒔餘果及多種桑榆者不禁諸應還之田不得種桑榆棗果種者以違令論地入還分諸桑田皆為代業身終不還恒從見口有盈者無受無還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所足諸麻布之土男夫及課别給麻田十畝婦人五畝奴婢依良皆從還受之法諸有舉户老小殘疾無受田者年十一已上及疾者各受以半夫田年逾七十者不還所受寡婦守制者雖免課亦授婦田諸還受人田恒以正月若始受田而身亡及賣買奴婢牛者皆至明年正月乃得還受諸土廣人稀之處随力所及官借人種蒔後有來居者依法封授諸地狹之處有進丁受田而不樂遷者則以其家桑田為正田分又不足不給倍田又不足家内人别減分無桑之鄉准此為法樂遷者聴逐空荒不限異州他郡唯不聴避勞就逸其地足之處不得無故而移諸人有新居者三口給地一畝以為居室奴婢五口給一畝男女十五以上因其地分口課種菜五分畝之一諸一人之分正從正倍從倍不得隔越他畔進丁受田者恒從所近若同時俱受先貧後富再從倍之田放此為法諸遠流配謫無子孫及户絶者墟宅桑榆盡為公田以供授受授受之次給其所親未給之間亦借其所親諸宰人之官各隨所給公田刺史十五頃太守十頃治中别駕各八頃縣令郡丞六頃更代相付賣者坐如律按夾漈鄭氏言井田廢七百年至後魏孝文始納李安世之言行均田之法然晉武帝時男子一人占田七十畝女子三十畝丁男課田五十畝丁女二十畝次丁男半之女則不課則亦非始於後魏也但史不書其還受之法無由考其詳耳或謂井田之廢已乆驟行均田奪有餘以予不足必致煩擾以興怨讟不知後魏何以能行然觀其立法所受者露田諸桑田不在還受之限意桑田必是人户世業是以栽植桑榆其上而露田不栽樹則似所種者皆荒閑無主之田必諸逺流配謫無子孫及户絶者墟宅桑榆盡為公田以供授受則固非盡奪富者之田以予貧人也又令有盈者無受不還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所足是令其從便買賣以合均給之數則又非強奪之以為公田而授無田之人與王莽所行異矣此所以稍久而無弊歟孝明孝昌二年冬税京師田租畝五升借賃公田者畝一斗莊帝即位因人貧富為租輸三等九品之制千里内納粟千里外納米上三品户入京師中三品入他州要倉下三品入夲州静帝天平初諸州調絹不依舊式興和三年各班海内悉以四十尺為度天下利焉元象興和之中頻嵗大穰榖斛至九錢法網寛弛百姓多離舊居闕於徭賦矣齊神武秉政乃命孫騰髙崇之分責無籍之户得六十餘萬於是僑居者各勒還夲是後租調之入有加焉及侯景背叛河南之地困於兵革尋而景亂梁乃命行臺辛術略有淮南之地其新附州縣羈縻輕税而已北齊給授田令仍依魏朝每年十月普令轉授成丁而授老而退不聴賣易文宣天保八年議徙冀定瀛無田之人謂之樂遷於幽州寛鄉以處之始立九等之户富者税其錢貧者役其力武成以修創臺殿所役甚廣并兼户口益多隱漏舊制未娶者輸半牀租調有妻者輸一牀無者輸半牀陽翟一郡户至數萬籍多無妻有司劾之帝以為生事不許由是姦欺尤甚戸口租調十亡六七河清三年詔毎嵗春月各依鄉土立税課人農桑自春及秋男子十五以上皆營蠶桑孟冬布田畝蠶桑之月婦女十五以上皆營蠶桑孟冬刺史聴審教之優劣定殿最之科品人有人力無牛或有牛無人力者須令相便皆得納種使地無遺利人無㳺手又令男子率以十八受田輸租調二十充兵六十免力役六十六退田免租調京城四面諸方之外三十里内為公田受公田者三縣代遷户執事官一品以下逮於羽林虎賁各有差其外畿郡華人官第一品以下羽林虎賁以上各有差執事及百姓請墾田者名為永業奴婢受田者親王止三百人嗣王二百人第二品嗣王以下及庶姓王百五十人正三品以上及皇宗百人七品以上八十人八品以上至庶人六十人奴婢限外不給田者皆不輸其方百里外及州人一夫受露田八十畝婦人四十畝奴婢依良人限數與者在京百官同丁牛一頭受田六十畝限止四牛每丁給永業二十畝為桑田其田入還受之分土不宜桑者給麻田如桑田法時定令率人一牀調絹一疋綿八兩凡十斤綿中折一斤作絲墾租二石義租五斗奴婢各准良人之半牛調二丈墾租一斗義米五升墾租送臺義租納郡以備水旱墾租皆依貧富為三梟其賦税常調則少者直出上户中者及中户多者及下户上梟輸逺處中梟輸次逺下梟輸當州倉三年一授租入䑓者五百里内輸粟五百里外輸米入州鎮者輸粟人欲輸錢者准上絹收錢武平之後權幸賜予無限乃料境内六等富人調令出錢後周文帝覇政之初創置六官司均掌田里之政令凡人口十以上宅五畆口七以上宅四畝口五以上宅三畝有室者田百四十畝丁者田百畝周制司賦掌賦均之政令凡人自十八至六十四與輕疾者皆賦之有室者嵗不過絹一疋綿八兩粟五斛丁者半之其非桑土有室者布一疋麻十斤丁者又半之豐年則全賦中年半之下年一之皆以時徴焉若艱凶札則不徴其賦隋文帝令自諸王以下至都督皆給永業田各有差其丁男中男永業露田皆遵後齊之制並課樹以桑榆及棗其田宅率三口給一畝京官又給職分田詳見職田門開皇九年任墾田千九百四十萬四千二百六十七頃開皇中户總八百九十萬七千五百三十六按定墾之數毎户合墾田二頃餘也開皇十二年文帝以天下户口嵗増京輔及三河地少而人衆衣食不給議者咸欲徙就寛鄉帝乃發使四出均天下之田其狹鄉每丁纔至二十畝老少又少焉至大業中天下墾田五千五百八十五萬四千四十頃按其時有户八百九十萬七千五百三十六則毎户合得墾田五頃餘恐夲史之非實水心葉氏曰齊自河清始有受田之制其君驕麤甚矣然尚如此周亦有司均掌田里之政以其時田皆在官故也今田不在官乆矣徃事無復論然遂以為皆不當在官必以其民自買者為正雖官偶有者亦效民賣之此又偏也淳熙間有賣官田之令故水心云然隋文帝依周制役丁為十二番匠則六番丁男一牀租粟三石桑土調以絹絁麻土調以布絹絁以疋加綿三兩布以端加麻三斤單丁及僕𨽻各半之有品爵及孝子順孫義夫節婦並免課役開皇三年減十二畨毎嵗為三十日役减調絹一疋為二丈初蘇威父綽在西魏世以國用不足為征税之法頗稱為重既而歎曰今所為正如張弓非平世也後之君子誰能弛乎威聞其言每以為己任至是威為納言奏減賦役務從輕典帝悉從之開皇九年帝以江表初平給復十年自餘諸州並免當年租賦十年五月以宇内無事益寛徭賦百姓年五十者輸庸停役通鑑作免役收庸十二年詔河北河東今年田租三分减一兵减半功調全免煬帝即位户口益多府庫盈溢乃除婦人及奴婢部曲之課其後將事遼碣增置軍府掃地為兵租賦之入益减征伐廵幸無時休息天下怨叛以至於亡唐武徳二年制每丁租二石絹二疋綿三兩自兹之外不得横有調斂武徳六年令天下户量其貲産定為三等至九年詔天下户三等未盡升降宜為九等餘見鄉役門七年始定均田賦税凡天下丁男十八以上者給田一頃篤疾廢疾給田十畝寡妻妾三十畝若為户者加二十畝皆以二十畝為永業其餘為口分永業之田樹以榆桑棗及所宜之木田多可以足其人者為寛鄉少者為狭鄉狭鄉授田減寛鄉之半其地有薄厚嵗一易者倍授之寛鄉三易者不倍授工商者寛鄉減半狹鄉不給凡庻人徙鄉及貧無以𦵏者得賣世業田自狹鄉而徙寛鄉者得并賣口分田已賣者不復授死者收之以授無田者凡收授皆以嵗十月授田先貧及有課役者凡田鄉有餘以給比鄉縣有餘以給比縣州有餘以給比州凡授田者丁嵗輸粟二石謂之租丁隨鄉所出歳輸絹綾絁各二丈布加五之一綿二兩輸布者麻三斤謂之調用人之力嵗二十日閏加二日不役者日為絹三尺謂之庸有事而加役二十五日者免調三十日租調皆免通正役並不過五十日免課役及課户見復除門若嶺南諸州則税米上户一石二斗次户八斗下戸六斗夷獠之户皆從半輸蕃人内附者上户丁税錢十文次户五文下户免之附經二年者上户丁輸羊二口次户一口下户三户共一口凡水旱蟲蝗為災十分損四分以上免租損六以上免租調損七以上課役俱免右此租庸調徴科之數依杜佑通典及王溥唐㑹要所載陸宣公奏議及資治通鑑所言皆同新唐書食貨志以為每丁輸粟二斛稻三斛調則嵗輸絹二疋綾絁各二丈布加五之一綿三兩麻三斤非蠶鄉則輸銀十四兩疑太重今不取諸買地者不得過半制雖居狹鄉亦聴依寛制其賣者不得更請凡賣買皆須經官年終彼此除附若無文牒輙賣買財沒不追地還夲主諸工商永業口分田各減半給之在狭鄉者並不給因王事落外蕃不還有親屬同居其身分之地六年乃追還日仍給身死王事者子孫雖未成丁勿追身分田戰傷廢疾不追减終身諸田不得貼賃及質若從逺役外任無人守業者聴貼賃及質官人守業田賜田欲賣及貼賃者不在禁限諸給口分田務從便近不得隔越若州縣改易及他境犬牙相接者聴依舊受其城居之人夲縣無田聴隔縣受通典曰雖有此制開元天寳以來法令弛壊并兼之弊有踰漢成哀之間致堂胡氏曰古者制民之産是度其丁户之衆寡而授之田也無世而無在官之田不特唐初也係上之人肯給與不肯給耳苟有制民常産抑富恤貧之意則必括民之無田者而給之田其富而逾制者必有限之之法收之之漸也若無此意則以民之犯法而沒田為公家之利與百姓為市而貿之甚則以為價不售而復奪之又甚則强其親屬隣里髙價而買之而民之貧之富之利之病皆不槩於心惟鬻田得直重斂得稅斯已矣自後魏齊周以来莫如唐之租庸調法最善然不能百年為茍簡者所變可勝惜哉食禄之家毋得與民爭利此以㢘恥待士大夫之羙政也古之時用人稱其官則久而不徙或終其身及其子孫禄有常賜故仕則不稼有馬乘則不察雞豚家伐冰則不畜牛羊當是時而與民争利斯可責矣後世用人不慎升黜無常朝饗太倉暮而家食苟非固窮之君子甘於菽水彼仰有事俯有育若不經營生理又何以能存盧懐慎為丞相其死也惟有一奴自鬻以辦䘮事况其餘哉以理論之凡士而既仕者即當視其品而給之田進而任使則有禄以酬其品置而不用則有田以資其生惟大譴大呵不在原宥之例然後收其田里如此則不得與民争利之法可行而㢘恥之風益勸矣水心葉氏曰自古天下之田無不在官民未嘗得私有之但强者力多却能兼并衆人之利以為富弱者無力不能自耕其所有之田以至轉徙流蕩故先王之政設田官以授天下之田貧富强弱無以相過使各有其田得以自耕故天下無甚貧甚富之民至成周時其法極備雖周禮地官所載其間不能無牽合抵捂處要其大略亦可見周公治周授田之制先治天下之田以為井井為疆界嵗嵗用人力修治之溝洫畎澮皆有定數疆界既定人無緣得占田其間田有弱者㳺手者不耕却無强民貪并之害後来井田不修隄防浸失毁壊絶滅至商鞅用秦已不復有井田之舊於是開阡陌漢志曰東西曰阡南北曰陌阡陌旣開天下之田却簡直易見看耕得多少惟恐人無力以耕之故秦漢之際有豪强兼并之患富者田連阡陌而貧者無立錐之地雖然如此猶不明説在民但官不得治故民得自侵占而貧者揷手不得不得不去而為㳺手轉而為末業終漢之世以文景之恭儉愛民武帝之修立法度宣帝之勵精為治却不知其夲不如此但能下勸農之詔輕減田租以來天下之民如董仲舒師丹雖建議欲限天下之田其制度又却與三代不合當時但問墾田㡬畝全不知是誰田又不知天下之民皆可以得田而耕之光武中興亦只是問天下度田多少當時以度田不實長吏坐死者無数至於漢亡三國並立民既死於兵革之餘未至繁息天下皆為曠土未及富盛而天下大亂雖當時天下之田既不在官然亦終不在民以為在官則官無人收管以為在民則又無簿籍契券但隨其力之所能至而耕之元魏稍立田制至於北齊後周皆相承授民田其初亦未嘗無法度但末年推行不到頭其法度亦是空立唐興只因元魏北齊制度而損益之其度田之法濶一步長二百四十步為畆百畝為頃一夫受田一頃周制乃是百步為畝唐却是二倍有餘此一項制度與成周不合八十畝為口分二十畝為世業是一家之田口分須據下來人數占田多少周制八家皆私百畝唐制若子弟多則占田愈多此又一項與成周不合所謂田多可以足其人者為寛鄉少者為狭鄉狭鄉之田減寛鄉之半其他有厚薄嵗一易者倍授之寛鄉三易者不倍授工商者寛鄉減半狭鄉不給亦與周制不同先王建國只是有分土孟子曰公侯皆方百里伯七十里子男五十里無分民但付人以百里之地任其自治盖治之有倫則地雖不足民有餘孟子所謂天下之農皆悦而願耕於王之野者是也苟不能治或徳不足以懐柔民不心悦而至則地雖多而民反少孟子載梁惠王所謂寡人之民不加多者是也唐既止用守令為治則分田之時不當先論寛鄉狭鄉當以土論不當以人論今却寛鄉自得多狭鄉自得少自狭鄉徙寛鄉者又得并賣口分永業而去成周之制雖是授田與民其間水旱之不時凶荒之不常上又賑貸救䘏使之可以相補助而不至匱乏若唐但知授田而已而無補助之法縱立義倉賑給之名而既令自賣其田便自無䘏民之實矣周之制最不容民遷徙惟有罪則徙之記王制命國之右鄉簡不帥教者移之左命國之左鄉簡不帥教者移之右不變移之郊不變移之遂不變屏之逺方終身不齒唐却容他自遷徙并得自賣所分之田方授田之初其制已自不可久又許之自賣民始有契約文書而得以私自賣易故唐之比前世其法雖為粗立然先王之法亦自此大壊矣後世但知貞觀之治執之以為據故公田始變為私田而田終不可改盖緣他立賣田之法所以必至此田制既壊至於今官私遂各自立境界民有沒入官者則封固之時或召賣不容民自籍所謂私田官執其契券以各征其直要知田制所以壊乃是唐世使民得自賣其田始前世雖不立法其田不在官亦不在民唐世雖有公田之名而有私田之實其後兵革既起征斂煩重遂雜取於民遠近異法内外異制民得自有其田而公賣之天下紛紛遂相兼并故不得不變而為兩税要知其弊實出於此水心言唐方使民得立券自賣其田而田遂為私田此説恐亦未深考如蕭何買民田自汙貢禹有田一百五十畝被召之日賣其百畝以供車馬則自漢以来民得以自買賣田土矣盖自秦開阡陌之後田即為庶人所擅然亦惟富者貴者可得之富者有貲可以買田貴者有力可以占田而耕田之夫率屬役於富貴者也王翦為大將請羙田宅甚衆又請善田者五人可以見其時田雖在民官未嘗有授田之法而權貴之人亦可以勢取之所謂善田則屬役者也蘇秦曰使我洛陽有田二頃安能復佩六國相印盖秦既不能躬耕又無貲可以買田又無權勢可以得田宜其貧困無賴也文獻通考卷二
