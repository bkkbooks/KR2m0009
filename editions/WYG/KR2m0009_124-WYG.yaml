body:
  text: 文獻通考卷一百二十四鄱陽馬端臨貴與著王禮考十九山陵秦二世葬始皇驪山始皇初即位穿治驪山及并天下天下徒送詣七十餘萬人穿三泉下銅徐廣曰一作錮錮鑄塞正義曰顔師古云三重之泉言至水也而致椁宫觀百官竒器珍怪徙藏滿之正義曰言冢内作宫觀及百官位次竒器珍怪徙滿冢中藏才浪反令匠作機弩矢有所穿近者輙射之以水銀為百川江河大海機相灌輸正義灌音館輸音戍上具天文下具地理以人魚膏為燭徐廣曰人魚似鮎四脚以正義曰廣志云鯢魚聲如小兒啼有四足形如鱧可治牛出伊水異物志云人魚似人形長尺餘不堪食皮利於鮫魚鋸材木入項上有小穿氣從中出秦始皇冢中以人魚膏為燭即此魚也出東海中今台州有之按今帝王用漆燈冢中則火不滅度不滅者久之正義度音田洛反二世曰先帝後宫非有子者出焉不宜皆令從死死者甚衆葬既已下或言工匠為機藏皆知之藏重即泄大事畢已藏閉中羡正義曰音延下同謂冢中神道下外羡閉盡閉工匠藏者無復出者樹草木以象山皇覽曰墳髙五十餘丈周迴五里餘正義曰關中記云始皇陵在驪山泉本北流障使東西流有土無石取大石於渭山諸山括地志云秦始皇陵在雍州新豐縣西南十里漢舊儀驪山者古之驪國晉獻公伐之而取二女曰驪姬此山多黄金其南多美玉曰藍田故始皇貪而葬焉使丞相李斯將天下刑人徒𨽻七十二萬人作陵鑿以章程三十七歲錮水泉絶之塞以文石致以丹漆深極不可入奏之曰丞相臣斯昧死言臣所將𨽻徒七十二萬人治驪山者已深已極鑿之不入燒之不然叩之空空如下天狀制曰鑿之不入燒之不然其旁行三百丈乃止漢髙祖十年秋七月癸卯太上皇帝崩葬萬年師古曰三輔黄圖云髙祖初居櫟陽故太上皇因在櫟陽十年太上皇崩葬其北原起萬年邑置長丞也赦櫟陽囚死罪已下臣瓚曰萬年陵在櫟陽縣界故特赦之漢舊儀太上皇萬年邑千户徙天下民貲三百萬以上與田宅守陵十二年夏四月甲辰帝崩於長樂宫五月丙寅葬長陵自崩至葬凡二十三日長陵在長安北四十里已下已下棺也皇太子羣臣皆反至太上皇廟羣臣曰帝起細微撥亂世反之正平定天下為漢太祖功最髙上尊號曰髙皇帝太子即位賜視作斥上者將軍四十金服䖍曰斥上壙上也如淳曰斥開也開二地為冢壙故以開斥言之鄭氏曰四十金四十斤金也晉灼曰近上二千石賜錢二萬此言四十金實金下凡言黄金眞金也不言黄謂錢也二千石二十金六百石以上六金五百石以下至佐史二金漢興立都長安徙齊田楚昭屈景及諸功臣家於長陵後世世徙吏二千石髙貲富人及豪傑兼併之家於諸陵長陵邑萬户奉常屬官有諸廟寢園令長丞東園匠令丞主作陵内器物又有園郎寢郎故事近臣皆隨陵為園郎園中各有寢便殿日祭於寢月祭於廟時祭於便殿寢日四上食丞相以四時行園武帝時人有盗孝文園􅄟錢者丞相嚴青翟坐罪自殺惠帝七年八月戊寅崩九月辛丑葬安陵自崩至葬凡二十四日安陵在長安北三十五里去長陵十里文帝治霸陵皆瓦器不得以金銀銅錫為飾後七年六月己亥帝崩遺詔霸陵山川因其故無有所改應劭曰因山為藏不復起墳山下川流不遏絶就其水名以為陵號令郎中令張武為復土將軍如淳曰主穿壙窴瘞事也師古曰穿壙出土棺下也已而窴之又即以為墳故云復土復反還也扶目反發近縣卒萬六千人發内史卒萬五千人藏椁穿復土屬將軍武乙巳葬霸陵師古曰自崩至葬凡十日也霸陵在長安東南景帝五年春作陽陵邑張晏曰景帝作壽陵起邑夏募民徙陽陵後三年正月甲子帝崩二月癸酉葬陽陵自崩至葬凡十日陽陵在長安東北四十五里惠帝安陵文帝霸陵景帝陽陵邑各萬户徙民與長陵等武帝建元二年初置茂陵邑武帝自作陵也本槐里縣之茂鄉建元六年四月髙園便殿火董仲舒言魯哀公時桓僖宫災亳社災天皆焚其不當立者以示魯今髙園殿不當居陵旁於禮亦不當立與魯災同後元二年二月丁卯帝崩三月甲申葬茂陵自崩至葬凡十八日茂陵在長安西北八十里元帝時貢禹奏言武帝棄天下昭帝㓜弱霍光專事不知禮正妄多藏金錢財物鳥獸魚鼈牛馬虎豹生禽凡百九十物盡瘞藏之又皆以後宫女置於園陵大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言羣臣亦隨故事甚可痛也唯陛下深察古道諸園陵女亡子者宜悉遣獨杜陵宫數百誠可哀憐也漢法天子即位一年而為陵天下貢賦三分之一供宗廟一供賔客一供山陵武帝歴年久長比崩陵中至不復容物由霍光暗於大體奢侈過度也更始之敗赤眉入長安破茂陵取陵中物不能減半昭帝元平元年四月癸未帝崩六月壬申葬平陵自崩至葬凡四十九日平陵在長安西北七十里茂陵富人焦氏賈氏隂積貯炭葦諸下里物死者歸蒿里葬地故曰下里昭帝大行時方上事暴起用度未辦田延年奏商賈預收方上不祥器物冀其疾用欲以求利非民臣所當為請沒入縣官從之宣帝黄龍元年十二月甲戍帝崩初元元年正月辛丑葬杜陵自崩至葬凡二十八日杜陵在長安南五十里漢舊儀武帝治茂陵昭帝平陵邑皆取二千石將相守陵故三陵多貴皆三萬户至五萬户元帝永光四年分諸陵屬三輔以渭城壽陵亭部原上為初陵詔曰安土重遷黎民之性骨肉相附人情所願也頃者有司縁臣子之義奏徙郡國民以奉園陵令百姓逺棄先祖墳墓破業失産親戚别離人懐思暴之心家有不自安之意是以東垂被虛耗之害關中有無聊之民非乆長之策也詩不云虖民亦勞止迄可小康惠此中國以綏四方今所為初陵者勿置縣邑使天下咸安土樂業亡有動搖之心布告天下令明知之竟寧元年五月壬辰帝崩七月丙戌葬渭陵自崩至葬五十五日渭陵在長安北五十六里有司言乘輿車牛馬禽獸皆非禮不宜以葬奏可成帝永始元年七月詔曰朕執德不固謀不盡下過聽將作大匠萬年言昌陵三年可成作治五年中陵司馬殿門内尚未加功天下虛耗百姓罷勞客土疏惡終不可成朕惟其難怛然傷心夫過而不改是謂過矣其罷昌陵及故陵勿徙吏民令天下毋有動搖之心二年詔曰前將作大匠萬年知昌陵卑下不可為萬歲居奏請營作建置郭邑妄為巧詐積土增髙多賦歛繇役興卒暴之作卒徙蒙辜死者連屬百姓罷極天下匱竭常侍閎前為大司農中丞數奏昌陵不可成侍中衞尉長數白宜早止徙家反故朕以長言下閎章公卿議皆合長計首建至策閎典主省大費民以康寧閎前賜爵關内侯黄金百斤其賜長為關内侯食邑千户閎五百户萬年佞邪不忠毒流衆庶海内怨望至今不息雖䝉赦令不宜居京師其徙萬年燉煌郡陳湯與將作大匠解萬年相善自元帝時渭陵不復徙民起邑成帝起初陵數年後樂霸陵曲亭南更營之萬年與湯議以為武帝時工楊光以所作數可意自致將作大匠及大司農中丞景壽昌造杜陵賜爵關内侯將作大匠乘馬延年以勞苦秩中二千石今作初陵而營起邑居成大功萬年亦當蒙重賞子公妻家在長安兒子生長長安不樂東方宜求徙可得賜田宅俱善湯心利之即上封事言初陵京師之地最為肥美可立一縣天下民不徙諸陵三十餘歲矣關東富人益衆多規良田役使貧民可徙初陵以彊京師衰弱諸侯又使中家以下得均貧富湯願與妻子家屬徙初陵為天下先於是天子從其計果起昌陵邑後徙内郡國民萬年自詭三年可成後卒不就羣臣多言其不便者下有司議皆曰昌陵因卑為髙積土為山度便房猶在平地上客土之中不保幽㝠之靈淺外不固卒徙工庸以鉅萬數至㸐脂火夜作取土東山且與榖同賈作治數年天下徧被其勞國家罷敝府藏空虛下至衆庶熬熬苦之故陵因天性據眞土處埶髙敞旁近祖考前又已有十年功緒宜逺復故陵勿徙民上廼下詔罷昌陵時營起昌陵數年不成復還歸延陵制度奢泰光禄大夫劉向上疏諫曰昔孝文皇帝居霸陵北臨厠服䖍曰厠厠近水也李竒曰霸陵山北頭厠近霸水帝登其上以逺望也意悽愴悲懐顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其間應劭曰斮斬也陳施也孟康曰斮絮以漆著其間也師古曰美石出京師北山今宜州石是也故云以北山石為椁紵絮者可以著衣之絮也斮而陳其間又從而漆之也紵音張吕反斮音側角反豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何慼焉師古曰錮謂鑄塞也云錮南山者取其深大假為喻也夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣以薪藏之中野不封不樹師古曰厚衣之以薪言積薪以覆之也不封謂不遂土為墳也不樹謂不種樹也衣音於既反後世聖人易之以棺椁棺椁之作自黄帝始黄帝葬於橋山師古曰在上郡陽周縣堯葬濟陰丘壟皆小葬具甚微晉灼曰丘壟冢墳也舜葬蒼梧二妃不從師古曰二妃堯之二女禹葬會稽不改其列鄭氏曰不改樹木百物之列也如淳曰列壟也墨子曰禹葬會稽之山既葬收餘壤其上隴若參耕之畝則止矣晉灼曰列肆也淮南子云舜葬蒼梧不變其肆言不煩於民也師古曰鄭說是也淮南所云不變其肆肆者故也言山川田畝皆如故耳非列義也晉氏失之殷湯無葬處師古曰謂不見𫝊記也文武周公葬於畢李竒曰在岐州之間臣瓚曰汲郡古文畢西於豐三十里師古曰二說皆非也畢陌在長安西北四十里也秦穆公葬於雍橐泉宫祈年館下樗里子葬於武庫文頴曰秦惠王異母弟也師古曰樗里子且死曰葬我必於渭南章臺東後百年當有天子宫夾我墓及漢興長樂宫在其東未央宫在其西武庫正直其上也皆無丘隴之處此聖帝明王賢君智士逺覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防稱古墓而不墳師古曰墓謂壙穴也墳謂積土也曰丘東西南北之人也不可不識也師古曰東西南北言周遊以行其道不得専在本邦故墓須表識識音志為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也延陵季子適齊而反其子死於嬴博之間師古曰二邑並在秦山其子死於其間穿不及泉歛以時服封墳掩坎其髙可隠孟康曰隠蔽之纔可見而已臣瓚曰謂人立可隠肘也師古曰瓚說是也隠音於靳反而號曰骨肉歸復於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子徃觀曰延陵季子於禮合矣故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄也非茍為儉誠便於體也宋桓司馬石椁仲尼曰不如速朽李竒曰非桓魋為石椁奢泰故激以此言秦相吕不韋集知畧之士而造春秋亦言薄葬之義皆明於事者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭嚴襄五王師古曰嚴襄者謂莊襄則始皇父也皆大作丘壟多其瘞藏咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿師古曰阿謂山曲也下錮三泉上崇山墳其髙五十餘丈周回五里有餘石椁為游館李竒曰壙中為遊戲之觀也師古曰多累石作椁於壙中以為離宫别館也人魚膏為燈燭水銀為江海黄金為鳬鴈珍寶之藏機械之變孟康曰作機發木人之屬盡其巧變也晉灼曰始皇本紀令匠作機弩矢有所穿近輙射之又言工匠為機咸皆知之已下閉羡門背殺工匠也師古曰晉說是也棺椁之麗宫舘之盛不可勝原師古曰言不能盡其本數又多殺宫人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣項籍燔其宫室營宇徃者咸見發掘師古曰言至其墓所者發掘之而求財物也其後牧兒亡羊羊入其鑿師古曰鑿謂所穿冢藏者音在到反牧者持火照求羊失火燒其藏椁自古至今葬未有盛如始皇者也數年之間外被項籍之災内離牧豎之禍師古曰離遭也豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚丘壟彌髙宫室愈麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宫室小寢廟詩人美之斯干之詩是也上章道宫室之如制下章言子孫之衆多也師古曰宫室如制謂殖殖其庭有覺其楹君子攸寧也子孫衆多謂維熊維羆男子之祥維虺維蛇女子之祥也及魯嚴公師古曰即莊公也刻飾宗廟多築臺囿師古曰解在五行志後嗣再絶孟康曰謂子般閔公皆殺死也春秋刺焉周宣如彼而昌魯秦如此而絶是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵增埤為髙師古曰埤下也音婢積土為山發民墳墓積以萬數營起邑居其日廹卒師古曰卒讀曰猝功費大萬百餘應劭曰大萬億也大巨也死者恨於下生者愁於上怨氣感動陰陽因之以饑饉物故流離以十萬數師古曰物故謂死也流離謂亡其居處也臣甚惽焉師古曰惽謂不了言惑於此事也惽音昬一曰惽古閔字憂病也以死者為有知發人之墓其害多矣若其無知乂安用大師古曰安焉也謀之賢知則不說以示衆庶則苦之師古曰說讀曰悅其下亦同若茍以說愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聰明疏逹蓋世宜𢎞漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君競為奢侈比方丘隴師古曰顧猶反也說愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之惟陛下上覽明聖黄帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦始皇增山厚藏以侈生害足以為戒初陵之橅宜從公卿大臣之議應劭曰橅音䂓摹之摹師古曰謂規度墓地應音是也韋元成𫝊及蕭望之𫝊規橅音義皆同其字從木以息衆庶書奏上甚感向言而不能從其計永始四年出杜陵諸未嘗御者歸家宫人無子乃守園陵也綏和二年三月丙戌帝崩四月己卯葬延陵自崩至葬凡五十四日延陵在扶風去長安六十二里哀帝元壽二年六月戊午帝崩八月壬寅葬義陵自崩至葬凡百五日義陵在扶風去長安四十六里平帝元始元年詔義陵民冢不妨殿中者勿發如淳曰陵上有宫墻象生制度為殿屋故曰殿中師古曰此說非也殿中謂壙中象正殿處六月乙未義陵寢神衣在柙中丙申旦衣在外牀上哀帝陵也衣在寢中今自出在外牀上師古曰柙匱也寢令以急變聞非常之事故云急變用太牢祠五年十二月丙午帝崩葬康陵在長安北六十里東漢皇帝葬儀以木為重髙九尺廣容八歴裹以葦席巾門喪帳皆以簟車皆去輔轓疏布惡輪走卒皆布褠幘太僕四輪輈為賔車大練為屋幙中黄門虎賁各二十人執紼司空擇土造穿太史卜日謁者二人中謁者僕射中謁者副將作油緹帳以覆坑方石治黄腸題湊便房如禮漢舊儀畧載前漢諸帝壽陵曰天子即位明年將作大匠營陵地用地七頃方中用地一頃深十三丈堂壇髙三丈墳髙十二丈武帝墳髙二十丈明中髙一丈七尺四周二丈内梓棺栢黄腸題湊以次百官藏畢其設四通羡門容大車六馬皆藏之内方外陟車石外方立先閉劒户户設夜龍莫邪劒伏弩設伏火已營陵餘地為西園后陵餘地為媫妤以下次賜親屬功臣漢書音義曰題頭也湊以頭向内所以為固也便房藏中便坐也皇覽曰漢家之葬方中百步已穿築為方城其中開四門四通足放六馬然後錯渾雜物杆漆繒綺金寳米榖及埋車馬虎豹禽獸發近郡卒徒置將軍尉侯以後官貴幸者皆守園陵元帝葬乃不用車馬禽獸等物大駕太僕御方相氏黄金四目蒙熊皮元衣朱裳執戈揚楯立乘四馬先驅周禮曰方相氏大喪先柩及墓入壙以戈擊四隅毆方良鄭元曰方相放想也可畏怖之貌壙穿地中也方良罔兩也天子之椁栢黄腸為裏表以石焉國語曰木石之怪䕫罔兩旂之制長三仞十有二斿曵地畫日月升龍書旐曰天子之柩謁者二人立乘六馬為次大駕甘泉鹵簿金根容車蘭臺法駕喪服大行載飾如金根車皇帝從送如禮太常上啓奠夜漏二十刻太尉冠長冠衣齋衣乘髙車詣殿止車門外使者到南向立太尉進伏拜受詔太尉詣南郊未盡九刻大鴻臚設九賔隨立羣臣入位太尉行禮執事皆冠長冠衣齋衣太祝令跪讀諡策太尉再拜稽首治禮告事畢太尉奉諡策還詣殿端門太常上祖奠中黄門尚衣奉衣登容根車東園武士載大行司徒却行道立車前治禮引太尉入就位大行車西少南東面奉策太史令奉哀策立後太常跪曰進皇帝進太尉讀諡策藏金匱皇帝次科藏於廟太史奉哀策葦篋詣陵太尉旋復公位再拜立哭太常跪曰哭大鴻臚𫝊哭十五舉音止哭太常行遣奠皆如禮請哭止哭如儀晝漏上水請發司徒河南尹先引車轉太常跪曰請拜送載車著白系參繆紼長三十丈大七寸為輓六行行五十人公卿以下子弟凡三百人皆素幘委貌冠衣素裳校尉三人皆赤幘不冠絳紗單衣持幢幡候司馬丞為行首皆銜枚羽林孤兒巴俞櫂歌者六十人為六列鐸司馬八人執鐸先大鴻臚設九賔隨立陵南羡門道東北面諸侯王公特進道西北面東上中二千石二千石列侯直九賔東北面西上皇帝白布幕素裏夾羡道東西向如禮容車幄坐羡道西南向車當坐南向中黄門尚衣奉衣就幄坐車少前太祝進醴獻如禮司徒跪曰大駕請舍太史令自車南北面讀哀策掌故在後已哀哭太常跪曰哭大鴻臚𫝊哭如儀司徒跪曰請就下位東園武士奉下車司徒跪曰請就下房都導東園武士奉車入房司徒太史令奉諡哀策晉時有人嵩髙山下得竹簡一枚上有兩行科斗書之臺中外𫝊以相示莫有知者司空張華以問博士束晳曰明帝顯節陵中策也檢校果然是知策用此書也東園武士執事下明器禮記曰明器神明之也孔子謂為明器知喪道矣備物而不可用也鄭元注既夕曰陳明器以西行南端為上筲八盛容三升鄭元注既夕曰筲器種𩔖也其容蓋與簋同黍一稷一麥一粱一稻一麻一菽一小豆一甕三容三升醯一醢一屑一鄭元注既夕曰屑薑桂之屑黍飴載以木桁覆以疏布甒二容三升醴一酒一載以木桁覆以功布瓦鐙一􅊮矢四軒輖中亦短衛彫矢四骨短衛既夕曰翭矢一乘骨鏃短衛鄭元曰翭猶候也候物而射之矢也四矢曰乘骨鏃短衛亦示不用也生時翭矢金鏃凡為矢五分笴長而羽其一通俗文曰細毛翭也􅊮弓一巵八牟八鄭云注既夕曰牟盛湯漿豆八籩八形方酒壺八槃匜一具鄭元注既夕曰槃匜盥器也杖几各一蓋一鐘十六無簴鎛四無簴爾雅曰大鐘謂之鏞郭璞注曰書曰笙鏞以間亦名鎛磬十六無簴禮記曰有鐘磬而無簨簴鄭元曰不懸之也壎一簫四笙一箎一柷一敔一瑟六琴一竽一筑一坎侯一禮記曰琴瑟張而不平竽笙備而不和干戈各一笮一甲一胄一既夕謂之役器鄭元曰笮矢箙輓車九乘芻靈三十六匹鄭元注禮記曰芻靈束茅為人馬謂之芻靈神之類瓦竈二瓦釡二瓦甑一瓦鼎十二容五升匏勺一容一升瓦案九瓦大杯十六容三升瓦小杯二十容二升瓦飯槃十瓦酒罇二容五升匏勺二容一升祭服衣送皆畢東園匠曰可哭在房中者皆哭太常大鴻臚請哭止如儀司徒曰百官事畢臣請罷從入房者皆再拜出就位太常導皇帝就贈位司徒跪曰請進贈侍中奉持鴻洞贈玉珪長尺四寸薦以紫巾廣袤各三寸緹裏赤纁周縁贈幣元三纁二各長尺三寸廣充幅皇帝進跪臨羡道房中西向手下贈投鴻洞中三東園匠奉封入藏房中太常跪曰皇帝敬再拜請哭大鴻臚傳哭如儀太常跪曰贈事畢皇帝促就位續漢書曰明帝崩司徒鮑昱典喪事葬日三公入安梓宫還至羡道半逄上欲下昱前叩頭言禮天子鴻洞以贈所以重郊廟也陛下奈何冒危險不以義割哀上即還容根車游載容衣司徒至便殿並輦騎皆從容車玉帳下司徒跪曰請就幄導登尚衣奉衣以次奉器衣物藏於便殿太祝進醴獻几下用漏十刻禮畢司空將校復土皇帝皇后以下皆去麤服服大紅還宫反廬立如禮桑木主尺一寸不書諡虞禮畢祔於廟如禮漢舊儀曰髙帝崩三日小斂空中牖下作栗木主長八寸前方後圓圍一尺置牖中望外内張緜絮以彰外以皓木大如指長三尺四枚纒以皓皮四方置牖中央七日大斂棺以黍飯羊舌祭之牖中已葬收主為木函藏廟太室中西墻壁埳中望内外不出室堂之上坐為五時衣冠履几杖竹籠為俑人無頭坐起如生前皇后主長七寸圍九寸在皇帝主右旁髙皇帝主長九寸上林給栗木長安祠廟作神主東園祕器作梓棺素木長丈三尺崇廣四尺先大駕日游冠衣於諸宫諸殿羣臣皆吉服從會如儀皇帝近臣喪服如禮醳大紅服小紅十一升都布練冠醳小紅服纎醳纎服留黄冠常冠近臣及二千石以下皆服留黄冠百官衣皂每變服從哭詣陵會如儀祭以特牲不進毛血首司徒光禄勲備三爵如禮太皇太后皇太后之喪合葬羡道開通皇帝謁便房太常導至羡道去杖中常侍受至柩前謁伏哭止如儀辭太常導出中常侍授杖升車歸宫也已下反虞立主如禮諸郊廟祭服皆下便房五時朝服各一襲在陵寢其餘及宴服皆封之篋笥藏宫殿後閣室世祖建武二年以皇祖考墓為昌陵置陵令守視後改為章陵因以春陵為章陵縣六年四月幸長安始謁髙廟遂有事於十一陵十年八月幸長安祠髙廟遂有事於十一陵十一年二月幸章陵祠園陵十八年二月幸長安祠髙廟有事於十一陵二十二年幸長安祠髙廟有事於十一陵以後幸長安謁陵不録古不墓祭漢諸陵皆有園寢承秦所為也說者以為古宗廟前制廟後制寢以象人之居前有朝後有寢也月令有先薦寢廟詩稱寢廟奕奕言相通也廟以藏主以四時祭寢有衣冠几杖象生之具以薦新物秦始出寢起於墓側漢因而弗改故陵上稱寢殿起居衣服象生人具名寢之意也建武以來關西諸陵以𫝊久逺但四時特牲祠帝每幸長安謁諸陵乃太牢祠自雒陽諸陵至靈帝皆以晦望二十四氣伏臘及四時祠廟日上飯太官送用物園令食監典省其親陵所宫人隨鼓漏理被枕具盥水陳嚴具二十六年初作壽陵初作陵未有名故號壽陵取長久之義將作大匠竇融上言園陵廣袤無慮所用說文曰南北曰袤東西曰廣無慮都凡也謂諸園陵都凡制度也帝曰古者帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而霸陵獨完受其福豈不美哉謂赤眉入長安惟霸陵不掘今所制地不過二三頃無為山陵陂池裁令流水而已光武葬原陵山方三百二十三步髙六丈六尺垣四出司馬門寢殿鐘虡皆在周垣内提封田十二頃五十七畝八十五步帝王世記曰在臨平亭之南西望平陰東南去雒陽十里帝以中元二年二月戊戌崩三月丁卯葬明帝永平元年正月帝率公卿已下朝於原陵如元會儀漢制正月五供畢以次上陵西都舊有上陵東都之儀百官四姓親家婦女公主諸王大夫外國朝者侍子郡國計吏會陵晝漏上水鴻臚設九賔隨立寢殿前鐘嗚謁者治禮引客羣臣就位如儀乘輿自廂下太常導出西向拜止旋升阼階拜神座退坐東廂西侍中尚書陛者皆神座後公卿羣臣謁神座太官上食太常樂奏食舉文始五行之舞禮樂闋君臣受賜食畢郡國上計吏以次前當神軒占其郡糓價民所疾苦欲神知其動靜孝子事親盡禮敬愛之心也周徧如禮最後親陵遣計吏賜之帶佩八月飲酎上陵禮亦如之致堂胡氏曰送死之禮即逺而無近至於墓則終事盡矣人子孝思不忘則專精於廟享而已矣蓋墓藏體魄而致生之是不智也廟以宅神而致死之是不仁也此聖人制禮明乎幽明之故仁智合而理義全也既已送形而徃安於地下迎精而反主於廟中而又致隆於陵園如元會儀上食奏樂郡國奏計言民疾苦是反易陵廟之理以體魄為有知虛廟祏而不重設復舉廟中之主而祭於陵所皆違禮也夫喪葬即逺豈得已而為之不可沐浴而不斂也故為之斂不可斂而不殯也故為之殯不可殯而不葬也故為之葬首為中制以節賢者之過而引不肖者之不及也若遂孝子思慕無窮之心則葬之之不得見曷若存之於殯之為近殯諸客位之為近曷若勿斂勿浴勿飲勿含之可以稱吾之不忍也原情至此則大聖至愚均於不行故不若循禮中節之為當也明帝此舉蓋生於原廟蔡邕不折𠂻以聖人之制而直論其情情豈有既哉使明帝移此情於四時太廟之祭簠簋籩豆尊彞鼎爼惟禮之循而兢兢業業監於光武成憲損益修明之期乎至治其為孝也雖聖主何以加諸永平七年陰太后崩柩將發於殿羣臣百官陪位黄門鼓吹三動鳴鐘鼓天子舉哀女侍史官三百人皆着素參以白素引棺挽歌下殿就車黄門宦者引以出宫省太后魂車鸞路青羽蓋駟馬龍旂九旒前有方相鳯凰率大將軍妻參乘太僕妻御悉導公卿百官如天子郊鹵簿儀後和熹鄧后葬按以為儀自此皆降損於前事也陰太后崩帝追慕無已當謁原陵夜夢先帝太后如平生歡悲不能寐即按歴明旦吉遂率百官上陵其日降甘露於陵樹令百官采取以薦帝伏御床視太后鏡奩中物感動悲涕令易脂澤裝具左右悲泣莫敢仰視明帝葬顯節陵山方三百步髙八丈無周垣為行馬四出在殿北提封田七十四頃五畝帝王世記曰故當壽亭也西北去雒陽三十七里帝以永平十八年八月壬子崩其月壬戌葬帝初作壽陵制令流水而已石椁廣一丈二尺長二丈五尺無得起墳東觀記曰陵東北作廡長三丈五步出外為小厨裁足祠祀萬年之後掃地而祭杅水脯糒而已杅飲器方言盌也糒乾糧也過百日唯四時設奠置吏卒數人供給灑掃勿開修道敢有所興作者以擅議宗廟法從事章帝欲為原陵顯節陵起縣邑東平王蒼上疏諫曰竊見光武皇帝躬履儉約之行營建陵地具稱古典詔曰無有山陵陂池裁令流水而已孝明皇帝奉承無違至於自所營創尤為儉省古者丘壟且不欲其著明况築郭邑建都郛哉又以吉凶俗數言之亦不欲無故繕修丘墓帝從而止章帝敬陵山方三百步髙六丈二尺無周垣為行馬四出司馬門右殿鐘虡在行馬内寢殿園省在東園寺吏舍在殿北提封田二十五頃五十五畝帝王世紀曰在雒陽東南去雒陽三十九里帝以章和二年正月壬辰崩三月癸卯葬和帝愼陵山方三百八十步髙十丈無周垣為行馬四出司馬門右殿鐘虡在行馬内寢殿園省在東園寺吏舍在殿北提封田三十一頃二十畝二百步帝王世紀曰在雒陽四十一里帝以元興元年十二月辛未崩次年三月甲申葬殤帝康陵山周二百八步髙五丈五尺行馬四出司馬門寢殿鐘虡在行馬中因寢殿為廟園吏寺舍在殿北提封田十三頃十九畝二百五十步帝王世紀曰髙五丈四尺去雒陽四十八里帝以延平元年八月辛亥崩九月丙寅葬安帝恭陵山周二百六十步髙十五丈無周垣為行馬四出司馬門右殿鐘虡在行馬内寢殿園吏寺舍在殿北提封田一十四頃五十六畝帝王世紀曰髙十一丈在雒陽西北去雒陽十五里帝延光四年三月丁卯幸葉崩於乘輿辛未發喪四月己酉葬順帝憲陵山方三百步髙八丈四尺無周垣為行馬四出司馬門右殿鐘虡在司馬門内寢殿園省寺吏舍在殿東提封田十八頃十九畝三十步帝王世紀曰在雒陽西北去雒陽十五里帝以建康元年八月庚午崩九月丙午葬冲帝懐陵山方百八十三步髙四丈六尺為寢殿行馬四出門園寺吏舍在殿東提封田五頃八十畝帝王世紀曰西北去雒陽十五里帝以永嘉元年正月戊戌崩其月己未葬冲帝崩將北卜山陵李固議曰今處處㓂賊軍興用費加倍新創憲陵賦發非一帝尚㓜小可起陵於憲陵塋内依康陵制度其於役費三分減一乃從固議質帝靜陵山方百三十六步髙五丈五尺為行馬四出門寢殿鐘虡在行馬中園寺吏舍在殿北提封田十二頃五十四畝因寢為廟帝王世紀曰在雒陽東去雒陽三十二里帝以本初元年閏六月甲申崩七月乙卯葬桓帝宣陵帝王世紀曰山方三百步髙十二丈在雒陽東南去雒陽三十里帝以延熹九年十二月辛丑崩次年二月辛酉葬靈帝熹平元年正月車駕上原陵諸侯王公及外戚家婦女郡國計吏匈奴單于西域三十六國侍子皆會焉如會殿之儀禮樂闋百官受賜爵計吏以次嚮殿前上先帝御座具言俗善惡民所疾苦司徒蔡邕慨然歎曰吾聞古之墓祭而朝廷有上陵之禮如此其備也察其本意乃知孝明至孝惻隱不易奪也或曰本意云何對曰西京之時其禮不可得而聞也光武帝始葬於此明帝嗣位逾年羣臣朝正感先帝不復見此禮乃率公卿百僚就陵而朝焉𤓰葛之親男女畢會郡計吏各向神座而言庶幾先帝魂神聞聽之也靈帝文陵帝王世紀曰山方三百步髙十二丈在雒陽西北去雒陽二十里帝中平六年四月丙辰崩六月辛酉葬獻帝禪陵帝王世紀曰在河内山陽之西南去雒陽三百一十里文獻通考卷一百二十四
