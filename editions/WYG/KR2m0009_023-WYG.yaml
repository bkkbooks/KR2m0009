body:
  text: 文獻通考卷二十三鄱陽馬端臨貴與著國用考一歴代國用王制冢宰制國用必於嵗之杪五穀皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出通三十年之率當有九年之蓄出謂所當給為祭用數之仂算今年一嵗經用之數用其什一喪用三年之仂喪大事用三嵗之什一喪祭用不足曰暴有餘曰浩暴猶耗也浩猶饒也祭豐年不奢凶年不儉國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂周官太宰以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰闗市之賦八曰山澤之賦九曰幣餘之賦財泉穀也鄭司農云邦中之賦二十而税一各有差也幣餘百工之餘元謂賦口率出泉卿大夫嵗時登其夫家之衆寡辨其可任者征之遂師征其財皆此賦也邦中在城郭者四郊去國百里邦甸二百里家削三百里邦縣四百里邦都五百里此平民也闗市山澤謂占㑹百物幣餘謂占賣國中之斥幣盖百官所用官物不盡者歸之職幣職幣得之不入本府恐久藏朽蠧則有人占賣依國服出息謂之斥幣謂指斥與人也此三者皆末作當増賦者若今賈人倍算矣自邦中至幣餘各入其所有榖物以當賦泉之數按此九賦先鄭以為地賦後鄭以為口賦然闗市即邦中之地也山澤即四郊以下之地也一地而再税之可乎闗市即邦中之人也山澤即四郊以下之人也一人而再税之可乎後鄭雖有末作増賦之説然於幣餘一項尚覺牽強且居闗市及山澤之民未必皆能占㑹百物以取利者也盡從而倍征之可乎愚以為自邦中至邦都皆取之於民者其或為地賦或為口賦不可知也闗市以下則非地賦亦非口賦乃貨物之税也闗市者貨之所聚故有賦如後世商税是也山澤者貨之所出故有賦如後世𣙜鹽𣙜茶之𩔖是也幣餘則如後世領官物營運之𩔖故取其息息即賦也故名之曰九賦而太宰總其綱焉以九式均節財用一曰祭祀之式二曰賔客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式匪分也謂頒賜也九曰好用之式燕好所賜予式謂用財之節大府掌九貢九賦九功之貳以受其貨賄之入頒其貨於受藏之府若内府也頒其賄於受用之府若職内也凡官府都鄙之吏及執事者受財用焉凡頒財以式灋授之闗市之賦以待王之膳服邦中之賦以待賔客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜予凡邦國之貢以待弔用此九貢之財凡萬民之賦以充府庫此九職之財凡式貢之餘財以供玩好之用謂先給九式及弔用足府庫而有餘財乃可以供玩好明玩好非治國之用凡邦之賦用取具焉嵗終則以貨賄之入出㑹之先公曰周官天下之財只有三項九貢是邦國之貢據經以待弔用九賦是畿内之賦以給九式之用九職萬民之貢以充府庫三者餘財以供玩好雖然邦國之貢多矣弔用之費幾何愚恐其有餘畿内之賦有限矣九式之費何廣也愚恐其不足玉府掌王之金玉玩好凡良貨賄之藏凡王之獻金玉兵器文織良貨賄之物受而藏之凡王之好賜供其貨賄賈山至言昔者周盖千八百國以九州之民養千八百國之君用民之力不過嵗三日君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力罷而不能勝其役財盡而不能勝其求一君之身耳所以自養者馳騁弋獵之虞天下弗能供也漢接秦之弊民失作業而大饑饉天下既定民亡盖藏自天子不能具醇駟醇不雜也而將相或乗牛車上於是約法省禁輕田租而山川園池市肆租税之入自天子以至封君湯沐邑皆各為私奉養不領於天子之經費漕轉闗東粟以給中都官嵗不過數十萬石文帝即位賈誼説上曰漢之為漢幾四十年公私之積猶可哀痛云云上感誼言開籍田躬耕以勸百姓鼂錯説上募民入粟邊支五嵗則入粟郡縣支一嵗則時赦勿收農民租見田賦門武帝時太倉之米紅腐而不可食都内之錢貫朽而不可校乃外事四夷内興功利用度不足乃募民入奴婢得以終身復及入羊為郎又令民買爵置武功爵見鬻爵門造皮幣白金見錢幣門置鹽鐵均輸官算商車緡錢𣙜酒酤見征𣙜門西漢財用之司凡三所大司農官庫少府水衡二者天子之私藏故桑𢎞羊言山海天地之藏宜屬少府陛下勿私以屬大農毋將隆言大司農錢自乗輿不以給供養供養勞賜一出少府盖不以本藏給末用不以民力供浮費别公私示正路也又宣帝本始二年以水衡錢為平陵民起第宅應劭注縣官公作當仰司農今出水衡錢宣帝即位為異政也王莽末邊兵二十萬人仰縣官衣食用度不足數横賦斂又一切税吏民訾三十而取一又令公卿以下至郡縣黄綬吏皆保養軍馬師古曰保者不許其死傷吏盡復以與民轉令百姓養之民揺手觸禁不得耕桑徭役煩劇旱蝗相因上自公侯下至小吏皆不得奉禄而私賦歛民無以自存盗賦蠭起漢兵攻莽時省中黄金萬斤者為一匱尚有六十匱黄門鉤盾藏府中尚方處處各有數匱長樂御府中御府及都内平凖帑藏錢帛珠玉財物甚衆莽愈愛之拜將軍九人皆虎為號將精兵而東納其妻子宮中以為質賜九虎士人四千錢衆重怨無鬬志更始都長安居安樂宮府藏完全獨未央宮燒攻莽三日死則安堵復故更始至嵗餘政教不行明年赤眉入闗立劉盆子遂燒長安宮室市里害更始長安為虛城中無人行東漢大司農掌諸錢穀金帛諸貨幣四時上月旦見錢穀簿其逋未了各具别之邊郡諸官請調度者皆為報給損多益寡取相給足部丞一人主帑藏太倉令一人主受郡國傳漕穀世祖建武六年詔田租三十税一如舊見田賦門肅宗時張林請置鹽鐵均輸官見征𣙜門舊大官湯官給用嵗且二萬萬鄧太后詔殺省珍費自是裁數千萬漢故事供給南單于嵗一億九十餘萬西域嵗七千四百八十萬桓帝時叚熲言永初中諸羌反叛十有四年用二百四十億永和之末復給七年用八十餘萬億今若以騎五千歩萬人車三千兩三冬二夏無慮用費五十四億靈帝光和元年初開西邸賣官自闗内侯虎賁羽林入錢各有差私令左右賣公卿公千萬卿五百萬中平二年斂修宮錢中常侍張讓趙忠説帝斂天下田畮十錢以修宮室又令西園騶分道督趣恐動州郡多受賕賂刺史二千石及茂才孝亷遷除皆責助軍修宮錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去其守清者乞不之官皆迫遣之時鉅鹿太守司馬直新除以有清名减責三百萬直被詔悵然曰為民父母而反割剝百姓以稱時求吾不忍也辭疾不聽行至孟津上書極諌當世之失即吞藥自殺書奏帝為暫絶修宫錢又造萬金堂於西園引司農金錢繒帛仞積其中又還河間買田宅起第觀帝本侯家宿貧每歎桓帝不能作家居故聚為私藏復藏寄小黄門常侍錢各數千萬帝多蓄私藏收天下之珍每郡國貢獻先輸中府名為導行費中府内府也導引也貢獻外别有所入以為所獻希之引導也呂強上疏諌曰天下之財莫不生之隂陽歸之陛下歸之陛下豈有公私而尚方歛諸郡之寳中御府積天下之繒西園引司農之藏中廐聚太僕之馬而所輸之府輙有導行之財調廣民困費多獻少姦吏因其利百姓受其弊書奏不省獻帝即位董卓刼遷長安卓誅死李㴶郭氾自相攻伐於長安城中為戰地時穀一斛五十萬豆麥二十萬人相食啖白骨盈野帝出太倉米豆為饑民作糜於御前自加臨給及東歸至安邑御衣穿敗唯以野􅀥園菜以為糇糧長安坵墟建安元年駕至洛陽百官披荆棘而居州郡各擁强兵委輸不至尚書郎官自出採稆或不能自反死於墟巷晉武帝平呉之後世屬升平物流倉府宫闈増飾服翫相輝於是王君夫武子石崇等更相誇尚輿服鼎爼之盛連衡帝室布金埓之泉粉珊瑚之樹物盛則衰固其宜也永寧之初洛中尚有錦帛四百萬珠寳金銀百餘斛惠后北征蕩隂反駕寒桃在御隻鷄以給其布衾兩幅囊錢三千以為車駕之資焉懷帝為劉曜所圍王師累敗府帑既竭百官饑甚比屋不見煙火饑人自相啖食愍皇西宅餒饉仍多斗米二金死人大半劉曜陳兵内外斷絶拾餅之麴屑而供御君臣相顧揮涕元帝渡江軍事草創蠻陬賧布不可恒凖中府所儲布四千疋於時石勒勇鋭挺亂淮南帝懼其侵逼乃詔方鎮能斬勒首者賞布千疋云蘇峻既平帑藏空竭庫中唯有練數千端鬻之不售而國用不給王導患之乃與朝賢俱製練布單衣於是士人翕然競服之練遂踴貴乃令主者出賣端至一金晉自元帝寓居江左僑立郡縣諸蠻陬俚洞霑沭王化者各隨輕重收其賧物以禆國用歴宋齊梁陳皆因而不改見田賦門後魏自孝明帝正光後國用不足乃先折天下六年租調而徴之百姓怨苦有司奏斷百官當給之酒計一嵗所省米穀麴有差見𣙜酤門爾後㓂賊轉衆諸將出征相繼奔敗帑藏空竭有司又奏内外百官及諸蕃客廩食肉悉三分减一計嵗終省肉百五十九萬九千八百五十六斤米五萬三千九百三十二石魏自永安之後政道陵夷㓂亂寔繁農商失業官有征伐皆權調於人猶不足以相資奉乃令所在迭相紏發百姓愁怨無復聊生六鎮擾亂相率内徙寓食齊晉之郊齊神武因之以成大業魏武西遷連年戰爭河洛之間又並空竭遷都於鄴時六坊之衆從武帝而西者不能萬人餘皆北徙並給常廪逐豐稔之處折絹糴粟以充國儲於諸州緣河津濟皆官倉貯積以擬漕運於滄瀛幽青四州之境傍海置鹽官以煑鹽每嵗收錢軍國之資得以周贍北齊武成時用度轉廣賜予無節府藏不足以供乃减百官之禄徹軍人常廪併省州郡縣鎮戍之職又制刺史守宰行兼者並不給幹南齊以有僮幹若今驅使門僕之𩔖以節國用之費焉隋文帝開皇時百姓承平漸久雖遭水旱而户口嵗増諸州調物每嵗河南自潼闗河北自蒲坂至於京師相屬於道晝夜不絶數月帝又躬行節儉益寛徭賦平江表師還賜物甚廣其餘出師命賞莫不優崇十二年有司上言庫藏皆滿帝曰朕既薄賦於人又大經賜用何得爾也對曰用處常出納處常入略計每年賜用至數百萬段曽無減損乃更開左藏之院構屋以受之詔曰既富而教方知亷恥寕積於人無藏府庫乃蠲河北河東今年田租三分減一兵減半功調全免煬帝即位户口益多府庫盈溢乃除婦人及奴婢部曲之課其後征伐廵遊不息租賦之入益減百姓怨叛以至於亡按古今稱國計之富者莫如隋然考之史傳則未見其有以為富國之術也盖周之時酒有𣙜鹽池鹽井有禁入市有税至開皇三年而並罷之夫酒𣙜鹽鐵市征乃後世以為闗於邦財之大者而隋一無所取則所仰賦税而已然開皇三年調絹一疋者減為二丈役丁十二番者減為三十日則行蘇威之言也繼而開皇九年以江表初平給復十年自餘諸州並免當年租税十年以宇内無事益寛徭賦百姓年五十者輸庸停放十二年詔河北河東今年田租三分減一兵減半功調全免則其於賦税復闊略如此然文帝受禪之初即營新都徙居之繼而平陳又繼而討江南嶺表之反側者則此十餘年之間營繕征伐未嘗廢也史稱帝於賞賜有功並無所愛平陳凱旋因行慶賞自門外夾道列布帛之積逹於南郭以次頒給所費三百餘萬段則又未嘗嗇於用財也夫既非苛賦歛以取財且時有征役以糜財而賞賜復不吝財則宜用度之空匱也而何以殷富如此史求其説而不可得則以為帝躬履儉約六宮服澣濯之衣乗輿供御有故敝者隨令補用非燕享不過一肉有司嘗以布袋貯乾薑以氊袋進香皆以為費用大加譴責嗚呼夫然後知大易所謂節以制度不傷財不害民孟子所謂賢君必恭儉禮下取於民有制者信利國之良䂓而非迂闊之談也漢隋二文帝皆以躬履朴儉富其國漢文師黄老隋文任法律而所行暗合聖賢如此後之談孔孟而行管商者乃曰茍善理財雖以天下自奉可也而其黨遂倡為豐亨豫大惟王不㑹之説飾六藝文姦言以誤人國家至其富國强兵之效則不逮隋逺甚豈不繆哉唐貞觀時馬周上疏曰隋室貯洛口倉而李密因之東都積布帛而王世充據之西京府庫亦為國家之用至今未盡向使洛口東都無粟帛則王世充李密未能聚大衆但貯積固有司之常事要當人有餘力而後收之若人勞而强歛之更以資宼積之無益也唐天寳以來海内富實天下嵗入之物租錢二百餘萬緡粟千九百八十餘萬斛庸調絹七百四十萬疋綿百八十餘萬屯布千三十五萬餘端天子驕於佚樂而用不知節大抵用物之數常過於所入於是錢穀之臣始事朘削太府卿楊崇禮句剝分銖有欠折漬損者州縣督送歴年不止其子慎矜專知太府次子慎名知京倉亦以苛刻結主恩王鉷為户口色役使嵗進錢百億萬緡非租庸正額者積百寳大盈庫以供天子燕私及安禄山反楊國忠以為正庫物不可以給士遣御史崔衆至太原納錢度僧尼道士旬日得萬緡而已自兩京䧟没民物耗弊肅宗即位籍江淮富商訾見訾算門時第五琦以錢穀得見請於江淮置租庸使明年宰相裴冕以天下用度不足諸道得召人納錢給空名告身授官勲邑號度道士僧尼不可勝計納錢百千賜明經出身商賈助軍者給復故事天下財賦歸左藏而太府以時上其數尚書比部覆其出入時京師豪將假取不能禁第五琦為度支鹽鐵使請皆歸大盈庫供天子給賜主以中官自是天下之財為人君私藏有司不得程其多少楊炎既相徳宗上言曰財賦邦國大本生人之喉命天下治亂輕重係焉先朝權制以中人領其職五尺宦䜿操邦之柄豐儉盈虚雖大臣不得知無以計天下利害臣請出之以歸有司度宫中給費一嵗幾何量數奉入不敢闕帝從之乃詔嵗中裁取以入大盈庫度支具數先聞初轉運使掌外度支使掌内永泰二年分天下財賦鑄錢常平轉運鹽鐵置二使東都畿内河南淮南江東西湖南荆南山南東道以轉運使劉晏領之京畿闗内河南劒南山南西道以京兆尹判度支第五琦領之及琦貶以户部侍郎判度支韓滉與晏分治時囬紇有助收西京功代宗厚遇與為㛰嵗送馬十萬疋酬以縑帛百餘萬疋而中國財竭嵗負馬價魚朝恩元載擅權帝誅朝恩復與載貳君臣猜間不恊邊計兵食置而不議者幾十年諸鎮擅地結為表裏日治兵繕壘天子不能繩其法專留意祠禱焚幣玉寫浮屠書度支廪賜僧巫嵗鉅萬計時朝多留事經嵗不能遣置客省以居上封事不足采者蕃夷貢獻未報及失職未敘者食度支數千百人德宗即位用宰相崔祐甫拘客省者出之食度支者遣之嵗省費萬計自至德以後天下兵起因以饑厲百役並興人户凋耗版圖空虚軍國之用仰給於度支轉運使四方征鎮又自給於節度都團練使賦歛之司數四莫相統攝綱目大壞朝廷不能覆諸使諸使不能覆諸州四方貢獻悉入内庫權臣巧吏因得旁縁公託進獻私為贓盗動萬萬計河南山東荆襄劒南重兵處皆厚自奉養王賦所入無幾科歛凡數百名廢者不削重者不去新舊仍積不知其涯百姓竭膏血鬻親愛旬輸月送無有休息吏因其苛蠶食於人富者得免貧者丁存故課免於上而賦増於下楊炎為相乃請為兩税法以均之自此吏不能容姦權歸朝廷詳見田賦門初德宗居奉天儲蓄空窘嘗遣卒視賊以苦寒乞􅃭不能致剔親王𢃄金而鬻之朱泚既平乃屬意聚歛常賦之外進奉不息劔南西川節度使韋臯有日進江西觀察使李兼有月進他如杜亞劉贊王緯李錡皆徼射恩澤以常賦入貢名為羡餘至代易又有進奉户部錢物所在州府及廵院皆得擅留或矯密㫖加斂或減刻吏禄或販鬻蔬果徃徃私自入所進纔什二三無敢問者刺史及幕僚至以進奉得遷官繼而裴延齡用事益為天子積私財生民重困又為宫市見征𣙜門朱泚僭位長安既據府庫之富不愛金帛以悦將士公卿家屬在城者皆給月俸神䇿及六軍從車駕及哥舒曜李晟者皆給其衣糧加以繕完器械日費甚廣及長安平府庫尚有餘蓄見者皆追怨有司之横歛焉裴延齡領度支奏左藏庫司多有失落近因檢閲使置簿書乃於糞土之中得銀十三萬兩其疋段雜貨百萬有餘此皆已棄之物即是羡餘悉應移入雜庫以供别敕支用太府少卿韋少華不伏抗表稱此皆每月申奏見在之物請加推驗執政請令三司詳覆上不許亦不罪少華司馬温公有言天之生財止有此數不在民則在官譬如雨澤夏潦則秋旱善哉言也後世多慾之君聚歛之臣苛征横歛民力不堪而無所從出於是外則擅留常賦以為進奉内則妄指見存以為羡餘直不過上下之間自相欺蔽耳徳宗借軍興用度不足之名而行間架陌錢諸色無藝之征歛乃復不能稍豐涇原軍士之廪餉以致奉天之難至委其厚藏以遺朱泚泚平而府庫尚盈人皆追怨横歛而帝方懲奉天儲蓄空窘益務聚蓄不知所以致難之由非因乏財盖知聚而不知散乃怨府也不明之君可與言哉憲宗時分天下之賦以為三一曰上供二曰送使三曰留州宰相裴垍又令諸道觀察節度調費取於所治州不足則取於屬州送使之餘與其上供者皆輸度支時因德宗府庫之積天子頗務儉約及劉闢李錡平貲藏皆入内庫方鎮于頔王鍔進獻甚厚帝受之李絳言其非宜帝喟然曰誠知非至徳事然兩河中夏貢賦之地朝覲久廢河湟䧟没烽候列於郊甸方刷祖宗之恥不忍重歛於人也然不知進獻之取於人重矣其後皇甫鎛王遂李翛程异用事益務聚歛諸道貢獻尤甚㑹昌末置備邊庫收度支户部鹽鐡錢物宣宗更號延資庫初以度支郎中判之至是以屬宰相其任益重户部嵗送錢帛二十萬度支鹽鐵送者三十萬諸道進奉助軍錢皆輸焉元和中供嵗賦者浙西浙東宣歙淮南江西鄂岳福建湖南八道戸百四十四萬比天寳四之一兵食於官者八十三萬加天寳三之一通以二户養一兵京西北河北以屯田廣無上供至長慶户三百三十五萬而兵九十九萬率三户以奉一兵至武宗即位户二百一十一萬四千九百六十㑹昌末户増至四百九十五萬五千一百五十一宣宗既復河湟天下兩税𣙜酒茶鹽嵗錢入九百二十二萬緡嵗之常費率少三百餘萬有司逺取後年乃濟及群盗起諸鎮不復上計云李吉甫為元和國計簿及中書奏疏以天下郡邑户口財賦之入較吏禄兵廪商賈僧道之數大率以二户而資一兵以三農而養七游手後唐荘宗既滅梁宦官勸帝分天下財賦為内外府州縣上供者入外府充給費方鎮貢獻者入内府充宴游及給賜左右於是外府常虚竭無餘而内府山積及有司辦郊祀乏勞軍錢郭崇韜頗受藩鎮饋遺或諌之崇韜曰吾位兼將相禄賜巨萬豈藉外財但偽梁之世賄賂成風今河南藩鎮皆梁舊臣主上之仇讎也若拒其意能無懼乎吾特為國家藏之私室耳至是首獻勞軍錢十萬緡因言於上曰臣已傾家所有以助大禮願陛下亦出内府之財以賜有司上黙然久之曰吾晋陽自有儲蓄可令租庸輦取以相助於是取李繼韜私第金帛數十萬以益之繼韜時以誅死軍士皆不滿望始怨恨有離心矣潞王之發鳳翔也許軍士以入洛人賞錢百緡既至閲府庫實金帛不過三萬疋兩而賞軍之費應用五十萬緡乃率京城民財數日僅得數萬緡執政請據屋為率無問士庶自居及僦者預借五月僦直百方歛民財僅得六萬帝怒下軍廵使獄晝夜督責囚繫滿獄貧者至自經死而軍士遊市肆皆有驕色時竭左藏舊物及諸道貢獻乃至太后太妃器服簮珥皆出之纔及二十萬緡帝患之李專羙言於帝曰竊思自長興之季賞賚亟行卒以是驕繼以山陵及出師帑藏遂涸雖有無窮之財終不能滿驕卒之心故陛下拱手於危困之中而得天下夫國之存亡不專係於厚賞亦在修法度立紀綱陛下茍不改覆車之轍臣恐徒困百姓存亡未可知也今財力盡於此矣宜據所有均給之何必踐初言乎帝以為然軍士無厭猶怨望宋太祖皇帝乾德三年詔諸州支度經費外凡金帛悉送闕下無得占留自唐末兵興方鎮皆留財賦自贍名曰留使留州其上供殊鮮五代疆境迫蹙藩鎮益强率令部曲主塲院厚歛以自奉太祖周知其弊後藩郡有闕稍命文臣權知所在塲務或以京朝官廷臣監臨於是外權削而利歸公上條禁文簿漸為精密六年詔諸州通判官糧料院至任並須躬自檢閲帳籍所列官物不得但憑主吏管認文狀是嵗置封樁庫國初貢賦悉入左藏庫及取荆湖下西蜀儲積充羡始於講武殿别為内庫號封樁庫以待嵗之餘用帝嘗曰軍旅饑饉當預為之備不可臨事厚歛於人乃置此庫太宗又置景福殿庫𨽻内藏庫揀納諸州上供物嘗謂左右曰此盖慮司計之臣不能約節異時用度有闕當復賦率於民耳朕終不以此自供嗜好也自乾徳開寳以來用兵及水旱賑給慶澤賜賚有司計度之所缺者必籍其數以貸於内藏俟課賦有餘則償之淳化後二十五年間嵗貸百萬有至三百萬者累嵗不能償則除其籍止齋陳氏曰國初平僭偽盡得諸國所藏之賦入内藏是後時時以州縣上供掯撥入庫而不齊集守藏之臣每以為言上亦不察察也盖祖宗盛時内藏庫止是收簇給費之餘或坊塲課利不以多寡初無定額熙寧二年始命三司户部判官張諷核實諷取自嘉祐至治平十年以來輸送之數見得川路金銀自皇祐三年並納内庫餘福建廣東淮南江南東則各有窠名分𨽻而十年之間所入殊不等乃詔今後並令納左藏庫逐年於左藏庫撥金三百兩銀五十萬兩入内藏遂為永額然諷元奏治平以前諸路所進坑冶山澤河渡課利悉在其中既合為元額矣在後中書再取㫖以諸路提㸃銀銅坑冶司所轄金銀塲冶課利並依久例盡數上供入内庫則坑冶之入不理為左藏庫年額之數自是條制益嚴密皆王安石之為也元豐元年敕諸路上供金銀錢帛令赴内藏庫内者委提刑拘催擅折變那移截留者徒二年不以赦原元祐詔令諸路坑冶課利七分起發赴内藏庫三分充漕計靖康改元三分復盡輸内藏矣開寳元年詔諸道給州車輦送上供錢帛止齋陳氏曰國初上供隨嵗所入初無定制而其大者在糧帛銀錢諸路米綱㑹要開寳五年令汴蔡河嵗運江淮米數十萬石赴京充軍食太平興國六年制嵗運三百五十萬石景徳四年詔淮南江浙荆湖南北路以至道二年至景德二年終十年酌中之數定為年額上供六百萬石米綱立額始於此銀綱自大中祥符元年詔五路糧儲已有定額其餘未有條貫遂以大中祥符元年以前最為多者為額則銀綱立額始於此錢綱自天禧四年四月三司奏請立定錢額自後每年依此額數起發則錢綱立額始於此絹綿綱雖不可考以咸平三年三司初降之數則亦有年額矣然而前朝理財務在寛大隨時損益非必盡取上供増額起於熙寧雖非舊貫猶未為甚崇寧三年十一月始立上供錢物新格於是益重宣和元年户部尚書唐恪稽考諸路上供錢物之數荆湖南路四十二萬三千二百二十九萬疋兩利州路三萬二千五百一十八貫疋兩荆湖北路四十二萬七千二百七十七貫疋兩䕫州路一十二萬三百八十九貫疋兩江南東路三百九十二萬四百二十一貫疋兩福建路七十二萬二千四百六十七貫疋兩京西路九萬六千三百五十一貫疋兩河北路一十七萬五千四百六十四貫疋兩廣西路九萬一千九百八十貫疋兩京東路一百七十七萬二千一百二十四貫疋兩廣南東路一十八萬八千三十貫疋兩陜西路一十五萬七百九十貫疋兩江南西路一百二十七萬六千九十八貫疋兩成都路四萬五千七百二十五貫疋兩潼川路五萬二千一百二十貫疋兩兩浙路四百四十三萬五千七百八十八貫疋兩兩淮南路一百一十一萬一千六百四十三貫疋兩而斛斗地雜科不與焉其取之民極矣方今版圖僅及承平之半而賦入過宣和之數雖曰饟軍出不得已要非愛惜邦本之道此寛民力之説所以為最先務也按止齋此叚足以盡宋朝上供之委折上供之名始於唐之中葉盖以大盗擾亂之後賦入失䧟國家日不暇給不能考覈加以强藩自擅朝廷不能制是以立為上供之法僅能取其三之一宋興既已削州鎮之權命文臣典藩奉法循理而又承平百年版籍一定大權在上既不敢如唐之專擅以自私獻入有程又不至如唐之隳亂而難考則雖按籍而索錙銖皆入朝廷未為不可然且猶存上供之名取酌中之數定為年額而其遺利則付之州縣樁管盖有深意一則州郡有宿儲可以支意外不虞之警急二則寛於理財盖隂以恤民承流宣化者幸而遇清介慈惠之人則上供輸送之外時可寛假以施仁不幸而遇貪饕縱侈之軰則郡計優裕之餘亦不致刻剝以肆毒所謂損上益下者也嗚呼仁哉六年令諸州舊屬公使錢物盡數係省毋得妄有支費以留州錢物盡數係省始於此止齋陳氏曰自唐末方鎮厚歛以自利上供殊鮮或私納貨賂即名貢奉至是始盡係省按後唐天成年宣命於係省麴錢上毎貫止二百文充公使同光二年庸租院奏諸道如更妄稱簡置官員即勒令自備請給不得正破係省錢物則係省之名舊矣然初未嘗立拘轄鈎管之制要不使妄費而已淳化五年十二月初置諸州應在司具元管新收已支見在錢物申省景德元年復立置簿拘轄累年應在雖有此令不過文具三司使丁謂奏立轉運司比較聞奏省司進呈増虧賞罰之法然承平日久國家益務寛大諸郡錢物徃徃積留漕臣靳惜吝於起發而省司殊不究知其詳魏羽在咸平則言淳化以來收支數目攢簇不就名為主計而不知錢出納王隨在景德則言咸平以來未見錢物着落諸州受御指揮多不供申或有申報多是鹵莽以致勘㑹勾銷了絶不得范雍在天聖則又言自太平興國以來未嘗除破更有樁管倍萬不少天聖至嘉祐四十年間理財之令數下徒有根括驅磨之文設而不用以此見得開國以來訖於至和天下財物皆藏州郡祖宗之深仁厚澤於此見矣熙寧五年看詳編修中書條例檢正五房公事判司農寺曽布奏伏以四方財物乾没差謬漫不可知三司雖有審覆之名不復省閲但為空文自天聖九年上下因循全無檢㸃縱有大叚侵欺亦無由舉發為弊滋多遂乞專置司驅磨天下帳籍自專置司繼以旁通目子而天下無遺利而公使錢始立定額自二百貫至三千貫止州郡所入纔醋息房園祠廟之利謂之收簇守臣窘束屢有奏陳謂如本州額定公使錢一千貫則先計其州元收坊塲園池等項課利錢若干却以不係省錢貼足額數然諸項課錢逐年所收不等或虧折不及元數而所支不係省貼足之錢更正増添則比額定數有不及一半者此其所以窘束也後又以在州諸色錢𩔖為一體封樁入便以便不盡錢起發初嘉祐茶通商於是以六路茶本錢茶租茶税錢封樁入便若輙有支動即當職黜降不以自首遷官去官赦降原減之限至是遂以七路諸色錢並依通商茶法矣元豐五年又以上供年額外凡𤨏細錢定為無額上供謂坊塲税錢増添鹽酒錢賣香礬錢賣秤斗錢賣銅鍚錢披剃錢封贈錢淘尋野料錢額外鑄到錢銅鉛木脚錢竹木税錢誤支請受錢代支失䧟賞錢贓罰錢户絶物帛錢盖自係省而後有應在司有應在司而後有封樁有封樁而後起發盖至熙豐係省初無窠名應在司最為冗長此元祐羣臣所以深罪王安石之紛更也又詔諸州守臣非聖節進奉自餘諸般進奉錢物並留本州管係不得押領上京聖節進奉始此止齋陳氏曰謹按李燾續通鑑熊克九朝要畧皆於乾徳三年三月平蜀後書詔諸州計度經費外凡金帛悉送闕下於是外權削而利歸公上矣盖約本志修入而實録不著竊考建隆以來凡上供綱皆有元降指揮獨不見上件條貫唯至道四年二月十四日勅川陜錢帛令本路轉運司計度只留一年支備其剰數計綱起發上京不得占留盖平蜀後事也自餘諸州常切約度在州以三年准備為率外縣鎮二年偏僻縣鎮一年河北陜西縁邊諸州不在此限江浙荆湖淮南西六路自來便錢州月帳内將見錢除半支遣外並具單狀申奏諸州應係錢物合供文帳並於逐色都數下具言元管年代合係本州支用申省候到省日或有不係本州支用及數目浩大本處約度年多支用不盡時下轉運司及本州相度移易支遣三司據在京要用金銀錢帛諸般物色即除式様遍下諸州府具金銀錢帛糧草收支見在三項單數其見在項内開坐約支年月省司即據少剰數目下諸路轉運司移易支遣及牒本州般送上京如有約度不足去處許以收至諸色課利計置封樁以此參考是嵗進奉約束并景徳元年李濤所奏足見國初未嘗務虚外郡以實京師今從實録按乾徳三年有諸州金帛悉送闕下之詔今復有此詔疑若異同而止齋遂以實録不載前詔為疑盖唐末而方鎮至於擅留上供之賦威令不行故也宋興而州郡不敢私用留州之錢紀綱素立故也既欲矯宿弊則不容不下乾徳之詔然紀綱既已振立官吏知有朝廷則不妨藏之州郡以備不虞固毋煩悉輸京師而後為天子之財也詔官受倉塲頭子錢之半頭子錢本末見田賦門文獻通考卷二十三
