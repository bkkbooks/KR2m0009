body:
  text: 文獻通考卷九鄱陽馬端臨貴與著錢幣考二歴代錢幣之制後唐同光二年令京師及諸道於市行使錢内檢㸃雜惡鉛錫並宜禁斷沿江州縣毎舟船到岸嚴加覺察不許將雜鉛錫惡錢徃來换易好錢如有私載並行收納天成元年中書門下奏訪聞諸道州府所買賣銅器價貴多是銷鎔見錢以邀厚利宜遍告曉如元舊破損銅器及碎銅即許鑄造銅器生銅器毎斤價定二百熟銅器每斤四百如違省價買賣之人依盜鑄錢律文科斷又勅諸道州府約勒見錢素有條制若全禁斷實匪通規宜令三京諸道州府城門所出見錢如五百以上不得放出二年勅買賣人所使見錢舊有條流每陌八十文近訪聞在京及諸道市肆人戸皆将短陌轉换長錢今後凡有買賣並須使八十陌錢如有輙将短錢興販仰所在收捉禁治四年制今後行使錢陌内捉到一文二文係夾帶鉛鐵錢所使錢不計多少納官科罪晉天福三年詔曰國家所資泉貨為重銷蠧則甚添鑄無聞宜令三京諸道州府無問公私應有銅者並許鑄錢仍以天福元寳為文左環讀之每一錢重二銖四絫十錢重一兩仍禁将鉛鐵雜鑄諸道應有久廢銅冶許百姓取便開錬永逺為主官中不取課利除鑄錢外不得接便别鑄銅器其年十二月勅先許鑄錢切慮逐處缺銅難依先定銖兩宜令天下公私應有銅欲鑄錢者取便酌量輕重鑄造不得入鉛鐵及缺落不堪久遠流行四年勅以天下公私鑄錢雜以鉛錫缺小違條今後袛官鑄造私下禁舊法漢隱帝時王章為三司使聚歛刻急舊制錢出入皆以八十為陌章始令入者八十出者七十七謂之省陌周顯德二年帝以縣官久不鑄錢而民間多銷錢為器皿及佛像錢益少乃立監采銅鑄錢自非縣官法物軍器及寺觀鐘磬鈸鐸之類聽留外自餘民間銅器佛像五十日内悉令輸官給其直過期隱匿不輸五斤以上罪死不及者論刑有差其銅鏡官中鑄於東京置場貨賣許人戸收買興販朝廷及諸州見管法物軍器舊用銅製及装飾者候經使用破壞即仰改造不得更使銅内有合使銅者奏取進止上謂侍臣曰卿軰勿以毁佛為疑夫佛以善道化人茍志於善斯奉佛矣彼銅像者豈所謂佛邪且吾聞佛志在利人雖頭目猶捨以布施若朕身可以濟民亦非所惜也致堂胡氏曰令之而行禁之而止惟為人所難者能若世宗欲禁銷錢而毁銅像是也銅像人所敬畏尚且毁之錢之不可銷必矣韓愈拜京兆尹神䇿六軍不敢犯法曰是尚欲除佛者亦猶是也銷錢為器其利十倍錢所以權百貨平低昻其鑄之也不計費不謀息今而銷之可不禁乎雖然銷而為器錢雖毁而器存焉若夫散而四出舟遷車轉入於他國歸於蠻夷其害豈特為器而已而不聞世宗禁之則不以泉貨貿逺方之寳可知已錢之散也以貿遠方之寳故也上好之下效之於是關防不嚴法制隳壞眞錢日少偽錢日多以不貲之價靡有限之錢雖萬物為銅隂陽為炭亦且不給區區器像又何濟乎故惟至亷無欲然後可蓄生人之共寳而又關防嚴密法制具在鼓鑄不廢則中國之錢眞可流於地上矣唐主李璟既失江北困於用兵鍾謨請鑄大錢以一當十文曰永通泉貨謨得罪而大錢廢韓熙載又鑄鐵錢以一當二錢有銅鐵二等五代相承用唐錢諸國割據者江南曰唐國通寳又别鑄如唐制而篆文其後鑄鐵錢每十錢以鐵錢六權銅錢四而行乾德後只以鐵錢貿易凡十當銅錢一兩浙河東自鑄銅錢亦如唐制西川湖南福建皆用鐵錢與銅錢兼行湖南文曰乾封泉寳徑寸以一當十福建如唐制宋初錢文曰宋元通寳太平興國後又鑄太平通寳錢太宗親書淳化元寳作眞行草三體自後每改元必更鑄以年號元寳為文太祖皇帝建隆二年禁諸鐵鑞錢民間有者悉送官乾德五年禁輕小惡錢限一月送官自平廣南江南聽權用舊錢勿得過本路之境國初因漢制其輸官錢亦用八十或八十五為陌然諸州私用各隨俗至有以四十八錢為陌是歲所在用七十七陌為貫及四斤半以上眞宗咸平四年舊制犯銅禁七斤以上並奏裁處死詔自今滿五十斤以上取裁餘第减之天禧三年詔犯銅鍮石並免極刑鐵錢者川陜福州承舊制用之開寳三年令雅州百丈縣置監鑄鐵錢禁銅錢入兩川後令兼行銅錢一當鐵錢十太平興國八年以福建少銅錢令於建州鑄大鐵錢與銅錢並行尋罷鑄凡鑄銅錢有四監饒州曰永平池州曰永豐江州曰廣寧建州曰豐國京師昇鄂州南安軍舊並有錢監杭州有寳興監後並廢之每千文用銅三斤十兩鉛一斤八兩鍚八兩成重五斤惟建州增銅五兩減鉛如其數至道中歲鑄八十萬貫景德中至一百八十三萬貫大中祥符後銅坑多不發天禧末鑄一百五萬貫鐵錢有三監邛州有惠民嘉州有豐遠興州有濟衆益州雅州舊亦有監後廢大錢貫重十二斤十兩以准銅錢舊皆用小鐵錢十當銅錢之一景德二年令知益州張詠西川轉運使黃觀同裁度嘉邛二州所鑄大鐵錢每貫用二十五斤八兩成直銅錢一小鐵錢十相兼行用後以鐵重多盗鎔為器每二十五斤鬻之直二千大中祥符七年知益州凌䇿言錢輕則行者易齎錢小則鎔者鮮利請減景德二年之制其見使舊錢亦令仍舊行用從之歲總鑄二十一萬餘貫太祖時取唐朝飛錢故事許民入錢京師於諸州便换其後定外地閑慢州乃許指射自此之後京師用度益多諸州錢皆輸送其轉易當給以錢者或移用他物先是許商人入錢左藏庫以諸州錢給之而商旅先經三司投牒乃輸於庫所由司計一緡私刻錢二十開寳三年置便錢務令商人入錢者詣務陳牒即日輦致左藏庫給以券仍䇿諸州凡商人齎券至當日給付不得住滯違者科罰自是毋復停滯至道末商人便錢一百七十餘萬貫天禧末增一百一十三萬貫初蜀人以鐵錢重私為券謂之交子以便貿易富人十六户主之其後富人貲稍衰不能償所負爭訟數起冦瑊嘗守蜀乞禁交子薛田為轉運使議廢交子則貿易不便請官為置務禁民私造詔從其請置交子務於益州諸路錢歲輸京師四方繇此錢重而貨輕景祐初始詔三司以江東福建廣南歲輸緡錢合三十餘萬易為金帛錢流民間凡鑄銅錢用劑八十八兩得錢千重八十兩十分其劑銅居六分鉛錫居三分皆有竒贏鑄大鐵錢用鐵二百四十兩得錢千重百九十二兩此其大法也有許申者為三司度支判官建議以藥化鐵與銅雜鑄輕重如銅錢法而銅居三分鐵居六分皆有竒贏亦得錢千費省而利厚詔鑄於京師然鑄錢雜鉛錫則其液流速而易成申雜以鐵鐵澁而多不就工人苦之後卒無成國朝錢文皆用元寳而冠以年號及改號寳元文當曰寳元元寳詔學士議因請改曰豐濟元寳仁宗特命以皇宋通寳為文慶厯以後復冠以年號時軍興陜西移用不足始用知商州皮仲容議采洛南縣紅崖山虢州青水冶青銅置阜民朱陽二監以鑄錢既而陜西都轉運使張奎知永興軍范雍請鑄大銅錢與小錢兼行大錢一當小錢十奎等又請因晉州積鐵鑄小錢及奎徙河東又鑄大鐵錢於晉澤二州亦以一當十以助關中軍費未幾三司奏罷河東鑄大鐵錢而陜西復采儀州竹尖嶺黃銅置博濟監鑄大錢朝廷因勅江南鑄大銅錢而江池饒儀虢州又鑄小鐵錢悉輦致關中數州錢雜行大約小銅錢三可鑄當十大銅錢一以故民間盗鑄者衆錢文大亂物價翔踴公私患之於是奎復奏晉澤石三州及威勝軍日鑄小鐵錢獨留用河東而河東鐵錢既行盗鑄者獲利十六錢輕貨重其患如陜西言者皆以為不便知并州鄭戩請河東鐵錢以二當銅錢一行一年又以三當一或以五當一罷官鑪日鑄且行舊錢知澤州李昭遘亦言河東民燒石炭家有槖冶之具盗鑄者莫可詰而北虜亦能鑄鐵錢以易並邊銅錢而去所害尤大朝廷嘗遣魚周詢歐陽修分察兩路錢利害至慶歴末遂命學士張方平宋祁御史中丞楊察與三司雜議時葉清臣復為三司使與方平先上陜西錢議曰關中用大錢本以縣官取利大多致姦人盗鑄其用日輕比年以來皆虛高物估始增直於下終取償於上縣官雖有折當之虛名乃罹虧損之實害救弊不先自損則法未易行請以江南儀商等州大銅錢一當小銅錢三又言姦人所以不鑄小鐵錢者以鑄大銅錢得利厚而官不能必禁若鑄大銅錢無利又將鑄小鐵錢以亂法請以小鐵錢三當銅錢一既而又請河東小鐵錢如陜西亦以三當一且罷官所置鑪朝廷皆施用其言自是姦人稍無利猶未能絶濫錢其後詔商州罷鑄青黃銅錢又令陜西大銅錢大鐵錢皆以一當二盗鑄乃止然令數變兵民耗於資用類多咨怨久之始定神宗熙寧四年陜西轉運使皮公弼言頃歲西邊用兵始鑄當十錢後兵罷多盗鑄者乃以當三又減作當二行之至今銅費相當盗鑄衰息請以舊銅鉛盡鑄當二錢從之其後折二錢遂行天下慶歴中陜西河東皆用鐵錢後小鐵錢獨行於河東而陜西許用銅錢及大鐵錢以一折二然小鐵錢凡四十萬緡積在同華二州熈寧詔賜河東以鐵償之永興路安撫吳中復請以錢四十買缺薄惡錢一斤以所買惡錢悉改鑄大錢秦鳯轉運使熊本言今雖以錢四十得偽錢一斤及銅錢千易當二錢千其實鐵錢一斤才當斤鐵耳千錢為鐵六斤鑄為錢二千而以銅錢千易之官失多矣又錢多一年改鑄未得竟也且民賣千錢得二百五十折二大錢才易其半又禁其通行大錢則方災傷民所有錢四亡其三何以捄災判應天府張方平上言臣向者再總邦計見諸鑪歲課上下百萬緡天下歲入茶鹽酒税雜利僅五千萬緡公私流布日用而不息上自社稷百神之祀省御供奉官吏廪祿軍師乘馬征戍聘賜凡百用度斯焉取給出納大計備於此矣景德以前天下財利所入茶鹽酒稅歲課一千五百餘萬緡太宗以是料兵閱馬平河東討拓䟦歲有事於契丹真宗以是東封岱宗西祀汾脽南幸亳宋未嘗聞加賦於民而調度克集至仁宗朝重熙累盛生齒繁庶食貨滋殖慶歴以後財利之入乃至三倍於景徳之時而國計之費更稱不贍則是本末之源盈虚之數其踈闊不侔久矣陛下憫時事之積弊志在變而通之創立法制凡大措置事以十數要在經國利民崇德而廣業也其中率錢募役一法為天下害實深且舉應天府為例畿内七縣共主客六萬七千有餘戸夏秋米麥十五萬二千有零石絹四萬七百有零疋此乃田畆桑功之自出是謂正税外有沿納諸色名目雜錢十一萬三千有零貫已是因循弊法然雖有錢數實不納錢並係折納榖帛惟屋稅五千餘貫舊納本色見錢大體古今賦役之制自三代至於唐末五代未有輸納之法也今乃歲納役錢七萬五千三百有零貫文散青苗錢八萬三千六百餘貫累計息錢一萬六千六百有零貫此乃歲輸實錢三千餘貫又弛邊闗之禁開賣銅之法外則泄於四夷内則縱行銷毁鼓鑄有限壊散無節錢不可得榖帛益賤凡公私錢幣之發歛其則不逺百官羣吏三軍之俸給夏秋糴買榖帛坑冶場監本價此所以發之也屋廬正稅茶鹽酒稅之課此所以歛之者也民間貨布之豐寡視官錢所出之多少官錢出少民間已乏則是常賦之外錢將安出自王安石為政始罷銅禁姦民日銷錢為器邊闗海舶不復譏錢之出國用日耗又青苗助法皆徴錢民間錢荒故方平極言之八年皮公弼又請鑄鐵折二錢從之御史周尹言臣去冬奉使經由永興秦鳯路伏見盗鑄錢不少問其本末蓋是錢法用一當二鐵錢易得而民間盗鑄者費少利倍又訪聞得所在官中積聚約有數百萬餘貫民間收藏者猶不在其數緣上件錢貨起初元以一當十後來減為折三近歲又作折二已於國家重貨十損其八若更作一文行用即又損一分所以不當輙有奏請昨來朝廷差汪輔之徃逐路揀選鐵錢萬數不多今三司指揮更不行用仍行改鑄務監每一日鑄及三千貫即一年之内除節假旬假實有三百日課程約只得九十萬貫以來計三二年間未滿數百萬貫况日課未必及三千貫之數也若改鑄之法或只仍舊作折二錢即民間盗鑄定亦不可止絶臣欲望作折二鑄錢更不别行改鑄亦不須揀選起自今後只作一文行用則盗鑄者所獲之利不充所費自然無復冒禁作過歲省重辟而農商交易獲衆貨流通之利且約官中所有止就四百萬貫言之若以二為一即猶得二百萬貫之數致力簡省便可得用諸路鑄錢總二十六監每年鑄銅鐵錢五百四十九萬九千二百三十四貫内銅錢十七監鑄錢五百六萬貫鐵錢九監鑄錢八十八萬九千二百三十四貫銅錢逐監錢數阜財監兩京二十萬貫黎陽監衞州二十萬貫永興軍華州陜府錢監各鑄二十萬貫計六十萬貫垣曲監絳州二十六萬貫同安監舒州一十萬貫神泉監睦州一十萬貫富民監興國軍二萬貫熙寧監衡州二十萬貫寳泉監鄂州一十萬貫廣寧監江州三十四萬貫永豐監池州四十四萬五千貫永平監饒州六十一萬五千貫豐國監建州二十萬貫永通監韶州八十萬貫阜民監惠州七十萬貫鐵錢逐監錢數在城朱陽兩監虢州各十二萬五千貫阜民洛南兩監商州各十二萬五千貫威遠鎮通逺軍滔山鎮岷州兩監共二十五萬貫嘉州二萬五千貫邛州七萬三千二百三十四貫興州四萬一千貫銅錢一十三路行使開封府界京東路京西路河北路淮南路兩浙路福建路江南東路江南西路荆湖南路荆湖北路廣南東路廣南西路銅鐵錢兩路行使陜府西路河東路鐵錢四路行使成都府路梓州路利州路夔州路右元豐間畢仲衍所進中書備對言諸路銅鐵錢監與所鑄錢數目及行使地分詳明今錄於此蓋比國初至景徳中則銅錢增九監而所鑄增三百餘萬貫鐵錢增六監而所鑄增六十餘萬貫云哲宗元祐六年申錢幣闌出之禁立銅錢出界徒流編配首從之法言者謂自熙寧七年削除錢禁以此邊闗重車而出海舶飽載而回沿邊州軍錢出外界但每貫收税錢而已是中國貨寳與四夷共用之也戸部侍郎蘇轍北使還論事宜曰臣切見北界别無錢幣公私交易並使本朝銅錢沿邊禁錢條法雖極深重而利之所在勢無由止本朝每歲鑄錢以百萬計而所在常患錢少蓋散入四夷勢當爾也謹按河北河東陜西三路土皆產鐵見今陜西鑄折二鐡錢萬數極多與銅錢並行而民間輕賤鐵錢鐵錢十五僅能比銅錢十而官用鐵錢與銅錢等緣此解鹽鈔法久逺必敗河東雖有小鐵錢然數目極少河北一路則未嘗鼓鑄臣等嘗聞議者謂可於三路並鑄鐵錢而行使之地止於極邊諸州極邊見在銅錢並以鐵錢兌換般入近裏州郡如此則雖不禁錢出外界而其弊自止矣伏乞下戸部令遍問三路提轉安撫司詳講利害如無窒礙乞早賜施行惟河東路極邊數郡訪聞每歲秋成必假銅錢於北界人户收糴乞令相度若以紬絹優與折博有無不可此計若行為利不小徽宗崇寧二年二月庚午初令陜西鑄折十銅錢并夾錫錢左僕射蔡京奏據陜西轉運副使許天啓申送到新鑄銅錢鐵錢様已降指揮銅錢於歲終須管鑄三十萬貫鐵錢鑄二百萬貫自來鑄錢張官置吏招刺軍兵所費不少而軍兵之役最為辛苦官得至薄率三錢得一錢之利蓋是久失擘畫今陜西河中府等處民間私鑄最多召募私鑄人令赴官充鑄錢工匠廣為營屋許其一家之人在營居止不必限其出入官給以物料盡其一家人力鼓鑄計其工直率十分中支若干分數充其工價又可收私鑄人在官蓋昔人招天下亡命即山鑄錢之意欲令許天啓相度疾速准此施行仍與舊來軍工相兼鼓鑄今來所鑄銅錢除陜西四川河東係鐵錢地分更不得行使外諸路並准折十行用其錢唯令陜西鐵錢地分鑄造却於銅錢地分行使貴絶私鑄之患如有私鑄並以一文計小錢十科罪又陜西銅錢至重每一錢當鐵錢三或四今夾錫鑄造様製精好欲一錢當銅錢二支用令許天啓相度依此施行從之夾錫錢始於二年河東運判洪中孚言二敵以中國錢鐵為兵器若雜以鉛錫則脆不可用請改鑄夾錫當三當十鐵錢從之尚書省言崇寧監鑄御書當十錢每貫重一十四斤七兩用銅九斤七兩二錢鉛四斤一十二兩六錢錫一斤九兩二錢除火耗一斤五兩每錢重三錢四年尚書省言東南諸路盜鑄當十錢者多乃詔廣南福建路更不行使當十錢有者兌換於别路行使其本路别鑄小平錢以閩廣係出銅處故也又詔荆湖江浙當十錢並改作當五錢五年蔡京罷相監察御史沈畸言古者軍興錫賞不繼或以一當百或以一當千此權時之宜豈可行於太平無事之日自為當十之議召禍起姦㳺手之民一朝鼓鑄無故而有數倍之息何憚而不為雖日斬之其勢不可遏也六月詔當十錢惟京師陜西兩河許行諸路並罷令民於諸縣鎮寨送納給以小鈔自一百至十貫止令通用行使如川鈔引法張商英為相上言當十錢自唐以來為害甚明行之於今尤見窒礙蓋小平錢出門有限有禁故四方客旅物貨交易得錢者必入中求鹽鈔收買官告度牒而餘錢又流布在街市小民間故官司内外交相利養自當十錢行一夫負八十千小車載四百千錢既為輕齎之物則告牒難售鹽鈔非操虛錢而得實價則難行輕重之勢然也今欲權於内庫并密院諸司借支應干封樁金銀物帛并鹽鐵等下令以當十錢盗鑄為濫害法限半年更不行用令民間盡所有於所在州軍送納每十貫官支金銀物帛四貫文擇其偽鑄者送近便改鑄小平錢存其如様者俟納官足十貫作三貫文各撥還元借處然後京城作舊錢禁施行乃可議𣙜貨通商鈔法蔡絛國史補國朝鑄錢沿襲五代及南唐故事歲鑄之額日增至慶歴元豐間為最盛銅鐵錢歲無慮三百餘萬貫及元祐紹聖而廢弛崇寧初則已不及祖宗之數多矣魯公秉政思復舊額以銅少終不能得考夫古人之訓子母相權之說因作大錢以一當十至大觀上又為親書錢文焉蓋昔者鼓冶凡物料火工之費鑄一錢凡十得息者一二而贍官吏運銅鐵悉在外也茍稍加工則費一錢之用始能成一錢而當十錢者其重三錢加以鑄三錢之費則製作極精妙廼得大錢一是十得息四矣始亦通流又以其精緻人愛重之然利之所在故多有盗鑄如東南盗鑄其私錢既鍥薄且製作粗惡遂以猥多成弊大觀三年魯公既罷朝議改為當三當三則折閲倍焉雖縣官亦不能鑄矣而大錢遂廢初議改當三也宰執爭輦錢而市黃金在都金銀鋪未之知不兩月命下時傳以為訕笑交子天聖以來界以百二十五萬六千三百四十緡為額熙寧元年始立偽造罪賞如官印文書法二年以河東公私共苦運鐵錢勞費詔置潞州交子務明年漕司以其法行則礬鹽不受有害入中糧草之計奏罷之四年復行於陜西而罷永興軍鹽鈔務文彥博言其不便未幾竟罷其法五年交子二十二界將易而後界給用已多詔更造二十五界者百二十五萬以償二十三界之數交子之有兩界自此始九年以措置熙河財利孫逈言商人買販牟利於官且損鈔價於是罷陜西交子法紹聖元年成都路漕司言商人以交子通行於陜西而本路乏用請更印製詔一界率增造十五萬緡是歲通舊額書放百四十萬六千三百四十緡崇寧元年復行陜西交子大觀元年改四川交子為錢引自朝廷取湟廓西寧籍其法以助兵費較天聖一界逾二十倍而價愈損及更界年新交子一乃當舊者之四故更張之成都漕司奏交子務已改為錢引務欲以四十三界引凖書放數仍用舊印行之使人不疑擾自後並更為錢引從之又詔陜西河東數路引直五千至七千而成都纔直二三百豪右規利害法轉運司覺捕扇惑之人凖法以行民間貿易十千以上令錢與引半用言者謂錢引雜以銅鐵錢難較其直增損詔令以銅鐵錢隨所用分數比計作銅錢聞奏知威州張特奏錢引元價一貫今每道止直一百文蓋必官司收受無難自然民心不疑便可遞相轉易通流增長價例乞先自上下請給不支見錢並支錢引或量支見錢一二分任取便行使公私不得抑勒仍嚴禁止害法不行之人從之大凡舊歲造一界備本錢三十六萬緡新舊相因大觀中不蓄本錢而增造無藝至引一緡當錢十數錢引崇寧間行於京東西淮南京師諸路惟福建江浙湖廣不行趙挺之以為福建蔡京之鄉里也故免焉高宗紹興三年劉大中宣諭江南歸言泉司官吏之費歲十三萬緡請省官屬從之宋朝鼓鑄饒池江州建寧府四監歲鑄銅錢百三十四萬緡充上供饒州永平監四十六萬五千江州廣寧監二十四萬池州永豐監三十四萬五千建寧豐國監二十四萬四百衡舒嚴鄂韶梧州六監歲鑄百五十六萬緡充逐路支用衡州咸寧監二十萬舒州同安監十萬嚴州神泉監十五萬鄂州寳泉監十萬韶州永通監八十三萬梧州元豐監十八萬建炎兵革州縣困敝鼔鑄皆廢紹興初并廣寧監於䖍州并永豐監於饒州後來只在饒州置司贛州只係巡歴歲鑄纔及八萬緡以銅錢鉛錫之入不及於舊而官吏廪稍工作之費視前日自若也每鑄錢一千率用本錢二千四百文時范汝為作亂權罷建州鼓鑄二年復鑄十二萬緡泉司應副銅錫六十五萬餘斤二十四年罷鑄錢司歸之漕司二十八年上命御府銅噐千五百事付泉司大索民間銅器告者有賞其后得銅二百餘萬斤寺觀鐘磬鐃鈸既籍定投務外不得添鑄二十九年立為限制命官之家存留見錢二萬貫民庶半之餘限二年聽變轉金銀算請茶鹽香礬鈔引之類越數隱寄許人告按此即唐元和間所行皆是以民間錢少而不能流通縣官費重而不能廣鑄故為此末策耳孝宗隆興元年詔鑄當二小平錢如紹興之初自乾淳迄嘉泰開禧皆如之六年并鑄錢司歸發運司七年復置八年於饒贛各置提㸃官自大中祥符及崇寕以來錢皆精好高宗嘗諭近臣欲盡如舊制不較工料之費乾道八年孝宗以新鑄錢淆雜詔提㸃鑄錢及永平監官左藏西庫監官戸工部長貳議罰有差淳熙二年併贛州歸饒州而加都大焉祖宗内帑歲收新錢一百五萬江池饒建四監而每年退却六十萬三年一郊又支一百萬赴三司是内帑每年纔得十一萬六千餘緡而左藏得九十三萬三千餘緡也今歲額止十五萬而𨽻封樁者半内藏者半左藏咸無焉又自國家置市舶於浙於閩於廣舶商徃來錢寳所由以泄是以自臨安出門有禁下江有禁入海有禁凡舶船之方發也官必㸃視及遣巡捕官監送放洋然商人先期以小舟載錢離岸及官司之㸃巡捕之送一為虚文於是許火内人告以其物貨之半充賞又或以裝發則舶回日亦許告首盡以回貨充賞沿海州軍以銅錢入海舶者有罰淳熙五年五月詔蕃商徃來夾𢃄銅錢五百文隨離岸五里外依出界法臣僚言泉廣二舶司及西南二泉司遣舟囘易悉載金錢四司既自犯法郡縣巡尉其能誰何至淮楚屯兵月費五十萬見錢居其半南北貿易緡錢之入敵境者不知其幾於是沿邊皆用鐵錢矣所以淮南舊鑄銅錢乾道初詔兩淮京西悉用鐵錢荆門𨽻湖北以地接襄峴亦用鐵錢而淮西鼓鑄鐵錢未辦議者欲取之蜀事既行參政洪适以為不便上然之但即蜀中取十五萬緡行之廬和而已六年詔司農丞許子中徃淮西措置鐵錢子中言舒蘄黃州皆產鐵合置監舒州置同安監蘄州置蘄春監黃州置齊安監且鑄折二錢詔戸部支湊二十萬貫為本又詔發運司通管四監江州興國軍臨江軍撫州子中所管三監舒蘄黃每歲各認三十萬貫其大小鐵錢令兩淮通行七年舒蘄守臣皆以鑄錢增羡遷官然淮民為之大擾光宗紹熙二年詔帥漕司賑糶收破缺鐵錢及私錢明年又降度牒二百道换私鐵錢臣僚言江北公行以銅錢一准鐵錢四禁之當時銅錢之在江北者自乾道以來悉以鐵錢收换或以會子一貫换錢一貫省其銅錢解赴行在及建康鎮江沿江州軍闗津去處委官檢察又於江之南北各置官庫以銅鐵錢交换凡沿江私渡及極邊徑路嚴禁透漏紹熙十五年置利州紹熙監鑄錢十萬緡以救錢引地多山林宜炭鐵仍增鑄十五萬緡未行卒減鑄十萬二十二年嘉州守臣王知逺乞復嘉之豐逺邛之惠民二監鑄小錢寧宗嘉定元年即利州鑄當五大錢三年制司欲盡收舊引又於紹興惠民二監歲鑄共三十萬貫其料並同當三錢時議者恐其利厚而盗鑄滋多而總所方患引直日低雖盗鑄不禁葢欲錢輕則引重也會子高宗紹興元年因婺州之屯駐有司請樁辦合用錢而舟楫不通錢重難致乃詔戸部造見錢闗子付婺州召客人入中執闗赴𣙜貨務請錢有願得茶鹽香礬鈔引者聽於是州縣以闗子充糴本未免抑配而𣙜貨務又止以日納三分之一償之人皆嗟怨六年二月詔置行在交子務臣僚言朝廷措置見錢闗子有司浸失本意改為交子官無本錢民何以信極論其不可於是罷交子務令𣙜貨務樁垜見錢印造闗子二十九年印結公據闗子赴三路總領所淮西湖廣各闗子八十萬緡淮東公據四十萬緡自十千至百千凡五等内闗子作三年行使公據二年許錢銀中半入納三十年戸部侍郎錢端禮被㫖造會子樁見錢於城内外流轉其合發官錢並許兌會子赴左藏庫送納明年二月詔會子務𨽻都茶場正以客旅算請茶鹽香礬等歲以一千萬貫可以隂助稱提不獨恃見錢以為本又非全仰會子以佐國用也三十二年十二月詔定偽造會子之罰犯人處斬賞錢一千貫如不願支賞與補進義校尉若徒中及窩藏之家能自告首特與免罪亦支上件賞錢或願補前名目者聽日造會子監官分押每一萬道解赴戸部覆印當時會紙取於徽池州續造於成都府又造於臨安府會子初止行於兩浙後又詔通行於淮浙湖北京西除亭戸鹽本並用見錢外其不通水路去處上供等錢許盡用會子解發其沿流州軍錢會中半民間典賣田宅牛畜車船等如之或全用會子者聽孝宗隆興元年詔官印會子以隆興尚書戸部官印會子之印為文更造五百文會又造二百三百文會五年置江州會子務乾道二年因左司諫陳祐言會子之敝出内庫及南庫銀一百萬兩收之三年正月度支郎中唐瑑言自紹興三十一年至乾道二年七月共印過會子二千八百餘萬道止乾道二年十一月十四日以前共支取過一千五百六十餘萬道除在官司樁管循環外其在民間者有九百八十萬道自十一月十四日以後措置收換截至三年正月六日共繳進過一百一十八萬九千餘貫尚有八百餘萬貫未收大約每月收换不過六七十萬縁諸路綱運依近指揮並要十分見錢州縣不許民戸輸納會子是致在外會子徃徃商賈低價收買輻輳行在所以六務支取擁并詔給降度牒及諸州助教帖各五千道付𣙜貨務召人全以會子入納候出賣將盡申取朝廷節續給降務欲盡收會子也六月戸部曾懐言會子除收還外有四百九十萬貫在民間乞存留行使十二月以民間會子有破損者别造五百萬换給他日又詔損會貫百錢數可照者並作上供錢解發巨室以低價收者坐罪四年以取到舊會毁抹截鑿付會子局重造三年立為一界界以一千萬貫為額逐界造新换舊差戸部尚書曾懐同共措置鑄提領措置會子庫印依左藏庫推賞其將帯經過務場不得收稅蔣芾奏曰此月用會子收回金銀若會子稍多又出錢銀收之陳俊卿奏曰斂散抑揚權之在上可以無敝其年四月一日興工印造至歲終可造一千萬貫措置收换舊會每道收縻費錢二十足零百半之應舊會破損但貫百字存印文可騐者即與兌换内有假偽將辯驗人吏送所司其監官取朝廷指揮每驗出一貫偽會追究元收兌會子人錢三貫與辯驗人如官吏用心訖事無假偽具姓名推賞自十二月一日始置局收换至明年三月十日終盡絶更不行用淳熙三年詔第三界四界各展限三年令都茶場會子庫將第四界銅板接續印造會子二百萬赴南庫樁管當時户部歲入一千二百萬其半為會子而南庫以金銀換收者四百萬流行於外者纔二百萬耳范成大􅄃轡錄載虜本無錢惟煬王亮嘗一鑄正隆錢絶不多餘悉用中國舊錢又不欲留錢於河南效中國楮幣於汴京置局造官會謂之交鈔擬見錢行使而隂收銅錢悉運而北過河即用錢不用鈔鈔文略曰南京交鈔所凖户部符尚書省批降檢㑹昨奏南京置局印造一貫至三貫例交鈔許人納錢給鈔南路官私作見錢流轉若赴庫支取即時給付每貫輸工墨錢一十五文候七年納換别給以七十為陌偽造者斬賞錢三百千前後有户部管當令史官交鈔庫使副書押四圍畫龍鶴有飾右石湖乾道間充泛使入金國道汴京有交鈔所載其所見如此其時中國亦以幣權錢然東南之地有㑹子又有川引淮交湖㑹而鼔鑄之所亦復不一所以常困錢幣多而賤秤提無䇿而彼則惟以交鈔行之河南以中國舊錢行之河北似反簡易也元祐間潁濱使遼囬奏事亦言北界别無錢幣惟用中國錢云光宗紹熙元年詔第七八界會子各展三年臣僚言會子界三年為限今展至再則為九年矣何以示信詔造第十界立定年限寧宗慶元元年詔㑹子界以三千萬為額額外更増許執奏不行嘉定二年臣僚言三界會子數目滋多稱提無策詔封樁庫撥金銀度牒官誥綾紙乳香湊成二十萬添貼臨安府官局收換舊㑹品搭入納以舊㑹之二換新會之一而稱提新㑹最嚴未免告訐肆起根連株逮而苛政出估籍徒流鄉井相望而重刑用假稱提而科敷抑配酷吏得志泉州守臣宋鈞南劍州守臣趙崇亢陳宓皆以稱提失職鈞降一官崇亢陳宓各展二年磨勘自是歲月扶持民不以信特以畏耳然糴本以楮鹽本以楮百官之俸給以楮軍士支犒以楮州縣支吾無一而非楮銅錢以罕見為寶前日樁積之本皆絶口而不言矣是宜物價翔騰楮價損折民生憔悴戰士常有不飽之憂州縣小吏無以飬廉為歎皆楮之弊也楮弊而錢亦弊昔也以錢重而製楮楮實為便今也錢乏而製楮楮實為病况偽造日滋欲楮之不弊不可得也且國家建隆之初賦入尚少東征西伐兵饋不絶於道未嘗藉楮以開國也靖康以來外攘夷狄内立朝廷左支右吾日不遑暇未嘗藉楮以中興也至於紹興末年權以濟用至於孝宗謀慮及此未嘗不曲盡其心焉當時内有三宫之奉外有歲幣之費而造楮惟恐其多收換惟恐其不盡而或無以示民信也至於光寧以來造愈多而弊愈甚其所幸者恭儉節用無土木之妖動静有常無錫予之泛所以楮雖弊而有以飬其原也川引髙宗紹興三年六月詔四川自祖宗以來先計引數封樁本錢常停重錢以權輕券故法不弊中間印給泛料數多即將本錢侵用故引法日壊况自張浚開宣府趙開為總餉以供糴本以給軍需增引日多莫能禁止七年二月川陜副帥吳玠請置銀會於河池五月中書省言引數已多慮害成法詔止之蓋祖宗時蜀交書放兩界每界止一百二十餘萬令三界通行為三千七百八十餘萬以至於紹興末年積至四千一百四十七萬餘貫所有鐵錢僅及七十萬貫又以鹽酒等隂為稱提是以餉臣王之望亦請添印錢引以救目前不得不為朝廷久遠之慮當時詔添印三百萬委之望約度給用即止後之望只添印一百萬孝宗隆興二年餉臣趙沂依前指揮添印二百萬淳熙五年閏六月臣僚言蜀中錢引已增至四千五百餘萬增而不已必至於不可行乞立定額毋得增添從之光宗紹熙二年五月詔川引展界行使寧宗嘉泰末兩界書放凡五千三百餘萬緡通三界書放益多矣開禧末年餉臣陳咸以歲用不足嘗為小㑹卒不能行嘉定初每緡止直鐵錢四百以下咸乃出金銀度牒一千三百萬收回半界期以歲終不用然四川諸州去總所遠者千數百里期限已逼受給之際吏復為姦於是商賈不行民皆嗟怨一引之直僅售百錢制司乃揭榜除收兑一千三百萬引外三界依舊通行又檄總所取金銀就成都置場收兑民心稍定自後引直五百鐵錢有竒若闗外用銅錢引直百七十錢而已嘉定三年春制總司收兑九十一界二千九百餘萬緡其千二百萬緡以茶馬司羡餘錢及制司空名官告總所樁管金銀度牒對鑿餘以九十三界錢引收兑又造九十四界錢引五百餘萬緡以收前宣撫程松所増之數應民間輸納者每引百帖八千其金銀品搭率用新引七分金銀三分其金銀品色官稱不無少虧每舊引百帖納二十引蓋自元年三年兩收舊引而引直遂復如故昔高宗因論四川交子最善沈該稱提之說謂官中嘗有錢百萬緡如交子價減即官用錢自買方得無弊淮交紹興末年會子行未有兩淮湖廣之分乾道元年戸部侍郎林安宅言督府妄費印給㑹子太多而本錢不足遂致有弊乞别給會子二十萬背印付淮南州軍行使不得越過他路二年六月詔别印二百三百五百一貫交子三百萬止於兩淮州縣行使其日前舊會聽對换應入納買賣並以交子見錢中半如徃來不便詔給交子會子各二十萬付鎮江建康府𣙜貨務使淮人之過江江南人之渡淮者皆得對换循環使用然自紹興末年以前銅錢禁用於淮而易以鐵錢會子既用於淮而易以交子於是商賈不行淮民以困右司諫陳良祐言莫若如舊從民便鐵錢已散銅錢已收且令兼行以鐵錢二當銅錢一交子可以盡罷無疑也上曰朕亦知其不可行只為武鋒一軍在彼良祐又奏交子不便詔兩淮郡守漕臣各條其利害乃謂所降交子數多而銅錢并會子又不過江是致民旅未便詔銅錢并㑹子依舊過江行使其民間交子許作見錢納官應在官交子日下盡數赴行在左藏庫交納後又詔銅錢并㑹子依舊過江行使又詔江南州郡民間行使淮交者從便至嘉定十五年増印及三百萬其數日増價亦日損稱提無其術也湖會孝宗隆興元年湖廣餉臣王珏言襄陽郢復等處大軍支請以錢銀品搭令措置於大軍庫堆垜見錢印造五百并一貫直便㑹子發赴軍前當見錢流轉於京西湖北路行使乞鑄勘㑹子覆印㑹子印及下江西湖南漕司根刷舉人落卷及已毁抹茶引故紙應副抄造㑹子從之及印造之權既專則印造之數日増且總所所給止行本路而京南水陸要衝商賈必由之地流通不便乃詔總所以印造銅板繳申尚書省又撥茶引及行在㑹子收換焚毁而總領所謂江陵鄂州商旅輻輳之地每年客販官鹽動以數百萬緡自來難得回貨又湖北㑹子不許出界多將㑹子就買茶引回徃建康鎭江等處興販今既有行在㑹子可以通行誰肯就買茶引緣每年帖降引數多若賣不行軍食必闕朝廷遂寢其議乃再印給湖北㑹子二百萬貫收換舊㑹至嘉定十四年詔造湖廣㑹子三十萬對換破損㑹自後因仍行之按錢幣之權當出於上則造錢幣之司當歸於一漢時常令民自鑄錢及武帝則專令上林三官鑄之而天下非三官錢不得行郡國前所鑄錢皆廢銷輸其銅三官然錢以銅鐵鉛錫而成而銅鐵鉛錫搬運重難是以歴代多即坑冶附近之所置監鑄錢亦以錢之直日輕其用日廣不容不多置監冶鑄以供用中興以來始轉而為楮幣夫錢重而直少則多置監以鑄之可也楮輕而直多則就行都印造足矣今既有行在㑹子又有川引淮引湖㑹各自印造而其末也收換不行稱提無䇿何哉蓋置㑹子之初意本非即以㑹為錢蓋以茶鹽鈔引之屬視之而暫以權錢耳然鈔引則所直者重承平時解鹽塲四貫八百售一鈔請鹽二百斤而㑹子則止於一貫下至三百二百鈔引只令商人憑以取茶鹽香貨故必須分路如顆鹽鈔只可行於陜西末鹽鈔只可行於江淮之𩔖㑹子則公私買賣支給無往而不用且自一貫造至二百則是眀以之代見錢矣又况以尺楮而代數斤之銅賫輕用重千里之逺數萬之緡一夫之力剋日可到則何必川自川淮自淮湖自湖而使後來或廢或用號令反覆民聽疑惑乎蓋兩淮荆湖所造朝廷初意欲暫用而即廢而不知流落民間便同見鏹所以後來收換生受只得再造遂愈多而愈賤亦是立法之初講之不詳故也東莱吕氏曰泉布之設乃是阜通財貨之物權財貨之所由生者考之於古如管子論禹湯之幣禹以歴山之金湯以荘山之金皆緣凶年故作幣救民之饑考之周官司市凡國有凶荒則市無征而作布又考單穆公諫景王之説古者天災流行於是量資幣權輕重作幣以救民以管子與周禮單穆公之論觀夏商之時所以作錢幣權一時之宜移民通粟者為救荒而設本非先王財貨之本處論國用三年耕必有一年之食以三十年通制則有九年之食以為財貨之盛三登曰太平王道之盛也以此知古人論財貨但論九年之積初未嘗論所藏者數萬千緡何故所謂農桑衣食財貨之本錢布流通不過權一時之宜而已先有所謂糓粟泉布之權方有所施若是無本雖積鏹至多亦何補盈虛之數所以三代以前論財賦者皆以穀粟為本所謂泉布不過權輕重取之於民所以九貢九賦用錢幣為賦甚少所謂俸禄亦是頒田制禄君卿大夫不過以采地為多寡亦未嘗以錢布為禄所以三代之人多地著不為末作葢緣錢之用少如制禄既以田不以錢制賦又自以糓粟布帛其間用錢甚少所以錢之權輕惟凶年饑荒所以作幣先儒謂金銅無凶年權時作此以通有無以均多少而已所以三代之前論布泉者甚少到得漢初有天下尚自有古意王公至佐吏以班職之髙下所謂萬石千石百石亦是以糓粟制禄不過口算每人所納百餘年尚未以錢布為重至武帝有事四夷是時國用不足立告緡之法以括責天下自此古意漸失錢幣方重大抵三代以前惟其以糓粟為本以泉布為權常不使權勝本所以當時地利既盡浮游末作之徒少後世此制壞以匹夫之家藏鏹千萬與公上爭衡亦是古意浸失故後世貢禹之徒欲全廢此惟以糓帛為本此又却是見害懲艾矯枉過直之論大抵天下之事所謂經權本末常相為用權不可勝經末不可勝本若徒見一時游手末作之弊欲盡廢之如此則得其一不知其二後世如魏文帝當時天下盡不用錢貢禹之論略已施行遂有濕榖薄絹之弊反以天下有用之物為無用其意本要重榖帛反以輕榖帛天下惟得中適平論最難方其重之太過一切盡用及其廢之太過一切盡不用二者皆不得中然三代以前更不得而考自漢至隋其泉布更易雖不可知要知五銖之錢最為得中自漢至隋屢更屢易惟五銖之法終不可易自唐至五代惟武德時初鑄開元錢最得其平自唐至五代惟開元之法終不可易論者葢無不以此為當以此知數千載前有五銖後有開元最可用何故論太重有所謂直百當千之錢論太輕則有所謂榆荚三銖之錢然而皆不得中惟五銖開元銖兩之多寡鼓鑄之精宻相望不可易本朝初用開元為法其錢皆可以久行自太宗以張齊賢為江南轉運務欲多鑄錢自此變開元錢法錢雖多其精宻俱不及前代本朝張齊賢未變之前所謂太平錢尚自可見齊賢既變法之後錢雖多然甚薄惡不可用當時務要得多不思大體國家之所以設錢以權輕重本末未嘗取利論財計不精者但以鑄錢所入多為利殊不知權不歸公上鑄錢雖多利之小者權歸公上利之大者南齊孔顗論鑄錢不可以惜銅愛工若不惜銅則鑄錢無利若不得利則私鑄不敢起私鑄不敢起則斂散歸公上鼓鑄權不下分此其利之大者徒徇小利錢便薄惡如此姦民務之皆可以為錢不出於公上利孔四散乃是以小利失大利南齊孔顗之言乃是不可易之論或者自緣錢薄惡後論者紛紛或是立法以禁惡錢或是以錢為國賦條目不一皆是不揣其本而齊其末若是上之人不惜銅愛工使姦民無利乃是國家之大利泉布之法總而論之如周如秦如漢五銖如唐開元其規或可以為式此是錢之正若一時之所鑄如劉備鑄大錢以􅁕軍市之財第五琦鑄乾元錢此是錢之權也如漢武帝以鹿皮為幣王莽以龜貝為幣此是錢之蠧也或見財貨之多欲得廢錢或見財貨之少欲得放鑄皆一時矯枉之論不可通行者也若是權一時之宜如㓂瑊之在蜀創置交子此一時舉偏救弊之政亦非錢布經久可行之制交子行之於蜀則可於他利害大叚不同何故蜀用鐵錢其大者以二十五斤為一千其中者以十三斤為一千行旅賫持不便故當時之劵會生於鐵錢不便緣輕重之推移不可以挟持交子之法出於民之所自為託之於官所以可行鐵錢不便交子即便今則銅錢稍輕行旅非不可挟持欲行楮幣銅錢却便楮劵不便昔者之便今日之不便議者欲以楮幣公行參之於蜀之法自可以相依而行要非經久之制今日之所以為楮劵又欲為鐵錢其原在於錢少或銷為銅器或邉鄙滲漏或藏於富室今則所論利害甚悉財利之用在於貿易孔顗之論宜不惜銅愛工不計多寡此最的當推本論之錢之為物饑不可食寒不可衣至於百工之事皆資以為生不可缺者若是地力既盡榖帛有餘山澤之藏咸得其利錢雖少不過錢重錢雖重彼此相權國家之利亦孔顗之論要當尋古義識經權然後可也水心葉氏曰錢之利害有數説古者因物權之以錢後世因錢權之以物錢幣之所起起於商賈通行四方交至逺近之制物不可以自行故以金錢行之然三代之世用錢至少自秦漢以後浸多至於今日非錢不行三代以前所以錢極少者當時民有常業一家之用自榖米布帛蔬菜魚肉皆因其力以自致計其待錢而具者無㡬止是商賈之貿遷與朝廷所以權天下之物然後頼錢幣之用如李悝平糴法計民一嵗用錢只一千以上是時已為多矣葢三代時尚不及此土地所宜人力所食非榖粟則布帛與夫民之所自致者皆無待於金錢而民安本著業金錢亦為無用故用之至少所用之數以嵗計之亦是臨時立法制其多少後世不然百物皆由錢起故因錢制物布帛則有丈尺之數榖粟有斛斗之數其他凡世間飲食資生之具皆從錢起銖兩多少貴賤輕重皆由錢而制上自朝廷之運用下自民間輸貢州縣委藏商賈貿易皆主於錢故後世用錢百倍於前然而三代不得不少後世不得不多何者三代各斷其國以自治一國之物自足以供一國之用非是天下通行不可闕之物亦不至費心力以營之上又明立禁戒不要使天下窮力逺須故書曰惟土物愛厥心臧老子曰至治之極民甘其食美其服樂其俗隣國相望雞犬之聲相聞民至老死不相往来其無所用錢如此安得不少後世天下既為一國雖有州縣異名而無秦越不相知之患臂指如一天下之民安得不交通於四方則商賈往来南北互致又多於前世金錢安得不多古者以玉為服飾以龜為寳以金銀為幣錢只處其一朝廷大用度大賜予則是金盡用黄金既以玉為服飾玉是質重之物以之為飾過於金珠逺矣漢世猶用金銀為幣宣元以後金幣始盡王莽欲復古制分三等幣後不復行至東漢以後黄金最少又緣佛老之教盛行費為土木之飾故金銀不復為幣反皆以為器用服玩之具玉自此亦益少服飾却用金銀故幣始專用錢所以後世錢多此數者皆錢之所由多用錢既多制度不一輕重大小厚薄皆随時變易至唐以開元錢為凖始得輕重之中古錢極輕今三代錢已無如漢五銖半兩其在者尤輕薄不可用葢古者以錢為下幣為其輕易後世以錢為重幣則五銖半兩之𩔖宜不可用然大重則不可行所以開元為輕重之中唐鑄此錢漫衍天下至今猶多有之然唐世無錢尤甚宋朝則無時不鼓鑄以開元錢為凖如太平天禧錢又過於開元仁宗以前如太平錢最好自熙寧以後不甚佳國初惟要錢好不計工費後世惟欲其富往往減工縮費所以錢稍惡若乾道紹興錢又不及熙豐逺矣然而唐世所以惡錢多正以朝廷不禁民之自鑄要之利權當歸於上豈可與民共之如劉秩之論與賈誼相似當漢文帝欲以恭儉致昇平謂天下無用錢處故不復收其權柄使吴鄧錢得布天下吴王用之卒亂東南唐以開元天寳以後天下苦於用兵朝廷急於興利一向務多錢濟急如茶酒鹽鐵等末利既興故自肅代以来漸漸以末利征天下反求錢於民間上下相征則雖私家用度亦非錢不行天下之物隐沒不見而通行於世者惟錢耳夫古今之變世數之易物之輕重貨之貴賤其間迭往迭来不可逆知然錢貨至神之物無留藏積蓄之道惟通融流轉方見其功用今世富人既務藏錢而朝廷亦盡征天下錢入於王府已入者不使之出乃立楮於外以待之不知錢以通行天下為利錢雖積之甚多與他物何異人不究其本原但以錢為少只當用楮楮行而錢益少故不惟物不可得而見而錢亦將不可得而見然自古今之弊相續至於今日事極則變物變則反必須更有作新之道但未知其法當如何變得其決不可易者廢交子然後可使所藏之錢復出若夫富强之道在於物多物多則賤賤則錢貴錢貴然後輕重可權交易可通今世錢至賤錢賤由乎物少其變通之道非聖人不能也文獻通考卷九
