季大享及感生帝皇地祇神州地祇凡七祭並以四祖迭配太祖親郊者並以宣祖配太宗即位其七祭但以宣祖太祖更配方丘在宮城北十四里常以夏至祭皇地祇别為壇於北郊以孟冬祭神州地祇眞宗景徳三年四月太常寺言神州壇壝中有阬塹及車馬之迹又兩壝歩數迫隘不合禮文望令改擇壇位及依令式封標諸壇外壝禁人耕墾樵牧奏可即徙壇於方丘之西焉四年正月以朝陵遣工部尚書王化基詣汾隂后土祠致祭用大祀禮汾隂后土漢武帝元鼎中所立脽上祠宣帝元帝成帝後漢光武唐元宗皆親祭是後曠其禮開寶九年徙廟稍南是年始遣使致祭其後又詔自今凡告天地仍詣祠告祭命禮官考定衣冠制度令有司修製遣使奉上大中祥符三年河中府言進士薛南率耆老僧道千二百九十人列状求詣闕請親祠詔不允仍止其來七月復上表固請羣臣亦詣東上閤門陳請八月詔以来年春有事於汾隂后土有司定制玊冊金玊匱度廟廷擇地為埳中置石匱匱方五尺厚二尺中容玊匱刻金繩道三濶一寸深五分繫繩處刻深四寸方三寸五分容天下同文寶俟祀畢太尉奉玊匱置其中將作監領徒舉石覆之石厚一尺繫繩填泥印寳悉如社首封䃭之制皇帝省視訖加蓋其上封固為小壇廣厚五尺從之九月經度制置使詣脽上築壇如方丘之制廟北古䨇柏旁有堆阜即就其地焉十月禮儀使王欽若言凖儀注祀畢太尉封玊冊於廟庭石匱百官班於庭中皇帝謁廟禮畢至石匱南北向省視四年正月丁酉備鑾駕出京師二月丙辰至奉祇宮戊午致齋召近臣登延慶亭南望仙掌北瞰龍門自宮至脽丘列植嘉樹六師環宿行闕旌旗帟幕照曜郊次眺覽乆之己未遣入内都知鄧永遷詣祠上衣服供具庚申羣臣宿祠所辛酉具法駕詣脽壇夾路設燎火其光如晝盤道紆屈周以黄麾仗至壇次服袞冕登壇祀后土地祇備三獻奉天書於神座之左以太祖太宗並配悉如封禪之禮先是脽上多風及行禮頓止黄氣繞壇月重輪衆星不見惟大角光明少頃改服通天冠絳紗袍乘輦詣廟設登歌奠獻省封石匱遣官分奠諸神登鄈邱亭望河汾還行宮鼓吹振作紫氣四塞觀者溢路民有扶老擕幼不逺千里而至者壬戌御朝覲壇肆赦是行塗中屢有甘澍之應皆夕降晨霽從官衞兵無霑服之患又農事方興耕民懽忭相屬三月駐蹕西京四年詔脽上后土廟宜上額為太寧正殿慶歴時夏至祭皇地祇用犢羊豕各一其後禮官馮浩言皇地祇壇角再成面廣四丈九尺東西四丈六尺上等高四尺五寸下等髙五尺方五丈三尺陛廣三尺五寸大抵卑陋不應禮典禮院請如唐郊祀録増廣因詳制度之未合禮者五年諸壇皆改嘉祐配位七十一加羊豕各五諫官司馬光奏告大行諡號於圜丘而皇地祇止於望告下同腏食失尊卑之序下禮院定非次祭告皇地祇請差官就壇行事景祐二年詔有司孟冬祭神州地祇遣内臣降香春秋朝陵諸祠祈觧亦然慶歴用羊豕各五正配山罍簠簋二皇祐定壇高三尺廣四十八歩四出陛神宗元豐元年詳定郊廟奉祀禮文樞密院直學士陳襄上言合祀天地於圜丘為非禮請依古禮祭地於方澤詔禮院集議詳見郊祀門至六年尚書禮部言太常寺修定郊祀之歲夏至皇帝親祭皇地祇於北郊方丘及上公攝事儀詔親祀北郊盡如南郊儀其上公攝事惟改樂舞及不備官其俎豆樂架圭幣之數史官奉祝冊並如親祀哲宗元祐七年帝初郊合祭地祇於圜丘集議見郊祀門紹聖元年右正言張商英御史中丞黄履等言宜用先帝北郊儀注以時躬行罷去合祭之禮三省言合祭既非禮典但盛夏祭地必難親行詔令兩省臺諫禮官同議可以親祀北郊然後可罷合祭之禮曽布言天地宗廟四時皆有祭未聞盛夏可以廢祭祀也若謂議可以親祠北郊然後可議罷合祭則先帝罷合祭為不當矣四月翰林學士錢勰刑部侍郎范純禮議先帝親祠之詔所宜遵守但當斟酌時宜省去繁文末節以行親祠之禮若謂盛夏難於出郊則姑從權變禮以循祖宗故事吏部侍郎韓宗師兵部侍郎王古殿中侍御史井亮采監察御史常安民又以南郊合祭當循祖宗舊制權戸部侍郎李琮以乘輿出郊暑雨不常合祭權宜亦難輕罷太常博士傅楫以祀天地不可以暑暍廢大禮給事中虞策權給事中劉定中書舍人盛陶太常少卿黄裳請用十月親祭皇地祇於北郊吏部侍郎豐稷請於夏至前三日皇帝致齋於文德殿遣官奏告太廟至日五鼓詣北郊齋殿質明行事禮畢還宮不甚炎溽若遇隂雨大慶殿可陳望祭之禮起居舍人葉祖洽謂北郊之禮主於祀地而太廟景靈宮自可差官攝事皇帝致齋於文德殿前事一日夙興至郊外齊宮次日五鼓行事質明禮畢還内則是乘輿宿外不􅂈一日無憚暑之虞於理為可戸部尚書蔡京禮部尚書林希翰林學士蔡卞御史中丞黄履工部侍郎吳安持祕書少監鼂端彥侍御史翟思殿中侍御史郭知章正言劉拯監察御史黄慶基董敦逸等請罷合祭天地自後間因大禮歲以夏至之日親祠北郊其親祠北郊之歲更不親祠南郊明年乃詔罷合祭自今間因大禮之歲以夏至之日躬祭地祇於北郊應縁祀事儀物及壇壝道路帷宮等宜令有司參酌詳具以聞蓋用蔡京等議然北郊親祠終帝世未克舉云權禮部侍郎黄裳等言南郊用大駕鹵簿儀仗二萬六十一人明堂祫享用法駕計一萬八千八十八人今親祀北郊備物則當用大駕如以盛暑之月稍減煩文即依明堂禮用法駕鹵簿詔依南郊用大駕鹵簿又言南郊朝祭服皆以羅綾為之今北郊盛暑之月難用祫服謹按月令孟夏初衣暑服孟冬始裘欲依袞冕制度改用單衣從之元符元年帝幸瑞聖園觀新成北郊齋宮故事郊宮悉設以幕帟其費不貲上命繕營不日而成曰三歲一郊次舍之費縑帛三十餘萬工又倍之易以屋室一勞永逸所省多矣徽宗崇寧元年禮部尚書黄裳言南郊壇十二龕壝中布列從享星位具載其名凡三百三十有八至於北郊第以嶽鎮海瀆山川林澤邱陵墳衍原隰之目别以四方寘於成壝而不列其名雖從享於大祇莫非山澤而何者来格今兹講行北郊大禮尚未論著是為闕典欲乞令太常寺丞陳暘考其名位取其可以從享者詳具以聞列於成壝從之二年禮部員外郎陳暘奏臣聞天一與地六合而生水於北其神元㝠地二與天七合而生火於南其神祝融天三與地八合而生木於東其神句芒地四與天九合而生金於西其神蓐收天五與地十合而生土於中其神后土蓋地乘隂氣播五行於四時當有帝以為之主必有神以為之佐也五行之帝既從享於南郊第一成則五行之神亦當列於北郊第一成矣上辛大雩帝及五時迎氣並以五人神配而不設五行之神是取小而遺大也神宗皇帝嘗詔地示之祭以五行之神從享以五人神配然尚列嶽鎮海瀆之間臣今欲陞之第一成又云地示之祭先儒之説有二或繫於崑崙或繫於神州皆有所經見惟爾雅曰西北之美者有崑崙之球琳琅玕焉河圖括象曰崑崙東南萬五千里曰神州是崑崙不􅂈域於西北神州不􅂈域於東南也神宗皇帝嘗詔禮官討論北郊祀典位崑崙於方丘第一成之西北位神州於第一成之東南而其上設地祇位焉崑崙神州之説雖出不經然古人有其舉之莫敢廢也特降於從享之列爾欲望明推神考詔㫖列崑崙神州於從享之位又言三代而上山川之神有望秩之祭故五嶽之秩視三公四瀆之秩視諸侯五嶽不視侯而視公猶未極乎推崇之禮聖朝始帝五嶽而王四瀆竊惟天莫尊於上帝而五方帝次之地莫尊於大示而五嶽帝次之神宗皇帝親祠上帝於南郊而五方帝列於第一成然則五嶽帝其可尚與四鎮海瀆而並列乎今欲陞之於第一成並從之政和三年詔自今每遇冬大禮後一歲夏至祭地於方澤其儀物儀衞應奉行事悉從簡省從祭臣僚與隨駕衞士量行支賜簡而易行無偏而不舉之失以稱朕意可令禮制局裁定以聞又詔夏至齋宮大内門曰廣禋東偏門曰東秩西偏門曰西平正東門曰􅍭光正西門曰咸亨正北門曰至順南門裏大殿門曰厚徳東曰左景華西曰右景華正殿曰厚徳便殿曰受福曰坤珍曰道光亭曰承休四年五月丙戌夏至日帝始親祭地於方澤以太祖皇帝配禮成帝親製二表遣觀文殿學士鄧洵武告於永泰陵詔以其日為景貺節故事大禮御札皆前期六月乃降六年冬祀夏祭始同一札五使亦同日命之遂為定制十二日皇帝親祭地於方澤以皇弟燕王俁為亞獻越王偲為終獻前期皇帝散齋七日於别殿致齋七日於内殿一日於齋宮舊儀侍從官設次青城内餘就草塲今聽於青城附近官舍設次日給食錢更不具食祭前一日奏告太祖皇帝室殿中監設大次於外壝西門之内道北南向小次於第二成子陛之西東向設皇帝褥位於小次前東向設文武侍臣次於大次前陪祀行事官宗室及有司次於外壝南門之外設饌幔於内壝東西門之外開瘞坎於壇子陛之北壬地光禄牽牲詣祀所大晟陳登歌之樂於壇上稍北南向設宮架於壇北内壝之外立舞表於酇綴之間祭前一日太史設皇地祇位於壇上南方北向席以藳秸太祖皇帝位於壇上西方東向席以蒲越神州地祇位於第二成午陛席以藁秸五官神嶽鎮海瀆各以其方設位於第二成山林川澤邱陵墳衍原隰各以其方設位於壇下内壝之内皆席以莞内向奉禮郎禮直官設皇帝版位於第二成子陛之西東向飲福位於壇上皇地祇神位東北南向望瘞位於瘞坎之南北向設爟火於望瘞位之西北向司罇彝帥其屬設玊幣篚於酌罇所又設籩豆簠簋之位正配位皆左十有一籩右十有一豆俱為三行俎一在籩前二在豆右為二重登一在籩豆間血槃一在登之前簠一簋一在籩豆外簠在左簋在右又設罇罍之位毎位太罇三著罇二犧罇象罇壺罇山罇各一罇皆有罍以東為上罇南罍北又設篚一於第二成子陛之側實以槃匜巾爵坫二於正配位罇罍之次又設内侍供奉皇帝盥帨位於皇帝版位之前又設象罇二壺罇二在壇下子陛之西俱南向東上皆加勺羃並實水又設第二成從祀每位皆左十籩右十豆俱為三行俎二在籩豆前登一槃一神州地祇五官神同在籩豆間簠一簋一在籩豆外簠在左簋在右爵一置於俎上内壝神位每位皆左二籩右二豆俎一在神位前爵一次之簠一簋一在爵之前簠在左簋在右登一在籩豆之間又設罇罍之位二成每方各犧罇二山罇二壇下每方設蜃罇二散罇二在神位之左蜃罇散罇外餘皆有罍副之凡罇罍皆加勺羃又設正配位籩豆簠簋俎斗鼎各一於饌幔之内太府卿少府監帥其屬陳玊幣於篚皇地祇玊以黄琮幣以黄配帝幣亦如之神州地祇玊以兩圭有邸幣以黒五行五官五方嶽鎮海瀆諸神幣各從其方色禮神之玉各置於神位前瘞玊加於幣先是郊祀罇彝籩豆簠簋之𩔖襲用前代無所考正上逺稽三代作郊廟禋祀之器至是舉而用之粲然大備手詔具親祀圜壇門前期一日尚輦奉御進輿於垂拱殿皇帝服通天冠絳紗袍乘輿以出稱警蹕如常儀乘黄令進玉輅於宣徳門外左輔奏請降輿升輅至齋宮明禋殿前廽輅南向左輔奏請降輅乗輿入齋殿侍衞如常儀祭日皇帝服通天冠絳紗袍乗輿至大次禮儀使等分立大次前有司奏請行事皇帝服衮冕以出禮儀使等前導至中壝門外殿中監跪進大圭皇帝執以入宮架儀安之樂作至午陛樂止登歌樂作至第二成版位東向立樂止禮儀使奏有司謹具請行事宮架作寧安之樂廣生儲祐之舞八成止皇帝再拜禮儀使奏請搢大圭盥手登歌樂作帨手訖執大圭至壇樂止登歌嘉安之樂作殿中監進鎮圭皇帝搢大圭執鎮圭詣皇地祇神位前南向跪奠鎮圭於繅藉執大圭俛伏興搢圭禮儀使奏請受玊幣奠訖俛㐲興再拜樂止恭安樂作詣太祖皇帝神位前西向奠圭幣如前儀禮儀使前導皇帝還版位登歌樂作至位東向立樂止禮部戸部尚書以下奉饌俎宮架豊安之樂作奉奠訖樂止皇帝再詣罍洗搢大圭盥手登歌樂作帨手洗爵拭爵訖執大圭至壇上樂止登歌光安之樂作詣皇地祇神位前搢大圭跪執爵祭酒三奠爵訖執圭俛伏興樂止太祝讀冊皇帝再拜訖登歌英安之樂作詣太祖皇帝神位前如前儀皇帝還版位登歌樂作至位樂止皇帝還小次登歌樂作殿中監跪受大圭簾降樂止文舞退武舞進宮架文安之樂作舞者立定樂止亞獻盥帨訖作隆安之樂厚載凝福之舞禮畢樂止終獻行禮如前儀皇帝詣飲福位登歌樂作至位樂止禧安之樂作皇帝再拜搢圭跪受爵祭酒三啐酒奠爵受俎奠俎受摶黍豆既奠再受爵飲福訖奠爵執圭俛伏興再拜樂止皇帝還版位如前儀禮部戸部尚書撤俎豆登歌成安之樂作卒撤樂止禮部尚書等降復位禮直官曰賜胙行事陪祀官再拜宮架寧安之樂作一成止皇帝詣望瘞位登歌樂作降自子陛樂止宮架樂作至位北向立樂止禮直官曰可瘞舉爟火瘞半坎禮儀使跪奏禮畢宮架樂作皇帝出中壝門殿中監受大圭皇帝至大次樂止有司奏觧嚴皇帝常服乗大輦還齋宮鼓吹振作皇帝升御座百官稱賀皇帝降座鳴鞭殿上侍立官以次退所司放仗還内如常儀徽宗夏至親祠后土於方澤凡四政和四年五月十二日宣和二年五月十八日五年五月十四日七年五月二十一日程子曰元祐時朝廷議行北郊只為五月間天子不可服大裘皆以為難行不知郊天郊地禮制自不同天是資始故凡物皆尚純藉用藁秸器用陶匏服用大裘是也地則資生安可亦用大裘當時諸公知大裘不可服不知别用一服是時蘇子瞻便據昊天有成命之詩謂郊祀同文潞公便謂譬如祭父母作一處何害曰此詩冬至夏至皆歌豈不可邪郊天地又與共祭父母不同也此是報本之祭湏各以其𩔖祭豈得同時邪朱子曰天地合祭於南郊及太祖不别立廟室千五六百年無人整理楊氏曰愚按古者祭天地有正祭有告祭禮雖不同義各有當冬至一陽生此天道之始也陽一嘘而萬物生此又天道生物之始也故周官大司樂以圜鍾為宮冬日至於地上之圜丘奏之六變以祀天神所以順天道之始而報天也祭天必於南郊順陽位也夏至一隂生此地道之始也隂一噏而萬物成又地道成物之始也故大司樂以函鍾為宮夏日至於澤中之方丘奏之八變以祀地示所以順地道之始而報地也祭地必於北郊順隂位也此所謂正祭也舜之嗣堯位也𩔖于上帝望于山川歲二月東廵守則柴于岱宗望秩于山川武王之伐商也底商之罪告于皇天后土又柴望並舉大告武成成王之營洛也丁巳用牲于郊翼日戊午乃社于新邑凡因事並告天地有同日而舉有繼日而舉者此所謂告祭也然祀上帝則曰𩔖𩔖者謂倣郊祀之禮而為之則非正祭天也告地而舉望祭之禮或社祭之禮則非正祭地矣蓋特祭天地乃報本之正祭也故其禮一而專並祭天地因事而告祭也不必拘其時不必擇其位雖舉望祀社可以該地示故其禮要而簡所謂禮雖不同義各有當者此也自漢以来分冬至夏至二祀為南北郊南郊則周人之圜丘也北郊則周人之方澤也然後之人主欲行親郊之禮者未聞以南郊為難而常以北郊為難夫五月雖盛暑之月他事之當舉他事之當行者未嘗廢也而獨難於北郊何也諸儒謬誤之説惑之也按司服王祀昊天上帝則服大裘而冕祀五帝亦如之惟祀地之服經無明文鄭注亦未嘗及之賈公彦始為之疏曰崑崙神州亦服大裘可知夫賈公彦一時率爾之言未嘗深考其故豈有夏至陽極之月而可服大裘哉而崔靈逺恩孔頴逹與杜佑通典亦為是説於是祀天地之服不問寒暑必服大裘而北郊遂為不可行之禮至本朝元祐中議北郊禮論者猶以大裘不可服為言於是始有請於冬至南郊而合祭天地者矣若顧臨等所言是也有援虞周告祭之禮以證祀地之正祭者矣如蘇軾之言是也因諸儒一時謬誤之言而欲廢祀地之大典可不惜哉或曰正祭告祭之禮不同而人主父事天母事地其心則一也告祭不拘其時不擇其位而可以對越天地則正祭不拘其時不擇其位奚為不可以對越天地乎曰因天道之始而祀天因地道之始而祀地以𩔖求𩔖此報本之祭也當天道之始而祀地於義何居周公制禮冬至祀天夏至祀地其義不可易矣周公豈欺我哉又曰按司服王祀昊天上帝則大裘而冕先鄭後鄭注皆云大裘之上又有元衣何也玊藻曰君衣狐白裘錦衣以裼之君子羔裘豹飾緇衣以裼之狐裘黄衣以裼之論語曰緇衣羔裘素衣麑裘黄衣狐裘裘之上未嘗無衣裘而無衣則近於䙝矣凡衣必象裘色凡冕服皆元上纁下大裘者黒羔裘也元衣之下用黒羔裘取其同色也凡冕服皆元上纁下何也易曰黄帝堯舜垂衣裳而天下治蓋取諸乾坤乾為天其色元坤為地其色黄但土旺於季夏南方屬火其色赤黄而兼赤為纁故裳用纁也玉藻曰衣正色裳間色鄭注云謂冕服元上纁下是也自黄帝始備衣裳之制舜觀古人之象繪日月星辰山龍華蟲於衣繡宗彝藻火粉米於裳凡十二章歴代皆然至周而又備繅旒之數郊特牲曰祭之日王被衮以象天戴冕璪十有二旒則天數也自衮冕而下享先公則鷩冕者不敢以天子之服臨先公也祀四望山川則毳冕祭社稷五祀則希冕不敢以至尊之服施於所卑也王者事天明事地察祭祀冕服同乎異乎曰冬至祀天夏至祀地蒼璧禮天黄琮禮地各因其𩔖以象天地之性者不容以不異也冕服者王之所服以事昊天上帝后土地祇不容以不同也但夏至不用大裘爾周禮屨人曰凡四時祭祀以宜服之夫屨猶辨四時之宜則冕服可知矣唐長孫無忌曰天子祀天地服大裘冕按周郊祀被衮以象天戴冕璪十二旒與大裘異月令孟冬天子始裘以禦寒冬至報天啟蟄祈穀服裘可也孟夏迎夏龍見而雩如之何而可服故歴代惟服衮章斯言也信而有證矣按北郊之議始於元豐初至元豐六年始罷合祭元祐七年復合祭紹聖以後復罷之政和四年始親祀地祇於方澤蓋自元豐六年至宣和之末共四十二年凡十一郊惟元祐七年一次合祭及政和四年以後四次親祠方澤而已其餘六郊則遂廢地祇之祀矣夫本以合祭為非禮分祭為禮至分合之議不決則廢親祠而權以上公攝事者且二十年蓋病其非禮而反至於廢禮以為不當並祀於圜丘而終不能親祠於方澤則固不若一遵祖宗之法三歳並祀南郊之為愈也要之周禮冬至圜丘夏至方澤其禮甚正亦無難行者諸儒議論所以不能以時決者其拘牽有二禮文煩縟則憚勞賞賚優渥則憚費如陳古靈之説每遇親郊之歲一日宿太廟以告一日宿北郊以祭地一日宿南郊以祀天是欲以二祀併在一時則不至倍費矣而執禮之勞加甚如曽曲阜之説親郊之歲依古禮以夏至親祠方澤一如郊禮至冬至則舉圜丘之祀是以二祀分在二時則不至甚勞矣而賞賚之費倍増然禮文乃百王相承之大典不可損略而賞賚則五季姑息之敝政何難更張則如政和三年之詔以郊天後一歲祭地方澤應奉支賜務從簡省毋使有偏而不舉之失乃為至論但恐當時方倡豐豫之説繁費未必能省所以中興之後國勢倥偬則不復能遵而行之也高宗紹興元年禮部太常寺討論夏日至祭皇地祇以太祖皇帝配正配二位毎位罇爵籩豆各一實以酒脯鹿臡以獻官一員行禮立冬祭神州地祇以太宗皇帝配於天慶觀望祭二年禮官言國朝祀皇地祇設位於壇之北方南向政和四年禮局議設於南方北向今北面望祭北向為難且於經無據請仍南向從之太常寺每歲常祀夏日至祭皇地祇係於行在錢湖門外惠照院望祭齋宮設位行禮以太祖皇帝配三獻官依儀初獻係差宰執亞獻禮部尚書侍郎有故或闕次輪别曹長貳次給舍諫議終獻太常卿少禮部郎官有故或闕差北司官次輪别曹郎官合用禮料牲牢羊一口豕一口籩二十有六菱二芡二㮚二鹿脯二乾􅀥濕􅀥乾桃濕桃乾榛栗實䵄蕡白黒形鹽膴鮑魚鱐􅟿餌粉餈簠八稻粱各四登一大羮槃一毛血簋八黍稷各四豆二十有六􅓞食糝食芹兎醢深蒲醓醢二菭菹鴈醢笋魚醢三葵蠃醢脾折蠯醢大蛤蚳醢豚拍韭昌本菁鹿臡茆麋臡二俎八羊腥七體豕腥七體羊熟十一豕熟十一羊腥腸胃肺羊熟腸胃肺豕腥膚豕熟膚罇罍共二十有四著罇二一實元酒加明水一實盎齊太罇二一實泛齊一實醴齊山罇二一實盎齊一實醍齊犧罇二一實沈齊一實事酒象罇二一實昔酒一實清酒以上各加罍二隻係實明水文獻通考卷七十六
