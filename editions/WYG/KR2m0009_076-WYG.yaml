body:
  text: 文獻通考卷七十六鄱陽馬端臨貴與著郊社考祀后土夏以五月祭地祗殷以六月祭地祗周制夏日禮地祗於方丘曲禮天子祭天地疏曰地神有二歲有二祭夏至之日祭崑崙之神於方澤一也夏正之月祭神州地祗於北郊二也或云建申之月祭之與郊天相對又曰知方嶽之神是崑崙者按地統書括地象云地中央曰崑崙又云其東南方五千里曰神州以此言之崑崙在西北别統四方九州其神州者是崑崙東南一州耳於一州中更分為九州則禹貢之九州是也其配地之神孝經緯既云后稷為天地之主則后稷配天南郊又配地北郊則周人以嚳配圜丘亦當配方澤也張騫贊班固曰禹本紀言河出崑崙崑崙高二千五百里餘日月所相避隠為光明也自張騫使大夏之後窮河源惡睹所謂崑崙者乎故言九州山川尚書近之矣至禹本紀山經所有放哉左傳凡祀啓蟄而郊疏曰鄭元注書多用䜟緯言地祗有二有崑崙之神又有神州之神唯鄭元立為此議而先儒悉不然故王肅作聖證論引羣書以證之以黃琮禮地禮謂始告神時薦於神座禮地以夏至謂神在崑崙者也禮神者必象其𩔖琮八方象地是疏曰云琮八方以象地者天圓以對地方地有四方八方也易云天元而地黃今地用黃琮隨地色牲幣放其器之色注疏見祀天禮已上禮地玊幣兩圭有邸以祀地両圭者以象地數二也僢而同邸祀地謂北郊神州之神僢昌絹反疏曰云僢而同邸者按王制注臥則僢彼謂兩足相向此兩圭亦両足同邸是足相向之義故以僢言之則上四圭同邸者亦是各自兩足相向但就此両足相向而言之也地春官典瑞有楊氏曰玊人之事両圭五寸有邸以祀即此兩圭邸以祀地者也義與四圭有邸以祀天同又按黃琮以禮地兩圭以自執亦如植璧秉珪之謂鄭氏並謂之禮地又強分崑崙神州為二以當之非也祀政和四年禮制局言始則求神而禮之終則正祭而焉大宗伯以黃琮禮地蓋施於求神之時也與大司樂以凾鍾為宮至地祗皆出可得而禮同矣典瑞兩圭有邸以祀地蓋施於薦獻之時與大司樂奏太蔟歌應鐘舞咸池以祭地同矣鄭氏乃謂以黃琮禮地神之在崑崙者両圭有邸以祀地祗於北郊神州之神且黄琮両圭有邸周官特言禮地祀地而已初無崑崙神州之别鄭氏之説本於䜟緯之書前輩如長孫無忌輩固嘗辨其非矣此義與徐邈不同姑兩存之已上祭地所執之玉蒲越藁鞂器用陶匏並詳見祀天禮已上祭地席器祭地之牛角繭栗陰祀用黝牲毛之陰祀祭地北郊及社稷也黝讀為幽黒也毛之取純毛也地官牧人地已上祭之牲天子為籍千畝以事天地社稷以為醴酪齊盛籍在亦反酪音洛齊音咨籍田也祭義酒正以法共五齊三酒以實八罇大祭三貳齊才細反禮三貳三益副之也并見祀天已上齊盛酒齊玉路鍚樊纓十有再就建太常十有二斿以祀鍚音陽樊歩干反斿音留大馭掌馭玉路以祀節服氏衮冕六人維王之太常並詳見祀天禮已上車旗大司樂大合樂分樂乃奏太蔟歌應鍾舞咸池以祭地示凡六樂者一變而致羽物及川澤之示再變而致臝物及山林之示三變而致鱗物及邱陵之示四變而致毛物及墳衍之示五變而致介物及土示凡樂函鍾為宮太蔟為角姑洗為徵南呂為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣疏曰禮地祇必於夏至之日者以地是陰夏至一陰生是以還於陰生之日祭之也注疏詳樂考鼓人以靈鼓鼓社祭靈鼓六面鼓也社祭祭土神地之道已上祭地之樂右祭地禮物樂舞前期十日自此以後並如祀天禮祭之日通典云其日王立於方丘東南西面乃奏函鍾為宮以下之樂以致其神訖王又親牽牲取血并玉瘞之以求神謂之二始天地之祭惟圜丘方丘備此二始謂圜丘之先奏圜鍾為宮之樂次燎牲及玉幣也方丘則先奏函鍾為宮之樂次則瘞埋血及玉幣二者在正祭之前故云二始瘞元豐元年九月陳襄等議陰祀自血起請北郊先行血之禮俟薦獻禮畢即瘞牲幣之屬則始終之禮備詳見祀天燔柴條瘞埋於泰折折之設反牲疏曰瘞埋謂瘞繒埋也祭法爾雅曰祭地曰瘞埋太宰贊玉幣爵注見祀天禮郊特牲酒疏曰夏至祭方澤之禮齊獻數與圜丘同瓦通典云尸前既置玉幣等訖次則王以匏片為爵酌甒之泛齊以獻尸謂之朝踐所謂陶匏象天地之性次大宗伯亦以匏爵酌醴齊攝王后之獻凡二獻也次薦熟於神座前畢王更以匏爵酌盎齊以獻尸大宗伯以匏爵酌醍齊以亞之所謂饋食之獻凡四獻也尸乃食訖王更酌朝踐之泛齊以酳尸所謂朝獻大宗伯次酌饋食之醍齊以亞之所謂再獻凡六獻也次諸臣為賔酌沈齊以獻尸凡七獻也王毎獻酒皆作樂一終大宗伯奉齍注疏見祀天禮大司徒奉牛牲注疏見祀天禮右祭地禮始終之序陳氏禮書曰周禮或言大示或言地示或言土示蓋大示則地之大者地示則凡地之示與焉土示則五土之示而已禮記言兆於南郊就陽位也南郊祀天則北郊祀地矣祀天就陽位則祭地就隂位矣大宗伯以黄琮禮地牲幣各放其器之色而牧人隂祀用黝牲則牲有不同也典瑞兩圭有邸以祀地則玊有不同也大司樂奏太蔟歌應鍾以祀地示凡樂函鍾為宮若樂八變地示皆出則樂有不同也蓋先王之於神示求之然後禮禮之然後祀函鍾為宮求之之樂也太蔟應鍾祀之之樂也若夫玊之黄琮兩圭牲幣之黄黒蓋祭有不一而牲幣器亦從而異也鄭氏之徒謂夏至於方丘之上祭崑崙之示七月於泰折之壇祭神州之示此惑於䜟緯之説不可考也凡以神仕者以冬至致天神人鬽以夏日至致地示物鬽致天神而人鬽與之者荀卿所謂郊則并百王於上天而祭之是也郊天合百王則郊地合物鬽宜矣鄭氏謂致人鬽於祖廟致物鬽於壇墠蓋用祭天地之明日於經無據又曰古者正祭有常數非正祭者無常時故歲祭天者四詩序曰春夏祈穀于上帝又曰豐年秋冬報則春祈穀左氏所謂啓蟄而郊是也夏祈穀所謂龍見而雩是也秋報月令所謂季秋大享帝是也冬報周禮所謂冬日至於地上之圜丘是也凡此正祭也旅𩔖造禱祠之屬非正祭也祭地之禮周禮所謂夏日至於澤中之方丘正祭也禱祠之屬非正祭也然先王親地有社存焉禮曰享帝於郊祀社於國又曰郊所以明天道社所以申地道又曰郊社所以事上帝又曰明乎郊社之義或以社對帝或以社對郊則祭社乃所以親地也大宗伯以血祭社稷又曰大封先告后土太祝大師大會同宜於社又曰建邦國先告后土則后土非社矣鄭氏釋大宗伯謂后土土神黎所食者釋月令謂后土黎也釋太祝謂后土社神也既曰土神又曰社神是両之也書曰敢昭告于皇天后土左氏曰君戴皇天而履后土漢武帝祠后土於汾隂宣帝祠后土於河東而宋梁之時祠地皆謂之后土則古者亦命地示為后土矣然周禮有大示有地示有土示又有后土則所謂后土者非地示也朱子曰周禮有圜丘方澤之説後来人却只説社便是后土見於書傳言郊社多矣某看来也自有方澤之祭楊氏曰愚按大司樂奏太蔟歌應鍾舞咸池以祭地示鄭注云地示所祭於北郊及社稷牧人陰祀用黝牲毛之鄭注云陰祀祭地北郊及社稷夫祭地惟有夏至北郊方澤之禮此外則有社祭亦祭地也鄭氏亦既知之矣及注曲禮天子祭天地大宗伯黄琮禮地典瑞兩圭祀地又云地神有二歲有二祭夏至祭崑崙之神於方澤夏正祭神州之神於北郊何也蓋祭地惟北郊及社稷此三代之正禮而釋經之正説鄭氏所不能違也有崑崙又有神州有方澤又有北郊析一事以為二事此則惑於緯書而牽合聖經以文之也知有正禮而又汨之以緯書甚矣其惑也右以上所述祀地禮文係信齋楊氏祭禮據經文所載條為始終之序如通典則依鄭氏注以方丘為祭崑崙之神丘在國之北禮神之玉以黄琮牲用黄犢幣用黄繒所謂各如其器之色王及尸同服大裘配以后稷服與配經文不載注家以為同祭天之禮故服大裘配后稷其樂則大司樂之函鍾為宮云云至八變則地祗皆出可得而禮是也神州地祗則為壇於北郊名泰折玉用兩圭五寸有邸牲用黝犢陰祀用黝牲幣用黒繒幣經無文據牲用黑知當從其色配亦以后稷其樂則奏太蔟歌應鍾舞咸池以祭地示是也按鄭氏觧經於天地之祀皆分而為二是有二天二地矣然古人祀天之禮郊與明堂本二處所配之祖又不同則因宗祀文王於眀堂以配上帝一語而指其帝為五精之神感生之帝猶云可也至於祭地則經文所載惟方澤而已乃以為此所祀者崑崙而又有神州則祭之於北郊蓋北郊之名亦出緯書孝經緯祭地示於北郊禮經所不載於是又因祭法有泰折之語而以為泰折即北郊又非方澤也其支離不通彌甚矣秦始皇帝即位三年祠八神二曰地主祠泰山梁父蓋天好陰祠之必於高山之下畤命曰畤地貴陽祭之必於澤中圜丘云漢武帝元狩二年天子郊雍曰今上帝親郊而后土無祀則禮不答也有司與太史令談祠官寛舒議天地牲角繭栗今陛下親祠后土后土宜於澤中圜丘為五壇壇一黄犢牢具已祠盡瘞而從祠衣上黄侍祠之人著黄衣於是天子東幸汾隂汾陽男子公孫滂洋等見汾旁有光如絳上遂立后土祠於汾陰脽上如寛舒等議上親望拜如上帝禮漢舊儀祭地河東汾陰后土宮宮曲入河古之祭地澤中方丘也禮儀如祭天名泰一旦丘宣帝神爵元年上幸河東祠后土五鳳三年上幸河東祠后土元帝即位遵舊儀間歲郊泰畤東至河東祠后土成帝初即位丞相匡衡御史大夫張譚等奏請罷雍畤甘泉汾隂后土祠於長安立南北郊從之詳見郊祀門建始二年正月辛丑上始祠后土於北郊永始三年復汾隂后土祠四年上幸河東祠后土元延二年幸河東祠后土四年及綏和二年並幸河東祠后土二年上崩乃復長安南北郊哀帝即位寢疾復甘泉泰畤汾隂后土祠平帝時王莽奏罷甘泉泰畤復長安南北郊又奏以天地合祭以孟春正月上辛若丁天子親合祀天地於南郊以高帝高后配夏日至使有司奉祭北郊以高后配詳見郊祀門光武建武二年制郊兆於雒陽城南七里采元始中故事合祀天地中元元年營北郊於洛陽城北四里為方壇四陛遷呂太后於園上薄太后尊號曰高皇后配地祗郊二年正月郊别祀地祗位南面西上高皇后配西面北上皆在壇上地禮羣神從食皆在壇下如元始故事嶽瀆位見山川門地祗高皇后用犢各一頭五嶽共牛一頭四海四瀆共牛一頭羣神共二頭奏樂亦如南郊既送神瘞俎實於壇北魏明帝景初元年詔祀方丘所祭曰皇皇后地以舜妃伊氏配北郊所祭曰皇地之祗以武宣后配時高堂隆上表云古来娥英姜姒盛德之妃未聞配食於郊者也漢文初祭地祇於渭陽西漢武帝時始立汾隂后土於汾隂亦以高帝配祠孝文時無祭地祠於渭陽事以高帝配孝武立后土宜依古典以武皇配天地按鄭康成分圜丘與南郊為二方澤與北郊為二而所祀天地亦各有二名曹魏郊祀遵用其説然鄭説祀天則有昊天有五帝而魏圜丘所祀曰皇皇帝天南郊所祀曰皇天之神鄭説祀地則有崑崙有神州而魏方澤所祀曰皇皇后地北郊所祀曰皇地之祗徃徃見靈威仰及崑崙等名不雅馴故有以易之然不知皇天之與天神后地之與地祗果可分而為二乎可笑也晉武帝泰始二年定郊祀地郊先后配是年并圜方二丘於南北郊更脩壇兆其二至之祀合於二郊時從有司議云古者郊丘不異十一月庚寅帝親祠於南郊自後方澤不别立元帝太興二年北郊未立地祇共在天郊明帝太寜三年詔立北郊未及建而帝崩成帝咸和八年於覆舟山南立地郊以宣穆張皇后配五嶽四望四海四瀆五湖諸山江等凡四十四神及諸小山從祀此依魏氏故事非晉舊也時将北郊太常顧和表按後漢光武正月辛未始建北郊此則與南郊同月於是從和議郊廟牲幣璧玊之色雖有成文秦代多以駵駒漢則但云犢未辨其色江左南北同用元牲晉地郊享神歌一首祠享天地五神迎送歌見郊祀門宋武帝永初二年親祀南北郊孝武帝大明三年移北郊於鍾山北原道西與南郊相對後還舊處初晉始置於覆舟山南至於此移之廢帝以舊地吉祥復之齊高祖建元二年正月次辛祀北郊犧牲之色因舊不改而無配用王儉議武帝永明三年議郊祀用正月次辛瘞后土御並親奉車服之儀率遵漢制出以法駕衮冕用次辛之義已注天郊梁武帝制北郊為壇於國之北壇上方十丈下方十二丈高一丈四面各一陛其為外壝再重常與南郊間歲正月上辛祀后土於壇上以徳后配禮以黄琮五官先農五嶽及國内山川皆從祀地攢題曰后地座用上和香以地於人親宜加雜馥省除四望座博士明山賔議北郊有嶽鎮海瀆之座而又有四望座疑重遂省四望座松江浙江五湖鍾山白石山並留之如故帝行一獻之禮梁北郊迎神諴雅一曲三言送神諴雅一曲四言皇帝初獻奏登歌二曲四言陳武帝受禪亦以間歲正月上辛用特牛一祀於北郊以皇妣昭后配文帝天嘉中改以德皇帝配宣帝即位以郊壇卑下更増廣之祠部郎中王元規議舊壇上徑廣九丈三尺請加七尺以則地義下徑廣十五丈取三分益一髙丈五寸請加尺五寸取二倍漢家之數後魏道武帝即位二年癸亥瘞地於北郊以神元竇皇后配壇兆制同南郊五嶽名山在中壝内四瀆大川於外壝内后土神元后共用元牡一玊用兩圭有邸幣用束帛五嶽等共牛一祭畢瘞牲體於壇北亥地其後夏至祭地於方澤用牲幣之屬與二郊同北齊制三年一祭以夏日至禘崑崙皇地祇於方澤以武徳皇后配為壇在國北郊壇廣輪四十尺高四尺面各一陛其外為三壝相去廣狹同圜丘壝外大營廣輪三百二十歩餘如圜丘又為瘞坎於壇之壬地中壝之外廣深丈二尺禮以黄琮束帛神州社稷天下山水並從祀用牲十二犧同圜丘後周祭后土地祇於國北郊六里為壇壇一成八方下崇一丈方六丈八尺上崇五尺方四丈方各一陛毎尺一級其壝八面徑百二十歩内壝半之以神農配牲以其方之色神州壇在其右以獻侯莫那配焉崇一丈方四丈其壇如方丘莫那則周文帝之逺祖自隂山南徙始居遼西隋因周制夏日至祭皇地祇於宮城北郊十四里為方壇其丘再成成高五尺下成方十丈上成方五丈成則重也以太祖武元配神州迎州冀州戎州拾州柱州宮州咸州揚州其九州山林川澤邱陵墳衍原隰皆從祀地祇及配帝在壇上神州九州神座於壇第二等八陛之間神州東南方迎州南方冀州戎州西南方拾州西方柱州西北方宮州咸州東北方揚州東南方九州山海以下各依方面八陛之間唯冀州山林川澤邱陵墳衍於壇之南少西地祇配帝等牲用黄犢二神州以下用方色犢一九州山海墳衍等加羊豕各九孟冬祭神州於北郊亦以太祖武元配牲用犢二凡大祀養牲在滌九旬昊天五帝日月星地祇神州宗廟社稷中祀三旬星辰五祀四望小祀一旬司中司命風師雨師諸星山川其牲方色難備者聽以純色代之煬帝大業元年孟冬祀神州改以高祖文帝配北齊後周隋北郊迎送神等歌詞同南郊唐制夏日至祭皇地祇於宮城之北郊十四里為方丘壇因隋制以景帝配神州五方嶽鎮海瀆山林川澤邱陵墳衍原隰皆從祀地祇配帝在壇上神州在壇第二等五嶽以下三十七座於壇下外壝之内邱陵等三十座於壝外地祇及配帝牲用黄犢二神州用黝犢一嶽鎮以下加羊豕各五孟冬祭神州於北郊景帝配牲用黝犢二太宗貞觀時奉高祖配地郊中書令房元齡與禮官議以為禮有益於人則祀之神州者國之所托餘八州則義不相及近代通祭九州今除餘州等八座唯祭皇地祇及神州以正祀典高宗永徽中廢神州之祀禮部尚書許敬宗議方丘祭地之外别有神州謂之北郊分地為二既無典據理又不通請合於一祀以符古義仍並循附式令永垂後則可之乾封初詔依舊祀神州皇地祇壇依舊於渭水北安置奉常博士陸遵等議北郊之月古無明文漢光武正月辛未始建北郊東晉成帝元和中議北郊用正月皆無指據武德来禮令即用十月為是隂用事故於此時祭之請依舊十月致祭從之武后天冊萬歲元年親享南郊始合祭天地睿宗景雲三年将祀南郊有司請設皇地祇位諫議大夫賈曾上表曰謹按傳曰大祭曰禘然則郊之與廟俱有禘祭禘廟則祖宗之主俱合於太祖之廟禘郊則地祇羣望俱合於圜丘以始祖配享禮大傳曰不王不禘故知王者受命必行禘禮虞書曰月正元日舜格于文祖肆類于上帝禋于六宗秩于山川徧于羣神此則受命而行禘禮者也言格于文祖則餘廟可知矣言𩔖于上帝則地祇之合可知矣且山川之祀皆屬於地羣望尚徧况地祇乎三輔故事漢祭圜丘儀上帝位正南面后土位亦南面而少東伏惟陛下自臨宸極未親郊祭今之南郊正當禘禮固宜合祀天地咸秩百神豈可使地祇無位未從禘享今請備設皇地祇并從祀等座則禮得稽古義合縁情制令宰相召禮官詳議可否禮官國子祭酒褚無量司業郭山惲等咸依曽奏其事竟寢開元十一年上将還西京便幸并州兵部尚書張説進言曰陛下今因行幸路由河東有漢武后土之祠此禮乆闕歴代莫能行之願陛下紹斯墜典以為三農祈穀此誠萬姓之福至十二年二月二十二日祠后土於汾陰脽上太史奏榮光出河休氣四塞祥風繞壇日揚其光初有司奏脩壇掘地獲古銅鼎二其大者容四升小者容一升色皆青又獲古甎長九寸有篆書千秋萬歳字及長樂未央字又有赤兎見於壇側舊祠堂為婦人塐像則天時移河西梁山神塐像就祠中配焉至十一年有司遷梁山神像於祠外之别室焉兼以中書令張嘉貞為壇塲使将作少監張景為壇場副使張説為禮儀使二十年車駕欲幸太原中書令蕭嵩上言云十一年親祀后土為蒼生祈穀自是神明昭祐累年豊登有祈必報禮之大者且漢武親祠脽上前後數四伏請准舊事至后土行報賽之禮上從之至十一月二十一日祀后土於脽上其文曰恭惟坤元道昭品物廣大茂育暢於生成庶憑休和惠及黎獻博厚之位粤在汾陰肅恭時廵用昭舊典敬以琮幣犧牲粢盛庶品備兹瘞禮式展誠慤睿宗皇帝配神作主禮畢令所司刋石於祠所上自為文二十一年詔夏日至祀皇地祇於方丘以高祖配立冬祭神州於北郊以太宗配天寳五載詔皇王之典聿修於百代郊祭之義允屬於三靈聖人既因時以制宜王者亦縁情以革禮且尊莫大於天地禮莫崇於祖宗嚴配昭升豈宜異數今烝嘗之獻既著於常式南北之郊未展於時享自今已後毎載四時孟月先擇吉日祭昊天上帝其皇地祇合祭以次日祭九宮壇令宰臣行禮奠祭務崇蠲潔稱朕意焉唐開元禮夏日至祭皇地祇於方丘壇上以髙祖神堯皇帝配座毎座籩豆各十二簠簋㽅俎各一都七十二座祭神州地祇於壇第一等籩豆各四餘如上也祭五嶽四鎮四海四瀆五山五川五林五澤五邱五陵五墳五衍五原五隰於内壝之外各依方面毎座籩豆各一簠簋俎各一皆准舊禮為定立冬後祭神州地祇於北郊以太宗文武聖皇帝配座毎座籩豆各十二簠簋㽅俎各一也舊樂用姑洗三成准周禮云函鍾之均八變則地祇皆出可得而禮鄭元云祭地有二一是大地崑崙為皇地祇則宗伯黄琮所祭者二是帝王封域内之神州則両珪有邸所祭者國家後禮則不立神州之祀今依前禮為定既曰地祇其樂合用函鍾之均八變皇帝夏日至祭方丘儀后土同孟冬祭神州及攝事並同齋戒前祭七日戒誓皇帝服衮冕前祭二日太尉告高祖神堯皇帝廟如常告之儀告以配神作主孟冬祭神州則告太宗文武聖皇帝廟餘並如圜丘之儀陳設前祭三日尚舍直長施大次於外壝東門之外道北南向攝事衞尉設祭官公卿已下次於東壝外道南北向西上尚舍奉御鋪御座衞尉設文武侍臣次於大次之後文官在左武官在右俱南向設祭官次於東壝之外道南北向西上三師於南壝之外道東諸王於三師之南俱西向北上文官九品以上於祭官之東北向西上介公酅公於南壝之外道西東向諸州使人東方南方於諸王東南西向西方北方於介公􅈶公西南東向皆北上諸國之客東方南方於諸州使人之南西向西方北方於諸州使人之南東向皆北上武官三品以下七品以上於西壝之外道南北向東上其褒聖侯於文官三品之下攝事無御座以下至此儀設陳饌幔於内壝東門西門之外道北南向壇上及神州東方南方之饌陳於東門外西向西方北方之饌陳於西門外東向神州無西門之饌前祭二日太樂令設宮懸之樂於壇南内壝之外樹靈鼓於北懸之内道之左右餘如圜丘儀又為瘞塪於壇之壬地内壝之外方深取足容物南出陛前祭一日奉禮設御位攝事無御位於壇之東南西向設望瘞位於壇西南當瘞埳北向設祭官公卿位於内壝東門之外道南分獻官於公卿之南執事者位於其後毎等異位俱重行西向北上設御史位於壇上正位於東南隅西向副位西南隅東向設奉禮位於樂懸東北贊者二人在南差退俱西向北上設奉禮贊者位於瘞埳西南東向南上設協律郎位於壇上南陛之西東向設太樂令位於北懸之間當壇北向設從祭之官三師位於懸南道東諸王位於三師之東俱北向西上介公酅公位於道西北向東上文官從一品以下九品以上位於執事之南毎等異位重行西向武官三品以下九品以上位於西方當文官毎等異位重行東向皆北上諸州使人位東方南方於諸王東南重行北面西上西方北方於介公酅公西南重行北面東上設諸國客使位於内壝南門之外東方南方於諸州使人之東毎國異位重行北面西上西方北方於諸州使人之西毎國異位重行北面東上攝事無三師以下至此儀設門外位祭官公卿以下皆於東壝之外道南毎等異位重行北面西上三師位於南壝之外道東諸王於三師之南俱西向介公酅公於道西東向皆北上文官從一品以下九品以上位於東壝之外祭官之南毎等異位重行北向西上武官三品以下九品以上位於西壝之外道南毎等異位重行北面東上諸州使人位東方南方於諸王東南重行西面西方北方於介公酅公西南重行東面俱北上設諸國客位東方南方於諸州使人之南毎國異位重行西面西方北方於諸州使人之南毎國異位重行東面皆北上攝事無三師以下至此儀設牲牓於東壝之外當門西向黄牲一居前又黄牲一在北少退元牲一在南少退設廪犧令位於牲西南祝史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北南向設皇地祇酒罇於壇之上下太罇二著罇二犧罇二罍一在壇上東南隅北向象罇二壺罇二山罍二在壇下皆於南陛之東北向俱西上設配帝著罇二犧罇二象罇二罍一在壇上皆於皇地祇酒罇之東北向西上孟冬北郊酒罇於神州酒罇之東如夏至之儀神州太罇二在第一等毎方嶽鎮海瀆俱山罇二山林川澤俱蜃罇二邱陵墳衍原隰俱概罇二凡罇各設於神座之左而右向神州以上之罇置於坫以下之罇俱藉以席皆加勺羃設爵於罇下孟冬儀壇上之罇置於坫壇下之罇藉以席設御洗及設玊幣之篚等並如圜丘儀孟冬祭同祭