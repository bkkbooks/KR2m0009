body:
  text: 文獻通考卷一百四十八鄱陽馬端臨貴與著樂考二十一夷部樂周禮韎師掌教韎樂祭祀則帥其屬而舞之舞之以東夷之樂大饗亦如之疏凡舞夷樂皆門外為之旄人掌教舞散樂舞夷樂散樂野人為樂之善者若今黄門倡矣自有舞夷樂四夷之樂亦皆有聲歌及舞疏散樂以其不官之員内謂之為散黄門倡者漢倡優之人亦非官樂也凡四方之以舞仕者屬焉疏即野人能舞者鞮鞻氏掌四夷之樂與其聲歌四夷之樂東方曰韎南方曰任西方曰株離北方曰禁詩云以雅以南是也王者必作四夷之樂一天下也言與其聲歌則云樂者主於舞祭祀則龡而歌之燕亦如之吹之以管籥為之聲白虎通云樂元語曰東夷之樂曰朝離萬物微離地而生樂特矛舞助時生也南夷之樂曰南南任也任養萬物樂特羽舞助時養也西夷樂曰味味昧也萬物衰老取晦昧之義也樂特㦸舞助時殺也北夷樂曰禁言萬物禁藏樂特干舞助時藏也又曰先王推行道徳和調隂陽覆被夷狄故制夷樂何不制夷禮禮者身當履而行之天下不可殊禮也陳氏樂書曰詩者民之情性歌者民之歡心是歌始於詩而樂又始於歌凡此内自中國外暨四夷其風聲氣俗雖因水土不同至於所以為情性為歡心未始少異也古人之於禽𩔖一載好其音猶且取之况夷歌乎故周官鞮鞻氏掌四夷之樂與其聲歌祭祀則龡而歌也燕亦如之蓋四夷之民異音而同歌先王祭祀燕饗必用之者以其中天下而立定四海之民服而役之得其歡心使鼓舞焉以承祭祀供饗燕君子之所樂故也傳曰王者必作四夷之樂一天下也其此之謂乎然王者制夷狄樂不制夷狄禮何也樂者逺近所同禮樂異制而已故制其樂不制其禮恐其不能從中國禮故也豈非五方之民皆有性不可推移然邪臣觀契丹視他戎狄最為强桀然所用聲曲皆竊取中國之伎但不能和闡婉諧彈絲擫管趨於成音而已恥其本俗所翫禁止不傳而中國第其蕃歌與舞其制小横笛一拍鼓一拍板一歌者一二人和人其聲嘍離促廹舞者假面為邉人衣服皆効之軍中多尚此伎太宗雍熙中惡其亂古樂也詔天下禁止焉可謂甚盛之舉矣然今天下部落效為此伎者甚衆非特無知之民為之往往士大夫之家亦喜為之誠推太宗禁止之制凡朝廷作夷樂特施於國門之外以樂蕃使可也茍用之燕饗非所以示天下移風俗之意也東夷髙麗其國樂工人紫羅帽飾以鳥羽黄大袖紫羅帶大口袴赤皮鞾五色縚繩舞者四人椎髻於後有絳抹額飾以金鐺二人黄裙襦赤黄袴二人赤黄裙襦袴極長其袖烏皮鞾雙雙并立而舞隋唐九部樂有髙麗伎其樂器已見俗樂門此不詳具唐武后時尚餘二十五曲貞元末唯能集一曲衣服亦寖衰敗失其本風傀儡并越調夷賓曲李勣破髙麗所進也宋乾徳四年鎮州進伶官二十八人善習髙麗部樂賜衣服銀帶遣歸本道元豐間來臣求中國樂工教之今之樂大抵中國制中國使至嘗出家樂以侑酒百濟其國之樂有鼓角箜篌筝竽箎笛之樂投壺圍棊樗蒲握塑弄珠之戲宋朝初得之至後魏大武滅北燕亦得之而未具周武滅齊威振海外二國各獻其樂周人列於樂部謂之國伎隋文平陳并與文康禮畢而得之唐貞觀中嘗滅百濟國盡得其樂至中宗時工人亡散開元中岐王範為太常卿復奏置之其器有箏笛桃皮􅓋篥箜篌其歌曲八般涉調唐英公將薛仁貴破其國得而進之也歌者有五種焉其舞用二人紫大袖裙襦章甫冠皮履章甫商冠也而東夷服之豈亦得其遺制歟古人嘗謂禮失求諸夷信矣獩貊常以歲十月祭天晝夜飲酒歌舞名為儛天其作樂大抵與夫餘國同特所用月異耳三韓其俗信鬼神常以五月祭之晝夜羣飲鼓瑟歌舞踏地為節十月農功畢亦如之瑟形如筑彈之亦有音曲云馬韓國常以五月下田種畢功因祭鬼神晝夜聚飲歌舞數十人蹋地低昂以手足相應為節有𩔖鐸舞農功畢亦如之夫餘以臘月祭天大會連日飲食歌舞名曰迎鼓行人無晝夜好歌吟音聲不絶新羅每歲八月十五日設樂令羣官射賞以馬布唐貞觀中遣使獻女樂二人倭國其樂有五弦琴笛每至正月一日必射戲飲酒為樂隋大業中嘗遣裴世清使其國其王設儀仗鼓角歌舞迎之日本自唐以來屢遣貢使三月三日有桃花曲水宴八月十五日放生會呈百戯其樂有中國髙麗二部歌詞雖甚雕刻而膚淺勿吉隋開皇中遣使朝貢文帝厚勞宴之率皆起舞曲折多鬬容西戎髙昌西魏與髙昌通始有髙昌部之樂以備宴饗隋開皇中嘗來獻聖明樂曲唐太宗伐其國盡得其樂其器有豎箜篌琵琶五弦笙笛簫􅓋篥毛員鼓都曇鼓答臘鼓腰鼓羯鼓雞婁鼓銅鼓銅鈸具等十五種為一部工二十人舞人白襖錦袖赤皮鞾赤皮帶紅抹額龜兹自吕光滅龜兹因得其聲吕氏亡其樂分散後魏平中原復獲之其聲後多變易至隋有西國龜兹齊朝龜兹土龜兹等凡三部開皇中列於七部樂其器大盛於閭閈唐以為十部燕樂奏安息樂以下雷大鼓用龜兹樂尤盛於開元之時曹婆羅門累代傳其素業大和初有米未稼米萬搥樂色舞藝並見俗部樂唐十部下兹不再録樂工人皂絲布頭巾緋絲布袍錦袖緋布袴舞者四人紅抹額緋襖白袴帑烏皮鞾其舞曲有小天疎勒鹽焉疎勒其樂有豎箜篌琵琶五弦横笛簫觱篥答臘腰鼓羯鼓提鼓雞婁鼓十種為一部工十二人歌曲有兀利死讓樂舞曲有逺服解曲有鹽曲蓋起自後魏平馮氏通西域時隋唐以備燕樂部樂工人皂絲布白頭巾袍錦褾白絲布袴舞文白襖錦袖赤皮鞾赤皮帯曲調有昔昔鹽一臺鹽之𩔖容齋洪氏隨筆曰薛道衡空梁落燕泥之句其詩曰昔昔鹽凡十韻唐趙嘏廣之為二十章按樂苑以為羽調曲元􅬝錄載籧篨三娘工唱阿鵲鹽又有突厥鹽黄帝鹽白鴿鹽神雀鹽疎勒滿座鹽歸國鹽唐詩媚頼吳娘唱是鹽更奏新聲刮骨鹽然則歌詩謂之鹽者如吟行曲引之𩔖云今南嶽廟獻神樂曲有黄帝鹽而俗傳以為黄帝炎長河志從而書之蓋不考也康國其樂器有長笛正鼓和鼓銅鈸四種為一部工七人歌曲有二殿農和去舞曲有賀蘭鉢鼻始末奚波地農慧鉢鼻始前㧞地慧地等四曲蓋自周閔帝聘北狄女為后獲西戎伎樂也隋唐以備燕樂部樂工人皂絲布頭巾緋絲布袍錦領舞二人緋襖錦領袖緑綾襠袴赤皮鞾白袴帑舞急轉如風俗謂之胡旋安國其樂器有箜篌琵琶五弦笛簫雙觱篥正鼓和鼓銅鈸歌簫小觱篥桃皮觱篥腰鼓齊鼓檐鼓具等十四種為一部工十八人歌曲有附莖單時歌芝栖舞曲有末奚舞芝栖解曲有居枑後魏平馮氏通西域得其伎隋唐以備燕樂部樂工人皂絲布頭巾錦褾紫袖袴舞二人紫襖白袴帑赤皮鞾乞寒本西國外蕃唐國之樂其樂器有大鼓小鼓琵琶五弦箜篌笛其樂大抵以十一月倮露形體澆灌衢路鼓舞跳躍而索寒也唐神龍時并州清源令吕元泰上書曰洪範庶徴謀時寒若禮曰秋行夏令寒暑不節隂陽不調政令之失休咎之應君臣所感君能謀事則時寒順之何必效胡俗而乞索哉先天二年中書令張說諫曰乞寒潑胡未聞典故裸體跳足盛徳何觀揮水投泥失容滋甚法殊魯禮䙝比齊優恐非干羽柔逺之義罇俎折衝之道願擇芻言特罷此戲至開元元年十二月敕臘月乞寒外蕃所出漸浸成俗因循已久自今以後無問蕃漢即宜禁斷西涼晉末中原喪亂張軌據有河西苻秦通涼州旋復隔絶其樂具鐘磬蓋涼人所傳中國舊樂雜以羗胡之聲也自後魏傳隋及唐以備燕樂部樂工平巾幘緋褶方舞四人假髻玉攴釵紫絲布褶白大袴五彩接烏皮鞾白舞一人史不載其服色其器有編鐘編磬琵琶五弦豎箜篌卧箜篌箏筑笙簫竽大小觱篥豎笛横吹腰鼓齊鼓檐鼓銅鈸具為一部工二十七人其歌曲謂之涼州又謂之新涼州皆入婆陀調中西涼府都督郭知運等所進也唐坐立二部惟慶善樂獨用西涼故明皇嘗命紅桃歌涼州謂其詞貴妃所製豈貴妃製之知運進之邪涼州進新曲明皇命諸王於便殿觀之曲終諸王皆稱萬歲獨寧王不賀明皇詢其故寧王曰夫曲者始於宫散於商成於角徵羽臣見此曲宫離而少微商亂而加暴宫者君也商者臣也宫不勝則君體卑商有餘則臣事僭臣恐異日臣下有悖亂之事陛下有播越之禍兆於斯曲矣洎祿山南犯明皇西幸始知寧王善音而姦聲適以召亂也可不戒哉天竺其樂器有鳯首箜篌琵琶五弦横笛銅鼓毛員鼓都曇鼓銅鈸具等九種為一部工十二人歌曲有沙石彊舞曲有朝天曲蓋自張重華據有涼州重譯來貢男伎者也其後國子為沙門來遊又傳其方音漢安帝時天竺獻伎能自斷手足刳腸胃唐髙宗惡其驚俗勅西域關津不令入中國亦一時英斷也商調有大朝天小朝天樂工人皂絲布頭巾白練襦紫綾袴緋帔舞二人辮髪朝霞袈裟行纒碧麻鞋其舞曲有小朝天南蠻北狄之俗皆隨髪際斷髪今舞者咸用繩維首反約髪折内於繩下此其本也大宛其國多善馬馬汗血其先天馬種其馬有肉角數寸或解人語言及知音樂其舞與鼓節相應觀馬如此其樂可知矣吐蕃其俗以麥熟為歲首圍棊六博吹蠡鳴鼓以為戲樂于闐其俗以十二月一日肆筵設席拍手撥胡琴唱歌故隋代胡部舞曲亦有于闐佛曲焉宋開寳中有僧吉祥以其國王書來上自言破疎勒國得舞象一欲以為貢詔從焉拂菻其國每歲蒲桃熟時造酒肆筵彈胡琴打偏鼓拍手歌舞以為樂焉南蠻九真徼外蠻其俗尚銅鼓以髙大為貴方其初成招致同𩔖飲食用金銀釵擊之扶南隋煬帝平林邑獲扶南工人及其匏琴朴陋不可用但以天竺樂轉寫其聲而不齒樂部赤土扶南之别種隋大業中遣常駿等使其國其王遣婆羅門鳩摩羅以舶三十艘吹螺擊鼓以迓之及使至女樂迭奏并用天竺樂婆利國梁天監中遣使通朝貢其王姓陳矯如出則以象駕輿施羽蓋珠簾其導從吹螺撃鼓以為樂林邑其樂有琴笛琵琶五弦頗同中國制度至於擊鼓以警衆吹蠡以即戎此其異也南蠻之樂多撃鼓吹螺附國在蜀郡西北其國俗好歌舞其樂器則鼓簧吹長笛有死者則子孫帯劒殺鬼報寃焉哥羅國漢時聞於中國其音樂有琵琶横笛銅鈸鐵鼓闍婆其樂有横笛鼓板亦能舞三佛齊其樂有小琴小鼓崑崙奴踏曲為樂占城其俗四月有游船之戲七月集民作歌禳災答謝天道其樂器有胡琴笛鼓大鼓牂牁其俗擊鼓銅鑼以祀神宋至道中來朝太宗令作本國歌舞一人吹瓢笙如蚊蚋聲良久十數軰連袂宛轉而舞以足頓地為節詢其名則曰水曲也張蕃其王每歲正月一日七月一日公衙㑹諸蕃飲宴亦動蕃樂上户女出嫁亦用銅鼓銅鑼焉龍蕃其俗凡遇四序稱賀作樂擊大鼓吹長笛批管律杖鼓其樂曲有賀聖朝天下樂應天長至於有物故者雷吉天鼓或唱挽歌焉石蕃其俗每遇四季節序㑹官屬宴樂其樂器有琵琶觱篥大鼓其曲各有願天長感天恩感皇恩天下樂云羅蕃其王每日授衙凡遇祭饗管設只於平川坡野間其作樂不過鳴大吹箶籚笙樂人踏舞而已撣國漢安帝時來獻樂及幻人能吐火自支解易牛馬頭大會作之於庭諫議大夫陳禪曰帝王之庭不宜作夷狄之樂南詔唐貞元中南詔異牟尋作奉聖樂舞因西川押雲南八國使韋臯以進上御麟徳殿閱之是不知古夷樂作於國門右辟之義也南詔調奉聖樂曲用黄鍾之宫舞六成舞伎六十四人贊引六人序曲二十八疊執羽而舞南詔奉聖樂字曲將終雷鼓作於四隅舞者皆拜金聲作而起執羽稽首以象朝覲每拜跪節以鉦鼓又為五均一曰黄鍾宫之宫二曰太蔟商之宫三曰姑洗角之宫四曰林鍾徴之宫五曰南吕羽之宫其文義繁雜不足復紀徳宗既閱於麟徳殿以授太常工人自是殿庭宴則立奏宫中則坐奏有坐部伎立部伎扶婁周成王之時南垂之南有扶婁國或於掌中備百獸之樂宛轉屈曲於指間人形長數分神怪歙忽莫可名狀後世樂府猶存此伎其歌舞之𩔖不可得而知見王子年拾遺記渤泥其國人宴會聚樂必坎鼓吹笛撃鈸批掌歌舞以為樂彌臣邉海之國其主以木柵居海際水中百姓皆樓居俗好音樂樓兩端各置鼓飲酒即擊之男女擕手樓中踏舞為樂在永昌城之西南古奴其俗晝夜作市舟中皆鳴鼓吹角以為樂其衣被頗𩔖中國白狼東漢明帝永平中朱輔為益州刺史移檄西南夷喻以聖徳白狼王菆等百餘國重譯來庭有歌詩三章輔所獻也東觀漢記備載其詞及夷人本語皆重譯訓詁為華言使覽曉焉歌三章其一逺夷樂徳其二逺夷慕徳其三逺夷懐徳大食麻囉㧞其俗每年以二月為歲首歌者多以胡琴吹笛鳴小鼓舞唱拍驃國唐貞元中重譯來朝獻樂凡一十曲工三十五人其國與天竺相近故樂多演釋氏經論之詞每為曲皆齊聲唱各以兩齊斂為赴節之狀一低一仰未嘗不相對有𩔖中國柘枝舞焉獠蠻獠蓋蠻之别種其王各有鼓角一雙使子弟自吹擊之多執矛用竹為簧羣聚鼓之以為音節邈黎其民俗七日一次禮佛作樂動胡琴打鼓子飲宴以為節序陳氏樂書曰樂有歌歌有曲曲有調故宫調胡名婆陀力調又名道調婆羅門曰阿修羅聲也商調胡名大乞食調又名越調又名雙調婆羅門曰帝釋聲也角調胡名涉折調又名阿謀調婆羅門曰大辯天聲也徵調胡名婆臘調婆羅門曰郍羅延天連也羽調胡名般涉調又名平調移風婆羅門曰梵天聲也變宫調胡名阿詭調也李唐樂府曲調有普光佛曲彌勒佛曲日光明佛曲大威徳佛曲如來藏佛曲藥師琉璃光佛曲無威感徳佛曲龜兹佛曲並入婆陀調也釋迦牟尼佛曲寳花步佛曲觀法會佛曲帝釋幢佛曲妙花佛曲無光意佛曲阿彌陀佛曲燒香佛曲十地佛曲並入乞食調也大妙至極曲解曲並入越調也摩尼佛曲入雙調也蘇密七俱陀佛曲日光騰佛曲入商調也邪勒佛曲入徴調也觀音佛曲永寧佛曲文徳佛曲婆羅樹佛曲入羽調也遷星佛曲入般涉調也提梵入移風調也北狄北狄之樂本馬上樂自漢以來總歸鼓吹部後魏樂府始有北歌史所謂貢人代歌是也代都時命掖庭宫人晨夕歌之用隋代與西涼樂雜奏當時存者五十三章其名可解者六章而已慕容可汗吐谷渾部落稽鉅鹿公主白淨王太子企喻是也梁樂府鼓吹又有太白淨皇太子小白淨皇太子企喻等曲隋鼓吹有白淨王太子曲與北歌校之其音皆異豈皆傳聞不同邪西涼節度蓋嘉運所進北庭伊州一北歌之一也唐開元中歌工長孫元忠之祖嘗授北歌於侯將軍貴昌正觀中詔貴昌以其聲教樂府能譯者亦不能通知其詞蓋年歲久逺失其真矣豈非荀卿所謂節奏久而絶者乎大遼有八部其渤海俗每歲時聚會作樂先命善歌舞者數輩前行士女隨之更相唱和回旋宛轉號曰踏鎚焉宋太宗雍熙四年帝以北戎侵軼惡軍中習蕃歌以雜華樂詔諸道禁止之至道元年定州言新羅設番人二十人自契丹亡歸傳送闕下帝召見便殿皆手持大螺如五升器稱在契丹十一年教令學吹此者凡五十軰帝令吹之聲重濁奮厲大率如角問其曲云單于並賜衣服緡錢𨽻軍籍鮮卑周隋世北歌與西涼樂雜奏其不可解者多可汗之辭是燕魏之際鮮卑歌也後世惟琴曲傳胡笳聲云陳氏樂書曰隋大業中備作六代之樂華夷交錯其器千百煬帝分為九部以漢樂坐部為首外以陳國樂舞玉樹後庭花也西涼與清樂并龜兹五天竺國之樂并合佛曲法曲也安國百濟南蠻東夷之樂並合野音之曲胡旋之舞也樂苑又以清樂西涼龜兹天竺康國疎勒安國髙麗禮畢為九部必當損益不同始末異制不可得而知也觀開皇中顔之推上言今太常雅樂盡用胡聲請憑梁國舊事考尋古曲髙祖曰梁亡國之音奈何遣我用邪由此觀之隋唐之樂雖有雅夷俗三者之别實不離邉聲也歴代沿襲其失如此聖朝宜講制作削去而釐正之實萬世利也按明堂位言昧東夷之樂也任南蠻之樂也周禮韎師掌教韎樂韎即昧也獨西戎北狄之樂不見於經豈周之興也肇於西北而化行及於東南故必俟東夷南蠻之樂盡入於王府然後足以言聲教之逺被邪然觀隋唐所謂燕樂則西戎之樂居其大半鄭夾漈以為雅頌亦自西周始凡清樂妙舞未有不自西出者八音之音以金為主五方之樂惟西是承雖曰人為亦莫非禀五行之精氣而然是固一說也愚又以為自晉氏南遷之後戎狄亂華如苻氏出於氐姚氏出於羌皆西戎也亦既奄有中原而以議禮制度自詭及張氏據河右獨能得華夏之舊音繼以吕光秃髪沮渠之屬又皆西戎也蓋華夏之樂流入於西戎西戎之樂混入於華夏自此始矣隋既混一合南北之樂而為七部伎所謂清商三調者本中華之樂晉室播遷而入於涼州張氏亡而入於秦姚氏亡而入於江南陳亡而復入北其轉折如此則其初固本不出於西戎也徹樂周官大司樂凡日月食四鎮五嶽崩大傀異烖諸侯薨令去樂四鎮山之重大者謂揚州之㑹稽青州之沂山幽州之毉無閭冀州之霍山五嶽岱在兖州衡在荆州嵩在豫州華在雍州恒在并州傀猶怪也大怪異災謂天地奇變若星辰奔霣及震裂為害者去樂藏之也春秋傳曰壬午猶繹萬入去籥萬言入則去者不入藏之可知傀劉九靡反舊音怪大札大凶大烖大臣死凡國之大憂令弛縣札疫癘也凶凶年也烖水火也弛釋下之若今體兵鼓之為魯宣公八年六月辛巳有事於太廟仲遂卒於垂壬午猶繹萬入去籥繹又祭陳昨日之禮所以賓尸萬舞名籥管也猶者可止之辭魯人知卿佐之喪不宜作樂而不知廢繹故内舞去籥惡其聲聞仲尼曰非禮也卿卒不繹昭公十五年二月癸酉有事於武宫籥入叔弓卒去樂卒事禮也晉知悼子卒未葬悼子晉大夫荀盈平公飲酒與羣臣宴師曠李調侍侍與君宴也燕禮記曰請旅侍臣李調如字左傳作外嬖之叔鼓鐘樂作也燕禮賓入門奏肆夏既獻而樂闋獻君亦如之杜蕢自外來聞鐘聲曰安在怪之也杜蕢或作屠蒯曰在寢杜蕢入寢歴階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出三酌皆罰平公呼而進之曰蕢曩者爾心或開予是以不與爾言曩向也謂始來入時開謂諫爭有所啟發爾飲曠何也曰子卯不樂紂以甲子死桀以乙卯亡王者謂之疾日不以舉樂為吉事所以自戒懼知悼子在堂斯其為子卯也大矣言大臣喪重於疾日也雜記曰君於卿大夫比葬不食肉比卒哭不舉樂曠也太師也不以詔是以飲之也詔告也太師典奏樂爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也言調貪酒食䙝嬖也近臣亦當規君疾憂爾飲何也曰蕢也宰夫也非刀七是供又敢與知防是以飲之也防禁放溢平公曰寡人亦有過焉酌而飲寡人聞義則服杜蕢洗而揚觶舉爵於君也禮揚作騰揚舉也又送也揚近得之公謂侍者曰如我死則必毋廢斯爵也欲後世以為戒至於今既畢獻斯揚觶謂之杜舉此爵遂因杜蕢為名畢獻之賓與君左傳晉荀盈如齊逆女自為逆還六月卒於戲陽魏郡内黄縣殯於絳未葬晉侯飲酒膳宰屠蒯趨入請佐公使尊公之使人執尊酌酒請為之佐許之而遂酌以飲工工樂師師曠曰女為君耳將司聰也樂所以聰耳辰在子卯謂之疾日疾惡也注見前君徹宴樂學人舍業為疾故也君之卿佐是謂股肱股肱或虧何痛如之言痛疾過於忌日女弗聞而樂是不聰也又飲外嬖嬖叔外都大夫之嬖者曰汝為君目將司明也職在外故主視服以旌禮旌表也禮以行事事政令事有其物物𩔖也物有其容容貌也今君之容非其物也有卿佐之喪而作樂歡會故曰非其物而女不見是不明也亦自飲也曰味以行氣氣以實志氣和則志完志以定言言以出令臣實司味二御失官而君弗命臣之罪也公說徹酒曲禮君無故玉不去身大夫無故不徹縣士無故不徹琴瑟憂樂不相干也故謂災禍喪病陳氏樂書曰父有服宫中子不與於樂母有服聲聞焉不舉樂妻有服不舉樂於其側大功將至辟琴瑟小功至不絶樂蓋樂不止於琴瑟而琴瑟特常御者而已曲禮曰君子無故不徹琴瑟大功之親有服其將至則為有故矣雖辟琴瑟可也未至則不必辟矣小功之親有服雖至不絶樂其將至又可知矣若夫於已有小功之喪議而及樂又禮之所棄也又曰魯人朝祥而暮歌孔子以為踰月則其善也孟獻子禫架而不樂孔子以為加於人一等矣蓋朝祥暮歌者於禮為不及故必踰月然後善禫架而不樂者於禮為過故不謂之知禮特謂之加於人一等而已祥而縞是月禫徙月樂然則祥而外無哭者禫而内無哭者非樂當作之時也祥而踰月禫而徙月樂作之時也祥禫而樂作豈先王因人情而為之節文邪後漢仲長統論散齋可宴樂御史大夫郗慮奏改國家齋日從古制諸祭祀皆十日致齋七日散齋三日致齋散齋之日内有嘉慶之事或言可賀會宴樂或言不可尚書令荀彧與臺郎董遇議曰禮志云三日齋一日用之猶恐不敬二日伐鼓何居音姬又云君致齋於外夫人致齋於内散齋則是事之漸然則散齋未絶外内與宴樂之事今一歲之内大小祭祀齋將三百日如此無復用樂之時古今之制當各從所宜若外張多日而内實犯禮乃所以廢齋也散齋宜從得會宴樂晉有司下太常曰朝廷遏密則素會時云應懸而不樂博士孔恢議曰素會宜都懸設樂為作不作則不宜懸也孟獻子懸自是應作而不作耳故夫子曰加於人一等非為不應作而應懸也國諱尚近謂金不可陳於庭也於時不從恢議正朝自懸而不作徐廣論曰魏武以正月崩魏文以其年七月設伎樂百戲是則魏不以喪廢樂也晉武以來國有大喪輙廢樂三年恵帝太安元年太子喪未除及元會亦廢樂穆帝永和中為中原山陵未修復頻年元會廢樂是時太后臨朝后父褚裒薨元會又廢樂孝武太元六年為皇后王氏喪亦廢樂孝武崩太傅録尚書會稽王道子議山陵之行通婚嫁不得作樂以一期為斷漢魏故事將葬設吉凶鹵簿皆有鼓吹新禮以禮無吉駕導從之文臣子不宜釋其縗麻以服元黄除吉駕鹵簿又凶事無樂遏宻八音除凶服之鼓吹摰虞以為葬有祥車曠左則今之容車也既葬日中反虞迎神而還春秋傳鄭大夫公孫蠆丑介反卒天子追賜大路使以行士喪禮葬有槀乗車以載生之服此皆不唯載柩兼有吉駕之明文也既設吉駕則宜有導從以平生之容明不致死之義臣子縗麻不得為身而釋以為君父則無不可顧命之篇足以明之宜定新禮設吉服導從如舊其凶服鼓吹宜除詔從之恵帝永寧元年冬愍懐太子母喪三年制未終大司馬府參軍江統議二年正會不宜舉樂引春秋傳曰母以子貴而儒者謂傳重非嫡服同衆子經無明據於義為短今太子正位東宮繼體承業監國嘗膳既處其重無復議其輕制也二年正會不宜舉樂懐帝永嘉元年冬恵帝三年制未終司徒左長史江統議二年正會不宜作樂以為自古帝王相承雖生及有異而受重同禮禮王侯尊殊得臣諸父兄弟故以僖嗣閔左氏謂之逆祀雖代變時殊質文不同至於受重尊祖敬宗其義一也書稱遏宻諒闇之事或以縗麻卒禮或以心喪終制故周景王有后嫡子之喪既葬除服而宴樂叔向曰王宴樂已早二年正會不宜作樂愍帝建興元年十二月元帝時為丞相在建業主簿熊逺議以懐帝梓宫未返正會不宜作樂謹按尚書堯崩四海遏宻八音禮凶年天子徹樂減膳孝懐皇帝崩於虜廷梓宫未返人神同忿兆庶怨嗟公與國同體憂容未歇如矜黎庶塗炭之困久廢歡悅伎樂之事謂宜設饌以賜羣下而已大將軍王敦時南門祭酒范堅白事云伏見每元會衆樂備奏倡伎兼作愚淺多蔽竊有未安今國恥未雪梓宫幽遐不應備樂敦使州府博議參軍周武議云禮古今不同謂宜取則於朝廷敦從之晉符問章皇后雖哀限未終后主已入廟當作樂不博士徐䖍議引周景王有后嫡子之喪既葬除服而宴樂叔向猶議之今宜不懸䖍又引周禮有憂則弛懸今天子蒙塵攝主不宜作樂但先人血祀不可廢耳魯莊公主已入廟閔公二年吉禘猶曰未可以吉是不係於入廟也謂不宜設樂晉征北將軍褚裒薨皇太后之父未葬太后居喪符問皇帝元會當作樂不尚書王彪之議今若鐘懸鼓吹皆可以作者其餘羽毛絲竹奚為廢之竊所未喻元皇后秋崩武帝咸寧元年饗萬國設樂恭皇后夏崩成帝咸康八年饗萬國不盡徹樂未詳二帝故事孰得孰失且恭皇后崩垂向周月朝行權制六宫煥然故以即吉經時雖尊於萬國然於帝為卑不盡徹樂之詔或指在於斯也縱令咸康末不盡徹樂以為合禮亦非所以證今明喻也禮云母有喪聲聞焉則不舉樂夫人之事親尊自王者達於庶人不以貴賤異禮也皇太后始居至哀縗麻服在躬號哭無時鐘鼓歌簫之音實聞於内殿非禮所謂不舉樂之說今所欲存者輕所為廢者重畧輕崇重附禮合情敦於體訓於是乎在意如前議謂應設鼓懸鐘而不作晉時廣昌鄉君䘮御史中丞熊逺表宜廢小會逺言被符冬至後小會廣昌鄉君䘮殯日淺禮大夫死廢一時之祭祭猶可廢况餘事乎冬至唯其羣下奏賀而已未宜便小會有詔以逺表議示太常賀循曰咸寧二年武皇帝故事三朝發哀三日不舉樂今舊事明文卿詳疑處答循言臣按禮雜記君於卿大夫比卒哭不舉樂今雖降而無服三月之内猶錫縗以居不接吉事如逺所啓咸寧詔書雖不合古義然隨時立宜以為定制誠非羣下所得誚論穆帝升平元年冬至節小會廬陵公主未葬符問應作樂不博士荀訥曹耽等言君於大夫比卒哭不舉樂公主加有骨肉之親宜闕樂太常王彪之引晉武帝詔應作樂按武皇詔三朝舉哀者三旬乃舉樂其一朝舉哀者三日則舉樂太始十年春長樂長公主薨太康七年秋扶風武王薨武皇並舉哀三日而已中興以來更參論不改此制今小會宜作樂穆帝納后用九月九日是康帝忌月於時疑不定下太常禮官荀訥議稱禮只有忌日無忌月語若有忌月即有忌時忌歲益無禮據當時從訥所議軍樂是軍容與常樂不等謂振作於事無嫌從之唐貞觀二十三年髙宗即位詔宜以來年正月二日受朝其樂懸及享羣臣並停永徽元年正月有司言依禮享祀郊廟並奏宫懸比停教習恐致廢忘伏尋故實漢魏祇祔之後庶事如舊國之大禮祠典為先今既逾年理宜從吉若不肄習即恐不調誠敬有虧致招罪責並從之代宗大歴十四年禮儀使吏部尚書顔真卿奏謹按周禮大司樂職云諸侯薨令去樂大臣死令弛懸鄭注云去謂釋下也且知哀輕者釋哀重者藏又晉元后秋崩武帝咸寧元年饗萬國不設樂晉博士孔恢議朝廷遏宻懸而不樂恢以為宜都去懸設樂為作不作則不宜懸國哀尚近諸金石不可陳於庭伏請三年未畢朝會都不設懸如有大臣薨殁則事輕宜懸而不作勅付所司宋仁宗嘉祐七年祕閣校理裴煜奏大祠與國忌同者有司援舊制禮樂備而不作忌日必哀志有所至其不有樂宜也然樂所以降格神祗非以適一已之私也謹按開元中禮部建言忌日享廟應用樂裴寛立議廟尊忌卑則作樂廟卑忌尊則備而不奏中書令張說以寛議為是宗廟如此則天地日月社稷之祠用樂明矣臣以為凡大祠天地日月社稷與忌日同者伏請用樂其在廟則如寛之議所冀畧輕存重不失其稱下其章禮官議曰傳稱祭天以煙為歆神之始以血為陳饌之始祭地以埋為歆神之始以血為陳饌之始宗廟以灌為歆神之始以腥為陳饌之始然則天地宗廟皆以樂為致神之始故曰大祭有三始謂此也天地之間虚豁而不見其形者陽也鬼神居天地之間不可以人道接也聲屬於陽故樂之音聲號呼召於天地之間庶幾神明聞之因而來格故祭必求諸陽商人之祭先奏樂以求神先求於陽也次灌地求神於隂達於淵泉也周人尚臭四時之祭先灌地以求神先求諸隂也然則天神地祗人鬼之祀不可去樂明矣今七廟連室難分廟忌之尊卑欲依唐舊制及國朝故事廟祭與忌同日並懸而不作其與别廟諸后忌同者作之若祠天地日月九宫泰一及䄍百神並請作樂社稷以下諸祠既卑於廟則樂可不作翰林學士王珪等以為社稷國之所尊其祠日若與别廟諸后忌同者伏請亦不去樂詔可神宗熙寧元年冬至親郊在諒闇内音樂縁事神皆不可廢於是禮院請郊廟及景靈宫用樂外鹵簿鼓吹及樓前太常鈞容等樂皆備而不作其警場但鳴金鉦鼓角而已詔可自後或有故則廢樂則用以為例髙宗紹興十二年初上居諒闇臣僚有請明堂行禮宜停罷奏樂受胙等事上亟諭禮官詳定太常寺檢照景徳熙豐親郊典故除郊廟景靈宫並合用樂其鹵簿鼓吹及樓前宫架諸軍音樂皆備而不作每處警場止鳴金鉦鼓角而已即無去奏樂受胙之文大饗為民祈福為上帝宗廟而作樂禮不敢以卑廢尊書斂五福錫庶民况熙寧禮尤可考其赦文有曰六樂備舞祥祉來臻是也然後詔遵舊典行之其後禮部侍郎施坰奏禮經蕃樂出於荒政蓋一時以示貶抑昨内外暫止用樂今徽考大事既畢慈寧又已就養其時節上夀理宜舉樂一如舊制禮部尋言太母還宫國家大慶四方來賀自今冬至元正舉行朝賀之禮依國朝故事合設大仗及用樂舞等庶幾明天子之尊舊典不至廢墜有詔俟來年舉行孝宗初踐大寳立班設仗於紫宸殿備陳雅樂禮官尋請車駕詣太廟親行朝饗用登歌金玉大樂及綵繪宫架樂舞其於受終文祖之義有光而在前朝亦為闕典獨鼓吹樂在仗内以欽宗䘮制而遏音迨安穆皇后祔廟禮部侍郎黄中首言國朝故事神主亦祔係用鼓吹導引前至太廟乃用樂舞行事宗廟薦享雖可用樂鼓吹施於道路情所未安請備而不作續給舎詳議謂薦享宗廟為祖宗也故以大包小則别廟不嫌於用樂今祔廟之禮為安穆而行豈可與薦享同日語將來祔禮謁祖宗諸室當用樂舞至别廟奉安宜停而不用蓋用樂於前殿是不以欽宗而廢祖宗之禮停樂於别廟是安穆為欽宗䘮禮而屈也如此則於禮順義允遂俞其請既而右正言周操上言祖宗前殿尊無二上其於用樂無復有嫌然用之享廟行禮之日亦可而用於今日之祔則不可蓋祔禮為安穆而設則其所用樂是為安穆而用雖曰停於别廟而為祔后用樂之名猶在也孰若前後殿樂俱不作為盡善盡美無可議哉詔從之隆興元年天申節率羣臣詣徳夀宫上夀議者以欽宗服除當舉樂事下禮曹黄中復奏曰臣事君猶子事父也春秋賊未討不書葬以明臣子之責况欽宗實未葬而可遽作樂乎上韙其言事遂寢建炎以來朝野雜記故事北使來朝例錫花宴如在大祀齋之中則不用樂辭見亦然行之久矣乾道三年北使來朝會慶節上夀在親郊散齋之内陳正獻公時以副樞兼參預請令館伴以禮諭之而議者慮生事多請權用樂者李文簡為吏部郎官建言漢唐祀天地散齋四日致齋三日我藝祖初郊亦然自崇寧大觀法周禮分祭天地故前十日受誓戒今既合祭宜復漢唐及本朝舊制庶幾兩得上頗難之陳公又奏必不得已則上夀之日設樂而宣㫖罷之及宴使客然後復用庶幾事天之誠得以自盡而所以禮使人者亦不為薄自當悅服矣上可其奏且曰宴殿雖進御酒亦毋用樂唯於使人乃用之耳諸公顧以為紫宸上夀乃使客之禮固執前議陳公又不可獨奏言曰適奉詔㫖有以見聖學髙明過古帝王逺甚臣敢不奉詔然猶竊謂更當先令館伴以初議諭使人再三不從乃從今詔則於禮為盡而彼亦無詞不可遽鄙逺人而遂自為失禮以徇之也蔣子禮猶守前說陳公爭愈力上顧陳公曰可即諭閣門行之陳公退復為奏曰彼初未嘗必欲用樂我乃望風希意而自欲用之彼必􅀏我以敵國之臣而虧事天之禮他時輕侮何所不至此尤不可不留聖慮上嘉納焉既而卒詔垂拱上夀止樂正殿為北使權用六年生辰使當辭復在親郊散齋之内趙溫叔丞相時以起居舍人為館伴使面奏决不可用樂上然之十月癸酉北使辭先一日上遣中使諭温叔云來日已决意不用樂萬一使人不順不知如何結末請舎人更加思慮來日五更奏來温叔復奏殿陛之上怱怱行酒使人决不能省會萬一省會亦必不敢不順萬一不順臣恭備員館伴當乞直前奏稟乞宣諭使人陛下寅畏上天今既散齋决不使樂若使人必欲使樂乞移此茶酒就驛中管領所謂結末不過如此上納用焉或謂前郊北使之來極恭順上喜思以異禮待之故葉魏二相皆主用樂之議鄭景望劉文潛時為館職嘗移書政府論之而不聴也至是用趙公之義始去樂論者韙之文獻通考卷一百四十八
