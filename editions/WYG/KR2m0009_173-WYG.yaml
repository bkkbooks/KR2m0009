body:
  text: 文獻通考卷一百七十三鄱陽馬端臨貴與著刑考十二赦宥梁太祖開平元年即位大赦改元開平三年正月祀圜丘大赦十一月告謝圜丘大赦乾化元年大赦郢王友珪即位大赦均王乾化三年祀圜丘大赦唐莊宗同光元年即位大赦二年祀南郊大赦容齋洪氏隨筆曰赦過宥罪自古不廢然行之太頻則惠姦長惡引小人於大譴之域其為害固不勝言矣唐莊宗同光二年大赦前云罪無輕重常赦所不原者咸赦除之而又曰十惡五逆屠牛鑄錢故殺人合造毒藥持杖行刼官典犯贓不在此限此制正得其中當亂離之朝乃能如此亦可取也而今時或不然明宗天成元年即位大赦長興元年祀圜丘大赦閔帝即位大赦潞王清泰元年即位大赦晉髙祖天福元年十一月即位大赦十二月入洛陽大赦二年至汴州大赦三年大赦左散騎常侍張允進駮赦論曰竊觀自古帝王皆以水旱則降徳音而宥過開狴牢而放囚冀感天心以救其災者非也假有二人訟一人有罪一人無罪遇赦則有罪者􅄑免無罪者銜寃銜寃者何疎見赦者何親寃氣升聞乃所以致災非弭災也小民遇天災則喜皆勸為惡曰國家好行赦必赦我以救災如此則赦者教民為惡也且天道福善禍滛若以赦為惡之人而變災為福是則天助惡民也或曰天降之災警誡人主豈以濫捨有罪而能救其災乎上嘉納之中書舍人李詳上疏以為十年以來赦令屢降諸道職掌皆許推恩而藩方薦論動踰數百乃至藏典書吏優伶奴僕初命則至銀青階被服皆紫袍象笏名器僭濫貴賤不分請自今諸道主兵將校之外節度州聼奏朱記大將軍以上十人他州止聼都押牙都虞候孔目官自餘但委本道遷職名而已按赦之為言宥有罪之謂也後来之赦非獨宥罪而已又從而推恩焉於是有罪者􅄑免無功者超遷刑賞俱失皆由於赦其無益而有害也明矣齊王即位大赦開運元年大赦改元二年大赦四年契丹主入汴大赦漢髙祖即位大赦乾佑元年大赦改元隱帝即位大赦二年大赦周太祖廣順元年即位大赦顯徳元年祀圜丘大赦世宗即位大赦二年克鳯州曲赦秦鳯階成境内三年赦淮南諸州繫囚恭帝即位大赦宋朝赦宥之制其非常覃慶則常赦不原者咸除之其次釋雜犯死罪以下皆謂之大赦或止謂之赦雜犯死减等而餘罪釋之流以下减等杖笞釋之皆謂之徳音亦有釋雜犯罪至死者其恩霈之及有止於京城兩京兩路一路數州一州之地者則謂之曲赦太祖皇帝建隆元年受周禪大赦改元二年以皇太后疾赦乾徳元年四月平荆湖赦其地十一月郊大赦詔兩京諸道自後犯竊盗不得預郊祀之赦所在長吏當告諭下民毋令冒法是後將祀郊丘必申此詔三年平蜀赦其地開寳元年郊大赦四年二月平廣南赦其地十一月郊大赦八年平江南赦其地九年郊大赦太宗即位大赦改元太平興國三年郊大赦詔自元年十二月二十二日以後即登極赦京朝幕府州縣官犯入已贓除名配諸州者縱逢恩赦不在放還之限帝嘗因郊禮議赦有秦恩者上書願勿赦引諸葛亮佐劉備數十年不赦事上頗疑之時趙普對曰凡郊肆眚聖朝彛典其仁如天堯舜之道也若劉備區區一方臣所不取上善其對赦宥之文遂定四年平河東赦其地二年五月以旱大赦十一月郊大赦雍熙元年郊大赦端拱元年大赦少府監言犯贓配役人郭冕等九人皆嘗任京朝官會赦當叙用上曰冕等贓吏不可復齒仕版止令釋遣之淳化四年郊大赦五年大赦至道元年立皇太子大赦二年郊大赦真宗即位大赦咸平二年郊大赦詔如聞小民知有恩赦故為刼盗自今不在原免之限五年郊大赦景徳元年大赦二年正月大赦十一月郊大赦大理寺言郊禮在近諸州奏按多不精詳冀於覆駮延留以俟恩宥請自今有侵損贓私事狀明白公然抗拒當駮退者即具情實定斷以絶僥倖詔可大中祥符元年正月以天書降大赦十月封禪禮成大赦四年祀后土睢上大赦五年聖祖降大赦七年恭謝東郊大赦八年正月上玉皇聖號大赦閏六月以日食大赦天禧元年上玉皇聖祖寳冊大赦江南提㸃刑獄范應辰上言伏覩卒亥制書常赦不原者咸除之謹按呂刑云兩造具備師聼五辭五辭簡孚正於五刑五刑不簡正於五罰五罰不服正於五過繇是五刑之疑有赦五罰之疑有赦其来詳矣臣今所部州軍過悞而被宥者雖多竊害而䝉釋者亦衆葢以姦凶之輩密斷赦期百計是為萬端斯起發其夙憾狃於忿心單弱受辜强梁肆暴或舉家隕命罄室虜財或持刃殺人肝腦塗地或縱火焚舍藴蓄蕩空至有糾輕生之徒為强剽之盗公行戕害以奪資儲廵警之官上逼下逐設謀緝捕冒險鬬敵科罰耆伍薄責令尉以兹敗獲合正典刑逢此霈恩亦蠲其罪悉又配為卒伍咸給衣糧今力耕之人有受其寒餒者而此輩季賜以服月賦以粟又何異賞人為盗者邪與夫疑則赦之言殊矣望自今應有知赦在近而固為罪戾若赦後彰顯情理切害者死罪以下止遞减一等赦前殺人剽財赦後雖不復為若因事捕獲决𨽻逺惡州軍其殺人放火虜刼財貨已依赦配本城者如更配逃亡飲博之罪依禁軍例科斷其重罪該原而情理切害者所在長吏籍其犯由若再黷憲綱不以罪之大小禁錮奏裁其州縣官吏侮刑受賂望止原其罪而削其官以申警戒焉上覽之頗嘉其盡心然以赦數則不可無之實難也二年七月彗見大赦八月立皇太子大赦三年八月以天書再降大赦十一月郊赦四年大赦五年赦乾興元年大赦仁宗即位大赦天聖二年郊大赦五年郊大赦八年郊大赦明道元年八月大赦十一月大赦改元二年二月躬耕籍田大赦三月以皇太后不豫大赦景祐元年以星變大赦二年郊大赦寳元元年郊大赦慶歴元年郊大赦四年郊大赦五年大赦皇祐二年大享明堂大赦四年郊大赦至和二年八月赦京輔先是正月已降徳音知諫院范鎮言京輔歳一赦而去歳再赦今歳三赦又在京諸軍嵗再賜緡錢姑息之政無甚於此夫歳一赦者細民謂之熱恩以其必在五六月間也姦猾為過指以待免况再赦三赦乎今備塞之兵五六十萬使聞京師端坐受賜者能不動心哉請自今罷所請一赦以摧姦猾而使善良得以立也罷兵士之特賜以均内外而使民得以寛也嘉祐元年正月大赦二年大享明堂大赦八年上不豫大赦帝在位久明於人之情偽尤惡人訐隂事一時士大夫亦習為惇厚而小人乗間密上書疏過失又數按人赦前事翰林學士張方平言中外官多發人積年罪狀及奏劾事輙請不以赦原咸快一時之小忿失天下之大信相沿敝迹寖成險俗棄瑕録善義則不然自今有類此者請以故違制書坐之其後御史呂誨復以為言詔曰比者中外多上章言人過失暴揚難騐之罪告案無證之辭或外託公言内縁私忿詆欺曖昧茍䧟善良又赦令者所以與天下更始而有司多舉按赦前事殆非信命令重刑罰使人洒心自新之意也自今有上章告人罪及言赦前事者訊之至於言事之官宜務大體非關朝政自餘小過細故勿須察舉英宗即位大赦治平二年郊大赦三年大赦仁宗世大赦二十二曲赦五徳音十五録繫囚五十八英宗世大赦二徳音三録繫囚七其赦常赦所不原罪唯仁宗英宗即位及明道中太后不豫行之然明道所行人以為濫既而詔殺人者雖會前赦皆刺𨽻千里外牢城世或謂三歳一赦於古未有景祐中言者以為三王歳親祀圜丘未嘗輙赦自唐兵興以後事天之禮不常行因有大赦以蕩亂獄且有罪者宥之未必自新被害者抑之未必無怨不能自新將復為惡不能無怨將悔為善一赦而使民悔善長惡政教之大患也願罷三歳一赦使良民懐惠凶人知禁或謂未可盡廢即請命有司前郊三日理罪人有過誤者引而赦之州縣須詔到倣此疏奏朝廷重其事第詔自今罪人情重者毋得一以赦免然亦未嘗行神宗即位大赦詔曰夫赦令國之大恩所以蕩滌瑕穢納於自新之地是以聖王重焉中外臣僚多以赦前事捃摭吏民興起訟獄茍有詿誤咸不自安甚非持心近厚之誼使吾號令不信於天下其申詔内外言事按察官司毋得依前舉劾具按取㫖否則科違制之罪知諫院司馬光上言竊惟按察之官以赦前事興起獄訟枉繫平民及以輕淺之罪奏乞不原聖恩禁之誠為大善至於言事之官事體稍異恐難以一例指揮何則御史之職本以䋲按百辟糾擿姦邪之狀固非一日所為國家素尚寛仁數下赦令或一歳之間至於再三若赦前之事皆不得言則其可言者無幾矣萬一有姦邪之臣朝廷不知誤加進用御史欲言則違今日之詔若其不言則陛下何從知之臣恐因此言者得以箝口偷安姦邪得以放心不懼此乃人臣之至􅄑非國家之長利也請追改前詔刋去言事兩字光論復數至再帝諭以言者好以赦前事誣人光曰若言之得實誠所欲聞若其不實當罪言者帝命光送詔於中書熙寜元年郊大赦四年大享明堂大赦七年帝以旱欲降赦時已兩赦王安石曰湯旱以六事自責曰政不節歟若一歳三赦是政不節非所以弭災也乃止七年郊赦八年彗出大赦十年郊赦元豐三年大享明堂赦五年景靈宮成大赦六年郊赦大理少卿劉衮言赦書以赦降日昧爽以前為限非次恩霈人難預期請依徳音例以赦到日為限從之八年上不豫大赦立皇太子大赦哲宗即位大赦元祐元年大享明堂赦門下省言當官以職事曠隳雖去官不免猶可言至於赦降大恩與物更始雖刼盜殺人亦䝉寛宥豈可以一事差失負罪終身今刑部所修不以去官赦降原减條所留尚多所刪尚少請更刪改存留從之四年大享明堂赦七年郊大赦八年赦門下侍郎韓維言請自今每近郊赦令刑部大理寺開封府並依常時决遣獄訟不减日限其情重難釋者别為一等奏斷從之紹聖二年大享明堂赦四年四月西邊進築赦陜西河東九月彗出氐赦元符元年郊赦二年以西邊進築畢功赦陜西河東三年上不豫大赦中書省言元祐編敇惟傳習妖教託幻變之術及故盗决河堤堰不以赦降原减餘犯一再遇非次赦或兩經大禮者聼從原免元符新敕刪去遂使犯法者無由自新詔依元祐法徽宗即位大赦元符三年正月四月皇太子生大赦建中靖國元年郊赦崇寜二年大赦三年郊赦五年彗出西方赦大觀元年正月大赦九月大享明堂赦二年受八寳赦四年五月星孛奎婁大赦十一月郊赦政和元年受元圭大赦三年四月赦梓䕫路十一月郊赦四年祭地赦五年立皇太子赦知興仁府夏鰭言諸路奏獄有因祖父母為人所毆而子孫毆之以致死者並坐情理可憫奏裁多免流配若遇赦則不復奏裁即作鬬殺情理減等流配是不遇赦者為􅄑遇赦者為不􅄑請自今雖遇赦亦令奏裁從之六年上玉皇號大赦修京西大内成赦京西路十一月郊赦七年大享明堂赦重和元年受定命寳大赦三月赦四川及陜西河東九月大享明堂赦十一月改元大赦宣和元年赦陜西河東三年討方臘大赦方臘平赦江浙淮南等路四年郊赦五年入燕赦兩河燕雲路六年大赦七年五月赦山東河北十一月郊赦欽宗即位大赦靖康元年五月赦河北神宗大赦凡十一即位覃恩一南郊四明堂二星變一景靈宫成奉安一帝不豫祈福一立皇太子一曲赦凡十一兩京鄭州河陽以山陵畢功河北諸州以水災地震西京以奉安二后神御河東陜西以師旅熙河秦鳯以恢復而熙河獨再廣東西湖南以交趾平潁昌府以帝藩邸受封梓州路以夷人平徳音凡八以冬無雪以皇子生以日食正陽之月者再以奉安中太一以慈聖光獻皇后弗豫以山陵復土以四后升祔親録在京繫囚凡十五及諸路者一及西京者二哲宗大赦凡八即位覃恩一南郊二明堂三太皇太后不豫一星變一帝不豫一徳音凡九兩京畿河陽以永裕陵復土西京以修奉應天禅院會聖宮影殿成兩京畿河陽鄭州以宣仁皇后山陵復土陜西河東兩路以西邊進築九城以建西安州而連雪久隂上清儲祥宮成受傳國寳皇子生皆及天下徽宗大赦二十六即位覃恩一南郊八明堂三皇子生親謁原廟九鼎成星變二受八寳受元圭立皇子上玉皇尊號受定命寳太一宮成罷方田収復燕雲曲赦十四荆湖北路以平荆湖猺賊熙河秦鳯永興軍路以收復湟州熙河蘭湟路以撫定鄯廓熙河陜西河東京西路以興復觧鹽池寳廣西以郎康居之屬納土熙河蘭湟秦鳯永興軍路以闢陜西疆土四川以平西南夷淮南西路以平淮南賊陜西河東路以破西夏陜西河東路以夏人納欵河北河東路以收復燕京燕山府雲中路徳音二十七西京畿内以日食以皇太后罷同聼政兩京畿河陽鄭州以永泰陵復土以陞端州為肇慶府以皇太后服藥以日食正陽之月兩京畿河陽以欽聖憲肅皇后園陵復土西京畿内以景靈西宮成西京畿内河陽鄭州以欽成皇后園陵復土西京畿以哲宗神御殿成西京畿内以延福宮火以陞澶州為開徳府真光夀舒和宿泗楚揚亳蘇常湖潤杭秀越潁徐拱州髙郵無為軍江寜潁昌府河南應天府及陳留縣管内以妖賊張懐素平兩京河陽鄭州以帝疾康寜以收復溱播州梓䕫路兩京畿河陽鄭州管内以昭懐皇后園陵復土河北京西京東路以修三山河橋成兩浙江東福建淮南路以方臘伏誅京東河北路以盗賊而北郊凡三以禁中神御成以皇帝元命之月以神霄宮成皆及天下欽宗大赦二即位覃恩金國講和徳音一河北路以金人出境髙宗建炎元年五月即位於南京大赦改元六月以皇長子生大赦右僕射李綱言登極赦獨遺河東北而不及勤王之師夫兩路為朝廷堅守而赦令不及勤王之師雖未嘗用然在道半年亦已勞矣况疾病死亡者不可勝數恩恤不及後復有急何以使人上嘉納故此赦於二者特詳二年十一月郊赦三年二月上如杭州大赦三月苖傅劉正彦叛請太后聼政大赦四月上復位大赦四年三月以敵退大赦紹興元年正月上在越州大赦改元九月大享明堂大赦二年九月以彗出大赦四年大享明堂大赦七年大享明堂大赦九年正月以大金講和大赦十年大享明堂大赦十二年以皇太后至臨安大赦十三年郊赦十五年四月以彗出東方大赦十六年郊赦十九年郊赦二十二年郊赦二十五年郊赦右正言凌哲言陛下深念比年臣僚有縁誣告不測之罪投竄遐裔無路自明廼因郊祀赦曠然與之昭雪或除罪籍或復元官寃憤既伸萬物吐氣甚盛徳也至於姦贓狼籍已經按治蹟狀顯著人所共知者亦復巧飾詞理公肆誕謾咸以違忤權臣為辭今陛下方開公正之路小人乃欲啟僥倖之門此正清議之所不容也又况此曺嗜利之人與生俱生未易悛革倘復齒仕途再臨民社且益務掊尅以殘虐吾民其害將有甚於前日矣請特詔有司應自今陳雪過名之人並須檢會元犯事因如係贓罪已經勘劾者乞止依元斷條法施行詔刑部㸔詳本部言命官犯罪若元因論訴按發鞫勘贓證結録别無畨異者並欲具元斷因依告示其餘特放罪或因縁連坐之人後來有司看詳委有寃抑者即行開具因依申取朝廷指揮從之二十八年郊赦二十九年以太后不豫大赦三十一年大享明堂赦十二月以敵渝盟上親征赦新復州軍孝宗受内禪即位大赦隆興二年十一月赦沿邊諸州乾道元年正月郊赦八月立皇太子大赦三年七月以皇太子疾大赦十一月郊赦六年十一月郊赦七年二月立皇太子大赦淳熙二年行上皇慶夀禮大赦三年十一月郊赦六年大享明堂赦九年大享明堂赦大理卿王尚之言近以民間詞訴官司按劾多有連及赦前事者復送有司根勘如此則與不曾經大赦無以異非所以示信也請降指揮應今後送所司推勘者只合將大赦後罪犯依法結斷若所犯在大赦前茍非惡逆以上並不許推究從之十年行太上皇帝慶夀禮赦十二年郊赦十三年行上皇后慶夀禮赦十四年上皇違豫大赦十五年大享明堂大赦光宗受内禪大赦紹熙二年郊赦殿中侍御史張釡言國家三歳一郊霈曠蕩之澤以􅄑天下徳至渥也然赦文與令甲牴牾者有失參考乞預飭省部令將各按具到赦文内合行事件逐一比照見行條法法意寛而條或從窄則改定赦文令捨窄而就寛赦文本寛而法或從窄則明載赦書令捨法而從赦毋令引法以沮赦毋令因赦以傷恩如此則國家曠蕩之澤不為虚文從之容齋洪氏隨筆曰熙寜七年旱神宗欲降赦時已兩赦矣王安石曰湯旱以六事自責曰政不節與若一歳三赦是政不節非所以弭災也乃止安石平生持論務與衆異獨此説為至公近者六年之間再行覃霈婺州富人盧助教以刻核起家因至田僕之居為僕父子四人所執投寘杵臼内搗碎其軀為肉泥既鞫治成獄而遇己酉赦恩獲免至復登盧氏之門笑侮之曰助教何不下莊收榖兹事可為寃憤而州郡失於奏論紹熙甲寅歳至四赦凶盗殺人一切不死惠姦長惡何補於治哉又曰淳熙十六年二月登極赦凡民間所欠債負不以久近多少一切除放遂有方出錢旬日未得一息而并夲盡失之者人不以為便何澹為諫大夫嘗論其事遂令只償本錢小人無義幾至喧譟紹興五年七月覃赦乃只為蠲三年以前者按晉髙祖天福六年八月赦云私下債負取利及倍者並放此最為得又云天福五年終已前殘税並放而今時所放官物常是以前二年為斷則民已輸納無及於惠矣唯民間房賃欠負則從一年以前皆免比之區區五代翻有所不若也五年夀皇不豫赦天下寜宗七月即位赦天下九月合祭天地於明堂大赦是歳五月以孝宗大漸嘗肆赦七月上登極九月宗祀明堂尚書省契勘一歳之間三行赦放恐有兇惡累犯之人指恩作過内曾犯徒流罪已經登極赦恩免罪後再犯徒流以情理深重者未曾斷遣别聼朝廷指揮其指揮與赦文同降但以白紙連書於黄牒前云葢前所未有慶元三年十月以冬雷赦十一月郊赦六年八月以太上皇違豫赦九月祭明堂赦嘉泰三年十一月郊赦開禧二年六月以北伐曲赦泗州九月祭明堂赦三年四月以誅吳䂀曲赦四川五月以皇太后違豫赦天下十一月以立皇太子赦天下嘉定二年祀明堂赦天下五年郊赦八年祀明堂赦十一年祀明堂赦十四年祀明堂赦十五年受玉寳大赦十七年上違豫赦文獻通考卷一百七十三
