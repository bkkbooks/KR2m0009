body:
  text: 文獻通考卷二百十七鄱陽馬端臨貴與著經籍考四十四子小説家師友談記一卷鼂氏曰皇朝李廌方叔撰多記蘇子瞻范純夫及四學士所談論故曰師友青箱雜記一卷鼂氏曰皇朝呉處厚撰處厚發蔡確車蓋亭詩所記多失實成都置交子務起於宼瑊處厚乃以為張詠他多類此冷齋夜話六卷鼂氏曰皇朝僧惠洪撰多記蘇黄事皆依託也江淹擬陶淵明詩其詞浮淺洪既誤以為真淵明語且云東坡嘗稱其至到鬼谷子書世所共見而云有崖蜜櫻桃也之言東坡橄欖詩已輸崖蜜十分甜蓋用之如此類甚多不可槩舉陳氏曰言多妄誕遯齋閒覽十四卷劒溪野語三卷鼂氏曰皇朝陳正敏崇觀間撰正敏自號遯翁錄其平昔所見聞分十門為小説一編以備異日披閲張芸叟雜説一卷畫墁集一卷陳氏曰並吏部侍郎張舜民芸叟撰洛游子一卷陳氏曰題司馬光非也所稱樂全子齊物子亦莫知何人麈史三卷陳氏曰司農少卿安陸王得臣彥輔撰嘉祐四年進士其序稱政和乙未行年八十自號鳯臺子蓋王昭素之後王銍性之之伯也揮麈錄誤載蘇氏談訓十卷陳氏曰朝請大夫蘇象先撰述其祖魏公頌子容遺訓續世説十二卷陳氏曰孔平仲毅父撰編宋至五代事以續劉義慶之書孫公談圃三卷陳氏曰臨江劉延世錄高郵孫升君孚所談升元祐中書舍人坐黨讁汀州麗情集二十卷鼂氏曰皇朝張君房唐英編古今情感事烏臺詩話十三卷陳氏曰蜀人朋九萬錄東坡下御史獄公案附以初舉發章疏及謫官後表章書啓詩詞等碧雲騢一卷鼂氏曰皇朝梅堯臣聖俞撰昭陵時有御馬名碧雲騢以旋毛貴用以名書者詆當時鼎貴之人然其意專在范文正也頃年獲拜趙氏姑于恭南因質此事之誕信答曰異哉聖俞作謗書以誣盛德蓋誅絶之罪也陳氏曰題梅堯臣撰以厩馬為書名其説曰世以旋毛為醜此以旋毛為貴雖貴矣病可去乎其不遜如此聖俞必不爾也所記載十餘條公卿多所毁訐雖范文正亦不免或云實魏泰所作托之聖俞王性之辨之甚詳而邵氏聞見後録乃不然之邵氏曰梅堯臣著碧雲騢當昭陵時天下大臣惟杜祁公衍富鄭公弼韓魏公琦歐陽公脩無貶外悉譏詆之無少避范仲淹亦在詆中以仲淹微時常結中書舍人范仲尹因以破家仲淹既貴略不收䘏王銍不服以為魏泰偽託堯臣著此書銍䟦范仲尹墓誌云近時襄陽魏泰者塲屋不得志喜偽作他人著書如志怪集括異志倦游錄盡假名武人張師正又不能自抑出其姓名作東軒筆錄皆用私喜怒誣衊前人最後作此書且范仲淹與歐陽脩梅堯臣立朝同心詎有異論特堯臣子孫不輝故挾之借重以欺世今録楊闢所作范仲尹墓誌庶幾知泰亂是非之實至此也則其他泰所厚誣者皆迎刃而解可盡信哉銍猶及識泰知其從來最詳張而明之使百世之下仲淹不䝉其謬焉潁人王銍題博以為不然亦書其下使仲淹不蒙其謬堯臣亦不失為君子矣然堯臣蚤接諸公名聲相上下獨窮老不振中不能無躁其聞范仲淹訃詩云一出屢更郡人皆望酒壺俗情難可學奏記向來無貧賤常甘分崇高不解諛雖然門館隔泣與衆人俱夫為郡而以酒悦人樂奏記納諛佞豈所以論范仲淹堯臣之意眞有所不足邪如著彥博燈籠錦事則又與書竄詩合矣故疑此書實出於堯臣李氏曰碧雲騢一書凡慶歴以來名公鉅卿無不譏詆世傳此書以為出於梅堯臣怨懟之口其後諸公論議多矣如葉夢得王銍則以為非堯臣所為而邵博乃疑其詩以為堯臣之意眞有所不足遂以此書為實出於堯臣今以魏㤗東軒筆錄考之然後知泰之嫁名於堯臣者不特此書也筆録載文彥博燈籠錦事大略如碧雲騢所云其載堯臣作唐介書竄詩則句語狂肆非若堯臣平時所作簡古純粹平淡深遠又曰堯臣作此詩不敢示人及歐陽脩為編其集時有嫌避又削去此詩是以人少知者詳味此言是泰既以此詩嫁於堯臣又慮議者以為脩所編無此遂曰脩有嫌避而此不載皆無所考之詞也觀此則謂泰以碧雲騢之書假名堯臣不妄矣况堯臣平日為人仁厚樂易未嘗忤於物歐陽脩嘗以此而銘其墓使堯臣怨懟果為此書以厚誣名臣則所養可知矣今市井輕浮之子未必為之而謂堯臣為之哉孔氏野史一卷容齋洪氏隨筆曰世傳孔毅甫野史一卷凡四十事予得其書於清江劉靖之所載趙清獻為青城宰挈散樂妓以歸為邑尉追還大慟且怒又因與妻忿爭由此惑志文潞公守太原辟司馬温公為通判夫人生日温公獻小詞為都漕唐子方峻責歐陽永叔謝希深田元均尹師魯在河南擕官妓游龍門半月不返留守錢思公作簡招之亦不答范文正與京東人石曼卿劉潛之類相結以取名服中上萬言書甚非言不文之義蘇子瞻被命作儲祥宫記大貂陳衍幹當宫事得㫖置酒與蘇高會蘇陰使人發御史董敦逸即有章疏遂墮計中又云子瞻四六表章不成文字其他如潞公范忠宣吕汲公呉冲卿傅獻簡諸公皆不免譏議予謂決非毅甫所作蓋魏泰碧雲騢之流耳温公自用龎潁公辟不與潞公子方同時其謬妄不待攻也靖之乃原甫曾孫佳士也而䟦是書云孔氏兄弟曾大父行也思其人欲聞其言久矣故錄而藏之汪聖錫亦書其後但記上官彥衡一事豈弗深考云後山談叢六卷容齋洪氏隨筆曰後山陳無已著談叢高簡有筆力然所載國朝事失於不考究多爽其實如云呂許公惡韓富范三公欲廢之而不能乃建議使行邊及丁文簡因杜祁公一語之戲而陷蘇子美以撼祁公丁晉公以白金賂中使尼張乖崖之進與張乖崖聞逐萊公而買田宅以自汚考之諸公出處日月皆不合前四事所係不細乃誕漫如此蓋前輩不藏國史好事者肆意飾説為美聽疑若可信故誤入紀述後山之書必傳於後世懼貽千載之惑予是以辨之清虛居士隨手雜錄一卷陳氏曰王鞏定國撰待制素子張安道之壻雲齋廣錄十卷鼂氏曰皇朝政和中李獻民撰分九門記一時竒麗雜事鄙陋無稽之言為多墨客揮犀十卷續十卷陳氏曰不知名氏搜神祕覽三卷陳氏曰京兆章炳文叔虎撰石渠錄十一卷陳氏曰校書郎昭武黄伯思長睿撰石林燕語十卷陳氏曰葉夢得少藴撰宣和五年所作也燕語考異十卷陳氏曰成都宇文紹奕撰舊聞汪玉山嘗駮燕語之誤而未之見也玉澗雜書十卷陳氏曰葉夢得撰其中所記亦當在宣和時所作玉澗者石林山居澗水名也避暑錄話二卷陳氏曰葉夢得紹興五年所作巖下放言一卷陳氏曰葉夢得撰休致後所作臺省因話錄一卷陳氏曰兵部尚書新昌石公弼國佐撰柏臺雜著一卷陳氏曰石公弼撰雜記典故等事公弼本名公輔改賜今名為御史攻蔡京甚力竟坐深文謫死然本傳言其議論反覆非純正者思遠筆録一卷陳氏曰翰林學士九江王寓撰寓以靖康元年七月以禮部尚書入翰苑雜記當時聞見凡二十七條寓父易簡以布衣召為説書遂顯用寓後拜左轄使虜辭行謫散官嶺表父子俱南下沒於盜秀水閒居録三卷陳氏曰丞相汝南朱勝非藏一撰寓居宜春時作秀水者袁州水名也紺珠集十三集鼂氏曰皇朝朱勝非編百家小説成此書舊説張燕公有紺珠見之則能記事不忘故以為名陳氏曰視曾慥類説為略類説五十卷鼂氏曰皇朝曾慥編其序云間居銀􅄘因集百家之説纂集成書可以資治體助名教供笑談廣見聞陳氏曰所編傳記小説古今凡二百六十餘種春渚記聞十卷陳氏曰浦城何薳撰自號韓青老農東坡所薦為武學博士曰去非者其父也曲洧舊聞一卷雜書一卷骫骳説一卷陳氏曰直祕閣新安朱弁少章撰弁於晦庵為從父建炎丁未使金留十七年既歸而卒骫骳説者以續鼂旡咎詞話而鼂書未見南游記舊一卷陳氏曰曾紆公袞撰聞見後録二十卷陳氏曰邵某撰翰墨叢記五卷陳氏曰樞密睢陽滕康子濟撰鐵圍山叢談五卷陳氏曰蔡絛撰謫鬱林博白時所作侍兒小名録一卷續一卷陳氏曰序題朋谿居士而不著名氏始洪炎玉父集為此書王銍性之温豫彥幾續補今又因三家而增益之且為分類其中多用古字或云董彥逺家子弟所為也萍州可談三卷陳氏曰呉興朱或無或撰中書舍人服行中文子宣和元年序萍州老圃其自號也在黄州蓋其僑寓之地事見齊安志而或作彧字無惑未詳孰是硯岡筆志一卷陳氏曰唐稷撰自號硯岡居士泊宅編十卷陳氏曰方勺仁聲撰泊宅在烏程相傳張志和泊舟浮家泊宅之所勺買田卜築號泊宅翁本嚴瀬人却掃編三卷陳氏曰吏部侍郎睢陽徐度敦立撰間燕常談三卷陳氏曰董弅令升撰取士相與談仁義於間燕之義唐語林八卷陳氏曰長安王讜正甫撰以唐小説五十家倣世説分門三十五又益十七為五十二門中興書目十一卷而闕記事以下十五門又云本亦止八卷而門目皆不闕紀談録十五卷陳氏曰稱傳密居士不著名氏蓋鼂公邁伯咎也道山清話一卷陳氏曰不知何人䟦語稱大父國史在館閣久多識前輩著館祕錄曝書記與此而三兵火散失近得此書於曾仲存家末題朝奉大夫暐亦不著姓復齋閒記四卷陳氏曰承議郎歴陽龔相聖任撰待制原之孫頤正之父也鄞川志五卷陳氏曰中書舍人龍舒朱翌新仲撰寓居四明故曰鄞川忩間記聞一卷陳氏曰稱陳子兼撰未知何人雜論詩文經傳亦間述所聞事枕中記一卷陳氏曰不著名氏崇寜中人所載多國初事賢異録一卷陳氏曰亦無名氏所記四事其一曰鬼傳者言王鬷家子弟所遇與世傳王子高事大同小異當是一事耳姚氏殘語一卷陳氏曰剡姚寛令威撰槁簡贅筆二卷陳氏曰承議郎章淵伯深撰始得此書於程文簡氏不知何人作文簡題其後以其中稱先丞相申公知其為章子厚孫也余又以其書考之言先祖光禄元祐三年省試東坡知舉擢為第一則又知其為援之孫也後以問諸章始得其名字其人博學有文以塲屋待士薄如防㓂盜用蔭入仕遂不就舉居長興故序稱若溪草堂淵自號懲窒子序言録為五卷今此惟分上下卷能改齋漫録十三卷陳氏曰太常寺主簿臨川呉曾虎臣撰揮麈録三卷後録十一卷第三録三卷餘話一卷陳氏曰朝請大夫汝陰王明清仲言撰明清銍之子曾紆公袞之外孫故家博聞前言徃行多所憶後録䟦稱六卷今多五卷投轄録一卷陳氏曰王明清撰所記竒聞異事客所樂聽不待投轄而留也呉船錄一卷陳氏曰范成大至能撰自蜀帥東歸紀遊取門泊東呉萬里船之語老學庵筆記十卷陳氏曰陸游務觀撰生識前輩年登耄期所記見聞殊可觀也夷堅志甲至癸二百卷支甲至支癸一百卷三甲至三癸一百卷四甲四乙二十卷大凡四百二十卷陳氏曰翰林學士鄱陽洪邁景盧撰稗官小説昔人固有為之者矣游戲筆端資助談柄猶賢乎已可也未有卷帙如此其多者不亦謬用其心也哉且天壌間反常反物之事惟其罕也是以謂之怪茍其多至於不勝載則不得為異矣世傳徐鉉喜言怪賓客之不能自通與失意而見斥絶者皆詭言以求合今邁亦然晩歳急於成書妄人多取廣記中舊事改竄首尾别為名字以投之至有數卷者亦不復刪潤徑以入録雖敘事猥釀屬辭鄙俚不恤也睽車志五卷陳氏曰知興國軍歴陽郭象次象撰取睽上六載鬼一車之語經鋤堂雜志八卷陳氏曰倪思正甫撰續釋常談二十卷陳氏曰祕書丞龔頤正養正撰昔有釋常談一書不著名氏家藏亦闕此書今故以續稱凡常言俗語皆注其所出北山記事十二卷陳氏曰戸部侍郎濡須王遘少愚撰瑣碎録二十卷後録二十卷陳氏曰温革撰陳曄增廣之後録者書坊增益也夷堅志類編三卷陳氏曰四川總領陳曄日華取夷堅志中書文藥方類為一編雲麓漫抄二十卷續抄二卷陳氏曰通判徽州趙彥衛景安撰續二卷乃中庸説及漢定安公補紀也彥衛紹熙間宰烏程有能名儆告一卷陳氏曰不著名氏專敘報應鑑誡别録三卷陳氏曰廬陵歐陽邦基壽卿撰周益公洪景盧有序䟦樂善録十卷陳氏曰蜀人李昌齡伯崇撰以南中勸戒録增廣之多因果報應之事山齋愚見十書一卷陳氏曰稱灌圃耐得翁不知何人桯史十五卷陳氏曰岳珂撰桯史者猶言柱記也㳺宦紀聞十卷陳氏曰鄱陽張士南光叔撰䑕璞一卷陳氏曰戴埴撰夷堅别志二十四卷王質景文撰自序略曰志怪之書甚夥至鄱陽夷堅志出則盡超之余平生所嗜略類洪公始讀左傳史記漢書稍得其記事之法而無所施因志怪發之久之習熟調利滋耽翫不能釋間自觀覽要不為無補於世而古今文章之關鍵亦間有相通者不以是為無益而中畫愈裒所見聞益之事五百七十卷二十四今書之目也余心尚未艾書當如之則將浸及於夷堅矣凡夷堅所有而洊見者刪之更生佛之類是也凡夷堅所有而未備者補之黄元道之類是也其名仍為夷堅而别志之辨於鄱陽也得歲月者紀歲月得其所者紀其所得其人者記其人三者并書之備矣闕一二亦書皆闕則弗書醜而不欲著姓名者婉見之如夷堅碓夢之類是也醜而姓名不可不著者顯揭之如夷堅人牛之類是也其稱某人云又某人得諸某人云若已所見各識其所自來皆循夷堅之規弗易所書甲子之一為期過是弗書耳目相接也所書鬼神之事為主非是弗書名實相稱也於夷堅之規皆仍之其異也者筆力瞠乎其後矣文獻通考卷二百十七
