body:
  text: 文獻通考卷三百四十一鄱陽馬端臨貴與著四裔考十八匈奴呼韓邪左大將烏厲屈等見匈奴亂率其衆數萬人南降漢漢俱封為侯時李陵子立烏籍都尉為單于呼韓邪捕斬之復都單于庭然衆裁數萬人屠耆單于從弟休旬王將所主五六百騎擊殺左大且渠并其兵至右地自立為閏振單于在西邊其後呼韓邪單于兄左賢王呼屠吾斯亦自立為郅支骨都侯單于在東邊其後二年閏振單于率其衆東擊郅支單于郅支單于與戰殺之并其兵遂進攻呼韓邪呼韓邪破其兵走郅支都單于庭呼韓邪之敗也左伊秩訾王為呼韓邪計勸令稱臣入朝事漢從漢求助如此匈奴乃㝎呼韓邪問諸大臣皆曰不可匈奴之俗本上氣力而下服役以服役於人為下以馬上戰鬬為國故有威名於百蠻戰死壯士所有也今兄弟爭鬬不在兄則在弟雖死子孫猶有威名漢雖强猶不能兼并匈奴奈何亂先古之制臣事於漢卑辱先單于為諸國所笑雖如是而安何以復長百蠻左伊秩訾曰不然强弱有時今漢方盛烏孫城郭諸國皆為臣妾自且鞮侯單于以來匈奴日削不能取復雖屈强於此未嘗一日安也今事漢則安存不事則危亡計何以過此諸大人相難久之呼韓邪從其計引衆南近塞遣子右賢王銖婁渠堂入侍郅支單于亦遣子右大將駒于利受入侍是歳甘露元年也眀年呼韓邪單于欵五原塞欵叩也願朝三年正月㑹正旦之朝賀也漢遣車騎都尉韓昌迎發過所七郡郡二千騎為陳道上所過之郡每為𤼵兵陳列於道以為寵衛也單于正月朝天子於甘泉宫漢寵以殊禮位在諸侯王上贊謁稱臣而不名賜以冠帶衣裳黄金璽盭綬盭古戾字戾草名也以戾染綬亦諸侯王之制也玉具劒標首鐔衛盡用玉為之也鐔劒口旁横出者衛劒鼻也佩刀弓一張矢四發發十二矢棨㦸十棨㦸有衣之㦸也棨音啓安車一乗鞍勒一具馬十五匹黄金二十斤錢二十萬衣被七十七襲一稱為一襲猶今人言一副衣服也錦綉綺縠雜帛八千疋絮六千斤禮畢使使者道單于先行宿長平長平涇水上坂也上自甘泉宿池陽宫上登長平詔單于母謁不令拜也其左右當户之羣臣皆得列觀及諸蠻夷君長王侯數萬咸迎於渭橋下夾道陳上登渭橋咸稱萬歳單于就邸留月餘遣歸國單于自請願留居光祿塞下徐自為所築者也有急保漢受降城漢遣長樂衛尉高昌侯董忠車騎都尉韓昌將騎萬六千又發邊郡士馬以千數送單于出朔方雞鹿塞詔忠等留衛單于助誅不服又轉邊榖米糒前後三萬四千斛給贍其食是歳郅支單于亦遣使奉獻漢遇之甚厚明年兩單于俱遣使朝貢獻漢待呼韓邪使有加明年呼韓邪單于復入朝禮賜如初加衣百一十襲錦帛九千疋絮八千斤以有屯兵故不復發騎為送始郅支單于以呼韓邪降漢兵弱不能復自還即引其衆西欲攻定右地因北擊烏揭西破堅昆北降丁零并三國數遣兵擊烏孫勝之堅昆東去單于庭七千里南去車師五千里郅支留都之元帝初即位呼韓邪單于復上書言民衆困乏漢詔雲中五原郡轉榖二萬斛給之郅支單于自以道逺又怨漢擁䕶呼韓邪遣使上書求侍子漢遣谷吉送之郅支潛殺吉其後呼韓邪歸北庭人衆稍稍歸之國中遂定郅支既殺漢使者自知負漢又聞呼韓邪益强恐見襲擊㑹康居數為烏孫所困欲倚匈奴合兵取烏孫乃遣兵迎郅支乃結兵西詣康居其後都䕶甘延夀與陳湯發兵即康居誅斬郅支郅支既誅呼韓邪且喜且懼上書言願謁見天子以郅支在西方恐其與烏孫偕來擊臣故未得今郅支已伏誅願入朝見竟寧元年復入朝禮賜倍於黄龍時單于自言願壻漢氏以自親元帝以後宫良家子王嬙字昭君賜單于單于驩喜上書願保塞上谷以西至燉煌保守也自請保守之令無寇盜傳之無窮請罷邊備塞吏卒以休天子人民天子令下有司議議者皆以為便郎中侯應習邊事以為不可許上問狀應曰周秦以來匈奴暴桀寇侵邊境漢興尤被其害臣聞北邊塞至遼東外有隂山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢來出為寇是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北建塞徼起亭隧隧謂深開小道而行避敵鈔冦也築外城設屯戍以守之然後邊境得用少安幕北地平少草木多大沙匈奴來冦少所蔽隱從塞以南徑深山谷往來差難邊長老言匈奴失隂山之後過之未嘗不哭也如罷邊塞戍卒示夷狄之大利不可一也今聖德廣被天覆匈奴匈奴得蒙全活稽首來臣夫夷狄之情困則卑順强則驕逆天性然也前以罷外城省亭隧今裁足以候望通烽火而已古者安不忘危不可復罷二也中國有禮義之敎刑罰之誅愚民猶尚犯禁又况單于能必其不犯約哉三也自中國尚建關梁以制諸侯所以絶臣下之覬欲也設塞徼置屯戌非獨為匈奴而已亦為諸屬國降民本故匈奴之人恐其思舊逃亡四也近西羌保塞與漢人交通吏民貪利侵盜其畜産妻子以此怨恨起而背畔世世不絶今罷乗塞則生嫚易分爭之漸五也乗塞登而守之也往者從軍多没不還者子孫貧困一旦亡出從其親戚六也又邊人奴婢愁苦欲亡者多日聞匈奴中樂無奈候望急何然時有亡出塞者七也盜賊桀黠羣輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山岩石木柴僵落谿谷水門稍稍平之卒徒築治功費久逺不可勝計臣恐議者不深慮其終始欲以一切省繇戌十年之外百歳之内卒有他變障塞破壊亭隧絶滅當更𤼵屯繕治累世之功不可卒復九也如罷戍卒省候望單于自以保塞守禦必稱德漢於漢自稱㤙德也請求無已小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長策也對奏天子有詔勿議罷邊塞事呼韓邪立二十八年建始二年死子雕陶莫臯立為復株絫若鞮單于匈奴謂孝曰若鞮自呼韓邪後見漢諡帝為孝慕之故皆為若鞮遣子右致盧兒王醯諧屠奴侯入侍河平元年單于遣右臯林王伊邪莫演等奉獻朝正月明年單于上書願朝河平四年正月遂入朝加賜多於竟寧時復株絫單于立十年鴻嘉元年死弟且糜胥立為搜諧若鞮單于遣子左祝都韓王昫留斯侯入侍搜諧單于立八歳元延元年為朝二年𤼵行未入塞病死弟且莫車立為車牙若鞮單于遣子右於涂仇撣王烏夷當入侍車牙單于立四年綏和元年死弟囊知牙斯立為烏珠留若鞮單于遣子右股奴王烏鞮牙斯入侍哀帝建平四年上書願朝五年時哀帝被疾或言匈奴從上游來厭人游流也河水從西北來故曰上游亦總謂地名耳不必係於河水自黄龍竟寧時單于朝中國輙有大故謂國之大䘮上由是難之以問公卿亦以為虚費府帑可且勿許黄門郎揚雄上書諌曰臣聞六經之治貴於未亂兵家之勝貴於未戰已亂而後治戰鬬而後㨗則不足貴二者皆微微謂精妙然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與匈奴從此隙矣夫北地之狄五帝所不能臣三王所不能制其不可使隙甚明請引秦以明之以始皇之强䝉恬之威帶甲四十餘萬然不敢窺西河乃築長城以界之㑹漢初興以高祖之威靈三十萬衆困於平城士或七日不食時竒譎之士石畫之臣石言堅固如石甚衆卒其所以脱者世莫得而言也莫得而言謂自免之計其事醜惡故不得又髙皇后嘗忿匈奴羣臣廷議於是大臣權書遺之以權道為書順辭以答然後匈奴之結解中國之憂艾至孝文時匈奴侵暴北邊候騎至雍甘泉京師大駭發三將軍屯細栁棘門霸上以備之數月乃罷暨孝武即位設馬邑之權欲誘匈奴使韓安國將三十萬衆徼擊匈奴覺之而去徒費財勞師一虜不可見况單于之面乎其後乃大興師數十萬使衛青霍去病操兵前後十餘年追奔逐北自是之後匈奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不壹勞者不久佚不暫費者不永寧是以忍百萬之師摧餓虎之喙運府庫之財填盧山之壑而不悔也盧山匈奴中山名至太始之初匈奴欲掠烏孫侵公主乃發五將之師二十萬騎征之故北狄不服中國未得高枕安寢也至元康神爵之間匈奴内亂五單于争立呼韓邪携國歸化扶伏稱臣然尚羈縻之計不顓制専制謂以為臣妾也自此之後欲朝者不拒不欲者不强何者外國天性忿鷙形容魁健負力怙氣難化以善易𨽻以惡𨽻謂附屬惡謂威也其强難詘其和難得故未服之時勞師逺攻傾國殫貨伏尸流血破堅㧞敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也徃時常屠大宛之城蹈烏桓之壘探姑繒之壁姑繒西南夷種也在蜀徼外籍湯姐之場羌屬也籍蹈也姐音紫艾朝鮮之旃㧞兩越之旗近不過旬月之役逺不離二時之勞固已犁其庭掃其閭郡縣而置之雲徹席卷後無餘災唯北夷為不然真中國之堅敵也三垂比之懸矣前世重之滋甚未易可輕也今單于歸義懷欵誠之心欲離其庭陳見於前此乃上世之遺䇿神靈之所想望國家雖費不得已者也奈何拒以來厭之辭踈以無日之情消往昔之恩開將來之隙負前言捐往辭言單于因捐往昔和好之辭以怨漢也歸怨於漢因以自絶終無北面之心威之不可諭之不能焉得不為之大憂乎夫明者視於無形聰者聰於無聲誠先於未然即䝉恬樊噲不復施棘門細栁不復備馬邑之策安所設衛霍之功何得用五將之威安所震不然壹有隙之後雖智者勞心於内辯者轂擊於外猶不若未然之時也且往者圖西域制車師置城郭都䕶三十六國費歳以大萬計者豈為康居烏孫能踰白龍堆而寇西邊哉龍堆形如土龍身無頭有尾高大者二三丈卑者丈餘皆東北向相似也在西域乃以制匈奴也夫百年勞之一日失之費十而愛一臣竊為國家不安也書奏天子悟而許之加賜錦綉繒布各各有差他如河平時平帝時西域車師後王句姑去胡來王唐兠為其去胡而來降漢故以為王號皆怨恨都護校尉將妻子亡降匈奴單于受之遣使上書言狀詔遣使告單于曰西域内屬不當得受單于曰孝宣孝元皇帝哀憐為作約束自長城以南天子有之長城以北單于有之有犯塞者輙以狀聞有降者不得受臣知父呼韓邪單于蒙無量之恩死遺言曰有從中國來降者勿受輙送塞以報天子厚㤙此外國也得受之使者曰匈奴骨肉相攻國幾絶䝉中國大㤙危亡復續妻子完安累世相繼宜有以報厚恩單于叩頭謝罪執二虜還付使者詔使中郎將王萌待西域惡都奴界上逆受惡都奴西域之谷名逆受迎而受之單于遣使送到國因請其罪使者以聞有詔不聽不免其罪㑹西域諸國王斬以示之乃造設四條中國人亡入匈奴者烏孫亡降匈奴者西域諸國佩中國印綬降匈奴者烏桓降匈奴者皆不得受遣中郎將王駿王昌副校尉甄阜王尋使匈奴班四條與函封與璽書同一函而封之付單于令奉行因收故宣帝所為約束封函還時王莽奏令中國不得有二名因使使者以風單于宜上書慕化為一名漢必加厚賞單于從之上書言幸得備藩臣竊樂太平聖制臣故名囊知牙斯今請更名曰知莽大説白太后遣使者答諭厚賞賜焉王莽篡位遣五威將王駿等多賫金帛重遺單于諭曉以受命代漢因易單于故印故印文曰匈奴單于璽莽更曰新匈奴單于章單于以去璽加新與臣下無異願得故印駿椎碎之單于無可奈何又多得遺賂乃遣使奉馬牛入謝單于始求稅烏桓莽不許漢既頒四條匈奴以故事責烏桓税烏桓曰奉天子詔條不當予匈奴怒𤼵兵攻烏桓虜其人因寇掠其人民重以印文改易釁由是生故怨恨明年西域車師後王須置離謀降匈奴都䕶但欽誅斬之置離兄狐蘭支將二千餘人驅畜産舉國亡降匈奴單于受之但欽上書言匈奴寇擊諸國莽大怒分匈奴為十五單于遣中郎將藺苞將兵萬騎多賫珍寳至雲中塞下招誘呼韓邪諸子欲以次拜之單于聞之怒曰先單于受漢宣帝恩不可有負也今天子非宣帝子孫何以得立是後匈奴歴告左右部都尉諸邊王入塞寇盜殺掠不可勝數緣邊虚耗莽新即位怙府庫之富欲立威乃拜十二部將率發郡國勇士武庫精兵各有所屯守轉委輸於邊議滿三十萬衆齎三百日糧同時十道並出窮追匈奴因分其地立呼韓邪十五子莽將嚴尤諌曰臣聞匈奴為害所從來乆矣未聞上世有必征之者也後世三家周秦漢征之然皆未得上䇿者也周得中䇿漢得下䇿秦無䇿焉當周宣王獫狁内侵至於涇陽命將征之盡境而還其視戎狄之侵譬猶蟁蝱之螫敺之而已故天下稱明是為中䇿漢武帝選將練兵齎輕糧深入逺戍雖有克獲之功胡輙報之兵連禍結三十餘年中國罷耗匈奴亦創艾而天下稱武是為下䇿秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行處於負海疆境既完中國内竭以喪社稷是為無䇿今天下遭陽九之厄比年饑饉西北邊尤甚發三十萬衆具三百日糧東援海岱南取江淮然後乃備計其道里一年尚未集合兵先至者聚居暴露師老械敝勢不可用此一難也邊既空虚不能奉軍糧内調郡國不相及屬此二難也計一人三百日糧用糒十八斛非牛力不能勝牛又當自賫食加二十斛重矣胡地沙鹵多乏水草以徃事揆之軍出未滿百日牛必物故且盡餘糧尚多人不能負此三難也胡地秋冬甚寒春夏甚風多齎鬴鑊薪炭重不可勝鑊釜之大口者音冨飡糒飲水以厯四時師有疾疫之憂是故前世伐胡不過百日非不欲乆勢力不能此四難也輜重自随則輕鋭者少不得疾行虜徐遁逃勢不能及幸而逢虜又累輜重如遇險阻衘尾相随衘尾馬衘尾也言前後單行不得並驅虜要遮前後危殆不測此五難也今既發兵宜縦先至者令臣尤等深入霆擊且以創艾胡虜請率見到之兵且以擊虜莽不聽於是天下騷動初北邊自宣帝以來數世不見煙火之警人民熾盛牛馬布野及莽撓亂匈奴與之構難邊民死亡係獲又十二部兵乆屯而不出吏士罷弊數年之間北邊虛空野有暴骨矣天鳳初烏累若鞮單于呼韓邪之子烏珠留單于之弟名咸又請和邊遣人造塞告塞吏曰欲見和親侯王歙歙昭君兄子莽遣歙弟颯使匈奴賀單于初立賜黄金被繒帛罷將率屯兵但置游擊都尉單于貪莽賂遺故外不失漢故事然内利冦掠莽復遣歙與五威将王咸等多遺單于金寳因諭説改其號號匈奴曰恭奴單于曰善于賜印綬單于貪莽金幣故曲聽之然冦盜如故莽怒又更名曰降奴服于單于咸立五嵗天鳳五年死弟左賢王輿立為呼都而尸道臯若鞮單于既立貪利賞賜遣使奉獻至長安莽拜云當為須卜單于欲出大兵以輔立之匈奴愈怒並入北邊北邊由是壞敗漢兵既誅莽更始二年漢遣陳遵等使匈奴授單于漢舊制璽綬王侯以下印綬單于輿驕謂遵等曰匈奴本與漢為兄弟匈奴中亂孝宣皇帝輔立呼韓邪單于故稱臣以尊漢今漢亦大亂為王莽所篡匈奴亦出兵攻莽空其邊境令天下騷亂思漢莽卒以敗而漢復興亦我力也當復尊我其明年夏還㑹赤眉入長安更始敗南匈奴醯落尸逐鞮單于比者呼韓邪之孫烏珠留若鞮之子也自呼韓邪後諸子以次立至比季父孝單于輿時以比為右薁鞬日逐王部領南邊及烏桓建武初彭寵反叛於漁陽單于與共連兵因復權立盧芳共侵北邊六年始遣使通匈奴賂遺金帛以修舊好匈奴亦遣使來獻而單于驕倨自比冒頓光武方内平諸夏未遑外事而匈奴數與盧芳共侵北邊九年遣吳漢等擊之經嵗無功而匈奴轉盛鈔暴日増十三年遂冦河東州郡不能禁止於是漸徙幽并邊人於常山關居庸山以東漢常山關居代郡今安邊馬邑郡即漢代郡漢居庸關在今媯川郡懐戎縣匈奴左部遂復轉居塞内朝廷患之増縁邊兵郡數千人大築亭障修烽火匈奴入冦尤深二十年遂至上黨今上黨樂平髙平陽城郡地扶風今扶風汧陽新平天水二十一年復冦上谷中山今博陵郡殺掠甚衆北邊無復寜嵗二十二年比從父弟蒲奴立為單于而匈奴中連年旱蝗赤地數千里草木盡枯人畜饑疫死耗大半單于畏漢乘其敝乃遣使求和親而比密遣漢人郭衡奉匈奴地圖詣河西太守今銀川新秦昌化西河之西境地求内附二十四年八部大人共議立比為呼韓邪單于以其大父嘗依漢得安故欲襲其號於是欵五原塞今九原郡願永為蕃蔽扞禦北虜光武用五官中郎将耿國議乃許之東觀記曰十二月癸丑匈奴始分為南北單于二十五年春遣弟左賢王莫将兵擊北單于敗之北單于震怖却地千里南單于復遣使詣闕奉蕃稱臣獻國珍寳求使者監護願遣侍子修舊約北單于蒲奴也二十一年襲位南單于比也二十四年八部大人所立自此匈奴分為二二十六年遣中郎将叚郴等使南單于立其庭去五原西部塞八十里單于延使者使者曰單于當拜伏受詔單于顧望有頃乃拜伏稱臣令譯曉使者曰單于新立誠慙左右願使者衆中無相屈折也郴等反命詔聽南單于入居雲中遣使上書獻駱駝文馬夏南單于所獲北虜薁鞬左賢王将其衆及南部五骨都侯合三萬餘人畔歸北庭三百里共立左賢王為單于月餘更相攻擊五骨都侯皆死左賢王遂自殺諸骨都侯子各擁兵自守秋南單于遣子入侍奉奏詣闕詔賜單于冠帶衣裳璽綬車輿馬金帛樂器甲兵飲食什器又轉河東米糒牛羊以贍給之令中郎将置安集掾史将弛刑五十人持兵弩随單于所處參辭訟察動静單于嵗盡輙遣奉奏送侍子入朝中郎将從事一人将領詣闕漢遣謁者送前侍子還單于庭交㑹道路元正朝賀拜祠陵廟畢漢乃遣單于使令謁者将送賜金帛太官御食單于子及左右賢王谷蠡王骨都侯有功善者繒綵合萬疋嵗以為常匈奴俗嵗有三龍祠常以正月五月九月戊日祭天神南單于既内附兼祠漢帝因㑹諸部議國事走馬及駱駝為樂其大臣貴者左賢王次左谷蠡王次右賢王次右谷蠡王謂之四角次左右日逐王次左右温禺鞮王次左右漸将王是為六角皆單于子弟次第當為單于者也異姓大臣左右骨都侯次左右尸逐骨都侯其餘日逐且渠當戸諸官號各以權力優劣部衆多少為髙下次第焉單于姓虚連題前書曰單于姓攣鞮氏其國稱之曰撑犁孤屠匈奴謂天為撑犁子為孤屠與此不同異姓有呼衍氏須卜氏邱林氏蘭氏四姓為國中名族常與單于婚姻呼衍氏為左蘭氏須卜氏為右主斷决聽訟當决輕重口白單于無文書簿領焉冬前畔五骨都侯子復将其衆三千人歸南部北單于使騎追擊悉獲其衆南單于遣兵拒之逆戰不利於是復詔單于徙居西河美稷因使中郎将叚郴及副校尉王郁留西河擁護之為設官府從事掾史令西河長史嵗将騎二千弛刑五百人助中郎将衞䕶單于冬屯夏罷自後以為常及悉復縁邊八郡南單于既居西河亦置諸部王助為扞戍使韓氏骨都侯屯北地右賢王屯朔方當于骨都侯屯五原呼衍骨都侯屯雲中郎氏骨都侯屯定襄左南將軍屯鴈門栗籍骨都侯屯代郡皆領部衆為郡縣偵羅耳目猶探候也北單于皇恐頗還所略漢人以示善意鈔兵每到南部下還過亭候輙謝曰自擊亡虜薁鞬日逐耳非敢犯漢人也二十七年北單于遂遣使詣武威求和親天子召公卿廷議不决皇太子言曰南單于新附北虜懼於見伐故傾耳而聽争欲歸義耳今未能出兵而反交通北虜臣恐南單于將有貳心北虜降者且不復來矣帝然之告武威太守勿受其使二十八年北匈奴復遣使詣闕貢馬及裘更乞和親并請音樂又求率西域諸國胡客與俱獻見帝下三府議酬答之宜司徒掾班彪奏曰臣聞孝宣皇帝勅邊守尉曰匈奴大國多變詐交接得其情則却敵折衝應對入其數則反為輕欺今北匈奴見南單于來附懼謀其國故數乞和親又逺驅牛馬與漢合市重遺名王多所貢獻斯皆外示富强以相欺誕也臣見其獻益重知其國益虚歸親愈數為懼愈多然今既未獲助南則亦不宜絶北覊縻之義禮無不答謂可頗加賞賜略與所獻相當明加曉告以前世呼韓邪郅支行事呼韓邪稱臣受賞郅支背徳被誅以此二者行事曉吿之報答之辭令必有適帝悉納從之臧宫馬武上書言匈奴民畜疫死旱蝗赤地疲困之力不能當中國一郡宜臨塞厚懸賞購喻告髙句麗烏桓鮮卑攻其左發河西四郡天水隴西羌胡擊其右如此北虜之滅不過數年不從三十一年北匈奴復遣使如前乃璽書報答賜以綵繒不遣使者南單于比立九年卒弟左賢王莫立遣使弔祭慰賜後以為常莫立一年卒弟汙立二年卒比之子適立五年冬北匈奴六七千騎入五原塞遂冦雲中至原陽南單于擊却之適立四年卒莫子蘇立數月卒適弟長立時北匈奴猶盛數冦邊朝廷以為憂㑹北單于欲合市遣使求和親顯宗許之八年遣使報命而南部須卜骨都侯等知漢與北虜交使懐嫌怨欲畔密因北使令遣兵迎之漢使出塞疑有異伺候果得須卜使人乃上言宜更置大将以防二虜交通由是始置度遼營使中郎將吳棠等將營士屯五原曼柏美稷其年秋北虜果遣二千騎候望朔方作為革船欲度迎南部畔者以漢有備乃引去復數冦鈔邊郡焚燒城邑殺略甚衆河西城門晝閉帝患之十六年乃大𤼵縁邊兵遣諸將四道出塞北征匈奴南單于亦遣左賢王信從軍虜聞漢兵來悉度漠去其年北匈奴入雲中遂至漁陽太守廉范擊却之詔遣三郡兵追之無所得建初元年南部苦蝗大饑肅宗命稟給其貧人八年北匈奴三木樓訾大人稽留斯等率二萬八千人馬二萬匹牛羊十餘萬欵五原塞降元和元年武威太守孟雲上言北單于復願與吏人合市詔書聽雲遣驛使迎呼慰納之北單于乃遣大且渠伊莫訾王等驅牛馬萬餘頭來與漢賈客交易諸王大人或前至所在郡縣為設官邸賞賜待遇之南單于聞乃遣輕騎出上郡遮略生口鈔掠牛馬驅還入塞二年正月北匈奴大人車利涿兵等亡來入塞凡七十三輩時北虜衰耗黨衆離畔南部攻其前丁零冦其後鮮卑擊其左西域侵其右不復自立乃逺引而去單于長立二十三年薨單于汙之子宣立伊屠於閭鞮單于宣元和二年立其嵗匈奴遣兵千餘人獵至涿邪山卒與北虜温禺犢王遇因戰獲其首級而還冬孟雲上書言北虜以前既和親而南部復徃鈔掠北單于謂漢欺之謀欲犯塞謂宜還南所掠生口以慰安其意肅宗從太僕袁安議許之章和元年鮮卑擊北匈奴大破之北庭大亂屈蘭等五十八部口二十萬勝兵八千人詣雲中五原朔方北地降單于宣卒長之弟何立時北虜大亂加以飢蝗降者前後而至南單于將併北庭㑹肅宗崩竇太后臨朝單于上言宜及北虜分爭出兵討伐破北成南并為一國令漢家長無北念又新降右須日逐鮮堂輕從虜庭來詣臣言北虜諸部多欲内顧但恥自發若出兵奮擊必有嚮應臣伏念先父歸漢以來蒙被覆載大兵擁䕶積四十年臣生長漢地開口仰食四時賞賜動輙億萬雖垂拱安枕慙無報效之義願𤼵國中及諸部故胡新降精兵出朔方居延同㑹虜地又恐兵衆單少不足以防内外乞遣執金吾耿秉等將兵併力而北冀因聖威一舉平定太后以示耿秉秉請從之永元元年以秉及竇憲等率騎八千與度遼兵及南單于衆三萬騎出朔方擊北虜大破之北單于奔走首虜二十餘萬人二年南單于復上求滅北庭引兵與漢兵兩道襲之北單于遁走獲閼氏及男女虜口而還是時南部連尅獲降納黨衆最盛領户三萬四千口二十三萬七千三百勝兵五萬一百七十三年北單于復為右校尉耿夔所破逃亡其弟於除鞬自立為單于遣使欵塞大將軍竇憲奏請立於除鞬為北單于司徒袁安等以為光武招懐南虜非謂可永安内地正以權時之算可得捍禦北狄故也今朔漠既定宜令南單于反其北庭并領降衆今若復立於除鞬是失信於南單于百蠻不敢復保誓矣且漢故事供給南單于費直嵗一億九十餘萬西域嵗七千四百八十餘萬今北庭彌逺其費過倍是乃空盡天下而非建䇿之要也朝廷不從乃遣耿夔即授璽綬劒具羽蓋使中郎將任尚持節護衛屯伊吾如南單于故事方欲輔歸北庭㑹竇憲誅五年於除鞬自畔還北討斬之破滅其衆單于屯屠何立六年卒宣弟安國立安國立一年為其下所殺適之子師子立新降胡襲師子擊破之於是新降胡遂相驚動十五部二十餘萬人皆反畔脅立前單于子日逐王逢侯為單于殺略吏人燔燒亭帳將車重向朔方欲度漠北於是遣行車騎將軍鄧鴻等合四萬人討之擊逢侯於滿夷谷大破之逢侯率衆出塞漢兵不能追師子立四年卒單于長之子檀立南單于比嵗擊逢侯多所虜獲逢侯轉困迫十六年北單于遣使詣闕貢獻願和親修呼韓邪故約和帝以其舊禮不備未許之而厚加賞賜元興元年重遣使詣燉煌貢獻辭以國貧未能備禮願請大使當遣子入侍天子降大使至國即遣侍子随大使入侍時鄧太后臨朝亦不答其使但加賜而已永初元年夏漢人韓琮随南單于入朝既還説南單于云關東水潦人民饑餓死盡可擊也單于信其言遂起兵反畔及遣行車騎將軍何熙龎雄等擊之單于見騎軍並進大恐怖譲韓琮曰汝言漢人死盡今是何等人也乃遣使乞降許之單于脱帽徒跣對龎雄等拜陳道死罪詔赦之待遇如初乃還所鈔漢民及羌所略轉賣入匈奴中者合萬餘人元初四年逢侯為鮮卑所破部衆分散皆歸北虜五年春逢侯將百餘騎亡還詣朔方塞降詔徙之於潁川郡檀立二十七年卒弟㧞立先是朔方以西障塞多不修復鮮卑因此數冦南部殺漸將王匈奴有左右漸將王單于憂恐上言求復障塞順帝從之乃遣黎陽營兵出屯中山北界増置沿邊諸郡兵列屯塞下教習戰射㧞立四年卒弟休利立永和五年夏南匈奴左部句龍王吾斯車紐等背叛冦西河殺朔方代郡長史發沿邊兵討破之天子遣使責譲單于單于不預謀乃脱帽謝罪既而恐懼自殺句龍吾斯等立句龍王車紐為單于東引烏桓西収羌戎及諸胡等數萬人攻破京兆虎牙營殺上郡都尉遂冦掠并凉幽冀四州冬遣中郎將張耽等擊破之斬首三千級獲生口甚衆呼蘭若尸逐就單于兠樓儲先在京師漢安二年立之天子臨軒大鴻臚持節拜授璽綬引上殿賜車蓋刀劒什物給綵布二千疋遣行中郎將持節䕶送單于歸南庭建康元年中郎將馬寔募刺殺句龍吾斯送首洛陽進擊餘黨皆平之兠樓儲立五年薨居車兒立永夀元年匈奴左薁鞬臺等畔冦鈔美稷張奐擊降之延熹元年南單于諸部並叛遂與烏桓鮮卑冦縁邊九郡張奐討之諸部悉降奐以單于不能統理國事乃拘之上立左谷蠡王桓帝以居車兒一心向化無罪乃遣還庭居車兒立二十五年卒子某立史失其名熹平六年卒子呼徵立光和二年中郎將張修與單于不相能修擅斬之更立右賢王羌渠為單于修以不先請而擅誅檻車徵詣廷尉抵罪中平五年匈奴右部䤈落十餘萬人反攻殺單于子右賢王於扶羅立於扶羅即劉淵之祖而國人殺其父者遂畔共立須卜骨都侯為單于於扶羅詣闕自訟㑹帝崩天下大亂單于將數百騎與白波賊合兵冦河内諸郡今河内鄴汲等郡時民皆保聚鈔掠無利而兵遂挫傷欲歸國人不受乃止河東須卜骨都侯為單于一年而死南庭遂虚其位以老王行事獻帝興平二年單于於扶羅死其弟呼厨泉立為單于以兄被逐不得歸國數為鮮卑所鈔帝自長安東歸右賢王去卑與白波賊帥韓暹等侍衛天子拒擊李㴶郭汜及帝還洛陽又從遷許然後歸國建安二十一年單于來朝魏武因留於鄴而遣去卑監其國焉以其既在内地人衆猥多懼必為冦始分其衆為五部立其中貴者為帥選漢人為司馬以監督之未幾復改帥為都尉其左部居於太原故慈氏縣今西河郡隰城縣右部居祁縣中部居太陵縣今文水多者一萬落少猶四五千落晉武初塞外匈奴大木寒泥黒難等二萬餘落歸化帝復納之使居河西故宜陽城下後復與晉人雜居由是平陽西河太原新興今定襄雲中郡上黨樂平諸郡靡不有焉太始七年單于劉猛背叛帝遣婁侯何楨討平之其後稍因忿恨漸為邊患侍御史西河郭欽上疏曰戎狄强獷歴古為患魏初人寡西北諸郡皆為戎居今雖服從若後有風塵之驚胡騎自平陽上黨不三日至孟津北地今彭原郡地西河太原馮翊安定上郡盡狄庭矣宜及吴平之威謀臣猛將之略出北地西河安定復上郡實馮翊於平陽以北諸縣募取死罪徙三河三魏見士四萬家以充之裔不亂華漸徙平陽𢎞農魏郡京兆上黨雜胡峻四夷出入之防明先王荒服之制萬世之長䇿也帝不納太康五年復有匈奴胡大阿厚率其部落三萬人七年又有匈奴胡都太傅及萎莎胡等各率種類大小凡十萬餘口匈奴都督大豆得一育鞫等復率其種落大小萬一千五百口並來降帝並撫納之按晉史云北狄以部落為類其入居塞者有屠各種鮮支種冦頭種焉譚種赤勒種捍蛵種赤沙種鬱鞞種荽莎種香童種勃蔑種羌渠種賀賴種䟦大樓種雍屈種真掛種力羯種皆有部落不相雜錯屠各最豪貴故得為單于統領諸種其官號有左右賢王左右弈蠡王左右於陸王左右漸尚王左右朔方王左右獨鹿王左右顯禄王左右安樂王凡十六等王皆用單于親子弟也其左賢王最貴惟太子得居之其三姓有呼延氏卜蘭氏喬氏而呼延氏最貴又有左日逐出為輔相則有左右沮渠左右都侯又有車陽沮渠餘地諸雜號猶中國百官也其國人有慕氏勃氏皆勇健好反叛蛵呼丁反惠帝元康末魏武所分左部都尉左賢王劉元海漢初高帝以宗女妻冒頓約為兄弟故其子孫冒姓劉氏為首叛亂竊大號據神器自是苻石迭有中夏矣元海父豹即單于羅之子左賢王也范曄論曰自漢興匈奴强熾為患窮力殫財冦雖頗折而漢之疲耗略相當矣宣帝值虜庭分爭呼韓邪來臣乃權納懐柔因為邊備單于保塞稱蕃故曰邊衛罷關徼之警息兵民之勞六十餘年矣後王莽陵簒擾動戎夷續以更始之亂方夏幅裂自是匈奴得志内暴滋深光武以用事諸華未遑沙塞之外因徙幽并之民増屯戍之卒而已其後匈奴爭立日逐來奔願修呼韓之好以禦北狄之衝奉藩稱臣永為扞禦天子乃詔有司開北鄙擇肥美之地量水草以處之於是匈奴分破始有南北二庭焉後讐釁既深互伺便隙至於陷潰創傷者靡嵗或寜而漢之塞地晏然矣後亦頗為出師令竇憲耿夔之徒前後掩其窟穴躡北追奔三千餘里單于震懾遁走於烏孫之地而漠北空矣若因其時勢及其虚曠還南虜於隂山歸河西於内地上申光武權宜之略下防戎羯内擾之變使耿國之算不謬於當世袁安之議見從於後王平易正直若此其𢎞也而竇憲務三㨗之効忽經世之規狼戾不端専行威惠遂復更立北虜返其故庭並恩兩護以私已福棄蔑天公坐樹大鯁永言前載何憤恨之深乎自後經綸失方叛服不一其為疢毒胡可殫言降及後世翫為常俗終於吞噬神鄉邱墟帝宅謂劉元海及托䟦氏並都國中嗚呼千里之差興自毫端失得之源百世不磨矣既勒燕然之後若復南虜於漠北引侍子於京師混并匈奴之區使得專為一部則荒服無忿爭之跡邊境息征伐之勤此之不行遂為巨蠧自單于比入居西河美稷之後種類繁昌難以驅逼魏武雖分其衆為五部然大率皆居平陽暨乎左賢王豹之子劉淵假稱大號縦盜中原吞噬神鄉邱墟帝宅遂至二帝沉沒虜庭誠可痛心也劉淵劉淵新興匈奴人冒頓之後初漢髙祖以宗女為公主妻冒頓約為兄弟故其子孫遂冒姓劉氏建武初日逐王比自立為南單于入居西河美稷今離石左國城即單于所徙庭也中平中單于羌渠為國人所殺其子於扶羅以其衆留漢自立為單于屬董卓之亂冦掠太原河東屯於河内於扶羅死弟呼厨泉立以於扶羅子豹為左賢王即淵之父也魏武分其衆為五部以豹為左部帥其餘部帥皆以劉氏為之太康中改置都尉左部居太原兹氏右部居祁南部居蒲子北部居新興中部居太陵劉氏分五部然皆家於晉陽汾澗之濵豹生淵淵幼而英惠居母喪盡孝好學經史諸子無不綜覽武藝復精絶咸熙中為任子在洛陽㑹豹卒以淵代為左部帥太康末拜北部都尉明法禁輕財好施推誠接物五部雋傑無不至者後為建威將軍五部大都督惠帝失馭冦盜蠭起淵從祖北部都尉劉宣等竊議曰昔我先人與漢約為兄弟憂泰同之自漢亡以來魏晉代興我單于雖有虚號無復尺土之業自諸王侯降同編户今司馬氏骨肉相殘四海鼎沸興邦復業此其時矣於是密推淵為大單于淵至右國城宣等上大單于之號二旬之間衆已五萬都於離石永興元年淵乃僭即漢王位尊劉禪為孝懐皇帝立漢髙祖以下三祖五宗神主而祭之進據河東攻冦蒲阪平陽皆陷之遂入都蒲子永嘉二年僭稱皇帝遷都平陽冦洛陽王師屬敗淵以永嘉四年死在位六年子和立其弟聰殺之而自立遂陷洛陽繼陷長安二帝蒙塵聰以太興元年死在位九年子粲嗣為靳凖所殺曜討準殺之僭立改國號趙曜在位十年石勒伐之兵敗見執為勒所殺自淵至曜凡三世二十七年而亡石勒石勒字世龍初名㔨音背上黨武鄉羯人也其先匈奴别部羌渠之胄祖耶弈于父周曷朱並為部落小帥勒壯健有膽力雄武好騎射曷朱性兇粗不為羣胡所附每使勒代已督攝部胡愛信之大安中并州飢亂勒與羣胡俱為人所掠賣勒遭賣與茌平人師權為奴後遂為羣盜陽平人公師藩起兵趙魏自稱將軍勒與汲桑率數百騎赴之藩拜勒為前隊督藩既誅桑自號成都王以勒為前驅屢有戰功署為掃虜將軍封侯後兵敗収餘衆奔劉淵淵以為輔漢將軍平晉王後以功加督山東諸軍征討事淵死事聰聰死劉曜立勒叛曜伐而滅之僭即趙王位以咸和七年死在位十五年子𢎞嗣勒弟虎廢而殺之自立虎立十五年死子世立其兄遵廢之而自立冉閔復廢遵而立鑒鑒謀討閔不克為閔所殺盡誅石氏勒至鑒凡五傳二十三年而亡沮渠沮渠䝉遜臨松盧水胡人其先世為匈奴左沮渠遂以官為氏䝉遜博渉經史曉天文雄傑有英略梁熙吕光皆憚之故常游宴自晦㑹其兄羅仇等為光所殺乃屯據金山推光建康太守叚業為使持節大都督龍驤大將軍涼州牧建康公業以䝉遜為張掖太守攻西郡取之晉昌燉煌俱降業稱涼王䝉遜後襲業殺之取其地自為涼州牧張掖公伐秃髪傉檀敗之取姑臧稱河西王又敗李士業取酒泉䝉遜以宋元嘉十年死在位三十三年子茂䖍立六年而為魏所滅凡二世三十九年赫連赫連勃勃字屈子屈列反匈奴右賢王去卑之後劉元海之族也曽祖武劉聰世以宗室封樓煩公拜安北將軍監鮮卑諸軍事丁零中郎將雄據肆盧川為代王倚盧所敗遂出塞表祖豹子招集種落復為諸部之雄石虎遣使就拜平北將軍左賢王丁零單于父衛辰入居塞内苻堅以為西單于督攝河西諸虜屯于代來城及堅國亂遂有朔方之地控弦之士三萬八千魏伐之辰師敗為魏所殺勃勃乃奔於叱干部後奔姚興髙平公沒奕于奕于以女妻之言於興興深加禮敬拜驍騎將軍常參軍國大議後封陽川侯使助沒奕于鎮髙平以三城朔方雜夷及衛辰部衆三萬配之使為伐魏偵候後勃勃襲殺沒奕于而并其衆兵至數萬義熙二年僭稱天王大單于自以匈奴夏后氏之苖裔國稱大夏其年討鮮卑等三部破之侵嶺北諸城破秃髮傉檀之師遂於朔方水北黒水之南營起都城名為統萬改姓赫連氏又攻姚泓取安定㑹晉師伐秦滅之劉裕還建康勃勃遂取長安僭即皇帝位在位十三年而宋受禪以宋元嘉二年死子昌嗣尋為魏所禽弟定僭號於平涼為魏所滅自勃勃至定傳三世凡二十六年而亡文獻通考卷三百四十一
