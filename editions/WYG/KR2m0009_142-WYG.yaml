body:
  text: 文獻通考卷一百四十二鄱陽馬端臨貴與著樂考十五樂歌晉武帝受命之初百度草創泰始二年詔郊祀眀堂禮樂權用魏儀遵周室肇稱殷禮之義但改樂章而已使傅元為之詞云祠天地五郊夕牲歌十句祠天地五郊迎送神歌十句饗天地五郊歌三十六句天地郊眀堂夕牲歌十六句天地郊眀堂降神歌十二句天郊饗神歌四十句地郊饗神歌四十四句眀堂饗神歌十二句祠廟夕牲歌八句祠廟迎送神歌十二句祠征西将軍登歌八句祠豫章府君登歌八句祠潁川府君登歌八句祠京兆府君登歌八句祠宣皇帝登歌十二句祠景皇帝登歌十二句祠文皇帝登歌十二句祠廟饗神歌二首一首二十二句一首二十三句杜䕫傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭及太和中左延年改䕫騶虞伐檀文王三曲更自作聲節其名雖存而聲實異唯因䕫鹿鳴全不改易每正旦大會太尉奉璧羣臣行禮東廂雅樂常作是也後又改三篇之行禮詩第一曰於赫篇詠武帝聲節與古鹿鳴同第二曰巍巍篇詠文帝用延年所改騶虞聲第三曰洋洋篇詠眀帝用延年所改文王聲第四曰復用鹿鳴鹿鳴之聲重用而除古伐檀及晉初食舉亦用鹿鳴至泰始五年尚書奏使太僕傅元中書監荀朂黄門侍郎張華各造正旦行禮及王公上夀酒食舉樂歌詩荀朂云魏氏行禮食舉再取周詩鹿鳴以為樂章又鹿鳴以宴嘉賓無取扵朝考之舊聞未知所應朂乃除鹿鳴舊歌更作行禮詩四篇先陳三朝朝宗之義又為正旦大會王公上夀歌食并食舉樂歌詩合十三篇又以魏氏歌詩􅂉二言􅂉三言􅂉四言􅂉五言與古詩不類以問司律中郎将陳頎音祈頎曰被之金石未必皆當故朂造晉歌皆為四言唯王公上夀酒一篇為三言五言焉張華以為魏上夀食舉詩及漢氏所施用其文句長短不齊未皆合古盖以依詠弦節本有因循而識樂知音足以制聲度曲法用率非凡近之所能改二代三京襲而不變雖詩章辭異興廢隨時至其韻逗留曲折皆繫於舊有由然也是以一皆因就不敢有所改易此則華朂所明異㫖也時詔又使中書侍郎成公綏亦作焉今並採列之云四廂樂歌正旦大㑹行禮歌五首成公綏撰一首九句一首六十一句一首六十七句一首一十七句一首四十四句正旦大會王公上夀酒歌荀朂撰八句食舉樂東西廟歌荀朂撰一百六十七句冬至初嵗小㑹歌張華撰二十句宴㑹歌張華撰二十二句命將出征歌張華撰二十句勞還師歌張華撰二十句中宮所歌張華撰十六句宗親㑹歌張華撰十六句泰始九年命郭夏宋識等造正徳大豫二舞其樂章亦張華所作正徳舞歌二十四句大豫舞歌二十四句永嘉之亂四海分崩伶官樂噐皆没扵劉石至太元中破苻堅始獲樂工楊蜀等閑習舊樂於是四廂金石始偹乃使曹毗王珣等増造宗廟歌詩然郊祀遂不設樂云歌宣帝曹毗撰十二句歌景帝曹毗撰十二句歌文帝曹毗撰十二句歌武帝曹毗撰十二句歌元帝曹毗撰十二句歌明帝曹毗撰十二句歌成帝曹毗撰十二句歌康帝曹毗撰八句歌穆帝曹毗撰十二句歌哀帝曹毗撰十二句歌簡文帝王珣撰十二句歌孝武帝王珣撰十二句四時祠祀曹毗撰二十五句武帝令傅元作短簫鐃歌曲二十二篇以述功徳靈之祥代朱鷺三十句言宣帝佐魏有石瑞之祥宣受命代思悲翁二十句言宣帝禦諸葛征遼東代艾如張十句言宣帝討滅公孫氏宣輔政代上之囬十九句言宣帝之業時運多艱代擁離十二句言宣帝討吳有征無戰景龍飛代戰城南二十一句言景帝也平玉衡代巫山髙十三句言景帝調萬國文皇統百揆代上陵二十三句言文帝也因時運代将進酒十句言時運之變聖策潛施惟庸蜀代有所思二十六句言文帝平蜀天序代芳樹十五句言用人盡其才大晉承運期代上邪十四句言應籙受圗金靈運代君馬黄三十六句言晉乘金運於穆我皇代雉子斑三十五句言武帝也仲春振旅代聖人出二十一句言晉蒐田以時夏苗田代臨髙䑓二十二句言蒐田為苗除害仲秋獮田代逺如期二十二句言蒐狩以時不廢武事順天道代石留二十九句言仲冬大閲用武修文也唐堯代務成二十句言聖皇即位化被四表元雲仍漢舊名二十八句言用人各盡其才伯益代黄爵行二十八句言聖皇受命神爵來也釣竿仍漢舊名三十八句言徳配堯舜有呂望之佐晉鼙舞歌詩五篇洪業篇代魏明明魏皇帝六十句天命篇代魏太和有聖帝三十四句景皇篇代魏魏歴長五十一句天晉篇代魏天生蒸民五十句眀君篇代魏為君既不易五十二句拂舞出自江左舊云吳舞檢其歌非吳辭也亦陳扵殿庭楊泓序云自到江南見白符舞􅂉言白鳬鳩舞云有此來數十年矣察其辭旨乃是吳人患孫皓虐政思屬晉也今列於後拂舞歌五篇白鳩篇二十二句亦曰白鳬舞濟濟篇二十四句獨禄篇二十四句􅂉作獨鹿碣石篇晉樂奏魏武帝分為四篇一曰觀滄海二曰冬十月三曰土不同四曰龜􅢖夀凡四篇每篇各一十四句淮南王篇舊説淮南王安求仙禮方士遂與八公相擕而去其家臣小山之徒思戀不已乃作是歌言安仙去此則恢誕家為此説耳不然亦是後人附㑹也夾漈鄭氏曰按晉楊泓舞序云自到江南見白鳬舞符即鳬也白鳬舞即白鳩舞也白鳬之辭出於吳其本歌云平平白鳬思我君恵集我金堂謂晉為金徳吳人患孫皓虐政而思從晉也然碣石章又出於魏武則知拂舞五篇並晉人採集三國之前所作惟白鳬不用吳舊歌而更作之命以白鳩焉胡角本以應胡笳之聲後漸用之横吹有雙角即胡樂也張博望入西域傳其法於西京惟得摩訶兠勒一曲李延年因胡曲更造新聲二十八解乘輿以為武樂後漢以給邉和帝時萬人将軍得之魏晉以來二十八解不復具存用者有黄鵠壟頭出關入關出塞折楊桞黄覃子赤之楊望行人十曲鼓角横吹十五曲黄鵠一作鶴吟隴頭吟亦曰隴頭水望行人折楊柳關山月洛陽道長安道豪俠行梅花落胡笳曲紫騮馬驄馬復有驄馬驅非横吹曲雨雪劉生不知何代人觀齊梁以來所謂劉生之辭皆稱其任侠周逰三秦間􅂉云抱劍專征為符節郎古劔行洛陽公子行夾漈鄭氏曰右鼓角横吹曲按周禮以鼖鼓鼓軍事舊云用角其說謂蚩尤氏帥魑魅與黄帝戰於涿鹿之野帝命吹角為龍吟以禦之其後魏武帝北征烏桓越渉沙漠軍士聞之悲思於是減為十鳴尤更悲矣按此有十五曲後之角工所傳者只得梅花耳今太常所試樂工第三等五十曲抽試十五曲及鳴角人習到大梅花小梅花可汗曲是梅花又有小大之别也然角之制始於胡中國所用鼓角盖習胡角而為也黄帝之說多是謬悠况鼓角與胡角聲類既同故其曲亦相参用而梅花之辭本於胡笳今人為角鳴為邉聲初由邉徼所傳也關山月洛陽道長安道豪俠行梅花落紫騮馬驄馬八曲後代所加也相和歌相和漢舊歌也絲竹更相和執節者歌本一部魏眀帝分為二更遞夜㝛十七曲朱生宋識列和者復合之為十三曲吳歌雜曲並出江南晉宋以來稍有增廣凡此諸曲始皆徒歌既而被之絃管又有因絃管金石造歌以被之魏世三調歌辭之􅁼是也鳯将雛漢代舊歌曲也應璩百一詩云為作陌上桑反言鳯将雛然則其來乆矣将由聲音訛變以至扵此矣碧玊歌晉汝南王妾名寵好故作歌之懊憹歌石崇綠珠所作絲布澁難􅒌一曲而已東晉隆安初人聞訛謡之曲云春草可攬結女児可攬纈齊髙帝謂之中朝歌子夜子夜歌者有女子曰子夜造此歌晉武太元中瑯琊王軻家有鬼歌子夜庾僧䖍家亦有鬼歌之則子夜太元以前人也長史變晉司徒長史王廞臨敗所製阿子歌歡聞歌晉穆帝升平初童子輩􅂉歌於道歌畢輙呼阿子汝聞否又呼歡聞否以為送聲後人演其聲以為此二曲宋齊時用莎乙子之語稍訛異也桃葉歌晉王子敬妾名緣於篤愛所以作歌前溪歌車騎将軍沈充所製團扇歌晉中書令王珉與㛐婢有情爱好甚篤㛐鞭撻過苦婢素善歌而珉好持白團扇故云團扇復團扇持許自􅃒面憔悴無復理羞與郎相見公莫舞即巾舞也盖取髙祖鴻門㑹飲項伯以䄂隔之使不得害髙祖且語荘云公莫古人相呼為公莫莫害漢王也亦謂之公莫曲後之舞者用巾蓋像項伯衣䄂之遺式本即舞後人因為辭焉白紵舞按舞辭有巾袍之言紵本吳地所出疑是吳舞也晉俳歌又云皎皎白緒節節為雙吳音呼緒為紵疑白紵即白緒也鐸舞歌一篇幡舞歌一篇鼓舞使六曲並陳於元㑹宋武帝永初中太常鄭鮮之等撰立新歌王韶之所撰歌辭七曲並施扵郊廟文帝元嘉中南郊始設登歌詔顔延之造郊天夕牲迎送神饗歌詩三篇孝武大明中使商談造文帝太后廟歌眀帝又自造昭宣二太后歌詩謝荘造明堂歌王儉造太廟二室及郊配辭其他多仍晉舊督䕶歌彭城内史徐逵之為魯軌所殺宋武帝使内直督䕶丁旿音五収殯殮之逵之妻帝長女也呼旿至閤下自問殮送之事毎問輙歎息曰丁督䕶其聲哀切後人因其聲廣其曲焉歌是宋武帝所製云督䕶上征去儂亦惡聞許願作石尤風四面斷行旅讀曲歌宋人為彭城王義康所製其歌云死罪劉領軍誤殺劉四弟烏夜啼宋臨川王義慶所作元嘉十七年徙彭城王義康於章郡義慶時為江州至鎮相見而哭為文帝所怪徴還義慶大懼伎妾聞烏夜啼聲叩齋閤云眀日應有赦其年更為兖州刺史因作此歌故其和云籠窓窓不開烏夜啼夜夜憶郎來今所傳歌似非義慶本㫖詞曰歌舞諸年少娉婷無種跡菖蒲花可憐聞名不相識石城樂宋臧質所作石城在竟􅁜質嘗為竟陵太守於城上眺矚見羣少歌謡通暢因此作曲云生長石城下開門對城頭樓中美年少出入見依投莫愁樂出扵石城樂石城女子名莫愁善歌謡歌云莫愁在何處莫愁石城西艇子打兩􅄴催送莫愁來容齋洪氏隨筆曰莫愁者郢州石城人今郢有莫愁村畫工傳其貌好事者多寫寄四方唐書樂志曰莫愁樂者出於石城樂石城有女子名莫愁善歌謡古詞曰莫愁在何處莫愁石城西艇子打兩􅄴催送莫愁來者是也李義山詩曰海外徒聞更九州他生未卜此生休空傳虎旅鳴宵柝無復雞人送曉籌此日六軍同駐馬他時七夕笑牽牛如何四紀為天子不及盧家有莫愁此莫愁者洛陽人梁武帝河中之歌曰河中之水向東流洛陽女児名莫愁莫愁十三能織綺十四采桑南陌頭十五嫁為盧家婦十六生児似阿侯盧家蘭室桂為梁中有鬱金蘇合香頭上金釵十二行足下絲履五文章珊瑚挂鏡爛生光平頭奴子擎履箱人生富貴何所望恨不早嫁東家王者是也盧氏之盛如此所云不早嫁東家王莫詳其義近世周羙成樂府西河一闋專詠金陵所云莫愁艇子曾繫之語豈非誤指石頭城為石城乎襄陽樂劉道彦為襄陽太守有恵政由此有襄陽樂歌夀陽樂南平穆王為荆河州作栖烏夜飛荆州刺史沈攸之作攸之舉兵發荆州來未敗之前思歸京師所以歌云日落西山還去來三州歌諸商客數由巴陵三江口徃還因共作此歌又因三州曲而作採桑齊髙帝建元初有司奏郊廟雅樂歌辭舊使學士博士並撰擇而用之至於請勅之外凡肄學者亦令製焉参議太廟登歌宜用司徒禇淵辭餘悉用黄門郎謝超宗辭然超宗所撰又多刪顔延之謝荘之詞用者新曲而已鼓吹之樂宋齊並用漢曲竄易其名以實當代之事其充庭用十六曲髙祖乃去其四存其十二以合四時如漢曲朱鷺易為木紀漢曲有所思易為期運集之􅁼是已估客樂齊武帝所作帝為布衣時常游樊鄧踐祚以後追憶徃事作是歌使太樂令劉瑶教習百日無成􅂉啓釋寳月善音律乃使寳月奏之便就勅歌者重為感憶之聲梁改為商旅行其辭二首一曰昔經樊鄧役假楫梅根渚感昔念徃事意滿情不叙二曰有信数寄書無信長相憶莫作缾落井一去無消息楊叛児本童謡也齊隆昌時女巫之子曰楊旻者隨母入内及長為太后所寵爱童謡云楊婆児共戲來語訛轉婆為叛也歌云暫出白門前楊柳可藏烏歡作沈水香儂作博山爐梁武帝即位之初思𢎞古樂帝素善鍾律詳悉舊事遂自製定禮樂乃定郊禋宗廟及三朝之樂國樂以雅為稱取詩序云言天下之事形四方之風謂之雅雅者正也作樂歌十二則天数也其辭並沈約所製凡二十曲俊雅三曲四言取禮記司徒論選士之序而升之學曰俊士也衆官出入奏俊雅二郊太廟明堂三朝同用皇雅三曲五言取詩皇矣上帝臨下有赫也皇帝出入奏皇雅二郊太廟同用允雅一曲四言取詩君子萬年永錫爾允也皇太子出入奏之三朝用焉寅雅一曲三言取尚書周官貳公𢎞化寅亮天地也王公出入奏寅雅三朝用焉介雅三曲五言取詩君子萬年介爾景福也上夀酒奏介雅三朝用焉需雅八曲七言取易雲上於天需君子以飲食宴樂也食舉奏需雅三朝用焉雍雅三曲四言取禮記大享客出以雍徹也徹饌奏雍雅三朝用焉滌雅一曲四言取禮記帝牛必在滌三月也牲出入奏滌雅北郊明堂太廟同用牷雅一曲四言取春秋左傳牲牲肥瞃也薦毛血奏牷雅北郊明堂太廟同用諴雅三曲二曲三言一曲四言取尚書至諴感神也南北郊明堂太廟並用諴雅降神及迎送奏之獻雅一曲四言取禮記祭統尸飲五洗玉爵獻卿今之飲福酒亦古獻爵之意也皇帝飲酒奏獻雅北郊明堂太廟同用禋雅一曲四言取周禮大宗伯以禋祀祀昊天上帝也北郊明堂太廟之禮埋燎俱奏禋雅夾漈鄭氏曰有宗廟之樂有天地之樂有君臣之樂尊親異制不可以不分幽眀異位不可以無别按漢叔孫通始定廟樂有降神納俎登歌薦祼等曲武帝始定郊祀之樂有十九章之歌眀帝始定黄門鼓吹之樂天子所以宴羣臣也嗚呼風雅頌三者不同聲天地宗廟君臣三者不同禮自漢之失合雅而風合頌而雅其樂已失而其禮猶存至梁武十二曲成則郊廟明堂三朝之禮展轉用之天地君臣宗廟之事同其事矣此禮之所以亡也雖曰本周九夏而為十二雅然九夏自是樂奏亦如九淵九莖可以播之絲竹有譜無辭而非雅頌之流也梁南北郊眀堂宗廟之禮加有登歌其歌詩一十八曲南郊皇帝初獻奏登歌二曲三言北郊皇帝初獻奏登歌二曲四言宗廟皇帝初獻奏登歌七曲四言明堂徧歌五帝登歌五曲四言太祖太夫人廟舞歌一曲四言太祖太夫人廟登歌一曲四言大壮舞歌一曲四言大觀舞歌一曲四言相和五引角徴宮商羽毎引一首鼓吹宋齊並用漢曲又充庭用十六曲梁髙祖去四曲留其十二合四時也更制新歌以述功徳本紀謝代朱鷺言齊謝梁升也賢首山代思悲翁言武帝破魏軍於司部肇王跡也桐柏山代艾如張言武帝牧司王業彌章也道亡代上之囬言東昏喪道義師起樊鄧也忱威代擁離言破加湖元勲也漢東流代戰城南言義師克魯山城也鶴樓峻代巫山髙言平郢城兵威無敵也昏主恣滛慝代上陵言東昏政亂武帝起兵弔民伐罪也石首局代将進酒言義師平京城廢昏定大事也期運集代有所思言武帝膺籙受禪徳盛化逺也於穆代芳樹言大梁開運君臣和樂休祚方逺也惟大梁代上邪言梁徳廣運仁化洽也武帝崇信佛法置佛法十曲名為正樂又有法樂童子伎童子爱水㫁苦轉等設無􅃒大㑹則為之善哉大樂大歡天道仙道神王龍王滅過惡除愛水㫁苦轉㐮陽蹋銅蹄武帝西下所作也帝鎮雍有童謡云襄陽白銅蹄反縛揚州児及義師之興實以鐵騎揚州之士皆面縛果如謡言故即位之後更造新聲帝自為詞三曲又令沈約為三曲以被管絃上聲歌此因上聲促柱得名􅂉用一調􅂉用無調名如古歌詞所謂哀思之音不合中和梁武因之改辭無邪句常林歡宋梁間曲宋世荆雍為南方重鎮皆王子為之牧江左詞詠莫不稱之以為樂土故宋隋王誕作襄陽之歌齊武帝追憶樊鄧梁簡文樂府歌云分手桃林岸遂别峴山頭若欲寄音信漢水向東流又曰宜城投酒今行熟停鞍繫馬暫棲宿桃林在漢水上宜城在荆山北荆州有長林縣江南謂情人為歡常長聲相近盖取樂人誤長為常陳並用梁樂唯改七室舞辭皇祖歩兵府君神室奏凱容舞辭皇祖正員府君神室奏凱容舞辭皇祖懐安府君神室奏凱容舞辭皇髙祖安成府君神室奏凱容舞辭皇曾祖太常府君神室奏凱容舞辭皇祖景皇帝神室奏景徳凱容舞辭皇考髙祖武皇帝神室奏武徳舞辭右各一曲四言後主嗣位沈荒滛佚遣宫嬪習北方簫鼓謂之代北酒酣則奏之江南遂亡舉宗北歸是代北之應也玉樹後庭花其辭曰玊樹後庭花花開不復乆亦短祚之明兆也黄鸝留金􅁫兩臂垂􅂉言煬帝作堂堂右四曲並陳後主時所造恒與宫女學士及朝臣相唱和為詩太樂令何胥採其尤輕艶者以為此曲桃葉陳之世盛歌王獻之桃葉曲曰桃葉復桃葉渡江不用檝但渡無所苦我自迎接汝後隋晉王伐陳始營於桃葉山下韓擒虎渡江陳大将任蠻奴至新林以導北軍後魏來自雲朔肇有諸夏樂操土風未忘其俗道武天興初吏部郎鄧彦海奏上樂創制宫懸而鐘管不偹樂章既闕雜以􅉫邏廽歌至太武平河西得沮渠蒙遜之伎賓嘉大禮皆雜用焉此聲所興盖苻堅之末吕光出平西域得胡戎之樂因又作改變雜以秦聲所謂秦漢樂也孝文頗為詩歌以朂在位謡俗流傳布諸音律大臣馳騁漢魏旁羅宋齊功成奮豫代有制作莫不各掦廟舞自造郊歌宣暢功徳輝光當世而移風易俗浸以陵夷按歴代樂歌惟南之宋齊北之拓䟦魏無所考見此段姑摭隋書禮樂志序数語以括之前編宋齊二