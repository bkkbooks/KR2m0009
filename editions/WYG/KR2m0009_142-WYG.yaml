為九夏之奏皇帝出入奏皇夏賓出入奏肆夏牲出入奏昭夏藩國客出入奏納夏有功臣出入奏章夏皇后進羞奏深夏宗室㑹聚奏族夏上酒宴樂奏陔夏諸侯相見奏驁夏雖曰本於周賓祭之樂抑亦取於梁氏十二雅有其議而未能行後復變更大抵自兩朝以來祀饗之章隨時改易任理不任音任情不任樂明樂之人不能主樂主樂之司未必眀樂所行非所作所作非所行惟梁武帝自曉音律又詔百司各陳所聞帝自紏擿前違裁成十二雅付之大樂自此始定雖制作非古而聲有倫凖十二律以法天之成數故世世因之而不能易也唐太常樂章太清宫薦獻大聖祖元元皇帝奏混成紫極之舞天寳元年四月十四日有司奏請降神用混成之樂送神用泰一之樂樂章十一檢撰人名姓未獲饗徳眀興聖皇帝廟酌獻並奏長發之舞樂章九吏部侍郎李紵撰獻祖宣皇帝室酌獻奏光大之舞貞觀十四年祕書監顔師古議皇祖𢎞農府君宣簡公懿皇三廟之樂請同奏長𤼵之舞至開元十三年封禪定廟樂改用光大之舞樂章闕懿祖光皇帝室酌獻奏長𤼵之舞開元十三年定議依舊用長𤼵之舞至貞元十四年四月太常奏與徳眀興聖獻祖廟並同用宫懸祭月饗之樂章闕太祖景皇帝室酌獻奏大政之舞貞觀十四年祕書監顔師古定議請奏永錫之舞給事中許敬宗議奏大有之舞至開元十年改定用大政之舞樂章闕世祖元皇帝室酌獻用大成之舞貞觀十四年祕書監顔師古議請奏大有之舞許敬宗議改用大成之舞樂章闕髙祖太武皇帝室酌獻奏大明之舞貞觀十四年祕書監顔師古議奏大眀之舞太宗文武大聖大廣孝皇帝室酌獻奏崇徳之舞先是文徳皇后廟樂貞觀十四年顔師古請奏光大之舞許敬宗議同及太宗祔廟遂停光大之舞唯奏崇徳之舞樂章闕髙宗天皇大聖大𢎞孝皇帝室酌獻奏鈞天之舞中宗孝和大聖大昭孝皇帝室酌獻奏太和之舞睿宗元眞大聖大興孝皇帝室酌獻奏景雲之舞十四年六月日顔師古許敬宗已定樂章廟舞之號至開元二十九年六月十日太常又奏凖十三年封禪日有司所定九廟酌獻用舞之號皆列於次元宗至道大聖大眀孝皇帝室酌獻奏廣運之舞中書令郭子儀撰樂章肅宗文眀武徳大聖大宣孝皇帝室酌獻奏惟新之聲吏部尚書劉晏撰樂章代宗睿文孝武皇帝室酌獻奏保大之舞中書令郭子儀撰樂章徳宗神武孝文皇帝室酌獻奏文眀之舞尚書左丞平章事鄭餘慶撰樂章順宗至徳大聖大安孝皇帝室酌獻奏大順之舞中書侍郎平章事鄭絪撰樂章憲宗聖神章武孝皇帝室酌獻奏象徳之舞中書侍郎平章事叚文昌撰樂章穆宗睿聖文思孝皇帝室酌獻奏和寧之舞中書侍郎平章事牛僧孺撰樂章敬宗睿武昭愍孝皇帝室酌獻奏大鈞之舞中書侍郎韋處厚撰樂章文宗元聖昭獻孝皇帝室酌獻奏大成之舞中書侍郎崔珙撰樂章武宗至道昭肅孝皇帝室酌獻奏大定之舞中書侍郎李囬撰樂章宣宗聖武獻文孝皇帝室舞號檢未獲懿宗昭聖恭恵孝皇帝室舞號檢未獲僖宗恵聖恭定孝皇帝室舞號檢未獲昭宗聖穆景文孝皇帝室酌獻奏咸享之舞撰樂章人闕饗讓皇帝廟樂章六吏部侍郎李紵撰饗諸太子廟樂章六檢撰人姓名未獲儀坤廟樂章十二散騎常侍徐彦伯撰恵昭太子廟樂章六左散騎常侍歸登諫議大夫杜羔給事中李逄吉孟簡職方郎中知制誥王涯等共撰悼懐太子廟樂章六檢撰人姓名未獲荘恪太子廟樂章六給事中裴泰章蘓條等共撰祀五帝樂章十五顯慶元年左僕射于志寕撰立春日祀青帝壇降神奏角音之舞六變立夏日祀赤帝壇降神奏徴音之舞六變季夏土王祀黄帝壇降神奏宫音之舞六變立秋日祀白帝壇降神奏商音之舞六變立冬日祀黒帝壇降神奏羽音之舞六變夏至日祭皇地祗樂章三奏順和之舞六變開元十二年禮部侍郎賀知章撰祭神州地祇樂章三奏順和之舞八變貞觀十七年太府卿蕭璟撰春分日祀朝日樂章三奏元和之舞六變􅂋慶元年禮部侍郎許敬宗撰至乾元元年中書舍人徐浩又撰祭太社太稷樂章四貞觀十七年左僕射于志寕撰祭風師樂章四降神奏元和之舞貞元六年祕書監包佶撰祭雨師雷師樂章五降神奏元和之舞貞元六年祕書監包佶撰䄍祭百神樂章四降神奏豫和之舞禮部侍郎許敬宗撰祭先農樂章三奏豊和之舞二變顯慶三年太子洗馬郭瑜撰祭先蠶樂章二奏永和之舞顯慶三年太子洗馬郭瑜撰釋奠樂章八文宣王廟奏宣和之舞顕慶三年國子博士范頵等撰武成王廟樂章五奏宣和之舞三舞貞元六年原王傅于邵撰祀九宫貴神樂章六奏元和之舞檢撰人姓名未獲祭龍池樂章十開元元年内出編入雅樂十六年築壇於興慶宫以仲春之月祭之紫微令姚元崇等撰殿庭元日冬至朝㑹樂章七元日迎送皇帝奏太和開元十三年侍中源乾曜撰羣官行奏舒和上公上夀奏休和􅂋慶五年中書侍郎李義府撰皇帝受酒登歌奏昭和中宫朝㑹樂章四皇后正和再奏中書侍郎李義府撰東宫朝㑹樂章五迎送皇太子奏永和中書侍郎李義府撰太子受酒登歌奏昭和鄉飲樂章十七檢撰人姓名未獲鹿鳴三奏南陔一奏嘉魚四奏崇邱一奏關雎五奏鵲巢三奏大射樂章四檢撰人姓名未獲皇帝射騶虞二奏王公射貍首一奏迎送皇帝入閤奏太和唐朝五十五曲舞曲夷樂並不在此傾盃曲長孫無忌作樂社樂曲魏徴作英雄樂曲虞世南作黄騘疊曲太宗破竇建徳所乘馬名黄騘驃及征髙麗死於道頗哀之命樂工製黄騘疊曲右四曲太宗内宴詔無忌等作之皆宫調也景雲河清歌亦名燕歌髙宗即位景雲見河水清張文収采古義為景雲河清歌慶善樂破陣樂承天樂一戎大定樂將伐髙麗宴洛陽城門觀屯營教舞按親征用武之勢八紘同􅁤樂象髙麗平天下大定夷美賔曲遼東平李勣作是曲以獻右七曲髙宗朝所作也立部伎八曲太常選坐部伎無性識者退入立部伎又選立部伎無性識者退入雅樂部則雅聲可知一安舞二太平樂安舞太平並周隋遺音三破陣樂四慶善樂五大定樂六上元樂七聖夀樂八光聖樂坐部伎六曲一燕樂二長夀樂三天授樂四鳥歌萬嵗樂武后時有鳥能人言萬嵗五龍池樂明皇為平王時賜第隆慶坊之南地忽變為池中宗逰池厭其祥明皇即位乃作龍池樂六小破陣樂夜半樂明皇自路州還京師舉兵夜半誅韋后故作夜半樂還京樂還京樂文成曲明皇作霓裳羽衣曲河西節度使楊敬忠獻一説羅公逺與明皇逰月宫見仙女数百皆素練霓裳衣舞問其曲曰霓裳羽衣帝黙記其音而還故作是曲元眞道曲道士司馬承禎奉詔作大羅天曲茅山道士李會元作紫清上聖道曲工部侍郎賀知章作景雲九眞紫極小長夀承天樂順天樂六曲並大清宫成太常卿韋縚作君臣相遇樂曲商調韋縚作荔枝香明皇幸驪山楊貴妃生日命小部張樂長生殿因奏新曲未有名㑹南方進荔枝故名荔枝香棃園法曲法曲本隋樂其音清而近雅煬帝厭其淡明皇爱法曲選坐伎三百教梨園宮女数百亦為梨園弟子涼州伊州甘州天寳樂曲皆以邉地名之又詔選調法曲與胡部新聲合作千秋節明皇生日右三十四曲並明皇朝所作也容齋洪氏隨筆曰今樂府所傳大曲皆出於唐而以州名者五伊涼熙石渭也涼州今轉為梁州唐人已多誤用其實従西涼府來也凡此諸曲唯伊涼最著唐詩詞稱之極多聊記十数聫以資談助如老去将何散旅愁新教小玊唱伊州求守管絃聲欵逐側商調裡唱伊州鈿蟬金鴈皆零落一曲伊州淚萬行公子邀歡月滿樓雙成揭調唱伊州賺殺唱歌樓上女伊州誤作石州聲胡部笙歌西部頭梨園弟子和涼州唱得涼州意外聲舊人空數米嘉榮霓裳奏罷唱梁州紅䄂斜翻翠黛愁行人夜上西城宿聴得涼州雙管逐丞相新裁别離曲聲聲飛出舊涼州只愁拍盡涼州杖畫出風雷是撥聲一曲涼州今不清邉風蕭颯動江城滿眼由來是舊人那堪更奏梁州曲昨夜蕃軍報國儲沙州都䕶破梁州邉相皆承主㤙澤無人解道取涼州皆王建張祜劉禹錫王昌齡髙駢温庭筠張籍諸人詩也夾漈鄭氏曰按今之樂有伊州涼州甘州渭州之􅁼皆西地也又按隋焬帝所定九部夷樂西涼龜兹天竺唐居之􅁼皆西夷也觀詩之雅頌亦自西周始凡是清歌妙舞未有不從西出者八音之音以金為主五方之樂惟西是承雖曰人為亦莫非樂五行之精氣而然陳氏樂書曰唐眀皇天寳中樂章多以邉地名曲如涼州甘州伊州之􅁼曲終繁聲名為入破已而三州之地悉為西蕃蹈籍境寖削矣故江南偽唐李煜樂曲有念家山破識者謂不祥之兆也我宋龍興開寳八祀悉収其地煜乃入朝國破念家山之應也今誠削去繁聲革入破之名庶㡬古樂之發也又曰竊觀唐之樂歌突厥監歌於龍朔而閻知微卒有陥突厥之誅楊柳唱扵永淳而徐敬業卒搆楊柳二州之亂寳慶之曲作而太子任咎堂堂之曲奏而唐祚中絶以至舞媚桑條黄麞挈苾之作未有無其應者由是知聲音之道實與政通而治亂之兆皆足聼而知之况其昭昭者乎然眀皇雅好度曲未嘗使蕃漢雜奏迨天寳之末始詔選調法曲與胡部新聲合作識者異之眀年遂及禄山之難豈得無所感召而然哉然則帝王奏樂可不謹乎按鄭氏主於聲音而言陳氏主於證應而言故其説不同然成周之時未嘗不以夷樂参用於祭享之間也跡眀皇所以召釁稔禍者自有其故豈皆入破合奏致之乎寳應長寕樂代宗由廣平王復二京梨園供奉官劉日進作以獻十八曲宫調廣平太一樂大歴元年作右二曲代宗朝所作也定難曲河東節度馬燧獻中和樂徳宗生日自作繼天誕聖樂徳宗生日昭義節度王䖍休所獻以宫為調孫武順聖樂山南節度于頔所獻右四曲徳宗朝所作也雲韶法曲霓裳羽衣舞曲右二曲文宗詔太常卿馮定采開元雅樂作也臣下功髙者賜之樂又改法曲為仙韶曲萬斯年曲右一曲武宗朝李徳裕命樂工作萬斯年以獻播皇猷曲右一曲宣宗每宴羣臣備百戲帝自製新曲故有播皇猷之作栁宗元撰唐鐃歌鼓吹十二曲晉陽武言隋亂極唐師起晉陽拯亂二十六句獸之窮言李密既敗來歸唐斥東土二十二句戰武牢言太宗討王世充竇建徳十八句涇水黄言太宗討平薛仁杲定秦地二十四句奔鯨沛言輔公祏反江淮師討平之十八句苞枿言討平蕭銑定楚地二十八句河右平言平李軌定河西十八句鐵山碎言破突厥取其地二十二句靖平邦言劉武周襲有晉陽太宗滅之十四句吐谷渾言命李靖討滅吐谷西海二十六句髙昌言命李靖討滅髙昌二十二句東蠻言克東謝蠻二十二句按自漢有鐃歌鼓吹曲而魏晉以來相襲為之大概皆以頌時主之功徳唐無其詞子厚此文進於元和間謫永州之時元未嘗施用也文獻通考卷一百四十二
