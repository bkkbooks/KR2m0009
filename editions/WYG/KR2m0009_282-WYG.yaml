body:
  text: 文獻通考卷二百八十二鄱陽馬端臨貴與著象緯考五日食中興天文志按戰國以後古歴廢壞漢世始推月九道然猶未騐其所行之遲速也漢末都尉劉洪作乾象歴復推月行遲速然交食之法猶未詳著大抵朔望值交不問内外入限便食至陳世張賓創立外限然應食不食亦未能眀惟隋張胄元獨得其妙以為日行黄道月行月道月道交結黄道外十三日有竒而入經黄道謂之交朔望去交前後各十五度以下即當食若月行内道在黄道之北食多有驗月行外道在黄道之南雖遇正交無由掩映食多不騐交食之法至是始精又按隋書月陰精日光照之則見日光所不照則曰魄故望日日月相望人居其間盡覩其眀故形圓二弦之日日照其側人觀其傍半眀半魄也晦朔之日日照其表人在其裏故不見也故張衡云對日之衝其大如日日光不照謂之闇虚月望行黄道則值闇虚有表裏深淺故月食有南北多少夲朝朱熹頗主是説由是言之日之食與否當觀月之行黄道表裏月之食與否當觀所值暗虚表裏大約扵黄道騐之也又曰凡月之行歴二十九日五十三分而與日相㑹是謂合朔凡日月之交月行黄道而日為月所掩則日食是為陰勝陽其變重若日月同度扵朔月行不入黄道則雖㑹而不食月之行在望與日對衝月入扵日暗虚之内則月為之食是為陽勝隂其變輕近丗朱熹以為月食終亦為災隂若退避則不至相敵而食矣所謂暗虚盖日少外眀其對必有暗氣大小與日體同此日月交㑹薄食之大略也然固有當食而不食出扵歴法之外如唐開元盛際及夲朝中興以来紹興十三年十八十九二十四二十五年二十八年三十一年隆興二年淳熈三年四年十六年慶元四年五年六年嘉泰二年三年開禧二年嘉定四年十一年皆有當虧而不虧邵雍云日當食而不食歴算之誤云沈氏筆談曰或問日月之行日一合一對而有蝕不蝕何也予對曰黄道與月道如二環相疊而小差凡日月同在一度相遇則日為之食正一度相對則月為之虧雖同一度而月道與黄道不相近自不相侵同度而又近黄道月道之交日月相值乃相陵掩正當其交䖏則食而既不全當交道則随其相犯淺深而蝕凡日食當月道自外而交入扵内則蝕起扵西南􅂧扵東北自内而交出扵外則蝕起扵西北而􅂧扵東南日在交東則蝕其内日在交西則食其外食既則起扵正西復扵正東凡月食月道自外入内則食起扵東南􅂧扵西北自内出外則食起扵東北而􅂧扵西南月在交東則食其外月在交西則食其内食既則起扵正東復扵西交道每月退一度餘凡二百四十九交而一期故西天法羅㬋計都皆逆步之乃今之交道也交初謂之羅㬋交中謂之計都夏仲康五年九月朔日有食之書允征乃季秋月朔辰弗集扵房辰日月㑹次之名房所次之宿也集漢書作輯通用言日月會次不相和輯而掩食扵房宿也唐志言日食在仲康即位之五年瞽奏鼓古者日食則伐鼓用幣以救之春秋傳曰惟正陽之月則然餘則否今季秋非正陽月而行此禮夏制與周異故也嗇夫馳庶人走羲和尸厥官罔聞知嗇夫小臣也庻人庶人之在官者周禮庭氏救日之弓矢嗇夫庶人盖供救日之百役者曰馳曰走者以見日食之變天子恐懼扵上嗇夫庶人奔走扵下以助救日如此其急羲和為歴象之官尸居其位若無所知則其昏迷天象以干誅豈特不恭之刑而已周幽王六年十月日有食之詩十月之交朔日辛夘日有食之亦孔之醜毛氏曰交日月之交會日唐孔氏曰交會謂朔也交會而月同道則食月或在日道表或在日道裏則不食矣又歴家為交食之法大率以百七十三日有竒為限然月先在裏則依限而食者多若月在表雖依限而食者少杜預見其参差乃云日月動物雖行度有大量不能不少有盈縮故有雖交會而不食或有頻交會而食者此説得之矣右詩書中所載春秋以前三代時日食惟此二者可考云春秋魯隠公三年春王二月己巳日有食之公羊傳何以書紀異也日食則曷為或日或不日或言朔或不言朔曰某月某日朔日有食之者食正朔也桓三年秋七月壬辰朔日有食之是也其或日或不日或失之前或失之後失之前者朔在前也謂二日食己巳日有食之是也失之後者朔在後也謂晦日食莊公十八年三月日有食之也榖梁𫝊言日不言朔食晦日也其日有食之何也吐者外壤食者内壤其所吐出者其壤在外其所吞咽者壤入扵内也闕然不見其壤有食之者也今日闕損而不見壤之所在此必有物食之有内辭也或外辭也食者内壤故曰内辭吐者外壤故曰外辭傳無外辭之文者盖時無外壤也而曰或外辭者因事以明義例爾有食之者内扵日也内扵日以壤不見扵外其不言食之者何也知其不可知知也董仲舒劉向以為其後戎執天子之使鄭獲魯隐隐公與鄭人戰扵狐壤為所獲滅戴鄭滅之衛宋魯咸殺君左氏劉歆以為正月二日燕越之分野也凡日所纒而有變則分野之國失政者受之師古曰纒踐也音躔人君䏻修政共御厥罰則災消而福至師古曰共讀曰恭御讀曰禦又讀如夲字不䏻則災息而禍生師古曰息謂蕃滋也故經書災而不記其故盖吉凶亡常随行而成禍福也周衰天子不班朔師古曰班布也魯歴不正置閏不得其月月大小不得其度史記日食或言􅃋而實非􅃋或不言􅃋而實􅃋或脱不書􅃋與日皆官之失也京房易𫝊曰亡師兹謂不御厥異日食其食也既並食不一處誅衆失理兹謂生叛厥食既光㪚縱畔兹謂不眀厥食先大雨三日雨除而寒欲即食専禄不封兹謂不安厥食既先日出而黑光反外燭韋昭曰中無光四邉有眀外燭君臣不通兹謂亡厥食三既同姓上侵兹謂誣君厥食四方有雲中央無雲其日大寒公欲弱主位兹謂不知厥食中白青四方赤已食地震諸侯相侵兹謂不承厥食三毁三復君疾善下謀上兹謂亂厥食既先雨雹殺走獸弑君獲位兹謂逆厥食既先風雨折木日赤内臣外鄉兹謂背師古曰鄉讀曰嚮厥食食且雨地中鳴韋昭曰地中有聲如鳴耳或曰如狗子聲冢宰專政兹謂囚厥食先大風食時日居雲中四方無雲伯正越職兹謂分威師古曰伯讀曰覇正者長帥之稱厥食日中分諸侯爭美扵上兹謂泰厥食日傷月食半天營而鳴韋昭曰食半謂食望也臣瓉曰月食半謂月食之半也月食常以望不為異也賦不得兹謂竭厥食星随而下受命之臣専征云試厥食雖侵光猶眀師古曰試用也自擅意也一說試與弑同謂􅁒弑君若文王臣獨誅紂矣韋昭曰是時紂臣尚未欲誅紂獨文王之臣欲誅之小人順受命者征其君云殺厥食五色至大寒隕霜師古曰殺亦讀曰弑若紂臣順武王而誅紂矣韋昭曰紂惡益甚其臣欲順武王而誅紂諸侯更制兹謂叛師古曰更改也厥食三復三食食已而風地動適讓庶兹謂生欲師古曰適讀曰嫡厥食日失位光晻晻月形見師古曰晻音烏感反見音胡電反酒亡節兹謂荒厥食乍青乍黒乍赤眀日大雨發霧而寒凡食二十占其形二十有四改之輙除不改三年三年不改六年六年不改九年推隐三年之食貫中央上下竟而黒臣弑從中成之形也後衛州吁弑君而立桓公三年秋七月壬辰朔日有食之既既盡也歴家之説謂日光以望時遙奪月光故月食日月同㑹月掩日故日食食有上下者行有高下日光輪存而中食者相掩密故日光溢出皆既者正相當而相掩間疏也然聖人不言月食日而以自食為文闕扵其所不見董仲舒劉向以為前事已大後事将至者又大則既先是魯宋弑君魯又成宋亂易許田亡事天子之心楚僣稱王後鄭拒王師射桓王又二君相簒鄭昭公厲公子亹劉歆以為六月趙與晋分周之六月今之四月始去畢而入参参晋分也畢趙也日行去趙遠入晋分多故曰與計二十八宿分其次度其月及所属下皆以為例先是晉曲沃伯再弑晋侯是嵗晋大亂滅其宗國京房易𫝊以為桓三年日食貫其中央上下竟而黄臣弑而不卒之形也後椘嚴稱王兼地千里師古曰椘武王荆尸乆已見𫝊今此言莊始稱王未詳其説十七年冬十月􅃋不書日官之失也天子有日官諸侯有日御日官日御典歴數者日官居卿以底日禮也日官天子掌歴者不在六卿之數而位從卿故言居卿底平也謂平歴數日御不失日以授百官扵朝日官平歴以班諸侯諸侯奉之不失天時以授百官穀梁言􅃋不言日食二日也莊公十八年春王三月穀梁不言日不言􅃋夜食公羊曰食晦史記推合朔在夜明旦日食而出出而觧夜食地中出而止是為夜食劉向以為亱食者隂因日眀之衰而奪其光象周天子不眀齊桓将奪其威専㑹諸侯而行伯道其後遂九合諸侯天子使丗子㑹之二十五年辛未􅃋鼓用牲扵社左傳鼓用牲扵社非常也非常鼓之月長歴推之辛未實七月􅃋置閏失所故致月錯唯正月之􅃋慝未作正月夏之四月周之六月謂正陽之月今書云六月而𫝊云唯者眀此月非正陽月也慝陰氣日有食之扵是乎用幣扵社伐鼓扵朝日食歴之常也然食扵正陽之月則諸侯用幣扵社請救扵上公伐鼓扵朝退而自責以眀隂不冝侵陽臣不宜掩君以示大義二十六年十二月癸亥􅃋三十年九月庚午􅃋鼓用牲扵社僖公五年九月戊申􅃋十二年春王三月庚午十五年夏五月左傳不書􅃋與日官失之也文公元年二月癸亥十五年六月辛丑􅃋鼓用牲扵社左傳非禮也得常鼓之月而扵社用牲為非禮日有食之天子不舉去盛饌伐鼓扵社責羣隂伐猶擊也諸侯用幣扵社社尊扵諸侯故請救而不敢責之伐皷扵朝退自省也以昭事神訓民事君天子不舉諸侯用幣所以事神尊卑異制所以訓民示有等威古之道也宣公八年秋七月甲子日有食之既晦日食十年夏四月丙辰十七年六月癸夘成公十六年六月丙寅􅃋十七年十有二月丁巳􅃋㐮公十四年二月乙未􅃋十五年秋八月丁巳二十年冬十月丙辰􅃋二十一年九月庚戌􅃋二十三年春王二月癸酉􅃋二十四年秋七月甲子􅃋日有食之既八月癸巳􅃋二十七年冬十有二月乙亥􅃋今長歴推十一月􅃋非十二月𫝊曰辰在申冄失閏若是十二月則為三失閏故知經誤左氏傳辰在申司歴過也再失閏矣謂斗建指申周十一月今之九月斗柄當建戌而在申故知再失閏也文十一年三月甲子至今年七冄十一歳應有二十六閏今長歴推得二十四閏通計少閏釋例言之詳矣董仲舒以為比食又既比頻也謂二十四年七月八月頻食象陽将絶蠻荒主上國之象也後六君弑齊崔杼弑光衛甯喜弑剽閽弑吴餘祭蔡班弑景侯莒人弑其君宻州椘圍弑郏敖椘子果従諸侯伐鄭滅舒鳩魯往朝之二十八年卒主中國伐吴討慶封劉向以為自二十年至此嵗八年間日食七作禍亂将重起故天仍見戒也昭公七年夏四月甲辰􅃋左傳晋侯問扵士文伯曰誰将當日食對曰魯衛惡之受其凶惡衞大魯小公曰何故對曰去衛地如魯地衛地豕韋也魯地降婁也日食扵豕韋之末及降婁之始故禍在衛大在魯小也周四月今二月故曰在降婁扵是有災魯實受之災𤼵扵衛而魯受其餘禍其大咎在衛君乎魯将上卿八月衛侯卒十一月季孫宿卒十五年六月丁巳􅃋十七年夏六月甲戌􅃋左傳祝史請所用幣禮正陽之月日食當用幣扵社故請之昭子曰日有食之天子不舉不舉盛饌伐皷扵社責羣隂諸侯用幣扵社退自責禮也平子禦之禦禁也曰止也唯正月􅃋慝未作日有食之扵是乎有伐皷用幣之禮也其餘則否太史曰在此月也正月謂建巳正陽之月也扵周為六月扵夏為四月慝隂氣也四月純陽用事陰氣未動而侵陽災重故有伐皷用幣之禮也平子以為六月非正月故太史答言在此月也日過分而未至過春分而未夏至三辰有災三辰日月星也日月相侵又犯是宿故三辰皆為災也扵是乎百官降物降物素服君不舉辟移時辟正寝過日食時樂奏皷伐皷祝用幣用扵社史用辭用以辭自責故夏書曰辰不集扵房瞽奏鼓嗇夫馳庶人赱此月􅃋之謂也當夏四月是謂孟夏言此六月當夏之四月平子弗從昭子退曰夫子将有異志不君君矣安君之災故曰有異志二十一年秋七月壬午􅃋左傳公問扵梓慎曰是何物也祸福何為物事也對曰二至二分冬夏至春秋分日有食之不為災日月之行也分同道也至相過也二分日亱等故曰同道二至長短極故言相􅂈其他月則為災陽不克也故常為水隂侵陽是陽不勝隂二十四年夏五月乙未􅃋左傳梓慎曰将水隂勝陽故曰将水昭子曰旱也日過分而陽猶不克克必甚䏻無旱乎過春分陽氣盛時而不勝陰陽将猥出故為旱猥烏罪反陽不克莫将積聚也陽氣莫然不動不克莫絶句三十一年十有二月辛亥􅃋左傳是亱也趙簡子夢童子臝而轉以歌轉宛轉也旦占諸史墨曰吾夢如是今而日食何也簡子夢適與日食會謂咎在已故問對曰六年及此月也吴其入郢乎終亦弗克史墨知夢非日食之應故釋日食之咎而不釋其夣入郢必以庚辰庚辰有變日在辰尾故曰以庚辰定四年十一月庚辰吴入郢日月在辰尾辰尾龍尾也周十二月今之十月日月合􅃋扵辰尾而食庚午之日日始有謫火勝金故弗克謫變氣也庚午十月十九日去辛亥􅃋四十一日雖食在辛亥更以始變為占也午南方椘之位也午火庚金也日以庚午有變故災在椘椘之仇敵惟吴故知入郢必吴火勝金者金為火妃食在辛亥水也水數六故六年也定公五年春正月辛亥􅃋十有二年冬十一月丙寅􅃋十有五年八月庚辰朔凡春秋十二公二百四十二年日食三十六穀梁以為􅃋二十六晦七夜二二日一公羊以為􅃋二十七二日七晦二左氏以為􅃋十六二日十八晦一不書日者二貞定王二十六年日食晝晦安王五年日食二十年日食既烈王元年日食七年日食赧王十四年日食晝晦秦莊㐮王三年四月日食按春秋書日食終扵魯定公之十五年漢史書日食始扵髙帝之三年其間二百九十三年搜考史𫝊書日食者凡七而已昔春秋二百四十二年日食凡三十六劉向猶以為乖氣致異至前漢二百一十二年而日食五十三則又數扵春秋之時後漢百九十六年而日食七十二魏晋一百五十年而日食七十九則愈數扵漢西都之丗矣春秋降而戰國七雄競角争城争地斬艾其民伏尸百萬以至扵始皇二丗生民之祸烈矣丗道之變極矣乖氣所致謫見扵天宜不勝書而此二三百年之間日食僅六七見焉何㢤盖史失其官不書扵册故後丗無由考焉昔春秋日食必書晦􅃋與日日而不書晦􅃋與晦􅃋而不書日俱以為官失之今秦初書日食者一則書月而不書日與晦􅃋周末書日食者六則書年而并不書月其見扵史冊而可考者鹵莽踈漏如此則其遺軼不書者可勝道哉非日之果不食也漢髙帝三年十月甲戌晦日有食之在斗二十度燕地也後二年燕王臧荼反誅立盧綰為燕王後又反敗十一月癸夘晦在虚三度齊地也後二年齊王韓信徙為椘王眀年廢為列侯後又反誅九年六月乙未晦日有食之既在張十三度恵帝七年正月辛丑􅃋在危十三度谷永以為嵗首正月􅃋日是為三朝尊者惡之五月丁夘先晦一日日有食之㡬盡師古曰㡬音距依反後皆類此在七星初劉向以為五月微隂始起而犯至陽其占重至其八月宫車晏駕有吕氏詐置嗣君之害京房易𫝊曰凡日食不以晦􅃋者名曰薄人君誅将不以理賊臣将暴起日月雖不同宿隂氣盛薄日光也髙后二年六月丙戌晦七年正月己丑晦日有食之既在營室九度為宫室中時髙后惡之曰此為我也眀年應師古曰謂高后崩也文帝二年十一月癸卯晦在婺女一度三年十月丁酉晦在斗二十二度十一月丁卯晦在虛八度後四年四月丙辰晦在東井十三度七年正月辛未􅃋景帝三年二月壬午晦在胃二度七年十一月庚寅晦在虚九度中元年十二月甲寅晦中二年九月甲戌晦三年九月戊戌晦㡬盡在尾九度六年七月辛亥晦在軫七度後元年七月乙巳先晦一日在翼十七度武帝建元二年二月丙戌􅃋在奎十四度劉向以為奎為卑賤婦人後有衛皇后自至微興䘚有不終之禍師古曰皇后自殺不終其位也三年九月丙子晦在尾二度五年正月己巳􅃋元光元年二月丙辰晦七月癸未先晦一日在翼八度劉向以為前年髙園便殿災與春秋御廪災後日食扵翼軫同其占内有女變外為諸侯其後陳皇后廢江都淮南衡山王謀反誅日中時食従東北過半晡時􅂧元􅃋二年二月乙巳晦日有食之在胃三度六年十一月癸丑晦日有食之元狩元年五月乙巳晦日有食之在栁六度京房易𫝊推以為是時日食從傍右法曰君失臣眀年公孫宏薨日食從傍左者亦君失臣從上者臣失君従下者君失民元鼎五年四月丁丑晦在東井二十三度元封四年六月己酉􅃋太始元年正月乙巳晦四年十月甲寅晦在斗十九度征和四年八月辛酉晦日有食之不盡如鉤在亢二度晡時食從西北日下晡時􅂧昭帝始元三年十一月壬辰􅃋在斗九度燕地也後四年燕刺王謀反誅元鳳元年七月己亥􅃋日有食之㡬盡在張十二度劉向以為己亥而既其占重孟康曰已土亥水也純隂故食為最重也日食盡為既後六年宫車晏駕卒以亡嗣宣帝地節元年十二月癸亥晦在營室十五度五鳳元年十二月乙酉􅃋在婺女十度四年四月辛丑􅃋在畢十九度是為正月􅃋慝未作左氏以為重異元帝永光二年三月壬戌􅃋在婁八度四年六月戊寅晦在張七度建昭五年六月壬申晦日有食之不盡如鉤因入成帝建始三年十二月戊申􅃋其亱未央殿中地震谷永對曰日食婺女九度占在皇后地震蕭牆之内咎在貴妾師古曰蕭墻謂門屏也蕭肅也人臣至此加肅敬也二者俱發眀同事異人共掩制陽將害繼嗣也亶日食則妾不見師古曰亶讀曰但下例並同亶地震則后不見異日而發則似殊事亡故動變則恐不知是月后妾當失節之郵師古曰郵與尤同尤過也故天因此兩見其變若曰違失婦道隔遠衆妾師古曰逺音子萬反妨絶繼嗣者此二人也杜欽亦對曰日以戊申食時加未戊未土也中宫之部其亱殿中地震此必適妾将有爭寵相害而為患者師古曰適讀曰嫡人事失扵下變象見扵上䏻應之以徳則咎異消忽而不戒則祸敗至師古曰忽怠亡應之非誠不立非信不行河平元年四月己亥􅃋日有食之不盡如鈎在東井六度劉向對曰四月交扵五月月同孝恵日同孝昭東井京師地且既其占恐害継嗣日蚤食時從西南起三年八月乙卯晦在房四年三月癸丑􅃋在昴陽􅃋元年二月丁未晦在胃永始元年九月丁巳晦谷永以京房易占對曰元年九月日蝕酒亡莭之所致也獨使京師知之四國不見者若曰湛湎扵酒君臣不别禍在内也師古曰湛讀曰沈又讀曰耽也永始二年二月乙酉晦谷永以京房易占對曰今年二月日食賦斂不淂度民愁怨之所致也所以使四方皆見京師陰蔽者若曰人君好治宫室大營墳墓賦斂兹重而百姓屈竭師古曰兹益也屈盡也音其勿反禍在外也三年正月己卯晦日有食之四年七月辛未晦鄭興上疏言夫日月交㑹數應在􅃋而頃年日食多在扵晦先時而合皆月行疾也日君象月臣象君亢急則臣下促迫故行疾也元延元年正月己亥􅃋劉向上疏臣向前數年言日當食今連三年比食自建始以来二十嵗閒而八食率二嵗六月而一發古今罕有易曰觀乎天文以察時變昔孔子對魯哀公並言夏桀殷紂暴虐天下故歴失則攝提失方孟陬無紀孟康曰攝提星名也随斗杓建十孟二月歴不正則失其所建首時為正月為陬此皆易姓之變也哀帝元夀元年正月辛丑􅃋日有食之不盡如鈎在營室十度與恵帝七年同月日鮑宣上言今日食扵三始誠可畏懼小民正月􅃋日尚恐毁敗器物况日虧乎二年三月壬辰晦平帝元始元年五月丁巳􅃋在東井二年九月戊申晦日有食之既凡漢著紀十二世二百一十二年日食五十三􅃋十四晦三十六先晦一日三光武建武元年正月庚午􅃋日有食之帝是年六月方即位時猶為更始三年二年正月甲子􅃋在危八度時丗祖初興天下賊亂未除虚危齊也賊張步擁兵據齊上遣伏隆諭步許降旋􅂧叛稱王至五年中乃破三年五月乙卯晦潜潭巴曰乙夘食雷不行雪殺草不長姦人入官在栁十四度栁河南也時丗祖在雒陽赤眉降賊樊崇謀作亂其七月發覺皆伏誅古今注曰四年五月乙夘晦日有食之六年九月丙寅晦潜潭巴曰丙寅食乆旱多有徵京房曰有小旱災史官不見郡以聞夲紀都尉詡以聞在尾八度朱浮上疏以郡縣数代群陽騷動所致見浮𫝊七年三月癸亥晦潜潭巴曰癸亥日食天人崩鄭興曰頃年日食毎多在晦行疾也君亢急臣下促迫在畢五度畢為邉兵秋隗囂反侵安㝎冬盧芳所置􅃋方雲中太守各舉郡降古今注曰九年七月丁酉十一年六月癸丑十二月辛亥並日有食之十六年三月辛丑潜潭巴曰辛丑食主疑臣在􅄧七度􅄧為獄事時諸郡太守坐度田不實丗祖怒殺十餘人然後深悔之十七年二月乙未晦潜潭巴曰乙未食天下多邪氣欎欎蒼蒼京房曰君責衆庶暴害之在胃九度胃為廩倉時諸郡新坐租之後天下憂怖以榖為言故示象或曰胃供養之官也其十月廢郭皇后詔曰不可以奉供養二十二年五月乙未晦在栁七度京都宿也栁為上倉祭祀榖也近輿鬼輿鬼為宗廟十九年中有司奏請立近帝四廟以祭之有詔廟䖏所未㝎且就髙廟祫祭之至此三年遂不立廟有簡墮心奉祖宗之道有闕故示象也二十五年三月戊申晦潜潭巴曰戊申食地動揺侵兵强一曰主兵弱諸侯争在畢十五度畢為邉兵其冬十月以武谿蠻夷為宼害伏波将軍将兵擊之古今注曰二十六年二月戊子日有食之盡二十九年丁巳􅃋潜潭巴曰丁巳食下有敗兵在東壁為文章一名娵訾之口先是皇子諸王各招来文章談説之士去年中有人上奏諸王所招待者或真偽雜受刑罰者子孫宜可分别扵是上怒詔捕諸王客皆被以苛法死者甚多世祖不早為眀設刑禁一時治之過差故天示象丗祖扵是改悔遣使悉理侵枉也三十一年五月癸酉晦潜潭巴曰癸酉食連陰不觧淫雨毁山有兵在栁五度京都宿也自二十一年示象至此十年後二年宫車晏駕中元元年十一月甲子晦在斗二十八度斗為廟主爵祿儒説十一月甲子時王日也又為星紀主爵祿其占重眀帝永平三年八月壬申晦潜潭巴曰壬申食水滅陽潰隂􅁒翔在氐三度氐為宿宫是時眀帝作北宫古今注曰四年八月丙寅時加未日有食之五年乙未􅃋日有食之京候者不覺河南五郡國三十已上六年六月庚辰晦日有食之時雒陽候者不覺八年十月古今注曰十二月壬寅晦日有食之既潜潭巴曰壬寅食天下苦兵大臣驕横在斗十一度斗吴也廣陵扵天文屬吴後二年廣陵王荆坐謀反自殺十三年十月古今注曰閏八月甲辰晦潜潭巴曰甲辰食四騎脅大水在尾十七度京房占曰主后夀命絶後有大水十六年五月戊午晦潜潭巴曰戊午食乆旱榖不傷在栁十五度儒説五月戊午猶十一月甲子也又宿在京都其占重後二年宫車晏駕十八年十一月甲辰晦在斗二十一度是時眀帝既崩馬太后制爵祿故陽不勝章帝建初五年二月庚辰􅃋潛潭巴曰庚辰食彗星東至有宼兵在東壁八度例在前建武二十九年是時羣臣争經多相毁者又别占云庚辰食乆旱六年六月辛未晦潜潭巴曰辛未食大水在翼六度翼主遠客冬東平王蒼等来朝眀年正月蒼薨元和元年八月乙未晦史官不見他官以聞日在氐四度星占曰天下災期三年和帝永元二年二月壬午潜潭巴曰壬午食乆兩旬望史官不見涿郡以聞日在奎八度京易占曰三公與諸侯相賊弱其君王應而日食三公失國後旱且水臣昭以為三公宰輔之位即竇憲四年六月戊戌􅃋潜潭巴曰戊戌食有土殃主后死天下諒隂京房占曰婚嫁家欲戮在七星二度主衣裳又日行近軒轅左角為太后族是月十九日按本紀庚申幸北宫詔捕憲等庚申月二十三日上免太后兄弟竇憲等官遣就國選嚴能相扵國蹙迫自殺七年四月辛亥􅃋潜潭巴曰辛亥食子為䧺在觜觿為葆旅主收斂儒説葆旅宫中之象收斂貪妬之象是嵗鄧貴人始入眀年三月隂皇后立鄧貴人有寵隂后妬忌之後遂坐廢一曰是将入參參伐為斬刈眀年七月越騎校尉馮柱捕斬匈奴温禺犢王烏居戰十二年秋七月辛亥􅃋在翼八度荆州宿也眀年冬南郡蠻夷反為宼十五年四月甲子晦在東井二十二度東井主酒食之宿也婦人之職無非無儀酒食是議去年冬鄧皇后立有丈夫之性與知外事故天示象是年雨水傷稼安帝永初元年三月二日癸酉在胃二度主廪倉是時鄧太后専政去年大水傷稼倉廪為虚古今注曰三年三月日有食之五年正月庚辰􅃋在虚八度正月王者綂事之正日也虚空名也是時鄧太后攝政安帝不得行事俱不淂其正若王者位虚故扵正月陽不克示象也扵是隂預乗陽故蠻夷並為宼害西邉諸郡皆至虚空七年四月丙申晦潜潭巴曰丙申食諸侯相攻京房占曰君臣暴虐臣下横恣上下相賊後有地動在東井一度元初元年十月戊子􅃋潜潭巴曰戊子食宫室内媱雌必惑䧺京房占曰妻欲􅊣夫九族夷滅後有大水在尾十度尾為後宫継嗣之宫也是時上甚幸閻貴人将立故示不善將為繼嗣禍也眀年四月遂立為后後遂與江京耿寳等共讒太子廢之二年九月壬午晦在心四度心為王者眀乆失位也三年三月二日辛亥在婁五度史官不見遼東以聞四年二月乙亥􅃋潜潭巴曰乙亥食東國𤼵兵京房占曰諸侯上侵以自益近臣盜竊以為積天子未知日為之食在奎九度史官不見七郡以聞奎主武庫兵其年十月八日壬戌武庫火燒兵噐也五年八月丙申􅃋在翼十八度史官不見張掖以聞潜潭巴曰丙申食夷狄内攘石氏占曰王者失禮宗廟不親其嵗旱六年十二月戊午􅃋日有食之幾盡地如昏状古今注曰星盡見春秋緯曰日食既君行無常公輔不修徳夷狄强侵萬事錯在湏女十一度女主惡之後二嵗三月鄧太后崩永寜元年七月乙酉􅃋潜潭巴曰乙酉食仁義不眀賢人消亰房占曰君弱臣強司馬将兵反征其主在張十五度史官不見酒泉以聞石氏占曰日食張王者失禮延光三年九月庚寅晦京房占曰骨肉相賊後有水在氐十五度氐為宿宫宫中宫也時上聽中常侍江京樊豐及阿母王聖等讒言廢皇太子四年三月戊午􅃋在胃十二度隴西酒泉􅃋方各以状上史官不覺順帝永建二年七月甲戌􅃋日有食之潜潭巴曰甲戌食草木不滋主命不行京房占曰近臣欲戮身及戮辱後小旱在翼九度陽嘉四年閏月丁亥􅃋潜潭巴曰丁亥食匿謀滿玉堂京房占曰君臣無别在角五度史官不見零陵以聞按張衡為太史令表奏云今年三月􅃋方覺日食北郡懼有兵患臣愚以為可勅北邉瀕塞郡縣眀烽火逺斥候深蔵固閉無令穀畜外露不詳是何年三月永和三年十二月戊戌􅃋在湏女十一度史官不見會稽以聞眀年中常侍張逵等謀譛皇后父梁商􅁒作亂推考逵等伏誅也五年五月己丑晦潜潭巴曰日食己丑天下唱之在東井三十三度東井三輔宿也又近輿鬼輿鬼為宗廟其秋西羗為宼至三輔陵園六年九月辛亥晦在尾十一度尾主後宫繼嗣之宫也以為繼嗣不興之象桓帝建和元年正月辛亥􅃋日有食之在營室三度史官不見郡國以聞是時梁太后攝政三年四月丁卯晦潜潭巴曰丁卯食有旱有兵亰房占曰諸侯欲戮後有裸蟲之殃在東井二十三度例在永元十五年東井主法梁太后又聴兄冀枉殺公卿犯天法也眀年太后崩元嘉二年七月二日庚辰在翼四度史官不見廣陵以聞亰房占曰庚辰食君易賢以剛卒以自傷後有水翼主倡樂時上好樂過阮籍樂論曰桓帝聞琴悽愴傷心倚床而悲慷慨長息曰善乎㢤為琴若此一而足矣永興二年九月丁卯􅃋在角五度角鄭宿也十一月泰山盜賊群起刼殺長吏泰山扵天文属鄭永夀三年閏月庚辰晦在七星二度史官不見郡國以聞例在永元四年後二嵗梁皇后崩冀兄弟被誅延熹元年五月甲戌晦在柳七度亰都宿也梁兾别傳曰常侍徐璜白言臣竊見道術家常言漢死在戌亥今太嵗在丙戌五月甲戌日食栁宿朱雀漢家之貴國宿分周地今亰師是也史官上占去重見輕璜召太史陳援詰問乃以寔對兾恐援不為隐諱使人隂求其短𤼵摘上聞上以亡失候儀不敬有司奏收殺獄中八年正月丙申晦在營室十三度營室之中女主象也其二月癸亥鄧皇后坐酗上送暴室令自殺家屬被誅吕太后崩時亦然九年正月辛卯􅃋潜潭巴曰辛夘食臣伐其主在營室三度史官不見郡國以聞谷永以為三朝尊者惡之其眀年宫車晏駕永康元年五月壬子晦潜潭巴曰壬子食妃后專恣女謀王在輿鬼一度儒説壬子淳水日陽不克将有水害其八月六州大水渤海盜賊靈帝建寜元年五月丁未􅃋潜潭巴曰丁未食王者崩冬十月甲辰晦日有食之二年十月戊戌􅃋右扶風以聞三年三月丙寅晦梁相以聞四年三月辛酉􅃋潜潭巴曰辛酉食女謀王谷永上書飲酒無節君臣不别姦邪􅁒起傳曰酒無莭兹為荒厥異日食厥咎亡靈帝好為商估飲扵宫人之肆也熹平二年二月癸酉晦在虚二度是時中常侍曹節王甫等専權蔡邕上書曰四年正月􅃋日體微傷羣臣服赤幘赴宫門之中無救乃各罷歸夫有大異隐而不宣求御過是已事之甚者六年十月癸丑􅃋趙相以聞谷永上書賦斂滋重不頋黎民百姓虚竭則日食将有潰叛之變光和元年二月辛亥􅃋十月丙子晦在箕四度箕為後宫口舌是月上聽讒廢宋皇后按本傳盧植上書丙子食自已過午既食之後雲霧晻暖陳八事以諌蔡邕對問曰詔問踐祚以来災眚屢見頻嵗日食地動風雨不時疫厲流行勁風折木河淮盛溢臣聞陽㣲則日食隂盛則地動思亂則風貌失則雨視闇則疾簡宗廟水不潤下川流滿溢眀君臣上下抑陰尊陽修五事扵聖躳致精慮扵共御其救之也二年四月甲戌􅃋四年九月庚寅􅃋潜潭巴曰庚寅食将相誅大水多死傷在角六度中平三年五月壬辰晦潜潭巴曰壬辰食河決海乆霧連隂六年四月丙午􅃋其月浃辰宫車晏駕獻帝初平四年正月甲寅􅃋在營室四度潜潭巴曰甲寅食雷電擊殺骨肉相攻是時李㴶郭汜專政袁宏紀曰未食八刻太史令王立奏曰日晷過度無有變也扵是朝臣皆賀帝宻令尚書候焉未晡一刻而食尚書賈詡奏曰立伺候不眀疑誤上下太尉周忠職所典掌請皆治罪詔曰天道逺事騐難眀且災異應政而至雖探道知幾焉䏻無失而欲歸咎史官益重朕之不徳也弗從扵是避正殿寢兵不聽事五日興平元年六月乙巳晦建安五年九月庚午􅃋潜潭巴曰庚午食後火燒官兵六年十月癸未􅃋十三年十月癸未􅃋潜潭巴曰癸未食仁義不眀在尾十二度十五年二月乙巳􅃋十七年六月庚寅晦二十一年五月己亥􅃋潜潭巴曰己亥食小人用事君子縶二十四年二月壬子晦凡漢中興十二丗百九十六年日蝕七十二􅃋三十六晦二十七月二日三文獻通考卷二百八十二
