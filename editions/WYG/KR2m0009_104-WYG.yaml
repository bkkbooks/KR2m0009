body:
  text: 文獻通考卷一百四鄱陽馬端臨貴與著宗廟考十四諸侯宗廟諸侯五廟二昭二穆與太祖之廟而五太祖始封之君王者之後不為始封之君廟太疏曰凡始封之君謂王之子弟封為諸侯為後世之祖當此君之身不得立出王之廟則全無廟也故諸侯不敢祖天子若有大功徳王特命立之則可若魯有文王之廟鄭祖厲王是也魯非但得立文王之廟又立姜嫄之廟及魯公武公之廟并周公及親廟除文王廟外猶八廟也此皆有功徳特賜非禮之正此始封君之子得立一廟始封六世之孫始五廟備也若異姓始封如太公之屬初封則得立五廟從諸侯禮也若二王之後郊天之時則得以逺代之祖配天而祭故禮運云杞之郊也禹也宋之郊也契也諸侯五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享甞乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼注見天子宗廟條疏諸侯立五廟一壇一墠者降天子故止有五廟壇墠與天子同無功徳之祖為二祧也曰考廟曰王考廟曰皇考廟皆月祭之者天子月祭五諸侯卑故唯得月祭三也顯考廟祖考廟享甞乃止者顯考髙祖也太祖乃不遷而與髙祖並不得月祭止預四時又降天子也去祖為壇者去祖謂去太祖也即髙祖之父諸侯無功徳二祧若髙祖之父亦遷即寄太祖而不得於太祖廟受時祭唯有祈禱則去太祖而往壇受祭也成廟皆遷之新廟君前徙三日齋祝宗人及從者皆齋謂親過髙祖則毁廟以昭穆遷之春秋榖梁傳曰作主壊廟有時日於練焉壊焉廟壊廟之道易擔可也改塗可也范寗云納新神故示有所加鄭元云虞禮記注曰練而後遷也禮志云遷廟者更釁其廟而移故主焉案此篇成廟之文與榖梁相傳也徙之日君元服從者皆元服周禮司服職曰公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自絺冕而下如子男之服卿大夫之服自元冕而下如孤之服玉藻曰君命屈狄再命禕衣内司服職曰辨外内命婦之服鞠衣展衣縁衣素紗其於祭也君與大夫皆申其服祭統曰公衮冕立於阼夫人副禕立於東房是也臣及命婦助祭於君皆盡其服自祭於家咸降一等隂爵不敢申也雜記曰大夫冕而祭於公弁而祭於已士弁而祭於公冠而祭於已特牲饋食禮曰主婦纚笄宵衣立於房中是也然鄭氏頓貶公侯使一同元冕以祭已非其差也且諸侯専國禮樂車服王命有之何獨抑其服乎玉藻曰元端以祭禆冕以朝孫炎云端當為冕元冕祭服之下也其祭先君亦禆冕矣孫說為合下未即告故畧同爵弁也君命屈狄與再命禕衣者謂其夫為君則命其妻以屈狄與再加等之命則上公夫人乃禕衣孫鄭等改禕衣非也又云一命展衣者此則申子男臣妻之服耳言小國臣妻一命者亦展衣不命者則亦縁衣元又分公卿大夫及其妻為三等而升降其服經云孤絺冕卿大夫元冕冠何為易之又命小國之卿及内子更同列國之卿孤絺冕與鞠衣錯易其次尤非宜徙至於廟廟殯宫羣臣如朝位列於廟門外如路門之位君入立於阼階下西向有司如朝位立於門内如門外之位宗人擯舉手曰有司具請升君升祝奉幣從在左北面祝主辭故在左神將遷故出在户牖間南面矣再拜興祝聲三曰孝嗣侯某敢以嘉幣告於皇考某侯言嗣以遷代不言國未忍有之矣成廟將徙敢告卒不奠幣者禮畢矣於此將有事於新廟君及祝再拜興祝曰請導君降立於階下奉衣服者皆奉以從祝不言奉主而稱奉衣服者以毁易祖考誠人神之不忍從祝者祝所以導神也言皆者衣服非一稱周禮守祧職曰掌先王先公之廟祧其遺衣服蔵焉奉衣服者降堂君及在位者皆辟也奉衣服者至碑君從有司皆以次從出廟門奉衣服者升車乃歩君升車從者皆就車也皆就車謂乘貳車者凡出入門及大溝渠祝下擯神車祝為左故於歩處則下至於新廟筵於户牖間始自外來故先於堂罇於西序下四時之祭在室筵隩中在堂筵序下是以設罇恒於東方今惟布南面之席故置罇於西以因其便矣脯醢陳於房中房西房也諸侯在右房也設洗堂東榮南北以堂深深申鴆反記因卿士當言東有司皆先入如朝位祝導奉衣服者乃入君從奉衣服者入門左門左門西在位者皆辟也奉衣服者升堂皆反位君從升奠衣服於席上祝奠幣於几東君北向祝在左贊者盥升適房薦脯醢君盥酌奠於薦西反位君及祝再拜興祝聲三曰孝嗣侯某敢用嘉幣告於皇考某侯今月吉日可以徙於新廟敢告再拜君就東廂西面祝就西廂東面東西俟也祝就西廂因其便也在位者皆反走辟如食間走趨走也擯者舉手曰請反位君反位祝從在左卿大夫及衆有司諸在位者皆反位祝聲三曰孝嗣侯某潔為而明薦之享詩云吉蠲為饎是用孝享君及祝再拜君反位東廂之位祝徹反位西廂之位擯者曰遷廟事畢請就燕君出廟門卿大夫有司執事者皆出廟門告事畢事謂内主蔵衣服斂幣徹几筵之等乃曰擇日而祭焉所以安神大戴禮右諸侯遷廟成廟釁之以羊廟新成而釁者尊而神之祭器名者成則釁之以豭也君元服立於寢門内南向祝宗人宰夫雍人皆元服以神事故亦同爵弁以載君朝服謂不與也宗人曰請令以釁某廟君曰諾遂入雍人拭手拭帨乃行入廟門碑南北面東上居上者宰夫也宰夫攝主也雍人舉羊升屋自中中屋南面刲羊血流於前乃降門以雞有司當門北面有司宰夫祝宗人也雍人割雞屋下當門郟室割雞於室中有司亦北面也郟室門郟之室一曰東西廂也釁東西室有司猶北面統於廟也既事宗人告事畢皆退反命於君君寢門中南向宗人曰釁其廟事畢君曰諾宗請就宴君揖之乃退大戴禮人又按禮記雜記云成廟則釁之其禮祝宗人宰夫雍皆爵弁純衣雍人拭羊宗人視之宰夫北面於碑南東上雍人舉羊升屋自中中屋南面刲羊血流於前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室有司皆鄉室而立門則有司當門北面既事宗人告事畢乃皆退反命於君曰釁其廟事畢反命於寢君南鄉於門内朝服既反命乃退路寢成則考之而不釁釁屋者交神明之道也凡宗廟之器其名者成則釁之以豭豚大刲苦圭反衈如志反鄉許亮反朝直遥反豭音加戴禮雍人割雞屋下註引雜記文又曰案小戴割雞亦於屋上記者不同耳此不言衈畧也右諸侯釁廟子貢觀於魯廟之北堂出而問於孔子曰鄉者賜觀於太廟之北堂未既輟還復瞻九盖被皆繼邪彼有説邪匠過絶邪北堂神主所在也輟止也九當為北被當為被傳寫誤耳盖音盍扇户也皆繼謂其材木斷絶相接繼也子貢問北盍皆繼續彼有説邪匠過誤而遂絶之也家語作還瞻北盖皆斷焉彼有說邪匠過之也王肅註云觀北面之盖皆斷絶也孔子曰太廟之堂亦嘗有說言舊曽說今則無也官致良工因麗節文致極也官致良工謂初造太廟之時官極其良工良工則因随其木之美麗節文而裁制之所以斷絶家語作官致良工之匠匠致良材盡其功巧盖貴文也楊氏家語作盖貴乆矣尚有說也與此註少異非無良材盖曰貴文非無良材大木不斷絶者盖所以貴文飾也荀子宥坐文公十有三年世室屋壊公羊子曰世室魯公之廟也魯公周公子伯禽周公稱大廟魯公稱世室羣公稱宫大音㤗廟疏曰周公稱大者即僖八年禘於大廟文二年大事於大廟是也魯公稱世室者即此經是也羣公稱宫者即武宫煬宫之屬是也此魯公之廟也曷為謂之世室世室謂猶世室也世世不毁也周公何以稱太廟於魯據魯公始封也封魯公以為周公也榖梁子曰大室屋壊者有壊道也譏不修也禮宗廟之事君親割割牲夫人親舂舂粢盛也敬之至也為社稷之主而先君之廟壊極稱之志不敬也魯公之廟文世室也武公之廟武世室也魯公伯禽也武公伯禽之元孫也名敖者疏曰魯有二廟不毁象周之文武二祧也文世室魯公伯禽有文德世世不毁其室故云文世室武世室者伯禽元孫武公有武德其廟不毁故云武世室按成六年立武宫公羊左氏並譏之不宜立也又武公之廟立在武公卒後其廟不毁在成公之時作記之人因成王褒魯遂盛美魯家之事因武公之廟不毁遂連文而美之非實辭也明堂位莊公二十三年秋丹桓宫楹桓公廟也楹柱也榖梁子曰禮天子諸侯黝堊黝於紏反堊烏路反又烏洛反范云黝堊黒色案黝黑也堊謂白堊大夫蒼士黈黈他茍反黈黄色丹楹非禮也莊公二十四年春刻桓宫桷桷音角榱也方曰桷圜曰椽榖梁子曰天子之桷斵之礱之斵丁角反削也礱力公反磨也加密石焉以細石磨之諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也非正謂刻桷丹楹也成公三年新宫災三日哭公羊子曰宣公之宫也以無新宫知宣公之宫廟曷為謂之新宫不忍言也親之精神所依而災孝子隠痛不忍正言也謂之新宫者因新入宫易其西北角示昭穆相繼代有所改更也其言三日哭何據桓僖宫災不言三日哭廟災三日哭禮也善得禮痛傷鬼神無所依歸故君臣素縞哭之縞古老反凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城周禮四縣為都四井為邑然宗廟所在則雖邑曰都尊之也言凡邑則他築非例莊公二十八年左氏傳君子將營宫室宗廟為先廐庫為次居室為後廐九又反曲禮下重先祖及國之用王制曰寢不踰廟天子不卜處太廟卜可建國之處吉則宫廟吉可知所疏曰建國之時總卜其吉不待更卜其處太廟之在以其吉可知矣記表國君下齊牛式宗廟疏曰熊氏云此文誤當以周禮齊右職註為正宜云下宗廟式齊牛曲禮下自天子達於庶人喪從死者祭從生者支子不祭從死者謂衣衾棺槨從生者謂奠祭之牲器孫疏曰盧植解云從生者謂除服之後吉祭之時以子官祿祭其父祖故云從生者若喪中之祭虞祔練祥乃從死者之爵故小記云士祔於大夫則易牲又云其妻為大夫而卒而后其夫不為大夫而祔於其妻則不易牲又雜記云上大夫之虞也少牢卒哭成事祔皆太牢下大夫之虞也犆牲卒哭成事祔皆少牢是喪中之祭得從生者之爵與小記雜記違者小記雜記據死者子孫身無官爵生者又無可祭享故喪中之祭皆用死者之禮若其生者有爵則祭從生者之法喪祭尚爾喪後吉祭可知奠謂葬前祭謂葬後包喪終吉祭也鄭必知祭兼喪祭與盧植别者以此云祭從生者喪從死者相對又中庸云父為大夫子為士葬以大夫祭以士又云父為士子為大夫葬以士祭以大夫祭又與葬相對皆祭與喪葬連文是一時之事故祭中兼為喪奠也王制武王末受命周公成文武之德追王大王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫追王之王去聲末此言周公之事猶老也追王盖推文武之意以及乎王跡之所起也先公組紺以上至后稷也上祀先公以天子之禮又推大王王季之意以及於無窮也制為禮法以及天下使葬用死者之爵祭用生者之祿中庸父為士子為天子諸侯則祭以天子諸侯其尸服以士服祭以天子諸侯養以子道也尸服士服父本無爵子不敢以已爵加之嫌於卑之疏曰云尸服士服者謂尸服元端若君之先祖為士大夫則服助祭之服故曽子問云尸弁冕而出是為君尸有着弁者有着冕者若為先君士尸則着爵弁若為先君大夫尸則着元冕是也若大夫士之尸則服家祭之服故鄭註士虞記尸服卒者之上服士元端是也父為天子諸侯子為士祭以士其尸服以士服謂父以罪誅尸服以士服不成為君也祀其先君以禮卒者尸服天子諸侯之服如遂無所封立則尸也祭也皆如士不敢僭用尊者衣服為疏曰知謂父以罪誅者以其尸服士服故也以其嘗天子諸侯不可以庶人之禮待之士是爵之最卑故服其士服云祀其先君以禮卒者尸服天子諸侯之服者按左傳云宋祖帝乙是以禮卒者而宋祀以為祖明其服天子之服推此則諸侯亦然將祭主人各服其服筮於廟門外五等諸侯皆服元冕二王後及方伯為上公者與魯侯於周公朝服衮冕大夫以朝服士以元冠元端也日用丁巳内事用柔日必丁巳者取其令名自丁寧自變改皆以為謹敬也必先􅓪此日明日乃筮也筮旬有一日旬十日也以先月下旬之已筮來月下旬之已曰來月丁亥用薦嵗事丁者未必遇亥也宜舉一日以言之則己亥辛亥亦用之苟有亥焉可矣既得日吉乃官戒宗人命滌宰命為酒宿戒尸先宿尸者重所用又將筮明日朝服筮尸吉乃遂宿尸祝儐筮吉又遂宿尸重尸也祝為儐者尸神像也明日主人朝服即廟門外東方位南面宰宗人西面北上牲北首東上司馬刲羊司士繫豕宗人告偹乃退刲繫皆殺也此既省告備乃殺雍爨在門東北上特牲饋食禮陳鼎於門外玘面棜在南實獸腊牲在其西北首東足宗人視牲告充雍正作豕崔靈恩云二王後則自用其牲棜音於據反司馬概籩豆爵觶於東堂下雍人陳鼎五士禮主婦視饎爨於西堂下享於門外東方罇於户東實籩豆於房中司馬升羊右胖骨十一體腸胃祭肺各三舉肺一升上也髀不水近竅賤也此據大夫也若諸侯則太牢士則特牲胖音判士升豕如升胖之儀雍人掄膚九實於一鼎掄擇也膚負革肉也擇之取美司士又升魚腊司罇兩甒音武於户間有元酒小祝設盤匜餘之反於西階東為尸將盥主人朝服立於阼階司宫設筵於奥祝設几於筵上右之布神座也室中西南隅謂之奥主人出迎鼎主人先入尊導有司各升實籩豆罇俎祝盥升西階主人盥升阼階祝先入南面主人從入户内西面將納祭也祝先接神也士禮則主婦宗人宗婦升實籩豆等主婦被鬄他計反衣侈被薦自東房士禮主婦孋笄宵衣盥自中房薦豆崔靈恩云二王後夫人各以本國盛服侯伯夫人則服䄖狄子男及三公大夫夫人闕狄佐食司士序升西階相從設俎主婦設稷興入房祝酌奠祝主人再拜祝出迎尸尸升西階祝從尸升筵祝主人皆拜安尸尸不言答拜遂坐拜之使守坐也尸自此答拜遂坐而卒食尸祭卒食告飽主人酌酒酳尸尸拜受主人拜送尸祭啐卒爵祝酌授尸尸酢主人主人卒爵祝與佐食盥手取黍以授尸尸執以命祝祝受以東嘏於主人其辭曰皇尸命工祝承致多福無疆於汝孝孫來汝孝孫使汝受祿於天宜稼於田眉夀萬年主人再拜稽首受黍嘗之納諸内嘗之者重之至也納入也主人獻祝又酌獻佐食主婦酌獻尸受主婦拜送尸祭酒卒爵又酢主婦主婦酌獻祝與上佐食亦如之及賓長獻尸尸酢賓主人出立於阼階祝立西階告曰利成利飬也成畢也孝子飬禮畢祝入尸謖主人降謖起也謖音所六反祝先尸從遂出於廟門事尸之禮訖於廟門崔靈恩云二王後各得行其先王之禮尸各服其君之服尸君夫人入皆作樂殷人先樂降神後酌􅉱鬯以獻尸方伯之祭同服冕行九獻之法不得同二王後食前六獻食後三當食前四至酳為五更行四獻為九也王之兄弟封為侯伯時祭則尸坐南面主在東面侯伯則行七獻之禮子男則行五獻皆依其命􅁆凡五等之爵自祭皆用元冕未賜珪瓚者不以􅉱鬯直以酒灌神也凡諸侯灌用黄目為上齊則獻象以下已如君服以入奏肆夏君與夫人灌各一獻然迎牲麗於碑鸞刀啟其血毛以授祝祝入詔於室及殺始行朝踐之事尸南面主在西東面取膟膋燎於爐炭又詔神於室夫人酌盎齊以獻尸為三獻至薦熟時先以羮告設饌於堂後迎尸於奥君拜妥尸酌清以獻為四獻七酳五獻酬酢而至七獻禮成右通典序諸侯士大夫祭禮其文葢約儀禮饋食篇而纂其要然諸祭禮有上同乎天子者已參錯見於時享門如君親牽牲夫人薦盎之􅁼有下同乎卿大夫者其詳則已見儀禮少牢饋食等篇此未足以盡其說也後漢獻帝封曹操為魏公依諸侯禮立五廟於鄴後進爵為王無所改易晉安昌公荀氏進封大國祭六代時未立廟暫以㕔事為祭室須立廟如制備張祖高問謝沈曰諸侯祭五廟先􅓪日卜吉而行事為祭五廟諸畢邪按儀視殺延尸厥明行事晏朝乃闋五廟盡爾將終日不了若異日未見其義沈答曰五廟同時助祭者多晏朝乃闋季氏逮闇繼之以燭雖有强力之容肅敬之心皆倦怠也子路為宰與祭室事交乎尸堂事交乎階晏朝而退孔子聞之曰誰謂由不知禮賀循祭儀云祭以首時及臘首時者四時之初月嵗凡五祭將祭前期十日㪚齋不御不樂不弔前三日沐浴改服居於齋室不交外事不食葷辛静志虚心思親之存及祭施位范注祀禮云凡夫婦者皆同席貴賤同也兄弟同席謂未婚也牲大夫少牢士以特豕祭前之夕及腊鼎陳於門外主人即位西面宗人袒告充主人視殺於門外主婦視饎於西堂下設洗於阼階東南酒醴甒於房户牲皆體解肩臂臑三骨屬肱肩次臂臂次臑膊胳二屬股不取髀近竅不取胳股之本膊次體骼次膊脊以前為正脇旁為正周人尚右胖俎以骨為主貴者取貴骨羊一俎十一體舉肺三豕一俎十一體舉肺一祭肺三腊大夫全鹿一俎魚一俎䵄蕢白黒四物已廢今之俱出稻麥者代之此朝事之籩大夫有之腵修大夫賓尸主婦薦之􅟿餌粉資四物着籩􅓞食食羞豆也自糗以下六物少牢主人酬尸而薦以上皆大夫所加於七也凡新物皆随時有而薦不可逆載從獻上炙主人以肝主婦以肉謂之燔随酒而行禮祭主婦視饎爨於遂親設黍稷反葅醢及棗栗之薦令飯果出房明婦職也骼音古白反臑音奴到反醢音海平明設几筵東面為神位進食乃祝祝乃酌奠拜祝訖拜退西面立少頃酌酳禮一獻拜受酢飲畢拜婦亞獻薦棗栗受酢如主人凡獻皆有炙主人以肝主婦以肉其次長賓三獻亦以燔從如主人次及兄弟獻始進俎庶羞衆賓兄弟行酬一徧而止徹神俎羮飯為賓食食物如祭餕畢酌酳一周止佐徹神饋饌於室中西北隅以為厭祭孝子不知神之所在改置於此庶㡬見享既設閉牖户以為幽宗人告畢賓乃退凡明日將祭今夕宿賓祭日主人羣子孫宗人祝史皆詣㕔事西面立以北為上有薦新在四時仲月大夫士有田者既祭而又薦無田者薦而不祭後魏孝明帝神龜初靈太后父司徒胡國珍薨贈太上秦公太傅清河王懌議按禮記二昭二穆與太祖而五並是後代追論備廟之文皆非當時據立神位之事今秦公初構國廟追立神位唯當仰祀二昭二穆上極高曽四代而已何者秦公身是始封之君將為不遷之祖若以功業崇重越居正位恐以卑臨尊亂昭穆也如其權立始祖以備五廟恐􅁆滿便毁非禮意也昔司馬懿立功於魏為晉太祖及至子晉公昭乃立五廟亦祀四代止於高祖曽祖太祖之位虛俟宣文待其後裔􅁆滿乃止此亦前代之成事方今所殷鑒也禮緯云夏四廟至子孫五殷五廟至子孫六周六廟至子孫七明知當時太祖之神乃依昭穆之序要待子孫代代相推然後太祖出居正位懌又議曰古者廟堂皆别光武已來異位同堂是以相國構廟惟制一室周祭祖考比來諸王立廟者不依公令或五或一參差無凖相國之廟以造一室實合朝令宜即依此展其享祀詔依懌議北齊王及五等開國執事官散從二品以上皆祀五代牲用太牢唐制一品二品四廟其廟室牲牢服器之制並見大夫士庶宗廟門貞觀六年侍中王珪通貴漸久而不營私廟四時烝嘗猶祭於寢為法司所劾太宗優容之因官為立廟以愧其心廟在永樂城東北角正元八年修唐安寺移於寺西高宗儀鳳三年於文水縣置太原王武士彠廟德宗貞元十三年勅贈太傅馬燧祔廟宜令所司供少牢仍給鹵簿憲宗元和七年十一月太子少傅判太常卿事鄭餘慶建立私廟將祔四代神主廟有二夫人疑於祔配請禮院詳定修撰官太學博士韋公肅議曰古者一娶九女所以於朝無二嫡自秦漢已下不行此禮遂有再娶之說前娶後繼並是正嫡則偕祔之義於禮無嫌謹按晉驃騎大將軍溫嶠相繼有三妻疑並為夫人以問太學博士陳舒議以妻雖先没榮辱並随夫也禮祔於祖姑祖姑有三人則各祔舅之所生如其禮意三人皆夫人也秦漢已來諸侯不復一娶九女既生娶以正禮没不可貶自後諸儒咸用舒議且嫡繼於古則有殊制於今則無異等今王公再娶無非禮聘所以祔配之議不得不同至於卿士之家寢祭亦二妻位同几席豈廟享之禮而有異乎是知古者廟無不嫡防姪娣之爭競今無所施矣古之繼室皆媵妾也今之繼室並嫡妻也不宜援古一娶九女之制也而使子孫祭享不及或曰春秋聲子不入魯侯之廟如之何謹按魯恵公元妃孟子孟子卒繼室以聲子聲子之姪娣非正也自不合入恵公之廟明矣又武公生仲子則仲子歸於魯生桓公而恵公薨立宫而奉之追成父志别為宫也尋求禮意則當然矣未見前例如之何謹按晉南昌府君廟有荀氏薛氏景帝有夏侯氏羊氏聖廟睿宗廟有昭成皇后竇氏肅明皇后劉氏故太師顔魯公祖廟有夫人柳氏其流甚多不可悉􅁆略稽禮文參諸故事二夫人並祔於禮為宜宣宗大中五年十一月太常禮院奏據中書侍郎兼吏部尚書平章事崔龜從奏臣准式合立私廟伏准㑹昌五年二月一日勅㫖百官並不得京内置廟如欲於京内置廟者但准古禮於所居處置即不失敬親之禮者伏以武宗時縁南郊行事見天門街左右諸坊有人家私廟遂命禁斷且不欲令御路左右有廟宇許令私第内置則近北諸坊漸逼宫闕十年之内悉是人家私廟今若人家居第寛廣或鄰里可吞併者必便置廟以展孝思或居處􅄶狹鄰近無可開廣者便是終身廢廟享之榮公私情禮皆極不便國朝二百餘年在私家側近者不過三􅁆家今古殊禮頗為䙝黷其餘悉在近南逺坊通行已久今若緣南路不欲令置私廟却令居處建立廟宇即須種植松栢及白楊樹近北諸坊交恐非便以臣愚見天門街左右諸坊不許置廟其餘圍外逺坊本是隙地并舊是廢廟者許令建立即天門街側近既無私廟近北諸坊又免百官占地立廟並官至三品盡得升祔禰無乖禮經中外官僚已至三品者皆望有此釐革伏請下太常禮院重定立廟制度及去處庶得禮可遵行事無乖當奉今月一日勅宜依所奏下太常禮院審詳制度分析奏聞者伏以事亡如存典禮攸重今百官悉在京師若不許於京内置廟則烝嘗之禮難復躬親孝思之心或乖薦奠若悉令於居處置廟又緣近北諸坊便於朝謁百官第宅布列坊中其間雜以居人棟宇悉皆連接今廣開則鄰無隙地廢廟貌則禮闕敬親若令依㑹昌五年勅文盡勒於所居置廟兼恐十􅁆年間私廟漸逼於宫墻齊人必苦於吞併臣具詳本末冀便公私今請夾天門街左右諸坊不得立私廟其餘圍外逺坊任取舊廟及擇空閒地建立廟宇應立廟之初先取禮司詳定兼請准開元禮二品已上祠四廟三品祠三廟三品以下不須爵者四廟外有始封通祠五廟三品以上不得過九架並厦兩頭其三室廟制合造五間其中三間隔為三室兩頭各厦一間虛之前後亦虛之每室廟垣合開南門東門並有門屋餘並請准開元禮及曲臺禮為定制其享獻之禮除依古禮用少牢特牲饋食外有設時新及今時熟饌者並聽仍請永為定式勅旨宜依宋仁宗皇帝慶厯元年十一月南郊赦書應中外文武官並許依舊式創立家廟至和二年宰臣宋庠言慶厯郊祀赦書許文武官立家廟而有司終不能推述先典明喻上仁因循顧望遂踰十載使王公薦享下同委巷衣冠昭穆雜用家人緣偷襲弊甚可嗟也臣嘗因進對屢聞聖言謂諸臣専殖第産不立私廟寧朝廷勸戒有所未孚將風教頹陵終不可復睿心至意形於歎息臣毎求諸臣所以未即建立者誠亦有由葢古今異儀封爵殊制因疑成憚遂格詔書禮官既不講求私家何緣擅立且未信而望誠者上難必責定善而設教者下或有違若欲必如三代有冡嫡世封之重山川國邑之常然後議之則墜典無可復之期夫建宗祏序昭穆别貴賤之等所以為孝雖有過於為孝殖産利營居室遺子孫之業或與民爭利顧不以為耻逮夫立廟則曰不敢寧所謂去小違古而就大違古也今諸臣之惑不亦甚乎於是下兩制與禮官詳定制度而翰林學士承旨王堯臣等定官正一品平章事以上立四廟樞密使知樞密院事參知政事樞密副使同知樞密院簽書院事以上見任同宣徽使尚書節度使東宫少保以上皆立三廟餘官祭於寢凡得立廟者許嫡子襲爵以主祭其襲爵世降一等死即不得作主祔廟别祭於寢自當立廟者即祔其主其子孫承代不計廟祭寢祭並以世􅁆親疏皆祧始得立廟者不祧以比始封有不祧通祭四廟五廟因衆子立而嫡長子在則祭以嫡長子主之嫡長子死即不傳其子而傳立廟者之長凡立廟聽於京師或所居州縣其在京師者不得於裏城及南郊御路之側既如奏仍令别議襲爵之制其後終以有廟者之子孫或官微不可以承祭又朝廷難盡推襲爵之恩遂不果行嘉祐三年禮部尚書同中書門下平章事文彦博言伏覩禮官詳定家廟制度平章事以上許立四廟臣欲乞於河南府營創私廟伏乞降勅指揮從之元豐時彦博言先立家廟嵗八祭用酒以臣随行公使酒供辦今臣致仕不欲沽酒以祭乞於河南府公使庫逐祭寄造酒十石乃從之司馬溫公作文潞公先廟碑記曰先王之制自天子至於官師皆有廟君子將營宫室宗廟為先居室為後及秦非笑聖人蕩滅典禮務尊君卑臣於是天子之外無敢營宗廟者漢世公卿貴人多建祠堂於墓所在都邑則鮮焉魏晉以降漸復廟制其後遂著於令以官品為所祀世􅁆之差唐侍中王珪不立私廟為執法所糾太宗命有司為之營構以耻之是以唐世貴臣皆有廟及五代蕩析士民求生有所未遑禮頹教侈廟制遂絶宋興夷亂蘇疲久而未講仁宗皇帝閔羣臣貴極公相禰食於寢儕於庶人慶厯元年因郊祀赦聽文武官依舊式立家廟令雖下有司莫之舉士大夫亦以耳目乆不際往往不知廟之可設於家也皇祐二年天子宗祀禮成平章事宋公奏言請下禮官儒臣議定制度於是翰林承旨而下共奏請平章事以上立四廟東宫少保以上三廟其餘器服儀範俟更參酌以聞是嵗十二月詔如其請既而在職者違慢相仗迄今廟制卒不立公卿亦安故習常得諉以為辭無肯唱衆為之者獨平章事文公首奏乞立廟河南明年七月有詔可之然尚未知築構之式靡所循依至和初西鎮長安訪唐朝之存者得杜岐公遺跡止餘一堂四室及旁兩翼嘉祐元年始倣而營之三年増置前兩廡及門東廡以蔵祭器西廡以蔵家譜齋坊在中門之右省牲展饌視滌濯在中門之左庖厨在其東南其外門再重西折而南出四年秋廟成公以入輔出藩未嘗踰時安處於洛元豐三年秋留守西都始釁廟而祀焉公以廟制未備不敢作主用晉荀安昌公祠制作神版采唐周元陽議祀以元日寒食春秋分冬夏至致齋一日又以或受詔之四方不常其居乃配古諸侯載遷主之義作車奉神版以行此皆禮之從宜者也徽宗大觀四年議禮局議執政以上祭四廟為通祭三廟古無祭四世之文又侍從官以至匹庶通祭三世無等差多寡之别豈禮意乎古者天子七世今太廟已増為九室則執政視古諸侯以事五世不為過矣先王制禮以齊萬有不同之情賤者不得僭貴者不得踰故事二世者雖有孝思追逺之心無得而越事五世者亦當跂以及焉今恐奪人之思而使通祭三世徇流俗之情非先王制禮等差之義可文臣執政官武臣節度使以上祭五世文武陞朝官祭三世餘祭二世應有私第者立廟於門内之左如狹隘聽於私第之側力所不及仍許随宜古者寢不踰廟禮之廢久矣士庶堂寢踰度僭禮有五楹七楹九楹者若以一旦使就五世三世之􅁆則當徹毁居宇以應禮制可自今立廟其間􅁆視所祭世􅁆寢毋得踰廟事二世者寢聽用三間又言按禮記王制諸侯五廟二昭二穆與太祖之廟而五所謂太祖者葢始封之祖不必五世又非臣下所可通稱今髙祖以上一祖未有名稱欲乞稱五世祖從之又言群臣家廟所用祭器稽之典禮參定其制正一品每籩豆各十有二簠簋各四壼罇罍鉶鼎俎篚各二罇罍加勺羃各一爵一諸室共用胙俎一罍洗一從一品籩豆簠簋降殺以兩正二品籩豆各八簠簋各二其餘皆如正一品之􅁆詔禮制局製造取旨給賜時太師蔡京太宰鄭居中知樞密院事鄧洵武門下侍郎余深中書侍郎侯䝉尚書左丞薛昻尚書右丞白時中權領樞密院事童貫並以次給之高宗紹興十六年詔太師左僕射魏國公秦檜合建家廟命臨安守臣營之仍命禮器局製祭器以賜其後太傅昭慶節度儀同三司平樂郡王韋淵太尉保慶節度吳益少傅寧逺節度使殿前都指揮使楊存中並請建家廟賜以祭器孝宗隆興二年少師奉國軍節度四川宣撫使呉璘請用存中例立廟賜器從之乾道八年詔有司賜少保武安節度使四川宣撫使虞允文家廟祭器淳熙五年權户部尚書韓彦古請以臨安前洋街賜第建父世忠家廟就賜舍宇房緡以給嵗時祭祀之用儀制祭器請同存中少傅保寧節度侍讀衛國公史浩賜第於都請如諸臣故事建家廟賜祭器皆從之輔臣論世忠廟器中書舍人陳騤以禮難行駮之上問本朝群臣廟制如何賜器如何時趙雄等奏仁宗雖因赦論建廟未暇行也惟文彦博曽酌唐制為之未嘗賜器致和始命禮制局範銅以錫宰臣蔡京等紹興又用京例賜秦檜其張俊楊存中呉璘軰皆援檜以請上曰漢唐而下既未有賜祭器者惟器與名不可以假人命禮官考厯代及本朝之制八年十月乙夘中書舍人崔敦詩謂中興廟器斷自宸衷改用竹木省去雕文然一啟其端援者必衆謂宜詳講必傅古義乃協今宜禮賜圭瓚然後為鬯葢諸侯嗣立不敢専祭待命於天子必賜以圭瓚者祭祀交神惟灌為重舉其重以賜之而餘得自用初不盡賜之也臣謂銅為祭器可以傳逺今以竹木為之壊而不易則墜上之賜易而自制則棄君之命宜略倣古制命有司鑄爵勺各一賜之餘俾禮官定當用之式繢圖以畀俾自製以竹木從之嘉㤗元年太傅永興節度平原郡王韓侂胄奏曽祖琦效忠先朝奕世侑食而臣居止粗備家廟猶闕請下禮官考其制俾自建之頒祭器之式以竹木制毋紊有司詔下禮官討論每位以籩豆皆有十二簠簋皆四壺罇壺罍鉶豆俎豋洗皆二爵坫燭臺皆三坫一及巾杓篚以髹匣載以腰輿束以紫絛請下文思院製髹匣腰輿皆十紫紬帶二十十月己夘詔特鑄賜之二年通判嚴州張宗愈奏大父循忠烈王俊書勲盟府請以賜第舊址建家廟乞討論其制命文思院鐫誌祭器以賜詔令遵韓世忠廟器之制開禧三年忠州刺史劉伯震奏祖鄜武僖王光世復辟功請以賜第舊址立家廟從之嘉定十四年詔右丞相史彌逺賜第遵淳熙故事賜家廟命浙漕臨安府守臣營之既而禮官討論祭器如韓侂冑之制彌逺請併生母齊國夫人周氏及祔妻魯國夫人潘氏於生母别廟皆下有司賜器如式從之文獻通考卷一百四
