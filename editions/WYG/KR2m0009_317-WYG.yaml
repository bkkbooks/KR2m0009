body:
  text: 文獻通考卷三百十七鄱陽馬端臨貴與著輿地考三古兖州禹貢曰濟河惟兖州東南據濟水西北距河也濟水及河並具註序目篇九河既道河水分為九各從其道也九河已具註序目雷夏既澤雍沮會同雷夏澤名在今濮陽郡雷澤縣言此澤還復其故而雍沮二水同會其中也沮音千余反厥土黑墳色黑而墳起也厥草繇厥木條繇悦茂也條條暢也繇音遥浮於濟漯達於河浮以舟渡也濟水已具註序目篇漯水在漢時之東郡東武陽縣今魏郡莘縣有東武陽城無此水矣因水入水曰達漯音他合反浮於汶達於濟汶水出今魯郡萊蕪縣界言渡水西達於濟舜置十二牧兖其一也周禮職方曰河東曰兖州其山岱泰山今魯郡界藪曰大野一名鉅野澤在今東平郡鉅野縣川曰河泲浸曰盧濰盧水在濟陽郡盧縣濰水在今髙密郡莒縣與禹貢不同濰音維其利蒲魚人二男三女畜宜六擾六擾六畜穀宜四種黍稷稻麥蓋以沇水為名又兖之為言端也信也端言陽精端端故其氣殱殺也其在天文營室東壁則衞之分野漢之東郡及魏郡之黎陽皆其分野今靈昌濮陽之東北境濟陽之西北境博平之西南境皆是兼得魏宋齊趙之交漢之酸棗縣今靈昌之西境宜屬魏漢之東平及東郡之西昌壽張今東平及濮陽之東南境皆宜屬宋漢之泰山渤海之高樂高城重合陽信平原今濟陽之東南境平原樂安景城之南境博平之東境皆宜屬齊漢之信都清河渤海郡南至浮水今清河博平之北境景城之北境皆宜屬趙秦平天下置郡此為東郡今靈昌濮陽濟陽魏郡博平皆是碭郡之東北境今東平郡齊郡之北境今平原樂安郡鉅鹿上谷二郡之東境今清河景城郡是漢武置十三州此為兖州領郡國八後漢並因前代理昌邑今魯郡金鄉縣也魏晉亦置兖州領郡國八理廩邱今濮陽郡雷澤縣永嘉之後陷於石勒宋武平河南又得其地置兖州領郡六初理滑臺後理瑕邱滑臺今靈昌郡瑕邱今魯郡縣自二漢以後其兖州非悉是古州疆域所領郡國東境兼入青州之地西境則入荆河州之地宋末其地入後魏自後分割不可詳焉唐分置十五部此為河南道靈昌濮陽濟陽東平等郡皆是也河北道清河魏郡博平平原樂安景城等郡是也梁時滄德二州為唐所有末年貝博二州為唐所取唐滅梁傳晉漢周皆有其地宋以魏博貝滄海棣為河北東路濮鄆濟為京東西路滑為京西北路靖康後沒於金兖州舊疆界於河濟地非險固風雜數國魏晉宋齊趙五國之地秦漢以降政理混同人情朴厚俗有儒學及西晉之末為争戰之地三百年間傷夷特甚自宇内平一又如近古之風焉古兖州歴代沿革之圖春秋時可考者十國衞南境是齊南境是須句宿南燕胙遂邿郕任秦時為郡五東郡碭郡東北境是齊郡北境是鉅鹿東境是上谷東境是漢時為郡國八縣一百三十五東郡二十二縣濮陽茌畔觀博聊城黎頓邱范平平清𤼵干東阿離狐平臨邑馬利苖燕須昌武壽良廪樂昌陽白南東陽邱魏郡東境是縣見冀州泰山郡二十四縣奉高剛博柴茌蓋盧平肥成梁蛇邱東陽父萊蕪武鉅平富嬴南陽陽牟山蒙隂鄉華式寧陽桃桃乘邱濟隂郡九縣定陶句寃句秺吕都氏葭密城陽乘成陽鄄平原郡十九縣平原般鬲陵高唐阿重邱樂祝安平昌阿羽瑗陽漯隂朸富平安徳合陽樓虛龍􅋕清河郡十四縣清陽貝邱􅟗題信成繹幕東陽靈鄉厝繚鄃棗信强復陽東武城東平國七縣無鹽城任城富樊東平陸章亢父渤海郡二十六縣浮陽合陽信皮東光重南定阜城章武千童東平舒樂中邑重平高成安次高樂束州參户修市成平建成柳成臨景文安章鄉蒲領千乘郡十四縣千乘蓼城東鄒建信溼沃琅平安樂博昌被狄槐安陽高昌繁安高苑延鄉晉時為郡國十二縣八十三任城國三縣任城亢父樊濮陽國四縣濮陽廪邱白馬鄄城濟陽郡九縣定陶成欒氏單句陽城離狐氏武父陽宛邱已濟北國五縣盧臨邑東阿穀成蛇邱東平國七縣須昌無壽張范鹽剛平東平陸富城陽平郡七縣元城陽平舘陶樂平清泉東武陽𤼵干髙平國七縣昌邑高平鉅野金鄉方與南平陽湖陸樂陵國五縣厭次陽信漯沃新樂樂陵清河國六縣清河靈繹幕貝邱鄃東武城平原國九縣平原安德高唐鬲茌平城博平般聊西平昌渤海郡十縣南皮蓚東光川浮陽城饒安安阜城合廣高東陵重泰山郡十一縣奉髙武陽博泰萊蕪新嬴梁父東牟山茌鉅平南南武城隋時為郡七縣七十一東郡九縣白馬城靈昌城衞南邱濮陽胙韋封離狐匡城東平郡六縣鄄城野須昌鄆城宿城雷澤鉅濟北郡九縣盧北范壽陽穀肥東阿濟張城平隂長清武陽郡十四縣貴鄉城元城黄繁水陽魏武莘觀臨武水頓邱舘陶堂邑冠氏聊城平原郡九縣安樂弓平原東將陵般平昌河高光胡蘓長渤海郡十縣陽信無樂陵鹽商河南厭次清蒲臺安棣山皮池饒清河郡十四縣清河臨清陽清武成清歴亭高漳南經鄃清泉平唐城宗城博平茌平唐時為州十二縣七十九滑州七縣濮州五縣濟州五縣魏州十縣博州六縣鄆州五縣徳州七縣棣州五縣滄州十二縣貝州九縣澶州三縣景州五縣宋時為州十四縣七十三滑州四縣濮州四縣濟州四縣魏州十七縣博州四縣鄆州六縣德州五縣棣州三縣濵州二縣滄州七縣恩州五縣澶州七縣景州三縣通利軍二縣滑州其地得豕韋氏之國豕韋氏彭姓之國祝融之後陸終第三子曰翦封為彭春秋時屬衛戰國亦屬衞其西境屬魏秦二漢置東郡晉為陳留濮陽二國宋武平河南置兖州以為邊鎮領郡六理於此自晉末武帝作相平慕容超之後盡得河南之北境置守在此後屬後魏亦為東郡其城古滑臺城甚固宋文帝遣將王元謨攻圍之二百餘日不拔隋初置杞州後為滑州又改為兖州尋廢兖州置東郡唐為滑州或為靈昌郡義成軍節度屬河南道後改宣義軍領縣七白馬胙城匡城韋城酸棗衞南靈昌梁以酸棗匡城二縣屬開封府後唐復為義成軍晉以衞南屬澶州以衞州黎陽來屬宋太平興國初改武成軍為輔郡屬京西路端拱初以黎陽置通利軍後又為靈河郡武成軍節度熙寧五年廢州以其地𨽻開封府元豐四年復之屬京西北路建炎初沒於金劉豫僭位為涼平府金人𨽻山東大名府路又以韋城為黄河渰廢撥大名府内黄來𨽻貢絹領縣四治白馬白馬春秋衛國曹邑狄滅衞衞人立戴公廬於曹即此地酈生言守白馬之津是也中有白馬山黄河黎陽津靈河津金隄滑臺韋城古豕韋國有濮水胙城古南燕國姞姓漢南燕縣靈河隋靈昌縣後唐改熙寧初廢為鎮𨽻白馬縣濮州顓頊及昆吾氏之墟也故謂之帝邱今濮陽縣也昆吾氏當夏后之世春秋及戰國初為衞國之都春秋經曰衞遷於帝邱後為宋所侵盡亡其邑獨有濮陽秦滅濮陽置東郡二漢屬東郡濟隂二郡地晉分置濟陽郡濮陽國兼置兖州領郡國八治於此後魏為濮陽郡後周因之隋初郡廢置濮州煬帝初州廢以其地入東郡東平濟北三郡唐復置濮州或為濮陽郡屬河南道領縣五鄄城臨雷澤濮范濮陽晉以濮陽屬澶州宋因之屬京東路為濮陽郡團練建炎二年沒於金金𨽻山東大名府路貢絹領縣四治鄄城鄄城漢縣有旄邱陶邱黄河金隄雷澤舜漁於雷澤即此夲夏澤以其有雷神故名古郕伯國隋縣金人乃廢雷澤臨濮二縣為鎮𨽻鄄城臨濮唐縣有清邱左傳宋晉盟於清邱是范春秋范宣子邑隋縣濟州戰國初齊衞之境秦屬東郡漢末屬東郡泰山二郡地後漢屬東郡及濟北國晉同宋為濟北郡後魏因之隋初置濟州煬帝時復為濟北郡唐武德四年王世充改為濟州或為濟陽郡郡治即古碻磝城元魏所築屬河南道領縣五盧東平隂長陽穀阿清後廢周復置以鄆州之鉅野鄆城兖州之任城金鄉四縣𨽻之宋因之為上州防禦屬京東路靖康二年髙宗自濟入南京即位後陷於金金𨽻山東西路貢阿膠領縣四治鉅野鉅野有大野澤魯獲麟之地漢縣有蚩尤墓鄆城隋縣有馬頰河濮水洮溝青陵臺任城古任國太皥之後所封地漢縣有女媧陵邾婁城有承山泗水新河金鄉古緡國漢縣因事山得金而置鼂補之云平土淺山無金此獨有金唐置金州尋廢紹興十二年河決惟金鄉獨存金人始移州治於此魏州夏觀扈之國春秋晉地戰國時屬魏秦屬東郡二漢屬魏東二郡地二漢魏晉之魏郡皆今鄴郡地魏分置陽平郡晉因之宋文帝置東陽平郡後魏因之後周置魏州隋改為武陽郡唐武德四年討平竇建德改置魏州龍朔二年改為冀州改冀州為魏州仍置大都督府其魏貝博棣滄德六州並𨽻焉尋復舊開元二十八年九月刺史盧暉移通濟渠自石灰窠引流至州城西都注魏橋夾州製樓百餘間以貯江淮之貨或為魏郡屬河東道領縣十貴鄉魏元城邱舘陶頓昌樂城臨黄氏莘朝冠梁為天雄軍節度後唐為東京後興唐府俄改鄴都以貝州臨清來屬晉為廣晉府以臨清屬澶州漢為大名府周罷都復為天雄軍又以貝州之永濟宗城經城相州之内黄成安洹水博州之清平七縣來屬宋慶歴八年始置大名府路安撫使號北京統大名澶懷魏德博濵棣八州屬河北路建炎二年沒於金四年金立劉豫僣號齊尋遷於汴省北京為山東大名府其後以内黄𨽻滑州以成安宗城二縣𨽻洺州以臨清屬恩州紹定六年淮東制臣許國遣李全之將彭義斌自青崖崓攻大名下之以義斌為守未㡬復失貢花紬綿紬平紬紫草領縣十七治大名大名後魏貴鄉縣後唐改廣晉漢改今名屯氏河大河故瀆俗曰王莽河元城隋縣後唐改興唐晉復有沙麓山及馬陵孫臏書木殺龎涓之所南樂唐昌樂縣後割𨽻開德府魏隋縣有漳河館陶漢縣西北有陶邱古置館其側冠氏隋縣有弇水北沙河莘隋縣有泉原河朝城唐縣崇寧間割𨽻開德府夏津隋縣有屯氏河閏溝河臨清隋縣有御河張甲河永濟唐縣有永濟渠熙寧五年省𨽻臨清宗城隋縣有張甲河張渠經城隋縣熙寧六年省為鎮入京城清平隋縣有新渠金堤内黄隋縣河以北為内以南為外陳留有外黄此為内黄成安有安陽縣河漳河蚩尤塜洹水後周縣熙寧初省為鎮𨽻成安博州春秋時齊之西界聊攝地也戰國時為衞齊趙三國之交秦屬東郡漢為東郡平原清河三郡境後漢屬東郡平原二郡地晉屬平原國宋分置魏郡後魏因之其後置南冀州隋初廢後置博州煬帝初州廢以其地屬武陽郡唐復置博州或為博平郡屬河東道領縣六聊城邑博平堂髙唐清平武水周廢武水縣入聊城宋為防禦以清平縣𨽻大名屬河北路淳化三年以河決移治於孝武渡西建炎後沒於金金屬山東西路嘉定十二年淮東制置賈渉納降恩博景德四州旋失之貢平紬領縣四治聊城聊城漢縣有微子城黄河金沙水堂邑漢縣有黄河髙唐漢縣有烏犢河博平唐縣有漯河鄆州春秋時為魯之附庸須句國也左傳伐邾取須句是也戰國時屬宋秦屬碭郡漢屬東郡東平國地後為東平國晉宋後魏並因之後周宣帝置魯州尋廢隋又置鄆州煬帝初為東平郡治古須句縣唐為鄆州或為東平郡屬河南道領縣五須昌壽鉅野鄆宿城張城後為天平軍節度周以鄆城鉅野二縣屬濟州宋因之後改為東平府屬京東西路置安撫使大觀元年陞大都督府建炎後沒於金金𨽻山東西路嘉定十三年其節度使王福以鄆降河東北俱震後復失貢絹阿膠領縣六治須城須城秦須昌縣後唐改有梁山濟水清河中都唐縣有汶水大野陵金改為汶陽縣夀張漢縣有梁山濟水東阿秦縣有吾山穀城山黄河阿井陽穀隋縣景德三年徙治孟店平隂古肥子國隋縣德州春秋及戰國皆屬齊秦置齊郡漢髙帝分置平原郡後漢因之晉為