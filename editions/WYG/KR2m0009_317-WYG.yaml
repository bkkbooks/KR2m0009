周之青州兼有徐兖二州之分周禮職方曰正東曰青州其山曰沂藪曰孟豬沂山在今瑯琊郡沂水縣即沂水所出也孟豬澤名今睢陽郡宋城縣即明豬屬禹貢荆河州與職方山藪不同也川曰淮泗浸曰沂沭沭水出東海郡沭陽縣沭音述其利蒲魚人二男二女畜宜雞狗穀宜稻麥蓋以土居少陽其色為青故曰青州在天官虚危則齊之分野漢之淄川東萊瑯琊高密膠東濟南皆其分也秦平天下置郡此為齊郡今北海濟南淄川東萊東牟等郡地是瑯琊之東境今高密郡地也遼東今安東府秦亂項羽宰割天下以其地為國曰膠東以田市為王理即墨今東萊郡縣齊以田都為王理臨淄今北海郡縣地也濟北以田安為王理博陽謂之三齊漢武置十三州此亦為青州領郡國有六後漢因之領郡國五理臨淄今北海郡縣是也魏晉亦因之領郡國六晉又置平州領郡國五理昌黎今安東府也懷帝末沒於石勒慕容皝及慕容恪滅冉閔尅青州至苻氏平燕復有其地及苻氏敗後刺史苻朗以州降晉晉以為幽州以辟閭渾為刺史鎮廣固安帝時平州又陷於慕容垂其青州又為慕容德所據復改為青州慕容超移青州於東萊後為劉裕所尅復置青州時以羊穆之為刺史鎮廣固平州自慕容垂後又沒於馮跋旋為後魏所有其青州宋分為青冀二州青領郡九理臨淄冀領郡九理歴城今濟南郡縣後入後魏其後分析不可具舉唐分置十五部此為河南道北海濟南淄川東萊高密河北道安東府宋為東京路建炎後沒於金青州古齊號稱强國憑負山海擅利鹽鐵管仲謂楚師曰我齊東至於海西至於河南至於穆陵北至於無棣穆陵山在今瑯琊郡沂水縣界無棣今景城郡縣又燕王謂蘇秦曰吾聞秦地清濟濁河可以為固長城巨防可以為塞今濟陽郡盧縣界有防門山又有長城東至海太公用之而富人管仲資之以興霸人情變詐好行機術豈因輕重而為弊乎固知導人之方先務推以誠信漢高帝詈婁敬曰齊虜以口舌得官又汲黯斥公孫𢎞齊人多詐也逮於漢氏封立近戚漢初田肯說高帝曰齊東有瑯琊即墨之饒南有泰山之固西有濁河之險北有渤海之利隔懸千里齊得十二焉故號東西秦非親子弟勿王武帝臨極儒雅盛興晉恵之後淪沒僭偽慕容建國二代而亡今古風俗頗革亦有文學唐初立都督府命親王鎮之古青州歴代沿革之圖春秋時可考者五國齊莒萊牟譚秦時為郡三齊郡瑯琊郡東境是遼東郡漢時為郡國十二縣一百八十六北海郡二十六縣營陵平劇魁都安邱平瓡益壽昌望淳于羊石平的密柳泉新壽光樂樂望石饒城鄉成都鄉斟鄉桑犢鄉平上成膠陽劇髙密國五縣髙密昌安石泉夷安成鄉膠東國八縣即墨陽昌武盧下密觀鄒壮武都秩挺淄川國三縣劇東安平橋鄉濟南郡十四縣鄒平東臺陵梁鄒陽土鼔邱平般菅於陵朝陽陽歴城猇著宜成齊郡十二縣臨淄廣饒昌國昭南利胊西安鄉鉅定廣廣臺臨北平鄉瑯琊郡五十一縣東武諸不其梧成海曲靈門贛榆姑幕朱虛雲虚水黔陬臨原計瑯琊稻袚臯柜箕斤虞缾昌邞長雩段横平廣高東莞髙魏其柔昌即兹鄉麗昆山鄉參封鄉椑新廣鄉來武伊山鄉高陽陵駟望安安邱山折泉慎高臨石博石房山城陽國四縣莒陽都東安慮東萊郡十七縣掖平腄東平度㡉黄育臨朐昌曲成不牟牟犂陽夜當利盧鄉陽樂陽石徐鄉遼東郡十八縣襄平遼新昌番無慮險望平遼房城隊汗瀆陽候居就平高顯安安市武次平郭文沓氏西樂浪郡二十五縣朝鮮成􅠗邯地浿水方含資望黏蟬遂增帯駟東暆奚海冥彌列口列長岑而屯有台昭明莫鏤方頭提渾吞不蠶前邪昧華麗夫須元莵郡三縣高句驪上殷台西蓋馬晉時為郡國十一縣六十九齊國五縣臨淄廣饒東安平西安昌國濟南郡五縣平夀下密膠東即墨祝阿樂安國八縣高苑光臨濟朝博昌夀東陽利益蓼城鄒長廣郡三縣不其長廣挺城陽郡十縣莒密姑幕武諸黔昌安平淳于髙壯陬昌東武東莞郡八縣東莞劇朱虚廣營陵安邱蓋臨朐東萊國六縣掖當利盧鄉曲城黄㡉遼東國八縣襄平就文西新昌樂安平力城安市居就元莵郡三縣望平高句驪高顯樂浪郡六縣朝鮮望屯有渾彌遂成鏤方駟帶方郡七縣帶方海列口資冥南新長岑提奚含隋時為郡四縣三十六北海郡十縣益都都臨淄北千乘營博昌下夀光朐昌海邱密臨齊郡十縣歴城山祝阿苑臨邑山臨濟川鄒平長高亭淄章邱髙密郡七縣諸城安東莞西邱郚城琅琊髙密膠東萊郡九縣掖黄膠水平盧鄉登即墨牟文觀陽昌陽唐時為州八縣三十四青州七縣濰州二縣齊州八縣淄州五縣登州四縣密州四縣萊州四縣安東大都䕶府宋時為州七縣三十青州六縣濰州三縣齊州四縣淄州四縣密州五縣萊州四縣登州四縣青州少皥之世有爽鳩氏虞夏時有季萴仕側反湯末有逄公伯陵逄音蒲江反􅇻末有蒲姑氏皆為諸侯國於此地周成王時蒲姑氏與四國作亂成王滅之以封太公是為齊國所謂營邱後徙都臨淄亦其地今臨淄縣秦屬齊郡漢置北海郡晉為北海樂安二國之地兼置青州領郡國五理於此永嘉末陷於石勒冉閔亂段龕據之慕容恪攻圍數月而剋其後南燕慕容德建都於此慕容德初議所都尚書潘聰曰青齊沃壤號曰東秦地方千里四塞之固負海之饒可謂用武之國廣固者曹嶷之所營山川險峻足為帝王之都從之至慕容超宋武帝來伐超固守攻圍七月而拔之宋置青州領郡九理於此後入後魏又置青州宋將沈文秀為青州刺史守東陽城為後魏將慕容白曜攻圍三年無救而陷後周置齊郡隋文帝初郡廢煬帝初州廢置北海郡唐為青州或為北海郡屬河南道為平盧軍節度領縣七益都夀北海千臨淄光乘博昌臨朐晉為防禦漢復為平盧軍節度宋改為鎮海軍建隆三年以北海縣置軍屬京東路慶歴二年置京東東路安撫使郡東北至海故曰北海青齊鹽利被天下盗賊所聚建炎三年沒於金金為益都府𨽻山東路嘉定十二年金守張林以所部濵棣淄川來降濟沂莒州亦降俄復叛十五年山東忠義李全居青州以自守後亦叛貢仙紋綾梨棗領縣六治益都益都晉廣固城在縣西四里曹嶷所築有大澗甚廣故名廣固城有南山堯山淄澠水平盧水臨淄齊國都一名營邱為海岱間一都會有牛山愚山谷葵邱臨朐古伯氏駢邑有臨朐山夀光漢舊縣古紀國城在縣西有斟灌城寒浞國博興漢博縣後唐改有濟水時水海浦千乘漢博縣後唐置有濟水時水海浦濰州唐武德二年以青州之北海營邱下密置濰州八年州廢復𨽻青州宋建隆三年以青州北海縣建為北海軍又置昌邑縣𨽻之乾徳三年陞為濰州又增昌樂縣為上州團練屬京東路建炎二年沒於金金𨽻山東東路貢綜絲紽領縣三治北海北海唐縣有濰水昌邑隋都昌縣唐廢建隆三年復置昌樂唐營邱縣後廢乾徳中復置更名有方山聚角山丹水朐水齊州春秋戰國並屬齊秦屬齊郡漢韓信伐齊至歴下即其地也文帝分置濟南國景帝改為濟南郡樂安郡後周亦有濟南郡隋初廢煬帝初置齊州唐復為齊州或為臨淄郡復改為濟南郡屬河南道領縣八歴城臨濟臨章邱全豐齊亭禹城邑節山宋屬京東路咸平四年廢臨濟景德三年以章邱置清平軍熙寧三年廢軍復為縣𨽻齊州政和六年陞為濟南府興國軍節度齊當天中由腹齊也建炎二年守逆豫以州降遂沒於金金𨽻山東嘉定十三年金守王斌以城來降旋復失貢綿絹陽起石防風領縣四治歴城歴城漢縣有故譚國城歴山華不注山禹城古祝國唐縣有禹息城黎齊關長清隋縣至道二年徙城於刺榆店有磨笄山石茒四口關臨邑漢縣建隆元年河決公乘渡口壞縣城三年後移孫耿鎮淄州禹貢曰濰淄既道即其地也春秋戰國皆齊地秦屬齊郡漢屬濟南樂安二國之地又置淄川國晉屬樂安國後魏置東清河郡北齊廢之隋置淄州煬帝初併其地入齊郡唐復置淄州或為淄川郡屬河南道領縣五淄川苑長山陽鄒平高濟宋屬京東路景德三年以髙苑置宣化軍熙寧三年廢軍復為縣𨽻州建炎二年沒於金貢綾防風長理石領縣四治淄川淄川漢般陽縣有淄水萊蕪縣故城在東南漢淄川國亦在此古齊長城長山漢於陵縣陳仲子隐處有長白山粟水鄒平漢縣有濟水系河髙苑漢縣有黄河濟河密州戰國屬齊秦屬瑯琊郡漢屬髙密國城陽國地後漢屬瑯琊郡北海國地晉屬城陽郡後魏復置髙密郡後置膠州隋初為密州以密水為名煬帝後改為髙密郡唐因之屬河南道領縣四諸城密安邱高莒漢為防禦周為軍事宋復為防禦屬京東道開寳五年陞為安化軍節度建炎元年沒於金金𨽻山東路嘉定十二年賈渉命李全取濰密旋復失貢絹牛黄領縣五治諸城諸城隋縣有瑯琊山安邱古根牟國有劉山安邱山涪水汶水濰水莒春秋莒國有洺水濰水沭水浯水高密春秋晏平仲所食之邑隋縣有密水膠水膠西夲板橋鎮元祐三年置為縣置知縣兼臨海軍使萊州春秋時萊子國也禹貢萊夷作牧是也齊侯遷萊子於郳在齊國之東故曰東萊戰國屬齊秦屬齊郡兩漢為東萊郡晉為東萊國宋為東萊郡後魏復為東萊郡後置光州隋改為萊州煬帝改為東萊郡唐為萊州或為東萊郡屬河南道領縣四掖水即墨陽膠昌宋因之為防禦使屬京東道建炎三年沒於金金𨽻山東東路𨽻招逺縣貢牛黄海藻牡礪石器領縣四治掖掖漢縣有萬里沙漢武帝所禱萊陽漢昌陽縣後唐改有高麗山七子山五龍水膠水隋縣有明堂山金泉山膠水即墨漢縣有古不其城牢山不其山天寳山活水登州春秋牟子國也戰國屬齊秦屬齊郡漢以下並屬東萊郡唐武后分萊州置登州或為東牟郡屬河南道領縣四宋同宋為防禦屬京東路州三面距海祖宗時海中諸國朝貢皆由登萊常屯重兵習水戰為京東捍屏建炎三年沒於金金𨽻山東東路嘉定十三年賈渉取登萊旋失之貢金牛黄石器領縣四治蓬萊蓬萊名不夜城春秋時萊子所置以日夜出故名有羽山九月山之罘水駞碁沙門二寨黄漢縣有萊山黄水牟平漢縣有東牟山之罘山清陽水偽齊偽為寧海軍金始陞為州文登北齊縣有文登山成山昌陽水金人屬寧海安東大都䕶府舜分青州為營州置牧宜遼水之東是也春秋戰國屬燕秦立遼東郡漢因之東通樂浪本朝鮮國武帝元封三年朝鮮人斬其王而降以其地為樂浪元莵等郡後又置帶方郡並在遼水之東晉因之兼置平州領郡國五治於此自後漢末公孫度自號平州牧及其子康康子淵並擅據遼東東夷九種皆服事之魏置東夷校尉居襄平而分遼東昌黎元莵帶方樂浪五郡為平州後還合幽州及淵滅後有䕶東夷校尉居襄平晉咸寜二年分昌黎遼東元莵帶方樂浪等郡國五置平州以慕容廆為刺史屬永嘉之亂為衆所推及其孫儁移都於薊其後慕容垂子寳又遷於和龍後魏時髙麗國都其地唐總章元年李勣平髙麗得城百七十六分其地為都􅇂府九州四十二縣一百置安東都䕶府於平壤城以統之用其酋渠為都􅇂刺史縣令上元二年徙遼東故城儀鳳二年又徙新城聖歴元年更名安東都䕶府神龍元年復故名開元二年徙於平州天寳二年又徙於遼西故郡城至德後廢領羈縻州十四古徐州禹貢曰海岱及淮惟徐州東至海北至岱南及淮淮沂其乂蒙羽其藝淮沂二水已理蒙羽二山皆可種藝蒙山在瑯琊郡費縣羽山在東海郡朐山縣淮水出今淮安郡桐栢山沂出瑯琊郡沂水縣是也厥土赤殖墳草木漸苞殖黏也漸苞言相漸及苞裹而生羽畎夏翟嶧陽孤桐羽畎羽山之谷也出夏翟翟雉之羽可為旌旄者也嶧山之陽有特生之桐音可中琴瑟嶧山在今魯郡鄒縣也浮於淮泗達於河渡二水而入於河也亦舜十二牧之一州併徐州屬青州今分入兖州之域蓋取舒緩之義或云因徐邱以為名在天文奎婁則魯之分野漢之東海南有泗水至淮得臨淮之下相睢陵僮取慮皆其分也今魯郡之東南境及瑯琊之南境東海臨淮之北境皆其地慮音閭兼得宋齊吳之交漢之楚國山陽今彭城及魯郡之西境皆宜屬宋漢之瑯琊泰山今瑯琊之北境魯郡之北境宜屬齊漢臨淮之南境宜屬吳也秦平天下置郡此為泗水今臨淮彭城郡是也瑯琊之西境今瑯琊郡薛郡今魯東海等郡漢又加置東海郡漢武帝置十三州還以其地為徐州領郡國四後漢並因前代理於郯今臨淮郡下邳縣魏晉亦曰徐州領郡國七理彭城今郡自元帝渡江徐州所得唯半而已餘並没於石氏宋初因之領郡十三理彭城明帝初地入於後魏其後不可詳焉唐分置十五部此為河南道彭城臨淮魯郡東海瑯琊郡唐末海泗二州為楊行密所據後為南唐周世宗伐南唐取二州宋分為京東路沂京西路徐兖淮南東道海泗建炎後沒於金惟海泗二州屢得屢失紹興議和卒割以遺金徐方鄒魯舊國漢興猶有儒風自劉石亂華天下分裂分居二境尤被傷殘彭城要害藩捍南方必争之國常置重兵數百年中無復講誦况今去聖久逺人情遷蕩大抵徐兖其俗略同古徐州歴代沿革之圖春秋時可考者十四國魯薛邾滕徐鄫鄅紀郳蕭宋南境牟顓臾偪陽秦時為郡三泗水郡薛郡瑯琊郡西境是漢時為郡國八縣一百有六東海郡三十八縣郯曲蘭陵平戚襄賁開下邳祝良成費朐陽其利成即邱海曲于鄉蘭祺臨沂繒邱南城邱山鄉安建鄉厚容東合鄉平承鄉建陽陽曲陽陽司吾陵平曲慮都陽平隂郚武新建昌都臨淮郡二十九縣徐僮取慮射陽淮浦開陽盱眙贅其厹猶西平高山陽睢陵旌鹽瀆陵淮隂平淮陵陵下相陽富陵東播蘭高開昌廣平樂陵襄平海陵輿堂邑山陽郡二十三縣昌邑橐成武鉅野湖陵單父東緡都關方與城都邱薄淄黄鄉爰戚栗鄉郜成曲鄉中鄉陽平樂陽鄭南平西瑕瑯琊郡南境是縣見青州泰山郡南境是縣見兖州楚國七縣彭城留梧傅陽呂武原淄邱沛郡東境是縣見豫州魯郡六縣魯卞汶陽蕃騶薛泗水國三縣凌泗陽于晉時為郡國四縣三十五彭城國七縣彭城梧留廣戚傅陽武原吕魯郡七縣魯汶陽卞鄒蕃薛公邱東海郡十二縣郯厚祝其蘭朐邱陵襄賁昌利成合贛榆承慮鄉戚瑯琊郡九縣開陽東臨沂蒙陽都費安隂繒即邱華隋時為郡四縣三十三彭城郡十一縣彭城滕蘄陵榖陽離沛方留蘭符與豐蕭魯郡十縣瑕邱龔邱任城梁父鄒城曲阜博嬴泗水平陸下邳郡七縣宿豫郯夏邱城徐城淮陽下邳良東海郡五縣朐山東海漣水沭陽懐仁唐時為州六縣三十七徐州七縣泗州六縣兖州十一縣海州四縣宿州四縣沂州五縣宋時為州八縣二十七徐州五縣淮陽軍二縣泗州三縣兖州七縣海州四縣沂州五縣漣水軍一縣宿州五縣徐州古大彭之國春秋戰國為宋地春秋經曰圍宋彭城即宋本邑後屬楚謂之西楚項羽建都於此秦屬泗水郡漢為楚國沛郡地後漢及晉並為彭城國晉立徐州以為重鎮領郡國七治於此地宋因之領郡十二治同又為彭城沛二郡地文帝元嘉中王元謨上表曰彭城南届大淮左右清汴表裏京甸捍接邊境城隍峻整襟衞周固又自淮以西襄陽以北經塗三千逹於濟岱六州之人三十萬户常得全安實由此鎮後魏大將尉元上表曰彭城宋之要蕃南師來侵莫不因之以陵諸夏郡城由來非攻所能㧞言其險固也後魏得之置徐州兼立東南道行臺後周立總管府大將王軌破陳軍於吕梁擒吳明徹悉降其衆也隋改彭城郡唐為徐州或為彭城郡武寧軍節度屬河南道領縣七彭城豐沛滕蘄離蕭符宋屬京東路太平興國七年以下邳宿遷二縣建淮陽軍元豐初改屬京東西路按爾雅濟東曰徐州者商無青并青於徐也周禮正東曰青州者周無徐并徐於青也今以周九州考之青州得沂山及沂泗淮三水兖州得大野無復古徐州矣今州即古彭城地也三面阻水獨其南可通軍馬紹興後沒於金金𨽻山東西路貢雙絲綾紬絹領縣五治彭城彭城古大彭國有猴水泗水沛澤又有項羽及宋武戯馬臺沛漢縣有沛宫高祖置酒之所有泗水泡水漷水蕭古蕭叔國漢縣有眢井滕古滕及小邾二國地有桃山抱犢山漷水豐漢縣有始皇厭氣臺淮陽軍本徐州下邳縣後漢為下邳國梁為武州唐置邳州後屬泗州又屬徐州宋太平興國間建為軍并以泗州宿遷來屬屬京東東路其地三面阻水建炎三年沒於金金改為邳州𨽻山東西路貢絹領縣二治下邳下邳夏時為邳國漢楚王信所都有嶧陽山磬石山文山沂水泗水沭水睢水宿遷春秋時鍾吾子國東晉置宿遷郡唐縣有泗水汜水泗州古徐州地春秋為魯國地戰國魯宋吳三國之境秦屬泗水郡漢屬臨淮東海沛三郡地後漢以其地合於下邳國兼置徐州領郡四治於此宋為南彭城下邳二郡地後魏亦為下邳郡兼置南徐州東魏改為東楚州後周改為泗州隋改為下邳郡唐為泗州或為臨淮郡屬河南道領縣六臨淮水宿遷漣虹下邳徐城唐末為楊行密所有周世宗伐南唐而取之宋建隆二年廢徐城縣乾德元年以楚州之盱眙濠州之招義二縣來屬太平輿國三年以漣水縣屬漣水郡七年以下邳宿遷二縣𨽻淮陽軍屬河東路紹興以來屢為金所據攻奪不休十二年和議成割以遺金金𨽻河南路二十一年忠義人夏俊収復隆興再和復割以遺金而盱眙招信二縣并揚州之天長置盱眙軍紹定間又改招信軍貢絹領縣三治臨淮臨淮唐縣景德三年移治徐城驛有淮水磬石山盱眙漢縣有義帝祠都梁山盱眙山龜山淮水招信唐招義縣太平興國初改建炎四年以屬濠州兖州治瑕邱縣始禹導沇水而為濟截河南渡東流與荷澤汶水會又東北入於海兖州在濟河之間因濟水𤼵源為名今郡理乃北境也至周置兖州始兼得今郡之地而濟水自王莽末入河同流於海則河南之地無濟水矣自後所立皆襲舊名兼有濟南濟北濟陽濟隂郡國蓋建置之際未之審詳也古少皥之墟也禹貢徐兖二州之域任城龔邱縣即兖州界餘並徐州域春秋及戰國並魯國亦邾國之境邾國黄帝之後陸終之子曹姓所封也今鄒縣也今黄州亦邾國之地陸終之後所封蓋陸終有六子各為國也任國太皥之後風姓今任是也後亦為宋齊所侵東嶽泰山在焉秦為薛縣漢髙后更為魯郡及泰山山陽郡地後漢為任城國山陽泰山郡地兼置兖州領郡國八理於此晉改為魯郡宋為泰山高平魯三郡地及兖州領郡六理於此後魏亦為魯郡北齊改為任城郡隋初置兖州煬帝改為魯郡唐初偽魯徐圓朗都之尅平後改為兖州後為魯郡後為泰寧軍節度屬河南道領縣十一瑕邱鄉泗水輿鄒中曲阜龔萊蕪乾任城金方都邱封後唐以魚臺屬單州周為防禦以任城金鄉屬濟州宋建隆元年復為節度大中祥符元年陞為大都􅇂政和八年陞為襲慶府屬京東西路建炎後沒於金金𨽻山東西路貢大花綾墨雲母紫金石防風茯苓領縣七治瑕邱瑕邱漢縣有磁陽山泗水洸水仙源黄帝所生之地亦為少昊之墟古魯國都曲阜縣大中祥符五年改有夀邱洙水泗水慶源河孔子宅矍相圃窮桑大庭氏之庫奉符唐乾封縣開寳五年移治岱嶽鎮大中祥符元年改有泰山社首徂徠亭石閭髙里山偽齊改泰安軍金人陞州鄒古邾國漢縣有嶧山鳬山萊蕪唐縣有肅然山金屬泰安州龔邱隋縣有讙水泗水魯下邑隋縣有尼邱陪尾云云新甫山莵裘城鄒城海州春秋及戰國為魯之東境後屬秦為薛郡地後分薛郡為郯郡漢改郯為東海郡後漢及晉因之宋亦然兼僑立青冀二州梁置南北二青州後入後魏東魏改為海州隋改為東海郡唐為海州或為東海郡屬河南道領縣四朐山陽東海沭懐仁宋為團練屬淮東路建炎後陷於金紹興十年韓世忠遣王勝収復十一年張浚夷其城遷其民於鎮江三十一年張子蓋帥諸將死戰大敗金師隆興初魏下海州虜攻之不尅湯思退割以遺金金人𨽻山東東路又撥漣水縣來𨽻嘉定十三年制臣賈渉遣李全收復貢絹獐皮鹿皮領縣四治朐山朐山後周縣有秦始皇立石海上以為秦東門有羽山東海隋縣有蒼梧山捍海堰懷仁後魏縣有祝其城夾谷沭陽後周縣有汶水沂州春秋時齊魯二國之地戰國屬齊魯二國之境秦瑯琊郡漢為東海瑯琊二郡地後置瑯琊國魏晉亦置瑯琊國宋為瑯琊郡齊不得其地後魏置北徐州後周改為沂州隋復為瑯琊郡唐為沂州或為瑯琊郡屬河南道領縣五臨沂新泰沂水費承宋為防禦屬京東路建炎以後沒於金金𨽻山東東路貢仙靈脾紫石英茯苓鍾乳石領縣五治臨沂臨沂漢縣有羽山沂水沭水沂水隋縣有穆陵山齊南界有大峴山險固處慕容超不能據故敗費古費國唐縣有蒙山東蒙山承春秋鄫子國唐縣有抱犢山偪陽城新泰晉縣有具山敖山漣水軍本泗州漣水縣地宋太平興國三年建為軍熙寧五年廢為縣屬楚州元祐二年復為軍屬淮東路紹興十一年沒於金三十二年收復依舊𨽻楚州又𨽻海州以去海州二百四十里不便陞軍縣一漣水縣隋縣有北漣水金𨽻海州宿州本徐泗二州地唐元和四年析徐州之符離泗州之虹置太和三年州廢七年復置初治虹後徙治符離屬河南道領縣四符離臨虹蘄渙宋建隆元年陞為防禦開寳五年建為保静軍節度屬淮東路建炎後沒於金金𨽻河南路隆興初張浚􅇂師復虹縣隨師潰地再失貢絹領縣五治符離符離北齊縣有諸陽山淮水靈壁城虹漢縣有睢水垓下蘄隋縣有渙水渦水臨渙舊𨽻徐州元和後來屬有嵇山汴河淝水靈壁本虹縣之靈壁鎮元祐元年陞為縣文獻通考卷三百十七
