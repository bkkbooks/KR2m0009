body:
  text: 文獻通考卷二百九十二鄱陽馬端臨貴與著象緯考十五流星星隕仁宗乾興元年五月壬午星出危大如杯赤黄色有尾迹速行而東炸如迸火随至羽林軍南没明燭地占曰北夷兵動九月己丑星出天市垣旁緩行經天過天市垣至營室没占曰大臣出使土功起十月丁酉星出右旗如太白西南速行至天弁沒明燭地占曰兵動将軍勝天聖元年閏九月甲辰常星未見星出營室至外屏没占曰主屋室修營事四年五月辛巳星出天市垣市樓側東北流入濁占曰有街肆之事五年九月丁未星出北辰沒扵天床側占曰宫中不安宜審察之六年四月甲申夜漏欲盡有星大如斗噐自北方至扵西南光照地有聲如雷曳尾迹長數丈久之散為蒼白雲八年二月丁酉星出軒轅大星側如杯速行至噐府沒占曰憂火災十年三月癸巳星出中台貫北河入東井沒炸烈有聲明燭地食頃又有星出天市垣宗人側東流入濁八月癸亥星出天船近勾陳没明燭地乙丑星出胃大如杯有尾迹西北緩行迸為六七小星相随扵大陵明燭地九月丙子星出婁沒扵雲雨側尾迹久方散食頃又有星出天大将軍近奎沒尾迹久方散明燭地續又星出北辰西北速行至内階沒又有星出天苑沒扵天園明燭地景祐元年八月己夘星出東井行至厠星沒尾迹久方散明燭地占曰井秦地主有水災没扵厠為兵象九月己丑星出東井如太白赤黄色有尾迹向東速行至栁沒光照地占曰使出有火令其夜星出婁至奎沒明燭地占曰有溝瀆之事二年八月庚申星出大陵如太白赤黄色東南緩行沒扵􅄧尾迹久方散明燭地占曰四夷有兵四年六月壬申星出王良如太白青白色有尾迹東南速行至婁沒眀燭地占曰兵出及倉庫官有憂七月戊申有星數百皆西南流其最大者一星至東壁沒光燭地久之不散占曰衆庶流移之象五年四月壬申有星出中台如太白青白色有尾迹向北速行入濁明燭地占曰將相憂又星出天江如太白有尾迹西南速行至房沒占曰有大水寳元二年三月癸丑星出右旗赤黄有尾迹向南速行沒扵建星明燭地占曰兵為亂下有謀康定元年三月癸丑星出北斗北行入濁眀燭地占曰使出北方二年九月己酉有星出奎如太白赤黄有尾迹西行沒扵東壁明燭地占曰天下文章之士用慶厯二年三月庚戌星出勾陳側如太白赤黄有尾迹西北緩行至天棓沒眀燭地占曰天棓主忿争刑罰藏兵禦難備非常也今流星入之主爭地七月乙丑星出西北方大如醆西北行丈餘没色赤黄有尾迹明燭地十二月庚申有星出弧矢南行入濁赤黄有尾迹明燭地占曰秦分兵動及土功事起五年六月星出奎如太白西行至天倉没有尾迹明燭地占曰有溝瀆事及兵起壬戌星出營室如太白赤黄色東南速行過危及虛有尾眀燭地占曰北狄交兵齊分民有災六年六月丁巳星出營室大如杯光燭地有聲北行至王良沒占曰兵出七年六月己巳星出天田赤黄色有尾迹西南緩行至折威沒占曰邉将憂九月星出天苑如太白南行至天園沒有尾迹明燭地占曰牛馬禽獸多死八年六月己夘星出北斗至郎位沒有尾迹明燭地占曰兵出八月乙亥星出東壁赤黄色東北速行至濁沒占曰天下文章之士用皇祐元年六月己巳星出匏𤓰赤黄有尾迹向南速行至建星沒占曰吴分有謀二年四月癸未星出氐赤黄色東南速行至心沒有尾迹明燭地占曰内使出外使来徳令宣布國人有喜四年九月星出紫宫北辰側赤黄色西南速行至貫索沒尾迹凝天明燭地占曰有赦宥五年九月乙亥星出參如太白西北速行至􅄧沒有尾迹明燭地占曰兵出以禦邊寇至和元年七月壬戌星出王良色赤黄向北速行至天船沒有尾迹明燭地占曰兵渉津梁三年九月壬午星出東井如太白赤黄色向北速行至文昌沒占曰秦晉分有水将兵者還嘉祐二年七月丁丑星出王良如太白赤黄色西南緩行至亢没有尾迹明燭地占曰中官有咎三年七月乙酉星出北河如太白赤黄色東南緩行散為數道至狼沒尾迹凝天占曰北河中外之界狼為盗賊侵掠宜警邊河備兵革四年五月癸丑星出營室大如杯赤黄色西南速行至羽林軍没炸烈有聲占曰軍行炸而有聲者戍兵不安六月辛未星出胃沒扵勾陳又有星出天船至王良没占曰倉廩官災津梁有阻策馬者憂九月己亥星出紫宮勾陳側大如盌東北速行曳尾長五尺初直後曲流至北辰東沒沒後尾迹凝結如盤食頃散占曰流星大者事大曲行者姦事也色赤兵象北行其事在北方今形體異扵常而小星十數南北分流衆庶流行之象宜審察姦謀以備未萌五年正月辛夘星出畢大如盌赤黄色速行至天倉沒明燭地尾迹炸烈而散有聲如雷占曰流星大者事大有聲如雷怒之象出扵畢主邊事兵爭不利入天倉粟以兵出八月庚申星出東壁東行入濁占曰文學之士有憂六年八月丁未星出狼大如杯至天社沒明燭地尾迹凝天良久散占曰國多盗賊風雨不時七年十月庚寅星出南河至天社沒明燭地占曰邊兵不安風雨失序八年七月乙丑星數百縦横西流占曰流星無名衆庶之象皆西流民勞役英宗治平元年二月星出紫宫勾陳側西北入濁沒明燭地尾迹炸烈有聲占曰后妃有憂二年八月乙未星出河鼓大如醆色赤黄速行至天市垣内宗星沒占曰有兵三年四月癸巳星出房至濁沒明燭地尾迹炸而散占曰卿相有逐者四年正月壬子星出亢西如太白東南急行至氐東沒赤黄有尾迹主國有使清獄頒恩流扵氐主上卿憂四月己酉星出房東如盂口西南慢行至亢沒赤黄有尾迹明燭地聲如擺旗主有使出恤民或外國有使来八月星出栁東如太白東急行入濁赤黄有尾迹主宗廟有喜賢臣任用十一月星出五車東如杯口西南急流至昴北沒赤黄照地明主天子遣使恤民五榖成亦主西夷交兵神宗熙寧元年二月壬戌星出角東大如太白急行至翼没赤黄有尾迹主天子𤼵使外國四夷受賜六月庚申星透雲出天棓西如太白北急行至天市垣西墻沒赤黄有尾迹主藏兵以備難非常八月癸亥星出壘壁陣如太白緩行至狗國沒赤黄照地二年二月星出平星南急行入濁沒状如前主有執法正紀綱使出四月辛酉星出閣道如太白東南速行至東壁沒青白有尾迹主文章士用天子好道賢臣在位逺國来賔七月丁夘星出危南西南急行至壘壁陣没状如前主天下安五榖熟土功興十月己卯星透雲出大陵北如太白西南急行至東壁沒青白有尾主用故臣亦主文章士為用逺國来賔三年二月己丑星出太㣲垣西上将南如盂西急行入濁沒状如前明燭地主大臣扵楚分有外事六月壬申星出紫微垣西垣墻北東北慢流至濁沒状如前主天子之使言兵事十二月星出外屏西南速行入濁沒状如前主人多不安四年三月星出天市垣内斗星西北逆行至貫索西沒状如前主倉庫盈溢五榖豐六月星出營室西南流至壘壁陣沒状如前主天子行禮出賞國樂民安九月甲午星出紫微垣西墻東北速行入濁没状如前主兵或土功之事五年七月己丑星出七公南西南急行至天市垣西墻沒状如前主五榖豐成倉庫盈溢十月戊寅星出紫㣲垣内後宫東如杯北慢行入濁沒主使出外夷亦主地動六年四月丙子星出貫索如杯慢行至紫微垣墻上宰没青白照地明主外國有使入六月辛夘星出營室北如杯東南急行至壘壁陣沒赤黄有尾迹照地明主使出言兵八月壬辰星出羽林軍西如杯南緩行入濁沒青白尾迹分迸照地眀主軍出邊鄙亦主軍中不和七年二月壬申星出天棓北東北緩行至造父沒状如前主兵出備邊鄙四月丙戌星出天市垣東北慢行至候星沒状如前主萬物貴八月癸未星出羽林軍内如杯北慢飛至大陵沒赤黄有尾迹主大軍出十月庚子星出天倉西西南慢流至敗臼沒如杯赤黄尾迹分裂照地明主藏五榖待邦用亦主嵗飢粟出八年三月丁酉星出積水東如太白速行至五車東沒赤黄有尾迹主糴貴九月丙寅星透雲出河鼓北如太白東南緩行至危沒赤黄主天下民安五榖熟土功興十月乙未星出弧矢西北如杯東南緩行至濁沒青白有尾迹照地明主南夷来貢國有賢臣九年三月甲子星透雲出天市内宗正西北慢至太微垣五帝座沒状如前主執政憂人多死五月丁丑星出尾北東南急行入濁状如前主後宫有子孫之喜六月丙午星出東壁北如杯南急流至羽林軍沒赤黄有尾迹主天子用故臣八月壬寅星出危北西南急流至濁状如前照地眀主天下不安十月丁未星出栁東速行入濁状如前主宗廟有喜賢臣任用亦主多雨十年正月辛巳星出參西南速行至天苑沒主穀賤牛馬多傷四月甲辰星出郎位北急流至下台南沒状如前主大臣有咎六月乙巳星出王良東西北急流至紫微垣内勾陳沒状如前主兵将出十月己亥星出霹􅋬北西南急行至濁沒状如前主陽氣太盛擊辟萬物元豐元年閏正月甲辰星出栁北西急行至天廩沒状如前照地眀主榖熟六月甲辰東南方光燭地有星如盂出匏𤓰至内階没分裂有聲如雷主兵䘮八月甲子星隔雲照地明東北急行至濁沒主有大使出東北方其方流血十一月丙寅星出北河北東南急行至弧矢沒状如前主使出十二月壬子星出輿鬼東北速行至軒轅沒状如前主后有喜三年二月辛丑星出弧矢南東南速行至濁沒状如前主西戎有兵賊五月辛未星出中合北東南緩行至天江沒状如前主水泛溢民飢十一月丙辰星出厠星東東南慢流至濁沒状如前主晉分民疾四年正月戊戌星出五車北如杯西南急流至天囷沒赤黄尾迹分裂主外國来貢六月戊寅星出紫微垣内厨南如太白慢流至大角沒赤黄有尾迹主将出九月己酉星出天街北急行穿五車沒状如前主粟麥貴十一月乙未星出勾陳北東北慢行至濁沒状如前主後宫有喜五年四月庚申星出角東南急行至濁沒状如前主𤼵使外國七月辛巳星出天市垣内列肆西北急行至濁沒状如前主人主憂六年閏六月丙子星出貫索東北西南急行至濁沒状如前主貴女憂九月癸夘星出五車東北急行至濁沒状如前主有兵車出七年四月辛未星出平星東西南慢行至濁沒状如前主臣黜期半年八年二月庚辰星出太微北左執法北東南急行入濁沒状如前主大臣執法者憂七月庚申星出胃宿急流至天囷沒状如前主外國来降倉庫盈賞大臣及有憂恤事十月庚寅星出􅄧南急流至濁沒主有赦令恤民哲宗元祐二年二月丙戍星出上台北向西北急流至王良南沒赤黄有尾迹明燭地主遣使安撫四方捜揚草澤招賢集徳七月丁巳星出墳墓東慢流至壁南沒状如前主大臣有䘮十一月戊申星出紫微垣北西北急流至濁沒状如前主使出二年正月辛巳星出軫南向南急流至濁沒状如前主大臣忠諫賢人来國昌萬物賤九月甲寅星出天市垣中山北西急流至天紀西沒状如前主有赦令賞賜三年三月己酉星出亢南向南慢行至濁沒状如前主天子遣使清姦獄頒赦令六月庚子星出壁南東南急流入羽林軍内沒状如前主文章士為用亦為兵起八月癸巳夕有星自中天向東急流至濁沒状如前主其下兵戰四年三月戊戌星透雲出織女東速行至天津西沒状如前主布帛貴亦主大衆九月壬午星透雲出天棓北速行至濁沒状如前主修兵備十一月己酉星出司怪西南如杯慢流至參旗沒赤黄有尾迹主使出其方亦主兵起五年正月己丑星出司怪西南行至濁沒状如前主遣使七月辛未星出危如太白東南急流至濁沒青白有尾明燭地主國安民豐及土功興十月己未星出車房急流北至天津西南沒状如前主兵軍動大衆行及主河事六年二月辛丑星出翼東南急流至濁沒状如前主國人皆受恩賜七月癸亥透雲星二皆如太白一出天槍東南急流至亢東沒一出奎東西南急流至壘壁陣東沒赤黄有尾迹主有兵起侯王受賜十月丁夘星出王良南東南急流至濁沒状如前主多風雨亦主遣将七年二月戊午星出敗𤓰東南急流至虛東沒状如前主遣使或冢宰憂四月甲子透雲星出天市垣燕星南急流至濁沒状如前主倉庫盈溢五榖豐登八月辛未星出奎距星西南急流至濁沒状如前主天下安寧逺人来貢八年正月甲申星出天市垣内候南東南急流至濁沒状如前主民流十月戊申星出天棓東南北流至濁沒状如前主有赦及宥大臣罪紹聖元年二月丙午透雲星出壁東慢流入濁状如前主天下文章士登用賢臣在位逺國来賔六月星出人星南急流至牛沒状如前主牛馬昌盛闗梁入貢十月甲申星出天槍南慢行至上台沒状如前主賑貸亦主兵及大将憂二年三月丙辰星出天津東北向東慢流至室北沒状如前主使出及外國使至五月甲寅星出閣道北東北急行至濁沒状如前主風雨十月庚寅透雲星出張南東南急流至濁沒状如前主天子社稷昌三年二月丙子透雲星出太㣲垣慢流至濁沒状如前主使出五月己未星出平星西如杯大急流至濁沒青白有尾迹明燭地主臣有黜者四年六月甲申星出亢西南向西急流至濁沒状如前主使出清犴獄頒恩赦九月乙卯星出天囷東之南急流入濁沒主帝王布徳令外國貢異寶及賞賚大臣又主市有火災十二月丁未星出天槍西南急流至濁沒状如前主大兵起斧鉞用亦主賑貸及逺方賢人至元符元年三月甲戌星出天乳北急流至大角沒状如前主禮義教興遣使及隣國使入貢六月星出室如杯至壁東沒青白有尾迹主軍糧豐五榖成文士入賢人用二年二月癸夘星出靈臺北向西慢行至軒轅沒状如前主賢臣在位天子有子孫之喜十月辛丑星出女西北急流至牛西北沒状如前主五榖貴有水災容齋洪氏随筆曰國朝星官厯翁之伎殊媿漢唐故其占測荒茫㡬扵可笑偶讀四朝史天文志云元祐八年十月戊申星出東壁西慢流至羽林軍沒主擢用文士賢臣在位紹聖元年二月丙午星出壁室東沒主文士入國賢臣用二年二月癸夘星出靈臺北行至軒轅沒主賢臣在位天子有子孫之喜按是時宣仁上仙國是大變一時正臣以次竄斥章子厚在相位蔡卞輔之所謂四星之占豈不可笑也子孫之說盖諂劉后云按容齋言星厯之學無𫝊故其占不騐然愚甞考之五緯行天其常也流星飛星之變非常也故前史所書或數年一見或間嵗一見其甚者則一嵗頻見今宋史所書則無月無之而四朝志尤甚至有一月而四五見或同日而數流者今姑掎摭其畧毎季僅一書而猶覺繁夥夫其紀載之冗雜如此則其占騐之茫昧固宜矣徽宗建中靖國元年正月星出西南如盂東北急流入尾距星沒青黑無尾迹明燭地主舊来歸后族進禄亦曰風雨時稼穡成崇寧元年三月星出張如金星西南急流至濁沒状如前主諸侯受賜天子宗廟社稷昌十月壬子星出天船如盂急流至五車沒青黑有尾迹聲隆隆然主大水或曰水旱不時二年正月戊申星出水位如金星急流至北河沒状如前主大水六月戊午星出亢西南急流入濁沒状如前主天子遣使清獄頒恩九月辛巳星出牛西南慢流至狗國沒状如前主民流亡十二月丁未星出大陵如金星至螣蛇沒状如前主其下有積尸一曰水旱兵䘮三年四月戊申星出軫西北慢流入太㣲垣内屏星沒状如前主外國有急使期不出一年十二月甲子星出天大将軍西北急流入王良沒状如前主大兵将出四年正月甲申星出角如盂西南慢流入濁沒青白無尾迹主天子發使外國五月庚申星出河鼓西北急流入濁沒状如前主諸侯作亂一曰兵起十二月甲午星出參如杯東南慢流入軍市沒状如前主大将出一曰有赦又云饑五年六月庚午星出西東北急流入天市垣内沒状如前主王者有憂一曰閹臣出六月乙酉星出庫樓向西急流入濁沒状如前主鄭分受兵九月癸夘星出天船慢流至諸王沒狀如前主水旱不時十二月壬戌星出奎向南急流入天倉沒青白有尾迹及三丈明燭地聲散如裂帛主天子用文偃武一曰嵗熟大觀元年二月丁卯星出參如杯西南急流入濁沒状如前主天子遣使安邉一曰米賤有赦二年十二月癸卯流星出奎如盂西北急流入造父沒青白有尾迹照地明有聲主有溝瀆事政和元年四月丙辰星出亢如㿻西北急流至右攝提沒赤黄有尾迹照地明主兵来入計扵王庭五月辛巳日未中星隕東南主下有兵流血二年九月乙夘星出斗如杯西南急流入濁沒赤黄有尾迹照地明主大臣死四年九月庚子星出危墳墓如盂東南急流入羽林沒青白有尾迹照地明主人民安土功興一曰有喪諸侯憂七年十二月甲子星出胃東南如盂西北急流至天大将軍沒赤黄有尾迹照地明主天子以金玉賞大臣外國有来降者一曰趙分五榖熟八年九月庚辰星出斗魁南如盂東南急流至天淵沒赤黄有尾迹照地明主不出其年兵起一曰大臣死江河溢宣和元年三月丁夘星出栁如盂東北急流入太微垣赤黄有尾迹照地明主多雨水一曰周分憂兵起外國或有急使十月戊子星出雲雨如盂西南慢流入羽林軍内沒青白照地明主后憂疾大風雨二年十二月辛巳星出奎西南如杯西南慢流至壁沒赤黄有尾迹照地眀主其下破軍殺将一曰天子好道用故臣四年十一月丙寅星出王良北如杯急流至紫微垣内上輔北沒赤黄有尾迹照地眀主匃奴兵起天下大亂上輔人君惡之五年二月丙午星出北河東北如杯東南慢流至軫沒赤黄有尾迹照地明主天下有難六年七月丁酉星出大陽守如盂東北急流入濁沒赤黄有尾迹照地明主将相憂兵革興七年十月戊子星出王良北如杯急流入紫微垣上輔北赤黄有尾迹照地明主大兵将起天下大亂人君惡之欽宗靖康元年二月丙辰星出張如金星東南急流至濁沒青白有尾迹照地明主有赦令三月壬辰星出紫微垣内勾陳東南如金星東北慢流至濁沒赤黄有尾迹照地眀主兵起土功興一曰人君惡后妃憂六月癸丑星流大如五斗噐衆光随之明照地起東南墜西北有聲如雷庚申星出紫微垣内華盖東南如金星向北急流至左樞沒主𤼵使有赦人君惡之二年正月乙未大星出建向西南急流至濁沒赤黄有尾迹照地眀主吴秦有兵髙宗建炎四年十月辛未流星出壁占文章士用自是范冲等召紹興元年三月甲戌流星出東方晝隕占其下有急兵破軍殺将其地流血七月乙未朔流星出河鼓占兵出十一月丁巳流星出天槍北占兵大起斧鉞用扵是命韓世忠提兵入建州討范汝為平之明年岳飛大破曹成二年三月甲午流星出紫微垣華盖西南占主内使出戊午流星出自權星西南照地明占有使来論兵事未㡬王倫自金還乃遣潘致堯等使金金人遣李永夀等来議事四月乙巳流星出太微垣西右執法星北占主大臣有外事出天庭之門天子使也次月呂頤浩出師六年十月流星出壁西北占天下文章士與賢士並用扵是胡安國尹焞召七年八月有星隕扵汴京是年金人廢偽齊八年十一月乙巳流星出天囷東北占有賑發事扵是以米二萬石付岳飛賑亰西湖北饑民又以錢五千萬付吴玠犒軍二十六年六月乙亥流星出東北方照地明占流星晝隕其北大戰流血千里分屬燕野在幽二十八年六月癸巳有星從西北離地約髙一丈至西北沒三十一年六月甲子飛星出氐宿入角宿赤黄色初小後大有小星相隨占為兵八月壬午流星約長三丈晝隕占營頭也若晝見横天明者臣下圖議誅罰善良孝宗隆興元年七月丙申流星出天市垣内向西北慢流至右攝提西沒臨沒時炸散小星二十餘顆赤色有音聲有尾迹占天子欲有赦賜事庫倉盈溢五榖豐君喜入右攝提星則有外兵事来入計王庭炸散有聲皆為怒氣天下不安急使馳驛色赤為兵旱火八月庚申流星出羽林軍向東南急流至濁沒九月庚戌流星出紫微外垣座鈎星向西北急流抵紫微垣内座尚書沒十一月丁未飛星出天船星急流向紫微垣外座内厨西北沒炸出二小星青白色二年二月辛酉飛星出權星慢流至太微垣内五帝座大星西南沒青白色微有尾大如木星占兵起外國當有急使為大人憂三年九月戊戌大角揺動十一月壬午朔流星晝隕占臣下圖議誅罰忠良癸未夜流星出犯弧矢急流至天廟東南沒大如金星十二月壬午亦如之占邊兵起屠城殺将乾道四年八月丙辰流星如蛇出自十二諸侯國代哭之間至師門之下沒占哭泣之象五年九月丙辰流星如蛇入天棓占流星如蛇行者姦事也大而光者其人貴且衆也入天棓星為天子之先驅分爭及刑罰六年九月辛巳有星出狼星穿入弧矢星至濁沒如土星大赤黄色有尾迹後化為𦂳細白雲九刻乃散占邊兵起當有屠城殺将尾迹化為白雲其名大渭流血積骨縵縵如秦野在雍强敵将亡之兆七年七月戊戍東北方蒼黒雲間有透雲流星如拳大急向西北方至濁沒状如前占大使也凡流星暉然有光白長竟天曰人主之星相從三軍於是次年春遣虞允文出蜀治兵事九月甲午西南方流星急流至濁沒状如前主兵刑民饑淳熙七年五月乙亥流星出天市垣東海慢流炸作三小星青白色尾迹照地如盞口占青為憂饑白為兵十一年四月乙丑流星透雲出自中天慢流向東北方沒有尾迹後炸作散小星從青白色有音聲大如金星是為流星夕墜者占下有兵疫炸散有聲怒之象十三年九月辛亥流星大如金星其色先赤後黄白尾約二尺委曲如蛇行有類枉矢占為以亂伐亂又云枉矢臣不忠不良天下恐又云政暴虐枉矢如蛇行姦事寧宗慶元二年九月甲午流星晝隕四年六月甲午亦如之七月壬寅流星如椀大出羽林軍之下青白色占為憂為兵嘉泰二年四月辛巳流星晝隕占赤色為兵旱是嵗大旱四年十一月庚午流星出天津急流天市垣占火災民疾開禧元年十二月庚子流星赤色及金色星大出中天向濁沒占為兵旱火二年六月癸丑流星出招揺入庫樓色占同上六年五月癸亥流星晝隕占其地大戰覆軍流血千里九月癸夘流星夕隕占其下兵疫色赤為兵旱丁巳流星晝隕扵是金國亂十月戊戌流星出自􅄧宿西南慢向天廩東南沒占兵起他國使来有赦令入天廩色赤為旱火黄則大熟七年四月壬午流星出自軫宿距星東南慢流至濁沒有使出辛夘流星出自天津西南慢向心宿西北沒占如前是秋金人使来索嵗幣十六年十一月壬戌流星怒聲如雷文獻通考卷二百九十二
