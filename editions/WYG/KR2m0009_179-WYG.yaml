body:
  text: 文獻通考卷一百七十九鄱陽馬端臨貴與著經籍考六經詩漢志六家四百一十六卷隋志二十九部四百四十二卷通計亡書合七十六部六百八十三卷唐志二十五家三十一部三百三十二卷失姓名三家許叔牙以下不著録三家三十二卷宋三朝志十三部一百四十一卷宋兩朝志一部一卷宋四朝志二十一部三百二十八卷宋中興志五十三家六十四部八百七十一卷韓嬰詩外傳共十卷本傳嬰孝文時爲博士景帝時仕至常山太傅推詩人之意而作内外傳數萬言其語頗與齊魯間殊然歸一也鼂氏曰漢志十篇内傳四外傳六隋止存外傳析十篇其及經蓋寡而遺説往往見於他書如逶迤郁夷之類其義與毛詩不同此書稱外傳雖非其解經之深者然文辭清婉有先秦風容齋洪氏隨筆曰藝文志有韓家詩經韓故内傳外傳韓説五書今惟存外傳十卷慶歴中将作監主簿李用章序之命工刋刻於杭其末又題云䝉文相公改章三千餘字予家有其書首卷第二章載孔子南逰適楚見處子佩瑱而浣乃令子貢以㣲詞三挑之以是説詩漢廣㳺女之章其謬戾甚矣他亦無足言陳氏曰今所存惟外傳而卷多於舊舊六卷今十卷蓋多雜説不専解詩不知果當時本書否也毛詩故訓傳二十卷鼂氏曰毛公詩世謂其解經最宻其序蕭統以爲卜子夏所作韓愈嘗以三事疑其非蓋本於東漢儒林傳及隋志所言王介甫獨謂詩人所自製韓詩序芣苢曰傷夫也漢廣曰悅人也序若詩人所自製毛詩猶韓詩也不應不同若是况文意繁雜其非出一人手明甚不知介甫何以言之殆臆論歟陳氏曰毛公者有大毛公小毛公按後漢儒林傳稱毛萇傳詩而孔氏正義据鄭譜云魯人大毛公爲詁訓傳於其家河間獻王得而獻之以小毛公爲博士則未知萇者大毛公歟小毛公歟鄭氏曰箋者按正義云鄭於諸經皆謂之註獨此言箋者字林云箋表也識也鄭遵毛學表明毛言記識其事故稱爲箋又按後漢傳注引張華博物志鄭注毛詩曰箋不解此意或云毛公曾爲北海相鄭是郡人故以爲敬雖未必由此然漢魏間達上之辭皆謂之箋則其爲敬明矣其間與毛異義者甚多王肅蓋嘗述毛非鄭云毛詩草木鳥獸蟲魚疏二卷崇文總目呉太子中庶子烏程令陸璣撰世或以璣爲機非也機自爲晉人本不治詩今應以璣爲正然書但附詩釋義窘於采獲似非通儒所爲者将後世失傳不得其真歟陳氏曰館閣書目稱璣字元恪呉郡人據陸氏釋文非晉之士衡而其書引郭璞注爾雅則當在郭之後亦未必呉時人也孔疏吕記多引之毛詩正義四十卷崇文總目唐國子祭酒孔頴達撰太尉長孫無忌諸儒刋定國朝端拱初國子司業孔維等奉詔定正詩學之家此最爲詳鼂氏曰頴達據劉炫劉焯疏爲本刪其所煩而増其所簡云自晉室東遷學有南北之異南學簡約得其英華北學深博窮其枝葉至頴逹始著義疏混南北之異雖未必盡得聖人之意而刑名度數亦已詳矣自兹以後大而郊社宗廟細而冠婚䘮祭其儀法莫不本此元豐以來廢而不行甚無謂也詩譜一卷兩朝國史志歐陽修於絳州得注本卷首殘闕因補成進之而不知注者爲太叔求也歐陽公自序曰毛鄭於詩其學亦已博矣予嘗依其箋傳考之於經而證以序譜惜其不合者頗多蓋詩述商周自生民𤣥鳥上陳稷契下迄一作訖陳靈公千五六百嵗之間旁及列國君臣世次國地山川封域圖牒鳥獸草木魚蟲之名與其風俗善惡方言訓故一作詁盛衰治亂羙刺之方無所不載然則孰能無失於其間哉予疑毛鄭之失既多然不敢輕易者意其爲説不止於箋傳而恨己一作己恨不得盡見二家之書未能徧通其㫖夫不盡見其書而欲折其是非猶不盡人之辭一作辨而欲斷其訟之曲直其能果於自决乎其能使之必服乎世傳鄭氏詩譜最詳求之久矣不可得雖崇文總目祕書所藏亦無之慶歴四年奉使河東至於絳州偶得焉其文有注而不見名氏然首尾殘闕自周公致太平已上皆亡之其國譜旁行尤易爲訛舛悉皆顛倒錯亂不可復考凡詩雅頌兼列商魯其正變之風十有四國而其次第莫詳其義惟封國變風之先後不可以不知周召王豳同出於周邶鄘并於衞檜魏無世家其可考者陳齊衞晋曹鄭秦此封國之先後也豳齊衞檜陳唐秦鄭魏曹此變風之先後也周南召南邶鄘衞王鄭齊豳秦魏唐陳曹此孔子未刪詩之前周大師樂歌之次第也周召邶鄘衞王檜鄭齊魏唐秦陳曹豳此鄭氏詩譜次第也黜檜後陳此今詩次第也初予未見鄭譜嘗略考春秋史記本紀世家年表而合於毛鄭之説爲詩圖十四篇取以補鄭譜之亡者足以見二家所説世次先後甚偹因據而求其得失較然矣而仍存其圖庶幾以見予於鄭氏之學盡心焉耳夫盡其説而有所不通然後得以論正予豈好爲異論者哉凡補其譜十有五補其文字二百七一本注云譜序自周公致太平以上皆亡其文予取孔頴逹正義所載之文補足因爲之註自周公以下即用舊注云増損塗乙改正者三一作八百八十三而鄭氏之譜復完一有矣字毛詩小䟽崇文總目不著撰人名氏因孔䟽爲本刪取要義輔益經注云毛詩指説崇文總目唐成伯璵撰畧序作詩大指及師承次序毛詩斷章崇文總目唐成伯璵撰大抵取春秋賦詩斷章之義鈔取詩語彚而出之石經毛詩二十卷鼂氏曰僞蜀張紹文書與禮記同時刻石毛詩解題崇文總目不著撰人名氏篇端總敘詩義次述章㫖蓋近儒爲之者歟詩折衷二十卷陳氏曰皇祐中莆田劉宇撰凡毛鄭異義折衷從一蓋倣唐陳岳三傳折衷論之例凡一百六十八篇歐陽詩本義十六卷鼂氏曰歐公解詩毛鄭之説己善者因之不改至於質諸先聖則悖理考於人情則不可行然後易之故所得比諸儒最多但平日不信符命嘗著書以周易河圖洛書爲妖妄今又以生民𤣥鳥之詩爲怪説蘇子瞻曰帝王之興其受命之符卓然見於詩書者多矣河圖洛書𤣥鳥生民之詩豈可謂誣也哉恨學者推之太詳流入䜟緯而後之君子亦矯枉過正舉從而廢之以爲王莽公孫述之流縁此作亂使漢不失徳莽述何自起而歸罪三代受命之符亦過矣朱子語錄曰歐公詩本義煞説得有好處有詩本末論又有論云何者爲詩之本何者爲詩之末詩之本不可不理㑹詩之末不理㑹也無妨近世自集注文字出此等文字都不見有了也害事陳氏曰其書先爲論以辨毛鄭之失然後斷以己見末二卷爲一義解取舍義時世本末二論豳魯序三問而補亡鄭譜及詩圖總序附於卷末新經詩義三十卷鼂氏曰熙寧中置經義局撰三經義皆本王安石説毛詩先命王雱訓其辭復命安石訓其義書成以賜太學布之天下云蘇子由詩解二十卷鼂氏曰其説以毛詩序爲衞宏作非孔氏之舊止存其首一言餘皆刪去按司馬遷曰周道缺而闗雎作揚雄曰周康之時頌聲作乎下闗雎作乎上與今毛詩序之意絶不同則知序非孔子之舊明矣雖然若去序不觀則詩之辭有溟涬而不可知者不得不存其首之一言也伊川詩説二卷鼂氏曰伊川門人記其師之所談之經也毛詩辨疑一卷鼂氏曰楊時中立撰一卷陳氏詩解二十卷鼂氏曰陳少南撰凡二十卷詩學名物解二十卷陳氏曰蔡卞元度撰卞王介甫壻故多用字説其目自釋天至釋雜凡十類大畧如爾雅而瑣碎穿鑿於經無補也詩物性門類八卷陳氏曰不著名氏多取説文今考之蓋陸農師所作埤雅槀也詳見埤雅廣川詩考四十卷中興藝文志董逌撰逌謂班固言魯詩最近今徒於他書時得之齊詩所存不全或疑後人託爲然章句間有自立處此不可易者韓詩雖亡闕外傳及章句猶存毛詩訓故爲備以最後出故獨傳乃据毛氏以考正於三家且論詩序决非子夏所作建炎中逌載是書而南其志公學博不可以人廢也陳氏曰逌説兼取三家不専毛鄭謂齊詩尚存可據按逌藏書志有齊詩六卷今館閣無之逌自言隋唐亦已亡久矣不知今所傳何所從來或疑後世依託爲之然則安得便以爲齊詩尚存也然其所援引諸家文義與毛氏異者亦足以廣見聞續㣲絶云毛詩補音十卷陳氏曰呉棫撰其説以爲詩韻無不叶者如來之爲釐慶之爲羌馬之爲姥之類詩音舊有九家唐陸徳明始定爲釋文燕燕以南韻心沈重讀南作尼心切徳明則謂古人韻緩不煩改字揚之水以沃韻樂徐邈讀沃鬱縛切徳明亦所不載顔氏糺謬正俗以傅毅郊祀賦穰有而成切張衡東京賦激有吉躍切今之所作大畧倣此其援據精博信而有證朱晦翁注楚辭亦用棫例皆叶其韻棫又有韻補一書不専爲詩作也要之古人韻緩之説最爲確論不必一一改字詳見韻補朱子語錄曰呉才老補韻甚詳然亦有推不去者某煞尋得當時不曽記今皆忘之矣如外禦其務卟烝也無戎才老無尋處却云務字古人讀做䝉不知戎汝也汝戎二字古人通用是叶音汝也如南仲太祖太師皇父整我六師以􅁱我戎亦是叶音汝也下民有嚴叶不敢迨遑才老欲音嚴爲莊云避漢諱却無道理其後讀楚天問見一嚴字乃押從莊字乃知是叶韻嚴讀作昂也天問才老豈不讀往往無甚意義只恁地打過去也或問呉氏叶韻何據曰他皆有據泉州有其書每一字引十餘證少者亦兩三證他説元初更多後來删去姑存此耳然猶有未盡夾漈詩傳辯妄共二十六卷自序毛詩自鄭氏既箋之後而學者篤信康成故此詩専行三家遂廢齊詩亡於魏魯詩亡於西晉隋唐之世猶有韓詩可據迨五代之後韓詩亦亡致今學者只馮毛氏且以序爲子夏所作更不敢擬議蓋事無兩造之辭則獄有偏聴之惑今作詩辯妄六卷可以見其得失陳氏曰辯妄者専指毛鄭之妄謂小序非子夏所作可也盡削去之而以己意爲之序可乎樵之學雖自成一家而其師心自是殆孔子所謂不知而作者也按夾漈専詆詩序晦菴從其説所謂事無兩造之辭則獄有偏聼之惑者大意謂毛序不可偏信也然愚以爲譬之聼訟詩者其事也齊魯韓毛則證驗之人也毛詩本書具在流傳甚久譬如其人親身到官供指詳明具有本末者也齊魯韓三家本書已亡於他書中間見一二而真偽未可知譬如其人元不到官又已身亡無可追對得之風聞道聽以爲其説如此者也今捨毛詩而求證於齊魯韓猶聽訟者以親身到官所供之案牘爲不可信乃探之於傍人𫝊說而欲以斷其事也豈不誤哉李樗毛詩詳解三十六卷陳氏曰博取諸家之説訓釋名物文意末用己意爲論以斷之樗閩之名儒於林少頴爲外兄林李出也詩風雅頌四卷序一卷陳氏曰晦庵所録以爲序出後不當引冠篇首故别録爲一卷晦庵詩集傳詩序辨說共二十一卷陳氏曰以大小序自爲一編而辨其是非其序吕氏讀詩記自謂少年淺陋之說久而知其有所未安或不免有所更定今江西所刻晩年本得於南康胡泳伯量校之建安本更定幾什一云吕氏讀詩記三十二卷陳氏曰博采諸家存其名氏先列訓詁後陳文義剪截貫穿如出一手己意有所發明則别出之詩學之詳正未有逾於此書者也然自公劉以後編纂已備而條例未竟學者惜之岷隠續讀詩記三卷陳氏曰戴溪撰其書出於吕氏之後謂吕氏於字訓章已悉而篇意未貫故以續記爲名其實自述己意亦多不用小序黄度文叔詩序三十卷水心葉氏序曰公於詩尊敘倫紀致忠達敬篤信古文旁錄衆善博厚慘怛而無迂重之累緝緒悠久而有新羙之益然則性情不蔽而詩之教可以復明公其有志於是歟按易有程春秋有胡而詩集傳之善者亦數家大抵欲収拾羣義酌其中平以存世教矣未知性情何如耳今公之書既将並行讀者誠思其教存其性教明性明而詩復則庶幾得之項安世毛詩前說一卷陳氏曰考定風雅篇次而爲之説其曰前說者末年之論有少不同故也陳鵬飛詩解二十卷陳氏曰不解殷魯二頌以爲商頌當闕而魯頌可廢王景文詩總聞三卷陳氏曰自序云研精覃思於此幾三十年其書有聞音謂音韻聞訓謂字義聞章謂分叚聞句謂句讀聞字謂字畫聞物謂鳥獸草木聞用謂凡噐物聞跡謂凡在處山川土壤州縣鄉落之類聞事謂凡事實聞人謂凡人姓號共十聞每篇爲總聞又有聞風聞雅聞頌等其説多出新意不循舊傳白石詩傳二十卷陳氏曰宗正少卿樂清錢文子撰所居白石岩因以爲號詩古音辨二卷陳氏曰從政郎信安鄭犀撰詩考五卷浚儀王應麟撰自序漢言詩者四家師異指殊賈逵撰齊魯韓與毛氏異同梁崔靈恩采三家本爲集注今唯毛傳鄭箋孤行韓僅存外傳而魯齊詩亡久矣諸儒説詩壹以毛鄭爲宗未有参考三家者獨朱公集傳閎意眇指卓然千載之上言闗雎則取匡衡栢舟婦人之詩則取劉向笙詩有聲無辭則取儀禮上天甚神則取戰國䇿何以恤我則取左氏傳抑戒自警昊天有成命道成王之徳則取國語陟降庭止則取漢書注賔之初筵飲酒悔過則取韓詩序不可休思是用不就彼岨矣岐皆從韓詩禹敷下土方又證諸楚辭一洗末師専已守殘之陋學者諷詠涵濡而自得之躍如也文公語門人文選注多韓詩章句嘗欲寫出應麟竊觀傳記所述三家緒言尚多有之罔羅遺軼傅以説文爾雅諸書萃爲一編以扶㣲學廣異義亦文公之意云爾讀集傳者或有考於斯文獻通考卷一百七十九
