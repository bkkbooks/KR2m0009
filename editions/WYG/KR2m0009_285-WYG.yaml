body:
  text: 文獻通考卷二百八十五鄱陽馬端臨貴與著象緯考八月食月變月煇月暈中興天文志或曰日月猶水火也火外光水含景故月之光生於日之所照其魄生於日之不照也故當日則光盈照之全也自是而闕以日光之映其有不全乃至於晦愈相近而不之照故也嘗觀諸水日之所照每借以為光仰而映於屋梁若一有掩焉則向之光於屋梁者不復見也月之借於日猶是故夫月之光也以日之光有照焉則月之食也亦其日之光有掩焉耳人之於月獨見其光與食豈知有借於日哉太史遷曰月食常也日食不臧也是以春秋書日之食不書月食月食固無可書也然嘗試以前說推之於月之食以知日之行於地中其亦有食焉不然則日光之全月與相望其何食之有月食所闗豈細哉夫日月者象君臣也咎繇稱元首明股肱良元首叢脞股肱惰股肱良惰之分闗於君徳月有光食顧不然乎於是月食而書亦可也湯誥曰萬方有罪罪在朕躬古之畏天戒者不以移於股肱嗚呼書月食其亦足以戒乎又曰孟康曰星入月而星見於月中是為星食月月掩星而星滅不見是為月食星隋天文志曰月食五星歲以饑熒惑以亂填星以殺太白以强國戰辰以女亂孝宣本始四年七月甲辰辰星在翼月犯之地節元年正月戊午月食熒惑熒惑在角亢成帝建始四年十一月食填星陽朔元年七月月犯心此其證也漢髙祖七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也昴為匈奴參為趙畢為邉兵是嵗髙皇帝自將兵擊匈奴至平城為冒頓單于所圍七日乃觧成帝建始元年八月戊午晨漏未盡三刻有兩月重見京房易𫝊曰婦貞厲月幾望君子征凶師古曰小畜上九爻辭也幾音鉅依反言君弱而婦彊為隂所乗則月並出晦而月見西方謂之脁朔而月見東方謂之仄慝孟康曰朓者月行疾在日前故早見仄慝者行遲在日後當沒而更見師古曰朓音吐了反仄慝則侯王其肅朓則侯王其舒劉向以為朓者疾也君舒緩則臣驕慢故日行遲而月行疾也仄慝者不進之意君肅急則臣恐懼故日行疾而月行遲不敢廹近君也不舒不急以正失之者食朔日劉歆以為舒者侯王展意顓事臣下促急故月行疾也肅者王侯縮朒不任事服䖍曰朒音忸怩之忸鄭氏曰不任事之貌也師古曰朒音女六反臣下弛縱故月行遲也師古曰弛放也音式爾反當春秋時侯王率多縮朒不任事故食二日仄慝者十八食晦日脁者一此其效也考之漢家食晦朓者三十六終亡二日仄慝者歆說信矣此皆謂日月亂行者也哀帝時李尋上疏言月者衆隂之長銷息見伏百里為品千里立表萬里連紀品同也言百里内度數同也千里則當立表度其景萬里則繼其本所起紀其宿度也妃后大臣諸侯之象也朔晦正終始弦為繩墨望成君徳春夏南秋冬北間者月數以春夏與日同道孟康曰房有四星其間有三道春夏南行南頭第一星裏道也秋冬北行北頭第一星裏道也與日同道者謂中央道也此三道者日月五星之所由也過軒轅上后受氣軒轅南大星為后入太微帝廷揚光煇犯上將近臣列星皆失色厭厭如滅此為母后與政亂朝隂陽俱傷兩不相便外臣不知朝事竊信天文即如此近臣已不足仗矣屋大柱小可為寒心唯陛下親求賢士無彊所惡以崇社稷尊强本朝光武建武八年三月庚子夜月暈五重紫微青黄似虹有黑氣如雲月星不見丙夜乃觧中元元年十一月甲辰月中星齒徃來出入桓帝永夀三年十二月壬戌月食非其時延熹八年正月辛巳月蝕非其時獻帝興平二年十二月月在太微端門中重暈二珥兩白氣廣八九寸貫月東西南北魏文帝黄初四年十一月月暈北斗占曰有大喪赦天下七年五月帝崩明年即位大赦天下晉懷帝永嘉五年三月壬申丙夜月食既丁夜又食既占曰月食盡大人憂又曰其國貴人死海西公太和四年閏月乙亥月暈軫復有白暈貫月北暈斗柄三星占曰王者惡之六年桓温廢帝安帝隆安五年三月甲子月生齒占曰月生齒天子有賊臣羣下自相殘桓元簒位之徵也義熙九年十二月辛卯朔月猶見東方是謂之仄慝則侯王其肅是時劉裕輔政威刑自已仄慝之應云十一年十一月乙未月入輿鬼見而暈占曰王憂財寳出一曰月暈有赦月掩犯五緯梁武帝太清二年五月兩月相承如鈎見於西方占曰其國亂必見於亡國簡文帝大寳元年正月丙寅月晝光於東方占曰月晝光有隱謀國雄逃又云月晝明姦邪並作擅君之朝其後景簒弑西魏文帝大統十四年正月朔兩月並見周武帝天和五年正月乙巳月在氐暈有白虹長丈所貫之而有兩珥連接規北斗第四星占曰兵大起大戰將軍死於野是冬齊師冦邉明年詔齊公憲率師禦之自龍門渡河攻抜其新築五城兵大起大戰之應也建徳五年十月己未庚申月連暈規昴畢五車及參占曰兵起争地又曰王自將兵天下大赦宣政元年正月丙子月食昴占曰有白衣之會又曰匈奴侵邉其月突厥冦幽州殺掠吏人五月帝北伐六月帝疾甚還京次雲陽而崩隋煬帝大業九年正月二十七旦兩月並見唐太宗貞觀初突厥有三月並出髙宗儀鳳二年正月甲子朔月見西方是謂朓朓則侯王其舒武太后時月過望不虧者二元宗天寳三載正月庚戌月有紅氣如垂𢃄肅宗至徳元載建子月癸巳乙夜月掩昴而暈色白有氣自北貫之昴胡也白氣兵喪建辰月丙戌月有黄白冠連暈圍東井五諸侯兩河及輿鬼東井京師分也代宗大歴十年九月戊申月暈熒惑畢昴參東及五車暈中有黑氣乍合乍散十二月丙子月出東方上有白氣十餘道如疋練貫五車及畢觜觹參東井輿鬼桞軒轅中夜散去占曰女主凶白氣為兵喪五車主庫兵軒轅為後宫其宿則晉分及京師也憲宗元和十一年己未旦日已出有虹貫月於營室文宗開成四年閏正月甲申朔乙酉月在營室正偃魄質成早也占為臣下專恣之象五年正月戊寅朔甲申月昏而中未弦而中早也占曰同上昭宗景福二年十一月有白氣如環貫月穿北斗連太微天復二年十二月甲辰夜月有三暈裏白中赤黄外綠天祐三年二月丙申月暈熒惑梁太祖開平四年十二月庚午月食唐莊宗同光三年三月戊申月食九月甲辰月食明宗天成三年十二月乙卯月食四年六月癸丑月食既十二月庚戌月食既晉髙祖天福二年七月丙寅月食五年十一月丁丑月食出帝開運元年三月戊子月食九月乙酉月食昴漢髙祖天福十二年十二月乙未月食宋太祖乾徳六年十一月庚寅開寳二年十月戊子三年四月乙酉五年八月壬寅七年八月庚寅驗天不食太宗太平興國二年六月甲辰既十一月壬寅三年十月丙寅雲隂不見五年八月乙卯既九年正月丙寅雍熙二年七月戊午驗天不食四年五月丁丑端拱二年三月丁酉當食氐八度既驗天不食淳化元年三月庚寅二年八月壬午既三年正月癸卯八月丙子雲隂不見五年六月乙未食九分占云后妃臣下災明年孝章皇后崩十二月癸巳既占曰大臣災明年春同知樞宻院事劉昌言罷夏宰相吕䝉正參知政事蘇易簡罷至道元年六月己丑雲隂不見十二月丁亥二年十月辛亥眞宗咸平元年十月庚子二年九月乙未三年二月壬戌八月庚申四年八月甲寅五年正月辛亥七月戊申六年正月甲辰七月壬寅占羌夷有兵明年契丹大舉寇邉景徳元年十一月乙丑二年五月壬戌十月庚寅三年十一月癸丑四年五月辛亥雲隂不見九月戊寅驗天不食大中祥符元年九月癸酉二年九月丁卯驗天不食翼日上命辰也三年閏二月甲子五年正月甲申隂翳不見七月庚辰十二月丁丑八年十月辛卯九年四月己丑雲隂不見天禧元年四月壬午十月庚辰三年二月壬寅四年八月癸巳仁宗天聖二年五月壬寅月當食不見四年五月戊午慶歴二年六月丁亥食六分既而入濁不見復五年四月庚子曉漏初食九月戊戌食六分欲復入雲不見六年九月壬辰食三分皇祐二年七月庚子四年十一月丙辰食未復而盡占曰后妃臣下烖後二年貴妃張氏薨先是預詔日官以唐戊寅麟徳大衍五紀正元觀象宣明崇眞及皇朝應天乾元儀天崇天歴算此月太隂食分及辰刻分野五年十月辛亥食至和二年九月庚午食三年八月甲子食既占曰后宫宜崇徳以致福嘉祐二年二月壬戌食三分復八月戊午三年閏十二月辛巳食四年六月戊寅食幾盡十二月乙亥食既占曰月隂類后妃大臣之位食則脩刑及兵今食既宜䘏刑以除咎若三日有雨雪則不占來年二月赦天下太子少傅王舉正卒五年十二月己巳七年十月己丑皆食八年十月癸未食既卯初七刻食甚已而入濁不見英宗治平元年四月庚辰食神宗治平四年二月甲午月食丑之四刻虧見西方在翼十有五度至六刻食甚及八分彊至酉地入濁不見主飛蟲多死北夷有兵熙寧元年七月乙酉月食丑之五刻在危十度虧見東北方食及二分半入濁不見食甚及復主齊分有喪大臣憂二年閏十一月丁未月食亥之一刻虧見東方起東北至子之初刻食甚及八分弱在井度中至三刻復主五榖不登三年五月乙巳月當食雲隂雨不見四年五月己亥月食戌之一刻虧見東南方出濁未圓六分在東井度中至五刻復主大臣黜或宫中宜崇福十一月丙申月食卯之二刻虧見西方起東南至六刻食甚及四分半弱在東井一度少至明入濁不見復占同上六年三月戊午月食亥之一刻虧見東南六刻食甚及七分弱子之四刻復九月乙卯月食丑之四刻虧見東北方至寅之一刻食甚及六分渉已退未圓三分入濁不見復七年九月己酉月食丑之一刻虧見正東方至六刻食既在婁二度弱至明刻不見復九年正月壬申月食雲隂不見十年正月丙寅月食子之三刻虧見東南方至七刻食甚及七分在張度中至丑三刻復主后有憂周地貴人卒死及大戰抜城七月癸亥月食雲隂不見元豐元年正月庚申月食有雲障之至丑五刻見西南方正東食及四分半寅初食既曉刻雲隂不見復主糴貴周分貴人死六月戊午月食戌之一刻雲間見正東方食及七分半至二刻食既在虚度中至亥三刻半復主後宫憂大臣有咎齊分有喪二年六月壬子月食雲隂不見三年十月甲戌月食既因雲隂不見四年四月辛未月食既自戌之二刻出濁已食甚月體東退生光一分正西九分在尾度中至六刻復主后妃災十月辛巳食於昏出濁食及七分在畢度中至二刻復主有赦令邉臣有咎趙分有兵邉人有疫五年十月癸亥月食自酉之二刻虧見東北方至七刻食甚及三分在昴七度太弱戌之三刻復主邉兵起或女主憂六年八月丁亥月食驗之不食七年二月乙酉月食八月辛巳月食皆雲隂不見八年八月丙子月食戌之三刻虧初至七刻蝕至子之一刻復哲宗元祐元年十二月戊戌月蝕雲隂不見三年六月庚寅月蝕亥之五刻虧初至子六刻食既丑四刻復在斗度中吳分主吳兵起大臣有憂十二月丁亥月食雲隂不見四年五月甲申月食初雲隂不見至丑初刻食已九分在斗度中吳分至六刻復主大臣憂有小兵五年五月戊寅月食雲隂不辨虧蝕六年四月癸卯月食雲隂不辨虧蝕七年三月戊戌月食亥初一刻虧初至七刻食既子七刻復食甚在氐度中主大臣有憂十日内有風雨則觧災八年九月己丑月食雲隂不見紹聖三年七月癸卯月食雲隂不見虧蝕四年正月庚子月食雲隂不見初虧至酉七刻巳食三分戌一刻食及四分後復有雲障之主貴臣後宫有憂周分民饑五年五月壬戌月當食而不食元符二年五月丙辰月食子之三刻至丑二刻食既寅二刻復在箕度中主御者或掌樂人當黜又為風十月