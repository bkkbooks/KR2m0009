連兩夜乃以二更盡月食之既纔兩刻復明十一月十八夜復如之按此三食皆是交中十月二十夜月在張五度而計都在翼二度次夜月在張十七度計都未動相距才四度耳十一月十八夜月在星五度計都在張十九度相距二十度十二月十七夜五更月在星二度入交陽末卯初四刻交甚食六分半八刻退交十八夜四更月在張六度入交中隂初至寅四刻交甚食九分卯五刻退交其驗如此予竊又有疑焉太隂一月一周天必兩值交道今年遂至八食一一如星官歴翁之說仍不拘月望則玉川子之詩不勝作矣當更求其旨趣云頃見太史局官劉孝榮言月本無光受日為明望夜正與日對故一輪光滿或月行有遲疾先後日光所不照處則為食朔旦之日日月同宫如月在日上掩太陽而過則日光為所遮故為日食非此二日則無薄蝕之理其說亦通又夷堅志紹興三十二年正月予被命接伴北使次盱眙天文官荆大聲隨行見向西邉大星去月三寸許指示予曰此木星也或食月或為月所食少刻便可決予質其義曰月體自若而星居月上此為星食月月遇之而星隱不見此為月食星既而仰視髙空失星所在俄出於月東問其兆應如何唯唯不肯說至四月半予報聘偕荆行荆出一書大抵皆星氣占驗其一曰月星相食當有易主事時已竊聞將有堯禪舜之舉矣予按景祐乾象新書引晉書月蝕歲星野有逐相又引天文總論曰主殺戮將相王侯之象或其分有兵喪其說淺矣五月十六日五更初過臨淮境瞻月外有環暈五重附近者紫紅色白者次之青者又次之黄者又次之最外深紅各相去一丈分寸不差忒其圎如規馬上諦視起敬荆馳至旁附耳曰是為月重輪前史所紀多不過兩三重而今五數但太隂極盛恐非太陽之利耳將曉乃沒未一月而髙宗遜位乾道二年六月北極前星之左有小星大聲謂予向者不記有此星若本無而今有懼為東宫禍三年又指軒轅星之側客星曰非中宫福已而皆然八月中䝉宣對便殿孝宗聖意悲哽邁輒奏大聲之說以為上穹黙定乆矣乞少寛宸抱上固素諳星象慘然曰朕亦見之時大聲浮湛㕓市遂遭逢今以春官大夫判太史局文獻通考卷二百八十五
