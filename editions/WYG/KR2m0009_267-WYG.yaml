body:
  text: 文獻通考卷二百六十七鄱陽馬端臨貴與著封建考八西漢功臣侯平陽懿侯曹參以中涓從起沛至霸上侯以將軍入漢以假左丞相定魏齊以右丞相侯萬六百户師古曰中涓親近之臣涓潔也主居中埽潔窋竒時襄宗喜八世絶本始九世宏建武初以舉兵佐軍紹封曠信武肅侯靳歙以中涓從起宛胊入漢以騎都尉定三秦擊項籍别定江漢侯五千三百户以將軍攻豨布亭坐事國人過律免師古曰事役使之也安漢六世復家孟康曰諸復家皆世世無所與得傳同産子汝隂文侯夏侯嬰以令史從降沛為太僕常奉車竟定天下及全皇太子魯元公主侯六千九百户竈賜頗坐姦自殺信六世孫復家清河定侯王吸以中涓從起豐至霸上為騎郎將入漢以將軍擊項籍侯二千二百户疆伉不害充國元孫復家陽陵景侯傅寛以舍人從起横陽至霸上為騎將入漢定三秦屬淮隂定齊為齊丞相侯二千六百户清明偃坐與淮南王謀反誅景六世孫復家廣嚴侯召歐以中涓從起沛至霸上為連敖入漢以騎將定燕趙得燕將軍侯二千二百户勝嘉亡後不識元孫復家廣平敬侯薛歐以舍人從起豐至霸上為郎入漢以將軍擊項籍将鍾離昧侯四千五百户山澤穰坐罪免去病元孫復家博陽嚴侯陳濞以舍人從碭以刺客將入漢以都尉擊項羽殺士卒侯始坐謀殺人免夀曽孫復家堂邑安侯陳嬰初起兵屬楚後屬漢侯六百户復相楚元王禄午季須坐罪自殺尊六世復家曲逆獻侯陳平以故楚都尉歸漢為䕶軍出竒計定天下侯五千户買悝何坐畧人妻棄市莫六世復家鳳元始時始爵闗内侯留文成侯張良以廐將從起下邳入武闗設䇿降秦王嬰解項羽隙及破羽鴻溝封萬户不疑坐與門大夫殺故楚内史贖為城旦千秋元孫之子六世復家射陽侯劉纒初起兵與諸侯擊秦即項伯也後賜姓劉漢王與項羽有隙伯解之後降漢封侯睢有罪不得代酇文終侯蕭何以客初從入漢為丞相守蜀及闗中給軍食佐定諸侯為法令侯八千户禄亡後延何少子更封遺亡後則以何孫遺弟紹封武陽嘉則弟勝坐罪免慶何曽孫紹封夀成免坐罪建世何元孫紹封輔獲坐罪免喜何元孫之子紹封尊七世章禹王莾敗絶絳武侯周勃以中涓從起沛至霸上侯定三秦食邑為將軍入漢定隴西擊項籍守嶢闗定泗水東海侯八千一百户勝之坐罪免亞夫以勃次子紹封條侯堅以勃次子紹封平曲建德坐酎金免廣漢曽孫復家共元孫紹封千户舞陽武侯樊噲以舎人起沛從至霸上為侯以郎入漢定三秦為將軍擊項籍再益封從破燕執韓信侯五千户伉坐呂氏誅市人以噲子紹封它廣坐罪免勝客曽孫復家章元始時以元孫之子紹封千户曲周景侯酈商以將軍從起岐攻長社以南定漢蜀三秦擊項羽侯四千八百户寄有罪免堅遂成世宗終根坐罪誅共六世復家猛元始時賜爵闗内侯潁隂懿侯灌嬰以中涓從起碭至霸上入漢定三秦以將軍屬韓信定齊淮南及八邑殺項籍侯五千户何强有罪免賢以嬰孫紹封後坐罪免匿曽孫復家誼元始時賜爵闗内侯汾隂悼侯周昌以職志擊秦入漢出闗以内史堅守敖倉以御史大夫侯如淳曰職志官名主旗幟開方意坐罪免左車以昌孫紹封為安陽侯後坐罪免明曽孫復家梁鄒孝侯武虎以謁者從破秦入漢定三秦以將軍擊定諸侯比博陽侯二千八百户最嬰齊山拊坐酎金免充元孫之子復家成敬侯董渫以舎人從擊秦入漢定三秦出闗以将軍定諸侯封二千八百户赤有罪免後復封節氏罷軍朝坐罪為鬼薪詘元孫復家蓼夷侯孔藂以執盾從起碭以左司馬入漢為將軍三以都尉擊項籍屬韓信侯臧坐罪免宣元孫復家費侯陳賀以舎人從起碭後屬韓信為將軍定㑹稽浙江湖陵侯常最偃坐罪免僑曽孫復家陽夏侯陳豨以特將軍起宛至覇上定代破臧荼侯為趙相國反兵敗坐誅隆慮克侯周竈以連敖入漢擊項籍侯連敖楚官號通有罪免某元孫復家陽都敬侯丁復以越將從起薛至霸上定三秦破龍且項籍侯七千八百户寗安成有罪免賜曽孫復家陽信胡侯呂青以漢五年用令尹初從功比堂邑侯千户臣義它善談坐酎金免陽元孫復家東武貞侯郭蒙以户衞起薛破秦軍入漢定三秦堅守敖倉破項籍侯三千户它有罪棄市廣漢元孫復家什防肅侯雍齒以趙將從定諸侯侯二千五百户齒故沛豪與上有隙故晩從鉅鹿野桓坐酎金免章元孫復家棘蒲剛侯陳武以將軍從起薛擊齊歴下侯竒反誅嘉曽孫復家都昌嚴侯朱軫以舎人從起沛降翟王虜章邯侯率詘偃辟疆亡後先元孫復家武彊嚴侯嚴不識以舎人從起沛入漢擊項籍用將軍擊黥布侯嬰青翟為丞相坐張湯事自殺仁曽孫復家貰齊侯合傅胡害以越户將從破秦入漢定三秦擊項籍侯六百户方山赤遺猜坐殺人棄市世海陽齊信侯揺母餘以越隊将從破秦入漢定三秦擊項籍侯千七百户昭襄建省亡後不更元孫復家賢元夀元年爵闗内侯南安嚴侯宣虎以河南將軍降晉陽破臧荼侯九百户戎千秋坐罪免䕶曽孫復家肥如敬侯蔡寅以魏太僕從破龍且及彭城侯千户戎奴亡後福曽孫復家曲成圉侯蟲達以西城户將從起碭入漢定三秦破項籍侯四千户㨗皇柔坐罪論鬼薪宣元孫復家河陽嚴侯陳涓以卒從起碭入漢擊項籍定齊侯信坐罪免元元孫復家淮隂侯韓信以卒從項氏後歸為大將軍定魏趙齊封齊王後徙楚人告反廢為侯後坐反誅夷芒侯耏跖以門尉起碭入漢定三秦擊項籍功封侯昭申坐罪免敬市侯閻澤赤以執盾從入漢擊項籍侯千户無害續穀坐酎金免章世六世復家柳邱齊侯戎賜以連敖從入漢定三秦破項羽侯八千户安國嘉成角坐罪免元生元孫復家魏其嚴侯周止以舎人從起沛入漢定三秦破項羽東城侯千户簡謀反誅廣世元孫復家祁穀侯繒賀以執盾從晉陽以連敖擊項籍漢王敗走賀擊楚迫騎以故不得進漢王顧謂賀祁王戰彭城斬項籍爭惡延壁侯千四百户胡它坐射擅罷免賜曽孫復家平悼侯工師喜以舎人從破秦入漢定諸侯封千三百户奴執坐罪免魯侯奚涓以舎人從起沛破秦入漢以將軍定諸侯封四千八百户母底城父嚴侯尹恢以謁者從入漢擊定諸侯封二千户開方奪爵為闗内侯殷六世復家任侯張越以騎都尉從擊燕代功封坐匿死罪免棘邱侯襄以執盾從起碭破秦入漢定魏地功封後坐罪免河陵頃侯郭亭以連敖從入漢定三秦擊項羽功侯歐客坐罪免延居紹封則坐酎金免賢元孫復家昌武靖信侯單究以舎人從入漢定三秦擊諸侯封九百户如意賈成德坐殺人棄市萬元孫之孫復家高宛制侯丙猜以客從入漢定三秦破項籍侯千六百伍户得武信坐罪免齮元孫之孫復家宣曲齊侯丁義以卒從入漢定三秦破項羽軍固陵侯六百七十户通坐罪免年曽孫復家終陵齊侯華毋害以越將從入漢定三秦擊臧荼侯七百四十户勃禄坐罪免告曽孫復家東茅敬侯劉到以舎人從起碭至霸上入漢定三秦擊項籍封千户告坐罪免咸曽孫復家斥邱懿侯唐厲以舎人從入漢擊項籍破之侯千户朝賢尊坐酎金免廣意曽孫復家臺定侯戴野以舎人從起碭入漢撃項籍燕代封午坐謀反誅安昌元孫復家安國武侯王陵起兵定南陽屬漢王擊項羽封五千户忌斿辟方定坐酎金免襄元孫復家樂成節侯丁禮以中涓從起碭入漢定三秦擊項籍殺龍且封千户馬從吾客義坐言事誅禹七世復家辟陽幽侯審食其以舎人從侍呂后孝惠入楚一歲侯平坐謀反誅非曽孫復家蒯成制侯周緤以舎人從起沛至霸上入漢定三秦擊項籍絶甬道侯三千二百户昌坐罪免應昌弟紹封居坐罪免禹曽孫復家安平敬侯鄂千秋以謁者從定諸侯功舉蕭何侯二千户嘉應寄但坐罪棄市后六世復家北平文侯張蒼以客從至霸上得陳餘封千二百户奉類坐罪免蓋宗六世復家高胡侯陳夫乞以卒從擊項籍定燕封千户程亡後勝之元孫復家厭次侯爰類以将從入漢守廣武功封嗣謀反誅世六世復家平臯煬侯劉它以碭郡長初從功實項氏賜姓侯五百八十户逺光勝坐酎金免勝之七世復家復陽剛侯陳胥以卒從入漢擊項籍侯千户嘉拾强坐罪免幸曽孫復家陽河齊侯其石以中謁者從入漢定諸侯封五百户安國午章仁坐祝詛誅益夀六世復家栢至靖侯許盎以駢鄰從起昌邑以說衞入漢撃籍封千户禄昌安和福坐姦論鬼薪建六世復家中水嚴侯呂馬童以郎騎将從擊龍且斬項籍侯千五百户瑕青眉德宜城坐酎金免建明七世復家杜衍嚴侯王翥以中郎騎從斬項籍侯千七百户福市臣全有罪免安樂曽孫復家赤泉嚴侯楊喜以郎中騎從斬項籍侯千九百户敷毋害坐罪免孟嘗元孫復家朝陽齊侯華寄以舍人從起薛入漢擊項籍討韓信封千户要當坐罪免定國元孫復家棘陽嚴侯杜得臣以卒從入漢擊項籍侯二千户但武亡後湼陽嚴侯呂騰以騎士從出闗擊斬項羽侯千五百户成實非子不得代忠六世復家平棘懿侯林摯以客從斬章邯所置蜀守侯千户辟疆有罪免常驩曽孫復家深澤齊侯趙將夕以趙將降屬淮隂侯定趙齊楚侯七百户頭修坐罪免胡紹封亡後延世元孫復家頃侯温疥以燕將軍從破曹咎告燕荼反封千九百户仁何福元孫復家歴簡侯程黒以趙衞將軍從擊項羽敖倉攻臧荼封千户釐竈坐罪免宏六世復家武原靖侯衞胠以梁将軍從擊韓信陳豨黥布封二千八百户寄不害坐罪免堯元孫復家槀祖侯陳鍇以將從擊陳豨功侯六百户嬰應安千秋坐酎金免儒六世復家宋子惠侯許瘛以趙將從擊定諸侯封五百三十六户留九坐罪免廼七世復家猗氏敬侯陳遬以舍人從起豐入漢擊項羽侯一千一百户支𦍑亡後胡曽孫復家清簡侯室中同以弩将從入漢擊項羽代侯封千户聖鮒古生坐酎金免武元孫復家彊圉侯留盻以客吏從入漢擊項羽侯千户章復坐罪免定曽孫復家彭簡侯秦同以卒從入漢擊項羽侯千户執武坐罪免夀元孫復家吳房嚴侯楊武以郎中騎從擊陽夏斬項籍封七百户去疾坐罪免談孫復家寗嚴侯魏遬以舍人從碭擊臧荼功侯千户連指坐罪免都元孫復家昌圉侯旅卿以齊将從韓信定齊擊項羽韓王信侯千户通坐謀反誅光元孫復家共嚴侯旅罷師以齊將從擊項羽及韓王信封千二百户黨高信曽孫復家閼氏節侯馮解散以代主爵降為鴈門守平代㓂侯千户它亡後遺以遺腹子嗣勝之平坐酎金免安邱懿侯張說以卒初屬魏豹入漢擊項羽定代侯二千户奴執新拾坐罪免舜六世復家襄平侯紀通父城以将軍從破秦入漢定三秦戰死子侯相夫夷吾亡後萬年元孫復家龍陽敬侯陳署以卒從霸上擊項籍斬曹咎侯千户堅有罪免平嚴侯張瞻師以趙騎将從擊諸侯封千五百户惸寄安國為人所殺連城六世復家陸量侯須無詔以為列侯自置吏受令長沙王桑慶忌冉坐酎金免聖曽孫復家高景侯周成父苛以内史從破秦守滎陽罵項籍死事子封侯後謀反誅繩以孫紹封平坐罪免賜元孫復家離侯鄧弱以長沙将兵侯義陵侯吳郢以長沙柱國侯千五百户重亡後宣平武侯張敖嗣父耳為趙王坐相貫高反廢為侯偃高后時為魯王後降紹侯歐壬有罪免廣孫以弟紹侯昌坐罪免侈以魯元太后子封信都侯孝文時免受以魯元子封樂昌侯孝文時免慶忌以敖元孫紹封千户遂元孫復家東陽武侯張相如以河間守擊陳豨功封一千三百户殷安國强亡後宣六世復家慎陽侯樂說淮隂侯韓信舎人告信反侯二千户願買之坐鑄白金棄市通六世復家開封愍侯陶舍以右司馬從擊燕代侯二千户青偃睢坐酎金免元始七世復家禾成孝侯公孫昔以卒從以郎中