公後為莽所殺承陽侯甄邯以侍中奉車都尉定䇿功侯二千四百户莽簒位為承新公褒魯節侯公子寛以周公世魯頃公元孫之元孫奉周祀侯二千户相如更姓公孫氏後更為姬氏褒成侯孔均以孔子世褒成烈君霸魯孫奉孔子祀侯二千户防鄉侯平晏以長安少府與劉歆孔永孫遷四人治明堂辟雍得萬國歡心功臣侯各千户莽簒位為就新公紅休侯劉歆以侍中羲和與平晏同功侯莽簒位為國師公後為莽所殺寧鄉侯孔永以侍中五官中郎将與平晏同功侯莽簒位為大司馬定鄉侯孫遷以常侍謁者與平晏同功侯常鄉侯王惲以太僕與閻遷陳崇等八人使行風俗齊同萬國功侯各千户望鄉侯閻遷以鴻臚與王惲同功侯南鄉侯陳崇以大司徒司直與王惲同功侯邑鄉侯李翕以水衡都尉與王惲同功侯亭鄉侯郝黨以中郎將與王惲同功侯章鄉侯謝殷以中郎將與王惲同功侯蒙鄉侯逯普以騎都尉與王惲同功侯莽簒位為大司馬盧鄉侯陳鳯以中郎將與王惲同功侯成武侯孫建以强弩将軍有折衝之威侯莽簒位為成新公明統侯侯輔以騎都尉明為人後一統之義侯破胡侯陳馮以父湯前為副校尉討郅支單于侯千四百户討狄侯杜勲以前為將軍侯丞平斬郅支單于侯千户右孝平二十二人卭成博陸宣平紅舞陽秺樂陵都成新甫爰氏合陽義陽章鄉信成隨桃褒新賞都十七人隨父繼世凡三十九人高祖六年始剖符封功臣曹參等為通侯已上封大功臣二十餘人其餘日夜爭功不決未得行封上在洛陽南宫從複道望見諸將徃徃相與坐沙中語上曰此何語留侯曰陛下不知乎此謀反耳上曰天下屬安定何故反乎留侯曰陛下起布衣以此屬取天下今陛下為天子而所封皆故人所親愛所誅皆生平所仇怨今軍吏計功以天下不足徧封此屬畏陛下不能盡封恐又見疑平生過失及誅故即相聚謀反耳上乃憂曰為之奈何留侯曰上平生所憎羣臣所共知誰最甚者上曰雍齒與我有故怨數嘗窘辱我我欲殺之為其功多故不忍留侯曰今急先封雍齒則羣臣人人自堅矣於是上乃置酒封雍齒為什方侯而急趣丞相御史定功行封羣臣罷酒皆喜曰雍齒尚為侯我屬無患矣列侯畢已受封詔定功臣十八人位次上從鄂千秋言以蕭何第一曹參次之賜何帶劒履上殿入朝不趨十二年詔列侯皆令自置吏得賦斂女子公主為列侯食邑者佩之印賜大第室秦漢之制列侯封君食租衣税率户二百千户之君則二十萬朝覲聘享出其中徹侯金印紫綬改所食國令長名相又有家丞門大夫庶子高后二年詔差次列侯功以定朝位藏於高廟世世勿絶嗣子各襲其功位文帝二年詔曰朕聞古者諸侯建國千餘各守其地以時入貢民不勞苦上下歡欣靡有違徳今列侯多居長安邑逺吏卒給輸費苦而列侯亦無繇教訓其民其令列侯之國為吏及詔所止者遣太子三年詔曰前日詔遣列侯之國辭未行丞相朕之所重其為朕率列侯之國遂免丞相勃遣就國景帝後二年省列侯就國先公曰初封列侯猶有君國子民之意故文帝遣列侯就國之詔謂其居長安無繇教訓其民也景帝既不令諸侯王治事故亦省徹侯之國蓋事權皆在其相所謂侯國者與郡邑無異矣按文帝二年詔列侯就國而多辭未行三年乃免絳侯相印令率列侯就國是强之使行也絳侯既就國每河東守尉行縣至絳勃自畏恐誅常被甲令家人持兵以見人遂言其欲反夫既曰畏罪恐誅而乃被甲持兵以待守尉欲何為邪勃不學無術不能處功名之際而徒以來讒賊之口倘非遇孝文長者則不能全之矣然即此可以見當時功臣侯之就國者憂讒畏譏不能不見陵於守尉方其身都將相則聲勢赫奕與人主朋儔及其退就國邑則心懐畏懼視守尉如官長蓋封爵之寵同乎黜徙迫之乃行與古人建侯之意異矣武帝元鼎五年列侯坐獻黄金酎祭宗廟不如法奪爵者百六人丞相趙周下獄死服䖍曰因八月獻酎祭宗廟時使諸侯各獻金助祭也如淳曰漢儀注諸侯王歲以户口酎金於漢廟皇帝臨受獻金金少不如斤兩色惡王削縣侯免國臣瓚曰食貨志南越反時卜式上書願死之天子下詔褒揚布告天下天下莫應列侯以百數莫求從軍至酎飲酒少府省金而列侯坐酎金失侯者百餘人而表云趙周坐為丞相知列侯酎金輕下獄自殺然則知其輕而不紏擿之也師古曰酎三重釀醇酒也容齋洪氏隨筆曰漢自武帝以後丞相無爵者乃封侯其次雖御史大夫亦不以爵封為間唯太常一卿必以見侯居之而職典宗廟園陵動輙得咎由元狩以降以罪廢斥者二十人意武帝隂欲損侯國故使居是官以困之爾表中所載酇侯蕭夀成坐犧牲瘦蓼侯孔臧坐衣冠道橋壊鄲侯周仲居坐不收赤側錢繩侯周平坐不繕園屋睢陵侯張昌坐乏祠陽平侯杜相坐擅役鄭舞人廣阿侯任越人坐廟酒酸江鄒侯靳石坐離宫道橋苦惡戚侯季信成坐縱丞相侵神道俞侯欒賁坐雍犧牲不如令山陽侯張當居坐擇博士弟子不以實成安侯韓延年坐留外國文書新畤侯趙弟坐鞫獄不實牧邱侯石徳坐廟牲瘦當塗侯魏不害坐孝文廟風𤼵瓦轑侯江徳坐廟郎夜飲失火蒲侯蘇昌坐泄官書弋陽侯任宫坐人盗茂陵園物建平侯杜緩坐盗賊多自酇侯至牧邱十四侯皆奪國武帝時也自當塗至建平五侯但免官昭宣時也下及晉世此風猶存惠帝元康四年大風廟闕屋瓦有數枚傾落免太常荀㝢五年大風蘭臺主者求索阿棟之間得瓦小邪十五處遂禁止太常復興刑獄陵上荆一枝圍七寸二分者被斫司徒太常犇走道路太常禁止不解蓋循習漢事云按漢之所謂封建夲非有公天下之心故其予之甚艱而奪之每亟至孝武之時侯者雖衆率是不旋踵而褫爵奪地方其外事四夷則上遵高帝非功不侯之制於是以有功侯者七十五人然終帝之世失侯者已六十八人其能保者七人而已及其外削諸侯則采賈誼各受其祖之分地之說於是以王子侯者一百七十五人然終帝之世失侯者已一百一十三人其能保者五十七人而已外戚恩澤侯者九人然終帝之世失侯者已六人其能保者三人而已功臣外戚恩澤之失侯也諉曰予奪自我王子之失侯則是姑假推恩之名以析之而苛立黜爵之罰以奪之與賈誼所謂一寸之地一人之衆無所利焉者異矣禁網既苛動輙得咎而坐宗廟酎金失侯者尤衆食貨志言帝因卜式上書願輸財助邊下詔褒美以諷天下而莫有應者於是列侯坐酎金失侯者百餘人蓋當時國計不給方事誅求雖庶人之多貲者亦必立告緡之酷法以取之宜其不容列侯坐享封君之富也宣帝元康四年上令有司求高祖功臣子孫失侯者得槐里公乘周廣漢等百三十六人皆賜黄金二十斤復其家令奉祭祀世世勿絶按高帝功臣至武帝時失侯者衆至是方訪求其後而褒錫之然纔得復除租役免同編氓而已孝惠而後侯而失爵者則不復省録矣班固功臣侯表序曰自古帝王之興曷嘗不建輔弼之臣所與共成天功者乎師古曰天功天下之功業也虞書舜典曰欽哉惟時亮天功也漢興自秦二世元年之秋楚陳之嵗師古曰謂陳涉自稱楚王之時也初以沛公總帥雄俊三年然後西滅秦立漢王之號五年東克項羽即皇帝位八載而天下乃平始論功而定封訖十二年侯者百四十有三人時大城名都民人散亡户口可得而數裁什二三師古曰裁與纔同十分之内纔有二三也是以大侯不過萬家小者五六百户封爵之誓曰使黄河如帶泰山若厲國以永存爰及苖裔應劭曰封爵之誓國家欲使功臣傳祚無窮也帶衣帶也厲砥礪石也河當何時如衣帶山當何時如礪石言如帶礪國猶永存以及後世之子孫也於是申以丹書之信重以白馬之盟師古曰丹書解在高紀白馬之盟謂刑白馬㰱其血以為盟也又作十八侯之位次孟康曰唯作元功蕭曹等十八人位次耳高后乃詔作位次下竟師古曰謂蕭何曹參張敖周勃樊噲酈商奚㳙夏侯嬰灌嬰傅寛靳歙王陵陳武王吸薛歐周昌丁復蟲逹從第一至十八也高后二年復詔丞相陳平盡差列侯之功録第下竟藏諸宗廟副在有司師古曰副貳也其列侯功籍已藏於宗廟副貳之夲又在有司始未嘗不欲固根本而枝葉稍落也故逮文景四五世間流民既歸户口亦息列侯大者至三四萬户小國自倍師古曰自倍者謂舊五百户今者至千也曹參初封萬六百户至後嗣侯宗免時有户二萬三千是為户口蕃息故也他皆類此富厚如之師古曰言其貲財亦稍富厚各如户口之多也子孫驕逸忘其先祖之艱難多陷法禁隕命亡國或云子孫訖於孝武後元之年靡有孑遺耗矣師古曰孑然獨立貎言無有獨存者至於耗盡也罔亦少宻焉故孝宣皇帝愍而録之乃開廟藏覽舊籍詔令有司求其子孫或出庸保之中師古曰庸賣功庸也保可安信也皆賃作者也並受復除或加以金帛用章中興之徳降及孝成復加恤問稍益衰微不絶如綫善乎杜業之納說也曰昔唐以萬國致時雍之政虞夏以之多羣后享共已之治師古曰羣后謂諸侯也恭已無為也湯法三聖殷氏太平周封八百重譯來賀是以内恕之君樂繼絶世隆名之主安立亡國師古曰以立亡國之後為安泰也至於不及下車徳念深矣張晏曰謂武王入殷未及下車封黄帝之後於薊虞舜之後於陳也成王察牧野之克顧羣后之勤知其恩結於民心功光於王府也故追求先父之志録遺老之䇿高其位大其㝢師古曰㝢謂啟土所居也愛敬飭盡命賜備厚師古曰飭謹也大孝之隆於是為至至其沒也世主歎其功無民而不思所息之樹且猶不伐師古曰謂召伯止於甘棠之下而聼訟人思其徳不伐其樹召南甘棠之詩是也况其廟乎是以燕齊之祀與周並傳子繼弟及歴載不墮豈無刑辟繇祖之竭力故支庶頼焉師古曰言國家非無刑辟而功臣子孫得不陷罪辜而能長常存者思其先人之力令有嗣續也繇讀與由同迹漢功臣亦皆割符世爵受山河之誓存以著其號亡以顯其魂賞亦不細矣百餘年間而襲封者盡或絶失姓或乏無主朽骨孤於墓苖裔流於道生為愍𨽻死為轉屍以徃况今甚可悲傷聖朝憐閔詔求其後四方忻忻靡不歸心出入數年而不省察恐議者不思大義設言虚亡則厚徳掩息遴柬布章晉灼曰許慎云遴難行也柬古簡字也簡少也言今難行封則得繼絶者少若然此必布聞彰於天下也師古曰遴讀與吝同非所以視化勸後也三人為衆雖難盡繼宜從尤功孟康曰言人三為衆雖難盡繼取其功尤高者一人繼之於名為衆矣服䖍曰尤功封重者一人也於是成帝復紹蕭何哀平之世増修曹參周勃之屬得其宜矣以綴續前記究其本末并序位次盡於孝文以昭元功之侯籍云外戚恩澤侯表序曰孝武時元功宿將略盡㑹上亦興文學進㧞幽隐公孫宏自海瀕而登宰相於是寵以列侯之爵又疇咨前代詢問耆老初得周後復加爵邑自是之後宰相畢侯矣元成之際晚得殷世以備賔位漢興外戚與定天下侯者二人服䖍曰吕后兄周吕侯澤建成侯釋之師古曰與讀曰豫言豫其功也故誓曰非劉氏不王若有亡功非上所置而侯者天下共誅之是以高后欲王諸呂王陵廷争孝景將侯王氏脩侯犯色師古曰脩音條卒用廢黜是後薄昭竇嬰上官衛霍之侯以功受爵其餘后父據春秋褒紀之義應劭曰春秋天子將納后於紀紀本子爵也故先褒為侯言王者不取於小國帝舅縁大雅申伯之意應劭曰申伯周宣王元舅也為邑於謝後世欲光寵外親者縁申伯之恩援此義以為諭也寖廣博矣是以别而叙之按班孟堅述西都列侯除王子之外以功臣為一表外戚恩澤為一表蓋功臣者以勲績顯著而得之者也外戚恩澤者以遭逢忝竊而得之者也然裔夷之降虜有何勲庸乃儕之功臣宰相而封侯未為恩倖乃儕之恩澤又博陸之定大䇿輔㓜主長平冠軍之征匈奴取朔方破祁連其殊勲偉績本不縁椒房至李貳師則祗縁女寵以進伐大宛得名馬之事又不足言且不能終守臣節今列貳師於功臣列博陸長平冠軍於外戚抑揚之意殊所未喻容齋洪氏隨筆曰周之初諸侯千八百國至赧王之亡所存者才八國耳七戰國與衛也然趙韓魏分晉而立齊田氏代姜而興其有土各不及二百年俱非舊邦秦始皇乃吕氏子楚幽王乃黄氏子所謂嬴芈之先當不歆非類然則惟燕衛二姬姓存而衛至胡亥世乃絶若以為召公康叔之徳則周公豈不及乎漢列侯八百餘人及光武而存者平陽建平富平三侯耳建平以先降梁王永奪國平陽為曹參之後富平為張安世之後參猶有創業之功若安世則湯子也史稱其推賢揚善固宜有後然輕重其心殺人則多矣獨無餘殃乎漢侯之在王莽朝皆不奪國光武乃但許宗室復故餘皆除之雖酇侯亦不紹封不知曹張兩侯何以能獨全也文獻通考卷二百六十七
