body:
  text: 文獻通考卷一百二十二鄱陽馬端臨貴與著王禮考十七國恤唐元陵遺制其喪儀及山陵制度務從儉約並不以金銀綵飾天下節度觀察團練使刺史等並不湏赴哀祀祭之禮亦從節儉其天下人吏勅到後出臨三日皆釋服無禁婚娶祠祀酒肉其宫殿中者當朝夕各十五舉音皇帝三日聽政十三日小祥二十五日大祥二十七日而釋服元陵儀注詔問宗子在外州府合赴京師不所司奏曰按禮五廟之孫祖廟未毁雖為庶人冠取妻必告死必赴練祥則告不忘親之人也又曰四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣又𫝊云天子七月而葬同軌畢至據此則宗子五等以上不限逺近盡同赴山陵唐禮樂志周禮五禮二曰凶禮唐初徙其次第五而李義府許敬宗以為凶事非臣子所宜遂去其國恤一篇由是天子凶禮闕焉至國有大故則皆臨時采綴比附以從事事已則諱而不𫝊故後世無考焉至開元制禮惟著天子賑恤水旱遣使問疾弔死舉哀除服臨喪册贈之𩔖若五服與諸臣之喪葬縗麻哭泣則頗詳焉按唐志所言如此柳子厚作裴瑾崇豐二陵集禮後序其說亦然且謂永貞元和間天禍仍遘自崇陵至於豐陵徳宗葬崇陵順宗葬豐陵不能周嵗司空杜公杜黄裳由太常相天下連為禮儀使擇其僚以備損益於是河東裴瑾以太常丞隴西辛祕以博士用焉内之則攅塗祕器象物之宜外之則復土斥上因山之制上之則顧命典冊興文物以受方國下之則制服節文頒憲則以示四方由其肅恭禮無不備且苞并總統千載之盈縮羅絡旁午百氏之異同搜揚剪截而悉得其中顧問關決而不悖於事議者以為司空公得人而邦典不墜裴氏乃悉取其所刋定及奏復於上辨列於下聯百執事之儀以為崇豐二陵集禮蔵之於太常書閣君子以為愛禮而近古焉然則李義府許敬宗所削開元禮所闕者瑾之書悉有之矣今考王溥作唐㑹要宋祁修唐書志於國恤畧無所紀載豈未見裴書邪或瑾之書至王宋二公之時亦不復存邪後唐莊宗同光三年七月正簡皇太后遺令曰皇帝以萬機至重八表所尊勿衣麤縗勿居諒闇三年之制以日易月過三日便親朝政皇后諸妃及諸王公主並制齊縗本服以日易月十三日除中書門下翰林學士在朝文武百官内諸司使及諸道節度觀察防禦使刺史監軍及前資官并僚佐官吏士庶僧道百姓並凖本朝故事降服施行勿使過制皇帝釋服不御八音勿廢羣祀勿斷屠宰勿禁晏遊園陵喪制皆從簡省故申遺令奉而行之其月太常禮院奏按故事中書門下翰林學士在朝文武官内諸司使供奉官以下從成服三日每日赴長夀宫朝臨自後不臨其服以日易月十三日除至小祥日合釋服每至月朔月望小祥大祥釋服日未除服者縗服臨已除服者則素服不臨並赴長夀宫先拜靈訖移班近東進名奉慰又奏准故事文武前資官及六品以下未升朝官并士庶等各於本家素服一臨禁衛諸軍使以下各於本軍㕔事素服一臨僧尼道士各於本寺觀一臨外命婦各於本家素服朝臨三日諸道節度觀察防禦團練刺史及僚佐等聞哀後當日成服三日改黲十三日除從之宋開寳九年十月太祖崩遺詔喪制以日易月皇帝三日而聽政十三日小祥二十七日大祥諸道節度觀察防禦團練使刺史知州等不得輙離任赴闕諸道州府臨三日釋服太宗奉遺詔即位就殿之東楹號泣以見羣臣服布四脚直領布襴腰絰命婦布帕頭裙帔皇弟子文武二品以上加布冠斜巾㡌首絰大袖裙袴竹杖士民縞素婦人縵諸軍就屯營三日哭羣臣素服請聽政不許宰相懇請始御長春殿羣臣喪服就列上去杖絰服斜巾垂㡌卷簾視事小祥上改布服四脚直領布襴腰絰布袴二品以上官亦如之大祥止服素紗輭脚折上巾淺黄衫緝皮黒銀帶羣臣及軍校以上皆本色黲服銕帶鞾笏諸王入内服縗衣出則服黲至道三年三月太宗崩皇太子㪚髪號擗奉遺詔即皇帝位於萬嵗殿之東楹羣臣稱賀上慟哭四月羣臣三表請聽政戊戍御崇政殿之西序又三表始御正殿有司言山陵前朔望不視事羣臣詣閤奉慰詔羣臣朔望並詣萬嵗殿哭奠退詣内東門奉慰乾興元年二月眞宗崩有司言今月二十三日成服至二十五日羣臣朝夕臨二十六日至二十八日朝臨自後每大小祥逐七禫除朔望並入臨奉慰至山陵從之又令逐七於觀音啟聖院開寳寺㙮院設大㑹齋令中書樞密院分徃行香時上雖用以日易月之制改服臨朝宫中實行三年之喪嘉祐八年三月仁宗崩英宗即位於東階是日小斂命衛士坐甲東門三日命武臣十六人各將甲士二百廵檢皇城新舊城輔臣宿資善堂宗室宿崇政門外至成服止遣使齎詔告哀契丹夏國及賜遺留物上欲命韓琦攝冢宰行亮隂三年禮執政以為不可三表乃聽政有司奏故事皇帝羣臣釋黲常服宗室出則常服居則縗麻終喪軍民至禫除朝臣祔廟許嫁娶三京諸路至卒哭東京至祔廟百官三年母聽樂每七日羣臣朝臨四十九日止治平元年三月丁酉朔以小祥禁京師樂至四月十五日庚申不視事至四月四日禁屠十日二年詔京師自二月一日開封諸縣自三月一日禁樂自至四月十五日諸路禁前後各七日沿邊州軍勿禁三月朔望不御前後殿禮院奏近依國朝故事詳定大祥變除服制以三月二十九日大祥至五月二十九日禫六月二十九日禫除至七月一日從吉已蒙降勅謹按禮學王肅以二十五月為畢喪而鄭康成以二十七月通典用其說又加至二十七月終則是二十八月畢喪而二十九月始吉葢失之也祖宗時據通典為正而未經講求故天聖中更定五服年月勅斷以二十七月今士庶所同遵用夫三年之喪自天子逹不宜有異請以三月二十九日為大祥五月擇日而為禫六月一日而從吉於是大祥不御前後殿開封府停决大辟禁屠至四月五日待制觀察使以上及宗室管軍官日一奠二十八日而羣臣皆入奠按自仁宗以来視朝則用易月之制而宫中實行三年之喪故於小祥大祥禫除之時旋行禁音樂及奠祭之禮盖亦適禮之變云治平四年正月英宗崩神宗即位喪禮如舊制元豐八年三月神宗崩哲宗即位凡凶禮並如治平故事祕書省正字范祖禹言先王制禮以君服同於父皆斬縗三年盖恐為人臣者不以父事其君此所以管乎人情也自漢以来不唯人臣無服而人君遂亦不為三年之喪唯國朝自祖宗以来外廷雖用易月之制而宫中實行三年之喪且易月之制前世所以難改者以人君自不為服也今君上之服已如古典而臣下之禮猶依漢制是以百官有司皆已復其故常容貌衣服無異於行路之人豈人之性如此其薄哉由上不為之制禮也今羣臣易月人主實行三年之喪故十二日而小祥朞而又小祥二十四日大祥再朞而又大祥夫練祥不可以有二也既以日為之又以月為之此禮之無據者再朞而大祥中月而禫禫者祭之名也非服之色也今乃為之黲服三日然後禫此禮之不經者也既除服至葬而又服之盖不可以無服也祔廟而後即吉纔八月矣而遽純吉無所不佩此又禮之無漸者也易月之制因襲故事已行之禮不可追也臣愚以為宜令羣臣朝服止如今日而未除縗至朞而服之漸除其重者再朞而又服之乃釋縗其餘則君服斯服可也至於禫不必為之服惟未純吉以至於祥然後無所不佩三年之制畧如今矣詔禮官詳議以聞其後禮部尚書韓忠彦等言朝廷典禮時異異宜不必循古若先王之制不可盡用則當以祖宗故事為法今言者欲令羣臣服喪三年民間禁樂如之雖過山陵不去縗服庶協古之制緣先王恤典節文甚多必欲循古則又非特如臣僚所言故事而已今既不能盡用則當循祖宗故事及先帝遺制從之元符二年正月哲宗崩徽宗即位凡凶禮並如治平熙寧故事先是詔三省樞密院集侍從官議太平興國二年所用服紀九月太常寺言太宗皇帝上繼太祖兄弟相及雖行易月之制實服斬縗三年以重君臣之義公除已後庶事相稱具載國史今皇帝嗣位哲宗實承神考之世已用開寳故事為哲宗服縗重今神主升祔已畢百官之服並用純吉皇帝服御未經討論宜如太平興國二年故事禮部言太平興國中宰相薛居正表稱公除以来庶事相稱獨茲徹樂誠未得宜即是公除以後除不舉樂外釋縗從吉事理甚眀今皇帝當釋黲御常服素紗展脚幞頭淡黄衫黒犀帶請下有司裁制宰臣韓忠彦等請從禮官議改吉服三上表乃詔候用期服吉時詔不由門下徑付有司給事中龔原言喪制乃朝廷大事令行不由門下是廢法也臣為君服斬縗三年古未嘗改且陛下前此議服禮官持兩可之論陛下既察見其姦其服遂正今乃不得已而從之臣竊為陛下惜開寳時并汾未下兵革未弭祖宗櫛風沐雨之不暇其服制權宜一時也非故事也原坐降兩宫黜知南康軍高宗紹興元年隆祐皇太后孟氏崩詔以繼體之重當承重服徽宗以紹興五年四月崩於五國城七年正月問安使何蘚等還始知凶問宰執入見上號慟擗踊終日不食宰臣張浚等力請方少進粥上成服於几筵殿文武百僚朝晡臨於行宫自聞喪至小祥百官朝晡臨自小祥至禫祭朝一臨太常等言舊制沿邊州軍不許舉哀緣諸大帥皆國家腹心爪牙之臣休戚一體至於將佐皆懐忠憤宜就所屯自副將而上成服日朝晡臨故校哭於本營命徽猷閣待制王倫等為奉迎梓宫使知邵州胡寅上疏畧曰三年之喪自天子至於庶人一也及漢孝文自執謙徳用日易月至今行之子以便身忘其親臣以便身忘其君心知其非而不肯改自常禮言之猶且不可况變故特異如今日者又當何如恭惟大行太上皇帝大行寧徳皇后蒙犯邊塵永訣不復實由尼堪是有不共戴天之讐考之於禮讐不復則服不除寢苫枕戈無時而終所以然者天下雖大萬事雖衆皆無以加於父子之恩君臣之義也伏覩某月某日聖㫖緣國朝故典以日易月臣切以為非矣自常禮言之猶湏大行有遺詔然後遵承今也大行詔㫖不聞而陛下降㫖行之是以日易月出陛下意也大行幽厄之中服御飲食人所不堪疾病粥藥必無供億崩殂之後衣衾歛蔵豈得周備正棺卜兆知在何所茫茫沙漠瞻守為誰伏惟陛下一念及此荼毒摧割倍難堪忍縱未能遵春秋復讐之義俟讐殄而後除服猶當革漢景之薄喪紀以三年為斷不然以終身不可除之服二十七日而除之是薄之中又加薄焉必非聖人之所安也又曰雖宅憂三祀而軍旅之事皆當决於聖裁則諒闇之典有不可舉盖非枕塊無聞之日是乃枕戈有事之辰故魯侯有周公之喪而徐夷並興東郊不開則是墨縗即戎孔子取其誓命今六師戒嚴誓將北討萬機之衆孰非軍務陛下聽斷平决得禮之變􅌰哭之後以墨縗臨朝合於孔子所取其可行無疑也又曰如合聖意便乞直降詔㫖云恭惟太上皇帝寧徳皇后誕育𦕈躬大恩難報欲酬罔極百未一伸鑾輿逺征遂至大故訃音所至痛貫五情想慕慈顔杳不復見怨讐有在朕敢忘之雖軍國多虞難以諒闇然縗麻枕戈非異人任以日易月情所不安興自朕躬致喪三年即戎衣墨况有權制布告中外昭示至懐其合行典禮令有司集議来上如敢沮格是使朕為人子而忘孝之道當以大不恭論其罪陛下親御翰墨自中降出一新四方耳目以化天下天地神眀亦必以佑助臣不勝大願紹興三十一年五月金國人使報孝慈淵聖皇帝升遐詔朕當持斬縗三年之服以申哀慕是日文武百僚並常服黒帶去魚詣天章閣南空地立班聽詔㫖舉哭畢次赴後殿門外進名奉慰次赴几筵殿焚香舉哭六月權禮部侍郎金安節等言孝慈淵聖皇帝升遐照國朝典故以日易月自五月二十二日立重安奉几筵至六月十七日大祥後所有縗服請權留以待梓宫之還從之孝宗淳熙十四年十月八日乙亥光堯太上皇帝崩上號慟擗踊二日不進膳尋諭宰執王淮欲不用易月之制如晋武魏孝文實行三年喪自不妨聽政淮等奏通鑑載晋武帝雖有此意後来只是宫中深衣練冠上曰當時羣臣不能將順其美司馬光所以譏之後来武帝竟欲行淮曰記得亦不能行上曰自我作古何害淮曰御殿之時人主縗絰羣臣吉服可乎上曰自有等降乃中批朕當縗絰三年羣臣自行易月之令其合行儀制令有司討論詔百官於以日易月之内縗服治事二十日丁亥小祥上未改服王淮等乞俯從禮制上流涕曰大恩難報情所未忍二十一日車駕還内上縗絰御輦設素仗軍民見者徃徃感泣詔今自五日一詣梓宫前焚香上欲縗服素幄引輔臣及班次而禮官奏謂苴麻三年難行於外廷奏入不出十一月戊戌朔禮官顔師魯尤袤等奏乞大祥禮畢改服小祥之服去杖絰禫祭禮畢改服素紗軟脚折上巾淡黄袍黒銀帶神主祔廟畢改服幞頭黒鞋犀帶遇過宫燒香則於宫中縗絰行禮二十五月而除上批淡黄袍改服白袍二日己亥大祥四日辛丑禫祭禮畢五日壬寅百官請聽政不允八日百官三上表引康誥被冕服出應門等語為證九日詔可十五年正月十八日甲寅百日上過宫行焚香禮二十一日丁巳上諭輔臣昨内引洪邁見朕已過百日猶服縗麤因奏事應以漸今宜服如古人墨縗之義而巾則用繒或羅朕以羅絹非是若用細布則可王淮等言尋常士大夫丁憂過百日巾衫皆用細布出而見客則以黲布今陛下舉千古不能行之禮足為萬世法上又曰晩間引宿直官之𩔖如何淮曰布巾布禙子便是常服上不為然自是每御延和殿止服白布折上巾布衫過宫則縗絰而杖三月壬子啟攅上服初喪之服甲寅發引丙寅掩攅甲戍上親行第七虞祭大臣言虞祭乃吉禮合用靴袍上曰只用布折上巾黒帶布袍可也二十日丙戍神主祔廟是日詔曰朕昨降㫖揮欲縗絰三年縁羣臣屢請御殿易服故以布素視事内殿雖有俟過祔廟勉從所請之詔稽諸典禮心實未安行之終制乃為近古宜體至意勿復有請於是大臣乃不敢言葢三年之制斷自上心執政近臣皆主易月之說諫官謝鍔禮官尤袤心知其不可而不敢盡言惟勅令所刪定官沈清臣再上書願堅主聽大事於内殿之㫖將来祔廟畢日預降御筆截然示以終喪之志杜絶輔臣方来之章勿令再有奏請力全聖孝以示百官以刑四海上納用焉朱熹君臣服議曰淳熙丁未十月八日太上皇帝上僊遺誥至州縣有司莫識衣冠制度大率盡用令式斬縗之服哀臨既畢及被禮部所下符則止當用布四脚直領布襴衫麻絰而已此符當與遺誥同日俱下乃遲數日有司不䖍惑誤四方已如此而於布四脚之下註云係幞頭於直領布襴下註云上領不盤則雖間有舉哀稍緩之處官吏𫝊觀亦多不曉四脚幞頭之說予記温公書儀及後山談叢所記頗詳乃聞周武帝所製之常冠及布一方幅前兩角綴兩大帶後兩角綴兩小帶覆領四垂因以前邊抹額而繋大帶於腦後復收後角而繋小帶於髻前以代古冠亦名幞頭亦名折上巾其後乃以漆紗為之而専謂之幞頭其實本一物也今禮官以幞頭解四脚是矣而又不肯詳言其制則未知其若馬陳之所謂周武之所制者邪抑將以紙為胎使之剛强跂立亦若今之漆紗所為者邪至於直領布襴衫上領不盤之說則衆尤莫曉葢既曰直領則非上領既曰上領則不容不盤兩言之中自相牴牾至於如此雖予亦莫識其所以然也乃有强為之說者曰雖為上領而不聨綴斜帛湊成盤曲之勢以就正圓但以長布直縫使足以繞項而已予謂禮官之意或是如此亦不可知但求之於古既無所考則亦何敢信而從之邪疑此特生於古今之禮不同禮官不能分别去取而欲依違其間是以生此回惑耳盖直領者古禮也其制具於儀禮其像見於三禮圖上有衣而下有裳者是也上領有襴者今禮也今之公服上衣下襴相屬而弗殊者是也竊意國恤舊章之本文必有曰直領布衫者而又日布襴者其服直領布衫則兼服布裙而加冠於首其服布襴衫則首加四脚而已盖其初雖合古今之禮而猶各有所施則亦未為失也今既不察其異矣又但見公服之上領而有襴遂解直領為上領不盤而增襴字於衫字之上文若遷今以就古而不知其實之誤反至於廢古以循今也又前此州縣誤用之禮皆著菅屨而符乃無文承用之者遂履韈以赴臨殊􅆾禮意獨無曰杖云者於禮為粗合而亦有所未盡盖禮君之喪諸達官之長杖所謂達官謂専達之官在今日則内之省曹寺監長官外之監司郡守凡一司之長若嘗任侍從以上得専奏事者是也故今不杖之制施於僚佐以下則得之矣至使其長官下而同之而雖故相領帥若家居者無異文豈不薄哉又後數日乃得邸吏所報朝廷冠服制度則云皇帝初喪服白羅袍黒銀帶絲鞋白羅軟脚折上巾成服日服布斜巾四脚裙袴冠㡌竹杖腰絰首絰直領大袖布襴衫白綾襯衫視事日去杖首絰小祥日改服布四脚直領布襴衫腰絰布袴大祥日服素紗軟脚折上巾淺黄衫黒銀帶羣臣之服分為三等上等布頭冠布斜巾布四脚大袖襴衫裙袴首絰腰絰竹杖襯服中等布頭冠幞頭大袖襴衫袴腰絰其下等則布幞頭襴衫腰絰而已詳此帝服有冠有裙而衫曰直領則是古之喪服當自為一襲者又有四脚有襴衫則皆當世常服又當别為一襲者而今乃一之則果如予之所料矣然至於小祥之服則衫直領而下不裙宰臣之服則下雖有裙而衫非直領此又不可曉者其餘亦多重複繆誤如斜巾四脚冠㡌乃四物不當一時並加於首四者皆首服獨冠於古制斜巾乃民間初喪未成服時所用既成服則去之盖古者絻之遺制也今成服而與冠並用其失一也四脚之說已見於前盖宇文氏廢古冠而為之若兼存而互用猶不相妨今同時並加其失二也㡌古今皆為燕服與正服之用亦各有所施今與古冠四脚並用三失也今天子之冠四衮冕通天幞頭㡌子雖皆御服如之何而可並用於一時乎直領上領古裙今襴亦四物不當一時並加於身說已見前冠當服以終喪不當小祥而釋古禮小祥改服練冠但以熟布為之其制不易也今小祥便只服布四脚不服練冠非是其去巾㡌亦不知有何據也四脚幞頭折上巾三名一物不當錯出而異名說亦見前兼禮官亦云四脚係幞頭則知二者非異物而於朝臣之服上等曰四脚中下等日幞頭不知何謂其曰銀帶絲鞋白綾襯衫者則尤非喪禮之所宜服亦不待辨而知其非矣大抵其失在於兼盡古今以為天子備物之孝而不知考其得失而去取之正天子議禮制度考文之事也然此等條目之多欲一一而正之則有不勝正者必循其本而有以大正焉則曰斬縗三年為父為君如儀禮喪服之說而已其服則布冠直領大袖布衫加布縗辟領負版揜祍布襯衫布裙麻腰絰麻首絰麻帶菅屨竹杖自天子至於庶人不以貴賤而有增損也但儀禮之冠三梁乃士禮今天子通天冠二十四梁當凖之而去其半以為十二梁羣臣則如其本品進賢冠之數以為等大本既立然後益考禮經以修殯葬饋奠之禮參度人情以為居處飲食之節行之天下凡諸吉凶之禮有詭聖不經如上領胡服之𩔖者一切革而去之則亦庶乎一王之制而無紛紛之惑矣而前此議者猶或慮其說之難行雖以元祐之盛時而不能行范祖禹之論盖不知自漢以来所以不能復行君父三年之喪者一則以人主自無孝愛之誠心而不能力行以率於上二則慮夫臣民之衆冠婚祠享㑹聚之有期而不欲以是奪之也國家自祖宗以来三年通喪實行於内則其所以立極導民者無所難矣獨所以下為臣民之慮者未有折衷是以依違於此而未敢輕議此亦慮之過矣夫古之所謂方喪三年者盖曰比方於父母之喪云爾盖事親者親死而致喪三年情之至義之盡者也事師者師死而心喪三年謂之哀如父母之無服情之至而義有所不得盡者也事君者君死而方喪三年謂其服如父母而分有親疏此義之至而情或有不至於其盡者也然則所謂方喪者豈曰必使天下之人寢苫枕塊飲水食粥泣血三年真若居父母之喪哉今臣之服如前所陳則已有定說矣獨庶人軍吏之貧者則無責乎其全雖以白紙為冠而但去紅紫華盛之飾其亦可也至如飲食起居之制則前所謂參度人情者正欲其斟酌古今之宜分别貴賤親疏之等以為隆殺之節且以婚姻一事言之則宜自一月之外許軍民三月之外許士吏復土之後許選人祔廟之後許承議郎以下小祥之後許朝請大夫以下大祥之後許中大夫以下各借吉三日其大中大夫以上則並湏禫祭然後行吉禮焉官卑而差遣職事高者從高遷官者從新貶官者從舊如此則亦不悖於古無害於今庶乎其可行矣或者又謂今之吉凶服上領之制相承已久而遽盡革之恐未為允此不然也古今之制祭祀用冕服朝會用朝服皆用直領垂之而不加紳束則如今婦人之服交掩於前而束帶焉則如今男子之衣皆未嘗上領也今之上領公服乃北方之戎服自晉宋之間流入中國至隋煬帝時廵逰無度乃令百官戎服從駕而以紫緋緑三色為九品之别本非先王之法服亦非當時朝祭之正服也今雜用之亦以其便於事而不能改耳曷若凖朝服祭服之法參取唐公服之制以為便服而去之哉唐公服見通典開元禮序例下篇民私喪五服制度皆如此禮但以親疏分五等而衣服之制不殊温公書儀但斬縗用此制而大功以下從俗禮非是惟髙氏送終禮其說甚詳當更討論訂正别為公私通行喪服制度頒行民間令其遵守庶㡬先王之禮大小由之上下交修可以久而不廢且使大義素定於臣民之家免至臨事紛錯疑惑衆聽紹熙五年六月九日孝宗崩太皇太后有㫖皇帝以疾聽在内成服太皇太后代皇帝行禮慶元二年六月九日大祥八月十六日禫祭時寧宗執孝宗之喪欲大祥畢更服禫兩月曰但欲禮制全盡不較此兩月於是監察御史胡紘言孫為祖服已過期矣議者欲更持禫兩月不知用何典禮若曰嫡孫承重則太上聖躬亦已康復於宫中自行二十七月之重服而陛下又行之是喪有二孤也自古孫為祖服何嘗有此禮詔侍從臺諫給舎集議吏部尚書葉翥等言孝宗升遐之初太上聖體違豫就宫中行三年之喪皇帝受禅正宜倣古方喪之服以為服昨来有司失於討論今胡紘所奏引古據經别嫌眀㣲委是允當欲從所請參以典故六月六日大祥禮畢皇帝及百姓並純吉服七月一日皇帝御正殿饗祖廟將来禫祭令禮官檢照累朝禮例施行四月庚戍詔羣臣所議雖合禮經然於朕追慕之意有所未安早来奏知太皇太后靣奉聖㫖以太上皇帝雖未康愈宫中亦行三年之制宜從所議朕躬奉慈訓敢不遵依議狀可付外施行建炎以来朝野雜記髙宗之喪孝宗為三年服及孝宗之喪有司請於易月之外用漆紗淺黄之制盖循紹興以前之舊朱文公後入不以為然奏言今已徃之失不及追改惟有將来啟攅發引禮當復用初喪之服則其變除之節尚有可議望眀詔禮官稽考禮律豫行指定其官吏軍民方喪之服亦宜稍為之制勿使肆為華靡其後詔中外百官皆以涼衫視事盖用此也方文公上議時門人有疑者文公未有以折之後讀禮記正義喪服小記為祖後者條因自識於本議之末其畧云凖五服年月格斬縗三年嫡孫為祖謂承重者法意甚眀而禮經無文但𫝊云父沒而為祖後者服斬然而不見本經未祥何據但小記云祖父沒而為祖母後者三年可以旁照至為祖後者條下疏中所引鄭志乃有諸侯父有廢疾不任國政不任喪事之問而鄭答以天子諸侯之服皆斬之文方見父在而承國於祖服向来入此文字時無文字可檢又無朋友可問故大約且以禮律言之亦有疑父在不當承重者時無眀白證驗但以禮律人情大意答之心常不安歸来稽考始見此說方得無疑乃知學之不講其害如此而禮經之文誠有闕畧不無待於後人向使無鄭康成則此事終未有斷決不可直謂古經定制一字不可增損也慶元三年憲聖太皇太后崩時太上皇承重寧宗降服齊縗期國恤喪禮發哀自聽遺誥始是日皇帝服白羅袍黒銀帶絲鞋白羅軟折上巾皇太后初喪皇帝服素紗軟幞頭白羅衫黒銀帶太皇太后太上皇后初喪日並同文武百僚並服常服黒帶去金玊飾入詣殿下立班定禮直官引班首出班於班前南向立搢笏聽宣遺誥讀遺誥同次歸位並舉哭一十五音再拜移班稍南立班首稍前躬身奉慰凡奉慰日有皇太后並先慰皇太后後倣此舉臨故事未成服以前行在文武百僚諸司長吏以上及近臣列校每日朝晡臨於宫庭其餘職事官品於宫門外詣殿下立班再拜訖禮直官引班首詣香案前搢笏三上香出笏歸位舉哭一十五音再拜訖班退自是朝晡臨小祥後朝一臨至外朝禫除止每七日皆臨至四十九日止禫除後山陵前遇朔望日朝臨值雨或霑濕權免入臨行在諸軍統制統領就寨掛服免入臨其餘將副并部隊將官隊使臣并散使臣陞朝官以上常服哭於本營三日而止其常日朝殿祗應排立行門禁衛班直将校指揮御前忠佐俟百官赴臨即哭於殿門外諸路監司州縣長吏以下自關報到日服布幞頭直領襴衫上領下盤腰絰以麻臨三日而除沿邊不用舉哀皇太后崩朝晡臨至成服後三日止餘並同皇后崩發哀次日入臨成服後三日而止餘並同神帛紹興三十一年五月二十二日禮部侍郎金安節等言檢會典故切詳神帛之制雖不經見然考之於古盖復之遺意也禮運曰及其死也升屋而號告曰臯某復註云招之於天然古之復者以衣今用神帛招魂其意盖本於此今来孝慈淵聖皇帝神帛欲乞下太史局日下依上件典故施行詔恭依大斂成服成服擇日或與大斂同日其日儀鑾司先設素幄於几筵之側稍前時至分引行事陪位官易服就位立班定皇帝服素服詣几筵側素幄即座太史奏時及禮直官太常博士引太常卿當幄前俛伏跪奏大常卿臣某言請皇帝為大行皇帝升遐成服奏訖俛伏興内侍官為皇帝釋素服易縗服禮直官引讀祝文官詣香案西面東立簾捲太常卿𨗳皇帝出幄詣几筵側西向褥位立奏請再拜哭在位官皆再拜哭太常少卿𨗳皇帝詣香案前三上香跪内侍進茶酒酹茶三奠酒俛伏興奏少立俟讀祝文訖請皇帝哭盡哀請皇帝再拜在位官皆再拜太常卿𨗳皇帝還褥位再拜太常卿𨗳皇帝還幄簾降太常卿奏禮畢退百官移班進名班首出班致詞復位再拜奉慰累朝成服典故並同凡成服日皇帝服布斜巾四脚裙袴冠㡌絲杖皇太后喪用桐木杖腰絰首絰直領大袖布襴衫白絹襯衫皇太后喪用白綾襯衫小祥日改用布四脚直領布襴衫腰布袴已上舊制並同太宗之喪太常禮院上言皇帝服布斜巾四脚大袖衫袴㡌竹杖腰絰首絰直領布襴衫白綾襯服諸王皇親以下亦如之加布頭冠襯服用絹皇太后皇后内外命婦布裙衫帔帕頭首絰絹襯服六宮内人無帔皇帝皇后諸王公主諸縣主諸王夫人六宫内人並左被髪皇太后全被髪初有司定散髪之禮言皇帝當聽政更不散髪帝曰豈有居父之喪不盡禮乎朕已散髪矣中書門下樞密使副使宣徽三司使翰林學士節度使金吾上將軍文武二品已上布斜巾四脚頭冠大袖襴衫裙袴腰絰竹杖絹襯服自餘百官並布幞頭襴衫腰絰兩省五品御史臺尚書省四品諸司三品以上見任前任防禦團練使刺史内客省宣政昭宣閤門使前殿及入内都知押班服布頭冠幞頭大袖襴衫裙袴腰絰詔都知同少府監依所定修製又諸軍人百姓白衫紙㡌子婦人素縵不花釵三日哭而止京城内外禁止音樂自四月三日成服後至五日羣臣朝晡臨六日至八日朝臨自後每遇大小祥朔望日入臨殿庭移班近東進名奉慰從之紹興九年正月二十五日徽宗大祥髙宗服白羅袍至禫祭祥服日服素紗軟脚幞頭淺色黄羅袍黒銀帶及紹興三十一年八月太常寺檢㑹故事言大祥日服素紗軟脚幞頭白羅黒銀帶淳熙十四年十月十一日太常寺檢照大祥日服素紗軟脚折上巾淡黄袍黒銀帶上披淡黄袍改服白袍自後每御延和殿並服大祥之服又不用皂幞頭其折上及白袍並以布為之宫中則布巾布衫過宫則縗絰而杖慶元三年憲聖太皇太后崩太上皇帝承重皇帝降服齊縗布頭冠幞頭大袖襴衫裙袴腰絰白綾襯衫皇太后服太上皇帝喪成服麤布盖頭衫帔首絰絹襯服為皇太后喪服同每奠祭日俟皇帝權歸御幄次行燒香禮慶元六年慈懿太上皇后崩成肅太皇太后服碧羅帕頭帔白羅寛袖衫淡黄縠子裙禮例成服時於夀慈宫設幄舉哭行成服之禮皇后以下行禮大行皇帝喪成服日及貴妃内外命婦麤布盖頭衫帔首絰絹襯服六宫内無帔宫人布盖頭長衫裙首絰絹襯服内外命婦合入臨人仍加冠大行皇太后喪成服日服齊縗布盖頭餘並同内外命婦服只帕頭不用盖頭餘並同皇太子服太上皇帝喪成服日服布頭冠布斜巾布四脚大袖襴衫裙袴首絰絹襯服皇孫服太上皇帝喪成服日服布頭冠幞頭大袖襴衫袴腰絰未冠者依皇孫服制除去冠兼未赴朝謁所有朝晡臨亦不趨赴公主服成服日布帊頭帔裙衫首絰絹襯服親王服慶元三年太皇太后崩慶元六年太上皇后崩吳興郡王並服布頭冠斜布四脚大袖襴衫袴腰絰桐木杖絹襯服皇太后兄弟服例禮例縗服三年若入皇城門權易墨縗由權開門出入又逐七日百日在家設位行禮其掛服日於當日掛服自顯仁皇后上仙韋誼等弟姪並觧官持服後倣此大行皇后弟姪同慶元六年恭淑皇后上仙太常寺言韓竢係皇后兄合服大功九月竢之子照典故合觧官持服三年從之羣臣服大行皇帝崩成服日並斬縗服謂不緝皇太后崩服齊衰服中書門下省樞密使副尚書翰林學士節度使金吾衛上將軍文武官二品以上布頭冠布斜巾四脚大袖襴衫裙袴首絰腰絰竹杖絹襯衫皇太后崩服同但用桐木杖不用首絰文武五品以上并職事官監察御史以上内客省宣政昭宣使知閣門事及入内都知押班布頭冠幞頭大袖襴衫裙袴腰絰自餘文武百官三省樞密院主書令史以上及御史臺閤門太常寺引班祗應人布襴衫腰絰皇太后喪並同小祥日文武百官並改服布幞頭布襴衫腰絰布袴大祥日並改服素衫軟脚幞頭黲布公服白鞓錫帶故例幞頭令臨安府製造給散其黲布公服錫帶令本府各支布一疋半自令包褁製造禫服日皇帝釋黲常服文武百官如繋金玊帶佩魚者易以黒帶去魚乗花繡韀狨座者易以皂韀去狨座宗室出則常服居則縗服依服屬終喪係淳熙十四年十月十一日太常寺檢照典禮故事舊制禫服後羣臣純吉服其後易以祔廟又易以小祥紹興七年正月二十五日詔羣臣侯祔畢純吉服繼今候過小祥日取㫖及紹興八年正月二十五日徽宗小祥二月二十三日百官純吉服淳熙十四年髙宗升遐典故詔依紹興七年施行乃聽羣臣遵日月之制及紹熙甲寅從臣羅㸃等建議乞令羣臣於易月之後未釋縗服朝㑹治事權用公服黒帶每遇七日及朔望時節朝臨奉慰應於喪禮皆以縗服從事山陵之後期與冄期則又服之至大祥而後除至於燕服亦當稍為之制去紅紫之飾此於臣子行之非有甚難可以畧存三年之制當時臺諫集議以為㸃等所請雖未純如古亦畧存遺意可以扶持衰薄補助名教詔從之嘉泰元年八月八日光宗小祥禮部討論乃舎紹熙甲寅之制乞酌紹興已行之典及淳熙申命之文令百官過小祥純吉服自九月一日始紹興元年四月十八日太常寺言章獻眀肅皇后崩乙未百官聽遺誥喪紀以日易月在京百官十三日而除祖宗以来皇太后崩故事莫盛於章獻眀肅皇太后當時遺誥十三日令在京百官除服今来大行隆祐皇太后崩遺誥亦以十三日而除服合至今月二十六日百官依故事進名奉慰訖退易常服從之自成服以後小大祥禫除日及朔望日百官並進名奉慰遇皇帝視事日宰相奏事云去杖小祥日奏事去冠餘官奏事依此皇帝聽政未釋服前其引班若行弔臨之禮即服縗絰如遇内殿引班奏事及從駕常服黒帶士庶以下服軍人百姓白衫紙㡌婦人素縵不花釵三日止士庶婚嫁服除外不禁文武臣僚之家至山陵祔廟畢並許嫁娶不用花綵仍禁樂立銘旌銘旌髙九尺篆文官用金泥篆聖號如髙宗銘旌旛則書大行光堯聖夀憲天體道性仁誠徳經武緯文紹業興統眀謨聖烈太上皇帝梓宫皇太后皇后銘旌並倣此用螭頭提墜上下板並先下文思院制造成服日立立重檀弓重主道也始死未作主先作重以木為之縣物焉曰重刋斵治鑿之為縣簪孔士重木長三尺大夫五尺諸侯七尺天子九尺既虞埋之始作主以易重始死作重猶吉祭作重皆所以依神立重大斂成服日同立擇吉時立於靈駕前俟将来發引日捧擎至攅宫其掩攅日埋瘞於黄堂隧道徽宗之喪太常少卿樓炤言故事成服日立重今来與故事不同乞自聞喪次日立重命太史局就日内擇時立重詔依禁樂内外品官禁樂二十七月京城内外民庶自舉哀至祔廟合行禁樂外路民庶等禁樂百日沿邊軍中及在外諸軍軍行教閱不禁未祔廟前每遇大祠奏告用樂去處備而不作臨安府城内外禁樂諸路準此自起攅日禁行在音樂至祔廟畢仍舊小祥諸路州軍縣鎮等處前後禁樂七日紹興九年正月二十五日徽宗顯肅大祥依昭陵故事行在禁樂七十五日臨安府屬縣四十五日後倣此停祭自發哀後擇日奏告天地宗廟社稷宫觀宗廟祭享并中小祠權停至祔廟日依舊龍圖等閣祖宗神御殿節序旦望及帝后生辰忌辰並停酌獻至大祥後依舊殿攅至百日殿攅行於大殮之後髙宗崩大殮成服後五日而殿攅或與大殮同日孝宗崩大殮成服同日立重殿攅或行於小祥之後顯仁皇太后崩以小祥後三日殿攅其日行燒香禮前一日儀鑾司先設素幄於殿前攅方位之東稍前其日祭時至都大主管喪事官行祭主之禮以俟太史報時及導奉梓宫至殿攅方位其合用儀物令都大主管喪事官監視殿攅訖分引行事陪位官就位立班定皇帝服縗服復詣素幄即座禮直官太常博士引太常卿當幄前俛伏跪奏太常卿臣某官請皇帝為大行太上皇帝殿攅行燒香之禮奏訖俛伏興禮直官引讀祝文官詣案北靣南立簾捲前導官前導皇帝出幄詣殿上褥位北向立奏請拜皇帝再拜哭前導官前導皇帝香案前奏請上香跪内侍進茶酒奏請酹茶酒奏訖俛伏興奏請少立俟讀祝文官稍前跪讀祝文奏請皇帝哭再拜在位官皆哭再拜訖前導官前導皇帝還褥位奏請拜皇帝拜在位官皆再拜訖前導官前導皇帝還幄簾降太常卿奏禮畢退百官移班稍南進名班首出班致詞復位再拜奉慰退皇太后殿攅則太常卿奏云請皇帝為大行皇太后殿攅行燒香之禮餘並同上儀十三日小祥外朝以日易月之制行奠祭禮其日儀鑾司先設素幄扵几筵殿之東時將至行事陪位官就位立班皇帝服縗服詣幄即御座簾降太常卿當幄前跪奏請皇帝行祭奠之禮簾捲前導官導皇帝出幄詣殿下褥位向西立奏請再拜舉哭皇帝再拜舉哭在位官皆冄拜舉哭前導皇帝升殿詣香案前三上香内侍進茶酒酹茶三奠酒俛伏興奏請少立讀祝文官跪讀祝文訖奏請哭盡哀皇帝哭盡哀在位官皆哭盡哀奏請再拜皇帝再拜在位官皆再拜前導皇帝降階殿下褥位西向立奏請皇帝再拜在位官皆再拜前導皇帝還幄簾降奏禮畢百官奉慰如上儀皇帝改服大祥服二十五日大祥外朝以日易月之制行奠祭禮如前祭儀是日皇帝改服禫服二十七日禫除奠祭如前祭儀是日皇帝釋禫服百日皇帝不御殿扵几筵前行燒香禮如宫中之儀行在禁屠宰三日係前後各一日諸路庶民禁樂并屠宰一日宰臣率百官入臨奉慰紹興二十九年十二月五日禮部太常寺言檢照元豐二年慈聖光獻皇后上仙太常禮院言按禮葬而後虞虞而後􅌰哭􅌰哭而後祔景徳中眀徳皇后以百日為􅌰哭盖古之士禮不當施扵朝廷詔改􅌰哭為百日自是以後慈聖光獻皇后及宣仁聖烈皇后遇百日並不該載外禮數皆扵神主祔廟以前行􅌰哭之祭乞令給舎臺諫同禮官參酌取裁詔依告哀外國及外國弔祭淳熙十四年十月十一日太上皇帝大斂是日差將作監韋璞充金國告哀使閤門舎人姜特立副之禮部太常寺言告哀使副并三節人從合服衣帶鞍韀等照應禮例如在大祥内合服布幞頭襴衫布袴腰絰布涼繖鞍韀在禫服内合服素紗軟脚幞頭黲色公服黒鞓犀帶青繖皂鞍韀俟禫服除即從吉服仍只繫黒帶去魚涼繖韀並從禫制仍去狨坐三節人衣紫衫黒帶並不聽樂不射弓弩候過界聽使副審度随宜改易服用從之或遺信物使用上服外國弔祭禮真宗之喪契丹遣殿前都㸃檢崇義軍節度使耶律三隠翰林學士工部侍郎知制誥馬貽謀充大行皇帝祭奠使副左林牙右金吾衛上將軍蕭日新利州觀察使馮延休充皇太后弔慰使副右金吾衛上將軍耶律寧引進使姚居信充皇帝弔慰使副所司豫扵滋福殿設大行皇帝神御座又扵稍東設御座祭奠弔慰使副各素服由西上閤門入陳禮物扵庭中書門下樞密院並立扵殿下再拜訖升殿分東西立禮直官閤門舎人賛引耶律三隠等詣神御座前階下俟殿上簾捲使副等並舉哭殿上皆哭再拜訖引升殿西階詣神御座前上香奠茶酒貽謀跪讀祭文畢降階復位又舉哭再拜訖稍東立俟皇太后升座中書樞密院起居畢簾外侍立舎人引慰弔祭奠使副朝見殿上舉哭左右皆哭弔慰使副蕭日新等升殿進書訖降座俟皇帝升座中書樞密院起居畢升殿侍立舍人引弔慰祭奠使副朝見皇帝舉哭左右皆哭弔慰使副耶律寧等升殿進書訖賜三隠等襲衣冠帶噐幣鞍馬随行舎利牙校等衣服銀帶噐幣有差弔慰使副蕭日新等復詣承眀殿俟皇太后升座中書樞密院侍立如儀舍人引蕭日新等升殿進問聖候書畢賜銀噐衣著有差仍就客省賜三隠等茶酒又令樞密副使張士遜别會三隠等伴宴扵都亭驛中興後金國弔祭使行祭奠禮儀注前期儀鑾司扵几筵殿東廊設御幄并殿上設神御座香案香茶酒果祭食盆臺等皇帝先詣梓宫前行燒香之禮如宫中之儀出宫御素幄簾降其合赴起居侍立等官並如儀内侍官捧祭文奠書案入扵殿階下使副拜褥之右禮直官舎人通事引使副讀祭文官入殿門殿上簾捲皇帝扵幄内舉哭殿上下官皆舉哭使副讀祭文就褥位北向立俱再拜内侍官捧祭文奠書案升西階詣神御座前稍西使副讀祭文官随升殿使副詣殿上北向立讀祭文官在祭文奠書案後立使副哭使詣神御殿前一拜跪三上香奠祭茶三奠酒畢就一拜興復位立内侍捧案詣神御座前讀祭文官詣神御座前一拜跪啟封讀祭文奠書訖就一拜興使副祭文官俱降西階下殿歸位並冄拜皇帝扵幄内舉哭殿上下官皆舉哭使人權退至幄殿下靣幄殿立讀祭文官扵使副後褥位直身立次舍人通事引使副升殿讀祭文官依舊立受書𫝊語訖降階與讀祭文官合一班立定更不宣班再拜舍人班前代奏萬福使出班奉慰舎人班前代奏歸班再拜喝賜跪受再拜引出次引三節入四拜起居通事班前代奏萬福喝賜跪受並如上儀淳熙十五年二月宰執進呈禮官閤門國信所定弔慰使副徳夀宫宰執以下皆用常服周必大奏昨顯仁時北使副至已是祔廟故用常服今大行太上皇帝在殯且别宫無嫌陛下方縗絰受弔臣等亦難冠裳侍立况啟殯發引服如初喪固未除也上曰宰執侍從當如大祥服四脚幞頭縗絰去杖正得中矣按厯代國恤儀制惟東漢史稍詳至唐而為李義府許敬宗軰所削盡亡其禮故唐史無可考者宋九朝史及會要所載雖詳而儀注亦多未備今姑􅎥其可考者録扵此自請諡以下至及虞祔廟則見山陵門文獻通考卷一百二十二
