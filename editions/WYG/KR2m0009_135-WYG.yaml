body:
  text: 文獻通考卷一百三十五鄱陽馬端臨貴與著樂考八石之屬雅部陳氏樂書曰石之為物堅實而不動其卦則乾其時則秋冬之交其方則西北之維其風不周其聲尚角其音則辨立冬之氣也先王作樂擊之以為磬之屬焉盖金石之樂其聲未嘗不相應荘子曰金石有聲不考不鳴國語曰金石以動之唐李真以車鐸而得徴音之石則其相應可知三代之樂既壊於秦漢漢至成帝尚未有金石之樂及晉武破苻堅之後而四廂金石始備焉後世復以泗濱石其聲下而不和而以華原所出者易之信乎審一以定和難哉磬周禮冬官磬氏為磬倨句一矩有半必先度一矩為句一矩為股而求其弦既而以一矩有半觸其弦則磬之倨句也磬之制有大小此􅖍矩以定倨句非用其度耳倨音據句沈音鉤註同矩如字先度待洛反其博為一博謂股博也廣也股為二鼓為三參分其股博去一以為鼓博参分其鼓博以其一為之厚鄭司農云股磬之上大者鼓其下小者所當擊者也康成謂股外面鼓内面也􅖍令磬股廣四寸半者股長九寸也鼓廣三寸長尺三寸半者厚一寸也已上則摩其旁鄭司農云磬聲大上則摩鑢其旁康成謂大上聲清也薄而廣則濁已上時掌反註同大音泰摩他賀反下同鑢音慮已下則摩其耑大下聲濁也短而厚則清耑音端劉又音穿夲或作端宋明道製新樂特磬十二黄鍾大呂股長二尺博一尺鼓三尺博六寸九分寸之六弦三尺七寸五分太蔟以下股長尺八寸博九寸鼓二尺七寸博六寸弦三尺三寸七分半其聲各中夲律黄鍾厚二寸一分大呂以下第加其厚至應鍾厚三寸五分詔以其圖送中書議者以為磬氏為磬倨句一矩有半博為一股為二鼓為三参分其股博去其一以為鼓博参分其鼓博以其一為之厚今磬無薄厚無長短非也元祜初范鎮上樂議曰臣所造編磬皆以周官磬氏為法若黄鍾股之博四寸五分股九寸鼓一尺三寸五分鼓之博三寸而其厚一寸其弦一尺三寸五分十二磬各以其律之長而三分損益之如此其率也今之十二磬長短厚薄皆不以律而欲求其聲不亦逺乎鐘有齊也磬石也天成之物也以其律為之長短厚薄而其聲和此出於自然而聖人者能知之取以為法後世其可不考正乎考正而非是則不為法矣特磬則四倍其法而為之國朝祀天地宗廟及大朝會宫架内止設鏄鐘惟后廟乃用特磬非也今已升祔后廟特磬遂為無用之樂臣欲乞凡宫架内於鎛鐘後各加特磬貴乎金石之聲小大相應陳氏樂書曰古之為磬尚象以制器豈貴夫石哉尚聲以盡意而已鍾圎中規磬方中矩則倨句一矩有半觸其弦也其博為一股博一律也股為二後長二律也鼓為三前長三律也股非所擊也短而博鼓其所擊也長而狭鄭司農云股磬之上大者鼓其下小者康成云股外面鼓内面則擊者為前而在内不擊者為後而在外内者在下外者在上其大小長短雖殊而其厚均也黄鍾之磬股鼓皆厚二寸則餘磬可推矣史傳論造磬者多矣或謂黄帝使伶倫為之或謂堯使母勾氏為之或謂叔為之以明堂位考之叔之離磬則特縣之磬然則非特縣之磬未必非母勾氏伶倫所造也曲禮言立則磬折垂佩考工記言磬折以三五則磬取屈折之義也先儒謂磬之為言勁也豈因屈折然邪又曰小華之山其隂多磬鳥危之山其陽多磬髙山涇水出焉其中多磬則磬石所自固雖不一要之一適隂陽之和者泗濵所貢浮磬而已盖取其土少而水多其聲和且潤也然其制造之法倨句一矩有半外之為股内之為鼓其薄厚莫不有數存於其間已上則摩其旁而失之太清已下則摩其端而失之太濁要之一適清濁之中者薄以廣且厚而已有虞氏命䕫典樂擊石拊石至於百獸率舞庶尹允諧者由此其夲也盖八卦以乾為君八音以磬為主故磬之為器其音石其卦乾乾位西北而夭屈之以為無有曲折之形焉所以立辨也故方有西有北時有秋有冬物有金有玉分有貴有賤位有上有下而親踈長幼之理皆辨於此矣古人論磬嘗謂有貴賤焉有親踈焉有長幼焉三者行然後王道得王道得然後萬物成天下樂之故在廟朝聞之君臣莫不和敬在閨門聞之父子莫不和親在族黨聞之長㓜莫不和順夫以一器之成而功化之敏如此則磬之所尚豈在夫石㢤存乎聲而已然擊石拊石堂上之樂也百獸率舞堂下之治也堂上之樂足以兼堂下之治堂下之樂不足以兼堂上之治故昔王阜為重泉令擊磬而鸞舞則䕫之擊磬而獸舞豈無是理㢤唐天寳中廢泗濱磬而以華原石代之卒致祿山之禍元白賦詩以譏之誠有意於去鄭存雅矣自時而後有取華陽響石為七縣焉豈亦得泗濱浮磬之遺乎徐景安謂浮磬擊有五音以七音言之非也秦刻嶧山以頌徳曰刻此樂石盖嶧山近泗水故也玉磬天球陳氏樂書曰春秋之時齊侯以玉磬賂晉師止兵臧文仲以玉磬如齊告糴禮記郊特牲言諸侯宫架而擊玉磬眀堂位言四代樂器而拊搏玉磬則玉之於石類也玉磬則出乎其類矣書言天球在東序詩言受小球大球盖物之羙者莫如玉而球又玉之羙出於自然者也先王樂天以保天下因天球以為磬以其為堂上首樂之器其聲清徹有隆而無殺衆聲所求而依之者也商頌曰依我磬聲夲諸此歟吕氏春秋言堯命䕫鳴球以象上帝玉磬之音傳言金石有聲不考不鳴禮言玉之清越以長樂也由是觀之鳴球之樂雖出於所考要之其聲清越以長無量於羽屬鱗屬之鳴也梓人為筍簴取羽屬清揚而逺聞者以為磬簴故擊其所縣而由是簴鳴取鱗屬以為筍且其匪色必似鳴矣然則謂之鳴球非若瀛州青石之磬不擊而自鳴也其鳴也因䕫而已漢武帝建招仙靈閣於甘泉西上有浮金輕玉之磬非古制也其武帝之侈心乎晉賀循奏登歌之簴采玉以造磬隋蘓䕫妙達音律造玉磬獻於齊唐制宗廟殿庭用玉磬則玉磬堂上之樂登歌用焉書言搏拊琴瑟以詠而以鳴球為先義可見矣通禮義纂曰晉賀循修奏登歌之簴采玉造小磬宗廟殿用玉郊丘用石夲去堂上樂以歌故名歌鐘磬唐制設歌磬於壇上之西歌鐘於東近南北向至匏竹立於壇下國語曰籧篨蒙璆漢樂章曰軒朱璆磬盖璆與球同而字異其實一也洽聞記曰隋文帝開皇十四年於翟泉獲玉磬十四垂之於庭有二神人撃之其聲絶妙國史纂異曰潤州得十二玉磬以獻張率䖍叩其一曰晉某嵗所造開天傳信記曰太真妃最善擊磬搏拊之音明皇令采藍田綠玉為磬尚方造簨簴流蘓之屬皆令鈿珠翠珍怪之物襍餙之又鑄二金獅子以為趺其他綵繪縟麗製作精妙一時無比也由是觀之玉磬十二古之制也益之為十四後世倍七音之失也至於飾以金珠珍怪趺以金獅騰攫其唐明皇之侈心乎不為有道之主所取也編磬離磬毊陳氏樂書曰磬之為器昔人謂之樂石立秋之音夷則之氣也盖其用編之則襍而小離之則特而大叔之離磬則専簴之特磬非十二器之編磬也古之為鐘以十有二聲為之齊量其為磬非有齊量也因玉石自然以十有二律為之數度而已爾雅大磬謂之毊徒鼓磬謂之寋周官磬師掌敎擊磬擊編鐘言編鐘於磬師則知有編磬矣爾雅言大以見小磬師言鐘以見磬大則特縣小則編縣儀禮鼗倚於頌磬西紘則所謂紘者其編磬之繩歟小胥凡縣鐘磬半為堵全為肆鄭康成釋之謂編縣之十六枚同在一簴謂之堵鐘磬各一堵謂之肆禮圗取其倍八音之數而因之是不知鐘磬特八音之二者爾謂之取其數可乎典同凡為樂器以十有二律為之數度以十有二聲為之齊量則編鐘編磬不過十二爾謂之十六可乎嘗讀漢書成帝時於犍為水濱得石磬十六未必非成帝之前工師附益四清而為之非古制也康成之說得非因此而遂誤歟古有大架二十四枚同一簨簴通十二律正倍之聲亦庶乎古也郭璞曰毊音囂以玉飾之宋朝元豐中施用李照編鐘阮逸編磬仍下王朴樂二律以冩中和之聲可謂近古矣然補注四聲以足十六律非先王之制也笙磬頌磬歌磬陳氏樂書大射之儀樂之宿縣於阼階東笙磬西面西階之西頌磬東面盖應笙之磬謂之笙磬應歌之磬謂之頌磬笙磬位乎阼階之東而面西以笙出於東方震音象萬物之生也頌磬位乎西階之西而面東以頌出於歌聲而聲出於面言之方也鄉飲酒之禮笙入堂下磬南北面立鄉射之禮笙入立於縣中西面盖笙磬在東而面西頌磬在西而面東笙入立於縣中之南而面北故頌磬歌於西是南鄉北鄉以西方為上所以貴人聲也笙磬吹於東是以東方為下所以賤匏竹也大射鼗倚於頌磬西紘頌磬在西而有紘是編磬在西而以頌磬名之特磬在東而以笙磬名之周官眡瞭掌凡樂事播鼗擊頌磬掌太師之縣則頌磬編磬也笙磬特磬也縣則又兼編與特言之然言笙磬繼之以鐘鎛應笙之鐘鎛也笙師共笙鐘之樂是以言頌磬繼之以鐘鎛應歌之鐘鎛也左傳歌鐘二肆是已詩言笙磬同音書言笙鏞以間大鐘謂之鏞則笙鏞特縣之鐘也以笙鏞為特縣之鐘則笙磬為特縣之磬眀矣盖笙震音磬乾音其音皆陽鏞兑音其音則隂是笙磬異器而同音笙鏞異音而同和然則特磬特鐘編鐘編磬皆各堵而同肆鎛則随之而已大夫判縣天子倍之而為宮士去天子之三而為特諸侯倍士之二為軒名位不同樂亦異數故也唐之歌磬編縣十六同一簨簴合二八之聲郊祀設於壇上宗廟設於堂上皆次歌鐘之西節登歌之句非不合周之頌磬也然不知編縣十六同一簨簴鄭康成之說非先王之制也寋徒鼓鐘謂之修徒擊磬謂之寋唐禮書先蠶降神宫縣之樂不用鎛鐘以十二大磬代之與房中之樂同設非先王之制也石之屬胡部編磬十六枚唐西􅈵部之樂非特有編鐘亦有編磬段安節樂府雜錄論之詳矣以西涼方響推之一架用十六枚則其編鐘編磬亦不過十六耳石之屬俗部編磬上毎簴二十四枚中毎簴十六枚下毎簴十四枚編磬二十八之說始於漢之鄭康成非古制也大架所用二十四枚應十二律倍聲唐李冲所傳也小架所用十四枚通黄鍾一均上倍之大周正樂所出也二八之制其失自乎四清二七之制其失自乎二變上不失之四清下不失之二變其為李冲所傅者乎樂苑曰堂上磬十四枚下七枚具黄鍾一均聲上七枚倍也非徒不知去二變以協律亦不知堂上特設黄鍾一以上拊之制也石鼓傳稱八方之荒有石鼓焉蒙之以皮其音如雷零陵有鳴石二其状似鼓亦謂之石鼓磬之類也晉時吳郡臨平有石鼓出焉考之無聲張華謂武帝曰可取蜀中桐材刻作魚形扣之卒如其言聲聞數里郭縁生述征記曰逢山祠有石人石鼓臨海記曰白鶴山有石鼓如金石之響後秦記曰天水冀地石鼓鳴野羣雉皆雊齊地記曰城東祠山有石鼓将有㓂難則鳴所以豫警備也吳興記曰長城有夏架山石鼓盤石為足聲如金鼓鳴則三吴有兵矣郡國志吳王離宫在石鼓山南有石鼓要之皆感應異器鼓鳴即兵起非樂器之常也玉鼓春秋孔演圖有人金卯興於豐擊玉鼓駕六龍然則鼓盖有以玉為之者矣石鐘武昌記鐘䑓山有一石鐘或時鳴響逺邇聞之故名鐘臺裴子野宋畧曰永嘉元年鐘山洪水有鐘自山流出時人因以名之玉律黄帝作律以玉為管長尺六孔為十二音晉武帝時汲冢亦獲玉律故古法物有七品而姑洗中呂玉律居二焉尚書中候曰用玉為律以候之東漢以玉律十二候氣於殿中以竹律六十侯氣於靈臺以十二律侯氣先王之法也以六十律侯之豈因京房之陋歟王子年拾遺亦謂延吹玉律而天神俱降其言迂誕玉琯黄帝之時西王母獻昭華玉琯然則下管盖有以玉為之者矣玉笙漢奚景及說文曰舜祠下得笙白玉管則古人盖有以玉為笙紫玉簫白玉簫唐咸寧中張毅冢中得紫玉簫古有紫玉簫曲是也明皇天寳中安祿山自范陽入覲獻白玉簫管數百陳於棃園則玉簫之器盖不始於古矣玉琴吳均續齊諧記述王彦伯善鼓琴嘗至吳郵亭維舟中渚秉燭理琴見一女子坐東床取琴調之似琴而非聲甚哀雅類今之登歌乃椘明光曲也唯嵇叔夜能為此聲彦伯請受之女更為彈遅眀女取錦繡䓁物贈别彦伯以玉琴答之而去則古人固有以玉為琴者矣玉笛梁州記咸寕中有盗竊發張駿冢得白玉笛唐天寳中明皇命紅桃歌貴妃梁州曲親御玉笛為之倚曲則玉之為樂器非特可為笙簫亦可為笛矣今士夫之家往往有之開天傳信記載唐明皇嘗坐朝時以手指上下按其腹朝退髙力士進奏曰陛下向来數以手指按其腹豈非聖體小不安邪眀皇曰非也吾昨夜夣逰月宫諸仙娱余以上清之樂流亮清越殆非人所聞也酣醉乆之合奏諸樂以送吾歸其曲凄椘動人杳杳故耳吾以玉笛尋之盡得之矣坐朝之際慮物遺亡故懐玉笛時手指上下尋之非不安也力士再拜賀曰非常之事也願陛下為臣一奏之因為之奏其音寥寥然不可名也力士又再拜且請其名明皇笑曰此曲名紫雲廻遂載於樂章今太常刻石在焉瑶簴如衣架詞曰簫鐘兮瑶簴然則瑶玉以為鐘簴希代之器非可為後世法也玉方響杜陽編述唐文宗時有宫娥沈阿翹夲吳元濟之妓嘗自進元濟所與一白玉方響光眀潔冷可照數十歩以犀為槌以雲檀香為架芬馥襲人彌月不散制度精妙希世之寳也神鉦其状如鼓郡國志洞庭山有宫五門東有石樓樓下兩石鼓扣之其聲清越世所謂神鉦也晉孝武樂章曰神鉦一震九域同来石角三國典畧曰初魏世山摧得三石角藏之武庫至是齊主入庫賜從臣兵器特以此角賜平秦王歸彦曰余事常山不得反事長廣得反反事時将此角嚇漢也土之屬雅部陳氏樂書曰土則埏埴以成器而冲氣出焉其卦則坤其方則西南之維其時則秋夏之交其風則涼其聲尚宫其音則濁立秋之氣也先王作樂用之以為塤之屬焉盖塤箎之樂未嘗不相應詩曰伯氏吹塤仲氏吹箎又曰如塤如箎樂記以塤箎為徳音之音周官笙師并掌而教之則其聲相應信矣土鼓陳氏樂書曰禮運曰夫禮之初始諸飲食其燔黍押豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神明堂位曰土鼓蕢桴伊耆氏之樂也盖樂以中聲為夲土也者於位為中央於氣為冲氣則以土為鼓以土蕢為桴所以達中聲者也伊耆氏之樂所尚者土鼓則中聲作焉所擊者蕢桴則中聲發焉禮之初始諸燔黍押豚以為食汙尊抔飲以為飲然則蕢桴土鼓有不為樂之初乎周官籥章凡逆暑於中春迎寒於中秋祈年於田祖祭蜡以息老物一於擊土鼓而已有報夲反始之義焉夫豈以聲音節奏之末節為㢤此所以猶若可以致其敬於鬼神也然土鼓之制窪土而為之故禮運之言土鼓在乎未合土之前與壺涿氏炮土之鼓異矣杜子春謂以瓦為陶以革為面不稽禮運之過也瓦鼓周官壺涿氏除水蟲以炮之鼓鄭康成以為瓦鼓也古缶形如足盆或曰形如覆盆以四杖擊之土音缶立秋之音也古者盎謂之缶則缶之為器中虚而善容外圎而善應中聲之所自出者也唐堯之時有擊壌而歌者因使􅬣以糜􅛘㝠缶而鼓之是以易之盈缶見於比用缶見於坎鼓缶而歌見於離詩之擊缶見於宛邱是缶之為樂自唐至周所不易也昔秦趙會於澠池趙王為秦王擊缶亦因是已孰謂始於西戎乎先儒之說一何踈邪徐幹曰聽黄鍾之音知擊缶之細則缶之樂特其器之細者歟大塤古塤小塤陳氏樂書曰周官之於塤教於小師播於瞽矇吹於笙師以塤為徳音見於禮如塤如箎見於詩則塤之為器立秋之音也平底六孔水之數也中虚上鋭如秤錘然火之形也塤以水火相合而後成器亦以水火相和而後成聲故大者聲合黄鍾大呂小者聲合太簇夹鍾要在中聲之和而已風俗通謂圍五寸半長一寸半有四孔其二通凡六空也盖取諸此爾雅大塤謂之嘂以其六孔交鳴而喧嘩故也譙周曰幽王之時暴公善塤世夲曰暴公作塤盖塤之作其来尚矣謂之暴公善塤可也謂之作塤臣未之敢信矣塤又作壎者金方而土圎水平而火銳一從熏火也其徹為黒則水而已從圎則土之形圓故也或謂塤青之氣陽氣始起萬物暄動據水土而萌始於十一月成於立春象萬物萌出於土中是主土王四季所言非主正位六月而亦一說也塤六孔上一前三後二王子年拾遺記曰春皇庖犧氏灼土為塤禮樂於是興矣雅塤頌塤古有雅塤如雁子頌塤如雞子其聲髙濁合乎雅頌故也今太常舊器無頌塤至皇祐中聖制頌塤調習聲韻並合鍾律前下一穴為太簇上二穴右為姑洗啓下一穴為仲呂左䨇啟為林鍾後二穴一啟為南呂䨇啟為應鍾合聲為黄鍾頌塤雅塤對而吹之尤協律清和可謂善矣誠去二變而合六律庶乎先王之樂也土之屬胡部胡缶古者西戎用缶以為樂党項因亦擊缶焉然則缶夲中國樂器竊意夷人竊而用之也李斯曰擊甕扣缶真秦之聲豈以秦人盡有西戎之地而為此聲故邪土之屬俗部七孔塤一三五為九二四為六九者陽數之窮六者隂數之中古塤六孔用其方色所以應六律出中聲也今太樂舊塤七孔上下皆圎而髹之以應七音而已非先王雅樂之制也明道時禮官言大樂塤舊以漆餙勅令黄其色以夲土音云八缶如水盞凡八置之槕上唐永泰初司馬滔進廣平樂盖有八缶具黄鍾一均聲八孔塤景祐馮元樂記今太樂塤八孔上一前五後二髹飾其上釋名曰塤之為言喧也謂聲濁喧喧然主塤言之又曰塤曛也主壎言之故說文曰壎為樂器亦作塤其實一也水盞九近世民間用九甌盛水擊之謂之水盞合五聲四清之音其制盖始於李琬特世俗之樂非雅調也拊瓶扣甕擊甌以十二磁甌為一棹唐武宗大中初天興縣丞郭道源􅂑邢甌越甌十二酌水作調以筯擊之其音妙於方響咸通中吳蠙亦精於此劉安曰窮鄉之社扣甕拊瓶相和而歌以為樂豈亦擊甌類歟墨子農夫息於吟缶之樂亦此類擊壤壤之為器以木為之形如覆節長一寸餘前廣後銳童子之樂也與堯時擊壌而歌者異矣鼓盆覆缶古之缶制形如覆盆缶類也荘周鼓盆而歌以眀哀樂不入於胷次齊景公飲酒去冠披裳而鼓盆晏子責之土鞚唐歴代樂儀論俗樂之器土則附革而為鞚也呂不韋曰堯使􅬣以糜􅛘㝠缶而鼓之然則土鞚豈亦糜􅛘㝠缶之類歟腰鼓腰鼓之制大者瓦小者木皆廣首纎腹沈約宋書蕭思話好打細腰鼓豈謂此歟瓦琵琶晉阮咸善彈琵琶後有發咸冡者得琵琶以瓦為之時人多不識之以琴合調大扺異器而同音也文獻通考卷一百三十五
