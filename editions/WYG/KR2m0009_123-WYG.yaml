body:
  text: 文獻通考卷一百二十三鄱陽馬端臨貴與著王禮考十八山陵葬禮上陵太皥葬宛丘在陳州女媧葬趙城縣東南在晉州炎帝葬長沙在潭州黄帝葬橋山地理志橋山在上郡同陽縣山有黄帝冢括地志黄帝陵在寧州羅川縣東八十里子午山隋改為罷川宋坊州顓頊葬臨河縣皇覽曰顓頊冢在東郡濮陽頓丘城門外廣陽里中山海經曰顓頊葬鮒魚山之陽九嬪葬其隂也宋澶州髙辛葬濮陽頓丘城南皇覽曰髙辛冢在東郡濮陽頓丘城南臺隂野中宋澶州唐堯葬城陽榖林皇覽曰堯冢在濟陽城宋劉向曰堯葬濟隂丘壠山鄆州虞舜葬九疑山皇覽曰舜冢在零陵營浦縣其山九谿皆相似謂之九疑𫝊曰舜葬蒼梧象為之耕或曰二妃葬衡山宋永州夏禹葬會稽史記禹會諸侯江南計功而崩因葬焉命曰會稽皇覽曰在山隂縣會稽山上虞縣七里山越傳曰禹到大越上苖山會計爵德封功因更名苖曰會稽因病死葬葦棺穿壙深七尺上無瀉泄下無邸水壇髙三尺土堦三等周方一畝稽吕氏春秋曰禹葬會稽不煩人徒墨子曰禹葬會衣裘三領桐棺三寸田地理志云山上有禹井禹祠相傳以為下有羣鳥耘也索隱曰葦棺者以葦為棺謂籧篨而歛非也禹雖儉約豈萬乗之主而臣子乃以籧篨褁尸乎墨子言桐棺三寸差近人情括地志禹陵在越州會稽縣南十三里廟在縣東十一里殷湯葬汾陰皇覽曰湯冢在方陰亳縣北東郭吉州三里冢四方各十歩髙七尺上平處平地宋河中府自太皥至殷湯十冢宋太祖乾德四年詔各給守陵五户蠲其他役仍令長吏春秋奉祀太戊葬大名内黄縣東南武丁葬陳州西華縣北太戊武丁二墓宋乾德四年詔給陵三户歲一享周文王葬京兆咸陽縣括地志文王墓在雍州萬平縣西南二十八里原上武王葬京兆咸陽縣皇覽曰文王武王周公冢皆在京兆長安鎬聚東社中宋乾德四年二冢給陵户祠祭如太昊成王葬京兆咸陽縣康王葬京兆咸陽縣成王康王二冢宋乾德四年詔給守陵三户歲一享桓王葬河南澠池縣東北靈王葬河南城西南桓亭西周山上景王葬河南洛陽縣太倉中威烈王葬河南洛陽城中西北隅以上四墓宋乾德四年詔州縣常禁樵採周官小宗伯及執事眡葬獻器遂哭之卜葬兆甫竁亦如之竁昌絹反李依杜昌銳反鄭音穿葬兆墓塋域甫始也鄭讀竁為穿杜讀竁為毳謂穿壙也疏曰亦如上獻明器哭之但明器材哭於殯門外此卜葬地在壙所則哭亦與在殯所哭之相似故云亦如之春官冢人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右公君也圖謂畫其地形及丘壠所處而藏之先王造塋者昭居左穆居右夾處東西如疏曰預圖其丘壠之處後須葬者依圖置之造塋者文王都豐而葬於畢即是造塋也文王當居中武王以次居昭穆之位至平王東遷葬於洛則又為造塋者葬居其中而子孫以次居昭穆兄死弟及則以兄弟為昭穆與置廟同也凡諸侯居左右以前卿大夫士居後各以其族子孫各就其所出王以尊卑處其前後而亦併昭穆凡死於兵者不入兆戰敗無勇投諸塋外以罰之凡有功者居前居王墓之前處昭穆之中央以爵等為丘封之度與其樹數别尊卑也王公曰邱諸臣曰封漢律曰列侯墳髙四丈關内侯以下至庶人各有差之疏曰尊者丘髙而樹多卑者封下而樹少爾雅曰土髙者丘是自然髙者聚土曰封是人力為之故以之分尊卑引漢律以况周制大喪既有日請度甫竁遂為之尸甫始也請量度所始竁之處地為尸者成葬為祭墓之尸也鄭司農云既有日有葬日也始竁時祭以告后土冢人為之尸宰疏曰大喪謂王喪謂甫竁者謂冢人請於冢量度始穿地之處及竁以度為丘隧隧羡道也度丘與羡道廣袤所至窆器下棺豐碑之屬喪大記凡封用綍去碑負引君封以衡大夫以咸之疏曰上經已甫竁此經復云及竁者此更本初欲竁時先量度作邱作隧道之處廣狹長短故文重耳天子有隧諸侯已下有羡道隧道則上有負土若鄭莊公與母掘地而相見也羡道無負土鄭舉羡為况耳葬於北方北首疏曰言葬於國地及北首者鬼神尚幽闇徃詣幽㝠故也殯時仍南首者孝子若猶其生不忍以神待之龜人若有祭事則奉龜以徃喪亦如之疏曰喪謂卜葬宅及日皆亦奉龜徃卜處也大卜凡喪事命龜重喪禮次大祭祀也士喪禮則筮宅卜日天子卜葬兆云疏曰天子卜葬日與上同其宅亦卜之與士異孝經卜其宅兆亦據大夫以上若士則筮宅也右卜宅虞人致百祀之木可以為棺槨者斬之不至者廢其祀刎其人刎勿粉反徐亡粉反疏虞人掌山澤之官百祀畿内百縣之祀也曰謂王殯後事也百祀者王畿内諸臣采地之祀言百者舉其全數也既殯旬而布材故虞人斬百祀之木可以為周棺之槨者送之也必取祀木者賀㻛云君者德著幽顯若存則人神均其慶沒則靈祇等其哀傷也檀弓柏槨以端長六尺以端題湊也其方蓋一尺侯疏曰柏槨者謂為椁用柏也天子柏諸松大夫士皆雜木也鄭註方相職云天子椁柏黄腸為裏而表以石焉以端者端猶頭也積柏材作椁並葺材頭也故云以端長六尺者天子椁材每叚長六尺而方一尺註云以端者此木之端首題湊嚮内知其方蓋一尺以庶人四寸之棺五寸之槨槨厚於棺一寸按喪大記君大棺八寸君謂諸侯則天子之大棺或當九寸其槨厚一尺故云其方蓋一尺則槨之厚也如鄭此言槨材並皆從下壘至上始為題湊湊嚮也言木頭相嚮而作四阿也如此乃得槨之厚薄與棺相凖皇氏以為壘槨材從下即題湊槨六尺與槨全不相應又鄭何云其方一尺皇氏之義非也棺槨之間君容柷大夫容壺士容甒柷昌六反物間可以藏因以為節天疏曰君容柷者柷如漆筩是諸侯棺槨間所容也若子棺槨間則差寛大故司几筵云柏席用萑元謂柏椁字磨滅之餘椁席藏中神座之席是也諸侯棺槨間亦容席故司几筵云柏席諸侯則紛純稍狹於天子故此云容柷大夫容壺者壺是漏水之器大夫所掌甒盛酒之器士所用也君裏槨虞筐大夫不裏槨士不虞筐裏槨之物虞筐之文未聞也右井槨小宗伯王崩及執事眡葬獻器遂哭之執事蓋梓匠之屬至將葬獻明器之材又獻素獻成皆於殯門外王不親哭有官代之疏曰檀弓云既殯旬而布材與明器云執事眡葬獻謂獻明器之時小宗伯哭此明器哀其生死異也將葬獻明器之材者見士喪禮云獻材於殯門外西靣北上綪主人徧視之如哭槨獻素獻成亦如之註云形法定為素斾治畢為成是其事也云王不親哭有官代之者夫士喪禮主人親哭以其無官今王不親哭以其有官有官即小宗伯哭之是也後陳明器一條並此條通用當互考右獻明器世婦掌喪紀之事帥女宫而濯摡為齍盛摡古愛反摡拭也為猶差擇喪拭音式清也及疏曰喪紀謂大朝廟設祖奠大遣奠時也内豎若有喪紀之事則為内人蹕内人從世婦於廟者内豎為六宫蹕者以其掌内小事疏曰此謂喪朝廟為祖奠遣奠時也皆為外人蹕止行人也鄭知内人從世婦者内人卑不專行事明此内人從世婦而濯摡及為粢盛也内豎掌内小事以其蹕止行人既是小事故還内使豎蹕也小歛條内有封人等七官大歛條内有司几筵設几席朝夕奠條内有司服共奠衣服朔月月半奠條内有籩人共薦籩羞籩外饔實鼎俎天子喪斬縗者奠諸侯喪齊縗者奠皆此條所通用此以上兩條祖奠遣奠通用當互考右陳朝祖奠喪祝及辟令啓鄭司農云辟為菆塗槨也令啓謂喪祝主命役人開之也檀弓曰天子之殯也菆塗龍輴加斧如槨上畢塗屋菆疏曰除菆塗棺者天子七月而葬七日殯殯時以槨塗其棺及至葬時故命役人開之右啓閽人喪紀之事設門燎蹕宫門廟門燎地燭也蹕止行者廟在中門之外門疏曰大喪以下朝廟及出葬之時宫中及廟門皆設燎蹕止行人也燎地燭也者燭在地曰燎謂若天子百公五十侯伯子男皆三十所作之狀蓋百根葦皆以布纒之以蜜塗其上若今蠟燭矣對人手執者為手燭故云地燭也又云廟在中門之外者謂若小宗伯云左宗廟是也設燎條内有委人共薪蒸司烜氏共墳燭庭燎君堂上二燭三條並此條所通用當考士師諸侯為賔則帥其屬而蹕於王宫大喪亦如之疏曰大喪在宫中謂朝廟亦在宫中為蹕也内豎王后之喪遷於宫中則前蹕喪遷者將葬朝於廟則疏曰將葬而徃朝七廟亦使内豎在車前蹕止行人也大司宼前王大喪亦如之大喪所前或嗣王疏曰喪是王喪復云前王明是嗣王也言或者或是先后及王世子皆是大喪若先后及世子大喪則王為正也小司宼前王辟鄭司農云小司寇為王道辟除姦人也若今時執金吾下至令尉奉引矣后世子之喪亦如之疏曰謂后世子之喪當朝廟之時王出入亦為王而辟也閭胥凡喪紀之數聚衆庶喪紀大喪之事聚疏曰王家喪紀閭胥為之衆庶以待驅使也大司徒大喪帥六鄉之衆庶屬其六引而治其政令衆庶所致役也鄭司農云六引謂喪車索也六鄉主六引六遂主六紼疏曰王至七月而葬大司徒則檢校挽柩之事云衆庶所致役也者但六鄉七萬五千家唯取一千人致之使為挽柩之役也司農云六鄉主六引則此經是也云六遂主六紼者按遂人職云大喪帥六遂之役而致之掌其政令及葬帥而屬六綍在棺曰紼見繩體行道曰引見用力互文以見義也遂人大喪帥六遂之役而致之及葬帥而屬六綍及窆陳役屬音燭綍音弗墓致役致於司徒給上事及竁也綍舉棺索也葬舉棺者謂載與說時也用綍旁六執之者天子具千人與陳役者主陳列之耳匠師帥監之鄉師以斧涖焉大喪之正棺殯啟朝及引六鄉役之載及窆六遂役之亦即逺相終始也疏曰殯及引皆六鄉役之其墓上事及竁等六遂役之墓上則說載下棺之等竁謂穿壙之等不言在廟載事亦六遂役之不言者畧也必致於司徒者司徒雖主六鄉亦兼掌六遂之役故也云綍舉棺索者在棺則曰綍在道則曰引六遂之役不在道故據在棺而言綍也云陳役者謂下棺之時千人執綍背碑負引須陳列其人故知謂陳列之也按大司徒職云大喪帥六鄉之衆庶屬其六引此遂人云帥六遂之役屬六綍及窆陳役以六鄉近使主殯及啓朝為始在祖廟之中將行載棺於蜃車屬六綍則六遂為終也至於大道言引則還使六鄉為始至壙窆之下棺則還使六遂為終以二處各自為終始故云即逺相終始也小司徒大喪帥邦役治其政教喪役正棺引窆復土之疏曰言正棺者謂若七月而葬朝廟時正棺於廟引謂葬時引柩車自廟至壙窆謂下棺於坎天子六紼四碑背碑挽引而下棺云復土者掘坎之時掘土向外下棺之後反復此土以為丘陵故云復土也鄉師大喪用役則帥其民而至遂治之治謂監督其事之疏曰言大喪用役謂若喪時輓六引之等鄉大夫既主鄉民役用鄉民之時鄉師遂治之監督謂監當督察其事用以上五條柩行通用内遂人小司徒二條并窆通當互考喪祝及朝御匶鄭司農云朝謂將葬朝於祖考廟而後行則喪祝為御柩也檀弓曰喪之朝也順死者之孝心也其哀離其室也故至於祖考之廟而後行殷朝而殯於祖周朝而遂葬故春秋傳曰凡夫人不殯於廟不祔於姑則弗致也晉文公卒將殯於曲沃就宗廟晉宗廟在曲沃故曰曲沃君之宗也疏曰言及朝者及猶至也謂侵夜啟殯昧爽朝廟故云及朝云御柩者發殯宮輴車載至廟其時喪祝執纛居前以御正柩也按趙商問周朝而遂葬則是殯於宫葬乃朝廟按春秋晉文公卒殯於曲沃是為去絳就祖殯與周禮異未通答曰葬乃朝廟當周之正禮也其末世諸侯國何能同也傳合不合當解傳耳不得難經何者既夕將葬遷於祖用軸既夕是周公正經朝廟乃葬故云不得難經孔子發言凡不殯於廟不祔於姑則不致明正禮約殯於廟發凡則是關異代何者孔子作春秋以通三王之禮先鄭引之者欲見春秋之世諸侯殯於廟亦當朝廟乃殯升正柩諸侯執綍五百人四綍皆銜枚司馬報鐸左八人右八人匠人執羽葆御柩升正柩者謂將葬朝於祖正棺於廟也五百人謂一黨之民御柩者居前導正之於疏曰升正柩者謂將葬朝於祖廟柩升廟之西階正兩楹之間其時柩北首故既夕禮云遷於祖用軸升自西階正柩於兩楹間是也執綍之人口皆衘枚止喧囂也司馬夏官主武故執金鐸率衆左右各八人夾柩以號令於衆也以鳥羽注於柄頭如蓋謂之羽葆葆謂蓋也匠人主宫室故執羽葆居柩前御行於道示指揮柩於路為進止之節也然周禮喪祝御柩此云匠人者周禮王禮此諸侯禮也按周禮註六鄉主六引六遂主六綍經云執綍則應舉六遂而言黨者此非辨鄉遂之殊正取五百人是一黨之人數耳喪祝乃奠元謂乃奠朝廟奠之疏曰乃奠者按既夕禮朝廟時重先奠從燭從柩從彼奠乃昨夜夕奠至廟下棺於廟兩楹之間設几宿奠至明徹去宿奠乃設此朝廟之奠於柩西故云乃奠天府凡吉凶之事祖廟之中沃盥執燭吉事四時祭也凶事后王喪朝於祖廟之奠廟疏曰王及后喪七月而葬將葬當朝六廟後乃朝祖祖廟中日昃為祖奠厥明將去為大遣奠皆有沃盥之事遂師大喪共蜃車之役蜃車柩路也柩路載栁四輪廹地而行有似於蜃因取名焉稍人大喪帥蜃車與其役以至掌其政令以聽於司徒蜃車及役遂人共之稍人者野監是以帥而致之既夕禮曰既正柩殯出遂匠納車於階間則天子以至於士柩路皆從遂來疏曰按遂人職云大喪帥六遂六役而致之又云及葬帥而屬六綍又遂師職亦共丘籠及蜃車之役故知遂人共之也云稍人以其監三等采地是野監故得并監六遂蜃車之事也司徒地官卿掌徒庶之政令故稍人帥衆以聽於司徒也此經舉天子既夕下舉士則其中有諸侯卿大夫之喪柩路皆從遂人來可知巾車小喪共匶路疏曰言大喪據王不别言后與世子則此喪中可以兼之柩車即蜃車祥車曠左空神位也祥車葬之乘車也疏曰葬時魂車也車上貴左故僕在右空左以擬神曲禮以上四條柩行通用又至壙條陳車窆條喪不以制此條通用當互考圉人凡賔客喪紀牽馬而入陳喪紀之馬啓後所薦馬亦疏曰謂將葬朝廟時既夕禮薦馬纓三就天子朝廟當在祖廟中陳設明器之時亦遣人薦馬及纓入廟陳之此馬謂擬駕乘車廞馬亦如之廞馬遣車之馬人捧之亦牽而入陳疏曰此遣車則天子九乘載所苞遣奠以入壙皆人捧之云亦牽而入陳者亦於祖廟陳此明器也但遣車及馬各使人别捧故上註云行則解脫之是也柩行通用内廞馬一條陳明器通用士喪有與天子同者三其終夜燎及乘人專道而行乘人謂使人執引也專道人辟之專疏曰言士喪與天子三事同終夜燎一也乘人二也道行三也柩遷之夜須光明故竟夜燎也乘人謂人引車不用馬既夕禮云屬引鄭引古者人引柩専道行謂喪在路不避人也右朝祖奠遣車馬喪祝及祖飾棺乃載祖為行始其序載而後飾間疏曰按既夕禮遂匠納事於階却柩而下棺乃飾棺設帷荒之屬天子之禮亦是先載乃飾棺之其序載而後飾者鄭見經先言飾棺後言乃載於文例故依既夕禮先載而後飾右載縫人掌縫棺飾焉孝子啓見棺猶見親之身既載飾而以行遂以葬若存時居於帷幕而加文繡喪大記曰飾棺君龍帷之屬時疏曰幕人共帷幕鄭註云在旁曰帷在上曰幕是存居於帷幕而云加文繡者生時帷幕無文繡今死恐衆惡其親故加文繡即所引喪大記飾棺是也衣翣柳之材衣於既反飾之所聚必先纒衣其木乃以張飾也柳之言聚諸疏曰翣即方扇是也柳即帷荒是也二者皆有材縫人以采繒衣纒之乃後張飾於其上飾棺君龍帷三池振容黼荒火三列黼三列素錦禇加偽荒纁紐六齊五采五貝黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六飾棺以華道路及壙中不欲衆惡其親也荒蒙也在旁曰帷在上曰荒所以衣柳也士布帷布荒用白布君大夫加文章焉黼荒縁邊為黼文火黻為列於其中耳偽當為帷或作於聲之誤也大夫以上有褚以襯覆棺乃加帷荒於其上紐所以結連帷荒者也池以竹為之如小車笭衣以青布柳象宫室縣池於荒之爪端若承霤然云君大夫以銅為魚縣於池下揄揄翟也青質五色畫之於絞繒而垂之以為振容象水草之動搖竹則又魚上拂池雜記曰大夫不揄絞屬於池下是不振容也士則去魚舉象車蓋㽔縫合雜采為之形如𤓰瓣然綴貝絡其上及旁戴之言値也所以連繫棺束與柳材使相値因而結前後披也漢禮翣以木為筐廣三尺髙二尺四寸方兩角髙衣以白布畫者畫雲氣其餘各如其象柄長五尺車行使人持之而從既窆樹於壙中檀弓曰周人牆置翣是也絞當作緌讀如冠㽔之㽔蓋五采羽注於翣首也疏曰此明葬時尊卑棺飾君龍帷者諸侯柳車邊障以白布為之王侯皆畫為龍象人君之德故云龍帷也池謂織竹為籠衣以青布挂著於柳上荒邊爪端象平生宫室有承霤也天子生有四注屋四面承霤柳亦四池象之諸侯屋亦四注而柳降一池闕於後一故三池也振容者振動也容飾也謂以絞繒為之長丈餘如旛畫旛上為雉縣於池下為容飾車行則旛動故曰振容黼荒者荒蒙也謂柳車上覆謂鼈甲也緣荒邊為白黒斧文故云黼荒火三列者列行也於鼈甲黼文之上荒中央又畫為火三行也火形如半環也黻三列者又畫為兩已相背為三行也素錦白錦也禇屋也於荒下又用白錦以為屋也葬在路象宫室也故雜記云素錦以為屋而行即禇是也加偽荒者帷禇邊牆荒是上蓋禇覆竟而加帷荒於禇外也纁紐六者上蓋與邊牆相雜故又以纁為紐連之相著旁各三凡用六紐也齊五采者謂鼈上當中央形圓如車蓋髙三尺徑二尺餘五采謂人君以五采繪衣也列行相次故云五采也五貝者又連貝為五行交絡齊上也黼翣二黻翣二畫翣二翣形似扇以木為之在路則障車入槨則障柩也凡有六枚二畫為黼二畫為黻二畫為雲氣諸侯六天子八禮器云天子八翣諸侯六大夫四鄭註縫人云漢禮器制度飾棺天子龍火黼黻皆五列又有龍翣二其戴皆加璧也皆戴圭者謂諸侯六翣兩角皆戴圭玉也魚躍拂池者凡池必有魚故此車池縣絞雉又縣銅魚於池下若車行則魚跳躍上拂池也正義曰振容在下是魚在振容間君纁戴六者事異飾棺故更言君也纁戴謂用纁帛繫棺紐著柳骨也戴値也使棺堅値棺横束有三每一束兩邊輙角屈皮為紐三束有六紐今穿纁戴於紐以繫柳骨故有六戴也纁披六者纁謂亦用絳帛為之以一頭繋所連柳纁戴之中而出一頭於帷外人牽之亦有六也謂之披者若車登髙則引前以防軒車適下則引後以防飜車欹左則引右欹右則引左使車不傾覆也天子七月而葬五重八翣天子葬五重者謂抗木與茵也葬者抗木在土茵在下士喪禮下篇陳器曰抗木横三縮二加抗席三加茵用疏布緇翦有幅亦縮二横三此士之禮一重者以此差之上公四重疏曰古者為槨累木於其四邊上下不周致茵於槨下所以藉棺從上下棺之後又置抗木於槨之上所以抗載於土引士喪禮下篇陳器云云者以士禮一重證此經葬五重三重之義也皇氏云下棺之後先加折於壙上以承抗席折猶屐也方鑿連木為之蓋如牀縮者三横者五無簀於上加抗木抗木之上加抗席三此為一重如是者五則為五重茵者藉棺外下褥用淺色緇布為之每將一幅輙合縫為囊將茅莠及香草著其中如今有絮褥也而縮二横三每為一重也抗木上横三下縮二以其在上象天天數竒故上三也下象地地數偶故下二也茵則上直二下横三茵既在下下法地也上數二象地下數三象天以天三合地二人中央也有虞氏之綏夏后氏之綢練殷之崇牙周之璧翣綏亦旌旗之緌也夏綢其杠以練為之旒殷又刻繒為重牙以飾其側亦飾彌多也湯以武受命恒以牙為飾也此旌旗及翣皆喪葬之飾周禮大喪葬巾車執蓋從車持旌御僕持翣旌從遣車翣夾柩路左右前後天子八翣皆戴璧垂羽諸侯六翣皆戴圭大夫四翣士二翣皆戴緌孔子之喪公西赤為志亦用此焉爾雅說旌旗曰素錦綢杠纁白縿素升龍於縿練旒九夏疏曰此明魯有四代喪葬旌旗之飾綏註旄竿頭也則既綢杠以練又以練為旒周人尚文更以他物飾之引周禮大喪葬御僕持翣者明葬有旌旗亦翣之義右飾棺司服大喪共其廞衣服廞陳也廞衣服所藏於槨中而疏曰此則明器之衣服亦沽小者也明自衣服以下並獻器條通用司常大喪建廞車之旌及葬亦如之葬云建之則行廞車解說之之疏曰此謂在廟時陳建之謂以廞旌建於遣車上及葬亦如之此謂入壙亦建之云建之則行廞車既解說之者在廟陳時云建葬時亦惟有在道去之使人各執遣車又當各執廞旌是行廞車解說之也車僕大喪廞革車言興革車則遣車不徒戎路廣闕革輕皆有焉故疏曰經不云戎路革路而云革車亦是五戎之總名知不徒戎路廣闕革輕皆有可知若然王喪遣車九乗除此五乘之外加以金玉象木四者則九乘矣巾車大喪飾遣車遂廞之行之廞興也謂陳駕之行使人次舉之以如墓也遣車一曰鸞車疏曰遣車謂將葬遣送之車入壙者也言飾者還以金象革飾之如生存之車但麤細為之耳註後鄭訓廞為興即言謂陳駕之者解廞為陳駕也按車僕云大喪廞革車彼廞謂作之此文既言飾遣車已是作更言遂廞之故以陳駕解廞也云行之使人以次舉之以如墓也者當在朝廟之時於始祖廟陳之明旦大遣奠之後則使以次抗舉人各執其一以如墓也按冢人云及葬言鸞車象人是名遣車為鸞車司喪大喪廞喪飾皮車皮車遣車之革路故書廞為淫鄭司農云淫喪陳喪也言謂廞興也若詩之興謂象似而作之凡為神之偶衣物必沽而小耳不疏曰後鄭謂廞興也不從先鄭作陳者以檀弓云竹成用瓦不成味琴瑟張而不平竽笙備而不和皆是興象所作明非陳設之禮若詩之興謂象似而作之者象似生時而作但麤惡而小耳校人大喪飾遣車之馬及葬埋之言埋之則是馬塗車之芻靈疏曰檀弓孔子云塗車芻靈自古有之謂為備者不仁古者以泥塗為車芻靈謂以芻草為人馬神靈至周塗車仍存但刻木為人馬替古者芻靈今鄭云塗車之芻靈則是仍用芻靈與檀弓違者鄭但舉古之芻靈况周耳非謂周冢仍用芻靈也條窆條内有冢人鸞車象之此通用當互考圉人凡喪紀廞馬詳見朝祖奠條遣車視牢具言車多少各如所包遣奠牲體之數也然則遣車載所包遣奠而藏之者與遣奠天子太牢包九箇諸侯亦太牢包七箇大夫亦太牢包五箇士少牢包三箇大夫以上乃有遣車之疏曰遣車從葬載牲體之車也牢具遣奠所包牲牢體貴賤各有數也一箇為一具取一車載之也故云視牢具遣車所用無文因此視牢具故云載所包遣奠而藏之者與與者疑辭也云天子太牢包九箇以下者以既夕禮遣奠用少牢以上約之司兵大喪廞五兵廞興作明器之役器五兵也士喪禮下篇有甲胄干笮笮疏曰按既夕禮明器之用器有弓矢役器有甲胄干彼雖不具五兵此既言五兵明五者俱有也故鄭引士喪禮下篇為證司弓矢大喪共明弓矢弓矢明器之用器也士喪禮下篇曰用器弓矢司干大喪廞舞器及葬奉而藏之疏曰此官云干盾及羽籥及其所廞廞干盾而已其羽籥籥師廞之樂師凡喪陳樂器則帥樂官帥樂官徃陳之云疏曰樂師謂笙師鎛師之屬廞樂藏之者也徃陳之謂如既夕禮陳器於祖廟之前庭及壙道東者也大司樂大喪涖廞樂器及葬藏樂器亦如之涖臨也廞興也臨笙師鎛師之屬興謂作之也疏曰鄭知臨笙師鎛師者按笙鎛師皆云喪廞其樂器奉而藏之司干亦云大喪廞舞器此不言之即屬中兼之也此臨藏樂器還臨笙師鎛師等故彼皆云奉而藏之同眡瞭大喪廞樂器疏曰大喪廞樂器謂明器故檀弓云木不成斵瓦不成味竹不成用琴瑟張而不平竽笙備而不和是沽而小耳是臨時乃造之笙師大喪廞樂器及葬奉而藏之廞興也興謂作之奉猶送鎛師大喪廞其樂器奉而藏之疏曰此官所廞謂作晉鼓鼖鼓籥師大喪廞其樂器奉而藏之疏曰此所廞作惟羽籥而已不作餘器典庸器大喪算虡疏曰按檀弓有鐘磬而無算虡鄭註云不縣之彼鄭註見此文有算虡明有而不縣以喪事畧故也右陳明器喪祝及祖飾棺遂御鄭司農云祖謂將葬祖於庭象生時出則祖也祖時喪祝主飾棺遂御之喪祝為柩車御也言謂祖為行始飾棺設栁池紐之屬既飾當還車鄉外喪祝御之御之者執翿居前卻行為節度后疏曰言及祖者及至也初朝禰次朝二祧次朝始祖稷之廟至此廟中設祖祭按既夕禮請祖期曰日側是至祖廟之中而行祖祖始也為行始飾棺訖乃遣車向外移柩車去載處至庭中車西設祖奠云遂御者加飾訖移柩車喪祝執纛却行御正柩故云遂御之小歛條有封人等七官大歛條有司几筵設葦席朝夕奠條内有司服共奠衣服朔月月半奠條内有籩人共薦籩羞籩外饔實鼎俎天子喪斬縗者奠諸侯喪齊縗者奠啓條内有世婦濯溉為齍盛内豎為内人蹕皆祖奠所通用當互考右祖奠大師大喪帥瞽而廞作匶諡廞興也言王之行謂諷誦其治功之詩故書廞為淫鄭司農云淫陳也陳其生時行迹為作諡古疏曰帥瞽矇歌王治功之詩廞作匶諡者匶即柩也字通用以其興喻王治功之詩為柩作諡是以瞽矇職云諷誦詩謂作諡時也瞽矇諷誦詩世奠繫鼓琴瑟元謂諷誦詩主謂廞作柩諡時也諷誦王治功之詩以為諡世之而定其繫謂書於世本也雖不歌猶鼓琴瑟以播其音美之王疏曰諷誦詩謂於王喪將葬之時則使此瞽矇諷誦治功之詩觀其行以作諡葬後當呼之云世奠繫者奠定也謂辨其昭穆以世之序而定其繫繫即帝繫世本是也鼓琴瑟者詩與世本二者雖不歌詠猶鼓琴瑟而合以美之小師大喪與廞從大師師疏云大廞作匶諡故小師從之也大祝作六辭以通上下親疎逺近六曰誄誄謂積累生時徳行以賜之命主為其辭也春秋傳曰孔子卒哀公誄之此皆有文雅辭令難為者也故大祝主作六辭或曰誄論語所謂誄曰禱爾于上下神祇大史大喪遣之日讀誄遣謂祖廟之庭大奠將行時也人之道終於此累其行而讀之大師又帥瞽廞之而作諡瞽史知天道使共其事言王之誄諡成於天道於疏曰人之道終於此者以其未葬已前孝子不忍異生仍以生禮事之至葬送形而徃迎魂而反則以鬼事之故既葬之後當稱諡故誄生時之行而讀之此經誄即累也云大師又帥瞽廞之而作諡者瞽史既知天道又於南郊祭天之所稱天以誄之是王之諡成於天道也若然先於南郊制諡乃遣之日讀之既葬後則稱諡凡喪事考焉為有得失小史大喪佐大史卿大夫之喪賜諡讀誄其讀誄亦以大史賜諡為節事相成疏曰云事相成者諡法依誄為之故也惟周公旦太公望相嗣王發建功於牧野及終將葬乃制諡法遂敘諡法諡者行之迹號者功之表古者有大功則賜之善號以為稱也車服者位之章也是以大行受大名細行受小名行出於己名生於人名是諡號壹民無為曰神以至無為神道設教一德不懈曰簡一不委曲靖民則法曰皇靖定平易不訾曰簡無用訾侮德象天地曰帝同於天地尊賢貴義曰恭尊貴賢人寵貴義士仁義歸徃曰王民徃歸之敬事供上曰恭供奉也立志及衆曰公志無私也尊賢敬讓曰恭敬有德讓有功執應八方曰侯所執行八方應之既過能改曰恭言自知也賞慶刑威曰君能行四者執事堅固曰恭守正不移平正不阿曰君民從之愛民悌長曰恭順長接下揚善賦簡曰聖揚人所善得實所敷得簡執禮御賔曰恭迎待賔也敬祀享禮曰聖既敬於祀能通神道芘親之闕曰恭修德以益之照臨四方曰明以明照之尊賢譲善曰恭不專已善推之於人譖訴不行曰明逆知之故不行威儀悉備曰欽威則可畏儀則可象經緯天地曰文成其道大慮慈民曰定思樹德道德博聞曰文無不知純行不差曰定行一不傷學勤好問曰文不恥下問安民大慮曰定以慮安民慈惠愛民曰文惠以成文安民法古曰定不失舊意愍民惠禮曰文惠而有禮闢土有德曰襄取之以義賜民爵位曰文與同升甲胄有勞曰襄亟征伐綏土柔民曰德安民以居安土以事小心畏忌曰僖思所當忌諫慮不威曰德不以威距諫有伐而還曰釐知難而退剛强直理曰武剛無欲强無撓直正直理忠恕質淵受諫曰僖深故能受威强直德曰武與有德者敬温柔賢善曰懿性能純善克定禍亂曰武以兵徃故能定心能制義曰度制事得宜刑民克服曰成法以正義能使服也聰明叡哲曰獻有過知之聰夸志多窮曰武大志兵行多所窮極智質有聖曰獻有所通而無蔽安民立政曰成政以安定五宗安之曰孝五世之宗淵源流通曰康性無忌慈惠愛親曰孝周愛親族温年好樂曰勤好豐年勤民事協時肇享曰孝協和肇始常如初秉德不囘曰孝順於德而不違安樂撫民曰康無四方之虞令民安樂曰康富而教之執心克壯曰齊能有嚴布德執義曰穆舜典四門穆穆輕輶供就曰齊輶有近輕而供成中情見貌曰穆性心露也甄心動懼曰頃甄精容儀恭美曰昭有儀可象行供可美敏以敬愼曰頃疾於所敬昭德有勞曰昭能勞謙柔德教衆曰靜成衆使安聖善周聞曰宣通於善道聲教宣聞恭已鮮言曰靖恭已正平少言而中治而無眚曰平寛樂令終曰靖性寛樂義以善自終執事有制曰平不在意威德剛武曰圉禦亂患布綱治紀曰平施之政事彌年壽考曰胡久其年由義而濟曰景用義而成保民耆艾曰胡六十耆七十艾耆意大慮曰景耆彊也彊毅果敢曰剛釐於義致志固布義行剛曰景以剛行義追補前過曰剛勸善以補過清白守節曰貞行清白執志固猛以剛果曰威猛則少寛果敢行大慮克就曰貞幹事能成不隱無屏曰貞彊毅執正曰威闢土服逺曰桓以武力征四夷治典不殺曰祈秉常不衰克敬勤民曰桓敬以使之大慮行節曰孝言成其節闢土兼國曰桓兼人故啓土治民克盡曰使克盡思慮能思辨衆曰元别之使各有次好和不爭曰安坐在少斷行義說民曰元民說其義道德純一曰元道大而德一始建國都曰元非善之良何以始之大省兆民曰思大親民而不侈主義行德曰元以義為主外内思索曰思言求善聖善周聞曰宣聞謂所聞善事追悔前過曰思思而能改兵革亟作曰壯以數征為嚴行見中外曰慤表裏如一共圉克服曰壯禁圉敵人能使服之狀古述今曰譽勝敵克亂曰壯勝敵故能克亂昭功寧民曰商商度事宜所以安民死於原野曰壯非嚴何以死難克敎秉政曰夷秉政不任賢屢征殺伐曰壯以嚴整之安民好靜曰夷武而不遂曰壯武功不成執義揚善曰懐稱人之善柔質慈民曰惠賑孤惸加施恵慈人短折曰懐短未六十折未三十愛民好與曰惠與謂施述義不克曰丁欲立志義而弗能成夙夜敬戒曰敬敬身急戒述事不弟曰丁不弟孫夙興恭事曰敬敬以莅事有功安民曰烈以武立功衆方益平曰敬法常而知秉徳尊業曰烈業以通德為而能尊令善典法曰敬非敬何以善之剛克為伐曰翼伐功也剛德克就曰肅成其不敬使為終思慮深逺曰翼好逺思不任亂執心決斷曰肅言嚴果外内貞復曰白正而後約始一不主其國曰聲生於外家不勤成名曰靈任本性不見賢思齊未家短折曰傷未家未娶死而志成曰靈士志不恡命愛民好治曰戴愛養其民天下戴仰死見神能曰靈有鬼不為厲典禮不倦曰戴倦過亂治不損曰靈不能以治損亂短折不成曰傷㓜稚而夭傷好祭鬼神曰靈敬鬼神不致逺隱拂不成曰隱不以隱㧨改其性極知鬼事曰靈其智能聰徹之不顯尸國曰隱以主國見善堅長曰隱美過其令殺戮無辜曰厲官人應實曰知能官人愎狠遂過曰刺去諫曰愎反是曰狠肆行勞祀曰悼放心勞於淫祀言不修德也不思妄愛曰刺忌甚中年蚤夭曰悼年不稱者早孤短折曰哀早未知人事凶年無榖曰荒不務稼穡好變動民曰躁好改舊以勞動民外内縱亂曰荒家不治官不知不悔前過曰戾知而不改好樂怠政曰荒淫於聲樂怠於政事怙威肆行曰醜肆意行威在國遭憂曰愍仍多大喪雍遏不通曰幽權臣擅命政令不逹在國逢難曰愍兵冦之事早孤殞位曰幽殞位即位而卒禍亂方作曰愍動祭亂常曰幽易神之班使民悲傷曰愍妨政敗害柔質受諫曰惠受諫以為惠貞心大度曰匡心正而名察名實不爽曰質名實内外相應不差德正應和曰莫温良好樂曰良言其人可好可樂施勤無私曰惠慈和徧服曰順思慮果敢曰䟆博聞多能曰慮雖多能不至於大道嗇於賜與曰愛滿志多窮曰惑自足者必不足危身奉上曰忠險不辭難思慮不爽曰原不差所思而得克威㨗行曰魏有威而敏行好内違禮曰煬淫於家不奉禮克威順禮曰魏雖威不逆禮好内怠政曰煬内則淫朋外則荒政怠政外交曰携不自明而博外交去禮逺正曰煬敎誨不倦曰長疏逺繼位曰逺肇敏行成曰直彰義揜過曰堅亡治内外賔服曰正華言無實曰夸好廉自克曰節廉儉不傷則不害民逆天虐民曰煬所尊大而逆好更故舊曰易變故改常名與實爽曰繆愛民作刑曰克道之以政齊之以法擇善而從曰比比方善而從之除殘去虐曰湯亂而不損為靈貪亂直亡而神靈之曲也隱哀之方也景武之方也施為文除為武辟地為襄服逺為桓剛克為伐柔克為懿履正為莊無過為僖施而不私為宣雲行雨施日月無私鄉惠無内德為獻無内德謂惠不成也由義而濟為景無志無補則以其明餘皆象也以其明所及為諡象其事也諡法賤不誄貴㓜不誄長禮也誄累也累列生時行迹讀之以作諡諡當由尊者成疏曰凡諡表其實行當由尊者所為若使㓜賤者為之則各欲光揚在上之美有乖實事故不為也唯天子稱天以誄之以其無尊焉春秋公羊說以為讀誄制諡於南郊若云受之於天然者疏曰白虎通云天子崩大臣之於南郊稱天以諡之為人臣子莫不欲褒大其君掩惡揚善故至南郊明不得欺天也死謚周道也疏云殷以上有生號仍為死後之稱更無别諡堯舜禹湯之例是也周則死後别立諡故總云周道也右諡誄大司馬喪祭奉詔馬牲王喪之以馬祭者蓋遣奠也奉猶送也送之至墓告而藏之司尊彛大喪存奠彛存省也謂大遣時奠者朝夕乃徹也疏曰大喪之奠有彛尊盛鬱鬯唯謂祖奠厥明將向壙為大遣時奠有之朝夕乃徹也者按檀弓云朝奠日出夕奠逮日則朝奠至夕徹之夕奠至朝乃徹其大遣亦朝設至夕乃徹言此者欲見所奠彛尊朝夕奠存省之意也春官鬱人大喪及葬共其祼器遂貍之遣奠之彛與瓚也貍之於祖廟階間明奠終於此彛疏曰葬時不見有設奠之事祖祭已前奠小不合有器奠之大者唯有遣奠故知於始祖廟中厥明將葬之時設大遣奠有此祼器也司尊彛云大喪有奠彛是也以奠無尸直陳之於奠處耳言貍之於祖廟階間者此按曾子問無遷主者以幣帛皮圭以為主命行反遂貍之於祖廟兩階之間此大遣奠在始祖廟事訖明亦貍之於階問也自此已前不忍異於生設奠食象生而無尸自此已後葬訖反日中而虞則有尸以神事之謂之祭異於生故云明奠終於此也同上小祝大喪及葬設道齎之奠分禱五祀齎猶送也送道之奠為遣奠也分其牲體以祭五祀告王去此宫中不復及也王七祀祀五者司命大厲平生出入不以告體疏曰按既夕禮祖廟之庭厥明設大遣奠包牲取下是也云分其牲體以祭五祀者謂包牲取下體之外分為五處祭也月令春祀户夏祀竈季夏祀中霤秋祀門冬祀行此並是人所由從之處直非四時合祭出入亦宜告之司命泰厲則否小歛條内有封人等七官大歛條内有司几筵設几席朝夕奠條有司服共奠衣服朔月月半奠條内有籩人共籩外饔實鼎俎天子喪斬縗者奠諸侯喪齊縗者奠啓條有世婦濯溉為齍盛内豎為内人蹕皆遣奠所通用當互考右大遣奠量人掌喪祭奠竁之俎實竁亦有俎實謂所包遣士喪禮下篇曰藏苞筲於旁疏云此喪祭文連奠竁竁是壙内故鄭以喪祭為大遣奠解之是以大司馬喪祭亦為遣奠也又按冢人云請度甫竁穿壙之名此言奠竁則奠入於壙是以云所包遣奠也引士喪禮云藏苞筲於旁者苞謂苞牲取下體葦苞二是也藏筲者即既夕禮云筲三黍稷麥並藏之於棺旁又曰苞奠者取遣奠牲下體苞裹之遣送行也右包奠遂師大喪使帥其屬以幄帟先道野役使以幄帟先者大宰也其餘司徒也幄帟先所以為葬窆之間先張神座也道野役帥以至幕也疏曰大喪王喪也以幄帟先者謂使大宰官帥其屬以幄帟先行至壙也道野役者謂司徒導引野中之役以出國城至壙也大宰之屬幕人共帷幕帟受故大宰帥之司徒主衆庶故令野役也先張神座者謂柩至壙脫載除飾柩則在地未葬窆之間須有神座之所故知大幕之下宜有幄之小帳小帳之内而有帟之盛塵以為神座也地官陳殯具條幕人掌次此條適用朝祖條閭胥聚衆庶大司徒帥六鄉屬六引遂人屬六綍小司徒帥邦役治其政敎鄉師帥其民而至又薦車馬及陳明器兩條並此章通用當互考鄉士夫喪紀各掌其鄉之禁令帥其屬夾道而蹕屬中士以下過疏曰大喪紀當葬所經鄉道並六鄉以是故各掌其鄉之禁令當各帥其屬夾道而蹕知屬是中士以下者鄉士身是上士故云中士以下秋官方相氏大喪先匶先去聲匶音柩有葬使之道之道音導疏曰喪所多凶邪故使導也夏官喪祝及葬御匶出宫乃代喪祝二人相與更也廟疏曰及至也謂於祖厥明大奠後引柩車出喪祝於柩車前郤行御柩車出宫乃代者按序官云喪祝上士二人故鄭云二人相與更也小喪亦如之春官鄉師及葬執纛以與匠師御匶而治役匠師事官之屬其於司空若鄉師之於司徒也鄉師主役匠師主衆匠共主葬引翿羽葆幢也爾雅曰纛翳也以指麾攙柩之役正其行列進退幢行户剛反疏曰言及葬者及至葬引向壙纛謂葆也鄉保執葆幢却在柩車之前以與匠師御柩謂在路恐有傾覆故與匠師御正其柩而治役者亦謂監督人也此經鄉師是司徒考明匠師亦是司空考冬官亡未聞其考此據匠師與鄉師相對以義約之匠師冬官考也司士作六軍之士執披披方寄反披作謂使之也披柩車行所以持棺者有紐以結之謂之戴鄭司農云披者扶持棺險者也天子旁十二諸侯旁八大夫六士四元謂結披必當棺束於束繫紐天子諸侯載柩三束大夫士二束喪大記曰君纁披六大夫披四前纁後元士二披用纁人君禮文欲其數多圍數兩旁言六耳其實旁三鄉疏曰云六軍之士者即六鄉之民以其鄉出一軍六故名六軍之士也天子千人而云六軍者以天子千人出自六軍故號六軍之士非謂執披有七萬五千人也柩車則蜃車車兩旁使人持之若四馬六轡然故名持棺者名披也云有紐以結之謂之戴者喪大記云纁戴者是也先鄭云披者扶持棺險也先鄭意蜃車行恐逢道險者有傾覆故云披持棺險也云天子旁十二諸侯旁八大夫六士四者無所依據後鄭不從元謂結披必當棺束於束繫紐者謂蜃車兩旁皆有栁材其棺皆以物束之故云天子諸侯載柩三束大夫士二束彼喪大記不言天子此言者欲見天子無文約與諸侯同也喪祝掌大喪勸防之事勸猶倡帥前引者防謂執披備傾虧謂疏曰勸猶倡帥前引者即經御柩一也執纛居柩路前却行左右車脚有髙下則以纛詔告執披者使持制之不至傾虧倡先也故云倡帥前引者云防謂執披備傾虧者按夏官司士作六軍之士執披故以執披解防恐柩車傾倒故云備傾虧此經勸防因言所掌事及其行事下文及朝御柩是也小喪亦如之春官大史大喪執法以涖勸防鄭司農云勸防引六紼春官巾車大喪及葬執蓋從車持旌從才用反有從車隨柩路持蓋與旌者王平生時車建旌雨則蓋今蜃車無蓋執而隨之象生時所執者銘旌御僕大喪持翣喪大記註引漢禮以木為筐廣三尺髙二尺四寸方兩角髙衣以白布畫雲氣謂之畫翣畫之以黼謂之黼翣之類是也天子用八在路夾蜃車兩旁入壙則樹之四旁女御后之喪持翣翣棺飾也持而從柩車向疏曰禮天子八翣后喪亦同將葬壙之時使此女御持之左右各四人冢人大喪及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞旗鄭司農云象人謂以芻為人言猶語也語之者告當行若於生存者於是巾車行之孔子謂為芻靈者善謂為俑者不仁非作象人者不殆於用生乎及疏曰及至也謂至葬冢人語巾車之官將明器鸞車象人使行向壙遣車有鸞和之鈴兼有旌旗經直云鸞車不言鸞旗故鄭言之先鄭云象人謂以芻為人者後鄭不從以其上古有芻人至周不用而用象人則象人與芻靈别也鄭引檀弓者欲破先鄭以芻靈與象人為一若然則古時有塗車芻靈至周仍存塗車唯改芻靈為象人陳明器條通用春官虎賁氏及葬從遣車而哭遣車王之魂魄所憑依者疏曰遣車者將葬盛所苞奠遣送之車其車内既皆有牲體故云王之魂魄所憑依也遣車多少之數天子無文鄭註雜記云天子太牢苞九箇遣車九乗苞肉皆取大遣奠之牲體天子太牢外更用馬牲皆前脛折取臂臑後脛折取骼苞肉各九箇皆細分其體以充數也夏官内豎王后之喪及葬執䙝器以從遣車䙝器振飾頮浴之器頮疏曰從遣車若生時從后后之私䙝小器唯有振飾沐之器故為此解也若然玉府云凡䙝器鄭註以為清器虎子不為振飾頮沐器者彼據生時故與床第等連文此註䙝器為振飾頮沐之器者按特牲為尸而有盤匜并有簟巾巾為振飾盤匜為盥手故既夕禮用器之中有盤匜是送葬之時有䙝器也天官君葬用輴四綍二碑御棺用羽葆輴音輇市專反車輴當為載以輇之輇輇車柩車也在棺曰綍行道曰引至壙將窆又曰綍而設碑是以連言之碑桓楹也御棺車前為節度也子疏曰四綍二碑者綍有四條碑有二所此諸侯也天則云綍四碑御棺用羽葆者雜記云諸侯用匠人執羽葆以鳥羽注於柄末如蓋而御者執之居前以指麾為節度也此一經所論在道之時未論窆時下棺之節因在塗連言窆時故云是以連言窆至窆時下棺天子則更載以龍輴故遂師註云蜃車柩路也行至壙乃說更載以龍輴是天子殯用龍輴至壙去蜃車載以龍輴云碑桓楹也者檀弓云三家視桓楹是僭也則天子用大木為碑謂之豐碑諸侯則樹兩大木為碑謂之桓楹士喪有與天子同者三其終夜燎及乘人專道而行註見朝祖奠遣車馬下右柩行巾車大喪及墓嘑啓關陳車關墓門也車二車也士喪禮下篇曰車至道左北面立東上夕疏曰鄭知車是二車者以其遣車在明器之中按既陳明器在道東西北上此不言明器而别陳車是二車可知天子二車象生時當十二乘也士喪禮云車至道左北面立東上者士無二車惟據乘車道車藁車三乘此王禮亦有此三乘車於後别有二車十二乘若然則此車非止二車而已鄭直云二車者舉其士禮不見者而言耳條此條朝祖薦車通用柩行條遂師以幄帟先朝祖樂師陳樂器此條通用當互考方相氏大喪及墓入壙以戈擊四隅毆方良方良上音罔下音兩又如字表壙穿地中也方良罔兩也天子之槨柏黄腸為裏而以石焉國語曰木石之怪䕫罔兩疏曰必破方良為罔兩者入壙無取於方良之義故也云天子之槨柏黄腸為裏而表以石焉者欲見有罔兩之義故引漢法為證又檀弓云天子柏槨以端長六尺言槨柏則亦取柏之心黄腸為槨之裏故漢依而用之而表之以石蓋周時亦表以石故有罔兩也云國語者按國語水之怪龍罔象土之怪䕫罔兩則知方良當為罔兩也喪祝及壙說載除飾鄭司農云說載下棺也除飾去棺飾也四之屬令可舉移安錯之元謂除飾便其窆爾周人之葬牆置除所甲反亦作䈉疏曰脫載謂下棺於地除飾謂去帷荒下棺於坎訖其帷荒還入壙張之於棺註云四之屬者按喪大記及禮器士二翣大夫四翣諸侯六翣天子八翣周人之葬牆置者謂帷荒與柩為障若牆然故謂之牆翣在道柩車旁人執之入壙置之於槨旁故云置也小喪亦如之小喪王后以下之喪春官掌蜃掌斂互物蜃物以共闉壙之蜃互户故反塞互物蚌蛤之屬闉猶塞也將井槨先下以蜃禦濕也鄭司農說以春秋傳曰始用蜃炭言僭天子也之疏曰按士喪禮筮宅還井槨於殯門之外註云既哭則徃施之竁中是未葬前井槨材乃徃施之壙中則未施壙前已施蜃炭於槨下以擬禦濕也稻人喪紀共其葦事葦以闉壙禦濕之物也疏曰春秋左氏傳有井闉闉塞地官澤虞喪紀共其葦蒲之事葦以闉壙蒲以為席虞疏曰蒲以為席者謂抗席及禮記云卒哭苄翦不納者是也地官掌荼掌以時聚荼以共喪事疏曰按既夕禮為茵之法用緇翦布謂淺黑色之布各一幅合縫著以荼柩未入壙之時先陳於棺下縮二於下横三於上乃下棺於茵上是也右至壙冢人共喪之窆器下棺豐碑之屬陳朝祖條小司徒帥邦役遂人及窆後並此條通用當互考凡封用綍去碑負引君封以衡君命毋譁以鼓窆疏曰當為窆之謂下棺下棺之時將綍一頭以繫棺緘又將一頭繞碑間鹿盧所引之人在碑外背碑而立負引者漸漸應鼓聲而下故云用綍去碑負引也君封以衡貫侯禮大物多棺重恐柩不正下棺之時别以大木為衡貫穿棺束之緘平持而下備傾頓也君命無譁以鼓窆者謂君下棺之時命令衆人無譁以擊鼓為窆時縱捨之節每一鼓漸縱綍也天子則六繂四碑紼既有六碑但有四故以前碑後碑各重鹿盧每一碑用二繂前後用四繂其餘兩繂擊於兩旁之碑考柩行條君葬四綍二碑此條通用當互鼓人詔太僕鼓詳見本篇戒臣民條大僕大喪始塴戒鼓窆亦如之戒鼓擊鼓以驚衆也司農云窆謂葬下棺也春秋傳所謂日中而塴禮記謂之封皆下棺也音相似窆讀如慶封汜祭之汜反塴補鄧反汜方劍詳見始死條遂師大喪及窆抱磨共丘籠及蜃車之役蜃車柩路也行至壙乃說更復載以龍輴役謂執綍者磨者適歴執綍者名也遂人主陳之而遂師以名行校之也疏曰云共丘籠者王曰丘謂共為丘之籠器以盛土謂下棺之後以壙上土反復而為丘壟皆須籠器以盛土也云適歴執綍者名也者謂天子千人分布於六綍之上謂之適歴者分布稀疎得所名為適歴也云遂人主陳之者按遂人云及窆陳役是也遂師抱持版之名字廵行而校錄之以知在否故云抱磨也地官鄉師及窆執斧以涖匠師匠師主豐碑之事執斧以涖之使戒其事故書涖作立立讀為涖涖謂臨視也涖疏曰及至也窆下棺也至壙下棺之時鄉師執斧以匠師匠師主衆匠恐下棺不得所須有用斧之事故執斧以臨視之云匠師主豐碑之事按檀弓云公室視豐碑三家視桓楹鄭彼註天子斵大木為之豐大也天子六繂四碑前後各一碑各重鹿盧兩畔各一碑皆單鹿盧天子千人分置於六紼皆背碑負引擊鼓以為縱舍之節匠師主當之冢人及窆執斧以涖疏曰按鄉師云執斧以涖匠師則此亦涖匠師兩官俱臨者葬事大故二官共臨遂入藏凶器凶器明器遂疏曰因上文窆下棺訖即入壙藏明器正墓位蹕墓域守墓禁位謂丘封所居前後也禁所為塋限墓疏曰墓位即上文昭穆為左右須正之使不失本位域謂四畔溝兆蹕謂止行人不得近之守墓禁謂禁制不得漫入也云禁所為塋限者謂禁者以塋域為限而禁之春官司常建廞車之旌及葬亦如之詳見陳明器條樂師凡喪陳樂器則帥樂官及序哭亦如之哭此樂器亦帥之及疏曰按小宗伯云執事眡葬獻器遂哭之註云至將葬獻明器之材又獻素獻成皆於殯門外王不親哭有官代之彼據未葬材時小宗伯哭之此序哭明器之樂器文承陳樂器之下而云序哭謂使人持此樂器向壙及入壙之時序哭之也官春大司樂涖藏樂器詳見陳明器條校人飾遣車之馬及葬埋之同上典瑞大喪共贈玉贈玉蓋璧也贈有束帛六幣璧以帛疏曰贈玉者按既夕禮葬時棺入坎贈用元纁束帛即天子加以玉是贈先王之物也註云贈玉蓋璧也者以既夕禮云士贈用束帛明天子亦有束帛也而小行人合六幣璧以帛故知贈既用帛明以璧配之鄭言此者恐天子與士異士用帛天子用玉嫌不用帛故言之也春官大宰大喪贊贈玉助王為之也贈玉既窆所以送先王小宗伯成葬而祭墓為位成葬丘已封也天子之冢蓋不一冢而畢位壇位也先祖形體託於此地祀其神以安之人職曰大喪既有日請度甫竁遂為之尸以疏曰云天子之冢蓋不一日而畢者按檀弓云有司几筵舍奠於墓左反日中而虞註云所使奠墓有司來歸乃虞也則虞祭在奠墓後此上文既云詔相喪祭則虞祭訖矣於下乃云成葬祭墓為位則虞祭不待奠墓有司來歸者由天子之冢髙大蓋不一日而畢故設經喪祭在成葬之上也引冢人職者證祭墓為位時冡人為尸以祭后土也春官冡人凡祭墓為尸祭墓為尸或禱祈焉鄭司農云為尸冢人為尸文疏曰後鄭知此祭墓為禱祈者是墓新成祭后土此云凡故知謂禱祈也先鄭云為尸冢人為尸者上文祭墓謂始穿地時此文據成墓為尸後鄭以此亦得通一義故引之在下是以禮記檀弓云有司舍奠於墓左彼是成墓所祭亦引此凡祭墓為尸證成墓之事也右窆晉文公既定襄王於郟王勞之以地辭請隧隧王之葬禮闕地通道曰隧曰王章也未有代德而有二王亦叔父所惡也宋文公卒始厚葬用蜃炭益車馬始用殉重器備槨有四阿棺有翰檜蜃市忍反翰户旦反一音韓燒蛤為炭以􅄟壙多埋車馬用人從葬四阿四注槨也翰旁飾檜上飾皆王禮疏曰周禮匠人云殷人四阿重屋鄭元云阿棟也四角設棟也是為四注槨也士喪禮云抗木横三縮二謂於槨之上設此木縱二横三以負土則士之槨上平也今此槨上四注而下則其上方而尖也禮天子槨題湊諸侯不題湊不題湊則無四阿釋詁云楨翰幹也又曰楨正也築牆所立兩木也翰所以當兩邊障土者也翰在牆之旁則知此翰亦在旁也詩云會弁如星鄭元云會謂弁之縫中言其際㑹之處也會在弁之上知此檜亦在上故以為棺旁飾上言飾也言槨有棺者則本不當有宋公所僭必僭天子明此蜃炭四阿翰檜皆是王之禮也公室視豐碑言視者時僭天子也豐碑斵大木為之形如石碑於槨前後四角樹之穿中於間為鹿盧下棺以繂繞天子六繂四碑前後各重鹿盧也三家視桓楹時僭諸侯諸侯僭天子也斵之形如大楹耳四植謂之桓諸侯四繂二碑碑如桓矣大夫二繂二碑士二繂無碑疏曰凡言視者不正相當比擬之辭也故王制云天子之三公視公侯卿視伯大夫視子男是也故云言視僭天子也以禮廟庭有碑故祭義云牲入麗於碑儀禮每云當碑揖此云豐碑故知斵大木為碑也槨前後及兩旁樹之角落相望故云四角非謂正當槨四角也穿鑿去碑中之木令使空於此空間著鹿盧兩頭各入碑木繂即紼也以紼之一頭繫緘以一頭繞鹿盧既訖而人各背碑負紼末頭聽鼓聲以漸卻行而下之知唯前後碑重鹿盧者以棺之入槨南北豎長前後深也按春秋天子有隧以羡道下棺所以用碑者凡天子之葬掘地以為方壙漢書謂之方中又方中之内先累槨於其方中南畔為羡道以蜃車載柩至壙說而載以龍輴從羡道而入至方中乃屬紼於棺之緘從上而下棺入於壙之中於此之時用碑繂也視桓楹不云碑知不似碑形故云如大楹耳通而言之亦謂之碑故喪大記云諸侯大夫二碑是也士三虞大夫五諸侯七尊卑恩之差也天子至士葬即反虞疏曰知天子至士葬即反虞者以其不忍一日未有所歸尊卑皆然故知葬即反虞檀弓云葬日虞不忍一日離也不顯尊卑是貴賤同然也侯雜記然今按檀弓葬日虞以虞易奠疏曰雜記云諸七虞則天子九虞也初虞已葬日而用柔第二虞亦用柔日假令丁日葬葬日而虞則已日二虞後虞改用剛則庚日三虞也故鄭註士虞禮云士則庚日三虞士之三虞用四日則大夫五虞當八日諸侯七虞當十二日天子九虞當十六日最後一虞與卒哭例同用剛日此可以補經文之闕故備録於此小宗伯王崩既葬詔相喪祭之禮喪祭虞祔也檀弓曰葬日虞弗忍一日離也是日也以虞易奠卒哭曰事成是日也以吉祭易喪祭明日祔於祖父上疏曰鄭知喪祭是虞祔也以文承卜葬之下成葬之其中唯有虞祔而已故以虞祔解之也葬之朝為大遣奠反日中而虞是不忍一日使父母精神離㪚故云不忍一日離也司巫祭祀則共蒩館蒩子都反茅館所以承蒩謂若今筐也士虞禮苴刌長五寸實於筐饌於西坫上甸師祭祀共蕭茅鄭大夫云蕭字或為酋酋讀為縮束茅立之祭前沃酒其上酒渗下去若神歛之杜子春讀為蕭蕭香蒿也茅以供祭之苴亦以縮酒苴以藉祭疏曰士虞禮束茅長五寸立於几東謂之苴是也鄉師大祭祀共茅蒩元謂蒩士虞所謂苴刌茅長五寸束之者是也祝設於几東席上命佐食取黍稷祭於苴王取膚祭祭如初此所以承祭既祭蓋束而去之守祧職云既祭藏其墮是與劉刌音忖去羌吕反祧他彫反墮吁恚反相恚反與音餘地官庖人共喪紀之庶羞喪紀喪事之祭謂虞祔也皆疏曰凡喪未葬已前無問朝夕奠及大奠無薦羞之法今言共喪紀庶羞者謂虞祔之祭乃有之又曰天子九虞後作卒哭祭虞卒哭在寢明日祔於祖廟今直云虞祔不言卒者舉前後虞則卒哭在其中共庶羞可知天官囿人獸人共獸腊人共乾肉䱷人共鱻薧醢人共豆實詳見陳小斂條地官籩人共籩詳見朔月半月奠條喪祝掌喪祭祝號喪祭虞也右虞祭措之廟立之主曰帝同之天神春秋傳曰凡君卒哭而祔祔而作主疏曰措置也主葬後卒哭竟而祔置於廟立主使神依之也白虎通云所以有主者神無依據孝子以繼心也主用木木有始終又與人相似也蓋記之以為題欲令後可知也方尺或曰尺二寸鄭云周以栗漢書前方後圓五經異義云主狀正方穿中央達四方天子長尺二寸諸侯長一尺天神曰帝今號此主同於天神故題稱帝云文帝武帝之𩔖也崔靈恩云古者帝王生死同稱今云措之廟立之主曰帝者蓋是為祀時有主入廟稱帝之義記者録以為法也又曰凡君卒哭而祔卒哭者是葬竟虞數畢後之祭名也孝子親始死哭晝夜無時葬後虞竟乃行神事故卒其無時之哭猶朝夕各一哭故謂其祭為卒哭卒哭明日而立主祔於廟隨其昭穆從祖父食卒哭主暫時祔廟畢更還殯宫至小祥作栗主入廟乃埋桑主於祖廟門左埋重處故鄭云虞而作主至祔奉以祔祖廟既事畢反之殯宫然大夫士亦卒哭而祔而左傳唯據人君有主者言之故云凡君鄭註祭法云大夫士無主也此言凡君明不關大夫士也崔靈恩云大夫士無主以幣帛祔祔竟並還殯宫至小祥而入廟也又檀弓云重主道也鄭註引公羊傳云虞主用桑練主用栗則似虞已有主而左傳云祔而作主二傳不同按說公羊者朝葬日中則作虞主若鄭君以二傳之文雖異其意則同皆是虞祭總了然後作主以作主去虞實近故公羊上係之於虞謂之虞主又作主為祔所須故左氏據祔而言古春秋左氏說既葬反虞天子九虞九虞者以柔日九虞十六日也諸侯七虞十二日也大夫五虞八日也士三虞四日也既虞然後祔死者於先死者祔而作主謂桑主也期年然後作栗主檀弓云虞而立尸有尸筵鄭以為人君之禮唯立尸米作主也右作主魯文公二年作僖主主者殷人以栢周人以栗三年喪終則遷入於廟疏曰主所用木終無正文公羊傳曰主者曷用虞主用桑練主用栗左傳唯言祔而作主一而已非虞練再作公羊之言不可通於此也作主非禮也元年四月葬二年乃作主遂因葬文通譏之凡君薨卒哭而祔祔而作主特祀於主既葬反虞則免喪故曰卒哭哭止也以新死者之神祔之於祖尸柩已逺孝子思慕故造木主立几筵特用喪禮祭於寢不同於宗廟凡君者謂諸侯以上下通於鄉大夫烝嘗禘於廟冬祭曰烝秋祭曰嘗新主既特祀於寢則宗廟四時嘗祀自如舊也二年禮畢乃同於吉之疏曰君既葬反虞則免喪與葬不相逺共在一月内故杜每云既葬卒哭縗麻除謂之卒哭者卒此無時之哭自此之後唯朝夕哭耳天子諸侯則於此除哭全不復哭也勉齋黄氏曰按杜預天子諸侯既葬除喪服諒闇以居心喪終制不與士庶同禮之議見晉書本傳於左氏傳註遂有既葬反虞則免喪之說司馬公嘗言其失矣然其言乃曰縗麻主於哀戚然庸人無縗麻則哀戚不可得而勉又謂杜預辯則辯矣不若陳逵之言質畧而敦實也愚謂縗麻之制乃古先聖人沿孝子之情為人制服蓋天理人心之所不容己者豈專為庸人而設以勉其哀戚哉杜預違經悖禮淪斁綱常當為萬世之罪人坐以不孝莫大之法而特言其不若陳逵之言質畧而敦實非所以明世教也先師朱文公曰左氏所傳祔而作主則與禮家虞而作主者不合烝嘗禘於廟則與王制喪三年不祭者不合杜氏因左氏之失遂有國君卒哭除之說作僖公主者何為僖公作主也主狀正方穿中央達四方天子長尺二寸諸侯長一尺主者曷用虞主乃桑禮平明而葬日中而反反虞猶安神也用桑者取其名與其麤觕所以副孝子之心禮虞祭天子九諸侯七卿大夫五士二其奠處猶吉祭練主用栗謂期年練祭也埋虞於兩階之間易用栗也夏后以松殷人以栢周人以栗松猶容也想見其容貌而事之主人正之意也栢猶廹也親而不逺主地正之意也栗猶戰栗謹敬貌主天正之意也禮士虞記曰桑主不文吉主皆刻而諡之蓋為禘祫時别昭穆也虞主三代同者用意尚麤觕未暇别也用栗者藏主也藏於廟室中常所當奉事也質家藏於室作僖公主何以書譏何譏爾不時也其不時柰何欲久葬而不能也禮作練主當以十三月文公亂聖人制欲服喪三十六月十九月作練主又不能卒竟故以二十五月也日者重失禮鬼神立主喪主於虞其主用桑吉主於練其主用栗作僖公主譏其後也僖公薨至此已十五月作主壊廟有時日於練焉壊廟壊廟之道易檐可也改塗可也檐以占反則禮過髙祖毁其廟以次而遷將納新神示有所加方疏曰按莊公之喪已二十二月仍譏其為吉禘今練而作主猶是凶服而曰吉主者三年之喪至二十五月猶未合全吉故公子遂有納幣之譏莊公喪制未二十五月而禘祭故譏其為吉此言吉者比之虞主故為言也然作主在十三月壊廟在三年喪終而傳連言之者此主終入廟入廟即易檐以事相繼故連言之非謂作主壊廟同時也或以為練而作主之時則易檐改塗故此傳云於練焉壊廟於傳文雖順舊說不然故不從之直記異聞耳信引衛次仲云宗廟主皆用栗右主八寸左主七寸廣厚三寸若祭訖則納於西壁埳中去地一尺六寸右主謂父也左主謂母也何休徐邈並與范註同云天子尺二寸諸侯一尺狀正方穿中央達四方是與衛氏異也白虎通亦云藏之西壁則納之西壁中或如衛說去地髙下則無文以明之文獻通考卷一百二十三
