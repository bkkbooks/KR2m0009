body:
  text: 文獻通考卷一百十三鄱陽馬端臨貴與著王禮考八君臣冠冕服章宋朝之制天子之服有衮冕廣一尺二寸長二尺四寸前後十二旒二纊並貫真珠又有翠旒十二碧鳳銜之在珠旒外冕版以龍鱗錦表上綴玉為七星旁施琥珀瓶犀瓶各二十四周綴金絲網鈿以真珠雜寶玉加紫雲白鶴錦裏四柱飾以七寶紅綾裏金飾玉簪導紅絲絛組帶亦謂之平天冠袞服青色日月星山龍雉虎蜼七章紅裙藻火粉米黼黻五章紅蔽膝升龍二並織成間以雲朶飾以金鈒花鈿窠裝以真珠琥珀雜寶玉紅羅襦裙繡五章青褾襈裾六綵綬一小綬三結玉環三素大帶朱裏青羅四神帶二繡四神盤結綬帶飾並同衮服白羅中單青羅袜帶紅羅勒帛鹿盧玉具劍玉鏢首鏤白玉雙珮金飾貫真珠金龍鳳革帶紅韈赤舄金級花四神玉鼻祭天地宗廟謁太清宫饗玉清昭應宫景靈宫受冊尊號元日受朝冊皇太子則服之大中祥符初將東封有司言封禪當服大裘冕無旒以羔皮為之而唐制用衮冕之服詔依南郊服衮冕六年五月朝拜聖像時屬盛暑而皆䙝服有司請别制單衣以順時令從之通天冠二十四梁犀簪導紅絲組帶金鈒花鈿以珠寶施博山附蟬絳紗袍以織成龍紅金條紗為之紅裏皂褾襈裾白羅中單蔽膝以紅紗紅羅裏飾與袍同紅羅裙紅紗裏白羅方心曲領餘同冕服大祭祀致齋出乘玉輅入乘金輅正冬大㑹五月朔受朝則服之赭黄淡黄袍衫玉装紅束帶皂紋鞾大宴則服之赭黄淡黄䙆袍衫紅袍常朝則服之窄袍便坐視事則服之窄黄袍衫而下比皂紗折上巾通犀金玉環帶窄袍或御烏紗㡌皇太子之服衮冕青羅表緋羅紅綾裏塗金銀鈒花飾犀簪導紅絲組前後九旒二纊貫水晶珠青羅衣繡山龍雉火虎蜼五章紅羅裳繡藻米黼黻四章紅羅蔽膝繡山火二章白紗中單青褾襈裾革帶塗金銀鈎䚢瑜玉雙珮四采織成大綬結二玉鐶金塗銀鈒花飾青羅袜帶紅羅勒帛玉具劍金塗銀鈒花玉鏢首白羅襪朱履金塗銀釦從祀則服之逺遊冠十八梁青羅表金塗銀鈒花飾犀簪導紅絲組博山朱明服紅花金條紗衣紅紗裏皂褾襈紅紗裳紅紗蔽膝並紅紗裏白花羅中單皂褾襈方心曲領白羅襪黑舄革帶佩綬劍劍同衮服袜帶勒帛受冊謁廟朝會則服之常服皂紗折上巾紫公服通犀金玉帶王公以下冠服唐制有衮冕九旒鷩冕八旒毳冕七旒絺冕六旒元冕五旒爵弁朝服公服袴褶弁服宋朝省八旒冕六旒冕公服弁服九旒冕塗金銀花額犀玳瑁簪導青羅衣繡山龍雉火虎蜼五章緋羅裳繡藻粉米黼黻四章緋蔽膝繡山火二章白花羅中單玉装劒佩革帶暈錦綬二玉環緋白羅大帶緋羅襪履親王中書門下奉祀則服之九旒冕無額花元衣纁裳悉畫小白綾中單獅子錦綬二銀環餘同上三公奉祀則服之七旒冕犀角簪導衣畫虎蜼粉米三章裳畫黼黻二章銀裝佩劒革帶餘同九旒冕九卿奉祀則服之五旒冕無章銅佩劒革帶餘同七旒冕青羅衣裳四品五品為獻官則服之六品以下無劒佩綬紫檀衣及裳羅為之皂大綾綬銅佩御史博士服之平冕無旒青衣纁裳無劒佩綬餘同五旒冕太祝奉禮服之五梁冠塗金銀花額犀玳瑁簪導䜿筆緋羅袍緋花羅中單緋羅裙緋羅蔽膝並皂褾襈緋白羅帶白羅方心曲領玉劒佩銀革帶暈錦綬二玉環白綾襪皂皮履一品二品侍祠朝會則服之中書門下省冠如籠巾貂蟬籠巾編籐漆之塗金銀飾玳瑁蟬一金蟬六御玉三梁冠犀角簪導無中單銀劒佩師子錦綬銀環餘同五梁冠諸司三品御史臺四品兩省五品侍祠朝會則服之御史大夫中丞則冠有獬豸角衣有中單兩梁冠犀角簪導銅劒佩練鵲錦綾銅環餘同三梁冠四品五品侍祠朝會則服之六品以下無劒佩綬御史則冠有獬豸角衣有中單袴褶紫緋緑各從本服色白綾中單白綾袴白羅方心曲領本品冠導駕則騎而服之矣國初令禮官檢討模畫袴褶衣冠形像且云武弁平巾幘即是一物兩名乃於籠巾中别畫一幘中書門下奏議據令文眀武弁非袴褶之冠合是具服有劒履佩綬又非騎馬之服乃請導駕官止用平巾幘袴褶靴笏如平巾幘制度未詳且以今朝服冠代之當戴籠巾者亦不帶導駕官袴褶色未久本品色者止用見著服色其起梁帶依禮官之儀權以革帶充自是遂為定制公服唐制謂之常服色同袴褶曲領垂胡加攔折上巾唐制都督刺史品卑者並借緋太平興國二年詔朝官出知節鎮及轉運使副衣緋緑者並借紫知州防禦團練刺史衣緑者借緋衣緋者借紫其為通判知軍監止借緋其後江淮發運使同轉運提㸃刑獄同知刺史州凡升朝官緋緑二十年遇恩受叙勞以賜其制恩者給以公服紫衣犀帶緋衣塗金寶瓶帶東封西祀京朝官服色經十五年者聼叙内職亦許窄袍景徳三年詔出入内庭不得服皂腰帶之制恩賜有金毬路荔枝師蠻海㨗寶藏方團二十五兩荔枝自二十五兩至七兩有四等師蠻二十五兩海㨗十五兩寶藏二十兩惟毬路方團胯餘悉方胯荔枝或為御仙花束帶亦同金塗天王八仙犀牛寶瓶荔枝師蠻海㨗雙鹿行虎窪面天王八仙二十五兩犀牛寶瓶自二十五兩至十五兩有二等荔枝自二十兩至十兩有三等師蠻自二十兩至十八兩有二等海㨗十五兩至十兩有三等雙鹿自二十兩至四兩有九等行虎七兩窪面自十五兩至十二兩有二等束帶之制有金荔枝師蠻戲童海㨗犀牛胡荽鳳子寶花荔枝自二十五兩至十五兩有三等師蠻戲童二十五兩海㨗自二十兩至十五兩有二等犀牛二十兩鳳子寶花十五兩金塗犀牛雙鹿野馬胡荽犀牛野馬十五兩雙鹿自二十兩有三等胡荽自十五兩至十兩有三等犀有上等次等以牯牸為别出黔南者在南海之下太平興國七年正月翰林學士承㫖李昉等奏曰奉詔詳定車服制度按禮部式飾以金玉之𩔖盖腰帶之制也今請從三品以上服玉帶四品以上服金帶以下升朝官雖未升朝已賜紫緋内取諸軍將校並服紅鞓金塗銀緋方雖升朝著緑者公服上不得繫銀帶餘官服黑銀方團胯及犀角帶貢士及胥史工商庶人服鐵角帶恩賜者不用此制荔枝帶本是内出以賜將相在於庶僚豈可僭服望非恩賜者官至三品乃得服之景徳三年詔出入内庭不許服假通犀帶大中祥符五年詔曰方團金帶優寵輔臣今文武庶官及技術之流率以金銀倣效甚紊彛制自今除恩賜外悉禁之笏唐制五品以上用象上圓下方六品以下用竹木上挫下方宋朝文散五品以上用象九品以上用木武臣内職並用象千牛衣緑亦用象庭賜緋緑者皆給之魚袋唐制散官二品京官文武職事五品以上及都督刺史皆帶魚袋國初其制多闕雍熙元年南郊畢内出魚袋以賜近臣由是内外升朝文官皆帶凡服紫者飾以金服緋者飾以銀庭賜紫者給以金塗魚袋賜緋亦有特給者京朝幕職州縣官賜緋紫者亦帶親王武官内職將校皆不帶大中祥符六年詔技術官未升朝賜緋者不得佩魚袋重戴唐時士人多尚之國初御史臺皆戴餘官或戴或否淳化二年六月御史臺奏舊儀三院御史在臺及出使並重戴其出使重戴事已久廢其有御史出臺為省職及在京釐别務者請依舊儀違者罰一月俸從之十月令兩省及尚書省五品以上皆重戴樞密三司使副則不又五代以來新進士亦重戴遂以為俗脱白則止國初因舊制賜將相學士禁軍大校時服建隆三年乃徧賜百官每嵗端午十月一日文武羣臣將校皆給焉十月近臣軍校增給錦襯袍中書門下樞密宣徽院節度使及侍衛歩軍都虞侯以上皇親大將軍以上天下樂暈錦三司使學士中丞内客省使駙馬留後觀察皇親將軍諸司使廂主以上簇四盤鵰細錦三司副使官觀判官黄獅子大錦防禦使團練使刺史皇親諸司副使翠毛細錦權中丞知開封府銀臺司審刑院及待制以上知檢院鼓院同三司副使六統軍金吾大將軍紅錦諸班及諸軍將校亦賜窄錦袍有翠毛宜男雲鴈細錦獅子練鵲寶照大錦寶照中錦凡七等應給錦袍者皆五件公服錦寛袍綾汗衫袴勒帛丞郎給舍大卿監以上不給錦袍者加以黄綾繡袍肚其次四件無錦袍係大將軍及少卿監郎卿以上等官其次三件無袴係將軍知雜御史至大理正等官其次二件無勒帛係通事舍人承制崇班等官小内職汗衫以綾小文臣以絹閤門祗候内供奉官至殿直京官編修校勘止給公服端午亦給應給錦袍者汗衫以黄縠别加繡袍肚小扇誕聖節所給如時服京師禁廂軍校衛士内諸司胥吏及工巧等人並皆給時服有差朝官京官内職出為外任通判監押廵檢以上者大藩府監務者亦或給之每服十月時服開寶中皆賜窄錦袍太平興國以後文官知制誥武官上將軍内職諸司使以上皆賜錦朝官供奉官以上皆賜紫地造花欹正京官殿直以下皆賜紫大綾在外禁軍將校亦賜窄錦袍次賜紫綾色絹親王宰相生日賜衣五事宰執樞密使宣徽使初拜加恩申謝日亦如之郊禋禮畢宰相親王以下賜襲衣有差士庶人之服太平興國七年李昉等奏議按唐制禁外官袍衫之内輙服朱紫近年品官緑袍舉子白紵之下多服紫色衣並望禁止已着緋者聽舉人私第通服皂衣職官之家子孫弟姪不用此制又案唐天成三年詔今後庶人工商只着白衣今請縣鎮公吏及工商技術不係官樂人通服皂白從之端拱二年申眀前詔令御史臺嚴加糾察又令巾子不得過二寸五分婦人禁戴假髻非命婦不得服銷金泥金真珠装綴衣服至道元年十月許士庶工商通服紫咸平二年申眀鋪金泥金之禁大中祥符元年又禁以箔金金線飾器服八年復下詔自宫禁迨臣庶之家一切服玩皆不得以金為飾嚴其科禁自是遂絶又禁民間服皂班襭衣仁宗景祐二年八月詔本朝帝后及羣臣冠服多沿唐舊而循用之久則有司寖為繁文以失法度其令入内内侍省御藥院與太常院詳典故造冠冕蠲減珍華務從簡約俾圖以進由是改製衮冕服冕版截令廣八寸長一尺六寸所謂翠旒碧鳳二十四犀瓶二十四琥珀瓶四神帶二分旒玉鈎悉罷之而冕頂以青羅表繪龍鱗以代龍鱗錦用紅羅裏繪紫雲白鶴以代紫雲白鶴錦上以金絲為網而舊以金絲蹙八龍止存其四又以青羅繪龍鱗飾冕筩及柱以易龍鱗錦鋪空地以雲龍細窠以易玉金輪等七寶其所施花墜素墜天河帶組欵慢帶六綵綬冕之金釦玉環皆裁損輕於舊而以青羅繪龍鱗錦為納言以代玉加黈纊玉簪上衣用青羅以紅羅襈繡日月星山龍華蟲火宗彛八章間以雲疏密視所宜去所謂細窠及珠璣飾下裳用紅羅繡藻及粉米黼黻蔽膝繡升龍二以雲補空地去細窠除帶首黄金葉以銷金代之慶歴三年太常博士余靖言周禮司服裳王之吉凶衣服所祀鬼神大小以為制度今大中祠所遣獻官用上公九旒九章冕服為初獻餘公卿皆七旒冕制無差降小祠則公服行事乖戾舊典謂宜詳周禮因所祭鬼神以等獻官冕服之制詔太常禮官議復奏曰周官王之冕服有六自昊天至羣小祀皆王者親祀而差六服視神之上下以為别聖朝之制唯皇帝親祠郊廟及朝㑹大禮服衮冕而其下諸冕皆不設嵗奉常祀大中祠遣官行事攝公則服一品九旒冕攝卿則服三品七旒冕悉從品制為服不以祠之大小為等差至於小祠獻官以公服行事謹案衣服令五旒冕衣裳無章皂綾綬銅裝劒佩四品以下為獻官則服之今小祠獻官既不攝公卿則屬四品以下當有祭服請公卿祭服仍舊從品外小祠獻官如令以祭服行事若非時告祭用香幣禮器行事亦准此詔施行焉至和三年王洙奏天子法服冕旒形制重而華飾繁願集禮官參定詔禮院詳定典禮上聞禮院繪圖以進勅御藥院更造其後冕服稍增侈如故皇祐三年御史臺皇親侍祠大朝會大將軍至副率當本品朝服宜下有司製造詔禮官詳典故而禮官言准令乗輿服并皇太子服並云絳紗袍諸臣服即言絳紗單衣並當以單羅為之朝服有裏者請除去及冠服非儀者皆當改正皇祐四年禮院以中單制不眀考求以奏曰禮繡黼丹朱中衣大夫之僭禮也鄭康成曰此諸侯之禮繡讀為絹絹繪名繡黼丹朱以為中衣孔穎達曰黼刺繒為黼文丹朱赤色染繒為赤色中衣謂以素為冕服之裏衣猶今中單晉詩素衣朱襮孔穎達引釋器以釋之曰黼領謂之襮孫炎曰繡刺黼文以褗領是襮為領也中衣者朝祭服之裏衣其制如深衣故禮載深衣連衣裳而純之采者有表則謂之中衣又魯詩素衣朱綃綃為綺屬然則綃是繒綺别名為綃刺為黼文謂之綃黼綃上刺黼以為衣領名為襮開元禮天子服衮冕元衣纁裳白紗中單羣官服衮冕青衣纁裳白紗中單今者詳古服之中衣以素為之以朱為領縁而領刺黼文即禮記所謂綉黼丹朱中衣詩所謂素衣朱襮也今之祭服既有中單又别為裏與古弗合然則中單之制宜用繒素而朱領緣領刺以黑白黼文禮云大夫之僭禮則諸侯之服今五等祭服宜悉依此制詔如太常議仁宗時太平日久士民富樂寖為浮侈乃下詔禁約令京師士庶得衣黑褐地白花藍黄紫地撮暈花女子得衣白褐毛黲褐帛又屢下詔禁塗銷黄金為衣服器物之飾嘉祐末詔禁天下衣黑紫初皇親與内臣所衣紫皆再入為黝色後士庶寖相效而言者以為竒衺之服故禁之服者猶不止英宗治平二年詔衮服如景祐二年制悉去繪畫龍鱗紫雲白鶴蹙金絲龍除下裳繡外衮服並繪而不繡知太常禮院李育奏言竊以郊廟之祭本尚純質衮冕之飾皆存法象非事繁侈重竒玩也冕則以周官為本凡十二旒間以采玉加之以紘綖笄瑱之飾衮則以虞書為始凡十二章首以辰象别以衣裳繪繡之采東漢至唐史官名儒紀述前制皆無珠翠龍錦犀寶七星雲鶴之飾何則鷸羽蜯胎非法服所用琥珀犀瓶非至尊所冠龍錦七星已列采章之内紫雲白鶴近出道家之語豈被衮戴璪象天則數之義哉自大裘之廢顓用衮冕古朴稍去而法度尚存夫眀水大羮不可以衆味和雲門咸池不可以新聲間衮冕之服不宜以珍怪累也若魏眀之用珊瑚江左之用翡翠侈靡衰播之餘豈足為聖朝道哉且太祖建隆元年少府監所造冕服及二年博士聶崇義所進三禮圖嘗詔尹拙竇義參校之皆倣虞周漢唐之舊至四年冬服之合祭天地於圜丘用此制也太宗亦嘗命少府製於禁中不聞改作及章聖封泰山禮官請服衮冕帝曰前王服黑裘尚質也今則無羔裘而有衮冕可從近制是豈有意於繁飾哉蓋後之有司率意妄增未嘗確議遂相循而用故仁宗嘗詔禮官章得象等詳議之其所減過半然不經之飾重者多去輕者尚存不能盡如詔書之意故至和三年王洙復議去繁飾禮官畫圖以獻漸還古禮而有司所造復如景祐之前又案開寶通禮及衣服令冕服皆有定法悉無㑹要所載寶錦之飾况天地之徳無物以稱宗廟之薦不美多品惟純質之器法度之服僅可饗之其衮冕之服及􅔖綬佩舄之𩔖與通禮衣服令三禮圖制度不同者宜悉改正詔太常禮院少府監參定遂合奏曰古者冕服之用郊廟殊制唐典天子之服有二等而大裘尚存顯慶初長孫無忌等采郊特牲之説獻議廢大裘自是郊廟之祭一用衮冕然旒章之數止以十二為節亦未聞有餘飾也國朝冕服雖倣古制然增以珍異巧縟前世所未嘗有夫國之大事莫大於祀而祭服違經非所以肅祀容尊神眀也臣等以為宜如育言參酌通禮衣服令三禮圖及景祐二年減定之制一切改造孔子曰麻冕禮也今也純儉吾從衆純者絲也變麻用絲蓋已久矣則冕服之制宜依舊以羅為之冕廣一尺二寸長二尺二寸約以景表尺前圓後方黝上朱下以金飾版側以白玉珠為旒貫之以五采絲繩前後各十二旒旒各十二珠相去一寸長二尺朱絲組為纓黈充耳金飾玉簪導深青衣纁裳十二章八章繪之於衣日月星辰山龍華蟲火宗彛也四章繡之於裳藻粉米黼黻也錦褾領織為升龍山龍而下一章為一行重以為等行十二别製大帶素表朱裏朱綠終韠紱舄大小綬亦去珠玉鈿窠琥珀玻璃之飾其中單革帶玉具劒玉佩朱襪之制已中禮令無復改為則法服有稽祭禮增重復詔禮院再詳明以聞而内侍省奏謂景祐中已裁定可因而用也乃詔如景祐二年之制神宗元豐元年詳定官言周禮司服云王祀昊天上帝則服大裘而冕祀五帝亦如之饗先王則衮冕唐開元禮開寶通禮皇帝詣行宫及大次並服衮冕出次則改服大裘冕臨燔柴則脱衮服裘今赴行宫則服通天冠絳紗袍至大次則服靴袍臨祭則以衮冕有戾於古請從唐制詔下參議禮官咸謂大衮之制本以尚質而後世寖文今參考舊說大衮冕無旒廣八寸長尺有六寸前圓低寸二分而後方元表朱裏以繒為之而以黑羔皮為裘以黑繒為領袖當暑則請從梁陸瑋議以黑繒為裘及唐輿服志以黑羔皮為緣帝以去古逺不經見使之審定而詳定官陸佃以為冕服有六弁師掌王之五冕則大裘與衮同冕先儒或謂周祀天地皆服大裘而大裘之冕無旒非是蓋古者裘不徒服其上必有衣故曰緇衣羔裘黄衣狐裘素衣麑裘謂服裘而以衮襲之此冬祀之服也夏祀亦將衣裘乎周官曰凡四時之祭祀以宜服之眀夏必不衣裘也今欲冬至禋祀昊天上帝服裘被衮其餘祀天神地祗並服衮去裘其後禮部亦言經有大裘而無其制隋唐猶可考隋制以黑羔皮為裘黑繒為領袖及裏緣袂廣可運肘長可蔽膝請令有司改制詳定所又言國朝以白珠為旒蓋沿漢舊而其冕廣長之度自唐以來率意為之景祐中以叔孫通漢禮器制度為法凡冕版廣八寸長尺六寸今以青羅為表紅羅為裏則非弁師所謂元冕朱裏者也周囘用金稜天版四面用金絲結網旁用珠花素墜之𩔖皆不應禮請改用朱組為紘玉笄玉瑱以元純垂瑱以五采玉貫於五色藻為旒以青赤黄白黑五色備為一玉每一玉長一寸前後二十四旒垂而齊肩宜表裏用繒庶協孔子麻冕純儉之義古者祭服朝服之裳皆前三幅後四幅殊其前後不相連屬前為陽故三以象竒後為隂故四以象偶今裳乃以八幅為之不殊前後考古不合請改用七幅幅廣二尺二寸兩旁各縫殺一寸謂之削幅腰間辟積無數裳側有純謂之裨裳下有純之裼裨裼之廣各寸半表裏合用三寸羣臣祭服之裳倣此又言古者皆以冕為祭服未有朝服而助祭者百官不執事者皆服常袍袀元以從此禮之失也宋齊王公平冕九旒卿七旒梁隋則五等諸侯平冕九旒卿大夫五旒唐開元畧具五旒而百官各以品服之令文祀儀冕有九旒七旒五旒今乃有四旒冕又服者不以官秩故分獻四品官皆服四旒冕博士御史則冕五旒而衣紫檀太祝奉禮則服平冕而無珮玉此因循不講之失也古者朝祭異服所以别事神事君之禮今皇帝冬至正旦御殿服通天冠絳紗袍則百官當朝服至親祠郊廟皇帝既嚴裘冕而侍祠之官亦朝服豈禮之稱哉古者齋祭猶異冠况人神異禮朝祭異事乎百官雖不執事不當朝服侍祠請親祠郊廟景靈宫除導駕贊引扶宿衛官外侍祠及分獻並服祭服當如制修製五冕及爵弁以正冕弁之名又禮曰祀四望山川則毳冕祭社稷五祀則絺冕祭羣小祀則元冕今天子六服自鷩冕而下既不親祠廢而不用則諸臣攝事當從王所祭之服請依周禮從之三年詳定正旦御殿儀注所言周官司服王眡朝則皮弁服鄭氏注視朝視内外朝之事王受諸侯朝覲於廟則衮冕賈公彦曰覲禮天子衮冕負黼扆故知朝覲在廟王服衮冕而春夏受贄在朝則皮弁孔頴達曰天子朝服立於路門之外諸侯朝服執贄入應門漢制百官賀正旦天子服通天冠自晉以來天子郊祀天地眀堂宗廟元㑹臨軒介幘通天冠平冕冕單表朱緑裏加於通天冠上衣畫而裳繡凡為日月星辰十二章自此元日受朝始用祭服梁及隋唐既以因襲而本朝亦用衮冕臣等以為周禮朝覲若春夏受贄於朝則君臣皆朝服秋冬受贄於廟則君臣皆祭服今元㑹行禮於朝而天子服祭服羣臣服朝服未合禮意其元日受朝賀宜服通天冠絳紗袍從之詳定所又言按鄭氏説凡冕之制以版為中前圓後方前低一寸二分廣八寸長尺六寸此廣長之制也周官弁師曰諸公之繅旒九就瑉玉三采其餘如王之事而鄭氏以為延紞皆元覆朱裏與王同也又曰諸公繅斿皆就玉瑱玉笄而說者曰瑱以塞耳笄以貫武鄭氏謂瑱或名為紞君五色臣三色笄者屈組為紘屈組謂以其一繫之左笄遶頥下自右而上仰屬於笄屈繫之垂其餘為飾今羣臣之冕則以青為覆以金鍍銀稜非元覆纁裏之制自九旒冕而下皆綴兩繒帶以繫之非組紘之制以纊為充耳非所謂玉瑱以犀為簪導非所謂玉笄公卿之衣不以緇非所謂五冕冕又旁垂青纊益非古制請製五冕其廣長如前元覆纁裏以繒為之其繅就玉玉則衮冕九旒旒九玉玉三采鷩冕七旒旒七玉毳冕五旒旒五玉玉皆三采先朱次白次蒼並以玉笄貫武青組為紘絺冕三旒旒三玉二采朱緑其元冕無旒爵弁前後平並用象笄以緇組為紘纁邊旁以三色之紞垂玉瑱以充耳其後詳定所言古者冕有紘冠有纓今衣服令冕而用纓不與禮合請改用紘玉以朱組紘九旒以青七旒五旒及平冕以緇纁邊而去其所綴兩繒帶平冕改為元冕用繒色赤而微黑者為之四年詳定儀注所言凡在朝君臣同服漢承秦改六冕之制但元冠絳衣魏以來名為五時朝服隋唐謂之具服一品以下九品以上皆絳紗單衣其冠有五梁三梁二梁一梁之别隋志曰梁别貴賤自漢始也綬則以組為之本以貫佩玉而承受韋彤五禮精義綬以别尊卑彰有徳故漢制相國至百石長吏三采二采一采之等然則冠以梁之多少别貴賤綬以采之麤縟異尊卑其來尚矣古者制禮上禮不過十二天之數也自上而下降殺以兩畿外諸侯逺於尊者而伸則以九以七以五從陽竒之數王朝公卿大夫近於尊者而屈則以八以六以四從隂偶之數本朝衣服令通天冠二十四梁乘輿服蓋二十四梁以應冕旒前後之數若人臣之冠則自五梁而下與漢唐少異至於綬則乘輿及皇太子以織成諸臣用錦為之一品二品冠五梁中書門下加籠巾貂蟬諸司三品三梁四品五品二梁御史臺四品兩省五品亦三梁而綬有暈錦黄獅子方勝練鵲四等之殊六品則去劒珮綬隋唐冠服皆以品為定蓋其時官與品輕重相准故也今有品有官有職以品與職定冠綬之制則高下相牴牾請以官為定庶名實相副輕重有准仍分官為七等冠綬亦如是七梁冠金塗銀稜貂蟬籠巾蟬舊以玳瑁為蝴蝶狀今乃改為金附蟬犀簪導銀立筆朱衣朱裳白羅中單並皂褾襈蔽膝隨裳色方心曲領緋白羅大帶革帶玉佩錦綬以天下樂暈錦青絲網間施三玉環白襪黑履革帶以金塗銀稜玉佩以金塗銀裝為第一等宰相親王使相三師三公服之七梁冠無貂蟬籠巾銀裝玉佩雜花暈錦綬餘同三公服為第二等樞宻使知樞宻院執政官東宫三師服之六梁冠白紗中單銀革帶佩方勝宜男錦綬銀環餘同七梁冠服為第三等大學士學士直學士東宫三少御史大夫中丞六曹尚書侍郎殿中監大司成散騎常侍特進金紫銀青光禄三大夫太尉節度使左右金吾衛上將軍服之五梁冠翠毛錦綬餘同六梁冠服太子賔客詹事給事中中書舍人諫議大夫待制九等卿大司樂祕書監殿中少監國子祭酒宣奉通奉通議大中中大夫中奉中散大夫上將軍節度觀察留後觀察使通侍大夫樞宻都承㫖服之四梁冠簇四盤雕錦綬餘同五梁冠服九寺少卿大晟典樂祕書少監國子辟廱司業少府將作軍器都水使者起居郎起居舍人侍御史太子左右庶子少詹事諭徳尚書左右司郎中員外六曹諸司郎中朝議奉直朝請朝散朝奉大夫防禦團練使刺史大將軍正侍中侍中亮中衛拱衛左武右武大夫駙馬都尉帶遙郡武功大夫以下樞宻副都承㫖服之三梁冠金塗銅革帶佩黄獅子錦綬鍮石環餘同四梁冠服殿中侍御史監察御史司諫正言尚書六曹員外郎外符寶郎少府監作監軍器少監太子侍讀侍講中舍人親王府翊善侍讀侍講九寺祕書殿中少監辟廱丞大晟樂令兩赤縣令大理正司直評事著作郎祕書郎著作佐郎太常宗學國子辟廱博士太史局令正丞五官正朝請朝散朝奉承議奉議通直郎中亮中衛拱御左武右武郎諸衛將軍率府率武功武徳武顯武節武畧武經武義武翼郎醫職翰林醫正以上内符寶郎閤門通事舍人敦武脩武郎服之二梁冠角簪方勝練鵲錦綬餘同三梁冠服在京職事官閤門祗候看班祗候率府副率升輦輅立侍内臣服之御史大夫中丞刑部尚書侍郎大理卿少卿侍御史刑部郎中大理寺正丞司直評事並冠獬豸冠服青荷蓮綬錦羣臣祭服之制正一品九旒冕金塗銀稜有額花犀簪青衣畫降龍朱裳蔽膝白羅中單大帶革帶玉佩錦綬青絲網玉環朱襪履革帶以金塗銀稜玉佩以金塗銀裝綬以天下樂暈錦親祠大理使亞獻終獻太宰少宰左丞每嵗大祠宰臣親王執政官郡王充初獻服之奏告官以依本品服已下准此從一品九旒冕無額花白綾中單紅錦綬銀環金塗銀佩餘如正一品服親祠吏部户部禮部兵部工部尚書太廟進受幣爵奉幣爵宗室每嵗大祠捧俎官大祠中祠初獻官服之二品七旒冕角簪青衣無降龍餘如從一品服親祠吏部侍中殿中監大司樂光禄卿讀冊官太廟薦俎贊進飲福宗室七祀配享功臣分獻官每嵗大祀謂用宫架者大司樂大祠中祠亞終獻大祠禮官小祠獻官朔祭太常卿服之三品五旒冕皂綾綬銅環金塗銅革帶佩餘如二品服親祠舉冊官太樂令光禄丞捧俎饌籩豆簠簋官分獻官分獻壇壝從祀太廟奉瓚盤薦香燈安奉神主奉毛血槃蕭篚肝膋豆宗室每嵗祠祭太樂令大中祠分獻官服之無旒冕素青衣朱裳蔽膝無佩綬餘如三品服奉禮協律郎郊社令太祝太官令親祠擡鼎官進摶黍官太廟供亞終獻金斚供七祀獻官執爵官服之五旒冕紫檀絁衣餘如三品服監察御史服之三都初獻八旒冕經畧安撫鈐轄初獻六旒冕亞獻並二旒冕終獻無旒節鎮防團軍初獻四旒冕亞獻終獻並無旒冕百官公服舊制三品以上紫五品以上朱七品綠九品青元豐之制去青不用階官至四品服紫至六品服緋皆象笏佩魚九品以上則服緑以木為笏上挫下方武臣内侍皆服紫而不佩魚假版官及伎術若公人之入品者並聽服緑官應品而服色未易與品未及而已易者或以年格或以特恩治平四年京朝官衣緋緑十五年熙寜元年見任陞朝官衣緑正郎以上衣緋二十年並改服色此特恩也又令臣僚嘗奉使北朝及接押伴使人遇到關起居赴宴曾借服者聽服入朝凡帶有玉有金有銀有犀其下銅鐵石角墨玉之𩔖各有等差玉帶不許施於公服犀非品官通犀非特㫖皆禁銅鐵角石墨玉之𩔖民庶及郡縣吏伎術等人皆得服之熙寜六年収復熙河二州帝御紫宸殿宰臣王安石率羣臣稱賀上遂解所服玉帶賜焉八年岐王顥嘉王頵言䝉賜方團玉帶著為朝儀乞寶藏於家不敢服用帝不之許命工别琢玉帶以賜之顥頵等固辭不聽請加佩金魚以别嫌詔以魚賜之親王佩玉魚自此始也元豐五年詔三師三公宰相執政開府儀同三司節度使嘗任宰相者觀文殿學士以上金毬文方團佩魚觀文殿學士至寶文閣直學士節度使御史大夫中丞六曹尚書侍郎散騎常侍御仙花帶内御史大夫六曹尚書翰林學士以上及資政殿學士特班翰林學士上者仍佩魚大觀二年詔中書舍人諫議大夫待制殿中少監紅鞓帶不佩魚詳定禮文所言古者祭服皆元衣纁裳以象天地之色裳之飾有藻粉米黼黻考工記曰白與黑謂之黼黑與青謂之黻今祭服上衣以青其繡於裳者藻及粉米皆五色圓花藉之而黼用藍黻用碧與黄且虎蜼共一章粉米共一章今皆異章而畫不應古制請下有司製五冕之服章衮冕之章九衣繪龍山華蟲火虎蜼裳繡藻粉米黼黻鷩冕之章七衣繪華蟲火虎蜼裳繡藻粉米黼黻毳冕之章五衣畫虎蜼藻粉米裳繡黼黻絺冕之章三衣繪粉米裳繡黼黻元冕衣無章裳刺黼黻爵弁則緇衣纁裳從之詳定儀注所言按周以上祭服無劒而有屨故周官司服之職悉不著劍自秦及西漢艱危用武之時朝祭服皆佩劒東漢大祭祀玉佩約屨以行事惟朝尚佩劒晉制服劒以木代之謂之班劒東齊謂之象劒今冬正大朝㑹若服三代之冕服而用三代之禮則去劒可也若服秦漢之服而用秦漢之禮則可存劒然文武異容佩劒之制不當施於朝事又周禮以不脫屨為恭以脫屨為相親今冬正朝㑹若用周禮則服當無劒若襲秦漢之故又恐佩劒而趋朝脫屨而示恭與三代禮意不合其冬正朝㑹乞約用周禮不服劒不脫屨舄從之而禮文所亦言儀禮尸坐不脱屨鄭氏以為侍神不敢惰又古者朝服不佩劒秦始加之後漢祭服亦不佩劒劒者武備服以事神於義無取今祭祀用三代冕服而加以秦劒尤為失禮於是又去景靈宫太廟南郊儀注及熙寜祀儀内解劒脫舄履之節又言古者諸侯及羣臣助祭本無執玉帛羔鴈之儀故雖冕服但當執笏玉藻曰見於天子與射無說笏入太廟説笏非古也說者以為太廟之中唯君當事說笏非是請羣臣冕服助祭執笏當事則搢笏其陪位官亦合冕服執笏從之又言古者六冕皆赤舄詩曰王錫韓侯元衮赤舄則諸侯之舄與王同孔頴達亦謂卿大夫服冕者赤舄餘服則屨士冠禮曰爵弁纁屨黑絇繶純周禮屨人掌王及后之服屨為赤繶黄繶青句素屨葛屨而説者曰複下曰舄襌下曰屨而有絇有繶有純者飾也凡舄之飾如繢次故舄之飾用對方之色赤舄黑飾是也凡屨之飾如繡次故屨之飾用北方之色白屨黑飾是也今冕服赤舄自天子至四品官及監察監禮太祝奉禮皆以襌下為之無舄屨之别又無絇繶純之飾伏請六冕並用赤舄皆複下為之以縧為口縁又綴縧於牙底相接之縫中以繒一寸屈之為絇著於屨首容穿繫以結於足為之行戒皆飾以黑云哲宗元祐元年太常寺言舊制大禮行事執事官皆服祭服餘服朝服至元豐七年吕升卿始有行事及陪祠官並服祭服之儀今欲令行事執事官並服祭服其贊引行事禮儀使太常卿太常博士閤門使樞宻院官進接圭殿中監止供奉皇帝其陪位官止導駕押宿及主管事務并他處行事官仍服朝服從之五月禮部言元豐所造大裘雖用黑羔皮乃作短袍様襲於衮衣之下仍與衮服同冕未合典禮下禮部太常寺共議禮部員外郎何洵直在元豐中嘗預詳定以陸佃所議有可疑者八按周禮節服氏掌祭祀朝覲衮冕六人維王之太常郊祀裘冕二人既云衮冕又云裘冕是衮與裘各有冕乃云裘與衮同冕當以衮襲之裘既無冕又襲於衮中裘而表衮何以示裘衮之别哉古人雖質不應以裘為夏服蓋冬用大裘當暑則以同色繒為之記曰郊祭之日王被衮以象天若謂裘上被衮以被為襲則家語亦有被裘象天之文諸儒或言臨燔柴脫衮冕著大裘或云脱裘服衮蓋裘衮無同冕兼服之理今乃以二服合為一可乎且大裘天子吉服之最上若大圭大路之比是裘之在表者記曰大裘不裼説者曰無别衣以裼之蓋他服之裘䙝故表裘不入公門事天以報本復始故露質見素不為表襮而冕亦無旒何必服他衣以藩飾之乎凡裘上有衣謂之裼裼上有衣謂之襲襲者裘上二重衣也大裘本不裼鄭志乃云裘上有元衣與裘同色蓋趙商之徒附㑹為説不與經合襲之為義本出於重㳫非一衣也古者齋祭異冠齋服降祭服一等祀昊天上帝五帝以裘冕祭則衮冕齋故鄭氏云王齋服衮冕者祀天之齋服也唐開元之時始以衮冕為齋服裘冕為祭服兼與張融臨燔柴脫衮服裘之義合請從唐制兼改製大裘以黑繒為之佃復破其説曰夫大裘而冕謂之裘冕非大裘而冕謂之衮冕則裘冕必服衮衮冕不必服裘今特言衮冕者主冬至言之周禮司裘掌為大裘以共王祀天之服則祀地不服大裘以夏日至不可服裘故也今謂之大裘當暑以同色纁為之尤不經見兼裼襲一衣而已初無重沓之義被裘而覆之則曰襲袒而露裘之美則曰裼所謂大裘不裼則非衮而何玉藻曰禮不盛服不充故大裘不裼則眀不裼而襲也充美也鄭氏謂大裘之上有元衣雖不知覆裘以衮然尚知大裘不可徒服必有元衣以覆之玉藻有尸襲之義周禮裘冕注云裘冕者從尸服也夫尸服大裘而襲則王服大裘而襲可知且裘不可以徒服故被以衮豈借衮以為飾哉今謂祭天用衮冕為齊服裘冕為祭服此乃襲先儒之謬誤後漢顯宗初服日月星辰十二章以祀天地自魏以來皆用衮服則漢魏祭天嘗服衮矣雖無大裘未能盡合於禮固未嘗有表裘而祭者也且裘内服也同袍䙝矣而欲襌以祭天以眀示質是欲衩衣以見上帝也洵直復謂大裘之裳纁色而無章飾夫裘安得有裳哉請從先帝所定其後詔去黑羔皮而以黑繒製造焉徽宗大觀元年議禮局言太社太學獻官祝禮皆以法服奉祀至郡邑則用常服乞降祭服詔頒制度於州郡然未眀製造至政和間始詔州縣冠服形製詭異令禮制局造様頒下轉運司製造以給州縣焉大觀中復詔置局議禮於是宇文粹中上所編祭服製度其論冕曰古者冕以木版為中廣八寸長尺六寸後方前圓後仰前低染三十升之布元表朱裏後方者不變之體前圓者無方之用仰而元者升而辨於物俛而朱者降而與萬物相見後世以繒易布故純儉今羣臣冕版長一尺二寸闊六寸二分非古廣長之制以青羅為覆以金鍍銀稜為飾非古元表朱裏之制乞下有司改正古者冕之名雖有五而繅就旒玉則視其命數以為等差合綵絲為繩用以貫玉謂之繅以一玉為一成結之使不相并謂之就就間相去一寸則九玉者九寸七玉者七寸各以旒數長短為差今羣臣之冕用藥玉青珠五色茸線非玉藻三采二采之義每旒之長各八寸非旒數長短為差之義又獻官冕服雜以諸侯之制而一品服衮冕臣竊以為非宜元豐中禮官建言請資政殿大學士以上侍祠鷩冕觀察使以上服毳冕監察御史以上服絺冕朝官以上服元冕選人以上爵弁詔許之而不用爵弁供奉官以下至選人盡服元冕無旒臣竊謂依此參定乃合禮制古者三公一命衮則三公在朝其服當鷩冕蓋出封則逺君而伸在朝則近君而屈今之攝事及侍祠皆在朝之臣也在朝之臣乃與古之出封者同命數非先王之意乞下有司制鷩冕八旒毳冕六旒絺冕四旒元冕三旒其次二旒又其次無旒依元豐詔㫖參酌等降為侍祠及攝祭之服長短之度采色之别皆乞依古制施行又按周禮諸侯爵有五等而服則三所謂公之服自衮冕而下侯伯自鷩冕而下子男自毳冕而下是古者諸侯有君之道故其服以五七九為節今之郡守雖曰猶古之侯伯其實皆王臣也欲乞只用羣臣之服自鷩冕而下分為三等三都四輔為一等初獻鷩冕八旒經畧安撫鈐轄為一等初獻毳冕六旒亞獻並元冕二旒終獻無旒節鎮防團軍事為一等初獻絺冕四旒亞終獻並元冕無旒其衣服之制則各從其冕之等又曰今之紘組仍綴兩繒帶而結於頥冕旁仍垂青纊而不以瑱以犀為簪而不以玉笄象笄並非古制乞下有司改正從之政和三年議禮局上皇帝冕服之制衮冕冕版廣八寸長一尺六寸前高八寸五分後高九寸五分青表朱裏前後各十有二旒五采藻十有二就就間相去一寸青碧錦織天河帶長一丈二尺廣二寸朱絲組帶為纓黈纊充耳金飾玉簪導長一尺二寸衮服青衣八章繪日月星辰山龍華蟲火宗彛纁裳四章繡藻米粉黼黻蔽膝隨裳色繡升龍二白羅中單皂褾襈紅羅勒帛青羅袜帶緋白羅大帶革帶白玉雙佩大綬六采赤黄黑白縹緑小綬三色如大綬間施玉環三朱襪赤舄黄羅緣親祠服之大裘青表纁裏黑羔皮為領褾襈朱裳被以衮服冬至祀昊天上帝服之通天冠二十四梁加金博山附蟬高一尺廣一尺犀簪導朱絲組帶為纓絳紗袍織成雲龍皂羅褾襈紅羅為裏絳紗裙蔽膝如袍飾並皂褾襈繡雲龍白羅方心曲領革帶餘同冕服大祭致齋詣景靈宫太廟行宫禮畢還宮元正冬至大朝㑹臨軒冊命皇后皇太子諸王大臣親耕籍田服之詔通行議禮局上所定皇太子服飾之制衮冕垂白珠九旒紅組絲為纓青纊充耳犀簪導青衣朱裳九章五章在衣山龍華蟲火宗彛四章在裳藻米黼黻白紗中單青褾襈裾革帶塗金銀鉤䚢蔽膝隨裳色為火山二章瑜玉雙佩四采織成大綬間施玉環三白襪朱舄舄加金塗銀鈿加元服從袍納妃釋奠文宣王服具服逺遊冠十八梁金塗銀花飾博山附蟬紅絲組為纓犀簪導朱眀服紅裳白紗中單方心曲領絳紗蔽膝白襪黑舄餘同衮冕受冊謁太廟服之詔頒行七年初作眀堂禮制局言周禮祀昊天上帝則大裘而冕祀五帝亦如之享先王則衮冕祀昊天上帝則郊祀是也享先王則宗祀在其中蓋於大裘舉正位以見配位於衮冕舉配位以見正位以天道事之則舉尊眀卑以人道事之則舉卑眀尊眀堂以人道享上帝與郊祀異請從衮冕從之八年十二月編𩔖御筆所禮制局奏令討論舄屨制度下項絇履上飾也繶飾底也純縁也綦履帶也古者舄屨各隨裳之色有赤舄白舄黑舄今屨欲用黑革為之其絇繶純綦並隨服色用之以倣古隨裳色之意奉聖㫖依議定仍令禮制局造三十副下開封府給散舖户為様制賣禮制局奏先議定屨各隨服色緣武臣服色止是一等理宜有别奉聖㫖文武官大夫以上四飾全朝請武功郎以下減去一繶並稱履宣義宣教郎以下至將校伎術官減去二繶純並稱履高宗紹興元年宗祀眀堂僅有朝服十三副祭服六十二副乃命工部增造祭服六十三副及贊者樂武之服贊者緋羅寛衫介幘樂正降公服引舞武弁冠緋繡抹額鸞衫革帶履又幞頭紫繡袍抹額文武舞人紫絁冕皂繡袍革帶履樂正幘緋絹寛衫勒帶國子監丞王普言近世冕服制度沿襲失真夫後方前圓後仰前低元表朱裏此冕之制也今則方圓俯仰幾於無辨且以青為表而飾以金銀矣衣元裳纁裳前三幅後四幅此衣裳之制也今則衣色以青裳色以緋且為六幅而不殊矣山以章也今則以嶞火以圓也今則以鋭宗彜宗廟虎蜼之彛也乃畫虎蜼之狀而不為彜粉米米而粉之者也乃分為二章而以五色圓花為藉佩有衡璜琚瑀衝牙而已乃加以雙滴而重設二衡綬以貫佩玉而已乃列為錦綬而間以雙環以至帶無紐約芾無肩頸舄無絇繶中衣無連裳其他訛謬未暇悉舉祖宗屢嘗講究以舊服數多不欲廢棄渡江之後舊服無存者明堂所造纔數十副宜因兹改作是正訛舛一從周制事下太常五月禮官言國家承唐舊初有五冕之名其後去三公衮冕及絺冕但存七旒鷩冕五旒毳冕無旒元冕凡三等自尚書服毳至光禄丞亦服焉貴賤無差宜增鷩冕為八旒毳冕為六旒復置絺冕為四旒并無旒元冕為四等其他制作失宜當改正者令普以圖式送寺修改十三年禮部侍郎王賞言按周禮王祀昊天上帝服大裘而冕元豐中何洵直議以黑繒作大裘如衮惟領袖用羔議者謂純用羔恐太重難服今請如洵直議從之皇太子之服中興後如政和制其後詔太子繫通犀玉帶不佩魚先是禮官參稽禮典謂無佩魚之文舊制親王賜玉帶加佩玉魚皇太子受冊服逺遊冠朱眀衣執桓圭謁太廟别廟行禮服衮冕朝謁景靈宫服常服七年三月禮官言朝謁景靈宫所服典故不載請依禮典服常服先是元年十一月詔皇太子遇大宴賜花比親王增其四欒枝二以羅製之淳熙十四年命皇太子參决隔日與宰執公裳繫鞋相見於議事堂嘉定二年七月皇太子奏製造冠冕合用珠玉皇后盡出首飾付道司節約之美超古冠今請宣付史館皇子之服紹興三十二年禮官言皇子鄧慶恭三王遇行事服朝服則七梁額花冠貂蟬籠巾金鍍銀立筆真玉佩綬金鍍銀革帶烏皮履若服祭服則金鍍銀八旒冕真玉佩綬金鍍銀革帶烏皮履緋羅襪詔文思院製造隆興二年令祇候庫以真玉為鄧慶恭王大禮所服玉佩綬羣臣祭服朝服之制中興後如政和初定羣臣章服之制魚袋紫以金緋以銀涖事及二十年者賜緋服緋及二十年者賜紫惟覃沛則凡服緑服緋十五年者皆改賜有司或自補官理嵗月紹興三十二年殿中侍御史張震言貴近之子初年受命則十五嵗已服緋初年賜緋則年未冠已賜紫失於太濫遂以出官之日為始比之蒞事所減已多比之初補粗為有節若勞績可稱或奏對稱㫖而特恩改賜者不拘此制紹興五年慶典致仕官朝奉郎八十以上賜章服京朝官八十以上賜緋緑及十年者亦改賜若庶官除侍郎服緋緑者謝日改賜章服則始於建炎四年之詔内外臣僚以減磨勘轉官及郊禋恩囘授父改章服則始於紹興五年從葛與時周葵之請其特賜章服者張所以招撫河北陳公輔以諫臣論奏得體李徳鄰李朝正以縣令召對司業高閱祭酒林光朝祕書少監游操陳騤鄭丙以車駕幸學省餘不勝紀隆興二年賜呉益紫花羅公服用韋淵例乾道四年賜鄭澡淳熙十六年賜郭師禹乾道四年賜太學上舍生左承務郎黄倫袍笏於崇化堂祇受後釋褐皆如之中興以來文武臣初除正謝進士唱名賜襲衣章服及百官賜時服並遵用省記崇寜看詳祇候庫格乾道二年户部言左藏東西庫每嵗所賜錦袍親王宰執以全疋餘裁裂給之請皆以全疋上從之技術官之服有紫緋緑乾道四年太上皇帝以朱仲謙醫蘂之勞賜紫有司言舊制醫官未曾賜緋黄等賜紫者許執奏詔特於祇候庫給賜若安南國加恩則賜衣一襲紫羅夾公裳綾汗衫勒帛袴紅羅夾繡三檐舊制服帶乘輿東宫以玉輔臣侍從以金親王勲舊間賜以玉其次有犀有角玉帶乘輿以排方東宫不佩魚親王佩玉魚大臣勲舊佩金魚中興以來宗室如居廣士輵璩伯圭勲臣如劉光世呉璘舊弼如史浩外戚如呉蓋楊次山等皆賜玉帶以示異恩其賜金帶及紅鞓犀帶佩魚如元豐以來故事紹興元年詔已給賜者不再賜遷除合加魚袋者賜之三年詔侍從金帶於左藏庫關借管軍帶御器械朝謝武臣朝辭賜金帶並許繫宗室正任及殿庭供職横行亦如之是嵗賜岳飛金帶金束帶賜其將佐其花犀帶非宗室不許服閤門官亦許繫金帶或以左藏庫權借經筵進講終篇講官賜金帶象簡鞍馬紹興二十五年講易終篇賜宰輔犀侍讀已下金帶或加賜金魚淳熙七年讀三朝寶訓終篇宰輔賜犀金帶侍讀以下賜鞍馬紹興九年詔太常寺應奉祇應使臣亦依閤門例服紅鞓帶前宰執不帶職者同庶官復職者亦許繫笏頭毬文金帶詔興六年秦檜以觀文殿學士朝見因有是命乾道三年姜詵以曹臣賜金御仙花帶後權工部侍郎詔依本班服繫又太上皇帝賜浙東提㸃刑獄張津金帶四年三月詔樞宻院諸房副承㫖令祇候庫賜金帶八年詔左諫議大夫姚憲嘗為侍郎賜金帶令依舊服繫著為例又詔中書舍人左右諫議大夫龍圖閣至敷文閣待制權侍郎服紅鞓排方黑犀帶仍佩魚故事從官不帶待制以上職名而罷者止服黑帶佩魚淳熈十年始詔權侍郎以上罷任不帶職許服紅鞓排方黑犀帶佩魚淳熙元年幸玉津園燕射保信軍節度使鄭藻起居舍人王卿月等中的賜襲衣金帶三年詔武臣知州軍官未陞朝者依文臣守倅借服色例權繋紅鞓角帶回日依舊紹熙四年四川制置使京鏜因任賜金帶嘉定十四年詔宗室節度使帶嗣王郡王國公及檢校并許佩魚高宗皇帝初開大元帥府服排方玉帶語汪伯彦等曰吾陛辭日皇帝賜以寵行吾遜辭久之皇帝曰朕昔在東宫太上解此帶賜朕卿宜收取不得已拜賜建炎元年賜宗澤襲衣金帶紹興二年賜韓世忠帶笏二十五年賜安南李天祚襲衣御仙花帶凡郊祀加恩及襲封皆賜焉并馬二匹金鍍銀鞍轡纓紱其賜外國金帶皆以銀為匣嘉定中真徳秀余李辜陳晐以帥臣楊簡以耆儒各賜金帶也高宗初踐阼於南都隆祐太后命内臣上乘輿服御有小冠太后曰祖宗閒燕之所服也退朝㡌而不巾否則小冠自神宗始易以巾願即位後退朝間燕止戴此冠庶幾如祖宗時氣象也履袍亦曰靴袍乾道七年改履為靴赭黄淡黄袍衫玉裝紅束帛紋鞾大宴則服之赭黄淡黄䙆袍衫紅袍常朝服之窄袍便坐視事服之赭黄袍衫而下皆皂紗折上巾通犀金玉環帶窄袍或御烏紗㡌黄袍忌前一日服之紹興五年五月車駕欵謁太廟别廟其日乃忌前禮官請禁中先服紅袍詣廟行禮畢還内至宫中易忌前之服後殿早講皇帝服㡌子紅袍玉束帶講讀說書官公服繋鞋晩講皇帝服頭巾背子講官易便服此嘉定四年講筵之制也石林葉氏燕語曰余見大父時家居及燕見賔客率多頂㡌而繋勒帛猶未甚服背子㡌下戴小冠簪以帛作横幅約髪號額子處室中則去㡌見冠簪或用頭巾也古者士皆有冠㡌乃冠之遺製頭巾賤者不冠之服耳勒帛亦垂紳之意雖施之外不為簡背子本半臂武士服何取於禮乎或云勒帛不便於搢笏故稍易背子然湏用上襟腋下與背子垂帶余大觀間見宰執接堂吏押文書猶冠㡌用背子今亦廢矣而背子又引為長袖與半臂製亦不同裹賤者巾衣武士服而習俗之久不以為異古禮之廢大抵𩔖此也又曰劉丞相摯家法儉素閨門雍睦凡冠巾衣服制度自其先世以來常守一法不隨時増損故承平時其子弟雜處士大夫間望而知其為劉氏也數十年來衣服詭異雖故老逹官亦不免從俗與市井諠浮畧同而不以為非舊鳯翔郿縣出縚以緊細如箸者為貴近嵗衣道服者縚以大為美圍率三四寸長二丈餘重複腰間至五七返以真茸為之一縚有直十餘千者此何理也程氏演繁露曰襦者短衫也莊子曰未解裾襦亷范𫝊曰昔民無襦今五袴也褐者裾垂至地張良𫝊有老父衣褐至良所師古曰褐制若裘今道士所服者是也裘即如今之道服也斜領交裾與今長背子畧同其異者背子開袴裘則逢合兩腋也然今世道士所服又畧與裘異裘之兩裾交相掩擁而道士則兩裾直垂也師古畧舉其概故不能詳也長背子古無之或云近出宣政間然小說載蘇文忠襌衣襯朝服即在宣政之前矣詳今長背既與裘製大同小異而與古中單又大相似殆加減其制而為之耳則中單腋下縫合而背子則離異其裾中單兩腋各有帶穴其腋而互穿之以約定裏衣至背子則既悉去其帶惟此為異也至其用以襯藉公裳則意制全是中單也今世好古而存舊者縫兩帶綴背子腋下垂而不用蓋放中單之交帶也雖不以束衣而遂舒垂之欲存古也太平御覽有仙公請問經其文曰太極真人曰學道當潔淨衣服備巾褐制度名曰道之法服也巾者冠中之巾也褐者長裾通冐其外衣也巾褐皆具乃中道家法服之制今世衣直掇為道服者必本諸此也又𫝊授經曰老子去周左慈在魏並葛巾單裙不著褐則是直著短衫而以裙束其上不用道家法服也晉王獻之書羊欣練裙朱公叔絶交論謂西華之子冬月葛衣練裙蓋古人不徒衣袴必以裙襲之是正上衣下裳之制也文獻通考卷一百十三
