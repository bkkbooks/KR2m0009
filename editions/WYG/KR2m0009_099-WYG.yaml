body:
  text: 文獻通考卷九十九鄱陽馬端臨貴與著宗廟考九祭祀時享親饗太廟别廟行禮儀注誓戒如紹興修立郊祀誓戒儀注惟不置郊社令誓文曰今年七月十四皇帝為登寳位親行朝享太廟别廟各揚其職其或不恭國有常刑致齋皇帝散齋七日於别殿致齋三日於齋殿至行禮日自齋殿詣太廟餘如郊祀儀注陳設並同郊祀前一日朝享太廟禮惟不設四方客使次及陳諸州歲貢并實俎不以牛止用羊豕省牲器儀注如紹興十三年親享唯舊用未後二刻掃除廟内外陳設祭器幣篚三刻省牲饌鼎鑊樂器等今用其日質明車駕自齋殿詣太廟其日文武侍祠行事執事助祭官宗室先詣太廟祠所其從駕臣僚並服常服就次有司進輦於齋殿其從駕臣僚並俟從駕次禮直官宣贊舍人引禮部侍郎奏請中嚴少頃又奏外辦皇帝自内服履袍詣齋殿即御座鳴鞭行門禁衞諸班親從等諸司祗應人員以下各自贊常起居次知客省事以下樞密都承㫖以下入内内侍省都知以下帶御器械官應奉祗應通侍大夫以下武功大夫以下及幹辦庫務文臣一班常起居宣贊舍人贊從駕臣僚並常起居凡起居者止奏聖躬萬福次管軍臣僚並常起居該宣名即宣名若得㫖免起居更不起居皇帝乘輦降自西階稱警蹕侍衛如常儀出和寧門將至太廟御史臺閤門分引文武助祭官宗室禮直官贊者引行事執事官俱詣廟櫺星門外立班再拜奉迎訖退内已奏起居止奏聖躬萬福皇帝乘輦入櫺星門至大次侍衛如常儀皇帝降輦入大次簾降舍人承㫖敕羣官各還次以俟立班行禮晨祼並同郊祀前朝享太廟禮但諸帝室既祼鬯後禮儀使引皇帝至别廟后室前祼鬯如上儀饋食並同郊祀前朝享太廟禮惟無牛鼎爼亞終獻皇帝飲福神主入室並同紹興十三年儀注唯飲福不用牛爼車駕還内臣僚禁衛等起居迎駕奏聖躬萬福訖以俟從駕還内並如來儀禮部郎中奏解嚴宣贊舍人承㫖敕羣官各還次將士各還其所太廟時享儀注時日太常寺預於隔季以孟春擇日享太廟别廟關太史局孟夏孟秋孟冬並准此若臘享則預於隔季以季冬臘日享太廟别廟太史局擇日報太常寺臘享則以其日報太常寺太常寺參酌訖具時告散官齋戒前享十日受誓戒於尚書省其日五鼓贊者設位版於都堂下初獻官在左刑部尚書在右並南向亞終獻位於其南稍東北向西上若冬享臘享則又設禮官位於終獻之東其揖位省牲位省饌位准此監察御史位於其西稍北東向兵部工部尚書押樂太常卿光祿卿押樂太常丞光祿丞位於其南稍西北向東上凡設太常丞光祿丞位皆稍却奉禮協律郎太祝太官宫闈令位於其東西向北上捧俎官薦香燈官位其後質明贊者引行事執事官就位立定禮直官引初獻降階就位禮直官贊揖在位者對揖初獻搢笏讀誓文云某月某日孟春薦享太廟别廟夏云孟夏秋云孟秋冬云孟冬臘享云季冬臘享各揚其職不共其事國有常刑讀訖執笏禮直官贊奉禮協律郎太祝太官宫闈令以下先退餘官對拜乃退散齋七日治事如故宿於正寢不弔喪問疾作樂判書刑殺文書决罰罪人及與穢惡致齋三日光祿卿丞太官令齋一日二日於本司宗室於睦親宅都㕔如相妨即於宗學餘官無本司者並於太廟齋坊質明至齋所唯享事得行其餘悉禁前享一日質明俱赴祠所齋宫官給酒饌享官已齋而闕者通攝行事陳設前享三日儀鸞司設饌幔於東神門外别廟於本廟每室饌幔各一若冬享則設配享功臣次於殿下横街之南東西相向每室配享功臣各為一次若臘享則設七祀次一於横街之北道西東向前二日有司牽牲詣祠所前一日宫闈令帥其屬掃除廟之内外太常設祭器凡設祭器皆藉以席籩豆又加巾蓋以俟告潔既畢權徹有司陳牲於東神門外當門西向祝史各位於牲後太常設省位於牲西三獻官在道南北向兵部工部尚書押樂太常卿光祿卿押樂太常丞光祿丞奉禮協律郎太祝太官宫闈令在道北南向俱西上凡設押樂太常丞以下位皆稍却若享日則不設光祿卿丞宫闈令位監察御史於兵部尚書之西少北太常陳禮饌於東神門外却東道北南向設省饌位版於禮饌之南三獻官在南北向西上監察御史在西東向兵部尚書押樂太常卿光祿卿押樂太常丞光祿丞奉禮協律郎太祝太官宫闈令在東西向北上捧俎官薦香燈官在其後太常設登歌之樂於太廟别廟殿上前楹間却南北向設宫架於太廟庭中立舞表於酇綴之間享日丑前五刻禮直官贊者諸司職掌各服其事宫闈令入殿開室整拂神幄帥其屬掃除鋪筵在室内北墉下南向几在筵上如常儀太常陳幣篚各於神位前之左幣以白一祝版各於神位之右置於坫次祭器實之每室左二十有六籩為四行以右為上右二十有六豆為四行以左為上俎二一在籩前實以羊腥七體一在豆前實以豕腥七體其載如羊又俎六在豆右為三重以北為上第一重實以羊豕首各一第二重實以羊腥腸胃肺离肺一在上端刌肺三次之腸三胃三又次之一實以豕腥膚九横載第三重一實以羊熟腸胃肺一實以豕熟膚其載如腥皆羊在左豕在右豋一在籩豆間實以太羮鉶三在豋前實以羮加笔滑簠八簋八在籩豆外二俎間簠在左簋在右簠實以稻粱粱在稻前簋實以黍稷稷在黍前豋一在籩之左實以肝膋槃一在室戸外稍東實以毛血爐炭於室戸外之左稍前置蕭蒿於篚設罇罍於殿上為二重著罇二加勺羃為上罇一實元酒一實醴齊初獻酌之壺罇二加勺羃一實元酒一實盎齊亞終獻酌之春夏設雞彝一并丹在著罇之右實以鬱鬯初獻酌之秋冬臘享則設斚􅂜加勺羃又設鳥􅂜一并丹在著罍之右實以明水秋冬臘享則設黄􅂜太罇二一實泛齊一實醴齊山罇二一實盎齊一實醍齊犧罇二一實沈齊一實事酒象罇二一實昔酒一實清酒罍皆實以明水俱北向西上皆加羃設而不酌爵坫三在罇之前太常設燭於神位前若冬享設配享功臣位于殿下横街之南次内若臘享則設七祀司命戸竈中霤門厲行於横街之上次内皆太常設神位席本廟設神位版太常設祭器實之又設俎二於東神門外每室饌幔内洗二於東階下直東霤北向盥洗在東爵洗在西罍在洗東加勺篚在洗西南肆實以巾若爵洗之篚則又實以珪瓚及别廟則實以璋瓚執罍篚者位其後若冬臘二享則又設禮官盥洗一於從祀神位前又設揖位於東神門外如省牲位唯不設光祿卿丞捧俎官薦香燈官宫闈令位開瘞坎於太廟别廟殿西階之東方深取足容物南出陛設望瘞位於太廟瘞坎之南如省饌之位唯不設光祿卿丞太官令捧俎官薦香燈官宫闈令若臘享則積七祀燎柴於西神門外又設三獻官席位於殿下東階之東南西向南立若冬享臘享則又設禮官位於終獻之北兵部工部尚書於其南西向北上監察御史押樂太常丞席位於殿庭之南北向奉禮協律郎太祝太官令位其後俱西上光祿卿席位於監察御史之東北向又設監察御史位於殿上前楹西架東向奉禮郎太祝在東西向北上押樂太常丞於樂虡之北太官令於酌罇所俱北向協律郎位二一於太廟殿上前楹間稍西一於宫架西北俱東向押樂太常卿位於宫架北北向省牲器同郊祀前朝享太廟禮晨祼享日丑前五刻行事春冬用丑時七刻夏秋用丑時一刻祠祭官引宫闈令入詣殿庭北向立祠祭官曰再拜宫闈令再拜升殿開室整拂神幄帥其屬掃除退就執事位次引薦香燈官入詣殿庭北向立凡宫闈令薦香燈捧俎官行事皆祠祭官引祠祭官曰再拜薦香燈官再拜升殿各就執事位次樂正帥工人二舞入就位太廟别廟登歌工人俟監察御史㸃閲訖升西階各就位次太官令光祿丞帥其屬實饌具畢光祿丞還齋所次引光祿卿入詣殿庭席位北向立贊者曰再拜光祿卿再拜升殿㸃視禮饌畢次引監察御史升殿㸃閲陳設糾察不如儀者凡㸃視及㸃閲皆先詣僖祖室以至次室及别廟光祿卿還齋所餘官各服祭服次引行事執事官詣東神門外揖位立定禮直官贊揖次引押樂太常卿太常丞協律郎次引監察御史奉禮郎太祝太官令入就殿下席位北向立次引初獻兵部工部尚書亞終獻入就殿下席位西向立若冬享臘享則引禮官祠祭官於殿上贊奉神主次引薦香燈官入室搢笏於祏室内奉帝主設於座奉神主詣神幄内於几後啓匱設於座以白羅巾覆之執笏退復執事位次引宫闈令奉后主奉别廟宫闈令奉后主如上儀以青羅巾覆之退復執事位祠祭官於殿上贊奉神主訖禮直官稍前贊有司謹具請行事贊者曰再拜在位者皆再拜次引監察御史押樂太常卿太常丞奉禮協律郎太祝太官令各就位立定太官令就僖祖位尊􅂜所次引初獻詣盥洗位北向立搢笏盥手帨手執笏詣爵洗位北向立搢笏洗瓚授執事者執笏升殿詣僖祖室罇􅂜所西向立執事者以瓚授初獻初獻搢笏跪執瓚執彜者舉羃太官令酌鬱鬯訖先詣宣祖室尊彝所北向初獻以瓚授執事者執笏興詣僖祖室神位前北向立搢笏跪次引奉禮郎搢笏西向跪執事者以瓚授奉禮郎奉禮郎奉瓚授初獻初獻執瓚以鬯祼地奠訖以瓚授執事者次執事者以幣授奉禮郎奉禮郎奉幣授初獻執笏興先詣宣祖室神位前西向立初獻受幣奠訖執笏俛伏興出戸外北向再拜次詣宣祖室太祖室太宗室眞宗室仁宗室英宗室神宗室哲宗室徽宗室欽宗室次降西側階詣别室升西階詣懿節皇后室安穆皇后室安恭皇后室祼鬯奠幣並如上儀訖降東側階由東廊俱復位立協律郎跪俛伏舉麾興工鼓柷宫架作興安之樂孝熙昭徳之舞九成偃麾戞敔樂止凡樂皆協律郎跪俛伏舉麾興工鼓柷而後作偃麾戞敔而後止既晨祼薦香燈官入取毛血奠於神座前别廟以太祝太官令取肝以鸞刀制之洗於鬱鬯貫之以膋燎於爐炭薦香燈官以肝膋入詔神於室别廟以太祝又出以隋祭於室戸外之左三祭於茅苴退復位饋食享日有司帥進饌者詣厨以匕升羊實於一俎肩臂臑在上端肫胳在下端正􅆃一直􅆃一横􅆃一長脅一短脅一代脅一皆二骨一並在中次升豕如羊實於一俎毎室羊豕各一俎入設於饌幔内俟初獻既升祼訖捧俎官及執事者捧俎入詣西階下北向北上次引兵部工部尚書詣西階下搢笏捧俎兵部奉羊工部奉豕升殿宫架豐安之樂作詣僖祖神位前北向跪奠先薦羊次薦豕各執笏俛伏興有司入設於豆右腸胃膚之前羊在左豕在右次詣每室奉俎並如上儀樂止次詣别廟奠俎如前太廟之儀唯登歌作肅安之樂降東側階由東廊復位初奠俎訖次引薦香燈官取蕭合黍稷擩於脂燎於爐炭當饋熟之時薦香燈官取菹擩於醢祭於豆間三又取黍稷肺祭如初俱藉以茅别廟以太祝退復位次引太祝詣僖祖室前東向立次引初獻再詣盥洗位宫架正安之樂作初獻升降行止皆作正安之樂至位北向立搢笏盥手帨手執笏詣爵洗内北向立搢笏洗爵拭爵以授執事者執笏升殿止登歌樂作詣僖祖室酌罇所西向立樂止登歌基命之樂作執事者以爵授初獻初獻搢笏跪執爵執罇者舉羃太官令酌著罇之醴齊訖先詣宣祖室酌罇所北向立初獻以爵授執事者執笏興入詣僖祖室神位前北向立搢笏執事者以爵授初獻初獻執爵祭酒三祭於茅苴奠爵執笏俛伏興出戸北向立樂止次太祝搢笏跪讀祝文讀訖執笏興先詣宣祖室戸外東向立初獻再拜次詣每室及詣别廟行禮並如上儀初獻詣别廟升降登歌作崇安之樂酌獻行禮登歌並作歆安之樂初獻將降階登歌作降階樂止宫架樂作復位樂止文舞退武舞進宫架作正安之樂舞者立定樂止次