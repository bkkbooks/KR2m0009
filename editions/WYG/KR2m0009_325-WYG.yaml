body:
  text: 文獻通考卷三百二十五鄱陽馬端臨貴與著四裔考二髙句麗髙句麗其先出夫餘王嘗得河伯女因閉於室内為日所照引身避之日影又逐既而有孕生一卵大如五升夫餘王棄之與犬豕皆不食棄於路牛馬避之棄於野衆鳥以毛茹之王剖之不能破遂還其母母以物褁置煖處有一男破而出及長字之曰朱䝉其俗言朱䝉者善射也夫餘人以朱蒙非人所生請除之王不聽命之飬馬朱䝉私試知其善惡駿者減食令瘦駑者善飬令肥夫餘王以肥者自乘瘦者給朱蒙後狩於田以朱䝉善射給一矢朱䝉雖一矢殪獸甚多夫餘之臣又謀殺之其母告朱蒙朱䝉乃與馬達等二人東南走中道遇大水欲濟無梁追者甚衆朱䝉告水曰我是日子河伯外孫今追兵垂及如何得濟於是魚鱉為之成橋朱蒙得渡魚鱉遂解追騎不得渡朱䝉遂至普述水遇見三人一著麻衣一著衲衣一著水藻衣與朱䝉至紇升骨城遂居焉號曰髙句麗因以髙為氏其在夫餘妻懷孕朱蒙逃後生子始閭諧及長知朱䝉為國王即與母亡歸之名曰閭達委之國事朱䝉死子如栗如栗死子莫来乃并夫餘其地在遼東之東千里南與朝鮮穢貃東與沃沮北與夫餘接地方二千里多大山深谷人隨而為居少田業故其俗莭於飲食而好修宫室言語法則與夫餘同盖其别種也跪拜曵一脚行歩皆走凡有五族有消奴部絶奴部順奴部灌奴部桂婁部案今髙麗五部一曰内部一名黄部即桂婁部也二曰北部一名後部即絶奴部也三曰東部一名左部即順奴部也四曰南部一名前部即灌奴部也五曰西部一名右部即消奴部也本消奴部為王稍㣲弱後桂婁部代之其置官有相加對盧沛者古鄒大加古鄒大加髙麗掌賔客之官如鴻臚也主簿優台使者皁衣先人漢武帝滅朝鮮以髙句麗為縣使屬元菟賜鼓吹伎人其俗滛皆潔淨自憙暮夜輒男女羣聚為倡樂好祠鬼神社稷靈星龍星左角曰天田則農祥也辰見祠以牛號曰靈星以十月祭天大會名曰賽盟其國東有大穴號隧神亦以十月迎而祭之其公會衣服皆錦繡金銀以自飾大加主簿皆著幘如冠幘而無後其小加著折風形如弁無牢獄有罪諸加主議便殺之沒入妻子為奴婢其婚嫁皆就婦家生子長大然後将還便稍營送終之具金銀財幣盡於厚𦵏積石為封亦種松栢其人性凶急有氣力習戰鬬好宼鈔沃沮東濊皆屬焉自武帝昭帝賜其人以衣幘朝服鼓吹常從元菟郡受之後稍驕不復詣郡但扵東界築小城受之名此城以為幘溝婁溝婁者髙麗名城也王莽初𤼵句麗兵代匈奴其人不欲行迫遣之皆亡出為宼盗莽令嚴尤誘髙麗侯入塞斬之更名髙句麗王為下句麗侯於是貃人宼邊愈甚光武建武八年遣使朝貢詔復其王號二十三年冬句麗􅅙支大加戴升等萬餘口詣樂浪内屬二十五年宼右北平漁陽上谷太原而遼東太守祭肜以恩信招之皆復欵塞後句麗王宫生而開目能視國人懷之及長壮勇數犯邊境和帝時宼遼東太守耿䕫擊破之安帝永初五年宫遣使貢獻求屬元菟元初五年復與􅐮貃宼元菟建光元年幽州刺史馮煥等将兵出塞擊之捕斬渠帥獲兵馬財物宫詐降而潜遣人攻元菟遼東焚城郭殺軍民𤼵兵救之而貃人已去夏復與遼東鮮卑八千餘人攻遼隊遼東縣名殺略吏人秋宫遂與馬韓濊貃數千騎圍元莵夫餘王遣子将三萬與州郡并力破之是嵗宫死子遂成立元莵太守姚先上言欲因其喪𤼵兵擊之議者皆以可許之尚書陳忠曰宫前桀黠先不能討死而擊之非義也宜遣弔問因責讓前罪赦不加誅取其後善安帝從之明年遂成還漢生口詣元莵降詔曰遂成等桀逆無状當斬斷菹醢以示百姓幸會赦令乞罪請降鮮卑濊貃連年宼鈔驅掠小民動以千計而裁送數十百人非向化之心也自今以後不與縣官戰鬬而自以親附送生口者皆與贖直縑人四十匹小口半之遂成死子伯固立其後濊貃率服東垂少事順帝陽嘉元年置元莵郡屯田六部質桓之間復犯遼東安平殺帶方令西安帶方縣並屬遼東郡掠得樂浪太守妻子建寧二年元莵太守耿臨討之斬首數百級伯固降服乞屬元莵云其後王伯固死有二子長曰㧞竒小曰伊夷摸㧞竒不肖國人共立伊夷摸為王自伯固時數宼遼東又受亡胡五百餘家獻帝建安中㧞竒怨為兄不得立與消奴加各将下戸三萬餘口詣公孫康降還住沸流水降胡亦叛伊夷摸伊夷摸更作新國都於丸都山下㧞竒遂徃遼東有子留句麗國古雛交駮位居是也伊夷摸死子位宫立以曾祖名宫生能開目視及長大果兇虐今王生亦能視句麗呼相似為位似其祖故名之為位宫宫有勇力便鞍馬魏齊王正始三年位宫冦遼西安平五年幽州刺史母邱儉将萬人出元莵討之戰扵沸流位宫敗走儉追至頳峴懸車束馬登丸都山屠其所都斬首萬餘級六年毋邱儉復討之位宫輕将諸加奔沃沮儉使王頎追之過沃沮千餘里到肅慎南界刻石紀功又刋丸都銘不耐城而還至位宫五葉孫釗晉康帝建元初慕容皝率兵伐之大敗單馬奔走皝乘勝追至丸都焚其宫室掠男女五萬餘口以歸釗後為百濟所殺其後慕容寳以句麗王安為平州牧封遼東帶方二國王安始置長史司馬參軍官後畧有遼東郡至孫髙璉東晋安帝義熙中遣長史髙翼獻赭白馬以璉為營州諸軍事髙麗王樂浪郡公宋武踐祚復加璉官少帝時璉遣使貢方物文帝元嘉中馮𢎞為魏所攻敗奔髙麗表求迎接文帝遣使迎之并令髙麗資送璉不欲𢎞南襲殺𢎞其後每嵗遣使十六年文帝侵魏詔璉送馬獻八百匹魏太武時璉遣貢使相尋嵗致黄金二百斤白銀四百斤孝文時璉貢獻倍前其報賜亦稍加璉死百餘嵗子雲立雲死子安立安死子延立延死子成立成死子陽立自東晋宋至於齊梁後魏後周其主皆受南北兩朝封爵分遣貢使初後魏時置諸國使邸齊使第一髙麗次之其國東至新羅西渡遼二千里南接百濟北隣靺鞨一千餘里自東晋以後其王所居平壤城即漢樂浪郡王險城自為慕容皝来伐後徙國内城移都此城亦曰長安城其地後漢時方二千里至魏南北漸徙才千餘里至隋漸大東西六千里長安城東六里隨山屈曲南臨浿水城内唯積倉儲器備寇賊至日方入固守王别為宅於其側不常居之其外復有國内城及漢城亦别都也其國中呼為三京復有遼東元莵數十城皆置官司以統攝與新羅每相侵奪戰争不息官有大對盧太大兄大兄小兄竟侯奢烏拙太大使者大使者小使者褥奢翳屬仙人凡十二等分掌内外事其大對盧則以强弱相陵奪而自為之不由王署置復有内評五事傉薩人皆頭著折風形如弁士人加挿二鳥羽貴者其冠曰蘇骨多用紫羅為之飾以金銀服大袖衫大口袴素皮帶黄革履婦人裙襦加襈書有五經三史三國志晉陽秋兵器與中國畧同及春秋校獵王自臨之稅布五疋穀五石游人則三年一稅十人共細布一匹租戸一石次七斗下五斗其刑法叛及謀逆者縛之柱􅅡而斬之籍沒其家盗則償十倍若貧不能償者以及公私債負皆聽評其子女為奴婢以償之用刑既峻罕有犯者樂有五絃琴筝篳篥横吹簫鼓之屬吹蘆以和曲每年初聚戲沮水上王乘腰輿列羽儀觀之事畢王以衣入水分為左右二部以水石相濺擲喧呼馳逐再三而止俗潔浄自喜尚容止以趨走為敬拜則曵一脚立多反拱行必挿手性多詭伏言辭鄙穢不簡親疎父子同川而浴共室而寝好歌舞常以十月祭天其公會衣服皆綿繡金銀以為飾好蹲踞食用爼几出三尺馬云本朱蒙所乘馬種即果下也風俗尚滛不以為愧俗多游女夫無常人夜則男女羣聚為戲無有貴賤之莭有婚嫁取男女相悅即為之男家送猪酒而已無有財聘之禮或有受財者人共恥之以為賣婢死者殯在屋内經三年擇吉日而𦵏居父母及夫喪服皆三年兄弟三月初哭泣𦵏則鼓舞以送之埋訖取死者生時服玩車馬置墓前㑹𦵏者争取而去信佛法敬鬼神多滛祠有神廟二所一日夫餘神刻木作婦人像曰髙登神云是其始祖夫餘神之子並置官司遣人守䕶盖河伯女朱䝉云及隋平陳後湯大懼陳兵積榖為守拒之䇿開皇十七年上賜璽書責以每遣使人嵗常朝貢雖稱蕃附誠莭未盡驅逼靺鞨禁固契丹昔年潜行貨利招動羣小私将弩手廵竄下國豈非意欲不臧故為竊盗坐使空館嚴加防守又數遣馬騎殺害邊人恒自猜疑宻覘消息殷勤暁示許其自新湯得書皇恐将表陳謝會病卒子元嗣文帝使拜元為上開府儀同三司襲爵遼東公賜服一襲元奉表謝恩并賀祥瑞因請封王文帝優册為王明年率靺鞨萬餘騎宼遼西營州總管韋世冲擊走之帝大怒命漢王諒為元帥總水陸軍討之下詔黜其爵位時餽運不繼六軍乏食師出臨榆闗復遇疾疫王師不振及次遼水元惶懼遣使謝罪上表稱遼東糞土臣元云云上乃罷兵待之如初元亦嵗遣朝貢煬帝嗣位天下全盛髙昌王突厥啟民可汗並親詣闕貢獻於是徵元入朝元懼藩禮頗闕大業七年帝親征髙麗車駕度遼水止營於遼東地分道出師各頓兵於其城下髙麗出戰多不利皆嬰城固守帝命諸軍攻之又敕諸将髙麗若降即宜撫納不得縱兵入城城将䧟賊輒言請降諸将奉㫖不敢赴機先馳奏比報賊守禦亦備復出拒戰如此者三帝不悟由是食盡師老轉輸不繼諸軍多敗績乃班師是行也唯於遼水西㧞賊武屬邏置遼東郡及通定鎮而還元年帝復親征敕諸軍以便宜從事諸将分道攻城賊勢日蹙會楊元感作亂六軍並還兵部侍郎斛斯政亡入髙麗髙麗具知事實盡銳来追殿軍多敗十年又𤼵天下兵會盗賊蜂起所在阻絶軍多失期至遼水髙麗亦困弊遣使乞降囚送斛斯政贖罪帝許之頓懷遠鎮受其降仍以俘囚軍實歸至京師以髙麗使親告太廟因拘留之仍徵元入朝元竟不至帝更圖後舉會天下喪亂遂不復行唐武徳四年遣使朝貢其國建官有九等其一曰吐捽昨沒反舊名大對盧總知國事次曰太大兄次欝折華言主簿次太大夫使者次皂衣頭大兄東夷相傳所謂皂衣先人者以前五官掌機宻謀政事徵𤼵兵馬選授官爵次大使者次大兄次収位使者次上位使者次小兄次諸兄次過莭次不過莭次先人又有状古鄒加掌賔客比鴻臚卿以大夫使者為之又有國子博士太學博士舍人通事典書客皆以小兄以上為之又其諸大城置傉薩比都督諸城置處閭近支比刺史亦謂之道使其武官曰大模達比衛将軍以皂衣頭大兄以上為之次末客比中郎将以大兄以上為之其次領千人以下各有差其國五部皆貴人之族詳見前碣石山在漢樂浪郡遂城縣長城起扵此山今驗長城東截遼水而入髙麗遺址猶存按尚書云夾右碣石入扵河古碣石即河赴海處在今北平郡南二十里則髙麗中為左碣石又平壤城東北有魯陽山魯城在其上西南二十里有葦山南臨浿水其大遼水源出靺鞨國西南山南流至安市小遼水源出遼山西南流與大梁水合大梁水在國西出塞外西南流注小遼水馬訾水一名鴨渌水水源出東北靺鞨白山水色似鴨頭故俗名之去遼東五百里經國内城南又西與一水合即鹽難水也二水合流西南至安平城入海髙麗之中此水最大波瀾清澈所經津濟皆貯大船其國恃此以為天塹水闊三百歩在平壤城西北四百八十里遼水東南四百八十里漢樂浪元莵郡之地自後漢至魏為公孫氏所據至淵滅西晉永嘉以後􅂧陥入髙麗其不耐屯有帶方安市平郭安平居龍文城皆漢二郡諸縣則朝鮮濊貊沃沮之地又遣使請道教詔沈叔安将天尊像并道士至其國講五千文開釋元宗自是始崇重之化行於國有踰釋典其後東部大人蓋蘇文弑其主髙武其王元在位十八年武元異母弟立其姪藏為王自為莫離支此官總選兵猶吏部兵部尚書於是號令逺近遂専國命蘇文鬚甚偉形體魁傑衣服冠履皆飾以金綵身佩五刀常挑臂髙歩意氣豪逸左右莫敢仰視常令武官貴人俯伏扵地登背上下馬七年二月遣使内附受正朔請頒歴許之八年三月髙祖謂侍臣曰髙麗稱臣於隋終拒煬帝此亦何臣之有朕敬扵萬物不欲驕貴但㨿土地務共安人何必令其稱臣以自尊大裴矩温彦博進曰遼東之地周為太師之國漢家之元莵郡耳魏晉以前近在提封之内不可許以不臣若以髙麗抗禮四夷必當輕漢且華之與夷猶太陽之與列星理無降尊乃止貞觀十八年二月太宗謂侍臣曰髙麗莫離支賊殺其主盡誅大臣夫出師弔伐須有其名因其殺君虐下取之甚易諌議大夫褚遂良進曰兵若渡遼事須尅㨗萬一不獲無以威示遠方必更𤼵怒再動兵衆安危難測太宗然之兵部尚書李勣曰近者薛延陀犯邊必欲追擊但為魏徵苦諌遂止向若討伐無一人生還可五十年間邊境無事十一月以張亮為平壤道行軍大總管自莱州泛海趣平壤李勣為遼東道行軍大總管趣遼東兩軍合勢三十日征遼東之兵集於幽州十九年太宗親征渡遼四月李勣攻㧞盍牟城獲生口二萬以其城置盍州勣又攻遼東城㧞之以其城為遼州六月攻㧞白岩城以其城為巖州遂引軍次安市城進兵以攻之會髙麗北部傉薩髙延夀南部髙恵真率靺鞨之衆十五萬来援扵安市城東南八里依山為陣上令所司張受降幕扵朝堂之側夜召文武躬自指麾是夜有流星墜賊營中明日及戰大破之延夀恵真率三萬六千八百人来降上以酋首三千五百人授以戎秩遷之内地餘三萬人悉還平壤靺鞨三千人並坑之獲馬五萬匹牛五萬頭甲一萬領因名所幸山為駐蹕山命許敬宗為文勒石以紀其迹遂移軍扵安市城南久不尅九月遂班師先遣遼盍二州戸口渡遼乃召兵馬歴於城下而旋城主升城拜辭太宗嘉其堅守賜縑百匹以勵事君者二十一年李勣復大破髙麗扵南蘇班師至頗利城渡白狼黄嵓二水皆由膝以下勣恠二水狹淺問契丹遼源所在云此二水更行數里合而南流即稱遼水更無遼源可得也旋師之後更議再行二十二年司空房元齡上表切諫乃止帝崩藏遣使者奉慰高宗永徽五年藏以靺鞨兵攻契丹為所敗六年新羅訴髙麗靺鞨奪二十六城詔營州都督程名振等率師討之至新城敗其師火外郛及墟落引還顯慶三年復遣名振率薛仁貴攻之未能克後二年天子已平百濟乃命大将軍契苾何力蘇定方劉伯英率諸将出浿江遼東平壤道討之龍朔元年大募兵帝欲自行蔚州刺史李君球言髙麗小醜何至傾中國事之有如既滅必發兵以守少發則威不振多發則人不安是天下疲於轉輸臣謂征而滅之不如勿滅帝乃止不行八月定方破虜兵扵浿江奪馬邑山遂圍平壤明年龎孝泰以嶺南兵壁蛇水蓋蘇文攻之舉軍沒定方解而歸乾封元年藏遣子男福從天子封泰山還而蓋蘇文死子男生代為莫離支與弟男建男産相怨男生據國内城遣子獻誠入朝求救蓋蘇文弟淨土亦請割地降乃詔契苾何力為遼東道安撫大使龎同善髙侃為行軍總管薛仁貴李謹行殿而行九月同善破髙麗兵男生率衆相會詔以李勣為遼東道行軍大總管兼安撫大使與契苾何力龎同善并力詔獨孤卿雲由鴨渌道郭待封積利道劉仁願畢列道金待問海谷道並為行軍總管受勣莭度轉燕趙食廥遼東明年正月勣引道次新城合諸将謀曰新城賊西鄙不先圖餘城未易下遂壁西南山臨城城人縳戍酋出降勣進㧞城十有六郭待封以舟師濟海趨平壤三年二月勣率仁貴㧞夫餘城他城三十皆納欵同善侃守新城男建遣兵襲之仁貴救偘戰金山不勝髙麗鼓而進銳甚仁貴横擊大破之斬首五萬級㧞南蘇木氏蒼岩三城引兵畧地與勣會侍御史賈言志計事還帝問軍中云何對曰必克昔先帝問罪所以不得志者虜未有釁也今男生兄弟䦧狠為我向道虜之情偽我盡知之且髙麗祕記曰不及九百年當有八十大将滅髙氏自漢有國今九百年勣年八十矣虜仍荐飢人相掠賣地震裂狼狐入城蚡穴扵門人心危駭是行不再舉矣男建以兵五萬襲夫餘勣破之薩賀水上斬首五千級俘口三萬器械牛馬稱之進㧞大行城契苾何力會勣軍扵鴨淥㧞辱夷城悉師圍平壤九月藏遣男產率首領百人樹素幡降且請入朝勣以禮見而男建猶固守出戰數北大将浮屠信誠遣諜約内應五日闔啟兵譟而入火其門男建窘急自刺不殊執藏男建等收凡五部百七十六城戸六十九萬詔勣便道獻俘昭陵凱而還十二月帝坐含元殿引見勣等數俘扵庭以藏素脅制赦為司平太常伯男產司宰少卿投男建黔州百濟王夫餘隆嶺授獻誠男生等官何力勣仁貴各加官有差剖其地為都督者九州四十二縣百復置安東都䕶府擢酋豪有功者授都督刺史令與華官參治仁貴為都䕶總兵鎮之總章二年徙髙麗民三萬扵江淮山南太長鉗牟岑牟率衆反立藏外孫安舜為王詔髙侃東州道李謹行燕山道並為行軍總管討之遣司平太常伯楊昉綏納亡餘舜殺鉗牟岑牟走新羅侃徙都䕶府治遼東州破叛兵扵安市敗之泉山俘新羅援兵二千李謹行破之發盧河再戰俘馘萬計於是平壤夷殘不能軍相率奔新羅凡四年乃平儀鳳二年授藏遼東都督封朝鮮郡王還遼東以安餘民先編僑内州者皆原遣徙安東都䕶府扵新城藏與靺鞨謀反未及𤼵召還放卭州徙其人於河南隴右弱寠者留安東藏以永淳初死贈衛尉卿𦵏頡利墓左舊城徃往入新羅遺人散奔突厥靺鞨由是髙氏君長皆絶垂拱中以藏孫寳元為朝鮮郡王聖歴初進左鷹揚衞大将軍更封忠誠國王使統安東舊部不行明年以藏子徳武為安東都督後稍自國至元和末遣使者獻樂工云唐末中原多事遂自立為君長後唐同光元年遣使奉貢其王姓髙氏名字史失不紀天成中復入貢長興中權知國事王建承髙氏之位遣使朝貢以建為元莵州都督充大義軍使封髙麗國王晉天福中来朝貢開運二年建死子武襲位漢乾祐末武死子昭權知國事自周廣順初遣使朝貢以昭為特進檢校太保使持莭元莵州都督大義軍使髙麗國王後加太師其俗知文字喜讀書庶賤之家各扵衢路造大屋謂之局堂子孫晝夜誦書習射又遣使進别叙孝經一卷越王孝經一卷越王孝經新義八卷皇靈孝經一卷孝經雌圖一卷别叙者詔孔子所生及弟子從學之事新義者以越王為問目以釋疏文之是非皇靈止説延年辟災之事及志符文乃道書雌圖說日之環暈星之彗孛災異之應䜟緯之書皆不經之說也及宋太祖建隆三年昭遣其廣評侍郎李興祐等来朝貢四年制加食邑賜功臣號開寳五年来貢昭卒其子伷權領國事遣使奉貢請朝命授官封如故太宗即位遣使加食邑功臣號伷遣國人金行成入就學扵國子監其後行成擢進士第歸伷貢奉不絶太平興國七年伷卒其弟治知國事遣使来貢且請命詔授官封雍熙元年入貢三年出師北伐以其國與契丹接境常為敵所侵遣監察御史韓國華齎詔諭以出兵大攻先是契丹攻伐女真國路由髙麗之界女真意髙麗誘導因貢馬来愬扵朝且言髙麗與契丹結好為勢援剽掠其民不􅂧放還洎髙麗使韓遂齡入貢太宗因出女真所上告急木契示之令歸白本國還其俘治聞之憂懼及國華至令人言於國華曰前嵗冬女真馳木契来告稱契丹稱兵入其封境恐當道未知宜預為備當道與女真雖為隣國而路途遐逺彼之情偽素知之矣貪而多詐未足信也其後又遣人来告曰契丹兵騎已濟梅河當道猶疑不實未暇營救俄而契丹雲集大擊女真殺獲甚衆餘族敗散逃遁契丹尾捕及扵當道西北徳昌徳成威化光化之境擒俘而去時契丹遣騎至徳米河北呼闗城戍卒而告曰女真宼我邊鄙率以為常今復仇已畢整兵囘矣當道雖聞退師猶憂不測遂命僚屬會議安危之計乃以女真避兵来奔二千餘衆資給而遣之女真又勸當道控梅河津要築治城壘以為防遏之備亦以為然方令行視興工不意女真兇狡變詐潜師奄至殺掠吏民驅虜丁壮沒為奴𨽻轉徙隣番以其嵗貢中朝不敢發兵報怨豈期反相誣搆以惑聖聰當道世禀正朔殆将五紀踐修職貢克荷寵靈敢有二心交通外國况契丹介居遼海之外復有大梅小梅二河之阻女真渤海本無定國從何徑路以通徃復日月至明諒垂照鑒間者女真逃難之衆罔不存恤亦有授以官秩尚在本國其職居髙者有物屈尼扵等十數人欲望召赴京闕與當道入貢之使庭辯其事則丹石之誠庶幾昭雪國華諾之命發兵西會治遷延未即奉詔國華屢督之得報發兵乃還十月遣使朝貢又遣本國學生崔罕王彬詣國子監肄業端拱二年来貢復遣僧如可来覲請釋氏大藏經詔給之四年詔遣陳靖等使其國加治檢校太師仍存問軍吏耆老靖等自東牟趣八角海口得髙麗使白恩柔所乘海船及髙麗水工登舟自芝崗島順風泛大海再宿抵甕津口登陸行百六十里抵髙麗之境曰海州又百里至閻州又四十里至白州又四十里至其國治迎使扵郊盡藩臣之禮延留靖等七十餘日饋遺甚厚附表稱謝先時詔賜髙麗賔貢進士王彬崔罕等及第授以官遣歸本國治復附表謝又上言願賜板本九經用敦儒教詔從之五年六月遣使元郁来乞師愬以契丹宼境朝廷以邉境相攻固其常北鄙甫寧不可輕動干戈為國生事但回詔慰撫厚賜其使遣還自是受制扵契丹朝貢中絶治卒弟誦立嘗遣兵校徐逺来候朝廷徳音逺久不至咸平三年其臣吏部侍郎趙之遴命牙将朱仁詔至登州偵之州将以聞上特召見仁詔仁詔因自陳國人思慕皇化為契丹羈制之状乃賜誦鈿函詔一道令仁詔齎還六年誦使戸部郎中李宣来謝恩且言晉割燕薊以屬契丹遂有路趣元莵屢来攻伐求取不已乞王師屯境上為割制詔書優答之誦卒弟詢權知國事先是契丹既襲髙麗遂築六城曰興化曰鐵州曰道州曰龍州曰龜州曰郭州扵境上契丹以為貳已遣使来求六城詢不許遂舉兵奄至其城下焚蕩宫室剽刼居人詢徙居昇羅州以避之兵退乃遣使請和扵契丹契丹堅以六城為辭自是調兵守六城大中祥符三年契丹大舉伐之詢與女真設竒邀擊殺戮契丹殆盡詢又扵鴨淥江東築城與来逺城相望跨江為橋潜兵以固新城七年遣使以金線織成龍鳳鞍并繡龍鳳鞍幞各二副細馬二疋散馬二十疋来貢使還賜詢詔書七通并衣帶銀綵鞍馬等八年詔登州置館扵海次以待使者其年又遣御事民官侍郎郭元来貢元自言本國城無垣墻府曰開成管六縣民不下三五千有州軍百餘置十路轉運司統之每州管縣五六小者亦三四每縣戸三四百國境南北千五百里東西二千里軍民雜處𨽻軍者不黥靣方午為市不用錢第以布米貿易民家器皿悉以銅為之樂有二品曰庫樂曰鄉樂三嵗一試舉人有進士諸科算學每試百餘人登第者不過一二十每正月一日五月五日祭祖禰又正月七日家為王母像戴之二月望僧俗然燈如中國上元莭上已日以青艾染餅為盤羞之冠端午有鞦韆之戲士女服尚素地産龍鬚席白硾紙狼尾茟元辭貌恭恪每受宴賜必自為謝表粗有文采朝廷待之亦厚九年辭還賜詢詔書七函襲衣金帶器幣鞍馬及經史厯日聖恵方等元又請録國朝登科記及所賜御詩以歸從之天禧元年遣使貢方物三年九月登州言髙麗進奉使至秦王水口遭風覆舟漂失貢物詔遣内臣撫之十一月其使入見貢錦􅄢衣褥甲刀鞍馬樂物等又進中布二千匹求佛經一藏詔賜經却布以其覆溺匱乏别賜衣服繒綵明州登州屢言髙麗海船有風漂至境上詔令存問給度海糧遣還仍為著例五年詢遣使来謝恩且言與契丹修好又表乞隂陽地理書聖恵方並賜之髙麗遣其國人金行成康戬肄業國學登進士第因留仕中朝行成仕至殿中丞通判安州戩歷官知江隂軍江州又知峽越二州京西轉運使加工部郎中俱以能稱既死詔各賜其子補太廟齋郎太常寺奉禮郎云天聖八年詢復遣使貢方物明年辭歸其後絶不通中國者四十三年詢孫徽嗣立是為文王熈寧二年其國禮賔省移牒福建轉運使羅極云商人黄真洪萬来稱運使奉密㫖令招接通好當國僻居暘谷邈戀天朝祖禰以来梯航相繼蕞爾平壤邇扵大遼附之則為睦鄰疎之則為勁敵慮邊騷之未息蓋陸讋以靡遑久困覊縻難圖携貳故違述職致有積年運屬垂鴻禮稽展慶大朝化覃無外度豁包荒謹當遵道遄赴藁街但兹千里之傳忞恐匪重霄之紆眷今以公状附真萬西還俟得報音即備禮朝貢徽又自言嘗夢至華作詩紀其事三年極以聞時議者亦謂可結之以謀契丹帝許焉命極諭以供擬腆厚之意徽遂遣其臣金梯等百十八人来詔待之如夏國使故時遼人徃返皆自登州七年遣使言欲遠契丹乞改塗由明州詣闕從之郡縣供頓無舊凖頗擾民詔立式頒下費悉官給又以其不通華言恐規利者私與交闗令所在禁止徽問遺二府甚厚詔以付市易務售縑帛答之又表求醫藥畫塑之工以教國人詔羅極募願行者九年以後其使来者多待之寖厚嘗獻伶官十餘輩曰夷樂無足觀止欲潤色國史爾帝以其國尚文每賜書詔必選詞臣著撰而擇其善者所遣使者其書状官必召赴中書試以文乃遣元豐元年始遣安燾陳睦徃使自明州定海絶洋而東既至國人歡呼出迎徽具袍笏玉帶拜受詔與燾睦亢禮館之别宫標曰順天館言尊順中國如天云徽病乞醫藥二年遣使挟醫徃診治徽遣使致謝尋獻日本所造車曰諸侯不貢車服故不敢與土貢同前此貢物至輙下有司估直償絹萬縑至是命勿復估以萬縑為定數六年徽卒徽在位三十八年治尚仁恕為東夷良主然猶循其俗王女不下嫁臣庶必歸之兄弟宗族貴臣亦然次子運諫以為既通上國宜以禮革故習不從訃聞詔明州修浮屠供一月遣使慰奠子順王勲嗣百日卒弟宣王運嗣運仁賢好文内行􅅚備每賈客市書至則潔服焚香對之八年遣其弟僧統来朝求問佛法并獻經像哲宗立遣兩使来奉慰致賀請市刑法文書太平御覽文苑英華詔唯賜文苑英華一書以名馬錦綺金帛報其禮運立四年卒子懷王堯嗣未幾卒叔父雞林公熙嗣位凡數嵗使不至元祐四年其王子義天使僧夀介至杭州祭亡僧言國母使持二金塔為兩宫夀知州蘇軾奏却之熙後避遼主諱改名顒顒性貪吝好奪商賈利富室犯法輒久繫責贖雖㣲罪亦輸銀數斤五年復通使賜銀器五千兩七年遣使来獻黄帝鍼經請市書甚衆禮部尚書蘇軾言髙麗入貢無絲毫利而有五害今請諸書與收買金箔皆宜勿許詔許買金箔然卒市册府元龜以歸元符中遣士賔貢徽宗立遣使来弔賀崇寧二年詔劉逵吳拭徃使顒卒子俁嗣貢使接踵且士子金瑞等五人入太學朝廷為置博士政和中升其使為國信禮在夏國上與遼人皆𨽻樞宻院又改引伴押伴官為接送伴賜以大晟燕樂籩豆簠簋尊罍等器至宴使者扵睿謨殿中宣和四年俁卒初麗俗兄終弟及至是諸弟争立其相李資深立俁子楷来告哀求醫扵朝詔使二醫徃留二年而歸楷語之聞朝廷将用兵伐遼遼兄弟之國存之足為邊扞女真無信爾不可交也願二醫歸報天子宜早為備欽宗立賀使至明州御史胡舜陟言髙麗靡敝國家五十年政和以来人使嵗至淮浙之間苦之彼昔臣事契丹今必事金國安知其不窺我虚實以報宜止勿使来乃詔留館明州而納其䞇幣明年始歸國自王徽以降雖通使扵我然受契丹封册奉其正朔上朝廷及他大書盖有稱甲子者嵗貢契丹至扵六而誅求不已常云髙麗乃我奴耳南朝何以厚待之遼使至其國尤倨暴館伴及公卿小失意輒行捽箠聞我使至必假他事来覘分取賜物嘗詰其西向修貢事麗人表謝其略曰中國三甲子方得一朝大邦一周天每修六貢契丹悟乃得免其國西南接契丹恃鴨淥江以為固其東所臨海水清澈下視十丈東南望明州水皆碧王居開州蜀莫郡曰開成府依大山置宫立城壁名其山曰神髙民居皆茅茨大止兩椽覆以瓦者才十二以新羅為東州樂浪府號東京百濟為金州金馬郡號南京南平壤為鎮州號西京西京最盛總之凡三京四府八牧郡百有十八縣三百九十州島三千七百郡邑之小者或止百家男女二百十萬口兵民僧各居其一地寒多山土宜松栢有秔黍麻麥而無秫以秔為酒少絲􅅙匹縑直銀十兩多衣麻苧王出乘車駕牛歴山險乃騎紫衣行前捧䕶國仁王經以導令曰教曰宣臣民呼之曰聖上私謂曰嚴公妃曰宫主百官名稱階勲功臣檢校頗與中朝相類過御史臺則下馬違者有劾士人以族望相髙栁崔金李四姓為貴種無宦者以世族子為内侍六衛嵗十二月朔王坐紫門小殿注官外官則付國相有國子監四門學學者六千人貢士三等王城曰王貢郡邑曰鄉貢他國人曰賔貢間嵗試扵所属再試扵學所取不􅂈三十四十人然後王親試以詩賦論三題謂之簾前重試亦有制科宏詞之目然特文具而已士尚聲律少通經王城有華人數百多閩人因賈舶至者宻試其能誘以禄仕或强留之終身朝廷使至有陳牒来訴者則取以歸百官以米為俸皆給田納禄半給死乃拘之國無私田民計口授業十六以上則充軍六軍三衞常留官府三嵗一選戍西北半嵗而更有警則執兵任事則服勞事已復歸農畆王亦有分地以供私用王母妃主世子皆受湯沐田上下以賈販利入為事日中為虚用米布貿易地産銅不知鑄錢中國所予錢藏之府庫時出傳翫而已崇寧後始學鼓鑄有海東通寳重寳三韓通寳三種錢然其俗不便也兵器疎簡無强弩大刀崇尚釋教雖王子弟亦常一人為僧信鬼拘隂陽病不服藥唯呪咀厭勝至親有病不相視殮不拊棺貧者死則露置中野嵗以建子月祭天國東有穴號隧神常以十月望日祭之謂之八闗齋禮儀甚盛王與妃嬪登樓大張樂宴飲賈人曵羅為幕至百匹相聨以示富三嵗大祭祠遍其封内因是歛民財而王與諸臣分取之祖廟在國門之外大祭則具車服冕圭親祠王城有佛寺七十區而無道觀大觀中朝廷遣道士徃乃立福源院置羽流十餘軰俗不知醫自王俁来請醫後始有通其術者人首無枕骨皆扁側男子巾幘如唐装婦人鬌髻垂右肩餘髪被下約以絳羅賁之簮旋裙重疊以多為勝男女自為夫婦者不禁夏月同川而浴婦人僧尼皆男子拜樂聲甚下無金石之音既賜樂乃分為左右二部左曰唐樂中國之音也右曰鄉樂其故習也堂上設席升必脱履見尊者則膝行請必跪應必唯其拜無不答子拜父猶半答其禮性柔仁惡殺不屠宰飲食羊豕則包以蒿而燔之刑無惨酷之科唯惡逆及罵父母者斬餘皆杖肋外郡刑殺悉送王城嵗以八月慮囚死罪貸流諸島累赦視輕重原之自明州定海便風三日入洋又五日抵墨山入其境過島嶼詰曲嶕石間舟行甚駛值嶕則敗七日至禮成江江居兩山間束以石峡臨激而下號急水門最為險惡又三日抵岸有館曰碧瀾亭使人由此登陸﨑嶇山谷四十餘里乃至其國都云女真在混同江北與高麗僅隔鴨淥一水其初本臣事契丹奴事髙麗及其强也髙麗反臣事之髙宗建炎元年五月即位即遣胡蠡等為髙麗國信使朝廷盖憂其通金人而金亦以是時遣王樞持册使髙麗則亦憂其為我用也蠡之囘史失書二年詔募能使絶域者浙東路副總管楊應忱應詔請行自言隨侍其父任邊吏􅍄知敵情髙麗女真路甚徑請身使三韓結雞林以達燕雲三月假刑部尚書往使浙東帥臣翟汝文奏言應忱欺罔君父自為身謀若髙麗辭以大國假道以至燕雲而金人或請問津以窺吳越将何辭以對必致辱命取笑逺夷請毋遣不從六月至髙麗見國王楷諭㫖楷拜詔已與應忱等對立而議楷曰大國自有山東路何不由登州徃應忱曰不如貴國最徑第煩國王傳達金國爾三莭人止二十八騎皆自齎糧楷有難色已而命其臣傅佾至館中具言金人見造舟将徃二浙若引使者至其國異時欲假道至浙何以答之麗人之辭果如汝文所料應忱曰女真不能水戰佾曰彼常扵海道徃来况女真舊臣本國近乃欲令本國臣事之可見强弱居十數日復令其臣崔洪宰等就館議執前説不變館伴使文公仁亦曰往年公仁入貢上國嘗奏上皇金人反覆無常不可相親今十二年矣洪宰曰大朝何不練兵與戰應忱留髙麗六十四日終不奉詔不得已受其拜表而回十月至闕入對具言其状上以楷負國恩怒甚尚書朱勝非曰彼與金為鄰與中國隔海逺近利害甚明此乃曩時待之太厚今安能責報右僕射黄潜善曰若以巨舟載精甲數萬徑造其國彼寧無懼乎勝非曰越海征伐燕山之事可鑒也上怒始齊時開封尹宗澤亦請遣使通髙麗令出兵攻賊十一月楷遣其臣尹彥頤入使以禮館待遣回三年八月壬申上謂輔臣曰髙麗入貢人使将至聞上皇遣内臣宫女各二人来朕聞之一則以喜一則以悲吕頤浩曰此必金人之意若非彼意此數人雖至髙麗髙麗必不肯今来扵是乃詔止之詔畧曰舉中原之生聚遭强敵之震驚既渉境以罙深猶稱兵而未已兹移仗衞暫駐江湖如行使之果来恐有司之不戒俟休邊警當問聘期壞晋館以納車庶無後悔閉漢關而謝質非用前規想彼素懷知吾本意汪藻所撰也紹興二年楷遣其臣崔惟清等入貢上引見答以温詔遣回十二月眀州言髙麗使将到三年正月詔以法恵寺為同文館以待其至既而卒不至以入洋風敗舟為辭議者謂其設詐以侮我也六年持牒官金稚圭至眀州朝廷懼其與金人為間詔賜銀帛遣之自是不至者二十餘年三十二年三月髙麗綱首徐徳榮詣眀州言本國欲遣賀使守臣以聞侍御史吳芾言髙麗與金接壤今兩國交兵其請可疑使其果来恐有意外貽笑四方詔止之時完顔亮將入宼也隆興二年四月眀州言髙麗入貢史不書引見日歴孝光寧三朝使命遂絶慶元間詔禁商人博易銅錢入髙麗朝廷亦絶之也每麗人之入使也眀越二郡困扵供給騷然不寧既至闕則館遇燕賚錫予之費以鉅萬計而饋其主者不預焉我使之行二神舟長大數倍戰船費不訾三莭官吏縻爵捐廪皆仰縣官者甚夥蘇軾言扵先朝謂髙麗入貢有五害以此也惟是國扵吳㑹與東都事體大異昔麗人之来率由登莱登莱距梁汴山河之限甚遠也今日三韓直趨四明四明距行都限一浙江爾雖自明而麗海道𣺌瀰中隔洲島凡海中之地大曰洲洲之小者曰島島之小者曰嶼隨其大小有千百十家之聚惟無草木而有石者曰嶕而海深無際曰洋海舟之行觸嶕則摧入洋則覆又有黑風海動之變遇之則天地晦㝠波濤鼎沸故舟人每委曲避就出急水門至郡山島始謂平達非數十日不至也然南北行各遇順風則歴險如夷楊應忱戊申之役其回也九月癸未發三韓戊子至明州之昌國縣僅六日耳海道之當防如此按髙麗之臣事中朝也盖欲慕華風而利嵗賜耳中國之招来髙麗也盖欲柔逺人以飾太平耳國運中否强胡内侵則聘問之事可以已矣蕞爾島夷昔日盖臣遼以自存者也今之强暴既滅遼而有之且荐食中華傾覆神京矣而謂髙麗能禦之邪然則楊應忱之行甚無謂也欲倚以求成邪則彼豈能主宋人弭兵之盟欲倚以救難邪則彼豈能效秦伯無衣之賦且當時所遣卑詞祈請之使如傅雱王倫之徒未嘗不得以自達扵金也然我使之徃也如石沉海彼兵之来也如火燎原卒不得其要領又何煩渉鯨波踐異境假道扵三韓以求達邪然雱倫軰之奉使無益也不過徒為卑屈之辭而不能已其吞噬之謀耳燕雲距江淮數千里其間土地人民城郭固我之封疆以此衆戰掎角牽制彼亦未能保其長驅而必勝也若髙麗奉命道應忱以徃而金人有假道扵虞之謀則掦帆直指吳會更無顧忌矣然則翟汝文所料與王楷所以答使者之語皆忠言至計未可訾也朱丞相言彼與金為鄰與中國隔海逺近利害甚明此乃曩時待之太厚今安能責報此語固得之然政和之求醫而獻忠謀建炎之肅使而不奉詔則麗人固能報恩而未嘗負恩矣過乎此則難以責之也至扵黄潜善之妄言謬計尤其可笑所謂精甲數萬既可襲髙麗扵海外胡為異時不能以此抗金人扵維揚邪季布謂樊噲面諛可斬此語潜善可以當之文獻通考卷三百二十五
