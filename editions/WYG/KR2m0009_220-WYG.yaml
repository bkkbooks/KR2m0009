body:
  text: 文獻通考卷二百二十鄱陽馬端臨貴與著經籍考四十七子五行占筮形法廣古今五行志三十卷鼂氏曰竇鋈撰唐志有其目未詳何人纂五行變異叙其徵應蓋為洪範之學者自古術數之學多矣言五行則本洪範言卜筮則本周易近時兩者之學殆絶而最盛於世者葬書相術五星祿命六壬遁甲星禽而已然六壬之類足以推一時吉凶星禽五星祿命相術之類足以推一身之吉凶葬書之類足以推一家之吉凶遁甲之類足以推一國之吉凶其所知若有逺近之異而或中或否不可盡信則一也遁甲萬一訣一卷鼂氏曰題云唐李靖所纂黄帝書按遁甲之書見於隋志凡十三家則其學之來亦不在近世矣以休生傷杜景死驚開八門推國家之吉凶通其學者以為有驗未之嘗試也遁甲經一卷鼂氏曰唐胡乾撰李氏書目亦云九天元女術推九星八門三竒六儀之法景祐遁甲玉函符應經二卷陳氏曰司天春官正楊惟德撰御製序景祐太一福應集要十卷陳氏曰楊惟德撰御製序末題紹興元年嵩陽潛士魏郡劉箕其積算自建炎三年己酉推之者其所附益也九宫八門與遁甲相表裏字多訛未有他本可校陰陽二遁圖局一卷并雜訣三元立成圖局二卷遁甲八門機要一卷太乙淘金歌一卷陳氏曰已上四種皆不著撰著人名氏得之旴江呉炎遁甲選時圖二卷陳氏曰紹興府所刻本亦無名氏秤星經三卷鼂氏曰不著撰人以日月五星羅㬋計都紫氣月孛十一曜演十二宫宿度以推人貴賤壽夭休咎不知其術之所起或云天竺梵學也按洪範曰歲月日時無易百榖用成乂用明俊民用章家用平康月之從星則以風雨伶州鳩曰武王伐殷歳在鶉火月在天駟一曰在析木之津辰在斗柄星在天黿以此言之五星之術其來尚矣蓋可以占國則可以占事可以占事則可以占人也然術家用日月五星以占吉凶又加以交初交中之神紫氣月孛之宿初中者交食之會亦可以意求惟氣孛無稽而術家獨以為效且曰土木之餘氣五星之行土木最遲而為吉凶者久故有餘氣云周易十二論一卷鼂氏曰未詳撰人論日月五星直年以占吉凶珞琭子三命一卷鼂氏曰李獻臣云珞琭者取珞珞如玉琭琭如石之義推人生休咎否泰之法箕子曰五行水火金木土禹曰辛壬癸甲則甲子五行之名蓋起於堯舜三代之時矣鄭氏釋天命之謂性曰謂木神則仁金神則義之類又釋我辰安在曰謂六物之吉凶此以五行甲子推知休咎否泰於其傳者也呂才稱起於司馬季主及王充其言淺哉然才所詆建祿背祿三刑刼殺建學空亡勾絞六害驛馬之類皆今世三命之術也亦在才之前矣由是觀之視他術淵源獨逺且小運之法本於説文已字之訓空亡之説本於史記孤虛之術多有所自來故精於其學者巧發竒中最多陳氏曰此書祿命家以為本經其言鄙閭巷賣卜人所為也珞琭子疏五卷鼂氏曰皇朝李全東方明撰李虛中命書三卷鼂氏曰唐李虛中撰虛中字常容姓纂云冲之八代孫學最深於五行書壽夭貴賤利不利輙先處其年時百不失一韓愈言冲為虛中十一世祖誤也河圖天運二賦一卷鼂氏曰不著撰人論天地二運蓋三命書也崇文目以為卜筮類壺中賦一卷陳氏曰稱紫雲溪壺中子莫知何人源髓歌六卷後集三卷陳氏曰唐沈芝撰後集妄也太乙命訣一卷陳氏曰稱袁天綱妄人假託五命祕訣一卷鼂氏曰皇朝林開撰三命之術年月日支干也加以時胎故曰五命鮮鶚經十卷鼂氏曰未詳撰人凡十門六十二章以星禽推知人之吉凶言其性情嗜好為尤驗説者謂本神仙之訣也故此書載於道藏李邯鄲云羅浮山逍遥子撰紫堂訣三卷鼂氏曰紫堂先生撰未詳何代人著紫垣十二星至隱曜總三百六十位分二十八舍附之以五星配十二辰以推人命之吉凶五星命書一卷陳氏曰不著名氏其歌訣頗詳然未必驗也五星三命指南十四卷陳氏曰亦不知名氏大抵書坊售利求俗師為之聿斯歌一卷陳氏曰靑羅布衣王希明撰不知何人靈臺三十六歌一卷陳氏曰題稱武平先生所撰然亦不知其為何代人五星六曜約法一卷洞微歌一卷紫宙經一卷陳氏曰以上三種皆無撰著名氏亦莫考其所自出四門經一卷陳氏曰唐待詔陳周輔撰青羅立成歴一卷陳氏曰司天監朱奉奏據其歴起貞元十年甲戌入歴至今乾寜四年丁巳則是唐末人羅計二隱曜立成歴一卷陳氏曰稱太中大夫曹士蔿亦莫知何人但云起元和元年入歴諸家五星書一卷陳氏曰雜錄五星祿命之説前數家亦多在焉遁甲八門命訣一卷陳氏曰不知名氏信齋百中經一卷陳氏曰不著名氏安慶府本術士言最善怡齋百中經一卷陳氏曰東陽術士曹東野自言今世言五星者皆用唐顯慶歴歴法更本朝前後無慮十餘變而百中經猶守舊安得不差乃用見行歴法推算其説如此未之能質也五行精紀三十四卷陳氏曰清江鄉貢進士廖中撰周益公為之序集諸家三命説三辰通載三十四卷陳氏曰嘉禾錢如璧編集五星命術廣濟陰陽百忌歴二卷陳氏曰稱唐呂才撰有序按才序陰陽書其三篇見於本傳曰祿命曰卜宅曰葬盡掃世俗拘滯之論安得復有此歴本初固已假託後人附益尤不經三歴會同十卷陳氏曰不知作者集百忌總聖集正三書萬歴會同三十卷陳氏曰陳從古撰以前書推廣之書坊售利之具也彈冠必用一卷陳氏曰周謂撰專為宦游擇日設三歴撮要一卷陳氏曰無名氏又一本名擇日撮要歴大略皆同建安徐清叟真翁云其尊人尚書公應龍所輯不欲著名陰陽備用十二卷陳氏曰通判舒州新安胡舜甲汝嘉撰此書本為地理形法而諸家選對日法要皆在焉故附於此右五行焦氏易林十六卷鼂氏曰漢天水焦延壽傳易於孟喜此其所著書也費直題其前曰六十四卦變又有唐渝王序所書每卦變六十四總四千九十六首皆為韻語與左氏傳載鳯凰於飛和鳴鏘鏘漢書所載大横庚庚予為天王之語絶相類豈古之卜者各有此等書邪石林葉氏曰吾家有焦貢易林京房易二書大抵皆卜筮陰陽氣候之言不復更及易道考之班固儒林傳漢初傳易大抵皆本之田何而焦貢獨得隱士之説以授京房貢嘗從孟喜問易會喜死房即以其學出孟氏其徒翟牧白生不肯皆曰非也然孟喜雖授學田王孫至其候陰陽災變言田生死時枕喜膝獨傳喜其實妄也故梁邱賀辨以為田生絶施讐手中時喜歸東海無此事則二氏書其源流固無所本縱焦貢書出孟氏固謬矣如趙賓説箕子明夷為箕子者萬物方荄兹也云受於喜為喜為名之則喜乃妄人而已陳氏曰又名大易通變唐會昌景寅越五雲谿王俞序凡四千九十六卦其辭假出於經史其意雅通於神祇蓋一卦可以變六十四也舊見沙隨程逈所記南渡諸人以易林筮國事多竒驗求之累年寳慶丁亥始得之莆田皆韻語古雅頗類左氏所載繇辭或時援引古事間嘗筮之亦驗頗恨多脱誤嘉熙庚子從湖守王寺丞侑借本兩相校十得八九其中亦多重復或諸卦數爻共一繇莫可考也八神筮法二卷鼂氏曰以八卦世分六十四卦每卦首必云子夏曰論易筮之吉凶靈棊經二卷鼂氏曰漢東方朔撰又云張良劉安未知孰是晉顏㓜明宋何承天注有唐李逺叙歸來子以為黄石公書豈謂以授良者邪按南史載客從南來遺我良財寳貨珠璣金盌玉盃之繇則古之遺書也明矣凡百二十卦皆有繇辭靈龜經一卷鼂氏曰史蘇撰論龜兆之吉凶崇文目三卷易傳積算法雜占條例一卷陳氏曰漢京房撰詳已見易類世所傳京氏遺學不過如此而已今世卜者世應飛伏納甲之類皆出京氏周易版詞一卷陳氏曰不知名氏當是漢魏以前人所為其間官名皆東京制也周易元悟一卷陳氏曰題李淳風撰火珠林一卷陳氏曰無名氏今賣卜者擲錢占卦盡用此書揲蓍古法一卷陳氏曰開封鄭克武子撰蓍卦辯疑序三卷陳氏曰郭雍撰自序略言學者相傳謂九為老陽七為少陽六為老陰八為少陰及觀乾爻稱九坤爻稱六則九六為陰陽蓋無疑也而六子皆稱九六不言七八則少陰少陽未有所據及考乾坤之策曰乾之策二百一十有六坤之策百四十有四六之一則乾爻得三十六坤爻得二十四是則老陰老陽之數也又考二篇之策陽爻百九十有二以三十六乗之積六千九百十有二陰爻百九十有二以二十四乘之積四千六百八合之為萬有一千五百二十則二篇之策亦皆老陰老陽之數也而少隂少陽之數又無所見再置陽爻百九十有二以少陽二十八乘之積五千三百七十六再置陰爻百九十有二以少陰三十二乗之積六千一百四十四合之亦為萬有一千五百二十以是知少陰少陽之數隱於老陰老陽之中如是則七九皆為陽六八皆為陰其畫為竒為耦皆同聖人畫卦初未必以陰陽老少為異然卜史之家欲取動爻之後卦故分别老少之象與聖人畫卦之道已不同矣然七九為陽六八為陰蓋謂陰陽各有二道與説卦言立天之道曰陰與陽立地之道曰柔與剛其義皆同是道也以聖人不明載之繫辭後世紛紛互相矛盾至有大失聖人之意者大率多主卜史之論不知所謂策數遂妄為臆説也朱子語録曰揲蓍雖是一小事自孔子來千五百年人都理會不得唐時人説得雖有病痛大體理會得是近來説得大乖自郭子和始竒者揲之餘為竒扐者歸其餘扐二指之中今子和反以掛一為竒而以揲之餘為扐又不用老少只用三十六三十二二十八二十四不知為策數以為聖賢從來只説陰陽不曾説老少不知他既無老少則七八九六皆無用又何以為卦又曰龜為卜策為筮策是餘數謂之策他只是胡亂説策字或問他既如此説則再扐而後掛之説何如曰他以第一揲扐為扐第二第三揲不掛為扐第四揲又掛然如此則無五年再閏如某已前排眞个是五年再閏聖人下字皆有義理掛者挂也扐者勒於二指之中也常陽經一卷鼂氏曰崇文目題曰黄帝式用蓋六壬占卜術也六壬要訣一卷鼂氏曰未詳何人撰隋志載六壬之書兩種金鑾宻記及五代史記頗言其驗今世龜筮道息而此術獨行六壬課鈐一卷鼂氏曰未詳何人所纂以六十甲子加十二時成七百二十三課三傳入神以占吉凶玉關歌一卷鼂氏曰不題撰人六壬課訣也六壬翠羽歌一卷陳氏曰後唐長興中僧令岑撰錯誤極多未有他本可校六壬洞微賦一卷陳氏曰不知名氏瞽卜劉松年所傳京氏參同契律歴志一卷陳氏曰虞翻注專言占象而不可盡通字亦多誤未有别本校京氏易式一卷陳氏曰鼂説之以道撰占燈法一卷觀燈法一卷鼂氏曰唐李淳風撰崇文總目亦有之右占筮八五經一卷鼂氏曰序云黄帝書八五謂八卦五行雖後人依託而其辭亦馴雅相墓書也呂才葬篇以六説詰其不驗且云世人之為葬巫所欺忘擗踊荼毒以期徼幸由是相塋隴希官爵擇時日規財利誠哉是言也陳氏曰序稱大將軍記室郭璞後序言余受郭公囊書數篇此居一公戒以祕之丞相王公盡索余書余以公言告之得免末稱太興元年六月蓋晉元帝時王公謂導也然皆依託耳其書為相墓作狐首經一卷陳氏曰不著名氏稱郭景純序亦依託也胡汝嘉始序而傳之其文亦雅馴言頗有理續葬書一卷陳氏曰稱郭景純撰鄙俗依託青囊補注三卷鼂氏曰郭璞撰世傳葬書之學皆云無出郭璞之右者今盛行皆璞書也按璞傳載葬母事世傳蓋不誣矣璞未幾為王敦所殺若謂禍福皆係於葬則璞不應擇凶地以取禍若謂禍福有定數或他有以致之則葬地不必擇矣嗚呼璞自用其術尚如此况後遵其遺書者乎撥沙經一卷鼂氏曰唐呂才撰地理書畫山水之形成圖蓋依託者青囊本㫖一卷鼂氏曰不記撰人演郭璞相墓青囊經也洞林别訣一卷尋龍入式一卷鼂氏曰江南范越鳯集郭璞所記諸家地理書得失為此書二十四篇并司空班尋龍入式歌附陳氏曰又名洞林别訣范越鳯相傳縉雲人家於將樂地理少一卷陳氏曰稱李淳風亦未必然會元經二十四卷鼂氏曰孫季邕撰未詳何代人集諸家相地書芟其鄙陋無驗者成是書金鎻正要一卷元談經一卷錦囊遺錄一卷五行統例一卷鼂氏曰四書皆地理書也五音地理新書三十卷鼂氏曰唐僧一行撰以人姓五音驗八山三十八將吉凶之方其學今世不行地理口訣一卷陳氏曰不知何人所集曰楊筠松曾楊乙黄禪師左仙朱仙桃范越鳯劉公頼太素張師姑王吉凡十家楊公遺訣曜金歌并三十六圖象一卷陳氏曰楊即筠松也又號楊救貧神龍鬼砂一卷羅星妙論一卷陳氏曰皆不知作者九星賦一卷陳氏曰題范公陰陽精義二十篇朱伯起撰水心序伯起從鄭公景望學而與景元為友酷嗜地理談山如啖蔗浮海葬妻大芙蓉云後百年當驗著書二十篇論原起乘止尤詳二鄭因是喜陰陽家余嘗怪蘇公子瞻居陽羡而葬嵩山一身豈能應四方山水之求近時朱公元晦聽蔡季通預卜壽藏門人裹糧行紼六日始至乃知好竒者固通人大儒之常患也龍髓經一卷疑龍經一卷辯龍經一卷龍髓别㫖一卷九星祖局圖一卷五星龍祖一卷二十八禽星圖一卷陳氏曰以上七種皆無名氏并前諸家多呉炎錄以見遺江西有風水之學徃徃人皆道之三十二家相書三卷鼂氏曰或集許負以下三十二家書成此編月波洞中記一卷鼂氏曰序稱唐任逍遙得之於太白山月波洞石壁上凡九篇相形術也崇文總目置之五行類雜相書一卷陳氏曰凡三十二種又有拾遺亦呉晦父所錄成和子觀妙經一卷陳氏曰不著名氏希夷先生龜鑑一卷陳氏曰逸人亳社陳搏圖南撰劉康國注館閣書目作人倫風鑒䄂中記一卷鼂氏曰皇朝李唐濬撰辨人形色知人壽夭吉凶羣書古鑒一卷鼂氏曰未詳撰者姓名熙寜間集書史相術驗者諸家相書五卷陳氏曰知莆田縣昭武黄庚毅夫撰集玉管神照一卷陳氏曰無名氏相馬經鼂氏曰伯樂撰集馬相書一卷鼂氏曰光祿少卿孫珪撰相牛經一卷鼂氏曰序曰寗戚傳之百里奚漢世河西薛公得其書以相牛千百不失其一至魏世高堂生又傳晉宣帝其後祕之細字薛公注也相鶴經一卷鼂氏曰題曰浮邱公撰其傳云浮邱公傳於王子晉後崔文子學道於子晉得其文藏於嵩山之石室淮南公採藥得之乃傳於世相貝經一卷陳氏曰不知作者師曠禽經一卷陳氏曰稱張華注右形法文獻通考卷二百二十
