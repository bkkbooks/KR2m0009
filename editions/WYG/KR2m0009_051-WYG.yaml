body:
  text: 文獻通考卷五十一鄱陽馬端臨貴與著職官考五中書省中書之官舊矣謂之中書省自魏晉始焉梁陳時凡國之政事並由中書省省有中書舍人五人領主書十人書吏二百人書吏不足并取助書分掌二十一局事各當尚書諸曹並為上司總國内機要而尚書唯聽受而已被委此官多擅威勢後魏亦謂之西臺宣武帝謂中書監崔光曰卿是朕西臺大臣北齊中書省管司王言并司進御之樂及清商龜兹諸部伶官隋初改為内史省置令二人侍郎四人煬帝減侍郎二人舍人八人煬帝減去四人通事舍人十六人煬帝加起居舍人而改通事舍人為謁者臺職唐武徳三年復中書省龍朔二年改為西臺咸亨初復舊光宅元年改為鳳閣凡中書官隨署名改神龍初復舊開元元年改為紫微省五年復舊時謂尚書省為南省門下中書為北省亦謂門下省為左省中書為右省或通謂之兩省令二人侍郎二人舍人六人右散騎常侍起居舍人右補闕右拾遺各二人通事舍人十六人其餘小吏各有差宋制中書省在左掖門外西面北廊掌進擬庶務宣奉命令行臺諫章疏羣臣奏請興創改革及中外無法式事應取㫖者凡除省臺寺監長貳以下及侍從職事官外任監司節鎮知州軍通判武臣遥郡横行以上除授皆掌之凡命令之體有七曰冊書立后妃封親王皇子大長公主拜三師三公三省長官則用之曰制書處分軍國大事頒赦宥徳音命尚書左右僕射開府儀同三司節度使凡告廷除授則用之曰誥命應文武官遷改職秩内外命婦除授及封叙贈典應合命詞則用之曰詔書賜待制大卿監中大夫觀察使以上則用之曰勅書賜少卿監中散大夫防禦使以下則用之曰御札布告登封郊祀宗祀及大號令則用之曰勅榜賜酺及戒勵百官曉諭軍民則用之皆承制畫㫖以授門下省令宣之侍郎奉之舎人行之留其所得㫖為底大事奏禀得㫖者為畫黄小事擬進得㫖者為録黄凡事干因革損益而非法式所載者論定而上之諸司傳宣特㫖承報審覆然後行下設官十有一令侍郎右散騎常侍各一人舍人四人右諫議大夫起居舍人右司諫右正言各一人分房八曰吏房曰户房曰兵禮房曰刑房曰工房曰主事房曰班簿房曰制勅庫房元祐以後析兵禮為二增催驅㸃檢分房十有一又改主事房為開拆中書令舜攝位命龍作納言出入帝命周官内史掌王之八柄爵禄廢置生殺予奪執國法及國令之貳以考政事蓋今中書之任其所置中書之名因漢武帝遊宴後庭始以宦者典事尚書謂之中書謁者置令僕射不言謁者省文也元帝時令𢎞恭僕射石顯秉勢用事權傾内外蕭望之以為中書政本宜以賢明之選更置士人自武帝改用宦者掌出入奏事非舊制也成帝建始四年改中書謁者令曰中謁者令更以士人為之皆屬少府漢東京省中謁者令官時有中官謁者令非其職也魏武帝為魏王置祕書令典尚書奏事又其任也文帝黄初初改為中書令又置監以祕書左丞劉放為中書監右丞孫資為中書令並掌機密中書監始於此也及明帝時中書監令號為專任其權重矣時中護軍蔣濟上疏諌曰夫大臣太重者國危左右太親者身蔽古之至戒威權在下則衆心慢上勢之常也今外所言輙云中書實握事要日在目前倘因疲倦之間有所割制衆臣見其能推移於事即亦迴附向之請分任衆官不使聖明之朝有專吏之名也晉因之置監令一人始皆同車後乃異焉初監令常同車入朝及和嶠為令荀朂為監嶠意抗鄙荀巧佞以意氣加之專車而坐自此監令乃使異車魏晉以來中書監令掌贊詔命記㑹時事典作文書司馬景王命中書令虞松作表再至不可意松竭思不能改正鍾㑹視其草為定五字松大悅服又荀朂為中書監使子組草詔傳祗為監病風又使息暢為啟華廙為監時成事多不洩廙啟武帝召授子薈草詔前後相承以子弟管之自此始也又王獻之為中書令啟瑯琊王為中書監表曰中書職掌詔命非輕才所能獨任自晉建國嘗命宰相參領中興以來益重其任故能王言彌徽徳音四塞者也又後魏孝文時蠕蠕有國喪帝遣高閭為書與之不叙凶事時孝文謂曰卿為中書監職典文辭若情思不至應謝所任又曰崔光為中書令勅光為詔逡廵不作薈烏隊切廙余力切蠕如兖切以其地在樞近多承寵任是以人因其位謂之鳳凰池焉荀朂守中書監侍中參贊朝政及遷尚書令朂久在中書專管機事失之甚慍人有賀者朂怒曰奪我鳳凰池諸公何賀焉晉制銅印墨綬進賢兩梁冠絳朝服佩水蒼玉乘輅車吳紀亮為尚書令其子隲為中書令每朝㑹吳主以屏風隔其坐晉書曰張華為監裴楷為令共掌機密又王洽字敬𢎞為中書令時年二十九後洽子珉又為中書令時謂為奕世令徳東晉常併其職入散騎省尋復置之宋冠佩印綬與晉同梁中書監令清貴華重大臣多領之其令舊遷吏部尚書才地俱美者為之陳因梁制後魏亦有監令高允字伯恭為中書令文帝重之不名呼為令公北齊因魏制後周置内史中大夫二人掌王言亦其任也隋初改中書為内史置監令各一人尋廢監置令二人煬帝大業十二年又改内史為内書後復為内史唐武徳初為内史令常有勅而中書門下不時宣行高祖責其遲由内史令蕭瑀曰臣大業之日見内史宣勅或前後相乖者百司行之不知何所承用所謂易雖在前難必在後臣在中書日久備見其事今黄閣初搆事涉安危若逺方有疑恐失機會此每受一勅臣必審勘使與前勅不相乖背者始敢宣行遲晩之愆實由於此上善之三年改為中書令亦置二人龍朔二年改為右相咸亨元年復舊光宅二年又為内史神龍元年復舊中書令開元元年改為紫微令五年復為中書令天寶元年改為右相至徳初復為中書令自隋至今皆為宰相舊班正三品大歴二年升為從二品按令文掌侍從獻替制勅冊命敷奏文表授冊監起居注總判省事宋制掌佐天子議大政授所行命令而宣之祀大神祗則升壇饗宗廟則升阼階相禮臨軒冊命則讀冊建儲則升殿宣制及璽綬以授太子大朝㑹則詣御座前進方鎭表及祥瑞國朝未嘗眞拜以他官兼領者不與政事然止曹佾餘皆贈官官制行以右僕射兼中書侍郎行令之職别置侍郎以佐之元豐寄禄為開府儀同三司容齋洪氏随筆曰中書尚書令在西漢時為少府官屬與太官湯官上林諸令品秩畧等侍中但為加官在東漢亦屬少府而秩稍增尚書令為千石然銅印墨綬雖居機要而去公卿甚逺至或出為縣令魏晉以來浸以華重唐初遂為三省長官居眞宰相之任猶列三品大歴中乃升正二品入國朝其位益尊叙班至在太師之上然只以為親王及使相兼官無單拜者見任宰相帯侍中者才五人范魯公質趙韓公普丁晉公謂馮魏公拯韓魏公琦尚書令又最貴除宗王外不以假人趙韓公韓魏公始贈眞令韓公官止司徒及贈尚令乃詔自今更不加贈蓋不欲以三師之官贅其稱也政和初蔡京改侍中中書令為左輔右弼而不置尚書令以為太宗皇帝曾任此官殊不知乃唐之太宗為之故郭子儀不敢拜非本朝也又曰紹熈五年十二月二十二日宣麻制除嗣秀王伯圭兼中書令此官久不除學士大夫多不知本末至或疑為當入都堂治事邸報至外郡尤所不曉邁考之典故侍中中書令為兩省長官自唐以來居眞宰相之位而中令在侍中上肅宗以後始以處大將故郭子儀僕固懐恩朱泚李晟韓𢎞皆為之其在京則入政事堂然不預國事懿僖昭之時員寖多率由平章事遷兼侍中繼兼中書令又遷守中書令三者均稱使相皆大勅繫銜而下書使字五代尤多國朝創業之初尚仍舊貫於是吳越國王錢俶天雄節度符彦卿雄武王景武寜郭從義保大武行徳成徳郭崇昭義李筠淮南李重進永興李洪義鳳翔王彦超定難李彛興荆南高保融武平周行逢武寜王晏武勝侯章歸義曹元忠十五人同時兼中書令太宗朝唯除石守信而趙普以故相拜眞宗但以處親王嘉祐末除宗室東平王允弼襄陽王允良元豐中除曹佾與允弼允良相去十七八年爵秩固存沈括筆談謂有司以佾新命言自來不曾有活中書令請俸則例蓋妄也官制行改三使相並為開府儀同三司元祐以後不復有之雖崇觀政宣輕用名器且改為左輔右弼然蔡京三為公相亦不敢居乾道中詔於録黄及告命内除去侍中中書令遂廢此官今當先降指揮復置則於事體尤愜當也嗣王終不敢當於是寢前命而賜贊拜不名侍郎漢置中書領尚書事有丞郎魏黄初初中書既置監令又置通事郎魏志曰掌詔草即漢尚書郎之位次黄門郎黄門郎已署事過通事乃署名已署奏以入為帝省讀書可後改通事郎為中書侍郎明帝詔舉中書郎謂盧毓曰得人與否在盧生耳又魏末張華遷掌兼中書郎朝議表奏多見施用晉置四員及江左初又改為通事郎尋復為中書侍郎其職副掌王言更入直省五日從駕則正直從次直守張華兼中書郎從駕征鍾㑹掌書疏表檄嵇含為中書郎書檄雲集含初不立草宋中書侍郎進賢一梁冠介幘絳朝服用散騎常侍為之齊梁皆四人梁以功高者一人主省内事陳因之後魏北齊置四員隋初為内史侍郎亦四員煬帝減二員改為内書侍郎唐初為内史侍郎武徳三年改為中書侍郎龍朔以後隨省改號而侍郎之名不易舊制正四品至大歴二年升從三品員二人掌侍從獻替制勅冊命敷奏文表通判省事宋制侍郎掌貳令之職參議大政授所宣詔㫖而奉行之官制行以尚書右僕射兼又别置侍郎以代參知政事建炎初復改侍郎為參政舍人中書舍人魏置中書通事舍人或曰舍人通事各為一職魏明帝時有通事劉泰晉江左乃合之謂之通事舍人武冠絳朝服掌呈奏案章後省之而以中書侍郎一人直西省即侍郎兼其職而掌其詔命宋初又置中書通事舍人四員入直門内出宣詔命凡有陳奏皆舍人持入參决於中自是則中書侍郎之任輕矣齊永平初中書通事舍人四員各住一省時謂之四户權傾天下茹法亮久為中書通事舍人後出為大司農中書勢利之職法亮戀之垂涕而去又熒惑入太微太尉王儉謂武帝曰天文乖誤此由四户帝納之而不改與給事中為一流梁用人殊重簡以才能不限資地多以他官兼領後除通事字直曰中書舍人專掌詔誥兼呈奏之事裴子野以中書侍郎鴻臚卿掌兼中書通事舍人别勅知詔誥自是詔誥之任舍人專之魏晉以來詔誥並中書令及侍郎掌之説在中書令篇陳置五人後魏有舍人省而不言其員北齊舍人省掌署勅行下宣旨勞問領舍人十人後周有小史上士二人此其任也屬春官隋内史舍人八員專掌詔誥煬帝減四人後改為内書舍人唐初為内史舍人至武徳三年改為中書舍人置六員龍朔以後隨省改號而舍人之名不易專掌詔誥侍從署勅宣㫖勞問授納訴訟敷奏文表分判省事自永淳以來天下文章道盛臺閣髦彦無不以文章逹故中書舍人為文士之極任朝廷之盛選諸官莫比焉按後漢章和以後尚書為機衡之任尚書郎含香握蘭直宿於建禮門大官供膳奏事明光殿下筆為詔誥出語為誥令曹公為魏王置袐書令典尚書奏事則祕書之職近密尚書之職踈遠魏文帝初改祕書為中書自後歴代相沿並管樞密而後漢尚書郎非今之尚書郎乃中書舍人也武太后臨朝天授元年夀春郡王盛器兄弟五人初出閤同日受冊有司撰儀注忘載冊文及百僚在列方知闕禮宰臣相顧失色中書舍人王㪍立召小吏五人各令執筆口授分寫同時須臾俱畢詞理典贍時人歎服景龍四年六月二日初定内難唯中書舍人蘇頲在太極殿後文詔塡委動以萬計手操口對無毫釐差誤主書韓禮談子陽轉書詔草屢謂頲曰乞公少遲禮等書不及恐手腕將廢故事舍人六員各押尚書省一行天下衆務無不關决開元二年十一月紫微令姚崇奏紫微舍人六員無一頭商量事諸舍人同押連署狀進說凢事有是非理均與奪人心既異所見不同者望請别作商量連狀同進若狀語交互恐煩聖思臣既是官長望於兩狀復畧言二理優劣奏聽進止則人各盡能官無留事勅曰可因是舍人唯知撰制不復分知機務既文書塡委遂令書録委之堂後又其權勢傾動天下姚竟因主書趙誨賊犯所累罷相姚誠多才而隳政擅權以成斯弊可哀也宋初中書舍人為所遷官實不任職復置知制誥及直舍人院故事入西閣皆中書詔試制誥三篇惟梁周翰不召試而授其後楊億陳堯佐歐陽修亦如此例富弼為知制誥封還劉從愿妻封遂國夫人詞頭唐制唯給事中得封還詔書中書舍人繳詞自弼始元豐五年詔中書舍人印為中書後省之印曾鞏陸佃並試中書舍人自是始正官名遂以中書舍人判後省之事分案五曰上案掌冊禮及朝㑹所行事曰下案掌受付文書曰制誥案掌書記制詞及試吏校其功過曰諌官案掌受諸司關報文書曰記注案掌録記注其雜務則随所分案掌之元祐初以蘓軾直舍人院有司言自官制行舍人院廢今為中書後省於是改為權中書舍人遂為故事後詔舍人各簽諸房文字其命詞則輪日分草中興置中書後省以中書舍人為長官六員常除二員一員領吏房及兵工房一員領吏房右選及禮刑房嘉泰四年李季章璧以宗正少卿權中書舍人而中字犯祖諱季章辭有㫖權以直舍人院繫銜乃受命不知舍人院廢已久矣蓋大臣失於討論也紹興初詔中書門下兩省已併為中書門下省其兩省合送給舍文字今後更不分送並送給事中中書舍人其後又詔以他官兼攝者稱權直資淺者為直舍人院石林葉氏曰國初循唐舊制凡命官遷除磨勘移易差遣中書皆命詞給告不勝其繁元豐官制行始命階官職事官選人入品者給告無品官者但給黄牒而已元祐末猶以為多復命内外差遣及職事官本等内改易或再任者亦止給黄牒紹聖中朱服為舍人以為監司郡守初除不給告禮太薄乃詔待制以上知州及帥臣監司初除再任並出告尚書侍郎兩省御史臺官外餘官并監司本等内改易者仍給黄牒後復行之不同元符初中書省復檢舉如前令容齋洪氏隨筆曰中書舍人所承詞頭自唐至本朝皆只就省中起草付吏逮於告命之成皆未嘗越日故其職為難其以敏捷稱者如韋承慶下筆輙成未嘗起草陸扆初無思慮揮翰如飛顔蕘草制數十無妨談笑鄭畋動無滯思同僚閣筆劉敞臨出局倚馬一揮九制皆見書於史䇿其遲鈍窘擾者如陸餘慶至晚不能裁一言和㠓閉户精思徧討羣籍與夫斵窻舍人紫㣲失却張君房之𩔖蓋以必欲速成故也周廣順初中書舍人劉濤責授少府少監分司西京坐遣男頊代草制詞也頊時為監察御史亦責復州司户自南渡以來典故散失每除書之下先以省劄授之而續給告以是遷延稽滯殿拂居官時纔還家即掩關謝客畏其促詞命也先公北聘歸除徽猷閣直學士時劉才邵當制日於漏舍囑之至先公出知饒州㡬將一月猶未受告其他倩諉朋舊俾之假手者多矣故膺此選者不覺其難殊與昔異通事舍人昔堯試舜賔于四門蓋今任也秦置謁者漢因之掌儐贊受事員七十人選孝廉年未五十威容嚴恪能儐贊者為之爇太子使荆軻劫始皇變起兩楹之間其後謁者持七首刺腋漢高帝偃武修文故易之以版有僕射冠高山冠言其矜莊賓逺故以高山為號終軍為謁者使行郡國建節出東關關吏識之曰此棄繻生後漢謁者僕射為謁者臺士主銅印青綬天子出掌奉引謁者僕射見尚書令對揖無敬謁者見執版拜謁者三十人漢官儀又曰三十五人謁者初上官稱曰灌謁者滿歲稱給事胡廣云灌者明章二帝服勤園陵謁者灌栢後遂假兹名焉馬融曰灌者習所職也應奉曰高帝承秦禮儀多闕灌嬰服事七年號大謁者後人掌之以姓灌章列於漢書也雷義為灌謁者使持節督郡國行風俗大守令長留者凡七十人和帝代陳郡何熙為謁者僕射贊拜殿中音動左右然則又掌唱贊漢舊儀曰謁者缺選郎中美鬚眉大音者以補之功次當選欲留増秩者許之二漢𨽻光祿勲後漢又有黎陽謁者光武以幽并兵騎定天下故於黎陽立營以謁者監之兵騎千人復除甚重謁者任輕多放情態順帝改用府掾有清名威重者遷超牧守焉魏置僕射掌大拜授及百官班次統謁者十人及晋武省僕射以謁者并蘭臺江左復置僕射後又省宋武帝大明中復置僕射一人職與魏同亦領謁者十人掌小拜授及百官報章齊因之梁謁者臺僕射掌朝覲賔饗之事屬官謁者十人掌奉詔出使拜假朝㑹賔贊功髙者一人為假史掌差次謁者陳亦有之後魏北齊謁者臺掌凡諸吉凶公事導相禮儀僕射二人謁者三十人隋煬帝増置謁者司𨽻二臺并御史為三臺謁者臺有大夫一人掌受詔勞問出使慰撫持節䇿受及受寃枉而申奏之駕出對御史引駕領議郎以下官屬官有丞主簿錄事等尋詔門下内史御史司𨽻謁者五司監受表以為恒式不復專謁者矣初魏置中書通事舍人官其後歴代皆有然非今任隋初罷謁者仍置通事舍人十六員承㫖宣傳開皇三年又増為二十四員及煬帝置謁者臺乃改通事舍人為謁者臺職謂之通事謁者置二十人又於建國門外置四方館以待四方使者𨽻鴻臚寺煬帝置四方館東曰東夷使者南曰南蠻使者西曰西戎使者北曰北狄使者各一人掌其方國互市事唐廢謁者臺復以其地為四方館改通事謁者為通事舍人掌通奏引納辭見承㫖宣勞皆以善辭令者為之𨽻四方館而又屬中書省集賢殿集賢殿書院唐開元中置漢魏以來祕書省有其職梁武帝於文徳殿内列蔵衆書北齊有文林館學士後周有麟趾殿學士皆掌著述隋平陳之後寫書正副二本蔵於宫中煬帝於東都觀文殿東西廂貯書自漢延熹至隋唐皆祕書掌圖籍而禁中之書時或有焉初開元五年十一月於乾元殿東廊下寫四部書仍令祕書監馬懐素右散騎常侍褚無量總其事於麗正殿安置為修書使至十二年學士張説等宴於集仙殿於是改殿名集賢改修書使為集賢殿書院學士五品以上為學士每以宰相為學士者知院事初燕國公張説為中書令知院制以右常侍徐堅副之自爾常以近宻官為副兼判院直學士六品以下為之侍講學士開元初褚無量馬懐素侍講禁中為侍讀其後康子元等為侍講學士修撰官校理官司直學士宋為集賢院大學士一人以宰相充學士以給監卿監以上充直學士不常置修撰以朝官充直院校理以京官以上充皆無常員掌同昭文館凡昭文史館集賢謂之三館皆以兩省五品以上官一人判史官史官肇自黄帝有之自後顯者夏太史終古商太史髙勢周則曰太史小史内史外史而諸侯之國亦置其官又春秋國語引周志及鄭書似當時記事各有其職秦有太史令胡母敬至漢武始置太史公以司馬談為之卒其子遷嗣卒後宣帝以其官為令行太史公文書其修撰之職以他官領之於是太史之官唯知占候而已自漢以前職在太史直太史局當王莽時改置柱下五史記疏言行盖效古動則左史書之言則右史書之自後漢以後至於有隋中間唯魏明太和中史職𨽻中書其餘悉多𨽻祕書唐武徳初因隋舊制史官屬祕書省著作局至貞觀三年間十二月移史館於門下省北宰相監修自是著作局始罷史職及大明宫初成置史館於門下省之南其修撰史事以他官兼領或卑品而有才者亦直焉開元二十五年宰臣李林甫監史以中書地切樞宻記事者宜其附近史館諌議大夫尹焙遂奏移於中書省北其地本尚藥局内藥院致堂胡氏曰古者史官世掌其職大臣不與天子不觀故得直筆取信於後世其次則如貞觀之制史官日隨仗入隨事記之猶為近古自李義府許敬宗不許史官聞仗後事以行其私姚璹乃建令宰相撰時政記意欲迷眩千古令韋執誼又奏令史官撰日歴日歴云者猶起草也將加是正而潤色焉耳茍數人者誠無私意何用為是紛紛以其請建之紛紛則其誣上行私之心欲盖而益彰矣夫天下有公是非不為言語文字可以變移白黒淆亂忠邪故義府敬宗執誼之惡至于今不泯有志於垂名竹帛者自修而已矣宋制監修國史一人以宰相為之修撰直館檢討無常員修撰以朝官充直館檢討以京官以上充掌修日歴及典司圖籍之事凡國史别置院於宣徽北院之東以蔵之謂之編修院東京記云編修俗呼為史院天聖修真宗史欲重其任降勅宰相為提舉參知政事樞宻副使為修史其同修史則以殿閣學士以上為之編修官以三館祕閣校理以上及京官史畢即停續㑹要元豐改官制日歴𨽻國史案每修前朝國史實錄則别置國史實錄院以首相提舉翰林學士以上為修國史餘侍從官為同修國史庶官為編修官實錄院提舉官如國史從官為修撰除官為檢討麟臺故事元祐復置國史院𨽻門下省明年又置國史院修撰兼知院事紹聖復以國史院歸祕書省宰輔三館題名中興即祕書省復建史館以修神宗哲宗兩朝實錄選本省官兼檢討校勘以侍從官充修撰紹興五年又移史館於省之側别為一所以増重其事至九年修徽宗實錄乃即史館開實錄院明年以未修正史詔罷史館併為實錄院紹興初實錄國史皆寓史館後罷史館遇修實錄即置實錄院遇修國史即置修國史院著作局唯修纂日歴中興㑹要宰相監修但提大綱檢討官搜閲校對惟修撰實専史職只據所送到時政記唐長夀中姚璹請仗下所言宰相撰錄號時政記自璹始五代以來中書樞宻院皆致時政記樞宻院直學士編修太平興國八年蘇易簡為參政自是中書皆參政編錄唯吕䝉正嘗以宰相領其事端拱以後樞宻院事皆送中書同修為一書及王欽若陳堯叟始乞别撰不關中書直送史館起居注事見左右史門銓次其事排以日月謂之日歴聖朝職畧紹興十八年詔置修國史院修神哲徽宗三朝正史又有提舉修勅令天聖慶歴嘉祐熈寧編叙及元符勅令格式各差宰臣提舉詳定官以侍從之通法令者充史館又有校勘檢閲校正編校等官或以布衣之該洽者為之玉牒所提舉監修亦以宰相為之見宗正司歐陽修論史舘日歴奏臣伏以史者國家之典法也自君臣善惡功過與其百事之廢置可以垂勸戒示後世者皆得直書而不隱故自前世有國者莫不以史職為重伏見國朝之史以宰相監修學士修撰又有兩府之臣撰時政選三館之士當陞擢者乃命修起居注如此不為不重矣然近年以來員具而職廢其所撰述簡略遺漏百不存一至於事關大體者皆没而不書此實史官之罪而臣之責也然其弊在於修撰之官惟據諸司供報而不敢書所見聞故也今時政記雖是兩府臣僚修纂然聖君言動有所宣諭臣下奏議事關得失者皆不紀錄惟書除目辭見之類至於起居注亦然與諸司供報文字無異修撰官只據此銓次繫以日月謂之日歴而已是以朝廷之事史官雖欲書而不得書也自古人君皆不自閲史今撰述既成必錄本進呈則事有諱避史官雖欲書而又不敢書也加以日歴時政記起居注例皆承前積滯相因故纂錄常務追修累年前事而嵗月既逺遺失莫存至於事在目今可以詳於見聞者又以追修積滯不暇及之若不革其弊則前後相因史官永無舉職之時使聖朝典法遂成廢墜臣竊見趙元昊自初叛至復稱臣始終一宗事節皆不曽書亦聞修撰官甚欲紀述以纂修後時追求莫得故也其於他事又可知焉臣今欲乞特詔修時政記起居注之臣並以徳音宣諭臣下奏對之語書之其修撰官不得依前只據諸司供報編次除目辭見並須考驗事實其除某官者以某功如狄青等破儂智髙文彦博破王則之𩔖其貶某職者坐某罪如昨來麟州守將及并州龐籍緣白草平事近日孫沔所坐之𩔖事有文據及迹狀分明皆備書之所以使聖朝賞罰之典可以勸善懲惡昭示後世若大臣用情朝廷賞罰不當者亦得書以為警戒此國家置史之本意也至於他大事並許史所據所聞見書之如聞見未詳者直牒諸處㑹問及臣寮奏異同朝廷裁置處分並書之以上事節並令修撰官逐時旋據所得錄為章卷標題日分於史院躬親入櫃封鎻候諸司供報齊足修為日歴仍乞每至歳終命監修宰相親至史院㸃檢修撰官紀錄事迹内有不勤其事隳官失職者奏行責罰其時政記起居注日歴等除今日以前積滯者不往追修外截自今後並令次月供報如稍有遲滯許修撰官自至中書樞宻院催請其諸司供報拖延及史院有所㑹問諸處不畫時報應致妨修纂者其當行手分並許史院牒開封府勾追嚴斷其日歴時政記起居注並乞更不進本所貴少修史職上存聖朝典法此乃臣之職事不敢不言容齋洪氏隨筆曰國朝熙寧以前祕書省無著作局故置史館設修撰直館之職元豐官制行有祕書官則其職歸於監少及著作郎佐矣而紹興中復置史館修撰檢討是與本省為二也宗正寺修玉牒官亦然官制既行其職歸於卿丞矣而紹興中復差侍從為修牒又以他官兼檢討是與本寺為二也然則今有户部可别置三司有吏刑部可别置審官審刑院矣又玉牒舊制毎十年一進謂甲子歳進書則甲戌甲申歳復然今乃從建隆以來再行補修毎及十年則一進以故不過三二年輙一行賞書局僭賞此最甚焉建炎以來朝野雜記曰自真廟以來史館無専官神宗嘗欲付曽子固以五朝史事乃命為史館修撰使専典領其後子固所草具不當神宗意書不克成孝宗時修五朝史而列傳久未畢遂召李仁父洪景盧踵為之皆奉京朝不兼他職者數年而史始畢盖自開院至成書凡二十有八年秉筆者五十有餘人時景盧請通修九朝正史上許之景盧復言制作之事已經先正名臣之手是非褒貶皆有據依乞命後來史官無或輙將成書擅行刪改然書未就而景盧去國淳熙末修髙宗實錄以他官兼之至紹熙末年而工未及半陳君舉直學士院建請以右文殿祕閣二修撰并舊史館校勘三等為史官自校勘供職稍遷祕閣修撰又遷右文殿修撰在院三五年如有勞績就遷次對庶幾有専官之效無冷局之嫌然亦不克行明年但増檢討官三員限一年畢其後又七年而髙錄始成時當修髙宗正史孝宗光宗實錄朝論竟無専官始外召傅景仁陸務觀為在京宫觀免奉朝請令修史於是務觀還政久矣乃落致仕以為同修國史兼實錄院同修撰焉尚書省昔堯試舜於大麓領錄天下事似其任也周之司㑹又其職焉鄭𤣥注周禮大司㑹若今尚書秦時少府遣吏四人在殿中主法書故謂之尚書尚猶主也漢承秦置及武帝遊宴後庭始用宦者主中書以司馬遷為之中間遂罷其官以為中書之職至成帝建始四年罷中書宦者又置尚書五人一人為僕射四人分為四曹通掌圖書祕記章奏之事及封奏宣示内外而已其任猶輕至後漢則為優重出納王命敷奏萬機盖政令之所由宣選舉之所由定罪賞之所由正斯乃文昌天府衆務淵藪内外所折𠂻逺近所禀仰故李固云陛下之有尚書猶天之有北斗斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海賦布也令及左丞總領綱紀無所不統僕射及右丞分掌廪假錢榖隋志曰令統領之僕射副令又與尚書分領諸曹漢初尚書雖有曹名不以為號及靈帝以侍中梁鵠為選部尚書於是始見曹名總謂之尚書臺亦謂之中臺呉諸葛恪既定山越孫權使尚書僕射薛綜勞軍曰故遣中臺近官迎致犒賜之大事八座連名而有不合得建異議自順帝永建元年初令三公尚書入奏事其八座具歴代尚書中二漢皆屬少府蔡質漢儀曰凡三公列卿將大夫五營校尉行複道中遇尚書令僕射左右丞郎御史中城侍御史皆引車先相廻避衞士傳不得避臺官臺官過乃得去至晋宋以來尚書官上朝及下禁斷行人猶其制也魏置中書省有監令遂掌機衡之任而尚書之權漸減矣晋以後所掌略同八座丞郎初拜並集都省交禮遷職又解交本漢制也至於晋宋唯八座解交丞郎不復解交也梁陸果遷尚書殿中曹郎拜曰八座丞郎並到上省交禮而果至晩不及時刻坐危官宋曰尚書寺居建禮門内亦曰尚書省令右闕則左僕射為省主亦謂之内臺毎八座以下入寺門生隨入者各有差不得雜以人士凡尚書官大罪則免小罪則遣出遣出者百日無代人聽還本職宋顧琛為庫部郎以顧碩寄尚書張茂度聞名而碩與同席坐琛坐此遣出又宋制曰今朝士詣三公尚書丞郎詣令僕射尚書丞郎並門下下車履度門閾乃納履也其令及二僕射出行分道之制與中丞同令僕各給威儀十八人説在御史大夫篇自晋以後八座及郎中多不奏事梁天監元年詔曰自禮闈陵替歴兹永久郎署備員無取職事糠粃文案貴尚虚閑空有趨墀之名了無握蘭之實曹郎可依昔奏事自是始奏事矣又詔尚書中有疑事先於朝堂參議然後啓聞舊尚書官不以為贈唯朱异卒特贈右僕射武帝寵之故也考周捨問劉杳尚書官著紫荷相傳云挈嚢竟何所出答曰張安世傳云嚢簮筆事武帝數十年注云嚢槖也近臣簮筆以待顧問自魏晋重中書之官居喉舌之任則尚書之職稍以疎逺至梁陳舉國機要悉在中書獻納之任又歸門下而尚書但聽命受事而已後魏天興元年置八部大人於皇城四方四維面置一人以擬八座謂之八國各有屬官分尚書三十六曹及諸外置令大夫主之崔元伯通署三十六曹如令僕統事四年又復尚書三十六曹天賜元年復罷尚書三十六曹别置武歸修勤二職分主省務武歸比郎中修勤比令史至神䴥元年始置僕射左右丞及諸曹尚書十餘人各居别寺舊例尚書簿諸曹須即出借蘭城王澄為尚書時公車署以理寃事奏請宜案澄執奏以為尚書政本特宜逺慎故凡奏所事閭道通之盖以祕要之切防其宣露寧有古制所重今反輕之宜盡寫其事意以付公車詔從之北齊尚書省亦有錄令僕射總理六尚書事謂之都督亦謂之北省後濟北王以太子監國立大都督府與尚書省分理衆事仍開府置佐顯祖特崇此官以隨王守侍中攝大都督府長史後周無尚書隋及唐皆有其制畧同凡尚書省事無不總龍朔二年改尚書省為中臺咸亨初復舊光宅元年改為文昌臺垂拱元年又改為都臺咸通初復舊長安三年又改為中臺神龍初復為尚書省亦謂之南省都堂居中左右分司舊尚書令有大㕔當省之中今謂之都堂都堂之東有吏部户部禮部三行毎行四司左司統之都堂之西有兵部刑部工部三行毎行四司右司統之凡二十四司分曹共理而天下之事盡矣故事叔父兄弟不許同省為郎官格令不載亦無正勅貞觀二年十一月韋叔謹除刑部員外三年四月韋季武除主爵郎中其年七月韋叔諧除庫部郎中太宗謂曰知卿兄弟並在尚書省故授卿此官欲成一家之美無辭稍屈階資其後同省者甚多近日非恩除拜即須相廻避當以准令同司曹判及公檢之官不得用大功以上親若制勅授者即申所司從早改擬遂同省别司亦罷也左右僕射各一人總統省事左丞一人掌轄吏部户部禮部十二司事右丞一人掌轄兵部刑部工部十二司事左右司郎中各一人員外郎各一人各掌付左右丞所管諸司事尚書六人吏户禮兵刑工六部各一人侍郎九人吏部户部兵部各二人餘各一人郎中二十八人吏部户部兵部刑部各二人餘各一人并左右司則三十人員外郎二十九人吏户兵刑四部及司勲各二人餘司各一人并左右司共三十一人都事六人以下各有差五代時尚書都省在興國坊今梁太祖舊第宋太平興國中徙於利仁坊孟昶舊第頗為宏麗中設都堂左右司左右丞郎中員外郎㕔東西廊分設尚書侍郎㕔事二郎中員外㕔事六掌施行判命舉省内綱紀程式受付六曹文書聽内外辭訴奏御史失職考百官府之治以詔廢置賞罰曰吏部曰户部曰禮部曰兵部曰刑部曰工部皆𨽻焉凡天下之務六曹所不能與奪者總而決之應取裁者隨所𨽻送中書省樞宻院事有成法則六曹准式具鈔令僕射丞檢察簽書送門下省畫聞審察吏部注擬文武官及封爵承襲賜勲定賞之事朝廷有疑事則集百官議其可否凡更改申明勅令格式一司條法則議定以奏覆太常考功謚議亦如之季終具賞罰勸懲事付進奏院頒行於天下大祭祀則誓戒執事官設官九尚書令左右僕射左右丞左右司郎中員外郎各一人分房十曰吏房曰户房曰禮房曰兵房曰刑房曰工房各視其名而行六曹諸司所上之事曰開拆房主受遣文書曰都知雜房主行進制勅自班簿具員考察都事以下功過遷補曰催驅房主考督文牘稽違曰制勅庫房主編檢勅令格式簡納架閣文書紹聖二年詔在京官司所受傳宣内降隨事申尚書省或樞宻院覆奏又詔尚書都省彈奏六曹御史糾不當者石林葉氏曰元豐既新官制建尚書省於外而中書門下省樞宻學士院設於禁中規模極雄麗其照壁屏下悉用重布不紙糊尚書省及六曹皆書周官兩省及後省樞宻學士院皆郭熙一手畫中間甚有傑然可觀者而學士院畫春江曉景為尤工後兩省除官未嘗足多有空閑處看守老卒以其下有布往往竊毁盗取徐擇之為給事中時有竊其半屛者欲付有司㑹竊處有刃㾗議者以禁廷經由株連所及多遂止然因是毁者寖多亦可惜也錄尚書漢武帝時左右曹諸吏分平尚書奏事知樞要者始領尚書事張安世以車騎將軍霍光以大將軍王鳯以大司馬師丹以左將軍並領尚書事張安世領尚書事職典樞機以謹慎周宻自著毎言大政已決輙移病出聞有詔命乃驚使吏之丞相府問焉毎朝廷大臣莫知與議也又孔光字子夏領尚書凡典樞機十餘年守法度修政事不希苟合或問温室省中樹皆何木也光答以他語其謹宻如此後漢章帝以太傅趙憙太尉牟融並錄尚書事尚書有錄名盖自憙融始亦西京領尚書之任唐虞大麓之職也和帝時太尉鄧彪為太傅尚書事猶古冢宰總已之義薨輙罷之自魏晋以後亦公卿權重者為之職無不總蜀蔣琬字公琰為錄尚書事晋宗室㑹稽王道子及世子元顯並錄尚書事時道子為東錄元顯為西錄晋康帝時何充譲錄表曰成康中分置三錄王導錄其一茍崧陸曄各錄二條事晋江右有四錄則四人參錄也江右張華江左庾亮並經闕上書七條凡重號將軍刺史皆得命曹受用唯不得施陳及加節宋孝武孝建中不欲威權外假省錄大明末復置此後或置或省齊世錄尚書及尚書令並總領尚書臺二十曹為内臺主行遇諸王以下皆禁駐號為錄公齊明帝為宣城王錄尚書廢帝昭業思蒸魚太官以無錄公命不與髙帝崩遺詔以褚彦回錄尚書事江左以來無單為錄者有司擬立優䇿王儉議宜有䇿書乃從之王儉議以為見居本官别拜錄推理應有䇿書而舊事不載中朝以來三公王侯則優䇿並設官品第一䇿而不優優者褒美䇿者兼明委寄尚書職居天官政化之本故尚書令品雖第三拜必有䇿錄尚書品秩不見而總任彌重前代多與本官同拜故不别有䇿即事緣情不容均之凡僚宜有䇿書用申重寄既異王侯不假優文從之北齊錄尚書一人位在令上掌與令同俱不糾察自隋而無尚書令秦置尚書令尚主也漢因之銅印青綬武帝用宦者更為中書謁者令成帝去中書謁者令官更以士人為尚書令時𢎞恭石顯相繼為中書令専權邪僻前將軍蕭望之領尚書事建言以為尚書百官之本國家樞機宜以通明公正處之武帝遊宴後庭故用宦者非古制也宜罷中書宦官後漢衆務悉歸尚書三公但受成事而已尚書令主贊奏事總領紀綱無所不統與司𨽻校尉御史中丞朝㑹皆専席而坐京師號曰三獨坐故公為令僕射者朝㑹不陛奏事天子封禪則尚書令奉玉牒兼檢蔵封之禮後漢光武以侯霸為尚書令毎春帝下寛大之詔奉四時之命皆霸所建也郭伋遷尚書令處職機宻數納忠諌陳忠為尚書令前後所奏悉條於南宫閣上以為故事鄭𢎞為尚書令亦著於南宫以為故事郭賀字喬卿為尚書令百姓歌之曰厥徳仁明郭喬卿忠政朝廷上下平又左雄字伯豪為尚書令自雄在尚書令天下不敢謬選十餘年間稱為得人自雄掌納言多所正肅沈勲字異徵詣南宫賜酒拜尚書令持節臨辟雍名冠百僚荀彧字文若為尚書令居中持重焚毁故案竒䇿宻謀不得盡聞又舉荀攸可以代已後攸為尚書令亦推賢進士魏武帝曰二荀令之論人久而益信没世不忘魏晋印綬與漢同冠進賢兩梁納言幘五時朝服佩水蒼玉受拜則䇿命之以在端右故也薨於朝堂發哀陳矯字季弼為尚書令魏明帝卒至尚書門矯跪問曰陛下欲何之帝曰欲案行文書耳矯曰此臣職分非陛下所宜臨也若臣不稱職則請就黜帝慙而迴又晋樂廣為尚書令無當時稱為後人所思又太熙元年詔曰夫總百揆之得失管王政之開塞者端右之職也是以自漢代以來慎選其人議郎王戎可為尚書令又衞瓘字伯玉拜尚書令性嚴惮以法御下視尚書若參佐尚書郎中掾屬又熊逺起曰伏見吏部以太尉荀組為尚書令復領荆州牧自三代以來未聞以納言之官而出領牧伯者王彪之字叔虎為尚書令與謝安共掌朝政安每稱曰朝之大事衆不能決者諮之王公無不立判魏晋以下任總機衡事無大小咸歸令僕宋孝建元年詔曰尚書百官之元本庶績之樞機丞郎列曹局司有任自湏事無巨細悉歸令僕非所以詔能濟業也更可明體制責厥成也齊梁舊用左僕射美遷司空謝朏字敬仲徵為司徒尚書令朏辭脚疾不堪朝謁仍角巾自輿詣雲龍門謝既見乘小車就席梁陳並有之後魏北齊掌弹糾見事與御史中丞更相廉察隋亦總領衆務唐尚書令朝服鷩冕八旒七章三梁冠武徳初太宗為秦王時嘗居之其後人臣莫敢當故自龍朔三年制廢尚書令至廣徳中郭子儀勲業既盛乃特拜焉子儀以文皇帝故譲不敢受令在唐為正二品朱梁置為正一品宋淳化三年升在三師上掌佐天子議大政奉所出命令而行之其屬有六曹凡庶務皆㑹而决之凡官府之紀綱程式無不總焉大事三省通議則同執政官合班小事尚書省獨議則同僕射丞分班輪奏若事由中書門下而有失當應奏者亦如之與三公三師侍中中書令俱以冊拜自建隆以來不除惟親王元佐元儼以使相兼領不與政政和二年詔尚書令太宗皇帝曽任今宰相之官已多不須置然是時説者以謂為令者唐太宗也熙陵未嘗任此盖時相蔡京不學之過宣和七年設復置令亦虚設而已容齋隨筆論三省長官見中書令門僕射僕射秦官漢因之自侍中尚書博士郎皆有之古者重武官有主射以督課古者重武官以僕射者掌事故曰僕射僕射者僕役於射也一云僕主也軍屯吏騶宰永巷宫人皆有取其領事之號凡此諸官皆有僕射隨所領之事以號也若軍屯吏則曰軍屯僕射永巷則曰永巷僕射成帝建始元年初置尚書五人以一人為僕射主封門掌授廪假錢榖鄭崇字子游為尚書僕射數直諌諍毎見曵革履上笑曰我識鄭尚書履聲後漢尚書僕射一人署尚書事令不在則奏下衆事印綬與令同自漢以下章服並與令同獻帝建安四年以執金吾榮邵為左僕射衞臻為右僕射侍者分置左右盖自此始經魏至晋於江左省置無恒置二則為左右僕射或不兩置但曰尚書僕射令闕則左為省主若左右並闕則置尚書僕射以主左事置祠部尚書以掌右事則尚書僕射祠部尚書不恒置矣若無令則左僕射為省主與令同若左右並闕則直置僕射在其中間總左右事宋尚書僕射勝右減左右居二者之間僕射職為執法置二則為左右執又與尚書分領諸曹兼掌彈舉齊左右僕射行則分道左僕射領殿中主客二曹諸曹郊廟園陵車駕行幸明議臺内非違文官舉補滿叙疾假事其諸吉慶瑞應衆賀災異屢發衆變臨軒䇿命改名格制位官銓選凡諸除署論功封爵貶出入議疑讞通關案則左僕射主右僕射次經之右僕射領祠部儀曹掌諸曹庫蔵榖帛文武廪給諸軍資差量人役百工死病亡叛討捕考剔非違租布税調理船車兵器其祠部郊廟䘮贈儀曹儀典禮學武官除署移非城邑人户復除家宅田地興工創架運寫物慮刑獄聽訟百不免遣通關及案奏事則右僕射主左僕射次經之黄案左僕射上署右僕射次署凡僕射掌朝軌尚書掌獻奏都丞任在彈違諸詳讞事應須部議相值者皆郎先立意應奏黄案及關事以立意官為議主凡辭訴有慢命者曹掾咨如舊若或命有咨則以其主意者為議主齊梁舊制右僕射遷左僕射左僕射美遷令其僕射處於中陳亦然後魏二僕射左居上右居下令僕中丞騶唱而入宫門至於馬道及郭秋為僕射以為非盡敬之道乃奏請御在太極騶唱至止車門御在朝堂止司馬門騶唱不入宫自此始也又朱仲逺為行臺僕射請准朝式在軍嗚騶廢帝笑而許之其肆情如此北齊僕射職為執法置二則為左右僕射皆與令同左糾弹而右不糾弹隋文帝開皇三年詔左右僕射從二品左掌判吏部禮部兵部三尚書御史糾不當者兼糾弹之右掌判都官度支工部三尚書又知用度餘並依舊楊素為右僕射與髙熲専掌朝政後文帝漸疎忌素詔曰僕射國之宰輔不可躬親細務但三五日一度向省評論大事示崇重實奪其權也終仁壽之末不復通省事唐左右二僕射因前代本副尚書令自尚書令廢闕二僕射則為宰相故太宗謂房元齡杜如晦曰公為僕射當洞開耳目訪求才賢是謂宰相洪益之道今以決辭聼訟不暇豈助朕求賢之意乃令尚書細務悉委於兩丞其寃濫大故當奏聞者則關於僕射及貞觀末除拜僕射必加同中書門下平章事及參知機務等名方為宰相不然則否然為僕射者亦無不加焉至開元以來則罕有加者自開元以來始有單為僕射不兼宰相者初龍朔二年改左右僕射為左右立政咸通元年復舊官品第四上元三年閏五月制中書省頒下諸州府並宜用黄紙武太后改二僕射為文昌左右相進階為從三品尋復本階神龍初復為左右僕射二年九月勅門下及都省宜曰别錄制勅自三月一進開元元年改為左右丞相從二品統理衆務舉持綱目總判省事二年四月勅在京有訴寃者並於尚書省陳牒所司為理若稽延致有屈滯者委左右丞及御史臺訪察聞奏如未經尚書省不得輙於三司越訴御史糾不當者兼得弹之至天寶元年復舊議曰按僕射秦官其任則微其職甚細東漢以後雖委任漸重職司㑹府而非百寮師長之職也又按丞相亦秦官秦氏毎羣臣上表皆云丞相臣某為首漢之宗臣蕭何為丞相漢儀丞相進天子御座為起在輿為下有疾法駕至第問得戮二千石申屠嘉欲斬内史鼂錯是也霍光受顧託之重當伊周之地廢昌邑王上表太后丞相臣敞為首大司馬大將軍臣光次之其尊崇如此中間嘗置左右丞相亦嘗改為相國亦為大司徒大抵漢之丞相是為三公於天下無所不統後漢亦以三公為宰相則司徒本西漢丞相也後或為丞相或為相國或為大丞相雖互為之名其實一也曹公司馬師昭趙王倫王敦王導劉義宣齊髙帝梁武帝爾朱榮侯景陳武帝齊獻武隋文帝皆為之歴代多非尋常人臣之職亦為贈官然自秦以降實居百寮之長今尚書令總領衆務舉持綱目僕射貳之誠為崇重且非統國政宰天下之任宜侍中中書令如直以尊崇則太師不然上公太尉始可師長命百僚也龍朔中天寶初嘗改侍中中書令為左右相逺協伊尹仲虺為左右相周公召公相成王為左右之義斯誠允當或為尚書令僕射錄尚書之職是官之師長按前代錄尚書霍光張安世王鳯趙憙牟融鄧彪張禹李固王導褚彦回齊明帝之徒或是丞相或是三公或是大將軍大司馬兼之皆秉朝政猶古冢宰百官總已實宰輔也其時别自有令僕今僕射雖嘗改為丞相名同而職異品秩又未崇極上有三師三公尚書令七人豈得比前代丞相受任也其襲舊名無實者若今刺史皆云使持節按前代使持節得戮二千石其王公以下封國皆南面臣人分茅建社其開府儀同三司則禮數班秩皆如三公置府辟吏今豈有其實乎此例甚衆不能遍舉安有僕射因改丞相之名都無丞相之實而為百僚師長也又與丞郎絶禮若不隔品致敬則諸司長官與隔品寮屬其可絶禮乎斯不然矣宋制左右僕射掌佐天子議大政貳令之職與三省長官皆為宰相之任元豐官制行不置侍中中書令以左僕射兼門下侍郎右僕射兼中書侍郎行侍中中書令職事寄祿為特進政和中詔曰昔神考訓廸厥官有司不能奉承仰惟前代以僕臣之賤充宰相之任可改左僕射為太宰右僕射為少宰靖康元年詔依制復為僕射乾道八年詔左右僕射依漢制改為左右丞相左右丞秦置尚書丞一人屬少府漢因之至成帝建始四年置丞四人及後漢光武始減其二唯置左右丞佐令僕之事臺中紀綱無所不統左丞主吏民章服及騶伯史黄香字文彊部左丞功滿當遷和帝留増秩後部尚書遷僕射右丞與僕射皆掌授廪假錢榖又假署印綬及紙筆墨諸財用庫蔵楊喬為右丞行值太宰辛柔柔不避車喬奏柔不敬下廷尉左右丞闕以次夕郎補之三嵗為刺史漢御史中丞侍御史行複道中遇尚書及丞郎避車執板揖丞郎坐車舉手禮之車過逺乃去尚書言左丞敢告知如詔書律令郎見左右丞對揖無敬稱曰左右君丞郎見尚書執板揖稱曰明侍郎見令僕執板揖稱曰對揖魏晋左右丞銅印青黒綬進賢一梁冠介幘絳朝服左丞主臺内禁令寢廟祠祀朝儀禮制選用置吏急假兼糾弹之事傅咸答辛曠詩序曰尚書左丞弹八座以下居萬機之㑹乃皇朝之司直天臺之管轄又郄詵為左丞奏推吏部尚書崔洪洪曰我舉郄丞而還奏我此挽弓自射之謂右丞掌臺内庫蔵廬舍凡諸器用之物及刑獄兵器督錄逺道文書章表奏事宋因之而右丞亦主錢榖虞玩之字茂瑶宋元徽中為右丞齊髙帝參政與玩之書曰今漕蔵有闕吾賢居右丞已覺金粟可積矣皆銅印黄綬齊左右丞寢廟郊祀吉慶瑞應災異立作格制諸案弹用除置吏補滿除遣任遐為右丞奏御史中丞陸澄不糾事請免其官視中書郎遷黄門郎左丞掌兵士百工補役死叛考代年老疾病解遣其内外諸庫蔵穀帛刑刻創架爭訟田地船乗兵工死叛考剔討捕差分百役兵噐諸營署人領州郡租布民户移徙州郡縣併帖城邑人户割屬刺史二千石令長丞尉被收及免贈文武諸犯削官事白案則右丞上署左丞次署黄案則左丞上署右丞次署諸立格制及詳讞大事郊廟朝廷儀體亦左丞上署右丞次署梁皆銅印黄綬一梁冠左丞掌臺内分職儀禁令報人章督錄近道文書章表奏事糾諸不法凡諸尚書文詣中書省者宻事皆以契刀囊盛之封以丞相印劉洽字義瓘為左丞凖繩不避貴戚尚書省賄賂莫敢通右丞掌臺内蔵及廬舍凡諸噐用之物錄逺道文書章表之事陳因之後魏北齊左丞為上階右丞為下階北齊左丞掌吏部等十七曹吏部考功主爵殿中儀曹三公祠部主客左右中兵左右外兵都官二千石度支左右户并糾弹見事又主管轄臺中違失並糾駮之崔昻除左丞兼度支尚書左丞兼尚書近代未有唯昻為冠首朝野榮之右丞掌駕部等十一曹駕部虞曹屯田起部兵部比部水部膳部倉部金部庫部亦管轄臺中唯不弹糾餘悉與左同隋左右丞掌分尚書諸司糾駮元壽字長壽為尚書左丞蕭摩訶妻患將死奏令其子向江南收家産壽奏劾之曰摩訶逺念資財近忘匹好令其子捨危惙之母為聚斂之行御史韓㣲之等見而不弹請付大理臣沗居左轄無容寢黙唐因隋制龍朔二年改為左右肅機咸通元年復舊左丞掌管轄諸司糾正省内勾吏部户部禮部等十二司通判都省事右丞掌管兵部刑部工部等十二司餘與左丞同宋制左右丞掌參議大政通治省事以貳令僕射之職僕射輪日當筆遇假故則以承權當筆知印大祭祀酌獻薦饌進熟則受爵酒以授僕射舊班六曹尚書下官制行升其秩為執政官元豐五年五月詔左右僕射丞合治省事是月御史言左右丞蒲宗孟王安禮於都堂下馬違法犯分安禮争論帝前以謂今左右丞為執政官不應又有厚薄左右丞於都堂上下馬自此始元祐元年詔本省應受御札事大者送中書省取㫖事小急速止本省行訖奏知仍關報中書門下其未便者聼執奏又六曹擬鈔左右丞簽書僕射書檢又事有條例不至大者六曹長官専決非六曹所能決者申省常程及訟牒止付左右丞初藝祖既因唐制置宰相復用翰林學士陶穀之言命薛居正沈義倫為參知政事以為宰相趙普之貳官制行罷參知政事以門下中書侍郎尚書左右丞為執政時章惇以前參知政事除門下侍郎張璪以參知政事除中書侍郎蒲宗孟王安禮自翰林學士除尚書左右丞云元豐寄祿為光祿大夫建炎三年詔中書門下二侍郎並復改為參知政事廢尚書左右丞左右司郎中員外郎隋煬帝三年於尚書都省初置左右司郎二人品同諸曹郎從五品掌都省之職唐貞觀二年改為郎中龍朔二年改為左成務咸通元年復舊令掌副左右丞所管諸司事省置鈔目勘稽失知省内宿直判都省事若右司不在則左併行之左司不在右亦如之員外郎武后永昌元年置與郎中分掌曹務神龍元年省二年復置宋制左司郎中右司郎中左司員外郎右司員外郎各一人掌受付六曹之事而舉正文書之稽失分治省事左司治吏户禮奏鈔班簿房右司治兵刑工案鈔房而開拆制勅御史元豐六年都司置御史房主行彈糾御史案察失職催驅封椿印房則通治之有稽滯則以期限舉催初於都司置吏設案而議者謂臺郎宰掾不當自為官司遂隨省房分治所領之事惟置守分書奏各四人主行校定省吏都事以下功過及遷補之事元豐元年都司御史房置簿以書御史六曹官糾劾之多寡當否為殿最嵗終取㫖陞黜紹聖元年詔諸司以嵗終㸃檢六曹稽違最多者具郎官姓名上省取㫖二年詔御史臺察六曹稽緩違失者送左司籍記宣和二年左司員外郎王蕃奏都司以彌綸省闥為職事無不預今宰丞入省諸房文字填委次第呈覆自朝至於日中或昏暮僅絶其勢不暇一一檢閲細故而省吏往禀宰丞請筆以草檢令承從官齎赴郎官㕔落日押字謂宜遵守元豐及崇寧舊法諸房各具簽貼先都事次㸃檢次郎官押訖赴宰臣請肇行下於是詔曰先帝肇正三省詔給今都司以贊省務今都司寖以曠官緣省吏强悍敢肆侵侮自今違法事其左右司官勿書其事舉劾情重者竄責元豐寄祿為朝議大夫文獻通考卷五十一
