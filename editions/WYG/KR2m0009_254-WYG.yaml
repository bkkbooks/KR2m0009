body:
  text: 文獻通考卷二百五十四鄱陽馬端臨貴與著帝系考五后妃南史后妃傳叙六宮位號前史代有不同晉武帝采漢魏之制置貴嬪夫人貴人是為三夫人位視三公淑妃淑媛淑儀修華修容修儀媫妤容華充華是為九嬪位視九卿其餘有美人才人中才人爵視千石以下宋武帝省一才人其餘仍用晉制按貴嬪魏文帝所制夫人魏武帝初建魏國所制貴人漢光武所制淑妃魏眀帝所制淑媛魏文帝所制淑儀修華晉武帝所制修容魏武帝所制修儀魏眀帝所制媫妤容華前漢舊號充華晉武帝所制美人漢光武所制及孝武孝建三年省夫人置貴妃位比相國進貴嬪比丞相貴人比三司以為三夫人又置昭儀昭容昭華以代修華修儀修容又置中才人充衣以為散位按昭儀漢元帝所制昭容孝武所制昭華魏眀帝所制中才人晉武帝所制充衣前漢舊制及眀帝泰始二年省淑妃昭華中才人充衣復置修華修儀修容才人良人三年又省貴人置貴姬以備三夫人之數又置昭華增淑容承徽列榮以淑媛淑儀淑容昭華昭儀昭容修華修儀修容為九嬪媫妤容華充華承徽列榮凡五職亞九嬪美人才人良人三職為散役其後帝留心後房擬百官備置内職焉及齊高帝建元元年有司奏置貴嬪夫人貴人為三夫人修華修儀修容淑妃淑媛淑儀媫妤容華充華為九嬪美人中才人才人為散職三年太子宮置三内職良娣比開國侯寶林比五等侯才人比駙馬都尉及永眀元年有司奏貴妃淑妃並加金章紫綬佩于闐玉淑妃舊擬九以淑為溫恭之稱妃為亞后之名進同貴妃以比三司夫人之號不殊蕃國降淑媛以比九卿七年復置昭容位在九嬪焉梁武撥亂反正深鑒奢逸配徳早終長秋曠位定令制貴妃貴嬪貴姬為三夫人淑媛淑儀淑容昭華昭儀昭容修華修儀修容為九嬪媫妤容華充華承徽列榮為五職美人才人良人為三職東宫置良娣寶林為二職及簡文元帝出自儲蕃或廹在拘縶或逼於㓂亂且妃竝先殂更不建椒閫陳武光膺天歴以朴素自居故後宮員位其數多闕文帝天嘉之後詔宮職備員其所置立無改梁舊編之令文以為後法然帝性恭儉而嬪嬙不備宣帝後主無所改作今總綴緝以立此篇云宋孝懿蕭皇后名文壽蘭陵人武帝繼母帝為宋公宋王加太妃太后受禪尊為皇太后武敬臧皇后名愛親東莞人適武帝義熙四年殂追贈豫章郡夫人武帝崩祔葬初寧陵武帝張夫人不知何許人生少帝帝即位尊為皇太后少帝廢太后還璽紱隨居吳縣文帝元嘉初拜營陽國太妃二年薨文帝胡太后名道女淮南人義熙初武帝納之生文帝五年被譴死武帝即位追贈媫妤文帝即位上尊號曰章皇太后陵曰熙寜少帝司馬皇后名茂英晉恭帝女宋初拜皇太子妃少帝即位為皇后元嘉初降為滎陽王妃十六年薨文元袁皇后名齊媯陳郡陽夏人父湛少適文帝為王妃生子劭元嘉十七年崩潘淑妃以色進生子濬後為元㐫劭所殺孝武昭路太后名惠男丹陽建康人以貌入後宫生孝武拜淑媛隨孝武出蕃孝武即位尊為太后眀宣沈太后名容姬為文帝美人生眀帝拜媫妤元嘉三十年卒孝武即位追贈太后孝武文穆王皇后名憲嫄琅邪臨沂人初為武陵王妃生廢帝孝武即位立為皇后廢帝即位尊為皇太后殷淑儀南郡王義宣女義宣敗帝密取之假姓殷薨追贈貴妃或云貴妃是殷琰家人入義宣家義宣敗入宫云前廢帝何皇后名令婉廬江􅏦人父瑀初為皇太子妃薨於東宮廢帝即位追諡曰獻皇后眀恭王皇后名貞風琅邪臨沂人初為湘東王妃眀帝即位立為后廢帝即位尊為太后後廢帝陳太妃名妙登丹陽建康屠家女孝武宫人以賜眀帝生後廢帝拜貴妃廢帝即位尊為皇太妃後廢帝江皇后名簡珪濟陽考城人初納為太子妃帝即位為皇后帝既廢降為蒼梧王妃順帝陳太妃眀帝宫人為昭華眀帝以桂陽王休範子令妃養之即位為順帝進為皇太妃順帝謝皇后名梵境陳郡陽夏人父颺順帝立為皇后帝禪位降為汝陽王妃齊武穆裴皇后名惠昭河東聞喜人昇明三年為齊世子妃建元元年為皇太子妃二年薨武帝即位追尊為皇太后文安王皇后名寶眀琅邪臨沂人父􅁮之建元四年為皇太子妃鬱林王即位尊為皇太后稱宣徳宫眀帝即位出居鄱陽王故第梁武定建業迎入宫稱制和帝禪位遜居外宫梁天監時薨鬱林王何妃名婧英廬江􅏦人初為南郡王妃太孫即位立為皇后帝廢貶為王妃海陵王王妃名韶眀琅邪臨沂人父慈初為鬱林王妃王即位為皇后王廢降為妃眀敬劉皇后名惠端彭城人眀帝納之永眀七年卒帝即位贈皇后東昏禇皇后名令璩河南陽翟人父澄建武初納為皇太子妃東昏即位為皇后東昏廢降為庶人和王皇后名舜華琅邪臨沂人儉之孫初為隨王妃帝即位為皇后既禪位降為妃梁武徳郗皇后名徽高平金鄉人父􅁮齊建元末嬪於武帝帝為雍州刺史日殂即位追贈皇后武丁貴嬪名令光譙國人武帝鎮樊城納之生昭眀太子冊為貴嬪普通七年薨文宣阮太后名令嬴會稽餘姚人武帝平建業納為采女生元帝為修容隨出蕃大同六年薨元帝即位追崇為太后簡文王皇后名靈賔琅邪臨沂人初為晉安王妃大通三年拜皇太子妃薨簡文即位追崇為皇后元帝徐妃名昭佩東海郯人天監十六年拜為湘東王妃太清三年以罪死敬夏太后會稽人元帝納之生敬宗昭泰元年尊為太后眀年降為江陰國太妃敬王皇后琅邪臨沂人初為晉安王妃王即位拜皇后禪位降為江陰王妃陳武宣章皇后名要兒吳興烏程人武帝聘之受禪立為皇后文帝即位尊為皇太后文沈皇后名妙容吳興武康人梁大同中歸於文帝武帝即位為臨川王妃文帝即位為皇后廢帝立為皇太后廢帝王皇后琅邪臨沂人初為皇太子妃廢帝即位立為皇后帝廢降為臨海王妃至徳中薨宣桞皇后名敬言河東解縣人宣帝在江陵聘之生後主宣帝即位為皇后後主即位尊為皇太后後主沈皇后名婺華吳興武康人父君理太建三年拜為皇太子妃後主即位立為皇后陳亡入長安隋煬帝每廵幸恒令從駕煬帝被弑后為尼於毗陵天靜寺貞觀初卒張貴妃名麗華本兵家女後主為太子選入宮得幸生太子深拜貴妃陳亡為隋軍所殺北史后妃傳叙魏氏王業之兆雖始於神元然自昭成之前未具言六宮之典而章平思昭穆惠煬烈八帝妃后無聞道武追尊祖妣皆從帝諡為皇后始立中宮餘妾或稱夫人多少無限然皆有品次太武稍增左右昭儀及貴人椒房等後庭漸已多矣又魏故事將立皇后必令手鑄金人以成者為吉不則不得立也又太武文成保母劬渠之恩並極尊崇之義雖事乖典禮而觀過知仁孝文改定内官左右昭儀位視大司馬三夫人視三公三嬪視三卿六嬪視六卿世婦視中大夫御女視元士後置女職以典内司視尚書令僕作司大監女侍中三官視二品監女尚書美人女史女賢人女書史書女小書女五官視三品中才人供人中使女生才人恭使宮人視四品青衣女酒女饗女食奚官女奴視五品及齊神武文襄俱未踐尊極神武嫡妻稱妃其所聘蠕蠕女稱為蠕蠕公主文襄既尚魏朝公主故無别號兩宫自餘姬侍並稱娘而已文宣後庭雖有夫人嬪御之稱然未具員數孝昭内職甚少唯楊妃才貌兼美復是貴家襄城王母桑氏有徳行並蒙恩禮其餘無聞焉河清新令内命婦依古制有三夫人九嬪二十七世婦八十一御女又凖漢制置昭儀有左右二人比丞相其𢎞徳正徳崇徳為三夫人比三公光猷昭訓隆徽為上嬪比三卿宣徽凝暉宣眀順華凝華光訓為下嬪比六卿正華令則修訓曜儀眀淑芳華敬婉昭華光正昭寜貞範宏徽和徳𢎞猷茂光眀信靜訓曜徳廣訓暉範敬訓芳猷婉華眀範艶儀暉則敬為二十七世婦比從三品穆光茂徳貞懿曜光貞凝光範令儀内範穆閨婉徳眀婉艶婉妙範暉章敬茂靜肅章穆華慎儀妙儀眀懿崇眀麗則婉儀彭修閑修靜𢎞慎艶光漪容徽淑秀儀芳婉貞慎明艶穆修範肅容茂儀英淑𢎞艶正信凝婉英範懷順修媛良則瑶章訓成潤儀寧訓淑懿柔則穆儀修禮昭慎貞媛肅閨敬順柔華昭順敬寧眀訓𢎞儀崇敬修敬承閑昭容麗儀閑華思柔媛光懷徳良媛淑猗茂範良信艶華徽娥肅儀妙則為八十一御女比正四品武成好内並具其員自外又置才人采女以為散號後主既立二后昭儀以下皆倍其數又置左右娥英比左右丞相降昭儀比二大夫尋又置淑妃一人比相國周氏率由姬制内職有序文帝創基修衽席以儉約武皇嗣歴節情欲於矯枉宮闈有貫魚之美戚里無私溺之尤可謂得君人之體也宣皇外行其志内逞其欲溪壑難滿采擇無厭恩之所加莫限厮皂榮之所及無隔險詖於是升蘭殿以正位踐椒庭而齊體者非一人焉階房帷而拖青紫縁恩幸而擁玉帛非一族焉雖辛癸之荒淫趙李之傾惑曾未足比其髣髴也人厭苛政弊事實多文帝之祀忽諸特由於此隋文思革前弊大矯其失惟皇后當室傍無私寵婦官位號未詳備焉開皇二年著内官之式略依周禮省減其數嬪三員掌教四徳視正三品世婦九員掌賔客祭祀視正五品女御三十八員掌女功絲枲視正七品又采漢晉舊儀置六尚六司六典遞相統攝以掌宫掖之政一曰尚書掌導引皇后及閨閣禀賜管司令三人掌圖籍法式糾察宣奏典琮三人掌琮璽器玩二曰尚儀掌禮儀敎學管司樂三人掌音律之事典贊三人掌導引内外命婦朝見三曰尚服掌服章寶藏管司飾三人掌簪珥花嚴典櫛三人掌巾櫛膏沐四曰尚食掌進膳先嘗管司醫三人掌方藥卜筮典器三人掌罇彛器皿五曰尚寢掌帷帳牀褥管司筵三人掌鋪設洒掃典執三人掌扇傘燈燭六曰尚工掌營造百役管司製三人掌衣服裁縫典會三人掌財帛出入六尚各三員視從九品六司視勲品六典視流外二品初文獻皇后功參歴試外預朝政内擅宫闈懷嫉妬之心虚嬪妾之位不設三妃防其上逼自嬪以下置六十員又加抑損服章降其品秩至文獻崩後始置貴人三員増嬪至九員世婦二十七員御女八十一員貴人等闗掌宫闈之務六尚以下皆分𨽻焉煬帝時后妃嬪御無釐婦職唯端容麗飾陪從宴游而已帝又參詳典故自制嘉名著之於令貴妃淑妃徳妃是為三夫人品正第一順儀順容順華修儀修容修華充儀充容充華是為九嬪品正第二媫妤一十二員品正第三美人才人一十五員品正第四是為世婦寶林二十員品正第五御女二十四貟品正第六采女三十七員品正第七是為女御總一百二十以叙於燕寢又有承衣刀人皆趨侍左右並無員數視六品以下時又増置女官凖尚書省以六局管二十四司一曰尚宫局管司言掌宣傳奏啓司簿掌名録計度司正掌格式推罰司闈掌門閤管籥二曰尚儀局管司籍掌經史教學紙筆几案司樂掌音律司賔掌賔客司贊掌禮儀贊相導引三曰尚服局管司璽掌琮璽符節司衣掌衣服司飾掌湯沐巾櫛玩弄司仗掌仗衛戎器四曰尚食局管司膳掌膳羞司醖掌酒醴醯醢司藥掌醫巫藥劑司膳掌廩餼柴炭五曰尚寢局管司設掌牀席帳帷鋪設洒掃司輿掌輿輦傘扇執持羽儀司苑掌園籞種植蔬菜𤓰果司燈掌火燭六曰尚工局管司製掌營造裁縫司寶掌金玉珠璣錢貨司綵掌繒帛司織掌織染六尚二十二司員各二人唯司樂司膳員各四人每司又置典及掌以貳其職六尚十人品從第五司二十八人品從第六典二十八人品從第七掌二十八人品從第九女使流外量局閑劇多者十人以下無定員數聯事分職各有司存焉魏獻眀皇后賀氏東部大人野干女生道武皇始元年崩後追加尊號道武皇后慕容氏寶之季