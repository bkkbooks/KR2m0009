聘其女為后宣帝即位尊為皇太后武皇后李氏名娥姿楚人江陵平没入宮周文以賜武帝得幸生宣帝宣政元年尊為皇太后宣皇后楊氏名麗華隋文帝長女帝為太子納為妃即位立為后靜帝即位為皇太后宣帝后朱氏名滿月吳人其家坐事没入東宮宣帝幸之生靜帝立為天元皇后宣帝后陳氏潁川人以選入宮拜徳妃立為天左皇后帝崩出俗為尼唐永徽初卒宣帝皇后元氏名樂尚河南洛陽人開府晟之女入宮為貴妃後立為天右皇后帝崩出俗為尼貞觀中卒宣帝皇后尉遲氏名繁熾蜀公逈之孫女初適把公亮子溫以宗婦入廟帝逼幸之亮謀逆誅遂入宮為天右大皇后帝崩出俗為尼開皇十五年卒靜帝司馬皇后名令姬消難之女納為后二年隋文以后父奔陳廢為庶人後嫁為隋司州刺史李丹妻隋文獻皇后獨孤氏名伽羅河南洛陽人周大司馬衛公信之女文帝受禪立為皇后仁壽二年崩年五十九宣華夫人陳氏陳宣帝女陳亡入掖庭文獻后崩進位為貴人後拜宣華夫人煬帝時卒容華夫人蔡氏丹陽人陳亡以選入宫拜為貴人後加號容華夫人煬帝時卒煬帝愍皇后蕭氏梁眀帝巋之女文帝聘為晉王妃煬帝即位立為皇后煬帝遇弑後没於竇建徳突厥可賀敦隋義城公主使迎之入虜庭唐貞觀四年破突厥以禮致之歸於京師賜宅於興道里二十一年殂詔以皇后禮合葬於揚州煬帝陵隋皇太子納妃禮皇帝臨軒使者受詔而行主人俟於廟門使者執鴈主人迎拜於大門之東使者入升自西階立於楹間南面納采訖仍行問名儀事畢主人請致禮於從者禮有幣馬其次擇日納吉又擇日以玉帛乘馬納徴又擇日告命又擇日命有司以特牲告廟冊妃皇太子將親迎皇帝臨軒醮而誡曰往迎爾相承我宗事朂帥以敬對曰謹奉詔既命羽儀而行主人几筵於門外西面拜皇帝太子答拜主人揖皇太子先入主人升立於阼階西面皇太子升進當房户前北面跪奠鴈俛伏興拜降出妃父進西面戒之母於西階上施衿結帨及門内施鞶申之出門妃升輅乘以几姆加幜皇太子乃馭輪三周馭者代之皇太子出大門乘輅羽儀還宮鷄鳴夙興以妃朝奠笲音煩於皇帝皇帝撫之又奠笲於皇后皇后撫之席於户牖間妃立於席西祭奠而出唐舊制皇后之下有貴妃淑妃徳妃賢妃各一人為夫人正一品昭儀昭容昭媛修儀修容修媛充儀充容充媛各一人為九嬪正二品媫妤九人正三品美人九人正四品才人九人正五品寶林二十七人正六品御女二十七人正七品綵女二十七人正八品以備周禮六宮之數其外又有尚官尚儀尚服尚食尚寢尚功分掌宫中服御藥膳之事宮正糾􅄽失彤史紀功書過龍朔二年改易官名置贊徳二人正一品以代夫人宣儀四人正二品以代九嬪承門五人正四品以代美人承㫖五人正五品以代才人衞仙六人正六品以代寶林供奉八人正七品以代御女持節二十人正八品以代綵女又置侍巾三十人正九品咸亨二年復舊高祖太宗除隋之亂政未下車而大放宮女正位配尊惟其舊徳宫閫之職備員而已所謂刑于内以正乎外及高宗永徽之後政出宮中公卿大夫罔不憚服其取威也多山陵未畢而冢嗣再廢遂掘翦皇室改立宗社非一朝一夕之故其所由來漸矣及中宗追王韋氏崇寵三思使以先朝故事尊誘之於是慶雲之瑞宣於朝廷桑女之歌布於天下防閑之道大壞逆亂之謀構矣卒以禍敗為後王誡元宗即位大加懲革内外有别家道正矣按杜氏通典内官有惠妃麗妃華妃正一品淑儀徳儀賢儀婉儀芳儀六人正二品美人四人正三品才人七人正四品與正史所載率皆不同其名號亦有見於國史但不詳所出今疏之於後以示廣記容齋洪氏隨筆曰自漢以來帝王妃妾之多唯漢靈帝吳歸命侯晉武帝宋蒼梧王齊東昏陳後主晉武至於萬人唐世眀皇為盛白樂天長恨歌云後宮佳麗三千人杜子美劒器行云先帝侍女八千人葢言其多也新唐史所叙謂開元天寶中宮嬪大率至四萬嘻其甚矣隋大業離宮徧天下所在皆置宮女故裴寂為晉陽宮監以私侍高祖及高祖義師經過處悉罷之其多可想吳氏能改齋漫録曰忽㸔金輿向月陂宮人按著便相隨恰從中尉門前過當處教㸔卧鴨池王建宮詞也按唐著作佐郎崔令欽教坊云左右兩教坊右多善歌左多工舞外有水泊俗號月陂陂形如偃月也故王建述此又言妓女入宜春院謂之内人亦曰前頭人常在上前頭也其家得在教坊謂之内人四季給米得幸者謂之十家故王建又宫詞云内人對御疊花牋内人唱好龜兹急内人相續報花開内人籠脫繫紅絛内人恐要秋衣著内人爭乞洗兒錢高祖太穆順聖皇后竇氏京兆平陵人父毅周上柱國歸於高祖隋大業時崩於涿郡年四十五高祖即位追諡皇后太宗文徳順聖皇后長孫氏河南洛陽人父晟歸於太宗帝即位為皇后貞觀十年崩年三十六太宗賢妃徐惠湖州長城人帝聞其文名召為才人永徽元年卒高宗廢后王氏并州祁人初納為晉王妃即位立為皇后永徽六年為武才人所譖廢為庶人後為武氏所殺高宗則天順聖皇后武氏并州文水人父士彠初為太宗才人帝崩與嬪御皆為尼高宗見而悅之召之宮中生四子譖廢王皇后遂立為后稱天后高宗崩為皇太后臨朝中宗和思順聖皇后趙氏京兆長安人父瓖帝為英王聘為妃後為武氏所殺神龍初追諡后中宗崩韋庶人既廢有司乃請以后祔定陵中宗庶人韋氏京兆萬年人父元貞帝在東宮被選為妃嗣聖初立為后後隨帝遷房陵帝復位復正中宮唐隆元年弑帝臨淄王隆基討而誅之追廢為庶人尚官昭容名婉兒父儀得罪死没入掖庭武后時掌内詔命中宗復位拜昭容後以韋氏黨為臨淄王所誅睿宗肅眀順聖皇后劉氏帝在藩納為妃即位立為皇后帝降號皇嗣復為妃後為武后所殺景雲元年追諡睿宗昭成順聖皇后竇氏父孝諶帝即位為徳妃生元宗與劉后俱為武后所殺葬於宮中秘莫知帝崩並招魂祔葬橋陵初太常加諡曰大昭成或言法宜引聖真冠諡而曰大昭成非也以單言配之應曰聖昭若睿成以復言配之應曰大聖昭成聖真昭成又引太穆皇后始諡穆及高祖崩合帝諡曰太穆追增太穆神皇后文徳皇后始諡文徳及太宗崩合諡文徳聖皇后又援范􅁮著漢光烈等為比太常謂􅁮以帝號標后諡是史家記事體婦人非必與夫同也入廟稱后繫夫在朝稱太繫子文母生號也文王既没諡也周公豈以夫從婦乎漢法不可以為據制曰可天寶八載制詔自太穆而下六皇后並增上順聖二諡云元宗皇后王氏同州下邽人梁冀州刺史神念裔孫帝為臨淄王聘為妃即位立為皇后開元十二年以罪廢為庶人寶應初追復后號元宗貞順皇后武氏父攸止㓜入宮帝即位得幸封惠妃禮秩比皇后生壽王瑁薨贈皇后及諡元宗元獻皇后楊氏父知慶帝在東宮為良媛生肅宗為貴嬪肅宗即位追諡皇后元宗貴妃楊氏蒲州永樂人父元琰㓜孤養叔父家始為壽王妃帝恱之乃令其丐為女官號太真潛納之宮中天寶初冊貴妃安祿山反上幸蜀陳元禮等誅楊國忠賜妃死時年三十八肅宗廢后庶人張氏鄧州向城人父去逸帝在東宮為良娣乾元初拜淑妃繼立為皇后帝大漸后謀廢太子李輔國等矯詔廢而殺之肅宗章敬皇后吳氏濮州濮陽人父令珪坐事死故后㓜入掖庭元宗以賜帝幸之生代宗年十八薨代宗即位追尊為后合葬建陵代宗貞懿皇后獨孤氏父頴帝即位冊貴妃生韓王逈大歴十年薨追號為皇后代宗睿真皇后沈氏吳興人開元末以良家子入東宮太子以賜廣平王生徳宗天寶亂賊囚后東都王入洛方北討而河南再為史思眀所陷遂失太后所在徳宗立訪求不得建中初上皇太后尊號憲宗即位詔以大行啓殯日為后發哀内殿上太皇太后諡冊祔代宗廟徳宗昭徳皇后王氏本仕家子帝為魯王時納為嬪生順宗既即位冊號淑妃貞元三年冊為后其年后崩徳宗賢妃韋氏以戚里舊族為良娣徳宗貞元四年冊拜賢妃帝崩自表留奉崇陵園元和時薨順宗莊憲皇后王氏琅邪人代宗時以良家選入宮為才人順宗在藩以才人賜之生憲宗冊為良娣憲宗内禪尊為太上皇后憲宗懿安皇后郭氏汾陽王子儀之孫父曖憲宗為廣陵王聘以為妃生穆宗元和元年進冊貴妃羣臣請立為后帝以掖庭多嬖􅃩恐后得尊位鉗掣不得肆故終不立穆宗嗣位尊為皇太后憲宗孝眀皇后鄭氏丹陽人初為李錡侍人錡反誅入掖庭帝幸之生宣宗宣宗為光王為王太妃帝即位尊為皇太后穆宗恭僖皇后王氏越州人本仕家子侍帝東宮生敬宗長慶時冊為妃敬宗立尊為皇太后穆宗貞獻皇后蕭氏閩人穆宗為建安王后得侍生文宗文宗立尊為皇太后穆宗宣懿皇后韋氏失其先世穆宗為太子得侍生武宗長慶時冊為妃武宗立妃已亡追冊為皇太后尚宮宋若昭貝州清陽人世以儒聞父廷芳能辭章生五女皆警慧善屬文長若莘次若昭若倫若憲若荀莘昭文尤髙皆不肯與寒鄉凡裔為姻對貞元中昭義節度使李抱真表其才徳徳宗召入禁中試文章經史大義悉留之宮中髙其風操不以妾侍命之呼學士若莘卒若昭嗣拜尚宫歴憲穆敬三朝皆呼先生后妃與諸王率以師禮見昭寶歴初卒若憲代司秘書後以罪賜死敬宗貴妃郭氏父義長慶時妃以容入太子宮太子即位為才人生晉王普進為貴妃文宗時薨武宗賢妃王氏邯鄲人失其世年十三入宮穆宗以賜潁王王嗣位進號才人帝崩才人亦自盡宣宗嘉之贈賢妃宣宗元昭皇后鼂氏不詳其世少入邸見寵帝即位為美人生懿宗大中時薨贈昭容懿宗立追尊為皇太后懿宗惠安皇后王氏亦失所來咸通中冊貴妃生晉王七年薨後王即位為僖宗追尊為皇太后懿宗淑妃郭氏㓜入鄆王邸即位以為美人進拜淑妃黄巢之亂流落不知所終懿宗恭憲皇后王氏其出至微咸通中得幸生壽王王立是為昭宗追號皇太后昭宗皇后何氏梓州人系族不顯帝為壽王納之即位號淑妃後冊為皇后帝遇弑哀帝即位尊為皇太后後卒為朱全忠所害文獻通考卷二百五十四
