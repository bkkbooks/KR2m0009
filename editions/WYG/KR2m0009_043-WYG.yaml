body:
  text: 文獻通考卷四十三鄱陽馬端臨貴與著學校考四祠祭褒贈先聖先師録後文王世子凡學春官釋奠於其先師秋冬亦如之官謂禮樂詩書之官周禮曰凡有道者有徳者使教焉死則以為樂祖祭於瞽宗此之謂先師之𩔖也若漢禮有高堂生樂有制氏詩有毛公書有伏生亦可以為之也不言夏夏從春可知也釋奠者設薦饌酌奠而已無迎尸以下之事釋䟽云以其釋奠直奠置扵物無食飲酬酢之事奠所以無尸者以其主扵行禮非報功也正義曰所教之官若春誦夏弦則太師釋奠也教干戈則小樂正樂師等釋奠也教禮即執禮之官釋奠也皇氏云其教雖各有時其釋奠則四時各有其教備而行之四時在學釋奠猶若教書之官春時扵虞庠之中釋奠於先代明書之師四時各然教禮之官秋時扵瞽宗之中釋奠扵其先代明禮之師如此之類是也凡始立學者必釋奠於先聖先師及行事必以幣謂天子命之教始立學官者也先聖周公若孔子先疏云立學為重故及先聖常奠為輕故唯祭師凡釋奠者必有合也注謂國無先聖先師則所釋奠者當與鄰國合朱文公禮書謂以下文大合樂攷之有合當為合樂有國故則否注謂若唐虞有夔伯夷周有周公魯有孔子則各自奠之不合朱文公禮書謂國故當為䘮紀凶札之𩔖凡大合樂必遂養老大合樂謂春入學舍菜合舞秋頒學合聲扵是時也天子視學遂養老謂用其明日也長樂劉氏曰周有天下立四代之學虞庠則以舜為先聖夏學則以禹為先聖殷學則以湯為先聖東膠則以文王為先聖各取當時左右四聖成其徳業者為之先師以配享焉此天子立學之法也臨邛魏氏曰記曰凡學春官釋奠扵其先師釋者曰若禮有高堂生樂有制氏詩有毛公書有伏生又曰凡釋奠者必有合也曰若周有周公魯有孔子各自奠之不合也至扵祀先賢於西學祭樂祖於瞽宗傳者亦謂各扵所習之學祭先師夫周公孔子非周魯之所得而專也而經各立師則周典安有是哉古者民以君為師仁鄙夀夭君實司之而臣則輔相人君以師表萬民者也自孔子已前曰聖曰賢有道有徳則未有不生都顯位沒祭大烝者此非諸生所得祠也自君師之職不修學校廢井牧壞民散而無所係扵是始有師弟子羣居以相講授者所謂各祭其先師疑秦漢以來始有之而詩書禮樂各立師不能以相通則秦漢以來為士者斷不若是之隘也此亦可見世變日降君師之職下移而先王之道分裂矣然而春秋戰國之亂猶有聖賢為之師秦漢以來猶有專門為之師故所在郡國尚存先師之號奠祠扵學故記人識扵禮而傳者又即其所聞見以明之也王制天子将出征𩔖乎上帝宜乎社造乎禰禡於所征之地禡師祭也其禮亡受命於祖告祖也受成於學定兵謀也出征執有罪反釋奠於學以訊馘告釋菜奠幣禮先師也訊馘所生獲斷耳者文王世子天子視學大昕鼓徴乃命有司行事興秩節祭先師先聖焉有司卒事反命始之養也適東序釋奠於先老周禮凡有道有徳者使教焉死則以為樂祖祭於瞽宗太祝大會同造扵廟宜扵社過大山川則用事焉反行舍奠曾子問曰凡告必用牲幣反亦如之甸祝舍奠於祖廟禰亦如之賈公彦曰非時而祭曰奠以其不立尸也儀禮賔朝服釋幣扵禰又釋幣於行遂受命上介釋幣亦如之釋幣扵門乃至扵禰筵几於室薦脯醢觴酒陳主人酌進奠一獻言陳者将復有次也先薦後酌祭禮也行釋幣反釋奠畧出謹入也席於阼薦脯醢三獻禮書曰奠者陳而奠之也鄭氏曰釋奠者設薦饌酌奠而已無迎尸以下事賈公彦曰奠之為言停停饌具而已考之儀禮聘賔歸至於禰薦脯醢觴酒陳陳者所以奠之也則釋奠設薦饌酌奠而已可知也特牲饋食奠觶扵尸未至之前則釋奠無迎尸可知也古者釋奠或施扵山川或施扵廟社或施扵學周官太祝大會同造於廟宜於社過大山川則用事焉反行舍奠甸祝舍奠扵祖廟禰亦如之此施於山川廟社者也大司樂凡有道者有徳者使教焉死則以為樂祖祭於瞽宗文王世子凡學春官釋奠扵先師秋冬亦如之凡始立學者必釋奠於先聖先師及行事必以幣凡釋奠者必有合也天子視學大昕鼓徴乃命有司行事興秩節祭先聖先師焉有司卒事反命適東序釋奠扵先老王制出征執有罪反釋奠扵學以訊馘告此施扵學者也山川廟社之祭不止扵釋奠學之祭釋奠而已賈公彦曰非時而祭曰奠此為山川廟社而言之也學之釋奠則有常時者有非時者文王世子凡學春官釋奠扵先聖先師秋冬亦如之鄭氏曰不言夏夏從春可知此常時之釋奠也凡始立學天子視學出征執有罪反以訊馘告必釋奠焉此非時之釋奠也釋奠之禮有牲幣有合樂有獻酬太祝造扵廟宜乎社過大山川則用事反則釋奠此告祭也曽子問曰凡告必用牲幣文王世子凡始立學釋奠行事必以幣此釋奠有牲幣之證也文王世子凡釋奠者必有合也此釋奠有合樂之證也聘禮觴酒陳席於阼薦脯醢三獻一人舉爵獻從者行酬乃出此釋奠有獻酬之證也然山川廟社之釋奠皆有牲幣學之釋奠非始立學則不必有幣也學之釋奠有合樂則山川廟社不必有合也聘賔釋奠有三獻則天子諸侯之扵山川廟社不止三獻也凡始立學與天子視學釋奠於先聖先師四時則釋奠先師而已文王世子謂春釋奠扵先師鄭氏釋王制亦謂釋奠禮先師其説是也然鄭氏以王制之釋奠為釋菜奠幣以文王世子之釋奠者必有合為與鄰國合孔頴達以學記之釋菜為釋奠其説誤也始立學者既興器用幣興當為釁禮樂之器成則釁之又用幣告以器成然後釋菜告先聖先師以器成将用牢䟽云釋菜惟釋蘋藻而已無牲幣帛不舞不授器釋菜禮輕也釋奠則舞舞則授器司馬之屬司兵司戈司盾祭祀授舞者兵也乃退儐於東序一獻無介語可也言乃退者謂得立三代之學者釋菜扵虞庠則儐賔扵東序魯之學有米廩東序瞽宗也扵䟽云東序與虞庠相對東序在東虞庠在西既退儐東序明釋菜在扵虞庠語即前經合語之等言可也明釋菜時未可語禮尚嚴也大胥春入學舍菜合舞舍菜即釋菜禮先師也菜蘋藻之屬春始以其學士入學宫而學之合舞等其進退使應節奏秋頒學合聲春使之學秋頒其才藝所為合聲亦等其曲折使應節奏月令仲春之月上丁命樂正習舞釋菜樂正樂官之長命習舞者順萬物始出地鼓舞也将舞必釋菜扵先師以禮之夏小正曰丁亥萬舞入學天子乃帥三公九卿諸侯大夫親往視之仲丁又命樂正入學習舞為季春将習合樂也習樂者習歌與八音學記大學始教皮弁祭菜示敬道也皮弁天子之朝服也祭菜禮先聖先師祭疏謂天子使有司服皮弁先聖先師以蘋藻之菜正義曰凡釋奠有六始立學釋奠一也四時釋奠有四通前五也王制師還釋奠扵學六也釋菜有三春入學釋菜合舞一也釁器釋菜二也學記皮弁祭菜三也禮書曰周禮大胥春入學舍菜合舞學記皮弁祭菜示敬道也月令仲春上丁命樂正習舞釋菜文王世子始立學者既興器用幣然後釋菜不舞不授器乃退儐扵東序一獻無介語可也然則釋菜之禮猶摯也婦見姑舅其摯也棗栗腵脩若沒而廟見則釋菜弟子見師其摯也束脩若禮扵先師則釋菜大胥釋菜合舞而文王世子釋菜不舞不授器者以釋奠既舞故也士喪禮君視歛釋菜入門喪大記大夫士既殯而君往焉釋菜扵門内占夣季冬乃舍萌扵四方舍萌釋菜也則釋菜之禮豈特子弟之見先師婦之見廟而已哉婚禮有奠菜儀弟子之見先師其儀盖此𩔖歟鄭氏謂昏禮奠菜盖用堇入學釋菜蘋藻之屬始立學釋菜芹藻之屬盖以泮宫有芹藻子事父母有堇萱故有是説也菜之為摯則菜而已采蘋教成之祭毛氏謂牲用魚芼之用蘋藻則詩所謂湘之者芼之也與釋菜異矣漢高祖十二年十一月上行自淮南還過魯以太牢祠孔子元帝時孔覇以帝師賜爵號褒成君奉孔子後成帝綏和元年封殷後孔子世吉適子孔何齊為殷紹嘉侯千六百七十户後六月進爵為公地滿百里梅福上書曰武王克殷未及下車存五帝之後封殷扵宋紹夏扵把明著三統示不獨有也是以姬姓半天下遷廟之主流出扵户所謂存人以自立者也今成湯不祀殷人無後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖位尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪適傳曰賢者子孫宜有土而况聖人又殷之後哉昔成王以諸侯禮𦵏周公而皇天動威雷風著災今仲尼之廟不出闕里孔氏子孫不免編户以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤逺又譏切王氏故終不見納初武帝時封周後姬嘉為周子南君至元帝時尊周子南君為周承休侯位次諸侯王使諸大夫博士求殷後分散為十餘姓郡國往往得其大家推求子孫絶不能紀時匡衡議以為王者存二王後所以尊其先王而通三統也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絶今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶侯也宜明得殷後而已今之故宋推求其嫡久逺不可得雖得其嫡嫡之先已絶不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後上以其語不經遂見寝至成帝時梅福復言宜封孔子後以奉湯祀綏和元年立二王後推迹古文以左氏榖梁世本禮記相明遂下詔封孔子世為殷紹嘉公平帝元始初追諡孔子曰褒成宣尼公追封孔均為褒成侯光武建武五年上幸魯使大司空祠孔子封殷後孔安為殷紹嘉公周後姬常為周承休公十三年改封常為衞公安為宋公以為漢賔在三公上十三年封孔均子志為褒成侯按西漢時孔氏之裔侯者二人紹嘉侯奉殷後也褒成侯奉孔子之後也建武中興襲爵如故紹嘉之後不知所終褒成之後則志卒子損嗣至和帝永元四年徙封褒尊侯損卒子曜嗣曜卒子元嗣相傳至獻帝初國絶魏時再襲封世世不絶明帝永平二年養三老五更於辟雍郡縣行鄉飲酒禮於學校皆祀聖師周公孔子牲以犬十五年三月幸孔子宅祠仲尼及七十二弟子親御講堂命皇太子諸王説經章帝元和二年春帝東廵狩還過魯幸闕里以太牢祠孔子及七十二人作六代之樂大會孔氏男子二十以上者六十三人命儒者講論語帝謂孔僖曰今日之會扵卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乗辱臨敝里此乃崇禮先師增輝聖徳至扵光榮非所敢承帝笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜褒成侯損及孔氏男女錢帛安帝延光三年幸泰山祀孔子及七十二弟子扵闕里自魯相令丞尉及孔氏親屬婦女諸生悉會賜褒成侯以下帛各有差歐陽氏集古録漢魯相置孔子廟卒史碑云司徒臣雄司空臣戒稽首言魯前相瑛書言詔書崇聖道孔子作春秋制孝經演易繫辭經緯天地故特立廟褒成侯四時來祠事已即去廟有禮器無常人掌領請置百石卒史一人典主守廟謹問太常祠曹掾馮牟史郭元辭對故事辟雍祠先聖太宰太祝各一人備爵太常丞監祠河南尹給牛羊豕大司農給米臣愚以為如瑛言可許臣雄等稽首以聞制曰可讀此可見漢祠孔子其禮如此雄吳雄戒趙戒魯相瑛據碑言姓乙字仲卿徐氏曰按文王世子曰凡學春官釋奠於先聖先師秋冬亦如之又曰凡始立學者必釋奠扵先聖先師既釁器用幣然後釋菜則知古人建立學校未嘗不以祀禮為先也高皇帝雖在倥偬猶能修其祠扵過魯之日武帝興太學而獨未聞釋奠之禮焉明帝行鄉飲扵學校祀聖師周公孔子初似未知所以獨崇宣聖之意至永平十五年幸孔子宅祠仲尼章帝安帝皆幸闕里祠孔子作六代之樂則所以崇文重道者至矣使當時儒學之臣能以古人釋奠之禮而推廣之則又何以加焉魏文帝黄初二年詔曰昔仲尼資大聖之才懐帝王之器當衰周之末無受命之運在魯衞之朝教化乎洙泗之上悽悽焉遑遑焉欲屈已以存道貶身以救世於時王公終莫能用之乃退考五代之禮修素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不宗其文以述作仰其聖以成謀咨可謂命世之大聖億載之師表者也遭天下大亂百祀墮壊舊居之廟毁而不修褒成之後絶而莫繼闕里不聞講頌之聲四時不覩烝嘗之位斯豈所謂崇禮報功盛徳百世必祀者哉其以議郎孔羡為宗聖侯邑百户奉孔子祀令魯郡修起舊廟置百户吏卒以守衞之又扵其外廣為室屋以居學者齊王正始七年令太常釋奠以太牢祀孔子於辟雍以顔淵配晉武帝太始三年改封孔子二十三代孫宗聖侯震為奉聖亭侯又詔太學及魯國四時備三牲以祀孔子七年皇太子講經親釋奠於太學如正始禮惠帝元康三年皇太子講經行釋奠禮扵太學元帝大興二年皇太子講經行釋奠禮扵太學明帝大寜三年詔給奉聖亭侯四時祠孔子祭宜如太始故事成穆孝武三帝皆以講經親釋奠唯成帝在辟雍自是一時制也孝武以太學在水南懸逺有司議依穆帝升平元年扵中堂權立太學釋奠禮畢會百官六品以上宋文帝元嘉八年奉聖侯有罪奪爵至十九年又授孔隱之隱之兄子熙先謀逆又失爵二十八年更以孔惠雲為奉聖侯後有重疾失爵孝武大明二年又以孔邁為奉聖侯邁卒子詡俱切嗣有罪失爵二十二年太子釋奠採晉故事舞六佾設軒懸之樂器用悉依上公祭畢親臨學宴會太子以上悉在齊武帝永明三年有司奏宋元嘉舊事學生到先釋奠先聖先師禮又有釋菜未詳今當行何禮用何樂及禮器時從喻希議用元嘉故事設軒懸之樂六佾之舞牲牢器用悉依上公尚書令王儉議周禮春入學釋菜合舞記云始教皮弁祭菜示敬道也又云始入學必釋奠先聖先師中朝以來釋菜禮廢金石爼豆皆無明文方之七廟則輕比之五祀則重陸納車允謂宣尼廟宜依亭侯之爵范寗欲依周公之廟用王者儀范宣謂當其為師則不臣之釋奠日宜備帝王禮樂此則車陸失扵過輕二范傷扵太重喻希云若王者自設禮樂則肆賞扵致敬之所若欲嘉羙先聖則須所况非備細尋此説守附情理皇朝屈尊𢎞教推以師資引同上公即事惟允元嘉裴松之議故事可依也梁武帝天監八年皇太子釋奠周捨議既惟大禮請依東宫元會太子著絳紗襮音博衣領也樂用軒懸合升殿坐者皆服朱衣帝從之又有司以為禮云凡為人子者升降不由阼階吏部郎徐勉議鄭元云由命士以上父子異宫宫室既異無不由阼階之禮請釋奠及宴會太子升堂並宜由東階若轝駕幸學自然中階其會賔客依舊西階大同七年皇太子表其子寧國臨城公入學時議者以與太子有齒胄之義疑之侍中臣纉等以為參㸃回路並事尼父鄒魯稱盛洙汶無譏師道既光得一資敬無虧亞二制可後魏封孔子二十七葉孫乘為崇聖大夫孝文太和十九年改封二十八葉孫珍為崇聖侯文成帝詔宣尼之廟當别􅃯有司行薦享之禮北齊改封三十一代孫為恭聖侯北齊将講扵天子講畢以一太牢釋奠孔宣父配以顔囘列軒懸樂六佾舞皇太子每通一經及新立學必釋奠禮先聖先師毎嵗春秋二仲常行其禮每月朔制祭酒領博士以下及國子諸學生以上太學四門博士升堂助教以下太學諸生階下拜孔聖揖顔囘日出行事郡學則扵坊内立孔顔廟博士以下亦每月朝張憑議曰不拜顔子者按學堂舊有聖賢之象既備禮盡敬奉尼父以為師而未詳顔子拜揖之儀臣以聖者君道也師者賢臣道也若乃堯舜禹扵君位則稷契與我並為臣矣師元風扵洙泗則顔子吾同門也夫大賢恭已既揖讓於君徳囘也如愚豈越分於人師哉是以王聖佐賢而君臣之義著拜孔揖顔而師資之分同矣後周武帝平齊改封孔子後為鄒國公隋文帝仍舊封孔子後為鄒國公煬帝改封為紹聖侯隋制國子寺每嵗四仲月上丁釋奠扵先聖先師年别一行鄉飲酒禮州縣學則以春秋仲月釋奠亦每年於學行鄉飲酒禮唐高祖武徳二年詔國子學立周公孔子廟各一所四時致祭仍博求其後具以名聞詳考所宜當加爵土七年幸國子學親臨釋奠引道士沙門與博士雜相駁難久之太宗貞觀二年左僕射房元齡等建議武徳中詔釋奠扵太學以周公為先聖孔子配享臣以為周公尼父俱稱聖人庠序置奠本縁夫子故晋宋梁陳及隋大業故事皆以孔子為先聖顔囘為先師歴代所行古今通允伏請停祭周公升孔子為先聖以顔回配詔從之十一年封孔子裔徳倫為褒聖侯修宣尼廟扵兗州給户二十充享祀十四年幸國子學親釋奠二十年詔皇太子於國學釋奠扵先聖先師皇太子為初獻國子祭酒為亞獻攝司業為終獻初釋奠以儒官自為祭主直云博士姓名至是中書侍郎許敬宗等奏按禮記文王世子凡學官春釋奠扵先師鄭元注曰官謂詩書禮樂之官也彼謂四時之學将習其道故儒官釋奠各扵其師既非國家行禮所以不及先聖至扵春秋二時合樂之日則天子視學命有司興秩節摠祭先聖先師焉秦漢釋奠無文可檢至扵魏氏則使太常行事自晉宋以降時有親行而學官為主全無典實且名稱國學樂用軒懸樽爼威儀並皆官備在扵臣下理不合專况凡在小神猶皆遣使行禮釋奠既准中祀據禮必湏禀命今請國學釋奠令國子祭酒為初獻祝詞稱皇帝謹遣仍令司業為亞獻國子博士為終獻其諸州刺史為初獻上佐為亞獻博士為終獻縣學縣令為初獻縣丞為亞獻博士既無秩請主簿通為終獻若闕並以次差攝州縣釋奠既請遣刺史縣令親為獻主望准祭社給明衣修附禮令為永式學令祭以太牢樂用軒懸六佾之舞并登歌一部與大祭祀相遇改用中丁州縣常用上丁無樂祭用少牢二十一年詔以左邱明卜子夏公羊高糓梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭康成服子慎何休王肅王輔嗣杜元凱范寗賈逵等二十二人代用其書垂扵國胄自今有事扵太學並令配享尼父廟堂高宗永徽中制改周公為先聖孔子為先師顔回左邱明從祀顯慶二年太尉長孫無忌等議曰按新禮孔子為先聖顔囘為先師又准貞觀二十一年以孔子為先聖更以左邱明等二十二人與顔囘俱配尼父扵太學今據永徽令文改用周公為先聖遂黜孔子為先師顔囘邱明並為從祀謹按禮記云凡學春官釋奠扵其先師鄭元注曰官謂詩書禮樂之官也先師者若禮有高堂生樂有制氏詩有毛公書有伏生可以為師者又禮記曰始立學釋奠扵先聖鄭元注曰若周公孔子也據禮為定昭然自别聖則非周即孔師則偏善一經漢魏以來取捨各異顔囘孔子互作先師宣父周公迭為先聖求其節文遞有得失所以貞觀之末親降綸言依禮記之明文酌康成之奥説正孔子為先聖加衆儒為先師永垂制扵後昆革往代之紕繆而今新令不詳制㫖輒事刋改遂違明詔但成王幼年周公踐極制禮作樂功比帝王所以禹湯文武成王周公為六君子又説明王孝道乃述周公嚴配此即姬旦鴻業合同王者祀之儒官就享實貶其功仲尼生衰周之末拯文䘮之弊祖述堯舜憲章文武𢎞聖教扵六經闡儒風扵千世故孟軻稱生民以來一人而已自漢已降奕葉封侯崇奉其聖迄扵今日胡可降兹上哲俯入先師且邱明之徒見行其學貶為從祀亦無故事今請改令從詔扵義為允其周公仍依别禮配享武王詔從之三年文宣王廟詔用宣和之舞國子博士范頵撰樂章總章三年皇太子𢎞釋奠於國學開耀元年景龍二年永隆二年並行此禮乾封元年追贈孔子為太師天授元年封孔子為隆道公總章元年顔回贈太子少師曾參贈太子少保並配享孔子廟元宗開元七年以貢舉人将謁先師質問疑義敇皇太子及諸子宜行齒胄禮乃謁先聖太子初獻亞終獻並以胄子充右散騎常侍禇無量講孝經并禮記文王世子篇初詔侍中宋璟亞獻中書侍郎蘓頲終獻及臨享上思齒胄之義乃改焉又詔春秋釋奠用牲牢其屬縣用酒脯而已八年國子司業李元瓘奏言京國子監廟堂先聖孔宣父配坐先師顔子今其像見立侍准禮授坐不立授立不跪况顔子道亞生知才光入室既當配享其儀見立請據禮文合從坐侍又四科弟子閔子騫等並伏膺儒術親承聖教雖復列像廟堂不參享祀謹按祠令何休等二十二賢猶霑從祀豈有升堂入室之子獨不霑配享之餘望請春秋釋奠列享在二十二賢之上七十子者則文翁之壁尚不闕如豈有國庠遂無圗繪請命有司圖形扵壁兼為立贊庶敦勸儒風光崇聖烈曾參孝道可崇獨受經扵夫子望准二十二賢從享詔曰顔子等十哲宜為坐像悉令從祀曾參大孝徳冠同列特為塑像坐扵十哲之次因圗畫七十弟子及二十二賢扵廟壁上以顔子亞聖親為製贊書於石仍令當朝文士分為之贊題其壁焉按自禮記釋奠扵先聖先師之説鄭康成釋先師以為如樂有制氏詩有毛公禮有高堂生書有伏生之𩔖自是後儒言釋奠者本禮記言先師者本鄭氏注唐貞觀時遂以左邱明以下至賈逵二十二人為先師配食孔聖夫聖作之者也師述之者也述夫子之道以親炙言之則莫如十哲七十二賢以傳授言之則莫如子思孟子必是而後可以言先師可以繼先聖今捨是不録而皆取之扵釋經之諸儒姑以二十二子言之獨子夏無以議為左邱明公羊高糓梁赤猶曰受經扵聖人而得其大義至扵高堂生以下則謂之經師可矣非人師也如毛鄭之釋經扵名物固為該洽而義理間有差舛至王輔嗣之宗㫖老荘賈景伯之附會讖緯則其所學已非聖人之學矣又况戴聖馬融之貪鄙則其素履固當見擯扵洙泗今乃俱在侑食之列而高第弟子除顔淵之外反不得預李元瓘雖懇懇言之而僅能升十哲曾子儕扵二十二子之列而七十二賢俱不霑享祀盖拘扵康成之注而以專門訓詁為盡得聖道之傳也二十七年詔曰𢎞我王化在乎儒術能發此道啟廸含靈則生人以來未有如夫子者也所謂自天攸縱将聖多能徳配乾坤身揭日月故能立天下之大本成天下之大經美政教移風俗君君臣臣父父子子人到於今受其賜不其猗歟於戲楚王莫封魯公不用俾夫大聖才列陪臣棲遑旅人固可知矣年祀寖逺光靈益彰雖代有褒稱而未為崇峻不副扵實人其謂何夫子既稱先聖可追諡為文宣王令三公持節冊命其後嗣褒聖侯改封嗣文宣王昔周公南靣夫子西坐今位既有殊豈宜依舊宜補其墜典永作成式其兩京國子監及天下諸州夫子南靣坐十哲等東西行列侍且門人三千見稱十哲包夫衆羙實越等夷暢元聖之風規發人倫之耳目並宜褒贈以寵賢明其顔子既云亞聖須優其秩顔子贈兗國公閔子騫贈費侯冉伯牛贈鄆侯冉仲弓贈薛侯宰子我贈齊侯端木子貢贈黎侯冉子有贈徐侯仲子路贈衞侯言子游贈吳侯卜子夏贈魏侯又孔子格言參也稱魯雖居七十之數不載四科之目頃雖參扵十哲終未殊扵等倫乆稽先㫖俾修舊位庶乎禮得其序久焉式瞻命尚書左丞相裴耀卿攝太尉持節就國子廟冊冊畢所司奠祭亦如釋奠之禮又遣太子少保崔琳往東都就廟行冊禮又敕兩京及兗州舊宅廟像宜改服衮冕其諸州及縣廟宇既小但移南面不須改衣服兩京樂用宫懸春秋二仲上丁令三公攝行事七十子並宜追贈曾參贈郕伯顓孫師贈陳伯澹臺滅明贈江伯宓子賤贈單伯原憲贈原伯公冶長贈莒伯南宫子容贈郯伯公晢哀贈郳伯曾㸃贈宿伯顔路贈把伯商瞿贈䝉伯高柴贈共伯漆雕開贈滕伯公伯寮贈任伯司馬牛贈向伯樊遲贈樊伯有若贈卞伯公西赤贈郜伯巫馬期贈鄫伯梁鱣贈梁伯顔栁贈蕭伯冉孺贈紀伯曹䘏贈曹伯伯䖍贈聊伯公孫龍贈黄伯冉季贈東平伯秦子南贈少梁伯漆雕子歛贈武城伯顔子驕贈琅琊伯漆雕徒父贈須句伯壤駟赤贈北徴伯啇澤贈睢陽伯石作蜀贈石邑伯任不齊贈任城伯公夏守贈亢父伯公良孺贈東牟伯后處贈營邱伯秦子開贈彭衙伯奚容蒧贈下邳伯公肩定贈新田伯顔襄贈臨沂伯鄡單贈銅鞮伯句井疆贈淇陽伯罕父黑贈乗邱伯秦商贈上洛伯申黨贈邵陵伯公祖子之贈期思伯榮子期贈雩婁伯縣成贈鉅野伯左人郢贈臨淄伯燕伋贈漁陽伯鄭子徒贈滎陽伯顔之僕贈東武伯原亢贈萊蕪伯樂欬贈昌平伯亷潔贈莒父伯顔何贈開陽伯叔仲會贈瑕邱伯狄黑贈臨濟伯邽巽贈平陸伯孔忠贈汶陽伯公西輿如贈重邱伯公西蒧贈祝阿伯蘧瑗贈衞伯施常贈乘氏伯林放贈清河伯秦非贈汧陽伯陳亢贈潁伯申棖贈魯伯琴牢贈闕伯顔噲贈朱虚伯歩叔乗贈淳于伯琴張贈南陵伯右孔子弟子姓名之可見者史記家語所載并十哲共七十七人内公伯寮秦商鄡單家語不載而别有琴牢陳亢縣亶三人唐贈典見禮樂志及唐會要所載並七十七人姓名與史記同獨杜氏通典所載則除十哲外自計七十三人係增入蘧瑗林放陳亢申棖琴牢琴張六人若以為七十二賢在十哲之外則史記家語所載少五人通典所載多一人然太史公作仲尼弟子傳序言孔子之所嚴事扵周則老子扵衛蘧伯玉扵齊晏平仲於楚老萊子扵鄭子産於魯孟公綽數稱臧文仲栁下惠銅鍉伯華介山子然孔子皆後之不並世又史稱孔子適衞主蘧伯玉及反魯伯玉使人至孔子禮其使而稱以夫子則尊之者如此然則瑗雖賢盖非門弟子之列也國子祭酒劉瑗奏准故事釋奠之日羣官道俗皆合赴監觀禮請依故事制可肅宗上元中以嵗旱罷中小祀而文宣王之祭至仲秋猶祠之扵太學永泰二年八月修國學祠堂成祭酒蕭昕始奏釋奠宰相元載杜鴻漸李抱玉及常參官六軍将軍就觀焉自復二京惟正會之樂用宫縣郊廟之享登歌而已文武二舞亦不能具至是魚朝恩典監事乃奏宫縣於論堂而雜以教坊工伎憲宗時夔州刺史劉禹錫嘗歎天下學校廢乃奏記宰相曰言者謂天下少士而不知養材之道鬰堙不揚非天不生材也是不耕而歎廩庾之無餘可乎貞觀時學舍千二百區生徒三千餘外夷遣子弟入附者五國今室廬圯廢生徒衰少非學官不振病無貲以給之也凡學官春秋釋奠扵先師斯止辟雍頖宫非及天下今州縣咸以春秋上丁有事孔子廟其禮不應古甚非孔子意漢初羣臣起屠販故孝惠高后間置原廟扵郡國逮元帝時韋元成遂議罷之夫子孫尚不敢違禮饗其祖况後學師先聖道而欲違之傳曰祭不欲數又曰祭神如神在與其煩扵薦饗孰若行其教令教令頺靡而以非禮之祀媚之儒者所宜疾竊觀歴代無有是事武徳初詔國學立周公孔子廟四時祭貞觀中詔修孔子廟兖州後許敬宗等奏天下州縣置三獻官其他如立社元宗與儒臣議罷釋奠牲牢薦酒脯時王孫林甫為宰相不渉學使御史中丞王敬從以明衣牲牢著為令遂無有非之者今夔四縣嵗釋奠費十六萬舉天下州縣嵗費凡四千萬適資三獻官飾衣裳飴妻子扵學無補也請下禮官博士議罷天下州縣牲牢衣幣春秋祭如開元時籍其資半畀所𨽻州使增學校舉半歸太學猶不下萬計可以營學室具器用豐饌食增掌故以備使令儒官各加稍食州縣進士皆立程督則貞觀之風粲然可復當時不用其言德宗建中三年以文宣王三十七代孫齊卿為兗州司馬襲文宣王貞元二年二月釋奠自宰臣已下畢集於國學學官升講座陳五經大義及先聖之道九年九月太常奏以十一月貢舉人謁先師合與親饗太廟日同准六典上丁釋奠若與太祠同日即用中丁其謁先師請别擇日從之十五年膳部郎中歸崇敬奏時議每年春秋釋奠祝版御署訖北面而揖臣以為其禮太重按大戴禮師尚父授周武王丹書武王東面受之請參酌輕重庶得其宜憲宗元和四年以文宣王三十八代孫惟昉為兗州參軍十三年以文宣王三十八代孫惟晊襲文宣王武宗會昌二年以文宣王三十九代孫榮為國子監丞襲文宣王後唐長興三年國子博士蔡同文奏伏見每年春秋二仲月上丁釋奠扵文宣王以兗公顔子配坐以閔子騫等為十哲排祭奠其有七十二賢圖形扵四壁靣前皆無酒脯自今後乞准本朝舊規文宣王四壁諸英賢畫像前面請各設一豆一爵祠饗中書帖太常禮院檢討禮例分析申者今禮院檢郊祀録釋奠文宣王並中祠例祭以少牢其配座十哲見今行釋奠之禮伏自喪亂以來廢祭四壁英賢今准帖為國子博士蔡同文所奏文宣王四壁諸英賢各設一豆一爵祠享當司詳郊祀錄文宣王從祀諸座各籩二實以栗黄牛脯豆二實以葵葅鹿醢簠簋各一實以黍稷飯酒爵一禮文所設祭器無一豆一爵之儀者奉勅其文宣王廟四壁英賢自此每釋奠宜准郊祀錄各陳脯醢等諸物以祭周廣順二年六月以文宣王四十三代孫前曲阜縣令孔仁玉復為曲阜縣令仍賜緋魚袋以亞聖顔淵裔孫顔渉為曲阜縣主簿仍勅兖州修葺祠宇墓側禁樵採時車駕親征兖州初平遂幸曲阜謁孔子祠既奠将致敬左右曰仲尼人臣也無致敬之禮上曰文宣百代帝王師得無拜之即拜奠扵祠前致堂胡氏曰人為諂諛趨利而不顧義者也孔子大聖途之人猶知之豈以位云乎如以位固異代之陪臣也如以道則配乎天地如以功則賢乎堯舜卒伍一旦為帝王而以異代陪臣臨天下之大聖豈特趨利𨗳諛又無是非之心矣斯臣也當周太祖時以拜孔子為不可則當石高祖時必以拜契丹為可者是故君子有言天下國家所患莫甚扵在位者不知學在位者不知學則其君不得聞大道則淺俗之論易入理義之言難進人主功徳高下一係扵此然則學乎學乎豈非君臣之急務哉宋初增修先聖及亞聖十哲塑像七十二賢及先儒二十一人皆畫像扵東西廊之板壁太祖親撰先聖及亞聖贊從祀賢哲先儒並命當時文臣為之贊其春秋二丁及仲冬上丁貢舉人謁先聖先師命官行釋奠之禮皆如舊典太祖皇帝建隆三年詔廟門凖令立㦸十六枝乾徳四年以文宣王四十四代陵廟主進士孔宜為兖州曲阜縣主簿太宗太平興國三年詔孔宜可授太子右贊善大夫襲封文宣公十月詔免兖州曲阜縣襲封文宣公家租税先是歴代以聖人之後不預庸調周顯徳中遣使均田遂抑為編户至是孔氏訴扵州以聞帝特免之眞宗咸平三年詔曲阜縣令襲封文宣公孔延世許扵􅆹上見知州通判及轉運使仍留三年又賜以祭器經書及銀帛各五十兩兖州舊以七户守孔子墳至是增二十户大中祥符元年以将東封泰山詔兗州宣尼宜令判州事王欽若致祭又詔封把日文宣王四十六代孫賜同學究出身孔聖祐令衣綠次京官陪班位十一月東封禮畢幸曲阜縣謁文宣王廟上服鞾袍詣廟酌獻廟内外設黄麾仗孔氏家屬陪列初有司定儀止肅揖上特再拜又幸叔梁紇堂命刑部尚書溫仲舒等分奠七十六弟子先儒叔梁紇顔氏上製贊刻石廟中復幸孔林以樹木擁道降輿乗馬至文宣王墓奠拜追謚曰元聖文宣王先是詔有司檢討漢唐褒崇宣聖故事初欲追謚為帝或言宣父周之陪臣周止稱王不當加帝號故第增美名春秋演孔圖曰孔子母夢感黑帝而生故曰元聖荘子曰恬澹元聖素王之道遂取以為稱又詔以御香一合并爐及親奠祭器留廟中賜其家錢二百千綵三百疋録親屬五人並賜出身又賜太宗御製書百五十卷及銀器八百兩製宣聖冕服玉圭廟給守兵四十人詔封叔梁紇齊國公顔氏魯國太夫人丌官氏鄆國夫人詔追封孔子弟子兗公顔回兗國公費侯閔損琅琊公鄆侯冉耕東平公薛侯冉雍下邳公齊侯宰予臨淄公黎侯端木賜黎陽公徐侯冉求彭城公衞侯仲由河内公吳侯言偃丹陽公魏侯卜商河東公郕伯曾參瑕邱侯陳伯顓孫師宛邱侯江伯澹臺滅明金鄉侯單伯宓不齊單父侯原伯原憲任城侯莒伯公冶長高宻侯郯伯南宫縚龔邱侯郳伯公晳哀北海侯宿伯曾㸃萊蕪侯把伯顔無繇曲阜侯䝉伯商瞿湏昌侯共伯高柴共城侯滕伯漆雕開平輿侯任伯公伯寮夀張侯向伯司馬耕楚邱侯樊伯樊湏益都侯郜伯公西赤鉅野侯卞伯有若平隂侯鄫伯巫馬期東阿侯潁伯陳亢南頓侯梁伯梁鱣千乗侯蕭伯顔辛陽糓侯紀伯冉孺臨沂侯東平伯冉季諸城侯聊伯伯䖍沭陽侯黄伯公孫龍枝江侯彭衙伯秦冉新息侯少梁伯秦商鄄城侯武城伯漆雕哆濮陽侯瑯琊伯顔驕雷澤侯湏句伯漆雕徒父高苑侯北徴伯壤駟赤上邽侯清河伯林放長山侯睢陽伯商澤鄒平侯石邑伯石作蜀成紀侯任城伯任不齊當陽侯魯伯申棖文登侯東牟伯公良孺牟平侯曹伯曹䘏上蔡侯下邳伯奚容濟陽侯淇陽伯句井疆滏陽侯邵陵伯申黨淄川侯期思伯公祖句兹即墨侯雩婁伯榮期厭次侯鉅野伯縣成城武侯臨淄伯左人郢南華侯漁陽伯燕伋汧源侯滎陽伯鄭國朐山侯汧陽伯秦非華亭侯乘氏伯施之常臨濮侯朱虚伯顔噲濟隂侯淳于伯歩叔乗博昌侯東武伯顔之僕寃句侯衞伯蘧瑗内黄侯瑕邱伯叔仲會博平侯開陽伯顔何堂邑侯臨濟伯狄黑林慮侯平陸伯邽巽高堂侯汶陽伯孔忠鄆城侯重邱伯公西輿如臨胊侯祝阿伯公西蒧徐城侯南陵伯琴張頓邱侯又詔封元聖文宣王廟配饗先魯史左邱明瑕邱伯齊人公羊高臨淄伯魯人榖梁赤龔邱伯秦博士伏勝乘氏伯漢博士高堂生萊蕪伯九江太守戴聖楚邱伯河間博士毛萇樂夀伯臨淮太守孔安國曲阜伯中壘校尉劉向彭城伯後漢大司農鄭衆中牟伯河南杜子春緱氏伯南郡太守馬融扶風伯北中郎將盧植良鄉伯大司農鄭康成高密伯九江太守服䖍滎陽伯侍中賈逵岐陽伯諫議大夫何休任城伯魏衞將軍太常蘭陵亭侯王肅贈司空尚書郎王弼封偃師伯晉鎭南大將軍開府儀同三司當陽侯杜預贈司徒豫章太守范寗封鉅野伯命三司使兩制待制館閣官作贊大中祥符二年詔太常禮院定州縣釋奠禮器數禮院言先聖先師每座酒罇二籩八豆八簋二簠二爼三罍一洗一篚一罇皆加勺羃各置扵坫巾共二燭一爵共四坫共二或有從祀之處諸座各籩二豆一簋一簠一爼一燭一爵一乞頒下從之紹興七年有司奏釋奠初依奏告制後比擬舊例視感生帝而加鉶鼎三實以鉶􅃵登一實以脂肝十哲從祀九十八位其用羊豕各一每位籩二栗鹿脯簠一稷簋一黍爼一羊豚腥肉爵一實以清酒五年詔改元聖文宣王諡為至聖文宣王避聖祖名也天禧元年以文宣王四十六代孫光禄寺丞聖祐襲封文宣公判國子監孫奭言釋奠舊禮以祭酒司業博士為三獻新禮以三公行事近年只差獻官二員通攝伏恐未副崇祀嚮學之意望令備差太尉太常光禄卿以充三獻詔可又詔釋奠儀注及祭器圗令崇文館雕印頒行下諸路歐陽氏襄州榖城縣夫子廟記釋奠釋菜祭之畧者也古者士之見師以菜為摯故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠釋奠有樂無尸而釋菜無樂則其又畧也故其禮亡焉而今釋奠幸存然亦無樂又不徧舉扵四時獨春秋行事而已自孔子沒後之學者莫不宗焉故天下皆尊以為先聖而後世無以易學校廢久矣學者莫知所師一有則字又取孔子門人之高弟曰顔回者而配焉以為先師隋唐之際天下州縣皆立學置學官生員而釋奠之禮遂以著令其後州縣學廢而釋奠之禮吏以其著令故得不廢學廢矣無所從祭則皆廟而祭之荀卿子曰仲尼聖人之不得勢者也然使其得勢則為堯舜矣不幸無時而沒特以學者之故享弟子春秋之禮而後之人不推所謂釋奠者徒見官為立祠而州縣莫不祭之則以為夫子之尊由此為盛甚者乃謂生雖不得位而沒有所享以為夫子榮謂有徳之報雖堯舜莫若何其謬論者歟祭之禮以迎尸酌鬯為盛釋奠薦饌直奠而已故曰祭之畧者其事有樂舞授器之禮今又廢則扵其畧者又不備焉然古之所謂吉凶鄉射賔燕之禮民得而見焉者今皆廢失而州縣幸有社稷釋奠風雨雷師之祭民猶得以識先王之禮器焉其牲酒器幣之數升降俯仰之節吏又多不能習至其臨事舉多不中而色不荘使民無所瞻仰見者怠焉因以為古禮不足復用可勝嘆哉按古者入學則釋奠扵先聖先師明聖賢當祠之扵學也自唐以來州縣莫不有學則凡學莫不有先聖之廟矣然攷之前賢文集如栁子厚栁州文宣王廟碑與歐公此記及劉公是新息縣鹽城縣夫子廟記皆言廟而不及學盖衰亂之後荒陋之邦往往庠序頹圯教養廢弛而文廟獨存長吏之有識者以興學立教其事重而費鉅故姑葺文廟俾不廢夫子之祠所謂猶賢乎已然聖賢在天之靈固非如釋老二氏與典祀百神之以驚動禍福炫耀愚俗為神而欲崇大其祠宇也廟祀雖設而學校不修果何益哉文獻通考卷四十三
