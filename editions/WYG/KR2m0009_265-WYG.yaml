body:
  text: 文獻通考卷二百六十五鄱陽馬端臨貴與著封建考六秦楚之際諸侯王秦制侯以下二十等爵罷封建秦制爵二十等以賞功二十徹侯徹侯金印紫綬功大者食縣小者食鄉亭得臣其所食吏民後避漢武帝諱乃改曰通侯或曰列侯十九關内侯雖有侯號而居京畿無國邑時六國未平將帥皆家關中故以為號劉昭曰關内侯無土寄食在所縣民租多少各有户數為限如淳釋曰列侯出關就國但爵其身有家累者與之關内之邑食其租税又有倫侯建成侯趙亥武信侯馮無擇是也但有封名而無食邑十八大庶長劉昭曰自左庶長以上至大庶長者將軍也所將庶人更卒故以為大庶長即大將軍也左右庶長即左右偏禆也十七駟車庶長言乗駟馬之車而為衆庶之長十六大上造言皆主上造之士十五少上造十四右更言主預更率部其役事十三中更十二左更十一右庶長言為衆列之長十左庶長九五大夫大夫之尊者也劉昭曰自公士至五大夫皆軍吏也八公乗言得乘公家之車也劉昭曰自吏民爵不得過公乗則公乗者得貰與子若同産然則公乗者軍吏之爵最尊者七公大夫與下同六官大夫加官者示稍尊也亦謂之國大夫五大夫列位從大夫四不更言不預更卒之事三簪褭以組帯馬曰褭簮褭者主飾此馬二上造造成也言有成命於上一公士言有爵命異於士卒劉昭曰步卒之有爵為士者也戰國之際秦項之間權設班寵有加賜邑君者蓋假其位號或空受其爵耳則田嬰為靖郭君白起為武安君魏冉弟為華陽君秦昭王弟為涇陽君及髙陵君蔡澤為剛成君其後項梁為武信君陳餘為成安君李左車為廣武君之類是也至漢尚多蓋封爵之外别加美號也秦爵二十等起於孝公之時商鞅立此法以賞戰功按古之所謂爵者皆與之以土地如公侯伯子男以至附庸及孤卿大夫亦俱有世食禄邑若秦法則惟徹侯有地關内侯則虛名而已庶長以下不論也始皇遣王翦擊楚翦請美田宅甚衆曰為大王將有功終不得封侯然則秦雖有徹侯之爵而受封者蓋少考之於史惟商鞅封商於魏冉封穰侯范睢封應侯吕不韋封文信侯嫪毐封長信侯及始皇既稱皇帝東游海上至瑯琊羣臣議頌功德惟列侯武成侯王離通武侯王賁倫侯索隱曰爵卑於列侯無封邑者倫類也亦列侯之類建成侯趙亥倫侯昌武侯成倫侯武信侯馮無擇如是者不數人而已然鞅冉不韋毐皆身坐誅廢睢雖幸善終而亦未聞傳世王離以下俱無聞焉蓋秦之法未嘗以土地予人不待李斯建議而後始罷封建也始皇二十六年王初并天下丞相王綰等言諸侯初破燕齊荆地逺不為置王毋以填之請立諸子始皇下其議羣臣羣臣皆以為便廷尉李斯議曰周文武所封子弟同姓甚衆然後屬族疏逺相攻擊如仇讐周天子弗能禁止今海内頼陛下神靈一統皆為郡縣諸子功臣以公賦税重賞賜之甚足易制天下無異意則安寕之術也置諸侯不便始皇曰天下共苦戰鬭不休以有侯王頼宗廟天下初定又復立國是樹兵也而求其寕息豈不難哉廷尉議是分天下為三十六郡郡置守尉監秦既并天下丞相綰請分王諸子廷尉斯請罷封建置郡縣始皇從之自是諸儒之論封建郡縣者歴千百年而未有定説其論之最精者如陸士衡曹元首則主綰者也李百藥柳宗元則主斯者也二説互相排詆而其所發明者不過公與私而已曹與陸之説曰唐虞三代公天下以封建諸侯故享祚長秦私天下以為郡縣故傳代促柳則反之曰秦公天下者也眉山蘓氏又從而助之曰封建者争之端亂之始篡殺之禍莫不由之李斯之論當為萬世法而世之醇儒力詆之以為二氏以反理之評詭道之辨而妄議聖人然則後之立論者宜何從以封建為非邪是帝王之法所以禍天下後世也以封建為是邪則柳蘓二子之論其剖析利害指陳得失莫不切當不可廢也愚嘗因諸家公私之論而折衷之曰封建郡縣皆所以分土治人未容遽曰此公而彼私也然必有公天下之心然後能行封建否則莫如郡縣無公天下之心而欲行封建是授之以作亂之具也嗚呼封建之難行久矣蓋其弊不特見於周秦之際而已見於三代之初何也昔者唐虞之世建國至衆也天子廵狩而諸侯述職然後敷納以言明試以功車服以庸書之所載如此而已不聞其争土地以相侵伐干王畧以勤六師也舜之時蠻夷嘗猾夏矣而命臯陶以修五刑五流之法有苗嘗弗率矣雖命禹以徂征卒之以舞干羽而格則是亦不戰而屈之也夫蠻夷有苗皆要荒之外王政所不加者也而士師足以治之不戰足以服之則當時四岳十二牧所統之國其謹侯度以奉其上而不勤征討也審矣又安得如柳氏所謂羣之分其争必大大而後有兵如蘓氏所謂争之端而亂之始乎所以然者何也則堯舜公天下之心有以服之也蓋堯在位七十載詢於衆庶以帝位授之舜舜在位三十有三載詢於衆庶以帝位授之禹而當時之衆建諸侯也有徳者爵之功加於民者爵之堯舜無容心也居天下之上而與天下之賢且能者分治之逮其倦勤則必求天下之有聖德者而禪之夫惟天子不以天下自私而後諸侯不敢以其國自私是以雖有土地之廣人民之衆甲兵之强其勢足以為亂而莫不帖服於其下如臂指之相使以為當然是則唐虞以公天下之心行封建而當時封建所以無敝也蓋家天下自夏始大封同姓而命之曰藩屏王室自周始二者皆聖人隨時制變以綱維斯世未容以私議之也然上視堯舜則少褊矣故封建之敝始於夏而成於周是以禹一傳而啟有有扈氏之征再傳而仲康有羲和之征夫以天子而征諸侯諸侯弗率而上干天子之征禹之前無有也而始於有扈夫有扈之罪曰威侮五行怠棄三政而已羲和之罪曰沈湎於酒畔官離次而已二罪者以法議之則誅止其身而二人生於漢世則一廷尉足以定其罪矣而啟與仲康必命六師以征之者則必恃其土地甲兵不即引咎而悍然以抗其上矣書紀其事曰大戰曰徂征而觀其誓師之辭有不用命之戮焉有愛克厥威之戒焉殱渠魁釋脅從之令焉則兵師之間所傷衆矣夫治一人之罪而至於興師使無辜之人受用兵之禍則封建之敝也故曰已見於三代之初此之謂也夫有扈羲和之罪雖王政所必討而比之猾夏則有間矣舜之時士師明刑足以正蠻夷猾夏之罪而啟少康之時非天子總六師不足以治諸侯怠慢沈湎之過則可以見當時諸侯擅其富强非文告刑禁之所能詰也自是而後天子私其天位而世守之諸侯亦私其國之土地甲兵而擅用之幸而遇賢聖之君德足以懷而威足以制則猶可攝服而其中衰之際人心未離而諸侯先叛之至於周列五等邦羣后雖曰親賢並建而終不以異姓先諸姬文昭武穆之封遍於天下封建之法益詳經制益密而示人益褊矣是以夏商有國數百年茍未至於桀紂之暴猶足以制宇内而朝諸侯而周數傳而後即有末大不掉之憂故景王之責晋曰文武成康之建母弟以藩屏王室亦其廢隊是為豈如弁髦而因以敝之而李斯之説亦曰周文武所封子弟同姓甚衆然後屬疏逺相攻擊如仇讐周天子弗能禁也然則其效可覩矣蓋時不唐虞君不堯舜終不可復行封建謂郡縣之法出於秦而必欲易之者則書生不識變之論也夫置千人於聚貨之區授之以挺與刃而欲其不為奪攘矯䖍則為之主者必有伯夷之亷伊尹之義使之靡然潛消其不肖之心而後可茍非其人則不若藏挺與刃嚴其撿制而使之不得以逞此後世封建之所以不可行而郡縣所以為良法也而王綰淳于生之徒乃欲以三代不能無敝之法使始皇行之是教盗跖假其徒以利器而與之共處也則亦不終日而刃劘四起矣或曰禹之傳子周之封同姓皆聖人之經制也而子顧妄議其私天下而以為劣於唐虞何哉曰世之不古久矣聖人不能違時不容復以上古之法治之也而世固不能知聖人之心也記曰有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之殷人作誓而民始畔周人作㑹而民始疑然則殷周豈果劣於虞夏乎而或畔或疑起於誓㑹者以時人之不皆聖人也禮運載夫子言大道之行天下為公選賢與能講信修睦而繼之以謀閉而不興盜竊亂賊而不作以為大同大道既隱天下為家各親其親各子其子而繼之以謀用是作而兵由此起禹湯文武成王周公由此其選以為小康然則官天下與家天下者其規模之廣隘治效之優劣雖聖人不能比而同之矣萬章曰人有言至於禹而德衰不傳於賢而傳於子而孟子累數百言辨之以為皆天也然則知禹之傳子非私者千載而下一孟子而已豈可復望之當時諸侯乎世本稱有扈氏以堯舜傳賢而禹傳啟故啟立而不服遂征之然則非愚之臆説也或曰子謂唐虞以前諸侯無戰争侵奪之事然則涿鹿阪泉非歟既取其事列於封建之前則與此論自為牴牾矣曰黄帝紀乃太史公取傳記百家之言孔子定書斷自唐虞三皇之事若亡若存傳記所載姑採之以廣異聞耳至於立論當以六經所取為斷秦楚之際起兵自立者凡六國楚陳勝陽城人為閭左戍屯長屯大澤鄉二世元年七月起兵於蘄據陳自立為王號張楚至二年十二月兵敗其御莊賈殺陳王以降自起兵至亡凡六月秦以十月為歲首二年十二月乃建亥之三月也襄彊陳涉既起兵令苻離人葛嬰徇地時楚兵數千人為聚者不可勝數嬰至東城立彊為楚後聞陳王已立因殺襄彊景駒陳王初立時陳人秦嘉等皆特起將兵圍東海今海州自為大司馬二世二年正月嘉聞陳王兵破出走乃立景駒為楚王引兵之方與兖州縣三月項梁擊秦嘉嘉軍敗死景駒走死梁地義帝秦二世二年三月范增説項梁立楚後梁求得楚懷王孫心於民間六月立以為楚懷王都盱眙漢王九年正月項羽尊懷王為義帝徙於江南都郴二年項羽密使九江衡山臨江王擊義帝殺之江中自立至弑凡二年零四月趙武臣陳人為陳王將軍將兵徇趙下趙七十餘城二世八月自立為趙王二年十一月其將李良襲邯鄲殺趙王自立至亡凡五月趙王歇李良既殺武臣張耳陳餘收趙散兵擊良敗之二世二年春正月耳餘立歇為趙王漢元年項羽徙歇為代王以張耳為常山王分趙為二陳餘擊耳耳敗走歸漢迎趙王於代復為趙王漢三年韓信張耳擊趙禽王歇自立至亡凡三年零九月燕韓廣趙人為趙王武臣將兵徇燕二世元年九月至薊自立為燕王漢王元年正月項羽分燕為二徙廣為遼東王都無終以臧荼為燕王廣不肯徙臧荼殺廣併其地自立至亡凡三年零十一月齊田儋故齊王族二世元年九月陳王令將周市徇地至狄儋因殺狄令自立為齊王發兵擊周市市還二年六月章邯擊魏儋救魏邯大破齊魏軍殺儋田榮收儋餘兵走東阿齊人立故齊王建弟假為王榮逐假立儋子市為王漢王元年正月項羽分齊為三徙市為膠東王都即墨六月田榮殺市而自立并取三齊之地二年項王北擊齊齊王榮戰敗死項王復立田假為齊王榮弟横立榮子廣為王攻田假假走死横復定三齊之地四年韓信襲破齊虜王廣自儋至廣凡四傳共六年魏寗陵君咎本魏公子在陳二世元年九月陳王將周市徇地至魏魏地已定乃迎咎於陳立為魏王二年六月章邯擊破魏咎自殺其弟豹亡走楚楚懷王與豹兵復徇魏地九月豹自立為王都平陽漢王元年正月項羽自取梁地徙豹為西魏王王河東二年八月韓信擊魏虜豹凡二傳四年韓横陽君成本韓諸公子二世二年六月項梁已立楚懷王張良説梁立韓後謂成最賢乃立為韓王西畧韓地得數城漢王元年十月從項羽畧地入闗二年羽分韓為河南令韓王成因故都都陽翟羽以韓王成無功故不遣之國與俱至彭城廢以為穰侯已又殺之自立至亡凡三年項王所立諸侯王凡十四國楚漢元年正月項羽分天下王諸將自立為西楚覇王王梁楚地九郡都彭城五年十二月漢滅之自立至滅凡四年雍秦將章邯降項羽羽立為雍王王咸陽以西都廢邱漢二年二月漢王取雍地殺邯自立至亡凡一年零五月塞秦長史司馬欣故為櫟陽獄掾嘗有德於項梁故羽立為塞王王咸陽以東至河都櫟陽漢元年八月漢王襲雍遣諸將畧地塞王欣降自立至亡凡七月翟秦都尉董翳本勸章邯降楚故羽立翳為翟王王上郡都髙奴漢元年八月漢王遣兵至咸陽翟王翳降自立至亡凡七月河南瑕邱申陽者張耳嬖臣也先下河南郡迎楚河上故羽分韓地立申陽為河南王都洛陽漢二年十月河南王申陽降漢為河南郡自立至亡凡九月殷趙將司馬卬定河南數有功故羽立卬為殷王王河内都朝歌二年春三月漢王自臨晋渡河取魏將兵從下河内虜殷王卬置河内郡自立至亡凡十四月常山羽以趙相張耳素賢從入闗故立耳為常山王王趙地治襄國漢二年十月陳餘以趙兵與齊共襲常山王張耳敗走歸漢自立至敗凡九月後漢以耳為趙王九江當陽君黥布為楚將常冠軍故羽立布為九江王都六漢三年十一月使謁者隨何説布叛楚間行歸漢楚收九江兵殺布妻子自立至歸漢凡一年零十月衡山番君吳芮率百越佐諸侯又從入闗故羽立芮為衡山王都邾項籍死髙祖以芮將梅鋗有功從入武闗故德芮徙為長沙王都臨湘一年薨諡文王成王臣哀王囘共王右靖王差孝文後七年薨無子國除凡五傳共五十年臨江義帝柱國共敖將兵擊南郡功多故羽立敖為臨江王都江陵漢三年八月薨子尉嗣五年漢既定天下尉不降遣盧綰劉賈擊虜尉凡再傳共五年燕燕將臧荼從楚救趙因從入闗故羽立荼為燕王都薊五年漢既誅項籍荼反使盧綰劉賈擊荼取燕自立至亡凡五年齊齊將田都從楚救趙因從入闗故羽立都為齊王都臨菑五月田榮發兵距擊田都都亡走楚榮取齊地為王自立至亡凡五月濟北羽方渡河救趙田安下濟北數城引其兵降羽故立安為濟北王都博陽六月田榮遣彭越擊殺安并其地自立至亡凡六月韓項羽既殺韓王成以故吳令鄭昌為韓王時漢元年八月也二年十月漢以韓襄王孫信為韓太尉將兵畧韓地擊韓王昌於陽城昌降自立至亡凡三月西漢異姓諸侯王髙帝所立異姓諸侯王凡八國韓二年漢既取韓王昌地十一月立韓襄王孫信為韓王常將韓兵從漢王五年與信剖符王潁川六年更以太原郡為韓國徙信以備胡信請治馬邑從之秋匈奴入寇信以馬邑降匈奴七年上自擊破之信亡走匈奴自立至亡凡五年趙常山王張耳為陳餘所擊敗走歸漢四年十一月立耳為趙王五年薨諡景王子敖嗣九年坐貫髙反降為宣平侯凡再傳六年淮南九江王英布叛楚歸漢楚收其兵取其地四年七月立布為淮南王都六十一年夏謀反兵敗滅自立至亡凡八年齊韓信既取齊請為假王四年春二月立信為齊王五年平項籍徙信為楚王都下邳六年人言信謀反執之降為淮隂侯復坐誅自立至執凡二年梁彭越為梁相國定梁地漢五年以睢陽以北至榖城封越為梁王都定陶十一年人告越反廢為庶人後誅之自立至亡凡六年燕盧綰從擊項籍籍亡擊燕王臧荼破之五年九月立綰為燕王十二年綰反亡入匈奴自立至亡凡七年閩越漢五年以閩越王無諸身帥閩中兵以佐滅秦封為閩越王王閩中地傳郢丑餘善武帝元封元年餘善反漢遣兵誅之取其地自受漢封至亡凡四傳九十二年南粤漢十一年遣陸賈立南海尉趙佗為南粤王與剖符通使使和輯百粤傳胡嬰齊興建德武帝元鼎六年粤相吕嘉以粤反漢遣兵擊滅之自受漢封至亡凡五傳八十五年吕后立異姓吕氏王及所名孝惠子王凡八國吕周吕侯吕澤以客從髙祖定三秦子台嗣為侯髙后元年以兄子吕台為吕王割齊濟南郡為吕王奉邑二年薨子嘉嗣六年坐驕恣廢自立至廢再傳凡六年梁髙后稱制六年以吕台弟洨侯産為吕王七年徙為梁王八年吕后崩作亂周勃等誅之自立至誅凡三年趙髙后稱制七年以建成侯吕釋之子禄為趙王八年吕后崩作亂周勃等誅之自立至誅凡二年燕髙后稱制八年冬十月立吕肅王子東平侯通為燕王其年九月吕后崩諸吕謀亂坐誅淮陽髙后稱制元年立所名孝惠子强為淮陽王如淳曰外戚恩澤侯表言强等皆吕氏之子也五年强薨諡曰懷以壺闗侯武為淮陽王八年髙后崩大臣誅諸吕立文帝武坐非孝惠子誅自立至誅凡再傳八年恒山髙后稱制元年立所名孝惠子不疑為恒山王二年不疑薨諡曰哀更立襄城侯山為恒山王更名義四年以恒山王為帝更名宏以軹侯朝為恒山王武宏朝亦所立名孝惠子先封侯八年髙后崩文帝立坐非孝惠子誅自立至誅凡三傳八年濟川髙后稱制七年七月立所名孝惠子平昌侯太為濟川王八年九月文帝即位坐非孝惠子誅按吕后𠞰除髙皇側室之子三趙王皆不得其死齊代僅免而獨以其外孫張后之故取他人子名為孝惠子嗣帝位者二人封王者五人何其多也然少帝稍長則銜殺母之寃坐廢以死强不疑亦皆夭折宏朝武太皆見誅於事久論定之後所謂非所據而據焉不有天刑必有人禍竟何益哉魯髙后稱制元年封魯元公主子張偃為魯王八年誅諸吕坐廢為侯自立至廢凡八年漢初諸侯王其顛末見於太史公秦楚之際月表及班孟堅異姓諸侯王表然有自立者陳涉武臣之徒是也有為項王所立者三秦常山九江之類是也有髙帝所立者韓彭之徒是也有吕后所立者禄産及所名孝惠子是也楚一也而有陳涉焉有襄强景駒焉有懐王焉有項羽焉有韓信焉蓋八年之間楚凡五易姓也趙一也而有武臣焉有趙歇焉有張耳焉有吕禄焉蓋二十九年之間趙凡四易姓也燕一也而有韓廣焉有臧荼焉有盧綰焉有吕通焉蓋三十年之間燕凡四易姓也韓一也而有韓成焉有鄭昌焉有韓信焉蓋四年之間韓凡三易姓也馬班二表只以各國譜其年世而於其受封之異易姓之殊稍欠分别故今叙秦楚之際自立者六國項王所立者十四國髙帝所立者八國吕后所立者八國而於五楚四燕四趙三韓叙其受封之本而各稽其興廢之歲月焉又有亡而復封者如張耳項羽初封為常山王後失國漢再封為趙王英布項羽初封為九江王後失國漢再封為淮南王蓋人同而國異凡再受封故亦分而二之至吳芮之自衡山王為長沙王韓信之自齊王為楚王則元未嘗失國再封不過遷徙故不復再著云西漢同姓皇子諸侯王髙祖昆弟子孫為王者凡二十國楚元王交髙祖同父少弟從帝起兵入武闗六年既廢楚王信分其地為二國封交為楚王王薛郡東海彭城三十六縣立二十三年薨夷王郢客嗣四年薨子王戊嗣立二十一年謀反兵敗自殺景帝立宗正平陸侯禮元王寵子奉元王後是為文王三年薨子安王道嗣二十二年薨子襄王注嗣十四年薨子節王純嗣十六年薨子延夀嗣立三十二年有罪自殺國除楚凡八傳一百三十五年代髙祖兄仲六年以雲中鴈門代郡五十三縣封為代王七年為匈奴所攻棄國自歸廢為郃陽侯子濞黥布反時以沛侯為騎將從破布軍乃立濞為吳王王東陽章郡吳郡三郡五十三城景帝三年謀反兵敗死國除代二年吳四十二年齊悼惠王肥髙祖微時外婦之子六年以七十城封肥為齊王立十三年薨子哀王襄嗣立十一年薨子文王則嗣立十四年薨無子文帝憐悼惠王適嗣乏絶乃分齊為六國盡立前所封悼惠王子列侯見在者六人為王陽虛侯將閭為齊王立十一年吳楚反坐隂通謀自殺諡孝王景帝愍其無罪復封其太子夀是為懿王二十三年薨子厲王次昌立四年為主父偃所搆自殺無子國除齊凡六傳七十六年城陽景王章悼惠王子也以朱虛侯入宿衞孝文二年以誅諸吕功割齊一郡封章為城陽王二年薨子共王喜立三十三年薨子頃王延立二十六年薨子敬王義嗣九年薨子惠王武立十一年薨子荒王順立四十六年薨子戴王恢嗣八年薨子孝王景嗣二十四年薨子哀王雲嗣一年薨無子國絶成帝復封雲兄俚為城陽王王莽時絶城陽凡十傳一百八十六年濟北東牟侯興居齊悼惠王子髙后時入宿衞與大臣迎立文帝二年割齊一郡封興居為濟北王三年謀反兵敗自殺上憫濟北王逆亂自滅十五年分齊為六國盡封悼惠王諸子復以安都侯志為濟北王亦悼惠王子復徙王菑川地比齊志立三十六年薨諡懿王子靖王建嗣二十年薨子頃王遺嗣三十五年薨子思王終古嗣二十八年薨子考王尚嗣五年薨子孝王横嗣三十一年薨子懷王交嗣六年薨子永嗣王莽時絶濟北興居一年懿王志以下八傳一百七十四年濟南扐侯辟光齊悼惠王子孝文十五年分王濟南孝景三年同吳楚反坐誅國除凡十一年菑川武城侯賢齊悼惠王子孝文十五年分王菑川孝景三年同吳楚反坐誅國除凡十一年膠東白石侯雄渠齊悼惠王子孝文十五年分王膠東孝景三年同吳楚反坐誅國除凡十一年膠西平昌侯卬齊悼惠王子孝文十五年分王膠西孝景三年同吳楚反坐誅國除凡十一年班固贊曰悼惠之王齊最為大國以海内初定子弟少懲秦孤立無藩輔故大封同姓以鎮天下時諸侯得自除御史大夫羣卿以下衆官如漢朝漢獨為置丞相自吳楚誅後稍奪諸侯權左官附益阿黨之法設張晏曰諸侯有罪傅相不舉奏為阿黨師古曰皆新制律令之條也左官解在諸侯王表附益言欲増益諸侯王也其後諸侯唯得衣食租税貧者或乗牛車文帝六年梁太傅賈誼上疏曰夫樹國固必相疑之勢下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝親兄之子西鄉而擊今吳又見告矣天子春秋鼎盛行義未過德澤有加焉猶尚如是况莫大諸侯權力且十此者乎然而天下少安何也大國之王㓜弱未壯漢之所置傅相方握其事數年之後諸侯之王大扺皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上徧置私人如此有異淮南濟北之為耶此時而欲為治安雖堯舜不治黄帝曰日中必􅡢操刀必割今令此道順而全安甚易不肯早為已乃墮骨肉之屬而抗剄之豈有異秦之季世乎其異姓負强而動者漢已幸而勝之矣又不易其所以然同姓襲是跡而動既有徵矣其勢盡又復然殃旤之變未知所移明帝處之尚不能以安後世將如之何臣竊跡前事大扺强者先反長沙乃二萬五千户耳功少而最完勢疏而最忠非獨性異人也亦形勢然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知己欲諸王之皆忠附則莫若令如長沙王欲臣子勿葅醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使國小則亡邪心令海内之勢如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子割地定制令齊趙楚各為若干國使悼惠王幽王元王之子孫畢以次各受祖之分地地盡而止其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之一寸之地一人之衆天子無所利焉誠以定治而已如此則卧赤子天下之上而安植遺腹朝委裘而天下不亂當時大治後世頌聖陛下誰憚而久不為此天下之勢方病大瘇一脛之大幾如腰一指之大幾如股平居不可屈伸一二指搐身慮亡聊失今不治必為痼疾後雖有扁鵲不能為己病非徒瘇也又苦􅏓盭元王之子帝之從弟也今之王者從弟之子也惠王之子親兄子也今之王者兄子之子也親者或無分地以安天下疏者或制大權以偪天子臣故曰非病瘇也又苦􅏓盭可痛哭者此病是也按孝文之時山東之國齊七十二城楚四十城吳五十城鼂錯所謂封三庶孽分天下半是也三國之中齊為尤大悼惠王復子多而材吕氏之亂哀王襄欲舉兵西向則闗中為之震恐且有自帝之謀其弟朱虛東牟且將為内應幸諸吕已誅文帝正位而其謀遂寢然則帝即位之後諸侯之勢疏而逼地大而可忌者莫如齊吳楚而齊尤甚帝之慮豈不及此故雖盡復吕后所奪齊地而即割其二郡以王城陽濟北逮濟北以搆逆誅文王絶世則盡以齊地分王悼惠之六子即賈誼所謂各受其祖之分地地盡而止天子無所利焉者也及孝景之時吳楚為逆悼惠王之子孫所謂六王者皆預其謀然俱以國小兵弱故齊與濟北雖預密謀而終不敢發膠東膠西濟南菑川僅能出兵圍齊及漢兵出則各已潰散吳楚既無鉅援宜其速敗使齊地不早分以一壯王全據七十二城之甲兵與吳楚合從西向漢之憂未艾也孰謂誼言不見用而文帝為無謀哉荆將軍劉賈髙祖從父弟為將有功六年以故東陽郡鄣郡吳郡東陽今下邳鄣丹陽吳郡㑹稽也五十三縣立賈為荆王十一年黥布反擊荆賈弗勝為布所殺無後國除荆凡六年淮南厲王長髙祖少子十一年淮南王布反上擊滅之乃立長為淮南王文帝六年坐謀反廢死十二年上分淮南故地立厲王三子以阜陵王安為淮南王武帝元狩元年坐謀反自殺國除為九江郡淮南凡再傳長二十二年安四十二年共六十四年衡山後為濟北安陽侯勃淮南厲王子文帝十二年分淮南地以勃為衡山王孝景三年吳楚反以書招勃勃不應景帝嘉之徙為濟北王立十四年薨諡貞王子式王胡嗣五十四年薨子寛嗣十二年有罪自殺國除為泰山郡北安縣衡山凡三傳共八十年廬江後為衡山陽周侯賜淮南厲王子文帝十二年分淮南地以賜為廬江王後徙為衡山王立三十三年坐謀反自殺趙隱王如意髙帝子九年立凡四年為吕太后所殺亡後其王恢髙帝子十一年誅彭越立恢為梁王立凡十六年髙后七年徙王趙其年自殺無後幽王友髙帝子十一年立為淮陽王趙隱王如意死孝惠元年徙王趙立十年幽死孝文即位立幽王子遂為趙王立二十六年孝景時與吳楚謀反敗自殺國除趙凡四王五十六年河間文帝二年以趙之河間郡立趙幽王次子辟疆為河間王立十三年薨諡文王子哀王福嗣一年薨無子國除河間再傳凡十四年燕靈王建髙帝子十一年燕王盧綰亡入匈奴明年立建為燕王立十五年薨吕后殺其子無後瑯琊後為燕營陵侯劉澤髙祖從祖昆弟也以擊陳豨有功髙后七年封為瑯琊王文帝元年徙澤為燕王復以瑯琊歸齊二年薨諡敬王子康王嘉嗣九年薨子定國嗣位四十二年有罪自殺國除凡三傳五十三年文帝子孫為王者凡七國代後為梁孝王武景帝同母弟孝文二年立為代王十二年徙為淮陽王十三年徙為梁王立三十五年薨景帝分梁為五國盡立孝王男五人為王太子買嗣十年薨子平王襄嗣立四十年薨子項王無傷嗣十一年薨子敬王定國嗣四十年薨子夷王遂嗣六年薨子荒王嘉嗣十五年薨子立嗣二十七年元始中坐與平帝外家衛氏交通王莽奏廢為庶人自殺國除梁凡八傳一百八十四年太原後為代孝王參文帝諸姬子二年封太原王四年徙為代王并得太原都晋陽如故十七年薨子共王登立二十九年薨子剛王義立元鼎中徙王於清河四十年薨子頃王湯立二十四年薨子牟立三年坐淫亂廢為庶人國除凡五傳一百一十三年元始二年封孝王元孫之子如意為廣宗王立七年王莽時絶梁懷王揖文帝少子二年封梁王立十年入朝墮馬死無子國除文帝十一年賈誼上疏曰陛下即不定制如今之勢不過一傳再傳諸侯猶且人恣而不制豪植而大强漢法不得行矣陛下所以為藩捍及皇太子之所恃者唯淮陽代二國耳代北邊匈奴與强敵為鄰能自完則足矣而淮陽之比大諸侯僅如黑子之著面適足以餌大國而不足以有禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城與東郡以益梁不可者可徙代王而都睢陽梁起於新郪以北著之河淮陽包陳以南揵之江則大諸侯之有異心者破膽而不敢謀梁足以捍齊趙淮陽足以禁吳楚陛下髙枕終無山東之憂矣此二世之利也當今恬然適遇諸侯之皆少數歲之後陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頤指如意髙拱以成六國之禍難以言智茍身無事畜亂速禍孰視而不定萬年之後傳之老母弱子將使不寧不可謂仁帝於是從誼計徙淮陽王武為梁王北界泰山西至髙陽得大縣四十餘城先公曰誼之意甚勤而謀甚忠矣雖然此不過以親疏為强弱耳疏者難防親者可倚固也然今日之疏本前日之親今日之親又他日之疏也不以德義相維而專以親戚相制豈得為萬世之良策乎親以寵偪則又如之何髙皇帝立諸子一傳文帝而髙帝諸子已足為文帝憂帝又專以大城名都畀其子孫將不復為後人憂乎濟川垣邑侯明梁孝王次子孝王薨景帝分梁立明為濟川王立七年有罪廢為庶人國除濟東彭離梁孝王子孝王薨分梁地王之立二十九年有罪廢為庶人國除山陽哀王定亦梁孝王子孝王薨分梁地王之立九年薨無子國除濟隂哀王不識亦梁孝王子孝王薨分梁地王之立二年薨無子國除景帝子孫為王者凡十七國河間獻王德景帝子二年封立二十六年薨子共王不害嗣四年薨子剛王堪嗣十二年薨子頃王授嗣十七年薨子孝王慶嗣四十三年薨子元嗣十七年坐淫亂殘賊廢國除成帝建始元年立元弟良為河間王二十七年薨諡惠王子尚嗣王莽時絶凡八傳百六十年臨江哀王閼景帝子二年封立三年薨無子國除閔王榮景帝子前四年立為皇太子四嵗廢為臨江王坐侵廟壖地自殺無子國除魯恭王餘景帝子前二年封為淮陽王吳楚反破後徙王魯立二十八年薨子安王光嗣四十年薨子孝王慶忌嗣三十七年薨子頃王勁嗣二十八年薨子文王晙嗣十八年薨無子國除哀帝建平三年立頃王子晙弟閔為魯王王莽時絶凡六傳一百六十四年江都易王非景帝子以前二年立為汝南國吳楚反討平之徙王江都治故吳國二十七年薨子建嗣六年坐淫亂殘酷不道自殺國除為廣陵郡膠西于王端景帝子以前三年封立四十七年薨無子國除為膠西郡趙敬肅王彭祖景帝子以前二年封廣川王趙王遂反破後徙王趙立六十三年薨子頃王昌嗣十九年薨子懷王尊嗣五年薨無子國絶二歲宣帝立尊弟髙為哀王數月薨子共王充嗣五十六年薨子隱嗣十九年王莽時絶凡六傳一百六十二年平干今廣平武帝以親親故立趙敬肅王小子偃為平干王十一年薨是為頃王子繆王元嗣二十五年薨有司奏其罪國除凡再傳三十六年中山靖王勝景帝子以前三年封立四十三年薨子哀王昌嗣一年薨子康王昆侈嗣二十一年薨子頃王輔嗣四年薨子憲王福嗣十七年薨子懐王循嗣十五年薨無子絶四十五歲成帝鴻嘉二年復立憲王弟孫利鄉侯子雲客為廣徳夷王二年薨無子絶十四歲哀帝復立雲客弟廣漢為廣平王四年薨無後平帝元始元年立廣川惠王曽孫倫為廣徳王奉靖王後立九年王莽時絶凡九傳一百一十六年長沙定王發景帝子前三年封二十八年薨子戴王庸嗣二十七年薨子頃王鮒鮈嗣十七年薨子刺王建徳嗣三十四年薨子煬王旦嗣二年薨無子絶元帝初元三年立旦弟宗是為孝王五年薨子魯人嗣四十八年王莽時絶凡七傳一百六十一年廣川惠王越景帝子以中二年封十三年薨子繆王齊嗣四十四年薨子去嗣立二十二年坐殘酷廢自殺國除後四歲宣帝復立去兄文二年薨子海陽嗣十五年坐罪廢國除平帝元始二年復立戴王弟子瘉為廣德王奉惠王後二年薨子赤嗣七年王莽時絶凡七傳一百零五年膠東康王寄景帝子中二年封立三十八年薨子哀王賢嗣十五年薨子戴王通平嗣二十四年薨子頃王音嗣五十四年薨子共王授嗣十四年薨子殷嗣二十三年王莽時絶凡六傳一百五十八年六安膠東康王寄少子慶愛幸寄常欲立之寄薨上憐之立慶為六安王王故衡山地寄母王夫人即武帝母王太后之妹寄於上最親立三十八年薨子夷王禄嗣十年薨子繆王定嗣二十二年薨子頃王光嗣二十七年薨子育嗣三十三年王莽時絶凡五傳一百三十年清河哀王乗景帝子中三年封立十二年薨無子國除常山憲王舜景帝子中五年立三十三年薨子勃嗣數月坐罪廢國除真定頃王平常山憲王之子憲王薨太子坐罪廢天子以憲王最親母亦王夫人閔其滅國乃以三萬户封平為真定王立二十五年薨子烈王偃立十八年薨子孝王由立二十二年薨子安王雍立二十六年薨子共王普立十五年薨子陽立十六年王莽時絶凡六傳一百三十三年泗水思王商亦常山憲王子與真定王同時封立十二年薨子哀王安世立十年薨無子武帝立其弟賀是為戴王立二十二年薨子勤王煖立三十九年薨子戾王駿立三十一年薨子靖立十九年王莽時絶凡六傳一百三十三年武帝子孫王者凡六國齊懷王閎武帝子元狩六年封立八年薨無子國除燕刺王旦武帝子元狩六年封立三十七年坐謀反自殺國除廣陽頃王建燕刺王旦太子旦反赦為庶人宣帝即位乃封建為廣陽王立二十九年薨子穆王舜嗣二十一年薨子思王璜嗣二十年薨子嘉嗣十二年王莽時絶凡四傳八十二年廣陵厲王胥武帝子元狩六年立六十四年坐詛祝上自殺國除後七年宣帝復立胥太子霸是為孝王十三年薨子共王意嗣三年薨子哀王䕶嗣十六年薨無子絶成帝復立孝王子守是為靖王立二十年薨子宏嗣三年王莽時絶凡六傳一百一十九年髙密哀王宏廣陵厲王小子宣帝本始元年封為髙密王八年薨子頃王章嗣三十四年薨子懷王寛嗣十一年薨子慎嗣二十九年王莽時絶凡四傳八十二年昌邑哀王髆武帝子天漢四年立十一年薨子賀嗣十三年昭帝崩無嗣徵典喪即皇帝位二十七日以淫亂廢歸故國賜湯沐千户國除為山陽郡凡再傳一十四年宣帝子為王者凡四國淮陽憲王欽宣帝子元康三年封立三十六年薨子文王元嗣二十六年薨子縯嗣九年王莽時絶凡三傳七十一年楚孝王囂宣帝子甘露二年立為定陶王三年徙王楚二十八年薨子懐王文嗣一年薨無子國絶成帝復立文弟平陸侯衍是為思王二十一年薨子紆嗣十年王莽時絶凡四傳六十年東平思王宇宣帝子甘露二年封立三十三年薨子煬王雲嗣十六年坐息夫躬告祝詛廢自殺國除元始元年立雲子開明為東平王三年薨無子復立開明兄信子匡為東平王王莽居攝東郡太守翟議舉兵立信為天子兵敗為莽所滅凡四傳五十一年中山哀王竟宣弟子初元二年立為清河王三年徙中山立十三年薨無子國除元帝子為王者凡二國定陶共王康元帝子元光三年立為濟陽王八年徙為山陽王八年徙王定陶十九年薨子欣嗣十五年成帝徵為皇太子成帝崩即位是為哀帝成帝立楚思王子景為定陶王奉共王後哀帝追尊共王為共皇置寢廟京師乃徙定陶王景為信都王十三年王莽時絶凡三傳四十七年中山孝王興元帝子建昭二年封為信都王十四年徙中山三十年薨子衎嗣七年哀帝崩無子徴中山王衎入即位是為平帝立東平思王孫桃鄉頃侯子成都為中山王奉孝王祀八年王莽時絶凡三傳四十五年漢諸侯王金璽盭綬諸侯王朝見天子漢法凡當四見始到入小見到正月朔旦奉皮薦璧玉賀正月法見後三日為王置酒賜金錢財物後二日復入小見辭去凡留長安不過二十日小見者燕見於禁門内飲於省中非士人所得入也梁孝王西朝因留且半歲入與人主同輦出與同車示風以大言而實不與令出怨言謀畔逆乃隨而憂之不亦逺乎非大賢人不知退譲今漢之儀法朝見賀正月者常一王與四侯俱朝見十餘歲一至今梁王常比年入朝見久留鄙語曰驕子不孝非惡言也右褚先生為郎時聞於宫殿中老郎吏好事者之語然足以見漢諸王朝見之典云景帝中五年令諸侯王不得復治國天子為置吏武帝初即位大臣懲吳楚七國行事議者多寃鼂錯之策皆以諸侯連城數十泰强欲稍侵削數奏暴其過惡諸侯王自以骨肉至親先帝所以廣封連城犬牙相錯者為磐石宗也今或無罪為臣下所侵辱有司吹毛求疵笞服其臣使證其君多自以侵寃建元三年代王登長沙王發中山王勝濟川王明來朝天子置酒勝聞樂聲而泣問其故勝對曰臣聞悲者不可為絫欷思者不可為歎息故髙漸離擊筑易水之上荆軻為之低而不食雍門子壹微吟孟嘗君為之於邑今臣心結日久每聞㓜眇之聲不知涕泣之横集也夫衆噓漂山聚蟁成靁朋黨執虎十夫撓權是以文王拘於羑里孔子厄於陳蔡此乃烝庶之成風増積之生害也臣身逺與寡莫為之先衆口爍金積毁銷骨叢輕折軸羽翮飛肉紛驚逢羅澘然出涕臣聞白日曬光幽隱皆照明月耀夜蚊蝱宵見然雲烝列布杳㝠晝昏塵埃抪覆昩不見泰山何則物有蔽之也今臣雍閼不得聞讒言之徒蠭生道遼路逺曽莫為臣聞臣竊自悲也臣聞社鼷不灌屋䑕不熏何則所託者然也臣雖薄也得蒙肺腑位雖卑也得為東藩屬又稱兄今羣臣非有葭莩之親鴻毛之重羣居黨議朋友相為使夫宗室擯郤骨肉氷釋斯伯竒所以流離比干所以横分也詩云我心憂傷惄焉如𢷬假寐永歎惟憂用老心之憂矣疢如疾首臣之謂也具以吏所侵聞於是上乃厚諸侯之禮省有司所奏諸侯事加親親之恩焉其後更為主父偃謀令諸侯以私恩自裂地分其子弟而漢為定制封號輙别屬漢郡漢有厚恩而諸侯稍自分析弱小云班固諸侯王表序曰漢興之初海内新定同姓寡少懲戒亡秦孤立之敗於是剖裂疆土立二等之爵項羽曰漢封功臣大者王小者侯也功臣侯者百有餘邑尊王子弟大啓九國師古曰九國之數在下也自鴈門以東盡遼陽為燕代師古曰遼陽遼水之陽也常山以南大行左轉渡河濟漸於海為齊趙師古曰大行山名也左轉亦謂自大行而東也漸入也一曰浸也行音胡郎反漸音子亷反亦讀如本字榖泗以徃奄有龜䝉為梁楚晋灼曰水經云泗水出魯卞縣臣瓚曰榖在彭城泗之下流為穀水師古曰奄覆也龜䝉二山名東帯江湖薄㑹稽為荆吳文潁曰即今吳也髙帝六年為荆國十年更名吳師古曰荆吳同是一國也北界淮瀕略廬衡為淮南師古曰瀕水涯也音頻又音賓廬衡二山名也波漢之陽亘九嶷為長沙鄭氏曰波音陂澤之陂孟康曰亘竟也音古贈反師古曰波漢之陽者循漢水而往也水北曰陽波音彼皮反又音彼幾反九嶷山名有九峯在零陵營道嶷音疑諸侯比境周帀三垂外接胡越師古曰比謂相接次也三垂謂北東南也比音頻寐反天子自有三河東郡潁川南陽師古曰三河河東河南河内也自江陵以西至巴蜀北自雲中至隴西與京師内史凡十五郡公主列侯頗邑其中師古曰十五郡中又往往有列侯公主之邑而藩國大者夸州兼郡連城數十師古曰夸音跨宫室百官同制京師可謂撟枉過其正矣師古撟與矯同枉曲也正曲曰矯言矯秦孤立之敗而大封子弟過於强盛有失中也雖然髙祖創業日不暇給孝惠享國又淺髙后女主攝位而海内晏如師古曰晏如安然也亡狂狡之憂卒折諸吕之難成太宗之業者亦頼之於諸侯也然諸侯原本以大末流濫以致溢小者淫荒越法大者睽孤横逆以害身喪國師古曰易睽卦上九爻辭曰睽孤見豕負塗睽孤乖刺之意故文帝采賈生之議分齊趙景帝用鼂錯之計削吳楚武帝施主父之䇿下推恩之令使諸侯王得分户邑以封子弟不行黜陟而藩國自析自此以來齊分為七師古曰謂齊城陽濟北濟南淄川膠西膠東是也趙分為六師古曰謂趙平原真定中山廣川河間也梁分為五師古曰謂梁濟川濟東山陽濟隂也淮南分為三師古謂淮南衡山廬江皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣如淳曰長沙之南更置郡燕代以北更置緣邊郡其所有饒利兵馬器械三國皆失之也景遭七國之難抑損諸侯減黜其官師古曰謂改丞相曰相省御史大夫廷尉少府宗正博士損大夫謁者諸官長丞員等也武有衡山淮南之謀作左官之律服䖍曰仕於諸侯為左官絶不得使仕於王朝也應劭曰人道上右今舍天子而仕諸侯故謂之左官也師古曰左官猶言左道也皆僻左不正應説是也漢時依上古法朝廷之列以右為尊故為降秩為左遷仕諸侯為左官也設附益之法張晏曰律鄭氏説封諸侯過限曰附益或曰阿媚王侯有重法也師古曰附益者蓋取孔子云求也為之聚斂而附益之之義也皆背正法而厚於私家也諸侯惟得衣食租税不與政事至於哀平之際皆繼體苗裔親屬疏逺師古曰言非始封之君皆其後裔也故於天子益疏逺矣生於帷墻之中不為士民所尊勢與富室亡異而本朝短世國統三絶師古曰謂成哀平皆早崩又無繼嗣是故王莽知漢中外殫微本末俱弱師古曰殫盡也音單亡所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下師古曰序謂東西廂詐謀既成遂據南面之尊分遣五威之吏馳傳天下班行符命漢諸侯王厥角首應劭曰厥者頓也角者額角也稽首至地也言王莽漸漬威福日久亦值漢之單弱王侯見莽篡弑莫敢怨望皆頓角稽首至地而上其璽綬也晋灼曰厥猶􅆆也叩頭則額角􅆆師古曰應説是也與稽同奉上璽韍惟恐在後師古曰韍音弗璽之組也或廼稱羙頌徳以求容媚豈不哀哉是以䆒其終始强弱之變明監戒焉漢興設爵二等曰王曰侯皇子而封為王者其實古諸侯也故謂之諸侯王王子封為侯者謂之諸侯羣臣異姓以功封之謂之徹侯大者不過萬家小者五六百户以為差降古分土而無分民自漢始分民而諸王國皆連城數十踰於古制其諸侯功德優盛朝廷所敬異有賜特進者其位在三公下其次列侯有功德天子命為諸侯者謂之朝侯其位次九卿下皆平冕文衣侍祠郊廟其稱侍祠侯者但侍祠而無朝位其非朝侯侍祠而以下土小民或以肺腑宿親若公主子孫或奉先侯墳墓在京師者亦隨時見㑹謂之猥諸侯凡諸王侯皆金璽盭綬古者印璽通名今則尊卑有别漢舊儀云諸侯王金印黄金槖駝鈕文曰璽謂刻曰某王之璽赤地綬列侯黄金印龜鈕文曰某侯之印紫綬掌治其國王常冠逺遊冠綬五采而多朱自稱曰寡人教曰令凡諸侯王官其傅為太傅相為丞相又有御史大夫諸卿皆秩二千石百官皆如漢朝漢朝惟為置丞相其御史大夫以下皆自置之及七國作亂之後景帝懲之遂令諸侯王不得治民令内史治之改丞相曰相省御史大夫廷尉少府宗正博士官武帝改漢内史中尉郎中令之名内史為京兆尹中尉為執金吾郎中令為光禄勲而王國如故員職皆不得自置又令諸王得推恩封子弟為列侯於是齊分為七趙分為六梁分為五淮南分為三又令諸侯十月獻酎金不如法者國除其縣邑皆别屬他郡千户置家丞不欲者聽之作左官之律附益之法自後諸侯王唯得衣食租税至成帝綏和元年省内史更令相治民大司空何武奏罷内史相如太守中尉如都尉参職是後中尉爭權與王相奏常不和太傅但曰傅史記梁孝王景帝母弟竇太后少子築東苑方三百餘里為複道自宫連屬於平臺四十餘里賜天子旌旗千乗萬騎擬於天子出蹕入警招延四方豪傑山東遊士莫不至焉又曰河間獻王景帝子也好儒學被服造次必於儒者山東諸儒多從之遊漢初論功封列侯者凡百四十有三人蕭何為冠外戚與定天下者二人凡列侯金印紫綬大者食縣小者食鄉亭得臣所食吏民凡皇帝之女為公主皆列侯尚之周制王姬下嫁於諸侯以同姓諸侯主之公者諸侯之尊稱故謂之公主後漢荀爽上疏曰漢承秦法設尚主之儀以妻制夫以卑臨尊者宜改尚主之制以稱乾坤之性王國有傅掌輔導王初曰太傅後除太字史記曰賈誼為梁懷王太傅王墮馬死無後賈生自傷為傅無狀哭泣歳餘亦死相主統衆官後省内史而相理民如郡太守史記曰曹參相齊聞膠西有葢公善治黄用老言乃厚請之益公曰治道貴清淨清淨民自定參其術齊國安集及入為漢相屬其後相曰以齊獄市為寄慎勿擾也夫獄市者所并容也今若擾之姦人安所容乎吾是以先之也又曰石慶為齊相舉國皆慕其家行不言而齊國大治為立石相社也内史治國民中尉掌武事郎中令秩千石墨綬僕本曰太僕改曰僕墨綬文學宋志云前漢王國已置文學大司農衞士長太倉長齊善毉淳于意為之列侯國亦有相改所食國令長為之漢初侯王有丞相兼有相國按史記周勃破燕王盧綰得相國一人丞相二人景帝省之餘略與王國同公主有公令門尉其有賜重封者張晏曰重封益禄也臣瓚曰增封顔師古曰重封謂加二號耳成帝鴻嘉三年詔七大夫以上皆令食邑秦本制列侯乃得食邑七大夫即公大夫非七大夫以下皆復其身及戸勿事一户之内皆不徭賦是歲又令吏民得買爵賈級千錢文獻通考卷二百六十五
