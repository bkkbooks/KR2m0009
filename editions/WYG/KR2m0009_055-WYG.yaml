body:
  text: 文獻通考卷五十五鄱陽馬端臨貴與著職官考九諸卿少卿夏制九卿記曰夏后氏官百天子有三公九卿也亦有六卿殷周皆然殷亦九卿伊尹曰二公調隂陽九卿通寒暑周之九卿卽少師少傅少保冢宰司徒宗伯司馬司冦司空二代諸卿雖名號不同然其官職相沿與周不異說在歴代官制篇漢以太常光禄勲衞尉太僕廷尉大鴻臚宗正大司農少府謂之九寺大卿後漢九卿而分屬三司太常光禄勲衞尉三卿並太尉所部太僕廷尉大鴻臚三卿並司徒所部宗正大司農少府三卿並司空所部多進為三公各有署曹掾史隨事為員九卿有疾使者臨問加賜錢布尚書令陳忠常欲褒崇大臣故奏建此禮魏九卿與漢同九卿名數與漢同晋以太常等九卿即漢九卿兼將作大匠太后三卿大長秋皆為列卿各置丞功曹主簿五官等員太康四年増九卿禮秩元帝以賀循為太常而散騎常侍如故循以九卿舊不加官惟拜太常而已宋齊及梁初皆因舊制宋卿尹皆銀章青綬進賢兩梁冠佩水蒼玉衞尉則武官晋服制以九卿皆文冠乃進賢兩梁冠非舊也梁武帝天監七年以太常卿加置宗正卿以大司農為司農卿三卿是為春卿加置太府卿以少府為少府卿加置太僕卿三卿是為夏卿以衞尉為衞尉卿廷尉為廷尉卿將作大匠為大匠卿三卿是為秋卿以光禄勲為光禄卿大鴻臚為鴻臚卿都水使者為大舟卿三卿是為冬卿凡十二卿皆置丞及功曹主簿後魏又以太常光禄勲衞尉謂之三卿太僕廷尉大鴻臚宗正大司農少府為六卿各有少卿太和十五年初置少卿官常同大卿北齊以太常光禄衞尉宗正太僕大理鴻臚司農太府是為九寺晋荀朂曰九寺可倂於尚書後魏亦有三府九寺則九卿稱寺乆矣然通異名不連官號其官寺連稱自北齊始也置卿少卿丞各一人各有功曹五官主簿録事等員隋九寺與北齊同自昔三代以上分置六卿至周明備至秦及漢雖事不師古猶制度未繁後漢有三公九卿而尚書之任又益重矣魏晋以降職制日増後周依周禮置六官而年代短促人情相習已乆不能革其視聼故隋氏復廢六官多依北齊之制官職重設庶務煩滯加六尚書似周之六卿又更别立寺監則户部與太府分地官司徒職事禮部與太常分春官宗伯職事刑部與大理分秋官職事工部與将作分冬官司空職事自餘百司之任多𩔖於斯欲求理要實在簡省煬帝降光禄以下八寺卿階品於太常而少卿各加置二人始開皇中諸司署惟典掌受納至煬帝署令為判首取二卿同判丞惟知檢局令闕丞判唐九寺與北齊同卿各一人少卿各二人丞以下有差龍朔二年改九寺之名凡卿皆加正若太常卿為奉常正卿他皆如此後各復舊宋初雖有九卿皆以為命官之品秩而無職事元豐正名始有職掌中興初併省冗職除太常寺大理寺不罷外宗正以太常兼而衞尉太僕併兵部太府司農併户部光禄鴻臚併禮部紹興復置宗正太府司農餘遂廢太常卿少卿協丞郎主簿京博士署郎律兩郊社祝樂奉禮太署鼓吹署署太醫署太卜署廪犧署汾祠今太常者亦唐虞伯夷為秩宗兼夔典樂之任也周時曰宗伯為春官掌邦禮秦改曰奉常漢初曰太常欲令國家盛太常存故稱太常顔師古曰太常者王之旌也畫日月焉王者有大事則建以行禮官主奉持之故曰奉常後改為太尊大之義也惠帝更名奉常景帝六年更名太常惠帝時叔孫通為奉常定宗廟儀法及定漢儀法皆叔孫通所著論也王莽改太常卿為秩宗後漢秩與漢同每祭祀前奏其禮儀及行事贊天子每選試博士奏其能否大射養老大䘮皆奏其儀每月前晦察行陵廟助祭則平冕七旒漢舊常以列侯忠敬孝愼者居之後漢不必侯也舊制陵縣悉屬歲舉孝廉後漢則否建安中為奉常魏黄初元年改為太常魏晋皆銀章青綬進賢兩梁冠絳朝服佩水蒼玉宋齊皆有之舊用列曹尚書好遷選曹尚書領䕶梁視金紫光禄大夫陳因之後魏為上卿兼置小卿官周禮有小宗伯中大夫二人即其任北齊曰太常寺置卿及少卿丞各一人掌陵廟羣祀禮樂儀制天文術數衣冠之屬後周建六官置大宗伯卿一人掌邦禮以佐皇帝和邦國是為春官隋曰太常與北齊同煬帝加置少卿二人唐因之龍朔二年改太常為奉常少卿丞隨寺名改光禄以下同咸亨元年復舊光宅元年改太常為司禮神龍初復舊卿一人掌禮儀祭祀總判寺事少卿二人通判餘寺少卿職並同太常少卿本一員神龍中加一員領丞一人主簿二人博士四人太祝二人奉禮郎協律郎各二人齋郎五百五十二人其餘小吏各有差郊祀太公廟大樂鼓吹太醫太卜廪犧等署各有令其郊社及太公廟兩京皆有宋初太常寺皆以禁林之長主判續會要云皆以兩制充而禮院自有判院同判院祥符中祥瑞繁縟别建禮儀院輔臣主判而知制誥為知院天禧末罷知院天聖中省禮儀院而寺與禮院事舊不相兼康定元年置判寺同判寺並兼禮儀事元豐正名始專其職焉卿掌禮樂郊廟社稷壇壝陵寝之事禮之名有五吉賓軍嘉凶皆掌其制度儀式祭祀有大祠有中祠有小祠其犧牲幣玊酒薦獻噐服名辨其等掌樂律樂舞樂章凡親祠及四孟月朝獻景靈宮郊祀太廟掌贊相禮儀升降之節及朝會燕享上夀封冊之儀若禮樂有損益及祀典神祇爵號與封襲繼嗣之事常考定者擬上於禮部凡太醫政令以時頒行元祐詔太常寺置長貳餘寺監長貳並互置中興併省寺監獨存太常又命太常兼宗正紹興復隆興元年詔光禄寺併歸太常寺兼領掌社稷及武成王廟諸壇齋官習樂之事丞一員罷卿舊不除人紹興三十五年除張扶執政以為言遂改宗正復言之乃除祭酒開禧閒忽除陳讜俄亦改秘書監少卿元祐初除呂純禮御史論門䕃得官不可任奉常於是外補建炎初并省冗職詔太常少卿一員兼宗正少卿國初太常少卿博士寺丞俱為寄禄官少卿後來為朝議大夫博士丞議郎丞奉議郎丞秦置一人漢多以博士議郎為之後漢凡諸丞皆掌行禮及祭祀小事總署曹事舉廟中非法皆銅印墨綬進賢兩梁冠職官要録曰晋宋九卿丞皆進賢一梁冠介幘皁衣銅印黄綬齊梁墨綬歴代皆有韋𢎞為太常丞父賢以𢎞當嗣太常職掌陵廟煩劇多過勅𢎞自免及賢疾篤𢎞坐廟事繫獄梁舊用員外郎遷尚書郎天監七年改視尚書郎陳因之後魏北齊亦有之隋有二人唐因之分判寺事餘寺丞職並同宋皇祐中詔特差近上知禮官一員兼丞事建炎三年省紹興復置主簿漢有之漢鹵簿之制太常駕四馬主簿前車八乗魏晋亦有焉梁天監七年十二卿各置主簿一人陳因之北齊有功曹五官主簿二人歴代諸主簿多說在列職篇唐置二人掌付事勾稽省署抄目監印給紙筆等事餘寺主簿並同職宋皇祐中宋祁乞増置一員勾檢在寺文書及掌出納遂除胡瑗後省不置元豐正名初除王子奇建炎三年省紹興十年復置容齋洪氏隨筆曰自元豐官制行九寺五監各置主簿專以掌勾考簿書為職他不得預紹聖初韓粹彦為光禄主簿自言今輙預寺事非先帝意也請如元豐詔書從之如玉牒脩書主簿不預見於王定國雜録予猶及見紹興中太府寺公状文移惟卿丞繫銜後來掌故之吏昧於典章遂一切與丞等今百官庶府皆戾官制非特此一事也博士魏官也魏文帝初置晋因之掌引導乗輿王公以下應追諡者則博士議定之秦有博士數十人兩漢太常屬官皆有博士掌以五經教子弟則今國子博士是也說在本篇端委佩玉朝之大典必於詢度歴代皆有隋有四人唐因之甚為清選資位與補闕同掌撰五禮儀注導引乗輿贊相祭祀定誄諡及守祧廟開閉塪室及祥瑞之事宋祥符中置博士二員後四員元豐正名初除何洵直博士掌講定五禮儀式有改革則據經審議凡於法應諡考其行状撰定諡文有祠事則監視儀物掌凡贊道之事中興省丞簿而太常博士如故紹興九年諫議大夫曾統言祖宗朝太常博士四員今見一員添置一員隆興元年從王太寳等議併省博士一員太祝殷官與太宰等官為六太周官太祝下大夫二人上士四人掌六祝之辭以祈福祥秦漢有太祝令丞後漢亦曰太祝令丞晋宋齊梁陳後魏北齊皆因之後周依周官至隋置太祝署太祝令丞煬帝罷署太祝八人唐初有七人後增為九人開元二十三年減置三人掌讀祝文出納神主宋太祝奉禮郎掌奏祭祀闕則承奏䕃京官十六以上未掌事者充郊社掌坐齋郎無員數富韓公之父貧甚客呂文穆門下一日白公曰某児子十許歲欲令入書院事廷評太祝李文靖公為相治第隘甚或以為公言曰居第當傳子孫此為宰相㕔事誠隘為太祝奉禮㕔事已寛矣盖三官皆宰相子弟初䕃之官也奉禮郎漢大鴻臚有理禮郎四十七人晋理禮郎四人屬大行令後魏理禮郎四人北齊有奉禮郎三十人屬鴻臚寺之司儀署後周有理禮中士下士各一人隋有奉禮郎十六人屬太常寺煬帝減至六人唐初有理禮郎四員掌設板位執儀行事至永徽二年以廟諱改為奉禮郎開元二十三年減二員奉禮本名理禮國家撰五代史志至永徽七年乃成於時此官已改故隋書百官志謂北齊及隋時理禮皆為奉禮奉禮之名雖見於前史其改始自永徽宋奉禮郎品秩見前掌奉幣帛授初獻官大禮則設親祠板位大祀掌讀冊授搏黍以嘏告餘福則進爵酌酒受其虚爵協律郎漢曰協律都尉李延年為之武帝以李延年善新聲故為此官後漢亦有之魏杜夔亦為之魏武平荆州初得杜䕫知音識舊故為此官晋改為協律校尉後魏有協律郎又有協律中郎北齊及隋協律郎皆二人唐因之掌舉麾節樂調和律呂監試樂人典課宋協律郎朝宴親郊則遣官攝事崇寕後協律郎𨽻大晟府又有按協聲律製撰文字運譜等官以京朝官選又或白衣士人通樂律者為之兩京郊社署周官有典祀掌以時祭祀秦漢有太祝令丞屬奉常景帝改為祠祀武帝更曰廟祀後漢祠祀屬少府魏晋有太祝令丞宋曰明堂令丞掌祀五帝之事齊有太祝及明堂二令梁有明堂太社二令並屬太常北齊太廟令兼領郊祀崇虚二丞郊祀掌五郊羣神崇虚掌五嶽四瀆神後周有司郊上士中士司社中士下士隋太常寺置郊社署令丞各一人唐因之掌郊祀明堂祠祀祈禱及茅土衣冠等事宋嘉祐元年置郊社令命石祖元為之熈寕元年郊社局令張伯世言合有郊社名而不主四郊之事於是始主四郊壇壝之事按唐六典兩京郊社局令各一人掌五郊社稷明堂之位然則郊社令通管五郊之事乞自今兼令勾當四郊壇壝之事使得廵視提舉所貴官正其名郊兆常潔從之郊社令掌廵視四郊及社稷之壇壝掌凡掃除之事祭社則省牡渡江初闕紹興十九年始除韓彦直為太社令請給並依五監主簿例太樂署周官有大司樂掌成均之法亦謂之樂尹以樂舞教國子左傳楚鍾建為樂尹即大司樂也秦漢奉常屬官有太樂令及丞又少府屬官并有樂府令丞後漢永平三年改太樂為大予樂令掌伎樂人凡國祭饗掌諸奏樂盧植禮注云大予令如古大胥漢大樂律卑者之子不得舞宗廟之酎除吏二千石到六百石及闗内侯到五大夫子取適子髙五尺以上年十二到三十顔色和順身體循禮者為舞人魏復曰太樂令丞晋亦有之齊銅印墨綬進賢一梁冠絳朝服齊太樂及諸陵令永明末置用二品三品勲置主簿户曹六品保舉梁陳因之後魏置太樂博士北齊曰大樂令丞後周有大司樂掌成均之法後改為樂部有上士中士隋有太樂令丞各一人唐因之掌習音樂樂人簿籍宋制太樂局令一人丞一人樂正二人副使正二人掌車駕郊祀及御殿御樓大祠登歌徽宗時置大晟府以大司樂為長典樂為貳次曰太樂令秩比丞次曰主簿曰協律郎又有按協聲律製撰文字運譜等官以京朝官選又或白衣士人通樂律者為之又以武臣監府門及太樂法物庫以侍從及内省近侍官提舉所典六案曰太樂曰鼓吹曰宴樂曰法樂曰知雜曰掌法京朝禮樂掌於奉常崇寕初置局議太樂樂成置府建官以司之禮樂始分為二四年詔曰廼者得隠逸之士於草茅之賤獲英莖之器於受命之邦適時之宜以身為度鑄鼎以起律因律以制噐親賜樂名曰大晟府舊樂勿用五年二月因省冗員併之禮官九月復舊大觀四年以官徒廪給繁厚樂令一員監官二員吏禄並視太常格宣和二年詔以大晟府近歲添置冗濫徼幸並罷鼓吹署周禮有鼓人掌六鼓四金之音後漢有承華令典黄門鼓吹屬少府晋置鼓吹令丞屬太常元帝省太樂并鼓吹哀帝復省鼓吹而存太樂梁有鼓吹令丞又有清啇署北齊鼓吹令丞及清商署並屬太常隋有鼓吹清商二令丞至煬帝罷清商署唐鼓吹署令丞各一人所掌頗與太樂同宋鼓吹局令一人丞一人崇寕後𨽻大晟府詳見太樂署太醫署周官有醫師上士下士掌醫之政令秦兩漢有太醫令丞亦主醫藥屬少府後漢又有醫丞有醫工長魏因之晋銅印墨綬進賢一梁冠絳朝服而屬宗正過江省宗正而屬門下省宋齊𨽻侍中梁陳因之後魏有太醫博士助教北齊又曰太醫令丞後周太醫下大夫隋太醫署令二人唐因之主醫藥凡領醫針炙按摩咒禁各有博士五代時有翰林醫官使宋制翰林醫官院使副各二人並領院事以尚藥奉御充或有加諸司使者直院四人尚藥奉御六人醫官醫學祗候無定員舊制翰林醫官使四人副使二人直院七人尚藥奉御七人醫官三十人醫學四十人祗候醫人十二人其員猥多寳元二年始立使副直院尚藥奉御定員醫官醫學無班位以服色為差加同正官至尚藥奉御者或加檢校官其直院則奉御及同正官皆為之多自醫官特奨而授掌供奉醫藥及承詔視療衆疾之事典二人徽宗時置翰林院勾當官一員以内侍省押班都知充總天文書藝圖畫醫官四局崇寕元年詔醫官有勞轉皇城使實及五年方許除遥郡刺史又七年除遥郡團練又十年以上方許除遥郡防禦使醫官有和安成和成安成全大夫舊為軍噐庫使保和大夫舊為西綾錦使保安太夫舊為𣙜易使翰林良醫舊為翰林醫官使和安成和成安成全郎舊為軍器庫副使保和郎舊為西綾錦副使保安郎舊為𣙜易副使翰林醫正舊為翰林醫官副使翰林醫官翰林醫效翰林醫痊翰林醫愈翰林醫證翰林醫診翰林醫候翰林醫學舊諸司使副有醫官使及副使盖自太醫丞直院轉醫官副使叙遷年格一同武官但為東班使額耳謂自法酒庫以上至皇城使政和初既易武階而醫官之名亦遂易焉凡十有九階立和安大夫視𣙜易使以上翰林良醫視醫官使其和安郎以下視東副使若醫官副使則以醫正易之官制舊典云此名皆大臣所撰無所稽據傳曰登髙能賦可以為大夫今乃以雜流為之可見當時大臣之不學也舊額和安大夫至良醫二十員紹興二年五員和安郎至醫官元額三十員紹興二年四員醫效元額七員紹興二員醫痊元額十員今一員醫愈至祗候大方脉元額百五十員紹興十五員而已太卜署殷官太卜為六大周官太卜掌三兆之法秦漢有太卜令後漢并於太史自後無聞後魏有卜博士北齊有太卜局丞後周有太卜大夫小卜上士龜占中士隋曰太卜令丞一人唐因之宋以太卜𨽻司天臺然不置專官廪犧署周禮有牧人掌牧六牲以供祭祀秦漢内史左馮翊廪犧令丞並掌犧牲鴈鶩後屬大司農後漢河南尹屬官有廩犧丞魏晋宋齊梁陳後魏北齊隋皆有之唐令丞各一人掌犧牲粢盛之事汾祠署齊太公廟署並有令丞各一人唐開元中置宋廪犧屬光禄寺有牛羊司供應所掌大中小祀牲牷及太官宴享膳饈之用監官三人以諸司使副及三班使臣充監棧圏三人以三班使臣充光禄卿少卿署丞掌主簿良醖醢署大官署珍饈署秦有郎中令主郎内諸官故曰郎中令掌宮殿掖門户漢因之石建為郎中令奏事事已下建省讀驚曰書馬者與尾而五今乃不足一獲譴死矣其謹慎如此至武帝太初元年更名光禄勲應劭曰光明也禄爵也勲功也如淳曰勲之言閽也閽古主門之官光禄主官門故也張安世為光禄勲郎有醉小便殿上主事行法安世曰何以知其不覆水也其隠人􅂈失如此王莽時乃改光禄勲為司中後漢曰光禄勲所掌同典三署郎更直執㦸宿衛考其徳行而進退之漢東京三署郎有徳應四科者歳舉茂才二人四行二人及三署郎罷省光禄勲猶依舊舉四行衣冠子弟以充之郊祀之事掌三獻光禄勲居禁中如宋之殿中御史有獄在殿門外謂之光禄外部兩漢自光禄大中中散諫議等大夫及謁者僕射羽林郎郎中侍郎五官武賁左右等中郎将奉車附馬二都尉軍户騎三將如淳曰主車曰車郎主户衞曰戸郎並屬光禄勲後漢張湛字子孝拜光禄勲光武臨朝或有惰容湛輙陳諫其失又杜林字伯山為光禄勲内供奉宿衛外總三署周宻敬慎選舉稱平郎有好學者輙見誘進朝夕滿堂士以此髙而慕附又荀爽為光禄勲視事三日册拜司空建安末復改光禄勲為郎中令魏黄初元年復為光禄勲東晋哀帝興寕二年省光禄勲併司徒孝武寕康元年復置自魏晋以後無復三署郎而光禄不復居禁中唯外官朝㑹則以名到焉二臺奏劾則符光禄加禁止觧禁止亦如之禁入殿省光禄主殿門故也其宫殿門户至宋文猶屬焉梁除勲字謂之光禄卿卿舊視列曹尚書天監中視中庶子職與漢同後魏又置少卿北齊曰光禄寺置卿少卿兼掌諸膳食帳幕隋文帝開皇三年廢光禄寺入司農十二年復置初有卿及少卿各一人煬帝加置二少卿唯取漢代舊名而其職則别唐龍朔二年改光禄寺為司宰寺咸亨初復舊光宅元年為司膳神龍初復舊卿一人掌終獻行事少卿二人領太官珍饈良醖掌醢等四署署各有令丞丞漢二人多以博士議郎為之後漢一人魏晋因之銅印黄綬梁陳視員外郎其員外說在通直散騎常侍郎中後魏北齊並有之隋有三人唐置二人主簿漢置晋宋齊梁陳並有之北齊曰功曹五官主簿隋二人唐因之宋光禄寺判寺事一人以朝官以上充古者其屬有太官珍饈良醖掌醢四局令分隸御厨法酒庫古者祭祀則省牲鑊濯溉三公攝祭為終獻今並以他官攝本寺但掌供祠祭酒醴果實醢醯菹薪炭及㸃饌進胙之事卿少卿丞為寄禄官卿後來為中奉大夫少卿朝儀大夫丞宣義郎元豐官制行置卿少卿丞主簿各一人元祐三年詔長貳互置政和六年監察御史王桓等言祭祀牲牢之具掌於光禄而寺官未嘗臨視請太祠以長貳朔祭及中祠以丞簿監視宰割禮畢頒胙有故及小祠聼以其屬攝從之中興後廢光禄併入禮部太官署令丞於周官為膳夫庖人外饔中士下士盖其任也秦為太官令丞屬少府兩漢因之桓帝延熹元年使太官令得補二千石魏亦屬少府晋屬光禄勲宋齊屬侍中梁門下省領太官陳因之後魏分太官為尚食中尚食知御膳隸門下省而太官掌百官之饌屬光禄卿北齊因之後周有典庖中士内膳中士隋如北齊唐因之各一人宋朝隸御厨勾當官五人以朝官并諸司使副内侍都知押班充掌供御之膳饈及内外饔餼割烹煎和素膳之事元祐初罷太官令二年復置崇寕二年置尚食局太官令惟掌祠事珍饈署令丞周官籩人掌四籩之實盖其任也後漢少府屬官有甘丞主膳具晋太官令有􅄳官果官吏各二人自後無聞北齊餚藏令屬光禄寺後周有餚藏中士下士隋如北齊唐因之長安中改為珍饈神龍初復舊開元初又改之有令丞各一人宋珍饈署隸御厨有供備庫太平興國二年改為内物料庫有使及副使掌供尚食及内外膳饈米麵飴蜜棗豆百品之料監官二人以三班及内侍充監門一人以三班充外物料庫掌給皇城外諸宫院油鹽米麵之品監官二人以三班内侍充良醖署令丞於周官有酒正中士下士掌酒之政令後漢湯官丞主酒屬少府晋有酒丞一人齊食官局有酒吏梁曰酒庫丞北齊有清漳令丞主酒後周如古周之制隋曰良醖署令丞各一人唐因之宋良醖署屬御厨有内酒坊使掌造法糯酒常料之三等酒以供邦國之用監官三人監門二人以三班内侍充都􅎘院掌造􅎘以給内酒坊之用及出鬻而收其直監官二人以京朝官及諸司使副内侍充法酒庫掌造供御及祠祭周太祖平河中得酒工王思善造法􅎘因立法酒庫置之凡祭祀供五齊三酒以實罇罍監官二人以朝臣及三班使臣内侍充掌醢署令丞於周官有醢人掌四豆之實自後無聞至齊諸公府有醸食典軍二人後周有掌醢中士下士隋曰掌醢署令丞各一人唐因之宋屬御厨有油醋庫監官一人以京朝官充掌造油醯胾以供邦國膳饈内外之用衞尉卿丞署主簿車武庫令丞左武噐令丞宫公司馬令右都候附衛尉秦官掌門衛屯兵漢因之漢舊儀曰衛尉寺在宫内胡廣云主宮闕之内衛寺於周垣下為區廬者若今之仗宿屋景帝初更名中大夫令後元年復為衛尉又有長樂建章甘泉衛尉皆掌其宫其職畧同而不常置顔師古曰各隨所掌之宫以為官名後漢有衛尉卿一人職與漢同晋銀章青綬五時朝服武官佩水蒼玉掌冶鑄領冶金凡領五千三百五十冶在江北而江南唯有梅根及冶塘二冶皆屬揚州不屬衛尉晋江左不置衛尉宋孝武復置南齊掌宫城管鑰後漢張衡西京賦曰衛尉入屯以警夜廵南齊宫城諸却敵樓上本施鼓持夜者以應更唱髙帝以鼓多警眠遂改以鐵磬梁衛尉卿位視侍中職與漢同卿每月丞每旬行宫徼紏察不法陳因之後魏亦有之北齊為衛尉寺有卿及少卿各一人隋文帝開元三年廢衛尉寺入太常及尚書省十三年復置掌軍噐儀仗帳幕之事而以監門衛掌宫門屯兵唐因之龍朔二年改衛尉為司衛咸亨初復舊光宅元年又改為衛尉神龍初復舊卿一人少卿二人初少卿一人太極元年加一人領武庫武噐守宫三署署各有令丞秦漢多以博士議郎為之後漢一人魏晋並同宋孝武増置一人梁亦有之後魏北齊並有隋因之唐置二人主簿一人漢衛尉駕四馬主簿前車以乗晋有衛尉主簿二人宋齊梁陳因之北齊隋亦有二人唐因之宋衛尉寺判寺事一人以郎官以上充凡武庫武噐並歸内庫及軍噐庫以他官及内侍典領守宫歸儀鸞司本寺無所掌卿少卿丞皆為寄禄官卿後來為中奉大夫少卿奉直大夫寺丞宣義郎元豐官制行置卿少卿丞主簿各一人卿掌儀衛兵械甲胄之政令少卿為之貳丞參領之凡内外作坊輸納兵噐則辨其名數驗其良窳以歸於武庫不如式者罰之時其曝凉而封籍其數若進御及頒給則按籍而出之每季委官檢視歲終上計帳於兵部掌凡幄帟之事大禮設帷宫張大次小次陳鹵簿儀仗長貳晝夜廵徼察其不如儀者押仗官則前期禀差凡仗衛供羽儀節鉞金鼓棨㦸朝㑹亦如之宴享賓客供幕帟茵席視其敝者移少府軍噐監脩焉分案四置吏十元祐三年詔長貳互置所隸官司十有三内弓箭庫南外庫軍噐衣甲庫軍噐弓槍之庫軍噐弩劍箭庫掌藏兵仗噐械甲胄以備軍國之用儀鸞司掌供幕帟供帳之事軍噐什物庫宣徳樓什物庫掌收貯什物給用則按籍而頒之左右金吾衛司六軍儀仗司掌清道徼廵排列奉引儀仗以肅禁衛凡儀物以時脩飾選募人兵而校其遷補之事政和五年詔金吾衞仗司依格差武冀大夫以上中興後廢衛尉幷入工部武庫令丞於周官司甲司弓矢等下大夫司戈盾等中士下士盖其任也兩漢曰武庫令屬執金吾後漢又有考工令丞屬太僕主造兵噐成付武庫令魏晋因之晋後屬衛尉宋齊武庫令丞屬尚書庫部梁陳屬衛尉卿北齊亦有後周如周官隋如北齊唐因之各一人天寳六載四月勅改儀制令廟社門宫門每門各二十㦸東宫每門各十八㦸一品門十六㦸嗣王郡王若上柱國𢃄職事二品散官光禄大夫以上鎭國大将軍以上各同職事品及京兆河南太原府大都督大都護門十四㦸上柱國帯職事三品上護軍帯職事二品若中都督上都䕶門十二㦸國公及上䕶軍帯職事三品若下都督諸州門各十㦸並官給貞元五年十二月中書門下奏應請列㦸官准儀制令正一品開府儀同三司嗣王郡王幷勲官上柱國柱國等𢃄職事三品以上並許列㦸准天寳六載四月勅文加散官光禄大夫鎮國大将軍以上各同職事品近日散試官便帯髙階者衆恐須商量者伏請准舊制令本文取帶三品以上正員職事為定勅㫖依武噐署令丞隋行臺尚書省有武噐監令唐永徽中始置各一人掌祭祀及朝㑹廵幸及公卿婚葬鹵簿之事宋武庫武噐並歸内庫及軍噐庫以他官及内時典領軍噐凡四庫勾當官並二人衣甲弓槍弩劍三庫悉以諸司使副及内侍充什物庫以三班使臣充掌禁兵噐鎧甲供軍什噐儲偫之物辨其出納守宫署漢有守宫令丞掌御紙筆墨及諸財用幷封泥之事屬少府晋及北齊屬光禄勲北齊守宫令掌張設之事梁陳屬大匠卿隋屬衛尉寺唐置令一人掌諸鋪設帳幕氊褥床薦几席之事廣徳二年二月勅文京兆府諸司諸使幕士丁匠總八萬四千五百人數内宜月支二千九百四十四人仍令河束闗内諸州府據户口分配不得偏出京兆府餘八萬一千一百一十四人並停宋守宫署歸儀鸞司儀鸞司勾當官四人以諸司使副及内侍充掌奉乗輿親祠郊廟朝㑹廵幸宴饗及内庭供帳之事凡三庫一曰金銀噐皿帟幕什物二曰香燭三曰氊油床椅鐵噐雜物監門二人以三班使臣充公車司馬令秦屬衛尉漢因之掌殿司馬門夜徼宫中天下上章四方貢獻及闕下凡所徵召公車者皆總領之漢張釋之為公車令時景帝與太子梁王共車入朝不下司馬門釋之遂劾其不敬文帝免冠謝太后太后詔赦之然後得入宫也後漢有丞一人丞選曉諱掌知非法尉主闕門兵禁戒非常胡廣曰諸門部各陳屯夾道其旁設兵以示威武交節㦸以遮誤出入也晋江左以來直曰公車令宋以後屬侍中隋有公車署置令丞唐無左右都候周禮司寤氏有夜士干寳注曰今都候之屬後漢各一人主劍㦸士徼循宫及天子有所收考宫中諸有詔奏罪左都候執㦸戲車縛送付詔獄在宫大小各付所屬見尚書令僕射尚書皆執版拜見郎對揖屬衛尉後無宗正卿少卿令丞太廟主簿崇元署諸陵署周官小宗伯掌三族之别以辨其親疏秦置宗正掌親屬漢因之更以叙九族平帝元始四年更名宗正五年又於郡國置宗師以紏皇室親族世氏致敎訓焉選有徳義者為之有寃失職者宗師得因郵亭上書宗伯請以聞為書付郵亭令送至宗伯常以正月賜宗伯帛十匹王莽倂宗伯於秩宗後漢曰宗正卿一人掌序錄王國嫡庶之次及諸皇室親屬逺近郡國歲因計上皇族名籍若有犯法當髠以上先上諸宗正宗正以聞乃報决胡廣曰宗正又歲一理諸王世譜差叙秩第髠枯昆切兩漢皆以皇族為之不以他族楚元王子鄙吝劉辟疆劉徳等迭為此官又後漢書曰劉軫字君文梁孝王之允為宗正卒官遂世掌焉魏亦然晋兼以庶姓山公啓事曰羊祜忠篤寛厚然不長理劇宗正卿缺不審可轉作否咸寕三年又置宗師以扶風王亮為之使皇室戚屬奉率徳義所有施行必令誥之梁王彤亦為宗師東晋省之屬太常桓温奏省宋齊不置宗正梁天監七年復置之視列曹尚書主皇室外戚之籍以皇族為之陳因之後魏有宗正卿少卿北齊亦然後周有宗師中大夫掌皇族定世系辨昭穆訓以孝悌屬大冢宰隋如北齊之制唐龍朔二年改為司宗咸亨元年復舊光宅元年改為司屬神龍初復舊卿一人少卿二人初少卿一人太極元年加置一人掌皇族外戚簿籍及邑司名帳領崇元署及諸陵太廟開元二十五年制宗正等寺官屬皆以皇族為之宋宗正寺判寺事二人以宗姓兩制以上充闕則以宗姓朝官以上知丞事掌奉宗廟諸陵薦享之事司皇族之籍大宗正司知司事二人以皇親團練觀察使以上充掌敦睦皇族敎導宗子受其陳請辯訟之事及紏過失而達之朝廷景祐三年始置司以皇兄寕江軍節度使濮王知大宗正事皇姪彰化軍節度觀察留後守節同知大宗正事修玊牒官無定員掌修皇帝玉牒序宗𣲖紀族屬歲撰宗子名以進舊隸宗正寺景祐中言者以玉牒與國史相通後以史官兼又有睦親廣親宅都大管勾三人以内侍充元豐六年詔宗正寺長貳不專用國姓盖自有大宗正司以統皇族也中興後卿一人不常置少卿一人以太常兼三年復置少卿一員嘉定九年詔以宗學改隸宗正寺自此寺官又預考校之事大宗正司知及同知官各一人丞二人官屬有記室一人熙寕三年始以異姓朝臣二員知丞事置局於睦親廣親宅是歲省管勾睦親廣親及提舉郡縣主等宅官以其事歸宗正崇寕三年置南外宗正司在南京西外宗正司在西京各置敦宗院中興後以位髙屬尊者為判大宗正事如舊制以宗室團練以上有徳望者充又置知大宗正丞一員以文人充掌紏合宗室而檢防之訓飭之凡南班宗室磨勘遷轉襲封請給核其當否嫁娶房奩分析財産酌厚薄多寡而訂其議凡宗室除合該賜名外皆大宗正定名而後報宗正寺其餘遷授官資支給錢米考核以詔予奪其不率敎者以法拘之歲乆知悔則除其過名分按六署吏十有二又有南外宗正司西外宗正司以處宗室之在外者各仍舊制設厚宗院皆設知宗仍以所在通判職官兼丞簿其紏合檢防訓飭如大宗正司西南外兩司闕知宗間令大宗正司選擇保明而後授之又各置敎授以課其行藝初建炎南幸先徙宗室於江淮於是大宗正司移江寕南外移鎮江西外移揚州其後屢徙後西外止於福南外止於泉又有紹興府宗正司盖初隨其所寓而分管轄之乾道七年嘗欲移紹興府宗正司於蜀不果後歸倂行在嘉定間用臣僚言乞凡除授知宗須擇老成更練之人詔知宗宗丞照百司例每日入局所以示增重宗盟之意玉牒所淳化六年始設局置官倣唐制也詔以皇宋玉牒為名建玉牒殿宇新寺九年以知制誥劉筠夏竦為修玉牒官自後置一員或二員朱勝非秀水閑居錄本朝國書嚴奉寳藏未有如玉牒者用金花紅羅標黄金軸至神宗朝以軸大難於披閲詔為黄金梵夾又以黄金為匣鎻鑰皆金也進呈畢安奉於宗正寺玉牒殿士大夫罕有知其制度者予頃在朝廷因宗正丞謝汲自本寺事論及玉牒問宰執諸公制度趙元鼎曰不過刻如王冊耳子曰國家宗支之蕃自古無之每朝為一牒宗室官稱名行女與其夫皆錄之以玉刋不其難乎年又中興系年錄注每朝為一牒乃載人主系序及歴行事如帝紀而差詳其後附以皇后事迹親王宗室子女則有宗蕃慶系錄仙源𩔖譜仙源積慶圖三書詳焉非同為一牒也玉牒則奉安於玉牒殿𩔖譜則安於屬籍堂勝非亦少誤景祐元年宗正寺脩玊牒官李淑申請詔以編脩院㕔西閣子充脩纂玊牒之所李淑言前脩玉牒官馮允亦是兼編修㑹要盖緣國史玉牒事節須要照會所以只就編修院修纂熙寕三年玉牒於三班院置局後徙編脩院皇帝玉牒十年一進脩玉牒官並以學士典領自元豐行官制分𨽻宗正寺官六年詔宗正寺脩玉牒照用日歴所文字並指定所書事令本所節錄元符二年宗正寺丞陳覺民乞將先帝玉牒内聖政令本寺修玉牒官抄冩封送國史院從之紹興十二年襲舊制始建以宰臣一人提舉脩玉牒官一人以侍從兼凡宗正卿少而下悉與脩纂二十九年詔玉牒所倂入宗正寺更不置脩玉牒官檢討官以本寺少卿及丞同領編脩事詔玉牒所宰臣提舉依舊脩書官一員同宗正卿丞修纂更不置檢討官紹興三十二年詔尚書左僕射陳康伯提舉編脩玉牒後或以參知政事簽書樞密院事兼權提舉乾道元年錢端禮以參政兼權蒋芾以簽樞兼權見玉牒所題名記故事玊牒以首相領之自後相府有闕則以首參兼領仍帶權字淳熙十五年王丞相淮去位周益公以右揆兼領時勑令所纔罷而首參仲至無兼局益公乃奏乞以仲至權提舉玉牒宰相在位而執政權領寳訓玉歴自此始也丞漢亦用皇族後漢一人劉茂字子衛為宗正丞歴代皆有之隋有二人唐因之宋初為寄祿官後改為奉議郎元豐正官名詔宗正寺除長貳外自今後更不專差國姓以楊畏趙君錫為之建炎三年罷紹興五年復置主簿梁置陳北齊隋皆有唐因之置一人宋天禧時以衛尉丞兼元豐正名初除楊完建炎三年罷紹興十年復置崇元置令一人初後魏天興二年置仙人博士掌煑煉百藥北齊置昭元等寺掌諸佛敎有大統一人都維那三人兼置功曹主簿等員以管諸州縣沙門之法後周置司寂上士中士掌法門之政又置司元中士下士掌道門之政隋初置崇元署令丞至煬帝改郡縣佛寺為道塲置道塲監一人改觀為元壇監一人唐復置崇元署初又每寺觀各置監一人屬鴻臚貞觀中省開元中以崇元署𨽻宗正寺掌觀及道士女冠簿籍齋醮之事令一人正八品下丞一人正九品下有府二人史三人典事六人掌固二人崇元學博士一人學生百人隋以署𨽻鴻臚又有道塲元壇唐置諸寺觀監隷鴻臚寺毎寺觀有監一人貞觀中廢寺觀監上元二年置漆園監尋廢開元二十五年置崇元學於元元皇帝廟天寳元年兩京置博士助敎各一員學生百人每祠享以學生代齋郎二載改崇元學曰崇賢館博士曰學士助敎曰直學士置大學士二人以宰相為之領兩京元元宫及道院改天下崇元學為通道學博士曰道徳博士未幾而罷寳應永泰間學生存者無幾大歴三年復増至百人初天下僧尼道士女冠皆𨽻鴻臚寺武后延載元年以僧尼𨽻祠部開元二十四年道士女冠𨽻宗正寺天寳二載以道士𨽻司封貞元四年崇元館罷大學士後復置左右銜大功徳使東都功徳使總僧尼之籍及功役元和二年以道士女官𨽻左右銜功徳使㑹昌二年以僧尼𨽻主客太清宫置元元館亦有學士至六年廢而僧尼復𨽻兩銜功徳使宋自真宗興崇道敎置玊清昭應宫景靈宫㑹靈觀使以宰相為之副使判官都監及集禧觀醴泉觀東西太一宫提舉則以兩省兩制丞郎及防禦諸司使副為之掌奉齋醮之事又有譯經潤文使亦以宰相為之熙寕以後增置祠祿之官以尊老優賢而時相欲以宫觀之祿處不奉行新法之人遂無限員亦無職事而釋老之事則如歴代領之祠部郎官又屬鴻臚寺至徽宗時以道敎改𨽻秘書省置道階自六字先生至額外鑒義品秩比視中大夫至將仕郎凡二十六等又置道學升貢及三歲大比法同科舉應天下神霄玉清萬夀宫天慶觀知及副知將來有聞並以學校登科人充其餘宫觀亦依此令禮部署名籍差注如吏部法以蔡攸通行提舉道錄院中興後道釋敎門事仍歸祠部按崇元署一官唐創之以司道敎而必屬之宗正司者盖唐以老氏為始祖則崇其敎者亦以為尊祖宗之事也杜氏通典所載凡唐所創之官而前代所無者則必叙其所掌之事以通之於前代如崇元一官前代無之然興崇二敎而為之建立官司則非始於唐也故必叙後魏所置仙人博士北齊所置昭元寺之類以先之愚又嘗欲以宋所創之官而通之於唐如崇元署宋雖無其官然亦嘗興崇道敎為之置立官司張皇而推奨之矣故以真徽兩廟所置玉清景靈宫使副及都提舉道錄院等事附見焉然唐則專主以一官而其品秩稍卑宋雖不專置官而常以宰相貴官兼之但天寳間所置崇元館大學士二人以宰相為之則又景靈玊清宫使譯經使所取法也諸陵園寝官漢置屬太常長陵令秩二千石為髙祖陵也故尊其秩元帝永光元年分諸陵邑屬三輔史記曰司馬相如為孝文園令後漢每陵園令各一人掌按行掃除丞及校長各一人校長主戒盗賊晋宋皆曰令而梁初為監後亦改為令梁以下皆有之唐每陵令丞各一人初屬太常開元二十五年並屬宗正寺宋以宗正寺知丞事掌奉宗廟諸陵薦享之事諸廟寝園令長丞漢置宋志曰漢西京曰長東京曰令晋有太廟令宋太廟令領齋郎二十四人齊梁以下皆有後魏有太常齋郎漢書曰田千秋為髙廟寝郎舊屬太常唐開元二十五年二月勑宗廟所奉尊敬之極因以名署情所未安宜令禮官詳擇所宜奏聞至五月太常少卿韋縚奏曰謹詳經典兼尋令式宗廟享薦皆主奉常别置署司事非稽古其太廟署請廢省本司專奉其事許之二十五年勑宗正設官實司屬籍而陵寝崇敬宗廟惟嚴割𨽻太常殊乖本系奉先之㫖深所未妥自今以後諸廟署並𨽻宗正寺宋以宗正寺知丞事掌奉宗廟諸陵薦享之事室長齋郎無常數廟直官一人太廟后廟宫闈令三人以入内内侍充元豐後太廟令屬宗正寺掌宗廟薦新七祀及功臣從享之禮品秩與大社籍田令同文獻通考卷五十五
