body:
  text: 文獻通考卷二百五十九鄱陽馬端臨貴與著帝系考十皇族黄帝二十五子其得姓者一十四人國語司空季子曰同姓為兄弟黄帝之子二十五人其同姓者二人而已唯青陽與夷鼔皆為己姓此二人相與同徳故俱為己姓青陽金天氏帝少皥青陽方雷氏之甥也夷鼔彤魚氏之甥也方雷西陵氏之姓彤魚國名帝系曰黄帝嬰西陵氏之子嫘祖實生青陽姊妹之子曰甥聲雷嫘同也其同生而異姓者四母之别為十二姓凡黄帝之子二十五宗唐尚書曰繼别為小宗非也繼别為大宗别之庶孫乃為小宗耳其得姓者一十四人為十二姓得姓以徳居官而初賜之姓謂十四人而二人為姬二人為已故十二姓姬酉祁已滕葴任荀僖佶儇依是也唯青陽與蒼林氏同於黄帝故皆為姬姓二十五宗唯青陽與蒼林徳及黄帝同姓為姬也同徳之難也如是言徳自黄帝同之其難也如是哉昔髙陽氏有才子八人髙陽氏顓頊之號八人其苖裔蒼舒隤敳檮戭大臨厖降庭堅仲容叔達此即垂益禹臯陶之倫庭堅即臯陶字隤徒囬反敳五才反一音五囬反韋昭音瑰檮直由反韋昭音桃戭以善反漢書作㪦韋昭已震反厖莫江反降下江反陶音遥齊聖廣淵明允篤誠天下之民謂之八愷齊中也淵深也允信也篤厚也愷和也愷開在反髙辛氏有才子八人髙辛氏帝嚳之號八人亦其苗裔嚳苦毒反伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍此即稷契朱虎熊羆之倫奮甫問反熊音雄貍力之反契息列反依字當作偰古文作卨羆彼皮反忠肅共懿宣慈惠和天下之民謂之八元肅敬也懿羙也宣徧也元善也徧音遍此十六族也世濟其美不隕其名濟成也隕墜也隕於敏反墜直類反以至於堯堯不能舉舜臣堯舉八愷使主后土后土地官禹作司空平水土即主地之官以揆百事莫不時序地平天成揆度也成亦平也揆葵癸反舉八元使布五教於四方契作司徒五教在寛故知契在八元之中父義母慈兄友弟共子孝内平外成内諸夏外夷狄夏户雅反昔帝鴻氏有不才子帝鴻黄帝掩義隐賊好行凶德醜類惡物頑嚚不友是與比周醜亦惡也比近也周宻也好呼報反嚚魚巾反心不則德義之經為頑口不道忠信之言為嚚比毗志反天下之民謂之渾敦謂驩兠渾敦不開通之貎渾户本反敦徒本反驩呼端反兠都侯反少皥有不才子少皥金天氏之號次黄帝少詩照反注同皥胡老反毁信廢忠崇飾惡言靖譖庸回服䜛蒐慝以誣盛徳崇聚也靖安也庸用也回邪也服行也蒐隐也慝惡也盛徳賢人也蒐所㽞反慝他得反邪似嗟反天下之民謂之窮竒謂共工其行窮其好竒竒其宜反共音恭行下孟反好呼報反顓頊氏有不才子不可教訓不知話言話善也話戸快反告之則頑德義不入心舍之則嚚不道忠信舍音赦傲狠明徳以亂天常天下之民謂之檮杌謂鯀檮杌頑凶無儔匹之貎傲五報反狠戸墾反檮徒刀反杌五忽反鯀古本反此三族也世濟其凶增其惡名以至於堯堯不能去方以宣公比堯行父比舜故言堯亦不能去須賢臣而除之去起呂反注及下皆同縉雲氏有不才子縉雲黄帝時官名貪於飲食冒於貨賂侵欲崇侈不可盈厭聚歛積實不知紀極不分孤寡不恤貧匱冒亦貪也盈滿也實財也厭於艷反匱其媿反天下之民以比三凶非帝王之子孫别以比三凶謂之饕餮貪財為饕貪食為餮饕他刀反餮他結反舜臣堯為堯臣賔於四門闢四門達四聰以賔禮衆賢闢婢亦反聰本亦作窻七工反流四凶族案四凶罪􅃺而流放之渾敦窮竒檮杌饕餮投諸四夷以禦魑魅投棄也裔逺也放之四逺使當魑魅之災魑魅山林異氣所生為人害者也禦魚呂反山神獸形魅亡備反說文作鬽云老精物也魅或從未是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也按八愷出自髙陽八元出自髙辛驩兠出自帝鴻共工出自少皥鯀出自顓頊皆黄帝之裔也雖賢否不同而皆以帝王者子孫為顯官於唐虞之世盖古之仕者世祿而五帝三代之世系未有不出自黄帝者故叙此叚以備唐虞以来公族世系之本末云周武王克商光有天下兄弟之國十有五人姬姓之國四十人𫝊富辰曰昔周公弔二叔之不咸故封建親戚以蕃屛周弔傷也咸同也周公傷夏殷之叔世疏其親戚以至滅亡故廣封其兄弟管蔡郕霍魯衛毛聃郜雍曺滕畢原酆郇文之昭也十六國皆文王子邘晋應韓武之穆也四國皆武王子凡蔣邢茅胙祭周公之允也禮記文王世子庶子之正於公族者教之以孝悌睦友孝愛明父子之義長幼之序正者政也庶子司馬之屬掌國子之倅為政於公族者其朝於公内朝則東面北上臣有貴者以齒内朝路寝庭其在外朝則以官司士為之外朝路寢門之外庭司士亦司馬之屬也掌羣臣之班正朝儀之位也其在宗廟之中則如外朝之位宗人授事以爵以官宗人掌禮及宗廟也以爵貴賤異位也以官官各有所掌也若司徒奉牛司馬奉羊司空奉豕其登餕獻受爵則以上嗣上嗣君之適長子以特牲饋食禮言之受爵謂上嗣舉奠也獻謂舉爵洗奠酌入也餕謂宗人遣舉奠盥祝命之餕也大夫之嗣無此禮辟君也庶子治之雖有三命不踰父兄治之治公族之禮也唯於内朝則然其餘㑹聚之事則與庶姓同一命齒於郷里再命齒於公族三命不齒不齒者特為位不在父兄行列中其公大事則以其䘮服之精粗為序雖於公族之䘮亦如之以次主人大事謂死䘮也其為君雖皆斬衰序之必以本親也主人主䘮者次主人者主人恒在上主人雖有父兄猶不得下齒之若公與族燕則異姓為賔同宗無相賔客之道膳宰為主人燕尊不獻酒公與父兄齒親親也族食世降一等親者稠疏者希稠直由反宻也其在軍則守於公禰謂従軍者公禰行以遷主言禰在外親也公若有出疆之政謂朝覲㑹同庶子以公族之無事者守於公宮正室守於太廟正室適子也太廟太祖之廟也諸父守貴宮貴室謂守路寢守貴室本或作守貴宫貴室諸子諸孫守下宮下室下宮親廟也下室燕寢或言宮或言廟通異語五廟之孫祖廟未毁雖為庶人冠娶妻必告死必赴練祥則告赴告於君也實四廟孫而言五廟者容顯考為始封子也族之相為也宜弔不弔宜免不免有司罰之弔謂六世以徃免謂五世至於賵賻承􅅤皆有正焉承讀為贈聲之誤也正正禮也賵芳鳳反下同賻音附承音贈出注含胡暗反本又作唅賵賻唅禭皆贈䘮之物也車馬曰􅈖布帛曰賻珠玉曰含衣服曰禭總謂之贈賻猶送也公族其有死罪則磬於甸人不於市朝者隐之也甸人掌郊野之官縣縊殺之曰磬甸大遍反縣音元縊一智反其刑罪則纎剸亦告於甸人纎讀為殱殱刺也剸割也刺割臏墨劓刖皆以刀鋸刺割人體也告讀為鞠讀書用法曰鞠纎依注音鍼之林反徐子㢘反注本或作纎者是依徐音而改也剸止免反告依注作鞠久六反刺七亦反又七智反下同臏頻忍反徐扶忍反劓魚器反鋸徐音據公族無宮刑宮割滛刑獄成有司讞於公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟成平也讞之言曰白也辟亦罪也公曰宥之宥寛也欲寛其罪出於刑也有司又曰在辟公又曰宥之又復也有司又曰在辟及三宥不對走出致刑於甸人對答也先者君毎言宥則答之以將更寛之至於三罪定不復答走徃刑之為君之㤙無己公又使人追之曰雖然必赦之有司對曰無及也罪既正不可宥乃欲赦之重刑殺其類也反命於公白已刑殺公素服不舉為之變如其倫之䘮無服素服於凶事為吉於吉事為凶非䘮服也君雖不服臣卿大夫死則皮弁錫衰以居徃弔之當事則弁絰於士盖疑衰於同姓則緦衰以弔之今無服者不徃弔也倫謂親疎之比也素服亦皮弁矣親哭之不徃弔為位哭之而已君於臣使有司哭之公族朝於内朝内親也雖有貴者以齒明父子也謂以宗族事㑹外朝以官體異姓也體猶連結也宗廟之中以爵為位崇德也崇髙也宗人授事以官尊賢也官各以能登餕受爵以上嗣尊祖之道也上嗣祖之正統䘮紀以服之重輕為序不奪人親也紀猶事也公與族燕則以齒而孝弟之道達矣以至尊不自異於親之列其族食世降一等親親之殺也殺差也戰則守於公禰孝愛之深也行主君父之象正室守太廟尊宗室而君臣之道著矣以其不敢以庶守君所重諸父諸兄守貴室子弟守下室而讓道達矣以其貴者守貴賤者守賤上言父子孫此言兄弟互相􅇱也五廟之孫祖廟未毁雖及庶人冠娶妻必告死必赴不忘親也親未絶而列於庶人賤無能也敬弔臨賻賵睦友之道也古者庶子之官治而邦國有倫邦國有倫而衆鄉方矣鄉方言知所鄉公族之罪雖親不以犯有司正術也所以體百姓也犯猶干也術法也百姓本或作異姓非刑於隐者不與國人慮兄弟也弗弔弗為服哭於異姓之廟為忝祖逺之也素服居外不聽樂私䘮之也骨肉之親無絶也公族無宮刑不翦其類也翦割截也逺于万反左傳襄公十二年吴子夀夢卒臨於周廟禮也周廟文王廟也周公出文王故魯立其廟吴始通魯凡諸侯之䘮異姓臨於外於城外向其國同姓於宗廟所出王之廟同宗於祖廟始封君之廟同族於禰廟父廟也同族謂髙祖以下是故魯為諸姬臨於周廟為邢凡蔣茅胙祭臨於周公之廟即祖廟也六國皆周公之支子别封為國共祖周公秦商鞅立法宗室非有軍功不得論為屬籍漢髙祖七年置宗正官以叙九族文帝四年復諸劉有屬籍家無所與賜諸侯王子邑各二千戸孝武元光元年復七國宗室前絶屬者按孝景三年詔楚元王子蓻等與吴王濞等為逆朕不忍加法除其籍毋令汚宗室是年始詔復之後元二年正月朝諸侯於甘泉宮賜宗室孝昭始元二年以宗室無在位者舉茂材劉辟疆劉長樂皆為光禄大夫辟疆守長樂衛尉武帝時劉辟疆以宗室子隨二千石議論冠諸宗室清寧少欲嘗以書自娱不肯仕昭帝即位或說大將軍光曰將軍不見諸呂之事乎處伊周之位攝擅權而背宗室不與共職是以天下不信卒至滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事反諸呂道如是可以免患光然之乃擇宗室可用者辟疆子徳待詔丞相府孝宣地節元年詔曰盖聞堯親九族以和萬國朕䝉遺德奉承聖業惟念宗室屬未盡而以罪絶若有賢材改行勸善其復屬使得自新孝成建始二年罷博望苑以賜宗室朝請者劉向上封事言王氏一姓朱輪華轂者二十三人大將軍秉事用權五侯驕奢排擯宗室孤弱公族其有智能者尤非毁而不進逺絶宗室之任不令得給事朝省恐其與己分權事勢不兩大王氏與劉氏且不並立宜發明詔吐德音援近宗室親而納信黜逺外戚毋授以政所以褒睦内外之姓子孫無疆之計也哀帝即位賜宗室王子有屬者馬各一駟本紀平帝元始元年詔宗室屬未盡而以罪絶者復其屬其為吏舉廉佐史補四百石本紀師古曰宗室為吏者皆令舉廉各従本秩而以廉吏遷之為佐史者例補四百石四年二月賜宗室有屬籍者爵自五大夫以上各有差本紀五年正月祫祭明堂宗室子九百人召助祭禮畢皆益戸賜爵及金帛增秩補吏各有差詔曰盖聞帝王以徳撫民其次親親以相及也昔堯睦九族舜厚叙之朕以皇帝幼年且統國政惟宗室子皆太祖髙皇帝子孫及兄弟吴頃楚元之後漢元至今十有餘萬人雖有王侯之屬莫能相紏或䧟入刑罪教訓不至之咎也𫝊不云乎君子篤於親則民興於仁其為宗室自太上皇帝以来族親各以世氏郡國置宗師以紏之􅆀教訓焉二千石選有德義者以為宗師考察不從教令有寃失職者宗師得因郵亭書言宗伯請以聞常以嵗正月賜宗師帛各十匹西漢初宗室封王者帝子王已見皇子門更不錄楚元王交髙帝弟代王喜髙帝兄荆王賈髙帝從父弟燕敬王澤髙帝從祖昆弟各王受封𫝊國本末見封建考此更不録後同西漢宗室王子侯髙帝時封三人髙后時封三人孝文時封十四人孝景時封七人孝武時封一百七十七人孝昭時封十二人孝宣時封六十三人孝元時封四十八人孝成時封四十三人孝哀時封九人孝平時封二十七人各侯姓名及受封𫝊國本末並見封建考此更不錄後同東漢世祖建武二年十二月戊午詔曰惟宗室列侯為王莽所廢先靈無所依歸朕愍之其並復故國若侯身已歿屬所上其子孫見名尚書封拜紀十三年二月丙辰詔曰長沙王興眞定王得河間王邵中山王茂皆襲爵為王不應經義其以興為臨湘侯得為眞定侯邵為樂成侯茂為單父侯其宗室及絶國封侯者凡一百三十七人丁巳降趙王良為趙公太原王章為齊公魯王興為魯公漢置宗正卿掌序錄王國嫡庶之次及諸宗親屬逺近郡國嵗因計上宗室名籍若有犯法當髠以上先上諸宗正宗正以聞乃報決胡廣曰又嵗一治諸王世譜差序秩和帝元興元年宗室以罪絶者悉復屬籍以後屢有此詔不悉録魏文帝皇初二年制封王之庶子為鄉公嗣王之庶子為亭侯公之庶子為亭伯明帝太和五年詔令諸王及宗室公侯各將適子一人朝齊王時宗室曺冏上書曰大魏之興二十四年矣子弟王空虛之地君有不使之民宗室竄於閭閻不聞邦國之政權均匹夫勢齊凡庶内無深根不拔之固外無磐石宗盟之助非所以安社稷為萬世之業也且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟並據而宗室子弟曾無一人厠其間與相維制非所以强幹弱枝備萬一之虞也今之用賢超為名都之主或為偏師之帥而宗室有文者必限之小縣之宰有武者必致百人之上非所以勸進賢能褒異宗室之禮也語曰百足之蟲至死不僵以其扶之者衆也此言雖小可以譬大是以聖王安不忘危存不忘亡故天下有變而無傾危之患矣冀以此論感寤曺爽爽不能用魏宗室曺仁太祖從弟仕至車騎將軍封陳侯曺洪太祖従弟仕至驃騎將軍封都陽侯曺休太祖族子仕至大司馬揚州都督封長平侯曺真太祖族子仕至大司馬封東鄉侯晋武帝懲魏氏孤立之敝故大封宗室授以職任又詔諸王皆得自選國中長吏衛將軍齊王攸獨不敢皆令上請又詔除魏宗室禁錮晋置宗正統皇族宗人譜牒晋宗室王侯安平獻王孚宣帝弟彭城穆王權宣帝弟髙宻文獻王泰宣帝弟范陽威王綏宣帝弟濟南恵王遂宣帝弟譙遜王剛宣帝弟任城景王陵宣帝弟平原王幹宣帝弟汝南文成王亮宣帝子琅琊武王伷宣帝子清恵亭侯京宣帝子扶風武王駿宣帝子梁王肜宣帝子趙王倫宣帝子齊獻王攸文帝子城陽哀王兆文帝子遼東悼恵王定國文帝子廣漢殤王廣德文帝子樂安平王鑒文帝子燕王機文帝子宋宗室諸王侯長沙景王道憐武帝中弟臨川烈武王道規武帝季弟營浦侯遵考武帝族弟始武帝輔政時諸子並弱宗室唯有遵考云孝武制帝室朞親官非禄官者月給錢十萬齊宗室諸王侯衡陽元王道度髙帝長兄始安貞王道生南豐伯赤斧髙帝從祖弟臨汝侯坦之髙帝絶服族子梁宗室王侯吴平侯景武帝􅀙父弟長沙宣武王懿武帝兄永陽昭王敷武帝兄衡陽宣王暢武帝弟桂陽簡王融武帝弟臨川静恵王宏武帝弟南平元襄王偉武帝弟安成康王秀武帝弟始興忠武王憺武帝弟鄱陽忠烈王恢武帝弟梁置宗正卿位視列曺尚書主皇室外戚之籍以宗室為之陳宗室王侯永修侯擬武帝疎屬遂興侯詳宜黄侯慧紀武帝從孫南康愍王曇朗武帝母弟後魏宗室王侯上谷公紇羅神元帝曽孫武陵侯因長樂王夀樂並章帝後望都侯頽昭帝後六修穆帝長子曲陽侯素延順陽公郁宜都王目辰並桓帝後吉陽男比干江夏公呂道武帝族弟髙凉王孤平文帝第四子西河公敦平文帝曾孫司徒平文帝元孫武衛將軍謂烈帝第四子河間公齊烈帝元孫扶風公處真烈帝後文安公泥魏疎族實君昭成帝子秦王翰昭成帝子閼婆夀鳩紇根地干力真窟咄並昭成帝子明帝時亰兆王遥大功昆弟皆是景穆之孫至明帝而本服絶故除遙等屬籍遥表曰竊聞聖人所以南面而聽天下其不可得變革者則親也尊也四世而緦服窮五世而袒免六世而親屬竭矣去兹以徃猶繫之以姓而弗别綴之以食而弗殊又律曰議親者非唯當世之屬親厯謂先帝之五世謹尋斯􅈲將以廣帝宗重磐石先皇所以變兹事條為此别制者太和之季方有意於五屬經始之費慮深在初割滅之起暫出當時也且臨淮王提分屬籍之始髙祖賜帛三千疋所以重分離樂良王長命亦賜縑二千疋所以存慈眷此皆先朝殷勤克念不得已而然者也古人有言百足之蟲至死不僵者以其輔己者衆臣誠不欲妄親太階茍求潤屋但傷大宗一分則天子屬籍不過千數人而已在漢親王之子不限多少皆列土而封謂之曰侯至於魏晋莫不廣胙河山稱之曰公者盖􅁖其大宗之不固骨月之恩疎也臣去皇上雖是五世之逺於先帝便是天子之孫髙祖所以國秩禄賦復給衣食后族唯給其賦不與衣食者欲以别内外限異同也今諸廟之感在心未忘行道之悲倐然已及其諸封者身亡之日三年服終然後改奪今朝廷猶在遏宻之中便議此事實用未安詔付尚書博議以聞尚書令任城王澄尚書左僕射元暉奏同遙表靈太后不從先是皇族有譴皆不持訊時有宗士元顯當犯罪宗正約以舊制尚書李平奏以宗室磐石周布天下其屬籍疎逺䕃官卑末無良犯憲理湏根究請立限斷以為定式詔曰雲漢綿逺蕃衍代滋植籍宗氏而為不善者良亦多矣先朝既無不訊之格而空相矯恃以長為暴諸在議請之外者可悉依常法北齊宗室王侯趙郡王琛神武帝弟清河王岳神武從父弟廣平公盛神武従叔祖揚州公永樂神武從祖兄子上洛王思宗神武從子平秦王歸彦神武族弟武興王普歸彦兄子長樂太守靈山神武族弟神武諸子已見皇子門齊置大宗正寺掌宗室屬籍統皇子王國諸長公主家周宗室無封爵貴顯者周文帝諸子已見皇子門更不重叙隋宗室諸王蔡景王整文帝次弟滕穆王瓚文帝弟道宣王嵩文帝弟衛昭王爽文帝弟河間王𢎞文帝從弟義城公處綱文帝族父離石太守子崇武元帝族弟唐宗室四十一房一曰㝎州刺史名乞豆仕後魏太祖景皇帝虎之次弟二曰南陽公景帝子名延伯三曰譙王景帝子名真四曰蔡王景帝子名岡五曰畢王景帝子名璋六曰雍王景帝子名珪七曰郇王景帝子名禕八曰大鄭王景帝子名亮九曰蜀王代祖元皇帝昺之子名湛十曰巢王髙祖子元吉十一曰大楚王髙祖子智雲十二曰荆王髙祖子元景十三曰徐王髙祖子元禮十四曰韓王髙祖子元嘉十五曰彭王髙祖子元則十六曰小鄭王髙祖子元懿十七曰霍王髙祖子元軌十八曰虢王髙祖子鳳十九曰道王髙祖子元慶二十曰鄧王髙祖子元裕二十一曰舒王髙祖子元名二十二曰魯王髙祖子靈䕫二十三曰江王髙祖子元祥二十四曰宻王髙祖子元暁二十五曰滕王髙祖子元嬰二十六曰恒山王太宗子承乾二十七曰吴王太宗子恪二十八曰濮王太宗子泰二十九曰蔣王太宗子惲三十曰越王太宗子真三十一曰紀王太宗子慎三十二曰曺王太宗子明三十三曰澤王髙宗子上金三十四曰章懐太子髙宗子賢三十五曰湖陽郡王睿宗子範三十九恵宣太子蜀王房睿宗子又有隴西渤海二房附見其譜定著三十九房自元宗以後諸王不出閤不分房子孫闕而不見太宗貞觀元年初上皇欲彊宗室以鎭天下故皇再從三從弟及兄弟之子雖童孺皆為王王者數十人上從容問羣臣徧封宗子於天下利乎封德彛對曰前世唯皇子及兄弟乃為王自餘非有大功無為王者上皇敦睦九族大封宗室自兩漢以来未有如今日之多者爵命既崇多給力役恐非示天下以至公也上曰然朕為天子所以養百姓也豈可勞百姓以養己之宗族乎乃詔降宗室郡王皆為縣公惟有功者數人不降元宗先天之後皇子幼則居内東封後以年漸長成乃於安國寺東附苑城同為大宅分院居之名為十王宅令中官押之於夹城中起居毎日家令進膳又引詞學工書之人入教謂之侍讀十王謂慶忠棣鄂榮光儀潁永濟盖舉全數其後盛夀儀陳豐恒涼六王又就封入内宅開元二十五年鄂光得罪忠王繼大統天寳中慶棣又歿唯榮儀十四王居内而府幕列於外坊嵗時通名起居而已外諸孫長成又於十宅外置百孫院毎嵗幸華清宮側亦有十王宅百孫院十王宮人毎院四百餘人百孫院三四十人又於宮中置維城庫諸王月俸物納之以給用諸孫納妃嫁女亦就十院中太子不居於東宮但居於乗輿所幸之别院太子之子亦分院而居婚嫁則同親王公主於崇仁里之禮院唐宗正寺掌天子族親屬籍親有五等先㝎於司封一曰皇帝周親皇后父母視三品二曰皇帝大功親小功尊屬太皇太后皇太后皇后周親視四品三曰皇帝小功親緦麻尊屬太皇太后皇太后皇后大功親視五品四曰皇帝緦麻親袒免尊屬太皇太后皇太后皇后小功親五曰皇帝袒免親太皇太后小功卑屬皇太后皇后緦麻親視六品皇帝親之夫婦男女降夲親二等餘親降三等尊屬進一等降而過五等者不為親諸王大長公主長公主親夲品嗣王郡王非三等親者亦視五品選舉制凡館有二門下省有𢎞文館生三十六人東宮有崇文館生二十人以皇緦麻以上親皇太后皇后大功以上親宰相貴官之子為之唐宗室王侯南陽公延伯太祖長子譙王真太祖次子畢王璋太祖子江夏王道宗璋之孫雍王繪太祖子淮陽壮王道元繪之孫郇王禕太祖子長平肅王叔良禕子新興郡王德良禕子長樂郡王幼良禕子蔡烈王蔚太祖子西平懐王安蔚子襄武郡王琛安子河間元王孝恭安子濟北郡王瑊安子漢陽郡王懐安子濟南郡王哲蔚子盧江郡王㻐哲子鄭孝王亮太祖子淮安靖王神通亮子膠東郡王道彦髙宻王孝詧淄川王孝同廣平王孝慈河間王孝友清河王孝節膠西王孝義並神通子梁王澄世祖子蜀王湛世祖子隴西恭王博乂湛子渤海敬王奉慈湛子唐宗室宰相凡十一人林甫回係郇王房石程福係鄭王房勉夷簡宗閔係小鄭王房適之係恒山王房峴係吴王房知柔係宣恵太子房王氏揮麈録曰唐書特立宗室傅贊乃云宰相以宗室進者九人林甫姦諛幾忘天下程知柔在位無所發明林甫在姦臣𫝊知柔相昭宗附宣恵太子業𫝊後第五卷止叙七人適之峴勉程夷簡石回然李麟乃懿祖後李逢吉李蔚俱隴西同係李宗閔出鄭王房李揆亦出隴西宰相共一十三人也不同作一𫝊何耶宋宗室王邕王光濟宣祖長子太祖兄早卒追封䕫王光贊宣祖幼子太祖弟早卒追封秦王廷美宣祖第三子諸廷美十子太宗篤親不欲太祖及廷美子異其稱謂故屬籍皆曰皇子皇女及廷美得罪乃正名稱皇姪皇姪女仁宗景祐中下詔度玉清昭應宮舊地建宮合宗室十位聚居賜名曰瞻親院於祖宗後選一人為宗正以司訓𨗳紏違失凡宗族之政令皆令掌之奏事毋得専達先詳視可否以聞初諸王邸散居京師過從有禁非朝謁從祠不得時會見仁宗立瞻親院以夀春郡王允譲知大宗正事總領輯睦甚有恩意務以身先之教養子孫崇向藝學不率則正其罪故更相責厲莫不勸服故事内朝謁宗婦不預因曰託姻皇屬而不得一望禁闥非所以顯榮之也奏通其籍又宗婦少䘮夫雖無子不許更嫁曰此非人情乃為請使有歸神宗熈寧二年中書樞宻院言祖宗受命百年皇族日以蕃衍而親疎之施未有等殺甄序其材未能如古獻議之臣謂宜有所釐正請恭酌先王典制時事之宜條具聞奏詔同議以聞臣等今謀定方今可行之制宣祖太祖太宗之子皆擇其後一人為宗世世封公補環衛官以奉祭祀不以服屬盡故殺其㤙禮祖宗袒免親將軍以下􅂅出官者聽仍先經大宗正司陳請大宗正擇夲官宗長與大學教授使學才行堪任使者然後審察以聞就武官者試讀律習書就文官者說試一中經或論一首將軍換諸司副使太常丞正率換内殿崇班太子中允並與州郡監當一次任滿與親民副率換西頭供養官大理評事與監當一次任滿有州郡監司保舉者與親民否則即依外官祖宗袒免親未賜名授官者除右班殿直年十五與請給年二十許出官􅂅換文官者與試衘知縣並令監當考試及任滿有無保任如前法出官日並特與優賜􅂅鏁㕔應舉者依外官其非袒免親不賜名授官許應舉應進士者只試䇿論明經者習一大經試大義及䇿初試不成文理者退黜餘令覆試取合格者以五分為限人數雖多不得過五十人累經覆試不中年長者當特推㤙量材録用已出官者給俸依在亰分數許依審官三班銓法指擬注授不以逺近為限授文官者轉官者轉官與進士出身同鏁㕔應進士明經舉有出身人至貟外郎與轉左曺宗室不出官者祖宗元孫轉官至正任觀察使止袒免親至遥郡刺史止祖宗袒免親見任官合奏薦子孫者許依外官祖宗袒免親以下見有官不􅂅出官父祖俱亡者許在京居止隨䖏置産其出官者置田宅如外官法祖宗袒免女嫁賜錢減半婿與三班奉職非袒免女量加給賜更不與婿官有官者與免入逺許依審官三班流内銓法指擬注授班行免指使其􅃝免親娶婦量加給賜其非袒免親嫁娶依庶姓仍不得與非士族家為婚姻祖宗袒免親以外兩世貧無官者量賜田孤幼無依及尤貧失所者不拘世數隨所在官司具名聞奏當職特加存恤奏上詔曰自我祖宗惇叙邦族大則疏封於爵土次則通籍於閣臺並㽞京師參奉朝請然而世緒寖逺皇枝益蕃屬有親疎則㤙有􅂭殺才有賢否則禄有重輕今而一貫於周行是亦奚分於流别雖敦睦之道誠廣而德施之義未周故廷臣數言宰司繼請謂宜定正限以等夷朕惟親戚之間經史有訓漢唐之世故事具存或以九族辨尊卑􅂉以五宗紀逺近或聽推㤙而分子弟􅂉許自試而効才能或宗子之賢得從科舉或諸王之女自主婚姻盡前世之所行顧當今之未􅇱况我朝制作動法先王豈宗室等殺乃無定著因俾羣公之合議將立一代之通規載覽奏封具陳條目以謂祖宗昭穆是宜世世之封王公子孫抑有親親之教若乃服屬之既竭洎於才藝之並優在隨器以甄揚使當官而勉懋至於任子之令通婚之儀凡曰有司之常一用外官之法僉言既允朕意何疑告於將来用頒眀命宜依中書樞宻院所奏施行宗正寺言毎嵗寫仙源積慶圖宗藩慶緒録送龍圖天章寳文閣今宗室非袒免親既不賜名授官一依外官之法請定所修圖冊詔下禮院詳定禮官言六世親屬既竭繫之以姓而弗别則禮有其義皇宗祖廟雖毁子孫皆於宗寺附籍則今有其文况朝廷釐改皇族授官之制而袒免外親統宗􅊞爵進預科選遷官給俸㤙禮優異悉不與外官匹庶同法屬雖疎而㤙數不絶若圖籍湮落則無審其所從證其宗正寺所修圖錄並請仍舊從之元豐官制行詔大宗正司不𨽻六曺大宗正以宗室團練以上有德望者為之次一人為同知位髙屬尊者為判掌紏合族屬而訓之以德行道藝受其詞訟而糾正其愆違有罪則先劾以聞法例不能决者同上殿取裁凡宗室服屬逺近之數及其賞罰規式皆總之屬有記室一人掌牋奏講書教授十有二人講授兼領小學之事渡江後頗用南班多不得其人無以表率更生刻削宗室皆患之置宗學及學官夲末見職官門哲宗紹聖元年禮部言諸宗室係袒免以外兩世祖父俱亡而無官雖有官而無釐務貧不能給者委大宗正司及所在官司奏給錢米從之徽宗崇寧元年詔曰神宗嘗詔宗室年長者推㤙又嘗詔袒免外兩世貧無官者賜田又嘗詔外任者許居於兩京今宜遵先志宰臣蔡京等言宗室舊来在宮有出入之限有不許外交之禁宮門有譏察之令今疎屬外居僅遍都下積日滋久殆不能容若不居之兩京散之近郡立闗譏察之令或一有非意犯法則勢有不可已者今請非袒免親以下兩世除北京外欲分於西京南京近輔或沿流便郡居止各隨州郡大小創置居宇仍先自兩京為始毎䖏置敦宗院命文武官各一員管幹參酌在京宫院法禁不可行者頒下從之大觀二年正月詔自我英宗􅁸於濮邸入繼大統濮王之後於屬雖親於服已逺如不字之子論正服則猶是緦麻視正統則已非袒免無賜名授官之制無禄廩賜予之法比聞貧乏匱困或不能自存朕富有天下而五服内親僅同民庶非强本之道欲盡親親之禮而承統之重義所不敢夙夜以思當使恩義兩得然後為稱應濮王孫士字可依仲字不字及不字之子並依士字恩數條例宗女隨其字行等第施行庶不失承統之義而曲盡人倫之親八月詔保州皇族子孫於屬雖逺然未有仁而遺其親者比聞皇族之孫未官者餘三十人或貧乏不能自存已令置敦宗院其六房内各擇最長年二十已上者與三班奉職二人一房及六人已上加一人並與添差監當宣和五年詔今後内外宗室並不稱姓七年後詔依熈寧法並著姓先是宗正少卿趙子崧賜對帝問宗子何以著姓子崧以熈寧之法為對遂詔宗室並不著姓其後有司不復考故事官職無髙下皆名别之至是子崧復為帝言故寢前詔宋朝宗室侍從自宣和至嘉泰凡十九人太祖下令鑠寶文閣待制令詪戸部侍郎子崧端明殿學士子晝子直子櫟並寶文閣學士子潚子厚戸吏部侍郎伯圭端明殿學士師訓工部侍郎師敷文閣待制師睪戸部侍郎太宗下不弃不流善堅並工部侍郎不迹華文閣待制魏王下彦中中書舍人彦操煥章閣待制彦逾工部侍郎宗室為状元者乾道初汝愚中詞科者淳熈初彦中中童子舉者慶元中崇襚三年六月已邜崇襚以能誦六經免文觧宗正寺仙源類譜太祖下德字行四人惟字行八人從字守字行二十四人世字行一百二十九人令字行五百六十四人子字行一千二百二十一人伯字行一千六百四十五人孝宗同此行師字行一千四百九十人希字行一千一百四十人與字行一百十人凡六千三百六十五人孟字行由字行未見數太宗下元字行九人允字行十九人宗字行七十五人英宗同此行仲字行三百八十八人士字行一千四百九十九人不字行二千一百三十人善字行二千四百三十一人汝字行一千二十二人崇字行四百一十三人必字行一十九人凡八千五人良字行友字行未見數魏悼王下德字行十人承字行三十二人克字行一百二十七人叔字行五百六十一人之字行一千四百二十五人公字行一千七百七十四人彦字行一千八百二十四人夫字行一千六百六十六人時字行二百五十三人若字行二十四人嗣字行未見數其見數者凡七千二百九十六人以淳熈八年計之三祖下合二萬一千六百六十有六人英宗子吴王益下孝字行十三人安字多字居字行皆為南班官未見數淳煕初詔多字行之子連自字紹熈初詔自字行之子連甫字徽宗子棣華宅諸王下連卿字卿字下連茂字茂字下連中字中字下連孫字然棣華子孫自靖康以来皆隔異域但遥為排連而已保州宗室者翼祖皇帝後也建炎初隔絶紹興九年渡江者數十人有官四人而已上念之詔注官如兩京例今廣字繼字夫字行者是也故事宗女適人皆内侍與有司主之熈寧後以昭穆益疎乃給奩具祖宗元孫女五百千五世三百五十千六世三百千七世二百五十千八世百五十千紹興七年冬詔元孫減五之二六世八世減三之一五世七世減七之二已適而再行者各減半然有司不時給宗女貧不能行多自稱不願出適者三十二年惠靖襄王子子遊知南外宗正事請於朝下泉州以經總制司錢支給云建炎末上以天屬避地者少詔南班宗婦無子孫食禄者廩給有差凡祖宗緦麻親嵗給錢九十六千米三十六斛帛二十八疋袒免親錢米減三之一綿帛並減半四年六月己夘故事宗室近臣吉凶皆有賜予紹興初以軍興財匱罷之六年正月己巳十一年秋皇叔祖右監門衛大將軍仲䍃卒於臨安至無以斂判大宗正事齊安郡王士㒟言於朝詔緦麻親任環列以上亡者賜錢三百千袒免減三之一九月甲辰今以為例焉本朝宗室皆聚於京師熈寕間始許居於外蔡京為政即河南應天置西南二敦宗院設宗官主之靖康之禍在京宗室無得免者而睢雒二都得全建炎初上將南幸先徙諸宗室於江淮於是大宗正司移江寧南外移鎮江西外移揚州元年八月戊午明年春又移西外於泰州及髙郵軍正月甲午三年冬又移於福州而南外移泉州以避狄十二月甲子紹興元年秋嗣濮王仲湜請合西南外宗正為一司以省財用有司以泉州乏財不許九月壬子是時兩外宗子女婦合五百餘人嵗費緡錢九萬南外三百四十九人嵗費錢六萬緡西外一百七十六人嵗費錢約三萬緡紹興府宗正司者紹興三年以行在未有居第權分宗子居之三十年春㤙平郡王出居㑹稽遂以為判大宗正事三月丙子乾道七年虞丞相秉政言蜀中闕大宗正司上欲移紹興府宗正司於成都五月戊寅既而不行但省會稽一司而已今蜀中宗子甚衆既無親賢領之但毎州以行尊者一貟檢察錢米請受由是徃徃蹈於非彛而不可訓焉東都故事宗子皆築大舎聚居之太祖太宗九王後曰睦親秦王後曰廣親英宗二王曰親賢神宗五王曰棣華徽宗諸王曰蕃衍渡江後宗子始散居郡邑惟親賢子孫為近屬則聚居之孝宗子四人邵悼肅王無後荘文太子魏恵憲王早薨荘文之妃恵憲之夫人皆别居賜第初荘文既大祥議者欲皇孫出居於外或以為不可又踰年竟以知樞宻院府為外第焉紹熈初寧宗封嘉王將以所藉富民裴氏之居為府第而議者以為非宜乃改築盖自紹興以来天屬鮮少故不復賜宅名云容齋洪氏隨筆曰吏部員多闕少今為益甚而選人當注職官簿尉輙為宗室所奪盖以盡壓已到部人之故案宣和七年八月臣僚論祖宗時宗室無參選法至崇寧初大啟僥倖遂使任意出官又優為之法參選一日即在闔選名次之上以天支之貴其間不為無人而膏粱之習貪滛縱恣出為民害者不少議者頗欲懲革罷百十人之私㤙為億萬人之公利誠為至當若以親愛未忍姑乞與在部人通理名次從之靖康元年八月又奏云祖宗時未有宗室參部之法神宗時始選擇差注一二崇寧初立法太優宗室參選之日在本部名次之上既壓年月深逺勞效顯著之人復占名州大縣優便豐厚之處議者頗欲懲革不注郡守縣令在部人通理名次有旨從之此二叚未嘗衝改不知何時復紊也又曰本朝宗室袒免親女出嫁如壻係白身人得文解者為將仕郎否則承節承信郎妻雖死夫為官如故案唐正元中故懐澤縣主壻檢校賛善大夫竇克紹状言臣頃以國親超受寵祿及縣主薨逝臣官遂停陪位出身未授檢校官自有本官伏乞宣付所司許取前銜婺州司戸參軍隨例調集詔許付集仍委所司比類前任正員官依資注擬自今以後郡縣主壻除丁憂外有曾任正貟官停檢校官俸料後者凖此處分乃知壻官不停者恩過唐世多矣紹興中髙士轟尚偽福國長公主至觀察使及公主事發誅死猶得故官可謂優渥又曰夀皇聖帝登極赦㤙凡宗子不以服屬逺近人數多少其曾獲文解兩次者並直赴殿試略通文墨者所在州量試則補承信郎由是入仕過者千人已上淳熈十六年二月紹熈五年七月二赦皆然故皇族得官不可以數計偶閱唐昭宗實録載一事云宗正少卿李克助奏准去年十一月赦書皇三等以上親無官者毎父下放一人出身皇五等以上親未有出身陪位者與出身寺司啓請承前舊例九廟子孫陪位者毎父下放一人出身共放三百八十人其諸房宗室等各赴陪位納到文状共一千二十七人除元不赴陪位及不納到状及違寺司條流不取宗室克係落下外係三百八十人合放出身𠡠准赦書處分予案昭宗以文徳元年即位次年十一月南郊禮畢肆赦其文略云皇三等以上親委中書門下各擇有才行者量與改官無官者毎父下放一人出身皇五等以上親未有出身陪位者與出身然則亦有三等親陪位與不陪位之差别也文獻通考卷二百五十九
