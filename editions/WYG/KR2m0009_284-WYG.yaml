body:
  text: 文獻通考卷二百八十四鄱陽馬端臨貴與著象緯考七日變日煇日暈春秋魯哀公六年有雲如衆赤鳥夾日以飛三日楚子使問諸周太史周太史曰其當王身乎日為人君妖氣守之故以為當王身雲在楚上惟楚見之故禍不及他國若禜之禜禳祭也可移於令尹司馬王曰除腹心之疾而置之股肱何益不榖不有大過天其夭諸有罪受罰又焉移之遂弗禜漢武帝建元二年四月戊申有如日夜出元帝永光元年四月日色青白亡景韋昭曰下無景也無景惟質見耳正中時有景無光韋昭曰無光耀也是夏寒至九月乃有光京房易𫝊曰美不上人兹謂上弱厥異日白七日不溫順無所制兹謂弱孟康曰君順從於臣下無所能制日白六十日物無霜而死天子親伐兹謂不知日白體動而寒弱而有任兹謂不亡日白不溫明不動辟諐公行兹謂不伸孟康曰辟君也有過而公行也厥異日黑大風起天無雲日光晻師古曰晻與暗同也不難上政兹謂見過日黑居仄大如彈丸成帝河平元年正月壬寅朔日月俱在營室時日出赤二月癸未日朝赤且入又赤夜月赤甲申日出赤如血亡光漏上四刻半乃頗有光燭地赤黄食後乃復京房易𫝊曰辟不聞道兹謂亡厥異日赤三月乙未日出黄有黑氣大如錢居日中央京房易𫝊曰祭天不順兹謂逆厥異日赤其中黑聞善不予兹謂失知厥異日黄夫大人者與天地合其徳日月合其明故聖王在上總命羣賢以亮天功則日之光明五色備具燭燿亡主有則為異應行而變也色不虚改形不虚毁觀日之五變足以監矣李尋對曰夫日者衆陽之長煇光所燭萬里同晷人君之表也師古曰晷景也故日將旦清風發羣隂伏君以臨朝不牽於色日初出炎以陽君登朝佞不行忠直進不蔽障日中煇光君徳盛明大臣奉公日將入専以壹君就房有常節君不脩道則日失其度晻昧亡光師古曰晻與暗同又音烏感反各有云為其於東方作日初出時師古曰作起也日出之時人物皆起隂雲邪氣起者法為牽於女謁服䖍曰謂請也有所畏難日出後為近臣亂政日中為大臣欺誣日且入為妻妾役使所營師古曰謂繞也間者日尤不精光明侵奪失色邪氣珥蜺數作本起於晨相連至昏其日出後至日中間差瘉師古曰瘉讀愈同小臣不知内事竊以日視陛下志操衰於始初多矣其咎恐有以守正直言而得罪者傷嗣害世不可不慎也按尋此對在哀帝時帝召尋待詔黄門詔問以日月失度星辰亂行災異仍重之事尋所對如此然哀帝時日食凡再俱見於史而此所言日無精光邪氣連昏之事則天文五行志所不載云光武建武七年四月丙寅日有暈抱白虹貫暈在畢八度古今注曰時日加邜西向東面有抱須臾成暈中有兩鈎在南北有白虹貫暈在西北南面有背在景加已皆觧也畢為邉兵秋隗囂反侵安定皇徳𫝊史曰白虹貫下破軍晉分也章帝建初元年正月壬申白虹貫日五年七月甲寅夜白虹出七年四月甲寅日加邜西面有抱須臾成暈有白虹貫日殤帝延平元年六月丁未日暈上有半暈暈中外有璚背兩珥十二月丙寅日暈再重中有背璚順帝永建二年正月戊午白虹貫日三年正月丁酉日有白虹貫交暈中六年正月丁邜日暈兩珥白虹貫珥中永和六年正月己邜暈兩珥中赤外青白虹貫暈中春秋元命包曰隂陽之氣聚為雲氣立為虹蜺離為背璚分為抱珥考異郵曰臣謀反偏刺日巫咸占曰臣不知則日月璚如淳曰蝃蝀謂之虹雌謂之蜺向外曰背刺日曰璚在旁如半鐶向日曰抱在畔直對曰珥孟康曰璚如璚也宋均曰黄氣抱日輔臣納忠靈帝時日數出東方正赤如血無光髙二丈餘乃有景且入西方去地二丈亦如之京房占曰國有佞讒朝有殘臣則日不光暗㝠不明孟康曰日月無光曰薄其占曰事天不謹則日月赤是時月出入去地二三丈皆赤如血者數矣春秋感精符曰日無光主勢奪羣臣以讒術色赤如炭以急見伐久兵馬廢禮斗威儀曰日月赤君喜怒無常輕殺不辜戮於無罪不事天地忽於鬼神時則天雨土風常起日食無光地動雷降其時不救兵從外來為賊殘而不𦵏京房占曰日無故日夕無光天下變枯社稷移亡光和四年二月己巳黄氣抱日黄白珥在其表春秋感精符曰日朝珥則有喪孽又云日已出若其入而雲皆赤黄名曰日空不出三年必有移民而去者也中平四年三月丙申黑氣大如瓜在日中春秋感精符曰日黑則水淫溢五年正月日色赤黄中有黑氣如飛鵲數月乃銷六年二月乙未白虹貫日春秋感精符曰虹貫日天下悉極文法大擾百姓殘賊酷法横殺下多相告刑用及族世多深刻獄多怨宿吏皆慘毒又曰國多死孽天子命絶大臣為禍王將見殺星占曰虹蜺主内媱土精填星之變易䜟曰聰明蔽塞政在臣下婚戚干朝君不覺悟虹蜺貫日獻帝初平元年二月壬辰白虹貫日袁山松書曰三年十月丁卯日有重兩倍吳書載韓馥與袁術書曰凶出於代郡晉武帝泰始元年七月甲寅日暈再重白虹貫之太康元年正月己丑朔五色氣貫日自卯至酉占曰君道失明丑為斗牛主吳越是時孫皓淫暴四月降惠帝元康元年十一月甲申日暈再重青赤有光九年正月日中有若飛鷰者數日乃銷王隠以為愍懷廢死之徵永康元年正月癸亥朔日暈三重十月乙未日闇黄霧四塞占曰不及三年下有抜城大戰十二月庚戌日中有黒氣京房易𫝊曰祭天不順兹謂逆厥異日中有黑氣永寧元年九月甲申日中有黑子京房易𫝊占黑者隂也臣不掩君惡令下見百姓惡君則有此變又曰臣有蔽主明者泰安元年十一月日中有黑氣永興元年十一月日中有黑氣分日光熙元年五月壬辰癸巳日光四散赤如血流照地皆赤甲午又如之占曰君道失明懷帝永嘉元年十一月乙亥黄黑氣掩日所照皆黄按河圖占曰日薄也其說曰凡日食皆於晦朔不有於晦朔者為日薄非日月同宿時隂氣盛掩日光也占類日蝕二年正月戊申白虹貫日二月癸卯白虹貫日青黄暈五重占曰白虹貫日近臣為亂不則諸侯有反者暈五重有國者受其祥天下有兵破亡其地明年司馬越暴蔑人主五年劉聰破京都帝䝉塵於冦庭五年三月庚申日散光如血下流所照皆赤日中有若飛鷰者愍帝建興二年正月辛未庚申日隕於地又有三日相承出於西方而東行五年正月庚子三日並照虹蜺彌天日有重暈左右兩珥占曰白虹兵氣也三四五六日俱出並爭天下兵作丁巳亦如其數又曰三日並出不過三旬諸侯爭為帝日重暈天下有立王暈而珥天下有立侯故陳卓曰當有大慶天下其三分乎三月而江東改年為建武劉聰李雄亦跨曹劉疆宇於是兵連累葉元帝大興元年十一月乙卯日夜出髙三丈中有赤青珥四年二月癸亥日鬬三月癸未日中有黑子辛亥帝親錄訊囚徒永昌元年十月辛卯日中有黑子時帝寵幸劉隗擅威福虧傷君道王敦因之舉兵逼京都禍及忠賢明帝太寧元年正月己卯日暈無光癸巳黄霧四塞占曰君道失明隂陽昏臣有隂謀京房曰下専刑之應敦既陵上卒伏其辜十一月丙子白虹貫日史官不見桂陽太守華包以聞成帝咸和九年七月白虹貫日咸康元年七月白虹貫日二年七月白虹貫日自後庾氏専政由后族而貴蓋亦婦人擅國之義故頻年白虹貫日八年正月壬申日中有黑子丙子乃滅夏帝崩穆帝永和八年張重華在凉州日暴赤如火中有三足烏形見分明五日乃止十年十月庚辰日中有黑子大如雞卵十一年三月戊申日中有黑子大如桃二枚時天子幼弱乆不親國政升平三年十月丙午日中有黑子大如雞卵少時而帝崩海西公太和三年九月戊辰夜二虹見東方四年四月戊辰日暈厚宻白虹貫日中十月乙未日中有黑子五年二月辛酉日中有黑子大如李六年三月辛未白虹貫日日暈五重十一月桓溫廢帝即簡文咸安元年也簡文咸安二年十一月丁丑日中有黑子孝武寧康元年十一月己酉日中有黑子大如李二年三月庚寅日中有黑子二枚大如鴨子十一月己巳日中黑子大如雞卵時帝已長而康獻皇后以從嫂臨朝實傷君道故日有瑕也太元十三年二月庚子日中有黑子二大如李十四年六月辛卯日中又有黑子大如李二十年十一月辛卯日中又有黑子是時會稽王以母弟干政安帝隆安元年十二月壬辰日有暈有背璚是後不親萬機會稽王世子元顯専行威罰四年十一月辛亥日中有黑子元興元年二月甲子日暈白虹貫日中三月庚子白虹貫日未幾桓元尅京都王師敗績明年桓元簒位義熙元年五月庚午日有彩珥壬辰癸巳日光四散赤如流血照地皆赤六年五月丙子日暈有璚時盧循逼京都内外戒嚴七月循走七年七月五虹見東方占曰天子黜其後劉裕代晉十年日在東井有白虹十餘丈在南干日災在秦分秦亡之象恭帝元熙二年正月壬辰白氣貫日東西有直珥各一丈白氣貫之交匝宋文帝元嘉四年十月辛卯日晝昏十日乃明孝武大明七年十一月日始出四五丈色赤如血未沒四五丈亦如之至八年春凡三度謂之日死齊髙祖建元元年十二月未時日暈色黄無光至申乃散二年閏月乙酉日黄無光四年十一月丙子日黄色無光武帝永明五年十一月丁亥日出五竿失色赤黄暈抱珥直背東昏侯永元元年十二月乙酉日中有黑子三枚梁武帝太清元年十二月己卯白虹貫日三年正月庚申白虹貫日三重元帝承聖元年十一月丙子有兩日俱見陳文帝天嘉七年二月庚午日無光烏見占曰王者惡之其日庚午吳楚之分野四月甲子日有交暈白虹貫之是月癸酉帝崩宣帝大建十年二月癸亥日上有背占曰其野失地有叛兵甲子吳明徹兵敗於吕梁將卒沒於周明年淮南地盡入於周後魏文成帝興安元年十一月己邜日出赤如血孝文帝太和二年正月辛亥日暈東西兩珥四年正月癸丑日暈東西有背八年正月戊寅有白氣貫日宣武帝景明二年八月戊辰日赤無光中有黑氣三年正月乙巳日有黑氣正始二年四月甲辰卯時暈匝西有一背黄南北有珥内赤外黄漸滅十二月己酉日暈北有一抱内赤外黄白兩傍有珥下三年十月乙巳日赤無光延昌元年十月甲戌至辛卯日初出及將沒赤白無光孝明帝熙平元年三月丁丑日出無光至申時酉時神龜三年十月己巳太史奏自八月以來黄埃掩日日出三丈色如赭無光燿正光五年閏月乙酉日暈内赤外青南北珥下有抱兩背内赤外青十二月丙申日暈南北有珥上有抱一背孝昌三年五月戊戌辰時暈匝内赤外白兩珥孝莊帝永安二年十月己酉日從地下食出虧從西南角起節閔帝普泰元年三月丁卯日月並赤赭色天池溷濁十一月日暈再重孝武帝大昌元年五月日暈再重十月辛酉朔日從地下食出虧從西南角起後周武帝保定五年正月辛卯白虹貫日占曰為兵䘮天和元年二月庚午日鬬光遂散日烏見十月辛卯黑雲貫日建徳二年二月辛亥白虹貫日占曰臣謀君不出三年又曰近臣為亂後年衛王直舉兵反六年十一月甲辰日晡時日中有黑子大如杯占曰君有過而臣不諫人主惡之宣帝大成元年正月丙午癸丑日皆有背占曰臣為逆有反叛邉將去之又曰卿大夫欲為主其後隋公作覇尉遲迥王謙司馬消難等舉兵靜帝大象元年二月癸未日將出入時其中並有烏色大如雞卵經四日乃滅隋文帝開皇九年正月己巳白虹夾日占臣背主又無徳者亡是月滅陳仁夀四年七月乙未日青無光八日乃復占主勢奪又日無光有死王丁未上崩漢王諒反楊素討平之皆兵喪亡國死王之應煬帝大業十三年十一月辛酉日光四散如流血占曰賊入宫主以急兵見伐又曰臣逆君明年三月宇文化及等弑帝諸王及幸臣並被弑唐太宗貞觀初突厥有五日並照二十三年三月日赤無光李淳風曰日變色有軍急又曰其君無徳其臣亂國濮陽復曰日無光主病髙宗咸亨元年二月壬子日赤無光癸丑四方濛濛日有濁氣色赤如赭上元二年三月丁未日赤如赭永淳元年三月日赤如赭文明元年二月辛巳日赤如赭武后長安四年正月壬子日赤如赭中宗景龍三年二月庚申日色紫赤無光元宗開元十四年十二月己未日赤如赭二十九年三月丙午風霾日無光近晝昏也占為上刑急人不樂生天寳三載正月庚戌日暈五重占曰是謂氣光天下有兵肅宗上元二年二月乙酉白虹貫日代宗大歴二年七月丙寅日旁有青赤氣長四丈餘壬申日上有赤氣長三丈九月乙亥至於辛丑日旁有青赤氣三年正月丁巳日有黄冠青赤珥辛丑亦如之凡氣長而立者為直横者為格立於日上為冠直為有自立者格為有戰鬬又曰赤氣在日上君有佞臣黄為土功青赤為憂徳宗貞元二年閏五月壬戌日有黑暈六年正月甲子日赤如血十年三月乙亥黄霧四塞日無光憲宗元和二年十月壬午日傍有黑氣如人形跪手捧盤向日盤中氣如人頭四年閏三月日傍有物如日五年四月辛未白虹貫日十年正月辛卯日外有物如烏十一年己卯日紫赤無光穆宗長慶元年六月己丑白虹貫日三年二月庚戌白虹貫日敬宗寳歴元年六月甲戌赤虹貫日九月甲申日赤無光二年三月甲午日中黑氣如杯辛亥日中有黑子四月甲寅白虹貫日文宗太和二年二月癸亥日無光白霧昏晝十二月癸亥有黑祲與日鬬五年二月辛丑白虹貫日六年三月有黑祲與日如鬭庚戌日中有黑子四月乙丑黑氣磨日七年正月庚戌白虹貫日八年七月甲戌白虹貫日日有交暈十月壬寅白虹貫日東西際天上有背玦九年二月辛卯日月赤如血壬辰亦如之開成元年正月辛丑朔白虹貫日二月己丑亦如之二年十一月辛巳日中有黑子大如雞卵日赤如赭晝昏至於癸未五年正月己丑日暈白虹在東方如玉環貫珥三月丙辰日有重暈有赤氣夾日十二月癸卯朔日傍有黑氣來觸武宗會昌元年十一月庚戌日中有黑子四年正月戊申日無光二月己巳白虹貫日如玉環宣宗大中十三年四月甲午日暗無光懿宗咸通六年正月白虹貫日中有黑氣如雞卵七年十二月癸酉白氣貫日日有重暈甲戌亦如之白氣兵象也十四年二月癸卯白虹貫日僖宗乾符元年日中有黑子二年日中有若飛鷰者六年十一月丙辰朔有兩日並出而鬬三日乃不見鬬者離而復合也廣明元年日暈如虹黄氣蔽日無光日不可以二虹百殃之本也中和三年三月丙午日有青黄暈四月丙辰亦如之丁巳戊午又如之光啟三年十一月己亥下晡日上有黑氣四年二月己丑日赤如血庚寅改元文徳是日風日赤無光昭宗景福元年五月日色散如黄金光化三年冬日有虹蜺背璚彌旬日有赤氣自東北至於東南天復元年十月日色散如黄金十一月又如之二年二月丁丑日有赤氣自東北至於東南天祐元年二月丙寅日中見北斗其占重十一月癸酉日中有黄暈傍有青赤氣二二年正月甲申日有黄白暈暈上有青赤背乙酉亦如之暈中生白虹漸東長百餘丈二月己巳日有黄白暈如半環有蒼黑雲夾日長各六尺餘既而雲變狀如人如馬乃消占曰背者叛背之象日暈有虹者為大戰半暈者相有謀蒼黑祲祥也夾日者賊臣制君之象變而如人者為叛臣如馬者為兵三年正月辛未日有白黄暈上有青赤背二月癸巳日有黄白暈如半環有青赤背後唐明宗天成元年十月己丑至於庚子日月赤而無光二年二月乙酉日中有黑氣狀如雞卵後晉髙祖天福元年十二月己卯朔日有白虹二三年三月壬子日有白虹後周世宗顯徳三年十一月庚午白虹貫日五代史司天考論曰五代亂世文字不完史官所記亦有詳畧其日月五星之變大者如是日有冠珥環暈纓紐負抱戴履背氣十日之中常七八其繁不可勝書而背氣尤多顯徳七年正月癸卯日既出其下復有一日相掩黑光磨蕩乆之時太祖北征知星者苗訓指謂親吏楚昭輔曰天命也是日周恭帝遜位宋太祖皇帝開寳七年正月丙戌日有黑子二真宗景徳元年十二月甲辰日有影如三日狀占在危宿幽州之野時契丹請和三年九月戊申日赤如赭占曰將相憂明年河陽節度同平章事王顯卒四年四月甲申日白無光仁宗寳元元年十二月庚申日赤如朱踰二刻復慶厯八年正月乙未日赤無光神宗熙寧十年二月辛卯日中有黑子如李主臣於君不掩惡令民見則有此變或王者惡之至乙巳散元豐元年閏正月庚子日中有黑子如李至二月戊午凡十有九日散十二月丙午日中有黑子亦如李至丁巳凡十有二日散二年二月甲寅日中有黑子如李至癸亥散徽宗崇寧二年五月癸卯日淡赤無光至申乃復三年十月壬辰日中有黑子如棗大政和二年四月辛卯日中有黑子乍二乍三如栗大八年十一月辛亥日中有黑子如李大宣和二年正月己未日䝉蒙無光五月己酉日中有黑子如棗大三年十二月辛卯日中有黑子如李主臣蔽主明四年二月癸巳日䝉蒙無光髙宗建炎三年三月己卯朔日中有黑子壬寅乃消伏占臣不掩君惡又臣有蔽主明者紹興元年二月己卯日中有黑子如李大三日而伏主臣蔽主明六年十月壬戌日中有黑子如李大占臣蔽主明七年二月庚子日中有黑子如李大旬日乃消四月戊申日有黑子如前八年二月辛酉日中有黑子大如棗占君有過而臣不諫十月乙亥日有黑子孝宗淳熙十三年五月庚辰日生黑子如棗大至甲申日乃復光宗紹熙四年十一月辛未日生黑子占祭天不順兹為逆厥異日中有黑子黑子者隂也臣不掩君惡又曰臣有蔽主明者寧宗慶元六年八月乙