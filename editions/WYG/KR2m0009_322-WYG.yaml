蓮勺城華隂唐縣有太華山潼谷水巨靈祠潼闗渭津闗渭南前秦縣有漕渠蒲城唐奉先縣宋改有金粟山同州春秋時屬秦戰國時秦魏二國之境漢史曰自髙陵以東皆魏分始皇平天下為内史地項羽分為塞國漢髙帝初置河上郡後復為内史景帝時為左内史武帝改為左馮翊後漢因之魏但為馮翊郡晉後魏因之兼置華州西魏改華州為同州以漆沮既從灃水攸同言二水至斯皆統入渭以城居其地故曰同州而馮翊郡如故隋初廢郡煬帝初州廢復置馮翊郡唐為同州或為馮翊郡正國軍莭度屬闗内道領縣七馮翊澄朝邑韓白水郃河西城城陽梁改忠武軍以京兆府之同官奉先来屬以郃陽澄城韓城屬河中府後唐復為正國軍以奉先還𨽻京兆府及廢裕州以羙原来屬及以同官美原屬耀州郃陽澄城韓城還𨽻宋為定國軍莭度以奉先還屬天禧四年以蒲城𨽻華州屬永興軍路建炎元年沒於金金𨽻陕西京兆路貢白蒺藜生熟地黄領縣七治馮翊馮翊古芮國有大荔戎城有沙苑北齊神武為周文所敗處有洛水商原龍首渠隋縣郃陽古有莘國在郃水之陽詩大明所謂在郃之陽是也有刳浴水覊馬城太任廟澄城後魏縣有王官城白水有彭衙秦晋戰處後魏縣有白水夏陽唐縣有瀵水韓城古韓國謂之少梁秦晋戰韓原即此地有龍門山禹導河處有大梁山小梁山隋縣朝邑西魏縣有長春宫鳳翔府春秋以来為秦都秦徳公元年初居雍至獻公始徙櫟陽始皇平天下為内史地漢髙初屬雍國後分為中地郡復為内史武帝分雍為右内史後置主爵中尉後更名都尉又改為右扶風魏但為扶風郡亦為重鎮曹公使張郃屯陳倉建興中諸葛亮攻陳倉及郿皆不克晋因之後魏置平秦郡兼置岐州後魏亦有扶風郡好畤始平羙陽槐里盩厔五縣非今郡地西魏改平秦為岐陽郡隋初郡廢置岐州煬帝初州廢置扶風郡唐為岐州或為扶風郡後改為鳳翔府莭度屬闗内道領縣九雍陳郿倉岐山普潤扶風岐陽麟游虢後唐以清水屬秦州宋乾徳元年置崇信縣淳化中以崇信屬儀州屬秦鳳路熈寧五年廢乾州以好畤縣𨽻府大觀元年以盩厔縣清平鎮置軍及洛南縣𨽻京兆府政和八年以好畤縣𨽻醴州􅊈渭漆岐雍五水皆經郡界而和尚原在大散闗之東距寳雞兩驛為形勢必爭之地此地一失則路徑散漫戎馬深入無所限隔紹興間吳玠守之兵力雖足而糧運不繼蜀人困於轉輸議亦棄之而守僊人闗十二年和議成卒割和尚原以遺敵鳳翔遂沒貢蠟燭榛實席領縣十治天興天興本秦雍邑唐縣有天柱山雍水漢五帝畤扶風唐縣有渭水湋水白水郿隋縣有太白山積石原五丈原郿塢岐山隋縣有岐山姜泉洛南山渭水寳雞唐縣有陳倉山􅊈水大散闗麟游隋縣有五将山黝土山八馬坊普潤隋縣有漆水杜陽川虢周虢叔所封之地有楚山渭水磻溪盩厔唐縣有洛南山渭水洛谷闗好畤有梁山武亭河政和間撥𨽻醴州隴州春秋秦國之地始皇屬内史漢屬右扶風後漢魏晋屬扶風郡西魏置隴東郡兼置東秦州後改為隴州因山為名隋初郡廢而隴州如故煬帝初州廢以其地入扶風郡唐復置隴州或為􅊈陽郡屬闗内道領縣三􅊈源􅊈陽吳山宋開寳二年析􅊈陽縣四鄉置隴安縣為􅊈陽郡防禦屬秦鳳路紹興後沒扵金貢席領縣四治􅊈源􅊈源隋縣有隴山􅊈水弦蒲藪大震闗秦城都夷城􅊈陽後周縣有􅊈水隃麋澤吳山唐縣有􅊈山長蛇水隴安宋縣有秦嶺山渭水儀州唐末李茂貞於隴州廢華亭縣以縣為州治宋乾徳二年析置安化縣太平興國初改儀州淳化中又以鳳翔崇信縣来屬屬秦鳳路熈寧五年廢州以縣𨽻渭州領縣三治華亭華亭周縣崇信安化並宋縣邠州古豳國昔公劉居豳即其地也豳故栒邑是秦始皇屬内史漢為右扶風安定北地三郡地後漢末置新平郡兼舊安定為二郡地魏晋亦同西魏置豳州後周及隋皆因之煬帝初州廢以其地為安定北地二郡唐復置豳州開元十三年改為邠其後或為新平郡靜難軍莭度屬闗内道領縣四新平永夀三水宜禄周廢衍州為定平縣来屬宋乾徳二年以永夀屬乾州熈寧五年廢乾州永夀縣及二寨来𨽻以定平縣𨽻寧州政和七年復以故乾州為醴州割寧州定平縣來𨽻八年復以永夀𨽻醴州宣和初以耀州淳化来𨽻屬永興軍路紹興後沒於金金𨽻陕西慶原路撥耀之淳化来𨽻貢火筯蓽豆剪刀領縣五治新平新平隋縣有涇水漆水三水後魏縣有石門山羅川水宜禄唐縣有鶉觚源長武城定平周縣有溪水淳化有仲山車箱阪涇州春秋秦地始皇時屬北地郡武帝分置安定郡後漢徙其人以避𦍑冦郡寄在羙陽今京兆武功縣界羙陽故城是也順帝移於此魏晋亦為安定郡後魏太武帝置涇州盖以涇水為名隋為安定郡唐為涇州或為安定郡彰義軍莭度屬闗内道領縣五安定臨隂盤良靈臺涇原後唐以平梁置渭州臨涇置原州周以潘原屬渭州又廢靈臺軍以縣来屬宋太平興國元年改彰化軍咸平四年陞長武鎮為縣屬秦鳳路建炎四年沒於金貢紫茸毛褐叚領縣四治保定保定唐縣有回山涇水汭水靈臺古宻須之地唐縣後李茂貞置靈臺軍有蒲川水隂宻城良原隋縣唐置良原軍周軍廢縣􅂧有白石原朝那城長武宋縣寧州夏之季公劉之邑春秋時戎地即義渠戎國戰國時屬秦始皇初為北地郡漢為北地上郡二郡地後漢屬北地安定二郡地魏晋未詳按晋史云自愍帝時其地沒於劉聪郡縣之名不得知也他皆類此後魏獻文帝置華州孝文改為班州後改為邠州又改為豳州西魏改為寧州立嘉名也後周分置趙興郡隋煬帝初改寧州為豳州尋廢豳州改趙興郡為北地郡唐復置寧州或為彭原郡屬闗内道領縣五定安襄樂彭原彭貞寜陽宋至道三年以彭陽屬原州為興寧軍莭度屬永興軍路紹興