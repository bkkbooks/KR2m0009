水四注下俗歌曰隴頭流水鳴聲幽咽遥見秦川肝腸斷絶坻都禮反兼置涼州領郡十治於此魏亦為重鎮明帝時蜀将諸葛亮至南安漢陽皆應亮晋分為天水及武陽二郡兼置秦州領郡六治於此後魏為河陽郡隋初郡廢煬帝初復置天水郡唐為秦州或為天水郡屬隴右道後為雄武軍莭度領縣四成紀隴城天水長道後唐以鳳翔府清水来屬宋建隆三年合良恭大潭兩鎮置大潭縣屬秦鳳路慶歴置經略安撫使統秦州隴州成州階州鳳州通逺軍其後割通逺屬熈河建炎二年正月金人陥城四月曲端収復四年十月張浚自富平退保於此紹興後吳玠吳璘屢復終為敵有嘉定七年四川制臣遣将何九齡襲城不克貢席芎藭領縣六治成紀成紀庖犧氏所生之地後周縣有朱圉山邽山渭水瓦亭川三十九泉隴城唐縣有瓦亭山街亭泉蜀将馬謖敗處清水秦仲所封之地晋縣有小隴山嶓冢山眉水天水後唐縣長道唐縣有初山石堡城熈寧七年撥𨽻岷州大潭宋縣有十八盤山熈寧七年𨽻岷州渭州禹貢導渭自鳥䑕同穴即其地也鳥䑕同穴山在今渭源縣渭水所出也今謂之青雀山春秋為𦍑戎之居秦置隴西郡以居隴坻之西為名二漢因之靈帝分立南安郡魏置鎮守在此鄧艾曰蜀師来而為一我分為四謂狄道隴西南安祁山四處齊王嘉平五年蜀将姜維圍南安襄武皆不克晋為南安隴西二郡地後魏為隴西郡兼置渭州後周為南安郡隋初郡廢煬帝初復置隴西郡唐為渭州或為隴西郡屬闗内道縣四襄武源隴西渭障廣徳元年沒吐蕃元和四年以原州平涼縣置行渭州廣明初復為吐蕃所破中和四年涇原莭度張鈞表置後周廢武州以潘原来屬宋因之熈寧五年廢儀州以安化崇信華亭三縣来𨽻政和七年陞為平涼莭度置涇原路經略安撫涇州原州渭州儀州徳順軍鎮戎軍西安州㑹州皆屬焉建炎後沒於金金為平涼府貢絹蓯蓉領縣五治平涼平涼隋縣有笄頭山涇水白宕河潘原唐縣有鳥䑕山銅城山涇水閣川水安化宋縣有隴山白宕河後移治闗地崇信宋縣有閣川水華亭周縣有小隴山徳順軍本渭州籠竿城漢蕃互市之地井邑富庶在六盤山外距賊界甚夷去内郡則有山川之阻宋慶歴三年建為軍屬秦鳳路紹興元年沒於金隆興元年吳璘收復旋再失貢甘草縣一隴干元祐八年置有水落城五寨鞏州古雍州地春秋時屬𦍑戎秦屬隴西郡二漢因之靈帝分立南安郡晋屬隴西南安二郡元魏為隴西南安安陽三郡兼置渭州後周并為南安郡隋復置隴西郡唐武徳元年置渭州天寳元年曰隴西郡寳應元年沒吐蕃後廢宋皇祐四年以渭州地置古渭寨熙寧五年改通逺軍崇寧三年改為鞏州紹興後沒於金三十二年興元帥姚仲圍之不克嘉定十三年四川制司㑹夏人傳檄招諭至城下而退貢麝香領縣三治隴西隴西隋郡治宋為通逺軍後陞州以為縣永寧寧逺本二寨後陞為二縣蘭州古西𦍑地秦屬隴西郡漢屬金城隴西二郡地後漢魏晋因之魏以為重鎮蜀姜維攻狄道不克前涼張寔置廣武郡張駿又分置武始郡西秦乞伏國仁都苑川南涼秃髪烏孤都廣武皆是地也苑川在今五泉縣廣武即今廣武縣後魏後周並屬武始郡隋初郡廢置蘭州盖取蘭臯山為名煬帝初州廢置金城郡唐因之屬隴右道領縣三五泉廣狄道武廣徳元年陥吐蕃宋元豐四年收復屬秦鳳路建炎後沒於金紹興三十一年收復旋失貢甘草領縣一蘭泉漢允吾縣地金城郡治所熙州春秋戰國皆為西𦍑地秦置隴西郡二漢晋因之恵帝分置狄道郡前涼張駿置武始郡元魏置臨洮郡隋開皇初廢武始屬蘭州唐因之天寳三載分置臨川後陥吐蕃號武勝軍宋熈寧五年收復改為鎮洮軍尋以軍為州而鎮洮為莭度置熙河路經略安撫使領熙河洮岷蘭廓湼㑹鞏九州西寧鎮武積石三軍建炎四年沒於金金為臨洮府置當川縣三十二年五月收復旋失貢毛段麝香領縣一狄道有白石山洮水浩亹河㑹州古西𦍑地秦屬隴西郡漢屬金城安定二郡地後漢屬金城武威二郡西魏置㑹州後周廢隋屬平涼郡唐平李軌後置㑹州或為㑹寧郡屬闗内道領縣二㑹寧烏蘭廣徳後沒於吐蕃宋元豐五年二月熙河路加蘭㑹二字時未得㑹州元符二年五月始進築脩復八月割安西城以北六寨𨽻㑹州崇寧三年置倚郭縣曰敷文𨽻涇原路建炎後沒於金紹興三十一年收復旋失領縣一敷文河州古西𦍑地秦屬隴西郡漢屬金城隴西二郡後漢屬隴西郡漢末宋建據焉稱河首平漢王曹公遣夏侯淵討平之晋恵帝時屬晋興郡前秦苻堅置河州煬帝初州廢復置枹罕郡唐為河州或為安鄉郡屬隴右道領縣三枹罕大鳳林夏後沒吐蕃宋熙寧六年収復置枹罕縣九年省崇寧四年陞寧河塞為縣屬秦鳳路紹興初沒於金屬陕西熙河路三十二年收復旋失貢麝香領縣一寧河積石軍本漢之金城郡河闗縣地唐置軍𨽻隴右莭度府後沒吐蕃宋復置溪哥城元符間為吐蕃溪巴温所據大觀二年臧征撲哥以城降即其地建積石軍領堡寨二杜氏通典按水經云崑崙墟在西北去嵩髙五萬里地之中也其髙萬一千里河水出其東北陬屈從其東南流入於渤海又出海外南至積石山下有石門又南入葱嶺山又從葱嶺出而東北流其一源出于闐國南山北流與葱嶺所出河合又東注蒲昌海又東入塞過燉煌酒泉張掖郡南又東過隴西河闗縣北云云按水經晋郭璞注三􅃃後魏酈道元註四十􅃃不詳所撰名氏亦不知何代之書佑謂二子博贍解釋固應精當訪求久之方得又其經云濟水過夀張則前漢夀良縣光武更名又東北過臨濟則前漢狄縣安帝更名又云河水過湖陸則前漢湖陵縣章帝更名又云汾水過河東郡永安則前漢彘縣順帝更名故知順帝以後纂序也詳水經所作殊為詭誕全無憑據按後漢郡國志濟水王莽末因旱渠塞不復截河南過既順帝時所撰都不詳悉其餘可知景純註解又甚疎畧亦多迂怪水經所云河出崑崙山者宜出於禹本記山海經所云南入葱嶺及出于闐南山者出於漢書西域傳而酈道元都不詳正所注河之𤼵源亦引禹記山經釋法明國諱改焉遊天竺記釋氏西域記所註南入葱嶺一源出于闐山合流入蒲昌海雖約漢書亦不尋䆒又水經云出海外南至積石山下有石門然後南流入葱嶺據此則積石山當在葱嶺之北又云入塞過燉煌酒泉張掖郡南並今郡地也夫山水地形固有定體自葱嶺于闐之燉煌酒泉張掖之間華人来徃非少從後漢至大唐圖籍相承註記不絶大磧距數千里未有桑田碧海之變陵遷谷移之談此處豈有河流纂集者不詳斯甚又按禹導河積石者堯時洪水下民昏墊禹所開決本救人患積石之西沙鹵之地河流小地勢復髙不為人患不費疏鑿以此施功𤼵跡自積石山而東則今西平郡龍支縣界山是也固無禹理水之功自葱嶺之北其本記灼然荒唐撰經者取為凖的班固云言九州者尚書近之矣誠為惬當其漢書西域傳云河水一源出葱嶺一源出于闐合流東注蒲昌海皆以潜流地下南出積石為中國河云比禹記山經猶校附近終是紕繆按此宜唯憑張騫使大夏見兩道水從葱嶺于闐合流入蒲昌海其于闐出美玉所以騫傳遂云窮河源也按古圖書名河所出曰崑崙山疑所謂古圖書即禹本記以于闐山出玉乃謂之崑崙即所出便云是河也窮䆒諸說悉皆謬誤孟堅又以禹貢云導河自積石遂疑潜流從此方出且漢時羣𦍑種衆雖多不相統一未為强國漢家或未嘗遣使詣西南𦍑中或未知自有河也寧有吐蕃中河從西南數千里向東北流見與積石山下河相連聘使渉歴無不言之吐蕃自云崑崙山在國中西南則河之所出也又按尚書云織皮崑崙析支渠搜西戎即叙又范曄後漢書云𦍑在漢金城郡之西南濵於賜支續漢書曰河闗西可千餘里有典𦍑謂之賜支盖析支也然則析支在積石之西是河之上流明矣崑崙在吐蕃中當亦非謬而不謂河之本源乃引葱嶺于闐之河謂從蒲昌海伏流數千里至積石方出斯又班生之所未詳也佑以水經僻書代人多不知覩或有好事者於諸書中見有引處謂其審正此殊未之精也歐陽氏輿地廣記河水出崑崙自古言者皆失其實禹本記山海經固已迂怪誕妄而班固所載張騫窮河源事亦為臆說騫使大夏見葱嶺于闐二河合流注蒲昌海其水亭居皆以為潜行地中南出積石為中國河此乃意度之非實見蒲昌海與積石河通流也漢武帝以于闐山出玉按古圖書因名河所出曰崑崙至唐之時吐蕃為大國居積石西唐聘之徃来非一始見黄河在吐蕃中西南數千里向東北流與積石河相連而吐蕃又言崑崙在其國内長慶中劉元鼎為盟㑹使言河之上流由洪濟渠西南行二千里水益狭冬春可涉夏秋乃勝舟其南三百里三山中髙而四下曰紫山直大羊同國古所謂崑崙也虜曰悶摩黎山東距長安五千里河源其間流澄浚下稍合衆流色赤行益逺他水并注則濁河源東北直莫賀延磧尾隐測其地盖劔南之西元鼎所經大略如此按古今言禹導河始於積石而河源出自崑崙其說皆荒誕惟通典及輿地廣記所言辨析詳明故附二叚於積石軍之後洮州秦漢以来為諸戎之地後為吐谷渾所據至後周武帝逐吐谷渾而得其地置洮陽郡尋立為洮州隋初郡廢而洮州如故煬帝初廢置臨洮郡郡城本名洮陽城臨洮水甚險唐為洮州或為臨洮郡屬隴右道領縣一臨潭有洮水源出西傾山在郡西南吐谷渾界桓水所出唐末陷於吐蕃號臨洮城宋熈寧五年十月詔以熈河洮岷通逺軍為一路時未得洮州元符二年七月嘗得之尋棄不守大觀二年収復五月改臨洮城仍舊為洮州三年陞團練建炎後沒於金紹興三十一年收復旋失岷州春秋及七國時並屬秦䝉恬築長城之所起也屬隴西郡長城在今郡西二十里崆峒山自山旁洮而東即秦之臨洮境秦二漢及晋並屬隴西郡西魏置岷州及同和郡隋初郡廢煬帝初州廢併其地入臨洮郡唐復置岷州或為和政郡屬隴右道領縣三溢樂和祐川政後陥吐蕃宋熈寧六年收復祐川縣置岷州七年以秦州大潭長道二縣来𨽻屬秦鳳路紹興間叛将慕容有等相繼降敵岷洮俱失宣撫吳玠收復以李永琪守岷移治白石金人通和乃改為西和州屬利州路開禧二年金人陥城明年李好義収復貢甘草領縣三治祐川祐川唐縣紹興間吳玠吳璘即鎮之南岡因髙増築一月畢事惟官舍倉庫其居民市井悉在山之北大潭長道俱見秦州廓州古西𦍑地後漢延熹中諸𦍑與澆河大豪冦張掖段熲斬澆河大帥於其地遂定西𦍑是也漢末屬西平郡前涼以其地為湟河郡後魏屬鄯州後周武帝屬吐谷渾又得地置洮河郡兼置廓州以領之隋初郡廢煬帝初州廢置澆河郡唐末為廓州或為寧塞郡屬隴右道領縣三治廣威廣威唐縣有㧞延山煬帝征吐谷渾經此山達化有賀蘭山澆河城即晋時吐谷渾王所築後周武帝逐吐谷渾取其地米川唐置廣徳元年沒吐蕃宋元豐收復唐末陥吐蕃宋元符二年以廓州為寧塞城崇寧三年棄之後收復仍為廓州城下置一縣五年七月罷之大觀三年陞防禦屬秦鳳路鄯州古西𦍑所居謂之湟中地漢時霍去病破匈奴逐諸𦍑及渡河湟築令居塞即其地屬金城郡後漢建安中置西平郡晋因之永嘉後秃髪烏孤初稱西平王其弟利鹿孤復都西平即此地也後魏置鄯州後周置樂都郡隋初郡廢置鄯州煬帝初州廢置西平郡唐因之屬隴右道領縣三治湟水湟水隋縣湟中月支胡所居有湟水漢破羌縣故城在焉有浩亹河在縣西北自吐蕃界流来龍支後魏縣積石山在縣南禹貢導河之所鄯城漢西平郡故城有土樓山後沒於吐蕃宋元符二年收復舊邈川城建為湟州二年隴拶降建為鄯州隴右莭度建中靖國元年棄之崇寧二年再復湟鄯二州三年置倚郭縣又改鄯州為西寧州陞中都督府加賔徳軍莭度五年罷之大觀三年加湟州為嚮徳軍莭度宣和元年改湟州為樂州建炎後俱沒於金震武軍宋政和六年進築湟州古骨龍城賜名震武城後以為震武軍屬秦鳳路領堡四凉州周時為狄地秦興匈奴既失甘泉甘泉在今雲陽縣又使休屠渾邪王居其地此河西五郡皆是不止於武威也漢武開之置武威郡漢武初開置張掖酒泉燉煌武威金城謂之河西五郡地勢西北邪出南隔西𦍑通西域於時號為斷匈奴右臂後漢魏晋皆因之魏晋並置涼州領郡八治於此前凉張軌後凉呂光並據之北涼沮渠䝉遜亦遷都於此後魏亦為武威郡隋煬帝初復置唐初李軌據之及尅平置涼州或為武威郡屬隴右道自祿山之亂河右沒於吐蕃大中後吐蕃㣲弱首領張義潮以𤓰沙十一州来歸而宣懿徳㣲不明疆理各存有司而已貢白綾龍鬚席毯野馬革芎藭領縣五治姑臧姑臧漢縣河西舊事曰昔匈奴故盖臧城也後人音訛名姑臧又有猪野澤占休屠城神烏番禾漢縣昌松一名麗水城沮渠蒙遜所築地勢險阻嘉麟宋無此州甘州禹貢曰導弱水至於合黎餘波入於流沙即此地也合黎水弱水並在張掖縣界其北又有居延澤即古流沙也又黑水之所出焉黒水出張掖縣雞山春秋及秦並為狄地漢初為匈奴所居武帝開之置張掖郡後漢魏晋並同沮渠蒙遜始都於此號北凉西魏置西凉州尋改為甘州因州東甘峻山為名後周置張掖郡隋初郡廢煬帝初復置唐為甘州或為張掖郡屬隴右道天寳後沒吐蕃大中五年収復詳見凉州貢麝香野馬革冬柰枸杞實領縣二治張掖張掖本匈奴中地亦曰居延塞祁連山居延海弱水合黎水遮虜障漢将路博徳所築有甘峻山臨松山刪丹後漢縣有焉支山匈奴初失祁連焉支二山乃歌曰奪我祁連山使我六畜不蕃息失我焉支山使我婦女無顔色宋無此州肅州舊月支地後匈奴居焉漢武開之置酒泉郡城下有泉其味如酒後漢晋皆因之西凉武昭王李暠遷都於此後魏亦為酒泉郡隋初郡廢置肅州煬帝初州廢以其地入張掖郡唐復置肅州或為酒泉郡屬隴右道廣徳後沒吐蕃大中五年收復詳見凉州貢麩金野馬革蓯蓉柏脉根領縣三治酒泉酒泉在長城漢遮虜障隋縣有九龍山崑崙山在縣西南體如崑崙故名周穆王見王母於此山福祿崆峒山舊樂涫縣唐更今名玉門漢舊縣宋無此州景祐間趙元昊攻唃厮囉陷𤓰沙肅三州遂盡得河西之地𤓰州古西戎地戰國時為月支所居秦末漢初屬匈奴武帝以後為燉煌郡地後漢魏晋皆因之後魏屬常樂㑹稽二郡後周屬會稽郡苻堅徙江淮之人萬餘户於燉煌中州人有田疇不闢者亦徙数千餘户凉武昭王遂以南人置㑹稽郡以中州人置廣夏郡後周因舊名置晋昌郡隋廢以屬燉煌郡唐置𤓰州古𤓰州説見燉煌郡或為晋昌郡屬隴右道廣徳後沒吐蕃詳見前貢野馬革𦂳鞓草鼓礬胡桐律領縣二治晉昌晉昌唐縣有伊吾故城白水崑崙障後魏明帝置㑹稽郡於此常樂唐縣宋時為西夏所據沙州昔舜流三苖於三危即其地也其後子孫為羌戎代有其地謂之𤓰州其地多生美𤓰至今猶出大𤓰長者狐入其中首尾不出左傳所說允姓之戎居於𤓰州是也戎子名駒支也亦古流沙地其沙風吹流行在郡西八十里又黑水之所經焉黒水自北而南經三危過梁州入南海秦及漢初為月支匈奴之境武帝開其地後分酒泉置燉煌郡燉大煌盛也後漢魏晉皆因之凉武昭王始都於此後魏後周並為燉煌郡隋初郡廢置𤓰州煬帝初廢州復置燉煌郡唐為沙州或為燉煌郡屬隴右道廣徳後沒吐蕃詳見前貢碁子黄礬石膏領縣二治燉煌燉煌漢縣三危山在東南山有三峯有鳴沙山渥洼水夀昌漢龍勒縣地陽闗在玉門闗之南玉門故闗漢置二闗之西三百餘里有蒲昌海一名鹽澤廣袤三四百里則葱嶺于闐兩河之所注宋時為西夏所據伊州在燉煌北大磧之外為戎狄之地非九州之限後漢明帝始征取伊吾盧地即此也爾後多為屯田兵鎮之所未為郡縣後魏始置伊吾郡後又為戎胡所據唐貞觀初内附乃置伊州或為伊吾郡屬隴右道廣徳後沒於吐蕃貢香棗隂牙角胡桐律領縣三治伊吾伊吾漢置伊吾屯後魏為縣有天山匈奴過之皆下馬拜一名雪山納職唐置後漢破匈奴呼衍王取其地置宜禾都尉以為屯田今伊吾故城也柔遠五代時曰胡盧磧為仲雲之族牙帳仲雲小月氏之遺種也宋無此州西州漢時車師前王之庭漢元帝所置戊巳校尉故地因興師相討軍中羸憊者留居之地形髙敞遂名髙昌壘有八城本中國人也前凉張駿置髙昌郡其後魏有之後又屬蠕蠕其後麴嘉稱王於此數代至唐貞觀十四年討平之以其地為西州本髙昌國界東西八百里南北五百里墾田九百頃置都督府後改為金山都護府或為交河郡屬隴右道廣徳後陷吐蕃貢絲㲲布氊刺􅁡蒲萄五物酒漿煎皺乾領縣五治髙昌髙昌夲漢髙昌壘寳應元年改前庭縣取車師前王庭義交河唐縣有河水分流繞城下故名栁中漢縣蒲昌唐縣東南有舊蒲類海今名婆悉海天山唐置宋無此州庭州在流沙之西北前漢烏孫之舊壤後漢車師後王之地歴代為胡虜所居唐貞觀中征髙昌於時西突厥屯兵於可汗浮圖城與髙昌相影響及髙昌既平懼而来降以其地為庭州後置北庭都護府屬隴右道貞元後陷吐蕃貢隂牙角速霍角阿魏截根領縣三治金滿金滿蒲類有蒲類海天山輪臺三縣並唐置宋無此州安西都護府本龜兹國唐貞觀中置都護府於西州顯慶中移治龜兹東接焉耆西連疎勒西去葱嶺七百里南鄰吐蕃北拒突厥貞元三年陷於吐蕃宋無其地按杜氏通典言唐之土宇南北如漢之盛時東不及而西則過之唐史取其說以序地理志此盖開元天寳時事也然愚嘗考之河西在漢本匈奴休屠王所居武帝始取其地置郡縣自東漢以来民物富庶與中州不殊竇融張軌乘時多難保有其地融值光武中興亟歸版圖而軌遂割據累世其後又有呂光秃髮沮渠之徒迭據其土小者稱王大者僣號盖其地勢險僻可以自保於一隅貨賄殷富可以無求於中土故五凉相繼雖夷夏不同而其所以為國者經制文物俱能倣效中華與五胡角立中州人士之避難流徙者多徃依之盖其風土可樂如此唐天寳以後河西隴右沒於吐蕃大中雖復河湟而名存實亡流傳五代以及於宋而河隴為西夏所據元昊倔强搆逆兵勢甚銳竭天下之力不能少挫其鋒然至絶其嵗賜互市則不免衣皮食酪幾不能以為國是以亟亟屈服盖河西之地自唐中葉以後一淪異域頓化為龍荒沙漠之區無復昔之殷富繁華矣唐自安史之亂西北土地皆不能如舊然北方如盧龍滄景雖世為强藩所據自擅其兵賦而奉正朔請旌莭猶唐之臣也風聲氣習文物禮樂猶承平之舊也獨西陲淪於吐蕃遂有夷夏之分致使數百年中華衣冠之地復變為左袵不能自㧞雖驍悍如元昊所有土地過扵五凉五凉止有河西五郡無􅂕夏然不過與諸蕃部落雜處於旱海不毛之地兵革之犀利財貨之殷富俱不能如曩時是以北事遼南事宋僅足以自存然則凉州之地入中國版圖始扵漢而殷富者數百年其陷於吐蕃也始扵唐而傖荒者復數百年謂唐之土地西過於漢者非要終之論也文獻通考卷三百二十二
