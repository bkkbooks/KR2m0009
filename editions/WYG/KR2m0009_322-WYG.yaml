body:
  text: 文獻通考卷三百二十二鄱陽馬端臨貴與著輿地考八古雍州禹貢曰黑水西河惟雍州西據黒水東距西河西河即龍門之河也在冀州西故曰西河黑水出今張掖郡雞山南流至今燉煌郡經三危山過今南溪郡而入南海弱水既西弱水今張掖郡張掖縣界理使西流至合黎合黎亦張掖郡界中涇屬渭汭涇水出今平涼郡髙平縣渭水出今隴西郡渭源縣屬連也水北曰汭言理涇入於渭經秦川而入河也在今新平郡宜祿縣水􅀴云汭經宜祿名為宜禄川漆沮既從灃水攸同漆沮之水今京兆府華原富平界亦曰洛水灃水出今長安縣之南山言漆沮既從入渭灃水亦来同也荆岐既旅荆山在今富平縣岐山在今扶風郡岐山縣荆山在岐東言二山理畢可旅祭終南惇物至于鳥䑕終南惇物二山皆在今長安及武功二縣鳥䑕山在隴西郡首陽山西南言自終南西出至於鳥䑕原隰底績至于瀦野髙平曰原下濕曰隰瀦野地名言皆致功也今武威郡姑臧縣即瀦野澤三危既宅三苖丕叙三危山名言可居也三苖本有苖氏之族今長沙衡陽間是徙居於此分而為三故言三苖皆大得其次叙也三危山在今燉煌郡縣界厥土黄壤浮于積石至于龍門西河積石山在今西平郡龍支縣龍門山在今絳郡龍門界皆河水所經會于渭汭逆流曰會自渭北涯逆水西上舜置十二牧雍其一也以其四山之地故曰雍州亦謂西北之位陽所不及隂所雍閉周禮職方正西曰雍州其山曰岳即吳岳在今汧陽郡吳山縣藪曰弦蒲在汧陽郡汧陽縣川曰涇汭汭在豳地詩大雅公劉之篇曰汭鞠之即浸曰渭洛洛即漆沮其利玉石人三男二女畜宜馬牛榖宜黍稷兼得禹貢梁州之地矣周自武王克殷都於豐鎬則雍州為王畿豐邑在豐水鎬京在豐水之東並在今長安縣界及平王東遷雒邑以岐豐之地賜秦襄公乃為秦地矣至孝公作為咸陽築冀闕徙都之故謂之秦川亦曰關中也關中記云東自函關𢎞農郡靈寳縣界西至隴關今汧陽郡汧源縣界二闗之間謂之關中東西千餘里其在天文東井輿鬼則秦之分野漢之京兆扶風馮翊北地上郡安定天水隴西金城武威張掖酒泉燉煌皆其分地今京兆扶風馮翊華隂之西境汧陽新平安定彭原安化靈武五原寧朔洛交中部延安咸寧上郡銀川新秦朔方天水隴西金城㑹寧安鄉和政寧塞西平武威張掖酒泉晉昌燉煌等郡兼得魏趙之交漢之髙陵以東今馮翊之南境華隂之東境也宜屬魏漢之雲中五原之境今榆林九原安北屬趙始皇置四十郡此為内史今京兆華隂馮翊扶風汧陽新平等郡是上郡今洛交中部延安咸寧上郡銀川新秦朔方等郡地北地今安定彭原安化平涼靈武五原寧朔等郡地九原今九原安北地是隴西今天水隴西金城㑹寧安鄉等郡地是及雲中之西南境今榆林郡其餘郡縣自漢後歴代開置其伊吾以西並雍州之封域外羌胡地也臨洮武威張掖西平寧塞酒泉晉昌燉煌古雍州域内地而非秦所置郡之境也伊吾交河北庭安西則雍州域外秦滅項籍分秦地為三國曰雍以章邯為王都雍邱今京兆府金城縣塞以司馬欣為王都櫟陽縣今縣翟以董翳為王都髙奴今延安郡金明縣謂之三秦漢武帝置十三州以其地西偏為涼州盖以地處西方常寒涼也又置司𨽻領三輔後漢時司𨽻三輔並如前代州理於隴今天水郡隴城縣魏分河西為涼州分隴右為秦州三輔仍舊屬司𨽻改京兆尹為守馮翊扶風各除左右晋置雍州領郡國七理京兆涼州領郡國八理武威今郡秦州領郡六理上邽今天水郡愍帝之後劉聪石勒苻堅姚萇相繼據之及姚泓為宋武帝所滅後屬赫連勃勃其州縣之名不可得而紀也後魏以其地置北秦雍南秦三州雍州理京兆即長安地秦州理天水今郡上邽縣南秦州理洛谷城今天水郡伏𦍑縣頗得古雍州之地迨西魏以後及於周氏分裂制置其名甚多不可悉數隋氏置司𨽻刺史分部廵察而不詳所統餘州皆然唐分置十部此為京畿京兆府華隂馮翊扶風新平等郡關内道安定彭原汧陽中部洛交安化靈武榆林延安上郡咸寧銀川平原九原㑹寧五原新秦朔方安北等郡隴右道武威天水安西北庭交河晋昌西平隴西燉煌酒泉金城安鄉寧塞臨洮和政張掖伊吾等郡天寳盗起中國而河西隴右不守陷扵吐蕃至大中咸通始復隴右宋為陕西路及河東路麟府二郡内夏銀綏宥静靈鹽諸郡為西夏所據甘涼𤓰沙肅西伊安北安西北庭亦沒扵西夏及諸蕃慶歴初分陕西縁邊為秦鳳涇原環慶鄜延四路熙寧間又以熙河洮岷州通遠軍為一路各置帥五年又以五路三十四州軍分為兩路永興軍等路京兆乾河中虢陕商延寧同坊華丹耀環邠保鄜慶安秦鳳等路鳳翔源秦階涇河熈蘭隴鳳成順岷鎮渭徳戎遠通紹興初置川陕等路宣撫處置使富平之敗陕西五路俱陷於金吳玠胡世将等力戰守鳳翔之和尚原九年和議成歸我陕西地十年背盟入宼再取陕西僅餘階成岷鳳四州以屬四川之利州路云雍州之地厥田上上鄠杜之饒號稱陸海言其髙陸物産如海之無所不出四塞為固被山帶河秦氏資之遂平海内漢初髙帝納婁敬說而都焉又徙齊諸田楚昭屈景燕趙韓魏之後及豪族名家於關中强本弱末以制天下自是每因諸帝山陵則遷戸立縣率以為常故五方錯雜風俗不一漢朝京輔稱為難理其安定彭原之北汧陽天水之西接近胡戎多尚武莭自東漢魏晋𦍑氐屢擾旋則苻姚迭據五涼更亂三百餘祀戰争方息帝都所在是曰浩穰其餘郡縣習俗如舊古雍州歴代沿革之圖春秋時可考者十四國秦梁召崇畢豐韓賈杜西戎義渠白翟鄭始封地是晋西境是秦時為郡六内史北地上郡九原隴西雲中西南境是漢時為郡十六縣二百三十二京兆十二縣長安湖新豐邽船司空鄭下南陵藍田奉明蕐隂霸陵杜陵左馮翊二十四縣髙陵衙櫟陽粟邑翟道谷口池陽蓮勺夏陽徵鄜陽頻陽徳臨晋陵重泉陵郃陽年祋祤陵武城陽沈懷長雲萬陽雲右扶風二十一縣渭城美槐里郿鄠雍盩厔夷陽漆漦陵郁平栒邑茂隃糜武陳倉陵陵功杜陽􅊈好畤虢安𢎞農郡十一縣𢎞農新盧氏商陕析宜陽渾黽池雒丹水安陸上安定郡二十一縣髙平陽復累涇安俾涇臨鹵撫夷烏氏朝那彭陽厲隂宻得安定卷參䜌氏三水鶉隂槃爰眴月道隂安武祖北地郡十九縣馬領昫衍直路方渠靈武除道富平五街靈洲鶉廉觚道歸徳弋居囘獲大畧畔道泥陽郁郅義渠上郡二十三縣膚施淺水獨樂京室陽周洛都木禾白土平都龜兹襄洛望原都隂漆垣望奢延定雕隂髙推邪宜楨林髙雕道松陽奴都朔方郡十縣三封渠朔方沃脩都廣臨河臨呼遒渾搜埜牧戎窳五原郡十六縣九原河隂固陵蒲澤五原南興臨沃武都文國宜梁曼栢成宜稒陽莫䵣西安陽河目天水郡十六縣平襄諸街泉阿戎邑道陽望垣勇罕开綿道陽畧道士成紀清水奉㨗隴豲道蘭干冀隴西郡十一縣狄道予道上邽大夏安故𦍑道氐道襄武首陽臨洮西金城郡十三縣允吾榆中浩亹枹罕令居白石枝陽河關金城破𦍑安夷允街臨𦍑武威郡十縣姑臧樸張掖媪武威蒼休屠宣揟次鳥圍松威鸞張掖郡十縣觻得驪昭武番刪丹居氐池顯屋蘭勒靬和延美日酒泉郡九縣祿福池表是綏樂涫乾天䧇水頭彌齊玉門會燉煌郡六縣燉煌勒冥安效榖淵泉廣至龍西河郡西南境是縣見冀州雲中郡西南境是縣見冀州晋時為郡國十九縣九十九京兆郡九縣長安新杜陵隂覇城鄭藍田年豐般髙陸萬馮翊郡八縣臨晋郃下邽夏重泉勺陽陽頻陽粟邑蓮扶風郡六縣池陽郿雍􅊈陳倉美陽上洛郡三縣上洛商盧氏安定郡七縣臨涇西朝那宻川烏氏都盧鶉觚隂北地郡二縣泥陽富平始平郡五縣槐里始平武功鄠蒯城新平郡二縣漆汾邑金城郡五縣榆中允街金城白土浩亹西平郡四縣西都臨𦍑長寧安夷武威郡七縣姑臧番宣威靬禾揖次倉松顯美驪張掖郡三縣永平臨澤屋蘭酒泉郡九縣祿福延會水玉安彌沙騂馬氏夀門頭樂涫表西海郡一縣居延燉煌郡十二縣昌蒲廣至燉煌冝禾龍勒冥安陽闗深泉效榖伊吾新鄉乾齊天水郡六縣上邽冀始昌新陽顯新成紀南安郡三縣獂道新興中陶隴西郡四縣襄武首陽臨洮狄道畧陽郡四縣臨渭平襄畧陽清水隋時為郡二十九縣一百五十七京兆郡二十二縣大興泉長安宜始平醴上鄠武功藍田盩厔涇陽新豐髙陵華原三原宜君富平同官雲陽鄭隂渭南華萬年馮翊郡八縣馮翊下韓城白郃陽城邽水朝邑澄城蒲扶風郡九縣雍源岐山􅊈陽陳倉南由虢郿普潤􅊈安定郡七縣安定華鶉觚涇亭隂盤朝那良原臨上郡五縣洛交内部三川鄜城洛川北地郡六縣安定水羅川彭原襄樂新平三朔方郡三縣巖綠寧朔長澤雕隂郡十一縣上縣開光大斌銀城延福城平儒林開疆真鄉撫寧綏徳延安郡十一縣膚施延安豐林因城金明義川臨真汾川延川咸寕魏平𢎞化郡七縣合水𢎞馬嶺化徳華池歸徳洛源𢎞平涼郡五縣平髙百泉平涼會寧黙亭靈武郡六縣㢠廻樂安𢎞静懷遠靈武鳴沙豐鹽川郡一縣五原五原郡三縣九原永豐安化天水郡六縣上邽紀冀城清水秦嶺隴城成隴西郡五縣襄武隴西渭源障長川金城郡二縣金城狄道枹罕郡四縣枹罕龍支大夏水池澆河郡二縣河津達化西平郡二縣湟水化隆武威郡四縣姑臧昌松番和允吾張掖郡三縣張掖刪丹福禄燉煌郡三縣燉煌常樂玉門鄯善郡二縣顯武濟遠且末郡二縣肅寕伏戎西海郡二縣宣徳威定河源郡二縣遠化赤水臨洮郡十縣美相臨疊川臨合川當樂川和歸政陽潭洮夷政洮榆林郡三縣榆林富昌金河唐時為州四十三縣一百七十三京兆府二十縣華州四縣岐州九縣同州七縣隴州三縣邠州四縣涇州五縣寧州六縣慶州六縣原州五縣鄜州五縣坊州三縣丹州三縣延州十縣綏州五縣銀州四縣麟州三縣府州一縣夏州三縣豐州三縣勝州二縣靈州四縣鹽州二縣宥州二縣秦州四縣渭州四縣蘭州三縣會州二縣河州三縣洮州一縣岷州三縣廓州三縣鄯州三縣涼州五縣甘州二縣肅州三縣𤓰州二縣河州二縣伊州三縣西州五縣庭州三縣安北都䕶府二縣安西都䕶府一縣宋時為州三十八縣一百二十七永興軍十三縣耀州七縣乾州五縣華州五縣同州七縣鳳翔府十縣隴州四縣邠州五縣涇州四縣寧州四縣慶州三縣定邊軍一縣原州二縣鎮戎軍一縣懷徳軍一縣鄜州五縣坊州三縣延安府十縣保安軍一縣丹州三縣麟州三縣府州一縣環州一縣西安州一縣秦州六縣渭州五縣徳順軍一縣鞏州三縣蘭州一縣熈州一縣會州一縣河州一縣積石軍一縣洮州一縣岷州三縣鄯州一縣湟州一縣震武軍一縣永興軍周之舊都平王東遷而屬秦始皇以為内史地漢髙祖初屬塞國後更為渭南郡尋罷復為内史武帝分為右内史秦於右北分涇水置鄭渠灌田四萬餘頃漢置白渠灌四千五百餘項後更分京兆尹領縣十二後漢因之領縣十魏改尹為守後改為秦國後復為京兆國晋為京兆郡兼置雍州領郡國七理於此後魏亦然後周􅂧為京兆尹隋初置雍州煬帝改為京兆郡唐初􅂧為雍州開元三年改為京兆府凡周秦漢晋西魏後周隋至於唐並為帝都周謂幽王以上漢謂西漢晋愍帝亦暫都於此凡四年後魏孝武帝自洛陽来都之是為西魏凡四主得二十二年而禪後周其間王莽更始劉曜苻堅姚萇亦都於此前趙劉曜為石勒所滅前秦苻堅為姚萇所滅後秦姚泓為晋将劉裕所滅唐號西京漢髙帝自櫟陽徙都長安至恵帝方發人徒築城今西北古城是也至隋文帝開皇三年移築新都