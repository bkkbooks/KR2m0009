body:
  text: 文獻通考卷三百五鄱陽馬端臨貴與著物異考十一恒寒春秋桓公八年十月雨雪周十月今八月也未可以雪劉向以為時夫人有淫齊之行而桓有妬媢之心師古曰媢謂夫妬婦也音莫報反夫人將殺其象見也師古曰謂欲殺桓公桓不覺寤後與夫人俱如齊而殺死凡雨陰也雪又雨之陰也出非其時廹近象也董仲舒以為象夫人專恣陰氣盛也定公元年十月隕霜殺菽菽大豆劉向以為周十月今八月也陰氣未至君位而殺誅罰不由君出在臣下之象是時季氏逐昭公公死於外定公立故天見災僖公二年十月隕霜不殺草為嗣君微失秉事之象也其後卒在臣下則災為之生矣異故言草災故言菽重殺穀以其重於殺草也一曰菽草之難殺者也言殺菽知草皆死也言不殺草知菽亦不死也董仲舒以為菽草之强者天戒若曰加誅於强臣言菽以微見季氏之罰也考王六年六月秦雨雪威烈王四年四月晉大雨雪秦始皇初即位尚㓜委政太后太后淫於呂不韋及嫪毐嫪郎到反毐烏改反封毐為長信侯以太原郡為毐國宮室苑囿自恣政事斷焉故天冬雷以見陽不禁閉以涉危害舒奥廹近之應也始皇既冠毐懼誅作亂始皇誅之斬首數百級大臣二十人皆車裂以殉夷滅其宗遷四千餘家於房陵是歲四月寒民有凍死者數年之間緩急如此寒燠輙應此其效也劉歆以為大雨雪及未當雨雪而雨雪及大雨雹隕霜殺菽皆常寒之罰也京房易傳曰有德遭險兹謂逆命厥異寒誅過深當燠而寒盡六日亦為雹害正不誅兹謂養賊寒七十二日殺蜚禽道人始去有道之人去兹謂傷其寒物無霜而死涌水出戰不量敵兹謂辱命其寒雖雨物不茂聞善不予厥咎聾漢文帝四年六月大雨雪後三年淮南王長謀反發覺遷道死師古曰遷於蜀未至而死於雍故曰道死京房易傳曰夏雨雪戒臣為亂景帝中六年三月雨雪其六月匈奴入上郡取苑馬吏卒戰死者二千餘人明年條侯周亞夫下獄死武帝元光四年四月隕霜殺草木先是二年遣五將軍二十萬衆伏馬邑下欲襲單于單于覺之而去自是始征伐四夷師出三十餘年天下户口減半京房易傳曰興兵妄誅兹謂亡法厥災霜夏殺五穀冬殺麥誅不原情兹謂不仁其霜夏先大雷風冬先雨乃隕霜有芒角賢聖遭害其霜附木不下地佞人依刑兹謂私賊其霜在草根土隙間不教而誅兹謂虐其霜反在草下元狩元年十二月大雨雪民多凍死是歲淮南衡山王謀反發覺皆自殺使者行郡國治黨與師古曰行音下更反坐死者數萬人元鼎二年三月雪平地厚五尺是歲御史大夫張湯有罪自殺丞相嚴青翟坐與三長史謀陷湯師古曰謂朱買臣為丞相長史王朝及邊通皆守丞相長史也青翟自殺三長史皆棄市元鼎三年三月水冰四月雨雪闗東十餘郡人相食是歲民不占緡錢有告者以半畀之言政急刻也元帝永光元年三月雨雪隕霜殺桑九月二日隕霜殺稼天下大饑時中書令石顯用事專權與春秋定公時隕霜同應建昭二年十二月齊楚地大雪深五尺是歲京房張博為石顯所􅉲死四年三月雨雪燕多死是日皇后親蠶疾風自西北大寒雨雪壞敗其功成帝陽朔四年四月雨雪燕雀死後十六年許皇后自殺王莾天鳯元年四月隕霜殺草木三年二月大雨雪闗東尤甚深者一丈竹栢皆枯四年八月大寒百官人馬有凍死者地皇二年秋隕霜殺菽後漢靈帝光和六年冬大寒北海東萊琅邪井中冰厚尺餘袁山松書曰時羣賊起天下始亂䜟曰寒者小人暴虐專權居位無道有位讁罰無法又殺無罪其寒必暴殺獻帝初平四年六月寒風如冬時帝流遷失政右扶風雹如斗袁山松書曰雹殺人前後雨雹此最為大時天下潰亂吳孫權嘉禾三年九月朔隕霜傷穀按劉向説誅罰不由君出在臣下之象也時校事呂壹專作威福與漢元帝時石顯用事隕霜同應四年七月雨雹又隕霜赤烏四年正月大雪平地深三尺鳥獸死者大半是年夏全琮等四將軍攻畧淮南襄陽戰死者千餘人其後權以讒邪數責讓陸議議恚致卒與漢景武大雪同事晉武帝泰始九年四月隕霜時賈充親黨比周用事與魯定公漢元帝時隕霜同應咸寧三年八月平原安平上黨泰山四郡霜害三豆是月河間暴風寒冰郡國五隕霜傷穀是後征吳及討凉州賊六月汲郡廣平陳留滎陽雨雹隕霜傷秋麥千三百餘頃太康元年三月河東高平霜雹傷桑麥二年三月河東隕霜害桑五年九月南安大雪折木六年三月齊郡臨淄等四縣樂安等八縣琅邪等八縣河間等六縣高陽等四縣隕霜傷桑麥八年四月齊國天水二郡隕霜九年四月隴西隕霜十年四月郡國八隕霜惠帝元康六年三月東海雨雪殺桑麥七年七月秦雍二州隕霜殺稼九年三月河南滎陽潁川隕霜傷禾光熙元年閏八月霰雪劉向曰盛陽雨水湯熱陰氣脅之則轉而為雹盛陰雨雪凝滯陽氣薄之則散而為霰今雪非其時此聽不聰之應是年帝崩明帝太寧三年三月丁丑雨雪癸巳隕霜成帝咸和九年八月成都大雪是歲李雄死康帝建元元年八月大雪時政在將相陰氣盛也劉向曰凡雨陰也雪又雨之陰也出非其時廹近象也穆帝永和三年八月冀方大雪人馬多凍死十年五月凉州雪明年張祚䕶軍張瓘廢祚更立元靚京房易傳曰夏雪戒臣為亂十一年四月霜安帝義熙五年三月己亥雪深數尺梁武帝天監三年三月六年三月並隕霜殺草京房易傳曰興兵妄誅謂亡法厥罰霜是時大發卒拒魏兵於鍾離連兵數歲普通三年三月大雪平地三尺雨陰也雪又陰妾不妾臣不臣之應時義州刺史文僧朗以州叛於魏臣不臣之應也大同三年六月朐山隕霜七月青州雪害苖稼時交州刺史李賁舉兵反僭號擊之不克十年十二月大雪平地二尺時邵陵王綸湘東王繹武陵王紀並權侔人主頗為驕恣皇太子甚惡之帝不能抑損及侯景之亂諸王擁强兵不勤王委棄君父自相屠滅國竟以亡陳宣帝太建十年八月隕霜殺稻菽時大興師衆與周師相拒於呂梁東魏静帝興和二年五月大雪時神武作宰發卒十餘萬築鄴城百姓怨思武定四年二月大雪人畜凍死相望於道時歩落稽舉兵反宼亂數州人多死亡又爾朱文暢等謀害神武事泄伏誅黨與多濫死北齊武成河清元年歲大寒䜟曰殺無罪其寒必異時帝淫於文宣李后又殺其子寃酷之應二年二月大雪連月南北千餘里平地數尺繁霜晝下時突厥可汗與周師入并州殺掠吏人不可勝紀後主天統二年大雪三年正月大雪平地二尺武平三年正月又大雪時馮淑妃陸令萱内制朝政陰氣積盛故天變屢見唐太宗貞觀元年秋霜殺稼京房易傳曰人君刑罰妄行則天應之以隕霜三年北邊霜殺稼高宗永徽二年綏延等州霜殺稼顯慶四年二月壬子大雨雪方春少陽用事而寒氣脅之古占以為人君刑法暴濫之象近常寒也咸亨元年十月癸酉大雪平地三尺人多凍死儀鳯三年五月丙寅髙宗在九成宮霖雨大寒兵衞有凍死者調露元年八月邠慶寧涇原五州霜開耀元年冬大寒武后證聖元年六月睦州隕霜殺草吳越地燠而盛夏隕霜昔所未有四年四月延州霜殺草四月純陽用事象人君當布惠於天下而反隕霜是無陽也久視元年三月大雪中宗神龍元年三月乙酉睦州暴寒且冰元宗開元十二年八月潞綏等州霜殺稼十五年天下州十七霜殺稼二十九年九月丁卯大雨雪大木偃折代宗大歴四年六月伏日寒德宗貞元元年正月戊戌大風雨寒丙午又大風雪寒民饑多凍死者十二年十二月大雪甚寒竹栢柿樹多死占曰有德遭險厥災暴寒十九年三月大雪二十年二月庚戌始雷大雨雹震電大雨雪既雷則不當雪陰脅陽也如魯隱公之九年憲宗元和二年七月邠寧等州霜殺稼六年十二月大寒八年十月東都大寒霜厚數寸雀䑕多死九年三月丁卯隕霜殺桑十二年九月己丑雨雪人有凍死者十四年四月淄青隕霜殺惡草及荆棘而不害嘉穀十五年八月己卯同州雨雪傷稼穆宗長慶元年二月海州海水冰南北二百里東望無際敬宗寶歴元年八月邠州霜殺稼文宗太和三年秋京畿奉先等八縣早霜殺稼六年正月雨雪踰月寒甚九年十二月京師苦寒武宗會昌三年春寒大雪江左尤甚民有凍死者宣宗大中三年春隕霜殺桑懿宗咸通五年冬隰石汾等州大雨雪平地深五尺僖宗中和元年春霜秋河東早霜殺稼昭宗景福二年二月辛巳曹州大雪平地二尺天復二年三月浙西大雪平地三尺餘其氣如煙其味苦十二月又大雪江海冰天祐元年九月壬戌朔大風寒如仲冬浙東浙西大雪吳越地氣常燠而積雪近常寒也宋太祖建隆三年春延寧二州雪盈尺溝洫復冰草木不華丹州雪二尺許棣州厭次縣隕霜殺桑民不蠶太宗太平興國七年三月宣州霜雪害桑稼雍熙四年冬南康軍大雨雪江水冰勝重載端拱元年閏五月鄆州風雪傷麥淳化三年三月商州霜花木皆死九月京兆府大雪殺苖稼四年二月商州大雪民多凍死真宗咸平四年三月丁丑京師及近畿諸州風雪損桑景德四年七月渭州瓦亭寨早霜傷稼大中祥符九年十一月大名府澶州相州並霜害稼天禧元年十二月京師大雪苦寒人多凍死路有僵尸遣中使墐之四郊二年正月永州大雪六晝夜方止江溪魚皆凍死仁宗至和元年正月京師大雪貧弱之民凍死者甚衆二年河東自春至夏隕霜殺桑嘉祐四年正月自冬雨雪泥塗盡冰都民饑寒死於道路者甚衆哲宗元祐二年冬京師大雪連月至春不止久陰常寒罷上元節游幸降德音諸道八年十一月京師大雪多流民元符二年正月甲辰朔御大慶殿受朝賀以雪罷徽宗政和三年十一月大雨雪連十餘日不止平地八尺餘冰滑人馬不能行詔許百官乘轎入朝飛鳥多死七年十二月大雪詔收養内外乞丐老㓜欽宗靖康元年閏十一月大雪盈三尺不止天地晦冥或雪未下時陰雲中有雪絲長數寸墮地二年正月丁酉大雪天寒甚地冰如鏡行者不能定立是月乙卯車駕在青城大雪數尺人多死高宗建炎三年六月久陰霖雨而寒京房謂害正不誅兹謂養賊後連誅叛將紹興元年二月寒食日雪七年二月霜殺桑稼十三年三月雪二十八年三月雨雪三十一年正月戊子大雨雪至己亥逾旬不止禁旅壘舍有壓者時久雪寒甚孝宗乾道元年三月暴寒苖稼多凍死二年春大雨寒至於三月損蠶麥京房以為聞善不予其寒雖雨物不茂六年夏五月大風雨寒稼多腐敗淳熙十二年淮水冰斷流與唐志長慶海冰同占十二月大雪至明年正月或雪或霰或雹或雨冰或冰沍尺餘連日不解台州雪深丈餘民凍死十六年四月戊子成州天水縣大雨雪麥皆凍死七月階成鳯西和四州霜殺稼盡與漢永光夏霜同占光宗紹熙元年三月留寒至立夏不退二年正月行都大雪積沍河冰厚尺餘寒甚是春雷雪相繼凍雨彌月三年九月丁未和州隕霜連三日殺稼是月淮西郡國稼皆肅於霜民大饑寧宗慶元六年五月亡暑氣如凛秋嘉定六年六月亡暑夜寒與京房當燠而寒同占雹木冰冰花劉向以木冰為木不曲直唐志以冰花為華孽愚按木不曲直與華孽者皆花木失其常性而為妖者也若木冰乃寒脅木而成冰則妖不在木也冰花乃冰有異而結花則妖不在花也故以與雹同類而附恒寒之後云春秋成公十六年正月雨木冰劉歆以為上陽施不下通下陰施不上達故雨而木為之冰雰音紛氣寒木不曲直也劉向以為冰者陰之盛而水滯也木者少陽貴臣卿大夫之象也此人將有害則陰氣脅木木先寒故得雨而冰也時叔孫僑如出奔公子偃誅死僑如淫謀作亂出奔偃預僑如之謀故誅一曰時晉執季孫行父