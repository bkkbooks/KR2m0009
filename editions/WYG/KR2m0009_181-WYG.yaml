body:
  text: 文獻通考卷一百八十一鄱陽馬端臨貴與著經籍考八經禮周禮疏十二卷鼂氏曰唐賈公彦撰公彦洺州人永徽中仕至太學博士史稱著此書四十卷今併為十二卷世稱其發揮鄭學最為詳眀陳氏曰其序周禮廢興起扵成帝劉歆而成扵鄭𤣥又言鄭衆以為書周官即此周官也失之矣書止一篇周禮乃六篇文異數萬非書類是則然矣但周禮六官實本扵周官周官舉其凡周禮詳其目則鄭衆之說未得為失而其大可疑者則邦土邦事之不同也館閣書目按藝文志謂之周官經此禮噐所謂經禮者是也志有周官經六篇傳四篇但曰經傳云爾廼便以為經禮尤為可笑廣川藏書志云公彦此疏据陳邵異同評及沈重義為之二書並見唐藝文志今不復存石經周禮十二卷鼂氏曰偽蜀孫明吉書以監本是正其注或羡或脫或不同至千數新經周禮義二十二卷鼂氏曰皇朝王安石介甫撰熈寧中設經義局介甫自為周官義十餘萬言不觧考工記按秦火之後周禮比他經最後出論者不一獨劉歆稱為周公致太平之迹鄭氏則曰周公復辟後以此授成王使居雒邑治天下林孝存謂之黷亂不驗之書何休亦云六國隂謀之說昔北宫錡問孟子周室班爵禄之法孟子以謂諸侯惡其害已滅去其籍則自孟子時已無周禮矣况經秦火乎孝存休非之良有以也不知劉鄭何所據而言然又自違異不同王莽嘗取而行之歛財聚貨瀆祀煩民冗碎詭異離去人情逺甚施扵文則可觀措扵事則難行凡莽之馴致大亂者皆以此厥後唯蘇綽王通善之諸儒未嘗有言者至扵介甫以其書理財者居半愛之如行青苖之類皆稽焉所以自釋其義者葢以其所創新法盡傅著之務塞異議者之口後其黨蔡卞蔡亰紹述介甫期盡行之圜土方田皆是也周姬姓故其女曰王姬其臣如宋齊之女亦不曰姬而各氏其姓曰姜氏曰子氏趙嬴姓亰乃令帝女稱帝姬噫至扵姓亦從焉何其甚也久之禍難並起與莽曾無少異殆書所謂與亂同事者邪陳氏曰其序言自周衰至今歴載千數而太平之遺迹掃蕩殆盡學者所見無復全經扵是時乃欲訓而發之臣誠不自揆知其難也以訓而發之之為難又知夫立政造事追而復之之為尤難新法誤國扵此可推其原矣熈寧八年詔頒之國子監且置之義觧之首周禮辨疑一卷鼂氏曰皇朝楊時中立撰凡一卷攻安石之書周禮中義八卷陳氏曰祠部員外郎長樂劉彜執中撰彜諸經皆有中義周禮詳觧四十卷陳氏曰王昭禹撰未詳何人近世為舉子業者多用之其學皆宗王氏新說周禮講義四十九卷陳氏曰林之竒撰四十九卷陳君舉周禮說三卷陳氏曰其書曰格君心正朝綱均國勢各四篇中興藝文志稱傅良之言曰周官之綱領三飬君徳正朝綱均國勢也鄭註之誤三王制漢儒之言今以釋周禮司馬法兵制今以證田制漢官制皆襲秦今以比周官徐筠學扵傅良記所口授而為書曰微言傅良為説十二篇專論綱領朱子語録曰扵丘子服處見陳徐二先生周禮制度菁華下半册徐元徳作上半册即陳君舉所奏周官説先生云孝宗嘗問君舉聞卿博學不知讀書之法當如何陳奏云臣生平扵周官粗嘗用心推考今周官數篇已屬藁容臣退繕寫進呈遂寫進御大槩推周官制度亦稍詳然亦有杜撰錯說處如云冢宰之職不特朝廷之事凡内而天子飲食服御宫掖之事無不畢管葢冢宰以道詔王格君心之非所以如此說固是但云主客行人之官合屬春官宗伯而乃掌扵司㓂宗伯典禮司㓂典刑土地疆域之事合掌扵司空乃掌扵司馬葢周家設六官互相檢制之意此大不然何聖人不以君子長者之道待其臣既任之而復疑之邪或問如何先生曰賓客屬秋官者葢諸侯朝覲會同之禮既畢則降而肉袒請刑司㓂主刑所以屬之有威懐諸侯之意夏官掌諸侯土地封疆如職方氏皆屬夏官葢諸侯有變則六師移之所以屬司馬也又問冬官司空掌何事曰次第是管土田之事葢司馬職方氏存其疆域之定制至扵申畫井田創置􅊏悉必屬扵司空而今亡矣周禮井田譜二十卷陳氏曰進士會稽夏休撰紹興時表上之淳熈中樓鑰刻之永嘉止齋陳氏序曰夏君休所著井田譜亦有志矣鄭氏井邑若畫棋然葢祖王制王制晚雜出漢文帝時以海内盡為九州州必方千里千里必為國二百一十其後班固食貨志亦謂井方一里八家各私田百畆公田十畆是為八百八十畆為廬舎葢人二畆半云凡若此夏君皆不取漢以来諸儒鮮或知之者其説畿内廣成萬歩謂之都不能成都謂之鄙不能成鄙即成縣者與之為縣成甸者與之為甸至一丘一邑盡然以其不能成都成鄙故謂之閒田以其不可為軍為師而無所專係故謂之閒民鄉遂市官皆小者兼大者他亦上下相攝備其數不必具其貟嵗登下民數扵是損益之是謂相除之法皆通論也餘至纎至悉雖泥扵數度未必皆叶然其意要與時務合不為空言去聖人逺周禮一經尚多三代經理遺跡世無覃思之學顧以說者謬嘗試者復大謬乃欲一切駮盡為慊苟得如井田譜與近時所傳林勛本政書者數十家各致其說取其通如此者去其泥不通如彼者則周制可得而考矣周制可得而考則天下庶幾扵治矣周禮丘乗說一卷陳氏曰項安世撰一卷黄度周禮說五卷陳氏曰度字文叔不觧考工記水心葉氏序曰周官晚出而劉歆遽行之大壊矣蘓綽又壊矣王安石又壊矣千四百年更三大壊而是書所存無幾矣詩書春秋皆孔子論定孟軻諸儒相與弼承世不能知而信其所從井洌扵逵衆酌飲焉惟其量爾故治雖不足而書有餘也孔子未嘗言周官孟子亦以為不可得聞一旦驟至如竒方大藥非黄帝神農所名無制使服食之法而庸夫鄙人妄咀吞之不眩亂顛錯幾希故用雖有餘而書不足也雖然以余考之周之道固莫聚扵此書他經其散者也周之籍固莫切扵此書他經其緩者也公卿敬羣有司亷教法齊備義利均等固文武周召之實政在是也奈何使降為度數事物之學哉新昌黄文叔始述五官而為之說亹亹乎孔孟之以理貫事者必相發眀也惻惻乎文武之以己形民者必相經緯也守天下者非私智也設邦家非自尊也飬民至厚取之至薄為下甚逸為上甚勞洗滌三壊之腥穢而一以性命道徳起後世之公心雖未能表是書而獨行猶將合他經而共存也其功大矣同時永嘉陳君舉亦著周禮說十二篇葢嘗獻之紹熈天子為科舉家宗尚君舉素善文叔論議相出入所以異者君舉以後凖前由本朝至漢溯而通之文叔以前凖後由春秋戰國至本朝沿而别之其叙鄉遂溝洫辯二鄭是非凡一字一語細入毫芒不可損益也史浩周禮講義中興藝文志孝宗為建王浩分講周禮多啟發孝宗稱之然止扵司闗鄭鍔周禮觧義中興藝文志周禮一經說者僅一二家又多舛或鑿淳熈中鍔為觧義詳制度眀經㫖學者宗其書周禮綱目八卷摭說一卷陳氏曰紹興府教授括蒼林椅竒卿撰嘉定初上之朝鶴山周禮折衷二卷陳氏曰樞宻臨邛魏了翁華父之門人稅與權所録條列經文附以傳注鶴山或時有所發眀止扵天官餘未及凡二卷禮記二十卷鄭𤣥注鼂氏曰漢戴聖纂鄭康成注即所謂小戴者也此書乃孔子沒後七十子之徒所共録中庸孔伋作緇衣公孫尼子作王制漢文帝時博士作河間獻王集而上之劉向校定二百十四篇大戴既刪八十五篇小戴又刪四十六篇馬融傳其學又附月令眀堂義樂記合四十九篇陳氏曰漢儒輯録前記固非一家之言大抵駁而不純獨大學中庸為孔氏之正傳然初非專為禮作也唐魏徵嘗以小戴禮綜彚不倫更作類禮二十篇葢有以也夾漈鄭氏曰戴聖為九江太守行治多不法何武為揚州刺史聖懼自免後為博士毁武扵朝廷武聞之終不揚其惡而聖子賔客為盗繋廬江聖自以子必死武平心決之卒得不死自是聖慚服武每奏事至亰師聖未嘗不造門謝恩戴聖為禮家之宗身為贓吏而子為賊徒可不監哉學者當先其言而已矣朱子語録曰禮記有說宗廟朝廷說得逺後雜亂不切扵日用若欲觀禮須將禮記節出切扵日用常行者如玉􅇨内則曲禮少儀看學禮先看儀禮儀禮無全書其全皆是講說如周禮王制是制度之書大學中庸是說理之書儒行樂記非聖人之書乃戰國賢士為之有許順之者說人謂禮記是漢儒說恐不然漢儒最純者莫如董仲舒仲舒之文最純者莫如三䇿何嘗有禮記中說話来如樂記所謂天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉仲舒如何說得到這裏想必古来流傳得此箇文字如此禮記有王肅注煞好太史公樂書載樂記全文注家兼存得王鄭如陸農師禮象陳用之禮書亦該博陳氏勝陸氏如後世禮樂全不足取但諸儒議禮頗有好處此不可廢當别類作一書六朝人多精扵此必竟當時此學自專門名家朝廷有禮事便用此等人議之鄭康成是个好人考禮名數大有功王肅議禮必反鄭𤣥禮記正義七十卷鼂氏曰唐孔頴逹等貞觀中奉詔撰其序稱大小二戴共氏而分門王鄭兩家同經而異注爰従晉宋逮扵周隋傳禮業者江左尤盛其為義疏者甚多唯皇甫侃熊安生見扵世然皇甫為勝今据以為本其有不備則以熊氏補焉朱子語録問禮記古注外無以加否答曰鄭注自好看注看疏自可了禮記外傳四卷鼂氏曰唐成伯璵撰義例兩卷五十篇名數兩卷六十九篇雖以禮記為目通以三禮言之劉眀素序張幼倫注唐月令一卷鼂氏曰唐眀皇刪定李林甫等注序謂吕氏定以孟春日在營室不知氣逐閏移節隨斗建扵是重有刪定俾林甫同陳希烈等八人為之觧國朝景祐初改従舊文由是别行宋三朝國史藝文志初禮記月令篇第六即鄭注唐眀皇改黜舊文附益時事號御刪月令升為首篇集賢院别為之注厥後學者傳之而釋文義疏皆本鄭注遂有别注小疏者詞頗卑鄙淳化初判國子監李至請復行鄭注詔兩制三館祕閣集議史館修撰韓丕張佖胡旦條陳唐本之失請如至奏餘皆請且如舊以便宣讀時令大中祥符中龍圖閣待制孫奭又言其事羣論復以改作為難遂罷石經禮記二十卷鼂氏曰偽蜀張紹文所書不載年月經文不闕唐諱當是孟知祥僣位之後也首之以月令題云御刪定葢眀皇也林甫等注葢李林甫也其餘篇第仍舊議者謂經禮三百曲禮三千毋不敬一言足以蔽之故先儒以為首孝眀肆情變亂甚無謂也眀道中庸觧一卷鼂氏曰程顥撰陳瓘得之江濤濤得之曾天隐天隐得之傅才孺云李丙所藏楊中立中庸觧一卷鼂氏曰楊時撰時載程正叔之言曰不偏之謂中不易之謂庸葢亦猶王氏之說也鼂以道中庸觧一卷鼂氏曰叔父詹事公撰近世學者以中庸為二事雖程正叔亦然故説是書者皆穿鑿而二之扵是本諸胡先生司馬温公程眀道張横渠王肅鄭𤣥作是傳焉游氏中庸觧一卷鼂氏曰游酢定夫亦程正叔門人中庸大學廣義一卷陳氏曰司馬光撰芸閣禮記觧十六卷鼂氏曰吕大臨與叔撰與叔師事程正叔禮學甚精博中庸大學尤所致意也陳氏曰按館閣書目作一卷止有表記冠昏鄉射燕聘義喪服四制凡八篇今又有曲禮上下中庸緇衣大學儒行深衣投壺八篇此晦庵朱氏所傳本刻之臨漳射垜書坊稱芸閣吕氏觧即其書也讀書目始别載之方慤禮記觧二十卷陳氏曰政和三年表進自為之序以王氏父子獨無觧義乃取其所撰三經義及字說申而眀之著為此觧由是得上舎出身其所觧文義亦眀白朱子語録曰方馬二觧合當參考儘有說得好處不可以其新學而黜之馬希孟禮記觧七十卷陳氏曰希孟字彦醇未詳何人亦宗王氏禮記新義宋中興藝文志陸佃撰亦牽扵字說宣和末其子宰上之破禮記中興藝文志夏休以禮記多漢儒雜記扵義有未安者乃援禮經以破之然中庸大學實孔氏遺書也燕山中庸說一卷陳氏曰太中大夫河南郭忠孝立之撰張無垢中庸說六卷大學說二卷少儀觧附朱子雜學辯曰張公始學扵龜山之門而逃儒以歸扵釋既自以為有得矣而其釋之師語之曰左右既得欛柄入手開道之際當改頭換面隨宜說法使殊塗同歸則住世出世間兩無遺恨矣然此語亦不可使俗軰知將謂實有恁麽事也見大慧禪師與張侍郎書今不見扵語録中葢其徒諱之也用此之故凡張氏所論著皆陽儒而隂釋其離合出入之際務在愚一世之耳目而使之恬不覺悟以入乎釋氏之門雖欲復出而不可得本末指意略如其所受扵師者其二本殊歸葢不特荘周出扵子夏李斯原扵荀卿而已也竊不自揆嘗欲為之論辨以暁當世之惑而大本既殊無所不異因覧其中庸說姑掇其尤甚者什一二著扵篇其他如論語孝經大學孟子之說不暇遍為之辨大抵怱遽急廹其所以為說皆此書之類也吕氏大學觧朱子曰吕氏之先與二程夫子遊故其家學最為近正然未能不惑扵浮屠老子之說故其末流不能無出入之弊按正獻公神道碑載公進讀上語及釋老虚寂之㫖公曰堯舜雖知此乃以知人安民為急此其所差之端也堯舜之道精粗本末一以貫之其所知者似與釋老不相似也以為所知在此而所急在彼是二本也本原如此則其末流之弊豈可勝道哉今論其一二以補其闕葢其他說之近正者則君子猶有取焉中庸集觧二卷陳氏曰會稽石墪子重集録周敦頥程顥程頥張載吕大臨謝良佐游酢楊時侯仲良凡十家之說晦庵為之序大學章句或問中庸章句或問各三卷陳氏曰朱熹撰其說大略宗程氏會衆說而折其中又記所辯論取舎之意别為或問以附其後皆自為之序至大學則頗補正其脫簡闕文朱子語録曰大學一書有正經有或問看来看去只看注觧便了久之又只看正經便了又久之自有一部大學在我胷中而正經亦不用矣然不用某許多工夫亦看某底不出不用聖賢許多工夫亦看聖賢底不出伊川舊日教人看大學那時未有觧而今有注觧覺大叚分曉了只在仔細去看大學觧本文未詳者扵或問中詳之或問未要看俟有疑處方可去看又曰中庸一篇某妄以己意分其章句是書豈可以章句求哉然學者之扵書未有不得扵辭而能通其意者中庸自首章以下多對說將来直是整齊某舊讀中庸以為子思做又時復有个子曰字讀得熟後方知是子思參夫子之說著為此書自是沈潜反覆遂漸得其㫖趣定得今章句擺布得来直是恁細宻中庸全在章句其或問中皆是辯諸家說恐未必是問中庸編集得如何曰便是難說縁前軰諸公說得多了其間儘有差舛處又不欲盡剥難他底所以難下手不比大學都未有人說中庸輯略二卷陳氏曰晦庵既為章句復取石子重所集觧刪其繁亂名以輯略其取舎之意則或問詳之曲禮口義二卷學記口義二卷陳氏曰戴溪撰中庸說一卷陳氏曰項安世撰禮記集說一百六十卷陳氏曰直秘閣崑山衛湜正叔集諸家說自注疏而下為一書各著其姓氏寳慶二年表上之由是寓直中祕魏鶴山為作序孔子閒居講義一卷陳氏曰慈湖楊簡敬仲撰大戴禮十三卷鼂氏曰漢戴徳纂亦河間王所獻百三十一篇劉向校定又得眀堂陰陽記三十三篇徳刪其煩重為八十五篇今書止四十篇其篇目自三十九篇始無四十三四十四四十五六十一四篇有兩七十四葢因舊闕録之每卷稱今卷第幾題曰九江太守戴徳撰按九江太守聖也徳為信都王太傅葢後人誤題陳氏曰漢信都王太傅戴徳延君九江太守戴聖次君皆受禮扵后蒼謂大小戴禮者也漢初以来迄扵劉向校定中書諸家所記殆數百篇戴徳刪其煩重為八十五篇聖又刪為四十九篇相傳如此今小戴四十九篇行扵世而大戴之書所存止此自隋唐志所載卷數皆與今同而篇第乃自三十九而下止扵八十一其前闕三十八篇末闕四篇所存當四十三而扵中又闕第七十二複出一篇實存四十篇意其闕者即聖所刪邪然哀公問投壺二篇與今禮記文不異他亦間有同者保傅𫝊世言賈誼書所從出也今考禮察篇湯武秦定取舎一則盡出誼疏中反若取誼語勦入其中者公符篇至録漢昭帝冠辭則此書殆後人好事者采獲諸書為之故駁雜不經決非戴徳本書也題九江太守廼戴聖所歴官尤非是朱子語録曰大戴禮無頭其篇目缺處皆是元無非小戴所去取其間多雜偽亦有最好處然多誤難讀大戴禮本文多錯注尤舛誤或有注或無注皆不可曉武王諸銘有直做得巧了切題者如鑑銘是也亦有絶不可曉者想他古人只是述戒懼之意而隨所在寫記以自警省耳不似今人為此銘便要就此物上説得親切其間亦有切題者如湯盤銘之類至扵武王盥盤銘則又切似个船想只是因水起意然恐亦有錯雜處大戴禮冗雜其好處已被小戴採摘来做禮記了然尚有零碎好處在淳問大戴保傅篇多與賈誼䇿同如何曰保傅中說秦無道之暴此等語必非古書乃後人採賈誼策為之亦有孝昭冠詞周氏西􅅢渉筆曰大戴禮公冠篇載漢昭帝冠辭及郊天祀地迎日三辭皆典馴簡樸有史佚祭公風味班固徒取麟馬以下夜祠諸篇文詞峭羙者入禮樂志此皆不録可恨也三禮義宗三十卷崇文縂目梁眀威將軍崔靈恩撰其書合周禮儀禮二戴之學敷述貫穿該悉其義合一百五十六篇推衍閎深有名前世云鼂氏曰靈恩武城人少篤學尤精禮傳仕魏歸梁為博士甚拙樸及觧析經理盡極精致正始之後不尚經術咸事虚談公卿士大夫葢取文具而已而靈恩經眀行修製義宗詩易春秋百餘卷終桂州刺史此書在唐一百五十篇今存者一百二十七篇凡兩戴王鄭異同皆援引古誼商略其可否為禮學之最陳氏曰凡一百四十九條其説推本三禮參取諸儒之論博而覈矣本傳四十七卷中興書目一百五十六篇皆與今卷篇數不同書目又云慶歴中髙陽許聞誨為之序家本亦無此序也禮略十卷崇文縂目唐亰兆府櫟陽尉杜蕭撰採古經義下逮當世概舉沿革附禮見文以其言約㫖詳故自題略云禮粹二十卷崇文總目唐寧州參軍張頻纂凡一百三十五條直鈔崔氏義宗之説無他異聞喪禮極義一卷崇文總目唐商价集雜序先儒五服輕重之論然首末不倫三禮圗二十卷鼂氏曰聶崇義周世宗時被㫖纂集以鄭康成阮諶等六家圖刋定皇朝建隆二年奏之賜紫綬犀帶奨其志學竇儀為之序有云周世宗暨今皇帝恢堯舜之典則總夏商之禮文命崇義著此書不以世代遷改有所抑揚近古云陳氏曰葢用舊圖本六參定故題集注詔國學圗扵先聖殿後北軒之屋壁至道中改作扵論堂之上以牋代壁判監李至為之記吾鄉郡庠安定胡先生所創論堂繢三禮圖當是依倣亰監今堂壊不存矣編禮鼂氏曰皇朝吕大臨編三卷以士喪禮為本取三禮附之自始死至祥練各以類分其施扵後學者甚恵尚恨所編者五禮中凶禮而已禮象十五卷陳氏曰陸佃撰以改舊圖之失其尊爵彛舟皆取公卿家及祕府所藏古遺噐與聶圖大異戴岷隐分教吾鄉作閣齋館池上畫此圖扵壁而以禮象名閣與論堂禮圖相嫓云太常禮書一百五十卷鼂氏曰皇朝陳祥道用之撰祥道元祐初以左宣義郎仕太常博士觧禮之名物且繪其象甚精博朝廷聞之給札繕寫奏御今世傳止五十卷予愛之而恨其􅇅少得是本扵叙州通判盧彭年家其象且以五采飾之扵是始見其全書云陳氏曰論辯詳博間以繪畫扵唐代諸儒之論近世聶崇義之圖或正其失或補其􅇅元祐中表上之丁丑三禮辯中興藝文志李心傳撰以儀禮之說與鄭氏辨者八十四周禮之説與鄭氏辯者二百二十六皆有据大戴之書疑者三十小戴之書疑者一百九十八鄭氏之注疑者三百七十五亦各辯其所以而詳識之夾漈鄉飲禮七卷陳氏曰鄭樵撰計七卷喪服加減崇文總目凡一卷不著撰人名氏雜記服制增損文無倫次周公諡法一卷崇文總目不著撰人名氏諡法始扵周學者録之因託以名篇鼂氏曰其序曰維周公旦太公望聞嗣王發建功扵牧野及終將葬乃制諡計一百九十餘條七諡隋志附論語類中今遷扵此春秋諡法一卷崇文總目不著撰人名氏其法差多扵周公諡法鼂氏曰與周公諡法相類而小有異同文獻通考卷一百八十一
