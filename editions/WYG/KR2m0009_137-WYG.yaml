body:
  text: 文獻通考卷一百三十七鄱陽馬端臨貴與著樂考十絲之屬雅部陳氏樂書曰絲飾物而成聲其卦則離其方則南其時則夏其聲尚宫其律㽔賓其風景其音哀夏至之氣也先王作樂弦之以為琴瑟之屬焉盖琴瑟之樂君子所常御其大小雖不同而其聲應一也故均列之堂上焉樂書琴瑟上論曰古者琴瑟之用各以聲類所宜雲和陽地也其琴瑟宜於圜丘奏之空桑隂地也其琴瑟宜於方澤奏之龍門人功所鑿而成也其琴瑟宜於宗廟奏之顓帝生處空桑伊尹生於空桑禹鑿龍門皆以地名之則雲和豈禹貢所謂雲土者歟瞽矇掌鼓琴瑟詩鹿鳴鼓瑟鼓琴書曰琴瑟以詠大傳亦曰大琴練絃達越大瑟朱絃達越爾雅曰大琴謂之離大瑟謂之灑由是觀之琴則易良瑟則静好一於尚宫而已未嘗不相湏用也明堂位曰大琴大瑟中琴小瑟四代之樂器也古之人作樂聲應相保而為和細大不踰而為平故用大琴必以大瑟配之用中琴必以小瑟配之然後大者不陵細者不抑五聲和矣鄉飲酒禮五人皆在左何瑟後首挎越燕禮小臣左何瑟面執越樂記曰清廟之瑟朱絃而疏越詩曰並坐鼓瑟何不日鼓瑟傳言趙王為秦鼓瑟皆不及琴者以瑟見琴也舜作五絃之琴歌南風之詩而不及瑟者以琴見瑟也後世有雅琴雅瑟頌琴頌瑟豈其聲合於雅頌邪琴一也或謂伏羲作之或謂神農作之或謂帝俊使晏龍作之瑟一也或謂朱襄氏使士達作之或謂伏羲作之或謂神農使晏龍作之豈皆有所傳聞然邪琴瑟中論曰古之論者或謂朱襄氏使士達制為五絃之瑟鼓捜又判之為十五絃舜益之為二十三絃或謂大帝使素女鼓五十絃瑟帝悲不能禁因破為二十五弦郭璞釋大瑟謂之灑又有二十七弦之說以理考之樂聲不過乎五則五弦十五弦小瑟也二十五弦中瑟也五十弦太瑟也彼謂二十三弦二十七弦者然三於五聲為不足七於五聲為有餘豈亦惑於二變二少之說而遂誤邪漢武之祠太乙后土作二十五弦瑟今大樂所用亦二十五弦盖得四代中瑟之制也荘周曰夫或改調一弦於五音無當也鼓之二十五弦皆動其信矣乎聶崇義禮圗亦師用郭璞二十三弦之說其常用者十九弦誤矣盖其制前有柱則清従其柱則濁有八尺一寸廣一尺八寸者有七尺二寸廣尺八寸者有五尺五寸者豈三等之制不同歟然詩曰椅桐梓漆爰伐琴瑟易通冬日至鼓黄鍾之瑟用槐八尺一寸夏日至用桑五尺七寸是不知羙檟槐桑之木其中實而不虚不若桐之能發金石之聲也昔仲尼不見孺悲鼓瑟而拒之趙王使人於椘鼓瑟而遣之其拒也所以愧之不屑之教也其遣也所以諭之不言之戒也宋朝太常瑟用二十五絃其二均之聲以清中相應䨇彈之第一弦黄鍾中聲第十三弦黄鍾清應其按習也令左右手互應清正聲相和赤依鍾律擊數合奏其制可謂近古矣誠夲五音互應而去四清先王之制也二均二節聲於瑟聲十二清聲十二極清一弦象琴第一揮太抵於瑟半身設柱子右手彈中聲十二左手彈清聲十二其律並同第一弦大吕中第十四弦大吕清第三弦太蔟中第十五弦太蔟清第四弦夾鍾中第十六弦夾鍾清第五弦姑洗中第十七弦姑洗清第六弦仲吕中第十八弦仲吕清第七弦蕤賓中第十九弦蕤賓清第八弦林鍾中第二十弦林鍾清第九弦夷則中第二十一弦夷則清第十弦南呂中第二十二弦南呂清第十一弦無射中第二十三弦無射清第十二弦應鍾中第二十四弦應鍾清臣嘗考之虞書琴瑟以詠則琴瑟之聲所以應歌者也歌者在堂則琴瑟亦宜施之堂上矣竊觀聖朝郊廟之樂琴瑟在堂誠合古制紹聖初太樂丞葉防乞宫架之内復設琴瑟豈先王之制哉琴瑟下論曰琴之為樂所以詠而歌之也故其别有暢有操有引有吟有弄有調堯之神人暢為和樂而作也舜之思親操為孝思而作也襄陽會稽之類夏后氏之操也訓佃之類商人之操也離憂之類周人之操也謂之引若魯有關雎引衛有思歸引之類也謂之吟若箕子吟夷齊吟之類也謂之弄若廣陵弄之類也謂之調若子晉調之類也黄帝之清角齊桓之號鐘椘荘之繞梁相如之綠綺蔡邕之焦尾以至玊床響泉韻磬清英怡神之類名號之别也吟木沉散抑抹剔操擽擘倫齡綽璅之類聲音之法也暢則和暢操則立操引者引說其事吟者吟詠其事弄則弄習之調則調理之其為聲之法十有三先儒之說詳矣由是觀之琴之於天下合雅之正樂治世之和音也得其粗者足以感神明故六馬仰秣者伯牙也鬼舞於夜者賀韜也得其妙者㡬與造化俱矣故能易寒暑者師襄也召風雲者師曠也小足以感神明大足以奪造化然則琴之為用豈不至矣哉宋中興樂志論曰八音之中金石竹匏土木六者皆有一定之聲革為燥濕所薄絲有弦柱緩急不齊故二者其聲難定鼓無當於五聲此不復論惟絲聲備五聲而其變無窮五絃作於虞舜七絃作於周文武此琴制之古者也厥後増損不一宋朝始制二絃以象天地謂之兩儀琴毎絃各六柱又為十二絃以象十二律其倍應之聲靡不畢備太宗因大樂雅琴加為九絃按曲轉入大樂十二律清濁互相合應大晟樂府嘗罷一三七九惟存五絃謂其得五音之正最優於諸琴也今復俱用大常琴制其長三尺六寸三百六十分象周天之度也姜䕫樂議分琴為三凖自一暉至四暉謂之上凖上凖四寸半以象黄鍾之子律自四暉至七暉謂之中凖中凖九寸以象黄鍾之正律自七暉至龍齦謂之下凖下凖一尺八寸以象黄鍾之倍律三凖各具十二律聲按絃附木而取然湏轉絃合夲律所用之字若不轉絃則誤觸散聲落别律矣毎一絃各具三十六聲皆自然也分五七九絃琴各述轉絃合調圗五絃琴圗說曰琴為古樂所用者皆宮商角徴羽五音故以五絃散聲配之其二變之聲惟用古清商謂之側弄不入雅樂七絃琴圗曰七絃散而扣之則間一絃於第十暉取應聲假如宫調五絃十暉應七絃散聲四絃十暉應六絃散聲二絃十暉應四絃散聲大絃十暉應五絃散聲惟三絃獨退一暉於十一暉應五絃散聲古今無知之者竊謂黄鍾大吕並用慢角調故於大絃十一暉應三絃散聲太蔟夹鍾並用清商調故於二絃十二暉應四絃散聲姑洗仲呂蕤賓並用宫調故於三絃十一暉應五絃散聲林鍾夷則並用慢宫調故於四絃十一暉應六絃散聲南呂無射應鍾並用蕤賓調故於五絃十一暉應七絃散聲以律長短配絃大小各有其序九絃琴圗說曰絃有七有九實即五絃七絃倍其二九絃倍其四所用者五音亦不以二變為散聲也或欲以七絃變五音二變以餘兩絃為倍若七絃分配七音則是今之十四絃也聲律訣云琴瑟齪四者律法上下相生也若加二變則於律法不諧矣或曰如此則琴無二變之聲乎曰附木取之二變之聲固在也合五七九絃琴總述取應聲法分十二律十二均每聲取絃暉之應皆以次列朱子嘗與學者共講琴法其定律之法十二律並用太史公九分七法為凖損益相生分十二律及五聲位置各定按古人以吹管聲傳於琴上如吹管起黄鍾則以琴之黄鍾聲合之聲合無差然後以次徧合諸聲則五聲皆正唐人紀琴先以管色合字定宫絃乃以宫絃下生徵徵上生商上下相生終於少商下生者隔二絃上生者隔一絃取之凡絲聲皆當如此今人茍簡不復以管定聲其髙下出於臨時非古法也調絃之法散聲隔四而得二聲中暉亦如之而得四聲八暉隔三而得六聲九暉按上者隔二而得四聲按下者隔一而得五聲十暉按上者隔一而得五聲按下者隔二而得四聲毎疑七絃隔一調之六絃皆應於第十暉而第三絃獨於第十一暉調之乃應及思而得之七絃散聲為五聲之正而大絃十二律之位又衆絃散聲之所取正也故逐絃之五聲皆自東而西相為次第其六絃會於十暉則一與三者角與散角應也二與四者徴與散徵應也四與六者宫與散少宫應也五與七者商與散少商應也其第三第五絃會於十一暉則羽與散羽應也義各有當初不相湏故不同會於一暉也旋宫諸調之法旋宫古有随月用律之說今乃謂不必轉軫促絃但依旋宫之法而抑按之恐難如此泛論當每宫指㝎各以何聲取何絃何唱各以何絃取何律為均乃見詳實又以禮運正義推之則毎律各為一宫每宫各有五調而其毎調用律取聲亦各有法此為琴之綱領而說者罕乃缺典也當為一圖以宫統調以調統聲令賓主次第各有條理乃先作三圗一各具琴之形體暉絃尺寸散聲之位二附按聲聲律之位三附泛聲聲律之位列於宫調圗前則覽者曉然可為萬世法矣大琴中琴小琴陳氏樂書曰八音以絲為君絲以琴為君而琴又以中暉為君是故君子常御不離乎前非若鐘鼓陳於堂下列於縣虡也以其大小得中而聲音和大聲不喧譁而流慢小聲不湮滅而不聞固足以感人善心禁人邪意一要宿中和之域而已夫作五絃之琴以歌南風以合五音之調實始於舜盖南風生養之氣也琴夏至之音也舜以生養之徳播夏至之音始也其親底豫而天下化終也其親底豫而天下之為父子者定然則所謂琴音調而天下治無若乎五音者豈不在兹乎盖五絃之琴小琴之制也而倍之而為十絃中琴之制也四倍之而為二十絃大琴之制也眀堂位曰大琴中琴四代之樂也爾雅大琴謂之離以四代推之二琴之制始於有虞眀矣次大琴古者大琴二十絃次者十五絃其絃雖多少不同要之本於五聲一也雅琴陳氏樂書曰西漢趙定善鼓雅琴為散操東漢劉琨亦能彈雅琴知清角之操則雅琴之制自漢始也宋朝太宗皇帝因太樂雅琴更加二絃召錢堯卿按譜以君臣文武禮樂正民心九絃按曲轉入太樂十二律清濁互相合應御製韶樂集中有正聲翻譯字譜又令鈞容班部頭任守澄并教坊正部頭花日新何元善等註入唐来燕樂半字譜凡一聲先以九絃琴譜對大樂字并唐来半字譜並有清聲今九絃譜内有大定樂日重輪月重眀三曲并御製大樂乾安曲景祐韶樂集中太平樂一曲譜法互同他皆倣此可謂善應時而造者也誠増一絃去四清聲合古琴之制善莫大焉仲呂大定樂一百三十字南呂角日重輪一百四十一字月重明一百一十一字無射宫乾安曲四十八字太宗因前代七絃加二絃曰清角清徵為九絃一絃黄鍾二絃大呂三絃太蔟四絃夹鍾五絃姑洗六絃仲呂七絃蕤賓八絃林鍾按上為夷則九絃南呂按上為無射應鍾令随編鍾按習毎一擊一彈各依節奏焉十二絃琴宋朝嘗為十二絃琴應十有二律倍應之聲靡不悉備盖亦不失先王制作之實也兩儀琴二絃毎絃各六柱宋朝初制兩儀琴琴有二絃絃各六柱合為十二其聲洪迅而荘重亦一時之制也七絃琴陳氏樂書曰古者造琴之法削以嶧陽之桐成以檿桑之絲徽以麗水之金軫以崑山之玉雖成器在人而音含大古矣盖其制長三尺六寸六分象朞之日也廣六寸象六合也絃有五象五行也腰廣四寸象四時也前廣後狭象尊卑也上圎下方象天地也暉十有三象十二律也餘一以象閏也其形象鳳而朱鳥南方之禽樂之主也五分其身以三為上二為下参天兩地之義也司馬遷曰其長八尺一寸正度也由是觀之則三尺六寸六分中琴之度也八尺一寸大琴之度也或以七尺二寸言之或以四尺五寸言之以為大琴則不足以為中琴則有餘要之皆不若六八之數為不失中聲也至於絃數先儒謂伏羲蔡邕以九孫登一郭璞以二十七頌琴以十三掦雄謂陶唐氏加二絃以會君臣之恩桓譚以為文王加少宫少商二絃釋知匠以為文王武王各加一以為文絃武絃是為七絃盖聲不過五小者五絃法五行之數也中者十弦大者二十絃法十日之數也一絃則聲或不備九絃則聲或太多至於全之為二十七半之為十三皆出於七絃倍差弱於二變二少以應七始之數也為是說者盖始於夏書而曼衍於左氏國語是不知夏書之在治忽有五聲而無七始豈為左氏者求其説不得而遂傅會之邪故七絃之琴存之則有害古制削之則可也宋朝太常琴制其長三尺六寸三百六十分象周天之度絃有三節聲自焦尾至中暉為濁聲自中暉至第四暉為中聲上至第一暉為清聲故樂工指法按中暉第一絃黄鍾按上為大呂二絃太蔟按上為夹鍾第三絃姑洗按上為仲呂第四絃蕤賓單彈第五絃為林鍾按上為夷則第六絃為南呂按上為無射第七絃為應鍾按上為黄鍾清凡此各随鍾律彈之莫不合中呂之商中太平之曲非無制也誠損二絃去四清合先王中琴之制則古樂之發不過是矣唐李冲操琴通中呂黄鍾無射三宫之説盖未究其夲矣先儒之論有宫聲又有變宫聲已失尊君之道而琴又有少宫少商之弦豈古人祝夀之意哉其害理甚矣大瑟中瑟小瑟次小瑟世夲云庖犧氏作五十絃黄帝使素女鼓瑟哀不自勝乃破為二十五絃具二均聲爾雅大瑟謂之灑禮圖舊云雅瑟長八尺一寸廣一尺八寸二十三絃其常者十九絃頌瑟長七尺二寸廣尺八寸二十五絃盡用也易通卦驗曰人君冬至日使八能之士鼓黄鍾之瑟瑟用槐木長八尺一寸夏至日瑟用桑木長五尺七寸槐取氣上也桑取氣下也容齋洪氏随筆曰李商隠詩云錦瑟無端五十絃説者以為錦瑟者令狐丞相侍兒小名此篇皆寓言而不知五十絃所起劉昭釋名箜篌云師延所作靡靡之樂盖􅆰國之侯所作也段安節樂府録云箜篌乃鄭衞之音以其亡國之聲故號空國之侯亦曰坎侯吳兢觧題云漢武依琴造坎侯言坎坎應節也後訛為箜篌予按史記封禪書云漢公孫卿為武帝言太帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃於是武帝益召歌兒作二十五絃及箜篌應劭曰帝令樂人侯調始造此器前漢郊祀志備書此事言空侯瑟自此起顔師古不引劭所註然則二樂夲始曉然可考雖劉吴博洽亦不深究且空元非國名其說尤穿鑿也初學記太平御覽編載樂事亦遺而不書荘子言魯遽調琴二十五絃皆動盖即此云續漢書云靈帝胡服作箜篌亦非也姜夔定瑟之制桐為背梓為腹長九尺九寸首尾各九寸隠間八尺一寸廣尺有八寸岳崇寸有八分中施九梁皆象黄鍾之數梁下相連使其聲冲融首尾之下為兩穴使其聲條達是傳所謂大瑟達越也四隅刻雲以縁其武象其出於雲和漆其壁與首尾腹取椅桐梓漆之全設二十五絃絃一柱崇二寸七分别以五色五五相次蒼為上朱次之黄次之素與黝又次之使肄習者便於擇絃絃八十一絲而朱之是謂朱絃其尺則用漢尺凡瑟絃具五聲為均凡五均其二變之聲則柱後折角羽而取之五均凡三十五聲十二律六十均四百二十聲瑟之能事畢矣頌瑟陳氏樂書曰瑟者閉也所以懲忿窒慾正人之徳也故前其柱則清却其柱則濁按三禮圖經瑟七尺二寸廣尺八寸二十五絃並用也其合古制歟尸子曰夫瑟二十五絃其僕人鼓之則為笑賢者以其義鼓之欲樂則樂欲悲則悲雖有暴亦不為之變誠有味其言也琴操陳氏樂書曰自三代之治既往而樂經亡矣樂經亡則禮素而詩虚是一經缺而三經不完也今夫琴者君子常御之樂盖所以樂心而適情非為憂憤而作也茍遇乎物可詠者詠之可傷者傷之大為典誥小為雅頌而諷刺勸戒靡不具焉其利於教也大矣古之明王君子多親通焉故堯有神人暢舜有思親操襄陵始禹訓佃始湯以至文王拘幽周公越裳成王儀鳳老聃列仙伯牙之水仙懐陵孔子之將歸猗蘭曾子歸耕殘形之類大抵因時事而作豈為憂憤邪後世論之者過也降自唐虞迄於晉宋善琴者八十餘人周秦以前其聲傷質漢魏而下其音淺薄故漢末太師五曲魏初中散四弄其間聲含清側文質殊流吳弄清潤若長江緩流有國士之風蜀聲峻急若蹙浪奔濤有少年壯氣凡若此類不可勝數然世罕知音反以筝勢入琴譜錄雖存其亡益乎歩爾雅曰徒鼓琴謂之歩盖鼓琴而無章曲則徒鼓而已猶之舍車而徒也絲之屬胡部胡琴唐文宗朝女伶鄭中丞善彈胡琴昭宗末石潨善胡琴也琴一也而有胡漢之異特其制度殊耳奚琴奚琴胡中奚部所好之樂出於奚鼗而形亦類焉其制兩絃間以竹片軋之民間或用匏琴隋煬帝平林邑國獲扶南樂工及匏琴其制至陋不可用但以天竺樂傳寫其聲不齒樂部胡瑟弁韓國有瑟其形如筑彈之有音曲與胡琴類胡弄陳氏樂書曰越裳操者因越裳獻雉而作也趙師曹善鼓琴忉利天王子般遮彈之而聲聞舍利為之起舞焉摩訶兜勒張騫入西域所得者也晉椘人劉琨世為樂吏制胡笳五弄趙耶利所修者也胡笳四弄有上舞下舞上間絃下間絃明君所傳者也今夫彈操弄者前緩後急妙曲之分布也時中急後緩節奏之停歇也或疾打則聲如劈竹或緩挑則韻並風生亦有聲正厲而以指按殺亦有響絶而意猶未盡是以知聲不知音彈絃不彈意也陶潛嘗曰但取琴中意何勞絃上聲可謂深於琴者矣大箜篌小箜篌劉熙釋名曰箜篌師延所作靡靡之樂蓋空國之侯所存也後出桑間濮上師涓為晉平公鼓焉鄭衛分其地而有之因命滛樂為鄭衛焉或謂漢武使樂人侯暉作坎侯盖取其聲坎坎以應樂節後世聲訛為箜篌爾二説盖有所受之也舊說皆如琴制唐制似瑟而小其絃有七用木撥彈之以合二變故燕樂有大箜篌小箜篌音逐手起曲随絃成盖若鶴鳴之嘹唳玉聲之清越者也然非夷狄之制則鄭衛之音非燕樂所當用也或謂取其空中名之其臆説歟昔有白首翁溺於河其妻麗玊素善十三絃箜篌作為公無渡河曲以寄哀情唐咸亨初初第一部有張小子太和初有李齊臯及其女並善此伎教坊雖亦有人能者未有一二爾按箜篌或以為師延所作靡靡之樂盖鄭衛之滛聲也或以為漢武帝使樂人侯調作之以祠太一盖漢世郊廟之樂而非先王之雅樂也然俱不言来自胡中陳氏樂書以入胡部未知何據當考竪箜篌胡樂也其體曲而長其絃二十有二植抱於懐用兩手齊奏之俗謂竪箜篌亦謂之胡箜篌髙麗等國有竪箜篌卧箜篌之樂其引則朝鮮津卒樗里子髙所作也樗里子髙晨刺船有一白首狂夫披髪提壺亂流而渡其妻止之不能及竟溺死於是悽傷援琴作歌而哀之以象其聲故曰箜篌引漢靈帝好此樂後世教坊亦用焉卧箜篌酉陽雜俎魏髙陽王雍羙人徐月華能彈卧箜篌為明妃出塞聲有田僧超能吹笳為壮士歌項羽吟将軍崔延伯出師毎臨敵令僧超為壮士聲遂單騎入陣鳳首箜篌出於天竺伎也其制作曲頸鳳形焉扶婁髙昌等國鳳首箜篌其上頗竒巧也搊琵琶五絃傅元琵琶賦曰漢遣烏孫公主嫁昆彌念其行道思慕故使工人裁筝筑為馬上之樂今觀其器中虚外實天地象也盤圎柄直隂陽叙也柱有十二配律吕也四絃法四時也以方俗語之曰琵琶取其易傳於外國也風俗通曰以手琵琶因以為名曰推手前曰批引手却曰把杜贄曰秦苦長城之役百姓絃鼗而鼓之並未詳孰是其器不列四廂今清樂奏琵琶俗謂之秦漢子圎體修頸而小疑是絃鼗之遺制𫝊元云體圎柄直柱有十二其他皆兑上鋭下曲項形制稍大夲出胡中俗傳是漢制兼以兩制者謂之秦漢盖謂通用秦漢之法梁史稱侯景之害簡文也使太樂令彭雋賫曲項琵琶就帝飲則南朝似無曲項者五絃琵琶稍小盖北國所出舊彈琵琶皆用木撥彈之大唐貞觀中始有手彈之法今所謂搊琵琶者是也風俗通所謂以手琵琶之知乃非用撥之義豈上代固有搊之者手彈法近代已廢自裴洛兒始為之國史補曰趙璧之彈五絃人問其術璧曰始則心驅之中則神遇之終則天随之方吾浩然眼如耳耳如鼻不知五絃之為璧璧之為五絃也白樂天云人情重今多賤古古瑟有絃人不撫更従趙璧藝成来二十五絃不如五亦譎諫之道也大琵琶六絃小琵琶五絃琵琶之制刳桐絃絲而鼓之龜腹鳳頸熊據龍放其器則箜篌也宫調八十一旋宫三調而所樂非琴非瑟特變徴新聲而已唐眀皇悦之時有宦官使蜀得異木竒文琵琶以獻楊妃每奏於梨園諸王貴主並為琵琶弟子天寳之亂嘗奏是器於凝碧池上舊人李龜年徒能欷歔而已秦漢琵琶本出於胡人絃鼗之制圎體修頸如琵琶而小柱十有二惟不開目為異盖通用秦漢之法四絃四隔合散聲四隔聲十二縂二十聲唐貞元中有曺綱裴興奴並善其藝綱善運撥若風雨興奴長於攏撚時人謂綱有右手興奴有左手段安節門中又有樂吏楊志善此其姑尤妙自珍其藝誓死不傳志嘗竊聽彈弄私以鞋帶記其節奏因携樂就姑彈之姑大驚異悉傳其藝夫以一藝之精古人且重以傳之况有大於此者苟非其人其可輕授之㢤崑崙琵琶唐貞元中長安大旱詔移兩市祈雨街東有康崑崙琵琶號為第一手謂街西必無已敵也遂登樓彈一曲新翻調緑腰樂工進曲上令錄書要者巧以為名誤言綠腰也街西亦建一樓東市大誚之及崑崙度曲西樓出一女郎抱樂器亦彈此曲移在楓香調中妙絶入神崑崙驚駭請以為師女郎遂更衣出乃装嚴寺段師善夲也翌日徳宗召之加奨異常乃令崑崙彈一曲段師曰夲領何雜兼帶邪聲崑崙驚曰段師神人也徳宗令授崑崙段師奏曰且請崑崙不近樂器十數年使忘其夲領然後可教詔許之後果窮段師之藝矣蛇皮琵琶扶南髙麗龜兹疎勒西凉等國其樂皆有蛇皮琵琶以蛇皮為槽厚一寸餘鱗介具焉亦以楸木為面其掉撥以象皮為之圖其國王騎象象其精妙也近代以琵琶旋宫但歴均調不分清濁倍絃應律多非正聲華音所不取也屈茨琵琶後魏宣武以後酷嗜胡音其樂器有屈茨琵琶說者謂制度不存八音之器所不載以意推之豈琵琶為屈茨之形然邪卧筝搊筝彈筝筝秦聲也傅元筝賦序曰世以為蒙恬所造今觀其器上崇似天下平似地中空凖六合絃柱擬十二月設之則四象在鼓之則五音發斯乃仁智之器豈蒙恬亡國之臣能之哉今清樂筝並有十二絃也樂皆十二絃軋筝以片竹閏其絃而軋之彈筝用骨爪長寸餘以代之髙麗樂器用彈筝一搊筝一卧筝一自魏至隋並存其器至於制度之詳不可得而知唐平人女以容色選入内者教習琵琶五絃箜篌筝者謂之搊彈家開元初制聖夀樂令諸女衣五方色衣歌舞之宜春院為首尾搊彈家在行間効之而已絲之屬俗部頌琴十三絃柱如筝古之善琴者八十餘家各因其器而名之頌琴居其一焉其絃十有三其形象筝移柱應律宫縣用之合頌聲也齊桓公以鐘名之李汧公以韻磬名之是不知鐘磬各自有器非所以名琴也唐貞元中成都有雷生斵琴其業精妙天下鮮儷大中有賀若夷尤善此藝後為待詔彈一曲上嘉歎之賜緋衣至今號為賜緋調擊琴五絃以竹管承之梁栁世隆素善彈琴其子惲毎奏父曲居常感思因變其體備寫古調嘗賦詩未就誤以筆撫琴坐客以筯扣之惲驚其哀韻乃制為雅音而擊琴自此始矣盖其制以管承絃又以竹片約而束之使絃急而聲亮舉而擊之一為曲節江左有之非古制也一絃琴魏孫登彈一絃琴善嘯毎感風雷嵇康師之故其贊曰調一絃兮斡参寥廓嘯一曲兮能驟風雷江左樂用焉十三絃琴二十七絃琴古者制五絃之琴以應五聲琴之正也後世易之以二十七絃三倍七音之數琴之變也月琴五絃十三柱形似琵琶月琴形圎項長上按四絃十三品柱豪琴之徽轉絃應律晉阮咸造也唐太宗更加一絃名其絃曰金木水火土自開元中編入雅樂用之豈得舜之遺制歟素琴素瑟昔人祥之日常彈素琴素瑟矣陶淵眀不觧音律而畜素琴一張毎有酒輙撫弄以寄其意可謂達君子無故不徹琴瑟之意矣清角黄帝琴梁元纂要鳳凰趙后琴西京襍記號鐘齊桓公琴繞梁椘荘王琴綠綺司馬相如蔡琰琴清英揚雄琴焦尾蔡邕琴怡神謝莊琴寒玉石李勉琴和志李勉琴六合洞元琴石枕路氏琴落霞神女琴右諸琴求諸先王之制雖未盡合亦一代絶特之器也響泉韻磬國史補載李汧公勉者雅性好琴嘗斵桐為之多至數百張求之無不與之其中二者一名響泉一名韻磬張宏静嘗會名客觀鄭宥調二琴各置一榻動宫宫應動角角應真希代寳也荗因記之謂余家世所寳遭廣明之亂韻磬為火所毁響泉有洛僧自賊中挈去建中四年南康王韋臯在蜀得之用佉陀羅木換臨岳承弦命李陽冰篆之至大順中客游巴蜀見携響泉以行云然響泉之竒世或鮮鑒但以他琴齊奏彼音絶而此有餘韻世又有竊其名者茍以墨蹤篆文騐之則真偽覩矣按響泉韻磬為李勉所製號稱名琴唐史載之此段言其首尾尤詳但既曰廣明之亂為僧所取矣而又曰建中四年為韋臯所得夫建中先於廣明百餘年廣明所失之琴而曰至建中始得之何其繆也此據樂書所採國史補之説疑有誤當考荔枝荔枝性堅文直色正而音切生於南閩以芳實羙味閒裁之為琴非古也侍御史尉遅君與長樂馮端始為之馮宿述之百納琴唐汧公李勉嘗收桐孫之精者雜綴為之謂之百納琴用蛙殻為暉其間三面尤絶異之響泉韻磬也伏犧琴夫子琴靈開琴靈和琴自古善琴者八十餘家一十八様究之雅度不過伏犧大舜夫子靈開靈和五等而已餘皆求意新状竒終乖古制君子不貴也陳氏樂書琴制論曰琴之為器有龍池者以龍潛於此其出則興雲雨以澤物而人君之仁如之有鳳池者以南方之禽其浴則歸潔其身又人君之徳如之有軫池者亦曰軫柸以其急於發令且酒以成禮也池側有鳬掌二所以護軫之動而合制也鳳額下有鳳嗉一所以接喉舌而申令者也琴底有鳳足用黄楊木表其足色夲黄也臨岳若山岳峻極用棗木表其赤心也人肩者顧其臣有俯就随肩之象也鳳翅者左右翼之有副貳人主之象也龍脣者聲所由出也龍齦者吟所由生也龍口所以受絃而其鬢又所以飾之也鳳額所以制嗉而其臆又所以承之也總而言之琴長三尺六寸六分當期之日腹中天地二柱當心膂之任也天柱方厚七分居姑洗仲呂之界地柱方厚六分居南呂無射之界若定位小差近上則損上聲近下則損下聲當中心則其聲品節矣然斷製之妙蜀稱雷霄郭諒吳稱沈鐐張越霄諒清雅而沈細鐐越虚鳴而響亮唐明皇反蜀詔雷儼待詔襄陽馮昭亦善攻斵鬻之不售節使盧公鈞聞之見重受一張仍贈之詩自是馮氏門其屨滿矣㐲犠様長三尺九寸三分與後周大絫黍尺同舜様用古玉尺長三尺八寸二分孔子様長三尺六寸四分與周尺同秦始皇様用玉尺一池司馬相如同後晉尺長三尺八寸六分半一池後漢蔡邕用官尺長三尺七寸八分伯牙尺同築表尺長三尺七寸二分嵇康用魏中尺長三尺七寸一池齊東山様今尺長三尺三分梁千面用鐵尺三尺九寸三分無池隋百面用水平尺三尺六寸四分古軫用竹言鳳非梧桐不棲非竹實不食樂書琴暉論曰琴之為樂絃合聲以作主暉分律以配臣自臨岳際下至龍口銜絃以夷則為中界夷則至臨岳下際以仲呂為中界仲呂上至臨岳下際以太簇為中界其夾鍾姑洗㽔賓林鍾四暉即泛調取定又以太簇翻至龍口而暉數足矣自古十有三其一象閏盖用螺蚌為之近代用金玉瑟瑟水晶等寳未聞有絃繩之義盖所以示其明瑩以節奢縦而已俗傳暉作徽纒之徽誤矣樂書琴勢論曰古者手勢所象本蔡氏五弄趙即利所修也左大指象日右無名指象月右大指象大風右食指象青雲右中指象髙山右小指象地右無名指象下水龍行者指行如之虎行者指歩如之蟹行者倫指如之鸞行者轉指如之輕行者泛指是也儒父吟未接覆手是也亮生嘯小起手是也仙人笑下璅是也然彈琴之法必兩手相附其猶䨇鸞對舞兩鳳同翔要在附絃作勢而不在聲外揺指趙師彈琴未有一聲無法凡一弄之内清側殊途一句之中莫不隂陽𣲖潤至如椘明光白雪寄清調中彈椘清聲易水鳳歸林寄清調中彈椘側聲登隴望秦寄胡笳調中彈椘側聲竹吟風哀松露寄胡笳調中彈椘清聲若此之類非一可謂妙矣樂書琴聲論曰白虎通曰琴者禁止於邪以正人心豈其然乎今夫宫聲感人則其意懽和商聲感人則其意勁正角聲感人則其意奮厲徵聲感人則其意舒緩羽聲感人則其意和平故正直勇義者聽之則奮厲倍苦節孝行忠烈者聽之則感傷貧苦孀孤抱怨者聽之則感慨輕縦浮薄好喧囂者聴之則震戢然則修身治性反其天真有不在於是乎虞舜鼓之而五星見伯牙鼓之而駟馬仰秣瓠巴鼓之而魚躍潛藻以至師曠之致鶴舞賀韜之致鬼舞朱康之致畫動衛次翁之致異香降王敬伯之致神女現師襄之變易寒暑孫登之感動風雷然則動天地感鬼神有不在於是乎由此觀之古人所謂至樂通天地變四時又曰安國家治人民莫若乎五音豈不信歟關關嚶嚶春鳥聲也肅肅雍雍秋雁聲也巍巍湯湯山水聲也又曰古人之論琴聲有經有緯有従宫商角徵羽文武以上為經聲也黄鍾及大呂閏暉以上十三聲為緯聲也風雅聲隂陽聲武成聲吟詠聲談話聲姑息聲五音聲五調聲長樂聲胡笳聲止息聲吳聲蜀聲齊聲椘聲度絃摘聲蹙臑抑揚聲調絃齪掠聲長彈掉搦聲椘清側聲雅質側聲鷁扶輪指聲宛羙清聲髙望逺側聲凡此二十四聲為従聲也右七絃為正十三暉為副正副相應一絃合十五種升降同為九十一聲琴含太虚一氣運九十種聲如此其變亦已盡矣至於取聲之法又有木有汎有散有末有剔有櫟有擘有綽有璅有齪有倫以總之誠去四清二變以諧音律則琴音調而天下治矣左指按絃因指打聲振動左指令著面右指擊絃隐隐如雷是木聲也左微按絃右手撃絃泠泠然輕清是汎聲也左指不按不撃絃鏘鏘然鐘鐸是散聲左指按絃右指打聲抑蹙向前後令聲下惆悵是散聲右指向下末二三絃左指不著是末聲右指向上剔一絃是剔聲也右食指第一横文向上蹙櫟二三絃畢舉其食指合勢望天是櫟聲也右指南上擘一絃是擘聲也右指向下反剔一絃為綽聲也右指搯食指第二横文上向下擊下絃従寛至急可十餘聲為璅聲也右兩指各按其絃齊聲打為齪聲右兩指倫次其一絃為倫聲也樂書琴論曰衆樂琴之臣妾也廣陵曲之師長也古琴曲有歌詩五萹操二萹引九萹其歌詩一曰鹿鳴周大臣傷時在位而作也二曰伐檀魏國女閔傷怨曠而作也三曰騶虞召國女傷失嘉會而作也四曰鵲巢召國男悦貞女而作也五曰白駒衰世失朋友而作也其操十有二一曰将歸孔子之趙聞殺竇犢鳴而作也二曰猗蘭孔子傷不逢時而作也三曰龜山孔子因季桓受齊女樂而作也四曰越裳周公為其里譯来享而作也五曰拘幽文王拘於羑里而作也六曰岐山周人為太王而作也七曰履霜尹吉父子伯竒傷無罪而作也八曰雉朝飛牧犢子感䨇雉而作也九曰别鶴商陵牧子傷父母奪志而作也十曰殘形曾子夢狸而作也十一曰水仙伯牙為仙舞而作也十二曰懐陵伯牙為子期而作也其引一曰列女椘樊姬所作也二曰伯姬魯伯姬所作也三曰正女魯漆室女所作也四曰思歸衛女所作也五曰霹靂椘商梁遇風雨而作也六曰走馬樗里牧恭為感天馬而作也七曰箜篌樗里髙所作也八曰琴引秦屠門髙所作也九曰椘引椘龍邱子髙所作也自餘歌詩操引不可勝紀要其大致亦不出乎此然以詩推之鹿鳴之宴羣臣伐檀之刺貪鄙騶虞之羙王道成鵲巢之羙夫人之徳白駒刺宣王之不用賢與是説不類矣豈好事者妄取其名而詭為之説哉又曰昔人論琴弄吟引亦多矣有以孔子撰之者獲麟将歸畏匡厄陳之類也有以伯牙製之者望仙懐陵流水流泉之類也有以嵇康為之者長清短清長側短側之類也有以劉琨為之者登隴望秦竹吟風哀松露悲漢月是也胡笳五弄趙師所修有以明君為之者平調清調瑟調蜀調胡笳吳興杜瓊是也然觀琴調掠引有宫引商引角引徵引羽引平調引有林宫林商林角林徵林羽是琴音之用不出五聲而已後世兼以二變四清定絃數多寡其為智亦踈矣蕃瑟四絃雅瑟二十五絃三禮圖雅瑟長八尺一寸廣二尺八寸二十三絃其常用者十九絃其餘四絃謂之蕃蕃之為言羸也古者大瑟謂之灑長八尺一寸廣一尺八寸二十七絃其制與雅瑟大同而小異豈時異之制歟十九絃瑟二十七絃瑟黄鍾瑟易通卦驗冬至日使八能之士鼓黄鍾之瑟用槐八尺一寸為之夏至日用桑五尺七寸為之失古人用桐之意矣平清瑟隋何妥好音律留意管絃文帝令定鍾律於是作平清瑟之調聲宋朝雅樂作大吕黄鍾二均聲至妥始奏専用黄鍾詔下公卿議從之静瑟王子年拾遺録曰古之圎山有林木焉疾風震地而林木不動以其木為瑟故曰静瑟也寳瑟昔盧邁有寳瑟各直數十萬有寒玉石磬響泉和志之號由此觀之非特琴為然雖瑟之寳者亦不嫌其同名矣太一樂太一之制十二絃六隔大抵與琴相類合散聲十二隔聲七十二絃散聲應律吕以隔聲旋祖為宫含八十四調唐開元中司馬縚所進者也後世雅樂宫縣内用之然亦溺於七音之失矣天寳樂天寳樂形類石幢其絃十四而設柱黄鍾一均足正倍七聲移柱作調以應律天寳中任偃所進也舞者亦執焉繞梁繞梁之制大致與箜篌相似宋武帝大明中沈懐逺被徙廣州為之也懐逺亡其器亦絶矣䨇鳳琵琶唐天寳中宦者白秀正使西蜀囘獻䨇鳳琵琶以邏逤檀為槽温潤輝光隐若圭璧有金縷紅文蹙成䨇鳳貴妃每自奏於梨園音韻凄清飄如雲外殆不類人間諸王貴主競為貴妃琵琶弟子金縷琵琶銀柱金縷柄南齊褚淵善彈琵琶武帝時在東宮賜之金縷柄銀柱琵琶髙帝曲宴羣臣俾各効伎能淵彈琵琶王僧䖍彈琴沈文季歌子夜張恭兒舞王恭則拍張王儉曰臣無所觧唯知誦書因跪前誦相如封禪書直頸琵琶曲頸琵琶唐樂有大小琵琶之制今教坊所用乃其曲頸者非直頸也梁史稱侯景之亂使大樂令彭隽賫曲頸琵琶就簡文帝飲則南朝無是制明矣大忽雷琵琶小忽雷琵琶唐文宗朝内庫有琵琶二號大忽雷小忽雷時有内弟子鄭中丞常彈小忽雷偶匙頭脱送崇仁坊趙家修治適遭訓注之亂人莫知者已而中丞身殁權相舊吏梁厚夲賂樂匠得趙家所修治器毎至夜分輕彈後遇良辰飲於花下酒酣彈數曲有黄門過而聴之曰此鄭中丞琵琶聲也翌日達上聴文帝驚喜遣中使召之赦厚夲罪别加錫賚咸通中有米和郎田従道尤善此藝顧况有忽雷兒之歌盖生於此阮咸琵琶阮咸五絃此秦琵琶而頸長過之列十二柱焉唐武后時蒯明於古冡得銅琵琶晉阬咸所造也元亨中命工以木為之聲甚清徹頗類竹林七賢圗所造舊器因以阬咸名之亦以其善彈故也宋朝太宗舊制四絃上加一絃散呂五音呂絃之調有數法大絃為宮是正聲或為下徵或為下羽院類琴有濁中清三倍聲上隔四柱濁聲也應琴下暉中隔四柱中聲也類琴中暉下暉下隔四柱清聲也類琴上暉今太常樂工俗譜按中隔第一絃第一柱下按黄鍾第二柱下按大吕第二絃第一柱上按太蔟第一柱下按夾鍾第二柱上按姑洗第三柱下按仲呂第三絃第一柱上按㽔賓第一柱下按林鍾第二柱上按夷則第三柱下按南呂第四絃第一柱下按無射第五絃第一柱下按應鍾第二柱是黄鍾清三柱是大吕清第四柱是太蔟清所有夹鍾清在下隔也凡此夲應五音非有濁中清之别也今誠去四清聲以合五音則舜琴亦不是過也雲和琵琶雲和琵琶如筝用十二絃施柱彈之足黄鍾一均而倍六聲其首為雲象因以名之非周官雲和琴瑟之制也晉嵇康曰平和之人聽筝笛琵琶則形躁而志越聞琴瑟則體静而心閑信乎琵琶不如琴瑟逺矣唐貞觀末有裴神符者妙觧琵琶惟作聖蠻奴大鳳傾柸樂三曲聲度清羙太宗深愛之然亦世俗之樂也二絃琵琶四隔一孤柱釋名曰推手前曰琵引手却曰琶二絃形如琵琶四隔一孤柱合散聲隔八柱聲總十聲得聲生於日之數也六絃琵琶六絃之器状如琵琶而長四隔孤柱一合散聲六隔聲二十四柱聲一總三十一聲隔調應律唐天寳中史盛所作也七絃琵琶七絃之制形類阮咸而旁有少缺近取便身也絃十三隔孤柱一合散聲七隔聲九十一柱聲一總九十九聲唐開元中鄭喜子所進也八絃琵琶北齊李搔李徳忱素善音律因採諸聲别造一器號曰八絃時人稱其思理五絃筝十二絃筝十三絃筝風俗通曰筝五絃筑身而瑟絃并凉州筝形如瑟是也京房制五音凖如瑟十三絃實乃筝也阮瑀曰身長六尺應律數也絃有十二四時度也柱髙三寸三才具也二手動應日月務也故清者感天濁者感地而唐唯清樂筝十二彈之為鹿骨爪長寸餘代指他皆十三絃今教坊無十二絃者不知五絃合乎五音十二絃合乎十二律而十三絃其一以象閏也宋朝用十三絃筝第一絃為黄鍾中聲設柱並同瑟法然非雅部樂也十二中聲一絃黄鍾清聲二絃大呂三絃太蔟四絃夾鍾五絃姑洗六絃仲呂七絃㽔賔八絃林鍾九絃夷則十絃南呂十一絃無射十二絃應鍾十三絃黄鍾清聲銀装筝宋何承天幼好律歴之學尤善彈筝文帝賜之銀装筝一雲和筝唐清樂部有雲和筝盖其首象雲與雲和琵琶之制同于頓嘗令客彈琴其嫂聴而歎曰三分之中一分筝聲亦可謂知音矣鹿爪筝梁羊偘素善音律自造採蓮歌頗有新致伎妾列侍窮極奢靡有彈筝陸大喜者著鹿骨爪長七寸古之善筝者不獨此也郝孛謝常桓伊何承天之於晉辛宣仲之於宋皆世所謂善筝者也其得妙趣遺音者特雍門周而止耳故時人謂之雍門周能使喜者墮淚戚者起舞焉軋筝唐有軋筝以片竹潤其端而軋之因取名焉鼓筝説文曰筝鼓絃筑身樂也英雄記述袁紹使鼓筝於帳中燉煌實録述索承宗伯夷成善鼓筝又張華令郝生鼓筝史記李斯曰彈筝而歌者真秦之聲晉書曰桓伊撫筝而歌由此觀之筝之為樂真秦聲也古人非特鼓而彈之亦撫而歌之者矣昔魏文帝曰斬泗濵之梓以為筝則梓之為木非特以為琴瑟亦用之為筝者矣凡此非君子常御之樂魏之游椘常携以自随君子不取也撃筑筑之為器大抵類筝其頸細其肩圎以竹鼓之如撃琴然又有形如頌琴施十三絃身長四尺二寸頸長三寸圍四寸五分首長七寸五分闊六寸五分品聲按柱左手振之右手以竹尺擊之隨調應律焉髙漸離擊之於燕漢髙祖撃之於沛而戚夫人亦善焉至唐置於雅部長四尺五寸折九尺之半為法是不知特世俗之樂非雅樂之音也宋朝沿襲唐制設柱同筝法第一絃黄鍾正聲次第十二正聲全第十二絃黄鍾清聲筝以指彈筑以筯擊大同小異其按習並依鍾律彈撃之法降之於俗部可也樂凖西漢京房性好鍾律知音聲作凖器其状如瑟長丈而有十三絃隐几間九尺應黄鍾之律九寸其中一絃下有書分寸為六十律清濁之節實乃筝也漢史官侯部用之唐元和以後律家莫能為者後魏陳仲儒頗閑樂事請依京房立凖以調八音是不知京氏之術得諸小黄門令焦延夀而已非聖王之制也文獻通考卷一百三十七
