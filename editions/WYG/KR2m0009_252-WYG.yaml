body:
  text: 文獻通考卷二百五十二鄱陽馬端臨貴與著帝系考三太上皇太皇太后皇太后唐髙祖武德九年詔禪位於皇太子稱太上皇上皇以𢎞義宫有山林勝景雅好之貞觀三年四月乃徙居之改為大安宫上屢請上皇避暑九成宫上皇以隋文帝終於彼惡之乃營大明宫以為上皇清暑之所未成而上皇寢疾不果居九年崩髙宗崩太子即位詔軍國大事聽天后處分元年天后廢帝遷之房陵立睿宗幽於别宫五年自稱聖母神皇殺唐宗室諸王又二年自稱大周聖神皇帝以睿宗為皇嗣賜姓武氏追諡祖考為帝立武氏七廟封武三思等為王又十四年張柬之等奉中宗誅張易之張昌宗帝復位其年后崩韋氏鴆弑中宗立殤帝為皇太后臨朝總庻政臨淄王隆基舉兵誅之追廢為庶人睿宗在位二年制𫝊位於太子太子上表固辭太平公主勸上雖傳位猶宜總大政上乃謂太子曰汝以為天下事重欲朕兼理之邪昔舜禪禹猶親廵狩朕雖𫝊位豈忘國家其軍國大事當兼省之八月庚子元宗即位尊睿宗為太上皇上皇自稱曰朕命曰誥五日一受朝於太極殿皇帝自稱曰予命曰制勅日受朝於武徳殿三品以上除授及大刑政决於上皇餘皆决於皇帝明年七月上誅太平公主及其黨上皇誥自今軍國政刑一皆取皇帝處分朕方無為飬志以遂素心是月徙居百福殿開元四年上皇崩致堂胡氏曰睿宗每自謂素懷淡泊不樂世務然則盍不於傳位之時盡釋萬機則太平亦無所恃而謀亂乃有眷眷之情尚知大政昧於亢龍有悔之義是以不智處身而以不孝處其子也豈非後王之戒哉又曰元宗舉兵誅討韋氏雪君憤辱厥功雖大而意在自取不得己而歸之於父尋又怵惑邪說殺父同氣至使睿宗盡釋大權而問安視膳以天下飬之事一無聞焉其友愛隆厚獨施之五王同寢共宴遊戲賞樂更奏絲竹親煑藥餌何其至也豈非以手足天性均出於父乎施諸手足者如此於父宜何如而孝飬無聞五月而𦵏不太薄乎古之人所以大過人者無他善推其所為而已元宗能其小而不能其大力於次者而忽於至者不推其所為無乃初心有利欲之蔽乎無乃感宋王之讓己而薄其父乎雖享國日久而天理好還終不可逭是故正其義不謀其利者為子則孝為臣則忠自天子至於庻人其揆一也肅宗至徳元年即位於靈武尊元宗曰上皇天帝靈武使者至蜀上皇喜曰吾兒應天順人吾復何憂制自今改制勅為誥表疏稱太上皇四海軍國事皆先取皇帝進止仍奏朕知俟克復上京朕不復預事命韋見素房琯崔渙奉傳國寶玉冊詣靈武𫝊位二年克復兩京使韋見素入蜀奉迎上皇上皇至鳯翔從兵六百餘人上皇命悉以甲兵輸郡庫上發精騎三千奉迎十二月丙午上皇至咸陽上備法駕迎於望賢宫上皇在宫南樓上釋黄袍著紫袍望樓下馬趨進拜舞於樓下上皇降樓撫上而泣上捧上皇足嗚咽不自勝上皇索黄袍自為上著之上伏地頓首固辭上皇曰天數人心皆歸於汝使朕得保飬餘齒汝之孝也上不得已受之父老在仗外歡呼且拜上令開仗縱千餘人入謁上皇曰臣等今日復覩二聖相見死無恨矣上皇不肯居正殿曰此天子之位也上固請自扶上皇登殿尚食進食上品嘗而薦之丁未將發行宫上親為上皇習馬而進之上皇上馬上親執鞚行數歩上皇止之上乗馬前引不敢當馳道上皇謂左右曰吾為天子五十年未為貴今為天子父乃貴耳左右皆呼萬嵗上皇自開逺門入大明宫御含元殿慰撫百官乃詣長樂殿九廟主慟哭久之即日幸興慶宫遂居之上累表請避位還東宫上皇不許時李輔國暴貴用事上皇左右皆輕之輔國意恨言於上曰上皇居興慶宫與外交通陳元禮髙力士謀不利於陛下當為社稷計豈得徇匹夫之孝若迎居大内以杜絶小人上不應上元元年上寢疾輔國矯詔將五百騎露刃迎上皇遷居甘露殿上皇驚幾墜所留侍衛􅂊尫老數十人流力士等於逺方輔國等詣上請罪上曰卿防微杜漸以安社稷何懼也自是上皇日以不懌辟榖成疾上初猶徃問安既而但遣人起居寶應元年上皇崩致堂胡氏曰靈武即位之事元宗既有傳位之命則太子非叛也范氏唐鑑謂肅宗以皇太子討賊遂自稱帝此乃太子叛父何以討禄山也其失在元宗命不亟行而裴冕諸人急於榮貴是以致此咎也唐髙祖睿元之為上皇非所欲也勢可以釋位而不釋遂至逼廹不見幾故也而太宗明肅不能少待或稱兵或借便皆有奪位之惡欲速見小利故也父不父子不子昧於春秋首惡誅之戒甚矣豈非後世之大鑒歟又曰内寵嬖豎合而為一人主不悟又委信之其終不至於簒弑逆亂者古無有也肅宗之事亦可以為監矣夫祖考所為賢且徳也子孫希之鮮能及者非賢非徳也子孫效之鮮不過焉兩漢而下繼世之君往往柩前即位孰有為天子子親承大寶得問安侍膳舉四海之飬以全其孝盡其樂如唐數君可謂千載一時不可逢之嘉會矣而太宗明皇肅宗之孝道無稱焉豈非自太宗失之歟髙祖睿元晩節末路不免兵甲震驚之禍而元宗尤酷嗚呼悲夫輔國之言曰陛下當為社稷大計豈得徇匹夫之孝夫孝以奉父母為先然後上及於祖宗今父在也乃困其身怵其心而社稷是安此中人以下所能辨者肅宗不察蓋自馬嵬西行輔國已有是言今又云爾是知肅宗為人可誘以利故也當是白刃脇遷盡去左右之人而居西内上皇辟榖成疾以致殂殞其異於趙武靈王沙邱之禍幾希矣夫以討賊之故奪父之位其終至於如此使安慶緒史朝義而有知豈不含笑於九泉元結頌唐中興曰盛徳曰大業是過譽其始而未知其終也順宗永貞元年徳宗崩即位疾不能視事傳位太子純稱太上皇憲宗元和元年太上皇崩憲宗立尊順宗王皇后為皇太后十年崩年五十四穆宗立尊憲宗郭后為皇太后敬宗立尊為太皇太后宣宗立母鄭故侍兒有曩怨帝奉飬后禮稍薄后鬱鬱不聊太中二年暴崩宣宗立尊母鄭妃為皇太后懿宗尊為太皇太后咸通六年崩敬宗立尊穆宗王后為皇太后文宗時稱寶歴太后太和五年宰相建白以太皇太后與寶歴太后稱號未辨前代詔令不敢斥言皆以宫為稱今寶歴太后居義安殿宜曰義安太后詔可㑹昌五年崩文宗立尊母蕭氏為皇太后太和中懿安太后居興慶宫憲宗后文宗祖母寶歴太后居義安殿穆宗妃敬宗母后居内殿穆宗妃文宗母號三宫太后帝每五日問安及歳時慶謁率由複道至南内羣臣及命婦詣宫門候起居有司獻四時新物送三宫亦稱賜帝曰上三宫何可言賜遽索筆改賜為奉按唐自肅宗張后之後未嘗有正位長秋者史所載皇后皆追贈其太后則皆所生子為帝而奉上尊號者也憲宗以郭汾陽孫女為妃既為令族又有淑徳可以正位矣乃以其宗强恐既立之後後宫不得進遂終身為妃自後人主皆不立后然文宗崩既有太子仇士良等廢之而立武宗武宗崩既有皇子諸宦官廢之而立宣宗宣宗崩遺命立夔王王宗實等廢之而立懿宗雖當時中人專横今古所無然亦因椒房虚位宫闈無主所謂皇子者皆無寵無威之人故上躬彌㽞之際宰輔既隔在外庭中人遂得以肆行無忌顯違詔㫖私立所厚而莫由禁止也昭宗為朱全忠所弑哀帝即位尊何后為皇太后徙居積善宫號積善太后帝既禪位后亦遇害後唐莊宗既即位冊尊母曹氏為皇太后而以嫡母劉氏為皇太妃往謝太后太后有慚色太妃曰願吾兒享國無窮使吾獲没於地以從先君幸矣復何言哉帝既滅梁使人迎太后歸洛居長壽宫而太妃獨㽞晉陽同光三年五月太妃薨七月太后薨諡曰貞簡𦵏坤陵而太妃無諡𦵏魏縣太妃與太后甚相愛其送太后於洛也涕泣而别太妃既卒太后悲哀不飲食月餘亦崩愍帝即位冊尊明宗后曹氏為皇太后淑妃王氏為皇太妃而敬瑭兵犯京師廢帝與太后俱自燔死晉髙祖立遷太妃於至徳宫髙祖后事妃如母乃封其所飬子許王從益為郇國公以奉唐祀契丹犯亰師召從益與妃徳光北歸㽞蕭翰守汴州漢髙祖起太原翰欲北去乃使人召從益廹以來令權知南朝事漢髙祖擁兵而南妃及從益遣人迎之既而俱遇害晉出帝即位尊髙祖后李氏為皇太后契丹入汴北遷殁於北地建州安太妃出帝母即位冊為太妃北遷殁於虜地漢愍帝即位尊髙祖后李氏為皇太后周太祖入京師舉事皆稱太后誥己而議立湘隂公贇為天子未至請太后臨朝已入太祖出征軍士擁之以還太祖請事太后如母於是遷於太平宫上尊號曰昭聖皇太后顯徳元年春崩周太祖皇后柴氏無子飬后兄守禮之子以為子是為世宗守禮字克讓以后族拜銀青光禄大夫檢校吏部尚書兼御史大夫世宗即位加金紫光禄大夫檢校司空光禄卿致仕居於洛陽終世宗之世未嘗至京師而左右亦莫敢言第以元舅禮之守禮頗恣横嘗殺人於市有司以聞世宗不問時王溥王晏王彦超韓令坤等同時將相皆有父在洛陽與守禮朝夕徃來惟意所為洛陽人多畏避之號十阿父守禮卒年七十二官至太𫝊歐陽公史論曰父子之恩至矣孟子言舜為天子瞽瞍殺人則棄天下竊負之而逃以為天下可無舜不可無至公舜可棄天下不可刑其父此為世立言之說也然事固有不得如其意者多矣蓋天子有宗廟社稷之重百官之衛朝廷之嚴其不幸有不得竊而逃則如之何而可予讀周史見守禮殺人世宗寢而不問蓋天下重矣而子於其父亦至矣故寧受屈法之過以申父子之道其所以合於義者蓋知權也君子之於事擇其輕重而處之耳失刑輕不孝重也刑者所以禁人為非孝者所以教人為善其意一也孰為重刑一人未必能使下無殺人而殺其父滅天性而絶人道孰為重權其所謂輕重者則天下雖不能棄而父亦不可刑也然則為舜與世宗者宜何如無使瞽瞍守禮至於殺人則可謂孝矣周恭帝即位尊世宗皇后符氏為皇太后宋太祖既受禪遷居西宫號周太后太平興國初入道為尼淳化四年殂宋昭憲皇太后杜氏定州安喜人太祖之母帝受禪尊為皇太后建隆二年六月崩眞宗即位尊太宗明徳李后為皇太后居西宫嘉慶殿景徳元年崩仁宗即位尊眞宗莊獻明肅皇后為皇太后軍國大事權取處分宰相丁謂等請太后所御殿太后曰皇帝視事當朝夕在側何須别御一殿於是請太后與帝五日一御承明殿帝位在太后位右垂簾决事議已定太后忽出手書第欲禁中閲章疏遇大事即召對輔臣其謀出於丁謂非太后意也謂既貶馮拯等三上奏請如初議始御承明殿有司請制令稱吾以生日為長寧節出入御大安輦鳴鞭侍衛如乗輿天下皆避太后父諱羣臣上尊號曰應元崇徳仁壽慈聖太后元日帝率百官上壽謁太廟乗玉輅服衮衣明道二年崩天聖二年七月宰臣王欽若等拜表請上皇太后尊號曰應元崇徳仁壽慈聖皇太后命宰臣王曾撰冊文參知政事魯宗道書冊寶十一月郊祀禮畢帝御大安殿受冊百僚稱賀畢甫序班侍中奏外辦禮儀使奏請發皇太后尊號冊寶皇帝服承天冠絳紗袍以出殿中監進珪禮儀使與閤門使前導皇帝随冊寶降西階内臣主當職掌捧正殿庭置於東向褥位禮儀使奏請皇帝再拜在位官皆再拜應行事公卿執事者不拜再拜訖太尉司徒就受冊寶位皇帝搢圭跪捧冊授太尉太尉搢笏東向側身跪受其冊文曰嗣皇帝臣仁宗御名謹再拜稽首言恭以為天下之母者愛育之功博居域中之大者覆載之道均乃有飾盛禮以推崇因強名而丕顯以恩則尊親偕極以義則中外一辭表徳垂鴻非可以缺况乎寧保基緒撫覧權綱格萬宇之治平副輿情之輸戴式隆稱號以播休鑠伏惟皇太后陛下聰明淑哲淵穆懿恭襲御龍之遐源啓曾沙之瑞命輔佐先聖輯睦藩房申翊宫朝協敷閫教服圖史之至戒慕黄老之微言及正宫承天居尊治内勤儉之化式於中闈和平之風被于四表王基允固睿問載融曩者號弓在辰仍几有命粤以大寶付於菲躬㷀㷀哀荒懼罔攸濟實賴慈䕃以授洪圖上奉顧託之明俯慰遐邇之望詳錄機務咨謀政經憲祖宗之舊章厲官師之凝績本乎子物之惠濟乃守成之業方今蠻夷欵服封宇靖安百度聿修六氣時若肇禋肆類克展上儀享是休嘉率由保翼故得公卿庻尹藩嶽守臣武旅戎酋緇黄耋艾咸謂周有思齊之什播於聲歌漢有長樂之謠垂於竹帛斟酌前訓擬議盛猷允非鴻名莫揚茂烈綿代曠典自我而著猶且推美而弗有約已以至謙連袂叩閽露章五請臣等以因人之欲拜跪於内甫廻冲慮乃徇公言夫含章履順之謂應元詔訓逮下之謂崇徳體仁所以膺壽臧之福宣慈所以隆聖善之懿不勝大願謹與百僚士庻奉玉冊琮寶上尊號曰應元崇徳仁壽慈聖皇太后伏惟懋協歡心誕膺洪冊承七廟之流祥受九旻之敷錫擁佑家邦祉祚無極臣仁宗御名誠懽誠抃稽首頓首謹言又捧寶授司徒如授冊儀皇帝歸御幄改常服乗輿赴文徳殿後幄百官班退並赴朝堂幕次太尉司徒奉冊寶至文徳殿門外下奉安文武羣官宗室客使並集於文徳殿中書門下翰林學士兩省御史臺並立於階下香案前殿侍中奏中嚴外辦皇太后服儀天冠衮衣以出奏隆安之樂行障歩障方團扇侍衛垂簾即御座南向樂止太常卿前導冊案前至殿西階下太常卿以下各歸位典儀曰再拜在位者皆再拜分班東西序立吏部侍郎押冊案禮部侍郎押冊弁進至褥位當御座前訖太尉跪奉冊案稍前中書令讀冊訖奉冊丞北向進至於御座前訖中書令舉冊官俱降還位太尉降階納舄帶劒訖侍中押寶案司徒捧寶侍中讀寳並如讀冊之儀畢置於御座前冊之南訖司徒太尉詣香案前分班東西序立尚宫詣皇帝御座前奏請皇帝詣皇太后御座前行稱賀之禮皇帝服鞾􅂁簾内詣皇太后御座前奏請再拜訖跪賀曰嗣皇帝臣仁宗名言皇太后陛下顯崇徽號昭渙寰瀛伏惟與天同壽率土不勝欣抃俛伏興又再拜尚宫詣御座承㫖答曰皇帝孝思至誠貫於天地受兹徽號感慰良深宣答訖皇帝再拜歸御座幄太尉率文武百僚詣皇太后御座前稱賀侍中承㫖宣答訖在位官俱再拜禮畢奏隆安之樂皇太后降座還幄次樂止侍中奏觧嚴所司放仗文武百僚並再拜訖退皇帝皇太后還内應外命婦稱賀皇太后皇帝於内殿在外命婦及兩京留司官並奉表稱賀石林葉氏曰母后加諡自東漢始本朝后諡初止二字明道中以章獻明肅嘗臨朝特加四字元豐中慶壽太皇太后上仙章子厚為諡議請於朝詔以太皇太后功徳盛大四字猶懼未盡始仍故事遂諡慈聖光獻自是宣仁聖烈與欽聖憲肅皆四字云章獻太后崩遺詔以皇太妃楊氏為皇太后居宫中參斷軍國事御史中丞蔡齊白執政以為不可乃詔勿頒預政遺誥第存后號即所居殿號曰保慶太后景祐三年崩英宗即位尊仁宗慈聖光獻皇后為皇太后帝感疾請權同處分軍國事御内東門小殿聽政帝康復乃撤簾勅有司崇峻典禮下令稱聖㫖神宗立尊為太皇太后名宫曰慶壽元豐二年崩神宗立尊英宗宣仁聖烈皇后為皇太后居寶慈宫哲宗嗣位尊為太皇太后同御延和殿詔書稱吾以生日為坤成節令天下避后父諱元祐八年崩元豐八年三月哲宗即位太皇太后權同聽政三省樞宻院按儀注未釋服已前遇隻日皇帝御迎陽門日參官並赴起居依例奏事每五日遇隻日於迎陽門垂簾皇帝坐於簾内之北宰臣執政官升殿奏事權屏去左右侍衞事有幾速許非時請對及賜宣召亦許升殿禮部御史臺閤門奏討論御殿及垂簾儀制毎朔望六參皇帝御前殿百官起居三省樞密院奏事應見謝辭班退各令詣内東門進榜子皇帝雙日御延和殿垂簾日參官起居太皇太后移班少西起居皇帝並再拜三省樞密院奏事三日已上四拜不舞蹈候祔廟畢起居如常儀簾前通事以内侍殿下以閤門吏部磨勘奏舉人垂簾日引應見辭謝臣僚遇朔望參日不坐並先詣殿門次内東門應擡賜者並門賜從之是月帝御迎陽門幄殿同太皇太后垂簾宰臣親王以下合班起居常例分班十六至是合班以閤門奏請故也四月三省樞宻院言續討論垂簾故事儀注應合告謝臣僚並垂簾日引依閤門見行儀制從之八月御史中丞黄履言朔望皇帝御前殿合赴起居官次日赴延和殿垂簾起居從之元祐元年閏二月右諫議大夫孫覺右諫議蘇轍進對有㫖俟簾下内臣盡出方得敷奏哲宗立尊神宗欽聖憲肅皇后為皇太后哲宗崩决策迎立徽宗帝請權同處分軍國事辭帝固請乃從令外間不避家諱不立誕節名不通使遼國輔臣不於小殿奏事􅂊六月即還政明年崩元符三年正月徽宗即位皇太后權同聽政三省樞密院聚議故事嘉祐末英宗請慈聖同聽政五月同御内東門小殿垂簾至七月十三日英宗間日御前後殿輔臣奏事退詣内東門簾前覆奏明年手書還政又故事惟慈聖不立生辰節名不遣使契丹若天聖元豐則御殿垂簾立誕節名遣使與北敵徃還及避家諱等曾布曰今上長君豈可垂簾聽政請如嘉祐故事施行蔡卞曰天聖元豐與今日皆遺制處分與嘉祐末英宗請聽政不同布曰今日之事雖載於遺制實出自德音又皆長君正與嘉祐事相似既奏得㫖並依嘉祐治平政事施行布又謂同列曰奏事先奏太后次覆奏皇帝如今日所得指揮遂為定式皇太后手詔付中書省曰皇帝踐祚之初勉從勤請非久便當退歸房闥除不御前後殿已指揮外如避家諱等並勿行哲宗立尊生母朱德妃為皇太妃時宣仁欽聖二太后皆居尊故稱號未得其極至元祐三年宣仁詔母以子貴輿蓋仗衛冠服悉侔皇后紹聖中欽聖復即閤建殿改乗車為輿上設行龍出入由宣德門百官上牋稱殿下名所居為聖瑞宫崇寧初崩追尊為皇后靖康二年二帝北狩金人僭立張邦昌邦昌迎哲宗元祐皇后入禁中垂簾聼政后遣使迎康王降手書播告天下王即位於南京后撒簾上尊后為元祐太后奉迎至行在所以元字犯后祖諱改稱隆祐太后從上幸維揚幸杭州苖傅劉正彦作亂請后聼政上復辟撤簾建炎三年避敵如䖍州紹興元年崩徽宗既立尊哲宗元符皇后為皇太后殿為崇恩宫政和三年暴崩徽宗宣和七年十二月上内禪以道君號退居龍徳宫皇太子即皇帝位尊道君為太上皇帝靖康元年上皇如南京避敵到鎭江三月兵退命李綱迎上皇於南京十一月京城失守二年二月上皇北狩紹興五年崩於五國城欽宗既受禪尊徽宗顯肅皇后為太上皇后遷居寧德宫稱寧德太后京城失守從上皇北遷留于彼五年崩髙宗既即位遥尊母韋賢妃為宣和皇后紹興十年遙上皇太后冊寳於慈寧殿自後每遇誕日至朔皆遥行賀禮十二年八月始自北歸至臨安入居慈寧宫二十九年崩紹興三十二年六月上内禪稱太上皇退處德壽宫八月加上尊號為光堯壽聖太上皇帝乾道七年再加上尊號為光堯壽聖憲天體道太上皇帝淳熈二年再加上尊號為光堯壽聖憲天體道性仁誠德經武緯文太上皇帝是年以聖壽七十行慶壽禮十二年再加紹業興統明謨盛烈八字十三年以聖壽八十行慶壽禮赦天下十四年冬十月崩三十二年六月十一日内禪十二日上詣德壽宫欲以是日率百官朝太上皇於徳壽殿以雨百僚免入見上就宫中行禮自後上詣宫行禮即不集百官陪十三日詔令宰臣率百官於初二日十六日詣徳壽宫起居又詔朕欲每日一朝德壽宫面奉慈㫖恐廢萬幾煩群下不許如前代朔望之禮太簡令禮官重定其期禮部請依漢髙帝五日一朝太公故事毎五日一詣德壽宫朝見如宫中禮從之乃詔自今後詣德壽宫惟經過官司起居餘並免十七日太上宣諭車駕毎至宫必於門外降輦既行家人之禮自宜至殿上降輦又不須五日一朝只朝朔望於是有司請除朔望朝外於毎月初八日二十二日詣徳壽宫起居如宫中儀從之自後皆遵此制如値雨及盛暑祁寒臨期承太上特㫖仍免詣十二月冬至上詣徳壽宫稱賀上壽禮畢入見太后如宫中之儀自後正至並同乾道元年二月朔上詣德壽宫請太上太后至延祥觀燒香次幸聚景園次幸玉津園太上聖㫖日晩免車駕從還德壽宫臣僚止從駕還内沿路並免起居除管軍官從駕外執政官以下並免以後或恭請幸南内或幸聚景園玉津園延祥觀靈隠天竺寺其儀並同皇帝朝德壽宫儀注前期儀鑾司設大次於德壽宫門内小次於殿東廊西向其日俟皇帝出即御座從駕臣僚禁衛等起居如常儀皇帝降御座乘輦將至德壽宫報文武百僚詣宫門外迎駕起居訖前導官太常卿閤門官太常博士禮直官先入詣大次前分左右立定俟皇帝詣德壽宫大次降輦入次御史臺閤門太常寺報文武百僚入詣殿庭北向立定前導官導皇帝入小次簾降俟太上皇帝即御座小次簾捲前導官導皇帝升殿東階詣殿上折檻前奏請拜皇帝再拜訖前導官導皇帝稍前躬奏聖躬萬福訖導皇帝復位又奏請拜皇帝再拜訖導皇帝詣太上皇帝御座之東西向立前導官於殿上隨地之宜少立揖班首以下躬典儀曰拜贊者承𫝊曰拜在位官皆再拜訖直身搢笏躬身三舞蹈跪左膝三叩頭出笏就一拜又兩拜拜訖且躬身班首不離位奏聖躬萬福訖典儀曰拜贊者承傳曰拜在位官皆再拜又兩拜拜訖直立身捲班出前導官以次退從駕官歸幕次以俟從駕還内太上皇帝駕興皇帝從入見太上帝后如宫中之儀訖以俟皇帝還内如來儀毎遇正旦冬至及朔望並依上儀淳熙二年十一月詔太上皇帝聖壽無疆新嵗七十用十一月冬至加上尊號冊寶十二月十七日立春行慶壽禮是日早文武百僚並簮花赴文德殿立班聽宣慶壽赦赦文太極之功不宰其可贊者兩儀之生大眀之照無疆所能推者千載之至欽惟聖父誕保我家二百餘載而中天定神器於欹側艱虞之始三十六年而宅位授朕師於康強暇豫之時上穹綿有永之年下土洽無為之化興言菲質日侍慈顔竭幅員之富而未足伸至養之誠極尊美之稱而未足表難名之德兹載新於歳律庸展慶於􅂄齡前殿奉巵企髙皇而踵武大安進膳邁貞觀之彌文鏘金奏以充庭儼臣工而在列和氣遄周於宇宙盛容創見於古今仍内奉於母儀庸備殫於子道為酒以介眉壽誕膺純嘏之常立春而下寛書更廣庻民之富可大赦天下於戲建無窮之基則享無窮之樂命方僕於萬年有非常之事則侈非常之休恩盍推於四海矧羣黎百姓夙依於覆育而􅂄老大夫咸自於甄陶今而仁壽之同躋必也安榮之共保諒爾有邦之衆知予錫類之心赦書日行五百里敢以赦前事言者以其罪罪之主者施行宣赦訖從駕官並赴後殿起居謝花再拜從駕至德壽宫行慶壽禮陳設前期儀鑾司陳設德壽宫殿上當中南向設大次於德壽宫内南向小次於殿東廊西向設皇帝褥位二一於御座之東西向一於御座之南北向尚醖設御酒器於御座之東有司又設御茶床於御座之西俱稍北上壽其日後殿入官喝排立俟催班立定應從駕應奉宫禁衛等並簪花不係從駕官徑赴德壽宮並簪花以俟迎駕起居閤門報班齊皇帝服鞾袍出宫門禁衛諸班親從等並迎駕自贊常起居自贊謝花兩拜入内省執骨朶使臣迎駕常起居謝花兩拜皇帝座知閤門以下御帶環衛官諸司祗應官等一班鬬班宣名常起居次贊謝花兩拜訖知閤門官升殿讀奏目餘官並退次舍人引應從駕官一班赴當殿宣名常起居次贊謝花兩拜執政有奏事如儀皇太子内中起居簪花以俟從駕次管軍一班宣名常起居次贊謝花兩拜訖皇帝升輦將至德壽宫文武百僚迎駕常起居贊謝花兩拜訖前導太常卿閤門官太常博士禮直官并管軍御帶環衛官等詣大次前分左右立文武百僚入詣徳壽殿下東西相向立俟皇帝至大次降輦入次簾降簪花服鞾袍閤門御史臺太常寺分引皇太子以下應從駕官入詣德壽殿下東西相向立大次簾捲前導官前導皇帝入小次簾降前導太常卿閤門官太常博士禮直官并管軍御帶環衛官等俟太上皇帝出宮迎太上皇帝四拜起居太上皇帝出宫行門禁衛諸班親從等迎太上皇帝自贊常起居太上皇帝升御座鳴鞭小次簾捲前導官前導皇帝升殿東階詣殿上折檻前北向褥位奏請拜皇帝再拜訖躬奏聖躬萬福訖又奏請拜皇帝再拜訖前導皇帝詣太上皇帝御座之東褥位西向立前導官於殿上隨地之宜立閤門御史臺太常寺分引皇太子并文武百僚並横行北向立舍人揖皇太子以下躬典儀曰拜贊者承傳在位官皆再拜搢笏舞蹈又再拜訖且躬身班首不離位奏聖躬萬福訖典儀曰拜贊者承𫝊在位官皆再拜訖直身立分東西相向立禮直官引奉盤盞參知政事受盤盞參知政事承㫖宣答簽書樞宻院事奏禮畢戸部尚書殿中監少監升殿東階奉盤盞參知政事受盤盞參知政事殿中監少監詣酒稍北南向立承㫖宣答簽書樞密院事并奏禮畢戸部尚書詣折檻之東西向立舍人通樂人姓名已下四拜起居次看盞人稍前贊拜兩拜贊上殿祗候内特進御茶床殿侍酹酒訖尚醖典御以盤盞酒注授殿中監少監次禮直官引奉盤盞參知政事詣酒樽所北向搢笏殿中監奉盤盞參知政事捧盤盞西向立殿中監啓盞殿中少監以酒注於盞奉盤盞參知政事奉酒詣皇帝前北向禮直官引受盤盞參知政事詣太上皇帝御座前西向立定閤門御史臺太常寺分引皇太子并文武百僚横行北向立俟奉盤盞參知政事躬進皇帝皇帝奉酒詣太上皇帝御座前躬進訖少後受盤盞參知政事躬接訖復授奉盤盞參知政事前導官導皇帝詣御座前褥位北向俛伏跪殿下皇太子并百僚並躬身皇帝致詞曰皇帝臣御名稽首言天祐君親錫兹難老維春之吉年徳加新臣御名與羣臣等不勝大慶謹上千萬嵗壽伏興奏請拜皇帝再拜典儀曰拜贊者承傳在位官皆再拜訖直身立分東西相向立前導官導皇帝詣御座東西相向立奉盤盞參知政事以盤北向躬進皇帝訖奉盤盞參知政事復位立皇帝奉盤詣御座東西向立樂作俟太上皇帝飲酒訖皇帝躬接盞樂止少後受盤盞參知政事躬接訖以授尚醖典御各復位立閤門御史臺太常寺分引皇太子并文武百僚横行北向立前導官導皇帝詣褥位北向奏請拜皇帝再拜典儀曰拜贊者承傳在位官皆再拜訖直身立前導官導皇帝詣御座之東褥位西向立舍人揖皇太子已下躬典儀曰拜贊者承傳在位官皆再拜搢笏舞蹈又再拜訖直身立内侍舉御茶床禮直官引户部尚書詣御座前北向俛伏跪奏具官臣某言禮畢伏興退復位立典儀曰拜贊者承傳在位官皆再拜訖直身立分相向立次舍人贊樂人謝祗應兩拜訖太上皇帝駕興皇帝從入宫文武百僚前導應奉官等以次退皇帝皇太子入賀太上皇后於宫中行禮執政率文武百僚拜牋賀太上皇后訖以俟駕興從駕并應奉官禁衞等並簪花從駕還内建炎以來朝野雜記昭慈聖獻皇后之在建康也有司月奉千緡而止后生辰别奉緡錢萬時朝廷用度不給故其禮不及承平時其後顯仁后自北來歸嵗奉錢二十萬緡月奉萬緡冬年寒食生辰倍之帛二萬餘疋生辰絹萬疋春冬端午各三千疋綾羅二千疋冬綿五千兩酒日一斗羊三牽髙宗在德壽宫孝宗命有司月供十萬緡髙宗以飬兵多費詔減其六萬及孝宗在重華命月進三萬緡而已上受禪詔太皇太后月奉緡錢二萬皇太后萬五千上皇太后五萬而重華别給二萬焉右光堯之壽祉壽皇之孝飬古今罕儷故具載其事於此孝宗既受禪尊憲聖皇后為皇太后居德壽宫上尊號曰壽聖太上皇后每遇誕節上詣宫上壽至朔望朝上皇畢入見后如宫中之儀乾道七年加壽聖慈明尊號淳熙二年以上皇慶壽禮又加號壽聖齊明廣慈十年后年七十行慶壽禮十三年加尊號備德二字上皇崩遺詔改稱皇太后上欲迎還大内太后以上皇几筵在德壽宫不許因築夲殿名慈福光宗即位后當為太皇太后以壽皇故更號曰壽聖皇太后紹熙四年慶壽八十加號隆慈備福孝宗崩始稱太皇太后光宗疾不能行䘮禮宰臣請后於壽皇梓宫前垂簾宣光宗手批立寧宗慶元元年加尊號光祐二字二年遷居重華宫易名曰慈福三年崩容齋洪氏隨筆曰唐德宗即位訪求其母沈太后歴順宗及憲宗時曾祖母故稱為曾太皇太后蓋别於祖母也舊新二唐書紀皆載之今慈福太皇太后在壽康太上時已加尊稱若於主上則為曾祖母當用唐故事加曾字向者嘗已告宰相而省吏以為典故所無天子逮事三世安得有前比亦可謂不知禮矣又嗣濮王士歆在隆興為從叔祖在紹熙為曾叔祖慶元為髙叔祖矣而仍稱皇叔祖如故士歆視嗣秀王伯圭為從祖今圭稱皇伯祖而歆但為皇叔祖乃是弟爾禮寺亦以為國朝以來無稱曾髙者彼蓋不知累朝尊屬元未有之也淳熙十六年二月内上禪皇太子即位移御重華宫上尊號曰至尊壽皇聖帝至紹熙五年崩光宗既受禪上成肅皇后尊號曰壽成皇后孝宗崩上皇太后尊號慶元初加號惠慈嘉泰二年上太皇太后尊號紹熙五年六月壽皇崩光宗以疾不能行䘮禮七月憲聖太皇太后命皇子嘉王即皇帝位尊光宗為太上皇居泰安宫以内中寢殿為之慶元元年上尊號曰聖安壽仁六年崩寧宗既即位尊慈懿皇后為皇太后退居壽康宫慈寕殿上尊號曰壽仁慶元六年崩文獻通考卷二百五十二
