body:
  text: 文獻通考卷一百六十五鄱陽馬端臨貴與著刑考四刑制宋文帝時侍中蔡廓建議以為鞫獄不宜令子孫下辭眀言父祖之罪虧教傷情義莫此為大自今但令家人與囚相見無乞獄之詞便足以眀伏罪不須責家人下辭朝議咸以為允從之衞将軍王𢎞言主守偷五疋常偷四十疋並加大辟其法太重宜進主守偷五十疋死四十疋降以補兵既得小寛人命亦足以為懲戒從之眀帝太始四年詔定黥刖之制有司奏自今凡劫竊執官仗拒戰邏司攻剽亭寺及傷害吏人并監司将吏自為劫皆不限人數悉依舊制斬刑若遇赦黥及兩頰劫字斷去兩脚筋徙付交梁寕州五人以下止相通奪者亦依黥作劫字斷去兩脚筋徙付逺州若遇赦原斷徙猶黥面依舊補冶士家口應及坐悉依舊結讁及帝崩其例乃寝齊髙祖時丹陽尹王僧䖍上言郡縣獄相承有上湯殺囚名曰救疾實行寃暴豈有死生大命而潛制下邑愚謂囚病必先刺郡求職司與醫對共診驗逺縣家人省視然後處治上從之武帝永明九年令刪定郎王植之集註張杜舊律合為一書凡千五百三十條事未施行其文殄滅初晉張褧杜預共註律三十卷自泰始以來用之律文簡約􅂉一章之中兩家所處生殺頓異臨時斟酌吏得為姦上留心法令詔獄官詳正舊註七年尚書刪定郎王植乃集定二註表奏之詔公卿八座参議考正竟陵王子良總其事衆議異同不能壹者制㫖平决是嵗書成廷尉山隂孔稚珪上表以為律文雖定茍用失其平則法書徒眀於表裏寃魂猶結於獄中竊尋古之名流多有法學今之士子莫肯為業縱有習者世議所輕将恐此書永淪走吏之手矣今若直律助教依五經例國子生有欲讀者策試髙第即加擢用以補内外之官庶㡬士流有所勸慕崔祖恩言漢時習律有官子孫並傳其業今廷尉律生乃令史門戸刑之不厝乃此之由詔從其請事竟不行梁武帝制依周漢故事有罪者贖其科凡在官身犯罰金鞭杖督之罪悉入贖停罰其臺省令史士卒欲贖者聼之時齊時舊郎蔡法度能言齊王植之律於是使損益舊本以為梁律天監初又令王亮等定為二十篇一曰刑名二曰法例三曰盜刼四曰賊叛五曰詐偽六曰受賕七曰告劾八曰討捕九曰繫訊十曰斷獄十一曰雜十二曰戸十三曰擅興十四曰毁亡十五曰衞宮十六曰水火十七曰倉庫十八曰廐十九曰關市二十曰違制制刑為十五等之差棄市以上為死罪大罪梟其首次棄市刑二嵗以上為耐罪言各随伎能而任使之也有髠鉗五嵗刑笞二百収贖絹男子六十疋又有四嵗刑男子四十八疋又有三嵗刑男子三十六疋又有二嵗刑男子二十四疋罰金一兩以上為贖罪贖死者金二斤男子十六疋贖髠鉗五嵗刑笞二百者金一斤十二兩男子十四疋贖四嵗刑者金一斤八兩男子十二疋贖三嵗刑者金一斤四兩男子十疋贖二嵗金一斤男子八疋罰金十二兩者男子六疋罰金八兩者男子四疋罰金四両者男子二疋罰金二両者男子一疋罰金一兩男子二丈女子各半之五刑不簡正於五罰五罰不服正於五過以贖論故為此十五等之制又九等之差有一嵗刑半嵗刑百日刑鞭杖一百鞭杖五十鞭杖四十鞭杖三十鞭杖二十鞭杖十又八等之差一曰免官加杖督一百二曰免官三曰奪勞百日杖督一百四曰杖督一百五曰杖督五十六曰杖督四十七曰杖督二十八曰杖督十論加者上就次當減者下就次凡繫獄者不即答欵應加測罰不得以人士為隔若人士犯罰違扞不欵宜測罰者先参議牒啓然後科行斷食三日聼家人進粥二升女及老小百五十刻乃與粥滿千刻而止囚有械杻斗械及鉗並立輕重大小之差而為定制其鞭有制鞭法鞭常鞭凡三等之差制鞭生革亷成法鞭生革去亷常鞭熟靻之友反不去亷皆作鶴頭紐長尺二寸梢長二尺七寸廣三寸靶長尺五寸杖皆用生荆長六尺有大杖法杖小杖三等之差大杖頭圍寸三分小頭八分半法杖圍寸二分小頭五分小杖圍寸一分小頭極杪諸督罰大罪無過五十三十小者二十當笞二百以上者笞半餘半後決中分鞭杖老小於律令當行鞭杖罰者皆半之其應得法鞭杖以熟靻鞭小杖過五十者稍行之将吏以上及女人應有罰者以罰金代之其以職員應罰及律令指名制罰者不用此令其問事諸罰皆用熟靻鞭小杖其制鞭制杖法杖法鞭自非特詔皆不得用詔鞭杖在京師者皆於雲龍門行女子懐孕者勿得決罰其反叛大逆以上皆斬父子同産男無少長皆棄市母妻姊妹及應從坐棄市者妻子女妾同補奚官為奴婢資財没官劫身皆斬妻子補兵遇赦降死黵面為刧字黵音都感反髠鉗補冶鎖士終身其下又謫運謫配材官冶士尚方鎻士皆以輕重差其年數其重者􅂉終身士人有禁錮之科亦以輕重為差其犯清議則終身不齒耐罪囚八十以上十嵗以下及孕者盲者侏儒當械繫者及郡國太守相都尉關中侯以下亭侯以上之父母妻子及所坐非死罪除名之罪二千石以上非檻徴者並訟繫之丹陽尹月一詣建康縣令三官参共録獄察斷枉直其尚書當録人之月者並與尚書参共録之凡定罪二千五百二十九條又有令三十卷天監十一年詔自今逋讁之家及罪應質作若年有老小可停将送上敦睦九族優借朝士有犯罪者皆屈法申之百姓有罪則案之如法其緣坐則老幼不免一人亡逃舉家質作民既窮窘姦宄益深嘗因郊祀有秣陵老人遮車駕言曰陛下為法急於黎庶緩於權貴非長乆之道上乃思所以寛之十四年制除黵面之刑帝篤尚文雅踈簡刑法自公卿大臣不以鞫獄為意姦吏柄權弄法賄賂成市枉濫者多大率二嵗刑以上嵗至五千人徒居作者具五任其無任者著升械若疾病權解之是後囚徒􅂉有優劇時王侯子弟多驕滛不法上年老厭於萬幾又專精佛戒每斷重罪則終日不懌􅂉謀反逆事覺亦泣而宥之由是王侯益横􅂉白晝殺人於都街􅂉暮夜公行剽掠有罪亡命匿於王家有司不敢搜捕上深知其弊而溺於慈爱不能禁也中大同元年詔自今犯罪非大逆父母祖父母勿坐自是禁網漸踈百姓安之而貴戚之家不法甚矣陳武帝令尚書刪定郎范杲参定律令又令徐陵等知其事制律三十卷科三十卷其制維重清議禁錮之科若縉紳之族犯虧名教不孝及内亂者終身不齒先與人為婚者許妻家奪之其獲賊帥士人惡逆雖經赦免死付治聼将妻入役不為年數又存贖罪之律復父母縁坐之刑自餘一用梁法其有贓驗昭然而不欵伏則上測立立測者以土為高一尺上貟劣容囚兩足立鞭二十笞三十訖着両械及杻上一上測七刻日再上三七日上測七日一行鞭凡經鞭杖合一百五十得度不承者免死其髠鞭五嵗刑降死一等鏁三重其五嵗刑下並鏁一重五嵗刑若有官准當二年餘並居作其三嵗刑若有官准當二年餘一年贖若坐過誤罰金其二嵗刑者若有官者贖一嵗刑無官亦贖論寒庶人准决鞭杖囚並着械徒並着鏁亦不計階品死罪将决乘露車着三械加拲手至市脱手械及拲手焉拲音拱両手曰拲當刑於市者夜須眀雨須晴朔日八莭六齋日月在張心目並不得行刑廷尉寺為北獄建康縣為南獄並置立監平一又制常以三月侍中吏部尚書三公郎部都令史三公録寃屈御史中丞侍御史蘭臺令史親行京師諸獄及冶署理察囚徒寃枉後魏昭成帝始制法令反逆者族其餘當死者聼入金馬贖罪殺人者聼與死家馬牛葬具以平之盜官物一備五私物一備十四部大人共坐王庭決詞訟無繫訊連逮之苦境内安之道武既平定中原患舊制太峻命三公郎王徳除其酷法約定科令季年被疾刑法濫酷太宗承之吏文亦深太武帝神䴥中詔崔浩定律令除五嵗四嵗刑增一年刑大逆不道腰斬誅其同籍年十四以下腐刑女子沒縣官害其親者轘之為蠱毒者男女皆斬女焚其家巫蠱者負羖羊抱犬沈諸泉當刑者贖負則加鞭二百畿内人富者燒炭於山貧者役於圊溷女子入舂藁其痼疾不逮於人守苑囿王官階九品得以官爵除刑婦人當刑而孕産後百日乃決年十四以降刑之半八十及九十非殺人不坐拷訊不踰四十凡論刑者部主言状公車鞫辭而三都決之當死者定案奏聞帝親臨問無異辭怨言乃刑之諸州囚大辟皆先讞報乃施行其後因官吏黷貨太延中詔吏人得舉告牧守之不法於是兇悖者求得牧宰之失乃貪暴於閭閻眞君中以有司斷法不平詔諸疑獄皆付中書依經義論決初盜律贓四十疋致大辟人多慢政乃減至三疋大平真君十一年誅司徒崔浩清河崔氏無逺近及范陽盧氏太原郭氏河東柳氏皆浩之親黨盡夷其族浩修國史標立石銘刋國記書事備而不典既列在衢路徃來行者以為言浩及祕書郎吏以下並死浩之将誅也幽縶置之檻内送於平城南使衞士數十人溲其上呼聲嗷嗷聞於行路自宰司之被害未有如浩之酷者正平中又命太子少傅游雅中書侍郎胡方囬等改定律制凡三百七十條門房之誅四犬辟百四十五刑二百二十一獻文帝太安中以士民多因酒致鬭及議國政乃設酒禁釀酤飲者皆斬之吉凶之㑹聼開禁有程日増置内外候官伺察諸曹及州鎮􅂉微服雜亂於府寺間以求百官過失有司窮治訊掠取服百官贓滿二丈皆斬又増律七十九章門房之誅十有三大辟三十五刑六十二孝文除口誤開酒禁故事皆斬祼形伏質太和初制不令祼形又令髙閭修舊文隨例増減凡八百三十二章門房之誅十有六大辟之罪二百三十五刑三百七十七除羣行剽劫首謀門誅律重者止梟首太和五年沙門法秀謀反誅詔曰法秀妖詐亂常妄説符瑞蘭臺御史張求等一百餘人招結奴𨽻謀為大逆有司科以族誅誠合刑憲但矜愚重命猶所不忍其五族者降止同祖三族止一門門誅止身帝勤於為政尤重刑罰大刑多令覆鞫􅂉囚繫積年羣臣頗以為言帝曰滯獄誠非善治不猶愈於倉猝而濫乎夫人幽苦則思善故智者以囹圄為福堂朕特苦之欲其改悔而加矜恕耳由是囚繫雖滯而所刑皆得其宜時法官及州縣多為重枷復以縋石懸於囚頸傷肉至骨勒以誣服帝傷之乃詔非大逆有眀證而不疑辭者不得大枷太和八年始班俸禄以十月為始季别受之舊律枉法十疋義贓二十疋罪死至是義贓一疋枉法無多少皆死仍分命使者紏察守宰之貪者秦益二州刺史恒農李洪之以外戚貴顯為治貪暴班禄之後洪之首以贓敗帝命鎻赴平城集百官親臨數之猶以其大臣聼在家自裁自餘守宰坐贓死者四十餘人受禄者無不跼蹐賕賂殄絶然吏民犯他法者帝率寛之疑罪奏讞多減死徙邉嵗以千計都下決大辟嵗不過五六人州鎮亦簡十五年詔犯死罪若父母祖父母年老更無成丁子孫又無周親者仰按後列奏以待報著之令宣武帝正始初尚書令髙肇等奏曰杖之小大鞭之長短令有定式但枷之輕重先無成制請造大枷長文三尺喉下長丈通頰木各方五寸以擬大逆外叛自是枷杖之制頗有定準法例律五等爵及在官品令從第以上皆當刑二嵗免官者三嵗之後聼仕降先階一等邢巒奏官人若有罪本除名以職當刑猶有餘資得降階而叙至於五等封爵除刑若盡永既甄削便同之除名於例實爽愚謂自王公以下有封邑罪除名三年之後宜各降本爵一等王及郡公降為縣公公為侯侯為伯伯為子子為男至於縣則降為鄉男五等爵者并依此而降至於散男其鄉男散男無可降授者三年之後聼依其本品之資出身從之文帝大統十三年詔自今應宫刑者直没官勿刑亡奴婢應黥者止亡罪北齊神武秉魏政遷都於鄴羣盜頗起遂嚴立制諸強盜殺人者首從皆斬妻子同籍配為樂戸其不殺人及贓不滿五疋魁首斬從者死妻子亦為樂戸小盜贓滿十疋以上魁首死妻子配驛從者流文宣受禪後命羣官刋定魏朝麟趾格又議造齊律積年不成其决獄猶依魏舊式自六年以後帝遂以功業自矜恣行酷暴昏狂􅒬醟任情喜怒為大鑊長鋸剉碓之屬並陳於庭意有不快則手自屠裂􅂉命左右臠噉以逞其意時僕射楊遵彦乃令憲司先定死罪囚置於仗衞之中帝欲殺人則執以應命謂之供御囚應三月不殺者則免其死帝嘗幸金鳯臺受佛戒多召死囚編蘧蒢為翅命之飛下謂之放生墜皆致死帝視以為歡笑時有司折獄又皆酷法訊囚則用車輻杖夾指壓踝又立之燒犁耳上􅂉使以臂貫燒車釭既不勝其苦皆致誣伏七年豫州檢使白㯹為左丞盧斐所劾乃於獄中誣告斐受金文宣知其姦罔詔令按之果無其事乃勅八座議立按劾格負罪不得告人事於是挾姦者畏糾乃先加誣訟以擬當格吏不能斷又妄相引大獄動至千人多移嵗月然帝猶委政輔臣楊遵彦彌縫其闕故時議者竊云主昏於上政清於下武成帝河清三年尚書令趙郡王叡等奏上齊律十二篇一曰名例二曰禁衞三曰戸婚四曰擅興五曰違制六曰詐欺七曰鬭訟八曰賊盗九曰捕斷十曰毁損十一曰廐牧十二曰雜其定罪九百四十九條又上新令三十卷大抵採魏晉故事其制刑名五一曰死重者轘之轘音患其次梟首並陳屍三日無市者列於鄉亭其次斬刑殊身首其次絞刑死而不殊凡四等二曰流刑謂論犯可死原情可降鞭笞百髠之投於邉裔以為兵卒未有道里之差其有不合逺配者男子長徒女子配舂並六年三曰刑罪即耐罪也有五嵗四嵗三嵗二嵗一嵗之差凡五等各加鞭六嵗者加笞百其五嵗者又加笞八十四嵗者六十三嵗者四十二嵗者二十一嵗者無笞並鏁輸作左校而不髠無保者鉗之婦人配舂及掖庭織四曰鞭有百八十六十五十四十之差凡五等五曰杖有三十二十一十之差凡三等當加者上就次當減者下就次贖罪舊有金皆代以中絹死百疋流九十二疋刑五嵗七十八疋四嵗六十四疋三嵗五十疋二嵗三十六疋各通鞭笞論一嵗無笞則通鞭二十四疋鞭杖毎十贖絹一疋至鞭百則絹十疋無絹之鄉皆凖絹収錢自贖笞十以上至死又為十五等之差當加減次如正決法合贖者謂流内官及爵秩比視老小閹癡并過失之屬犯罰絹一疋及杖十以下皆名為罪人盜及殺人而亡者即懸名注籍甄其一房配驛戸宗室則不注盜不入奚官不加宮刑自犯流罪以下合贖者及婦人犯刑以下侏儒篤疾殘廢非犯死罪皆訟繫之罪刑年者鏁無鏁以枷流罪以上枷杻械死罪者桁之桁戸郎反決流刑鞭笞者鞭其背五十一易執鞭人鞭鞘皆用熟皮削去亷稜鞭瘡長一尺笞者笞臀而不中易人杖長三尺五寸大頭逕二分半小頭逕一分半決三十以下者杖長四尺大頭逕三分小頭逕二分在官犯罪鞭杖十為一負閑局六負為一殿平局八負為一殿繁局十負為一殿加於殿者復計為負焉又列重罪十條一曰反逆二曰大逆三曰叛四曰降五曰惡逆六曰不道七曰不敬八曰不孝九曰不義十曰内亂其犯十者不在八議論贖之限是後法令眀審科條簡要又勅仕門子弟常講習之故齊人多曉法律其不可為定法者别制權令二卷與之並行後平秦王高歸彦謀反須有約罪律無正條於是遂有别條權格與律並行大理眀法上下比附欲出則附依輕議欲入則附從重法姦吏因之舞文出沒至於後主權幸用事有不附者隂中以法綱紀紊亂卒至於亡周武帝保定三年司憲大夫拓㧞迪奏新律謂之大律凡二十五篇一曰刑名二曰法例三曰祀享四曰朝㑹五曰婚姻六曰戸禁七曰水火八曰興繕九曰衞宫十曰市㕓十一曰鬭競十二曰劫盜十三曰賊叛十四曰毁亡十五曰違制十六曰關津十七曰諸侯十八曰廐牧十九曰雜犯二十曰詐偽二十一曰請求二十二曰告言二十三曰逃亡二十四曰繫訊二十五曰斷獄大凡定罪千五百三十條其制罪一曰杖刑五自十五至五十二曰鞭刑五自六十至於百三曰徒刑五徒一年者鞭六十笞十徒二年者鞭七十笞二十徒三年者鞭八十笞三十徒四年者鞭九十笞四十徒五年者鞭百笞五十四曰流刑流衞服去皇畿二千五百里者鞭百笞六十流要服去皇畿三千里者鞭百笞七十流荒服去皇畿三千五百里者鞭百笞八十流鎮服去皇畿四千里者鞭百笞九十流藩服去皇畿四千五百里者鞭百笞百死刑五一曰磬二曰絞三曰斬四曰梟五曰裂五刑之屬各有五合二十五等不立十惡之目而重惡逆不道大不敬不孝不義内亂之罪也凡惡逆肆之三日盜賊羣攻鄉邑及入人家者殺之無罪若報讎者造於法造七報反而自殺之不坐經為盜者注其籍唯皇宗則否凡死罪枷而拲流罪枷而梏徒罪枷鞭罪桎杖罪散以待斷皇族及有爵者死罪以下鏁之徒以下散之獄成将殺者書其姓名及其罪於拲而殺之市唯皇族與有爵者隐獄其贖杖刑五金一兩至五兩贖鞭刑五金六兩至十兩贖徒刑一年金十二兩二年十五兩三年一觔二兩四年一觔五兩五年一觔八兩贖流刑一觔十二兩俱役六年不以逺近為差等贖死刑金二觔鞭者以百為限加笞者合二百止應加鞭笞者皆先笞後鞭婦人當笞者聼以贖論徒輸作者皆任其所能而役使之杖十以上當加者上就次數滿乃坐當減者死罪流藩服藩服以下俱至徒五年以下各以一等為差為盜賊者及謀反大逆降叛惡逆罪當流者皆甄一房配為雜戸其為盜賊事發逃亡者懸名注配若再犯徒三犯鞭者一身永配下役應贖金者鞭杖十収中絹一疋流徒者依限嵗収絹十二疋死罪者百疋其贖刑死罪五旬流刑四旬徒刑三旬鞭刑一旬限外不輸者歸於法貧者請而免之大凡定法千五百三十七條其大畧滋章條流苛宻比於齊法煩而不要又初除復讎之法犯者以殺論帝又以齊之舊俗未改昏政賊盗姦宄頗乖憲章其年又為刑書要制以督之其大抵持杖羣盗一疋以上不持杖羣盗五疋以上監臨主掌自盗二十疋以上盗及詐請官物三十疋以上主長隐五戸及丁五以上及地頃以上皆死自餘依大律由是澆詐頗息焉宣帝性殘忍暴戾自在儲貳惡其叔父齊王憲及王軌宇文孝伯等及即位並先誅戮由是外内不安俱懐危懼其後荒滛日甚惡聞其過誅戮無度疎斥大臣又數行肆赦為姦者皆輕犯法政令否塞下無適從於是又廣刑書要制而更峻其法謂之刑經聖制宿衞之官一日不直罪至削除逃亡者皆死而家口籍沒上書字誤者科其罪又作礔礰車以威婦人其決人云與杖者即百二十云多打者即二百四十名曰天杖帝既酣飲過度有下士楊文祐因歌曰朝亦醉暮亦醉日日恒常醉政事日無次鄭譯奏之帝怒命賜杖二百四十而致死後更命中士皇甫猛又諷諌鄭譯又奏之又賜猛杖百二十是時下自公卿内及妃后咸加捶楚上下愁怨隋文帝初令髙熲等更定新律其刑名有五一曰死刑二有絞有斬二曰流刑三有千里千五百里二千里應配者千里居作二年千五百里居作二年半二千里居作三年三曰徒刑五有一年一年半二年二年半三年四曰杖刑五自六十至於百五曰笞刑五自十至於五十而蠲除前代鞭刑及梟首轘裂之法其流徒之罪皆減從輕流役六年改為五年徒刑五年改為三年唯大逆謀反叛者父子兄弟皆斬家口沒官又置十惡之條多採齊之制而頗有損益一曰謀反二曰謀大逆三曰謀叛四曰惡逆五曰不道六曰大不敬七曰不孝八曰不睦九曰不義十曰内亂十惡及故殺人獄成者雖㑹赦猶除名其在八議之科及官品第七以上犯罪皆例減一等其品第九以上犯者聽贖應贖者皆以銅代絹銅一觔為負負十為殿笞十者銅一觔加至杖百則十觔徒一年贖銅二十觔每等則加銅十觔三年則六十觔矣流千里贖銅八十觔毎等則加銅十觔三千里則百觔矣二死皆贖銅百二十觔犯法私罪以官當徒者五品以上一官當徒二年九品以上一官當徒一年當流者三流同皆比徒三年若犯公罪者加一年當流者各加一等其累徒過九年者流二千里自前代相承有司訊考皆以法外􅂉有用大棒束杖車輻鞵底壓踝杖桄之屬盡除之訊囚不得過二百枷杖大小咸為之程而行杖者不得易人又勅四方辭訟有枉屈縣不治者令以次經郡及州至省仍不治乃詣闕申訴有所未愜聼撾登聞鼓有司録状奏之帝又每季親録囚徒常以秋分之前省閲諸州申奏罪状後因覽刑部奏斷獄數猶至萬條以為律尚嚴宻故人多陥罪又勅蘇威牛𢎞等更定新律除死罪八十一條流罪百五十四條徒等千餘條定留唯五百條凡十二卷一曰名例二曰衞禁三曰職制四曰戸婚五曰廐庫六曰擅興七曰賊盗八曰鬭訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄自是刑網簡要踈而不失於是置律博士弟子員斷决大獄皆先牒眀法定其罪名然後依斷其後帝以用律者多致蹐駮罪同論異詔諸州死罪不得便决悉移大理按覆事盡然後上奏取裁帝性猜忌素不恱學既任智而獲大位因以文法自矜眀察臨下恒令左右覘内外小有過失則加以重罪又患令史贓汙因私使人以錢帛遺之得犯立斬每於殿廷打人一日之中􅂉至數四嘗怒問事捶楚不甚即令斬之十四年尚書左僕射高熲理書侍御史柳彧等諌以為朝堂非殺人之處闕廷非决罰之地帝不納熲等乃盡詣朝堂請罪曰陛下子育羣生務在去弊而百姓無知犯法不息致陛下决罰過嚴皆臣等不能有所禆益乞自退屏以避賢路帝於是顧謂領左右都督田元曰吾杖重乎元曰重問其状元舉手曰陛下杖大如指捶楚人三十者比常數百故多致死帝不懌乃令殿内去杖欲有决罰各委所由後楚州行参軍李君才上言帝寵髙熲過甚上大怒命杖之而殿内無杖遂以馬鞭笞殺之自是殿内復置杖未㡬怒甚又於殿廷殺人兵部侍郎馮基固諌帝不從竟於殿廷行决帝亦㝷悔宣慰馮基而怒羣寮之不諌者也開皇十三年改徒及流並為配防十五年制死罪三奏而後決十六年有司奏合川倉粟少七千石命斛律孝卿鞫問其事以為主典所竊令孝卿馳驛斬之沒其家為奴婢鬻粟以填之是後盗邉糧者一斗以上皆死家口沒官十七年詔所在官人不相敬憚多自寛縦事難克舉諸有殿失雖備科條􅂉據律乃輕論情則重不即决罪無以懲肅其諸司屬官若有􅗅犯聼於律外斟酌决杖於是上下相驅迭行捶楚以殘暴為幹能以守法為懦弱時帝意毎尚惨急而姦囬不止又定盗一錢棄市法聞見不告者坐至死自此四人共盗一榱桶三人共竊一𤓰事發即時行决有數人劫執事而謂之曰吾豈求財者耶但為枉人來耳而為我奏至尊自古以來體國立法未有盗一錢而死也而不為我以聞吾更來而屬無類矣帝聞之為停盗取一錢棄市之法帝常發怒六月棒殺人大理少卿趙綽固争曰季夏之月天地成長庻類不可以此時誅殺帝報曰六月雖曰生長此時必有雷霆天道既於炎陽之時震其威怒則天而行有何不可遂殺之帝猜忌益甚臣寮用法尤峻御史以元正日不劾武官衣劔之不齊者􅂉以白帝帝謂之曰爾為御史何縱捨自由命殺之諌議大夫毛思祖諌又殺之左領軍府長史考校不平将作寺丞以課麥遲晩武庫令以署庭荒蕪獨孤師以私受蕃客鸚鵡帝察知之並親臨斬决仁夀中用法益峻帝既喜怒不常不復依凖科條時楊素正被委任素又禀性髙下公卿股慄不敢指言素於鴻臚少卿陳延不平蕃客館庭中有馬屎又庻僕氊上樗蒲旋以白帝主客令與掌故皆坐棒殺而搒捶陳延殆至於斃大理寺丞楊逺劉子通等性爱深文每隨衙奏獄能順帝㫖帝大恱並遣於殿廷三品行中供奉每有詔獄專使主之候帝之所不快則按以重抵無殊罪而死者不可勝計逺又能附楊素毎於途中接候而以囚名目白之皆隨素所為輕重其臨刑赴市者莫不途中呼枉仰天而哭煬帝即位以高祖禁網深刻乃勅修律令除十惡之條開皇舊制亹門子弟不得居宿衞近侍之官先時蕭巖以叛誅崔君綽坐連庶人勇事家口籍沒巖以中宫故君綽縁女入宫爱幸帝乃下詔革前制令諸州犯罪被戮之門周以下親仍令合仕聼預宿衞近侍之官大業三年新律成凡五百條為十八篇詔施行之謂之大業律一曰名例二曰衞宮三曰違制四曰請求五曰戸六曰婚七曰擅興八曰告劾九曰賊十曰盗十一曰鬭十二曰捕亡十三曰倉庫十四曰廐牧十五曰関市十六曰雜十七曰詐偽十八曰斷獄其五刑之内降從輕典者二百餘條其枷杖决罰訊囚之制並輕於舊是時百姓乆厭嚴刻喜於寛刑後帝乃外征四夷内窮嗜欲兵革歳動賦歛滋繁有司皆臨時廹脅茍求濟凶憲章遐棄賄賂公行窮人無告聚為盗賊帝乃更立嚴刑勅天下竊盗已上罪無輕重不待聞奏皆斬百姓轉相羣聚攻剽城邑誅罰不能禁帝以盗賊不息乃益肆滛刑又詔為盗者籍沒其家自是羣盗大起郡縣官人又各專威福生殺任情矣及楊元感反帝誅之罪及九族其尤重者行轘裂梟首之刑􅂉磔而射之命公卿以下臠噉其肉百姓怨嗟天下大潰文獻通考卷一百六十五
