body:
  text: 文獻通考卷一百四十鄱陽馬端臨貴與著樂考十三樂懸陳氏樂書曰古者治定制禮功成作樂舜之為樂戛擊鳴球搏拊琴瑟以詠堂上之樂也以象廟朝之治故繼之祖考来格虞賓在位羣后徳讓下管鼗鼓合止柷敔笙鏞以間堂下之樂也以象萬物之治故繼之鳥獸蹌蹌禮記文王世子曰登歌清廟下管象武郊特牲曰歌者在上匏竹在下貴人聲也仲尼燕居曰升歌清廟示徳也下而管象示事也祭義曰昔周公有勲勞於天下成王賜之重祭升歌清廟下而管象燕禮大射曰升歌鹿鳴四牡皇皇者華下管新宫由此觀之周之升歌不過清廟鹿鳴四牡皇皇者華下管不過象武新宫則舜升歌下管之詩雖無經見要之歌以示徳管以示事一也徳成扵上歌詠扵堂上事成扵下管吹扵堂下豈非無所因為上有所待為下邪極而論之堂上之樂以詠為主堂下之樂以間為主則律和聲也兩者並用然後上合奏而不失中和之紀矣然則樂之張陳戛擊必扵堂上柷敔必扵堂下何邪曰柷敔器也戛擊所以作器也器則卑而在下作器者尊而在上貴賤之等也六詠為律六間為吕言以間而不言律與周官言典同同意荀卿曰縣一鐘而尚拊大戴禮曰縣一磬而尚拊為堂上之樂則一鐘一磬尚拊亦堂上之樂也盖古者歌詩搏拊而縣興故一鐘黄鍾之特鐘也一磬黄鍾之特磬也方其工之升歌也搏拊而鐘磬作焉黄鍾之鐘鳴扵堂上而堂下之編鐘應之黄鍾之磬鳴扵堂上而堂下之編磬應之所以節歌者之句也豈非以歌中聲之詩必假中聲之鐘磬以發其音邪宋朝堂上之樂不設一鐘一磬而尚拊臣恐未合先王之制神瞽考中聲之意也又曰古之君子反情以和其志比類以成其行然後發以聲音文以琴瑟而堂上之樂作矣動以干戚飾以羽旄從以簫管而堂下之樂作矣琴瑟作扵堂上象廟朝之治簫管作扵堂下象萬物之治則徳自此顯足以奮至徳之光氣自此調足以動四氣之和其扵著萬物之理也何有若夫荀卿謂君子以鐘鼓導将是又合堂上下之樂而雜論之非分而序之故也荀卿以堂上鞉柷椌楬為似萬物則是以堂上之拊似之誤矣樂書房中樂論曰燕禮若與四方之賓燕有房中之樂周禮笙師教縵樂燕樂之鐘磬漢書曰漢有房中祠樂髙祖唐山夫人所作梁書曰周􅊀六代之樂至秦餘韶房中而已由是推之房中之樂自周至扵秦漢盖未甞􅆸其所異者特秦更為夀人漢更為安世魏更為正世至晉復為房中也漢恵帝使夏侯寛合之管絃晉武帝别置女樂三十人扵黄帳外隋髙祖嘗謂羣臣曰自古天子有女樂暉逺對曰窈窕淑女鐘鼓樂之則房中之樂也髙祖大悦然則房中之樂非無鐘磬也毛萇侯芭孫毓皆云有鐘磬是已鄭康成王肅謂房中之樂弦歌周南召南而不用鐘磬之節后夫人之所諷誦以事君子也陳統曰婦人尚柔以静為體不宜用鐘至隋牛𢎞修樂採蕭統之説而然之取文帝地厚天髙之曲命嬪御登歌上夀而已是不深考闗雎磬師之過也賈公彦亦謂房中之樂以祭祀則有鐘磬以燕則無鐘磬是亦文先儒之過又從而為之辭也唐禮書房中之樂不用鐘鎛以十二大磬代之是不知一音不備不足以為樂也周禮春官大司樂掌凡樂事大祭祀宿懸遂以聲展之叩聼其聲具陳次之以知完不小胥正樂懸之位王宫懸諸侯軒懸卿大夫判懸士特懸辨其聲樂懸謂鐘磬之屬懸扵筍虡者鄭衆云宫懸四面懸軒懸去其一面判懸又去其一面特懸又去其一面四面象宫室四面有墻故謂之宮懸軒懸三面其形曲故春秋傳曰請曲懸繁纓以朝諸侯之禮言謂軒懸去南面避王也判懸左右之合空空北面特懸之扵東方􅂉扵階間而已凡懸鐘磬半為堵全為肆鐘磬者編懸之二八十六枚而在一虡謂之堵鐘一堵磬一堵謂之肆半之者謂諸侯之卿大夫也半天子之卿大夫西懸鐘東懸磬亦半天子之士懸磬而已鄭衆云以春秋傳曰歌鐘二肆陳氏樂書曰樂懸之制自夏商而上未有聞焉自夏商而下其略始見扵尚書大傳其詳備扵周禮春官以書大傳推之自古天子将出撞黄鍾右五鐘皆應黄鍾在陽陽主動君出則以動吿静而静者皆和故馬鳴中律歩者有容駕者有文御者有數周旋中規折旋中矩立則磬折拱則抱鼓然後奏登車吿出也入撞蕤賓左五鐘皆應蕤賓在陰陰主静君入則以静吿動而動皆和故狗吠彘鳴及倮介之蟲莫不延頸以聼在内者皆玉色在外者皆金聲然後少師奏登堂就席吿入也然則十二鐘在懸之制權輿扵此歟以周禮春官推之大司農凡樂事大祭祀宿縣遂以聲展之小胥之職正縣樂之位王宫縣諸侯軒縣卿大夫判縣士特縣辨其聲凡縣鐘磬半為堵全為肆盖縣鐘十二為一堵如􅉹堵然二堵為一肆春秋襄十年鄭人賂晉侯歌鐘二肆是也宫縣四面象宫室王以四方為家故也軒懸缺其南避王南面故也判懸東西之象卿大夫左右王也特懸則一肆而已象士之特立獨行也郊特牲譏諸侯宫懸漢武帝髙張四懸晉元帝備四廂金玊豈王宫懸歟春秋譏衛仲叔于奚請曲縣後漢光武賜東海恭王鐘簨之樂豈諸侯軒縣歟禮大夫無故不徹縣椘子享卻至為地室而縣焉田蚡前庭羅鐘鼓立曲旃豈大夫判縣歟鄉射笙入扵縣中西面則東縣磬而已鄉飲磬階縮霤笙入磬南則縮縣而已豈士特縣歟通禮義纂曰軒縣三面歌鐘三肆判縣兩面歌鐘二肆特縣一面惟磬而已其説是也然則鄉射有卿大夫詢衆庶之事鄉飲酒乃卿大夫之禮皆特縣者也以詢庶賓賢􅀎非為已也故皆從士制燕禮諸侯之禮而工止四人以從大夫之制意亦類此以儀禮考之大射樂人宿縣為阼階東笙磬西面其南笙鐘其南鎛皆南陳建鼓在阼階西南鼓應鼙在東南鼓西階之西頌磬東南其南鐘其南鎛皆南陳一建鼓在其南東鼓􅃋鼙在其北一建鼓在西階之東南面簜在建鼓之間鼗倚扵頌磬西紘由是觀之宫縣四面軒縣三面皆鐘磬鎛也判縣有鐘磬而無鎛特縣有磬而無鐘以王制論之則然以侯制論之又半扵王制矣王制卿大夫判縣東西各一肆則諸侯之卿大夫東西各一堵王之士特縣南一肆則諸侯之士一堵可知矣鄭康成曰鐘磬十六在一虡為一堵杜預曰縣鐘十六為一肆後世四清之聲興焉是亦傅會漢得石磬十六遷就而為之志也服䖍一縣十九鐘之説不亦詭哉又曰大射之儀樂人宿縣扵阼階東笙磬西面其南笙鐘其南鎛皆南陳建鼓在阼階西南鼓應鼙在其東南鼓西階之西頌磬東面其南鐘其南鎛皆南陳一建鼓在其南東鼓􅃋鼙在其北一建鼓在西階之東南面簜在建鼓之間鼗倚頌磬西紘盖堂上之階自階而左為阼自階而右為西笙磬在阼階之東而面西頌磬在西階之西而面東由笙磬而南鐘鎛所以應笙者也由頌磬而南鐘鎛所以應歌者也階雖分乎東西其鐘鎛南陳一也自阼階堂下言之一建鼓在其西而面南鼙在其東而亦面南焉自西階堂下言之一建鼓在其階之南而面東􅃋鼙在其北而亦面東焉一建鼓在其階之東面南簜在建鼓之間鼗倚扵頌磬之西紘盖諸侯之樂備三面以為軒縣大射之儀東西有鐘磬之縣推之則天子宫縣堂上之階笙磬頌磬各十二縣堂下阼階而南特鐘特鎛亦各十二縣西階而南編鐘編鎛亦各十二縣天數也魏志曰武帝至漢中得杜䕫説舊法始復軒縣磬如今用之受之扵杜䕫也又曰陰精之純莫如金陽精之純莫如玉天以陰陽立道乾以西北定位西陰位也扵物為金北陽位也扵物為玊孔子寓象扵易揚雄寓象扵太元莫不有是説焉今夫莫尊扵天莫親扵地先王所以奉事而祭祀以為舉天下之物無以稱其徳惟金與玉而已故金罍金爵以禮之圭邸璧琮以祀之則樂以金鐘玉磬固其宜也昔禹王天下菲飲食而致孝乎鬼神惡衣服而致美乎黻冕豈有金鐘玉磬不施扵天地特施扵廟朝哉宋朝著令天子親祠南郊及大饗登歌用金鐘玉磬可謂得古人致美之意矣比年以来太樂丞葉防倣唐朝一時茍簡之制欲移郊祀天地金鐘玉磬施諸廟朝至扵天地特用質素石磬而已是厚扵自奉而薄扵天地豈先王禮意哉葉防所據雖出扵唐求之扵經亦不過書有鳴球格祖考之文然不知書舉祖考以見天地而鳴球不特施廟朝也釐而正之實在聖時庶乎神宗皇帝奉事天地誠意被乎萬古而無窮矣通禮義纂曰天地尚質用石宗廟及殿庭尚文用玉磬必用之者聲清正陰陽之祭主扵金石也漢舊儀髙廟撞千石之鐘十枚即上林賦所謂撞千石之鐘立萬石之虡是也鐘當十二而此十枚未識其義議者皆言漢世不知用宫縣按漢章和世實用旋宫漢代羣儒備言其義牛𢎞祖孝孫所由凖的知漢代之樂為最備漢樂歌云髙張四縣謂宫縣也後漢則亡矣漢丞相田蚡前堂羅鐘磬置曲旃光武又賜東海恭王鐘簨之樂即漢代人臣尚有金石樂晉䘮亂以来江右金石不具本史云至孝武帝太元中破苻堅獲樂工楊蜀等正四廂樂金石始備諸家著晉史者皆言太元四年四廂金石大備其實樂府止有黄鍾姑洗蕤賓太蔟四格而已十二律不具何謂四廂備樂之文其義焉在魏散騎常侍王肅議曰王者各以其禮制事天地今説者據周官單文為經國大體懼其局而不𢎞也漢武帝東廵狩封禪還祠太一扵甘泉祭后土扵汾陰皆盡用其樂言盡用者宫懸之樂也天地之性貴質者盖謂其器之不文不謂庶物當減也禮天子宫懸舞八佾今祀圜丘方澤宜以天子制設宫懸之樂八佾之舞奏可肅又議曰説者以為周家祀天唯舞雲門祭地唯舞咸池宗廟唯舞大武似失其義矣周禮賓客皆作備樂左傳王子頽享五大夫樂及徧舞六代之樂也然則一會之日具作六代之樂天地宗廟事之大者賓客燕會比之為細王制曰庶羞不踰牲燕衣不踰祭服可以燕樂而踰天地宗廟之樂乎周官以六律六吕同五聲八音六舞大合樂以致鬼神以和邦國以諧萬民以安賓客以悦逺人夫六律六吕五聲八音皆一時而作也至扵六舞獨分擘而用之非所以􅌅人心也乂周官韎師掌教韎樂韎莫拜反祭祀則帥其屬而舞之大享亦如之韎東夷之樂也又鞮鞻掌四夷之樂與其聲歌祭祀則吹而歌之燕亦如之四夷之樂乃入宗廟先代之典獨不得用大享及燕曰如之者眀古今夷夏之樂皆主之扵宗廟而後播及其餘也夫作先王樂者貴􅀎苞而用之也納四夷之樂者美徳廣之所及也髙皇帝太皇帝太祖髙祖文昭廟皆宜兼用先代及武始大均之舞尚書盧毓奏協律中郎将左延年議按周禮以雲門祀天咸池祀地又令宗廟用宫縣則祀天地宜用宫懸博士趙怡以為古無四縣四縣自周始爾未有作古樂而用近縣也按今天地之樂縣謂之上下管與虞舜笙鏞同不言二縣宜如故事但設上下管而已侍中繆龍議周存六代之樂故各有所用今樂制既亡唯承漢氏韶武魏承舜乂周為二王之統故文始大武武徳武始大鈞可以備四代之樂奏黄鍾舞文始以禮天地奏太蔟舞大武以祀五郊眀堂奏姑洗舞武徳廵狩以祭四望山川奏蕤賓舞武始大鈞以祭宗廟及二至祀丘澤扵祭可兼舞四代又漢有雲翹育命之舞不知所出舊以祭天今可兼以雲翹祀圜丘兼以育命祀方澤祀天地宜官懸如延年議司空衛臻議圜丘宜用大韶樂宜宫縣宗廟之樂宜用武始咸熈宋文帝元嘉中鍾宗之更調金石十四奚縦又改之晉及宋齊縣鐘磬大凖相似皆十六架陳氏樂書曰自兩漢而下晉及宋齊鐘磬之縣皆不過十六虡黄鍾之宫北方北面編鐘起西其東編鐘其東衡其東鎛太蔟之宫東方西面起北蕤賓之宫南方北面起東姑洗之宫西方東面起南所次並如黄鍾之宫設建鼓扵四隅縣内四面各有柷敔武帝曰今太學有黄鍾姑洗蕤賓太蔟四格號為四指各置五鐘别以五鐘應之然大傳言天子出撞黄鍾右五鐘皆應是起建丑月至建巳月也入撞蕤賓左五鐘皆應是起建未月至建亥月也合二五而十之就黄鍾蕤賓則十二律之數備矣晉太元中楊蜀正四廂宋元嘉中鍾宗之調金石不知乎此乃用四律律各鑄五鐘奏樂之日各以參之置左則缺右置右則缺左失之逺矣梁制凡律吕十二月而各一鐘天子宫縣黄鍾蕤賓在南北自餘則在東西黄鍾廂宜用鐘磬各二十四以應二十四氣也當是時因去衡鐘設十二鎛鐘各依辰位而應律毎一鎛鐘設編鐘磬各一簴簴合三十六架植鼓扵四隅元會備用焉初宋齊以太蔟代夹鍾在東廂西嚮以姑洗代南吕在西廂東嚮不亦失乎梁武帝制曰先儒皆以宗廟宜設宫縣按周官奏黄鍾歌大吕舞雲門以祀天神奏太蔟歌應鍾舞咸池以祭地祇奏夷則歌小吕舞大濩以享先妣奏無射歌夹鍾舞大武以享先祖虞書云戛擊鳴球搏拊琴瑟以詠祖考来格下管鼗鼓合止柷敔笙鏞以間周禮則分樂享祀虞書則止鳴四縣求之扵古無宫縣之文按所以不宫縣者事人禮縟音辱數也事神禮簡禮器云天子之堂九尺而至敬不壇天子龍衮而至敬不文觀天下物無可以稱其徳者則以少為貴郊特牲云宗廟之器可用也而不可使其利所以交扵神也不可以同扵所安樂之義也王肅初不分析此前數㫖直言用天子之制若郊廟既均其制二神禮文復何以同今宜祀天地宗廟逐所應須便即設之則非宫非軒非判非特直以致敬所以應施用耳後魏詔公孫崇劉芳更造金石又詔祖瑩理之太樂令張乾龜謂瑩曰劉芳所造六格郊丘宗廟用之北廂黄鍾之均實夷則之調餘三廂官商不和共用一笛又有姑洗太蔟二格用之後宫檢其聲用復是夷則鐘磬之縣各有十四瑩復更為十六其後元孚復詢張乾龜等前置宫縣四廂筍虡十六乂有儀鐘十四簴縣架首初不叩擊元孚始按律求聲依十二月設縣會旋相為宫之義又得律吕相生之體亦可謂用心矣然樂縣十二應十二中氣古之制也四廂十六義用四清之過也儀鐘十四虡用正倍七音之過也後周長孫紹逺謂樂以八為數時裴正上書以為大舜欲聞七始周武爰創七音特林鍾作黄鍾以為正調之首詔與紹逺詳議遂定以八數焉後武帝讀史書見武王克商而作七始又欲􅆸八縣七并除黄鍾正宫用林鍾為調首紹逺復奏曰天子縣八肇自先民詳諸經義又無􅆸八之典且黄鍾為君天子正位今欲􅆸之未見其可後帝終􅆸七音屬紹逺遘疾慮有司遽損樂器乃與樂部齊植言之要之􅆸八縣七非也􅆸七縣八亦非也析之聖經惟縣十二為合古制矣隋宫縣四面面各二虡通十二鎛為二十虡各一員建鼓四員歌琴瑟簫筑筝搊筝卧箜篌小琵琶面各十人在編磬下笙竽長笛横笛簫觱篥箎壎面各八人在編鐘下舞各八佾宫縣筍虡金五博山飾以流蘇植羽其樂器應漆者天地之神皆朱宗廟殿庭加五色漆畫天神縣内加雷鼓地祇加靈鼓宗廟加路鼓殿庭不加鼓縣工皆平巾幘朱連裳後牛𢎞等更定其制􅊞後周故事用七正七倍合為十四長孫紹逺援國語書傳七律七始之説並據一言之也梁武帝加以濁倍三七而同為簴後魏公孫崇設鐘磬正倍參縣之洪等並以為非而據周官縣鐘磬堵肆編縣二八之文并引樂緯宫為君商為臣君臣皆尊各置一副故加十四而架十六乂參用儀禮及大傳為宫架陳布之法北方南向應鍾起西磬次之黄鍾次之鐘次之大吕次之皆東陳一建鼓在其東東鼓東方西向太蔟起北磬次之夹鍾次之鐘次之姑洗次之皆南陳一建鼓在其東南鼓南方北向中吕起東鐘次之蕤賓次之磬次之林鍾次之皆西陳一建鼓在其西西鼓西方東向夷則起南鍾次之南吕次之磬次之無射次之皆北陳一建鼓在其北西鼓若大射撤其北面而加鉦鼓祭天雷鼓祭地靈鼓宗廟路鼓各有鞉焉儀禮宫架四面設鎛鐘十二簴各依辰位甲丙庚壬之位設鐘乙丁辛癸之位陳磬共二十簴宗廟殿庭郊丘及社用之植建鼓扵四隅以象二十四氣依月為均四廟同作取詩毛公傳四架皆同之義也毎鎛鐘建鼓别一工鐘磬虡别一工歌工二執節工一毎磬簴琴瑟筝筑别一工毎鐘簴竽笙簫笛塤箎别一工縣内柷在東敔在西别一工髙祖時宫架樂器裁有一部殿庭用之平陳又獲二部宗廟郊丘分用之至是並藏樂府更造三部五部二十格工一百四十三宗廟二十格工一百五十享宴二十格工一百七舞工各二等並一百三十二惟罷搊筝卧箜篌小琵琶横笛觱篥五器然筝筑尚存亦未純周官之制歟唐樂縣之制宫縣四面天子用之若祭祀則前祀二日太樂令設縣扵壇南内壝之外北嚮東方西方磬虡起北鐘虡次之南方北方磬虡起西鐘虡次之鎛鐘十有二在十二辰之位樹雷鼓扵北縣之内道之左右植建鼓扵四隅置柷敔扵縣内柷在左敔在右設歌鐘歌磬扵壇上南方北向磬虡在西鐘虡在東琴瑟筝筑皆一當磬虡之次匏竹在下凡天神之類皆以雷鼓地祇之類皆以靈鼓人鬼之類皆以路鼓其設扵庭則在南而登歌者在堂若朝會則加鐘磬十二虡設鼓吹十二案扵建鼓之外案設羽葆鼓一大鼓一金錞一歌簫笳皆二登歌鐘磬各一虡節鼓一歌者四人琴瑟筝筑皆一在堂上笙和簫箎塤皆一在堂下若皇后享先蠶則設十二大磬以當辰位而無路鼓軒縣三面皇太子用之若釋奠扵文宣王武成王亦用之其制去宫縣之南面判縣二面唐之舊禮祭風伯雨師五嶽四瀆用之其去軒縣之北面皆植建鼓扵東北西北二隅特縣去判縣之西面􅂉陳扵階間有其制而無所用凡直者為簨横者為虡虡以縣鐘磬皆十有六周人謂之一堵而唐人謂之一虡自隋以前宫縣二十虡及隋平陳得梁故事用三十六虡遂用之唐初因隋舊用三十六虡髙宗􅅫莱宫成增用七十二虡至武后時省之開元定禮始依古制為二十虡至昭宗宰相張濬已修樂縣乃言舊制太清宫南北郊社稷及諸殿庭用二十虡而太廟含元殿用三十六虡濬以為非古而廟庭狭隘不能容三十六乃復用二十虡而鐘虡四以當甲丙庚壬磬虡四以當乙丁辛癸與開元禮異而不知其改制之時􅂉説以鐘磬應隂陽之位此禮經所不著宫縣登歌工人皆介幘朱連裳革帶烏皮㞞鼓人及階下二人皆武弁朱䙐衣革帶烏皮履若在殿庭加白練􅜵襠白布襖吹鼓二人亦如之皇后庭諸后廟及郊祭立二十架同舞八佾先聖及皇太子朝廟並九架舞六佾縣間設柷敔各一柷左敔右錞于撫拍頓相鐃鐸次列扵路鼓南舞人列扵縣北登歌二架登扵堂上兩楹之前編鐘在東編磬在西登歌工人坐堂上竹人立堂下殿庭加設鼓吹扵四隅燕享陳清樂涼樂架對列扵左右廂設舞筵扵其間舊皇后庭但設絲管隋大業尚侈始置鐘磬猶不設鎛鐘以鎛磬代武太后稱制用鐘因而不革唐凡宫縣軒縣之作奏二舞以為衆樂之容一曰文舞二曰武舞宫縣之舞八佾軒縣之舞六佾文舞之制左執籥右執翟二人執纛以引之文舞六十四人供郊廟服委貎冠元系布大䄂白練領褾白紗中單絳領褾絳布大口袴革帶烏皮履白布襪其執纛人衣冠各同文舞謂之九功武舞之制左執千右執鉞一人執旌居前二人執鼗二人執鐸四人持金錞二人奏之二人執鐃以次之二人執相在左二人執雅在右武舞六十四人供郊廟平冕餘同文舞若供殿庭服武弁平巾幘金支緋􅁝布大袖襠甲金飾白練􅜵襠錦騰蛇起梁帶豹文大口布袴烏布鞋其執旌人衣冠各同當色舞人餘同工人也武舞謂之七徳凡簨虡飾以崇牙流蘓樹羽宫縣毎架則金五博山軒縣則金三博山鼓承以花趺覆以華盖樂縣横曰簨竪曰虡飾簨以飛龍飾趺以飛廉鐘簨以􅋧獸磬虡以􅋧鳥上則樹羽旁縣流蘓周制也縣以崇牙殷制也飾以博山後代所加也凡樂器之飾天地之神尚赤宗廟及殿庭尚彩東宫亦赤凡中宫之樂則以大磬代鐘鼓餘如宫縣之制凡磬天地之神用石宗廟及殿庭用玉凡有事扵天神用雷鼓雷鼗地神用靈鼓靈鼗宗廟及帝社用路鼓路鼗皆建扵宫縣之内凡大宴會設十部之伎扵庭以備華夷一曰燕樂伎有景雲之舞慶善之舞破陣樂之舞承天樂之舞二曰清樂伎三曰西涼伎四曰天竺伎五曰髙麗伎六曰龜兹伎七曰安國伎八曰踈勒伎九曰髙昌伎十曰康國伎其十部所用工人樂器在清樂及四方樂篇中毎先奏樂三日太樂令宿設縣扵庭其日率工人入居次協律郎舉麾樂作十麾樂止文舞退武舞進陳氏樂書曰天寳之亂肅宗克復兩京至徳以来惟正旦含元殿受朝賀設宫架自餘郊廟大祭但登歌無壇下庭中樂舞矣僖宗廣眀之後金奏幾亡而捜募架器略無存者昭宗将謁郊廟而有司請造架樂扵是張濬為修奉樂架使􅊖集太常諸工詢逮不得其法博士商盈孫練故實轉􅄸取法以鎛鐘之輕重髙徑還定編鐘以相參檢正黄鍾九寸五分倍應鍾三寸三分半凡為四十八等繪状以聞乃詔金工依法鑄之得二百四十枚濬先令處士蕭承訓梨園樂工陳言較定石磬至是合奏焉音韻克諧時營復太廟其庭陋狭濬因建議曰舊制太廟含元殿設架三十六格南北郊社稷太清官及餘殿各二十格兵興以来雅樂淪缺請仍周漢故事設樂虡二十詔以為可亦姑通時宜也唐之樂架雖稍罷隋之侈長然自皇太子而下並無樂架之制而尊卑無别非先王之舊也後周世宗詔王朴詳定雅樂朴以為今之鐘磬在架者皆唐商盈孫所定雖有作器之名而無相應之實至扵十二鎛鐘不考宫商但循環擊之鐘磬徒架而已朴乃作凖求律以備樂器張昭等議以為朴之新法可習而行之未㡬朴卒眀年周室禪位故器服制度粗而未完宋太祖建隆初修復器服四架二舞十二案之制位置陳而多仍唐舊然承兵戰之餘制度草創故施扵殿庭樂止二十格乾徳中祕書監尹掘建言宜增三十六虡唐設工員頗多今則至少宜補其數使無缺而已扵是詔定架工一百四十登歌工二十五樂虡三十六舊編鐘之下列笙竽笛簫塤箎之工編磬之下列偶歌琴瑟筝筑之工其後􅊖集樂工重列扵架中歌者最在前而以九絃琴五絃七絃琴筝瑟筑分列歌工之左右又塤箎笛簫篥竽之工十六次歌者之後真宗享見昭應景靈宫皆用備樂景靈中只施二十格唐制大中小祠用樂咸以宫架軒架為之序雖有司攝事亦如之至宋朝惟天地感帝宗廟用樂天子親行宫架登歌具焉有司攝祠止奏登歌初太祖即位並凖唐禮郊祀樂設二十虡開寳中祠南郊有司設增三十六格至太宗時有司發其誤欲復舊禮詔不許因遂為常真宗景徳中乃詔大祠􅊖用樂仁宗又詔釋奠文宣王武成王及祀先農得用樂是時垂意制作勑李照等改鑄鐘鎛權損鐘磬架十六之數用十二枚以應律先是架隅建鼓不擊别施散鼓扵架内代之乾徳中尹掘奏去散鼓而樂工積習遂不能罷又祀天地宗廟雖設雷鼓靈鼓路鼓擊不能聲又無三鼓至扵簨虡刻畫亦多失傳􅂉鷙禽飾扵鐘虡􅂉猛獸負扵磬趺􅂉木􅃫棲扵鼓上􅂉山華以為植羽至是􅊖詔有司革正其謬更造建鼓鼙應十二依李照所奏以月建為均與鎛鐘相應照又謂别作晉鼓以為樂節按乾徳詔書云散鼓不用復造三鼗祀天以雷鼓八面面各一工前一工左播鼗右擊鼓餘七工皆随擊焉靈鼓路鼓亦如之又增大竽大笙雙鳳管兩儀琴十二絃琴五器扵樂架未㡬照所建白皆罷真可為太息也然古之樂架特鐘十二編鐘十二特磬十二編磬十二合四十八虡而為宫架今用三十六虡恐未合先王之制也誠詔有司去筝筑之器削二變四清之聲而講先王樂架之制亦庶乎復古矣神宗元豐四年十一月詳定所言搏拊琴瑟以詠則堂上之樂以象朝廷之治下管鼗鼓合止柷敔笙鏞以間則堂下之樂以象萬物之治後世有司失其傳歌者在堂兼設鐘磬宫架在庭兼設琴瑟堂下匏竹置之扵床並非其序謂親祠宗廟及有司攝事歌者在堂不設鐘磬宫架在庭不設琴瑟堂下匏竹不寘扵床其郊壇上下之樂亦以此為正而有司攝事如之又言以小胥宫縣推之則天子鐘磬鎛十二虡為宫縣眀矣故􅂉以為配十二辰􅂉以為配十二次則無過十二先王之制􅆸學者不能考其數隋唐以来有謂宫縣當十二甚者又以為三十六方唐之盛日有司攝事樂並用宫縣至徳後太常聲音之工散亡凡郊廟有登歌而無宫縣後世因仍不改請郊廟有司攝事改用樂架十二太常以為用樂架十二則律吕均聲不足不能成均請如禮宫架四面如辰位設鎛鐘十二而甲丙庚壬設鐘乙丁辛癸設磬位各一虡四隅植建鼓以象二十四氣宗廟郊丘如之徽宗政和三年四月議禮局上親祠登歌之制大朝會同金鐘一在東玉磬一在西俱北向柷一在金鐘北稍西敔一在玉磬北稍東搏拊二一在柷北一在敔北東西相向一絃三絃五絃七絃九絃琴各一瑟四在金鐘之南西上玉磬之南亦如之東上又扵午階之東太廟則扵泰階之東宗祀則扵東階之西大朝會則扵丹墀香案之東設笛二箎一巢笙二和笙二為一列西上大朝會和笙在笛南塤一在笛南大朝會在箎南閏餘匏一簫一各在巢笙南又扵午階之西太廟則扵㤗階之西宗祀則扵西階之東大朝會則扵西丹墀香案之西設笛二箎一巢笙二和笙二為一列東上塤一在笛南七星匏一九星匏一在匏笙南簫一在九星匏西鐘磬柷敔搏拊琴瑟工各坐扵壇上太廟宗祀大朝會則扵殿上塤箎笙笛簫匏工並立扵午階之東西太廟則扵㤗階之東西宗祀扵兩階之間大朝會則扵丹墀香案之東西樂正二人在鐘磬南歌工四人在敔東俱東西相向執麾挟仗色掌事一名在樂虡之西東向樂正紫公服大朝會服絳公服方心曲領緋白大帶金銅革帶烏皮履樂工黒介幘執麾人平巾幘並緋繡鸞衫白絹裌袴抹帶大朝會同又上親祠宫架之制景靈宫宣徳門大朝會附四方各設編鐘三編磬三東方編鐘起北編磬間之東向西方編磬起北編鐘間之西向南方編磬起西編鐘間之北方編鐘起西編磬間之俱北向設十二鎛鐘特磬扵編架内各依月律四方各鎛鐘三特磬三東方鐘鎛起北特磬間之東向西方特磬起北鎛鐘間之西向南方特磬起西鎛鐘間之北方鎛鐘起西特磬間之皆北向景靈宫天興殿鎛鐘編鐘編磬如每歳大祠宫架陳設植建鼓鼙鼓應鼓扵四隅建鼓在中鼙鼓在左應鼓在右設柷敔扵北架内柷一在道東敔一在道西設瑟五十二朝會五十六宣徳門五十四列為四行二行在柷東二行在敔西次一絃琴七左四右三次三絃琴一十有八宣徳門二十次五絃琴一十有八宣徳門二十並分左右次七絃琴二十有三次九絃琴二十有三並左各十有二右各十有一宣徳門七絃九絃各二十五並左十有三右十有二次巢笙二十有八分左右宣徳門三十二次匏笙三在巢笙之間左二右一次簫二十有八宣徳門大朝會三十次竽二十次箎二十有八宣徳門三十六朝會三十三左十有七右十有六次塤一十有八宣徳門朝會二十次笛二十有八並分左右宣徳門笛三十六朝會三十三左十有七右十有六雷鼓雷鼗各一在左又雷鼓雷鼗各一在右地祇靈鼓靈鼗各二太廟路鼓路鼗各二大朝會晉鼓二宣徳門不設並在三絃五絃琴之間東西相向晉鼓一在匏笙間少南北向副樂正二人在柷敔之前北向歌工三十有二宣徳門四十朝會三十有六次柷敔東西相向列為四行左右各二行樂師四人在歌工之南北東西相向運譜二人在晉鼓之左右向執麾挟仗色掌事一名在樂虡之右東向副樂正同樂正服大朝會同樂正朝服樂師緋公服運譜綠公服大朝會介幘絳韝衣白絹抹帶樂工執麾人並同登歌執麾人服朝會同又上親祠二舞之制大朝會附文舞六十四人執籥翟武舞六十四人執干戚俱為八佾文武分立扵表之左右各四佾引文舞二人執纛在前東西相向舞色二人在纛之前分東西若武舞則在執旌之前引武舞執旌二人鼗二人䨇鐸二人單鐸二人鐃二人持金錞四人奏金錞二人鉦二人相二人雅二人分立扵宫架之東西北向北上武舞在其後舞色長幞頭抹額紫繡袍引二舞頭及二舞郎並紫平冕皂繡鸞衫金銅革帶烏皮履大朝會引文舞頭及文舞郎並進賢冠黄鸞衫銀褐裙綠􅜵襠革帶烏皮履引武舞頭及武舞郎並平巾幘緋鸞衫黄畫甲身紫􅜵襠豹文口大袴起梁帶烏皮鞾引武舞人武弁緋繡鸞衫抹額紅錦臂韝白絹袴金銅革帶烏皮履大朝會同又上大祠中祠登歌之制編鐘一在東編磬一在西俱北向柷一在編鐘之北稍西敔一在編鐘稍東搏拊二一在柷北一在敔北俱東西向一絃三絃五絃七絃九絃琴各一瑟一在編鐘之南西上編磬之南亦如之東上壇下午階之東太廟别廟則扵殿下㤗階之東明堂祠廟則扵東階之西設笛一箎一塤一為一列西上和笙一在笛南巢笙一在箎南簫一在塤南午階之西亦如之東上太廟别廟則扵泰階之西明堂祠廟則扵兩階之東鐘磬柷敔搏拊琴瑟工各坐扵壇上明堂太廟别廟扵殿上祠廟扵堂上塤箎笛笙簫工並立扵午階東西太廟别廟扵泰階之東西明堂祠廟扵兩階之間若不用宫架即登歌工人並坐樂正二人在鐘磬南歌工四人在敔東俱東西相嚮執麾挟仗色掌事一名在樂虡之西東向樂正公服執麾挟仗色掌事平巾幘樂工黑介幘並緋繡鸞衫白絹抹帶三京師府等每歳祭社稷祀風師兩師雷神釋奠文宣王用登歌樂陳設樂器並同每歳大中祠登歌樂又上大祠