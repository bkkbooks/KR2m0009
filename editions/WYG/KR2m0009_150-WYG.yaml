body:
  text: 文獻通考卷一百五十鄱陽馬端臨貴與著兵考二兵制漢興踵秦而置材官於郡國十一年發巴蜀材官衞軍霸上惠帝七年發車騎材官詣滎陽文帝三年發中尉材官屬衛将軍軍長安景帝後二年發車騎材官屯鴈門武帝王恢撃匃奴伏兵車騎材官三十餘萬匿馬邑旁谷中宣帝神爵元年發三河潁川沛郡淮陽汝南材官詣金城易氏曰刑法志曰踵秦置材官車騎於郡國特其畧耳其實不惟置材官而已又曰武帝外有樓船特言用樓船以平百粤耳其實髙祖已有樓船之制也光武紀注所引漢官儀曰髙祖命天下選能引闗蹶張材力武猛者以為輕車騎士材官樓船常以秋後講肄課試各有員數平地用車騎山阻用材官水泉用樓船盖三者之兵各隨其地之所宜以漢史考之大抵巴蜀三河潁川諸處止有材官上郡北地隴西諸處止有車騎而廬江潯陽㑹稽諸處止有樓船三者之兵雖各隨其地之所宜而郡國之兵其制則一有列郡有王國有侯國郡有守有都尉都尉佐太守典武其在王國則相比郡守中尉比都尉侯國有相秩比天子令長每嵗郡守尉教兵則侯國之相與焉侯國之兵既屬之郡而王國之兵亦天子所有不可擅用防㣲杜漸皆所以尊京師也京師有南北軍之屯漢舊儀殿外門署衛尉殿内郎署屬光禄勲南軍也南軍衞主之顔曰衞尉等在宫内胡廣云主宫闕之門内掌宫城門内之兵百官表衞尉掌宫門衞屯兵而髙后紀言周勃既入北軍尚有南軍乃令平陽侯告衞尉無納呂産時呂禄為将軍掌北軍産為相國掌南軍太尉已入北軍尚有南軍故未敢誦言誅産已告衞尉毋納相國産殿門産欲入未央宫為亂弗得入盖産所将南軍當在殿廬之内及宣帝用張安世為衞将軍两宮衞尉城門北軍兵屬焉不言南軍盖衞即南軍也戾太子變時京師兵盡發獨不聞發南軍盖衞士從上在甘泉故也以此知南軍為宮城兵而衞尉主之古者環衞有二等宫伯則領貴㳺子弟宫正則領宫徒役事漢有衞郎衞兵亦此制歟衞尉典衞兵郎中令典衞郎武帝更名郎中令名光禄勲掌宿衞宫殿門户其屬者有諸郎掌守門户出充車騎凡郎官皆上直執㦸宿衞出充車騎惟議郎不在直中中郎有五官左右三将車户騎三将見百官表易氏曰或曰漢制有衞郎衞兵衞兵既屬衞尉為南軍而郎中令均是宿衞故表志皆列於衞尉之前而論者皆編為南軍若謂郎中令所領皆郎不可以軍言則守門户出充車騎孰謂其非軍也郎而非軍宣帝胡為出之以撃𦍑哉此説殆不其然抑嘗考之即衞兵衞固均為宿衞之職而郎中令衞尉所掌又皆宫門内外之事按郎中令乃秦官武帝更其名為光禄勲前表光禄勲掌宫門户衞尉掌宫殿門衞屯兵後志光禄勲掌宿衞官殿門户衞尉掌宫門衞士宫門徼廵事其職實有相関者舊儀曰殿外門舍屬衞尉殿内門舍屬光禄勲職之相闗特有内外之别耳此正周官所謂宫正宫伯之職然兵衞之屬衞尉者􅃅為南軍固可考而知若遂以光禄勲列於南軍則有所不可考者漢光禄勲之職屬官中郎有五官左右三将秩比二千石郎中有車户騎三将秩比千石以下如議郎中郎秩比六百石侍郎比四百石郎中比三百石職任固不輕矣而當時以二千石以上子弟及眀經孝亷射策甲科博士弟子髙第及尚書奏賦軍功良家子充之其後又期門羽林皆屬焉是皆親近天子之官别為一府非可謂之南軍也所謂守門戸充車騎者若今之環衞出為天子導從儀衞而已非可以軍名也宣帝之撃𦍑特以死事之子孫羽林孤児用之非謂所掌之郎而盡使之從軍不然文帝自代邸入未央宫夜拜宋昌為衞将軍領南北軍張武為郎中令行殿中以是觀之則張武自别領郎衞之職宋昌自兼領南北軍之職兵衞郎衞分為二職則知郎衞非南軍眀矣武帝時置期門羽林皆宿衞官屬南軍東方朔傳上始㣲行常用飲酎已八九月中與侍中常侍武騎及待詔隴西北地良家子能騎射者期諸殿門故有期門之號以六郡良家子選給六郡謂隴西天水北地上郡西河也掌執兵迭從以材力為官名将多出焉甘延夀以良家子善騎射為羽林投石超距絶於等倫嘗超踰羽林亭樓由是遷為郎試弁為期門霍光都肄郎羽林建元三年初置比郎無貟多至千人有僕射秩比千石太初元年初置名曰建章營騎後更名羽林騎又取從軍死事者之子孫飬羽林教以五兵號曰羽林孤児少壮令從軍羽林有令丞宣帝令中郎将騎都尉監羽林秩比二千石蔡質漢儀曰羽林有左監主羽林左騎八百右監主右騎九百人又有羽林黄頭郎枚乗傳注習水戰者也平帝又更期門為虎賁主宿衞此光禄勲所領之兵師古曰羽林宿衞之官言其如羽之疾如林之多吴氏能改齋漫録曰此説非也按晉志羽林軍四十五在營室星之南一曰天軍主軍騎則漢名軍以羽林法天文耳章氏曰南軍有郎衞兵衞掌天子宿衞北軍止於䕶城輕重不侔矣漢世凡大䘮自諸郎衞皆發而宣帝之𦵏霍光光武之𦵏吴漢則詔以北軍䕶送章懐太子曰不以南軍重之也又王國人不得宿衞親屬犯法人不得宿衞如龔遂為楚王常侍三舉孝亷以王國人不得宿衞蕭望之以甲科為郎坐從弟犯法則不得宿衞季冬或正月天子行幸曲䑓臨饗衞士勸以農桑令就田里必觀以角觝而後遣則南軍之重可知矣北軍中尉主之掌京城門内之兵百官表中尉秦官掌廵徼京師屬官有中壘寺互武庫兵器所都船四令丞又有式道左右候候丞及左右京輔都尉尉丞兵卒皆屬焉是中尉所職乃廵徼京師以此知北軍為京城兵而中尉主之也山齋易氏曰北軍廵徼京師屬中尉别有壘垣軍門在京城按胡建傳云監軍御史穿北軍壘垣為賈區軍正丞胡建斬之而中壘校尉實掌北軍壘門内則是北軍自有壘垣軍門惟北軍有壘垣軍門必有漢節而後入高紀上将軍呂禄相國呂産顓兵秉政太尉周勃欲入北軍而不得入廼令紀通持節矯内勃北軍又武紀征和元年發三輔騎士大捜上林閉長安城門索又漢帝年紀大捜長安中閉城門十五日待詔征官多餓死是北軍在長安城内苟無漢節雖以太尉之尊軍門得以拒之不得輙入其法甚嚴也然北軍之壘錯列長安城内不近宫城惟南宫列於宫垣北軍亦不得入江充傳貴戚近臣多奢僣充皆舉劾奏請沒入軍馬令身詣北軍撃匃奴即移書光禄勲中黄門逮名近臣侍中諸當詣北軍者移劾門衞禁止無令得出入宫殿又禮儀志先臘一日大儺謂之逐疫黄門倡侲子和持炬火送疫出端門外五營騎士傳火棄雒水中東京賦注云衞士千人在端門外五營千騎在衞士外此衞士在内北軍在外之證也又曰或曰北軍屬太尉武帝更太尉為大司馬以寵大将而北軍分八校以中壘領之非也武帝置八校各有校尉秩皆二千石不相統屬而中壘自掌北軍壘垣門事非兼八校此固不待辯而眀矣至謂北軍屬太尉則尤不可以不辯彼獨見太尉周勃入北軍之事故舉而言之殊不知當時勃欲入北軍必令紀通持節矯内之是以計誅吕氏非謂以太尉勃領北軍而後入也盖北軍自屬中尉而太尉掌武雖本兵之任然三公之職初不常置按司馬氏将相表高帝二年太尉盧綰五年罷十一年周勃為太尉攻代後官省高后四年置太尉官文帝三年罷屬丞相景帝五年復置七年罷武帝建元元年復置二年罷後改為大司馬是其職之或置或罷盖以三公無所不統官不必備惟其人而已豈専領北軍者邪武帝増置八校屬北軍更名中尉為執金吾百官志執金吾秦官緹騎五百二十人光武曰仕宦當至執金吾言徒役盛也帝用兵四夷發中尉之卒逺撃南粤恐内無重兵或致生變於是創置七校尉募知胡事者為胡騎知越人事者為越騎又取中尉官所謂中壘者進為校尉凡八校尉中壘校尉掌北軍壘門外又外掌西域屯騎校尉掌騎士歩兵校尉掌上林苑内屯兵越騎校尉掌越騎如淳曰越人内附以為騎也晉灼曰取其材力超越也師古曰宣紀言佽飛射聲胡越騎又此有胡騎如淳説是也長水校尉掌長水宣曲胡騎長水胡名也宣曲觀名胡騎屯所胡騎校尉掌池陽胡騎不常置胡騎之屯池陽者射聲校尉掌待詔射聲者服䖍曰工射者也冥冥中聞聲則中之因以名也應劭曰須詔所命而射故曰待詔射也虎賁校尉掌輕車凡八校尉皆武帝初置有丞司馬秩皆二千石刑法志言武帝平南粤内増七校盖胡騎校尉不常置故言七外又有城門校尉掌京師城門屯兵不在八校尉數内有司馬八屯各有司馬十二城門候門各有候蕭望之署小苑東門候亦其比也城門初無兵自戾太子事後置以城門校尉一人領之十二城門各有候王商以特進孔光以太傅領城門兵得舉吏如五府山齋易氏曰按劉屈氂傳戾太子使如侯持節發長水及宣曲胡騎皆已装㑹侍郎莽通使長安追捕如侯告胡人曰節有詐勿聼也遂斬如侯引騎入長安盖中壘在北軍而步兵在長林苑門長水兼掌長水及宣曲胡騎則在長水及宣曲皆在長安城外顔師古以長水在今鄠縣東長水鄉是知八校分屯不專在一所雖同名北軍而各以校尉領之而不屬中尉之北軍此八校尉所以自列於城門校尉之後而中壘校尉亦别掌北軍壘門内外不屬金吾也盖金吾秩中二千石而八校皆秩二千石其位亦重矣光武併七校為五營故省虎賁入射聲省胡騎入長水又省中壘校尉而置北軍中候掌監五營自是五營屬北軍以北軍中候監之謂之北軍五營章氏曰按武帝八校為北軍表不言屬中尉疑中壘自專統北軍與中尉異司而北軍始不屬中尉矣武帝既増校尉恐中壘之權太重又於光禄勲之下旋理㑹増添於是増羽林期門以益南軍大槩領二軍之勢均胡廣曰衞尉廵行宫中則執金吾徼於宫外為表裏唐李揆曰漢以南北軍相制者此也又曰漢初南北軍亦自郡國更番調發來何以言之黄覇為京兆尹坐發騎士詣北軍馬不適士劾乏軍興則知自郡國調上衞士一嵗一更更代番上初無定兵自武帝置八校則募兵始此置羽林期門則長從始此古者禁衞兵不出漢初猶得古意京師之兵不以出征高帝十一年發中尉卒軍㶚上文帝三年發中尉材官屬衞将軍軍兵長安則中尉之兵未始逺出武帝元鼎六年發中尉卒撃吕嘉則失之矣至宣帝遂令羽林佽飛諸兵逺赴金城擊羌不亦騷動之甚乎又曰漢兵郎無貟數虎賁千五百人而多不過千人羽林左八百人右九百人八校各七百人至東漢不過三千五百三十六人執金吾緹騎五百二十人至東漢亦不過六百人衞尉所領諸宫掖門都候劍㦸衞士至東漢不過二千五百人十二城門兵不見數然亦不過門置一候以掖門司馬領之多至百八十人少或三十八人則城門領於一校大約可見中都兵盖僅用四萬耳南軍圗上凖東漢安帝紀注三署郎車户騎三将武南左中郎将主左署郎虎光禄勲本郎中令武帝改五官中郎将主五官郎主軍右中郎将主右署郎羽衞士八十一人車户騎三将武武帝置期門平帝更虎賁左監主左騎八百人虎賁郎千五百人無常員多至千人主虎賁宿衞主殿門内羽林郎百八十人武帝置建章營騎羽林騎右監主右騎九百人章氏曰班孟堅志刑法而不志兵取古者大刑用兵之義而以兵附刑然述之不詳使一代之制無考焉漢初兵民不甚分如馮唐謂吏卒皆家人子弟起田中從軍而後漢禮儀志謂罷遣衞士必勸以農桑由是觀之兵農尚未分山齋易氏漢南北軍始末序曰漢之兵制莫詳於京師南北軍之屯雖東西兩京沿革不常然皆居重馭輕而内外自足以相制兵制之善者也盖是時兵農未分南北兩軍實調諸民猶古者井田之遺意竊疑南軍以衞宫城而乃調之於郡國北軍以䕶京城而乃調之於三輔抑何逺近輕重之不倫邪嘗考之司馬子長作三王世家載公户滿意之言曰古者天子必内有異姓大夫所以正骨肉也外有同姓大夫所以正異族也盖同姓親也於内為逼故處於外而使之正異族異姓疎也於親為有間故處於内而使之正族屬南北軍調兵之意殆猶是歟郡國去京師為甚逺民情無所適莫而緩急為可恃故以之衞宫城而謂之南軍三輔距京師為甚邇民情有閭里墓墳族屬之愛而利害必不相棄故以之䕶京城而謂之北軍其防㣲杜漸之意深矣惜夫班孟堅號一代良史而論載獨略范蔚宗後史於此尤闕焉徃徃雜見一二於紀傳表志之間鄉者以管見而商㩁之考其始末述以儷語其後先沿革悉疏於下而猶恨未能條列漢制之詳近猶子開得胄監學者所考南北軍且合此二書略加参訂遂使漢家一代軍制與夫内外相制之意如辨白黒瞭然在目誠考古之一端於是乎書又曰北軍番上與南軍等南軍衞士調之郡國而北軍兵卒調之左右京輔按百官志左右京輔都尉尉丞兵卒皆屬中尉夫中尉為天子北軍之統帥而其屬乃左右京輔都尉等其所調亦左右京輔之兵卒何也左即扶風右即馮翊京即京兆謂之三輔三輔之委寄固重於郡國矣而所領兵事則非郡國之比盖漢太守謂之郡将兼領武事都尉掌佐守典武職在王國則相比郡守中尉比都尉皆掌兵之任若三輔則異是矣夾輔京邑錯列畿甸其勢甚逼則兵權為甚重故都尉尉丞兵卒不屬郡卒而特屬中尉之北軍其番上亦然何以眀之黄霸尹京兆發騎士詣北軍以馬不適士劾乏軍興連貶秩則知左右京輔兵卒皆番上北軍而屬中尉無疑也又曰南軍無常在之兵以郡國民始傅者為之高紀如淳注云律民年二十三傅之疇官傅著也立傅名籍以給公家之繇役也又漢儀注民年二十為正一嵗為衞士即此宫門衞士而謂之南軍者武帝建元元年詔衞士轉置送迎常二萬人其省萬人鄭氏云去故置新常二萬人是即位之初政令如此其後期門羽林七校之𩔖増置不一而南軍衞士實有定数是以國無重費而民亦不以為病王尊傳常以季秋或正月行幸曲臺臨饗罷衞士盖寛饒為衞司馬及嵗盡交代上臨饗罷衞卒數千人皆叩頭自請願復留共更一年則當時之人情可知矣考韋元成傳則寝園所用已四萬五千一百二十九人至元紀初元三年隨即罷甘泉建章宫衞士未見其為病民也至光武講省兵之制而宫掖門衞士纔二千五百餘人而已其後又罷輕車騎士材官楼船士而後禮儀志有饗遣故衞士儀是知光武雖罷郡國之兵而南軍衞士仍番上平民也此南宮屬衞尉而調兵郡國之證歟又曰杜佑通典謂漢氏重兵悉在京師是殆不然兩漢之初正以京師無重兵嘗以後百官志考之衞尉衞士六千人南宫北宫衞士共一千八人左右都候衞士共七百九十九人宫掖凡七門每門各有司馬以領衞士南屯七百二人蒼龍四十人元武三十人北屯三十八人朱雀二十四人東眀百八十人朔平百二十七人總而計之南軍為九千四十六人北軍五校所領騎士如屯騎越騎步兵射聲各七百人又中尉緹騎五百三十人總而計之為四千五十人惟城門屯兵数無所考以宫掖門司馬所領者推之多者七百二人少者止三十人况十二門止於一校必非重兵所在多不過三千人耳總是三者而京師之兵不滿二萬人或曰此光武中興之兵制也武帝之増置則殆不止是然亦不過倍之云爾若髙文之世未有増置則其数當益少於此也豈得云重兵悉在京師哉故此以萬旅言之又曰大抵南北軍之制在漢志為甚略無所考證然雜見於紀傳表志者亦可参考其一二其大要則無出於髙后八年之紀也考之高后紀則見二軍之權勢内外足以相制表裏足以相應高帝之法可謂規摹宏逺矣漢初定天下京師之屯惟此二軍諸夏本根所係甚重故高祖於衞尉中尉之任皆不輕授而必付之酈商周昌高帝十一年百官表書衞尉王氏中尉戚鰓王氏史失其名而蕭何傳載王衞尉之諫高帝械繋何也其面折廷争有似王陵或者其陵歟鰓者毋乃戚夫人之族屬歟高帝鍾愛趙王屈周昌使相之及莫年則以戚氏本兵得非隂為保䕶趙王之計而王陵固高帝付以託孤之任者故以之主兵邪恵帝初年吕氏固已顓國政劉澤吕氏之戚屬也實為衞尉而表於中尉缺焉高后七年澤既為王之國終吕后之世二官及郎中令皆不以除人特以兵權分屬於呂禄吕産而長樂衞尉亦屬之吕更始輩兵權盡歸吕氏矣史稱太后病困以趙王禄為上将軍居北軍梁王産為相國居南軍且戒之云我即崩必據兵衞宫謹無送䘮為人所制故史稱上将軍禄相國産顓兵秉政齊王傳云居長安中聚兵以威大臣良有以也陳平周勃謀誅吕氏太尉勃欲入北軍乃令紀通持節矯内之又令酈寄劉掲説禄解将印而以兵授太尉勃勃既将北軍而尚有南軍衞尉居宫中實顓南軍之權故令平陽侯告之使毋納吕産殿門按表高后七年劉澤為王衞尉不以除人不知平陽侯所告者何人哉産既顓軍其權不在衞尉審矣恐未易以一言之故而能使之抗平日所尊事之相國也又按表文二年始書衞尉足而文帝詔封功臣則云衞尉足等十人矣愚謂乎勃區處南軍宜無異於北軍而平陽侯所告之人得非衞尉足也邪豈平勃欲誅吕氏始除足為衞尉以奪南軍故平陽侯得以告之而史策省文不詳載爾又不然則勃既将北軍其勢已足以制南軍故令平陽侯告衞尉然南軍未附勢未可知衞尉守殿門相國雖不得入而猶得裵回往來於殿庭之次是南軍猶縱其入未有出力奮發而誅之者若衞尉於是時不能久抗相國則南軍将何如也又安知其不有起而應之者盖彼皆素所服屬者也異時陳蕃之舉是矣平陽侯既馳告太尉而尚恐不勝未敢誦言誅之乃謂朱虚侯劉章急入宫衞帝章從勃調卒千人入未央宫掖門見産廷中㑹天大風從官亂莫有鬬者遂得殺之於郎中府吏舍又馳斬長樂衞尉吕更始還入北軍報太尉勃至於起而相賀曰所患獨産今已誅天下定矣盖南軍尚存不能為太尉勃之憂而吕産在宫中勃深慮其不勝必衞尉應於内而後足以克敵於此足以見南軍之可以制北軍南軍雖存而太尉得以告衞尉而奪之權誅産之功竟以北軍而清宫掖是又足以見北軍之可制南軍也夫北軍討之於外南軍應之於内表裏相濟於此可驗然是時誅吕氏北軍之功居多而南軍無大功故文帝褒賞功臣如紀通劉掲等皆封列侯已侯者益封至二三千户而衞尉足等僅四百户或者以其功為劣歟當是之時勃雖以南北軍成誅吕安劉之功及文帝自代邸入未央宫夜拜宋昌為衞将軍領北軍則勃已不與兩軍之政其後除右丞相亦旋歸政柄盖前日之以北軍制南軍者特一時之權宜而已南北軍本以相制而文帝以宋昌兼領失本意矣然出於倉卒周防之謀故隨即罷衞将軍仍以其兵分屬焉是雖出於一時權宜而於南北軍之制初未嘗有所更易此漢初兵制之善者也其後武帝内増七校以壮翼衞之勢又恐北軍偏重則置期門羽林與夫城門之兵兵籍紛紛而南北軍之制隳矣漢調兵之制民年二十三為正一嵗為衞士二嵗為材官騎士習射御騎馳戰陳年六十五衰老乃得免為庶民就田里如淳曰律年二十三傅之疇官高不滿六尺二寸以下為癃罷漢民凡在官三十二年自二十三以上為正卒每一嵗當給郡縣官一月之役其不役者為錢二千入於官以雇庸者已上戍中都官者一年為衞士京師者一年為材官騎士樓船郡國者一年三者隨其所長於郡縣中發之然後退為正卒就田里以待番上調發更有三品有卒更有踐更有過更古者正卒無常人皆迭為之一月一更為卒更也貧者欲得雇更錢次直者出錢雇之月二千是為踐更也天下人皆直戌邉三日亦名為更律所謂繇戌也雖丞相子亦在戍邉之調不可人人自行三日戍又行者當自戍三日不可徃便還因便住一嵗一更諸不行者出錢三百入官以給戍者是謂過更也昭帝紀如淳注秦用商鞅之法月更卒巳復為正一嵗屯戍一嵗力役三十倍於古更卒謂給郡縣一月而更者正卒給中都官者也漢興循未改後改易有謫乃戍邉一嵗耳按漢書如淳注言更有三品竊詳其説卒更者正身供正役也踐更者以錢雇直所直者内地其役一月其錢則不行者自以雇代行者過更者亦以錢雇直所直者邉疆其役三日其錢則不行者輸之縣官縣官以給代行者但所謂一嵗而更者恐是併往回行程言之逺戍且以兩月為行程則每嵗當役者十月如是踐更則是一人替九人之役如是過更則是一人替九十九人之役夫戍邉重事而百人之中行者纔一人則兵之在戍者無幾矣然鼂錯傳眀言逺方之卒守塞一嵗而更則似眀立此法非是併行程及雇募而言一嵗是并行程與雇募通言之乃如淳注説殊與三日之説背馳竊意一嵗而更是秦以此待謫戍者本非正法及其窮兵黷武則雖無罪者及元係復除者皆調發之而儕之謫戍矣七謫科所謂吏有謫者罪人也所謂賈人贅壻及有市籍者皆無罪之人也閭左者已復除之人也詳見下鼂錯疏中漢初亦遵其法後来乃著令有罪者乃邉戍一嵗而凡民之當戍者不過三日若不願行者則聼其出錢縣官以給戍者為過更之法耳如發謫徒則有七科謫惡少年亡命弛刑選募則有勇敢犇命伉健之屬此皆出於正兵之外高帝十一年征英布赦天下死罪令從軍武帝元鼎五年吕嘉反遣路博徳将罪人馳義越侯遺則将巴蜀罪人咸㑹番禺元封二年募天下死罪撃朝鮮六年赦京師亡命令從軍太初元年以李廣利為貳師将軍發郡國惡少年數萬人期至貳師取善馬四年發天下七科謫出朔方張晏曰吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七凡七科也昭帝元鳯元年武都氐人反發三輔太常徒皆免刑撃之宣帝神爵元年發三輔中都官徒弛刑詣金城武帝天漢四年發勇敢士出朔方昭帝始元元年募吏民及發犍為蜀郡犇命撃益州注云常兵不足故推選取精勇聞命奔赱謂之犇命宣帝本始二年選郡國吏三百石伉健習射者皆從軍文帝用鼂錯言募民徙塞下錯上言臣聞秦時北攻胡貉築塞河上師古曰貉音莫客反南攻揚粤張晏曰揚州之南越也置戍卒焉其起兵而攻胡粤者非以衞邉地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其勢戰則為人禽屯則卒積死夫胡貉之地積隂之處也木皮三寸冰厚六尺文穎曰土地寒故也食肉而飲酪其人密理鳥獸毳毛師古曰密理謂其肌肉也毳細毛也其性能寒師古曰能讀曰耐此下能暑亦同揚粤之地少隂多陽其人疏理鳥獸希毛其性能暑秦之戍卒不能其水土戍者死於邉輸者僨於道服䖍曰僨仆也如淳曰僨音俺秦民見行如往棄市因以謫發之名曰謫戍先發吏有謫及贅壻賈人後以嘗有市籍者又後以大父母父母嘗有市籍者後入閭取其左孟康曰秦時復除者居閭之左後發役不供復役之也或云直先發取其左也師古曰閭里門也居閭之左者一切皆發之非謂復除也觧在食貨志發之不順行者深怨有背畔之心凡民守戰至死而不降北者以計為之也師古曰北謂敗退故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其衆蒙矢石赴湯火師古曰䝉冒犯也視死如生今秦之發卒也有萬死之害而亡銖兩之報死事之後不得一算之復師古曰復復除也音方目反天下眀知禍然烈及已也師古曰猛火曰烈取以喻耳陳勝行戍至於大澤為天下先倡天下從之如流水者秦以威刼而行之之敝也胡人衣食之業不著於地師古曰著音直畧反其勢易以擾亂邉境何以眀之胡人食肉飲酪衣皮毛非有城郭田宅之歸居也如飛鳥走獸放於廣埜羙草甘水則止草盡水竭則移以是觀之往來轉徙時至時去胡人之生業而中國之所以離南畮也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邉民絶望而有降敵之心救之少發則不足多發逺縣纔至則胡又已去聚而不罷為甚費罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邉境遣将吏發卒以治塞甚大惠也然令逺方之卒守塞一嵗而更不知胡人之能不如選常居者家室田作且以備之以便為之高城深塹具藺石布渠答服䖍曰藺石可投人石也蘇林曰渠答鐵疾藜也如淳曰藺石城上雷石也墨子曰城上二步一渠立程長三尺冠長十尺臂長六尺二步一答廣九尺長十二尺師古曰藺石如説是也渠答蘇説是也雷音來内反復為一城其内城間百五十步要害之處通川之道調立城邑毋下千家師古曰調謂算度之也總計城邑之中令有千家以上也調音徒釣反為中周虎落鄭氏曰虎落者外蕃也若今時竹虎落也蘇林曰作虎落於塞要下以沙布其表旦視其跡以知匃奴來入一名天田師古曰蘇説非也虎落者以竹篾相連遮落之也先為室屋具田器廼募辠人及免徒復作令居之張晏曰募民有罪自首除罪定輸作者也復作如徒也臣瓉曰募有罪者及罪人遇赦復作竟其日月者今皆除其罰令居之也師古曰瓉説是也復音扶目反不足募以下奴婢贖罪及輸奴婢欲以拜爵者不足廼募民之欲往者皆賜高爵復其家予冬夏衣廩食能自給而止師古曰初徙之時縣官且廩給其衣食於後能自供贍乃止也郡縣之民得買其爵以自増至卿孟康曰食貨志所謂樂卿者也其位從卿而無職也師古曰孟説非也樂卿武帝所置耳錯之上書未得豫言之也然三等爵内無有卿名盖謂其等總同列卿者也其亡夫若妻者縣官買予之人情非有匹敵不能久安其處塞下之民禄利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半予之言胡人入為㓂驅畧漢人及畜産而他人能止得其所驅者令其本主以半賞之縣官為贖張晏曰得漢人官為贖也師古曰此二句之言謂官為備價贖之耳張説則非也其民如是則邑里相救助赴胡不避死非以徳上也師古曰言非以此事欲立徳義於主上也欲全親戚而利其財也此與東方之戍卒不習地勢而心畏胡者功相萬也以陛下之時徙民實邉使逺方亡屯戍之事塞下之民父子相保亡係虜之患利施後世名稱聖眀其與秦之行怨民相去逺矣上從其言募民徙塞下錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸将之費益寡如淳曰将送也或曰将資也甚大惠也下吏誠能稱厚惠奉眀法師古曰稱副也存䘏所徙之老弱善遇其壮士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸徃矣臣聞古之徙逺方以實廣虛也師古曰所以充實寛廣虛空之地相其隂陽之和嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為築室家有一堂二内門户之閉張晏曰二内二房也置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也師古曰之徃也為置醫巫以救疾病以修祭祀男女有昏死生相䘏墳墓相從種樹畜長室屋完安此所以使民樂其處而有長居之心也臣又聞古之制邉縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百服䖍曰假音假借之假五百帥名也師古曰假大也音工雅反十連一邑邑有假候皆擇其邑之賢材有䕶師古曰有保䕶之能者也今流俗書本護字作讓妄改之耳習地形知民心者居則習民於射法出則教民於應敵故卒伍成於内則軍正定於外服習収成勿令遷徙師古曰各守其業也幼則同逰長則共事夜戰聲相知則足以相救晝戰目相見則足以相識驩愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣師古曰還讀曰旋旋踵回旋其足也所徙之民非壮有材力但費衣糧不可用也雖有材力不得良吏猶亡功也陛下絶匈奴不與和親臣竊意其冬來南也師古曰意疑之也壹大治之則終身創矣師古曰創懲艾也音初亮反欲立威者始於折膠蘇林曰秋氣至膠可折弓弩可用匃奴常以為候而出軍來而不能困使得氣去師古曰使其得勝逞志氣而去後未易服也光武以幽冀并州兵定天下始於黎陽立營領兵騎常千人以謁者監之號黎陽兵其後又以扶風都尉部在雍縣以凉州近𦍑數犯三輔将兵衞䕶園陵故俗稱雍營而京師南北軍如故於北軍則并胡騎虎賁二校為五營以北軍中候易中壘以監之於南軍則光禄勲省車户騎三将及羽林令都尉省旅賁及衞士一丞建武之初禁網尚濶但以璽書發兵未有虎符之信杜詩上疏曰臣聞兵者國之凶器聖人所謹舊制發兵皆以虎符其餘調發竹使而已符第合㑹取為大信所以眀著國命歛持威重也間者發兵但用璽書或以詔令如有姦人詐偽無由知覺愚以為軍旅尚興賤虜未殄召兵郡國宜有重謹可立虎符以絶姦端昔魏之公子威傾鄰國猶假兵符以觧趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已盖謂此也書奏從之建武六年詔罷郡國都尉并職太守無都試之法惟京師欵兵如故七年罷天下輕車騎士材官樓船及軍假吏悉還民伍惟更賦如故九年省闗中都尉十三年罷左右将軍二十三年罷諸邉郡亭候吏卒光武罷都尉然終建武之世已不能守前法罷尉省校輙復臨時補置七年罷長水射聲二十校十五年復更増屯騎校九年省闗都尉十九年復置函谷関都尉而天下亦往往復置都尉眀帝以後又嵗募郡國中都官死罪繋囚出戍聼從妻子自占邉縣以為常凡徙者皆給弓弩衣糧於是北胡有變則置度遼營眀帝時南蠻或叛則置象林兵和帝時羌犯王輔則置長安雍二尉安帝時鮮卑㓂居庸則置漁陽營安帝時其後盗作緣海稍稍増兵順帝時而魏郡趙國常山中山六百一十六塢河内通谷衝要三十三塢扶風漢陽隴道三百塢西羌傳置屯多矣靈帝中平五年望氣言京師當有大兵何進於是勸帝大發四方兵講武於平樂觀躬擐甲胄稱無上将軍以厭始置西園八校尉以小黄門蹇碩為上軍校尉袁紹為中軍校尉傳云佐軍鮑鴻為下軍校尉曹操為典軍校尉趙融為左軍校尉馮芳為助軍右校尉夏牟為左校尉淳于䕫為右校尉凡八人謂之西園軍皆統於碩章氏曰高祖之世南北二軍不出而民兵㪚在郡國有事以羽檄召材官騎士以備軍旅文帝始以銅虎符代檄當時各因其地以中都官號将軍将之如魏遫為北地将軍周竈為隴西将軍事已則罷京師止南北軍為中尉緹騎郎中令諸郎城門校尉屯兵北軍屬太尉南軍屬衛尉武帝更太尉為大司馬大将軍以中尉材官出征恐京師無重兵而生變於是分北軍為八校以中壘領之又恐北軍之權太重故於光禄勲増羽林期門之兵此武帝以南北軍相制之意唐人盖知之矣時異南北軍皆郡國番上無定在之兵也詳見前自武帝置八校大抵以習知胡越人充之則募兵始此期門羽林皆家世為之則長從始此期門父死子代羽林孤児乃子孫見表志盖自是有養兵之病而京師之兵制壊矣元狩以後兵革數動民多買復調𤼵之士益鮮於是𤼵及謫吏次及謫民次及謫戍次及七科謫異時以𨽻於都尉者充兵故其伍符甚整也及常兵不足調及他衆甲伍必紊而郡國之兵制又壊矣是以昭宣以来其弊日甚始元元年募民及發犇命者撃益州元鳯元年遣太常三輔徒免刑撃氐五年發三輔及郡國惡少吏有告劾亡者屯遼東本始二年又選郡國吏三百石伉徤習騎射者從軍神爵元年又發三輔中都官徒弛刑及應募佽飛射士孤児胡越騎詣金城以益邉夫募及奔命調及惡少𤼵及刑徒選及三百石吏而又以羽林佽飛胡騎越騎從事是南北軍出矣紛紛無復舊制皆自武帝啟之按武帝時事越則㑹稽豫章撃朝鮮則舉遼東開西南夷則巴蜀南北軍猶未出至宣帝撃羌而始出矣及光武之一起而變之兵制蕩然矣光武置黎陽兵罷郡國都試省都尉眀帝而後募囚戍遼置諸營事並見前自光武罷都試而外兵不練雖疆埸之間廣屯増戍列營置塢而國有征伐終藉京師之兵以出盖自建武迄於漢衰匈奴之㓂鮮卑之㓂嵗嵗有之或遣将出撃或移兵留屯如永平中伐匃奴留兵伊吾廬城至肅宗二年罷之之𩔖是也連年暴露奔命四方而禁旅無復鎮衞之職矣至安帝永初間募入錢穀得為虎賁羽林緹騎營士而營衞之選亦衰矣桓帝延熹間詔減羽林虎賁不任事者半俸則京師之兵亦單弱矣外之士兵不練而内之衞兵不精設若盗起一方則羽檄被於三邉興發甲卒取辦臨時戰非素具每出輙北於是羌㓂轉盛移兵赴逺民不堪命永和二年交趾九真二郡之兵至於反叛無亦罷於奔命之過歟此其興兖豫之卒撃象林萬里之㓂李固所以力争也永建間方且令郡舉五人教習戰射又方募為䧟陳羌傳任尚募以撃羌召為積射鮮卑傳鄧逺以撃鮮卑召為義從東漢有羌胡義從盖取西邉羌胡之願從者為兵也董卓正以羌胡義從兵入亂京師大抵創立名號蕩無良法桓靈之世雖能委任叚熲盡滅諸㓂而中平元年黄巾遂作所在盗賊不可勝數於是置八都尉黄巾既殄而蕭墻之禍作盖自中世以後令出房帷政歸臺閣宦戚更領兵權迭相傾奪然五營畏服中人陳蕃竇武欲誅宦官北軍不助武等而助宦官遂又夷滅何武袁紹懲其事故欲籍外兵以除之於是内置園校陽尊閹宦外重州牧實召邉将董卓以并州牧将兵閹宦雖除而董卓之禍已成義兵四起郡牧争政漢遂三分原漢盛衰皆兵之由而光武實為之光武徒見自西都之季都試或以為患韓延夀以試士僭擬不道誅而翟義之討王莽季通之勸光武皆因秋試之日因勒軍旅誅守長號令起軍遂罷都試之法昭烈初置五軍其将校畧如漢而兵有突将無前賨叟青羌㪚騎武騎之别諸葛亮卒蜀兵耗矣諸葛亮傳街亭之敗戮馬謖以謝衆上疏曰自臣到漢中中間朞年耳然䘮趙雲陽羣馬玉閻芝丁立白夀劉郃鄧銅等及曲長屯将七十餘人突将無前賨叟青羌㪚騎武騎一千餘人此皆數十年之内所糾合四方之精鋭非一州之所有若復數年則損三分之二将何以圖敵文獻通考卷一百五十
