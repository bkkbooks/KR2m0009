body:
  text: 文獻通考卷一百九十四鄱陽馬端臨貴與著經籍考二十一史起居注穆天子傳六卷鼂氏曰晉太康六年汲縣民盗發古冡所得凡六卷八千五百一十四字詔荀朂和嶠等以𨽻字寫之云按春秋左氏傳穆王欲肆其心周行天下將皆有車轍馬跡焉此書所載即其事也穆王始廵狩得驊驪綠耳之乗造父為御以觀四荒北絶流沙西登崑崙與太史公既同汲郡守書不謹多毁缺雖其言不典皆古書頗可觀覽郭璞注本謂之周王遊行記朂之時古文已不能盡識時有缺者又轉寫益誤殆不可讀陳氏曰其體制與起居注同起居注者自漢明徳馬皇后始漢魏以來因之唐創業起居注五卷鼂氏曰唐温大雅􅁧紀髙祖建義至受隋禪用師符䜟受命典冊事陳氏曰所載起義至受禪凡三百五十七日其述神堯不受九錫反復之語甚詳愚嘗書其後曰新史稱除隋之亂比跡湯武湯武未易比也唐之受命正與漢髙帝等爾其不受九錫足以掃除魏晉以來欺天㒺人之態而猶不免曰受隋禪者乃以尊立代王之故曾不若以子嬰屬吏之為明白洞逹也唐髙祖實録二十卷鼂氏曰唐房𤣥齡等􅁧太宗詔𤣥齡與許敬宗敬播同脩起創業盡武徳九年貞觀十七年書成陳氏曰唐給事中河東敬播􅁧按志稱房𤣥齡監脩許敬宗刪改今本首題監脩國史許敬宗奉勅定第十一卷題司空房𤣥齡奉勅􅁧不詳其故唐太宗實録四十卷鼂氏曰唐許敬宗等􅁧起即位盡貞觀二十年初貞觀十七年房𤣥齡許敬宗敬播􅁧今上實録止十四年成二十卷永徽五年無忌與史官續十五年後盡昭陵事今四十卷其後敬宗改定陳氏曰按藝文志有今上實録二十卷敬播等􅁧房𤣥齡監脩又有長孫無忌太宗實録四十卷今惟題中書令許敬宗奉勅􅁧蓋敬宗當髙宗時以私意竄改國史中興書目言之詳矣但今本既云許敬宗􅁧而以為恐止是𤣥齡無忌所進則不可考也唐髙宗實録三十卷鼂氏曰唐劉知幾等􅁧起即位盡永淳二年凡二十九初令狐徳棻許敬宗等􅁧録止顯慶三年成二十卷上之後知幾與吳兢續成陳氏曰按志令狐徳棻􅁧止乾封知幾續成之故號後修書本三十卷闕十一卷唐則天實録二十卷鼂氏曰吳兢􅁧初神龍二年詔武三思魏元忠祝欽明徐彦伯同應融岑羲徐堅􅁧録三十卷開元四年兢與劉知幾刋脩成此書上之起嗣聖改元甲申臨朝止長安四年甲辰傳位凡二十一年陳氏曰按志魏元忠等􅁧劉知幾吳兢刪正今惟題兢撰武氏罪大惡極固不應復入唐廟而題主猶有聖帝之稱至開元中禮官有言乃去之武氏不應有實録猶正史之不應有本紀皆沿襲史漢吕后例惟沈既濟之論為正而范氏唐鑑用之唐中宗實録二十卷鼂氏曰唐吳兢􅁧起神龍元年復位盡景龍四年凡六年唐睿宗實録十卷鼂氏曰唐劉知幾􅁧知幾與吳兢先脩太上皇實録起初誕止傳位凡四年後續脩益止山陵陳氏曰志有二録五卷者為兢今此十卷當是知幾也館閣書目亦别有五卷者唐𤣥宗實録一百卷鼂氏曰唐元載等􅁧起即位盡上元三年凡五十年安史之亂元宗起居注亡大歴中史官令狐峘裒掇詔䇿備一朝之遺闕開元天寳間君臣事多漏略陳氏曰題元載􅁧蓋左拾遺令狐峘所為而載以宰相監脩也史稱事多漏略拙於取棄不稱良史峘徳棻五世孫也唐肅宗實録三十卷鼂氏曰唐元載等􅁧起即位盡後元年凡六年陳氏曰亦元載監脩不見史官姓名唐代宗實録四十卷鼂氏曰唐令狐峘􅁧初詔峘􅁧録未成書貶官卒元和二年子丕上之當時名宦如房琯不立傳抗直如顔真卿略而不載時譏漏略起寳應元年壬寅止大歴十四年己未凡十七年陳氏曰尤為漏略唐建中實録十卷崇文總目唐史館修􅁧沈既濟􅁧起大歴十四年徳宗即位盡建中二年十月既濟罷史官之日自作五例所以異於常者舉終必見始善惡必評月必舉􅃋史官雖卑出入必書太子曰薨自謂辭雖不足而書法無隐云唐徳宗實録五十卷鼂氏曰裴垍等􅁧起即位盡貞元二十一年凡二十五年元和二年詔蔣乂樊紳林寳韋處厚獨孤郁同脩五年垍上之唐順宗實録五卷鼂氏曰韓愈􅁧起貞元二十一年乙酉正月止永貞元年丙戍八月初愈􅁧録禁中事為切直閹宦不喜訾其非實文宗詔路隋刋正隋建言衆議以刋脩非是李宗閔牛僧孺謂史官李漢蔣係皆愈之壻不可参􅁧俾臣下筆臣謂不然且愈之所書非自已出元和以來相循逮今漢等以嫌無害公誼請條其甚謬誤者付史官刋定詔摘去元和永貞間數事為失實録不復改陳氏曰按志稱韓愈沈傳師宇文籍􅁧李吉甫監脩新史謂議者閧然不息卒竄定無完篇以閹宦惡其書禁中事切直也唐憲宗實録四十卷鼂氏曰唐路隋等􅁧起即位盡元和十五年初穆宗長慶二年詔監脩國史杜元頴與史官韋處厚路隋沈傳師鄭澣宇文籍等脩元和實録未及成書太和四年隋與蘇景裔陳夷行李漢蔣係續成上之統例取舍皆出處厚焉陳氏曰按志稱沈傳師鄭澣宇文籍蔣係李漢陳夷行蘇景裔􅁧蓋前後史官也又稱杜元頴韋處厚路隋監脩亦前後宰相也唐穆宗實録二十卷鼂氏曰唐路隋等􅁧起即位盡長慶四年按文宗實録太和四年隋與蘇景裔等上憲宗實録後有王彦威楊漢公蘇滌裴休並為史官云唐敬宗實録十卷鼂氏曰唐李譲夷等􅁧起長慶四年甲辰即位止寳歴二年丁未凡三年武宗㑹昌中詔史官陳商鄭亞同脩讓夷監脩書成上之唐文宗實録四十卷鼂氏曰魏謩等􅁧起即位盡開成五年凡十四年宣宗大中八年史官蔣偕牛叢王諷盧吉同脩陳氏曰謩監脩偕等史官也唐武宗實録一卷鼂氏曰唐韋保衡􅁧武宗以後實録皆亡今止有㑹昌元年正月二月陳氏曰按唐志惟有武宗實録三十卷其後皆未嘗修纂更五代武録亦不存邯鄲書目惟有一卷而已唐宣宗實録三十卷懿宗實録二十五卷僖宗實録三十卷昭宗實録三十卷哀宗實録八卷鼂氏曰國朝宋敏求次道所補宣録三十卷懿録三十卷一作二十五卷僖録三十卷昭録三十卷哀録八卷通百二十八卷世服其博聞陳氏曰五録者皆敏求追述為書按兩朝史志初為一百卷其後增益為一百四十八卷今按懿録三十五卷止有二十五卷而始終皆備非闕也實一百四十三卷館閣書目又言闕第九一卷今亦不闕云建康實録二十卷鼂氏曰唐許嵩􅁧始自吳起漢興平元年終於陳末禎明三年南朝六代四十帝四百年間君臣行事及土地山川城池宫苑制置興壊用存古跡其異事則注之以益見聞按南朝四百年除西晉平吳之年并吳首事之年而已吳大帝在武昌七年梁元年都江陵三年其實在建康宫三百二十一年也十父按嵩自叙此書云使周覽而不繁約而無失然自順帝以後復為紀傳而廢編年其間重複一事牴牾者甚衆至於名號稱謂又絶無法葢亦煩而多失矣陳氏曰載吳晉宋齊梁陳六朝都建康者編年附傳大略用實録體後唐莊宗實録三十卷陳氏曰監修趙鳯史官張昭逺􅁧天成四年上後唐明宗實録三十卷陳氏曰監脩姚顗史官張昭逺􅁧清泰三年上後唐廢帝實録十七卷陳氏曰張昭尹拙劉温叟􅁧按昭本傳􅁧梁均王郢王後唐愍帝廢帝漢隠帝實録惟梁二王祀寖逺事皆遺失遂不脩餘三帝實録皆藏史閣周世宗時也葢昭本􅁧周祖實録以其歴試之跡多在漢隐帝時故請先修隐録因併及前代云晉髙祖實録三十卷晉出帝實録二十卷陳氏曰監修竇正固史官賈偉王伸竇儼等􅁧周廣順元年上正固字體仁同州人相漢至周罷歸洛陽國初卒漢髙祖實録十七卷陳氏曰監修蘇逄吉史官賈偉等􅁧乾祐二年上書本二十卷今闕末三卷中興書目作十卷漢隠帝實録十五卷陳氏曰張昭等􅁧事已見前周太祖實録三十卷陳氏曰張昭等􅁧顯徳五年上昭即昭逺字潜夫濮上人避漢祖諱止稱昭逮事本朝為吏部尚書開寳五年卒周世宗實録四十卷陳氏曰監脩官晉陽王溥齊物脩撰范陽扈䝉日用􅁧蜀髙祖實録三十卷鼂氏曰偽蜀李昊􅁧髙祖者孟知祥也昊相知祥子昶時被命􅁧起唐咸通甲午終於偽明徳元年甲午凡六十一年太祖實録五十卷鼂氏曰皇朝沈倫􅁧太平興國三年詔李昉扈䝉李穆郭贄宋白董淳趙隣幾同修倫總其事更歴二載書成起創業迄山陵凡十七年淳化中王禹偁作箧中記叙云太祖神聖文武曠世無倫自受命之後功徳日新皆禹偁耳目所聞見今為史臣多有諱忌而不書又上近取實録入禁中親筆削之禹偁恐歲月寖乆遺落不傳因編次十餘事按禹偁所言雖未可盡信然咸平祥符間亦以所書漏落一再命儒臣重脩多所增益故有三本傳於世重脩太祖實録五十卷鼂氏曰皇朝李沆等􅁧咸平中真宗以前録漏畧詔錢若水王禹偁李宗鍔梁顥趙安仁重加刋修吕端監脩端罷沆代二年書成奏御沆表云前録天造之始國姓之源發揮無取削平諸臣僣主偽臣頗亡事迹今之所正率由典章又益諸臣傳一百四人按書太宗不𣙜市及杜太后遺言與司馬温公所書不同多類此陳氏曰監修國史肥鄉李沆太初史官集賢院學士河南錢若水淡成等重修初上命李至張洎等脩太祖史未成及咸平元年太宗實録成書以太祖朝事多漏略故再命若水修􅁧二年書成上之卷首有沆進書表叙前録之失及新書刋脩條目甚詳同條者直館饒陽李宗鍔昌武東平梁顥太素直集賢院河南趙安仁樂道李燾云世傳太祖自陳橋推戴馬上約束諸將本太祖聖意前録無太宗叩馬之語乃後録所增也然則燾亦嘗見舊録也邪近聞士大夫家亦多有之求之未獲也太宗實録八十卷鼂氏曰皇朝錢若水等􅁧至道三年命若水專修不𨽻史局若水即引柴成務宋度吳淑楊億為佐咸平元年書成上於朝起即位止至道三年丁酉三月凡二十年初太宗有馴犬常在乗輿側及崩犬輙不食李至常作歌紀其事以遺若水其斷章曰白麟赤馬君勿書勸君書此懲浮俗而若水不為載吕端雖為監修而未嘗涖局書成署端名至抉其事以為專美若水援唐朝故事若此者甚衆時議不能奪世又傳億子娶張洎女而不終故洎傳多醜辭嗚呼若水及億天下稱賢尚不能免於流議如此信乎執史筆者之難也陳氏曰錢若水等以至道三年十一月受命咸平元年八月上之九月而畢人難其速按楊億傳書凡八十篇而億獨草五十六卷眞宗實録一百五十卷鼂氏曰皇朝王欽若等􅁧起藩邸止乾興元年壬戍二月凡二十六年乾興元年詔李維晏殊孫奭宋綬陳堯佐舉正李淑同修馮拯監修拯卒欽若代天聖三年書成奏御陳氏曰學士承㫖肥鄉李維仲方學士臨川晏殊同叔􅁧容齋洪氏随筆曰司馬遷作史記於封禪書中述武帝神仙鬼竈方士之事甚備故王允謂之謗書國朝景徳祥符之間王文穆陳文忠陳文僖丁晉公諸人造作天書符瑞以為固寵容悅之計及眞宗上仙王沂公愳貽譏後世故請藏天書於梓宫以滅迹而實録之成乃文穆監修其載崇奉宫廟祥雲芝鶴惟恐不詳遂為信史之累與太史公謗書意異而實同也仁宗實録二百卷鼂氏曰皇朝韓琦等􅁧起藩邸盡嘉祐八年三月凡四十二年嘉祐八年十二月詔琦提舉王珪賈黯范鎮修􅁧宋敏求吕夏卿韓維檢討治平中又命陳薦陳繹同編修熙寧二年奏御英宗實録三十卷鼂氏曰皇朝曾公亮等􅁧起藩邸盡治平四年正月凡四年熙寧元年正月詔公亮提舉吕公著韓維修􅁧孫覺曾鞏檢討三月又以錢藻檢討四月又以王安石吳充為修􅁧二年七月書成王氏揮麈録曰英宗實録熙寧元年曾宣靖提舉王荆公時已入翰林宣靖自為之兼實録修􅁧不置官屬成書三十卷出於一手東坡先生嘗語劉莊輿羲仲云此書詞簡而事備文古而意明為國朝諸史之冠神宗實録二百卷鼂氏曰皇朝曾布等􅁧起籓邸止元豐八年三月凡十九年神宗朱墨史二百卷鼂氏曰元祐元年詔脩神宗實録鄧温伯陸佃脩􅁧林希曾肇檢討蔡􅃀提舉􅃀罷司馬光代光薨吕公著代公著薨大防代六年奏御趙彦若范祖禹黄庭堅後亦與編脩書成賞勞皆遷官一等紹聖中諫官翟思言元祐間吕大防提舉實録祖禹庭堅等編脩刋落事迹變亂美惡外應姦人抵誣之說命曾布重行修定其後奏書以舊録為本用墨書添入者用朱書其刪去者用黄抹已而將舊録焚毁宣和中或得其本於禁中遂傳於民間號朱墨史云陳氏曰紹聖中蔡卞林希等重脩前史官由是得罪其書大抵以安石日録為主陳瓘所謂尊私史而壓宗廟者也神宗實録考異二百卷陳氏曰監修解梁趙鼎元鎮史官成都范冲元長等􅁧進建炎之初有詔重修紹興六年先進呈五十卷六年正月書成考異者備朱墨黄三書而明著其去取之意也闕百六十一至百七十一卷初蔡卞既敗舊録每一卷成納之禁中葢將泯其迹而使新録獨行所謂朱墨本者不可得而見也及梁師成用事自謂蘇氏遺體頗招延元祐諸家子孫若范温秦湛之流師成在禁中見其書為諸家人道之諸人幸其書之出因曰此不可不録也師成如其言及敗没入有得其書者攜以渡江遂傳於世嗚呼此可謂非天乎哲宗前録一百卷後録九十四卷鼂氏曰蔡京􅁧前録起藩邸盡元祐七年十二月後録紹聖元年正月盡元符三年正月共十三年京之意以宣仁垂簾時政非出於上故分前後録葢厚誣也重修哲宗實録一百五十卷鼂氏曰紹興四年三月壬子太上皇帝顧謂宰臣朱勝非等曰神宗哲宗兩朝史録事多失實非所以傳信後世當重别修定著唐鑑范祖禹有子名冲者有召命可促來令兼史臣勝非奏曰神宗史緣添入王安石日録哲宗史經蔡京蔡卞之手議論多不公今䝉聖諭命官刪定以昭彰二帝盛美天下幸甚十八日丙申新除宗正少卿兼直史館范冲辭免恩命勝非奏曰冲謂史館專脩神宗哲宗史録而其父祖禹元祐間任諫官後坐章䟽議論責死嶺表而神宗實録又經祖禹之手今既重修則凡出京卞之意及其增添者不無刪改儻使冲預其事恐其黨未能厭服上曰以私意增添不知當否勝非曰皆非公論上曰然則刪之何害紛紛浮議不足䘏也臣勝非曰范冲不得不以此為辭今聖斷不私冲亦安敢有請上復愀然謂勝非等曰此事豈朕敢私頃歲昭慈聖獻皇后誕辰因置酒宫中從容語及前朝事昭慈謂朕曰吾老矣幸相聚於此他時身後吾復何患然有一事當為官家言之吾逮事宣仁聖烈皇后求之古今母后之賢未見其比因姦臣快其私憤肆加誣謗有玷盛徳建炎初雖嘗下詔辨明而史録所載未經刪改豈足傳信後世吾意在天之靈不無望於官家也朕每念此惕然於懐朝夕降一詔書明載昭慈遺㫖庶使中外知朕之本意臣勝非進曰聖諭及此天下幸甚臣等仰惟神宗哲宗兩朝實録以太上皇帝聖意先定爰命宰臣悉令刪修故具載聖語於篇末云王氏揮麈録曰徐敦立云在館中時見重修哲宗實録其舊書崇寧間率多貴游子弟以預討論於一時名臣行事既多踈略而新書復因之於時急於成書不復廣加捜討有一傳而僅載歴官先後且據逐人碑誌有傳中合書名猶云公者讀之使人不能無恨徽宗實録二百卷鼂氏曰皇朝程俱􅁧先是汪藻編庚辰以來詔㫖頗繁雜俱刪輯成此書且附以靖康建炎時事陳氏曰徽宗實録一百五十卷監修宰相湯思退等紹興七年詔修十一年先上六十卷至二十八年書成修􅁧官歴年既乆前後非一人至乾道五年祕書少監李燾言此書踈舛特甚請重修淳熙四年成凡二百卷考異百五十卷目録二十五卷今百五十卷者前本也欽宗實録四十卷陳氏曰乾道四年修􅁧洪邁等進髙宗實録五百卷陳氏曰慶元三年修􅁧濟源傅伯夀景仁􅁧初進二百八十卷止紹興十六年嘉泰二年修􅁧建安袁說友起岩等又進二百二十卷止三十二年孝宗實録五百卷陳氏曰嘉泰二年修􅁧𫝊伯夀等􅁧進中興以來兩朝五十餘載事跡置院既乆不以時成涉筆之臣乍遷忽徙不可殫紀及有詔趣進則怱遽抄録甚者一委吏手卷帙猥多而記載無法疎略牴牾不復可稽故二録比之前世最為闕典觀者為之太息中興國史志髙宗命范冲重修神録已進而冲去國尹焞繼之又進哲宗徽宗實録紹興末嘗成書建炎後史牘不存皆仰搜討故猶多脫略孝宗命李燾增修之欽宗實録洪邁用龔荗良所補日歴文直事核髙宗實録慶元嘉泰間所上時史無專官莫知誰筆孝宗光宗實録初以付龔敦頤卒專委𫝊伯夀陸游孝録比諸録為疎髙宗日歴一千卷國史日歴所李燾等修進自為序畧曰日歴起初潜訖内禪用春秋四繫之法雜取左右史起居注三省宻院時政記及百司移報綜錯成章凡闗於時靡不畢載前後所論著共成一千卷卷為一冊總一千冊謹繕進呈顧惟紀述聖神之言動事大體重臣愚豈能獨任加之歲周三紀史非一官掇緝穿聫簡䇿繁夥其間脫畧牴牾違失本真安敢自保在昔英主往往指授重加刋正房𤣥齡等進武徳貞觀事迹太宗更令紀實如臣妄庸於𤣥齡無能為役姑自罄竭強附於唐虞氏史臣之義爾中興藝文志髙宗日歴初年者多為秦檜改棄專政以後紀録尤不足信韓侂胄當國寧宗日歴亦多誣後皆命刋修然髙宗日歴時政記亡失多不復可考西漢詔令十二卷陳氏曰吳郡林虙徳祖編采括志傳参之本紀以示信安程俱致道俱以世次先後各為一卷差比歲月摹而成書且為之序虙中詞學為開封府掾東漢詔令十一卷陳氏曰宗正寺主簿鄞樓昉暘叔編大抵用林舊體自為之序帝王之制具在百篇後世不可及矣兩漢猶為近古愚未冠時無書可觀雖二史亦從人借嘗於班書志傳録出諸詔與紀中相附以便覽閱既仕於越及得見林氏書而樓書近出其為好古博雅斯以勤矣惟平獻二朝莽操用事如錫莽及廢伏后之類皆當削去而莽時尤多也本朝大詔令二百四十卷陳氏曰寳謨閣直學士豫章李大異伯珍刻於建寧云紹興間宋宣獻公家子孫所編摹也而不著其名始自國初迄於宣政分門别類凡目至為詳悉玊堂制草十卷陳氏曰参政鉅野李邴漢老編承平以前制詔元符庚辰以來詔㫖三卷鼂氏曰汪藻編徽宗即位後詔㫖未全中興玊堂制草六十四卷陳氏曰同知樞密鄱陽洪遵景嚴編起建炎迄紹興末中興續玊堂制草三十卷陳氏曰丞相益文忠公周必大子充為學士院時編進始嘗建言加上徳夀尊號不以表而以議且稱嗣皇帝為非是遂革之今書以尊號表為卷首而增附館職筆問於後起隆興迄淳熙改元自後未有續者綸言集三十一卷陳氏曰宇文粹中虚中兄弟所編集中興綸言集二十八卷陳氏曰左司郎中莆田鄭寅子敬編寅知樞宻院僑之子端重博洽藏書數萬卷於本朝典故尤熟文獻通考卷一百九十四
