body:
  text: 文獻通考卷三百十一鄱陽馬端臨貴與著物異考十七毛蟲之異周穆王征犬戎得四白狼四白鹿以歸自是荒服者不至春秋荘公十七年冬多麋劉歆以為毛蟲之孽為災劉向以為麋色青屬青祥麋之為言迷也盖牝獸之淫者時荘公将取齊之淫女天戒若曰勿取齊女淫而迷國不悟卒取之其後淫于二叔慶父叔牙終皆誅死㡬亡社稷董仲舒指略同京房易傳曰廢正作淫大不明國多麋漢昭帝時昌邑王賀聞人聲曰熊視而見大熊左右莫見以問郎中龔遂遂曰熊山野之獸而來入宮室王獨見之此天戒大王恐宮室将空危亡象也賀不改悟後卒失國後漢章帝建初七年獲白鹿安帝延光三年扶風言白鹿見雍潁川言白鹿及白虎二見陽翟順帝陽嘉元年十月中望都蒲隂狼殺童兒九十七人時李固對䇿引京房易傳曰君将無道害將及人去之深山以全身厥災狼食人陛下覺悟比求隠滯故狼災息桓帝永興元年張掖言白鹿見延熹五年驚馬逸象突入宮殿永康元年西河言白兎見靈帝建寧中羣狼數十頭入晉陽南城門齧人光和三年正月虎見樂平觀又見憲陵上齧衛士蔡邕封事曰政有苛暴則虎狼食人魏明帝青龍四年司馬懿獲白鹿獻之吴孫權赤烏六年新都言白虎見九年五月鄱陽言虎仁瑞應圖曰仁者王者不暴虐則虎仁不害也晉武帝太康六年南陽獻兩足猛獸此毛蟲之孽也識者為其文曰武形有虧金獸失儀聖主應天斯異何為言兆亂也京房易傳曰足少者下不勝任也干寳以為獸者隂精居於陽金獸也南陽火名也金精入火而失其形王室亂之妖也六水數言水數既極火慝得作而金受其敗也至元康九年始殺太子距此十四年二七十四火始終相乘之數也自帝受命至愍懐之廢凡三十五年焉七年十一月丙辰四角獸見於河間河間王顒獲之以獻天戒若曰角者兵象也四者四方之象當有兵亂起於四方後河間王遂連四方之兵作為亂階殆其應也懷帝永嘉五年蝘䑕出延陵郭景純筮之曰此郡東之縣當有妖人欲稱制者亦㝷自死矣其後吴興徐馥作亂殺太守袁琇馥亦時滅是其應也成帝咸和六年正月丁巳㑹州郡秀孝於樂賢堂有麏居筠反見於前獲之孫盛以為吉祥夫秀孝天下之彦士樂賢堂所以樂養賢也自喪亂以後風教陵夷秀孝䇿試四科之實麏興於前或斯故乎哀帝龍和元年十月甲申有麈入東海第百姓讙言曰主入東海第識者怪之及海西廢為東海王乃入其第孝武太元十三年四月癸巳祠廟畢有兎行廟堂上天戒若曰兎野物而集宗廟之堂不祥莫之甚焉石虎時郡國前後送蒼麟十六白鹿七虎命司虞張曷柱調之以駕芝盖列於充庭之乘苻堅末年猛獸及狼食人行路斷絶苻生既立猛獸及狼大暴晝則斷道夜則𤼵屋惟害人而不食六畜一年殺七百餘人百姓苦之皆聚而邑居為害滋甚遂廢農業内外洶懼慕容超祀南郊将登壇有獸大如馬状類䑕而色赤集於圜丘之側俄而不知所在須臾大風暴起天地晝昏其行宮羽儀皆振裂宋文帝元嘉二十八年秋猛獸入郭内為災梁武帝天監六年三月有三象入建鄴中大同元年邵陵王綸在南徐州卧内方晝有狸鬭於櫩上堕而獲之至太清中侯景之亂将兵援臺城至鍾山有蟄熊無何至齧綸所乘馬毛蟲之孽也綸㝷為王僧辨所敗亡南陽為西魏所殺中大同中每夜狐鳴闕下數年乃止京房易飛候曰野獸羣鳴邑中且空虚俄而國亂丹陽死喪略盡元帝承聖元年十二月淮南有野象數百壞人室廬宣城郡猛獸暴食人陳後主禎明中狐入牀下捕之不獲京房易飛候曰狐入君室室不居未㡬而國滅魏明元帝神瑞二年射白熊於頽牛山獲之太武太延元年白兎見於渤海東魏孝静武定三年九月豹入鄴城南門格殺之五年八月豹又上銅爵臺京房易飛候曰野獸入邑及至朝廷若道上官府門有大害君亡是嵗東魏師敗於玉壁神武遇疾崩北齊後主武平二年有兎出廟社之中京房易飛候曰兎入王室其君亡按廟者祖宗之神室也後五嵗周師入鄴後主東奔三年鄴都并州並有狐媚多截人髪武平中朔州府門外無何有小兒脚跡又擁土為城雉之狀時人怪而察之乃孤媚所為漸流至并鄴與武定三年同占是嵗南安王思好起兵於北朔直指并州為官軍所敗鄭子饒羊法暠等復亂山東武平末并鄴諸州多狼而食人洪範五行傳曰狼貪暴之獸大體以白色為主兵之表也又似犬近犬旤也京房易傳曰君将無道害将及人去之深山以全身厥妖狼食人時帝任用小人競為貪暴殘賊人物食人之應㝷為周軍所滅兵之象也隋煬帝大業四年張掖獲元狐唐高宗永徽中河源軍有狼三晝入軍門射之斃永淳中嵐勝州兎害稼千萬為羣食苖盡兎亦不復見元宗開元三年有熊晝入揚州城肅宗乾元二年十月詔百官上勤政樓觀安西兵赴陕州有狐出於樓上獲之代宗大歴四年八月己卯虎入京師長壽坊宰臣元載家廟射殺之虎西方之屬威猛吞噬刑戮之象六年八月丁丑獲白兎於太極殿之内廊占曰國有憂白喪祥也德宗建中三年九月己亥夜白虎入宣陽里傷人三詰朝獲之貞元二年乙丑有野鹿至含元殿前獲之壬申又有鹿至含元殿前獲之占曰有大喪四年三月癸亥有鹿至京師西市門獲之八年正月鄂州獻白鹿憲宗元和十年五月臨碧院使奏壽昌殿南獲白鹿麑進之穆宗長慶二年五月有自吐蕃至者稱隴上自去嵗以來出異獸如猴而腰尾皆長色青迅猛見蕃人即捕而食之遇漢人則否開成四年四月有麞出於太廟獲之昭宗天祐元年九月汴州進白兎後漢隠帝乾祐二年五月潁州進白兎三年正月有狐出明德門獲之比常狐毛長腹剩二足五月太白進白兎後周世宗顯德三年潁州進白兎南漢劉鋹時有野獸觸宮中寝門宋太祖建隆三年五月有象至黄州黄陂縣匿林木中食民苗稼又至安復襄唐州踐民田頗為患遣使捕之明年十二月於鄧州南陽縣獲之獻其齒革乾德二年五月有象至澧州安鄉澧陽等縣又有象渉江入岳州華容縣直過闤闠十月又有象至澧州澧陽縣城北五年有象自至京師羣臣表賀以為巨獸由逺方而來國家當撫有海南之兆也未㡬廣南平開寳八年四月陕州平陸縣鷙獸傷人遣使捕之生獻數頭十月江陵府白晝虎入市傷二人太宗太平興國三年果閬蓬集州虎為害遣殿直張延鈞捕之獲百數俄而巴州七盤縣虎傷人延鈞又獲七以皮為獻七年越州虎入蕭山縣民趙訓家害八口雍熙四年五月有犀自黔南入萬州民捕殺之獲其皮角淳化元年十月桂州虎傷人詔遣使捕之至道元年六月鳯州梁泉縣虎傷人二年九月蘓州虎夜入福山寨食守卒四人真宗咸平二年十二月黄州長折村二虎夜鬭一死食之殆半占云守臣災明年知州王禹偁卒六年十月乙丑有狐出皇城東北角樓歴軍器庫至夹道獲之潭州獻白鹿潁州獻白麑單州獻白麞開封府大唐縣獻黒兎沂州獻紫兎大中祥符元年五月封禪經度制置使王欽若言泰山舊多虎自興功以來雖屢見而未嘗傷人悉相率入徂徠山而去九年三月杭州浙江側有虎入稅塲廵檢俞仁祐揮戈殺之神宗熙寧元年九月撫州獲白兎十二月嵐州獲白鹿四年九月廬州獲白兎徽宗政和五年十二月安化軍獲白兎宣和元年二月淄川獲黒兎七月秋有狐由艮嶽直入御中據御榻而坐詔毁狐王廟盖北狩之兆高宗紹興十年春有野豕入海州市民刺殺之時州陷敵夏鎮江軍帥王勝攻取之明年和戎以其郡屬金悉空其民渡江後二十年有二虎入城人射斃之虎亦搏人明年魏勝舉州來歸亦徙民如昔虎豕皆毛孽也漢志龔遂曰野獸入宮室宮室將空危亡象也十一年隨州大洪山有跛虎乆為人患近毛孽也十三年南康縣雷雨羣狸震死岩穴中岩石為碎紹興中句容縣有狸毛色如虎孝宗乾道七年潮州野象數百為羣秋成食稼農設穽田間象不得食率其羣圍行道車馬保伍積榖委之乃解圍淳熙二年江州馬當山羣狐掠人十年滁州有熊虎同入樵民舎夜自相搏死光宗紹熙元年三月臨安府民家猫生子一首八足二尾四年鄂州武昌縣虎為人患虎西方之屬威猛吞噬刑戮之象五年八月揚州獻白兎侍御史章頴劾守臣錢之望以孽為瑞坐黜占曰國有憂白喪祥也與唐大歴六年獲白兎同占是嵗光宗皇帝晏駕寧宗慶元三年德興縣羣狐入民舎皆毛孽也麒麟騶虞春秋哀公十四年春西狩于大野叔孫氏之車子鉏商獲麟大野在高平鉅野東北大澤是也以為不祥以賜虞人仲尼觀之曰麟也然後取之公羊傳何以書記異也何異爾非中國之獸麟者仁獸也有王者則至無王者則不至有以告者曰有麕而角者孔子曰孰為來哉反􅃑拭面涕沾袍曰吾道窮矣麟太平之符聖人之類時得麟而死此亦天告夫子將没之徴故云爾榖梁傳西狩獲麟引取之也言引取之者解經言獲也傳例曰諸獲者皆不與也今言獲麟自為孔子來魯引而取之亦不與魯之辭也狩地不地不狩也非狩而曰狩大獲麟故大其適也適猶如也之也非狩而言狩大得麟故以大所如者名之也且實狩當言冬不當言春其不言來不外麟於中國也不言有不使麟不恒有於中國也漢武帝元狩元年冬十月行幸雍祠五畤獲白麟作白麟之歌後漢明帝永平十一年麒麟出安帝延光三年潁川言麒麟見陽翟四年東郡言麒麟見濮陽吴孫權赤烏元年武昌言麒麟見晉武帝㤗始元年郡國言麒麟見二年麒麟又見咸寧五年二月甲午白麟見於平原九月甲午麒麟見於河南太康元年四月白麟見於頓邱愍帝建興二年麟見於襄平成帝咸和八年麒麟騶虞見於遼東石虎時郡國送蒼麟十六詳見毛蟲之異梁武帝天監十年荆州言騶虞見隋文帝開皇四年渝州獲獸似麋一角四蹄唐高宗龍朔三年十月十六日絳州麟見二十六日含元殿前麟趾見至來年改麟德憲宗元和七年十一月梓州上言龍州界嘉禾生有麟食之每來一鹿引之羣鹿隨焉光華不可正視使畫工就圖之并嘉禾一函以獻文宗太和元年十一月河中奏當管虞鄉縣有白虎入重峯觀按瑞應圖義獸也一名騶虞王者德至鳥獸澤同幽㝠則見蜀王建元年騶虞見武定三年十月麟見璧州永平二年六月麟見文州三年正月麟見永泰五月騶虞見璧山有二鹿隨之四年麟見昌州宋太宗太平興國九年嵐州獻牡獸一角似鹿無斑文角端有肉性馴詔羣臣參驗有散騎常侍徐鉉等援引國史以為麟上言曰案春秋曰麏身而有角者麟也春秋感精符曰麟一角者明海内同一主也公羊傳曰上有聖帝明王天下太平則麟見今國海内一統故仁獸出實王者之大瑞宰相宋琪李昉等同其義皆奉表稱賀徽宗雍熙二年閏九月坊州獻一角獸如嵐州麟而牡瑞應圖云牡曰麒牝曰麟政和五年重和元年宣和二年三年寧宗慶元三年俱有牛生麒麟事詳見牛異馬異伏犧氏有天下龍馬負圖出於河遂法之以畫八卦註龍而形象馬也左氏傳定公十年宋公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以予之地怒使其徒抶魋而奪之魋懼将走公閉門而泣之目盡腫公弟辰謂地曰子為君禮不過出境君必止子地出奔陳公不止辰為之請弗聽辰曰是我誑吾兄也我與國人出君誰與守遂與其徒出奔陳明年俱入於蕭以叛大為宋患近馬禍史記秦孝公二十一年有馬生人昭公二十年牡馬生子而死劉向以為皆馬禍也孝公始用商君攻守之法東侵諸侯至於昭王用兵彌烈師古曰烈猛也其象将以兵革抗極成功而還自害也牡馬非生類妄生而死猶秦恃力彊得天下而還自滅之象也一曰諸畜生非其類子孫必有非其姓者至於始皇果呂不韋子京房易傳曰方伯分威厥妖牡馬生子亡天子諸侯相伐厥妖馬生人漢文帝十二年有馬生角於吴角在耳前上郷右角長三寸左角長二寸皆大二寸劉向以為馬不當生角猶吴不當舉兵向上也時吴王濞封有四郡五十餘城内懷驕恣後卒舉兵誅滅京房易傳曰臣易上政不順厥妖馬生角兹謂賢士不足又曰天子親伐馬生角武帝元鼎四年秋馬生渥洼水中李斐曰南陽新野有暴利長當武帝時遭刑屯田燉煌界數於此水旁見羣野馬中有竒者與凡馬異來飲此水利長先作土人持勒靽於水旁後馬玩習乆之代土人持勒靽收得其馬獻之故神異此馬故云從水中出也作天馬之歌太初四年春貳師将軍李廣利斬大宛王首獲汗血馬來應劭曰大宛舊有天馬種蹋石汗血汗從前肩髆出如血號一日千里師古曰蹋石謂蹋石而有跡言其蹏堅利作西極天馬之歌成帝綏和二年二月大廐馬生角在左耳前圍長各二寸時王莽為大司馬害上之萌自此始矣哀帝建平二年定襄牡馬生駒三足隨羣飲食太守以聞馬國之武用三足不任用之象也後侍中董賢年二十二為大司馬居上公位天下不宗哀帝暴崩太后收賢印綬賢自殺王莽代之後漢更始二年二月車駕發雒陽欲之長安司直李松奉引車奔觸北宮鐵柱門三馬皆死馬禍也時更始失道将亡桓帝延熹五年四月驚車與逸象突入宮殿近馬旤也時桓帝政衰缺靈帝光和元年司徒長史馮廵馬生人風俗通曰廵馬生胡子問養馬胡蒼頭乃奸此馬以生子京房易傳曰上亡天子諸侯相伐厥妖馬生人後馮廵遷甘陵相黄巾初起為所殘殺而國家亦四面受敵其後關東州郡舉兵相攻天子西移王政隔塞其占與京房同光和中雒陽水西橋民馬逸走遂齧殺人時公卿大夫及左右數有被誅者晉武帝太康元年遼東有馬生角在兩耳下長三寸按劉向說曰此兵象也及帝晏駕之後王室毒於兵禍是其應也京房易傳曰臣易上政不順厥妖馬生角兹謂賢士不足又曰天子親伐馬生角呂氏春秋曰人君失道馬有生角及惠帝踐阼昏愚失道又親征伐成都是其應也惠帝元康八年十二月皇太子将釋奠太傅趙王倫驂乘至南城門馬止力推之不能動倫入軺車乃進此馬禍也天戒若曰倫不知義方終為亂逆非傅導行禮之人也九年十一月戊寅忽有牡騮馬驚奔至廷尉訊堂悲鳴而死天戒若曰愍懷寃死之象也見廷尉訊堂其天意乎懷帝永嘉六年二月神馬鳴南城門愍帝建興二年九月蒲子縣馬生人京房易傳曰上亡天子諸侯相伐厥妖馬生人是時帝室衰微不絶如線胡狄交侵兵戈日逼㝷而帝亦淪陷故此妖見也元帝太興二年丹陽郡吏濮陽演馬生駒兩頭自項前别生而死司馬彪說曰此政在私門二頭之象也其後王敦陵上成帝咸康八年五月甲戌有馬色赤如血自宣陽門直走入於殿前盤旋走出㝷逐莫知所在己卯帝不豫六月崩此馬旤又赤祥也是年張重華在涼州将誅其西河相張祚廐馬數十匹同時悉無後尾也安帝隆安四年十月梁州有馬生角刺史郭銓送示桓元按劉向說曰馬不當生角猶元不當舉兵向上也元不悟以至夷滅石季龍在鄴有一馬尾有燒状入其中陽門出顯陽門東宮皆不得入走向東北俄爾不見術者佛圖澄歎曰災其及矣逾年季龍死其國遂滅慕容廆有駿馬曰赭白有竒相逸力石虎之伐棘城也皝将出避難欲乘之馬悲鳴踶齧人莫能近皝曰此馬見異先朝孤常仗之濟難今不欲者蓋先君之意乎乃止虎㝷退皝益竒之至是四十九嵗而駿逸不虧雋比之鮑氏驄命鑄銅以圖其象親為銘贊鐫其旁置之薊城東掖門是嵗象成而馬死梁末侯景僭號江南每將戰所乘白馬長鳴蹀足者輙勝垂頭者輙不利西州之役馬卧不起景拜請箠之竟不動近馬禍也景因此敗陳宣帝大建五年衡州馬生角五行傳以為兵象敗亡之表吴明徹師敗為周師所虜北齊文宣天保中廣宗有馬兩耳間生角如羊尾京房易傳曰天子親伐則馬生角四年契丹犯塞文宣親御六軍撃之隋煬帝大業四年太原廐馬死者大半帝怒遣使按問主者曰每夜廐中馬無故自驚因而致死帝令巫者視之巫者知帝將有遼東之役因希㫖言曰先帝令楊素史萬嵗取之將鬼兵以伐遼東也帝大悅因釋主者洪範五行傳曰逆天氣故馬多死是時帝每嵗廵幸北事長城西通且末國内虚耗天戒若曰除廐馬無事廵幸帝不悟遂至亂十一年河南扶風二郡並有馬生角長數寸與天保初同占是時帝頻嵗親征高麗恭帝義寕元年帝在江都宮龍廐馬無故而死旬日死至數百匹與大業四年同占二年五月戊申有馬生角長二寸末有肉角兵象唐高祖武德二年十月王世充偽左僕射韋霽馬生角當項高宗永隆二年監牧馬大死十八萬匹馬者國之武備天去其備國將危亡武后文明初新豐有馬生駒二首同項各有口鼻生而死又咸陽牝馬生石大如升上微有綠毛皆馬禍也元宗開元十二年五月太原獻異馬駒兩肋各十六肉尾無毛二十五年濮州有馬生駒肉角二十九年三月滑州刺史李邕獻馬肉􅐢鱗臆嘶不類馬日行三百里德宗建中四年五月滑州馬生角文宗太和九年八月易定馬飲水因吐一珠以獻開成元年六月揚州民明齊家馬生角長一寸三分武宗㑹昌元年四月桂州有馬生駒三足能隨羣於牧懿宗咸通三年郴州馬生角十一年沁州綿上及和川牡馬生子皆死京房易傳曰方伯分威厥妖牡馬生子僖宗乾符二年河北馬生人中和元年九月長安馬生人二年二月蘇州嘉興馬生角光啓二年夏四月僖宗在鳳翔馬尾皆咤蓬如篲咤怒象文德元年李克用獻馬二肘膝皆有鬛長五寸許蹄大如七寸甌宋太宗太平興國三年靈州獻官馬駒足各有二距雍熙二年䖍州吏李祚家馬生駒足各有二距四年鄜州直羅縣民高英家生馬前兩足如牛端拱二年夏州民程真家馬生二駒真宗大中祥符九年十二月大名監馬生駒赤色肉尾無鬃徽宗宣和五年馬生兩角長三寸四足皆出距時北方正用兵高宗紹興八年廣州西海壖有海獸如馬蹄鬛皆丹夜入民舍聚衆殺之明日海溢環村百餘家皆溺死近馬禍也五年廣西市馬全綱疫死孝宗淳熙六年十二月宕昌西馬金州馬皆大疫十二年黎雅州獻馬有角長二寸京房易傳曰臣易上政不順厥妖馬生角兹謂賢士不足光宗紹熙元年二月丙申右丞相乘馬早朝入禁扉馬斃近馬禍也寧宗嘉定五年正月右丞相入賀於東宮馬驚堕地衣幘皆敗相額微損事與上同牛禍春秋宣公三年郊牛之口傷改卜牛牛死劉向以為近牛禍也時宣公與公子遂謀殺子赤而自立又以喪娶區霿昏亂亂成於口天猶惡之生則不饗其祀謂郊牛傷死死則災燔其廟成三年新宮災新宮宣之廟也以新成故云董仲舒指略同秦孝文王五年斿胊衍朐衍地名有獻五足牛劉向以為近牛禍也先是文惠王初都咸陽廣大宮室南臨渭北臨涇思心失逆土氣足者止也戒秦建止奢㤗將致危亡秦不改至於離宮三百復起阿房京房易傳曰興繇役奪民時厥妖牛生五足漢景帝中六年梁孝王田北山有獻牛足生背上劉向以為近牛禍先是孝王驕奢起苑方三百里宮館閣道相連三十餘里納邪臣羊勝之計欲求為漢嗣刺殺議臣爰盎事𤼵免誅猶有恨心内則思慮霿亂外則土功過制故牛禍作足出於背下姦上之象也猶不能解𤼵疾暴死又凶短之咎也後漢明帝永平十八年牛疫死章帝建初四年冬京都牛大疫時竇皇后以宋貴人子為太子寵幸令人伺求貴人過隙以䜛毁之帝不知太后不善厥咎霿也晉武帝太康元年幽州塞北有死牛頭語近牛禍也是時帝多疾病深以後事為念而托付不以至公思瞀亂之應也按師矌曰怨讟動於人則有非言之物而言又其義也京房易傳曰殺無罪牛生妖惠帝㤗安中江夏張騁所乘牛言曰天下亂乘我何之騁懼而還犬又言曰歸何早也㝷後牛又人立而行騁使善卜者卦之謂曰天下將有兵亂為禍非止一家其年張昌反先略江夏騁為將帥於是五州殘亂騁亦族滅京房易傳曰牛能言如其言占為凶易萌氣樞曰人君不好士走馬被文繡犬狼食人食則有六畜言時天子諸侯不以惠下為務又其應也元帝建武元年七月晉陵陳門才牛生犢一體兩頭京房易傳曰牛生子二首一身天下將分之象也是時愍帝䝉塵於平陽尋為劉聰所殺元帝即位江東天下分為二是其應也太興元年武昌太守王諒牛生子兩頭八足兩尾共一腹三年後死又有牛一足三尾皆生而死按司馬彪說兩頭者政在私門上下無别之象也京房易傳曰足多者所任邪也足少者不勝任也其後王敦等亂政此其祥也四年十二月郊牛死按劉向說春秋郊牛死曰宣公區霿昏亂故天不饗其祀今元帝中興之業實王導之謀也劉隗探㑹上意以得親幸導見疏此區霿不睿之禍成帝咸和二年五月䕶軍牛生犢兩頭六足是冬蘇峻作亂七年九德人袁榮家産犢兩頭八足二尾共身桓元之國在荆州詣刺史殷仲堪行至鶴穴逢一老公驅青牛形色瓌異桓元即以所乘牛易取乘至零陵涇溪駿駛所吏反非常息駕飲牛牛逕入江水不出元遣人覘守經日無所見於後元敗被誅梁武陵王紀祭城隍神將烹牛忽有赤蛇繞牛口牛禍也象類言之又為龍蛇之孽魯宣公三年牛之口傷時以為天不享棄宣公也五行傳曰逆君道傷故有龍蛇之孽時紀雖以赴援為名而實妄自尊亢思心之咎神不享君道傷之應果為元帝所敗陳宣帝太建三年監豫州陳桃根獻青牛後魏孝文承明元年牛疫死傷大半北齊後主武平二年并州獻五足牛牛禍也洪範五行傳曰牛土應宮室之象也帝尋大發卒於仙都苑鑿池築山樓殿間起窮華極麗功始就而國亡後周武帝建德六年陽武有獸三状如水牛一黄一赤一黒赤與黒者鬭乆之黄者自傍觸之黒者死黄赤俱入河近牛禍也黒周所尚色死者滅亡之象後數載隋代周旗牲尚赤戎服以黄隋文帝大業初恒山有牛四脚膝上各生一蹄其後建東都築長城開溝洫唐高宗調露元年春牛大疫京房易傳曰牛少者榖不成又占曰金革動武后長安中有獻牛無前膊三足而行者又有牛膊上生數足蹄甲皆具武太后從姊之子司農卿宗晉卿家牛生三角中宗神龍元年春牛疫二年冬牛疫先天初洛陽市有牛左脇有人手長一尺或牽之以乞丐元宗開元十五年河北牛大疫代宗大歴八年武功櫟陽民家牛生犢二首德宗貞元二年牛疫四年郊牛生犢六足足多者下不一七年關輔牛大疫懿宗咸通七年荆州民家牛生犢五足十五年夏渝州江陽有水牛生驢駒駒死僖宗光啓元年河東有牛人言其家殺而食之二年延州膚施有死牛復生宋太祖乾德三年至真宗天禧五年州縣上言民間牛生二犢三犢者凡一百二十二太宗太平興國九年七月知乾州衛昇獻三角牛仁宗天聖迄英宗治牛生二犢者三十二三犢者一神宗熙寧三年距元豐八年郡國言民家牛生二犢者三十五生三角者一哲宗元祐元年距元符三年郡國言民家牛生二犢者十有五徽宗大觀元年閬州達州俱言牛生二犢政和五年七月安武軍言信都縣民范濟家牛生麒麟重和元年三月陕州言牛生麒麟宣和二年十月尚書省言歙州歙縣民鮑珙家牛生麒麟三年五月汝州梁縣民邢喜家牛生麒麟高宗紹興元年紹興府有牛戴刃突入城市觸馬裂腹出腸時衛卒多犯禁屠牛者牛受刃而逸近牛禍也十六年静江府城北二十里有奔犢觸人於壁腸胃流地牛狂走兩日不可執卒以射死牛禍也十八年五月邛州依政縣牛生二犢二十一年七月遂寧府牛生二犢三二十五年八月漢州牛生二犢孝宗淳熙十二年臨安府仁和縣良渚有牛二首四足七日而死餘杭縣有犢二首一身光宗紹熙十四年春淮西牛大疫死寧宗慶元元年淮浙牛多疫死三年饒州樂平縣田家牛生犢如馬一角麟身四尾農民以不祥殺之或惜其為麟同縣萬山牛生犢人首文獻通考卷三百十一
