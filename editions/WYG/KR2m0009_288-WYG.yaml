body:
  text: 文獻通考卷二百八十八鄱陽馬端臨貴與著象緯考十一月五星凌犯晉武帝咸寜四年九月太白當見不見占曰是謂失舎不有破軍必有亡國是時羊祜表求伐吳上許之五年十一月兵出太白始夕見西方太康元年平吳太康八年三月熒惑守心占曰王者惡之太熙元年四月乙酉帝崩惠帝元康三年四月熒惑守太微六十日占曰諸侯三公謀其上必有斬臣一曰天下亡國是春太白守畢至是百餘日占曰有急令之憂一曰相死又為邉境不安後賈后䧟殺太子六年十月乙未太白晝見九年六月熒惑守心占曰王者惡之八月熒惑入羽林占曰禁兵大起其後帝見廢為太上皇俄而三王起兵討趙王倫倫悉遣中軍兵相距累月永康元年三月中台星坼太白晝見占曰台星失常三公憂太白晝見為不臣是月賈后殺太子趙王倫尋廢殺后斬司空張華其五月熒惑入南斗占曰宰相死兵大起斗又吳分野是時趙王倫為相明年簒位三王興師誅之泰安二年石冰破揚州其八月熒惑入箕占曰人主失位兵起明年趙王倫簒位改元二年二月太白出西方逆行入東井占曰國失政大臣為亂時齊王冏起兵討趙王倫倫滅冏擁兵不朝專權淫奢明年誅死永寜元年七月歲星守虚危占曰有兵憂虚危齊分一曰守虚饑守危徭役繁多下屈竭辰星入太微占曰為内亂羣臣相殺太白守右掖門占曰為兵為亂為賊八月戊午填星犯左執法又犯上相占曰上相憂熒惑守昴占曰趙魏有災辰星守輿鬼占曰秦有災九月丁未月犯左角占曰人主憂一曰左衛將軍死天下有兵泰安二年二月太白入昴七月熒惑入東井是秋太白守太微占曰天下擾兵大起國亂上將以兵亡是年冬成都河間攻洛陽八月長沙王奉帝出距二王二年正月東海王越執長沙王乂張方又殺之十一月庚辰歲星入月中占曰國有逐相十二月壬寅太白犯月占曰天下有兵三年正月月犯太白熒惑入南斗占同七月左衛將軍陳眕率衆奉帝伐成都王六軍敗績兵逼乗輿時天下盗賊羣起張昌尤盛永興元年七月庚申太白犯角亢經房心歴尾箕九月入南斗占曰犯角天下大戰犯亢有大兵人君憂入房心為兵喪犯尾箕女主憂一曰天下大亂入南斗有兵喪一曰將軍為亂其所犯守又兖豫幽冀揚州之分野是年七月有蕩隂之役九月王浚殺幽州刺史和演攻鄴鄴潰於是兖豫為天下兵衝陳敏又亂揚土劉元海石勒李雄等並起微賤跨有州郡皇后羊氏數被幽廢皆應也二年四月丙子太白犯狼星占曰大兵起九月歲星守東井占曰有兵井又秦分野是年荀晞破公師蕃張方破范陽王虓闗西諸將攻河間王顒奔走東海王迎殺之光熙元年四月太白失行自翼入尾箕占曰太白失行而北是謂反生不有破軍必有屠城五月汲桑攻鄴魏郡太守馮嵩出戰大敗桑遂害東燕王騰殺萬餘人焚燒魏時宫室皆盡其九月丁未熒惑守心占曰王者惡之己亥填星守房心占曰填守房多禍喪守心國内亂天下赦是時司馬越專權終以無禮破滅内亂之應也十一月帝崩懐帝即位大赦天下懐帝永嘉二年正月庚午太白伏不見二月庚子始晨見東方是謂當見不見占同上其後破軍殺將不可勝數帝崩北庭中夏淪覆三年正月庚子熒惑犯紫微占曰當有野死之王又為火燒宫是時太史令髙堂冲奏乗輿宜遷幸不然必無洛陽五年六月劉曜王彌入京都焚燒宫廟執帝歸平陽四年填星乆守南斗占曰填星所居乆者其國有福是時安東將軍琅邪王始有揚土其年十一月地動陳卓以為是地動之應也五年十月熒惑守心六年六月丁卯太白犯太微占曰兵入天子庭王者惡之七月帝崩於寇庭天下行服大臨元帝太興元年七月太白犯南斗占曰吳越有兵大人憂二年二月甲申熒惑犯東井占曰兵起貴臣相戮八月己卯太白犯軒轅大星占曰後宫憂十一月辛巳月犯熒惑占曰有亂臣三年五月戊子太白入太微又犯上將星占曰天子自將上將誅九月太白犯南斗十月己亥熒惑在東井居五諸侯南踟蹰留積三十日占曰熒惑守井二十日以上大人憂守五諸侯諸侯有誅者永昌元年三月王敦反攻京師六軍敗績人主謝過敦殺周顗刁協譙王承甘卓閏十一月帝崩十二月己未太白入月在斗郭璞曰月屬坎隂府法象也太白金行而來犯之天意若曰刑理失中自毁其法四年十二月丁亥月犯歲星在旁占曰其國兵饑人流亡永昌初王敦反百姓困於兵革明帝太寧三年正月熒惑逆行入太微占曰為兵喪王者惡之閏八月帝崩後二年蘇峻反攻焚宫室太后以憂偪崩天子幽刼於石頭城逺近兵亂至四年乃息成帝咸和六年正月景辰月入南斗占曰有兵是月石勒殺畧婁武進二縣人明年石勒衆又抄畧南渉海虞其十一月熒惑守胃昴占曰趙魏有兵八年七月石勒死石季龍自立是時雖二石僭號而其强弱常占於昴不闗太微紫宫也八年三月己巳月入南斗與六年占同其年七月石勒死彭彪以譙石生以長安郭權以秦州並歸順於是遣督護喬球率衆救彪彪敗球退又石季龍石斌攻滅生權其七月熒惑入昴占曰胡王死一曰趙地有兵是月石勒死石季龍多所攻沒八月月又犯昴占曰胡不安九年三月己亥熒惑入輿鬼犯積尸占曰兵在西北有沒軍死將六月八月月又犯昴是時石𢎞雖襲勒位而石季龍擅威横暴十一月廢𢎞自立遂幽殺之咸康元年二月己亥太白犯昴占曰兵起歲中旱四月石季龍畧騎至歴陽加司徒王導大司馬治兵列守衝要是時石季龍又圍襄陽六月旱其年二月景戌月入昴占曰胡王死八月戊戌熒惑入東井占曰無兵兵起有兵兵止十一月月犯昴二月乙未太白入月四月甲午月犯太白二年正月辛亥月犯房南第二星八月月又犯昴九月庚寅太白犯南斗占曰斗為宰相又揚州分金犯之死喪之象其後石虎僭王攻叚遼襲慕容皝不克皝擊破并虜叚遼三年七月己酉月犯房上星八月熒惑入輿鬼犯積尸甲戌月犯東井距星九月月犯建星四年四月己巳七月乙巳月俱奄太白占曰人君死又為兵人主惡之五月戊戌熒惑犯右執法占曰大臣死執政憂九月太白又犯右執法按占曰五星災同金水尤甚十一月戊子太白犯房上星占曰上相憂五年四月辛未月犯歲星在胃占曰國饑人流乙未月犯歲星在昴又犯畢距星占曰兵起七月己酉月犯房上星占曰將相憂是月庚申丞相王導薨庾冰代輔政八月太尉郗鑒薨又有沔南邾城之敗百姓流亡萬餘家六年正月征西大將軍庾亮薨六年三月甲辰熒惑犯太微上將星占曰上將憂四月丁丑熒惑犯右執法占曰執政者憂六月乙亥月犯牽牛中央星占曰大將憂是時尚書令何充為執法有譴欲避其咎明年求為中書令其四月景午太白犯畢距星占曰兵革起一曰女主憂六月乙卯太白犯軒轅大星占曰女主憂七年三月皇后杜氏崩七年三月壬午月犯房四月己丑太白入輿鬼五月太白晝見八月辛丑月犯輿鬼八年六月熒惑犯房上第二星占曰次相憂八月壬寅月犯畢占曰下犯上兵革起十月月又掩畢大星占同上其建元元年車騎將軍庾冰薨庾翼大𤼵兵謀伐石季龍專制上流朝廷憚之康帝建元二年正月壬午太白入昴占曰趙地有兵又曰天下兵起四月乙酉太白晝見是年石季龍殺其子􅃉遣將寇沒狄道及屯薊東謀慕容皝三年歲星犯天闗安西將軍庾翼與兄冰書曰歲星犯天闗占曰闗梁當分比來江東無他故江道亦不艱難而石季龍頻年再閉闗不通信使此便是天公憒憒無皂白之徵也其閏月乙酉太白犯斗占曰為喪天下受爵禄九月帝崩太子立大赦賜爵穆帝永和元年正月丁丑月入畢占曰兵大起戊寅月犯天闗占曰有亂臣更天子之法五月辛巳太白晝見在東井占曰為臣强秦有兵六月辛丑月入太微犯屏西南星占曰輔臣有免罷者七月八月月皆犯畢占同上己未月犯輿鬼占曰大臣有誅九月庚戌月又犯畢是年初庾翼在襄陽七月翼疾將終輒以子爰之為荆州刺史代己任爰之尋被廢明年桓温又輒率衆伐蜀執李勢送至京師蜀本秦地也二年二月壬子月犯房上星四月景戌又犯房上星八月壬申太白犯左執法三年正月壬午月犯南斗第五星占曰將軍死近臣去五月壬申月犯南斗第四星因入魁占曰有兵一曰有大赦六月月犯東井距星占曰將軍死國有憂戊戌月犯五諸侯占曰諸侯有誅九月庚寅太白犯南斗第五星占曰為喪為兵四年七月景申太白犯左執法甲寅月犯房丁巳入南斗犯第二星乙丑太白犯左執法占悉同上十月甲辰月犯亢占曰兵起將軍死十一月戊戌月犯上將星三年六月大赦是月陳逵征夀春敗而還七月氐蜀餘寇反亂益土九月石季龍伐凉州五月征北大將軍褚裒卒四年四月太白入昴是時戎晉相侵趙地連兵尤甚七月太白犯軒轅占曰在趙及為兵喪甲寅月犯房十月甲戌月犯亢占曰兵起將軍死八月石季龍太子宣殺弟韜宣亦死其十一月戊戌月犯上將星五年正月石季龍僭號稱皇帝尋死五年四月丁未太白犯東井占曰秦有兵九月戊戌太白犯左角占曰為兵十月月犯昴占曰胡有憂將軍死是年八月褚裒北征兵敗十月闗中二十餘壁舉兵内附石遵攻沒南陽十一月冉閔殺石遵又盡殺胡十餘萬人於是趙魏大亂十二月褚裒薨八年劉顯苻健慕容㒞並僭號殷浩北伐敗績見廢六年二月辛酉月犯心大星占曰大人憂又豫州分野也丁丑月犯房占曰將相憂六月己丑月犯昴占同上乙未月犯五諸侯占曰同上七月壬寅月始出西方犯左角占曰大將死一曰天下有兵丁未月犯箕占曰將軍死景寅熒惑犯鉞星占曰大臣有誅八月辛卯月犯左角太白晝見在南斗月犯右執法占並同上是歲司徒蔡謨免為庶人七年二月太白犯昴占同上三月乙卯熒惑入輿鬼犯積尸占曰貴人有憂五月乙未熒惑犯軒轅大星占曰女主憂太白入畢口犯左股占曰將相當之六月乙亥月犯箕占曰國有兵景子月犯斗丁丑熒惑入太微犯右執法八月庚午太白犯軒轅戊子太白犯右執法占悉同上七年劉顯殺石祗及諸將帥山東大亂疾疫死亡八年三月戊戌月犯軒轅大星癸丑月入南斗犯第二星五月犯心星六月癸酉月犯房七月壬子歲星犯東井距星占曰内亂兵起八月戊戌熒惑入輿鬼占曰忠臣戮死景辰太白入南斗犯第四星占曰將為亂一曰丞相免十二月月在東井犯歲星占曰秦饑人流亡九年二月乙巳月入南斗第三星三月戊辰月犯房八月歲星犯輿鬼東南星占曰兵起時帝幼冲母后專政將相有隙兵革連起慕容㒞僭號攻伐不休十年正月己卯月蝕昴星占曰趙魏有兵癸酉填星奄鉞星占曰斧鉞用三月甲申月犯心大星占曰王者惡之九月辛酉太白犯左執法十一月月奄填星在輿鬼占曰秦有兵時桓温伐苻健破姚襄十一年三月辛亥月奄軒轅占同上四月庚寅月犯牛宿南星占曰國有憂八月己未太白犯天江占曰河津不通十二年六月庚子太白晝見在東井占如上己未月犯鉞星八月癸酉月奄建星九月戊寅熒惑入太微犯西蕃上將星十一月丁丑熒惑犯太微東蕃上將星十二年十一月齊城䧟執叚龕殺三千餘人永和三年鮮卑侵畧河冀升平元年慕容㒞遂據臨漳盡有幽并青冀之地緣河諸將奔散河津隔絶時權在方伯九服交兵升平元年四月壬子太白入輿鬼丁亥月奄井南轅西頭第三星占曰秦地有兵一曰將死六月戊戌太白晝見在軫占同上軫是楚分野壬子月犯畢占曰為邉兵七月辛巳熒惑犯天江占曰河津不通十一月歲星犯房占曰豫州有災其年五月苻堅殺苻生而立十二月慕容㒞入屯鄴二年八月豫州刺史謝奕薨二年閏三月月犯歲星在房十月太白犯哭星占曰有大哭泣十二月填星犯軒轅大星占曰人主惡之甲午月犯東井三年正月熒惑犯鍵閉星三月復逆行犯鈎鈐占俱曰人主惡之月犯太白在昴占曰人君死一曰趙地有兵胡不安六月太白犯東井七月熒惑犯天江丙戌太白犯輿鬼占悉同上戊子月犯牽牛中央大星占曰牽牛大將犯之將軍死八月太白犯軒轅大星甲子月犯畢大星占曰為邉兵一曰下犯上三年十月諸葛攸舟軍入河敗績豫州刺史謝萬入朝衆潰而歸萬除名司徒會稽王以二鎮敗求自貶三等四年正月慕容儁死子暐代立慕容恪殺其尚書令陽鶩等四年正月月犯牽牛中央大星六月辰星犯軒轅占曰女主憂己未太白入太微右掖門從端門出占曰貴奪勢一曰有兵又曰出端門臣不臣八月太白犯氐占國有憂熒惑犯太微西蕃上將星九月太白入南斗口犯第四星占曰為喪有赦天下受爵祿十二月熒惑犯房月犯鍵閉占人主惡之五年正月乙丑月在危宿奄太白占曰天下靡散乙巳填星逆行犯太微三月月犯填星在軫占曰為大喪五月月犯太微又犯建星占曰大臣相謀時殷浩敗績坐廢其月辛亥月犯牽牛宿占曰國有憂六月癸亥月犯氐東北星占曰大將當之五年正月北中郎將郄曇薨五月帝崩哀帝立大赦賜爵褚后失勢七月慕容恪攻冀州刺史吕䕶於野王䕶奔滎陽是時桓温以大衆次宛聞䕶敗乃退六月癸酉月奄氐東北星占曰大將軍當之九月乙酉月奄畢占曰有邉兵十月丁未月犯畢大星占曰下犯上又曰有邉兵八月范汪廢隆和元年慕容暐遣將冦河隂哀帝興寧三年七月月犯南斗占曰女主憂歲星犯輿鬼占曰人君憂明年庾后崩海西公太和元年二月月奄熒惑在參占曰為内亂帝不終之徵一曰參魏地五年慕容暐亡二年正月太白入昴五年苻堅滅燕據幽冀司并四州六年閏月熒惑守太微端門占曰天子亡國又曰諸侯三公謀其上一曰有斬臣辛卯月犯心大星占曰王者惡之十一月桓温廢帝并奏誅武陵王簡文不許温乃徙之新安皆臣强之應也簡文帝咸安元年十二月辛卯熒惑逆行入太微二年三月猶不退占曰國不安有憂是時帝有桓温之逼二年五月丁未太白犯天闗占曰兵起歲星形色如太白占曰進退如度姦邪息變色亂行主無福歲星於仲夏當細小而不明此其失常也又為臣强六月太白晝見在七星乙酉太白犯輿鬼占曰國有憂七月帝崩桓温以兵威擅權將誅王坦之等内外廹脅又庾希入京城盧悚入宫並誅滅之孝武寧康元年正月戊申月奄心大星按占曰災不在王者則在豫州一曰王命惡之三月景午月奄南斗第五星占曰大臣有憂死亡一曰將軍死七月桓温薨九月癸巳熒惑入太微是時女主臨朝政事多缺二年閏月己未月奄牽牛南星占曰左將軍死十二月甲申太白書見在氐氐兖州分野三年五月景午北中郎將王坦之薨三年六月癸卯太白犯東井占曰秦地有兵九月戊申熒惑奄左執法占曰執法者死太元元年苻堅破凉州二年十月尚書令王彪之卒太元元年四月景戌熒惑犯南斗第三星景甲又奄第四星占曰兵大起中國饑一曰有赦八月癸酉太白晝見在氐氐兖州分野九月熒惑犯哭泣星遂入羽林占曰天子有哭泣事中軍兵起十一月己未月奄氐角占曰天下有兵一曰國有憂二年二月熒惑守羽林占曰禁兵大起九月壬子太白晝見在角角兖州分野升平元年五月大赦三年八月秦人冦樊鄧襄陽彭城四年二月襄陽䧟朱序沒四月魏興䧟賊聚廣陵三河衆五六萬於是諸軍外次衝要丹陽尹屯衛京師六月兖州刺史謝元討賊大破之是時中外連兵比年荒儉四年十一月丁巳太白犯哭星占曰天子有哭泣事五年七月景子辰星犯軒轅占曰女主當之九月癸未皇后王氏崩十二年二月熒惑入月占曰有亂臣死若有相戮者一曰女親為政天下亂時瑯琊王輔政王妃從兄王國寳以姻昵受寵袁恱等交遘主相扇揚朋黨帝殺恱自是主相有隙亂階興十三年十一月辰星入月在危占曰賊臣欲殺主不出三年必有内惡十二月熒惑在角亢形色猛盛占曰熒惑失其常吏且棄其法諸侯亂政自是慕容垂翟遼姚萇苻登慕容永並阻兵争强十四年十二月月犯歲星熒惑入羽林占並同上十五年翟遼據司兖衆軍累討弗克慕容氏又跨略并冀七月旱八月諸郡大水兖州又蝗十五年九月熒惑入太微十月太白入羽林十六年十一月癸巳月奄心前星占曰太子憂時太子常有篤疾十八年正月熒惑入月占曰憂在宫中非賊乃盜也一曰有亂臣若有戮者二十一年九月帝暴崩衆言張夫人弑逆又王國寳邪狡卒伏其辜十九年四月月奄歲星在尾占曰為饑燕國亡二十年慕容垂伐魏反為所破死者數萬人垂死國遂衰亡二十年六月熒惑入天囷占曰大饑十二月己巳月犯鍵閉及東西咸占曰鍵閉司心腹喉舌東西咸主隂謀二十一年四月壬午太白入天囷占曰為饑六月歲星犯哭泣星占曰有哭泣事是年帝崩隆安元年王恭等舉兵脅朝廷於是内外戒嚴殺王國寳以謝之又連歲水旱三方動衆人饑安帝隆安元年正月熒惑犯哭泣星占曰有哭泣事六月月奄太白在太微端門外占曰國受兵乙酉月奄歲星在東壁占曰為饑衛地有兵二年六月郗恢遣鄧啟方以萬人伐慕容於滑臺啟方敗三年桓𤣥等並舉兵内外戒嚴三年五月月奄東上相辰星犯軒轅大星占悉同上其年庾楷等舉兵表誅王愉等内外戒嚴三年洛陽沒於寇桓元破荆雍州殺殷仲堪等孫恩聚衆攻沒會稽殺内史四年正月乙亥月犯填星在牽牛占曰吳越有兵喪女主憂六月月犯哭星又犯填星十月月奄歲星在北河占為饑胡有兵其四年五月孫恩亂七月太皇太后李氏崩七月癸亥大角星散揺五色占曰王者流散丁卯月犯天闗占王者憂九月熒惑犯少微又守之占曰處士誅十月月犯東次相其次年盧循桓元内外遘逆元興元年四月月奄辰星七月大饑人相食熒惑在東井犯輿鬼積尸八月太白犯右執法九月太白犯進賢占曰進賢者誅二年二月歲星犯西上將六月月奄斗第四星占曰大臣誅不出十一月十二月月犯熒惑是月桓元簒位三年正月熒惑逆行犯太微西上相占曰天子戰於野上相死月奄歲星於左角占曰天下兵起二月熒惑逆行在左執法西北占曰執法者誅四月月奄軒轅第二星五月月奄斗第二星填星入羽林是年春劉裕討桓元元劫天子如江陵五月義軍破滅之義熙元年三月月奄左執法及心前星占曰豫州有災太白犯東井占曰秦有兵四月月犯填星在東壁占曰其地亡國貴人死一曰人流八月太白犯斗第一星占曰天下有兵一曰大人憂九月熒惑犯少微占曰處士誅又犯左右執法十月奄填星在營室十一月景戌太白犯鈎鈐占曰喉舌憂十二月己卯歲星犯天闗占曰有兵亂河津不通十一月荆州刺史魏詠之薨二年二月司馬國璠等攻沒弋陽四月姚興伐仇池公楊盛擊走之九月益州刺史司馬榮期為其參軍楊承祖所害三年十二月司徒揚州刺史王謐薨四年正月太保武陵王遵薨三月左僕射孔安國卒自後政在劉裕人主端拱而已二年二月太白犯南河占曰兵起己丑月犯心後星占曰豫州有災四月癸丑月犯太微西上將己未月犯房南第二星乙丑歲星犯天江占曰有兵亂河津不通五月癸未月犯左角占曰左將軍死天下有兵壬寅熒惑犯氐占曰氐為宿宫人主憂六月庚午熒惑犯房北第二星八月癸亥熒惑犯南斗第五星丁巳犯建星占曰為兵九月壬午熒惑犯哭星又犯泣星是年二月甲戌司馬國璠等攻沒弋陽又慕容超侵畧徐兖三年正月又寇北徐州至下邳十二月司徒王謐薨四年正月武陵王遵薨五年慕容超復寇淮北四月劉裕大軍討之抜臨胊又圍廣固十二月月奄太白在危占曰齊亡國五年劉裕滅燕三年月奄心後星又犯左角八月太白犯左執法熒惑復犯之九月熒惑犯進賢四年正月熒惑犯天闗五月月奄斗第二星填星犯天廪占曰天下饑倉粟少六月太白犯太微西上將又犯左執法十月熒惑入羽林五年二月月犯昴占曰胡不安天子破匈奴五月戊戌歲星入羽林九月犯昴十月熒惑犯氐又犯鈎鈐己巳奄心大星占曰王者惡之是年劉裕討慕容超十月魏王珪遇弑殂次年盧循逼郊甸六年三月丁卯月奄房南第二星災在次相己巳又奄斗第五星占斗上吳地兵起太白犯五諸侯占曰諸侯有誅五月甲子月奄斗第五星己亥月奄昴三星占曰國有憂一曰有白衣之會六月己丑月犯房南第二星甲午太白晝見七月己亥月犯輿鬼占曰國有憂一曰秦有兵八月壬午太白犯軒轅大星甲申月犯心前星災在豫州景戌月犯斗第五星占同上丁丑月奄牛宿南星占曰天下有大誅乙未太白犯少微景午太白在少微而晝見九月甲寅太白犯左執法丁丑填星犯畢占曰有邉兵是年徐道覆盧循反衆逼郊畿七年十二月破斬之八年豫州刺史劉道規卒七年四月熒惑入輿鬼占曰秦有兵一曰雍州災六月填星犯天闗占曰臣謀主月犯嵗星在畢占曰有邉兵且饑八月太白犯房南第二星月犯歲星在參占曰益州兵饑七月朱齡石克蜀蜀又反討滅之十一月太白犯哭星八年正月月犯歲星在畢七月癸亥月奄房北第二星己未月犯井鉞八月戊申月犯泣星十月辛亥月奄天闗占曰有兵十一月丁丑填星犯東井占曰大人憂十二月癸卯填星犯井鉞是年八月皇后王氏崩九月誅劉蕃謝混討滅劉毅十二月朱齡石滅蜀九年二月熒惑入輿鬼占曰有兵喪太白犯南河占曰兵起五月壬辰太白犯右執法晝見七月庚午月奄鈎鈐占曰喉舌臣憂九月庚午歲星犯軒轅大星己丑月犯左角時劉裕擅命兵革不休十年裕討司馬休之王師不利休之等奔長安十年正月丁卯月犯畢占曰將相有以家坐罪者二月己酉月犯房北星五月壬寅月犯牽牛南星乙丑歲星犯軒轅大星占悉同上六月景申月奄氐占曰將死之國有誅者七月庚辰月犯天闗占曰兵起熒惑犯井鉞填星犯輿鬼遂守之占曰大人憂宗廟改八月丁酉月奄牽牛南星占同上九月填星犯輿鬼占曰人主憂丁巳太白入羽林十二月己酉月犯西咸占曰有隂謀十一年林邑冦交州距敗之十一年三月丁巳月入畢占曰天下兵起一曰有邉兵己卯熒惑入輿鬼閏月景午填星又入輿鬼占曰為旱大疫為亂臣五月癸卯熒惑入太微甲辰犯右執法六月己未太白犯東井占曰秦有兵戊寅犯輿鬼占曰國有憂七月辛丑月犯畢占同上八月壬子月犯氐占同上庚申太白順行從右掖門入太微丁卯奄左執法十一月癸亥月入畢占同上乙未月入輿鬼而暈十二年五月月犯嵗星在左角占曰為饑歲星留房心之間宋之分野始封劉裕為宋公六月壬子太白順行入太微右掖門己巳月犯畢占同上七月月犯牛宿十月景戌月入畢十三年五月景子月犯軒轅丁亥犯牽牛癸巳熒惑犯右執法八月己酉犯牽牛丁卯月犯太微占曰人君憂九月壬辰熒惑犯軒轅十月戊申月犯畢占悉同上月犯箕占曰國有憂甲寅月犯畢占同上乙卯填星犯太微留積七十餘日占曰亡君之戒壬戌月犯太微十四年三月癸巳太白犯五諸侯四月壬申月犯填星於張占曰天下有大喪其明年帝崩五月庚子月犯太微七月甲辰熒惑犯輿鬼占曰秦有兵又為旱為兵喪亦曰大人憂宗廟改亦為亂臣時劉裕擅命軍旅數興饑旱相屬其後卒移晉室丁巳月犯東井占曰軍將死八月甲子太白犯軒轅癸酉填星入太微犯右執法因留太微中積二百餘日乃去占曰填星守太微亡君之戒有徙王九月乙未太白入太微犯左執法丁巳入太微占曰大人憂十月甲申月入太微癸巳熒惑入太微犯西蕃上將仍順行至左掖門内留二十日乃逆行義熙十二年七月劉裕伐姚泓十三年八月擒姚泓司兖秦雍悉平十四年劉裕還彭城受宋公十一月左僕射前將軍劉穆之卒明年西虜冦長安雍州刺史朱齡石諸軍䧟沒官軍捨而東恭帝元熙元年正月三月五月月皆犯太微辰星犯軒轅六月太白犯太微七月月犯歲星太白犯哭星十二月月入太白俱入羽林二年三月填星犯太微元年七月劉裕受宋王是年六月帝遜位於宋宋孝武孝建二年五月乙未熒惑入南斗齊東昏侯永元三年十一月甲寅辰星及太白俱見南方是日荆州長史蕭頴胄奉南康王寳融起兵後即帝位是為和帝梁武帝天監元年八月壬寅熒惑守南斗占曰糴貴五榖不成大旱多火災宰相死是歲大旱米斗五千人多餓死五月尚書范雲卒二年五月丙辰月犯心占曰有亂臣其四年交州刺史李凱舉兵反七月景子太白犯軒轅大星七年九月己亥月犯東井占曰有水災其年京師大水十三年二月太白失行在天闗占曰津梁不通又兵起其年填星守天江占曰有江河塞有決溢有土功其年大發軍衆造浮山碣淮水至十四年填星去天江而堰壞奔流決溢十四年十月辛未太白犯南斗十七年閏八月戊辰月行奄昴普通六年三月丙午歲星入南斗九月壬子太白犯右執法大通元年八月月奄填星占曰有大喪天下無主國易政其後上幸同泰寺捨身王公以錢奉贖又太子薨皆無主易政大喪之應中大通元年閏月壬戌熒惑犯鬼積尸星占曰有大喪大兵破軍殺將其二年蕭玩帥衆援巴州為魏所敗玩被殺六年熒惑在南斗占曰熒惑出入留舎南斗中有賊臣謀反天下易政改元其年十二月北梁州刺史蘭欽舉兵反後改大同元年大同三年三月歲星奄建星占曰有反臣其年會稽山賊起七年交州刺史李賁反太清三年正月熒惑守心占曰王者惡之三月熒惑又守心占曰大人易政主去其宫人饑亡天下大潰其年帝為侯景所逼崩七月九江大饑人相食九月月在斗奄歲星占曰天下亡君其後侯景簒殺元帝承聖三年九月甲午月犯心中星占曰有反臣王者惡之有亡國其後三年帝為周師所俘梁亡陳氏取國陳武帝永定三年九月月入南斗占曰大人憂太子殃後二年帝崩太子昌在周為質文帝立後昌還國為侯安都迎殺之文帝天嘉元年五月熒惑犯右執法占曰大臣有憂執法者誅後四年司空侯安都賜死二年五月己酉歲星守南斗六月丙戌熒惑犯東井七月乙丑熒惑入鬼中戊辰熒惑犯斧質十月熒惑行在太微右掖門三年閏二月己丑熒惑逆行犯上相甲子太白犯五車填星七月太白犯輿鬼八月癸卯月犯南斗景午月犯牽牛庚申太白入太微十一月丁丑月犯畢左股辛巳熒惑犯歲星戊子月犯角庚寅月入氐四年六月癸丑太白犯右執法七月戊子熒惑犯填星八月甲午熒惑犯軒轅大星丁未太白犯房九月戊寅熒惑入太微犯右執法癸未太白入南斗占曰太白入斗天下大亂將相謀反國易政又曰君死不死則廢又曰天下受爵祿其後安成王為太傅廢少帝而自立改官受爵之應也辛卯熒惑犯左執法十一月辛酉熒惑犯執法甲戌月犯畢左股五年正月甲子月犯畢大星丁卯月犯星壬寅月入氐又犯熒惑癸卯月犯房上星五月熒惑逆行二十一日犯氐東南西南星占曰國有賊臣又曰人主無出廊廟間有伏兵又曰君死有赦後二年少帝廢之應也六月景申月犯亢七月戊寅月犯畢大星閏十月庚申月犯牽牛丙子又犯左執法十一月月食畢大星六年四月月犯畢軒轅占曰女主有憂五月太白犯軒轅占同其後少帝廢廢後慈訓太后崩六月己未月犯氐八月戊辰月奄畢大星景子月與太白並光芒相著在太微西藩南三尺所九月辛巳熒惑犯左執法癸未太白犯右執法辛卯犯左執法己巳月犯上相廢帝天康元年五月月犯軒轅女御大星占曰女主憂後年太后崩癸未月犯左執法光大元年正月月犯軒轅大星占曰女主當之八月月食哭星占曰有喪泣事明年太后崩臨海王廢己未月犯歲星占曰國亡君十二月辛巳月又犯歲星辛卯月犯建星占曰大人惡之二年正月月奄歲星占曰國亡君五月月犯太白六月太白犯左執法八月犯太微十一月丙午歲星守左執法甲申月犯太微東南星戊子太白入氐其年帝廢宣帝太建七年五月熒惑犯右執法十年十月月食熒惑占曰國敗君亡大兵起破軍殺將來年吳明徹敗於吕梁十三年帝崩十二年十月戊午月犯牽牛吳越之野占曰其國君有憂後年帝崩齊文宣帝天保元年十二月熒惑犯房北頭第一星及鈎鈐占曰大臣有反者二年太尉彭樂謀反誅八年二月歲星守少微經六十三日占曰五官亂五月歲星犯太微上將占曰大將憂大臣死其十年誅諸元宗室四十餘家乾眀元年誅楊彦遵等皆五官亂大臣死之應七月月奄心星占曰人主惡之九年二月熒惑犯鬼質占曰斧質用有大喪三月熒惑犯軒轅其十年五月誅諸元十月帝崩斧質用大喪之應也廢帝乾眀元年三月熒惑入軒轅占曰女主凶太寧二年太后崩肅宗皇建二年七月熒惑入鬼中犯鬼質占曰有大喪十一月帝暴崩武成帝河清元年七月太白犯輿鬼占曰有兵謀誅大臣斧質用十月冀州刺史平秦王髙歸彦反討誅之又二年殺太原王紹徳皆斧質之應八月月奄畢占曰國君死大臣誅有邉兵破軍殺將其月歸彦以反誅三年周師與突厥入并州大戰城西伏尸流血百餘里皆其應也後主天統五年二月歲星逆行奄太微上將占曰天下大驚四輔有誅者五月甲午熒惑犯鬼積尸占曰大臣誅兵大起斧質用有大喪至武平二年九月誅琅邪王儼三年誅右丞相斛律明月四年誅蘭陵王長恭皆懿親名將四年誅崔季舒等皆斧質用之應四年五月熒惑犯右執法占曰大將軍死執法者誅其應如前周閔帝元年五月癸卯太白犯軒轅占曰大臣出令又曰皇后失勢辛亥熒惑犯東井北端第二星占曰其國亂又曰大旱其年九月冡宰䕶廢帝幽而弑之又殺司㑹李植等其冬大旱皆大臣出令大臣死旱之應也明帝二年三月熒惑入軒轅占曰王惡之女主凶其月獨孤后崩六月庚子填星犯井鉞與太白并占曰傷成於鉞君有戮死者其年太師䕶毒帝崩武帝保定二年閏正月太白入昴二月壬寅熒惑犯太微上相三月壬午熒惑犯左執法七月太白犯輿鬼三年九月熒惑犯太微上將十月熒惑犯左執法四年三月熒惑犯房右驂占曰上相誅車馳人走天下兵起其年十月伐齊柱國庸公王雄力戰死之遂班師兵起將死之應也天和元年七月太白犯軒轅大星相去七寸占曰女主失勢大臣當之又曰西方禍起其十一月太保許公宇文貴薨十月熒惑犯鈎鈐去之六寸占曰王者憂又曰車騎驚三公謀三年三月太白犯井北轅第一星占曰將軍惡之其七月隋公楊忠薨四月太白入輿鬼犯積尸占曰大臣誅又曰亂臣在内有屠城四年二月歲星逆行奄太微上將占曰天下大驚國不安四輔有誅必有兵革天下大赦五月熒惑犯輿鬼及積尸占曰大臣有誅後三年太師宇文䕶以不臣誅六年四月熒惑逆行犯輿鬼占曰有兵喪大臣誅兵大起其月取齊宜陽等九城六月齊將攻䧟汾州建徳元年九月月犯心中星相去一寸占曰亂臣在旁不出五年下有亡國後伐齊平之二年二月熒惑奄鬼西北星占曰大賊在大人之側又曰大臣有誅四月太白奄西北星又奄東北星占曰國有憂六月月犯心中後二星占曰不出三年有亡國人主惡之九月太白犯左執法占曰大臣憂執政誅三年十二月月犯歲星在危相去二寸占曰其邦流亡不出三年辛卯月行在營室食太白占其國以兵亡營室衛在齊地後齊亡四年三月月犯軒轅大星占曰女主有憂又五官有亂五年十月熒惑犯太微西蕃上將星占曰天下不安上將誅六年皇太子西廵討吐谷渾吐谷渾冦邉天下不安之應六月熒惑入鬼占曰有喪旱十月歲星犯大陵六年四月先時熒惑入太微宫二百日犯東蕃上相西蕃上將句己徃還至此月甲子出端門占曰為大臣代主又曰臣不臣有反者又曰大喪後宣武繼崩髙祖以大運代起十月月食熒惑在斗占曰國敗君亡兵大起斗為吳越陳之分野宣政元年七月月犯心前星占曰太子惡之若失位後静帝立為天子不終之徵己未太白犯軒轅大星占女主凶後二年宣帝崩隋氏受命廢楊后為平樂公主餘四后悉廢為比邱尼八月庚辰太白入太微占曰為天下驚又曰近臣起兵大臣相殺國有憂其後趙陳等五王為執政所誅大臣相殺之應也九月丁酉熒惑入太微西掖門庚申犯左執法相去三寸占曰天下不安大臣有憂又曰執法者誅若有罪是月汾州稽胡反討平之十一月突厥寇邉圍酒泉殺略吏人眀年二月殺柱國郯公王軌皆其應也十二月癸未熒惑入氐守犯之三十日占曰天子失其宫又曰賊臣在内下有反者又曰國君有繫饑死若毒死者靜帝禪位隋髙祖幽殺之宣帝大象元年七月壬長熒惑奄房北頭第一星占曰亡君之誡又曰將軍為亂王者惡之大臣有反者天子憂其十二月帝親御驛馬日行三百里四皇后及文武侍衛數百人並乗驛以從房為天駟熒惑主亂此宣帝亂道徳馳騁車騎將亡之誡八月辛巳熒惑犯南斗第五星占曰且有反臣道路不通破軍殺將尉遲迥王謙等起兵敗亡之徵也九月己酉太白入南斗魁中占曰天下有大亂將相謀反國易政又曰君死不死則疾又曰天下爵禄皆髙祖受命羣臣分爵之徵也十月壬戌歲星犯軒轅大星占曰女主憂若失勢靜帝大定元年正月歲星逆行守右執法熒惑奄房北第一星占曰房為眀堂布政之宫無徳者失之二月隋王稱帝隋髙祖開皇八年二月填星入東井占曰填星所居有徳利以稱兵其年大舉伐陳克之煬帝大業元年六月熒惑入太微占曰熒惑為賊為亂入宫宫中不安三年三月熒惑逆行入南斗色赤如血如三斗器光芒震耀長七八尺於斗中句己而行占曰有反臣道路不通國大亂兵大起其後楊元感反雖誅滅而羣盗屯聚剽掠州縣道路不通斗牛楚越分野元感父初封越後徙封楚九年五月丁丑熒惑入南斗十一年熒惑守羽林占曰衛兵反十三年六月鎮星贏而旅於參參唐星也李淳風曰鎮星主福未當居而居所宿國吉七月熒惑守積尸十一月熒惑犯太微恭宗義寧二年三月丙午熒惑入東井占曰大臣憂文獻通考卷二百八十八
