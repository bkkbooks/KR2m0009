body:
  text: 文獻通考卷四鄱陽馬端臨貴與著田賦考四歴代田賦之制晉天福四年勅應諸道節度使刺史不得擅加賦役及於縣邑别立監徴所納田租委人戸自量自槩吳越王錢𢎞佐年十四即位問倉吏今畜積㡬何對曰十年王曰然則軍食足矣可以寛吾民乃令復其境内稅三年致堂胡氏曰錢氏當五代時不廢中國貢獻又有四隣之交史氏乃謂自武穆王鏐常理重斂以事奢侈下至魚雞卵鷇必家至而日取每笞一人以責其負則諸案吏各持簿立於庭凡一簿所負唱其多少量為笞數已則以次唱而笞之少者猶積數多至百餘人不堪其苦信斯言也是取之盡錙銖用之如泥沙安得倉廩有十年之積而又復境内三年之稅則其養民亦厚矣故以史所載則錢氏宜先亡而享國最久何也是故司馬氏記𢎞佐復稅之事而五代史不載歐陽公記錢氏重斂之虐而通鑑不取其虛實有證矣吳徐知誥用歙人汪台符之策括定田賦每正苖一斛别輸三斗官授鹽一斤謂之鹽米入倉則有䕠米吳氏能改齋謾錄曰今所在輸秋苗一斛之外則别納鹽米三斗亦始於五代史南唐耳江南野史李先主世括定田產自正斛上别輸三斗於官廪受鹽二斤謂之鹽米百姓便之及周世宗克淮南鹽貨遂艱官無可支至今輸之猶有定制此事與太宗朝和買絹無異余考東齊記事載夏秋沿納之物如鹽鈔之類名件頗碎慶歴中有司建議併合歸一名以省帙鈔程文簡公為三司使獨以為仍舊為便若沒其舊名異日不知或再敷鹽麴則致重複此亦善慮者也宋咸淳六年江東饒州樂平縣士民白劄子陳恭惟公朝勤恤民隱比年以來寛恩屢下有如郊禋則預放明年之租秋苖則痛除斛靣之取快活條貫誠前所無恵至渥也今有五代以來所未蠲之苛政四海之内所未有之暴賦而獨於小邑不得免焉倘不引首一鳴是疲民永無蘇醒之期矣竊見五季暴政所興江東西釀酒則有麴引錢食鹽則輸鹽米供軍須則有鞋錢入倉庫則有䕠錢宋有天下承平百年除苛解饒麴鹽鞋䕠之征一切削去獨鹽䕠米一項諸路皆無而江東獨有之江東諸郡皆無而饒州獨有之饒州六邑皆無而樂平獨有之照得本州元起催苖額十有八萬此正數也樂平正苖二萬七千五百餘石每石加鹽米四斗䕠米二斗八升二合於是一石正苗非三石不可了納夫所謂正苗者隸之上供籍之綱解顆粒不敢言蠲減者也加鹽䕠米者上供綱解未嘗取諸此徒以利郡縣而已夫均為王土而使此邑獨受横斂豈理也哉士民懷此欲陳久矣徒以前此版籍不明苗額失䧟政復哀籲必遭沮格今推排成矣租額登矣正賦之毫髮不遺者民既不敢虧官則加賦之苦樂不均者官稍捐以予民宜無不可且此項重斂利歸州郡害在閭閻其於朝廷綱解曾無損益用敢合詞控告欲望特賜指揮行下本州契勘樂平毎年輸納鹽䕠米一項詣實供申從朝廷斟酌蠲減施行右鹽䕠米為南唐横賦藝祖平南唐首命樊知古將漕江南訪求民瘼而樊非其人訖不能建明蠲除繼而運使陳靖言之於祥符間提舉劉誼言之於元豐間蓋南唐正賦之外所取不一宋因之名曰沿納鹽䕠米其一也在後沿納之賦多從蠲減至中興後内翰洪公敷文魏公又嘗言之則専指鹽䕠米而言而此米獨饒州有之而饒州所徴則樂平獨重洪魏以鄉寓公知之為詳言之亦懇切而未有中主其事者遂抑不復行先公丁卯居憂時與郡士李君士㑹討究本末戊辰入覲繼登揆席諷李拉邑之士友請於郡俾郡上其事而久之未有發喙者先公乃自草白劄子作士民所陳徑自朝省下本州契勘而郡守回申止欲少作豁除具文塞責蓋此米雖不係上供綱解而州縣經費所仰故郡難其事先公却回元奏俾從實再申守知不可拒乃再詣實申上即進呈奉㫖蠲除蓋自晉天福時創例至是凡三百一十四年而始除云據吳虎臣能改齋謾錄稱今所在有之虎臣此書作於紹興間則知南渡後此賦之未減者非獨饒州而已而洪魏二公則謂獨饒有此當考此宋咸淳年間事通考所載本不及咸淳但欲見此項蠲除之難故述其本末附創法之後漢隱帝時三司使王章聚斂刻急舊制田稅每斛更輸二斗謂之雀䑕耗章始令更輸二斗謂之省耗舊錢出入皆以八十為陌章始令入者八十出者七十七謂之省陌致堂胡氏曰百姓輸稅足雀䑕耗蠧倉廩乃有司之責而亦使百姓償之斂稅重矣然稱之曰雀䑕耗尚為有名章乃使十倍而償十百千萬有定數矣以八十為百既非定數然出入皆然尚為均一章乃於出者特收其三省耗不已於是有一斛之稅又取其三斛者省陌不已於是有一千之省又取其頭子者故曰作法於貪敝將若何章以此佐國用於一時信號為能臣然國所以興而遂亡身所以貴而自殺者乃自於此故言利之臣自以謂時之不可少我而不知人之不多我也可不戒哉周廣順二年􅃯約每歲民間所收牛皮三分減二計田十頃稅取一皮餘聽民自用及買賣惟禁賣於隣國先是兵興以來禁民私賣牛皮悉令輸國受直唐明宗之世有司止償以鹽晉天福中并鹽不給漢法犯牛皮一寸抵死然民間日用實不可無帝素知其弊至是李穀建議均於田畝公私便之顯德二年􅃯應自前及今後有逃戸莊田許人請射承佃供納租稅如三周年内本戸來歸業者其桑土不以荒熟并莊園交還一半其承佃戸自出力蓋造到屋舍及栽種樹木園圃並不在交還之限如五周年後歸業者莊田除本戸墳塋外不在交付如有荒廢桑土承佃戸自來無力佃蒔秪仰交割與歸業戸佃蒔其近北諸州陷番人戸來歸業者五周年内三分交還二分十周年内還一半十五周年内三分還一分此外不在交還之限應有冒佃逃戸物業不納租稅者其本戸歸業之時不計年限並許總認洪氏容齋隨筆曰國朝當五季衰亂之後隨宜損益然一時設施固亦有可采取今觀周世宗顯徳三年射佃逃田詔􅃯其㫖明白人人可曉非若今之令式文書盈几閣為猾吏舞文之具故有捨去物業三五十年妄人詐稱逃戸子孫以錢買吏而奪見佃者為可歎也三年宣三司指揮諸道州府今後夏稅以六月一日起徴秋稅至十月一日起徴永為定例又􅃯舊制織造絁紬絹布綾羅錦綺紗縠等幅闊二尺起來年後並須及二尺五分宜令諸道州府來年所納官絹每疋須及十二兩其絁紬只要夾密停匀不定斤兩其納官紬絹依舊長四十二尺洪氏容齋隨筆曰今之稅絹尺度長短闊狹斤兩輕重頗本於此顯徳四年􅃯節文諸道州府所管屬縣每年夏稅徴科了畢多是却追縣典上州㑹末文鈔因兹科配斂掠宜令今後科徴了足日仰本州但取倉塲庫務納欠文鈔如無異同不在更追官典諸道州官管内縣鎭每有追催公事自前多差衙前使院職員及散從歩奏官今後如是常程追催公事祗令府望知後承受逓送不得更差専人若要切公事及軍期不在此限按五季離亂之時世主所尚者用兵爭强而已其間唐明宗周世宗粗為有志於愛民重農者有如農務未開而受理詞訟徴科既足而追㑹科斂皆官吏姦貪之情為閭里隱微之害而天成顯徳之詔􅃯丁寧禁切之於倥偬日不暇給之時而能及此可謂仁矣顯徳五年賜諸道均田詔曰朕以干戈既弭寰海漸寧言念地征罕臻藝極須議並行均定所冀求適輕重卿受任方隅深窮治本必能副寡昧平分之意察鄉閭致弊之源明示條章用分寄任竚聆集事允屬惟公乃命左散騎常侍艾頴等三十四人使諸州檢定民租先時上因覽元稹長慶集見在同州時所上均田表因令製素成圖直考其事以便觀覽遍賜諸道議均定民租至是乃詔行之宋太祖皇帝建隆二年遣使度民田周末遣使度田不實至是上精擇其人仍加戒飭未㡬舘陶令坐括田不實杖流海島人始知畏五代以來常檢視見墾田以定歲租吏緣為姦稅不均適由是百姓失業田多荒萊上憫之乃詔禁止許民闢土州縣無得檢括止以見佃為額止齋陳氏曰按孔氏闕里誌云先是歴代以聖人之後不預庸調至周顯徳中遣使均田遂抑為編戸又按太平興國中遣左補闕王永太僕寺丞高象先均福建田稅歲蠲偽閩錢五千三百二十一貫米七萬一千四百餘石用知周朝均田孔氏抑為編戸本朝至蠲偽閩之斂以數千萬計以其政之寛猛足以卜其受命之長短矣又命課民種樹每縣定民籍為五等第一等種雜樹百每等減二十為差桑棗半之令佐春秋廵視宣州言州境無隙地種蒔慮不應詔㫖乃令諸州隨風土廣狹不宜課藝者不須責課太平興國二年又禁伐桑􅀥為薪遣使監輸民租懲五代藩鎮重斂之弊閻式等坐監輸增羡貶杖常盈倉吏以多入民租棄市建隆四年詔令逐縣每年造形勢門内戸夏秋稅數文帳内頑滑逋欠者須於限内前半月了足係見任文武職官及州縣勢要人戸雍熙四年又詔形勢戸納租於三限前半月足詔諸州勿得追縣吏㑹末即周顯徳四年所禁令諸州受民租籍不得稱分毫合勺銖釐絲忽錢必成文絹必成尺粟成升絲綿成兩薪蒿成束金銀成錢詔曰自頃兵荒人民流徙州縣未嘗檢覆親隣代輸其租自今民有逃亡者本州具户籍頃畝以聞即檢視之乾徳四年詔曰出納之吝謂之有司倘規致於羡餘必深務於掊克知光化軍張全操上言三司令諸處倉塲主吏有羡餘粟及萬石芻五萬束以上者上其名請行賞典此茍非倍納民租私減軍食何以致之宜追寢其事勿頒行除官所定正耗外嚴加止絶大中祥符八年復詔禁諸倉羡餘開寳三年詔諸州府兩稅所科物非土地所宜者不得抑配六年詔諸倉塲受納所收頭子錢一半納官一半公用令監司與知州通判同支使頭子錢納官始於此止齋陳氏曰是歲令川峽人戸兩稅以上輸納錢帛每貫收七文每疋收十文絲綿一兩茶一斤稈草一束各一文頭子錢數始略見於此謹按咸平三年十月三司權判孫冕等奏天下請夏秋稅斛斗收倉耗例并夏秋稅斛斗疋帛諸般物色等收頭子錢遍令檢尋不見元定宣􅃯又按後唐天成二年戸部奏苖子一布袋令納錢八文三文倉司喫食補襯長興元年見錢每貫七文稈草每束一文盤纒其所收與開寳數同則頭子舊有之至此稍條約之耳康定元年三月三司劄子除利益梓䕫四路外餘路自今頭子錢並令納官頭子錢盡納官始於此熙寧二年十月提舉河北常平廣恵倉皮公弼請今來給納欲每貫石收五文足諸路依此則給納並收頭子錢始於此政和四年四月湖南轉運司奏應給應係省錢物許每貫石疋兩各收頭子錢五文乞専充補助直達綱之費增收錢始於此自增收之請起宣和六年閏三月發運判官盧宗原欲於淮浙江湖廣福九路應出納錢物每一月交收頭子錢一文充糴本靖康元年罷紹興五年四月總制司狀賦入之利莫大於雜稅茶鹽出納之間若每貫增頭子錢五文有益於國計専切措置財用所看詳係省錢物依節次指揮每貫共收二十三文省一十文作經制起發今相度將雜稅出納每貫收見錢上增作二十三文足除漕司并州縣舊得一十三文省經制一十文省餘入總制窠名十年七月應官司收支錢物量添頭子錢每貫一十文足至紹興十年諸司錢物不復分别並每貫收四十三文矣乾道元年十月復添收一十文足至今為定制八年詔今後民輸稅紬絹不滿疋者許計丈尺納價錢毋得以三戸五戸聚合成疋送納煩擾三月詔曰中國每租二十石輸牛革一準千錢西川尚存偽制牛驢死者革盡輸官宜蠲去之每民租二百石輸牛革一準錢千五百太平興國二年江南西路轉運使上言諸州蠶桑素少而金價頗低今折稅絹估小而傷民金估高而傷官金上等舊估兩十千今請估八千絹上等舊估疋一千今請估一千三百餘以次增損從之景徳五年知袁州何蒙上言本州二稅請以金折納上曰若是則盡廢耕農矣不許端拱元年詔納二稅於各路元限外可並加一月限元限見後唐天成年或值閏月其田蠶亦有旱晚令有司臨時奏裁納租官吏以限外欠數差定其罰淳化元年詔江南兩浙承偽制重賦流亡田廢者宜令諸州籍頃畝之數均其賦減十分之三以為定制召游民勸其耕種給復五年州縣厚慰撫之淳化四年詔曰户口之數悉載於版圖軍國所資咸出於租調近年賦稅減耗簿書糾紛州縣之吏非其人土地之宜不盡出小民固以多辟下吏緣而為姦乃有匿比舍而稱逃亡挾他名而冒耕墾征役不均於苦樂收斂未適於輕重宜示詢求以究情偽今諸路知州通判限詔到其如何均平賦稅招輯流亡恵䘏鰥窮窒塞姦倖及民間未便等事限一月附疾置以聞先時知封邱縣竇玭上言畿甸民苦稅重兄弟既壯乃析居其田畝聚稅於一家即棄去縣案所棄地除其租已而匿他舍及冒名佃作願一切勘責上頗聞其弊乃賞擢玭俾案察京畿諸縣田租玭専務苛刻以求課最民實逃亡者亦捜索於隣里親戚家益造新籍甚為煩擾凡數月罷之五年宋亳諸州牛多死官借錢令市牛有太子中允武允成獻踏犂不用牛以人力運之詔依其制造成以給民甚賴之五月詔曰作坊工官造弓弩用牛筋歲取於民吏督甚急或殺耕牛供官非務農重穀之意自今後官造弓弩其縱理用牛筋他悉以羊馬筋代之至道元年除兖州歲課民輸黄荆子茭芟十六萬四千八百圍因令諸道轉運使檢案部内無名配率如此類者以門悉蠲之六月詔曰近歲以來天災相繼民多轉徙田卒汙萊招誘雖勤逋逃未復宜申勸課之㫖更示蠲復之恩應州縣曠土並許民請佃為永業仍蠲三歲租三歲外輸二分之一州縣官吏勸民墾田之數悉書於印紙以俟旌賞開封府言京畿十四縣自今年二月以前民逃者一萬二百八十五戸訪聞多有坐家申逃及買逃戸桑土不盡輸稅以本戸挾佃詭名妄破官租及侵耕冒佃近居遙佃妄稱逃戸并以已租妄保於逃籍者詔殿中丞王用和等十四人分行檢視限一月許其首露不復收所隱之稅詔下歸業者甚衆二年以陳靖為勸農使靖時為直史館上言曰謹按天下土田除江淮湖湘浙右隴蜀河東等處地里夐逺雖加勸督未能遽獲其利古者强榦弱枝之法必先富實於内今京畿周環三二十州幅員數千里地之墾者十纔一二稅之入者又十無五六復有匿里舍而稱逃亡棄耕農而事游惰逃亡既衆則賦稅歲減而國用不充斂收科率無所不行矣游惰既衆則地利歲削而民食不足冦盜殺傷無所不至矣臣望擇大臣一人有深識逺略者兼領大司農事典領於中又於郎官中選才智通明能撫字役衆者為副執事於外皆自京東京西擇其膏腴未耕之處申以勸課臣又嘗奉使四方深見民田之利害汙萊極目膏腴坐廢亦加詢問頗得其由皆詔書累下許民復業蠲其租調寛以歲時然鄉縣之間擾之尤甚每一戸歸業則刺報所由朝耕尺寸之田暮入差徭之籍追胥責問繼踵而來雖蒙蠲其常租實無補於損益况民之流徙始由貧困或避私債或逃公稅亦既亡遯則鄉里檢其資財至於室廬什器桑棗材木咸計其直或鄉官用以輸稅或債主取以償逋生計蕩然還無所詣以茲浮蕩絶意歸耕如授臣斯任則望備以閑曠之田廣募游惰之輩誘之耕墾未計賦稅許令别置版圖便宜從事耕桑之外更課令益種雜木蔬果孳畜羊犬雞豚給授桑土潛擬井田營造室居使立保伍逮於養生送死之具慶弔問饋之資咸俾經營並令條制俟至三五年間生計成立戀家懷土即計戸定征量田輸稅以司農新附之名籍合計府舊收之簿書斯實敦本化人之宏量也若民力有不足官借緡錢或以市餱糧或以營耕具凡此給受委於司農比及秋成乃令償直依時折估納之於倉以成數開白戸部上覽之喜謂宰相曰靖此奏甚有理可舉而行之正朕之本意因召對奬諭令條對以聞靖又言逃民復業及浮客請佃者委農官勘驗以給授田土收附版籍州縣未得議其差役其乏糧種耕牛者令司農以官錢給借其田驗肥瘠為三品上田人授百畝中田百五十畝下田二百畝並五年後收其租亦只計百畝十收其二其室廬蔬韭及桑􅀥榆栁種藝之地每戸及十丁者給百五十畝七丁者百畝五丁七十畝三丁五十畝二丁三十畝除桑功五年後計其租餘悉蠲令常參官於幕職州縣中各舉所知一人堪任司農丞者分授諸州通判即領農田之務又慮司農官屬分下諸州或張皇紛擾其事難成望許臣領三五官吏於近甸寛鄉設法招擕俟規畫既定四方游民必盡麇至乃可推而行之呂端曰靖所立田制多改舊法又大費資用望以其狀付有司詳議乃詔鹽鐵使陳恕等共議請如靖之奏乃詔以靖為勸農使按行陳許蔡潁襄鄧唐汝等州勸民墾田以大理寺丞皇甫選光祿寺丞何亮副之選亮上言功難成願罷其事上志在勉農猶詔靖經度未㡬三司以為費官錢多萬一水旱恐遂散失其事遂寢按靖所言與元魏孝文時李安世之策略同皆是官取荒閑無主之田以授民但安世則倣井田立還授之法而此則有授無還又欲官給牛種等物貸之而五年後方收其租責其償此所以費多而難行然前乎此有至道元年之詔後乎此咸平二年之詔至道之詔勸誘之詞意懇切咸平之詔闗防之規畫詳明雖不必如靖所言張官置吏計口給田多費官錢而自足以收勸農之效矣眞宗咸平二年詔曰前許民戸請佃荒田未定賦稅如聞抛棄本業一向請射荒田宜令兩京諸路曉示應從來無田稅者方許請射係官荒土及逺年落業荒田候及五年官中依前􅃯於十分内定稅二分為永額如見在莊田土窄願於側近請射及舊有莊產後來逃移已被别人請佃礙勅無路歸業者亦許請射州縣别置籍抄上逐季聞奏其官中放收要用田土及係帳逃戸莊園有主荒田不得誤有給付如抛本業抱稅東西改易姓名妄求請射者即押歸本貫勘斷請田戸吏長常切安撫不得攪擾咸平六年廣西轉運使馮璉上言廉横賓白州民田雖耕墾未嘗輸送已命官檢括令盡出常租上曰遐方之人宜省徭賦亟命停罷大中祥符元年詔版籍之廣賦調方興尚慮有司有循舊式資一時之經費俾隣郡以均輸况稼穯之屢登宜庶民之從便宜蠲力役用示朝恩應諸路今年夏稅賦止於本州軍輸又詔河北罷兵其諸州賦稅止於本處送納詔夏稅諸州軍所納大小麥納外殘欠許以秋色斛斗折納四年詔諸州所須繁碎物折便以正稅折斛者皆罷大中祥符五年上以江淮兩浙路稍旱即水田不登乃遣使就福建取占城稻三萬斛分給三路為種擇民田之高仰者蒔之蓋旱稻也内出種法令轉運司掲榜示民其稻比中國者穂長而無芒粒差小不擇地而生六年知濱州呂夷簡請免稅河北農器諸路農器悉免輸算天禧四年詔諸路提㸃刑獄朝臣為勸農使使臣為副使取民籍視其差等不如式者懲革之勸䘏農民以時耕墾招集逃散檢括陷稅凡農田事悉領焉自景徳中置勸農之名然無職局至是始置局案鑄印給之開寳末天下墾田二百九十五萬三千三百二十頃六十畝至道二年墾田三百一十二萬五千二百五十一頃二十五畝天禧五年墾田五百二十四萬七千五百八十四頃三十二畝大凡租稅有穀帛金鐵物產四類穀之品七一曰粟二曰稻三曰麥四曰黍五曰穄六曰菽七曰雜子粟之品七曰粟小粟粱穀鹻床粟秫米黄米稻之品四秔米糯米水穀旱稻麥之品七曰小麥大麥青稞麥􅜿麥青麥白麥蕎麥黍之品三曰黍蜀黍稻黍穄之品三曰穄秫穄􅓱穄菽之品十六曰豌豆大豆小豆綠豆紅豆白豆青豆褐豆赤豆黄豆胡豆落豆元豆蓽豆巢豆雜豆雜子之品九曰脂麻床子稗子黄麻子蘇子苜蓿子萊子荏子草子布帛絲綿之品十一曰羅二曰綾三曰絹四曰紗五曰絁六曰紬七曰雜折八曰絲線九曰綿十曰布葛金鐵之品四一曰金二曰銀三曰鐵鑞四曰銅鐵錢物產之品六一曰六畜二曰齒革翎毛三曰茶鹽四曰竹木麻草芻菜五曰果藥油紙薪炭漆蠟六曰雜物六畜之品三曰馬羊猪齒革翎毛之品七曰象牙麂皮鹿皮牛皮狨鵝翎雜翎竹之品四曰竹箭簳竹箬葉蘆䕠木之品三曰桑橘楮皮麻之品五曰青麻白麻黄麻冬苧麻草之品五曰紫蘇茭紫草紅花雜草芻之品四曰草稻草穰茭草油之品三曰大油桐油魚油紙之品五曰大灰紙三抄紙芻紙小紙皮紙薪之品三曰木柴蒿柴草柴雜物之品十曰白膠香桐子麻鞋版瓦堵笪甆器苕菷麻剪藍淀草薦至道末歲收穀二千一百七十萬七千餘石錢四百六十五萬六千餘貫絹一百六十二萬五千餘疋絁紬二十七萬三千餘疋布二十八萬二千餘疋絲線一百四十一萬餘兩綿五百一十七萬餘兩茶四十九萬餘斤芻茭三千餘萬圍蒿二百六十八萬餘圍薪二十八萬餘束炭五十三萬餘秤鵝翎雜翎六十二萬餘莖箭簳八十九萬餘隻黄鐵三十萬餘斤此皆踰十萬之數者他物不復紀天禧末所收穀增一百七萬五千餘石錢增二百七十萬八千餘貫絹減一萬餘疋絁紬減九萬二千餘疋絲線減五十萬五千餘兩布增五萬六千餘疋綿減一百一十七萬五千餘兩茶增一百一十七萬八千餘斤芻茭減一千一百萬五十餘圍蒿減一百萬餘圍炭減五十萬四千餘秤鵝翎雜翎增一十二萬九千餘莖箭簳增四十七萬餘隻黄鐵增五萬餘斤又鞋八十一萬六千餘量麻皮三十九萬七千餘斤鹽五十七萬七千餘石紙十二萬三千餘幅蘆䕠二十六萬餘張大率名物約此其折變及移輸比壤者視當時所須焉歲賦其類有五曰公田之賦官莊屯田營田賦民耕而收其租者是也曰民田之賦百姓各得専之者是也曰城郭之賦宅稅地稅之類是也曰雜變之賦牛革蠶鹽食鹽之類隨其所出變而輸之者是也曰丁口之賦計丁率米是也其輸有常處而以有餘補不足則移此輸彼移近輸逺謂之支移其入有常物而一時所須則變而取之使其直輕重相當謂之折變其輸之遲速視收成早暮而寛為之期夏有至十月秋有至明年二月者所以紓民力也自祖宗承五代之亂王師所至首務去民疾苦無名苛細之斂剗革㡬盡尺縑斗粟無所增益一遇水旱徭役則蠲除倚閣殆無虚歲倚閣者後或歲凶亦輙蠲之而又田制不立畎畝轉易丁口隱漏兼并偽冒者未嘗考按故賦入之利視古為薄丁謂嘗曰二十而稅一者有之三十而稅二者有之蓋謂此也乾興元年十一月時仁宗已即位未改元詔限田公卿以下毋過三十頃衙前將吏應復役者毋過十五頃止於一州之内而任事者以為不便尋廢詳見差役門又禁近臣置别業京師又禁寺觀毋得市田天聖初詔民流積十年者其田聽人耕三年而後收賦減舊額之半後又詔流民能自復者賦亦如之既而又與流民期百司復業蠲賦役五年減舊賦十之八期盡不至聽他人得耕時天下生齒日蕃田野多闢獨京西唐鄧間尚多曠土唐州閑田尤多入草莽者十八九或謂徙戸實之或議以卒屯田或請廢為縣嘉祐中趙尚寛守唐州勸課勞來歲餘流民自歸及自他所至者二千餘户引水溉田或數萬頃詔增秩賜錢留再任寳元中詔諸州旬上雨雪著為令皇祐中作寳岐殿於苑中每歲詔輔臣觀刈穀麥罕復出郊矣皇祐中墾田二百二十八萬餘頃治平中四百四十餘萬頃皇祐治平三司皆有㑹計錄其間相去不及二十年而墾田之數增倍以治平數視天禧則猶不及而敘治平錄者以為此特計其賦租以知頃畝之數而賦租所不加者十居其七率而計之則天下墾田無慮三千餘萬頃矣蓋祖宗重擾民未嘗窮按故莫得其實姑著其可見者如此治平中廢田見於籍者猶四十八萬餘頃景祐時諫官王素言天下田賦輕重不等請均定而歐陽修亦言祕書丞孫琳嘗往洺州肥鄉縣與大理寺丞郭諮以千歩方田法括定名田願召二人者三司亦以為然且請於亳壽蔡汝四州擇尤不均者均之於是遣諮蔡州諮首括一縣得田二萬六千九百三十餘頃均其賦於民既而諮言州縣多逃田未可盡括朝廷亦重勞人遂罷自郭諮均稅之法罷論者謂朝廷徒恤一時之勞而失經逺之慮至皇祐中天下墾田視景徳增四十一萬七千餘頃而歲入九穀乃減七十一萬八千餘石蓋田賦不均故其弊如此其後田京知滄州均無棣田蔡挺知博州均聊城高唐田歲增賦穀帛之類無棣總千一百五十二聊城高唐總萬四千八百四十七既而或言滄州民以為不便詔如舊嘉祐時復詔均定命三司使包拯與呂居簡吳中復總之繼以命張掞呂公弼乃遣官分行諸路而祕書丞高本在遣中獨以為不可均已而復罷纔均數郡田而已天聖時貝州言民析居者例加稅謂之罰稅他州無此比請除之詔可自是州縣有言稅之無名若苛細者所蠲甚衆自唐以來民計田輸賦外增取他物復折為賦所謂雜變之賦也亦謂之沿納而名品煩細其類不一官司歲附帳籍並緣侵擾民以為患明道中因詔三司沿納物以𩔖并合於是三司請悉除諸名品併為一物夏秋歲入第分粗細二色百姓便之凡歲賦穀以石計錢以緡計帛以疋計金銀絲綿以兩計藳秸薪蒸以圍計他物各以其數皇祐中比景徳之數增四百四十一萬八千六百六十五治平中又増一千四百一十七萬九千三百六十四其以赦令蠲除以便百姓若逃移戸絶不追者景徳中總六百八十二萬九千七百皇祐中三十三萬八千四百五十七治平中一千二百二十九萬八千七百每歲以災害蠲減者又不在此蓋不可悉數云神宗熙寧元年京西轉運使謝景温言在法請田戸五年内凡科役皆免今汝州四縣如有客戸不過一二年便為舊戸糾決與之同役以此即又逃竄田土多荒乞仍舊法五年内無差科從之初趙尚寛高賦為唐州守流民自占者衆凡百畝起稅四畝而已稅輕而民樂輸境内無曠土至是轉運司以土闢稅百畝増至二十畝御史翟恩言恐再致轉徙宜戒飾量加以寛民詔從之唐鄧襄汝州自治平以後開墾歲増然未定稅額元豐中乃以所墾新田差為五等輸元祐元年罷之大觀三年復元豐法俄又罷之二年分遣諸路常平官使専領農田水利事應吏民能知土地種植之法陂塘圩垾堤堰溝洫之利害者皆得自言行之有效隨大小酬賞六年司農寺請立勸民種桑法天下民種桑柘毋得增賦先時河東等戸以桑之多寡為高下故植桑者少蠶織益微至和中詔罷之時又立法勸民栽桑有不趍令則倣屋粟里布為之罰民以為病既而詔罷之五年重修定方田法八月詔司農以均稅條約并式頒之天下以東西南北各千歩當四十一頃六十六畝一百六十歩為一方歲以九月縣委令佐分地計量隨陂原平澤而定其地因赤淤黑壚而辯其色方量畢以地及色參定肥瘠而分五等以定稅則至明年三月畢掲以示民一季無訟即書戸帖連莊帳付之以為地符均稅之法縣各以其租額稅數為限舊嘗取蹙零如米不及十合而收為升絹不滿十分而收為寸之𩔖今不得用其數均攤増展致溢舊額凡越額増數皆禁之若瘠鹵不毛及衆所食利山林陂塘路溝墳墓皆不立稅凡田方之角立土為埄植其野之所宜木以封表之有方帳有莊帳有田帖有戸帖其分煙析生典賣割移官給契縣置簿皆以今所方之田為正令既具乃以濟州鉅野尉王曼為指敎官先自京東路行之諸路倣焉六年詔土色分五等疑未盡下郡縣物其土宜多為等以期均當勿拘以五七年詔從鄧潤甫之請京東十七州選官四員各主其方分行郡縣各以三年為任又詔每方差大甲頭二人小甲頭三人同集方戸令各認歩畝方田官驗地色各勒甲頭方戸同定詔災傷路分權罷司農寺言乞下諸路及開封府界除秋田災傷三分以上縣權罷外餘候農隙河北西路提舉司言乞通一縣災傷不及一分勿罷元豐元年詔京東東路民訴方田未實其先擇詞訟最多一縣據各等第酌中立稅候事畢無訟即案以次縣施行五年開封府言方田法取稅之最不均縣先行即一州而及五縣歲不過兩縣今府界十九縣凖此行之十年乃定請歲方五縣從之其後必歲稔農隙乃行而縣多山林者或行或否七年京東東路提舉常平等事燕若古言沂登宻青州田訟最多乞擇三五縣先方田詔候豐歲推行八年帝知官吏奉行多致騷擾詔罷方田天下之田已方而見於籍者至是二百四十八萬四千三百四十有九頃云五年都水使者范子淵奏自大明抵乾寧跨十五州河徙地凡七千頃乞募人耕植從之先是中書言黄河北流今已淤斷恩冀下流退皆田土頃畝必多深慮權豪横占及舊地主未歸乞詔河北轉運司候朝廷専差朝臣同司職官同立標識方許受狀定租給授天下總四京一十八路田四百六十一萬六千五百五十六頃内民田四百五十五萬三千一百六十三頃六十一畝官田六萬三千三百九十三頃右此元豐間天下墾田之數比治平時所増者二十餘萬頃按前代混一之時漢元始定墾田八百二十七萬五千餘頃隋開皇時墾田一千九百四十萬四千餘頃唐天寳時應受田一千四百三十萬八千餘頃其數比之宋朝或一倍或三倍或四倍有餘雖曰宋之土宇北不得幽薊西不得靈夏南不得交趾然三方之在版圖亦半為邉障屯戍之地墾田未必多未應倍蓰於中州之地然則其故何也按治平㑹計錄謂田數特計其賦租以知其頃畝而賦租所不加者十居其七率而計之則天下懇田無慮三千餘萬頃蓋祖宗重擾民未嘗窮按故莫得其實又按食貨志言天下荒田未墾者多京襄唐鄧尤甚至治平熙寧間相繼開墾然凡百畝之内起稅止四畝欲増至二十畝則言者以為民間苦賦重再至轉徙遂不増以是觀之則田之無賦稅者又不止於十之七而已蓋田數之在官者雖劣於前代而遺利之在民多矣此仁厚之澤所以度漢唐歟二稅熙寧十年見催額五千二百一萬一千二十九貫石疋斤兩領團條角竿夏稅一千六百九十六萬二千六百九十五貫疋等内銀三萬一千九百四十兩錢三百八十五萬二千八百一十七貫斛斗三百四十三萬五千七百八十五石疋帛二百五十四萬一千三百疋絲綿五百八十四萬四千八百六十一兩雜色茶鹽油蜜子麴子麩藍麵紙椒苧黄蠟楠黄蘗柴甘草菜麻木茆鐵皮地灰麻鞋紅花瓦板百二十五萬五千九百九十二斤兩石角筒秤張塌條檐團束量口秋稅三千五百四萬八千三百三十四貫疋等内銀二萬八千一百九十七兩錢一百七十三萬三千二貫斛斗一千四百四十五萬一千四百七十二石疋帛一十三萬一千二十三疋綿五千四百九十五兩草一千六百七十五萬四千八百四十四束雜色茶椒鹽漆酥蠟蜜􅀥青鹽苧麻麴子油木柿板蒲瓦席麻皮翎柴鐵毛炭竹蒿木茅䕠茭鞋草蘆一百九十四萬四千三百一斤兩石口根束領莖條竿隻檐量開封府界田一十一萬三千三百三十一頃六十七畝官田五百一十六頃六十四畝見催額四百五萬五千八十七貫石疋兩束量夏稅九十九萬八千九百二十四貫石疋兩束量三秋稅三百五萬六千一百六十貫石束斤量兩京東路田二十五萬八千二百八十四頃六十畝官田八千九百九頃一畝見催額三百萬九百一貫疋兩石束量夏稅一百五十五萬五千八百八十貫疋兩石秋稅一百四十四萬五千二十一貫石束量京西路田二十萬五千六百二十六頃三十八畝官田七千二百八頃八十八畝見催額四百六萬三千八百七十貫石疋兩量角束夏稅一百四十四萬九百三十二貫石疋兩量角箇八秋稅二百六十二萬二千九百三十貫石疋束量兩箇河北路田二十六萬九千五百六十頃八畝官田九千五百六頃四十八畝見催額九百一十五萬二千貫石疋兩量斤束端夏稅一百三十九萬三千九百八十三貫石疋兩量斤千秋稅七百七十五萬八一百七貫疋石斤束陜府西路田四十四萬五千二百九十八頃三十八畝官田一千八百五頃二十二畝見催額五百八十萬五千一百一十四貫石疋端兩斗量口斤根束夏稅一百一十一萬一百五貫石疋端兩斗量口斤秋稅四百六十九萬五千九貫石疋端量束斤口根河東路田十萬二千二百六十七頃三十畝官田九千四百三十九頃三十畝見催額二百三十七萬二千一百八十七貫石疋量兩斤束夏稅四十萬三千三百九十五貫疋石兩量二秋稅一百九十六萬八千七百九十貫石疋量兩斤束淮南路田九十六萬八千六百八十四頃二十畝官田四千八百八十七頃一十三畝見催額四百二十二萬三千七百八十四貫石疋兩斤秤角量領束夏稅二百五十五萬八千二百四十九貫石疋兩斤秤角量秋稅一百六十六萬五千五百三十五貫石疋束領量兩浙路田三十六萬二千四百七十七頃五十六畝官田九百六十四頃四十二畝見催額四百七十九萬九千一百二十二貫石疋兩領夏稅二百七十九萬七百六十七貫石疋兩五秋稅二百萬八千三百五十貫石疋領江南東路田四十二萬一千六百四頃四十七畝官田七千八百四十四頃三十一畝見催額三百九十六萬三千一百六十九貫石疋兩斤束領夏稅二百萬四千九百四十七貫石疋兩斤束秋稅一百九十五萬八千二百二十二貫石疋領斤江南西路田四十五萬四百六十六頃八十九畝官田一千七百六十四頃五十七畝見催額二百二十二萬六百二十五貫疋石兩斤領夏稅七十四萬八千七百二十八貫疋石兩斤十秋稅一百四十七萬一千九百三七貫石斤領荆湖南路田三十二萬四千二百六十七頃九十六畝官田七千七百七十二頃五十九畝見催額一百八十一萬六千六百一十二貫石疋丳斤束莖兩夏稅四十四萬八千三百六十四貫石疋兩丳斤秋稅一百三十六萬八千二百四十八貫石疋斤束莖荆湖北路田二十五萬八千九百八十一頃二十九畝官田九百三頃七十八畝見催額一百七十五萬六千七十八貫石疋兩張量塌條束斤領竿隻夏稅五十一萬五千二百七貫石疋兩張量塌條秋稅一百三十六萬八千二百四十八貫石疋斤束莖福建路田一十一萬九百一十四頃五十三畝官田五頃三十七畝見催額一百一萬六百五十貫石疋斤夏稅一十八萬六千二百九十二貫石疋斤秋稅八十四萬四千三百五十八貫石成都路田二十一萬六千六十二頃五十八畝官田六十五頃一十九畝見催額九十二萬六千七百三十二貫石疋兩張斤擔夏稅七萬五千八百貫石疋兩張斤秋稅八十五萬九百三十二貫石疋束斤擔梓州路田為山崖難計頃畝見催額八十三萬四千一百八十七貫石疋兩斤擔束量夏稅二十三萬八千九百八十三貫石疋兩斤擔石秋稅五十九萬三千二百四貫疋束量斤擔利州路田一萬一千七百八十一頃五畝官田一千九十九頃八十四畝見催額六十六萬五千三百六貫石疋兩斤束等夏稅一十八萬六千七百二十四貫石疋兩斤秋稅四十七萬八千五百八十二貫石疋束斤䕫州路田二千二百四十四頃九十七畝官田二百二十三畝見催額一十四萬一千一百八十二貫石疋兩團斤角束夏稅七萬四千二百九貫石疋兩團斤角秋稅六萬六千八百七十三貫石疋束廣南東路田三萬一千一百八十五頃一十八畝官田二百七十頃七十二