事釋奠日丑前五刻行事仲春用丑時七刻仲秋用丑時一刻行事執事官各入就次掌饌者帥其屬實饌具畢贊禮者引初獻常服凡行事執事官皆贊禮者引升自東階凡行事執事官升降皆自東階㸃視陳設訖退就次各服其服學生先入就位贊禮者引三獻官詣廟南門外揖位立定新潭本注云據士相見禮主人揖入門右賓奉贄入門左疏曰凡門出以西為右以東為左入則以東為右以西為左故儀禮十七篇主人出入門皆由闑東賓出入皆由闑西此不易之論也今釋奠儀設揖位於廟門之外初獻位於闑西東靣亞終獻立於闑東西面誤也當以儀禮賓西主東之位為正贊禮者贊揖次引祝入殿下席位西向立贊者對立於三獻之前少定贊請行事凝安之樂作三成止贊唱者曰再拜初獻以下皆再拜贊者引祝升殿就位贊者引初獻詣盥洗位同安之樂作初獻升降行止皆作同安之樂至位北向立執罍者酌水初獻搢笏盥手帨手執笏升詣至聖文宣王神位前北向立樂止明安之樂作搢笏跪祝立於神位之左西向搢笏跪執事以幣授祝祝奉幣授初獻祝執笏興詣兖國公神位前北向立初獻受幣奠訖執笏俛伏興再拜次詣郕國公沂國公今咸淳三年升配郕國公沂國公位在兖國公下合增入亞獻終獻放此鄒國公神位前東向奠幣並如上儀樂止祝復位初獻降階樂作復位樂止少頃贊者引初獻再詣盥洗位樂作至位北向立搢笏盥手帨手執笏次詣爵洗位北向立搢笏洗爵拭爵以授執事者按王氏凡三執笏升殿詣至聖文宣王酌罇所南向立樂止成安之樂作執事者以爵授初獻初獻搢笏跪執爵執罇者舉羃執事者酌犧罇之汎齊初獻以爵授執事者興執笏詣至聖文宣王神位前北向立搢笏跪執事者以爵授初獻初獻執爵三祭酒奠爵執笏俛伏興樂止次引祝詣神位前東向直視捧版在左右搢笏跪讀祝文讀訖執笏興先詣配位前南向立初獻再拜成安之樂作次詣兖國公郕國公沂國公鄒國公神位前東向酌獻讀祝並如初儀俱復位初獻降階樂作復位樂止贊者引亞獻詣盥洗爵洗位升詣酌罇所立已上儀節及樂並同初獻酌象罇之醴齊亞獻以爵授執事者執笏詣神位前搢笏跪執爵三祭酒奠爵執笏俛伏興再拜次詣兖國公郕國公沂國公鄒國公神位前並如上儀降復位樂止贊者引終獻詣洗升殿酌獻並如亞獻之儀降復位終獻將升次引分獻官詣洗盥手帨手分獻殿内及兩廡諸神位朱文公云獻十哲者由東階升獻兩廡者由兩廡之階升搢笏跪執爵三祭酒奠爵執笏俛伏興再拜分獻訖俱復位贊者引初獻升階詣東序西向立執事者以爵酌正配位福酒合置於一爵持爵詣初獻之左北向立初獻再拜搢笏跪受爵祭酒啐酒奠爵執饌者以俎進減正配位胙肉合置一俎按王氏胙俎各减正脊横脊又以豆取黍稷飯合置一豆先以飯授初獻初獻受訖以授執饌者又以俎授初獻初獻受爵飲卒爵執事者受虚爵復於坫初獻執笏俛伏興再拜降復位贊禮者曰執事者各復位贊唱者曰賜胙再拜在位者皆再拜已飲福受胙者不拜贊禮者引初獻以下就望瘞位執事者取幣祝版寘於瘞坎贊禮者曰可瘞寘土半坎初獻以下詣南門外揖位立定贊禮者贊曰揖禮畢退有司監徹禮饌闔戸以降乃退朱子曰夫子像設置於椅上已不是又後置在臺座上到春秋釋奠却乃陳簠簋籩豆於地是甚義理某幾番説要塑宣聖坐於地上如設席模樣祭時却自席地此有甚不可處每說與人却道差異不知如何某記在南康欲於學中整頓宣聖不能得後説與交代云云宣聖本不當設像春秋祭時只設主祭可也今不可行只得設像坐於地方始是禮又曰孔子居中顔孟當列東坐西向七十二人先是排東廡三十六人了却方自西頭排起當初如此自升曾子於殿上下面趲一位次序都亂了此言漳州未知他處如何又云某經歴諸處州縣學都無一个合禮序釋奠散齋因云陳膚仲以書問釋奠之儀今學中儀乃禮院所頒多參差不可用如唐開元禮却好開寳禮只是全錄開元禮易去其帝號耳若政和五禮則甚錯今釋奠有伯魚而無子思又十哲亦皆参差仲弓反在上且如紹興中作七十二子贊只據唐爵號不知後來已經加封矣近嘗申明之又曰謁先聖拈香不是古禮拜進將捻香不當叩首只直上捻香了却出笏叩首而降拜朱子滄洲精舍釋菜儀前期獻官以下皆盛服今用深衣涼衫掌儀設神座用席先聖南向配位西向從祀位東西向設祝版於先聖位之右設香爐香案香合於堂中設祭器於神座前每位各左一籩今用漆盤實以脯果右一豆今用漆盤實以笋菜設犧罇一於堂上東南隅今以瓦罇代加以勺羃設燭四於堂中二於東西從祀位之前設洗二於東階之東盥洗在東爵洗在西卓一於洗東卓上箱二巾東爵西設獻官位於堂下北面分奠者二人次之諸生又次之皆北向西上及期獻官以下序立於東廊下掌儀帥執事者升堂實酒饌贊者一人引獻官升堂㸃閲降就堂下位分奠官及諸生各就位贊者一人離位少前再拜訖進立於主人之右西向曰再拜在位者皆再拜掌儀祝司罇者皆升掌儀立於東序西向祝立於阼階上西向司罇者立於罇南北向贊引獻官詣盥洗之南北向立盥手帨手升焚香再拜降再詣盥帨如初詣爵洗南北向立洗爵以授贊升詣罇所西向立贊以爵授獻官司罇舉羃酌酒獻官以爵授贊俱詣先聖前獻官北向跪贊跪授爵獻官執爵三祭奠爵於籩之間俛伏興少立祝詣獻官之左東向跪讀祝訖興復位獻官再拜次詣盥洗爵如初洗諸配位爵訖贊者以盤兼捧升酌詣配位如初儀但不讀祝獻官復位當獻官詣配位酌獻時贊者二人各引分奠官分行東西從祀禮盥洗以下並如配位之儀東先西後分奠訖復位在位者皆再拜退獻贊者分奠二人贊者二人祝掌儀者司罇文獻通考卷四十四
