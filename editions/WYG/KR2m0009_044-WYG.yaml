body:
  text: 文獻通考卷四十四鄱陽馬端臨貴與著學校考五祠祭褒贈先聖先師録後仁宗景祐元年詔釋奠用登歌陳暘樂書曰成周之制大胥春入學釋菜合舞秋頒學合聲故禮記文王世子凡釋奠必有合也有國故則否凡大合樂必遂養老又曰釋奠於先聖先師先老終之遂發咏焉登歌清廟下管象舞大武而已月令仲春上丁命樂正習舞釋菜葢學校之於天下禮樂之所自出小有釋菜而以食為主大有釋奠而以飲為主其習舞與聲而大合六代之樂一也北齊天子講畢以太牢釋奠孔子配以顔囘設軒架之樂六佾之舞唐開元中釋奠文宣王始用宮架之樂然孔子人臣也用軒架足以為禮用宮架則過矣宮架天子之制四面皆縣鐘磬備六律六呂如宮室之有牆故謂之宮架軒架諸侯之制三面縣去中吕蕤賔林鍾缺其一面如軒車之有藩故謂軒架圖見樂書聖朝春秋上丁釋奠於東序上戊釋奠於西序並設登歌之樂不用軒架而用判架判架只東西兩面縣而已南北皆缺又去黄鍾大呂應鍾也抑又不施於堂下而施於堂上於其庭又不設舞焉是有歌奏而無舞非古人習舞合樂之意釐而正之以廣禮樂之敎於天下實聖朝急務也皇祐三年詔兗州仙源縣自國朝以來世以孔氏子孫知縣事使奉承廟祀近嵗廢而不行非所以尊先聖也今後宜復以孔氏子弟充選至和二年詔封孔子後為衍聖公集賢殿學士劉敞言據祠部員外郎直集賢院祖無擇奏伏見至聖文宣王四十七代孫孔宗愿襲封文宣公乃是其人未死已賜諡矣臣竊觀前史孔子之後襲封者衆在漢魏則曰褒成褒聖宗聖在晉宋亦曰奉聖後魏曰崇聖北齊曰恭聖後周及隋封以鄒國唐初曰褒聖或為君或為侯為公為大夫使奉祭祀唯漢平帝追諡孔子為褒成宣尼公遂以均為褒成君至唐開元二十七年追諡為文宣王又以其後為文宣公是皆以祖之羙諡而加後嗣生而諡之不經甚矣欲乞明詔有司詳求古訓或封以小國或取尊儒褒聖之義别定羙號加於封爵著於令式使千古之下無以加於我朝之盛典也奉聖㫖送兩制詳議臣等謹按漢元帝初元元年以師孔霸為關内侯食邑八百戸號褒成君而霸上書求奉孔子祭祀元帝下詔曰其令師褒成君關内侯霸以所食八百户祀孔子及霸卒子福嗣福卒子房嗣房卒子莽嗣皆稱褒成君至平帝元始元年始更以二千户封莽為褒成侯而追諡孔子曰褒成宣尼公以此觀之則褒成者國也宣尼者諡也公爵者爵也褒成宣尼公猶曰河間獻王云耳葢推宣尼以為褒成祖非用褒成以為宣尼諡也唐世不深察此義而以褒成為夫子之諡因疑霸等號封褒皆襲其祖之舊耳故遂封夫子文宣王而爵其後文宣公考校本末甚失事理先帝既封泰山親祠闕里又加文宣以至聖之號則人倫之極致盛德之顯名盡在此矣尤非其子孫臣庶所宜襲處而稱之者也臣等以為無擇議是可用其文宣王四十七代孫孔宗愿伏乞改賜爵名若褒成奉聖之比上足以尊顯先聖有不可階之勢下不失優孔氏使得守繼世之業改唐之失法漢之舊傳曰必也正名又曰正稽古立事可以永年此之謂也英宗治平元年詔勿以孔氏子弟知仙源縣其襲封人如無親屬在鄉里令常任近便官不得逺去家廟京東提刑王綱乞慎重長民之官故有是詔神宗熙寧八年判國子監常秩等言本監宣聖神像舊用冕服九旒七十二賢二十一先儒並用朝服檢會唐開元中尊孔子為文宣王内出王者衮冕之服以衣之詳此則孔子之冕宜用天子之制十二旒孔子既用冕旒則七十二賢二十一先儒各依本爵用冕服今來所修殿屋已成見裝飾塑像欲乞改正下太常禮院詳定禮院檢會國朝文宣王廟自建隆三年詔廟門凖儀制令立㦸十六枝用正一品之禮太中祥符二年賜曲阜縣文宣王廟桓圭一從上公之制冕九旒服九章按衣服今王爵之服春秋釋奠則用中祠皆今朝之制也其兗國公顏子等皆以本朝郡國縣封爵緣古今禮制不一難以追用周之冕服宜如舊制依官品衣服令文宣王冕用九旒顔子已下各依郡國縣公侯伯正一品至正四品冠服制度庶合禮令從之元豐六年吏部尚書曾孝寛言孟軻有廟在鄒未加爵命詔封鄒國公七年禮部言乞以鄒國公同顔子配食宣聖茍况揚雄韓愈並從祀於左邱明等二十二賢之間從之封荀况蘭陵伯揚雄成都伯韓愈昌黎伯頒行天下學廟塑像春秋釋奠行禮容齊洪氏隨筆曰自唐以來相傳以孔門高弟顔淵至子夏為十哲故坐祀於廟堂上其後升顔子配享則進曾子於堂居子夏之次以補其闕然顔子之父路曾子之父㸃乃在廡下從祀之列子處父上神靈有知何以自安所謂子雖齊聖不先父食正謂是也又孟子配食與顔子並而其師子思子思之師曾子亦在下此兩者於禮於義實為未然特相承既久莫之敢議耳相臺岳氏愧郯録曰蘇文忠公軾集私試策問曰古者坐於席故籩豆之長短簠簋之髙下適與人均今土木之像既已巍然於上而列器皿於地使鬼神不享則不可知若其享之則是俯伏匍匐而就也珂按今世國學郡縣學禮殿坐像皆正席南向顔孟而下列侍所措設與前不殊私竊疑之慶元己未朱文公熹始作白鹿禮殿塑像説其文曰古人之坐者兩膝著地因反其蹠而坐於其上正如今之胡跪者其為肅拜則又拱兩手而下之至地也其為頓首則又以頭頓手上也其為稽首則又卻其手而以頭著地亦如今之禮拜者皆因跪而益致其恭也故儀禮曰坐取爵曰坐爵禮記曰坐而遷之曰一坐再至曰武坐輊右軒左老子曰坐進此道之𩔖凡言坐者皆謂跪也漢文帝與賈生語不覺膝之前於席管寧坐不箕股榻當膝處皆穿皆其明驗然記又云授立不跪授坐不立莊子又云跪坐而進之則跪與坐又自有少異處疑跪有危義故兩膝著地伸腰及股而勢危者為跪兩膝著地以尻著蹠而稍安者為坐也又詩云不遑啓居而傳以啓為跪爾雅以妥為安而跪以為安定之坐夫以啓對居而訓啓為跪則居之為坐可見以妥為安定之坐則跪之為危坐亦可知盖兩事相似但一危一安為小不同耳至於拜之為禮亦無所考但杜子春説太祝九拜處解竒拜皆當齊屈兩膝如今之禮拜明矣凡此三事書傳皆無明文亦不知其自何時而變而今人有不察也頃年屬錢子言作白鹿禮殿欲據開元禮不為塑像而臨祭設位子言不以為然而必以塑像為問予既略考禮如前之云又記少時聞之先人云嘗至鄭州謁列子祠見其塑像席地而坐則亦并以告之以為必不得已而塑像則當放此以免於蘇子俯伏匍匐之譏子言又不謂然會予亦辭浙東之節遂不能强然至今以為恨也其後乃聞成都府學有漢時禮殿諸像皆席地而跪坐文翁猶是當時琢石所為尤足據信不知蘇公蜀人何以不見而云爾也及楊方子直入蜀帥幕府因使訪焉則果如所聞者且為寫放文翁石像為土偶以來而塑手不精或者猶意其或為加趺也去年又屬蜀􅈇楊玉休子羙今乃并得先聖先師三像木刻精巧視其坐後兩蹠隱然見於帷裳之下然後審其所以坐者果為跪而亡疑也惜乎白鹿塑像之時不得此證以曉子言使東南學者未得復見古人之像以革千載之謬為之喟然太息姑記本末寫寄洞學諸生使書而揭之廟門之左以俟來考焉又注其下曰老子云雖有拱璧以先駟馬不如坐進此道盖坐即跪也進猶獻也言以重寳厚禮與人不如跪而告之以此道也今説者乃以為坐禪之意誤也然後古意遺像粲然可考而知珂按符子曰太公涓釣於隐溪跽而隠崖不餌而釣仰咏俯吟暮則釋竿其膝所處石皆若臼其跗觸崕若路此尤足以驗前説或謂國朝景靈宮設塑之制亦坐於椅所不當輕議珂竊以為原廟用時王之禮裀席器皿皆與今同則其為像反不當以泥古矣珂在朝時以攝奉常丞奉祠太廟得立阼階見室中之用亦不以髙几葢古今器服各適其宜以便於事是亦求神之義也哲宗元祐元年朝議大夫孔宗翰辭司農少卿請依家世例知兗州以奉孔子祀從之宗翰又言孔子後襲封疏爵本為侍祠今乃兼領他官不在故郡請自今不使襲封之人更兼他職終身使在鄉里事下禮部太常寺禮官議欲依所請釐定典禮命官以司其用度立學以訓其子孫襲封者專主祠事增賜田百頃供祭祀之餘許均贍族人其差墓户並如舊法賜書置敎授一員敎諭其家子孫鄉鄰或願從學者聼改衍聖公為奉聖公及刪定家祭冕服等制度頒賜詔可六年帝幸太學行釋奠禮一獻再拜元符元年吏部言請下兗州於孔子家衆議承襲之人不必子繼所貴留意祖廟敦睦族人從之徽宗崇寧元年詔追封孔鯉為泗水侯孔伋為沂水侯三年太常寺言國朝祀儀諸壇祠祭正位居中南面配位在正位之東南西面若兩位亦為一列以北為上其從祀之位又在其後今國子監顔子孟子配享之位即與閔子騫等從祀之位同作一列雖坐次少出而在文宣王帳座之後於配食之禮未正請改正顔子而下從享位次為圖頒示天下從之紹熙間項安世為越州教授告先師文曰常平使者朱熹為安世言開元禮先聖東向先師南向故三獻官皆西向則稽古尚右也今祀典正位南向配位西向三獻官猶西向則兼而用之也獨此府廟學有司以私意復古使配位皆東向此古者先聖之位也拂今之法戾古之義先師其不妥於此也安世用惕然不敢寧處謹擇日奉安先師於西向故位不敢不告惟先師鑒之六月詔以王安石配享孔子廟設位於鄒國公之次仍令國子監圖其像頒之天下大觀元年大司成强淵言考禮經士始入學釋菜請自今每嵗貢士始入辟雍並以元日釋菜於先聖從之二年詔躋子思從祀四年詔先聖廟用㦸二十四文宣王執鎮圭並如王者之制議禮局言文宣王自開元追諡之初則内出王者衮冕之服以衣之樂用宮架其禮制盖嘗增崇矣國朝會要國子監神像舊用冕九旒服九章而不載其更易之端崇寧四年八月詔從國子司業蔣静之請改用冕十二旒服九章而又圖繪頒之天下郡邑其執圭立㦸乞並從王者制度又言弟子公夏首后處公肩定顔祖鄔單罕父黒秦商原抗樂欬亷絜從祀文宣王考之史記皆有其名唐開元禮亦載祀典乞皆贈侯爵使與祭享從之九月十二日詔公夏首封鉅平侯后處膠東侯公肩定梁父侯顔祖富陽侯鄔單聊城侯罕父黒祁鄉侯秦商馮翊侯原抗樂平侯樂欬建城侯廉絜胙城侯政和元年六月二十七日太常寺奉詔孔子高弟子所封侯爵與宣聖名同失弟子尊師之禮今乞以瑕邱侯曾參改封為武城侯宛邱侯顓孫師為潁川侯龔邱侯南宮縚為汶陽侯楚邱侯司馬耕為雒陽侯頓邱侯琴張為陽平侯瑕邱伯左邱明為中都伯龔邱伯穀梁赤為雒陵伯楚邱伯戴聖為考城伯從之政和三年封王安石為舒王配享王雱為臨川伯從祀五年太常寺言兗州鄒學孟子廟詔以樂正子配享公孫丑以下從祀皆擬定其封爵樂正子克利國侯公孫丑壽光伯萬章博興伯浩不害東河伯孟仲子新泰伯陳臻蓬萊伯充虞昌樂伯屋廬連奉符伯徐辟僊源伯陳代沂水伯彭更雷澤伯公都子平陰伯咸邱䝉須城伯髙子泗水伯桃應膠水伯盆城括萊陽伯季孫豐城伯子叔承陽伯從之欽宗靖康元年右諌議大夫楊時言王安石學術之謬乞追奪王爵毁去配享之像詔王安石依鄭康成例從祀髙宗紹興八年詔衢州於係官田内撥賜五頃賜主奉先聖祠事襲封衍聖公孔玠以孔氏渡江子孫隔絶林廟故賜田以奉先聖烝嘗也十三年上幸學止輦大成殿内外入幄羣臣班列於庭上出幄升東階跪上香執爵三祭酒再拜如常儀詳見幸學門二十四年以文宣王五十代孫搢