body:
  text: 文獻通考卷八十三鄱陽馬端臨貴與著郊社考十六祀山川虞舜嵗二月東廵狩至于岱宗柴岱宗泰山為四嶽所宗故名柴燔柴祭天告至望秩于山川東嶽諸侯境内名山大川如其秩次望祭之謂五嶽牲禮視三公四瀆視諸侯其餘視伯子男五月南廵狩至于南嶽如岱禮南嶽衡山八月西廵狩至于西嶽如初西嶽華山十有一月朔廵狩至于北嶽如西禮北嶽恒山周制小宗伯兆五帝于四郊四望亦如之兆為壇之營域鄭司農云四望道氣出入又云日月星海元謂四望五嶽四鎮四瀆疏曰鄭司農云四望日月星海而後鄭不從者禮無祭海之文又書望秩于山川是山川稱望言四望者不可一徃就祭當四向望而為壇遥祭之故稱四望也司服王祀四望則毳冕毳罽衣也元謂毳畫虎蜼謂宗彛也其衣三章裳二章凡五也罽罽居例反之疏曰云罽衣也者按爾雅云毛氂謂之則續毛為若今之毛布但此毳則宗彛謂虎蜼而先鄭以為罽衣於義不可故後鄭不從也又知登火於宗彛者宗彛則毳也若不登火在於宗彛上則毳是六章之首不得以毳為五章之首故知登火於宗彛取其明也春官大司樂乃奏姑洗歌南吕舞大㲈以祀四望㲈上昭反之姑洗陽聲第三南吕為合四望五嶽四鎮四瀆在疏曰以大宗伯五嶽在社稷下山川上此文四望亦社稷下山川上故知四望是五嶽四鎮四瀆也樂詳見祭物條牧人望祀各以其方之色牲毛之毛之取純毛也也疏曰以其言望與四望義同故知是四望望五嶽等地官通典曰牲用少牢各随方色幣亦随方色五獻察察明也察䟽曰謂祭四望山川其神既尊神靈明又曰毳冕五章祀四望山川故知五獻祭四望山川也及禮器為通典曰其祭之嶽鎮則升血為始次薦豆籩爓肉朝踐大祭用腥則次祀用爓也爓謂沈肉於湯故鄭云湯肉為爓以時王酌盎齊以獻所謂朝踐之獻也大宗伯亞獻亦盎齊至熟王酌清酒以獻尸亞者亦清酒所謂饋食之獻通前四獻也尸食訖王又酌清酒以酳尸凡五獻也男巫掌望祀望衍授號旁招以茅衍依注音延衍杜子春云望衍謂祭也授號以所祭之名號授之旁招以茅招四方之所望祭者元謂衍讀為延聲之誤也望祀謂有牲粢盛者延進也謂但用幣致其神二者詛祝所授類造攻説禬禜之神號男巫為之招疏見祈禳條黄氏曰望祀四望之類是望衍小祭祀如四方百物之類是衍之言多也夫既多矣不止則為黷秦漢以來滛祀何可數計鄭康成改為延協於大小之衍祭其曰延而進之獨用幣義亦通大祝國將有事于四望則前祝注䟽見因祭征伐條陳氏禮書曰天子四望逹於四方魯三望泰山河海而已書曰海岱及淮惟徐州諸侯之望皆其境内之名山大川也望雖以名山大川為主而其實兼上下之神故詩於柴望言懐柔百神及河喬嶽周禮於望皆言祀而不言祭又典瑞四望與山川異玉大司樂四望與山川異樂左氏曰望郊之細也又曰望郊之屬也公羊曰方望之事無所不通則望兼上下之神可知矣鄭司農釋大宗伯曰四望日月星海杜預釋左傳曰望祀分野之星及封内山川許慎曰四望日月星辰河海大山其説蓋有所受之也鄭康成釋大宗伯曰四望五嶽四瀆釋大司樂又兼之以司中司命風伯雨師釋舞師又以四望為四方其言異同不可考也望之禮有二而其用不一男巫掌望祀望衍鄭氏讀衍為延謂望祀有牲與粢盛望衍用幣致神而已然鄭氏於大祝衍祭亦以為延祭禮文殘缺不可考也望祀或設於郊天之後或設於廵狩之方或旅於大故之時則望有常有不常之祀也崔靈恩謂四望之祭嵗各有四不知何據然也望祀其兆四郊其牲各放其方之色其樂姑洗南吕大㲈其玉兩圭有邸其服毳冕其位茒以辨之而植表於其中周禮所謂旁招以茒晉語所謂置茒蕝設望表是也白虎通謂周公祭泰山以召公為尸其言無所經見楊氏曰愚按四望之説惟鄭氏注小宗伯云四望五嶽四鎮四瀆其説為是蓋言望祭天下之名山大川也所謂懐柔百神者言合祭四方名山大川之神故云百神非必兼上下之神也舜即位類于上帝禋于六宗望于山川徧于羣神類也禋也望也各是一事非望兼上下之神可知也傳僖公三十一年夏四月四卜郊不從乃免牲龜曰卜不從不吉也卜郊不吉故免牲免猶縱也猶三望三望分野之星國中山川皆因郊祀望而祭之魯廢郊天而修其小祀故曰猶猶者可止之辭且分夫問反疏曰公羊傳曰三望者祭泰山河海魯境不及於河禹貢海岱及淮惟徐州徐即魯地三望謂淮海岱也賈逵服䖍以為三望分野之星國中山川今杜亦從之左氏曰非禮也望郊之細也不郊亦無望可也公羊子曰天子祭天諸侯祭土天子有方望之事無所不通諸侯山川有不在其封内者則不祭也三望者何望祭也然則曷祭祭泰山河海曷為祭泰山河海山川有能潤於百里者天子秩而祭之觸石而出膚寸而合側手為膚按指為寸不崇朝而徧雨乎天下者惟泰山爾河海潤於千里猶者何通可以巳也何以書譏不郊而望也又三正記曰郊後必有望成王盟諸侯於岐陽岐山之陽楚為荆蠻荆州之蠻置茒蕝設望表與鮮牟守燎置立也蕝謂束茒而立之所以縮酒望表謂望祭山川立木以為表表其位也鮮牟東夷國燎庭燎也國語晉語楚昭王曰三代命祀祭不越望江漢睢漳楚之望也睢七餘反晉詳見因祭疾而禱條並春秋昭公七年左氏傳韓宣子曰寡君寢疾走羣望見疾而禱條病朱子曰諸侯祭山川也只祭得境内底如楚昭王卜云河為祟時諸大夫欲去祭河昭王自言楚之分地不及於河河非所以為祟孔子所以美之云楚昭王知大道矣其不失國也宜哉這便見得境外山川與我不相關自不當祭之小宗伯兆山川邱陵墳衍各因其方順其所在職疏曰按大司徒地有十等此不言林澤原隰亦順所在可知故畧不言也春官山虞若祭山林則為主而修除且蹕為主主辨䕶之也修除治道路塲壇四疏曰此山林在畿内王國四方各依時而祭云則為主者謂主當祭事者也云修除者謂掃除糞灑云且蹕者且復蹕止行人也按中候握河紀堯受河圖云帝立壇磬折西向禹進迎舜契陪位稷辨䕶注云辨䕶者供時用相禮儀則此云辨䕶者亦謂供時用相禮儀者也塲謂墠即除地之處壇神位之所也地官典瑞璋邸射以祀山川射食亦反以璋有邸而射取殺於四望鄭司農云射剡也剡冉反或因冉反疏曰此祀山川謂若宗伯云兆山川邱陵各於其方亦隨四時而祭則用此璋邸以禮神春官冬官玉人之事璋邸射素功以祀山川注曰邸射剡而出也鄭司農云素功無琢飾也疏云以祀山川者謂四望之外所有山川皆是云邸射剡而出也者向上謂之出半圭曰璋璋首邪却之今於邪却之處從下向上總邪却之名為剡而出司服王祀山川則毳冕注疏見四望禮大司樂乃奏㽔賔歌函鍾舞大夏以祭山川㽔人誰反函胡南反疏㽔賔陽聲第四函鍾為之合曰應鍾之六三上生㽔賔之九四是陽聲第四也㽔賔午之氣也五月建焉而辰在鶉首函鍾未之氣也六月建焉而辰在鶉火是函鍾之合也詳見樂考大宗伯以血祭祭五嶽以貍沈祭山林川澤疏曰云隂祀自血起者對天為陽祀自煙起貴氣臭同也云五嶽東曰岱宗南曰衡山西曰華山北曰恒山中曰嵩髙山者此五嶽所在據東都地中為説按大司樂云四鎮五嶽崩注云華在豫州嶽在雍州彼據鎬京為説彼必據鎬京者彼據災異若據洛邑則華與嵩髙並在豫州其雍州不見有災異之事故注有異也按爾雅江河淮濟為四瀆為定五嶽不定者周國在雍州時無西嶽故權立呉嶽為西嶽非常法爾雅不載以東都為定故爾雅載之也若然此南嶽衡按爾雅霍山為南嶽者霍山即衡山故地理志楊州霍山為南嶽者山今在廬江彼霍山與冀州霍山在嵩華者别云不見四瀆四瀆者五嶽之匹或省文者五嶽四瀆相對若天地故設經省文惟見五嶽也若然下云貍沈祭山林川澤五嶽歆神雖與社稷同用血五嶽四瀆山川之類亦當貍沈也云祭山林曰貍川澤曰沈順其性之含藏者經貍沈祭山林川澤總言不析别而説故鄭分之以其山林無水故貍之川澤有水故沈之是其順性之含藏也春官楊氏曰以血祭祭五嶽是四望事四望乃天子之禮也然其方之諸侯亦所當祭如魯祭泰山是也通典曰黄帝祭於山川與為多焉與比也祭祀山川黄帝為多虞氏秩於山川徧於羣神周制四坎壇祭四方四方即謂山林川谷邸陵之神祭山林邱陵於壇川谷於坎每方各為坎為壇牲用少牢各随方色幣亦随方色其祭之嶽鎮則升血為始四瀆則沈血為始也爾雅祭山曰庪縣祭川曰浮沈疏曰庪縣祭山之名庪謂貍藏之大宗伯云以貍沈祭山林川澤鄭注云祭山林曰貍是也縣謂縣其牲幣於山林中郭云或庪或縣置之於山是也又山海經曰縣以吉玉是也浮沈郭云投祭水中或浮或沈大宗伯云以貍沈祭山林川澤鄭注云祭川澤曰沈順其性之含藏也庪九委反又九偽反徐居綺反字亦作庋同祭夏官小子凡沈辜候禳飾其牲注曰鄭司農云沈謂川辜謂磔牲以祭也詳見祈禳條舞師掌教兵舞帥而舞山川之祭祀疏曰云掌教兵舞謂教野人使知之國有祭山川則舞師還帥領徃舞山川之祀詳見祭物樂舞鬯人掌共秬鬯而飾之注疏見社稷禮凡山川用蜃故書蜃或為謨杜子春云謨當為蜃鄭司農云謨器名漆罇也元謂蜃畫為蜃形蚌曰合漿尊之象蚌歩項反曰合音含本亦作含疏曰云蜃畫為蜃形者亦謂漆畫之云蚌曰合漿尊之象者蚌蛤一名含漿含漿則是容酒之類故畫為蜃而尊名也五獻察謂祭四望山川見註疏及通典五獻並四望孟春命祀山林川澤犧牲毋用牝為傷妊生之類仲冬天子命有司祈祀四海大川名原淵澤井泉順其徳盛之時祭之也今月令淵為深季冬乃畢山川之祀月令天子祭天下名山大川五嶽視三公四瀆視諸侯視視其牲器之數餘疏曰按夏傳云五嶽視三公四瀆視諸侯其山川視伯小者視子男鄭注云謂其牲幣粢盛籩豆爵獻之數非謂尊卑按周禮上公饔餼九牢飱五牢饗禮九獻豆四十侯伯饔餼七牢飱四牢饗禮七獻豆三十有二子男饔餼五牢飱三牢饗禮五獻豆二十有四又五等諸侯膳皆太牢祭亦太牢簋皆十有二祭四望山川用毳冕鄭注禮器五獻察謂祭四望山川也又侯伯無别三公與子男同今此王制云五嶽視三公四瀆視諸侯則三公尊於諸侯夏傳云四瀆視諸侯其餘山川視伯小者視子男是伯與侯别今鄭注此云視視其牲器又注夏傳謂其牲幣粢盛籩豆爵獻之數參驗上下並與周禮不同不可强解合之為一此王制所陳多論夏殷之制夏傳所説又非周代之禮鄭之所註者當據異代法也此經云四瀆視諸侯夏傳視諸侯之下云其餘山川視伯小者視子男則此諸侯謂是侯爵者不得總為五等諸侯諸侯祭名山大川之在其地者魯人祭泰山晉人祭河是也王制曲禮天子諸侯祭山川疏曰祭山川者周禮兆五帝於四郊四望四類亦如之也祭山川者王制云在其地則祭之亡其地則不祭是也楊氏日舜望秩於山川秩序也以次序而祭之五嶽視三公四瀆視諸侯特言其禮有隆殺輕重爾注疏拘於牲幣粢盛籩豆爵獻之數失於太泥遂至於不可强解不必然也傳五嶽者何謂也泰山東嶽也霍山南嶽也華山西嶽也常山北嶽也嵩髙山中嶽也五嶽何以視三公能大布雲雨焉能大斂雲雨焉雲觸石而出膚寸而合不崇朝而雨天下施徳博大故視三公也四瀆者何謂也江河淮濟也四瀆何以視諸侯能蕩滌垢濁焉能通百川於海焉能出雲雨千里焉為施甚大故視諸侯也山川何以視子男也能出物焉能潤澤物焉能生雲雨為恩多然品類以百數故視子男也書曰禋于六宗望秩于山川徧于羣神矣説苑三王之祭川也皆先河而後海疏曰言三王祭百川之時皆先祭河而後祭海也學記晉人將有事於河必先有事於惡池惡依註音呼池大河反惡當為呼聲之誤也呼池嘔夷并州川池嘔烏侯反疏曰有事於河謂祭河也必先告惡小川從小而祭也先告從祀者然後祭河也呼池嘔夷并州川夏官職方文齊人將有事於泰山必先有事於配林配林林名是疏曰謂祭泰山也先告配林泰山之從祀者也故先告從祀然後祭泰山此皆積漸從小至大之義也禮器季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎女音汝禮朱子曰旅祭名泰山山名在魯地諸侯祭封内山川季氏祭之僭也冉有孔子弟子名求時為季氏宰救謂救其陷於僭竊之罪嗚呼嘆辭言神不享非禮欲季氏知其無益而自止又進林放以厲冉有也祭問季氏旅於泰山一叚朱子曰天子祭天地諸侯其國之山川只緣是他屬我故我祭得他他若不屬我則氣便不與之相感如何祭得他因舉太子申生秦將祀子事秦始皇即帝位三年東游海上行禮祠名山川及八神求仙人羡門之屬應劭曰羡門名子髙古仙人也八神將自古而有之或曰太公以來作之齊所以為齊以天齊也蘇林曰當天中央齊也師古曰謂其衆神異如天之腹齊也其祀絶莫知起時八神一曰天主祠天齊天齊淵水居臨菑南郊山下下者師古曰下下謂最下也臨菑城南有天齊水五泉並出蓋謂此也二曰地主祠泰山梁父蓋天好隂祠之必於髙山之下畤命曰畤師古曰名其祭處曰畤也地貴陽祭之必於澤中圜邱云三曰兵主祠蚩尤蚩尤在東平陸監鄉齊之西境也師古曰東平陸縣名也監其縣之鄉名也四曰隂主祠三山師古曰三山即下所謂三神山五曰陽主祠之罘山韋昭曰之罘山在東萊腄師古曰罘音浮腄音直瑞反六曰月主祠之萊山韋昭曰在東萊長廣也皆在齊北並渤海師古曰並音歩浪反七曰日主祠盛山盛山斗入海韋昭曰盛山在東萊不夜縣斗入海也師古曰斗絶也盛音成最居齊東北陽以迎日出云八曰四時主祠琅邪在齊東北蓋嵗之所始師古曰山海經云琅邪臺在渤海間謂臨海有山形如臺也皆各用牢具祠而巫祝所損益圭幣雜異焉師古曰言八神牲牢皆同而圭幣各異也昔三代之居皆河洛之間師古曰謂夏都安邑殷都朝歌周都洛陽故嵩髙為中嶽而四嶽各如其方四瀆咸在山東至秦稱帝都咸陽則五嶽四瀆皆并在東方自五帝以至秦迭興迭衰名山大川或在諸侯或在天子其禮損益世殊不可勝記師古曰代代殊異故不可盡記及秦并天下令祠官所常奉天地名山大川鬼神可得而序也於是自崤以東名山五大川祠二師古曰崤即今之陜州二崤也曰太室太室嵩髙也恒山泰山會稽湘山水曰泲曰淮師古曰泲音子禮反此本濟水之字春以脯酒為嵗禱因泮凍服䖍曰解凍也師古曰泮音普半反秋涸凍師古曰涸讀與沍同沍凝也音十故反春則解之秋則凝之春秋左氏傳曰固隂沍寒禮記月令曰孟冬行春令則凍閉不宻冬塞禱祠師古曰塞謂報其所祈也音先代反其牲用牛犢各一牢具圭幣各異自華以西名山七名川四曰華山薄山薄山者襄山也師古曰説者云薄山在河東一曰在潼關北十餘里而此志云自華以西者則今閿鄉之南山連延西山並得華山之名嶽山岐山呉山鴻冡瀆山瀆山蜀之岷山也師古曰周禮職方氏雍州其山曰嶽爾雅亦云河西曰嶽説者咸云嶽即呉嶽也今志有嶽山又有呉山則呉嶽非一山之名但未詳嶽之所在耳徐廣云嶽山在武功據地理志武功但有垂山無嶽山也岐山即在今之岐山縣其山兩岐俗呼為箭栝嶺呉山在今隴州呉山縣鴻冡釋在下岷山在湔氐道水曰河祠臨晉師古曰即今之同州朝邑縣界沔祠漢中師古曰沔漢水之上名也漢中今梁州是也沔音彌善反湫淵祠朝那蘇林曰湫淵在安定朝那縣方四十里停水不流冬夏不增不減不生草木音將蓼反在涿郡遒縣師古曰此水今在涇州界清澈可愛不容穢濁或有諠汚輙興雲雨土俗亢旱每於此求之相傳云龍之所居也天下山川隈曲亦徃徃有之湫音子由反江水祠蜀亦春秋泮涸禱塞如東方山川而牲亦牛犢牢具圭幣各異而四大鴻冢岐呉嶽皆有嘗禾孟康曰以新榖祭之陳寳節來祠服䖍曰陳寳神應節來也其河加有嘗醪此皆雍州之域近天子都故加車一乘駵駒四㶚滻灃澇涇渭長水皆不在大山川數師古曰㶚滻出藍田灃澇出鄠長水者言其源流長也澇音勞以近咸陽盡得比山川祠而無諸加師古曰加謂車及駵駒之屬汧洛二淵鳴澤蒲山嶽壻山之屬為小山川亦皆禱塞泮涸祠禮不必同諸此祠皆太祝常主以嵗時奉祠之至如他名山川諸神及八神之屬上過則祠去則已漢髙祖初悉召故秦祀官復置太祝太宰如其故儀又令河巫祠河於臨晉文帝時始名山大川在諸侯諸侯祝各自奉祠天子官不領及齊淮南國廢令太祝盡以嵗時致禮如故明年廣增諸祀壇塲珪幣河湫漢水玉加各二武帝元狩元年濟北王以為天子且封禪上書獻泰山及其旁邑天子以他縣償之常山王有罪􅞳師古曰􅞳與遷同天子封其弟真定以續先王祀而以常山為郡然後五嶽皆在天子之邦歐陽氏集古録漢西嶽華山廟碑文字尚完可讀其述自漢以來云髙祖初興改秦滛祠太宗承循各詔有司其山川在諸侯者以時祠之孝武皇帝修封禪之禮廵省五嶽立宫其下宫曰集靈宫殿曰存僊殿門曰望僊門中宗之世使者持節嵗一禱而三祠後不承前至於亡新寖用邱墟建武之元事居其中禮從其省但使二千石嵗時徃祠自是以來百有餘年所立碑石文字磨滅延熹元年𢎞農太守袁逢修廢起頓易碑飾闕會遷京兆尹孫府君到欽若嘉業遵而成之孫府君諱璆其大畧如此所謂集僊宫者他書皆不見惟見此碑則余之集録不為無益矣按古者天子祭四望五嶽四瀆其大者也然王畿不過千里千里之外則皆諸侯之國所謂嶽者豈必在畿内而後祭之如舜都蒲坂而一嵗廵五嶽俱有望秩之禮是也始皇雖併六國而禮典廢墜所祠祭山川皆因其游觀所至處與封禪求仙則及之而其領之祠官以嵗時致祭且雜以滛祠者大率多秦中山川也至漢則名山大川之在諸侯國者不領於天子之祠官必俟齊淮南常山之國廢及濟北王獻地而後舉五嶽之祭俱非古義也元封元年三月上幸緱氏禮登中嶽太室從官在山上聞若有言萬嵗云問上上不言問下下不言廼令祠官加增太室祠禁毋伐其山木以山下戸凡三百封崈髙為之奉邑獨給祠復無有所與詳見封禪門五年上廵南郡至江陵而東登禮灊之天柱山灊音潛廬江縣也天柱山在焉武帝以天柱山為南嶽號曰南嶽浮江自潯陽出樅陽過彭蠡禮其名山大川北至琅邪並海上四月至奉髙修封焉宣帝神爵元年制詔太常夫江海百川之大者也今闕焉無祠其令祠官以禮為嵗事言每嵗常祠之以四時祠江海雒水為天下祈豐年焉自是五嶽四瀆皆有常禮東嶽泰山於博中嶽泰室於嵩髙南嶽灊山於灊西嶽華山於華隂北嶽常山於上曲陽上曲陽常山郡之縣也河於臨晉馮翊之縣也江於江都淮於平氏南陽之縣濟於臨邑界中東郡之縣皆使者持節侍祠惟泰山與河嵗五祠江水四餘皆一禱而三祠云光武中元元年定北郊祀地祗地理羣神從食如元始故事在壇下中嶽在未四嶽各在其方孟辰之地中營内海在東四瀆河西濟北淮東江南他山川各如其方皆在外營内五嶽共牛一頭海四瀆共牛一頭章帝元和二年詔曰山川百神應祀者未盡其議增修羣祀宜享祀者魏文帝黄初三年禮五嶽四瀆咸秩羣祀沈瘞珪璋晉成帝咸和八年立北郊於覆舟山祀地祗地郊從祀則五嶽四望四海四瀆五湖五帝之佐沂山嶽山白山霍山醫無閭山蔣山松江會稽山錢塘江先農凡四十四神江南諸小山蓋江左所立如漢西京關中小水皆有祭秩也穆帝升平中何琦備論五嶽祠曰唐虞之制天子一載一廵狩順時之方柴燎五嶽望於山川徧於羣神故曰因名山升中於天所以昭告神祗饗報功徳是以災厲不作而風雨寒暑以時降及三代年數雖殊而其禮不易五嶽視三公四瀆視諸侯著在經記所謂有其舉之莫敢廢也及秦漢都西京涇渭長水雖不在祀典以近咸陽故盡得比大川之祠則正立之祀可以闕哉自永嘉之亂神州傾覆兹事替矣惟灊音潛之天柱在王畧之内也舊臺選百戸吏卒以奉其職中興之際未有官守廬江郡常遣太史兼假四時禱賽春釋寒而冬請冰咸和迄今又復隳替計今非典之祠可謂非一考其正名則滛昬之鬼推其糜費則百姓之蠧而山川大神更為簡闕良由頃國家多難日不暇給草建廢滯事有未遑今元憝徒對反已殱宜修舊典嶽瀆之域風教所被而神明禋祀未之或甄崇明前典將候皇輿北旋可令禮官作式歸諸誠簡以逹明徳馨香如斯而已其諸妖孽可粗依法令先去其甚俾邪正不黷時不見省宋孝武帝大明七年有司奏奠祭霍山殿中郎邱景先議宜使太常持節牲以太牢之具饈用酒脯時榖禮用赤璋纁幣器用陶匏藉用茅席為壇兆時不用蜃同郊祀以爵獻凡肴饌種數依社祭梁令郡國有五嶽者置宰祀三人及有四瀆若海應祀者皆以孟春仲冬祠之後魏景穆帝立五嶽四瀆廟於桑乾水之隂春秋遣有司祭其餘山川百神三百二十四所每嵗十月遣祠官詣州鎮徧禱有水旱災厲則牧守各隨其界内而祈謁王畿内諸山川有水旱則禱之太武帝南征造恒山祀以太牢浮河濟祀以少牢過岱宗祀以太牢遂臨江登𤓰歩而還後周大將出征遣太祝以羊一祭所過名山大川隋制祀四鎮東鎮沂山西鎮呉山南鎮會稽山北鎮醫無閭山在東夷中遥祀冀州鎮霍山並就山立祠祀四海東海於會稽縣界南海於南海鎮南並近海立祠及四瀆並取側近巫一人主知灑掃並令多植松栢唐武徳貞觀之制五嶽四鎮四海四瀆年别一祭各以五郊迎氣日祭之東嶽岱山祭於兗州東鎮沂山祭於沂州東海於萊州東瀆大淮於唐州南嶽衡山於衡州南鎮會稽山於越州南海於廣州南瀆大江於益州中嶽嵩山於洛州西嶽華山於華州西鎮呉山於隴州西海及西瀆大河於同州北嶽恒山於定州北鎮醫無閭山於營州北海及北瀆大濟於洺州其牲皆用大牢祀官以當界都督刺史充武后垂拱四年封洛水神為顯聖侯享齊於四瀆封嵩山為神嶽天中王至萬嵗通天元年尊神嶽天中王為神嶽天中皇帝神龍元年復為天中王先天二年封華嶽為金天王元宗開元十一年勅霍山宜崇飾祠廟秩視諸侯蠲山下十戸以為灑掃晉州刺史春秋致祭十三年封泰山神為天齊王禮秩加三公一等二十五年勅三時不害百榖用成遂使京坻遍於天下和平之氣既無逺而不通禋祀之典亦有祈而必報宜令中書令李林甫等分祭郊廟社稷尚書左丞相裴輝卿等分祭五嶽四瀆開元時天台道士司馬承禎言今五嶽神祠是山林之神也非正真之神也五嶽皆有洞府有上清真人降任其職山川風雨隂陽氣序是所理焉冠冕服章佐從神仙皆有名數請别立齋祠之所上竒其説因勅五嶽各置真君祠一所天寳元年以西成頗熟令光禄卿嗣鄭王希言等分祭五嶽其四瀆名山委所由長官擇日致祭七載八載十載皆以嵗豐遣官分祭嶽瀆五載詔封中嶽為中天王南嶽為司天王北嶽為安天王六載詔封河瀆為靈源公濟瀆為清源公江瀆為廣源公淮瀆為長源公令所司擇日差使告祭七載封昭應山為元徳公八載封太白山為神應公其九州鎮山除入諸嶽外並宜封公十載封東海為廣徳王南海為廣利王西海為廣潤王北海為廣澤王封沂山為安東公會稽山為永興公嶽山為成徳公霍山為應聖公醫無閭山為廣寧公肅宗至徳二載勅呉山宜改為呉嶽祠享官屬並凖五嶽故事上元二年改封華山為太山華隂縣為太隂縣徳宗貞元二年詔太常卿裴郁等十人各就方鎮祭嶽瀆等舊禮皆因郊祀望而祭之天寳中始有遣使祈福之祠非禮之正也太常卿董晉奏五嶽四瀆伏凖開元禮每年各以五郊迎氣日祭之其祝版並合御署自上元元年中祠小祠一切權停自後因循不請御署其祝版欲至饗祭日所司凖程先進取御署附驛發遣勅㫖宜依仍委所司每至時先奏附中使送徃文宗開成二年四月十一日敕如聞京師舊説以為終南山興雲即必有雨若晴霽雖密雲他至竟不沾濡况兹山北靣闕庭日當顧矚修其望祀寵數宜及今聞都無祠宇炭谷湫却在命祀終南山未備禮秩湫為山屬捨大從細深所謂闕於興雲致雨之祀也宜令中書門下且差官設奠宣告致禮便令擇立廟處所回日以聞然命有司即時建立其年九月勅終南山宜封為廣惠公凖四鎮例以本府都督刺史充獻官每年一祭以季夏土王日祭之僖宗乾寧五年勅封少華山為佑順侯昭宗天佑二年勅封洞庭湖君為利渉侯青草湖君為安流侯唐開元禮祭五嶽四鎮四海四瀆儀諸嶽鎮海瀆每年一祭各以五郊迎氣日祭之四祭每座籩豆各十簠簋各二爼二設祭州界已具歴代祀山川篇前祭五日諸祭官各散齋三日致齋二日如别儀前一日嶽令瀆令清掃内外又為瘞埳於壇壬地方深取足容物海瀆則塪内為壇髙丈四尺皆為陛贊禮者設初獻位於壇東南亞獻終獻於初獻南少退俱西向北上設掌事者位於終獻東南重行西靣以北為上設贊唱者位於終獻西南西向北上設獻官等望瘞位於瘞坎之東北向西祭海瀆無望瘞位設祭官以下門外位於南門之外道東重行西向以北為上祭器之數罇六籩十豆十簋二簠二爼三嶽瀆令帥其屬詣壇東陛升設罇於壇上東南隅北向西上罇皆加勺羃有坫以置爵設玉篚於罇坫之所設洗於南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵執罇罍洗篚者各位於罇罍篚之後祭日未明烹牲於厨其牲各隨方色齋郎以豆先取血毛置於饌所夙興掌饌者實祭器牲體牛羊豕皆載右胖前脚三節節一叚肩臂臑皆載之後脚三節節一叚去下節載上肫胳二節又取正脊脡脊横脊短脅正脅代脅各二骨以並餘皆不設簋實稷黍簠實稻梁籩十實石鹽乾魚棗栗榛菱芡鹿脯白餅黑餅豆十實韭葅醯醢菁葅鹿醢芹葅兎醢笋葅魚醢菜葅豚胉若土無者各以其類充之凡祭官各服其服三品毳冕四品繡冕五品元冕六品以下爵弁若有二品以下各依令嶽令瀆令帥其屬入詣壇東陛升設嶽神瀆神座於壇上近北靣南向席以莞又實罇罍及玉凡罇一實醴齊一實盎齊一實清酒其元酒各實於上罇祭神之玉兩珪有邸祝版置於坫嶽令瀆令又以幣置於篚齋郎以豆血皆設於饌所其幣長丈八尺各隨方色贊唱者先入就位祝與執罇罍篚者入當壇南重行北靣以西為上立定贊唱者曰再拜祝以下俱再拜執罇者升自東陛立於罇所執罍篚者各就位祝詣壇東陛升行掃除於上降行掃除於下訖瀆則掃除塪外訖各就位質明贊禮者引祭官以下俱就門外位立定一刻頃贊唱者曰再拜在位者皆再拜贊禮者進初獻之左白有司謹具請行事退復位贊唱者曰再拜在位者皆再拜祝跪取玉幣於篚興立於罇所凡取物者皆跪俛伏而取以興奠物奠訖俛伏而後興掌饌者帥齋郎奉饌陳於東門之外贊禮者引初獻詣壇升自南陛進神座前北向立祝以玉幣東向進初獻受玉幣祝還罇所贊禮者引初獻進北向跪奠於神座興少退北向再拜贊禮者引初獻降還本位掌饌者引饌入升自南陛祝迎引於壇上設於神座前掌饌帥齋郎降自東陛復位祝還罇所贊禮者引初獻詣罍洗盥手洗爵升自南陛詣酒罇所執罇者舉羃初獻酌醴齊贊禮者引初獻進詣神座前北向跪奠爵興少退北向立祝持版進於神座之右東靣跪讀文曰維某年嵗次月朔日子嗣天子某謹遣某官某敢昭告於東嶽岱宗維神資飬萬品作鎮一方式因春始南嶽云夏始中嶽云季夏西嶽云秋始北嶽云冬始謹以玉幣犧齊粢盛庶品朝薦於東嶽岱宗尚享東瀆大淮云惟神源流深泌潛潤溥洽阜成百榖疏滌三川青春伊始用遵典秩南瀆大江云惟神總合大川朝宗巨海功昭潤化徳表靈長敬用夏首修其常典西瀆大河云惟神上通雲漢光啟圖書分導九枝旁潤千里素秋戒序用率典常北瀆大濟云惟神泉源清潔浸彼遐逺播通四氣作紀一方元冬肇節聿修典制訖興初獻再拜祝進奠版於神座還罇所祝以爵酌清酒進初獻之右西向立初獻再拜受爵跪祭酒啐酒奠爵祝帥齋郎以爼進減神座前胙肉前脚第二節共置一爼上以授初獻初獻受以授齋郎初獻跪取爵遂飲卒爵祝進受爵復於坫初獻興再拜贊禮者引初獻降復位於初獻飲福酒贊禮者引亞獻詣罍洗盥手洗爵升自東陛詣罇所執罇者舉羃亞獻酌盎齊贊禮者引亞獻詣神座前北靣跪奠爵興少退北向再拜祝以爵酌清酒進於亞獻之右西向立亞獻再拜受爵跪祭酒遂飲卒爵祝受虛爵復於坫亞獻興再拜贊者引亞獻降復位初亞獻將畢贊禮者引終獻盥洗升獻飲福如亞獻之儀訖贊禮者引終獻降復位祝進神座前徹豆還罇所贊唱者曰再拜非飲福受胙者皆再拜贊禮者進初獻之左白請就望瘞位西向立於獻官將拜嶽令進神座跪取幣齋郎以爼載牲體黍稷飯詣瘞塪以饌物置於塪祭海瀆獻官拜訖瀆令及齋郎以幣血沈於瀆瀆令退就位東西廂各二人寘土半塪贊者進初獻之左白禮畢遂引初獻以下出祝與執罇罍篚羃者俱復執事位立定贊唱者曰再拜再拜訖遂出祝版燔於齋所宋初縁舊制祭東嶽泰山於兖州西嶽華山於華州北嶽恒山於定州中嶽嵩山於河南府太祖皇帝建隆四年平湖南命給事中李昉祭南嶽乾徳六年有司言祠官所奉止四嶽今按祭典請祭南嶽於衡州東鎮沂山於沂州南鎮會稽山於越州西鎮呉山於隴州中鎮霍山於晉州東海於萊州南海於廣州西海河瀆並於河中府北海濟瀆並於孟州淮瀆於唐州其江瀆凖顯徳五年勅祭於揚州揚子江口今請復祭於成都府北鎮醫無閭山在營州界未行祭享從之其後望祭北鎮於定州北嶽祠開寳三年廣南平遣司農少卿李繼芳祭南海劉鋹先尊海神為昭明帝廟為聰正宫其衣飾以龍鳳詔削其號及宫各易以一品之服五年詔自今嶽瀆并東海南海廟各以本縣令兼廟令尉兼廟丞專掌祀事常加按視務於蠲潔仍籍其廟宇祭器之數受代日交以相付本州長吏每月一詣廟察舉縣近廟者遷治所就之太宗太平興國八年河決滑州遣樞密直學士張齊賢詣河祭告用兩圭有邸沉之自是凡決溢脩塞皆致祭真宗景徳三年令澶州置河瀆廟上幸大名也禱之有應及元年駐蹕澶淵戎騎在郊河流不冰故立祠春秋致祭大中祥符元年封禪禮畢詔加號泰山天齊王為仁聖天齊王修飾廟宇山四靣七里内各禁樵採又封泰山通泉廟為靈𣲖侯亭亭廟為廣禪侯鄒縣嶧山廟為靈巖侯十一月車駕過澶州幸河瀆廟酌奠進號河瀆曰顯聖靈源公遣官徃河東府澶州祭告二年八月祕書丞董温其上言漢以霍山為南嶽望令夀州長吏春秋致祭詔禮官與崇文院檢討詳定上奏曰按爾雅云江南衡山注云衡山南嶽又霍山為南嶽注云即天柱山灊水所出此即非特霍山為南嶽舜五月南廵周之王制皆以衡山為南嶽惟漢武帝以衡山遼逺取䜟緯之説而祭灊霍至隋復以衡山為嶽况奉祠已久國家疆宇夐廣難於改制其霍山如有祈請及特致祭即委州縣奉行從之三年修鳳翔太白山泗州龜山廟四年親祀汾隂后土還至河中親謁奠河瀆廟親謁華隂西嶽廟羣臣陪位廟垣内外列黄麾仗遣官分奠廟内諸神五年詔加上東嶽曰天齊仁聖帝南嶽曰司天昭聖帝西嶽曰金天順聖帝北嶽曰安天元聖帝中嶽曰中天崇聖帝命翰林學士李宗諤等與禮官詳定儀注及冕服制度其玉册如宗廟謚册之制遣官詣五嶽充奉册使副有司設册使一品鹵簿及援册黄麾仗於乾元門外各依方所又設載册輅及袞冕輿於朝元門外羣臣朝服序班仗衛如元會儀上服袞冕御朝元殿中書侍郎引五嶽玉册尚衣奉御筆袞冕升殿上為之興奉册使副班於香案前侍中宣制曰今加大五嶽帝號遣卿等持節奉册展禮咸承制再拜奉册使以次升自東階受册於御座前降西階副使受袞冕輿於丹墀玉册至朝元門外上復坐册使奉册升輅鼓吹振作而行册至廟内外列黄麾仗設登歌奉册於輅袞冕於輿使副袴褶騎從遣官三十員前導及門奉置幄次以州長吏以下充祀官致祭畢奉玉册袞冕置殿内十一月戊戌詔加上東嶽淑明后南嶽景明后西嶽肅明后北嶽靖明后中嶽正明后之號又詔華山及華州管内靈跡並禁樵採陳氏曰泰山曰天齊仁聖帝在唐為天齊王至本朝以東方主生加仁聖二字封帝帝只一上帝而已安有山而謂之帝今立廟儼然人形貎垂旒端冕衣裳而坐又立后殿於其後不知又是何山可以當其配而為夫婦邪據泰山魯封内惟魯公可以祭今隔一江一淮與南方地脉絶不相干渉而在在州縣皆立東嶽行祠亦失於講明之故仁宗康定二年增封海瀆逐處遣官致祭東海為淵聖廣徳王南海為洪聖廣利王西海為通聖廣潤王北海為冲聖廣澤王江瀆為廣源王河瀆為靈源王淮瀆為長源王濟瀆為清源王慶歴二年儂智髙反圍廣州數有風雨遂遁乃詔益封南海神為洪聖廣利昭順王神宗元豐三年集賢校理陳侗言按周禮小宗伯之職兆五帝於四郊四望四類亦如之鄭氏注四望謂五嶽四瀆也四類日月星辰也今四郊有五帝及日月星辰之壇而獨四望之壇不建或遇朝廷有祈焉則設位皇地祗壇下甚非古制請依周禮建四望壇於四郊以祭五嶽四鎮四瀆庶合於經詔下詳定禮文所詳定所請以國朝祠令所載嶽鎮海瀆兆四望於四郊岱山沂山東海大淮於東郊衡山會稽山南海大江嵩山霍山大海於南郊華山呉山西海大河於西郊常山醫無閭山北海大濟於北郊每方嶽鎮則共為一壇海瀆則共為一坎以五時迎氣日祭之皆用血祭瘞埋有事則請禱之又以四方山川各附於本方嶽鎮海瀆之下别為一壇一坎水旱則禱之其北郊從祀及諸州縣就祭如故詔每方嶽鎮共為一壇望祭餘從之徽宗政和三年議禮局上五禮新儀五方嶽鎮海瀆壇各髙五尺周四十歩四出陛兩壝每壝二十五歩壇飾依方色祭嶽鎮海瀆設位南向以西為上山川從祀西向以北為上諸嶽鎮海瀆年别一祭以祭五帝日祭之東嶽泰山於兖州界東鎮沂山於青州界東海於萊州界東瀆大淮於唐州界南嶽衡山於潭州界南鎮會稽山於越州界南海於廣州界南瀆大江於益州界中嶽嵩山於河南府界中鎮霍山於晉州界西嶽華山於華州界西鎮呉山於隴州界西海西瀆大河於河中府界北嶽常山及遥祀北鎮醫巫閭山於定州界北海北瀆大濟於孟州界太常言大中祥符中封五嶽為帝四海為王獨五鎮封爵尚仍唐舊元豐八年始封西鎮呉山為成徳王而未及四鎮詔並封王髙宗建炎元年權太常少卿滕康言車駕廵幸所過名山大川望差官致祭從之紹興七年太常博士黄積厚言百神之祀曠嵗弗修如中祀未舉者嶽瀆海鎮中嶽中鎮是也望舉而行之從之每嵗以四立日季夏土王日設祭其禮料初依奏告例後比擬舊制用羊豕各一口籩十菱芡栗鹿脯榛實乾桃乾䕩乾棗形鹽魚鱐簠二稻梁簋二黍稷鉶鼎三鉶羮豋二大羮脂盤一毛血豆十芹筍葵菁韮魚醢兔醢豚胉鹿臡醯醢爼八羊腥七體羊熟十羊腥腸胃羊熟腸胃肺豕腥七體豕熟十一豕腥膚豕熟膚尊罍二十四實酒並同皇地祗三十一年知樞密院事督視軍馬葉義問言比北騎進逼江上與鎮江建康太平諸郡纔隔一水先報金人謀開第二港河欲徑衝丹徒施工累日一夕大風沙漲截斷不得渡以為水府隂祐仰惟陛下神聖威武將士用命控弦之衆未遽衝突然滔滔大江横截其前彼軍為之逡廵退却雖有舟楫不得施者實神助有道隂相於冥冥之中所以致然乞詔禮官考其制乞依五嶽例峻加帝號令建康守臣擇地建廟其金山采石二水府乞增封遣官精潔祭告詔令禮部太常寺討論已而太常寺言江瀆已封廣源王止係二字欲特增加六字作八字王擬昭靈孚應威烈廣源王令建康守臣擇爽塏之地建廟賜額曰佑徳其乞峻加帝號一節恢復中原日别議封册兼契勘廣源王本廟係在成都府今來所封廟額并增八字王令本廟一體稱呼從之孝宗乾道五年太常少卿林栗言國家駐蹕東南東海南海實在封域之内檢照國朝祀儀立春祭東海於萊州立夏祭南海於廣州其西北海逺在夷貊獨即方州行二時望祭之禮自渡江以後惟南海廣利王廟嵗時降御書祝文令廣州行禮并紹興七年加封至八字王爵如東海之祠伹以萊州隔絶不曾令沿海官司致其時祭殊不知通泰明越温台泉福皆東海分界也紹興辛巳金人南下李寳等舟師大㨗於膠西是時神靈助順則東海之神於國為有功矣謹按東海祠隋祭於會稽縣界唐祭於萊州界本朝沿唐制萊州立祠元豐元年建廟於明州定海縣既成命知制誥鄧潤甫撰記二年加封淵聖之號崇寧二年本廟嵗度道士一員大觀四年又加助順二字則東海之祠本朝累加崇奉皆在明州不必泥於萊州矣欲乞行下禮部參照南海已封禮例將李寳等昨來立功事跡顯著特封東海之神八字王爵自今後立春及大禮告謝乞依見令廣州祭南海禮例關報所屬請降香祝下明州排辦差官行禮詔從之文獻通考卷八十三
