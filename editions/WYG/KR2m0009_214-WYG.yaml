body:
  text: 文獻通考卷二百十四鄱陽馬端臨貴與著經籍考四十一子雜家論衡三十卷鼂氏曰後漢王充仲任撰充好論説始如詭異終有實理以俗儒守文多失其真乃閉門潛思户牖墻壁各置刀筆著論衡八十五篇釋物類同異正時俗嫌疑後蔡邕得之秘玩以為談助云世謂漢文章温厚爾雅及其東也已衰觀此書與潛夫論風俗通義之類比西京諸書驟不及逺甚乃知世人之言不誣髙氏子略曰書八十五篇二十餘萬言其為言皆叙天證敷人事析物類道古今大略如仲舒玉杯繁露而其文詳詳則禮義莫能覈而精辭莫能肅而括㡬於蕪且雜矣漢承滅學之後文景武宣以來所以崇厲表章者非一日之力矣故學者向風承意日趨於大雅多聞之習凡所撰録日益而嵗有加至後漢盛矣往往規度如一律體裁如一家是足以雋美於一時而不足以凖的於來世何則事之鮮純言之少擇也劉向新序説苑竒矣亦復少探索之功闕詮定之密其叙事有與史背者不一二書尚爾况他書乎袁山松後漢書云充作論衡中土未有傳者蔡邕入呉始見之以為談助談助之言可以了此書矣客有難充書煩重者曰石多玉寡寡者為珍龍少魚衆少者為神乎充曰文衆可以勝寡矣人無一引吾百篇人無一字吾萬言為可貴矣予所謂乏精覈而少肅括者正此謂歟陳氏曰充肅宗時人仕為州從事治中初作此書北方初未有得之者王朗嘗詣蔡伯喈搜求至隠處果得論衡捉取數卷将去伯喈曰惟我與爾共勿廣也然自今觀之亦未為竒仲長子昌言二卷崇文總目後漢仲長統撰按本傳統論説古今及時俗行事著論名昌言凡三十四篇十餘萬言隋唐書目十卷今所存十五篇分為三卷餘皆亡傅子五卷崇文總目晉傅休奕撰集經史治國之説評㫁得失各為區例本傳載内外中篇凡四篇亡録合一百四十篇今亡一百一十七公侯政術十卷崇文總目魯人初撰葢魯人名初不著其姓未詳何代人正訓十卷崇文總目不著撰人名氏按唐志有正訓二十卷辛徳源撰而此題云陸機撰又止十卷据隋以前書録皆無陸機正訓之目晉史機傳亦不言嘗有此書而徳源所著今世已亡疑是其遺書抱朴子外篇十卷鼂氏曰晉葛稚川撰自號抱朴子博聞深洽江左絶倫著書甚富言黄白之事名曰内篇其餘外篇晉書内外通有一百一十六篇今世所傳者四十篇而已外篇頗言君臣理國用刑之道故附於雜家云女誡一卷陳氏曰漢曹世叔妻班昭撰固之妹也俗號女孝經蒋子萬機論二卷陳氏曰魏太尉平阿蒋濟子通撰按館閣書目十卷五十五篇今惟十五篇疑非全書也孫子十卷陳氏曰晉孫綽興公撰恐依托唐志及中興書目並無之從程文簡家借録劉子五卷陳氏曰劉晝孔昭撰播州録事參軍袁孝政為序凡五十五篇按唐志十卷劉勰撰今序云晝傷已不遇天下陵遲播遷江表故作此書時人莫知謂為劉勰或曰劉歆劉孝標作孝政之言云爾終不知晝為何代人其書近出傳記無稱莫詳其始末不知何以知其名晝字孔昭也鼂氏曰唐袁孝政注言修心治身之道而辭頗俗薄金樓子十卷鼂氏曰梁元帝繹撰書十篇論歴古興亡之迹箴戒立言志怪雜説自叙著書聚書通曰金樓子者作藩時自號陳氏曰雜記古今聞見末一卷為自序瑞應圖十卷陳氏曰不著名氏按唐志有孫柔之瑞應圖記熊理瑞應圖譜各三卷顧野王符瑞圖十卷又祥瑞圖十卷今此書名與孫熊同而卷數與顧合意其野王書也其間亦多援孫氏以為注中興書目有符瑞圖二卷定著為野王又有瑞應圖十卷稱不知作者載天地瑞應諸物以類分門今書正爾未知果野王否又云或題王伯齡至李淑書目又直以為孫柔之矣又恐李氏書别一家也子鈔三十卷陳氏曰梁尚書左丞潁川庾仲容子仲撰所取諸子之書百有五家其間頗有與今世見行書不同者而亡者多矣意林三卷鼂氏曰唐馬總㑹元撰初梁庾仲容取諸家書術數雜記凡一百七家抄其要語為三十卷總以其繁畧失中増損成三軸前有戴叔倫楊伯存兩序髙氏子畧曰子鈔百十有七家仲容所取或數句或一二百言是有以契其意入其用而他人不可共享者也馬總意林一遵庾目多者十餘句少者一二言比子鈔更為取之嚴録之精且約也戴叔倫序其書曰上以防守教之失中以補比事之缺下以佐屬文之緒有疏通廣博潔浄符信之要無僻放拘刻譤蔽邪蕩之患亦足以發其機寫其志矣孔子曰雖小道亦有可觀是於諸子未嘗廢也聖人既逺承學易殊義向之少純言議之多詭則百氏之為家不能盡叶乎一亦理之所必然也當篇籍散缺人所未見之時而乃先識其名又得其語斯足以廣聞見助發揮何止嘗鼎臠啖鷄蹠也陸機賦曰傾羣言之瀝液潄六藝之芳潤唐韋展日月如合璧賦云獵英華於百氏潄芳潤於六籍語自此來是庻㡬焉容齋洪氏隨筆曰唐世未知尊孟子故意林亦列其書而有差不同者如伊尹不以一介與人亦不取一介於人之類其他所引書如胡非子隨巢子纒子王孫子公孫尼子阮子正部姚信士緯殷興通語牟子周生烈子秦菁子梅子任奕子魏朗子唐滂子鄒子孫氏成敗志蒋子譙子鍾子張儼黙記裴氏新書袁凖正書袁子正論蘇子陸子張顯析言于子顧子諸葛子陳子要言符子諸書今皆不傳於世亦有不知其名者陳氏曰總後仕至尚書僕射嘗副裴晉公平淮西者也長短經十卷鼂氏曰唐趙蕤撰北夢瑣言云蕤梓州鹽亭人博學韜鈐長於經世夫婦俱有隠操不應辟召論王覇機權正變之術第十卷載隂謀家本缺今存者六十四篇炙轂子雜録注解五卷鼂氏曰唐王叡撰二儀實録古今注載事物之始樂府題解樂府所由起叡輯纂數家之言正誤補遺劉允併歸一篇事始三卷鼂氏曰唐劉孝孫等撰太宗命諸王府官以事名類推原初始凡二十六門以教始學諸生易大傳自始作八卦至網罟耒耨臼杵之微皆記其本起檀弓所述亦皆物之始也然則事始之書當係之儒今以其所取不一故附於雜家陳氏曰唐呉王諮議𢎞文館學士南陽劉存撰理道要訣十卷陳氏曰唐宰相杜佑君卿撰凡三十三篇皆設問答之辭末二卷記古今異制盖於通典中撮要以便人主觀覽造化權輿六卷陳氏曰唐豐王府法曹趙自勔撰天寳七年表上陸農師著埤雅頗采用之其孫務觀兩嘗為䟦余求之久不獲己亥嵗呉門天慶觀道藏中借録刋語二卷陳氏曰唐國子祭酒李諳撰資暇集三卷陳氏曰唐李匡文濟翁撰兼明書二卷陳氏曰唐國子太學博士邱光庭撰蘇氏演義十卷陳氏曰唐光啟進士武功蘇鶚徳祥撰此數書者皆考究書傳訂正名物辨證訛謬有益見聞尤梁谿以家藏本刻之當塗仲蒙子三卷陳氏曰唐校書郎長樂林慎思䖍中撰致理書十卷鼂氏曰唐朱朴撰乾寜中為國子毛詩博士論述時務五十篇上之詞如近時䇿斷之類迂緩不切與馬周所建明不啻霄壤矣昭宗善其言用太宗擢周故事㧞為相徒以益亂可歎也兩同書二卷崇文總目唐羅隠撰采孔老二書著為内外十篇以老子修身之説為内孔子治世之道為外㑹其㫖而同元鼂氏曰唐羅隠撰隠謂老子飬生孔子訓世因本之著内外篇各五其曰兩同書者取兩者同出而異名之言也陳氏曰不著名氏中興書目云唐呉筠撰唐藝文志同但入小説類采孔老為内外十篇名祝融子兩同書祝融者謂鬻子為諸子之首也宋齊丘化書六卷鼂氏曰偽唐宋齊丘子嵩撰張耒文潛嘗題其後云齊丘之意特犬䑕之䧺耳盖不足道其為化書雖皆淺機小數亦微有以見於黄老之所謂道徳其能成功有以也吾嘗論黄老之道徳本於清浄無為遣去情累而其末多流而為智術刑名何哉仁義生於恩恩生於人情聖人節情而不遣者也無情之至至於無親無親則忍矣此刑名之所以用也文章頗高簡有可喜者其言曰君子有竒志天下不親雖聖人出斯言不廢格言五卷鼂氏曰偽唐韓熈載叔言撰熈載以經濟自任乃著書二十六篇論古今王伯之道以干李煜首言陽九百六之數及五運迭興事其䮞雜如此有門人舒雅序中華古今注三卷陳氏曰後唐太學博士馬縞撰葢推廣崔豹之書也續事始五卷鼂氏曰偽蜀馮鑑廣孝孫所著事原録三十卷鼂氏曰皇朝朱繪撰其書事始之類也物類相感志十卷鼂氏曰皇朝僧贊寜撰采經籍傳記物類相感者志之分天地人物四門贊寜呉人以博物稱於世桞如京徐騎省與之游或就質疑事楊文公歐陽文忠公亦皆知其名陳氏曰贊寜國初名釋也耄智餘書三卷陳氏曰太子少保致仕澶淵鼂逈徳逺撰逈善飬生兼通釋老書年至八十四子孫多聞人昭徳新編一卷陳氏曰鼂逈撰昭徳者京師居第坊名也鼂氏子孫皆以為稱宋景文筆録三卷鼂氏曰皇朝宋祁撰皆故事異聞嘉言奥語可為談助不知何人所編毎章冠以公曰景文乃祁諡也中興藝文志筆録三卷皇朝紹聖中宋肇次其祖庠遺語凡一百七十條按二筆録卷數同祁庠又兄弟也然則一書邪二書邪當考近事㑹元五卷陳氏曰李上友撰自唐武徳至周顯徳雜事細務皆記之徽言三卷陳氏曰司馬光手抄諸子書題其末曰余此書類舉人抄書然舉子所抄獵其辭余所鈔覈其意舉人志科名余志道徳其序書迂叟言六十八葢公在相位時也方機務填委且将屬疾而好學不厭克勤小物如此所鈔自國語而下六書其目三百一十有二小楷端無一筆不謹百世之下使人肅然起敬真跡藏邵康節家其諸孫䢍守漢嘉從邵氏借刻擕其版歸越今在其羣從述尊古家泣岐書三卷陳氏曰蜀人龍昌期稱上昭文相公有後序言求薦進之意天保正名論八卷陳氏曰龍昌期撰其學迂僻專非周公妄人也事物紀原二十卷陳氏曰不著名氏中興書目十卷開封高承撰元豐中人凡二百七十事今此書多十卷且數百事是後人廣之耳孔氏雜説記一卷鼂氏曰皇朝孔武仲撰論載籍中前言往行及國家故實賢哲文章亦時記其所見聞者鼂氏客語一卷陳氏曰鼂説之以道撰王氏雜説十卷鼂氏曰皇朝王安石介甫撰蔡京為安石傳其畧曰自先王澤竭國異家殊由漢迄唐源流浸深宋興文物盛矣然不知道徳性命之理安石奮乎百世之下追堯舜三代通乎晝夜隂陽所不能測而入於神初著雜説數萬言世謂其言與孟軻相上下於是天下之士始原道徳之意窺性命之端云所謂雜説即此書也以京之夸至如此且不知所謂通乎晝夜隂陽所不能測而入於神者為何等語故著之汲世論一卷鼂氏曰右未詳何人所著多稱元祐間事且喜論兵疑吕氏書也凡十門馭臣鑒古二十卷鼂氏曰右皇朝鄧綰撰元豐中為中丞獻之朝未㡬坐操心頗僻賦性姦回論事薦人不循分守貶廣川家學三十卷陳氏曰中書舍人董弅令升撰述其父逌之學蘇文定公遺言蘇轍子由撰周平園序畧曰文定公晩居許昌造深矣避禍謝客縱有門人亦罕與言其聞緒論者子孫而止耳然諸子宦游惟長孫将作監丞仲滋諱籀年十有四才識卓然侍左右者九年記遺言百餘條未嘗増損一語既老以授其子郎中君詡郎中復以授其子道州史君森予嘗與道州同僚故請題其後昔人疑黄樓賦非出公手東坡葢親為之辯今公自謂此賦學兩都晩年不復作此工夫之文至和陶擬古九首則明言坡代作識者當自得之又云讀書須學為文餘事作詩然公詩自工謂儲光羲高處似陶淵明平處似王摩詰而以韓子蒼比之子蒼由是知名公素不作長短句今漁家傲一篇雖用禪語而句法極髙乃知公非不能詞直不為耳此皆學者所宜知也石林家訓一卷陳氏曰葉夢得少藴撰石林過庭録二十七卷陳氏曰葉夢得與諸子講説者其中子模編輯之程氏廣訓六卷陳氏曰中書舍人三衢程俱致道撰藝苑雌黄二十卷陳氏曰建安嚴有翼撰大抵辯正訛謬故曰雌黄其目子史傳注詩詞時序名數聲畫器用地理動植神怪雜事卷為二十條凡四百條硯岡居士唐稷序之有翼常分教泉荆二郡湘素雜説十卷鼂氏曰皇朝黄朝英撰所記二百事朝英建州人紹聖後舉子也為王安石之學者以贈之以芍藥為男滛女貽我握椒為女滛男鄙䙝不典前輩嘗以是為嗤笑朝英特愛重之以為得詩人深意其他可知矣陳氏曰陳與者為之序言甲辰六試吏部不利葢政宣中士子也其書亦辯正名物而學頗迂僻程氏演繁露曰此書辯正世傳名物音義多有歸宿而時有闕疑者至釋宋子京刈麥詩以四月為麥秋而曰按北史蘇綽傳麥秋在野其名逺矣是未嘗讀月令也以此知博記之難聖賢眼目一卷陳氏曰曲河洪興祖慶善撰摘取經子數十條以已見發明之義林一卷陳氏曰眉山程敦厚子山撰其上世東坡外家也子山為人凶險附秦檜至右史後坐謫死演繁露十四卷續十卷陳氏曰程大昌泰之撰初在館中見繁露書以為非説見春秋類又引古今注冕旒綴玉下重如繁露然葢與玉杯竹林同為托物名篇可想見也今曰演繁露者意古之繁露與爾雅釋名廣雅刋誤正俗之類云耳考古編十卷續編十卷陳氏曰程大昌撰上自詩書下及史傳世俗雜事有可考見者皆筆之楚澤叢語八卷陳氏曰右廸功郎李蓍吉光撰不知何人作其書專闢孟子紹興中撰進大意以為王氏之學出於孟子然王氏信有罪矣孟氏何與焉此論殆得於景迂之微意容齋隨筆續筆三筆四筆各十六卷五筆十卷陳氏曰翰林學士番易洪邁景盧撰毎編皆有小序五筆未成書朱子語録曰洪景盧隨筆中辯得數種偽書皆是但首卷載歐帖事却非實世間偽書如西京雜記顔師古已辯之矣續顔氏家訓八卷陳氏曰左朝請大夫李正公撰皆用顔氏篇目而増廣之習學記言五十卷陳氏曰閣學士龍泉葉適正則撰自六經諸史子以及文鑑皆有論説大抵務為新竒無所蹈襲其文刻峭精工而義理未得為純明正大也自孔子之外古今百家隨其淺深咸有遺論無得免者而獨於近世所傳子華子篤信推崇之以為真與孔子同時可與六經並考而不悟其為偽也且既曰其書甚古而文與今人相近則亦知之矣逺自七畧及隋唐國史諸志李邯鄲諸家書目皆未之有豈不足以驗其非古出於近世好事能文者之所為而反謂孟荀以來無道之者葢望而棄之也不亦惑乎凖齋雜説一卷陳氏曰錢唐呉如愚撰灌畦暇語一卷陳氏曰不知作者雜取史傳事畧述已意忘筌書二卷陳氏曰潘植子醇撰新安所刻本凡八十二篇與館閣書目諸儒鳴道集及余家寫本篇數皆不同本已見儒家而館目置之雜家者以其多用釋老之説故也今亦别録於此袁氏世範三卷陳氏曰樂清令三衢袁采君載撰文獻通考卷二百十四
