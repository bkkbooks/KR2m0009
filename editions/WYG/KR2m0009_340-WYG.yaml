body:
  text: 文獻通考卷三百四十鄱陽馬端臨貴與著四裔考十七北狄杜氏通典曰北狄白虎通云狄者易也言辟易無國别説文禮記明堂位有六狄之以畜牧為業逐水草遷徙無城郭常居耕田之業然亦各有分地無文書以言語為約束兒能騎羊引弓射鳥䑕少長則射狐兎肉食士力能彎弓盡為甲騎其俗寛則隨畜田獵禽獸為生業急則人習戰攻以侵伐其天性也其長兵則弓矢短兵則刀鋋利則進不利則退不羞遁走茍利所在不知禮義自君王以下咸食畜肉衣其皮革被旃裘壯者食肥美老者飲食其餘貴壯健賤老弱父死妻其後母兄弟死者皆取其妻妻之其俗有名不諱而無字畜之所多則馬牛羊其竒畜則橐駝驢驘駃騠騊駼驒騱橐駝言其負橐囊而䭾物也驘驢種而馬生之也駃騠駿馬也生七日而即超其母騊駼野馬類也生北海驒騱駏驉類也駞徒何反駃音决騠音提騊音陶駼音圖驒音顛又云驒騱野馬也唐虞則山戎夏則獯鬻周則獫狁懿王時德衰侵暴乃及涇陽地今安定平凉郡地並涇水之陽人被其苦至曾孫宣王乃命將討伐至太原稱為中興四夷賔服其後山戎越燕伐齊後又伐燕齊桓公救燕敗走之襄王之時戎狄至雒邑東至衛境侵盗尤甚晉文公乃興師攘却居於西河圁洛之間今洛之上郡銀川之地圁音銀號曰赤翟白翟而晉北有林胡樓煩之戎今郡則樓煩故地燕北有東胡山戎烏桓之先也後為鮮卑各分散谿谷自有君長往往而聚者百有餘戎然不相統一及晉悼公納魏絳之謀和諸戎戎服而晉强晉侯賞魏子金石之樂至安王之時趙襄子踰句注而破之句注山一名西陘山在今鴈門郡洎于戰國趙武靈王變俗胡服習騎射北破林胡樓煩築長城自代傍陰山下至髙闕為塞按漢武帝元朔二年遣衛青渡西河至高闕破匈奴河自今靈武郡之西南便北流千餘里過九原郡乃東流時帝都在秦所謂西河疑是此處其高闕當在河之西今九原郡之西北也而置雲中鴈門代郡其後燕將秦開襲破東胡却千餘里燕亦築長城自造陽至襄平造陽在今嬀川郡之北襄平即遼東所治今安東府置上谷今上谷范陽文安河間媯川等郡漁陽今漁陽宻雲郡右北平今北平郡遼西遼東今安東府地郡以距胡匈奴之先夏氏之後殷代奔北夷至七國時國漸强盛以為鄰敵及秦始皇平天下北却匈奴築長城渡河以隂山為塞隂山今安東府北山海經已有匈奴周書又云正北匈奴以橐駝白玉為獻當時猶微也及秦亂劉項相持之際未遑邊備單于頭曼稍稍渡河南復其故地今洛交安化郡地至冒頓匈奴益强盛盡服從北夷南與諸夏為敵國圍漢髙帝於白登今雲中郡東南帝因婁敬說後妻以宗女公主吕后文帝復通和親其後復大入蕭闗今平涼郡蕭闗縣燒回中宫今扶風郡界於是置細栁棘門霸上三軍以備焉納鼂錯說召人實塞下終景帝時不為大患武帝因王恢議誘單于入塞不克自爾侵盗尤甚衛青霍去病累歳窮討盡徙漠北矣漢境又至于隂山開河西置酒泉等郡今郡以隔絶羗胡遂通西域宣帝時其國亂賢王以下爭立為五單于呼韓邪南移近塞朝漢為藩臣郅支奔康居為甘延夀誅滅成帝時單于又來朝賜以後宫王嬙單于喜甚上書􅂅保塞上谷今媯川郡以西至燉煌請罷邊備塞吏卒以休天子人民郎中侯應習邊事陳十不可及王莽輔政易單于璽曰章改號恭奴單于復大冦盗莽又改號降奴服于發兵屯戌議滿三十萬十道窮追分裂為十五單于嚴尤諌陳五難至後漢建武二十年其國饑疫死耗分為南北單于其南單于欵塞願永為藩蔽扞禦北狄入居雲中今榆林郡單于府地後又移居美稷今西河郡臧宫等上書請滅北匈奴光武務欲息人不許和帝時北單于為竇憲破滅安帝時南單于屢被鮮卑侵掠靈獻之際轉又挫傷魏武帝遂分為五部置於西河離石諸郡今太原西河昌化郡之間劉元海則左賢王之孫而南匈奴種微矣初烏桓漢武帝時霍去病擊匈奴左地因徙於上谷漁陽之間為漢偵察匈奴動静始置護烏桓校尉監統之至後漢漸强盛光武納班彪策又置校尉獻帝以後冦掠轉盛竟為曹公所滅自桓靈之際鮮卑又盛盡有漢北匈奴故地至光和中其帥争立國亂而檀石槐之種魏文帝時為小種鮮卑軻比能破之比䏻明帝以後國亂離散諸部大人慕容拓䟦宇文更盛並稱大號跨有中州焉蠕蠕自拓䟦初徙雲中即有種落後魏太武神䴥中强盛又盡有匈奴故地其主社崘始號可汗猶言皇帝以後常與後魏為敵國明帝熙平以後其國主爭立大亂東西魏之時突厥既强蠕蠕主奔西魏悉被誅滅自蠕蠕衰弱突厥漸盛至西魏大統中大破蠕蠕义盡有匈奴故地其主土門號可汗猶古之單于也北齊後周爭結婚姻傾府藏事之至大邏便沙鉢畧分為二國大邏便之後為西突厥焉隋文帝開皇中本國荒亂其主染干朝隋幷徙種落於朔州及夏勝二州之間朔今馬邑郡夏今朔方郡勝今榆林郡煬帝親幸其部其後始畢可汗圍帝於鴈門因隋亂華人奔湊又更强盛控弦百萬勢陵中夏唐武德中冦原州今平凉郡貞觀初頡利又至渭橋四年李靖滅其國靈州今靈武郡總管張寳相擒頡利獻焉太宗納温彦博之議置其餘種於河南朔北之地其後滋繁分為六州至阿史那元珍叛還故地開元初本落亂又請降復處河南俄又叛去其西突厥自隋開皇中國亂各自為一國大業末西突厥被北突厥所滅北突厥武太后嗣聖初其主黙啜冦定州趙州大殺掠而去自三代以還北狄盛衰可畧而紀其小國者時有侵擾不為大患者則不暇錄焉唯契丹武太后萬歳通天初其帥李盡忠孫萬榮陷營州今栁城郡自稱可汗司農卿麻仁節等二十八將敗於西峽石黄麞谷仁節死焉賊又陷冀州今信都郡刺史陸寳積死之夏官尚書平章事王孝傑率兵十八萬又敗没於東峽石又令御史大夫婁師德率兵二十萬拒之萬榮為家奴所殺其黨遂潰匈奴匈奴先祖夏后氏之裔曰淳維殷時奔北方至周末七國時而與燕趙秦三國為邊鄰趙孝成王使李牧備匈奴善撫士卒以便宜置吏租皆入府幕為士卒費日殺牛享士習騎射謹烽火多間諜約曰匈奴有來入盗者但急自備敢捕虜者斬而匈奴每入􅇏火謹輙入收保不敢戰如是者數歳亦不亡失然匈奴以牧為怯雖趙兵亦以為吾將軍怯邊士日得賞賜而不用皆􅂅一戰於是乃具選車得千三百乘騎萬三千匹彀者十萬彀工豆反張弓弩也悉勒習戰大縱畜牧人衆滿野匈奴小入佯北不勝以數十人委之單于聞之率衆來入冦李牧張左右翼擊大破之殺匈奴十餘萬騎滅襜襤胡也襜處廉反襤魯甘反破東胡降林胡單于奔走十餘歳匈奴不敢近趙邊城後秦滅六國而始皇使䝉恬將數十萬人之衆北擊胡悉逐出塞收河南地渡河以陰山為塞築四十四縣城臨河徙謫戍以充之而通直道自九原至雲陽因邊山險塹谿谷可繕者繕之起臨洮至遼東萬餘里秦之臨洮在和政郡和政縣即長城所起處匈奴單于曰頭曼不勝秦北徙十餘年至秦亂所謫徙戍邊者皆去於是復稍渡河與中國界於故塞今安化延安平凉郡之地後為其太子冒頓以鳴鏑射殺之而自立為單于時秦二世元年遂東襲滅東胡王虜其民衆畜産既歸西擊走月氏南并樓煩白羊河南王樓煩已具前白羊未詳所在疑今朔方新秦等郡之地侵燕代悉復收秦所使䝉恬所奪匈奴地者與漢關故河南塞至朝那膚施朝那今安定郡臨涇縣膚施今延安郡膚施縣是時漢方與項羽距中國罷於兵革故冒頓得自强控弦之士三十餘萬自淳維以至頭曼千有餘歳時大時小别散分離尚矣其世傳不可得而次然至冒頓而匈奴最强大盡服從北夷而南與諸夏為敵國其世姓官號可得而記云單于姓攣鞮氏按後漢史南單于比姓虚連鞮雖相記有異而其音相類其國稱之曰撐犁孤塗單于匈奴謂天為撐犁謂子為孤塗單于者廣大之貌也言其象天單于然也置左右賢王左右谷蠡左右大將左右大都尉左右大當户左右骨都侯匈奴謂賢曰屠耆故常以太子為左屠耆王自左右賢王以下至當户大者萬餘騎小者數千凡二十四長立號曰萬騎其大臣皆世官呼衍氏蘭氏顔師古曰呼衍即今鮮卑姓呼延者是也蘭姓今亦有之其後有須卜氏此三姓者其貴種也諸左王將居東方直上谷以東直當也在今媯川郡之東接濊貊朝鮮右王將居西方直上郡以西今上郡洛交延安咸寧郡之西接氐羗而單于庭直代雲中今雲中單于安邊郡之北各有分地逐水草移徙而左右賢王左右谷蠡最為大國左右骨都侯輔政諸二十四長亦各自置千長百長行長什長禆小王相都尉當户且渠之屬且子余反今沮渠姓蓋本因此官也歳正月諸長少㑹單于庭祠五月大㑹龍城祭其先天地鬼神秋馬肥大㑹蹛林課校人畜計匈奴秋社八月中㑹祭處也蹛者繞也言繞林木而祭也鮮卑之俗自古相傳秋天之祭無林木者尚竪栁枝衆騎馳繞三周乃止此其遺法計者人畜之數蹛音帶其刑法㧞刃尺者死坐盜者没入其家有小罪者軋軋者謂輾轢其骨節若今之厭踝者也大者死獄久者不滿十日一國之囚不過數人而單于朝出營拜日之始生夕拜月其坐長左而北向左者以左為尊日上戊巳其送死有棺槨金銀衣裘而無封樹晉張華日匈奴名塜曰豆落喪服近幸臣妾從死多至數十百人舉事常隨月盛壯以攻戰月虧則退兵其攻戰斬首虜賜一巵酒而所得鹵獲因以與之得人以為奴婢故其戰人人自為趨利善為誘兵以包敵包裏取之故其逐利如鳥之集其困敗則瓦解雲散矣戰而扶轝死者盡得其家財是時漢初定韓王信於代都馬邑匈奴大攻圍馬邑韓信降匈奴匈奴得信因引兵南踰句注攻太原至晉陽下今太原府高帝將兵徃擊之於是冒頓佯敗走誘漢兵漢悉兵三十二萬北逐之高帝先至平城今雲中郡步兵未盡到冒頓果出精兵三十餘萬圍高帝於白登七日白登在平城東南十餘里高帝乃使使間厚遺閼氏冒頓遂引兵去漢亦罷歸是時冒頓兵強數苦北邊帝患之問劉敬敬曰天下初定士卒罷於兵革未可以武服也冒頓殺父妻羣母以力為威未可以信義說也獨可以計久逺子孫為臣矣陛下誠能以長公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代立為單于也何者貪漢重幣也陛下以歳時漢所餘彼所鮮數問遺使辯士諷諭以禮節冒頓在固為子壻死則外孫為單于豈聞外孫敢與大父抗禮哉可無戰以漸臣也高帝曰善使敬往結和親之約敬從匈奴來因言匈奴河南白羊樓煩去長安近者七百里輕騎一日一夜可以至秦中新破少人地肥饒可益實之夫諸侯初起時非齊諸田楚昭屈景莫興今陛下雖都闗中實少人北近胡冦東有六國强族一日有變陛下未得安枕而卧也臣願徙齊諸田楚昭屈景燕趙韓魏後及豪傑名家於闗中無事可以備胡諸侯有變亦足率以東伐此强本弱末之術也帝曰善乃從敬議徙十餘萬口是後冒頓常往來侵盜代地今安邊及馬邑郡之北境是高帝患之乃使劉敬奉宗室女翁主為單于閼氏孝恵高后時冒頓寖驕乃為書使使遺高后詞甚悖慢后大怒召丞相陳平及樊噲季布等議之噲曰臣願得十萬衆橫行匈奴中問布布曰噲可斬也前時匈奴圍高帝於平城漢兵三十二萬噲為上將軍不能解圍天下歌之曰平城之下亦誠苦七日不食不能彀弩今歌吟之聲未絶傷痍者甫起而噲欲揺動天下妄言以十萬衆橫行是面謾也且匈奴譬如禽獸得其善言不足喜惡言不足怒也高后曰善令大謁者報書卑辭答之冒頓得書復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親至孝文即位復修和親其三年夏匈奴右賢王入居河南地為冦徃來入塞捕殺吏卒詔𤼵邊吏車騎八萬詣高奴上郡之縣也擊右賢王右賢王走出塞其明年單于遺漢書言漢邊吏侵侮右賢王右賢王不請不告單于也聽後義盧侯難支等計與漢吏相恨絶二主之約離昆弟之親皇帝讓書再至發使以書報不來漢使不至師古曰謂匈奴再得漢讓書而𤼵使將書以報漢漢留使不得還而漢又更不發使至匈奴也漢以其故不和隣國不附今以少吏之敗約少吏猶言小吏故罰右賢王使至西方求月氏擊之以天之福吏卒良馬力强以滅夷月氐盡斬殺降下定之樓蘭烏孫呼揭及其旁二十六國皆以為匈奴諸引弓之民并爲一家北州以定願寢兵休士養馬除前事復故約以安邊民以應古始使少者得成其長老者得安其處世世平樂未得皇帝之志故使郎中係虖淺奉書請獻橐駝一騎馬二駕二駟皇帝即不欲匈奴近塞則且詔吏民逺舍舍居止也使者至即遣之六月中來至新望之地漢界上塞下之地書至漢議擊與和親孰便公卿皆曰單于新破月氏乘勝不可擊也且得匈奴地澤鹵非可居也和親甚便漢許之冒頓死子稽粥立號曰老上單于漢乃復遣宗人女為翁主妻老上單于為閼氏使宦人中行說傅翁主說不欲行漢强使之說曰必我也為漢患者中行說既至因降單于單于愛幸之初單于好漢繒絮食物中行說曰匈奴人衆不能當漢之一郡然所以强之者以衣食異物無仰於漢也今單于變俗好漢物漢物不過什二則匈奴盡歸於漢矣其得漢繒絮以馳草棘中衣袴皆裂敝以視不如旃裘堅善也得漢食物皆去之以視不如湩酪之便美也於是說教單于左右疏記以計識其人衆牧畜自是之後漢使欲辯論者中行說必窮之日夜教單于侯利害處十四年匈奴十四萬騎入朝那蕭關虜人民畜産甚多遂至彭陽今彭原郡彭原縣燒回中宫候騎至雍今扶風郡縣甘泉漢甘泉宫在今雲陽縣於是文帝𤼵車千乘十萬騎軍長安旁以備胡寇而拜東陽侯張相如為大將軍大發車騎往擊胡單于留塞内月餘漢逐出塞即還不能有所殺匈奴日以驕歳入邊殺掠人民畜産甚衆雲中遼東最甚帝又遺單于書復約和親事時賈誼論邊事曰天下之勢方倒懸凡天子者天下之首蠻夷者天下之足今蠻夷徵令是主上之操也天子共貢是臣下之禮也足反居上首顧居下倒懸如此莫之能解猶為國有人乎古之正義東西南北茍車舟之所逹人跡所至莫不率服而後稱皇今稱號甚羙而實不出長城彼非特不服也又大不敬邊長不寧中長不靜譬如伏虎見便必動臣切料匈奴控弦大率六萬騎五口而出介卒一人五六三十此三十萬口耳未及漢千石大縣也陛下何不立一官置吏以主匈奴雖以千石居之可也令中國日治匈奴日危將必以匈奴之衆為漢臣人制之令千家而為一國處之塞外自隴西延安至遼東各有分地以使邊備月氏灌窳變皆屬之窳音庾其置郡然後罷戌休邊人帝之威德内行外信四荒悅服矣不然數十萬之衆積於北方天下安得食而饋之帝不䏻用後四年老上單于死子軍臣單于立漢復與匈奴和親歳餘匈奴復絶和親大入上郡雲中雲中今單于府榆林郡之地所殺掠甚衆於是漢置三將軍軍長安西細栁渭北棘門霸上以備胡胡騎入代句注邊烽火通於甘泉長安數月是時匈奴强數寇邊上𤼵兵以禦之太子家令鼂錯上言兵事曰臣聞漢興以來胡虜數入邊地小入則小利大入大利竊聞戰勝之威民氣百倍敗兵之卒没身不復自高后以來匈奴三入隴西攻城屠邑歐掠畜産民氣破傷無有勝意今兹隴西之吏頼社稷神靈奉陛下之明詔和輯士卒砥礪其節起破傷之民以當乗勝之匈奴用少擊衆殺一王敗其衆而法曰大有利非隴西之民有勇怯乃將吏之制巧拙異也故兵法曰有必勝之將無必勝之民由此觀之安邊境立功名在於良將不可不擇也今匈奴地形技藝與中國異上下山坂出入谿澗中國之馬弗與也險道傾側且馳且射中國之騎弗與也風雨罷勞饑渴不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎則匈奴之衆易撓亂也勁弩長㦸射疏及逺則匈奴之弓弗能格也堅甲利刃長短相雜遊努往來什伍俱前則匈奴之兵弗能當也材官騎射之官騶發騶謂矢之善者也矢道同的言其妙射則匈奴之革笥以木板為鎧木薦以木板為盾弗能支也下馬地鬭劍㦸交接去就相薄則匈奴之足弗能給也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十萬衆以誅數萬之匈奴衆寡之計以一擊十之術也雖然兵凶器戰危事也以大為小以强為弱在俯仰之間耳今降胡義渠蠻夷之屬來歸義者其衆數千飲食長技與匈奴同可賜之堅甲絮衣勁弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者以陛下之明約將之即有險阻以此當之平地通道則以輕車材官制之兩軍相當表裏各用其長技衡加之以衆衡横此萬全之術也文帝嘉之乃賜錯璽書寵答焉錯復言守邊備塞勸農力本當世急務二事曰胡人衣食之業不著於地其勢易以擾亂邊境何以明之胡人食肉飲酪衣皮毛非有城郭田宅之歸居如飛鳥走獸於廣野羙草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以離南畝也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西北地今彭原安化靈武五原等郡之地以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心救之少發則不足多發逺縣纔至則胡又已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然令逺方之卒守塞一歳而更不知胡人之能不如選常居者家室田作且以備之以便為之高城深塹具藺石布渠荅藺石雷石也可投人渠荅鐵蒺藜也復為一城其内城間百五十歩要害之處通川之道調立城邑無下千家調謂算度之也總計城邑之中令有度千家以上為中周虎落虎落外藩也先為室屋具田器乃募罪人及免徒復作令居之募有罪人及罪人遇赦復作竟其日月者今皆除其罪令居之也不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜高爵復其家予冬夏衣廩食能自給而止郡縣之民得買其爵以自増至卿謂其等級同列卿其無夫若妻者縣官買予之人情非有匹敵不能久安其處塞下之民祿利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半予之言胡人入為寇驅掠漢人及畜産而他人能止得其所驅者令本主以半賞之縣官為贖胡得漢人官為備價贖之其民如是則邑里相救助赴胡不避死非以德上也言非以此事欲立徳義於主上也欲全親戚而利其財也此與東方之戌卒不習地勢而心畏胡者功相萬也上從其言募民徙塞上文帝崩景帝立而趙王遂乃隂使於匈奴吳楚反欲與趙合謀入邊漢圍破趙匈奴亦止自是後景帝復與匈奴和親通闗市給遺單于遣翁主如故約終景帝世時時小入盜邊無大寇武帝即位明和親約束厚遇闗市饒給之匈奴自單于以下皆親漢往來長城下漢使馬邑人聶翁壹姓聶名壹翁老人之稱間䦨出物與匈奴交易謂私出塞交易陽為賣馬邑城以誘單于單于信之而貪馬邑財物乃以十萬騎入武州塞漢伏兵三十餘萬馬邑旁御史大夫韓安國為䕶軍將軍䕶四將軍以伏單于伏兵而待單于也單于既入漢塞未至馬邑百餘里見畜布野而無人牧者怪之乃攻亭時鴈門尉史行徼見寇保此亭漢律近塞郡皆置尉百里一人士史尉史各二人廵行徼塞也單于得尉史欲刺之尉史知漢謀乃具告單于單于大驚曰吾固疑之乃引兵還出曰吾得尉史天也以尉史為天王漢兵約單于入馬邑而縱兵單于不至以故無所得將軍王恢部出代擊胡輜重聞單于還兵多不敢出漢以恢本建造兵謀而不進誅恢自是後匈奴絶和親攻當路塞塞之當行道處者往往入盜於邊不可勝數然匈奴貪尚樂闗市嗜漢財物漢亦通闗市不絶以中之自馬邑軍後五歳之秋漢使四將各萬騎擊胡闗市下將軍衛青得首虜七百人公孫賀無所得公孫敖李廣俱為胡所敗其冬匈奴數千人盜邊漁陽尤甚於是漢使將軍衛青李息出代郡擊胡得首虜數千其明年衛青復出雲中以西至隴西擊胡之樓煩白羊王於河南得胡首虜數千羊百餘萬於是漢遂取河南地築朔方復繕故秦時蒙恬所為塞因河而爲固漢亦棄上谷之斗辟縣造陽地以予胡斗絶也縣之斗曲入匈奴界首其中造陽地也辟讀曰僻是歳元朔二年其年冬軍臣單于死其弟左谷蠡伊穉斜自立為單于攻敗軍臣單于太子於單於單亡降漢漢封於單為陟安侯數月死其年匈奴數萬衆入代郡鴈門明年又入代郡定襄上郡各殺掠數千人匈奴右賢王怨漢奪河南地築朔方數寇盜邊入河南侵擾朔方殺掠吏民甚衆其明年漢遣衛青將六將軍十餘萬人出朔方高闕出塞七百里夜圍右賢王右賢王逃亡漢將軍得右賢王人衆男女萬五千人禆小王十餘人其秋匈奴入代郡殺掠明年春漢遣大將軍衛青將六將軍十餘萬騎仍再出定襄塞數百里擊匈奴得首虜前後萬九千級而漢亦亡兩將軍三千餘騎前將軍翕侯趙信兵不利降匈奴趙信者故胡小王降漢漢封為翕侯單于既得翕侯以為自次王自次者尊重次於單于用其姊妻之與謀漢信教單于益北絶幕直度曰絶以誘罷漢兵徼極而取之徼要也誘令疲要其困極然後取之也毋近塞單于従之其明年胡數萬騎入上谷殺數百人明年春漢使驃騎將軍去病將萬騎出隴西過焉耆山千餘里得胡首虜八千餘級得休屠王祭天金人孟康曰匈奴祭天處本在雲陽甘泉山下秦擊其地後徙之休屠王右地故休屠有祭天金人象也師古曰作金人以為天神之主而祭之即今佛像是其遺法其夏驃騎將軍復與合騎侯數萬騎出隴西北地二千里過居延攻祁連山得胡首虜三萬級禆小王以下十餘人是時匈奴亦來入代郡鴈門殺掠數百人漢使博望侯及李將軍廣出右北平擊匈奴左賢王圍李廣廣盡亡其軍其秋單于怒昆邪王休屠王居西方為漢所殺虜數萬人欲召誅之昆邪休屠王恐謀降漢漢使驃騎將軍迎之昆邪王殺休屠王并將其衆降漢凡四萬餘人號十萬於是漢已得昆邪則隴西北地河西益少胡冦徙闗東貧民處所奪匈奴河南地新秦中以實之新秦解在食貨志而減北地以西戌卒半明年春匈奴入右北平定襄各數萬騎殺掠千餘人其年春漢謀以為翕侯信為單于計居幕北以為漢兵不能至乃粟馬以粟秣馬發十萬騎私負從馬凡十四萬匹私負衣装者及私將馬從者皆非公家𤼵與之限糧重不與焉負戴糧食者令大將軍青驃騎將軍去病中分軍大將軍出定襄驃騎將軍出代咸約絶幕擊匈奴單于聞之逺其輜重以精兵待於幕北與漢大將軍接戰一日㑹暮大風起漢兵縱左右翼圍單于單于自度戰不能與漢兵與猶如也遂獨與壯騎數百潰漢圍西北遁走漢兵夜追之不得行捕斬首虜凡萬九千級且行且捕斬之北至寘顔山趙信城而還趙信所作因以名城單于之走其兵往往與漢軍相亂而隨單于單于久不與其大衆相得右谷蠡王以為單于死乃自立為單于真單于復得其衆右谷蠡乃去號復其故位驃騎之出代二千餘里與左王接戰漢兵得胡首虜凡七萬餘人左王將皆遁走驃騎封於狼居胥山禪姑衍臨翰海而還是後匈奴逺遁而幕南無王庭漢度河自朔方以西至令居往往通渠置田官吏卒五六萬人稍蠶食地接匈奴以北初漢兩大將出圍單于所殺虜八九萬而漢士物故亦萬數漢馬死者十餘萬匹匈奴雖病逺去而漢馬亦少無以復往單于用趙信計遣使好辭請和親天子下其議或言和親或言遂臣之丞相長史任敞曰匈奴新困宜使為外臣朝請於邊漢使敞使於匈奴單于聞敞計大怒留之不遣先是漢亦有所降匈奴使者單于亦輙留漢使相當漢方復收士馬㑹驃騎將軍去病死於是漢久不北擊胡數歳伊穉斜單于立十三年死子烏維立為單于是歳元鼎三年也烏維單于立而漢武帝始出廵狩郡縣其後漢方南誅兩越不撃匈奴匈奴亦不入邊烏維立三年漢已滅兩越遣故太僕公孫賀將萬五千騎出九原二千餘里至浮苴井苴井余反從驃騎趙破奴萬餘騎出令居數千里至匈奴河水水名也去令居千里皆不見匈奴一人而還是時天子廵邊親至朔方勒兵十八萬騎以見武節而使郭吉風告單于曰南越王頭已縣於漢北闕下今單于即能前與漢戰天子自將兵待邊即不能亟南面臣於漢何但逺走亡匿於幕北寒苦無水草之地為單于大怒留吉遷辱之北海上然終不肯為寇於漢邊休養士馬習射獵數使使好辭甘言求和親漢使王烏等闚匈奴匈奴法漢使不去節不以墨黥其面不得入穹廬王烏北地人習胡俗去其節黥面入廬單于愛之陽許曰吾遣太子入質求和親漢使楊信使於匈奴是時漢東拔濊貉朝鮮以為郡而西置酒泉郡以隔絶胡與羗通之路又西通月氏大夏以翁主妻烏孫王以分匈奴西方之援國又北益廣田至眩雷為塞眩雷地在烏孫北眩音縣而匈奴終不敢以為言是歳翕侯信死漢用兵者以匈奴已弱可臣從也楊信為人剛直屈强素非貴臣也單于不親欲召入不肯去節乃坐穹廬外見信信曰即欲和親以單于太子為質於漢單于曰非故約故約漢常遣翁主給繒絮食物有品以和親品謂等差也而匈奴亦不復擾邊今乃欲反古令吾太子為質無幾矣言遣太子為質則匈奴國中所餘者無幾皆當其盡也匈奴俗見漢使非中貴人其儒生以為欲說折其辭辯少年以為欲刺折其氣每漢兵入匈奴匈奴輙報償漢留匈奴使匈奴亦留漢使必得當乃止楊信既歸漢使王烏等如匈奴匈奴復諂以甘言欲多得漢財物紿王烏曰吾欲入漢見天子面結為兄弟王烏歸報漢為單于築邸于長安諸所言者單于特空紿王烏殊無意入漢於是數使竒兵犯漢邊漢乃使郭昌及浞野侯趙破奴屯朔方以東備胡烏維單于立十歳死子詹師廬立年少號兒單于是歳元封六年也是後單于益西北左方兵直雲中右方兵直酒泉燉煌兒單于立漢使兩使一人弔單于一人弔右賢王欲以乖其國單于怒而悉留漢使是歳漢令因杅將軍築受降城時單于年少好殺國中不安左大都尉欲殺單于使人私告漢以兵來即發漢乃築受降城使浞野侯將二萬騎出朔方左大都尉欲𤼵而覺單于殺之𤼵兵擊浞野侯浞野侯併軍没於匈奴兒單于立三歳死子少匈奴乃立其季父烏維單于弟右賢王句黎湖為單于是歳太初三年也句黎湖單于立漢使光祿徐自為出五原塞數百里逺者千里列亭至盧朐山而使游擊將軍韓說長平侯衛伉屯其旁伉衛青子使强弩都尉路博德築居延澤上其秋匈奴大入雲中定襄五原朔方殺略數千人敗數二千石而去行壊光祿所築亭障又使右賢王入酒泉張掖略數千人㑹任文擊救任文漢將擊救者擊匈奴而自救漢人盡復失其所得而去聞貳師將軍破大宛斬其王還單于欲遮之不敢其冬病死句黎湖單于立一歳死其弟左大都尉且鞮侯立為單于漢既誅大宛威振外國天子意欲遂困胡乃下詔曰高皇帝遺朕平城之憂高后時單于書絶悖逆昔齊襄公復九世之讎春秋大之時太初四年也且鞮侯單于初立恐漢襲之盡歸漢使之不降者路充國等於漢單于乃自謂我兒子何敢望漢天子漢天子我丈人行漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也明年漢使貳師將軍將三萬騎出酒泉撃右賢王於天山得首虜萬餘級漢兵物故什六七漢使騎都尉李陵將步兵五千人出居延北千餘里與單于合戰為匈奴所圍陵降匈奴後二歳漢使貳師將軍李廣利及路博德韓說等將兵出鴈門朔方五原匈奴聞悉逺其累重於余吾水北而單于以十萬衆待水南與貳師接戰貳師引去明年且鞮侯單于死立五年長子左賢王立為狐鹿姑單于是歳太始元年也既立六年而匈奴入上谷五原酒泉殺略吏民於是漢遣貳師將軍及商邱成莽通等將兵十四萬出五原西河酒泉單于聞漢兵大出急遣其輜重徙趙信城北邸郅居水左賢王驅其人民度余吾水六七百里單于自將精兵度姑且水又使李陵等將兵追漢軍合戰虜不利引去貳師將出塞匈奴使五千騎要擊漢軍合戰虜兵壊散漢軍乘勝逐北至范夫人城匈奴奔走莫敢距㑹貳師妻子坐蠱收聞之憂懼欲深入要功遂北渡郅居水單于知漢軍勞倦自將五萬要遮貳師貳師軍敗降匈奴自貳師没後漢新失大將軍士卒數萬人不復出兵三歳武帝崩前此漢兵深入窮追二十餘年匈奴孕重隋殰罷極苦之孕重懐任者也堕落也殰敗也音讀罷讀作疲極困也苦之心厭苦也自單于以下常有欲和親計㑹病死初單于有異母弟為左大都尉賢國人嚮之母閼氏恐單于不立子而立左大都尉也乃私使殺之左大都尉同母兄怨遂不肯復㑹單于庭又單于病且死謂諸貴人我子少不能治國立弟右谷蠡王及單于死衛律等與顓渠閼氏謀匿單于死詐撟單于令撟與矯同與貴人飲盟更立子左谷蠡王為壺衍鞮單于是歳始元二年也壺衍鞮單于既立風漢使者言欲和親左賢王右谷蠡王以不得立怨望率其衆欲南歸漢恐不能自致即脅盧屠王欲與西降烏孫謀擊匈奴盧屠王告之單于使人驗問右谷蠡王不服反以其罪罪盧屠王國人皆寃之於是二王去居其所未嘗肯㑹龍城各居其本處不復㑹龍城祭後二年秋匈奴入代殺都尉單于年少初立母閼氏不正國内乖離常恐漢兵襲之於是衛律為單于謀穿井築城治樓以藏榖與秦人守之秦時人有亡入匈奴者子孫尚號秦人漢兵至無奈我何即穿井數百伐材數千或曰胡人不能守城是遺漢糧也衛律於是止乃歸漢使不降者蘇武馬宏等欲以通善意時單于立三歳矣明年匈奴發左右部二萬騎為四隊並入邊為寇漢兵追之斬首虜九千人生得甌脫王漢無所失亡匈奴見甌脫王在漢恐以為道擊之即西北逺去不敢南逐水草𤼵人民屯甌脫明年復遣九千騎屯受降城以備漢北橋余吾令可度於余吾水上作橋以備奔走時匈奴兵數困國益貧欲和親而恐漢不聽故不肯先言常使左右風漢使者然其侵盗益希遇漢使愈厚欲以漸致和親漢亦覊縻之明年匈奴使犁汙王窺邊言酒泉張掖兵益弱出兵試擊冀可復得其地時漢先得降者聞其計天子詔邊警備後無幾右賢王犁汙王四千騎無㡬言不多時也分三隊入日勒屋蘭番和皆張掖縣也張掖太守屬國都尉𤼵兵擊大破之是後匈奴不敢入張掖其明年匈奴三千騎入五原殺略數千人時漢邊郡烽火候望精明匈奴為邊寇者少利希復犯塞其後以兵擊烏孫取車延惡師地烏孫公主上言㑹昭帝崩宣帝即位烏孫昆彌上書言連為匈奴所侵削願發國半精兵盡力撃匈奴唯天子出兵哀救公主本始二年漢大發闗東輕銳士遣田廣明范明友韓増趙充國田順等五將軍兵十餘萬騎出塞各二千里烏孫西域昆彌從西方入與五將軍凡二十餘萬衆匈奴聞漢兵大出老弱奔走敺畜産逺遁是以五將軍少所得校尉常恵與烏孫兵至右谷蠡庭獲匈奴父行及嫂居次名王犁汙都尉千長騎將以下三萬九千餘級虜馬牛羊驢驘橐駝七十餘萬漢封恵為長羅侯然匈奴民衆死傷而去者及畜産逺移死亡不可勝數於是匈奴遂衰耗怨烏孫其冬單于自將數萬騎擊烏孫頗得老弱欲還㑹天大雨雪一日深丈餘人畜凍死回者不能什一於是丁令乗弱攻其北烏桓入其東烏孫擊其西凡三國所殺數萬計馬數萬匹牛羊甚衆又重以饑死人民死者什三畜産什伍匈奴大虚弱諸國覊縻者皆瓦解攻盜不能理其後漢出三千餘騎為三道並入匈奴捕虜得數千人還匈奴終不敢取當當者報其直滋欲向和親而邊境省事矣壺衍鞮單于立十七年死弟左賢王立為虚閭權渠單于是歳地節二年也時匈奴不能為邊寇於是漢罷外城以休百姓外城塞外諸城是歳匈奴饑人民畜産死十六七又發兩屯各萬騎以備漢其明年西域城郭共擊匈奴取車師國得其王及人衆而去單于復以車師王昆弟兜莫為車師王收其餘民東徙不敢居故地而漢益遣屯士分田車師地以實之匈奴遣六千騎擊漢之田車師者不能下虚閭權渠單于立九年死是歳神爵二年也乃立右賢王屠耆堂為握衍胊鞮單于既立二歳暴虐殺伐國中不服其姑夕王與烏禪幕及左地貴人共立稽侯㹪虚閭權渠單于之子為呼韓邪單于發左地兵四五萬人西擊握衍朐鞮單于握衍胊鞮單于與戰兵敗恚而自殺其民衆盡降呼韓邪單于呼韓邪謀殺右賢王右賢王乃與都隆竒共立日逐王薄胥堂為屠耆單于發兵襲呼韓邪單于呼韓邪兵敗走時西方呼揭王來與唯犁當户共讒右賢王屠耆單于殺右賢王後知其寃復殺唯犁當户於是呼掲王恐乃畔去自立為呼揭單于右奥鞬王聞之即自立為車犁單于烏籍都尉亦自立爲烏籍單于凡五單于既而車犁烏籍為屠耆所擊敗烏籍呼掲皆去單于號共尊輔車犁單于屠耆擊車犁車犁敗走其明年呼韓邪撃屠耆屠耆兵敗自殺屠耆少子右谷蠡亡歸漢車犁東降呼韓邪文獻通考卷三百四十
