body:
  text: 文獻通考卷九十三鄱陽馬端臨貴與著宗廟考三天子宗廟宋武帝即尊位祠七代為七廟永初追尊皇考晉陵郡功曹翹即武帝父晉陵本郡為孝皇帝皇妣趙氏為穆皇后三年孝懿蕭皇后崩又祔廟高祖崩神主升廟猶昭穆之序如魏晉之制虚太祖之位文帝元嘉初追尊所生胡媫妤為章皇太后立廟於太廟西其後孝武昭太后明帝宣太后並祔章太后廟齊高帝追尊父為宣皇帝右軍將軍承之母為昭皇后七廟蕭子顯曰晉用王肅之議以文景為共代上至征西其實六也尋此意非以兄弟為後當以立主之義可容於七室及楊元后崩征西之廟不毁則知不以元后為代數廟有七室數盈八主晉太常賀循立議以後弟不繼兄故代必限七主無定數宋臺初立五廟以臧后為代室就禮而求亦親廟四矣若據伊尹之言必及七代則子昭孫穆不列婦人若依鄭元之說廟有親稱妻者言齊豈或濫享且閟宫之徳用七非數開元之祀晉八無傷今謂之七廟而止唯六祀使受命之君流光之典不足若謂太祖齊登則昭穆之數何繼斯故禮官所宜詳也梁武帝受禪遷神主於太廟為三昭三穆凡六廟追尊皇考為文皇帝丹陽尹順之皇妣為徳皇后廟號太祖皇祖以上皆不追尊擬祖遷於上而太祖之廟不毁與親廟為七皆同一堂共庭而别堂陳依梁制七廟如禮初文帝入嗣而皇考始興昭烈王廟在始興國謂之東廟天嘉中徙神主祔於梁之小廟改曰國廟祭用天子儀後魏之先居於漠北鑿石為祖宗之廟於烏洛侯國西北明元帝永興四年立太祖道武帝廟於白登山嵗一祭具太牢帝親奉無常月又於白登西太祖舊遊之處立昭成獻明太祖廟常以九月十月之交帝親祭牲用馬牛羊又親行貙劉之禮孝文太和三年六月親謁七廟時羣官議曰大魏舊事多不親謁今陛下孝誠發中思親執祀謹按舊章集為親拜之儀制可十五年四月改營太廟詔曰祖有功宗有徳後者不得擅祖宗之名居二祧之廟今述遵先志宜制祖宗之號烈祖有創業之功代祖有開拓之徳宜為祖宗百代不遷而逺祖平文功未多於昭成然廟號為太祖道武建業之勲高於平文廟號為烈祖比校似為未允朕今奉遵道武為太祖顯祖為二祧餘皆以次而遷平文既遷廟唯有六如今七廟一則無主唯當朕躬此事亦臣子所難言朕以不徳忝承洪緒若宗廟之靈獲全首領以沒於地為昭穆之次心願畢矣必不可先設可垂文示後司空長樂王穆亮等奏言升平之會事在於今推功考徳實如明㫖但七廟之祀備行日久無宜闕一虚有所待臣等愚謂依先尊祀可垂文示後理𠂻如此不敢進言八月詔郡國有時果可薦者並送京師以供廟享其白登山雞鳴山廟唯遣有司行事十一月釋禫祭太和廟帝袞冕與祭者朝服丁卯遷廟之神主於太廟百官陪從奉神主於齋車至新廟有司升神主於太廟諸侯王牧守蕃附等各以其職來祭十月詔先王制禮經綸萬代白登廟者有為而興昭穆不次太祖有三層之宇已降無方丈之室又常用季秋躬駕䖍祀今授衣之月享祭明堂立冬之始奉烝太廟若復齋白登便為一月再駕緬詳二理謂宜省一可廢東山之祀成此二享之敬可勅有司但命内典神者攝行祭事獻明道武各有廟稱可具依舊式自太宗諸帝昔無殿宇因停之十九年遷都洛邑二月詔曰太和廟已就神儀靈主宜時奉寧可剋五月奉遷於廟其出金墉之儀一准出代都太和之式入新廟之典可依近至金墉之􅁤其威儀鹵簿如出代廟百官奉遷宜可省之但令朝官四品以上侍官五品以上宗室奉迎北齊文宣帝受禪置六廟獻武以下不毁以上則遞毁並同廟而别室既而遷神主於太廟文襄文宣並太祖之子文宣初疑其昭穆之次欲别立廟衆議不同至二年秋始祔太廟五祭同梁制後周閔帝受禪而告宗廟追尊皇祖為徳皇帝名肱生泰父文王為文皇帝廟號太祖太師周國公名泰擬祖以上三廟遞遷至太祖不毁其下相承置二穆為五焉明帝崩廟號代宗武帝崩廟號高祖並為祧廟不毁隋文帝受命遣兼太保宇文善奉策詣同州告皇考桓王廟兼用女巫同家人禮追尊號為武元皇帝大司空名忠皇妣為元明皇后迎神歸於京師改立左宗廟未言始祖又無受命之祧自高祖以下置四親廟同殿異室一皇高祖太原府君廟二皇曾祖康王廟三皇祖獻王廟四皇考太祖武元皇帝廟擬祖遷於上而太祖之廟不毁煬帝立七廟太祖各一殿准周文武二祧與始祖為三餘並分室而祭始及祧之外從迭毁之法時禮部侍郎許善心等議按周制自太祖以下各别立廟至於禘祫皆食於太祖是以前漢亦随處而立後漢光武新平宼亂務從省約乃􅄣立一堂而羣主異室自此以來因循不變請立七廟詔可既營洛邑後有司奏請於東京建立宗廟帝謂祕書監柳􅔝曰今始祖及二祧已具令後子孫處何所又下詔准議别立高祖之廟属有行役復寢唐高祖武徳元年追尊高祖曰宣簡公曾祖曰懿王祖曰景皇帝考曰元皇帝立四廟於長安通義里備法駕迎四世祔於太廟太宗貞觀九年高祖崩增脩太廟中書侍郎岑文本議曰祖鄭元者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辨是非紛而不定春秋榖梁傳及禮記王制祭法禮器孔子家語並云天子七廟諸侯五廟大夫三廟士一廟尚書咸有一徳曰七世之廟可以觀徳至於孫卿孔安國劉歆班彪父子孔昆虞憙干寳之徒商較今古咸以為然故其文曰天子三昭三穆與太祖之廟而七是以晉宋齊梁皆依斯義立親廟六豈有國之茂典不刋之休烈乎然若使違羣經之正說從累代之疑議背子雍之篤論遵康成之舊學則天子之禮下逼於人臣諸侯之制上僭於王者非所謂尊卑有序名位不同者也臣等參詳請依晉宋故事立親廟六其祖宗之制式遵舊典制從之於是增脩太廟始崇𢎞農府君及高祖神主并舊四室為六室太宗崩遷𢎞農府君神主於夾室太宗神主祔太廟初有司請依典禮上欲留神主於内寢旦夕申如在之敬有詔停祔廟英國公李勣等請曰竊以祖功宗徳帝王之明典武穆文昭嚴配之洪訓愛敬之至率由茲道禮有節文事經列聖茍違斯義家國貽恥况逾月之外須申大祫下管登歌發揚雅頌郊天配帝光華勲烈如停祔禮諸美咸棄伏願取法前王垂訓翼子乃許焉高宗崩神主祔太廟又遷宣皇帝神主於夾室武太后垂拱四年於東都立高祖太宗高宗三廟四時享祀如京廟之制别立崇先廟以享武氏祖考武氏革命稱帝改唐西京太廟為享徳廟四時惟享高祖以下三室餘四室閉其門廢享祀之禮又於東都改制太廟為七室祔武氏七代神主又改西京崇先廟為崇尊廟其享祀如太廟之儀中宗神龍元年改享徳廟依舊為京太廟遷武氏七廟於西京崇恩廟東都太廟以景皇帝為太祖廟崇六室時太常博士張齊賢建議曰始封之君謂之太祖太祖之廟百代不遷商之元王周之后稷是也但商自元王以後十有四代至湯而有天下周自后稷以後十有七代至武王而有天下其間代數既逺遷廟親皆出太祖之後故得合食有序尊卑不差其後漢高受命無始封祖即以高祖皇帝為太祖魏武創業文帝受命亦以武帝為太祖晉宣創業武帝受命亦以宣帝為太祖宇文以文皇帝為太祖隋室以武元皇帝為太祖國家景皇帝始封唐公實為太祖中間代數既近列在三昭三穆之内故皇家太廟唯有六室其𢎞農府君宣光二帝尊於太祖親盡則遷不在昭穆合食之數奉勅七室以下依舊號尊崇續又奉勅既立七廟須尊崇始祖速令詳定者伏尋禮經始祖即太祖太祖之外更無始祖後周太祖之外以周文王為始祖不合禮經或有引白虎通義云后稷為始祖文王為太祖武王為太宗及鄭元註詩序云太祖謂文王以為說者其義不然何者彼以禮王者祖有功而宗有徳周人祖文王而宗武王以謂文王為太祖耳非祫祭羣主合食之太祖今議者或有欲立涼武昭王為始祖者殊為不可何者昔在商周稷卨始封湯武之興祚由稷卨故以為太祖即皇家之景帝是也涼武昭王勲業未廣後主失守國土不𫝊景皇始封實夲明命今乃捨封唐之盛烈崇西涼之逺構求之前古實乖典禮魏氏不以曹參為太祖晉氏不以殷王卬為太祖宋氏不以楚元王為太祖齊梁不以蕭何為太祖陳隋不以胡公楊震為太祖則皇家安可以涼武昭王為太祖乎漢之東京大議郊祀多以周郊后稷漢當郊堯唯杜林議獨以為周室之興祚由后稷漢業特起功不縁堯祖宗故事所宜因循竟從林議又𫝊稱欲知天上事問長人以其近之武徳貞觀之時去涼武昭王蓋亦近於今矣當時不立者不可立故也今既年代寖逺方復立之實恐景皇失職而震怒武昭虚位而不答非社稷之福也請准勅加太廟為七室享宣皇帝以備七代其始祖不合别有尊崇太常博士劉承慶議曰夫太祖以功建昭穆以親崇有功百代而不遷親盡七葉而當毁或以太祖代淺廟數非備更於昭穆之上逺立合遷之君曲從七廟之文深乖迭毁之制景皇帝濬徳基唐代數猶近號雖崇於太祖親尚烈於昭穆且臨六室之位未申七代之尊是知太廟當六未合有七故先朝唯有宣光景元神堯文武六代親廟太帝登遐神主升祔於廟室以宣皇帝代數當滿准禮復遷今止有光皇帝以下六代親廟非是天子之廟數不當有七夲由太祖有逺近之異故初建有多少之殊宣皇既非始祖又廟無祖宗之號親盡既遷其廟不合重立恐違王制之文不合先朝之㫖光崇六室不虧古義時有制令宰臣更加詳定禮部尚書祝欽明等奏言張齊賢以始同太祖不合更祖昭王劉承慶以王制三昭三穆不合重崇宣帝臣等商量請依張齊賢以景皇帝為太祖依劉承慶尊崇六室制從之睿宗即位廢武氏崇恩廟元宗開元五年太廟四室壊上素服避正殿時上將幸東都以問宋璟蘇頲對曰陛下三年之制未終遽爾行幸恐未契天心災異為戒願益停車駕又問姚崇對曰太廟屋材皆苻堅時物嵗久朽腐而壊適與行期相會何足異也且王家以四海為家陛下以闗中不稔幸東都百官供擬已備不可失信但應遷神主於太極殿更脩太廟如期自行耳上大喜從之右散騎常侍褚無量上言隋文帝富有天下遷都之日豈取苻氏舊材以立太廟乎此特諛臣之言耳願陛下克謹天戒納忠諫逺諂諛上弗聽開元十年制創立太廟九室獻祖懿祖太祖世祖髙祖太宗中宗睿宗先時以孝敬皇帝為義宗祔於廟由是為七室而京太廟亦七室中宗崩中書令姚元之吏部尚書宋璟以謂義宗追尊之帝不宜列昭穆而其𦵏在洛州請立别廟於東都而有司時享其京廟神主蔵於夾室由是祔中宗而光皇帝不遷遂為七室矣睿宗崩博士陳貞節蘇獻等議曰古者兄弟不相為後殷之盤庚不序於陽甲漢之光武不嗣於孝成而晉懐帝亦繼世祖而不繼恵帝蓋兄弟相代昭穆位同至其當遷不可兼毁二廟荀卿子曰有天下者事七世謂從禰以上也若傍容兄弟上毁祖考則天子有不得事七世者矣孝和皇帝有中興之功而無後宜如殷之陽甲出為别廟祔睿宗以繼髙宗於是立中宗廟於太廟之西開元十年詔宣皇帝復祔於正室諡為獻祖并諡光皇帝為懿祖又以中宗還祔太廟於是太廟為九室致堂胡氏曰范祖禹有言書云七世之廟可以觀徳則天子七廟自古而然也其祖宗有功徳而其廟不毁則無世數商之三宗周之文武是也然則三昭三穆之外猶足以祖有功而宗有徳矣明皇始為九廟何所取乎夫先覺君子皆以漢儒祖有功宗有徳之論為非曰子孫於祖考無選擇而事之之義是故天子七廟而已矣有祧焉不患其數盈也有禘焉不患其乏饗也今既以九廟為非而有功徳之廟不毁則九亦安足以盡之文武固造周者以功而論則成康身致太平刑措不用亦豈可毁邪是故宗廟之禮由子孫不忘而建不忘者仁也或七廟或五廟或三廟者禮也其有功徳無功徳非子孫所當祔祧而隆殺之也名之曰幽厲非子孫所當回隠而遷改之也一斷以先王之禮無敢損益於其間是則禮之盡也七世之廟可以觀徳者吉㐫善惡皆以是觀之云耳代宗崩禮儀使顔真卿議太祖髙祖太宗皆不毁而世祖元皇帝當遷於是遷元皇帝而祔代宗徳宗建中元年三月禮儀使上言東都太廟闕木主請造以祔初武后於東都立髙祖太宗髙宗三廟至中宗以後兩京太廟四時並饗至徳宗亂後木主多亡闕未祔於是議者紛然而大㫖有三其一曰必存其廟遍立羣主時享之其二曰建廟立主存而不祭若皇輿時廵則就饗焉其三曰存其廟瘞其主駕或東幸則飾齋車奉京師羣廟之主以往議皆不決而罷貞元十五年四月膳部郎中歸崇敬上疏曰東都太廟不合置木主謹按典禮虞主用桑練主用栗重作栗主則埋桑主所以神無二主猶天無二日土無二王今東都太廟是則天皇后所建以置武氏木主中宗去其主而存其廟蓋將以備行幸遷都之制也且殷人屢遷前八後五其後遷都一十三度不可每都别立神主也議者或云東都神主已曾䖍奉而禮之豈可一朝廢之乎虞祭則立桑主而䖍祀練祭則立栗主而埋桑主豈桑主不曾䖍祀而乃埋之又所闕之主不可更作作之不時非禮也天寳末兩都傾陷神主亡失肅宗既克復但建廟作主於上都其東都太廟毁為軍營九室神主失亡大歴間始於人間得之遂寓於太㣲宫不復祔饗自建中至於會昌議者不一或以為東西二京宜皆有廟而舊主當瘞虚其廟以俟廵幸則載主而行或謂宜蔵神主於夾室或曰周豐洛有廟者因遷都乃立廟爾今東都不因遷而立廟非也又曰古者載主以行者惟新遷一室之主耳未有載羣廟之主者也至武宗時悉廢羣議詔有司擇日脩東都廟已而武宗崩宣宗竟以太微神主祔東都廟焉徳宗崩禮儀使杜黄裳議髙宗在三昭三穆外當遷於是遷髙宗而祔徳宗葢以中睿為昭穆矣順宗崩當遷中宗而有司疑之以為則天革命中宗中興之主也博士王涇史官蔣武皆以為中宗得失在己非漢光武晉元帝之比不得為中興不遷之君由是遷中宗而祔順宗文宗開成五年禮儀使奏謹按天子七廟祖功宗徳不在其中國朝制度太廟九室伏以太廟景皇帝受封於唐髙祖太宗創業受命有功之主百代不遷今文宗皇帝升祔有時代宗皇帝是親盡之祖禮合祧遷每至祔祫合食如常勅㫖敬依典禮自憲宗穆宗敬宗文宗四世祔廟睿元肅代以次遷至武宗崩徳宗以次當遷而於世次為髙祖禮官始覺其非以謂兄弟不相為後不得為昭穆乃議復祔代宗而議者言已祧之主不得復入太廟禮官曰昔晉元明之世已遷豫章潁川後皆復祔此故事也議者又言廟室有定數而無後之主當置别廟禮官曰晉武帝時景文同廟廟雖六代其實七主至元帝明帝廟皆十室故賀循曰廟以容主為限而無常數也於是復祔代宗而以敬宗文宗武宗同為一代初元宗之復祔獻祖也詔曰使親而不盡逺而不祧蓋其率意而言爾非夲於禮也而後之為說者乃遷就其事以謂三昭三穆與太祖祖功宗徳三廟不遷為九廟者周制也及敬文武三宗為一代故終唐之世常為九代十一室焉武宗會昌五年七月中書門下奏孟州汜水縣武牢闗是太宗擒王世充竇建徳之地闗城東峰有髙祖太宗像在一堂之内伏以山河如舊城壘猶存威靈皆畏於軒臺風雲疑還於豐沛誠宜百代嚴奉萬邦所瞻西漢故事祖宗所嘗行幸皆令郡國立廟今縁定覺寺例合毁拆望取寺中大殿材木於東峰改造一殿四面兼置垣墻伏望號為昭武廟以昭聖祖武功之盛興功日望令差東都分司郎官一人薦告至畢功日别差使展敬制可王者大勲備於率土宗社之典敬而不私郡國立廟非古也僖宗中和元年黄巢犯闕僖宗避狄於成都夏四月有司請享太祖已下十一室詔公卿議之太常卿牛藂與儒者議其事或曰王者廵狩以遷廟主行如無遷廟之主則祝史奉幣帛皮珪告於祖廟遂奉以出載於齋車每舍奠焉今非廵狩是失守宗廟則當罷宗廟之事藂疑之將作監王檢太子賔客李匡乂虞部員外郎袁皓建議異同及左承崔厚為太常卿遂議立行廟以元宗幸蜀時道宫元元殿之前架幄幕為十一室又無神主題神版位而行事達禮者非之明年乃特造神主祔於行廟梁太祖開平元年初受禪立四廟於京師後唐莊宗同光二年太常禮院奏國家興建之初已於北都置廟今尅復天下遷都洛陽却復夲朝宗廟按禮無二廟之文其北都宗廟請廢從之閔帝應順元年中書門下奏太常以大行山陵畢祔廟今太廟見享七室髙祖太宗懿宗昭宗獻祖太祖莊宗太行升祔禮合祧遷獻祖下尚書省集議從之時議者以懿祖賜姓於懿宗以支庶繫太宗例宜以懿為始祖次昭宗可也不必祖神堯而宗太宗若依漢光武則宜於代州立獻祖而下親廟其唐廟依舊禮行之可也而議諡者忘咸通之懿宗又稱懿祖父子俱懿於理可乎將朱耶三世與唐室四廟連敘昭穆非禮也議祧者不知受氏於唐懿宗而祧之今又及獻祖以禮論之始祧昭宗次祧懿祖可也而懿祖如唐景皇帝豈可祧乎晉髙祖天福二年中書門下奏皇帝到京未立宗廟所司請立髙祖以下四親廟其始祖一廟未敢輕議令都省百官集議御史中丞張昭議曰臣讀十四代史書見二千年故事觀諸家宗廟都無始祖之稱唯殷周二代以稷契為太祖禮記曰天子七廟三昭三穆與太祖之廟而七鄭元註云此周制也七者太祖后稷及文王武王與四親廟又曰殷人六廟契及成湯與二昭二穆也夏后氏立五廟不立太祖唯禹與二昭二穆而已據王制鄭元所釋即殷周以稷契為太祖夏后氏無太祖亦無追諡之廟自殷周已來時更十代皆於親廟之中以有功者為太祖無追崇始祖之例具引今古即恐詞繁事要證明須陳梗槩漢以髙祖父太上皇無社稷功不立廟號髙帝自為髙祖魏以曹公相漢垂三十年始封於魏故為太祖晉以宣王輔魏有功立為髙祖以景帝始封於晉故為太祖宋氏先世官閥卑微雖追崇帝號劉裕自為髙祖南齊髙帝之父位至右將軍生無封爵不得為太祖高帝自為太祖梁武帝父順之佐佑齊室封侯位至領軍丹陽尹雖不受封於梁亦為太祖陳武帝父文讚生無名位以武帝有功梁室贈侍中封義興公及武帝即位亦追為太祖周閔帝以父泰相西魏經營王業始封於周故為太祖隋文帝輔周室有大功始封於隋故為太祖唐髙祖神堯祖父虎為周大柱國隋代追封唐公故為太祖唐末梁室朱氏有帝位亦立四廟朱氏先世無名位雖追册四廟不立太祖朱公自為太祖此則前代追册太祖不出親廟之成例也王者祖有功而宗有徳漢魏之制非有功徳不得立為祖宗殷周受命以稷契有大功於唐虞之際故追尊為太祖自秦漢之後其禮不然雖祖有功仍須親廟今亦粗言往例以取證明秦稱造父之後不以造父為始祖漢稱唐堯劉累之後不以堯累為始祖魏稱曹參之後不以參為始祖晉稱趙將司馬卬之後不以卬為始祖宋稱漢楚元王之後不以元王為始祖齊梁皆稱蕭何之後不以蕭何為始祖陳稱太邱長陳實之後不以實為始祖元魏稱李陵之後不以陵為始祖後周稱神農之後不以神農為始祖隋稱楊震之後不以震為始祖唐稱臯陶老子之後不以臯陶老子為始祖唯唐髙宗則天武后臨朝革唐稱周便立七廟仍追册周文王姬昌為始祖此蓋當時附麗之徒不諳故實武立姬廟乖越已甚曲臺之人到今嗤誚臣逺觀秦漢下至周隋禮樂衣冠聲明文物未有如唐室之盛武徳議廟之初英才間出如温魏顔虞通今古封蕭薛杜達禮儀制度憲章必有師法夫追先王先母之儀起於周代據史記及禮經云武王纉太王王季文王之緒一戎衣而有天下尊為天子宗廟享之周公成文武之徳追王太王王季祀先公以天子之禮又曰郊祀后稷以配天據此言之周武雖祀七世追為王號者但四世而已故自東漢以來有國之初多崇四廟從周制也况殷因夏禮漢習秦儀無勞博訪之文宜約已成之制請依隋唐有國之初創立四廟推四世之中名位髙者為太祖謹議以聞勅宜令尚書省集議聞奏乃倣唐朝舊例追尊四廟天福十二年時漢髙祖已即位尚仍天福之號太常博士叚顒奏請立髙曾祖禰四廟更上追逺祖光武皇帝為百代不遷之廟居東向之位吏部尚書竇正固等議古者四親廟之外祖功宗徳不拘定數今除四親廟外更請追尊髙皇帝光武皇帝共立六廟從之按後唐晉漢皆出於夷狄者也莊宗明宗既捨其祖而祖唐之祖矣及敬塘知逺崛起而登帝位俱欲以華胄自詭故於四親之外必求所謂始祖者而祖之張昭之言議正而詞偉矣至漢初則叚顒竇正固之徒曲為謟附乃至上祖髙光以為六廟然史所載出自沙陀部之說固不可掩也竟何益哉周太祖廣順元年有司議立四親廟從之宋太祖皇帝建隆元年有司請立宗廟詔下其議兵部尚書張昭等奏謹按堯舜禹皆立五廟蓋二昭二穆與其始祖商建六廟蓋昭穆之外祀契與湯周立七廟蓋親廟之外祀太祖及文武漢初立廟悉不如禮魏晉始復七廟之制江左相承不改然七廟之中猶虗太祖之室隋文但立髙曾祖禰四廟而已唐因隋制立四親廟梁氏而下不易其法稽古之道斯為折衷伏請追尊髙曾四代號諡崇建廟室奏可判太常寺竇儼奏議皇髙祖文安府君請上尊號曰文獻皇帝廟號僖祖陵號欽陵皇曾祖中丞府君請上尊諡曰恵元皇帝廟號順祖陵號康陵皇祖驍衛府君請上尊號曰簡恭皇帝廟號翼祖陵號定陵皇考周龍㨗左廂都指揮使太尉府君請上尊諡曰昭武皇帝廟號宣祖陵曰安陵皇髙祖妣崔氏請上尊諡曰文懿皇后皇曾祖妣桑氏請上尊號曰惠明皇后皇祖妣京兆郡太夫人劉氏請上尊號曰簡穆皇后詔從之九月丙午上御崇元殿備禮册四親廟奉安神主行上諡之禮二年祔明憲皇后杜氏神主於宣祖室太宗太平興國二年正月有司言按唐制長安太廟凡九廟同殿異室其制二十一間皆四柱東西夾室各一前後面各三階東西各三側階國朝太廟四室室三間今太祖升祔共成五室請依長安之制東西留夾室外餘十間分為五室室二間從之四月己卯奉神主祔廟以孝明皇后王氏配仍置尊號册寳於室内真宗咸平元年三月詔議太祖廟號禮官請與太宗合祭同位異坐太祖位仍稱孝子從之判太常禮院李宗訥等言伏見僖祖稱曾髙祖太祖稱伯父懿恵明簡穆昭憲皇后並稱祖妣孝明孝恵孝章皇后並稱伯妣按爾雅有考妣王父母曾祖王父母髙祖王父母及世父之别以此觀之唯父母得稱考妣今請僖祖止稱廟號順祖而下即依爾雅之文事下尚書省集官議定戸部尚書張齊賢等上言王制曰天子七廟謂三昭三穆並太祖之廟而七前代或有兄弟繼及亦移昭穆之列是以漢書為人後者為之子所以尊夲祖而重正統也又禮云天子絶朞䘮安得宗廟中有伯氏之稱乎其唐朝及五代有稱者蓋禮官之失非正典也請自今有事於太廟則太祖並諸祖室稱孝孫孝曾孫嗣皇帝太宗室稱孝子嗣皇帝其爾雅考妣王父之文夲不謂宗廟言也歴代既無所取於今亦不可行詔禮官别加詳定禮官言按春秋左氏傳文公二年躋魯僖公正義云禮父子異昭穆兄弟昭穆同此明閔僖弟兄繼統同為一代又魯隠桓繼及皆當穆位江都集禮晉建武中恵懐二主兄弟同位異坐尚書盤庚有商及王史記云陽甲至小乙兄弟四人相承故不稱嗣子而曰及王明不繼兄之統也唐中宗睿宗皆處昭位恭宗文宗武宗昭穆同為一世伏請僖祖室止稱廟號后曰祖妣順祖室曰髙祖后曰髙祖妣翼祖室曰皇祖考后曰皇祖妣祝文稱孝孫太祖室曰皇伯考妣太宗室曰皇考妣每大祭太祖太宗昭穆同位祝文並稱孝子其别廟稱謂亦請依此詔都省復集兩制丞郎參議以聞既而都省上議伏以古者祖有功宗有徳皆先有其實而後正其名今太祖受命開基太宗纘承大寳則百世不祧之廟矣豈有祖宗之廟已分二世昭穆之位翻同一代如臣等前議引漢書云禮為人後者為之子以正父子之道以定昭穆之義則至公而無疑也必若同為一代則是太宗不得自為世數也不得自為世數則何以得為宗乎不得為宗則何以得為百世不祧之主乎又云春秋正義禮子父異昭穆兄弟昭穆同亦不言昭穆不可異此又不可為證也今若序為六世以一昭一穆言之則上無毁廟之嫌下有善繼之羙於禮為大順於時為合宜何嫌而謂不可乎翰林學士宋湜等又言三代而下兄弟相繼則多昭穆異位未之見也况古之鴻儒賀循温嶠之徒議其事者衆甚今詳都省所議皇帝於太祖廟室稱孝孫臣竊疑焉欲望重下有司審加詳定詔令禮官再討典故禮官言按禮記祭統曰祭有昭穆者所以别父子逺近長幼親疎之序而無亂也公羊傳公孫嬰齊為兄歸父之後春秋謂之仲嬰齊何休云弟無後兄之義為亂昭穆之序失父子之親故不言仲孫明不以子為父孫晉賀循議兄弟不合繼位昭穆云商人六廟親廟四並契湯而六比有兄弟四人相襲為君者便當上毁四廟乎如此四世之親盡無復祖禰之神矣又商紀成湯為君合十二代而正代唯六易乾鑿度曰商帝乙六世王也以此言之明兄弟不為正代也温嶠議兄弟相繼蔵主室之事云若以一帝為一世則當不得祭於禰乃不及庶人之祭也夫兄弟同世於恩既順於義無否元宗朝禘祫儀云布昭穆之座於戸外皇伯考中宗皇考睿宗並坐於南廂北向同列穆位又唐郊祀録徳宗朝祝文以中宗為髙伯祖續曲臺禮祫祭圗中宗睿宗俱列昭位晉王導荀菘等議大宗無子則立支子又曰為人後者為之子無兄弟相為之文所舍至親取逺属者蓋以兄弟一體無父子之道故也竊以七廟之制百王是尊至於祖有功宗有徳則百世不遷之廟也父為昭子為穆則萬世不刋之典也今議者引漢書曰為人後者為之子殊不知弟不為兄後子不為父孫春秋之深㫖也父謂之昭子謂之穆禮記之明文也又按太宗饗祀太祖二十有二年稱曰孝弟此不易之制又安可追改乎唐元宗謂中宗為皇伯考徳宗謂中宗為髙伯祖則伯氏之稱復何不可臣等參議自今合祭曰太祖太宗依典禮同位異坐太祖仍舊稱孝子奏可景徳元年詔有司詳定明徳皇太后李氏升祔之禮上議曰唐睿宗昭成肅明二后先天之始惟以昭成配享開元之末又以肅明遷祔恭惟懿徳皇后久從升祔雖先後有殊在尊親一貫請同祔太宗室以先後次之詔尚書省集官詳議咸如禮官之請乃並祔太廟三年龍圗閣待制陳彭年言按漢書髙平侯魏洪坐酎宗廟騎至司馬門削爵一級此則騎不過廟司馬門之明文也伏見太廟别有偏門及東門祀官入齋宫去殿庭尚逺其后廟雖有一門每遇禘祫神主由之出入兼又齋宫正與殿門相對數歩而已祀官皆乗馬而入實非恭恪望自今中書門下行事許乗馬入太廟東門自餘並不得乗入庶彰寅奉以廣孝思詔祀官遇雨許乗馬入東門導從止門外餘如所請大中祥符元年六月以將封禪詔有司議加上太祖太宗尊諡後又詔太廟六室各奉上尊諡二字中書門下請加僖祖諡曰文獻睿和皇帝順祖曰惠元睿明皇帝翼祖曰簡恭睿徳皇帝宣祖曰昭武睿聖皇帝太祖曰啓運立極英武睿文神徳聖功至明大孝皇帝太宗曰至仁應道神功聖徳文武睿烈大明廣孝皇帝遣宰相王旦等奉上册寳三年十二月詔曰朕以親祀后祗昭告祖考詳觀定儀有所未安入廟則歩武正門至庭則廻班東向且躬申祗見禮尚尊䖍當罄寅恭庶申誠慤自今謁廟朕當由東偏門入至殿庭不得令百官廻班仁宗嘉祐時集賢校理邵必言周禮小宗伯之職凡王之會同甸役禱祠肄儀為位鄭氏注云若今時肄儀司徒府今習宫廟儀而啓室登殿拜則小挹奠則虗爵樂舉祝敔舞備行綴慢䙝神靈莫斯為甚夫習儀者夲以防失禮而凟神也奈何天子未行親祠而有司先凟之宜習於尚書省以比漢司徒府下禮院兩制定而從之嘉祐七年六月時英宗已即位仁宗將祔廟脩奉太廟使蔡襄上八室圗廣廟室并夾室為十八間神主奉安齊殿數月而成舊廟室前楹狹隘每禘祫陳序昭穆南北不相對左右祭器填委不中儀式嘉祐親祫增築土階張幄帟乃可行禮宗正丞趙觀請廣檐陛如親祫時凡二丈七尺初禮院請增廟室孫抃等以為七世之廟㨿父子而言兄弟則昭穆同不得以世數之商祖丁之子陽甲盤庚小辛小乙皆有天下廟有始祖有太祖有太宗有中宗若以一君為一世則小乙之祭不及其父故晉之廟十一室而六世唐之廟十一室而九世中宗睿宗之於髙宗恭宗文宗武宗之於穆宗同居穆位國朝太祖之室太宗稱孝弟真宗稱孝子大行稱孝孫而禘祫圗太祖太宗同居昭位南向真宗居穆位北向蓋先朝稽用古禮著之祀典大行神主祔廟請增為八室以備天子事七世之禮龍圖閣直學士盧士宗天章閣待制司馬光以為太祖以上之主雖属尊於太祖親盡則遷故漢元之世太上廟主瘞於寢園魏明之世處士廟主遷於園邑晉武祔廟遷征西府君惠帝祔廟遷豫章府君自是以下大抵過六世則遷蓋太祖未正東向故止祀三昭三穆已正東向明並昭穆為七世唐初祀四世太宗增祀六世及太宗祔廟則遷𢎞農府君髙宗祔廟又遷宣皇帝皆祀六世前世成法也明皇立九室祀八世事不經見若以太祖太宗為一世則大行祔廟僖祖親盡當遷夾室祀三昭三穆於先王典禮及近世之制無不符合復詔抃議曰自唐至周廟制不同而皆七世王制三昭三穆與太祖自周以上所謂太祖非始受命之王特始封之君而已今僖祖雖非始封之君要為立廟之祖方廟數未過七世之時遂毁其廟遷其主考三代之禮亦未嘗有如此者也漢魏及唐一時之議恐未合先王制禮之意乃存僖祖之室以備七室禮院定用學士范鎮請置殿蔵册寳在太廟神門外凡神御殿者古之原廟天聖初禮儀院言正月朝拜啓聖院神御在諒闇請差輔臣酌獻知制誥張師徳奉安太祖太宗御容於鴻慶宫迎景靈宫真宗御容奉安於西京應天院曲赦西京自是多以宰相若近臣為禮儀使入内都知押班御藥管勾儀衞先迎御容至文徳或會慶長春殿宿齋奉辭輔臣宗室前導既而酌獻出則百官辭於近郊景靈舊晉邸真宗所生脩萬夀殿名曰奉真二年奉安塑像又建殿於上清太平宫奉安御容改玉清昭應宫集靈殿為安聖殿奉安玉石像出御容奉安洪福院四年出御容奉安鴻慶宫五年天章閣迎御容奉安慈孝寺崇真殿御飛白書額太后塑像侍側外無知者明年手詔宣示皆真宗神御也八年啓聖院太宗神御為永隆殿迎天章閣太祖御容奉安於太平興國寺開先殿九年永安縣建會聖宫奉安三聖明道二年慈孝寺莊獻神御為彰徳殿景靈宫莊懿神御為廣孝殿奉安御容恭謝禮成迎龍圗閣太宗御容奉安夀寧堂景福殿真宗御容奉安福聖殿景祐二年改長寧宫為廣聖宫前殿有道家天神之像後起觀閣奉真宗神御占宫城西北隅普安院元徳莊穆神御為重徽殿四年萬夀觀脩莊恵真容殿名曰廣愛禮賔使白仲達入内東頭供奉官蘓紹榮奉安太祖御容於揚州建隆寺即南征駐蹕之地景徳中置殿繪御容而其制卑陋會占者言東南有王氣乃别構殿易以塑像為章武殿是嵗開先殿火康定初鴻慶宫神御殿又火罷脩神御即舊基構齋殿每醮則旋設三聖位舊像瘞宫側慶歴六年重脩開先殿御飛白書榜迎天章閣太祖御容奉安七年鴻慶宫復脩三聖神御曲赦南京八年自萬夀觀奉宣祖太祖太宗御容於睦親宅真宗御容於天章閣皇祐五年會靈觀火權奉三聖於景靈宫滁州通判王靖請滁并澶三州建殿以奉神御即芳林園命工寫三聖御容車駕詣萬夀觀辭翼日奉太祖於滁州天慶觀端明殿太宗於并州資聖院統平殿真宗於澶州開福院信武殿各以輔臣為迎奉使副具儀仗導至近郊内臣管勾奉安百官辭觀門外帝謂輔臣曰并州言四月二十二日奉安太宗御容仍以平晉記來上蓋紀太平興國四年征討之事是時車駕亦以四月二十二日至太原城下何其異也葺重徽隆福殿奉安明徳元徳章穆皇后至和元年重脩開先殿奉神御於天章閣萬夀觀延聖殿神御帳損權徙别殿二年帳成奉安真宗金像天章閣迎太祖孝明皇后御容奉安開先殿數日又迎太宗元徳皇后御容奉安永隆殿諫官范鎮言并州素無火災自建神御殿未㡬而輙焚天意若曰祖宗御容非郡國所宜奉安者近聞下并州復加崇建是徒事土木重困民力非所以答天意也自并州平七十七年故城父老不入新城宜寛其賦輸緩其徭役以除其患使河東之民不忘太宗之徳則陛下孝思豈特建一神御殿比哉歐陽脩言神御非人臣私家之禮下兩制臺諫禮官議以為漢用春秋之義罷郡國廟今睦親廣親宅所建神御不合典禮宜悉罷帝以廣親置已久唯罷脩睦親神御文獻通考卷九十三
