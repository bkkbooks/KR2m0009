body:
  text: 文獻通考卷一百十鄱陽馬端臨貴與著王禮考五田獵商湯見祝網者置四面其祝曰從天墜者從地出者從四方來者皆離吾網湯曰嘻盡之矣非桀其孰爲此湯乃解其三面置其一面更教云祝曰昔蛛蝥作網蛛音朱蝥莫侯反今之人循序欲左者左欲右者右欲髙者髙欲下者下吾取其犯命者其憚害物也如是漢南之國聞之曰湯之德及鳥獸矣四十國歸之周制天子諸侯無事則嵗行蒐苗獮狩之禮仲春教振旅司馬以旗致民平列陣如戰之陣以旗者立旗期民於下兵者凶事不可空設因蒐狩而習之凡師出曰治兵入曰振旅皆習戰也四時各教民以其一焉春習振旅兵入収衆專於農平猶正也王執路鼓諸侯執鼖鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲鼓人職曰以路鼓鼓鬼享以鼖鼓鼓軍事以晉鼓鼓金奏以金鐃止鼓以金鐸通鼓以金鐲節鼓提謂馬上鼓有曲木提持鼓立馬髦上者故謂之提杜子春云公司馬謂五人爲伍伍之司馬也鄭元謂王不執鼖鼓尚之於諸侯也伍長謂之公司馬者雖卑亦同其號以教坐作進退疾徐疏數之節習戰法遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以祭社春田爲蒐有司大司徒也掌大田役治徒庻之政令表貉立表而貉祭也誓民誓以犯田法之罰也誓曰無干車無自後射立旌遂圍禁火弊火止也春田主用火焚萊除陳草皆殺而火止獻猶致也田止虞人植旌衆皆獻其所獲獸焉詩云言私其􅚧獻豜於公春田主祭祀者土方施生也貉讀爲禡仲夏教茇舍如振旅之陣羣吏撰車徒讀書契辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅茇舍草止之也軍有草止之法讀書契以簿書校錄軍實之凡要號名者徽識所以相别也鄉遂之屬謂之名家之屬謂之號百官之屬謂之事在國以表朝位在軍又象其制而爲之以備死事帥謂軍将及師帥至伍長也以門名者所被徽識如其在門所樹者也凡此言以也象也皆謂其制同耳軍将皆命卿古者軍将蓋爲營治於國門魯有東門襄仲宋有桐門右師皆上卿爲軍将者也縣鄙師至鄰長也家謂食采地者之臣也郷以州名亦謂州長至比長也野謂公邑大夫百官各以其職從王者此六者皆書其官與名氏焉門則襄仲右師明矣鄉則南鄉甀東鄉爲人是也其他象此云某某之名某某之事而已未盡聞也夜事戒夜守之事遂以苗田如蒐之法車弊獻禽以享礿夏田爲苗擇取不孕任者若治苗去不秀實者云車弊驅獸之車止也夏田主用車示所取物希皆殺而車止礿宗廟之夏祭也冬夏田主於祭宗廟者陰陽始起象神之在内也仲秋教治兵如振旅之陣王載太常諸侯載旂軍吏載旗師都載􅎶鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅軍吏諸軍帥也師都遂大夫也鄉遂鄉大夫也或載􅎶或載物衆屬軍吏無所将也郊謂鄉遂之州長縣正以下野謂公邑大夫載旐者以其将羡卒也百官卿大夫載旟者以其屬衛王也凡旌旗有軍衆者畫異物無者帛而已書當爲畫皆畫以雲氣遂以獮田如蒐田之法羅弊致禽以祀祊秋田爲獮獮殺也羅弊罔止也秋田主用㒺中殺者多皆殺而罔止祊當爲方秋田主祭四方報成萬物詩云以社以方仲冬教大閱春辨鼓鐸夏辨號名秋辨旗物至冬大閱簡軍實虞人萊所田之野爲表百步則一爲三表又五十步爲一表田之日司馬建旗於後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陣皆坐虞人萊所田之野芟除其草萊爲可陣之處後表之中五十步表之中央表所以識正行列也四表積二百五十步左右之廣當容三軍步數未聞致致之司馬質正也弊仆也皆坐當聽誓羣吏聽誓於陣前斬牲以左右徇陣曰不用命者斬之羣吏諸軍帥也陣前南面嚮表也月令季秋天子教於田獵以習五戎司徒搢扑北面以誓之此大閱禮實正嵗之仲冬而說季秋之政於周爲仲冬爲月令者失之矣斬牲者小子也凡誓之大略甘誓湯誓之屬是也中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐中軍中軍之将也天子六軍三三而居一徧羣吏旣聽誓各復其部曲中軍之将令鼓鼓以作其士衆之氣鼓人者中軍之将師帥旅師也司馬振鐸以作衆作起也既起鼓人撃鼓以行之伍長鳴鐲以節之伍長一曰公司馬及表自後表前至第二表三鼓者鼓人也摝讀如涿鹿之鹿掩上振之爲摝摝者止行息氣也司馬法曰鼓聲不過閶鼙聲不過闒鐸聲不過琅閶音吐剛反闒音吐答反又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初趨者趨敵尚疾之漸春秋傳曰先人有奪人之心及表自第二前至第三表乃鼓車馳徒走及表乃止及表自第三前至前表鼓戒三闋車三發徒三刺鼓戒戒攻敵也鼓一闋車一轉徒一刺三而止象服敵乃鼓退鳴鐃且郤及表乃止坐作如初鐃所以止鼓也軍退卒長鳴鐃以和衆鼓人爲止之退自前表至後表鼓鐸則同習戰之禮出入一也異者廢鐲而鳴鐃遂以狩田以旌爲左右和之門羣吏各帥其車徒以敘和出左右陳車徒有司平之旗居卒間分地前後有屯百步有司廵其前後險野人爲主易野車爲主冬田爲狩言守取之無所擇也軍門曰和今謂之壘門立兩旌以爲之敘和出用次第出和門也左右或出而左或出而右有司平之鄉師居門正其出入之行列也旗軍吏所載也分地調其部曲數疏前後有屯百步車徒異羣相去之數也車徒畢出於和門鄉師又廵其行陣鄭衆云險野人爲主人居前易野車爲主車居前旣陣乃設驅逆之車有司表貉於陣前驅驅出禽獸使趨田者也逆逆要不得令走設此車者田僕也中軍以鼙令鼓鼓人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進羣司馬兩司馬也枚狀如箸銜之有繣結項中軍法止語爲相疑惑也天子殺則下大緌諸侯殺則下小緌緌有虞氏之旌旗也下謂弊之大夫殺則止佐車佐車止則百姓田獵佐車驅逆之事大獸公之小獸私之獲者取左耳鄭衆云大獸公之輸之於公小獸私之以自畀也獲得禽獸者取其左耳當以計功多少者也畀音必二反及所弊鼓皆駴車徒皆譟及所弊至所弊之處田所當於止也天子諸侯蒐狩有常至其常處吏士鼓譟象攻敵尅勝而喜也疾雷撃曰駴譟驩也書曰前師乃鼓䵾譟亦謂喜也駴音駭䵾音符徒乃弊致禽饁獸於郊入獻禽以享烝徒乃弊徒止也冬田主用衆物多衆得取也致禽饁獸於郊聚所獲禽因以祭四方之神於郊月令季秋天子既田命主祠祭禽於四方是也入又以禽祭宗廟巾車木路前樊鵠纓建大麾以田前音翦樊步干反黒木路不輓以革漆之而已前讀爲錙翦之翦淺也木路無龍勒以淺黒飾􅅊爲樊鵠色飾􅅊爲纓不言就數飾與革路同大麾不在九旗中以正色言之則黒夏后氏所建用四時田獵田僕掌馭田路以田以鄙田路木路也田田獵是也鄙廵行都鄙掌佐車之政佐亦副設驅逆之車驅驅禽使前趨獲逆御還之使不出圍也令獲者植旌以告獲也植樹也及獻比禽田弊獲者各獻其禽比種物也從次數之凡田王提馬而走諸侯晉大夫馳提猶舉也晉猶抑也使人扣而舉之抑而止之皆止奔也馳放而不扣司几筵甸役則設熊席右漆几甸音田司謂王甸有祭表貉所設席迹人掌邦田之地政爲之厲禁而守之田之地若今􅁐也凡田獵者受令焉令謂時與處也禁麛卵者與其毒矢射者謂其夭物且害處必多也麛鹿鹿子肆師凡師甸用牲於社宗則爲位甸音田近社軍社也宗宇也甸祝掌四時之師田致禽於虞中乃屬禽及郊饁獸舍奠於祖禰乃斂禽裯牲裯馬皆掌其祝號屬音燭舍音釋裯音誅祝之秀反各師田謂起大衆以田也致禽於虞中使獲者以其禽來致於所表之處屬禽别其種𩔖饁饋也以所獲禽饋於郊薦於四方羣兆入又以奠於祖禰薦且告反斂禽謂取三十入腊人也天子諸侯無事則嵗三田三田者夏不田蓋夏時也周禮春曰蒐夏曰苗秋曰獮冬曰狩一爲乾豆二爲賔客三爲充君之庖君尊宗廟敬賔客故先人而後已取其下也又分别殺之二等故自左膘而射之達過於右肩腢爲上殺以其貫心死疾肉最潔美故以爲乾豆也射右耳本箋云射當爲達亦自左射之達右耳本而死者爲次殺以其逺心死稍遲肉已㣲惡故以爲賔客也不言自左者䝉上文可知射左股髀而過於右脅者爲下殺以其中脅死最遲肉又益惡充君之庖也凡射獸皆逐後從左廂而射之達於右䯚者獨言射左髀則上殺達於右腢當自左脅也次殺右耳本當自左肩腢也不言自左舉下殺之射左髀可推而知也無事而不田曰不敬田不以禮曰暴天物不敬者簡祭祀畧賔客天子不合圍諸侯不掩羣爲盡物也天子殺則下大綏諸侯殺則下小綏綏耳隹反旗綏當爲緌緌有虞氏之旌也下謂弊之大夫殺則止佐車佐車止則百姓田獵佐車驅逆之車國君春田不圍澤大夫不掩羣士不取麛卵生乳之時重傷其𩔖獺祭魚然後虞人入澤梁􅉘祭獸然後田獵鳩化爲鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田罻音尉時取物必順候也梁絶水取魚者罻小網也昆明也明蟲者得陽而生得隂而滅不麛不卵不殺胎不殀夭殀於表反夭鳥老反重傷未成物殀斷殺少長曰夭也不覆巢覆敗也王制田者大艾草以爲防艾音乂以言田獵者必大芟殺草木爲防限作田獵之場擬殺圍之處或舍其中舎音赦士民復止舍其中謂未田之前誓戒衆故教示戰法當在其間上舍其舍防之廣狹無文褐纒旃以爲門旃諸延反衛既爲防院當設周而立門焉乃以織毛褐布纒通帛旃之竿以爲門之兩旁其門蓋南開並爲二門用四旃四褐也䘮纒質以爲魚列反車又以䘮纒椹質以爲門中之闈闈軌之裏兩邊鈎車輪者間容握驅而入撃則不得入其門之廣狹兩軸頭去旃竿之間各容一握人四指爲四寸是門廣於軸八寸也入此門當馳走而入不得徐也以教戰試其能否故令驅焉若驅之其軸頭撃著門傍旃竿則不得入也所以罰不工也左者之左右者之右然後焚而射焉以天子六軍分爲左右雖同舍防内令三軍各在一方取左右相應其屬左者之左門屬右者之右門不得越離部伍以此故有二門也教戰既畢士卒出士卒出和户分地爲屯既陳車驅卒奔驅禽内之防然後焚燒此防草右中而射之天子發然後諸侯發諸侯發然後士大夫發天子發抗大綏諸侯發抗小綏獻禽於其下抗苦浪反綏耳佳反諸發謂發矢射之也其天子發則先抗舉其大綏侯發則舉其小綏必舉此綏爲表天子諸侯殺時因獻其禽於其下也抗綏謂既射舉之因置虞旗於其中受而置禽焉受禽獵止則弊之故王制曰天子殺則下大綏諸侯殺則下小綏注云下謂弊之是殺禽已訖田止而弊綏也名舉始終之一故與此不同也故戰不出頃田不出防不逐奔走古之道也戰不出所期之頃田不出所芟之防不逐奔走謂出於頃防不逐之古之道也詩車攻東有甫草注疏云傳曰已有三牲必田狩者孝子之意以爲已之所養不如天地自然之牲逸豫肥美禽獸多則傷五榖因習兵事又不空設故因以捕禽獸所以共承宗廟示不忘武備又因以爲田除害鮮者何也秋取嘗也鮮音仙祭取禽嘗秋取嘗何以也習鬬也習鬬也者男子之事也然而戰鬬不可不習故於搜狩閑之也閑之者貫之也貫之也者習之也已祭取餘獲陳於澤搜所留反狩手又反澤射宫也然後卿大夫相與射命中者雖不中取也命不中者雖中不取中丁仲反何以也所以貴揖讓之取而賤勇力之取也曏之取於國中勇力之取也今之取於澤揖讓之取也魯隱公將如棠觀魚者臧僖伯諫曰凡物不足以講大事臧僖伯公子彄也僖諡也大事祀與戎其材不足以備器用則君不舉焉材謂皮革齒牙骨角毛羽也器用軍國之器君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也度徒各反亟欺冀反爲言器用衆物不入法度則不軌不物亂敗之所致故春蒐夏苗秋獮冬狩獮息典反狩手又反蒐索擇取不孕者苗爲苗除害也獮殺也以殺爲名順秋氣也狩圍守也冬物畢成獲取之則無所擇也皆於農隙以講事也各隨時事之間三年而治兵入而振旅雖四時講武猶復三年而大習出曰治兵始治其事入曰振旅治兵禮畢整衆而還振整也旅衆也歸而飲至以數軍實數色主反械飲於廟以數車徒器及所獲也昭文章車服旄旗明貴賤辨等列等列行伍順少長少詩照反長丁丈反後出則少者在前還則在所謂順也習威儀也鳥獸之肉不登於俎俎祭宗廟器皮革齒牙骨角毛羽不登於器謂以飾法度之器則公不射古之制也若夫山林川澤之實器用之資皂𨽻之事官司之守非君所及也射食亦反夫音扶皂才早反猥士臣皂皂臣輿輿臣𨽻言取此雜之物以資器備是小臣有司之職非諸侯之所親也隱五年昔周辛甲之爲大史也命百官官箴王闕大音泰箴音針下同百辛甲周武王大史闕過也使官各爲箴辭戒王過於虞人之箴虞人掌田獵曰茫茫禹迹畫爲九州畫胡麥反分茫茫逺貌畫也經啓九道啟開九州之道民有寢廟獸有茂草各有攸處徳用不擾人神各有所歸故徳不亂在帝夷羿冒於原獸羿五計反冐貪也亡其國恤而思其麀牡麀音憂獵言但念武不可重重猶數也用不恢於夏家恢祜回反而羿以好武雖有夏家不能恢大之獸臣司原敢告僕夫獸臣虞人告僕夫不敢斥尊左襄四年宣王料民於太原料數也太原地名仲山甫諫曰民不可料也夫古者不料民而知其少多司民恊孤終甫音父夫音扶司民掌登萬民之數自生齒以上皆書於版恊合也無父曰孤終死也合其民籍以登於王也司商協名姓司商掌賜族受姓之官商金聲清謂人始生吹律合之定其姓名司徒協旅司徒掌合師旅之衆也司寇協姦司寇刑官掌合姦民以知死刑之數場協入場人掌場圃委積珍物斂而藏之也廪協出廪力錦反之廪人掌凡榖出用數也是則少多死生出入往來者皆可知也於是乎又審之以事事謂因籍田與蒐狩以簡知其數也王治農於籍籍籍於千畝田也摉於農隙摉所留反而春田曰摉摉擇也禽獸懐姙未著摉取之也農隙仲春既耕之後隙間也耨獲亦於籍耨奴遘反獲户郭反之言王亦至於籍考課獮於既蒸獮息典反也秋田曰獮獮殺順時始殺也蒸升也月令孟秋乃升榖天子嘗新既升於仲秋也狩於畢時狩手又反冬田曰狩圍守而取之畢時時務畢也是皆習民數者也又何料焉習簡習也不謂其少而大料之是示少而惡事也惡烏路反下同言王不謂其衆少而大料數也是示以寡少又厭惡政事不能修之意也臨政示少諸侯避之示天下寡弱諸侯将避逺王室不親附也治民惡事無以賦令言厭惡政事無以賦令也語周傳曰春曰蒐蒐所留反下並同夏曰苗秋曰獮獮息典反下同冬曰狩狩手又反下同苗者謂何曰苗者毛也取之不圍澤不掩羣取大禽不麛音迷下同不卵不殺孕重者春蒐者不殺小麛及孕重者冬狩皆取之百姓皆出不失其時不抵禽不詭遇詭古委反逐不出防此苗獮蒐狩之義也故苗獮蒐狩之禮簡其戎事也故苗者毛取之蒐者搜索之狩者守留之夏不田何曰天地隂陽盛長之時猛獸不攫鷙鳥不搏鷙音至搏音博蝮蠆不螫螫音釋鳥獸蟲蛇且知應天而况乎人哉是以古者必有豢牢豢音患其謂之畋何聖人舉事必反本五榖者以奉宗廟養萬民也去禽獸害稼穡者故以田言之聖人作名號而事義可知也禮聖主之於禽獸也見其生不食其死聞其聲不嘗其肉隱弗忍也故逺庖厨仁之至也不合圍不掩羣不射宿不涸澤豺不祭獸不田獵獺不祭魚不設網罟鷹隼不鷙眭而不逮不出罻羅草木不零落斧斤不入山林昆蟲不蟄不以火田不麛不卵不刳胎不夭夭鳥老反魚肉不入廟門鳥獸不成毫毛不登庖厨取之有時用之有節則物莫不多漢武帝建元三年南獵長楊帝召見司馬相如請爲天子游獵之賦上令尚書給筆札相如以爲子虚虚言也爲楚稱烏有先生者烏有此事也爲齊難亡是公者亡是人也欲明天子之義故藉此三人爲辭其卒章歸之於節儉因以諷諫相如嘗從上至長楊獵是時天子方好撃熊豕馳逐埜獸相如因上疏諫其辭曰臣聞物有同𩔖而殊能者故力稱烏獲㨗言慶忌勇期賁育臣之愚竊以爲人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇逸材之獸駭不存之地犯屬車之清塵輿不及還轅人不暇施巧雖烏獲羿䝉之技不得用枯木朽株盡爲難矣是胡越起於轂下而𦍑夷接軫也豈不殆哉雖萬全而無患然本非天子之所宜近也且夫清道而後行中路而馳猶時有䘖橜之變况乎涉豐草騁􅏀墟前有利獸之樂而内無存變之意其爲害也不難矣夫輕萬乘之重不以爲安樂出萬有一危之塗以爲娛臣竊爲陛下不取也蓋明者逺見於未萌而知者避危於無形旤固多藏於隱微而發於人之所忽者也故鄙諺曰家累千金坐不垂堂此言雖小可以喻大臣願陛下留意幸察上善之元鼎中天子行獵新秦中以勒邊兵而歸新秦中或千里無亭徼於是誅北地太守以下元帝永光元年正月行幸甘泉禮泰畤禮畢因留射獵五年上幸長楊射熊館布車騎大獲成帝元延二年冬行幸長楊宫從胡客大校獵宿萯陽宫萯音倍賜從官其十二月羽獵揚雄從以爲昔在二帝三王宫室臺榭沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖厨而已不奪百姓膏腴榖土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其塘鳳凰巢其木黃龍遊其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和草木茂成湯好田而天下用足文王囿百里民以爲尚小齊宣王囿四十里民以爲大裕民之與奪民也武帝廣開上林南至宜春鼎湖御宿昆吾旁南山而西至長楊五柞北繞黄山瀕渭而東周袤數百里穿昆明池象滇河營建章鳳闕神明馺娑漸臺泰液象海水周流方丈瀛洲蓬萊游觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲峙禁禦所營尚泰奢麗誇詡非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺故因校獵賦以風明年上將大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜東至𢎞農南敺漢中張羅網􅆯罘捕熊羆豪猪虎豹狖玃􅈢兎麋鹿載以檻車輸長楊射熊館以網爲周阹縱禽獸其中令胡人手搏之自取其獲上親臨觀焉是時農民不得収斂雄從至射熊館還上長楊賦聊因筆墨之成文章故藉翰林以爲主人子墨爲客卿以風後漢明帝永平十六年冬車駕校獵上林苑安帝延光二年十一月校獵上林苑順帝永和四年十月校獵上林苑歴函谷關而還桓帝延熹元年校獵廣成遂幸上林苑靈帝光和五年校獵上林苑函谷關遂廵狩於廣成苑宋文帝元嘉二十五年閏二月大蒐於宣武塲主司列奏申攝尅日校獵百官備設行宫殿便座於武帳國王公百官便座幔省如常儀設南北左右四行旌門建旗以表護車殿中郎一人典護車主者二人収禽吏二十四人配獲車十二兩校獵之官著袴褶有帶二品以上權乃備鞘麾幡三品以下帶刀皆騎乘將領部曲先獵日布圍領軍將軍一人督右甄護軍將軍一人督左甄大司馬一人居中廻董正諸將悉受節度殿中郎率護軍部曲在大司馬之後尚書僕射以下諸官曹令史等至日㑹於宣武塲列爲重圍設留守填街位於雲龍門之外在内官道北外官道南以西爲上設從官位於雲龍門内大官階北小官階南以西爲上設先置官位於行上車門外内官道西外官道東以北爲上設先置官還位於廣莫門外道之東西以南爲上校獵日平旦正直侍中奏中嚴上水一刻槌一鼓爲一嚴上水二刻奏槌二鼓爲再嚴殿中侍御史奏開東中華雲龍門引仗爲小駕鹵簿百官非校獵之官著朱服集到廣莫門外留守填街後部從官就位前部從官依鹵簿先置官先行上水三刻奏槌三鼓爲三嚴上水四刻奏外辦次正直侍中散騎常侍給事黄門侍郎散騎侍郎軍校劒履進來上閣正直侍中負璽通事令史帶龜印中書之印上水五刻皇帝出著黒介幘單衣乘輦正直侍中負璽陪乘不帶劒殿中侍御史督攝黄麾以内次正直侍中次正直黄門侍郎護駕在前又次正直侍中佩信璽行璽與正直黄門侍郎從護駕在後不鳴皷角不得喧譁以次引出警蹕如常儀車駕出讚陛者再拜皇太子入守車駕將至威儀唱引先置前部從官就位再拜車駕行至殿前廻輦正直侍中跪奏降輦次正直侍中稱制曰可正直侍中俛伏起皇帝降輦登御座侍臣升殿直衛鈒所立反㦸虎賁毛頭文衣鴞尾以次到正階正直侍中奏解嚴先置從駕百官還便座幔省皇帝若親射禽變服戎服如校獵儀内外從官及虎賁悉變服鈒㦸抽鞘以備武衛黄麾内官從入圍裏列置部曲廣張甄圍旗鼓相見銜枚而進甄周圍㑹督甄令史奔騎號法施令曰春禽懐孕蒐而不射鳥獸之肉不登於俎不射皮革齒牙骨角毛羽不登於器不射甄㑹大司馬鳴鼓䠞圍衆軍鼓譟警角至宣武塲止大司馬屯北旌門二甄師屯左右旌門殿中中郎率候車部曲入次北旌門内之右皇帝從南旌門入射禽謁者以獲車收載還陳於獲旗之北王公以下以次射禽各送詣獲旗下付禽主者事畢大司馬鳴鼓解圍復屯殿中郎率其屬収禽以實獲車奉車奉充庖厨正厨置罇酒俎肉於中逵以犒饗校獵衆軍至晡正直侍中量宜奏嚴從官還著朱服鈒㦸復鞘再嚴先置官先還三嚴後二刻正直侍中奏外辦皇帝著黑單介幘單衣次正直侍中散騎常侍給事黄門侍郎軍校進夾御正直侍中跪奏還宫次正直侍郎稱制曰可正直侍郎俛伏起乘輿登輦還衛從如常儀大司馬鳴鼓散屯以次就舍車駕將至威儀唱引留守填街先置前部從官就位再拜車駕至殿前廻輦正直侍中跪奏降輦次直侍中稱制曰可正直侍中俛伏起乘輿降入正直次侍中散騎常侍等從至閤正直侍中奏解嚴内外百官拜表問訊訖罷梁陳並依宋儀其異者置行殿於幕府山南岡并設王公百官幕先獵一日遣馬騎布圍領軍督左右軍將軍督右大司馬董正諸軍獵日侍中三奏一奏搥一鼓爲一嚴三嚴訖引仗爲小駕鹵簿皇帝乘馬戎服從者悉絳衫幘黄麾警蹕鼓吹如常儀獵訖宴㑹享勞比校多少戮一人以懲亂法㑹畢還官北齊春蒐禮有司規大防建獲旗以表獲車前一命布圍領軍將軍一人督左甄護軍將軍一人督右甄大司馬一人居中節制諸軍天子陳小駕服通天冠乘木輅詣行宫將親禽服鈒㦸者皆嚴武衛張甄圍旗鼓相見銜枚而進甄常開一方以令三驅圍合吏奔騎令曰鳥獸之肉不豋於俎者不射皮革齒牙骨角毛羽不登於器者不射甄合大司馬鳴鼓促圍衆軍鼓譟鳴角至期處而止大司馬爲屯北旗門二甄師屯左右旌門天子乘馬從南旌門入親射禽謁者以獲車收禽載還陳於獲旗之北王公以下以次射禽皆送於下事畢大司馬鳴鼓解圍復屯殿中郎中率其屬収禽以實獲車壬子還行宫命有司每㑹擇取三田一曰乾豆二曰賔客三曰充君之庖其餘即於圍下量犒将士禮畢改服鈒者韜刃而還夏苗秋獮冬狩禮皆同後周仲春教振旅大司馬建大麾於萊田之所郷稍之官以旗物鼓鐸鉦鐃各帥其人而致誅其後至者建麾於後表之軍中以集衆庻質明偃麾誅其不及者乃陳徒騎如戰之陣大司馬北面誓之軍中皆聽鼓角以爲進止之節田之日於萊之北建旗爲和門諸將帥徒騎序入其門有司居門以平其人既入而分其地險野則徒前而騎後易野則騎前而徒後旣陣皆坐乃設驅逆騎有司表禡於前以太牢祭黄帝軒轅氏於狩地爲建二旗列五兵於坐側行二獻禮遂蒐田致禽以祭社仲夏教茇舍遂苗田仲秋練兵獮田仲冬大閱遂狩其致禽享礿教習之儀並如古周法隋大業三年煬帝在榆林突厥啟人及西域東胡君長並來朝貢帝欲示以兵甲之盛乃命有司陳冬狩之禮詔虞部量㧞延山南北周二百里並立表記前狩二日兵部建旗於表所五里一旗分爲四十軍軍萬人騎五千匹前一日諸將各率其軍集於旗下鳴鼓後至者斬詔四十道並揚旗節分中廻令即留軍所監獵布圍圍南西方行而前帝服紫袴褶黒介幘乘闟猪車車飾如木各重輞輪龍繞轂漢東京鹵簿所謂獵車駕六黒駵太常陳鼓笳鐃蕭角於帝左右各百二十官戎服騎從鼓行入圍諸軍並鼓行赴圍乃設驅逆騎千有二百闟猪軔有司斂大綏王公以下皆整弓陳於駕前有司又斂小綏乃驅獸出過於帝前待詔再驅過至備身將軍奏進弓矢三驅過帝乃從禽鼓吹皆振左而射之每驅必三獸以上帝發抗大綏次王公發抗小綏次諸侯發射則無鼓驅逆之騎乃止然後四夷百姓皆獵凡射獸自左而射達於右腢五囘反爲上等達右耳本爲次等自左髀達於右䯚爲下等羣獸相從不得盡殺已傷獸不得重射又逆向人者不射其面出表者不逐之田將止虞部建旗於圍内從駕之鼓及諸軍鼓俱振卒徒皆譟諸獲禽者獻於旗所致其左耳大獸公之以供宗廟使歸腊於京師小獸私之唐髙祖武德五年十二月上幸涇陽之華池校獵上謂朝臣曰今日畋樂乎諫議大夫蘇世長對曰陛下游獵薄廢萬機不滿十旬未見大樂上色變旣而笑曰狂發也世長曰爲臣私計則狂爲陛下國計則忠八年十月校獵於周氏陂上謂侍臣曰獵以供宗廟朕當躬其事以伸孝享之誠太宗貞觀五年大蒐於昆明池夷落君長從十一年狩於濟源之陵山上曰古者先驅以供宗廟今所獲鹿宜令所司造脯醢以充薦享十六年十二月狩於驪山時隂寒晦㝠圍兵斷絶上登山望見之顧謂左右曰吾見其不整而不刑則墮軍法刑之則是吾登髙臨下以求人之過也乃託以道險引轡入谷以避之髙宗龍朔元年十月狩於陸渾縣六日至飛山頓帝親御弧矢獲四鹿及兎數十頭總章二年車駕自九成宫還京仍西狩校習自麟遊西北遶岐梁歴普潤爲兩頭殿中侍御史杜易簡賈言忠監圍山阜懸危躡蹻杖䇿不得暫停凡五日而合劾奏將軍劉元意黄河上等處斷圍元意竟抵罪黄河上圍日軍容齊整詔特原之元宗先天元年十月幸新豐獵於驪山之下開元三年大蒐於鳳泉右補闕崔向上疏曰臣聞天子三田若古有訓豈惟爲乾豆賔客庖厨者哉亦將以閱兵講武戒不虞也詩美宣王之田徒御不驚有聞無聲謂畋獵時人皆衘枚有若聞而無讙譁也又曰悉率左右以燕天子謂悉驅禽順有左右之宜以安待王射也則知大綏將下亦有禮焉側聞獵於渭濵有異於是六飛馳騁萬騎騰躍衝翳薈蹴䝉籠越嶃險靡榛藂紅塵坐昬白日將暗毛羣擾攘羽族繽紛左右戎夷並伸驍勇攅鏑亂下交刃霜飛而降尊亂卑争捷於其間豈不殆哉夫環衛而居暴客攸待清道而出行人尚驚如有墜駕之虞流矢之變獸窮則搏鳥窮則攫陛下復何以當之哉惟深思後慮以誡後圖天下幸甚德宗貞元十一年十二月臘日畋於苑中止其多殺行三驅之禮武宗㑹昌元年十月車駕幸咸陽校獵二年十月校獵於太白原唐開元禮皇帝田狩儀仲冬狩田之禮前期十日兵部徵衆庻循田法虞部量地廣狹表所田之野前狩三日本司建旗於所田之後隨地之宜前一日未明諸将各帥士徒集旗下不得諠譁質明弊旗後至者罰之兵部分申田令遂圍田其兩翼之将皆建旗及夜布圍訖若圍廣或先期二日三日圍闕其南面且據南面及狩隨地所向駕出以剛日其發引次舍如常将至田所皇帝鼓行入圍鼓吹令鼓六十陳於皇帝東南西向六十陳於皇帝西南東向皆乘馬各觜蕭角諸将皆鼓行赴圍乃設驅逆之騎百有二十旣設驅逆皇帝乘馬南向有司斂大綏以從諸公王以下皆乘馬帶弓矢陳駕前後所司之屬又斂小綏以從乃驅獸出皇帝之前初一驅過有司整飭弓矢以前再驅過本司奏進弓矢三驅過皇帝乃從禽左而射之每驅必三獸以上皇帝發抗大綏皇帝旣發然後公王發王發抗小綏諸公既發以次射之訖驅逆之騎止然後百姓獵凡射獸自左而射之達於左腢爲上射達左耳本爲上射達右耳本爲次射左髀達於右􅞞爲下射羣獸相從不盡殺已被射者不射又不射其面不翦其毛其出表者不逐将止虞部建旗於田内乃擂撃駕鼓及諸将之鼓士徒譟呼諸得禽者獻於旗下致其左耳大獸公之小獸私之其上者以供宗廟次者以供賔客下者以充庖厨乃命有司饁獸於四郊以獸告至於廟社其因講武以狩則先設圍亦如之也宋太祖皇帝建隆二年十一月始狩於近郊賜宰相樞宻使節度觀察防禦團練使統軍侍衛諸軍校皆錦袍其後從臣皆賜窄袍并靴自是多以秋冬或正月畋於四郊先出禁軍爲圍去聲塲五方以鷙禽細犬從出城每行數里或召從官飲至頓賜食上每中禽諸從官貢馬稱賀親王以下射中者賜馬太宗太平興國五年十二月畋於近郊雍熙二年十一月詔曰三田之制其一曰乾豆謂腊之以供祀也近以率遵時令薄狩郊畿既親射以獲禽宜奉先而登俎其以畋獵親獲獸付所司薦享太廟仍著於令端拱元年十月自今非特朕不於近甸游獵其五方所畜鷹犬並放之仍令諸州不得以鷹犬來獻淳化五年臘日命諸王田獵近郊真宗咸平三年十二月以獵獲狐兎薦廟之餘賜中書樞密院大中祥符三年詔令教駿所養鷹鶻除量留十餘以備諸王從時展拜禮外自餘並去其覊紲縱之山林自景德四年後上不復出獵天僖初又詔禁圍草地許民耕墾仁宗慶歴五年兵部員外郎直集賢院李柬之言祖宗校獵之制所以順時令而訓戎事也陛下臨御以來未嘗講修此禮願詔有司草儀注擇日命殿前馬步軍司互出兵馬以從獵於近郊詔樞密院討詳先朝校獵制度十月御内東門賜從官酒三行奏鈞容樂幸瓊林苑門賜從官食遂獵於楊村燕幄殿奏教坊樂遣使以所獲麞兎馳薦太廟既而召父老臨問賜以飲食茶絹及賜五坊軍士銀絹有差六年十一月復獵於城南東韓村自玉津園去輦乘馬分騎士數千爲左右翼節以旗鼓合圍塲徑十餘里部隊相應天子按轡中道親挾弓矢而屢獲禽是時道傍居民或畜􅈢兎鳬雉驅於塲中因謂輔臣曰畋獵所以訓武事非專所獲也悉令縱之至􅁄店御帳殿召問所過父老子孫供養之數土地種植所宜且歎其衣食麤糲而能享夀人加恩勞還次近郊遣衛士更奏技駕前兩兩相當掉鞅挾槊以决勝又謂輔臣曰此亦可觀士之才勇免所過民田在圍内租稅一年時交趾李徳政適遣使獻馴象未見特召預觀賜紫袍塗金帶七年三月詔罷出獵以諌者多故也文獻通考卷第一百十
