body:
  text: 文獻通考卷一百三十二鄱陽馬端臨貴與著樂考五律吕制度朱晦庵儀禮經傳通解鍾律篇黄帝使泠倫自大夏之西昆侖之隂泠音伶倫音綸侖盧昆反應劭曰大夏西戎之國也取竹於嶰溪之谷以生而空竅厚薄均者斷兩節間而吹之以為黄鍾之宮嶰胡買反斷音短谷孟康曰嶰溪昆侖之北名也晉灼曰取谷中之竹生而肉孔外内厚薄自然均者截以為筩不復加削也師古曰黄鍾之宮律之最長者今按黄鍾之管長九寸圍九分徑三分四釐六毫制十二筩以聽鳳凰之鳴其雄鳴為六雌鳴亦六以比黄鍾之宮而皆可以生之故曰黄鍾律吕之本筩大東反比頻寐反生師古曰比合也可以生之謂上下相也十一管皆生於黄鍾之宫故曰律吕之本其雄鳴者為六律曰黄鍾太蔟姑洗蕤賔夷則無射其雌鳴者為六吕曰大吕夾鍾中吕林鍾南吕應鍾於是文之以五聲曰宫商角徵羽播之以八音曰金石土革絲木匏竹而大樂和矣六吕周禮作六同國語作六間鄭康成曰此十二者以銅為管轉而相生黄鍾為首其長九寸各因而三分之上生者益一分下生者去一焉國語曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾言以中聲定律以律立鍾之均文之者以調五聲使之相次如錦繡之有文章播猶揚也揚之以八音乃可得而觀之矣金鐘鎛也石磬也土壎也革鼓鼗也絲琴瑟也木柷敔也匏笙也竹管簫也以之候氣則埋之密室尚與地平實以葭灰覆以緹素以候十有二月之中氣冬至氣至則黄鍾之管飛灰衝素大寒以下各以其月隨而應焉而時序正矣以之審度則以子榖秬黍中者九十度黄鍾之長而以一黍之廣為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣葭居牙反緹他第反應去聲秬舊許反下同度徒洛反師古曰子榖猶言榖子秬即黒黍也中者不大不小也言取黑黍榖子大小中者率為分寸也以之嘉量則以子榖秬黍中者千有二百實其龠以井水凖其槩合龠為合十合為升十升為斗十斗為斛而五量嘉矣量音亮龠弋灼反槩工代反合音閤則孟康曰槩欲其直故以水平之井水清清平也師古曰槩所以槩平斗斛之上者也嘉善也以之謹權衡則以黄鍾一龠千二百黍之重為十二銖兩之得二十四銖而為兩十六兩為斤三十斤為鈞四鈞為石而五權謹矣銖音朱舜典曰協時月正日同律度量衡此之謂也以上用周禮吕覽漢志隋志通修右十二律隂陽辰位相生次第之圖傳後漢鄭康成曰陽管為律隂管為吕布十二辰子為黄鍾管圎九分而長九寸同位娶妻隔八生子下生者三分去一上生者三分益一黄鍾乾之初九也隔八而下生林鍾坤之初六林鍾又隔八而上生太蔟之九二太蔟又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賔之九四蕤賔又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中吕之上六五下六上乃一終矣前漢司馬遷生鍾術曰以下生者倍其實三其法如黄鍾九寸倍之則為十八三其法則十八為三六故下生林鍾長六寸以上生者四其實三其法如林鍾六寸四之則為二十四三其法則二十四為三八故上生太蔟長八寸上九商八羽七角六宫五徵九此十二字恐轉寫之誤當作宫九徵六商八羽五角七十字置一而九三之以為法如法得長一寸凡得九寸命曰黄鍾之宫置子之一而九三之至酉則得一萬九千六百八十三算為子之寸法矣置子之實十七萬七千一百四十七算而以寸法約之則一萬九千六百八十有三算為一寸而通其實之全數得九寸矣故曰音始於宫窮於角數始於一終於十成於三氣始於冬至周而復生此諸儒無異說也其論之不同者今譜如左覽者可以考其得失焉右十二律分寸釐毫絲數今按鄭氏與太史公説不同太史二説又自為異而今皆取之且以鄭先於馬者鄭氏之言分寸審度之正法也太史公之言欲其便於損益而為假設之權制也盖律管之長以九為本上下相生以三為法而鄭氏所用正法破一寸以為十分而其下破分為釐破釐為毫破毫為絲破絲為忽皆必以十為數則其數中損益之際皆有餘分雖有巧歴終不能盡是以自分而下遂不可拆而直以九相乘歴十二管至破一寸以為一萬九千餘分而後畧可得而記焉然亦苦於難記而易差終不若太史公之法為得其要而易考也盖其以子為一而十一三之以至於亥則得十七萬七千一百四十七算而子為全律之實可知矣以寅為子之寸數而酉為寸法則其律有九寸可知矣以辰為子之分數而未為分法則其寸有九分可知矣以午為子之釐數而已為釐法則其分有九釐可知矣以申為子之毫數而夘為毫法則其釐有九毫可知矣以戍為子之絲數而丑為絲法則毫有九絲可知矣下而為忽亦因絲而九之雖出權宜而不害其得乎自然之數以之損益則三分之數整齊簡直易記而不差也其曰黄鍾八寸十分一者亦放此意但以正法之數合其權法之分故不同耳其實則不異也史記律數十誤作七者五皆用本字而誤屈其下垂之筆本司馬貞沈括之説其夾蕤夷三律誤字則今以算得之右五聲五行之象清濁髙下之次𫝊樂記宫為君商為臣角為民徵為事羽為物五者不亂則無怗懘之音矣宫亂則荒其君驕商亂則陂其臣壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣凡聲濁者為尊清者為卑怗懘敝敗不和貎右五聲相生損益先後之次史記聲數曰九九八十一以為宫三分去一五十四以為徵三分益一七十二以為商三分去一四十八以為羽三分益一六十四以為角唐杜佑通典曰宫生徵三分宫數八十一分各二十七下生去一去二十七餘五十四以為徵故徵數五十四也徵生商三分徵數五十四分各十八上生者加一加十八於五十四得七十二以為商故商數七十二也商生羽三分商數七十二分各二十四下生者去一去二十四餘四十八以為羽故羽數四十八也羽生角三分羽數四十八分各十六上生者益一加十六於四十八得六十四以為角故角數六十四也此五聲大小之次也是黄鍾為均用五聲之法以下十一辰辰各有五聲其為宫商之法亦如之故辰各有五聲合為六十聲是十二律之正聲也沈括疑史記此說止是黄鍾一均之數非衆律之通法今詳通典云十一辰宫商之法亦如之盖若以十一律為宫亦用此數以乘之本律之分數而損益之林鍾為均則以八十一為五十四二十七為十八之類也變宫說見下條變宫變徵四十二餘九分分之六五十六餘九分分之八羽後宫前角後徵前上生變徵右二變相生之法國語周景王問於伶州鳩曰七律者何韋昭註曰周有七音黄鍾為宫太蔟為商姑洗為角林鍾為徵南吕為羽應鍾為變宫蕤賔為變徵後漢志說與此同此說盖以黄鍾為法餘律並凖此淮南子曰姑洗生應鍾比於正音故為和應鍾生蕤賔不比於正音故為謬今按五聲相生至於角位則其數六十有四隔八下生當得宫前一位以為變宫然其數三分損一毎分各得二十有一尚餘一分不可損益故五聲之正至此而窮若欲生之則須更以所餘一分析而為九損其三分之一分乃得四十二分餘九分分之六而後得成變宫之數又自變宫隔八上生當得徵前一位其數五十有六餘九分分之八以為變徵正合相生之法自此又當下生則又餘二分不可損益而其數又窮故立均之法於是而終焉然而二變但為和謬已不得為正聲矣右十二律正變倍半之法𫝊通典曰以子聲比正聲則正聲為倍以正聲比子聲則子聲為半如黄鍾之管正聲九寸子聲則四寸半也十二正律各有一定之聲而旋相為宫則五聲初無定位髙者或下當下者或髙則宫商失序而聲不和諧故取其半律以為子聲當上生而所生者短則下取此以為用然以三分損益之法計之則亦適合下生之數而自此律又以其正律下生則復得其本法而於半律又合上生之數此唯杜氏言之而他書不及黄鍾當以四寸半為半律而圖以為無者以九分之寸析至初抄終無可紀之數也林南應不用者相生之不及也此又杜氏所未言故詳著之又上下相生之法者以中吕之管長六寸一萬九千六百八十三分寸之萬二千九百七十四上生黄鍾三分益一不及正律九寸之數但得八寸五萬九千四十九分寸之五萬一千八百九十六以為黄鍾之變律半之得四寸五萬九千四十九分寸之二萬五千九百四十八以為黄鍾變律之子聲此依本文稍加詳潤其不及至數但九字以為至之變律七字變律之子聲五字皆今所増入本數猶用十分之寸計之尚為繁冗今以九分之寸更定於圖内而於此存其本文又上下相生以至中吕皆以相生所得之律寸數半之以為子聲之律今按蕤賔以下中吕上生之所不及故無變律而唯黄太姑林南應有之計正變通十八律各有半聲為三十六聲其間又有八聲雖有而無所用實計二十八聲而已杜氏又言變律上下相生以至中吕則是又當增十二聲而合為四十八聲似太過而無所用也今雅樂俗樂皆有四清聲其原盖出於此然欠八聲且無變律則其法又太疎畧而用有不周矣覽者詳之漢志曰黄鍾不復與他律為役者黄鍾至尊無與並也此言黄鍾唯於本宮用正律若他律為宫則黄鍾之為商角徵羽二變者皆但用其變律而正律不復與之為役也此與通典變律之說相發明而本志所言有未盡者故剟其大要附於此云右旋宫八十四聲之圖傳禮運曰五聲六律十二管旋相為宫孔氏正義曰十二辰各自為宫各有五聲十二管相生之次至中吕而帀凡六十聲變今按孔氏以本文但云五聲十二管故不及二而止為六十聲今增入二變二十四聲合為八十四聲自唐以來法皆如此云右六十調之圖六十調即前旋宫圖内六十聲也其二變二十四聲非五聲之正不可為調故止於六十也管子曰凡聽徵如負猪豕覺而駭凡聽羽如鳴馬在樹馬疑當作鳥凡聽宫如牛鳴􅐎中􅐎居郊反凡聽商如離羣羊凡聽角如雉登木以鳴音疾以清以鳴下六字疑衍凡將起五音凡首謂音之總先也先主一而三之四開以合九九一而三之即四也以是四開合於五音九也又九之為八十一也以是生黄鍾小素之首以成宫素本宫八十一數生黄鍾之宫為五音之本三分而益之以一為百有八為徵本八十一益以三分之一二十七通前百有八是為徵數今按百有八半之則為五十四有三而去其乘適足以是生商乘亦三分之一也三分百八而去一餘七十二是商之數也有三分而復於其所以是成羽三分七十二而益一分二十四合為九十六是羽之數也四今按九十六半之則為十八有三分而去乘適足以是成角三分九十六去其一分餘六十四是角之數太史公曰音樂者所以動盪血脉通流精神而和正心也故宫動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正禮羽動腎而和正智故聞宫音使人温舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徵音使人樂善而好施聞羽音使人整齊而好禮漢志曰商之為言章也物成熟可章度也師古曰度音大角反角觸也物觸地而出戴芒角也宫中也居中央暢四方倡始施生為四聲綱也徵祉也物盛大而繁祉也羽宇也物聚藏宇覆之也夫聲者中於宫觸於角祉於徵章於商宇於羽故四聲為宫紀也協之五行則角為木五常為仁五事為貎商為金為義為言徵為火為禮為視羽為水為智為聽宫為土為信為思以君臣民事物言之則宫為君商為臣角為民徵為事羽為物唱和有象故言君臣位事之體也五聲之本生於黄鍾之律九寸為宫或損或益以定商角徵羽九六相生隂陽之應也右明五聲之義伶州鳩曰律所以立均出度也韋昭曰律謂六律六吕也陽為律隂為吕均者均鍾木長七尺有絃繫之以均鍾者度謂鍾之大小清濁也漢大予樂官有之古之神瞽考中聲而量之以制神瞽古樂正知天道者也死以為樂祖祭於瞽宗謂之瞽考合也謂合中和之聲而量度之以制樂度律均鍾百官軌儀均平也軌道也儀法也度律度律吕之長短以平其鍾和其聲以立百事之道法也故曰律度量衡於是乎生紀之以三三天地人古者紀聲合樂以舞天神地祇人鬼故能神人以和今按此疑三分損益之法平之以六平之以六律也上章曰律以平聲成於十二十二律吕也隂陽相扶律娶妻而吕生子上下相生之數備也天之道也天之大數不過十二夫六中之色也故名之曰黄鍾十一月黄鍾乾初九六者天地之中天有六氣降生五味天有六甲地有五子十一而天地畢矣而六為中故六律六吕而成天道黄鍾初九六律之首故以六律正色為黄鍾之名重元正始之義也黄鍾陽之變也管長九寸徑三分圍九分律長九寸因而九之九九八十一故黄鍾之數立焉為宫法去九寸之一得林鍾初六六吕之首隂之變管長六寸六月之律坤之始也故九六隂陽夫婦子母之道是以初九為黄鍾黄中之色也鍾之言陽氣鍾聚於下也志今按六字之義註雖粗通然似亦太牽合矣下章漢正作黄字而其他説亦多出此疑此六字本是黄字劉歆時尚未誤至韋昭作註時乃滅其上之半而為六耳又註云九寸之一亦疑有誤當是去其三分之一所以宣養六氣九徳也宣徧也六氣隂陽風雨晦明也九徳九功之徳水火金木土榖正徳利用厚生十二月陽伏於下物始萌於五聲為宫含元處中所以徧養六氣九徳之本也由是第之由從也第次也次其月也二曰太蔟正月太蔟乾九二也管長八寸法云九分之八太蔟言陽氣太蔟達於上所以金奏賛陽出滯也贊佐也賈唐云太蔟正聲為商故為金奏所以佐陽發出滯伏也明堂月令正月蟄蟲始震三曰姑洗所以修潔百物考神納賔也三月姑洗乾九三也管長七寸一分律長七寸九分寸之一姑潔也洗濯也考合也言陽氣養生洗濯其枯穢改柯易葉也於正聲為角是月百物修潔故用之宗廟合致神人用之宴享可以納賔也四曰蕤賔所以安靖神人獻酬交酢也五月蕤賔乾九四也管長六寸三分律長六寸八十一分寸之二十六蕤委蕤柔貎也言隂氣為主委蕤於下陽氣盛長於上有似於賔主故可用之宗廟賔客以安靜神人行酬酢也酬勸酢報也五曰夷則所以詠歌九則平民無貳也七月夷則乾九五也管長五寸六分律長五寸七百二十九分寸之四百五十一夷平也則法也言萬物既成可法則也故可以詠歌九功之則成民之志使無疑貳也六曰無射所以宣布哲人之令徳示民軌儀也九月無射乾上九也管長四寸九分律長四寸六千五百六十一分寸之六千五百二十四宣徧也儀法也九月陽氣上升隂氣收藏萬物無厭已者故可以徧布前哲之徳示民道法也為之六間以揚沉伏而黜散越也六間六吕在陽律之間沉滯也黜去也越揚也吕隂律所以侣間陽律成其功發揚滯伏之氣而去散越者也伏則不宣散則不和隂陽序次風雨時至所以生物者也元間大吕助宣物也十二月大吕坤六四也管長八寸八分律長四寸二百四十三分寸之七十倍之為八寸二百四十三分寸之一百四十生律元一也隂繫於陽以黄鍾為主故曰元間以陽為首不名其初臣歸功於上之義也大吕助陽宣物也天氣始於黄鍾萌而赤地受之於大吕牙而白成黄鍾之功也二間夾鍾出四隙之細也二月夾鍾坤六五也管長七寸四分律長三寸二千一百八十七分寸之一千六百三十二倍之為七寸二千一百八十七分寸之一千七十五隙間也夾鍾助陽鍾聚曲細也四隙四時之間氣微細者春為陽中萬物始生四時之氣皆始於春春發而出之三時奉而成之故夾鍾出四時之微氣也三間中吕宣中氣四月中吕坤上六也管長六寸六分律長三寸萬九千六百八十三分寸之六千四百八十七倍之為六寸一萬九千六百八十三分寸之萬二千九百七十四陽氣起於中至四月宣散於外純乾用事隂閉藏於内所以助陽成功也故曰正月正陽之月也四間林鍾和展百事俾莫不任肅純恪也六月林鍾坤初六也管長六寸律長六寸林盛也鍾聚也於正聲為徵展審也俾使也肅速也純大也恪敬也言時務和審百事無有偽詐使莫不任其職事速其功大敬其職也五間南吕贊陽秀也八月南吕坤六二也管長五寸三分律長五寸三分寸之一榮而不實曰秀南任也隂任陽事助成萬物贊佐也六間應鍾均利器用俾應復也十月應鍾坤六三也管長四寸七分律長四寸二十七分寸之二十言隂應陽用事萬物鍾聚百嘉俱備時務均利百官器用程度庶品使皆應其禮復其常也月令孟冬命工師效功陳祭器按程度毋作淫巧以蕩上心必功致為上也律吕不易無姦物也律吕不變易其正各順其時則神無姦行物無害生也周語漢志曰律十有二陽六為律隂六為吕律以統氣類物吕以旅陽宣氣黄鍾者中之色君之服也鍾者鍾也天之中數五韋昭曰一三在上七九在下五為聲聲上宫五聲莫大焉地之中數六韋昭曰二四在上八十在下六為律律有形有色色上黄五色莫盛焉故陽氣施種於黄泉孳萌萬物師古曰孳讀與滋同滋益也萌始生為六氣元也以黄色名元氣律者著宫聲也宫以九唱六孟康曰黄鍾陽九林鍾隂六言陽唱隂和變動不居周流六虚始於子在十一月大吕吕旅也言隂大旅助黄鍾宣氣而牙物也位於丑在十二月太蔟蔟奏也言陽氣大奏地而牙物也師古曰奏進也位於寅在正月夾鍾言隂夾助太蔟宣四方之氣而出種物也位於夘在二月姑洗洗潔也言陽氣洗物辜潔之也孟康曰辜必也必使之潔也位於辰在三月中吕言微隂始起未成著於其中旅助姑洗宣氣齊物也位於巳在四月蕤賔蕤繼也賔導也言始導隂氣使繼養物也位於午在五月林鍾林君也言隂氣受任助蕤賔君主種物使大楙盛也師古曰種物種生之物楙古茂字也種音之勇反位於未在六月夷則則法也言陽氣正法度而使隂氣夷當傷之物也師古曰夷亦傷位於申在七月南吕南任也言隂氣旅助夷則任成萬物也位於酉在八月亡射射厭也言陽氣究物而使隂氣畢剝落之終而復始亡厭已也位於戍在九月應鍾言隂氣應亡射該臧萬物而雜陽閡種也孟康曰該臧塞也隂雜陽氣臧塞為萬物作種也晉灼曰外閉曰閡師古曰閡音胡待反下言該閡於亥音訓並同也位於亥在十月三統者天施地化人事之紀也李竒曰統緒也十一月乾之初九陽氣伏於地下始著為一萬物萌動鍾於太隂故黄鍾為天統律長九寸九者所以究極中和為萬物元也易曰立天之道曰隂與陽六月坤之初六隂氣受任於太陽繼養化柔萬物生長楙之於未令種剛强大故林鍾為地統律長六寸六者所以含陽之施楙之於六合之内令剛柔有體也立地之道曰柔與剛乾知大始坤作成物正月乾之九三萬物棣通孟康曰棣謂通意也師古曰棣音替蔟出於寅人奉而成之仁以養之義以行之令事物各得其理寅木也為仁其聲商也為義故太蔟為人統律長八寸象八卦宓戲氏之所以順天地通神明類萬物之情也立人之道曰仁與義在天成象在地成形后以裁成天地之道輔相天地之宜以左右民此三律之謂矣是為三統其於三正也黄鍾子為天正師古曰正音之成反下皆類此林鍾未之衝丑為地正太蔟寅為人正三正正始是以地正適其始紐於陽東北丑位易曰東北喪朋廼終有慶孟康曰未在西南陽也隂而入陽為失其類也答應之道也及黄鍾為宫則太蔟姑洗林鍾南吕皆以正聲應無有忽微孟康曰忽微者有若無細於髪者也謂正聲無有殘分也不復與他律為役者同心一統之義也非黄鍾而他律雖當其月自宫者則其和應之律有空積忽微孟康曰十二月之氣各以其月之律為宫非五音之正則聲有髙下差降空積若鄭氏分一寸以為數千不得其正此黄鍾至尊亡與並也易曰參天兩地而倚數師古曰易說卦之辭也倚立也參謂竒也兩謂耦也七九陽數六八隂數天之數始於一終於二十有五其義紀之以三故置一得三又二十五分之六凡二十五置終天之數得八十一以天地五位之合終於十者乘之為八百一十分應歴一統孟康曰十九嵗為一章一統凡八十一章千五百三十九嵗之章數黄鍾之實也繇此之義師古曰繇讀與由同由用也起十二律之周徑孟康曰律孔徑三分參天地之數也圍九分終天之數也地之數始於二終於三十其義紀之以兩故置一得二凡三十置終地之數得六十以地中數六乘之為三百六十分當期之日林鍾之實孟康曰林鍾長六寸圍六分以圍乘長得積三百六十分也師古曰期音基謂十二月為一期也人者繼天順地序氣成物統八卦調八風理八政正八節諧八音舞八佾監八方被八荒以終天地之功故八八六十四其義極天地之變以天地五位之合終於十者乘之為六百四十分以應六十四卦太蔟之實也孟康曰太蔟長八寸圍八分為積六百四十分也書曰天工人其代之師古曰虞書咎繇謨也言聖人禀天造化之功代而行之天兼地人則天故以五位之合乘焉唯天為大唯堯則之之象也師古曰則法也美帝能法天而行化地以中數乘者隂道理内在中餽之象也師古曰餽字與饋同易家人卦六二爻辭曰旡攸遂在中饋言婦人之道取象於隂無所必遂但居中主饋食而已故云然三統相通故黄鍾林鍾太蔟律長皆全寸而亡餘分也天之中數五地之中數六而二者為合六為虚五為聲周流於六虚虚者爻律夫隂陽登降運行列為十二而律吕和矣右明十二律之義十二律之名必有深指然國語漢志所言如此支離附合恐非本真今姑存之不足深究也黄鍾之實九寸下生者倍其實得十八為法三分其法得一者六為六寸以為林鍾林鍾之實六寸上生者四其實得二十四以為法三分其法得一者八為八寸以為太蔟太蔟之實八寸下生者倍其實得十六以為法三其一得三以分其法用十五得三者五為五寸餘一為三分寸之一合之為南吕南吕之實五寸三分寸之一計十六分上生者四其實得六十四以為法三其三得九以分其法用六十三得九者七為七寸餘一為九分寸之一合之為姑洗姑洗之實七寸九分寸之一計六十四分下生者倍其實得一百二十八以為法三其九得二十七以分其法用一百八得二十七者四為四寸餘二十為二十七分寸之二十合之為應鍾應鍾之實四寸二十七分寸之二十計一百二十八分上生者四其實得五百十二以為法三其二十七得八十一以分其法用四百八十六得八十一者六為六寸餘二十六為八十一分寸之二十六合之為蕤賔蕤賔之實六寸八十一分寸之二十六計五百十二分上生者四其實得二千四十八以為法三其八十一得二百四十三以分其法用一千九百四十四得二百四十三者八為八寸餘一百四為二百四十三分寸之一百四合之為大吕大吕之實八寸二百四十三分寸之一百四計二千四十八分下生者倍其實得四千九十六以為法三其二百四十三得七百二十九以分其法用三千六百四十五得七百二十九者五為五寸餘四百五十一為七百二十九分寸之四百五十一合之為夷則夷則之實五寸七百二十九分寸之四百五十一計四千九十六分上生者四其實得一萬六千三百八十四以為法三其七百二十九得二千一百八十七以分其法用一萬五千三百九得二千一百八十七者七為七寸餘一千七十五為二千一百八十七分寸之一千七十五合之為夾鍾夾鍾之實七寸二千一百八十七分寸之一千七十五計一萬六千三百八十四分下生者倍其實得三萬二千七百六十八以為法三其二千一百八十七得六千五百六十一以分其法用二萬六千二百四十四得六千五百六十一者四為四寸餘六千五百二十四為六千五百六十一分寸之六千五百二十四合之為無射無射之實四寸六千五百六十一分寸之六千五百二十四計三萬二千七百六十八分上生者四其實得十三萬一千七十二以為法三其六千五百六十一得一萬九千六百八十三以分其法用十一萬八千九十八得一萬九千六百八十三者六為六寸餘一萬二千九百七十四為一萬九千六百八十三分寸之一萬二千九百七十四合之為中吕中吕之實六寸一萬九千六百八十三分寸之一萬二千九百七十四計十三萬一千七十二分上生者四其實得五十二萬四千二百八十八以為法三其一萬九千六百八十三得五萬九千四十九以分其法用四十七萬二千三百九十三得五萬九千四十九者八為八寸餘五萬一千八百九十六為五萬九千四十九分寸之五萬一千八百九十六合之為黄鍾之變右律寸舊法本周禮鄭元註及杜佑通典法推之定為此數黄鍾之實九寸三分其實得三以為法下生者倍其法得六寸以為林鍾林鍾之實六寸三分其實得二以為法上生者四其法得八寸以為太蔟太蔟之實八寸三分其實得二寸六分以為法下生者倍其法得五寸三分以為南吕凡言分者皆九分寸之一南吕之實五寸三分三分其實得寸七分以為法上生者四其法得四寸二十八分内收二十七分得三寸合之得七寸一分以為姑洗姑洗之實七寸一分三分其實得二寸三分三釐以為法下生者倍其法得四寸六分六釐以為應鍾凡言釐者皆九分分之一應鍾之實四寸六分六釐三分其實得一寸五分二釐以為法上生者四其法得四寸二十分八釐内收十八分為二寸合之得六寸二分八釐以為蕤賔蕤賔之實六寸二分八釐三分其實得二寸八釐六毫以為法上生者四其法得八寸三十二釐二十四毫内收二十七釐為三分又收十八毫為二釐合之得八寸三分七釐六毫以為大吕凡言毫者皆九分釐之一大吕之實八寸三分七釐六毫三分其實得二寸七分二釐五毫以為法下生者倍其法得四寸十四分四釐十毫内收九分為一寸又收九毫為一釐合之得五寸五分五釐一毫以為夷則夷則之實五寸五分五釐一毫三分其實得一寸七分七釐六毫三絲以為法上生者四其法得四寸二十八分二十八釐二十四毫十二絲内收二十七分為三寸又收二十七釐為三分又收十八毫為二釐又收九絲為一毫合之得七寸四分三釐七毫三絲以為夾鍾凡言絲者皆九分毫之一夾鍾之實七寸四分三釐七毫三絲三分其實得二寸四分四釐二毫四絲以為法下生者倍其法得四寸八分八釐四毫八絲以為無射無射之實四寸八分八釐四毫八絲三分其實得一寸五分八釐七毫五絲六忽以為法上生者四其法得四寸二十分三十二釐二十八毫二十絲二十四忽内收十八分為二寸又收二十七釐為三分又收二十七毫為三釐又收十八忽為二絲合之得六寸五分八釐三毫四絲六忽以為中吕凡言忽者皆九分絲之一中吕之實六寸五分八釐三毫四絲六忽三分其實得二寸一分八釐七毫一絲五忽以為法上生者四其法得八寸七分八釐一毫六絲二忽以為黄鍾之變右律寸新法本太史公律書生鍾分蔡元定以寸分釐毫絲忽約之得此法子一黄鍾之律丑三為絲法寅九為寸數夘二十七為毫法辰八十一為分數巳二百四十三為釐法午七百二十九為釐數未二千一百八十七為分法申六千五百六十一為毫數酉一萬九千六百八十三為寸法戍五萬九千四十九為絲數亥一十七萬七千一百四十七黄鍾之實右黄鍾寸分數法蔡元定曰按黄鍾九寸以三分為損益故以之歴十二辰得一十七萬七千一百四十七為黄鍾之實其十二辰所得之數在子寅辰午申戌六陽辰為黄鍾寸分毫釐之數在亥酉未巳夘丑六隂辰為黄鍾寸分釐毫絲之法其寸分釐毫絲之法皆用九數故九絲為毫九毫為釐九釐為分九分為寸九寸為黄鍾盖黄鍾之實一十七萬七千一百四十七之數以三約之為絲者五萬九千四十九以二十七約之為毫者六千五百六十一以二百四十三約之為釐者七百二十九以二千一百八十七約之為分者八十一以一萬九千六百八十三約之為寸者九由是三分損益以生十一律焉或曰徑圍之分以十為法而相生之分釐絲忽以九為法者何也曰以十為法者天地之全數也以九為法者因三分損益而立也全數者即十而取九相生者約十而為九即十而取九者體之所以立約十而為九者用之所以行體者所以定中聲用者所以生十一律也子一分一為九寸丑三分二一為二寸寅九分八一為一寸夘二十七分十六三為一寸一為三分辰八十一分六十七九為一分一為一分巳二百四十三分一百二十八二十七為一寸三為一分一為三釐午七百二十九分五百一十二八十一為一寸三為一分一為一釐未二千一百八十七分一千二十四二百四十三為一寸為二十七為一分毫三一釐一為三申六千五百六十一分四千九十六七百二十九為一寸一八十一為一分九為一釐為一毫酉一萬九千六百八十三分八千百九十二二千一百八十七為一寸二百四十三為一分為二十七為一釐絲三一毫一為三戍五萬九千四十九分三萬二千七百六十八六千五百