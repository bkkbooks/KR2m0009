事迹經武要畧及獨進玊牒用之凡郊祀鹵簿用六千四百九十六人騎立大旗十一并執儀仗官兵三千三百五十六人馬一千九十八匹攝殿中侍御史諸衛將軍等五十一人御輦院繖扇輿輦二百三十八人控御馬天武等四十四人太常寺鼓吹樂工五百八十八人左右金吾司碧欄等三十五人總轄檢察儀仗兵部郎中各一人職掌十二人輅下駕士等二百六十一人車輅院般法物十人諸班直等一千八百四十六人馬執龍旗五十四人歩執龍旗三十三人撃鞭六人駕後大黄龍旗三人捧日甲馬隊三百人天武二百人奉宸隊一千二百五十人翰林司兵士二人淳熈十二年八月樞密院言大輦於前九十日八寶於前六十日繖扇於前四十日閲習並差殿前同歩軍司兵及輦官從之眀堂鹵簿用四千一百四十八人卓立大旗十一歩執儀仗官兵二千二百五十八人攝殿中侍御史諸衛將軍及繖扇輿輦等並同郊祀之數唯逍遥輦下減十人諸班直六百六人馬執龍旗五十四人歩執龍旗三十三人撃鞭十四人奉宸隊五百人駕後大黄龍旗五人不設金象革木四輅及大安輦大駕鹵簿儀仗及六引用鼓吹八百八十四人内鼓吹令丞二人府史典史各四人指揮使二人帥兵官四十六人歌色四十八人金鉦十七人棡鼓十七人大鼓一百一十人小鼓六十人中鳴六十人鐃鼓十七人拱辰官三十六人羽葆鼓十二人觱篥二十九人小横吹六十人簫八十七人笛二十九人節鼓一人此紹興十三年之制法駕三分減一鼓吹用五百八十八人内令丞四人府典史指揮使帥兵官歌簫觱篥笳笛拱辰官大小横吹節鼓四百三十八人金鉦棡鼓羽葆鼓大小鼓中長鳴一百四十六人此乃紹興十三年之制也嚴更警塲舊制嚴鼓一百二十四金鉦二十四鳴角一百二十紹興十三年以地狹移於欞星門外止用鼓角各六十金鉦二十六引服飾犦矟左右金吾將軍金銅甲胄披膊解結錐左右金吾街仗司花脚幞頭碧羅襖紫綠羅袍金銅帶儀刀烏皮履執儀仗者幞頭武弁平巾幘錦㡌鸞衫抹額纈騰蛇銅革帶紫緋羅繡袍紫紬寛衫緋紬袍青羅黄紬銀褐緋皂紬寶相花衫駕前殿前指揮使細甲方勝練鵲纈衫綠羅甲弓箭銀劒蒜瓣朶紅紫羅㡌帶殿前左右班粉青緋紫三色大撘纈羅衫長入祗候五十二人合色頭鬚鍍金㡌環青紅二色茶酒班殿侍紫羅印皂斜撘衫茶酒班十人内紅拂扇二人御龍直執從物八十三人珠巾方勝鵲衫行門二十四人金銀甲方勝鵲衫金束帶珠瑁銀骨朶内押行門纒枝袍行門花袍御龍直二百五十人員黄獅子纈衫長行方勝鵲衫内殿直已下二百五十人員亦如之長行白獅子纈衫殿前指揮使編排禁衛紫羅皂花衫駕頭扇筤下各天武三十一人白獅子衫東西班樂三十六人紫㡌帶招箭班三十六人幞頭束帶親從圍子行宫殿門中道左右壁㡌鍍金束帶其衫皆以白獅子纈餘並方勝練鵲遥郡刺史衫以羅雲鴈都指揮使以御仙花都虞候以簇四金鵰御前忠佐以宜男方勝正副使以黄獅子正副都頭以方勝練鵲控馬親從以青蓮執燭籠親從二百人以寶照餘從駕並以白獅子執燭二十二人衫亦如之鍍金帶軍頭引見司人員四人㡌子方勝練鵲衫等子八十三人㡌子團花寶照緋纈羅衫鍍金帶左右騏驥院御馬六特勒雕拳毛騧佛耳赤騧黄青騅滴露紫控馬執七寶百節鞭杌子御馬五十人纈衫皂紗㡌金鍍銀獅帶禁衛班直等緋綠羅紅盤雕背子紹興三年正月造緋二千領綠一千領以絹代羅十三年又以纈代繡乾道四年五月文思院製從駕人衣服慶元二年皇后受冊寶排設逍遥平輦人員各一人輦官二十七人人員㡌子宜男纈羅衫鍍金銀柘枝帶輦官幞頭白獅子纈羅衫鍍金海㨗帶紹興十二年皇太后回鑾上將躬迎於郊命有司製常行儀仗先是石延慶請詔禮官參考康定中常行儀衛酌取中制以正萬乘尊嚴之分工部尚書莫將等請先造黄麾仗二千二百六十五人十三年二月詔郊祀設大駕鹵簿仗内六引令禮部兵部太常等討論名數兵部侍郎程瑀等言國初大駕仗儀總一萬二十二百二十二人今已有黄麾半仗二千四百八十二人玉輅腰輿小輿大輦平輦逍遥輦下一千九人共三千四百九十二人法物儀仗外猶闕金象革木四輅芳亭鳯輦屬車寶輿等一千二百七十三人天武捧日奉宸隊等六千四百五十七人共七千七百三十人法物儀仗請下有司製造乃命兵部郎官錢時敏等參訂規式凡舊用文繡者以纈代之前後部及六引鼓吹八百八十四人舊制並騎𨗳以道途狹獈止令歩從其六引前大象止用一頭舊制郊祀詣景靈宫亦乘玊輅時以衢巷狹獈慮毁民居詔權宜乘輦若宗祀明堂享廟禮畢則乘玉輅至文徳殿三十一年四月臣僚言天子之出清道而後行千乘萬騎稱警言蹕旄頭前驅豹尾後殿其徃來馳道與闌出入者皆有厲禁自六飛南渡務為簡便唯四孟享獻乘輿躬行前為駕頭後止曲葢而爪牙拱扈之士或歩或趨錯出離立無復行列至有酌獻未畢已捨而歸士民觀者駢肩接袂雜遝虎士之中而不聞有誰何之者望詔有司講求其當凡車駕行幸從駕禁旅以若干人為一列相去各若干歩其乘馬前𨗳者皆預上其數命有司繪為圖先一日以聞别具副本報御史臺有不如令及不在圖中而輙冐至者許有司舉之蔽而不言令御史臺覺察詔可孝宗隆興二年將行郊祀詔遵藝祖典故省約儀衛除玉輅逍遥平輦外八寶下人數及車輦儀仗皆令減損視紹興二十八年之數權減其半用六千八百八十九人鼓吹警塲舊用一千一百五十九人亦三分減一乾道四年中書門下奏車駕詣徳夀宫用殿前司六百二十九人皇城在内廵檢司三百九十一人崇政殿四百四十九人凡一千四百六十九人四孟詣景靈宫用殿前司八百七十五人皇城在内廵檢司五百二十八人崇政殿五百二十一人凡一千九百二十四人以左藏南庫絹二千疋下文思院製其衣服六年郊祀詔復設五輅及大安輦文獻通考卷第一百十八
