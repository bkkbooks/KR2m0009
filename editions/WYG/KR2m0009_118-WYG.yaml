body:
  text: 文獻通考卷一百十八鄱陽馬端臨貴與著王禮考十三乘輿車旗鹵簿凡鹵簿有四曰大駕曰法駕曰鑾駕曰黄麾仗大駕郊祀籍田薦獻玉清昭應景靈宫用之迎奉聖像亦曰大駕惟不設象及六朝𨗳駕官法駕減太常卿司徒兵部尚書白鷺崇徳車大輦五副輅進贒明逺車又減屬車四餘並三分減一泰山下汾隂行禮用之鑾駕又減縣令州牧御史大夫指南記里鸞旗皮軒車象輅革輅木輅耕根車羊車黄鉞豹尾車屬車小車小輿餘並減半朝陵迎㤗山天書東封西祀朝謁太清宫奏告玉清昭應宫奉迎刻玊天書躬謝太廟皆用之鑾駕舊用二千人大中祥符五年告太廟增至七千人兵部黄麾仗用太常鼓吹太僕寺金玉輅殿中省大輦其制無定然皆於小御樓車駕親征或省方還京迎禁中天書五嶽上冊建安軍迎奉聖像六廟上冊皆用之凡大駕總二萬六十一人大率以太僕寺主車輅殿中省主輿輦繖扇御馬金吾主纛矟十六騎引駕細仗牙門六軍主搶仗尚書兵部主六引諸隊大角五牛旗門下省主寶案司天臺主螭漏太常主鼓吹朝服法物庫出旗噐名物衣冠幰葢軍噐庫出箙弩弓矢内弓箭庫出戎裝雜仗程氏演繁露曰宋景文筆記曰宣獻宋公著鹵簿記至犦槊不能得其義予後十餘年始得之其説曰江左有瓝槊為其首大如瓝是其義也按字書㼎小𤓰也蒲卓反字或為瓝同一音也予按爾雅犦牛幇牛也此獸抵觸百獸無敢當者故金吾仗刻犦牛於槊首以碧油囊籠之荆楚嵗時記所説亦與爾雅同今金吾仗以犦槊為第一隊則是犦槊云者刻幇牛於槊首也他説皆非也仁宗康定元年宋庠上言車駕行幸非郊廟大禮具陳鹵簿外其常日𨗳從惟前有駕頭後擁繖扇而已殊無前典所載公卿奉引之盛其侍從及百官屬下至厮役皆雜行其道中歩輦之後但以親事官百餘人執撾以殿謂之禁衛諸班勁騎頗與乘輿相逺而士庶觀者率隨扈從之夾道馳走喧呼不禁所過有旗亭市樓垂簾外蔽士民憑髙下瞰莫為嚴憚邏司街使恬不呵止威令弛闕玩習為常非所謂旄頭先驅清道後行之説也且自黄帝以神功盛徳猶假師兵為營衛則防㣲禦變古今一體按漢魏以降有大駕小駕至唐又分殿中諸衛黄麾等仗名數次序各有施設國朝承五姓荒殘之敝事從簡略毎鳴鸞㳺豫盡去戈㦸旌旗之制儀衛寡薄頗同藩鎮此皆制度放失憚於改作之咎謂宜委一二博學近臣討繹前代儀注及鹵簿令以乘輿常時出入之儀比之三駕仗酌取其中稍增儀物具嚴法禁上以示尊極下以防未然革去因循其在今日詔太常禮院與兩制詳定遂合奏諸班直禁兵歩騎為禁衛仍舊數復增清道馬百佩弓矢為五重騎而執䍐罼者一騎而執牙門旗前後四騎而執緋繡鳯氅二十四雉扇十有二皆分左右天武兵徒行者執柯舒親從兵增其數為三百殿前指揮使增為二百並騎左右相對開二門間容二丈以擬周禮之人門凡前牙門旗旗後為牙門旗前為禁衛輙入者論以法禁乘高下瞰乘簾外蔽夾道喧呼馳走者頗著於令其後寖弛神宗熈寜以來天子鋭意稽古禮文之事招延羣英折𠂻異同盡屏漢唐沿襲之陋與先儒訛舛之説元豐有詳定禮文所大觀有議禮局政和有禮制局元豐雖置局造輅然玉輅竟仍唐舊大觀中内侍呉徳仁上指南車記里鼓車之制天子宗祀大禮用之始廢天聖中燕肅盧道隆所製政和修飾玉輅又增造大輅而車輅益盛其制度各見車輅條下政和大駕鹵簿象六分左右次六引開封令開封牧大司樂少傅御史大夫兵部尚書各用本部鹵簿次金吾纛矟左右皁纛各六執托各一人紤四人押衙四人並騎犦矟八執各一人本衛上將軍將軍各四人本衛大將軍二人並騎犦矟四夾大將軍執各一人夾二人並騎法駕犦矟減二本衛上將軍各減二人次朱雀旗隊並騎金吾衛折衝都尉一人引隊犦矟二夾都尉執旗一人引夾各二人凡仗内引夾執人數准此弩四弓矢十六矟二十左右金吾衛果毅都尉二人押隊法駕弩減二弓矢減六矟減八宣和引隊改天武都指揮使押隊改天武指揮使次龍旗隊大將軍一員檢校騎引旗十二人並騎風伯雨師雷公電母旗各一五星旗五左右攝提旗二北斗旗一䕶旗十二人副竿二執人並騎法駕引旗䕶旗人各減四宣和檢校改左右衛大將軍雷公電母旗去父母二字次指南記里鼓車各一駕馬各四駕士各三十人白鷺鸞旗崇徳皮軒車各一駕士各十八人法駕無白鷺崇徳宣和有青雀青旌鳴鳶飛鴻虎皮貔貅六車在記里鼓之下崇徳之前減白鷺鸞旗皮軒三車駕士之數如前次金吾引駕騎本衛果毅都尉二人儀刀弩弓矢矟各八法駕儀刀弩弓矢矟各減二宣和都尉為神勇騎指揮使次大晟府前部鼓吹令二人府史二人管押指揮使一人掆鼓金鉦各十二帥兵官八人領大鼓一百二十帥兵官二十人領長鳴一百二十帥兵官六人領鐃鼓十二帥兵官四人領歌工拱辰管簫笳各二十四大横吹一百二十帥兵官十人領節鼓二笛簫觱篥各二十四掆鼓金鉦各十二帥兵官四人領小鼓中鳴各一百二十帥兵官八人領羽葆鼓十二帥兵官四人領歌工拱辰管簫笳各二十四法駕前後掆鼓金鉦各減四大鼓減四十長鳴減四十鐃鼓減四拱辰管後簫笳各減八大横吹減四十節鼓後笛簫觱篥笳桃皮觱篥各減八小鼓中鳴各減四十羽葆鼓減四最後簫笳各減八帥兵共減十八人次太史相風行漏等輿太史令及令史各一人並騎相風烏輿一輿士四人交龍鉦鼓各一輿士各六人司辰典士各一人並騎漏刻生四人鼓樓鐘樓行漏輿各一輿士各一百人太史正一人清道二人十二神輿一輿士十四人法駕行漏輿一輿士減四十人神輿一輿士多大駕二人宣和鼓鐘樓並改為輿大史正前有捧日副指揮使二人捧日節級十人神輿輿士增十次持鈒前隊左右武衛果毅都尉二人引隊左右武衛校尉二人絳引幡一執二人左右有金節十二執人並騎䍐罼各一朱雀幢及𨗳葢青龍白虎幢各一义三執人並騎隊長一人鈒㦸三百八十人左右武衛將軍二人檢校左右武衛校尉四人押隊法駕金節減四鈒㦸減七十二宣和引隊改驍騎都指揮使武衛校尉改驍騎軍使增朱雀旗後之义一去龍虎旗後之义三檢校改用左右驍騎將軍次黄麾幡一執一人紤二人騎法駕前有殿中侍御史二員次六軍儀仗左右神武軍左右羽林軍左右龍武軍各有統軍二員都頭二人羽林又有節級二人押仗本軍旗各一排闌旗各二十合有吏兵力士旗各五掩尾天馬旗二羽林有赤豹黄熊旗龍武有龍君虎君旗各一白柯槍五十哥舒棒十鐙杖八法駕神武軍減排闌旗十羽林龍武軍各減四吏兵力士旗減一宣和統軍改軍將神武軍旗改熊虎排闌旗改平列哥舒棒改㦸鐙杖改矛㦸羽林隊無節級黄熊旗改黄羆龍武旗改熊虎次引駕旗天王旗二排仗通直官二人押旗十二辰旗各一法駕同次龍墀旗天下太平旗一排仗大將二人夾旗五方龍旗各一金鸞金鳯旗各一獅子旗二君王萬嵗旗一日月旗各一法駕減鸞鳯獅子旗次御馬二十四控馬每匹天武二人御馬直二人為十二重法駕減八為八重宣和御馬直改為習馭次中道隊大將軍一員檢校法駕同宣和大將軍改為左右驍衛大將軍次日月合璧旗一苣文旗二五星連珠旗一祥雲旗二長夀幢二宣和苣文改慶雲祥雲改祥光次金吾細仗青龍白虎旗各一五嶽神旗五方神旗五方龍旗五方鳯旗各五以上執各一人紤各三人法駕五方龍鳯旗各減二宣和改校尉為使臣五嶽神旗去神字次八寳鎮國神寶皇帝之寶皇帝行寶皇帝信寶在左受命寶天子之寶天子行寶天子信寶在右為四重香案八各以二列於寶輿之前碧欄三十四人符寶郎行於碧欄之間法駕減碧欄八人宣和增引寶職掌二人香案職掌六人援衛傳喝親從一百人奉寶輦官每寶二十八人節級一人奉寶一十二人擡香案行馬執燭籠各四人持席褥油衣共三人香案寶輿各九燭籠三十六碧欄之數同前次方繖二大雉尾扇四夾執繖扇各一人以下凖此法駕同次金吾四色官六人押仗二人法駕減押仗次金甲二人宣和改為銅甲次太僕寺進馬四人並騎次引駕千牛衛上將軍一員千牛八人中郎將二人並乘珂馬千牛二人並騎宣和引駕改為千牛衛大將軍中郎將改為捧日都虞候次長史二人並騎宣和無次金吾引駕官四人並騎次𨗳駕官執政以上人從六人待制諫議防禦使以上五人監察御史刺史諸衛將軍以上四人次繖扇輿輦大繖二中雉尾扇四夾腰輿一小雉尾扇四夾應奉人員一人十將將虞候節級二人長行十六人排列官二人中雉尾扇十二華蓋二執各一人香鐙一執擎八人小輿一應奉人逍遙平輦下二十四人逍遥子一應奉人十將將虞候節級共九人長行二十六人平輦一應奉人員七人餘並同上法駕排列官後中雉尾扇減四宣和去小雉尾扇四腰輿一添管押人員二人都將四人兼押小輿排列官一人小輿一奉輿二十四人都將九人逍遥子改為逍遥輦奉輦一十六人平輦一奉輦人同上後有尚輦奉御一人騎小輿前又有大輅一駕馬六太僕卿御駕士一百二十人次駕前東第五班開𨗳旗一皁纛十二引駕六十二人鈞容直三百人引駕回作樂五方色龍旗五門旗四十御龍四直歩執門旗六十天武駕頭下一十二人茶酒班執從物一十一人御龍直仗劔六人天武把行門八人麋旗一殿前班撃鞭一十人簇輦龍旗八日月麟鳯旗四赤青白黑龍旗各一御龍直四十人踏路馬二夾輅大將軍二人進輅職掌二員部押二人教馬官二員法駕同宣和無鈞容直開𨗳旗内增押班一人殿侍二人皁纛旗十二殿侍十二人執引駕人員二人長行六十人五方色吉字旗殿侍三人管押十人門旗殿侍二人管押四十人又八門旗六十御龍直一十二人骨朶直十二人御龍弓箭直弩直各十八人御龍直仗劔六人執麋旗殿侍二人管押龍旗人員二人都知副都知各一人執骨朶殿侍十六人内大將軍改為千牛衛大將軍朝服歩從將軍二人朝服陪乘掌輦四人皇帝乘玊輅駕青馬六駕士一百二十八人扶鑾八人骨朶直一百三十四人行門三十五人分左右陪乘將軍二員法駕同宣和駕士增為二百三十四人次奉宸隊御龍直左廂骨朶直右廂弓箭直弩直御龍四直並以逐班直所管人數列為五重天武骨朶大劍三百一十人次駕後東第五班大黄龍旗一鈞容直三十一人扇筤下天武二十人茶酒班簇輦三十一人招箭班三十三人法駕同宣和止用黄龍旗餘並無次副玉輅一駕青馬六駕士四十人法駕無宣和駕士一百人内人員二人次大輦一掌輦四人應奉人員十二人十將將虞候節級共一十人長行三百五十五人尚輦奉御二人殿中少監供奉職官二員令史四人書令史四人法駕同宣和增奉輦為九十人次太僕御馬二十四為十二重法駕減八為八重宣和無太僕次持鈒後隊左右武衛旅師二人法駕同宣和改為神勇都指揮使次重輪旗二大繖二大雉尾扇四小雉尾扇朱團扇各十二華葢二义二睥睨十二御刀六真武幢一綘麾二义一細矟十二法駕小雉尾扇朱團扇睥睨矟各減四華葢減一御刀減二宣和真武幢改為元武次左右金吾衛果毅都尉二人並騎總領大角一百二十法駕減四十宣和改都尉為驍騎都指揮使次大晟府後部鼓吹丞二人典事四人管押指揮使一人羽葆鼓十二帥兵官四人領歌工拱辰管簫笳各二十四帥兵官二人領鐃鼓十二帥兵官四人領歌工簫笳各二十四横吹一百二十帥兵官八人領笛簫觱篥笳桃皮觱篥各二十四法駕羽葆鼓減