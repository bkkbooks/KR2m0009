body:
  text: 文獻通考卷一百七十八鄱陽馬端臨貴與著經籍考五經詩漢藝文志古者采詩之官王者所以觀風俗知得失自考正也孔子純取周詩上采殷下取魯凡三百五篇遭秦而全者以其諷誦不獨在竹帛故也孔氏曰史記孔子世家云古者詩本三千餘篇去其重取其可施於禮義者三百五篇按書傳所引之詩見在者多亡逸者少則夫子所錄者不容十分去九馬遷之言未可信也據今者及亡詩六篇凡三百一十一篇而史記漢書云三百五篇缺其亡者以見在為數歐陽氏曰遷説然也今書傳所載逸詩何可數也以鄭康成譜圖推之有更十君而取其一篇者又有二十餘君而取其一篇者由此言之何啻三千又曰刪云者非止全篇刪去也或篇刪其章章刪其句句删其字如唐棣之華偏其反而豈不爾思室是逺而此小雅唐棣之詩也夫子謂其以室爲逺害於兄弟之義故篇刪其章也衣錦尚絅文之著也此鄘風君子偕老之詩也夫子惡其盡飾之過恐其流而不返故章刪其句也誰能秉國成不自為政卒勞百姓此大雅節南山之詩也夫子以能之一字為意之害故句刪其字也隋經籍志曰漢初有魯人申公受詩於浮丘伯作詁訓是為魯詩齊人轅固生亦傳詩是為齊詩燕人韓嬰亦傳詩是為韓詩齊轅固燕韓生皆為之傳或取春秋采雜說咸非其本義與不得已魯最為近之漢書師古注曰與不得已者言皆不得也三家皆不得其真而魯最近之三家皆列於學宫又有趙人毛萇善詩自云子夏所傳作詁訓傳是為毛詩河間獻王好之未得立後漢有九江謝曼卿善毛詩又為之訓東海衞敬仲受學於曼卿先儒相承謂之毛詩序子夏所創毛公及敬仲又加潤色鄭衆賈逵馬融並作毛詩傳鄭𤣥作毛詩箋齊詩魏代已亡魯詩亡於西晉韓詩雖存無傳之者唯毛詩鄭箋至今獨立又有業詩宋奉朝請業遵所註立義多異世所不行石林葉氏曰詩有四家毛詩最後出而獨傳何也曰豈惟毛詩始漢世之春秋公榖爲盛至後漢而左氏始立而後之盛行者獨左氏焉禮家之學五傳弟子分曹教授蓋小戴最為後出而今之言禮者惟小戴為衆所宗此無他六經始出諸儒講習未精且未有他書以證其是非故雜偽之說可入趙賔之易張覇之書是也歴時既久諸儒議論既精而又古人簡書時出於山崖屋壁之間可以為證而學者遂得即之以考同異而長短精粗見矣長者出而短者廢自然之理也六經自秦火後獨詩以諷誦相傳韓詩既出於人之諷詠而齊魯與燕語音不同訓詁亦異故其學往往多乖獨毛之出也自以源流得於子夏而其書貫穿先秦古書其釋鴟鴞也與金縢合釋北山烝民也與孟子合釋昊天有成命與國語合釋碩人清人黄鳥皇矣與左傳合而序由庚等六章與儀禮合蓋當毛氏時左氏未出孟子國語儀禮未甚行而學者亦未能信也惟河間獻王博見異書深知其精迨至晉宋諸書盛行肄業者衆而人始翕然知其說近正且左氏等書漢初諸儒皆未見而毛說先與之合不謂之源流子夏可乎唐人有云齊詩亡於魏魯詩亡於晉韓詩雖存無傳之者今韓氏章句已不存矣而齊詩猶有見者然唐人既謂之亡則書之真偽未可知也東萊吕氏曰魯齊韓毛詩讀異義亦不同以魯齊韓之義尚可見者較之獨毛詩率與經傳合闗雎正風之首三家者乃以為刺餘可知矣是則毛詩之義最得其真也詩序釋文舊說云關雎后妃之徳也至用之邦國焉名關雎序謂之小序此以下則大序也大序是子夏作小序是子夏毛公合作卜商意有未盡毛更足成之後漢儒林傳衞宏從謝曼卿受學作毛詩序善得風雅之㫖至今傳於世隋志先儒相承謂毛詩序子夏所創毛公及衞敬仲更加潤色石林葉氏曰世人疑詩序非衞宏所為此殊不然使宏鑿空為之乎雖孔子亦不能使宏誦師説為之則雖宏有餘矣且誦宏序有専取諸書之文而為之者有雜取諸書所說而重複互見者有委曲宛轉附經而成其書者不可不論也詩有六義一曰風二曰賦三曰比四曰興五曰雅六曰頌其文全出於周官情動於中而形於言言之不足故嗟歎之其文全出於禮記成王未知周公之志公乃為詩以遺王其文全出於金縢髙克好利而不顧其君文公惡而欲逺之不能使髙克将兵而禦狄於竟陳其師旅翺翔河上久而不召衆散而歸髙克奔陳其文全出於左傳微子至於戴公其間禮樂廢壊其文全出於國語古者長民衣服不貳從容有常以齊其民其文全出於公孫尼子則詩序之作實在數書既傳之後明矣此吾所謂専取諸書所言也載馳之詩許穆夫人作也閔其宗國顛覆矣又曰衞懿公爲狄人所滅絲衣之詩既曰繹賔尸矣又曰靈星之詩此蓋衆說並傳衞氏得善辭羙意併錄而不忍棄之此吾所謂雜取諸書之說而重複互見也騶虞之詩先言人倫既正朝廷既治天下純被文王之化而復繼之以蒐田以時仁如騶虞則王道成行葦之詩先言周家忠厚仁及草木然後繼之以内睦九族外尊事黄耉養老乞言此又吾所謂委曲宛轉附經而成其義也即三者而觀之序果非宏之所作乎漢世文章未有引詩序者惟黄初四年有共公逺君子近小人之説蓋魏後於漢宏之詩序至此始行也又曰世以詩序為孔子作初無據口耳之傳也惟隋經籍志以為子夏作先儒相承云毛公及衞宏潤益之今定為孔子作固不可若孔子授子夏而傳之是亦嘗經孔子所取亦何傷乎大抵古書未有無序者皆繫之於篇末蓋以總其凡也今書有序孔安國以為孔子作自安國始遷之逐篇之首易有序卦彖象爻辭王輔嗣遷之逐卦之中至太史公自序揚子雲法言皆其遺法况詩皆記其先王之政與列國之事非見其序蓋有全篇莫知所主意者孔子雖聖人人事之實亦安能臆斷於數百載之下猶之春秋必約魯史而後可為鄭忽與晉文公出入晉鄭不以告魯史所不得書則孔子不能强筆而削之也而謂衞宏能之可乎所謂衞宏從謝曼卿受學而作者范曄之言爾據史毛公趙人與河間王同時三傳而為徐敖初無謝曼卿者獨東漢賈逵傳言父徽學毛詩於謝曼卿至顯宗令撰齊魯韓詩與毛氏同異蓋漢自中興後毛詩始見鄭康成與衞宏畧先後豈有不知而以宏之言為孔子者此理尤甚明吾謂古者凡有是詩則有是序如今之題目者故太師陳之則可以觀風俗遒人采之則可以知訓戒學者誦之則可以興可以觀可以羣可以怨其藏在有司孔子刪詩既取其辭因以其序命子夏之徒為之則於理為近矣朱子曰詩序之作說者不同或以為孔子或以為子夏或以為國史皆無明文可考惟後漢儒林傳以為衞宏作毛詩序今傳於世則序乃宏作明矣然鄭氏又以為諸序本自合為一編毛公始分以寘諸篇之首則是毛公之前其傳已久宏特増廣而潤色之耳故近世諸儒多以序之首句爲毛公所分而其下推說云云者為後人所益理或有之但今考其首句則已有不得詩人之本意而肆為妄説者矣况沿襲云云之誤哉然計其初猶必自謂出於臆度之私非經本文故且自為一編别附經後又以尚有齊魯韓氏之說並傳於世故讀者亦有以知其出於後人之手不盡信也及至毛公引以入經乃不綴篇後而超冠篇端不為註而直作經字不為疑辭而遂為决辭其後三家之傳又絶而毛説孤行則其抵牾之迹無復可見故此序者遂若詩人先所命題而詩文反為因序以作於是讀者轉相尊信無敢擬議至於有所不通則必為之委曲遷就穿鑿而附合之寕使經之本文繚戾破碎不成文理而終不忍明以小序為出於漢儒也愚之病此久矣然猶以其所從來也逺其間容或真有傳授證驗而不可廢者故既頗采以附傳中而復併為一編以還其舊因以論其得失云又論邶栢舟序曰詩之文意事類可以思而得其時世名氏則不可以强而推故凡小序唯詩文明白直指其事如甘棠定中南山株林之屬若證驗的切見於書史如載馳碩人清人黄鳥之類决為可無疑者其次則詞㫖大槩可知必為某事而不可知其的爲某時某人者尚多有之若爲小序者姑以其意推尋探索依約而言則雖有所不知亦不害其爲不自欺雖有未當人亦當恕其所不及今乃不然不知其時者必强以爲某王某公之時不知其人者必强以爲某甲某乙之事於是傅㑹書史依託名諡鑿空妄語以誑後人其所以然者特以恥其有所不知而惟恐人之不見信而已且如栢舟不知其出於婦人而以爲男子不知其不得於夫而以爲不遇於君此則失矣然有所不及而不自欺則亦未至於大害理也今乃斷然以爲衞頃公之時則其故為欺罔以誤後人之罪不可揜矣蓋其偶見此詩冠於三衞變風之首是以求之春秋之前而史記所書荘桓以上衞之諸君事皆無可考者諡亦無甚惡者獨頃公有賂王請命之事其諡又爲甄心動懼之名如漢諸侯王必其甞以罪謫然後加以此諡以是意其必有棄賢用佞之失而遂以此詩予之若将以衒其多知而必於取信不知将有明者從旁觀之則適所以暴其真不知而啟其深不信也凡小序之失以此推之什得八九矣又其爲説必使詩無一篇不為羙刺時君國政而作固已不切於情性之自然而又拘於時世之先後其或書傳所載當此一時偶無賢君羙諡則雖有辭之羙者亦例以爲陳古而刺今是使讀書疑於當時之人絶無善則稱君過則稱己之意而一不得志則扼腕切齒嘻笑冷語以懟其上者所在而成羣是其輕躁險薄尤有害於温柔敦厚之教故予不可以不辯又論桑中序曰此詩乃淫奔者所自作序之首句以為刺奔誤矣其下云云者乃復得之樂記之說已畧見本篇矣而或者以爲刺詩之體固有鋪陳其事不加一辭而閔惜懲創之意自見於言外者此類是也豈必譙譲質責然後爲刺也哉此說不然夫詩之為刺固有不加一辭而意自見者清人猗嗟之屬是也然嘗試玩之則其賦之之人猶在所賦之外而詞意之間猶有賔主之分也豈有将欲刺人之惡乃反自爲彼人之言以陷其身於所刺之中而不自知之哉其必不然也明矣又况此等之人安於為惡其於此等之詩計其平日固已自其口出而無慙矣又何待吾之鋪陳而後始知其所爲之如此亦豈畏吾之閔惜而遂幡然遽有懲創之心邪以是爲刺不惟無益殆又不免於鼓之舞之而反以勸其惡也或者又曰詩三百篇皆雅樂也祭祀朝聘之所用也桑間濮上之音鄭衞之樂也世俗之所用也雅鄭不同部其來尚矣且夫子答顔淵之問於鄭聲亟欲放而絶之豈其刪詩乃錄淫奔者之辭而使之合奏於雅樂之中乎亦不然也雅者二雅是也鄭者緇衣以下二十一篇是也衞者邶鄘衞三十九篇是也桑間衞之一篇桑中之詩是也二南雅頌祭祀朝聘之所用也鄭衞桑濮里巷狭邪之所歌也夫子之於鄭衞蓋深絶其聲於樂以為法而嚴立其詞於詩以為戒如聖人固不語亂而春秋所記無非亂臣賊子之事蓋不如是無以見當時風俗事變之實而垂鑒戒於後世故不得已而存之所謂道並行而不相悖者也今不察此乃欲為之諱其鄭衞桑濮之實而文之以雅樂之名又欲從而奏之宗廟之中朝廷之上則未知其将以薦之何等之鬼神用之何等之賔客而於聖人爲邦之法又豈不爲陽守而隂叛之邪其亦誤矣曰然則大序所謂止乎禮義夫子所謂思無邪者又何謂邪曰大序指栢舟緑衣泉水竹竿之屬而言以爲多出於此耳非謂篇篇皆然而桑中之類亦止乎禮義也夫子之言正爲人有邪正羙惡之雜故特言此以明皆可懲惡勸善而使人得其性情之正耳非以桑中之類亦以無邪之思作之也曰荀卿所謂詩者中聲之所止太史公亦謂三百篇者夫子皆絃歌之以求合於韶武之音何邪曰荀卿之言固爲正經而發若史遷之說則恐亦未足爲據也豈有哇淫之曲而可以强合於韶武之音也邪詩書之序自史傳不能明其爲何人所作而先儒多疑之至朱文公之解經則依古經文析而二之而備論其得失而於詩國風諸篇之序詆斥尤多以愚觀之書序可廢而詩序不可廢就詩而論之雅頌之序可廢而十五國風之序不可廢何也書直陳其事而已序者後人之作藉令其深得經意亦不過能發明其所已言之事而已不作可也詩則異於書矣然雅頌之作其辭易知其意易明故讀文王者深味文王在上以下之七章則文王受命作周之語贅矣讀清廟者深味於穆清廟之一章則祀文王之語贅矣蓋作者之意已明則序者之辭可畧而敷衍附㑹之間一語稍煩則祗見其贅疣而已至於讀國風諸篇而後知詩之不可無序而序之有功於詩也蓋風之爲體比興之辭多於叙述風諭之意浮於指斥蓋有反覆詠歎聨章累句而無一言叙作之之意者而序者乃一言以蔽之曰爲某事也茍非其傳授之有源探索之無舛則孰能臆料當時指意之所歸以示千載乎而文公深詆之且於桑中溱洧之篇辨析尤至以爲安有刺人之惡而自爲彼人之辭以陷於所刺之地而不自知者哉其意蓋謂詩之辭如彼而序之說如此則以詩求詩可也烏有捨明白可見之詩辭而必欲曲從臆度難信之序說乎其說固善矣然愚以爲必若此則詩之難讀者多矣豈直鄭衞諸篇哉夫芣苢之序以婦人樂有子爲后妃之羙也而其詩語不過形容采掇芣苢之情状而已黍離之序以爲閔周室宫廟之顛覆也而其詩語不過慨歎禾黍之苗穂而已此詩之不言所作之意而頼序以明者也若捨序以求之則其所以采掇者爲何事而慨歎者爲何說乎叔于田之二詩序以爲刺鄭荘公也而其詩語則鄭人愛叔段之辭耳揚之水椒聊二詩序以爲刺晉昭公也而其詩語則晉人愛桓叔之辭耳此詩之序其事以諷初不言刺之之意而頼序以明者也若捨序以求之則知四詩也非子雲羙新之賦則袁宏九錫之文耳是豈可以訓而夫子不刪之乎鴇羽陟岵之詩見於變風序以爲征役者不堪命而作也四牡采薇之詩見於正雅序以爲勞使臣遣戍役而作也而深味四詩之㫖則歎行役之勞苦敘饑渴之情状憂孝養之不遂悼歸休之無期其辭語一耳此詩之辭同意異而頼序以明者也若捨序以求之則文王之臣民亦怨其上而四牡采薇不得爲正雅矣即是數端而觀之則知序之不可廢序不可廢則桑中溱洧何嫌其爲刺奔乎蓋甞論之均一勞苦之辭也出於敘情閔勞者之口則爲正雅而出於困役傷財者之口則爲變風也均一淫泆之詞也出於奔者之口則可刪而出於刺奔者之口則可錄也均一愛戴之辭也出於愛叔段桓叔者之口則可刪而出於刺鄭荘晉昭者之口則可錄也夫芣苢黍離之不言所謂叔于田揚之水之反辭以諷四牡采薇之辭同變風文公胡不玩索詩辭别自爲說而卒如序者之舊説求作詩之意於詩辭之外矣何獨於鄭衞諸篇而必以爲奔者所自作而使正經爲錄淫辭之具乎且夫子嘗刪詩矣其所取於關雎者謂其樂而不淫耳則夫詩之可刪孰有大於淫者今以文公詩傳考之其指以爲男女滛泆奔誘而自作詩以敘其事者凡二十有四如桑中東門之墠溱洧東方之日東門之池東門之楊月出則序以為刺淫而文公以為淫者所自作也如静女木𤓰采葛丘中有麻将仲子遵大路有女同車山有扶蘇蘀兮狡童褰裳丰風雨子衿揚之水出其東門野有蔓草則序本别指他事而文公亦以為淫者所自作也夫以淫昏不檢之人發而為放蕩無恥之辭而其詩篇之繁多如此夫子猶存之則不知所删何等一篇也文公謂序者之於詩不得其説則一舉而歸之刺其君愚亦謂文公之於詩不得其説則一舉而歸之淫謔如静女木瓜以下諸篇是也文公又以為序者之意必以為詩無一篇不為刺時君國政而作輕浮險薄有害於温柔敦厚之教愚謂古者庶人謗商旅議亦王政之所許况變風變雅之世實無可羙者而禮義消亡淫風大行亦不可謂非其君之過縱使譏訕之辭太過如狡童諸篇之刺忽亦不害其為愛君愛國不能自已之意今必欲使其避諷訕之名而自處於淫謔之地則夫身為淫亂而復自作詩以贊之正孟子所謂無羞惡之心者不可以人類目之其罪浮於訕上矣反得為温柔敦厚乎或曰文公之説謂春秋所記無非亂臣賊子之事蓋不如是無以見當時事變之實而垂鑒於後世故不得已而存之所謂並行而不相悖也愚以為未然夫春秋史也詩文詞也史所以紀事世之有治不能無亂則固不容存禹湯而廢桀紂錄文武而棄幽厲也至於文辭則其淫哇不經者直爲削之而已而夫子猶存之則必其意不出於此而序者之説是也夫後之詞人墨客跌蕩於禮法之外如秦少游晏叔源軰作為樂府備狹邪妖冶之趣其詞采非不艶麗可喜也而醇儒荘士深斥之口不道其詞家不蓄其書懼其爲正心誠意之累也而詩中若是者二十有四篇夫子錄之於經又煩儒先為之訓釋使後學誦其文推其義則通書西銘必與小山詞選之屬兼看並讀而後可以爲學也或又曰文公又嘗云此等之人安於爲惡其於此等之詩計其平日固已自其口出而無慙矣又何待吾之鋪陳而後始知其如此亦豈畏吾之閔惜而遂幡然遽有懲創之心邪愚又以爲不然夫羞惡之心人皆有之而况淫泆之行所謂不可對人言者市井小人至不才也今有與之語者能道其宣淫之状指其行淫之地則未有不面頸發赤且慙且諱者未聞其揚言於人曰我能姦我善淫也且夫人之為惡也禁之使不得為不若愧之而使之自知其不可為此鋪張揄揚之中所以爲閔惜懲創之至也夫子謂宰我曰汝安則爲之夫豈真以居喪食稻衣錦爲是乎萬石君謂子慶曰内史貴人坐車中自如固當夫豈真以不下車為是乎而二人既聞是言也卒爲之羞愧改行有甚於被譙讓者蓋以非爲是而使之求吾言外之意則自反而不勝其愧悔矣此詩之訓也或曰序者之序詩與文公之釋詩俱非得於作詩之人親傳面命也序求詩意於辭之外文公求詩意於辭之中而子何以定其是非乎曰愚非敢茍同序説而妄議先儒也蓋嘗以孔子孟子之所以説詩者讀詩而後知序説之不繆而文公之説多可疑也孔子之説曰誦詩三百一言以蔽之曰思無邪孟子之説曰説詩者不以文害辭不以辭害志以意逆志是爲得之夫經非所以誨邪也而戒其無邪辭所以達意也而戒其害意何也噫聖賢之慮逺矣夫詩發乎情者也而情之所發其辭不能無過故其於男女夫婦之間多憂思感傷之意而君臣上下之際不能無怨懟激發之辭十五國風爲詩百五十有七篇而其爲婦人而作者男女相悦之辭幾及其半雖以二南之詩如關雎桃夭諸篇爲正風之首然其所反覆詠歎者不過情慾燕私之事耳漢儒嘗以闗雎爲刺詩矣此皆昧於無邪之訓而以辭害意之過也而况邶鄘之末流乎故其怨曠之悲遇合之喜雖有人心者所不能免而其志切其辭哀習其讀而不知其㫖易以動盪人之邪情泆志而况以鋪張揄揚之辭而序淫泆流蕩之行乎然詩人之意則非以爲是而勸之也蓋知詩人之意者莫如孔孟慮學者讀詩而不得其意者亦莫如孔孟是以有無邪之訓焉則以其辭之不能不鄰乎邪也使篇篇如文王大眀則奚邪之可閑乎是以有害意之戒焉則以其辭之不能不戾其意也使章章如清廟臣工則奚意之難明乎以是觀之則知刺奔果出於作詩者之本意而夫子所不刪者其詩决非淫泆之人所自賦也夫子曰思無邪如序者之説則雖詩辭之邪者亦必以正視之如桑中之刺奔溱洧之刺亂之類是也如文公之説則雖詩辭之正者亦必以邪視之如不以木瓜爲美齊桓公不以采葛爲懼讒不以遵大路風雨爲思君子不以褰裳爲思見正不以子衿爲刺學校廢不以揚之水爲閔無臣而俱指爲淫奔謔浪要約贈答之辭是也且此諸篇者雖疑其辭之欠荘重然首尾無一字及婦人而謂之淫邪者乎或又曰文公嘗言雅者二雅是也鄭者緇衣以下二十一篇是也衞者邶鄘衞三十九篇是也桑間衞之一篇桑中是也二南雅頌祭祀朝聘之所用也鄭衞桑濮里巷狭邪之所作也夫子於鄭衞蓋深絶其聲於樂以爲法而嚴立其詞於詩以爲戒今乃欲爲之諱其鄭衞桑濮之實而文以雅樂之名又欲從而奏之宗廟之中朝廷之上則未知其将以薦之於何等之鬼神用之於何等之賔客乎愚又以爲未然夫左傳言季札來聘請觀周樂而所歌者邶鄘衞鄭皆在焉則諸詩固雅樂矣使其爲里巷狹邪所用則周樂安得有之而魯之樂工亦安能歌異國淫邪之詩乎然愚之所論不過求其文意之指歸而知其得於情性之正耳至於被之絃歌合之音樂則儀禮左傳所載古人歌詩合樂之意蓋有不可曉者夫闗雎鵲巢閨門之事后妃夫人之詩也而鄉飲酒燕禮歌之采蘋采蘩夫人大夫妻能主祭之詩也而射禮歌之肆夏繁遏渠宗廟配天之詩也而天子享元侯歌之文王大明綿文王興周之詩也而兩君相見歌之以是觀之其歌詩之用與詩人作詩之本意蓋有判然不相合者不可强通也則烏知鄭衞諸詩不可用之於燕享之際乎左傳載列國聘享賦詩固多斷章取義然其太不倫者亦以來譏誚如鄭伯有賦鶉之奔奔楚令尹子圍賦大明及穆叔不拜肆夏甯武子不拜彤弓之類是也然鄭伯如晉子展賦将仲子鄭伯享趙孟子太叔賦野有蔓草鄭六卿餞韓宣子子齹賦野有蔓草子太叔賦褰裳子㳺賦風雨子旗賦有女同車子栁賦籜兮此六詩皆文公所斥以爲淫奔之人所作也然所賦皆見善於叔向趙武韓起不聞被譏乃知鄭衞之詩未嘗不施之於燕享而此六詩之㫖意訓詁當如序者之説不當如文公之説也或曰序者之辭固有鄙淺附㑹居然可見者先儒疵議之非一人矣而子信之何邪曰愚之所謂不可廢者謂詩之所不言而頼序以明者耳至詩之所已言則序語雖工不讀可也况其鄙淺附㑹者乎蓋作序之人或以爲孔子或以爲子夏或以爲國史皆無明文可考然鄭氏謂毛公始以寘諸詩之首則自漢以前經師傳授其去作詩之時蓋未甚逺也千載而下學者所當遵守體認以求詩人之意而得其庶幾固不宜因其一語之贅疣片辭之淺陋而欲一切廢之鑿空探索而爲之訓釋也姑以近代詞人之作譬之如所謂皇帝二載秋閏八月初吉如所謂吾聞京城南兹惟羣山囿則辭意明白無俟序説者也放翁之詩曰城上危樓畫角哀沈園非復舊池䑓傷心池下春波綠曽逐孤鴻照影來夢斷香銷四十年沈園老栁不吹綿此身行作稽山土猶弔遺踪一悵然其題曰沈園而已誠齋之詩曰飽喜饑嗔笑殺儂鳳凰未必勝狙公雖逃暮四朝三外猶在桐花竹實中其題曰無題而已是三詩者不言所謂人莫能知其所以作之意也劉後村詩話釋之曰放翁㓜婚某氏頗倦於學嚴君督過之竟至仳離某氏别適某官一日通家於沈園目成而已晩年㳺園感而賦之誠齋既里居累章乞休致不得命再予祠有感而賦以爲雖脱吏責尚縻閑廪不若相忘於物外也然後三詩之意始明夫後村之説即三詩之序也後村之於楊陸二公相去不百年得於長老之所誦說口耳之所習聞筆之簡冊可以質諸二公而不繆也倘後乎此千百載説者必欲外後村之意而别爲之説則雖其體認之精辯析之巧亦終於臆説而已或曰文公之於詩序於其見於經傳信而有證者則從之如碩人載馳清人鴟鴞之類是也其可疑者則未嘗盡斷以臆説而固有引他書以證其謬者矣曰是則然矣然愚之所以不能不疑者則以其惡序之意太過而所引援指摘似亦未能盡出於公平而足以當人心也夫闗雎韓詩以爲衰周之刺詩賔之初筵韓詩以爲衞武公飲酒悔過之詩皆與毛序反者也而韓詩説闗雎則違夫子不淫不傷之訓是决不可從者也初筵之詩夫子未有論説也則詆毛而從韓夫一韓詩也初筵之序可信而闗雎之序獨不可信乎邶栢舟毛序以爲仁人不遇而作文公以爲婦人之作而引列女傳爲證非臆説矣然列女傳出於劉向向上封事論恭顯傾陷正人引是詩憂心悄悄愠於羣小之語而繼之曰小人成羣亦足愠也則正毛序之意矣夫一劉向也列女傳之說可信而封事之説獨不可信乎此愚所以疑文公惡序之意太過而引援指摘似爲未當此類是也夫本之以孔孟説詩之㫖恭之以詩中諸序之例而後究極夫古今詩人所以諷詠之意則詩序之不可廢也審矣愚豈好爲異論哉或曰夫子何以刪詩昔太史公曰古詩本三千餘篇孔子去其重複取其可施於禮義者三百五篇孔氏曰案書傳所引之詩見在者多亡逸者少則孔子所錄不容十分去九馬遷所言未可信也朱文公曰三百五篇其間亦未必皆可施於禮義但存其實以爲鑒戒耳之三説者何所折衷愚曰若如文公之説則詩元未甞刪矣今何以有諸逸詩乎蓋文公每捨序以言詩則變風諸篇祗見其理短而詞哇愚於前篇已論之矣但以經傳所引逸詩考之則其辭明而理正蓋未見其劣於三百五篇也而何以刪之三百五篇之中如詆其君以碩䑕狡童如欲刺人之惡而自爲彼人之辭以陷於所刺之地殆幾不可訓矣而何以錄之蓋嘗深味聖人之言而得聖人所以著作之意矣昔夫子之言曰述而不作又曰蓋有不知而作之者我無是也又曰多聞闕疑異時嘗舉史闕文之語而歎世道之不古存夏五郭公之書而不欲遽正前史之缺誤然則聖人之意蓋可見矣蓋詩之見錄者必其序説之明白而㫖意之可考者也其軼而不録者必其序説之無傳㫖意之難考而不欲臆説者也或曰今三百五篇之序世以爲衞宏毛公所作耳如子所言則已出於夫子之前乎曰其説雖自毛衞諸公而傳其㫖意則自有此詩而已有之矣鴟鴞之序見於尚書碩人載馳清人之序見於左傳所紀皆與作詩者同時非後人之臆説也若序說之意不出於當時作詩者之口則鴟鴞諸章初不言成王疑周公之意清人終篇亦不見鄭伯惡髙克之迹後人讀之當不能曉其爲何語矣蓋甞妄爲之説曰作詩之人可考其意可尋則夫子錄之殆述而不作之意也其人不可考其意不可尋則夫子刪之殆多聞闕疑之意也是以於其可知者雖比興深逺詞㫖迂晦者亦所不廢如芣苢鶴鳴蒹葭之類是也於其所不可知者雖直陳其事文義明白者亦不果錄如翹翹車乗招我以弓豈不欲往畏我友朋之類是也於其可知者雖詞意流泆不能不類於狹邪者亦所不删如桑中溱洧野有蔓草出其東門之類是也於其所不可知者雖詞意莊重一出於義理者亦不果録如周道挺挺我心扃扃禮義不愆何恤於人言之類是也然則其所可知者何則三百五篇之序意是也其所不可知者何則諸逸詩之不以序行於世者是也歐陽公詩譜補亡後序曰後之學者因迹前世之所傳而較其得失或有之矣若使徒抱焚餘殘脱之經倀倀然於去聖千百年之後不見先儒中間之説而欲特立一家之論果有能哉此説得之蓋自其必以爲出於衞宏毛公軰之口而先以不經之臆説視之於是以特立之己見與之較短量長於辭語工拙之間則祗見其齟齬而不合疎繆而無當耳夫使序詩之意果不出於作詩之初而皆爲後人臆度之説則比興諷詠之詞其所為微婉幽深者殆類東方朔聲謷尻髙之𨼆語蔡邕黄絹㓜婦之廋詞使後人各出其智以爲猜料之工拙恐非聖經誨人之意也或曰諸小序之説固有舛馳鄙淺而不可解者盡信之可乎愚曰序非一人之言也或出於國史之采錄或出於講師之傳授如渭陽之首尾異説絲衣之兩義並存則其舛馳固有之擇善而從之可矣至如其辭語之鄙淺則序所以釋經非作文也祖其意足矣辭不必翫也夫以夫子之聖猶不肯雜取諸逸詩之可傳者與三百五篇之有序者並行而後之君子乃欲盡廢序以言詩此愚所以未敢深以爲然故復摭述而不作多聞闕疑之言以明孔子刪詩之意且見古序之尤不可廢也文獻通考卷一百七十八
