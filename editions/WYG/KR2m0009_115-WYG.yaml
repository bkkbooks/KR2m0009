body:
  text: 文獻通考卷一百十五鄱陽馬端臨貴與著王禮考十圭璧符節璽印虞舜輯五瑞既月乃日覲四岳羣牧班瑞于羣后輯斂瑞信也公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧五等諸侯執之以合符於天子而驗其信否也周禮天子執冒四寸以朝諸侯鄭氏注云名玉以冒以徳覆冒天下也諸侯始受命天子錫以圭圭頭斜鋭其冒下斜刻小大長短廣狹如之諸侯來朝天子以刻處冒其圭頭有不同者即辨其偽也既月盡此月日覲日日見也既見之後審之非偽則又班還其瑞以與天下正始也程氏演繁露曰尚書大𫝊曰古者圭必有冒故瑁圭者天子與諸侯為瑞諸侯執所受圭以朝天子無過者復得以給使之歸國有過者留其圭三年已上御覽八百六按大𫝊此言必有所本舜典之謂輯五瑞者即此之執圭而朝者也輯者斂之而上呼天子也又謂班瑞于羣后者即此之復與其圭以歸者也第其有過留之三年者不見所出然大𫝊此言極有理也舜典下文東廵岱宗而䞇五玉以朝者即與在朝而輯五瑞者同理也正義曰五瑞本受之堯斂而還之謂如舜新以付改為舜臣與之正新君之始此亦有理然以上下文推之則不通矣四岳巡狩皆嘗斂玉而復授之矣至五器之斂復即是輯班之異名矣今獨於正月在都所班者為舜賜則巡狩之所如所復在已受新賜之後何用再班也邪以此知大𫝊所言有理蓋分還留兩端以為賞罰也者其說有理也按天子之所佩曰璽臣下之所佩曰印無璽書則九重之號令不能逹之於四海無印章則有司之文移不能行之於所屬此後世之事也三代以前則未之聞上之所以示信於下者惟圭璧與符節而已封建則有圭璧諸侯朝於天子則執其所受之圭以合焉所謂天子執冒四寸以朝諸侯公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧是也徴召則有符節掌節所謂掌守邦節而辨其用典瑞所謂珍圭以徴守以恤凶荒牙璋以起軍旅以治兵守是也二者皆重器故俱以玉為之古者人朴俗淳故雖有圭璧符節而其用甚簡必大朝㑹大徴發則以之示信後世巧詐日滋而防制益密故璽書印章之用甚煩而猶懼其不足以防姦莊周所謂焚符破璽而民朴鄙蓋有激也然則圭璧蓋符節璽印之𩔖世徒見繪禮圗者繪天子諸侯被冕服執圭璧遂以鎮圭桓圭以下為服飾之具又見尚書有五玉三帛二生一死䞇之說遂以圭璧為䞇見之物然皆非也舜典輯五瑞之下繼之以班瑞修五禮五玉之下繼以如五器卒乃復蓋索之以别其偽而復還之耳春官大宗伯以玉作六瑞以等邦國則自王執鎮圭至男執蒲璧以禽作六摯以等諸臣則自孤執皮帛以至工商執鷄六瑞在先六摯在後明圭璧非䞇獻之物也故今叙符節璽印而以圭璧先之虞書言修五禮五玉三帛二生一死䞇如五器卒乃復孔注五器即五玉五等諸侯所執也三帛諸侯世子執纁公之孤執元附庸之君執黄二生卿執羔大夫執鴈一死士執雉五器終則還之三帛生死則否然則豈諸侯世子以下則受其物而於五等諸侯反無所受乎按周禮小行人成六瑞王用鎮圭公用桓圭侯用信圭伯用躬圭子用榖璧男用蒲璧合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好康王之誥諸侯入應門皆布乗黄朱賔稱奉圭兼幣蓋諸侯之朝天子有圭璧以為信有馬幣以為䞇並陳於庭圭璧則合而還之馬幣則受之至於諸侯世子以下則無圭璧直以三帛二生一死效䞇而已無璧則不言復矣然則圭璧蓋似䞇而非也聘禮云以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也蓋古者朝聘皆以玉行禮而並無受玉之文明玉非幣馬羔鴈之比也周官典瑞掌玉瑞玉器之藏辨其名物與其用事王晉大圭執鎮圭繅藉五采五就以朝日繅有五采文所以薦玉木為中幹用韋衣而畫之就成也天子常春分朝日鄭司農云晉讀為搢紳之搢謂插於紳帶之間若帶劒也五就五帀也一帀為一就公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇㑹同於王三采朱白蒼二采朱綠也鄭司農云以圭璧見於王覲禮曰侯氏入門右坐奠圭再拜稽首侯氏見於天子春曰朝夏曰宗秋曰覲冬曰遇時見曰㑹殷見曰同諸侯相見亦如之亦執圭璧以相見春秋𫝊曰邾子執玉高其容仰瑑圭璋璧琮繅皆二采一就以覜聘璋以聘后夫人以琮享之也大夫衆來曰頫寡來曰聘鄭司農注云瑑有圻鄂瑑起珍圭以徴守以恤凶荒杜子春云珍當為鎮書亦或為鎮以徴守者以徴召守國諸侯若今時徴郡守以竹使符也鎮者國之鎮諸侯亦一國之鎮故以鎮圭徴之也凶荒則民有逺志不安其土故以鎮圭鎮安之元謂鎮圭王使之瑞節制大小當與琬琰相依王使人徴諸侯憂凶荒之國則授之執以徃致王命焉如今時使者持節矣恤者開府庫賑救之凡瑞節歸又執以反命牙璋以起軍旅以治兵守鄭司農云牙璋瑑以為牙牙齒兵象故以牙璋發兵若今時以銅虎符發兵元謂牙璋亦王使之瑞節兵守用兵所守若齊人戍遂諸侯戍周璧羡以起度鄭司農云羡長者此璧徑長尺以起度量玉人職曰璧羡度尺以為度元蓋為羡是不圜之貌蓋徑八寸袤尺榖圭以和難以聘女榖圭亦王使之瑞節榖善也其飾若粟文然難仇讎和之者若春秋宣公及齊侯平莒及郯晋侯使瑕嘉平戎於王其聘女則以納徴焉琬圭以治徳以結好琬圭亦王使之瑞節諸侯有徳王命賜之及諸侯使大夫来聘既而為壇㑹之使大夫執以命事焉大行人職曰時聘以結諸侯之好鄭司農云琬圭無鋒芒故治徳以結好琰圭以易行以除慝琰圭亦王使之瑞節鄭司農云琰圭有鋒芒傷害征伐誅討之象故以易行除慝易惡行令為善者以此圭責讓諭告之也元謂除慝亦謂諸侯使大夫來頫既而使大夫執而命事於壇大行人職曰殷頫以除邦國之慝玉人之事鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之命圭者王所命之圭也朝覲執焉居則守之子守榖璧男守蒲璧不言之者闕耳天子執冒四寸以朝諸侯名玉曰冒言徳能覆蓋天下者也四寸者方以尊接卑以小為貴天子用全上公用龍侯用瓚伯用將鄭司農云全純色也龍當為駹駹雜色也元謂全純玉也龍瓚將皆雜名也卑者下尊以輕重為差玉多則重石多則輕公侯四玉一石伯子男三玉二石琬圭九寸而繅以象徳琰圭九寸判規以除慝以易行凡圭琰上寸半琰圭琰半以上又半為瑑飾璧羡度尺好三寸以為度羡徑也好璧孔也爾雅曰肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環元謂羡猶延其袤一尺而廣狹焉榖圭七寸天子以聘女牙璋中璋七寸射二寸厚寸以起軍旅以治兵守二章皆有鉏牙之飾於琰側先言牙璋有文飾也陳氏禮書曰大宗伯作六瑞自王以下皆言執小行人掌六瑞自王以下皆言用則執者自人言之也用者自玉言之也執之所以行禮用之所以合符宗伯典瑞行人皆言執獨小行人言用則行禮非小行人所専掌特掌其合符之事而已若夫不施於行禮合符則寳而守之此玉人所以又言守之也掌節掌守邦節而辨其用以輔王命邦節者珍圭牙璋榖圭琬圭琰圭也王有命則别其節之用以授使者輔王命者執以行為信守邦國者用玉節守都鄙者用角節謂諸侯於其國中公卿大夫王子弟於其采邑有命者亦自有節以輔之玉節之制如王為之以命數為大小角用犀角其制未聞凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英簜輔之使節使卿大夫聘於天子諸侯行道所執之信也土平地也山多虎平地多人澤多龍以金為節鑄象焉必自以其國所多者於以相别為信明也今漢有銅虎符杜子春云簜當為帑謂以凾器盛此節或曰英簜畫凾門闗用符節貨賄用璽節道路用旌節皆有期以反節門闗司門司闗也貨賄者主通貨賄之官謂司市也道路者主治五涂之官謂鄉遂大夫也凡民逺出至於邦國邦國之民若來入由門者司門為之節由闗者司闗為之節其啇則司市為之節其以徴令及家徙則鄉遂大夫為之節唯時事而行不出闗不用節也變司市言貨賄者璽節主以通貨賄貨賄非必由市或資於民家焉變鄉遂言道路者容公邑及小都大都之吏皆主治五涂亦有民也符節者如今宫中諸官詔符也璽節者今之印章也旌節今使者所擁節是也將送者執此節以送行者皆以道里日時課如今郵行有程矣以防容姦擅有所通也凡節有法式藏於掌節凡通逹於天下者必有節以𫝊輔之必有節言逺行無有不得節而出者也輔之以𫝊者節為信耳傳說所齎操及所適無節者有幾則不逹圏土納之陳氏禮書曰節之為物或以玉或以角或以金或以竹或用以守或用以使或用以民周官掌節之所掌者八玉節也角節也虎節也人節也龍節也符節也璽節也旌節也小行人之所逹者六虎節也龍節也人節也旌節也符節也管節也掌節守邦國者用玉節守都鄙者用角節此用以守者也山國用虎節土國用人節澤國用龍節皆金為之此用以使者也門闗用符節貨賄用璽節道路用旌節皆有期以反節此用於使與民者也行人凡其使也必以旌節此使者所執也此掌之者若徙於他則為之旌節以逹之此民執也析竹為符節全竹為管節小行人有管節而掌節無之者掌節所掌謂之邦節以輔王命則所謂邦國之使節使邦國者所執也鄭氏謂使卿大夫聘於天子諸侯誤也小行人所逹謂之天下之節則所謂龍節人節虎節管節邦國都鄙使者所執非王官所掌也掌節無都鄙之使節以使都鄙者無節特以旌節行之也小行人無璽節以其所掌者使節而貨賄之事不預也然節不特八節六節而已典瑞珍圭以徴守以恤凶荒牙璋以起軍旅琬圭以治徳以結好琰圭以除慝以易行榖圭以和難以聘女鄭氏皆以為王使之瑞節則珍圭牙璋琬圭琰圭榖圭使者為信於所適者也龍節虎節人節符節旌節行人為信於道路者也調人凡和難弗辟則與之瑞節而以執之此琰圭耳則琰圭不特施於使者民亦與之也書康誥曰越小臣諸節春秋之時宋司馬握節以死司城致節於府人而去司馬牛致其邑與圭而適齊杜預曰圭守邑之信符則守節不特於邦國都鄙雖官府小臣亦有之也考工記牙璋榖圭七寸琬圭琰圭九寸漢竹使符竹箭五枚長五寸然則先王之節其長蓋亦不過於此若夫旌節之制又加長焉觀蘇武之杖節則非以寸計之也漢竹使符銅虎各分其半右留京師左付郡守唐符璽郎凡國有大事則出納符節班其右而藏其左先王之節其班藏蓋亦如此然老子曰執左契不責於人則藏其右者非是秦以印稱璽以玉不通臣下用制乘輿六璽曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽又始皇得藍田白玉為璽螭虎鈕文曰受天之命皇帝夀昌韍佩既廢乃以采組連結於璲光明表章轉相結受故謂之綬通典秦漢以降逮於周隋既多無注解或𫝊寫訛舛有義理難明雖研覈莫辨今但約真本史聊存一代之制他皆𩔖此質之者幸察焉漢高祖元年十月沛公至霸上秦王子嬰封皇帝璽符節降軹道旁漢初有三璽天子之璽自佩行璽信璽在符節臺漢舊儀璽皆玉螭虎鈕凡六璽皇帝行璽凡封國用之璽賜諸侯王書信璽發兵召大臣以天子行璽策拜外國以天子之璽事天地鬼神以天子信璽皆以武都紫泥封青布嚢白素裏兩端無縫尺一板中約署皇帝綬黄地赤采不佩璽璽以金銀縢組幐侍中緄負以從奉璽書使者乘馳𫝊其騎也三騎行晝夜千里為程衞宏曰秦前民皆佩綬金玉銀銅犀象為方寸璽各服所好秦以來天子獨稱璽又以玉羣下莫得用其玉出藍田山題李斯書其文曰受命於天既夀永昌高祖入咸陽秦王子嬰以璽降其璽乃始皇藍田玉璽螭獸鈕在六璽之外帝既誅項籍即天子位因服其璽世世𫝊受號曰漢𫝊國璽平帝崩孺子未立璽藏長樂宫及王莽即位請璽太后不肯授莽莽使安陽侯舜諭指太后怒罵之且曰若自以金匱符命為新皇帝變更正朔服制亦當自更作璽𫝊之萬世何用此亡國不祥璽為我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因涕泣左右皆垂涕舜亦悲不能止良久乃謂太后臣等已無可言莽必欲得𫝊國璽太后寜能終不與邪太后聞舜語切恐莽欲脅之乃出漢𫝊國璽投之地以授舜曰我老且死而兄弟今族滅也舜既得璽奏之莽大恱皇后璽文與帝同皇后之璽金螭虎紐皇太子黄金印龜紐印文曰章下至二百石皆為通官印漢諸侯王金璽盭綬盭音戾綠也漢舊儀云諸侯王黄金璽槖駝紐文曰璽徹侯金印紫綬相國丞相金印紫綬高帝一十年更名相國綠綬太師太傅太保太尉左右前後將軍金印紫綬御史大夫銀印青綬凡吏秩比二千石以上皆銀印青綬光祿大夫無秩比六百石以上皆銅印黑綬大夫博士御史謁者郎無其僕射御史治書尚符璽者有印綬比二百石以上皆銅印黄綬綏和元年長相皆黑綬建平二年復黄綬武帝太初元年改正朔數用五紀注云謂印文也若丞相曰丞相之印章諸卿及守相印文不足五字者以之足之孔氏雜說漢時印綬非若今之金紫銀緋長使服之也蓋居是官則佩是印罷則解之故三公上印綬也後漢張渙云吾前後十腰銀艾銀即銀印艾即綠綬十云者一官一佩之耳印不甚大淮南王曰方寸之印丈二之組是也宣帝時始賜匈奴單于印璽與天子同王莽既簒位遣五威將軍王駿等多齎金帛遺單于因易故印故印文曰匈奴單于璽莽更曰新匈奴單于章駿既至授單于印綬令上故印綬單于再拜受詔譯前欲解故印左姑夕侯蘇曰未見新印文宜且勿與單于解故印綬奉上受著新綬不解視印飲食至夜罷右率陳饒謂諸將率曰鄉者姑夕侯疑印文幾令單于不予人如今視印知其變改必求故印此非辭說所能距也既得而復失之辱命莫大不如椎破故印以絶禍根即引斧椎壊之明日單于果言漢賜單于印言璽不言章又無漢字諸王以下乃有漢言章今印去璽加新與臣下無異願得故印將率示以破印單于知無可奈何又多得賂遺乃遣使奉牛馬入謝因上書求故印後以印文改易怨恨勒兵入寇高祖與功臣剖符作誓文帝二年初與郡守為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聼受之竹使符皆以竹箭五枚長五寸鐫刻書第一至第五張晏曰符以代古之珪璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之使音所吏反武帝征和二年更節加黄旄初漢節純赤以戾太子持赤節故更為黄旄加上以相别文帝十二年除闗無用𫝊𫝊信也若今過所也師古曰古者或用棨或用繒帛棨者刻木為合符也景帝四年復置諸闗用𫝊出入應邵曰以七國新反備非常宣帝本始四年詔曰今嵗不登民以車船載榖入闗者得毋用𫝊光武建武三年閏月丙午赤眉君臣靣縳奉高皇帝璽綬二月己未祠高廟受𫝊國璽王莽敗時仍帶璽商人杜吳殺莽不知取璽公賔就斬莽首并取璽更始將李松送上更始赤眉至高陵奉璽上赤眉建武三年盆子降光武奉以上之靈帝熹平六年八月戊辰袁紹等誅宦官引兵入宫張遜叚珪等急廹刼少帝及陳留王小平津六璽不自隨辛未帝還宫是日得六璽失𫝊國璽袁術死軍破徐璆得其盗國璽及還許上之魏受禪遣使求璽獻穆曹皇后不與如此數輩后乃呼使者入親數責之以璽抵軒下因涕泣横流曰天不祚爾左右莫能仰視後漢皇后赤綬玉璽建武元年復設諸侯王金璽綟綬公侯金印紫綬九卿執金吾河南尹秩皆中二千石大長秋將作大匠度遼諸將軍郡大守國傅相皆秩二千石校尉中郎將諸郡都尉諸國行相中尉内史中䕶軍司直秩皆二千石以上皆銀印青綬中外官尚書令御史中丞治書侍御史公將軍長史中二千石丞正平諸司馬中宫王家僕雒陽令秩皆千石尚書中謁者黄門冗從四僕射都郡監中外諸都官令都侯司農部丞郡國長吏丞侯司馬千人秩皆六百石家令侍僕秩皆六百石雒陽市長秩四百石主家長秩皆四百石以上皆銅印黑綬諸曹長揖擢丞秩三百石諸秩千石者其丞尉皆秩四百石秩六百石者丞尉秩三百石四百石者其丞尉秩二百石縣國丞尉亦如之縣國三百石長丞尉亦二百石明堂靈臺丞諸陵校長秩二百石丞尉校長以上皆銅印黄綬縣國守宫令相或千石或六百石長相或四百石或三百石長相皆以銅印黄綬而有秩者侍中中常侍光祿大夫秩皆二千石大中大夫秩皆比二千石尚書諫議大夫侍御史博士皆六百石議郎中謁者秩皆比六百石小黄門侍郎中黄門秩皆比四百石郎中秩皆比三百石太子舍人秩二百石輿服志注後漢諸侯王列侯始封貴人薨皆令贈印璽建武二十六年賜南匈奴黄金璽盭緺綬建武之初禁網尚闊但以璽書發兵未有虎符之信杜詩上疏曰舊制發兵皆以虎符其餘調發竹使而已間者發兵但用璽書或以詔令如有姦人詐偽無由知覺愚以為軍旅尚興賊虜未殄調兵郡國宜立虎符以絶姦端書奏從之尚符璽郎中四人在中主璽及虎符竹符之半者符節令為符節臺率主符節事凡遣使掌授節中平六年始復節上赤葆徐氏曰按漢初節旄純赤武帝以衞太子持赤節乃更節加黄旄東都因之中平六年董卓議廢立袁紹掛節於上東門而去卓以紹棄節乃改第一葆為赤旄也晉時𫝊國璽與斬蛇劔俱為乘輿所寳斬蛇劔至恵帝時武庫火燒之遂亡及懐帝没胡𫝊國璽没於劉聰後又没於石勒及石虎死胡亂穆帝世乃還江南𫝊國璽是秦始皇所刻其玉出藍田山是丞相李斯所書其文曰受命於天既夀永昌漢高祖定秦秦王子嬰獻此璽及漢高即位仍佩之因以相𫝊故號曰𫝊國璽漢昭帝殿中一夜相驚霍光即召持節郎取璽郎不與光欲奪之郎按劔曰頭可得璽不可得光善之明日遷郎秩二等光後廢昌邑王賀立宣帝光自手解取賀璽扶令下殿至漢平帝王莽簒位就元后求璽乃出璽投之於地璽上螭一角缺及莽敗時帶璽綬避火於漸臺商人杜吳殺莽取綬不知取璽及莽頭公賔就見綬問綬主所在乃斬莽首并璽與王憲憲得無所送又自乘天子車輦李松入長安斬憲送璽詣宛上更始赤眉大司馬謝祿至高陵更始奉璽赤眉赤眉立劉盆子建武三年盆子敗於宜陽璽還光武孫堅從桂陽入討董卓時已焚燒洛邑徙都長安堅軍於城南見井中旦旦有光軍人莫敢汲堅乃探得璽初卓在亂掌璽者投於井中故堅得之袁紹有僭盗意乃拘堅妻逼求之紹得璽見魏武舉以向肘魏武惡之紹敗得璽還漢以禪魏魏以禪晉趙王倫簒立使義王王威就恵帝取之帝不與強奪之懐帝永嘉五年王彌入洛陽執懐帝及𫝊國六璽詣劉曜後為石勒所并璽復屬勒刻一邉云天命石氏此題今不復存勒為冉閔所滅此璽屬閔閔敗璽存閔大將軍蔣幹晉鎮西將軍謝尚遣督䕶何融至購賞得之以晉穆帝永和八年還江南晉元帝東渡歴數帝無玉璽北人皆云司馬家白版天子晉皇太子金璽龜紐朱黄綬四采赤黄縹紺貴人夫人貴嬪是為三夫人皆金章紫綬章文曰貴人夫人貴嬪之章淑妃淑媛淑儀修華修容修儀媫妤容華充華是為九嬪銀印青綬皇太子妃金璽龜紐纁朱綬諸王太妃妃諸長公主封君金印紫綬郡公侯縣公侯太夫人夫人銀印青綬程氏演繁露曰晉孔琳之當桓元時建議曰古者皇王𫝊國之璽及公侯襲封之印皆奕世𫝊用無敢改作今世惟尉之一職獨用一印至於内外羣臣毎遷悉改終年刻鑄金銀銅炭之費不可勝言愚請衆官印即用一印無煩改作則知是時毎一官别鑄印也宋皇太子金璽龜紐朱綬諸王金璽龜紐纁朱綬郡公金章元朱綬太宰太傅太保丞相司徒司空金章紫綬相國綠綟綬大司馬大將軍太尉凡將軍位從公者金章紫綬郡諸侯金章青朱綬驃騎車騎以下諸將軍並金章紫綬諸王嗣子金印紫綬郡公侯嗣子銀印青綬尚書令僕射中書令監祕書監銅印墨綬光祿大夫太子詹事左右衞以下諸將軍監軍銀章青綬諸校尉中郎將銀印青綬縣鄉亭侯金印紫綬鷹揚伏波以下諸將軍銀章青綬諸都尉校尉中尉銀印青綬州郡史銅印墨綬御史中丞都水使者銀印墨綬諸軍司馬銀章青綬匈奴䕶羌諸校尉銅印青綬尚書左右丞祕書丞銅印黄綬其下又有假青綬假墨綬齊乘輿制六璽以金為之並依秦漢之制皇太子諸王金璽皆龜紐公侯五等金章郡太守内史四品五品將軍皆銀章尚書令僕射至諸州刺史皆銅印其綬乘輿黄赤縹紺四采太子諸王纁朱綬赤黄縹紺色亦同相國綠綟綬三采綠紫紺郡公朱侯伯青子男素朱皆三采公嗣子紫侯嗣子青鄉亭侯闗中闗内侯紫綬白二采郡國太守内史青尚書令僕射中書監祕書監皆墨丞皆黄梁制乘輿印璽及皇太子諸王五等國封並畧如齊制鄉亭闗内闗中及各號侯諸王嗣子金印龜鈕紫綬闗外侯銀印龜紐青綬大司馬大將軍太尉諸位從公者金章龜鈕紫綬尚書令僕射尚書中書監令祕書監銅印墨綬左右光祿大夫加金章紫綬同其位但加金紫者謂之金紫光祿但加銀青者謂之銀青光祿太僕廷尉以下諸卿丹陽尹銀章龜鈕青綬諸將軍金章紫綬中郎將則青綬郡國太守相内史銀章龜鈕青綬諸縣署令秩千石者州郡大中正郡中正銅印環紐墨綬公府令史亦同諸縣尉銅印環鈕單衣黄綬梁末侯景之敗也以𫝊國璽自隨使其侍中兼平原太守趙思賢掌之曰若我死宜沈於江勿令吳兒復得之思賢自京口濟江遇盗從者棄之草間至廣陵以告郭元建元建取之以與辛術術送之至鄴按郭元建侯景之黨景敗以廣陵降王僧辨既而復降於北齊齊遣行臺辛術㨿廣陵𫝊國璽自五胡之亂沒於劉石石氏敗璽復南歸於晉歴宋齊梁至侯景之敗而璽又北歸於高齊云致堂胡氏曰有天下者必汲汲於一璽求之不得則歉然若郡守縣令之官而未視印綬也夫璽何所本哉二帝三王不聞𫝊是物而後為君也舜受之堯禹受之舜湯受之禹文武受之湯先聖後聖若合符節者豈璽之謂歟故詩書春秋紀事詳矣曾不及璽獨秦誇大使李斯以蟲鳥之文刻之美玉兼稱皇帝以識詔令自是而後始有璽書使秦善也而璽無所本固不當法使秦不善也而璽雖美擊而破之為宜又何足𫝊也故嘗論之官府百司之印章一代所為而受之君者也不可以失失之則不敬天子之璽亦一代所用而非受之於天者也必隨世而改不改則不新故漢有天下當刻漢璽而不必襲之秦唐有天下宜刻唐璽而不必襲之隋所以正位凝命革去故而鼎取新也茍以為不然曷不於二帝三王監之彼世之璽以亂亡毁逸者固多矣必以相𫝊為貴又豈得初璽如是之久邪陳制永定元年武帝所定乘輿服御皆採梁舊制以天下初定務惟節儉至天嘉中乃一依梁天監舊事北齊制天子六璽並依舊式皇帝行璽封常行詔勅用之皇帝之璽賜諸王書用之皇帝信璽下銅獸符發諸州鎮兵下竹使符拜代召諸刺史用之並白玉為之方一寸二分螭獸鈕天子行璽册拜外國則用之天子之璽賜諸外國書則用之天子信璽發兵外國若徴召外國及有事鬼神用之並黄金為之方一寸二分螭獸紐又有𫝊國璽白玉為之方四寸螭獸鈕上交蟠螭隱起鳥篆書文曰受天之命皇帝夀昌凡八字在六璽外唯封禪以封石凾又有督攝萬機印一鈕以木為之長尺二寸廣二寸五分皆上為鼻鈕鈕長九寸厚一寸廣七寸腹下隱起篆文書為督攝萬機凡四字此印常在内唯以印籍縫用則左户部郎中度支尚書奏取印訖轉納皇太子璽黄金為之方一寸龜鈕文曰皇太子璽宫中大事用璽小事用門下典書坊印諸侯印綬二品以上並金章紫綬三品銀章青綬三品以上凡是五省官及中侍中省官皆為印而不為章也四品得印者銀印青綬五品六品得印者銅印墨綬四品以下凡是開國子男及五等㪚品名號侯皆為銀章不為印七品八品九品得印者銅印黄綬金銀章印及銅印並方一寸皆龜鈕四方諸藩國王之章上藩用金下藩用銀並方寸龜鈕佐官唯公府長史尚書二丞給印綬六品以下九品以上唯當曹為官長者給印餘自非長官雖位尊並不給諸王纁朱綬四采赤黄縹紺純朱質纁文織長二丈一尺二百四十首廣九寸開國郡縣公散郡公元朱綬四采元赤縹紺質元文織長丈八尺百八十首廣八寸開國縣侯伯朱綬四采青赤白縹朱質青文織長丈六尺百四十首廣七寸開國縣子男名號侯開國鄉男素朱綬三采青赤白朱質白文織長丈四尺百二十首廣六寸一品二品紫綬三采紫黄赤純紫質長丈八尺百八十首廣八寸三品四品青綬三采青白紅純青質長丈六尺百四十首廣七寸五品六品黑綬二采青紺純紺質長丈四尺百首廣六寸七品八品九品黄綬二采黄白純黄質長丈二尺六十首廣五寸官品從第二以上小綬間得施玉環官有綬者則有紛皆長八尺廣三寸各隨綬色若服朝服則佩綬公服則佩紛官無綬者不合佩紛後周皇帝八璽有神璽有𫝊國璽皆寳而不用神璽明受之於天傳國璽明受之於運皇帝負扆則置神璽於筵前之右置𫝊國璽於筵前之左其六璽並因舊制皆白玉為之方一寸五分高一寸螭獸鈕三公諸侯印皆方寸二分高八分龜鈕七命以上銀四命以上銅皆龜鈕三命以上銅印銅鼻其方皆寸其高六分文曰某公官之印其組綬皇帝以蒼青朱黄白元纁紅紫緅則侯反碧綠十有二色諸公九色自黄以下諸侯八色自白以下諸伯七色自元以下諸子六色自纁以下諸男五色自紅以下三公之綬如諸公三孤之綬如諸侯六卿之綬如諸伯上大夫之綬如諸子中大夫之綬自紫以下士之綬自緅以下其璽印綬亦如之保定四年百官始執笏常服焉宇文䕶始袍加下襴遂為後制隋制神璽寳而不用受命璽封禪則用之餘六璽行用並用舊制其綬王纁朱綬四采赤黄縹紺純朱質纁文織成長丈八尺二百四十首廣九寸公元朱綬四采元赤縹紺純朱質元文織成長丈八尺二百四十首廣九寸侯伯青朱綬四采青赤白縹純朱質青文織成長丈六尺百八十首廣八寸子男素朱綬三采青赤白純朱質白文織成長丈四尺百四十首廣七寸正從一品綠綟綬四采綠紫黄赤純綠質長丈八尺二百四十首廣九寸從三品以上紫綬三采紫黄赤純紫質長丈六尺百八十首廣八寸銀青光祿大夫朝議大大及正從四品青綬三采青白紅純青質長丈四尺百十首廣七寸正從五品墨綬二采青紺純緇質長丈二尺百首廣六寸自王公以下皆有小䨇綬長二尺六寸色同大綬而首半之正從一品施二玉環以下不合其有綬者則有紛皆長六尺四寸廣二寸四分各隨綬色煬帝幸遼東命鄭元為京師留守樊子蓋為東都留守俱賜玉麟符以代銅獸六典云傳符之制京師留守曰玉麟符唐制天子有𫝊國璽及八璽皆玉為之神璽以鎮中國藏而不用受命璽以封禪禮神皇帝行璽以報王公書皇帝之璽以勞王公皇帝信璽以召王公天子行璽以報四夷書天子之璽以勞四夷天子信璽以召兵四夷皆泥封大朝㑹則符璽郎進神璽受命璽於御座行幸則合八璽為五􅓅函封從於黄鉞之内太皇太后皇太后皇后皇太子及妃璽皆金為之藏而不用太皇太后皇太后封令書以宫官印皇后以内侍省印皇太子以左春坊印妃以内坊印初太宗刻受命元璽以白玉為螭首文曰皇天景命有徳者昌至武后改諸璽皆為寳中宗即位復為璽開元六年復為寳天寳初改璽書為寳書十載改𫝊國寳為承天大寳初高祖入長安罷隋竹使符班銀莬符其後改為銅魚符以起軍旅易守長京都留守折衝府捉兵鎮守之所及左右金吾宫苑總監牧監皆給之畿内則左三右一畿外則左五右一左者進内右者在外用始第一周而復始宫殿門城門給交魚符廵魚符左箱右箱給開門符閉門符亦左符進内右符監門掌之蕃國亦給之雄雌各十二銘以國名雄者進内雌者付其國朝貢使各齎其月魚而至不合者劾奏𫝊信符者以給郵𫝊通制命皇太子監國給䨇龍符左右皆十兩京北都留守給麟符左二十右十九東方諸州給青龍符南方諸州朱雀符西方諸州騶虞符北方諸州元武符皆左四右三左者進内右者付外行軍所以給之隨身魚符者以明貴賤應召命左二右一左者進内右者隨身皇太子以玉契召勘合乃赴親王以金庻官以銅皆題某位姓名官有二者加左右皆盛以魚袋三品以上飾以金五品以上飾以銀刻姓名者去官納之不刻者𫝊佩相付有傳符銅魚符者給封符印發驛封符及封魚函用之有銅魚而無傳符者給封函還符封函用之天子廵幸則京師東都留守給留守印諸司從行者給行從印木契符者以重鎮守慎出納畿内左右皆三畿外左右皆五皇帝廵幸太子監國有軍旅之事則用之王公征討皆給焉左右各十九太極殿前刻漏所亦以左契給之右以授承天門監門晝夜勘合然後鳴鼓元武門苑内諸門有喚人木契左以進内右以授監門有勅召者用之魚契所降皆有勅書尚書省符與左同乃用大將出賜旌以顓賞節以顓殺旌以絳帛五丈粉畫虎有銅龍一首纒緋幡紫縑為袋油囊為表節懸畫木盤三相去數寸隅􅂷赤麻餘與旌同晉天福三年六月中書門下奏准勅製皇帝受命寳今按唐貞觀十六年太宗文皇帝刻之元璽白玉為螭首其文曰皇帝景命有徳者昌勅宜以受天明命惟徳允昌為文刻之周廣順三年二月内司製國寳兩坐詔太常具制度以聞有司奏按唐六典符寳郎掌天子八寳其一曰神寳其二曰受命寳其神寳方六寸高四寸六分厚一寸七分蟠龍鈕文與傳國寳同傳國寳秦始皇帝以藍田玉刻之李斯篆文方四寸靣文曰受命于天既壽永昌鈕蟠五龍二璽歴代相傳以為神器又别有六寳一曰皇帝行璽二曰皇帝之璽三曰皇帝信璽四曰天子行璽五曰天子之璽六曰天子信璽此六寳因文為名並白玉螭虎鈕歴代相傳亡則補之北朝鑄之以金至則天朝以璽字渉嫌改為寳貞觀十六年别製元璽一坐其文曰皇天景命有徳者昌白玉螭虎鈕同光中製寳二坐文曰皇帝受命之寳晋天福四年製寳一坐文曰皇帝神寳其同光天福二寳内司製造不見鈕象並尺寸制度勅令製寳兩坐宜用白玉方六寸螭虎鈕詔馮道書寳文其一以皇帝承天受命之寳為文其一以皇帝神寳為文按𫝊國寳自秦始皇後歴代傳授至唐末帝自燔之際以寳隨身焚焉晋高祖受命特製寳一座開運末北戎犯闕少帝遣其子延煦送於戎主戎主訝其非真少帝上表具述其事及戎主北歸齎以入蕃漢朝二帝未暇别製至是始刻之宋太祖皇帝受禪𫝊周廣順中所造二寳太宗制承天受命之寳真宗制恭膺天命之寳大中祥符中又别制恭膺天命之寳天下同文之寳用於封禪昭受乾符之寳以印宻祠宋制天子之寳皆用玉篆文廣四寸九分厚一寸二分填以金盤龍鈕係暈錦大綬赤小綬連玉環玉檢高七寸廣二寸四分厚四分玉斗方二寸四分厚一寸二分皆飾以金裝褁以紅綿加紅羅泥金夾帊納於小盝盝以金裝内設金牀暈錦褥飾以襯色玻瓈碧鈿石珊瑚金精石瑪瑙大中祥符初登封泰山别製寳盝皆差小其制又盝二重皆裝以金覆以紅羅繡帊載以腰輿及行馬並飾以金又有香爐寳子香匙灰匙火箸燭臺燭刀皆以金為之朝㑹陳於御前大禮即列於仗衛中累朝每上尊號有司製玉寳以尊號為文禁中所用别有三印一曰天下合同之印中書奏覆狀流内銓歴任三代狀用之二曰御前之印樞宻院宣命及諸司奏狀用之三曰書詔之印翰林詔書勅别錄勅榜用之皆鑄以金又以鍮石各鑄其一雍熙三年並改為寳别鑄以金舊者六印皆毁之皇太子金寳方二寸厚五寸係以朱組大綬連玉環金斗金檢長五寸濶二寸厚二分悉褁以紅綿加紅羅泥金帊納於小盝盝以金裝内設金牀又盝二重皆覆以紅羅銷金帊盝及腰輿行馬皆銀裝金塗他法物皆銀為之鈒花塗以金宋因唐制諸司皆用銅印諸王及中書門下印方二寸一分樞宻宣徽三司尚書省諸司印方二寸惟尚書省印不塗金餘皆塗金節度使印方一寸九分塗金餘印並方一寸八分惟觀察使塗金諸王節度使州府軍監縣印皆有銅牌其長七寸五分諸王廣一寸九分餘廣一寸八分諸王節度觀察使牌塗以金刻文云牌出印入印入牌出或本局無印者皆給奉使印景徳四年别鑄兩京奉使印大中祥符七年詔自今除國信接伴劾獄勾當財用創寺觀外其他細物勿給又有朱記以給京城及外處職司及諸軍校等其制長一寸七分廣一寸六分士庶及寺觀亦有私記大中祥符五年詔禁私鑄止得雕木為文大方寸旌節唐天寳中置節度使受命日賜之得以專制軍事行即建節府樹六纛宋凡命節度有司給門旗二龍虎旗一節一麾搶二豹尾二凡製旗以紅繒九幅髹漆杠緋纛旌用塗金銅龍頭髹漆杠綢以紅繒畫白虎設髹漆木盤於上節亦用髹漆杠飾以金塗銅葉凡三盤為二層以紅絲為旄並綢以紫綾旗囊又加碧絹囊麾槍豹尾亦髹漆杠麾槍設髹漆木盤綢以紫繒複囊又綢以碧油豹尾制以赤黄布畫豹文銀牌唐制差發驛遣使則門下省給𫝊符以通天下之信宋符劵皆樞宻院主之舊有銀牌以給乘驛者濶一寸半長五寸靣刻𨽻字曰勅走馬銀牌凡五字首為竅貫以革帶其後罷之樞宻院給劵謂之頭子太平興國三年李飛雄詐乘驛謀亂伏誅遂罷樞宻院劵别製新牌濶二寸半長六寸易以分書上鈒二飛龍下鈒二麒麟兩邊年月貫以紅絲縧端拱中使臣䕶邉兵多遺失之者又罷銀牌復給樞宻院頭子乾興元年三月作受命寳其文曰恭膺天命之寳命參知政事王曾書之遣内侍諸少府監文思院視工作仁宗明道元年禁中火寳冊悉焚其年九月改作寳及冊命參知政事陳堯佐書受命寳薛奎書尊號冊寳宰臣張士遜書仁宗為皇太子冊參知政事晏殊書皇太后尊號冊寳二年冊寳成三司言用黄金二千七百兩為法寳法物詔易以銀而塗黄金初真宗嘗為昭受乾符之寳前此亦焚遂詔宰相陳執中書欽崇國祀之寳刻之以代昭受乾符之寳凡齋醮表章用焉景祐三年篆文官王文盛言於少府監曰在京糧料院印多偽俲之以摹劵歴者謂宜鑄三靣印圓其制而靣闊二寸五分於外圍周匝篆紀年及糧料院名凡十二字以圍篆十二辰凡十二字中央篆正字上連印鈕令可轉旋以機穴定之用時月分對年中互建十二月自寅至丑終始循環每改元即更鑄之云若此使姦人無復措其巧矣少府監以奏詔三司詳定請如文盛言文盛又曰舊例親王中書印各方二寸一分樞宻宣徽三司尚書省開封府方二寸節度使寸九分節度觀察留後觀察使寸八分半防禦團練使轉運州縣印寸八分凡印各上下七分皆闊寸六分雖各有差降而無令式以紀其數詔從其言著於令康定初製銅符上篆文曰某處發兵符下鑄虎豹為飾而中分之右五符留京師左符付總管鈐轄州軍事官高者掌之樞宻院下符發兵第一至第五周而復始本處勘以左符即發兵皇祐五年秋九月作鎮國神寳時閱奉宸庫得良玉廣尺厚半之上以其希世之寳不欲以為服玩因作鎮國神寳命宰相龎籍篆而參知政事劉沆書其上寳成以進召近臣宗室觀於延和殿是嵗太常禮院引唐六典次序曰一神寳二受命寳冬至祠南郊大駕儀仗請以鎮國神寳先受命寳為前導自是遂為定式初太宗以玉寳二鈕賜太祖之子徳芳其文曰皇帝信寳至孫從式上之英宗即位别製受命寳其文曰皇帝恭膺天命之寳嘉祐八年將葬仁宗於永昭陵翰林學士范鎮上奏曰竊聞先朝受命寳及法寳物與平生衣冠器用皆欲舉而葬之非所以稱大行皇帝公儉之意也其受命寳望陛下寳而用之且示有所𫝊付若衣冠器玩則宜陳於陵寢及神御殿嵗時展視以慰思慕詔檢討官披繹典故及命兩制禮官議學士王珪等上議曰受命寳猶昔𫝊國璽也宜為天子𫝊器不當改作古者藏先王衣服於廟寢至於平生器玩則世納於房中亦不悉陳於陵寢謂宜從省約以稱先帝恭儉之實已而别製受命寳珪等議格不用命參知政事歐陽修篆其文曰皇帝恭膺天命之寳治平三年命知制誥邵泌殿中丞蘇唐卿詳定天下印文泌唐卿皆通篆籕尋復廢罷亦無所釐改焉神宗熙寧四年詔中外奉使除文臣兩省武臣横行已上不以職務𦂳慢餘官如使外國接送伴體量安撫制勘之𩔖給奉使印餘給銅記以奉使朱記為名先是臣僚差使不以官序高下職務慢𦂳例給奉使印而令式節文非劇司者記故宻院有請也九年八月令禮部鑄諸路提舉官印自是提舉官不帶奉使印以出十月詔西作坊鑄造諸銅符三十四副令三司給左契付諸門契付内鑰匙庫諸門輪差人員依時轉銅契赴庫勘同其鐵牌則請人自執止宿外仗本庫依漏刻法發鑰匙付外驗牌給付候開門即執牌納鑰匙請出銅契至晩仍依上項請納其開門朝牌六靣亦隨銅契發放時上以京城門禁不嚴素無符契命樞宻約舊契更造銅契中刻魚形以門名識之分左右給納以戒不虞而啓閉之法嚴於舊日矣元豐二年詳定儀注所言周禮王執鎮圭釋者曰祭天地宗廟及朝日夕月則執之若朝覲諸侯授玉於王王受玉撫玉而已考工記天子執冒四寸以朝諸侯蓋諸侯執圭以授天子天子以冒圭邪刻之處冒諸侯之圭以齊瑞信如後世之合符未有臨臣子而執鎮圭者唐六典殿中監掌服御之事凡大祭祀則進大圭執鎮圭若大朝會止進爵開寳通禮始著元會執圭出自西房淳化中上夀進酒又令内侍捧圭於周制唐禮皆不合其元會受朝賀請不執鎮圭上夀詔可三年五月詳定所言郊廟之禮有鎮圭而無大圭於禮為闕詔議大圭尺度考工記玉人之事鎮圭尺有二寸天子守之大圭長三尺杼上終葵首天子服之說者曰王所搢大圭也或謂之珽後魏以降又改為笏珽以白玉為之長尺有二寸西魏以來皆然方而不折雖非古制蓋後世所得之玉隨宜為之考之周禮大圭長三尺西魏隋唐長尺有二寸請自朝廷揆玉之有無制之又按孔頴逹言天子執鎮圭以朝日夕月及祭天地宗廟蓋奉祭祀執鎮圭者摯也搢大圭者笏也唐禮親祀天地神祇皆搢大圭執鎮圭有事宗廟則執鎮圭而已王涇郊祀録曰大圭質也事天地之禮質故執而搢之鎮圭文也宗廟之禮亦文故無兼執之義不知大圭天子之笏通用於郊廟請自今皇帝親祠郊廟搢大圭執鎮圭奉祀之時既接神再拜則奠鎮圭為摯執大圭為笏當事搢笏君尊則不搢笏别於臣下也儀注云皇帝搢鎮圭蓋沿襲之誤宜改為奠鎮圭盥手飲福則授之人詔俟製大圭畢施行詳定所言又古者執玉以行事前事則不執開元禮開寳通禮皇帝升輅不言執圭祀日質明至中壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監以進於是始搢大圭執鎮圭今皇帝乘玉輅執鎮圭赴景靈宫及太廟青城皆乘輅執圭殊不應禮請自今乘輅不執圭還内御大輦亦如之詔可詳定所又言大圭中必之制按考工記天子圭中必聘禮記元纁繫長尺絢組中必與絢組一也絢以薦玉組以約圭二者皆謂之繅藉今之鎮圭無此二物請製薦玉繅藉以木板為中幹廣袤如其玉然後用韋衣之乃於韋上畫五采文前後垂之又製約圭繅藉長尺上以元以絳為地五采五就因以為飾每奠圭則以薦玉之繅陳於地執圭則以約圭之繅備失墜因之為飾况大圭搢之紳帶之間不可無中必明矣俟明堂服大圭宜依鎮圭所約之組令可繫從之四年詔三省印銀銷金塗給事中印為門下外省之印舍人印為中書外省之印六年别鑄禮部貢舉之印舊制貢院有印院廢印亦隨毁禮部遇鎻試則牒印廢事故也又詔臣僚所授印亡殁並賜隨葬八年五月作受命寳以皇帝恭應天命之寳為文哲宗元祐元年詔天聖中章獻明肅皇后用玉寳方四寸九分厚一寸二分龍鈕今太皇太后權同處分軍國事宜依章獻明肅皇后故事從之又詔太皇太后玉寳以太皇太后之寳為文皇太后金寳以皇太后寳為文皇太妃金寳以皇太妃寳為文元符元年五月得𫝊國寳御殿受之紹聖三年咸陽縣民叚義斸地得古玉印光照滿室四年十二月上之詔禮部御史臺以下參驗五年三月翰林承㫖蔡京及講義玉璽官十三員奏按所獻玉璽色綠如藍温潤而澤其文曰受命於天既夀永昌其背螭鈕五盤鈕間有小竅用以貫組又得玉螭一首白如膏亦温潤其背亦螭鈕五盤鈕間亦有貫組小竅其靣無文與璽大小相合篆文工作皆非近世所為臣等以歴代正史考之璽之文曰皇帝夀昌者晉璽也曰受命於天者後魏璽也有徳者昌唐璽也惟徳允昌石晉璽也則既夀永昌者秦璽可知今得璽於咸陽其玉乃藍田之色其篆與李斯小篆體合飾以龍鳯鳥魚乃蟲書鳥跡之法於今所𫝊古書莫可比擬非漢以後所作明矣今陛下嗣守祖宗大寳而神寳自出其文曰受命於天既夀永昌則天之所畀烏可忽哉漢晉以來得寳鼎瑞物猶告廟改元肆𤯝上夀况𫝊國之器乎其受寳法物禮儀乞下所屬施行詔禮部太常寺考按故事詳定以聞至四月禮官言五月朔故事當大朝會宜就行受寳之禮依上尊號寳冊儀有司豫製受寳法物并寳進入俟降出權於寳堂安奉前三日差官奏告天地宗廟社禝前一日帝齊於内殿翼日帝服通天冠御大慶殿降坐受寳羣臣上夀稱賀徽宗崇寧五年作鎮國寳時有以玉印獻者印方寸以龜為鈕工作精巧文曰承天福延萬億永無極受寳記言有以古篆進者謂是也帝因次其文倣李斯蟲魚篆作寳文其方四寸有奇螭鈕方盤上圓下方名為鎮國寳大觀元年制八寳時得玉工用元豐中玉琢天子皇帝六璽疊篆紹聖間得漢𫝊國璽無檢螭又不缺疑其一角缺者乃檢也有檢𫝊考驗甚詳傳於世帝於是取其文而黜其璽不用因作自受命寳其方四寸有竒文皆琢以白玉篆以蟲魚帝自為之記鎮國受命二寳合天子皇帝六璽是為八寳於是下詔曰自昔皆有尚符璽官今雖𨽻門下後省遇親祠則臨時具員訖事復罷八寳既備宜重典司之職可令尚書省置官如古之制又詔永惟受命之符當有一代之制而尚循秦舊六璽之用度越百年之久或未大備自天申命地不愛寳獲全玉於異域得妙工於編氓八寳既成夐無前比殆天所授非人能為可以來年元日御大慶殿恭受八寳尚書省言請置符寳郎四員𨽻門下省二員以中人充掌寳於禁中按唐八寳車駕臨幸則符寳郎奉寳以從大朝會則捧寳以進今鎮國寳受命寳非常用之器欲臨幸則從六寳朝會則陳八寳皆夕納内符寳郎捧寳出以授外符寳郎外符寳郎從寳行於禁衛之内朝則分進於御座之前鎮國寳受命寳不常用唯封禪則用之皇帝之寳答鄰國之書則用之皇帝行寳降御札則用之皇帝信寳賜鄰國書及物則用之天子之寳答外夷國書則用之天子行寳封冊則用之天子信寳舉大兵則用之應合用寳外符寳郎具奏請内符寳郎御前請寳印訖付外符寳郎承受從之二年詔受命寳字之上添鎮國二字三年八月名八寳一鎮國神寳二受命之寳詔古為六璽至唐始名曰寳増數至八今天下承平百五十年其制尚闕紹聖中得秦李斯所作制度雖工乃藍田青玉又鎮國寳未有所稽今寳成祗受典禮始克大備實邦家之慶鎮國受命二寳寳而不用藏置内府人未知制作之因可宣付有司政和二年得元圭御大慶殿受圭宦者譚稹獻元圭其制兩旁刻十二山若古山尊上銳下方上有雷雨之文下無琢飾外黑内赤中一小好可容指其長尺有二寸詔付廷議議官以為周王執鎮圭緣以四鎮之山其中有好為受組之地其長尺有二寸周人倣古為之而王執以鎮四方也帝乃以是嵗冬御大慶殿受圭焉六年詔御寳自祖宗朝行用今百五十餘年角刓篆暗幾不可驗恐無以示信天下舊有祖宗所藏御前金寳宜自冬祀大禮畢行用而降新舊二寳印文付外照驗且以布告中外七年制定命寳時從于闐得大玉踰二尺色如截肪帝又制一寳赤螭鈕文曰範圍天地幽贊神明保合太和萬夀無疆凡十六字篆以蟲魚制作之工幾於秦璽其寳九寸檢亦如之號曰定命寳合前八寳為九其後詔以九寳為稱以定命寳為首應行導排設去處定命與受命天子寳在左鎮國與皇帝寳在右又詔得寳玉於異域受定命於神霄合乾元用九之數以明年元日受之凡兩受寳皆赦天下帝曰八寳者國之神器也至定命寳乃我所自制云禮部言政和令奉使官第二等以上給印餘給記差出者遇替移事故元借印記隨所在寄納本部嵗終檢舉拘收而寄納州縣占留給借無以防之乃詔有司立法應州縣寄納禮部印記非奉朝㫖不許擅行給借高宗開大元帥府謝克家以玉璽來上文曰大宋受命之寳建炎三年鑄三省樞宻院銀印舊制中書門下省印方二寸一分樞宻院印方二寸元豐中詔三省印銀鑄金塗五月改鑄虎符頒降令刑部遍下諸處見行虎符並不得施行康定所鑄銅符仍繳納尚書省又製金字牌凡赦書及軍機要切則用之自内侍省遣焉日行五百里四年改造宫殿諸門號皇城司掌之舊號不復用行宫禁衞所言應官司自給號記不許用黄色他色不許入皇城門又嚴代名借帶之禁論其罪如律紹興元年製受命中興寳宣示輔臣比定命寳大半分是嵗祀明堂八寳猶未備也二年正月更定行宫殿諸門號勅入禁衞號黄綾八角三千道入殿門黄絹以方一千道入宫門黄絹以圓八千道入皇城門黄絹以長八千道其後更殿門號以黄絹圓宫門以緋黄絹方皇城門以緋紅絹圓又詔官司輙以黄緋色為號者罪賞依偽造大禮􅃯號法四年鑄行宫留守司印權户部侍郎王俁言文書以印記防姦偽錢榖尤為要切不可借用他印今車駕廵幸凡常程文書皆留守司裁决以印記權行立用如行在所度支用侍郎印金倉部通用金部印留守司權本部侍郎用尚書印太府司農寺並用寺丞印不惟日下交互異時必生姦弊請度支金倉部太府司農寺各鑄印以行在所或廵幸某印為文事已發赴禮部置櫃封鑰掌之遇廵幸闗出行用庶無窒礙其他部要切印記都省依此施行詔印文添行在所字十三年四月行皇后冊禮冊用珉玉五十簡寳用金方一寸有半盝螭鈕文曰皇后之寳隆興以後悉循是制十六年郊祀始陳寳如承平之儀凡中興御府所藏玉寳十有一金寳三八寳皆高宗皇帝作入内内侍省掌之一曰鎮國神寳文曰承天福延萬億永無疆二曰受命寳文曰受命于天既夀永昌三曰天子之寳答外夷書用之四曰天子信寳舉大兵用之五曰天子行寳封冊用之六曰皇帝之寳答鄰國書用之七曰皇帝信寳賜鄰國書及物用之八曰皇帝行寳降御札用之大宋受命之寳太祖皇帝作定命寳文曰範圍天地幽贊神明保合太和萬夀無疆徽宗皇帝作并八寳謂之九寳大宋受命中興之寳紹興元年作五月宣示於内殿寳玉明潤追琢精巧金寳三皆建炎二年秋所作八月三日始用之一曰皇帝欽崇國祀之寳印香合祠表二曰天下合同之寳印中書門下省文字三曰書詔之寳印詔書紹興元年湖南副總管孔彦舟於潭州得玉請宣取以刻御寳詔御寳已備自艱難以來華靡之物一無所用令其不湏投進三十二年時孝宗以受禪詔恭上太上皇帝尊號曰光堯聖夀太上皇帝禮官討論冊寳之制冊用珉玉簡長一尺二寸廣一寸二分數視文之多寡聯以金繩首尾組帶刻龍鏤金藉以錦褥覆以紅羅泥金花匣塗以朱漆金飾龍鳯金鎻帉錔上以紅羅綉盤龍帊覆之承以金裝長竿牀金龍首魚鈎寳用玉篆文廣四寸九分厚二寸二分以皇祐黍尺為度填以金盤龍鈕係以暈錦大綬赤小綬連玉環玉檢高七寸廣二寸四分皆飾以金褁以紅綿加紅羅泥金夾帊納於小盝盝以金飾之内設金牀承以玻璃碧鈿石之屬又盝二重皆飾以金覆以紅羅繡帊載以腰輿行馬並金飾香爐寳香匙灰匙火筯燭臺燭刀亦以金為之命文思院製造乾道七年淳熙二年十二年加上尊號及紹熙元年上至尊夀皇帝聖尊號慶元二年上聖安夀仁太上皇帝尊號冊寳悉同此制又上夀聖太上皇后尊號冊寳如慈寧之制紹興時製皇太后冊寳寳用金文曰皇太后寳册以珉或象牙印寳法物皆以金詔以玉石製册上親書其文奉慈寜殿紹熙初恭上夀聖皇太后夀成皇后尊號金寳皆六字文曰夀聖皇太后寳夀成皇后之寳廣四寸九分厚一寸二分填以金盤龍鈕至四年加上夀聖隆慈備福皇太后尊號金寳以十字為文慶元二年十月上夀聖隆慈備福光佑太皇太后夀成恵慈皇太后夀仁太上皇后尊號冊寳其制並同嘉泰時其加上夀成慈恵太皇太后尊號冊寳亦皆如之諡册唯昭慈聖獻皇后以象牙餘皆用珉紹興七年五月命文思院用玉製顯肅皇后寳二顆禮官言國朝禮制諸后諡寳曾垂簾聼政者則用玉餘則比用金遂詔以金製造孝宗隆興二年金部言初行㑹子權借户部尚書印覆印今行之已久恐致混淆宜専有印記俾郎官掌之遂鑄太府寺専一檢察㑹子印二年復鑄尚書覆印㑹子印乾道元年禮官討論皇太子冊寳之制按㑹要冊用珉玉簡六十前後四枚刻龍填金貫以金絲首尾結為金花飾以帉錔襯以紅羅泥金夾帊藉以錦褥盛以黝漆匣長九尺五寸闊尺二寸高八寸裝以金花刻為金地合羅枝條隠起花覆以紅羅泥金帊絡以紅絲結縧襯以紅錦褥安以黝漆金葉裝牀其竿飾以螭首今請用珉玉簡七十五其黝漆匣用金塗銀花鳯葉加以腰輿行馬飾以花鳯條以魚鈎竿以螭首寳以黄金為之文曰皇太子寳係龜鈕舊制金寳方二寸厚五寸係以朱組大綬連玉環金斗金檢長五寸闊二寸厚二分悉褁以紅錦加紅羅泥金帊納於小盝二年禮部請郡縣假借印記悉毁而更鑄南渡之初有司印章多失尚方重鑄給之加行在二字或冠年號以别新舊然欺偽猶未能革至紹熙初禮部侍郎李巘言文書有印以示信防姦給毁悉經省部具有條制然州縣沿循或以縣佐而用東南將印以椽曹而用司冦舊章名既不正弊亦難防請令有司製州縣官合用印記舊印非所當用者毁之上從其請由是名實正而真偽别矣寧宗嘉定十四年山東效順鑄滄景淄密萊登濰徳莒濱齊棣青海州静海州泰安軍及京東安撫使馬歩軍總管京東河北鎮撫節制大使印並冠以嘉定二字十一月京東河北節制司繳進北方大將撲鹿花所獻皇帝恭膺天命之寳并元符三年御府寳圖一冊時淮東制置使兼京東河北節度使賈渉遣京東路鈐轄趙拱北軍大將撲鹿花獻之續令呂柟投進又鎮江副都統制翟朝宗繳進玉寳檢時獲元符玉寳而朝宗以玉檢來上其文若合符契乃詔以來年元日受寳於大慶殿時又得玉璽其文曰受命於天既夀永昌禮官條具典禮請附於皇帝恭膺天命之寳以獻宗廟閏十二月行奏獻之禮以内侍羅舜舉為内符寳郎提舉奉安玉寳有司豫製沿寳法物及寳輿明年正月朔皇帝服靴袍御大慶殿設黄麾半仗受朝賀畢次受玉寳進呈讀印文訖於天章閣安奉己未大赦天下監司帥守在外從官以上令上表陳賀及三衙諸軍都副統制親屬捧表進貢皆特推恩臣僚請詔禮官集受寳儀注勒為成書藏之祕閣十六年七月置奉安符寳所建殿以内臣掌之初淳熙十四年春有聶事愿者獲古印其文曰皇帝車駕奉祀汾陰之寳吳琚以獻於朝詔藏天章閣下工部考覈乃銅也按汾陰記封金匱石匱用受命寳及天下同文寳此寳不見於紀載朝論疑之卒不加賞云文獻通考卷一百十五
