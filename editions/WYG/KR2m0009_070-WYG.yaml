配座太祝以幣授侍中侍中奉幣北向進攝則太祝授太尉太尉奉玉幣進奠皇帝受幣太常卿引進髙祖神堯皇帝神座雩祀則太宗座俛伏興太常卿引皇帝少退東向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止攝則太尉行還立無樂也初皇帝將奠配帝之幣謁者七人各分引獻官奉玉幣俱進跪奠於第一等神座上辛則謁者五人各分引獻官奉玉幣奠五方帝座攝事同雩祀五人帝五官相次而畢餘星座之幣謁者贊引各引獻官進奠於首座餘皆祝史齋郎助奠訖引還復位攝則太尉奠配座諸太祝及諸獻官各奉玉幣進於神座訖還罇所上辛無星以下座也初衆官拜訖祝史各奉毛血之豆立於門外登歌止祝史奉毛血入各由其陛升諸太祝迎取於壇上俱進奠於神座諸太祝與祝史退立於罇所進熟皇帝既升攝則太尉升上辛雩祀同奠玉幣太官令出帥進饌者奉饌各陳於壝門外謁者引司徒出詣饌所司徒奉昊天上帝之俎初皇帝既至位樂止太官令引饌入攝事則於太祝奠毛血其太官引饌入上辛雩祀同俎初入門奏雍和之樂以黄鍾之均自後接神之樂皆奏黄鍾饌各至其陛樂止祝史俱進徹毛血之豆降自東陛以出上帝之饌升自午陛配帝之饌升自卯陛青帝之饌升自寅陛赤帝之饌升自己陛黄帝之饌升自未陛白帝之饌升自酉陛黑帝之饌升自子陛大明之饌升自辰陛夜明之饌升自戍陛其内官中官諸饌各隨便而升上辛無大明已下饌攝事同雩祀五人帝饌各由其陛升諸太祝迎引於壇上各設於神座前籩豆蓋羃先徹乃升簠簋既奠却其蓋於下也設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還罇所又進設外官衆星之饌相次而畢上辛無外官已下饌雩祀又進設五官饌並無衆星饌也初壇上設饌訖太常卿引皇帝詣罍洗攝則謁者引太尉詣罍洗上辛雩祀同也樂作皇帝至罍洗樂止侍中跪取匜沃水又侍中跪取盤盥承水皇帝盥手黄門侍郎跪取巾於篚興進皇帝帨手訖黄門侍郎受巾跪奠於篚黄門侍郎又取匏爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黄門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黄門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛訖樂止攝則太尉洗拭匏爵無樂作以下儀謁者引司徒升自東陛立於罇所齋郎奉俎從其後太常卿引皇帝詣上帝罇所執罇者舉羃侍中贊酌汎齊訖壽和之樂作皇帝每酌獻及飲福皆作壽和之樂攝則謁者引太尉升自南陛詣上帝罇所執事舉羃太尉酌汎齊訖樂作太常卿引皇帝進昊天上帝神座前北向跪奠爵興太常卿引皇帝少退北向立樂止攝儀皆謁者引太尉太祝持版進於神座之右東向跪讀祝文曰維某年嵗次月朔日子嗣天子臣某敢昭告於攝則云天子某謹遣太尉封某臣名敢昭告於昊天上帝上辛雩祀同昊天上帝大明南至長晷初升萬物權輿六氣資始式遵彞典慎修禮物上辛云惟神化育羣生財成庶品雲雨作施普博無私爰因啟蟄式遵農事雩祀云爰兹孟夏龍見紀辰方資長育式遵常禮敬以玉帛犧牲粢盛庶品恭致燔祀表其寅肅敬以玉帛犧齊粢盛庶品備茲禋燎祇薦潔誠髙祖神堯皇帝配神作主凡攝事祝版進御署訖皇帝北向再拜侍臣奉版郊社令受遂奉出皇帝再拜攝則太尉再拜初讀祝文訖樂作太祝進跪奠版於神座興還罇所皇帝拜訖樂止太常卿引皇帝詣配帝酒罇所執罇者舉羃侍中取爵於坫進皇帝受爵侍中贊酌汎齊訖樂作太常卿引皇帝進髙祖神堯皇帝神座雩祀太宗東向跪奠爵俛伏興太常卿引皇帝少退東向立樂止上辛又謁者五人各引五方帝太祝皆取爵於坫酌汎齊各進奠於神座訖還罇所雩祀同太祝持版進於神座之左北向跪讀祝文曰維某年嵗次月朔日子孝曾孫開元神武皇帝臣某攝則云皇帝臣某謹遣太尉封臣某敢昭告於髙祖神堯皇帝履長伊始肅事郊禋用致燔祀於昊天上帝伏惟慶流長發徳冠思文對越昭升永言配命上辛云時惟孟春敬祈嘉穀用致禋祀昊天上帝伏惟髙祖睿哲徇齊欽明昭格祭祀之禮肅奉舊章雩祀云時惟正陽式遵恒典伏惟道叶乾元德施品物永言配命對越昭升謹以制幣犧齊粢盛庶品式陳明薦侑神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神座興還罇所皇帝再拜訖樂止太常卿引皇帝進昊天上帝神座前北向立樂作太祝各以爵酌上罇福酒合置一爵一太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興太祝各帥齋郎進俎太祝減神前胙肉皆取前脚第二骨也加於俎以胙肉共置一俎上太祝持俎以授司徒司徒奉俎西向進攝則言授皇帝受以授左右攝則太尉受以授齋郎謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自南階還版位西向立樂止文舞退鼓柷作舒和之樂退訖戞敔樂止武舞入鼓柷作舒和之樂立定戞敔樂止自此已上凡攝皆太尉為初獻其儀依皇帝行事贊佐皆謁者太祝齋郎皇帝將復位謁者引太尉攝則太常卿為亞獻自下並改太尉為太常卿詣罍洗盥手洗拭匏爵訖謁者引太尉自階升壇詣昊天上帝著罇所執罇者舉羃太尉酌醴齊訖武舞作謁者引太尉進昊天上帝神座前北向跪奠爵興謁者引太尉少退北向拜訖謁者引太尉詣配帝犧罇所取爵於坫執罇者舉羃太尉酌醴齊訖謁者引太尉進髙祖神堯皇帝座前雩祀太宗東向跪奠爵興謁者引太尉少退東向再拜上辛五方祝各取爵酌醴齊供尊訖還罇所雩祀同訖謁者引太尉進昊天上帝神座前北向立諸太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受虚爵復於坫太尉興再拜訖謁者引太尉却復位初太尉獻將畢謁者引光祿卿攝則同以光祿卿為終獻詣罍洗盥手洗拭匏爵升酌盎齊獻正座配座雩祀并獻五方帝也終獻如亞獻之儀上辛五帝祝亦各酌獻之訖謁者引光祿卿降復位初太尉將升獻攝則太常卿將升獻謁者七人分引五方帝及大明夜明等獻官詣罍洗盥手洗拭匏爵訖各由其陛升雩祀太尉將升獻贊引引五帝獻官酌醴齊奠太昊氏餘座齋郎助奠五帝將畢五官獻官酌醍齊奠勾芒氏餘座祝史助奠詣第一等俱酌汎齊訖各進跪奠於神座前興各還引降還本位初第一等獻官將升謁者五人次引獻官各詣罍洗訖引各由其陛升壇詣第二等内官酒罇所俱酌醍齊各進跪奠爵於内官座首興餘座皆祝史齋郎助奠相次而畢謁者各引獻官還本位初第二等獻官將升謁者四人次引獻官俱詣罍洗盥手各由其陛升壇詣第三等中官酒罇所俱酌清酒沈齊攝儀盎齊以獻贊引四人次引獻官詣罍洗盥洗訖詣外官酒罇所俱酌清酒攝儀醍齊以獻贊引四人次引獻官詣罍洗盥洗訖詣衆星酒罇所酌㫖酒攝儀沈齊以獻其祝史齋郎酌酒助奠皆如内官之儀訖謁者贊引各引獻官還本位上辛雩祀無日月已下獻儀也諸獻俱畢武舞止上下諸祝各進跪徹豆興還罇所徹者籩豆各一少移於故處也奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福者不拜元和之樂作太常卿前奏稱請再拜退復位皇帝再拜樂作一成止攝事則奉禮曰衆官再拜衆官在位者皆再拜太常卿前奏請就望燎位攝則謁者進太尉之左白請就望燎位也太常卿引皇帝樂作皇帝就望燎位南向立樂止攝則謁者引太尉也於羣官將拜上下諸祝各執篚進神座取玉幣祝版日月已上齋郎以爼載牲體黍稷飯及爵酒各由其陛降壇南行經柴壇西過壇東行自南陛登柴壇以玉幣祝版饌物置於柴上户内諸祝史又以内官已下之禮幣皆從燎上辛無日月已下牲幣雩祀有五帝幣奉禮曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢攝則謁者前曰禮畢則太尉出太常卿引皇帝還大次樂作皇帝出中壝門上辛雩祀並内壝殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華蓋侍衞如常儀皇帝入次樂止謁者贊引各引祀官通事舎人分引從祀羣官諸方客使以次出贊引引御史太祝已下俱復執事位立定奉禮曰再拜御史已下皆再拜贊引引出工人二舞以次出顯慶時禮部尚書許敬宗等奏稱新禮祭畢收取玉帛牲體置於柴上然後燔柴燎壇又在神壇之左臣等謹按祭祀之禮必先降神周人尚臭祭天則燔柴祭地則瘞血祭宗廟則􅌊蕭灌鬯皆貴氣臭用以降神禮經明白義釋詳委柴在祭物之先理無所惑是以三禮義宗等並云祭天以燔柴為始然後行正祭祭地以瘞血為先然後行正祭又禮論説太常賀循上言積柴舊在壇南燎祭天之牲用犢左胖漢儀用頭今郊天用脅之九箇太宰令奉牲脅太祝令奉圭瓚俱奠燎薪之上即晉氏故事亦無祭末之文唯周魏以降妄為損益約告廟之幣事畢瘞埋因改燔柴將為祭末事無典實禮闕降神又燔柴正祭牲玉皆别蒼璧蒼犢之流柴之所用四圭騂犢之屬祀之所須故郊天之有四圭猶親廟之有圭瓚是以周官典瑞文義相因並事畢收藏不在燔柴之例今新禮引同蒼璧不顧圭瓚遂亦俱燔義既有乖理難因襲又燔柴作樂俱以降神則處置之宜須相依准燔柴在左作樂在南求之禮情實為不𩔖且禮論説積柴之處在神壇之南新禮以為壇左交無典故今請改燔柴為祭始位在樂懸之南外壝之内其陰祀瘞埋亦請准此詔可之鑾駕還宫上辛雩祀並同皇帝既還大次侍中版奏請解嚴將士不得輙離部伍皇帝停大次一刻頃搥一鼓為一嚴轉仗衛於還塗如來儀三刻頃搥二鼓為再嚴將士布隊仗侍中版奏請中嚴皇帝服通天冠絳紗袍諸祀官服朝服乗馬者俱服袴褶五刻頃搥三鼓為三嚴通事舍人分引羣官客使等序立於大次之前近南文武侍臣詣大次奉迎乗黄令進金輅於大次門外南向千牛將軍立於輅左侍中版奏外辦太僕卿升執轡皇帝乗輿出次繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黄門侍郎奏稱請鑾駕進發退復位鑾駕動稱警蹕如常儀黄門侍郎贊者夾引千牛將軍夾輅而趨至侍臣上馬所黄門侍郎奏稱請鑾駕權停勅侍臣上馬侍中前承制退稱制曰可黄門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黄門侍郎奏稱請勅車右升侍中前承制退稱制曰可黄門侍郎退復位千牛將軍升訖黄門侍郎奏稱請鑾駕進發退復位鼓傳音鑾駕動鼓吹振作而還文武羣臣導從如來儀諸方客使便還館駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立於輅右訖鑾駕動千牛將軍夾輅而趨駕入嘉徳門太樂令令撞㽔賔之鐘左五鐘皆應鼓柷奏采茨之樂至太極門戞敔樂止入太極門鼓柷奏太和之樂駕至横街北當東上閤迴輅南向侍中進鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅乗輿以入繖扇侍衛警蹕如常儀侍臣從至閤戞敔樂止初文武羣官至承天門外通事舍人承㫖勅羣官並還皇帝既入侍中版奏請解嚴扣鉦將士各還其所神位用樂及籩豆等物冬至祀昊天上帝於圜丘以髙祖神堯皇帝配座在壇上座每籩豆各十二簠簋㽅爼各一都六百八十九座壇之第一等祀東方青帝靈威仰南方赤帝赤熛怒中央黄帝含樞紐西方白帝白招拒北方黑帝叶光紀及大明夜明等七座籩豆之数各八簠簋㽅爼等數各一也第二等祀天皇大帝北辰北斗天一太一紫微五帝座並差在行位前餘内官諸座及五星十二辰河漢都四十九座齊列在十二陛間每座籩豆各二餘如上也第三等祀中官市垣帝座七公日星帝廣大角攝提太微太子明堂軒轅三台五車諸王月星織女建星天紀等十七座及二十八宿並差在前列餘百四十二座齊列在十有二階間每座籩豆等如二等也又祀外官百五座籩豆簠簋爼各一也於内壝之内又設衆星三百六十座於内壝之外􅇼豆等與外官同按此星神羲和所職推步有徵傳曰萬物之精上為衆星故天有萬一千五百二十物蓋星之與物毎各有所主今並依郊壇圖而為之也正月上辛祈穀祀昊天上帝於圜丘以髙祖神堯皇帝配都七座也又祀五帝於壇第一等籩豆等數如冬至國家前禮祀感帝於南郊後祀昊天上帝於圜丘以祈穀准左傳郊祀后稷以祈農事故啟蟄而郊郊而後耕詩曰噫嘻春夏祈穀於上帝則祈穀之文傳之歴代上帝之號元屬昊天而鄭康成云天之五帝遞主四時王者之興必感其一因其所感别祭尊之故夏正之月祭其所生帝於南郊以其祖配之故周祭靈威仰以后稷配之因以祈穀據所説祀感帝之意本非祈穀先儒此説事恐難憑且感帝之祀行之自久記曰有其舉之莫可廢也祈穀之禮於祈穀之壇祭五方帝夫五方帝者五行之精九穀之宗今二禮並行六神咸祀也樂冬用本音皆以黄鍾為均三成准周禮云圜鍾之均六變天神皆降可得而禮記云天神皆降明五帝日月星辰皆天神也又准周禮樂三變唯致邱陵之祇今改用六變昊天上帝蒼犢一若冬至祀圜丘加羊九豕九凡肉皆實俎其牲皆升右胖體十一前節三肩臂臑後節二肫胳正脊一脡脊一長脅一短脅一代脅一皆二骨以並脊從首為正脅旁中為正凡供為正凡供别祭用太牢者犢一羊一豬一酒二斗脯一叚醢四盒若供少牢去犢減酒一斗太罇二實汎齊著罇二實醴齊犧罇二實盎齊山罍二實酒象罇二實醍齊壺罇二實沈齊山罍四實酒籩十二石鹽鹿藁魚白乾棗黒栗黄糗榛子仁仁芡仁脯餅餅餌菱粉餈豆十二韭葅芹葅醓醢兎醢菁葅葅鹿醢胉笋葅食脾析豚􅓞糝魚醢食簠一實稻粱飯簋一實黍稷飯㽅一實太羮爼一肉蒼璧幣以蒼一丈八尺配帝著罇二實汎齊犧罇二實醴齊象罇二實盎齊山罍二實酒籩豆簠簋牲幣璧並同上帝五帝日月壇第一等太罇各二籩八減白餅黒餅糗餌粉餈豆八減􅓞食糝食脾析葅豚胉簠簋㽅俎各並同上帝五方帝方色犢大明青犢夜明白犢青帝青圭赤帝赤璋黄帝黄琮白帝白琥黑帝黑璜幣各如其玉色日以圭璧幣以青月以圭璧幣以白天皇大帝北辰北斗天一太一紫微五帝座並差在行位前餘内官諸座及五星十二辰河漢四十九座壇第二等在十二陛間每陛間各象罇二每座籩二栗脯牛豆二葵葅鹿醢簠簋㽅俎各一實同上牲用少牢幣皆以白中官市垣帝座七公日星帝席大角攝提太微五帝太子明堂軒轅三台五車諸王月星織女建星天紀十七座及二十八宿並差在前列其餘中官一百四十二座壇第三等在十二陛間每陛間各壺罇二籩豆簠簋㽅俎牲幣各同第二等外官百五座在内壝之内衆星三百六十座在内壝之外外官每階各概罇二在壇下衆星每道間各散尊二於内壝之外每座籩一牛脯豆二鹿醢簠一黍稷飯簋一稻粱飯俎一肉文獻通考卷七十
