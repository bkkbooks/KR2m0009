body:
  text: 文獻通考卷七十鄱陽馬端臨貴與著郊社考三郊魏文帝南巡在潁陰有司為壇於繁陽故城庚午登壇受紱降壇視燎成禮未有祖配明帝景初元年十月營洛陽南委粟山為圜丘詔曰曹氏繫世出自有虞氏今祀圜丘以始祖帝舜配號圜丘曰皇皇帝天方丘所祭曰皇皇后地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祇以武宣后配宗祀皇考髙祖文皇帝於明堂以配上帝按此以郊與圜丘為二處用鄭𤣥之説其時康成所註二禮方行王子雍雖著論以攻之而人未宗其説然魏晉而後有天下者多起自匹夫其祖父未有可以配天之功德非如虞夏四代之比而康成之所謂配天者以為周祀天於圜丘以嚳配謂之禘祀五帝於郊以稷配謂之郊又祀五帝及五人帝於明堂以文王配謂之祖祀五神於明堂以武王配謂之宗此三祭者必皆有祖考可配而後可以舉事是以魏文帝之時有郊祀而未有祖配直至明帝時復逺取舜以配圜丘然後以武帝配郊以文帝配明堂蓋拘於康成支離之説是以配天之祀必俟奕世之後又復上取之遙遥華胄以足之然後可以行禮耳初侍中髙堂隆論郊祀事以魏為舜後推舜配天其後蔣濟著文以追詰隆謂舜本姓媯其後曰田曹氏族出自邾魏武作家傳自云曹叔振鐸之後又陳思王作武帝誄曰於穆武王胄稷允周則非舜後明甚而横祀非族降黜太祖不配正天皆為繆妄濟曰夫虯龍神於獺獺自祭其先不祭虯龍也麒麟白虎仁於豺豺自祭其先不祭麒虎也如𤣥之説有虞以上豺獺之不若邪自正始以後終魏代不復郊祀孫權初稱尊號於武昌祭南郊告天用元牡自以居非中土不修設末年南郊追上父堅尊號為吳始祖以配天後王嗣位終吳代不郊祀晉武帝即位南郊燎告未有祖配泰始二年詔定郊祀南郊除五帝座五郊同稱昊天各設一座而已時羣臣議五帝即天也王氣時異故殊其號雖名有五其實一神宜除五帝號同稱昊天從之二月丁丑郊祀宣皇帝以配天十一月有司又議奏古者丘郊不異宜并圜丘方丘於南北郊更修立壇兆其二至之祀合於二郊帝又從之是月冬至帝親祠圜丘於南郊自是後圜丘方澤不别立按以圜丘即郊五帝同一天王肅之説武帝肅外孫也故祀禮從其説三年帝親郊祀皇太子皇子悉侍祠十月詔復明堂及南郊五帝位見五帝門詔郊祀明堂禮樂權用魏儀遵周室肇稱殷禮之義但改樂章而已使傅元為之詞祠天地五郊夕牲歌一祠天地五郊迎送神歌一饗天地五郊歌一天地郊明堂夕牲歌一天地郊明堂降神歌一天郊饗神歌一元帝即位於建康太興二年立南郊於已地其制度皆太常賀循所定多依漢及晉初之儀三月辛卯帝親郊祀饗配之禮一依武帝始郊故事時尚未立北壇地祇衆神並在天郊始議立郊祀儀尚書令刁協等議宜須旋都洛邑乃修之司徒荀組據漢獻帝都許即便立郊宜於此修奉從之成帝咸和八年制天郊則五帝之佐日月五星二十八宿文昌北斗三台司命軒轅后土太一天一太微鈎陳北極雨師雷電司空風伯老人凡六十二神從祀康帝建元元年正月辛未南郊帝親奉焉祝文稱嗣天子臣某安帝元興三年劉裕討桓元走之己卯告成功於南郊是年帝蒙塵江陵未反其明年應郊朝議以為宜依周禮宗伯攝三公行事尚書左丞王約之獨曰郊天極尊非天子不祀無使皇輿不得親奉從之郊廟牲幣璧玉之色雖有成文秦世多以騮駒赤馬黑鬛曰騮漢則但云犢未辨其色江左南北郊同用元牲禮有事告祖禰宜社之文未有告郊之典也漢儀天子之喪使太尉告諡於南郊他無聞焉魏文帝黄初四年七月帝將東巡以大軍當出使太常以一特牛告祠南郊及文帝崩太尉鍾繇告諡南郊皆有事於郊也江左則廢宋武帝永初二年正月上辛帝親祀南郊大赦三年九月時營陽王已即位司空徐羡之等奏髙祖武皇帝宜配天郊詔可孝武大明二年正月有司奏今月六日南郊輿駕親奉至時或雨遂遷日有司行事有司奏按魏代郊天値雨更用後辛晉代顧和亦云更擇吉日徐禪云晉代或丙或庚並别有義且武帝十二月丙寅受禪二年十一月庚寅冬至祀天於圜丘非專祈穀又按郊特牲受命於祖廟作龜於禰宫者謂告之退而卜則告義在郊非告日也今日雖有遷郊祀不異不應重告徐爰議以為郊祀用特何偃據禮不應更告毛血告牷之後雖有事得更應有司行事不容遷郊參議宜於遇雨遷用後辛不重告詔可南郊自魏以來多使三公行事三年移郊兆於秣陵牛頭山西在宫之午地徐爰曰禮記燔柴於泰壇祭天也迎日於南郊就陽位也晉代過江郊祭悉在北或南出道狹多於已地大宋造邦維新宜移郊正午以定天位五年有司奏郊用三牛孝武崩廢帝以郊舊地為吉祥移置本處齊髙祖受禪明年正月上辛有事南郊而無配犧牲之色因晉宋故事武帝建元五年正月祀南郊自兹以後間嵗而祀時有司奏前代嗣位或因前郊年或自更始今年正月已郊未審明年應郊與否尚書令王儉議檢晋明帝太寧五年南郊其年九月崩成帝即位明年改元即郊簡文咸安二年南郊其年七月崩孝武帝即位明年改元亦郊宋元嘉三十年正月南郊其年二月崩孝武嗣位明年改元亦郊此二代明例差可依倣祭酒張緒等並同詔可永明元年立春前郊祀王儉啟云按宋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未郊其月八日立春此近代明例不以先郊後春為嫌無煩遷日帝從之郊壇圓兆外内起瓦屋形制宏壯散騎常侍庾曇崇啟云祭天尚質秦漢以來郊兆壇域無立宫室以明謙恭詔付外詳博士賀瑒議周禮王旅上帝張氊案以氊為牀於幄中不聞郊所置宫宇也虞炎議漢之郊祀天子自竹宫遙拜息殿去壇既逺奉祀畢旋息於此無嫌祠部郎中李撝議周禮凡祭祀張其旅幕張尸次尸則有幄鄭仲師云尸次祭祀之尸所居更衣帳也凡祭之文既不止於郊祀立尸之言理亦闗於宗廟古則張幕今也房屋宗廟旅幕可變為棟宇郊壇氊案何為不轉制檐甍遂不行曇崇議梁武帝即位南郊為壇在國之南壇髙二丈七尺徑十八丈其外再壝四門常與北郊間歳正月皇帝致齋於萬壽殿上辛行事吳操之云啟蟄而郊郊應在立春後何佟之云今之郊祀是報昔嵗之功而祈今年之福故取嵗首上辛不拘立春先後周之冬至圜丘大報天也夏正又郊以祈農事故有啟蟄之説帝曰圜丘自是祭天先農即是祈榖祭吴天宜在冬至祈榖必湏啟蟄用特牛一祀天皇大帝於壇上攢題曰皇天座四年佟之啟周禮稱天曰神今天攅宜題曰皇天座以皇考太祖文帝配五帝天文從祀五方上帝五官之神太一天一日月五星二十八宿太微軒轅文昌北斗三台老人風伯雨師皆從祀其五帝二十八宿及風雨師等座有坎餘皆平地王僧崇啟曰五祀位在北郊圜丘不宜重設帝曰五行之氣天地俱有故宜兩從僧崇又曰風伯雨師即箕畢也而今南郊祀箕畢復祭風伯雨師恐乖祀典帝曰箕畢自是二十八宿風伯雨師即箕畢下𨽻兩祭非嫌禮以蒼璧制幣除鬯祼佟之啟按鬯者盛以六彞覆以畫羃備其文飾施之宗廟今郊有祼恐乖尚質宜革之帝依之香用沉取本天之質陽所宜器以陶匏素俎席用藁秸太祝牒壇下神座悉用白茅俎以漆詔下議八座奏禮云觀天下之物務稱其徳則知郊祭俎不應漆席用白茅禮無所出於是改用素俎五帝以下皆蒲席藁薦皇帝一獻再拜受福帝以一獻為質三獻為文詔下議博士陸瑋等以為宗祧三獻義兼臣下上天之禮主在帝王約理申義一獻為允自是天地之祭皆一獻惟皇帝受福明上靈降祚臣下不敢同太尉設燎壇於丙地禮畢器席有司埋之佟之議曰禮祭器弊則埋之今一用便埋費而乖典帝曰薦席輕物陶匏賤器方還府庫容後穢惡但弊則埋之者謂四時祭器耳從有司燒埋之五年迎五帝以始祖配時明山賔議以始祖配饗五帝從之十一年帝曰禮祭月於坎由是陰義乃别祭之儀今兆南郊既云就陽理不應為坎遂廢之八座奏曰五帝之義不應居坎良由齊代圜丘小峻邊無神位今丘形既廣請五帝座悉於壇上外域二十八宿及風伯雨師等座悉停為坎十七年帝以威仰魄寳俱是天神於壇則尊於下則卑南郊所祭天皇其五帝别有明堂之祀不煩重設又祭二十八宿無十二辰於義闕然南郊可除五帝祀加十二辰與二十八宿各於其方為壇詔定郊禋之樂以雅為稱取詩序雅者正也之義俊雅三曲四言取禮記司徒論選士升之學曰俊士二郊用皇雅三曲五言取詩皇矣上帝臨下有赫二郊太廟同用滌雅一曲四言取帝牛在滌三月牷出入用牷雅一曲四言薦毛血用誠雅一曲三言取至誠感神義南郊降神用又誠雅一曲四言送神用獻雅一曲四言飲福用禋雅一曲四言就燎用其辭並沈約所製普通中薦蔬無牲牢遂省滌雅牷雅云陳武帝永定元年受禪修圜丘壇髙二丈二尺五寸廣十丈柴燎告天明年因以正月上辛有事南郊以皇考徳皇帝配除十二辰風伯雨師及五帝位太常卿許通奏曰按周禮以血祭祭社稷五祀鄭𤣥云陰祀自血起貴氣臭也五祀五官之神也五神主五行𨽻於地故與埋沉疈辜同為陰祀既非禋柴無闗陽祭故何休云周爵五等者法地有五行也五神位在北郊圜丘不宜重設又按以槱燎祀風伯雨師鄭衆云風伯箕雨師畢皆星也今南郊祭箕畢復祭風伯雨師恐乖祀典制並依疈音普逼反槱音羊九反間歳而祀文帝天嘉中改以髙祖配復三獻之禮許通曰按周禮司罇彞云三獻施於宗祧鄭𤣥注一獻施於小祀今用小祀之禮施於大神大帝為不通矣從之宣帝即位以郊壇卑下更增廣之祠部郎王元規議曰古圜方二丘並因見有本無髙廣之數後代隨事有築建丈尺之儀但五帝三王不相沿襲今增南郊上徑十二丈則天大數下徑十八丈取三分益一髙二丈七尺取三倍九尺之堂後魏道武皇帝即位二年正月親祀上帝於南郊以始祖神元皇帝配壇通四陛壝埓三重天位在上南面神元西面五帝以下天文從食五精帝在壇内四帝各於其方黄帝在未日月五星二十八宿天一太一北斗司中司命司祿司人在中壝内各因其方其餘從食者各千餘神醊在外壝内席用藁秸玉以四珪幣用束帛牲以黝犢上帝神元用犢各一五方帝共犢一日月等共牛一祭畢燎牲體左於壇東已地從陽之義後冬至祭上帝於圜丘牲幣並同天賜二年四月復祀天於西郊為方壇東為二陛土陛無等周垣四門門各依方色為名置木主七於壇上牲用白犢黄駒白羊各一祭之日帝御大駕至郊所立青門内近南西面内朝臣皆位於壇北外朝臣及夫人方容咸位於青門外后率六宫從黑門入列於青門内近北並西面廩犠令掌牲陳於壇前女巫執鼓立於陛東西面選帝七族子弟七人執酒在巫南西面北上女巫陞壇搖鼓帝拜后肅拜内外百官拜祀訖乃殺牲執酒七人西向以酒灑天神主復拜如此者三禮畢而反後魏道武帝西平姑臧東下山東足為雄武之主其時用事大臣崔浩李順李孝伯等誠皆有才多是謀猷之士全少通儒碩學所以郊祀帝后六宫及女巫預焉餘制復多參夷禮而違舊章自後嵗一祭明元帝太常三年立五精帝兆於四郊逺近放五行數各為方壇四陛埒壝三重通四門以太皥等及諸佐配祭黄帝常以立秋前十八日餘四帝各以四立日祀之牲各用牛一又立春遣有司迎春於東郊祭用酒脯棗栗無牲幣獻文帝以西郊舊事嵗增木主易代則更兆其事無益於神明乃革前儀定置主七立碑於郊所孝文帝太和十二年親築圜丘於南郊北齊每三年一祭以正月上辛禘祀昊天上帝於圜丘壇在國南郊下廣輪二百七十尺上廣輪四十六尺髙四十五尺三成成髙十五尺上中二級四面各一陛下級方維八陛周以三壝去丘五十步中壝去内壝外壝去中壝各二十五步皆通八門又為大營於外壝之外廣輪三百七十步其營塹廣丈二尺深一丈四面各一門又為燎壇於中壝外之丙地廣輪三十六尺髙三丈四面各有階以髙祖神武帝配五精帝天文等從祀五精帝於中丘面皆向内日月五星北斗二十八宿司中司命司人司祿風伯雨師靈星於下丘衆星位於内壝中禮以蒼璧束帛蒼牲九皇帝初獻太尉亞獻光祿卿終獻司徒獻五帝司空獻日月五星二十八宿太常丞以下薦衆星後諸儒定禮圜丘改以冬至祀之南郊則嵗一祀以正月上辛為壇於國南壇廣輪三十六尺髙九尺四面各一階為三壝内壝去壇十五歩中壝外壝相去如内壝四面各一門又為大營於外壝之外廣輪二百七十步營塹廣一丈深八尺四門又為燎壇於中壝丙地廣輪二十七尺髙一尺八寸四門各一階祀所感帝靈威仰以髙祖神武皇帝配禮用四珪幣如方色其上帝配帝各騂牲一燎同圜丘後周憲章多依周制正月上辛祀昊天上帝於圜丘丘三成成崇丈二尺深二丈上徑六丈十有二陛每等十有二級圜壝徑三百步内壝半之在國之陽七里以其先炎帝神農氏配五帝天文並從祀日月内官中官外官衆星又祀所感帝靈威仰於南郊於國南五里為方壇崇丈二尺廣四丈壝方百二十步内壝半之以始祖獻侯莫那配用牲各以方色皇帝乗蒼輅戴元冕備大駕而行從祭者皆蒼服隋文帝受命再歳冬至日祀昊天上帝於圜丘制壇於國南太陽門外道東二里丘四成成各髙八尺一寸下成廣二十丈再成廣十五丈三成廣十丈四成廣五丈太祖武元皇帝配並丘上五方上帝天文並從祀日月五星内官四十二座次官百三十二座外官百二十一座衆星三百六十座五帝日月在丘第二等北斗五星十二辰河漢内官在丘第三等二十八宿中官在丘第四等外官在内壝内衆星在内壝外上帝配帝蒼犢各一五帝日月方色犢各一五星以下羊豕各九孟春上辛祠感帝赤熛怒於南郊為壇於國南太陽門外道西一里去宫十里髙七尺廣四丈以太祖武元帝配其禮四珪有邸牲用騂犢二煬帝大業元年孟春祀感生帝改以髙祖文帝配餘並仍舊十年冬至祀圜丘帝不齋於次詰朝備法駕至便行禮是日大風帝獨獻上帝三公分獻五帝禮畢御馬疾驅而歸致堂胡氏曰郊之為禮天子所以對越上帝也上帝雖無情而感應之理如響之從聲也若其保佑景命則將事之時風雨不作宇宙澄霽嘉祥叶氣若顧若答否則反是考之方冊自古郊祀而有變異不得成禮者惟慕容超與楊廣耳二人旋踵而亡且受誅戮然則郊祀而有變異乃國家滅亡之大徵中庸所謂必有妖孽者可不深加警戒而重有修省乎南燕主超祀南郊有獸如䑕而赤大如馬來至壇側須臾大風晝晦超懼大赦北齊大禘圜丘歌辭夕牲羣臣入門奏肆夏樂辭一首迎神奏髙明樂詞一首牲出入奏昭夏辭一首薦毛血奏昭夏辭一首進熟皇帝入門奏皇夏辭一首皇帝升丘奏皇夏辭一首皇帝初獻奏髙明樂辭一首皇帝奠爵訖奏髙明樂覆燾之辭一首皇帝獻太祖饗神座奏武徳之樂昭烈之舞辭一首皇帝飲福酒奏皇夏之樂辭一首送神降丘南陛奏髙明樂辭一首柴壇既燎奏昭夏樂辭一首皇帝還便殿奏皇夏辭一首五郊迎氣樂辭一首周圜丘歌辭降神奏昭夏一首皇帝將入門奏皇夏一首俎入奏昭夏一首皇帝升壇奏皇夏一首皇帝初獻作雲門之舞一首皇帝初獻配帝作雲門之舞一首皇帝初獻及獻配帝畢奏登歌一首皇帝飲福酒奏皇夏一首嚴奠奏雍樂一首帝就望燎位奏皇夏一首帝就便坐奏皇夏一首隋圜丘歌樂辭降神奏昭夏辭一首皇帝升壇奏皇夏辭一首登歌辭一首皇帝初獻奏誠夏辭一首皇帝既獻奏文舞辭一首皇帝飲福酒奏需夏辭一首武舞辭一首送神奏昭夏辭一首皇帝就燎還大次並奏皇夏辭同上唐髙祖武徳初定令每歳冬至祀昊天上帝於圜丘以景帝配五方上帝天文並從祀壇於京城明徳門外道東二里四成成各髙八尺一寸下成廣二十丈再成廣十五丈三成廣十丈四成廣五丈日月内官中官外官衆星皆從祀其五方帝及日月七座在壇第二等内官五星以下五十五座在第三等二十八宿以下百三十五座在第四等外官百一十二座在外壝之内衆星三百六十座在外壝之外上帝及配帝用蒼犢各一五方帝及日月用方色犢各一内官以下加羊豕凡九孟春辛日祈穀祭感帝於南郊以元帝配牲用蒼犢二髙宗顯慶二年詔南郊祈穀孟夏雩明堂大享皆祭昊天上帝罷感帝祠太尉長孫無忌議曰據祠令及新禮並用鄭𤣥六天之義圜丘祀昊天上帝南郊祭太微感帝明堂祭太微五天帝臣等謹按鄭𤣥此義唯據緯書所説六天皆謂星象而昊天上帝不屬穹蒼故註月令及周官皆謂圜丘所祭昊天上帝為北辰星曜魄寶又説孝經郊祀后稷以配天及明堂嚴父配天皆為太微五帝考其所説舛謬特深按易云日月麗乎天百穀草木麗乎地又云在天成象在地成形足明辰象非天草木非地毛詩傳云元氣昊大則稱昊天逺視蒼蒼則稱蒼天天以蒼昊為體不入星辰之例且天地各一是曰兩儀天尚無二焉得有六是以王肅羣儒咸駮此義又檢太史圜丘圖昊天上帝座外别有北辰座與鄭義不同得太史令李淳風等狀稱昊天上帝圖位自在壇上北辰自在第二等與北斗並列為星官内座之首不同鄭𤣥據緯書之説此乃羲和所掌觀象制圖推步有徵相沿不謬又按史記天官書等太微宫有五帝者自是五精之神五星所奉以其是人主之象故况之曰帝如房心為天王之象豈是天乎周禮云兆五帝於四郊又云祀五帝則掌百官之誓戒唯稱五帝皆不言天此自太微之神本非穹昊之祭又孝經云郊祀后稷别無圜丘之文王肅等皆以為郊即圜丘圜丘即郊猶王城京師異名同實符合經典其義甚明而今從鄭説分為兩祭圜丘之外别有南郊違棄正經理深未允且檢吏部式惟有南郊陪位更不别載圜丘式文既遵王肅祠令仍行鄭義令式相乖理宜改革從之乾封初詔依舊祀感帝以有司議又下詔依鄭𤣥義祭五天帝司禮少常伯郝處俊等奏顯慶新禮廢感帝祀為祈穀祀昊天以髙祖配舊禮感帝以世祖元皇帝配今既依舊復祈穀為感帝以髙祖配者髙祖依新禮見配圜丘昊天上帝更配感帝便恐有乖周人禘嚳而郊稷之義今若禘郊一祖同配恐無所據從之又詔圜丘以髙祖太宗並配先時太宗只配明堂武太后臨朝垂拱元年詔有司議圜丘方丘及南郊明堂嚴配之禮以髙祖太宗髙宗三帝並配成均助敎孔元義議曰孝經嚴父莫大於配天明配尊大之天昊天是也物之大者莫大於天推父比天與之相配行孝之大莫過於此以明尊嚴之極也請奉太宗髙宗配昊天上帝於圜丘義符孝經周易之文神堯肇開王業應天順人請配感帝於南郊義符大傳之文又孝經云宗祀文王於明堂文王但祖而言宗者亦是通武王之義請奉太宗髙宗配祭於明堂義符周易及祭法之文太子右諭徳沈伯儀曰鄭𤣥註祭法禘郊祖宗謂祭祀以配食禘謂祭昊天於圜丘祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗伏尋嚴配之文於此最為詳備得禮之序莫尚於周禘嚳郊稷不聞於二主明堂宗祀始兼於兩配以文王武王父子殊别文王為父上主五帝武王對父下配五神孝經云嚴父莫大於配天則周公其人也昔者周公宗祀文王於明堂以配上帝不言武王以配天則武王雖在明堂禮未齊於配祭既稱宗祀義獨主於尊嚴雖同兩祭終為一主故孝經緯曰后稷為天地主文為五帝宗也必若一神兩祭便則五祭十祠祭獻頻繁禮虧於數此則神無二主之道禮崇一配之義竊尋貞觀永徽共遵專配顯慶之後始創兼尊必以順古而行實謂從周為美髙祖請配圜丘方澤太宗請配南郊北郊髙宗制禮作樂告禪升中率土共休普天同賴竊惟莫大之孝理當總配五天鳳閣舍人元萬頃等議謹按見行禮昊天上帝等祠五所咸奉髙祖太宗兼配今議者引祭法周易孝經之文雖近稽古之詞殊失因心之㫖詩云昊天有成命二后受之易曰殷薦之上帝以配祖考敬尋厥㫖本合斯義今若逺摭遺文近乖成典慎終追逺良謂非宜嚴父配天寧當若是伏據見行禮髙祖太宗今既先配五祠理當依舊無改請奉髙宗歴配五祠制從萬頃議自是郊丘諸祀皆以三祖配按並配之制始於唐自鄭康成有六天之説魏晉以來多遵用之以為曜魄寳亦天也感生帝亦天也均之為天則配天之祖其尊一也至唐人始以曜魄寳五帝皆星象之屬當從祀南郊而不當以事天之禮事之善矣然感帝之祠既罷旋復雖復其祠而以為有天帝之分尊卑之别永昌元年敕天無二稱帝是通名承前諸儒互生同異乃以五方之帝亦謂之天假有經傳互文終是名實未當稱號不别導卑相混自今郊祀之禮唯昊天上帝稱天自餘五帝皆稱帝遂於郊與明堂所配之祖不無厚薄之疑乃至每祭並配而後得為嚴父之禮然則周公亦豈厚於后稷而薄於文王乎則曷若一遵初議若郊若明堂皆專祀昊天各以一祖配之而感帝之屬則從祀於天於禮意人情為兩得乎周武氏天冊萬歳元年親享南郊始合祭天地中宗景龍三年親祀南郊以皇后為亞獻仍補大臣李嶠等女為齋娘執籩豆以韋巨源為終獻時國子祭酒祝欽明司業郭山惲等建言古者大祭祀后祼獻以瑶爵皇后當助祭天地太常博士唐紹蔣欽緒駮之以為鄭元註周禮内司服唯有助祭先王先公無助祭天地之文欽明引九嬪職大祭祀后祼獻則贊瑤爵據天地大神至尊不祼天地尚質亦無瑶爵明此乃宗廟大祭祀之文皇后不當助祭南郊國子司業褚無量等議以為祭天惟以始祖為主不配以祖妣故皇后不應預祭韋巨源定儀注請依欽明議上從之其年十一月十三日乙丑冬至陰陽人盧雅侯藝等請奏促冬至就十二日甲子以為吉㑹右臺侍御史唐紹奏曰禮所以冬至祀圜丘於南郊夏至祭方澤於北郊者以其日行纒次極於南北之際也日北極當晷度循半日南極當晷度環周是日一陽爻生為天地交際之始故易曰復見天地之心乎即冬至卦象也一嵗之内吉莫大焉甲子但為六甲之始一年之内隔月常遇既非大會晷運未周唯緫六甲之辰助四時而成嵗今欲避環周以取甲子是背大吉而就小吉也太史令傅孝宗奏曰准漏經南陸北陸並曰校一分若用十二日甲子即欠一分未南極即不得為至上曰俗諺云冬至長於嵗亦不可改竟依紹議以十三日乙丑祀圜丘元宗開元三年左拾遺張九齡上表請郊祀曰臣伏以天者百神之君而王者之所由受命也自古繼統之君必有郊配之義蓋以敬天之命以報所受故於郊義則不以徳澤未洽年穀不登凡事之故而闕其禮孝經云周公郊祀后稷以配天成王幼冲周公居攝猶用其禮明不暫廢漢丞相匡衡亦云帝王之事莫重乎郊祀董仲舒又云不郊而祭山川失祭之序且逆於禮故春秋非之陛下御極以來於今五載既光太平之業未行大報之禮竊考經傳義或未通况郊祀常典猶闕其儀有若怠於事天臣恐不可以訓伏望以迎至之日展燔柴之禮則聖朝典則可謂無遺矣開元十一年十一月親享圜丘中書令張説為禮儀使衞尉少卿韋縚為副説建議請以髙祖配祭始罷二祖同配之禮十五年太常博士錢嘉㑹上議曰准月令及祠令九月農功畢大享五帝於明堂正觀及神龍皆於南郊報祭中間寢廢有虧祀典准孝經宗祀文王於明堂以配上帝請每年九月於南郊雩壇行享禮以睿宗皇帝配制從之天寳元年二月􅃯凡所祀享必在躬親其皇地祇宜就南郊合祭是月十八日親享元元皇帝於新廟十九日親享太廟二十日合祭天地於南郊自後有事圜丘皆天地合祭若冊命大事告圜丘有司行事亦如之代宗寳應元年太常卿杜鴻漸禮儀使判官薛頎歸崇敬等言禘者冬至祭天於圜丘周人配以逺祖髙祖非始封之君不得為太祖以配天地諫議大夫黎幹以謂禘者宗廟之事非祭天而太祖非受命之君不宜作配為十詰十難以非之書奏不報乃罷髙祖以景皇帝配幹十難畧曰稽上古洎今無以人臣為始祖者唯殷以契周以稷夫稷契者皆天子元妃之子感神而生昔帝嚳次妃簡狄有娀氏之女吞元鳥之卵因生契長而佐禹治水有大功舜乃命契作司徒百姓既和遂封於商故詩曰天命元鳥降而生商此之謂也后稷者其母有邰氏之女曰姜嫄為帝嚳妃出野履巨跡歆然有孕生稷稷長而勤於稼穡堯聞舉為農師天下得其利有大功舜封於邰號曰后稷唐虞夏之際皆有令徳故詩曰履帝武敏歆居然生子即有邰家室此之謂也舜禹有天下稷契在其間量功比徳亦其次也舜受職則播百穀敷五教禹譲功則平水土宅百揆故國語曰聖人之制祀徳施於人則祀之以死勤事則祀之契為司徒而人輯睦稷勤百穀則居前代祀典子孫有天下得不尊而祖之乎又曰夫始祖者經綸草昧體大則天所以比元氣廣大萬物之宗尊以長至陽氣萌動之故乃俱祀於南郊也夫萬物之始天也人之始祖也日之始至也掃地而祭質也器用陶匏牲用犢誠也兆於南郊就陽位也至尊至質不敢同於先祖禮也故白虎通云祭天嵗一何也至尊至質事之不敢䙝黷故因嵗之陽氣始達祭之今國家一歳四祭黷莫大焉上帝五帝其祀遂闕怠亦甚矣黷與怠皆禮之失不可不知夫親有限祖有常聖人制禮君子不以情變易國家重光累聖歴祀百年豈不知景帝始封於唐當時通儒議功度徳乃尊神堯以配天宗太宗以配上帝神有定主為日已久今欲出神堯配含樞紐以太宗配上帝則紫微五精上帝佐也以子先父豈禮意乎非止神祇錯位亦以宗祖乖序何以上稱皇天祖宗之意哉若夫神堯之功太宗之徳格於皇天上帝臣以郊祀宗祀無以加焉又曰所言魏文帝丕以武帝操為始祖晉武帝炎以宣帝懿為始祖者孟徳仲達皆人傑擁天下之強兵挾漢魏之微主專制海内令行草偃服袞冕陳軒懸天子决事於私第公卿並拜於道左名雖為臣勢實為君後主因之而業帝前王由之而禪代子孫尊而祖之不亦可乎永泰二年禮儀使太常卿杜鴻漸奏冬至祀昊天上帝夏至祀皇地祇請以太祖景皇帝配享孟春祈穀祀昊天上帝孟冬祀神州請以髙祖神堯皇帝配享孟夏雩祀昊天上帝請以太宗文武聖皇帝配享季秋大享明堂祀昊天上帝請以肅宗大聖皇帝配享臣與禮官學士憑據經文事皆明著徳音詳定久未施行勑㫖並依至永泰二年六月久旱言事者云太祖景皇帝追封於唐髙祖受命之祖唐有天下不因於景皇帝今配享失徳故神不降福􅄽陽為災上又令百官就尚書省議太常博士獨孤及議曰謹按禮經王者禘其祖之所自出以其祖配之凡受命始封之君皆為太祖繼太祖已下六廟則以親盡迭毁而太祖之廟雖百代不遷此五帝三王所以尊祖敬宗也故受命於神宗禹也而夏后氏祖顓頊而郊鯀纘禹黜夏湯也而殷人郊㝠而祖契革命作周武王也而周人郊稷而祖文王則明自古必以首封之君配昊天上帝唯漢氏崛起豐沛豐公太公皆無位無功徳不可以為祖宗故漢以髙帝為太祖其先細微故也非足為後代法伏惟太祖景皇帝以柱國之任翼周弼魏肇啟王業建封於唐髙祖因之遂以為天下之號天所命也亦曰契之封商后稷之封邰禘郊祖宗之位宜在百代不遷之典郊祀太祖宗祀髙祖猶周之祖文王而宗武王也今若以髙祖創業當躋其祀是棄三代之令典遵漢氏之末制黜景帝之大業同豐公太公之不祀反古違道將孰甚焉夫追尊景皇帝廟號太祖髙祖太宗所以尊崇之禮也若配天之位既易則太祖之號宜廢祀之不修廟亦當毁尊祖報本之道其墜於地乎漢制擅議宗廟以大不敬論今武徳正觀之憲章未改國家方將敬祀事以和神人禘郊之間恐非所宜言謹稽禮文參諸夏殷周漢故事配享天地之制請仍舊典及歸崇敬執前議乃止以景皇帝配定憲宗元和二年正月拜郊將及大禮隂氣凝閉浹旬不開羣有司慮降雪不克展禮宰臣議請改日上曰郊廟重事吾齋戒有日豈以將雨雪而廢乎洎至大禮方饗獻之次景物澄霽及鑾輿就次則微雪大駕將動則又止焉翌日御樓宣赦纔畢陰雲復結瑞雪盈尺衆情歡悦咸為聖心昭感致焉長慶三年太常禮院奏郊壇祠祀遇大雨雪廢祭其禮物條件如後御署祝版既未行祭禮無焚毁之文請於太常寺勅庫收貯而其小祀雖非御署准此玉幣燎柴神酒燎幣醴齊并榛栗酺醢及應行事燭等請令郊社署各牒有司充次祭支用矣牲牛參牲既未行祭禮無進胙賜胙之文請比附禮記及祠令牲死則埋之例委監祭使及禮官於祠所瘞埋其小祀不全用牢牲舊例用猪羊肉亦准此粢盛𤓰葅笋葅應已造成饌物請隨牲瘞埋行事官明衣絹布等准式既祭前給訖合充潔服既已經用請便收破公卿已下明房油煖幕炭應宿齊日所破用物請收破㫖依永為定式元和十五年十二月宣問有司有事南郊合卜日與否禮官奏曰伏准禮令祀祭皆卜日然自天寳以後凡欲郊祀必先朝太清宫次日饗太廟又次日饗天相循至今並不卜日從之髙祖在位九年親祀南郊一武徳四年十一月一日太宗在位二十三年親祀南郊四貞觀二年十一月十