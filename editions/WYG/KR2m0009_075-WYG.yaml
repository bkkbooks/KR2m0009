至上帝位前北向立登歌嘉安之樂作跪奠玉幣再拜至配位前東面立登歌仁安之樂作雩祀獻安宗祀宗安冬至定安奠幣如上儀將降登歌樂作既降宫架樂作乃復位兵部工部尚書奉爼而升宫架豐安之樂作北向跪薦於正配位前降復位太祝取菹及黍稷肺以祭初獻盥宫架樂作進洗初洗爵升登歌樂作至罇所西面立嘉安之樂作跪實爵至上帝位前北向跪三祭於茅奠爵遂太祝跪讀祝初獻再拜至配位前酌獻如上儀祈榖登歌紹安雩祀感安宗祀徳安冬至英安遂降復位樂作如初文舞退武舞進官架正安之樂作亞獻適盥洗所洗爵升至罇所西面立宫架作文安之樂神娛錫羡之舞跪實爵至上帝位跪祭酒奠爵如前儀配位亦如之遂降終獻亦如之徹籩豆登歌肅安之樂作乃賜胙皆再拜官架作景安之樂一成乃燎皆退徹饌以胙進御史視之光祿卿望闕再拜退光宗紹熙五年詔今嵗郊祀大禮改作明堂大禮令有司除事神儀物諸軍賞賜依舊外其乗輿服御中外支費並從省約後以在壽皇䘮制内依淳熙十五年典故施行寧宗慶元六年大享明堂以諒闇用紹熙禮紹熙五年明堂孝宗未卒哭時趙汝愚朝獻景靈宫嗣秀王伯圭朝享太廟而上獨祀明堂是年光宗之䘮甫踰月而當行大禮乃命右丞相謝深甫欵天興之祠嗣濮王不儔攝宗廟之祭葢用紹熙禮云嘉定二年當郊詔行明堂大禮臣僚言臣聞古之王者父事天母事地一嵗之間冬夏日至大雩大享以及四時迎氣之𩔖無非躬行郊見之禮後世彌文日增乗輿出郊儀衛之供百物之須賞賚之數無名之費不一而足雖欲行禮如先王不可得已夫禮從宜苟不失乎先王之意而有得於事天之實何害其為禮也恭惟藝祖在位十有七年親郊者四太宗在位二十二年親郊者五真宗以後三嵗一郊遂為定制逮仁宗皇祐間始有事於明堂葢稽之古典斷自聖意而以義起也陛下即位以來圜丘重屋其禮迭舉及兹三嵗又當親郊之期有司文移督辦錢物固已旁午於道州縣之間以應奉為名抑配於民不知其幾軍旅之後旱蝗相仍公私之積旦暮不繼民生既囏國力大屈重以近日使命往來其費逾倍空匱之狀可為寒心臣願陛下相時之宜權停郊祀之禮仍以季秋大享明堂既無失於事天之誠而可以省不急之費古之行禮視年之上下正此意耳昔咸平中鹽鐡使王嗣宗奏郊祀費用繁重望行謁廟之禮當是之時帑藏充溢天下富饒嗣宗猶以為請况今日國計比之咸平萬萬不侔矣檢照國朝故事仁宗嘉祐元年恭謝天地於大慶殿四年祫祭七年明堂葢不行郊禋者九年哲宗元祐繼舉明堂者再髙宗紹興繼舉明堂者三若陛下申講宗祀之儀則於祖宗舊章不為無據欲望下臣此章令禮部詳議施行臣又聞真宗因王嗣宗之請詔三司非禋祀所須並行減省是嵗減應奉雜物十萬六千計其數之可考若此則必有條目而非漫然者矣今若舉行明堂其費較之郊丘雖已不等然明堂祭祀儀物之外賜予浮費豈無合從節約者望并詔有司取其凡目參酌考訂當減者減之當去者去之一切條畫無為具文方國用窘乏民力殚竭之餘減千則吾之千也若曰細微不足經意則具宗全盛之時視十萬六千何足道哉惟陛下果斷而行之從之仁宗親祀明堂二皇祐二年九月二十七日嘉泰七年九月六日神宗親祀明堂二熙寕四年九月十日日元豐三年九月二十三哲宗親祀明堂三元祐元年九月六日九四年九月十四日紹聖二年月十九日徽宗親祀明堂十大觀元年九月二十八日二政和七年九月六日八年九月日宣和元年九月八日五二年九月十三日一三年九月十日四年九月日五年九月十日六年九月八日三七年九月十日髙宗親祀明堂五紹興元年九月十八日十四年九月十五日九年九月二一日十年九月十日二二十一年九月日孝宗親祀明堂二淳熙九年九月十三日十五年九月四日寧宗親祀明堂七紹熙五年九月九日九慶元六年九月辛未開熙二年月辛夘嘉定二年九月辛丑十一年九月辛巳八年九月辛未夘十四年九月辛明禋儀注撮錄拾遺景靈宫聖祖一位素饌十拜四次跪俛伏興不設小次中後殿差官分詣第一上恭神兩拜盥帨跪奠鎮圭俛伏興跪奠玉幣兩拜俛伏興第二上再盥帨洗拭爵跪三進酒俛伏興兩拜第三上亞終獻畢詣飲福位兩拜跪三祭酒淮摶黍啐酒飲福俛伏興兩拜送真望燎奏禮畢太廟一十三室牲牢禮饌五十八拜四十跪俛伏興奏請還小次大禮使以下一面望燎第一上叅神兩拜盥帨洗拭瓉各入室跪祼鬯出户外兩拜第二上再盥帨洗拭爵各入室跪奠鎮圭俛伏興跪奠幣三祭酒俛伏興出户外讀冊訖兩拜還小次第三上亞終獻畢出小次詣飲福位兩拜跪三祭酒啐酒受俎受摶黍俛伏興兩拜送神奉神主入祏室奏禮畢明堂殿正配四位昊天上帝皇地祗太祖太宗各牲牢禮饌二十二拜一十三跪俛伏興第一上叅神兩拜盥帨各詣前位跪奠鎮圭俛伏興跪奠玉幣俛伏興兩拜第二上再盥帨洗拭爵各詣前位跪三祭酒俛伏興讀冊訖兩拜請還小次依例不還第三上亞終獻畢詣飲福位兩拜跪三祭酒啐酒受俎受摶黍俛伏興兩拜送神望燎奏禮畢太廟及明堂殿並以丑時一刻行事前一刻到大次逐處行禮讀冊官讀冊御樂傳㫖髙宣御名勿興太廟行禮祼鬯畢還版位宫架樂作御樂宣諭樂卿徐其音節毋得減促九成止行禮歸大次東神門上御樂宣諭亞終獻列祖上帝享以多儀動容周旋實勞宣力五使大禮使總一行大禮事務行事日復從皇帝行禮禮儀使行事日前導奏請皇帝行禮儀仗使總轄提振一行儀仗儀仗用四千一百八十九人自太廟排列至麗正門鹵簿使依禮經鹵者大盾也總一部儀仗前連後從謂之鹵簿橋道頓遞使提振修整車駕經由道路