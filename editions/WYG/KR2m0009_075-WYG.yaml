body:
  text: 文獻通考卷七十五鄱陽馬端臨貴與著郊社考八明堂孝宗乾道五年太常少卿林栗言昊天上帝四祭請並於圜壇行禮禮部侍郎鄭聞謂明堂當從屋祭不當在壇乞遇明堂親饗則遵依紹興三十一年已行典故如常嵗有司攝事則權寓淨明寺行禮庶合明堂之義詔從之中興後昊天上帝四祀春祈夏雩秋享冬報其二在南郊圜壇其二在城西恵照院望祭齋宫紹興元年十一月太常少卿趙子畫謂嵗祀上帝設位於紹興天慶觀今駐兵其所請更設於城外東南之告成觀十二月禮官謂祀天當燔牛首今牲止少牢請燔羊首毋築燎壇位益籩豆皆六籩實菱芡㮚脯乾桃乾䕩豆實芹菹筍菹葵菹菁菹韭菹鹿臡爼八羊豕腥熟槃一毛血簠二稻􅆝簋二黍稷進胙以羊體始誓用禮神玉備三獻二年命擇地於臨安城外之東南以祀天二月丁夘太常少卿程瑀謂妙覺院去城逺而天寧觀在城中非城之東南詔權於天寧望祭閏四月己未太常少卿王居正謂秋祀上帝奉神宗配往嵗明堂禮官謂配以近考失孝經本㫖遂議祖宗並配今秋享不當復配以神宗權禮部侍郎趙子畫謂聖宋崛起非有始封之祖太祖則周之后稷配祭於郊太宗則周之文王配祭於明堂親祠並配實出權宜請自今季秋攝事専祀昊天上帝以太宗配從之六年大臣以圜丘方澤之祭寓於天慶小屋三楹卑陋湫隘軍民喧雜命奉常及臨安守臣别營之正月太常少卿何慤始請遷於城外恵照院九年二月己夘始用國子監丞張希亮之請凡大祀益籩豆為十有二十三年十一月禮官請今後祀天以及慶禮皆於圜壇十四年四月太常博士凌哲請大祠具樂舞禮官定用工八十有三人二舞九十人押樂太常卿丞皆一人協律二人十六年始用政和儀籩豆皆二十有六簠簋皆八十九年八月命禮官及臨安守臣葺恵照望祭殿建齋宫於其西合三十有一區淳熙六年秋九月大享明堂合祭天地復奉太祖太宗配先時詔今嵗行明堂大禮令禮部太常寺詳議宰執進呈禮寺議状竊觀黄帝拜祀上帝於明堂唐虞祀五帝於五府歴時既久其詳莫得而聞至禮記始載明堂位一篇言天子負斧依南鄉而立内之公侯伯子男外之蠻夷戎狄以序而立故曰明堂也者明諸侯之尊卑也孟子亦曰明堂者王者之堂也周禮大司樂有冬至圜丘之樂夏至方丘之樂宗廟九變之樂三者皆大祭祀惟不及明堂豈非明堂者布政會朝之地周成王時嘗於此歌我將之頌宗祀其祖文王乎後暨漢唐雖有沿革至於祀帝而配以祖宗多由義起未始執一本朝仁宗皇祐中破諸儒異同之論即大慶殿行親享之禮並侑祖宗從以百神前期朝獻景靈宫享太廟一如郊祀之制太上皇帝中興斟酌家法舉行皇祐之制於紹興之初亦在殿庭合祭天地並配祖宗葢得聖經之遺意且國家大祀有四春祈榖夏雩祀秋明堂冬郊祀是也陛下即位以來固嘗一講祈榖四躬冬祀惟合宫雩壇之禮猶未親行今若據已行典禮及用仁宗時名儒李覯明堂嚴祖説并治平中吕誨司馬光錢公輔等集義近嵗李燾奏劄所陳特舉秋享於義為允上曰明堂合祭天地並侑祖宗從祀百神並依南郊禮例可依詳議事理施行禮部太常寺言明堂所設神位並依南郊禮例係七百七十一位今大慶殿鋪設昊天上帝皇地祗太祖皇帝太宗皇帝四位其從祀神位凡七百六十有七於東西兩朶殿鋪設五方帝至五嶽二十五位餘從祀衆星東廊二百八十位西廊二百四十八位南廊六十六位欲於南廊前連簷修葢瓦屋與東西廊相接設一百四十八位依議令合設饌幔欲於新置便門外幔道下結縛撘葢屋二間及合用祝册幄次乞於南宫門裏過道門下面東兩壁釘設其禮部捧册職掌等乞於過道門面南壁宿齋其皇帝位版幄次乞於内藏庫相對廊上釘設從之太史局言將来明堂大禮合祭天地並侑祖宗從祀百神並依南郊禮例今照得明堂兩朶殿上鋪設神位版共二十五位其上十位五方帝昊天上帝皇地祗神州地祗夜明大明共十位並金面青字大版内一十五位五行五官五瀆皆朱紅漆面金字小版將來鋪設大小不等乞下所屬創造朱紅漆面金字大版神位一十五位從之御書明堂明堂之門六字并嗣天子臣御名恭書七字令修内司製造牌二面將來明堂大禮其明堂牌於行禮殿上安掛其明堂之門牌於行禮殿西門新置便門上安掛太常寺修定明堂大禮儀注誓戒同郊祀致齋三日一日於文徳殿一日於太廟一日再赴文徳殿儀並同郊祀但改大慶殿為文徳殿奏告前祀二日奏告太祖皇帝太宗皇帝室如常告之儀陳設内玉幣籩豆簠簋俎實罇罍酒齊數目並同郊祀不重録惟實爼増羊腥豕腥如牛腥之數前祀三日有司設大次於垂拱殿門内東廊又設小次於明堂阼階下之東稍南西面設文武侍臣次於明堂門外行事執事陪祠宗室及有司次於明堂門外設東方南方客使次於文臣之後西方北方客使次於武臣之後設饌幔於明堂門外稍西南向前祀二日太社令帥其屬掃除明堂之内外置燎壇於明堂庭之東南隅太社令積柴於燎壇光禄牽牲詣祠所太常設登歌之樂於堂上前楹間稍南北向設宫架於庭中立舞表於鄼綴之間前祀一日太常設神位版昊天上帝皇地祗位於堂上北方南向西上太祖皇帝太宗皇帝位於堂上東方西向北上告潔畢權徹五方帝神州地祗大明夜明天皇大帝北極五行五官五嶽位二十五北斗天一太一帝座五帝内座五星十二辰河漢内官五鎮四海四瀆二十八宿中官山林川澤外官邱陵墳衍原隰位三百八十有二衆星位三百有六十並分設於兩廊東西相向以北為上内南廊所設衆星重行北向以西為上鋪設席皆以莞奉禮郎禮直官設皇帝位版於阼階之上西向飲福位於昊天上帝之西南北向望燎位於殿隔門上當中南向賛者設亞終獻位於堂下阼階之東少南西向大禮使左丞相又於其南行事吏部户部禮部兵部刑部工部尚書吏部禮部刑部侍郎光禄卿讀册舉冊官光禄丞於大禮使左丞相之後光禄丞稍却執事官位又於其後奉禮郎摶黍太祝太社大官令位於亞獻之北少東俱西向北上監察御史位四二於堂下西階之西東向北上一於殿隔門外東階下一於殿隔門外西階下協律郎位二一於堂上磬簴之北少西一於宫架之西北俱東向押樂太常丞位於登歌鐘簴之北押樂太常卿位於宫架之北俱北向分獻官奉禮郎各位於從祀神位之前俱北向良醖令於酌罇所北向又設陪祠文武官位於行事執事之南東西相向諸方客使在文官之南隨其方國光禄陳牲於明堂門外東向祝史各位於牲後太常設省牲位於牲東大禮使左丞相在北南向東上分獻官位於其後行事吏部户部禮部兵部刑部工部尚書吏部禮部刑部侍郎押樂太常卿光禄卿讀冊舉冊官押樂太常丞光禄丞奉禮協律郎摶黍太祝太社太官令在南北向東上太常丞以下位皆稍却監察御史在吏部尚書之東異位稍却光禄陳禮饌於行禮殿隔門外稍東南向設省饌位版於禮饌之南大禮使左丞相在南北向西上分獻官位於其後監察御史位四在西東向北上吏部户部禮部兵部刑部工部尚書吏部禮部刑部侍郎押樂太常卿光禄卿讀冊舉冊官押樂官太常丞光禄丞奉禮協律郎摶黍太祝太社太官令在東西向北上禮部帥其屬設祝冊案於神位之右司罇彛帥其屬設玉幣篚於酌罇所次設籩豆簠簋之位正配位皆左二十有五籩右二十有五豆俱為四行爼三二在籩前一在豆前又爼六在豆右為二重登一在籩豆間鉶三皆有柶在登之前簠七簋七在籩豆外三爼間簠在左簋在右又設罇罍之位每位皆著罇二壺罇二皆有罍加勺羃為酌罇太罇二山罇二犧罇二象罇二皆有罍加羃設而不酌並在堂上稍南北向西上配位設於正位酒罇之東每位玉爵一有坫又設從祀諸神籩豆簠簋之位五方帝以下二十有五位皆左十籩右十豆俱為三行爼二在籩豆前登一在籩豆間簠二簋二在爼間簠在左簋在右爵一在爼前有坫内神州地祗五行五官五嶽每位皆加槃一在登之前其餘神位皆左二籩右二豆爼一在籩豆前簠簋在爼前簠在左簋在右爵一次之登一在籩豆間衆星三百六十位皆不設登又設從祀罇坫之位五方帝神州地祗大明夜明天皇大帝北極每位各設太罇二著罇二於籩前之左又各於東西廊五行五官五嶽神位之前稍北共設犧罇二象罇二又於東西廊帝座北斗以下神位之前稍北共設犧罇二象罇二壺罇二槩罇二又於東西廊東鎮西鎮以下神位之前稍北共設山罇二係御嫌名罇二散罇二又於東西南廊衆星神位之前共設散罇二十有四又設正配位籩豆簠簋盤各一爼各三於饌幔内設御槃匜於阼階上進盤匜帨巾内侍位於皇帝版位之後分左右奉盤者北向奉匜及執巾者南向又設亞終獻盥洗爵洗於其位之北盥洗在東爵洗在西罍在洗東加勺篚在洗西南肆實以巾若爵洗之篚則又實以篚執罍篚者位於其後分獻官盥洗十二并罍勺篚巾分設於東西廊下執罍篚者各位於其後祀日丑前五刻太社令與太史官屬各服其服陞堂設昊天上帝皇地祗太祖皇帝太宗皇帝神位版於堂上又設五方帝神州地祗大明夜明天皇大帝北極五行五官五嶽二十五位於兩朶殿太府卿少府監帥其屬入陳玉幣於篚光禄卿帥其屬入實正配位籩豆簠簋太官令帥其屬入實爼良醖令帥其屬入實罇罍又實從祀神位之饌又實從祀神位之罇太常官設燭於神位之前又設大禮使以下行事執事官攝位於明堂門外如省牲位有司設神位版幄又設冊幄於明堂門外皇帝自太廟詣文徳殿並同郊祀車駕詣青城儀止改青城齋宫為麗正門省牲器並同郊祀止改郊壇為明堂奠玉幣並同郊祀行事皇帝自齋殿服通天冠絳紗􅂁乗輿以出近侍及扈從之官𨗳從至垂拱殿門内大次皇帝降輿入大次簾降禮儀使樞宻院官太常卿閤門官太常博士禮直官分立於大次外之左右次引禮部侍郎詣大次前奏請中嚴少頃又奏外辦符寳郎奉寳陳於宫架之側禮儀使當次前俛伏跪奏禮儀使臣某言請皇帝行事奏訖俛伏興還侍立禮儀使奏禮畢准此簾捲皇帝服衮冕以出侍衛如常儀禮儀使以下前𨗳至明堂殿西外班門殿中監跪進大圭前𨗳皇帝入門侍衛不應入者止於門外協律郎跪俛伏舉麾興工鼓柷宫架儀安之樂作皇帝陞降行止皆奏儀安之樂由西廊降階自宫架前至阼階下偃麾戞敔樂止凡樂皆協律郎跪俛伏舉麾興工鼓柷而後作偃麾戛敔而後止之也陞自阼階大禮使從皇帝陞降大禮使皆從左右侍衛之官量人數從陞登歌樂作至版位西向立樂止禮儀使以下分左右侍立凡行禮皆禮儀使樞宻院官太常卿閤門官太常博士禮直官前導至位則分立於左右禮儀使前奏有司謹具請行事宫架作成安之樂右文化俗之舞樂作三成止先引左丞相吏部尚書侍郎陞堂詣昊天上帝神位前立左丞相吏部尚書俱西向北上吏部侍郎東向樂作六成止太社令升煙燔牲首禮儀使奏請再拜皇帝再拜賛者曰再拜在位官皆再拜内侍取玉幣於篚立於尊所内侍各執盤匜帨巾以進宫架樂作禮儀使奏請皇帝搢大圭盥手内侍進盤匜沃水皇帝盥手又奏請帨手内侍進巾皇帝帨手訖又奏請皇帝執大圭樂止禮儀使前導登歌鎮安之樂作殿中監跪進鎮圭禮儀使奏請搢大圭執鎮圭前導皇帝詣昊天上帝神位前北向立内侍先設繅藉於地禮儀使奏請跪奠鎮圭於繅藉執大圭俛伏興又奏請搢大圭跪内侍加玉於幣以授吏部尚書吏部尚書以授左丞相西向跪以進禮儀使