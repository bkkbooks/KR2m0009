body:
  text: 文獻通考卷三百二十四鄱陽馬端臨貴與著四裔考一東通典總序曰覆載之内日月所臨華夏居土中生物受氣正李淳風云談天者八家其三家甘氏石氏渾天之類以度数之則華夏居天地之中也歴代史倭國一名日本在中國東扶桑復在倭國東約去中國三萬里近日出處貞觀中骨利幹國獻馬使云國在京師西北二萬餘里夜短晝長從天色暝時煮羊足才熟而東方已曙盖近日入處今崖州直南水行便風十餘日到赤土國其國到五月亭午物影却在南一日三食飯皆旋炊不然逡廵過時即便臭敗熱氣時特甚盖去日較近其地漸逺轉寒盖去日稍逺則洛陽告成縣土圭居覆載之中明矣唯釋氏一家論天地日月恠誔不可知也人性和而才慧地産厚而類繁所以誕生聖賢繼施法教隨時拯弊因物利用三五以降代有其人君臣長幼之序立五常十倫之教備孝慈生焉恩愛篤焉主威張而下安權不分而法一生人大寳實在於斯三代以前列國更相征伐未嘗暫寧陪臣制諸侯諸侯陵天子人斃鋒鏑月耗嵗殱秦氏罷侯置守兩漢及隋唐户口皆多於周室之前矣夫天生烝民而樹君司牧語治者固當以既庶而安為本也昔賢曰失道而後徳失徳而後仁失仁而後義失義而後禮誠謂削厚為薄散淳為澆又曰古者人至老死不相徃来不交不争自求自足盖疾時澆巧美徃昔敦淳也然人之常情非今是古其朴質少事信固可羙而鄙風弊俗或亦有之緬惟古之中華多類今之荒裔有居處巢穴焉上古中華亦穴居野處後代聖人易之以宫室今室韋國及黔中覊縻東諸夷及附國皆巢居穴處諸荒裔處巢穴者非少畧舉一二有𦵏無封樹焉上古中華之𦵏衣之以薪葬中野不封不樹後代聖王易之以棺槨今韎􅞘國父母死棄之中野以哺貂流求國死無棺槨草裏屍以親土而𦵏上不起墳諸夷狄殯𦵏或以火焚或棄水中潭衡州蜑人取死者骨小凾子盛置山岩石間大抵習俗既殊其法各異不可遍舉矣有手團食焉殷周之時中華人尚以手團食故禮記云共飯不澤手盖弊俗漸改仍未盡耳今五嶺以南民庶皆手團食有祭立尸焉三代以前中華人祭必立尸自秦漢則廢案後魏文成帝拓䟦濬時髙允獻書云祭尸乆廢今風俗父母亡歿取其收貌類者以為尸而祭焉宴好如夫妻事之如父母敗損風化黷亂情禮又周隋蠻夷傳巴梁間風俗每春秋祭祀鄉里有美鬢面人迭迎為尸以祭之今都道州人每祭祀迎同姓丈夫婦人伴神以享亦為尸之遺法聊陳一二不能遍舉夏商以前臣不諱君名子不諱父名自有周方諱耳今外裔則皆無諱如此之類甚衆不可殫論其地偏其氣梗不生聖哲莫革舊風訓誥之所不可禮義之所不及外而不内踈而不戚来則禦之去則備之前代達識之士亦已言之詳矣歴代觀兵黷武討伐戎夷爰自嬴秦禍患代有始皇恃百勝之兵威既平六國終以事胡為弊漢武資文景之積蓄務恢封畧天下危若綴旒王莽獲元始之全實志滅匈奴海内遂至潰叛隋煬帝承開皇之殷盛三駕遼左萬姓怨苦而亡夫持盈固難知足非易唯後漢光武深達理源建武三十年人康俗阜臧宫馬武請殄匈奴帝報曰捨近而圖逺勞而無功捨逺而謀近逸而有終務廣地者荒務廣徳者强有其有者安貪人有者殘自是諸将莫敢復言兵事於戲持盈知足豈特治身之本亦乃治國之要歟宋文元嘉中比西漢文景分命諸将經畧河南致拓䟦𤓰歩之師因而國蹙身弑陳宣令主吳明徹入呂梁二十萬卒悉為周師所虜由是力殫財竭旋為隋氏削平是昏昧持盈不能知足故也我國家開元天寳之際宇内謐如邊将邀寵競圖勲伐西陲青海之戍東北天門之師磧西怛邏之戰雲南渡瀘之役沒於異域數十萬人天寳中哥舒翰克吐蕃青海青海中有島置二萬人戍之旋為吐蕃所攻翰不能救而全沒安祿山討奚契丹於天門嶺十萬衆沒髙仙芝伐石國於怛邏斯川七萬衆盡沒楊國忠討蠻閤羅鳳十餘萬衆全沒向無幽宼内侮天下四征未息離潰之勢其可量邪前事之元龜足為殷鑒者矣東夷總序東夷白虎通云夷者蹲也應劭風俗通云夷者抵也言仁而好生萬物抵地而出故天性柔順易以道御有九種曰畎夷方夷黄夷白夷赤夷元夷風夷陽夷千夷率皆土著遲畧切喜許利切飲酒歌舞或冠弁衣錦器用俎豆所謂中國失禮求之四夷者也凡蠻夷戎狄總名曰夷者猶公侯伯子男皆號諸侯昔堯命羲仲宅嵎夷曰暘谷盖日之所出也夏后氏大康失徳夷人始叛其後至后𤼵即位賔於王門獻其樂舞桀為暴虐諸侯内侵商湯革命伐而㝎之至扵仲丁藍夷作㓂自是或服或叛三百餘年武乙衰弊東夷寖盛遂分遷淮岱漸居中土周初封商太師國於朝鮮太師為周陳洪範其地今安東府之東悉為東夷所據時管蔡畔周乃招誘淮夷作亂周公征定之其後徐夷僣號穆王命楚滅之徐偃王也至楚靈王會申亦来同盟後越遷琅琊遂陵暴諸夏侵滅小國秦并天下其淮泗夷皆散為人戸其朝鮮歴千餘年至漢髙帝時滅武帝元狩中開其地置樂浪等郡至後漢末為公孫康所有魏晋又得其地其三韓之地在海島之上朝鮮之東南百濟新羅魏晉以後分三韓地新羅又在百濟之東南倭又在東南倭烏和反隔越大海夫餘在髙麗之北挹婁之南其倭及夫餘自後漢百濟新羅自魏歴代並朝貢中國不絶而百濟唐顯慶中蘇定方滅之髙麗本朝鮮地漢武置縣屬樂浪郡時甚微弱後漢以後累代皆受中國封爵所都平壤城則故朝鮮國王險城也後魏周齊漸强盛隋文帝時㓂盗遼西漢王諒帥兵討之至遼水遭癘疫而返煬帝三度親征初度遼水敗績再行次遼水會楊元感反奔退又徃将達涿郡屬天下賊起及饑饉旋師貞觀中太宗又親征度遼破之髙宗總章初英國公李勣遂滅其國古之肅慎宜即魏時挹婁自周初貢楛矢石弩楛音戸至魏常道鄉公末東晋元帝初及石季龍時始皆獻之後魏以後曰勿吉國今則曰靺鞨焉大抵東夷書文並同華夏其閩越之地秦平天下以為郡及秦亂其帥又自稱王於故地武帝元封初楊僕滅其國遷其人於江淮虚其地自後雖人庶復集遂為郡縣矣范曄論曰王制云東方曰夷夷者抵也言仁而好生萬物抵地而出事見風俗通故天性柔順易以道御至有君子不死之國焉山海經曰君子衣冠帶劒食獸使二文虎在傍外國圖曰去瑯琊三萬里山海經曰不死人在交脛東其國人黑色夀不死並在東方昔箕子逢衰殷之運避地朝鮮始其國俗未有聞也及施八條之約使人知禁遂乃邑無滛盗門不夜扄扄闗也囘頑薄之俗就寛畧之法行數百千年故東夷通以柔謹為風異乎三方者茍政之所暢則道義存焉仲尼懐憤以為九夷可居或疑其陋子曰君子居之何陋之有亦徒有以焉爾其後遂通接商賈漸交上國而燕人衞滿擾雜其風擾亂也於是從而澆異焉老子曰法令滋彰盗賊多有若箕子之省簡文條而用信義其得聖賢作法之原矣朝鮮朝鮮晋張華曰朝鮮有泉水冽水汕水三水合為列水疑樂浪朝鮮取名於此也昔武王封殷太師箕子於其地箕子教以禮義田􅅙又制八條之教前書曰其法相殺者以當時償殺相傷者以榖償相盗者男沒入為其家奴女子為婢欲自贖者人五十萬音義曰八條不其見也其人終不相盗無門户之閉婦人貞信飲食以籩豆其後四十餘代至戰國時朝鮮侯凖亦僣稱王始全燕時嘗略屬焉為置吏築障塞秦滅燕屬遼東外徼秦遼東郡唐安東府之東地及秦亂燕齊趙人徃避地者數萬口漢興為其逺難守復修遼東故塞至浿水為界浿旁拜反屬燕王盧綰反入匈奴燕王衞滿亡命聚黨千餘人魋杜囘反結蠻夷服而東走出塞度浿水擊破朝鮮王凖居秦故空地上下障魏畧曰昔箕子之後朝鮮侯見周衰燕自尊為王欲東畧地朝鮮侯亦自稱為王欲興兵遂擊燕以尊周室其大夫禮諫之乃止使禮西說燕燕止之不攻後子孫稍驕虐燕乃遣将秦開攻其西方取地二千餘里至滿潘汙為界朝鮮遂弱及秦并天下使蒙恬築長城到遼東時朝鮮王否立畏秦襲之畧服屬秦不肯朝㑹否死箕子凖立二十餘年而陳項起天下亂燕齊趙民愁苦稍稍亡徃凖凖乃置之於西方及漢以盧綰為燕王朝鮮與燕界於浿水及綰反入匈奴燕人衛滿亡命為胡服東渡浿水詣凖降說凖求居西界故中國亡命為朝鮮藩屏凖信寵之拜為博士賜以圭封之百里令守西邊滿誘亡黨衆稍多乃詐遣人告凖言漢兵十道至求入宿衞遂還攻凖與滿戰不敵也後稍役屬真番朝鮮諸夷及故燕齊亡命者王之都王險在浿水之東會孝恵髙后時天下初定遼東太守即約滿為外臣保塞外以故滿得兵威財物侵降其旁小邑真番臨屯皆来服屬地方數千里傳子至孫右渠所誘漢亡人滋多初漢約朝鮮蠻夷君長欲入見天子勿得禁止以聞右渠既未嘗入眞番辰國謂辰韓也欲上書見天子又雍閼弗通元封二年漢使渉何譙諭右渠終不肯奉詔使裨王長送何至浿水何刺殺之歸報曰殺朝鮮将上為其名美弗詰拜何遼東東部都尉朝鮮怨發兵襲攻殺之漢遣樓船将軍楊僕從齊浮渤海兵五萬左將軍荀彘出遼東誅右渠發兵距險漢兵不利天子為兩将未有功乃使衞山因兵威徃諭右渠右渠見使者頓首謝願降恐将詐殺臣今見信莭請服降遣太子入謝獻馬五千匹及饋軍糧人衆萬餘持兵方渡浿水使者與左将軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左将軍詐之遂不度浿水復引歸山報天子誅山會兵圍之右渠堅城守數月未能下朝鮮王乃私約降樓船兩将不相得兵久不決左将軍執樓船併其軍因急擊朝鮮王不肯降元封三年夏尼谿相參乃使人殺王右渠来降遂㝎朝鮮為真番臨屯樂浪元莵四郡後悉為東夷之地昭帝時罷臨屯真番以并樂浪元莵自内屬以後風俗稍薄法禁亦浸多至於六十餘條濊音穢濊亦朝鮮之地南與辰韓北與髙句麗沃沮接東窮大海西至樂浪漢武帝元朔元年濊君南閭等畔朝鮮率二十八萬口詣遼東内屬帝以其地為蒼海郡數年乃罷至元封三年滅朝鮮分置四郡昭帝時并二郡入樂浪元莵復徙元莵居句麗自單大嶺以東沃沮濊貃并屬樂浪後以境土廣逺復分嶺東七縣置樂浪東部都尉光武建武六年省都尉官遂棄嶺東地悉封其渠帥為縣侯皆嵗時朝賀無大君長自漢以来其官有侯邑君三老統主下户其耆舊自謂與髙麗同種言語法俗大抵相類其人性謹愿少嗜慾有恥男女衣皆著曲領男子繫銀花廣數寸以為飾其俗重山川山川各有部分不得輙相干渉同姓不婚多所忌諱疾病死亡即棄舊宅更作新居知種麻養􅅙綿布暁候星宿先知年嵗豐約不以珠玉為寳常用十月祭天書夜飲酒歌舞名曰舞天又祭虎以為神其邑落有侵犯者輙相罰責生口牛馬名之為責禍少冦盗作矛長三丈或數人共持之能歩戰樂浪檀弓出其地又多文豹有果下馬髙三尺乘之可於果樹下行也其海出班魚皮漢時常獻之魏齊王正始六年不耐濊侯等舉邑降四時詣樂浪帶方二郡朝謁並今東夷之地有軍征賦調如中華人焉馬韓韓有三種一曰馬韓後漢時通焉二曰辰韓三曰弁辰馬韓在西有五十四國其北與樂浪南與倭接辰韓在東十有二國其北與濊貃接弁辰在辰韓之南亦十有二國其南亦與倭接凡七十八國百濟是其一焉大者萬餘戶小者數千家各在山海間地合方四千餘里東西以海為限皆古之辰國也馬韓最大共立其種為辰王都目支國盡王三韓之地其諸王先皆是馬韓種人焉馬韓人知田􅅙作綿布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作土室形如冡開戸在上不知跪拜無長幼男女之别不貴金寳錦􅄢不知騎乘牛馬唯重纓珠以綴衣為飾及縣頸垂耳大率皆魁頭露紒魁頭猶科頭也謂以髪縈繞成科結也紒音計布袍草履其人壮勇少年有築室作力者輙以繩貫脊皮縋以大木嚾呼為健常以五月祭鬼神晝夜酒會羣聚歌舞舞輒數十人相隨蹋地為莭十月農功畢亦復如之諸國邑各以一人主祭天神號為天君又立蘓塗魏志曰諸國名有别邑為蘇塗諸亡逃至其中皆不還之蘓塗之義有似浮屠建大木以縣鈴鼓事鬼神其南界近倭亦有文身者其國各有帥大者自名為臣智其次為邑借散在山海間無城郭有愛襄國牟水國桑外國小石索國大石索國優休牟涿國臣濆沽國伯齊國速盧不斯國日華國古誕者國古離國怒藍國月支國治離牟盧國素謂乾國古爰國莫盧國卑離國占離卑國占釁國支侵國狗盧國卑彌國監奚卑離國古蒲國致利鞠國冉路國兒林國駟盧國内卑離國感奚國萬盧國辟卑離國舊斯烏旦國一離國不彌國友半國狗素國樓盧國牟盧卑離國臣蘇塗國莫盧國古臘國臨素半國臣雲新國如来卑離國楚山塗卑離國一難國狗奚國不雲國不斯濆邪國爰池國乾馬國楚離國凡五十餘國大國萬餘家小國數千家總十餘萬戸辰王治月支國臣智或加優呼臣雲遣支報安邪踧支濆臣離兒不例拘邪秦支廉之號其官有魏率善邑君歸義侯中郎将都尉伯長侯初朝鮮王凖既為衛滿所攻奪将其左右官人走入海攻馬韓破之自立為韓王魏畧曰其子友親留在國者因冒姓韓氏凖王海中不與朝鮮相徃来其後絶滅今韓人猶有奉其祭祀者凖既滅馬韓人復自立為辰王建武二十年韓人亷斯人蘇馬諟等詣樂浪貢獻光武封蘇馬諟為漢廉斯邑君使屬樂浪郡四時朝謁靈帝末韓濊並盛郡縣不能制百姓苦亂多流亡入韓者獻帝建安中公孫康分屯有有鹽縣屯有有鹽並漢遼東屬郡唐並為東夷地以南荒地為帶方郡遣公孫模張敞等收集遺民興兵伐韓濊舊民稍出是後倭韓遂屬帶方魏景初中明帝宻遣帶方太守劉昕樂浪太守鮮于嗣越海定二郡諸韓國臣智加賜邑君印綬其次為邑長其俗好衣幘下戸詣郡朝謁皆假衣幘自服印綬衣幘千有餘人部從事呉林以樂浪本統韓國分割辰韓八國以與樂浪晉武帝太康元年二年其王頻遣使入貢方物七年八年十年又頻至太熙元年詣東夷校尉何龕上獻咸寧三年復来明年又請内附其王来朝自後無聞三韓盖為百濟新羅所吞併又有州胡在馬韓之西海中大島上其人差短小言語不與韓同皆髠頭如鮮卑但衣韋衣有上無下畧如裸勢飬牛豕乘船来貨市韓中辰韓辰韓耆老自言秦之亡人避苦役来適韓國馬韓割其東界地與之有城栅其言語有類秦人由是或謂之為秦韓其王常用馬韓人作之世世相係襲辰韓不得自立為王明其為流移之人故也其名國為邦弓為弧賊為宼行酒為行觴相呼皆為徒諸小邑各有渠帥大者名臣智次有險側次有樊穢次有殺奚次有邑借皆其官名土地肥美宜五穀知􅅙桑作縑布乘駕牛馬嫁娶以禮其俗男女有别以大鳥羽送死其意欲使死者飛揚國出鐡韓濊倭皆從取之諸市買皆用鐡如中國用錢又以供給二郡俗喜歌舞飲酒鼓琴瑟其瑟形似筑彈之亦有音曲兒生便以石厭其頭欲其匾故辰韓人皆匾頭匾音補典反男女近倭亦文身便歩戰兵仗與馬韓同其俗行者相逢皆住讓路晋武帝太康中三来朝貢弁辰弁辰與辰韓雜居亦有城郭衣服居處與辰韓同言語風俗相似祠祭鬼神有異施竈皆在戸西其人形皆長大美髪衣服潔清而刑法嚴峻其國近倭故頗有文身者夫餘夫餘國在元菟北千里南與髙句麗東與挹婁西與鮮卑接北有弱水地方二千里本濊地也初北夷索離國王出行索或作槖音度洛反其侍兒於後􅗖身􅗖音人鴆反王還欲殺之侍兒曰前見天上有氣大如雞子来降我因以有身王囚之後遂生男王令置於豕牢牢圏也豕以口氣嘘之不死復徙於馬蘭蘭即欄也馬亦如之王以為神乃聽母收飬名曰東明東明長而善射王忌其猛復欲殺之東明奔走南至掩淲水今髙麗中有盖斯水疑此水是也以弓擊水魚鼈皆聚浮水上東明乘之得度因至夫餘而王之焉於東夷之域最為平敞土宜五榖出名馬赤玉貂豽豽似豹無前足音奴八反大珠如酸棗以員栅為城有宫室倉庫牢獄其人麤大疆勇而謹厚不為宼鈔以弓矢刀矛為兵以六畜名官有馬加牛加狗加其邑落皆主屬諸加食飲用爼豆會同拜爵洗爵揖讓升降以臘月祭天大會連日飲酒歌舞名曰迎鼓是時斷刑獄解囚徒有軍事亦祭天殺牛以蹏占其吉凶魏志曰牛蹏解者為凶合者為吉行人無晝夜好歌吟音聲不絶其俗用刑嚴急被誅者皆沒其家人為奴婢盗一責十二男女滛皆殺之尤治惡妬婦既殺復尸於山上兄死妻嫂死則有槨無棺殺人殉𦵏多者以百數其王𦵏用玉匣漢時常豫以玉匣付元菟郡王死則迎取以𦵏焉建武中東夷諸國皆来獻見二十五年夫餘王遣使奉貢光武厚答報之於是使命嵗通至安帝永初五年夫餘王始将歩騎七八千人宼鈔樂浪殺傷吏民後復歸附永寧元年乃遣嗣子尉仇台詣闕貢獻天子賜尉仇台印綬金綵順帝永和元年其王来朝京師帝作黄門鼓吹角抵戲以遣之桓帝延熹四年遣使朝賀貢獻永康元年王夫台将二萬餘人宼元菟元菟太守公孫域擊破之斬首千餘級至靈帝熹平三年復奉章貢獻夫餘本屬元菟獻帝時其王求屬遼東云漢末公孫度雄張海東威服外夷夫餘王尉仇台更屬遼東時句麗鮮卑疆度以夫餘在二虜之間妻以宗女尉仇台死簡位居立無適子有孽子麻余位居死諸加共立麻余牛加兄子名位居為大使輕財善施國人附之嵗嵗遣使詣京師貢獻魏正始中幽州刺史毋邱儉討句麗遣元菟太守王須詣夫餘位居遣犬加郊迎供軍糧季父牛加有二心位居殺季父父子籍沒財物遣使薄歛送官舊夫餘俗水旱不調五榖不熟輒歸咎於王或言當易或言當殺麻余死其子依慮年六嵗立以為王晉太康六年為慕容廆所襲破依慮自殺子弟走保沃阻夫餘庫有玉璧珪瓉數代之物傳世以為寳耆老言先代所賜也魏畧曰其國殷富自先世以来未嘗破壤武帝以何龕為䕶東夷校尉明年夫餘後王依羅遣使詣龕求率見人還復舊國龕遣督䕶賈沉以兵送之廆又要之於路沉與戰破之依羅乃得復國爾後每為廆掠其種人賣於中國帝又以官物贖還禁市夫餘之口自後無聞倭即日本倭在韓及帶方郡東南大海中依山島為居去樂浪郡境及帶方郡並一萬二千里凡百餘國自漢武帝滅朝鮮使驛通於漢者三十許國國主稱王世世傳統其大倭王居邪馬臺國按今名邪摩維音之訛也樂浪徼去其國萬二千里去其西北界拘邪韓國七千餘里其地大較在會稽東冶之東與朱崖儋耳相近故其法俗多同土宜禾稻麻紵􅅙桑知織績為縑布出白珠青玉其山有丹土氣温暖冬夏生菜茹無牛馬虎豹羊鵲鵲或作雞其兵有矛楯木弓竹矢或以骨為鏃男子皆黥面文身以其文左右大小别尊卑之差其男衣皆横幅結束相連女人被髮屈紒衣如單被貫頭而著之並以丹朱坋身說文曰坋塵也音蒲頓反如中國之用粉也有城栅屋室父母兄弟異處唯會同男女無别飲食以手而用籩豆俗皆徒跣以蹲踞為恭敬人性嗜酒多夀考至百餘嵗者甚衆國多女子大人皆有四五妻其餘或兩或三女人不滛不妬又俗不竊盗少争訟犯法者沒其妻子重者滅其門族其死停喪十餘日家人哭泣不進酒食而等類就歌舞為樂灼骨以卜用決吉凶行来度海令一人不􅌨沐不食肉不近婦人名曰持衰若在塗吉利則顧以財物如病疾遭害以為持衰不謹便共殺之建武中元二年倭奴國奉貢朝賀使人自稱大夫倭國之極南界也光武賜以印綬安帝永初元年倭國王帥升等獻生口百六十人願請見桓靈間倭國大亂更相攻殺歴年無主有一女子名曰卑彌呼年長不嫁事鬼神道能以妖惑衆於是共立為王侍婢千人少有見者唯有男子一人給飲食傳辭語居處宫室樓觀城栅皆持兵守衛法俗嚴峻自女王國東度海千餘里至拘奴國雖皆倭種而不屬女王自女王國南四千餘里至侏儒國人長三四尺自侏儒東南行船一年至裸國黑齒國使驛所傳極於此矣會稽海外有東鯷人鯷音達奚反分為二十餘國又有夷州及澶州傳言秦始皇遣方士徐福将童男女數千人入海事見史記求蓬莱神仙不得徐福畏誅不敢還遂止此州世世相承有數萬家人民時至會稽市會稽東冶縣人有入海行遭風流移至澶州者所在絶逺不可徃来南史倭西南海有海人身黒眼白裸而醜其肉美行者或射而食之文身國在倭東北七千里人體有文如獸其額上有三文文直者貴文小者賤土俗歡樂物豐而賤行客不賫粮有屋宇無城郭國王所居飾以金銀珍麗遶屋為壍廣一丈實以水銀雨則流於水銀之上市用珍寳犯罪輕者鞭杖死罪則置猛獸食之有枉則獸避而不食經宿則赦之大漢國在文身國東五千餘里無兵戈不攻戰風俗並與文身國同而言語異倭國有獸如牛名曰山䑕又有大蛇吞此獸蛇皮堅不可斫其上有孔乍開乍閉時或有光射中之蛇則死矣魏志曰從帶方郡至倭循海岸水行歴韓國乍南乍東到其北岸拘邪韓國七千餘里至對海國其大官曰卑狗副曰卑奴母離所居絶島方可四百餘里土地山險多深林道路如禽鹿逕有千餘戸無良田食海物自活乘船南北市糴又南渡一海千餘里名曰瀚海至一大國官亦曰卑狗副曰卑奴母離方可三百里多竹木􅓜林有三千許家差有田地耕田猶不足食亦南北市糴又渡一海千餘里至末盧國有四千餘戸濵山海居草木茂盛行不見前人好捕鰒魚水無深淺皆沉沒取之東南陸行五百里到尹都國官曰爾支副曰泄謨觚柄渠觚有千餘戸世有王皆統屬女王國郡使徃来常所駐東南至奴國百里官曰兕馬觚副曰卑奴母離有二萬餘戸東行至不彌國百里官曰多模副曰卑奴母離有千餘家南至投馬國水行二十日官曰彌彌副曰彌彌那利可五萬餘戸南至邪馬一國女王之所都水行十日陸行一月官有伊支馬次曰彌馬升次曰彌馬獲支次曰奴佳鞮可七萬餘戸自女王國以北其戸數道里可得畧載其餘旁國逺絶不可得詳次有斯焉國次有已百支國次有伊邪國次有郡支國次有彌奴國次有好古都國次有不呼國次有姐奴國次有對蘇國次有蘇奴國次有呼邑國次有華奴蘇奴國次有鬼國次有為吾國次有鬼奴國次有邪馬國次有躬臣國次有巴利國次有支惟國次有烏奴國次有奴國此女王境界所盡其南有拘奴國男子為王其官有狗古智卑狗不屬女王自郡至女王國萬二千餘里魏景初二年既平公孫氏倭女王遣大夫難升米等詣郡求詣天子朝獻太守送詣都乃以金印紫綬封為親魏倭王難升米等並拜中郎校尉假銀印青綬勞賜優渥正始元年太守弓遵遣使奉詔書印綬并齎詔賜金帛錦􅄢刀鏡綵物倭王國使上表答謝詔恩其四年復遣使上獻生口方物八年太守王頎到官倭女王卑彌呼與狗奴國男王卑彌弓平素不和遣使詣郡說相攻擊状遣塞晋掾史張政等齎詔告諭之卑彌呼死更立男王國中不服更相誅殺復立卑彌呼宗女壹與年十三為王國中遂定壹與遣使送政等還因獻男女生口貢白珠青大句珠異文雜錦晋武帝太始初遣使重譯入貢安帝時倭王讃遣使入朝貢宋武帝永初二年詔曰倭讃逺誠宜甄可賜除授文帝元嘉二年讃又遣使奉表獻方物讃死弟珍立遣使貢獻自稱使持莭都督倭百濟新羅任那秦韓慕韓六國諸軍事安東大将軍倭國王表求除正詔除安東将軍倭國王珍又求除正倭洧等十三人平西征虜冠軍輔國将軍等號詔並聽之二十年倭國王濟遣使奉獻復以為安東将軍倭國王二十八年加使持莭都督倭新羅任那加羅秦韓慕韓六國諸軍事安東将軍如故并除所上二十三人職濟死世子興遣使貢獻孝武大明六年詔授興安東将軍倭國王興死弟武立自稱使持莭都督倭百濟新羅任那加羅秦韓慕韓七國諸軍事安東大将軍倭國王順帝昇明二年遣使上表言自昔祖彌躬擐甲胄䟦渉山川不遑寧處東征毛人五十五國西服衆夷六十六國陵平海北九十五國王道融泰廓土遐畿累葉朝宗不愆於嵗道逕百濟装飾船舫而句麗無道圖欲見吞臣亡考濟方欲大舉奄喪父兄使垂成之功不獲一簣今欲練兵申父兄之志竊自假開府儀同三司其餘咸各假授以勸忠莭詔除武使持莭都督倭新羅任那加羅秦韓慕韓六國諸軍鎮東大将軍梁武帝即位進武號征東大将軍陳平至隋開皇二十年倭王姓阿每字多利思比孤號阿輩鷄彌遣使詣闕上令所司訪其風俗使者言倭王以天為兄以日為弟天明時出聽政跏趺坐日出便停理務云委我弟文帝曰此大無義理於是訓令改之王妻姓鷄彌後宫有女六七百人名太子謂利歌彌多弗利無城郭内官有十二等一曰大徳次小徳次大仁次小仁次大義次小義次大禮次小禮次大智次小智次大信次小信員無定數有軍尼一百二十人猶中國牧宰八十戸置一伊尼翼如今里長也十伊尼翼屬一軍尼其服飾男子衣裙襦其袖㣲小屨如屨形漆其上繫之脚人庶多跣足不得用金銀為飾故時衣横幅結束相連而無縫頭亦無冠但垂髪於兩耳上至隋其王始制冠以錦綵為之以金銀鏤花為飾婦人束髪於後亦衣裙襦裳皆有襈㰇竹聚以為梳編草為薦雜皮為表縁以文皮有弓矢刀矟弩􅗋斧漆皮為甲骨為矢鏑雖有兵無征戰其王朝會必陳設儀仗其國樂戸可十萬俗殺人强盗及姦皆死盗者計贓酬物無財者沒身為奴自餘輕重或流或杖每訊寃獄不承引者以木壓膝或張强弓以弦鋸其項或置小石於沸湯中令所競者探之云理曲者即手爛或置虵甕中令取之云曲者即螫手人頗恬静罕争訟少盗賊樂有五絃琴笛男女多黥臂黥面文身沒水捕魚無文字唯刻木結繩敬佛法於百濟求得佛經始有文字知卜筮尤信巫覡每至正月一日必射戲飲酒其餘莭畧與華同好棊博握槊樗蒱之戲氣候温暖草木冬青土地膏腴水多陸少以小環挂鸕鷀項令入水捕魚日得百餘頭俗無盤爼藉以槲葉食用手餔之性質直有雅風女多男少婚嫁不取同姓男女相悅者即為婚婦入夫家必先跨火乃與夫相見婦人不滛妬死者斂以棺槨親賔就屍歌舞妻子兄弟以白布制服貴人三年殯庶人卜日而瘞及𦵏置屍船上陸地牽之或以小輿有阿蘇山其石無故火起接天者俗以為異因行禱祭有如意寳珠其色青大如雞卵夜則有光云魚眼睛也新羅百濟皆以倭為大國多珍物並仰之恒通使徃来大業三年其王多利思比孤遣朝貢使者曰聞海西菩薩天子重興佛法故遣朝拜兼沙門數十人来學佛法國書曰日出處天子致書日沒處天子無恙云云帝覽不悦謂鴻臚卿曰夷書有無禮者勿復以聞明年上遣文林郎裴世清使倭國度百濟行至竹島南望耽羅國經都斯麻國迥在大海中又東至一支國又至竹斯國又東至秦王國其人同於華夏以為夷洲疑不能明也又經十餘國達於海岸自竹斯國以東皆附庸於倭倭王遣小徳何軰臺從數百人設儀仗鳴鼓角来迎後十日又遣大禮竒多毗從二百餘騎郊勞既至彼都其王與世清来貢方物此後遂絶唐太宗貞觀五年遣使入朝帝矜其逺詔有司無拘嵗貢遣新州刺史髙仁表徃諭與王争禮不平不肯宣詔而還久之更附新羅使者上書永徽初其王孝徳即位改元白雉獻琥珀碼碯時新羅為髙麗百濟所暴髙宗賜璽書令出兵援新羅未幾孝徳死子天豐財立死子天智立明年使者與蝦蛦人偕朝蝦蛦人亦居海島中其使者鬚長四尺許珥箭於首令人戴瓠立數百歩射無不中者天智死子天父立死子總符立咸亨元年遣使賀平髙麗後稍習夏音惡倭名更號日本使者自言國近日所出以為名或云日本乃小國為倭所併故冒其號使者不以情故疑焉又妄夸其國都方數千里南西盡海東北限大山其外即毛人云長安元年其王文武立改元曰大寳遣朝臣真人粟田貢方物朝臣真人者猶唐尚書也冠進徳冠頂有華蘤四被紫袍帛帶真人好學能屬文進止有容武后宴之麟徳殿授司膳卿還之文武死子阿用立死子聖武立改元曰白龜開元初粟田復朝請從諸儒授經詔四門助教趙元黙即鴻臚寺為師獻大幅巾為贄悉賞物貨書以歸其副朝臣仲滿慕華不肯去易姓名曰朝衡歴左補闕儀王友多所該識久乃還聖武死女孝明立改元曰天平勝寳天寳十二載朝衡復入朝上元中擢左散騎常侍安南都䕶新羅梗海道更繇明越州朝貢孝明死大炊立死以聖武女髙野姬為王死白璧立建中元年使者真人興能獻方物真人盖因官而氏者興能善書其帋似蠒而澤人莫識貞元末其王曰桓武遣使者朝其學子橘免勢浮屠空海願留肄業歴二十餘年使者髙階真人来請免勢等俱還詔可次諾樂立次嵯峨次浮和次仁明仁明直開成四年復入貢次文徳次清和次陽成次光孝直光啓元年其東海嶼中又有邪古波邪多尼三小王北距新羅西北百濟西南直越州有絲絮怪珍云宋雍熙元年本國僧奝然與其徒五人浮海而至獻銅器十餘事并本國職員今年代紀各一卷奝然衣綠自云姓滕原氏父為真連真連其國五品官也奝然善𨽻書而不通華言問其風土但書以對上召見存拊甚厚賜紫衣上聞其國王一姓傳繼臣下皆世官因謂宰相曰此島夷耳乃世祚遐逺其臣亦繼襲不絶盖古之道也中國唐季㝢縣分割梁周五代享歴尤促大臣世胄鮮能嗣續可嘆也其國多中國典籍奝然之来復得孝經一卷越王孝經新義第十五一卷皆金縷紅羅縹水晶為軸孝經即鄭氏註者越王乃唐太宗子越王貞新義者記室参軍任希古等撰也奝然又求印本大藏經詔給之二年隨台州寜海縣商人船歸其國後數年遣弟子奉表来謝又别啟貢佛經及方物奝然書曰國中有五經書及佛經白居易集七十卷並得自中國土宜五穀而少麥交易用銅錢文曰乾文大寳畜有水牛驅羊多犀象産絲􅅙多織絹薄緻可爱樂有中國髙麗二部四時寒暑大類中國國之東境接海島夷人所居身面皆有毛東奥州産黄金西别島出白銀以為貢賦國王以王為姓傳襲至今王六十四世文武僚吏皆世官其年代紀所記云初主號天御中主次曰天材雲尊其後皆以尊為號次天八重雲尊次天忍尊次膽波尊次萬魂尊次利刹魂尊次國狹搥尊次角龔魂尊次津舟尊次面重見尊次國常立尊次天鑑尊次天萬尊次珠名杵尊次伊壮大尊次素戔烏尊次天照火神尊次正哉吾勝連日天押穂耳尊次天彦尊次炎尊次彦㶑尊以上凡十三世並都於筑紫日尚向宫彥㶑第四子號神武天皇自筑紫宫大居入和州彊原宫即位元年甲寅當周僖王時次綏靖天皇次安寧天皇次懿徳天皇次孝昭天皇次孝安天皇次孝靈天皇次孝元天皇次開化天皇次崇神天皇次垂仁天皇次景行天皇次城務天皇次仲哀天皇國人言今為鎮國香椎大神次神功天皇開化天皇之曾孫女又謂之息長足姬天皇國人言今為太柰良姬大神次應神天皇始於百濟得中國文字今號八番菩薩有大臣號紀武内年三百七嵗次仁徳天皇次履中天皇次反正天皇次允恭天皇次安康天皇次雄畧天皇次顯宗天皇次仁賢天皇次武烈天皇次繼體天皇次安閑天皇次宣化天皇次天國排開廣庭天皇亦名銘明天皇壬申嵗始傳佛法於百濟國當此梁承聖元年次達海天皇次用名天天皇有子曰聖徳太子年三嵗聞十人語同時觧之七嵗悟佛法於菩提寺講聖鬘經天雨曼陀羅華當此隋開皇中遣使泛海至中國求法華經次崇峻天皇次推古天皇斂明天皇之女也次舒明天皇次皇極天皇次考徳天皇白雉四年律師道照佛法至中國從三嵗僧元重授經律論當此永徽四年也次天豐財重日足姬天皇令僧智通等入唐求大乘法相教當此顯慶三年也次天智天皇次天武天皇次持總天皇次文武天皇大寳三年當此長安元年遣粟田真人入唐求書籍律師道慈求經律次阿閉天皇次販天皇次聖武天皇寳龜元年遣僧正元昉入朝當此開元四年也次孝明天皇武聖天皇之女也天平勝寳四年當此天寳中遣使及僧入唐求内外經教及傳戒次大炊天皇次髙野天皇聖武天皇之女也次白璧天皇遣二僧靈仙行賀入唐禮五臺山學佛法次恒武天皇遣騰元葛野與空海大師及延歴寺僧澄入唐詣天台山傳智者正觀義元和元年也次諾天皇次諾樂天皇次嵯峨天皇次淳和天皇次仁明天皇當此開成會昌中遣僧入唐禮五臺次文徳天皇當此大中年次清和天皇次陽城天皇次光孝天皇遣僧宗睿入唐傳教當此光啟元年也次仁和天皇當此梁龍徳中遣僧寛建等入朝次醍醐天皇次天慶天皇次封上天皇當此周廣順年也次冷泉天皇今為太上天皇次守平天皇即今王也凡六十四世畿内有山城太和河内和泉攝津凡五州共統五十三郡東海道有伊賀伊勢志摩張參河逺江駿河伊豆甲裴相模武藏安房上總常陸凡十四州共統百二十六郡東山道有近江美濃飛驒信濃上野下野陸奥出羽凡八州共統百二十二郡北陸道有若狭越前加賀能登越中越後佐渡凡七州共統三十郡山隂道有丹波丹彼徂馬因幡伯耆出雲石見隐伎凡八州共統五十二郡小陽道有播麽美作備前備後安藝周防長門凡八州共統六十九郡南海道有伊紀淡路河波譛耆伊豫土佐凡六州共統四十八郡西海道有筑前筑後豐前豐後肥後日向大隅薩摩凡九州共統九十三郡又有一伎對馬多褹凡三島各統二郡是謂五畿七道凡三千七百七十二鄉四百一十四驛八十八萬三千三百二十九課丁課丁之外不可詳見皆奝然所記云按隋開皇唐永徽長安天寳元和開成史稱遣使来貢與此所記皆同大中光啟龍徳及周廣順中皆嘗遣僧至中國唐書五代史失其傳唐咸亨中及開元二十三年大歴十二年建中元年皆来朝貢其記不載咸平五年建州海賈周世昌遭風飄至日本凡七年得還與其國人滕木吉至上皆召見之世昌以國人唱和詩来上其詞雕刻膚淺無取後賜装錢遣還景徳元年其國僧寂照八人来朝寂照不暁華言而識文字繕寫甚妙凡問答並以茟札詔號圓通大師賜紫方袍天聖四年明州言日本國太寧府遣人貢方物而不持本國表詔却之其後亦未通朝貢南賈時有傳其物貨至中國者熙寧五年有僧誠尋至台州止天台國清寺願留州以聞詔使赴闕誠尋獻銀香爐木槵子白琉璃五香水精紫檀琥珀所飾念珠及青色織物綾神宗以其逺人而有戒業處之開寳寺盡賜同来僧紫方袍是後連貢方物而来者皆僧也元豐元年使通事僧仲囘来賜號慕化懷徳大師明州又言得其國太宰府牒因使人孫忠還遣仲囘等貢色叚二百疋水銀五千兩州以孫忠乃泛海商客而貢禮與諸國異請自移牒報而答其物直付仲囘東歸從之乾道五年附明州綱首進貢方物淳熙三年其國人泛海遭風飄至明州無口食詔給之又有百人行丐於市至臨安詔守臣支給津遣徃明州飬贍候有便船𤼵囘本國十年七十三人飄至秀州華亭紹熙元年飄至泰州詔見行貨物免抽買船隻物件盡數給還仍給常平米賑恤慶元六年至平江嘉泰二年至定海縣詔並支給錢米飬贍候風便津𤼵囘國按倭人自後漢始通中國史稱從帶方至倭國循海水行歴朝鮮國乍南乍東渡三海歴七國凡一萬二千里然後至其國都又言去樂浪郡境及帶方郡並一萬二千里在會稽東與儋耳相近其地去遼東甚逺而去閩浙甚邇其初通中國也實自遼東而来故其迂囘如此至六朝及宋則多從南道浮海入貢及通互市之類而不自北方則以遼東非中國土地故也三朝志雍熙中僧奝然入貢歸國後奉表来謝敘其来則曰望落日而西行十萬里之波濤難盡顧信風而東别數千重之山岳易過何其遠也叙其歸則曰季夏解台州之䌫孟秋達本國之郊又何其近也而繼之曰爰逮明春初到舊邑緇素欣待侯伯慕迎然則其國境雖去浙東甚近而其國都則又必半年而後達歟文獻通考卷三百二十四
