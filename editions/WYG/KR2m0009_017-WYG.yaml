body:
  text: 文獻通考卷十七鄱陽馬端臨貴與著征𣙜考四𣙜酤禁酒酒誥文王誥教小子有正有事無彛酒越庶國飲惟祀德將無醉矧汝剛制于酒厥或告曰羣飲汝勿佚盡執拘以歸于周予其殺又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之東坡蘇氏曰自漢武帝以來至於今皆有酒禁刑者有至流賞或不貲未嘗少縱而私釀終不能絶周公獨何以能禁之曰周公無所利於酒也以正民德而已甲乙皆笞其子甲之子服乙之子不服何也甲笞其子而責之學乙笞其子而奪之食此周公之所以能禁酒也周官萍氏掌幾酒謹酒幾者幾察酤賣過多及非時者謹者使民節用而無􅃔也漢文帝即位賜民餔五日餔布也王德布於天下合聚飲食為餔漢興有酒酤酤禁其律三人以上無故羣飲酒罰金四兩十六年九月令天下大餔後元年詔戒為酒醪以靡榖景帝中元三年夏旱禁酤酒後元年夏大酺民得酤酒武帝天漢三年初𣙜酒酤昭帝元始二年二月詔有司問郡國所舉賢良文學民所疾苦乃罷𣙜酤官從賢良文學之議也令民得以律占租賣酒升四錢顔氏曰占謂自隠度其實定其辭也武帝時賦斂煩多律外而取今始復舊公非劉氏曰罷酤占租賣酒錢共是一事以律占租者謂令民賣酒以所得利占而輸其租矣占不以實則論如律也租即賣酒之稅也賣酒升四錢所以限民不得厚利爾王子侯表旁光侯殷坐貸子錢不占租皆免侯義與此占租同先公曰按租字古時恐以為錢貨所直之名如食貨志賈誼諫法使天下公得僱租鑄錢顔注僱傭之直或租其本是也王莽簒漢始立法官自釀酒賣之羲和魯􅋌言山澤鹽鐵錢布帛五均賒貨斡在縣官唯酒酤乃獨未斡詩曰無酒酤我而論語曰酤酒不食二者非相反也夫詩據承平之時酒酤在官和㫖便人可以相御也論語孔子當周衰亂酒酤在民薄惡不誠是以疑而勿食今絶天下之酒則無以行禮相養放而亡限則費財傷民請法古令官作酒以二千五百石為一均率開一盧以賣如淳曰盧肆地臣瓚曰盧酒甕也師古曰盧者賣酒之區也以其一邊高形如鍜家盧故取名耳讐五十釀為凖一釀用麤米二斛麴一斛得成酒六斛六斗各以其市月朔米麴三斛并計其賈而參分之以其一為酒一斛之平除米麴本賈計其利而什分之以其七入官其及糟酨灰炭酨酢漿也才代反給工器薪樵之費羲和置命士督五均六斡郡有數人皆用富賈洛陽薛子仲張長叔臨菑姓偉等姓姓名偉也乗傳求利交錯天下因與郡縣通姦多張空簿府蔵不實百姓愈病莽知民苦之復下詔曰夫鹽食肴之將酒百藥之長嘉㑹之好鐵用農之本名山大澤饒衍之蔵五均賒貸百姓所取平卬以給贍鐡布銅冶通行有無備民用也此六者非編户齊民所能家作必卬於市雖貴數倍不得不買豪民富賈即要貧弱先聖知其然故斡之每一斡為設科條防禁犯者罪至死姦吏猾民並侵衆庶各不安生東漢和帝永元十六年詔兗豫徐冀四州雨多傷稼禁酤酒順帝漢安二年禁酒桓帝永興二年以旱蝗饑饉禁郡國不得賣酒祠祀裁足漢末曹操表奏酒禁孔融爭之趙石勒以民始復業資儲未豐重制禁釀行之數年無復釀者致堂胡氏曰用兵以食為尤急故禁酒為其糜米榖也而後世當尚武之時取利於酒奪民酤而𣙜之官比承平時責利加倍而軍屯所在又許之置塲自釀爭多競勝謂足以充軍費省民力豈古今世變之異歟不然何曹操石勒能行之而後之君子不能也宋文帝時揚州大水主簿沈亮建議禁酒從之後魏明帝正光後國用不足有司奏斷百官常給之酒計一嵗所省米五萬三千五十四斛九斗蘖榖五千九百六十斛麴三十萬五百九十九斤其四時郊廟百神群祀依式供營逺蕃客使不在斷限陳文帝時虞荔以國用不足奏立𣙜酤之科天嘉二年從之隋文帝開皇三年先時尚依周末之弊官置酒坊收利至是罷酒坊與百姓共之唐初無酒禁乾元元年京師酒貴肅宗以廩食方屈乃禁京城酤酒期以麥熟如初二年饑復禁酤非光祿祭祀燕蕃客不御酒代宗廣德二年􅃯天下州各量定酤酒户隨月納稅此外不問公私一切禁斷大厯六年量定三等逐月稅錢並充布絹進奉德宗建中元年罷酒稅三年復制禁人酤酒官自置店酤收利以助軍費斛收直三十州縣總領漓薄私釀者論其罪尋以京師四方所湊罷𣙜致堂胡氏曰善政建於古聖王者後世鮮克遵之以謂時異事殊不可膠柱而調瑟也不善之政興於聚斂之臣者後世多不肯改以為强兵足用不可既有而棄之也𣙜酒茗算舟車筦山澤古聖王所不為而後世以為大利之源置官立法防之嚴取之悉甚於常賦一有廢弛立見闕匱不知三代之天下亦後世之天下亦廩官吏亦用軍旅亦賑水旱亦交四夷所仰者獨貢助什一而足是何道也故取之有制用之有節量入以為出無侈靡妄費則貢物什一不啻足矣費出無涯征求無藝貢助常法所不能支則必𣙜之又𣙜算之又算筦之又筦稱貸於富家稅陌於大旅多至於倍蓰加至於什百於是財竭下叛并國而失之是故知治體者欲罷官𣙜酒使民自為之而量取其利雖未盡合古制亦裕民去奢之漸也德宗盡罷之善矣已而牟利最急故知盡罷之未若勿𣙜而以予民之為善也貞元二年復禁京城畿縣酒天下置肆以酤者每斗𣙜百五十錢其酒户與免雜差役獨淮南忠武宣武河東𣙜麴而已按昔人舉杜子美詩以為唐酒價每斗為錢三百今𣙜百五十錢則輸其半於官矣憲宗元和六年京兆府奏𣙜酒錢除出正酒户外一切隨兩稅青苖錢據貫均率從之十二年户部奏准􅃯文如配户出𣙜酒錢處即不得更置官店𣙜酤其中或恐諸州府先有不配户出錢者即須𣙜酤請委州府長官據當處錢額約米麴時價收利應額足即止太和八年遂罷京師𣙜酤凡天下𣙜酒為錢百五十六萬餘緡而釀費居三之一貧户逃酤不在焉㑹昌六年勅揚州等八道州府置𣙜麴并置官店酤酒代百姓納𣙜酒錢并充資助軍用各有權許限揚州陳許汴州襄州河東五處𣙜麴浙西浙東鄂岳三處置官店酤酒如聞禁止私酤官司過為嚴酷一人違犯連累數家閭里之間不免咨怨宜從今以後如有百姓私酤及置私麴者但許罪止一身同謀容縱任據罪處分鄉井之内如有不知情並不得追擾兼不得沒入家産昭宗世以用度不足易京畿邊鎮麴法後𣙜酒以贍軍鳯翔節度使李茂貞方顓其利按兵請入奏利害天子遽罷之梁開平三年􅃯聽諸道州府百姓自造麴官中不禁後唐天成三年􅃯三京鄴諸道州府鄉村人户自今年七月後於夏秋田苖上每畝納麴錢五文足陌一任百姓造麴醞酒供家其錢隨夏秋徵納並不折色其京都及諸道州府縣鎮坊界及關城草市内應逐年買官麴酒户便許自造麴醞酒貨賣仍取天成二年正月至年終一年逐月計算都買麴錢數内十分祗納二分以充𣙜酒錢便從今年七月後管數徵納𣙜酒户外其餘諸色人亦許私造酒麴供家即不得衷私賣酒如有故違便仰糾察勒依中等酒户納𣙜其村坊一任沽賣不在納𣙜之限吳氏能改齋謾錄曰今之秋苖有麴脚錢之𩔖此事起於五代後唐當時雖納麴錢而民間却許自賣酒時移事變麴錢之額遂為定制而民間則禁私酤矣長興元年赦節文人户秋苖一畝元徵麴錢五文今後特放三文止徵二文二年放麴錢官中自造麴逐年減舊價一半於在城貨賣除在城居人不得私造外鄉村人户或要供家一任私造令下人甚便之其年七月以課額不迨准前禁鄉村百姓造麴其已造到者令納官量支還麥本周顯德四年勅停罷先置賣麴都務應鄉村人户今後並許自造米醋及買糟造醋供食仍許於本州縣界就精美處酤賣其酒麴條法依舊施行先是晉漢以來諸道州府皆權計麴額置都務以沽酒民間酒醋例皆漓薄上知其弊故命改法吳氏能改齋謾錄曰魏名臣傳中書監劉放曰官販苦酒與百姓爭錐刀之末請停之苦酒蓋醋也醋之有𣙜自魏已然乃知不特近世也宋朝之制三京官造麴聽民納直諸州城内皆置務釀之縣鎮鄉閭或許民釀而定其嵗課若有遺利則所在皆請官酤陳滑蔡潁隨郢鄧金房州信陽軍舊皆不禁太平興國初京西轉運使程能請𣙜之乃置官吏局署取民租米麥給釀以官錢市樵薪及吏工俸料嵗計獲利無幾而主吏規其盈羡又醞齊不良酒多漓壞至課民婚葬量户大小令酤民甚苦之嵗儉物貴殆不償其費太宗知其弊淳化五年詔募民自釀輸官錢減常課三之二使易辦民有應募者檢視其資産長吏及大姓共保之後課不登則均償之是嵗取諸州嵗課錢少者四百七十二處募民自酤或官賣麴收其直其後民應募者寡猶多官釀陜西雖𣙜酤而尚多遺利度支員外郎李士衡請增課以助邊費乃嵗增十一萬餘貫兩淛舊制募民掌𣙜雍熙初以民多私釀乃蠲其禁其𣙜酤嵗課如麴錢之制附兩稅均率雍熙二年詔杭州更𣙜法以來城郭富豪之家坐收酤醞之利鄉村貧弱之户例納配率之錢非便可仍依江南例官造酒減價酤賣其所均錢並罷納天禧四年轉運使方仲荀言本道酒課舊額十四萬遺利尚多乃嵗增課九萬八十貫川陜承偽制賣麴價重開寶二年詔減十之二既而頗興𣙜酤言事者多以為非便乃罷之仍舊賣麴太宗皇帝太平興國元年詔先是募民掌茶鹽𣙜酤民多增常數求掌以規利嵗或荒儉商旅不行致虧常課多籍沒家財以償甚乖仁恕之道今後宜並以開寶八年額為定不得復增真宗景德四年詔曰𣙜酤之法素有定規宜令計司立為永式自今中外不得復議增課以圖恩奬時承平日久掌財賦者法禁愈密悉籠取遺利凡較課以祖額前界遞年相參景德初𣙜務連嵗有羡三司即取多收者為額上以其不俟朝㫖或致掊克乃詔增額皆奏裁至道二年兩京諸州收𣙜課銅錢一百二十一萬四千餘貫鐵錢一百五十六萬五千餘貫京城賣麴錢四十八萬餘貫天禧末𣙜課銅錢增七百七十九萬六千餘貫鐵錢增一百三十五萬四千餘貫賣麴增三十九萬一千餘貫漢初犯私麴者並棄市周祖始令至五觔死建隆二年四月以周法太峻令民犯私麴者至十五觔以私酒入城至三斗者始處極典其餘論罪有差私市酒麴者減造者罪之半三年三月再下酒麴之禁凡私造差定其罪城郭二十觔鄉閭三十觔棄市民敢持私酒入京城五十里西京及諸州城二十里者至五斗死所定里數外有官署酤酒而私酒入其地一石棄市乾德四年詔比建隆之禁第減之凡至城郭五十觔以上鄉閭一百觔以上私酒入禁地二石三石以上至有官署處四石五石以上者乃死法益輕而犯者鮮矣熙寧十年以前天下諸州酒課嵗額四十萬貫以上東京成都二十八務三十萬貫以上開封三十五務秦十八務杭十務二十萬貫以上京兆二十三務延十二務鳳翔二十五務渭十三務蘇七務十萬貫以上西京二十三務北京二十七務齊二十六務鄆十一務徐七務許十三務滄二十三務真定八務定六務華十務慶十三務鎮戎六務太原十一務亳十二務鄜六務宿十三務楚五務泗七務真八務越十務湖六務婺九務秀十七務江寧六務常九務江陵十五務綿十四務漢十九務邛十九務果二務梓十八務閬四十二務五萬貫以上南京九務青十務密五務萊四務淄七務淮陽四務兖九務濟六務單四務濮七務襄八務鄧八務孟五務蔡二十二務陳六務潁七務鄭八務澶九務冀十四務瀛七務博十四務棣十三務德十六務恩十一務濵八務相七務邢十二務洺十一務深五務趙七務河中七務陜十五務同十一務耀五務邠五務寧八務環二十五務保安二務涇六務隴十務階六務德順通逺晉十二務儀七務絳八務隰八務汾四務揚九務泰八務夀十六務廬三務舒十九務無為十務潤六務明五務溫七務台八務衢四務睦七務宣七務信八務潭八務鄂八務鼎五務眉十六務蜀八務彭八務嘉三務遂四務合九務興元三十六務建十三務五萬貫以下沂六務濰三務曹四務光化一務汝十務滑四務永靜六務懷十務磁十二務衞五務祁三務保一務通利六務解四務虢六務商八務坊四務鳳五務岷乾七務忻二務嵐四務保德一務岢嵐一務石二務海四務通四務蘄八務和五務光七務黄八務漣水一務高郵三務太平六務江六務洪七務饒九頭在城德五縣利石景興興國三務安五務澧二務岳四務簡十五務資十六務懷安十二務劍三務三萬貫以下廣濟一務隨二務金一務均三務郢三務唐五務鄚四務雄一務乾寧二務㶚四務安肅一務永寧二務廣信一務順安一務丹三務北平一務熙一務成三務潞十務府一務代七務威勝軍八務平定軍四務澤五務憲一務慈三務遼三務滁六務濠七務處八務歙六務南康四務廣德二務䖍十三務池六務撫一務筠一務臨江三務建昌三務衡六務漢陽三務陵井監二十務永康八務荆門一務昌四務普四十三務榮六務渠一務廣安三務利六務南劍十五務三泉一務蓬七務興一務洋五務一萬貫以下登二務信陽二務信安一務保定一務房三務慶成三務寧化軍一務南安二務吉九務袁四務永三務邵二務峽一務歸一務雅七務瀘一務巴十四務邵武四務文一務五千貫以下原十一務開寶監火山軍一務道一務郴一務全一務桂陽六務戎三務富順監一務龍三務集二務壁三務大寧監一務渝四務萬一務忠一務無定額萊蕪監利國監河康定軍沙苑監太平監司竹監大通監麟豐永平監辰沅淯州監黎茂威劍門關無𣙜夔黔達開施涪雲安梁山福汀泉漳興化廣南東西兩路州軍右會要所載熙寧以前天下酒課嵗額以大數為之第等如此内大郡課多者除錢之外又有總絹布之𩔖不悉錄止齋陳氏曰國初諸路未盡禁酒吳越之禁自錢氏始而京西禁始太平興國二年閩廣至今無禁大抵祖宗條約酒課大為之防淳化四年十二月十四日􅃯令諸州以茶鹽酒稅課利送納軍資府於是稍嚴密矣咸平四年五月四日􅃯諸州麴務自今後將一年都收到錢仍取端拱至淳化元年三年内中等錢數立為祖額比較科罰則酒課立額自此始然則蔵之州縣而已慶厯二年閏九月二十四日初收增添鹽酒課利錢嵗三十七萬四千一百三十餘貫上京則酒課上供始於此從王琪之請也今户部所謂王福部一文添酒錢是也熙寧五年正月四日令官務每升添一文不入係省文帳增收添酒錢始於此則熙寧添酒錢也崇寧二年十月八日令官監酒務上色每升添二文中下一文以其錢贍學四年十月量添二色酒價錢上色升五文次三文以其錢贍學則崇寧贍學添酒錢也五年二月四日罷贍學添酒錢政和五年十二月十一日令諸路依山東酒價升添二文六分入無額上供起發則政和添酒錢也建炎四年十一月十二日曾紆申請權添酒錢每升上色四十二文次色十八文以其錢一分州用一分充漕計一分提刑司樁管則建炎添酒錢也紹興元年五月六日令諸州軍賣酒虧折本錢隨宜增價不以多寡一分州用一分漕計一分𨽻經制前此酒有定價每添一文皆起請後行之至是州郡始自增酒價而價不等矣十二月十八日令添酒錢每升上色二十文下色十文一半提刑司樁管一半州用三年四月八日令煮酒量添三十文作一百五十文足以其錢起發五年閏二月二十三日置總制司六月五日令州縣見賣酒務不以上下每升各增五文𨽻總制而總制錢始於此六年二月二十二日令賣煮酒權增升十文以四文州用六文令項樁管贍軍是為六文煮酒錢七年正月二十二日令諸州增置户部贍軍酒庫一所以其息錢三分留本州充本餘錢應副大軍月樁無月樁處起發是為七分酒息錢八年六月十日令兩浙諸路煮酒增添十文足并蠟蒸酒增添五文足内六文𨽻總制九年七月二十九日以都督府申請權添煮酒一十文内四文本州糜費六文三省樞密院樁管激賞庫拘收是為六分煮酒錢而又有發運司造舡添酒錢每升上色三文次二文提舉司量添酒錢不以上下色升一文蓋不知所始紹興十一年二月八日并為七色酒錢𨽻經制而坊場名課亦數增長與蜀之折估不與焉則紹興添酒錢也酒政之為民害至此極矣不可不稍寛也仁宗時河北酒稅務有監臨官而轉運司復遣官比視嵗課寖以侵民詔禁之既而又請場務嵗課三千緡以上者以使臣監臨帝曰嵗入不多而增官得無擾乎乃詔嵗課倍其數乃增使臣時天下茶鹽酒稅嵗課有比年不登者詔取一嵗中數别為額後雖羡溢勿復增嘉祐初又詔酒稅場務毋得抑配人户苛阻商旅求羡餘以希賞乾興初言者謂天下酒課月比嵗增無有藝極非古者禁羣飲教節用之義遂詔鄉村毋得增置酒場已募民主之者期三年他人雖欲增課以售弗聽主者欲自增課委官吏度異時不致虧負然後上聞既而御史中丞晏殊請酒場利薄者悉禁增課從之初酒場嵗課不登州縣多責衙前或五保輸錢以充其數嘉祐治平中數戒止之又詔蠲京師酒户所負麴錢十六萬緡皇祐中酒麴嵗課合緡錢一千四百九十八萬六千一百九十六至治平中減二百一十二萬三千七百三而皇祐中又入金帛絲纊芻粟材木之𩔖總其數四萬七百六十治平中乃增一百九十九萬一千九百七十五云英宗治平四年詔江南近復村酒場抑民市酒者罷之神宗熙寧四年三司承買酒麴坊場錢率千錢稅五十儲之以祿吏七年諸郡舊不釀酒者許以公使錢釀之率百緡為一石溢額者論以違制律崇寧二年知漣水軍錢景允言建立學舍請以承買醋坊錢給用詔常平司計其無害公費乃如所請仍令他路凖行之先是元祐初臣僚請罷𣙜醋而户部以為本無禁文命加約束至紹聖二年翟思請諸郡醋坊日息用度之餘悉歸之常平以待他用及是景允有請故令常平司計之宣和六年户部奏諸路增酒錢請如元豐法悉充上供為户部用毋以入漕司從之高宗建炎三年張浚用趙開總領四川財賦開言蜀民已困惟𣙜酤尚有贏餘遂大變酒法自成都始先罷公帑賣供給酒即舊撲賣坊場所置隔釀設官主之民以米赴官自釀每斛輸錢三十頭子錢二十二明年徧其法於四路於是嵗遞增至六百九十餘萬貫凡官槽四百所私店不與焉於是東南之酒額亦日增矣四川制置使胡世將即成都潼川府資普州廣安軍創清酒務許人户買撲分認嵗課為錢四萬八千餘緡自趙開行隔槽法所增至十四萬六千餘緡紹興元年額及世將改官監所入又倍自後累增至五十四萬八千餘緡紹興二十五年額而外邑及民户坊場又為三十九萬緡淳熙二年額然隔槽之法始行聽民就務分槽醖賣官計所入之米而取其課若未病也行之既久醖賣虧欠則責入米之家認定月額不復𣙜其米而第取其錢民始病矣中興後增添酒價錢入漕計及總制司本末見前止齋論紹興十三年詔淮東總所酒止於元置州軍淮西總所止於建康揚州止於本州不於别州縣村鎮添置其有添置及諸軍開沽並與停閉十五年罷䕫路酒禁䕫舊無酒禁為場店一百四十餘所建炎末增至六百餘所約增額錢四萬二千九百餘貫然土荒人少不以為便至是宣撫司與轉運司對數補填遂弛其禁十二月詔南北十一庫並𨽻左右司充贍軍激賞酒庫二十一年詔諸軍買撲酒坊特許依舊監官賞格四萬三萬貫以上場務增及一倍減一年磨勘以下者遞賞有差乾道間又詔諸酒庫除本任旬發窠名錢外能補納前官拖欠者各有賞勸又詔十萬貫以上場務酒官任滿與減四年磨勘餘等第推賞有差二十五年罷逐路漕司寄造酒以侍御史湯鵬舉言諸州縣寄造不支本錢專用耗米始於李椿年甚於曹泳故也三十年以檢㸃措置贍軍酒庫改𨽻户部既而户部侍郎邵大受等言嵗計頼經總制窠名至多今諸路嵗虧二百萬皆緣諸州公使庫廣行造酒别置店沽賣以致酒務例皆敗壞乃詔户部行下提刑司檢察諸州將違法酒店日下住罷其諸州别置酒庫如軍糧酒庫防樁庫月樁庫之𩔖并省務寄酒及帥司激賞酒庫應未分𨽻經制錢去處並日下立額分𨽻補趂虧額三十一年殿帥趙宻以諸軍酒坊六十六歸之户部又見九年同安郡王楊存中罷殿帥復以私家撲酒坊九處上之嵗通收息六十萬緡有奇以十分為率七分起赴行在三分應副漕計蓋自軍興以來諸帥擅𣙜酤之利由是縣官始得資之以佐經費焉乾道元年以浙東西六十四所撥付三衙分認課額嵗付左蔵南庫輸餘錢充贍軍器等用五年三衙以酒庫還之户部孝宗隆興二年右正言鼂公武言私酒私麴有禁法也未聞有犯糯米之罰者乞行禁止二年臣僚言贑州并福建廣南等處以煙瘴之地許民間自造酒服藥小民無力醖造𣙜酤之利盡歸豪户乞將所造酒經官稅畢然後出賣其稅錢樁發行在從之八年詳定􅃯令所以知常德府劉邦翰言湖北之民困於酒坊至貧之家不捐萬錢則不能舉一吉凶之禮乞將課額令民隨産業均納其醖造酤賣聽民便然以酒課均分民間即是兩稅之外别生一稅他日漁利之臣仍舊酤𣙜而此稅不除反為民害乃檢乾道重修􅃯令禁止抑買淳熙三年詔減四川酒課錢四十七萬三千五百餘貫令禮部給降度牒六百六十一道補還今嵗減數自來年以後於四川合應副湖廣總所錢内截上件錢補足從制使范成大之請也七年從右正言葛邲之請詔民間買撲酒坊一界既滿無人承買雖欲還官而官司不受無以償還虚受刑責仰諸路提刑司委官體究蠲放八年兵部侍郎芮輝言潭州自紹興初劇盗馬友行稅酒法一方便之於官無費嵗得錢十四五萬緡昨守臣辛棄疾變𣙜酒人多移徙乞依舊法按𣙜酒之課額既重官自醖造則不免高價抑勒人户沽買欲以課額隨民均配而縱其自釀則又是兩稅之外别生一稅他日必有稅不除而再𣙜酒之事惟有於要閙坊場之地聽民醖造納稅之後從便酤賣實為公私兩利但恐各處先立定高大之額則所收稅未必能及額耳縣官惟務𣙜利而便民之事乃愧於一劇盗何邪建炎以來朝野雜錄曰舊兩浙坊場一千三百三十四嵗收凈利錢八十四萬緡至是合江浙荆湖人户撲買坊場一百二十七萬緡而已蓋自紹興初槩增五分之後坊場敗闕者衆故也水心葉氏平陽縣代納坊場錢記曰自前世鄉村以分地撲酒有課利買名淨利錢恣民增錢奪買或賣不及則為敗缺而當停閉雖當停閉而錢自若官督輸不貸民無高下枚户而償雖良吏善政莫能救也嘉定二年浙東提舉司言溫州平陽縣言縣之鄉村坊店二十五當停閉二十一有坊店之名而無其處舊傳自宣和時則然錢之以貫數二千六百七十三州下青冊於縣月取嵗足無敢蹉跌保正賦飲户不實杯盂之酤罌缶之釀强家幸免浮細受害窮山入雲絶少醉者鬻樵雇薪抑配白納而永嘉至有算畝而起反過正稅斯又甚矣且縣人無沈湎之失而受敗缺之咎十百零細承催乾沒闗門逃避攘及鍋釜子孫不息愁苦不止惟垂裁哀頗加救助伏見近造偽會子抵罪者所籍之田及餘廢寺亦有殘田謂宜賜縣就用本利足以相直補青冊之缺釋飲户之負不勝大願於是朝廷惻然許之命既布一縣無不歌舞贊歎以紀上恩夫坊場之有敗缺州縣通患也今平陽獨以使者一言去百年之疾然則昔所謂莫能救者豈未之思歟某聞仁人視民如子知其痛毒若身嘗之審擇其利常與事稱療之有方予之有名不以高論廢務不以空意妨實然後舉措可明於朝廷而惠澤可出於君上此其所以法不弊而民不窮也按水心此記足以盡當時坊場之弊祖宗之法撲買坊場本以酬奬役人官不私其利又禁增價攙撲恐其以逋負破家皆愛民之良法也流傳既久官既自取其錢而敗闕停閉者額不復蠲責之州縣至令其别求課利以對補之而後從則凋弊之州縣他無利孔而有敗闕之坊場者受困多矣文獻通考卷十七
