body:
  text: 文獻通考卷三十一鄱陽馬端臨貴與著選舉考四舉士仁宗天聖二年賜舉人宋郊葉清臣鄭戬以下及諸科凡四百八十餘人及第出身有差先是上封事者言經學未究經㫖乞於本科問䇿一道對者紕繆上以執經肄業不善為文特命取其所長用廣仕路並不黜落國朝以策擢高第者自清臣始郊與弟祁俱以詞賦得名時奏祁第一太后不欲弟先兄乃擢郊第一祁第十時天下登第者不數年輒赫然顯貴取士之路可謂盛矣雖耄鈍之士數詘於試後多收入仕版謂之特奏名至或因循不學欲積舉以應令乃詔曰學猶殖也不殖將落遜志務時敏厥修乃來朕慮天下之士或有遺也既已臨軒較得失而憂其屢不中科則衰邁而無所成退不能返其里閭而進不得預於禄仕故常數之外特為之甄采而狃於寛㤙遂隳素業頹弛茍簡寖以成風甚可耻也自今宜篤進厥學無習僥倖焉景祐初詔曰鄉學之士益蕃而取人路狹使孤寒棲遲或老而不得進朕甚閔之其令南省就試進士諸科十取其二進士五舉年五十諸科六舉年六十嘗經殿試進士三舉諸科五舉及嘗預先朝御試雖試文不合格毋輒黜皆以名聞自此率以為常石林葉氏曰唐禮部試詩賦題不皆有所出或自以意為之故舉子皆得進問題意謂之上請本朝既増殿試天子親御殿進士猶循禮部故事景祐中稍厭其煩瀆始詔御藥院具試題書經史所出模印給之遂罷上請之制王氏揮麈録曰韓忠獻億景祐中参仁宗政事天下稱為長者四子仲文綜子華絳持國維玉汝縝俱禮部奏名忠獻啓上曰臣子叨陛下科第雖非有司觀望然臣既備位政府豈當受而有之天下将以為由臣致此臣雖不足道使聖明之政人或議之非臣所安也臣敎子既已有成又何必昭示四方以為榮觀哉乞盡免殿試唱第幸甚誠懇再三上嘉歎而允所請忠獻既薨仲文子華玉汝相繼再中甲科獨持國曰吾前已奏名矣當遵家君之言何必布之遠方邪不復更就有司之求故文潞公薦持國疏云曽預南宫髙薦自後不出仕宦其後仲文知制誥子華玉汝皆登宰席持國賜出身至門下侍郎為本朝之甲族云按嘉祐二年御試方令禮部所奏進士俱免黜落知以前盖有過省而殿試不中者矣故韓忠獻諸子仲文子華玉汝必再中甲科而後可以言登第若嘉祐二年以後則凡預禮部正奏名皆為有出身之人矣四年賈昌朝言有親戚事本州及或為發解官及侍父祖遠宦距本州二千里宜敇轉運司選官𩔖試以十率之取三人詔近臣議而丁度等謂舊制限十月二十五日上名於省幾二千里而赴試或有不及願寛其期一月聽如昌朝説由是諸路始有别頭試其年詔開封府國子監及别頭試封彌謄錄如禮部寶元中李淑侍經筵帝訪以進士詩賦策論先後俾以故事對淑退而上奏曰唐調露二年劉思立為考功員外郎以進士止試策滅裂不盡其學請帖經以觀其學試雜文以觀其才自此沿以為常至永隆二年進士試雜文二篇通文律者始試策天寶十一載進士試一大經能通者試文賦又通而後試策五條皆通為中第建中二年趙贊請試以時務策五篇箴論表贊各一篇以代詩賦太和三年試帖經畧問大義取精通者次試論議各一篇八年禮部試以帖經口義次試策五篇問經義者三問時務者二厥後變易遂以詩賦為第一塲論第二塲策第三塲帖經第四塲今陛下欲求理道而不以雕篆為貴得取士之實矣然考官以所試分考不能通加評校而毎塲輒退落士之中否特繫於幸不幸願約舊制先策次論次賦及詩次帖經墨義而敇有司併試四塲通較工拙毋以一塲得失為去留詔有司議稍施行焉慶歴四年臣僚上言改更貢舉進士所試詩賦策論先後詔下兩制詳議知諫院歐陽脩言凡貢舉舊法若二千人就試常額不過選五百人毎年到省就試及取人之數大約不過此是於詩賦策論六千卷中毎一人三卷選五百人而日限又廹使考試之官殆廢寢食疲心竭慮因勞致昏故雖有公心而所選多濫此舊法之弊也今臣所請者寛其日限而先試以策而考之擇其文辭鄙惡者文意顛倒重雜者不識題㫖不知故實畧而不對所問者限以事件若干以上誤引事跡者亦限件數雖能成文而理識乖誕者雜犯舊格不考式者凡此七等之人先去之計於二千人可去五六百以其留者次試以論又如前法而考之又可去其二三百其留而試詩賦者不過千人矣於千人而選五百則少而易考不至勞昏考而精當則盡善矣縱使考之不精亦選者不至大濫葢其節抄剽盜之人皆以先經策論去之矣策論逐塲旋考則卷子不多考官不至勞昏去留必不誤比及詩賦皆是已經策論粗有學問理識不至乖誕之人縱使詩賦不工亦可以中選矣如此可使童年新學全不曉事之人無由而進此臣所謂變法必須隨塲去留然後可革舊弊者也其外州解送到且當博採祗可盡令試策要在南省精選若省榜奏人至精則殿試易為考矣故臣但言南省之法此其大槩也其髙下之等仍乞細加詳定大槩當以策論為先按詩賦不過工浮詞論策可以驗實學此正理也今觀歐公所陳欲先考論策後考詩賦盖欲以論策驗其能否而以詩賦定其優劣是以粗淺視論策而以精深視詩賦矣盖塲屋之文論策則蹈襲套括故汗漫難慿詩賦則拘以聲病對偶故工拙易見其有奥學雄文能以論策自見者十無一二而紛紛鵠袍之士固有頭塲號為精工而論策一無可採者盖自慶歴以來塲屋之弊已如此不特後來為然也故歐公之言欲先試論策擇其十分亂道者先澄汰之不特使之稍務實學且使司衡鑑者所考少則易精又既工論策則不患其不長於詩賦縱詩賦不工而所取亦不害為博古通經之士矣又按祖宗以來試進士皆以詩賦論各一首除制科外未嘗試策天聖間晏元獻公請依唐明經試策而不從寶元中李淑請并詩賦策論四塲通考詔有司施行不知試策實始於何年當考知制誥富弼言國家沿隋唐設進士科自咸平景徳以來為法尤密踰於前代而得人之道或有未至夫省試有三長殿試有三短主文衡者四五人皆一時詞學之臣而又選館閣才臣數人以助考較復有監守巡察糊名謄録上下相警不容毫釐之私一長也引試凡三日詩賦可以見詞藝論策可以觀才識四方之士得以盡其所藴二長也貢院凡兩月餘研䆒差次可以窮功悉力三長也殿試考官濫取而不擇一短也一日試詩賦論三篇不能盡人之才二短也考校不過十日不暇研䆒差次三短也若曰禮部放榜則權歸有司臨軒唱第則恩出主上則是忘取士之本而務收恩之末也且歴代取士悉委有司獨後漢文吏課牋奏副之端門亦未聞天子親試也至唐武后載初之年始有殿試此何足法哉必慮恩歸有司則宜使禮部次髙下以奏而引諸殿庭唱名賜第則與殿試無所異矣遂詔罷殿試而議者多言其輕上恩隳故事旋復殿試如舊上命侍臣條奏急務參知政事范仲淹等奏列十事其三請精貢舉欲復古興學校取士本行實詔近臣議於是翰林學士宋祁等合奏言今敎不本於學校士不察於鄉里則不能覈名實有司束以聲病學者專於記誦則不足盡人材臣等參考衆説擇其便於今者莫若使士皆土著而敎之於學校則學者修飾矣先策論則文詞者留心於治亂矣簡程式則宏博者得以馳騁矣問大義則執經者不專於記誦矣乃詔州縣立學本道使者選屬部為敎授不足則取於鄉里宿學之有道業者士須在學三百日乃聽預秋賦舊嘗充賦者百日而止試於州者令相保任有匿服犯刑虧行冒名等禁三塲先策次論次詩賦通考為去取而罷帖經墨義士通經術願對大義者試十道可為永式初保寧軍推官胡瑗敎授湖州科條纎悉備具諸生信愛如其子弟至是下湖州取其法著為學令是冬詔罷日限以余靖言廣學舍所以待有志之士去日限所以寛食貧之人或者謂仲淹既去而執政意皆異故有是詔時言初令不便者甚衆以為詩賦聲病易考而策論汗漫難知祖宗以來莫之有改得人常多乃詔一依舊條嘉祐二年親試舉人凡進士與殿試者始皆免黜落時進士益相習為竒僻鈎章棘句寖失渾淳歐陽脩知貢舉尤以為患痛裁抑之仍嚴禁挾書者既而試榜出時所推譽皆不在選澆薄之士侯修晨朝羣聚詆斥之街司邏卒不能止至為祭歐陽修文投其家卒不能求其主名置於法然自是文體亦少變時上書者言四年一貢舉四方士子客京師以待試者恒六七千人一有喧噪其徒衆多勢莫之禁且中下之士往往廢學數年才學之士不幸有故一不應詔沉淪十數年或累舉滯留遂至困窮老且死者甚衆以此毁行冒法干進者不可勝數宜間歲一貢舉中分舊數而薦之王洙侍邇英閣講周禮至三年大比大考州里以贊鄉大夫廢興帝曰古者選士如此今率四五歲一下詔故士有抑而不得進者為今之計孰若裁其數而屢舉也下有司議而議者乃合奏曰臣等謂易以間歲之法無害而有利不足疑也使舉子不幸有疾病喪服之故者不致久沉且程文偶不中選旋亦遇貢舉則無滯才之歎而天下所薦舉數既減半禮部主司易以詳較得士必精矣近年挾書代筆傳義者多因使權貴富豪之子得以濫進葢由人衆有司無繇察若人少則諸偽濫勢自不容使寒苦藝學之人得其塗而進於是下詔間歲貢舉進士諸科悉解舊額之半増設明經試法凡明兩經或三經五經各問大義十條兩經通八三經通六五經通五為合格兼以論語孝經策時務三條出身與進士等而罷説書舉其不還鄉里而寓户他州以應選者嚴其法毎秋賦自縣令佐察行義保任之上於州州長貳復審察得實然後上本道使者𩔖試已保任而後有缺行則州縣皆坐罪若省試而文理紕繆坐元考官時以科舉既數則髙第之人倍衆其擢任恩典宜損於故乃詔曰朕惟國之取士與士之待舉不可曠而冗也故立間歲之期以勵其勤約貢舉之數以精其選著為定式申敇有司而髙第之人日嘗不次而用若循舊比終至濫官甚無謂也自今制科入第三等與進士第一除大理評事簽書兩使幕職官代還陞通判再任滿試館職前此前三名皆為通判其餘以次減降自是驟顯者鮮而所得人材及其風俗比舊亦浸衰容齋洪氏隨筆曰本朝自太平興國以來以科舉羅天下士士之策名前列者或不十年而至公輔呂文穆公䝉正張文定公齊賢之徒是也及嘉祐以前亦指日在清顯東坡送張子平序以謂仁宗一朝十有三榜數其上之三人凡三十有九其不至於公卿者五人而已盖為士者知其身必達故自愛重而不肯為非天下公望亦以鼎貴期之故相與愛惜成就以待其用至嘉祐四年之制前三名始不為通判第一人才得評事簽判代還升通判又任滿始除館職王安石為政又殺其法恩數既削得人衰矣觀天聖初榜宋鄭公郊葉清臣鄭文肅公戬髙文荘公若訥曽魯公公亮五人連名二宰相二執政一三司使第二榜王文忠公堯臣韓魏公琦趙康靖公槩連名第三榜王宣徽拱辰劉相沆孫文懿公抃連名楊寘榜寘不幸即死王岐公珪韓康公絳王荆公安石連名劉煇榜煇不顯胡右丞宗愈安門下燾劉忠肅公摯章申公惇連名其盛如此治平以後第一人作侍從盖可數矣沈氏筆談曰舊制天下貢舉人到闕悉皆入對數不下三千人謂之羣見逺方士皆未知朝廷儀範班列分錯有司不能繩覲見之日先設禁闈於著位之前舉人皆拜於禁闈之外葢欲限其前列也至有更相抱持以望黼坐者有司患之近歲遂止令解頭入見然尚不減數百人嘉祐中予忝在解頭别為一班最在前列目見班中唯從前一兩行稍應拜起之節自餘亦終不成班綴而罷毎為閣門之累常言殿庭中班列不可整齊者唯有三色謂舉人蕃人駱駝又曰禮部貢院試進士設香案於階前主司與舉人對拜此唐故事也所坐設位供張甚盛有司具茶湯飲漿至試學究則悉徹帳幕氈席之𩔖亦無茶湯渴取飲硯水人人皆黔其吻非故欲困之乃防氈席及供應人私傳所試義經葢嘗有敗者故事為之防歐文忠有詩焚香禮進士徹幕待經生以為禮數重輕如此其實自有謂也按沈公所記典故皆源於唐時宋朝因之至嘉祐時猶然後來天下所解進士非中選禮部待對親策之日不得覲清光而禮部試士之時雖無所謂五經學究然其所以待進士者禮亦殺於祖宗之時矣英宗治平三年詔曰先帝以士久不貢怠於學而豪傑者不時舉故下間歲之令而自更法以來其弊寖長里選之牒仍故而郡國之取減半計偕之籍屢上而道塗之勞良苦朕甚閔焉其令禮部三歲一貢舉天下解額於未行間歲之法已前四分取三為率明經諸科不得過進士之數恩典不増而貢舉期緩士得休息官以不煩矣知諫院司馬光上言請貢院逐路取人其畧曰朝廷每次科塲所差試官率皆兩制三館之人其所好尚即成風俗在京舉人追趨時好易知體面淵源漸染文采自工使僻逺孤陋之人與之為敵混同封彌考較長短勢不侔矣孔子曰十室之邑必有忠信如丘者焉言雖㣲陋之處必有賢才不可誣也是以古之取士以郡國户口多少為率或以徳行或以才能隨其所長各有所取近自族姻逺及夷狄無小無大不可遺也今或數路中全無一人及第則所遺多矣國家用人之法非進士及第者不得美官非善為詩賦論策者不得及第非游學京師者不善為詩賦論策以此之故使四方學士皆棄背鄉里違去二親老於京師不復更歸其間亦有身負過惡或隠憂匿服不敢於鄉里取解者往往私買監牒妄冒户貫於京師取解自間歲開塲以來逺方舉人憚於往還只於京師寄應者比舊尤多國家雖重為科禁至於不用䕃贖然冒犯之人歲歲滋甚所以然者葢由毎次科塲及第進士大率皆是國子監開封府解送之人則人之常情誰肯去此而就彼哉夫設美官厚利進取之塗以誘人於前而以苛法空文禁之於後是猶决洪河之尾而捧土以塞之其勢必不行矣參知政事歐陽修上言竊以國家取士之制比於前世最號至公葢累聖留心講求曲盡以謂王者無外天下一家故不問東西南北之人盡聚諸路貢士混合為一而惟才是擇又糊名謄録而考之使主司莫知為何方之人誰氏之子不得有所憎愛厚薄於其間故議者謂國家科塲之制雖未復古法而便於今世其無情如造化至公如權衡祖宗以來不可易之制也傳曰無作聰明亂舊章又曰利不百者不變法今言事之臣偶見一端即議更改此臣所以區區欲為陛下守祖宗之法也臣所謂偶見一端者葢言事之人但見每次科塲東南進士得多而西北進士得少故欲改法使多取西北進士爾殊不知天下至廣四方風俗異宜而人性各有利鈍東南之俗好文故進士多而經學少西北之人尚質故進士少而經學多所以科塲取士東南多取進士西北多取經學者各因其材性所長而各隨其多少取之今以進士經學合而較之則其數均若必論進士則多少不等此臣所謂偏見之一端其不可者一也國家方以官濫為患取士數必難増若欲多取西北之人則却須多減東南之數今東南州軍進士取解者二三千人處只解二三十人是百人取一人葢已痛裁抑之矣西北州軍取解至多處不過百人而所解至十餘人是十人取一人比之東南十倍假借之矣若至南省又減東南而増西北則是已裁抑者又裁抑之已假借者又假借之此其不可者二也東南之士於千人中解十人其初選已精矣故至南省所試合格者多西北之士學業不及東南當發解時又十倍優假之葢其初選已濫矣故至南省所試不合格者多今若一例以十人取一人則東南之人合格而落者多矣西北之人不合格而得者多矣至於他路理不可齊偶有一路合格人多亦限以十一落之偶有一路合格人少亦須充足十一之數使合落者得合得者落取捨顛倒能否混淆其不可者三也且朝廷專以較藝取人而使有藝者屈落無藝者濫得不問繆濫只要諸路數停此其不可者四也且言事者本欲多取諸路土著之人若此法一行則寄應者争趨而往今開封府寄應之弊可驗矣此所謂法出而姦生其不可者五也今廣南東西路進士例各絶無舉業諸州但據數解發其人亦自知無藝只來一就省試而歸冀作攝官爾朝廷以嶺外烟瘴北人不便須藉攝官亦許其如此今若一例與諸路十人取一人此為繆濫又非西北之比此其不可者六也凡此六者乃大槩爾若舊法一壊新議必行則弊濫隨生何可勝數故臣謂且遵舊制但務擇人推朝廷至公待四方如一惟能是選人自無言此乃當今可行之法爾若謂士習浮華當先考行就如新議亦須只考程試安能必取行實之人議者又謂西北近敵士要牢籠此甚不然之論也使不逞之人不能為患則已茍可為患則何方無之前世賊亂之臣起於東南者甚衆其大者如項羽蕭銑之徒是已至如黄巢王仙芝之輩又皆起亂中州者爾不逞之人豈專西北矧貢舉所設本待材賢牢籠不逞當别有術不在科塲也惟事久不能無弊有當留意者然不須更改法制止在振舉綱條爾近年以來舉人盛行懐挾排門大譟免冠突入虧損士風傷敗善𩔖此由舉人既多而君子小人雜聚所司力不能制雖朝廷素有禁約條制甚嚴而上下因循不復申舉惟此一事為科塲大患而言事者獨不及之願下有司議革其弊此當今科塲之患也按分路取人之説司馬歐陽二公之論不同司馬公之意主於均額以息奔競之風歐陽公之意主於覈實以免繆濫之弊要之朝廷既以文藝取人則歐公之説為是葢士既求以用世則奔名逐利所不能免不必深訾至於棄親匿服身負過惡者皆素無行檢之人此曹雖使之生長都城早游館學超取名第亦未必能為君子若以為逺方舉人文詞不能如游學京師者之工易以見遺則如歐曽二蘇公以文章名世詔今傳後然亦出自窮鄉下國未嘗漸染館閣習為時尚科舉之文也而皆占髙第然則必須遊京師而後工文藝者皆剽竊蹈襲之人非頴異挺特之士也神宗熙寧二年議更貢舉法罷詩賦明經諸科以經義論策試進士初王安石以為古之取士俱本於學請興建學校以復古其明經諸科欲行廢罷取元解明經人數増進士額詔兩制兩省待制以上御史三司三館議之韓維請罷詩賦各習大經問大義十道以文解釋不必全記注疏通七以上為合格諸科以大義為先黜其不通者蘇頌欲先士行而後文藝去封彌謄録之法直史館蘇軾上議畧曰得人之道在於知人知人之法在於責實使君相有知人之明朝廷有責實之政則胥吏皂隸未嘗無人而况於學校貢舉乎雖用今之法臣以為有餘使君相無知人之明朝廷無責實之政則公卿侍從常患無人况學校貢舉乎雖復古之制臣以為不足矣夫時有可否物有興廢使三代聖人復生於今其選舉亦必有道何必由學乎且慶歴間嘗立學矣天下以為太平可待至於今惟空名僅存今陛下必欲求徳行道藝之士責九年大成之業則将變今之禮易今之俗又當發民力以治宮室斂民財以養游士置官立師而又時簡不帥敎者屛之逺方徒為紛紛其與慶歴之際何異至於貢舉或曰鄉舉徳行而畧文章或曰專取策論而罷詩賦或欲舉唐故事兼採譽望而罷封彌或欲變經生朴學不用帖墨而考大義此皆知其一未知其二者也夫欲興徳行在於君人者修身以格物審好惡以表俗若欲設科立名以取之則是敎天下相率而為偽也上以孝取人則勇者割股怯者廬墓上以廉取人則敝車羸焉惡衣菲食凡可以中上意者無所不至徳行之弊一至於此自文章言之則策論為有用詩賦為無益自政事言之則詩賦論策均為無用矣雖知其無用然自祖宗以來莫之廢者以為設法取士不過如此也近世文章華麗無如楊億使億尚在則忠清鯁亮之士也通經學古無如孫復石介使復介尚在則迂闊誕謾之士也矧自唐至今以詩賦為名臣者不可勝數何負於天下而必欲廢之上讀軾疏曰吾固疑此今得軾議釋然矣他日以問王安石安石曰不然今人材乏少且其學術不一一人一義十人十義朝廷欲有所為異論紛然莫肯承聽此葢朝廷不能一道徳故也故一道徳則修學校欲修學校則貢舉法不可不變趙抃是軾言安石曰若謂此科嘗多得人自縁仕進别無他路其間不容無賢若謂科法已善則未也今以少壮時正當講求天下正理乃閉門學作詩賦及其入官世事皆所不習此乃科法敗壊人才致不如古於是卒如安石議罷明經及諸科進士罷詩賦各占治詩書易周禮禮記一經兼以論語孟子毎試四塲初大經次兼經大義凡十道次論一首次策三道禮部試即増二道中書撰大義式頒行試義者須通經有文采乃為中格不但如明經墨義粗解章句而已取諸科解名十分之三増進士額諸科如許用舊業一試後非嘗應諸科人毋得創以諸科求試其京東西陜西河北河東五路之創試進士者及府監他路之舍諸科而為進士者乃得用所増之額以試皆别為一號考取葢欲優其業使不至外侵則常向慕改業也按科舉不足以盡取人之法然自隋唐以來入官者皆以是為進身之階及其人之賢否則初不緣此桞子厚送崔符序言今世尚進士故天下舉歸之而更其科以為得異人乎無也惟其所尚又舉而從之尚之以孝弟孝弟猶是人也尚之以經術經術猶是人也姚康撰科第錄序言以顔孔為心者雖日視淫靡莫能遷其操以桀跖為行者雖日聞仁義莫能治其性若膺鄉舉里選亦此流也若捜茂材異行亦此流也則何必目秀才為樸名進士為薄邪葢唐人已有此論即坡公之意也但變聲律為議論變墨義為大義則於學者不為無補然介甫之所謂一道徳者乃是欲以其學使天下比而同之以取科第夫其書縱盡善無可議然使學者以干利之故皓首專門雷同蹈襲不得盡其博學詳説之功而稍求深造自得之趣則其拘牽淺陋去墨義無幾矣况所著未必盡善乎至所謂學術不一十人十義朝廷欲有所為異論紛然莫肯承聽此則李斯所以建焚書之議也是何言歟既罷明經諸科乃用其法立新科明法以待諸科之不能改試進士者試以律令刑統大義斷案中格卽取惟嘗應明經諸科試在熙寧五年前者得試非此𩔖有司不受既得官又得預刑法官試中者推恩有加三年親試舉人初用策舊制進士一日而兼試詩賦論謂之三題特奏名人止試論一道至是進士就席有司猶循故事給禮部韻及題出乃策問也葉祖洽對策言祖宗多因循茍簡之政陛下即位革而新之初考為三等覆考為五等上令宰相陳升之面讀以祖洽為第一考官蘇軾疾其阿諛因擬進士策一篇以進是年南郊赦書訪求節行才識學術之士諸路監司以劉蒙等二十一人應詔送舍人院試而命以官熙寧初詔進士諸科經仁宗朝殿試或進士明經三舉殿試五舉省試下諸科五舉殿試七舉省試下並免解因應舉授諸州司士長史文學助敎參軍不理選限年未六十注權入官三年又詔景祐五年以前禮部試下進士一舉諸科二舉年六十五若遞加一舉則不限年州縣以名聞特與推恩府監舉人以京朝官二人保識進士七舉諸科八舉年四十禮部嘗奏名者並特赴殿試惟河北河東陜西三路各減一舉以優之舊止試論至是如進士試時務策一道自同五經出身而降為九等上等注官次守選次遇郊注官及不理選限各有差詔諸州舉送發解考試監試官凡親戚若門客毋得試於其州𩔖其名上之轉運司使與鏁㕔者同試率七人特立一額以解不用其所避州解額五年詔宗室非袒免親許應舉補官十年始立宗子試法凡祖宗袒免親已命者附鏁㕔試非袒免以外例許應舉國子監禮部皆别試别取十人取五試者雖多解毋過五十人廷試策問與進士同而别考累舉不中年及四十以聞而錄用之六年詔進士諸科及選人任子並令試斷案律令大義或時議始出官其後又詔進士第一人以下並試初詔自三人以下始令試法中書習學練亨甫言髙科任簽判及職官預一州之事其於習法豈所宜緩前此試刑法者世皆指為俗吏今朝廷推恩既厚而應者尚少若髙科不試則人不以為榮矣乃詔悉試帝因言近世士大夫多不習法令呉充曰漢儒陳寵以法律講授徒衆常數百人有律學在六學之一後來縉紳多耻此學明法一科又徒能誦其文罕通其意近歲將補官者必聚而試之此有以見恤刑之意舊制進士諸科以甲次髙下率錢期集貧者或稱貸是年始賜錢三千緡為期集費舊制新進士入謝進謝恩銀百兩至是罷之八年頒王安石詩書周禮義於學官謂之三經新義先是安石奏學官試文且言黎侁張諤文勝而違經㫖帝曰今談經者人人殊何以一道徳卿有所著其以頒行使學者歸一安石曰已令陸佃沈季長訓釋詩義矣帝曰佃輩信能發明奥㫖乎安石曰雖命之訓而臣實商度也舊制開封府發解三百餘額國子監額不及其半至是合試而通取之九年殿試進士初覆考官陳澤等考上一甲文卷失當贖金有差詔自今唱名盡四甲而禮部正奏名上十人未與者奏聽裁决元豊元年詔開封府國子監舉人併試通取解額其諸州不滿百人者令漕司取便近州各用本所額就一州考取御史黄廉言别試所解試業詩者十人而取至四五書之一經止取一人等之業文不應能否相絶如此願分經立額均收其長詔自今詩易悉占三分書二分周禮禮記通二分又言朝廷多用講官考試諸生在學熟知其平時議論趨向則試文易投其好而逺士往往見黜考官毋用監學講授人詔差官日取裁知諫院黄履言諸科舊試記誦故口授為傳義重其法禁今大義須文豈容口授而重法如故仍醲立告賞證左又皆其徒慮有誣枉請改立法從之五年先是帝見黄裳所為文愛之至是禮部奏進士有裳名及進讀試策在前列者皆不稱㫖命求裳名至末甲始見乃擢為第一考官以髙下失實贖金八年濟博棣三州諸科舉人訴於禮部言諸科舊額多歸進士僅有存者又有以盡解新科明法今試而中無額可解於是常留諸科舊額十分之一以待不能改業者知徐州蘇軾上言乞為京東西河北陜西五路之士别開仕進之門事見胥吏門哲宗元祐二年更科塲法進士分四塲第一塲試本經義二道語孟義各一道第二塲賦及律詩各一首第三塲論一道四塲子史時務策二道經義進士不兼詩賦人許増治一經詩賦人兼一經以詩禮記周禮左氏春秋為大經書易公羊榖梁儀禮為中經願習二大經者聽不得偏占兩中經尚書省言近歲承學之士聞見淺陋辭格卑弱患在治經者專守一家不識諸儒傳記之説為文者唯知解釋不通聲律體要之學深慮適用之文從此遂息兼一經之内可以為題者無幾有司所試多其平日已嘗宿為若非議而更之必且大弊而禮部請置春秋博士進士專為一經又侍御史劉摯奏國朝取士試賦論策更百餘年號為得人熙寧初以章句破碎大道乃罷詩賦而改試以經可謂知本然今之治經大與古異專誦熙寧所頒新經字説佐以莊列釋氏之書試者累輩百千槩用一律其中雖有真知聖人本指該通先儒舊説與時尚不合一切捐棄且詩賦經義均之以言取人賢否邪正未可遽判第從有司去取較之詩賦有聲律法度故工拙易見所從命題者廣故寡重複經義命題不出此書既可夙具稍更數試題多重出既格律不嚴難以一見判其髙下或時得竊他人之文以為己作此於取棄難易之間科第當否由之以分願復詩賦與經義兼行其解經通用先儒傳注及自已之説禁用字解釋典以救文弊亦使學者兼通他書稍至博洽尚書省又言近制明法舉人試律令大義及斷案謂之新科明法中其選者吏部即注司法叙名在進士及第人之上古者治本禮義而刑法僅以助之舊制刑法最為下科然必責之兼經則猶古者先徳後刑之意也今新科罷兼經專試刑書又所取比舊猥多調擬之法失其次序欲加試論語孝經大義仍裁半額注官並依科目次序詔近臣集議以聞左僕射司馬光言取士之道當先徳行後文學就文學言之經術又當先於詞采神宗罷賦詩及諸科專用經義論策此乃復先王令典百世不易之法但王安石不當以一家私學欲盖掩先儒令天下學官講解及科塲程試同己者取異己者黜使聖人坦明之言轉陷於竒僻先王中正之道流入於異端若已論果是先儒果非何患學者不棄彼而從此何必以利害誘脅如此其急也至於律令敇式皆當官者所須何必置明法一科使為士者豫習之夫禮之所去刑之所取為士者果能知道義自與法律㝠合若其不知但日誦徒流絞斬之書習鍜錬文致之事為士已成刻薄從政豈有循良非所以長育人材敦厚風俗也四年知杭州蘇軾狀奏據本州進士汪溉等一百四十人詣臣陳狀稱准元祐四年四月十九日敕詩賦經義各五分取人朝廷以謂學者久傳經義一旦添改詩賦習者尚少遂以五分立法是欲優待詩賦勉進詞學之人然天下學者寅夜競習詩賦舉業率皆成就雖降平分取人之法縁業已習就不願再有改更兼學者亦以朝廷追復祖宗取士故事以詞學為優故士人皆以不能詩賦為耻比來專習經義者十無二三見今本土及州學生員多從詩賦他郡亦然若平分解名委是有虧詩賦進士難使捐已習之詩賦抑令就經義之科或習經義多少各以分數發解乞據状敷奏者臣曩者備員侍從實見朝廷更用詩賦本末葢謂經義取人以來學者争尚浮虚文字止用一律程試之日工拙無辨既去取髙下不厭外論而已得之後所學文詞不施於用以故更用祖宗故事兼取詩賦而横議之人欲收姑息之譽争言天下學者不樂詩賦朝廷重失士心故為改法各取五分然臣在都下見太學生習詩賦者十人而七臣本蜀人聞蜀中進士習詩賦者十人而九及出守東南親歴十郡及多見江湖福建士人皆争作詩賦其間工者已自追繼前人專習經義士以為耻以此知前言天下學者不樂詩賦皆妄也惟河北河東進士初改聲律恐未甚工然其經義文詞亦自比他路為拙非獨詩賦也朝廷於五路進士自許禮部貢院分數取人必無偏遺一路士人之理今臣所據前件進士汪溉等状不敢不奏亦料諸處似此申明者非一欲乞朝廷參詳衆意特許将來一舉隨詩賦經義人數多少各紐分數發解如經義零分不及一人許併入詩賦額中仍除將來一舉外今後並只許應詩賦進士舉所貴學者不至疑惑專一從學謹録奏聞伏候敇㫖貼黄詩賦進士亦自兼經非廢經義也又詔舉經明行修科分路立額共六十一人州縣保任上之監司監司考察以聞各用其州解額無其人則缺之司馬光奏乞毎歲委升朝文官保舉一人應經明行修科與進士並置程試一如進士惟於及第後推恩優異以勸勉天下舉人使敦士行以示不專取文學之意竊料此法初行其奔競屬請固不能免若朝廷於所舉人違犯名敎及贓私罪必坐舉主毋有所赦行遣三五人後自皆謹擇其人不敢妄舉如此則士之居鄉居家獨處闇室立身行已不敢不謹惟懼玷缺有聞於外矣所謂不言之敎不肅而成不待學官日訓月察立賞告訐而士行自美矣王覿言人情進取相妨則相擠若經明行修科侵用其州解額雖名實孚應衆必合意詆之此科本以厚風俗恐俗未及厚而反敗之也乞創額以消争進權知貢舉蘇軾言今名器爵禄出之太易毎一試進士諸科及特奏名約八九百人祖宗舊制禮部已奏名至御試而黜者甚多至嘉祐中年始盡賜出身近歲雜犯亦免黜落皆非祖宗本意又進士升甲本為南省第一人唱名近下方特升之皆出一時聖斷今禮部十人以上别試國子開封解試武舉第一人經明行修進士及自該特奏而預正奏者皆定著於令遞升一甲則是法在有司恩不歸於人主甚無謂也軾又言比得命案例具今舉該特奏者約已及四百五十人今又許例外遞減一舉則當復増數百人此曹垂老無他進望布在州縣惟務黷貨以為歸計前後恩科命官幾千人矣何有一人能自奮厲有聞於時而殘民敗官者不可勝數以此知其無益有損議者不過謂初政宜廣恩澤不知吏部以有限之官待無窮之吏户部以有限之財禄無用之人而所至州縣舉罹其害乃卽位之初有此過舉謂之恩澤非臣所識也願斷自聖意止用前命仍詔考官量取一二十人誠有學問即許出官其餘皆補文學長史之𩔖不理選限免使積弊之極増重不已八年中書言御試請復用祖宗法試詩賦論策三題且言士子多已改習詩賦太學生員總二千一百餘人而不兼詩賦者纔八十二人可見習賦者多於是詔來年御試習詩賦人復試三題專經人且令試策自後槩試三題紹聖元年禮部已定御試三題條約至三月詔仍試策又詔進士罷詩賦專習經義仍除去字說之禁四年詔禮部取凡内外試題悉集以為籍遇試頒付考官以防複出罷春秋科凡試優取二禮兩經許占全額之半而以其半及他經既而復立春秋博士崇寧又罷之時有建言請於詩書周禮三經義中出題以試舉人者朝廷下其議有司承意謂為可行既而右正言鄒浩言三經義者所以訓經而其書非經也以經造士而以非經之題試之甚非先帝專用經術之義後出題訖依舊法徽宗崇寧三年詔曰神考議以三舍取士而罷州郡科舉其法行於畿甸而未及郡國肆朕纂圖制詔有司講議其方書來上悉推行之設辟廱於國郊以待士之升貢者又與臨幸加恩博士弟子有差朕勸勵學者至矣然州郡猶以科舉取士不專於學校其詔天下将來科塲取士悉由學校升貢其州郡發解及試禮部法並罷庶幾復古自此歲試上舍悉差知舉如禮部試四年詔將來大比更參用科舉取士一次辟廱太學其亟以此意諭逹逺士使即聞之時州縣悉行三舍法當官者子弟得免試入學而士之在學者積歲月累試乃得應格其不能輟身試補者僅可從狹額應科舉不得如在籍者三舍解試兼與而兩得其貧且老者尤甚病之時人議其法曰利貴不利賤利少不利老利富不利貧故詔書及此而加以審訂未遽廢科舉也大觀元年詔舉八行自元祐倣古創立經明行修科主徳行而畧藝文間取禮部試黜之士附寘恩科其時御史既已咎其無所甄别矣及八行科立專以八行全偏為三舍髙下不間内外皆不試而補則往往設為形迹以求入於八行固已可厭至於請託徇私尤難防禁大抵兩科相望幾數十年廼無一人卓然能自著見與名格相應者而八行又有甚弊士子跅弛公私交患苦之不能誰何乃借八行名稱納之學校使其冀望無罰應貢則稍且自戢而長史實恐繆舉從坐故寧使之占額不貢以是知畧實藝而追古制其難葢如此也政和二年親試舉人始罷試詩改試箴先時御史李章言作詩害經術自陶潛至李杜皆遭譏詆詔送敇局立法宰臣何執中請禁人習詩賦又詔士毋得習史學吳氏能改齋漫録曰先是崇寧以來專意王氏之學士非三經字説不用至政和之初公議不以為是蔡嶷為翰林學士慕容彦逄為吏部侍郎宇文粹中為給事中張琮為起居舍人列奏欲望今後時務策並隨事參以漢唐歴代事實為問奉御筆經以載道史以紀事本末該貫廼稱通儒可依所奏今後時務策問並參以歴代事實庶得博習之士不負賓興之選未幾監察御史兼權殿中侍御史李彦章言夫詩書周禮三代之故而史載秦漢隋唐之事學乎詩書禮者先王之學也習秦漢隋唐之史者流俗之學也今近臣進思之論不陳堯舜之道而建漢唐之陋不使士專經而使習流俗之學可乎伏望罷前日之詔使士一意於先王之學而不流於世俗之習天下幸甚奉御筆經以載道史以紀事本末該貫廼為通儒今再思之紀事之史士所當學非上之所以敎也况詩賦之家皆在乎史今罷黜詩賦而使士兼習則士不得專心先王之學流於俗好恐非先帝以經術造士之志可依前奏前降指揮更不施行時政和元年三月戊戌也按尊經書抑史學廢詩賦此崇觀以後立科造士之大指其論似正矣然經之所以獲尊者以有荆舒之三經也史與詩之所以遭斥者以有洓水之通鑑蘇黄之酬唱也羣儉偕正論以成其姦其意豈眞以為六籍優於遷固李杜也哉宣和三年詔罷天下三舎法開封府及諸路並以科舉取士惟太學仍存三舍以甄序課試遇科舉仍自發解六年禮部試進士萬五千人詔特増百人額差知舉官五人是年賜第八百餘人因上書獻頌直令赴試者殆百人有儲宏等隸大閹梁師成為使臣或小史皆賜之第先是大觀三年宦者梁師成中甲科政和四年以鄧洵武之子鴻臚寺丞雍進頌文可采特令直赴廷試自後此𩔖頗多八年嘉王揩考在第一不欲令魁多士升次名王昴為首按太宗時李昉呂蒙正之子御試入等上以勢家不當與孤寒争進黜之顔明逺等四人以見任官舉進士上惜科第不與特授近蕃掌書記葢惟恐權貴占科目以妨寒畯也今親王得以為狀元又按端拱二年有中書堂後官及第上奪所授敇牒勒歸本局詔今後吏人無得應舉葢惟恐雜流取名第以玷選舉也今閹宦與其隸皆得以登甲科葢至是祖宗之良法蕩然矣王氏揮麈録曰國初每歲放榜取士極少如安徳裕作魁日九人而已葢天下未混一也至太宗朝寖多所得率江南之秀其後又别立分數考校五路舉子以北人拙於詞令故優取熙寧三年廷試罷三題專以策取士非雜犯不復黜然五路舉人尤為疎畧黄道夫榜傳臚至第四甲黨鎛卷子神宗笑曰此人何由過省知舉舒信道對以五路人用分數取末名過省上命降作第五甲末自後人益以廣宣和七年沈元用榜正奏名殿試至八百五人葢燕雲免省者既衆天下赴南宮試者萬人前後無踰此歲之盛欽宗靖康元年復置春秋博士用以取士賜出身凡士不繇科舉若三舍而賜進士第或出身者其所從得不一路遺逸文學吏能言事或奏對稱㫖或試法而經律入優或材武或童幼而能文或邊臣之子以功來奏其得之雖有當否總其大較要有可考熙寧四年太子左贊善大夫吳安度試舍人院已入等有司以安度所試緑竹詩背王芻古説而直以為竹遂黜不取富弼言史記叙載淇園之竹正衞産也安度語有據遂賜進士出身五年祝康李舉之試經書律令大義而有司考之入優遂以令賜明經出身其後梁子野黄葆光賜出身遂同進士七年王韶破木征使其子淳來獻㨗帝喜甚遂以賜之其後趙邇在政和間擒蠻卜漏編次用兵首末授其子永裔來奏永裔亦得賜八年章惇薦大理寺丞歐陽發有史學又得賜九年中丞鄧綰薦遂州布衣馮正符受賜已而綰敗正符亦坐附㑹追奪元符元年承務郎李景夏召對三年上舎生何太正應詔言事皆特賜崇寧二年又賜右司郎官林攄蘇州進士俞燾等明年蔡京子攸亦與焉四年宋喬年察訪熈河稱㫖大觀四年開封少尹張叔夜皆以職事賜政和中小學生曹芬駱庭芝以能文賜自此達官貴胄既多得賜又上書獻頌得之者多至百數不勝紀矣靖康新政懲姦臣蔽塞凡行義有聞議論忠讜悉加賜以示好惡張炳雷觀陳東尹焞鄧肅相望得賜而天下知所鄉矣文獻通考卷三十一
