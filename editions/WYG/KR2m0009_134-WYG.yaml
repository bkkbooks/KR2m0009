body:
  text: 文獻通考卷一百三十四鄱陽馬端臨貴與著樂考七金之屬雅部陳氏樂書曰金生於土而别於土其卦則兑其方則西其時則秋其風閶闔其聲尚羽其音則鏗立秋之氣先王作樂用之以為金奏焉周官鐘師掌金奏鎛師掌金奏之鼓鼓人掌四金之聲音孟子曰金聲是也金奏之樂未嘗不用鼓特謂之金者以金為主故也禮曰内金示和也又曰入門而金作示情也國語曰金奏肆夏莊子曰金石有聲不考不鳴則奏金而鳴之内以示情外以示和也音之實也鐘世本云黄帝工人垂所造山海經云炎帝之孫鼓延始為鐘又禮記云埀之鐘鄭元云垂堯時鐘工未知孰是吕氏春秋曰黄帝命伶倫鑄十二鐘和五音傳曰黄帝命伶倫與營援作十二鐘考工記六分其金而錫居一謂之鐘鼎之齊鳬氏為鐘兩欒謂之銑銑鐘口兩角銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞此四名者鐘體也鄭衆云于鐘脣之上祛也鼓所擊處舞上謂之甬甬上謂之衡此二名者鐘柄也甬音勇鐘懸謂之旋旋蟲謂之幹旋屬鐘柄所以懸之也鄭衆云旋蟲者旋以蟲為餙也鄭元謂今時旋有蹲熊盤龍辟邪鐘帯謂之篆篆間謂之枚枚間謂之景帯所以介其名也介在于鼓鉦舞甬衡之間凡四鄭衆云枚鐘穴乳也鄭元云今時鐘乳狹鼓與舞毎處有九四面三十六于上之􅯖謂之隧􅯖所擊之處􅯖弊也隧在鼓中窐而生光有似夫隧􅯖音靡又莫賀反窐音烏華反十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞修去二分以為舞廣此言鉦之徑居銑徑之八分而銑間與鉦之徑相應鼓間又居銑徑之六與舞修相應舞修舞徑也舞上下促以横為修從為廣舞廣四分今亦去徑之二分以為之間則舞間之方常居銑之四也舞間方四則鼓間六亦其方也鼓六鉦六舞四此鐘口十者其長十六也鐘之大數以律為度廣長與圜徑假設之耳其銑之形則各随鐘之制為長短大小也凡言間者亦為從篆以分之鉦間亦當六今時鐘或無鉦間以其鉦之長為之甬長并衡數也以其甬長為之圍參分其圍去一以為衡圍衡居甬上又小參分其甬長二在上一在下以設其旋今衡居一分則參分旋亦二在上一在下以旋半當甬之中央是其制鐘已厚則石太厚則聲不發已薄則播太薄則聲散侈則柞側栢反弇則鬱聲不舒掦長甬則震鐘掉則聲不正掉音徒弔反是故大鐘十分其鼓間以其一為之厚小鐘十分其鉦間以其一為之厚言若此則不石不播鼓鉦之間同方六而今宜異又十分之一猶太厚皆非也若言鼓外鉦外則近之鼓外二鉦外一鐘大而短則其聲疾而短聞淺則躁躁則易竭也聞音問下同鐘小而長則其聲舒而逺聞深則安安難息為隧六分其厚以其一為之深而圜之厚鐘厚也深謂窐之也其窐圜國語周景王將鑄無射而為之大林作無射之鐘為大林以覆之其律中林鍾也或云鑄無射以鍾之數益之也單穆公曰不可夫鐘不過以動聲動聲謂合樂以金奏而八音從之也若無射有林耳弗及矣若無射復有大林以覆之無射陽聲之細者也林鍾隂聲之大者也細抑大陵故耳不能聽及也夫鐘聲以為耳也耳所不及非鐘聲也非法鐘之聲也猶目所不見不可以為目也若目之精眀所不見亦不可施以目也耳目所不能及而强之則有眩惑之失以生疾也夫目之察度也不過歩武尺寸之間六尺為歩賈云半歩為武其察色也不過墨丈尋常之間五尺為墨倍墨為丈八尺為尋倍尋為常耳之察和也在清濁之間清濁律中之變黄鍾為宫則濁大吕為角則淸也其察清濁也不過一人所勝勝舉也是故先王之制鐘也大不出鈞重不過石鈞所謂鈞音之法也以木長六尺者强繫之為鈞法百二十斤為石律度量衡於是乎生律五聲隂陽之法也度丈尺也量斗斛也衡有斤兩之數生於黄鍾黄鍾之管容黍千二百粒粒百為銖是為一龠龠二為合合重一兩故曰律度量衡於是乎生也小大器用於是乎出出於鐘也易曰制器者尚其象小謂錙銖分寸大謂斤兩丈尺故聖人慎之今王作鐘也聽之弗及耳不及知其清濁也比之不度不度不中鈞石之數也鐘聲不可以知和耳不能聽故不可以知和也制度不可以出節節謂法度量衡之節也無益於樂而鮮民財將焉用之夫樂不過以聽耳而美不過以觀目若聽樂而震觀美而眩患莫甚焉問於伶州鳩對曰臣聞之琴瑟尚宫輕者從大重者從細故琴瑟尚宫鐘尚羽鐘聲大故尚羽石尚角石磬也輕於鐘故尚角角清濁之中也匏竹利制匏笙也竹簫管也利制以聲音調利為制大所尚也大不踰宫細不過羽夫宫音之主也第以及羽宫聲大故為主第次第也聖人保樂以愛財財以備器樂以殖財保安也備具也殖長也古者以樂省風土而紀農事故曰樂以殖財故樂器重者從細重謂金石也從細尚細聲也謂鐘尚羽石尚角也輕者從大輕絲也從大謂尚重音也是以金尚羽石尚角瓦絲尚宫匏竹尚議議從其調利也革木一聲革鼓鼙也木柷敔也一聲無清濁之變也夫政象樂樂從和和從平和八音克諧也平細大不踰也故可平民樂和則諧政和則平也聲以和樂律以平聲以式八音而調樂也其云黄鍾為宫林鍾為徴太蔟為商南吕為羽姑洗為角所以平五聲也金石以動之鐘聲所以動五聲也絲竹以行之管絃所行之也詩以道之道已志也書曰詩言志歌以詠之詠詩也書曰聲依永匏以宣之宣發揚瓦以贊之贊助也革木以節之物得其常曰樂極物事也極中也極之所集曰聲聲㑹也言中和之所㑹集曰五聲也聲應相保曰和保和也細大不踰曰平細大之聲不相踰越曰平今無射有大林是不平也如是而鑄之金鑄金以為鐘也磨之以石磨石以為磬也繫之以絲木繫之以絲木以為琴瑟也越之匏竹越匏竹以為笙管也越謂為孔也樂記曰朱絃而疏越節之鼓節其長短大小也而行之以遂八風遂順也傳曰所以節八音而行八風也正西曰兑為金為閶闔風西北曰乾為石為不周正北為坎為革為廣莫東北曰艮為匏為條風正東曰震為竹為眀庶東南曰巽為木為清明正南曰離為絲為景風西南曰坤為瓦為凉風於是乎氣無滯隂亦無散陽滯積也積隂而發則憂有霜雪散陽陽不蔵冬無冰李梅實之類也隂陽序次風雨時至嘉生繁祉人民和利物備而樂成上下不罷音皮勞也故曰樂正今細過其主妨於正細謂無射也主正也言無射有大林是作細而大過其律妨於正聲也用物過度妨於財過度用金多也正害財匱妨於樂樂從和今正害財匱故妨於樂也細抑大陵不容於耳非和也細無射大大林也言大聲陵之細聲抑而不聞不容於耳不能容别也聽聲越遠非平也妨正匱財聲不和平非宗官之所司也越迂也言無射之聲為大林所陵聽之微細迂逺也宗官宗伯也樂官屬焉夫有和平之聲則有蕃殖之財樂以殖財也於是乎道之以中徳詠之以中音中徳中庸之徳舞也中音中和之音也徳音不愆以合神人合神人謂祭祀享宴也神是以寧民是以聽若夫匱財用罷民力以逞滛心聽之不和比之不度無益於教而離民怒神非臣之所聞也王不聽州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿也樂因音而行也而鐘音之器也音由器以發天子省風以作樂器以鍾之鍾聚也輿以行之樂須音而行小者不窕他刀反窕不滿也大者不摦音户摦謂横大不入也窕則不感不完脩人心也摦則不容心不堪容也心是以感感實生疾今鐘摦矣王心不堪其能乆乎陳氏禮書曰典同凡為樂器以十有二律為之度數單穆公曰先王之制鐘也大不出鈞重不過石律度量衡於是乎生則樂器待律然後制而律度又待鐘然後生故有十二辰之鐘以應十二月之律十二辰之鐘大鐘也大鐘特縣詩書爾雅所謂鏞是也非十二辰之鐘則編焉周禮所謂編鐘是也鐘體之别五銑于鼓鉦舞是也鐘柄之别二甬衡是也衡上有旋旋飾有蟲介於于鼓舞之間有帯布於𢃄間有枚先儒曰銑金之澤者又曰銑小鑿也鐘欒亦謂之銑其以類鑿然也于則銑間之曲袪者也鼓則于上之待枷者也鉦則鼓舞之正中者也舞則聲之震動於此者也甬出舞上者也衡横甬上者也帶類篆故謂之篆乳有數故謂之枚然鐘之長短徑圍經無眀證其言十分其銑去二以為鉦以其鉦為之銑間者鉦體之徑居銑間之八也去鉦二分以為之鼓間者鼓間之徑居銑間之六也以其鼓間為之舞修修舞之徑也舞徑亦居銑間之六也去舞徑二分以為舞廣廣舞之長也舞長居銑間之四也舞長四而徑間亦四鼓間徑六而長亦六鄭氏以為此鐘口十其長十六也凡樂器以十有二律為之度數若黄鍾之律九寸十六之而銑取其十以為度則銑徑五寸有竒鉦鼓舞之所居者遞去三分則舞修三寸有竒舞廣二寸有竒林鍾之律六寸十六之而銑取其十以為度則銑徑三寸有竒鉦鼓舞之居者遞去二分則舞修二寸有竒舞廣一寸有竒餘律之鐘亦然賈公彦曰律各倍半以為鐘舉一端也大鐘十分其鼓間以其一為之厚小鐘十分其鉦間以其一為之厚盖鉦體居銑之六與鼓間同鉦間又殺矣與鼓間異此所以各十分之以為厚薄鄭氏曰鼓鉦之間同方六而今宜異又十分之一猶太厚皆非也若言鼓外鉦外則近之鼓外二鉦外一以謂鼓外二間鉦外一間而十分之以其一為厚薄其説誤矣陳氏樂書曰嘗考唐史商盈孫按鳬氏欒銑于鼓鉦舞之法用算法乘除鏄鐘之輕重髙下定編鐘之制黄鍾九寸五分倍應鍾三十三分有半差為四十八字口項之量徑衡之圍莫不有齊量焉使工按圍鑄之凡二百四十枚及其成也音韻與磬協矣今太常所用舊鐘無慮千枚其間或類古法大抵出盈孫所造也外此則器律短而聲髙矣聖朝嘗語李照制管調律而更鑄焉其法悉圓其形而弇一孔其上出柄蟠龍之餙雖和應於一時然較古鐘如鈴而不圓者異矣唐制凡私家不設鐘磬三品以上女樂五人五品以下不過三人是不知周官大胥樂縣之制也鏞書笙鏞以間詩鼖鼓維鏞註云鏞大鐘也爾雅大鐘曰鏞鎛周禮鏄師註鏄如鐘而大禮書韋昭杜預云小鐘儀禮鏄從薄與鉞鏄之鏄同隋志金之屬二一曰鎛鐘每鐘懸一簨簴各應律吕之應即黄帝所命伶倫鑄二鐘和五音者也宋仁宗眀道初詔定大樂集賢校理李照言古者鏄鐘擊為節檢而無合興之義大射有二鏄皆亂擊焉後周以十二鎛相生擊之景德中李宗諤領太常總考十二鎛鐘而樂工相承殿廷習用三調六曲三調者黄鍾太蔟蕤賔也六曲者調别有隆安正安二曲郊廟之縣則環而擊之宗諤上言曰金部之中鎛鐘為難如一聲不及則宫商失序使十二鎛工皆精習則遲速有倫隨月用律諸曲無不通矣真宗因詔黄鍾太蔟二宫更増文舞武舞福酒三曲至是詔馮元等詢考擊之法元等奏言後周嘗以相生之法擊之音韻克諧國朝亦用隨均合曲然但施殿庭未及郊廟謂宜使十二鐘依辰列位隨均為節便於合樂仍得并施郊廟若軒縣以下則不用此制所以重備樂尊王制也詔從焉慶歴四年大安樂成詔侍臣觀新樂於紫宸殿凡鎛十二黄鍾髙二尺二寸半廣一尺二寸鼓六鉦四舞六甬衡并旋蟲共髙八寸四分隧徑二寸二分深一寸二釐篆帯每面縱者四横者四枚景挾鼓與舞四處各有九每面共三十六兩欒間一尺四寸容九斗九升五合重一百六斤大吕以下十一鐘並與黄鍾同制而兩欒間遞减至應鍾容九斗三升五合而其重加至應鍾重一百四十八斤並如新律本律議者以為周禮大鐘十分其鼓間以其一為之厚小鐘十分其鉦間以其一為之厚則是大鐘宜厚小鐘宜薄今大鐘重一百六斤小鐘重一百四十八斤則小鐘厚非也五年二月乾寧軍進古鐘一送詳定所四月知制誥王洙奏黄鍾為宫最尊者但聲有尊卑耳不必在其形體也言鐘磬依律數為大小之制者經典無正文惟鄭康成立意言之亦自云假設之法孔頴逹作疏因而述之據歴代史籍亦無鐘磬依數大小之説其康成頴逹等即非身曽制作樂器至如言磬前長三律二尺七寸後長二律一尺八寸是磬有大小之制者據此以黄鍾為律臣曽依此法造黄鍾特磬者止得林鍾律聲若隨律長短為鐘大小之制則黄鍾長二尺二寸半减至應鍾則形制大小比黄鍾才四分之一又九月十月以無射應鍾為宫即黄鍾大吕反為商聲宫小而商大是君弱臣強之象今參酌其鏄鐘特磬制度欲且各依律數算定長短大小容受之數仍以皇祐中黍尺為法鑄大吕應鍾鐘磬各一即見形制聲韻所歸奏可五月翰林學士承㫖王拱辰言奉詔詳定大樂比臣至局鐘磬已成竊緣律有長短磬有大小黄鍾九寸最長其氣陽其象土其正聲為宫為諸律之首盖君徳之象不可並也今十二鐘磬一以黄鍾為率與古為異臣亦嘗詢逸瑗等皆言依律大小則聲不能諧故臣竊有疑請下詳定大樂所更稽古之義參定之是月知諫院李兑言曩者紫宸殿閲太常新樂議者以鐘之形制未中律度遂斥而不用復詔近侍詳定竊聞崇天院聚議而王拱辰欲更前史之義王洙不從議論喧嘖夫樂之道廣大微妙非知音入神豈可輕議西漢去聖尚近有制氏世典大樂但能紀其鏗鏘而不能言其義况今又千餘年而欲求三代之音不亦難乎且阮逸罪廢之人安能通聖眀述作之事務為異説欲規恩賞朝廷制樂數年當國財匱乏之時煩費甚廣器既成矣又欲改為雖命兩府大官監議然未能裁定其當請以新成鐘磬與祖宗舊樂參校其聲但取和諧近雅者合用之大觀間議禮局言伶州鳩曰大鈞有鏄無鐘鳴其細也細鈞有鐘無鏄昭其大也然則鐘大器也鏄小鐘也以宫商為鈞則謂之大鈞其聲大故用鏄以鳴其細而不用鐘以角徴羽為鈞則謂之小鈞其聲細故用鐘以昭其大而不用鏄然後細大不踰聲應相保和平出焉是鏄鐘兩器其用不同故周人各立其官後世之鏄鐘非特不分大小又混為一器復於樂架編磬之外設鏄鐘十二以配之則於義重複乞宫架樂去十二鏄鐘止設一大鐘為鐘一小鐘為鏄一大磬為特磬以為衆磬所依詔可剽爾雅鐘中者曰剽音漂棧爾雅鐘小者曰棧晉時剡縣民於田中得一鐘長三寸口徑四寸銘曰棧盞唐時岑陽耕者得古鐘髙尺餘楊枚叩之曰此姑洗角也既劀拭有刻在兩欒果然陳氏樂書曰虞夏之時小鐘謂之鐘大鐘謂之鏞周之時大鐘謂之鐘小鐘謂之鏄則鏄之為用其實編鐘也編鐘之用其實歌鐘也一器而三名之各有攸趨爾又曰莫非鐘也大者謂之鏞以民為大故也書言笙鏞詩言鼖鼓維鏞鏞鼓有斁是已小者謂之棧以象功之淺者也昔晉人得鐘長三寸口徑四寸銘曰棧是已若夫大而不鏞小而不棧則又掠其大小之聲而歸於中焉其斯已為剽歟儀禮大射阼階之東笙磬其南笙鐘其南鏄西階之西頌磬其南笙鏞其南鎛皆南陳國語曰細鈞有鐘無鎛昭其大也大鈞有鎛無鐘甚大無鎛鳴其細也盖細鈞角徴也必和之以大故有鐘無鎛大鈞宫商也必和之以細故有鎛無鐘則鎛小鐘大眀矣晉語左傳鄭伯嘉納魯之寳鄭人賂晉侯歌鐘二肆及其鎛韋昭杜預皆以鎛為小鐘然言歌鐘及其鎛則鐘大鎛小可知鐘師掌金奏大鐘也鎛師掌金奏小鐘也許慎曰鎛錞于之屬所以應鐘磬也於理或然鄭康成謂鎛如鐘而大孫炎郭璞釋大鐘之鏞亦名為鎛不亦失大小之辨歟以經考之自虞至周鏞大而鐘小自周公制禮鐘大而鎛小雖有改制之名無變大小之實也秦漢以來鐘鎛之制小者或數寸大者或容千石皆不本律度故梁去衡鐘而設鏄隋疑無射之鏄無合曲之義乃襲後周以十二鎛相生擊之聲韻始克諧矣聖朝之初鏄鐘有三調六曲更詔依均擊之與編鐘相應要知失細大之制非成周制作之意也傳曰黄鍾之鐘容秬黍一斛一斛八斗為度國語曰度律均鐘以定中聲白虎通曰鎛者時之聲也節度之所生也有節度則萬物昌無節度則萬物亡編鐘小胥凡縣鐘磬十為堵全為肆註曰鐘磬編縣之二八十六枚而在一簴謂之堵鐘一堵磬一堵謂之肆十六枚之數起於八音倍而設之故十六也禮書曰後世宗鄭氏説用四清聲以為夷則南吕無射應鍾四宫管短則減黄鍾大吕太簇姑洗四管之半以為清聲而應之則樂音諧今大晟樂宗前代制亦用十六枚以十二枚為正鐘四枚為清鐘焉隋志金之屬二曰編鐘小鐘也各應律吕大小以次編而懸之上下皆八合十六鐘縣於一簨簴宋仁宗眀道初改制大樂命集賢校理李照等預議翰林學士馮元等同共討論時太常鐘磬每十六枚為一簴而四清聲相承不擊照因上言十二律聲已備餘四清聲乃鄭衛之樂請於編縣止留十二中聲去四清鐘則哀思邪僻之聲無由而起也元等駮之曰前聖制樂取法非一故有十三管之和十九管之巢三十六簧之竽二十五絃之瑟十三絃之筝九絃七絃之琴十六枚之鐘磬各自取義寧有一之於律吕専為十二之數也且鐘磬八音之首春秋號樂總言金奏詩頌稱美實依磬聲此二器非可輕改今照欲損為十二不得其法於古臣等以為不可且聖人既以十二律各配一鐘又設黄鍾至夾鍾四清聲以附正聲之次原其四清之意盖為夷則至應鍾四宫而設也夫五音宫為君商為臣角為民徴為事羽為物不相凌謂之正迭相凌謂之慢百王之不易也聲重大者為尊輕清者為卑卑者不可加於尊古今之所同也故列聲之尊卑者事與物不與焉何則事為君治物為君用不能尊於君故也惟君臣民三者則自有上下之分不得相越故四清聲之設正謂臣民相避以為尊卑也今若止用十二鐘旋相考擊至夷則以下四管為宫之時臣民相越上下交戾則凌犯之音作矣此甚不可者也其鐘磬十六皆本周漢諸儒之説及唐家典法所載欲損為十二惟照獨見臣以為且如舊制便帝令權用十二枚為一格且詔曰俟有知音者能考四鐘協調清濁有司别議以聞元祐間范鎮為樂論上之其論鐘曰夫鐘之制周官鳬氏言之甚詳而訓觧者其誤有三若云帯所以介其名也介在于鼓鉦舞甬衡之上其誤一也又云舞上下促以横為脩從為廣舞廣四分今亦去徑之二分以為間則舞間之方常居銑之四也舞間方四則鼓間六亦其方也鼓六鉦六舞四既言鼓間與舞修相應則鼓與舞皆六所云鉦六舞四其誤二也又云鼓外二鉦外一彼既以鉦鼓皆六無厚薄之差故從而穿鑿以遷就其説其誤三也今臣所鑄編鐘十二皆從其律之長故鐘口十者其長十六以為鐘之身鉦者正也居鐘之中上下皆八下去二以為之鼓上去二以為之舞則鉦居四而鼓與舞皆六是故于鼓鉦舞篆景欒隧甬衡旋蟲鐘之文也著於外者也廣長空徑厚薄大小鐘之數也起於内者也若夫金錫之齊與鑄金之狀率按諸經差之毫釐則聲有髙下不可不審其鏄鐘亦以此法而四倍之今太常鐘無大小無厚薄無金齊一以黄鍾為率而磨以取律之合故黄鍾最薄而輕自大吕以降迭加重厚是以卑陵尊以小加大其可乎且清聲者不見於經惟小胥註云鐘磬者編次之二八十六枚而在一簴謂之堵至唐又有十二清聲其聲愈髙尤為非是國朝舊有四清聲置而弗用至劉幾用之與鄭衛無異楊徐註元祐樂議以破鎮説曰鎭謂清聲不見於經惟小胥註云鐘磬者編次之十六枚而在一簴謂之堵至唐又有十二清聲其聲愈髙尤為非是國朝舊有四聲置而勿用至劉幾用之與鄭衛無異按編鐘編磬十六其來逺矣豈獨見於周禮小胥之註哉漢成帝時犍為郡於水濵得古磬十六枚帝因是陳禮樂雅頌之聲以風化天下其事載於禮樂志不為不詳豈因劉幾然後用哉且漢承秦秦未嘗制作禮樂其稱古磬十六者乃二帝三王之遺法也其王朴樂内編鐘編磬以其聲律太髙歌者難逐故四清聲置而不用及神宗朝下二律則四清聲皆用而諧協矣周禮曰鳬氏為鐘薄厚之所震動清濁之所由出則清聲豈不見於經哉今鎭簫笛塤箎巢笙和笙獻於朝廷簫必十六管是四清聲在其間矣自古無十二管之簫豈簫韶九成之樂已有鄭衞之聲乎禮部太常亦言鎭樂法自係一家之學難以參用而樂如舊制陳氏樂書曰先王作樂以十有二律為之數度以十有二聲為之齊量紀之以三平之以六歸於十二天之道也然則以十有二辰正鐘磬樂縣之位豈他故哉凡以齊量數度考中聲順天道而已盖編鐘十二同在一簴為一堵鐘磬各一堵為肆春秋傳歌鐘二肆則四堵也小胥之職凡縣鐘磬半為堵全為肆是鐘磬皆在所編矣磬師掌教擊磬擊編鐘於鐘言編則磬可知眀堂位曰叔之離磬編則雜離則特謂之離磬則特懸之磬非編磬也言磬如此則鐘可知也荀卿言縣一鐘大戴禮言編縣一言特縣鐘磬如此則編鐘編磬亦可知豈非金石以動之常相待以為用乎由是觀之鐘磬編縣各不過十二古之制也漢服䖍以十二鐘當十二辰更加七律一縣為十九鐘隋之牛洪論後周鐘磬之縣長孫紹援國語書傳七律七始之制合正倍為十四梁武帝又加濁倍三七為二十一後魏公孫崇又參縣之合正倍為二十四至唐分大小二調兼用十六二十四枚之法皆本二變四清言之也蔽於二變者不過溺於國語書傳蔽於四清者不過溺於樂緯皆非聖經之意也惟聖朝李照范鎭廢四清用十二律之議何其智識之眀而遠過於諸子乎李照雖知去四清而不知去二變猶不去四清也將何以成和樂邪眞目論也編鐘宫縣用之先儒設於甲丙庚壬之位十二律各有正聲説取黄鍾至夾鍾四律為清聲此牛洪據鄭康成及樂緯之説也古者編鐘編磬登歌用之以節歌句故堂上擊黄鍾特鐘而堂下編鐘應之擊黄鍾特磬而堂下編磬應之上下唱和之道也青鐘赤鐘黄鐘白鐘黒鐘昔黄帝作五聲正五鐘一曰青鐘大音二曰赤鐘心聲三曰黄鐘洫光四曰景鐘昧其眀五曰黑鐘隠其帝五聲既調然後作五行淮南子謂孟秋之日西館御女白色白綵撞白鐘是也宋徽宗崇寧三年作大晟樂鑄景鐘成景鐘者黄鍾之所自出也垂則為鐘仰則為鼎鼎之大終於九斛中聲所極製煉玉屑入於銅齊精純之至音韻清越其髙九尺拱以九龍惟天子親郊乃用之立於宫架之中以為君圍於是命翰林學士承㫖張康國為之銘其文曰天造我宋於穆不已四方來和十有二紀樂象厥成維其時矣廸惟有夏度自禹起我龍受之天地一指於論景鐘中聲所止有作於斯無襲於彼九九以生律吕根抵維此景鐘非弇非侈在宋之庭屹然特峙天子萬年既多受祉維此景鐘上帝命爾其承伊何以燕翼子永言寳之宋樂之始大中大夫劉昺編修樂書金部有七曰景鐘以為景鐘乃樂之祖而非常用之樂也黄帝五鐘一曰景鐘景大也鐘西方之聲以象厥成惟功大者其鐘大世莫識其義乆矣其聲則黄之正而律吕由是生焉平時弗考風至則鳴紹興十三年命給事中叚拂等討論景鐘制度按大晟樂書黄帝有五鐘一曰景鐘景者大也黄鍾者樂所自出而景鐘又黄鍾之本故為樂之祖惟天子郊祀上帝則用之自齋宫詣壇則擊之以召至陽之氣既至聲闋衆樂乃作祀事既畢陞輦又擊之盖天者羣物之祖今以樂之祖感之則天之百神可得而禮音韻清越拱以九龍立於宫架之中以為君圍環以四清聲鐘磬鏄鐘特磬以為臣圍編鐘編磬以為民圍内設寳鐘球玉外為龍簴風琴景鐘之髙九尺其數九九實髙八尺一寸垂則為鐘仰則為鼎鼎之大中於九斛退藏寳八斛有一焉内出皇祐大樂中黍尺參以太常舊藏黄鍾律編鐘髙適九寸正相脗合遂遵用黍尺製造鐘成左僕射秦檜為之銘其文曰皇宋紹興十六年中興天子以好生大徳既定寰宇乃作樂以暢天地之化以和神人維兹景鐘首出衆樂天子専用諸禋祀謹拜手稽首而獻銘徳純懿兮舜文繼躋夀域兮孰内外薦上帝兮偉兹器聲氣應兮同乆視貽子孫兮彌萬世陳氏樂書曰尚書大傳天子左五鐘右五鐘出撞黄鍾左五鐘皆應然後少師奏登車告出也撞蕤賔右五鐘皆應然後少師奏登堂就席告入也由是觀之黄鍾所以奏肆夏也蕤賔所以奏采齊也出撞陽鐘而隂應之是動而節之以止入撞隂鐘而陽應之是止而濟之以動易序卦物不可以終動不可以終止之意也樂師言行以肆夏先於趨以采齊豈主出言之邪禮記趨以采齊先於行以肆夏豈主入言之邪大戴禮言歩中采齊趨中肆夏誤矣後世奏永至之樂為行歩之節豈效古采齊肆夏之制歟金錞錞于周禮小師以金錞和鼓其形象鐘頂大腹􅰐口弇以伏獸為鼻内縣子鈴銅舌凡作樂振而鳴之與鼓相和國語曰戰以錞于儆其民也又黄池之會吳王親鳴鐘鼓錞于振鐸則錞之和鼓以節聲樂和軍旅其來尚矣後世之制或為兩馬之形或為蛟龍之狀引舞用焉非周制也容齋洪氏隨筆曰周禮鼓人掌教六鼓四金之音聲以節聲樂四金者錞鐲鐃鐸也以金錞和鼓鄭氏註云錞錞于也圓如碓頭大上小下樂作則鳴之與鼓相和賈公彦疏云錞于之名出於漢之大予樂官南齊始興王鑑為益州刺史廣漢什邡民叚祚以錞于獻鑑古禮器也髙三尺六寸六分圍二尺四寸圓如筒銅色黑如漆甚薄上有銅馬以繩縣馬令去地尺餘灌之以水又以器盛水於下以芒莖當心跪注錞于以手振芒則其聲如雷清響良乆乃絶古所以節樂也周斛斯徵精三禮為太常卿自魏孝武西遷雅樂廢闕樂有錞于者近代絶無此器或有自蜀得之皆莫之識徴曰此錞于也衆弗之信遂依干寳周禮註以芒筒將之其聲極振乃取以合樂焉宣和博古圖説云其製中虚椎首而殺其下王黼亦引叚祚所獻為證云今樂府金錞就擊於地灌水之制不復考矣是時有虎龍錞一山紋錞一圜花錞一縶馬錞一龜魚錞一魚錞二鳯錞一虎錞七其最大者重五十一斤小者七斤淳熙十四年澧州慈利縣周赧王墓傍五里山摧盖古墓也其中藏器物甚多予甥余玠宰是邑得一錞髙一尺三寸上徑長九寸五分闊八寸下口長徑五寸八分闊五寸虎紐髙一寸二分闊寸一分并尾長五寸五分重十三斤紹熙三年予仲子簽書峽州判官於長陽縣又得其一甚大髙二尺上徑長一尺六分闊一尺四寸二分下口長徑九寸五分闊八寸虎紐髙二寸五分足闊三寸四分并尾長一尺重三十五斤皆虎錞也予家蓄古彛器百種此遂為之冠小錞無缺損扣之其聲清越以長大者破處五寸許聲不能渾全然亦可考擊也後復得一枚與大者無小異自峽來寘諸篛籠中取者不謹斷其細匠以藥銲而柵之遂兩兩相對若三禮圖景祐大樂圖所畫形製皆非東坡志林記始興王鑑一節云記者能道其尺寸之詳如此而拙於遣詞使古器形制不可復得其彷彿甚可恨也正謂此云金鐲金鉦丁寧周禮古人以金鐲節鼓司馬職公司馬執鐲軍行鳴鐲詩曰鉦人伐鼓國語曰鼓丁寧春秋傳曰射汰輈而著於丁寧説文曰鐲鉦也韋昭曰丁寧鉦也鄭康成曰鐲如小鐘軍行鳴之以為鼓節盖自其聲濁言之謂之鐲自其儆人言之謂之丁寧自其正人言之謂之鉦其實一也後世合宫縣用之而有流蘇之飾非周制也先儒謂非雅樂之器是不稽四金以節聲樂之過也近代有大銅叠縣而擊之亦此類大金鐃小金鐃小鉦周禮鼓人以金鐃止鼓大司馬卒執長鐃以其聲譊譊然故以鐃名之説文曰鐃小鉦也象鐘形旁有二十四銑飾以流蘇柄中上下通漢鼓吹曲有鐃歌所以退武舞也豈亦周之遺制歟盖其小者似鈴有柄無舌執而鳴之以止鼓大者象鐘形薄旁有二十四銑宫縣用之飾以流蘇盖應律聲而和樂也金鐸周禮鼓人以金鐸通鼓兩司馬執鐸三鼓摝鐸振鐸樂記曰夾振之而駟伐盛威於中國也司馬法曰鐸聲不過琅釋名曰鐸度也號令之限度也則鐸大鈴也舞者振之警衆以為節是金鐸以金為舌所以振武事也舞武事者執之晉荀氏曰趙人牛鐸以諧樂亦得古人之遺也掩上振之為摝摝者止行息氣也陳氏樂書四金通論曰聖人作易參天兩地而倚數因三而三之其數六因兩而兩之其數四鼓陽也而六之參天之數也金隂也而四之兩地之數也六鼓四金之音聲以節聲樂以和軍旅以正田役必掌以鼓人者鼓為樂之君故也盖六鼓之有四金猶六律之有六吕未有能偏廢者也故錞之聲淳鐲之聲濁鐃之聲髙鐸之聲眀淳則隂與陽和故可以和鼓倡而和之故也鐲則承陽而節之故可以節鼓行而節之故也髙則隂勝於陽而可以止鼓退而止之故也眀則隂與陽通而可以通鼓作而通之故也在易之艮位之終止也位之終止則窮故以漸進繼焉既濟治之終止也治之終止則亂故以未濟終焉亦六鼓終於通鼓之意也大司馬言鐲鐃則鳴之而已鐸則或振或摝其用則先鐲而後鐃與此不同者此言理之序大司馬言用之序故也然大司馬不言錞者以大司馬方習戰陳之事非倡和之時故也釋名金鼓校號也將帥號令之所在也左傳曰凡師有鐘鼓曰伐吕氏春秋曰金鼓所以一耳也法令所以一心也孫子曰夫金鼓所以一人之耳目也人既専一則勇者不得獨進怯者不得獨退此一衆之法也由是觀之金鼓之用於軍旅則將軍之氣一軍之形候也况用之以節聲樂者乎後世以角代金非古制也木鐸書曰遒人以木鐸徇於路記曰振木鐸於朝天子之政也小宰正嵗率治官之屬而觀治象小司徒正嵗率其屬而觀教象之法皆徇以木鐸小司宼正嵗帥其屬而觀形象令以木鐸宫正司烜以之修火禁於國中鄉師凡四時之召以之徇於市朝士掌國五禁之法以之徇於朝是木鐸以木為舌所以振文事也故舞文事者執之振文事一也在帝王天子則行而為政在元聖素王則言而為教天將以夫子為木鐸豈非言而教之之事歟金鐸形如鐸有柄金舌木鐸形如金鐸稍矮如甌有柄木舌金之屬胡部陳氏樂書曰周官靺師掌教靺樂旄人掌教舞夷樂鞮鞻氏掌四夷之樂與其聲歌凡祭祀饗燕用焉然則胡部之樂雖先王所不廢其用之未嘗不降之於中國雅部之後也故靺師旄人鞮鞻氏所以居大司樂之末歟後世以觱篥為頭管進之雅部之前失先王所以立樂之方也臣嘗觀漢眀帝時北單于來請音樂詔報曰前單于言先帝時賜呼韓邪竽瑟箜篌皆敗願復裁賜念單于國尚未安方屬武節以攻戰為務竽瑟之用不如良弓利劒故不以齎朕不愛小物於單于也然則匈奴亦通用中國樂矣用舊樂變新聲可也新聲亂舊樂如之何而可方響鐵響梁有銅磬盖今方響之類也方響以鐵為之修八寸廣二寸圓上方下架如磬而不設業倚於架上以代鐘磬人間所用者纔三四寸周正樂載西涼清樂方響一架十六枚具黄鍾大吕二均聲唐武宗朝朱崖李太尉有樂史亷郊嘗擕琵琶於池上彈蕤賔調忽聞芰荷間有物躍出其岸視之乃方響蕤賔鐵也豈指撥精妙能致律吕之然邪和凝有響鐵之歌盖本諸此編鐘唐西涼部非特有方響亦有編鐘焉豈中國之制流入於夷狄邪齊武帝始通使於魏僧䖍謂其兄子儉曰古語謂中國失禮問之四夷計樂亦如之非虛言也正銅鈸銅鈸亦謂之銅盤本南齊穆士素所造其圓數寸中間隆起如浮漚出西戎南蠻扶南髙昌疎勒之國大者圓數尺以韋貫之相擊以和樂唐之燕樂清曲有銅鈸相和之樂今浮屠氏清曲用之盖出於夷音也唐胡部合諸樂擊小銅鈸子合曲西涼部天立部龜兹部安國部康國亦用之然有正與和其大小清濁之辨歟銅鈸銅鈸謂之銅盤本西戎南蠻之器也昔晉人有銅澡盤無故自鳴張茂先謂人曰此器與洛陽宫鐘聲相諧宫中撞鐘故鳴也後驗之果爾大抵音比則和聲同則應非有物使之然也銅鐃浮屠氏所用浮漚器小而聲清世俗謂之鐃其名雖與四金之鐃同其實固異矣銅鉦鉦如大銅疊似銅盤縣於簴而擊之南蠻之器也銅角髙昌之樂器也形如牛角長二尺西戎有吹金者銅角是也陶偘表有奉獻金口角之説謂之吹金豈以金其口而名之邪或云本出吳越非也龍頭角晉書安帝記曰桓元製龍角或曰所謂亢龍角也大抵角頭象龍其詳不可得而知史苓武昌記曰武昌有龍山欲雨上有聲如吹角然則龍頭角豈推本而為之乎傳曰角十二具於鼓左右後列各六具以代金然則四金之志不尚其來舊矣大銅鼓銅鼓鑄銅為之作異獸以為飾惟以髙大為貴面濶丈餘出於南蠻天竺之國也昔馬援南征交趾得駱越銅鼓鑄為馬式此其迹也今祕閣所蔵頗多特其大小異制耳中銅鼓銅鼓之小者或大首纎腹或容體廣面雖以銅為體要須待革成聲也小銅鼓唐樂圖所傳天竺部用之盖以革冐其一面形如腰鼓面廣二尺面與身連遍有蟲魚草木之狀擊之響亮不下鳴鼉唐貞元中驃國進樂亦有是鼓咸通末龔州刺史張直方因葺城池掘得一銅鼓捨於延慶寺以代木魚僖宗朝林藹守髙州鄉墅牧童聞田間蛤鳴欲進捕之一蛤躍入穴中掘而取之得一銅鼓其上隠起多鑄蛙黽之狀豈鳴蛤乃銅鼓之精邪鐵拍板九部夷樂有拍板以節樂句盖本無譜也唐眀皇遣黄幡綽造譜乃於紙上畫兩耳進之上問對曰但有耳道則無失節奏矣韓文公目為樂句後周正樂所傳連九枚今教坊所用六枚盖古今異制也銅鑼後魏宣武以後始好胡音洎於遷都屈茨琵琶五弦箜篌胡􅵰胡鼓銅鈸打沙鑼其聲大抵初頗紓緩而轉躁急盖其音源出西域而被之土木故感其聲者莫不奢滛躁競舉止佻輕或踴或躍乍動乍息蹻脚弹指撼頭弄目情發於中而不能自止此誠新聲之敗舊樂也金之屬俗部陳氏樂書曰俗部之樂猶九流雜家者流非朝廷所用之樂存之不為益去之不為損民間用之雖無害於事然方響十六同為一架雜用四清之聲適足以使民之心滛矣鄭衛之音欲民之移風易俗難矣如欲用之去四清以叶律可也大編鐘二十四枚中編鐘十六枚小編鐘十四枚古者編鐘大小異制有倍十二律而為二十四者大架所用也有合十二律四清而為十六者中架所用也有倍七音而為十四者小架所用也昔宋沇登光宅寺塔見鐸一無風自揺洋洋有聞摘而取之果姑洗編鐘又嘗道逄度支運乘其間一鈴亦編鐘也及配元音皆合其度豈亦識微在金奏乎大鏄鏄本小鐘沈約誤以為大不考經傳之過也馮元樂論謂此鏄鐘廼官帑中所獲者其柄内空扣之不得其聲豈淪翳土莽泉漬壤蝕失其真響耶至其小者差與太常編鐘大小相類云許慎云鏄錞于之屬所以應磬堵以二金樂則鼓鏄以應之博山鐘戴延之西征記鐘大者三十二博山頭形瓖紐作獅子頭鐘身彫鏤龍虎文長二丈厚八寸大面廣一丈二尺小面七尺或作蛟龍或作鳥獸周繞其外陸翽鄷中記其説亦然飛亷鐘趙將軍張珍領邑民徙洛陽六鐘猛簴九龍翁仲銅駞飛亷鐘一没盟津中戴延之西征記曰陜縣城西北二面𢃄河河中對城西北角水湧起銅鐘翁仲頭髮常出水上漲減常與水齊晋軍當至髮不復出惟見水中嗟嗟有聲聞數里翁仲本在城内大司馬門外為賊所徙當西入關至此而没郭縁生述征記曰洛陽太極殿前大鐘六枚父老云曽欲有移此鐘者聚百數長絙挽之鐘聲振地自是莫敢復犯然則太極殿六鐘豈邑民所徙者邪戴延之西征記曰洛陽太極殿前左右各三銅鐘相對大者三十二圍小者二十五圍廣古今五行記曰陜州黄河有銅鐘水大水小常自浮出每晦朔隂雨之日輒鳴聲響悲亮行客聞之莫不愴然儀鐘後魏宫架之制四廂有儀鐘十四簴廢而不用元孚奏去之至隋牛𢎞建言古者鏄鐘據儀禮叩擊為節無合曲之義大射二鏄皆亂擊焉乃依後周十二鎛相生擊之聲韻自此諧矣前北宫縣四廂十六架編黄鍾之磬十四器雖黄鍾而聲實夷則抑又姑洗縣於東北蕤賔列於西南器象差位則調律亦不和矣衡鐘江左黄鍾之宫其東衡鐘其制盖有大於鏄豈鳬氏鐘衡之遺制歟至梁去衡設鏄古文鐘虞喜志林曰吳時於江中得銅一百餘字募求讀者竟無人曉何法盛晉中興書曰義熙十一年霍山崩毁出銅鐘六枚上有古文蝌蚪書人莫能識廣古今五行記曰會稽人陳青於井中得小鐘長七寸二分上有古文十八字其四字可識云會稽岳命郭云愍懐䘮覆元帝中興之應自宣帝至恭帝數十八其為古文則一其所以可識不可識者豈歴年滋乆漫滅不可復知邪然先儒著其事應竊意其未必然也千石鐘漢髙帝廟巨鐘十枚其容受千石撞之聲聞百里説苑曰秦始皇建千石之鐘立萬石之簴九乳鐘傳曰君子鑠金為鐘四時九乳是以撞鐘以知君鐘調是君道得宋均以為九乳象九州豈古人制作皆有所法象邪平陵鐘杜陵鐘漢髙帝平陵宣帝杜陵其鐘皆在長安夏侯征西欲徙諸洛陽重不能致縣在清眀門裏道南其西者平陵鐘也東者杜陵鐘也古之人用鐘非特在陵雖廟亦用之古今樂録曰髙廣中四鐘皆秦時廟鐘也重十二萬斤眀帝徙二鍾在南宫然秦鐘非制毁之可也徙之南宫亦未免啟後世人主之侈心歟華鐘張衡曰發鯨魚鏗華鐘薛綜以為凡鐘欲令大鳴故作蒲牢於上所以擊之者鯨魚有象刻文故曰華鐘也鳴鐘豐山有鐘霜降則鳴黄河有鐘隂雨則鳴氣感之也山海經五行記漢魏殿鐘山摧則鳴類召之也東方朔傳武帝未央宫殿前鐘無故自鳴三日三夜不止帝以問朔朔對曰銅者土之子以隂陽氣類言之子母相感恐山有摧陁者居三日南郡太守以山崩為言異時魏殿前鐘怱大鳴張華曰蜀銅山崩乆之果然啞鐘唐太宗召張文收於太常令與祖孝孫參定雅樂有古鐘十二近代惟有其七餘五者俗號啞鐘莫能通者文收吹律調之聲皆響徹由此觀之近代惟用其七者豈有他哉蔽於不用十二律而溺於二變故也然則二變不可用於鐘律明矣方響其編縣之次與雅樂鐘磬異下格以左為宜其一黄鍾二太蔟三姑洗四中吕五蕤賔六林鍾七南吕八無射上格以右為首其一應鍾二黄鍾之清三太蔟之清四姑洗之清五中吕之清六大吕七夷則八夾鍾此其大凡也後世或以鐵為之教坊燕樂用焉非古制也非可施之公庭用之民間可也單鐸長柄一頭雙鐸兩頭鐸制有二有以木為單頭者今太常用之所以引文武之舞也風鐸後周世宗朝長孫紹遠初為太常廣造樂器無不克諧惟黄鍾不調居嘗患之後因聞浮屠第三層上鳴鐸聲雅合宫調取而配奏之果諧韻矣車鐸賈鐸晉荀朂嘗道於趙聞賈人牛鐸之聲而識之及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國取之晉樂自是克諧真知音者也唐承周隋之亂樂縣獨無徴音李嗣真一旦聞砧聲有應之者後以䘮車鐸入振之於東南隅果掘得一石裁為四器補樂縣之闕云宋説為太樂令知音近代無比太常乆無徴調説考鐘律得之國史補所載云銅鐸晉愍帝建興中晉陵陳寵於田野間得銅鐸五枚皆為龍虎形通禮義纂曰鐸大鈴振之以通鼓又周官以金鐸通鼓形如小鐘有舌將于周官有錞于之制盖樂作則鳴之與鼓相和五代後周已亡其制將于盖當時宫縣内無算樂中用之豈錞于之變體歟形如瓦缶以簴縣之上有獸形如盖鐵笛鐵笛之制未知所起今民間徃徃有之銅管秦咸陽宫有銅人十二座髙三五尺列在一筵上琴筑竽笙各有所執組綬華彩儼若生人筵下有銅管上口髙數尺一管内空有繩大如指使一人吹空管一人紐繩則琴瑟竽筑皆作與真樂無辨西京雜記言之銅琵琶昔元行冲為太常卿時有人於古塜中得銅物似琵琶而身正圓莫有識者元祖之曰此阮咸所造樂具乃命工匠易銅以木其為聲雖清而雅然亦失其故音矣鼓吹鉦説文曰錚金聲也釋名曰金禁也為進退之禁也東觀漢記叚熲有功而還介士鼓吹錚鐸金鼓雷震動地然則鼓吹鉦其來尚矣今太常鼓吹部用之然鉦錚一也特其名異耳繆襲作魏鼓吹曲十六篇韋昭作鼓吹曲十六篇傅元作晉鼓吹曲二十二篇沈約作梁鼓吹曲十二篇然則鼓吹鉦未嘗不協鼓吹曲矣以蛟龍為簴下有趺中縣鉦鉦形圓如銅鑼周禮鼓人所掌金鉦形如鐘與此異警嚴鉦采芑鉦人伐鼓然則警嚴鉦其來尚矣今太常鼓吹部警嚴用之形圓如鼓吹鉦刁斗鎗鎗漢書舊儀中宫衛宫城門擊刁斗又名臣奏曰漢興以來宫殿省闔五六重周衛刁斗纂文曰刁斗特持鈴也然則刁斗者守衛師行之器也以銅作鐎其形如銚而無縁其中所容一斗耳晝炊夜擊李廣軍用焉俗謂之鎗鎗唐宫縣内無算樂非古之制也銅角南史綦母氏貴倖嘗以鼓角横吹自隨張興世嘗為天子鼓角又梁鼓角横吹曲六十有六銅磬銅鉢銅磬梁朝樂器也後世因之方響之制出焉今釋氏所用銅鉢亦謂之磬盖妄名之耳齊梁間文士擊銅鉢賦詩亦梵磬之類胡人之音也銅簴秦始皇斂天下銅鐵作銅簴於咸陽漢髙帝廟有銅簴二魏眀帝徙之洛陽尚在三輔黄圖曰始皇造簴三丈鐘小者千石簴形如衣架鐵磬南齊之器初宫城内却敵樓用鼓磬夜以應更唱太祖以鼓多驚寢遂易以鐵磬其更鼓之變歟鐵簧民間有鐵葉簧削鋭其首塞以蠟宻横之於口呼吸成音豈簧之變體歟金管昔華歆管寧友善曽共鋤園得金管一寧以鋤揮之與瓦礫無異銅律銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行故凡律度量衡用銅者所以同天下齊風俗也要之不若用竹一本於自然而已文獻通考卷一百三十四
