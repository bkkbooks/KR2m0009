body:
  text: 文獻通考卷一百二鄱陽馬端臨貴與著宗廟考十二祫禘後唐長興二年四月禘享於太廟周顯徳五年六月禘於太廟先是言事者以皇家宗廟無祧遷之主不當行禘祫之禮國子司業聶崇義以為前代宗廟追尊未毁皆有禘祫别援故事九條以為其證曰魏明帝以景初三年正月崩至五年二月祫祭明年又禘自兹以後五年為常且魏以武帝為太祖至明帝始三帝而已未有毁主而行禘祫其證一也宋文帝元嘉六年祠部定十月三日殷祠其太學博士議禘云按禘祫之禮三年一五年再宋自髙祖至文帝纔亦三帝未有毁主而行禘祫其證二也梁武帝用謝廣議三年一禘五年一祫謂之殷祭禘祭以夏祫祭以冬且梁武乃受命之君僅追尊四廟而行禘祫則知祭者是追飬之道以時移節變孝子感而思親故薦以首時祭以仲月間以禘祫序以昭穆乃禮之經也非闗宗廟備與不備其證三也唐禮貞觀九年將祔髙祖於太廟國子司業朱子奢請佳禮立七廟是時乃立六廟而行禘祫今撿魯要及通典并禮閣新儀皆載此禮並與實録符同此乃廟亦未備而行禘祫其證四也貞觀十六年四月己酉光禄大夫宗正卿紀國公叚綸卒太宗甚傷悼為不視朝將出臨之太常奏禘祫祭致齋不得哭乃止此眀太宗之時宗廟未備實行禘祫其證五也貞觀二十三年自九􅉄葬回迎神主於太極殿之西階日中行虞祭之禮有司請依典禮以神主祔廟髙宗欲留神主於内寝旦夕供食申在生之敬詔停祔禮英國公李勣等抗表固請曰竊以祖功宗徳飾終之眀典文昭武穆嚴配之眀訓今停祔廟奉徇哀情直據典章乖替為甚又國哀已後而廟停時祭逾月之後須申大祫以唐禮九廟觀之自太宗已上纔足七廟未有毁主將申大祫其證六也貞觀十六年四月癸丑有司言將行禘祭依今禮祫享功臣並得配享於廟廷禘享則不配請集禮官學士等議太常卿􅅊挺議曰其禘及時享功臣皆應不預故周禮六功之官皆大烝而已大烝即祫祭也梁初誤禘功臣左丞駮議武帝允而依行降及周隋俱遵此禮竊以五年再禘合諸天道一大一小通人雅論小則人臣不預大則兼及有功今禮禘無功臣誠謂禮不可易太宗改令從禮載詳此論該曉歴代援據甚眀又貞觀年中累陳禘祫其證七也髙宗上元三年有司祫享於太廟上有七室未有遷主通典㑹要及禮閣新儀具明此禮其證八也中宗景龍三年八月帝將祠南郊欲以􅅊皇后助行郊禮國子司業郭山等議云皇朝舊禮圜丘分祭天地唯有皇帝親拜更無皇后助祭之文及時享并禘祫亦無助祭之事今據中宗之代國子祭酒等舉禘祫之文稱是皇朝舊禮又眀太宗髙宗之朝皆行禘祫其證九也疏奏從之宋制三年一祫以孟冬五年一禘以孟夏仁宗嘉祐四年冬十月大祫於太廟先是上將親祫下禮官集議東鄉之位同判宗正寺趙良規請正太祖東鄉位而知太常禮院韓維以為宜如祖宗故事虚東鄉之位便時禮官不敢决乃與待制以上臺諫官同議曰太祖為受命之君然僖祖以降四廟在上故大祫上列昭穆而虚東鄉魏晋以来已此用禮今親享之盛宜如舊便詔恭依禮官張洞韓維又言唐郊祀志載禘祫祝文自獻祖至肅宗所配皆一后惟睿宗二后蓋昭成眀皇母也續曲臺禮有别廟皇后合食之文蓋未有夲室遇祫享即祔祖姑下所以大順中三太后配列禘祭博士商盈孫以謂誤認曲臺禮意每室既有定配則餘后不當参列請依奉慈例學士承㫖孫抃等八人曰春秋傳大祫者何合祭也未毁廟之主皆升合食於太祖是以國朝事宗廟百有餘年至祫之日别廟后主皆升合食非無典據祥符五年已曾定議禮官著酌中之論先帝有恭依之詔他年有司攝事四后合食今甫欲親祫四后見黜不亦疑於以禮之煩也受命之君以議禮制典為重繼體之君以承志遵法為美先帝議之制之陛下承之遵之臣曰可矣宗廟之祭至尊至重茍未能盡祖宗之意則莫若守其舊禮疑文偏說未可盡據傳曰祭從先祖又曰有其舉之莫敢廢也臣等愚以謂如其故便學士歐陽脩吳奎等九人曰古者宗廟之制皆一帝一后後世有以子貴者始著並祔之文其不當祔者則又有别廟之祭夲朝禘祫乃以别廟之后列於配后之下非惟於古無文於今又有四不可淑徳太宗之元配也列於元徳之下章懐真宗之元配也列於章懿之下一也升祔之后統以帝樂别廟諸后以夲室樂二也升祔之后同牢而祭牲噐祝冊一統於帝别廟諸后乃從専享三也升祔之后聫席而坐别廟諸后位乃相絶四也章獻章懿在奉慈廟每遇禘祫夲廟致享最為得禮若四后各祭於廟則其尊自申而於禮無參差不齊之失以為行之已乆重於改作則是失禮之舉無復是正也請從禮官於是劉敞特奏曰今羣臣不務推原春秋之法而獨引後儒疑似之說不務講求夲朝之故而専倡異代難通之制不務將順主上廣孝之心而輕議宗廟乆行之儀欲擯隔四后使永不得合食臣切恨之夫宗廟之禮神靈之位豈可使有後悔哉當留聖念初上春秋髙議者恐上勞拜起禮官遂造此議上㣲聞之及得敞奏謂近臣曰朕初謂禮當然茍以拜起為煩朕猶能之何憚也乃詔别廟四后祫享如舊俟大禮畢别加討論楊氏曰伏讀國朝㑹要仁宗皇帝嘉祐四年三月内出御札曰惟祫享之義著經禮之文大祭先王合食祖廟盛廸嘗之薦深肅僾之懐追孝奉先莫斯為重兹享之廢歴年居多有司所行出於假攝禮之將墜朕深惜之大哉王言此仁聖之君至孝至敬之心之所形而不能自已也當時建眀此議出於富公弼弼之言曰國朝三嵗必親行南郊之祀其於事天之道可謂得禮獨於宗廟祗遣大臣攝行時享而已親祀未講誠為闕典檢書今年冬至當有事於南郊又孟冬亦當合享於太廟欲望詔有司講求祫祭大禮所有降赦推恩則並用南郊故事富公弼之言可謂一言以為知一言以為不知者也夫聖王事親如事天事天如事親以祫享之禮比於南郊誠哉是言也然南郊推恩肆赦本非古典乃人主一時之優恩其後遂以為故事今孟冬祫享冬至南郊二大禮相繼而並行祫享推恩南郊可復行乎祫享肆赦南郊可復行乎南郊而不推恩肆赦又非祖宗之故事於是祫享之禮行而南郊因而權罷是雖有以盡宗廟親祫之誠而又失南郊祀天之禮夫豈聖主之本心然哉蓋欲矯其輕則事從其重而遂至於過重過重則不可繼也夫因有原廟則宗廟之禮必至於輕欲矯其輕則宗廟之禮必至於過重不惟過重而已自是親祫止行於一時而其後遂輟而不舉此則矯輕過重而終於不可繼也夫三年一祫此宗廟祀典之大者其實亦宗廟之常禮也常禮則非異事也何欲矯其輕而遂至於過重而終至於不可繼哉故曰輕宗廟而重原廟其失一也神宗熙寧八年太常禮院言已尊僖祖為太廟祖孟夏禘祭當正東向之位又言太廟禘祭神位已尊始居東鄉之位自順祖而下昭穆各以南北為序自今禘祫著為定禮詔恭依元豐四年詳定郊廟奉祀禮文所言禘祫之義存於周禮春秋而不著其名行禮之年經皆無文唯公羊𫝊曰五年而再盛祭禮緯曰三年一祫五年一禘而鄭氏徐邈又分為二說為鄭氏之說則曰前三後二謂禘後四十二月而祫祫後十八月而禘為徐邈之說則曰前二後三謂二祭相去各三十箇月駮鄭氏者則曰三年而祫為月不足駮徐氏者則曰禘在祫前則是三年而禘祫在禘後則是二年而祫以二說考之惟鄭氏曰魯禮三年䘮畢祫於太廟明年禘於羣廟自爾之後五年而再盛祭一祫一禘由此言之鄭氏依倣魯禮推明王制實為有據本朝慶歴初用徐邈說每三十月一祭熙寧八年既禘又祫此有司之失也請今十八月而禘禘四十二月而祫庻㡬舉禮不繁事神不瀆太常禮院言唐開元中禮官用晋徐邈之說以二祭相去各三十月合五年再盛祭之說以為禘祫之數本朝自慶歴以来皆三十月而一祭至熙寧五年後始不通計遂至八年禘祫併在一嵗昨元豐三年四月已行禘禮今年若依舊例十月行祫享邪比年頻祫復踵前失請依慶歴以来舊制通計年數皆三十月而祭詔依見行典禮十月詳定禮文所言古者祼獻饋食禴祠烝嘗並為先王之享未嘗廢一時之祭故孔頴逹正義以為天子夏為大祭之禘不廢時祭之礿秋為大祭之祫不廢時祭之嘗則王禮三年一祫與其禘享更為時祭國朝沿襲故常禘祫之月不行時享久未釐正非古之制請每禘祫之月雖以大祭仍行時享以嚴天子備禮所以丕崇祖宗之義其郊禮親祠凖此從之五年帝謂宰臣曰禘者所以審諦祖之所自出故禮不王不禘秦漢以来譜牒不明莫知祖之所自出則禘禮可廢也宰臣蔡確等以為聖訓得禘之夲意非諸儒所及乃詔罷禘享於是詳定禮文所言按記曰禮不王不禘王者禘其祖之所自出以其祖配之若舜禹祖髙陽世系出自黄帝則虞夏禘黄帝以髙陽氏配商祖契出自帝嚳則商人禘嚳以契配周祖文王亦出自嚳故周人禘嚳以文王配虞夏商周四代所禘皆以帝有天下其世系所出者明故追祭所及者逺也藝祖受命祭四廟推僖祖而上所自出者譜失其𫝊有司因仍舊說三年一祫五年一禘禘與祫皆合羣廟之主綴食於始祖失禮莫甚臣等竊謂國家世系所𫝊與虞夏商不同既求其祖之所自出而不得則禘禮當闕必推見祖系所出乃可以行從之禮文所又言古者天子祭宗廟有堂事焉有室事焉按禮祝延尸入奥灌之後王乃出迎牲延尸主出於室坐於堂上始祖面南昭在東穆在西乃行朝踐之禮是堂事也設饌於堂入復延主入室始祖東面昭面南穆面北徙堂上之饌於室中乃行饋食之禮是室事也請每行大祫堂上設南面之位室中設東面之位詔俟廟制成取㫖徽宗大觀四年議禮局言周官天府掌祖廟之守藏凡國之玉鎮大寳噐藏焉若有大祭則出而陳之既事藏之說者以謂大祭禘祫也國朝嘉祐四年將行祫享議者請陳瑞物及陳國之寳元豐中有司請親祠太廟令户部陳嵗之所貢以充庭實世祖神宗皆可其奏今請祫享陳設應瑞寳貢物可出而陳者並令有司依嘉祐元豐詔㫖凡親祠太廟凖此從之又言古者祫祭朝踐之時設始祖之位於户西南面昭在東穆在西相鄉而坐薦豆籩脯醢王北面而事之此堂上之位也徙饌之後設席於室在户内西方東面為始祖之位次北方南面布昭席次南方北面布穆席其餘昭穆各以序此室中之位也設始祖南方之位而朝踐焉在禮謂之堂事設始祖東向之位而饋食焉在禮謂之室事考漢舊儀宗廟三年大祫祭子孫諸帝以昭穆座於高廟毁廟神皆合食設左右座髙祖南面則自漢以前堂上之位未嘗廢也元始以後初去此禮専設室中東向之位晉宋隋唐所謂始祖位者不過論室中之位耳且少牢饋食大夫禮也特牲饋食士禮也以儀禮考之大夫士祭禮無薦腥朝踐之事故惟饋食於室至於天子祭宗廟則堂事室事皆舉堂上位廢而天子北面事神之禮缺矣伏請每行大祫堂上設南面之位室中設東面之位始祖南面昭穆東西相鄉始祖東面則昭穆南北相向以應古義詔依所奏楊氏曰愚按大祫則如朱子周大祫圖時祫則如朱子周時祫圖堂上之所以異於室中也太祖南鄉昭西鄉穆東向而已髙宗建炎二年車駕南廵祫享於洪州紹興二年祫享於温州吏部員外郎董弅言臣聞戎祀國之大事而宗廟之祭又祀之大者也大祀固不一而禘祫為重祫大禘小則祫為莫大焉在禮三年一祫五年一禘審諦其祖之所自出謂之禘列羣廟而合食於太祖謂之祫一禘一祫循環無窮有國家者未始或廢今戎事方飭祭祀之禮未暇徧舉然事有違經戾古上不當天地神祇之意下未合億兆黎庻之心特出於一時大臣好勝之臆說而行之六十年未有知其非者顧雖治兵禦戎之際正厥違誤謂宜不緩者仰惟太祖皇帝受天明命削平僭偽混一區宇立極居尊建萬世不㧞之基垂子孫無窮之緒即其功徳所起則有同乎周之后稷乃若因時特起之蹟無異乎漢之髙帝魏晋而下莫可擬倫是宜郊祀以配天宗祀以配上帝祫享以居東鄉之尊𫝊千萬世而不易者也國初稽前代追崇之典止及四世故於祫享用魏晋故事虚東鄉之位逮至仁宗皇帝嘉祐四年親行祫享之禮嘗詔有司詳議太祖東鄉用昭正統之緒當時在廷多洪儒碩學僉謂自古必以受命之祖乃居東鄉之位本朝太祖乃受命之君若論七廟之次有僖祖以降四廟在上當時大祫止列昭穆而虚東鄉蓋終不敢以非受命之祖而居之允恊禮經暨熙寧之初僖祖以世次當祧禮官韓維等據經有請援證明白適王安石用事奮其臆説務以勢勝乃俾章衡建議尊僖祖為始祖肇居東鄉神宗皇帝初未為然委曲訪問安石乃謂推太祖之孝心固欲尊宣祖而上孝心宜無以異則尊僖祖必當祖宗神靈之意神宗意猶未決博詢大臣故馮京奏謂士大夫以太祖不得東鄉為恨安石肆言以折之已而又欲罷太祖郊配神宗以太祖開基受命不許安石終不然之乃曰夲朝配天之禮不合禮經一時有識之士莫敢與辯元祐之初翼祖既祧正合典禮至於崇寧宣祖當祧適蔡京用事一遵安石之術乃建言請立九廟自我作古其已祧翼祖及當祧宣祖並即依舊循沿至今太祖皇帝尚居第四室遇大祫處昭穆之列識者恨焉臣竊謂王者奉先與臣庶異必合天下之公願垂萬世之宏規匪容私意於其間祖功宗徳之外親盡迭毁禮之必然自古未有功隆創業為一代之太祖而列於昭穆之次者也亦未有非受命而追崇之祖居東鄉之尊厯百世而不遷者也又言漢魏之制太祖而上毁廟之主皆不合食唐以景帝始制故規規然援后稷為比而獻懿乃在其先是以前後議論紛然乍遷乍祔使當時遂尊神堯為太祖豈得更有異論其後廟制既定始以獻懿而上毁廟之主藏於興聖徳眀之廟遇祫即廟而享焉是為别廟之祭以全太祖之尊蓋合於漢不以太公居合食之例魏晋武宣而上廟堂皆不合食之義當時剛勁如顔真卿儒宗如韓愈所議雖各有依據皆不能易陳京之說以其當理故也太常丞王普奏曰僖祖非始封之君而尊為始祖太祖實創業之主而列於昭穆其失自熙寧始宣祖當遷而不遷翼祖既遷而復祔其失自崇寧始為熙寧之說則曰僖祖而上世次不可知宜與稷契無異然商周之祖稷契謂其始封而王業之所由起也稷契之先自帝嚳至於黄帝譜系甚眀豈以其上世不𫝊而遂尊為始祖邪為崇寧之說則曰自我作古而已夫事不師古尚復何言宜其變亂舊章而無所稽考也臣謹按春秋書桓宫僖宫災譏其當毁而不毁也書立武宫煬宫譏其不當立而立也然則宗廟不合於禮聖人皆貶之矣又况出於一時用事之臣私意臆說非天下之公論者豈可因循而不革哉臣竊惟太祖皇帝始受天命追崇四廟以致孝享行之當時可也至於今日世逺親盡迭毁之禮古今所同所當推尊者太祖而已董奏請深得禮意而其言尚有未盡盖前日之失其甚大者有二曰太祖之名不正大禘之禮不行是也今日之議其可疑者有四曰奉安之所祭享之期七世之數感生之配是也古者廟制異宫則太祖居中而羣廟列其左右後世廟制同堂則太祖居右而諸室皆列其左古者祫享朝踐於堂則太祖居右而諸室皆列其西饋食於室則太祖東鄉而昭穆位於南北後世祫享一於堂上而用室中之位故唯以東鄉為太祖之尊焉若夫羣廟迭毁而太祖不遷則其禮尚矣臣故知太祖即廟之始祖是為廟號非諡號也惟我太宗嗣服之初太祖皇帝廟號已定雖更累朝世次猶近每於祫享必虚東鄉之位以其非太祖不可居也迨至熙寕又尊僖祖為廟之始祖百世不遷祫享東鄉而太祖常居穆位則名實舛矣倘以熙寧之禮為是則僖祖當稱太祖而太祖當改廟號此雖三尺之童知其不可至於太祖不得東鄉而廟號徒為虚稱則行之六十餘年抑何理哉然則太祖之名不正前日之失大矣大𫝊曰禮不王不禘王者禘其祖之所自出以其祖配之祭法所謂商人周人禘嚳是也商以契為太祖嚳為契所自出故禘嚳而以契配焉周以稷為太祖嚳為稷所自出故禘嚳而以稷配焉儀禮曰大夫及學士則知尊祖矣諸侯及其太祖天子及其始祖之所自出蓋士大夫尊祖則有時祭而無祫諸侯及其太祖則有祫而無禘禘其祖之所自出惟天子得行之春秋書禘魯用王禮故也鄭氏以禘其祖之所自出為祭天又謂宗廟之禘毁廟之主合食於太祖而親廟之主各祭於其廟考之於經皆無所據惟王肅之說得之前代禘禮多從鄭氏國朝熙寧以前但以親廟合食為其無毁廟之主故也惟我太祖之所自出是為宣祖當時猶在七廟之數雖禘未能如古然亦不敢廢也其後尊僖祖為廟之始祖而僖祖所出系序不著故禘禮廢自元豐宗廟之祭止於三年一祫則是以天子之尊而俯同於三代之諸侯瀆亂等威莫此為甚然則大禘之禮不行前日之失大矣臣愚欲乞考古驗今斷自聖學定七廟之禮成一王之制自僖祖至於宣祖親盡之廟當遷自太宗至於哲宗昭穆之數已備是宜奉太祖神主第一室永為廟之始祖每嵗告朔薦新止於七廟三年一祫則太祖正東鄉之位太宗仁宗神宗南鄉為昭真宗英宗哲宗北鄉為穆五年一禘則迎宣祖神主享於太廟而以太祖配焉如是則宗廟之事盡合禮經無復前日之失矣乃若可疑者臣請辨之昔唐以景帝始封尊君太祖而獻懿二祖又在其先當時欲正景帝東鄉之位而議遷獻懿之主則或謂藏之夾室或謂毁瘞之或謂遷於陵所或謂當立别廟卒從陳京之說祔於徳眀興聖之廟蓋臯陶凉武昭王皆唐之逺祖也故以獻懿祔焉惟我宣祖而上正如唐之獻懿而景靈崇奉聖祖之宫亦徳眀興聖之比也臣竊謂四祖神主宜放唐禮祔於景靈宮天興殿方今廵幸或寓於天慶觀聖祖殿焉則奉安之所無可疑者昔唐祔獻懿於興聖遇祫即廟而享之臣竊謂四祖神主祔於天興大祫之嵗亦當就行享禮既足以全太祖之尊又足以極追逺之孝考之前代實有據依則祭享之期無可疑者禮曰天子七廟三昭三穆與太祖之廟而七則是四親二祧止於六世而太祖之廟不以世數為限也書曰七世之廟可以觀徳蓋舉其總數而言非謂七廟之祖廟猶未毁也是以周制考之在成王時以亞圉太王文王為穆以公叔祖𩔖王季武王為昭并太祖后稷為七廟焉髙圉於成王為七世祖已在三昭三穆之外則其廟毁矣惟我宣祖雖於陛下為七世祖亦在三昭三穆之外則其禮當遷無可疑者又言宗廟之禮有天下者事七世百王之所同也而崇寧以来増為九世三年一祫則叙昭穆而合食於祖百王之所同也而去冬祫享祖宗並為一例謂之随宜設位夫増七廟而為九踵唐開元之失其非禮固已甚眀至於不序昭穆而强名為祫則厯代蓋未嘗聞究其所因直以廟之前楹迫狭憚於増廣而已夫重葺數椽之屋輕變千古之禮臣所未諭且君子將營宫室宗廟為先今行朝官府下逮諸臣之居每加營繕顧於宗廟獨有所靳節用之術豈在是乎大抵前日之肆為紛更則曰自我作古今日之務為茍簡則曰理合隨宜要皆無所據依不可為法臣今所陳定七廟之禮正太祖之位如或上合聖意願詔有司他年祫享必叙昭穆以别東鄉之尊勿以去冬所行為例庶㡬先王舊典不廢墜於我朝使天下後世無得而議詔侍從臺諌禮官赴尚書省集議聞奏時侍從臺諫禮官等皆謂太祖開基創業為夲朝太祖正東鄉之位為萬世不祧之祖理無可疑廖剛謂四廟神主當遷之别宫祫祭則即而享之五年一禘則當禘僖祖任申先謂祫祭既正太祖東鄉之位則大禘之禮僖祖實統系之所自出太祖暫詘東鄉而以世次叙位在禮為當晏原復謂正太祖東鄉之位以遵祫享之正禮僖祖而下四祖則參酌漢制别為祠所而異其祭享無亂祫享之制議上不果行自是遇祫享設幄僖祖仍舊東鄉順祖而下以昭穆為序孝宗乾道三年禮部太常寺言孟冬祫享其别廟懿節皇后神主依禮例合祔於神宗室祖姑之下安穆皇后神主安恭皇后神主合祔於徽宗室祖姑之下詔禮部秘書省國史院官參明典故擬定申尚書省李燾等擬乞以懿節皇后神座設於神宗幄内欽慈皇后之右少却安穆皇后安恭皇后神座設於徽宗幄内顯仁皇后之左皆少却其籩豆鼎俎并祝辭等别設並如舊制仍候酌獻祖宗位畢方詣三后位詔從之吏部尚書汪應辰等言凖尚書省送到太常少卿林栗劄子祫享之禮古人不以别廟祔姑而祔於祖姑者以别嫌也按曲臺禮别廟神主祔於祖姑之下有三人則祔於親者既祔於祖姑又各祔於親者之下明共一幄同享一位之薦不得别設幄次矣從来有司失於檢照将别廟神主祔享之位别設幄次若别設幄次當在舅姑之下豈得上祔於祖姑乎今来太廟祫享懿節皇后祔於神宗幄祖姑之下别設幄次在哲宗徽宗之上此其不可者一也神宗與三后共享一位犧牲粢盛之薦而懿節来祔獨享其一今来安穆皇后安恭皇后各設幄次祔於徽宗幄祖姑之下徽宗與三位共享一位之薦而安穆安恭共享其二揆之人情夫豈相逺此其不可者二也且祔之言附也孫婦之於祖姑其尊卑絶矣禮無不順祔豐而尊殺祔伸而尊屈將得為順乎栗竊謂别廟神主祔於祖姑之下宜執婦禮不得别設幄次陳其籩豆列其鼎俎亦不當别致祝祠但於夲幄祖姑之下添入别廟祔享某皇后某氏於禮為稱淳熙元年詔議祫享東鄉之位吏部侍郎趙粹中言謹考前代七廟異宫合享則太祖東鄉始得一正太祖之尊倘祫享又不得東鄉則開基之祖無時而尊矣乃者紹興五年董弅建議乞正藝祖東鄉之尊謂太廟世數已備而藝祖猶居第四室乞遵典禮正廟制遇祫享則東鄉得㫖下侍從臺諌集議既而王普復有請當時集議如孫近李光折彦質劉大中廖剛晏原復王俣劉寧正胡文修梁汝嘉張致逺朱震任申先何慤楊晨莊必强李弼直皆以其議悉合於禮藝祖東鄉無疑乞行釐正時臣叔父渙任將作監丞因陛對奏陳甚力據引詩禮正文乞酌漢太公立廟萬年南頓君立廟章陵故事别建一廟安奉僖順翼宣四位烝祫禘嘗並行别祀而太祖皇帝神主自宜正位東鄉則受命之祖不屈其尊逺祖神靈永有常奉光堯皇帝深以為然即擢董弅為侍從叔父渙為御史是時趙霈為諌議大夫以議不已出倡邪說以害正然亦不敢以太祖東鄉為非不過以徽宗在逺宗廟之事未嘗専議以此宣言脅制議者而欲祫享虚東鄉今若稽以六經典禮三代之制度定藝祖為受命之祖則三年一祫當奉藝祖東鄉始尊開基創業之主其太廟常享則奉藝祖居第一室永為不祧之祖若漢之髙祖其次奉太宗居第二室永為不祧之宗若周之武王若僖順翼宣追崇之祖一稽舊禮親盡而祧四祖神主别議遷祔之所則臣亦嘗考之祔於徳眀興聖之廟唐制也立太公南頓君别廟漢制也前日王普既用徳眀興聖之說而欲祔於景靈宫天興殿朱震亦乞藏於夹室今若酌三代兩漢别廟之制與唐陳京之說或别建一廟為四祖之廟若欲事省而禮簡或祔天興殿或祗藏太廟西夹室毎遇祫享則四祖就夹室之前别設一幄而太祖東鄉皆不相妨庻得聖朝廟制盡合典禮詔禮部太常寺討論既而衆議不同乃詔有司止遵見行祫享舊制行禮紹熙五年閠十月時寧宗已即位詔别建廟遷僖順翼宣四帝神主太廟以太祖正東鄉之位孟冬祫享先詣四祖廟室行禮次詣太廟逐幄行禮詳見天子廟制孟冬祫享儀注時日太廟三年一祫以孟冬之月其年太常寺預於隔季以孟冬時享前擇日祫享太廟闗太史局擇日報太常寺太常寺參酌訖具時日散告齋戒前享十日受誓戒於尚書省其日五鼓贊者設位版於都堂下初獻官在左刑部尚書在右並南向亞終獻禮官位於其南稍東北向西上監察御史位於其西稍北東向户部兵部工部尚書押樂太常卿光禄卿押樂太常丞光禄丞位於其南稍西北向東上凡設太常丞光禄丞位皆稍却奉禮協律郎太祝太官令内常侍内謁者薦香燈官宫闈令扶持内侍捧腰輿内侍位於其東西向北上捧俎官位其後質明贊者引行事執事官就位立定禮直官引初獻降階就位禮直官贊揖在位者對揖初獻搢笏讀誓文云十月某日孟冬祫享太廟各揚其職不共其事國有常刑讀訖執笏禮直官贊奉禮郎協律郎太祝太官令内常侍以下先退餘官對拜乃退散齋七日治事如故宿於正寢不弔䘮問疾作樂判書刑殺文書決罰罪人及與穢惡致齋三日光禄卿丞太官令齋一日二日於夲司宗室於睦親宅都㕔如相妨即於宗學餘官無夲司者並於太廟齋房内侍以下亦於太廟齊房致齋貭明至齋所惟享事得行其餘悉禁前享一日質眀俱赴祠所齋房官給酒饌享官已齋而闕通攝行事陳設除設權奉安别廟皇后神主幄次南神門外東向及不設皇帝位版上設三獻神官位外並同朝享太廟别廟神主過太廟前享一日捧擎腰輿内侍官援衞親事官等宿於太廟齋房享日丑前五刻所司陳行障坐障等於别廟東偏門外設腰輿於殿之下南向少頃禮直官贊者分引内常侍以下於殿庭北向西上重行立别廟内常侍行事禮直官引餘官皆贊者引贊者曰再拜内常侍以下皆再拜夲廟宫闈令升殿開室捧懿節皇后安穆皇后安恭皇后神主至室門次引内常侍北向俛伏跪稱攝内常侍臣某言請懿節皇后安穆皇后安恭皇后神主祫享於太廟降殿乗輿奏訖俛伏興凡内常侍奏請准此又宫闈令捧接神主内常侍前引置於輿内常侍以下分左右前導詣太廟南神門外幄次東向權奉安援衞親從官等至太廟門外止行障坐障至太廟南門外止内常侍以下俟導引詣殿上神幄如儀省牲噐儀同朝享太廟晨祼享日丑前五刻行事用丑時七刻祠祭官引宫闈令入詣廟庭北向立祠祭官曰再拜宫闈令再拜升殿開室整拂神幄帥其屬掃除退就執事位次引薦香燈官入詣殿庭北向立凡宫闈令薦香燈官行事皆祠祭官引祠祭官曰再拜薦香燈官再拜升殿各就職事位次樂正帥工人二舞人就位登歌工人俟監察御史㸃閲訖升西階各就位次太官令光禄丞帥其屬實饌具畢光禄丞還齋所次引光禄卿入詣殿庭席位北向立贊者曰再拜光禄卿再拜升殿㸃視禮饌畢次引監察御史升殿㸃閱陳設紏察不如儀凡㸃視及㸃閱皆先詣僖祖位以至次位光禄卿還齋所餘官各服祭服次引行事執事官詣東神門外揖立定禮直官贊揖次引押樂太常卿太常丞協律郎次引監察御史奉禮郎太祝太官令入就殿下席位北向立次引初獻户部兵部工部尚書終獻禮官入就殿下席位西向立祭官於殿上贊奉神主次引薦香燈官入室搢笏於祏室内奉帝主出詣殿上神幄設於座奉神主詣神幄伺於几後啟匱設於座以白羅巾覆之執笏退復執事位次引宫闈令奉后主如上儀以青羅巾覆之退復執事位初殿上贊奉神主内常侍以下於太廟南門外神幄奉别廟懿節皇后安穆皇后安恭皇后神主腰輿入南神西偏門至殿下南向内常侍以下北向立贊者曰再拜内常侍以下再拜俟殿上奉神主訖内常侍稍前奉懿節皇后安穆皇后安恭皇后神主祫享於太廟奏訖退詣懿節皇后安穆皇后安恭皇后神主前奏請降輿升殿奏訖宫闈令捧神主升自泰階至殿上夲廟宫闈令捧接懿節皇后神主祔於神宗神幄内欽慈皇后神主之右安穆皇后安恭皇后神主祔於徽宗神幄内顯仁皇后神主之右各設於座奉神主設於座並如上儀内常侍以下退詣東神門内道南西向立以俟祠祭官於殿上贊奉神主訖禮直官稍前贊有司謹具請行事贊者曰再拜在位者皆再拜次引監察御史押樂太常卿太常丞奉禮協律郎太祝太官令各就位立定太官令就僖祖位尊彛所次引初獻詣盥洗位北向立搢笏盥手帨手執笏詣爵洗位北向立搢笏洗瓚拭瓚以授執事者執笏升殿詣僖祖位尊彛所東向立若南北向神御尊彛所即皆西向立酌獻准此執事者以瓚授初獻初獻搢笏跪執瓚執彛者舉羃太官令酌􅉱鬯訖先詣順祖位尊彛所北向立若詣北向神位尊彛所即南向立酌獻准此初獻以瓚授執事者執笏興詣僖祖神位前西向立若南向神位即北向立若北向神位即南向立酌獻准此搢笏跪次引奉禮郎搢笏南向跪執事者以瓚授奉禮郎奉禮授初獻初獻受瓚以鬯祼地奠訖以瓚授執事者次執事者以幣授奉禮郎奉禮郎奉幣授初獻訖執笏興先詣順祖神位前西向立若北向神位即東向立初獻受幣奠訖執笏俛伏興少退再拜次詣順祖位翼祖位宣祖位太祖位太宗位真宗位仁宗位英宗位神宗位哲宗位徽宗位欽宗位懿節皇后位安穆皇后位安恭皇后位祼鬯奠幣並如上儀訖俱復位協律郎跪俛伏舉麾興工鼓柷宫架作興安之樂孝熙昭徳之舞九成偃麾戞敔樂止凡樂皆協律郎跪俛伏舉麾興工鼓柷而後作偃麾戞敔而後止既晨祼薦香燈官入取毛血於神位前太官令取肝以鸞刀制之洗於􅉱鬯貫之以膋燎於爐炭薦香燈官以肝膋詔於神位又以墮祭三祭於茅苴退復位饋食享日有司帥進饌者詣厨以七升牛於俎肩臂臑在上端肫胳在下端正脊一直脊一横脊一長脊一短脇一代