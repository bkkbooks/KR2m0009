body:
  text: 文獻通考卷十三鄱陽馬端臨貴與著職役考二歴代鄉黨版籍職役元祐元年二月門下侍郎司馬光言按因差役破産者惟鄉戸衙前有之自餘散從承符弓手手力耆戸長壯丁未聞有破産者其鄉户衙前所以破産者盖由山野愚戅之人不能幹事或因水火損破官物或為上下侵欺乞取是致欠折備償不足有破産者至於長名衙前在公精熟每經重難别得優輕塲務酬奬往往致富何破産之有又向者役人皆上等戸為之其下等單丁女戸及品官僧道夲來無役今更使之一槩輸錢則是賦斂愈重也故自行免役法來富者差得自寛而窮者困窮日甚又監司守令之不仁於僱役人之外多取羡餘以希恩賞此農民之所以重困也臣愚以為莫若直降命􅃯應天下免􅃥錢一切並罷其諸役人並依熈寧以前舊法人數委夲縣令佐親自掲五等丁産簿定差之人若正身自願充役者即令入役不願充役者任便選僱有行止人自代其僱錢多少私下商量若所僱人逃亡即勒正身别僱若將帶官物勒正身賠填如此則諸色公人盡得其根柢行止之人少敢作過官中百事無不修舉其見僱役人候差到新役人各放逐便如衙前一役雖號重難近來條貫頗為優假諸公庫設厨酒庫茶酒司並差將校勾當諸上京綱運召得替官員或差使臣殿侍軍將管押其雜色及畸零之物差将校或節級管押衙前若無差遣不聞更有破産之人若今日差充衙前料民間賠備亦少於向日若猶以衙前為力難獨任即乞依舊於官戸僧道寺觀單丁女戸有屋業毎月掠錢及十五貫莊田中年所收斛斗及百石以上者隨貧富等第出助役錢不及此數者與免放其助役錢令逐州樁管約夲州衙前重難分數即行支給然尚慮天下役人利害逐處不同乞指揮下諸路轉運司下諸州縣限五日内具利害申夲州州限一月申轉運司夲司𩔖聚限一季奏聞委執政官参詳施行是日三省樞密院同進呈得旨依初光上奏左僕射蔡確言此大事當與樞密院共之故同進呈知樞宻院章惇取光所奏凡疎畧未盡者枚數而駁奏之尚書左丞吕公著言光所建明大意已善其間不無疎畧未備惇所言專欲求勝不顧朝廷大體乞選差近臣三四人專切詳定聞奏從之始司馬光奏乞復行差􅃥舊法既得㫖依奏知開封府蔡京即用五日限令開封祥符兩縣如舊􅃥人數差一千餘人充役亟詣東府白光光喜曰使人人如待制何患法之不行議者謂京但希望風㫖茍欲媚光非事實也蘇轍言京明知熈寧以前舊法役人數目顯有冗長並不依近降指揮相度申請便盡數差撥及朝旨夲無日限輒敢差人監勒於數日内蹙廹了當故意擾民以害成法乞賜行遣以示懲戒監察御史王巖叟言請復差鄉戸主管天下官物公家則免侵陷在私亦脫刑禍宜獨可於衙前大役立夲等相助法以盡變通之利借如一邑之中當應大役者百家而歲取十人則九十家出力為助明年易十戸復如之則大役無偏重之弊矣其於百色無名之差占一切非理之資陪悉用熙寧新法禁之雖不助猶可為今所謂助者不過助受役之家嵗用而已無厚斂也中書舍人蘇軾言先帝初行􅃥法取寛剰錢不得過二分以備災傷而有司奉行過當通計天下乃十四五然行之㡬十六七年常積而不用至三十餘萬貫石先帝聖意固自有在今日所當追探其意以興長世無窮之利熙寧中嘗行給田募役法其法以係官田如退灘戸絶没納之𩔖及用寛剰錢買民田以募役人大畧如邉郡弓箭手臣知宻州親行其法先募弓手民甚便之曾未半年此法復罷蓋大臣利於速成且利寛剰錢以為他用故不果行因列其五利詔並送詳定所右司諌蘇轍言復行差役其應議者有五其一曰舊差鄉戸為衙前破散人家甚如兵火自新法行天下不復知有衙前之患然而天下反以為苦者其弊自是農家嵗出役錢為難及許人添剗見賣坊塲遂有輸納不納者耳向使止用官賣坊塲一色課入以僱衙前自可足辦而他色役人止如舊法則為利較然矣初疑衙前多是浮浪投僱不如鄉差税户可託然行之十餘年投僱者亦無大敗闕不足以易鄉差衙前之害今畧計天下坊塲錢一嵗可得四百二十餘萬若立定中價不許添剗三分減一尚有二百八十餘萬貫而衙前支費及召募非泛綱運一嵗共不過一百五十餘萬緡則是坊塲之直自可了辦衙前百費何用更差鄉户今制盡復差役知衙前苦無陪備故以鄉戸為之至於坊塲元無明降處分不知官自賣邪抑仍用以酬奬衙前也若仍用以酬奬即召募部綱以何錢應用若不與之錢即舊名重難鄉户衙前仍前自備為害不小其二坊郭人戸舊苦科配新法令與鄉户並出􅃥錢而免科配其法甚便但敷錢太重未為經久之法乞取坊郭官戸寺觀單丁女户酌今役錢減定中數與坊塲錢用以支僱衙前及召募非泛綱運外今樁備募僱諸色􅃥人之用其三乞用見今在人數定差熈寧未減定前其數實冗長不可遵用其四熈寧以前散從弓手手力諸役人常苦迓送自新法以來官吏皆請僱錢􅃥人既便官亦不至闕事乞仍用僱法其五州縣胥吏並量支僱錢募充仍罷重法亦許以坊塲錢為用不足用方差鄉戸所出僱錢不得過官僱夲數詔送看詳􅃥法所詳定役法所以􅃥法難盡猝就擇其要者先奏以行於是役人悉用見數為額惟衙前一役用坊塲河渡錢僱募不足方許掲簿定差其餘􅃥人惟該募者得募餘悉定差遂罷官戸寺觀單丁女戸出助􅃥法其今夏􅃥錢即免輸尋以衙前不皆有僱直遂改僱募為招募凡熈寕嘗立法禁以衙前及役人非理役使及令陪備圓融之𩔖悉申行之耆壯依保正長法坊塲河渡錢量添酒錢之𩔖名色不一惟於法許用者仍以支用外並樁備招募衙前支酬重難及應緣役事之用如州錢不供用許移别州錢用之一路不足許從户部通他路移用其或有餘毋得減募增差衙前最為重役若已招募足額上一等户有虚閑不差者令供次等色役鄉差役人在職官如敢抑令别僱承符散從承代其役者轉運司劾奏重責時提舉常平司已罷置凡􅃥事改隸提刑司九月詔諸路坊郭五等已上及單丁女户官戸寺觀等三等以上舊輸免役錢者減五分餘户下此悉免之輸仍自元祐二年始凡支酬衙前重難及綱運公皁迓送餐錢用坊塲河渡錢給賦不足方得取此六色錢助用而有餘封樁以備不時之須七年尚書省言近者參行差募之法聞州縣奉詔不謹以致差徭輕重失當或役人有所賠備或占留役錢不盡僱募詔運使提刑司申飭使之究心如更不䖍劾奏以聞二月詔應差諸縣手力如合一鄉休役皆不及二年者得用助役錢募人為之既終一役别有閑及三年者復行差法御史中丞蘇轍言臣近奏乞修完弊政以塞異同之議其一謂諸州衙前臣請先論今昔差僱衙前利害之實盖定差鄉戸人有家業欺詐逃亡之弊比之僱募浮浪其勢必少此則差衙前之利也然而每差鄉戸必有避免糾決比至差定州縣吏乞取不貲及被差使先入重難若使僱募慣熟之人費用一分則鄉差生疎之人非二三分不了由此破蕩家産嘉祐以前衙前之苦民極畏之此則差衙前之害也若僱募情願自非慣熟必不肯投州縣吏人知其熟事乞取自少及至勾當動知空便費亦有常雖經重難自無破産之患此則僱衙前之利也然浮浪之人家産單薄侵盜之弊必甚於鄉差熙寧以來多患於此此則僱衙前之弊也然則差衙前之弊害在私家而僱衙前之弊害在官府若差法必行則私家之害無法可救若僱法必用則官府之弊有法可正何者嘉祐以前長名衙前除差二大戸外許免其餘色役今若許僱募衙前依昔日長名免役之法則上等人戸誰不願投諸州衙前例得實戸則所謂官府之害坐而自除臣竊謂雖三代聖人其法不能無弊是以易貢為助易助為徹要以因時施宜無害於民而已今差法行於祖宗僱法行於先帝取其便於民者而用之此三代變法之比也役次之名衙前散從承符弓手戸耆戸長壯丁熈寜僱役所取之錢坊塲當役戸坊郭戸官户女户單丁寺觀内坊塲係官錢當役戸以下係取之於民謂之六色錢取民間六色之錢益以係官坊塲錢充僱役之用而盡蠲衙前以下諸役熈寧之法也以坊塲充衙前僱役之用而承符以下諸役仍復輪差民户而盡蠲六色之錢元祐之法也然元祐復差役之初議者不同故有弓手許募曾充有勞效者指揮則所謂僱役者不特衙前而已也六色錢雖曰罷徴繼而詔諸路坊郭五等以上及單丁女戸官户自三等以上舊輸免役錢並減五分餘戸下此悉免之則所謂僱役之錢元未嘗盡除也自是諸賢於差僱之議各有所主而朝廷亦兼行之然熈寧盡除差法明立僱議而當時無狀官吏尚且掯免役之錢而不盡支給假他役之名而重復科差况元祐差僱兼行議論反復則此免役六色之錢其在官者不肯盡捐以予民其在民者有時復徴以入官固其勢也潁濵所謂所在役錢寛剰一二年必未至缺用從今放免理在不疑東坡所謂六色錢以免役取當於僱役乎盡之然後名正而人服皆至當之論紹聖元年帝始親政三省言役法尚未就緒帝曰第行元豐舊法而減去寛剰錢百姓有何不便邪右司諌朱勃言輸錢免役固有過数多敷者用錢僱役有立直太重者役色之内又有優便而願自投募不必給僱者茍詳為裁省則人情無有不便詔付户部詳議詔復免役法凡條約悉用元豐八年見制鄉差役人有應募者可以更代即罷遣之許借坊塲河渡及封樁錢以為僱須有役錢日補足其数所輸免役錢自今年七月始耆户長壯丁召僱不得以保正保長保丁充代其他役色應僱者放此所敷寛剰錢不過一分昔常過數今應減下者先自下五等人戸始復置提舉官九月用户部言舉行元豐條制以保正長代耆長甲頭代戸長承帖人代壯丁其後又詔諸縣無得以催税比磨追甲頭保長無得以雜事追保正副在任官以承帖為名占破當直者坐贓論所管催督租賦州縣官輙令陪備輸物者以違制論左正言孫諤言役法之行在官之數元豐多元祐省雖省未嘗廢事也則多不若省僱役之直元豐重元祐輕雖輕未嘗不應募也則重不若輕戸部尚書蔡京言詳諤所論多省輕重明有抑揚是謂元豐不如元祐乞行貶黜諤坐黜知廣徳軍徽宗建中靖國元年四月户部奏京西北路鄉書手雜職斗子所由庫秤揀搯之𩔖土人願就募不須給之僱直他路亦須詳度施行詔從之崇寧元年尚書省言民户既輸錢免役豈可復差前嘗令大保長催税而不給僱直是為差􅃥非免役也詔提舉司以元輸僱錢如舊法均給二年臣僚言常平之息嵗取二分則五年有一倍之數免役剰錢嵗取一分則十年有一年之備故紹聖立法常平息及一倍免役寛剰及三料取㫖蠲減以眀朝廷取於民者非為利也乞詔常平司候豐衍日具此制奏而蠲之四年臣僚言州縣户簿等累經改造故增減失實乞委常平官分行所部不以等第而以田税多寡均敷役錢户部尚書許㡬言州縣户衆而役少則敷錢止於第三等或户少而役多則均及四五等今若不計家業税錢不用等第槩以田畝均敷役錢則失輸錢代役之意其議遂格宣和元年臣僚言役錢一事神宗首防官户免多時責半輸今比户稱官州縣募役之𩔖既不可減僱令官戸所減之数均入下户下户於常賦之外又代官戸減半之輸豈不重困詔非泛補官者輸賦差科免役並不得視官户法減免已免者改之進納人自如夲法髙宗建炎元年臣僚言官户役錢舊法比民户減半今來詔置弓手以禦暴防患官户所賴猶重欲令官户􅃥錢更不減而民户比舊役錢量增三分專樁管以助養給從之官舊給庸錢以募户長及立保甲則樁庸錢以助給費未㡬廢保甲復户長而庸錢不復給遂拘入􅄣制窠名焉臣僚言州縣保正副未嘗肯請僱錢并典吏僱錢亦不曾給乞行拘收戸部看詳州縣典吏僱錢若不支給竊恐無以責其亷謹難以施行其鄉村耆户長依法係保正長輪差所請僱錢往往不行支給委是合行拘收乞下諸路常平司將紹興五年分州縣所支僱錢依經制錢例分季發付行在敢隠匿侵用並依擅支上供錢法從之按役錢之在官者以供他用而僱役之直或給或否中興以前已如此矣但尚未曾明立一說盡取之耳今乃謂保正副未嘗肯請僱錢又謂所請僱錢往往不行支給夫當役者豈有不肯請僱錢之理而不行支給則州縣之過朝廷所當覺察禁治使不失立法之初意可也今乃以此之故而拘入經制之窠名所謂舎曰欲之而必為之辭也四年罷催税户長依熈豐法以村疃三十戸每料輪差甲頭一名催納租税免役等分物既而言者謂甲頭不便者有五一小戸丁小催科不辦二舊每都保正長才四人今甲頭凡三十一人破産者必衆三夏耕秋收一都之内廢農業者凡六十人則通一路有萬萬人不容力穡四甲頭皆耕夫既不識官府且不能與形勢豪戸爭立所差既多爭訴必倍於是甲頭不復差而耆戸長役錢因不復給保正副十大保為一都保二百五十家内通選才勇物力最髙二人充應主一都盗賊煙火之事大保長一年替保正小保長二年替戸長催一都人戸夏秋二税大保長願兼戸長者輪催納税租一税一替欠数者後料人催以上係中興以後差役之法已充役者謂之批朱未曾充役者謂之白脚孝宗隆興二年詔諸充保正副依條只令管煙火盗賊外並不得泛有科擾差使如違許令越訴知縣重行黜責守倅各坐失覺察之罪以言者謂近來州縣違法保内事無巨細一一責辦至於承受文引催納稅役抱佃寛剰修葺鋪驛置買軍器科賣食鹽追擾賠備無所不至一經執役家業隨破故有是命乾道三年三省言􅃥法之害下三等尤甚官户既有限田往往假名寄産不若一􅋀勿拘限法只選物力髙強官户與民户通差則役户頓増下户必無偏差之害乞此後官户合僱人代􅃥詔依令兩浙路先次遵行寧宗慶元五年右諌議大夫張奎言乞行下州縣保正止許幹當夲都賊盗闘毆煙火公事不許非法科配户長止許專一拘催都内土着租税不許抑勒代納逃絶官物違者官吏重罰從之又臣僚言户長催納苗税内有逃絶之家户籍如故見存之户恃頑拖欠為戸長者廹於期限不免與之填納雖或經官陳訴而乃視為私債不與追理勢單力窮必至破蕩此户長之所以重困也乞行下州縣如有恃頑拖欠之徒即與嚴行追斷仍勒還代輸之錢庶使充役者不致重困破家從之嘉定二年殿中侍御史徐範言民貲之重者俾充里正彼多産之家其輸役錢於官亦多既已征其財而又俾之執二年之􅃥是為重複乞参酌祖宗常平免役之夲意行下州縣姑於役人從役之年蠲其免役之輸􅃥滿輸錢如故從之役起於物力物力有陞降陞降不殽則役法公是以紹興以来講究推割推排之制最詳應人戸典賣産業推割税賦即與物力一併推割至於推排則因其貲産之進退與之陞降三嵗一行固有貲産百倍於前科役不增於今者其如貧乏下户貲産既竭物力猶存朝夕經營而應酬之不給者非推排不可也然當時推排之弊或以小民粗有米粟僅存屋宇凡耕耨刀斧之器雞豚犬􅇾之畜纎微細𤨏皆得而籍之吏視其賂之多寡以為物力之低昻又有計田家口食之餘盡載之物力者上之人憂之於是又為之限制除質庫房廊停塌店鋪租牛賃船等外不得以猪羊雜色估紐其貧民求趁衣食不為浮財後耕牛租牛亦與蠲免若夫江之東西以田地畝頭計税亦有不待推排者惟受産之家有司詳於税契而畧於割税倘為之令曰交易固以税契為先後亦以割税為得業雖已税契而不割税許出産人告以業還見納税人則人孰有不割税者乎此亦所以救役法之弊也保正長之立也五家相比五五為保十大保為都保有保長有都副保正餘及三保亦置長五大保亦置都保正其不及三保五大保者或為之附庸或為之均并不一也其人户物力如買撲坊塲别無産業即以夲坊物力就坊充役如有田産物力即併就一多處充役其有物力散在鄰鄉者併歸煙㸑處又有散在别縣数鄉者各隨縣分併歸一里為等第若夫役次之歇倍則紹興十四年臣僚奏請以其物力增及半倍者歇役十年增及一倍者歇役八年增及二倍歇役四年皆理為白脚必差徧上三等户方許於得替人輪差其窄都不及歇役年限去處即從遞年體例選差十六年兩浙漕臣耿秉申眀又以一倍歇􅃥十年二倍歇役八年三倍歇􅃥六年庻幾疎數得中慶元元年徐誼盡破秉之説專用淳熙十四年臣僚之議而議者又謂物力有高下之殊鄉都有寛狭之異其折倍之法可以為寛鄉之便適以貽狹鄉之害可利寛鄉之中户適以困狭鄉多産之家如以寛鄉言之自物力五百貫而上累至二千貫者則三倍五百貫之家矣其在富室雖使之四年一役亦未為過若狹鄉自物力一百貫而上積至於四百貫亦謂之三倍所謂四百貫之户曾不及寛鄉之中産今亦使之四年一役其利害輕重灼然矣於是從耿秉之議務要寛鄉狭鄉各得其便其析生白脚則慶元五年臣僚奏謂若兄弟共有田二三百畝纔已分析便令各戸充役則前役未蘇而後役踵至實為中産之害須以其分後物力參之其在二等以上者合作析生白脚充應役次若在三等以下許將未分前充過役次於各户名下批朱理為􅃥脚與都内得替人比並物力髙下歇役乆近通行選差品官限田有制死亡子孫減半䕃盡差役同編戸一品五十頃二品四十五頃三品四十頃四品三十五頃五品三十頃六品二十五頃七品二十頃八品一十頃九品五頃封贈官子孫差役同編户謂父母生前無曾任官伯叔或兄弟封贈者應非泛及七色補官不在限田免役之数其奏薦弟姪子孫原自非泛七色而來者仍同差役進納軍功捕盗宰執給使減年補授轉至陞朝官即為官户身亡子孫並同編戸太學生及得解及曾經省試人雖無限田許募人充役單丁女户及孤幼户並免差役庻幾孤寒得所存恤凡有夫有子不得為女户無夫子則生為女户死為絶户女適人以奩錢置産仍以夫為户坑冶户遇採打礦寳免夲身諸般差役鹽亭户家産及二等以上與官户編户一般差􅃥不及二等依紹興十七年七月指揮蠲免民兵萬弩手免户下三百畝税賦及諸般差􅃥不及三百畝輙隠他人田畝許人告湖北京西民義勇第四等户與免非泛差科外其合差保正長以家業錢数多寡為限將限外之数與官編户輪差總首部將免保正長差役文州義士已免之田不許典賣老疾身亡許承襲凡募人充役並募土著有行止人其故停軍人及曾係公人並不許募既有募人官司不得復追正身募人不管於僱􅃥之家非理需索或憑藉官司之勢姦害善人斷罪外坐募之者以保伍有犯知而不糾之罰且保正副所職在于烟火盗賊橋梁道路今或使之督賦租備修造供役使皆非所􅃥而執役者每患参􅃥有錢知縣到罷有地理錢時節参賀有節料錢官員過都醋庫月息皆於是而取之抑有弓兵月廵之擾透漏禁物之責捕盗出限之罰催科填代之費承判追呼之勞至於州縣官吏收買公私食用及土産所有皆其所甚懼也若夫户長所職催夏税則先期借絹催秋税則先期借米坍溪落江之田逃亡死絶之户又令填納凡此之弊皆上之所當察也髙宗皇帝身履艱難在河朔親知閭閻之苦嘗嘆知縣不得人一充􅃥次即便破家是以講究役法至中興而大備乾道五年處州松陽縣首倡義役衆出田榖助􅃥户輪充守臣范成大嘉其風義為易鄉名自是所在推行浸廣而當時浮議胥動多有伺其隙而敗其謀者十一年御史謝諤言義􅃥之行當從民便其不願義􅃥者乃行差􅃥上然之且美其言為法意圎備及朱文公熹亦謂義役有未盡善者四上户官户寺觀出田以充義􅃥善矣其間有下户只有田一二畝者亦皆出田或令出錢買田入官而上户田多之人却計㑹減縮所出殊少其下户今既被出田将来却不免􅃥無緣復收此田之租乃是困貧民以資上户此一未盡善也如逐都各立􅃥首管收田租排定􅃥次此其出納先後之間亦未免有不公之弊將来難施刑罰轉添詞訴此二未盡善也又如逐都所排􅃥次今日已是多有不公而况三五年後貧者或富富者或貧臨事未免却致爭訟此三未盡善也所排􅃥次以上户輪充都副保正中下户輪充夏秋户長上户安逸而下户陪費此四未盡善也固嘗即此四未盡善者而求之盖始倡義􅃥者多鄉閭之善士惟恐當時議之未詳而慮之未周及踵接義􅃥者未必皆鄉閭之善士於是其弊日開其流日甚或以其材智足以把握而專義􅃥之利或以其氣力足以凌駕乃私差􅃥之權曰倍法曰析生等第法皆無所考而僱募人亦不與置置必受約束任驅使於義首者可以教號鄉曲厭酒肉而有餘否則傭錢不支而當􅃥者困矣是以虐貧而優富凌寡而暴孤義􅃥之名立而􅃥戶不得以安其業僱􅃥之法行而役户不得以安其居信乎朱熹未盡善之弊固如此也水心葉氏義􅃥跋曰保正長法不承引帖催二税今州縣以例相驅訶繋鞭撻遂使差􅃥不行士民同苦至預醵錢給費逆次第其先後以應期㑹名曰義􅃥然則有司失義甚矣余嘗問為保正者曰費必數百千保長者曰必百餘千不幸遇意外事費輙兼倍少不破家蕩産民之惡􅃥甚於宼讎余嘗疑之官人以牧養百姓為職當潔身馭吏除民疾苦且追則有期約日以集使賄必行應追者任之可也民實有産視税而輸使賦必重應輸者任之可也保正長㑹最督促而已何用自費数百千及百餘千甚或兼倍以至破家蕩産乎且此錢合而計之嵗以千百巨萬既不歸公上官人知自愛又不敢取誰則有此余欲以其言為妄然余行江淮閩浙洞庭之南北盖無不為此言者矣嗚呼此有司之所宜陳者也余忝為長吏不得為令佐自試其術以破余疑而不能意殊惨然因孫君義役書成輙題於後以告其得為者按差􅃥古法也其弊也差設不公漁取無藝故轉而為僱僱􅃥熈寧之法也其弊也庸錢白輸苦􅃥如故故轉而為義義􅃥中興以来江浙諸郡民户自相與講究之法也其弊也豪强專制寡弱受凌故復反而為差盖以事體之便民者觀之僱便於差義便於僱至於義而復有弊則末如之何也已竊嘗論之古之所謂役者或以起軍旅則執干戈冒鋒鏑而後謂之役或以營土木則親畚鍤疲筋力然後謂之役夫子所謂使民以時王制所謂嵗不過三日皆此􅃥也至於鄉有長里有正則非􅃥也柳子厚言有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子然則天子之與里胥其貴賤雖不侔而其任長人之責則一也其在成周則五家設比長二十五家設里宰皆下士也等而上之則曰閭胥掌二十五家六鄉曰酇長掌一百家六遂皆中士也曰族師掌一百家六鄉曰鄙師掌五百家六遂皆上士也曰黨正掌五百家六鄉曰縣正掌二千五百家六遂皆下大夫也曰州長掌二千五百家六鄉則中大夫也周時鄰里鄉黨之事皆以命官主之至漢時鄉亭之任則毎鄉有三老孝悌力田掌觀導鄉里助成風俗每亭有亭長嗇夫掌聽獄訟收賦税又有游徼掌廵禁盗賊亦皆有禄秩而三老孝悌力田為尤尊可與縣令丞尉以事相教復勿繇戍古之所謂復除者復其繇戌耳如三老盖亦在復除之科然則謂三老為􅃥可乎嘗以嵗十月賜酒肉或賜民爵一級則三老孝悌力田必二級賜民帛一匹則三老孝悌力田必三匹或五匹其尊之也至矣故戾太子得罪而壺闗三老得以言其寃王尊為郡而東郡三老得以奏其治狀至於張敞朱博鮑宣仇香之徒為顯宦有聲名然其猷為才望亦皆見於為亭長嗇夫之時盖上之人愛之重之未嘗有誅求無藝廹脅不堪之舉下之人亦自愛自重未嘗有頑鈍無耻畏避苟免之事故自漢以来雖叔季昏亂之世亦未聞有以任鄉亭之職為苦者也隋時蘇威奏置五百家鄉正令理人間詞訟而李徳林以為夲廢鄉官判事為其里閭親識剖斷不平今令鄉正專理五百家恐為害更甚詔集議而衆多是徳林遂廢不置然則隋時鄉職或設或廢夲無闗於理亂之故而其所以廢者盖上之人重其事而不輕置非下之人畏其事而不肯充也至唐睿宗時觀監察御史韓琬之疏然後知鄉職之不願為故有避免之人琬言往年兩京及天下州縣學生佐史里正坊正每一員闕先擬者輙十人頃年差人以充猶致亡逸即知政令風化漸以弊也唐宣宗時觀大中九年之詔然後知鄉職之不易為故有輪差之舉詔以州縣差􅃥不均自今每縣據人貧富及差􅃥輕重作差科簿送刺史檢署訖鏁於令㕔毎有役事委令據簿輪差自是以後所謂鄉亭之職至困至賤貪官汙吏非理徴求極意凌蔑故雖足跡不離里閭之間奉行不過文書之事而期㑹追呼笞箠比較其困踣無聊之狀則與以身任軍旅土木之徭役者無以異而至於破家蕩産不能自保則徭􅃥之禍反不至此也然則差􅃥之名盖後世以其困苦卑賤同於徭􅃥而稱之而非古人所以置比閭族黨之官之夲意也王荆公謂免􅃥之法合於周官所謂府史胥徒王制所謂庶人在官者然不知周官之府史胥徒盖服􅃥於比閭族黨之官者也蘇文忠公謂自楊炎定兩税之後租調與庸兩税既兼之矣今兩税如故奈何復欲取庸錢然不知唐之所謂庸乃征徭之身􅃥而非鄉職之謂也二公盖亦習聞當時差􅃥之名但見當時差􅃥之賤故立論如此然實則誤舉以為比也上之人既賤其職故叱之如奴𨽻待之如罪囚下之人復自賤其身故或倚法以為姦或匿賊以規免皆非古義也成周之事逺矣漢之所以待三老嗇夫亭長者亦難以望於後世如近代則􅃥法愈弊􅃥議愈詳元祐間講明差僱二法為一大議論然大槩􅃥之所以不可為者費重破家耳蘇黄門言市井之人應募充􅃥家力既非富厚生長習見官司吏雖欲侵漁無所措手耕稼之民性如麋鹿一入州縣已自懾怖而况家有田業求無不應自非廉吏誰不動心凡百侵擾當復如故以是言之則其所以必行僱􅃥者盖雖不能使充役之無費然官自任僱募之責則其􅃥與民不同而横費可以省雖不能使官吏之不貪然民既出僱募之費則其身與官無預而貪毒無所施此其相與防閑之術雖去古義逺甚然救時之良䇿亦不容不如此然熙豐間言其不便者則謂差􅃥有休歇之時而僱役則年年出費差􅃥有不及之户而僱役則户户徴錢至有不願輸錢而情願執􅃥者盖當時破家者皆愚懦畏事之人而桀黠之徒自能支吾而費用少者反以出僱役錢為不便又當時各州縣所徴僱役錢除募人應􅃥之外又以其餘者充典吏俸給之用又有寛剰錢可以偹㐫旱賑救可以見當時充役之費夲不甚重故僱役之錢可以備此三項支用也若夫一承職役覊身官府則左支右吾盡所取辦傾囷倒廩不足賠償􅃥未滿而家已罄事體如此則僱􅃥之法豈復可行僱役之金豈復能了然則此法所以行之熙豐而民便之元祐諸君子皆以為善者亦當時執役之費夲少故也禮義消亡貪饕成俗為吏者以狐兎視其民睥睨朶頥惟恐墮穽之不早為民者以宼戎視其吏潛形匿影日虞懐璧之為殃上下狙伺巧相計度州縣專以􅃥户之貧富為宦况之豐殺百姓亦專以役籍之係否驗家道之興衰於是民間視鄉亭之職􅃥如蹈湯火官又以復除之説要市於民以取其貲其在復除之科者苟延嵗月而在職􅃥之列者立見虚耗雖有智者不能為謀矣所謂正夲澄源之論必也朝廷以四維勵士大夫餼廩稱事無俾有多藏之惡士大夫以四維自勵力行好事稍能以澤物存心然後鋤姦貪之胥吏以去其蠧害削非泛之支備以養其事力賦斂之簿書必覈無使代逋欠之輸勾呼之期㑹必明毋使受稽慢之罰夫然故􅃥人者如父母之令其子弟恩愛素孚􅃥於人者如臂指之護其腹心劬勞不憚既無困苦之憂不作避免之念則按籍召而役之可矣奚必曰僱曰義之紛紛哉不然舉三代以来比閭族黨之法所以聮屬其民上下相維者反藉為厲民之一大事愚不知其説矣復除周鄉大夫之職以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍舍役除不收􅃥事也貴若今宗室及闗内侯皆復也服公事者若今吏有復除也老者謂若今八十九十復羡卒也旅師凡新甿之治皆聴之使無征􅃥新徙来者復之也均人凶札則無力政政讀作征王制命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士不征不給其徭􅃥五十不從力政力政城道之􅃥也八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政父母之䘮三年不從政齊縗大功之䘮三月不從政將徙於諸侯三月不從政自諸侯来徙家期不從政大夫采地之民徙於諸侯為民以其新徙當須復除但諸侯地寛􅃥少故三月不從政自諸侯来徙大夫之家邑大夫􅃥多地狭故期不從政漢髙祖二年蜀漢民給軍事勞者復勿租税二嵗闗中卒從軍者復家一嵗鄉三老縣三老復勿徭戍五年詔諸侯子在闗中者復之十二嵗其歸者半之軍吏卒賜爵非七大夫已下皆復其身及户勿事七年民産子復勿事二嵗八年令吏卒從軍至平城及守城邑者皆復終身勿事十一年諸縣堅守不降反宼者復租三嵗豐人徙闗中者皆復其身士卒從入蜀漢闗中者皆復終身十二年詔吏二千石入蜀漢定三秦者皆世世復以沛為湯沐邑復其民世世無有所與沛父兄請復豐乃并復豐比沛又詔秦始皇帝守冡二十家楚魏齊各十家趙及魏公子無忌各五家令視其冡復無與他事惠帝四年舉民孝悌力田者復其身文帝禮髙年九十者一子不事八十者二算不事募民守塞皆賜髙爵復其家令民入粟至五大夫乃復一人西邉北邉之郡雖有長爵不輕得復三年幸太原復晉陽中都民三嵗租四年復諸劉有屬籍者家無所與景帝遺詔出宫人歸其家復終身武帝建元元年民年八十復二算九十復甲卒又詔民年九十以上已有受鬻法給米粟為糜鬻之六反為復子若孫令得身率妻妾遂其供養之事武帝為博士官置弟子五十人復其身登禮中嶽以山下户凡三百封崇髙為之奉邑獨給祠復無有所與府庫並虚乃募民能入奴婢者得以終身復桑𢎞羊請令民入粟甘泉各有差以復終身時兵革数動民多買復及五大夫千夫調發之士益鮮宣帝地節二年詔博陸侯功徳茂盛復其後世世毋有所與功如蕭相國地節三年詔流民還歸者且勿算事地節四年詔有大父母喪者勿徭事使得送終盡子道元康元年復髙皇帝功臣絳侯周勃等百三十六人家子孫令奉祭祀世世勿絶其毋嗣者復其次元帝好儒能通一經者復数年以用度不足更為設員千人永光三年用度不足民多復除無以給中外徭􅃥世祖建武五年詔復濟陽二年徭􅃥帝生於濟陽故復之十九年幸汝南南頓縣賜吏人復南頓歳租一嵗父老叩頭言願賜復十年帝曰天下重器常恐不任日復一日安敢遠期十年乎吏人又言陛下實惜之何言謙也帝大笑復増一嵗二十年復濟陽縣徭役六嵗三十年復濟陽縣徭􅃥一嵗明帝永平五年常山三老言上生於元氏願䝉優復詔曰豐沛濟陽受命所由加恩報徳適其宜也今永平之政百姓怨結而吏人求復令人愧笑重逆此縣之拳拳其復元氏田租更賦六嵗勞賜縣掾史及門䦨走卒桓帝永康元年復博陵河間二郡比豐沛靈帝光和六年復長陵縣比豐沛徐氏曰按漢之有復除猶周官之有施舍皆除其賦役之謂也然西京時或以從軍或以三老或以孝悌力田或以明經或以博士弟子或以功臣後以至民産子者大父母父母之年髙者給崇髙之祠者莫不得復其間美意至多至東都所復不過濟陽元氏南頓数邑為天子之私恩矣按周官及禮記所載周家復除之法除其征􅃥而已至漢則并賦稅除之豈漢之法優於周乎曰非也盖賦税出於田而周人之田則皆受之於官其在復除之例者如所謂貴者賢者能者服公事者即公卿大夫以及庻人在官之流皆受公田之禄以代耕未嘗予之田而使之躬耕者也所謂老者疾者則不能耕而不復給以田且仰常餼於官者也所謂新氓之遷徙者則是未及授以田者也此數色之人既元無田則何有於賦税故只除其征役至漢則田在民間官不執授受之柄亦無復應受與不應受之法矣故在復除之例者並除其賦􅃥也然漢以後則官户之有䕃至單丁或老疾者除其􅃥則有之亦不復聞有除税之事矣魏黄初元年之後始開太學至太和青龍中中外多事人懐避就雖性非解學多求詣太學諸生有千數而諸博士率皆麄疎無以教弟子弟子夲亦避役竟無能習學冬来春去嵗嵗如是王褒門人為夲縣所役求褒為属褒曰卿學不足以庇身吾徳薄不足以䕃卿属之何益且吾不捉筆已四十年乃歩擔乾飯兒負鹽豉門徒從者千餘人安邱令以為見已整衣出迎之於門褒乃下道至土牛磬揖而立云門生為縣所役故来送别執手涕泣而去令即放遣諸生唐制太皇太后皇太后皇后緦麻以上親内命婦一品以上親郡王及五品以上祖父兄弟職事勲官三品以上有封者若縣男父子國子太學四門學生俊士孝子順孫義夫節婦同籍者皆免課役凡主户内有課口者為課户若老及廢疾篤疾寡妻妾部曲客女奴婢及視九品以上官不課四夷降户附以寛鄉給復十年奴婢縱為良人給復三年􅃥外蕃人一年還者給復三年二年者給復四年三年給復五年又詔諸宗姓未有職任者不在徭􅃥之限元宗初立求治蠲徭役者給蠲符以流外及九品京官為蠲使嵗再遣之白履忠召拜朝散大夫乞還吴兢謂之曰子素貧不霑斗米匹帛雖得五品何益履忠曰往契丹入冦家取排門夫吾以讀書縣為免今終身髙卧寛徭􅃥豈易得哉唐制諸司捉錢户皆給牒蠲免徭􅃥詳見雜征𣙜門宋真宗皇帝乾興元年臣僚上言官勢户及將校衙前占田避役之害見差􅃥門仁宗時初官八品已下死者子孫􅃥同編户詔特蠲之民避􅃥者或竄名浮圗籍號為出家趙州至千餘人州以為言遂詔出家者須落髪為僧乃可免役神宗熙寕二年頒募􅃥法於天下詔崇奉聖祖及祖宗陵寢神御寺院宫觀免納􅃥錢諸旌表門閭有敇書及前代子孫於法有䕃者所出􅃥錢依官户法賜號處士非因技授者凖此按自熙寧助􅃥之法既行凡品官形勢以至僧道單丁該免役之科者皆等第輸錢無所謂復除矣然數者之輸錢輕重不等其詳見户􅃥門兹更不備録中興以後差􅃥之法品官限田有制死亡子孫減半䕃盡差􅃥同編户詳並見户􅃥門文獻通考卷十三
