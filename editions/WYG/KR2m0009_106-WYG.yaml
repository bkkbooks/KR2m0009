body:
  text: 文獻通考卷一百六鄱陽馬端臨貴與著王禮考一朝儀周制天子有四朝恒言三朝者以詢事之朝者非常朝故不言之一曰外朝在臯門内決罪聽訟之朝也秋官朝士掌之左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後靣三槐三公位焉州長衆庶在其後左嘉石平罷人焉右胏石達窮人焉斯聽獄之時所列位也樹棘以為位者取其赤心而外刺象以赤心三刺也槐之言懐來人於此欲與之謀也嘉石文石也平成也成人之善也胏石赤石也罷人不昏作勞有似於疲謂惰慢人窮人天民之窮無告者羣吏州長鄉遂之官也王之五門雉門為中門雉門設兩觀與宫門同閽人譏出入者窮人盖不得入罷音疲二曰中朝在路門外夏官司士正其位辨其貴賤之等朝夕視政公卿大夫辨色而入應門北靣而立東上王揖孤卿以上特揖大夫旅揖士傍三揖各就位特揖一一揖之也旅衆也大夫爵同者衆揖之公卿大夫三揖就位羣士及故士太僕之屬登在其位羣位東靣王西靣而揖之三揖者有上中下王南向三公北面東上孤東面北上卿大夫西面北上王族故士武士在路門之右南面東上太僕太右太僕從者在路門之左南面西上此王視朝之事於路門之位王族故士為士免退留宿衛者未嘗為士雖同族不得在王宫太右司右也太僕從者小臣祭僕御僕𨽻僕也三曰内朝亦謂路寝之朝人君既從正朝視事畢退適路寝聽政使視大夫大夫退然後適燕寝釋服釋服服元端也四曰詢事之朝在雉門外小司宼掌其政以致萬人而詢焉一曰詢國危二曰詢國遷三曰詢立君國危謂兵宼國遷謂徙都立君謂君無冢嫡選於庶子則聚萬人而詢謀焉其位王南向三公及州長百姓北面羣臣西面羣吏東面羣臣卿大夫士也羣吏府史其孤不見者孤從羣臣卿大夫在公後小司宼儐以序進而問焉以衆輔志而蔽謀儐謂揖之使前序更也輔志尊王賢明也蔽斷也通典説曰天子路寝門有五焉其最外曰臯門二曰庫門三曰雉門四曰應門五曰路門路門之内則路寝也臯門之内曰外朝朝有三槐左右九棘近庫門有三府九寺庫門之内有宗廟社稷雉門之外有兩觀連門觀外有詢事之朝在宗廟社稷之間雉門内有百官宿衛之廨應門内曰中朝中朝東有九卿之室則九卿理事之處考工記曰有九室九卿理之朝則入而理事夕則歸於庫門外外朝之法朝有疑獄王集而聽之故禮云王命三公會其朝者諸侯未去亦於此也廣問之義詢於蒭蕘之謀三刺三問以定其法燕朝者路寝之朝羣公以下常日於此朝見君位其位太僕掌之初入之時亦門右北面東上王揖之三公則皆前北面東上孤東面卿大夫西面皆北上士則門外之西北面東上凡射先用燕禮其位亦然所以每朝列位所向不同者皆以事異故變其位三公之位常北面不變者以三公内臣位尊故屈之使常北面其餘諸侯孤卿大夫皆以地道尊君故尊者東面卑者西面是以於外朝之時諸侯東面尊於孤卿也故於内朝孤卿東面尊於卿大夫也時亦無諸侯故也唯詢事之朝非常朝之限故不與三朝同或云客有諸侯之位故孤卿在東也陳氏禮書曰周官太僕掌燕朝之服位宰夫掌治朝之法司士掌朝儀之位朝士掌外朝之法文王世子公族朝於内朝庶子掌之其在外朝司士掌之玉藻朝服以日視朝於内朝退適路寝聽政然則文王世子與玉藻所謂朝者諸侯之朝也蓋天子庫門之外外朝也朝士掌之路門之外治朝也宰夫司士掌之路寝燕朝太僕掌之諸侯亦有路寝有外朝則文王世子所謂内朝者玉藻所謂路寝也玉藻所謂内朝者文王世子所謂外朝也玉藻於路寝之外言内朝則又有外朝眀矣諸侯内朝司士掌之其官與天子同燕朝庶子掌之其官與天子異魯語曰天子及諸侯合民事於外朝合神事於内朝自卿以下合官職於外朝合家事於内朝然則卿大夫亦二朝也王燕朝之位雖太僕掌之然其位之所辨不可考文王世子曰公侯朝於内朝東面北上臣有貴者以齒則王之燕朝宜亦然也太僕建路鼓於大寝之門外傳稱堯設敢諫之鼓禹設箴規之鞀乃周建路鼓之意而掌其政以待逹窮者與遽令鄭氏曰路寝門外則内朝之中蓋窮者達其情於外朝之胏石朝士又達窮者之情於内朝之路鼓遽令傳遽之令也行夫掌邦國傳遽之小事則遽令非行夫之所掌者而已鄭康成以公食大夫拜賜於朝不言賓入聘禮以柩造朝不言喪入則謂諸侯之朝在大朝外然大門外則徑涂爾非朝位也又曰玉藻曰朝辨色始入君日出而視之退適路寝聽政使人視大夫大夫退然後適小寝釋服則朝辨色始入所以防微日出而視之所以優尊詩曰夜嚮晨言觀其旂臣辨色始入之時也又曰東方眀矣朝既盈矣君日出而視之之時也蓋尊者體盤卑者體蹙體蹙者常先體盤者常後故視學衆至然後天子至燕禮設賓筵然後設公席則朝禮臣入然後君視之皆優尊之道也然朝以先為勤以後為逸退以先為逸以後為勤朝而臣先於君所以眀分守退而君後於臣所以防怠荒此所以使人視大夫大夫退然後適小寝釋服也然則公卿諸侯之朝王其有先後乎詩云三事大夫莫肯夙夜邦君諸侯莫肯朝夕夫夙先於朝夜後於夕則公卿朝常先至夕常後退諸侯朝常後至夕常先退右周家朝羣臣之儀周制大行人掌大賓之禮及大客之儀以親諸侯大賓要服以内諸侯也大客謂其孤卿春朝諸侯而圗天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮此以王見諸侯為文也圗比陳協皆考績之言天子當扆而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝爾雅曰戸牖之間謂之扆門屏之間謂之宁邦畿方千里其外五百里曰侯服嵗一見又其外五百里曰甸服二嵗一見又其外五百里曰男服三嵗一見又其外五百里曰采服四嵗一見又其外五百里曰衛服五嵗一見又其外五百里曰要服六嵗一見要服蠻服也此六服相距方七千里公侯伯子男封焉其朝貢之嵗四方各四分趨四時而來或朝春或宗夏或覲秋或遇冬每朝覲皆有貢物具賦税上篇九州之外謂之蕃國代一見各以其所貴寳為贄九州之外夷服鎮服蕃服按曲禮曰其在東夷北狄西戎南蠻雖大曰子父死子立及嗣王即位乃一來各以其所貴寳為贄則蕃國之臣無執玉瑞者也到天子之境先謁關人關人報王王使小行人逆勞於畿又使大夫致積及郊使大行人服皮弁用璧以勞授之皮弁者天子之朝服壁無束帛者天子主尊也諸侯儐王使者用束帛乘馬積音子四反及國天子賜舎使司空致舎將受朝上公執桓圭九寸繅藉九寸袞冕九章其春夏朝宗各乘所受上輅建常九斿繁纓九就若春諸侯各服裨冕釋幣於禰各乘所受上輅者以陽氣仁恩尚文故車服得與王同侯執信圭伯執躬圭七寸繅藉七寸鷩冕七章建常七斿繁纓七就子執穀璧男執蒲璧皆五寸繅藉五寸毳冕五章建常五斿繁纓五就王則服皮弁登於路門外正朝當宁而立諸侯改服於舎服朝服各執瑞玉至於朝公東面諸侯西面伯子男從侯而朝末擯承命告於天子曰伯父實來予一人嘉之伯父其入予將受之天子於同姓大國則曰伯父小邦則曰叔父異姓大國則曰伯舅小邦則曰叔舅嘉之者美之也受玉先書同姓次及異姓上儐又傳下至嗇夫也信音身諸侯序進入門右坐奠珪再拜稽首入門而右執臣道不敢由賓客之位卑者見尊奠贄而不授儐者謁謁猶告也上儐告以天子前辭欲親受之如賓客也其詞曰伯父其升侯氏坐取珪升致命王受之玉侯氏降階東北面再拜稽首儐者延之曰升升成拜乃出各還其舎司几筵設黼扆於朝扆前南嚮設莞席紛純加繅席畫純加次席黼純左右玉几黼謂之斧其繡白黒綵也以綵白為質扆制如屏風繡以斧形扆前設席左右有几優至尊也鄭元謂紛如綬有文而狹者繅席削蒲蒻展之編以五采若今合歡矣畫純畫為雲氣也次席桃枝席有次列成文天子服袞冕負黼扆而立諸侯裨冕一一而入以行三享奉束帛加璧庭實唯國所有隨國所有或馬或虎豹皮龜金丹漆絲纊竹箭分為三享矣奉束帛匹馬卓上九馬隨之中庭西上奠幣再拜卓猶的也以素的一馬為上書其國名後當識其所産也必十匹者不敢斥王所乘用成數敬也其秋冬覲遇之時将朝之早諸侯裨冕釋幣於禰将近質明時告将覲也裨之為言婢也天子六服大裘為上其餘為裨以事尊卑諸侯亦服焉其釋幣如聘大夫将受命釋幣於禰之禮皆乘墨車載龍旂弧韣瑞玉有繅至大門外交龍為旂諸侯所建墨車大夫制也弓衣曰韣上儐自與諸侯相揖而入至廟門外之舎王服袞冕負斧扆而受朝享之禮諸侯入門右皆奠玉再拜王命將受之諸侯更取玉升堂致命王親受之諸侯降堂又再拜稽首儐者延之曰升升成拜乃出然後行三享玉王皆撫之諸侯降堂自授宰如朝宗之法覲遇之時天子不下堂禮記云天子覲諸侯下堂自夷王始也其朝宗覲遇行朝享禮畢三享訖也諸侯皆右肉袒於廟門之東乃入門右北面立告聽事右肉袒者刑宜施於右也凡以禮事者右袒告聽事者告王以國所用為罪之事儐者謁諸天子天子辭於侯氏曰伯父無事歸寧乃邦謁告也侯氏再拜稽首出自屏南適門西改袒還襲遂入門右北面立王乃勞之再拜稽首儐者延之曰升升成拜降出王辭之不即入者當出隱於屏而襲也天子外屏勞之勞其道路勞苦也王遂更延諸侯入而禮之王使宗伯以珪瓚酌鬱鬯祼之禮畢還館諸侯公卿皆就館見之若有功者天子賜以車服皆使公就館致之諸侯迎於外門外再拜諸公奉篋服加命書於其上升自西階東面太史居右言諸公者王同時分命之而使賜侯氏侯氏升西面立太史述命讀王命書侯氏降兩階之間北面再拜稽首受命也升成拜太史辭之降也太史加書於服上侯氏受受篋服也使者出侯氏送再拜時會以發四方之禁殷同以施天下之政其法諸侯既至天子之國必先朝天子於其國内然後為壇於國外更行朝禮時會無常期諸侯有不順服者王将征討合諸侯而發禁令焉禁謂九伐之法也會之法為壇於國外崔靈恩曰古者諸侯朝天子四時禮外有時會殷同殷同者十二年王不廵狩則六服諸侯各當方面來赴四時見王也殷衆也四方諸侯衆來見王此有十二年之期故不得謂時會也殷同之禮東方則以春南方則以夏西方則以秋北方則以冬皆如廵狩之時春為壇於國東夏與秋冬各於其方壇制度已具於廵狩篇將時會殷同之朝天子乘龍馬八尺曰龍載大旂象日月升龍降龍春則拜日於東門之外夏則禮日於南門之外變拜言禮者祭祀也秋則禮月與山川邱陵於西門外冬則禮月與四瀆於北門之外禮者謂祭之廵狩之時山川之神各當方而祭今不廵狩故山川隨其時而祭之陽則祭於陽方隂則祭於隂方加方眀於壇上而祭之方眀者木也方四尺設六色東青南赤西白北黒上元下黄四方神眀之象所謂方眀也設六玉上珪下璧南方璋西方琥北方璜東方珪以祭之六色象其神六以玉禮之上宜以蒼璧下宜以黄琮而不以此者則上下之神非天下之至貴也設玉者刻其木以著之去方眀以朝諸侯其朝位授玉儐介之儀已具廵狩篇眀堂位昔者周公朝諸侯於眀堂之位周公攝王位以眀堂之禮儀朝諸侯不於宗廟辟王也在疏按覲禮諸侯受次於廟門外覲在廟今眀堂故云辟王也天子負斧依南向而立負背也斧依為斧文屏風於戸牖間周公於前立焉三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面北上五狄之國北門之外南面東上九采之國應門之外北面東上四塞世吿至此周公眀堂之位也朝之禮不於此周公權用之也朝位之上上近主位尊也九采九州之牧典貢職者也正門謂之應門二伯率諸侯而入牧居外糾察之也四塞謂夷服鎮服蕃服在四方為蔽塞者新君即位乃朝周禮蕃國世一見應氏曰自公而下列為四等各以其序近則序立於階逺則序立於門而各分東西焉夷蠻戎狄之君隨方環列於四門之外分列四門則内為五室可知既有南門而又有應門者南門洞啓不止於一而應門則當中而相應爾雅正門謂之應門故當中而北面東上帝亦同於中階之三公焉前之三公外之九采内之諸侯外之四夷四面而立雖各塞其方隅而還列相向無一人不得以對揚渉級而上雖各殊其階所而趨進序升無一人不與之拱揖石林葉氏曰天子三朝外朝以大詢内朝以日視朝燕朝退而聽政諸侯來朝則見於太廟眀堂以頒朔而已周公攝政七年成王既冠将復辟而歸以天下知周公攝政之久未知成王之尊於是因六年五服之朝合九夷八蠻六戎五狄之君而並見然猶不敢正太廟之朝是以即眀堂而權制其位蓋天子無事四時之朝見於廟嵗以一服有事而㑹不廵狩而同則為宫於郊設方明而祭之蕃服世一見未有與諸侯併朝者也司士所掌朝儀之位與朝士所掌外朝之法皆自有定著眀堂位蓋周公之為故記禮者以為周公朝諸侯之位其曰負斧扆南向而立是雖仍攝政之稱謂周公曰天子然負扆而立則周成王自不失南面而坐周公但從成王立於其側爾中間言武王崩成王幼弱周公踐天子之位者亦謂成王同坐立於斧扆之間周公曷嘗正天子之位而居之乎禮所記甚眀陋儒初不悟雖荀卿猶云周公履天子之籍若固有之學者由是紛紛有異言何周公之不幸也右周家諸侯來朝之儀漢髙祖七年長樂宫成諸侯羣臣朝十月適㑹長樂宫新成漢時尚以十月為正月行朝嵗之禮儀叙下儀注先平眀未明之前謁者治禮引以次入殿門廷中陳車騎戍卒衛官設兵張旗志志與幟同傳曰趨傳聲教入者皆令趨謂疾行為敬也殿下郎中俠陛陛數百人俠與挾同挾其兩旁每陛者數百人功臣列侯諸将軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉大行設九賓臚句傳上傳告下為臚下告上為句也大行掌賓客之禮今之鴻臚九賓則九卿也謂公侯伯子男孤卿大夫士也於是皇帝輦出房百官執㦸傳警傳聲而唱警引諸侯王以下至吏六百石以次奉賀自諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不振恐肅敬至禮畢盡伏置法酒法酒猶言禮酌謂不飲之至醉諸侍坐殿上皆伏抑首抑屈也謂依禮法不敢平坐而視以尊卑次起上夀觴九行謁者言罷酒御史執法舉不如儀者輙引去初帝既即位去秦儀法為簡易羣臣飲争功醉或妄呼拔劍擊柱上患之叔孫通曰儒者難與進取可與守成臣願徴魯諸生與臣弟子共起朝儀上曰得無難乎通曰禮者因時世人情為之節文臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行於是通徴魯諸生三十餘人及上左右為學者左右謂近臣也為學謂素有學術與其弟子百餘人為綿蕞野外應劭曰立祈及茅索營之習禮儀其中也如淳曰謂以茅剪樹地為纂尊卑之次也春秋傳曰置茅蕝師古曰蕞與蕝同並音子説反習之月餘通曰上可試觀上使習禮曰吾能為此廼令羣臣習肄以十月長樂宫成行之竟朝置酒無敢讙譁失禮者於是上曰吾乃今日知為皇帝尊也拜通為奉常賜金五百斤諸儒弟子共為儀者悉拜為郎致堂胡氏曰帝王之禮因革損益至周而大備周八百年雖柄移祚迄其朝廷所用者無利害於争戰從横之事雖秦火書滅籍亦必有知其略者誠能深知詢求草創而潤色之縦不得其全亦當參互有見使聖帝眀王制儀立度文章物采寓法象形禁戒之意後猶有考不亦羙哉惜乎漢髙智不及此而叔孫通委已從人諧世而取寵也夫吕政所為無一可以垂世立法者自漢興議論之臣禍敗之戒有所不言言則必借秦為諭豈有朝廷之上君臣之儀所以表正百官觀示列辟者乃獨可用乎遂使周室禮文泯不復見而秦禮得傳通之罪大矣魯二生未必能制此禮也然惡通面諛而不肯從亦賢矣哉至謂禮樂必積徳百年而後可興則幾乎迂矣武帝雖用夏正然每月朔朝至於十月朔猶嘗享㑹其儀夜漏未盡七刻而鐘鳴受賀及贄公侯璧二千石羔千石六百石鴈四百石以下百官賀正月決疑要注云古者朝㑹皆執贄侯伯執珪子男執璧孤執皮帛卿執羔大夫執鴈士執雉漢魏粗依其制正朝大㑹諸侯執玉璧薦以鹿皮公卿以下所執如古禮古者衣皮皆用皮帛為幣玉以象徳璧以稱事二千石以上上殿稱萬嵗獨斷曰三公奉璧上殿向御座北面太常賛曰皇帝為興三公伏皇帝坐乃進璧古語曰御座則起此之謂也舉觴御食前司空奉羮大司農奉飯奏食舉之樂百官受賜宴享大作樂白虎通曰有喪不朝吉凶不相子不奪孝子恩也太廟火日食后之喪雨霑服失容並廢朝褚先生曰諸侯王朝見天子漢法當四見始到入小見到正月朔旦奉皮薦璧玉賀正月法見後三日為王置酒賜金錢財物後二日復入小見辭去凡㽞長安不過二十日小見者燕見於禁門内飲於省中非士人之所得入也梁孝王西朝因㽞且半載入與人主同輦出與同車示風以大言而實不與令出怨言謀叛逆乃隨而憂之不亦逺乎非大賢人不知退讓今漢之儀法朝見賀正月者常一王與四侯俱朝見十餘嵗一至今梁王常比年入朝見久㽞鄙語曰驕子不孝非惡言也右褚先生為郎時聞於宫殿中老郎吏好事者之語然足以見漢諸侯朝見之典云後漢嵗首正月為大朝受賀其儀夜漏未盡七刻鐘鳴受賀及贄獻帝起居注舊典市長執鴈建安八年始令執雉百官二千石以上上殿稱萬嵗舉觴御食前司空奉羮大司農奉飯百官受賜宴享大作樂其每朝唯十月旦從故事者髙祖定秦之月元年嵗首也蔡邕曰羣臣朝見之儀視不晩朝十月朔之故以問胡廣廣曰舊儀公卿以下每月常朝先帝以其頻故省唯六月十日朔朝後復以六月朔盛暑省之蔡質漢儀曰正月旦天子幸德陽殿臨軒公卿將大夫百官各陪朝賀蠻貊胡羌朝貢畢見屬郡計吏皆陛覲庭燎宗室諸劉雜㑹萬人以上立西面位公納薦大官賜食酒西入東出既定上夀計吏中庭北面立太官上食賜羣臣酒食貢事御史四人執法殿下虎賁羽林弧弓撮矢陛㦸左右戎頭偪脛陪前向後左右中郎将住東西羽林虎賁将住東北五官将住中央悉坐就賜作九賓徹樂舎利從西方來戲於庭極乃畢入殿前激水化為比目魚跳躍𠻳水作霧鄣日畢化成黄龍長八丈出水遨戲於庭炫燿日光以兩大絲繩繫兩柱中頭間相去數丈兩倡女對舞行於繩上對面道逢切肩不傾又蹋踘藏形於斗中鐘磬並作樂畢作魚龍曼延小黄門吹三通謁者引公卿羣臣以次拜微行出罷卑官在前尊官在後徳陽殿周旋容萬人陛髙一丈皆文石作壇激沼水於殿下畫屋朱梁玉階金柱刻鏤作宫掖之好厠以青翡翠一柱三帶縚以赤緹天子正旦節㑹朝百僚於此自到偃師去宫四十三里望朱雀五闕徳陽其上鬱律與天連雒陽宫閣簿云徳陽宫殿南北行七丈東西行三十七丈四尺班固東都賦春王三朝㑹同漢亰是日也天子受四海之圗籍膺萬國之貢珍内撫諸夏外接百蠻乃盛禮樂供帳置乎雲龍之庭陳百僚而贊羣后䆒皇儀而展帝容端門東有崇賢門次外有雲龍門賛引也於是庭實千品㫖酒萬鍾列金罍班玉觴嘉珍御太牢享爾乃食舉雍徹太師奏樂陳金石布絲竹鐘鼓鏗鎗管絃曄煜抗五聲極六律歌九功舞八佾韶武備太古畢四夷間奏徳廣所及伶佅兠離㒺不具集四夷之樂東方曰韎南方曰任西方曰佅離北方曰禁禁字書作伶渠禁反佅摩葛反萬樂備百禮暨皇懽浹羣臣醉降烟煴調元氣然後撞鐘告罷百僚遂退尚書傳曰天子將入撞㽔賓之鐘左右之鐘皆應蔡邕獨斷正月朝賀三公奉璧上殿向御座北面太常贊曰皇帝為君興三公伏皇帝坐乃進璧古語曰御坐則起此之謂也舊儀三公以後月朝後省當以六月朔十月朔旦朝後又以盛暑省六月朝故今獨以為正月十月朔朝也冬至陽氣始起麋鹿解角故寝兵鼓身欲寧志欲寧不聽事可送迎五日臘者嵗終大祭縦吏民宴飲非迎氣故但送不迎正月嵗首亦如臘儀冬至陽氣起君道長故賀夏至隂氣起君道衰故不賀鼓以動衆鐘以止衆夜漏盡鼓鳴則息安帝永初元年春正月元日㑹徹樂不陳充庭車每大朝㑹必陳乘輿法物車輦於庭故曰充庭車以年饑故不陳魏武帝都鄴正㑹文昌殿用漢儀又設百華香花燈文帝受禪後修洛陽宫室權都許昌宫殿狹小元日於城南立壇殿青帷以為門設樂享㑹後還洛陽依漢舊事魏制藩王不得朝覲眀帝時有朝者由特恩不得為常晉武帝咸寧中定儀先正月一日有司各宿設王公卿校便坐於端門外大樂鼓吹又宿設四廂樂於殿前夜漏未盡十刻羣臣集庭燎起上賀謁報又賀皇后從雲龍中華門入謁詣東閤下便坐漏未盡七刻羣司乘輿車百官及受贄郎下至計吏皆入詣階部立其次其階衛者如臨軒儀漏未盡五刻謁者僕射大鴻臚各奏羣臣就位定漏盡侍中奏外辦皇帝出鐘鼓作百官皆拜伏太常導皇帝升御座鐘鼓止百官起大鴻臚跪奏請朝賀掌禮郎贊皇帝延王登大鴻臚跪贊蕃王臣某等奉白璧各一再拜賀太常報王悉登謁者引上殿當御座皇帝興王再拜皇帝坐復再拜成禮訖謁者引下殿還故位掌禮郎贊皇帝延太尉等理禮等引公特進匈奴南單于金紫将軍當大鴻臚西中二千石千石六百石當大行令西階北面伏鴻臚跪贊太尉中二千石等奉璧皮帛羔鴈雉再拜賀太常贊皇帝延公等登掌禮引公至金紫将軍上殿當御座皇帝興皆再拜皇帝坐又再拜跪置璧皮帛御座前復再拜成禮訖謁者引下殿還故位王公置璧成禮時大行令並贊殿下二千石以下同成禮訖以贄授贄郎郎以璧帛付謁者羔鴈雉付太常太樂令跪奏雅樂以次作乘黄令乃出車皇帝罷入百官皆坐晝漏水六刻諸蠻夷朝客以次入皆再拜訖坐御入後三刻又出鐘鼓作謁者僕射跪奏請羣臣上謁者引王公二千石上殿千石六百石停本位謁者引王詣罇酌夀酒跪授侍中侍中跪置御座前王還自酌置位前謁者跪奏蕃王臣某等奉觴再拜上千萬嵗夀侍中云觴已上百官伏稱萬嵗四廂樂作百官再拜已飲入再拜謁者引王等還本位陛下者傳就席羣臣皆跪諾侍中中書令尚書令各於殿上上夀酒登歌樂升太官令又行御酒御酒升階太官令跪授侍郎侍郎跪進御座前乃行百官酒太樂令跪奏登歌三終乃降太官令跪請具御飯到階羣臣皆起太官令持羮跪授司徒持飯跪授大司農尚書持案並授持節持節跪進御座前羣臣就席太樂令跪奏食舉樂太官行百官飯按遍食畢太樂令跪奏請進舞樂以次作鼓吹令又前跪奏請以次進妓乃召諸郡計吏前受敕戒於階下宴樂畢謁者一人跪奏請罷退鐘鼓作羣臣北面再拜出未盡七刻謂之晨賀晝漏上三刻更出百官奉夀酒謂之晝㑹别置女樂三十人於黄帳外奏房中之歌其王公以下入朝者四方各為二番三嵗而周周則復之晉禮樂志武帝受命更定元㑹儀咸寧注是也傅元元㑹賦曰考夏后之遺訓綜殷周之典藝採秦漢之舊儀定元正之嘉㑹此則兼採衆代可知矣太始中有司奏諸侯之國其王公以下入朝者四方各為二番三嵗而周周則更始臨時有故則明年來朝眀年朝後更滿三嵗乃朝不得依恒數朝禮皆執璧如舊朝之制不朝之嵗各遣卿奏聘詔可東晉江左多虞不復晨賀夜漏未盡十刻開宣陽門至平眀始開殿門晝漏上水五刻皇帝乃出受賀皇太子出㑹者則在三恪下王公上正朝元㑹設白獸樽於殿庭若有能獻直言者則發此樽飲酒樽盖施以白獸形似名焉按禮白獸樽乃杜舉之遺式白獸盖示後世所為有忌憚也東晉王侯不之國其有受任居外則同方伯刺史二千石之禮亦無朝聘之制宋因晉制無所改易唯朝至十刻乃受朝賀升皇太子在三恪之上齊因之梁元㑹之禮未眀庭燎設文物充庭臺門闢禁衛皆嚴有司各從其事太階東置白獸樽羣臣及諸蕃客並集各從其班而拜侍中奏中嚴侍中扶左常侍扶右黄門侍郎一人執曲直華蓋從至階降輿納舄升御座前施奉珪藉王公以下至阼階脱舄劍升殿席南奉贄珪璧禮畢下殿納舄佩劍詣本位主客郎徙珪璧於東廂帝興入徙御座於西璧下東向設皇太子王公以下位又奏中嚴皇帝服通天冠升御座王公上夀禮畢食食畢樂伎奏太官進御酒主書付黄甘逮二品以上尚書騶騎引計吏郡國各一人皆跪受詔侍中讀五條詔計吏更應諾訖令陳便宜者聽詣白獸樽以次還座宴樂罷皇帝乘輿以入皇太子朝則逺遊冠乘金輅鹵簿以行與㑹則劍履升座㑹訖先興天監六年詔曰頃代以來元日朝畢次㑹羣臣則移就西壁下東向坐求之古義王者讌萬國唯應南面何更居東面於御座南向以西方為上皇太子以下在北壁坐者悉西邊東向尚書令以下在南方坐者悉東邊西向舊元日御座東向酒壺在東壁下御座既南向乃詔壺於南欄下又詔元日受五等贄珪璧並量所付周捨按周禮冡宰大朝覲贊玉幣尚書古之冡宰頃王者不親撫玉則不復須冡宰贊助尋尚書主客曹郎既冡宰𨽻職今元日五等奠玉既竟請以主客郎受鄭元注覲禮云既受之後出付玉人於外漢時少府職掌珪璧請主客受玉付少府掌帝從之又尚書僕射沈約議正㑹儀注御出乘輿至太極殿前納舄升階尋路寝之設本是人君居處不容自敬宫室按漢氏則以小車升殿請自今元正及大公事御宜乘小輿至太極階仍乘板輿升殿制可陳制先元㑹十日百官並習儀注令僕以下悉公服監之設庭燎街闕城上殿前皆嚴兵百官各設部伍而朝宫人皆於東廊隔綺疎而觀宫門既無藉外人但絳衣者亦得入觀是日上事人發白獸樽自餘多依梁禮云北齊元正大享百官一品以下流外九品以上與㑹一品以下正三品以上開國公侯伯散品公侯及特命之官刺史並升殿從三品以下從九品以上及奉正使人比流外官者在階下勲品以下端門外侍中宣詔慰勞郡國使詔牘長一尺三寸廣一尺雌黄塗飾上寫詔書三計㑹日侍中依儀勞郡國計吏問刺史太守安不及穀價麥苖善惡人間疾苦又班五條詔書於諸州郡國使人寫以詔牘一枚長二尺五寸廣一尺三寸亦以雌黄塗飾上寫詔書正㑹日依儀宣示使人歸以告刺史二千石一曰政在正身在愛人去殘賊擇良吏正決獄平徭賦二曰人生在勤勤則不匱其勸率田桑無或煩擾三曰六極之人務加寛養必使生有以自救没有以自給四曰長吏華浮奉客以求小譽逐末捨本政之所疾宜謹察之五曰人事意氣干亂奉公外内溷淆綱紀不設所宜糾劾正㑹日侍中黄門宣詔勞諸郡上計勞訖付紙遣陳土宜字有脱誤者呼起席後立書迹濫劣者飲墨水一升文理孟浪無可取者奪容刀及席既而本曹郎中考其文迹才辭可取者錄牒吏部簡同流外三品叙隋制正朝及冬至文物充庭皇帝出西房即御座皇太子鹵簿至眀陽門外入賀復詣皇后御殿拜賀訖還宫皇太子朝訖郡官客使入就位再拜上公一人詣西階解劍升賀降階帶劍復位而拜有司奉諸州表羣官在位者又拜而出皇帝入東房有司奏行事訖乃出西房坐定羣官入就位上夀訖上下俱拜皇帝舉酒上下舞蹈三稱萬嵗皇太子與㑹則設座於御東南西向羣臣上夀畢入位解劍以升㑹訖先興開皇四年正月梁王蕭巋朝於亰師次於郊外詔廣平王楊雄吏部尚書韋世康持節以迎衛尉設次於驛館雄等降就便幕巋服通天冠絳紗袍端珽立於東階下西面文武陪侍如其國雄等立於門右東面巋攝内史令栁顧言出門請事世康曰奉詔勞於梁王願言入告巋出迎於館門之外西面再拜持節者導雄與巋俱入至於庭下巋北面再拜受詔訖雄等乃出立於館門外道右東向巋送於門外西面再拜及奉見髙祖冠通天冠服絳紗袍御大興殿如朝儀巋服逺遊冠朝服以入君臣並拜禮畢而出自秦兼天下朝覲之禮遂廢及周封蕭詧為梁王訖於隋恒稱藩國始有朝見之儀梁王之朝周入畿大冡宰命有司致積其餼五牢米九十莒醯醢各三十五甕酒十八壺米禾各五十車薪蒭各百車既至大司空設九儐以致館梁王束帛乘馬設九介以待之禮成而出眀日王朝受享於廟既致享大冡宰又命公一人元冕乘車陳九儐以束帛乘馬致食於賓及賓之從各有差致食訖又命公一人弁服乘車執贄設九儐以勞賓王設九介迎於門外眀日朝服乘車還贄於公公皮弁迎於大門授贄受贄並於堂之中楹又眀日王朝服設九介乘車備儀衛以見於公事畢公致享明日三孤一人又執贄勞於梁王明日王還贄又眀日王見三孤如見三公眀日卿一人執贄勞王王見卿又如三孤於是三公三孤六卿又各餼賓並屬官之長為使牢米束帛同三公唐舊制元日大陳設皇太子獻夀次上公獻夀次中書令奏諸州表黄門侍郎奏祥瑞戸部尚書奏諸州貢獻禮部尚書奏諸蕃貢獻太史奏雲物侍中奏禮畢然後中書令又與供奉官獻夀時殿上皆呼萬嵗冬至亦然太宗貞觀元年十一月梁州都督竇軌請入朝上曰君臣共事情猶父子外官久不入朝情或疑懼朕亦須數見之問以人間風俗許令入朝至十五年正月上謂侍臣曰古者諸侯入朝有湯沐邑蒭禾百車待以客禮漢家故事為諸州刺史郡守創立邸舎於亰城頃聞都督刺史充考使至亰師皆賃房與啇人雜居既復禮之不足必是人多怨歎至十七年十月一日下詔令就亰城間房為諸州朝集使造邸第三百餘所上親觀焉至永淳中關中饑乏諸州邸舎漸漸殘毁至神龍元年司農卿趙履温希權要奏請出賣並盡至建中元年十月二十九日敕每州邸舎各令本州量事依舊營置至二年五月十四日戸部奏若令州府自買事又煩費伏請以官宅二千所分配共住過事却收敕㫖宜依四年詔所司於外廊置食一頓十三年十月尚書左僕射房元齡奏天下太平萬機事簡請三日一臨朝許之二十三年九月太尉長孫無忌等奏請視朝坐日上報曰朕登大位日夕孜孜猶恐擁滯衆務自今已後每日常坐又令百官寮朔望日服袴褶以朝髙宗永徽二年八月下詔來月一日太極殿受朝此後每五日一度太極殿視事朔望朝即永為常式亰官文武五品依舊五日一參顯慶二年太尉長孫無忌等奏以天下無虞請隔日視事許之中宗神龍元年初令文武官五品以上每朔望參日升殿食四月上以時屬炎暑制令每隔日不坐右拾遺靳恒上疏諌曰臣聞昔漢制反支日亦通奏事又光武在軍躬自覽疏眀帝撫運夜必讀書豈以四氣炎寒妨於政理竊為陛下不取元宗先天二年敕文武官朝參應著袴褶珂繖者其有不著入班者各奪一月俸若無故不到者奪一季祿其行香拜表不到亦准此頻犯者量事貶降其衣冠珂繖仍許著到曹司十月敕諸蕃使都府管羈縻州其數極廣每州遣使朝集頗成勞擾應須朝賀委當蕃都督與上佐及管内刺史自相通融眀為次第每年一蕃令一人入朝給左右不得過二人仍各分領諸州貢物於都府㸃檢一時錄奏文獻通考卷一百六
