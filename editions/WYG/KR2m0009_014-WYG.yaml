body:
  text: 文獻通考卷十四鄱陽馬端臨貴與著征𣙜考一征商闗市周官司市國凶荒札喪則市無征而作布有災害物貴市不税為民困乏也金銅無凶年因物貴大鑄泉以饒民㕓人掌斂市絘布􅄣布質布罰布㕓布而入於泉府布泉也鄭司農云絘布列肆之税布杜子春云􅄣當為儳謂無肆立持者之税也元謂總讀如租之布謂守斗斛銓衡者之税也質布者質人之所罰犯質劑者之泉也罰布者犯市令者之泉也㕓布者貨賄諸物邸舍之税凡屠者斂其皮角筋􅇧入於玉府以當税給作器也凡珍異之有滯者斂而入於膳府孟子曰市㕓而不征法而不㕓則天下之商皆悦而願藏於其市矣闗譏而不征則天下之旅皆恱而願出於其塗矣集註㕓市宅也張子曰或賦其市地之㕓而不征其貨或治之以市官之法而不賦其㕓盖逐末者多則㕓以抑之少則不必㕓也譏察也察異服異言之人而不征商賈之税也又曰古之為市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣集註治之謂治其爭訟龍斷岡壟之斷而髙也左右望者欲得此而又取彼也罔謂罔羅而取之也從而征之謂人惡其專利故就征其税後世縁此遂征商人也按如孟子之説可以見古今闗市征斂之夲意盖惡其逐末專利而有以抑之初非利其貨也漢髙祖接秦之弊諸侯並起民失作業而大飢饉凡米一石五千乃約法省禁量吏禄度官用以賦於民而山川園池市肆租税之入自天子至於封君湯沐邑皆各自為私奉養不領於天下經費言各收其所賦税以自供不入國朝之庫倉也經常也又令賈人不得衣絲乘車重租税以困辱之石林葉氏曰髙祖禁賈人毋得衣錦繡綺縠絺紵罽操兵乗騎馬其後又禁毋得為吏與名田凡民一算商賈獨倍其賤之至矣凡賈皆有籍謫以戍邉者七科吏有罪一亡命二贅壻三而賈人四故有市籍五父母有市籍六大父母有市籍七雖非先王之政然敦夲抑末亦後世所不能行也孝惠髙后時為天下初定復弛商賈之律然市井子孫亦不得仕宦為吏文帝時鼂錯説上曰商賈大者積貯倍息小者坐列販賣操其竒贏日游都市乗上之急所賣必倍故其男不耕耘女不蠶織衣必文采食必粱肉亡農夫之苦有阡陌之得因其富厚交通王侯力過吏勢以利相傾千里㳺敖冠盖相望乘堅䇿肥履絲曵縞此商人所以兼并農人農人所以流亡也今法律賤商人商人已富貴矣尊農夫農夫已貧賤矣故俗之所貴主之所賤吏之所卑法之所尊上下相反好惡乖迕而欲國富法立不可得也按漢初鑄錢輕於周秦一時不軌逐末之民蓄積餘贏以稽市物不勤南畝而務聚貨於是立法崇農而抑商入粟者補官而市井子弟至不得為吏可謂有所勸懲矣然利之所在人赴之如流水貨殖傳中所載大抵皆豪商鉅賈未聞有以力田致富者至孝武時東郭咸陽以大鬻鹽孔僅以大冶領大司農桑𢎞羊以貿人子為御史大夫而前法盡廢矣武帝元光六年初算商賈始税商賈車船令出算先公曰武帝承文景富庶之後即位甫一紀耳征利已至於此然則府庫之積其可恃哉興利之臣不知為誰時鄭當時為大司農以他日薦桑𢎞羊咸陽孔僅觀之益可疑也政使非其建白亦任奉行之責矣漢人多言汲鄭其實當時非黯比也黯奮不顧身以折功利之衝當時乃薦掊刻之人以濟武帝之欲烏得並稱哉元狩四年初算緡錢公卿請令諸賈人末作各以其物自占率緡錢二千而一算此謂讎緡錢者也随其用所施施於利重者其算益多諸作有租及鑄以手力所作而賣之率緡錢四千一算手作者得利差輕故算亦輕已上皆算緡錢之法非吏比者三老北邉騎士輕車以一算凡民不為吏不為三老騎士茍有輕車皆出一算商賈軺車二算商賈則重其賦也已上算車之法元光只算商車至是民庶皆不免船五丈已上一算商賈之船匿而能告者以半畀之所謂告緡也賈人無得籍名田以便農犯者沒入按算緡錢之法其初亦只為商賈居貨者設至其後告緡遍天下則凡不為商賈而有蓄積者皆被害矣故擇其關於商賈者登載於此而餘則見雜征𣙜門太初四年徙𢎞農都尉治武闗税出入者以給闗吏卒食王莽篡位於長安及五都立五均官令工商能採金銀銅連錫登龜取貝者皆自占司市錢府順時氣而取之諸取衆物鳥獸魚鱉百蟲於山林水澤及畜牧者嬪婦桑蠶織紝紡績補縫工匠醫卜及他方技商販賈人坐肆列里區謁舍居處所在為區謁舍今客店皆各自占所為於其所在之縣官除其夲計其利十一分之而以其一為貢敢不自占占不以實盡没入所采取按莽之法既𣙜商賈之貨而取其十一又效商賈之為而官自買賣今録其闗於征商者於此而餘則見市糴考晋自過江至於梁陳凡貨賣奴婢馬牛田宅有文券率錢一萬輸估四百入官賣者三百買者一百無文劵者隨物所堪亦百分收四名為散估歴宋齊梁陳如此以為常以人競商販不為田業故使均輸欲為懲勵雖以此為辭其實利在侵削宋孝武大明八年詔東境去歲不稔宜廣商賈逺近販鬻米粟者可停道中雜税自東晉至陳西有石頭津東有方山津各置津主一人賊曹一人直水五人以檢察禁物及亡叛者荻炭魚薪之𩔖小津並十分税一以入官淮水北有大市自餘小市十餘所備置官司税斂既重時甚苦之後魏眀帝孝昌二年税市入者人一錢其店舍又為五等收税有差北齊黄門侍郎顔之推奏請立闗市邸店之税開府鄧長顒贊成之後主大悦於是以其所入以供御府聲色之費軍國之用不在此焉税僧尼令曰僧尼坐受供養㳺食四方損害不少雖有薄斂何足為也後周閔帝初除市門税及宣帝即位復興入市之税每人一錢隋文帝受禅除入市之税唐武后長安二年鳯閣舍人崔融上議曰臣伏見有司税闗市事條不限工商但是行人盡税者臣謹按周禮九賦其七曰闗市之賦竊惟市縱繁雜闗通末游欲令此徒止抑所以咸增賦税夫闗市之税者唯斂出入之商賈不税往来之行人何四海之廣九州之雜闗必據險路市必憑要津若乃富商大賈豪宗惡少輕死重氣結黨連羣喑嗚則彎弓睚眦則挺劔小有失意且猶如此一旦變法定是相驚非唯流迸齊人亦自擾亂殊俗求利雖切為害方深而有司上言不識大體徒欲益帑藏助軍國殊不知軍國益擾帑藏愈空且如天下諸津舟行所聚洪舸巨艦千軸萬艘交貨往還昧旦永日今若江津河口置鋪納税則檢覆檢覆則遲留此津纔過彼鋪復止非唯國家税錢更遭主司僦賂何則闗為詰暴之所市為聚人之地税市則人散税闗則暴興暴興則起異圗人散則懐不軌况澆風乆扇變法為難徒欲禁末逰規小利豈知失元黙亂大倫乎古人有言王者藏於天下諸侯藏於百姓農夫藏於庾商賈藏於篋惟陛下詳之必若師興有費國儲多窘即請倍算商客加斂平人如此則國保富強人免憂懼天下幸甚徳宗時趙贊請諸道津㑹置吏閱商賈錢每緡税二十竹木茶漆税十之一以贍常平夲錢帝納其䇿屬軍用廹蹙亦隨而耗竭不能備常平之積文宗太和七年御史臺奏太和三年赦文天下除兩税外不得妄有科配其擅加雜𣙜率一切宜停令御史􅄗嚴加察訪者臣伏以方今天下無事聖政日躋務去煩苛與民休息臣昨因嶺南道擅置竹綀場税法至重害人頗深博訪諸道委知自太和三年凖赦文兩税外停廢等事旬月之内或以督察不嚴或以長吏更改依前却置重困齊人伏望今後自太和三年凖赦文所停兩税外科配雜𣙜等率復却置者仰勅到後十日内具却置事申聞奏仍申報臺司每有出使郎官御史令嚴加察訪苟有此色夲判官重加懲責長吏奏聽進止㫖依開成二年十二月武寧軍節度使薛元賞奏泗口税場應是經過衣冠商客金銀羊馬斛斗見錢茶鹽綾絹等一物已上並税今商量其雜税物請停絶勅㫖淮泗通津向来京國自有率税頗聞怨讟今依元賞所奏並停其所置官司所由悉罷所有泗口税額凖徐泗觀察使今年前後兩度奏状内監共得錢一萬八千五十五貫文内十驛一萬一千三百貫文委户部每年以實錢逐近支付泗宿二州以度支上供錢賜充夲軍用其他未贍委在才臣共息怨咨以泰行旅後周顯徳五年勅諸道州府應有商賈興販牛畜者不計黄牛水牛凡經過處並不得抽税如是貨賣處祗仰據賣價每一千抽税錢三十不得别有邀難按鬻賣而有税理也經過而有税非理也觀此則其来已乆而牛畜之外餘物俱有過税商旅安得願出其塗乎宋太祖皇帝建隆元年詔所在不得苛留行旅齎装非有貨幣當算者無得發篋搜索又詔榜商税則例於務門無得擅改更增損及創收止齋陳氏曰此薄税斂初指揮也恭惟我藝祖開基之嵗首定商税則例自後累朝守為家法凡州縣小可商税不敢專擅創取動輙奏禀三司取㫖行下謹按景徳四年三司鹽鐡商税按奏據濵州監税李忠恕狀凖條銀每兩税錢四十文其專欄等却稱銀元來不納税錢事省司檢㑹景徳元年二月二十二日勅令將銀出京城門往諸路州軍者並須於在京税務納錢每兩四十文不降指揮只是條貫自京出門其濵州税務元不收税合依久例不得創收天禧四年福建轉運司奏尚書屯田員外郎方仲荀奏乞收福建枋木税毎估一貫税一百文夲司勘㑹祥符編勅每木十條抽一條訖任販貨賣不收商税天聖七年福建運司奏福州商税有當增收錢者八當减錢者五當不收錢者十當創收錢者十二有㫖創收增收並不行餘依奏以此見當時州郡小可商税不敢專擅創收動須奏禀而漕臣省司亦不敢輙從所請横改條法至淳化三年令諸州縣有税以端拱元年至淳化元年收到課利最多錢數立為祖額比校科罰盖商税額比較自此始及王安石更改舊制増减税額所申省司不取㫖矣熙寧三年九月中書劄子詳定編𠡠所参詳自来場務課利增虧並自夲州保明三司立定新額始牒轉運司令夲處趁辦往復經動年嵗虚有留滯莫若令夲州自此立定祖額比較有㫖從之而夲州比較自此始商税輕重皆出官吏之意有增而無减矣政和間漕臣劉既濟申明於則例外増收一分税錢而一分増收税錢窠名自此起至今以五分充州用五分充轉運司上供謂之五分増收錢紹興二年令諸路轉運司量度州縣收税緊慢増添税額三分或五分而三五分增收税錢窠名自此始至今以十分為率三分夲州七分𨽻經􅄣制司謂之七分增税錢而商税之重極於今日李重進平以宣徽北院使李處新知揚州樞宻直學士杜韡監州税止齋陳氏曰以朝臣監州税始於此盖收方鎮利權之漸然是時初未以此置官也據太宗實録上謂趙普等曰王仁贍縱吏為姦諸州場院皆隠沒官錢朕初即位悉罷去分命使臣掌其事利入遂数倍以此見諸州監當分差使臣自太宗始雍熈三年始著於令監當使臣京朝官並三年替仍委知州通判提舉之遂為定員闗市之税凡布帛什器香藥寳貨羊彘民間典賣莊田店宅馬牛驢騾槖駞及商人販茶鹽皆算有敢藏匿物貨為官司所捕獲沒其三分之一以其半畀捕者販鬻而不由官路者罪之有官須者十取其一謂之抽税自唐室藩鎮多便宜從事擅其征利其後諸國割據掊聚財貨以自贍故征算尤繁宋朝每克復疆土必下詔蠲省凡州縣皆置務闗鎮或有焉大則專置官監臨景徳二年詔諸路商税年額及三萬貫以上審官院選親民官臨涖小則令佐兼領諸州仍令都監監押同掌之行者齎貨謂之過税每千錢算二十居者市鬻謂之住税每千錢算三十大約如此然無定制其名物各從地宜而不一焉開寳六年詔嶺南商賈齎生藥者勿算先是偽蜀時部民凡嫁娶皆籍其幃帳粧奩之數估價抽税是年詔除之太宗淳化二年詔曰闗市之租其来舊矣用度所出未遑削除征算之條當從寛簡宜令諸路轉運使以部内州軍市征所算之名品共参酌裁減以利細民又詔除商旅貨幣外其販夫販婦細碎交易並不得收其算常税名物令有司件析掲榜頒行天下至道元年詔兩浙諸州紙扇芒鞵及細碎物皆勿税二年詔民間所織縑帛非出鬻於市者勿得收算真宗景徳元年除杭越等十三州軍税鵝鴨年額錢四年詔京東西河北陜西江淮南民以柴薪渡河津者勿税太中祥符元年詔免諸路州軍農器收税熙寧十年以前天下諸州商税嵗額四十萬貫以上東京成都二十一務興元三務二十萬貫以上蜀九務彭八務永康五務梓二務遂二務十萬貫以上開封二十三務夀八務杭十二務眉二務綿二務漢二務嘉八務邛十九務簡四務果一務戎三務瀘六務合一務懐安三務利三務閬一務劔七務三泉縣二務䕫二務五萬貫以上西京二十六務北京十四務徐七務鄆十二務邳三務潁十一務滄二十二務博十四務棣十一務秦六務徳十三務京兆十二務楚八務真五務廬六務成五務揚七務蘄八務無為八務資一務髙郵八務蘇五務普一務昌三十八務洋八務興二務大寧監一務達一務施五務涪六務五萬貫以下南京九務青十務齊十一務沂五務兖九務淮陽二務濟六務單五務濮八務襄八務鄧七務許十務蔡十六務陳六務􅉸一務澶十務瀛七務濵六務思六務鳳四務永静軍九務真定十五務河中十一務陜六務并九務延十六務鳳翔十五務亳十一務舒十九務宿九務光七務黄九務湖十務婺八務秀七務信八務洪十一務吉七務潭七務榮一務雅十一務廣安三務富順監一務巴五務蓬一務雲安二務福十二務黔七務忠二務萬六務渝三務三萬貫以下宻六務登四務莱四務濰三務曹四務淄十一務郢二務唐五務孟七務汝十務鄭九務冀七務雄一務相七務邢七務定十七務懐八務衛八務洺九務深五務磁十一務趙六務保一務永寧一務華八務通利三務同十一務耀九務邠四務解五務慶十一務商四務寧六務環六務澤五務隴八務渭十八務階二務徳順一務乾八務通逺一務潞六務晋六務絳六務汾五務海四務泰七務泗七務滁四務和六務濠四務漣水二務越九務潤六務明五務常五務温六務台八務處七務衢八務睦六務江寧五務宣九務歙六務江六務池十一務饒六務太平八務南康七務䖍六務廣徳二務袁九務興國二務臨江五務衡一務江陵十四務鄂八務安五務岳十一務黎一務漢陽三務荆門二務文六務龍二務集七務璧一務南劒十一務開一務建七務泉九務汀八務漳十務廣十四務昌化三務潮五務一萬貫以下隨三務金十七務均三務信陽二務莫三務覇三務乾寧一務信安一務鄜五務虢四務坊四務岷三務原六務儀四務府二務代十九務隰九務忻一務石六務遼五務威勝五務平定四務南安三務建昌二務通二務桂陽二務鼎四務澧四務陵井監四務峡五務梁山一務邵武三務康十六務南䧺六務英八務五千貫以下廣濟一務房一務保安一務安肅一務丹四務廣信一務順安二務保安三十務鎮戎六務熙一務慶成二務鄜一務憲一務嵐三務慈二務寧化一務火山一務岢嵐一務保徳一務撫二務大通監二務江隂三務筠三務永三務郴一務邵三務全二務歸一務辰一務沅四務復二務茂一務南平三務興化八務循四務韶三務連四務賀二十一務封三務端一務新一務南恩一務惠四務梅二務春九務桂十四務容五務邕一務象七務融一務昭十二務梧一務藤一務龔一務潯三務貴十一務栁九務宜五務賓四務横三務化五務髙六務雷二務白一務欽一務鬰林一務萬安一務珠崖一務㢘五務瓊一務蒙一務竇二務南儀一務按天下商税惟四蜀獨重雖䕫戎間小壘其數亦倍蓰於内地之壯郡然㑹要言四蜀所納皆鐵錢十纔及銅錢之一則數目雖多而所取亦未為甚重而熙寧十年以後再定之額他郡皆増於前而四蜀獨减於舊豈亦以元額偏重之故歟仁宗時詔塲務嵗課倍增者乃增使臣一員監臨又詔取一嵗中数為額後雖羡益勿增仍毋得抑配人户苛留商賈求羡餘以希賞詳見酒税門天聖中有請算錢以助給費者仁宗曰貨泉之利欲流天下而通有無何可算也不許又詔有司裁定嵗課或不登而州縣責衙前備償者立命罷之神宗熙寧元年詔三路支移或民以租賦齎貨至邉貿易以轉官者毋税石炭自懐至京不征流民復業者所過免算四年詔三司凡民承買酒麴坊場率千錢輸税五十儲之以禄吏七年詔減國門税数十種錢不滿三十者蠲之其先外城二十門皆責以課息近止令隨其閑要分等以檢捕獲失之数為賞罰既而以嵗旱復有是命八年手詔問中書賈販之物法不税者其市利錢當輸否時有司創税賈物之入京者謂之市利錢以禄吏帝疑焉故問之鄭侠奏議跋後云建言者以諸門及夲務税錢額虧折皆是官員饒税過多而吏人受財公共偷瞞不知乃為市易拘攔商旅入務官買以致商旅不行稅乃大虧也遂立條約專攔皆有食錢官員不得饒税專攔取錢依倉法官員妄饒税並停替仍㑹問諸處每商旅納官税一百文即專攔所得市利錢㡬何諸處申約官税一百專攔等合得事例錢十文官中遂以為定例每納税錢一百文别取客人事例錢六文以給專攔等食錢已而市易司作弊於申收事例錢項即聲説所收不及十文亦收十文此明為所收事例錢不及十文亦收十文及法行乃謂所收之税不及十文亦收事例錢十文只如苧麻一斤收錢五文山豆根一斤收錢五文却問客人别要事例錢一十文夲門為不便申省及市易司並不施行致客人為事例錢故屡與專攔相拖拽云我官錢十文納了你却問我要甚事例錢必須取條貫分明詳諭方肯納錢而去不三五日間適因三月二十六日奏狀准三月二十七日聖旨市利錢三百文以下税錢者皆無市利錢矣看詳有司當立法時取專攔所得事例錢以供專攔逐月食錢不曰事例錢而以市利名之者盖取孟子所謂有賤丈夫左右望而㒺市利之意以為名是賤之也又從而多取之以益官豈不繆哉宜乎聖上聞之自三百以下税錢並不收市利也哲宗元祐元年從户部之請在京商税院酌取元豐八年錢五十五萬二千二百六十一緡有竒以為新額自明年始八年商人載米入亰糶者力勝税權蠲兵部尚書蘇軾上言臣聞榖太賤則傷農太貴則傷末是以法不税五榖使豐熟之鄉商賈爭糴以起太賤之價災傷之地舟車輻湊以壓太貴之直自先王以来未之有改也而近嵗法令始有五榖力勝税錢使商賈不行農末皆病廢百王不刋之令典而行自古所無之弊法百世之下書之青史曰收五榖力勝税錢自皇宋某年始也臣切為聖世病之臣頃在黄州親見累嵗榖熟農夫連車載米入市不了鹽酪之費所蓄之家日夜禱祠願逢飢荒又在浙西累嵗親見水災中民之家有錢無榖被服珠金餓死於市此皆官收五榖力勝税錢致商賈不行之咎也臣聞以物與人物盡而止以法活人法行無窮今陛下每遇災傷捐金帛散倉廪自元祐以來盖所費數千萬貫石而餓殍流亡不為少衰只如去年浙中水災陛下使江西北僱船運米以救蘇湖之民盖百餘萬石又計糴夲水脚官費不貲而客船被差僱者皆失業破産無所告訴與其官司費耗為害如此何似削去近日所立五榖力勝税錢一條只行天聖附令免税指揮則豐凶相濟農末皆利縱有水旱無大飢荒雖目下稍失課利而災傷之地不必盡煩陛下出捐錢榖如近嵗之多也今元祐編敇雖云災傷地分雖有例亦免而榖所從来必自豐熟地分所過不免收税則商賈亦自不行議者或欲立法如一路災傷則隣路免税一州災傷則鄰州亦然雖以今之法小為踈通而隔一州一路之外豐凶不能相救未為良法須是盡削近嵗弊法專用天聖附令指揮乃為通濟臣竊謂若行臣言税錢亦必不至大叚失陷何也五榖無税商賈必大通流不載見錢必有回貨見錢回貨自皆有稅所得未必减於力勝而災傷之地有無相通易為賑救官司省費其利不可勝計今肆赦甚近若得於赦書帶下光益聖徳收結民心實無窮之利取進止徽宗大觀元年凡典買牛畜舟車之𩔖未印契者更期以百日免倍税建中靖國初有此令至是蠲之二年詔在京諸門凡民衣屨榖菽雞魚果蔬炭柴磁瓦器之𩔖並蠲其税嵗終計所蠲令大觀庫給償重和元年以臣僚言凡民有遺嘱并嫁女承書令輸錢給印文憑其絲綿縑帛即其鄉聚市鬻者亦令先歴近地場務請税尋皆罷之八月臣僚又言税物由便道者請令批引致務參驗并税之詔户部下諸路漕司計畫以行宣和二年宮觀寺院臣僚之家為商販者令闗津搜閲如元豐法輸税嵗終以次数報轉運司取旨初元符令品官供家服用之物免税至建中靖國初馬牛駝騾驢已不入服用之例而比年臣僚營私謀利者衆宫觀寺院多有免税專降之㫖皆以船艘賈販州縣無孰何之者故有是詔三年兩浙淮西等路税例外増一分者勿取其先漕臣被旨起應奉物乃増税以更費至是御筆罷之欽宗靖康元年詔都城物價未平凡税物權更蠲税一年髙宗建炎元年詔京城久閉道路方通有販貨上京者與免税又詔應殘破州縣合用竹木磚瓦並免收税又詔北来歸正人兩淮復業人在路不得收税又詔於平江崑山縣江灣浦量收海船税應官司回易諸軍收買物色依條收税盖寧於海道取給軍需而不以病民也又慮税網太宻詔減併一百三十四處減罷者九處免過税者五處至於牛米柴麺民間日用所需並與罷税孝宗隆興之初招集流民凡兩淮之商旅歸正人之興販並與免税州縣續置税場不曾申明去處並罷之又詔鄉落墟市貿易皆從民便不許人買撲收税减罷州縣税務甚多光宗復罷楚州雅州管下鎮務减臨安府富陽餘杭税額寧宗時减罷州縣税務亦不一闗市之征日以蠲免中興列聖仁民之心何如哉其間貪吏並緣苛取百出紹興二十一年六月臣僚言諸州額外征取止資公庫無名妄用乞令監司檢察私立税場算及緡錢㪷米菜茹束薪之屬乾道四年詔諸州縣不得私置税場邀阻客旅嘉定五年四月臣僚言廣中無名場税在在有之若循之浰頭梅之梅溪皆深村山路畧通民旅私立闗津緡錢㪷米菜茹束薪並令輸免或擅用稽察措置乾道九年二月詔諸縣税場於正官外擅置稽察措置等官許民户越訴添置專攔收檢紹興十年九月勅諸路税務置專攔外𩔖皆過数招收并有監官親隨之𩔖通同接取可令禁止淳熈五年四月臣僚言池州鴈汊等處欄頭妻子直入船内搜檢謂之女欄頭與吾民相刄相靡不啻讎敵虚市有税空舟有税乾道六年閏月臣僚言重征莫甚於沿江凡泝流而上至於荆峡虚舟徃来謂之力勝舟中無重貨謂之虚喝宜征百金元抛千金之數謂之花數騷擾不一乞嚴禁止從之以食米為酒米以衣服為布帛皆有税紹興三十二年八月都省言専攔騷擾甚者指食米為酒米指衣服為布帛遇士夫行李則搜囊發箧目以興販紹興二十五年十二月敕訪聞場務利於所入以至士夫舉子道路之費搜箧倒囊一切攔税可以禁止甚者貧民博易𤨏細於村落指為漏税輙加以罪嘉定八年二月臣僚言濱江之民擔負魚鮓於村落博賣未嘗經渉城市亦誣其漏税而加之罪或遇溪簰販運火柴每束亦收五六文錢乞嚴行覺察從之空身行旅亦白取金百方紆路避之則攔截呌呼嘉定五年四月臣僚言廣中場或有貨物則抽分給賞㫁罪倍輸倒嚢而歸矣嘉定五年四月臣僚言聞者咨嗟則指曰是大小法場也紹興二十二年臣僚言蘄之蘄陽江之湖口池州之雁汊税務號為大小法場是以中興以來申明越津攔税之禁上曰昨見河􅃋有歩擔負米尤為所害其専攔有在十里外私自收税者况舟船之利多于歩擔其􅅰可知紹興三十二年三月臣僚言州縣多遣人于三二十里外拘攔税物以發闗引為名乞禁止乾道四年九月詔不得離縣五里外攔掠村民紹興四年三月嘉定八年二月皆有禁其場務税賞不許引用倘於租額外有剰数聴其累賞是道天下重征其告漏税不實者坐之慶元六年五月詔其有合税者照自來則例不得欺詐騷擾如例外多收投子錢許民越訴紹熙元年十一月其赴務投税者不得截留收買慶元五年四月詔列聖之禁戢吏姦也如此是宜商賈之利通而民生之用足雖中興再造民力已竭而不至于甚困者皆此之由也文獻通考卷十四
