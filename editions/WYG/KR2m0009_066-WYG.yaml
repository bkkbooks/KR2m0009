body:
  text: 文獻通考卷六十六鄱陽馬端臨貴與著職官考二十官品周官有九儀之命正邦國之位九命作伯上公有功徳者加命爲二伯得專征伐五侯九伯者也蓋長諸侯爲分伯八命作牧侯伯有功徳者加命得專征伐於諸侯又云一州之牧也王之三公亦八命七命賜國王之卿六命出封加一等者鄭司農云出就侯伯之國六命賜官鄭司農云子男入爲卿治一官也鄭𤣥謂此王六命之卿賜官者得自置其臣治家邑如諸侯五命賜則則者地未成國之名也凢王之大夫四命出封加一等五命賜之以方百里二百里之地也方三百里以上爲成國王莽時以二十五成爲則方五十里與夏五十里國同四命受器受祭器為上大夫也鄭𤣥謂此公之孤始得有祭器者也三命受位受下大夫之位也鄭𤣥謂此列國之卿始有列位於王爲王臣再命受服受祭衣服爲上士也鄭𤣥謂此受元冕之服列國之大夫再命一命受職始命爲正吏謂列國公侯伯之士也於子男爲大夫一云受職事右内外官六萬三千六百七十五人内二千六百四十三人外諸侯國官六萬一千三十二人内職掌府史胥徒賈人工人奄寺罪閩蠻夷貉等五𨽻醫人圉人虎士視瞭力召反及奚漿􅇼醢醯鹽羃酒桃舂抌饎槀等抌音肉饎音熾熟食也爾雅云酒食也女職一萬五千九百五十人都計内外官及内職掌人七萬九千六百二十五人其旄人舞者及太祝巫覡閽人毎門及囿世婦毎宫等官職并冬官人數及外職掌人並闕按帝王世紀云湯受命有三千餘國又按王制云殷時天下諸侯國千七百七十三當是殷氏政衰諸侯相并季末之時所存之國耳大國二百四十九次國五百一小國一千二十三大國次國則皆三卿五下大夫二十七上士唯小國二卿其大夫與士如大國次國之數大凢列國卿大夫士有六萬一千三十二人及周初有千八百國列國卿大夫士大約與殷不異罷侯置守郡縣官吏百姓之所奉豈非勤乎周制非二王之後列國諸侯其爵無至公者也當周之世有功之臣無如太公周公者然封爵皆爲侯詩云穆穆魯侯又曰齊侯之子者也而春秋有虞公虢公州公者或因殷之舊爵或嘗爲天子之官子孫因其號耳非周之典制也故天子三公八命卿六命大夫四命上士三命中士再命下士一命天子三公加命則爲方伯九命卿加一命則出爲侯伯七命大夫加一命則出爲子男五命天子元士出封爲附庸加一命爲四命大夫以下徳盛者出則爵命並加士則徳未周備但得進命不進爵也是以卿出則爲侯伯大夫出則爲子男皆爵命並進士出爲附庸但得進命故附庸之君猶稱名與士同故春秋傳云附庸之君名也二王之後本非出加之例直以承祀先代故九命爲上公其有功之臣皆爲侯伯七命而已若王之子弟及異姓之有大功徳而封爵不過侯但得進地故齊魯之國皆以侯爵而受上公之地五百里之封若列土侯伯有賢能之徳而又有功者則加一命爲牧故春官之職云八命作牧子男之君則五命上公之孤四命卿三命大夫再命士一命大國之卿三命大夫再命次國之卿三命大夫再命士一命小國之卿再命大夫一命其士不命凢士一命而受爵周禮爵及命士故云一命而受爵有受爵有受命者必有職故周禮云一命受職眀一命之士職爵俱有也再命受服於君不自爲也然則一命者其服自爲也一命尚受職再命不言自眀矣三命受車馬三命謂侯伯之卿也再命已受服於君則三命之卿受服不疑矣而復别受車馬於君故曲禮云夫爲人子三賜不及車馬眀其三命得受車馬之義然三命之卿則有命於天子之禮故周禮云三命受位眀諸侯之卿受三命者皆有列位於王朝也則小國之卿再命者雖得命於天子於王朝未有列位也三命之卿始受車馬則再命以下車馬自爲之也若君特賜者不在其例四命受器謂公之孤卿受祭器於公四命始受器三命以下皆自爲之也故禮記云有田祿者先爲祭器三命以上旣受祭服四命者受服亦可眀矣三命之卿尚有列位於王四命亦可知也凡大國之君不過七命小國之君不過五命凡自稱者伯曰天子之臣分土之伯諸侯之於天子曰某土之守臣某守音手又反在邊曰某屏之臣某公子曰臣孽孽音五葛反士曰傳遽之臣於大夫曰外私傳遽以車馬給使者也士臣於大夫者曰私人也傳丁戀反列國之大夫入天子之國曰某士亦謂諸侯之卿也三命以下天子士也其士者如晉韓起聘於周儐者曰晉士起也自稱曰陪臣某陪重也於外曰子子有徳之稱也經曰高子來盟於其國曰寡君之老使自稱曰某使謂使人於諸侯也某名也秦制爵二十等以賞功勞其十八等自大庶長以下又似官也其帥人皆更卒也有功賜則在軍吏之例自公大夫以上令丞與亢禮言從公大夫以上人與令丞亢禮亢當也言高下相當無所卑屈漢官秩差次二漢並有秦二十等爵然以爲功勞之賞非恒秩也丞相太尉司徒司空諸將軍及諸侯王國官不在此目中二千石月百八十斛王莽改曰卿御史大夫太常光祿勲衞尉太僕廷尉大鴻臚宗正大司農少府執金吾二千石月百二十斛亦曰眞二千石王莽改為上大夫太子太𫝊少𫝊將作大監太子􅉟事大長秋典屬國水衡都尉京兆尹左馮翊右扶風司𨽻校尉城門校尉中壘校尉屯騎校尉歩兵校尉越騎校尉長水校尉胡騎校尉射聲校尉虎賁校尉州牧郡太守比二千石月百斛王莽改為中大夫丞相司直光禄大夫光禄中郎五官左右三將光禄虎賁中郎將光禄中郎將騎都尉西域都䕶副校尉奉車都尉駙馬都尉郡尉千石月八十斛王莽改為下大夫丞相長史大司馬長史御史中丞更名御史長史前後左右將軍長史太常丞光禄勲丞衞尉丞太僕丞廷尉左右丞大鴻臚丞宗正丞大司農丞少府丞執金吾丞太子衞率萬戸以上縣令比