body:
  text: 文獻通考卷二百二鄱陽馬端臨貴與著經籍考二十九史職官漢官儀一卷續補一卷陳氏曰後漢軍謀校尉汝南應劭仲逺撰按唐志有漢官五卷漢官儀十卷今惟存此一卷載三公官名及名姓州里而已其全書亡矣李埴季允嘗續補一卷漢官典儀一卷續補一卷陳氏曰漢衛尉蔡質撰雜記官制及上書謁見禮式隋志有漢官典職儀式二卷今存一卷李埴亦補一卷其續者皆出於史中採拾漢官舊儀三卷陳氏曰漢議郎東海衛宏敬仲撰或云胡廣按宏本傳作漢舊儀四篇以載西京雜事不名漢官今此惟三卷而又有漢官之目未知果當時本書否唐志亦無官字舊在儀注𩔖以其載官制為多故著於此唐六典三十卷鼂氏曰唐元宗撰李林甫張說等注以三公三師三省九寺五監十二衛等列其職司官佐叙其秩品以擬周禮雖不能悉行於世而諸司遵用殆将過半觀唐會要請事者往往援據以為實韋述以為書雖成而竟不行過矣然識者謂自唐虞至周有六官而無寺監自秦迄陳有寺監而無六官獨此書兼之故官皆複重也陳氏曰題御撰李林甫等奉敕注按韋述集賢記注開元十年起居舍人陸堅被㫖修六典上手寫白麻紙凡六條曰理教禮政刑事典令以𩔖相從撰録以進張說以其事委徐堅思之歴年未知所適又委毋焸余欽韋述始以令式入六司象周禮六官之制其㳂革並入注然用功艱難其後張九齡又以委咸二十六年奏草上至今在書院亦不行用今按新書百官志皆取此書即太宗貞觀六年所定官令也周官六職視周禮六典已有邦土邦事之殊不可考證唐制内外官與周制逈然不同而强名六典可乎善乎范太史祖禹之言曰既有太尉司徒司空而又有尚書省是政出於二也既有尚書省而又有九寺是政出於三也本朝裕陵好觀六典元豐官制盡用之中書造命門下審覆尚書奉行機事往往留滯上意亦頗以為悔云中台志十卷鼂氏曰唐李筌撰起殷周迄隋唐纂輔相邪正之迹分皇王覇亂亡五𩔖以為鑒戒唐相以李林甫陳希烈附皇道筌上元中自表天寶初追以綴名云元和百司舉要二卷陳氏曰唐宰相趙郡李吉甫𢎞憲撰首稱文班八十四司四百六十員武班二十六司一百八十員都計六百四十員末稱京文武官及府縣總三千七百九十九員意者當時實数也具員故事十卷陳氏曰唐鳯閣舍人梁載言撰以唐官具員附之歴代事迹蓋後人職林職官分紀之𩔖所從始也或稱職祖連珠崇文總目又作具員事跡中興書目惟有七卷三卷缺官品纂要十卷陳氏曰唐樂安任戩撰以官品令為主而階職勲爵隨品具列歴代㳂革頗著其要戩舉進士不第為此書當太和之丁未御史䑓記十二卷鼂氏曰唐韓琬撰載唐初至開元御史䑓中制度故事以大夫中丞侍御史殿中監察主簿録事分門載次名氏行事著論一篇叙御史正邪得失進擢誅滅之狀附卷末以為世戒陳氏曰自唐初迄開元五年御史姓名行事及官制㳂革皆詳著之第八卷為琬著傳九卷以後為右䑓右䑓創於武后廢於中宗嵗月蓋不久也末有雜記五十七條御史䑓故事三卷陳氏曰唐朝集使洺州録事參軍李構撰集賢注記二卷鼂氏曰唐集賢學士韋述撰述在集賢四十年天寶丙申摭置院始末及院中故事修撰書史之次及孝明時學士名氏頗善叙事南宫故事一卷鼂氏曰不題撰人韋述云開元中劉鄭蘭撰劉儒者無著述方翰林志一卷鼂氏曰唐李肇撰纂唐世翰林院中供奉儀則制誥書詔之式其後云睿聖文武皇帝裂海岱十二州為三道之嵗蓋憲宗元和十四年也承㫖學士院記一卷陳氏曰唐承㫖河南元稹㣲之撰載承㫖姓名自貞元二十一年鄭絪至元和十五年杜元頴并稹為十二人末又有李德裕李紳韋處厚三人蓋後人所益也翰林學士記一卷陳氏曰唐侍講學士萬年韋處厚德載撰翰林院故事一卷陳氏曰唐學士京兆韋執誼撰翰林學士院舊規一卷陳氏曰唐學士馮翊楊鉅文碩撰雜記院中事例及文書格式其祠祭祝版社稷宗廟上至天地用伏惟尚享岳凟而降只曰尚享此例今人皆莫之知則施之尊卑無别矣鉅宰相收之子其為學士在昭宗時重修翰林壁記一卷陳氏曰唐學士丁居晦撰開元二年也所記姓名迄於咸通而獨無天寶大歴學士為不可曉翰林盛事一卷陳氏曰唐張著撰記唐朝儒臣羙事凡三十八人史館故事録三卷鼂氏曰不題撰人姓名記史館雜分六門迄於五代李獻臣以為後周史官所著陳氏曰六門曰叙事史例編修直筆曲筆而終之以雜録末稱皇朝廣訓則是周朝史官也翰林續志二卷鼂氏曰皇朝蘇易簡撰易簡在北門最承太宗睠遇録元和以後至國朝翰林故事以續李肇之書金坡遺事三卷鼂氏曰皇朝錢惟演載國朝禁林儀式事迹并學士名氏文元公述眞宗禮待儒臣三事附於卷末陳氏曰題名自建隆至天聖四年凡四十七人自開元而下合三百一十五人其他典故視前記詳矣翰林雜志一卷鼂氏曰不題撰人輯唐書韋執誼故事元稹承㫖壁記韋來㣲新楼記杜元頴監院使記鄭璘視草亭記并詩李宗諤題名記為一篇或云蘇易簡子耆采其父翰林續志所遺附益之陳氏曰蘇耆以其父遭遇恩禮之盛續於其後名次續志别書金坡遺事一卷陳氏曰學士澶淵鼂逈昭遠撰因錢惟演寄示遺事别書眞宗待遇恩禮三則於其後翰苑雜記一卷陳氏曰學士饒陽李宗諤昌武撰掖垣叢志二卷鼂氏曰皇朝宋庠撰景祐中李宗諤始取國初掌誥名氏刻之於石自為紀序庠因之成此書王禹玉頗譏其疎畧裴庭裕載舍人上事知印宰相壓角至今傳之為故事而庠書闕焉時為三字掖垣續志一卷鼂氏曰不詳撰人續宋庠書迄元祐六年十一月陳軒試中書舍人御史䑓記五卷陳氏曰不知何人作記本朝御史䑓事至崇觀間嘉祐御史䑓記五十卷鼂氏曰右皇朝馮潔已撰御史䑓有記始於武后時姚庭筠其後韓琬韋述嗣有紀著嘉祐中王疇命潔已續之乃上自太祖建隆之元迄於嘉祐之末凡一百四年分門載其名氏行事凡三百餘人潔已拯之子也為叙傳兩篇述其父事且自叙立朝本末云與吕獻可傅欽之趙閲道相善而鄙韓玉汝周孟陽亦可概見其為人也新御史䑓記鼂氏曰右皇朝宋聖寵編崇寜中聖寵為察官續韓琬書咸用其規式所異者不為諸人立傳於儀制勑令格式為詳後人續至紹興九年御史䑓弹奏格一卷鼂氏曰右政和中御史中丞蔣猷奏乞委屬官李彌大將本䑓制勑令格式彈奏事件編成格目六月書成上之陳氏宰相拜罷録一卷鼂氏曰皇朝陳繹奉詔編起范質止曾公亮所載拜罷之由與實録不同元祐史臣謂繹多出已意陳氏樞府拜罷録一卷鼂氏曰陳繹編起魏仁浦止宋綬宰輔拜罷録二十四卷陳氏曰史館修撰范冲元長等撰起建隆元年止紹興六年宰相自范質至張浚執政自趙普至折彦質名記除授年月訓詞亦畧叙在位本末於后執政拜罷録十卷鼂氏曰不題撰人自建隆元年止紹興九年按國朝以樞密院及參知政事為執政改官制後以左右丞兩省侍郎并密院為執政建炎三年後復用舊制云國朝輔相年表一卷續一卷陳氏曰同知太常禮院開封陳繹和叔撰自建隆庚申迄治平丙午續自丁未迄紹興十四年稱臣易記而不著姓當是李易也時方自給事中奉祠其曰私題臣易之次者其書蓋未必上而私續之耳自後接於嘉定則後人所益也百官公卿表一百四十五卷書録解題作十五卷鼂氏曰皇朝司馬光君實等撰熈寜中光以翰林學士兼史官修撰建議欲據國史旁采異聞叙宋興以來百官除拜效漢書作表以便缷覽詔許之光請宋敏求同修及敏求卒又請趙彦若繼之歴十二年書成公自序曰唐初職事官有六省一䑓九寺三監十六衛十六府之屬其外又有勲官散官勲官以賞戰多散官以褒勤舊故必折馘執俘然後賜勲積資累考然後進階以其不可妄得故當時以為榮及高宗東封武后預政欲求媚於衆始有汎階自是品秩浸訛朱紫日繁矣肅宗之後四方糜沸兵革不息財力屈竭勲官不足以勸武功府庫不足以募戰士遂并職事官通用為賞不復選材無所愛吝將帥出征者皆給空名告身自開府至郎將聼臨事注名後又聴以信牒授人有至異姓王者於是金帛重而官爵輕矣或以大將軍告身纔易一醉其濫如此重以藩方䟦扈朝廷畏之窮極褒寵茍求姑息遂有朝編卒伍暮擁節旄夕解提衣旦紆公衮者矣流及五代等袠益紊三公端揆之貴施於軍校衣紫執象之榮被於胥史名噐之亂無此為甚大宋受命承其餘弊方綱紀大基未暇釐正故䑓省寺監衛率之官止以辨班列之崇卑制廩禄之厚薄多無職業其所謂官者乃古之爵也所謂差遣者乃古之官也自餘功臣檢校官散官階勲爵邑徒為繁文人不復貴凡朝廷所以鼓舞羣倫緝熈庻績者曰官曰差遣曰職而已於三者之中復有名同實異交錯難知又遷徙去來常無虚日欲觀其大畧故自建隆以來文官知雜御史以上武官閤門使以上内臣押班以上遷除黜免刪其繁冗存其要實以倫𩔖相從以先後相次為百官公卿表云陳氏曰此書本入職官𩔖以稽古録序所謂建隆接熈寜臣又著之於百官表即此書蓋與通鑑相與表裏故著之編年𩔖鼂志有一百四十二卷未詳巽岩李氏序曰司馬光以熈寜二年建議請撰宋興以來百官公卿表元豐四年表成凡十卷詔送編修院世莫知其書何如也按光集有百官公卿表總序文官知雜御史以上武臣閤門使以上内臣押班以上其遷出咸表見之初不紀其卷第某家藏舊書有所謂百官公卿表者七卷宰相參知政事樞密使副為一卷三師三公左右僕射東宫三師三少賓客為一卷使相宣徽節度留後觀察為一卷尚書丞郎給諫常侍為一卷知開封府三司使學士舍人御史中丞為一卷觀文資政端明樞密侍講讀學士為一卷十二衛上將軍六軍統軍為一卷他官皆止天禧惟宰相執政盡熈寜疑此表則光等所修也然卷第比實録所載尚缺其三倫𩔖往往顚倒紛錯而總序所稱閤門使及押班以上皆絶不見豈三卷所缺即此表者而傳寫偶失之歟若然則他官除拜俱當以元豐為限矣不應自天禧以來遽絶筆但詳於宰相執政也且當時修此表歴十二年乃成其久如是其疎畧顧如是是必不然當某家舊藏不得其純全耳某能薄不堪世用頗願盡力於史學而本朝故事尤切欣慕某既不自料故追繼光作將以昭明祖宗之盛德大業使衆說咸會於一不敢鑿空架虚熒惑視聽固當事事謹其月日如古春秋乃可傳信彼百官沿革公卿除拜皆事之最大者也年表又安可缺因取舊七卷亟整治之續編其年至宣和止元符以前皆從實録治平而上又參諸正史元符以後不免慿所傳聞國書既非人間通有辛苦求得之脫簡誤字絶無他本可校於先後次序諒多牴牾但慿所傳聞則宣和距元符二十五六年兹不詳此皆某之罪也改而正諸必有所待年表舊止七卷卷第不均今釐析之與某所續編者總一百四十二卷凡所增益倫𩔖具之目録其故事則當别見續紀此不重列按此序則温公本書止十卷巽岩續編推而廣之為一百四十二卷鼂氏所言乃巽岩續書非温公本書也陳氏以為未詳者是未見巽岩之書然又以温公之書為十五卷則不知其何所本也鼂氏在巽岩之前安得見其書所謂一百四十五卷者决非巽岩之書也職林二十卷陳氏曰集賢院學士錢塘楊侃撰咸平二年所序有胡昉者明道二年作後序增益事實七百四十五條而以新續標之侃端拱進士晩為知制誥避眞宗舊諱更名大雅歐陽公其壻也集中有墓誌輔弼名對四十卷目録一卷鼂氏曰皇朝劉顔撰纂西漢迄五代羣臣應對之名者汲黯有天子置公卿輔弼之臣寜令從諛承意䧟主不誼之言顔取以名其書天聖初馮元為侍講上之顔常為令坐事免由是詔復其官職官分紀五十卷陳氏曰富春孫逄吉彦同撰大抵本職林而增廣之條例精密事實詳偹矣秦少游序之元祐七年也官制學制名一卷陳氏曰司馬光撰唐職林三十卷陳氏曰石埭尉維揚馬永錫明叟撰以唐六典為主而附以新史所載事實頗采傳記歌詩之屬政和乙未天台左譽序朝集院須知一卷陳氏曰無名氏録承平時京朝官得替回朝見禮式皇宋館閣五卷陳氏曰不著名氏所記止於元祐中興館閣書目云秘閣校理宋匪躬撰又云共八門元十五卷存十一卷今本止五卷不見門𩔖前三卷又混而為一意未必全書也蓬山志五卷陳氏曰秘書少監劒川羅畸疇老撰凡十五門崇寜四年序麟䑓故事五卷鼂氏曰皇朝程俱撰紹興初復館職首入館纂集舊聞成十二篇予所藏書斷自南渡之前獨此書以載官制後事為詳故録之陳氏曰俱在承平時凡三入省故其見聞為詳中興館閣録十卷續十卷陳氏曰秘書監天台陳騤叔進撰淳熈中騤長蓬山與同僚録建炎以來事為此書李燾仁父為序續録者後人因舊文增附之耳巽岩李氏序曰上世官修其方故物不坻伏後世弗安厥官其方莫修職業因以放失夫方云者書也䆒其本原事迹及朝夕所當思營者悉書之法術具焉使居是官者奉以周旋雖百世可考爾周官三百六十官各有書小行人適四方則物為一書多至五書蓋古之人將有行也舉必及三惟始衷終依據審諦則其設施斯可傳久六龍駐蹕臨安踰四十年三省樞宻院制度尚稽復舊惟三館秘閣巋然傑出非百司比自唐開元韋述所集記注元祐間宋宣獻之孫匪躬作館閣録紹興改元程俱致道作麟䑓故事宋氏皆祖韋氏而程氏故事并國初他則多闕蓋未知其有宋録也惜最後四卷俄空焉余屡蒐采弗獲欲補又弗暇每每太息今所編集第斷自建炎以來凡物巨細靡有脫遺視程氏誠當且密官修其方行古道者不當如是耶昏忘倦游喜見此書乃援筆為之序翰林羣書三卷翰林遺事一卷陳氏曰學士承㫖番陽洪遵景嚴自李肇而下十一家及年表中興後題名共為一書而以其所録遺事附其末總為三卷遺事録諸書所未及者洪氏父子兄弟四人入翰苑續史館故事一卷陳氏曰著作佐郎曲阿洪興祖慶善撰記國朝史館事迹以續舊編祖宗官制舊典三卷陳氏曰直龍圗閣東萊蔡惇元道撰大畧以為元豐用官階寄禄雖號正名而流品混淆爵位輕濫故以祖宗舊典與新制參稽互考而論其得失元道文忠公參政齊之姪孫而翰林學士延慶之子渡江卒於涪陵尹和靖焞嘗題其墓官制舊典正誤一卷陳氏曰無名氏國朝官制沿革一卷陳氏曰黄琮元禮撰職官記一卷陳氏曰大理少卿蜀人張縯季長撰專載新舊遷轉之異亦以寄禄為未然也以上三家皆附蔡氏書後官制新典十卷陳氏曰熊克撰其書以元豐新制為主而元祐之畧加通變崇政之恣為紛更皆具列焉聖朝職畧二十卷陳氏曰熊克撰倣馬永錫唐職林考其廢置因革亦頗采故事摘舊制誥中語附焉其書猶草創未成蓋應用之具也續百官公卿表二十卷質疑十卷陳氏曰兵部尚書永嘉蔡㓜學行之撰續温公舊書起熈寜至靖康質疑者考異也職源五十卷陳氏曰大理司直金華王益之行甫撰亦簡牘應用之書也而專以今日見行官制為主蓋中興以後於舊制多所併省故也元輔表一卷陳氏曰龔頤正撰專録宰相不及執政漢官考六卷陳氏曰知金州清江徐筠孟堅撰以百官表官制為主而紀傳及注家所載皆輯而録之漢官總録十卷陳氏曰王益之撰大較亦如前書縣法一卷陳氏曰北京留守温陵吕惠卿吉甫撰曰法令詞訟刑獄簿歴催科給納灾傷盗賊勸課教化凡十門為縣之法備於此矣雖古今事殊而大體不能越也惠卿小人之雄於才術固優然法令居首而教化乃居其末不曰俗吏而謂之何哉縣務綱目二十卷陳氏曰贑陽劉鵬撰凡四十四門四百七十餘事其說不止於作縣而事關縣務者為多焉元符庚辰序作邑自箴十卷陳氏曰李元弼持國撰政和丁酉序中興百官題名五十卷陳氏曰監察御史臨川何異同叔撰首卷為宰輔拜罷録餘以次列之刻浙漕司其後以時増附渡江之初庻務草創諸司間有不可考者多缺之齊齋䑓諫論二卷陳氏曰尚書霅川倪思正父撰嘉定初更化矯韓氏用事之弊於是為論三篇言為之鷹犬者罪在䑓諫已而其弊自若也則又為牘論六篇言其情狀益精詳凡為䑓諫之所以得所以失者至矣盡矣金國官制一卷陳氏曰金世宗大定年所攽仿取唐及本朝舊制以文其官爵之制文獻通考卷二百二
