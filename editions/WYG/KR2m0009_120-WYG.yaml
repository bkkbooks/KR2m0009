body:
  text: 文獻通考卷一百二十鄱陽馬端臨貴與著王禮考十五國恤虞舜攝政二十有八載帝乃殂落帝堯殂落崩也堯夀一百一十七嵗百姓如䘮考妣百姓百官三載四海遏宻八音遏絶宻静也四海四夷四夷絶音三年則華夏可知言盛徳所化者逺也九賈公彦儀禮疏曰易繋辭云古者期䘮無數在黄帝事章中是黄帝以前心䘮終身不變也虞書云百姓如䘮考妣三載四海遏宻八音則是唐虞之日心䘮三年亦未有服制也􅇻太甲惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冢宰此湯崩踰月太甲即位奠殯而告王疏曰太甲中篇云三祀十有二月伊尹以冕服奉嗣則是除䘮即吉眀十二月服終禮記稱三年之䘮二十五月而畢知此年十一月湯崩湯崩踰月太甲即位奠殯而告亦如周康王受顧命尸於天子春秋之世凢有奠殯即位踰年即位踰月即位當奠殯即位也此言伊尹祠于先王是特設祀也嗣王祗見厥祖是始見祖也特設祀禮而王始見祖眀是初即王位告殯為䘮主也髙宗王宅憂亮隂三祀隂黙也居憂信黙三年不言禮記作諒闇鄭元以為凶廬論語作諒隂孔氏曰諒信也隂黙也字義各不同尚書大𫝊書曰髙宗梁闇三年不言何謂梁闇也傳曰髙宗居凶廬三年不言此之謂梁闇子張曰何謂也孔子曰古者君薨王世子聽於冢宰三年不敢服先王之服履先王之位而聽焉以民臣之義則不可一日無君矣不可一日無君猶不可一日無天也以孝子之隠乎則孝子三年弗居矣隠痛也字或為􅇻故曰義者彼也隠者此也逺彼而近此則孝子之道􅍯矣䘮服四制書曰髙宗諒闇三年不言善之也王者莫不行此禮何以獨善之也曰髙宗者武丁武丁者􅇻之賢王也繼世即位而慈良於䘮當此之時􅇻衰而復興禮廢而復起故善之善之故載之書中而髙之故謂之髙宗周武王崩成王十三而嗣立周公居冢宰攝政眀年六月既𦵏周公冠成王而朝于祖以見諸侯祝雍作頌閔予小子嗣王朝于廟也閔予小子遭家不造嬛嬛在疚謂遭武王崩家道未成嬛嬛然孤特在憂患之中於乎皇考永世克孝念兹皇祖陟降庭止庭直也陟降上下也言武王長世䏻以孝行為子孫法文王以直道事天治民維予小子夙夜敬止於乎皇王繼序思不㤀序緒也繼其序思其所行之道不忘成王将崩命召公畢公率諸侯相康王作顧命惟四月哉生魄王不懌始生魄十六日王有疾故不悦懌甲子王乃洮頮水相被冕服慿玉几王發大命臨羣臣必齊戒沐浴今疾病危殆故但洮盥頮面扶相者被衮冕慿玉几以發命乃同召太保奭芮伯彤伯畢公衞侯毛公師氏虎臣百尹御事同召六郷下至御治事者太保芮伯彤伯畢公衞侯毛公六卿也冢宰第一召公領之司徒第二芮伯為之宗伯第三彤伯為之司馬第四畢公領之太保畢毛三公兼也芮彤畢衞毛皆國名入為天子公卿師氏大夫官虎臣虎賁氏百尹百官之長及諸御治事者平時則召六卿使帥其屬此則将發顧命自六卿至御事同以王召命也王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹予審訓命汝此下成王頋命也自嘆其疾大進惟危殆病日至既彌甚而留連恐遂死不得誓言以嗣續我志此我所以詳審發訓命汝統言日疾甚言日病昔君文王武王宣重光奠麗陳教則肄肄不違用克達􅇻集大命武猶文謂之重光猶舜如堯謂之重華也奠定麗依也言文武宣布重明之徳定民所依陳列教條則民習服習而不違天下化之用能逹於殷邦而集大命於周也在後之侗敬迓天威嗣守文武大訓無敢昏逾侗愚也成王自稱言其敬迎上天威命無敢少忽嗣守文武大訓而無敢昏逾天威天命也大訓述天命者也今天降疾殆弗興弗悟爾尚眀時朕言用敬保元子釗𢎞濟于艱難釗康王名成王言今天降疾我身殆將必死弗興弗悟庶幾明是我言用敬保元子釗大濟於艱難曰元子者正其統也柔逺能邇安勸小大庶邦懐来馴擾安寜勸導皆君道所當盡者合遠邇小大而言又以見君徳所施公平周溥而不可有所偏滯也思夫人自亂于威儀爾無以釗冒貢于非㡬亂治也威者有威可畏儀者有儀可象舉一身之則而言也盖人受天地之中以生是以有動作威儀之則成王思夫人之所以為人者自治於威儀耳自治云者正其身而不假於外求也貢進也成王又言羣臣其無以元子而冒進於不善之幾也盖幾者動之微而善惡之所由分也非幾則發於不善而陷於惡矣威儀舉其著於外者而勉之也非幾舉其發於中者而戒之也威儀之治皆本一念一慮之微可不謹乎孔子所謂知幾子思所謂慎獨周子所謂幾善惡者皆致意於是也成王垂絕之言而拳拳及此其有得於周公者亦深矣蘇氏曰死生之際聖賢之所甚重也成王將崩之一日被冕服以見百官出經遠保世之言其不死於燕安婦人之手也明矣其致刑措宜哉兹既受命還出綴衣于庭越翼日乙丑王崩綴衣幄帳也羣臣既退徹出幄帳於庭喪大記云疾病君徹懸東首於北牖下是也於其明日王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外延入翼室恤宅宗桓毛二臣名伋太公望子為天子虎賁氏延引也翼室路寢旁左右翼室也太保以冢宰攝政命桓毛二臣使齊侯呂伋以二干戈虎賁百人逆太子釗於路寢門外引入路寢翼室為憂居宗主也呂氏曰發命者冢宰傳命者兩朝臣承命者勲戚顯諸侯體統尊嚴樞機周宻防危慮患之意深矣入自端門萬姓咸覩與天下共之也延入翼室為憂居之宗示天下不可一日無統也唐穆敬文武以降閹寺執國命易主於宮掖而外廷猶不聞然後知周家之制曲盡備豫雖一條一節亦不可廢也丁卯命作冊度命史為册書法度傳顧命於康王越七日癸酉伯相命士湏村伯相召公也召公以西伯為相須取也命士取材木以供喪用狄設黼扆綴衣狄下士祭統云狄者樂吏之賤者也喪大記狄人設階盖供喪役而典設張之事者也黼扆屛風畫為斧文者設黼扆幄帳如成王生存之日也牖間南嚮敷重篾席黼純華玉仍几此平時見羣臣覲諸侯之座也敷設重席所謂天子之席三重者也篾席桃竹板席也黼白黒雜繪純緣也華采色也華玉以餙几仍因也因生時所設也周禮吉事變几凶事仍几是也西序東嚮敷重底席綴純文貝仍几此旦夕聽事之座也東西廂謂之序底席蒲席也綴雜采文貝有文之貝以餙几也東序西嚮敷重豐席畫純雕玉仍几此養國老饗羣臣之座也豐席筍席也畫彩色雕刻鏤也西夾南嚮敷重筍席元紛純漆仍几此親屬私燕之座也西廂夾室之前筍席竹席也紛雜也以元黒之色雜為之緣漆漆几也牖間兩序西夾其席有四牖户之間謂之扆天子負扆朝諸侯則牖間南嚮之席座之正也其三席各隨事以時設也將𫝊先王顧命知神之在此乎在彼乎故兼設平生之座也越玉五重陳寳赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圗在東序允之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房於東西序座北列玉五重及陳先王所寳器物赤刀赤削也大訓三皇五帝之書訓誥亦在焉文武之訓亦曰大訓𢎞璧大璧也琬琰圭名夷常也球鳴球也河圖伏羲時龍馬負圖出於河易大𫝊所謂河出圖是也允國名允國所制舞衣大貝如車渠鼖鼓長八尺兌和皆古之巧工埀舜時共工舞衣鼖鼓戈弓竹矢皆制作精巧中法度故歴代傳寳之孔氏曰𢎞壁琬琰大玉夷玉天球玉之五重也呂氏曰西序所陳不惟赤刀𢎞璧而大訓參之東序所陳不惟大玉夷玉而河圖參之則其所寳者斷可識矣愚謂寳玉器物之陳非徒以為國容觀意者成王平日之所觀閲手澤在焉陳之以象其生存也楊氏中庸傳曰宗器於祭陳之示能守也於顧命陳之示能𫝊也大輅在賔階面綴輅在阼階面先輅在左塾之前次輅在右塾之前大輅玉輅也綴輅金輅也先輅木輅也次輅象輅革輅也王之五輅玉輅以祀不以封為最貴金輅以封同姓為次之象輅以封異姓為又次之革輅以封四衛為又次之木輅以封蕃國為最賤其行也貴者宜自近賤者宜逺也王乘玉輅綴之者金輅也故金輅謂之綴輅最遠者木輅也故木輅謂之先輅以木輅為先輅則革輅象輅為次輅矣賔階西階也阼階東階也面南嚮也塾門側堂也五輅陳列亦象成王之生存也周禮典路云若有大祭祀則出路大喪大賔客亦如之是大喪出輅為常禮又按所陳寳玉器物皆以西為上者成王殯在西序故也二人雀弁執恵立于畢門之内四人綦弁執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執銳立于側階弁士服雀弁赤色弁也綦弁以文鹿子皮為之惠三隅矛路寢門一名畢門上刄刄外嚮也堂亷曰戺冕大夫服劉鉞屬戣瞿皆㦸屬鋭當作鈗説文曰鈗侍臣所執兵從金允聲周書曰一人冕執鈗讀若允東西堂路寢東西廂之前堂也東西垂路寢東西序之階上也側階北陛之階上也吕氏曰古者執戈㦸以宿衛王宫皆士大夫之職無事而奉燕私則從容義徳有膏澤之潤有事而司禦侮則堅明守義而無腹心之虞下及秦漢階楯執㦸尚餘一二此制既廢人主接士大夫者僅有視朝數刻而周廬陛楯或環以椎埋嚚悍之徒有志於復古者當深繹也王麻冕黼裳由賔階隮卿士邦君麻冕蟻裳入即位麻冕三十升麻為冕也隮升也康王吉服自西階升堂以受先王之命故由賔階也蟻元色公卿大夫及諸侯皆同服亦廟中之禮不言升階者從王賔階也入即位者各就其位也吕氏曰麻冕黼裳王祭服也卿士邦君祭服之裳皆纁今蟻裳者盖無事於奠祝不欲純用吉服有位於班列不可純用凶服酌吉凶之間亦禮之變也太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賔階隮御王冊命太宗宗伯也彤纁也太保受遺太史奉册太宗相禮故皆祭服也介大也大圭天子之守長尺有二寸同爵名祭以酌酒者瑁方四寸邪刻之以冐諸侯之圭壁以齊瑞信也太保宗伯以先王之命奉符寳以𫝊嗣君有主道焉故升自阼階太史以册命御王故持書由賔階以升蘇氏曰凡王所臨所服用皆曰御曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞爕和天下用答揚文武之光訓成王顧命之言書之册矣此太史口陳者也皇大后君也言大君成王力疾親憑玉几道掦臨終之命命汝嗣守文武大訓曰汝者父前子名之義卞法也臨君周邦位之大也率循大卞法之大也爕和天下和之大也居大位由大法致大和然後可以對掦文武之光訓也王冄拜興答曰𦕈𦕈予末小子其能而亂四方以敬忌天威眇小而如亂治也王拜受顧命起答太史曰眇眇然予微末小子其能如父祖治四方以敬忌天威乎謙辭退托於不能也顧有敬迓天威嗣守文武大訓之語故太史所告康王所答皆於是致意焉乃受同瑁王三宿三祭三咤上宗曰饗王受􅈘為主受同以祭宿進爵也祭祭酒也咤奠爵也禮成於三故三宿三祭三咤葛氏曰受上宗同􅈘則受太保介圭可知宗伯曰饗者傳神命以饗告也太保受同降盥以異同秉璋以酢授宗人同拜王答拜太保受王所咤之同而下堂盥洗更用他同秉璋以酢酢報祭也祭禮君執圭瓚祼尸太宗執璋瓚亞祼報祭亦亞祼之𩔖故亦秉璋也以同授宗人而拜尸王答拜者代尸拜也宗人小宗伯之屬相太保酢者也太宗供王故宗人供太保太保受同祭嚌宅授宗人同拜王答拜以酒至齒曰嚌太保復受同以祭飲福至齒宅居也太保退居此所以同授宗人又拜王復答拜太保飲福至齒者方在喪疚歆神之賜而不甘其味也若王則喪之主非徒不甘味雖飲福亦廢也太保降收諸侯出廟門俟太保下堂有司収徹器用廟門路寢之門也成王之殯在焉故曰廟言諸侯則卿士以下可知俟者俟見新君也康王既尸天子遂誥諸侯作康王之誥王出自應門之内大保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黄朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆冄拜稽首王義嗣徳答拜王出畢門立應門内盖内朝所在也召公主西方諸侯畢公繼周公主東方諸侯諸侯皆陳四黄馬而朱其鬛以為庭實賔諸侯也諸侯舉所奉圭兼幣曰一二臣衛為王藩衛故曰臣衛敢執壤地所出奠贄皆再拜首至地以致敬義嗣徳云者史氏之辭謂康王冝嗣前人之徳故答拜也吳氏曰秦穆公使人弔公子重耳稽顙而不拜穆公曰則未為後也盖有後者拜不拜未為後也弔者含者禭者升堂致命主孤拜稽顙成為後者也康王之見諸侯若以為不當拜則疑未為後也此純乎吉也答拜既正其為後且知其以喪見也太保暨芮伯咸進相揖皆冄拜稽首冡宰及司徒與羣臣皆進相揖定位又皆再拜稽首陳戒於王曰敢敬告天子云云王若曰庶邦侯甸男衛惟予一人釗報誥康王在喪故稱名春秋嗣王在喪亦書名也昔君文武云云羣公既皆聽命相揖趨出王釋冕反䘮服始相揖者揖而進也此相揖者揖而退也蘇氏曰成王崩未𦵏君臣皆冕服禮歟曰非禮也謂之變禮可乎曰不可禮變於不得已嫂非溺終不援也三年之䘮既成服釋之而即吉無時而可者曰成王顧命不可以不𫝊既𫝊不可以䘮服受也曰何為其不可也孔子曰将冠子未及期日而有齊衰大功之䘮則因䘮服而冠冠吉禮也猶可以䘮服行之受顧命見諸侯獨不可以䘮服乎太保使太史奉冊授王于次諸侯入哭於路寝而見王於次王䘮服受教戒諌哭踊答拜聖人復起不易斯言矣春秋𫝊曰鄭子皮如晋𦵏晋平公将以幣行子産曰䘮安用幣子皮固請以行既䘮諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則䘮禮未畢其以䘮服見是重受弔也大夫将若之何皆無辭以退今康王既以嘉服見諸侯而又受乘黄玉帛之幣使周公在必不為此然則孔子何取此書也曰至矣其父子君臣之間教戒深切著眀足以為後世法孔子何為不取哉然其失禮則不可不辨朱子語録或問居䘮朝服曰麻冕乃是祭服顧命用之者以其以後繼統事於宗廟故也受冊用之者以其在廟而凶服不可入故也舊説以廟門為殯宫之門不知是否若朝服則古者人君諒隂三年自無變服視朝之禮苐不知百官總已以聽冢宰冢宰百官各以何服莅事耳想不至便用元冠黒帶也後世既無亮隂總已之事人主不免視朝聽政則豈可不酌其輕重而為之權制乎又况古者天子皮弁素積以曰視朝衣冠皆白不以為嫌則今在䘮而白布衣冠以臨朝恐未為不可但入太廟則湏吉服而小變耳又或問康王釋䘮服而被冕裳且受黄朱圭幣之獻諸家以為禮之變獨蘇氏以為禮之失何也對曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語盖謂此類耳如伊訓元祀十有二月朔亦是新䘮伊尹已奉嗣王祗見厥祖固不可用凶服矣扶君卜人師扶右射人師扶左謂君疾時也卜當為僕聲之誤也僕人射人皆平時贊正君位者君薨以是舉不忍變也周禮射人大喪與僕人遷尸疏曰周禮太僕職掌正王之服位射人職掌國之三公孤卿大夫之位及王舉動悉隨王故知也君夫人卒于路寝言死者必於正處者疏曰君謂諸侯諸侯三寢一正者曰路寢餘二曰小寢卒歸於正故在路寢莊公三十二年八月公薨于路寢穀梁𫝊路寢正寢也寢疾居正寢正也男子不絶於婦人之手以齊終也僖公薨于小寢譏即安謂就夫人寢也陳公薨不書地文公薨于臺下襄公薨于楚宫定公薨于高寢皆非禮也右始死夏采掌大䘮以冕服復于太祖以乘車建緌復于四郊求之王平常所有事之處乘車玉輅於太廟以冕服不出宫也太祖始祖廟也緌用旄牛尾為之綴於幢上王祀四郊乘玉輅建太常今以復去其旒異之於生於疏曰復者各依命數天子則十二人各服朝服而復太祖之廟當升自東霤北靣履危西上云臯天子復如是者三乃卷衣投於有司以箧受之升自阼階入衣於尸復而不蘇乃行死事也郊事神之處乘玉輅生時九旗有緌有旒今死去旒是異於生也君復於小寝大寢小祖大祖庫門四郊尊者求之備也亦他日嘗有事疏曰於小寢者前曰廟後曰寢爾雅云室有東西廂曰廟無東西廂有室曰寢此小寢高祖以下廟之寢也王侯同大寢謂天子始祖諸侯太祖也小祖高祖以下廟也王侯同太祖天子始祖諸侯太祖廟也兩言於廟求神備也周禮夏采以冕服復于太祖廟是也其小廟則祭供復之其小寢大寢則肆供服之四郊則夏采服之天子崩復曰天子復矣始死時呼􅅎辭也不呼名臣不名君也疏曰普天率土王者一人而已故呼天子復而王者必知其呼而反矣若諸侯則曰某甫稱字也右復鼓人大䘮則詔太僕鼓始崩及窆時也太僕大䘮始崩戒鼓𫝊達于四方戒鼓撃鼓以警衆四方以鼓聲𫝊逹而聞之也大司馬大䘮平士大夫平者正其職與其位司士大䘮作士掌事事謂奠歛之屬疏曰始死則有奠及至小歛大歛朝夕朔月月半薦新遷廟祖奠大遣奠等皆是未𦵏以前無尸不忍異于生皆稱奠也宰夫大䘮小䘮掌小官之戒令帥執事而治之大䘮王后世子小䘮夫人以下小官士也其大官則冡宰掌其戒令治謂共辦虎賁氏國有大故則守王門大䘮亦如之大故謂兵灾也大䘮謂王崩非常之難湏警備旅賁氏掌執戈盾夾王車而趨䘮紀則衰葛執戈盾葛葛絰武士尚輕服疏曰臣為王貴賤皆斬衰斬衰麻絰至𦵏乃葛今王始死即服葛故云武士尚輕大司徒若國有故則致萬民于王門令無節者不行于天下大故謂王崩及寇兵司險國有故則藩塞阻路而止行之以其屬守之唯有節者得達之有故䘮灾及兵也閉塞要路之道􅍯奸寇也疏曰䘮謂王䘮天子崩巷市七日諸侯薨巷市三日疏曰若居天子諸侯之䘮必巷市者以庶人憂戚無復求覔財利要有急湏之物不得不求于邑里之内而為巷市右戒臣民射人大䘮與僕人遷尸僕人太僕也僕人與射人俱掌王之朝位也王崩小歛大歛遷尸於室堂朝之象也檀弓扶君卜人師扶右射人師扶左君薨以是舉䟽曰始死于北牖下遷尸于南牖下又云小歛于户内是遷尸于室小歛訖遷尸于戸外又遷尸大歛于阼階大歛訖及遷尸于西階以入棺是遷尸于室堂云朝之象也者君所在而臣之朝故云朝之象玉府大䘮共角枕角柶角枕以枕尸角柶角匕也以楔齒士䘮曰楔齒令可飯含䟽曰按既夕禮楔皂如軛上兩末状如枇杷㧞屈中央楔齒始死遷尸于牀幠歛衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也牀謂所設牀第當牖者也䟽曰遷尸于牀者尸初在地冀生氣復既而不生故更遷尸于牀而離初死處以近南當牖也幠覆也歛衾者将擬大歛之時衾被也楔齒解見上綴足用燕几者為尸應著屨恐足辟戾亦使小臣用燕几綴拘之令直也幕人大䘮共帷幕帟綬詳見陳殯具條委人䘮紀共其木村木材給帳事此已上兩條陳殯具條通用右遷尸楔齒綴足帷堂天子崩告䘮曰天王登假告訃也登上也假已也上已者若仙去云耳右命訃唯天子之䘮有别姓而哭使諸侯同姓異姓庶姓相從而為位别于朝覲爵同同位姓疏曰此言朝覲爵同同位然覲禮諸侯受舎于朝同西面異姓東面與此不同者覲禮先公而後侯先侯而後伯亦是爵同位同但同姓之中先爵尊耳檀弓肆師大䘮令外内命婦序哭序使相次秩外疏曰按下注六卿以出及朝廷卿大夫妻皆為命婦其内命婦即下經内命女是也謂三夫人以下至女御也哭法以服之輕重為先後若然則内命婦為王斬衰居前諸臣之妻從服齊衰者居後也内宗大䘮序哭者内宗凡内女之有爵者序次外内宗及命婦哭位九嬪若有賔客則從后大䘮帥叙哭者亦如之亦從后帥猶導也后哭衆之次叙者乃哭列疏曰外内命婦哭時皆依尊卑命數在后後為前後哭之故湏帥導使有次序也序唯天子之䘮别姓而哭肆師序哭内宗哭九嬪帥叙哭皆朝夕哭條所通用司士凡士之有守者令哭無去守疏曰此文承大䘮之下令哭無去守則大夫士有使役守當湏同為天子斬衰不可廢事空官故令哭不得去守也既正尸子坐于東方卿大夫父兄子姓立于東方有司庶士哭于堂下北面夫人坐于西方内命婦姑姊妹子姓立于西方外命婦率外宗哭于堂上北面正尸者謂遷尸牖下南首也子姓謂衆子孫也姓之言生也其男子立于主人後女子立于夫人後世婦為内命婦卿大夫之妻為外命婦外宗姑姊妹之女疏曰人君初䘮哭位子坐于東方者子謂世子世子尊故坐于東方謂室内尸東故士䘮禮云主人入坐于牀東是也子姓謂衆子孫所生也准士禮父兄子姓大功以上正立于室内東方今此經總云卿大夫父兄子姓立於東方以士禮言之當在室内但諸侯以上位尊不可不正定世子之位故顧命康王之入翼室恤宅宗不宜與卿大夫父兄子姓俱在室内也卿大夫等或當在户外之東方遥繼主人之後有司庶士哭于堂下北面者以其卑故在堂下北面則諸父兄子姓等雖小功以下皆在堂上西面也夫人坐于西方者亦近尸故士䘮禮云婦人俠牀東面士禮畧但言俠牀人君則當以帷幛之也内命婦則子婦也姑姊妹謂君姑姊妹也子姓君女孫皆立于西方也外命婦率外宗哭于堂上北面者外命婦謂卿大夫妻外宗謂姑姊妹之女外命婦外宗等䟽于内命婦故在户外婦人無堂下之位故皆堂上北面也右哭位小宰受其含襚幣玉之事王䘮諸侯諸臣有致含襚幣玉之事右受含襚幣玉司常大䘮共銘旌銘旌王則太常也士䘮禮曰為銘各以其物疏曰士喪禮為銘各以其物云則以緇長半幅頳末長終幅廣三寸書名于末此盖其制也按禮緯云天子之旌髙九仭大夫五仭士三仭按士䘮禮竹杠長三尺則死者以尺易仭天子九尺諸侯七尺大夫五尺士三尺其旌身亦以尺易仭也書銘自天子達于士其辭一也男子稱名婦人書姓與伯仲書銘謂書亡人名字于旌旗也天子書名于太常諸侯以下書于旌旗男子稱名此並􅇻禮周世則尚文臣不名君天子復曰皋天子復矣右為銘鬯人大䘮之大渳設斗共其釁鬯斗音主尸斗所以沃尸也釁以鬯酒使之香美者鄭司農云釁讀為徽築疏曰鄭云釁尸以鬯酒使之香美者按肆師云大䘮鬻則此鬯酒中兼有欝金香草故得香美也司農云釁讀為徽者以鬯釁尸故以徽為荘飾義也欝人大䘮之渳共其肆器肆器陳尸之器䘮大記曰君設大盤造冰焉大夫設夷盤造冰焉士倂瓦盤無冰設牀檀第有枕此之謂肆器天子亦用夷盤肆師大䘮大渳以鬯則築鬻鬻音煑伯築香草煑以為鬯以浴尸香草欝也草䟽曰上小宗大䘮以鬯渳則肆師與之築欝金香和鬯酒以浴之使尸之香也典絲䘮記共其絲纊組文之物以給線縷著旰口綦握之屬青與赤謂之文而著直畧反下同徐猪畧反縫疏曰此鄭並據士䘮禮言云以給線縷者謂所裁皆用線縷釋經絲也云著旰口綦文之屬者釋經縷組按士䘮禮握手元纁裏著組繋按䘮大記屬纊以俟絶氣内則云屨著綦鄭云綦屨繋是用縷組之事也云青與赤謂之文繢人職文繡之屬亦用絲故連言也内司服后之䘮共其衣服凡内具之物内具紛帨線纊鞶袠之屬疏曰后䘮所共衣服者正謂襲時十二稱小歛十九稱大歛百二十稱及内具之物也按内則事舅姑有紛帨線纊鞶袠故死者入壙亦兼有數物之以上兩條下陳小歛大歛衣皆通用公襲卷衣一元端一朝服一素積一纁裳一爵弁二元冕一襃衣一朱綠帶申加大帶於上卷音袞以朱綠帶者襲衣之帶飾之雜朱緑異于生也此帶亦以素為之申重也重于革帶也革帶以佩韍必言重加大帶者眀雖有變必􅍯此二𢃄也士襲三稱子羔襲五稱今公襲九稱是尊卑襲數不同矣諸侯七稱天子十二稱與䟽曰公襲以卷衣上服㝡在内者公身貴故以上服親身欲尊顯加賜故襃衣㝡外而細服居中也子羔賤故卑服親身也元端二者賀云燕居之服元端朱裳也朝服一者緇衣素裳公日視朝之服也素積一者皮弁之服公視朔之服也纁裳一者賀云冕服之裳也亦可鷩毳任取中間一服也爵弁二者元衣纁裳二通也此是始命之服示之重本故二通也招魂君亦用爵弁服也元冕之下又取一也襃衣一者所加賜之衣㝡上華君賜也自袞衣至此合爵弁二通合九稱注云朱綠帶者襲衣之帶飾以雜朱綠異于生者也此帶既非革帶又非大帶祗是衣之小帶衣帶以素為之而朱綠飾之亦異于生時也申重也重于革帶也者謂於革帶之上重加此大帶知非對小朱綠帶為重者以朱綠小帶􅄆在于衣非是總束其身若總束其身唯有革帶大帶故知對革帶為重者必見革帶與大帶者眀雖有變必備此二帶天子諸侯以下襲之數士䘮禮襲三稱子羔襲五稱此文公襲九稱是尊卑襲數不同唯天子諸侯無文故約之云諸侯七稱天子十二稱與與者疑辭也君錦冒黼殺綴旁七凡冒質長與手齊殺三尺䟽曰冒謂襲後小歛前所用以韜尸也冒有質殺者作兩嚢毎輙横縫合一頭又縫連一邉餘一邉不縫兩囊皆然也上者曰質下者曰殺君質用錦殺用黼鄭注士䘮禮云冒韜尸者制如直囊上曰質下曰殺質正也其用之先以殺韜足而上後以質韜首而下旁綴七者不縫之邉上下安七帶綴以結之故云綴旁七也凢冒質長與手齊凢謂貴賤冒通名也言冒之質從頭韜來至下長短與手相齊也殺三尺者殺從足韜上長三尺凌人大䘮共夷槃冰漢制廣大盤廣八尺長丈二尺深三尺漆赤中即夷盤君設大盤造冰焉設牀檀第有枕造猶内也檀第􅃝箕也謂無席如浴時牀也禮自仲春之後尸既小歛先納冰盤中乃設牀于其上不施席而遷尸焉秋涼而止典瑞大䘮共飯玉含玉飯玉碎玉以雜米也含玉柱左右齻及在口中者雜記曰含者執璧将命則是璧形而小耳疏曰按玉府已云大䘮共含玉此又言之者盖玉府主作之此官主其成事而共之玉府大䘮共含玉疏曰玉者含玉壁形而小以為口實含人䘮紀共飯米飯所以實口不忍虚也君用粱大夫用稷士用粱皆四朴實者唯盈天子飯九貝此盖夏時制也周禮天子飯用玉含一牀襲一牀遷尸於堂又一牀皆有枕席君大夫士一也䟽曰言此三節各自有牀皆有枕席唯含一時暫徹枕使平面故士䘮禮商祝徹枕設中是也含襲及堂皆有席故鄭注士䘮禮商祝襲衣于牀牀次含牀之東祍如初又注士禮設牀第于兩楹之間祍如初有枕云祍寝卧之席亦下莞上簟是也君大夫士一也者貴與賤同然也右陳沐浴襲飯含之具小宗伯王崩大肆以秬鬯渳渳亡婢反杜音泯李士辨反鄭司農云大肆大浴也杜子春讀渳為泯以秬鬯浴尸元謂大肆始陳尸伸之疏曰肆訓為陳為伸故也以秬鬯浴尸使之香也大職祝云大䘮始崩以肆鬯渳尸小祝又云大䘮贊渳彼二官以掌之此言之者察其不如儀也春官大祝大䘮以肆鬯渳尸肆鬯所肆鬯為陳尸也春官小祝大䘮贊渳故書渳為灄杜子春云當為渳渳謂浴尸春官女御大䘮掌沐浴王及后之䘮之疏曰王及后䘮沐用潘浴用湯禮男子不死于婦人手今䘮亦使女御浴者按士䘮禮浴時男抗衾則不使婦人今王䘮婦人或亦供給湯物亦得謂之掌也天官管人汲不說繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人沐浴水用盆沃水用枓浴用絺巾挋用浴衣如他日小臣爪足浴餘水棄于坎其母之䘮則内御者抗衾而浴管掌管籥之人又古禮反掌管舎之人說吐活反繘均必反枓音主又音斗挋音震抗衾者蔽上重形也挋拭也𤓰足㫁足爪也屈疏曰繘汲水瓶索也遽促于事故不說去井索但縈就之于手盡階不升堂者以水從西階而升知西階者以士䘮禮云為垼于西牆下故也沃水用枓酌盆水沃尸絺細葛浴時除垢挋用浴衣浴罷用生時浴衣拭尸令燥也如他日謂如平生尋常之日浴盤餘汁棄之坎中坎是甸人所掘於階間取土為竈之坎其母之䘮則内御者抗衾而浴者内外宜别故用内御舉衾内御婦人亦管人汲事事如前唯浴用人不同耳管人汲授御者御者差沐於堂上士沐粱大夫沭稷甸人為垼於西墻下陶人出重鬲管人受沭乃煑之甸人所取徹廟之西厞薪用㸑之管人授御者沭乃沭沭用瓦盤挋用巾如他日小臣爪手翦湏濡濯棄於坎差七何反垼音役陶音桃重直龍反鬲音厯煑諸許反厞扶味反㸑七逭反差淅也淅飯米取其潘以為沐也沭沃用枓沭于盤中文相變也士䘮禮沭稲此云士沐􅆝盖天子之士也以差率而上之天子沭黍與粱疏曰差謂淅米取其潘汁也君沭粱大夫沭稷士沭者皆取用其米取其汁而沐也将沐之時甸人之官為垼于西牆下土垼墼竈甸人具此為垼竈以煑沐汁陶人作瓦器之官重鬲者謂縣重之罌也是瓦瓶受三升以沐米為粥實于瓶以䟽布羃口繋以篾縣之覆以葦席管人受沐乃煑之者淅于堂上管人亦升盡等不上堂而就御者受淅汁下往西階于垼竈鬲中煮之也㸑然也甸人為竈竟取復魄人所徹正寝西北厞以然竈煑沐汁也謂正寢為廟神之也然舊云厞是屋簷也謂抽取屋西北簷也熊氏云厞謂西北隅厞隐之處徹取屋外當厞隐處薪義亦通也取此薪而用者示主人已死此堂無復用故取之也管人授御者沐者煑汁􅌻而管人又取以升階授堂上御者御者受汁入為尸沐也士䘮禮云沐巾一又云挋用巾注云挋晞也清也如他日者事事亦如平生也小臣沐竟而剪手𤓰又治湏象平生也濡濯棄于坎者皇氏云湏謂煩撋其髪濯謂不浄之汁也言所濡濯汁棄于坎中鄭注士䘮禮云巾櫛浴衣亦幷棄之于坎按既夕禮云掘坎南順廣尺輪二尺深三尺南其壤此沐汁棄于坎則浴汁亦然差是差摩故云淅詩云釋之叟叟是釋淅米也沭與浴俱有枓俱有盤浴云用枓沐云用盤是文相變也右沐浴大祝大䘮相飯䟽曰云相飯者浴訖即飯含故言相飯也不言相含者大宰云大䘮贊贈玉含玉此故不言大宰大䘮贊含玉助王為之也王疏曰謂助嗣右飯含襲左傳皇武子曰宋先代之後於周為客天子有䘮拜焉宋吊周䘮王特拜謝之不疏曰禮弔䘮之法皆人主拜其吊者謝其勤勞吊者答拜以其為事而來不自同于賔客此皆據吊及主人敵禮以上若其臣下來吊則主人不拜宋是前代之後王以敵禮待之故拜其來弔其餘諸侯者則否右受弔小歛於户内大歛於阼君以簟席簟細葦也下有莞司服大䘮共其歛衣服掌其陳序疏曰云大䘮王䘮其中兼小䘮也小歛皆十九稱大歛則士三十稱大夫五十稱諸侯皆百稱天子盖百二十稱云小歛布絞縮者一横者三君錦衾大夫縞衾士緇衾皆一衣十有九稱君陳衣於序東大夫士陳衣于房中皆西領北上絞紟不在列絞既歛所用束竪之者尸䟽曰布絞者以布為絞縮從也謂從者一幅竪置于下横者三幅亦在尸下從者在横者之上毎幅之末析為三片以結束為便也君錦衾大夫縞衾士緇衾皆一者謂大夫士等各用一衾故云皆一舒衾于此絞上衣十有九稱者君大夫士同用十九稱衣布于衾上然後舉尸于衣上屈衣裹又屈衾裹之然後以絞束之君陳衣于序東大夫士陳衣于房中者謂将小歛陳衣也房中者東房也大夫士唯有東房故也絞紟不在列者謂不在十九稱之列不入數也小歛未有紟因絞不在列而言紟耳君無襚無襚者不陳不以歛不疏曰君無襚者國君陳衣及歛悉宜用己衣得陳用他人見襚送者小歛君大夫士皆用複衣複衾同上凡陳衣者實之篋取衣者亦以箧升降自西階取猶受也凡陳衣不詘非列采不入絺綌紵不入不詘謂舒而不卷也列采謂正色之服也絺綌紵者當暑之䙝衣也襲尸重形冬夏用袍及歛則用正服入疏曰列采謂五方正色之采非列采謂雜也不陳之也䙝衣亦不陳復衣不以歛詳見復條封人凡䘮紀則飾其牛牲疏曰䘮紀有牲者除朝夕奠用脯醢以外大小歛朔月月半薦新奠祖奠大遣等皆有牲牢牛人喪事共其奠牛謂􅇻奠遣奠也䘮所薦饋曰奠故疏曰䘮自未𦵏以前無尸飲食直奠停置于神前謂之為奠朝夕之奠無尊卑皆脯醢酒而已無牲體􅇻大也唯有小歛大歛朔月月半薦新祖奠及遣奠時有牲體大遣奠非直牛亦有馬牲故鄭註云謂􅇻奠遣奠也云䘮所薦饋曰奠以無尸故也地官囿人䘮紀共其脯腊凡獸之物地官獸人凡䘮紀共其死獸生獸天官腊人䘮紀共其脯腊凡乾肉之事􅈄人􅈄音魚本又作魚又音御䘮紀共其魚之鱻天官醢人凡祭祝共薦羞之豆實䘮紀亦如之以上八官並陳大歛奠至祖奠遣奠條通用右陳小歛衣奠小歛主人即位於户内主婦東面乃歛疏曰主人即位於户内者以初時尸在牖下主人在尸東今小歛當户内故主人在户内稍東䘮大記上始死條卜人右射人左遷尸條射人僕人遷尸並此條通用當互考也小宗伯王崩及執事涖小歛大歛帥異姓族而佐執事大祝之屬莅臨也親歛者並事官之屬為之異族佐歛疏者可以相助云疏曰大祝職云大䘮賛歛眀大祝執事小宗伯莅之親歛者盖事官之屬為之者以其諸處更不見主歛事者事官又主工巧之事以無正文故疑事官之屬為之也云異族佐歛疏者可以相助者此異族據姓而言之大祝大䘮贊歛冬官主歛事大祝佐之春官君之䘮大胥是歛衆胥佐之胥樂官也不掌䘮事胥當為祝字之誤也疏曰大祝是接神者故使之執歛事也是猶執也衆祝佐之者衆祝䘮祝也衆祝賤故副佐于大祝也凡歛者袒遷尸者襲袒者于事便也者疏曰凡歛謂執大小歛事也事多故袒為便也遷尸襲謂大歛于地乃遷尸入棺之屬事少故襲也小歛之衣祭服不倒尊祭服也歛者要方􅄆衣有倒疏曰祭服謂死者所得用祭服以上也小歛十九稱不悉著之但用裏尸要取其方而衣有倒領在足間者唯祭服尊雖􅄆不著而領不倒在足也同上小歛大歛祭服不倒皆左衽結絞不紐紐女九反舊而慎反左衽衽鄉左反生時也右疏曰皆左衽大歛小歛同故云皆也衽衣襟也生鄉手解抽帶便也死則襟向左示不復解也生時帶並為屈紐使易抽解若死則無復解義故絞束畢結之不為紐也同上自小歛以往用夷衾夷衾質殺之裁猶冒也疏曰往猶後也小歛前用冒故不用夷衾自小歛後衣多不可用冒故用夷衾覆之也士䘮禮云幠用夷衾之柩之衾也裁猶制也言夷衾所用上齊茶手下三尺所用繒色及長短制度如冒之質殺也但不復為囊及旁聫也熊氏分質字屬上殺字屬下為句其義非也然始死幠用歛衾是大歛之衾自小歛以前覆尸至小歛時君錦衾大夫縞衾士緇衾用之小歛歛訖則制夷衾以覆之其小歛之前所用大歛之衾者小歛以後停而不用至将大歛及陳衣又更制一衾主用大歛也今按士䘮禮幠用歛衾疏云大歛之時両衾俱用一衾承薦于下一衾以覆尸則始死所用之衾至大歛即以承薦非停而不用也鋪絞紟踊鋪衾踊鋪衣踊遷尸踊歛衣踊歛衾踊歛絞紟踊皆孝子踊也同上歛者既歛必哭疏曰歛者即大祝衆祝之屬也既歛是歛竟也歛竟必皆哭也所以然者以其與亡者或臣舊或有㤙今手為執事専心則增感故哭也卒歛主人馮之踊主婦亦如之主人袒說髦括髮以麻婦人髽帶麻于房中士既殯說髦此云小歛盖諸侯禮也士之既殯諸侯之小歛于死者俱三日也婦人之髽帶麻于房中則西房也天子諸侯有左右房歛疏曰既歛主人馮之踊主婦亦如之主人袒者向小不袒今方有事故袒衣也士䘮禮馮尸已竟而云髻髮袒此未括髮先云袒者或人君禮也說髦者髦幼時剪髮為之至年長則垂著兩邉眀人子事親恒有孺子之義也若父死說左髦母死說右髦二親並死則並說之親沒不髦是也今小歛竟䘮事已成故說之也按鄭注士既殯說髦今歛而說者人君禮也括髮以麻者人君小歛說髦竟而男子括髮用麻也士小歛後亦括髮但未說髦耳婦人髽亦用麻對男子括髮也帶麻于房中者帶麻麻帶也謂婦人要絰也士䘮禮云婦人之帶牡麻結本在房鄭云婦人亦有苴絰但言帶者記其異此齊衰婦人斬衰婦人亦苴絰也男子帶絰于東房而婦人帶絰在西房既與男子異處故特記其異也云天子諸侯有左右房者欲眀絰房中是西房也天子路寝制如眀堂熊氏曰左房則東南火室也右房則西南金室也諸侯路寝室在于中房在室之東西也右小歛按小歛所用之日以䘮禮義考之但有死三日而歛若幷死日而數二日而天子諸侯三日小歛大夫士二日小歛此乃小歛日數雖引以為在禮有之然無所考天子諸侯殯𦵏日月與士不同則歛日亦當不同故載其詳于䘮禮義而記其畧于此大祝大喪徹奠疏曰此文乃承大䘮之下故奠為始死之奠小歛大歛奠並大祝徹之右徹始死奠主人即位襲帶絰踊即位阼階之下位也有襲絰乃踊䟽曰襲帶絰踊者拜賔時袒今拜訖襲衣加要帶首絰于序東復位乃踊也士䘮禮先踊乃襲絰此先襲絰乃踊士為卑也此據諸侯為尊故云尊卑相變也母之䘮即位而免記異者禮斬衰括髮齊衰免以成服而冠為母重初亦括髮既小歛則免括疏曰為父䘮拜賔竟而即阼階下位又序東帶絰猶髮若為母䘮至拜賔竟即位時不復括髪以免代之免以襲絰至大歛乃成服也所以異于父者也同上乃奠小奠歛也疏曰拜賔襲絰踊竟後始設小歛之奠也賔出徹帷君與大夫之禮也士卒歛則徹帷徹或為廢後疏曰士小歛竟而徹帷此至小歛竟下階拜賔賔出乃除帷是人君及大夫禮舒也注云士卒歛則徹帷者士䘮禮文條䘮大記未小歛受弔有庶子不受弔宋成公如鄭二奉尸夷于堂有婦人迎送不下堂一條又殯後受弔條有君弔見尸柩而後踊皆此條通用當互考右襲帶絰小歛奠挈壺氏挈劉苦結反一音結又户結反凡䘮縣壺以代哭者皆以水火守之分以日夜鄭司農云縣壺以為漏也代更也禮未大歛代哭以水守壷者為沃漏以火守壺者夜則視􅈓數也分以日夜者異晝夜漏也漏之箭晝夜共百􅈓冬夏之間有長短焉太史立成法有四十八箭絶疏曰禮未大歛代哭者未殯以前無問尊卑皆哭不聲大歛之後乃更代而哭亦使哭不絶聲大夫以官士親疎代哭人君尊又以壺為漏分更相代君䘮虞人出木角狄人出壺雍人出鼎司馬縣之乃官代哭代更也未殯哭不絶聲為其罷倦既小歛可以為漏􅈓分時而更哭也壷疏曰虞人掌山澤之官故出木與角狄人樂吏主挈漏水之器故主壺雍人主烹餁故出鼎所以用鼎及木者冬月恐水凍則鼎漏遲遲更無凖則故取鼎煖水用虞人木㸑鼎煑之故取鼎及木也司馬夏官卿也其屬有挈壺氏掌知漏事故司馬自臨視縣漏之時節故挈壺氏云凡䘮縣壷以代哭者縣漏分時使均其官屬更次相代而哭使聲之不絶者也右代哭委人䘮紀共其薪烝木材薪烝給炊及燎木材給帳事司烜氏凡邦之大事共墳燭庭燎墳大也樹于門外曰大燭于門内曰庭燎疏曰大事謂若大䘮紀大賔客之事也庭燎在大寝之庭君堂上二燭下二燭燭所以照饌也滅燎而設燎而疏曰有䘮則于中庭終夜設燎至曉滅燎日光未眀故湏燭以照祭饌也右設燎大歛於阼詳見陳小歛衣條大歛布絞縮者三横者五布紟二衾君大夫士一也君陳衣於庭百稱北領西上絞紟如朝服絞一幅為三不辟紟五幅無紞辟補麥反紞丁覧反二衾者或覆之或薦之如朝服者謂布精粗朝服十五升小歛之絞廣終幅折其末以為堅之强也大歛之絞一幅三折用之以為堅之急也紞以組𩔖為之綴之領側若今被識生時襌被有識死者去之異于生也疏曰大歛布絞縮者三者謂取布一幅分裂之作三片直用之三片則共是一幅兩頭裂中央不通横者五尺又取布二幅分裂作大片而用五片横之於縮下也布紟者皇氏云衿襌被也取置絞束之下撰用以舉尸也孝經云衣衾而舉之是也今按經云紟在絞後紟或當在絞上以絞束之且君衣百稱又通小歛與襲之衣非單絞所能舉也又孝經云衾不云紟皇氏之說未善也二衾者小歛君大夫士各一衾今至大歛又各加一衾為二衾其衾所用與小歛同但此衾一是始死覆尸者故士䘮禮云幠用歛衾注云大歛所倂用之䘮一是大歛時復制又注士䘮禮之衾二者謂始死歛衾今又復制士既然則大夫以上一爾君陳衣于庭百稱北領西上者衣多故陳在庭為榮顯按鄭注雜記篇以為襲禮大夫五諸侯七上公九天子十二稱則此大歛天子當百二十稱上公九十稱諸侯伯子男七十稱今云君百稱者據上公舉全數而言之餘可知也或大歛襲五等同百稱也北領者謂尸在堂也西上者由西階取之便也絞一幅為三不辟者辟擘也言小歛絞全幅析裂其末為三而大歛之絞既小不復擘裂其末紟五幅無紞紟舉尸之襌被也註堅之强解小歛衣少用全幅布為絞欲得堅束力强也堅之急解大歛一幅分為三片之意凢物細則束縳牢急以衣多故湏急者也大歛君大夫祭服無算君褶衣褶衾大夫士猶小歛也褶音牒褶袷也君衣尚多去其著也之疏曰祭服謂死者所得用祭服以上也算數也大歛時所有祭服皆用之無限數也注謂君多去其著者經云大夫士猶小歛則複衣複衾也據主人之衣故用複若襚亦得用袷也故士䘮禮云襚以褶是也同上此陳小歛衣條凡陳衣者寔之箧以下條通用當互考典瑞駔圭璋璧琮琥璜之渠眉疏壁琮以歛尸駔音祖焉以歛尸者於大歛加之也駔讀為組與組馬同聲之誤也渠眉玉飾之溝瑑也以組穿聫六玉溝瑑之中以歛尸圭在左璋在首琥在右璜在足璧在背琮在腹盖取象方眀神之也疏璧琮者通于天地疏曰於大歛焉加之也者以其六玉所與玉為飾眀在衣裳之外故知在大歛後也駔讀為組詩有執轡如組聲之誤為駔云渠眉玉飾之溝瑑也者此六玉兩頭皆有孔又於兩孔之間為溝渠如溝之兩畔稍髙為眉瑑故云以組穿聨六玉溝瑑之中以歛尸云圭在左以下皆約大宗伯云青圭禮東方之等以尸南首而置此六玉焉云盖取象方眀神之也者按覲禮設方眀上圭下璧無璧琮此云象者彼注上下之神非天地至貴謂日月之神故上下不用璧琮此中有璧琮者象天地若然此言象方明也者直取置六玉于六處不取玉形之義又按大宗伯璧禮天琮禮地今此璧在背在下琮在腹在上不𩔖者以背為陽腹為隂隨尸腹背而置之故上琮下璧也云疏璧琮者通于天地者天地為隂陽之主人之腹背象之故云疏之通天地也君即位而為椑嵗壹漆之蔵焉椑蒲厯反徐房益反成椑謂地棺親尸者椑堅著之言也嵗一漆之若未然蔵謂虚之不合疏曰君諸侯也言諸侯則王可知也椑杝棺也漆之堅强甓甓然也人君無論少長而體尊備細故一即位而造為此棺也古者天子椑内又有水兕而諸侯無但用杝在内以親尸嵗一漆之者毎年一漆示如未成也唯云漆杝則知不漆杝棺外屬等天子之棺四重尚深􅃉也牛疏曰四重者水牛兕皮二物重故為一重也又杝為第二重也又屬為第三重也又大棺為第四重也四重凡五物也以次而差之天子大棺厚八寸屬椑四寸又二皮六寸合二尺四寸也水兕革棺被之其厚三寸疏云水兕二皮並不能厚三寸故合被之令各厚三寸也二皮能濕故最在裏近尸也杝棺一疏曰杝棺一者椵也村亦能濕故次皮也杝惟一種諸侯無革則杝親尸也君即位為椑是也杝即椵木爾雅云椵杝一物二名名椵又名杝也梓棺二疏云杝棺之外又有屬棺屬棺之外又有大棺與屬棺並用梓故云二也四者皆周疏云四四重也周匝也謂四重之棺上下四方􅊖周匝也唯槨不周下有茵上有枕席故也棺束縮二衡三衽每束一衡亦當為横衽今小要衽或作漆或作髹疏曰棺束者古棺木無釘故用皮束合之縮二者縮縦也縦束用二行也衡三者横束三行也衽毎束一者衽小要也其形兩頭廣中央小也既不用釘棺但先鑿棺邉及兩頭合際處作坎形則以小要連之今固棺並相對每束之處以一行之衽連之若竪束之處則竪著其衽以連棺盖及底之木使與棺頭尾之村相固漢時呼衽謂之小要也同上君裏棺用朱緑用雜金鐕鐕子南反以琢著裏鐟所疏曰裏棺謂以繒貼棺裏也朱繒貼四方綠繒貼四角定本經中綠字皆作琢琢謂鐕琢朱繒貼著于棺也用雜金鐟者鐟釘也舊說云用金釘又用象牙雜之以琢朱緑著棺也舎人䘮紀共熬榖熬榖者鐟於棺旁所以惑蚍蜉也欲疏曰殯時設之将熬榖以惑蚍蜉又有魚腊香蚍蜉向棺故植此以惑之者也熬君四種入筐加魚腊焉熬煎榖也士䘮禮曰熬黍稷各二筐又曰設熬旁各一筐大夫三種加以粱君四種加以稲四筐則手足皆一其餘設于左右疏曰加魚腊者魚腊謂乾腊按郊特牲士腊用兎少牢大夫腊用麋天子諸侯無文當用六獸之屬亦為惑蚍蜉幕人大䘮共帷幕帟綬為賔客飾也帷以帷堂或與幕張之於庭帟在柩上疏曰始在帷堂小歛徹之及殯在堂亦帷之也掌次凡䘮王則張帟三重張帟柩上承塵也疏曰后與王同司几筵凡䘮事設葦席右素几其柏席用萑黼純諸侯則粉純每敦一几柏鄭音椁劉依司農音廹鄭䘮事謂凡奠也萑如葦而細者司農云柏席廹地之席葦居其上或曰柏席載黍稷之席元謂柏椁字磨滅之餘椁席蔵中神坐之席也敦讀曰燾燾覆也棺在殯則椁燾既窆則如見背謂覆之周禮雖合𦵏及同時在殯皆異几體寔不同祭於廟同几精氣合士蔵才浪反之疏曰䘮事謂凡奠也者言凡非一之義䘮禮始死奠乃至小歛之奠亦設于地未有席至大歛奠乃有席殯後則有朝夕奠朔月奠大夫以上兼有月半奠并有薦新奠葬時又有遷奠祖奠大遣奠葬乃廢奠而虞祭也故鄭云謂凡奠也云棺在殯則椁燾者檀弓云天子菆塗龍輴以椁是也云既窆則如見者見謂道上帳帷荒将入蔵以覆棺言見者以其棺不復見唯見帷荒故謂之見也其二處皆當覆故云敦也云皆異几體寔不同者解經毎敦一几之義凡凶事仍几鄭司農云吉事變几變更其質謂有飾也仍因也因其質謂無飾也顧命牖間南嚮西序東嚮東序西嚮皆仍几元謂吉祭主祭宗廟祼于室饋食于堂繹于祊毎事易几神事文示新之也凶事謂凡奠朝夕相因䘮禮畧疏曰按檀弓云虞而立尸有几筵者據大夫士而言按士䘮禮大歛則有席而云虞始有筵者以其几筵相将連言其寔虞時始有几其筵大歛即有也天子諸侯禮大初死几筵並有故上云几䘮事設葦席右素几也凡几之長短阮諶云几長五尺髙五尺廣五尺馬融以為長三尺舊圖以為几兩端赤中央黒也右陳大歛衣及殯奠之具君将大歛子弁絰即位於序端卿大夫即位於堂㢘楹西北面東上父兄堂下北面夫人命婦尸西東面外宗房中南面小臣鋪席商祝鋪絞紟衾衣士盥於盤上士舉遷尸於歛上卒歛宰告子馮之踊夫人東面亦如之子弁絰者未成服弁如爵弁而素大夫之䘮子亦弁絰疏曰子弁絰即位於序端者序謂東序端謂序之南頭也卿大夫即位于堂㢘楹西者卿大夫謂羣臣也堂㢘謂堂基南畔之㢘稜之上楹謂南近堂㢘者子位既在東序端故羣臣列于基上東楹之西也按隐義云堂㢘即堂上近南霤為㢘也北面東上者在基上俱北面東頭為上也子在東尸在阼階故在基者以東為上也又兄堂下北面者謂諸父謂諸兄不在仕者以其賤故在堂下而鄉北以東為上也若士則亦在堂下外宗房中南面者外宗君之姑姊妹之女及姨舅之女也輕故在房中而鄉南也皇氏云當在西房以東為上也今謂尸在阼大夫命婦在尸西北外宗等當在東房小臣黼席者謂下筦上簟敷于阼階上供之歛也士䘮禮云布席如初注云亦下筦上簟也鋪于阼階上於堂南北為少南商祝鋪絞紟衾衣者商祝亦是周禮䘮祝也其鋪絞紟衾衣等致於小臣所鋪席上以待尸士盥于盤上者士亦䘮祝之屬也周禮䘮祝上士二人中士四人下士八人是将應舉尸故先盥手於盤上也雜記云士盥于盤北是也士舉遷尸于歛上者歛上即歛處也卒歛者大歛衣裝畢也宰告者大宰也歛畢大宰告孝子道歛畢也子馮之踊者孝子待得告乃馮尸而起踊夫人東面亦如之者亦馮尸而踊曏者夫人命婦俱東嚮于尸西今獨云夫人馮者命婦賤不得馮也馮竟乃歛于棺注云子弁絰者未成服者成服則著䘮冠也此云弁絰是未成服此雖以大歛為文其小歛時子亦弁絰君大夫士之子皆然故雜記云小歛環絰公大夫士一也右大歛天子七日而殯尊者舒卑者速數疏曰天子諸侯既尊重送終禮物其既多許其申遂故日月緩也君大夫鬊𤓰實於綠中鬊音舜隅綠當為角謂棺内四也鬊亂髪也将實𤓰髪棺中必為小囊盛之此綠或為篓君盖用漆三衽三束用漆者用塗合牝牡之中也衽小要也際疏曰君盖用漆者盖棺上盖用漆謂漆其衽合棺縫也束謂以皮束棺也棺兩邉各三衽每當衽上輙以牛皮束之故云三衽三束也天子之殯也菆塗龍輴以椁菆木以周龍輴如椁而塗之天子殯以輴車畫轅為龍疏曰菆叢也謂用木叢棺而四面塗之龍輴者殯時輴車載柩而畫轅為龍以椁者亦題湊叢木象椁之形加斧於椁上畢塗屋斧謂之黼白黒文也以刺繡于襂幕加椁以覆棺已乃屋其土盡塗之疏曰斧謂繡覆棺之衣為斧文也先取四面為棺使上與棺齊而上猶開也以棺衣従椁上入覆于棺故云加加斧于椁上也畢塗屋者畢盡也斧覆既竟又四柱為屋覆上而下四面盡塗之也天子之禮也甸師䘮事代王受𤯝烖粢盛者祭祝之主也今國遭大䘮若云此黍稷不馨使鬼神不逞于王既殯太祝作禱辭授甸人使以禱籍田之神受𤯝烖弭後殃詞疏曰言䘮事者謂主䘮既殯後甸師氏于太祝取禱禱籍田之神𤯝過也代主受過烖止後殃故為此禱也太祝作禱詞在既殯後者見太祝職云授甸人禱詞在大歛後大歛則殯故知在既殯後太祝大䘮言甸人讀禱言猶語也禱六辭之屬禱也甸人䘮事代王受𤯝烖太祝為禱辭授之使以禱于籍田之神也使疏曰太祝掌六辭五曰禱故于王既殯作禱銘甸人以禱焉小祝設熬置銘疏曰熬謂熬榖殯在堂時設於棺旁所以惑蚍蜉云置銘者銘謂銘旌書死者名既殯置于西階上所以表柩右殯天子諸侯之䘮斬衰者奠為君服皆斬衰唯主人不奠疏曰按士䘮禮主人不親奠而此下文之士則朋友奠故知主人不親奠也主人不親奠者以主人悲號思慕不暇執事故也右大歛奠小宗伯辨吉凶之五服司服掌王之吉凶衣服凡凶事服弁服服弁䘮冠也其服斬衰齊衰凡䘮為天王斬衰為王后齊衰王后小君也諸侯為之不杖朞太僕䘮紀正王之服位詔法儀詔告也内司服凡祭祀賔客共后之衣服及九嬪世婦凡命婦共其衣服共䘮衰亦如之疏曰外命婦䘮衰謂王服齊衰於后無服若九婦以下及女御于王服斬衰于后服齊衰也天官追師追丁囘反一曰雕追治玉石之名掌王后之首服為九嬪及外内命婦之首服以待祭祀賔客䘮紀共笄絰亦如之天官内宰凡䘮事佐后使治外内命婦正其服位使其屬事之上士内命婦謂九嬪世婦女御鄭司農云外命婦卿大夫之妻王命其夫后命其婦元謂士妻亦為命婦婦疏曰凡有䘮事内宰皆佐后使其屬官治外内之命正其服之精粗位之前後也諸子大䘮正羣子之服位疏曰位謂在殯宫外内哭位也正其服者公卿大夫之子為王斬衰與父同故雜記大夫之子得行大夫禮肆師禁外内命男女之衰不中法者且授之杖外命男六卿以出也内命男朝廷卿大夫士也其妻為外命女䘮服為夫之君齊衰不杖内命女王之三夫人以下不中法違升數與裁制者鄭司農云三日授子杖五日授大夫杖七日授士杖此舊說也䘮大記曰君之䘮三日子夫人杖五日既殯授大夫世婦杖無七日授士杖文元謂授杖日數王䘮依諸侯與七日授士杖四制云疏曰外内命男女為王雖有齊斬不同其衰皆有升數多少及裁制故禁之使依法也授之杖者外内命男及内命女皆為王斬者有杖授之其外命女為王齊衰無杖故云且者見不定之詞也䘮服為夫之君見䘮服不杖齊衰章内命女三夫人以下者通九嬪二十七世婦八十一御妻皆為王斬衰而杖也言升數者諸臣妻為夫之君義服衰六升諸臣為王義服斬衰衰三升半冠六升三夫人以下為王正服斬衰衰六升是其數也言裁制者䘮服云凡衰外削幅裳内削幅幅三拘已下具有裁制也司農所云授杖之日仍是四制之文也王䘮諸臣等無授杖之日數以諸侯之臣與王之臣同斬衰杖竹故授杖日數亦冝同也檀弓云天子崩三日祝先服眀子與夫人亦服則天子之子及后亦服矣五日官長服眀天子三公已下及三夫人已下亦服矣但服杖同時有服即杖矣唯天子服授杖亦當七日矣是以王䘮約同諸侯之制也天子崩三日祝先服祝佐含歛先服疏曰祝大祝也服服杖也是䘮服之數故呼杖為服祝佐含先病故先杖也然云祝服故子亦三日而杖也五日官長服官長大夫士病疏曰官長大夫士也亦服杖也在祝後故五日也七日國中男女服庶人謂疏曰國中男女謂畿内民及庶人在官者服齊衰三月而除之必待七日者天子七日而殯殯後嗣王成服故民得成服也三月天下服諸侯之大夫者疏曰三月天下服諸侯之大夫為王繐衰既𦵏而除之也近者亦不待三月今據逺者為言耳然四條皆云服何以知其或杖服或衰服按䘮大記云君之䘮三日子夫人杖五日既殯授大夫世婦杖又䘮服四制云三日授子杖五日授大夫杖七日授士杖按如大記及四制則知今云三日五日是服杖眀矣其七日及三日者唯服而已無杖四制云七日授士杖此云五日士杖者士若有地徳深則五日若無地徳薄則七日崔氏云此據朝廷之士四制是邑宰之士也檀弓君之䘮三日子夫人杖五日既殯授大夫世婦杖三日者死之後三日也為君杖不同日人君禮大可以見親疏也疏曰熊氏云子杖通女子子在室者若嫁為他國夫人則不杖嫁為卿大夫之妻與大夫同五日杖也君之女及内宗外宗之屬嫁為士妻及君之女御皆七日杖也䘮大記公之䘮諸達官之長杖謂君所命雖有官軄不達于君則不服斬謂疏曰達官謂國之卿大夫士被君命者也不達于君府史之𩔖賤不被命是不達于君也不服斬衰但齊三月耳故䘮服齊衰三月章有庶人為國君即此是也右成服天府凡國之玉鎮大寳器蔵焉若有大祭大䘮則出而陳之既事蔵之玉鎮大寳器玉瑞玉器之美者禘祫及大䘮陳之以華國頋命陳寳赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圗在東序允之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房此其行事見于經典路若有大祭祀則出路贊駕說大䘮亦如之亦出路當陳之書頋命陳先王寳器又曰大輅在賔階面綴路在阼階面先路在左塾之前次路在右塾之前右陳寳器顧命成王崩康王麻冕黼裳由賔階隮入即位云云詳見上文康王既尸天子遂誥諸侯云云詳見上文成湯既沒伊尹奉嗣王祇見厥祖云云詳見上文春秋文公九年毛伯來求金何不稱使當䘮未君也踰年矣何以謂之未君據崩在八年踰年即位即位矣而未稱王也未稱王何以知其即位以諸侯之踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封内三年稱子也踰年稱公矣則曷於其封内三年稱子縁終始之義一年不二君故君薨稱子其既𦵏稱子縁臣民之心不可曠年無君故踰年稱公縁孝子之心則三年不忍當也不忍當公位禮公羊𫝊又按曲曰天子未除䘮曰予小子注云謙未敢稱一人春秋𫝊曰以諸侯之踰年即位亦知天子之踰年即位以天子三年然後稱王亦知諸侯于其封内三年稱子疏曰天子踰年即位無文約魯十二公諸侯三年内稱子亦無文約天子踰年不稱王也是天子諸侯互相明也又凖左傳之義諸侯薨而嗣子即位凡有三時一是始䘮即適子之位二是踰年正月即一國正君臣之位三是除䘮而見于天子天子命之嗣列為諸侯之位今此踰年即位是遭䘮眀年為元年正月即位白虎通云父􅒙稱子某屈于尸柩也既𦵏稱子者即尊之漸也踰年稱公者縁臣之心不可一日無君縁始終之義一年不二君故踰年即位係臣民之心也文公元年春王正月公即位先君未葬而公即位不可曠年無君𦵏疏曰諸侯之禮既𦵏成君先君雖未既踰年而君即位不可曠年無君故也釋例云遭䘮繼立者毎新年必改元正位百官以序故國史書即位于策以表之文公成公先君之䘮未𦵏而書即位因三正之始眀繼嗣之正表朝儀以固百姓之心此乃國君眀分制之大禮譬周康王麻冕黼裳以行事事畢然後反䘮服也杜引頋命康王之事以譬此者彼是既殯此是踰年雖時不同取其暫服吉服事相似耳又按釋例曰尚書頋命天子在殯之遺制也推此亦是以準諸侯之禮矣定公元年夏六月公之䘮至自乾侯戊辰公即位諸侯薨五日而殯則嗣子即位癸亥昭公䘮至五日殯于宮定公乃即位疏曰公羊穀梁皆云正棺于両楹之間然後即位按正棺兩楹之間即禮所謂夷于堂者也䘮大記君薨之禮云既小歛男女奉尸夷于堂鄭元云士之既殯諸侯之小歛于死者俱三日戊辰去癸亥五日非正棺之日不得為正棺即位也雜記云諸侯行而死歸至于廟門遂入適所殯鄭元云適所殯謂両楹之間自外來者正棺于兩楹之間尸亦夷之于此因殯焉殯必于兩楹之間者以其死不于室而自外來留之於中不忍逺也鄭取二𫝊之說言死従外來者殯在兩楹之間若謂殯為正棺則與杜言合矣癸亥公之䘮至自乾侯則曷為以戊辰之日然後即位正棺於兩楹之間然後即位公羊𫝊沈子曰正棺乎兩楹之間然後即位也内之大事日即位君之大事也其不日何也以年決者不以日決也此則其日何也踰年即位厲也厲危也公䘮在外踰年六月乃得即位危故日也於厲之中又有義焉先君未𦵏則後君不得即位未殯雖有天子之命猶不敢况臨諸臣乎以輕喻重也雖為天子所召不敢背殯而徃况君䘮未𦵏而行即位之禮以臨諸臣乎背音佩周人有䘮魯人有䘮周人弔魯人不弔周人曰固吾臣也使人可也魯人曰吾君也親之者也使大夫則不可也君至尊也去父之殯而往弔猶不敢况未殯而臨諸臣乎穀梁𫝊月正元日舜格于文祖月正正月元日上日也舜服堯䘮三年畢将即政故復至文祖廟告文祖者堯文徳之祖廟惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳冕冠也踰月即吉服右嗣君即位勉齋黄氏曰按即位之别有四正嗣子之位已見始死條下顧命有王麻冕黼裳道揚末命及康王之誥有惟予一人釗報誥之語乃既殯之後嗣君即繼體之位之禮今附見於此若踰年合正改元之位三年合正踐祚之位如春秋元年書即位則是踰年正改元之位也月正元日舜格于文祖伊尹以冕奉嗣王歸於亳則是三年正踐祚之位也然崩薨之日或在嵗終則盖有未殯而踰年者矣故踰年正繼體之位之禮遂無所附䘮大記補經亦止于虞禮則三年之禮亦無所附今倂列於此記之下其義則見於春秋𫝊注疏與䘮禮及白虎通之說所當通考也居倚廬不塗君為廬宫之大夫士襢之宫謂圍障之也䄠袒也謂不障于疏曰此論初遭䘮君大夫士居廬之禮居倚廬者謂中門之外東墻下倚木為廬故云居倚廬不塗者但以草夾障不以泥塗之也君為廬宫之者謂廬外以帷障之如宫牆大夫士襢之者襢袒也其廬袒露不帷障也按既夕禮注云倚木為廬在中門外東方北户䘮大記宫正大䘮則授廬舎辨其親疎貴賤之居廬倚廬也舎堊室也親者貴者居倚廬疎者賤者居堊室雜記曰大夫居廬士居堊室舎疏曰云廬倚廬也者謂于門之外東壁倚木為廬云堊室也者舎對廬為堊室堊室者兩下為之與廬異故云堊室也云親者貴者居倚廬者親謂大功以上貴謂大夫已上者居倚廬云疎者賤者居堊室者疏謂小功緦麻賤謂士二者居堊室知義如此者以其經云辨其親疎貴賤眀當如此解之也又引雜記者彼是諸侯之臣其大夫居廬士居堊室彼注士居堊室亦謂邑宰也朝廷之士亦居廬右䘮廬巾車王之䘮車五乘木車蒲蔽大􅍜尾櫜疏飾小服皆疏木車不漆者鄭司農云蒲蔽謂嬴蘭車以蒲為蔽天子䘮車之儀漢儀亦然大􅍜以大皮為覆笭故書疏為揟杜子春讀揟為妙元謂蔽車旁禦風塵者大白大皮既以皮為覆笭及以其尾為戈㦸之弢麤布飾二物之側為之縁若攝服云服讀為箙小箙刀劍短兵之衣此始遭䘮所乘為君之道尚微備奸臣也書曰以虎賁百人逆子釗亦為備焉揟嬴魯火反劉又音果笭力丁反劉又音泠揟本又作同思如反弢吐刀反縁恱絹反下同菔音服素車棼蔽大􅍜素飾小服皆素素車以白土堊車也棼讀為薠麻以為蔽其􅍜服以素繒為縁此卒哭所乘為君之道益著在車可以去戈㦸薠扶文反薻車薻蔽鹿淺􅍜革飾故書藻作􅠘杜子春􅠘讀為華藻之藻直為華藻也元謂藻水草蒼色以蒼土堊車以蒼繒為蔽也鹿淺􅍜以鹿夏皮為覆笭又以所治去毛者縁之此既練所乘􅠘音總又音藻李一音蒼㑹反駹車雚蔽然􅍜髤飾故書駹作龍髤為軟杜子春云龍讀為駹軟讀為黍也元謂駹車邉側有漆飾也雚細葦席也以為蔽者漆則成藩即吉也然果然也髤赤多黒少之色韋也此大祥所乘雚音九髤香求反軟音次漆音次音七垸胡翫反漆車藩蔽豻􅍜雀飾漆車黒車也藩今時小車藩漆席以為之豻胡罕反雀黒多赤少之色韋也此禫所乘右䘮車外宗大䘮則叙外内朝莫哭者内外宗及外命婦云疏曰經直云外内鄭内外宗及外命婦則内中以兼外宗外中不兼内命婦也經不云内外宗内外命婦者意欲見内是内宗舉内以見外其外中則不得舉外以見内以其内命婦九嬪叙之也故九嬪職云大䘮師叙哭者注云后哭衆乃哭内命婦九嬪叙之故鄭亦不言内命婦春官世婦大䘮比外内命婦之朝莫哭不敬者而苛罰之苛譴也夕疏曰大䘮謂王䘮殯後有朝哭事外命婦朝廷卿大夫士之妻内命婦九嬪以下以尊卑為位而哭而有不敬者則呵責罰之春官哭位條内有天子之䘮别姓而哭肆師令序哭内宗序哭九嬪師序哭位此條通用當互考朝夕哭不帷縁孝子心欲見殯肂也既踊則施其㧁鬼神尚幽闇也雜記士􅍯入而后朝夕踊備猶盡也國君之䘮嫌主人哭入則踊君䟽曰此一莭論君䘮羣臣朝夕踊哭之事􅍯盡也國䘮嗣國孝子雖朝夕先入即位哭必待諸臣皆入列位畢後乃俱踊者也士畢最後故舉士入于畢也所入有前後而相待踊者孝子哀深故前入也踊湏相視為節故俟齊也右朝夕哭司服大䘮共其奠衣服奠衣服今座上䰟衣也鄭疏曰守祧職云遺衣服蔵焉云大歛之餘也至祭祀之時則出而陳于座上此則奠衣服者也陳小歛奠條内有封人飾牛牲等七官又陳大歛條内有司几筵設葦席素几皆此條所通用此條後凡奠通用當互考右朝夕奠籩人䘮事共其薦籩羞籩謂􅇻奠時月疏曰殷猶大也大奠朔月半薦新祖奠遣奠之𩔖也奠按士䘮禮月半不殷奠注云士月半不復如朔月盛下等者疏云下遵者以下大夫以上有月半奠故士禮月半不殷奠而此有月半奠也設陳小歛條内有封人等七官陳大歛條内有司几筵葦席素几朝夕奠條内有司服共奠衣服皆此條通用此條凡後􅇻奠通用當考天子諸侯之䘮斬衰者奠註見前右朔月月半殷奠按儀禮正經所載惟士䘮禮而天子諸侯大夫之禮闕焉勉齋黄氏著儀禮經𫝊通解因小戴䘮大記一篇合周禮禮記諸書以補其闕然後粲然可考今所叙國恤於黄氏禮書中撮取其専言天子䘮禮處次第其節奏如前以見三代國哀之制然禮記所言君皆國君也其専言天子者無幾而注疏家以諸侯之禮通之於天子亦可槩見周禮所言雖皆天子之禮然惟職掌所及則載之而不闗於軄掌者無可考則亦豈無遺軼姑叙其所可知者爾自始死至殷奠叙于此而卜宅以至窆虞則叙于山陵條下至于與臣民通用之禮則自有黄氏専書更不贅述文獻通考卷一百二十
