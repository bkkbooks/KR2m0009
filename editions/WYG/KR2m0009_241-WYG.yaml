body:
  text: 文獻通考卷二百四十一鄱陽馬端臨貴與著經籍考六十八集别集水心集二十八卷拾遺一卷别集十六卷陳氏曰吏部侍郎永嘉葉適正則撰淮東本無拾遺編次亦不同外集者前九卷為制科進卷後六卷號外藳皆論時事末卷號後總專論買田贍兵邱文定集十卷拾遺一卷陳氏曰樞密江陰邱崈宗卿撰隆興癸未進士第三人其文慷慨有氣而以吏能顯故其文不章趙忠定集十五卷奏議十五卷陳氏曰丞相福公趙汝愚子直撰别本總為一集亦三十卷鴈湖李氏書後丞相餘干趙公秉正履度卽之凜然至形於篇章則思致清麗逸發雖古今能文辭者有不逮而世顧鮮知者非繇德業之巨器能之偉所以詞華見没邪龍川集四十卷外集四卷陳氏曰永康陳亮同甫撰少入太學嘗三上孝廟書召詣政事堂宰相無𢎞度迄報罷後病免舉為癸丑進士第一未禄而卒所上書論本朝治體本末源流一時諸賢未之及也亮才甚髙而學駁其與朱晦庵往返書所謂金銀銅鐵混為一器者可見矣平生不能詩外集皆長短句極不工而自負以為經綸之意具在是尤不可曉也葉正則未遇時亮獨先識之後為集序及跋皆含譏誚識者以為議水心葉氏集序曰同甫文字行於世者酌古論陳子課藁上皇帝三書最著者也子沆聚他作為若干卷以授予初天子得同甫所上書驚異累日以為絶出使執政召問當從何處下手將由布衣徑唯諾殿上以定大事何其盛也然而詆訕交起竟用空言羅織成罪再入大理獄幾死又何酷也使同甫晚不登進士第則世終以為狼疾人矣嗚呼悲夫同甫其果有罪於世乎天乎余知其無罪也同甫其果無罪於世乎世之好惡未有不以情者彼於同甫何獨異哉雖然同甫為徳不為怨自厚而薄責人則疑若以為有罪焉可矣同甫旣修皇帝王霸之學上下二千餘年考其合散發其祕藏見聖賢之精微常流行於事物儒者失其指故不足以開物成務其説皆今人所未講朱公元晦意有不與而不能奪也呂公伯恭退居金華同甫間往視之極論至夜呂公歎曰未可以世為不能用虎帥以聽誰敢犯子同甫亦頗慰意焉余最鄙且鈍同甫微言十不能觧一二獨以為可教者病眊十年耗忘盡矣今其遺文大抵班班具焉覽者詳之而已軒山集十卷陳氏曰樞密使獻肅公濡須王藺謙仲撰淳熙乙未駕幸太學藺為武學諭在班列中人物偉然上一見竒之自是擢用不由邑最徑為察官馴至執政其在經帷論宮僚攀附而登輔佐者挾數用術道䛕濟私陳義凜然嘉定以來其子孫不敢求仕亦不敢請諡至端平乃得諡合齋集十六卷陳氏曰祕書少監永嘉王柟木叔撰乾道丙戍進士在永嘉諸老最為先登其容貌偉然襟韻灑然雖不以文自鳴而諸老皆推敬之兼山集四十卷陳氏曰端明殿學士劔門黄裳文叔撰在嘉邸最乆備盡忠益甲寅御極未及大用病不能朝士論惜之攻愧集一百二十卷陳氏曰參政四明樓鑰大防撰隆興癸未省試考作賦魁以犯諱當黜知舉洪文安遵奏收寘三甲首西山眞氏集序曰公之文如三辰五星森麗天漢昭昭乎其可觀而不可窮如泰華喬嶽蓄泄雲雨巖巖乎莫測其顚際如九江百川波瀾蕩潏淵淵乎不見其涯涘人徒見其英華發外之盛而不知其本有在也公生於故家接中朝文獻博極羣書識古文竒字文備衆體非他人窘狹僻澁以一長名家而又發之以忠孝本之以仁義其大典冊大議論則世道之消長學術之廢興善類之離合係焉方淳紹間鴻碩滿朝每一奏篇出其援據該洽義理條逹者一詔令下其詞氣雄渾筆力雅健者學士大夫讀之必曰樓公之文也嗚呼所謂有本者如是非邪齊齋甲藁二十卷乙藁十五卷翰林前藁二十卷後藁二卷掖垣詞草二十卷兼山論著三十卷附録五卷年譜一卷陳氏曰禮部尚書歸安倪思正父撰丙戍進士戊戍宏詞受知阜陵早登禁直紹熙間遂位法從立朝剛介不茍合慶元嘉定屢召屢出嘗言與其為有瑕執政寜為無瑕從官由是名重天下端平初詔以先朝遺直得諡文節静安作具十四卷别集十卷陳氏曰清江徐得之思叔撰與其子筠孟堅同甲辰進士次子天麟仲祥亦乙丑甲科其家長於史學晦巖集十二卷陳氏曰祕書丞鹽官沈清臣正卿撰嘗為國子録有薦於朝欲得召試執政有發笑者曰安有張子蓋女壻而可為館職者乎遂罷欲為竒節以蓋之會王希呂為諌官上書力言其不可孝宗大怒時相虞允文惡沈介下清臣大理風使引介不從謫封州晚乃召用勸孝宗力行三年䘮為翊善嘉邸以直諒稱初從張無垢學後居霅川自嶺南歸開門授徒動以聖賢自命效禪門入室規式與其徒問答下語不契輙使再參頗為人所譏定齋集四十卷陳氏曰寶謨閣直學士蔡戡定夫撰君謨四世孫丙戌甲科小山雜著八卷陳氏曰知樞密院龍泉何澹自然撰東江集十卷陳氏曰丞相臨海謝深甫子肅撰慈溪甲藁二十卷陳氏曰寶謨閣直學士慈溪楊簡敬仲撰鈍齋集六十卷陳氏曰著作郎楊濟濟道撰淳熙五年進士京鏜帥蜀上已出遨濟為樂語首云三月三日豈無水邊麗人一觴一詠亦有山陰禊事又云良辰美景賞心樂事四者難并崇山峻嶺修竹茂林羣賢畢至一時傳誦京為相召入館權郎出知果州以終周氏山房集二十卷後集二十卷陳氏曰祕書省正字吳郡周南南仲撰南有聲學校庚戌登甲科而仕不偶再入館再罷以殿廷所授文林郎終焉水心葉氏墓誌曰君躭書喜誦出於天性十五六時視吳下問學止科舉心陋之一往旬日已棄去歲五易師一易師為傾動相播告擯絶旣從余初若無所論質已而耳改目化氣竦神涌古今事物錯落髙下不以涯量頓悟㨗得受之若驚行之若疑標樹山嶽之上越軼風霆之外故朋昔類望塵不及皆靡弛而逝矣常以世道興廢為已重負一飯不顧私憂時如家憂人如身人情多玩忽見事君悸心怛慮覩緩知亟考校小史引坐深語所知往往非人所能知也文詞撥去今作脱換騷雅欲以力自成家而􅉞麗精切達於時用亦非人所及也端行拱立尺寸程凖門内順穆廉節整飭自賜第授文林郎終身不進官兩為館職數月止旣絶意屏坐衣食敝惡雞鳴挾書晝夜分皆憶念上口數千載未了事皆欲正定名章偉著皆欲銓品異聞逸傳皆欲論述曰此所以遺吾老俟吾死也平庵悔藁十五卷後編六卷陳氏曰太府卿松陽項安世平父撰悔藁者以語言得罪悔不復為也自序當慶元丙辰後編自丁已至壬戍自序項子題所為文藁曰滑稽篇客曰是所謂文似相如始類俳之意非邪曰非也世之人無貴賤皆畏人笑獨滑稽者不畏人笑非獨不畏且甚欲之凡其貎服言動皆欲得人之笑人小笑之則小愜大笑之則大愜人不笑之則大愧若予之為文亦若是耳人之笑予之藥也人小笑之則予亡其小病矣人大笑之則予亡其大病矣人不笑之則予之病其危哉是與滑稽之技無以異也客聞其說觀其文大笑冠帯盡脫項子赧然汗下矍然神醒曰予病瘳矣再拜謝客書以為序東平集二十七卷陳氏曰鞏豐仲至撰淳熙甲辰進士水心墓誌畧曰時新迪義理之學草茅士震於見聞多衿露怵忸至他文史言論儒之藝業又昧陋顚倒莫知幅程獨仲至抑縱開闔條流品彚應變不迫富若素有余本拙疎不能自達而仲至廣導曲引出幽入眇蓋為之黽勉追逐於荒原斷澗之側數年仲至日益有名不幸不得用然有以自負命雲侶月跨越汗漫浩乎不可浼而余畏懼怯劣常痼留一榻不敢越戸限然後知人之禀分髙下絶殊固非切磋誘掖所能增長矣仲至學敏而早成自童丱時前輩源緒古今音節事之因革總統如注水千丈之壑迫前隨後宿艾駭服以為積數十年燈火勤力聚數十家師友講明猶不能到也其文無險怪華巧而以理屈人片詞半牘皆清朗得言外趣尤工為詩多至三千餘首三松集十八卷陳氏曰廬陵王子俊才臣撰周益公楊誠齋各以列薦補官入蜀為成都帥幕橫堂小集十卷陳氏曰右司郎中福清林桶子長撰潔齋集二十六卷後集十二卷陳氏曰禮部侍郎四明袁燮和叔撰北山集畧十卷陳氏曰直龍圖閣三山陳孔碩膚仲撰全集未傳育德堂外制集八卷内制集三卷陳氏曰兵部尚書永嘉蔡㓜學行之撰成童頴異從同郡陳傅良君舉學治春秋年十七試補上庠首選陳反出其下明年陳改用賦冠監舉而㓜學經魁又明年省闈先多士而陳傅良亦為賦魁一時師弟子雄視塲屋莫不歆羡水心葉氏墓誌曰公雖㓜以文顯無浮巧輕艶之作旣長益務闡教化飬性情花卉之炫麗風露之凄爽不道也詞命最温厚亦不自矜貴惟於國史研貫專一朱墨義類刋潤齊整各就書法為續司馬公卿百官表年歴大事記偹志辨疑編年政要列傳舉要等百餘篇今代之完書也天資凝重危坐竟日或不通一詞龍川陳同甫言吾嘗與陳君舉極論往往擊桮案聲撼林木行之在旁邈若無聞吾頗訥之衆亦云素無短長其間也一日夜盡㪚忽語吾道一爾奚皇帝王覇之云吾方辨數而行之橫啓縱闔援今證古釐為十百聚為一二抵夜接日若懸江河吾謝不能乃已則復寡言黙黙如故故雖並舍連榻不知也然則昔人謂得人於眉睫定士於俄頃亦豈盡然歟蓋公之中深隱厚可驗於是矣止安集十八卷陳氏曰太府寺丞三山陳振震亨撰西山集五十六卷陳氏曰參政浦城眞德秀希元撰平齋集三十二卷陳氏曰翰林學士於潛洪咨蘷舜俞撰退庵集十五卷陳氏曰提轄文思院龍泉陳炳撰梅軒集十二卷陳氏曰奉化丞山陰諸葛興仁叟撰遁思遺藁六卷事監韻語三卷陳氏曰永康呂晧子陽撰遁思其庵名後溪劉光祖德修為作記當淳熙中投匭救父兄之難朝奏上夕報可一時非辜盡得清脱其書辭甚偉然非孝廟聖明安能照覆盆之下哉劉汝一進卷十卷陳氏曰諫議大夫吳興劉度汝一撰度嘗應大科此其所業也䇿曰傳言論曰鑑古各二十五篇唯室兩漢論一卷陳氏曰吳郡陳長方齊之撰紹興八年進士鼎論三卷時議一卷陳氏曰三山何萬一之撰隆興元年進士仕為都司知漳州治述十卷陳氏曰從政郎鄭湜紹熙元年撰進按丙戍牓有三山鄭湜溥之是年已為祕書郎面對劄子剴切通練於今傳誦此當别是鄭湜邪廬山雜著一卷陳氏曰知南康軍錢聞詩撰閑静治本論五卷將論五卷陳氏曰知樞密院廣陵張巖肖翁撰林綱山集福清林亦之學可撰後村劉氏序略曰余嘗評艾軒高處逼檀弓穀梁平處猶與韓並驅他人極力摹擬不見其峻潔而古奥者惟見其寂寥而稀短者縱使逼眞或可亂眞猶虎賁之似蔡邕也至於綱山論著句句字字足以明周公之志得少陵之髓矣其律詩高妙者絶類唐人疑老師當避其鋒他文稱是陳樂軒集福清陳藻元潔撰後村劉氏序略曰樂軒七十五乃死年出於其師而窮尤甚於其師城中無片瓦僑居福清縣之橫塘開門授徒不足自給至浮游江湖崎嶇嶺海積鏹得百千歸買田數畝輙為人奪去士之窮無過於此矣今讀其文講學明理浩乎自得不汲汲於希世求合螢窻雪案猶宗廟百官也菜羮脫粟猶堂食萬錢也入則課妻子耕織勤生務本有拾穗之歌焉出則與諸生弦誦登山臨水有舞雩之詠焉自昔遺佚阨窮之士功名頓挫時命齟齬往往有感時觸事之作以洩其無憀不平之鳴若虞卿之愁韓非之憤墨翟之悲梁鴻之噫唐衢之哭是已樂軒平生可愁可憤可悲可噫可哭之時多矣而以樂自扁樂之為義在孔門惟許顔子先儒教人必令求顔氏之所樂嗚呼此固樂軒之所聞於二師歟樂軒沒二十餘年余從竹溪林侯肅翁傳抄遺藁姑叙其平生大致如此肅翁又樂軒之髙弟也他日居魏文貞之地秉陳叔達之筆當為河汾先生立傳無使天下後世有遺恨云李易安集十二卷鼂氏曰李格非之女㓜有才藻名先嫁趙誠之其舅正夫相徽宗朝李氏嘗獻詩曰炙手可熱心可寒然無檢操後適張汝舟不終晚節流落江湖間以卒閨秀集二卷陳氏曰建安徐氏撰徐林穉山之從姑祥符勑頭奭之姪孫女嫁括蒼祝璣璣為部使者有子曰永之嘗知滁州德洪覺範筠溪集十卷鼂氏曰僧惠洪覺範姓喻氏髙安人少孤能緝文張天覺聞其名請住峽州天寜寺以為今世融肇也未幾坐累民之及天覺當國復度為僧易名德洪數延入府中及天覺去位制獄窮治其傳逹言語於郭大信竄海南島上後北歸建炎中卒著書數萬言如林間録僧寶傳冷齋夜話之類皆行於世然多夸誕人莫之信云石門文宗禪三十卷陳氏曰德洪覺範撰其在釋門得法於眞淨克文而於士大夫則與黨人皆厚善誦習其文得罪不悔為張商英陳瓘鄒浩尤盡力其文俊偉不類浮屠語韓駒子蒼為㙮銘云饒德操集一卷鼂氏曰饒節字德操曾布之客也性剛峻晚與布論不合因棄去祝髪為浮屠在襄漢間聲望甚重云陳氏曰節為僧號如璧其詩名倚松集二卷文獻通考卷二百四十一
