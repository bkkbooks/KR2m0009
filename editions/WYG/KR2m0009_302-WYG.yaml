body:
  text: 文獻通考􅃃三百二鄱陽馬端臨貴與著物異考八山崩地陷地移地長川竭春秋釐公十四年秋八月辛夘沙麓崩榖梁傳曰林屬於山曰麓師古曰属聨也音之欲反沙其名也劉向以為臣下背叛散落不事上之象也先是齊桓行伯道㑹諸侯師古曰伯讀曰覇其下亦同事周室管仲既死桓徳日衰天戒若曰伯道將廢諸侯散落政逮大夫陪臣執命臣下不事上矣桓公不寤天子蔽晦師古曰被掩蔽而暗也及齊桓死天下散而從楚王札子殺二大夫師古曰二大夫召伯毛伯也晉敗天子之師師古曰謂敗之於貿戎也已觧於上也莫能征討従是陵遲公羊以為沙麓河上邑也董仲舒説畧同一曰河大川象齊大國桓徳衰伯道将移於晉文故河為徙也左氏以為沙麓晉地沙山名也地震而麓崩不書震舉重者也伯陽甫所謂國必依山川山崩川竭亡之徴也不過十年数之紀也至二十四年晋懐公殺於髙梁師古曰懐公謂子圉恵公之子也文公入國而使殺之髙梁晋地京房易傳曰小人剥廬師古曰剥卦上九爻之辭厥妖山崩兹謂隂乘陽弱勝强成公五年夏梁山崩榖梁傳曰廱河三日不流師古曰廱讀曰壅晉君帥羣臣而哭之廼流師古曰從伯宗用輦者之言劉向以為山陽君也水隂民也天戒若曰君道崩壊下亂百姓将失其所矣哭然後流䘮亡象也梁山在晋地自晉始而及天下也後晉暴三卿厲公以殺董仲舒説畧同劉歆以為梁山晉望也崩弛崩也古者三代命祀祭不越望吉凶禍福不是過也國主山川山崩川竭亡之徴也羙惡周必復是嵗嵗在鶉火至十七年復在鶉火欒書中行偃弑厲公而立悼公威烈王十三年晉河岸崩壅龍門至於底柱漢髙后二年正月武都山崩殺七百六十人地震至八月廼止文帝二年四月齊楚地山二十九所同日俱大發水潰出劉向以為近水沴土也天戒若曰勿盛齊楚之君今失制度將為亂後十六年帝庶兄齊悼恵王之孫文王則薨無子帝分齊地立悼恵王庶子六人皆為王師古曰謂齊孝王将閭濟北王志菑川王賢膠東王雄渠膠西王卬濟南王辟光賈誼鼂錯諌以為違古制恐為亂至景帝三年齊楚七國起兵百餘萬漢皆破之春秋四國同日災師古曰宋衛陳鄭漢七國同日衆山潰咸被其害不畏天威之明效也成帝河平三年二月丙戌犍為柏江山崩捐江山崩皆廱江水師古曰廱讀曰壅次下亦同江水逆流壊城殺十三人地震積二十一日百二十四動元延三年正月丙寅蜀郡岷山崩廱江水逆流三日廼通劉向以為周時岐山崩三川竭而幽王亡岐山者周所興也漢家本起於蜀漢今所起之地山崩川竭星孛又及攝提大角從參至辰如淳曰孛星尾長及攝提大角始發於参至辰也殆必亡矣其後三世亡嗣王莽簒位王莽天鳳三年長平館西岸崩廱涇水不流毁而北行後漢和帝永元元年七月會稽南山崩㑹稽南方大名山也京房易傳曰山崩隂乗陽弱勝强也劉向以為山陽君也水陰民也君道崩壊百姓失所也劉歆以為崩猶弛也是時竇太后攝政兄竇憲專權七年七月趙國易陽地裂京房易傳曰地裂者臣下分離不肯相従也是時南单于衆乗離漢軍追討十二年夏四月戊辰南郡秭歸山髙四百丈崩填谿殺百餘人明年冬至蠻夷反遣使募荆州吏民萬餘人擊之元興元年五月癸酉右扶風雍地裂是後西羗大寇凉州殤帝延平元年五月壬辰河東恒山崩是時鄧太后專政秋八月殤帝崩安帝永初元年六月丁巳河東楊地陷東西百四十歩南北百二十歩深三丈五尺六年六月壬辰豫章貟谿原山崩各六十三所元初元年三月己夘日南地坼長百八十二里其後三年正月蒼梧鬱林合浦盗賊羣起刧畧吏民二年六月河南雒陽新城地裂延光二年七月丹陽山崩四十七所三年六月庚午巴郡閬中山崩四年十月丙午蜀郡越雋山崩殺四百餘人丙午天子㑹日也是時閻太后攝政其十一月中黄門孫程等殺江京立順帝誅閻后兄弟明年閻后崩順帝陽嘉二年六月丁丑雒陽宣徳亭地坼長八十五丈近郊地時李固對䇿以為隂類專恣将有分離之象所以附郊城者是上帝示象以誡陛下也是時宋娥及中常侍各用權分争後中常侍張逵預政與大将軍商爭權為商作飛語欲陷之桓帝建和三年四月郡國六地裂水湧出井溢壊寺屋殺人時梁太后攝政兄冀枉殺李固杜喬三年郡國五山崩和平元年七月廣漢梓橦山崩永興二年六月東海朐山崩冬十二月泰山瑯邪盗賊羣起永夀二年七月河東地裂時梁皇后兄冀秉政桓帝欲自由内患之延熹元年七月乙巳左馮翊雲陽地裂三年五月戊申漢中山崩是時上寵恣中常侍單超等四年六月庚子泰山博尤来山判觧八年六月丙辰緱氏地裂永康元年五月丙午雒陽髙平永夀亭上黨泫工元反氏地各裂是時朝臣患中常侍王甫等專恣冬桓帝崩明年竇氏等欲誅常侍黄門不果更為所誅靈帝建寧四年五月河東地裂十二處裂各長十里百七十歩廣者三十餘歩深不見底魏元帝咸熈二年二月太行山崩此魏亡之徴也其冬晉有天下呉孫權赤烏十三年八月丹陽句容及故鄣寜國諸山崩鴻水溢劉歆以為國主山川山崩川竭亡之徴也呉雖稱帝其實列國災發丹陽天意見之後二年而權薨又二十六年而吴亡晉武帝泰始三年三月戊午太石山崩四年七月泰山崩墜三里京房易傳曰自上下者為崩厥應泰山之石顛而下聖人受命人君虜及帝晏駕而禄去王室恵皇愞弱懐愍二帝俱辱北庭淪胥於北元帝中興於南此其應也太康五年庚午宣帝廟地陷六年十月南安新興山崩湧水出七年二月朱提殊匙二音之大瀘山崩震壊郡舍隂平之仇池崖隕八年七月大雨殿前地陷方五尺深数丈中有破船恵帝元康四年蜀郡山崩殺人五月壬子夀春山崩洪水出城壊地陷方三十丈殺人六月夀春大雷山崩地坼人家陷死上庸郡亦如之八月居庸地裂廣三十六丈長八十四丈水出大饑上庸四處山崩地墜廣三十丈長一百三十丈水出殺人皆賈后亂朝之應也太安元年四月西墉崩懐帝永嘉元年三月洛陽東北歩廣里地陷二年八月乙亥鄄城無故自壊七十餘丈司馬越惡之遷於濮陽此見沴之異也越卒以陵上受禍三年七月戊辰當陽地裂三所廣三丈長三百餘歩京房易傳曰地坼裂者臣下分離不肯相從也其後司馬越茍晞交惡四方牧伯莫不離散王室遂亡三年十月宜都夷道山崩四年四月湘東酃黒石山崩元帝太興元年二月廬陵豫章武昌西陽地震山崩二年五月祁山地震山崩殺人三年南平郡山崩出雄黄数千斤時王敦陵傲帝優容之示含飬禍萌也四年八月常山崩水出滹沱上火乎反下音陀盈溢大木傾拔成帝咸和四年十月柴桑廬山西北崖崩十二月劉允為郭黙所殺穆帝永和七年九月峻平崇陽二陵崩十二年十一月遣散騎常侍車灌修峻平陵開埏道崩壓殺数十人升平五年二月南掖門馬足陷地得鐘一有文四字哀帝􅂭和元年四月丁丑浩亹上古合反下音門山崩張天錫亡徴也安帝義熈八年三月壬寅山陰地陷方四丈有聲如雷十年五月戊寅西明門地穿涌水出毁門扇及限此水沴土也十一年五月霍山崩出銅鐘六枚十三年七月漢中城固縣水涯有聲若雷既而岸崩出銅鐘十有二枚恵帝元康九年六月夜暴雷雨賈謐齋屋柱陷入地壓謐牀帳此木沴土土失其性不能載也明年謐誅焉光熈元年五月范陽國地燃可以㸑此火沴土也是時禮樂征伐自諸侯出梁武帝普通二年始平郡石鼓村地自開成井方六丈六尺深三十二丈後魏孝静帝武定二年十一月西河地陷有火出京房易傳占曰地自陷其君亡祖暅曰火陽精也地隂主也地燃越隂之道行陽之政臣下專恣終以自害時齊神武作宰侯景專擅河南神武崩景作亂後周武帝建徳二年涼州地震裂出泉隋髙祖仁夀三年梁州就谷山崩洪範五行傳曰崩散落背叛不事上之類也梁州為漢地明年漢王諒反煬帝大業七年砥柱山崩壅河逆流数十里時帝興遼東之役四海怨叛卒以滅亡唐太宗貞觀八年七月隴右山摧山者髙峻自上而隕之象也武后垂拱二年九月己巳雍州新豐縣露臺鄉大風雨震電有山湧出髙一十丈有池周三百畝池中有龍鳳之形禾麥之異武后以為休應名曰慶山荆州人俞文俊上言天氣不和而寒暑隔人氣不和而贅疣生地氣不和而堆阜出今陛下以女主居陽位反易剛柔故地氣隔塞山變為災陛下以為慶山臣以為非慶也宜側身修徳以答天譴不然恐灾禍至后怒流於嶺南永昌中華州赤水南岸大山晝日忽風昏有聲隐隐如雷頃之漸移東数百歩壅赤水壓張村民三十餘家髙二百餘丈水深三十丈坡上草木宛然金縢曰山徙者人君不用道禄去公室賞罰不由君佞人執政政在女主不出五年有走王元宗開元十七年四月乙亥大風震電藍田山摧裂百餘歩畿内山也國主山川山摧川竭亡之證也占曰人君徳消政易則然天寳十一載六月虢州閺鄉黄河中女媧墓因大雨晦㝠失所在至肅宗乾元二年六月乙未瀕河人聞有風雷暁見其墓湧出下有巨石上有䨇栁各長丈餘時號風陵堆占曰塚墓自移天下破代宗大厯六年四月戊寅藍田西原地陷九年十一月戊戌同州夏陽有山徙於河上聲如雷十三年郴州黄芩山摧壓死者数百人徳宗建中二年霍山裂魏州魏縣西四十里地數畝忽長崇数尺憲宗元和八年五月丁丑大隗山摧十五年七月丁未苑中土山摧壓死二十人僖宗光啓三年四月維州山崩累日不止塵坌亘天壅江水逆流占曰國破後唐明宗長興三年七月䕫州奏赤甲山崩宋太宗雍熈三年階州福清縣青龍峡山圯壅白江水逆流髙十丈許壊民田数百里淳化三年五月雅州名山縣大風雨登遼山圯壅江水逆流入民田壊稼真宗咸平元年七月庚午寜化軍汾水漲壊北水門山石摧圯軍士有壓死者二年七月庚寅陕州靈寶縣暴雨崖圯壓居民死者二十二户三年三月辛丑夜秦州大澤縣三陽寨大雨崖摧壓死者六十二人四年正月秦州成紀縣山摧壓死六十餘人景徳四年七月秦州成紀縣崖圯殺居民天禧五年五月襄州鳳林鎮道側湧起髙三尺許長三丈濶八尺知州夏竦以聞神宗熈寜元年潭州益陽縣雷震山裂出米二年十月庚戌南郊東壝門内地陷有天寳十二載古墓五年九月丙寅華州少華山前阜頭峯越八盤嶺及谷摧陷於石子坡東西五里南北十里潰散墳裂湧起堆阜各髙数丈長若隄岸至陷居民六社凡数百户林木廬舎亦無存者並山之民言数年以来峯上常有聲是夜初昏畧無風雨山上忽霧起有聲漸大地遂震動不及食頃而山摧元豐八年二月甲戌賓州嶺方縣地陷哲宗元祐元年十二月華州鄭縣界小敷谷山頹傷居民徽宗宣和七年七月己亥熈河路地震有裂数十丈者蘭州尤甚陷数百家倉庫俱没髙宗紹興十二年十二月陕西不雨五榖焦枯涇渭㶚滻皆竭伯陽甫曰國必依山川山摧川竭亡之證也時秦民以餓離散壮者為北人所買郡邑遂空劉向以為陽失在隂者謂火氣来煎枯水故川竭山川連體下竭上必摧占曰君徳消政易則然京房易傳曰君臣相背厥異名水絶光宗紹熈四年秋南岳祝融峯有山自摧劍門關山摧五年十二月臨安府南髙峯有山自摧寜宗慶元二年六月辛未台州黄岩縣大雨水有山自徙五十里餘聲如雷草木塜墓皆如初而故址為淵潭時臨海縣清潭山亦自移唐志載金縢曰山徙者君不用道禄去公室賞罰不由君佞人執政也此韓侂胄擅朝之應嘉泰二年七月丁未閩建安縣山摧民廬之壓者六十餘家嘉定六年六月丙子浙淳安縣長樂鄉山摧水湧近水沴土也京房易傳曰小人剝廬厥妖山摧劉向以為山陽君也水陰民也君道壊下亂百姓将失其所又曰臣下背叛散落不事上之象也八年五月行都久不雨百川皆竭淮甸亦如之地生異物魏公孫淵時襄平北市生肉長圍各数尺有頭目口喙無手足詳見赤祥門晉恵帝元康五年呂縣有流血百餘歩詳見赤祥門懐帝永嘉元年洛陽地陷有蒼白鵝出詳見羽蟲之異元帝太興二年廬江􅏦縣何旭家忽聞地中有犬子聲掘之得一母犬與二子一雄一雌詳見犬禍門又孫無終家地坼得狗同上並見犬禍門成帝咸康初地生毛孝武帝太元二年地生毛十四年京都地生毛十七年地生毛安帝􅂭安四年地生毛或白或黒元興三年五月江陵地生毛義熈三年十三年地並生毛齊髙帝建元元年荆州天井湖出綿人用與常綿不異梁武帝大同二年地生白毛長二尺詳見白祥門北齊武成河清元年九月滄州及長城下地多生毛或白或黒長四五寸唐武后垂拱元年九月淮南地生毛或白或蒼長者尺餘遍居人牀下揚州尤甚大如馬鬛焚之臭如燎毛占曰兵起民不安三年魏州地出鐵如船数十丈武威郡石化為麺貧乏者取以給食元宗天寶十三載汝州葉縣南有土塊闘中有血出数日不止徳宗建中四年四月京師地生毛或黄或白有長尺餘者貞元四年四月淮南及河南地生毛文宗太和二年六月蘇州池生毛四年石生麺貧者食之宋神宗熈寜元年潭州益陽縣雷震山裂出米可十萬斛炊之成飯而腥不可食至京師信米也但色黒如炭八年杭州鹽官縣自三月地産物如珠可食詳見穀異門元豐三年青州臨朐益都石化為麺民取食之黄眚黄祥漢昭帝元鳳元年九月燕有黄䑕衘其尾舞王宫端門中見䑕妖門成帝建始元年四月辛丑夜西北有火光壬寅晨大風従西北起雲氣赤黄四塞天下終日夜著地者黄土塵也是嵗帝元舅大司馬大将軍王鳳始用事又封鳳母弟崇庶弟譚等五人皆為列侯哀帝即位封外属丁氏傅氏周氏鄭氏凡六人為列侯楊宣對曰五侯封日天氣赤黄丁傅復然此殆爵土過制傷亂土氣之祥也京房易傳曰易稱觀其生言大臣之義當觀賢人知其性行推而貢之否則為聞善不與兹謂不知厥異黄厥咎聾厥災不嗣黄者日上黄光不散如火然有黄濁氣四塞天下蔽賢絶道故災異至絶世也王莽天鳳元年六月黄霧四塞後漢昭烈章武二年東伐二月自秭歸進屯夷陵六月秭歸有黄氣見長十餘里廣数十丈後踰旬為陸遜所破近黄祥也晉恵帝元康四年正月大霧帝時昏眊政非已出故有大霧之妖元帝太興四年八月黄霧四塞埃氛蔽天永昌元年十月京師大霧黒氣貫天日無光明帝太寜元年正月癸巳黄霧四塞二月又黄霧四塞是時王敦擅權謀逆愈甚穆帝永和七年三月凉州大風拔木黄霧下塵是時張重華納譛出謝艾為酒泉太守而所任非其人至九年死嗣子見殺是其應也京房易傳曰聞善不與兹謂不知厥異黄厥咎聾厥災不嗣黄者有黄濁氣四塞天下蔽賢絶道故災至絶世也孝武太元八年二月癸未黄霧四塞是時道子專政親近佞人朝綱方替安帝元興元年十月庚申朔黄霧昏濁不雨是時桓元謀逆之應義熈五年十一月大霧十年十一月又大霧是時帝室衰微臣下權盛兵及土地畧非君有此其應也宋文帝元嘉二十九年十二月戊辰黄霧四塞次年春元凶劭弑逆齊武帝永明六年十一月丙戌土氣竟天如烟入人眼鼻三日乃止八年六月丙申大雷雨有黄光竟天照地状如金梁武帝大同元年天雨土二年天雨灰其色黄近黄祥也京房易飛候曰聞善不與兹謂不知厥異黄厥咎聾厥災不嗣蔽賢絶道之咎也時帝自以為聰明博逹惡人勝已又篤信佛法捨身為奴絶道蔽賢之罰也簡文帝大寳元年正月天雨黄沙三年夢九土而吞之帝尋為侯景所廢以土嚢壓之而斃諸子遇害不嗣之應也陳後主時夢黄衣人圍城後主惡之遶城橘樹伐去之隋髙祖受禅後上下通服黄衣未幾隋師攻圍之應也後周静帝大象二年天雨細黄土移時乃息與大同元年同占時宣帝昏狂滋甚其年崩静帝立禅於隋隋文帝開皇二年京師雨土時帝懲周室諸侯微弱至亡乃分封諸子並為行臺專制方面失土之故有土氣之祥後諸王各謀為逆亂京房易飛候曰天雨土百姓勞苦而無功時營都邑起仁夀宫頽山堙谷死者大半唐太宗貞觀七年三月丁夘雨土二十年閠三月己酉有黄雲闊一丈東西際天黄為土功髙宗永徽三年三月辛巳雨土中宗景龍元年六月庚午陕州雨土十二月丁丑雨土元宗天寳十三載二月丁丑雨黄土代宗大厯七年十二月丙寅雨土徳宗貞元二年四月甲戌雨土八年二月庚子雨土文宗太和八年十月甲子土霧晝昏至於十一月癸丑開成元年七月乙亥雨土懿宗咸通十四年三月癸巳雨黄土僖宗中和二年五月辛酉大風雨土昭宗天復三年二月雨土天地昏霾天祐元年閠四月甲辰大風雨土宋太宗淳化三年正月乙夘京師雨土占曰小人叛自後李順盗據益州英宗治平元年三月辛酉十二月乙巳雨土二年三月壬戌雨土十二月己亥雨黄土神宗熈寜五年十二月癸未七年三月戊午並雨黄土八年五月丁丑雨黄土兼細毛元豐二年十一月丁亥五年二月乙巳六年四月辛未雨土哲宗元祐七年正月戊午天雨塵土主民勞苦徽宗宣和元年三月庚午雨土着衣主不肖者食禄髙宗紹興元年十二月庚辰夜有黄白氣十一年馮康國言三月庚申涇州雨黄沙語在金傳及夜妖十八年十一月壬辰上御麗正門肆赦天有雲赤黄近黄祥也太史附秦檜㫖奏以為瑞孝宗乾道四年三月己丑雨土若塵淳熈四年二月戊戌五年二月甲申四月丁丑六年十一月乙丑十一年正月辛夘甲寅十三年正月壬寅皆雨土十五年九月庚子南方有赤黄氣光宗紹熈四年十月甲寅五年四月癸夘皆雨土十月乙未天有赤黄色占曰是為天變色先赤後黄近黄赤祥也十一月辛亥雨土文獻通考􅃃三百二
