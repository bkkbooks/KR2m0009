body:
  text: 文獻通考卷二百二十七鄱陽馬端臨貴與著經籍考五十四子釋氏華嚴經八十一卷陳氏曰唐于闐實义難陀譯華嚴合論一百二十卷鼂氏曰按纂靈記云華嚴大經龍宫有三本佛滅度後六百年有龍樹菩薩入龍宫誦下本十萬偈四十八品流𫝊天竺晉有沙門支法領得下本分三萬六千偈至此土義熙十四年譯成六十卷唐證聖元年于闐沙門喜學再譯舊文兼補諸闕通舊總四萬五千頌成八十卷三十九品合論者唐李通𤣥所撰通𤣥太原人宗室子也當武后時𨼆居不仕舊學佛者皆曰佛說此經時居七處九㑹獨通𤣥以為十處十㑹云朱子語録曰佛書中說六根六塵六識四大十二縁生之類皆極精巧故前輩學佛者必謂此孔子所不及今學者且須截斷必欲窮究其說恐不能得身已出來他底四大即吾儒所謂魂魄十二縁生在華嚴合論第十三函卷佛說本言盡去世間萬事其後黠者出却言實際理地不染一塵萬事門中不舍一法華嚴合論法相撮要一卷陳氏青谷曰真際禪師以唐李長者通𤣥合論撮其要入手藁為圖華嚴經清涼疏一百五十卷鼂氏曰唐僧澄觀撰澄觀居清涼山號清涼國師即韓愈贈之詩者文元公有言曰明法身之體者莫辯於楞嚴明法身之用者莫辯於華嚴學佛者以為不刋之論華嚴決疑論四卷鼂氏曰李通𤣥撰通𤣥既為華嚴合論又著此書皇朝張商英使河東得之夀陽縣東浮屠廢書中華嚴經略一卷鼂氏曰唐僧澄觀撰澄觀既疏華嚴又撮其大意為此凡四十二章法界觀一卷鼂氏曰唐僧杜順撰華嚴最後品法名曰法界叙善財參五十三位善知識經文廣博罕能通其說杜順乃著是書宗密注之裴休為之序華嚴起信文一卷鼂氏曰唐僧善孜撰孜潭州太平寺僧也每品一章撮其大指凡三十九章華嚴經百門義海兩卷鼂氏曰唐僧法藏撰藏長安崇福寺僧也分十章華嚴奥㫖一卷鼂氏曰唐僧法藏撰又曰妄盡還源觀凡六門華嚴吞海集一卷鼂氏曰皇朝僧道通述華嚴經七處九㑹三十九品五萬四千偈其文浩博澄觀為之疏尤難觀覽道通約之成萬三千言以便初學法界披雲集一卷鼂氏曰皇朝僧道通述杜順纂華嚴經義撰法界觀道通又分十𤣥門法界摭要記四卷鼂氏曰皇朝僧遵式述其序云元豐初覽清涼𤣥鏡圭峰注取其合者録之法華言句二十卷鼂氏曰唐僧智顗撰智顗居天台山號天台教五代兵亂其書亡錢俶聞髙麗有本厚賂因賈人求得之至今盛行於江浙六祖壇經三卷鼂氏曰唐僧恵眇撰記僧盧慧能學佛本末慧能號六祖凡十六門周希後有序陳氏曰僧法海集水懴三卷雲龕李氏序略曰昔梁武帝為其妻郗氏墮龍類中誌公教之製懴文十卷其言深博懇至禮誦者多獲冥報後人因之更製此懴文約而事備使誦之者不勞而獲善利亦方便之一也或曰二懴文多寡有異而獲報豈亦然乎予曰心法無邊文字有限報亦有限今以無盡心為無盡施豈以文字為量哉華嚴上部偈如微塵而流𫝊此方止八十卷楞伽大部十萬偈而達磨𫝊以為心要者纔四卷般若六百卷而心經總其要止二百五十八字豈可以多寡量之乎若能破一微塵出大經卷則一大藏教盡自此中流出施者受者物我兼忘罪福空華兩無處所子又如何問者茫然余曰若以空無相無作而不起大悲心度衆生者是寂滅行非菩薩行若起悲心見有一衆生得度而度者是有漏行非菩薩行應以無所度而度是為真度無所施而施是為真施如是而施福不唐捐行矣仁者布施勿疑問者懽喜踴躍而去肇論四卷鼂氏曰姚秦僧洪肇撰師羅什規模莊周之言以著此書物不遷不真空湼槃無知般若無名四論𫝊燈録云肇後為姚興所殺觀心論一卷鼂氏曰魏菩提達磨撰百法論一卷鼂氏曰唐僧𤣥奘譯西域僧天親所造所謂一切法者其略有語一心法二心所有法三色法四心不相應行法五無為法心法八種心所有法五十一種色法十一種心不相應行法二十四種無為法六種故曰百法起信論一卷鼂氏曰唐僧宗密註僧真諦譯天竺第十二祖馬鳴大士所造也雖云名相蓋明心宗指義𤣥微文辭明緻故盛行於世若肇論百法唯識及此義者皆専門名家故藏中所收亦録於此辯正論八卷鼂氏曰唐釋法琳撰潁川陳良序云法琳姓陳關中人著此書窮釋老之教源極品藻之名理宣和中以其老子語焚毁其第二第四第五第八凡五卷序文亦有剪棄者破邪論二卷甄正論三卷鼂氏曰唐釋法琳撰已上三書皆經宣和焚毁藏中多闕故録之按破邪甄正二論昭德讀書記以為宣和焚毁藏中多闕然愚嘗於村寺經藏中見其全文破邪論専詆𫝊奕而併非毁孔孟所謂詖淫邪遁之辭無足觀者甄正論譏議道家如度人經璇璣停輪處以為璇璣無停輪之理使停輪至七日七夜則宇宙顛錯而生人之類滅矣無極曇誓天及龍變梵度天處以為曇與梵二字出自佛書佛法未入中國之前經𫝊中並無此二字豈有天地名號而剽竊佛書字義乎又如河上公道德經章句序言漢文帝駕詣河上公問道而河上公一躍騰雲帝知是神人下輦稽首從受章句二卷以為漢史帝紀車駕毎出必書何獨不書駕詣河上公問道之事且孝文好黃老言立渭陽五帝廟則因新垣平平一方士其說至卑陋帝尊寵之而史亦備述之河上公之事竒偉如此何獨見遺於班馬乎乃羽人道士輩自創此說大意如此不能悉記其詞語此論頗當意必借筆於文學之士沙門輩恐不能道也原人論一卷鼂氏曰唐僧宗密撰斥執迷􅄶淺直顯真源余道本末凡四篇輔教編五卷鼂氏曰皇朝僧契嵩撰藤州人皇祐間以世儒多詆釋氏之道因著此書廣引經籍以證三家一致輔相其教云𤣥聖蘧廬二卷鼂氏曰唐李繁撰繁學於江西僧道一敬宗時常與丁公著陸亘入殿中抗佛老講論唐虞愈稱其家多書一覽終身不忘太和中舒元輿誣其濫殺不辜繫獄知且死著書十六篇以明禪理自謂臨死生而不懼賢於顔回在陋巷不改其樂嗚乎可謂賢矣而史載其平生行事甚醜獨何歟宗鏡録一百卷鼂氏曰皇朝僧延夀撰延壽姓王氏餘杭人法眼嫡孫也建隆初錢忠懿命居靈𨼆以釋教東流中夏學者不見大全而天台賢首慈恩性相三宗又互相矛盾乃立重閣館三宗知法僧更相詰難至詖險處以心宗㫖要折衷之因集方等祕經六十部華梵聖賢之語三百家以佐三宗之義成此書學佛者𫝊誦焉天台者僧知顗也觧法華經賢首者僧法藏也述華嚴經慈恩者僧𤣥奘也譯般若經釋氏要覽三卷鼂氏曰皇朝僧道成集雜録釋典旁求書𫝊分門編次成二十類天禧三年書成𢎞明集十四卷鼂氏曰梁釋僧祐纂僧祐居鍾山定林寺號右律師采前代勝士書記文述有益於釋教者廣𢎞明集三十卷鼂氏曰唐僧釋道宣撰道宣麟德初居西明寺以中原自周魏以來重老輕佛因采輯自古文章下逮齊隋發明其道者以廣僧祐之書分歸正辯惑佛徳法義僧行慈惻誠功啟福滅罪統歸等十門林間録四卷鼂氏曰皇朝僧徳洪撰記高僧嘉言善行謝逸為之序然多寓言如謂杜祁公張安道皆致仕居睢陽之類疎濶殊可笑景徳𫝊燈録三十卷鼂氏曰皇朝道原編其書披奕世祖圖采諸方語録由七佛以至法眼之嗣凡五十二世一千七百一人獻於朝詔楊億李維王曙同加裁定億等潤色其文考正差謬遂盛行於世為禪學之源夫禪學自達磨入中原世𫝊一人凡五傳至慧能通謂之祖慧能𫝊行思懐讓行思之後有良价號洞下宗又有文偃號雲門宗又有文益號法眼宗懐讓之後有靈祐慧寂號溈仰宗又有義𤣥號臨濟宗五宗學徒徧於海内迄數百年臨濟雲門洞下日愈益盛嘗考其世皆出唐末五代兵戈極亂之際意者亂世聰明賢豪之士無所施其能故憤世嫉邪長徃不返而其名言至行譬猶聨珠疊璧雖山淵之高深終不能掩覆其光彩而必輝潤於外也故人得而著之竹帛罔有遺軼焉玉英集十五卷鼂氏曰皇朝王隨撰先是楊億編次傳燈録三十卷隨刪去其繁大半上之致堂胡氏序曰學必有疑疑必有問問必資於賢智於我者問非所疑答不酬問與夫不待問而自告之此師弟子之失也𫝊燈録所載釋子以葛藤目之其失在此矣今獨取其敷揚明白者庶易以考其是非焉若夫談鬼怪舉詩句類俳戲如誑誕者則盡削之或誚予為蔽曰曾不聞粗言細語無非第一義而於其間妄生㨂擇是豈禪意予曰以鬼怪詩句俳戲誕誑之説相唱和於穿穴空籠滉漾無實之中是為遁辭乃得法者之所訶也觀少林啟迪姬光警發梁武莫非的確要論何有如末流蘿蔓轇轕不可致詰者哉雖然此亦就其心聲而去取之非宗其道也夫意由心生而意非心心由性有而初非性也今釋者之論心纔及意耳其論性纔及心耳是自名見性而未嘗見性也未嘗見性於是以世界為幻以性命為欲以秉彛為妄以事理為障雖清淨寂滅不著根塵而大用大機不足以開物成務特以擎拳植拂揚睂瞬目遂為究極則非天地之純全中庸之至徳也天聖廣燈録三十卷鼂氏曰皇朝駙馬都尉李遵朂編自釋迦以降仁宗御製序分燈集二十五卷鼂氏曰皇朝井度編葢續三燈録也建中靖國續燈録三十卷鼂氏曰僧維白編維白靖國初住法雲寺駙馬都尉張敦禮以其書上於朝徽宗為之序分正宗對機拈古頌古偈頌五門禪苑瑤林一百卷鼂氏曰井度編取三燈録所載祖師言行附入諸方闡提語句且考正其差誤云緇林古鑑二十四卷浮屠慧邃撰雲龕李氏序略曰邃以所著緇林古鑑示予曰此書起漢永平訖唐貞觀上下數百年用高僧續高僧求法法顯等數家之書芟其繁冗以類相從為四十九門二十四卷總二千二百七十一事傳授之本末教法之興替高勝之行業幽顯之報應莫不畢載慧邃之為此書非務博聞而已將俾學者考古以鑑今知所畏慕誘掖其善意而䇿發其怠惰於教法有序焉請序而行之某曰人之學道要臻其極而剛柔緩急受才有不同今子之書以事從人以人從目覽者各以類求之而知慕向焉所得斯過半矣嘉泰普燈録三十卷陳氏曰僧正受編三録大抵與傳燈相出入接續機緣語句前後一律先儒所謂遁辭也然本初自謂直指人心不立文字今四燈總一百二十卷數千萬言乃正不離文字耳龎公語録十卷鼂氏曰唐龎藴襄陽人與其妻子皆學佛後人録其言成此書羅漢因果識見頌一卷陳氏曰天竺闍那多迦譯首有范仲淹序言宣撫河東得於傳舍藏經所未録者十六羅漢為比丘摩拏羅等説雪竇頌古八卷鼂氏曰皇朝僧道顯居雪竇山所謂頌古者猶詩人之詠古云宗門統要十卷陳氏曰建溪僧宗永集鮑埜宗記永嘉鮑埜撰水心序曰佛學由可至能自為宗其説蔓肆數十萬言永嘉鮑埜刪擇要語定著百篇此非佛之學然也中國之學為佛者然也佛學入中國其書具在學之者固病其難而弗省也有胡僧教以盡棄舊書不用即己為佛而已學之者又疑其誕而未從也獨可璨數人大喜決從之故流行至今嗚呼佛之果非己乎予不得而知也己之果為佛乎予不得而知也余所知者中國之人畔佛之學而自為學倒佛之言而自為言皆自以為己即佛而甚者至以為過於佛也是中國人之罪非佛之過也今夫儒者不然於佛之學不敢言曰異國之學也於佛之書不敢觀曰異國之書也彼夷術狄技絶之易爾不幸以吾中國之人為非佛之學以吾中國文字為非佛之書行於不可行立於不可立草野倨侮廣博茫昧儒者智不能知力不能救也則中國之人非佛非己蕩逸縱恣終於不返矣是不足為大慼歟予嘗問埜儒之强者愠弱者眩皆莫之睨予以何道知之又為之分高而别下取要而舍煩哉埜曰無道也悟而已矣其為是宗者亦曰無道也悟而已矣予聞其言愈悲夫不憤不啟不悱不發故曰亦可以弗畔矣今悟而遂畔之庸知非迷之大乎雖然考之於其書則信悟矣雪峰廣録二卷陳氏曰唐真覺大師義存語丞相王隨序之隨及楊大年皆號參禪有得者也古塔主語録三卷鼂氏曰皇朝僧道古撰范文正喜之嘗親為疏請說法有句云道行無玷孤風絶攀時以為非溢美也碧巖集十卷鼂氏曰皇朝僧克勤解雪竇頌古曰碧巖集法藏碎金十卷陳氏曰太子少傳鼂逈撰景祐天竺字源七卷陳氏曰僧相淨等集進以華梵對翻有十二聲三十字母名有牙齒舌喉唇五音仁宗御製序吳郡虎丘寺有賜本如新金園集三卷天竺别集三卷陳氏曰並錢塘天竺僧遵式撰世所謂式懴主是也道院集要三卷陳氏曰王古撰以鼂逈法藏碎金耄智餘書刪重集碎别為此篇大慧語録四卷陳氏曰僧宗杲語其徒道謙所錄張魏公序之禪宗頌古聨珠集一卷陳氏曰僧法應編釋迦氏譜十卷鼂氏曰唐釋僧祐撰僧祐以釋迦譜記雜見於經論覽者難通因纂成五卷又取内外族姓及弟子名氏附於後高僧𫝊六卷鼂氏曰蕭梁僧惠敏撰分譯經義解兩門高僧傳十四卷鼂氏曰蕭梁僧釋慧皎以劉義宣靈驗記陶潛搜神録等數十家並書諸僧殊疎略乃博采諸書咨訪古老起於永平十年終於天監十八年凡五百五十二載二百五十七人又附見者二百餘人分為譯經義解神異習禪明律遺身誦經興福經師唱道十科續高僧傳三十卷鼂氏曰唐僧道宣撰藝文志作道宗大明寺僧也以慧皎㑹稽人故其書詳於吳越而略於燕魏故上距梁天監下終唐貞觀十九年百四十四載編載二百四十人附見者又一百六十人分譯經解義集禪明律䕶法感通遺身讀誦興福雜科凡十門求法高僧𫝊二卷鼂氏曰唐僧義淨撰義淨垂拱中徃天竺求佛經既還因纂集唐僧徃西域者五十六人行事比丘尼𫝊四卷鼂氏曰蕭梁僧寶唱撰起晉升平訖梁天監得尼六十五人為之𫝊以檢淨為首寶唱金陵人藝文志有其目僧寶𫝊三十二卷鼂氏曰皇朝僧徳洪撰其序云五家宗派嘉祐中達觀曇頴嘗為之傳載其機縁語句而略其終始行事徳洪謂入道之縁臨終之效有不可闕者遂盡掇遺編别記補以諸方之𫝊又自嘉祐至政和取雲門臨濟兩宗之裔絶出者合八十七人各為𫝊係之以贊云正法世譜王質景文撰自序略曰其書始周昭王二十四年甲寅釋迦佛生至隆興元年癸未大慧卒得二千二百八十五年以史記通鑑及皇極經世相參以為正其間諸宗師出某鄉姓某氏舍某家所從師某人受具所游方某所出世某所得法某人授法某人其平生所可見某事終某所塔某所夀若干臘若干倣史記年表列之此世譜大略也葢自大藏經之餘諸史諸集四方圖經諸誌銘若近儒釋之徒所著未及入藏者皆裒以為資大慧以降方歴訪其人續之未艾也竟余世而已開元釋教録三十卷鼂氏曰唐僧智昇撰智昇在開元中纂釋氏諸書入中國歳月及翻譯者姓氏以楞嚴經為唐僧懐迪譯張天覺以懐迪與菩提流支後魏僧其言殆不可信也釋書品次録一卷陳氏曰題唐僧從梵集末有黎陽張翬跋稱大定丁未葢非中板本也法寶標目十卷陳氏曰户部尚書三槐王古敏仲撰以譯藏諸函隨其次第為之目録而釋其因縁凡佛㑹之先後華譯之異同皆是著之古旦之曽孫入元祐黨籍致堂胡氏崇正辯序曰崇正辯何為而作歟闢佛氏之邪説也佛之道孰不尊而畏之曷謂之邪也不親其親而謂異姓為慈父不君世主而拜其師為法王棄其妻子而以生續為罪垢是淪三綱也視父母如怨仇則無惻𨼆滅類毁形而不恥則無羞惡取人之財以得為善則無辭讓同我者即賢異我者即不肖即無是非是絶四端也三綱四端天命之自然人道所由立惟蠻夷戎狄則背違之而毛鱗蹄角之屬咸無焉不欲為人者已矣必欲為人則未有淪三綱絶四端而可也釋氏於此丕單掃除自以為至道安得不謂之邪歟豈特此哉人生物也佛不言生而言死人事皆可見也佛不言顯而言幽人死然後名之鬼佛不言人而言鬼人不能免者常道也佛不言常而言經常道所以然者理也佛不言理而言幻生之後死之前所當盡心也佛不言此生而言前後生見聞思議皆實證也佛不以為實而言耳目所不際思議所不及至善之徳盡於乾坤也佛不知其盡而言天之上地之下與八荒之外若動若植無非物也佛不恤草木之榮枯而憫飛走之輪轉百骸内外無非形也佛不除手足而除髪鬚不廢八竅而防一竅等慈悲也佛獨不慈悲父母妻子而慈悲虎狼蛇􅚣等棄舎也佛獨使人棄舍其財以與僧而不使僧棄捨其所取之財以與人河山大地未嘗可以法空也佛必欲空之而屹然沛然卒不能空兵刑災禍未嘗可以咒度也佛必欲度之而伏屍百萬烈焚淪沒卒不獲度此其説之疎漏畔戾而無據之大略也非邪而何今中國之教無父無君則聖賢闢之萬世不以為過中國之治弑父與君則王法誅之人心不以為虐至於詭術左道皆重加禁絶所以扶持人紀計安天下也釋氏之説盡麗乎此數者吾儒反相與推尊歸向無乃有三蔽乎三蔽謂何一曰惑二曰懼三曰貪夫闖光於隙穴者豈知日月之大明囿知於一物者豈盡隂陽之變化此凡民淺識也佛因而迷之曰世界不可以數計生死不可以世窮於是不智者亦從而惑矣身拔一毫則色必慄然變足履一刺則心必惕然動此民懦氣也佛因而惴之曰報應之來迅於影響之答幽㝠之獄倍於金木之慘於是不勇者亦從而愳矣迫窮患害必起饒益之想謀及悠逺必為子孫之慮此凡民貪情也佛因而誘之曰從吾之教則諸樂咸備夀富不足言造吾之地則超位高明天帝不足貴於是不仁者亦從而貪矣吾儒誠能窮理養氣而宅心必無此三蔽有此三蔽是衣冠身而衆庶見也是引貊入中國以為未快又與禽獸同羣而不知避也何乃不思之甚哉無亦可悼之極哉雖賢智之士有出塵之趣高世之念者以事為膠擾非清淨妙圓之體也則曰吾豈有貪懼如愚夫之所期歟葢將求佛所謂無上法第一義者悟徹此心耳嗚呼堯舜禹湯文武之徳衣被天下仲尼子思孟軻之道昭覺萬世凡南面之君循之則人與物皆䝉其福背之則人與物皆受其殃載在方冊之迹著矣其原本於一心其效乃至於此不可禦也今乃曰是未足以盡吾本心兼利萬物為高士也豈不猶食五榖而曰不足以飫登太山而曰不足以崇者乎盍亦師聖人之言窮萬物之理反求諸心乎今於聖人之言未嘗思於萬物之理未能窮志卑氣餒倀倀然如逆旅之人也乃率然曰妙道非六經所能𫝊亦何言之易邪假曰孔孟有未言者故佛言之佛言其妙所以出世而孔孟言其粗所以應世耳其心則一也然則以耳聽以目視以口言以足行飢而食渇而飲冬而裘夏而葛旦而動晦而息戴皇天履后土皆孔孟日用之常佛老何不一槩反之而亦與之同乎同其粗而不同其精同其心而不同其用名曰出世而其日用與世人無以異烏在其能出乎故道不同不相為謀儒與佛不同審矣佛者未嘗為儒謀而儒之陋者無不為之謀恱其受記之媚承其外䕶之諂張而相之扶而興之至使非毁堯舜詆譏丘軻曾不以為疾也一有距西方之説者則怵心駭色若罪元在己雖弑父與君未足以方其怖且怒矣良心陷僻乃至於此邪或者曰如子所言皆僧之弊非佛本㫖也子惡僧可也兼佛而斥之則過矣則應之曰黄河之源不揚黒水之波桃李之根不結松柏之實使緇衣髠首者承其教用其術而有此弊是誰之過也仲尼父子君臣之道經紀乎億千萬載豈有弊邪惟其不作而無弊也是以如天之覆不待推而高如地之載不待培而厚如日月之照不待廓而明惟其造作而有弊也是故曼衍其説張皇其法防以戒律而詛以鬼神侈以美觀而要以誓願托之於國王宰官刼以禍福苦樂而其弊久而益甚矣墨氏兼愛其流無父楊朱為我其流無君非身自為之也孟子究極禍害比之禽獸况其身自為之又率天下而從之其害源之所達而禍波之所浸千有餘年喪人之心失人之身破人之家亡人之國漂泊滔懐天下溺焉莫之援也豈曰弊而已乎昔梁武奉佛莫與比隆及侯景之亂諸子擁重兵圖便利雲翔不進卒殍其父而後兄弟相夷宗國亡滅彼於君臣父子之際可謂淡然無情不為愛欲牽矣而道果如是耶或者猶曰佛之意亦欲引人為善使人畏罪而不為慕善而為之豈不助於世而何闢之深也則應之曰善者無惡之稱也無父無君者惡乎善乎自非喪心者不以為非惡孰與有父有君之為善乎道者共由之路也不仁不義者可由乎自非喪心者不以為可由孰與居仁由義之為道乎子悦其言而不覈其事過矣或者又曰夫在家以養口體視温凊為孝者其孝小出家得道而昇濟父母於人天之上者其孝大佛非不孝也將以為大孝也則應之曰良价之殺父效牟尼之逃父而為之者也逃父之於山而得道不若使父免於思慮憂勤而親其身之為全也殺父升之於天之非理不若使父免於叱逐餒殍而養其生之為得也然則佛之所謂大孝乃其父之所謂大不孝耳借使佛之説盡行人皆無父則斯民之種必致殄絶而佛法亦不得𫝊矣人皆無君則爭奪屠膾相殘相食而佛之黨亦無以自立矣此理之易見者彼非懵然不知也特罔人以虚誕之言盖其悖逆之情聾瞽愚惰之徒而安享華屋之居良田之利金帛之施衣食之奉泰然為生民之大蠧不謂之異端邪説謂之何哉是故仲尼正則佛邪佛邪則仲尼正無兩立之理此崇正辯所以不得已而作也上士立德以教變之中士立功以法革之下士立言以辭闢之吾下士也凡若干言覽者矜其志而左右其說則忠孝之大端建矣又永寧院輪藏記曰文籍惟吾儒與釋氏為最多然儒書之要莫過乎五經鄒魯之語是七書者上下闗千百餘載非一聖賢所言總集百有餘卷而已既經仲尼裁正理益明道益著三才以立萬世無弊違之則夷狄禽獸焉未嘗丁寧學者收藏夸眩以利心事之而所以至於今存而不廢者盖人生所共由自不可離也其餘百氏著述日繁世久得以卷計者至於數萬可謂衆矣然明智之士則必紀綱大訓折衷於聖人使至當歸一精義無二詖淫邪遁之辭遏而不得肆固不盡以為是也今釋氏之書五千四十八卷以詞之多故世人罕能誦之吾嘗閱實其目則曰論曰戒曰懴曰贊曰頌曰銘曰記曰序曰録雜出於僧人所為居其大半而以經稱者纔一千餘卷焉僧人於中所常誦味舉唱者又亦六七品而止爾餘則置而不道也所以不道者抑未暇歟將無庸稱焉然則自其術論之所得有淺深則所言有當否若舉以為是不亦罔之甚哉夫其詞之多雖未可盡究而立説之大㫖亦可知矣蓋論心則謂耳目口鼻之用喜怒哀樂之變皆非本體之妙也論身則謂假合暫聚生老病死無非苦惱雖以食狼虎飽鴟鳶而可也論生死則謂有前世之來後世之往人與狗彘羊牛相為輪轉而不息也論世界則謂天之上有堂地之下有獄日月之中有宫囿星辰之域有里數而宇宙之衆如河沙微塵者蓋不可勝計也論庶物則羽毛介鱗皆前生之親愛宗族而含靈蠢動蚊蚋螻螘與佛不殊亦欲化之使登正覺也其於秉彛天命則以為愛欲所鍾因而滋續無足貴者故視父母兄弟妻子猶惡憎讐毒之可惡也其所親厚則以他人為慈父法嗣凡九州四海殊根異質不問賢否茍同於我者皆眷屬也其論覆載之内可見之物可名之事則等之寐夢幻詭漚影電露舉非堅久真實不必為也其論鬼神則記其狀貌叙其種類知其嗜慾年夀得其居處名數縱口而談極筆而書不自以為怪也佛既言之又付囑之僧遂演說而推廣之所以其書至於五千四十八卷之富且以為字字皆至理句句皆妙法卷卷有光明處處有神佛䕶持無可置議於是裒人之財殫衆之力印以紙筆匣而藏之載以機輪推而轉之丹砂黃金文珉香木窮極侈麗葩華絢爛然後為快獨疑而闢之者乃外道魔障佛之罪人若傅太史韓文公之流至今為釋子怒罵而未已也夫既以空虚寂滅為道之至矣雖天倫之重乾坤之大照臨之顯山河之著猶將掃除殄滅洞然不立則凡見於形像當一毫無有焉今乃建大屋聚徒黨耕良田積厚貨憧憧擾擾與世人無異而以佛之遺書營置儲貯巍然􅂱然鬱相望也烏在其為空乎不能空其言說之迹而欲空並有之萬有烏知其可乎是必有說矣比丘意嚴居桂陽之永寕悉其志力以營兹事勤勞歴年而後克成來求為之述以示久逺予因舉儒釋同異且箴夫棄有趣空者之蔽庶吾黨之士相與講明以止於至善夫豈好辯哉蓋不得已也又讀史管見曰太宗謂𫝊奕曰佛教𤣥妙卿何不悟奕曰佛乃胡中桀黠誑耀彼土中國邪僻之人取莊老言談飾以妖幻用欺愚俗有害於國臣非不悟鄙不學也如奕之言未足以斷佛道之至彼所以能張大其説流𫝊千有餘嵗髙明之士往往從之者亦有以深動乎其心矣若茍曰妖幻而已則中人以下亦或能照之蓋不如是也然其說實為浩博連類以根塵六者反復𨼆顯引而伸之遂至於數十萬言故君子曰若一一欲窮之未必能窮而先為所變故不若置而不觀此為中人以下者言之也若夫上智之士既不可惑亦必遍讀其書抉其楗而剔其髓然後氷釋雲散渙然無疑信道術之為天下裂而至當之必歸於一也文獻通考卷二百二十七
