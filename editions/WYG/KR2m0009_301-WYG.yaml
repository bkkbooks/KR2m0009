body:
  text: 文獻通考卷三百一鄱陽馬端臨貴與著物異考七歲凶即五行所謂稼穡不成也然則嵗凶年榖不登蓋土失其性所致而地震山崩之屬亦土失其性也故以繼嵗凶之後春秋莊公二十八年冬大水亡麥禾劉向以為水旱當書不書水旱而曰大亡麥禾者土氣不養稼穡不成也時夫人淫于二叔内外亡别二叔謂莊公二弟仲慶父及叔牙又因凶飢一年而三築臺故應稼穡不成餙臺榭内淫亂之罰云秦始皇十六年民大飢十九年大飢漢髙祖二年關中大飢米斛萬錢人相食令民就食蜀漢武帝建元三年平原大飢人相食元鼎三年四月關東郡國四十餘飢人相食元帝初元元年九月關東郡國十一飢或人相食轉旁郡榖以相救二年六月關東飢齊地人相食王莽地皇時天下大飢寇盗蜂起後漢光武二年關中飢人相食安帝永初三年京師大飢民相食桓帝延熹九年司隸豫州飢死者什四五至有滅戸者獻帝興平二年關中大飢人相食啖白骨委積吳孫皓時常嵗無水旱苖稼豐美而實不成百姓以飢闔境皆然連嵗不已吳人以為傷露非也劉向春秋說曰土氣不養稼穡不成此其義也皓初遷武昌尋還建鄴又起新館壯麗過甚犯暑妨農官私疲怠月令季夏不可興土工皓皆冒之此修宫室餙臺榭之罰也晉愍帝建興四年京師大飢元帝大興二年吳郡吳興東陽無麥禾大飢成帝咸和五年無麥禾天下大飢穆帝永和十年二麥不登十二年大無麥孝武太元六年無麥禾天下大飢安帝元興元年無麥禾天下大飢北齊後主武平四年山東飢時大興土木窮侈極麗後宫侍御千餘人皆寶衣玉食逆中氣之咎隋煬帝大業五年燕代齊魯諸郡飢先是建立東都制度崇侈又宗室諸王多逺徙邊郡唐貞觀元年關内飢總章二年諸州四十餘飢關中尤甚儀鳳四年春東都飢調露元年秋關中飢永隆元年冬東都飢永淳元年關中及山南州二十六飢京師人相食垂拱三年天下飢大足元年春河南諸州飢景龍二年春飢三年三月飢先天二年冬京師岐隴幽州飢開元十六年河北飢乾元三年春飢米斗錢千五百廣徳二年秋關輔飢米斗千錢永泰元年飢京師米斗千錢貞元元年春大飢東都河南河北米斗千錢死者相枕二年五月麥將登而雨霖米斗千錢十四年京師及河南飢十九年秋關輔飢元和七年春飢八年廣州飢九年春關内飢十一年東都陳許州飢長慶二年江淮飢太和四年河北及太原飢六年春劒南飢九年春飢河北尤甚開成四年温台明等州飢大中五年冬湖南飢六年夏淮南飢海陵高郵民於官河中漉得異米號聖米九年秋淮南飢咸通三年夏淮南河南飢九年秋江左及關内飢東都尤甚乾符三年春京師飢中和二年關内大飢四年關内大飢人相食光啓二年二月荆襄大飢米斗三千錢人相食三年揚州大飢米斗萬錢大順二年春淮南大飢天祐元年十月京師大飢宋明道二年南方大旱種粒皆絶人多流亡因飢成疫死者十二三官作粥糜以飼之然得食者輙死墟里幾為之空建炎元年汴京大飢米升錢三百一䑕之直數百錢人啖道殣骼無餘胔取水藻春槐葉以食三年山東郡國大飢人相食時金人䧟京東諸郡民聚為盗至車載乾尸為糧紹興元年行在越州及東南諸路郡國飢令郡𤼵常平倉粟以賑勸分禁遏糴淮東京東西流民聚常州平江府者多殍死亦令各郡賑之二年春兩浙福建飢米斗千錢令憲臣移廣粟以賑時餫饟繁急民益艱食詔漕江東西上供粟給軍饟以寛浙民三年吉郴道州桂陽監飢皆令宣諭使賑之流民之聚湖南者令憲臣賑之五年湖南大飢殍死流亡者衆詔移粟減賦令漕臣賑之夏潼川路飢米斗二千人食糟糠興元飢民流於果閬令漕臣賑之秋温處州飢漕閩粟萬石以賑六年春浙東福建飢湖南江西大飢殍死甚衆民多流徙郡邑盗起令帥臣部使者賑粟勸分且漕廣粟以助夏四月蜀亦大飢米斗二千利路倍之道殣枕藉令帥臣賑粟蠲賦是嵗果州守臣宇文彬獻禾粟九穗圗吏部侍郎晏敦復言果遂飢民未蘇不宜導諛坐黜爵七年夏欽廉邕州飢令常平使者賑粟九年江東西浙東飢米斗千錢饒信州尤甚令出常平粟以賑十年浙東江南薦飢人食草木令戸部條賑飢事下之諸路十一年京西淮南飢令通商移粟十五年汀䖍州以盗妨農令郡縣賑粟貸種十八年冬浙東江淮郡國多飢令諸道常平使者賑粟紹興府大飢民之仰哺于官者二十八萬六千人賑之不給人食糟糠草木殍死殆半流民渡江至行都事上聞令臨安府賑遣復業十九年春夏紹興府飢流如初明婺州亦飢令常平使者賑集之二十四年衢州飢二十八年平江府飢二十九年紹興府薦飢皆𤼵常平義廪以賑隆興元年紹興府大飢四川尤飢民食蕨根平江襄陽府隨泗州棗陽盱眙大飢隨棗間米斗六七千令有司皆賑之粟二年平江府常秀州飢華亭縣人食粃糠行都及鎮江府興化軍台徽州亦囏食皆令守臣及常平使者賑之淮民飢流江南者數十萬人詔内郡移粟施惠安集之乾道元年春行都平江鎮江紹興府湖常秀州大飢殍徙者不可勝計州縣為糜食之行都城外為糜四十餘日數萬人是嵗台明州江東諸郡皆飢令賑之粟夏亡麥二年夏亡麥三年九月不雨麥種不入四年春蜀卭綿劒漢州石泉軍大飢卭為甚盗延八郡漢飢民至九萬人内出宸翰賜制置使汪應辰講行荒政賜僧牒四百助之五年夏饒信州薦飢民多流徙徽州大飢人食蕨葛台楚州盱眙軍亦飢令郡守部使者𤼵廪移粟勸分秋冬不雨淮郡麥種不入六年冬寧國府廣徳軍太平温湖秀池徽和州皆飢令漕江西廣東粟以賑七年秋江東西湖南十餘郡飢江筠州隆興府為甚人食草實流徙淮甸𤼵廪賑之不給詔立勸分賞格内出左帑增賑饒州出内帑收育棄孩淮郡亦薦飢金人諜知運麥於淮北岸易南岸銅鏹斗錢八千江西飢民流光濠安豐間皆效淮人私糴淮鏹為耗荆南亦艱食宣撫使下蜀粟以賑八年江西亡麥隆興府薦飢南昌新建縣飢民仰給者二萬八千餘人先是去嵗秋詔淮浙江湖諸路帥漕臣勸課二麥官借種糧九年春成都永康卭三州飢秋台州飢𤼵江西米數萬石以賑温婺州亦飢令各郡賑粟禁遏糴是郡國告飢詔盡𤼵常平粟截上供賦以賑令帥漕臣申勸種麥淳熙元年浙東湖廣廣西江西蜀闗外皆飢台處郴桂昭賀尤甚令賑以常平義廪江西一道至六十二萬斛二年淮東西江東飢滁真揚州盱眙軍建康府為甚詔賑以常平米弛賦通商貨種糧勸布麥立勸分賞格是嵗鎮江寧國府常州廣徳軍亦囏食皆賑之粟三年淮甸飢夏台州亡麥冬復施隨郢州荆門軍襄陽江陵徳安府大飢四年春尤飢令𤼵屯田粟二萬六千五百餘石以賑六年冬和州飢泰通楚州髙郵軍大飢人食草木皆賑之粟七年鎮江府台州無為廣徳軍民大飢令出常平米賑之賑廣徳軍至於越嵗之春弛兩嵗帛賦是嵗江浙荆湘淮郡皆飢皆蠲賦予粟或一道至十四五萬石八年春江州飢人採葛而食詔罷守臣章騂冬行都寧國建康府嚴婺太平州廣徳軍飢徽饒州流徙入淮郡者萬餘人令兩淮漕臣授田江東帥漕臣賑粟十一月辛夘内出庚牌下淮南勸種麥遣使分行兩浙江東淮南路賑贍安集之令江浙湖北行勸分賞格己亥浙東常平使者朱熹進對論荒政請粟勸分及蠲田賦身丁錢上嘉納之十二月戊申詔江浙淮湖北三十八郡並免之九年春大亡麥行都飢於潛昌化縣人食草木出豐儲倉米萬石令尹臣為糜以食之飢民之就食者一萬四千五百人流民一千五百餘人浙西湖州浙東紹興府衢婺嚴明台州飢徽州大飢穜稑亦絶令常平使者賑恤之湖北七郡薦飢令帥臣賑之蜀潼利夔三路郡國十八皆飢流徙者數千人令饟漕守臣分賑之十年合昌州薦飢令饟漕臣賑以緡粟恭州飢民就賑相踐死者三千餘人十一年泉汀漳州興化軍亡禾邕賓象州飢令帥臣賑粟貸種十二年福建飢亡麥江西廣東西飢皆令帥臣賑粟金州飢有流徙者令郡賑之十四年金洋階成鳳西和州人乏食令漕臣賑之粟七月秀州飢有流徙者詔出粟二萬斛令郡賑恤之臨安府九縣飢令𤼵廪二十萬石以賑十六年夏成州亡麥冬階成鳳西和州薦飢令饟臣賑之乾道淳熙間上篤意民事勸課農桑宮中親蠶後苑種稼藝麥以驗歲功間取民間繭麥觀之或繭薄穗短則歉然為農婦不滿修圩浚渠廣勸種麥遇水旱之變則𤼵廪予財蠲賦已責移粟勸分郡國殿最視荒救為升黜一時吏治篤厚風俗趨本奏對者多言農田水利方守血食之神非順成不加封爵嵗雖小儉莫不疾呼於上𤼵粟往哺競以民庸自見故荒政靡嵗不聞然家給人足行都米斗五六十錢江淮荆襄粒米狼戾蜀麰斤至十飢錢民物阜樂庶幾小康夫豈一日之積哉趙雄嘗奏得南康守臣朱熹書言荒政之行民戴上恩凶年化為樂嵗上曰陳峴亦奏蜀雨暘時若民俗熈恬農事天下大本朕未嘗不念邇来士大夫方知以農事為重以虛浮為耻又曰朕不鬻爵以清入仕之源惟以賑飢推官乃為民也紹熈二年蘄州飢令郡賑粟萬石夔路五郡飢渝涪為甚令漕臣賑粟七萬石殍者尚數千人階成鳳西和州亡麥三年資榮州亡麥普叙簡隆州富順監皆大飢亡麥殍者甚衆流民聚成都府至千餘人威逺縣棄兒且六百人為糜以食飢民八萬餘人多不能活詔出緡粟賑之揚州亦飢令出粟十萬石以賑四年簡資普州飢綿州亡麥令漕臣均賑夏紹興府亡麥安豐軍大亡麥五年冬亡麥苗行都淮浙西東江東郡國皆飢常明州寧國鎮江府廬滁和州為甚人食草木詔出帑廪鬻僧牒益以漕計賑之或一郡至五萬緡石不給航廣粟以續之令憲漕常平使者所部勸分免賦通商禁遏糴收棄兒慶元元年春常州飢民之死徙者衆楚州飢人食糟粕淮浙流民多聚於行都上念郡國賑恤未至詔部使者守令謹行荒政收哺遺幼免臨安紹興慶元鎮江府常湖秀州江隂軍夏賦而賑之粟三年浙東郡國亡麥台州大亡麥民飢多殍襄蜀亦飢四年秋浙東西薦飢多道殣六年冬常州大飢仰哺者六十萬人潤揚楚通泰州建康府江隂軍亦乏食皆令守令賑之嘉泰元年浙西郡國薦飢常州鎮江嘉興府為甚皆令常平使者賑之二年四川飢廣安懐安軍潼川府大亡麥出川緡八十萬令帥臣賑之衡郴州武岡桂陽軍乏食三年春邵永州大飢死徙者衆民多剽盗令常平使者賑之粟夏行都囏食出豐儲倉米十萬石以賑四年春撫袁州隆興府臨江軍大飢殍死者不可勝瘞有舉家二十七人同赴溺者令郡發常平廪賑之部使者益以緡粟開禧二年紹興府衢婺州亡麥湖北京西淮東西郡國飢民聚為剽盗分命宣諭使賑恤南康大安軍忠涪州皆飢令部使者及守臣賑粟嘉定元年淮南大飢人食草木流徙江浙者百萬人先是開禧開邊淮郡殘於兵火農久失業米斗二千殍死者十三四炮人肉馬矢中以食詔所至郡國賑恤歸業時邦儲亦匱郡計不支去者多死亦有為濠豐餘金俘掠而北者是嵗行都亦飢米斗千錢詔𤼵廪廣糴賑糶勸分二年春兩淮荆襄建康府大飢米斗錢數千人食草木淮民刲道殣食盡𤼵瘞胔繼之人相搤噬流徙之聚於揚州者數千家渡江者聚建康殍死日八九十人詔發廪賑施皆十萬餘石令州郡置粥院為糜以活之是秋諸路復大歉常潤尤甚冬行都大飢殍者横市道多棄兒十二月甲戌令𤼵粟賑施盡其月三年春建康府大飢人相食五月衢州飢頗聚為剽盗守臣孫子直平之勸分以賑七年台州大亡麥八年淮浙江東西飢都昌縣飢民聚為盗者三十六黨自秋至於明年夏縣官出錢三百三十三萬緡粟四百八十五萬石以賑九年行都飢閭巷有殍令賑粟蠲逋十年台衢婺饒信州飢多聚為剽盗台為甚蜀石泉軍飢殍死殆萬人皆令郡賑之十一年秋淮浙江東飢饉無麥苖十二年春潼川府飢而不害十三年春福州飢人食草根令郡賑之十六年春海州新附山東民飢令海州賑之京東河北路新附山西民亦飢令楚州賑之粟皆萬石湖南永道州大飢令帥臣移粟以賑是嵗行都江淮閩浙郡國皆無麥禾十七年春餘杭錢塘仁和三縣飢令帥臣賑之鎮江府飢郡為糜以賑者日千餘人真鄂州亦乏食令通商勸分地震史紀周幽王二年周三川皆震應劭曰震地震三川竭也師古曰三川涇渭洛也洛即漆沮也川自震耳故將壅塞非地震也劉向以為金木水火沴土者也伯陽甫曰服䖍曰周太史周將亡矣天地之氣不過其序若過其序民亂之也陽伏而不能出隂迫而不能升應劭曰迫隂迫陽使不能升也於是有地震今三川實震是陽失其所而填隂也應劭曰失其所失其道也填隂為隂所填不得升也師古曰填音竹刃反陽失而在隂原必塞師古曰原謂水泉之本也原塞國必亡夫水土演而民用也應劭曰演引也所以引出土氣者也師古曰演音衍土無所演而民乏財用不亡何待昔伊雒竭而夏亡河竭而商亡今周徳如二代之季其原又塞塞必竭川竭山必崩夫國必依山川山崩川竭亡之徴也若國亡不過十年數之紀也是嵗三川竭岐山崩劉向以為陽失在隂者謂火氣来煎枯水故川竭也山川連體下竭上崩事埶然也時幽王暴虐妄誅伐不聼諫迷於褒姒廢其正后師古曰褒姒褒人所獻之女也正后申后也蓋白華之詩所為作也廢后之父申侯與犬戎共攻殺幽王一曰其在天文水為辰星辰星為蠻夷月食辰星國以女亡幽王之敗女亂其内夷攻其外京房易傳曰君臣相背厥異名水絶有名之水文公九年九月癸酉地震劉向以為先是齊桓晉文魯僖二伯賢君新沒周襄王失道楚穆王弑父諸侯皆不肖權傾於下天戒若曰臣下强盛者將動為害後宋魯晉莒鄭陳齊皆弑君諸震畧皆從董仲舒説也京房易傳曰臣事雖正專必震其震於水則波於木則揺於屋則瓦落大經在辟而易臣兹謂隂動服䖍曰經常也辟音刑辟之辟蘇林曰大經五行之常經也在辟衆隂犯殺其上也師古曰辟讀曰僻謂常法僻壤而易臣也厥震揺政宫大經揺政兹謂不隂厥震揺山山出涌水嗣子無徳專禄兹謂不順厥震動邱陵涌水出襄公十六年五月甲子地震劉向以為先是鷄澤之會諸侯盟大夫又盟是嵗三月諸侯為溴梁之會而大夫獨相與盟五月地震矣其後崔氏專齊欒盈亂晉良霄傾鄭閽殺吳子燕逐其君楚滅陳蔡昭公十九年五月己卯地震劉向以為是時季氏將有逐君之變其後宋三臣曹會皆以地叛蔡莒逐其君吳敗中國殺二君二十三年八月乙未地震劉向以為是時周景王崩劉單立王子猛尹氏立子朝其後季氏逐昭公黑肱叛邾吳殺其君僚宋五大夫晉二大夫皆以地叛哀公三年四月甲午地震劉向以為是時諸侯皆信邪臣莫能用仲尼盗殺齊侯齊陳乞弑君貞定王三年晉空桐震七日臺舍皆壊人多死秦始皇十五年地動十七年地動自樂徐以西至平隂臺屋墻垣大半壊漢惠帝二年正月地震隴西厭音一甲反四百餘家文帝五年二月地震景帝後元年五月地震武帝元光四年五月地震征和二年八月地震壓殺人後元元年秋七月地震宣帝本始四年四月壬寅地震河南以東四十九郡北海琅邪地震壊祖宗廟城郭殺六千餘人地節二年九月壬申地震元帝初元二年二月戊午地震隴西郡毁落太上皇廟殿壁木飾壊敗城郭宫寺民廬壓殺人衆永光三年冬地震成帝建始三年地震綏和二年九月丙辰地震自京師至北邊郡國三十餘壊城郭凡殺四百一十五人王莽天鳳三年二月乙酉地震後漢世祖建武二十二年九月郡國四十二地震南陽尤甚地裂壓殺人其後武谿蠻夷反為冦害至南郡發荆州諸郡兵遣武威將軍劉尚撃之為夷所圍復發兵赴之尚遂為所沒章帝建初元年三月甲申山陽東平地震和帝永元四年六月丙辰郡國十三地震春秋漢含孳曰女王盛臣制命則地動坼畔震起山崩淪時竇太后攝政兄竇憲專權將以是受禍也後五日詔收憲印綬兄弟就國逼迫皆自殺五年二月戊午隴西地震先儒說民安土者也將大動行大震九月匈奴單于於除難鞬叛遣使𤼵邊郡兵討之七年九月癸卯京都地震儒說閹官無陽施猶婦人也是時和帝與中常侍鄭衆謀奪竇氏權徳之因任用之及幸常侍蔡倫二人始並用權九年三月庚辰隴西地震閏月塞外羌犯塞殺畧吏民使征西將軍劉尚擊之安帝永初元年郡國十八地震李固曰地者隂也法當安静今乃越隂之職專陽之政故應以震動是時鄧太后攝政專事訖建光中太后崩安帝乃得制政於是隂類並勝西羌亂夏連十餘年二年郡國十二地震三年十二月辛酉郡國九地震四年三月癸巳郡國四地震五年正月丙戍郡國十地震七年正月壬寅二月丙午郡國十八地震元初元年郡國十五地震二年十一月庚申郡國十地震三年二月郡國十地震十一月癸卯郡國九地震四年郡國十三地震五年郡國十四地震六年二月乙巳京都郡國四十二地震或地坼裂涌水壊敗城郭民室屋壓人冬郡國八地震永寧元年郡國二十三地震建光元年九月己丑郡國三十五地震或地坼裂壊城郭室屋壓殺人是時安帝不能明察信宫人及阿母聖等䜛云破壊鄧太后家於是專聽信聖及宦者中常侍江京樊豐等皆得用權延光元年七月癸卯京都郡國十三地震三月戊申郡國二十七地震二年京都郡國三十二地震三年京都郡國二十三地震是時以讒免太尉楊震廢太子四年十月丁巳京都郡國十六地震時安帝既崩閻太后攝政弟兄閻顯等並用事遂斥安帝子更徴諸國王子未至中黄門遂誅顯兄弟順帝永建三年正月丙子京都漢陽地震漢陽屋壊殺人地坼涌水出是時順帝阿母宋娥及中常侍張昉等用權陽嘉二年四月己亥京都地震是時爵號宋娥為山陽君四年十二月甲寅京都地震永和二年四月庚申京都地震是時宋娥搆姦誣罔五月事覺收印綬歸田里十一月丁卯京都地震是時太尉王龔以中常侍張昉等專㺯國權欲奏誅之時龔宗親有以楊震行事諫之止云三年二月乙亥京都金城隴西地震裂城郭宫室多壊壓殺人閏月己酉京都地震十月西羌二千餘騎入金城塞為涼州害四年三月乙亥京都地震五年二月戊申京都地震建康元年正月涼州都郡六地震從去年九月以来至四月凡百八十日震山谷坼裂壊敗城寺傷害人物三月䕶羌校尉趙冲為叛羌所殺九月丙午京都地震是時順帝崩梁太后攝政欲為順帝作陵制度奢廣多壊吏民冢尚書欒巴諫事太后怒癸卯詔書收巴下獄欲殺之丙午地震於是太后乃出巴免為庶人桓帝建和元年四月庚寅京都地震九月丁卯京都地震是時梁太后攝政兄冀持權至和平元年太后崩然冀猶秉政專事至延熹二年乃誅滅三年九月己卯地震庚寅又震元嘉元年十一月辛巳京都地震二年正月丙辰京都地震十月乙亥京都地震永興二年二月癸卯京都地震永壽二年十二月京都地震延熹四年京都右扶風涼州地震五年五月乙亥京都地震是時桓帝與中常侍單超等謀誅除梁冀聽之並使用事專權又鄧后本小人性行無常茍有顔色立以為后後卒坐執左道廢以憂死八年九月丁未京都地震靈帝建寧四年二月癸卯地震是時中常侍曹節王甫等皆專權熹平二年六月地震六年十月辛丑地震光和元年二月辛未地震四月丙辰地震靈帝時宦者專恣二年三月京兆地震三年自秋至明年春酒泉表氏地八十餘動涌水出城中官寺民舍皆傾縣易處更築城郭獻帝初平二年六月丙戌地震興平元年六月丁丑地震後主炎興二年蜀地震時宦人黄皓專權按司馬彪說閹宦無陽施猶婦人也皓見任之應與漢和帝時同事也是冬蜀亡魏明帝青龍二年十一月京都地震從東来隠隠有聲揺屋瓦景初元年六月戊申京都地震是秋吳將朱然圍江夏荆州刺史胡質撃退之又公孫淵叛自立為燕王改元置百官明年討平之齊王正始二年十一月南安郡地震三年七月甲申南安郡地震十二月魏郡地震六年二月丁卯南安郡地震時曹爽專政遷太后於永寧宫后與帝泣别連年地震是其應也吳孫權黄武四年江東地連震時權受魏爵命為大將軍吳王而改元專制不修臣迹京房易傳曰臣事雖正專必震劉向云臣下强盛將動而為害之應也嘉禾六年五月江東地震赤烏二年正月地再震時吕壹專事歩隲上疏以為臣下專政之應赤烏十一年二月江東地仍震時權聽讒尋黜朱據廢太子晉武帝泰始五年四月辛酉地震是年冬新平氐羌叛明年孫皓遣大衆入渦音戈口七年六月景申地震咸寧二年八月庚辰河南河東平陽地震四年六月丁未隂平廣武地震甲子又震太康二年二月庚申淮南丹陽地震五年三月朔壬辰京師地震六年七月己丑地震七年七月南安犍其焉反為地震八月京兆地震八年五月壬子建安地震七月隂平地震八月丹陽地震九年正月會稽丹陽吳興地震四月辛酉長沙南海等郡國八地震七月至於八月地又四震其三有聲如雷九月臨賀地震十二月又震十年十二月己亥丹陽地震太熙元年正月地又震武帝世始於賈充終於楊駿阿黨昧利茍竊朝權至於末年所任轉弊故頻年地震過其序也終䘮天下惠帝元康元年十二月辛酉京師地震此夏賈后使楚王瑋殺汝南王亮及太保衛瓘此隂道盛陽道微故也四年二月上谷上庸遼東地震五月蜀郡山移淮南壽春洪水出山崩地䧟壊城府八月上谷地震水出殺百餘人十月京都地震十一月滎陽襄城汝隂梁國南陽地皆震十二月京都又震是時賈后亂朝終至禍敗之應也漢鄧太后攝政時郡國地震李固以為地隂也法當安静今乃越隂之職專陽之政故應以震此同事也京房易傳曰小人剥廬厥妖山崩兹謂隂乗陽弱勝强又曰隂背陽則地裂父子分離夷羌叛去元康五年五月丁丑地震六月金城地震六年正月丁丑地震八年正月庚辰地震太安元年十二月地震時齊王冏專政之應也二年十二月庚辰地震是時長沙王乂專政之應也孝懐帝永嘉三年十月荆襄二州地震時司馬越專政四年四月兖州地震五月石勒冦汲郡執太守胡寵遂南濟沔是其應也愍帝建興二年四月甲辰地震三年六月丁卯長安又震時主㓜權傾於下四方雲擾兵亂不息之應也元帝太興元年四月西平地震湧出水十二月廬陵豫章武昌西陵地震湧水出山崩干寶以為王敦陵上之應也二年五月己丑祁山地震山崩殺人是時相國南陽王保在祁山稱晉王不終之象也三年四月庚寅丹陽吳郡晉陵又地震成帝咸和二年二月江陵地震三月益州地震四月己未豫州地震是年蘇峻作亂九年三月丁酉會稽地震穆帝永和元年六月癸亥地震是時嗣主幼冲母后稱制政在臣下所以連年地震二年十二月地震三年正月庚辰地震九月又地震四年十月己未地震五年正月庚寅地震是時石季龍僭即皇帝位亦􅂈其序也九年八月丁酉京都地震有聲如雷十年正月丁卯地震聲如雷鷄雉皆鳴呴呼后反十一年四月乙酉地震五月丁未地震升平二年十一月辛酉地震五年八月涼州地震哀帝隆和元年四月甲戌地震是時政在將相人主南靣而已興寧元年四月甲戍揚州地震湖瀆溢二年三月庚寅江陵地震是時桓温專政海西公太和元年二月凉州地震水涌是海西將廢之應也簡文帝咸安二年十月辛未安成地震是年帝崩孝武帝寕康元年十月辛未地震二年二月丁巳地震七月甲午凉州地又震山崩是時嗣主㓜冲權在將相隂盛之應也太元二年閏三月壬午地震五月丁丑地震十一年六月己卯地震是後縁河諸將連嵗兵役人勞之應也十五年三月己酉朔夜地震八月京都地震十二月己未地震十七年六月癸卯地震十二月己未地又震是時羣小㺯權天下側目十八年正月癸亥朔地震二月乙未夜地震安帝隆安四年四月乙未地震九月癸丑地震是時㓜主冲昧政在臣下義熙四年正月壬子夜地震有聲十月癸亥地震五年正月戊戌夜潯陽地震有聲如雷明年盧循下八年自正月至四月南康廬陵地四震明年王旅西討荆益十年三月戊寅地震宋武帝永初元年秋七月己巳地震文帝元嘉十二年夏四月都下地震十五年七月辛未地震孝武大明二年四月辛丑地震六年七月甲申地震有聲如雷兖州尤甚魯郡山揺者二後廢帝元徽五年五月地震齊東昏侯永元元年七月地震至来嵗晝夜不止小屋多壊梁武帝天監五年十二月京師地震京房易飛候曰地動以下十一月者其邑饑亡時交州刺史李凱反明年霜嵗儉人飢普通三年正月建康地震時義州刺史文僧朗以州叛六年十二月地震京房易飛候曰地冬動有音以十二月者其邑有行兵是時帝令豫章王綜將兵北伐中大通五年正月建康地震京房易飛候曰地以春動嵗不昌是歲大水百姓飢饉大同三年十一月建康地震京房易飛候曰地震以十一月邑有大䘮及饑亡明年霜為災百姓饑五年十月建康地震是嵗㑹稽山賊起七年二月建康地震是嵗交州人李賁舉兵逐刺史蕭諮九年閏正月地震李賁自稱皇帝署置百官太清三年四月建康地再震時侯景自為大丞相録尚書事帝所需不給是月以憂憤崩陳永定二年五月建康地震時王琳立蕭荘於郢州太建四年十一月地震陳寳應反閩中禎眀元年正月地震施文慶沈客卿專恣之應也後齊河清二年并州地震和士開專恣之應後周建德二年凉州地頻震城郭多壊時羗夷叛隋文帝開皇十四年五月京師地震京房易飛候曰地動以夏五月人流亡是嵗闗中饑百姓就糧於闗東二十年十一月戊子立晉王廣為皇太子是日天下地震仁夀二年四月岐雍地震易飛候曰震以四月五榖不熟人大饑唐武徳二年十月乙未京師地震隂盛而反常則地震故其占為臣强為后妃專恣為夷犯華為小人道長為冦至為叛臣七年七月巂州地震山摧壅江水噎流貞觀七年十月乙丑京師地震十二年正月壬寅松叢二州地震壊廬舍二十年九月辛亥靈州地震有聲如雷二十三年八月癸酉朔河東地震晉州尤甚壓殺五十餘人乙亥又震十一月乙丑又震永徽元年四月己巳朔晉州地震己夘又震六月庚辰又震有聲如雷二年十月又震十一月戊寅定襄地震帝始封晉王初即位而地屢震天下将由帝而動揺象也儀鳳二年三月庚辰京師地震永淳元年十月甲子京師地震垂拱三年十月乙亥京師地震四年七月戊午又震八月戊戌神都地震延載元年四月壬戌常州地震大足元年七月乙亥揚楚常潤蘇五州地震二年八月辛亥劍南六州地震景龍四年五月丁丑剡縣地震景雲三年正月甲戌并汾絳三州地震壊廬舎壓死百餘人開元二十二年二月壬寅秦州地震西北隠隠有聲坼而復合經時不止壊廬舍殆盡壓死四千餘人二十六年三月癸巳京師地震至徳元載十一月辛亥朔河西地震裂有聲陷廬舎張掖酒泉尤甚至二載三月癸亥乃止大歴二年十一月壬申京師地震自東北来有聲如雷者三三年五月丙戌又震十二年恒定二州地大震三日乃止束鹿寧晋地裂數丈沙石隨水流出平地壊廬舍壓死數百人建中元年四月己亥京師地震三年六月甲子又震四年四月甲子又震五月辛巳又震貞元二年五月己酉又震三年十一月丁丑夜京師東都蒲陕地震四年正月庚戌朔夜京師地震辛亥壬子丁夘戊辰庚午癸酉甲戌乙亥皆震金房二州尤甚江溢山裂屋宇多壊人皆露處二月壬午京師又震甲申乙酉丙申三月甲寅巳未庚午辛未五月丙寅丁夘皆震八年甲午又震有聲如雷甲辰又震九年四月辛酉又震有聲如雷河中闗輔尤甚壊城壁廬舎地裂水涌十年四月戊申京師地震癸丑又震侍中渾瑊第有樹湧出樹枝皆載蚯蚓十三年七月乙未又震元和七年八月京師地震草樹皆揺九年三月丙辰巂州地震晝夜八十壓死百餘人地陷者三十里十年十月京師地震十一年二月丁丑又震十五年正月穆宗即位戊辰始朝羣臣於宣政殿是夜地震太和二年正月壬申地震七年六月甲戌又震九年三月乙夘京師地震屋瓦皆墜户牖間有聲開成元年二月乙亥又震二年十一月乙丑夜又震四年十一月甲戌又震㑹昌二年正月癸亥宋亳二州地震十二月癸未京師地震大中三年十月辛巳上都及振武河西天徳靈武塩夏等州地震壊廬舎壓死數十人十二年八月丁巳太原地震咸通元年五月上都地震六年十二月晉絳二州地震壊廬舎地裂泉湧泥出青色八年正月丁未河中晉絳三州地大震壊廬舎人有死者十三年四月庚子朔浙東西地震乾符三年六月乙丑雄州地震至七月辛巳止州城廬舍盡壊地陷水涌傷死甚衆是月濮州地震十二月京師地震有聲四年六月庚寅雄州地震六年二月京師地震有聲如雷藍田山裂水涌中和三年秋晉州地震有聲如雷光啟二年春成都地震月中十數占曰兵饑十二月魏州地震乾寧二年三月庚午河東地震宋乾德三年京師地震至道二年十月潼關西靈夏環慶等州地震城郭廬舍多壊占云兵饑是時西戎冦靈州明年遣將率兵援糧以救之關西民有饑殍者咸平二年九月常州地震壊鼓角樓羅務軍民廬舎甚衆四年九月慶州地震者再六年正月益州地震景德元年正月丙申夜京師地震癸卯夜復震丁未夜又震屋宇皆動有聲移時方止癸丑冀州地震占主土工興有急令兵革興是年契丹犯塞二月益黎雅州地震三月邢州地震不止四月己卯夜瀛州地震五月邢州地復震不止十一月壬子日南至京師地震癸丑石州地震四年七月丙戌益州地震己丑渭州瓦亭寨地震者四大中祥符二年三月代州地震四年六月昌眉州並地震七月真定府震壊城壘天聖五年三月戊辰秦州地震七年十月丙午京師地震景祐四年十二月甲申忻代并三州地震壊廬舍覆壓吏民忻州死者萬九千七百四十二人傷者五千六百五十五人畜死者五萬餘代州死者七百五十九人并州千八百九十人寶元元年正月庚申并忻代州地震十一月忻州地震十二月甲子京師地震慶歴三年五月乙亥忻州地大震說者曰地道貴静今數震揺兵興民勞之象也五月庚午忻州地震西北有聲如雷五年七月丁酉廣州地震己卯京南岳州並地震六年二月戊寅青州地震三月庚寅登州地震岠嵎山摧自是震不已每震即海底有聲如雷五月甲申京師地震七年十月乙丑河陽許州地震二年十一月丁酉夜秀州地震有聲自西北起如雷嘉祐二年雄霸等州地震五年五月己丑京師地震治平四年秋漳泉建州邵武興化軍等處皆地震潮州尤甚地裂泉涌壓覆州郭及兩縣屋宇士民軍兵死者甚衆八月己巳京師地震熙寧元年七月甲申地震乙酉辛夘再震八月壬寅甲辰又震是月鄆州須城東阿二縣地震終日滄州清池莫州亦震壊官私廬舎城壁是時河北復大震或數刻不止有聲如雷樓櫓民居多摧覆壓死者甚衆九月戊子莫州地震有聲如雷十一月乙未京師及莫州地震十二月癸卯瀛州地大震丁巳冀州地震辛酉滄州地震涌出沙泥船板胡桃螺蚌甲之屬十二月潮州地再震是嵗數路地震有一日十數震有踰半年震不止者元豐八年五月京師地震元祐二年二月辛亥代州地震有聲四年春陜西河北震七年九月己酉蘭州鎮戎軍永興軍地震十月庚戌朔環州地再震紹聖元年十一月丙寅太原府地震二年十月十一月河南府地震是歲蘇州自夏迄秋地震三年三月戊戌夜劒南東川地震九月己酉滁州沂州地震四年六月己酉太原府地震有聲元符元年七月壬申夜雲霒蔽天地震良乆三年正月壬申恩州地震八月甲戌太原府地震三年五月己巳太原府又震建中靖國元年十二月辛亥太原府潞晉隰代石嵐等州岢嵐威勝保化寧化軍地震彌旬晝夜不止壊城壁屋宇人畜多死宣和四年北方用兵雄州地震六年正月京師連日再地震宫殿門皆動有聲建炎二年正月戊戌長安地大震金人将婁宿圍城彌旬無外援金兵乘地震而入城遂陷紹興三年八月甲申地震平江府湖州尤甚甲辰詔罪已求直言是歲逆豫陷鄧隨等州金人犯蜀六年六月乙巳夜地震有聲自西北如雷餘杭縣為甚詔罪已求直言是冬偽齊劉麟猊犯順冦濠夀州後四年虜酋兀术入冦二十四年正月戊寅地震二十五年三月壬申又震二十八年八月甲寅地夜震三十一年三月壬辰又震三十二年七月戊申又震􅂭興元年十月丁丑地震六月甲寅又震是嵗宰臣湯思退擅撤海泗唐鄧之戍敵乘邉虚入冦後思退貶死此臣專必震又兵役人勞之應也乾道二年九月丙午地震自西北方是月台州有海冦四年十二月壬子石泉軍地震三日有聲如雷屋瓦皆落時郡有綿州寃獄云淳熙元年十二月戊辰地震自東北方後湖南江西茶冦擾數路九年十二月壬寅地夜震十年十二月丙寅又震十二年五月庚寅又震慶元六年十一月甲子地震東北方嘉定六年四月行都地震六月丙子嚴州淳安縣地震十年二月庚申地震自東南越月敵犯光州十四年正月乙未地夜震大雷是春金人入冦蘄黄州失守文獻通考卷三百一
