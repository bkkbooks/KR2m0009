body:
  text: 文獻通考卷三百十九鄱陽馬端臨貴與著輿地考五古荆州禹貢曰荆及衡陽惟荆州北據荆山山在今襄陽郡南漳縣南及衡山之陽也衡山在今衡陽郡湘潭縣江漢朝宗于海江漢二水歸入於海九江孔殷孔甚也殷中也言江於此州界分為九道甚得地勢之中今潯陽郡西北沱灊既道雲土夢作乂沱灊二水名自江出為沱自漢出為灊雲夢澤名也今在安陸郡言二水既從其道則雲夢之土可為耕作􅅵畆之治浮于江沱潛漢逾于洛至于南河逾越也言渡四水而越洛乃至南河也南河即在冀州南舜置十二牧荆州其一周禮職方曰正南曰荆州爾雅曰漢南曰荆州其山曰衡藪曰雲夢川曰江漢浸曰潁湛衡山在湘南雲夢在華容潁水出陽城乾山宜屬荆河州在此非也湛未詳其利丹銀齒革民一男二女畜及榖宜與揚州同荆强也言其氣躁强亦言荆驚也或取名於荆山焉蓋蠻夷之國槃瓠之種昔髙辛氏有畜犬曰槃瓠帝妻以少女其子孫滋蔓號曰蠻夷今長沙武陵蠻是也詩人所謂蠻荆也夏商以來最為邊患周宣王中興乃命方叔南伐蠻方故詩曰蠻方來威又曰蠢爾蠻荆大邦為讐春秋至戰國時並為楚地其在天文翼軫則楚之分野漢之南郡江夏零陵桂陽武陵長沙皆其分也今夷陵巴東江陵竟陵富水義陽之東境安陸齊安漢陽江夏巴陵長沙衡陽零陵江華桂陽連山邵陽武陵澧陽黔中寧夷盧溪盧陽靈溪潭陽清江等郡地是也兼得韓秦之交漢之南陽之地今宜陽之西要宜屬韓漢䍧牱之地今播川義泉涪川夜郎溱溪宜屬秦秦平天下置郡此為南郡今江陵夷陵巴東竟陵富水安陸齊安漢陽江夏清江等郡地是也黔中今武陵澧陽黔中寧陵盧溪盧陽靈溪潭陽等郡地皆是也漢改秦黔中郡為武陵郡即今武陵郡是長沙今長沙巴陵衡陽零陵江華桂陽連山邵陽等郡是南陽之東境今義陽漢東等郡是漢武置十三州此為荆州領郡國八其五溪中地歸漢以後厯代開拓今播川涪川夜郎義泉龍溪溱溪等郡地後漢並因之初理武陵郡漢夀縣今武陵郡武陵縣也後理南郡今江陵郡是漢末曹公赤壁敗後遂與呉蜀三分其地北境屬魏西境屬蜀東境屬呉及劉備歿後所分之地悉復屬吳而荆州南北䨇立魏荆州理宛今南陽郡呉荆州理江陵今郡也晉亦置荆州領郡十九初理襄陽平呉理南郡今江陵郡王敦為刺史理武昌今江夏郡縣也其後遷徙無常處自王抗以後復理江陵不復移改宋分置荆州領郡十二理南郡司州領郡四理義陽今郡郢州領郡六理南郡雍州領郡十理襄陽今郡地刺史所理則在古荆河州境其統領郡縣則古荆州之境湘州領郡十理長沙今郡齊並因之州境之内含帶蠻蜑音但土地遼落稱為殷曠江左大鎮莫過荆揚故謂荆州為陜西也以比周召分陜之義其後割裂不可詳也唐分置十五部此為山南東道江陵竟陵富水夷陵巴東武陵澧陽等郡地是也江南西道長沙零陵桂陽江夏江華衡陽巴陵邵陽是也黔中道黔中盧溪盧陽寧夷清江潭陽龍溪義泉靈溪涪川溱溪播川夜郎兼分入淮南道安陸義陽及嶺南道連山宋乾徳元年平荆湖湖南北三年平蜀䕫路始盡得古荆州之地後為荆湖北路荆湖南路及䕫路之施黔思播等州云古荆州厯代沿革之圖春秋時可考者十三國楚䕫䢵黄鄖申麇羅巴榖州權鄀秦時為郡三南郡長沙郡黔中郡南陽南境是漢時為郡國六縣七十九南郡十八縣江陵邔臨沮當陽夷陵中廬華容枝江宜城襄陽郢編秭歸夷道州陵鄀巫髙成江夏郡十四縣西陵安竟陵沙西陽蘄襄鄂陸羡春邾鄳􅋴杜雲下雉鍾武長沙國十三縣臨湘酃羅陽連道南益陽陵下雋陵攸承湘昭茶容陵安成武陵郡十三縣索陽孱陵遷陵臨沅辰陽沅陵酉陽鐔成義陵舞佷山零陽充桂陽郡十一縣郴陽臨武曲便山江南平含洭耒陽湞陽桂陽隂山零陵郡十縣零陵泠營道泉始安洮夫夷鍾營浦梁道陵陽武都牂牁郡東北境是縣見梁州晉時為郡國十五縣一百一十三南郡十一縣江陵旌陽編陵當陽利華容滋鄀石枝江州監松首襄陽郡八縣宜城城中廬鄧鄾臨沮邔襄陽山都宜都郡三縣夷陵夷道佷山江夏郡七縣安陸新雲杜南市曲陵平春鄳竟陵武昌郡七縣武昌陵柴桑官陽新沙羡沙陽鄂長沙郡十縣臨湘昌攸羅下雋圻醴陵陵瀏陽呉蒲巴建寧衡陽郡九縣湘鄉連重安新湘南益湘西山道康陽烝陽衡零陵郡十一縣泉陵永昌祁陽觀陽零陵營道營浦舂陽洮陽泠道應陽武陵郡十縣臨沅鐔龍陽沅漢夀遷沅陵舞黔陽陽城南陵陽酉湘東郡七縣酃新茶陵寧臨蒸利陽隂山新平桂陽郡六縣郴耒陽便臨武晉寧南平邵陵郡六縣邵陵平都梁夫夷秭歸卲陽髙建平郡八縣巫秭北井沙秦昌歸渠信陵興山建始天門郡五縣零陽漊中兗臨澧澧陽安豐郡五縣安風雩婁安豐蓼松滋隋時為郡二十縣一百有八南郡十縣江陵林長楊安宜昌興枝江陵當陽長公安紫松滋夷陵郡三縣夷陵夷道逺安襄陽郡十一縣襄陽漢南安養隂城榖城義清上洪南漳率道常平鄀竟陵郡八縣長夀豐藍水章川鄉鄉山漢東清騰樂沔陽郡五縣沔陽監利竟陵甑山漢陽安陸郡八縣安陸富孝昌應吉陽山水山應陽雲夢京永安郡四縣黄岡黄陵木蘭麻城江夏郡四縣江夏武昌永興蒲圻義陽郡五縣義陽鍾山羅山禮山淮源長沙郡四縣長沙衡山益陽邵陽衡山郡四縣衡山洡隂湘潭新寧巴陵郡五縣巴陵華容沅江湘隂羅零陵郡五縣零陵湘源永陽營道馮乘熙平郡九縣桂陽武陽山桂連山開宣樂平化嶺建游安熙武陵郡二縣武陵龍陽澧陽郡六縣澧陽利石門孱陵安鄉崇義慈桂陽郡三縣林臨武盧陽沅陵郡五縣沅陵大鄉鹽泉龍標辰溪黔安郡二縣彭水涪川清江郡五縣鹽水巴山清江開夷建始唐時為州三十四縣一百三十七荆州七縣峽州四縣歸州三縣復州三縣郢州三縣襄州七縣安州六縣黄州三縣沔州二縣鄂州五縣申州三縣潭州六縣岳州五縣衡州六縣永州四縣道州四縣郴州八縣連州三縣邵州二縣朗州二縣澧州四縣辰州五縣沅州三縣黔州六縣思州四縣施州二縣珍州四縣播州三縣夷州五縣溱州二縣錦州五縣溪州二縣費州四縣業州二縣宋時為州三十四縣一百二十八江陵府八縣荆門軍二縣峽州四縣歸州三縣復州二縣郢州二縣徳安府五縣黄州三縣漢陽軍二縣鄂州七縣興國軍三縣信陽軍二縣潭州十二縣岳州五縣衡州五縣永州三縣全州二縣道州四縣郴州四縣桂陽軍三縣連州三縣邵州三縣武岡軍三縣鼎州四縣澧州四縣辰州四縣沅州四縣靖州三縣黔州二縣思州三縣施州二縣珍州二縣播州三縣江陵府春秋以來楚國之都謂之郢都西通巫巴東接雲夢亦一都㑹也秦置南郡漢髙帝改為臨江郡景帝改為臨江國後復故後漢因之其地居洛陽正南章帝徙鉅鹿王恭為江陵王三公上言江陵在京師正南不可以封乃徙為安陸王蜀先主得之以麋芳為南郡太守後屬呉麋芳以郡來降闗羽因此遂敗常為重鎮呉師來伐當陽侯杜元凱向江陵斬其督任延晉平呉置南郡及荆州領郡十九理於此東晉以為重鎮桓冲理上明使劉波守江陵宋齊並因之宋領郡十二齊領郡十梁元帝都之為西魏所陷大將于謹平之遷後梁居之為藩國又置江陵總管府隋并梁置江陵總管府如故後改為荆州煬帝初復為南郡唐為荆州或為江陵郡後改為江陵府荆南節度屬山南道領縣七江陵當枝江公松滋長石首陽安林梁以復州監利來屬宋乾徳三年陞白秋廵為潜江縣白臼廵為建寧縣萬庾廵為萬庾縣白沙院為玉沙縣萬庾尋廢開寳五年以長林當陽二縣屬荆門軍至道三年以玉沙𨽻復州屬荆湖北路領本路兵馬鈐轄中興後本路安撫制置置司貢綾紵碧澗茶芽柑橘領縣八治江陵江陵故楚郢都漢縣有息壤紀南城梅四洲渚宫枝江故羅國地唐縣有九十九洲公安隋縣有吕䝉城油水涔港松滋晉縣冇蜀江巴山監利隋縣冇乾溪石首唐縣有石首山大江建寧宋縣有鹿角山潜江宋縣有曹河荆門軍宋開寳五年以江陵府荆門鎮建為軍以長林當陽二縣來屬後廢仍𨽻江陵元祐間復置軍屬荆湖北路領縣二治長林長林隋縣有紫蓋山當陽漢縣有沮水峽州春秋戰國時並楚地秦將白起攻楚燒夷陵即其地也秦二漢並為南郡地魏武平荆州置臨江郡後蜀先主改為宜都郡呉改夷陵為西陵常為重鎮陸遜疏夷陵要害國之關限若其失之非損一郡荆州可憂晉宋齊並為宜都郡梁改置宜州西魏改曰拓州後周改為峽州陳嘗得之為重鎮隋開皇中伐陳陳人守荆門狼尾灘並宜都縣界安蜀城夷陵縣界也唐為峽州或為夷陵郡郡城即陸抗攻歩闡拒晉師之壘以扼三峽之口故為峽州西通蜀江屬山南道領縣四夷陵長楊宜都逺安宋為峽州屬荆湖北路貢五加皮芒硝杜若領縣四治夷陵夷陵晉縣有虎牙山黄牛山三遊洞長楊隋縣有佷山長山溪渚汕宜都唐縣有荆門山羊腸山狼尾灘逺安後周縣有宜陽山清溪歸州厯代土地與雲安郡同䕫州唯秦時屬南郡二漢為南郡呉置建平郡以為重鎮其地險固孫皓末晉將王濬自蜀沿流伐呉呉之守將吾彦表謂皓曰請建平増兵若建平不下晉師終不敢過皓不從即秭歸縣界也晉亦為建平郡宋齊皆因之隋屬巴東郡唐武徳二年分䕫州秭歸巴東二縣置歸州或云因歸國為名後為巴東郡古䕫子國城在郡東二十里屬山南道領縣三宋同宋屬荆湖北路貢紵領縣三治秭歸秭歸隋縣有䕫子城大江興山唐縣有玉虚洞巴東隋縣有石門山大江復州春秋以來為楚地秦屬南郡江夏二郡地晉置竟陵郡宋齊因之後周以其地置郢復二州隋煬帝初州廢於舊郢州置竟陵郡今富水郡地於舊復州置沔陽郡唐改為復州或為竟陵郡屬山南道領縣三監利竟沔陽陵梁以監利入江陵府晉為防禦宋至道三年以江陵府玉沙來屬屬荆湖北路寳元二年廢沔陽入玉沙領縣二治景陵景陵晉縣有漢水雲夢城玉沙宋縣有沔陽水夏水郢州厯代所屬與竟陵郡同二漢屬江夏郡晉宋齊為竟陵郡地梁南司北新二州之境西魏分屬安州後周分置石城郡後於石城郡置郢州隋煬帝初州廢置竟陵安陵二郡唐併二郡為温州或為郢州或為富川郡屬山南道領縣三長夀富京山水周廢富水入京山宋為防禦屬京西南路貢白紵領縣二治長夀長夀晉縣有漢水京山隋縣有漳河富河徳安府春秋䢵子之國䢵或作鄖雲夢之澤在焉後楚滅䢵封鬭辛為鄖公即其地也秦屬南郡二漢屬江夏郡晉初亦屬江夏郡後分置安陸郡宋齊因之梁置南司州西魏置安州總管府後周置溳州及安陸郡隋初廢煬帝初復為安陸郡唐為安州或為安陸郡郡城臨溳水屬淮南道領縣六安陸應城吉陽雲夢應山孝昌後唐安逺軍節度周以郢州汶川來屬宋建隆元年復為建安軍開寳中廢吉陽太平興國二年以漢川屬漢陽軍宣和元年陞為徳安府屬荆湖北路貢青紵領縣五治安陸安陸漢縣有陪尾山溳水雲夢澤孝感後唐縣有環水雲夢西魏縣應城唐縣有波河應山隋縣有廖水黄州春秋時邾國之地今郡東南百二十里臨江與武昌相對有邾城史記曰皇帝之末孫有陸終者産六子第五别為曹姓厯代不絶至武王伐紂之後封其裔子挾於邾為諸侯即此也後為黄國之境戰國時屬楚秦為南郡二漢為江夏郡魏亦為重鎮魏文帝黄初中呉揚聲欲獵江北豫州刺史滿寵度必襲西陽為之備孫權聞之乃退呉後得邾城孫權赤烏中使陸遜攻邾常以三萬兵守之晉為西陽國宋為西陽郡齊又分置齊安郡北齊置衡州領齊安一郡陳廢衡州後周又置衡州及黄州隋初改衡州為黄州煬帝初州廢置永安郡唐為黄州或為齊安郡屬淮南道領縣三宋同宋屬淮西路貢紵布連翹領縣三治黄岡黄岡隋縣有大江黄陂後周縣有武湖松湖麻城隋縣有永泰河漢陽軍春秋鄖國之地戰國時屬楚秦屬南郡二漢江夏郡魏初為重鎮曹公定荆州後以文聘為江夏太守守􅃆口上石梵呉軍來攻不克後屬呉亦為重鎮孫權嘉禾中陸遜屯江夏􅃆口晉宋以來並屬江夏郡後周置復州隋煬帝初改為􅃆州尋改為沔陽郡則通有今竟陵郡之地唐武徳中討平朱粲析為沔州或為漢陽郡屬淮南道領縣二宋同後廢州以漢陽𨽻鄂州􅆜川𨽻安州周平淮南得其地建為軍宋因之屬湖北道領縣二治漢陽漢陽隋縣有赤壁沔水灄水漢川唐汊川縣宋時改鄂州自春秋以來皆屬楚有江漢二水在州西合秦屬南郡漢髙祖置江夏郡應劭曰沔水自江别至南郡華容為夏水入江故曰江夏後漢因之荆州牧劉表將黄祖守在此按呉志孫䇿表曰臣到沙羡縣祖屯處破之呉分江夏孫權初城江夏更置武昌郡孫權嘗都之孫皓又徙都之常為重鎮孫權甘露初城武昌陸遜諸葛恪滕牧皆屯焉及晉伐呉使王戎襲武昌胡奮襲江夏厯代亦為兵衝其地亦曰夏口東晉孝武時桓石民屯守亦曰魯口以對魯山岸為名也晉宋並為江夏武昌二郡宋兼置郢州領郡六理於此齊因之亦為重鎮劉懐珍言於髙帝曰夏口兵衝要地宜得其人遂令栁崇鎮兵其後梁武帝自襄陽起兵東下攻圍凡百餘日方降梁末北齊得之遣慕容儼守陳覇先將侯瑱攻圍六月餘不下後三國和通乃歸梁侯瑱他典反梁分置北新州尋分北新置土富徊泉濠五州隋平陳改置鄂州煬帝初州廢置江夏郡唐武徳中平蕭銑改為鄂州或為江夏郡大都督武昌軍節度屬江南道領縣七江夏漢陽永興武昌唐年蒲圻㲼川唐末屬湖南馬氏後入南唐置嘉魚永安通山三縣周以漢陽􅆜川屬漢陽宋乾徳五年置大冶縣太平興國三年以永興通山大冶三縣屬興國軍仍為武昌節度屬湖北路熙寧五年陞崇陽縣通城鎮為縣嘉定十五年以武昌縣陞為夀昌軍貢銀領縣七治江夏江夏晉縣有黄鶴山鸚鵡洲鄂渚武昌呉縣有樊山西塞山崢嶸洲蒲圻呉縣有赤壁嘉魚南唐縣有蒲圻湖崇陽唐唐年縣宋改有壺頭山咸寧南唐永安縣宋改有牛鼻潭通城宋縣有太平港興國軍宋太平興國二年以鄂州永興通山大冶三縣置軍屬江西路貢紵領縣三治永興永興隋縣有闔閭山大江大冶南唐縣通山南唐縣有九宫山信陽軍春秋時申國之地或曰申國在今南陽郡南陽縣其後屬楚秦屬南陽郡二漢為南陽江夏二郡魏分南陽置義陽郡晉宋並因之宋又置司州領縣四治於此齊並因之有三關之隘今義陽縣界有故平靖關其武陽黄峴二關在安陸郡應山縣界也北接陳汝控帶許洛宋齊以來常為邊鎮梁曰北司州後復置司州梁天監二年為魏將元英所陷後魏改為郢州後周改為申州隋煬帝改為義州尋為義陽郡唐為申州或為義陽郡屬淮南道領縣三義陽鍾羅山山宋開寳九年降為義陽軍廢羅山二縣太平興國元年改為信陽軍雍熙二年復置羅山屬京西北路貢紵布領縣二治信陽信陽魏義陽縣有溮水桐栢山淮水羅山隋縣潭州古三苖國之地自春秋以來為黔中地楚國之南境秦為長沙郡冇萬里沙祠故曰長沙漢為長沙國初封番君呉芮為長沙王都於此及景帝封子發又為長沙王後漢復為長沙郡晉因之宋長沙國兼置湘州領郡十治於此齊因之又為長沙郡湘川之奥人豐土闢南通嶺嶠唇齒荆雍亦為重鎮梁陳以來皆因而不改隋平陳置潭州取昭潭為名煬帝初州廢置長沙郡唐為潭州或為長沙郡屬江南道領縣六長沙益陽湘潭醴陵湘鄉瀏陽唐末馬氏據其地建為武安軍節度梁以衡州攸縣來屬宋乾徳元年平湖南降為防禦太平興國二年析長沙六鄉置寧鄉縣端拱元年復武安節度淳化四年以衡州衡山岳州湘隂並來屬熙寧六年置安化縣元符元年以長沙縣五鄉湘潭縣兩鄉為善化縣屬荆湖南路貢葛茶領縣十二治長沙善化長沙隋縣有岳麓山湘水溈水橘洲湘潭唐縣有碧泉益陽漢縣有五溪山益水湘隂唐縣有漣水汨水醴陵唐縣有王喬山瀏陽唐縣有因水攸唐縣有雲陽山攸水衡山晉縣有衡山武陽山安化有浮青山資江湘鄉唐縣有漙水寧鄉有大溈山溈水善化岳州古蒼梧之野蒼梧野不止於此郡界側近之地皆是亦三苖國之地亦古麇子國春秋文公十年楚子伐麇即此地也凡今長沙衡陽諸郡皆古三苖之地青草洞庭湖在焉二湖相連青草在南洞庭在北春秋戰國時並屬楚亦古羅國之地楚辭之言汨羅是也羅縣北有汨水汨音覔秦屬長沙郡二漢皆因之呉因之為重鎮建安中孫權使魯肅孫皓時滕牧萬彧皆屯於此晉因之東晉亦為重鎮使陶侃鎮守此宋分置巴陵郡齊因之梁置巴州湘東王遣陸法和等據赤亭擒侯景將任約於此今郡西華容界有赤亭城是也城近赤亭湖因以為名隋平陳改為鄂州煬帝初改為羅州尋為巴陵郡郡人董景珍等以羅縣令蕭銑為主起兵於此唐武徳四年平蕭銑復為岳州或為巴陵郡屬江南道領縣五巴陵湘華容昌沅江隂江宋乾徳元年以湘隂𨽻潭州淳化五年陞王朝場為縣屬荆湖北路貢紵領縣五治巴陵巴陵呉縣有湘水君山洞庭湖華容唐縣有赤沙湖沅江隋縣有楓山沅水平江唐昌江縣後唐改有昌江山汨水臨湘即王朝縣有城陵山大江衡州春秋以來屬楚秦屬長沙郡漢屬長沙國桂陽郡地後漢屬長沙桂陽二郡地呉以其地置衡陽湘東二郡晉因之宋為衡陽國及湘東郡齊以下皆因之齊嘗改衡陽國為郡隋平陳省湘東衡陽二郡置衡州煬帝初州廢置衡山郡唐為衡州或為衡陽郡屬江南道領縣六衡陽湘潭常陵耒陽茶陵攸梁以攸縣屬潭州宋乾徳三年陞安仁場為縣淳化四年以衡山𨽻潭州屬荆湖南路貢麩金犀領縣五治衡陽衡陽唐縣冇岣嶁山茶溪蒸水酃水茶陵唐縣有雲陽山炎帝陵耒陽唐縣有耒水厯水杜甫墓常寧唐縣有春水宜溪安仁有小江水永州春秋楚國之南境秦屬長沙郡漢武置零陵郡後漢及晉皆因之宋為零陵國齊為零陵郡梁陳皆然隋平陳廢置永州煬帝初州廢置零陵郡唐為永州或為零陵郡屬江南道領縣四零陵湘源祁陽灌陽晉以湘源灌陽二縣屬全州宋雍熙元年陞東安場為縣屬荆湖南路貢葛石燕領縣三治零陵零陵隋縣有瀟水祁陽唐縣有浯溪東安有大陽小江全州晉天福中馬希範奏以永州湘源縣置州以灌陽來屬宋因之屬荆湖南路貢葛零陵香領縣二治清湘清湘隋湘源縣晉改有湘山乳穴灌陽隋縣有灌水道州舜封象有鼻國即此也春秋時楚地秦屬長沙國漢初屬長沙國後屬零陵郡後漢魏晉皆因之宋齊為營陽郡梁改營陽為永陽郡隋平陳郡廢悉併其地置永州煬帝初州廢屬零陵郡唐平蕭銑割其地置營州武徳五年改為南營州貞觀八年改為道州或為江華郡漢都龎嶺今謂之永明有甿渚嶺今謂之白芒即五嶺之二也屬江南道領縣四營道江華延唐永明宋因之屬荆湖南路貢白紵零陵香領縣四治營道營道唐縣有營水沱水寧逺唐延唐縣宋改有九疑山冷道水永明唐縣有警水江華唐縣有呉望山沱水郴州春秋戰國時皆楚地秦屬長沙郡項羽徙義帝都郴即此地漢初以其地為桂陽郡即長沙之南境後漢晉宋齊皆因之陳以其地為桂陽廬陽二郡隋平陳廢二郡置郴州煬帝初州廢復置桂陽郡唐為郴州或為桂陽郡屬江南道領縣八郴山南亭義昌資興髙平義章臨武藍晉改為敦州廢臨武髙平二縣以其地入桂陽監又廢資興縣漢復為郴州宋景徳二年以藍山屬桂陽監嘉定四年析郴縣置資興縣屬荆湖南路貢紵領縣五治郴郴漢縣有郴水渌醽水桂陽唐義昌縣宋改有耒水宜章唐義昌縣宋改有章水永興有安陵水資興桂陽軍唐於郴州境置監掌鑄錢宋因之主銀冶景徳元年以郴州藍山縣來屬天禧三年置平陽縣紹興間又割平陽縣析置臨武縣屬荆湖南路領縣三治平陽平陽隋縣有芙蓉山藍山唐縣臨武連州春秋楚地秦屬長沙郡之南境二漢屬桂陽郡呉屬始興郡晉因之宋明帝置宋安郡後省屬廣興郡宋改始興為廣興今始興郡也齊復屬始興郡梁又分為陽山郡陳郡廢隋煬帝初置熙平郡唐改為連州或為連山郡屬嶺南道領縣三宋同宋開寳四年以廣州浛光來屬六年以浛光𨽻英州屬廣東路貢紵布官桂鍾乳領縣三治桂陽桂陽漢縣有湟水海陽湖陽山晉縣有茂溪山連山隋縣有銅山乳穴邵州春秋戰國時皆屬楚秦屬長沙郡漢屬長沙國零陵郡地後漢屬長沙零陵二郡地呉置邵陵郡分零陵北部都尉置晉宋齊梁陳皆因之隋平陳廢邵陵併入長沙郡唐復分置邵州或為邵陽郡屬江南道領縣二邵陽武岡宋熙寧五年收復梅山以其地置新化縣元豐四年以溪洞徽州為蒔竹縣𨽻州崇寧四年以蒔竹縣之臨口寨為臨岡縣五年别為武岡軍屬荆湖南路貢犀角銀領縣三治邵陽邵陽晉縣有武陵水桃花源新化有惜澬水等五寨蒔竹冇蒔竹水武岡軍本唐邵州武岡縣隋為武攸縣崇寧五年陞為軍以蒔竹分為綏寧臨岡二縣𨽻焉屬荆湖南路領縣三治武岡武岡唐縣有齊水綏寧臨岡故臨口寨後又改為新寧縣鼎州春秋戰國時皆屬楚地秦昭王置黔中郡漢髙更名武陵郡後漢魏晉皆因之本名義陵在辰陽縣與夷相接武陵記桃花源即此地也宋齊亦曰武陵郡梁置武州後改曰沅州隋平陳改為朗州煬帝初州廢置武陵郡唐為朗州或為武陵郡屬江南道領縣二武陵龍陽後唐為武正軍節度又改武平軍周為大都督宋析武陵置桃源縣又置沅江縣大中祥符五年改為鼎州乾道元年陞為常徳府領本軍節度屬荆湖北路貢紵布綀布領縣四治武陵武陵隋縣有武陵山沅水滄浪水杜渚芷江桃源宋縣有桃源山夷溪延溪龍陽呉縣有鼎水酉水橘洲沅江澧州春秋時楚地秦屬黔中郡二漢屬武陵郡兼置荆州領縣八治於此呉分置天門郡晉宋齊皆因之隋平陳置松州尋改為潭州煬帝初為澧陽郡唐為澧州或為澧陽郡屬江南道領縣四宋同宋屬荆湖北路貢綾竹簟領縣四治澧陽澧陽晉縣有大浮山崇山澧水安鄉隋縣有澧水澹水石門隋縣有茹溪慈利隋縣有漊水辰州古蠻夷之地春秋楚國之境秦屬黔中郡漢屬長沙武陵二郡地後漢發南郡人入武谿撃諸蠻不克後馬援至臨沅而擊諸蠻破之此其地也後亦屬武陵郡晉宋齊並為武陵郡地隋分辰州煬帝初為沅陵郡唐為辰州或為盧溪郡屬江南道領縣五沅陵辰溪溆浦盧溪陽麻宋太平興國七年置招諭縣熙寧七年以麻陽招諭二縣𨽻沅州屬荆湖北路貢光明朱砂水銀領縣四治沅陵沅陵漢縣有壺頭山沅江溆浦唐縣有溆水辰溪隋縣有辰溪盧溪唐縣有武山武溪沅州古蠻夷之境楚國黔中之地秦屬黔中郡二漢屬武陵郡在巫水之陽隋屬沅陵郡唐為巫州天授中以巫山不在州界改為沅州開元十二年復為巫州或為潭陽郡屬江南道領縣三龍標潭朗溪陽宋熙寧七年章惇收復其地以潭陽縣地置盧陽縣以辰州麻陽招諭二縣來屬八年併錦州寨人戸及廢招諭入麻陽縣元豐三年併鎮江寨人戸入黔江城為黔陽縣五年陞舊渠陽寨為縣屬荆湖北道貢水銀朱砂領縣四治盧陽盧陽唐錦州屬縣有錦水瀘水麻陽唐縣黔陽渠陽靖州秦漢黔中地唐為夷播叙二州之境後周時節度使周行逢死叙州刺史鍾存志奔武陽而楊正岩以十洞稱徽誠二州宋熙寧九年十洞酋長楊通藴送欵内附楊通寳來貢朝廷以通寳為誠州刺史其子復為誠州刺史又詔於武岡之西作城在渠河之陽為誠州廢為渠陽軍尋廢為寨𨽻沅州復置誠州後改為靖州蓋自崇寧再歸職方屬荆湖北路貢白絹領縣三治永平永平本渠陽縣有渠河崇寧三年改㑹同本三江縣崇寧二年改通道本羅䝉縣崇寧二年改黔州古蠻夷之國春秋戰國皆楚地秦恵王欲楚黔中地以武關地易之即此是也通謂之五溪五溪謂酉辰巫武陵等五溪也古老相傳云楚子滅巴巴子兄弟五人流入黔中各為一溪之長一説云五溪蠻皆槃瓠子孫自為統長非巴子也秦屬黔中郡漢屬武陵郡後漢因之晉宋齊亦然後周武帝時蠻帥以其地歸附遂置奉州後改為黔州隋初亦置黔州煬帝初為黔安郡唐復為黔州或為黔中郡屬江南道領縣六彭水洪杜洋水信寧黔江都儒孟蜀為武㤗軍節度宋平蜀因之嘉祐八年廢洪杜洋水都儒信寧四縣入彭水後陞為紹慶府此州羈縻之州凡五十六思州領縣二費州領縣二並州遣牙校治事播州領縣二夷州領縣四並領以酋長其餘南寧等州並羣蠻所處地連溪峒控邊面甚廣屬四川䕫州路貢朱砂蠟領縣二治彭水彭水漢酉陽縣隋改有壺頭山巴江彭水朗溪黔江唐縣思州厯代土地與黔中郡同隋屬清江郡唐武徳元年以地當䍧牁之衝要遂置務州貞觀八年改為思州或為寧夷郡屬江南道領縣四務州思卭寧夷思王宋初為羈縻州𨽻黔州大觀元年蕃部長田祐恭願為王民始建州領務川卭水安夷三縣宣和四年廢州及務川縣以務川城為名卭水安夷二縣並作堡𨽻黔州紹興二年復置思州就以田氏為守施州春秋巴國之境七國時楚國巫郡之地秦屬南郡二漢因之後周置亭州及業州隋煬帝初併置庸州尋廢置清江郡唐為施州或為清江郡屬江南道領縣二清江建始宋屬四川䕫州路貢黄連木藥子領縣二治清江清江漢巫縣地有夷水一名清江廩君乗土船於此地建始漢巫縣地珍州古蠻夷之地唐貞觀七年開山洞置珍州或為夜郎郡屬江南道領縣四營徳麗臯夜郎樂源憲宗時廢屬溱州五代復為蠻夷宋賜名珍州後改為西髙州徽宗時大駱解上下族帥駱世華駱文貴獻其地立珍州亦曰樂源郡宣和三年承州廢以綏陽縣來𨽻屬四川䕫州路領縣二治樂源樂源綏陽播州古蠻夷之域黔中郡地夜郎國之東南隅也漢屬䍧牁其後無聞唐以隋䍧牁縣置播州或為播川郡屬江南道領縣三遵義芙帶水蓉宋大觀二年南平夷人楊友貴等獻其地建為州領播川琅川帶水三縣宣和三年廢為城𨽻南平軍夷州徼外蠻夷之地漢屬䍧牁郡厯代恃險不聞臣附隋煬帝時始屬明陽郡唐武徳四年以思州之寧夷縣置貞觀元年州廢四年復以黔州之都上縣開南蠻置十一年徙治綏陽與費州同置或為義泉郡屬江南道領縣五綏陽䍧都上寧義泉川夷宋為羈縻州大觀三年酋長獻其地建為承州領縣五與唐同宣和三年廢州及都上等縣以綏陽縣𨽻珍州溱州古蠻夷之地唐貞觀十六年開山洞置溱州或為溱溪郡屬江南道領縣二營懿扶歡宋為羈縻仍領前二縣熙寧七年招納置營懿等寨𨽻恭州後𨽻南平軍大觀二年别置溱州及溱溪夜郎兩縣宣和三年廢州及縣以溱溪寨為名𨽻南平軍錦州厯代土地與辰州同唐垂拱二年以辰州麻陽縣地及開山洞置錦州或為盧陽郡屬江南道領縣五盧陽常洛浦渭招喻豐陽宋無此州其地則入辰沅二州溪州厯代土地與辰州同唐天授二年析辰州置或為靈溪郡屬江南道領縣二大鄉三亭宋無此州費州古蠻夷之國漢屬䍧牁郡山川險阻為俚獠所居多不賔附至後周始置為費州因水為名唐貞觀四年析思州之涪川扶陽南蠻置或為涪川郡屬江南道領縣四涪川扶陽多田城樂宋無此州業州古蠻夷之地唐長安四年以沅州之夜郎渭溪二縣置舞州開元十三年以舞武聲相近更名鶴州二十年又名業州大厯五年又更名奬州或為龍溪郡屬江南道領縣二峩山渭溪宋無此州文獻通考卷三百十九
