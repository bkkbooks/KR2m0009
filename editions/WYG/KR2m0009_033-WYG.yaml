body:
  text: 文獻通考卷三十三鄱陽馬端臨貴與著選舉考六賢良方正漢文帝二年詔曰廼十一月晦日有食之二三執政舉賢良方正能直言極諫者以正朕之不逮十五年詔諸侯王公卿郡守舉賢良能直言極諫者上親策之敷納以言賈山至言今陛下念思祖考述追厥功圖所以昭光洪業休徳使天下舉賢良方正之士天下皆訢訢焉曰將興堯舜之道三王之功矣天下之士莫不精白以承休徳今方正之士皆在朝廷矣又選其賢者使為常侍諸吏與之馳驅射獵一日再三出臣恐朝廷之解弛百官之墮於事也諸侯聞之又必怠於政矣臣聞山東吏布詔令民雖老羸癃疾扶杖而往聼之願少須臾毋死思見徳化之成也今功業方就名聞方昭四方鄉風今從豪俊之臣方正之士直與之日日獵射擊兎伐狐以傷大業絶天下之望臣竊悼之詩曰靡不有初鮮克有終臣不勝大願願少衰射獵以夏嵗二月定明堂造太學脩先王之道風行俗成萬世之基定然後唯陛下所幸耳古者大臣不媟故君子不常見其齊嚴之色肅敬之容大臣不得與宴游方正脩潔之士不得從射獵使皆務其方以髙其節則羣臣莫敢不正身修行盡心以稱大禮如此則陛下之道尊敬功業施於四海垂於萬世子孫矣誠不如此則行日壊而榮日滅矣夫士修之於家而壊之於天子之廷臣竊愍之陛下與衆臣宴遊與大臣方正朝廷論議夫遊不失樂朝不失禮議不失計軌事之大者也按山之言固善矣然古者内外庭不分人主出入起居皆與賢士大夫遊故文帝視朝而受郎官止輦之言馳坂而受袁盎攬轡之諫葢使其日侍左右得以隨事納䂓則未為無補乃盛世事也至武帝時侍中分掌乘輿服物下至褻噐虎子之屬孔安國以儒者為侍中特聼掌御唾壺則其媟慢已甚然有臣如汲長孺則帝雖雄暴而所以禮遇之者特出丞相大將軍之上葢所以取重者存乎其人固不因親近而遂至於翫狎也後世此意不存人主親士大夫之時少親宦官宫妾之時多雖輔弼股肱之臣亦不過質明趨朝鞠躬屏息搢笏奏事卑卑而前數語即退而所與游處親宻者皆嬖倖近習之流耳况賢良方正之士脫跡草萊而觀光上國其視黄屋之後塵重瞳之睟表逺在雲霄之上勢分隔而情意日疎等威嚴而震怖易起所謂臨軒詳延之事特具文耳安得如漢世之日近清光而得以時效忠讜乎然則山所言願少弛擊狐伐兎之事而講求立經陳紀之計誠為至當之論至謂必使大臣不得預宴游方正修潔之士不得從射獵然後可以建功業則非古義也又曰夫士修之於家而壊之於天子之廷夫所謂賢良方正者取其能直言極諫以劘切上躬耳今反為人主宴游射獵所蠱而壊之則何以謂之賢良方正乎汲黯魏徴之流豈以日侍遊獵之故而遂不能正其身髙其節乎又按鼂錯傳言文帝時詔有司舉賢良文學士錯在選中對䇿者百餘人惟錯為髙第遷中大夫錯未舉賢良時已為太子家令上書言事帝賜璽書寵答曰皇帝問太子家令上書言兵體三章聞之書言狂夫之言而明主擇焉今則不然言者不狂而擇者不明國之大患故在於此使夫不明擇於不狂是以萬聼而萬不當也則帝於言事之微臣所以尊崇之者至矣未嘗有媟慢之意如山所言也制䇿畧謂朕之不徳吏之不平政之不宣民之不寧四者之闕悉陳其志毋有所隠上以薦先帝之宗廟下以興愚民之休利著之於篇朕親覽焉觀大夫所以佐朕至與不至書之周之密之重之閉之興自朕躬大夫其正論毋枉執事嗚呼戒之二三大夫其帥志毋怠則其所以虛心詔訪者尤為懇惻然觀錯所對言五帝神聖其臣莫及陛下神明徳厚不下五帝執事之臣莫能望清光陛下不自躬親而待不望清光之臣臣竊恐神明之遺也大槩皆導諛納諂之言殊辜帝孜孜訪求之本意反不如為太子家令時所言勸農備邊之䇿為確實也錯在髙第而所對如此則其餘百餘人者可知然則賢良方正負文帝帝未嘗負賢良方正也孝武建元元年詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諫之士帝即位舉賢良文學之士前後百數而董仲舒以賢良對䇿仲舒孝景時為博士天子覽其對而異焉乃復策之對畢復策之遂以為江都相轅固帝初即位時以賢良徴諸儒嫉毁言固老罷歸之帝初即位詔天下舉方正賢良文學材力之士待以不次之位四方士多上事言得失自􅃷鬻者以千數其不足采者輙報聞罷丞相綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可先公曰此行仲舒之言也衞綰特使之書奏耳建白大義豈綰所能辨哉武帝年未二十而奮然知所決擇如此可謂英主矣然轅固以老而見棄莊助以容悅見録仲舒雖殷勤三䇿而不能引以自近也以舉賢良一事考之帝終身之得失皆可推矣元光五年詔策賢良帝初即位招賢良文學士時公孫𢎞年六十以賢良徴為博士使匈奴還報不合意上怒以為不能𢎞乃移病免歸至是復徴賢良文學菑川國復推上𢎞𢎞謝曰前已嘗西用不能罷願更選國人固推𢎞𢎞至太常上䇿詔諸儒𢎞奉對時對者百餘人太常奏𢎞第居下䇿奏天子擢𢎞對為第一召入見容貌甚麗拜為博士待詔金馬門按武帝本紀言元光元年䇿賢良所載制䇿與公孫𢎞傳所載文小異𢎞對策在元光五年而本紀又於制策之末稱董仲舒公孫𢎞出焉按仲舒對策在建元元年俱不在元光元年本紀誤𢎞初以賢良徴為博士後罷歸再以賢良徴方對策然則賢良之未對策者亦可以為博士歟董仲舒轅固亦皆先為博士後舉賢良按西都賢良策之載於史者鼂董公孫杜欽谷永杜鄴而已仲舒最醇正又值武帝即位之始初心清明故異其對而復再三詢叩得以罄其所學𢎞素曲學又值不稱㫖罷免之餘宜其姑為平緩無忤之說以取容自不足責鼂錯知治體善議論非𢎞之比又遇謙恭好問之主如文帝且已嘗受知辱眷於太子家令言事之時又非如仲舒泛泛下僚猝奉大對之比乃諄復乎五帝神聖之說贊頌不容口而畧無建明惜哉欽永阿王氏論益卑矣鄴指陳外戚譏切丁傅稍不負方正之名王吉貢禹之正大朱雲何武之剛方必有嘉論惜史逸其傳云昭帝始元元年遣故廷尉持節郡國舉賢良五年詔令三輔太常舉賢良各二人六年詔有司問郡國所舉賢良文學民所疾苦議罷鹽鐵𣙜酤有司者丞相車千秋御史大夫桑𢎞羊也賢良文學者茂陵唐生魯國萬生中山劉子九江祝生與其徒六十餘人也其建議之首曰有詔書使丞相御史與所舉賢良文學語問民間所疾苦文學對曰竊聞治人之道防滛泆之原廣道徳之端抑末利而開仁義毋示以利而後教化可興風俗可移也今郡國有鹽鐵酒𣙜均輸與民争利散敦厚之朴成貪鄙之化是以百姓就本者寡趨末者衆願悉罷之御史大夫桑𢎞羊難之以為此國家大業所以制四夷安邊足用之本罷之不便按自孝文策鼂錯之後賢良方正皆承親策上親覽而第其優劣至孝昭年幼未即政故無親策之事乃詔有司問以民所疾苦然所問者鹽鐵均輸𣙜酤皆當時大事令建議之臣與之反覆詰難講究罷行之宜卒從其說為之罷𣙜酤然則雖未嘗親奉大對而其視上下姑相應以義理之浮文者反為勝之國家以科目取士士以科目進身者必如此然後為有益於人國耳賢良及大夫問難本末見征𣙜考宣帝本始四年郡國地震詔令三輔太常内郡國舉賢良方正各一人地節三年詔令内郡國舉賢良方正可親民者詔曰乃者九月地震朕甚懼焉有能箴朕過失及賢良方正直言極諫之士㠯正朕之不逮母諱有司神爵四年令内郡國舉賢良可親民者各一人孝元初元二年以地震隴西郡詔丞相御史中二千石舉茂材異等直言極諫之士永光二年以日食詔令内郡國舉賢良方正各一人何武為京兆尹坐舉方正所舉者召見槃辟雅拜行禮容拜也槃辟猶盤旋也有司以為詭衆虚偽武坐左遷楚内史孝成建始二年詔三輔内郡舉賢良方正各一人建始三年以日蝕地震詔丞相御史與將軍列侯中二千石及内郡國舉賢良方正能直言極諫之士詣公車朕將覽焉上盡召直言之士詣白虎殿對策元延元年以日食星隕孛見令公卿大夫博士議郎以經對與内郡國舉方正能直言極諫者各一人令公卿與内郡國共舉孝哀帝元壽元年正月以日食有詔令公卿大夫與將軍列侯中二千石等察舉賢良方正及能直言者各一人西漢舉賢良文學鼂錯以太子家令舉遷授中大夫董仲舒以博士舉遷授江都相公孫𢎞以博士舉遷博士待詔杜欽以武庫令舉遷授議郎嚴助郡舉擢授中大夫朱雲以博士舉遷授槐里令王吉以雲陽令舉遷授昌邑中尉貢禹以博士舉遷授河南令魏相郡卒史舉遷授茂陵令蓋寛饒以郎舉遷諫大夫孔光以議郎舉遷授諫大夫谷永以太常丞舉待詔公車杜鄴以涼州刺史舉不及拜官卒何武以太守卒史舉遷授諫大夫轅固以清河王太傅舉尋罷歸里黄霸以丞相長史舉遷揚州刺史朱邑以太守卒史舉遷大司農丞世祖建武六年十月詔曰吾徳薄不明寇賊為害強弱相陵元元失所永念厥咎内疚於心其敕公卿舉賢良方正各一人七年四月詔曰比隂陽錯謬日月薄蝕百姓有過在予一人大赦天下公卿司𨽻州牧舉賢良方正各一人遣詣公車朕將覽試焉章帝建初元年三月詔曰朕以無徳奉承大業夙夜慄慄不敢荒寧而災異仍見與政相應朕既不明涉道日寡又選舉乖實俗吏傷人官職耗亂刑罰不中可不憂與昔仲弓季氏之家臣子游武城之小宰孔子猶誨以賢才問以得人明政無大小以得人為本夫鄉舉里選必累功勞今刺史守相不明真偽茂才孝㢘嵗以百數既非能顯而當授之政事甚無謂也毎尋前世舉人貢士或起甽畝不繫閥閲敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人五年二月朔日有食之詔公卿已下其舉直言極諫能指朕過失者各一人遣詣公車將親覽問焉其以巖穴為先勿取浮華和帝永元六年三月詔曰隂陽不和水旱違度思得忠良之士以輔朕之不逮其令三公中二千石二千石内郡守相舉賢良方正能直言極諫之士各一人昭巖穴披幽隠遣詣公車朕將悉聼焉帝乃親臨策問選補郎吏安帝永初元年三月日有食之詔公卿内外衆官郡國守相舉賢良方正有道術之士明政術達古今能直言極諫者各一人五年閏三月詔曰朕以不明統理失中思得忠良正直之臣以輔不逮其令三公特進侯中二千石二千石郡守諸侯相舉賢良方正有道術達於政化能直言極諫之士各一人及至孝行與衆卓異者并遣詣公車朕將親覽焉順帝即位詔公卿郡守國相舉賢良方正能直言極諫之士各一人漢安元年二月詔大將軍公卿舉賢良方正能探賾索隠者各一人冲帝即位詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人桓帝建和元年四月京師地震詔大將軍公卿校尉舉賢良方正能直言極諫之士各一人三年六月詔大將軍三公特進侯其與卿校尉舉賢良方正能直言極諫之士各一人永興二年二月京師地震詔公卿校尉舉賢良方正能直言極諫者各一人延熹八年正月日有食之詔公卿校尉舉賢良方正永康元年五月詔公卿校尉舉賢良方正東漢舉賢良文學魯丕郡功曹舉遷議郎申屠剛蘇章李法爰延崔駰周爕不就劉瑜荀淑皇甫規張奐劉淑劉焉魏明帝青龍元年詔公卿舉賢良篤行之士各一人晉武帝泰始四年詔公卿及郡國守相舉賢良方正直言之士摯虞舉賢良與夏侯湛等十七人䇿為下第拜中郎武帝詔曰省諸賢良答策雖所言殊途皆明於王義有益政道欲詳覽其對究觀賢士大夫用心因詔諸賢良方正直言會東堂策問曰云云虞對畢擢為太子舍人阮种與郤詵王康對賢良俱居上第即除尚書郎然毁譽之徒或言對者因緣假托帝乃更延羣士庭以問之詔曰前者對策所問未盡子大夫所欲言故復延見其具陳所懐种策奏帝親覽焉又擢為第一轉中書郎按試賢良而至於再策始於漢武帝之待仲舒而晉武之時亦有之蓋於對者數百人之中特㧞之而且再策之可見二帝於策士之事究心如此後世亦不過付之有司視以具文耳唐制天子自詔曰制舉所以待非常之材其制詔舉人不有常科皆標其目而搜揚之試之日天子親臨觀之試已糊其名於中考之文策髙者特授以美官其次與出身元宗開元八年上親策應制舉人於含元殿謂曰古有三道今減從一道近無甲科朕將存其上第務收賢俊仍令有司設食石林葉氏曰漢舉賢良文帝二年對策者百人鼂錯為髙第武帝元光五年對策者亦百餘人公孫𢎞為第一當時未有黜落法對者皆預選但有髙下耳至唐始對策一道而有中否然取人比今多建中間姜公輔等二十五人太和間裴休等二十三人其下如貞元中韋執誼崔元翰裴垍等皆十八人元和中牛僧孺等長慶中龎嚴等至少猶皆十四人容齋洪氏隨筆曰唐徳宗貞元十年賢良方正科十六人裴垍為舉首王播次之隔一名而裴度崔羣皇甫鎛繼之六名之中連得五相可謂盛矣而邪正夐不侔度羣同為元和宰相而鎛以聚歛賄賂亦居之度羣極陳其不可度恥與同列表求自退兩人竟為鎛所毁而去且三相同時登科不可謂無事分而玉石雜糅薰蕕同噐若黙黙充位則是固寵患失以私妨公裴崔之賢誼難以處也本朝韓康公王岐公王荆公亦同年聮名熈寧間康公荆公為相岐公參政故有一時同榜用三人之語頗𩔖此云天寳十三載御勤政樓試四科舉人其詞藻宏麗問策外更試詩賦各一道制舉試詩賦自此始憲宗元和元年敕制舉人試訖有通夜納策計歸不得者並於光宅寺止宿金吾衛使差人監引至宿所切加勾當勿令喧雜是年策賢良詔楊於陵鄭敬李益韋貫之同考覈賢良牛僧孺皇甫湜李宗閔條對甚直無所畏避考官第其策居三等權倖惡其詆訐而不中第者乃注解其策同為唱誹貫之等皆坐貶黜致堂胡氏曰制策亦以空言取人然其來最古得人亦多至於末流應科者既未必英才而發問之目往往摘抉細隠窮所難知務求博洽之士而直言極諫之風替矣要必深詔中外精求方聞有學行者勿令先獻所業直召至殿廷而親策以當世之急務與夫政事之闕失使舉古治宜於今者如其可采則就加任使以合於堯舜奏言試功之舉則瑰瑋傑特之才不困於簸揚淘汰而國家收多士之實用矣文宗太和三年賢良前進士劉蕡對策切直指陳時事不避貴近言辭激切士林感動考官馮宿賈餗龎嚴等有所畏忌不敢上聞隨例擯斥議者不平諫臣或將其策白於宰臣宰臣怯憚亦不敢為之明白同對李郃抗表請讓官於蕡不報按既曰制科則天子親策之親覽之升黜之權當一出於上漢武帝之於董仲舒也意有未盡則再策之三策之晉武帝之於摯虞阮种亦然公孫𢎞所對太常奏為下第而帝擢為第一葢漢世人主於試賢良皆親第其優劣臣下所不可得而軒輊也唐之制科則全以付之有司矣故牛僧孺軰以直言忤權倖則考官坐其累而劉蕡所陳尤為忠憤鯁切則自宰相而下皆不敢為之明白雖是當時閹宦之勢可畏亦由素無親覽之事故此軰得以刼制衡鑑之人也唐制科名目及中制科人姓名顯慶二年志烈秋霜科韓思彦及第乾封元年幽素科蘇瓌解琬苖神容格輔元徐昭劉訥言崔谷神及第上元二年辭殫文律科崔融及第垂拱四年十二月辭標文苑科房晉皇甫瓊王旦及第永昌元年正月蓄文藻之思科彭景直及第抱儒素之業科李文愿及第長壽三年四月臨難不顧徇節寧邦科薛稷寇泚及第證聖元年長才廣度沉迹下僚科張漪及第通天元年文藝優長科韓琬及第神功元年九月絶倫科蘇頲崔元童袁仁敬何鳯孟温禮洪子輿盧從愿趙不欺及第大足元年理選使孟詵試拔萃科崔翹鄭少微及第疾惡科馮萬石及第長安二年龔黄科馬克麾及第神龍二年才膺管樂科張大求魏啟心魏愔盧絢張文成褚璆咸廙業郭鄰趙不為及第才髙位下科馮萬石鼂良正張敬及第三年材堪經邦科張九齡康元瓌及第賢良方正科蘇晉宋務光宼泚盧怡吕恂及第景龍三年抱噐懐能科夏侯銛及第茂才異等科王敬從盧重元及第景雲二年文以經國科袁暉韓朝宗及第藏名負俗科李俊之及第先天元年文經邦國科韓休及第藻思精華科趙冬曦及第寄以宣風則能興化變俗科郭鄰之及第道侔伊吕科張九齡及第手筆俊拔超越軰流科杜昱張子漸張秀明常無名趙居正賈登邢巨及第開元二年直言極諫科梁昇卿袁楚客及第哲人竒士逸淪屠釣科孫逖及第良才異等科邵閏之崔翹及第文儒異等科崔侃禇庭晦及第文史兼優科李昇期康子元達奚珣及第六年博學通議科鄭少㣲蕭誠及第七年文辭雅麗科邢巨苖晉卿禇思光趙良噐及第十二年將帥科裴敦復房自謙及第十五年武足安邊科鄭昉樊衡及第髙才沉淪草澤自舉科鄧景山及第十七年髙才未達沉迹下僚科呉鞏及第十九年博學宏詞科鄭昉陶翰及第二十一年多才科李史魚及第二十三年王霸科劉璀杜綰及第智謀將帥科張重光崔圓李廣琛及第天寳元年文辭秀逸科崔眀允顔真卿及第六年風雅古調科薛據及第十三年二月辭藻宏麗科楊綰及第大歴二年樂道安貧科楊膺及第六年諷諫主文科鄭珣瑜李益及第建中元年賢良方正能直言極諫科姜公輔元有直樊澤吕元膺及第文辭清麗科奚陟梁肅劉公亮鄭轅沈封呉通元及第經學優深科孫玭黎逢白季隨及第髙蹈邱園科張紳衛良儒蘇哲及第軍謀越衆科夏侯審平知和鄭儋凌正周渭丁俛及第力田聞於鄉閭科鄭黄中崔浩李牧及第正元元年九月賢良方正能直言極諫科韋執誼鄭利用穆質楊鄬裴復柳公綽歸登李直方崔邠鄭敬魏𢎞簡沈廻元佑徐袞及第博通墳典達於教化科熊執易劉簡甫及第識洞韜畧堪任將帥科許贄及第四年四月賢良方正能直言極諫科崔元翰裴次元李彛崔豐史牟陸震柳公綽趙參徐𢎞毅韋彭壽鄒儒立王乃杜倫元易王真及第清亷守節政術可稱堪任縣令科李巽及第孝悌力田聞於鄉閭科張浩及第十年十二月賢良方正能直言極諫科裴垍王播朱諫裴度熊執易許堯佐徐𢎞毅崔羣皇甫鎛王仲舒許季同仲子陵鄭士材邱頴及第博通墳典通於教化科朱頴及第詳明政術可以理人科張平叔李景亮及第元和元年四月才識兼茂明於體用科元稹韋惇獨孤郁白居易曹景伯韋慶復崔綰羅譲崔䕶薛存慶韋珩李蟠元修蕭俛沈傳師柴宿及第達於吏理可使從政科陳岵及第三年四月賢良方正能直言極諫科牛僧孺皇甫湜李宗閔李正封吉𢎞宗徐晦賈餗王起郭球姚衮庾威及第博通墳典達於教化科馮苞陸亘及第軍謀宏達材任將帥科樊宗師及第達於吏理可使從政科蕭睦及第長慶元年十二月賢良方正能直言極諫科龎嚴任畹吕述姚中立韋􅍼李囘崔嘏崔龜從韋正貫崔知白陳元錫及第詳明政術可以理人科崔郢及第軍謀宏達材任將帥科呉思李商卿及第博通墳典達於教化科李思元及第寳歴元年四月賢良方正能直言極諫科唐伸楊儉韋端符舒元褎蕭敞楊魯士來擇趙祝裴惲韋絲李昌寳嚴楚封李涯蕭夷中馮球元晦及第詳明吏理達於教化科韋正貫及第軍謀宏達材任邊將科裴儔侯雲章及第太和二年閏三月賢良方正能直言極諫科李郃裴休裴素南卓李甘杜牧馬植鄭亞崔博崔璵王式羅邵京崔渠韓賓崔慎由苖愔韋昶崔煥崔讜及第詳明吏理達於教化科宋混及第軍謀宏達堪任將帥科鄭冠李式及第容齋洪氏隨筆曰唐世制舉科目猥多徒異其名耳其實與諸科等也張九齡以道侔伊吕䇿髙第以登科記及㑹要考之葢先天元年九月明皇初即位宣勞使所舉諸科九人經邦治國材可經邦才堪刺史賢良方正與此科各一人藻思清華興化變俗科各二人其道侔伊吕策問殊平平但云興化致理必俟得人求賢審官莫先任舉欲遠循漢魏之規復存州郡之選慮牧守之明不能必鑒次及越騎佽飛皆出畿甸欲均井田於要服遵邱賦於革車并安人重榖編戸農桑之事殊不及為天下國家之要道則其所以待伊吕者亦狹矣九齡於神龍二年中材堪經邦科本傳不書計亦此𩔖耳後周世宗顯徳四年十月詔曰制策懸科前朝盛事莫不訪賢良於側陋求讜正於箴規殿廷之間帝王親試其或大禆於國政有益於時機則必待以優恩縻之好爵拔竒取異無尚於兹得士者昌於是乎在爰從近代乆廢此科懐才抱噐者鬰而不伸隠耀韜光者晦而莫出遂使翹翹之楚多致於棄捐皎皎之駒莫就於縻縶遺才滯用闕孰甚焉應天下諸色人中有賢良方正能直言極諫經學優深可為師法詳閑吏理達於教化者不限前資見任職官黄衣草澤並許應詔其逐處州府依毎年貢舉人式例差官考試解送尚書吏部仍量試策論三道共三千字以上當日内取文理俱優人物爽秀方得解送取來年十月集上都其登朝官亦許上表自舉宋朝之制國初制舉有賢良方正能直言極諫經學優深可為師法詳閑吏理達於教化凡三科應内外職官前資見任黄衣草澤人並許諸州及本司解送於吏部對御策試三千言以文理俱優者中其選真宗咸平四年詔學士兩省五品御史臺尚書省諸司四品以上於内外京朝幕府州縣官草澤中各舉賢良方正一人不得以見任轉運使及館閣職事人應詔景徳二年詔復置博通墳典達於教化才識兼茂明於體用武足安邊洞明韜畧運籌決勝軍謀宏逺材任邊寄等科委中書門下先加程試如噐業可觀具名聞奏朕將臨軒親試時命兩制考文卷中等者甚少又命侍讀待制重考上猶慮遺才令中書重詳定訖試論六首合格者以聞大中祥符元年時上封者言兩漢舉賢良多因兵荒災變所以詢訪闕政今國家受瑞建封不當復設此科於是悉罷凡特㫖試藝者有於中書學士舍人院或特遣官專試所試詩賦論策頌制詔或三篇或一篇景徳後唯將命為知制誥者方試制誥東封及祀汾隂時獻文者多試業得官仁宗天聖七年詔曰朕開數路以詳延天下之士而制舉獨乆置不設意吾豪傑或以故見遺也其復置此科於是増其名曰賢良方正能直言極諫科博通墳典明於教化科才識兼茂明於體用科詳明吏理可使從政科識洞韜畧運籌帷幄科軍謀宏逺材任邊寄科凡六以待京朝官之被舉及起應選者又置書判拔萃科以待選人之應書者又髙蹈邱園科沉淪草澤科茂材異等科以待布衣之被舉及應書者又武舉以待方畧勇力之士其法先上藝業於有司有司較之然後試祕閣中格然天子親策之後數嵗李淑上書言吏部故事選人以格限未至者能試判三節謂之拔萃此特有司之事耳而陛下乃親策之非其稱矣又所謂茂材異等本求出𩔖之雋也而士之不利鄉薦者始出而應焉臣以為此二者皆非國家求才之本意也宜有以易之於是罷書判拔萃科令幕職州縣官皆得應賢良方正能直言極諫等科諸常試鄉舉被黜者毋復應茂才異等科其後十餘年又詔自今制科須近臣論薦毋得自舉初御史唐詢與參知政事呉育有隙帝數稱近嵗制科得人以育為賢而詢奏言自古災異乃冊賢良今者六科率不用公卿推引而特視進士之期凡應此科者至自稱曰賢良方正曰茂才異等曰博通墳典臣以為習扇澆浮莫甚於此可悉罷之而育復奏曰冊賢良自鼂錯始錯非以災異舉也帝以育言為然由是制科得不廢而特禁其自薦而已公是劉氏雜著曰夫自舉之與人舉之所以厲世矯俗豈可同日而語哉今不惟進士自舉而已至於賢良方正亦自舉也豈不過乎夫賢良美稱也方正善行也古之當此名者方將髙臥潛處不知羔鴈珪璧之聘三四至而遂能起乎今皆循循然窺顔色求便利而進矣爭門齰指不足以諭其情側肩攫金不足以况其態鼓腹自鬻不足以比其羞無乃其實與名不相符哉今世皆知髙賢良於進士矣不知賢良之害於俗甚於進士也何以言之邪人有言曰南城之澤有兎焉可逐而取也彼聞之者必爭先致力焉然其至者必游手惰農耳又有言曰有鹿焉則不獨游手惰農而後爭之必將有舍業而往者矣則兎小而鹿大故也夫進士兎也賢良鹿也二者皆足以動貪利之心而賢良之所動者多可不慎哉石林葉氏曰富公以茂材異等登科後召試館職以不習詩賦求免仁宗特命試以策論後遂為故事制科不試詩賦自富公始至蘇子瞻又去策止試論三篇熈寧初罷制舉其事遂廢又曰故事制科分五等上二等皆虚惟以下三等取人然中選者亦皆第四等獨呉正肅公嘗入第三等後未有繼者至嘉祐中蘇子瞻子由乃始皆入第三等已而子由以言太直為考官胡武平所駮欲黜落復降為第四等設科以來止呉正肅與子瞻入第三等故子瞻謝啟云誤占乆虗之等玉山汪氏曰范子功亦入制科第三等後熈寧間孔文仲考中第三等以忤王安石特㫖絀之神宗熈寧七年吕惠卿以為制科止於記誦非義理之學且進士已試策與制科無異乃詔罷之先時祕閣考制科陳彦古六論不識題語何出字又不及數凖式不考葢自祕閣試制科以來未有如彦古空疎者次年乃罷制科哲宗元祐元年復制科紹聖元年罷制科自朝廷罷詩賦廢明經詞章記誦之學俱絶至是而制科又罷無以兼收文學博異之士乃置宏詞以繼賢良之科三省言唐世取人隨事設科其名有詞藻宏麗文章秀異之屬究其所試皆異乎進士明經今既復舊科純用經術諸如詔誥章表箴銘賦頌赦敕檄書露布誡諭其文皆朝廷官守日用而不可闕先朝已嘗留意特科目未及設二年詔立宏辭科嵗許進士登科者詣禮部請試若見守官須受代乃得試率以春試上舍日附試不自立院也差官鎻引悉依進士惟詔誥赦敕不以為題所試者章表露布檄書用四六頌箴銘誡諭序記用古今體亦不拘四六考官取四題分二日試試者雖多取毋過五人中程者上之三省三省覆視分上中二等推恩有差辭格超異者恩命臨時取㫖徽宗大觀四年改為詞學兼茂科科舉嵗附貢士院試取毋過三人不中率許闕仍不試檄書増制詔分二日試四題其二以歴代史事借擬為之餘以本朝典故或時事宰臣執政親屬毋得試髙宗紹興元年下詔復賢良方正能直言極諫科有司講求舊制每科埸年命中丞給舍諫議大夫學士待制三人舉一人不拘已仕未仕命官仍以不曽犯贓私罪人充先具詞業策論共五十篇繳送兩省侍從參考之分三等文理優長為上次優為中常平為下次優已上並召赴閣試嵗九月命學士兩省官考試於祕閣御史監之試六論每首五百字以上於九經十七史七書國語荀楊管子文中子正文内出題差楷書祇應四通以上為合格仍分五等以試卷繳奏御前拆號入四等以上者召赴殿試其日上臨軒親策限三千字以上宰相撰題差初覆考詳定官赴試人引見賜坐殿廊兩廂設垂簾幃幕青褥紫案差楷書祗應内侍賜茶菓對策先引出處然後言事第三等為上恩數視廷試策第一人第四等為中視廷試第三人皆賜制科出身第五等為下視廷試第四人賜進士出身不入等與簿尉差遣以上並謂白身者若有官人則進一官與陞擢舊制六論於正文及注疏内出題至是有司請除疏義勿用七年詔以太陽有異氛氣四合令中外侍從各舉能直言極諫一人吕祉舉選人胡銓汪藻舉布衣劉度上即日除銓樞宻院編修官而度不果召孝宗乾道元年詔令尚書兩省諫議大夫已上御史中丞學士待制各舉賢良方正直言極諫一人仍具詞業繳進苖昌言奏國初嘗立三科景徳增而為六仁宗皇帝時李景請依景徳故事親策賢良秘閣六論專取六經及問時務其史傳注疏乞不條問帝亦以為問隠奥觀其博不若取其能明世之治亂有補闕政又詔以景徳六科定為制舉之目俾少卿監已上奏舉内外京朝官増置書判拔萃科髙蹈丘園科沉淪草澤科茂材異等科總為十科並許布衣應詔於是何詠富弼余靖尹洙蘇紳張方平江休復張伯玉軰出焉其立法寛故得士廣也自紹興復科三嵗一下詔垂四十年未聞有一介魁壘豪傑之士出應制書豈盛治之世無其人耶蓋責之至備而應之者難求之不廣而來者有隔爾臣請參稽前制間嵗下詔權於正文出題其僻書注疏不得以為問目追復天聖十科開廣薦揚之路振起多士積年委靡之氣太平之治不難立也上詔禮部集館職學官議之皆曰注疏誠可畧科目不必廣天下之士屏處山林滯迹遐逺侍從之臣豈能盡知伏見國初制科止令監司守臣解送乾徳中以無人應制許直詣閣門請應若依乾徳故事恐起僥倖請如國初之制詔可先是翰林學士汪應辰以眉山布衣李垕應詔上覽其文稱奬命依格召試㑹有沮之者不果試是嵗宰相虞允文為上言之始依元祐獨試故事命翰林學士王曮起居舍人李彦頴考試參詳垕六論凡五通上喜曰繼自今其必有應詔者矣十一月上親策於集英殿有司考入第四等復御殿引見賜制科出身授節度推官其策依正奏名第一甲例謄寫為册進御及徳壽宫并焚進諸陵淳熈四年李垕之弟塾復舉賢良方正而近習又恐制科之攻已共揺沮焉㑹台州趙汝愚舉姜凱信守唐仲友舉鄭建徳吏部侍郎趙粹中舉馬萬頃應詔上問輔臣召試賢良故事有黜落者否對曰昨李垕止獨試若數人須分優劣既而監察御史潘緯言制科不過三事一繳進詞業二試六論三對制策而進卷率皆宿著廷策豈無素備惟六論一塲謂之過閣人以為難若罷注疏而復以四通為合格則與應進士舉一塲試經義五篇者何異乃詔増為五通其年始命官糊名謄録如故事所試六論後二日試院言文卷多不知題目所出及引用上下文不盡有僅及二通者上命賜束帛罷之舉者周必大等皆放罪舊試六題一明一暗時考官所命多暗僻失國家求言之意矣淳熈十一年詔罷注疏出題於是郡國舉莊治滕􅍲試六論皆四通而考官顔師魯以其文理平凡不應近制又罷之自是薦紳重於特舉山林恥於自耀褎然而起者鮮矣自李垕之後制科無合格者又三十餘年永康何致者為郡守陳纘館客纘入朝薦之有㫖召試㑹同薦者滕􅍲杜富遭憂不赴詔須服闋並召致躁急欲先得試纘介蘇師旦言之韓􅇑胄得内批如所請中書繳還後又為臺諫論其進論中言伊尹始負堯舜之道而終為天下開凌犯之端之語為詆誣坐罷歸辛未嵗致以呉挺薦召又為臺臣所論乃勒歸鄉増修所學焉葉適論制科曰用科舉之常法不足以得天下之才其偶然得之者幸也自明道景祐以來能言之士有是論矣雖然原其本以至其末亦未見有偶然得之者要以為壊天下之才而使之至於舉無可用此科舉之敝法也至於制科者朝廷待之尤重選之尤難使科舉不足以得才則制科者亦庶幾乎得之矣雖然科舉所以不得才者謂其以有常之法而律不常之人則制舉之庶乎得之者必其無法焉而制舉之法反密於科舉今夫求天下豪傑特舉之士所以恢聖業而共治功彼區區之題目記誦明數暗數制度者胡為而責之而又於一篇之策天文地理人事之紀問之畧徧以為其說足以酬吾之問則亦可謂之竒才矣當制舉之盛時置學士立師以法相授浮言虗論披抉不窮號為制科習氣故科舉既不足以得之而制舉又或失之然則朝廷之求為一事也必先立為一法若夫制科之法是本無意於得才而徒立法以困天下之泛然能記誦者耳此固所謂豪傑特起者輕視而不屑就也又有甚此者蓋昔以三題試進士而為制舉者以答策為至難彼其能之則猶有以取之自熈寧以策試進士其說蔓延而五尺之童子無不習言利害以應故事則制舉之策不足以為能故哲宗以為今進士之策有過此者而制科由此再廢矣是以八九十年其薦而不得試者其試而不見取者其幸而取者其人才凡下往往不逮於科舉之俊士然且三年一下詔而追復不俟科舉之嵗皆得舉之將何所為乎設之以至密之法與之以至美之名使其得與此者為急官爵計耳且天下識治知言之人不應如是之多則三嵗以策試進士使肆言而無所用是誠失之矣今又使制舉者自以其所謂五十篇之文泛指古今敷陳利害其言泛雜見者厭視聞者厭聼且士之猥多無甚於今世挾無以大相過之實而冒不可加之名則朝廷所以汲汲然而求之者乃為譏笑之具今宜暫息天下之多言進士無親策制舉無記誦無論著稍稍忘其故步一日天子慨然自舉之三代之英才未可驟得亦不至如近世之冗長無取非惟無益而反有害也巽岩李氏制科題目編序曰閣試六論不出於經史正文非制科本意也蓋將傲天下士以其所不知先博習强記之餘功後直言極諫之要務抑亦重惜其事而艱難其選使賢良方正望而去者歟然而士終不以此故而少挫其進取之鋒問之愈深則對之愈密歴數世未嘗有敗績失據之過士豈真多能哉斯執事者優容之也逮熈寧中陳彦古始不識題有司准式不考而制科隨罷君子謂彦古不達時變宜其黜也先是孔文仲以直言極諫忤宰相意駮髙第斥小官彼狡焉思縱其淫心以殘害典則厭是科之不便於已也欲亟去之而不果遂則姑置焉名存而實亡矣凡所謂賢良方正尚肯復游其間乎彦古區區昧於一來是必不敢髙論切議也殆揣摩當世求合取容耳傳注義疏之么麽纎微且不及知矧惟國家之大體渠能有所發明哉而執事猶惡其名決壊之然後止彦古之黜宜也而使天下遂無得以賢良方正能直言極諫舉者獨何心歟至於元祐厪復旋廢其得失之迹又可見矣今天子明詔三下而士莫應豈非猶懲於彦古故邪蓋古之所謂賢良方正者能直言極諫而已今則惟博習强記也直言極諫則置而不問甚至惡聞而諱聼之逐其末而棄其本乃至此甚乎此士之所以莫應也余勇不自制妄有意於古人直言極諫之益而性最疎放勉從事於博習强記終不近也恐其幸而得從鼂董公孫之後曽是弗察而猥承彦古之羞乘此暇日取五十餘家之文書掇其可以發論者各數十百題具如别録間亦顛倒句讀竄伏首尾乃𩔖世之覆物謎言雖若不可知而要終不可欺戲與朋友共占射之賢於博奕云耳實非制科本意也因書以自警云按制科所難者六論然所謂四通五通者中選所謂凖式不考者聞罷則皆以能言論題出處為竒而初不論其文之工拙蓋與明經墨義無以異矣况有博聞強記如巽岩者聚諸家竒僻之書掇其可以為論題者抄為一編揣摩收拾殆無所遺然則淺學之士執此以往亦可哆然以賢良自名而有掇巍科之望矣科目取人之弊一至於此然觀邵氏聞見録言范文正公以制科薦富鄭公富公辭以未習范公曰已為君闢一室皆大科文字可往就館以是觀之所謂大科文字者往往即巽岩所編之𩔖是也以富公異時之徳業如許然應制科之初倘不求其文而習焉則亦未必能中選東坡作張文定公墓銘言天下大噐非力兼萬人孰能舉之非仁宗之大孰能容此萬人之英蓋即位八年而以制策取士一舉而得富弼再舉而得公蓋所以誇制科得人之盛然制科之為制科不過如此則二公之所藴蓄抱負此豈足以知之乎博學宏辭科紹興三年立此科凡十二題制誥詔表露布檄箴銘記贊頌序於内雜出六題分為三塲毎塲一古一今試人先投所業三卷朝廷降付學士院考其能者召試遇科塲年應命官除歸明流外入貲及嘗犯贓人外公卿大夫子弟之俊秀者皆得試每次所取不得過五人若人才有餘臨時取㫖具合格字號同真卷繳納中書看詳推恩則例比舊制更加優異以三等取人上等轉一官選人改秩無出身人賜進士及第並免召試除館職中等減三年磨勘與堂除無出身人賜進士出身下等減二年磨勘無出身人賜進士出身並許召試館職大觀中有詞學兼茂科建炎初猶有應者至是始更立焉自復科以來所得鴻筆麗藻之士多有至卿相翰苑者紹興中得十有七人隆興至淳熈得十有三人紹熈一人開禧至嘉定三人初洪遵入中等洪适入下等髙宗覽其文歎曰此洪皓子邪父在逺能自立忠義報也即以遵為祕書省正字适為樞密院編修官詞科即入館自遵始後三嵗洪邁繼之真徳秀留元剛應選有司書徳秀卷曰宏而不博書元剛卷曰博而不宏寧宗喜其文命俱寘異等其後有司值郡試必摘其微疵僅從申省或降㫖陞擢而已容齋洪氏隨筆曰本朝宏詞雖用唐時科目而所試文則非也自乙卯至於紹熈癸丑二十榜或三人或二人或一人并之三十三人而紹熈庚戌闕不取其以任子進者湯岐公至宰相王日嚴至翰林承㫖李獻之學士陳子象兵部侍郎湯朝美右史陳峴方進用而予兄弟居其間文惠公至宰相文安公至執政予冒處翰苑此外皆係已登科人然擢用者唯周益公至宰相周茂振執政沈徳和莫子齊倪正父莫仲謙趙大本傅景仁至侍從葉伯益季元衡至左右史餘多碌碌而見存未顯者陳宗召也然則吾家所䝉亦云過矣葉適論宏詞曰法或生於相激宏詞之廢乆矣紹聖初既盡罷詞賦而患天下應用之文由此遂絶始立博學宏詞科其後又為詞學兼茂其為法尤不切事實何者朝廷詔誥典冊之文當使簡直宏大敷暢義理以風曉天下典謨訓誥諸書是也孔子録為經常之詞以教後世而百王不能易可謂重矣至兩漢詔制詞意短陋不復髣髴其萬一蓋當時之人所貴者武功所重者經術而文詞者雖其士人譁然自相矜尚而朝廷忽畧之大要去刀筆吏之所能無幾也然其深厚温雅猶稱雄於後世而自漢以來莫有能及者若乃四六對偶銘檄贊頌循沿漢末以及宋齊此真兩漢刀筆吏能之而不作者而今世謂之竒文絶技以此取天下士而用之於朝廷何哉自詞科之興其最貴者四六之文然其文最為陋而無用士大夫以對偶親切用事精的相誇至有以一聮之工而遂擅終身之官爵者此風熾而不可遏七八十年矣前後居卿相顯人祖父子孫相望於要地者率詞科之人也其人未嘗知義其學未嘗知方也其才未嘗中噐也操紙援筆以為比偶之詞又未嘗取成於心而本其源流於古人也是何所取而以卿相顯人待之相承而不能革哉且又有甚悖戾者自熈寧之以經術造士也固患天下習為詞賦之浮華而不適於實用凡王安石之與神宗往反極論至於盡擯斥一時之文人其意曉然矣紹聖崇寧號為追術熈寧既禁其求仕者不為詞賦而反以美官誘其已任者使為宏詞是始以經義開廸之而終以文詞蔽淫之也士何所折𠂻故既以為宏詞則其人已自絶於道徳性命之本統而以為天下之所能者盡於區區之曲藝則其患又不特舉朝廷之髙爵厚禄輕以與之而已也反使人才陷入於不肖而不可救且昔以罷詞賦而置詞科今詞賦經義並行乆矣而詞科迄未嘗有所更易是何創法於始而不能考其終使不自為背馳也蓋進士制科其法猶有可議而損益之者至宏詞則直罷之而已矣文獻通考卷三十三
