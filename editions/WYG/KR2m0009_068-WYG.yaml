body:
  text: 文獻通考卷六十八鄱陽馬端臨貴與著郊社考一郊有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊𡨕祖契而宗湯周人禘嚳而郊稷祖文王而宗武王周公郊祀后稷以配天鄭氏注祭法曰禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圜丘也祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗祖宗通言耳有虞氏以上尚徳禘郊祖宗配用有徳者而已自夏以下稍用其姓氏先後之次有虞氏夏后氏宜郊顓頊殷人宜郊契郊祭一帝而明堂祭五帝小徳配寡大徳配衆亦禮之殺也正義曰鄭𤣥以祭法有周人禘嚳之文遂變郊為祀感生之帝謂東方青帝靈威仰周為木徳威仰木帝言以后稷配蒼龍精也王肅駁之謂漢世英儒自董仲舒劉向馬融之倫皆言周人祀昊天於郊以后稷配無如𤣥説配蒼帝也周頌思文后稷克配彼天昊天有成命郊祀上帝則郊非蒼帝通儒同辭肅意以為唯郊是祭天禘者宗廟之殷祭郊即圜丘圜丘即郊以所在言之謂之郊以所祭言之謂之圜丘於郊築泰壇以丘言之本諸天地之性也祭法所謂燔柴於泰壇則圜丘也郊特牲曰周之始郊日以至此言冬至祭圜丘而謂之郊者以圜丘在郊故也楊氏曰愚按大司樂冬至圜丘一章與禘祭絶不相闗而注妄稱圜丘為禘祭法禘祖宗三條分明説宗廟之祭惟郊一條謂郊祀以祖配天爾而注皆指為祀天大傳禮不王不禘一章言王者禘其祖之所自出諸侯只及其太祖大夫惟有功始祫其髙祖所論宗廟之祭隆殺逺近爾於祀天乎何與而注妄指為祀感生帝竊嘗疑鄭康成博洽大儒解釋他經最為有功及注此三章則同歸於誤其病果安在乎盖讀祭法不熟而失之也夫祭法歴叙四代禘郊祖宗之禮禘文皆在郊上盖謂郊止於稷而禘上及乎嚳禘之所及者最逺故先言之耳鄭氏不察謂禘又郊之大者於是以祭法之禘為祀天圜丘以嚳配之以大傳之禘為正月祀感生帝於南郊以稷配之且祭法之禘與大傳之禘其義則一皆言禘其祖之所自出也鄭氏强析之而為祀天兩義遂分圜丘與郊為兩處昊天上帝與感生帝為兩祀嚳配天與稷配天為兩事隨意穿鑿展轉枝蔓何其謬邪又以祀五帝五神於明堂而以文王武王配之謂之祖宗夫孝經所云宗祀文王於明堂以配上帝此嚴父之義也抗五神於五帝之列而以文武並配於理自不通矣况祖宗乃二廟不毁之名於配食明堂何闗焉夫因讀祭法一章之誤而三章皆誤不惟三章之誤而已又推此説以釋他經者不一而止疏家從而和之凡燔柴升煙樂舞酒齊之類皆分昊天與感生帝為兩等馴至隋唐之際昊天上帝與感生帝二祀常並行而不廢唐世大儒杜佑作通典惑於鄭注大傳之説亦以感生帝與昊天上帝並列而為二是又讀大傳本文不熟而失之也明堂襲鄭氏祖宗之義而以二帝配侑或三帝並配者盖有之矣幸而王肅諸儒力争之於前趙伯循與近世大儒辨正之於後大義明白炳如日星而周公制作精微之意可以復見不然則終於晦蝕而不明矣可勝歎哉按祀天莫大於郊祀祖莫大於配天四代之郊見於祭法經文簡畧後之學者莫不求之鄭注而注之叢雜牴牾如此先儒謂其讀祭法不熟見序禘於郊之上於是意禘之所祀者亦天也故盡以祀天然康成漢人也西漢之所謂郊祀盖襲秦之制而雜以方士之説曰泰一曰五帝叢雜而祀之皆謂之郊天太史公作封禪書所序者秦漢間不經之祠而必以舜𩔖上帝三代郊祀之禮先之至班孟堅則直名其書曰郊祀志盖漢世以三代之所郊祀者祀泰一五帝於是以天為有六以祀六帝為郊自遷固以来議論相襲而然矣康成注二禮凡祀天處必指以為所祀者某帝其所謂天者非一帝故其所謂配天者亦非一祖於是釋禘郊祖宗以為或祀一帝或祀五帝各配以一祖其病盖在於取䜟緯之書解經以秦漢之事為三代之事然六天之祀漢人崇之六天之説遷固志之則其謬亦非始於康成也愚嘗著漢不郊祀論見所叙西漢事之後郊特牲郊之祭也迎長日之至也易說曰三王之郊一用夏正夏正建寅之月也此言迎長日者建卯而書夜分分而日長也正音征兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也用犢貴誠也騂息營反也尚赤者周郊之用辛也周之始郊日以至言周以郊天之月而日至陽氣新用事順之而用辛日此説非也郊天之月而日至魯禮也三王之郊一用夏正魯以無冬至祭天於圜丘之事是以建子之月郊天示先有事也用辛日者凡為人君當齋戒自新耳周衰禮廢儒者見周禮盡在魯因推魯禮以言周事䟽曰王肅用董仲舒劉向之説以此為周郊上文云郊之祭迎長日之至謂周之郊祭於建子之月而迎此冬至長日之至也而用辛者以冬至陽氣新用事故用辛也周之始郊日以至者對建寅之月又祈穀郊祭此言始者對建寅為始也鄭康成則異於王肅上文云迎長日之至自據周郊此云郊之用辛據魯禮也言郊用辛日者取齋戒自新周之始郊日以至者謂魯之始郊日以冬至之月云始者對建寅之月天子郊祭魯於冬至之月始初郊祭示先有事故云始也長楊氏曰郊祭言迎長日之至也謂冬至陽之始日漸故冬至郊天所以迎長日之至也下文郊之用辛也周之始郊日以至謂以冬至郊天取陽新用事故用辛日也二説皆取冬至郊天也董仲舒劉向漢之大儒又在鄭氏之前鄭氏不從其言必以迎長日為建寅之月郊天迎春分之長日又以周之始郊為魯郊者盖鄭氏欲分圜丘與郊為兩事周既以冬至禘圜丘則冬至不得復有郊故用易緯之説以周郊用建寅之月此云周之始郊日以至者非周之始郊乃魯之郊也但此章本文明言周之始郊今乃以周為魯豈不謬哉日又按聖證論王肅與馬昭之徒或云祭天用冬至之或云用冬至之月據周禮圜丘則用冬至之日據禮記日用辛則冬至不常在辛似用冬至之月如鄭注云用辛日也者凡為人君當齋戒自新是亦不用冬至日湏用辛日也祭之日王皮弁以聽祭報示民嚴上也䟽曰未郊故未服大裘而且服日視朝之服也喪者不哭不敢凶服氾埽反道鄉為田燭氾芳劍反本亦作汎埽素報反服疏曰郊祭之旦人之喪者不哭又不敢凶而出以干王之吉祭也氾埽反道者汜埽廣埽也反道剗路之土反之令新土在上也郊道之民家家各當界廣埽新道也鄉為田燭者鄉謂郊内六鄉也六鄉之民各於田首設燭照路恐王嚮郊之早弗命而民聽上疏曰弗命而民聽上者合結喪者不哭以下至此並非有王命而民化主嚴上故也祭之日王被袞以象天謂有日月星辰之章此魯禮也周禮王祀昊天上帝則服大裘而冕祀五帝亦如之魯侯之服自袞冕而下也祭楊氏曰此章始言周之始郊王立於澤王皮弁以聽報王被袞以象天言王者不一而足而鄭注以為魯禮魯可稱王乎魯之郊禘非禮也聖人嘗歎之矣况可以稱王乎戴冕璪十有二旒則天數也璪音早過天之大數不十二乘素車貴其質也旂十有二旒龍章而設日月以象天也天垂象聖人則之郊所以明天道也明謂則之以示人也事䟽曰總結上王被袞冕以下之言天垂日月之象各有其數故聖人則之郊天象日月所以光明天之道以示於人也萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也疏曰此論祖配天之義人本於祖物本於天配本故也郊之祭也大報本反始也天為物本祖為王本祭天以祖配盖所以報謝其本反始者反其初始謝其恩謂之報歸其初謂之反長樂陳氏曰先王祀天有文以示外心之勤有質以示内心之敬故因丘掃地陶匏藁秸疏布樿杓素車之𩔖此因其自然以示内心之敬也執鎮圭繅藉五采五就旂龍章而設日月四圭有邸八變之音黃鍾大吕之鈞此致其文飾以示外心之勤也然則内服大裘以因其自然外被龍袞戴冕璪以致其文飾不以内心廢外心不以自然廢文飾然後事天之禮盡矣山隂陸氏曰周禮祭天王乘玉輅建太常特牲祭天王乘素車建大旂則祭天之禮有兩旂兩車也盖乘玉輅建太常者即道之車也祭之日馭以適郊乘素車建大旂者即事之車也祭之時馭以赴壇何以知其然也曰巾車王之玉輅鍚樊纓十有再就建太常十有二斿以祀則凡王之祭祀無所不乘矣祭天者禮之至也而乘泛祭之玉輅以祭之以物則非文以志則非敬非禮意故知乘素車建大旂以祀之而玉輅者乘以適郊固有兩車也月令孟春之月天子乃以元日祈榖于上帝謂以上􅉝郊祭天也傳孟獻子曰夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕啓蟄夏正建寅之月祀天南郊郊而後耕是祈穀之後躬耕帝籍疏曰夏小正曰正月啓蟄其傳曰言始發蟄也故漢氏之始以啓蟄為正月中雨水為二月節及太和以後更改氣名以雨水為正月中驚蟄為二月節以迄於今踵而不改楊氏曰愚按正月郊祭天此鄭注所謂夏正之郊祭感生帝者也學者當以聖經賢傳為信考之月令之書周頌之詩左傳孟獻子之言則曰祈榖于上帝夫上帝即昊天上帝未聞有感生帝之説也曰祈榖又曰祈農事可知其為祈榖之郊未聞正月又有大報天之郊也愚於祀天禮辨之已詳矣鄭氏月令注引易緯三王之郊一用夏正之説以證正月之有郊又引后稷祈農事之説以見因郊而又祈榖牽合二説而通為一説此鄭氏一人之詖論非聖經之本意天下之公言也是以諸儒咸不以為然更漢魏歴晉宋至於齊梁陳數百年之久其説未行也及北齊諸儒識見鄙闇始取其説而行之於是昊天上帝與感生帝分為兩祀祈穀與祭感生帝合為一説隋唐承用其説至於今而不廢推原所自是誰之過與然正理存人心萬世不磨邪説終不能勝也必也知冬至之郊為大報天正月之郊事為祈穀二郊不同而皆配以后稷則注家誣蠧之説可以一掃而先王祀天之大典始昭然而可見矣按古者一嵗郊祀凡再正月之郊為祈穀月令及孟獻子所言是也十一月之郊為報本郊特牲所言是也家語定公問於孔子曰寡人聞郊而莫同何也孔子曰郊之祭也迎長日之至也大報天而主日配以月故周之始郊其月以日至其日用上辛至於啓蟄之月則又祈穀于上帝此二者天子之禮也魯無冬至大郊之事降殺於天子是以不同也公曰郊之牲器若何孔子曰上帝之牛角繭栗必在滌三月后稷之牛惟具注見祀天牲牢條下牲用騂尚赤也用犢貴誠也掃地而祭貴其質也器用陶匏以象天地之性也萬物無可稱之者故因其自然之體也公曰天子之郊其禮何可得聞乎孔子對曰臣聞天子卜郊則受命於祖廟而作龜於禰宫尊祖親考之義也卜之日王親立於澤宫以聽誓命受教諫之義也既卜獻命庫門之内所以戒百官也太廟之命戒百姓也將郊則天子皮弁以聽報示民嚴上也郊之日喪者不敢哭凶服者不敢入國門汎埽清路行者必正弗命而民聽敬之至也天子大裘以黼之被裘象天乘素車貴其質也旂十有二旒龍章而設日月所以法天也既至泰壇王脱裘矣服袞以臨燔柴戴冕璪十有二旒則天數也楊氏曰按此章言天子被裘象天既至泰壇脱裘服袞以臨燔柴不知然否春秋宣三年公羊傳曰郊則曷為必祭稷王者必以其祖配祖謂后稷王者則曷為必以其祖配自内出者無匹不行匹合也無所與㑹合則不能行自外至者無主不止必得主人乃止者天道闇昧故推人道以接之不以文王配者重本尊始之義也詩序曰郊祀天地記曰因天事天因地事地因名山升中於天名猶大也升上也中猶成也謂廵守至於方嶽燔柴祭天告以諸侯之成功也因吉土以饗帝於郊吉土王者所卜而居之土也饗帝於郊以四時之所兆祭於四郊者也升中於天而鳳凰降龜龍假功成而太平隂陽氣和而致象物饗帝於郊而風雨節寒暑時五帝主五行五行之氣和而庶徵得其序也五行木為雨金為暘火為燠水為寒土為風是故聖人南靣而立而天下大治燔柴於泰壇祭天也瘞埋於泰折祭地也周禮凡樂圜鍾為宫冬日至於地上之圜丘奏之若樂六變則天神皆降凡樂函鍾為宫夏日至於澤中之方丘奏之若樂八變則地示皆出爾雅曰邑外謂之郊又曰非人為謂之丘陳氏禮書曰祀天於南郊而地上之圜丘者南郊之丘也丘圜而髙所以象天此所謂為髙必因丘陵也祭地於北郊而澤中之方丘者北郊之丘也丘方而下所以象地此所謂為下必因川澤也泰壇南郊之壇也以之燔柴泰折北郊之坎也以之瘞埋言壇則知泰折之為坎言折則知泰壇之為圜言泰則大之至也言壇折則人為之也祭祀必於自然之丘所以致敬燔瘞必於人為之壇折所以盡文宗廟之禮瘞埋於兩階之間則壇必設於圜丘之南折必設於方丘之北矣燔柴以升煙瘞埋以達氣則燔必於樂六變之前瘞必於樂八變之前矣先王燔瘞於郊丘其牲角繭栗其牲體全脀國語曰郊禘之事有全脀其􅅅其器犧尊疏布羃樿杓豆豋鼎俎簠簋匏爵之類詩曰于豆于豋記曰器用陶匏大宗伯凡祀大神祭大示涖玉鬯省牲鑊奉玉齍記又曰以供上帝之粢盛國語曰天子親舂郊禘之盛則郊有簠簋可知矣其藉蒲越藁秸記曰莞簟之安藁秸之尚其樂歌黄鍾太蔟奏大吕應鍾其舞雲門咸池其鼓雷鼓靈鼓其車玉輅素車其旂太常其服大裘袞冕其搢執則大圭鎮圭其位則神南靣王北面示北面王南面而日月從祀則日居東月居西記曰祭社之禮君南鄉於北牖下答隂之義推此則圜丘之上王北鄉可知也又曰大明生於東月生於西郊主日而配月則日月之位固東西設矣郊主日猶王燕則主膳夫王嫁女則主諸侯古法見君則主侍人皆致嚴於尊而郊祀於卑也其禮不過因其自然以報本反始教民嚴上而已古者郊祀大畧如此而已更秦則興鄜宻上下之四畤以祠五帝至漢則増之以北畤以祠五帝秦之祠天不於圜丘謂天好隂而兆於髙山之下其祠地不於方丘謂地貴陽而兆於澤中之圜丘漢之祠天不於南郊而於甘泉其祠地不於北郊而於汾隂河東以至壇有八觚後世壇有八陛祀天其上奏樂其下非先王埽地而祭之意席有六采樂有玉女車有鸞輅騂駒龍馬一切侈靡而匡衡劉向之徒邪正異同之説蠭起一時元始之間繆戻尤甚春則天地同牢於南郊冬夏則天地分祭於南郊光武兆南郊於雒陽之陽兆北郊於雒陽之隂其禮儀度數一遵元始之制而先王之禮隳廢殆盡良可悼也右經傳所載古郊祀之禮周禮以蒼璧禮天禮謂始吿神時薦於神座書曰周公植璧秉圭是也此禮天以冬至謂天皇大帝在北極者也禮神必象其𩔖璧圜象天用植音值疏曰易云天元而地黄蒼元皆是天色故蒼也此以玉禮神當燔柴之節也經楊氏曰天皇大帝亦出於星經在六無所見牲幣放其器之色放方徃反有幣以從爵若人飲酒有酬幣獻疏曰按聘禮饗時酬幣明此既非禮神之幣則尸後酬尸時亦有幣之從爵也大春官宗伯作楊氏曰大􅈗注云玉幣所以禮神疏引宗伯以玉六器以禮天地四方為證謂王親自執玉幣奠於神座以禮神也大宗伯疏只云非禮神之幣乃酬尸之幣是禮神酬尸各有幣也然經但云牲幣各放其器之色則幣一而已注疏又别而為二恐未必然也又按通典云禮神之玉以蒼璧其牲及幣各隨玉色幣用繒長丈八尺通典之説盖以鄭元注聘禮釋幣制云制丈八尺疏云若作制幣者毎卷丈八尺為制合為匹也以上禮天玉幣郊特牲疏曰郊所以用特牲者天神至尊無物可稱故用特牲郊與配座皆特牲召誥云用牲于郊牛二是也又禮器曰祭天特牲祭天地之牛角繭栗王制曰又國語楚語郊特不過繭栗郊事則有全烝烝升也全其牲化而升之國語周語陽祀用騂牲毛之騂私營反於騂牲赤色毛之取純毛也元謂陽祀祭天南郊及宗廟也地官牧人又祭法曰用騂犢楊氏曰鄭氏謂以蒼璧禮天牲幣各放其方之色則當用蒼犢祭法乃云用騂犢其色不同故以蒼璧蒼犢為祀昊天圜丘所用以騂犢為祀感生帝南郊所用鄭元王肅兩家問難備見郊特牲疏今不備載愚竊以理推之天道渾全隂陽五行具備不比五方各偏主一色逺望則其色蒼純陽則其色赤故説卦曰乾為大赤故周為赤色用騂犢又如夏用元牡殷用白牡亦是天道渾全不偏主一色又何以蒼犢為疑若鄭分圜丘與郊為二則諸儒辨之明矣郊血疏曰崔氏云周禮之法郊天以燔柴為始宗廟以祼地為始社稷以血為始小祀疈辜為始此云郊血者謂正祭之時薦於尸座之前也至敬不饗味而貴氣臭也者觧郊血義血氣也夫熟食有味味者為人道人道卑近而天神尊貴事宜極敬極敬不䙝近故用血也用血是貴氣而不重味故云貴氣臭也正郊特牲皆又禮器郊血疏曰凡郊與大饗三獻之屬祭之時有血有腥有爓有熟此云郊血周語云禘郊之事則有全脀是郊祭天有熟也有熟則腥可知也今言郊血者皇氏云此據設之先後郊則先設血後設腥與熟雖以郊為主其祭天皆然也帝牛不吉以為稷牛養牲必養二也也疏曰郊天既以后稷為配故養牲養二以卜祭若帝牛不吉或死傷以為稷牛者為猶用也為用稷牛而為帝牛其祭稷之牛臨時别取牛用之帝牛必在滌三月稷牛唯具滌音廸上滌牢中所搜除處搜所流反以疏曰此覆説文帝牛不吉而取稷牛之事帝牛既尊必湏在滌三月今帝牛不吉故取稷牛已在滌三月也其祀稷之牛臨時别取故云稷牛唯具郊特牲天此上祀之牲酒正辨五齊曰泛齊醴齊盎齊緹齊沈齊泛方劍反齊才細反盎烏浪反緹音體翁泛者成而滓浮泛泛然醴成而汁滓相將盎成而翁然葱白色緹者成而紅赤沈者成而滓沈自醴以上尤濁盎以下差清其象𩔖則然古之法式未可盡聞疏三酒事酒酌有事之人謂於祭末卑賤之人得飲之昔酒乆釀乃熟故名昔酒酌無事之人於祭末羣臣陪位不行事者飲之清酒更久於昔酒祭時賔長獻尸尸酢賔長不敢與王之臣共器同酌故酌清以自酢事酒春成以漢之醳酒况之昔酒乆乃成冬釀接春成清酒又乆於昔酒冬釀接夏成五齊三酒俱用秋稻麴蘖但三酒味厚人所飲也五齊味薄所以祭也通言之齊亦曰酒故禮云醴酒醍酒其鬯酒則自用黒黍為之與此别陳氏曰齊之作也始則其氣泛然次則有酒之體中則盎然而浮乆則赤終則沈辨三酒曰事酒昔酒清酒元謂事酒酌有事者之酒昔酒今之酋乆白酒所謂舊醳者也清酒今中山冬釀接夏而成大祭三貳鄭司農云三貳三益副之也大祭天地元謂王服大裘衮冕所祭也羃人祭祀以疏布巾羃八尊羃莫歴反唯以疏布者天地之神尚質布疏曰祭天無灌有五齊三酒實於八尊疏者大功布為羃覆此八尊此據正尊而言若五齊加明水三酒加元酒則十六尊皆以疏布羃之也又曰鄭知此經祭祀是天地之神者以其下經畫布羃六彜是宗廟之祭用六彜即知此疏布羃八尊無灌是天地可知舉天地則四望山川社稷林澤皆用疏布皆是尚質之義也又以畫布羃六彜疏曰天地亦有秬鬯之彜用疏布互舉以明義也存之大羮不和犧尊疏布鼏樿杓大音泰和胡卧反犧素何反王如字樿章善反又市戰反初疏曰大羮不和者大羮肉汁也不和無鹽梅也太古變腥但煮肉而飲其汁未知調和後人祭既重古故但盛肉汁謂之大羮不和犧尊者先儒云刻尊為犧牛樿杓者樿白理木也貴素故用白理木為杓著禮器尊楊氏曰周禮司尊彜有六尊犧尊象尊壺尊尊大山尊其尊名兩相對則十二尊也天地八尊不知所用何尊禮器言犧尊疏布鼏樿杓則知祭天八尊専用犧尊以疏布為羃以樿木為其杓也鬯人掌共秬鬯而飾之秬鬯不和鬱者飾之謂設巾疏曰此直共秬黍之酒無鬱也故注云不和鬱者也春官天子親耕粢盛秬鬯以事上帝疏曰按小􅈗注云天地大神至尊不祼此祭上帝有秬鬯者凡鬯有二若和之以鬱謂之鬰鬯鬰人所掌是也祭宗廟而灌也若不和鬱謂之秬鬯鬯人所掌是也謂五齊之酒以秬黍為之以芬芳調暢故言秬鬯故得以事上帝粢表記已上祀天酒齊盛蒲越稾鞂郊特牲曰莞簟之安而蒲越稾鞂之尚明之也莞音官徐音九簟大㸃反越音活稾古老反鞂簡入反居蒲越稾鞂藉神席也明之者神明之也疏曰凡常下莞上簟祭天則蒲越稾鞂之尚也今禮及隋禮稾鞂為祭天席蒲越為配帝席俱藉神也器用陶匏陶謂瓦器謂酒尊及豆簋之屬故周禮旊人為簋匏謂酒爵用郊特牲瓦郊特牲而社稷大牢疏曰其祭天之器則陶匏陶器以薦菹醢之屬故詩述后稷郊天云于豆于豋注云木曰豆瓦曰豋是用薦物也匏酌獻酒故詩大雅羙公劉云酌之用匏注云儉以質祭天尚質故酌亦用匏為尊之通典云尊及薦菹醢器並以瓦爵以匏片為卭盛于豆于豆于豋其香始升上帝居歆胡臭亶時卭五郎反盛音成云卭我也木曰豆瓦曰豋豆薦菹醢也豋薦大羮也箋胡之言何也亶誠也我后稷盛菹醢之薦當于豆者其馨香始上行上帝則居安之歆享之何芳臭之誠得其時乎羙之也祀天用瓦豆陶器質也大雅生民詩先陳氏曰爾雅木豆謂之豆竹豆謂之籩瓦豆謂之登儒謂宗廟之簋豆用木天地之簋豆用瓦然詩述祀天之禮言于豆于登則祀天有木豆矣鼎聖人亨以享上帝易鼎卦天已上祀之器四圭有邸以祀天邸丁禮反又音帝一鄭司農云中央為璧圭著其四面玉俱成爾雅曰邸本也圭本著於璧故四圭有邸圭末四出故也或説四圭有邸有四角也著直畧反疏曰司農云於中央為璧謂用一大玉琢出中央為璧形亦肉倍好為之四面琢各出一圭璧之大小圭之長短無文天子以十二為節盖四廂圭各尺二寸與鎭圭同其璧為邸盖徑六寸總三尺與大圭長三尺又等故云一玉俱成也又或説四圭有邸有四角也者此説四角角即短矣以無正文故兩釋之也春官典瑞揚氏曰四圭有邸以祀天即冬官玉人之事四圭尺有二寸以祀天也玉人之事其上也典瑞所掌之官也玉人之事疏曰先鄭云中央為璧圭著其四面一玉俱成又云圭末四出若然此尺二寸者未知璧在中央通兩畔總計為尺二寸未知除璧之外兩畔之圭各有一尺二寸據下祼圭尺有二寸而言則此四圭圭别尺有二寸仍未審以璧為邸邸徑幾許禮既無文不可强記也又江都集禮徐乾謙曰周禮典瑞云四圭有邸以祀天云蒼璧禮天兩玉不同而並云祀天是有二天可知也徐邈曰璧以禮神圭以自執故曰植璧秉圭非圜丘與郊各有所施楊氏曰徐邈植璧秉圭之言若足以破注疏二天之説或者又謂璧圜色蒼所以象天天有四時四圭有邸亦所以象天非王所執之圭也伏覩國朝會要禮制局言以蒼璧禮天四圭有邸以祀天盖蒼璧以象體四圭有邸以象用故於蒼璧言禮於四圭有邸言祀説者謂禮神在求神之初祀神在薦獻之時盖一祭而兩用也此義與徐邈不同姑兩存之已上係祀天之玉王祀昊天上帝則服大裘而冕鄭司農云大裘羔裘也元謂書曰予欲觀古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻希繡此古天子冕服十二章舜欲觀焉華蟲五色之蟲繢人職曰鳥獸蛇雜四時五色以章之是也希讀為絺或作黹字之誤王者相變至周而以日月星辰畫於旌旗所謂三辰旂旗昭其明也而冕服九章登龍於山登火於宗彝尊其神明也疏曰元謂書曰至希繡而云此古天子冕服十二章舜欲觀焉者欲明舜時十二章至周無十二章之意也然古人必為日月星辰於衣者取其明也山取其人所仰龍取其能變化華蟲取其文理作繢者繢畫也衣是陽陽至輕浮畫亦輕浮宗彝者據周之􅂜尊有虎彝蜼彝因於前代則虞時有蜼彝虎彝可知藻水草取其有文火取其明粉米取其潔亦取養人黼謂白黑為形則斧文近刃白近上黑取其斷割焉黻黑與青為形則兩已相背取臣民背惡向善希繡者謂刺繒為繡但裳主隂刺亦是沈深之義云王者相變至周而以日月星辰畫於旌旗者若孔君義虞時亦以日月星畫於旌旗與周同云九章此無正文並鄭以意觧之司服天官司裘掌為大裘以共王祀天之服注曰鄭司農云大裘黑羔裘服以祀天示質疏曰言大者以其祭天地之服故以大言之又曰先鄭知大裘黒羔裘者祭服皆元上纁下明此裘亦羔裘之黑者按鄭志大裘之上又有元衣與裘同色亦是無文采元豐間神宗問陸佃大裘佃對以禮記玉藻云禮不盛服不充故大裘襲可知又曰郊之日王被衮以象天則大裘襲衮可知大裘襲衮則戴冕璪十有二旒可知神宗稱善詔有司製黑羔為裘而被以衮衣楊氏曰先儒謂大裘之上有元衣元衣之上有十二章鄭乃云大裘之上有元衣無文采鄭氏又謂有虞氏十二章周止九章其説皆非即司服經文熟讀而詳玩之則知有虞氏十二章周亦十二章昭然甚明公之服自衮冕而下侯伯之服自鷩冕而下夫衮冕九章鷩冕七章公之服自衮冕而下推而上之則天子之服有日月星辰之章可知公之服九章則天子之服十二章可知此不待旁引别證而知鄭説之非矣舜曰予欲觀古人之象盖十二章自日月星辰而下從古而然矣孰謂禮樂大備於周而獨不然乎郊所以明天道取象非一端也冬至圜丘大裘而冕則天之時也席用藳秸器用陶匏則天之質也服有日月星辰之章則天之明也璪十有二旒則天之數也鄭氏乃謂有虞十二章至周而以日月星辰畫於旌旗冕服惟有九章然公自衮冕而下王又自衮冕而下君臣同冕畧無區别必無是理賈公彦疏云孔氏九章此無正文並鄭以意觧之則疏家已知其非而不信之矣惟其並以意觧故後世遵用其説始有悟其上下之亡等尊卑之失次者魏明帝以公卿衮衣黼黻之制疑於至尊遂制天子服繡文公卿服繡文矣唐長孫無忌以帝祭社稷服絺冕四旒三章祭日月服元冕三旒衣無章而三公亞獻服衮孤卿服毳鷩貴盛無分而天子遂止於服衮他冕盡廢者矣先王制禮必本於天理人情之公自上古至於周天子仰則天數路十二就常十二斿馬十二閑圭尺二寸璪十二旒而冕服之章莫不皆然鄭氏謂周以日月星辰畫於旌旗故冕止九章不知龍登於旂山登於俎黼登於扆九章亦可損乎前乎康成如漢明帝用歐陽説義天子備十二章三公諸侯用山龍九章九􅀸以下用華蟲七章其説猶用周制也自鄭氏以意觧經九章之說於是乎始故行之後世卒有不厭於人心并與古制而去之者可勝歎哉餘見祀地禮及祭物篇祭服條戴冕璪十有二旒璪音早十天之大數不過二過音古禾反祀郊特牲已上王天裘冕玉路鍚樊纓十有再就建太常十有二斿以祀鍚音陽樊步干反斿音留官疏曰外内大小祭祀皆用此一路玉春官巾車春司常日月為常王建太常疏曰乘輅則建太常從夏官節服氏衮冕六人維王之太常注曰服衮冕者王服也維維之以縷注疏並詳見王禮考車旗條大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之軷蒲末反祝之右反以行山曰軷犯之者封土為山象菩芻棘柏為神主既祭之以車轢之而去喻無險難也王由左馭禁制馬使不行也疏曰此據祭天之時故有犯軷之事云犯軷者出國門封土為山象鄭注月令祀行之禮為軷壇厚三尺廣五尺此道祭亦當然云菩芻棘柏為神主謂於三者之中但取用其中之一以為神主則可也夏官詳見祭物篇車旗條乘素車旂十有二旒龍章而設日月素車殷輅也設日月畫於旂上疏曰乘殷之樸素之車貴其象天之質也所建之旂十有二旒畫龍為章而設日月象天數十二也郊特牲禮器大路繁纓一就疏曰殷尚質以木為車無别雕飾乘以祭天謂之大路也繁謂馬腹帶也纓鞅也染絲而織之曰罽五色一帀曰就就成也言五色帀一成車既樸素故馬亦少飾止一就也繁步干反罽車例反郊特牲同禮器大路素而越席疏曰大路殷祭天之車也越席蒲席也祭天本質素故素車蒲席也越音活又桓公二年左氏傳大路越席疏曰路訓大也巾車五路玉路為大故杜以玉路為大路楊氏曰左傳注疏與禮器郊特牲注疏不同姑兩存之大又按巾車一曰玊輅以祀郊特牲曰乘素車禮器曰路素而越席二説不同夫子答顔淵曰乘殷之輅盖素車者殷輅也飾以金玉者周制郊特牲禮器疏以素車為殷輅其言盖有所據使周亦乘素車則孔子不曰乘殷之輅矣已上王祀天之車旗大司樂大合樂分樂乃奏黃鍾歌大呂舞雲門以祀天神凡六樂者六變而致象物及天神凡樂圜鍾為宫黄鍾為角太蔟為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣圜鍾夾鍾也夾鍾生於房心之氣房心為大辰天帝之明堂祭疏曰禮天神必於冬至者以天是陽還於陽生之日之也春官詳見祭物樂條陳襄奏議曰夫祀天必以冬至日以其陽氣來復於上天之始也故宫用夾鍾於震之宫以其帝出乎震也而謂圜鍾者取其形以象天也三一之變圜鍾為宫三變黄鍾為角太蔟為徵姑洗為羽各一變合陽竒之數鼓人以靁鼓鼓神祀雷鼓八面鼓也神祀天神也地官以上祀天之樂右祀天禮物樂舞前期十日太宰掌百官之誓戒與其具脩前期十日帥執事而卜日遂戒誓戒重失禮也具所當共修掃除糞洒十日容㪚齊七日致齊三日執事宗伯太卜之屬既卜又戒百官以始齊㪚西但反齊側皆反天官春官大宗伯帥執事而卜日注曰執事諸有事於祭者疏曰太􅈗不掌祭祀故云宗伯大卜之等而已此大宗伯主祭祀之事故云諸有事於祭者也祭肆師凡祭祀之卜日宿為期詔相其禮注曰宿先卜之夕疏曰云卜日宿為期則是卜前之夕與卜者及諸執事者以明旦為期也太史大祭祀與執事卜日戒及宿之日與羣執事讀禮書而協事與之者當視墨協合也致疏曰戒謂㪚齊七日宿謂齊三日協事恐事有失錯物有不供也法小史大祭祀讀禮法疏曰太史讀禮書即此禮也春官大宗伯詔大號治其大禮詔相王之大禮治猶簡習也豫簡習大禮至祭當以詔相王為疏曰大號神號大祝是事神之人知所詔是詔大祝祝版之辭也詔相者謂未至之時詔吿之及其行事則又相之春官齊右掌祭祀前齊車齊車金路也前齊車立於馬前備驚奔也楊氏曰前期十日乃㪚齊之初此齊右前齊車謂齊時所乘金路也又荀子曰端衣元裳冕而乘路此謂齊時所服之服及所乘之路也夏官齊服有元端司服齊則綪結佩而爵韠綪側耕反齊綪屈也結又屈之思神靈不在事也爵韠服元端疏曰齊則綪結佩此謂總包凡應佩玊之人非惟世子綪結佩綪屈也謂結其綬而又屈上之也而爵韠者謂士元端齊故爵韋為韠也而熊氏皇氏並謂諸侯以下皆以元端齊而以爵韋為韠同士禮以其齊故不用朱韠素韠也義或然也玊藻王齊日三舉鄭司農云齊必變食時疏曰齊謂㪚齊致齊齊必變食齊不樂故不言以樂侑食變天官膳夫酒論語齊必變食居必遷坐朱子注曰食謂不飲不茹葷遷坐易常處也玉府王齊則共食玉玉是陽精之純者食之以禦水氣鄭司農云王齊當食玉屑天官鬯人凡王之齊事共其秬鬯給洗浴為疏曰鄭知王齊以鬯洗浴以其鬯酒非如三酒可飲之物明此亦給王洗浴使之香羙也春官傳卜郊受命于祖廟作龜于禰宫尊祖親考之義也受命謂吿之退而卜受疏曰郊事既尊不敢専輙故先吿祖後乃卜亦如命也故禮器云魯人將有事於上帝必先有事於頖宫也作龜於禰宫者作灼也禰宫禰廟也先吿祖受命又至禰廟卜之也尊祖親考之義也者考亦禰也尊祖故受之命命宜由尊者出親禰故作龜是事事宜就親近者也卜之日王立于澤親聽誓命受教諫之義也澤澤宫也所以擇賢之宫也既卜必到澤宫擇可與祭祀者因誓敕之以禮也禮器曰舉賢而置之聚衆而誓之是也疏曰王在於澤宫中以射擇士故因呼為澤宫也王卜已吉又至澤宫射以擇賢者為助祭之人鄭注鄉射記云嚮之取也於囿中勇力之取也今之取也以澤宫揖讓之取也澤習禮之處親聽誓命者因澤宫中又使有司誓敕舊章齊戒之禮王又親聽受命受教諫之義也者吿祖作禰是受教義也又立澤聽誓是受諫義也獻命庫門之内戒百官也太廟之命戒百姓也王自澤宫而還以誓命重相申敕也庫門在雉門之外入庫門則至廟門外矣太廟祖廟也百官公卿以下百姓王之親也王自此還齊路寢之室以疏曰王自澤宫而還至欲致齊之時有司獻王所命百官之事王乃於庫門之内戒百官太廟之内戒百姓百官疏故在公朝重戒之百姓王之親屬故在太廟而重戒之又曰以上有百官之文故以百姓為王之親也王親謂之百姓也者皇氏云姓者生也並是王之先祖所生鄭既云王自此還齊路寢之室則此經戒百官百姓則祭前三日欲致齊之時以誓命重相申敕也特郊牲祀之前日太宰及執事眂滌濯眂音視祭疏曰及猶至也謂致前日太宰眂滌濯按小宗伯大祭祀眂滌濯大宗伯亦云宿眂滌濯彼二官親眂滌濯太宰尊徃涖之宰夫肆師同大宗伯涖玉玉禮神之玉也小宗伯省牲察其不如法大司樂宿縣遂以聲展之縣音元其疏曰謂展省聽之知完否善惡祀之日祀之日圭玉牲犢酒齊祭器冕服車旗等並已見前雞人夜嘑旦以嘂百官嘑火呉反嘂古弔反興嘑旦以警起百官使夙巾車大祭祀鳴鈴以應雞人雞人主呼旦鳴鈴以和之聲且警衆也典路若有大祭祀則出路贊駕説説書鋭反舍車也趣出路王當乘之贊駕説贊僕與馬也春官王皮弁以聽祭報報猶白也夙興朝服以待白祭事者而後服祭服而行事也郊特牲小宗伯告時于王告備于王時薦陳之晩早備謂饌具也春官大祝大禋祀逆牲春官太宰及納亨贊王牲事納亨納牲將吿殺謂鄉祭之晨既殺以授亨人也天官大宗伯省牲鑊省息井反鑊户郭反亨鑊亨牲器也疏曰省視牲之鑊官春燔柴於泰壇燔音煩壇疏曰燔柴於泰壇者謂積薪於上而取玉幣及牲置柴上燔之使氣達於天也自祭法然元豐元年九月陳襄等言陽祀自煙始隂祀血始則升煙瘞血以致神明不可不在先也及致神祇矣方有事焉至於禮畢則以牲幣之屬而燔瘞之然後為禮之終故儀禮謂祭天燔柴祭地瘞牲而鄭氏以為祭禮終矣備矣先儒有謂於燔瘞之始即用牲幣之屬既不經見而又未薦神遽已燔瘞之則是備於先而闕於後也至後世知燔瘞牲幣於祭末而不知致神於其始則是備於後而闕於先也請祀南北郊先行升煙瘞血之禮俟薦獻禮畢即燔瘞牲幣之屬則始終之禮備從之至敬不壇掃地而祭燔柴訖於壇下掃地而設正祭此周法也禮器楊氏曰禮器曰禮有以下為貴者至敬不壇掃地而祭謂正祭在地而不在泰壇也特燔柴於泰壇之上而已後世正祭在壇上從祀神位又衆於是壇有四成三成之制又為三壝以嚴内外之限則非古矣小臣大祭祀沃王盥盥音管爵疏曰大祭祀天地宗廟皆是王將獻尸先盥手洗乃酌獻故小臣為王沃水盥手也夏官白太宗皇帝至道二年禮儀使宋言請先詣罍洗後奠玉帛從之大宗伯奉玉疏曰天地有禮神之玉始涖之祭又奉之春官郊血禮器疏曰郊則先設血郊特牲疏曰謂正祭之時薦於尸座之前也禮器郊特牲同太宰及祀之日贊玉幣爵之事玊幣所以禮神爵所以獻齊酒不用玉爵尚質也三者執以從王而授之天官小宰贊玊幣爵疏曰太宰職云贊玉幣爵今此又云贊此三者謂小宰執以授太宰太宰執以授王郊特牲疏皇氏曰置蒼璧於神座次則以豆薦血腥祭天無祼故鄭注云小宰云惟人道宗廟有祼天地大神至尊不祼莫稱焉然則祭天惟七獻也故鄭注周禮云大事於太廟備五齊三酒則圜丘之祭與宗廟祫同朝踐王酌泛齊以獻是一獻也后無祭天之事大宗伯次酌醴齊以獻是為二獻也王進爵之時皆奏樂但不皆六變次薦熟王酌盎齊以獻是為三獻也宗伯次酌緹齊以獻是為四獻也次尸食之訖王酌朝踐之泛齊以獻是為五獻也又次宗伯酌饋食之緹齊以獻是為六獻也次諸臣為賔長酌泛齊以獻是為七獻也以外皆加爵非正獻之數其尸酢王以清酒酢宗伯以昔酒酢諸臣以事酒從上至此皆皇氏所説皇氏以圜丘之祭賔長終獻不取沈齊而取泛者以禮運約之沈齊當在堂丘下不可用之故更上取泛齊按禮運沈齊在廟堂之下尚得酌之升堂以獻何為圜丘沈齊獨不可用乎若以圜丘髙遠不可下取沈齊凡齊泛醴為尊盎緹為卑賔長終獻祗可以次用緹齊何得反用泛齊乎今謂圜丘賔長之獻用沈齊也以其賔長是臣助祭終獻逺下於君故從丘下酌沈齊通典曰七獻者薦血腥後王以匏爵酌泛齊以獻尸所謂朝踐是也此為一獻次大宗伯攝王后之事亦以匏爵酌醴齊亞獻亦為朝踐是二獻毎獻奏樂一成次薦熟於神前薦畢王乃以匏爵酌盎齊以獻尸大宗伯以匏爵酌緹齊以亞獻所謂饋獻也通前凡四尸乃食食訖王更酌朝踐之泛齊以酳尸所謂朝獻大宗伯更酌饋獻之緹齊以亞酳所謂獻通前凡六又有諸臣為賔之一獻凡七其尸酢諸臣之酒皆用三酒其法如祫祭之禮畢獻之後天子舞六代之樂小宗伯逆齍逆齍受饎人之盛以入春官大宗伯奉齍疏曰齍謂黍稷天地當盛以瓦簠春官大司徒奉牛牲奉猶進也疏曰按國語郊之事有全脀若然則郊事先全脀後豚觧也之地官奉稷牛同楊氏曰奉盛奉牲皆正祭獻爵時也但周禮獻天爵數經無所考惟疏家及通典之説可見大畧近世祀天神祭地祇享宗廟通用三獻之禮恐未為正嘗聞富鄭公家祭用三獻程子謂之曰禮有九獻樂有九變公上公之家三獻太薄夫大臣用三獻之禮以享其祖考君子猶謂其太薄况人主躬行祀天之大禮而只用三獻可乎右祀天禮始終之序大祝辨六號一曰神號凡大禋祀執明水火而號祝明水火司烜所共日月之氣執之號祝明此圭潔也春官陳氏曰神號如曰昊天上帝也皇皇上天照臨下土集地之靈降甘風雨禮運曰地秉隂竅於山川庶物羣生各得其所靡今靡古言覆施均維予一人某敬拜皇天之祜古祝辭則云嗣王某或曰一人某王者親吿之辭也維某年某月上日年謂太嵗所在月正月也符大戴禮記公篇思文后稷配天也思文后稷克配彼天立我烝民莫匪爾極貽我来牟帝命率育叶曰逼反無此疆爾界叶訖力反陳常于時夏朱子曰賦也思語辭文言有文徳也立粒通極至也徳之至也貽遺也来小麥牟大麥也率徧育養也非言后稷之徳真可配天盖使我烝民得以粒食者莫其徳之至也且其貽我民以来牟之種乃上帝之命以此徧養下民者是以無有遠近彼此之殊而得以陳其君臣父子之常道於中國也或曰此詩即所謂納夏者亦以其有時夏之語而命之也周頌楊氏曰生民詩序言尊祖配天而朱子以為未詳所用疑其為郊祀之後受釐頒胙之禮今不備載又吴天有成命詩序言郊祀天地而朱子亦辨其不然説見祀地禮大祝既祭令徹疏曰祭訖大祝命徹祭器春官楊氏曰周禮以徹祭為重觀宗廟歌雍以徹可見矣况敬天之誠純亦不已令徹於終其禮尤嚴所以防人心之懈怠也右祭天祝辭樂章郊特牲疏曰先儒説郊其義有二按王肅聖證論以天體無二而鄭氏謂天有六者指其尊極清虚之體其實是一論其五時生育之功其别有五以五配一故為六天又春秋緯紫微宫為大帝又云太微宫有五帝座星青帝曰靈威仰云云是五帝與大帝六也又五帝亦稱上帝故孝經曰嚴父莫大於配天下即云宗祀文王於明堂以配上帝帝若非天何得云嚴父配天也而賈逵馬融王肅之等以五帝非天唯用家語之文謂太皥炎帝黄帝少皥顓頊五人帝其義非也故周禮司服云王祀昊天上帝則服大裘而冕祀五帝亦如之五帝若非天何為同服大裘又小宗伯云兆五帝於四郊禮器云饗帝於郊而風雨節寒暑時帝若非天焉能令風雨節寒暑時唐永徽二年長孫無忌奏請革鄭𤣥六天議事見唐郊祀下陳氏禮書曰周禮有言祀天有言祀昊天上帝有言上帝有言五帝者言天則百神皆預言昊天上帝則統乎天者言五帝則無預乎昊天上帝言上帝則五帝兼存焉周官司裘掌為大裘以共王祀天之服典瑞四圭有邸以祀天大司樂若樂六變天神皆降凡以神仕者以冬日至致天神此總天之百神言之也大宗伯以禋祀祀昊天上帝司服大裘而冕以祀昊天上帝此指統乎天者言之也司服言祀昊天上帝祀五帝亦如之則五帝異乎昊天上帝也大宰祀五帝掌百官之誓戒祀大神示亦如之則五帝異乎大神也肆師𩔖造上帝封於大神則上帝又異乎大神也掌次大旅上帝張氊案設皇邸祀五帝張大次小次則上帝異乎五帝也典瑞四圭有邸以祀天旅上帝則上帝異乎天也上帝之文既不主於天與昊天上帝又不主於五帝而典瑞旅上帝對旅四望言之旅者會而祭之之名則上帝非一帝也上帝非一帝而周禮所稱帝者昊天上帝與五帝而已則上帝為昊天上帝及五帝明矣孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝則明堂之祀上帝其為昊天上帝及五帝可知也易曰先王以作樂崇徳殷薦之上帝以配祖考以配祖者天也以配考者兼五帝也合天與五帝而謂之上帝則易孝經之於周禮其義一矣周禮明其祀之大小輕重故天帝之辨如此詩書之文未嘗有稱五帝而書亦未嘗有稱昊天上帝者其稱天及上帝𩔖皆泛言之而已此固不可援之以議周禮也且周人明堂之制有金木水火土之五室自漢以来皆於五室以祭五帝惟晉泰始及唐顯慶中嘗議除之後亦遂復則明堂之祀五帝其来逺矣鄭康成以上帝為五帝而不及天王肅以上帝為昊天上帝而不及五帝二者之説皆與禮經不合不足信也昊天上帝之名歴代不同漢初曰上帝曰泰一元始間曰皇天上帝魏初元間曰皇皇天帝梁曰天皇大帝惟西晉後齊後周隋唐乃曰昊天上帝而鄭氏以星經推之謂昊天上帝即天皇大帝名雖不同其實一也今之南郊既以昊天上帝位乎其上而壇第一等又有天皇大帝是離而兩之也宜講求以正之又曰五帝與昊天同稱帝不與昊天同稱天猶諸侯與天子同稱君不與天子同稱王周官祀五帝之禮有與天同以極其隆有與天異以致其辨故皆禋祀皆服大裘此其所同也祀帝於圜丘兆五帝於四郊此其所異也鄭氏之徒謂四圭之玉黃鍾大呂之樂夏至以祀感帝於南郊蒼璧之玉六變之樂冬日至禮天皇大帝在北極者於圜丘天皇大帝耀魄寶也五帝太微之帝也晉書天文志中宫鉤陳口中一星曰天皇大帝其神耀魄寶史記天官書太微三光之庭其内五星五帝座分郊與丘以異其祀别四帝與感帝以異其禮王肅嘗考之矣然肅合郊丘而一之則是以五帝為人帝則非夫有天地則有五方有五方則有五帝月令之五人帝伏羲神農黃帝少昊顓頊而已春太皥夏炎帝中央黄帝秋少皥冬顓頊魏相曰太皥乘震執規司春炎帝乘離執衡司夏少皥乘兊執矩司秋顓頊乘坎執權司冬黄帝乘坤艮執繩司下土素問謂春陽氣柔而中矩秋隂升陽氣降有髙下而中衡冬陽氣居下而中權然則魏相言五帝之所司則是言五帝之所執以夏為衡以秋為矩則誤矣果以是為五帝則前此其無司四時者乎古者祀五帝必配以五人帝從以五人臣月令之五人臣春勾芒夏祝融中央后土秋蓐收冬元㝠春秋傳曰少皥氏有四叔曰重曰該曰脩曰熙重為勾芒該為蓐收脩及熙為元𡨕顓頊氏有子曰黎為祝融共工氏有子曰勾龍為后土然即太皥少皥以春秋之氣言之也炎帝以火土之性色言之也萬物之象勾芒於春而其氣祝融於夏其榮也以秋而蓐其𤼵也以秋而收色以冬而元體以冬而𡨕后土居中央以君之此五人帝五人臣命名之不同也春夏秋中央之臣皆一人耳而冬有脩與熙者盖冬於方為朔於卦為艮於腎有左右於器有權衡於物有龜蛇於色有青黑則官有脩熙宜矣司馬遷不紀少皥以黃帝顓頊高辛唐虞為五帝孔安國以少昊顓頊高辛唐虞為五帝其説與四時五行之理不合當以月令為正程子曰六天之説起於䜟書鄭𤣥之徒從而廣之甚可笑也帝者氣之主也東則謂之青帝南則謂之赤帝西則謂之白帝北則謂之黑帝中則謂之黃帝豈有上帝而别有五帝之理此因周禮言祀昊天上帝而後又言祀五帝亦如之故諸儒附此説又曰六天之説正如今人説六子乾坤之外甚底是六子譬如人之四肢只是一體耳學者大惑也朱子語録曰問而今郊祀也都祀許多帝曰周禮説上帝是總説帝説五帝是五方帝説昊天上帝只是説天鄭氏以昊天上帝為北極看得不是恁地北極星只是言天之象且如太微是帝之庭紫微是帝之居紫微便有太子后妃許多星帝庭便有宰相執法許多星又有天市亦有帝座處便有權衡稱斗星又問今郊祀也祀泰一曰而今都重了漢時泰一便是帝而今添了帝多都成十帝如一國三公尚不可况天而有十帝楊氏曰愚按程朱二先生之言則天帝一也以一字言則祀天饗帝之𩔖以二字言則格於皇天殷薦上帝之𩔖以四字言則惟皇上帝昊天上帝皇天上帝之𩔖以氣之所主言則隨時隨方而立名如青帝赤帝黃帝白帝黑帝之𩔖其實則一天也是以前乎鄭康成如鄭衆如孔安國注書並無六天之説鄭康成後出乃分為六天又皆以星象名之謂昊天上帝者北辰也謂五帝者太微宫五帝座星也夫在天成象在地成形草木非地則星象非天天固不可以象求也以象求天是何異於知人之有形色貌象而不知其有心君之尊也况又附以緯書如北辰曰耀魄寶之𩔖繆妄不經莫此為甚且鄭於此章注云皇天上帝亦名昊天上帝既已知其為一矣及考月令季夏季冬兩處有皇天上帝之文鄭氏又析而為二以皇天為北辰耀魄寶以上帝為太微五帝隨意曲説前後乖違以此釋經有同兒戲是以王肅羣儒引經傳以排之至晉泰始初始合六天為一而併圜丘於郊似矣然又謂五帝非天而用家語之文謂太皥炎帝黃帝五人帝之屬為五帝則非也夫有天地則有五行四時有五行四時則有五帝帝者氣之主也易所謂帝出乎震之類是也果以五人帝為五帝則五人帝之前其無司四時者乎鄭則失矣而王亦未為得也夫祀天祀五帝皆聖人制禮之條目非如鄭氏分天以為六也天猶性也帝猶心也五帝猶仁義禮智信之心隨感而應者也是故四圭有邸以祀天旅上帝祀天専言天者尊天之辭也有故而祭則曰旅所以聽命於帝以主宰言之也王祀昊天上帝則服大裘而冕祀五帝亦如之昊天上帝者天之大名也五帝分王於四時者也祀五帝於四郊亦如之所以致四時生物之功也聖人制禮之條目各有深意其實則一天也右諸儒言祀天祀帝之名稱曲禮天子祭天地疏曰天子祭天其天有六祭之一嵗有九昊天上帝冬至祭之一也蒼帝靈威仰立春之日祭之於東郊二也赤帝赤熛怒立夏之日祭之於南郊三也黄帝含樞紐季夏六月土王之日亦祭之南郊四也白帝白招拒立秋之日祭之於西郊五也黑帝汁光紀立冬之日祭之於北郊六也王者各稟五帝之精氣而王天下於夏正之月祭於南郊七也四月龍星見而雩總祭五帝於南郊八也季秋大饗五帝於明堂九也孫宣公奭曰嵗九祭皆主於天至日圜丘正月祈穀五時迎氣孟夏雩季秋饗惟至日其禮最大故稱曰昊天上帝程子曰古者一年之間祭天甚多春則因民播種而祈穀夏則恐旱暵而大雩以至秋則明堂冬則圜丘皆人君為民之心也凡人子不可一日不見父母人君不可一嵗不祭天豈有三年一親郊之理朱子曰凡説上帝者總昊天上帝與五帝言之皆稱上帝也如周禮嵗有九祭其四為祭天其一為祭五帝其禮若不同矣易則但説享上帝未嘗分别如曰聖人亨以享上帝殷薦之上帝以配祖考以此觀之凡説上帝者是總説帝也楊氏曰愚按注疏言周禮一嵗九祭天孫奭亦言嵗有九祭但注疏正月郊謂祭感生帝孫奭正月郊謂祈穀二説不同何也注疏言祭感生帝出於緯書孫奭言正月祈穀經有明證學者以聖經為信可也又注疏言季秋明堂及孟夏大雩為合祭五帝以經考之孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝上帝即天也未聞有合祭五帝之説也故程子以秋明堂冬圜丘春祈穀夏大雩四者皆祭天斯言不可易矣注疏以正月郊為祭感生帝以季秋明堂孟夏大雩為合祭五帝九祭之中已失其三矣惟冬至圜丘祭昊天上帝立春祭蒼帝立夏祭赤帝季夏祭黄帝立秋祭白帝立冬祭黑帝六者庶幾得之而耀魄寶靈威仰等名又汨之以䜟緯之説則六者又胥失之矣詳見九祭本篇右諸儒言古天子一嵗祭天之數記郊之祭大報天而主日配以月主日者以其光明天之神莫著焉晉大興中太常賀循言郊壇之上尊卑雜位千五百神去聖久遠先代損益不同皆無顯據疑非古聖掃地之意朱子曰古時天地定是不合祭日月山川百神亦無同合一時祭享之禮當時禮數也簡儀從也省必是天子躬親行事豈有祭天便將許多百神一齊排作一堆都祭只看郊臺階級兩邊是踏道中間自上排下都是神位更不通看楊氏曰愚按禮家或謂郊祀上帝則百神從祀然乎曰郊之祭也大報天而主日配以月傳記屢言之竊意垂象著明莫大乎日月日月之明即天之明也故祭天而主日配以月非必百神悉從祀也月令仲夏大雩帝大雩之後乃命百縣雩祀百辟卿士季秋大饗帝大饗之後乃使有司嘗羣神告備於天子先後輕重固有節文矣以此𩔖推之祀天之後乃祭百神盖可知也莫尊於天莫重於郊祀精一以享惟恐誠意之不至豈容混以百神之祀乎舜之嗣位也肆類乎上帝而後禋于六宗望于山川偏于羣神非𩔖于上帝之時合祀六宗百神也告祭之禮簡矣猶有先後之序况郊祀大禮乎大司樂言樂六變則天神皆降者至和感召融液貫通上帝降鑒而百神皆降猶鑾輿順動而千官景從者理也禋祀則専主乎昊天上帝不容混也按三正記曰郊後必有望又凡以神仕者以冬日至祭天神人鬼注云致人鬼於祖廟盖用祭天之明日恐百神亦然也後之言禮也失於講明後漢建武元年采用前漢元始中合祭天地六宗羣神從祀二年正月制郊兆於雒陽城南七里泰壇之上至一千五百一十四神不亦褻乎晉賀循已疑其非古人掃地而祭之意此固君子之所不取也右諸儒言郊祭羣神從祀之是非禮夏官節服氏郊祀裘冕二人執戈送逆尸從車裘冕者亦從尸服也裘大裘也從車從尸送逆之徃来冕疏曰尸服與王同大裘節服氏亦大裘故二人皆裘執戈送逆尸云從車者送逆皆從尸車後横渠張氏曰節服氏言郊祀送逆尸從車則祀天有尸也天地山川之𩔖非人鬼者恐皆難有尸節服氏言郊祀有尸不害后稷配天而有尸也楊氏曰愚按宗廟祭享有尸有主者聖人原始反終而知死生之説故設主立尸為之廟貎所以萃聚祖考之精神而致其來格也若天地山川之類形氣常運而不息有形氣則有神靈祭祀感通其應如響又焉用立尸為哉周官太宰及祀之日贊玉幣爵之事謂玉幣所以禮神王親自執玉幣奠於神座又親酌以獻神如是而已曲禮疏有説祀天無尸古人盖知祀天之不必有尸矣經傳所述宗廟有尸者多矣未有言祭天之尸者惟尚書大傳有帝入唐郊丹朱為尸之説左氏傳述晉祀夏郊之事始末為詳初無董伯為尸之説而國語乃言之其言不經難以據信張子曰天地山川之類非人鬼者皆艱有尸節服氏送逆尸從車不害后稷配天而有尸也斯言也非通於幽明之故者其孰能知之右諸儒言郊祀之尸通典周制冬日至祀天於地上之圜丘爾雅云非人為謂之丘大宗伯以禋祀祀昊天上帝鄭云冬至祭天圜丘所祀天皇大帝禮神之玉以蒼璧其牲及幣各隨玉色蒼璧禮天其尺寸文闕放其器之色象天色也牲用一犢幣用繒長丈八尺王服大裘其冕無旒鄭司農云大裘黑羔裘既無采章則冕亦無旒也尸服亦然以天體質故王大裘以象之既尸為神象宜與王同服也周禮郊祀二人裘冕送逆尸又士師職祀五帝則沃尸乘玉路鍚樊纓十有再就建太常十有二斿以祀罇及薦菹醢器並以瓦爵以匏片為之以稾秸及蒲但翦頭不納為藉神席所謂蒲越稾秸稾秸藉天神蒲越藉配帝配以帝嚳鄭𤣥以為禘大於郊嚳尊於稷故注大宗伯言圜丘以嚳配之其樂大司樂云凡樂圜鍾為宫黃鍾為角太蔟為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣圜鍾夾鍾也夾鍾生於房心之氣房心為大辰天帝之明堂黃鍾生於虛危之氣虗危為宗廟以此為宫角聲𩔖求之靁鼓八面鼓孤竹竹特生者雲和山名也其感生帝大傳曰禮不王不禘王者禘其祖之所自出而以其祖配之大祭曰禘謂郊祭天王者先祖皆感太微五帝之精以生其神名春秋緯云蒼則靈威仰赤則赤熛怒黃則􅅤樞紐白則白招拒黒則汁光紀皆用王嵗之正月郊祭之盖特尊焉孝經云郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝泛配五帝也因以祈穀左傳曰郊祀后稷以祈農事其壇名泰壇祭法燔柴於泰壇在國南五十里司馬法百里為遠郊五十里為近郊禮神之玉用四圭有邸尺有二寸牲用騂犢青幣配以稷其配帝牲亦騂犢即稷牛其樂大司樂云乃奏黄鍾歌大吕舞雲門以祀天神以黄鍾大吕之聲為均也黄鍾陽聲之首大吕為之合奏之以祀天神尊之也日用辛禮記及春秋魯郊於建子月日用辛又王者必五時迎氣以示人奉承天道從時訓人之義故月令於四立日及季夏土徳王日各迎其王氣之神於其郊其配祭以五人帝春以太皥迎氣如迎春祀靈威仰於東郊以太皥伏羲氏配座是也夏以炎帝季夏以黄帝秋以少皥冬以顓頊其壇位各於當方之郊去國五十里内曰近郊為兆位於中築方壇亦名曰泰壇而祭之如其方壇者以其取象當方各有方所之義按昊天上帝天之總名所覆廣大無不圜匝故奠蒼璧其神位曰圜丘皆象天之圜匝也餘五帝則各象其方氣之徳為珪璋琥璜之形祭法謂其神位以泰壇是人力所為非自然之物以其各有方位故名方壇禮神之玉按大宗伯云青珪禮東方赤璋禮南方黄琮禮地則中央也白琥禮西方元璜禮北方禮神者必象其𩔖珪鋭象春物生也半珪曰璋夏象物半死也琮八方象地也琥猛象秋嚴也半璧曰璜象冬閉藏也地上無物惟見半天耳牲用犢及幣各隨其玉色樂與感帝同即大司樂祀天神之樂也祭前期十日王親戒百官及族人太宰又總戒羣官曰某日有事於昊天上帝各揚其職百官廢職服大刑乃習射於澤宫選可與祭者其容體比於禮其節奏比於樂而中多者得與於祭比音毗志反其日王乃致齊於路寢之室㪚齊七日致齊三日祭日之晨雞人夜呼晨以呌百官巾車鳴鈴以應雞人典路乃出玉輅建太常大司樂既宿懸遂以聲展之知完否王將出大司樂令奏王夏王所過處之人各於田首設燭以照於路所謂鄉為田燭恐王向郊之早也又喪者不哭凶服者不敢入國門祭前掌次先於丘東門外道北設大次小次次謂幄也大幄初徃所止居也小幄既接祭退俟之處祭義周人祭日以朝及闇雖有强力誰能支之是以退俟與祭諸臣代有事焉掌次張氊案設皇邸謂於次中張氊牀牀後設板屏風其上染鳥羽象鳯凰色以覆之以為飾是也王服大裘而立於丘之東南西面大司樂奏圜鍾為宫以下之樂以降神若感生帝及迎氣則奏黄鍾以下之樂次則積柴於丘壇上謂積柴及牲體玉帛王親牽牲而殺之太宰職論祭天禮有云及納亨贊王牲事鄭𤣥云納亨牲將告殺謂祭之晨也既殺以授亨人凡大祭祀君親牽牲大夫贊次則實牲體玉帛而燔之謂之禋祀以周人尚臭煙氣之臭聞者所以報陽也韓詩外傳曰天子奉玉升柴加於牲上而燔之次乃掃於丘壇上而祭尸服裘而升丘也王及牲尸入時樂章奏王夏肆夏昭夏大司樂云王出入奏王夏尸出入奏肆夏牲出入奏昭夏但用夾鍾為宫耳就坐時尸前置蒼璧又薦籩豆及血腥等為重古之薦鄭𤣥注大司樂云先作樂致神然後禮之以玉而祀之禮器云郊血大饗腥王乃以匏片為爵酌瓦甒之泛齊以獻尸為朝踐之獻鄭𤣥注司尊彝云唯有事於太廟備五齊三酒故崔靈恩推之以為圜丘明用五齊餘感帝迎氣神州等並自醴齊而下四齊而已不用圭瓚而用陶匏者物無以稱天之徳故但取天地之性五齊五齊之中泛齊味尤濁重古貴質故於大祭用之餘見祭天酒齊條下七獻宗廟九獻而天神七獻者宗廟之祭通數尸未入前王及后於奥中先行貳祼以降神次七獻故有九也天地大神至尊不祼者以其莫可稱焉者也故七獻而已又按郊丘禮闕無文以書唯大宗伯司尊彝所陳酒齊鄭𤣥及鄭衆皆以為宗廟之禮今約司尊彝酌獻五齊之次以為説始詳見祀天終之序條下畢獻之後天子舞六代之樂若感帝及迎氣即天子舞當代之樂其樂章用昊天有成命也古制天子親在舞位説曰郊丘之説互有不同歴代諸儒各執所見雖則争論紛起大凡不出二塗宗王子雍者以為天體唯一安得有六圜丘之與郊祀實名異而體同所云帝者兆五人帝於四郊豈得稱之天帝一嵗凡二祭也宗鄭康成者則以天有六名嵗凡九祭盖以祭位有圜丘泰壇之異用樂則黄鍾圜鍾有差牲乃騂蒼色殊玉則四珪蒼璧祭名且同稱禋祀祭服又俱用大裘略舉大綱不復悉數恭惟國章並行二禮可謂叶於時宜矣歴代所行亦參二禮異同之論按古者郊天之禮其制度品節參見於經傳諸書惟祭法首章言四代配天之祖郊特牲郊之祭也一章言郊之義數儀文未備而其他之載於二禮諸書者多通言祭天非直郊祀也且或散見於百官之職掌如玉人典瑞只説禮神之玉酒人只説酒齊典路只說車輅司服只說祭服之𩔖或錯見於禮經之總論如禮運禮器郊特牲祭法等篇所言祭祀或通論郊社或通說天神地祇人鬼之𩔖披紛散軼未有能會通其綱目之詳次第其始終之序者惟杜氏通典首叚叙致頗有條理然禮經簡略杜氏所叙多以注疏之意補之而注疏之説乖異多端盖經之所言曰天曰上帝曰五帝而鄭康成以為有六天王子雍以為天一而已二家之説於天之名義尚復差異如此則其所言禮文之節奏以補正經之所未備者果可盡信乎王鄭俱生於去聖千載之後各以其學臆為之説然王説正大鄭説穿鑿先儒嘗備言之矣通典盖一遵鄭注而又不敢廢王説者也是以論其事於本叚之末至近世三山信齋楊氏得考亭勉齋之遺文奥義著為祭禮一書始蒐輯經傳之散漫者而會通之而祀天之禮物樂舞與其行事始終之序可以槩見辨析諸儒議論之同異者而折𠂻之而天帝之名稱祀數之多寡從祀尸主之有無可以理推詞義正大訂核精深足為千載不刋之典然其所述一本經文不復以注疏之説攙補故經之所不及者則闕略不接續又似不如通典此叚之通暢易看故以楊氏祭禮及所採諸儒辨正議論具列於先而復採通典所述於後以備見古人祀天之禮文云文獻通考卷六十八
