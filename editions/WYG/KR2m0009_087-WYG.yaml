以下各採九條悉以桑授蠶母還蠶室事訖皇后還便座公主以下乃就位設饗宴賜絹各有差宋孝武大明四年始於臺城西白石里為蠶所設兆域置大殿又立蠶觀其禮皆循晉氏北齊為蠶坊於京城北之西去皇宫十八里外有蠶宫方九十歩牆髙一丈五尺其中起蠶室二十七别殿一區置蠶宫令丞宦者為之路西置皇后蠶壇髙四尺方二丈四陛陛各廣八尺置先蠶壇於桑壇東南大路東横路南壇髙五尺方二丈四陛陛各五尺外兆方四十歩面開一門有縁襜襦褠衣黄履以供蠶母每嵗季春榖雨後吉日使公卿以一太牢祠先蠶黄帝軒轅氏於壇上無配先農禮訖皇后因親桑於壇備法駕服鞠衣乘重翟帥六宫升桑壇東陛即御座女尚書執筐女尚衣執鈎立壇下皇后降自東陛執筐者處右執鈎者處左蠶母在後乃躬桑三條訖升壇即御座内命婦以次就桑服鞠衣者採五條展衣綠衣者九條以授蠶母還蠶室切之授世婦灑一簿凡應桑者並復本位后乃降壇還便殿設勞酒頒賚而還後周制皇后乘翠輅率六宫三妃三㚤音弋婦官名御媛御婉三公夫人三孤内子至蠶所以一少牢親進祭奠先蠶西陵氏神禮畢降壇令二嬪為亞獻終獻因而躬桑隋制先蠶壇於宫北三里為壇髙四尺季春上已皇后服鞠衣以一太牢制幣祭先蠶於壇上用一獻之禮祭訖親桑於位壇東面尚功進金鈎典制奉筐皇后採三條反鈎命婦各依班採五條九條世婦以授蠶母受切桑灑訖皇后降壇自齊及周隋其典法多依晉儀亦時有損益唐先蠶壇在長安宫北苑中髙四尺周廻三十歩太宗貞觀九年三月文徳皇后率内外命婦有事於先蠶髙宗永徽三年三月制以先蠶為中祠有司言按周官宗伯后不祭則攝而薦豆籩徹明王后之事而宗伯得攝行之伏以農桑乃衣食萬人不宜獨闕先蠶之祀無已則皇后遣有司享之如先農可也顯慶元年三月皇后有事於先蠶總章二年三月皇后親祠先蠶咸亨五年三月皇后親祠先蠶上元二年三月天后親祠先蠶元宗先天二年三月皇后親祠先蠶自嗣聖以來廢闕此禮至是始重行焉肅宗乾元二年三月皇后祠先蠶於苑中唐開元禮皇后季春吉已享先蠶儀攝事附齋戒先祀五日散齋三日於後殿致齋二日於正殿前致齋一日尚寢設御幄於正殿西序及室中俱東向致齋之日晝漏上水一刻尚儀版奏請中嚴尚服帥司仗布侍衛司賔引内命婦陪位並如式六尚以下各服其服詣後殿奉迎尚儀版奏外辦上水三刻皇后服鈿釵禮衣結珮乘輿出自西房華葢警蹕侍衛如常儀皇后即御座東向坐六尚以下侍衛如常一刻頃尚儀前跪奏稱尚儀妾姓言請降就齋室興退復位皇后降座乘輿入室六尚以下各還寢直衛者如常司賔引陪位者退散齋之日内侍帥内命婦之吉者使蠶於蠶室攝事無以上儀凡應享之官散齋三日於其寢致齋二日一日於其寢一日於享所亞獻終獻則致齋二日皆於其所六尚以下應從升者及從享内外命婦各於其寢清齋一宿諸應享之官致齋之日給酒食及明衣各習禮於齋所光禄卿監取明水火太官令取水於隂鑑取火於陽燧火以供㸑水以實罇前享一日諸衛令其屬未後一刻各以其方噐服守衛壝門每門二人每隅一人攝事同享日未明給使代執與女工人等俱清齋一宿陳設前享三日尚舍直長施大次於外壝東門之内道北南向尚舍奉御鋪御座尚舍直長設内命婦及六尚以下次於大次之後俱南向守宫設外命婦次大長公主長公主公主以下於南壝之外道西三公夫人以下在其南俱重行每等異位東向北上設陳饌幔於内壝東門之外道南北向攝事守宫設享官次於東壝内道南北向西上設陳饌幔於内壝東門外道南北向前享二日太樂令設宫懸之樂於壇南内壝之内如圜丘儀諸女工人各為位於懸後東方西方以北為上南方北方以西為上右校掃除壇之内外又為瘞埳於壇之壬地内壝之外方深取足容物南出陛又為採桑壇於壇南二十歩所方三丈髙五尺四出陛尚舍量施帷帳於外壝之外四面開門其東門使容厭翟車前享一日内謁者設御位於壇之東南西向設望瘞位於壇之西南當瘞埳西向設亞獻終獻位於内壝東門之内道南執事者位於其後每等異位俱重行西向北上設典正位於壇下一位於東南西向一位於西南東向女史各陪於後設司賛位於樂懸東北掌賛二人在南差退俱西面又設司賛掌賛位於埋埳西南東面南上設典樂舉麾位於壇上南陛之西東向設司樂位於北懸之間當壇北向設内命婦位於終獻之南每等異位重行西面北上設外命婦位於中壝南門之外大長公主以下於道東西向當内命婦位差退太夫人以下於道西去道逺近准公主俱每等異位重行相向北上又設御採桑位於採桑壇上東向設内命婦採桑位於壇下當御位東北每等異位南向西上設外命婦採桑位於壇下當御位東南每等異位北向西上設執御鈎筐者位於内命婦之西少南西上尚功執鈎典製執筐設内命婦執鈎筐者位各於其採桑位之後尚功下四典執鈎典製下女史執筐設門外位享官於東壝之外道南從享内命婦於享官之東俱每等異位重行北面西上從享外命婦南壝之外道西如設次之式攝事内謁者設三獻位於内壝東門之内道北執事位於道南每等異位重行西面以北為上又設望瘞位於壇之東北當瘞埳道西向又設典正位於壇下一位於東南西向一位於西南東向女史各陪其後紏察違失設掌賛位於樂懸東北女史二人在南差退俱西向又設掌賛女史位於􅄟埳西南東向南上設典樂舉麾位於壇上南陛之西東向設司樂位於北懸之間當壇北向設三獻以下門外位於東壝之外道南每等異位北向西上無設御位下至此儀設酒罇之位於壇上東南隅北向西上犧罇二象罇二山