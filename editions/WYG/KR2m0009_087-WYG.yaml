神座之右東向跪讀祝文曰維某年歳次月朔日子皇后某氏敢昭告於攝事女祝持版祝云皇后某氏謹遣某官妾姓敢昭告於先蠶氏惟神肇興蠶織功濟黔黎爰擇嘉時式遵令典謹以制幣犧齊粢盛庶品明薦於神尚饗訖興皇后再拜初讀祝文訖樂作尚儀進跪奠版於神座興還罇所皇后拜訖樂止尚儀以爵酌上罇福酒西向進攝事女祝以爵酌罍福酒進於尚宫之右西向立皇后再拜受爵跪祭酒啐奠興尚儀帥女進饌者持籩俎進尚儀減神前三牲胙肉以取前脚第二骨各置一俎上又以籩取稷黍飯共置一籩尚儀先以飯籩西向進皇后受以授左右尚儀又以胙俎以次進皇后每受以授左右皇后跪取爵遂飲卒爵尚儀進受復於坫皇后興再拜訖樂止尚宫引皇后樂作降自南陛還版位西向立樂止自此以上若攝事儀皆尚宫行事女相女祝賛之以下倣此皇后獻將畢典賛引貴妃詣罍洗盥手洗爵訖攝事則女相者引尚儀為亞獻典賛引貴妃自東陛升壇詣象罇所執罇者舉羃貴妃酌盎齊典賛引進神座前北向跪奠爵興典賛引貴妃少退北向再拜尚儀以爵酌罍福酒持爵進貴妃之右西向立貴妃再拜受爵跪祭酒遂飲卒爵尚儀受爵復於坫貴妃再拜興典賛引貴妃降自東陛復位如初貴妃獻將畢又典賛引昭儀攝事女相者引尚食為終獻詣罍洗盥手洗爵升酌盎齊終獻如亞獻之儀訖典賛引昭儀降復位尚儀進神座前跪徹豆興還罇所徹者籩豆各一少移於故處司賛曰賜胙掌賛唱衆官拜在位者皆再拜已飲福酒者不拜攝事賜胙則掌賛唱賜胙女史唱再拜也永和之樂作尚宫前奏稱請再拜退復位皇后再拜司賛曰衆官再拜在位者皆再拜樂一成止尚宫前奏請攝事女相者白就望瘞位司賛帥掌賛就瘞埳西南位尚宫引皇后樂作至望􅄟位西向立樂止於衆官將拜尚儀執篚進神座前取幣自北陛降壇西行詣瘞埳以幣置於埳訖司賛曰可瘞埳東西各四人寘土半埳尚宫前賛禮畢請就採桑位尚宫引皇后樂作詣採桑壇升自西陛東向立樂止初白禮畢司賛帥掌賛還本位親桑皇后將詣望瘞位司賔引内外命婦採桑者俱就採桑位内外命婦一品各二人二品三品各一人諸執鈎筐者各就位皇后既至採桑位尚功奉金鈎自北陛升壇進典製奉筐從升皇后受鈎採桑典製奉筐受桑皇后採桑三條止尚功前受鈎典製以筐俱退復位皇后初採桑典製等各以鈎授内外命婦皇后採桑訖内外命婦以次採桑女史執筐者受之内外命婦一品各採五條二品三品各採九條止典製等受鈎與執筐者退復位司賔各引内外命婦採桑者退復位司賔引媫妤一人詣蠶室尚功帥執鈎筐者以次從至蠶室尚功以桑授蠶母蠶母受桑切之以授媫妤食蠶灑一簿訖司賔引媫妤還本位尚儀前奏禮畢退復位尚宫引皇后還大次樂作入大次訖樂止司賔引内命婦内典引引外命婦各還其次尚儀典正以下俱復執事位立定司賛曰再拜尚儀以下皆再拜訖出女工人以次出其祝版燔於齋所車駕還宫皇后既還大次内侍版奏請解嚴將士不得輙離郡位皇后停大次一刻頃搥一鼓為一嚴轉仗衛於還塗如來儀三刻頃搥二鼓為再嚴尚儀版奏請中嚴皇后服鈿釵禮衣五刻頃搥三鼓為三嚴内典引引外命婦出次就門外位司賔引内命婦出次序立於大次之前六尚以下依式奉迎内僕進厭翟車於大次門外南向尚儀版奏外辦馭者執轡皇后乘輿出次華葢侍衛警蹕如常皇后升車鼓吹振作而行内命婦以下乘車陪從如來儀車駕過内典引引外命婦退還第駕至正殿門外廻車南向尚儀進當車前跪奏稱尚儀妾姓言請降車興還侍位皇后降車乘輿入侍衛如常内侍版奏請解嚴將士各還其所勞酒車駕還宫之明日内外命婦設㑹於正殿如元㑹儀唯不賀不上夀為異宋真宗景徳三年詔祀先蠶依先農例遣官攝事資政殿大學士王欽若言古者王后親率嬪御以祀先蠶是以開寳通禮郊祀録並有親蠶祝辭葢由中宫未嘗親祭所以有司闕而不舉又通禮義纂后親享先蠶貴妃為亞獻昭儀為終獻若攝事則尙宫為初獻尚儀為亞獻尚食為終獻又周禮大宗伯后不祭則攝而薦豆籩徹葢薦豆籩徹王后之事而宗伯得攝之唐㑹要云農桑衣食萬人不宜獨闕先蠶之祭皇帝遣有司攝祭可也臣以謂屬之命婦未若歸於有司望詔有司叅定其儀詔太常禮院檢討攝祭故事以聞禮院言按開寳通禮季春吉已饗先蠶於公桑有司攝事前享五日諸預享官散齋三日致齋二日享日未明五刻設先蠶氏神座於壇上北方南向尚宫為初獻尚儀為亞獻尚食為終獻女相引三獻之禮女祝讀文飲福受胙如常儀又按周禮大宗伯凡大祭祀王后不與則攝而薦豆籩徹又云王后不與則賛宗伯注云后有故不與祭宗伯攝其事又按唐㑹要云皇帝遣有司享先蠶如先農可也乃詔自今依先農例遣官攝事太常禮院言請築先蠶壇於東郊從桑生之義其壇酌中用北齊之制設一壇二十五歩如淳化四年中祠禮例從之神宗元豐四年詳定郊廟奉祀禮文所言季春吉已享先蠶氏唐月令注以先蠶為天駟謹按先蠶之義與先農先牧先炊一也當是始蠶之人故開元禮享先蠶為瘞埳於壇之壬地禮義羅曰今禮享先蠶無燔柴之儀明不祀天駟星也又按王涇郊祀録載先蠶祝文曰維神肇興蠶織則是始蠶之人明矣今享先蠶其壇在東郊熙寧祀儀又有燎壇則是沿襲唐月令以先蠶為天駟誤矣周禮后蠶於北郊以純隂為尊請就北郊為壇以享始蠶之人仍依開元禮不設燎壇但􅄟埋以祭其餘自如故事從之徽宗政和元年四月詔就先蠶壇之側度地築公桑蠶室嵗養蠶以供祭服其親蠶殿可以無斁為名先是議禮局禮部太常寺被㫖議合行制度凡七事謂倣後齊之制置公桑蠶室度地為宫四面為牆髙仞有三尺上被棘中起蠶室二十七别建殿一區為親蠶之所倣漢制置繭館立織室於蠶宫中養蠶千箔以上度所用之數為桑林築採桑壇於先蠶壇南相距二十歩方三丈髙五尺四出陛議禮局又言周官内宰詔后帥内外命婦蠶於北郊鄭氏謂婦人以純隂為尊則蠶為隂事可知開元禮享先蠶幣以黒葢以隂祀之禮祀之也今享先蠶儀乃用白幣非所謂稱按古者制幣或依其方色或推其象類今先蠶之祭在於北郊則正隂之地以類推之蠶之始生其色亦黒則亦至隂之象制幣以黒為宜從之宣和元年三月皇后親蠶於延福宫六年閏三月皇后親蠶髙宗紹興七年太常博士黄積厚言季春吉已享先蠶望下有司舉行從之禮料初依奏告例後比擬舊制一視風師四月輔臣張浚奏雨既霑足又即晴霽於蠶麥不妨上曰朕宫中亦養蠶欲知民間蠶熟與否且可少知女工之艱難也十五年太常丞王湛言請按政和禮建親蠶殿蠶室繭館請皇后就禁中行親蠶之禮朝㫖送禮部下太常寺討論不果行文獻通考卷八十七
