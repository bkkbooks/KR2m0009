左右僕射六尚書御史大夫攝行事諸侯三人行九推禮差正員三品官及嗣王攝行事禮儀使一人賛導耕籍禮太常卿一人賛導耕籍禮已上官合便取祀先農壇上行事官充右禮司状上中書門下請奏差如本官不足差六品已下官充並服袴褶御耒耜二具併韜並以青色内一具副准乾元故事合依農人所執者制造不合雕飾事畢日收藉耒耜一丈席二領三公九卿諸侯耒耜一十五具御耒耜牛四頭内二頭副并牛衣每隨牛一人並絳衣介幘須明嫻農務者行事禮司專差人賛導高品中官二人執侍耒耜並衣袴褶太常帥其屬庶人量用二十八人以備禮郊社令一人檢校太常少卿一人帥庶人赴耕所太常博士六人分賛導耕禮如本司官不足准舊例本司具名上中書門下請差攝行事司農少卿一人檢校庶人終千畆廩犧令二人一人奉耒耜授司農卿係差五品六品清資官攝充三公九卿諸侯耕牛四十頭内十頭副每頭隨牛人一人湏明嫻農耕者差庶人耒耜二十具畚二具鍤二具以木為刃府司差一人專知管籍田縣令一人具朝服當耕籍田時立於田畔侯耕畢去畿甸諸縣令准舊例集先期到城籍田日服常服赴耕所陪位而立耆老量定二十人並常服籍田日於庶人耕籍田位之南陪位宋太宗皇帝雍熙四年九月詔以來年正月有事於東郊行籍田之禮令所司詳定儀注以聞無致煩勞務遵典故太常禮院言籍田舊不置五使今請依南郊以宰臣親王三品官為五使仍命蘇易簡等詳定儀注詳定所言方位請依唐例在東郊北齊籍田千畆各頃别種榖一色一頃作祠壇今聖朝郊宫制度廣大請設於千畆之外壇高九尺周圍四十歩飾以青厯代壇去京城逺近各異今請於朝陽門七里之外十五里之内擇地為壇又通禮不載告廟祭十里内神祠及禮畢稱賀之儀今縁國家盛禮望遣大臣前二日告昊天上帝太廟俟禮畢文武百僚設行宫稱賀鹵簿使言諸司儀仗法物車賂請准南郊例排並從之詳定所言按通禮儀注皇帝親載耒耜於車右隋書禮儀志齊代籍田令御史乘馬車載耒耜於五輅之後以為禮輕遂以侍中奉耒耜載於象輅以隨木輅之後又舊禮魏晉耕籍乘木輅今准通禮皇帝乘耕根車欲請以象輅載耒耜列於仗内御前在皮軒車後殿中省香燈之前所以明示重耕籍之禮從之禮儀使言按通典宋齊之制於先農壇東别立觀耕臺帝親耕禮畢登此臺以觀公卿推耕其臺不載制度緣皇帝被衮冕執圭宜便陟降請築臺高五尺周圍四十歩四出陛飾以青又通禮亦不載御樓賜赦按唐開元二十三年籍田禮畢還宫大赦今取進止從之仍候禮成肆赦詳定所言按宋文帝元嘉二十一年親耕籍田千畆中開阡陌設御耕位在先農壇東北唐禮不開阡陌設御耕位於先農壇南十歩詳此即當時壇前不設樂懸則御耕位厯代不同今既備樂懸二舞俱在壇前請定御耕位在壝門東南又先農壇設二壝今緣儀衛廣大所有外壝請於大次及御耕位觀耕臺樂懸之外又隋書籍田令率其屬耕千畆以青箱穜稑之種跪呈司農詣耕所灑之訖司農省功奏事畢唐朝不行此禮詔備置又隋以青箱奉穜稑之種唐廢其禮青箱舊無制請用竹木為之而無葢两頭設臺飾以青色中分九隔隔設一種覆以青帊穜稑即早晩之種不定榖名今請用黍稷秫稻粱大豆小豆大麥小麥陳於箱内從之詳定所言舊禮有庶人終畆之説即不載庶人耕位所在今請於諸侯耕位之南退近東十歩西向以成終畆之禮又按典禮先農用犢一近制中祠以羊豕代望權用犢以純色充進胙如郊祀禮料禮噐視大祠皇帝散齋三日致齋二日百官不受誓戒神農后稷冊學士院撰文並從之又言准詔定乘耕根車而車元無副上下大小與金玉輅等縁天子所乘皆有副今請改乘玉輅以耕根車改載御耒耜玉輅駕士六十四人耕根車止四十人亦請添同玊輅舊禮勞酒在車駕還宫之日設㑹於大殿今請依郊祀擇日大宴從之學士院上東郊青城殿門名前殿曰两儀後殿曰延慶大殿門曰龍徳左掖門曰光天右掖門曰麗天東門曰鳯陽西門曰安福南門曰祈年北門曰元英大殿東西廊門曰日華月華後園五花亭曰㑹芳御幄後門曰福慶詔付有司端拱元年正月十五日帝齋於乾元殿翼日鑾駕出宫備大駕鹵簿於丹鳯門外帝服通天冠絳紗袍執圭乘玊輅赴東郊行宫齋宿十七日未明三刻帝服衮冕執鎮圭親饗神農氏於壇上以后稷氏配禮畢次詣耕籍位行三推禮有司版奏禮畢帝顧謂侍臣曰朕志在勸農恨不能終千畆豈止於三推為限乎遂耕數十歩侍臣固請乃止又御觀耕臺南向坐觀公王耕耕訖侍中奏禮畢解嚴還行宫百官稱賀帝改御大輦服通天冠絳紗袍鼓吹振作而還御乾元門肆赦改元文武逓進官有差真宗景徳四年都官員外郎同判太常禮院孫奭言伏覩來年春季劃日正月一日享先農九日上辛祀昊天上帝者按春秋傳曰啟蟄而郊郊而後耕又禮記月令云天子乃以元日祈榖於上帝乃擇元辰親載耒耜躬耕帝籍先儒皆云元日謂上辛郊天也元辰謂郊後吉亥享先農而耕籍也又六典及禮閣新儀亦皆先言上辛祀昊天後言吉亥享先農伏望改用來年正月上辛後亥日享先農即為著令用符禮文詔太常寺崇文院檢討官参議判寺李宗諤等言唐制正月上辛祈榖孟春亥日享先農不明載祈榖享先農前後按禮記月令正月中氣天子以元日祈榖於上帝乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田注云祈榖謂上辛祀昊天上帝籍田謂郊後亥日享先農於東郊而耕籍田又按宋書後魏書所載並上辛後亥日祀先農伏請下有司自今享先農並用上辛後亥日從之仁宗明道二年二月十一日帝親耕籍田禮儀准端拱之制微有増損詔籍田青城及壇壝所占或先有民家塋冡府縣不得因兹夷剗宜權用箔曲遮蔽以便行禮廣文館開封府貢舉人等上書以國家躬訓農事難逄之㑹乞陪序於壇次以觀盛典從之令陪位於文官九品之下大禮使言籍田禮希曠已久比聞修舉内外翹屬况親屈萬乘勸農力本伏請下有司令遍諭宻近村聚候御耕日特許父老鄉民觀望盛禮勿令呵止從之神宗元豐二年詔於京城東南度田千畆為籍田置令一員徙先農壇於其中神倉於東南取卒之知田事者為籍田兵先是詳定郊廟奉祀禮文所言國語王耕一墢庶人終於千畆廪於東南鍾而藏之自漢迄唐皆有帝籍神倉今廢不設凡祭祀之所用皆索諸市非所以致潔誠也欲乞於京城東南度田千畆置籍田令一員仍徙先農壇於其中立神倉於東南以郊社令辛公佑兼籍田令公佑請因舊鏺麥殿規地為田取卒之知田事者刺為籍田兵給其役五榖之外並植果蔬冬則藏冰凡一嵗祠祭之用取具焉先薦獻而後進御有餘則質錢以給雜費輸其餘於内藏庫用著為令權管幹籍田王存等言請以南郊鏺麥殿前地及玉津園東南茭地八百四十餘畆并民田共千一百畆充籍田外以百畆建先農壇兆開阡陌溝洫建神倉齋宫并耕作人牛廬舍之類繪圖進呈從之哲宗紹聖四年權禮部侍郎范鏜等言每遇臨幸籍田常遣官祭告先農壇其籍田刈稼皆以為粢盛之實車駕臨幸則取新薦獻當在所先即刈麥乞以所進麥付所司變造禮食於臨幸次日薦之太廟然後進供頒賜並如故事秋觀刈禾亦如之及乞觀麥禮畢車駕移幸稻池綵殿以觀插稻詔可將作監言増修鏺麥殿成詔以思文為名徽宗政和元年臣僚言乞講明耕籍之禮議禮局條具八事一罷享先農為中祠命有司攝事帝止行耕籍之禮一罷命五使及稱賀肆赦之類一乞孟春之月親耕下太史局擇日不必專用吉亥一耕籍所乘改用耕根車罷乘玉輅一乞躬耕之服止用通天冠絳紗袍百官並服朝服一倣雍熙儀注九卿以左右僕射六尚書御史大夫攝諸侯以正員三品官及上將軍攝一倣雍熙儀注設庶人耕位於諸侯耕位之南以成終畆之禮一倣雍熙明道儀備青箱以設九榖如隋之制其詳並見政和五禮新儀髙宗紹興二年四月上謂輔臣曰朕聞祖宗時禁中有打麥殿今朕於後圃令人引水灌畦種稻不惟務農重榖示王政所先亦欲知稼穡之艱難七年太常博士黄積厚言孟春吉亥日享先農望下有司條舉行之以酒脯一獻之禮儀視風師十四年十一月詔以嗣嵗之春祗祓青壇親載黛耜躬三推之禮命臨安府守臣度城南之田得五百七十畆有竒廼建思文殿觀耕臺神倉及表親耕之田又詔毋建殿宇設幕殿席屋如南郊事畢撤去庶不擾民太常丞王湛謂新儀帝乘耕根車左輔奉耒耜載以象輅列於仗内政和八年左輔奉耒耜于玉輅耕籍使衛以儀仗二千人先詣壇所王之五輅玉輅最貴耕根一名芒車所謂農輿無葢車之無飾者也齊代籍田御史乘馬車載耒耜於五輅之後時以為禮輕更用侍中載於象輅真宗明道二年二月帝乘玉輅適耕所司農卿以耕根車載耒耜前玉輅以行今政和儀帝御耕根而耒耜乃載於玉輅輕重失序請乘玊輅而以耕根載耒耜又謂端拱明道之禮備矣政和中徽宗正之故新儀最為簡要宜遵而行權工部侍郎錢時敏奏耕籍使所乘車禮官謂象車以象飾諸末朱斑輪八鸞左衡左建旗右載闟㦸駕馬四飾鞶纓輪衣絡帯皆繡以鸞車髙丈有五尺廣丈請下有司製之甲子禮官請前三日司農以青箱奉九榖穜稑之種進内前二日皇太后率六宫獻之於帝次日授司農以待耕事九榖種以竹木箱載之無葢飾以青色覆以青帕三公三少宰臣親王使相五推執政臣二省臺諫九推庶人終畆又請少府製御耒耜二及韜皆飾以青御耕青牛四衣以青如無青牛以黄牛代以青羅夾衣葢撘從耕官每耒耜用牛二頭耒耜三十牛六十庶人四十人並青衣耒耜四十牛八十鍤十畚二十各命有司具之時敏又謂象車小様庳請加髙二尺為丈有七尺茵褥用紫閏十一月癸酉兵部謂仗士二千以太常鼓吹黄麾仗足之前期閲習前一日宿仗於皇城南門外質明衛耒耜先往禮官先用其半又請耕籍使用本品鹵簿王公六百八十有八人請用其半禮官請親耕日命有司享先農己巳詔討論象車合製與否禮官乃謂新儀象輅載耒耜宣和耕籍使乘象車参考端拱親耕以耕根車載耒耜而使不乗車請用端拱禮耕籍使朝服騎䕶耒耜行於仗内仗士千人質明先往壇所以候車駕罷象輅不製唯製耕根車從之十五年正月壬辰上享先農遂耕籍三推畢宰臣秦檜請以耒耜授有司上不許曰力本務農出於誠心至九推三請乃止饗先農親耕籍田儀注前期設御座於籍田思文殿之中南向東西閣於殿後之左右御幄於觀耕壇上南向大次於殿上南向小次二一於先農壇午階下稍東西向一於觀耕壇西階下稍北南向羣臣次於門之内外設饌幔樂舞前一日設帝神農氏位於壇之北方南向后稷氏位於東方西向席皆以莞設帝位版於壇下小次前西向飲福位於壇上稍西北向望瘞位於子階之西北向羣臣位各以其方罇罍俎豆皆如大祀司農設御耒耜於南門外幕屋之内御耕版位於耕籍所南向侍耕位在於東西階北上從耕三公位在東南九卿諸侯位在其南皆西向北上庶人位在其南少東十歩外耆老陪耕又在其南皆西向御耒席於三公之北稍西南向太僕設御耕牛於御耕位之西稍北太常設登歌於觀耕壇上宫架於庶人耕位之南俱北向耕籍使位於御耕位之東南向侍中在其南西向司農卿二一位於侍中之後一在其南籍田令二在司農卿之南少退皆西向北上奉青箱官位其後司農少卿位二於庶人位之前太社令位於司農之西少退皆西北向太僕卿位於御耕牛之東稍前南