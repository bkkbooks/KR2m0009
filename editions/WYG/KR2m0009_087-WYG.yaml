body:
  text: 文獻通考卷八十七鄱陽馬端臨貴與著郊社考二十籍田祭先農周制天子孟春之月乃擇元辰親載耒耜置之車右帥公卿諸侯大夫躬耕籍田千畆於南郊籍借也借人力以理之勸天下使務農也謂之帝籍天子籍田千畆於南郊諸侯百畆謂籍於東郊冕而朱紘躬秉耒天子三推推發也諸侯三公冕而青紘躬秉耒三公五推諸侯九推反執爵於太寝三公九卿諸侯大夫皆御命曰勞酒既耕而燕飲以勞羣臣也大寝路寝御侍也内宰上春詔王后帥六宫之人而生穜稑之種而獻之於王六宫之人夫人以下分居后之六宫古人使后宫藏種以其有傳類蕃孳之祥必生而獻之者示能育之使不傷敗且以佐王耕事供祭祀也先種後熟謂之穜後種先熟謂之稑甸師掌帥其屬而耕耨王籍以時入之其屬庶人也耨鋤也王籍謂王者籍田千畆帥公卿以下親耕之處也甸師帥庶人終耕之入其収於王以供粢盛宣王即位不籍千畆自厲王時籍田禮廢宣王即位不復遵古虢文公諫曰虢仲之後為王卿士不可夫民之大事在農上帝之粢盛於是乎出是故稷為大官民之大事在農故稷之職為大官古者太史順時音脉視也土陽癉憤盈土氣震發癉丁佐反癉厚也憤積也盈滿也震動也發起也農祥晨正農祥房星也晨正謂立春之日晨中於午也農事之候故曰農祥日月底於天廟底音㫖底至也天廟營室也孟春之月日月皆在營室土乃脉發脉理也農書曰春土冒撅陳根可㧞耕者急發先時九日先去聲日先先立春也太史告稷曰自今至於初吉告古毒反云初吉二月朔日也詩二月初吉陽氣俱蒸土膏其動蒸升也膏上潤也其動潤澤欲行弗震弗渝脉其滿𤯝榖乃不殖震動也渝變也𤯝災也言陽氣俱升土膏欲動當即發動變瀉其氣不然則脉滿氣結更為災病榖乃不殖稷以告以太史之言告王王曰史帥陽官以命我司事曰距今九日土其俱動王其祗祓監農不易王乃使司徒咸戒公卿百吏庶民百吏百官也庶民甸師所掌之民葢主耕耨王之籍田者司空除壇於籍司空掌地也命農大夫咸戒農用農大夫田畯也農用農噐也先時五日瞽告有協風至瞽樂太師知風聲者協和也風氣和時候至也立春曰融風王即齋宫齋側皆反所齋之宫百官御事各即其齋三日御治也王乃淳濯饗醴淳沃也濯溉也饗飲也謂王沭浴飲醴酒及期期耕日也欎人薦鬯欎欎金香草宜以和鬯酒也周禮欎人掌祼噐凡祭祀賔客和欎鬯以實彜而陳之共王之齋鬯共音恭犧人薦醴犧人司尊也掌共酒醴者王祼鬯饗醴乃行祼灌也灌鬯飲醴皆所以自香潔百吏庶民畢從及籍后稷監之從去聲膳夫農正陳籍禮膳夫上士也掌王之飲食膳羞之饋食農正田大夫主敷陳籍禮而祭其神為農祈也太史賛王王敬從之王耕一墢墢鉢伐二音一墢一耜之墢也王無耦以一耜耕班三之班次也三之下各三其上也王一墢公三卿九大夫二十七庶人終于千畆終盡耕也其后稷省功太史監之司徒省民太師監之省息耕反畢宰夫陳饗膳宰監之宰夫下大夫也膳宰膳夫也膳夫賛王王歆太牢班嘗之庶人終食是時也王事唯農是務無有求利於其官以干農功三時務農而一時講武三時春夏秋一時冬也講習也故征則有威守則有財若是乃能媚於神而和於民今天子欲修先王之緒而棄其大功匱神之祀而困民之財將何以求福用民王弗聼國語周語漢文帝制曰農天下之本其開籍田朕躬耕以給宗廟粢盛舊儀春始東耕於籍田官祠先農以一太牢百官皆從先農神農也五經要義云立壇於田所祠之其制度如社之壇賜三輔二百里孝悌力田三老種百榖萬斛為立籍田倉置令丞榖皆以給天地宗廟羣神之祀以為粢盛景帝詔曰朕親耕為天下先昭帝㓜即位耕於鉤盾弄田鉤盾宦者近署故往試耕為戲弄後漢明帝永平中二月東廵耕於下邳章帝元和中正月北廵耕於懐縣其籍田儀正月始耕常以乙日祠先農及耕於乙地晝漏上水初納執事告祠先農以享耕日以太牢祭先農於田所耕時有司請行事就耕位天子三公九卿諸侯百官以次耕推數如周法力田種各耰訖有司告事畢是月命郡國守皆勸人始耕魏氏天子親耕籍田藩鎮闕諸侯百畆之禮晋武帝太始四年正月丁亥帝躬耕籍田於東郊詔曰近代以來耕籍田於數歩之中空有慕古之名曽無供祀訓農之實而有百官車徒之費今循千畆之制當羣公卿士躬稼穯之艱難以帥先天下於東郊之南洛水之北去宫八里逺十六里為北千畆帝御木輅以耕太牢祀先農自恵帝後禮廢矣東晋元帝將修耕籍事竟不行時朝議至尊應躬祠先農不賀循曰漢儀無躬祭之文然王祭四望則毳冕祭社稷五祀則絺冕以此不為無親祭之義宋文帝元嘉二十一年將親耕時史學生山謙之以科鳩集其儀因已奏聞詔言斟酌衆條造定圗注先立春九日司空大司農京尹令尉度宫之辰地八里之外整制千畆中開阡陌立先農於中阡西陌南御耕壇於中阡東陌北將耕宿青幕於耕壇之上皇后帥六宫之人出穜稑之種付籍田令耕日太祝令以一太牢祠先農如帝社儀孟春上辛後吉亥御乘耕根三葢車駕蒼駟建青旂著通天冠青幘青衮佩蒼玉蕃王以下至六百石皆衣青唯三臺武衛不耕不改章服駕出如郊廟儀至籍田侍中跪奏至尊降車臨壇大司農跪奏先農已享請皇帝親耕太史賛曰皇帝三推三反於是羣臣以次耕王公及諸侯五推五反孤卿大夫七推七反士九推九反籍田令率其屬耕竟畆灑種即耰禮畢乃班下州縣悉備其禮焉齊武帝永平中耕籍田用丁亥時有司奏正月丁亥可祀先農比來並用立春後亥王儉以為亥日籍田經記無文助敎周山文議曰蔡邕月令章句解元辰云甲榦也辰支也有事於天用甲有事於地用辰何佟之云少牢饋食禮云孝孫某來日丁亥用薦嵗事於皇祖鄭以不必丁亥今但直舉一日以言之耳禘太廟禮日用丁亥若不得丁則用己亥辛亥茍有亥焉可也漢文用此日耕籍祠先農後相承用之非有别義班固序亥位亦云隂氣應無射該藏萬物而雜陽閡種也且亥既水辰含育為主播厥取吉其在兹乎使御史乘馬車載耒耜從五輅梁初依宋齊禮以正月用事不齋不祭天監十二年以啟蟄而耕時在二月内尚書云以殷仲春籍田理在建卯於是改用二月與百官御事並齋三日沐浴祼饗侍中奉耒耜載於象輅以隨木輅之後禮云親載耒耜措於参保介之御間則置所乘輅上普通二年又移籍田於建康北岸築兆域如南北郊别有觀耕臺在壇東帝親耕畢登此臺以觀公卿之推反後魏太武帝天興三年春始躬耕籍田祭先農用羊一北齊籍於帝城東南千畆内種赤粱白榖大豆赤黍小豆黒穄麻子大麥小麥色别一頃自餘一頃地中通阡陌作祠壇於陌南阡西廣輪三十尺四陛三壝四門又為大營於外設御耕壇於阡東陌北每嵗正月上辛後吉亥祠先農神農氏於壇上無配饗祭訖親耕隋制於國南十四里啟夏門外置地千畆為壇行禮播殖九榖納於神倉以擬粢盛秸稾以餉犧牲唐制皇帝孟春吉亥饗先農於東郊親耕於籍田太宗貞觀三年正月親祭先農籍於千畆之甸初議籍田方面所在給事中孔頴逹曰禮天子籍田於南郊諸侯於東郊晉武帝猶於東郊今於城東不合古禮帝曰禮縁人情何常之有虞書云平秩東作則堯舜敬授人時已在東矣又乘青輅載黛耜者所以順於春氣故知合在東方且朕見居少陽之地田於東郊葢其宜也於是遂定自後每嵗常令有司行事髙宗永徽三年正月親享先農躬御耒耜率公卿耕於千畆之甸乾封二年正月行籍田之禮躬秉耒耜而九推禮官奏陛下合三推上曰朕以身率下自當過之恨不終千畆耳初將耕籍田閲耒耜有雕刻文飾者謂左右曰田噐農人執之在於朴素豈貴文飾乎乃命撤之儀鳯二年親耕籍田於東郊景雲三年親耕籍田武太后改籍田壇為先農壇神龍初復改先農壇為帝社壇詳見社稷門元宗開元二十三年正月親祀先農禮畢降至耕位侍中執耒太僕執轡上謂左右曰帝籍之禮古則三推朕今九推庶九榖之報也遂進耕五十餘歩盡壠乃止耕畢還齋宫大赦侍耕執牛官皆加級賜帛其年十一月親祀神農於東郊以后稷配親耕耒耜而九推焉憲宗元和五年上將行籍田之禮詔有司詳定儀注太常言籍田禮廢已五十餘年有司案牘無可檢尋今據禮經及開元乾元故事并徴前代沿革参詳定勅付所司未及施行而罷唐開元禮皇帝吉亥享先農儀攝事附齋戒前祀五日皇帝散齋三日於别殿致齋二日一日於太極殿一日於行宫餘同上辛儀陳設先農壇髙五尺方五尺四出陛其色青祀前二十日修畢前享三日陳設如圜丘儀前享二日太樂令設宫懸樂如圜丘儀唯樂懸樹路鼓為瘞埳於壇壬地外壝之内為異前享一日奉禮設御位如圜丘儀唯設望瘞位於内壝東門之内道南又設奉禮位於瘞埳西南東面南上為異攝事右校掃除壇之内外前享二日衛尉設享官公卿以下次於外壝東門外道南北向西上設陳饌幔於内壝東門外道南北向太樂令設宫懸前享一日奉禮即設享官公卿位於内壝東門内道北執事位於道南西向北上設御史位於壇下如式又設奉禮位於樂懸東北贊者二人在南差退俱西向北上又設奉禮賛者位於瘞埳東面南上設協律郎位於壇上南陛之西東向太樂令於北懸間享官門外位皆於東壝外道南如式又設御耕籍位於外壝南門之外十歩所南向設從耕位三公諸王諸尚書諸卿位於御座東南重行西向各依推數為列其公王尚書卿等非耕者位於耕者之東重行西向俱北上介公􅈶公位於御位西南東向以北為上尚舍設御耒席於三公之北少西南向奉禮又設司農卿位於御耒席東少南西向廪犧令於司農卿之南少退諸執耒耜者位於公卿耕者之後非耕者之前西面御耒耜一具三公耒耜三具諸王尚書卿各三人合耒耜九具以下耒耜太常各令籍田農人執之攝事無設耕籍位以下至此儀設酒罇之位於壇上神農氏犧罇二象罇二山罍二東南隅北向后稷氏犧罇二象罇二山罍二在神農酒罇之東俱北向西上罇皆如勺羃有坫以置爵設御洗於壇南陛東南亞獻洗於東陛南俱北向執罇罍篚羃者各位於罇罍篚羃之後設幣篚於壇上各於罇坫之所晡後郊社令帥齋郎以罇坫罍洗篚羃入設於位升壇者自東陛謁者引光禄卿詣厨視濯溉凡導引者每曲一逡廵贊引引御史詣厨省饌具光禄卿以下每事訖各還罇所享日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲未明五刻太史令郊社令各服其服升設神農氏神座於壇上北方南向設后稷氏神座於東方西向席皆以莞設神位於座首鑾駕出宫乘耕根車於太極殿前餘同圜丘儀饋享享日未明三刻諸享官及從享之官各服其服郊社令良醖令帥其屬入實罇罍及幣犧罇實以醴齊象罇實以盎齊山罍實以清酒齊皆加明水酒皆加元酒各實於上罇幣皆以青太官令帥進饌者實諸籩豆簠簋等入設於饌幔内未明二刻奉禮帥賛者先入就位其御史及禮官等入再拜掃除及就位如圜丘儀未明一刻謁者賛引各引享官以下就門外位司空行掃除及從享羣官客使等次入就位並如圜丘儀攝事自未明三刻至此與正儀同初未明三刻諸衛列大駕伏衛陳設如式侍中版奏外辦請中嚴乘黄令進耕根車於宫南門外廻車南向若行宫去壇稍逺嚴警如式未明一刻侍中版奏外辦質明皇帝服衮冕乘輿以出繖扇華葢侍衛如常儀侍中負璽陪從如式皇帝升車訖乘黄令進耒太僕受載如初黄門侍郎奏請鑾