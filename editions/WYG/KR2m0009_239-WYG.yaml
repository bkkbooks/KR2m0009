body:
  text: 文獻通考卷二百三十九鄱陽馬端臨貴與著經籍考六十六集别集空青遺文十卷陳氏曰直寳文閣曾紆公衮撰紆布之子有異材建中靖國初布在相位奉詔為景靈西宮碑紆之筆也建炎紹興之際將漕江浙入為司農少卿知信衢州以卒汪彦章志其墓孫仲益序其文王銍性之其壻也孫鴻慶序公文章固守家法而學詩以母夫人魯國魏氏為師句法清麗絶去刀尺有古詩之風黄魯直遷宜州道出零陵得公江越書事二小詩書團扇上諸詩人莫能辯也先公序畧曰余自誦涪翁扶藜對蘚之吟曲阜把卷臨燈之句固已心慕公衮才章之盛顧前修日遠自乾淳諸老文字猶多遺落况過江前後間乎一日西泉吳太史為言此吾鄉空青公也有集藏於家余惟空青公子弟起家文章繼世潛逃於家君柄用之時繾綣於諸賢流落之後未幾滅跡毁廬相隨入黨迄天地重開迨能以三朝正論暴白於世視同時諸貴公子孫所謂繼志述事者其為人賢不肖何如也昔石林葉公以親見揚雄美其詩以新樣元和評其書以三世風流頌其文近世李鴈湖亦謂人惡雋異俗疵文雅如空青諸人雖不偶於一時而文采爛然垂後著世不能掩也今其遺文如魯殿秦碑見者珍惜自可孤行於南豐曲阜之後云北山小集四十卷陳氏曰中書舍人信安程俱致道撰俱父祖世科而俱乃以外祖鄧潤甫蔭入仕宣和中賜上舍出身為南宮舍人紹興初入西掖徐俯為諫大夫封還詞頭罷去後以次對修史病不能赴而卒石林葉氏序畧曰余居吳始識致道見其學問風節卓然有不獨見於其文者即為移書當路并上其文數十篇宰相見而驚曰今之韓退之也亟召見政事堂其後二十四年間卒登侍從為天子掌制命文章擅一時今觀其文精確深遠議論皆本仁義而經緯錯綜之際則左邱明班孟堅之用意也至於詩章兼得唐中葉以後名士衆體晩而在朝雖不久遇所建明尤偉蓋其為人剛介自信擇於理者明所行寧失之隘不肯少貶以從物是以善類皆相與推先惟恐失之雖有不樂之者亦不敢秋毫加疵病信乎直道之不終屈也陵陽集五十卷陳氏曰中書舍人仙井韓駒子蒼撰自㓜能詩黄太史稱其超軼絶塵蘇文定以比儲光羲游太學不第政和初獻書召試出身後入西掖坐蘇氏鄉黨曲學罷丹陽集四十二卷後集四十二卷陳氏曰顯謨閣待制江陰葛勝仲魯卿撰紹聖四年進士元符三年詞科洪慶善序其文有所謂絶郭天信拒朱勔慙盛章而怒李彦者蓋其平生出處之畧也再知湖州後遂家焉孫鴻慶序畧曰公中宏詞第一時天子輯瑞應蒐講彌文報禮上下四方以符瑞來告者不可勝數大臣表賀皆出公手瓌竒英麗獨步一時公卿交譽屢遷擢大司丞遂躋法從毘陵集五十卷陳氏曰參政文清毘陵張守全眞撰一字子同崇寧進士詞科紹興執政張魏公在相位薦秦檜再用守有力焉一日與魏公言某誤公聽今朝夕同班列得欵曲其人似以曩者一跌為戒有患失心宜自劾謝上魏公為作墓誌著其語張章簡華陽集四十卷陳氏曰參政金壇張綱彦正撰大觀中舍法三中首選釋褐為承事郎辟雍正蓋專於新學者紹興初在𤨏闥忤張俊求去復與秦隙遂引年秦亡乃召用乾道初年八十四而終自號華陽老人華陽者茅山也非有齋類稿五十卷陳氏曰給事中吳興劉一止行簡撰宣和三年進士居瑣闥僅百餘日忤秦檜罷去閒居十餘年以次對致仕檜死被召力辭進擢學士而終年八十二實紹興庚辰竹西集十卷西垣集五卷陳氏曰兵部侍郎維揚王居正剛中撰宣和三年進士紹興初入詞掖西垣集者制草及繳章也其篇目凡繳章皆云封還詞頭蓋其子孫編次者之失也除授則有詞頭政刑庶事何詞頭之有張巨山集三十卷陳氏曰中書舍人光化張嵲巨山撰嵲為司勲郎官金人再取河南秦相皇恐上章引伊尹善無常主及周任不能者止之文以自解嵲之筆也秦德之遂擢修注掌制而其具稿倉卒誤以伊尹告太甲為告湯及周任之言為孔子自言時祕書省寓傳法寺有書其門曰周任為孔聖太甲作成湯秦疑諸館職為之多被逐然嵲亦以答檜三折肱之語謂其貳於已無幾亦罷默成居士集十五卷陳氏曰中書舍人潘良貴子賤撰一字義榮剛介之士也朱侍講序其集畧見其出處大致朱子序畧曰公自宣和初為博士則己不肯托昏富貴之家而獨嘗論斥大臣䝉蔽之姦及為館職又不肯游蔡京父子門使淮南又不肯與中官同燕席靖康召對因論時宰何㮚唐恪不可用恐誤國事以是謫去不旋踵而言果驗建炎初召為右司諫首論亂臣逆黨當用重典以正邦法壯國威且及當時用事者姦邪之狀大為汪黄所忌書奏三日而左遷以去紹興入為都司又忤時相以歸復為左史直前奏事明大公至正之道服喪還朝又以廷叱奏事官而忤㫖以去自是之後秦檜擅朝則公遂廢於家而不復起矣然公平生亷介自持自少至老出入三朝而前後在官不過八百六十餘日所居僅庇風雨郭外無尺寸之田經界法行獨以邱墓之寄輸帛數尺而已其清苦貧約蓋有人所不堪者而處之超然未甞少屈於檜其子熺暴起鼎貴勢傾内外亦未甞與通問也甞誦君子三戒之言而深以志得之規痛自儆飭至於造次之間一言一行凡所以接朋友教子弟亦未甞不以孝弟忠敬節儉正直防微謹獨之意為本其讀書磨鏡之喻􅋀中學者之病當世蓋多傳之而所論汲長孺蓋寛饒之為人尤足以見其志之所存也嗚呼若公之清明直諒確然亡慾其眞可謂剛毅而近仁矣夫以三代之時聖人之世而夫子已歎剛者之不可見况於百世之下幸有如公者焉而不得少申其志以沒其條奏草稿有補於時可為後法者又以公自焚削而不復存其平生之言頗可見者獨有賦詠筆札之餘數十百篇而已後之君子蓋將由此以論公之事其可使之沒沒無傳而遂已乎筠溪集二十四卷陳氏曰戸部侍郎連江李彌遠似之撰大觀三年上舍第一知冀州能抗金兵攝江東帥與忠定平周德之亂晩為從官沮和議坐廢而終鄱陽集十卷陳氏曰徽猷閣直學士鄱陽洪皓光弼撰皓奉使金廷守節不屈旣歸為秦所忌謫英州死之日與秦適相先後三子登詞科俱顯貴東窻集四十卷陳氏曰中書舍人鄱陽張廣彦實撰與呂居仁為詩友其在西掖當紹興十一年雪溪集畧八卷陳氏曰汝陰王銍性之撰國初周易博士昭素之後也其父萃樂道嘗從歐公學銍為曾紆壻甞撰七朝國史紹興初常同子正薦之詔視秩史官給札奏御會秦氏柄國中止書竟不傳其子明清著揮麈錄竹軒雜著十五卷陳氏曰太常少卿永嘉林季仲懿成撰以趙元鎭薦入朝奏疏沮和議得罪仲熊叔豹季貍其弟也皆知名北山集三十卷陳氏曰端明殿學士金華鄭剛中亨仲撰紹興二年亞魁受知秦相使川陜後忤意貶死封州澹菴集七十八卷陳氏曰端明殿學士忠簡廬陵胡銓邦衡撰建炎甲科第五人旣上書乞斬秦檜謫嶺海秦死得歸孝宗即位始復官召用又以沮再和之議得罪去乾道中入為丞郎亦不容於時奉祠至淳熙七年乃終七十九平園周氏跋曰胡忠簡公詩有不可及者三用事博而精下語豪而華一也士子投獻必用韻酬答雖百韻亦然愈多而愈工二也此篇和王君行簡時年七十五長歌小楷與四五十人無異三也誠齋序先生之文肖其為人議論閎以挺其記序古以馴其代言典而嚴其書事約而悉其為詩蓋自詆斥時宰誕置嶺海愁狖酸骨饑蛟血牙風呻雨喟濤譎波詭有非人間世之所堪耐者不介於心而反昌其詩視李杜夜郎䕫子之音益加恢竒云至於騷詞涵茫嶄崒鉥劌刻屈抉天之幽洩神之廋槁癯而不瘁恫愀而不懟自宋玉而下不論也李文簡公集一百二十卷敷文閣學士丹稜李燾仁父撰水心集序曰自有文字以來名世數十大抵以筆勢縱放凌厲馳騁為極功風霆怒而江河流六驥調而八音和春輝秋明而海澄嶽靜也高者自能餘則勉而效之矣雖然此韓愈所謂下逮荘騷其上無是也觀公大篇詳而正短語簡而法初未甞藻黼琢鏤以媚俗為意曾㸃之瑟方希化人之酒欲清又非以聲色臭味自怡悦也獨於古文墜學堂上之議起虞造周如挈裘領振之焉固遺其下而獨至其上者歟蜀自三蘇死公父子兄弟後起兼方合流以就家學綜練古今名實之際有補於世天下𫝊以繼蘇氏云沈子壽文集水心集序曰吳興沈子壽少入太學名聞四方仕四十餘年絀於王官再入郡三佐帥幕公私憔悴而子壽老矣然其平生業嗜文字若性命在身非外物也甲乙自著累百千首嗚呼何其勤且多也余後學也不足以識子壽之文其不為竒險而瑰富精切自然新美使讀之者如設芳醴珍殽足飲饜食而無醉飽之失也又能融釋衆疑兼趨空寂讀者不惟醉飽而己又當消愠忘憂心舒意閑而自以為有得於斯文也觀其開闔疾徐之間旁觀而横陳逸騖而高翔蓋宗廟朝廷之文非自娛於幽遠淡泊者也徐斯遠文集水心集序曰斯遠盡平生文僅二十餘首首輙精善疑其親自料揀應留者止此爾徐觀筆墨輕重以十一斂藏千百雖鋪寫縱放亦無怠惰剝落之態迷流􅈝起體勢各成殆非精㨂所能致也詩險而肆對面崖壑咫尺千里操舍自命不限常律慶歴嘉祐以來天下以杜甫為師始黜唐人之學而江西宗𣲖章焉然而格有高下技有工拙趣有淺深材有大小以夫汗漫廣莫徒枵然從之而不足充其所求曾不如脰鳴吻吷出毫芒之竒可以運轉而無極也故近歲學者已復稍趨於唐而獲焉曷若斯遠淹玩衆作凌暴偃蹇情瘦而意潤貎枯而神澤旣能下陋唐人方於宗𣲖斯又過之斯遠有物外不移之好負山林沉痼之疾而師友學問小心抑畏異方名聞之士未甞不遐歎長想千里而同席也初渡江時上饒號稱賢俊所聚義理之宅如漢許下晉會稽焉風流幾冺議論将絶斯逺與趙昌父韓仲止扶植遺緒固窮一節難合而易忤視榮利如土梗以文逹志為後生法凡此皆強為善者之所宜知也相山集二十六卷陳氏曰朝奉大夫濡須王之道彦猷撰宣和六年兄弟三人同登科建炎之亂率衆保明避山從之者皆得免以功改京官沮和議得罪晩年歴麾節其子藺被遇阜陵貴顯韋齋小集十二卷陳氏曰吏部員外郎新安朱松喬年撰侍講文公之父也文公嘗言韋齋先生自為兒童時出語已驚人及去塲屋始放意為詩文其詩初亦不事彫飾而天然秀發格律閑暇超然有出塵寰之趣關博士集二十卷陳氏曰太學博士錢塘關注子東撰紹興五年進士甞為湖州教授自號香巖居士石月老人集三十五卷陳氏曰朝議大夫致仕鄱陽余安行勉仲撰安行累舉不第其子應求以童子登崇寧五年進士科為御史歴麾節所至迎養其父至九十六乃終著書號至言蓋純篤之士也王著作集四卷陳氏曰著作郎福清王蘋信伯撰從程門學以趙忠簡薦召對賜出身秦檜惡之會其族子坐法牽連文致奪官以死屏山集二十卷陳氏曰通判興化軍崇安劉子翬彦冲撰父韐兄子羽子翬以䕃入仕年甫四十八而卒朱文公其門人也嘗謂朱曰吾少聞佛老之説歸讀吾書然後知吾道之大體用之全如此於易得入德之門焉作復齋銘聖傳論可以見吾志矣東溪集二十卷陳氏曰廸功郎漳浦高登彦先撰考試潮州䇿問忤秦相謫死水心葉氏序略曰君高遠獨出無拘留泥滓間意學已成謂當直施用不曲步㨗行以漸巧取之論説必窮盡欲砭時陋扶世壞文不為扶疏茂好惟自根極而成者無不具也故不得志於科舉至轉富入貧本業微折終不動心一以溪山雲月為家宅筆墨簡䇿為情性常覃研竟日曰孔顏不如是也繙經堂集八卷陳氏曰知旴􅇇軍東平畢良史少董撰文簡公士安五世孫甞陷敵有從之游者因為圖名繙經冩其訪問紬繹之狀三近齋餘錄朝奉郎知信州王從正夫撰從文正公五世孫有詩文四百八十餘篇自題三近齋餘錄楊誠齋序略曰其詩如落木森猶力寒山淡欲無如地迥高樓目天寒故國心如凉風回遠笛暝色帶歸舟如塵心依水淨歸鬢與山青不减晩唐諸子如墮蘂盡應輸燕子懶寒猶及占梨花如一番風雨催寒食千里鶯花想故園如身閒更得憑陵酒花早殊非愛惜春如秋生列岫雲尤薄泉瀬懸崖路更慳置之江西社中何辨幽蘭云臨春慘不舒蓋國空自香意不在蘭也至於騷辭如釣臺沐髪乞巧悼亡等篇出入遠游天問之海頡頏幽通思元之囿矣及上前論事之文皆卓然近用又如簋餐豆肉之可以求飽笥裳篚纊之可以御冬使其遇合功用詎可量哉紀之甗鄭之瓚櫝而不讎瘞而不起久則光怪四出貫日襲月有不可掩者惟不求知所以不可掩也歟藥寮叢稿二十卷陳氏曰太常少卿上蔡謝伋景思撰參政克家之子水心葉氏序略曰崇觀後文字散壞相矜以浮肆於險膚無據之辭茍以蕩心意移耳目取貴一時雅道盡矣謝公尚童子脫丱髦游太學俊筆湧出排窄老蒼而不能不受俗學薰染自漢魏根底齊梁波流上遡經訓旁渉傳記門樞戸鑰庭旅陛列撥棄組繡考擊金石洗削纎巧完補太樸其藥園小畫記蓋謝靈運山居之約言志潔而稱物芳無憂憤不堪之情也巖壑老人詩文一卷陳氏曰左朝請大夫洛陽朱敦儒希眞撰初以遺逸召用嘗為館職既挂冠秦檜之孫塤欲學為詩起希眞為鴻臚少卿将使敎之鶴溪集十二卷陳氏曰辟雍博士青田陳汝錫師予撰紹聖四年進士持節數路帥越而卒青田登科人自汝錫始希㸃子與其孫也岳武穆集十卷陳氏曰樞副鄴郡岳飛鵬舉撰飛功業偉矣不必以集著也世所傳誦其賀和議成一表當亦是幕客所為而意則出於岳也漢濱集六十卷陳氏曰參政襄陽王之望瞻叔撰周益公為集序序略曰公生於羊杜成功之地慕其為人博學能文知略輻輳學根於經故有淵源文適於用故無枝葉奏劄甚多皆可行之言内制雖少得坦明之體酷嗜吟詠詞贍而理到近世論文章事業公實兼之豈與夫一偏一曲之士較短量長而已玉山翰林詞草五卷陳氏曰尚書玉山汪應辰聖錫撰紹興五年進士首選本名洋御筆改賜天才甚高而不喜為文謂不宜敝精神於無用然每作輙過人以天官兼翰苑近二年所撰制誥温雅典實得王言體朱晦翁稱為近世第一太倉稊米集七十卷陳氏曰樞密編修宣城周紫芝少隱撰自號竹坡居士白蘋集四卷陳氏曰右文林郎單父龎謙孺祐甫撰荘敏公籍之曾孫也用季父恩仕不遂而死韓南澗志其墓嘗客居吳興故集名白蘋南澗甲乙稿七十卷陳氏曰吏部尚書潁川韓元吉無咎撰門下侍郎維之元孫與其從兄元龍子雲皆甞試詞科不利居廣信溪南號南澗艇齋雜著一卷陳氏曰南豐曾季貍裘父撰鞏之弟曰湘潭主簿宰宰之孫曰大理司直晦之季貍其子也多從呂居仁徐師川游曾一試禮部不中乾淳間名公多敬畏之具見其子濰所集師友尺牘此篇蓋其議論古今之文辭質而義正可以得其人之大略溪園集十卷陳氏曰蘄春吳億大年撰其父擇仁為尙書億仕至靜江倅居餘干有溪園佳勝世傳其樓雪初消詞為建康帥鼂謙之作于湖集四十卷陳氏曰中書舍人歴陽張孝祥安國撰甲戍冠多士出思陵親擢秦相孫塤既居其下秦忌惡之以他事下其父子大理獄明年秦亡上旣素眷不五年登法從阜陵尤眷之不幸不得年死時才四十餘上常有用不盡之歎其文翰皆超逸天才也南軒集三十卷陳氏曰侍講廣漢張栻敬夫撰魏忠獻公浚之長子當孝宗朝以任子不賜第入西掖者韓元吉劉孝韙其入經筵則栻也王司業集三十卷陳氏曰國子司業宛邱王逨致君撰建炎初其家避兵沿汴南下逨年十一偶小泊登岸敵適至亟解維不暇顧遂失之在金十年間關得歸其父工部尚書俁旣歸入太學登癸未科為諫官御史歴麾節終於少司成周平園序略曰公志氣強學問博其文章贍而不失之泛嚴而不失之拘議論馳騁於數千百載之上而䆒極利害於四方萬里之逺其為歌詩慷慨憂時而比興存焉他文閎辯該貫直欲措諸事業所謂援古證今黼黻其辭特餘事耳浮山集十六卷陳氏曰左朝請大夫江都仲并彌性撰紹興壬子進士晩丞光禄寺得知蘄州并甞倅湖籍中有所盼為作生朝青詞好事傳誦之遂漏露坐謫官其訓詞略曰爾為瀆侮之詞曾不知畏天其知畏吾法乎吾鄉前輩能道其事如此周平園序略曰彌性自少卓犖不羣潛心問學力排王氏一偏之説惟六藝孔孟是師筆勢翩翩俊聲籍甚古律如王良造父馭駿馬駕車有犇軼絶塵之勢其賡險韻如繭抽絲印印泥愈出愈新送妹長篇孝友慈愛溢於言外殆欲上規風雅其四六叙事雖閎肆而關鍵甚密對屬雖切而非駢儷所能拘最後蘄州謝上表以古文就今體自成一家雜著題䟦清雅可愛復以餘力出入釋氏游戲歌詞無不過人小醜集十二卷續集三卷陳氏曰直秘閣眉山任盡言元受撰元符諫官伯雨之孫紹興從臣申先之子甲科仕為太常寺主簿終於閩憲楊誠齋序謂其詩文孤峭而有風稜雄健而有英骨忠慨而有義氣蓋將與唐之貞元元和本朝之慶歴元祐諸公並轡而先終非近世陳陳相因累累隨行之作也拙齋集二十二卷陳氏曰校書郎侯官林之竒少穎撰之竒學於呂氏本中而太史祖謙學於之竒其登第當紹興辛未年已四十未幾即入館方鄉用而得末疾霜傑集三十卷陳氏曰德興董穎仲逹撰紹興初人從汪彦章徐師川游彦章為作序妙峰集四十卷陳氏曰中書舍人福清林遹述中撰元符三年甲科苖劉之變在西掖不失節思陵嘉之終龍圖直學士鄮峰眞隱漫錄五十卷陳氏曰丞相文惠公四明史浩直翁撰詅癡符二十卷陳氏曰御史臨海李庚子長撰詅之義衒鬻也市人鬻物於市誇號之曰詅此三字本出顔氏家訓以譏無才思而流布醜拙者以名其集示謙也庚乙丑進士以湯鵬舉薦辟入臺家藏書甚富梯雲集二十五卷陳氏曰中書舍人資川趙逵荘叔撰辛未大魁有氣節四十一歲卒海陵集三十二卷陳氏曰同知密院海陵周麟之茂振撰乙丑進士戊辰詞科既執政被命使金廷辭行得罪去胡獻簡詞垣草四卷陳氏曰禮部尚書會稽胡沂周伯撰介庵集十卷陳氏曰左司郎官趙彦端德荘撰乾淳間名士也甞宰餘干趙忠定其邑人初冠多士德荘在朝徃謁謝德荘語之曰謹勿以一魁先置胷中可謂名言文獻通考卷二百三十九
