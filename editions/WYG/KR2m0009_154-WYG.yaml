body:
  text: 文獻通考卷一百五十四鄱陽馬端臨貴與著兵考六兵制髙宗開元帥府於南京初募兵近萬人王旅寡弱至招潰卒収羣盗以補之既即位始置御營司以大臣主之四年以御營司并歸樞密院詳見禁旅門建炎以來朝野雜記御前諸軍者夲髙宗所收諸將部曲也祖宗以來内外諸軍惟廂禁二色而已禁軍皆𨽻三衙而更戍於外廂軍者所在有之以守臣節制若禁軍在邉上則文臣為經略使者統之武臣但為總管熈寕間内外禁旅合五十九萬人神宗将有事於四夷乃置百三十將其法甚備崇觀後朝廷取其闕額之数以上供故闕而不補者幾半軍興以來所存無幾上在元帥府始招潰卒羣盗以為五軍後又得王淵楊惟忠等河北之兵建炎元年五月以為御營五軍然猶未大盛也三年四月又更置御前五軍劉光世所領西兵則謂之廵衞軍在五軍之外是嵗又改為神武五軍紹興元年十二月又改為行營四䕶軍張俊稱前軍韓世忠稱後軍岳飛稱左軍劉光世稱右軍併楊沂中中軍入殿前司而呉玠軍如故七年八月光世軍叛降偽齊於是川陜軍更以右䕶軍為號十一年四月三宣撫司罷乃改其部曲稱某州駐劄御前諸軍十八年川陜軍亦如之其軍皆不𨽻三衞由是御前軍又在禁軍之外矣御前軍者帥臣不可得而節制得自逹於朝廷令禁兵俱厮役大抵如昔之廂軍將官雖存亦無職事但為武臣差遣而已愚謂不若併軍於廂籍而改御前軍為禁軍所在以帥臣節制之而都統制之官為之副貳庶幾兵民權出於一而緩急可以責成則合祖宗制兵之意矣建炎之後諸大將之兵浸増遂各以精鋭雄視海内而因時制變隨處立營遷易靡定駐劄未有常所有如劉光世軍或在鎮江池州太平韓世忠軍或屯江隂岳飛一軍或戍宜興蔣山惟王彦八字軍隨張俊入蜀而呉玠之兵多屯鳳州大散闗和尚原大略可考矣當是時合内外大軍十九萬四千餘而川陜不與及楊沂中將中軍專總宿衞於是江東劉光世淮東韓世忠湖北岳飛湖南王􅊛四軍通十二萬一千六百時亦未有常屯紹興五年王􅊛罷以兵五千𨽻韓世忠王彦以八字軍赴行在七年之秋劉光世將酈瓊叛以七萬人北降劉豫别将王徳以八千人歸張俊由是三衙之外惟張韓岳三軍為盛自三大將之外八年五月吕師古留兵三千屯太平州而劉錡留兵屯鎮江焉至若四川之兵曲端死呉玠併将其兵王庶劉子羽有興元又招集流散立成部伍子羽罷玠又併将其兵故玠之兵十萬玠死胡世將為宣撫命呉璘以二萬守興州楊政以二萬守興元郭浩以八千人守金州而玠之中部三萬人分屯仙人闗内外璘併將之是以四川之兵獨偏重於興州給事中兼直學士院汪藻言金人為患今已五年陛下以萬乘之尊而倀然未知税駕之所者由將帥無人而御之未得其術也如劉光世韓世忠張俊王􅊛之徒身為大將論其官則兼兩鎮之重視執政之班有韓𤦺文彦博所不敢當者論其家則金帛充盈錦衣肉食輿臺厮飬皆以功賞補官至一軍之中使臣反多卒伍反少平時飛揚䟦扈不循朝廷法度所至驅掠甚於水火陛下不得而問正以防秋之時責其死力耳張俊明州僅能少抗柰何敵未退数里間而引兵先遁是殺明州一城生靈而陛下再有館頭之行者張俊使之也臣痛念自去秋以來陛下為宗社大計以建康京口九江皆要害之地故杜充守建康韓世忠守京口劉光世守九江而以王􅊛𨽻杜充其措置非不善也而世忠八九月間已掃鎮江所儲之資盡裝海舶焚其城郭為逃遁之計洎杜充力戰於前世忠王􅊛卒不為用光世亦晏然坐視不出一兵方與韓吕朝夕飲宴敵至数十里間而不知則朝廷失建康敵犯兩浙乘輿震驚者韓世忠王􅊛使之也失豫章而太母播越六宫流離者劉光世使之也嗚呼諸将以負國家罪惡如此而俊自明引兵至温道路一空民皆逃奔山谷世忠逗遛秀州放軍四掠至執縛縣宰以取錢糧雖陛下親御宸翰召之三四而不來元夕取民間子女張燈髙㑹君父在難而不恤也􅊛自信入閩所過邀索千計公然移文曰無使枉害生靈其意果安在哉臣觀今日諸將用古法皆當誅然不可盡誅也惟王􅊛夲𨽻杜充充敗於前而􅊛不救此不可赦當先斬􅊛以令天下其他以次重行貶降使以功贖過臣愚以為敵退之後正大明賞罰再立紀綱之時莫若擇有威望大臣一人盡䕶諸軍雖陛下親軍亦聼其節制稍稍以法裁之凡軍輙敢擅移屯以䕶駕為名者自主將以下悉論如法仍使於偏禆中擇人才之可用者間付以方面之權待其有功加以爵秩隂為諸将之代此今日所最急者惟陛下與大臣熟議㫁而行之起居郎胡寅上疏言趙充國西漢名将曹操三國英雄其用兵無不屯田積粟而今日之兵開口待哺此何理也自古臨敵有用命者有不用命者故藝祖皇帝嘗出入行間以劔斫士卒皮笠記其退縮者事定而誅之若其摧堅䧟陣則賞不旋踵是謂有賞有刑旌别勇怯而今之賞功全陣轉授未聞有以不用命被戮者此何理也自古行賞其将帥勲閥尤異者則遷其官秩或封以國邑若其士卒則犒賜而已或以金帛予之而已今自長行以上皆以真官賞之人挾劵歴請厚俸至於以官名隊此何理也自古利權盡歸公上予奪操縱惟君所命如李牧之軍市租如藝祖命邉将回易之類則衣糧器械賞設之費皆出其中今煑海𣙜酤之人遇軍之所至則奄而有之闤闠什一之利半為軍人所取至於衣糧則曰仰於大農器械則必取之武庫賞設則盡出於縣官此何理也自古制兵有事則付之將帥無事則歸之天子光武中興可謂馬上取之之時矣猶且不假將帥以久權鄧禹取三輔總数十萬衆一旦無功奪之如探囊中物今總兵者以兵為家若不復肯捨者曹操曰欲孤釋兵則不可也無乃類此乎自建炎以來易置宰執凡四十餘人矣謀慮不臧政事不善雖台衡之重股肱之親一言而去之何獨將帥而不可進退以均勞佚之任㧞沉滯之材乎此又臣所未曉也自古制兵必有實数戰鬬則有敗北平居則有死亡緩急則有散逸此不能免也今諸軍近者四五年逺者八九年未嘗落死損逃亡之数豈皆不死乎抑隨死隨補乎逃而不以告敗而不以告死而不以告補而不以告不可也以補者之姓名充死者之妻子不可也不然軍籍何自而無缺乎此又臣之所未曉也自古制兵必去冗食存精鋭分為等級如所謂百金之士千金之士則戰之所恃以必勝者其餘充聲勢備輜重而已則所以食之役之者不敢與鋭卒班焉雖其等如是然無非軍旅之用也今諸軍則無所不有矣避賦役免門户者往焉納賄賂求官爵者往焉有過咎不得仕者往焉犯刑憲畏逮逋者往焉違科舉失士業者往焉則又有鄉黨故舊之人百工手藝之人方技術數之人音樂俳戱之人彼所以輻輳雲萃者非有勢以庇之乎非有利以聚之乎不然人生各有業何必軍之從此又臣之所未曉也按建炎中興之後兵弱敵强動輙敗北以致王業偏安者将驕卒惰軍政不肅所致汪彦章胡致堂二疏切中時弊故備錄之建炎四年詔神武右軍統制張俊言牙軍軍兵多係招集烏合之衆欲將上等改刺勝㨗次等刺振華振武庶幾軍政歸一易於訓練詔依其後以河北人充河北振武其餘人刺陜西振華紹興元年金人留承楚浙西大帥劉光世守鎮江欲携貳之乃以金銀銅為三色錢其文曰招納信寳獲敵人則燕餞而遺之未幾踵至得数千衆皆給良馬利器用之如華人因創赤心竒兵兩軍頗得其用二年左僕射吕頥浩請舉兵北向以復中原且謂天時人事今皆可為何者昨自淮揚之變兵械十亡八九未幾敵分三道入境江浙兵皆散而為盗自陛下專意軍政稍汰其冗修飭器械今張俊軍三萬有全装甲萬副刀槍弓箭皆備韓世忠軍四萬岳飛軍二萬三千王􅊛軍一萬三千雖不如俊之軍亦皆精鋭劉光世軍四萬老弱頗衆然選之可得其半又神武中軍楊沂中後軍吕師古皆不下萬人而御前忠鋭如崔増姚端張守忠軍亦二萬臣上考太祖之取天下正兵不過十萬况今有兵十六七萬何憚不為且向者羣盗四擾朝廷枝梧不暇今悉已定又自敵之南牧莫敢攖其鋒者近嵗張俊獲㨗於四明韓世忠振於鎮江陳思恭撃於長橋而張榮又大㨗於淮甸良由敵貪殘太甚天意殆将悔禍又敵以中原付之劉豫而豫煩碎不知國體三尺童子知其不可立國事固可料觀宇文虛中密奏雖未可信然敵騎連年不至淮甸必有牽制天意盖可見矣今韓世忠已到行在臣願敵㫁早起命世忠張俊與臣等共議次策北向令世忠由宿泗劉光世由徐曹以入又於明州留海船三百隻今范温閻臯乘四月南風北去徑取東萊此数路皆有糧可因不必調民饋運大兵既集豫必北走所得諸郡就擇土豪為守敵舉兵來争其地則彼出我入彼入我出擾之数年中原可復况今之戰兵其精鋭者皆中原之人恐久而銷磨異時勢必難舉此可為深惜者也及聞桑仲進兵乃議大出師身自将軍北向且言近聞敵偽合兵以窺川陜若於未來舉兵必可牽制陜西之急萬一王師逐豫則彼必震恐令韓世忠自京入闗此亦一竒也按頥浩之言美矣然帝信其説而頒督師之命纔至常州而部将叛之竟稱疾不進略不能北向𤼵一矢復還相位功業無聞焉以所言當時軍旅事情稍備故録之四年樞密院上言提舉御前軍器所申夲所萬全雜役以五百人為額自户部裁減月給盡皆逃遁若依户部所申月米五斗五升每日不及二升麥四斗八升每斗折錢二百日支食錢一百委是贍飬不足詔户部裁定於月糧一石七斗添作一石九斗五月詔神武義軍統制王􅊛下揀閲到第三等軍兵一千六百六十人撥填諸州廂禁軍軍防令諸軍招揀等杖天武第一軍五尺有八寸棒日天武第二軍神衛五尺七寸三分龍衛五尺七寸拱聖神勇勝㨗驍㨗龍猛清朔五尺六寸五分驍騎雲騎驍勝宣武殿前司虎翼水軍五尺六寸武騎寜朔歩司軍虎翼等五尺五寸廣㨗威勝廣徳克勝等五尺四寸五分克戎萬㨗雲㨗横塞等五尺四寸亳州雄勝飛騎威逺等五尺三寸五分濟州雄勝騎射橋道等五尺三寸揀中廣効武和武肅忠靖三路廂軍五尺二寸七年樞密院言勘㑹累降指揮諸軍不得互相招收及拖拽别軍官兵訪聞昨來諸軍内有因事走投别軍之人竊慮互相識認别致紛争理宜措置詔諸軍應今日以前收到别軍官兵特免根䆒自後更不許招誘拘截十一年四月給事中范同以諸將握兵難制獻策於秦檜且以柘臯之㨗言於上召張俊韓世忠岳飛入覲論功行賞皆除樞密副使張俊首納所部兵乃分命三大帥副校各統所部自為一軍更其銜曰統制御前軍馬罷宣撫司遇有出師取㫖兵皆𨽻樞密院依舊駐劄而四川大將兵亦分屯就糧曰興成堦鳳文龍利閬金洋綿房西和州太安軍興元隆慶潼川府凡十四郡焉故今鎮江大軍則韓世忠之舊部建康大軍則張俊之舊部鄂州大軍則岳飛之舊部紹興末年荆南江州池州又皆新創兵籍荆南所屯則劉錡所招効用益以鄂州之兵江池之軍則三衙疲弱之卒屯戍者江州一軍大抵皆茶㓂也而興元府興州金州三都統兵則夲曲端呉玠吕師古之徒闗西之舊部考乾道之末建康都統司兵約五萬人池州都統司兵一萬二千人鎮江府都統司兵四萬九千人荆南都統司兵二萬人興元都統司兵一萬七千人金州都統司兵一萬一千人其後分屯列戍増損不常揀練團併分合不一其下有統制統領正将副将凖備将之目十三年詔殿前司等處統領将官夲請受外别無供給職田之類贍飬不足差官管運侵攘軍政可與逐月支破供給統制副統制月一百五十貫統領官以至凖備将各支給有差庶可贍足其家責以後效若諸軍仍前擅差軍兵囬易興販依私役禁軍法所販物貨計賍坐罪州縣知而不舉與犯人同罪一十九年樞密院言勘㑹内外諸軍招人多收技藝工匠販賣之徒致人材短小形質怯懦敗壊軍政可自今並依等杖招刺壯健堪披帶人如違重寘典憲從之孝宗隆興二年殿前司言諸軍法兵級年及六十將校年六十五減充剩圓支破請受内有戰功亦止半給近年以來僥求全支又有年及不行減落支費浩瀚不免横取於民乞令所屬遵依舊法逐營置籍鄉貫年甲招刺年月悉書於籍一留夲營一留户部一留總領以備開落使用詔依乾道元年詔三衙及江上諸軍今後陞差須候年限及日方許申請遷補之制凡諸軍校嵗月有久近功效有優劣或聯比其名而加遷擢名曰排連其有戰功或大禮郊恩以次遷補則曰轉員惟老病過失者不在遷補之限軍防令諸軍轉補将校者指揮使闕以副指揮使充副指揮使闕以都頭充都頭闕以副都頭充副都頭闕以軍分十将諸禁軍将轉補滿三年者十人闕三人七人至五人闕二人三人闕一人雖未滿三年者八人闕五人七人闕四人五人闕三人三人闕二人者並行轉補諸禁軍将校軍頭十将應轉補者當職官體量依揀禁軍法無病却乃試弓弩内槍刀標牌手各粗習為應法入得轉補即有病悴或年六十上或轉補後犯賍枉法踰濫情重以上雖該恩並隔下其差出者勾抽體量在别州者隨所在州體量訖報住營處諸就糧軍闕将校應轉補者逐處各於見管一等軍分通理所闕人數遞遷如不足申總管或安撫鈐轄縣鎮先於夲州州於夲路比州及以次州一等軍分内選經轉補及二年者填闕又不足逐司報夲處隨轉補文字且奏諸禁軍轉補排連将校節級正管者各依職次指揮却相壓差管及差同管與下名将校節級一等職名者各以補授先後為次諸禁軍已經轉補排連而有以前功賞武藝應轉資者先於舊職上轉補後於已轉資上轉補排連如無闕即於應排轉名次下額外補諸軍以過犯應隔轉補排連未經隔而有戰功及傷中者免隔諸廂軍應補員僚備録所降朝㫖給牒補節級者給帖諸禁軍轉補排連限一季内奏廂軍十日諸馬軍龍猛歩軍龍騎歸逺壯勇将校兵級雖犯徒到營不曽犯盗聼補轉排連諸都作院将校所管工匠三百人以上闕及三人餘遇有闕日轉補及三年依名次遞遷容齊洪氏隨茟曰國朝宿衛禁旅遷補之制以嵗月功次而遞進者謂之排連大禮後次年殿庭較藝乘輿臨軒曰推垜子其嵗滿當去者隨其夲資髙者以正任團練使刺史補外州總管鈐轄小者得州郡監當留者於軍職内陞補謂之轉員唯堆垜之日以疾不趂赴者為害甚重紹興三十二年四月予以右史午對時将有使事與上介張才甫同飯於皇城司有一老兵幞頭執黒杖子拜辭皇城幹辦官劉知閤泣涕哽噎劉亦為惻然予問其故兵以杖相示滿其上皆掲記士卒姓名營屯事件云身是天武第一軍都指揮使曽立戰功積官至遥郡團練使今年滿當出職若御前呈試了便得正任使名而為近郡總管不幸小疾遂遭揀汰只可降移外藩将校在身官位一切除落方伏事州都監聼管營部轄三十七年勤勞一旦如掃薄命不偶至於如是坐者同歎息憐之案崇寜四年有詔諸班直嘗備宿衛病告滿尚可療者殿前指揮使補外牢城指揮使盖舊法也開禧元年興元都統秦世輔言夲司諸軍闕額頗多紹興之末管二萬九千餘人乾道三年以二萬七千人為額今管二萬五千四百餘人所差𤼵出戍官占實一萬一百四十三人㸃閲所部堪披帶者僅六百二十七人欲乞許夲司酌紹興末年元額招刺補填從之葉適應詔兵總論二曰自唐至徳以後節度専地而抗上令喜怒叛服在於晷刻而藩鎮之禍當時以為大諱矣然國擅於將猶可言也未久而將擅於兵将之所為惟兵之聼而遂以刼制朝廷故國擅於将人皆知之将擅於兵則不知也大歴正元之間節度使固已為士卒所立唐末尤甚而五代接於夲朝之初人主之興廢皆羣卒為之推戴一出天下俯首聼命而不敢較而論者特以為其憂在於藩鎮豈不疎哉太祖既收節度權柄故汰兵使極少治兵使極嚴所以平一僭亂威服海内者太祖統紀制御之力非恃兵以為固者也羣臣不考夲末不察事勢忘昔日士卒奮呼専上無禮之患而反以為太祖之所以正國者其要在兵都於大梁無形勢之險而其險以兵夫都於大梁因周漢之舊而非太祖擇而都之也使果恃兵以為固則連營百萬身自増之不待後世也其数乃不滿二十萬何哉不以兵强前世帝王之常道也况太祖之兵不滿二十萬其非恃兵以為固也决矣召募之日廣供饋之日増盖端拱雍熈以後契丹横不可制而然耳康定慶歴謀國日誤恃兵為國之説大熾不禁而後天下始有百萬之兵弱天下以奉兵而其治無可為者矣而上下方揚揚然自以為得計為之治文書聚財賦盡用衰世裒刻之術取於民以㗖之而猶不足及其不可用也則又為之俛首以事驕敵而使之自安於營伍之中也故王安石為神宗講所以銷兵之術知兵之不勝飬而猶不悟籍兵之不必多教諸路保甲至四五十萬隂欲以代正兵正兵不可代而保甲化天下之民皆為兵於是虛耗之形見而天下之勢愈弱元祐廢罷保甲史臣以為太祖設階級之法什伍壯士以銷姦雄之心兵制最明而百餘年無禍亂王安石不足以知此實録所載盖當時議論之夲原也雖然王安石則信不足以知此而不為王安石者豈能知之哉至於紹聖以後則又甚矣保甲復治正兵自若内外俱耗夲末並弱大觀政和中保甲之数至六七十萬二法皆弊名具實亡故軍制大壊而士卒不能被甲荷戈平民相挻化為盗賊斡里雅布始挾兵才萬餘長驅而至莫有敵者倉卒遣人召白徒以勤王京師不守則勤王之人㓂掠遍天下矣嗚呼痛哉養兵以自困多兵以自禍不用兵以自敗未有甚於夲朝者也而議者猶曰恃兵之固制兵之善可因而不可改可増而不可損是厚誣太祖而重誤國家也加以四屯駐之兵又昔日所未有以数倍祖宗之財用投於四總領之巨壑而州郡又以廂禁兵自困侵削民力至於空盡問其外禦則曰請和不暇問其内備則曰倉卒可慮統制統領總管路鈐路分鈐轄将兵之官充滿天下坐糜厚禄而兵未嘗有一日之用方今國未見有難治之弊敵未見有難破之驗徒以自困於兵浸滛重滯不能輕利其一曰四屯駐大兵之患其二曰州郡廂禁土兵弓手之患去一患則得一利一州之兵患去則一州利一方之兵患去則一方利兵患去則兵强惟所用之無不可者陛下果决於此豈有乆而不革者哉又論四屯駐大兵曰敢問四大兵者知其為今日之深患乎使知其為深患豈有積五十年之久而不求所以處此者然則亦不知而已矣自靖康破壊維揚倉卒海道艱難杭越草創天下逺者命令不通近者横潰莫制國家無威信以驅使强悍而諸将自誇雄豪劉光世張俊吳玠兄弟韓世忠岳飛各以成軍雄視海内其玩㓂飬尊無若劉光世其任数避事無若張俊當是時也廩稍惟其所賦功勲惟其所奏将校之禄多於兵卒之数朝廷以轉運使主餽餉隨意誅剥無復顧惜志意盛滿仇疾互生而上下同以為患矣及張浚收光世兵柄制取無策吕祉以疎俊趣之一旦殺帥卷甲而遁其後秦檜慮不及逺急於求和以屈辱為安者盖憂諸将之兵未易收浸成疽贅則非特北方不可取而南方亦未易定也故約諸軍支遣之数分天下之財特命朝臣以總領之以為喉舌出納之要諸将之兵盡𨽻御前将帥雖出於軍中而易置皆由於人主以示臂指相使之勢向之大将或殺或廢惕息俟命而後江左得以少安故知其為深患若此而已雖然以秦檜之慮不及逺也不止於屈辱為安而直以今之所措置者為大功疲盡南方之財力以飬此四大兵惴惴然常有不足之患檜徒坐視而不恤也檜久於其位老疾而死後來者習見而不復知但以為當然故朝廷以四大兵為命而困民財四都副統制因之而侵刻兵食内臣貴倖因之而握制将權蠧弊相承無甚於此而况不戰既久老成消耗新補惰偷堪戰之兵十無四五氣勢愞弱加以役使囘易交跋債負家小日増生飬不足怨嗟嗷嗷聞於中外昔祖宗竭天下之財以飬天下之兵固前世之所無有而今日竭南方之財以飬四屯駐之兵又祖宗之所無有也夫以地言之則北為重以財言之則南為多運吾之多財兵强士飽事力雄富以此取地於北不必智者而後知其可為也今奈何盡耗於三十萬之疲卒襲五六十年之積弊以為庸将腐閹賣鬻富貴之地則陛下之逺業将安所托乎陛下誠奮然欲大有為於天下攄不可掩抑之素志以謀夫不同覆載者之深讎必自是始使兵制定而減州縣之供餽以蘇息窮民種植基夲於是厲其兵使必鬭厲其将使不懼一再當敵而勝負决矣兵以少而後强財以少而後富其説甚簡其策甚要其行之甚易也又論廂禁軍弓手土兵曰廂軍供雜役禁軍教戰守弓手為縣之廵徼土兵為鄉之控扼夫供役有兵備戰有兵廵徼有兵控扼有兵大州四五千人中州三千人小州二千人計一兵之費其正廪給之者居其一焉因兵而置營伍将校其上則路分鈐轄總管者居其一焉恩賜閲視借請劵食者居其一焉縁兵之蠧弊虧公病私者又居其一焉民之所謂第一等户盡其賦入不足以衣食一兵今州郡二税之正籍盡以上供者及其所趂辦酒税窠名盡以上供者朝廷既自以飬大兵而州郡以其自當用度者又盡以飬廂禁土兵又有配𨽻罪人牢犴充塞亦州郡所飬然則財安得不匱而民安得不困乎夫所以飬兵者為其有事而戰不為其無事而備也無事而備則必有不飬之兵而後可今飬之於無事竭州郡之力以衣食之固非所以戰也則雖有百萬之兵而不免自貶為至弱之國乃其勢之宜然耳故不減宿衛屯駐之大兵則國力不寛不減廂禁弓手土兵則州郡之力不寛夫立法定制於重滯繁擾之中以困民為安强以耗國為仁惠以疲士大夫之精力為用材以人心益陋所守益卑者為逺識以不可舉動為體國以飬兵不戰為消姦雄之心遂至於忘讎耻棄諸華廢天命禮壊樂失積衆弊而莫革者宿衛屯駐之兵困之於上廂禁弓手土兵困之於下而已陛下思之於外而不圖其内患行其所難而不實為其所易者何哉古之兵皆出於民者也故民附則兵多而勃然以興民叛則兵寡而忽焉以亡自三代以來皆然矣秦漢始有募兵然猶與民兵参用也唐之中世始盡廢民兵而為募兵夫兵既盡出於召募於是兵與民始為二矣兵與民為二於是兵之多寡不闗於國之盛衰國之存亡不闗於民之叛服募兵之數日多飬兵之費日浩而敗亡之形反基於此唐自天寳以來内外皆募兵也外兵則藩鎮擅之内兵則中人擅之其勢不相下而其力足以相制故安史反叛而郭子儀李光弼以節度之兵誅之朱泚僭亂而李晟渾瑊以神策之兵誅之及其衰也宦官則以内兵而刼制人主方鎮則以外兵而擅廣土地及朱温舉兵内向盡夷中人廢神策而唐之鼎祚移於内楊行密錢鏐馬殷王建劉仁恭李茂貞之徒以卒伍竊據一方而唐之土宇裂於外而唐遂亡矣中更五代則國擅於将将擅於兵卒伍所推則為人主而國興焉非以得其民也其所廢則為獨夫而國亡焉非以失其民也宋有天下藝祖太宗以兵革削平海内暨一再傳則兵愈多而國勢愈弱元昊小醜稱兵構逆王旅所加動輙敗北卒不免因循茍且置之度外洎女真南牧徴召勤王之師動数十萬然援河北則潰於河北援京城則潰於京城於是中原拱手以授金人而王業偏安於江左建炎紹興之間驕兵潰卒布滿東南聚為大盗攻䧟城邑荼毒生靈行都数百里外率為㓂賊之淵薮而所謂㓂賊者非民怨而叛也皆不能北向禦敵之兵也張韓劉岳之徒以輔佐中興論功行賞視前代衞霍裴郭曽無少異然䆒其勲庸亦多是削平内㓂撫定東南耳一遇女真非敗則遁縱有小勝不能補過而卒不免用屈已講和之下策以成晏安江左之計及其末也夏貴之於漢口賈似道之於魯港皆以数十萬之衆不戰自潰於是賣降効用者非民也皆宋之将也先驅倒戈者亦非民也皆宋之兵也夫兵既不出於民故兵愈多而國愈危民未叛而國已亡唐宋是也噫兵猶手足也國猶身也手足强壯則身存手足枯槁則身廢兵多則國存兵少則國亡未有以兵多而亡者今唐兵雖多强悍而不為用猶病狂易之人奮拳舉爪自䧟其膚自屠其腸以至於殞身也宋兵雖多劣弱而不可用猶病痱癖之人恣其芻豢以飬擁腫之四肢脛如腰指如股而病與之俱増以至於殞身也然則所以覆其國者乃兵也所以斃其身者乃手足也又古者籍民為兵其法不過因其户田之可賦者賦之年齒之可任者任之民固不容於倖免而亦不可以濫入司馬法曰使智使勇使貪使愚盖言户盡為兵則君子小人賢與不肖俱出其間也自募兵之法行於是擇其願應募者而所謂願應募者非游手無藉之徒則負罪亡命之軰耳良民不為兵也故世之詈人者曰黥卒曰老兵盖言其賤而可羞然則募兵所得者皆不肖之小人也夫兵所以捍國而皆得不肖之小人則國之所存者幸也紀綱尚立威令尚行則猶能驅之以親其上死其長否則潰敗四出反為生民之禍而國祚隨之矣可勝慨哉文獻通考卷一百五十四
