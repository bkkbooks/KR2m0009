body:
  text: 文獻通考卷一百六十四鄱陽馬端臨貴與著刑考三刑制和帝永元三年帝加元服令郡國中都官繫囚死罪贖縑至司冦及亡命各有差六年以旱詔中都官徒各除半刑讁其未竟五月以下皆免遣幸洛陽寺録囚徒舉寃獄時廷尉陳寵鉤校律令條法溢於甫刑者除之曰臣聞禮經三百威儀三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取失禮則入刑相為表裏者也今律令死刑六百一十耐罪千六百九十八贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乾圗曰王者三百年一蠲法漢興以來三百二年憲令稍增科條無限又律有三家其説各異宜令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并為三千悉刪除其餘令與禮相應以易萬人視聼以致刑措之美傳之無窮未及施行及寵免後遂寝而苛法稍繁人不堪之寵子忠略依寵意奏上二十三條為决事比以省請讞之弊又上除蠶室刑解贓吏三世禁錮狂易殺人得減重論母子兄弟相代死聼赦所代者事皆施行建初中有人侮辱人父者其子殺之肅宗貰其死刑而降宥之自後因以為比有輕侮法張敏駮議以為開相殺之路又輕侮之比寝繁至有四五百科難以垂訓請除其弊詳見詳讞門九年復置若盧獄官若盧獄屬少府主鞫将相大臣是後又有黄門北寺若盧都内諸獄都内主藏官名前書有都内令丞屬大司農十一年詔郡國中都官徒及篤癃老小女徒各除半刑未竟三月者免歸田里十五年有司奏以為夏至微隂起蘼草死可以决小事是嵗初令郡國以日短至按薄刑安帝永初二年旱皇太后幸洛陽寺及若盧獄録囚徒賜河南尹廷尉卿及官屬各有差即日降雨和帝末下令麥秋案驗薄刑而州郡好以苛察為政因此遂盛夏斷獄魯恭上疏諫曰臣伏見詔書敬若天時憂念萬民為崇和氣罪非殊死且勿案驗所以助仁徳順昊天致和氣利黎民者也舊制至立秋廼行薄刑自永元十五年以來改用孟夏而刺史太守不深惟憂民息事之原進良退殘之化因以盛夏追召農人拘對考驗連滯無已司隸典司京師四方是則而近於春月分行諸部託言勞來貧人而無隠惻之實煩擾郡縣亷考非急逮捕一人之罪根連十數上逆時氣下傷農業按易五月遇用事經曰后以施令誥四方言君以夏至之日施命令止四方行者所以助微隂也行者尚止之况於逮召考掠奪其時哉月令孟夏斷薄刑出輕繫夫斷薄刑者謂其輕罪也正不欲令乆繫故時斷之也臣愚以為今孟夏之制可從此令其决獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣肅宗時斷獄皆以冬至之前自後論者互多駮異鄧太后詔公卿以下㑹議魯恭議曰夫隂陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷王者雖質文不同而兹道無變四時之政行之若一月令周世所造而所據皆夏之時也其變者唯正朔服色犠牲徽號噐械而已故曰殷因於夏禮周因於殷禮所損益可知也易曰潛龍勿用言十一月十二月陽氣潛藏未得用事雖吹噓萬物飬其根荄猶盛隂在上地凍水冰陽氣否隔閉而成冬故曰履霜堅冰隂始凝也馴致其道至堅冰也言五月微隂始起至十一月堅冰至也夫王者之作因時為法孝章皇帝深惟古人之道助三正之微著令冀承天心順物性命以致時雍然從變改以來年嵗不熟榖價常貴人不寕安小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正一夫吁嗟王道為虧况於衆乎易十一月君子以議獄緩死可令疑罪使詳其法大辟之科盡冬月乃斷其立春在十二月中者勿以報囚如故事後卒施行元初二年詔中都官繫囚減死一等勿笞詣馮翊扶風屯妻子自隨占著所在女子勿輸亡命死罪以下贖各有差其吏人聚為盗賊有悔過者除其罪順帝永建元年詔減死罪以下徙邉其亡命贖各有差永和五年漢安二年各有此令冲帝即位令郡國中都官繫囚減死一等徙邉謀反大逆不用此令桓帝建和元年詔郡國繫囚減死一等勿笞唯謀反大逆不用此令三年及和平元年永興元年二年俱有減死罪及贖罪之令靈帝建寕元年令天下繫囚未决入縑贖各有差三年熹平五年六年光和三年中和四年各有此令桓帝延熹九年中常侍侯覽等令牢脩上書告李膺等飬大學㳺士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗帝怒下郡國捕黨人布告天下使同忿疾案經三府太尉陳蕃郤之曰今所按者皆海内人譽憂國忠公之臣此等猶将十世宥之豈有罪不彰而致収掠乎不肯平署帝愈怒遂下膺等於黄門北寺獄其辭所連及杜宻陳翔陳實范滂之徒二百餘人或逃遁不獲皆懸金購募使者四出相望陳蕃上言極諫帝怒策免之自後無敢復為黨人言者竇武霍諝等復以為言帝意稍解乃詔黨人二百餘人皆歸田里書名三府禁錮終身初詔書下鉤黨郡國所奏相連及者多至数百唯平原相史弼獨無所上詔書前後廹切州郡髠笞掾史從事坐傳舍責曰詔書疾惡黨人㫖意懇惻青州六郡其五有黨平原何治而得獨無弼曰先王疆理天下畫界分境水土異齊風俗不同他郡自有平原自無胡可相比若承望上司誣陥善良滛刑濫罰以逞非理則平原之人戸可為黨相有死而已所不能也從事大怒即収郡僚職送獄遂舉奏弼㑹黨禁觧所脱甚衆靈帝初即位時李膺等雖廢錮天下士大夫皆髙尚其道而汙穢朝廷希之者唯恐不及更共相標榜為之稱號有三君八俊八顧八厨之號及陳竇用事復舉㧞膺等陳竇誅膺等復廢宦官疾惡膺等每下詔書輒申黨人之禁侯覽怨張儉尤甚乃令朱並上書告儉與同鄉二十四人别相署號共為部黨圗危社稷而儉為之魁詔刋章捕儉等曹節因諷有司奏諸鉤黨者虞放李膺杜宻朱㝢荀昱翟超劉儒范滂等請下郡縣考治時上年十四問節等曰何以為鉤黨對曰即黨人也上曰黨人何用為惡而欲誅之邪對曰皆相舉羣軰欲為不軌上曰不軌者何對曰欲危社稷上乃可其奏凡黨人死者百餘人妻子皆徙邉天下豪傑及儒學有行義者宦官一切指為黨人有怨隙者因相陥害州縣承㫖或有未嘗交關亦罹禍毒其死徙廢禁又六七百人張儉亡命困廹望門投止莫不重其名行破家相容其所經歴伏重誅者以十數連引収考布徧天下宗親並皆殘滅郡縣為之殘破按黨錮之獄出於宦官之惡直醜正然欲加之罪則必従而為之辭靈帝之問曹節曰黨人何用為惡而欲誅之邪善哉問也帝時年方童幼未知姦佞容恱之可親忠賢鯁直之可惡故發此問至對以謀不軌危社稷則不復能窮詰其所以謀之説所以危之状而遽可其奏矣自昔昏暴之君誅諍臣戮直士若龍逄比干之儔皆以諫諍於朝而嬰禍而竊議於野者則未嘗罪之也至李斯始有偶語之禁張湯始有腹誹之律皆處以死罪今觀黨錮諸賢所坐即偶語腹誹之罪而曹節王甫軰所為盖襲斯湯之故智也至於根連株逮坐死者不可勝計雖曰主昏政亂凶璫得以肆其威虐然亦有由來矣盖漢家之法以殊死為輕典而治獄之吏則以深竟黨與為能事義縱為定襄太守定襄獄中重罪二百餘人及賔客昆弟私入相視者亦二百餘人縱一切捕鞫曰為死罪解脱是日皆報殺四百餘人成瑨為南陽太守宛富賈張汎倚恃後宫中官之勢縱横里中功曹岑晊等勸瑨収捕汎等既而遇赦瑨竟誅之并収其宗族賔客殺二百餘人後乃奏聞夫重囚之罪可殺也張汎之罪可殺也至其宗黨賔客数百人豈皆有可死之罪乎而一概殺之義縦酷吏所為固不足道成瑨岑晊名士也亦復若此雖曰其心出於嫉惡然滛酷亦太甚則夫張儉亡命其所經歴伏重誅者数十家至於宗親殲殄郡縣殘破盖亦漢世之法耳夫子曰始作俑者其無後乎傳曰作法於貪敝将若之何信哉崔寔政論曰凡為天下者自非上徳嚴之則治寛之則亂何以明其然也近孝宣皇帝眀於君人之道審於為政之理故嚴刑峻法破姦宄之膽海内清肅天下宻如算計見效優於孝文及元帝即位多行寛政卒以墮損威權始奪遂為漢室基禍之主政道得失於此可監夫刑罰者治亂之藥石徳政者興平之􅆝肉也夫以徳敎除殘是以粱肉治疾也以刑罰治平是以藥石供飬也方今承百王之敝值戹運之㑹自数世以來政多恩貸馭委其轡馬駘其銜四牡横奔皇路險傾方将拑勒鞬輈以救之豈暇鳴和鸞諧節奏哉昔文帝除肉刑當斬右趾者棄市笞者徃徃致死是文帝以嚴致平非以寛致平也司馬公曰漢家之法已嚴矣而崔寔猶病其寛何哉葢衰世之君率多柔懦凡愚之佐唯務姑息是以權幸之臣有罪不坐豪猾之民犯法不誅仁恩所施止於目前姦宄得志紀綱不立故崔寔之論以矯一時之枉非百世之通義也按崔寔政論主於嚴刑而其論發於桓帝之初年司馬温公亦以為矯一時之枉然愚嘗考之漢自冲質而後政日以圮其敝葢原於人主昏庸戚閹相繼秉政紀綱日亂刑罰不中而國隨以亡其咎不在於刑輕也且二帝之時屢有詔書輕減死罪􅂉止於髠鉗􅂉徙邉􅂉贖縑唯謀反大逆不用此令然坐忤梁冀而亡命者死坐張儉親知及所經過者死此二者所誅甚衆豈亦反逆乎葢牧守皆戚閹之黨故於其所疾惡者公違詔書而誅殲之且當時姦凶得志忠賢受禍民不見徳亡形已具猶幸刑制稍寛於西都時有寛恤之詔故其所誅殄及於黨錮之清流而不及於無辜之百姓若使一用武宣之法則狼牧虎冠之徒其作威殺戮毒痛四海必又有不可勝言者自古人主之滛刑嗜殺者如漢之孝武唐之則天寵用張湯義縱王温舒周興來俊臣之徒恣為威酷然不旋踵而以法誅滅之葢二主亦知人之不可多殺特不能勝其好殺之心而至於用此曹旋覺其非而誅之以謝天下張而能弛故不至於亡其國桓靈之昏庸豈足以語此以昏庸之主而復欲其行嚴酷之法則土崩瓦解之勢當如亡秦亦不待建安之末而漢鼎始移矣獻帝建安元年應劭刪定律令為漢儀奏之劭奏曰故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯問其得失於是作春秋决獄二百三十二事動以經對言之詳矣逆臣董卓蕩覆王室典憲焚燎靡有孑遺臣不自揆輒撰具律本章句尚書舊事廷尉板令决事比例司徒都目五曹詔書及春秋斷獄凡二百五十篇蠲去複重為之節文又集駮議三十篇以類相從凡八十二事其見漢書二十五漢記四皆刪叙潤色以全本體其二十六博採古今瓌偉之士文章煥炳徳義可觀其二十七臣所創造雖未足綱紀國體宣洽時雍庶㡬觀察增闡聖聴帝善之建安中議者欲復肉刑孔融建議不可從之融議曰古者淳龎善否不别吏端刑清政無過失百姓有罪皆自取之末世陵遲風化壊亂政撓其俗法害其人故曰上失其道民散乆矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝渉之脛天下謂為無道夫九牧之地千八百君若各刖一人是下常有千八百紂也求俗休和弗可得已且被刑之人慮不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙髙英布為世大患不能止人遂為非也適足絶人還為善耳雖忠如鬻拳信如卞和智如孫臏寃如巷伯才如史遷逹如予政一離刀鋸沒世不齒是太甲之思庸穆公之覇秦南睢之骨立衞武之初筵陳湯之都頼魏尚之守邉無所復施也漢開改惡之路凡為此也故眀徳之君逺度深惟棄短就長不茍革其政者也朝廷善之卒不改焉其後魏公曹操復欲行肉刑令曰昔陳鴻臚以為死刑有可加於仁恩者御史中丞能申其父之論乎陳羣對曰臣父紀以為漢除肉刑而增加於笞本興仁惻而死者更衆所謂名輕而實重也名輕則易犯實重則傷民且殺人償死合於古制至於傷人􅂉殘毁其體而裁翦毛髪非其理也若用古刑使滛者下蠶室盗者刖其足則永無滛放穿窬之姦矣夫三千之屬雖未可悉復若斯數者時之所患宜先施用漢律所殺殊死之罪仁所不及也其餘逮死者可易以肉刑如此則所刑之與所生足以相貿矣今以笞死之法易不殺之刑是重人肢體而輕人軀命也當時議者唯鍾繇與羣議同餘皆以為未可行操以軍事未罷顧衆議而止按是時肉刑之不用已三百餘年而卒欲復之誠非篤論然陳羣所謂傷人􅂉殘毁其體而裁翦毛髪是當時傷人者不過坐髠鉗之罪又言以笞死之法易不殺之刑是重人肢體而輕人軀命盖自孝文立法以笞代劓剕而笞數太多反以殺人後雖減笞數定箠令然笞者猶不免於死於是遂以笞為死刑其不當死者則并不復笞之如孝章以來屢有寛刑之詔俱言減死一等者勿笞徙邉葢懼其笞則必至於死也然鬭狠傷人與姦盗不法之徒若抵以死則太酷免死而止於髠鉗則纔翦其毛髪而畧不罹箠楚之毒又太輕矣則曷若斟酌笞數使其可以懲姦而毋至於殺人乃合中道而肉刑固不必議復矣魏武帝既建魏國乃定甲子科犯􅎂音弟又音大左右趾者易以木械是時乏鐵故易以木焉又嫌漢律太重故令依律論聼得科半使從半減也討袁譚時民憚役而亡令不得降頃之亡民有詣門自首者公謂之曰聼汝則違令殺汝則誅首歸深自藏毋為吏所得民垂泣而去文帝受禪又議肉刑詳議未定㑹有軍事復寢下怨毒殺人減死之令詳見詳讞又令謀反大逆乃得相告其餘皆勿聼治敢妄相告以其罪罪之眀帝改士庶罰金之令男聼以罰代金婦人加笞還從鞭督之例以其刑體祼露故也時宫室盛興而期㑹廹急帝親召問言猶在口身首已分王肅抗疏曰陛下所行刑皆宜死之人也然衆庶不知将為倉卒願下之於吏而暴其罪均之死也不汚宫闕不為縉紳驚惋不為逺近所疑人命至重難生易殺是以聖王重之孟軻云殺一不辜而得天下仁者不為也青龍二年詔曰鞭作官刑所以糾慢怠也而頃多以無辜死其減鞭杖之制著於令又令有司刪定大辟減死罪四年詔曰有虞氏畫象而民弗犯周人刑錯而不用朕從百王之末追望上世之風邈乎何相去之逺法令滋章犯者彌多刑罰愈衆而姦不可止徃者按大辟之條多所蠲除思濟生民之命此朕之至意也而郡國斃獄一嵗之中尚過數百豈朕訓導不醇俾民輕罪将苛法猶存為之䧟穽乎有司其議獄緩死務從寛簡及乞恩者或辭未出而獄已報斷非所以䆒理盡情也其令廷尉及天下獄官諸有死罪具獄已定非謀反手殺人亟語其親治有乞恩者使與奏當文書俱上朕将思所以全之布告天下使眀朕意詔更定魏法制新律十八篇州郡令四十五篇尚書官令軍中令合百八十餘篇時承用秦漢舊制其文起自魏文侯師李悝音恢悝撰次諸國法著法經以為王者之政莫急於盗賊故其律始於盗賊盗賊須劾捕故著網捕二篇其輕狡越城博戲借假不亷滛侈踰制以為雜律一篇又以其律具其加減是故所著六篇而已然皆罪名之制也商君受之以相秦漢承秦制蕭何定律除参夷連坐之罪增部主見知之條益事律擅興廐戸三篇合為九篇叔孫通益律所不及傍章十八篇張湯越宫律二十七篇趙禹朝律六篇合六十篇又漢時决事集為令甲以下三百餘篇及司徒鮑公撰嫁娶辭訟决為法比都目凡九百六卷世有増損率皆集類為篇結事為章一章之中或事過數十事類雖同輕重乖異而通條連句上下相䝉雖大體異篇實相採入盗律有殘傷之例賊律有盗章之文興律有上獄之法廐律有逮捕之事若此之比錯糅人又反又女救反無常後人生意各為章句孫叔宣郭令卿馬融鄭元諸儒章句十有餘家家數十萬言凡斷罪所當由用者合二萬六千二百七十二條七百七十三萬二千二百餘言言數益繁覽者益難天子於是下詔但得用鄭氏章句不得雜用餘家衞覬又奏曰刑法者國家之所貴重而􅀻議之所輕賤獄吏者百姓之所懸命而選用者所卑下王政之弊未必不由此也請置博士轉相教授事遂施行然而律文煩廣事比衆多離本依末决獄之吏如廷尉獄吏范洪受囚絹二丈附輕法論之獄吏劉象受屬偏考囚張茂物故附重法論之洪象雖皆棄市而輕枉者相繼是時太傅鍾繇又上疏求復肉刑詔下其奏司徒王朗議又不同時議者百餘人與朗同者多帝以吳蜀未平又寝其後天子又下詔改定刑制命司空陳羣散騎常侍劉邵給事黄門侍郎韓遜議郎庾嶷中郎黄休荀詵等刪約舊科傍采漢律定為魏法其序畧曰舊律所以難知者由於六篇篇少故也篇少則文荒文荒則事寡事寡則罪漏是以後人稍増更與本體相離今制新律宜都總事類多其篇條舊律因秦法經就増三篇而具律不移因在第六罪條例既不在始又不在終非篇章之義故集罪例以為刑名冠於律首盗律有劫掠恐喝許葛反相恐也和賣買人科有持質皆非盗事故分以為劫掠律賊律有欺謾武安反詐偽踰封矯制囚律有詐偽生死令景有詐自復免事類衆多故分為詐律賊律有賊伐樹木殺傷人畜産及諸亡印金布律有毁傷亡失縣官財物故分為毁亡律囚律有告劾傳覆廐律有吿反逮受科有登聞道辭故分為告劾律囚律有繫囚鞫獄斷獄之法興律有上獄之事科有考事報讞宜别為篇故分為繫訊斷獄律盗律有受所監受財枉法雜律有假借不廉令乙有呵呼囬反人受錢科有使者驗賂其事相類故分為請賕律盗律有勃辱強賊興律有擅興徭役具律有出賣呈科有擅作修舍事故分為興擅律興律有乏徭稽留賊律有儲峙不辦廐律有乏軍之興及舊典有奉詔不謹不承用詔書漢氏施行有小愆乏反不如令輙劾以不承用詔書乏軍要斬又減以丁酉詔書丁酉詔書漢文所下不宜復以為法故别為之留律秦世舊有廐置乘傳副車食厨漢初承秦不改後以費廣稍省故後漢但設騎置無車馬而律猶著其文則為虚設故除廐律取其可用合科者以為郵驛令其吿反逮驗别入告劾律上言變事以為變事令以驚事告急與興律􅇏燧􅄘遂二音及科令者以為警事律盗律有還贓畀主金布律有罰贖入責以呈黄金為價科有平庸坐贓事以為償贓律律之初制無免坐之文張湯趙禹始作監臨部主見知故縦之例其見知而故不舉劾各與同罪失不舉劾各以贖論其不見不知不坐也是以文約而例通科之為制毎條有違科不覺不知從坐之免坐繁多宜總為免例以省科文故更制定其由例以為免坐律諸律令中有其教制本條無從坐之文者皆從此取法也凡所定增十三篇就故五篇合十八篇於正律九篇為增於旁章科令為省矣改漢舊律不行於魏者皆除之更依古義制為五刑其刑死有三髠苦昆反刑有四完刑作刑各三贖刑十一罰金六雜抵罪七凡三十七名以為律首又改賊律但以言語及犯宗廟園陵謂之大逆無道要斬家屬從坐不及祖父母孫至於謀反大逆臨時捕之􅂉汙瀦􅂉梟葅側踈反夷其三族不在律令所以嚴絶惡跡也賊鬭殺人以刼而亡許依古義聼子弟得追殺之㑹赦及過誤相殺不得報讐所以止殺害也正殺繼母與親母同防繼假之隙也除異子之科使父子無異財也歐一口反兄姊加至五嵗刑以眀教化也囚徒誣告人反罪及親屬異於常人所以累之使省刑息誣也改投書棄市之科所以輕刑也正簒囚棄市之罪斷凶強為義之蹤也二嵗刑以上除以家人乞鞫之制省所煩獄也改諸郡不得自擇伏日所以齊風俗也斯皆魏世所改其大畧如此致堂胡氏曰懐天下當以仁理天下當以義律令者聊以記刑名之數耳豈所恃以為治也惟眀於經訓者乃能用法徒貴習法之熟而無保國化民之本是李斯所以亡秦者矣夫業儒之侮經者尚多有之况習法而不知仁義之道其侮法将十人而二五茍如是曷若付百官有司於胥吏哉自後世觀魏之所以存豈係於有律博士而其所以亡者豈係於律令之繁省乎衞覬之言非經邦之令猷也齊王時司馬師輔政坐母邱儉以大逆之罪誅夷之乃改出適女從死之律見詳讞門晉武帝泰始三年賈充等修律令成帝親自臨講使裴楷執讀四年大赦天下乃頒新律初文王秉魏政患前代律令煩雜陳羣劉劭維經改革而科網太宻於是命賈充等定法令就漢九章增十一篇仍其族類正其體號改舊律為刑名法例辯囚律為告劾繫訊斷獄分盗律為請賕詐偽水火毁亡因事類為衞宫違制撰周官為諸侯律合二十篇六百三十條二萬七千六百五十七言蠲其苛穢歸於益時其餘未宜除之者若軍事田農酤酒未得皆從人心權設其法太平當除故不入律悉以為令施行制度以此設教違令有罪則入律也其常事品式章程各還其府為故事減梟斬族誅從坐之條除謀反適飬母出女嫁皆不復還坐父母棄市省禁錮相告之條去捕亡没為官奴婢之制輕過誤老小女人當罰金杖者皆令半之重姦伯叔母之令棄市滛寡女三嵗刑崇嫁娶之要一以下聘為正不治􅀻約峻禮教之防准五服以制罪也凡律令合二千九百二十六條十二萬六千二百言六十卷故事三十卷其後眀法掾張褧又註律表上之其要曰律始於刑名者所以定罪制也終於諸侯者所以畢其政也是以經畧罪法之輕重正加減之等差明發衆篇之多義補其章條之不足較舉上下綱領其犯盜賊詐偽請賕者則求罪於此作役水火畜飬守備之細事皆求之作本名告訊為之心舌捕繫為之手足斷獄為之定罪名例齊其法制自始及終徃而不窮變動無常周流四極上下無方不離於法律之中其知而犯之謂之故意以為然謂之失違忠欺上謂之謾背信藏巧謂之詐虧禮廢節謂之不敬兩訟相趣謂之鬭兩和相害謂之戲無變斬擊謂之賊不意誤犯謂之過逆節絶理謂之不道陵上僭貴謂之惡逆将害未發謂之戕唱首先言謂之造意二人對議謂之謀制衆建計謂之率不和謂之強攻惡謂之畧三人謂之羣取非其物謂之盜貨財之利謂之贓凡二十者律義之較名也夫律者當慎其變審其理若不承用詔書無故失之刑當從贖謀反之同伍實不知情當從刑此故失之變也卑與尊鬭皆為賊鬭之加兵刄水火中不得為戲戲之重也向人室廬道逕射不得為過失之禁也都城人衆中走馬殺人當為之賊賊之似也過失似賊戲似鬭鬭而殺傷傍人又似誤盜傷縳守似強盜呵人取財似受賕因辭所連似告劾諸勿聼治似故縱持質似恐喝如此之比為無常之格也五刑不簡正於五罰五罰不服正於五過意善功惡以金贖之故律制生罰不過十四等死刑不過三徒加不過六囚加不過五累作不過十一嵗累笞不過千二百刑等不過一嵗金等不過四兩月贖不計日日作不拘月嵗數不疑閠不以加至死并死不復加不可累者故有并數不可并數乃累其加以加論者但得其加與加同者連得其本不在次者不以通論以人得罪與人同以法得罪與法同侵生害死不可齊其防親疎公私不可常其教禮樂崇於上故降其刑刑閑於下故全其法是故尊卑叙仁義眀九族親王道平也律有事状相似而罪名相渉者若加威勢下手取財為強盜不自知亡為縳守将中有惡言為恐喝不以罪名呵為呵人以罪名呵為受賕刼召其財為持質此六者以威勢得財而名殊者也即不求自與為受求所監求而後取為盜贓輸入呵受為留難斂人財物積藏於官為擅賦加毆擊之為戮辱諸如此類皆為以威勢得財而罪相似者也夫刑者司理之官理者求情之機情者心神之使心感則情動於中而形於言暢於四支發於事業是故姦人心愧而面赤内怖而色奪論罪者務本其心審其情精其事近取諸身逺取諸物然後乃可以正刑仰手似乞俯手似奪捧手似謝擬手似訴拱臂似自首攘臂似格鬭矜荘似威怡悦似福喜怒憂懼貌在聲色姦貞猛弱候在視息出口有言當為告下手有禁當為賊喜子殺怒子當為戲怒子殺喜子當為賊諸如此類自非至精不能極其理也律之名例非正文而分眀也若八十非殺傷人他皆勿論即誣告謀反者反坐十嵗不得告言人即奴婢捍主主得喝殺之賊燔人室廬舍積聚盜贜五疋以上棄市即燔官府積聚盜亦當與同毆人教令者與同罪即令人毆其父母不可與行者同得重也若得遺物強取強乞之類無還贜法隨例畀之文法律中諸不敬違儀失式及犯罪為公為􅀻贜入身不入身皆隨事輕重取法以例求其名也夫理者精元之妙不可以一方行也律者幽理之奥不可一體守也􅂉計過以配罪􅂉化俗以循常􅂉隨事以盡情􅂉取舍以從時􅂉推重以立防􅂉引輕以就下公􅀻廢避之宜除削重輕之變皆所以臨時觀釁者用法執詮者幽於未制之中采其根芽之微致之機格之上稱輕重於毫銖考軰類於参伍然後乃可以理直刑正夫奉聖謨典者操刀執䋲刀妄加則傷物䋲妄彈則侵直梟首者惡之長斬刑者罪之大棄市者死之下髠作者刑之威贖罰者誤之誡王者立此五刑所以寳君子而逼小人也故為勅慎之經皆擬周易有變通之體焉夫形而上者謂之道形而下者謂之噐推而行之謂之通舉而錯之謂之格刑殺者是冬震曜之象髠罪者是秋凋落之變贖失者是春陽悔吝之疵也五刑成章輒相依准法律之義也劉頌為廷尉頻表宜復肉刑不見省頌上言曰臣昔上行肉刑從來積年遂寝不論臣竊以為議者拘孝文之小仁而輕違聖王之典刑未詳之甚莫過扵此今死刑重故非命者衆生刑輕故罪不禁姦所以然者肉刑不用之所致也今為徒者類性元惡不軌之族也去家懸逺作役山谷饑寒切身志不聊生又有亷士介者茍慮不首死則皆為盜賊矣况本性姦凶無頼之徒乎又今徒富者輸財計日歸家乃無役之人也貧者起為姦盜又不制之虜也不刑則罪無所禁不制則羣惡横肆為法若此道不盡善也是以徒亡日屬賊盜日煩亡之數者至有十數得輙加刑日益一嵗此為終身之徒也自顧反善無期而災困逼身其志亡思盜勢不得息事使之然也古者用刑以止刑今反扵此諸重犯亡者髪過三寸輙重髠之此以刑生刑加作一嵗此以徒生徒也亡者積多繫囚猥畜議者曰囚不可下赦復從而赦之此為刑不制罪法不勝姦下知法之不勝相聚而謀為不軌月異而嵗不同故自頃年以来姦惡陵暴所在充斥議者不深思此故而曰肉刑扵名忤聼忤聼孰與賊盜不禁聖王之制肉刑逺有深理其事可得而言非徒懲其畏剝割之痛而不為也乃去其為惡之具使夫姦人無用復肆其志止姦絶本理之盡也亡者刖足無所用復亡盜者截手無所用復盜滛者割其勢其理亦如之除惡塞源莫善於此非徒然也此等已刑之後便各歸家父母妻子共相飬恤不流離於塗路有今之困創愈可役上准古制隨宜業作雖已刑殘不為虚棄而所患都塞又生育繁阜之道自若也今宜取死刑之限輕及三犯逃亡滛盜悉以肉刑代之其三嵗刑以下已自杖罰遣又宜制其罰數使有常限不得減此其有宜重者又任之官長應四五嵗刑者皆髠笞笞至一百稍行使各有差悉不復居作然後刑不復生刑徒不復生徒而殘體為戮終身作誡人見其痛畏而不犯必數倍於今且為惡者隨發被刑去其為惡之具此為諸已刑者皆良士也豈與全其為姦之手足而蹴取育反居必死之窮地同哉而猶曰肉刑不可用臣竊以為不識務之甚也疏上又不見省惠帝之世政出羣下每有疑獄各出􅀻情刑法不定獄訟繁滋尚書裴頠劉頌上疏論之頌疏曰自近代以來法漸多門令甚不一臣今備掌刑斷職思其憂謹具啓聞臣竊伏惟陛下為政每盡善故事求曲當則例不得直盡善故法不得全何則失法者固以盡理為法而上求盡善則諸下牽文就意以赴主之所許是以法不得全刑書徴文徴文必有乖扵情聼之斷而上安扵曲當故執平者因文可引則生二端是法多門令不一則吏不知所守下不知所避姦偽者因法之多門以售其情所欲淺深茍斷不一則居上者難以檢下扵是事同議異獄犴不平有傷扵法古人有言人主詳其政荒人主期其事理詳匪他盡善則法傷故其政荒也期者輕重之當雖不厭情茍入於文則得而行之故其事理也又君臣之分各有所司法欲必奉故令主者平文理有窮塞故使大臣釋滯事有時宜故人主權斷主者守文若釋之執犯蹕之平也大臣釋滯若公孫𢎞斷郭解之獄也人主權斷若漢祖戮丁公之為也天下萬事自非斯格重為故不近似此類不得出以意妄議其餘皆以律令從事然後法信於下人聼不惑吏不容姦可以言政人主執斯格以責羣下大臣小吏各守其局則法一矣古人有言善為政者看人設教看人設教制法之謂也又曰隨時之宜當務之謂也然則看人隨時在大量也而制其法法軌既定則行之行之信如四時執之堅如金石羣吏豈得在成制之内復稱隨時之宜傍引看人設教以亂政典哉何則始制之初固已看人而隨時矣今若設法未盡當則宜改之若謂已善不得盡以為制而使奉用之司公得出入以差輕重也夫人君所與天下共者法也已令四海不可以不信以為教方求天下之不慢不可䋲以不信之法且先識有言人至愚而不可欺也不謂平時背法意斷不勝百姓願也上古議事以制不為刑辟夏殷及周書法象魏三代之君齊聖然咸棄曲當之妙鑒而任徴文之直凖非聖有殊所遇異也今論時敦弊不及中古而執平者欲適情之所安自託於議事以制臣竊以為聼言則羙論理則違然天下至大事務衆雜時有不得悉循文如令故臣謂宜立格為限使主者守文死生以之不敢錯思於成制之外以差輕重則法常全事無正據名例不及大臣論當以釋不滯則事無閡至扵非常之斷出法賞罰若漢祖戮楚臣之􅀻已封趙氏之無功唯人主專之非奉職之臣所得擬議然後情求傍請之跡絶似是而非之奏塞此葢齊法之大凖也夫出法權制指施一事厭情合聼可適耳目誠有臨時當意之快勝於徴文不允人心也然起為經制終年施用恒得一而失十故小有所得者必大有所失近有所漏者必逺有所苞故諳事識體者善􅁠輕重不以小害大不以近妨逺忍曲當之近適以全簡直之大準不牽於凡聼之所安必守徴文以正例每臨其事恒御此心以决斷此又法之大槩也又律法斷罪皆當以法律令正文若無正文依附名例斷之其正文眀例所不及皆勿論法吏以上所執不同得為異議如律之文守法之官唯當奉用律令至於法律之内所見不同乃得為異議也今限法曹郎令史意有不同為駁唯得論釋法律以正所斷不得援求諸外論隨時之宜以明法官守局之分詔下其事侍中太宰汝南王亮奏以為夫禮以訓世而法以整俗理化之本事實由之若斷不斷常輕重隨意則王憲不一人無所錯矣故觀人設教在上之舉守文直法臣吏之節也臣以為太康八年隨事異議周懸象魏之書漢詠畫一之法誠以法與時共義不可二今法素定而法為議則有所開長以為宜如頌所啓為永乆之制於是門下屬三公曰昔先王議事以制自中古以來執法斷事既以立法誠不宜復求法外小善也若常以善奪法則人逐善而不忌法其害甚於無法也按啓事欲令法令斷一事無二門郎令史已下應復出法駁按隨事以聞也懐帝永嘉元年除三族刑東晉元帝為丞相在江東承制時百度草創議斷不循法律人立異議髙下無状主簿熊逺奏曰禮以崇善法以閑非故禮有常典法有常防人知惡而無邪心是以周建象魏之制漢創畫一之法故能闡𢎞大道以至刑厝律令之作由來尚矣經賢智歴夷險隨時斟酌最為周備自軍興以來法度陵替至於處事不用律令競作屬命人立異議曲適物情虧傷大例立節度復不奉用臨事改制朝作夕改至於主者不敢任法毎輙關諮委之大官非為政之體若本曹處事不合法令監司當以法彈違不得動用開塞以壊成事案法葢麤術非妙道也矯割物情以成法耳若毎隨物情輙改法制此為以情壊法法之不一是謂多門開人事之路廣􅀻請之端非先王立法之本意也凡為駁議者若違律令節度當合經傳及前比故事不得任情以破成法愚謂宜令録事更立條制諸立議者皆當引律令經傳不得直以情言無所依準以虧舊典也若開塞隨宜權道制物此是人君之所得行非臣子所宜專用主者唯當徴文據法以事為斷耳是時帝以權宜從事尚未能從而河東衞展為晉王大理考摘故事有不合情者又上書曰今施行詔書有考子正父死刑􅂉鞭父母問子所在近主者所稱庚寅詔書舉家逃亡家長斬若是逃亡之主斬之雖重猶可設子孫犯事将考祖父逃亡逃亡是子孫而父祖嬰其酷傷順破教如此者衆相隠之道離則君臣之義廢君臣之義廢則犯上之姦著矣秦網宻文峻漢興掃除煩苛風移俗易㡬於刑厝大人革命不得不蕩其􅁾匿通其圮符鄙反滯今詔書宜除者多有便於當今著為正條則法差簡易元帝令曰禮樂不興則刑罰不中是以眀罰勅法先王所慎自元康以來事故荐臻法禁滋蔓大理所上宜朝堂㑹議蠲除詔書不可用者此孤所虚心也帝即位衞展為廷尉上言古者肉刑事經前聖漢文除之增加大辟今人戸彫荒百不遺一而刑法峻重非勾踐飬胎之義愚謂宜復古施行以隆太平之化詔内外通議王導賀循等議今盜者竊人之財滛者奸人之色亡者避叛之役皆無殺害也刖之以刑刑之則止而加之斬戮戮過其罪死不可生縱虐於此嵗以巨計此乃仁人君子所不忍聞而况行之於政乎或者乃曰死猶不懲而况於刑然甿者㝠也其至愚矣雖加斬戮忽為灰土死事日徃生欲日存未以為改若刑諸市朝朝夕鑒戒刑者誡為惡之永痛惡者覩殘刖之長廢故足懼也然後知先王之輕刑以御物眀誡以懲愚其理逺矣尚書令刁恊等議以今中興祚崇大命惟新誠宜設肉刑寛法以育人然懼羣小愚蔽習翫所見而忽異聞􅂉未能咸服愚謂行刖之時先眀申法令樂刑者刖甘死者殺則心服矣古典刑不上大夫今士人有犯者謂宜如舊不在刑例則進退惟允尚書周顗等議以為復肉刑以代死誠是聖王之至徳哀矜之𢎞覆然竊以為刑罰輕重隨時而作時人少罪而易威則從輕而寛之時人多罪而難威則宜死刑而濟之肉刑平世所應立非救弊之宜也方今聖化草創人有餘姦習惡之徒為非未已截頭絞頸尚不能禁而乃更斷足劓鼻輕其刑罰使欲為惡者輕犯官刑蹈罪更衆是為輕其刑誘其人於罪殘其身以加楚毒也昔之畏死刑以為善人者今皆犯輕刑而殘其身畏重之常人反為犯輕而致困此皆何異斷刖常人以為恩仁也恐受刑者轉廣而為非者日多踊貴屨賤有鼻者醜也徒有輕刑之名而實開長惡之源不如殺以止殺重以全輕權小停之須聖化漸著兆庶易感之日徐施行也議奏元帝猶欲從展所上大将軍王敦以為百姓習俗日乆忽復肉刑必駭逺近且逆冦未殄不宜有惨酷之聲以聞天下於是乃止大興四年著作佐郎郭璞以帝用刑過差上疏以為隂陽錯繆皆煩刑所致赦不欲數然子産知鑄刑書非政之善不得不作者須以救弊也今之宜赦理亦如之庾翼言大較江東之政以嫗煦豪強常為民蠧時有行法輒施之寒劣按史稱元帝好刑名郭璞復有繁刑之諫璞傳載全疏數百言然指陳實事不過言建興四年督運令史淳于伯刑於市而血逆上流以為寃酷之異葢自江左中興以來姑息立國北征大事以乏興殺一督運未為過也而當時寃之史氏書之以為滛刑嗣時之後習為寛弛劉隗刁恊庾亮稍欲濟以綜核而召變稔禍矣眀帝太寕三年復三族刑惟不及婦人咸康之時庾冰好為糾察近於繁細後益矯違復從寛縱疎宻自由律令無用矣石勒既稱趙王以世亂律令煩多命法曹令史貫志采集其要作辛亥制五千文施行十餘年乃用律令以理曹參軍上黨續咸為律學祭酒咸用法詳平國人稱之安帝元興末桓𤣥輔政又議欲復肉刑斬左右趾之法以輕死刑命百官議蔡廓上議以為肉刑之設肇自哲王葢由曩代風淳人多惇謹圗像既陳則機心直戢刑人在塗則不逞改操故能勝殘去殺化崇無為季末澆偽設網彌宻利巧之懐日滋耻畏之情轉寡終身劇役不足止姦况乎黥劓豈能反善徒有酸惨之聲而無濟俗之益至扵棄市之條實非不赦之罪事非手殺考律同歸輕重均科減降路塞鍾陳以之抗言元皇所為留愍今英輔翼贊道邈伊周誠宜眀慎用刑爱人𢎞育申哀矜以革濫移大辟於支體全性命之至重恢繁息於将來而孔琳之議不同時議多與琳同遂不行文獻通考卷一百六十四
