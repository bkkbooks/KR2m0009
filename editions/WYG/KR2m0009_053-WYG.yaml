body:
  text: 文獻通考卷五十三鄱陽馬端臨貴與著職官考七御史臺御史之名周官有之蓋掌贊書而授法令非今任也王有命則贊為之辭寫其理之法令命來受者即授之戰國時亦有御史秦澠池之會各命書其事又淳于髠謂齊王曰御史在前則皆記事之職也至秦漢為糾察之任秦以御史監郡漢初叔孫通新定禮儀以御史執法舉不如儀者輙引而去是也所居之署漢謂之御史府亦謂之御史大夫寺漢御史大夫寺在大司馬門内無塾其門署用梓板不雘色題曰御史大夫寺亦謂之憲臺成帝時御史府吏舍百餘區井水皆竭又其府中列栢樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之後果廢御史大夫為大司空是其徴也後漢以來謂之御史臺亦謂之蘭臺寺顔師古曰官曹通名為寺後漢趙岐本名嘉以生於御史臺因字臺卿又應劭官儀曰廷尉案責上御史臺又謝靈運晉書曰漢尚書為中臺御史為憲臺謁者為外臺是謂三臺後漢蔡邕以侍御史轉持書御史遷尚書三日之問周遷三臺梁及後魏北齊或謂之南臺北齊王髙澄用崔暹為御史中尉宋遊道為尚書左丞謂之曰卿一人處南臺一人處北省當使天下肅然後魏之制有公事百官朝會名簿自尚書令僕以下悉送南臺後魏臨洮王舉哀兼上尚書左僕射元順不肯送名又不送簿中尉舉弹之順奏曰尚書百揆之本令僕納言之責不宜下𨽻中尉送名御史詔許之後元子思為御史中尉朔朝臺移尚書索應朝名帳尚書郎裴獻伯移注云按蔡氏漢儀御史中尉逢臺郎於複道中尉下避執板郎中車上舉手禮之以此而言明非敵體子思奏曰臣按漢書御史中丞為獨坐又按魏書曰崔琰既為中丞百寮震恐則中丞不揖省郎亦已久矣憲臺不屬都坐亦非今日又按孝文帝職令朝會失時則御史彈之若不送名到否何驗獻伯等亂常變紀請付法詔曰國異政不可據以古事檢孝文帝舊格以聞尋從子思奏後周曰司憲屬秋官府隋及唐皆曰御史臺龍朔二年改為憲臺咸亨元年復舊門北闢主隂殺也按北齊楊楞伽鄴都故事云御史臺在宫闕西南其門北開取冬殺之義斯事久矣今東都臺門所以不北向者蓋欲變古之制或建造者不習故事耳龍朔中改司經局為柱坊置司直為東宫之憲府亦開北門以象御史臺其例明矣或云隋初移長安城造御史臺時以兵部尚書李員通檢校御史大夫欲於尚書省近故開北門此説則非也故御史為風霜之任彈糾不法百僚震恐官之雄峻莫之比焉舊制但聞風彈事提綱而已舊例御史臺不受訴訟有通辭狀者立於臺門候御史御史竟徃門外收採之可彈者畧其姓名皆云風聞訪知永徽中崔義元為大夫始定受事御史人知一日劾狀題告人姓名或訴訟之事其鞫案禁繫則委之大理貞觀末御史中丞李乾祐以囚自大理來徃滋其姦故又按事入法多為大理所反乃奏於臺中置東西二獄以自繫劾開元中大夫崔隱甫復奏罷之其後罕有聞風彈舉之事多受辭訟推覆理盡然後彈之將有彈奏則先牒監門禁止勿許其入按宋書云二臺劾奏符光禄加禁止不得入殿省是其先例光禄主殿門武太后時改御史臺為肅政臺凡置左右肅政二臺别置大夫中丞各一人侍御史殿中監察各二十人又置肅政臺使六人受俸於本臺畧與御史同尋罷之左以察朝廷右以澄郡縣時議以右多名流左多寒刻其遷登南省者右殆倍焉以其不陵朝貴故也二臺迭相糾正而左加敬憚龍朔以後去肅政之名但為左右御史臺初置兩臺每年春秋發使春曰風俗秋曰廉察令地官尚書韋秋質為條例刪定為四十八條以察州縣延載以後奉勅乃廵不每年出使也睿宗即位詔二臺並察京師資位既等競為彈糾百僚被察殆不堪命太極元年以尚書省悉𨽻左臺復請分綰尚書西行事左臺大夫竇懐貞乃表請依貞觀故事遂廢右臺而本御史臺官復舊廢臺之官並𨽻焉其左臺本御史臺也又别置右臺右臺地即今太僕寺是也本隋長秋監地武太后改為司宫臺移於街北遂以其地置右臺右臺既廢以其地為御史臺使院開元八年移太僕寺於此大夫一人中丞二人侍御史四人殿中侍御史六人監察御史十人主簿一人内供奉裏行者各如正員之半太宗朝始有裏行之名髙宗時方置内供奉及裏行官皆非正官也開元初又置御史裏使及侍御史裏使殿中裏使監察裏使等官並無定員議與裏行同穆思泰元光謙吕太一翟章並為裏使尋省建中三年九月御史臺請置推官二人常與本推御史同推覆奉勅依其屬有三院一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉凡寃而無告者三司詰之三司謂御史大夫中書門下也大事奏裁小事專逹凡有彈劾御史以白大夫大事以方幅小事署名而已有制覆囚則與刑部尚書平閲行幸乘輅車為導朝會則率其屬正百官之班序宋仍唐制有三院大夫無正員止為兼官中丞除正員外或帶他官者尚書則曰某官兼御史中丞丞郎則曰御史中丞兼某官給事中諫議則曰某官權御史中丞事次有知雜御史一員副中丞判臺事三院多出外任風憲之職用他官領之太平興國三年以張巽為監察御史正名舉職自此始也唐制御史不專言職至天禧中始置言事御史唐朝有御史裏行至景祐中始置以處御史之官卑者唐儀臺案有六監司元豐三年李定請復六察於是以御史專領六察元豐三年御史臺言請以吏部及審官東西院二班院𨽻吏察戸部三司及司農寺𨽻户察刑部大理寺審刑院𨽻刑察兵部武學𨽻兵察禮祠部太常寺𨽻禮察少府將作等𨽻工察從之其後大正官名不除大夫檢校官帶憲銜者亦除去自國初至元豐中檢校官多帶憲銜有檢校御史大夫者至是亦罷之以中丞為長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史舊以中丞兼檢理使殿中侍御史兼左右廵使左右廵使分糾不如法者文官違失右廵主之武官違失左廵主之監察御史兼監察使至是使名悉罷容齋洪氏随筆曰嘉祐六年司馬公以修起居注同知諫院上章乞立宗室為繼嗣對畢詣中書畧為宰相韓公言其㫖韓公攝饗明堂殿中侍御史陳洙監祭公問洙聞殿院與司馬舍人甚熟洙答以頃年曾同為直講又問近日曾聞其上殿言何事洙答以彼此臺諫官不相徃來不知言何事此一項温公私記之甚詳然則國朝故實臺諫官元不相見故趙清獻公為御史論陳恭公而范蜀公以諌官與之爭元豐中又不許兩省官相徃來鮮于子駿乞罷此禁元祐中諫官劉器之梁况之等論蔡新州而御史中丞以下皆以無章䟽罷黜靖康時諫議大夫馮澥論時政失當為侍御史李光所駁今兩者合為一府居同門出同幕與故事異又曰臺諫不相見已書於續筆中其分職不同各自有故實元豐中趙彥若為諫議大夫論大臣不以道徳承聖化而專任小數與羣有司校計短長失具瞻體因言門下侍郎章子厚左丞王安禮不宜處位神宗以彥若侵御史論事左轉祕書監蓋許其論議而責其彈擊為非也元祐初孫覺為諫議大夫是時諫官御史論事有分限毋得越職覺請申唐六典及天禧詔書凡發令造事之未便皆得奏陳然國史所載御史掌糾察官邪肅正紀綱諫官掌規諫諷諭凡朝政闕失大臣至百官任非其人三省至百司事有失當皆得諫正則蓋許之矣唐人朝制大率重諫官而薄御史中丞温造道遇左補闕李虞恚不避捕從者笞辱左拾遺舒元褒等建言故事供奉官惟宰相外無屈避造棄蔑典禮辱天子侍臣遺補雖卑侍臣也中丞雖髙法吏也侍臣見陵法吏自恣請得論罪乃詔臺官供奉官共道路聽先後行相值則揖然則居此二雄職者在唐日了不相謀云中興後又有三京留司御史臺管勾臺事各一人以朝官以上充掌拜表行香糾舉違失石林葉氏曰兩京留臺皆有公宇其榜曰御史臺舊為前執政重臣休老養疾之地故例不事事皇祐間吳正肅公為西京留臺獨舉其職時張堯佐以宣徽使知河南府郡政不當有訴於臺者正肅即為移文詰之堯佐皇恐奉行不敢異其後司馬温公熙寧元豐間相繼為者十七年雖不甚預府事然亦守其法令甚嚴如國忌行香等班列有不肅亦必繩治自創置宫觀後重臣不復為率用常調庶官比宫觀給使請俸差優爾朝廷既但以此為恩故來者奔走府廷殆與屬吏無異矣御史大夫御史大夫秦官侍御史之率故稱大夫漢因之位上卿銀印青綬掌副丞相故事選郡守相髙第為御史大夫任職者為丞相漢舊儀拜御史大夫為丞相左右前後將軍贊五官中郎將授印拜御史大夫二千石贊左右郎將授印成帝綏和元年更名大司空成帝欲修璧雍通三公官故改御史大夫為大司空金印紫綬秩比丞相御史大夫月俸四萬哀帝建平二年朱愽奏請罷大司空以御史大夫為百僚師帝從之遂復為御史大夫皆宰相之任事具宰相篇元夀二年復為大司空凡為御史大夫而丞相次也其心冀宰丞相物故物無也故事也言無所復能於事或乃隂私相毁害欲代之見史記又曰鄭𢎞為大夫守之數年不得匡衡居之未滿而丞相死即代之後漢初廢御史大夫更始至長安以隗囂為御史大夫建元元年光武東廵泰山以張純視御史大夫從封禪禮畢罷至建安十三年罷三公官始復置之以郗慮居焉華歆亦為之不領中丞置長史一人魏黄初二年又改御史大夫為司空末年復有大夫而吳有左右焉晉書曰魏以司空何曾為晉國丞相以王沉為御史大夫是也呉孫休以丁密孟宗為左右御史大夫晉初省之此皆為三公非今御史大夫也今御史大夫即漢以來御史中丞是也後代或置大夫皆中丞之互名非漢舊大夫之任惟劉聰僭號置御史大夫亞於三公頗似漢制也唐制大夫一人正三品其屬有三院見御史臺門大事奏裁小事專逹凡有彈劾御史以白大夫大事以方幅小事署名而已韋思謙為御史大夫性謇諤顔色莊重不可犯見王公未嘗屈禮或以為譏答曰耳目官固當特立鵰鶚鷹鸇豈衆禽之偶奈何屈而狎之御史大夫李承嘉嘗召諸御史責曰近日御史言事不白大夫禮乎蕭至忠曰故事臺官無長官御史人君耳目比肩事主得自彈事若先白大夫而許則彈大夫者不知白誰也宋不除大夫以中丞為臺長自國初至元豐中檢校官多帶憲許有檢校御史大夫者官制行並除去元豐更官制神宗欲以司馬光為之宰相蔡確王珪以為不可遂止卒不除人石林葉氏論見散騎中丞初漢御史大夫有兩丞一曰御史丞一曰中丞亦謂中丞為御史中執法漢髙帝詔勅賢良御史大夫下相國相國下諸侯王御史中執法晉灼日中執法乃中丞也中丞在殿中蘭臺掌圖籍祕書漢中丞有石室以藏祕書圖䜟之屬以其居殿中故曰中丞外督部刺史内領侍御史十五員受公卿奏事舉劾案章蓋居殿中察舉非法也及御史大夫轉為大司空而中丞出外為御史臺率即今之御史大夫任也自此以後並如今御史大夫也周官小宰之職掌建邦之宫刑以理王宫之政令凡宫之糾禁又其任也周禮少宰註曰若今御史中丞初御史大夫更名大司空置長吏而中丞官職如故武帝時以中丞督司𨽻司𨽻督丞相丞相督司直司直督刺史刺史督二千石下至黑綬漢中丞故二千石為之或選侍御史髙第執憲中司出為二千石哀帝元夀二年御史中丞更名御史長史至後漢光武復改為中丞兩梁冠銅印青綬與尚書令司𨽻校尉朝會皆專席而坐京師號為三獨坐言其尊也凡中丞以下並文官屬少府以下謂侍御侍書等官魏初改中丞為宫正舉鮑勛為之百僚嚴憚陳羣及司馬宣王舉勛為之後復為中丞晉亦因漢以中丞為臺主與司𨽻分督百僚自皇太子以下無所不糾初不得糾尚書後亦糾之晉傅咸奏云司𨽻中丞得糾太子而不得糾尚書臣所未譬朝廷無以易之又劉暾字長叔兼中丞奏免尚書僕射等十餘人朝廷嘉之遂以即真晉元帝即尊號省司直置中丞皇太子以下悉得糾劾之中丞專糾行馬内司𨽻專糾行馬外雖制如是然亦更奏衆官實無其限王恬字元愉為中丞簡文初即位未解嚴大司馬桓温屯中臺夜吹警角恬奏劾温大不敬請理罪明日桓温見奏事歎曰兒乃敢彈我真可尚宋中丞一人每月二十五日繞行宫垣白壁漢志執金吾每月一日繞行宫城宜是省金吾此事併中丞也銅印墨綬進賢兩梁冠佩水蒼玉介幘絳朝服職官録兼云青綬孝武帝孝建二年制中丞與尚書令分道雖丞郎下朝相值亦得斷之餘内外衆官皆受停駐宋文帝元嘉十三年有司奏御史中丞劉式之儀每至出行未知制與何官分道舊科法唯稱中丞專道傳詔衆官應詔者得行制令無分别他官之文皇太子不宜與衆同例中丞應與分道揚州刺史丹陽尹建康令並是京輦土地之主或檢校非違或赴救水火事應神速不宜稽駐並合分道又尋六門則為行馬之内且禁衞非違並由二衛及領軍未詳京尹建康令門内之從及公事亦得與中丞分道與否其六門内既非郡縣部界即不合依門外也齊中丞職無不察專道而行騶輻禁呵加以聲色武將相逢輙致侵犯若有鹵簿至相毆擊齊沈冲與兄淵淡三人並歴中丞至梁國初建又置御史大夫天監元年復曰中丞中丞一人掌督司百僚皇太子其在宫門行馬内違法者皆糾彈之雖在行馬外而監司不糾亦得奏之專道而行逢尚書丞郎亦得停駐其尚書令僕御史中丞各給威儀十人其八人武冠絳韝音溝執青儀囊題云宜官告以受辭訟一人緗衣執鞭杖依行列行七人唱呼入殿引喤至階一人執儀囊不喤自齊梁皆謂中丞為南司梁江淹字文通為中丞齊明帝曰今君為南司足以肅震百寮也淹乃彈中書令謝朏等以久疾不預山陵公事又奏收梁益二州刺史贓賄付廷尉理罪臨海永嘉二太守及諸郡二千石大縣長官等多被劾理内外肅然明帝曰君可謂近世獨出舊制僕射中丞坐位東西相向元日大會張綰為中丞兄績為僕射及百司就列兄弟並道騶分趨兩塗前代未有時人榮之喤音横陳因梁制陳徐陵為中丞奏彈司空安城王頊導從南臺官屬列奏案而入陳主為歛容正坐陵進讀奏時安城王在殿上侍立陵命殿中侍御史引下遂劾免之江左中丞雖亦一時髦彥然膏粱名士猶不樂王球從弟僧朗除御史中丞球謂曰汝為此官不復成膏粱矣齊王僧䖍遷御史中丞甲族由來多不居憲職王氏分枝居烏衣者為官微減僧䖍為此官乃曰此是烏衣諸郎坐處我亦可試為耳後魏為御史中尉督司百寮其出入千歩清道與皇太子分路王公百辟咸使遜避其餘百僚下馬弛車止路傍其違緩者以棒棒之其後洛陽令得與分道元志為洛陽令與中尉李彪爭路俱入見彪曰御史中尉辟乘華羽蓋駐論道劒皷安有洛陽令與臣抗衡志曰臣神州縣主普天之下誰非編民豈有俯同衆官趨避中尉孝文遂令分路自東魏徙鄴無復此制北齊武成以其子琅琊王儼兼為御史中丞欲雄寵之復興舊制儼出北宫凡京畿之歩騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備時儼總領四職武成觀之遣中使馳馬趣仗不得入自言奉勅赤棒應聲碎其鞍馬騰人顛觀者傾京邑北齊髙恭之字道穆為御史中丞帝姊夀陽公主行犯清路執以赤棒卒呵之不止道穆令卒棒破其車主泣訴於帝帝不責穆謂之曰家姊行路相犯極以為愧後周有司憲中大夫二人掌司寇之法辨國之五禁亦其任也及隋以國諱改中丞為大夫唐因隋亦曰大夫龍朔二年改為大司憲咸亨初復舊武太后改置左右肅政臺御史大夫各一人太極初復舊掌肅清風俗彈糾内外總判臺事自周隋以來無儀衛之重令行出道路以私騎匹馬從之而已故事侍御史以下與大夫抗禮光宅元年九月韋思謙除左肅政大夫遂坐受拜或以言謙曰國家班列自有差等難以姑息其後大夫又與之抗禮至開元十八年有勅申明隔品致敬其禮由之不改至二十四年六月李適之為大夫又坐受拜其後有與之抗禮至今不改故事大夫與監察競為官政累無承禀至開元十四年崔隱甫為大夫一切督責之事無大小悉令咨決稍有忤竟列其罪前後貶黜者過半羣僚側目上嘗謂曰卿為大夫深副朕委唐中丞二人正四品貳大夫掌糾正百官罪惡宋承唐制無大夫以中丞為臺長無正員以兩省給諫權自中丞以下掌糾繩内外百官姦慝肅清朝廷綱紀大事廷辨小事奏彈凡除中丞而官未至者自正言而上皆除右諫議大夫權熙寧初言者以為躐等乃詔以本官職兼權熙寧五年以知雜侍御史鄧綰為中丞初除諌議大夫王安石言疑近制除侍制或可乃以綰為龍圖閣待制權御史中丞中丞不遷諌議大夫自綰始九年鄧潤甫自正言知制誥為中丞以宰相屬官不可長憲府於是復遷右諌議大夫權元豐五年以承議郎徐禧為知制誥權中丞禧言中丞糾彈之官赴舍人院行詞疑若未安會官制行罷知制誥禧乃以本官試中丞中丞職任雄峻南渡初除官最多隆興後被擢者少淳熙十年黄洽復為之又三年再命蔣繼周時施師㸃在政府有咄咄逼人之疑嘉定六年除章良能初王賔以中丞兼侍講紹興十二年万俟卨又以中丞兼侍讀由是言路始兼經筵祖宗時臺諌例不兼講讀蓋以宰執間侍經筵避嫌也神宗命吕正獻亦止命時赴講筵中興後兼者三人皆出上意紹興時万俟卨羅檝以中丞諌議兼蓋以秦檜之弟若孫相繼為説書便於傳導檜死遂罷兼慶元後臺丞諌長暨副端正言司諌以上無不預經筵者舊臺令兩院御史每上下半年分詣三省樞密院取索諸房文字㸃檢監察御史輪詣尚書六曹按察凡奉行稽違付受差失咸得糾彈渡江後稍闕不舉紹興三年因御史臺主簿陳祖禮有言始復其舊容齋洪氏隨筆論中丞學士遷除見翰林學士門持書侍御史御史中丞舊持書侍御史也初漢宣帝元鳳中感路温舒尚徳緩刑之言季秋後請讞時帝幸宣室齋居而决事令侍御史二人持書持書御史起於此也後因别置冠法冠有印綬與符節郎共平廷尉奏事罪當輕重後漢亦二人銅印青綬選明法律者為之蔡質漢儀曰選御史髙第者補之凡天下諸讞疑事掌以法律當其是非自桓帝之後無所平理茍充其位而已魏置持書執法掌奏劾而持書侍御史掌律令二官俱置宋志曰魏置御史八人有持書曹掌考課不知餘復何曹晉置四人太始四年又置黄沙獄持書侍御史一人秩與中丞同掌詔獄及廷尉不當者皆理之後并江南遂省黄沙持書侍御史及太康中又省持書御史二員魏晉以來持書侍御史分掌侍御史所掌諸曹若尚書二丞宋代掌舉劾齊梁並同皆統侍御史自宋齊以來此官不重自郎官轉持書者謂之南奔梁謝畿卿自尚書三公侍郎為持書侍御史頗失志多陳疾臺事畧不復理是也梁天監初始重其選車前依尚書二丞給三騶執盛印青囊舊事糾彈官印綬在前故也後魏掌糾禁内朝會失時服章違錯饗宴會見悉所監之北齊亦有焉後周有司憲上士二人亦其任也隋又為持書侍御史臺中簿領悉以主之至唐永徽初髙宗即位以國諱故改持書侍御史為御史中丞龍朔二年改為司憲大夫咸亨元年復為中丞二人一時有内供奉本有一人聖歴中加一人尋省先天中復置職副大夫通判臺事開元二十一年三月置京畿都採訪處置使以中丞為之侍御史侍御史於周為柱下史老聃嘗為之及秦時張蒼為御史主柱下方書亦其任也又云蒼為柱下御史明習天下圖書計史籍見史記如淳曰方板也謂事在板上也秦以上置柱下史蒼為御史主柱下事或曰主四方文書也又職官録曰秦改御史為柱下史一名柱後史謂以鐵為柱言其審固不撓也一云冠法冠一名柱後惠文以鐵為柱也法冠者秦事云始皇滅楚以其君冠賜御史亦名獬豸冠獬豸獸名一角以觸不直也故執法者冠之亦為侍御史漢因之凡置十五員又漢舊儀曰漢御史員四十五人皆六百石其十五人依給事殿中為侍御史宿廬在石渠門外二人尚璽四人持書給事二人侍前中丞一人領録二十人留寺理百官事侍御史御史大夫自調更告入歸官比丞相掾史史白録白録著録而已惠帝初遣御史監三輔郡其後又置監御史漢官儀曰侍御史出督州郡盗賊運漕軍糧言督軍糧侍御史至後漢復有謢漕都尉官建武七年省晉太元六年又置督運御史官其舉郡國孝廉第四科云有能按章覆問文中御史嚴延年遷侍御史劾霍光專廢立武帝時侍御史又有繡衣直指者出討姦猾理大獄而不常置直指而行無茍私也衣以繡者尊寵之也江充拜直指繡衣使督三輔盗賊禁察踰侈時近臣多奢僭充皆舉劾請没入車馬令身侍北軍擊匈奴奏可貴戚皇恐見上叩頭願得入錢贖罪又王賀字翁孺武帝時為繡衣御史逐捕羣盗皆縱而不誅暴勝之亦為之至後漢譙元為繡衣御史持節分行天下觀覽風俗所至專行誅賞沈約云繡衣御史光武省順帝復置魏罷之後漢亦有侍御史員察舉非法受公卿郡吏奏事有違失舉劾之凡郊廟之祀及大朝會大封拜則一人監威儀有違失則劾奏以公府掾屬髙第補之或故牧守議郎郎中為之唯徳所在初上稱守滿嵗拜真出劇為刺史二千石平遷補縣令見中丞執板揖順帝復絕他選專用宰士有三闕三府各一舉劾案章事無大小尚書受成而已威烈赫奕莫之敢犯真御史守中丞持書服其冠紱上事言守關移稱真又按二漢侍御史所掌凡有五曹一曰令曹掌律令二曰印曹掌刻印三曰供曹掌齋記四曰尉馬曹掌廐馬五曰乘曹掌車駕豹尾之内便為禁省後漢桓典為侍御史執政無所避常乘騘馬京都畏之為之語曰行行且止避騘馬御史又張綱為侍御史安常時遣八使按行風俗唯綱最年少官卑餘皆宿儒重位同日受命各之所部綱獨埋其車輪於洛陽都亭曰豺狼當道安問狐狸遂奏大將軍梁冀兄弟罪惡又陳翔字子麟拜侍御史正旦朝賀大將軍梁冀威儀不整翔奏請收冀理罪時人竒之又楊秉字叔節拜侍御史京師咸稱其有宰相之才魏置御史八人當大會殿中御史簮白筆側陛而坐帝問左右此何官何主辛毗曰此謂御史舊時簮筆以奏不法何當如今者直備位但眊筆耳晉時侍御史九人頗用郡守為之山公啟事曰舊侍御史頗用郡守今散二千石有才能尚少者可用不詔使八座詳之眊音餌品同持書而有十三曹十三曹者謂吏曹課第曹直事曹印曹中都督曹外都督曹媒曹符節曹水曹中壘曹營軍曹法曹笇曹及江左初省課第曹置庫曹掌廐牧牛馬市租後分庫曹置左庫外左庫二曹宋代多併諸曹凡十御史焉自漢以來皆朝服法冠晉武庫失火尚書郭彰與侍御史劉暾典知修復彰以后親輕傲以功程之間呵暾曰我不能截卿角邪以御史著法冠有兩角故也暾厲色曰天子法冠而欲截角命紙筆奏之暾音他昆反齊有十人梁陳皆九人居曹糾察不法至後魏御史甚重必以對策髙第者補之侍御史與殿中侍御史晝則外臺受事夜則番直内臺御史舊式不随臺主簡代延昌中王顯有寵於宣武為御史中尉始請革選此後踵其事每一中尉則更簡代御史北齊設有八人亦重其選後周有司憲中士則亦其任也隋置侍御史八人自開皇之前猶踵後魏革選自開皇之後始自吏部選用不由臺主仍依舊入直禁中大業中始罷御史直宿臺内文簿皆持書主之侍御史但侍從糾察而已由是資位少減焉唐自貞觀初以法理天下尤重憲官故御史復為雄要貞觀十一年呉王恪好畋獵損居人田苖侍御史栁範奏彈之太宗因謂侍臣曰權萬紀事我兒不能匡正其罪合死範進日房元齡事陛下猶不能諫止畋獵豈可獨坐萬紀乎其將除拜皆吏部與臺長官宰相議定然後依選例補奏其内詔别拜者不在其限麟徳以來用人尤重選授之命不由銓管及李義府掌大選寵任既重始得補之自義府之後無出於吏部者侍御史凡四員本二員顯慶中加二員韋仁約曰御史銜命出使不能動搖山嶽震攝州縣誠曠職耳内供奉二員侍御史内供奉與殿中御史内供奉監察御史裏行其制並同皆無職田庶僕臺例占闕者得職田庶僕無闕可占則嵗兩時請地子於太倉每月受俸及庶僕於太府掌糾察内外受制出使分判臺事又分直朝堂與給事中中書舍人同受表理寃訟迭知一日謂之三司受事其事有大者則詔下尚書刑部御史臺大理寺同按之亦謂此為三司推事後漢永安中侍御史寒朗共三府按楚獄亦令三司之例武太后時刑獄滋章凡二臺御史多苛刻無恩以誅暴為事猜阻傾奪更相陵構此其為弊也神龍以來稍革之其後名流謹選侔於貞觀永徽矣侍御史之職有四謂推推者掌推鞫也彈掌彈舉公廨知公廨事雜事臺事悉總判之定殿中監察以下職事及進名改轉臺内之事悉主之號為臺端他人稱之曰端公其知雜事者謂之雜端最為雄劇食坐之南設横榻謂之南床殿中監察不得坐亦謂之痴床言處其上者皆驕傲自得使人如痴是故謂之痴床凡侍御史之例不出累月則遷登南省故號為南床百日察其行歩出入揖讓去就殿中以下皆禀而隨之先後􅃜失者有罰其太極以前二臺朝列之制侍御史與殿中隨仗入分居兩行東行在侍中黄門侍郎給事中後起居郎常侍正諫議大夫御史中丞下西行在中書令侍郎舍人後起居舍人常侍諫議大夫御史中丞大夫下承詔者各五日有㫖召御史不呼名則承詔者出承詔御史舊在西開元初仍制在東侍御史或闕則假殿中承之自至徳以來諸道使府參佐多以省郎及御史為之謂之外臺則皆檢校裏行及内供奉或兼或攝諸使官亦然故事御史臺不受訟有訴可聞者畧其姓名託以風聞其後御史疾惡者少通狀壅絶開元十四年乃定授事御史一人知其日劾狀題告事人姓名其後宰相以御史權重建議彈奏先白中丞大夫復通狀中書門下然後得奏自是御史之任輕矣建中元年以侍御史分掌公廨推彈自是雜端之議輕矣元和八年命四推御史受事周而復始罷東西分日之限舊御史遭長官於塗皆免㡌降乘長官戢轡辭而止焉乾封中王立本為侍御史意氣頗髙塗逢長官端揖而已自是諸人或降而立或一足至地或側鞍弛鐙輕重無常開元以來但舉鞭聳揖而已宋仍唐制侍御史貳中丞𨽻臺院天禧中置言事御史後久不除慶歴五年復置今御史臺中丞㕔蓋御史得兼諫職也殿中侍御史殿中侍御史魏蘭臺遣二御史居殿中察非法即殿中侍御史之始也晉置四人江左多置二人宋徐爰自殿中侍御史轉南臺侍御史梁有四人掌殿内禁衞内事後魏北齊有之隋初改曰殿内侍御史置十二人至煬帝省唐置六員初有二員貞觀二十二年增二員開元中加二員内供奉三員初掌駕出於鹵簿内糾察非違餘同侍御史唯不判事咸通以前遷轉及職事與侍御史相亞自開元初以來權歸侍御史而遷轉猶同兼知庫藏出納及宫門内事知左右廵分京畿諸州諸衞兵禁𨽻焉彈舉違失號為副端閤門之外百僚班序有離立失列言囂而不肅者則糾罰之其正冬大會則戴元豸乘馬加飾大夫中丞加金勒珂佩具服上殿供奉左右或闕則吏部以他官攝之其郊祀廵幸大備鹵簿出入由旌門者監其隊伍初武太后時有殿中裏行及員外殿中御史官或有起家為之而即真者神龍以來無監察則有裏行宋制殿中侍御史二人正七品掌言事分糾大朝會及朔望六參官班序舊制侍御史兼知雜事殿中侍御史兼左右廵使監察御史兼察使官卑而入殿中監察御史者謂之裏行元豐八年詔殿中侍御史兼察事監察御史兼言事石林葉氏曰唐三院御史謂侍御史與殿中侍御史監察御史也侍御史所居曰臺院殿中曰殿院監察曰察院此其公宇之號非官稱也侍御史自稱端公知雜事則稱雜端而殿中監察稱曰侍御近世殿院察院乃以名其官蓋失之矣而侍御史復不稱臺院止曰侍御端公雜端但私以相號而不見於通稱各從其所沿襲而已監察侍御史監察御史初秦以御史監理諸郡謂之監察史漢時罷其名至晉太元中始置檢校御史以呉混之為之掌行馬外事晉志云古司𨽻官知行馬外事晉過江罷司𨽻官故置檢校御史專掌行馬外事亦蘭臺之職也又有禁防御史宋齊以來無聞焉後魏太和末亦置此官宿直外臺不得入宿内省北齊置檢校御史十二人後周司憲旅下士八人蓋亦其職也隋開皇二年改檢校御史為監察御史凡十二人煬帝增置十六員掌出使檢校唐置監察御史十員初有四員貞觀二十二年加二員顯慶中加二員開元中加二員裏行五員掌内外糾察并監祭祀及監諸軍出使等監察御史職知朝堂正門無籍非因奏事不得入至殿庭在西鳳闕南侍殿中侍御史以上從觀象門出若從天降至開元七年三月勅並令隨仗入閤隋末亦遣御史監軍垂拱三年十一月鳳閤侍郎韋方質奏言舊制有御史監軍今未差遣恐􅃜失節度武太后曰將出師君授之以斧鉞閫外之事皆使裁之始聞比來御史監軍乃有控制軍中大小之事皆須承禀非所以委專征也以卑制尊理便不可不許罪人當笞於朝者亦監之分為左右廵糾察違失以承天朱雀街為界每月一代將晦即廵刑部大理東西徒坊金吾及縣獄若蒐狩則監圍察斷絶失禽者量宜劾奏景龍三年監察御史崔琬彈奏宰相宗楚客紀處納等驕恣䟦扈請收劾之舊制大臣有被御史彈者皆俯僂趨出待罪朝堂今楚客等瞋目作色稱以忠鯁被誣中宗令琬與楚客約為兄弟時人竊號為和事天子開元初革以殿中堂左右廵監察或權掌之非本任也職務繁雜百司畏懼其選拜多自京畿縣尉京畿即赤縣也又有監察御史裏行者太宗置自馬周始焉始馬周以布衣有詔令於監察御史裏行遂以為名後髙宗時王立本自忻州定襄縣尉為之凡裏行皆受俸於本官多復本官者自王大賔後罷本官俸方有即真者武太后時復有員外監察試監察或有起家為之而即真者又有臺使八人俸亦於本官請餘並同監察時人呼為六相吏部式其試監察神龍以來無復員外及試但有裏行凡諸内供奉及裏行其員數各居正官之半惟俸禄有差職事與正同唐監察御史後增至十五人正八品下掌分察百寮廵按州縣獄訟軍戎祭祀營作太府出納皆莅焉知朝堂左右廂及百司綱目凡十道廵按以判官二人為佐務繁則有支使其一察官人善惡其二察户口流散籍帳隱没不均其三察農桑不勤倉庫減耗其四察妖猾盗賊不事生業為私蠧害其五察徳行孝弟茂才異數藏器晦跡應時用者其六察黠吏豪宗兼并縱暴貧弱寃苦不能自申者凡戰伐大克獲則數俘馘審功賞然後奏之屯田鑄錢嶺南黔府選補亦視功過糾察決囚徒則與中書舍人金吾將軍莅之國忌齋則與殿中侍御史分察寺觀莅宴射習射及大祠中祠視不如儀者以聞初開元中兼廵傳驛至二十五年以監察御史檢校兩京館驛大歴十四年兩京以御史一人知驛號館驛使監察御史分察尚書省六司繇下第一人為始出使亦然興元元年以第一人察吏部禮部兼監察使第二人察兵部工部兼館驛使第三人察户部刑部嵗終議殿最元和中以新人不出使無以觀能否乃命專察尚書省號曰六察官開元十九年以監察御史二人莅太倉左藏庫三院御史皆初領繁劇外府推事其後以殿中侍御史上一人為監太倉使第二人為監左藏庫使凡諸使下三院御史内供奉其班居正臺監察御史之上宋初御史多出外任風憲之職以他官領之太平興國三年詔本司自薦屬官俾正名舉職天禧元年詔别置御史六員不兼他職月須一員奏事專任彈舉有急務聼非時入對以殿中丞劉平為監察御史用新詔也嘉祐四年中丞韓絳請置裏行從之熙寧三年除秀州軍事推官李定權監察御史裏行用選人為御史自定始也宋敏求繳詞頭云去嵗驟用京官今又幕職官便昇朝著峻處糾繩之地臣恐未厭衆議五年詔祕書殿中内侍省不𨽻六察如有違慢委言事御史彈奏七年大正官名以言事官為殿中侍御史六察官為監察御史掌吏戸禮兵刑工之事在京百司而察其謬誤八年詔監察御史兼言事殿中侍御史兼察事徽宗時如辟雍大成府等學太官局翰林儀鸞司東西上閤門客省引進四方館皆不𨽻臺察崇寧間大臣欲其便已而南臺御史亦有不言事者自大觀臣僚申請而殿中六尚辟雍大成府等學太官局翰林儀鸞司皆𨽻六察自余應求有言而東西上閤門客省引進四方館復𨽻御史自胡舜陟申請而本臺始增入御史言事之文乾道二年詔自今非曾經兩任縣令不得除監察御史著為條令慶元二年侍御史黄黼言御史臺有三院其一為監察御史髙宗時嘗置六員孝宗嘗置三員今分察之任止二人乞增置一員從之以後常置二員容齋洪氏隨筆曰御史許風聞論事相承有此言而不究所從來以予考之蓋自晉宋以下如北齊沈約為御史中丞奏彈王源日風聞東海王源蘇冕會要云故事御史臺無受詞訟之例有詞狀在門御史採狀有可彈者即畧其姓名皆云風聞訪知其後疾惡公方者少􅉍相推倚通狀人頗壅滯開元十四年始定受事御史人知一日劾狀遂題告事人名乖自古風聞之義然則向之所行今日之短卷是也二字本見尉佗傳又曰唐元和中御史中丞王播奏監察御史舊例在任二十五月轉准具員不加今請仍舊其殿中侍御史舊十二月轉具員加至十八月今請減至十五月侍御史舊十月轉加至十三月今請減至十二月從之按唐世臺官雖職在抨彈然進退從違皆出宰相不若今之雄𦂳觀其遷敘定限可知矣國朝未改官制之前任監察滿四年而轉殿中又四年轉侍御史四年解臺職始轉司封員外郎元豐五年以後陞沉逈别矣主簿主簿漢有御史主簿張忠為御史大夫署孫寳為主簿自魏晉以來無聞至隋大業三年御史臺始置主簿二人隋兼置録事員二人至唐置一員掌付事勾稽省署抄目監印給紙筆其俸禄與殿中御史同武徳末杜淹為大夫以吏部主事林懐信為之貞觀中自張𢎞濟為此官之後遂為美職管轄臺中雜務公廨厨庫檢督令史奴婢配勲散官職事每食則執黄卷書其譴罰録事以下小吏各有差宋御史臺置推直官二人專治獄事凡推直有四推曰臺一推臺二推殿一推殿二推主簿一人掌受事發辰勾檢稽失兼簿書錢榖之事元豐官制行定員分職裏行推直悉罷檢法官掌檢詳法律元祐三年改為主簿紹聖三年董敦逸奏復置主簿掌勾稽簿書各一人紹興初詔檢法主簿特令殿中侍御史奏辟紹熙中侍御史林大中以論事不合去所奏辟檢法官李謙主簿彭龜年亦乞同罷嘉定元年劉渠除檢法官范之柔除主簿以後二職皆闕文獻通考卷五十三
