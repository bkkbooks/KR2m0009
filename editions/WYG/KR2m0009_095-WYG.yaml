body:
  text: 文獻通考卷九十五鄱陽馬端臨貴與著宗廟考五后妃廟私親廟祔廟周禮大司樂乃奏夷則歌小呂舞大濩以享先妣鄭氏註曰先妣姜嫄也姜嫄履大人迹感神靈而生后稷是周之先母也周立廟自后稷為始祖姜嫄無所妃是以特立廟而祭之謂之閟宫閟神之漢髙祖五年即皇帝位追尊先媼曰昭靈夫人漢儀注昭靈夫人陵廟在陳留小黄宣帝元康元年立皇考廟益奉明園户為奉明縣奉明園即皇考史皇孫葬地帝初即位下詔曰故皇太子在湖未有號諡嵗時祠其議諡置園邑有司奏請禮為人後者為之子也故降其父母不得祭尊祖之義也陛下以孝昭帝後承祖宗之祀制禮不踰閑謹行視孝昭帝所為故皇太子起位在湖史良娣冡在博望苑北親史皇孫位在廣明郭北諡法曰諡者行之迹也愚以為親諡宜曰悼母曰悼后比諸侯王園置奉邑三百家故皇太子諡曰戾置奉邑二百家史良娣曰戾夫人置守冡三十家園置長丞周衛奉守如法以湖閿鄉邪里聚為戾園閿古字從門中建安中正作師古曰舉目使人也許密反長安白亭東為戾后園廣眀成鄉為悼園故改葬焉後八嵗有司復言禮父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寝以時薦享焉益奉園民滿千六百家以為奉明縣尊戾夫人曰戾后置奉園邑及益戾園各滿三百家致堂胡氏曰禮曰為人後者為其父母降不敢貳尊也既名其所後為父母則不得名其所生曰父母矣而禮有為其父母降是猶以父母名之何也此所謂不以辭害意也立言者顧不可曰為其伯父伯母叔父叔母降故假曰父母以眀當降之義降則不可名之曰父母矣宣帝初有司奏請戾太子及悼后之諡首言為人後者云云後言故太子諡曰戾云云首尾皆是也而中有稱親之言則非也詔書問故太子末及史皇孫雖包含意指有司直對太子良娣之諡可也而前據經義後上戾名中特稱親為史皇孫以中帝意豈非姦説乎夫親深言之則非父不可當若曰文王之為世子有父之親是也泛言之則所厚者皆可以稱若曰親者無失其為親是也有司之言果何從歟若避曰考故以親言是踈之也知其不可稱考而姑曰親以包舉之是不正名亦踈之也以其不得於言知其不契於理既為伯父母叔父母之後而父母之則當降所生父母而伯父母叔父母之昭昭然矣先公曰愚按胡氏之說辯則辯矣而施之宣帝之世則不可愚將徐徐詰之胡氏曰敢問宣帝而欲稱其所生之父母也將為伯父乎為叔父乎於所後父為兄則伯父也於所後父為弟則叔父也而宣帝則有所後祖無所後父者也昭帝崩亾嗣宣帝以兄孫為叔祖後者也不得其所後之父而父之則何以稱其所生之父乎先是昌邑王以兄子入繼則考昭帝可也典䘮可也昭帝葬矣易月之制終矣昌邑廢矣宣帝始以兄孫入繼當時惟言嗣孝昭皇帝後而已則未知其為子乎為孫乎必也升一等而考昭帝則又将降一等而兄史皇孫矣可不可乎有司未有所䖏姑緣其所生父直稱之曰皇考而已故曰胡氏辯則辯矣施之宣帝之世則不可當俟通儒而質之元帝永光五年韋元成言古者制禮别尊卑貴賤國君之母非適不得配食則薦於寝身沒而已陛下躬至孝承天心建祖宗定迭毁序昭穆大禮既定孝文太后孝昭太后寢祠園宜如禮勿復修奏可孝文太后薄氏葬南陵孝昭太后趙氏葬雲陵各有園廟帝寢疾匡衡告謝毁廟曰孝莫大於嚴父故父之所尊子不可以不承父之所異子不敢同禮公子不得為母信讀曰申為後則於子祭於孫止李竒曰不得信尊其父也公子去其所而為大宗後尚得私祭其母為孫則止不得祭公子母也明繼祖不復顧其私祖母也尊祖嚴父之義也哀帝建平元年追尊定陶共王為共皇帝置寢廟京師序昭穆儀如孝元帝言如天子之儀為廟京師也徙定陶王景為信都王不復為定陶王立後者哀帝自以已為後故郎中令泠褒黄門郎叚猶等復奏言定陶共皇太后共皇后皆不宜復引定陶藩國之名以冠大號車馬衣服宜皆稱皇之意置吏二千石以下各供厥職又宜為共皇立廟京師上復下其議羣下多順指言母以子貴宜立尊號以厚孝道唯丞相光大司馬喜大司空丹以為不可丹曰聖王制禮取法於天地尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊無二上之義也定陶共皇號諡已前定義不得復改禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也為人後者為之子故為所後服斬縗三年而降其父母期明尊夲祖而重正統也孝成皇帝聖恩深逺故為共王立後奉承祭祀令共皇長為一國太祖萬世不毁恩義已備陛下既繼體先帝特重大宗承宗廟天地社稷之祀義不可復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毁空去一國太祖不墮之祀而就無主當毁不正之禮非所以尊厚共皇也丹由是寖不合上意平帝元始中大司馬王莽奏夲始元年丞相義等議蔡義也諡孝宣皇帝親曰悼園置邑三百家至元康元年丞相相等奏魏相也父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟益故奉園民滿千六百家以為縣臣愚以為皇考廟夲不當立累世奉之非是又孝文太后南陵孝昭太后雲陵園雖前以禮不復修陵名未正謹與太司徒晏等百四十七人議皆曰孝宣皇帝以兄孫繼統為孝昭皇帝後以數故孝元世以孝景皇帝及皇考廟親未盡不毁此兩統貳父違於禮制案義奏親諡曰悼裁置奉邑皆應經義相奏悼園稱皇考立廟益民為縣違離祖統􅆾繆夲義父為士子為天子祭以天子者乃謂若虞舜夏禹殷湯周文漢之髙祖受命而王者也非謂繼祖統為後者也臣請皇髙祖考廟奉明園毁勿修罷南陵雲陵為縣奏可光武帝建武三年立親廟雒陽祀父南頓君以上至舂陵節侯十九年五官中郎将張純與太僕朱浮奏言禮為人後者則為之子既事太宗太宗謂元帝則降其私親今禘祫髙廟陳叙昭穆而舂陵四世君臣並列以卑厠尊不合禮意昔髙祖以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠臣愚謂宜除今親廟以則二帝舊典願下有司博採其議詔下公卿大司徒戴渉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元皇帝尊為祖父可親奉祠成帝以下有司行事别為南頓君立皇考廟其祭上至舂陵節侯羣臣奉祠以明尊尊之敬親親之恩詔可其南陽舂陵嵗時各且因故園廟祭祀園廟去太守治所逺者在所令長行太守事侍祠南頓君稱皇考廟鉅鹿都尉稱皇祖考廟鬱林太守稱皇曽祖考廟節侯稱皇髙祖考廟在所郡縣侍祠致堂胡氏曰西漢自孝成而後三世無嗣王莽簒時漢祚既絶光武掃平禍亂奮然崛起雖祖髙祖而帝四親非與哀朝尊崇藩統同事於義未有大不可者然一聞純等建議斷然從之曽無留難章陵四祠蔑有異等彼何所為而然耶寡恩之譖既不聞於當年失禮之議又不生於後代以是較之宣哀過舉益明而禮所載為人後者為其父母降而不得祭豈可違而不守哉中元元年帝使司空告祠髙祖以吕氏王諸吕賊三王㡬危社稷不宜配食上薄太后尊號曰髙皇后配食地祗遷吕太后廟於園四時上祭和帝追尊其母梁貴人曰恭懐皇后陵以竇后配食章帝恭懐皇后别就陵寝祭之安帝以清河孝王子即位建光元年追尊其祖母宋貴人曰敬隠后陵曰敬北陵亦就陵寝祭太常領如西陵追尊父清河孝王曰孝徳皇母曰孝徳后清河嗣王奉祭而已順帝即位追尊其母曰恭愍后陵曰恭北陵就陵寝祭如敬北陵桓帝以河間孝王孫蠡吾侯即位梁太后詔追尊河間孝王為穆皇夫人曰孝穆后廟曰清廟陵曰樂成陵蠡吾先侯曰孝崇皇廟曰烈廟陵曰博陵皆置令丞王因奉祀靈帝以河間孝王曽孫觧瀆侯即位竇太后詔追尊皇祖淑為孝元皇夫人夏氏曰孝元后陵曰淳陵廟曰靖廟皇考長為孝仁皇夫人董氏為真園貴人陵曰真陵廟曰奐廟獻帝即位相國董卓奏恭懐敬隠恭愍三皇后和帝生母安帝祖母順帝母並非正嫡不合稱后皆奏毁之魏文帝甄后賜死故不列廟明帝即位有司奏請追諡曰文昭皇后使司空王朗持節奉策告祠於陵三公又奏曰自古周人既祖后稷又特立廟以祀姜嫄今文昭皇后於後嗣聖徳至化豈有量哉夫以皇家世妃之尊神靈遷化而無寝廟以承享祀非以報顯徳昭孝敬也稽之古制宜依周禮别立寝廟奏可太和元年二月立廟於鄴四月洛邑初營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容以太牢告廟至景初元年十二月己未有司又奏文昭皇后立廟京師永𫝊享祀樂舞與祖廟同廢在鄴廟明帝太和三年詔曰禮王后無嗣擇見支子以繼太宗則當纂正統而奉公義何得復顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外藩援立而董宏等稱引亡秦惑誤朝議遂尊恭皇立廟京師又寵藩妾使比長信僭差無禮人神弗佑罪師丹忠正之諫致丁傅焚如之禍自是之後相踵行之其令公卿有司深以前世為戒後嗣萬一有由諸侯入奉大統則當眀為人後之義敢為佞邪導諛君上妄建非正之號謂考為皇稱妣為后則股肱大臣誅之無赦其書之金策藏之宗廟是後髙貴常道援立皆不外尊及愍帝建興四年司徒梁芬議追尊之禮帝既不從而右僕射索綝丒林反等亦稱引魏制以為不可故追贈呉王為太保而已晋武帝既改創宗廟追尊景帝夫人夏侯氏為景懐皇后任茂議以為夏侯初嬪之時未有王業帝不從時已尊景王夫人羊氏為景后矣太康元年靈夀公主修麗祔於太廟周漢未有其凖魏明帝則别立平原主廟晉文異魏也惠帝世愍懐太子二子哀太孫臧冲太孫尚並祔廟元帝時懐帝殤太子又祔廟號為隂室四殤懐帝初又策武帝後宫楊氏曰武悼皇后改葬峻陽陵側别祠𢎞訓宫不列於廟成帝咸康時作武悼后神主祔於廟配享世祖元帝太興二年有詔琅邪恭王宜稱皇考賀循議云禮典之義子不敢以己爵加其父號帝又從之元帝為琅邪王妃虞氏永嘉時薨帝為晋王追尊為王后有司奏請王后應别立廟令曰今宗廟未成不宜更興作便修飾陵上屋以為廟太興三年追諡皇后祔於太廟明帝生母豫章君荀氏成帝時薨贈豫章郡君别立廟於京都孝武太元十九年詔追尊鄭太后簡文帝母元帝後宫尚書令王珣奏下禮官詳正按太常臣允等議以春秋之義母以子貴故仲子成風咸稱夫人經云考仲子之宫明不配食也且漢文詔二太后並繫子號宜逺凖春秋考宫之義近謩二漢不配之典尊號既正宜改築新廟􅂋崇尊稱則罔極之情伸别建寝廟則嚴禰之道著繫子為稱兼明貴之所由一舉而三義以允固哲王之髙致可如允議追尊㑹稽太妃為簡文皇太后燕主慕容垂尊母蘭氏為文昭皇后欲遷文明叚后以蘭后配享太祖博士董謐劉詳議以為堯母為帝嚳妃位第三不以貴陵姜嫄明聖之道以至公為先文昭后宜别立廟垂不從卒遷叚后以蘭后代之又以景昭可足渾后傾覆社稷追廢之尊烈祖昭儀叚氏為景徳皇后配享烈祖崔鴻曰齊桓公命諸侯毋以妾為妻夫之於妻猶不可以妾代之况子而易其母乎春秋所稱母以子貴者君母既沒得以妾母為小君也至於享祀宗廟則成風終不得配荘公也昔文姜得罪於桓公春秋不之廢可足渾氏雖有罪於前朝然小君之禮成矣垂以私憾廢之又立兄妾之無子者皆非禮也宋孝武大明二年有司奏皇代殷祭無事於章太后博士孫武議祭統曰有事於太廟則羣昭羣穆咸在不失其倫殷祀是合太祖而序昭穆章太后既居於上不立正廟若迎主入太廟既不敢配列於正序又未聞於昭穆之外别立為位章太后廟四時享薦雖不於孫止若太廟禘祫獨祭别宫與四時烝嘗不異則非禘大祭之義又無取於祫合食之文謂不宜與太廟同殷祭之禮也詔曰章皇太后追尊極號禮同七廟豈容獨闕殷薦隔兹盛祀閟宮遥祫既行有周魏晉從享式範無替宜述附前典以宣情敬博士王奭之議按禘祫小廟禮無正文求之情例如有可准推尋祫之為名雖在合食而祭典之重此為大夫以孝享親尊愛罔極因殷薦於太祖亦致盛祀於小廟譬有事於尊者可以及卑故魏髙堂隆所謂猶以祫故而祭之也是以魏之文思晋之宣后雖不並序於太廟而猶均禘於姜嫄其意如此又徐邈所引四殤不祫就而祭之以為别享之例斯其證矣愚謂章太后廟亦宜殷薦從之七年立宣貴妃廟時有司奏故宣貴妃既加殊禮未詳應立廟不虞龢議曰婚義云后立六宫后之有三妃猶天子之有三公也三公既尊於列國諸侯三妃亦貴於庶邦夫人據春秋仲子得考彼别宫今貴妃理應立此新廟詔可龢音禾其祀禮王親執奠爵有故三卿行事明帝太始二年昭太后崩有司奏太后於至尊無親上特制義服祔廟之禮下禮官詳議乃躋新祏於上位其祭使有司行禮博士王畧等奏昭皇太后正位母儀尊號允著祔廟之禮宜備彜典則愚謂神主應入章后廟又宜依晋元皇之於愍帝安帝之於永安后祭祀之日不親執觴爵使有司行事時太宗宣后已祔章太后廟虞龢議以為春秋之義庶母雖名同崇號而實異正嫡是以猶考别宫而公子主其祀今昭皇太后既非所生益無親奉之理周禮宗伯職云若王不與祭則攝位然則使有司行其禮又婦人無常秩各以夫為定夫亡以子為次昭皇太后即正位於前宣太后追尊在後以序而言宜躋祏於上位詔可六月有司奏七月嘗祠二廟依舊車駕親奉孝武皇帝室至尊親進觴爵及昭皇太后室應拜及祝文稱皇帝御名又皇后今月二十五日䖍見於禰拜孝武皇帝昭皇太后並無明文禮官議曰今上既纂嗣文皇於孝武進拜而已􅜠爵使有司行事昭皇太后祝文稱皇帝御名孝昭皇太后二室廢薦告後廢帝元徽二年十月丙寅有司奏至尊親祠太廟文皇帝太后廟之日孝武皇帝及昭皇太后雖親非正統而常經北面宜執孝武皇帝􅜠爵昭皇太后依舊三公行事左丞孫緬議晋代祖宗孝宗顯宗烈宗肅宗並是晋帝之伯今朝明凖而初無有司行事之文愚謂主上親執孝武皇帝􅜠爵有惬情敬皇太后君母之貴見尊一則與章宣二廟同享閟宫非唯不可躬奉乃宜議其毁替請且依舊三公行事從之齊明帝建武二年有司奏遷景懿后於新廟車服之儀乘重翟車服之褘衣首飾以覆侍中散騎常侍黄門侍郎散騎侍郎各二人分從前後部同於王者内侍有女尚書女長御啓引梁武帝立小廟太祖太夫人廟也非嫡故别立廟皇帝每祭太廟訖乃詣小廟亦以一太牢如太廟禮普通七年祔皇太子所生丁貴嬪神主於小廟陳文帝入嗣而皇考始興烈昭王廟在始興國謂之東廟天嘉四年徙東廟神主祔於梁之小廟改曰國廟祭用天子儀唐制追贈皇太后贈皇太子皆别立廟先天元年祔昭成肅明二皇后於儀坤廟昭成皇后竇氏睿宗妃生元宗肅明皇后劉氏亦睿宗妃生寧王皆為武后所殺元宗即位追封立廟開元三年右拾遺陳貞節以諸太子廟不合守供祀享上疏伏見章懐太子等四廟逺則從祖近則堂昆並非有功於人立事於代而寝廟相屬獻祼連時事不師古以克永代臣實疑之今章懐太子等乃為陵廟分署官寮八處修營四時祭享物湏官給人必公糧合樂登歌咸同列帝謹按周禮始祖以下猶稱小廟未知此廟厥名維何臣謂入署司存員寮且省四時祭祀供給咸停臣又聞磐石維城既開封建之典别子為祖非無大小之宗其四陵廟等應湏祭祀者並令承後子孫自修其事崇此正典冀合禮經上令有司集禮官及羣官詳議奏聞駕部員外郎裴子餘議曰謹按前件四廟等並前皇嫡允殞身昭代聖上哀骨肉之深鍚烝嘗之享憲章徃昔垂範将来昔嫄廟列周戾園居漢並位非七代置在一時斯並前代宏規後賢令範又按春秋狐突適下國遇太子使登僕曰予将以晋畀秦秦将祀予此則太子之言無後明矣對曰神不歆非類人不祀非族君祀無乃殄乎此則晋有其祀立廟必矣又定公元年立煬宫經傳更無異説鄭元註云煬公伯禽之子季氏禱而立其宫也考之漢儲晋嫡則如彼言乎周廟魯宫則如此豈可使晋求秦祀戾匪漢恩求枉者深所直者鮮黷神慢禮理必不然且尊以儲后位絶諸侯諡號既崇官吏有典去羊存朔非理所安徇利忘禮何以為國太常博士叚同泰議曰自古帝王封建子弟寄以維城之固咸登列邦之榮豈必有功於人立事於代生者曽無異議逝者輙此奏停雖存沒之迹不同而君親之恩何别此則輕重非當情禮不均神道固是難誣人情孰云其可四年十一月十六日昭成皇后祔於太廟至八月九日勅肅明皇后依前儀坤廟安置初欲祔於太廟太常博士陳貞節等以肅明皇后不合與昭成皇后配祔於睿宗遂奏議曰臣聞於禮宗廟父昭子穆皆有配座每室一帝一后禮之正儀自夏殷而来無易兹典伏惟昭成皇后有太姒之徳已配食於睿宗則肅明皇后無帝母之尊自應别立一廟謹按周禮云奏夷則歌中吕以享先妣先妣者姜嫄也姜是帝嚳之妃后稷之母特立廟名曰閟宫又禮論云晋伏系之議云晋簡文鄭宣后既不配食乃築宫於外嵗時就廟享祭而已今肅明皇后無祔配之位請同姜宣后别廟而䖏四時享祀一如舊儀從之於是遷昭成皇后神主祔於睿宗之室唯留肅明皇后神主於儀坤廟八月二日勅儀坤廟𨽻入太廟不湏置官屬至二十一年正月六日遷祔肅明皇后神主於太廟其儀坤廟為肅明觀二十二年勅贈太子頃年官為立廟並致享祀雖欲歸厚而親且未安烝嘗之時子孫不及若專令官祭是以踈間親遂此為常豈云敬孝其諸贈太子有後者但官置廟各令子孫自主祭其署及官悉停若無後者宜依舊上元二年禮儀使太常卿杜鴻漸奏讓帝七太廟等請停四時享獻毎至禘祫之月則一祭焉樂用登歌一部牲獻罇俎之禮同太廟一室之儀昭宗大順元年将行禘祭有司請以三太后神主祔享於太廟三后者孝明太皇太后鄭氏宣宗皇帝母恭僖皇太后王氏敬宗皇帝母正獻皇太后韋氏文宗皇帝母三后之崩皆作神主有故不當入太廟當時禮官建議並置别廟毎年五享三年一禘五年一祫皆於夲廟行事無奉神主入太廟之文至是亂離之後舊章散失禮院憑曲臺禮欲三太后祔享太廟太常博士殷盈孫獻議非之曰臣謹按三太后憲宗穆宗之后也二帝已祔太廟三后所以立别廟者不可入太廟故也與帝在位皇后别廟不同今有司悮用王彦威曲臺禮禘别廟太后於太廟乖戾之甚臣竊䆒事體有五不可曲臺禮云别廟皇后禘祫於太廟祔於祖姑之下此乃皇后先崩已造神主未在帝位如昭成肅明元獻昭徳之比昭成肅明之崩也睿宗在位元獻之崩也元宗在位昭徳之崩也肅宗在位四后於太廟未有夲室故創别廟當為太廟合食之主故禘祫乃奉以入饗又其神主但題云某諡皇后明其後太廟有夲室即當遷祔帝方在位故皇后暫立别廟耳本是太廟合食之主故禘祫乃升太廟未有位故祔祖姑之下今恭僖正獻二太后皆穆宗之后恭僖㑹昌四年造神主合祔穆宗廟室時穆宗廟已祔武宗母宣懿皇后神主故為恭僖别立廟其神主直題云皇太后明其終安别置不入太廟故也正獻太后大中元年作神主立别廟其神主亦題為太后並與恭僖義同孝明咸通五年作神主合祔憲宗廟室憲宗廟已祔穆宗之母懿安皇后故孝明亦别立廟是懿宗祖母故題其主為太皇太后與恭僖正獻亦同帝在位后先作神主之例今以别廟太后神主禘祭升享太廟一不可也曲臺禮别廟皇后禘祫於太廟儀注云内常侍奉别廟皇后神主入置於廟廷赤黄褥位奏云某諡皇后禘祫祔享太廟然後以神主升今即湏奏云某諡太皇太后且太廟中皇后神主二十一室今忽以皇太后入列於昭穆二不可也若但云某諡皇后即與所題都異神不可依憑此三不可也古今禮要云舊典周立姜嫄别廟四時祭薦及禘祫與七廟皆祭唯不可入太祖廟為别配魏文思甄后明帝母廟及寝依姜嫄之廟四時及禘皆與諸廟同此舊禮明文得以為證今以别廟太后禘祫於太廟四不可也所以置别廟太后以孝明不可與懿安並祔憲宗之室今禘享乃處懿安於舅姑之上此五不可也且祫合祭也合猶不入太祖之廟而况於禘乎竊以為並皆禘於廟為宜且恭僖正獻二廟比在朱陽坊禘祫赴太廟皆湏備法駕典禮甚重儀衛至多咸通之時累遇大享耳目相接年代未遥人皆見聞事可詢訪非敢以臆斷也或曰以三廟故禘祫於别廟或可矣而将来有可疑焉謹按睿宗親盡已祧今昭成肅明二后同在夾室如或後代憲宗穆宗親盡而祧三太后神主其得不入夾室乎若遇禘祫即如之何對曰此又大誤也三太后若親盡合祧但當閟而不享安得處於夾室禘祫則就别廟行之歴代以来何嘗有别廟神主復入太廟夾室乎時宰相孔緯以大祭日迫不可遽改時人非之後唐明宗天成二年中書門下奏兩漢以諸侯王入繼帝統則必易名上諡廣孝稱皇改置園陵仍増兵衛等事遂詔下太常禮院集議請追尊四廟並加皇帝之號兼請於洛京立廟勅宜於應州舊宅立廟餘依所奏按荘宗以沙陀為唐之嗣明宗又以代北狄裔為荘宗之嗣故後唐之所謂七廟者以沙陀之獻祖國昌太祖克用荘宗存朂而上繼唐之髙祖太宗懿宗昭宗而此所謂四廟者又明宗代北之髙曽祖父也宋太祖皇帝建隆初追尊賀氏為孝惠皇后止就陵所置祠殿薦以常饌不設牙盤祭噐乾徳初孝明皇后王氏崩有司始議置后廟奉孝惠孝明二后神主升祔詔令詳定殿室之制及先後之次太常博士和峴等奏請同祔太廟及太祖山陵神主祔廟乃請以孝明皇后配享忌日行香廢務其孝惠皇后享於别廟並從之太宗太平興國元年追冊越國夫人符氏為懿徳皇后尹氏為淑徳皇后並祔享於后廟真宗至道三年六月詔大行皇帝祔廟令都省集議定皇后合食之禮咸請以懿徳皇后符氏升配宗正卿趙安易言淑徳皇后尹氏當在懿徳之上今百官議論苟且隳凟尊卑若序以後先當用淑徳配食詔有司詳討以聞禮官議按晋時議景帝配祔傅元等議夏侯夫人初歸景帝未有王基之道不及帝統百揆而亡后妃之化未著逺近追尊無經義可據竊以今之所議正與此同且淑徳配合之初潛躍之符未兆懿徳輔佐之始藩邸之位已隆然未嘗正位中宫母臨天下豈可生無尊極之位沒升配饗之崇人情不安典籍無據唐順宗祔廟後十一年始以荘憲皇后升配憲宗祔廟後二十五年始以懿安皇后升配今請虚位允叶舊儀再詔集議禮官同詳定上議請升祔懿徳其淑徳皇后加太字仍舊别廟詔恭依其淑徳皇后不加太字别廟祭享乾興元年時仁宗已即位中書下禮儀院状荘穆皇后嘗母儀天下禮當升祔荘懐皇后夲從藩邸追命當享后廟集尚書省六品諸司四品以上議如禮儀院祔真宗荘穆皇后神主於太廟明道二年荘獻明肅太后既上諡又追尊荘懿太后方事園陵判河南府錢惟演建議請二太后並祔真宗禮院言夏商以来父昭子穆皆有配座每室一帝一后禮之正儀開元肅明皇后始有並祔惟演引唐武宗母韋太后祔穆宗孝明孝章祔太祖故事按穆宗惟以韋太后配更無别后太祖未嘗以孝章配伏見先帝以懿徳配享太宗及明徳園陵禮畢遂得升祔元徳自追尊後凡十七年始克升配今荘穆著位長秋祔食真宗斯為正禮荘獻母儀天下與明徳例同若從古禮止應祀后廟荘懿帝母之尊與元徳例同便從升祔似非先帝慎重之意前代無同日並祔之比惟上裁之都省禮院更議皆以為荘穆位崇中壼與懿徳有異已祔真廟自協一帝一后之文荘獻輔政十年荘懿誕育聖躬功徳莫與為比退就后廟未厭衆心按周禮大司樂職奏夷則歌中吕以享先妣先妣者姜嫄也帝嚳之妃后稷之母特立廟而祭謂之閟宫宜太廟外别立新廟奉安二太后神主同殿異室嵗時薦享用太廟儀别立廟名自為樂曲以崇世享忌前一日不御正殿百官奉慰著之甲令仍作新廟名曰奉慈在兩廟之間景祐三年詔祠太廟奉慈后廟每室各差宫闈令一英宗治平三年立濮王園廟先是宰臣韓琦等奏請下有司議濮安懿王及譙國太夫人王氏襄國太夫人韓氏仙遊縣君任氏合行典禮詔湏大祥後議之至是進呈乃有是詔翰林學士王珪等相顧不敢先知諫院司馬光獨奮筆立議略曰為人後者為之子不敢復顧其私親秦漢以来有自旁支入承大統推尊其父母為帝后皆見非當時取譏後世不敢引以為聖朝法臣以為濮王宜尊以髙官大爵稱皇伯而不名賈黯之議亦同王珪敕吏以光手藁為案議上歐陽修以為自古無以所生父改稱伯者珪等言非是中書奏孝宣光武皆稱父為皇考太后聞之手書詰責輔臣以不當議稱皇考上詔如聞集議議論不一宜權罷議當令有司博求典故務合禮經判太常寺范鎮率禮官上言陛下既考仁宗又考濮王其議未當具列儀禮及漢儒議論魏明帝詔為五篇奏之於是臺官自中丞賈黯以下各有奏知雜吕誨亦言陛下入繼大統皆先帝之徳當從王珪等議為定封濮安懿王大國諸夫人典禮稱是奏皆㽞中不報司馬光又上言曰伏見向者詔羣臣議濮安懿王合行典禮王珪等二十餘人皆以為宜凖先朝封贈期親尊屬故事凡兩次㑹議無一人異辭而政府之意獨欲尊濮王為皇考巧飾詞説誤惑聖聼政府言儀禮夲文五服年月敕皆云為人後者為其父母之服者不謂之父母不知如何立文此乃政府欺罔天下之人謂其皆不識文理也又言漢宣帝光武皆稱其父為皇考臣案宣帝承昭帝之後以孫繼祖故尊其父為皇考而不敢尊其祖為皇祖者以與昭帝昭穆同也光武起布衣誅王莽冐矢石以得天下名為中興其實創業雖自立七廟猶非太過况但稱皇考其謙損甚矣今陛下親為仁宗之子以承大業傳曰國無二君家無二尊若復尊濮王為皇考則置仁宗於何地乎至是乃詔立濮王園廟以宗濮為濮國公奉濮王祀先是太后手書濮安懿王譙國太夫人王氏襄國太夫人韓氏仙遊縣君任氏可令皇帝稱親尊王為濮安懿皇譙國襄國仙遊並稱后上手詔曰稱親之禮謹遵慈訓追崇之典豈易克當且欲以塋為園即園立廟皇太后已賜俞允仍改封宗濮侍講吕公著上言稱親之説乃漢史皇孫故事皇孫即宣帝所生父宣帝為昭帝後是以兄孫遥嗣祖統無兩考之嫌故且稱親其後既立諡只稱悼園今陛下以旁支繼大統建立園廟以王子承祀於濮王無絶父之義於仁宗無兩考之嫌可謂兼得其親字既稱謂難立且義理不安乞寝罷不報神宗熈寧二年九月廢奉慈廟奉章惠太后神主赴西京瘞陵園先是治平初同判太常寺吕公著言章惠皇太后凖章聖皇帝遺札褒太妃之號仁宗皇帝嘗以母稱故加保慶之號盖生有慈保之勤故沒有廟享之報今於陛下則恩有所止義難承祀其奉慈廟請依禮廢罷詔太常禮院詳議神宗即位知諫院楊繪言章惠太后於仁宗有撫飬之恩故别祭於奉慈廟今陛下之於仁宗皇帝則孫也乞下有司詳議禮官復申治平之議乃命太常卿奉神主瘞於陵園帝率羣臣詣瓊林苑酌獻以辭遂廢其廟元豐六年詳定郊廟奉祀禮文所言按禮夫婦一體故昏禮則同牢合􅈟終則同穴祭則同几同祝饌未嘗有異廟者也惟周人以姜嫄為媒神而帝嚳不廟又不可下入子孫之廟乃以别廟而祭之故魯頌謂之閟宫周禮謂之先妣是也自漢以来凡不祔不配者皆援姜嫄以為比或以其微或以其繼而已盖其間有天下者起於側微而其后不及正位中宫或已嘗正位矣有所不幸則當立繼以奉宗廟故有祖姑三人則祔於親者之説則立繼之禮其来尚矣始㣲終顯皆嫡也前娶後繼皆嫡也後世乃以始㣲後繼寘之别廟不得伸同几之義則非禮之意恭惟太祖孝惠皇后太宗淑徳皇后真宗章懐皇后實皆元妃而孝章皇后則太祖之繼后而皆祭以别廟在禮未安請升祔太廟増四祏室以時配享七月遂自别廟升祔焉徽宗大觀二年禮部太常寺請建别廟奉安惠恭皇后神主依章穆皇后祔享故事乃奉惠恭皇后祔於别廟政和四年禮部太常寺言眀達皇后祠殿寘在城外於典禮無據請就惠恭皇后别廟増建殿室升祔七月奉明逹皇后祔於别廟髙宗紹興二十二年有司言懿節皇后上僊合祔廟權禮部侍郎施坰等言檢㑹大觀二年顯恭皇后故事於太廟殿後建别廟奉安神主今来大行皇后祔廟亦合建别廟於太廟殿之後詔從之乃建别廟紹熈五年太廟祧僖順翼宣四祖廟作四祖廟奉安僖祖以下神主詳見天子宗廟門文獻通考卷九十五
