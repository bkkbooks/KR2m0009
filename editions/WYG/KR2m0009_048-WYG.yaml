  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0009_WYG_048-1a, image: WYG0611/WYG0611-0128a.png}
body:
  text: 文獻通考卷四十八鄱陽馬端臨貴與著職官考二三公總序四輔二大附記曰虞夏商有師保有疑丞設四輔及三公尚書大傳曰古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑有志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其禄視次國之君不必備惟其人語使能也故天子無爵三公無官參職天子何官之稱天文三台以三公法焉三台星名台一阼能伊尹曰三公調隂陽九卿通寒暑大夫知人事列士去其私周成王作周官曰立太師太傅太保兹惟三公論道經邦爕理隂陽師天子所師法傅傅相天子保保安天子於德義者此惟三公之任佐王論道以經緯國事和理隂陽少師少傅少保曰三孤此三官名曰三孤孤特也言卑於公尊於卿特置此三人貳公𢎞化寅亮天地弼予一人副貳三公𢎞大道化敬信天地之教以輔我一人之治則三太周之三公也故不以一職為官名公八命也九命則分陜為二伯又以三少為孤卿與六卿為九焉六卿冢宰司徒宗伯司馬司寇司空也周禮正義曰按婚義云三公九卿者六卿并三孤而言九其三公又下兼六卿故傳云司徒公司馬公司空公公各兼二卿按顧命太保領冢宰畢公領司馬毛公領司空别有芮伯為司徒彤伯為宗伯衞侯為司寇則周時三公各兼一卿之職與古異矣又周禮王畿有六卿每二卿則公一人蓋一公領二卿也舜之於堯伊尹於湯周公召公於周是其任也賈誼曰天子不喻於前聖之德不知君民之道不見禮義之正詩書無宗學業不法太師之責也古者齊太公職之天子不惠於庶民不禮於大臣不中於折獄無經於百官不哀於喪不敬於祭不誠不信太傅之責也古者周公職之天子處位不端受業不敬言語不敘音聲不中進退升降不以禮俯仰周旋不以節此太保之責也古者燕召公職之天子燕業反其學左右之習詭其師益諸侯過大臣不知文雅之辭此少師之責也天子居處出入不以禮衣服冠帶不以制御噐倒側不以度采服從好不以章忿悅不以義與奪不以節此少傅之責也天子居燕私安而易樂而耽飲食不時醉飽不節寢起早晏無常玩好噐弄無制此少保之責也故周禮建外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後樹棘以為位者取其赤心而外刺象以赤心三刺也槐懷也言懷來人於此欲與之謀也羣吏謂府史也州長鄉遂之官三公一命衮若有加賜也不過九命三公八命矣復加一命則服衮龍與王者之後同多於此賜也非命服也虞夏之制天子有日月星辰周禮曰諸公之服自衮冕而下如王之服春秋九命作伯尊公曰宰言於海内無不宰統焉或説司馬主天司徒主人司空主土是為三公韓詩外傳曰故隂陽不和日時不節星辰失度災變非常則責之司馬君臣不正人道不和國多盗賊民怨其上則責之司徒山陵崩弛川谷不通五榖不植草木不茂則責之司空漢初唯有太傅太尉後加置太師太保大司徒大司空哀帝時議以漢舊無司徒故定三公之號曰大司馬大司徒大司空史記曰公孫𢎞以春秋白衣為天子三公漢初因秦置丞相而𢎞為之則丞相為三公矣王莽居攝置四輔官初王莽為左輔甄豐為右弼甄邯為右丞後又制以太師太傅國師國將為四輔位上公大司馬大司徒大司空為三公後漢唯有太傅一人謂之上公及有太尉司徒司空光武初詔司徒司空二府去大無稱爵而無師保董卓盗為太師非漢本制太尉公主天部太常衞尉光祿勲司徒公主人部太僕鴻臚廷尉司空公主地部宗正少府司農而分部九卿漢制三公號稱萬石其俸月各三百五十斛風俗通云三公一歲共食萬石也蓋多以九卿為之若天地災變則皆冊免自太尉徐防始焉後漢本制日食星流及大雨雹等災變者惟免太尉自徐防為大尉凡天地災變三公皆免至魏黄初二年始罷此制漢制三公不與盗賊若領兵入見皆交㦸义頸而前使虎賁執刃夾之也魏武為司空破張繡入覲天子亦行此制汗流洽背自此不復朝覲也朝臣見三公皆拜天子御座即起在輿為下凡拜公天子臨軒六百石以上悉會直事卿贊拜御史授印綬公三讓然後受至安帝時三府任薄選舉誅賞一由尚書其災𤯝變咎則責免公台靈帝臨朝始遣使者就長安拜張温為太尉三公在外自温始也至獻帝建安十三年乃罷三公官魏初復置與後漢同有太傅太尉司徒司空然皆無事不與朝政高柔上疏云今公輔之臣民所具瞻而置之三事不使知政非朝廷崇用大臣之義大臣獻可替否之謂也初封司空崔林為安陽亭侯三公封列侯自林始也林字德儒裴松之曰漢封丞相已為荀悅所譏魏封三公其失同也黄初二年又分三公戸邑封子弟各一人為列侯末年增置太保晉武帝即位之初以安平王孚為太宰鄭冲為太傅王祥為太保義陽王子初為太尉何曽為司徒荀顗為司空石苞為大司馬陳騫為大將軍凡八公同時並置惟無丞相焉時所謂八公同辰攀雲附翼者也遂以太傅太保為上公論道經邦爕理隂陽無其人則闕蓋居者甚寡諸公品第一食俸日五斛太康二年又給絹春百疋秋二百疋綿二百斤元康元年給菜田十頃田騶十人立夏以後不及田者食俸一年又給虎賁二十人特班劍給朝車駕安車黑耳其太尉司徒司空自漢歴魏皆為三公及晉迄於江左相承不改上公三公之制不改前代三公冊拜皆設小㑹所以崇宰輔之制也自魏末廢而不行至晉拜石鑒字林伯為左光祿大夫開府領司徒始有詔令會遂以為常十六國姚泓僣號受經於博士淳于岐岐病泓親省疾拜於床下自是公侯見師傅皆拜宋皆有八公之官而不言為八公也宋志曰三公黄閤前史無有義按禮記士韠與天子同公侯大夫則異鄭元注云士賤與君同不嫌也夫朱門洞啓當陽之正色也三公之與天子禮秩相亞故黄其閤以示謙不敢斥天子宜是漢舊制韠音畢齊時三公唯有太傅梁有丞相太宰太傅太保大司馬大將軍太尉司徒司空開府儀同三司等官諸公及從公開府者亦置官屬陳以丞相太宰太傅太保大司馬大將軍並為贈官三公之制開黄閤㕔事置鴟尾後魏以太師太傅太保謂之三師上公也大司馬大將軍謂之二大太尉司徒司空謂之三公北齊皆有三師二大三公之官並置府其府三門當中門黄閤設内屏三師二大置佐吏則同太尉府後周置六卿之外又改三師官謂之三公兼置三孤以貳之少師少傅少保而以司徒為地官大司馬為夏官司空為冬官如姫周之制無復太尉三師之號宣帝又置四輔官以大冢宰越王盛為大前疑蜀國公尉遲逈為大右弼申國公李穆為犬左輔隋國公楊堅為大後丞隋置三師不主事不置府僚但與天子坐而論道置太尉司徒司空以為三公參議國之大事依北齊置府僚無其人則闕祭祀則太尉亞獻司徒奉俎司空行掃除其位多曠攝行事尋省府僚佐置公則坐於尚書都省朝之衆務總歸於臺閣矣煬帝即位廢三師官唐復置三師以師範一人儀刑四海置三公以經邦論道爕理隂陽祭祀則與隋制同並無其人則闕天寳以前凡三師官雖有其位而無其人太師太傅太保各一人是為三師太尉司徒司空是為三公親王拜者不親事祭祀闕則攝不置官屬五代時多以畀藩鎭及贈官羅紹威太師韓建司徒馬希範張全義安元信並太師馮行襲太傅宋承唐制以太師太傅太保為三師太尉司徒司空為三公為宰相親王使相加官其特拜者不預政事赴上於尚書省凡除授則自司徒遷太保自太傅遷太尉檢校亦如之太尉舊在三師下由唐以來至宋朝加重加以太尉居太傅之上若宰臣官至僕射致仕者以在位久近或已任司空司徒則拜太尉太傅等官若太師則為異數自趙普以開國元勲文彥博以累朝耆德方特拜焉雖太傅王旦司徒吕夷簡各任宰相二十年止以太尉致仕熙寧二年富弼除守司空兼侍中平章事辭司空侍中從之三年曾公亮除守司空檢校太師兼侍中以兩朝定䇿之功辭相位也六年文彥博除守司徒兼侍中九年彥博除守太保兼侍中辭太保從之元豐三年曹佾為檢校太師守司徒兼中書令九月詔檢校官除三公三師外並罷宋朝檢校官一十九三公三師三左僕射至水部員外郎共十三官制行左僕射以下為職事官故罷又以文彥博落兼侍中除守太尉富弼守司徒皆錄定䇿之功也六年彥博守太師致仕八年王安石守司空曹佾守太保元祐元年文彥博落致仕太師平章軍國重事吕公著守司空同平章軍國重事舊制將相皆以階官守三師或三公元豐改官制文彦博常以河東節度使守太師王安石以觀文殿大學士守司空元祐初彦博罷節度使入為平章軍國重事即去守字及公著為司空學士院草制誤存守字是曰三省被㫖貼麻改正崇寧三年蔡京授司空行尚書左僕射大觀元年京為太尉二年為太師政和二年京落致仕依前太師三日一至都堂治事九月詔以太師太傅太保古三公之官今為三師古無此稱合依三代為三公為眞相之任司徒司空周六卿之官太尉秦主兵之任皆非三公並宜罷之仍考周制立三孤少師少傅少保亦稱三少為次相之任至是京始以三公任眞相三公自祖宗以來罕嘗備官獨宣和末三公至十八人三少不計也太師三人蔡京童貫鄭紳太傅四人王黼燕王俣越王偲鄆王楷太保十一人蔡攸肅王樞至儀王㮙渡江後以用兵故秦檜為太師張俊韓世忠為太傅劉光世為太保乾道初楊沂中吴璘並為太傅紹興初史浩為太師嗣秀王為太保蓋自紹興後三公未嘗備官按三公三師官之濫授莫甚於宣和以來所授者皆非其人固不待言而名體尤有未正者蓋鄆王肅王輩為之是以子為師傅也童貫為之是以厮役為師傅也朝野雜記載嘉定初皇子薨討論贈典吏部引元豐故事欲贈太師尚書令而倪正父引王禹玉等議以為皇子以師傅名官於義未安然不知宣和時皇子已有生為師傅者矣舊檢校官十有九元豐官制惟存三師後更定官稱三孤亦置檢校以待節度使之久次者加至檢校少師者文臣則遷開府儀同三司武臣則遷太尉此除授之序也中興以後惟劉光世嘗除檢校至三公後或纔為檢校三孤不必序進徑拜使相若太尉亦有自節度使超進則又不必為檢校官者皆殊恩也按朱熹曰漢初未見孔壁古文尚書中周官一篇説太師傅保為三公但見伏生口授牧誓立政中所説司徒司馬司空遂以為三公而置之豈知諸侯只三卿故止有司徒司馬司空惟天子方有三公三孤六卿立政所紀周是時方為諸侯乃侯國制度周官所紀在成王時所以不同公孤以師道輔君是為加官周公以太師兼冢宰召公以太保兼宗伯是以加官兼相職也後世官職益紊遂以公孤官如加官貼職之𩔖不復有師保之任論道經邦之責矣舊惟文臣有勲徳者除後世或以諸王子或以武臣既曰天子之子與武臣豈可任師保之責邪訛謬相承不復釐正且祖宗法除公孤必建節加檢校太子少保少師之𩔖然後除開府儀同三司然後除公孤南渡如張韓劉岳諸武臣猶如此今建節後或徑除開府至三公三孤矣太師太師古官殷紂時箕子為之周武王時太公成王時周公並為太師周公薨畢公代之秦及漢初並無至平帝元始元年初置以孔光居焉金印紫綬位在太傅上太保次太傅孔光為太師王莽為太傅光常稱疾不敢與太后詔令太師無朝賜靈夀杖黄門令為太師省中坐置几太師入省中坐用杖賜食十七物十七物者公具十七種物也靈壽木名漢東京又廢獻帝初董卓為太師卓誅又廢魏世不置晉初置三公上以景帝諱師故置太宰以代太師之名晉書曰惠帝大安元年以齊王冏為太師當是撰述者之誤也秩增三司蜀李䧺僣號時范長生自西山乘素輿詣成都䧺拜長生為天地太師封西山侯後魏北齊後周隋唐皆有之天寶以前唯以其官贈仲尼及長孫楨武彠竇毅韋元貞張説裴光廷而已彠音憂縳反五代以畀藩鎭及贈官見三公總序宋制見總序自祖宗時太師未嘗並除紹聖初始有文彦博吴榮王顥宣和中蔡京童貫鄭紳靖康初燕王俣越王偲紹興初秦檜張俊紹熙末史浩嗣秀王伯圭建隆至紹熙宰臣生拜太師者五趙普文彦博蔡京秦檜史浩惟蔡秦二人以相臣特拜其他皆還政加恩云親王生拜太師者五人楚王元佐燕王元儼吴王顥燕王俣越王偲皆以父兄行而得之紹熙中嗣秀王伯圭以宗室特拜太師蓋王於光宗為親伯父用優禮也太傅太傅古官傅傅之德義也周成王時畢公為太傅漢高后元年初置太傅金印紫綬初用王陵後省八年復置後省哀帝元壽二年復置位在三公上平帝以孔光為之後漢有太傅上公一人掌以善道無常職光武以卓茂為之薨省明帝又以鄧禹為之鄧禹字仲華以元功拜太傅進見東向又張禹字伯逹遷太傅舍於宫太官進食五日一歸府朝見特賛與三公絶席章帝以趙憙三世在位為國元老乃以為太傅和帝即位㓜弱以鄧彪有高名海内歸仁徴為太傅百官總已以聽之恩寵之異莫與為比其後每帝初即位輙置太傅錄尚書事薨則省胡廣注曰猶古冢宰總已之義桓帝踐祚已加元服不復置傅但令太尉胡廣司徒趙戒領尚書事至靈帝復以陳蕃為太傅與廣參錄尚書事魏初置太傅以鍾繇為之晉宋金章紫綬進賢三梁冠介幘絳朝服佩山元玉梁後魏北齊後周及唐皆有宋制見總序太保太保古官殷太甲時伊尹為太保周成王時召公為太保漢平帝元始元年始用王莽為之光武中興省魏初不置末年始置太保以鄭冲為之冲字文和位在三司上晉武初踐祚以王祥為太保進爵為公加置七官之職太保所以訓䕶人主導以德義者也汝南王亮為太宰錄尚書事與太保衞瓘對掌朝政又衞瓘為太保以公就第置長史司馬從事中郎掾屬也章綬佩服冠秩與太傅同梁後魏北齊後周隋及唐皆有之天寶已前唯以其官贈竇季謀一人而已宋制見總序太宰太宰於殷為六太於周為六卿亦曰冢宰周武王時周公始居之掌建邦之治秦漢魏並不置平帝加王莽號曰宰衡晉初依周禮備置三公三公之職太師居首以景帝名師故置太宰以代之而以安平獻王孚居焉增掾屬十人蓋為太師之互名非周冢宰之任也何曾為太宰朝㑹乘輿入朝劍履上殿如蕭何田千秋鍾繇故事又安帝以太宰瑯琊王徳文不宜攖拂事務以紆論道之重可袞冕之服綠盭綬羽葆盭音戻盭綠也以綠為質盭草名也出瑯琊平昌縣似艾可染綬因以為綬名宋大明中用江夏王義恭為之冠綬服秩悉與太傅同至齊以為贈梁初有之至陳又以為贈有事則權兼之後魏初無至孝莊時以太尉上黨王天穆為之增置佐吏北齊無聞後周文帝又依周禮建六官遂置天官大冢宰卿是掌邦治以建邦之六典佐皇帝治邦國自隋而無宋崇寧時蔡京得政乃言僕臣之賤非宰相所宜稱於是改左僕射為太宰右僕射為少宰靖康末詔宰臣依舊為左右僕射太尉太尉秦官月令曰孟夏太尉賛儁傑自上安下曰尉故武官咸以為號漢因之應劭漢官謂太尉為周官非也鄭𤣥注月令亦曰秦官金印紫綬掌武事漢文三年省景帝三年復置其尊與丞相等丞相衞綰病免上議置丞相太尉藉福説田蚡曰上以將軍為丞相必讓竇嬰嬰為相將軍必為太尉太尉相尊等耳又有讓賢名蚡從之皆如其謀蚡音扶粉反五年又省元狩四年更名大司馬大司馬説在本篇後漢建武二十七年復舊名為太尉公每帝初即位多與太傅同錄尚書事府門無闕論者云王莽以大司馬簒盗神噐故貶其闕掌四方兵事功課歲盡則奏其殿最而行賞罰凡郊祀之事掌亞獻大喪則告諡南郊凡國有大造大疑則與司徒司空通而論之國有過事與二公通諫諍之靈帝末以劉虞為大司馬而太尉如故自此則大司馬與太尉始並置矣劉寵字祖榮遷太尉以日食免又第五倫為會稽太守署鄭𢎞為都郵舉孝廉及𢎞為太尉而倫為司空位在下每朝見𢎞曲躬自卑帝知其故遂置雲母屏風分隔其間由此以為故事又陳蕃拜太尉臨朝嘆曰黄憲若在不敢先佩印綬後坐辟吕非其人䇿罷魏亦有之王祥字休徵為太尉司馬文王進爵為王祥與司徒何曾司空荀顗並詣王顗曰相王尊重今可相率而拜祥曰相國勢位誠為尊貴然要是魏之宰相吾等魏之三公公王相去一階而已班列大同安有天子三公可輙拜人者邪損魏朝之美虧晋王之德君子愛人以禮吾不為也及入何曾荀顗遂拜祥獨長揖文王謂祥曰今日然後知君見顔之重也晉太尉進賢三梁冠介幘絳朝服金章紫綬佩山元玉若郊廟冕服七旒元衣纁裳七章宋制武冠山元玉齊制九旒後魏初與大將軍不並置正光之後亦皆置焉歴代唯後周無其餘皆有悉為三公宋循歴代之制以太尉與司徒司空並為三公政和時罷之復周制以太師太傅太保為三公少師少傅少保為三孤以太尉本秦主兵官定為武階之首正一品在節度使之上建炎三年劉光世始以檢校太保除自後或以檢校三少或以節度使不帯檢校皆徑進太尉則進使相是為除授之序依兩府恩數石林葉氏曰漢高祖元年以蕭何為丞相周苛為御史大夫五年而後始命盧綰為太尉綰王燕後以命周勃尋省蓋自時高祖方自征伐武事不以屬人亦不必設官也文帝元年周勃遷右丞相以薄昭為車騎將軍宋昌為衛將軍而不置太尉蓋自代來未敢以兵權委漢廷舊臣故以其腹心分領之耳自是虛太尉者二十六年七國反景帝以周亞夫擊之始復以亞夫為太尉兵罷亦省又十三年而武帝以命田蚡一年復省又二十一年乃以大將軍衞青驃騎將軍霍去病為大司馬各冠其將軍即太尉也蓋方有四夷之功故爾自去病青死又十九年而霍光以奉車都尉為大司馬大將軍以此考之太尉官自高祖以來有事則置無事則省不以為常也蓋漢雖設太尉總兵而左右前後及因事置名以為將軍者不一豈固不欲以兵權屬一官邪觀高祖命盧綰武帝命衞霍非親即舊其意可知矣司徒司徒古官少皥祝鳩氏為司徒司主也徒衆也堯時舜為司徒舜攝帝位命卨為司徒卨元孫之子曰微亦為夏司徒周時司徒為地官掌邦教毛詩緇衣篇美鄭武公也父子相繼為周司徒能善於其職秦置丞相省司徒漢初因之哀帝元壽二年罷丞相置大司徒後漢大司徒主徒衆教以禮義凡國有大疑大事與太尉同蔡質漢儀曰司徒府與蒼龍闕對厭於尊者不敢號府應劭曰此不然丞相舊位在長安時有四出門隨時聽事明帝東京本欲依之廹於太尉司空但為東西門耳每國有大議天子車駕親幸其府建武二十七年去大為司徒公鄧禹為大司徒封侯年二十四靈帝賣官廷尉崔烈入錢五百萬以買司徒其拜日天子亦臨軒時人謂烈為銅臭建安末為相國魏黄初元年改為司徒華歆字子魚為司徒家無擔石之儲詔曰司徒國之儁老今大官重膳而司徒蔬食甚無謂也特賜歆及妻男等衣服晉司徒與丞相通職更置迭廢未嘗並立永嘉元年始兩置焉王衍為司徒東海王越為丞相始兩置也陳壽為司徒仰理萬幾俯澄邦教又王戎字濬沖為司徒高選長史西曹掾委任責成常得無為又蔡謨字道明遷司徒謨固讓曰若我作司徒將為後世哂義不敢拜詔數十下謨表章十餘上陳以疾篤帝臨軒自旦至申而徵不至公卿以蔡公傲無人臣之禮奏送謨廷尉謨率子弟詣闕稽顙詔免為庶人謨每歎曰若使劉王喬得南渡司徒之美選也王喬名疇少有重名宋制司徒金章紫綬進賢三梁冠佩山元玉掌治民事郊祀則省牲視滌濯大喪安梓宫凡四方功課歲盡則奏其殿最而行賞罰亦與丞相並置齊司徒之府領天下州郡名數户口簿籍梁罷丞相置司徒歴代皆有至後周以司徒為地官謂之大司徒卿掌邦教職如周禮隋及唐復為三公宋仍唐制政和二年罷詳見總序司空司空古官孔安國曰司空主穿土以居人空穴也古者穿土為穴以居人少皥鳲鳩氏為司空舜攝帝位以禹為司空周禮正義曰禹自司空總百揆乃分司空之職為共工虞書曰垂作共工益作朕虞是也卨元孫之子曰冥亦為夏司空殷湯以咎單為司空周禮司空為冬官掌邦事秦無司空置御史大夫漢初因之至成帝綏和元年始更名御史大夫曰大司空初改為司空議者又以縣道官有獄司空故復加為大司空亦所以别小大之文也金印紫綬禄比丞相建平二年復為御史大夫元壽二年復為大司空何武字君卿為司空事後母不篤詔冊免之又彭宣字子佩為大司空而王莽為大司馬專權宣上書曰三公鼎足承君一足不任則覆亂矣臣老病願上印綬後漢初為大司空建武二十七年去大為司空公第五倫字伯魚為司空奉公不撓言議果决以貞白稱又張敏字伯逹為司空行大射禮陪位頓仆冊免又陳寵為司空府故事督属籍不通賓客以防交關寵去籍通客以明無所不受論者大之荀氏家傳曰荀爽字慈明董卓秉政徵之起巖穴九十五日而為司空時號為白衣登三公凡營城起邑復溝洫修墳防之事則議其利建其功四方水土功課歳課歳盡則奏其殿最而行賞罰凡國有大造大疑諫諍與太尉同獻帝建安十三年又罷司空置御史大夫郄慮免不復補荀綽百官志曰獻帝置御史大夫職如司空不領侍御史魏初又置司空冠綬及郊廟之服與太尉同鄭袤字林叔為司空天子臨軒遣就第拜授袤謂使曰魏以徐景山為司空徐公曰三公上應天心茍非其人實傷和氣固辭見許袤莫候反宋制進賢三梁冠佩山元玉掌治水土祠祀掌掃除樂器大喪掌將校復土歴代皆有之至後周為冬官謂之大司空卿掌邦事以五材九範之徒佐皇帝富邦國大祭祀行洒掃廟社四望則奉豕牲隋及唐復為三公天寶十三載冊拜楊國忠為司空其日雨土宋仍唐制政和二年罷大司馬大司馬古官也掌武事司主也馬武也少皥有鴡鳩氏為司馬鴡音雎堯時棄為后稷兼掌司馬周官司馬為夏官掌邦政項羽以曹咎周殷並為大司馬楚大司馬景舍帥軍伐蔡蔡侯奉社稷而歸之楚發其賞舍辭曰發誠布令而敵退是王威也相攻而敵退是將威也戰而敵退是衆威也臣不宜以衆威受賞又司馬穰苴本姓田齊威王以古司馬法而附穰苴因號為司馬穰苴漢初不置武帝元狩四年初罷太尉置大司馬以冠將軍之號冠者加於其上為一官也霍光以大司馬大將軍輔政武帝又令大將軍驃騎將軍皆有大司馬之號宣帝地節三年置大司馬不冠將軍亦無印綬官屬霍禹為大司馬冠小冠無印綬成帝綏和元年初賜大司馬金印紫綬置官属祿比丞相去將軍哀帝建平二年復去大司馬印綬官屬將軍如故元壽二年復賜大司馬印綬置官屬去將軍位在司徒上漢律丞相大司馬大將軍俸錢月六萬始置時議者以漢有軍候千人司馬官故加大王莽居攝以漢乃無小司徒而定司馬司空之號並加大後漢光武建武二十七年省大司馬以太尉代之故常與太尉迭置不並列吴漢為大司馬封舞陽侯至靈帝末始置焉魏文帝黄初二年復置大司馬以曹仁居之而太尉如故則太尉大司馬大將軍各自為官位在三司上吴有左右大司馬晉定令亦在三司上晉諸公賛曰義陽王為太尉大司馬時父子為太宰父子居上公中代以來未之有也又汝南王亮為大司馬正旦大會乘車入殿又陳騫為大司馬賜袞冕之服武冠絳朝服金章紫綬佩山元玉與大將軍同宋時唯元嘉中用彭城王義康為之冠玉與晉同至齊以為贈梁時置官屬陳以為贈後魏北齊與大將軍為二大位居三師之下三公之上後周為夏官謂之大司馬卿掌邦政以建邦國之九法佐皇帝平邦國大祭祀掌其宿衞廟社則奉羊牲自隋而無三孤周成王立少師少傅少保曰三孤貳公𢎞化寅亮天地弼予一人注孤特也言其卑於公尊於卿周禮孤卿特揖其位東面乗夏篆謂五采畵轂服希冕執皮帛又公之孤四命注九命上公得置孤一人春秋時隨楚皆有少師秦漢而下省後周置三孤以貳三公宋沿唐制置三師以太尉司徒司空為三公至徽宗政和二年詔司徒司空周六卿之官非三公之任乃今之六曹尚書是也太尉秦官居主兵之任亦非三公太尉司徒司空並罷依周制立三孤之官乃次輔之任或稱三少為次相之任餘見三公總序總叙三公三師以下官屬三師太師太傅太保歴代多有之一太殷建官有六太其一曰太宰自周以後亦常有之餘五太則無三公太尉司徒司空歴代有之二大大司馬大將軍歴代亦有之諸位從公諸將軍及光祿大夫開府者歴代亦時有之官屬等歴代有置有省亦多同説所以不更各具本府但依時代都言之其大將軍自具本篇漢有三師而不見官屬以丞相為公置司直長史後改丞相為司徒則曰司徒司直長史具宰相篇其太尉後改為大司馬綏和初始置長史一人掾属二十四人御屬一人令史二十四人改御史大夫為大司空置長史加中丞具御史大夫篇後漢初唯置太傅有長史一人掾屬十人御屬一人不知何曹後置太師董卓嘗居之蓋自為也而不見官屬太尉屬官有長史一人署諸曹事盧植禮注曰如周小宰掾吏屬二十四人分主二千石長史遷除遷民户祠祀農桑奏議詞訟郵驛轉運盗賊罪法兵貨幣鹽鐡倉榖等事黄閤主簿省錄衆事掌閤下威儀記室令史掌上章表報後漢末陳琳阮瑀皆為曹公記室軍國書檄皆所作御屬掌為公卿閤下威儀司徒屬官有長史一人掾屬三十一人令史及御屬三十六人正曰掾副曰史陳寵辟司徒鮑昱府是時三府掾屬專尚交遊以不肯親事為高寵獨勤心物務轉為辭曹專掌天下獄訟時司徒辭訟久者數十年事𩔖溷錯易為輕重寵為昱􅁧辭訟比七卷決事科條皆以事相從昱奏上之其後公府奉以為法司空屬官長史一人掾屬二十九人令史及御屬三十二人正曰掾副曰屬漢書注云公府掾比古元士三命者也或曰漢初掾史辟皆上言之故有秩皆比命士其所不言則為百石屬其後皆自辟除故通為百石云其大司馬屬官並同前漢魏置太傅太保而不見官屬太尉司徒司空有長史司馬從事中郎正行參軍大司馬亦有正行參軍也晉有太宰太傅太保唯楊駿為太傅增祭酒為四人掾屬二十人兵曹為左右也楊駿輔政引潘岳為太傅主簿太宰太保官屬不見太尉司徒司空並有長史司馬太尉雖不加兵者吏屬皆絳服泰初三年又置太尉軍參軍六人騎司馬五人官騎十人而司徒加置左長史長差次九品銓衡人倫冠綬與丞相長史同主簿左右東西曹掾各一人若有所循行者增置掾屬十人武帝時司徒奏州郡農桑未有賞罰之制宜遣掾屬循行詔遂使司徒督察州郡播殖若有所循者增掾屬十人又温嶠請司徒置田曹屬州一人勸課農桑初王渾字元中遷司徒仍加兵渾以司徒文官主吏不持兵及吏屬絳衣自以非是舊典皆令皂服論者美其謙而識理司空府加置導橋掾一人餘畧同後漢咸寧初詔以前太尉府為大司馬府增置祭酒二人帳下司馬官騎大車鼓吹左右光祿光祿三大夫開府者皆為位從公品秩俸賜儀制與諸公同加兵者増置司馬一人從事中郎二人劉琨為司空以盧諶為從事中郎主簿記室督各一人舍人四人兵鎧士曹營軍刺姦帳下都督外都督令史各一人主簿以下令史以上皆絳服司馬給吏卒如長史從事中郎給侍二人主簿記室都督各給侍一人其餘臨時增崇者則褒加各因其時為節文不為定制其祭酒掾屬白蓋小車七軺車施耳後户皂輪犢車各一乗自祭酒以下令史以上皆皂零辟朝服其為持節都督者增參軍為六人其餘如常加兵公制孫楚字子荆為左著作郎參石苞驃騎軍事楚既負其才氣頗侮易苞初至揖曰天子命我參卿軍事初參軍不敬府主楚既輕苞遂制施敬自楚始也宋有太傅太保太宰太尉司徒司空大司馬諸府皆有長史一人將軍一人又各置司馬一人而太傅不置長史掾屬亦與後漢畧同自江左以來諸公置長史倉曹屬東西閤祭酒各一人主簿舍人二人御屬二人令史無定員領兵者置司馬一人從事中郎二人參軍無定員加崇者置左右長史司馬從事中郎四人掾屬四人則倉曹增置屬户曹置掾加崇極於此也其司徒府若無公唯省舍人其府常置其職僚異於餘府有左右長史東西曹掾屬餘則同矣餘府有公即置無則省齊有太宰大司馬並為贈官無僚屬太尉司徒司空是為三公特進位從公諸開府儀同三司位從公開府儀同如公凡公督府置位長史司馬一人諮議參軍二人諸曹有錄事功曹記室户曹倉曹中直兵外兵騎兵長流賊曹城局法曹田曹水曹鎧曹集曹右户十八曹局曹以上署正參軍法曹以下署行參軍各一人其行參軍無署者為兼員其公府佐吏則從事中郎二人倉曹掾户曹屬東西閤祭酒各一人主簿舍人御屬二人加崇者則左右長史四中郎掾屬並增數其未及開府則置亦有佐吏其數有減小府無長流置禁防參軍初晉令公府長史著朝服自宋大明以來著朱衣齊王儉為司徒左長史請依晉令復舊制不著朱衣時議不許又曰王秀之常云位至司徒左長史可以知止足矣又陸慧曉為司徒右長史謝朏為左長史府公竟陵王子良謂王融曰我府二上佐前代誰可比融曰兩賢同侍未有前例梁武受命之初官班多同宋齊之舊有丞相太宰太傅太保大司馬太尉司徒司空開府儀同三司等官諸公及位從公開府者置官屬有長史司馬諮議參軍掾屬從事中郎記室建安王為雍州表求管記以江革為征北記室參軍革弟觀又為參軍兼記室任昉曰文房之任總卿兄弟故歴代皆為文士之華選云主簿列曹參軍行參軍舍人等官其司徒則有左右二長史褚球字仲寶為司徒左長史加貂台佐加貂自球始也又增置左西掾一人自餘僚佐同於二府有公則置無則省而司徒無公唯省舍人餘官常置開府儀同三司位次三公左右光祿大夫優者則加之曰三公置官屬陳三師二大並為贈官而無僚屬其三公有府長史司馬諮議參軍從事中郎掾曹屬主簿祭酒錄事記室正參軍板參軍後魏三師無官屬後又置太宰以元天穆為之增置佐吏三公及二大並有長史司馬諮議參軍從事中郎掾屬主簿錄事參軍功曹記室戸曹中兵等參軍諸曹行參軍祭酒參軍事長兼行參軍督䕶其太尉司徒與二大屬官階同唯司空府官毎降一階北齊三師二大三公各置長史司馬諮議參軍從事中郎掾屬主簿錄事功曹記室户曹倉曹中兵騎兵長流城局刑獄等參軍事東西閤祭酒及參軍事法墨田水鎧集士等曹行參軍督䕶等員司徒則加左右長史長史主吏司馬主將舍人主閤内事皆自秦官也從事中郎從事中郎漢末官也陳湯為大將軍王鳯從事中郎在主簿上所掌秩與長史同掾屬主諸曹事主簿所主與舍人同祭酒所主亦同令史主諸曹文書此皆自漢官也陳湯為大將軍王鳯從事中郎是也御屬參軍自後漢孫堅參驃騎軍事是也參軍所主與掾屬同其儀同三司如開府者亦置長史以下官屬而減記室倉城屬田水鎧士等七曹各一人其品亦下三公府一階其三師二大佐吏則同太尉府也後周以太師太傅太保為三公而不見僚屬隋三師亦不見官屬而三公依北齊置府僚後省府及僚佐置公則坐於尚書都省朝之衆務總歸於臺閣唐三師三公並無官屬宋亦如之文獻通考卷四十八
