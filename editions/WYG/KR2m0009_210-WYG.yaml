body:
  text: 文獻通考卷二百十鄱陽馬端臨貴與著經籍考三十七子儒家周子通書一卷太極圗說一卷朱子序曰通書者濓溪夫子之所作也夫子自少即以學行有聞於世而莫或知其師傳之所自獨以河南兩程夫子嘗受學焉而得孔孟不傳之正統則其淵源固可槩見然所以指夫仲尼顔子之樂而發其吟風弄月之趣者亦不可得而悉聞矣所著之書又多放失獨此一篇本號易通與太極圖說並出程氏以傳於世而其為說實相表裏大抵推一理二氣五行之分合以紀綱道體之精微決道義文辭禄利之取舍以振起俗學之卑陋至論所以入德之方經世之具又皆親切簡要不為空言顧其宏綱大用既非秦漢以來諸儒所及而其條理之宻意味之深又非今世學者所能驟而窺也是以程子既没而傳者鮮焉其知之者不過以為用意高遠而已又曰通書文雖高簡而體實淵慤且其所論不出乎陰陽變化修已治人之事未嘗遽談無物之先文字之外也周子留下太極圗若無通書却教人如何曉得故太極圗得通書而始明朱子既為太極圖說則録以寄廣漢張敬夫以書來曰先生所與門人講論問答之言見於書者詳矣其於西銘蓋屡言之至此圖則未嘗一言及也謂其必有微意是則固然然所謂微意者果何謂邪熹竊以為此圖立象盡意剖析幽微周子蓋不得已而作也觀其手授之意蓋以為惟程子為能當之至程子而不言則疑其未有能受之者爾夫既未能黙識於言意之表則馳心空妙入耳出口其弊必有不勝言者鼂氏曰茂叔師事鶴林寺僧壽涯以其學傳二程遂大顯於世此其所著書也濓溪遺文遺事一卷陳氏曰侍講朱熹集次於南康正䝉書十卷鼂氏曰皇朝張載子厚撰張舜民嘗乞追贈載於朝云横渠先生張載著書萬餘言名曰正䝉陰陽變化之端仁義道德之理死生性命之分治亂國家之經罔不䆒通方之前人其孟軻掦雄之流乎此書是也初無篇次其後門人蘇昞等區别成十七篇又為前後序又有胡安國所傳編為一卷末有行狀一卷藍田吕氏曰先生晩自崇文移疾西歸終日危坐一室左右簡編俯而讀仰而思有得則識之或中夜起坐取燭以書其志道精思未始須臾息亦未嘗須臾忘也熈寜九年秋集所立言謂之正䝉出示門人曰此書予歴年致思之所得其言殆與前聖合大要發端示人而已其觸𩔖廣之則吾將有待於學者朱子語録曰正䝉有差分曉底㸔或問正䝉中說得有病處還是他命辭不出有差還是見得差曰他是見得差如曰繼之者善也方是善惡混云云成之者性是到得聖人處方是成得性所以說知禮成性而道義出似這處都見差了西銘集解一卷陳氏曰張載作訂頑砭愚二銘後更曰東西銘其西銘即訂頑也大抵發理一分殊之㫖有趙師俠者集吕大臨胡安國張九成朱熹四家說為一篇刻之興化軍又有户部侍郎王夢龍集通書西銘解為三卷龜山楊氏曰西銘理一而分殊知其理一所以為仁知其分殊所以為義所謂分殊猶孟子言親親而仁民仁民而愛物其分不同故所施不能無差等耳或曰如是則體用果離而為二矣曰用未嘗離體也以人觀之四支百骸具於一身者體至其用處則首不可以加屨足不可以納冠蓋即體而言分已在其中矣程氏遺書二十五卷附録一卷外書十三卷陳氏曰朱熹集録二程門人李籲端伯而下諸家所聞見問答之語附録行狀哀詞祭文之屬八篇其年譜朱公所撰述也外書則又二十五篇之所遺者朱子答張敬夫書曰明道之言發明極致通透灑落善開發人伊川之言即事明理質慤精深尤耐咀嚼然明道之言一見便好久㸔愈好所以賢愚皆獲其益伊川之書乍㸔未好久㸔方好故非久於玩索者不能知其味又答吕伯恭書曰遺書節本已寫出愚意所刪去者亦須用草紙抄出逐叚畧注刪去之意方見不草草處若只暗地刪却久遠却惑人記論語者只為不曽如此留下家語至今作病痛也河南師説十卷陳氏曰尚書潁川韓元吉無咎以河南雅言伊川雜説及諸家語錄釐為十卷以尹和靖所編為卷首不如遺書之詳訂也皇極經世書十二卷鼂氏曰皇朝邵雍堯夫撰雍隐居博學尤精於易世謂其能窮作易之本原前知来物其始學之時睡不施枕者三十年此書以元經㑹以㑹經運以運經世起於堯即位之二十二年甲辰終於周顯徳六年己未編年紀興亡治亂之事以符其學又有觀物萹繫於後其子伯温解陳氏曰其學出於李之才挺之之才受之穆修伯長修受之种放明逸放受之陳摶蓋数學也曰元㑹運世以元經㑹以運經世自帝堯至於五代天下離合治亂興廢得失邪正之迹以人事而驗天時以陰陽剛柔窮聲音律吕以窮萬物之数末二卷論所以為書之意窮日月星辰飛走動植之数以盡天地萬物之理述皇帝王覇之事以明大中至正之道書謂之皇極經世篇謂之觀物凡六十二篇其子伯温為之叙系具載先天後天變卦反對諸圗又為易學辯惑一篇叙傳授本末真偽然世之能明其學者蓋鮮焉朱子語録曰康節其初想只是㸔得太極生兩儀兩儀生四象心只管在上面轉久之便透想得一舉眼便成四片其法四之外又有四焉凡物才過到二之半時便煩惱了蓋已漸趨之於衰也謂如見花方蓓蕾則知其將盛既開則知其將衰其理不過如此謂如今日戌時從此推上去至未有天地之始從此推下去至人物消盡之時蓋理在数内数在理内康節是他見得一箇盛衰消長之理故能知之若只說他知得甚事如歐陽叔弼定諡之𩔖此知康節之淺陋者也程先生有一柬說先天圗甚有理可試徃聴他說㸔觀其意甚不把當事然自有易以來只有康節說一箇物事如此齊整如揚子雲太元便零星補凑得可笑若不補又却欠四分之一補得來又却多四分之三如潛虚之数用五只似如今算位一般其直一畫則五也下横一畫則為六横二畫則為七蓋亦補湊之書也又曰易是卜筮之書皇極經世是推歩之書經世以十二辟卦管十二㑹綳定時節却就中推吉凶消長堯時正是乾卦九五其書與易自不相干只是加一倍推將去問伯温解經世書如何先生曰他也只是說將去那裏面精微曲折也未必曉得當時康節只說與王某不曽說與伯温又曰康節之學骨髓在皇極經世其花草便是詩觀物外篇六卷鼂氏曰右邵雍之没門人記其平生之言合二卷雖以次筆授不能無小失然足以發明成書為多故以外篇名之或分為六卷陳氏曰康節門人太常寺簿張崏子望記其言雖十纔一二而足以發明成書觀物内篇二卷陳氏曰康節之子右奉直大夫伯溫撰即經世書之第十一十二卷也張氏曰先生觀物有内外篇内篇先生所著之書也外篇門人所記先生之言也内篇理深而数畧外篇数詳而理顯學先天者當自外篇始先生詩云若無揚子天人學安有莊周内外篇以此知外篇亦先生之文門人蓋編集之耳又曰皇極經世者康節之易先天之說也觀物篇立言廣大措意精㣲如繫辭然稽之以理既無不通參之以数亦無不合漁樵問對一卷鼂氏曰皇朝邵雍撰設為問答以論陰陽化育之端性命道德之奧云邵氏言其祖之書也當考程氏雜說十卷鼂氏曰皇朝程頥正叔門人雜記其師之言信聞紀一卷經學理窟一卷鼂氏曰皇朝張載撰雜記經傳之義辯釋老之失近思録十四卷陳氏曰朱熹吕祖謙取周程氏之書關於大體而切於日用者六百十九條取切問近思之義以教後學趙氏跋曰朱子吕子相與講明伊洛之學取其言之簡而要者集為是書要使學者知所趨向譬如洛居天下之中行者四面而至茍不惑其塗路則千里雖逺行無不至矣然其間亦有平居師友相問答之際盡意傾吐義已切至而語不暇擇者學者得其意玩其辭可也不然徒高逺其言詭異其行俾世之人咸共指目曰道學云云者則甚非朱吕所以為書之意也答邇英聖問一卷兩朝國史志慶歴四年三月仁宗於邇英閣出御書十有三軸凡三十五事一曰遵祖宗之訓二曰奉真考之業三曰念祖宗艱難四曰思祖宗愛民五曰守信義六曰不巧詐七曰親碩學八曰精六藝九曰慎言語十曰待耆老十一曰崇静退十二曰求忠正十三曰懼貴驕十四曰招勇將十五曰尚儒術十六曰議釋老十七曰重良臣十八曰廣視聼十九曰功無迹二十曰戒喜怒二十一曰明巧媚二十二曰杜希㫖二十三曰從民欲二十四曰慎滿盈二十五曰傷暴露兵二十六曰哀鰥寡二十七曰訪屠釣二十八曰講逺圗二十九曰絶朋比三十曰斥諂佞三十一曰察小忠三十二曰鑒迎合三十三曰罪已為民三十四曰損躬撫軍三十五曰求善補過又出危竿諭一篇述居高慎危之意顧丁度等曰朕觀書之暇取臣僚上言及進對事目可施於政治者書以分賜卿等度暨曽公亮楊安國王洙等既拜賜因請注釋其義是月丁度等上答邇英聖問一卷上覽之終篇指其中體大者六事付中書樞宻院令奉行之答聖問者即所釋前所賜三十五事也帝學十卷鼂氏曰皇朝范祖禹淳夫纂自古賢君迨於祖宗務學事迹為一篇以勸講淳夫元祐時在講筵八年詰旦當講前一夕正衣冠儼然如在上前命子弟侍坐先按講其說平時語若不出諸口及當講開列古議仍參之時事以為勸戒其音琅然聞者興起東坡常曰淳夫講書言簡義明粲然成文章為今講官第一陳氏曰其所編集上自三皇五帝迄於本朝神宗凡聖學事實皆具焉儒言一卷鼂氏曰從父詹事公撰其書蓋辯正王安石之學違僻者元城語録三卷陳氏曰右朝散郎維揚馬永卿大年撰永卿初仕亳州永城主簿從寓公劉安世器之學記其所聞之語劉先生談録一卷陳氏曰知秀州韓瓘德全撰瓘億之曾孫緬之孫官二浙道睢陽徃來必見劉元城記其所談二十一則道䕶録一卷陳氏曰胡珵德輝所録劉元城語凡十九則以上三書皆刻章貢末又有邵伯温吕本中所記数事附焉節孝先生語一卷陳氏曰江端禮季恭所録山陽徐積仲車語龜山語録五卷陳氏曰延平陳淵㡬叟羅從彦仲素建安胡大原伯逄所録楊時中立語及其子迥藁録共四卷末卷為附録墓誌遺事順昌廖德明子晦所集也庭闈槀録一卷陳氏曰即楊迥所録當政和八年其父亡恙時也龜山别録二卷陳氏曰不知何人所録尹和靖語録四卷陳氏曰馮忠恕祈寛居之吕堅中崇實所録尹焞彦明語胡氏傳家録五卷陳氏曰曽㡬吉父徐時動舜鄰楊訓子中所記胡安國康侯問答之語及其子寜和仲所録家庭之訓無垢語録十四卷言行編遺文共一卷陳氏曰張九成子韶之甥于恕所編心傳録及其門人郎曄所記日新録近時徐鹿卿德夫教授南安復裒其言行繫以嵗月及遺文三十篇附於末師友雜志一卷雜說一卷陳氏曰吕本中撰胡子知言一卷陳氏曰五峯胡宏仁仲撰文定季子南軒從之逰朱子語録有曰因與諸子論湖湘學者崇尚胡子知言曰知言固有好處然亦大有差失如論性却曰不可以善惡辯不可以是非分既無善惡又無是非則是告子湍水之說爾如曰好惡性也君子好惡以道小人好惡以已則是以好惡說性而道在性外矣不知此理却從何而出問所謂探視聴言動無息之際可以㑹情此猶告子生之謂性之意否曰此語亦有病下文謂道義明著孰知其為此心物欲引誘孰知其為人欲便以道義對物欲却似性中本無道義逐旋於此處攙入兩端則是性亦不可以善言矣如曰性也者天地鬼神之奧也善不足以名之况惡乎孟子說性善云者歎羙之辭不與惡對其所謂天地鬼神之奥言語亦太故誇逞某嘗謂聖賢言語自是平易如孟子尚自有些險處孔子則直是平實東萊云知言勝似正䝉先生曰蓋後出者巧也忘筌書一卷陳氏曰浦城潘植子醇撰多言易亦渉異端凡五十一篇此書載鳴道集為九十二篇附見者又十有三而館閣書目又稱七十七篇皆未詳諸儒鳴道集七十二卷陳氏曰不知何人所集洓水濓溪明道伊川横渠元城上蔡無垢以及江民表劉子翬潘子醇凡十一家其去取不可曉兼山遺學六卷陳氏曰河南郭雍録其父忠孝之遺書前二卷為易蓍卦次為九圖又次說春秋又次為性說三篇末卷問答雜說忠孝父子世系出處本末次詳見易𩔖玉泉講學一卷陳氏曰沙隨程迥可久所記喻樗子才語樗本末見語孟𩔖周簡惠聖傳録一卷陳氏曰參政荆溪周葵惇義撰自堯舜至孔孟聖傳正統為絶句詩二十章而各著其說自為一家然無高論南軒語録十二卷陳氏曰蔣邁所記張栻敬夫語睎顔録一卷陳氏曰張栻取經傳中凡言及顔子者録為一編晦庵語録四十六卷陳氏曰著作佐郎陵陽李道傳貫之裒晦翁門人廖德明子晦而下三十二家刻之九江晦庵續録四十六卷陳氏曰李太史之弟樞密性傳成之又得黄幹直卿而下四十一家及前録所無者併刻之吕氏讀書記七卷陳氏曰吕祖謙撰乾道癸巳淳熈乙未家居日閲之書隨意手筆或数字或全篇蓋偶有所感發或以備遺忘者閫範十卷陳氏曰吕祖謙撰集經史子傳發明人倫之道見於父子兄弟之間者為一篇時教授嚴州張南軒守郡實為之序先聖大訓六卷陳氏曰龍圗閣學士慈溪楊簡敬仲撰取禮記家語左傳國語而下諸書凡稱孔子之言皆𩔖為此編然聖人之㫖意未易識也喪欲速貧死欲速朽自門弟子已不能知其有為而言況於百氏所記其間淺陋依托可勝道哉多聞闕疑庻乎其弗畔也已易一卷陳氏曰楊簡撰慈湖遺書三卷陳氏曰楊簡撰前二卷雜說末一卷遺文慈湖之學專主乎心之精神是謂聖一語其誨人惟欲發明本心而有所覺然稱學者之覺亦頗輕於印可蓋其用功偏於上逹受人之欺而不疑竊嘗謂誠明一理焉有誠而不明者乎當淳熈中象山陸九淵之學盛行於江西朱侍講不然之朱公於前輩不肯張無垢於同流不肯陸象山為其本原未純故也象山之後一傳而慈湖遂如此甚矣道之不明賢者過之也明倫集十卷陳氏曰高安塗近止撰取經傳言行之要以孝為本推而廣之為十篇塗有子登科得初品官致仕心經法語一卷陳氏曰參知政事建安真德秀希元撰集聖賢論心格言三先生諡議一卷陳氏曰嘉定中魏了翁華父為潼川憲奏請賜周程諡寳慶守李大謙集而刻之併及諸郡祠堂記文言子三卷陳氏曰言偃吳人相傳所居在常熟縣慶元間邑宰孫應時季和始為立祠求朱晦翁為記近新昌王爚伯晦復裒論語書所載問答為此書邑中至今有言氏亦買田教飬之文獻通考卷二百十
