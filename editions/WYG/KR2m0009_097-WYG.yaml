body:
  text: 文獻通考卷九十七鄱陽馬端臨貴與著宗廟考七祭祀時享漢惠帝時叔孫通曰古者有春嘗果方今櫻桃熟可獻遂獻宗廟諸果之獻由此興孝景帝元年詔高廟酎張晏曰正月旦作酒八月成名曰酎酎之言純也至武帝時因八月嘗酎㑹諸侯廟中出金助祭所謂酎金也師古曰酎三重釀醇酒也故以薦宗廟酎直救反奏武徳文始五行之舞孟康曰武徳高祖所作也文始舜舞也五行周舞也武徳者其舞人執干戚文始舞執羽籥五行舞冠冕衣服法五行色見禮樂志孝惠廟酎奏文始五行之舞爲孝文廟爲昭徳之舞武帝元鼎五年九月列侯坐獻黄金酎祭宗廟不如法奪爵者百六人如淳曰漢儀注諸侯王歲以户口酎黄金於漢廟皇帝臨受獻金全少少不如斤兩色惡王削縣侯免國宣帝本始二年尊孝武廟爲世宗廟奏盛徳文始五行之舞漢時宗廟在郡國者六十八合百六十七所六十八者郡國之數百六十七者宗廟之數而京師自高祖至宣帝與太上皇悼皇考各自居陵旁立廟并爲百七十六又園中各有寢便殿日祭於寢月祭於廟時祭於便殿寢日四上食廟歲二十五祠如淳曰月祭朔望加臘爲二十五晋灼曰漢儀注宗廟一歲十二祠五月嘗麥六月七月三伏立秋貙婁又嘗粢八月先夕饋飱皆一太牢酎祭用九太牢十月嘗稻又飲烝二太牢十一月嘗十二月臘二太牢又每月一太牢如閏加一祀與此上十二爲二十五祠師古曰晉說是也便殿歲四祠又月一游衣冠而昭靈后武哀王昭哀后孝文太后孝昭太后衞思后戾太子戾后各有寢園與諸帝合凡三十所一歲祠上食二萬四千四百五十五用衛士四萬五千一百二十九人祝宰樂人萬二千一百四十七人養犧牲卒不在數中至元帝時貢禹奏言古者天子七廟今孝惠孝景廟皆親盡宜毁又郡國廟不應古禮宜正定天子是其議未及施行而禹卒永光四年乃下詔罷郡國廟詳見宗廟門旣罷郡國廟議者又以爲清廟之詩言交神之禮無不清靜今衣冠出游有車騎之衆風雨之氣非所謂清靜也祭不欲數數則瀆瀆則不敬宜復古禮四時祭於廟諸寝園日月間祀皆可勿復修上亦不改也漢舊儀宗廟八月飲酎用九太牢皇帝侍祠寢廟月一太牢四上食十二月一太牢餽食與閏月十三嘗祠正月嘗薤又嘗羔六月嘗黍七月歲事八月嘗酎特牛九月嘗鴈十月嘗稻十一月歲事又賽禱凡正祠一歲二十二原廟一歲十二祠有閏加一祠皆用太牢月游衣冠以廟餽事之日歲凡十二祠立秋貙婁又嘗麻八月先夕餽飱皆一太牢皇帝㑹諸侯酎金廟中以上計儀設九賓陪位他祠無有十月嘗稻又飲烝二太牢十一月嘗文臧未詳十二月臘二太牢十二月撃牛飲酌無飯故先夕餽飱文帝所加以正月日作酒八月成名曰酎酒園廟一歲四祠皆太牢七月歲事十二月歲事臘以亥日初歲椒酒凡四祠皆太牢凡一嵗太祠五十二小祠千一百八月酎車駕夕牲牛以繡衣之皇帝暮親牲以鑑遂取水於月以火燧取火於日爲明水火左袒以水沃牛右肩手執鸞刀以切牛毛血薦之而卽更衣中侍上熟行禮齋日四法食丈二尺拒按以陳三十六肉六氣榖飯贊饗一人秩六百石主贊天子太祝令主薦酒太宰令主饌陳太常主導贊丞舉廟中非法八月諸侯王酎金助祭以九太牢用豚八百枚鉶羮三百雞鳬鴈魚皆千枚賜中都官吏卒以下廟旁牛四十頭助供樂用三千四百二十八人祠立九旗於庭下功臣四十人食堂下西階南凡上堂上後房中婦子祠用禾稄長八尺廣八寸深四寸凡八十一祭御僕媵公祭於廟門外塾上用壺酒四脛骨藥西廂歌秦海龜龍舞武德文始五行永光四年御史大夫貢禹奏罷祖宗皇后位座獨祭皇帝而已漢興叔孫通因秦樂人制宗廟樂太祝迎神於廟門奏嘉至李奇曰嘉善也善神之至猶古降神之樂也皇帝入廟門奏永至以爲行歩之節猶古采齊肆夏也乾豆上奏登歌乾豆脯羞之屬獨上歌不以筦絃亂人聲欲在位者徧聞之猶古清廟之歌也豋歌再終下奏休成之樂服䖍曰叔孫通所奏作也美神明旣享也皇帝就酒東廂坐定美禮已成也又有房中祠樂高祖唐山夫人所作也高帝姬也姓唐山周有房中樂至秦名曰壽人凡樂樂其所生禮不忘本高祖樂楚聲故房中樂楚聲也至孝惠二年使樂府令夏侯寛備其簫筦更名曰安世樂安世房中歌十七章大孝備矣一章八句七始華始一章八句我定歴數一章八句王侯秉德一章七句海内有姦一章八句大海蕩蕩三章六句安其所一章八句豐草葽一章八句靁震震一章十句都荔遂芳一章十句桂華一章十句美芳一章八句嘉薦芳矣一章八句皇皇鴻明一章六句浚則師德一章四句孔容之常一章八句承帝明徳一章八句光武建武二年立高廟於洛陽四時祫祀高祖爲太祖文帝爲太宗武帝爲世宗如舊餘帝四時春以正月夏以四月秋以七月冬以十月及臘祠一歲中凡五祠十九年詔曰以宗廟處所未定且祫祭高廟其成哀平且祠祭長安故高廟其南陽舂陵嵗時各且因故園廟祭祀園廟去太守治所逺者在所令長行太守事侍祠於是雒陽高廟四時加祭孝宣孝元凡五帝其西廟成哀平三帝主四時祭於故高廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮南頓君以上至節侯皆就園廟在所郡縣侍祠東漢制正月上丁祠南郊禮畢次北郊明堂高廟世祖廟謂之五供安帝卽位竇太后猶臨朝七年正月初入太廟齋七日庚戌謁宗廟率命婦羣妾相禮儀與皇帝交獻親薦成禮而還因下詔曰凡供薦新味多非其節或欝養强熟或穿掘萌芽味無所至而夭折生長豈所以順時育物乎自今當奉祠陵廟及給御者皆須時乃上凡所省二十三種本紀永初五年劉珍言皇太后宜入廟與陛下交獻事下公卿僉如珍言六年正月皇太后親祭於宗廟與皇帝交獻大臣命婦相禮儀靈帝時京都四時所祭高廟五主世祖廟七主成帝三陵追后三陵凡牲用十八太牢魏文帝黄初二年以洛京宗廟未成乃祠武帝於建始殿親執饋奠如家人禮高堂隆云按舊典天子諸侯月有祭事其孟則四時之祭也三牲黍稷時物咸備其仲月季月皆薦新之祭也大夫以上將之以羔或加以犬而已不備三牲也士以豚庶人則唯其時宜魚鴈可也皆有黍稷禮器曰羔豚而祭百官皆足太牢而祭不必有餘羔豚則薦新之禮也太牢則時祭之禮也詩云四月其蚤獻羔祭韭周之四月則夏之二月也月令仲春天子乃獻羔開冰季春之月天子始乘舟薦鮪仲夏之月天子乃嘗魚咸薦之寢廟此則仲月季月薦新之禮也蜀譙周禮祭集志曰天子之廟始祖及高曽祖考皆月朔加薦以像平生朔食也謂之月祭二祧之廟無月祭也凡五榖新熟珍物新成天子以薦宗廟禮未薦不敢食新孝敬之道也其月朔薦及臘薦薦新皆奠無尸故羣廟皆一朝之間盡畢晉孝武帝太元十六年改作太廟遷神主於行廟設脯醢之奠及新廟成神主還室又設脯醢之奠餘見禘祫門晉祠廟夕牲歌一首祠廟迎送神歌一首祠征西將軍豋歌一首祠豫章府君豋歌一首祠潁川府君豋歌一首祠京兆府君豋歌一首祠宣皇帝豋歌一首祠景皇帝豋歌一首祠文皇帝豋歌一首祠廟饗神歌二首宋四時祭祀將祭必先夕牲皇帝㪚齋七日致齋三日百官掌事者亦如之致齋之日御太極殿幄坐著絳紗袍黒介幘通天金博山冠祠之日車駕出百官應齊從駕留守塡先置者各依宣攝從事上水一刻皇帝著平冕龍衮服升金根車到廟北門理禮謁者各引太樂令太常光祿勲三公等皆入在位皇帝䧏車入廟脱舄盥及洗爵訖升殿初獻奠爵樂奏太祝令跪讀祝文訖進奠神座前皇帝還本位博士引太尉亞獻訖謁者又引光祿勲終獻皇帝不親祠則三公行事而太尉初獻太常亞獻光祿勲終獻齊武帝永明九年詔太廟四時之祭薦宣皇帝起麵餅鴨􅌜孝皇后筍鴨卵高皇帝肉膾葅羮昭皇后茗粣炙魚皆所嗜也先時帝夢太祖謂已宋氏諸帝常在太廟從我求食可别爲吾致祠乃命豫章王妃􅁃氏四時祠二帝二后於清溪故宅牲牢服章皆如家人禮司馬氏曰昔屈到嗜芰屈建去之以爲不可以私欲干國之典況子爲天子而以庶人之禮祭其父違禮甚矣衛成公欲祀相寗武子猶非之而況降祀祖考於私室使庶婦尸之乎梁武帝制春祠夏礿秋嘗冬烝并臘一嵗凡五謂之時祭都令史王景之列自江左以郊廟祭祀帝已入齊百姓尚哭以爲乖禮何佟之等奏按禮國門在臯門外今之籬門是也今古殊制若禁凶服不得入籬門爲太逺宜以六門爲斷詔曰六門之内士庶甚多四時烝嘗俱斷其哭若有死者棺器須來旣許其大而不許其細也致齋日宜去廟二百步斷哭四年何佟之議按禮未祭一日大宗伯省牲鑊祭日之晨君親牽牲麗碑後代有冐暗之防而人主猶必親奉故有夕牲之禮頃代人君不復躬牽相承丹陽尹牽牲於古無取宜依以未祭一日之暮太常省牲視鑊祭日之晨使太尉牽牲出入也少牢饋食殺牲於廟門外今儀注詣厨烹牲謂宜依舊帝可其奏佟之又曰鄭元云天子諸侯之祭禮先有祼尸之事乃迎牲今儀注乃至薦熟畢太祝方執珪瓚祼地違謬若斯又近代人君不復躬行祼禮太尉既攝位實宜親執其事而越使卑賤太祝甚乖舊典愚謂祭日之晨宜使太尉先行祼獻乃後迎牲帝曰祼尸本使神有所附今旣無尸祼將安設佟之曰如馬鄭之意祼雖獻尸而義在求神今雖無尸求神之義恐不可闕帝曰此本因尸以祀神今若無尸則宜立廣求之所祼義乃定佟之曰祭統云獻之屬莫重於祼今旣存尸卒食之獻則祼鬯之求實不可闕又送神更祼經記無文宜依禮革奏未報而佟之卒後明山賔復申其理帝曰佟之旣不復存宜從其議也自是始使太尉代太祝行祼而又牽牲太常任昉又以未明九刻呈牲加又太尉祼酒三刻施饌間中五刻行儀不辦近者臨祭從事實以二更至未明三刻方辦明山賔議謂九刻已疑太早況二更非復祭旦帝曰夜半子時卽是晨始宜取三更省牲餘依儀注又有司以爲三牲或離杙依制埋瘞猪羊死則不埋請議其制司馬褧等議以爲牲死則埋必在滌矣謂三牲在滌死悉宜埋帝從之五年明山賔議罇彞之制祭圖唯有三罇一曰象罇周罇也二曰山罍夏罇也三曰著罇殷罇也徒有􅂜名竟無其器直酌象罇之酒以爲珪瓚之實竊彞祼重於獻不容共罇宜循彞器以備大典按禮器有六􅂜春祠夏礿祼用雞彞鳥彞王以珪瓚初祼后以璋瓚亞祼故春夏兩祭俱用三􅂜今古禮殊無復亞祼止循其二春夏雞彞秋冬斚彞庻禮物備也帝曰雞是金禽亦主巽位但金火相伏用之通夏於義爲疑山賔曰臣愚管不奉明詔則終年乖舛按鳥彞是南方之物則主火位木生於火宜以鳥彞春夏兼用帝從之七年舍人周捨以爲禮玉輅以祀金輅以賔則祭日應乘玉輅詔下其議左丞孔休源議玉輅旣有明文而儀注金輅當由宋齊乖謬宜依捨議帝從之天監十六年詔曰夫神無常饗饗於克誠所以西鄰礿祭實受其福宗廟祭祀猶有牲牢無益至誠有累冥道自今四時烝嘗外可量代八座議以大脯代一元大武八座又奏旣停宰殺無復省牲之事請立省饌儀其衆官陪列並同省牲帝從之十月詔曰今雖無復牲腥猶有脯脩之類卽之幽明義爲未盡可更詳定悉薦時蔬左丞司馬筠等參議大餅代大脯餘悉用蔬菜帝從之又舍人朱异議二廟祀相承止有一鉶羮蓋祭祀之禮應有兩羮相承止於一鉶卽禮爲乖請加􅆈油蓴羮一鉶帝從之於是起至敬殿景陽臺立七廟座月中再設淨饌自是訖於臺城破諸廟遂不血食陳制一嵗五祠謂春夏秋冬臘也每祭共以太牢始祖以三牲首餘唯骨體而已後魏孝文皇帝太和六年十一月將親祀七廟有司依禮具儀於是羣官議曰昔有虞親䖍祖考來格殷宗躬謁介福攸降大魏七廟之祭依先朝舊事多不親謁今陛下孝誠發中思親執祀稽合古義禮之常典臣等謹按舊章并採漢魏故事撰祭服冠履牲牢之具罍洗簠簋俎豆之器百官助祭位次樂官節奏之引升降進退之法别集爲親拜之儀制可於是帝乃親祭其後四時常祀皆親之十六年詔曰夫四時享祀人子常道然祭薦之禮貴賤不同故有邑之君祭以首時無田之士薦以仲月況七廟之重而用中節者哉自頃烝嘗之禮頗違舊義今將仰遵逺式以此孟月特禴於太廟但朝典初改衆務殷湊無遑齊絜遂及於今又接神饗祖必須擇日今禮律未宣有司或不知此可勅太常令尅日以聞又詔罷寒食饗致堂胡氏曰四時之祀天子用孟月禮之正也若寒食其始旣不出於先王其節或跨乎仲季非天子之所宜行也茍以爲祖宗常行有其舉之莫敢廢也盍亦擇禮之中否而行之歟寒食之祀始於晉人思介之推之焚死爲之不火食然則有天下國家者以是日祀其祖考可謂不經之禮雖祖考行之而未暇革今而革之去非以從是何不可之有魏孝文斷然行之不膠者卓矣北齊制春祠夏禴秋嘗冬烝皆以孟月凡四祭每祭室一太牢武成帝始以皇后亞獻河清中定令四時祭廟及元日廟庭並設庭燎二所後周之制其四時祭各於其廟亦以皇后亞獻其義與北齊同所異者皇后亞獻訖后又薦加豆之籩其實菱芡芹葅兎醢冡宰終獻訖皇后親徹豆降還版位然後太祝徹焉隋四時之祭各以太牢四時薦新於太廟有司行事而不出神主祔祫之禮並准時享唐四時各以孟月享太廟室各用一太牢若品物時新堪進御者有司先送太常令尚食相知簡擇務令潔淨仍以滋味與新物相宜者配之太常卿及少卿一人奉薦太廟卿及少卿有故卽差五品以上攝有司行事不出神主仲春薦冰亦如之元宗開元十五年勅享宗廟差左右丞相尚書嗣王郡王攝三公行事若人數不足通取諸司三品已上長官自餘祭享差諸司長官及五品以下清官二十三年令今後有大祭宜差丞相特進少保少傅尚書賓客御史大夫攝行二十五年勅太廟每至五饗之日應攝三公令中書門下及丞相師傅尚書御史大夫嗣王郡王中揀擇徳望高者通攝餘司不在差限二十七年制宗廟致敬必先於如在神人所依無取於非族其應太廟五享宜於宗子及嗣郡王中揀擇有徳望者令攝三公行事其異姓官更不須差攝二十三年正月赦文宗廟致享務在豐潔禮經沿革必本人情籩豆之薦或未能備宜令禮官學士詳議具奏太常卿韋縚奏宗廟之奠每座籩豆各加十二又酒爵制度全小僅無一合執持甚難請稍令廣大付尚書省集衆官詳議兵部侍郎張均等議曰按舊制一升曰爵五升曰㪚禮器稱宗廟之祭貴者獻以爵賤者獻以㪚此明貴小賤大示之節儉豈可捨先王之遺法徇一時之所尚廢棄禮經以從流俗裂冠毁冕將安用之太子賓客崔􅃆議曰祭禮之興肇於太古人所飲食必先嚴獻未有火化茹毛飲血則有毛血之薦未有麴糵汚樽抔飲則有元酒之奠施及後王禮物漸備作爲酒醴伏其犧牲以致馨香以極豐潔故有三牲八簋之盛五齊九獻之殷然以神道至元可存而不能測也祭禮至敬可備而不可廢也是以毛血腥爓元罇犧象靡不畢登於明薦矣然而薦貴於新味不尚䙝雖則備物猶存節制故禮云天之所生地之所長茍可薦者莫不咸在備物之情也又曰三牲之俎八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣此節制之文也鉶俎籩豆簠簋罇罍實皆周人之時饌也其用通於讌享賓客而周公制禮咸與毛血元酒同薦於先晉中郎盧諶近古知禮者也著家祭禮皆晉時供食不復純用舊文然則當時飲食不可闕於祀祭明矣是變禮文而通其情也我國家由禮立訓因時制範考圖史於前典稽周漢之舊儀清廟時享禮饌畢陳用周制也而古式存焉圍寢上食時膳具設遵漢法也而珍味極焉職貢來祭致逺物也有新必薦順時令也苑囿之内躬稼所收蒐狩之時親發所中莫不割鮮擇美薦而後食盡誠敬也若此至矣復何加焉但當勅祭祭如神在無或簡怠増朂䖍誠其進珍羞或時鮮美考諸祠典有所漏畧皆詳擇名目編諸甲令因宜而薦以類相從則新鮮肥濃盡在是矣不必加於籩豆之數也至於祭器隨物所宜故太羮古食也盛於㽅㽅古器也和羮時饌也盛於鉶鉶時器也亦有古饌而盛於時器故毛血盛於盤元酒盛於罇未有薦時饌而追用古器者古質而今文便於事也雖加籩豆十二未足以盡天下美物而措諸清廟有兼倍之名近於侈矣又據漢書藝文志墨家之流出於清廟是以貴儉由此觀之清廟之不尚於奢舊矣太常所請恐未可行又稱酒爵全小須加廣大竊據禮文有以小爲貴者獻以爵貴其小也小不及制敬而非禮是有司之失其傳也固可隨失釐正無待議而後革未知今制何所依准請兼詳古式據文而行止曰享祀實思豐潔不應法制者亦不可用於是更令太常加品味韋縚又請每室加籩豆各六每四時異品以當時新果及珍羞同薦制可之又酌獻酒爵上令用藥汁一升合於古義而多少適中自是常依行焉二十四年勅宗廟祭享籩豆宜加麞鹿鶉兎野雞等料夏秋供腊春冬供鮮仍令所司祭前十日具數申省准料令殿中供送天寳三載詔頃四時有事於太廟兩京同日告享雖卜吉辰俱遵上日而義深如在禮或有乖自今以後兩京宜各别擇吉日告享五載詔祭神如在傳諸古訓以多爲貴著自禮經膟膋之儀蓋昔賢之尚質甘㫖之品亦孝子之盡誠既切因心方資變禮其以後享太廟宜料外每室加常食一牙盤仍令所司務盡豐潔貞元九年太常博士韋彤裴堪等議曰謹按禮經前代故事宗廟無朔望祭食之儀園寢則有朔望上食之禮國家自貞觀至開元修定禮令皆遵舊典至天寳十一載三月初别令尚食朔望進食於太廟自太廟已下每室奠饗其進奠之禮内宫主之在臣禮司並無著令或云當時祀官王璵不本禮意妄推緣生之義請用宴私之饌此則可薦於寢宫而不可瀆於太廟一時之制久未變更至今論禮者貶王璵之議伏奉今月八日進止其朔望進食令宗正與太常計㑹辦集者謹按禮祭統云夫祭者非外至者也自中出生於心也􅇶而奉之以禮由是牲牢有定制籩豆有定數罄天生地長之物極昆蟲草木之異可薦者莫不咸在先王以此饗宗廟交神明全孝敬也若生之食飲膳羞八珍百品可嗜之饌隨好所遷美脆㫖甘皆爲䙝味先王以此宴賓客接人情示慈惠也則知薦饗宴會於文已殊聖人别之以異爲敬今若以熟食薦太廟恐違禮本又祭義曰祭不欲數數則煩煩則不敬祭不欲䟽䟽則怠怠則忘是故礿祠烝嘗感時致饗此聖人俯就之中制也今園寢每月二祭不爲䟽也太廟每嵗五享不爲數也則人臣執事在䟽數之間得盡其忠也若令牲牢俎豆之司更備膳羞盤盂之饌朔日月半將以爲常環四時之中雜五享之禮爲數既甚黷亦隨之雖曰不然臣不信也夫聖王之制必師於古訓不敢以孝思之極而􅂈於禮不敢以肴膳之多而䙝於味伏願陛下遵開元萬代之則省天寳權宜之制園寢之上得極珍羞宗廟之中請依正禮臣等忝司禮職敢罄愚衷上令宣示宰臣等曰此禮已經先帝所定朕未敢遽有改移待更商量期於允當至元和十四年太常丞王涇上䟽請去太廟上食曰伏以太廟之享籩豆牲牢三代之通禮是貴誠之義園寝之奠改用常饌秦漢之權制乃食味之道也今朔望上食於陵寢循秦漢故事斯爲可矣若朔望上食於太廟豈非用嘗䙝味而貴多品乎且非禮所謂至敬不饗味而貴氣􅆨也況祭器不設俎豆祭官不命三公執事者唯宫闈令與宗正卿而已謂之上食可也安得以爲祭乎且時饗於太廟有司攝事祝文曰孝曾孫皇帝臣某謹遣太尉臣名敢昭告於高祖神堯皇帝祖妣太穆皇后竇氏時惟孟春永懐㒺極謹以一元大武柔毛剛鬛明粢薌合薌萁嘉􅂼嘉薦醴齊敬修時饗以申追慕尚享此祝詞也前饗七日質明太尉誓百官於尚書省曰某月某日時享於太廟各揚其職不供其事國有常刑凡陪饗之官㪚齋四日致齋三日然後乃可以爲祭也宗廟之禮非敢擅議雖有知者其誰敢言故六十餘年行之不廢今聖朝以弓矢既櫜禮樂爲大故下百僚使得詳議臣等以爲貞觀開元禮並無太廟上食之禮以禮斷情罷之可也至若陵寢上食採國語禮記日祭月祭之詞因秦漢之制循而存之以廣孝道也如此則經義可據故事不遺大禮既明永息異論中書舍人武儒衡議曰臣謹按開元禮太廟九室每年唯五饗六告祭用牲牢俎豆而已劉歆祭義曰大禘則終王壇墠則嵗貢二祧則時享曽高則月祀祖禰則日祭國語云王者日祭月享時類嵗祀此則徃古之明徵國朝之顯據蓋日祭者薦新也言物有可薦則薦之不必卜擇時也故叔孫通云古有嘗果今櫻桃方熟可以爲獻由是惠帝取以薦宗廟是不卜日矣當叔孫通之言且曰有嘗果足明古禮非漢制也月享者告朔也論語子貢欲去告朔之餼羊孔子以爲不可則告朔必具牲牢明矣春秋又譏閏月不告朔猶朝於廟此則月祭殷周已降皆有之也薦園寢者始於秦代漢氏因之而又改人君三年之制以日易月喪紀旣以二十七月而除則朔望奠酹不復親執故既葬之後移之園陵又諸陵祠殿月遊衣冠取象平生務從豐潔所以陵寢朔望上食與太廟日祭月享本㫖不同今王涇所引太廟同日時設祭以爲越禮臣竊謂王涇但宜論太廟陵寢朔望奠祭可廢之㫖不當以用日時爲議何者漢宗廟園陵一百六十七所郡園祠祝豈不與宗廟同日同時者乎在禮旣祭於室又繹於祊蓋廣乎求神者也則宗廟陵寢嘗礿同時理固無害又韓臯引漢官儀古不墓祭臣據周禮冡人之職凡祭墓則爲之尸古亦墓祭但與漢家陵寢不同耳安得謂之無哉臣以爲陵廟近也親親也朔望奠獻尚潔務豐宜備常膳以廣孝也宗廟逺也尊尊也禘祫時享告朔薦新以崇古制以正禮也唯太廟望祭無所本據蓋異時有司因陵寢有朔祭望㸃以爲宗廟亦合行之不知宗廟朔祭乃告朔也臣以爲宜罷此耳事竟不行九載制曰承前有事宗廟皆稱告享兹乃臨下之辭頗虧尊上之義靜言斯稱殊未爲允自今以後每親告獻太清太㣲宫改爲朝獻有司行事爲薦獻親告享廟改爲朝拜有司行事爲薦享親廵陵改爲朝拜有司行事爲拜陵應緣諸事告宗廟者並改爲奏其郊天后土及諸祝文云敢昭告者並改爲敢昭薦乾封元年詔曰每惟宗廟至敬䖍誠祼享而二等一奠惟有未安思革舊章用崇嚴配則自今以後宗廟薦享爵及簋簠㽅鉶各宜用奠其餘牢饌並依恒典貞元九年十一月九日謁太廟有勅至廟行禮不得施褥蓋至敬之所自合履地而行南郊亦宜准此唐諸帝親饗廟太宗二貞觀元年正月十日謝十七年四月十一日親謁太廟承乾之過蘇冕曰貞觀六年監察御史馬周上言陛下踐阼以來宗廟之饗未曾親事遂使大唐一代之史不書皇帝入廟之事將何以貽厥孫謀垂則末葉且三年已親饗宗廟矣未知何事致此不同高宗四永徽三年正月十八日九乾封元年四月八日總章元年十二月十日儀鳳二年正月十四日中宗一神龍元年十一月六日睿宗一景雲三年正月一日元宗七先天元年十月四日十七年十一月四日開元六年十月六日日天寳元年二月十八六載正月十七日月八日十載正月九日十三載二肅宗二乾元元年四月十三日日元年建子月二十九代宗一廣徳二年二月二十七日徳宗四建中元年正月四日六