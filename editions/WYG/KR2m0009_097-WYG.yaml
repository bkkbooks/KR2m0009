常卿又引皇帝出取爵於坫酌醴齊訖太常卿引皇帝入詣神座前北面跪奠爵少西興太常卿引皇帝出户北向立樂止太祝持版進於户之右東向跪讀祝文曰維某年嵗次月朔日子孝曽孫開元神武皇帝諱敢昭告於懿祖光皇帝祖妣光懿皇后賈氏讀祝文訖奠版於神座出還罇所皇帝拜訖樂止太常卿引皇帝詣太祖罇彜所如上儀大政之舞作祝文曰孝曽孫開元神武皇帝臣諱敢昭告於太祖景皇帝祖妣景烈皇后梁氏餘如上儀次代祖大成之舞作祝文曰孝曽孫開元神武皇帝諱敢昭告於代祖元皇帝祖妣元貞皇后獨孤氏獻訖太常卿引皇帝詣罇彜所皇帝拜訖樂止太常卿引皇帝詣高祖罇彜所如上儀大明之舞作祝文曰孝曽孫開元神武皇帝臣諱敢昭告於皇高祖神堯皇帝祖妣大穆后竇氏訖次太常卿引皇帝詣太宗罇所如上儀崇徳之舞作祝曰孝曽孫開元神武皇帝臣諱敢昭告於皇曽祖太宗文武聖皇帝皇曽祖妣文徳聖皇后長孫氏訖次太常卿引皇帝詣髙宗罇彝所如上儀鈞天之舞作祝文曰孝孫開元神武皇帝臣諱敢昭告於皇祖考高宗天皇大帝皇祖妣大聖天后武氏訖次太常卿引皇帝詣中宗罇彜所如上儀酌醴齊文和之舞作祝文曰孝姪開元神武皇帝臣諱敢昭告於皇伯考中宗孝和皇帝和思皇后趙氏訖次太常卿引皇帝詣睿宗罇彜所如上儀景雲之舞作祝文曰孝子開元神武皇帝臣諱敢昭告於皇考睿宗大聖真皇帝皇妣昭成皇后竇氏訖興皇帝再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座出還罇所皇帝拜訖曲終樂止太常卿引皇帝詣東序西向立壽和之樂作皇帝獻將訖謁者引司徒詣東階升立於楹間北面東上皇帝獻訖諸太祝各以爵酌上罇福酒合置一爵一太祝持爵授侍中侍中受北向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興諸太祝各帥齋郎持俎進太祝減神座前三牲胙肉各取前脚第三骨加於俎又於籩豆取稷􅁰還罇所以胙肉各置一俎上以飯共置一籩以飯授司徒司徒奉進皇帝受以授左右太祝又以胙肉授司徒司徒授俎以次進皇帝每受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受虚爵以授太祝太祝受爵復於坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自阼階還版位西向立樂止文舞出鼓柷作舒和之樂出訖戞敔樂止武舞入鼓柷作舒和之樂立定戞敔樂止初皇帝將復位謁者引太尉升自阼階攝事則太尉將復位謁者引太常以下倣此詣獻祖罇彜所執罇者舉羃太尉酌盎齊武舞作謁者引太尉入詣獻祖神座前北向跪奠爵少東興謁者引太尉出户北向再拜謁者又引太尉取爵於坫酌盎齊訖謁者引入詣神座前北向跪奠爵少西訖興謁者引太尉出户北向再拜謁者引太尉次詣懿祖罇彜所取爵於坫執罇者舉羃太尉酌盎齊謁者引太尉入詣懿祖神座前北向跪奠爵少東興謁者引太尉出户北向再拜謁者又引太尉取爵於坫酌盎齊訖謁者引入詣神座前北向跪奠爵少西訖興謁者引太尉出户北向再拜訖謁者引太尉次獻太祖次獻代祖次獻高祖次獻太宗次獻高宗次獻中宗次獻睿宗並如上儀訖謁者引太尉詣東序西向立諸太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之左北向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受虚爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光禄卿攝事同詣罍洗盥洗升酌盎齊終獻如亞獻之儀訖引光禄卿降復位武舞止登歌作雍和之樂諸太祝各入室徹豆還罇所徹者籩豆各一少移於故處登歌止奉禮曰賜胙贊者唱衆官再拜在位者皆再拜已飲福者不拜永和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜在位者皆再拜樂一成止太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出門樂止殿中監受鎮珪華蓋侍衛如常儀通事舍人謁者贊引各引享官及九廟子孫從享羣官諸方客使以次出贊引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出太廟令與太祝宫闈令納神主如常儀其祝版燔於齋坊薦新於太廟儀薦新之日太廟令帥齋郎灑掃廟之内外太官先饌所薦之物於神厨若有酒者廟司設罇坫罍洗如式謁者引太常卿入立於門東之内道北面南謁者贊引稱再拜太常卿再拜進饌者奉饌入自正門升自太階各詣於神座前籩豆蓋羃徹之如式訖降自東階以出謁者引太常卿升自東階詣獻祖室前盥洗酌獻訖再拜又再拜若無酒卽俱再拜訖謁者引太常卿復位謁者贊拜訖謁者引出薦新物冬魚蕨筍蒲白韭堇小豆眢豆襄荷菱仁薑菱索春酒桑落酒竹根黄米粳米糯米梁米稷米茄子甘蔗芋子鷄頭仁苜蓿蔓菁胡𤓰冬𤓰瓠子春魚水蘇枸把芙茨子藕大麥麵𤓰油麻麥子椿頭蓮子栗冰柑子李櫻桃杏林檎橘椹菴蘿果棗兎脾麞鹿野雞凡薦新皆所司白時新堪供進者先送太常令尚食相與簡擇仍以滋味與新物相宜者配之以薦皆如上儀梁太祖親饗廟二開平三年正月二十二日月三十日其年十後唐莊宗親饗廟一同光二年正月二十九日明宗親饗廟一長興元年二月十九日周太祖親饗廟一廣順三年十二月二十九日文獻通考卷第九十七
