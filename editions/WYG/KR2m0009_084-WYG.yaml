body:
  text: 文獻通考卷八十四鄱陽馬端臨貴與著郊社考十七封禪秦始皇既即帝位三年東廵守郡縣祀騶嶧山騶魯縣也嶧山在北嶧音亦頌功業謂刻石自著功業於是徴齊魯之儒生博士七十人至於泰山下諸儒生或議曰古者封禪為蒲車惡傷山之土石草木蒲車以蒲褁輪掃地而祠席用苴稭稭稾本也去皮以為席苴音租楷音戞苴藉也茅藉也苴字本作葅假借用言其易遵也始皇聞此議各乖異難施用由此黜儒生而遂除車道上自泰山陽至顛立石頌徳眀其得封也從隂道下山南曰陽山北曰隂禪於梁父其禮頗采泰祝之祀雍上帝所用而封蔵皆祕之世不得而記也始皇之上泰山中阪遇暴風雨休於大樹下諸儒既黜不得與封禪聞始皇遇風雨即譏之於是始皇遂東逰海上行禮祠名山川及八神求仙人羡門之屬使人齎童男女入海求不死之藥既封禪十二年而秦亡諸儒生疾秦焚詩書誅滅文學皆曰始皇上泰山為風雨所擊不得封禪云齊桓公既覇㑹諸侯於葵邱而欲封禪師古曰葵邱會在僖九年葵邱在陳留外黄縣東封禪者封土於山而禪祭於地也觧在武紀管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有一焉昔無懐氏封泰山禪云云鄭氏曰無懐氏古之王者在伏羲前見荘子服䖍曰云云在梁父東山名也晋灼曰云云山在䝉隂縣故城東北一有云云亭虙羲封泰山禪云云虙讀曰伏神農氏封泰山禪云云炎帝封泰山禪云云炎帝神農後黄帝封泰山禪亭亭服䖍曰亭亭山在牟隂晉灼曰地理志鉅平有亭亭山師古曰晋説是也顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪於社首應劭曰山名在博縣晋灼曰在鉅平南十二里師古曰晋説是也皆受命然後得封禪桓公曰寡人北伐山戎過孤竹應劭曰伯夷國也在遼西令支師古曰令音郎定反支音地祗之祗西伐東馬縣車上卑耳之山韋昭曰将上山纒束其馬縣釣其車也卑耳即齊語所謂辟耳南伐至召陵師古曰召陵楚地也在汝南召讀曰邵登熊耳山以望江漢師古曰熊耳山在順陽北益陽縣東非禹貢所云導洛自熊耳者也其山兩峯状亦若熊耳因以為名也兵車之㑹三乗車之㑹六九合諸侯一匡天下師古曰兵車之㑹三謂荘十三年㑹于北杏以平宋亂僖四年侵蔡蔡潰遂伐楚次于陘六年伐鄭圍新城也乗車之㑹六謂荘十四年㑹于鄄十五年又㑹于鄄十六年同盟于幽僖五年㑹于首止八年盟于洮九年㑹于葵邱也匡正也一匡天下謂定㐮王為天子之位也一説謂陽榖之㑹令諸侯云無障谷無貯粟無以妾為妻天下皆從故云一匡者也諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上黍北里禾所以為盛應劭曰鄗音臛蘇林曰鄗上北里皆地名也師古曰盛謂以實簠簋江淮間一茅三脊所以為藉也服䖍曰茅草有三脊也張晏曰謂靈茅也師古曰藉以藉地也音才夜反東海致比目之魚師古曰爾雅云東方有比目魚焉不比不行其名謂之鰈鰈土盍反西海致比翼之鳥師古曰山海經云崇吾之山有鳥状如鳬而一翼一目相得乃飛其名曰爾雅曰南方有比翼鳥焉不比不飛其名謂之鶼鶼而管仲乃云西海其説則異也然後物有不召而自至者十有五焉今凰凰麒麟不至嘉禾不生而蓬蒿藜莠茂鴟梟羣翔師古曰蓬蒿藜莠皆穢惡之草梟不祥之鳥也鴟盖今所謂角鴟也梟王梟也而欲封禪無乃不可乎於是桓公乃止太史公曰自古受命帝王曷嘗不封禪盖有無其應而用事者矣未有睹符瑞見而不臻乎泰山者也雖受命而功不至至梁父矣而徳不洽洽矣而日有不暇給是以即事用希傳曰三年不為禮禮必廢三年不為樂樂必壊每世之隆則封禪答焉及衰而息厥曠逺者千有餘載近者數百載故其儀闕然堙滅其詳不可得而記聞云按文中子曰封禪非古也其秦漢之侈心乎而太史公作封禪書則以為古受命帝王未嘗不封禪且引管仲答齊桓公之語以為古封禪七十二家自無懐氏至三代俱有之盖出於齊魯陋儒之説詩書所不載非事實也當以文中子之言為正故今叙封禪以秦始皇為首而管仲所言古七十二家則姑存其説附始皇封禪之後漢武帝元封元年上與公卿諸生議封禪封禪用希曠絶莫知其儀體而羣儒采封禪尚書周官王制之望祀射牛事師古曰天子有事宗廟必自射牲示親殺也事見國語齊人丁公年九十餘曰封禪者古不死之名也秦始皇不得上封陛下必欲上稍上稍漸也即無風雨遂上封矣上於是廼令諸儒習射牛草封禪儀數年至且行天子既聞公孫卿及方士之言黄帝以上封禪皆致怪物與神通欲放黄帝放依也以接神人蓬莱高世比徳於九皇韋昭曰上古有人皇者九人而頗采儒術以文之羣儒既已不能辨眀封禪事又拘於詩書古文而不敢騁上為封祠器示羣儒羣儒或曰不與古同徐偃又曰太常諸生行禮不如魯善周覇屬圖封事屬㑹也音之欲反於是上黜偃覇而盡罷諸儒弗用三月廼東幸緱氏禮登中嶽太室從官在山上聞若有言萬嵗云問上上不言問下下不言乃令祠官加増太室祠禁毋伐其山木以山下戸凡三百封崈高為之奉邑崈古崇字耳以崇奉嵩高之山故謂之崈高奉音扶用反獨給祠復無有所與音豫上因東上泰山如淳曰言易上也泰山從南面直上步道三十里車道百里泰山草木未生廼令人上石立之泰山顛從山下轉石而上也上遂東廵海上行禮祠八神齊人之上疏言神怪竒方者以萬數廼益發船令言海中山神者數千人求蓬莱神人公孫卿持節常先行候名山至東莱言夜見大人長數丈就之則不見見其跡甚大類禽獸云羣臣有言見一老父牽狗言吾欲見鉅公天子也已忽不見上既見大迹未信及羣臣又言老父則大以為仙人也宿留海上與方士𫝊車及間使求神仙人以千數四月還至奉高上念諸儒及方士言封禪人殊不經難施行天子至梁父禮祠地主至乙夘令侍中儒者皮弁搢紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺髙九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯上泰山子侯霍去病子也亦有封其事皆禁明日下隂道丙辰禪泰山下阯東北肅然山如祭后土禮天子皆親拜見衣上黄而盡用樂焉江淮間一茅三脊為神藉五色土益雜封縱逺方竒獸飛禽及白雉諸物頗以加祠兕牛象犀之屬不用皆至泰山然後去封禪祠其夜若有光晝有白雲出封中天子從禪還坐明堂羣臣更上夀詔曰朕以眇身承至尊兢兢焉惟徳菲薄不眀於禮樂故用事八神即郊祀志所説天主地主兵主隂主陽主日主月主四時主也其祠皆在齊地始皇封禪時禮之武帝亦然遭天地况施著見景象㞕然如有聞聞呼萬嵗者三是也震於怪物欲止不敢遂登封泰山至於梁父然後升禪肅然増土之髙歸功於天禪闡也廣土地也肅然山名在梁父自新嘉與士大夫更始其以十月為元封元年行所廵至博奉高蛇音移邱歴城梁父民田租逋賦貸已除加七十以上孤寡帛人二匹四縣無出今年算自博至梁父凡五縣今云四縣者奉髙一縣素以供神非算限也賜天下民爵一級女子百戸牛酒正義曰泰山上築土為壇以祭天報天之功故曰封泰山下小山上除地報地之功故曰禪言禪者神之也白虎通云或曰封者金銀䋲或曰古泥䋲封之印璽也孟康曰王者功成治定告成功於天封崇也助天之髙也刻石紀號有金䇿石函金泥玉檢之封焉應劭曰封者壇廣十二丈髙二丈階三等封於其上示増髙也刻石紀績也立石三丈一尺其辭曰事天以禮立身以義事親以孝育民以仁四守之内莫不為郡縣四夷八蠻咸来貢職與天無極人民蕃息天祿永得尚元酒而爼生魚下禪梁父祀地主示増廣此古制也武帝封廣丈二尺髙九尺其下有縢書祕語按秦始皇漢武帝之封禪也皆黜當時諸儒之議而自定其禮儀考史氏所載則秦之諸儒進蒲車掃地之説漢之諸儒有拘於詩書古文而不敢騁之説以此拂二帝之意而不見錄然封禪非古禮也竊詳諸儒之意盖欲以古帝王廵狩望祀之禮而緣飾之然古帝王之事則省方問俗賞善罰惡凡以為民其意出於公也秦漢二主之事則誇誦功徳希求福夀凡以為己其意出於私也迹其舉措正自冰炭則又安能考詩書之説行簡質之禮乎固宜其見黜也又詔曰古者天子五載一廵狩用事泰山諸侯有朝宿地其令諸侯各治邸泰山下天子既已封泰山無風雨而方士更言蓬莱諸神若將可得於是上欣然庶㡬遇之復東至海上望焉其秋有星孛於東井後十餘日有星孛於三能能讀曰台望氣王朔言候獨見填星出如𤓰食頃復入有司皆曰陛下建漢家封禪天其報徳星云二年夏旱公孫卿曰黄帝時封則天旱乾封三年三年不雨暴所封之土令乾也上乃下詔天旱意乾封乎四年上北至瑯琊並海上四月至奉高修封焉公玉帶曰黄帝時雖封泰山然風后封鉅岐伯令黄帝封東泰山風后等皆黄帝臣東泰山在瑯琊朱虚界中有小泰山是禪几山几山在朱虚縣合符然後不死天子既令設祠具至東泰山東泰山卑小不稱其聲乃令祠官禮之而不封焉其後令帶奉祠候神物復還泰山修五年之禮如前而加禪祠石閭石閭者在泰山下阯南方方士言仙人閭也故上親禪焉泰山五年一修封武帝凡五修奉光武建武三十年羣臣上書請封禪詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放何事汙七十二代之編錄桓公欲封管仲非之若郡縣逺遣吏上夀盛稱虚羙必髠兼令屯田從此羣臣不敢復言三月帝幸魯退祭泰山及梁父三十二年上齋夜讀河圖㑹昌符曰赤劉之九㑹命岱宗感此文乃詔梁松按索河圖䜟文言九世封禪事者松等列奏乃許焉東觀書曰羣臣奏言登封告成為民報徳百王所同陛下輙拒絶不許臣下不敢頌功述徳業求元封時故事議封禪所施用有司奏當用方石再累置壇中皆方五尺厚一尺用玉牒書蔵方石牒厚五寸長尺三寸廣五寸有玉檢又用石檢十枚列於石傍東西各三南北各二皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有盖檢用金縷五周以水銀和金以為泥玉璽二其一方一寸二分其一方三寸方石四角又有距石皆再累枚長一丈厚一尺廣二尺皆在圜壇上其下用距石十八枚皆髙三尺厚一尺廣二尺如小碑環壇立之去壇三步距石下皆有石跗入地四尺又用石碑髙九尺廣三尺五寸厚尺二寸立壇之丙地去壇三丈以上以刻書帝以用石功難又欲及二月封禪故詔梁松欲因故封石空檢更加封而已欲及二月者虞書嵗二月東廵守至于岱宗柴祭山曰燔柴積柴加牲於其上而燔之也松上疏爭之以為登封之禮告功皇天垂後無窮以為萬民也承天之敬尤宜章明奉圖書之瑞今因舊封竄寄玉牒故石下恐非重命之義受命中興宜當特異以明天意遂使泰山郡及魯趣音促石工宜取完青石無必五色令印工刻玉牒書書祕刻方石中令容玉牒二月帝至奉髙應劭曰漢官馬第伯封禪儀記曰車駕正月二十八日發雒陽宫二月九日到魯十二日宿奉髙遣虎賁郎将先上山按行還益治道徒千人十五日始齋諸扈從王公以下及東方諸侯盡齋馬第伯自云某等七十人先之山虞觀祭山壇治石石二枚狀博平圜九尺此壇上石也其一石武帝時石也時用五車不能上因置山下為屋號五車石四維距石長丈二尺廣二尺厚尺半所四枚檢石長三尺廣六寸狀如封箧長檢十枚一紀號石高丈二尺廣三尺厚尺二寸名曰立石一枚刻文字紀功徳是朝上山騎行往往道峻峭下騎步牽馬乍步乍騎且相半至中觀留馬去平地二十里南向極眺無不覩仰望天闗如從谷底仰觀抗峯其為高也如視浮雲其峻也石壁窅窱如無道徑殊不可上四布僵卧石上有頃復蘇亦頼賫酒脯處處有泉水目輙為之復明勉強相将行到天闗自以已至尚十餘里其道傍山脇大者廣八九尺狭者五六尺仰窺巖石松樹鬰鬰蒼蒼若在雲中俛視谿谷碌碌不可見丈尺遂至天門之下仰視天門窔遼如從穴中視天直上七里頼其羊腸逶迤名曰環道往往有絙索可得而登也兩從者扶掖前人相牽後人見前人履底前人見後人項如畫重累人耳早食上脯後到天門使者得銅物形􅃺如鐘又方柄有孔疑封禪具也汝南人楊通得之東北百餘步得封所始皇立石及闕在南方漢武在其北二十餘步得北垂圜䑓高九尺方圓三丈所有兩陛從東陛上臺上有壇方一丈二尺所上有方石四維有距石四面有闕鄉壇再拜謁人多置錢物壇上亦不掃除國家上見之則詔書所謂酢梨酸棗狼籍散錢處數百幣帛具道是武帝封禪至泰山下未及上百官為先上跪拜置梨棗錢於道以求福即此也遣侍御史與蘭臺令史将工先上山刻石文曰維建武三十有二年二月皇帝東廵狩至於岱宗柴望秩于山川班于羣神遂覲東后從臣太尉憙行司徒事特進高密侯禹等漢賔二王之後在位孔子之後褒成侯序在東后蕃王十二咸来助祭河圖赤伏符曰劉秀發兵捕不道四夷雲集龍鬪野四七之際火為主河圖㑹昌符曰赤帝九世廵省得中治平則封誠合帝道孔矩則天文靈出地祇瑞興帝劉之九㑹命岱宗誠善用之姦偽不萌赤漢徳興九世㑹昌廵岱皆當天地扶九崇經之常漢大興之道在九世之王封於泰山刻石著紀禪於梁父退省考五河圖合古篇曰帝劉之秀九名之世帝行徳封刻政河圖提劉子曰九世之帝方明聖持衡矩九州平天下予雒書甄曜度曰赤三徳昌九世㑹修符合帝際勉刻封孝經鉤命决曰予誰行赤劉用帝三建孝九㑹修専兹竭行封岱青河雒命后經䜟所𫝊昔在帝堯聰明密㣲讓與舜庶後裔握機王莽以舅后之家三司鼎足冡宰之權勢依託周公霍光輔幼歸政之義遂以簒叛僭號自立宗廟隳壊社稷䘮亡不得血食十有八年揚徐青三州首亂兵革横行延及荆州豪傑并兼百里屯聚往往僭號北夷作寇千里無烟無雞鳴犬吠之聲皇天睠顧皇帝以匹庶受命中興年二十八載興兵起是以中次誅討十有餘年罪人則斯得黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人迹所至靡不貢職建明堂立辟雍起靈臺設庠序同律度量衡修五禮五玉三帛二牲一死䞇吏各修職復於舊典在位三十有二年年六十有二乾乾日昃不敢荒寧涉危歴險親廵黎元恭肅神祇恵恤耆老理庶遵古聰允眀恕皇帝唯慎河圖雒書正文是月辛卯柴登封泰山甲午禪於梁隂以承靈瑞以為兆民永兹一宇垂於後昆百僚從臣郡守師尹咸䝉祉祐永永無極二十二日辛卯晨燎祭天於泰山下南方羣神皆從祀用樂如南郊諸王王者後二公孔子後褒成君皆助祭位事也事畢將升封或曰泰山雖已從食於柴祭今親升吿功宜有禮祭於是使謁者以一特牲於常祠泰山處告祠泰山如親耕貙劉先祠先農先虞故事至食時帝御輦升山日中後到山上更衣早晡時即位於壇北面羣臣以次陳後西上畢位升壇尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石尚書令蔵玉牒已復石覆訖尚書令以五寸印封石檢封禪儀曰以金為䋲以石為檢東方西方各三檢檢中石泥及壇土各如其方色事畢皇帝再拜羣臣稱萬嵗命人立所刻石碑乃復道下二十五日甲午禪祭地於梁隂以髙后配山川羣神從祀如元始中北郊故事服䖍曰禪廣土地項威曰除地曰墠後改墠曰禪神之也四月己夘大赦天下以建武三十二年為建武中元元年以吉日刻玉牒書函蔵金匱璽印封之乙酉使太尉行事以特牲告至高廟太尉奉匱以告髙廟蔵於廟室西壁石室高主室之下司馬彪論自上皇以来封泰山者至周七十二代易姓則改封者著一代之始明不相襲也繼世之王廵狩則有修封以祭而已自秦始皇孝武帝封泰山本因好仙信方士之言及造石檢印封之事也天道質誠約而不費故牲用犢器用陶匏殆將無事於檢封之間而樂難攻之石也夏少康周宣由廢復興不聞改封光武欲因孝武故封而梁松固爭以為必改乃當天意既封之後未有能福而松卒被誅死雖罪由身作盖亦誣神之咎也且帝王所以能大著於後者實在其徳加於人不聞其在封矣崔靈恩曰自周以前封者皆封土為壇至秦皇漢武始用石檢袁宏曰夫揖讓受終必有至徳於天下征伐革命則有大功於萬物是故王者初基有封禪之事盖以其成功告於神眀者也夫東方者萬物之所始山嶽者靈氣之宅故求之物本必於其始取其所通必於所宅崇其壇場則謂之封明其代興則謂之禪然則封禪者王者開務之大禮也徳不周洽不得輒議斯事功不𢎞濟不得髣髴斯禮曠代一有其道至髙自黄帝堯舜至於三代各一得封禪未有中修其禮者也雖繼體之君時有功徳此盖率復舊業増修其前政不得仰齊造國同符改物者也夫神道真一其用不煩天地易簡其禮尚質故藉用白茅貴其誠素器用陶匏取其易從然則封禪之禮簡易可也若夫石函玉牒非天地之性也致堂胡氏曰緯書原本於五經而失之者也而尤紊於鬼神之理幽明之故夫鬼神之理幽明之故非知道者不能識斷國論者誠能一决以聖人之經經所不載雖有緯書䜟記屏而不用則庶乎其不謬於理矣登封之事原本於柴燔而失之者也詩書記廵狩而柴者記所謂祭天也至於岱宗陟其高山云者記所謂因名山也有山則因以為高無則於郊而壇其義類一也又有大事而告於上帝者武王克商始有天下故柴望而告也舍此則凟矣記以饗帝於郊與升中於天為二事則𫝊者之失也然則七十二君之編録詩書禮典畧不經見審有是事乃天下國家之盛舉堯舜禹湯文武成康昭宣皆身致太平安得闕而不講故前世論登封者莫善於許懋惜乎世祖之臣智不及此䧟其君於過舉而不得聞也且世祖享國至是已三十年四陲無虞中土寧謐其心寖滿是以告功皇天明示得意而不自知其多失也不法唐虞三代而法始皇武帝一失也按䜟文九世當封禪則孝成之世今乃自綴於元帝而削去成哀平三君二失也玉檢祕文人不得見是必祈求永年三失也前年拒羣臣之請謂百姓怨氣滿腹吾欺天乎豈有治天下三十年民怨未除纔後兩嵗即已歡洽此四失也勅戒郡縣有上夀稱羙者必髠令屯田詔墨未乾乃自令梁松等討論故事此五失也奉高后配地祇未㡬黜降廟主歸於寝園此六失也即位改元終身不可改而又改之此七失也凡此七者人君舉動之大節而疵病如此惜乎光武勇智出倫而學問不足也光武年及耳順方建中元則意在久生不言而自見矣其視向者對宗族乞復之言夀陵迭興之詔即已大異蒯徹所謂人心無常詎不然㦲魏明帝時中䕶軍蒋濟請封禪帝雖拒濟議而實使高堂隆草封禪儀以天下未一不欲便行大禮㑹高堂隆卒不行晉武帝平吳太康九年衛瓘議封禪帝曰此盛徳之事非所議也瓘等又奏至於再三詔報絶之宋文帝在位長久有意封禪詔學士山謙之草其儀注屬魏師南逼其意乃息孝武大明元年太宰江夏王義恭表三請帝以文軌未一不從梁武帝天監中有請封㑹稽禪國山者帝命諸儒草封禪儀欲行之著作佐郎許懋建議曰舜柴岱宗是為廵狩而鄭引孝經鉤命决云封於泰山考績燔燎禪於梁父刻石紀號此緯書之曲説七十二君燧人之前世質民淳安得泥金檢玉結䋲而治安得鐫文告成妄亦甚矣若聖主不湏封禪若凡主不應封禪秦始皇常封泰山孫皓嘗封國山皆由主好名於上而臣阿㫖於下非盛徳之事不可為法也上嘉納之因推演懋議稱制㫖以答請者由是遂止致堂胡氏曰封禪之事漢唐之君往往行之曾無一人建議明白如許懋者賢㦲懋乎其學可謂正矣漢唐以来緯書行而經學弛重以鄭𤣥博聞寡要不知折𠂻於聖人而惟緯書之信世無稽古大儒稽古言以袪羣惑遂使有天下者於無事時肆其侈心千乗萬騎廵狩侈費登山琢石夸大功徳或有祕祝以祈不死取笑當代貽譏後来彼梁武之資未必如漢光武之英也一聞懋言遂遏欲行之意推廣其義以答請者則賢於光武逺矣使其舉措每如此則金甌之業何缺壊之有北齊有廵狩之禮并登封之儀竟不行隋文帝開皇九年平陳朝野皆請封禪詔曰豈可命一將軍除一小國遐邇注意便謂太平以薄徳而封名山用虚言而干上帝非朕攸聞今後言及封禪宜即禁絶十四年晋王廣帥百官抗表固請封禪帝令牛𢎞等創定儀注既成帝視之曰兹事體大朕何徳以堪之但當東廵因致祭泰山耳唐太宗貞觀初羣臣並請封禪惟魏徴以為不可太宗曰朕欲卿極言之豈功不髙邪徳不厚邪夷狄不慕義邪嘉瑞不至邪年榖不登邪何謂而不可對曰陛下功則高矣而民未懐恵徳雖厚矣而澤未滂流諸夏雖安矣未足以供事逺夷慕義矣無以供其求符瑞雖臻罻羅猶密積嵗豐稔倉廩尚虚此臣所以竊為未可臣未能逺比且借喻於人今有人十年長患療治且愈皮骨僅存便欲使負米一石日行百里必不可得隋氏之亂非止十年陛下為之良醫除去疾苦雖已乂安未甚充實告成天地臣竊有疑且陛下東封萬國咸萃要荒之外莫不奔走今伊洛已東暨於海岱藿莽巨浸茫茫千里人烟斷絶雞犬不聞道路蕭條進退艱阻豈可引彼夷狄示以虚弱竭財以賞未厭逺人之望加年給復不償百姓之勞或遇水旱之災風雨之變庸夫横議悔不可追豈獨臣之懇言亦有輿人之誦太宗不能奪於是乃止焉六年文武官以初平突厥盛徳被於海内又年榖屢登表封泰山太宗謂侍臣曰朕每見衆議以封禪為盛事頻奏勸朕行之如朕本心但使天下太平家給人足雖闕封禪之禮亦可比徳於堯舜若百姓不足夷狄内侵縱修封禪之儀亦何異桀紂昔秦始皇為暴虐之主漢文為有徳之君以此而言無假封禪且禮云掃地而祭以表至誠何必逺登髙山封三尺土也侍中王珪對曰陛下發徳音明封禪本末非臣愚短之所能及祕書監魏徴又進曰隋末大亂黎民遇陛下始有生望養之則至仁勞之則未可升中之禮湏千乗萬騎供帳之費動役數州戸口蕭條何以能給太宗雖納徴言而藩臣猶抗表勸請乃命祕書少監顔師古諫議大夫朱子奢等集當時名儒博士雜議不能决於是左僕射房元齡特進魏徴中書令楊師道博採衆議奏上之其議曰為壇於泰山下祀昊天上帝壇之廣十二丈高丈二尺玉牒長一尺三寸廣厚五寸玉檢如之厚減三寸其印齒如璽纒以金䋲五周玉䇿四皆長一尺三寸廣寸五分厚五分每䇿皆五簡聨以金昊天上帝配以太祖皇地祗配以高祖已祀而歸格於廟盛以金匱匱高六寸廣足以容之制如表函纒以金䋲封以金泥印以受命之璽而玉牒蔵於山上以方石三枚為再累纒以金䋲封以石泥印以受命之璽其山上之圓壇土以五色高九尺廣五丈四面為一階天子升自南階而封玉牒已封而加以土築為封高一丈二尺廣二丈其禪社首亦如之其石檢封以受命璽而玉檢别製璽方一寸二分文如受命璽以石距非經不用又為告至壇方八十一尺髙三尺四出陛以燔柴告至望秩羣神遂著於禮其他降禪朝覲皆不著至十五年將東幸行至洛陽而彗星見乃止高宗乾封元年封泰山為圓壇山南四里如圜丘三壝壇上飾以青四方如其色號封祀壇玉䇿三以玉為簡長一尺二寸廣一寸二分厚三分刻以金文玉匱一長一尺三寸以蔵上帝之冊金匱二以蔵配帝之冊纒以金䋲五周金􅅺玉璽璽方一寸二分文如受命璽石䃭以方石再累皆方五尺厚一尺刻方其中以容玉匱䃭旁施檢刻深三寸三分闊一尺當䋲刻深三分闊一寸五分石檢十枚以檢石䃭皆長三尺闊一尺厚七分印齒二道皆深四寸當璽方五寸當䋲闊一寸五分檢立於䃭旁南方北方皆三東方西方皆一去䃭隅皆一尺䃭纒以金䋲五周封以石泥距石十二分距䃭隅皆再累皆闊二尺長一丈斜刻其首令與䃭隅相應又為壇於山上廣五丈高九尺四出陛一壝號登封壇玉檢玉牒石䃭石距玉匱石檢皆如之為降禪壇於社首山上八隅一成八陛如方丘三壝上飾以黄四方如其色其餘皆如登封其議畧定而天子詔曰古今之制文質不同今封禪以玉牒金䋲而瓦罇匏爵秸席宜改從文於是昊天上帝褥以蒼地祇褥以黄配褥皆以紫而罇爵亦更焉是嵗正月天子祀昊天上帝於山下之封祀壇以高祖太宗配如圜丘之禮親封玉册置石䃭聚五色土封之徑一丈二尺高尺已事升山明日又封玉册於登封壇又明日祀皇地祇於社首山之降禪壇如方丘之禮以太穆皇后文徳皇后配而以皇后武氏為亞獻越國太妃燕氏為終獻率六宫以登其帷帟皆錦繡羣臣瞻望多竊笑之又明日御朝覲壇以朝羣臣如元日之禮乃詔立登封降墠朝覲之碑名封祀壇曰舞鶴臺登封壇曰萬嵗臺降禪壇曰景雲臺以紀瑞焉其後將封嵩嶽以吐番突厥寇邉而止元宗開元十二年四方治定嵗屢豐稔羣臣多言封禪中書令張説又固請乃下制以十三年有事於泰山於是説與右散騎常侍徐堅太常少卿韋縚祕書少監康子元國子博士侯行果刋定儀注立圓䑓於山上廣五丈高九尺土色各依其方又於圓䑓上起方壇廣一丈二尺高九尺其壇䑓四面為一階又積柴為燎壇於圓臺之東南量地之宜柴高一丈二尺方一丈開上南出戸六尺又為圓壇於山下三成十二階如圜丘之制又積柴於壇南為燎壇如山上又為玉册玉匱石䃭皆如高宗之制元宗初以謂升中於崇山精享也不可諠譁欲使亞獻已下皆行禮山下壇召禮官講議學士賀知章等言昊天上帝君也五方精帝臣也陛下享君於上羣臣祀臣於下可謂變禮之中然禮成於三亞終之獻不可異也於是三獻皆升山而五方帝及諸臣皆祭山下壇元宗問前世何為祕玉牒知章曰玉牒以通意於天前代或祈長年希神仙㫖尚㣲密故外莫知帝曰朕今為民祈福無以祕為即出玉牒以示百僚玉牒詞曰有唐嗣天子臣某敢昭告於昊天上帝天啓李氏運興土徳高祖太宗受命立極高宗升中六合殷盛中宗紹復繼體不定上帝眷祐錫臣忠武底綏内艱推戴聖父恭承大寳十有三年敬若天意四海晏然封祀岱嶽謝成於天子孫百禄蒼生受福乃祀昊天上帝於山上壇以高祖配祀五帝以下諸神於山下其祀禮皆如圜丘張説韋堅等議曰乾封舊儀禪社首享地祇以先后配饗文徳皇后配地祇天后為亞獻越國太妃為終獻以宫闈接神有乖舊典上元不祐遂有天授易姓之事宗社中圯公族誅滅皆由此也景龍之季有事圜丘韋庶人為亞獻皆以婦人升壇執􅇼豆渫黷穹蒼享禮不㓗未及踰年國有大難亞獻終獻終受其咎平座齋郎及女人執祭者多亦夭卒今主上尊天敬神必湏革正斯禮請以睿宗大聖真皇帝配皇地祇侑神作三獻禮上初獻邠王守禮亞獻宋王成噐終獻從之天寳九載正月勅以今載十一月有事華山三月西嶽廟災京師旱遂停封嶽之禮唐開元禮皇帝封祀泰山儀禪社首山附鑾駕進發禪儀無此篇皇帝將有事於泰山有司卜日如别儀告昊天上帝太廟太社皆如廵狩之禮告太廟高祖祝文加封祀配神作主之意告睿宗祝文加禪祭配神作主之意皇帝出宫備大駕鹵簿軷於國門祭所過山川古先帝王名臣烈士皆如廵狩之禮通事舍人承制問百年所經州縣刺史縣令先待於境至泰山下柴告昊天上帝於圜丘壇如廵狩告至之禮有司攝事前祀所司以太牢祭於泰山神廟如常式齋戒前七日太尉戒誓百官封云封於泰山禪云禪於社首山齋儀同封禮皇帝散齋於行宫後殿四日致齋於前殿三日服衮冕結佩等並如圜丘儀百官如别儀制度將作大匠先領徒於泰山上立圓壇廣五丈高九尺土色各依其方又於圓臺上起方壇廣一丈二尺高九尺其臺壇四面各為一陛玉版長一尺三寸廣五寸厚五寸刻牒為字以金填之用金匱盛其玉牒文中書門下進取進止所由承㫖請内鐫其名檢等並如後制郊社令積柴為燎壇於山上圓臺之東南量地之宜柴高一丈二尺方一丈開上南出户方六尺又為圓壇於山下三成十二陛如圜丘之制隨地之宜壇上飾以元四方依方色壇外為三壝郊社令又積柴於壇南燎如山上之儀又為玉册皆以金䋲連編玉牒為之每牒長一尺二寸廣一寸二分厚三分刻玉填金為字少府監量文多少為之又為玉匱一長一尺三寸并檢方五寸當纒䋲處刻為五道當封寳處刻深二分方取容受命寳印以蔵正座玉册制度如玉匱又為黄金䋲以纒玉匱金匱又為石䃭以蔵玉匱用方石再累各方五尺厚一尺縱鑿石中廣深令容玉匱䃭旁施檢處皆刻深三寸三分濶一尺南北各二東西各三去隅皆七寸纒䋲處皆刻深三分濶一寸五分為石檢十枚檢石䃭皆長三尺闊一尺厚七寸皆刻為三道廣一寸五分深四寸當封處大小取容寳印深二寸七分皆有小石盖制與封刻處相應以檢擫封印其檢立於䃭旁當刻處又為金䋲三以纒石䃭各五周徑三分為石泥以封石䃭以石末和方色土為其封玉匱金匱石䃭同用受命寳並所司量時先奏請出之為距石十二枚皆濶二尺厚一尺長一丈斜刻其首令與䃭