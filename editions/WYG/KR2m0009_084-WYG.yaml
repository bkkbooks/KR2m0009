止奉禮曰衆官再拜在位皆再拜謁者七人各引獻官及諸太祝奉玉幣進奠於神座如常儀將進奠登歌作肅和之樂以大吕之均餘星座幣亦如之進奠訖各還本位初羣官拜訖夜明以上祝史各奉毛血之豆立於門外登歌止祝史奉毛血各由其陛升壇以毛血各致其座諸太祝俱迎受各奠於神座前諸太祝與祝史退立於罇所進熟燔燎儀並同郊祀封玉冊燔燎畢禪儀皇帝既就望􅄟位侍中跪奏稱具官臣某言請封玉冊太常卿引皇帝自南陛升壇北向立近侍者從升如式少府監具金䋲金􅅺等并所用物立於御側符寳郎奉受命寳立於侍中之側謁者引太尉進昊天上帝神座前禪儀進皇地祇神座前跪取玉冊置於案進皇帝受玉冊跪疊之内於玉匱中纒以金䋲封以金泥侍中取受命寳跪以進皇帝取寳以印玉匱訖興侍中受寳以授符寳郎通事舍人引太尉進皇帝跪捧玉匱授太尉太尉跪受皇帝興太尉退復位側身奉玉匱太常卿前奏請再拜皇帝再拜訖入次如常儀太尉奉玉匱之案於石䃭南北向立執事者發石盖太尉奉玉匱跪蔵於石䃭内執事者覆石盖檢以石檢纒以金䋲封以石泥訖太尉以玉寳徧印訖引降復位將作帥執事者以石距封固又以五色土圜封後續令畢其功禪儀同配座玉牒禪儀太尉又進睿宗大聖真皇帝座跪取玉冊内金匱封於金匱皆如封玉匱之儀訖太尉奉金匱從降俱復位封禪還以金匱内太廟蔵於髙祖神堯皇帝之石室如别儀太常卿前奏禮畢若有祥瑞則太史監跪奏訖侍臣奉駕再拜三稱萬嵗内外皆稱萬嵗訖又再拜太常卿引皇帝還大次樂作皇帝出東門禪禮皇帝出中壝門殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華盖侍衛如常儀皇帝入次樂止謁者贊引各引祀官通事舍人分引從祀羣官以次出復位立定奉禮曰再拜衆官在位者皆再拜訖贊引引出工人二舞以次出禪禮祭訖以竒禽異獸合瑞典者皆縱之神祠所鑾駕還行宫禪儀同皇帝既還大次侍中版奏請觧嚴將士不得輙離部伍轉仗衛於還途如来儀二刻頃侍中版奏請中嚴皇帝服通天冠絳紗袍諸祀官服朝服皇帝出次升輦降山下至圓壇所權停乘黄令進玉輅太僕升執轡以下入宫並如圜丘儀朝覲羣臣禪祭訖行此禮禪之明日朝覲羣臣及岳牧以下於朝覲壇如廵狩儀皇帝服衮冕乗輿以出曲直華盖警蹕侍衛入自北壝門由北陛升壇即御座符寳郎奉寳置於座扇開樂止通事舍人引二品以上及岳牧以下入就位如常儀通事舍人引上公一人舒和之樂作公至西陛就觧劍席樂止脱舄跪觧劍至於席興相禮者與通事舍人引進當御座前北面跪稱具官臣名等言天封肇建景福惟新伏惟開元神武皇帝陛下萬夀無疆俛伏興通事舍人引上公降壇詣觧劔席跪帶劔納舄樂作通事舍人引復位立定樂止典儀曰再拜贊者承𫝊上公以下皆再拜侍中前承制降詣上公之東北面西向稱有制上公及羣官皆再拜訖宣云封禪之慶與公等同之公及羣官又再拜舞蹈三稱萬嵗訖又再拜引退考制度如廵狩儀宋太宗皇帝太平興國八年泰山父老千餘人詣闕請東封上謙讓不允中外羣臣獻歌頌稱功徳請封禪者不可勝計雍熈元年羣臣三上表陳請詔以今年十一月有事於泰山尋以乾元文眀二殿災詔罷封禪真宗大中祥符元年兖州父老吕良等千二百七十八人詣闕請封禪上曰此大事不可輕議知州邵曄又率屬官及兖州進士孔謂等伏闕陳請宰相王旦率文武百官諸軍将校州縣官吏蕃夷僧道耆夀二萬四千七十人詣東上閤門請封泰山詔不允又四表懇請乃詔以今年十月有事於泰山先是殿中侍御史趙湘請封禪上拱揖不答王旦等曰封禪之禮曠廢已久若非盛世承平豈能振舉初王欽若既以城下之盟毁冦凖上自是常怏怏他日問欽若曰今將奈何欽若度上厭兵即謬曰陛下以兵取幽薊乃可刷此恥也上令思其次欽若因請封禪以鎮服四海誇示夷狄又言封禪當得天瑞又言天瑞盖有以人力為之陛下謂河圖洛書果有之乎聖人以神道設教耳上曰王旦得無不可欽若遂以上意諭旦旦黽勉而從詔取鄆州臨􅈶路赴泰山禮畢幸兖州取中都路還京詔禁緣路采捕山下工役無得調發丁夫止用兖鄆州兵充役行宫止建前後殿餘悉張幄幕前代封禪址摧圯者修完之初太平興國中有得唐明皇社首玉冊蒼璧至是令瘞於舊所文武官升山者皆公服山上置圜䑓徑五丈高九尺四出陛上飾以青四面如方色一壝廣一丈圍以青䋲三周燎壇在圜臺東南髙一丈二尺方一丈開上南出户方六尺山下封祀壇四成十二陛如圜丘制上飾以元四面如方色設三壝燎壇同山上社首壇八角三成八陛三壝如方丘制又為􅄟埳於壬地外壝之内天地玉牒玉冊並刻字填金聨以金䋲金脆難用以金塗銀䋲代之緘以玉匱置石䃭中配座玉冊緘以金匱牒冊制並長尺二寸牒廣五寸厚一寸冊廣寸二分厚三分金玉匱制並長尺三寸檢長如匱厚二寸濶五寸當纒䋲處刻為五道封匱以金泥和金粉乳香為之印以受命寳寳准今尺方寸二分文曰皇帝恭膺天命之寳封匱當寳處刻深二分石䃭制用石再累各方五尺厚一尺鑿中廣深容玉匱旁施檢處皆刻深七寸濶一尺南北各三東西各二去隅皆七寸纒䋲處皆刻三道廣寸五分又為石檢十以擫䃭皆長三尺濶一尺厚七寸刻三道廣深如纒䋲其當封處刻深二寸取足容寳又皆為小石盖與封刻相應其檢立䃭旁當刻處又為金䋲三以纒䃭皆五周徑三分封䃭以石泥石末和方色土為之印以天下同文寳鑄以金制同御前寳距石十二分四隅皆濶二尺厚一尺長一丈斜刻其首與䃭隅相應皆再累又為五色土圜封䃭上徑丈二尺下徑三丈九尺命祕書丞直史館劉鍇内侍張承素領徒封圜臺石䃭太常博士直集賢院宋臯内侍郝昭信封社首石䃭並先往規度凡冊牒七又思玉工言玉追琢難成宰相請代以珉石及階州采進上曰此碔砆之類目之為玉以奉天於禮可乎即遣中使遍詢玉工有趙榮者言太平興國中令與衆工治羙玉為牒冊嵗餘方就寘崇聖殿庫亟取而用之又詔岳州采三脊茅三十束備神藉縮酒之用有老人黄皓識之授皓州助教賜以粟帛有司言南郊惟昊天皇地祇配帝日月五方神州各用幣内官而下别設六十六叚分充按開寳通禮嶽鎮海瀆幣從方色從祀皆有制幣今請封祀壇内官至外官三百一十八位社首壇嶽鎮海瀆已下一十八位並用方色幣又南郊牲准正座配座用犢五方帝日月神州並用羊豕二十二其從祀七百三十七位仍以前數分充今請神州而上十二位並用犢其舊供羊豕改充從祀牲又景徳中陞天皇北極第一等今請亦於從祀牲内薦體奏可舊制郊祀正座配座褥皆以黄皇帝拜褥以緋至是詔配座以緋拜褥以紫又詔祀事所用酒醴委有司别擇器用醖醸朕親封題付主者六月壬辰有司上儀注上曰此儀久廢非典禮具備豈為盡羙即手札疑互凡十九事令五使参議釐正而行之又以靈山清潔命祀官差減其數或令兼攝有朞䘮未滿餘服未卒哭者不得預祭内侍諸司官除掌事宿衛外從升者裁二十四人諸司職掌九十三人有司又請前祀七日遣官以牲幣分祭天齊淵等八神又祀云云亭亭肅然徂来㑹稽五山及於泰山下擇地望祭前代封禪帝王前祀一日以太牢祠泰山少牢祠社首並從之九月朔詔審刑院開封府勿奏大辟案十月禁天下屠宰上自告廟即屏葷茹羣臣三上表以道塗寒沍請復常膳不許又令自進發至行禮前並禁樂有司請登封日圜臺立黄麾仗至山下壇設爟火將行禮燃炬相屬又出漆牌遣執仗者𫝊付山下牌至公卿就位皇帝就望燎位山下𫝊呼萬嵗下即舉燎皇帝還大次觧嚴又𫝊呼而下祀官始退又社首瘞坎亦設爟火三為凖從之上遣司天以漏壺先設山之上下及以日晷覆校復於壇側擊版相應自太平頂天門黄峴岱嶽觀各以長竿揭籠燈下照参候不愆其節辛卯車駕發京師至鄆州令從官衛士蔬食丁未次奉高宫戊申清齋於穆清殿諸司升山人官給衣令祀日沐浴服之庚戌上服通天冠絳紗袍乘金輅備法駕至山門幄次改服鞾袍乘步輦登山鹵簿儀衛列於山下黄麾仗衞士親從卒自山阯盤道至太平頂兩步一人彩綉相間樹當道者令勿伐掘止以繒帛縈之路經峻隘上必降輦徒步有司議益扶衛皆却之導從者或至疲頓而上辭氣益荘至廻馬嶺以天門斗絶給從官横版選親從卒推引而上版之制長二尺許兩端施綵帛上則施於背下則施於臆衛士皆給釘鞵上至御幄召近臣觀玉女泉及古碑前一夕山上大風裂帟幕遲明未已及上之至天氣温和纎羅不動祀官㸃饌習儀於圜臺祥光瑞雲交相輝映是夕山下罷警塲辛亥設昊天上帝位於圜臺奉天書於座左太祖太宗並配西北側申祖宗㳟事之意上服衮冕升臺奠獻侍從導衛悉減去茀翟止於壝門籠燭前導亦徹之中書侍郎讀玉牒文曰有宋嗣天子臣諱敢昭告於昊天上帝運啓大同惟宋受命太祖開階功成治定太宗膺圖重熙累盛粤惟冲人丕承列聖一紀於兹四隩来暨元貺殊尤元符章示時和年豐羣生咸遂僉議大封聿申昭事躬陟喬嶽對越上元祈福逮下侑神奉先天祿無疆靈休允廸萬乘其昌永保純錫令羣官饗諸神於山下封祀壇上還次司天監跪奏慶雲繞壇月有黄輝氣宰臣率從官稱賀即日還仗奉高宫壬子禪祭社首山如封祀之禮上至山下服鞾袍步出大次侍臣言山路峻滑請乘步輦上曰接神在邇敢不徒行五使等復固請終不許前夕隂晦風勢勁猛不能燃燭及行事風頓止天宇澄霽燭焰凝然封石䃭訖紫氣蒙壇法駕還奉高宫日輪五色雲見鼓吹振作觀者塞路懽呼動天地國朝以来四方所獻珍禽竒獸悉縱於山下癸丑御朝覲壇大赦天下改乾封縣曰奉符配座金匱廻日奉置太廟本室上作登泰山謝天書述二聖功徳銘初王欽若言唐高宗元宗二碑之東石壁南向平峭欲即崖成碑以勒聖製上曰朕之功徳故無所紀若須撰述不過謝上天敷佑叙祖宗盛羙爾又詔王旦撰封祀壇頌王欽若撰社首壇頌陳堯叟撰朝覲壇頌改太平頂曰天平頂先是泰山多隂翳雷雨及工徒升山景氣晴爽上之廵祭也往還四十七日未嘗遇雨雪嚴冬之候景氣怡和祥應紛委咸以為誠感昭格天意助順之致也徽宗政和四年兖鄆濮開徳興仁潁昌府鄭州廣濟永興軍等上言父老欲詣闕請皇帝登封詔却之時蔡京當國將講封禪以文太平預具金䋲玉檢及凡儀物甚備造舟四千艘雖雨具亦以十萬計他皆稱是然不果行文獻通考卷八十四
