又止饒州一郡所出云徽宗政和七年置提舉御前人船所時東南監司郡二廣市舶率有應奉又有不待㫖但送物至都計㑹宦者以獻大率靈壁太湖慈口溪武康諸石二浙竒竹異花海錯福建荔枝橄欖龍眼南海椰實登萊文石湖湘文竹四川佳菓木皆越海渡江毁橋梁鑿城郭而至植之皆生而異味珍苞則以健歩㨗走雖甚遠數日即逹色香未變也乃作提舉淮浙人船所命内侍鄧文浩領之蔡京以曩備東封船二千艘及廣濟兵士四營又増制作牽駕人乞詔人船所比直逹綱法自後所用即從御前降下使係應奉人船所數貢入餘皆不許妄進高宗建炎元年詔諸路常貢時新口味果實之𩔖所在因縁更相饋送騷擾為甚其令禮部措置除天地宗廟陵寢薦獻所須外餘並罷又詔天下土貢如金銀疋帛以供宗廟祭享之費用以贍官兵之請給不可闕者依格起發外其餘藥材海錯邠州火筯襄陽府漆器象州藤合揚州照子之𩔖一切罷之紹興四年先是和州言本州殘破之餘乞蠲免大禮銀絹户部奏展半年中書舎人王居正言生辰及大禮進貢乃臣子饗上之誠初非朝廷取於百姓若民力無所從出合預降詔典加慰諭止其進奉則君臣恩禮兩盡既不能然至使州縣自乞盖已非是矧又不許臣竊以為過矣望特與蠲免仍詔户部淮南諸郡如合行除放不須令本處再三申請庶使恩義自出朝廷人知感悦乃詔淮南州軍進奉大禮銀絹並蠲之紹興二十六年詔罷臨安府嵗貢御服綾一百疋又詔罷連州嵗貢珠子其籍定蜑丁並放逐便二十七年宰執奏四川便民事上曰蜀製造錦繡帟幙以充嵗貢聞十嵗女子皆拘在官刺繡朕自即位以來不欲土木被文繡首為罷去後來節次科敷多所蠲減想民力稍寛矣三十二年孝宗登極赦諸路或假貢奉為名漁奪民利果食則封閉園林海錯則强奪商販至於禽獸昆䖝珍味之屬則抑配人户致使所在居民以土產之物為苦太上皇帝嘗降詔禁約貢奉竊慮嵗久未能遵承自今仰州軍條具土產合貢之物聞於朝當議參酌天地宗廟陵寢合用薦獻及德壽宮甘㫖之奉止許長吏修貢外其餘一切並罷州郡因縁多取以違制坐之文獻通考卷二十二
