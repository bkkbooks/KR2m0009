body:
  text: 文獻通考卷一百四十一鄱陽馬端臨貴與著樂考十四樂歌虞書帝曰䕫命汝典樂教胄子直而溫寛而栗剛而無虐簡而無傲詩言志歌永言謂詩言志以導之歌詠其義以長其言聲依永律和聲聲謂五聲律謂十二律言當依聲律以和樂八音克諧無相奪倫神人以和倫理禹曰於帝念哉徳惟善政政在養民水火金木土榖惟修正徳利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壊休美董督也言善政之道美以戒之威以督之歌以勸之使政勿壊在此三者而已左傳九功之徳皆可歌也謂之九歌六府三事謂之九功水火金木土穀謂之六府正徳利用厚生謂之三事帝曰予欲聞六律五聲八音在治忽以出納五言汝聼言欲以六律和聲音在察天下治理及忽怠者又以出納仁義禮智信五徳之言施扵民以成化汝當審聼之工以納言時而颺之工樂官掌誦詩以納諫當是正其義而颺道之帝庸作歌曰勅天之命惟時惟幾勅正也奉承天命以臨民惟在順時惟在慎微乃歌曰股肱喜哉元首起哉百工熈哉臯陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉屢數也當數顧省汝成功敬終以善無懈怠乃賡載歌曰元首眀哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉叢脞言細碎無大略君如此則臣懈怠萬事􅑁廢其功不成故以申戒也帝拜曰俞徃欽哉舜作五絃之琴以歌南風其詩曰南風之時􅀆可以阜吾民之財􅀆南風之薫􅀆可以觧吾民之慍􅀆夏太康失道畋㳺十旬弗反其弟五人待扵洛汭述大禹之戒作五子之歌右是為虞夏之詩乃三百五篇以前者盖甞以為詩之體有三曰風曰雅曰頌風雅雖有一國天下之不同然大槩風者閭閻之間民庶之所吟諷所謂陳詩以觀民風是也雅者朝廷之上君臣之所詠歌所謂王政所由廢興是也其詩則施之扵宴享頌者美盛徳吿成功者也其詩則施之扵祭祀然未有三百五篇之前如康衢如擊壤則風之祖也如九歌如喜起如南風則雅之祖也如五子之歌則又變風變雅之祖若頌者獨無所祖書曰八音克諧神人以和又曰搏拊琴瑟以詠祖考来格則祭祀亦必有詩歌而無可考者意者太古之時詩之體未備和氣所感和聲所播形為詩歌被之金石管絃施之燕享祭祀均此詩也未甞不可通用初不必歌功頌徳極揄揚賛嘆之盛而後謂之頌也至周之時風雅頌之别始截然周室既東而詩樂亦頗殘缺失次必孔子之聖周流四方參互考訂然後䏻知其説所謂吾自衛反魯然後樂正雅頌各得其所是也然肆夏樊遏渠即時邁執競思文也本頌也而叔孫穆子以為天子享元侯之詩豈周人雅頌亦通用邪􅂉叔孫穆子之時未經夫子釐正故簡編失次遂誤以頌為雅邪周禮大司樂掌成均之法以治建國之學政而合國之子弟焉以樂語教國子興道諷誦言語興者以善物喻善事道者言古以刺今倍文曰諷以聲節之曰誦發端曰言答述曰語太師教六詩曰風曰賦曰比曰興曰雅曰頌以六徳為之本以六律為之音瞽矇掌九徳六詩之歌以役太師役為之使也前漢禮樂志周詩既備而其器用張陳周官興焉典者自卿大夫之子弟也皆學九徳誦六詩習六舞五聲八音之和然自雅頌之興而所承衰亂之音猶在是謂淫過凶嫚之聲為之設禁焉陳氏樂書曰周官大司樂言奏九徳之歌九㲈之舞瞽矇掌九徳之歌以役太師大㲈舜樂也謂之九㲈之舞則大夏禹樂也謂之九徳之歌豈非九夏之樂乎樂師凡射以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節及􅜂帥學士而歌徹注云徹者歌雍雍在周頌臣工之什儀禮鄉飲酒工歌鹿鳴四牡皇皇者華笙南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀乃合樂周南闗雎葛覃卷耳召南鵲巢采蘩采蘋孔氏曰召南三篇越草蟲而取采蘋盖采蘋初在草蟲之前孔子以後簡札始倒工吿扵樂正曰正樂備燕禮工歌鹿鳴四牡皇皇者華笙奏南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀遂歌鄉樂周南闗雎葛覃卷耳召南鵲巣采蘩采蘋太師吿扵樂正曰正歌備陳氏樂書曰工歌則琴瑟以詠而已笙不與焉笙入則衆笙而已間歌不與焉間歌則歌吹間作未至扵合樂也合樂則工歌笙入間歌並作而樂扵是備矣大用之天下小用之一國其扵移風易俗無自不可况用之鄉人乎風天下而正夫婦實本扵此然則觀之者豈不知王道之易易也哉鄉飲酒義曰工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工歌樂備遂出一人揚觶乃立司正焉知其􅀎和樂而不流也由是觀之工歌鹿鳴四牡皇華所以寓君臣之教則升歌三終也笙入堂下㲈南北而立樂南陔白華華黍所以寓父子之教則笙入三終也間歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀所以寓上下之教間歌三終也合樂周南闗雎葛覃卷耳召南鵲巢采蘩采蘋所以寓夫婦之教則合樂三終也三終雖主扵詩篇亦樂成扵三以反為文故也大射禮乃歌鹿鳴三終乃管新宫三終篇亡奏貍首以射射義曰天子以騶虞為節諸侯以貍首為節卿大夫以采蘋為節士以采蘩為節詩云曽孫侠氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽注云騶虞采蘋采蘩今詩篇名狸首逸曾孫侯氏謂諸侯也春秋左氏傳曰文公四年衛寗武子来聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也肄習也魯人失所賦寗武子佯不知此所謂其愚不可及昔諸侯朝正扵王朝而受正教也王宴樂之扵是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功敵當也愾恨怒也王扵是乎賜之彤弓一彤矢百旅弓矢千以覺報宴覺眀也今陪臣来繼舊好方論天子之樂故自稱陪臣君辱貺之其敢干大禮以自取戾襄公四年穆叔如晉報聘晉侯享之金奏肆夏之三不拜肆夏樊遏渠即時邁執競思文也工歌文王之三又不拜文王大眀緜歌鹿鳴之三三拜鹿鳴四牡皇皇者華韓獻子使行人子貟問之曰子以君命辱扵敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細何也對曰三夏天子之所以享元侯也使臣不敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮扵周臣聞之訪問扵善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜襄公二十九年吴公子札来聘請觀扵周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌􅆁鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之徳如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫􅀎夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以徳輔此則眀主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令徳之後誰􅀎若是為之歌陳曰國無主其􅀎乆乎淫聲放蕩無所畏忌故曰國無主自檜以下無譏焉為之歌小雅曰美哉思而不貳怨而不言其周徳之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熈熈乎曲而有直體其文王之徳乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不􅂝遷而不淫復而不􅌅哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛徳之所同也注云頌有􅇻魯故曰盛徳之所同也按太史公言詩三百五篇孔子皆絃歌之以求合韶武雅頌之音今觀季子請觀周樂而魯人為之歌諸詩二南以下十五國風二雅三頌皆繫焉則此三百五篇者皆被之絃歌掌之司樂工師以時肄習之所謂雅樂也盖非始扵夫子矣而晦庵辯桑中詩序其説曰雅者二雅是也鄭者緇衣以下二十一篇是也衛者􅆁鄘三十九篇是也桑間衛之一篇桑中之詩是也二南雅頌祭祀朝享之所用也鄭衛桑濮里巷狭邪之所歌也今不察此乃欲為之諱其鄭衛桑濮之實而文之以雅樂之名又欲從而奏之宗廟之中朝廷之上則未知其将以薦之何等之鬼神用之何等之賓客乎盖鄭衛國風如桑中溱洧諸篇所言皆淫奔謔浪之辭序者以為刺奔而晦庵盡斥序説以為淫奔之人所自賦之詩故疑其非雅樂也愚以為未然盖季子所觀樂者周樂也使鄭衛諸詩為里巷狭邪所用則周樂安得有之而魯之樂工亦安􅀎歌異國淫邪之詩乎然甞因是考之詩之被扵絃歌也不過以為宴享賓客祭祀鬼神之用但求之三百五篇惟周頌三十一篇商頌五篇為祭祀之詩小雅鹿鳴以下彤弓以上諸篇為宴享之詩此皆其經文眀白而復有序説可證者也至扵周南以下十五國風小雅自六月而下大雅自文王而下以至魯頌之四篇則序者以為美刺之詞盖但􅀎言其文義之所主而不􅀎眀其聲樂之所用矣左傳所載列國諸侯大夫聘享賦詩大率多㫁章取義以寓已意如秦穆公将納晉文公宴之而賦六月季武子譽韓宣子嘉樹宴之而賦甘棠盖借二詩以眀贊誦之意又如荀林父送先蔑而為賦板之卒章叔孫豹食慶封而為賦相䑕盖借二詩以眀箴規之意他若是者不一而足皆是因事寓意非曰此宴必合賦此詩也獨儀禮所載鄉飲酒禮燕禮射禮工歌間歌合樂之節及穆叔所言天子享元侯與兩君相見之禮則専有其詩然考其歌詩合樂之意盖有不可曉者夫闗雎鵲巢閨門之事后妃夫人之詩也何預扵鄉宴而鄉飲酒燕禮歌之采蘋采蘩夫人大夫妻􅀎主祭之詩也何預扵射而射禮用之肆夏樊遏渠宗廟配天之詩也何預扵宴飲而天子享元侯用之文王大眀緜文王興周之詩也何預扵交鄰而兩君相見歌之以是觀之其歌詩之用與詩人作詩之本意盖有判然而不相合者不知其何説晉荀偃曰歌詩必類而今如儀禮及穆叔所言則類者少不類者多若必就其文詞之相類則鄉飲酒所歌必伐木行葦之屬射禮所歌騶虞而下必車攻吉日之屬天子享元侯所歌必蓼蕭湛露彤弓之屬方為合宜子貢見師乙而問焉曰賜聞聲歌各有宜如賜者宜何歌也師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉寛而静柔而正者宜歌頌廣大而静䟽逹而信者宜歌大雅恭儉而好禮者宜歌小雅正直而静㢘而謙者宜歌風肆直而慈愛者宜歌商溫良而􅀎斷者宜歌齊夫歌者直已而陳徳也動已而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊眀乎商之音者臨事而屢斷眀乎齊之音者見利而讓臨事而屢斷勇也見利而讓義也有勇有義非歌孰􅀎保此故歌者上如抗下如隊曲如折止如藁木倨中矩句中鉤纍纍乎端如貫珠故歌之為言也長言之也説之故言之言之不足故長言之長言之不足故嗟嘆之嗟嘆之不足故不知手之舞之足之蹈之也漢髙祖既定天下過沛與故人父老相樂醉酒歡哀作風起之詩令沛中僮兒百二十人習而歌之至孝恵時以沛宫為原廟皆令歌兒習吹以相和常以百二十人為員文景之間禮官肄業而已武帝定郊祀之禮乃立樂府采詩夜誦即古之采詩也哀帝罷樂府非鄭衛之音者條奏孔光何武奏不可罷者夜誦貟五人亦在其中也師古曰采詩依古遒人詢路采取百姓謳謡以知政教得失也夜誦者其言辭􅂉祕不可宣露故扵夜中歌誦也有趙代秦椘之謳此非雅聲也以李延年為協律都尉多舉司馬相如等數十人造為詩賦略論律吕以合八音之調延年及父母兄弟皆故倡也女弟得幸為李夫人延年善歌為新變聲是時上方興天地諸祠欲造樂令司馬相如等作詩頌延年輙承意絃歌所造詩謂之新聲曲作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昬祠至眀漢郊祀之歌十九章練時日一四十八句帝臨二十二句青陽三十二句朱眀四十二句西顥五十二句元㝠六十二句惟泰元七二十四句龍建始元年丞相匡衡奏罷鸞路鱗更定詩曰㳙選休成天地八二十六句定丞相匡衡奏罷黼繡周張更詩曰肅若舊典日出入九十三句天馬十太一况一章十二句元狩三年馬生渥洼水中作天馬徕二十四句太初四年誅宛王獲馬作樂又有二章曰太一曰蒲梢各七言四句見書非此十九章内天門十一三十三句景星十二二十六句元鼎五年得鼎汾隂作齊房十三八句元封二年芝生廿泉齊房作后皇十四八句華􅂱􅂱十五三十八句五神十六二十句朝隴首十七二十句元狩元年行幸雍獲白麟作象載瑜十八十一句大始三年行幸東海獲赤鴈作赤蛟十九二十八句陳氏樂書曰漢郊廟詩歌未有祖宗之事而八音均調又不叶鍾律内之掖庭才人外之上林樂府皆以鄭聲施之朝廷自公卿大夫觀聼者但識其鏗鏘而不諭其意欲以風動衆庶豈不難哉又如馬象赤蛟之類皆歌之宗廟汲黯曰凡王者作樂上以承祖宗下以化兆民今陛下得馬作以為歌協扵宗廟先帝百姓豈􅀎知其音邪其論不亦正乎哀帝雖有放罷鄭衛之詔減樂府之貟然不􅀎據經倣古制為雅樂亦亡益焉漢有房中樂本周樂秦改曰夀人房中者婦人禱祠扵房中髙祖唐山夫人所作也髙祖好䠂聲故房中是椘聲也孝恵二年使樂府令夏侯寛備其簫管更名曰安世樂安世房中歌十七章大孝備矣八句七始華始十句我定歴數八句王侯秉徳七句海内有姦八句大海蕩八句安其所八句豐草葽八句雷震震十句都荔遂芳十句桂華八句美芳八句嘉薦芳矣八句皇皇鴻眀六句浚則師徳四句孔容之常八句承帝眀徳八句漢短簫鐃歌亦曰鼓吹曲多叙戰陣之事凡二十二曲朱鷺鷺惟白色漢有朱鷺之祥因而為詩思悲翁艾如張溫子昇曰辭云誰在閑門外羅家諸少年張機􅅾艾側結網槿籬邉若能飛自勉豈為繒所纒黄雀倘為戒朱􅁝猶可延此艾如張之事也觀李賀詩有艾葉綠花誰剪刻中藏禍機不可測則以剪艾葉為䔩張之具也上之囬漢武帝元封初因至雍遂通囬中道後數㳺幸焉其歌稱帝㳺石闗望諸國月支臣匈奴服盖誇時事也擁離戰城南古辭云戰城南死郭北野死而不𦵏烏可食此言野死不得𦵏為烏鳥所食􅂅為忠臣義士朝出戰而暮不得歸後来作者體此意巫山髙古辭巫山髙髙以大淮水深深以逰大略言江淮深無梁以渡臨水逺望思歸而已後之作者皆渉陽臺雲雨之説非舊意也上陵漢章帝元和二年帝自作詩四篇一曰思齊姚皇二曰六麒麟三曰竭肅雍四曰渉屺與鹿鳴承元器二曲為宗廟食舉又以重来上陵二曲合八曲為上陵食舉據此所言自是八曲之一名􅂉作扵武帝之前亦不可知盖因上陵而為之也将進酒有所思亦曰嗟佳人漢大樂食舉十三曲第七曰有所思亦以此樂侑食芳樹上邪君馬黄古詞云君馬黄臣馬蒼二馬同逐臣馬良終言美人歸以南以北駕車馳馬令我心傷但取第一句以命題其主意不在馬也雉子斑聖人出臨髙臺逺如期亦曰逺期漢大樂食舉十三曲一曰鹿鳴二曰重来三曰初造四曰侠安五曰来六曰逺期七曰有所思八曰眀星九曰清涼十曰渉大海十一曰大置十二曰承元氣十三曰海淡淡魏時以逺期承元氣海淡淡三曲為不通利故省之石留務成元雲黄爵行釣竿篇伯常子避仇河濱為漁父其妻思之而為釣竿歌每至河側輙歌之後司馬相如作釣竿詩遂傳以為樂曲夹漈鄭氏曰古之逹禮三一曰燕二曰享三曰祀所謂吉凶軍賓嘉皆主此三者以成禮古之逹樂三一曰風二曰雅三曰頌所謂金石􅁝竹匏土革木皆主此三者以成樂禮樂相須以為用禮非樂不行樂非禮不舉自后䕫以来樂以詩為本詩以聲為用八音六律為之羽翼耳仲尼編詩為燕享祀之時用以歌而非用以説義也古之詩今之詞曲也若不䏻歌之但能誦其文而説其義可乎不幸腐儒之説起齊魯韓毛四家各為序訓而以説相髙漢朝又立之學官以義理相受遂使聲歌之音湮沒無聞然當漢之初去三代未逺雖經生學者不識詩而太樂氏以聲歌肄業徃徃仲尼三百篇瞽史之徒例能歌也奈義理之説日勝則聲歌之學日微東漢之末禮樂蕭然雖東觀石渠議論紛紜無補扵事曹孟徳平劉表而得漢雅樂郎杜䕫䕫老乆矣不肄習所得扵三百篇者惟鹿鳴騶虞伐檀文王四篇而已餘聲不傳太和末又失其三左延年所得惟鹿鳴一篇每正旦大會太尉奉璧羣臣行禮東廂雅樂常作者是也古者歌鹿鳴必歌四牡皇皇者華三詩同節故曰工歌鹿鳴之三而用南陔白華華黍三笙以贊之然後首尾相承節奏有屬今得一詩而如此用可乎應知古詩之聲為可貴也至晉室鹿鳴一篇又無傳矣自鹿鳴一篇絶後世不復聞詩矣然詩者人心之樂也不以世之汚隆而存亡豈三代之時人有是心心有是樂三代之後無是心心無是樂乎繼三代之作者樂府也樂府之作宛同風雅但其聲散佚無所紀系所以不得嗣續風雅而為流通也按三百篇在成周之時亦無所紀系有季札之賢而不别國風所在有仲尼之聖而不知雅頌之分仲尼為此患故自衛返也問扵太師氏然後取其正焉列十五國風以眀風土之音不同分大小二雅以眀朝廷之音有間陳周魯商三頌之音所以侑祭也定南陔白華華黍崇邱由庚由儀六笙之音所以叶歌也得詩而得聲者三百篇則系扵風雅頌得詩而不得聲者則置之謂之逸詩如河水祈招之類無所系也今樂府之行扵世者章句雖存聲樂無用崔豹之徒以義説名吴兢之徒以事觧目盖聲失則義起其與齊魯韓毛言詩無以異也樂府之道􅂉㡬乎息矣按夹漈以為詩本歌曲也自齊魯韓毛各有序訓以説相髙義理之説既勝而聲歌之學日微矣愚甞因其説而䆒論之易本卜筮之書也後之儒者知誦十翼而不䏻曉占法禮本品節之書也後之儒者知誦戴記而不能習儀禮皆義理之説太勝故也先儒盖甞病之矣然詩也易也禮也豈與義理為二物哉盖詩者有義理之歌曲也後世狭邪之樂府則無義理之歌曲也易者有義理之卜筮也後世俗師之占書則無義理之卜筮也禮者有義理之品節也秦漢而後之典章則無義理之品節也郊特牲曰禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也荀子曰不知其義謹守其數不敢損益父子相傳以持王公是官人百吏所以取秩祿也盖春秋戰國之時先王之禮制不至淪䘮故巫史卜祝小夫賤𨽻皆能知其數而其義則非聖賢不䏻推眀之及其流傳既乆所謂義者布在方冊格言大訓炳如日星千載一日也而其數則湮沒無聞乆矣姑以漢事言之若詩若禮若易諸儒為之訓詁轉相授受所謂義也然制氏能言鏗鏘鼓舞之節徐生善為容京房費直善占所謂數也今訓詁則家傳人誦而制氏之鏗鏘徐生之容京費之占無有能知之者矣盖其始也則數可陳而義難知及其乆也則義之難眀者簡編可以紀述論説可以傳授而所謂數者一日而不肄習則亡之矣數既亡則義孤行扵是疑儒者之道有體而無用而以為義理之説太勝夫義理之勝豈足以害事哉夹漈鄭氏曰三代既沒漢魏嗣興禮樂之来陵夷有漸始則風雅不分次則雅頌無别次則頌亡次則禮亡按上之囬聖人出君子之作也雅也艾如張雉子班野人之作也風也合而為鼓吹曲燕歌行其音本幽薊則列國之風也煌煌京洛行其音本京華則都人之雅也合而為相和歌風者鄉人之用雅者朝廷之用合而用之是為風雅不分然享大禮也燕私禮也享則上兼用下樂燕則下得用上樂是則風雅之音雖異燕享之用則通及眀帝定四品一曰大予樂郊廟上陵用之二曰雅頌樂辟雍享射用之三曰黄門鼓吹樂天子宴羣臣用之四曰短簫鐃歌樂軍中用之古者雅用扵人頌用扵神武帝之立樂府采詩雖不辨風雅至扵郊祀房中之章未甞用扵人事以眀神人不可以同事也今辟雍享射雅頌無分應用頌者而改用大予應用雅者而改用黄門不知黄門大予扵古為何樂乎風雅通歌猶可以通也雅頌通歌不可以通也􅈠魏凖鹿鳴作於赫篇以祀武帝凖騶虞作巍巍篇以祀文帝凖文王作洋洋篇以祀眀帝且清廟祀文王執競祀武王莫非頌聲今魏家三廟純用風雅此頌之所以亡也頌亡則樂亡矣是時樂雖亡禮猶存宗廟之禮不用之天眀有尊親也鬼神之禮不用扵人知有幽眀也梁武帝作十二雅郊廟眀堂三朝之禮展轉用之天地之事宗廟之事君臣之事同其事矣樂之失也自漢武始其亡也自魏始禮之失也自漢眀始其亡也自梁始禮樂淪亡之所由不可不知也按夹漈此論拳拳乎風雅頌之别而以為漢世頗謬其用然漢眀帝之樂凡四今所傳者惟短簫鐃歌二十二曲而所謂大予所謂雅頌所謂黄門鼓吹則未甞有樂章至扵短簫鐃歌史雖以為軍中之樂多叙戰陣之事然以其名義考之若上之囬則廵幸之事也若上陵祭祀之事也若朱鷺則祥瑞之事也至艾如張巫山髙釣竿篇之屬則又各指其事而言非專為戰伐也魏晉以来倣漢短簫鐃歌為之而易其名扵是專叙其創業以来伐叛討亂肇造區宇之事則純乎雅頌之體是魏晉以来之短簫鐃歌即古之雅頌矣漢鞞歌舞五曲闗中有賢女章和二年中漢章帝所造樂乆長四方皇殿前生桂樹夹漈鄭氏曰右鞞舞之歌五曲未詳所始漢代燕享則用之傅毅張衡所賦皆其事也章和二年則章帝所作舊詞並亡􅈠植鞞舞詩序云故西園鼓吹李堅者䏻鞞舞遭世亂越闗西随将軍段煨先帝聞其舊伎下書召堅堅年踰七十中間􅆸而不為又古曲甚多謬誤異代之文未必相􅊞故依前曲作新歌五篇晉泰始中又製其詞焉按鞞舞本漢巴渝舞髙祖自蜀漢伐䠂其人勇而善鬭好為歌舞帝觀之曰武王伐紂之歌使工習號曰巴渝舞其舞曲四篇一曰矛渝二曰安弩渝三曰安臺四曰行辭其辭既古莫能曉句讀魏使王粲制其辭粲問巴渝師而得歌之本意故改為矛渝新福弩渝新福安臺新福行詞新福四歌以述魏徳其舞故常二八桓元将僭位尚書殿中郎袁眀子啟增滿八佾梁復號巴渝隋文帝以非正典罷之陳氏樂書曰昔新都初獻樂扵眀堂清厲而哀非興國之聲其為東漢之資歟東漢蔡邕叙樂四品郊廟神靈一也天子享燕二也蕭子雲曰南郊樂歌二漢同用五郊互奏之至扵廟樂則眀帝時東平王蒼等制歌舞一曲十四句薦扵世祖之廟自時厥後盖亦有其文矣至扵臨朝享燕樂聲尤備遭董卓之亂典章㷊蕩故不存焉當是時也光武喜鄭聲順桓説悲聲靈帝耽胡樂若梁商大臣朝廷之望也會賓以薤露之歌為樂京師近地諸夏之本也嘉會以魁􅳤挽歌之技為樂豈國家乆長之兆也然則人主之為樂可不戒之哉魏武帝平􅍮州獲漢雅樂郎河南杜䕫使創定雅樂又有散騎常侍鄧静尹商善訓雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅服養曉知先代諸舞䕫􅊖總領之逺詳經籍近採故事考會古樂始議軒縣鐘磬而黄初中柴玉左延年之徒復以新聲被寵改其聲韻魏短簫鐃歌十二曲椘之平言魏也代漢朱鷺戰滎陽言曹公也代漢思悲翁獲吕布言曹公圍臨淮擒吕布代漢艾如張克官渡言曹公破袁紹扵官渡代漢上之囬舊邦言曹公勝袁紹還譙收死亡士卒代漢擁離定武功言曹公初破鄴代漢戰城南屠栁城言曹公破三郡烏丸扵栁城代漢巫山髙平南荆言曹公平􅍮州代漢上陵平闗中言曹公征馬超定開中代漢将進酒應定期言文帝受命應期代漢有所思邕熈言君臣邕穆庶績熈代漢芳樹太和言眀帝繼統得太和代漢上邪魏鞞舞歌五曲眀眀魏皇帝代漢闗中有賢女太和有聖帝代漢章和二年中魏厯長代漢樂乆長天生烝民代漢四方皇為君既不易代漢殿前生桂樹陳氏樂書曰魏文帝既受漢禪雖有改樂舞之名無變詩歌之實故蕭子顯曰魏辭不見疑用漢辭也沈約曰魏國初建使王粲登歌安世及巴渝詩而已後並作扵太祖之廟今安世之辭不行扵世獨著渝時斂焉考之晉志漢巴渝舞有矛渝弩渝安臺行辭本歌曲四篇其辭既古莫䏻曉其句讀魏初乃使王粲更造其辭為矛渝弩渝安臺行辭新福歌曲其述魏徳特行辭一篇而已用之郊廟豈足以形容功徳吿扵神眀也哉吴使韋昭倣漢鐃歌作十二曲以述功徳炎精缺言漢室衰微孫堅奮起志在匡救王迹始此也漢之季言堅悼漢之微興兵討董卓也攄武師言權卒父業征伐也烏林言周瑜破魏武扵烏林也秋風言權悦以使人人忘其死也克皖城言權親破魏武扵皖城闗背徳言蜀将闗羽背徳而禽之也通荆州言權與蜀交好後闗羽背徳終復舊好也章洪徳言權章其大徳而逺方来附也順厯數言權順圗籙之符而建大號也承天命言以徳踐位道化至盛也元化言修文武則天行仁澤天下喜樂也文獻通考卷一百四十一
