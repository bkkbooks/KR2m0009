德配以閼伯以時修祀益固炎圖詔禮部太常寺討論太常寺討論得應天府祀大火繫以季春秋擇日差官於本廟致祭今道路未通從宜於行在春秋設位臣僚言多事以來大火之祀弗舉比年多災雖縁有司不戒然預防之計宜無所不用其至望命有司參酌舊典即行在每建辰戌出納之月設位望祭豈特昭炎德昌熾之福亦弭災之道尋太常寺請以季春出火日於東郊季秋納火日於西郊各建壇壝以大祠之禮禮火神禮料依感生帝詳見祀五帝門詔擇地建泰一宫先是命禮官考典故十月癸卯上之曰太平興國初司天楚芝蘭建言泰一有十曰五福君基大遊小遊天一臣基直符民基四神地一天之尊神也五神所在無兵疫人民豐樂自雍熙元年入㢲宫吳分蘇州請建宫都城東南蘇村以應蘇臺之名乃建東泰一宫八年宫成合千一百區凡十殿四廊圖三皇五帝九曜七元天地水三官南斗三台二十八宿天曹四司十精泰一五嶽儲副佐命十二山神八卦六丁五行四瀆本命等神及四直靈官三十六神將像五百二十四軀天聖六年司厯者言泰一入蜀之坤宫又建西宫於八角鎮前後東西凡四殿又建齋殿塑像自内出始鑄印給之熙寧四年十月司天言甲寅五福當入中都又建中宫於集禧觀政和間改龍德宫為北泰一宫今四立日皆望祀泰一於惠照設位宜擇地建宫詔兩浙漕臣營之癸丑詔製像於新宫十一月甲戌禮官謂泰一冠服不載於傳記略記東西宮像服道冠仙衣侍臣二人服道衣童子二人青衣執紅絲拂中泰一宫道流朱忠焕亦謂十神泰一皆服通天冠絳服執圭從臣梁冠絳服執笏童子執紅絲拂請如其飾及名諸殿十八年正月癸未又請上書其榜泰一殿曰靈休殿門曰崇真挾殿曰瓊章寳室三清殿曰金闕寥陽火德殿曰明離本命殿曰介福齋殿曰齊明三月宫成凡百七十有四區十泰一位於殿上南面西上從祀東廡九十有八西廡九十有七皆北上乙亥設官榜丙子奉安神像用細仗二百人鈞容樂親從威儀道士皆百人宰臣為奉安使上親謁泰一宫前期有司張帟於齋殿設褥位於靈休殿介福殿上之東西向及香案之前設羣臣次宫之内外質明帝服履袍自崇政殿輦出宫北門至齋殿降輦羣臣先入班於靈休殿下皆北面帝自齋殿後歩至宫之東廡入便門升殿東側階至褥位西面立再拜羣臣皆再拜凡帝拜羣臣皆拜帝進五福泰一前三上香再拜次至君基大遊小遊天一地一四神臣基民基直符前皆如五福之儀還褥位再拜羣臣自西廡班於介福殿下帝降由東廡升介福殿東側階至褥位西面立再拜進建生星斗君前三上香再拜次至本命元辰真官前亦如之帝還褥位若命宰臣炷香則宰臣升自西階以次上香畢降階帥羣臣再拜帝再拜還齋殿羣臣皆退帝還宮太常寺主簿林大鼐言十神泰一九宫泰一皆天之貴神國朝分而為二並為大祀比新泰一宫而九宫貴神尚寓屋而不壇與小祀雜乃詔臨安府於國城之東擇爽塏地建九宫貴神壇壝其儀如祀上帝以泰一攝提權星招搖天符青龍咸池太陰天一為序牲以少牢籩豆十有二玊以圭璧泰一幣以黑攝提招搖天符以黄權星以青青龍以紫咸池以白太陰以紅天一以赤孝宗乾道五年太常少卿林栗等言本寺已擇九月十四日依元降㫖設位望祭應天府大火以商邱宣明王配二十一日内火祀大辰以閼伯配大辰即大火閼伯即商邱宣明王國朝以來建號以火紀德大祖皇帝光堯夀聖太上皇帝皆受命於宋故推原發祥儲祉之所自崇建商邱之祠府曰應天廟曰光德加封王爵錫諡宣明所以追嚴者備矣今有司旬日之間舉行二祭一稱其號一斥其名義所未安乞自今立夏日祀熒惑季春出火季秋内火祀火神其配位稱閼伯者祝文位版並依應天府大火禮例改稱商邱宣明王以稱國家崇奉火正之意從之文獻通考巻八十
