body:
  text: 文獻通考卷八十鄱陽馬端臨貴與著郊社考十三祭星辰大宗伯以實柴祀日月星辰實柴實牛柴上也星謂五緯辰謂日月所會十二次方疏曰五緯即五星東方嵗星南方熒惑西方太白北辰星中央鎮星言緯者二十八宿隨天左轉為經五星右旋為緯按昭七年左氏傳晉侯問伯瑕曰何謂六物對曰歳時日月星辰是謂也公曰多語寡人辰而莫同何謂辰對曰日月之㑹是謂辰故以配日是其事但二十八星面有七不當日月之㑹直謂之星若日月所㑹則謂之宿謂之辰謂之次亦謂之房故尚書允征云辰弗集於房孔註云房日月所㑹是也祭義曰郊之祭也大報天而主日配以月則郊祭并祭日月可知其餘星也辰也亦自明矣以槱燎祀司中司命風師雨師槱羊九反燎良召反柴槱積也詩曰芃芃棫樸薪之槱之積實牲體焉燔燎而升烟所以報陽也鄭司農云司中三能三階也司命文昌宫星風師箕也雨師畢也元謂司中司命文昌第五第四星或曰中能上能也命棫音域樸音卜能他來反春官黄氏曰司中司文昌第五第四星未可信鄭又以為中能上能則當時已有兩説矣又曰風師箕雨師畢亦未可信箕好風畢好雨見於書者如此即以為風師雨師恐未然也三代之禮散亡久矣諸儒之説於經有據而理安者方可信出於䜟緯不經與凡臆度義起而於理不安者皆難信楊氏曰先鄭釋司中司命是一説後鄭又是一説竊謂惟皇上帝降𠂻於民非帝之外别有司中之神也乾道變化各正性命非乾道之外别有司命之神也盖統言之則曰帝曰乾祀典專指一事之所主而祀之以報其德則曰司中曰司命義與司民司禄同注家穿鑿異同又以星象言之過矣小司㓂孟冬祀司民獻民數於王王拜受之司民星名謂軒轅角也小司㓂於祀司民而獻民數於王重民也孟秋官司民三年大比以萬民之數詔司㓂司㓂及冬祀司民之日獻其數於王王拜受之登於天府司疏曰云及孟冬祀司民之口者謂司㓂於孟冬祭祀民星之日以與司民為節此日司㓂獻其民數於王云王拜受之登於天府者重此民數民為邦本故也先鄭云文昌宫三能屬軒轅角相與為體近文昌為司命次司中次司禄次司民武陵太守星傳文昌第一曰上將第二曰次將第三曰貴相第四曰司命第五曰司中第六曰司禄不見有司民三台六星兩兩相居起文昌東南别在太微亦無司民之事故後鄭不從云司民軒轅角也者按軒轅星有十七星如龍形有兩角角有大民小民故依之也天府若祭天之司民司禄而獻民數穀數則受而藏之數穀數上所主反下所具反也司民軒轅角也司禄文昌第六星或曰下能禄之言穀也年穀登乃後制禄祭此二星者以孟冬既祭之而上民穀之數於天府上時掌反楊氏曰愚按當獻民數之時而祭司民所以報天生烝民之德也當獻穀數之時而祭司禄所以報天生百榖之德也然則所謂天者其昊天上帝歟曰莫非天也凡天之生物只氣數到自生天生烝民有烝民之氣數百榖雖植物亦有百榖之氣數氣數之所主處便自有神亦如五土之神五榖之神之𩔖是也即一事之所主而名之曰司因一事之功而祭報之則曰司民司禄之神亦如司春司夏司寒司中司命之𩔖是也其大者如乾坤六子之神日月星辰之神嶽瀆山川之神亦不越乎氣數所以成變化而行鬼神者此也先鄭後鄭以星言之人各一説此不可以為據按祀司中司命司民司禄出於周禮注家以為四司皆星也未知何據而星宿之名多出於緯書又先後鄭之説自為牴牾此後人之所以難據以為信也但信齋楊氏皆歸之於天與氣數而以為非有一星以主之則其説又似太渺茫盖天之有日月星辰猶君之有百司庶府也謂品物嵗功一出於天而無日月星辰以司之是猶謂政教號令一出於君而無百司庶府以行之也况金木水火土人間有此五物則天上亦有此五星以主之而洪範言星有好風星有好雨則司風雨者亦星也然則司中司命司民司禄何害其為星乎玊人之事圭璧五寸以祀日月星辰注見祭日月門大司樂乃奏黄鍾歌大吕舞雲門以祀天神天神謂五帝及日月星辰孟冬天子乃祈來年於天宗注謂祭日月星辰也月令傳幽宗祭星也幽宗祭星壇名也幽闇也宗當為禜禜壇域也星至夜而出故曰幽也為塋域而祭之故曰幽禜也祭法日月星辰之神則雪霜風雨之不時於是乎禜之昭公元年左氏傳祭星曰布李廵曰祭星者以祭布露也故曰布孫炎曰既祭布散於地似星布列也祭風曰磔謂披磔牲體象風之散物因名云郭云今俗當大道中磔狗云以止風此其象祀爾雅楊氏曰肆師立大祀次祀小祀先鄭云小司命已下後鄭云小祀又有司中風師雨師黄氏曰風雨功用博必非小祀也鄭以風雨為算畢星亦有玉豈小祀哉按黄氏云算畢星亦有玊者圭璧以祀日月星辰按大司樂乃奏姑洗歌南呂舞大㲈以祀四望後鄭注云此言祀者司中司命風師雨師或亦用此樂與疏曰大宗伯天神云祀地祗云祭人鬼云享四望是地祗不云祭而變稱祀明經意本同司中等神故變文見用樂也無正文故云或與以疑之也季冬乃畢祀天之神祗天之神祗司中司命風師雨師月令周制仲秋之月祭靈星於國之東南東南祭之就嵗星之位也嵗星五星之始最尊故就其位王者所以復祭靈星者為人祈時以種五榖故别報其功也五經通義曰靈星為立尸故云絲衣其紑載弁絿絿言王者祭靈星公尸所服也月令立春後丑日祭風師於國城東北立夏後申日祀雨師於國城西南秋分日享壽星於南郊夀星南極老人星立冬後亥日祀司中司命司民司禄於國城西城北秦始皇時雍有日月參辰南北斗熒惑太白嵗星鎮星辰星二十八宿風伯雨師廟各以嵗時奉祠漢高祖八年命郡國縣邑立靈星祠時或言周興而邑立后稷之祀至今血食以其有播種之功也於是髙祖命立靈星祠三輔故事長安城東十里有靈星祠一云靈星龍左角為天田主穀農祥晨見而祭之言祠后稷而謂之靈星者以后稷又配食星也常以嵗時祠以牛古時嵗再祭靈星春秋用少牢壬辰位祠之壬為水辰為龍就其𩔖也縣邑令長侍祠舞者童男十六人即古之二羽舞象教田初為芟除次耕種次耘耨驅爵及穫刈舂簸之形象成功也武帝時亳人謬忌奏祠泰一方曰天神貴者泰一泰一佐者五帝古者天子以春秋祭泰一東南郊日一太牢七日每日以一太牢凡七日祭也為壇開八通之鬼道於是天子令太祝立其祠長安城東南郊常奉祠如忌方其後人上書言古者天子三年一用太牢祠三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方置壽宫神君夀宫奉神之宫也神君最貴者曰泰一其佐曰太禁司命之屬皆從之非可得見聞其言言與人音等時去時來來則風肅然居室帷中時晝言然常以夜天子祓然後入崇潔自除祓然後入因巫為主人闗飲食所欲言行下神所欲言下之於巫又置壽宫北宫張羽旗設供具以禮神君神君所言上使受書其名曰畫法䇿畫之法也其所言世俗之所知也無絶殊者而天子心獨喜其事祕世莫知也或言五帝泰一之佐也宜立泰一而上親郊之上疑未定齊人公孫卿奏黄帝上僊事乃拜卿為郎使東候神於太室上幸甘泉令祠官寛舒等具泰一祠壇祠壇放薄忌即謬忌泰一壇三陔三重也五帝壇環居其下泰一所用如雍一畤物而加醴棗脯之屬殺一氂牛音狸西南夷長尾髦之牛以為俎豆牢具而五帝獨有俎豆醴進其下四方地為腏食羣神從者及北斗云腏字與餟同謂聨續而祭也已祠胙餘皆燎之泰一祝宰則衣紫及繡天子始郊拜泰一如雍郊禮伐南越告禱泰一以牡荆畫幡日月北斗登龍以象泰一三星為泰一鏠旗牡荆作幡柄而畫幡為日月龍及星三星太一旁三星三公也命曰靈旗為兵禱則太史奉以指所伐國又作明堂汶上每修封則祠泰一五帝於明堂上坐合高皇帝祠對之按泰一莫知其何神天官書言中宫天極星其一明者泰一常居則其為星也明矣祭法雖有幽禜之禮然叙其事於祭天地四時寒暑日月之後則亦非祀典之首也漢承秦制以祀五帝為郊天至武帝時採謬忌之説則以為五帝特泰一之佐於是具泰一祠壇在五帝之上帝親郊拜則以事天之禮事之矣然郊祀明堂巍然受祭天之禮何其崇極也至於因巫為主人闗飲食所欲言行下則又何其猥屑也武帝惑於方士求僊延年之説故所以事鬼神者其諂且瀆至於如此宣帝立嵗星辰星太白熒惑南斗祠於長安城旁漢舊儀祭參辰星於池陽谷口夾道左右為壇塋覆各周三十六里成帝時匡衡奏罷雍舊祠二百三所惟山川諸星十五所為應禮云平帝時王莽奏分羣神以𩔖相從為五部兆鎮星從黃帝嵗星從青帝熒惑從炎帝太白從白帝辰星從黒帝詳見五帝門東漢以仲秋之月祀老人星於國都南郊老人星廟季秋之月祀心星於城南壇心星廟以丙戌日祀風師於戍地以己丑日祀雨師於丑地牲用羊豕晉以仲秋月祀老人星於國都逺郊老人星廟季秋祀心星於南郊壇心星廟東晉以來靈星老人星心星配享南郊不復特祀隋令太史署常以二月八日於署庭中以太牢祀老人星兼祀天皇大帝天一泰一日月五星勾陳北極北斗三台二十八宿丈人星孫星都四十六座凡應合祀享官令太醫給除穢氣散藥先齋一日服之以自潔其儀本之齊制隋於國城西北十里亥地為司中司命司禄三壇同壝祠以立冬後亥國城東北七里通化門外為風師壇祠以立春後丑國城西南八里金光門外為雨師壇祠以立夏後申壇皆三尺牲並以一少牢唐制立春後丑日祀風師於國城東北立夏後申日祀雨師於國城南立秋後辰日祀靈星於國城東南立冬後亥日祀司中司命司民司禄於國城西北已上四祀舊不用樂籩豆各八簋俎等各一也元宗開元二十四年有上封事者言月令云八月日㑹於夀星居次列宿之長請每至八月社日配夀星祠於太社壇享之􅃯曰宜令有司特置夀星壇常以千秋莭日修其祠典又勅夀星壇宜祭老人星及角亢七宿著之常式天寳三載術士蘇嘉慶上言請於城東置九宫神壇壇一成三尺四陛其上依位置小壇九壇髙尺五縱横八尺東南曰招搖正東曰軒轅東北曰太陰正南曰天一中央曰天符正北曰泰一西南曰攝提正西曰咸池西北曰青龍五數為中戴九履一左三右七二四為上六八為下符於遁甲每嵗四孟月祭尊為九宫貴神十月十六日勅無文咸秩有功必祀漢則八神是禱晉則六宗置壇皆議叶當時禮髙羣望惟九宫貴神實司水旱功佐上帝德庇下民冀嘉穀嵗登災害不作至於祀典歴代猶闕豈有享於幽贊之功而無昭報之禮宜令所司即擇處以來月甲子日立壇仍議其牲牢禮秩毎至四時初節令中書門下往攝祭者著以成式垂之不刋後議禮次昊天上帝壇而在太清宫太廟上用牲牢璧𩔖𩔖於天地神其年十二月二十四日親祀九宫貴神壇於東郊初九宫神位四時改位呼為飛位乾元元年後不易位如有司行事即宰臣為之四載勅風伯雨師濟時育物謂之小祀頗紊彛倫去載衆星已為中祀永言此義固合同升自今已後並冝升入中祀仍令諸郡各置一壇因春秋祭社之日同申享祠至九月十六日勅諸郡風伯壇請置在社壇之東雨師壇於社壇之西各稍北三數十歩其壇卑小於社壇造其祀風伯請用立春後丑祀雨師用立夏後申祀所祭各請用羊一籩豆各十簠簋俎一酒三斗應緣祭須一物已上並以當郡公廨社利充如無即以當處官物充其祭官准祭社例取太守已下充五載詔曰發生振蟄雷為其始畫卦陳象威物效靈氣實本於陰陽功大施於動植今雨師風伯久列於常祠惟此震雷未登於羣望其已後每祀雨師宜以雷師同壇祭共牲别置祭器肅宗乾元元年詔九宮貴神減冬夏二祭至二年正月上親祠之至德三年置泰一神壇於南郊東命忠王璵祭之元年丑月親拜南郊又祭泰一壇盖别有禱請非舊制也德宗貞元二年詔問禮官其風師雷師祝版署訖合拜否太常博士陸淳奏以是小祠准禮無至尊親祭之文今雖請御署檢詳經據並無拜禮詔曰風師雨師為中祠有烈祖成命况在風雨至切蒼生今禮雖無文朕當屈已再拜以申子育之意仍永為常式憲宗元和十五年太常禮院奏來年正月三日皇帝有事於南郊同日立春後丑祀風師按周禮大宗伯官以槱燎祀風師鄭元云風箕星也故今禮立春後丑於城東北就箕星之位為壇祭之祀禮昊天上帝於圜丘百神咸秩箕星從祀之位在壇之第三等伏以皇帝有事南郊徧祭之儀百神咸在其五方帝并日月神州已下縁對昊天上帝皇地祇尊不得申並為從祀悉無上公行事并御署祝版之儀風師既是星神厭降之儀便當陪祭如非遇郊祀其特祭如常儀文宗太和二年監察御史舒元輿奏九宫祝版御署稱臣伏以天子之尊除祭天地宗廟之外無稱臣者王者父天母地兄日姊月以九宫為目是分方而守位於天地猶子男也於日月猶侯伯也陛下為天子豈可反臣於天之子男邪臣竊以為過乞令有司詳議正此誤典勅付所司三年以祀九宮壇舊是大祠太常博士崔龜從議曰九宫貴神經典不載天寳中術士奏請遂立祠壇事出一時禮同郊祀臣詳其圖法皆是星名縱司水旱兵荒品秩不過列宿今者五星悉是從祀日月猶在中祠豈容九宫獨越常禮備列王事誡誓百官尊卑乖儀莫甚於此若以常在祀典不可廢除臣請降為中祀從之武宗㑹昌元年中書門下奏九宫貴神壇天寳三載勅宜令次昊天上帝壇在太清宫太廟上用牲牢璧幣𩔖於天地三載十二月元宗親祀乾元二年正月肅宗親祀伏以累年以來水旱僭候恐是有司禱請誠敬稍虧今屬孟春合修祀典望至明年正月祭日差宰臣一人禱請向後四時祭並請差僕射少師少保尚書太常卿等官所冀稍重其事以申嚴敬中書門下奏伏見太和禮官狀云縱司水旱兵荒品秩不過列宿今者五星悉是從祀日月猶在中祠竊詳其意以星辰不合比於天地曾不知統而言之則為天地而在天成象自有尊卑謹按後魏王均志北辰第二星盛而常明者元星露寢大帝常居始由道奥而為變通之迹又天皇大帝其精耀魄寳盖萬神之祕圖與河海之命紀皆禀焉據元説即昊天上帝也天一掌八氣九精之政以佐天極徵明而有常則陰陽序而大運興泰一掌十有六神之法度以輔人極徵明而得中則神人和而王道平又北斗有權衡二星天一泰一參居其間所以財成天地輔相神道也若一概以列宿論之實為淺近按漢書天神貴者泰一泰一佐曰五帝古者天子以春秋祭泰一則列於祀典其來久矣今五帝猶為大祠則泰一豈宜降禮稍重其祀固為得所劉向言祖宗所立神祇誠未易動又曰古今異制經無明文至尊至重難以疑説正也其意不欲非祖宗舊典以劉向之博通尚難於改作况臣等學不究於天人識尤懵於祀典欲為參酌恐未得中伏望更令太常卿與學官同詳定庶獲明據從之其月檢校尚書左僕射王起及國子監廣文博士盧就等奏九宮貴神位列星座往因致福詔立祠壇降至尊以稱臣就東郊而親拜在祀典雖云過禮庇羣生豈患無文思福黔黎特申嚴奉誠聖人屈已以安天下之心也厥後祝史不明精誠亦怠禮官建議降處中祠今聖德憂勤期臻夀域兵荒水旱寤寐軫懷爰命台臣輯興墜典伏惟九宫所稱之神即泰一攝提軒轅招搖天符青龍咸池太陰天一者也謹按黄帝九宫經及蕭吉五行大義一宫其神泰一其星天逢其卦坎其行水其方白二宫其神攝提其星天内其卦坤其行土其方黑三宫其神軒轅其星天衝其卦震其行木其方碧四宫其神招搖其星天輔其卦巽其行木其方綠五宫其神天符其星天禽其卦坤其行土其方黄六宫其神青龍其星天心其卦乾其行金其方白七宮其神咸池其星天柱其卦兌其行金其方赤八宫其神太陰其星天任其卦艮其行土其方白九宫其神天一其星天英其卦離其行火其方紫統八卦運五行土飛於中數轉於極雖敬事迎釐不聞經見而範圍亭育期助昌時以兩朝親祀而臻百祥也然以萬物之精上為列星星之運行畢繫於物貴而居者則必司八氣總萬神斡化權於混茫賦品彚於陰隲與天地日月誠相參也伏請自今以後却用大祀之禮誓官備物無有降差惟御署祝版以社稷為凖稱嗣天子謹遣某官某昭吿伏縁以稱臣於天帝無二尊故也謹具詳議如前勅㫖宜依付所司唐開元禮祀風師雨師靈星司中司命司人司禄儀立春後丑日祀風師於國城東北前祀三日諸應祀之官散齋二日致齋一日並如别儀前祀一日晡後一刻諸衞令其屬各以其方器服守衞壝門俱清齋一宿衞尉設祀官次於東壝之外道南北向以西為上陳饌幔於内壝東門之外道南北向郊社令積柴於燎壇其壇在神壇之左内壝之外方五尺髙五尺開上南出户祀日未明三刻奉禮郎設祀官位於内壝東門之内道北執事位於道南每等異位俱重行西向皆以北為上設望燎位當柴壇之北南向設御史位於壇上西南隅東向令史陪其後於壇下設奉禮位於祀官西南贊者二人在南差退俱西向又設奉禮贊者位於燎壇東北西向北上設祀官門外位於東壝之外道南每等異位重行北向以西為上郊社令帥齋郎設酒罇於壇上東南隅象罇二置於坫北向西上設幣篚於罇坫之所設洗於壇南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵執罇罍篚羃者各位於罇罍篚羃之後太官令帥宰人以鸞刀烹牲於厨祀日未明二刻太史令郊社令升設風師神座於壇上近北南向席以莞設神位於座首未明一刻諸祀官各服其服郊社令良醖令各帥其屬入實罇罍及幣實以醍齊其元酒實於上罇太官令帥進饌者實諸籩豆簠簋入設於内壝東門之外饌幔内奉禮帥贊者先入就位贊引引御史太祝及令史與執罇罍篚羃者入當壇南重行北面以西為上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜執罇者升自東陛立於罇所執罍洗篚羃者各就位贊引引御史太祝詣壇東陛升行掃除於上令史行掃除於下訖各引就位質明謁者引祀官贊引引執事者俱就門外位謁者贊引各引祀官以次入就位立定奉禮曰衆官再拜在位者皆再拜謁者進獻官之左白有司謹具請行事退復位太官令出帥進饌陳於門外初太官令出太祝跪取幣於篚興立於罇所謁者引獻官升自南陛進當神座前北向立太祝以幣東向進獻官受幣進北面跪奠於神座俛伏興少退北面再拜訖謁者引獻官降復位太官令引饌入詣南陛升壇太祝迎引於壇上設於神座前籩豆葢羃先徹乃升簋簠既奠却其盖於下設訖太官令以下降復位太祝還罇所謁者引獻官詣罍洗盥手洗爵訖謁者引獻官自南陛升壇詣罇所執罇者舉羃獻官酌醍齊訖謁者引獻官進神座前北向跪奠爵俛伏興少退北向立太祝持版進於神座之右東面跪讀祝文曰維某年嵗次月朔日子嗣天子謹遣具位臣姓名敢昭吿於風師含生開動必佇振發功施造物實彰祀典謹以制幣犧齊粢盛庶品明薦於神尚享訖興獻官再拜太祝進跪奠版於神座興還罇所獻官拜訖謁者引獻官立於南方北向太祝以爵酌福酒進獻官之右西向立獻官再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫獻官俛伏興太祝帥齋郎進俎太祝跪減神前胙肉加俎興以俎西向進獻官受以授齋郎謁者引獻官降復位太祝進跪徹籩豆還罇所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜在位者皆拜已飲福受胙者不拜謁者進獻官之左白請就望燎位遂引獻官就望燎位南向立太祝執篚跪取幣祝版齋郎以俎載牲體黍稷飯爵酒興自南陛降壇南行當柴壇南東行自南陛登柴壇以幣祝版饌物置柴上戸内訖奉禮曰可燎東西面各二人以炬燎火半柴謁者進獻官之左白禮畢遂引獻官出贊引引執事者以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出立夏後申日祀雨師於國城南有司行事祝文曰百昌萬寳式仰膏澤率遵典故用備常祀其首尾與風師文同立秋後辰日祀靈星於國城東南有司行事祝文曰維九榖方成三時不害慿茲多祜介其農穡其首尾與風師文同立冬後亥日祀司中司命司人司禄於國城西北有司行事毎座象罇二於壇上東南隅北向皆有坫以西為上設司中司命司人司禄神座於壇上近北南向以西為上初獻司中祝文曰時屬安寧億兆康乂用率常禮報兹祉福次獻司命祝文曰賴兹正直黎庶康寧資此良辰用申常禮次獻司人祝文曰星紀已周兆庶寧阜備兹蠲吉式薦馨香次獻司禄祝文曰元英紀時嵗事云畢聿遵典故修其常祀飲福及行事如風師之儀宋制二仲祀九宫貴神為大祀立春後丑日祀風師立夏後申日祀雨師為中祀立秋後辰日祀靈星秋分享夀星立冬後亥日祀司中司命司人司禄為小祀真宗咸平四年駕部員外郎直祕閣杜鎬上言按封禪書天神貴者泰一泰一佐曰五帝今禮以五帝為大祠泰一為中祠况九宫所主風雨霜雹疾疫之事唐朝元肅二宗並嘗親祀㑹昌中陞次昊天上帝欲望復為大祀從之其御署祝版禮同社稷增設壇兩壝玊用兩圭有邸其稾秸加茵褥如幣色大中祥符元年東封泰山於行宫東築壇二成三尺上成縱廣各五丈下成五丈二尺上為小壇餘如京城祀壇牲用太牢以祀九宫景德三年知樞密院事王欽若言夀星之祀肇自開元伏以陛下光闡鴻猷並秩羣祀而蕭薌之祭獨略此祠縉紳之談皆謂缺典加以周伯星出實居角宿之間天既垂休禮㒺不答伏望特詔禮官俾崇祀事庶百祥之允集介萬夀以無疆詔有司詳定遂請以秋分日饗夀星及角亢七宿為壇南郊髙三尺周回八歩四尺四陛一壝其祭器祀禮咸以靈星為准奏可大中祥符二年澤州請建風伯雨師廟上以外州未詳典式令禮官考儀頒下有司言唐制諸郡置風伯壇於社壇之東雨師壇於西各稍北三數十歩卑下於社壇雷神無立廟之文又按開寳通禮州縣鎮神祀並如小祀用一羊籩豆各八簠簋各二奏可仁宗景祐二年學士承㫖章得象等定司天監生于淵役兵單訓奏祀九宫貴神止用一局失逐年飛宫法按郄良遇九宫法有飛棋立成圖每嵗一移主九州災福事天寳中術士蘇嘉慶始置九宫神壇一成高三尺四陛上依位置九小壇東南曰招搖正東曰軒轅東北曰太陰正南曰天一中央曰天符正北曰泰一西南曰攝提正西曰咸池西北曰青龍五數為中戴九履一左三右七二四為上六八為下符於遁甲此則九宮定位也每嵗祭以四孟位隨嵗改故謂之行棋自乾元以後止依本位祭遂不飛宮仍減冬夏二祭國朝因乾元故事而未嘗有所更今于淵等所請既合天寳初祭之禮又合良遇飛棋之圖然九宫之法本自術家時祭之文經禮不載昔漢室祠官所領多本於方士牲幣壇場之數嵗時昏曉之節薦配鼓舞即用其方故有黄帝用梟武夷用乾魚之𩔖是則為民請福無文咸秩寧有過立非執一隅議者或謂不必飛宫若日月星辰躔次周流而祭有常所此則定位之祀所當從也若其推數於回復候神於恍惚因方弭沴隨氣考祥則飛位之文固可遵用請依唐禮遇祭九宫之時遣司天監官一員詣祠所隨每年貴神飛棋之方以定祭位仍自天聖己巳入厯泰一在一宫嵗進一位飛棋廵行周而復始詔可慶厯儀每座籩豆十二簠簋俎二皇祐增定壇如郊祀録三成成三尺四陛上依位置小壇九皆髙尺五寸縱廣八尺西南為坤陛治平初樞密副使胡宿言九宫司水旱國家列於常祀至和中光禄小吏慢於祭而震死二人威靈所傳耳目未逺今首夏垂盡而時雨尚愆有惻上仁徧走羣望宜特遣近臣并祠九宫禮院以為舊制每嵗雩祀外水旱稍久皆遣官吿天地宗廟社稷及諸寺觀宫廟貴神亦宜准此從之皇祐定風師壇高三尺周三十三歩雨師雷師壇髙三尺方一丈九尺慶厯四年靈臺郎王太明言按占書主河江淮濟溝渠溉灌之事十九星汴口祭河瀆七位而不及星司天監定亢池主渡水往來送迎事北河為胡門北界南河為越門南界主司空掌水土功事皆不主江淮濟箕斗奎三星顓主津瀆太明所遺請與東井天津天江咸池積水天淵天潢水位水府四瀆九坎天船王良羅堰等十七星在天河内者當祠二月詔汴口祭河兼祠十七星慶厯中修大火祠在南京三月九日祠之初鴻慶宫災集賢校理胡宿請修火祀以閼伯對祭大火禮官議曰閼伯配火侑食如周棄配稷后土配社之比下厯千嵗遂為重祀祖宗以來郊祀上帝而大辰已在從祀閼伯之廟每因赦文及春秋委京司長吏致奠咸秩之典未始云闕然國家有天下之號實本於宋五運之次又感火德宜因興王之地商邱之舊作為壇兆秩祀大火以閼伯配建辰建戌出納之月内降祝版留司長吏奉祭行事籩豆牲幣得視中祠雖非舊章特示新禮閼伯舊廟官給財費修飾乃上壇制髙五尺廣二丈四出陛陛廣尺壝一重四面距壇各二十五歩位版以黑漆朱書曰大火位配位曰閼伯位牲用羊一豕一器准中祠嵗以三九月擇日長吏已下分三獻州縣官攝太祝奉禮小祠慶厯獻官有祭服神宗熙寧四年司天中官正周琮言泰一經推算七年甲寅嵗泰一陽九百六之數復元之初故經言太嵗有陽九之災泰一有百六之厄皆在入元之初終今陽九百六當癸丑甲寅之嵗為災厄之㑹然五福泰一自國朝雍熙元年甲申嵗入東南巽宫時修東泰一宫天聖七年乙巳嵗五福泰一入西南坤位修西泰一宫請稽詳故事崇建宫宇迎五福泰一於京師詔將作監於集禧觀相視建宫六年中泰一宫成命宰相王安石為奉安泰一使樞密副使吳充龍圖閣學士孫固等為前導官主管鹵簿奉安神像降德音於天下太常禮院言中泰一宫冠服依東西泰一而東西泰一惟五福君基冠通天冠大遊以下皆冠道冠按史記天神貴者泰一泰一佐者五帝又方士言十泰一皆天之尊神請並用通天冠絳紗袍從之元豐四年郊廟奉祀禮文所言國朝時令秋分享夀星於南郊熙寧祀儀於壇上設夀星一位南向又於壇下卯陛之南設角亢氐房心尾箕七位東向按爾雅曰夀星角亢也説者曰數起角亢列宿之長故曰夀星非此所謂秋分所享夀星也今於壇下設角亢位且以氐房心尾箕同祀尤為無名又按晉書天文志老人一星在弧南一曰南極常以秋分之旦見於丙春分之夕沒於丁見則治平主夀昌常以秋分候之南郊後漢於國都南郊立老人星廟常以仲秋祀之則夀星謂老人星矣請依後漢於壇上設夀星一位南向祀老人星其壇下東方七宿位不宜復設從之政和五禮新儀夀星壇髙三尺東西長一丈三尺南北長一丈二尺四出陛一壝二十五歩六年太常博士何洵直言熙寧祀儀春秋仲月祀九宫貴神當與社稷為比為大祠祝版依㑹昌故事開寳禮書書御名禮部言五福十泰一祝版署詞稱嗣天子臣某謹按古之祝辭以天子至尊雖祗事天地宗廟示民嚴上盖未有稱臣者故禮曰踐祚臨祭祀内事曰孝王某外事曰嗣王某内謂宗廟外謂郊社大戴禮載祀天祝文稱予一人某漢承古禮稱天子以事天其贊享辭又曰皇帝魏明帝始詔天地明堂五郊可稱天子臣某東晉賀循製䇿祝文稱皇帝臣某沿襲至今盖用魏晉之制本朝儀注祀儀於上帝五帝日月並稱臣檢㑹昌九宫貴神祝版進書已不稱臣五福十泰一當依熙寧六年以前故事其被遣之官自宜稱臣如此則不失輕重之體從之哲宗元祐七年監察御史安鼎言本朝春秋祀九宮泰一用羊豕其四立祭泰一宫十神皆無牲以素饌加酒焉再詳星經泰一一星在紫宫門右天一之南號曰天之貴神其佐曰五帝主使十六神知風雨水旱兵革饑饉疫疾災害之事唐書曰九宫貴神實司水旱泰一掌十六神之法度以輔人極國朝㑹要十神泰一亦云天之尊神及十精十六神並主風雨由是觀之十神泰一九宫泰一與漢所祀太乙共是一神今十神皆用素饌而九宫並薦羊豕葷素不同似非禮意詔令禮官詳定禮官言九宫十神泰一各有所主名義不同即非一神故自唐迄今皆用牲牢别無祠壇用素食之禮欲依舊制從之徽宗崇寧元年詔建長生宫於洞真宫舊址以祠熒惑其後又詔天下崇寧觀並建火德真君殿仍詔正殿以離明為名太常博士羅畸言熒惑者至陽之精比者就國之陽特開琳館以安其靈謂宜倣泰一宫遣官薦獻或立壇於南郊如祀靈星夀星之儀從之七月有司言閼伯陶唐氏之火正也居宋地國家以火德王天下而興王之都實次大火閼伯有功於宋宜從祀離明殿從之四年禮部言離明殿增閼伯位按春秋傳五行之官封為上公祀為貴神祝融髙辛之火正也閼伯陶唐氏之火正也祝融既為上公則閼伯亦當服上公衮冕九章之服從之五禮新儀立夏日祀熒惑及祀陽德熒惑壇廣四丈髙七尺四出陛兩壝二十五歩陽德觀火德熒惑以閼伯配俱南向五方火精神等並為從祀政和三年議禮局上五禮新儀立春祀東泰一宮立夏季夏土王日祀中泰一宫立秋日祀西泰一宫立冬日祀中泰一宫中泰一宫真室殿五福泰一在中君基