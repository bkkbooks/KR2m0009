body:
  text: 文獻通考卷三百三十五鄱陽馬端臨貴與著四裔考十二吐蕃梁開平二年遣使朝貢官其首領後唐天成二年遣使者野利延孫等入貢并蕃僧四人持蕃書二封人莫識其字其後權知西涼府留後孫超遣大將拓跋承誨來貢明宗召見承誨云涼州東距靈武千里西北至甘州五百里舊有鄆人二千五百為戍卒及黄巢之亂遂為阻絶今城中漢户百餘皆戍兵之子孫衣服言語畧如漢人又言涼州郭外數十里尚有漢民陷沒者耕作餘皆吐蕃詔授超涼州刺史河西軍節度使留後漢乾祐初超卒州人推其土人折逋嘉施權知留後遣使來貢即以嘉施代超為留後周廣順二年始以申師厚為河西節度師厚初至涼州奏授吐蕃首領折逋支等官從之顯徳中師厚為其所迫擅還朝坐貶涼州亦不復命帥宋建隆二年靈武五蕃以槖駝良馬致貢來離等八族蕃越嵬護送入界勅書奬諭又賜秦州首領尚波于錦袍銀帶尚波于感悅是年牧獻伏羌地乾徳四年知西涼州折逋葛皮上言有回鶻二百餘人漢僧六十餘人自朔方路來為部落劫掠僧云欲往天竺取經並送達甘州訖詔褒答之八年秦州大石小石族寇土門掠居民知州張炳擊走之太平興國二年秦州諸族數入寇俱擊敗之斬首數十級下詔戒勵之八年諸種以馬來獻召其酋長對崇政殿厚加慰撫賜以束帛九年秦州言蕃部以羊馬來獻詔以茶綵答其値淳化元年秦州大小馬家族獻地内附至道元年七月西涼府押蕃落副使折逋喻龍波上言蕃部頻為繼遷侵掠乃與吐蕃都部署沒臨拽于㑹六谷蕃衆來朝且獻名馬上厚賜之是歳涼州復來請帥詔以丁惟清知州事賜以牌印咸平元年十一月河西軍左廂副使歸徳將軍折逋游龍鉢來朝龍鉢四世受命為酋雖貢方物未嘗自行今始至獻馬二千餘匹河西軍即古涼州東至故原州千五百里南至雪山土谷渾蘭州界三百五十里西至甘州同城界六百里北至部落三百里周廻平州二千里舊領姑臧神鳥蕃禾昌松嘉麟五縣户二萬五千六百九十三口十二萬八千一百九十二今有漢民三百户城周廻五十里如鳯形相傳李軌舊治也皆龍鉢自述云詔以龍鉢為安逺大將軍三年以儀州延䝉八部都首領渴哥領化州刺史首領透逋等為懐化郎將四年知鎭戎軍李繼和言西涼府六谷都首領潘羅支願戮力討繼遷請授以刺史仍給廪祿羅支貢馬五千匹詔厚給馬價别賜茶綵六年原渭蕃部三十二族納質來歸羅支又遣蕃官吳福聖臈來貢表言感朝廷恩信憤繼遷倔强已集騎兵六萬乞㑹王師收復靈州乃以羅支為朔方軍節度靈州西面都廵檢使賜以鎧甲器幣又以吳福聖臘為定逺將軍次首領兀佐等七人為懐化將軍羅支屢請王師助擊賊議者以西涼去渭州限河路逺不可豫約師期上曰繼遷常在地中三山之東每來寇邊及官軍出則已遁去使六谷部族近塞捍禦與官軍合勢亦國家之利降詔許之六月知渭州曹瑋言隴山西延䝉族首領秃逋等納馬立誓乞隨王師討賊以漢法治蕃部瑋稱其忠詔授本族軍主八月者龍族首領來貢名馬上嘉其嘗與潘羅支協力抗賊令優待之其年十一月繼遷攻西蕃遂入西涼府知州丁惟清陷沒羅支偽降未幾集六谷諸豪及者龍族合擊繼遷大敗中流矢死景徳元年二月羅支遣其甥厮陁完來獻捷六月又遣其兄邦逋支入奏且欲更率部族及回鶻精兵直抵賀蘭山討除殘孽願𤼵大軍援助即詔涇原部署陳興等俟羅支已發兵馬率衆鼓行赴石門策應邦逋支又言前賜羅支牌印官誥衣服器械為遷賊劫掠有詔别給羅支又言修洪元大雲寺詔賜金箔物綵先是繼遷種落迷般囑及日逋吉羅丹二族亡歸者龍族而欲陰圖羅支是月㑹遷黨攻者龍羅支率百餘騎急赴將議合擊遂為二族戕於帳詔贈羅支武威郡王遣使贈䘏其家諸豪議立羅支弟厮鐸督為首領詔授鐸督鹽州防禦使靈州西面沿邊都大廵檢使上以遷黨未平藉其腹背攻刺遂加鐸督朔方軍節度押蕃落等使右隰州言河西諸蕃四十五族内附其年遷黨寇永寧寨為藥令族合蘇擊敗之斬首百餘級三年厮鐸督遣使入貢仍上與趙徳明戰鬬功狀詔嘉奬之加檢校太傅渭州言妙娥延家熟魏等族率三千餘帳萬七千餘口及羊馬數萬欵塞内附詔遣使撫勞之賜以袍帶茶綵仍以折平族首領撒逋渴為順州刺史充本族都軍主是年宗家當宗章迷族來貢移逋擦父族歸附九月詔釋西面納質戎人先是諸蕃有鈔劫為惡嘗經和斷者恐異時復叛故收其子弟為質乃有禁錮終身者上憫而縱之族帳感恩皆稽首誓不為邊患四年邊臣言趙徳明謀劫西涼襲回鶻上以六谷甘州久推忠順思撫寧之乃遣使諭厮鐸督令援結回鶻為備并賜鐸督茶藥襲衣金帶及部落物有差鐸督奉表謝七年知秦州張佶置大路門新寨先是佶欲近渭置採木場蕃族聞之即徙帳去佶不能遂撫之戎人輙悔因鄉導鈔劫佶深入掩擊悉敗走至是求和佶不許時宗哥立遵唃厮囉温逋竒等帳族甚盛勝兵六七萬與趙徳明抗敵希望朝廷恩命佶奏請拒絶涇原鈐轄曹瑋又言宜厚唃厮囉以扼徳明八年㑹厮囉遣使來貢詔賜錦袍金帶器幣供帳什物茶藥有差凡中金七千兩他物稱是其年唃厮囉宗哥文法聚衆數十萬請討平夏以自効上以為戎人多詐慮緩急侵寇及擾熟户即命周文質監涇原軍曹瑋知秦州兼兩路沿邉安撫使以備之宗哥城東南至永寧寨九百一十五里東北至西涼府五百里西北至甘州五百里東至蘭州三百里南至河州四百一十五里又東至龕谷五百五十里又西南至清海四百里又東至新渭州千八百九十里九年厮囉立遵等獻馬五百八十二匹詔賜幣總萬二千計以答之是年以宗哥族李遵為保順軍節度賜襲衣金帶器幣遵一名郢成佐唃厮囉甚有威名性貪忍其下怨而懼之屢表求贊普號朝廷以為贊普戎王也遵居厮囉下不應妄授乃用厮鐸恩例焉其後或比歳或間歳朝貢不絶李遵或曰李立遵為論逋佐唃厮囉論逋者相也立遵貪且喜殺戮國人不附其後舉兵與瑋戰三都谷不勝又襲西涼為所敗厮囉遂與立遵不協更徙邈川以温逋奇為論逋數使人至秦州求内屬明道初即授厮囉寧逺大將軍愛州團練使授逋奇歸化將軍已而逋奇為亂囚厮囉置穽中出收不附已者守穽人間出之厮囉集兵殺逋奇徙居青唐景祐中以厮囉為保順軍節度觀察留後歳以奉錢令秦州就賜元昊始强侵掠其界兵臨河湟厮囉知衆寡不敵壁鄯州不出陰間元昊頗得其虛實元昊已度河插幟志其淺厮囉潛使人移植深處以誤元昊及大戰元昊潰而歸士視幟渡溺死者十八九所鹵獲甚衆自是數以奇計破元昊元昊遂不敢窺其境及元昊取西涼府潘羅支舊部往往歸厮囉又得囘紇種人數萬厮囉居鄯州西有臨谷城通青海髙昌諸國蕃商皆趨鄯州貿買以故富强寳元元年加保順軍節度使仍兼邈川大首領時以元昊反遣左侍禁魯經持詔諭厮囉使背擊元昊以披其勢賜帛二萬疋經還以勞擢閤門祗候厮囉奉詔出兵四萬五千向西涼西涼有備厮囉知不可攻捕殺遊邏數十人亟還聲言圖再舉元昊既屢寇邊仁宗召對魯經欲再遣經固辭貶經為左班殿直募敢使者屯田員外郎劉渙應詔渙至厮囉迎導供帳甚厚介騎士為先驅引渙至庭厮囉冠紫羅氊冠服金線花袍黄金帶絲履平揖不拜延坐勞問稱阿舅天子安否道舊事則數十二辰屬曰兎年如此馬年如此云渙傳詔已厮囉召酋豪大犒約盡力無身然終不能有大功後累加恩兼保順河西節度使洮涼兩州刺史又加階勲檢校官功臣食邑賜器幣鞍勒馬嘉祐三年摖羅部阿作等叛厮囉歸諒祚諒祚乗此引兵攻掠境上厮囉與戰敗之獲酋豪六人收槖駝戰馬頗衆因降隴逋立功馬波三大族㑹契丹遣使送女妻其少子董氊乃罷兵歸治平二年夏羌邈奔及阿叔溪心以隴珠珂諾三城叛諒祚歸厮囉厮囉不禮乃復歸諒祚請兵還取所獻地諒祚以兵隨之不能克但收邈川歸丁家五百餘帳而還厮囉其年十月三日卒以三年五月二日葬年六十九董氊嗣厮囉三妻生董氊者曰喬氏其二妻李立遵女生瞎氊及磨氊角立遵死李氏寵衰斥為尼置廓州錮其子瞎氊磨氊角結母黨李巴全竊載其母奔宗哥厮囉不能制磨氊角因撫有其衆李氏以寳元二年恩賜紫衣磨氊角亦累奉貢初補嚴州團練使以思州團練使卒所部立其子瞎撒欺丁李氏懼孤弱不能守乃獻皮帛入庫廪文籍於厮囉厮囉因受之嘉祐三年命欺丁為順州刺史瞎氊居龕谷屢通貢授澄州團練使先卒子木征不能自立青唐族酋瞎藥雞囉及僧鹿遵迎居洮州欲立以服洮岷疊宕武勝軍諸羌秦州以其近邊逐之乃還河州後徙安江城董氊雖羈屬之不能有也母弟瞎吳叱居銀川聶家山至和二年補本族副軍主於是唃氏地分為三董氊居青唐獨有河北之地然最强其國大抵吐蕃遺俗懐恩恵重財貨無正朔市易用五穀乳香硇砂罽毯馬牛以代錢帛用虎豹皮緣衣裘尊釋氏不知醫藥疾病召巫覡視之焚柴聲鼓謂之逐鬼信詛咒或以決事訟有疑使詛之訟者上辭牘藉之以帛事重則以錦亦有鞭笞杻械諸獄具人喜啖生物無蔬茹醯醬獨知用鹽為滋味而嗜酒及茶居板屋富室以氊為幕貢獻謂之般次云神宗即位加董氊太保太傅以其子藺逋叱為錦州刺史三年夏人寇環慶董氊乘虚入其境大獲賜璽書袍帶激奬之時王韶上平戎策謂國家欲平西夏當復河湟則西夏有腹背受敵之憂今古渭之西熙河蘭鄯皆漢隴西等郡董氊雖國其間而不能制諸羌宜并有之以絶夏人右臂詔以韶為秦鳯沿邊安撫使既定熙河其首領青宜結鬼章寇河州白踏城景思立死焉帝命邊臣招來之十年以鬼章及阿里骨皆為刺史董氊入貢賜以銀綵茶服改西平軍節度使元豐四年王師討夏國㑹其兵董氊遣酋長秣征尊率三萬人赴黨龍耳江及隴朱珂諾又集六部兵十二萬約以八月分三路與官軍㑹帝以其協濟軍威事功可紀由常樂郡公進封武威郡王鬼章阿里骨黨令支皆團練使心牟欽氊阿星李叱臘欽為刺史夏人與之通好許割賂斫龍以西地云如歸我即官爵恩好一如所欲董氊拒絶之訓整兵甲以俟入討且以蕃字來告神宗召見其使使歸語董氊盡心守圉每稱其上書情辭忠智雖中國士大夫存心公家者不過如此知邈川事力固不足與夏人抗但欲解散其謀使不與結和而已故終不能有大功哲宗立加檢校太尉元祐元年卒藺逋叱已死養子阿里骨嗣阿里骨本于闐人少從其母給事董氊故養為子既嗣事遣使修貢元祐元年授冠軍大將軍檢校司空河西軍節度使封寧塞郡公二年里骨逼鬼章使率衆據洮州八月鬼章就擒檻送京師詔赦之明年里骨奉表謝罪詔熙河無復出兵許貢奉如故又加其官紹聖元年來獻獅子厚賜還之二年卒子瞎征嗣授以父官瞎征嗜殺部曲暌貳大酋心牟欽氊之屬有異志忌瞎征季父蘇南黨征雄勇多智共誣其謀逆瞎征不能察而殺之盡誅其黨獨籛羅結逃奔溪巴温溪巴温者董氊疎族也自阿里骨之立去依隴逋部河南諸𦍑多歸之籛羅結奉溪巴温長子杓桚據溪哥城瞎征討殺杓桚籛羅結奔河州說王瞻以取青唐之策已而溪巴温入溪哥城自稱王子元符二年七月瞻取邈川八月瞎征自青唐脫身來降欽氊迎溪巴温入青唐立其子隴桚為主八月瞻軍至青唐隴桚出降詔以邈川為湟州青唐為鄯州二酋雖然其種人本無歸漢意議者謂今不先修邈川以東城障而遽取青唐非計也閏九月欽氊等果與青唐城中人相結謀復奪城山南諸羌亦叛瞻遣將破之青唐圍解而邈川益急夏人十萬助之總管王愍苦戰固守乃免瞻棄青唐歸溪巴温與其子溪賖羅撒據之朝論請并棄邈川且謂董氊無後趙懐義乃木征之子唃厮囉嫡曾孫最為親的於是以隴桚為河西軍節度使知鄯州封武威郡公充西蕃都護依府州折氏例世世承襲尋賜姓名趙懐徳以懐義為廓州團練使同知湟州加瞎征檢校太傅懐逺軍節度使三年三月懐徳隴桚及所降契丹夏國囘鶻公主入見皆蕃服蕃拜各賜冠服退易之於邇英閣前復立班謝賜食於横門徽宗命輔臣呼懐徳與詔問何以招致溪巴温對曰譬如乳牛繫其子即母須來繫其母即子須來至岷州當遣人往諭使之歸漢遂與瞎征俱還湟州溪賖羅撒謀襲殺懐徳懐徳奔河南瞎征不自安求内徙詔居鄧州崇寧元年卒三年王厚復湟鄯懐徳至京師拜感徳軍節度使封安化郡王趙思忠即瞎氊之子木征也嘉祐中為河州刺史其後河州武勝軍諸族浸驕閉于闐諸國朝貢詔邊將問罪會王韶經畧熙河招納蕃部遣僧智緣往說之啖以厚利因隨以兵前後殺其老弱數千焚帳族萬數得腹心首領十餘人又離其妻子皆不殺木征拒戰敗北遂以熙寧七年四月舉洮河二州來降賜今姓名拜榮州團練使封其母妻及諸子皆超拜官其後以思忠為秦州鈐轄不莅事而乞主熙河蕃部經畧司以為不可詔於二州給地五十頃十年遷合州防禦使卒贈鎭洮軍節度觀察留後建炎初錢蓋制置陜西上言青唐無毫髮之得而所費不貲請求唃氏後而立之必得其力乃以蓋為陜西總制使持告賜趙懐恩懐恩者董氊從孫懐徳之弟益麻黨征也議者以為蕃部所推伏故賜姓名封為隴西郡王四朝國史論曰吐蕃之裔守䕶西塞為不侵不叛之臣嘗宣力王家奮擊夏虜而熙寧元符崇寧間三用師於其國蓋其始也王安石主王韶取洮河中而章惇主王瞻夷青唐末而蔡京主王厚復湟鄯遂建熙河一道郡縣而置之功雖訖成邊患不息唃氏子孫無罪而就覆亡及金人得秦隴乃能求其後而續其血食孰謂金無人哉大羊同大羊同東接吐蕃西接小羊同北直于闐東西千餘里勝兵八九萬人其人辮髮氊裘畜牧為業地多風雪冰厚丈餘所出物産頗同蕃俗無文字但刻木結繩而已刑法嚴峻其酋豪死抉於穴反去腦實以珠玉剖其五臟易以黄金假造金鼻銀齒以人為殉卜以吉辰蔵尸巖穴他人莫知其所多殺牸牛羊馬以充祭祀葬畢服除其王姓姜葛有四大臣分掌國事自古未通中國唐貞觀十五年遣使來朝悉立悉立在吐蕃西南户五萬有城邑村落依溪澗丈夫以繒綵纒頭衣氊褐婦人辮髪著短裙以蒸報為俗畜多水牛羖羊雞豕穀宜秔稻麥豆饒甘蔗諸果死葬於中野不為封樹䘮制以黑為衣一年就吉刑有刖劓羈事吐蕃自古未通中國唐貞觀二十年遣使貢方物章求拔章求拔或云章揭拔本西羌種也在悉立西南居山之内近代移出西接東天竺遂衣服變西羌之俗其地延袤八九百里勝兵二千餘人居無城郭好為寇掠商旅患之聞悉立入朝亦遣使朝貢泥婆羅泥婆羅國在吐蕃西其俗剪髪與眉齊穿耳璫楦竹筩緩至肩者以為姣麗食用手其器皆銅多商賈少田作以銅為錢面文為人背文為馬其牛鼻不穿孔衣服以一幅布蔽身數自盥潄以板為屋壁皆雕畵俗重博戯頗解推測盈虛兼通歴術事五天神鐫石為像每日清水浴神烹羊而祭其王那陵提婆身著珍珠諸寳耳垂金鈎玉璫佩寳裝伏突坐獅子坐常散花燃香大臣及左右並坐於地有阿耆婆濔池周迴二十餘步以物投之即生煙焰懸釡而炊須臾而熟唐永徽二年遣使朝貢大勃律大勃律或曰布露直吐蕃西與小勃律接西隣北天竺烏萇地宜鬰金役屬吐蕃唐萬歳通天逮開元時三遣使者朝故冊其君蘇弗舍利支離泥為王死又冊蘇麟陀逸之嗣王凡再遣大首領察卓那厮摩没勝入謝沒謹忙死子難泥立死兄麻來兮立死蘇失利之立為吐蕃陰誘妻以女故西北二十餘國皆臣吐蕃貢獻不入安西都䕶三討之無功天寳六載詔副都䕶髙仙芝伐之前遣將軍席元慶馳千騎見蘇失利之曰請假道趨大勃律城中大酋五六皆吐蕃腹心仙芝約元慶吾兵到必走山出詔書召慰賜繒綵縛首領待我元慶如約蘇失利之挾妻走不得其處仙芝至斬為吐蕃者斷婆夷橋是暮吐蕃至不能救仙芝約王降遂平其國於是拂菻大食諸胡七十二國皆震恐咸歸附執小勃律王及妻歸京師詔改其國號歸仁置歸仁軍募千人鎭之帝赦蘇失利之不誅授右武衛將軍賜紫袍黄金帶使宿衛箇失蜜箇失蜜或曰迦濕彌邏北距勃律五百里環地四千里山回繚之他國無能攻伐王治撥邏勿還布邏城西瀕彌那悉多大河地宜稼多雪不風出火珠鬰金龍種馬俗毛褐世傳地本龍池龍徙水竭故往居之唐開元初遣使者朝八年詔冊其主眞陀羅秘利為王間獻胡藥天木死弟木多筆立遣使者佛理多來朝且言有國以來並臣天可汗受調𤼵國有象馬步三種兵臣身與中天竺王阨吐蕃五大道禁出入戰輒勝有如天可汗兵至勃律者雖衆二十萬能輸糧以助又國有摩訶波多磨龍池願為天可汗營祠因丐王冊鴻臚譯以聞詔内物理多宴中殿賜賚優備冊木多筆為王自是職貢有常其役屬五種亦名國所謂咀义始羅者地二千里有都城西南餘七百里得僧訶補羅地三千餘里亦治都城東南山行五百里得烏刺尸地二千里有都城宜稼穡東南限山千里即箇失蜜西南行險七百里得半笯蹉地二千里又得曷羅闍補羅者其大四千里有都城多山阜人驍勇五種皆無君長云骨咄骨咄或曰珂咄羅廣長皆千里王治思助建城多良馬赤豹有四大鹽山山出烏鹽唐開元十七年王俟斤遣子骨都施來朝二十一年王頡利發獻女樂又遣大首領多博勒達于朝貢天寳十一載冊其王羅金節為葉䕶蘇毗蘇毗本西羌族為吐蕃所并號孫波在諸部最大東與多彌接西距鶻莽硤户三萬唐天寳中王沒陵贊欲舉國内附為吐蕃所殺子悉諾率首領奔隴右節度使哥舒翰䕶送闕下元宗厚禮之多彌亦西羌族役屬吐蕃號難磨濱犂牛河土多黄金貞觀六年遣使者朝貢賜遣之伊吾城者漢宜禾都尉所治商胡雜居勝兵千附鐵勒人驍悍土良沃隋末内屬置伊吾郡天下亂復臣突厥貞觀四年城酋來朝頡利滅舉七城降列其地為西伊州沙州沙州本漢燉煌故地唐天寳末陷於西戎大中五年張義潮以州歸順詔建沙州為歸義軍以義潮為節度使領河沙甘肅伊西等州觀察營田處置使義潮入朝以從子惟深領州事至朱梁時張氏之後絶州人推長史曹義金為帥義金卒子元忠嗣周顯徳二年來貢授本軍節度檢校太尉同中書門下平章事鑄印賜之宋建隆三年加兼中書令子延恭為𤓰州防禦使興國五年元忠卒子延祿遣人來貢贈元忠燉煌郡王授延祿本軍節度弟延晟為𤓰州刺史延瑞為衙内都虞候咸平四年封延禄譙郡王五年延祿延瑞為從子宗夀所害宗壽權知留後而以其弟宗允權知𤓰州表求旌節乃授宗壽節度使宗允檢校尚書左僕射知𤓰州宗壽子賢順為衙内都指揮使大中祥符末宗壽卒授賢順本軍節度弟賢恵為檢校刑部尚書知𤓰州賢順表乞金字藏經洎茶藥金箔詔賜之至天聖初遣使來謝貢乳香硇砂玉團自景祐至皇祐中凡七貢方物西夏本末已見封建考文獻通考卷三百三十五
