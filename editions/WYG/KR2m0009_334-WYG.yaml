body:
  text: 文獻通考卷三百三十四鄱陽馬端臨貴與著四裔考十一葱茈羌燉煌西西域之南山中從婼羌婼而遮反西至葱嶺數千里有月氐餘種葱茈羌白馬黄牛羌各有酋豪北與諸國接不知其道里廣狭傳聞黄牛羌種類孕身六月生南與白馬羌鄰並魏時聞焉吐谷渾吐谷渾夲遼東鮮卑也西晉時酋帥徒何渉歸有二子長曰吐谷渾少曰若洛廆胡罪反代統部落别為慕容氏渾庶長廆正嫡父在時分七百户與渾渾與廆二部俱牧馬馬鬬相傷廆怒遣使謂渾曰先公䖏分與兄弟異部牧馬何不相逺而令馬鬬渾曰馬是畜生食草飲水春氣𤼵動所以致鬬鬬在於馬而怒於人邪乖别甚易今當去汝於萬里之外矣於是擁馬西行乃西附隂山今朔方之北属永嘉之亂始度隴西止於枹罕而後子孫㩀有甘松之南洮水之西南極於白蘭在益州西北甘松山在今合川郡境今臨洮和政郡之南及合川郡之地其地四時常有氷雪唯六七月雨雹甚盛若晴則風飄沙礫有麥無榖其青海周廻千餘里海中有小山毎冬氷合後以良牝馬置此山至来冬收之馬有孕所生得駒號曰龍種吐谷渾甞得波斯草馬放入海因生驄駒能行千里故時稱青海驄焉至其孫葉延以禮云公孫之子得以王父字為氏吾祖始自昌黎先宅於此今以吐谷渾為氏尊祖之義也自吐谷渾至葉延曾孫視羆皆有才略知古今司馬博士皆用儒生至其子阿豺自號車騎將軍沙州刺史部内有黄沙周廻數百里不生草木因號沙州阿豺兼并氐羌地方數千里號强國升西强山觀墊江源問於郡寮曰此水流更有何名由何郡國入何水也其長吏曾和曰此水經仇池過晉夀出宕渠始號墊江至巴郡入江度廣陵㑹於海阿豺曰水尚知歸吾雖塞表小國而獨無所歸乎乃遣使南通宋獻方物宋少帝封為澆河公文帝元嘉中又加朝命遣使入朝貢阿豺有子二十人病謂其母弟慕利延取箭一隻折之慕延折之復命取十九箭折之慕延不能折阿豺曰汝曹知不單者易折衆則難摧戮力一心社稷可固既卒弟慕璝立遣軍擊乞伏茙蔓敗之茙音戎東奔隴右慕璝㩀有其地其時赫連定㩀長安為後魏主所攻敗擁秦雍户口十餘萬西次罕开慕璝拒撃大破之生擒定送於魏後弟慕延立魏太武帝遣軍擊延大破之慕延率部落西奔白蘭攻破于闐國南依罽賔七年乃還舊土慕延死阿豺兄樹洛干子拾寅立始邑於伏羅川至元孫夸吕立自號為可汗理伏俟城在青海西十五里有地方數千里其西北諸雜種謂之阿貲虜貲即移反其南界隴涸城去城都千餘里大城有四一在清水川一在赤水一在澆河一在吐屈真川皆子弟所理其主理慕賀川西有黄沙南北百二十里東西七十里不生草木雖有城郭不居而随逐水草官有王公僕射尚書及郎中之號其主椎直追反髻以皁為帽其妻衣織成裙披錦袍辮髻於後首戴金花丈夫衣服略同於華夏多以羃羅為冠亦以繒為㡌婦人皆貫珠束髪以多為貴兵器有弓刀甲矟國無常賦須則税富室商人以充用焉父兄亡妻後母及嫂等與諸夷俗同死者亦皆埋殯其服制𦵏訖則除之性貪婪忍於殺害後周眀帝武成初夸吕寇凉州詔賀蘭祥率兵討破之又攻㧞其洮陽泥和二城置洮州今臨洮郡地而還武帝天和初其龍涸王莫昌率衆降以其地為扶州今同昌郡地二年復遣皇太子征之軍度青海至伏俟城夸吕遁走虜其餘衆而還隋開皇中夸吕侵𢎞州在今安化郡馬嶺縣界遣上柱國元諧擊之賊悉發國中兵自曼頭至於樹敦甲騎不絶諧頻擊破之夸吕率其親兵逺遁其名王十三人各率部落而降夸吕在位且百年死以後還以慕容為姓其子伏允立煬帝初伏允遣子順来朝帝令鐡勒襲大敗之伏允東走保西平今西平郡帝復令觀王雄以掩之大破其衆伏允遁逃部落来降十萬餘口伏允懼南遁於山谷間其故地皆空自西平臨羌城以西且末以東祁連以南雪山以北東西四千里南北二千里皆為隋有置郡縣鎮戍發天下輕罪徙居之其地在今西平郡之西張掖酒泉郡之北隋氏置西海且末河源等郡於是留順不之遣伏允無以自資率其徒數千騎客於党項大業末天下亂伏允及順復其故地唐武徳初順以兵助擊李軌自號為大寜王太宗時遣使入朝未還即寇鄯州又掠岷州寇凉州乃命叚志元等討之得牛羊二萬還九年復命李靖侯君集等擊之伏允逺遁為左右所殺子順降於是重建其國封順為西平郡王仍加趉巨屈反胡吕烏可汗之號旋又為其下所殺十年立順子諾曷鉢為河源郡王主其國自是衰弱而吐蕃强盛與相攻俱来請師詔不許遣大将軍蘇定方為安集大使平兩國怨後吐蕃遂有其地咸亨元年以薛仁貴郭待封等總兵五萬討吐蕃且納諾曷鉢於故廷王師敗於大非川舉吐谷渾地皆䧟諾曷鉢與親近數千帳纔免三年乃徙浩亹水南諾曷鉢以吐蕃盛勢不抗而鄯州地狭又徙靈州帝為置安樂州即拜刺史欲其安且樂云諾曷鉢死子忠立忠死子宣超立聖歴三年拜左豹韜員外大将軍襲故可汗號餘部詣凉甘肅𤓰沙等州降宰相張錫與右武衛大将軍唐休璟議徙其人於秦隴豐靈間令不得畔去凉州都督郭元振以為吐谷渾近秦隴則與監牧雜處置豐靈又邇黙啜假在諸華亦不遽移其性也前日王孝傑自河源軍徙耽爾乙句貴置靈州既而叛乃入牧坊掠羣馬瘢夷州縣是則遷中土無益之成騐徃素和貴叛去於我無損但失吐谷渾數十部豈與句貴比邪今降虜非彊服皆突矢刃棄吐蕃而来宜當循其情為之制也甞甘肅𤓰沙降者即其所置之因所投而居情易安磔數州而勢自分順其情分其勢不擾於人可謂善奪戎心者也歳遣鎮遏使者與宣超兄弟撫䕶之無令相侵奪生業固矣有如叛去無損中國詔可宣超死子曦皓立曦皓死子兆立吐蕃復取安樂州而殘部徙朔方河東語謬為退渾貞元十四年以朔方莭度副使左金吾衛大将軍慕容復為長樂都督青海國王襲可汗號復死停襲吐谷渾自晉永嘉時有國至龍朔三年吐蕃取其地凡三百五十年及此封嗣絶矣乙弗敵乙弗敵後魏聞焉在吐谷渾北國有屈海其海周廻千餘里衆有萬落風俗與吐谷渾同然不食五榖唯食魚與蘇子蘇子狀如中國茍杞子或赤或黑西有契翰一部風俗亦同土特多狼白蘭山西北又有可蘭國風俗亦同目不識五色耳不聞五聲是西北諸邊外中醜類也土無所出直大養羣畜而户落亦可萬餘人頑弱不知鬬戰忽見異人舉國便走性如野獸體輕工走逐不可得宕昌宕昌羌後魏時興焉亦三苗之允與先零燒當罕开諸部姓别自立酋帥皆有地分不相統攝宕昌即其一也俗皆土著居有棟宇其屋織氂牛尾及羖羊毛覆之無法令又無徭賦唯征伐之時乃相屯聚不然則各事生業不相来徃皆衣裘褐牧飬氂牛羊豖以供其食俗有蒸報無文字但取木榮落以記嵗時三年一相聚殺牛羊以祭天俗重虎皮以之送死有梁勤者代為酋帥得羌豪心乃自稱王其界自仇池以西東西千里席水以南南北八百里仇池山在同谷郡上禄席水在今天水上邽縣地多山阜部衆二萬餘落至其孫彌忩始遣使於後魏大武帝拜為宕昌王七葉孫彌秦皆受南北兩朝封爵宋齊梁及魏並各覊縻之後見兩魏分隔永熈末種人企定乃引吐谷渾寇金城今郡地後企定弟彌定寇石門戍周武帝大和初詔大将軍田𢎞討平之以其地為宕州今懐道郡鄧至鄧至羌之别種也後魏時興焉有像舒理者代為白水酋帥因地名為號鄧至王其地自干亭以東平武以西汶嶺以北宕昌以南今懐道郡之南通化郡之北交川臨翼同昌郡之地也風土習俗與宕昌同自舒理至十代孫舒彭附於後魏孝文帝封甘松縣子鄧至王宋文帝及武帝時俱遣使南来修貢受其官爵後數代西魏恭帝初其主檐術因亂来奔周文帝遣兵送還自後無聞鄧至之西有赫羊國初其部内有一羊形甚大至鮮赤故為國名又有東亭衛大赤水寒巖石河薄陵下習嵢驤覃等諸羌國風俗麤獷與鄧至國不同魏時遣使貢獻皆假以雜號将軍子男巨帥之名党項党項羌三苗之後在古析支之地漢西羌之别種有宕昌白狼皆自稱獼猴種魏晉以降西羌㣲弱周滅宕昌鄧至之後党項始强有佃封氏費聽氏徃利氏頗超氏野律氏房當氏米禽氏拓䟦氏而拓䟦最為强族其人多夀年至百五六十嵗其地東接臨洮西平西拒葉䕶南北數千里䖏山谷間每姓别為部落大者五千餘騎小者千餘騎織氂牛尾及䍽毛為屋服裘褐披氊為上飾俗尚武力無法令各為生業有戰陣則屯聚無徭役不相徃来飬氂牛羊豬以供食不知稼穡其俗滛穢蒸報於諸國中為甚無文字但候草木以記嵗時三年一聚㑹殺牛羊以祭天人年八十以上死者以為令終親戚不哭少者死則為天枉共悲哭之有琵琶横吹擊缶為莭魏周之際數来擾邉隋文帝為丞相時中原多故因此大為寇掠蔣公梁睿既平王謙請因還師討之開皇元年有千餘家歸化五年拓䟦寜叢等各率衆詣旭州内附授大将軍其部下各有等差十六年復寇㑹州詔發隴西兵討之大破其衆人相率降遣子弟入謝罪帝謂曰還語爾父兄人生須有定居飬老㓜乃乍還乍走不羞鄉里邪自是朝貢不絶唐貞觀三年其酋細封歩頼舉部降以其地為軌州即授歩頼刺史其後諸酋悉内属以其地為崌奉巖逺四州即首領拜刺史其後拓䟦赤辭等又舉部降以其地為懿嵯麟可三十二州以松州為督府擢赤辭西戎州都督賜姓李貢職不絶於是自河首積石山而東皆為中國地後吐蕃寖盛拓䟦畏偪請内徙始詔慶州置静邉等䖏之地乃入吐蕃其䖏者皆為吐蕃役属更號弭藥至徳末為吐蕃所誘使為鄉道寇邉俄悔悟来朝乾元間中國數亂因寇邠寜二州肅宗詔郭子儀杜冕桑如珪分二隊討之子儀至党項潰去上元元年在涇隴部落十萬衆詣鳯翔節度使崔光逺降二年與渾奴刺連和寇寳雞殺吏民掠財珍焚大散關入鳯州殺刺史蕭􅞥節度使李鼎追擊走之眀年又攻梁州刺史李勉走進寇奉天大掠華原同官去詔臧希讓代勉為刺史於是歸順乾封歸義順化和寜和義保善寜定羅雲朝鳯凡十州部落詣希譲獻欵丐節印詔可僕固懐恩之叛誘党項渾奴刺入寇衆數萬掠鳯翔盩厔大酋鄭廷郝徳入同州刺史韋勝走節度使周智光破之澄城閏月又入同州焚官私室盧壁馬蘭山郭子儀遣兵襲之退保三堡子儀遣慕容休眀諭降廷徳子儀以党項吐谷渾部落散䖏鹽慶等州其地與吐蕃濵近易相脅即表徙静邉州都督夏州樂容等六府党項於銀州之北夏州之東寜朔州吐谷渾住夏西以離沮之召静邉州大首領左羽林大将軍拓䟦朝光等五刺史入朝厚賜賚使還綏其部先是慶州有破丑氏族三野利氏族五把利氏族一與吐蕃姻援贊普悉王之因是擾邉凡十年子儀表工部尚書路嗣恭為朔方留後将作少監梁進用為押党項部落使置行慶州且言党項隂結吐蕃為變可遣使者招慰芟其反謀因令進用為慶州刺史嚴邏以絶吐蕃徃来道代宗然之又表置静邉芳池相興三州都督長史永平旭定清寜寜保忠順静塞萬吉等七州都督府於是破丑野利把利三部及思樂州刺史拓㧞乞悔等皆入朝宜定州刺史折磨部落芳池州野利部並徙綏延州太歴末野利秃羅都與吐蕃叛招餘族不應子儀擊之斬秃羅都而野利景庭野利剛以其部數千人入附雞子川六州部落曰野利越詩野利龍兒野利厥律兒黄野海野窣等居慶州者號東山部夏州者號平夏部永泰後稍徙石州後為永安将阿史那思暕賦索無極遂亡走河西元和時復置宥州䕶党項至太和中寖强數寇掠然器械鈍苦畏唐兵精則以善馬購鎧善羊貨弓矢鄜坊道軍糧使李石表禁商人不得以旗幟甲胄五兵入部落告者舉罪人財畀之至開成末種落愈繁富賈人齎繒寳鬻羊馬藩鎮乗其利强市之或不得直部人怨相率為亂至靈鹽道不通武宗遣使招之功不就宣宗大中四年内掠邠寜詔鳯翔李業河東李拭合節度兵討之羌乃破殄餘種竄南山後唐同光二年其首領薄香来貢良馬天成二年河西党項如連山等来朝共進馬四十匹宰相奏党項之衆競赴都下賣馬常賜食禁廷醉則連袂歌其土風凡将到馬無駑良並云上進國家雖約價直以給之而計其館給賜賚不啻倍價耗蠧國用請止之上以為國家常苦馬不足今畨官自来中國錫賜乃朝廷常事不足言費自是畨部羊馬不絶於路長興元年二年俱入貢授其首領以官三年以西路党項部族刼掠使臣及外域進奉詔邠州節度使樂彦稠等率歩騎七千討之誅其二十族七百餘人獲其大首領六人黨類二千人駞馬牛羊數千計周廣順二年以府州党項􅅺也等之族大首領為大将軍宋時靈夏綏麟府環慶豐州振戎天徳振武軍並其族帳建隆二年代州刺史折乜埋来朝乜埋党項之大姓也世居河右有捍邉之功故授以方州召令入覲而遣還開寳元年直蕩族首領啜佶等引并人入寇府州為王師所敗招降之太平興國六年七年府州豐州党項族首領俱来貢雍熈初諸族渠帥附李繼遷為寇詔判四方館事田仁節及閤門使王侁等相繼領兵討擊并賜麟府夏銀豐州及日利月利族敕書招諭之二年四月侁等於銀州北破悉利諸族斬首三千六百餘級生擒八十人俘蕃漢老小一千四百餘口器甲一百八十六梟偽署代州刺史折羅遇并弟埋乞獲馬牛羊三萬計五月又於開光谷西杏子平破保寺保杳族追奔二十餘里斬首八百餘級梟其首領乜埋已等五十七人生擒四十九人係其老小三百餘人獲牛羊馬驢凡四千餘計又破保洗兩族俘三千人降五十五族獲牛羊八千計侁等麟州及三族寨羌人二千餘族皆降畨官折軍乜等六十四人獻馬首罪願改圖自効為國討賊遂與部下兵濁輪川斬賊首五十級酋豪二十人李繼遷及三族寨監押折御乜皆遁去命内客省使郭守文自三交乗驛亟徃與王侁等同領邉事其後侁等又破銀州浪悉訛等族及夏州岌伽羅膩等族又招降銀麟夏等州三族寨諸畨一百二十五族合萬六千一百八十九户乃賜勅書以安撫之端拱二年夏州趙保忠言凖詔市馬已獲三百匹其宥州御􅅺布等族黨附繼遷不肯賣馬臣已領兵掩殺二百餘人擒百餘人其族即降詔書撫諭之四年鄭文寳獻議禁青鹽畨族四十四首領引騎萬三千人入寇環州石昌鎮知環州程徳言等擊走之因詔弛鹽禁由是部族寜息自是朝貢不絶官其首領賜錦袍銀帶茶綵以撫慰之景徳元年麟府路言附契丹戎人言􅅺族㧞黄太尉率三百餘帳内属㧞黄夲大族居黄河北古豐州前數犯邉阻市馬之路其首領勇黠難制契丹結之署為太尉今悉衆欵塞詔府州厚賜茶綵給公田依險居之計口賦粟毋得侵擾三年府州折堆昌言兀􅅺族大首領名崖從父盛佑族為趙徳眀白池軍主宻遣使来諭名崖云徳眀雖外托修貢之名而㸃閲兵馬尤急恐必刼掠山界名崖以告上嘉之降詔撫諭就賜錦袍銀帶十一月鎮戎軍曹瑋言叛去蕃官蘇尚娘復来歸附詔報瑋曰尚娘反覆無信特恐狙詐以誤邉吏又使徳眀縁此為詞不可納也自後訖天禧之末畨族来歸朝貢者不絶每加拊慰或補官賜器幣覊縻之恩有加焉白蘭白蘭羌之别種東北接吐谷渾西至叱利摸徒南界郡鄂風俗物産與宕昌同周武帝保定元年朝獻使至有勝兵萬人勇於戰鬬唐武徳二年使者入朝以其地為維恭二州貞觀六年與契苾數十萬内属永徽時特浪生羌卜樓大首領凍就率衆来属以其地為劍州龍朔後白蘭春桑及白狗羌為吐蕃所臣藉其兵為前驅白狗與東㑹州接勝兵纔千人在西北者天授中内附户凡二十萬以其地為朝吳浮十州散居靈夏間吐蕃吐蕃在吐谷渾西南不知有國之所由或云秃髪利鹿孤有子樊尼其主傉檀為乞伏熾盤所滅樊尼率餘種依沮渠䝉遜其後子孫西魏時為臨松郡丞今張掖郡張掖縣界與主簿皆得衆心因魏末中華擾亂招撫羣羌日以强大遂改姓為窣蘇骨反㪍野至今故其人號其主曰贊府貴臣曰主簿又或云始祖贊普自言天神所生號鶻堤悉補野因以為姓窣㪍野與悉補野言訛其實一也或云夲姓弃蘇農也其國出都城五百里過烏海入吐谷渾部落彌多彌蘇毗及白蘭等國至吐蕃界其國風雨雷雹每隔日有之盛夏莭氣如中國暮春之月山有積雪地冷瘴令人氣急不甚為害其俗重漢繒而貴瑟瑟男女用為首飾其君長或在跂布川或居邏婆川有小城而不居坐大氊帳張大拂廬其下可容數百人兵衛極嚴而衙府甚狭俗飬牛羊取乳酪供食兼取毛為褐而衣焉不食驢馬肉以麥為麨人死殺牛馬以殉取牛馬積累於墓上其墓正方累石為之状若平頭屋其臣與君自為友號曰共命人其數不過五人君死之日共命人皆日夜縱酒𦵏日於脚下針血盡乃死便以殉𦵏又有親信人用刀當腦縫鋸亦有将四尺木大如指刺兩肋下死者十有四五亦殉𦵏焉設官父死子代絶嗣即近親襲焉非其種類輙不相服其官章飾有五等一謂瑟瑟二謂金三謂金飾銀上四謂銀五謂熟銅各以方圎三十褐上裝之安膊前以辨貴賤法令嚴肅兵器有弓刀楯矟甲胄每戰前隊皆死後隊方進人馬俱披鏁子甲其制甚精周體皆遍唯開兩眼非勁弓利刀之所能傷也其戰必下馬列行而陣死則逓收之終不肯退槍細而長於中國者弓矢弱而甲堅人皆用劍不戰亦負劍而行其驛以鐡箭為契其箭長七寸若急驛膊前加著一銀鶻有草名速古芒葉長二寸状若斜蒿有鼠尾長於常鼠其國禁殺者加其罪有可䟦海去赤嶺百里方圎七十里東南流入蠻與蠻西珥河合流而東號為漾鼻水又東南出㑹川為瀘水焉自赤嶺至邏婆川絶無大樹木唯有楊栁人以為資置大論以統理國事無文字刻木結䋲為約徴兵用金箭寇至舉燧與其臣下一年一小盟用羊狗獮猴三年一大盟用人馬牛驢以麥熟為嵗首其國都號為邏婆城用法嚴整議事則自下而起因人所利而行之此其所以能强且乆也重壮賤老母拜於子重兵死惡病終以累代戰殁者為甲門臨陣奔北者懸狐尾於其首表其似狐之怯其贊普㺯贊雄霸西域隋開皇中其主論贊索㺯贊都䍧牱西疋播城已五十年矣國界西南與婆羅門接自唐初有勝兵數十萬號為强國男女皆辮髪氊裘以赬塗面無器物以手捧酒而飲之屈木令圎以皮作底就中而食俗多金及小馬党項白蘭諸部及吐谷渾西域諸國咸畏懼之至其主弃蘇農贊貞觀十五年正月以宗室女封文成公主降於吐蕃贊普命禮部尚書江夏王道宗送之贊普親迎於河源見王執子壻禮甚謹歎大國服飾禮儀之羙俯仰有愧沮之色謂所親曰我祖父未有通婚大國者今我得尚大唐公主當築一城以誇後代仍遣酋豪子弟請入國學以習詩書至髙宗初封賨王蘇農死其子早卒以孫代立號乞梨㧞布幼小大相禄東贊攝知國事總章中以兵臨吐谷渾吐谷渾告急咸亨中髙宗令将軍薛仁貴郭待封等率衆十餘萬伐之至大非川為大論欽陵所敗因遂滅吐谷渾欽陵姓薛氏其父禄東贊頗曉兵術吐蕃贊府以國事委之講兵訓師雅有莭制吐蕃之并兼諸𦍑雄覇西土東贊有力焉有子五人及東贊死欽陵兄弟復専其國上元中冦鄯廓等州儀鳯二年遣工部尚書劉審禮為洮河軍總管率兵十八萬以討之戰於青海軍敗沒於陣調露二年中書令李敬元戰於大非川又敗績續遣黑齒常之襲擊破之武太后如意初武威軍總管王孝傑大破吐蕃復龜兹于闐疎勒碎葉四鎮至萬嵗通天初又寇凉州執都督許欽眀欽陵兄弟有才略欽陵多居中諸弟分鎮方面諸蕃憚之二年吐蕃大論欽陵遣使請和武太后遣前梓州通泉縣尉郭元振徃至野狐河與陵遇元振曰東贊事朝廷誓好無窮今猥自絶嵗擾邉父通之子絶之孝乎父事之子叛之忠乎陵謝曰天子許和罷兩國戍守以便百姓豈不休哉然以西十姓突厥四鎮諸國或時附蕃或時附漢斯類皆多翻覆乞聖恩㧞去鎮守分離属國多建君長使自為守既不欵漢又不属蕃人免憂慮荒陬幸甚元振曰唐以十姓四鎮撫西土為列國主道非有他且諸部與吐蕃異乆為唐編人矣欽陵曰使者意我規削諸部為唐邉患邪我若貪土地財賦彼青海湟川近矣今捨不争何㢤突厥諸部磧漠廣莾去中國逺甚安有争地萬里外耶且四夷唐皆臣并之雖海外地際靡不磨滅吐蕃適獨在者徒以兄弟小心得相保耳十妵五咄陸近安西於吐蕃逺俟斤距我裁一磧騎士騰突不易旬至是以為憂也烏海黄河關源阻奥多癘毒唐必不能入則弱甲孱将易以為蕃患故我欲得之非闚諸部也甘凉距積石道二千里其廣不數百狭才百里我若出張掖玉門使大國春不耕秋不穫不五六年可斷其右今棄不為亦無虞於我矣青海之役黄仁素約和邉守不戒崔知辯徑俟斤掠我牛羊萬計是以求之使使者固請元振固言不可許后從之欽陵専國乆常居中制事諸弟皆領方面兵而贊婆専東境㡬三十年為邉患兄弟皆才略沈雄衆憚之贊普子器弩悉㺯既長欲自得國漸不平乃與大臣論巖等圗去之欽陵方提兵居外贊普託言獵即勒兵執其親黨二千餘人殺之發使者召欽陵贊婆欽陵不受命贊普自討未戰欽陵兵潰乃自殺左右殉而死者百餘人贊婆以所部及兄子莾布支等欵塞遣羽林飛騎迎勞擢贊婆特進輔國大将軍歸徳郡王莾布支左羽林大将軍安國公皆賜鐡劵禮慰良厚贊婆即領部兵戍河源死贈安西大都䕶又遣左肅政臺御史大夫魏元忠為隴右諸軍大總管率隴右諸軍大使唐休璟出討方虜攻凉州休璟擊之斬首二千級於是論彌薩来朝請和贊普自将萬騎攻悉州都督陳大慈四戰皆克眀年乃獻馬黄金求婚而虜南属帳皆叛贊普自討死於軍諸子争立國人立棄𨽻蹜贊為贊普始七嵗使者来告喪且求盟又使大臣悉董熱固求婚未就㑹監察御史李知古建討姚州蠻削吐蕃向導詔𤼵劍南募士擊之蠻酋以情輸虜殺知古尸以祭天進攻蜀漢詔靈武監軍右臺御史唐九徴為姚嶲道討擊使率兵擊之虜以鐡絙梁漾濞二水通西洱蠻築城戍之九徴毁絙夷城建鐡柱於滇池以勒功中宗景龍二年還其婚眀年遣使入貢可敦又遣宗俄請婚帝以雍王守禮女為金城公主妻之賜主錦繒雜伎甚厚公主至吐蕃自築城以居拜楊矩為鄯州都督吐蕃雖外和而隂銜怒即厚餉矩請河西九曲為公主湯沐矩表與其地九曲者水甘草良宜畜牧近與唐接自是虜益張雄易入冦元宗開元二年其相坌逹延上書宰相乞載盟文定境於河源帝令姚崇等報書命觧琬持神龍誓書吐蕃亦遣其臣来未㡬而以兵十萬寇臨洮入攻蘭渭掠監馬楊矩懼自殺詔薛訥王晙等討之斬首萬七千獲羊馬無慮二十萬又戰長子虜大敗相枕籍死洮水為之不流宰相建言吐蕃夲以河為境以公主故乃橋河築城置獨山九曲二軍距積石二百里今既負約請毁橋復守河如約詔可遣左驍衛郎将尉遲環使吐蕃慰安公主然小小入犯邉無閑嵗於是郭知運王君􅎢相繼莭度隴右河西以扞之吐蕃遣宗俄因子到洮水祭戰死士且請和然恃盛彊求與天子敵國語悖傲使者至臨洮詔不内金城公主書求聽修好且言贊普君臣欲與天子共署誓刻吐蕃又遣使者上書言孝和皇帝甞賜盟時唐宰相豆盧欽望魏元忠李嶠紀䖏訥等凡二十二人及吐蕃君臣同誓孝和皇帝崩太上皇嗣位修睦如舊然唐宰相在誓刻者皆殁今宰相不及前約故須再盟比使論乞力等前後七輩徃未䝉開許且張元表李知古将兵侵暴甥國故違誓而戰今舅許湔貸前惡歸於大和甥既堅定然不重盟為未信要待新誓也帝謂昔已和親有成言尋前盟可矣不許復誓禮其使而遣之且厚賜贊普自是嵗朝貢不犯邉十年攻小㪍律國其王沒謹忙貽書北廷莭度使張孝嵩曰㪍律唐西門失之則四方諸國皆墮吐蕃孝嵩乃遣歩騎四千與沒謹忙兵夹擊吐蕃敗之復九城故地㪍律王来朝置綏逺軍以扞吐蕃欲假道㪍律以攻四鎮十四年悉諾邏兵入大斗谷遂攻甘州隴右節度使王君􅎢遣兵追躡之多所俘獲時中書令張説以吐蕃出入勝負略相當甘凉河鄯之人調發困甚願聽其和帝不從未㡬悉諾邏等陷𤓰州遂攻玉門軍安西副都䕶趙頥貞擊却之乃命蕭嵩張守珪城𤓰州屢破吐蕃置振武軍獻俘於朝詔軍士掩戰能擒其王者授大将軍士益奮吐蕃乃求和忠王友皇甫惟眀等請許之帝乃以書賜金城公主贊普大喜遣人随使者入朝表言甥以文成金城公主敢失禮乎曩特以冲㓜枉為邉将讒亂如䝉澄亮死且萬足千萬嵗不敢先負盟且獻怪寳上禮其使遣御史大夫崔琳報聘吐蕃又請交馬於赤嶺互市於甘松嶺宰相裴光庭曰甘松中國阻不如許赤嶺乃聽以赤嶺為界表以大碑刻約其上又請五經勅祕書寫賜并賜物萬計吐蕃遣人謝眀年又上寳器數百具制治詭殊其後吐蕃西擊勃律勃律告急帝諭令罷兵不聼卒殘其國於是崔希逸為河西節度使鎮凉州故時疆畔皆樹壁守捉希逸謂虜戍将乞力徐曰兩國約好而守備不廢云何請皆罷以便人乞力徐曰公忠誠無不可恐朝廷未皆信脱掩吾不備其可悔希逸固邀乃許共刑白犬盟而後悉撤障壁虜畜牧被野眀年傔史孫誨奏事妄言虜無備可取也帝采之詔内豎趙恵琮共徃按状小人欲徼幸至凉州因共矯詔詔希逸𤼵兵襲破吐蕃青海上斬獲不貲乞力徐遁去吐蕃恚不朝二十六年大入河西希逸拒破之希逸既而深自愧以失信悒悵至死誨亦坐事誅乃命蕭炅杜希望王昱等分道經略碎赤嶺碑希望破吐蕃軍三萬昱以劍南兵入攻安戎城次蓬婆嶺吐蕃盡鋭来攻昱大敗士死凡數萬吐蕃攻維州不得志遣使請和不許虜乃悉衆四十萬攻承風堡臧希鋭破之又襲廓州攻振武軍皇甫惟眀哥舒翰等破之俘其大酋是時吐蕃與蠻閤羅鳯聨兵攻瀘南劍南節度使楊國忠方以姦罔上自言破蠻衆六萬於雲南拔故洪州等三城獻俘口哥舒翰破洪濟大莫門諸城收九曲故地列郡縣實天寳十二載於是置神策軍於臨洮西澆河郡於積石西及宛秀軍以實河曲後二年蘇毗子悉諾邏来降封使義王賜姓李氏蘇毗强部也是嵗贊普乞黎蘇籠臘替死子挲悉籠臘贊嗣遣使者修好詔京兆少尹崔光逺持莭賫冊弔祠還而安禄山亂哥舒翰悉河隴兵東守潼關而諸将各以所鎮兵討難始號行營邉候空虚故吐蕃得乗隙暴掠至徳初取嶲州及威武等諸城入屯石堡其眀年使使来請討賊且修好肅宗遣給事中南巨川報聘然嵗内侵取廓霸岷等州及河源莫門軍使數来請和帝雖審其譎姑務紓患乃詔宰相郭子儀蕭華裴遵慶等與盟寳應元年陷臨洮取秦成渭等州眀年使散騎常侍李之芳太子左庶子崔倫徃聘吐蕃留不遣破西山合水城眀年入大震關取蘭河鄯洮等州於是隴右地盡亡進圍涇州入之降刺史髙暉又破邠州入奉天副元帥郭子儀禦之吐蕃以吐谷渾党項兵二十萬東略武功渭北行營将吕日将戰盩厔西破之又戰終南日将走代宗幸陕子儀退趨商州髙暉導虜入長安立廣武王承宏為帝改元擅作赦令署官吏衣冠皆南奔荆襄或逋棲山谷亂兵因相攘鈔道路梗閉光禄卿殷仲卿率千人壁藍田選二百騎渡滻或紿虜曰郭令公軍且来吐蕃大震㑹少将王甫與惡少年伐鼓譟苑中虜驚夜引去子儀入長安髙暉東奔至潼關守将李日越殺之吐蕃留京師十五日乃走天子還京吐蕃退圍鳯翔節度使孫志直拒守鎮西節度使馬璘以千騎戰却之吐蕃屯原㑹成渭間自如也是嵗南入松維保等州及雲山新籠城眀年還使人李之芳等劍南嚴武破吐蕃南鄙兵七萬㧞當狗城㑹僕固懐恩反自靈武遣其将范志誠任敷合吐蕃吐谷渾兵攻邠州白孝徳郭晞嬰壘守乃入居奉天西子儀入奉天按軍不戰郭晞以鋭士夜擣其營斬首數千級奪馬五百取四将吐蕃引去是時嚴武㧞鹽州又戰西山取其衆八萬虜圍凉州河西莭度使楊志烈不能守跳保甘州而凉州亡永㤗元年吐蕃請和詔宰相元載杜鴻漸與虜使者同盟懐恩不得志導虜與回紇党項羌渾奴刺犯邉吐蕃大酋尚結息贊摩尚悉東贊等衆二十萬至醴泉奉天邠将白孝徳不能抗任敷以兵略鳯翔盩厔於是京師戒嚴天子自率六軍屯於苑吐蕃逼奉天使朔方兵馬渾日進率勇士馳之左右擊刺皆應弦仆虜大驚乃夜攻其營斬千餘級又戰馬嵬凡七日破賦萬人斬獲甚衆㑹懐恩死虜謀無主遂與回紇争長回紇怒詣子儀請擊吐蕃自效子儀許之使白元光合兵攻吐蕃於靈臺西大破之帝乃班師永泰大歴間再遣使者来聘詔户部尚書薛景仙徃報又詔宰相與吐蕃使者盟俄寇靈州靈州屯兵破之復略邠州馬璘白元光等再破其衆天子以虜數入塞詔治守障徙當悉柘静恭五州皆㩀險以守八年侵靈州進寇涇邠渾瑊與戰不利馬璘以兵掩之郭子儀又破其衆十萬九年帝遣諫議大夫吳損修好虜亦使使者入朝眀年復攻臨涇隴州又眀年崔寜破其兵斬首萬級俘獲甚衆吐蕃不得志入掠黎雅於是劍南兵合南詔與戰破之擒其大酋十三年虜以四萬騎寇靈州又合南詔衆二十萬攻茂州略扶文遂侵黎雅詔發幽州兵與戰大破之初虜使數至留不遣所俘虜口悉部送江南徳宗即位以嵗與虜戰亡獲相償謀綏懐之遣太常少卿韋倫持節歸其俘五百厚給衣褚切勅邉吏䕶亭障無輙侵虜地吐蕃始聞未信使者入境乃感畏時乞立贊為贊普即發使者随倫入朝又遣使獻方物眀年殿中少監崔漢衡徃使贊普曰我與唐舅甥國詔書乃用臣禮卑我又請雲州西盡賀蘭山為吐蕃境且引景龍詔書曰唐使至甥先與盟蕃使至舅亦将親盟贊普曰其禮夲均帝許之以獻為進賜為寄領取為領之並約地於賀蘭其大相尚悉結嗜殺人以劍南之敗未報不助和議次相尚結贊有謀固請休兵贊普卒用結贊為大相乃講好約盟境上約唐地涇州右盡彈筝峡隴州右極清水鳯州西盡同谷劍南盡西山大度水吐蕃守鎮蘭渭原會西臨洮東成州抵劍南西磨些諸蠻大度水之西南盡大河北自新泉軍抵大磧南極賀蘭橐駝嶺其間為閑田二國所棄戍地毋増兵毋創城堡毋耕邉田帝又命宰相尚書與虜使盟長安朱泚之亂吐蕃請助討賊詔遣使持莭慰撫渾瑊用論莾羅兵破泚将韓旻於武亭川初與虜約得長安以涇靈四州畀之㑹大疫虜輙引去及泚平責舊約求地天子薄其勞第賜詔書償結贊莾羅等帛萬疋於是虜以為怨貞元二年虜犯涇隴邠寧掠人畜敗田稼尚結贊屯上砦原遣使請盟李晟遣部将王佖以鋭兵三千入汧陽薄其中軍虜驚潰走結贊僅自脱虜衆三萬侵鳯翔晟又擊却之又攻鹽夏䧟之天子以邉人殘没下詔避殿自責詔駱元光經略鹽夏虜得二州皆戍以兵乃自屯鳴沙然饋餉數困於是駱元光韓㳺瓌濵塞而屯馬燧次石州跨河相掎角結贊懼屢請盟天子不許乃厚賂乞和於燧燧以為情身入見天子結贊又使言若許盟當以鹽夏還唐乃以渾瑊為盟㑹使約盟平凉結贊伏精騎三萬於西縱瑊等就幄虜三伐鼓衆譟而興瑊遁得免副使崔漢衡等皆被執始結贊欲擒瑊等擣虚入寇及見漢衡等坐帳中慢言渾瑊戰武功我力也許裂地償我而自食其言吾既作金枷必得瑊以見贊普今失之徒致公等無益也虜戍鹽夏渉春疫大興皆思歸乃火其廬舍頹郛堞而去結贊歸漢衡等而却其使結贊乃以兵犯鳯翔入寳雞焚掠而去又剽汧陽華亭掠牛羊率萬計涇隴邠之民蕩然盡矣諸將曽不能得一俘但賀賊出塞而已四年五月虜三萬騎略涇邠寧慶鄜五州之鄙焚吏舍民閻係執數萬又寇寧州轉剽鄜坊五年韋臯以劍南兵與戰殺其将西南少安不三年盡得嶲州地久之北廷沙陀别部叛吐蕃因是陷北庭都䕶府安西道絶獨西州人尚為唐守八年寇靈州又寇涇州詔城鹽州以兵戍之時韋臯屢破其兵俘馘三萬降其首領十二年寇慶州及華池是嵗尚結贊死眀年贊普死其子足之煎立使使来請好朝廷以其無信不受十四年韓全義破虜於鹽州十七年寇鹽州陷麟州韋臯屢破其兵因定昆眀諸蠻臯圍維州贊普引兵十萬援之臯率南詔薄之擒其酋獻京師眀年吐蕃使論頬熱来右龍武大将軍薛伾徃報二十年贊普死詔遣使弔祭其弟嗣立使使入朝順宗立以田景度等持節徃使永貞元年来歸金幣牛馬助崇陵憲宗初遣使者修好且還其俘其後比年来朝貢又欵隴州塞丐互市詔可十二年贊普死遣使弔祭吐蕃使論矩立蔵来朝未出境吐蕃寇宥州與靈州兵戰不勝斬首二千級郝玭又破其兵二萬詔留矩立等不遣十四年乃歸之吐蕃又遣兵十五萬圍鹽州不能拔朔方将史敬奉以竒兵大破之復攻沙州陷之穆宗即位復通使虜引兵入屯靈武靈州兵擊却之又寇涇州長慶元年遣使来朝且乞盟詔許之盟京師西郊又遣使就盟其國虜遣論悉諾息等入謝天子命左衛大将軍令狐通等報之比嵗使者獻金盎銀冶犀鹿貢㹈牛寳器至太和再遣使者朝五年維州守将悉怛謀挈城以降劍南西川節度使李德裕受之州南抵江陽岷山西北望隴山一靣崖三涯江虜號無憂城為西南要扞㑹牛僧儒當國議還悉怛謀歸其城吐蕃夷誅無遺種以怖諸戎自是比五年虜使来必報所貢有玉帶金皿獺褐㹈牛尾霞㲲馬羊槖駝贊普立㡬三十年病不事委任大臣故不能抗中國邉候晏然死以弟逹磨嗣逹磨嗜酒好畋獵喜内且凶愎少恩政益亂開成四年遣太子詹事李景儒徃使吐蕃以論集熱来朝獻玉器羊馬自是國中地震裂水泉湧岷山崩洮水逆流三日䑕食稼人飢疫死者相枕藉鄯廓間夜聞鼙鼓聲人相驚㑹昌二年贊普死論贊熱等来告天子命将作監李璟弔祠無子以妃綝兄尚延力子乞離胡為贊普始三嵗妃共治其國大相結都那見乞離胡不肯拜曰贊普支属尚多何至立綝氏子邪哭而出用事者共殺之别将尚恐熱為落門川討擊使姓求名農力熱猶中國號郎也譎詭善幻約三部得萬騎擊鄯州節度使尚婢婢地至渭川與宰相尚與思羅戰薄塞思羅敗走松州合蘇毗吐渾羊同兵八萬保洮河自守恐熱謂蘇毗等曰宰相兄弟殺贊普天神使我舉義兵誅不道爾属乃助逆背國邪蘇毗等疑而不戰恐熱麾輕騎渉河諸部先降并其衆至十餘萬禽思羅縊殺之婢婢姓沒盧名贊心夲羊同國人世為吐蕃貴相寛厚略通書記不喜仕贊普强官之三年國人以贊普立非是皆叛去恐熱自號宰相以兵二十萬擊婢婢鼓鼙牛馬槖駝聨千餘里至鎮西軍大風雷電部将震死者十餘人羊馬槖駝亦數百恐熱惡之按軍不進婢婢聞之厚幣詒書約驩恐熱大喜曰婢婢書生焉知軍事我為贊普當以家居宰相處之於是退營大夏川婢婢遣将擊之敗其兵恐熱遁眀年恐熱復攻鄯州婢婢拒守恐熱兵敗兵拏連嵗不解婢婢與恐熱相持婢婢糧盡引衆趨甘州西境以拓跋懐光居守恐熱麾下多歸之恐熱大掠鄯廓𤓰肅伊西等州所過捕戮積尸狼籍麾下咸怨欲圖之乃揚聲将請唐兵五十萬共定其亂保渭州求冊為贊普奉表歸唐宣宗詔太僕􅀸陸耽持節慰勞命涇原靈武鳯翔邠寜振武等兵迎援恐熱既至詔尚書左丞李景讓就問所欲恐熱倨夸自大且求河渭節度使帝不許還過咸陽橋咄歎曰我舉大事覬得濟此河與唐分境於是復趨落門川收散卒将寇邉㑹久雨糧絶恐熱還奔廓州於是鳯翔節度使李泚復清水涇原節度使康季榮復原州取石門等六關得人畜幾萬靈武節度使李欽取安樂州詔為威州邠寜節度使張欽緒復蕭關鳯翔收秦州山南西道節度使鄭涯得扶州鳯翔兵與吐蕃戰隴州斬首五百級是嵗河隴髙年千餘見闕下天子為御延喜樓賜冠帶皆爭解辮易服因詔差賜四道兵錄有勞者三州七關地腴衍者聽民墾藝貸五嵗賦温池委度支𣙜其鹽以贍邉四道兵能營田者為給牛種戍者倍其資饟再嵗一代商賈徃来於邉者關鎮毋苛留兵欲墾田與民同初太宗平薛仁杲得隴上地虜李軌得凉州破吐谷渾髙昌開四鎮元宗繼收黄河磧石宛秀等軍中國無斥候警者㡬四十年輪臺伊吾屯田禾菽彌望開逺門揭候署曰西極道九千九百示戍人無萬里行也乾元後隴右劒南西山三州七關軍鎮監牧三百所皆失之憲宗嘗覽天下圖見河湟舊封赫然思經略之未暇也至是羣臣奏言王者建功立業必有以光表於世者今不勤一卒血一刃而河湟自歸請上天子尊號帝曰憲宗嘗念河湟業未就而殂落今當述祖宗之烈其議上順憲二廟諡號夸顯後世又詔朕姑息民其山外諸州須後經營之眀年沙州首領張義潮奉𤓰沙伊肅甘等十一州地圖以獻始義潮隂結豪傑歸唐一日衆擐甲譟州門漢人皆助之虜守者驚走遂攝州事繕兵甲耕且戰悉復餘州以部校十輩皆操挺内表其中東北走天德城防禦使者齎詔收慰擢義潮沙州防禦使俄號歸義軍遂為節度使其後河渭州虜将尚延心以國破亡亦獻欵秦州刺史髙駢誘降延心及渾末部萬帳遂收二州拜延心武衛将軍駢收鳯林關以延心為河渭等州都遊奕使咸通二年義潮奉凉州来歸七年北廷回鶻僕固俊擊取西州收諸部鄯州城使張季顒與尚恐熱戰破之收器鎧以獻吐蕃餘衆犯邠寜節度使薛𢎞宗郤之㑹僕固俊與吐蕃大戰斬恐熱首傳京師八年張義潮入朝為右神武統軍賜第及田命族子淮深守歸義十三年卒沙州以長史曹義金領州務遂授歸義節度使後中原多故王命不及甘州為回鶻所并歸義諸城多沒渾末亦曰嗢末吐蕃奴部也虜法出師必發豪室皆以奴從平居散處耕牧及恐熱亂無所歸共相嘯合數千人以嗢末自號居甘肅𤓰沙河渭岷廓疊宕間其近蕃牙者最勇而馬尤良云唐末𤓰沙之地復為所隔然吐蕃自是衰弱族種分散大者數千家小者百十家無復統一矣自儀渭涇原環慶及鎮戎秦州暨於靈夏皆有之各有首領内属者謂之熟户餘謂之生户凉州雖為所隔然其地自置牧守或請命於中朝文獻通考卷三百三十四
