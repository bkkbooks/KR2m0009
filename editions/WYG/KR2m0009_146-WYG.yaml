body:
  text: 文獻通考卷一百四十六鄱陽馬端臨貴與著樂考十九俗部樂女樂清樂者其始即清商三調是也並漢氏以來舊典樂器形制幷歌章古調與魏三祖所作者皆備於史籍屬晉朝遷播夷羯竊據其音分散符永固平張氏於凉州得之宋武平關中因而入南不復存於内地及隋平陳後獲之文帝聽之善其節奏曰此華夏正聲也昔因永嘉流於江外我受天明命今復會同雖音逐時遷而古制猶在可以此為本微更損益去其哀怨考而補之以新定吕律更造樂器因置清商署總謂之清樂先遭梁陳亡亂而所存益尠隋室以來日益淪缺隋開皇時初㝎令置七部樂一曰國伎二曰清商伎三曰高麗伎四曰天竺伎五曰安國伎六曰龜茲伎七曰文康伎即禮畢也又雜有疎勒扶南康國百濟突厥新羅倭國等伎其後牛宏請存鞞鐸巾拂等四舞與新伎並陳因稱四舞漢魏以來並施於宴饗鞞舞漢巴渝舞也鐸舞傅元代魏辭云振鐸鳴金成公綏賦云鞞鐸舞庭八音並陳是也拂舞即呉舞白符鳩是也巾舞者公莫舞是也平陳後並在宴會與雜伎同設於西凉前奏之帝曰其音聲節奏及舞悉宜依舊惟舞人不須捉鞞拂等煬帝大業中定清樂西凉龜茲天竺康國疎勒安國高麗禮畢以為九部樂器工衣創造成大備於茲唐高祖即位仍隋制設九部樂燕樂伎樂工舞人無變者清商伎者隋清樂也有編鐘編磬獨弦琴擊琴瑟秦琵琶卧箜篌筑筝節鼓皆一笙笛簫箎方響槃鞞皆二歌二人吹葉人舞者四人幷習巴渝舞西凉伎有編鐘編磬皆一彈筝搊筝卧箜篌􅆆箜篌琵琶五弦笙簫觱篥小觱篥笛横笛腰鼓齊鼓檐鼓皆一銅鈸二具一白舞一人方舞四人天竺伎有銅鼓羯鼓都曇鼓毛員鼔觱篥横笛鳳首箜篌琵琶五弦具皆一銅鈸二舞者二人高麗伎有彈筝搊筝鳳首箜篌卧箜篌竪箜篌琵琶以蛇皮為槽厚寸餘有鱗甲楸木為靣象牙為捍撥畫國王􅄱又有五弦義觜笛笙葫蘆笙簫小觱篥桃皮觱篥腰鼓齊鼓龜頭鼓鐵板具大觱篥胡旋舞舞者立毬上旋轉如風龜茲伎有彈筝竪箜篌琵琶五弦横笛笙簫觱篥答臘鼓毛員鼓都曇鼓侯提鼓鷄婁鼓腰鼓齊鼓檐鼓具皆一銅鈸二舞者四人設五方師子高丈餘飾以五方色毎師子有十二人畫衣執紅拂首加紅袜謂之師子郎安國伎有竪箜篌琵琶五弦横笛簫觱篥正鼓和鼓銅鈸皆一舞者二人踈勒伎有竪箜篌琵琶五弦簫横笛觱篥答臘鼔羯鼓侯提鼓腰鼓雞婁鼓皆一舞者二人康國伎有正鼓和鼓皆一笛銅鈸皆二舞者二人工人之服皆從其國隋樂毎奏九部樂終輙奏文康樂一曰禮畢太宗時命削去之其後遂亡禮畢者本自晉太尉庾亮家亮卒其伎追思亮因假為其靣執翳以舞象其容取諡以號之謂文康樂每奏九部樂終則陳之故以禮畢為名其曲有散華樂等隋平陳得之入九部樂器有笙笛簫箎鈴槃鞞腰鼓等七鐘三懸為一部工人二十二人既平高昌收其樂有竪箜篌銅角一琵琶五弦横笛簫觱篥答臘鼓腰鼓雞婁鼓羯鼓皆二人工人布巾袷袍錦襟金銅帶畫袴舞者二人黄袍褏練襦五色絛帶金銅耳璫赤鞾自是初有十部樂其後因内宴詔長孫無忌製傾盃曲魏徴製樂社樂曲虞世南製英雄樂曲帝之破竇建徳也乗馬名黄驄驃及征高麗死於道頗哀惜之命樂工製黄驄疊曲四曲皆宫調也五弦如琵琶而小北國所出舊以木撥彈樂工裴神符初以手彈太宗悦甚後人習為搊琵琶高宗即位景雲見河水清張文收采古誼為景雲河清歌亦名燕樂有玉磬方響搊筝筑卧箜篌大小箜篌大小琵琶大小五弦吹葉大小笙大小觱篥簫銅鈸長笛尺八短笛皆一毛員鼓連鞉鼓桴鼓具皆二每器工一人歌二人工人絳袍金帶烏鞾舞者二十人分四部一景雲舞二慶善舞三破陣舞四承天舞景雲樂舞八人五色雲冠錦袍五色袴金銅帶慶善樂舞四人紫袍白袴破陣樂舞四人綾袍絳袴承天樂舞四人進徳冠紫袍白袴景雲舞元會第一奏之高宗以琴曲寖絶雖有傳者復失宫商令有司修習太常丞吕才上言舜彈五弦之琴歌南風之詩是知琴操曲弄皆合於歌今以御雪詩為白雪歌古今奏正曲復有送聲君唱臣和之義以羣臣所和詩十六韻為送聲其節帝善之乃命太常著於樂府才復撰琴歌白雪等曲帝亦製歌詞十六皆著樂府帝将伐高麗燕洛陽城門觀屯營教舞按新征用武之勢名曰一戎大定樂舞者百四十人被五采甲持槊而舞歌者和之曰八弦同軌樂象高麗平而天下大定也及遼東平行軍大總管李勣作夷美賔之曲以獻調露二年幸洛陽城南樓宴羣臣太常奏六合還淳之舞其容制不傳高宗自以李氏老子之後也於是命樂工製道調自周陳以上雅鄭淆雜而無别隋文帝始分雅俗二部至唐更曰部當凡所謂俗樂者二十有八調正宫高宫中吕宫道調宫南吕宫仙吕宫黄鍾宫為七宫越調大石調高大石調䨇調小石調歇指調林鍾商為七商大石角高大石角䨇角小石角歇指角林鍾角越角為七角中吕調正平調高平調仙吕調黄鍾羽般渉調高般渉為七羽皆從濁至清迭更其聲下則益濁上則益清慢者過節急者流蕩其後聲器寝殊或有宫調之名或以倍四為度有與律吕同名而聲不近雅者其鍾調乃應夾鍾之律燕設用之絲有琵琶五弦箜篌筝竹有觱篥簫笛匏有笙革有杖鼓第二鼔第三鼓腰鼓大鼓土則附革而為鞚木有拍板方響以體金應石而備八音倍四本屬清樂形𩔖雅音而曲出於胡部復有銀字之名中管之格皆前代應律之器也後人失其傳而更以異名故俗部諸曲悉源流於雅樂周隋管弦雜曲數百皆西凉樂也鼓舞曲皆龜茲樂也唯琴工猶傳椘漢舊聲及清調蔡邕五弄椘調四弄謂之九弄隋亡清樂散缺存者纔三十六曲其後傳者平調清調周房中樂遺聲也白雪椘曲也公莫舞漢舞也巴渝漢高祖命工人作也明君漢元帝時作也明之君漢鞞舞曲也鐸舞漢曲也白鳩呉拂舞曲也白紵呉舞也子夜晉曲也前溪晉車騎將軍沈珫作也團扇晉王坰歌也懊儂晉隆安初謡也長史變晉司徒左長史王廞作也丁督䕶晉宋間曲也讀曲宋人為彭城王義康作也烏夜啼宋臨川王義慶作也石城宋臧質作也莫愁石城樂所作也襄陽宋隋王誕作也烏夜飛宋沈攸之作也估客樂齊武帝作也楊叛比齊歌也驍壺投壺樂也常林歡宋梁間曲也三洲商人歌也採桑三洲曲所作也玉樹後庭花堂堂陳後主作也泛龍舟隋煬帝作也又有呉聲四時歌雅歌上林鳯雛平折命嘯等曲其聲與其辭皆訛失十不傳其一二蓋唐自太宗高宗作三大舞雜用於燕樂其他諸曲出於一時之作雖非純雅尚不至於淫放武后之禍繼以中宗昏亂固無足言者教坊自唐武徳以來置署在禁門内開元後其人寖多凡祭祀大朝會則用太常雅樂嵗時宴享則用教坊諸部樂前代有讌樂清樂散樂𨽻太常後稍歸教坊舊制雅俗之樂皆𨽻太常元宗精曉音律以太常禮樂之司不應典倡優雜伎乃更置左右教坊以教俗樂命右驍衛将軍范及為之使又選樂工數百人自教法曲於梨園謂之皇帝梨園弟子又教宫女使習之選伎女置宜春院給賜其家禮部侍郎張廷珪上䟽深以鄭聲為戒上嘉賞之而不能用致堂胡氏曰元宗謂太常不應典倡優雜伎是也而更置坊院盛選宫女以實之此則煬帝所為也傳曰君以此始必以此終元宗之亡也直坐好樂而已而廷臣獨張廷珪一人進諫又不見納昔顔回亞聖之資問為邦於孔子孔子既語以四代之制且曰放鄭聲逺佞人鄭聲淫佞人殆夫以顔子尚當戒此况元宗處富貴之極乎大臣之責務引其君以當道格其非心而防其微漸者也姚崇於是昧其所職矣夫鄭衞之音進俯退俯姦聲以濫溺而不止及優侏儒猱雜子女淫於色而害於徳而使人主玩心儲神夜以繼日雖英明剛毅或未免於移其志意况元宗中人之質乎元宗時分樂為二部堂下立奏謂之立部伎堂上坐奏謂之坐部伎太常閲坐部不可教者𨽻立部又不可教者乃習雅樂立部八一安舞二太平樂三破陣樂四慶善樂五大定樂六上元樂七聖夀樂八光聖樂安舞太平樂周隋遺音也破陣樂以下用大鼓雜以龜茲樂其聲震厲大定樂又加金鉦慶善樂専用西凉樂聲頗閑雜每享郊廟則破陣上元慶善三舞皆用之坐部伎六一燕樂二長夀三天授樂四鳥歌萬嵗樂五龍池樂六小破陣樂天授鳥歌皆武后作也天授年名鳥歌者有鳥能人言萬嵗因以制樂自長夀樂以下用龜茲舞唯龍池樂則否明皇開元中宜春院伎女謂之内人雲韶院謂之宫人平人女選入者謂之搊彈家内人帶魚宫人則否每勤政樓大會樓下出隊宜春人少則以雲韶足之帶初幕皆純色縵衣至第二疊悉萃塲中即從領上裭籠衫懷之次第而出繞聚者數匝以容其更衣然後分隊觀者俄見藻繡爛然莫不驚異凡内伎出舞教坊諸工唯舞伊州五天二曲餘曲盡使内人舞之文宗時教坊進霓裳羽衣舞女三百人唐舊制承平無事三二嵗必於盛春殿内錫宴宰相及百辟備韶濩九奏之樂設魚龍曼延之戱連三日抵暮方罷宣宗天賦聰哲於音律特妙每将錫宴必裁新曲俾禁中女伶迭相教授至是日出數十百輩衣以珠翠緹繡分行列隊連􅃑而歌其聲清怨殆不𩔖人間其曲有曰播皇猷者率高冠方履褒衣博帶趨歩俯仰皆合規矩于于然有唐堯之風焉有曰葱西女士踏歌隊者其詞大率言葱嶺之士樂河湟故地歸國復為唐民也有曰霓裳曲者率皆執幡節被羽服態度凝澹飄飄然疑有翔雲飛鸖變見左右如是者數十曲皆理世之聲教坊伎兒輩遂寫其曲奏於外自是徃徃流傳民間然錫宴宰輔百辟至於連日抵暮是不知詩人在宗載考之意也以禁中女伶連􅃑歌怨以盡臣下之歡豈不㡬於君臣相謔邪唐之所以衰亂不振者彼誠有以召之也可不戒哉宋朝循舊制教坊凡四部其後平荆南得樂工三十二人平西川得一百三十九人平江南得一十六人江南有坐部至是不用平太原得一十九人餘藩臣所貢者八十三人又太宗藩邸有七十一人由是四方執藝之精者皆在籍中每春秋聖節三大宴其第一皇帝升座宰相進酒次并翰林使進庭中吹觱篥以衆樂和之賜羣臣酒皆就坐宰相飲作傾盃樂百官飲作三臺第二皇帝再舉酒羣臣立於席後凡舉御酒皆然樂以歌起第三皇帝舉酒如第二之制以次進食第四百戯皆作第五皇帝舉酒如第二之制第六樂工致辭繼以詩一謂之口號皆述徳美及中外蹈詠之情初致辭羣臣皆起聽辭畢再拜第七合奏大曲第八合奏皇帝舉酒殿上獨彈琵琶第九小兒隊舞亦致辭以述徳美第十雜劇罷皇帝起更衣第十一皇帝再坐舉酒殿上獨吹笙第十二楚蹵鞠第十三皇帝舉酒殿上獨彈筝第十四女弟子隊舞亦致辭如小兒隊第十五雜劇第十六皇帝舉酒如第二之制第十七奏鼓笛曲或用龜茲第十八皇帝舉酒如第二之制食罷第十九角觝宴畢其御則酺大宴崇徳殿宴契丹使惟無後塲雜劇及女弟子舞隊臺南設燈山每上元觀燈樓前設露臺臺上奏教坊樂樂舞小兒隊臺南設燈山燈山前陳百戯山棚上用散樂舞女弟子餘曲宴賞花習射觀稼凡所遊幸但奏樂行酒雜劇慶節上夀及将相入辭賜酒則止奏樂都知色長二人攝太官令升殿對立吿廵周大宴則唱酒徧曲宴宰相羣臣雖各舉酒通用慢曲而無三臺耳所奏凡十八調四十大曲一曰正宫調其曲三曰梁州瀛府齊天樂二曰中吕調其曲二曰萬年歡劍器三曰道調宫其曲三曰梁州薄媚大勝樂四曰南吕宫其曲二曰瀛府薄媚五曰仙吕宫其曲三曰梁州保金枝延夀樂六曰黄鍾宫其曲三曰梁州中和樂劍器七曰越調其曲二曰伊州石州八曰大石調其曲二曰清平樂大明樂九曰䨇調其曲三曰降聖樂新水採蓮十曰小石調其曲二曰胡渭州嘉慶樂十一曰歇指調其曲三曰伊州君臣相遇樂慶雲樂十二曰林鍾商其曲三曰賀皇恩汎清波胡渭州十三曰中吕調其曲二曰六么道人歡十四曰南吕調其曲二曰六么罷金鉦十五曰仙吕調其曲二曰六么彩雲歸十六曰黄鍾羽其曲一曰千春樂十七曰般渉調其曲二曰長夀仙滿宫春十八曰正平調無大曲小曲無定數不用者有十調一曰高宫二曰高大石三曰高般渉四曰越角五曰大石角六曰高大石角七曰䨇調角八曰小石角九曰歇指角十曰林鍾角樂用琵琶箜篌五弦笙筝觱篥笛方響羯鼓杖鼓大鼓拍板法曲部其曲二一曰道宫調望瀛二曰小石調獻仙音樂用琵琶箜篌五弦笙觱篥笛方響拍板龜茲曲部其曲皆䨇調一曰宇宙清二曰感皇恩樂用觱篥笛羯鼓腰鼓楷鼓雞婁鼓鼗鼓拍板鼓笛部樂用三色笛杖鼓拍板隊舞之制其名各十小兒隊凡七十二人一曰柘枝隊衣五色繡羅寛袍戴胡帽繫銀帶二曰劔器隊衣五色繡羅􅃭裹交脚幞頭紅羅繡抹額器仗三曰婆羅門隊衣紫羅僧衣緋掛子執錫鐶拄杖四曰醉胡騰隊衣紅錦􅃭繫䩞鞢戴氊帽五曰諢臣萬嵗樂隊衣紫緋緑羅寛衫諢裹簇花帽頭六曰兒童感聖樂隊衣青羅生色衫繫勒帛總两角七曰玉兎渾脱隊衣四色繡羅􅃭繫銀帶冠玉兎冠八曰異域朝天隊錦􅃭繫銀束帶冠畨冠執寳盤九曰兒童解紅隊衣紫緋繡􅃭繋銀帶冠花砌鳳冠帶綬帶十曰射鵰廽鶻隊衣盤鵰錦􅃭繫銀䩞鞢射鵰盤女弟子隊子凡一百五十三人一曰菩薩蠻隊衣生緋生色穿窄砌衣冠卷雲冠二曰感化樂隊衣青羅生色通衣背梳髻繫綬帶三曰抛毬樂隊衣四色繡羅寛衫繫銀帶捧繡毬四曰佳人翦牡丹隊衣紅生色砌衣戴金鳳冠翦牡丹花五曰拂霓裳隊衣紅仙砌衣碧霞帔戴仙冠繡抹額六曰採蓮隊衣紅羅生色綽子繫暈裙戴雲鬟髻乗綵船執蓮花七曰鳳迎樂隊衣仙砌衣戴雲鬟鳳髻八曰菩薩獻香花隊衣生色窄砌衣戴寳冠執香花盤九曰彩雲仙隊衣黄生色道衣紫霞帔冠仙冠執幢節鶴扇十曰打毬樂隊衣四色窄繡羅􅃭繫銀帶裹順風脚簇花幞頭執毬仗大抵若此而從宜變易建隆中教坊都知李徳昇作長春樂曲明年教坊高班都知郭延又作紫雲長夀樂鼓笛以奏御焉太宗洞曉音律前後親制大小曲及因舊典創新聲者總三百九十凡制大曲十八曲破二十九小曲二百七十因舊曲造新聲者五十八若宇宙賀皇恩降聖萬年春之𩔖皆藩邸所作以述太祖美徳諸曲多秘而平昔普天樂者平河東囘所造萬國朝天樂者又明年所造每宴饗常用之殿前都虞侯崔翰嘗侍大宴聞雞唱因問伶官蔚茂多曰此可被管弦乎茂多因依其聲制曲曰雞呌子又民間作新聲者甚衆而教坊不知也陳氏樂書曰宋朝禁坊所傳不過小兒女樂三種而已女伎舞六十四人引舞二人執花四十人丱童四人從伎四十人作語一人凡總一百五十三舞名有十焉大宴酺會禁坊進二種舞每舞各進一色舞疊方半則工伎止立間以俳優戯畢嘗於崇徳殿宴契丹人使但作小兒舞一種而已其他端門望夜錫慶院賜羣臣及酺宴則舞工三十六人凡此本唐宫中嬉燕之樂伶蕭相傳故附曲作舞而已雖冠服小異而工員常定非如坐立二部出於當時之君有因而作也至於優伶常舞大曲惟一工獨進但以手䄂為容蹋足為節其妙串者雖風旋鳥騫不踰其速矣然大曲前緩疊不舞至入破則羯鼓震鼓大鼓與絲竹合作句拍益急舞者入塲投節制容故有摧拍歇拍之異姿制俯仰百態横出然終於倡優詭玩而已故賤工専習焉鄭衞之樂也雖放之可也雲韶部者黄門樂也開寳中平嶺表擇廣州内臣之聰警者得八十人令於教坊習樂藝賜名曰簫韶部雍熙初改曰雲韶部有主樂内品八十人歌三人雜劇二十四人琵琶四人笙四人筝四人板四人方響三人觱篥八人笛七人杖鼓七人羯鼓二人大鼓二人傀儡八人每上元觀燈上已端午觀水嬉皆命作樂於宫中遇南至元正清明春秋祭社之節親王内中宴射則亦用之奏大曲十三一曰中吕宫萬年歡二曰黄鍾宫和樂三曰南吕宫普天獻夀此曲並太宗所製四曰正宫梁州五曰林鍾商泛清波六曰䨇調大定樂七曰小石調喜新春八曰越調胡渭州九曰大石調清平樂十曰般渉調長夀仙十一曰高平調罷金鉦十二曰中吕調緑腰十三曰仙吕調綵雲歸樂用琵琶觱篥笛方響杖鼓羯鼓大鼓拍板雜劇用傀儡鈞容直者軍樂也有内侍一人或二人監領有押班二人置樂二百三十二人舊有百三十六人景徳二年加歌二人雜劇四十人板十人琵琶七人笙九人筝九人觱篥四十五人笛三十五人方響十一人杖鼓三十四人大鼓八人羯鼓三人唱誕十人小樂器一人排歌四十人掌撰詞一人太平興國三年詔籍軍中之善樂者命曰引龍直每廵省逰幸親征則騎導車駕而奏樂若御樓觀燈賜酺或賞花習射觀稼則亦與教坊同應奉賜酺則載第一山車端拱二年又選捧日天武拱聖軍曉暢音律者增多其數以中使監視藩臣以樂工上貢者亦𨽻之淳化三年改名鈞容直取鈞天之義初用樂工同雲韶部大中祥符五年因鼓工温用之請增龜茲部如教坊其奉天書及四宫觀皆用之又有東西班樂亦太平興國中選東西班習樂者樂器獨用銀字觱篥小笛小笙每騎從車駕而奏樂或廵方則夜奏於宫殿庭又諸車皆有善樂者每車駕親祀廻則衣緋緑衣自青城至朱雀門列於御道之左右奏樂迎奉其聲相屬聞十數里或軍中宴設亦奏之復有掉刀搶牌蕃歌等不常其數及置清衞軍選習樂者令鈞容直數之内侍主其事其園苑賜會及館待契丹使有親從親事樂及開封府衙前樂園苑又分用諸軍樂諸州皆有衙前樂營教坊自太常親製曲三百九十乾興以來通用之仁宗洞曉音律每禁中度曲出以賜教坊或命教坊使撰進凡五十四曲朝廷多用之教坊其後𨽻宣徽院有使副使判官都色長色高班大小都知仁宗嘗問輔臣以古今樂之異同王曾對曰古樂用於天地宗廟社稷山川鬼神而聽者莫不和悦今樂則不然徒娯人耳目蕩人心志自昔人君流連荒亡莫不繇此帝曰朕於聲伎未嘗留意内外燕遊皆勉强耳两朝史樂志論曰世號太常為雅樂而未嘗施於燕享豈以正聲為不美聽哉夫樂者樂也其道雖微妙難知至於奏之而使人悦豫和平此不待知音而後能也嘗竊觀於太常其樂縣鐘磬塤箎搏拊之器與夫舞綴羽籥干戚之制蓋皆倣諸古矣逮振作之則聽者不知為樂而觀者厭焉豈所謂古樂其聲真若此哉孔子曰惡鄭聲恐其亂雅亂之云者似是而非也孟子亦曰今樂猶古樂然今太常獨與教坊樂音殊絶何哉昔者李照胡瑗阮逸改鑄鐘磬處士徐復笑之曰聖人寓器以聲不先求其聲而更其器其可用乎照瑗逸制作乆之卒無所成蜀人房庶亦深訂其非是因著書論古樂與今樂本末不逺其大畧以謂上古世質器與聲朴後世稍變焉金石鐘磬也後世易之為方響絲竹琴簫也後世變之為筝笛匏笙也攅之以斗塤土也變而為甌革麻料也擊而為鼓木柷敔也貫之為板此八音者於世甚便而不達者指廟樂鏄鐘鏄磬宫軒為正聲而槩謂胡部鹵部為淫聲殊不知大輅起於椎輪龍艘生於落葉其變則然也古者以爼豆食後世易之以桮盂古者簟席以為安後世更之以榻案雖使聖人復生不能舎桮盂榻而復爼豆簟席之質也然則八音之器豈異於此哉孔子曰放鄭聲鄭聲淫者豈以其器不若古哉亦疾其聲之變耳試使知樂者由今之器寄古之聲去其惉懘靡曼而歸之中和雅正則感人心導和氣不曰治世之音乎然則世所謂雅樂者未必如古而教坊所奏豈盡為淫聲哉當數子紛紛改制鍾律而房庶之論指意獨如此故綴其語存之以俟知音者焉按夫子曰樂云樂云鐘鼓云乎哉孟子曰今之樂猶古之樂也先儒亦謂樂只是一箇和由是觀之所謂樂者和其本也聲器其末也使其政和而世治則雖管弦皆教坊之新聲度曲皆任韎之雜樂毋害其為安且樂也如其政乖而世亂則雖聲歌下管盡合簫韶金石柷敔一循雅奏毋害其為怨而怒也房庶之言當矣然庶當李照阮逸制樂之時特為此論後來乃復創為古本漢書有一黍之起積一千二百黍之廣之説欲改定律吕范蜀公力主其説别撰新樂上進則復效照逸之為而與素論背馳何邪鈞容直嘉祐元年係籍三百八十三人六年增置四百三十四人詔以為額之闕即補其後監領内侍言鈞容直與教坊樂並奏聲不諧詔罷鈞容舊十六調取教坊十七調𨽻習之雖間有損益然其大曲曲破并急慢諸曲與教坊頗同矣元豐官制行以教坊𨽻太常寺同天節寳慈慶夀官生辰皇子公主生凡國之慶事皆進歌樂詞若行幸則鈞容直奏樂以導從其制與教坊同熙寧九年教坊副使花日新言樂聲高歌者難繼方響部器不中度絲竹從之宜去噍殺之急歸嘽緩之易請下一律改造方響以為樂凖絲竹悉從其聲則音律諧協以導中和之氣詔從之十一月奏新樂於化成殿帝諭近臣曰樂聲降一律已得寛和之節矣增賜方響為駕三十命太常下法駕鹵部樂一律如教坊云政和三年詔以大晟樂播之教坊頒行天下尚書省言大晟燕樂已撥歸教坊所有習學之人元𨽻大晟府教習今當並令就教坊習學從之四年禮部奏教坊樂春或用商聲孟或用季律甚失四時之序乞以大晟府十有二月所定聲律令教坊閲習從之仍令祕書省撰詞陳氏樂書曰宋朝循用唐制分教坊為四部收荆南得工三十二人破蜀得工一百三十九人平江南得二十六人始廢坐部定河東得工十九人藩臣所獻八十三人及太宗在藩邸有七十餘員皆籍而内之繇是精工能手大集矣其器有琵琶五弦筝箜篌笙簫觱篥笛方響杖鼓羯鼓大鼓拍板并歌十四種焉自合四部以為一故樂工不能徧習第以大曲四十為限以應奉遊幸二燕非如唐分部奏曲也唐全盛時内外教坊近及二千員梨園三百員宜春雲部諸院及掖庭之伎不關其數太常樂工動萬餘户聖朝教坊裁二百員并雲韶鈞容東西班不及千人有以見祖宗勤勞庻政㒺淫於樂之深意也然均調尚間以讌樂胡部之聲音器尚襲法曲龜茲之陋非先王制雅頌之音也革而正之豈非今日急務邪高宗建炎初省教坊紹興十四年復置凡樂工四百六十人以内侍充鈐轄紹興末復省孝宗隆興二年天申節将用樂上夀上曰一嵗之間只兩宫誕日外餘無所用不知作何名色大臣皆言臨時㸃集不必置教坊上曰善乾道後北使每嵗两至亦用樂但呼市人使之不置教坊止令修内司先两旬教習舊例用樂人三百人百戯軍百人百禽鳴二人小兒隊七十一人女童隊百三十七人築軍毬三十二人起立門行人三十二人旗鼓四十人以上並臨安府差相撲等子二十一人御前忠佐司差上命罷小兒及女童隊餘用之中興四朝樂志叙曰古者燕樂自周以來用之唐貞觀增隋九部為十部以張文收所製歌名燕樂而被之管弦厥後至坐伎部琵琶曲盛於時匪直漢氏上林樂府縵樂不應經法而已國朝初置教坊得江南樂已汰其坐部不用承平因舊典創新聲轉加流麗政和間詔以大晟雅樂施於燕饗御殿按試補徴角二調播之教坊頌之天下然當時樂府奏言樂之諸宫調多不正皆俚俗所傳及命劉昺輯燕樂新書亦惟以八十四調為宗非復雅音而曲燕昵狎至有援君臣相説之樂以藉口者末俗漸靡之弊愈不容言矣紹興在宥始蠲省教坊樂凡燕禮屏坐伎乾道繼志述事間用雜櫕以充教坊之號取具臨時而廷紳祝堯務在嚴恭亦明以更不用女樂頒㫖聖子神孫世守家法於是中興燕樂比前代猶簡而養君徳之淵粹者良多蔡元定嘗為燕樂一書證俗失以存古義今采其略附於下黄鍾用合字大吕太簇用四字夾鍾姑洗用一字夷則南吕用工字無射應鍾用凡字各以上下分為清濁其中吕㽔賔林鍾不可以上下分中吕用上字㽔賔用勾字林鍾用尺字其黄鍾清用六字大吕太簇夾鍾清各用五字而以上下緊别之緊五者夾鍾清聲俗樂以為宫此其取律寸律數用字紀聲之畧也一宫二商三角四變為宫五徴六羽七閏為角五聲之號與雅樂同惟變徴以於十二律中隂陽易位故謂之變變宫以七聲所不及取閏餘之義故謂之閏四變居宫聲之對故為宫俗樂以閏為正聲以閏加變故閏為角而實非正角此其七聲高下之略也聲由陽來陽生於子終於午燕樂以夾鍾收四聲曰宫曰商曰羽曰閏閏為角其正角聲變聲徴聲皆不收而獨用夾鍾為律本此其夾鍾收四聲之略也宫聲七調曰正宫曰高宫曰中呂宫曰道宫曰南呂宫曰仙呂宫曰黄鍾宫皆生於黄鍾商聲七調曰大石調曰高大石調曰䨇調曰小石調曰歇指調曰商調曰越調皆生於太簇羽聲七調曰般渉調曰高般渉調曰中吕調曰平正調曰南吕調曰仙吕調曰黄鍾調皆生於南吕角聲七調曰大石角曰高大石角曰䨇角曰小石角曰歇指角曰商角曰越角皆生於應鍾此其四聲二十八調之畧也竊考元定言燕樂大要其律本出於夾鍾以十二律兼四清為十六聲而夾鍾為㝡清此所謂靡靡之聲也觀其律本則其樂可知變宫變徴既非正聲而以變徴為宫以變宫為角反紊亂正聲若此夾鍾宫謂之中吕宫林鍾宫謂之南吕宫者燕樂聲高實以夾鍾為黄鍾也所收二十八調本萬寳常所謂非治世之音俗又於七角調各加一聲流蕩忘返而祖調亦不獲存矣聲之感人如風偃草宜風俗之日衰也夫姦聲亂色不留聪明淫樂慝禮不接心術使心知百體皆由順正以行其義此正古君子所以為治天下之本也紹興乾道以來以清静無欲為天下先教坊迄弛不復置云文獻通考卷一百四十六
