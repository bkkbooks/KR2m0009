body:
  text: 文獻通考卷二百三十六鄱陽馬端臨貴與著經籍考六十三集别集司馬文正公傳家集鼂氏曰皇朝司馬光君實陕州夏縣人初以父䕃入官年二十舉進士甲科故相龎籍薦除館閣校理神宗即位擢翰林學士御史中丞後除樞密副使力辭而去元祐初拜門下侍郎繼遷尚書左僕射卒年六十八諡文正好學如饑之嗜食於學無所不通音樂律歴天文書數皆極其妙晩節尤好禮其文如金玉穀帛藥石也必有適於用無益之文未嘗一語及之集乃公自編次公薨子康又沒鼂以道得而藏之中更禁錮迨至渡江幸不失墜後以授謝克家劉嶠刻板上之今光州有集夲范蜀公集一百二十卷汪玉山序按蜀公墓誌云文集一百卷諫垣集十卷内制集二十卷外制集十卷正書三卷樂書三卷公成都人也應辰守成都凡三年求公文集雖捜訪殆徧来者不一而竟無全書盖公之没距今八十年矣竊意嵗月愈久則雖此不全之書亦或未易得也於是以意類次為六十二卷曰樂議曰使北録不見於墓誌亦恐其初文集中未必載也而樂議或特出於世俗所裒輯今皆存之又以諫疏内制外制正書樂書附之通為一百十二卷正書所得止一卷今分為二司馬温公論正書其間有云舜無焚廪浚井之事而今之正書無此語豈亦非全書耶張少愚白雲集三十卷鼂氏曰張俞字少愚幼通悟於書無不該貫朝廷嘗以校書郎召表乞授其父隠於岷山之白雲溪凡六被徵召皆不起為文有西漢風嘗賦洛陽懐古蘇子美見而歎曰優游感諷意不可盡吾不能也文與可丹淵集四十卷鼂氏曰文同字與可蜀人進士髙第以文學名操韻髙潔畫筆尤妙仕至太常博士集賢校理元豐初出守吳興至宛邱驛忽留不行沐浴衣冠正坐而逝東坡謂與可有四絶詩一楚詞二草書三畫四世少知者惟予一見識其妙處又有詩云斯人定何人游􅃧得自在詩鳴草聖餘兼入竹三昧他日觀其飛白復恨知與可之不盡也陳氏曰東坡與之厚善墨君堂記篔簹谷記皆為同作司馬温公稱其襟韻瀟灑如晴雲秋月塵埃不到其為人可知矣容齋洪氏隨筆曰今人但能知文與可之竹石惟東坡公稱其詩騷又表出美人却扇坐羞落庭下花之句予甞恨不見其全比得蜀本石室先生丹淵集盖其遺文也於樂府雜詠有秦王卷衣篇曰咸陽秦王家宫闕明曉霞丹文映碧鏤光彩相鈎加銅螭逐銀猊壓屋驚蟠拏洞户鎻日月其中光景賖春風動珠箔鸞額金窠斜美人却扇坐羞落庭下花閑弄玉指環輕氷抱紅牙君王顧之笑為駐七寶車自卷金縷衣龍鸞蔚紛葩持以贈所愛結歡其無涯其語意深入騷人閫域又有王昭君三絶句云絶艷生殊域芳年入内庭誰知金屋寵只是信丹青㡬嵗後宫塵今朝絶國春君王重㤙信不欲遣他人極目胡塵滿傷心漢月圓一生埋沒恨長入四條絃令人讀之飄飄然感慨無已也元章簡玉堂集二十卷陳氏曰參政錢塘元絳厚之撰絳之祖徳昭相吳越本姓危氏唐末危全諷其伯父也父曰仔倡聚衆保鄉里兵敗自臨川奔杭州易姓元至今建昌撫州邵武多危姓絳能文辭晚嵗以王介甫薦入翰林甚稱職遂柄用鼂氏曰絳鏁㕔中進士第為翰林學士參知政事立朝無特操晩入翰林諂事王安石及其子弟時論鄙之工文辭為流輩所推許卒時年七十六蒲左丞集十卷鼂氏曰皇朝蒲宗孟字傳正閬州新井人皇祐五年進士曾公亮薦除館職神宗謂宰相曰宗孟有史才乃同修國史入為翰林學士除尚書左丞卒年六十六為人酷暴奢侈蘇子瞻嘗規之云一曰慈二曰儉世以為中其膏肓之疾趙懿簡集三十卷鼂氏曰皇朝趙瞻字大觀盩厔人少善為古文慶歴五年登進士第治平中侍御史論濮邸事及貶元祐中終於同知樞密院諡懿簡學春秋著書十卷其他文不皆竒也鮮于諫議集三卷鼂氏曰皇朝鮮于侁字子駿閬中人景祐中登進士乙科神宗初上書上愛其文以為不減王陶元祐中仕至諫議大夫侁治經術有法論著多出新意晩年為詩與楚詞尤精世以為有屈宋風族姪之武編次有序東坡蘇氏曰鮮于子駿九誦友屈宋於千載上堯祠舜祠二章氣格髙古東漢以来鮮及少游秦氏曰公晚年為詩與楚詞尤精蘇翰林讀公八詠自謂欲作而不可得讀九誦以為有屈宋之風石林葉氏曰鼂無咎嘗云頃以諸生見鮮于諫議子駿教之為文曰文章但取簡易和緩不必竒險如詩言維北有斗不可以挹酒漿此豈不甚平後人因之乃曰援北斗兮酌酒漿一變雖竒以北斗為酌無已夸乎其甚遂有言上天掲取北斗柄辭至於此則已弊矣極以其言為然子駿在前輩詩文亦髙古初世未有為騷者自子駿與文與可發之後遂有相繼得其味者也吕正獻公集二十卷陳氏曰丞相東莱吕公著晦叔撰汪玉山序曰應辰頃知成都始得申正獻吕公集盖散逸之餘裒輯補綴非當時全書矣然見所未見亦不為少其雜以他人所作者什三四既而以授公之曾孫金部貟外郎企中金部又屬其兄子大麟大虬考訂刋剟為二十卷方全盛時士大夫家集之藏未必輕出中更黨禁愈益閟匿故一旦紛擾遂不復見而此雖殘缺不全未易得也金部惻然念之欲以所得鍥板庶廣其傳焉應辰方待罪太史論次熙寜元豐以来公卿大夫事實雖前修盛徳盖有不待言論風㫖而可知者然而傳信垂後不可以無證詔求遺書將以補史氏之缺久之無送官者每為之閣筆而歎也楊元素集四十卷鼂氏曰楊繪字元素漢州綿竹人幼警敏讀書一過輙誦至老不忘皇祐初擢進士第二人累擢翰林學士沈存中為三司使暴其所薦王永年事因貶官終於天章閣待制知杭州嘗居無為山號無為子為文立就劉狀元東歸集十卷陳氏曰大理評事鉛山劉輝之道撰輝嘉祐四年進士第一人堯舜性仁賦至今人所傳誦始在塲屋有聲文體竒澁歐陽公惡之下第及是在殿廬得其賦大喜既唱名乃輝也公為之愕然盖與前所試文如出二人手可謂速化矣仕止於郡幕年三十六以卒世傳輝既見黜於歐陽公怨憤造謗為猥䙝之詞今觀楊傑志輝墓稱其祖母死雖有諸叔援古誼以嫡孫解官承重又嘗買田數百畆以聚其族而餉給之盖篤厚之士也肯以一試之淹而為此憸薄之事哉古靈集二十五卷陳氏曰樞密直學士長樂陳襄述古撰襄在經筵薦司馬光而下三十三人皆顯於時紹興初詔㫖布之天下集序李忠定綱作李誠之集三卷鼂氏曰李師中字誠之中進士科仁宗朝權廣南轉運使終天章閣待制唐子方貶春州嘗有詩送行盛傳一時陳都官集三十卷陳氏曰都官貟外郎嘉禾陳舜俞令舉撰舜俞慶歴六年進士嘉祐四年制科以言新法謫官南康與劉凝之騎牛遊廬山詩畫皆傳於世舜俞居蘇秀境上初從安定胡先生學熙寜中六客其一也其墓在城南之蘇灣子孫猶宅於烏鎮張文叔集四十卷袁州判官張彦博文叔撰曽南豐序畧曰文叔年未三十喜從余問道理學為文章雖久窮而講道益明屬文益工其辭精深雅贍有過人者而比三遇之蓋未嘗為余出其文又知文叔自進為甚強自待為甚重皆可喜也濂溪集七卷陳氏曰廣東提刑營道周敦頤茂叔撰遺文纔數篇為一卷餘皆附録也本名敦實避英宗舊名改焉其仕以舅鄭向任晩年以疾求知南康軍因家廬山前有溪取營道故居濂溪名之二程所從學也又夲并太極圖為一卷遺事行狀附焉明道集四卷遺文一卷陳氏曰監察御史河南程顥伯淳撰三司使羽之後也其父曰珦顥之没文潞公題其墓曰明道先生伊川集二十卷鼂氏曰崇政殿說書程頤正叔撰珦之子也少與其兄顥從汝南周茂叔學元祐初司馬温公薦於朝自布衣擢說書未㡬罷紹聖中嘗謫涪陵顓務讀經明道深斥辭章之學從其遊者多知名於世陳氏曰集凡九卷河南程氏文集十二卷陳氏曰二程共為一集建寜所刻夲張横渠崇文集十卷鼂氏曰張載字子厚京師人後居鳯翔之横渠鎮學者稱曰横渠先生吕晦叔薦之於朝命校書崇文未㡬詔按獄浙東既歸卒孫賢良進卷十卷鼂氏曰孫洙字巨源廣陵人歐陽永叔舉洙賢良上䇿論五十篇極論時事元豐中直學士院奉詔作靈津廟碑上稱洙學術行誼且大用之暴得風緩而卒或云上欲復大理獄洙對合㫖由是驟進錢賢良進卷十卷鼂氏曰錢公輔字君倚武進人從胡瑗學紹聖末知制誥王直講集十五卷陳氏曰天台縣令南城王無咎補之撰無咎嘉祐二年進士曾鞏之妹夫從王安石遊最久將用為國子學官未及而卒為之誌墓曾肈序其集云二十卷今惟十五卷南陽集二十卷陳氏曰門下侍郎潁昌韓維持國撰封南陽郡公故以名集沈晦元用其外孫也卷首載鮮于綽所述行狀而晦䟦其後南潤元吉無咎其四世孫無為集十五卷别集十卷陳氏曰禮部郎濡須楊傑次公撰嘉祐四年進士元祐中為郎傑善談禪别集皆為釋老而釋又十之九清江三孔集四十卷陳氏曰中書舍人新淦孔文仲經父禮部侍郎武仲常父户部郎中平仲毅父撰實先聖四十八世孫嘉祐六年八年治平二年連三科兄弟以次登第文仲舉賢良對䇿切直忤時寵舉官范鎮景仁因求致仕而制科亦自此廢武仲為禮部第一人中甲科平仲亦嘗舉制科其著述各數十篇多散逸弗傳今其存者文仲才二卷武仲十七卷平仲二十一卷而已慶元中濡須王少愚守臨江裒輯刋行而周益公必大為之序序畧曰遺文雖存一二於千百然讀之者知其為有徳之言非雕篆之習也昔黄太史頌當時人才有曰二蘇聨璧三孔分鼎張丞相天覺在元符中詆元祐詞臣極其荒唐謂兩蘇為狂率則剛直也謂公兄弟配之文行如何哉西溪集十卷陳氏曰翰林學士錢塘沈遘文通撰初以郊社齋郎舉進士第一執政謂已宦者不應先多士遂居其次實皇祐元年自是為故事文通吏事精明強敏為杭州開封府皆有能名從容閒暇夙興治事及午而畢卒時年四十餘其孫晦元用宣和中亦魁天下長興集四十一卷陳氏曰翰林學士沈括存中撰括於文通為叔而年少於文通世傳文通常稱括叔今四朝史夲傳以為從弟者非也文通之父扶扶之父同括之父曰周皆以進士起家官皆至太常少卿王荆公誌周與文通墓及遼誌其伯父振之墓可考括坐永樂事貶晩居京口自號夢溪翁自叙甚詳云山谷黄氏曰沈存中博極羣書至於左氏春秋傳班固漢書取之左右逢其源真篤學之士也雲巢集十卷陳氏曰審官西院主簿沈遼叡達撰遘親弟也以兄任為京官坐法流貶事見揮麈録自永徙池築室齊山號雲巢竟不復起以上三集刋於括蒼號三沈集其次序如此蘇魏公集七十二卷陳氏曰丞相魏國公温陵蘇頌子容撰紳之子也紳在兩禁人稱其險詖而頌器局宏厚未嘗與人較短長其為相在元祐末大臣奏事多禀宣仁獨頌必以白哲廟其後免於遷謫盖上以為識君臣之禮故也年逾八十薨於建中靖國之初自草遺表却醫屏藥死生之際了然集前後序汪藻周必大撰吕晉伯輞川集五卷奏議十卷鼂氏曰皇朝吕大忠字晉伯藍田人汲公之兄皇祐中進士除檢詳樞宻院吏房文字為河北轉運判官累遷寳文閣直學士三帥秦鳯晉伯博極羣書為文尚理致有益於用章奏皆親為文吕汲公文録二十卷文録掇遺一卷鼂氏曰皇朝吕大防微仲京兆藍田人皇祐初中進士第哲宗即位召知制誥翰林學士拜尚書左僕射兼門下侍郎紹聖初責授舒州團練副使循州安置未踰嶺卒大防既拜相常分其俸之半以録書故所藏甚富其在翰林書命典麗議者謂在元絳之上云吕和叔誠徳集三十卷鼂氏曰皇朝吕大鈞和叔嘉祐二年中進士第大防仲弟也終於宣義郎鄜延路漕司屬官師張子厚贍學博文無所不該其文非義理不發吕與叔玉溪集二十五卷玉溪别集十卷鼂氏曰皇朝吕大臨字與叔汲公季弟也登進士第嘗歴太學博士秘書省正字從程正叔張子厚學通六經尤精於禮解中庸大學等篇行於世嘗賦詩云學如元凱方成癖辭類相如始近俳獨倚聖門無一事願同回也日心齋正叔可之朱子語録曰吕與叔文集煞有好處他文字極是實說得好處如千兵萬馬飽滿伉壯傅獻簡集七卷陳氏曰中書侍郎獻簡公河陽傅堯俞欽之撰赤城集十卷陳氏曰兩浙提刑寜海羅適正之撰治平二年進士學於四明樓郁為吏健敏頗為蘇子瞻劉貢父諸公所知台士有聞於世自適始西塘集二十卷陳氏曰監安上門三山鄭侠介夫撰治平四年甲科小臣劘上言人所不敢言上為之感動略施行其言不惟不怒而已既而竟堕深譴良由吕惠卿欲傾王安石而侠與安國游從厚善遂起獄并陷之侠既得罪新法遂不罷而夲朝之禍夲成矣小人勿用之戒可不畏哉安石親惠卿而踈侠豈惟誤國亦以危身後之君子可以監矣范忠宣集二十卷陳氏曰丞相忠宣公吳郡范純仁堯夫撰文正公之次子也文正子四人長純佑尤俊有賢行早年病廢以死富文忠志其墓近時禮部尚書之柔者其四世孫也次純禮純粹皆顯用至大官劉忠肅集四十卷陳氏曰丞相忠肅公東光劉摯莘老撰凡四舉於鄉試禮部為第一登嘉祐四年甲科劉元城為集序述其出處大槩范子功集五十卷鼂氏曰范百禄字子功鎮之姪也終於中書侍郎張浮休畫墁集一百卷奏議十卷鼂氏曰張舜民芸叟邠州人慶歴中范仲淹帥邠見其文異之用温公薦為諫官仕至吏部侍郎後羈置房陵政和中卒其文豪重有理致而最刻意於詩晩年為樂府百餘篇自序稱年踰耳順方敢言詩百世之後必有知音者云自號浮休先生唐張鷟稱浮休子芸叟盖襲之陳氏曰舜民初用於元祐至元符末為諫議大夫居職七日所上事六十章崇寜初坐謝表言紹聖逐臣有云脫禁錮者何止一千人計水陸者不啻一萬里又云古先未之或聞畢竟不知其罪以為譏謗坐貶范太史集五十五卷陳氏曰翰林學士成都范祖禹淳夫撰朱子語録曰范淳夫文字純粹下一箇字便是合當下一箇字東坡所以服他東坡輕文字不將為事微時只胡亂寫去又曰四六語佳莫如范淳夫灌園集三十卷陳氏曰鄉貢進士吕南公次儒撰熙寜初試禮部不利㑹以新經取士遂罷舉欲修三國志題其齋曰衮斧書將成而死其書亦不傳元祐初諸公欲薦進之不及伐檀集一卷陳氏曰知康州豫章黄庶亞夫撰自為序庭堅其子也世所謂山魈水怪著薜荔之詩集中多此體庭堅詩律盖有自来也庶慶歴二年進士黄魯直豫章集三十卷别集十四卷鼂氏曰黄庭堅魯直也幼警悟讀書五行俱下數過輙記蘇子瞻嘗見其詩於孫莘老家歎絶以為世久無此作矣因以詩徃来會子瞻以詩得罪亦罰金元祐中為校書郎先是秦少游鼂無咎張文潛皆以文學游蘇氏之門至是同入館世號四學士魯直之詩尤竒世又謂之蘇黄云紹聖初責置戎州至徽宗即位召還嘗因嘲謔忤趙正夫及正夫為相諭部使者以風㫖所作承天院塔記中語以為幸災謗國遂除名編𨽻宜州以死崇寜四年也家傳曰公既孤從舅尚書李公公擇學公擇嘗過家塾見其書帙紛錯因亂抽架上書問之無不通大驚以為一日千里蘇公嘗薦公自代其畧曰瑰瑋之文絶妙當世孝友之行追配古人世以為實録公學問文章天成性得落筆妙天下晩節位益黜名益髙世以配眉山蘇公謂之蘇黄公嘗游􅏦皖樂山谷寺石牛洞之林泉因自號山谷道人史贊曰自李杜沒而詩律衰唐末以及五季雖有以比興自名者然格下氣弱么麽骫骳無以議為也宋興楊文公始以文章蒞盟然至為詩專以李義山為宗以漁獵掇拾為博以儷花鬬果為工號稱崑崙體嫣然華靡而氣骨不存嘉祐以来歐公稱太白為絶唱王文公推少陵為髙作而詩格大變髙風之所扇作者間出班班可述矣元祐間蘇黄並出以碩學宏材鼔行士林引筆行墨追古人而與之俱世謂李杜歌詩髙妙而文章不稱李翺皇甫湜古文典雅而詩獨不傳惟二公不然可謂兼之矣然世之論文者必宗東坡言詩者必右山谷其然豈其然乎山谷自黔州以後句法尤髙筆勢放縱實天下之竒作自宋興以来一人而已豫章别集一卷陳氏曰皆集中所遺者如承天塔記黄給事行狀毁璧蓋其顯顯者也諸孫㽦子耕集而傳之後村劉氏曰山谷文不如詩詩律不如古古不如樂府其文則專學西漢惜其才力褊局不能汪洋趍趄如其紀事立言頗時有類處鼂無咎雞肋編七十卷鼂氏曰族父吏部公也公諱補之字無咎幼豪邁英爽不羣七嵗能屬文日誦千言王安國名重天下慎許可一見大竒之在杭州作文曰七述叙杭之山川人物之盛麗時蘇子瞻倅杭州亦欲有所賦見其所作歎曰吾可以閣筆矣子瞻以文章名一時稱其博辯俊偉於文無所不䏻屈輩行與之交由此聲名藉甚舉進士禮部别試第一而考官謂其文辭近世未有遂以進御神宗曰是深於經可革浮薄元祐中除校書郎紹聖初落職監信州酒後知泗州終於官大觀四年也張耒嘗言無咎於文章盖天性讀書不過一再終身不忘自少為文即能追考屈宋班揚下逮韓愈栁宗元之作促駕而力鞭之務與之齊而後已其凌厲竒卓出於天才非醖釀而成者自韓栁而還蓋不足道也山谷黄氏曰鼂補之文章有漢唐間風味可以名世徃未識鼂無咎時見其作安南罪言天辯縱横跋遮曲奥雅竒麗常恨同時而不相識其後得相從甚宻今不見遂十五年計其文字皆當大進恨随食南北不能相見耳石林葉氏集序公少警悟絶人讀太史公書而善之以為可至遇有所得皆不由町畦自以意會其後益縱觀百家馳騁上下數千載無不咀其華而摘其實故公之文緩急豐約隠顯乘除猝不可以捕詰如終南太華峻拔連絡虎豹龍蛇騰攫變化至於優柔宏衍踈宕􅃉逺則朱絃疏越停雲淵泉可聽而不可求可望而不可挹也蓋嘗自謂喜左邱明檀弓屈原莊周司馬遷相如枚乗及唐韓栁氏天下亦以為兼得數子之奧莫敢與之争卒䏻自成一家晩惟文潛與之抗衡是以後世謂之鼂張云文獻通考卷二百三十六
