body:
  text: 文獻通考卷二百九鄱陽馬端臨貴與著經籍考三十六子儒家新序十卷崇文總目漢劉向撰成帝時典校祕書因採載戰國秦漢間事為三十卷上之其二十卷今亡鼂氏曰當成帝時與校書因採傳記行事百家之言删取正辭羙義可勸戒者為新序說苑共五十篇新序陽朔元年上世傳本多亡闕皇朝曽鞏子固在館中日校正其訛舛而綴緝其放逸久之新序始復全自秦之後綴文之士有補於世者稱向與揚雄為最雄之言莫不歩趨孔孟向之言不皆槩諸聖故議者多謂雄優於向考其行事則反是何哉今觀其書蓋向雖雜博而自得者多雄雖精深而自得者少故也然則向之書可遵而行殆過於雄矣學者其可易之哉南豐曽氏序畧曰劉向所集次新序三十篇目録一篇隋唐之世尚為全書今可見者十篇而已漢興六藝皆得於散絶殘脫之餘世復無明先王之道以一之者諸儒茍見傳記百家之言皆悅而向之故先王之道為衆說之所蔽闇而不明鬱而不發而怪竒可喜之論各師異見皆自名家者誕漫於中國一切不異於周之末世天下學者知折𠂻於聖人而能純於道德之美者揚雄氏而止耳如向之徒皆不免乎為衆說之所蔽而不知有所折𠂻者也蓋向之序此書於今為最近古雖不能無失然逺至舜禹而次及於周秦以來古人之嘉言善行亦往往而在也要在慎取之而已故臣惜其不可見者而校其可見者特詳焉所以攻其失者豈好辯哉不得已也高氏子畧曰向以區區宗臣老於文學窮經之苦崛出諸儒先秦古書甫脫燼刼一入向筆采擷不遺至其正紀綱廸教化辯邪正黜異端以為漢規鑒者盡在此書號說苑新序之㫖也說苑二十卷崇文總目漢劉向撰向成帝時典祕書採傳記百家之言掇其正辭美義可為勸戒者以𩔖相從為說苑二十篇今存者五卷餘皆亡鼂氏曰劉向撰以君道臣術建本立節貴德復恩政理尊賢正諫法誡善說奉使權謀至公指式談叢雜言辯物修文為目陽嘉四年上之闕第二十卷曽子固校書自謂得十五篇於士大夫家與崇文舊書五篇合為二十篇又叙之然止是析十九卷作修文上下篇南豐曽氏序畧曰向采傳記百家所載行事之迹以為此書奏之故以為法戒然其所取往往不當於理故不得而不論也夫學者之於道非知其大畧之難也知其精㣲之際固難矣向之學博矣其著書及建言尤欲有為於世意其枉已而為之者有矣何其狥物者多而自為者少也蓋古之聖賢非不欲有為也然而曰求之有道得之有命令向知出此安於行止以彼其志能擇其所學以盡乎精㣲則其所至未可量也讀其書知考而擇之可也然向数困於䜛而不改其操與患失之者異矣陳氏曰序言臣向所校中書說苑雜事除去與新序復重者其餘淺薄不中義理别集以為百家後令以𩔖相從更以造新事凡二十篇七百八十四章號曰說苑按漢志劉向所序六十七篇謂新序說苑世說列女傳頌圗也今本南豐曽鞏序言崇文總目存者五篇從士大夫得十五篇與舊為二十篇未知即當時篇章否新苑之名亦不同續說苑十卷崇文總目唐劉貺撰以劉向著說苑二十篇時漢史未行故漢事頗缺貺因采其所遺亡凡十篇云鹽鐵論十卷鼂氏曰漢桓寛撰按班固曰所謂鹽鐵議者起始元中徴文學賢良問以治亂皆對願罷郡國鹽鐵酒𣙜均輸務抑末毋與天下爭利然後教化可興御史大夫𢎞羊以為此乃所以安邊境制四夷國家大業不可廢也當時相詰難頗有其議文至宣帝時汝南桓寛次公冶公羊春秋舉為郎至廬江太守丞博通善屬文推衍鹽鐵之議増廣條目極其論難著数萬言亦欲以䆒治亂成一家之法焉凡十六篇高氏子畧曰漢志近古莫古乎議國有大事詔公卿列侯二千石博士議郎雜議是以廟議匈奴議捐朱厓而石渠論經亦有議皆所謂詢謀僉同者也班氏一贊專羙乎此然觀一時論議其所問對非不伸異見騁異辭亦無有犖然大過人者陳氏曰本始元年召問文學賢良對願罷鹽鐵𣙜酤均輸與御史大夫𢎞羊相詰難於是罷𣙜酤而鹽鐵卒不變故昭紀贊曰議鹽鐵而罷𣙜酟也及宣帝時寛推衍増廣著数萬言凡十六篇其末曰雜論班書取以為論贊其言桑大夫據當世合時變上𣙜利之畧雖非正法鉅儒宿學不能自解博物通逹之士也嗚呼世之小人何嘗無才以熈寜日録言之王安石之辯雖曰儒者其實桑大夫之流也霍光號知時務與民更始而鹽鐵之議乃俾先朝首事之臣與諸儒論議反復不厭或是或非一切付之公論而或行或否未嘗容心焉以不學無術之人而暗合乎孟荘子父臣父政之義曽謂元祐諸賢而慮不及此乎潛夫論十卷鼂氏曰後漢王符節信撰在安和之世耿介不同於俗遂不得進隠居著書三十六篇以譏當時失得不欲彰顯其名故號曰潛夫范曄取其貴忠浮偽真實愛日述赦等五篇以為足以觀見當時風政頗潤益其文後韓愈亦贊其述赦㫖意甚明云申鑒五卷陳氏曰漢黄門侍郎潁川荀悅仲豫撰獻帝頗好文學政在曹氏恭已而已悅志在獻替而謀無所用乃作此書五篇奏之其曰教化之廢推中人而墮於小人之域教化之行引中人而納於君子之塗此古今名言也中論二篇鼂氏曰後漢徐幹偉長撰幹鄴下七子之一也曽子固嘗序其書略曰始見館閣中論二十篇以為盡於此及觀貞觀政要太宗稱嘗見幹中論復三年喪篇而今書闕此篇因考之魏志見文帝稱幹著中論二十餘篇於是知館閣本非全書也幹篤行體道不躭世榮魏太祖特旌命之辭疾不就後以為上艾長又以疾不行蓋漢承秦滅學之後百氏雜家與聖人之道並傳學者罕能自得於治心養性之方去就語黙之際况於魏之濁世哉幹獨能考論六藝其所得於内又能信而充之逡廵濁世有去就顯晦之大節可不謂賢乎今此本亦止二十篇中分為上下兩卷按崇文總目七卷不知何人合之李獻民云别本有復三年制役二篇乃知子固時尚未亡特不見之爾陳氏曰唐志六卷今本二十篇有序而無名氏蓋同時人所作孔叢子七卷鼂氏曰楚孔鮒撰鮒字子魚孔子八世孫也仕陳勝為博士以言不見用託目疾而退論集其先仲尼子思子上子高子順之言及已之行事名之曰孔叢子凡二十一篇叢之為言聚也邯鄲書目云一名盤盂取事雜也至漢孔臧又以其所著賦與書謂之連叢附於卷末十一篇嘉祐中宋咸為之注按漢志無孔叢子而儒家有孔臧十篇雜家有孔甲盤盂書二十六篇其注謂孔甲黄帝史或曰夏帝疑皆非今此書一名盤盂獨治篇又云鮒或稱孔甲連叢又出孔臧意者孔叢子即漢志孔甲盤盂書而亡六篇連叢即漢志孔臧書而其子孫或續之也陳氏曰孔氏子孫雜記其先世系言行之書也小爾雅一篇亦出於此中興書目稱漢孔鮒撰一名盤盂按孔光傳孔子八世孫鮒魏相順之子為陳渉博士死陳下則固不得為漢人而其書記鮒之没第七卷號連叢子者又記太常臧而下数世迄於延光三年季彦之卒則又安得以鮒撰按儒林傳所載為博士者又曰孔甲顔注曰將名鮒而字甲也今考此書稱子魚名鮒陳人或謂之子鮒或稱孔甲然則顔監未嘗見此書邪藝文志有孔甲盤盂二十六篇本注謂黄帝史或曰夏帝孔甲似皆非也其書蓋田蚡所學者其與孔鮒初不相渉也中興書目乃曰一名盤盂不知何據豈以漢所謂孔甲即陳王博士之孔甲邪高氏子略曰漢藝文志無孔叢子而孔甲盤盂二十六篇出於雜家而又益以連叢其獨治篇稱孔鮒一名甲世因曰孔叢子盤盂者其事雜也漢書注又以孔甲為黄帝之史或夏帝時人篇第又不同若非今孔叢子也記問篇載子思與孔子問答如此則孔子時子思其已長矣然孔子家語後序及孔子世家皆言子思年止六十二孟子以子思在魯穆公時固常師之是為的然矣按孔子没於哀公十六年後十六年哀公卒又悼公立三十七年元公立二十一年穆公既立距孔子之没七十年矣當是時子思猶未生則問答之事安得有之邪此又出於後人綴集之言何其無所據若此朱子語録漢卿問孔子順許多話却好曰出於孔叢子不知是否只孔叢子說話多𩔖東漢人其文氣軟弱全不似西漢文字兼西漢初若有此等話何故略不見於賈誼董仲舒所述恰限到東漢方突出來皆不可曉家訓七卷鼂氏曰北齊顔之推撰之推本梁人所著凡二十篇述立身治家之法辯正時俗之謬以訓子孫陳氏曰古今家訓以此為祖然其書頗崇尚釋氏云文中子十卷鼂氏曰右隋王通之門人共集其師之語為是書通行事於史無考獨隋唐通録稱其有穢行為史臣所削今觀中說其迹往往僭聖人模擬竄竊有深可怪笑者獨貞觀時諸將相若房杜李魏二温王陳皆其門人予嘗以此為疑及見李德林闗朗薛道衡事然後知其皆妄也通生於開皇四年而德林卒以十一年通適八嵗固未有門人通仁壽四年嘗一到長安時德林卒已九載矣其書乃有子在長安德林請見歸援琴鼓蕩之什門人皆沾襟闗朗在太和中見魏孝文自太和丁巳至通生之年甲辰蓋一百七年矣而其書有問禮於闗子明隋書薛道衡傳稱道衡仁壽中出為襄州總管至煬帝即位召還本紀仁壽二年九月襄州總管周揺卒道衡之出當在此年矣通仁壽四年始到長安是年高祖崩蓋仁壽末也又隋書稱道衡子收初生即出繼族父孺飬於孺宅至於長成不識本生其書有内史薛公見子於長安語子收曰汝徃事之用此三事推焉則以房杜輩為門人抑又可知矣程子曰王通隐德君子也當時有少言語後來為人傅㑹不可謂全書其粹處殆非荀揚所及若續經之𩔖皆非其作王氏揮麈録曰文中子隋末大儒歐陽文忠公宋景文修唐書房杜傳中略不及其姓名或云其書阮逸偽作未必有其人然唐李習之嘗有讀文中子而劉禹錫作王華卿墓誌序載其家世行事甚詳云門多偉人則與書所言合矣何疑之有又皮日休有文中子碑見於文粹龍川陳氏𩔖次文中子引曰講道河汾門人咸有記焉其高弟若董常程元仇璋蓋常參取之矣薛收姚義始綴而名之曰中說凡一百餘紙無篇目卷第藏王氏家文中子亞弟凝晩始以授福郊福畤遂次為十篇各舉其端二字以冠篇首又為之序篇焉惟阮逸所著本有之至龔鼎臣得唐本於齊州李冠家則以甲乙冠篇而分篇始末皆不同又本文多與逸異然則分篇叙篇未必皆福郊福畤之舊也昔者孔氏之遺言蓋集而為論語其一多論學其二多論政其三多論禮樂自記載之書未嘗不以𩔖相從也此書𩔖次無條目故讀者多厭倦余以暇日參取阮氏龔氏本正其本文以𩔖相從次為十六篇其無條目可尋與凡可略者徃徃不録以為王氏正書蓋文中子没於隋大業十三年五月是嵗十一月唐公入關其後攀龍附鳯以翼成三百載之基業者大略嘗徃來河汾矣雖受經未必盡如所傳而講論不可謂無也然智不足以盡知其道而師友之義未成故朝論有所不及不然諸公豈遂忘其師者哉及陸龜䝉司空圗皮日休諸人始知好其書至本朝阮氏龔氏遂各以其所得本為之訓義考其始末皆不足以知之也又曰以中說方論語以董常比顔子與門人言而名朝之執政者與老儒老將言而斥之無婉辭此讀中說者之所同病也今按阮氏本則曰嚴子陵釣於湍石爾朱榮控勒天下故君子不貴得位龔氏本則曰嚴子陵釣於湍石民到于今稱之爾朱榮控勒天下死之日民無得而稱焉故模倣論語者門人弟子之過也龔氏本曰出而不聲隐而不没用之則成舍之則全阮氏本則因董常而言終之曰吾與爾有矣故比方顔子之迹往往多過内史薛公使遺書於子子再拜而受之推此心以往其肯退而名楊素諸公哉薛公謂子曰吾文章可謂滛溺矣子離席而拜曰敢賀丈人之知過也謂其斥劉炫賀若弼而不婉者過矣至於以佛為聖人以無至無迹為道以五典潛五禮錯為至治此皆撰集中說者抄入之將以張大其師而不知反以為累然仲淹之學如日星炳然豈累不累之足云乎姑以明予𩔖次之意如此又曰魏徴杜淹之於文中子蓋嘗有師友之義矣如房杜直徃來耳故嘗事文中子於河汾者一切抄之曰門人弟子其家子弟見諸公之盛也又從而實之夫文中子之道豈待諸公而後重哉可謂不知其師其父者也朱子曰王仲淹生乎百世之下讀古聖賢之書而粗識其用則於道之未嘗亡者蓋有意焉而於明德新民之學亦不可謂無其志矣然未嘗深探其本而盡力於其實以求必得夫至善者而止之顧乃挾其窺覘想像之彷彿而謂聖之所以聖賢之所以賢與其所以修身所以治人以及夫天下國家者舉皆不越乎此是以見隋文而陳十二䇿則既不自量其力之不足以為伊周又不知其君之不可以為湯武且不待其招而徃不待其問而告則以輕其道以求售焉及其不遇而歸其年蓋亦未為晩也若能於此反之於身以益求其所未至使明德之方新民之具皆足以得其至善而止之則異時得君行道安知其卒不逮於古人政使不幸終無所遇至於甚不得已而筆之於書則必有以發經言之餘藴而開後學於無窮顧乃不知出此而不勝其好名欲速之心汲汲乎日以著書立言為己任則其用心為己外矣及其無以自託乃復摭拾兩漢以來文字言語之陋功名事業之卑而求其天資之偶合與其竊取而近似者依倣六經次第采輯因以牽挽其人强而躋之二帝三王之列今其遺編雖不可見然考之中説而得其規模之大略則彼之贊易是豈足以知先天後天之相為體用而高文武皇之制是豈有精一執中之傳曹劉顔謝之詩是豈有物則秉彛之訓叔孫通公孫述曹褒荀勉之禮樂又孰與伯夷后䕫周公之懿至於宋魏以來一南一北校功度德蓋未有以相君臣也則其天命人心之向背統緒繼承之偏正亦何足論而欲攘臂其間奪彼予此以自列於孔子之春秋哉蓋既不自知其學之不足以為周孔不知兩漢之不足為三王而獨以是區區者比而效之於形似影響之間傲然自謂足以承千聖而紹百王矣而不知其適以是而自納於吳楚僭王之誅使夫後世知道之君子雖或有取於其言而終不能無恨於此是亦可悲也已至於假卜筮象論語而强引唐初文武名臣以為弟子是乃福郊福畤之所為而非仲淹之雅意然推原本始乃其平日好高自大之心有以啓之則亦不得為無罪矣或曰然則仲淹之學固不得為孟子之倫矣其視荀揚韓氏亦有可得而優劣者邪曰荀卿之學雜於申商子雲之學本於黄老而其著書之意蓋亦姑託空言以自見耳非如仲淹之學頗近於正而粗有可用之實也至於退之原道諸篇則於道之大原若有非荀揚仲淹之所及者然考其平生意鄉之所在終不免於文士浮華放浪之習時俗富貴利逹之求而其覽觀古今之變將以措諸事業者恐亦未若仲淹之致懇惻而有條理也是以予於仲淹獨深惜之而有所不假於三子是亦春秋責備賢者之遺意也可勝歎哉朱子語録問董子文中子如何曰仲舒本領純正班固所謂醇儒極是行於天下國家事業恐未必如仲淹仲淹識見高明如說治體處極高了但於本領處如古人明德新民止至善處皆不理㑹要知文中子論治體處高似仲舒而本領不及爽似仲舒而純不及又曰文中子有志於天下亦識得三代制度較之房魏諸公又有些本領只本原上工夫都不理㑹若䆒其議論本原只自莊老中來陳氏曰唐志五卷今本第十卷有文中子世家房魏論禮樂事書關子明事及王氏家書雜録舊傳以此為前後序非也又有龔鼎臣注自甲至癸為十卷而所謂前後序者在十卷之外亦頗有所刪取李格非跋云龔自謂明道間得唐本於齊州李冠比阮本改正二百餘處帝範一卷鼂氏曰唐太宗撰凡十二篇今存者六篇貞觀末著此書以賜高宗且曰修身治國備在其中一旦不諱更無所言矣其末頗以汰侈自咎以戒高宗俾勿效已殊不知閨門之内慙德甚多豈特汰侈而已武后之立實有自來不能身教多言何益悲夫臣範二卷鼂氏曰唐則天皇后武氏撰範或作軌武氏稱制時嘗詔天下學者習之尋廢本十篇今缺其下五篇法語二十卷鼂氏曰南唐劉鶚撰甲戍嵗擢南唐進士第實開寳七年也著書凡八十一篇言治國立身之道徐鉉為之序聱隅子歔欷𤨏㣲論十卷鼂氏曰皇朝黄晞撰聱隅子晞自號也其叙略曰聱隅者枿物之名歔欷者兼歎之聲𤨏㣲者述之之謂故以名其書晞蜀人本朝仁宗時山東野録七卷陳氏曰殿中丞臨淄賈同公竦撰本名罔真宗御筆改之蓋祥符祀汾陰時所放經明行修進士也續家訓八卷鼂氏曰皇朝董政公撰續顔氏之書家範十卷鼂氏曰皇朝司馬光君實纂取經史所載聖賢修身齊家之法凡十九門編𩔖訓子孫後溪劉氏後序曰温公家範十有二卷其自序首易家人明以大經大訓凡後世上自公卿下至匹夫匹婦一言一行與經訓合者莫不纂集以垂法於將來於是既總述治家之要又門分而事别之由祖若父若母由子若女若孫由諸父若兄若弟若姑姊妹由夫若妻由舅姑若婦由妾若乳母終焉門有其事事有其法嗚呼可謂備矣公以其所躬行者合之於古人之所躬行以古人之所躬行合之於六經與前哲之所嘗言其書反復詳重可謂至深至切矣或曰聖人議道自已而制法以人謂其可以通行也公佩服仁義周旋道德蓋左凖繩右規矩者也今其為書嚴矣哉其所采録文有人所甚難者夫行不貴茍難嚮使公裁而歸諸中不亦善乎余曰今夫子事父母下氣怡聲問疾痛痾癢而敬扶持之抑搔之徐行後長者凡若此𩔖豈有難哉而人猶忽之則夫表出其所甚難固以愧夫人之忽乎其所甚易者也且匹夫匹婦未必一一知經而或者乃能苦節危行至有殺身以全大義立大倫凛然如嚴霜烈日此又豈有驅而率之者乎觀古人之事愧其所甚難則必能勉行其所甚易蹈其常履其變充而至之可也古今家戒太常少卿長沙孫景修集潁濱序略曰轍少而讀書見父母之戒其子者諄諄乎惟恐不盡也嗚呼此父母之心也故父母之於子人倫之極雖其不賢及其為子言也必忠且盡况其賢者乎太常少卿長沙孫公景修少孤而教於母母賢能就其業既老而念母之心不忘為賢母録以致其意既又集古今家戒得四十九人以示轍曰古有為是書者而其文不完吾病焉是以為此合衆父母之心以遺天下之人庻㡬有益乎轍讀之而歎曰雖有悍子忿鬭於市莫之能止也聞父之聲則歛手而退市人之過之者亦莫不泣也慈孝之心人皆有之特患無以發之耳今是書也要將以發之歟雖廣之天下可也自周公以來至於今父戒四十五母戒若干公又將益廣之未止也潛虛一卷鼂氏曰皇朝司馬光君實撰光擬太元撰此書以五行為本五行相乗為二十五兩之得五十首有氣體性名行變解七圗然其辭有闕者蓋未成也其手寫草稿一通今在子建姪房朱子書張氏所刻潛虚圗後曰范仲彪炳文家多藏司馬文正公遺墨嘗示予潛虚别本則其所闕之文甚多問之云温公晩注此書未竟而薨故所傳止此嘗以手藁屬鼂景迂補之而鼂謝不敢也近見泉州所刻乃無一字之闕始復驚疑然讀至数行乃釋然曰此贗本也陳氏曰言萬物皆祖於虚元以凖易虚以凖元潛虚發㣲論一卷陳氏曰監察御史張敦實撰凡九篇信書三卷巽岩李氏曰文軫撰軫綿州巴西縣人登元豐二年進士第為朝散大夫以老其書大抵祖周易而倣太元略與潛虚相似規模制造雖不免乎屋下架屋之譏然軫之用心亦勤矣其数本三統五行三其五而成十五式毎式八變十五其八一百二十斷易有象曰元有測曰潛虚有解而此書乃無之疑注所引信曰等語則象測解之𩔖也十五式一百二十斷皆宜有信曰而今所見獨勉成地靈憂苦首疾豐和天英六式之十二斷又終篇不載揲法恐此本未為全書且其間尚多差誤不可强正姑列於後以待考弟子記一卷鼂氏曰皇朝劉敞原甫撰記其門人答問之言楊慥王安石之徒書名王深甫歐永叔之徒書字文獻通考卷二百九
