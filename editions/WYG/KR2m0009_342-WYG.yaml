body:
  text: 文獻通考卷三百四十二鄱陽馬端臨貴與著四裔考十九烏桓烏桓者本東胡也漢初匈奴冒頓滅其國餘類保烏桓山因以為號俗與匈奴多同其異者怒則殺父兄而終不害其母以母有族類父兄無相仇報故也以己為種無復報者故也其有勇健能理决鬭訟者推為大人無代業相繼邑落各有小帥數百千落自為一部大人有所召呼則刻木為信氏姓無常以大人健者名字為姓其嫁娶先私通掠將女或半嵗或百日然後遣送馬牛羊以為聘幣壻隨妻至家無尊卑朝朝拜之而不拜其父母為妻家僕役一二年間妻家乃更厚遣送女居處財物一皆分辦計謀從用婦人唯鬭戰之事乃自决之父子男女皆對踞蹲髠頭為輕便婦人至家時乃養髪分為髻著勾决飾以金碧猶巾國有簂歩揺也簂字或為幗婦人首飾釋名云皇后首飾上有垂珠歩則揺也簂古陌反婦人能刺韋作文繡織氀毼氀毼罽也氀力於反毼胡達反男子能作弓矢鞍勒勒馬銜也鍜金鐵為兵器其土地宜穄及東墻東墻似􅅫草實如穄子至十月而熟能作白酒而不知作麴麴米常仰中國有病以艾灸或燒石自熨燒地卧上或隨痛病處以刀决脉出血及祝天地山川之神無鍼藥俗貴兵死有哭泣之哀至葬則歌舞相送肥養一犬以綵繩纓牽并取死者所乗馬衣物皆燒而送之言以屬累犬屬累猶付託也屬之欲反累力瑞反使䕶死者神靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸岱山也博物志曰㤗山天帝孫也主召人魂東方萬物始故知人生命也敬鬼神祠天地日月星辰山川及先大人有健名者祠用牛羊畢皆燒之飲食必先祭若相賊殺者令部落自相報不止詣大人告之聽出牛馬羊以贖死命乃止烏桓自為冒頓所破衆遂孤弱常臣服匈奴漢武帝遣霍去病擊破匈奴左地因徙烏桓於上谷漁陽右北平遼東五都塞外今媯川范陽以東至安東是漢五郡也為漢伺察匈奴動静其大人歳一朝見於是始置䕶烏桓校尉監領之使不得與匈奴交通後漸强盛乃發匈奴單于冢以報冒頓之怨匈奴怒東擊烏桓漢遣度遼將軍范明友等邀擊匈奴而虜已引去明友乘烏桓新敗進擊之斬首六千餘級誅其三王由是烏桓寇幽州明友輙破之宣帝時乃稍保塞降附王莽簒位發烏桓兵擊匈奴屯代郡烏桓畔之匈奴因誘其豪帥羈縻之光武初烏桓與匈奴連兵為寇代郡以東尤被其害居止近塞朝發穹廬暮至城郭五郡民庶皆受其害百姓流亡二十二年匈奴國亂烏桓乘其弱擊破之匈奴轉北徙數千里漠南地空帝乃以幣帛賂烏桓二十五年遼西烏桓大人郝旦等率衆向化詣闕朝貢獻奴婢及牛馬等或願留宿衛於是封其渠帥為侯王君長者八十一人皆居塞内布於縁邊諸郡令招來種人給其衣食為漢偵候助擊匈奴鮮卑時司徒掾班彪上言烏桓天性䡖黠好為冦賊若久放縦而無總領者必復侵掠居人但委主降掾史蓋當時權置也下兵馬掾亦同也恐非所能制臣愚以為宜復置烏桓校尉誠有益於附集省國家之邊慮帝從之於是始復置校尉於上谷甯城甯城縣名前書甯縣作寧史記甯城亦作寧甯兩字通也開營府并領鮮卑賞賜質子嵗時互市焉及明章和三世皆保塞無事安帝永初三年夏漁陽烏桓與右北平胡千餘冦代郡上谷秋鴈門烏桓率衆王無何允與鮮卑大人邱倫等及南匈奴骨都侯合七千騎寇五原與太守戰於九原高渠谷九原縣名屬五原郡漢兵大敗殺郡長吏乃遣車騎將軍何熙度遼將軍梁慬等擊大破之無何乞降鮮卑走還塞外是後烏桓稍復親附拜其大人戎朱廆為親漢都尉順帝至桓帝末屢叛屢降靈帝初烏桓漸盛上谷有難樓者衆九千餘落遼西今栁城郡有邱力居者衆五千餘落皆自稱王又遼東蘇僕延衆千餘落自稱峭七笑反王右北平今北平郡烏延衆八百餘落自稱汗魯王並勇健而多計策中平四年前中山太守張純中山今愽陵郡叛入邱力居衆中自稱彌天安定王遂為諸郡烏桓元帥冦掠青今北海濟南平原樂安郡也徐今彭城瑯琊郡地幽冀四州五年劉虞為幽州牧虞購募斬純首北州乃定自匈奴衰弱而烏桓轉盛獻帝初平中邱力居死從子蹋頓有武畧代立總攝三王部衆皆從其號令邊長老皆比之冒頓以雄北方建安初冀州牧袁紹與前將軍公孫瓚相持不决蹋頓遣使詣紹求和親遂遣兵助紹擊瓚破之紹矯制賜蹋頓難樓蘇僕延烏延等皆授以單于印綬建安十二年曺公自征烏桓大破蹋頓於栁城獲首虜二十餘萬人其餘衆萬餘落悉徙居中國為齊人西晋王浚為幽州牧有烏桓單于審登前燕慕容儁時有烏桓單于薛雲後燕慕容盛時有烏桓渠帥莫賀咄科勃並其種然而微弱不足云矣鮮卑鮮卑亦東胡之支也别依鮮卑山因號焉今在栁城郡界其言語習俗與烏桓同唯婚姻先髠頭以季春月大㑹饒樂水上今在栁城郡界然後配合其獸異於中國者有野馬原羊角端牛以角為弓代謂角端弓者也郭璞註爾雅曰原羊似吳羊而角大出西方前漢書音義曰角端似牛角可為弓又有貂豽鼲子皮毛柔軟豽音女滑反鼲音胡昆反貂鼲並鼠屬豽蜼屬故天下以為名裘漢初亦為冒頓所破逺竄遼東塞外與烏桓接未嘗通中國至後漢光武建武二十一年鮮卑與匈奴入遼東遼東太守祭肜擊破之斬獲殆盡三十年鮮卑大人於仇賁等率種人朝賀帝封於仇賁為王於是鮮卑燉煌酒泉以東邑落大人皆詣遼東受賞賜青徐二州給錢榖二億七千萬以為常和帝永元中大將軍竇憲遣右校尉耿夔擊匈奴北單于遁走㽞者尚十餘萬落鮮卑因此徙據其地而有其人由此漸盛安帝永初中鮮卑大人燕荔陽朝賀鄧太后令止烏桓校尉所居甯城下因築南北兩部質館築館以受降質也鮮卑邑落百二十部各遣入質是後或降或叛邊人歳苦其害漢雖時有尅獲而不補所費又與烏桓匈奴更相攻擊桓帝時鮮卑檀石槐者部落畏服遂推為大人檀石槐乃立庭於彈汙山歠仇水歠昌悦反去高栁北三百餘里今馬邑郡界兵馬甚盛東西部大人皆歸焉因南抄緣邊北掠丁零東却夫餘西擊烏孫盡據匈奴故地東西萬四千餘里南北七千餘里網羅山川水澤鹽池分其地為三部東接夫餘濊貊二十餘邑為東部從右北平以西至上谷十餘邑為中部從上谷以西至燉煌接烏孫二十餘邑為西部各置大人主之靈帝初幽并涼三州緣邉諸郡無歳不被寇掠熹平六年鮮卑冦三邉烏桓校尉夏育上言鮮卑冦邊自春已來三十餘發請徵幽州諸郡兵出塞擊之一冬二春必能擒滅召百官議中郎蔡邕上議曰自匈奴北遁鮮卑强盛據其故地稱兵十萬加以關塞不嚴禁網多漏精金良鐵皆為賊有漢人逋逃為之謀主夫邊垂之患手足之蚧搔中國之困胸背之瘭疽也蚧音介搔新到反埤蒼曰瘭必燒反杜氏註左傳曰疽惡瘡也方今郡縣盜賊尚不能禁况醜虜而可服乎昔高祖忍平城之恥吕后棄慢書之詬方之於今何者為甚天設沙漠秦築長城漢起塞垣所以别内外異殊俗也茍無蹙國内侮之患則可矣豈與蟲蟻狄寇計往來哉雖或破之豈可殄盡而方今本朝為之旰食乎夫䘏人救急雖成郡列縣尚猶棄之况障塞之外未甞為人居者乎備邉之術李牧善其宜保塞之論嚴尤申其要遺業猶在文章尚存循二子之䇿守先帝之規臣曰可矣帝不従遂遣育等三萬騎三道並出其塞二千餘里檀石槐命三部大人各率衆逆戰育等大敗奔走死者十七八後種衆日多田畜射獵不足給食檀石槐乃自徇行見烏侯秦水廣從子容反數百里停不流其中有魚不能得之倭人善網捕於是擊倭國得千餘家徙至秦水上令捕以助糧石至晉猶有數百户和平中檀石槐死子和連代立貪淫不平衆叛者半和連死兄子魁頭與從父弟騫曼俱檀石槐之孫爭國衆遂離散自檀石槐諸大人遂代相傳襲魁頭死步度根代立中兄扶羅韓亦别擁衆數萬人魏文帝初步度根遣使獻馬帝拜為王後數與軻比能更相攻擊步度根部衆稍弱其衆萬餘落保太原鴈門郡後一心守邊不為寇害而軻比能衆遂强盛至明帝務欲綏和戎狄以息征伐羈縻兩部而已其後步度根竟為比能所殺也軻比能軻比能本小種鮮卑以勇健斷法平端不貪財物衆推以為大人部落近塞自袁紹據河北中國人多亡叛歸之敎作兵器鎧楯頗學文字故其勒御部落擬則中國出入弋獵建旌麾以鼓節為進退建安中入貢後與烏桓寇邉鄢陵侯彰北征大破之比能走出塞後復通貢魏文帝立比能為附義王其後衆遂强盛控弦十餘萬每鈔畧得財物均平分付終無所私故得衆死力餘部大人皆敬憚之然猶未能及檀石槐也青龍元年比能誘說步度根使叛并州其後幽州刺史王雄遣勇士韓龍刺殺比能更立其弟素利彌加厥機皆為大人在遼西右北平漁陽塞外道逺初不為邊患其種衆多於比能也其後諸子爭立衆離散諸部大人慕容托跋更盛焉乞伏乞伏國仁隴西鮮卑也在昔有如弗斯出連叱盧三部自漠北南出大隂山遇一巨蟲於路狀若神龜大如陵阜俄而不見乃有一小兒在焉時有乞伏部有老父無子者請養為子衆咸許之字曰紇干紇干者夏言依倚也年十歳驍勇善騎射四部伏其雄武推為統主號之曰乞伏可汗託鐸託鐸言非神非人之稱也其後有祐鄰者即國仁五世祖也泰始初率户五千遷於夏緣部衆稍盛又併鹿結部七萬餘落祐隣孫利那擊鮮卑吐頼及尉遲渇權收衆三萬餘落傳至其孫傉大寒㑹石勒滅劉曜懼而遷於麥田元孤山大寒死子司繁立為苻堅所破率部衆悉降於堅堅署為南單于都督討西胡諸軍事鎮勇士川司繁卒國仁代鎮堅南伐敗於壽春國仁乃招集諸郡有不附者討而并之衆至十萬餘以晉孝武太元十年自稱大都督大將軍大單于領秦河二州牧置武城武陽安固武始漢陽天水畧陽漒川甘松匡朋白馬苑川十二郡國仁卒子乾歸嗣為大都督大將軍大單于河南王遷於金城乾歸聲震邊服吐谷渾大人及鮮卑皆率衆歸之盡有隴西巴西之地以義熙三年僭稱秦王後為兄子公府所殺子熾磐襲位七年卒子慕末襲位三年為赫連定所殺自國仁至慕末四世凡四十六年而滅秃髮秃髮烏孤河西鮮卑也其先後魏同出八世祖匹孤率其部自塞北遷於河西其地東至麥田率屯西至濕羅南至澆河北接大漠匹孤卒子夀闐立初壽闐之在孕母因寢而産於被中鮮卑謂被為秃髮因而氏焉壽闐卒孫樹機能立壯果多謀畧泰始中入寇殺秦州刺史胡烈又敗涼州之師盡有涼州之地武帝遣馬隆擊破為部下所殺從弟務丸立傳至其孫復鞬部衆稍盛烏孤即復鞬子也嗣位務農桑修鄰好吕光遣使署為假節冠軍大將軍河西鮮卑大都督廣武縣侯烏孤受之其後擊討諸部大破之隆安元年自稱大都督大將軍大單于西平王以兵伐吕光攻尅金城又破光兵降樂都湟河澆河三郡嶺南𦍑胡數萬落皆附之烏孤死弟利鹿孤立徙居西平隆安五年稱河南王三年卒弟傉檀嗣遂據姑臧後為沮渠䝉遜所伐兵敗奔乞伏熾磐後為熾磐所鴆自烏孤至傉檀三世凡十九年而亡宇文莫槐宇文莫槐出於遼東塞外代為東部大人晉史謂之鮮卑後魏史云其先匈奴南單于之逺屬又按後周書云出自炎帝子孫逃漠北鮮卑奉以為主今考諸家之說其鮮卑之别部其語與鮮卑頗異人皆剪髪而留其頂上以為首飾長過數寸則截短之婦人被長襦及足而無裳莫槐虐用其人為部下所殺立其弟普撥為大人普撥死子邱不勤立尚魏文帝女邱不勤死子莫廆立部衆强盛自稱單于莫廆死子遜眤延立率衆攻慕容廆為廆子翰所敗悉俘其衆遜昵延死子乞得龜立復攻慕容廆為廆所敗部人逸豆歸殺乞得龜而自立又為慕容皝所敗遁歸漠北遂奔高麗其部衆五萬餘落皝徙之於昌黎自是散滅後周宇文氏源出於此徒河叚徒河叚日陸眷出於遼西因亂被賣為漁陽烏桓大人庫辱官家奴諸大人集㑹幽州皆持唾壺唯庫辱官獨無乃唾日陸眷口中日陸眷含出因咽之西向拜天曰願使主君之智慧祿相盡移入我腹中其後漁陽大飢庫辱官以日陸眷為健使將人衆詣遼西逐食遂招誘亡叛以至强盛日陸眷死後至姪務勿塵有遼西之地而臣於晉其所統三萬餘家控弦四五萬騎封務勿塵為遼西公假大單于印綬後就陸眷立勿塵之子與弟匹磾都里反從弟末波等率騎圍石勒於襄國為勒所破擒末波而舎之就陸眷遂攝軍而還不復報歸於遼西就陸眷死末波自稱幽州刺史末波死國人立日陸眷弟䕶遼為主後為慕容皝所破殺之其弟欝蘭奔石季龍以所從鮮卑五千人配之使屯令支今北平郡盧龍縣即其地及冉閔之亂叚龕欝蘭之子龕音堪率衆南移遂據齊地慕容儁使弟恪帥衆伐龕於廣固今北海郡城執龕殺之坑其徒三千餘人慕容氏慕容氏亦東胡之後别部鮮卑也晉史云有熊氏之苖裔因山為號魏初渠帥有莫䕶跋率諸部入居遼西後従司馬宣王討公孫淵有功拜率義王始建國於棘城之北今栁城郡之北時燕代多冠步搖冠䕶跋見而好之乃斂髪襲冠諸部因呼之為步搖其後音譌遂為慕容焉或云慕二儀之德繼三光之容遂以慕容為氏至孫涉歸魏封為鮮卑單于遷居遼東於是漸慕華夏之風矣涉歸有子二人長曰吐谷渾西遷河湟之間今安鄉郡西平縣地次曰廆有命世才畧晉太康十年又遷於徒河之青山今栁城郡界廆以大棘城即帝顓頊之墟元康四年乃移居之敎以農桑法制同於中國永嘉初廆自稱鮮卑大單于因晉亂招撫華夷刑政修明流亡歸之甚衆乃立郡統之冀州人為冀陽郡荆河州人為成周郡青州人為營邱郡并州人為唐國郡徵辟儒生以為參佐而奉晉室朝貢臣禮不闕至皝嗣廆之子雄毅多權畧日以强盛遂自稱燕王遣使於東晉請受朝命許之後遷都於栁城儁暐即其子孫也其後國號燕具晉史載記托跋氏托跋氏亦東胡之後别部鮮卑後魏史云出自黄帝子昌意之少子受封北土亦國鮮卑山以為號宋齊二史又云漢降將李陵之後或云黄帝之苖允以黃帝土德謂土為托后為拔故以為氏其裔始均仕堯時逐女魃於弱水北人頼其勲命為田祖歴三代至秦不交南夏是以載籍無聞六十七代裔孫毛統國三十六大姓九十九其後至詰汾嘗田於山澤歘見輜軿自天而下見美婦人自稱天女曰天命相偶明日請還期明年復㑹此及期至先田處果見天女以所生男授詰汾曰此是君之子即力微也力微立諸郡大人悉服控弦之士二十餘萬遷於定襄之盛樂子祿官立分國為三部一居上谷北濡源西東接宇文部自統之一居代郡之參合陂北在今馬邑郡兄子猗㐌統之一居定襄之盛樂故城亦在今馬邑郡使猗㐌弟猗盧統之後晉封為代王置官屬始出并州遷雜胡北徙雲中五原朔方又西度河擊匈奴烏桓諸部自杏城以北八十里今中部郡之西迄長城原夾道立碣與晉分界長城原在今洛交郡三川縣姪孫什翼犍始建年號分置百官至其孫涉珪即後魏道武皇帝也蠕蠕蠕蠕而兖反姓郁久閭托跋在北荒部落主力微末掠騎有得一奴髪始齊眉忘本名其主字之曰木骨閭者首秃也木骨與郁久閭聲相近故其後子孫因以為氏焉木骨閭既壯免奴為騎卒代王猗盧時坐後期當斬亡匿廣漠谿谷之間收合逋逃得百餘人至其子車鹿㑹雄犍始有部衆自號柔然後魏太武以其無知狀類如蟲故改其號曰蠕蠕宋齊謂之芮芮隋史亦曰芮芮又六代孫社崙㐫狡甚有權畧度漠北侵高車深入其地遂并諸部凶勢以振北徙弱落水始立軍法千人為一軍軍置將一人百人為幢幢置帥一人其西北有匈奴餘種國尤富强盡為社崙所并號為强盛其西則焉耆之北東則朝鮮故地之西北則渡沙漠窮瀚海南則臨大磧其常所㑹庭則燉煌張掖之北於是自號邱豆伐可汗可汗之號始於此邱豆伐猶言駕馭開張也可汗猶言皇帝也蠕蠕之俗君及大臣因其行能即為稱號若中國立諡既死之後不復追稱後又頻擾北邊後魏神䴥二年夏四月太武率兵十餘萬襲之其主大檀社崙從父之弟震怖將其族黨焚燒廬舎絶迹西走於是國落四散竄伏山谷畜産野布無人收視太武帝縁栗水西行過漢將竇憲故壘六月次於兎園水去平城三千七百餘里分軍搜討東至瀚海西接張掖水北渡燕然山東西五千餘里南北三千里高車諸部又殺大檀種類前後歸降三十餘萬俘獲首虜及戎馬百餘萬至孫吐賀真太武又征破之盡收其户畜産百餘萬自是邉疆息警矣宋昇平中遣王洪軌使焉引之共謀魏齊建元三年洪軌始至通使求并力攻魏梁天監普通大同間三遣使求貢獻文帝皇興中其主子成吐賀真之子犯塞征南將軍刁雍上表曰臣聞蠕蠕悍愚同於禽獸所長者野戰所短者攻城若以所短奪其所長則雖衆不能成患雖來不能内逼又狄散居野澤隨水逐草戰則與家産並至奔則與畜牧俱逃不齎資糧而飲食足是以古人伐北方攘其侵掠而已歴代為邊患者良由倐忽無常故也六鎮勢分倍衆不鬬互相違逼難以制之昔周命南仲城彼朔方趙靈秦始長城是築漢之孝武又踵其事此四代之君皆帝王之雄傑所以皆同此役者非智術之不長兵衆之不足乃防狄之要事其理宜然故也易稱天險不可昇地險山川邱陵王公設險以守其國長城之謂歟今宜依故於六鎮之北築長城以禦北虜雖有暫勞之勤乃有永逸之益即於要害徃徃開門造小城於其側因地却敵多置弓弩狄來有城可守有兵可捍既不攻城野掠無獲草盡則走終必懲艾宜發近州武勇四萬人及京師二萬人合六萬人為武士於苑内立征北大將軍府選忠勇有志幹者以充其選下置官屬分為三軍二萬人專習弓射二萬人專習刀楯二萬人專習騎矟修元戰塲十日一習採諸葛亮八陣之法為平地禦寇之方使其解兵家之宜識旌旗之節器械精堅必堪禦寇使將有定兵兵有常主上下相信晝夜如一七月發六郡兵萬人各備戎作之具勅臺北諸屯隨近作米供送六鎮至八月征北部率所鎮與六鎮之兵直至磧南揚威漠北狄若來拒與之决戰若其不來然後分散其地以築長城計六鎮東西不過千里六鎮並在今馬邑雲中單于界後魏宣帝正始中尚書源思禮撫廵北番以跋野置鎮居南與六鎮不齊更立三戍亦在馬邑等郡界若一夫一月之功當三步之地三百人三里三千人三十里三萬人三百里千里之地强弱相兼計十萬人一月必就運糧一月不足為多人懐永逸勞而無怨計築長城其利有五罷遊防之苦其利一也北部放牧無抄掠之患其利二也登城觀敵以逸待勞其利三也省境防之虞息無時之備其利四也歳常遞運永得不匱其利五也帝從之邊境獲其利後帝又北討大敗之斬首五萬級降者萬餘戎馬器械不可稱計追奔逐北旬有九日徃返六千餘里改女水曰武川孝明帝熈平初其主醜奴成弟之子善用兵西征高車大破之擒其主彌俄突殺之盡誅叛者國遂强盛醜奴死弟阿那瓌立經十日其族兄侯俟力發率衆伐之阿那瓌輕騎南走歸後魏封朔方郡公蠕蠕王帝給騎二千援出塞初阿那瓌來奔之後従父兄婆羅門率衆討力發破之衆推婆羅門爲主㑹婆羅門為高車所逐率部落詣涼州降今武威郡於是蠕蠕數萬相率迎阿那瓌錄尚書事高陽王雍尚書令李崇奏曰蠕蠕代跨絶域感化來歸阿那瓌委質於前婆羅門歸誠於後何一呼韓得同今美竊聞漢立南北單于晉有東西之稱皆所以相維禦難為國藩籬今臣等參議以為懐朔鎮北土名無結山吐若奚泉燉煌北西海郡即漢舊障二處寛平原野彌沃阿那瓌宜置吐若奚泉婆羅門宜置西海郡各令總率部落收離聚散彼臣下之官任其舊俗時朝廷問安置之宜於涼州刺史袁翻翻表曰高車蠕蠕迭相吞噬始則蠕蠕衰微高車强盛及蠕蠕復振反破高車主喪人離不絶如綖而令高車能終雪其恥復推蠕蠕者正由種類繁多不可頓滅故也然闢此兩敵即卞莊之算得使境上無塵今蠕蠕内為高車所討滅外慿大國之威靈兩主投身一周而至若棄而不受則虧我大德若納而禮待損我資儲來者既多全徙内地非直其情不願轉送艱難然夷不亂華前鍳無逺覆車在於劉石毁轍固不可尋蠕蠕尚存則高車猶有内顧之憂未暇窺窬上國蠕蠕全滅則高車䟦扈之計豈易可知今蠕蠕雖主奔於上人散於下而餘黨實繁部落猶衆處處碁布以係今主耳高車亦未能一時并兼盡令歸附又高車士馬雖衆主甚懦弱唯以掠盜為質淩奪為業而河西捍禦强敵唯涼州燉煌而已涼州土廣人稀糧仗素闕燉煌酒泉空虚尤甚蠕蠕無復堅立今高車獨擅北垂則四顧之憂匪朝伊夕愚謂蠕蠕二主宜並存之居阿那瓌於東偏處婆羅門於西裔其婆羅門請修西海故城以安處西海故郡本屬涼州今在酒泉直北張掖西北千二百里高車所住金山千餘里正是北虜徃來之要衝漢家行軍之舊道土地沃衍大宜耕殖非但今處婆羅門於事為便即可永為重戌鎮防西北宜遣一良將監䕶婆羅門雖外為署蠕蠕之聲内實防高車之䇿一二年後足食足兵斯固安邊保塞之長計也若婆羅門能自克勵使餘燼歸心收離聚散復興其國者乃漸令北徙轉渡流沙即是我之外蕃高車勍敵西北之虜可無過慮如其姦回反覆孤㤙背德者此不過逋逃之寇於我何損今不早圗戎心一啓脱先據西海奪其嶮要則酒泉張掖自然孤危長河以西終非國有且西海北垂即是大磧野戰所聚千百為群正是蠕蠕射獵之處殖田以自供籍獸以自給彼此相資足以自固今料度似如小損歳終大計其利實多高車豺狼之心何可專信假令稱臣止可外加優納而須内備彌深時朝議是之詔安西將軍廷尉卿元洪超詣燉煌安置婆羅門婆羅門尋與部衆謀叛投嚈噠嚈噠三妻皆婆羅門姊妺也仍為州軍討擒之五年婆羅門死於洛南之館阿那瓌部落既和士馬稍盛乃號可汗遣其長子請尚魏公主出帝又自納阿那瓌女為后阿那瓌請以其孫女妻齊獻武王子長廣公湛阿那瓌有愛女又請配齊獻王自此塞外無塵矣始阿那瓌初復其國盡禮朝廷明帝之後中原喪亂阿那瓌統率北方頗為强盛不復稱臣魏汝陽王暹之為秦州遣其典籖齊人淳于覃使於阿那瓌遂留之親寵任事阿那瓌又嘗因到洛陽心慕中國乃立官號擬於王者遂有侍中黄門郎掌其文墨覃敎阿那瓌轉自驕大毎與魏書隣敵亢禮及齊受東魏禪後阿那瓌為突厥所破自殺太子菴羅辰菴烏含反奔齊文宣帝乃北討突厥而立菴羅辰為主置之馬邑川後背叛文宣帝親征皆大破之國人立阿那瓌叔父鄧叔子為主是時又累為突厥所破以西魏恭帝二年率部落千餘家奔關中突厥既恃兵强又藉西魏和好忌其連類依憑大國使驛相係請盡殺以甘心周文帝遂收縳蠕蠕主以下三千餘人付突厥使於青門外斬之中男以下免死配王公家為奴𨽻高車高車蓋古赤狄之種也初因號為狄歴北方以為勅勒諸夏以為高車丁零焉其語畧與匈奴同而時有小異或云其先匈奴之人也其種有狄氏袁紇氏斛律氏觧枇氏異氏竒斤氏其俗云匈奴單于生二女姿容甚美單于曰此女安可配人將以與天乃於國北無人之地築高㙜置二女於其上曰請天自迎之乃有一老狼晝夜守臺嘷呼因穿㙜下為穴經時不去其小女曰吾父以我與天而今狼來或是天處我乃下為狼妻而産子後遂滋繁成國故其人好引聲長歌有似狼嘷本無都統大帥督當種各有君長為性麤猛黨類同心至於寇難翕然相依鬭無行陣頭别衝突乍出乍入不能堅戰其俗蹲踞媟嬻媟音泄嬻音凟無所忌避婚姻用牛馬納聘以多為榮俗無榖不作酒迎娶之日男女相將持馬酪熟肉即主人延賔亦無行位穹廬前叢坐飲宴終日復留其宿明日將婦歸既而將夫黨還入其家馬羣㨂取良馬俗不潔凈喜致震霆每震則呌呼射天而棄之移去至於來歳馬肥復相率集於震所埋羖羊然火拔刃女巫祝説似如中國祓除而羣隊馳馬旋百帀乃止持一束栁枝回曲竪之以乳酪灌焉婦人以皮裹羊骹戴之首上縈屈髪髾所交反而綴之有似軒冕其死亡葬送掘地作坎坐屍於中張臂引弓佩刀挾矟無異於生而露坎不掩走馬遶旋多者數百帀男女無小大皆集㑹之其遷徙隨水草衣皮食肉牛羊畜産盡與蠕蠕同唯車輪高大輻數至多後徙於鹿渾海西北百餘里部落强大常與蠕蠕為敵亦每侵盜於魏魏道武度弱水西行至鹿海襲破之復討其餘種於狼山又大破之又自骹髯水西北徇畧其部破其雜種三十餘部虜男女五萬餘口馬牛羊百餘萬高車二十餘萬乗而還其後太武帝征蠕蠕還至漠南聞高車東部在已尼陂相去千餘里遣騎襲破之降數十萬皆徙置漠南千里之地後又相率北叛高車之族又有十二姓一曰泣伏利氏二曰叱盧氏三曰乙旃氏四曰大連氏五曰窟賀伏氏六曰達薄干氏七曰阿崙氏八日莫允氏九曰俟斤氏十曰副伏羅氏十一日乞表氏十二曰右外沛氏先是副伏羅部為蠕蠕所役屬魏孝文帝太和十一年蠕蠕主豆崙犯塞其酋阿伏至羅率所部之衆西叛阿伏至羅死弟子彌俄突立遣使朝貢宣武詔曰蠕蠕嚈噠與吐谷渾所以交通者皆路由高昌國今交河郡掎角相接今高昌内附遣使迎引蠕蠕既與吐谷渾徃來路絶姦勢亦沮使命行途經由宜相供俟不得妄令羣小擁塞王人彌俄突尋與蠕蠕主伏圖戰於蒲類海北大敗明帝初彌俄突又被蠕蠕主醜奴大敗殺之弟越居静帝時為兄子比適所殺越居子去賔自蠕蠕奔後魏封為高車王肆州刺史死於鄴至隋有突越失國即後魏之高車國矣稽胡稽胡一曰歩落稽蓋晉時匈奴别種劉元海五部之苖裔也或云山戎赤狄之後自離石以西離石今昌化郡安定以東今安定郡是方七八百里居山谷間種落繁熾其俗土著亦知種田地少桑蠶多衣麻布其丈夫服及死亡殯葬與中夏畧同婦人多貫蜃貝以為耳頸飾又與華人錯居其渠帥頗識文字其言語類夷狄因譯乃通踞蹲無禮貪而忍害俗好淫穢雖分統郡縣列於編户然輕其徭賦有異齊人山谷阻深者未盡役屬而凶悍恃險數為寇亂後魏明帝孝昌中有劉蠡升者居雲陽谷今縣界自稱天子立年號署百官後為齊神武所滅居河西者恃險不賔後周明帝武成初延州稽胡郝阿保郝狼皮延州今延安郡率其種人附於齊氏并與其部劉素德共為影響周柱國豆盧寧督諸軍與延州刺史高琳擊破之建德五年武帝敗齊師於晉州今平陽郡乘勝逐北齊人所棄甲仗未暇收斂稽胡乘閒竊出盜而有之乃立蠡升孫没鐸為主號聖武皇帝後齊王憲為行軍元帥討破之自是寇盜頗息文獻通考卷三百四十二
