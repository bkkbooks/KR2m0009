body:
  text: 文獻通考卷二百三十七鄱陽馬端臨貴與著經籍考六十四集别集張文潛柯山集一百卷鼂氏曰張耒字文潛譙郡人仕至起居舎人嘗為宣潤汝潁兖五州守又嘗謫居黄州復州最後居陳以沒元祐中蘓氏兄弟以文章倡天下號長公少公其門人號四學士文潛少公客也諸人多早沒文潛獨後亡故詩文傳於世者尤多其於詩文兼長雖同時鮮復其比而晩年更喜白樂天詩體多效之云石林葉氏集序曰元祐閒天下論文多曰鼂張鼂余伯舅無咎而張則文潛也文潛之文殆所謂若將為之而不見其為者與雍容而不廹紆裕而有餘初若不甚經意至於觸物遇變起伏斂縱姿度百出意有推之不得不前鼓之不得不作者而卒澹然而平盎然而和終不得窺其際也君與秦少游同學於翰林蘇子瞻子瞻以為秦得吾工張得吾易而世謂工可致易不可致以君為難云又曰無咎雄健峻抜筆力欲挽千鈞文潛容衍精深獨若不得已於書者二公各以所長名家秦少游淮海集三十卷鼂氏曰秦觀字少游高郵人登進士第元祐初除校勘黄本書籍紹聖中除名編隸黄州遇赦北歸至藤州卒蘇子瞻嘗謂李廌曰少游之文如美玊無瑕又琢磨之功殆未有出其右者王介甫謂其詩新精婉麗鮑謝似之少游亦自言其文銖兩不差但以華麗為愧耳吕氏童蒙訓謂少游過嶺後詩嚴重高古自成一家與舊作不同文潛張氏曰予見少游投卷多矣黄樓賦哀鏄鐘文卷卷有之豈其得意之文歟少游平生為文甚多而一一精好可傳玉山汪氏曰居仁吕公云秦少游應制科問東坡文字科紐坡云但如公上吕申公書足矣故少游五十篇只用一格前輩如黄魯直陳無己皆極口稱道之後來讀書初不知其為竒也吕丈所取者盖以文章之工固不待言而尤可為後人模楷者盖篇篇皆有首尾無一字亂說如人相見接引應對茶湯之類自有次序不可或先或後也李方叔師友談記少游言邢和叔嘗曰文銖兩不差非秤上秤來乃等子上等來也某曰今人文章濶達者失之太踈嚴謹者失之太弱少游之文詞雖華而氣古事備而意高如鐘鼎然其體質規模質重而簡易其刻畫篆文則後之鑄師莫彷彿宜乎東坡稱之為天下竒作也非過言矣少游論賦至悉曲盡其妙蓋少時用心於賦甚勤而專常記前人所作一二篇至今不忘也陳無己后山集二十卷鼂氏曰陳師道無己彭城人少以文謁曽南豐南豐一見竒之許其必以文著元祐中侍從合薦於朝起為太學博士紹聖初以進非科舉而罷建中靖國初入秘書為正字以卒為文至多少不中意則焚之石林葉氏曰世言陳無己每登覽得句即急歸卧一榻以被䝉首謂之吟榻家人知之即猫犬皆逐去嬰兒稚子亦皆抱持寄隣家徐待其起就筆硯即詩已成乃敢復常蓋其用意専不欲聞人聲恐亂其思故詩中亦時時自有言吟榻者天下絶藝信未有不精而能工者也朱子語錄曰陳后山文有法度如黄樓銘出當時諸公皆斂衽便是今人都無他抑揚頓挫如仁宗飛白書記大段好曲折甚多過得好墓誌亦好有典有則方是文字其他文亦有太局促不好者后山文字簡潔極有法度做許多碎句子是學史記劉夷叔曰陳無己作文最苦要是鼂張諸人所不及恨其稍儉急非謂文字簡勁為儉急其詞氣自儉急耳韓退之文字多少自然雄渾復齋漫錄曰子瞻子由門下客最知名者黄魯直張文潛鼂無咎秦少游世謂之四學士至若陳無己文行雖高以晩出東坡門故不及四人之著故無己作佛指記云余以詞義名次四君而貧於一代是也而無咎詩云黄子似淵眀城市亦復眞陳君有道舉化行鄉井淳張侯公瑾流英思春泉新高才更難及淮海一髯秦當時以東坡為長公子由為少公無己答李端叔書云蘇公門下有客四人黄魯直秦少游鼂無咎則長公之客也張文潛則次公之客也又次韻黄樓詩云一代蘇長公四海名未已又云少公作長句班馬安得擬謂二蘇也然四客皆有所長魯直長於詩辭秦鼂長於議論魯直與秦覯書曰庭堅心醉於詩與楚辭似若有得至於議論文字今日乃當付之少㳺及鼂張無己足下可從此四君子一一問之其後文潛贈李徳載詩亦云長公波濤萬頃海少公峭㧞千尋麓黄郎蕭蕭日下鶴陳子峭峭霜中竹秦文倩麗紓桃李鼂論峥嶸走珠玊乃知人才各有所長雖蘇門不能兼全也陳氏曰后山集十四卷外集六卷談叢六卷理䆒一卷詩話一卷長短句二卷師道一字履常蜀本但有詩文合二十卷按魏衍作集記云離詩為六卷類文為十四卷今蜀本正如此又言受其所遺甲乙丙稿詩曰五七文曰千百今四眀本如此此本劉孝韙刋於臨川云未見魏本全仍其舊十四卷為正集蓋不知其所謂十四卷者止有文而詩不與也外集詩二百餘篇文三篇皆正集所無談叢詩話或謂非后山作后山者其自號也濟南集二十卷陳氏曰鄉貢進士華山李廌方叔撰又號月巖集東坡知貢舉得試卷以為方叔也置之首選已而不然賦詩有平生謾説古戰場過眼還迷日五色之句後竟不第李文叔集四十五卷後村劉氏曰李格非字文叔濟南人詩文四十五卷文髙雅條鬯有義味在秦鼂之上詩稍不逮元祐末為博士紹聖始為禮部郎有挽蔡相確詩云丙􅁻勲勞猶未報衛公精爽僅能歸豈蔡嘗薦引之乎挽魯直五言八句首云魯直今已矣平生作小詩下六句亦無褒辭文叔與蘇門諸人尤厚其沒也文潛誌其墓獨於山谷在日以詩徃還而些詞如此良不可暁其過臨淄絶句云擊鼓吹竽七百年臨淄城闕尚依然如今只有耕耘者曾得當時九府錢試院五言云斗暄成小疾亦足敗吾勤定是朱衣吏乘時欲舞文亦佳作文叔李易安父也文潛誌言長女能詩嫁趙眀誠又曰李文叔筆勢略與淇水相頡頏畢公叔西臺集五十卷鼂氏曰畢仲游字公叔早登進士第元祐中召天下文學之士十三人䇿試翰林院蘇子瞻以公叔為第一除集賢校理又表自代云學貫經史才通世務文章精麗議論有餘自臺郎為憲漕綽有能聲後入黨籍終於西京留臺集陳叔易為之序何博士備論四卷陳氏曰武學博士浦城何去非正通撰去非以累舉對䇿稱㫖授左班殿直教授武學後以東坡薦授承奉郎司農寺丞通判廬州有文集二十卷未見廖眀略竹林集三卷鼂氏曰廖正一字眀略元祐中召試館職蘇子瞻在翰林見其所對䇿大竒之俄除正字時黄秦鼂張皆子瞻門下士號四學士子瞻待之厚每來必命侍妾朝雲取密雲龍家人以此知之一日又命取宻雲龍家人謂是四學士窺之乃眀略來謝也紹聖間眀略貶信州玊山監稅鬱鬱不得志喪眀而沒自號竹林居士石林葉氏集序略曰眀略嘗言吾深服左氏而樂道范􅁮之秀正温繹曄嘗自叙其書以為但多公家之言而少事外逺致吾所恨亦云邱眀不可及也異時有寘吾於曄伯仲之間吾尚無愧徃有評吾文似尹師魯者吾雖不學師魯然意善其言是時余見眀略文固多知其所自道不誣也眀略自為舉子時即不沿襲場屋一語再舉而取進士其所試傑然已若可以名世者至今為學者推重蓋其用志深苦而思致精慤淵源所從來者逺矣毎一出語輙有區域町畦未有卒然而作者至於出入經傳驅駕前言左掐右摘比次囘曲他人咀嚼􅑾杌終不能安者眀略繩約櫽括如以利刀摧朽木尺箠呵羣羊無不如意故其曲奥􅂤潔音節遒峻精新煥發使人讀之不覺矍然增氣惜其早困不得盡用所長始元祐初天下所推文章黄張鼂秦號四學士眀略同直三館軒輊諸公間無所貶屈欲自成一家然其流落不偶略相似云邢敦夫呻吟集一卷鼂氏曰邢居實字敦夫和叔之子也年十四賦眀君引蘇子曕見而稱之由是知名未㡬和叔貶隨州敦夫侍行病羸嘔血一日有鈴下老卒驕慢應對不遜敦夫怒而擊之無何卒死和叔怒以敦夫屬吏以故疾日侵而夭故黄魯直為之挽云眼㸔白璧埋黄壌何况人間父子情蓋隐之也集後有子瞻魯直無咎諸公䟦陳氏曰㓜有俊才名聲籍甚一時前輩皆愛之年十九而卒宣仁之誣謗恕為之也居實未死或能當不義而争萬一有補於世道是以諸賢尤痛惜焉鼂以道追為其墓表尤反覆致意山谷黄氏序陽夏謝師復景回年二十文章不類少年書生語言嘗序其遺稿云方行萬里出門而車軸折可謂霣涕今觀邢敦夫詩賦筆墨山立自為一家甚似吾師復也秀而不實念之令人心折東坡蘇氏跋敦夫自為童子所與交者皆諸公長者其志豈獨以文稱而已哉百不一見遂與草木俱腐故魯直無咎諸人哭之皆過期而哀江南李泰伯自述其文云天將夀我歟所為固未足也不然斯亦足藉手以見古人矣吾於敦夫亦云王子立文集王適子立撰潁濵蘇子由之壻也潁濵序略曰適從予為學長於詩騷予自南都謫居江南凡六年而歸未嘗一日不相從也既與予同憂患至於涵詠圖史馳騖浮圗老子之説亦未嘗不同之故其聞道益深為文益髙而予觀之益久蓋其於兄弟妻子嚴而有恩和而有禮未嘗有過故予嘗曰子非獨余親戚亦朋友也姑溪集五十卷後集二十卷陳氏曰朝請大夫趙郡李之儀端叔撰嘗從東坡辟中山幕府後代范忠宣作遺表為世傳誦然坐是得罪編置當塗遂居焉其弟之純官至尚書大名集四十卷陳氏曰簽書樞宻魏郡王巖叟彦霖撰韓魏公客也錢塘韋先生集十八卷陳氏曰主客郎中錢塘韋驤子駿撰皇祐五年進士元祐中以近臣薦為監司數路知眀州以左朝議大夫致仕崇寜中乃卒少以詞賦有聲場屋王荆公喜其借箸賦頗稱道之陳師錫誌墓强祠部集四十卷陳氏曰三司戸部判官餘杭强至幾聖撰亦韓魏公客也在幕府表章書記多出其手曾南豐作集序稱其文備古今體兼人所長云南豐曾氏序略曰幾聖工為詩語出驚人最為韓魏公所知魏公喜為詩每合屬賢士大夫賔客與㳺多賦詩以自見其屬而和之者幾聖獨思致逸發若不可追躡魏公未嘗不歎其得之晩也其任幕府魏公每上奏天子以歲時慶賀問候及為書記四方之所好幾聖為屬稿草必聲比字屬曲當繩墨然氣質渾渾不見刻畫逺近多稱誦之及為他文若誌銘序記䇿問學士大夫則簡古而不少貶以就俗其所長兼人如此唐子西集十五卷鼂氏曰唐庚字子西眉山人登進士第早受知於張天覺天覺為相擢京畿提舉常平且欲用為諫官天覺去位後言者謂子西常宣言有一網打盡之語貶惠州大觀五年會赦北歸陳氏曰張商英拜相子西作内前行坐貶惠州歸蜀而卒其文長於議論所著名治存舊正友議賞諸論皆精確鴈湖李氏曰唐子西文采風流人謂為小東坡劉夷叔曰唐子西善學東坡量力從事雖少自成一家其詩工於屬對緣此遂無古意然其品在少㳺上後村劉氏曰子西諸文皆髙不獨詩也其出稍晩使及坡門當不在秦鼂之下竹溪林氏曰唐子西學東坡者也得其氣骨而未盡其變熊之妙間有直致處然無一㸃塵俗亦佳作也馬子才集八卷陳氏曰鎮南節度推官鄱陽馬存子才撰元祐三年進士第四人矸軒程氏曰子才文波瀾雄壯英毅有竒氣不可縶維且徐節孝蘇文忠許可㝡厚淵源有所自矣或疑其過於豪放故官業不甚顯以沒是未免以成敗論也方新學盛行士皆以穿鑿怪誕相髙子才自上庠奉大對首闢災異曲説歸諸人事至論外患則略西南而獨斥北方淵然有為國經久意不溺時好卓卓如此既沒之後川黨議起蘓黄文字焚毁無遺而子才亦在指揮中故世罕傳傳復訛舛近得其族黨所儲善本參以板行者精加正是釐為十一卷凡為䇿二䇿題四時論三史論二十二古詩四十六律詩五十絶句八十四記十一序八書四啓七文疏八雜著四誌銘十三又為年譜列於墓碣之次以詳其出處大率得之傳聞雖未保其無謬其於尊慕師匠則深有意焉既成有示以舊刋進䇿十六卷似非本真故不敢附著云先公曰子才諸史論如論晉人以父母之邦委之於強敵渡江以後百餘年間無有奮發以伸其故國之氣又安得有竒士哉又論後魏謂中國以禮義文采之腴而飼禽獸之饑此之謂不幸非吾一人可與之争古之善戰者能用天下之氣而已矣嗚呼安得此語聞於炎紹中天之初乎子才從節孝徐先生㳺且久其文章雄直雅似節孝今取徐集中所贈三詩繫家集後并書其説云斜川集十卷陳氏曰通直郎蘇過叔黨撰世號小坡坐黨家不得仕進終於通判中山府鼂以道誌墓稱其純孝給事中嶠其孫也九峰集四十卷陳氏曰太常少卿眉山蘇元老在廷撰東坡從孫也坡在海上嘗有書徃来其罷奉常歸潁昌正坐元祐邪等未㡬遂卒年四十七清真集二十四卷陳氏曰徽猷閣待制錢塘周邦彦羙成撰元豐七年進汴都賦自諸生為太學正邦彦博文多能尤長於長短句自度曲其提舉大晟府亦由此既盛行於世而他文未傳嘉泰中四明樓鑰始為之序而太守陳杞刋之蓋其子孫家居於眀故也汴都賦已載文鑑世傳賦初奏御詔李清臣讀之多古文竒字清臣誦之如素所習熟者乃以偏傍取之爾鑰為音􅇚附之卷尾清真雜著三卷陳氏曰邦彦嘗為溧水令故邑有詞集其後有好事者取其在邑所作文記詩歌并刻之寳晉集十四卷陳氏曰禮部貟外郎襄陽米芾元章撰其母閻氏與宣仁在藩時有舊故以后恩補試銜入仕其上世皆武官蓋國初勲臣米信之後也視芾為五世孫酷嗜古法書家藏二王真跡故號寳晉齋玉池集十二卷陳氏曰考功郎湘隂鄧忠臣慎思撰熈寜三年進士坐元符黨廢不用言者論其議范忠宣諡過實又坐罰銅崇觀間卒平生著述至多嘗和杜詩全帙又嘗獻郊祀慶成賦又原廟詩百韻裕陵喜之擢為館職今皆軼弗傳所存一二而已玊池其所居山峰名樂静集三十卷陳氏曰起居舍人鉅野李昭玘季成撰元豐二年甲科所居有樂静堂故以名集其姪邴漢老為書其後雲龕李氏曰序略曰東坡罷徐守時伯父以書抵之坡答書歴道黄張鼂秦數公且曰此數子者挾其有餘之姿而騖無涯之知必極其所如徃而後已則此安所歸宿哉惟眀者念有以反之其意蓋以彼為不然而勉其有所至也惟伯父性誠乎忠厚故其為文横騖别驅曲折演迤而一貫於理有萬折必東之勢志樂於静退故其為文崒然其立淵然其止不侈衆目而風神自逺有久幽而不改其操之羙學博而思精故其為牋奏應用之作傅古切今琢削穩密不傷天骨叙事外自為文章才贍而意新故其為詩竒麗愜適章斷句絶餘思羡溢得詩人味外之味此其大略也陳瑩中了齋集三十卷鼂氏曰陳瓘字瑩中延平人建中靖國初為右司諫嘗移書責曾布及言蔡京及弟卞之姦惡章疏十上除名編隸合浦以死靖康中贈諫議大夫自號了翁陳氏曰汪應辰為集序以為出死力攻權姦者天下一人而已非虚語也又有約論十七卷起戰國至後漢安帝蓋讀通鑑隨事有所發眀也陳司諫集兩卷鼂氏曰陳祐字純益仙井監人登進士第建中靖國初為臺諫與龔夬任伯雨江公望協力彈擊紹聖姦臣後蔡京用事廢斥而沒節孝集二十卷陳氏曰楚州教授山陽徐積仲車撰治平四年進士以耳聾不能仕事母極孝行義純篤古所謂卓行也東坡謂其詩文怪而放如玊川子政和中賜謚節孝處士學易集二十卷陳氏曰朝奉郎東光劉跂斯立撰忠肅公摯之長子也與其弟蹈同登元豐二年進士第元祐初以其父在言路政府不得用紹聖以後復坐黨家連蹇終其身鼂景迂志其墓比孫明復石守道之徒為文無所不長宣防宮賦學易堂記世傳誦之田承君集三卷陳氏曰大宗正丞陽翟田晝承君撰晝樞宻况之姪也與鄒道鄉善鄒之貶書曰願毋以此舉自滿士所當為者未止此也道鄉集四十卷陳氏曰吏部侍郎晉陵鄒浩志完撰浩既諫立劉后坐貶徽宗初召還對上首及之奨歎再三問諫草安在曰焚之矣退告陳瓘瓘曰禍其始此乎異時姦臣妄出一緘則不可辯矣蔡京素忌之使其黨作偽疏言劉后殺卓氏而奪其子遂得罪其在昭州作青詞告上帝有追省當時奏御之三章初無殺母取子之一字云婆娑集三十卷陳氏曰右正言陽翟崔鶠徳符撰鶠坐元符上書邪等廢於家治圃號婆娑靖康初召為諫官力論馮澥之罪忽得攣疾不能行而卒無子其壻衞昻裒輯其遺文鼂氏曰鶠元符末上書入邪等廢斥㡬三十年其為文最長於詩清婉敷腴有唐人風劉巨濟前溪集五卷鼂氏曰劉涇字巨濟蜀人終於太學博士為文竒怪李元應跨鼇集五十卷鼂氏曰李新字元應仙井監人早登進士第劉涇嘗薦於蘇子瞻令賦墨竹口占一絶立就坐元符末上書奪官謫置遂州流落終身跨鼇仙井山名也滿氏昌色集二十卷鼂氏曰滿中行字思復登進士第元豐中為太學官虞蕃獄起思復獨不絓吏議詔褒之馮允南集十卷鼂氏曰馮山字允南普州人鄧綰為中丞薦為臺官允南力辭不就士論稱之潏水集四十卷陳氏曰集英殿修撰長安李復履中撰元豐二年進士博學有氣節其為熙河漕有㫖造戰艦戰車復奏議者之謬以為兒戱遂罷其議時論韙之鼂氏景迂集十二卷鼂氏曰從父詹事公也諱説之字以道文元公元孫少慕司馬温公為人自號景迂生年未三十蘇子瞻以著述科薦之元符中上書居邪中等博極羣書通六經尤精於易傳邵堯夫之學著太極傳縉紳髙其節行嘗守成州時民訴嵗旱公以為十分益蠲其税轉運使大怒督責甚峻因丐老而歸靖康初以著作郎召還祕書監免試除中書舍人兼太子詹事俄以論不合去國建炎初終於徽猷閣待制陳氏曰徽猷閣待制鼂説之以道撰又本止刋前十卷説之平生著述至多兵火散逸其孫子健裒其遺文得十二卷續廣之為二十卷别本刋前十卷而止者不知何説也劉跂斯立墓誌景迂所撰見學易集後而此集無之計其逸者多矣說之元豐五年進士元祐初蘇文忠范太史曾文昭皆薦之坐元祐邪等廢棄靖康末始為從官鼂氏崇福集三十五卷四六集十五卷鼂氏曰從父崇福公也登進士第又中宏詞第一元符末上書居邪等廢斥二十年以朝請郎奉祠崇福宫而終故以名集天才英特為文章立成明潤宻緻世以為宜在北門西掖云陳氏曰朝請郎鼂詠之之道撰景迂弟也為作集序詠之初以䕃為揚州法曹東坡守揚族兄無咎為倅以其文呈東坡及至揚詠之具參軍禮趨謁東坡走下庭擕手以上謂坐客曰此竒才也鼂氏封丘集二十卷鼂氏曰世父封丘府君諱闕字伯宇鏁㕔中進士第黃魯直嘗薦之於蘇子瞻云鼂伯宇謹厚守文元家法從㳺多長者其文已能如此年蓋未二十也願一語教戒之子瞻答云鼂伯宇詩騷細㸔甚竒麗信乎其家多異材也雖然凡文至足之餘溢為竒偉今鼂文渉竒似太早可作朋友切磋之語以告之非謂其諱也恐傷其邁徃之氣耳後坎􅇄終身卒官封丘丞陶山集二十卷陳氏曰尚書左丞山隂陸佃農師撰東堂集六卷詩四卷畫􅂤二卷樂府二卷陳氏曰祠部郎江山毛滂澤民撰滂為杭州法曹以樂府詞有佳句受知於東坡遂有名嘗知武康縣縣有東堂集所以名也又嘗知秀州修月波樓為之記其詩文視樂府頗不逮溪堂集二十卷陳氏曰臨川謝逸無逸撰竹友集十卷陳氏曰臨川謝薖㓜槃撰逸從弟也呂居仁題其後曰逸詩似康樂薖詩似元暉浮沚先生集十六卷後集三卷陳氏曰祕書省正字永嘉周行巳恭叔撰十七入太學有盛名師事程伊川元祐六年進士為太學博士以親老歸教授其鄉再入為館職復出作縣永嘉學問所從出也鄉人至今稱博士集序林鉞撰先祖妣先生之第三女先君之所自出故知其本末所居謝池坊有浮沚書院橘林集十六卷後集十五卷陳氏曰宻州教授石􅐂敏若撰崇寜壬午以同進士出身中詞科其文彫琢怪竒殊乏醖籍壓卷策問言王金陵配享先聖事謂其以百聖芻豢甘四海口以六經河漢洗四海心以九逵夷路破四海迷以萬金良藥起四海病讀之不覺大􅀏其人與文皆不足道也集僅二冊而卷數如此麻沙坊本徃徃皆然文獻通考卷二百三十七
