body:
  text: 文獻通考卷二百二十四鄱陽馬端臨貴與著經籍考五十一子房中神僊漢藝文志房中者情性之極至道之際是以聖王制外樂以禁内情而為之節文傳曰先王之作樂所以節百事也樂而有節則和平壽考及迷者弗顧以生疾而隕性命漢志房中八家百八十六卷右房中漢藝文志神僊者所以保性命之眞而游泳於其外者也聊以盪意平心同死生之域而無怵愓於胷中然而或者專以為務則誕欺怪迂之文彌以益多非聖王之所以教也孔子曰索隐行怪後世有述焉吾不為之矣漢志神僊家二百五卷隋經籍志曰道經者云有元始天尊生於太元之先禀自然之氣冲虚凝遠莫知其極所說天地淪壊刼數終盡略與佛經同而以天尊之體常存不滅每至天地初開或在玉京之上或在窮桑之野授以祕道謂之開刼度人然其開刼非一度矣故有延康赤明龍漢開皇是其年號其間相去經四十一億萬載所度皆諸天仙上品有太上老君太上丈人天眞皇人五方天帝及諸仙官轉共承受世人莫之豫也所說之經亦禀元一之炁自然而有非所造為亦與天尊常存不滅天地不壞則藴而莫傳刼運若開其文自見凡八字盡道體之奥謂之天書字方一丈八角垂芒光輝照耀驚心眩目雖諸天仙不能省視天尊之開刼也乃命天眞皇人改囀天音而辯析之自天眞以下至於諸仙輾轉節級以次相授諸仙得之始授世人然以天尊經歴年載始一開法受法之人得而寳祕亦有年限方始傳授上品則年久下品則年近故今受道者經四十九年始得授人推其大㫖蓋亦歸於仁愛清净積而修習漸致長生自然神化或白日登僊與道合體其受道之法初受五千文籙次受三洞籙次受洞元籙次受上清籙籙皆素書紀諸天曹官屬佐吏之名有多少又有諸符錯在其間文章詭怪世所不識受者必先㓗齋然後齎金環一并諸䞇幣以見於師師受其䞇以籙授之仍剖金環各持其半云以為約弟子得籙緘而佩之其㓗齋之法有黃籙玉籙金籙塗炭等齋為壇三成每成皆置緜蕝以為限域傍各開門皆有法象齋者亦有人數之限以次入於緜蕝之中魚貫面縛陳說愆咎告白神祗晝夜不息或一二七日而止其齋數之外有人者並在緜蕝之外謂之齋客但拜謝而已不面縳焉而又有消灾度厄之法依隂陽五行數術推人年命書之如章表之儀并具䞇幣燒香陳讀云奏上天曹請為除厄謂之上章夜中於星辰之下陳設酒脯䴵餌幣物歴祀天皇太一祀五星列宿為書如上章之儀以奏之名之為醮又以木為印刻星辰日月於其上吸氣執之以印疾病多有愈者又能登刀入火而焚勅之使刄不能害火不能熱而又有諸服餌辟榖金丹玉漿雲英蠲除滓穢之法不可殫記云自上古黄帝帝嚳夏禹之儔並遇神人咸受道籙年代既遠經史無聞焉推詳事迹漢時諸子道書之流有三十七家大㫖皆去健羡處冲虚而已無上天官符籙之事其黃帝四篇老子二篇最得深㫖故言陶𢎞景者隐於句容好隂陽五行風角星算修辟榖導引之法受道經符籙武帝素與之逰及禪代之際𢎞景取圖䜟之文合成景梁字以獻之由是恩遇甚厚又撰登眞隐訣以證古有神仙之事又言神丹可成服之則能長生與天地永畢帝令𢎞景試合神丹竟不能就乃言中原隔絶藥物不精故也帝以為然敬之尤甚然武帝弱年好事先受道法及即位猶自上章朝士受道者衆三呉及邊海之際信之踰甚陳武世居呉興故亦奉焉後魏之世嵩山道士寇謙之自云嘗遇眞人成公興後遇太上老君授謙之為天師而又賜之雲中音誦科誡二十卷又使玉女授其服氣導引之法遂得辟榖氣盛體輕顔色鮮麗弟子二十餘人皆得其術其後又遇神人李譜云是老君元孫授其圖籙眞經劾召百神六十餘卷及銷鍊金丹雲英八石玉漿之法太武始光之初奉其書而獻之帝使謁者奉玉帛牲牢祀嵩嶽迎致其餘弟子於代都東南起壇宇給道士百二十人顯揚其法宣布天下太武親備法駕而受符籙焉自是道業大行每帝即位必受符籙以為故事刻天尊及諸仙之象而供飬焉遷洛已後置道塲於南郊之旁方二百歩正月十月之十五日並有道士等人百六人拜而祠焉後齊武帝遷鄴遂罷之文襄之世更置館宇選其精志者使居焉後周承魏崇奉道法毎帝受籙如魏之􅃇尋與佛法俱滅開皇初又興髙祖雅信佛法於道士蔑如也大業中道士以術進者甚衆其所講經由以老子為本次講莊子及靈寳昇元之屬其餘衆經或言傳之神人篇卷非一自云天尊姓樂名静信例皆淺俗故世甚疑之其術業優者行諸符禁徃徃神驗而金丹玉液長生之事歴代糜費不可勝紀竟無效焉今考其經目之數附之於此隋志三百七十七部一千二百一十六卷唐志三十五家五十部三百四十一卷失姓名十三家自道藏音義以下不著録六十二家二百六十五卷宋三朝國史志曰班志藝文道家之外復列神仙在方伎中東漢後道教始著而眞仙經誥别出焉唐開元中列其書為藏目曰三洞瓊綱總三千七百四十四卷厥後亂離或至亡缺宋朝再遣官校定事具道釋志嘗求其書得七千餘卷命徐鉉等讎校去其重複裁得三千七百三十七卷大中祥符中命王欽若等照舊目刋補凡四千三百五十九卷洞眞部六百二十卷洞元部一千一十三卷洞神部一百七十二卷太眞部一千四百七卷太平部一百九十三卷太清部五百七十六卷正一部三百七十卷合為新録凡四千三百五十九又撰篇目上獻賜名曰寳文統録隋志以道經目附四部之末唐毋㷡錄散在乙丙部中今取修鍊服餌歩引黃治符籙章醮之說素藏館閣者悉録於此宋三朝志九十七部六百二十五卷宋兩朝志四百一十三部宋四朝志二十部宋中興志三百九十六家四百四十七部一千三百二十一卷度人經三卷鼂氏曰元始天尊說唐志有其目古書也神仙之說其來尚矣劉歆七略道家之學與神仙各為録其後學神仙者稍稍自附於黃老乃云有元始天尊者生於太元之先姓樂名静信常存不滅每天地開闢則以祕道授諸仙謂之開刼度人延康赤明龍漢開皇即其紀年也授其道者漸至長生或白日昇天其學有授籙之法名曰齋有拜章之儀名曰醮又有符呪以攝治鬼神服餌以蠲穢濁至於存想之方導引之訣烹鍊變化之術其類甚衆及葛洪寇謙陶𢎞景之徒相望而出其言益熾於世富貴者多惑焉然通人皆疑之宋朝修道藏共六部三百一十一帙而神仙之學如上所陳者居多與道家絶不類今於其間取自昔書目所載者録之又釐而為二凡其說出於神仙者雖題曰老子黃帝亦皆附於此不以名亂實也若夫容成之術雖收於歆軰者以薦紳先生難言之特削去不録大洞眞經一卷鼂氏曰題云髙上虚皇君等道書三十七章晉永和中上清紫㣲元君降授於王夫人是上清髙法道藏書六部一曰大洞眞部二曰靈寳洞元部三曰太上洞神部四曰太眞部五曰太清部六曰正一部李氏道書志四類一曰經誥類二曰傳録類三曰丹藥類四曰符篆類皆以此書為之首然唐志不載故以次度人經云黃庭内景經一卷鼂氏曰題大帝内書藏𤾉谷隂三十六章皆七言韻語梁邱子叙云扶桑大帝命𤾉谷神王傳魏夫人一名東華玉篇黃者中央之色庭者四方之中外指事即天人地内指事即肺心脾中故曰黃庭内景中黃經二卷鼂氏曰題九仙君撰中黃眞人注亦名胎臟論黃庭外景經三卷鼂氏曰叙謂老子所作與法帖所載晉王羲之所書本正同而文句頗異其首有老子閒居作七言觧說身形及諸神兩句其末有吾言畢矣而妄陳一句且改淵為泉改治為理疑唐人誕者附益之崇文總目云記天皇氏至帝嚳受道得仙事此本則無之陳氏曰黃庭外景經一卷務成子注是南岳魏夫人所受者魏舒之女也無仙子刪正黃庭經歐陽文忠公序之意必公所自為而隐其名耳其序曰無仙子不知為何人也無姓名無爵里世莫得而名之其自號為無仙子者以警世人之學仙者也其為言曰自古有道無仙而後世之人知有道而不得其道不知無仙而妄學一作求仙此我之所哀也道者自然之道也生而必死亦自然之理也以自然之道飬自然之生不自戕賊天閼而盡其天年此自古聖智之所同也禹走天下乘四載治百川可謂勞其形矣而壽百年顔子蕭然坐於陋巷簞食瓢飲外不誘於物内不動於心可謂至樂矣而年不及三十斯二人者皆古之仁人也勞其形者長年安其樂者短命蓋命有有一作之長短禀之於天非人力之所能為也惟不自􅆷賊而各盡其天年則二人所同也此所謂自然之道養自然之生後世貪生之徒為養生之術者無所不至至茹草木服金石吸日月之精光又有以謂此外物不足恃而反求諸内者於是息慮絶欲鍊精氣勤吐納專於内守以養其神其術雖本於貪生及其至也尚或可全形而却疾猶愈於肆欲稱情以害其生者是謂養内之術故上智任之自然其次養内以却疾最下妄意以貪生世傳黄庭經者晉魏間道士養生之書也其説專於養内多竒怪故其傳之久則易為訛舛今家家異本莫可考正無仙子既甚好古家多集録古書文字以為翫好之娯有黃庭石本者乃永和十三年晉人所書其文頗簡以較今世俗所傳者獨為有理於是喟然嘆曰吾欲曉世以無仙而止人之學者吾力顧未能也吾視世人執竒怪訛舛之書欲求生而反害其生者可不哀哉矧以我翫好之餘拯世人之謬惑何惜而不為故為刪正諸家之異一以永和石本為定其難曉之言略為注觧庶幾不為訛謬之說惑世以害生是亦不為無益若大雅君子則豈取於此眞誥十卷鼂氏曰梁陶𢎞景撰皆真人口授之誥故以為名記許邁楊羲諸仙受授之説本七卷運題一象甄二命授三協昌期四稽神樞五握眞輔六翼眞檢七後人析第一第二第四各為上下朱子語録曰道書中眞誥末後有道授篇却是竊佛家四十二章經為之非特此也至如地獄託生妄誕之説皆是竊他佛教中至鄙至陋者為之某嘗謂其徒曰自家有箇寳珠被他竊去了却不照管亦都不知却去他墻根壁角竊得箇破瓶破罐用此甚好笑周易參同契三卷鼂氏曰漢魏伯陽撰按神仙傳伯陽會稽上虞人通貫詩律文辭贍博修眞養志約周易作此書凡九十篇徐氏箋注桓帝時以授同郡淳于叔通因行於世彭曉為之觧隋唐書皆不載按唐陸徳明觧易字云虞翻注參同契言字從日下月今此書有日月為易之文其為古書明矣參同契分章通眞義三卷明鏡圖訣一卷陳氏曰眞一子彭曉秀川撰蜀永康人也參同契因易以言養生後世言修鍊者祖之序稱曉丁未以參同契分十九章而為之注且為圖八環謂之明鏡圖曩在麻姑山傳録其本有秀川傳注綱會稽所刻本其前題祠部員外郎彭曉蓋據祕閣本云爾麻姑本附傳亦言仕蜀為此官張隨注參同契三卷鼂氏曰皇朝張隨皇祐中居靑城山注魏伯陽之書列十數圖於其後參同契大易圖一卷鼂氏曰不題撰人論水火候有太易太初太始太素太極四象五行等二十四篇并圖按崇文總目云張處撰而李獻臣以為天老神君撰雲常子張處序亦名至藥丹訣未知孰是參同契考異一卷陳氏曰朱熹撰以其詞韻皆古奥雅難通讀者淺聞妄輙更改比他書尤多舛誤合諸本更相讐正其諸同異皆並存之朱子語録曰參同契所言坎離水火龍虎鉛汞之屬只是互換其名其實只是精氣二者而已精水也坎也龍也汞也氣火也離也虎也鉛也其法以神運精氣結而為丹陽氣在下初成水以火鍊之則凝神丹其說甚異内外異色如鴨子卵眞箇成此物參同契文章極好蓋後漢之能文者為之讀得亦不枉其用字皆根括古書非今人所能觧以故皆為人妄觧世間本子極多其中有云千周粲彬彬兮萬遍將可覩神明或告人兮魂靈忽自悟言誦之久則文義要訣自見又曰二用無爻位周流行六虚二用者用九用六九六亦坎離也六虚者即乾坤之初二三四五上六爻位也言二用雖無爻位而常周流乎乾坤六爻之間猶人之精氣上下周流乎一身而無定所也世有龍虎經云在參同契之先季通亦以為好及得觀之不然乃隐括參同契之語而為之也又曰參同契為艱深之詞使人難曉其中有千周萬遍之說欲令熟讀以得之也大槩其説以為欲明言之恐泄天機欲不說來却又可惜金碧古文龍虎上經一卷陳氏曰不著名氏麻姑所録本無金碧字朱子語録曰曾景建謂參同契本是龍虎上經果否先生曰不然蓋是後人見魏伯陽有龍虎上經一句遂偽作此經大槩皆是體參同契而為故其間有說錯了處如參同契云二用無爻位周流行六虚二用者即易中用九用六也乾坤六爻上下皆是有位惟用九用六無位故周流行於六虚今龍虎經却錯説作虚危去蓋討頭不見胡亂牽合一字來説參同契觧一卷陳氏曰題紫陽先生不知何人西昇經四卷鼂氏曰題曰太上眞人尹君記録老子將遊西域既為關令尹喜説五千言又留祕㫖凡三十六章喜述之為此經其首稱老君西昇聞道竺乾有古先生是以就有道説者以古先生佛也事見廣洪明集辯惑論章注西昇經三卷鼂氏曰梁道士章處元分上下經上經三七法天之陽數分二十一章下經四七法地之隂數總四十九章象大衍用數云唐志稱處元集觧以聞道竺乾為經道竺乾以古先生為老子自謂洞元注西昇經四卷鼂氏曰唐洞元子注其姓名未詳唐志有戴詵注西昇經疑此或詵書也分三十六章謂竺乾古先生非釋迦之號云徐注西昇經二卷鼂氏曰徐道邈撰句曲人未詳何代其本以有古先生善入無為作善入泥丸古先生者吾之師也化乎竺乾作吾之身也化胡竺乾云歩虚經一卷鼂氏曰太極眞人傳左仙翁其章皆髙仙上聖朝元都玉京飛廵虚空之所諷詠故曰歩虚定觀經一卷鼂氏曰題云天尊授左元眞人述定心惠觀等修故以為名云内觀經一卷鼂氏曰老子撰述人胞胚魂魄衆神之名當諦觀身心俾不染濁穢乃可常存云凡二十二章老子化胡經十卷鼂氏曰魏明帝為之序經言老子歸崑崙化胡次授罽賔後及天竺按裴松之三國志注言世稱老子西入流沙化胡成佛其說蓋起於此議化胡經八狀附於後唐志云萬嵗通天元年僧惠澄上言乞毁老子化胡經秋官侍郎劉如璿等議狀證其非偽此是也太清經一卷鼂氏曰太清䕶命靈文金闕上聖按傳修道之士可以除邪治病云天蓬神呪一卷鼂氏曰未詳撰人邯鄲書目載道書最多已上八種皆有之混元内外鍳二卷延壽經一卷附鼂氏曰混元謂老子也亦導引之術内篇外篇二太上說魂魄經二卷鼂氏曰題曰老子撰載三魂七魄名字形狀好惡以呪術存制之崇文題曰太上靈書李氏亦有其目天眞皇人九仙經一卷鼂氏曰天皇人為黃帝說一行羅公遠葉法静注論水火龍虎造金丹之術崇文書也按九仙經興廢記云此經黃帝留峩眉山石壁漢武帝時得之大中嘗禁絶陰符内丹經一卷鼂氏曰題曰老子說紫陽金碧經二卷鼂氏曰皇元眞人撰廣成子述河上公修為六十四章上明和合習眞之法中有調神理氣之方下有還丹九鼎上昇之術崇文目有三卷今逸其一靈樞金鏡神景内經一卷陳氏曰稱扁鵲注上清天地宫府圖經二卷陳氏曰唐司馬子微撰中誡經一卷陳氏曰稱黃帝赤松子問答蓋假托也太上金碧經一卷陳氏曰題魏伯陽注四十九章經李壁季章序曰隐者劉漫翁博渉古今尤䆳黃老一日某言賈生惜誓賦之超絶如云黃鵠一舉兮知山川紆曲再舉兮覩天地圓方此言居身益髙則所見益遠矣今人汨於情偽沉於利欲猶坎蛙壤蚓積處窪下欲幾高明得乎東坡稱博大古眞人老􅆅關尹喜獨立萬物表長生乃餘事惟其翛然元覽却立垢紛之外不為物所梏則乘星載雲揮斥八極超無有而獨有又誰禦哉漫翁曰君言善矣然兹理也不待賈生東坡而始著是在道經四十九章經已云學道甚苦如負重登山既登絶頂其苦自息俯視一世皆微眇也予始知有是經亟從羽流訪得讀之慨然曰至言妙道盡在是矣虚皇豈欺我哉大抵道家貴於眇萬物而不留離澳渫而化昭融物之旦夕交於前者皆不足以為吾病而去道邇矣然而為物而眇視之猶有物也若盡空諸有豁然四達無門無旁無聲無臭亶為至極而聖人之教人未嘗舉空也老子言道雖􅆼冥恍惚而必有象有物焉此經所謂圓明具足者非邪或謂之誡或謂之元或謂之眞或謂之覺或謂之實際以至為情為識為喜為怒為愛為惡為聖賢為仙靈為姦邪為盗賊大而天下之能化育微而蠛蠓之能飛鳴皆是物也故易著感寂之理而昇元清静二經雖曰空而實非空使凡世之善惡皆可舉而空之則滛貪狠愚險忮䜛媚所植罪本亦可空矣則將何所不至乎味經之三十三章蓋與老易及清静昇元合雖稱種種因緣均為幻假當滅除之而他章顧謂觸情縱欲是造諸苦吾道苦而後樂衆生樂而後苦又云財者罪之根聚財為聚孽又云危人還自危枉彼還自枉觀此則凡姦邪小人聚財以規利枉彼以䧟人雖快一時終必自禍猶影響也槩謂之空可乎嘗怪道家言三洞三太皆藏玉京上眞猶不得見而近世張君房所集道書凡四千五百六十五卷崇觀間增至五千三百八十七卷抑何多邪黃老宗㫖虚無至太洞諸經昉言諸天奥密神仙隐祕事自晉始傳人間由隋歴唐方伎符籙其説益以誕漫去本滋遠以是知道家之書眞者絶少而俗師附益假托者多如世所傳斗經乃以北辰為北斗豈有天人至尊不辨星文誤引論語者乎若此經之元妙精㣲明白切至其為先聖至人所說無疑惟卓識殫洽者無惑乎古書之正偽彼方士羽人茍非研精教典獨會於心烏能斷其書之純駁哉右神僊文獻通考卷二百二十四
