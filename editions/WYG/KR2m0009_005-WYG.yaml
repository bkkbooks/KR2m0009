body:
  text: 文獻通考卷五鄱陽馬端臨貴與著田賦考五歴代田賦之制哲宗元祐初御史論陜西轉運使吕大中假支移之名實令農戸計輸脚錢十八百姓苦之乃下提刑司體量均其輕重之等以稅賦户籍在第一等二等者支移三百里第三等第四等二百里第五等一百里不願支移而願輸道里脚錢者亦酌度分為三各從其便焉六年用有司議河東助軍糧草支移無得輸三百里災傷五分以上免其折變紹聖元年臣僚言元祐􅃯典賣田宅徧問四隣乃於貧而急售者有害乞用熙寜元豐法不問隣以便之應問隣者止問本宗有服親及墓田相去百戸内與所斷田宅接者仍限日以節其遲宋初亦有問親隣之法徽宗崇寧三年宰臣蔡京等請復行方田從之推行自京西北兩路始四年尚書省言諸妄說方田條法扇惑愚民致賤價賣斷田業或毁伐桑柘者杖以曉衆從之監察御史宋聖寵言元豐方田之法廢且二十年猾吏毁去案籍豪民毁壞埄界乞按視補葺詔行下七月詔方田路分令提舉司視稅最不均縣每州歲方一縣或兩縣遇災傷權罷知開封府太康縣李百宗上言州縣官吏有茍簡懐異之人往往以本縣豐熟妄為災傷以避推行或有好進之徒以人戸實被災傷妄為豐熟務要邀求恩賞殊不能體朝廷使民之美意乞覺察禁治從之五年詔諸路見行方田切慮民間被方不均公吏騷擾乞取難禁除已方外權罷大觀二年詔復行方田四年詔去歲諸路災傷應已經方量而高下失當見有陳訴未為畢事合依已命權其賦稅依未方時舊則輸納又詔方田官吏非特妄増田稅又兼不食之山而方之俾出芻草之直民戸因此廢業失所監司其推原本制悉加改正毋失其舊五年河北西路提舉常平司奏所在地色極多不下百數及至均稅不過十等第一等雖出十分之稅地土肥壤尚以為輕第十等只均一分多是瘠鹵出稅雖少猶以為重若不入等而依條只收柴蒿錢每頃不過百錢至五百既收入等但可耕之地便有一分之稅其間下色之地與柴蒿之地不相逺乃一例每畝均稅一分上輕下重故人戸不無詞訴欲乞依條據土色分外只将第十等之地再分上中下三等折畝均數謂如第十等地每十畝合折第一等一畝即第十等内上等依元數中等以十五畝下等以二十畝折地一畝之類是也詔諸路槩行其法五月臣僚上言朝廷推行方田之初外路官吏不遵詔令輒於舊管稅額之外増出稅數號為蹙剰其多有一邑之間及數萬者欲望下逐路提舉司將應有増稅縣分並依近降指揮重行方量依條均定稅數不得於元額外别有増損止令提刑司體量詣實聞奏大觀二年詔天下租賦科撥支折當先富後貧自近及遠乃者漕臣失職有不均之患民或受害其定為令所謂支移視地逺近遞遷有無以便邉餉内郡罕用焉間移用則任民以所費多寡自擇故或輸本色於支移之地或輸脚費於所居之邑折變之法納月初旬估中價折凖仍視歳豐凶定物之低昂官吏毋得私其輕重初京西舊不支移崇寜中將漕者忽令民曰支移所宜同也今特免若地里脚錢則宜輸自是嵗以為常脚錢之費斗為錢五十六比元豐既當正歳之數而反覆紐折數倍於昔農民至鬻牛易産猶不能繼漕司乃用是取辦理之譽言者極論其害遂詔支移而所輸地里脚錢不及斗者免之尋詔五等戸稅不及斗者支移皆免重和間言者謂物有豐匱價有低昂估豐賤之物俾民輸送折價既賤輸官必多則公私乏利而州縣之吏但計一方所乏不計物之有無責民所無其患無量至於支移徙豐就歉理則宜然豪民贓吏故徙歉以就豐挾輕貨以賤價輸官其利自倍而下貧之戸各免支移估直既高更益脚費視富戸反重因之逋負困於追胥又非法折變既以絹折錢又以錢折麥以絹較錢錢倍於絹以錢較麥麥億於錢展轉增加民無所訴前後奏請帝必為之申禁且定法而有司終不承惻怛之意焉宣和元年臣僚言方田以均天下之稅神考良法陛下推行今十年告成者六路可謂緩而不廹矣御史臺受訴乃有二百餘畝方為二十畝者有二頃九十六畝方為七十畝者䖍州之瑞金是也有租稅一十三錢而増至二貫二百者有租稅二十七錢而増至一貫四百五十者䖍之㑹昌是也蓋方量官憚於䟦履並不躬親而行繵拍峯驗定土色一任之胥吏望詔常平使者密行檢察若未按舉他時有訴不平則明加貶黜改正詔令諸路提刑司體問二年詔罷諸路方田又詔自今諸司毋得起請方田諸路未方田縣分已方量賦役不以有無論訴悉如舊額輸稅民困方田而逃移歸業者逋欠並放高宗紹興元年江西湖南宣撫大使朱勝非言民間之病正稅外科敷煩重稅米一斛有輸至五六斛稅錢一緡有輸及十八緡者和糴與正稅等而未嘗支錢他皆類此又言輸苖請以限前聽民從便納早占米充支用從之江東帥臣李光言廣徳縣秋苖舊納水陽鎮鄉民憚逺乞每一石貼三斗七升充脚剩就本軍送納自是立為年額詔蠲其半六年殿中侍御史周祕言昨朝廷展放淮南稅限聞州縣有收撮課子之例夏則撮麥秋則撮穀又有助軍米借牛租名色十一往往取至四五分重斂如此乃以愛惜民力欺朝廷使百姓虚被放免之恵蓋稅賦則所取少而有限收撮則所取多而無時今欲信朝廷寛恤之令寛百姓輸納之力除已立定課子合官私中分外餘宜一切禁止權發遣淮南兩路張成憲言還業之人稅額未定乞據實種頃畝權納課子五年並從之七年知揚州鼂公武言朝廷以沿淮荒殘未行租稅民復業與創户者雖阡陌相望懼後來稅重聞之官者十纔見一二昔晩唐民務稼穯則増其租故播種少呉越民墾荒田而不加稅故無曠土望詔兩淮更不増賦庶民知勸詔可二十年用正言章夏奏詔州縣收納二稅出剩數並附赤歴無得撥歸公使庫二十三年張守帥江西奏請蠲積欠預和買和糴上欲行之時秦檜為相方損度為月進且日虞四方財用之不至怒而不行是時兩浙州縣合納綿紬稅絹茶絹雜錢白米六色皆以市價折錢却别科米麥有一畝地納四五斗者京西根括隐田増添租米加重於舊湖南有土戸錢折絁錢醋息錢麴引錢名色不一曹泳為户部侍郎又責荆南已蠲口賦二十餘萬緡甚急檜晩年怒不可測而泳其親黨凶熖熾然蓋自檜再相密諭諸路暗增民稅七八嘗建言國家經費惟仰二稅間乞蠲免理宜禁絶雖經界之行或謂但求括摘漏稅亦無實恵及民故民力重困饑死者衆皆檜之為也紹興三年戸部言人戸抛棄田産已詔三年外許人請射十年内雖已請射及撥充職田者並聽理認歸業官司占田不還許越訴如孤幼兒女及親屬依例合得財産之人委守令面問來歴取索契照如無契照勾勒耆保隣佐照證得實即時給付或偽冒指占者論如律如州縣沮抑及奉行不䖍隱匿曉示委監司按治從之紹興二年工部侍郎李擢言平江府東南有逃田湖浸相連塍岸久廢歳失四萬三千餘斛乞招誘流民䟽導耕墾其不可即工者蠲其額又郡民之䧟虜者棄田三萬六千餘頃皆掌以舊佃户諸縣已立定租課許以二年歸業圭田瘠薄民以舊籍為病願除其不可耕之田損其已定過多之額後皆次第行之此經界張本也十二年左司員外郎李椿年言經界不正十害一侵耕失稅二推割不行三衙門及坊場戸虛供抵當四鄉司走弄稅名五詭名寄産六兵火後稅籍不實争訟日起七倚閣不實八州縣隱賦多公私俱困九豪猾戸自陳詭籍不實十逃田稅偏重人無肯售經界正則害可轉為利且言平江歳入昔七十萬斛有畸今按籍雖三十萬斛然實入纔二十萬斛耳詢之土人皆欺隱也望考按覈實自平江始然後施之天下則經界正而仁政行矣椿年嘗知寧國縣宣諭使劉大中薦其練習民事稽考稅額各有條理五年秋九月召對椿年奏州縣不治在不得人若於二稅稍加措置不至大䧟用度自足尋通判洪州屢遷浙東提舉八年春三月三省奏台州有匿名書稱椿年刻薄等事欲率衆作過上曰兵火以來官物多失䧟既差官檢察若稍留心便生誣毁此必州縣吏所為萬一作過當遣兵勦殺後卒無事至是乃建此議上謂宰執曰椿年之論頗有條理秦檜曰其說簡易可行程克俊曰比年百姓避役止緣經界不正行之乃公私之利翌日甲午以椿年為兩浙運副専委措置經界椿年條畫來上請先徃平江諸縣朱熹所謂先自其家田上量起者是也俟其就緒即往諸州要在均平為民除害更不増稅額如水鄉秋收後妄稱廢田者許人吿陂塘塍埂之壞於水者官借錢以修之縣令丞之才短者聽易置圖寫墟畝選官按覆令各戸各鄉造砧基簿仍示民以賞罰開諭禁防靡不周盡吏取財者論如法詔人戸田産多有契書而今來不上砧基簿者皆没官又詔州縣租稅簿籍令轉運司降様行下眞謹書寫如細小草書官吏各科罪其簿限一月改正有欺弊者依本法並用椿年請也初椿年置經界局於平江府守臣周葵問之曰公今欲均賦邪或遂增稅也椿年曰何敢增稅葵曰茍不欲増胡為言本州七十萬斛椿年曰當用圖經三十萬斛為凖倉部員外郎王循友言國家平昔漕江淮荆浙六路之粟六百二十餘萬加以和糴而近歳上供纔二百八十餘萬兩浙膏腴沃衍無不耕之土較之舊額亦虧五十萬石此蓋稅籍欺隱豪强詭挾所致比漕臣建議正經界朝廷從之望􅃯諸路漕臣各根檢稅籍十四年椿年權戸部侍郎仍舊措置經界十二月椿年以母憂罷兩浙運副王鈇權戸部措置經界十七年李椿年再權戸部侍郎專一措置經界自椿年去位有司稍罷其所施行者及是免喪還朝復言兩浙經界已畢者四十縣其未行處若止令人戸結甲慮形勢之家尚有欺隱乞依舊圖畫造簿本所差官覆實先了而民無爭訟者推賞弛慢不職者劾奏皆從之椿年又言已打量及用砧基簿計四十縣乞結絶其餘未打量及不曾用砧基簿止令結甲縣分欲展期一月許人戸首實昨已起新稅依額理納俟打量寛剰畝角即行均減更不増添稅額仍令都内人各書詣實狀遇有兩爭即對换産稅並詔可十九年詔汀漳泉三州據見今耕種田畝收納二稅未耕種者權行倚閣昉行經界法於諸路而劇盜何白旗擾汀漳諸郡故有是㫖然汀在深山窮谷中兵火之餘舊籍無有存者豪民漏稅常賦十失五六郡邑無以支吾於是計口科鹽大為民害是年冬十一月經界之事始畢初朝廷以淮東西京西湖北四路被邉姑仍其舊又漳汀泉三州未畢行明年詔瓊州萬安昌化吉陽軍海外土産瘠薄已免經界其稅額悉如舊又瀘南帥臣馮擑抗疏論不便於是瀘敘州長寧軍並免渠果州廣安軍既行亦復罷自餘諸路州縣皆次第有成二十一年詔臨江軍王伯淮代還言本州倚郭清江縣修徳鄉有稅錢四十餘貫苖米四百餘石人煙田産並在筠州高安縣祈豐鄉上項苖稅在經界法謂之窵佃在鄉村謂之包套經界既定兩縣隨産認稅於是清江有稅無田高安有田無稅清江不免以無田之稅増均於元額之田高安即以無稅之田減均於元額之稅是高安得偏輕之利清江得偏重之害矣謹按國朝淳化癸巳歳詔建臨江軍取筠之瀟灘鎮為清江縣割高安之建安修徳兩鄉𨽻之新豐與修徳接壤故有交鄉窵佃之弊乞究實改正詔委轉運盧奎措置受納稅限建炎四年右諌議大夫黎確言近歳貪吏至與専庫分利凡民戸自詣輸納夏稅和買縑帛等往往多端沮抑不堪留滯之苦則委之攬納之家而去民有倍稱之出官受濫惡之物詔物帛非紕踈濫惡官吏過有抑退者許越訴紹興三年詔江浙諸州縣帛及折帛錢並以七月中旬到行在不足者守貳竄黜用戸部請也四年右司諌劉大中言契勘租稅條限係五月半起催八月半納畢災傷放免不盡者限一月祖宗以來未之有改今戸部令七月終以前數足廹促太甚納畢者人户送納到官之期也起發數足者諸州團併起發到行在之期也且以道里逺近酌中言之吉州陸路到臨安二十八程水程陪之若依此則須五六月納足豈不大叚廹促今戸部不過以大禮賞格未足上動朝廷不知本部平時所管何事平時蠧耗未嘗講究平時失䧟未嘗稽考乃臨時畫㫖促限變亂祖宗舊制全不恤民夫祀所以為民祈福也廹取物帛反為民害有傷和氣有累聖徳詔展限一月二十五年戸部看詳令文思院造一石斛斗用火印下諸轉運司依式製造付州縣行用輸納庶免吏胥輕重其手重為民病紹興十三年臣僚言賦稅之輸止憑鈔旁為信穀以升帛以尺錢自一文以往必具四鈔受納親用團印曰戸鈔則付人戸收執曰縣鈔則闗縣司銷籍曰監鈔則納官掌之曰住鈔則倉庫藏之所以防偽冒備毁失也今所在監住二鈔廢不復用而縣司亦不即據鈔銷簿方且藏匿以要賂望申嚴法令戒監司郡守檢察受納官司凡戸縣監住四鈔皆存留以備互照從之二十二年詔諸縣人戸已納稅租鈔和預買紬絹之類同不即銷簿者當職官吏並科罪人戸齎出戸鈔不為照使抑令重納者以違制論不以赦原著為令紹興二十六年戸部言今年人戸畸零租稅欲今依法折納價錢如願與别戸合鈔送納本色者聽初秦檜畫㫖不得合零就整至是鍾世明權侍郎恐奉行抵捂擾民乃奏行之預借建炎四年上初自海道回蹕夏五月壬寅用江浙制置司隨軍轉運劉濛議於民間預借秋科苖米壬子御史沈與求奏罷之紹興五年詔預借民戸和買紬絹二分止輸見緡毋得抑納金銀每千除頭子錢外縻費毋過十文十九年詔禁止鎮江府預借苖米支移折變紹興二年左司諌吳表臣言諸州折變有至數倍者請今後並以中價細估詔違法漕憲各罰銅十斤三年詔婺州額上供羅並權折價錢以州人言每歳輸納兩數太重故也令二廣人户稅租合支移者量地里逺近遞無得過三百里四年起四川布估錢初成都崇慶府彭漢卭州永康軍六郡自天聖間官以三百錢市布一疋民甚便之後不復予錢至是宣撫司又令民間每疋輸估錢三引歳七十萬疋估錢二百餘萬引慶元初累減至一百三十餘萬引六年右諫議大夫趙霈言岳州自版籍不存不以田畝收稅惟種一石作七畝科敷而反覆紐折有至數十倍者詔本路憲臣體究改正十年明堂赦諸路州縣人户合納田稅免收頭子市利船脚等錢十一年臣僚言昨詔折帛錢以十分為率紬折二分絹折三分綿折五分所以寛民力也今州縣乃盡令折錢却抵價收買以取出剰民户積欠許逐年隨稅帶納今州縣乃一併督輸乞詔有司禁約十八年知蘄州吕延年代還言五季時江南李氏暴斂害民江西一路稅苖數外倍借三分以應軍須本朝官司名為沿納蓋謂事非創立特循沿李氏舊法也積歳既久又以此項錢米支移折變里巷之民怨聲猶在乞量與裁定仍將沿納錢米免支移折變二十八年右正言朱倬奏福建米斗折納八百有畸倍於廣右近饒州樂平縣亦科四百五十恐别郡承風有虧仁政欲依祖宗折科法合納初定實價耗費共不得過百錢非緊急無得折科從之孝宗淳熙三年劉邦翰林樞奏湖北州縣請佃官田未歸業人戸見耕田期以一年自陳分三限起稅不實許人告臣僚言人戸廣占官田量輸官賦似為過優此議者所以開陳告之門而欲從實起稅也不思朝廷往日經界獨兩淮京西湖北仍舊蓋以四路被邉土廣人稀誘之使耕猶懼不至若復履畝而稅孰肯逺從力耕以供上之賦哉今湖北惟鼎澧地接湖南墾田猶多自荆南安復岳鄂漢沔汙萊彌望猶昔戸口稀少且非土着皆江南狹鄉百姓老耄擕幼逺來請佃所籍田畝寛而稅賦輕也若立限陳首誘人告訐恐於公家無一毫之補而良民有無窮之擾矣且當誘以開耕不宜恐以増稅使田疇盡闢歳收滋廣一遇豐稔年歳以實邉則漕運所省亦博望依紹興十六年詔㫖以十分為率每年増額一分或不願開耕即許退佃期限稍寛取之有漸逺民安業一路幸甚浙西提舉顔師魯奏今鄉民間於閑曠磽确之地積日累月墾成田圍用力甚勤或未能以自陳起稅為人告首即以盜耕罪之給半充賞其何以勸力田者者上曰農民開墾曠土豈可以盜耕之法治之可止令打量起稅七年夏大旱知南康軍朱熹應詔上封事言今日民間特以稅重為害正緣二稅之入朝廷盡取以供軍州縣無復贏餘不免於二稅之外别作名色巧取今民貧賦重惟有覈兵籍廣屯田練民兵乃可以漸省列屯坐食之兵稍損州縣供軍之數使州縣事力漸舒然後可以禁其苛歛責其寛恤庶㡬窮困之民得保生業無流徙之患隆興元年詔應人戸抛下田屋如有歸者依舊主業已請佃者即時推還出二十年無人歸認依户絶法又詔貧乏下戸或因賦稅或因饑饉逃亡官司即時籍其田土致令不復歸業今州縣申嚴赦文五年之限應歸業者即給還受納稅限紹興三十二年詔州縣受納青苖官吏並緣多收加耗規圖濫數肆為奸欺虚印文鈔給與人戸民間相𫝊謂之白鈔方時艱虞用度未足欲減常賦而未能豈忍使貪贓之徒重為民蠧今後違犯官吏並坐重典仍没其家此孝宗即位初詔乾道七年修受納苖米縱吏乞取法受納官比犯人減一等州縣長官不覺察同罪淳熙四年執政奏往年諌官論州縣先期趣辦催科之弊而户部長貳執奏不行謂遞年四月五月合到行在折帛錢共六十一萬貫指擬支遣若不預催恐致缺課上曰既是違法病民朝廷須作措置安可置而不問次日奏戸部每年八月於南庫借六十萬緡應副支遣次年正月至三月撥還今若移此六十萬緡於四月上旬支借到戸部自無缺用可以禁止預催之弊上喜曰如此措置不過移後就前却得民力少寛於公私俱便乃詔諸路州縣並依條限催理二稅違者劾奏十三年趙汝愚守成都民當輸納使自槩量各持羡米去民甚便之淳熙十一年詔受納綿並依法夏稅重十二兩和買重十一兩毋得過行㨂擇如有紕踈糊藥合退者勿用油墨印違許越訴受納稅粮十二年臣僚言州郡取民無制其尤害民者改鈔一事也縣以新鈔輸之州州改為舊鈔以受之夫一歳止有一歳之財賦一政止有一政之財賦顧乃今歳所輸改以補去歳之虧甚者以補數歳之缺後政所輸改以償前政之欠甚者以償累政之欠而廣右有此弊而江浙此弊尤甚也伏乞禁戢州郡今後毋得改鈔詔付戸部光宗紹熙元年祕書監楊萬里上言民輸苖則以二斛輸一斛稅絹則正絹外有和買而官未嘗驗直又以絹估直而倍折其錢舊稅畝一錢輸免役一錢今歳増其額不知所止既一倍其粟數倍其錢而又有月茶錢板帳錢不知㡬倍於祖宗之舊又㡬倍於漢唐之制乎此猶東南之賦可知者也至於蜀賦之額外無名者不得而知也陛下欲薄賦歛當節用度而後財可積國可足然後賦可減民可富邦可寕不然臣未知其所終也時金主璟新立萬里迓使客於淮聞其蠲民間房園地基錢罷鄉村官酒坊減鹽價又除田租一年竊仁義以誑誘中原之民使虚譽逹於吾境故因轉對而有是奏臣僚言今州縣守令皆以財賦為先不以民事為意上供有常額而以出剩為能省限有定期而以先期為辦斛斗升合所以准租而對量加耗尺寸銖兩所以均稅而展取畸零不求羡餘之獻則為乾没之謀民財既竭民心亦怨饑寒廹之不去為盜者鮮矣紹興元年臣僚言諸路逃絶田産自經界以來今四十年未聞一丁一戸復業夏秋官課州責之縣縣責之保正長其為擾甚大鄉村父老謂當春時布種無一畝一角不耕之地望下諸路縣道勒令鄉胥指定逃田坐落就令見耕種人請佃輸官從之知漳州朱熹奏言經界最為民間莫大之利紹興已推行處圖籍尚存田稅可考貧富得實訴訟不繁公私兩便獨漳泉汀三州未行細民業去稅存不勝其苦而州縣坐失常賦日朘月削安可底止臣不敢先一身之勞佚而後一州之利病切獨任其必可行也然行之詳則足為一定之法行之畧則適滋他日之弊故必推擇官吏委任責成打量畝歩算計精確攢造圖帳費從官給隨産均稅特許過鄉通戸均紐庶㡬百里之内輕重齊同本州有産田有官田有職田有學田有常租課田名色不一稅租輕重亦各不同比來吏緣為姦實佃者或申逃閣無田者反遭俵寄今欲每田一畝隨九等高下定計産錢㡬文而總合一州諸色稅租錢米之數以産錢為母每一文納米㡬何只就一倉一庫受納既輸之後却照元額分𨽻為省計為職田為學糧為常平各撥入諸色倉庫除二稅簿外每三年鄉造一簿縣造都簿通載田畝産錢實數送州印押付縣收管民有交易對行批鑿則版圖一定而民業有經矣又有廢寺閒田為人侵占許本州召人承買不惟田業有歸亦免稅賦失䧟又合韓愈氏人其人廬其居之遺意但此法之行貧民下戸皆所深喜然不能自逹其情豪家猾吏實所不樂皆善為辭說以惑羣聽賢士大夫之喜安静厭紛擾者又或不深察而望風沮怯此則不能無虞今已仲秋向去農隙只有兩月乞即詔監司州郡施行又貽書宰輔云經界事講究巨細本末不敢不盡規畫措置十已八九蓋以本州田稅不均州縣既失經常之入至取所不應取之財以足歳計如縣科罰州賣鹽之𩔖是也上下莫能相正窮民受害有不忍聞若不經界實無措手先是漳泉二州被命相度而泉州操兩可之說朝廷疑焉著作郎黄艾輪對又言之且云今日以天下之大公卿百官之衆商量一經界累年而不成大於此者若之何上乃諭輔臣令先行於漳州明年春詔漕臣陳公亮同熹協力奉行南方地暖農務既興非其時也熹猶冀嗣歳可行益加講究每謂經界半年可了以半年之勞而革數百年之弊向後亦須五十年未壞合令四縣作四樓以貯簿籍州作一樓以貯四縣圖帳條畫既備徧榜郡境細民知其不擾而利於巳莫不鼓舞而貴家豪右占田隱稅侵漁貧弱者胥為異論以揺之至有進狀言不便者前詔遂格閲兩月熹請祠去尋命持湖南使者節猶以經界不行自劾議者惜之預借乾道三年知常州錢建入對奏縣今佐稅役鄉胥陪貼錢物至借貸稅戸暗銷官物洎監司州郡催督又貼大胥以緩之所以版曹財賦每每不足其患起於細微而所侵蠧甚大上然之淳熙十六年兩浙轉運使耿秉奏宜興縣預借今年明年折帛錢共三萬一千二百餘貫望與除豁詔令封樁庫照數支還㑹子付本縣理還今後再有預借并知通坐之又詔令南庫支還戸部所借江山縣折帛錢其諸縣預借並令各州措置補還庶絶其弊嘉定五年臣僚言預借非法也頑民豪戸易預借之名而以寄庫為說當催夏絹則曰有錢在官及督秋苗則曰未曽倒折所寄者一半而所逋者亦一半今預借之弊在在有之而江西特甚乞嚴切禁止預借之弊除而輸借之名正從之臣僚言四川州縣二稅積欠其弊在吏如去年預借今年秋科今年預借明年夏科有給鈔而不銷簿者有盜印鈔而匿財者有私立領而官不受理者有公吏攬取而不歸公上者一遇赦恩吏之罪釋然而民之憂如故乞下諸路遵守條約毋得預借詔制總兩司覺察四川宣撫虞允文言州縣預借人戸稅賦合於總領所樁管添造錢引三百萬貫委制總及漕臣考覈實數補填自今後預借官以違制論吏以盜論從之支移折變隆興三年太府少卿魯訔奏乞下戸部將折帛以疋計者為錢有㡬以尺計者為錢有㡬自來全折錢處依舊外餘丁鹽綿絹及下戸不成疋兩者盡折錢蓋零細者利於納錢端疋者利於納絹出産去處便於本色不出産去處便於折錢若以見價紐折其直必輕則折帛之弊可革請下諸路運司條約州縣劾其違者詔可又詔今後折帛銀並依左藏庫價折納不得輒有減降淳熙八年詔申嚴許從民便之制若願納本色州縣勒令折錢或願納價錢攬戸過數乞取許詣轉運司訴嘉泰三年知紹興府辛棄疾奏州縣害農之甚者六事如輸納歳計有餘又為折變高估趣納其一也往時有大吏為郡四年多取斗面米六十萬斛及錢百餘萬緡别貯之倉庫以欺朝廷曰用此錢糴此米還盜其錢而去願明詔内外臺察劾無赦從之嘉定三年江淮制置使黄度奏福州長溪縣去州七八百里苖米不能至州送納遂為攬戸高價售鈔縣又縱吏為姦請照紹興府新昌縣例明許折納縣以錢上之州州置場糴米從之其後諌議大夫鄭昭先奏福州苛取十一縣輸納之贏以補長溪折納之數是僅免長溪一邑䟦渉之勞而使十一縣陰受侵漁之害蓋米可無糴錢可無出而自足支遣望嚴行約束違者重坐之紹熙元年臣僚言古者賦租出於民之所有不强其所無如稅絹出於蠶苖米出於耕是也今一倍折而為錢再倍折而為銀銀愈貴錢愈艱得穀愈不可售使民賤糶而貴折則大熟之歳反為民害願明詔州郡凡多取而多折者重寘於罰從之慶元六年臣僚言折科太重名目不一州則増省額以敷於縣縣則増州額以敷於民反覆細折何啻三倍民困重斂莫此為甚詔戸部條約寧宗嘉定六年監察御史倪千里言民間常賦丈尺版籍自有定數今催科故存畸欠異日却遣畸零或欠零寸必納全尺此畸稅漏催之弊帛之尺寸米之合勺剗刷根括秋毫盡矣乃於既足之餘復有重催之害一追再追乞取浩瀚此文引乞覔之弊乞詔諸監司禁戢州縣措置更革奉行不䖍者劾治從之代輸隆興二年知贛州趙公稱收到寛剩錢十萬餘緡請為民代輸今年夏稅乾道二年知邵州李元老奏節省剩錢五十餘貫乞理納向後年分下戸稅賦淳熙五年知昭州王光祖將郡計餘剰為民送納夏料役錢知隆興府張子顔為八縣人戸代輸二稅舊欠知江陰軍林元奮將公使庫䟎到錢補足人戸所欠上供本色夏稅八年知泉州程大昌奏本州歳為台信等州代納上供銀二萬四千兩係常賦外白科苦民特甚蓋科取一害先期預借一害不給鈔或勒重納又一害臣已措畫為民代輸淳熙九年一年上供銀數齊足乞從今禁預借及不即給鈔者官吏並坐之許民越訴十二年知隆興府程叔達乞蠲淳熙十年未納苖稅其未納苖稅及上管分𨽻之數自行管認趙汝愚知太平州鄭僑知建寜府韓同卿知泰州曽㮚知婺州宇文紹彭知太平州任内俱撙節浮費將州用錢為下等人戸代輸并補還合郡積欠稅賦折帛等錢諌議大夫鄭昭先言諸路縣道抑令戸長代輸逃絶之戸往往破家詔申嚴禁戢畸零淳熙六年臨安府守臣呉淵言凖乾道令人戸納二稅每貫收朱墨錢二十文足不成貫者收十五文不成百者免收今自九百九十文至一百文例取十五文足顯有不均乞一百文收二文足毎一百増二文至七百文省即收十五文足委是利民且不衝改條令上曰畸零稅賦納錢不及一貫者皆貧民下戸所當矜恤乃從之文獻通考卷五
