body:
  text: 文獻通考卷二百五十八鄱陽馬端臨貴與著帝系考九公主唐堯二女長曰娥皇次曰女英以妻舜孟子舜尚見帝帝館甥於貳室亦饗舜迭為賔主尚上也舜上而見於帝堯也貳室副宫也堯舍舜於副宫而就饗其食堯之於舜使其子九男事之二女女焉百官牛羊倉廪備以養舜於􅅵畝之中商帝乙歸妹以祉元吉周武王以元女大姬配虞胡公而封之陳以備三恪詩何彼穠矣美王姬雖則王姬亦下嫁於諸侯車服不係其夫下王后一等猶執婦道以成肅雝之徳也下王后一等謂車乘厭翟服則褕翟為疏曰王后五輅以重翟為上厭翟次之六服褘衣上褕翟次之天子尊無二土故其女可下王后一等若諸侯之女下嫁則從其夫之爵何休云天子嫁女於諸侯備姪娣如諸侯禮皇甫謐云武王五男二女元女妻胡公王姬以為媵今何得適齊侯之子何休事未可據也何彼穠矣唐棣之華曷不肅雝王姬之車穠猶戎戎也厚貌唐棣栘也今之郁李王姬下嫁於諸侯車服之盛如此而不敢挾貴以驕其夫故見其車者知其能敬與和肅雝者王姬而曰王姬之車不敢指切之也唐棣之華華如桃李皆言王姬容色之盛羙也何彼穠矣華如桃李平王之孫齊侯之子武王女文王孫適齊侯之子言平王之孫齊侯之子其辭匹敵則不驕亢可知其釣維何維絲伊緡齊侯之子平王之孫絲之合而為綸猶男女合而為婚言侯子王孫宜為偶如合絲為綸魯莊公元年秋築王姬之館于外左氏傳為外禮也公在諒闇慮齊侯當親迎不忍便以禮接於朝又不敢逆王命故築舍於外齊强魯弱又委罪於彭生魯不能讎齊然喪制未畢故異其禮得禮之變公羊傳何以書譏爾築之禮也於外非禮也以言外知有築内之道也於外非禮也禮同姓本有主嫁女之道必闕地於夫人之下羣公子之上也時魯以将嫁女於讎國故築於外於外何以非禮據非内也築於外非禮也於逺辭也為營衛不固不以将嫁於讎國除譏也魯本自得以讎為辭無為受命而外之故曰非禮其築之何以禮據禮當預設主王姬者必為之改築主王姬者曷為必為之改築據諸侯宫非一於路寝則不可小寝則嫌皆所以逺别也羣公子之舍謂女公子也則以卑矣謂太卑也其道必為之改築者也以上傳言爾知當築夫人之下羣公子之上築例時榖梁傳築禮也於外非禮也外城外也築之為禮何也主王姬者必自公門出公門朝之外門主王姬者當設几席筵於宗廟以俟迎者故在宫門之内築王姬之館於廟則己尊於寝則己卑為之築節矣築之外變之正也築之外變之為正何也仇讎之人非所以接婚姻也縗麻非所以接弁冕也親迎服祭服重婚姻公時有桓之䘮其不言齊侯之來逆何也不使齊侯得與吾為禮也初學記昔堯女有娥皇女英舜妹有㪙手舜女有宵眀燭光易有帝乙歸妹周武王之女嫁於陳並未有封邑之號至周中葉天子嫁女於諸侯天子至尊不自主婚必使諸侯同姓者主之始謂之公主秦代因之亦曰公主漢制帝女為公主帝姊妹為長公主漢制皇女皆封縣公主儀服同藩王秦二世時十公主矺死於杜皆始皇女也漢制皇女皆稱縣公主師古曰天子不親主婚故謂之公主諸侯即自主婚故其女號翁主翁者父也儀服同列侯其尊崇者加號長公主儀服同藩王諸王女皆封鄉亭翁主儀服同鄉亭侯漢書謂齊厲王姊為紀翁主以紀氏所生因以為號以列侯尚公主王吉曰漢家列侯尚公主諸侯則國人承翁主使男事女夫詘於婦逆隂陽之位故多女亂諸公主家令門尉皆屬宗正又有主傅東方朔傳昭平君醉殺主傅師古曰傅母也中府東方朔傳館陶公主中府師古曰中府掌金帛之藏太上皇女昭哀后高帝姊初封宣夫人呂后七年尊曰昭哀后髙祖一女魯元公主宣平侯張敖尚之孝惠時齊悼惠王尊為魯元太后文帝二女館陶長公主竇后生女也文帝即位為館陶長公主師古曰年長故謂長公主堂邑侯陳午尚之見竇后傳昌平公主周勃太子勝之尚之見周勃傳景帝三女平陽公主王皇后長女本陽信長公主也為平陽侯曹壽所尚故稱平陽公主壽有惡疾上乃詔衞青尚平陽主見青傳南宫公主王皇后次女隆慮公主王后少女並見王皇后傳武帝五女鄂邑蓋長公主昭帝姊燕刺王傳云食邑鄂而為蓋侯妻也張晏云蓋侯王信師古曰信不取鄂主為妻當是信子頃侯充耳夷安公主隆慮公主子昭平君尚見東方朔傳衛長公主外戚傳云子夫生三女長主衛太子姊也帝以妻欒大見郊祀志諸邑公主五行志征和二年巫蠱事興帝女諸邑公主陽石公主皆下獄死陽石公主見上又武紀注云二公主皆衛皇后女宣帝二女館陶公主華偼伃女名施于定國子于永尙敬武公主張臨尚元帝令薛宣尚後王莽白太后賜藥死見宣傳元帝三女平都公主傅昭儀女平陽公主衛偼伃女見中山衛姬傳潁邑公主杜業尚西漢和蕃公主高帝罷平城歸是時冒頓單于兵彊控弦四十萬騎數苦北邊上患之以問婁敬敬曰陛下誠能以適長公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于冒頓在固為子婿死外孫為單于豈曾聞外孫敢與大父抗禮哉可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宫詐稱公主彼亦知不肯貴近無益也高帝曰善遣長公主呂后泣曰妾唯一太子一女柰何棄之匈奴上竟不能遣長公主而取家人子為公主妻單于使敬徃結和親約婁敬傳孝惠二年以宗室女為公主嫁匈奴單于本紀匈奴老上單于初立文帝復遣宗人女翁主為單于閼氏使宦者中行說傅翁主匈奴傳孝景五年遣公主嫁匈奴單于本紀孝武元封中烏孫昆莫使使獻馬願得尚漢公主為昆弟天子問羣臣議許曰必先納聘然後遣女烏孫以馬千匹聘漢遣江都王建女細君為公主以妻焉賜乘輿服御物為備官屬宦官侍御數百人贈送甚盛昆莫以為右夫人昆莫年老欲使其孫尚公主公主不聽上書言狀天子報從其國俗岑陬遂妻公主生一女少夭公主死漢復以楚王戊之孫觧憂為公主妻岑陬甘露三年楚公主上書言年老思土願得歸骸骨葬漢地天子憫而迎之公主與烏孫男女三人俱來至京師時年且七十賜田宅奴婢奉養甚厚朝見儀比公主西域傳元帝竟寧元年匈奴呼韓邪單于復入朝自言願婿漢氏以自親帝以後宫良家子王嬙字昭君賜單于單于驩喜昭君號寜胡閼氏生一男呼韓邪死株絫單于復妻王昭君生二女長女為須卜居次小女為當于居次居次者女之號若漢言公主也見匈奴傳後漢制同前漢其後安帝姊妹亦封之長公主同之皇女安帝姊妹清河孝王之女其皇女封公主者所生之子襲母封為列侯皆傳國於後鄉亭之封則不得傳襲永初元年鄧太后封清河孝王慶女十一人皆為郷公主分食邑俸諸公主置家令一人東觀書曰其主薨無子置傳一人守其家南頓君三女湖陽長公主黄新野公主元適鄧晨寧平長公主伯姬適李通世祖五女舞陽長公主義王適梁松􅄺陽長公主中禮適竇固館陶公主紅夫適韓光淯陽公主禮劉適郭璜酈邑公主綬一作綏適隂豐顯宗十一女獲嘉長公主姬適馮柱平陽公主奴適馮順隆慮公主迎或作延適耿襲平氏公主次不言所適史闕文後倣此沁水公主致適鄧乾平臯公主小姬適鄧蕃浚儀公主適王度武平公主惠適來稜魯陽公主臣樂平公主小迎成安公主小民肅宗三女武徳長公主男平邑公主王適馮由陰安公主吉和帝四女修武長公主保共邑公主成臨潁公主適賈建聞喜公主興順帝三女舞陽長公主生冠軍長公主成男汝陽長公主廣桓帝三女陽安長公主華延適伏全潁陽長公主堅陽翟長公主修靈帝一女萬年公主某魏制公主有家令僕丞行夜督郵太祖女清河長公主適夏侯楙金鄉公主適何晏文帝女東鄉公主明帝女平原懿公主早夭追封帝取甄皇后從孫黄之䘮與主合𦵏追封黄列侯以郭徳嗣黄後封平原侯襲公主爵齊長公主適李韜闕公主適任愷晉文帝女常山公主適王濟長廣公主適甄徳京兆公主武帝女滎陽公主適廬諶繁昌公主適衛宣襄城公主適王敦滎陽公主適盧恒平陽公主新豐公主平陽公主萬年公主武安公主惠帝女臨海公主適曹統河東公主始平公主哀獻皇女元帝女尋陽公主適王褘之江陵公主適荀羡眀帝女南康公主適桓溫南郡公主適羊賁廬陵公主適劉惔簡文帝女新安公主適王獻之孝武帝女晉陵公主適謝混鄱陽公主適王偃恭帝女海鹽公主富陽公主宋公主有傳令傳令不得朱服武帝女㑹稽宣長公主適徐逵之宣城徳公主適周嶠豫康長公主適徐喬吳興公主適王偃新安公主適王景深始安哀公主適褚湛之義興長公主吳郡公主文帝女東陽獻公主適王僧綽淮陽公主適江湛新蔡長公主適何邁潯陽公主適郄􅁮臨川長公主英媛適王藻南郡獻公主適褚淵廬江公主適褚澄孝武女山隂公主適何戢臨海公主適江斆安固公主適王志臨汝公主適何教安吉公主適蔡約山隂公主楚玉康樂公主修明皇女楚琇明帝女陽羡公主適王儉臨淮公主適王瑩晉陵公主伯姒建安長公主伯媛宋世諸主莫不嚴妬明帝每疾之湖熟令袁慆妻以妬賜死使近臣虞通之撰妬婦記左光禄大夫江湛孫斆當尚武帝女上乃使人為斆作表譲婚曰伏承詔㫖當以臨海公主降嬪榮出望表恩加典外顧審輶蔽伏用憂惶臣寒門悴族人凡質陋閭閻有對本隔天姻如臣素流家貧業寡年近将冠皆以有室荆釵布裙足得成禮每不自觧無偶迄兹媒訪莫尋素族弗問自惟門慶屢降公主天恩所覃庸及醜末懐憂抱惕慮不獲免徵命所當果膺兹舉雖門忝宗榮於臣非倖仰緣聖貸冒陳愚實自晉氏以來配尚王姬者雖累經羙胄極有名才至如王敦懾氣桓温斂威眞長佯愚以求免子敬灸足以違禍王偃無仲都之質而踝雪於北階何瑀闕龍工之姿而投軀於深井謝荘殆自害於矇叟殷仲㡬不免於强鉏彼數人者非無才意而勢屈於崇貴事隔於聞覽吞悲茹氣無所逃訴制勒甚於僕𨽻防閑過於婢妾行來出入人理之常當代賓客朋從之義而今掃轍息駕無闚門之期廢筵抽席絶接對之理非惟交友離異乃亦兄弟疎闊第令受酒肉之賜制以動静監子待錢帛之私節其言􅀏姆妳爭媚相勸以嚴尼媪競前相謟以急第令必凡庸下才監子皆葭萌愚竪議舉止則未閑是非聼言語則謬於虛實姆妳敢恃耆舊唯贊妬忌尼媪自唱多知務檢口舌其間又有應答問訊卜筮師母乃至殘餘飲食詰辨與誰衣被故敝必責頭領又出入之宜繁省難衷或進不獲前或入不聽出不入則嫌於欲疎求出則疑有别意召必以三晡為期遣必以日出為限夕不見晩魄朝不識曙星至於夜歩月而㺯琴晝拱袂而披卷一生之内與此長乖又聲影裁聞少婢奔迸裾袂向席則醜老叢來左右整刷以疑寵見嫌賔客未冠以少容致斥禮有列媵象有貫魚本無嫚嫡之嫌豈有輕婦之誚今義絶傍私䖍恭正匹而每事必言無儀適設辭輙云輕易臣又竊聞諸主聚集唯論夫族緩不足為急者法急則可為緩者師更相扇誘本其恒意不可貸借固實常辭或云野敗去或云人笑我雖云家事有甚王憲發口所言恒同科律王藻雖復彊佷頗經學渉戱笑之事遂為寃魄褚曖憂憤用致夭絶傷理害義難以具聞夫螽斯之徳實免克昌專妬之行有妨繁衍是以尚主之門往往絶嗣駙馬之身通離釁咎以臣凡弱何以克堪必将毁族淪門豈伊身𤯝前後嬰此其人雖衆然皆患彰遐邇事隔天朝故吞言咽理無敢論訴臣幸屬聖明矜照由道𢎞物以典處親以公臣之鄙懐可得自盡如臣門分世荷殊榮足守前基便預提拂清