body:
  text: 文獻通考卷三百四十八鄱陽馬端臨貴與著四裔考二十五沙陀沙陀西突厥别部䖏月種也始突厥東西部分治烏孫故地與䖏月䖏密雜居唐貞觀七年太宗以鼓纛立利邲咄陸可汗而族人歩真觖望謀并其弟彌射乃自立彌射懼率䖏月等入朝而歩真勢窮亦歸國其留者咄陸以射匱特勒刼越之子賀魯統之西突厥寖彊内相攻其大酋乙毗咄陸可汗建廷鏃曷山之西號北廷而䖏月等又𨽻屬之䖏月居金娑山之陽蒲類之東有大磧名沙陀故號沙陀突厥云咄陸冦伊州引二部兵圍天山安西都督郭孝恪撃走之㧞䖏月俟斤之城後乙毗可汗敗奔吐火羅賀魯来降詔拜瑤池都督徙其部廷州之莫賀城䖏月朱邪闕俟斤阿厥亦請内屬永徽初賀魯反而朱邪孤注亦殺招慰使連和引兵據牢山於是射脾俟斤沙陀那速不肯從髙宗以賀魯所領授之明年弓月道總管梁建方契苾何力引兵斬孤注俘九千人又明年廢瑶池都督府即處月地置金滿沙陀二州皆領都督賀魯亡安撫大使阿史那彌射次伊麗水而處月来歸乃置崑陵都䕶府統咄陸部以彌射為都䕶龍朔初以處月酋沙陀金山從武衞將軍薛仁貴討鐵勒授黒離軍討撃使長安二年進為金滿州都督累封張掖郡公金山死子輔國嗣先天初避吐蕃徙部北廷率其下入朝開元二年復領金滿州都督封其母䑕尼施為鄯國夫人輔國累爵永夀郡王死子骨咄支嗣天寳初囘紇内附以骨咄支兼回紇副都䕶從肅宗平安祿山拜特進驍衞上將軍死子盡忠嗣累遷金吾衞大將軍酒泉縣公至徳寳應間中國多故北庭西州閉不通朝奏使皆道出囘紇而虜多魚擷尤苦之雖沙陀之倚北廷者亦困其暴斂貞元中沙陀部七千帳附吐蕃與共冦北廷陷之吐蕃徙其部甘州以盡忠為軍大論吐蕃冦邉常以沙陀為前鋒乆之囘鶻取凉州吐蕃疑盡忠持兩端議徙沙陀於河外舉部愁恐盡忠與朱邪執冝謀曰我世為唐臣不幸陷汙今若走蕭關自歸不愈於絶種乎盡忠曰善元和三年悉衆三萬落循烏徳鞬山而東吐蕃追之行且戰旁洮水奏石門轉鬭不解部衆畧盡盡忠死之執冝裒瘢傷士裁二千騎七百雜畜橐駝千計欵靈州塞節度使范希朝以聞詔處其部鹽州置陰山府以執冝為府兵馬使沙陀素健鬭希朝欲藉以捍虜為市牛羊廣畜牧休飬之其童耄自鳯翔興元太原道歸者皆還其部盡忠弟葛勒阿波率殘部七百叩振武䧏授左武衞大將軍兼陰山府都督執冝朝長安賜金幣袍馬萬計授特進金吾衞將軍然議者以靈武廹吐蕃恐後反覆生變又濵邉益口則食翔價頃之希朝鎮太原因詔沙陀舉軍從之希朝乃料其勁騎千二百號沙陀軍置軍使而處餘衆於定㐮州執冝乃保神武川之黄花堆更號陰山北沙陀執冝以軍從討王承宗有功進蔚州刺史王鍔節度太原建言朱邪族孳熾散居北川恐啟野心願析其族𨽻諸州勢分易弱也遂建十府以處沙陀討呉元濟詔執冝𨽻光顔軍有功授檢校刑部尚書入朝留宿衞後授陰山府都督代北行營招撫使𨽻河東節度執冝死子赤心立節度使劉沔以沙陀撃囘鶻於殺胡山乆之伐潞誅劉稹俱從軍有功遷朔州刺史仍為代北軍使大中初吐蕃合党項囘鶻殘衆冦河西詔諸軍進討沙陀常深入赤心所向虜輙披靡始沙陀臣吐蕃其馳射趫悍過之虜倚其兵常苦邉及歸國吐蕃由此衰宣宗已復三州七關征西戍皆罷乃遷赤心蔚州刺史雲州守捉使龎勛亂以突騎從軍討平之進大同節度使賜姓李名國昌賜第京師後徙節振武進檢校司徒王仙芝陷荆㐮以突騎逐賊數有功乾符三年段文楚為代北水陸發運雲州防禦使時歳歉文楚朘損用度下皆怨邉校程懐信等與國昌子克用謀執文楚殺之據州以聞共丐以克用為大同防禦留後不許發諸道兵進捕諸道不甚力而黄巢方渡江朝廷度未能制乃赦之以國昌為大同軍防禦使國昌不受命詔河東節度使崔彦昭等討無功國昌與党項戰未决大同川吐渾赫連鐸襲振武盡取其貲械國昌窮挈騎五百還雲州州不納鐸遂取之克用轉側蔚朔間裒兵纔三千屯新城鐸引萬人圍之隧而攻三日不㧞鐸兵殺傷甚國昌自蔚州来鐸引去僖宗以鐸領大同節度俾討國昌六年詔昭義李鈞為北面招討使督潞太原兵屯代州幽州李可舉㑹鐸攻蔚州國昌以一隊當之克用分兵抵遮虜城拒鈞天大雪士瘒仆鈞衆潰還代州軍遂亂鈞死於兵廣明元年以李琢為蔚朔招討都統率兵數萬屯代州克用使傅文達調蔚朔兵朔州刺史髙文集縛以送琢琢進攻蔚國昌敗與克用舉宗奔北鐸密圖之克用得其計因豪傑大㑹馳射百歩外針芒木葉無不中部人大驚即倡言今黄巢北冦為中原患一日天子赦我願與公等南向定天下庸能終老沙磧哉巢攻潼關入京師詔河東監軍陳景思𤼵代北軍時沙陀都督李友金屯興唐軍薩葛首領米海萬安慶都督史敬存屯感義軍克用客塞下衆數千無所屬景思聞天子西乃與友金料騎五千人居絳兵擅劫帑自私還代州益募士三萬屯隴西士嚻縱友金不能制謀曰今合大衆不得威名宿將且無功吾兄司徒父子材而雄衆所推畏比得罪於朝僑戍北部不敢還今若詔之使將兵代北豪英一呼可集整行伍鼓而南賊不足平也景思曰善乃丐赦國昌使討賊贖罪有詔拜克用代州刺史忻代兵馬留後促本軍討賊克用募萬人趨代州詔克用還軍朔州義武節度使王處存河中節度使王重榮傳詔招克用同討巢克用喜即以衆三萬騎五千而南於是國昌守代州克用破巢賊収復京師功第一進同中書門下平章事隴西郡公國昌為代北節度使未㡬以克用領河東節度使光啟三年國昌卒昭宗即位封克用晋王後卒子存朂嗣討滅朱友貞復唐祚是為唐莊宗骨利幹骨利幹䖏瀚海北勝兵五千草多百合産良馬首似橐駝筋骼壯大日中馳數百里其地北距海去京師冣逺又北度海則晝長夜短日入烹羊胛熟東方已明盖近日入䖏也唐貞觀二十一年入朝詔以其地為元闕州其大酋俟斤因使者獻馬帝取其異者號十驥皆為美名厚禮其使龍朔中以元闕州更為余吾州𨽻瀚海都督府延載初亦来朝黠戞斯黠戞斯古堅昆國也地當伊吾之西焉耆北白山之旁或曰居勿曰結骨其種雜丁零乃匈奴西鄙也匈奴封漢降將李陵為右賢王衞律為丁零王後郅支單于破堅昆於時東距單于庭七千里南車師五千里郅支留都之故後世得其地者訛為結骨稍號紇骨亦曰紇扢斯云衆數十萬勝兵八萬直囘紇西北三千里南依貪漫山地夏沮洳冬積雪人皆長大赤髪晢面綠瞳以黑髪為不祥黑瞳者必曰陵苖裔也男少女多以環貫耳俗趫伉男子有勇黥其手女已嫁黥項雜居多滛佚謂歳首為茂師哀以三哀為一時以十二物紀年如歳在寅則曰虎年氣多寒雖大河亦半冰稼有禾粟大小麥青稞歩磑以為麵糜穄以三月種九月穫以飯以醸酒而無果蔬畜馬至壯大以善鬭者為頭馬有橐駝牛羊為多冨農至數千其獸有野馬骨咄黄羊羱羝鹿黑尾者似麞尾大而黑魚有蔑者長七八尺莫痕者無骨口出頥下鳥鴈鶩烏鵲鷹隼木松樺榆栁蒲松髙者仰射不能及顛而樺尤多有金鐡錫每雨後必得鐡號迦沙為兵絶犀利常以輸突厥其戰有弓矢旗幟其騎士析木為盾蔽股足又以圎盾傅肩可捍矢刃其君曰阿熱遂姓阿熱氏建一纛下皆尚赤餘以部落為之號服貴貂豽阿熱冬帽貂夏帽金釦鋭頂而卷末諸下皆帽白氈喜佩刀礪賤者衣皮不帽女衣毳毼錦蜀綾盖安西北廷大食所貿售也阿熱駐牙青山周柵代垣聫氈為帳號密的支它首領居小帳凡調兵部役屬者悉行内貂䑕青䑕為賦其官宰相都督軄使長史將軍達于六等宰相七都督三軄使十皆典兵長史十五將軍達于無員諸部食肉及馬酪惟阿熱設餅餌樂有笛鼔笙觱篥盤鈴戲有弄駝師子馬伎䋲伎祠神惟主水草祭無時呼巫為甘昏嫁納羊馬以聘冨者或百千計喪不剺面三環尸哭乃火之収其骨踰歳而為墓然後哭泣有節冬䖏室木皮為覆其文字言語與囘鶻正同法冣嚴臨陣橈奉使不稱妄議國若盗者皆斷首子為盗以首著父頸非死不脱阿熱牙至回鶻牙所橐駝四十日行使者道出天徳右二百里許抵西受降城北三百里許至鸊鵜泉泉西北至囘鶻牙千五百里許而有東西二道泉之北東道也回鶻牙北六百里得仙娥河河東北曰雪山地多水泉青山之東有水曰劒河偶艇以度水悉東北流經其國合而北入於海東至木馬突厥三部落曰都播彌列哥餓支其酋長皆為頡斤樺皮覆室多善馬俗乘木馬馳冰上以板藉足屋木支腋蹴輙百歩勢迅激夜鈔盗晝伏匿堅昆之人得以役屬之堅昆本彊國也地與突厥等突厥以女妻其酋豪東至骨利幹南吐蕃西南葛邏禄始𨽻薛延陀延陀以頡利發一人監國其酋長三人曰訖悉輩曰居沙波輩曰阿米輩共治其國未甞與中國通唐貞觀二十二年聞鐡勒等已入臣即遣使者獻方物其酋長俟利發失鉢屈阿棧身入朝以其地為堅昆府拜俟利發左屯衞大將軍即為都督𨽻燕然都䕶髙宗世再来朝景龍中獻方物元宗世四朝獻乾元中為囘紇所破自是不能通中國後狄語訛為黠戞斯盖囘鶻言若曰黄赤面云常與大食吐蕃葛禄相依仗吐蕃之往来者畏囘鶻剽鈔必住葛禄以待黠戞斯䕶送囘鶻授其君長阿熱官囘鶻稍衰阿熱即自稱可汗囘鶻遣師伐之不勝阿熱恃勝詬之囘鶻不能討其將句錄莫賀𨗳阿熱破殺囘鶻可汗諸特勒皆潰阿熱身自將焚其牙悉収寳貲并得太和公主遂徙牙牢山之南距囘鶻舊牙度馬行十五里阿熱以公主唐貴女遣使送衞還朝為囘鶻烏介可汗邀取之并殺使者㑹昌中復遣使上書言狀行三嵗至京師武宗大悦以其窮逺能修職貢班渤海使者上遣使持節臨慰其國詔宰相即鴻臚寺見使者使譯官考山川國風宰相李徳裕上言今黠戞斯大通中國冝如貞觀時為王㑹圗以示後世從之又詔阿熱著宗正屬籍是時烏介可汗餘衆託黑車子阿熱願乘秋馬肥撃取之表天子請師帝令給事中劉濛為廵邉使朝廷亦以河隴四鎮十八州乆淪戎狄幸囘鶻破弱吐蕃亂相殘齧可乘其衰乃以右散騎常侍李拭使黠戞斯冊君長為宗英雄武誠眀可汗未行而武宗崩宣宗嗣位欲如先帝意或謂黠戞斯小種不足與唐抗詔宰相與臺省四品以上官議皆曰囘鶻盛時有冊號今幸衰亡又加黠戞斯後且生患乃止至大中元年卒詔鴻臚卿李業持節冊黠戞斯為英武誠明可汗逮咸通間三来朝然卒不能取回鶻後之朝聘冊命史臣失傳僕骨僕骨亦曰僕固在多覽葛之東帳户三萬兵萬人地冣北俗梗驁難召率始臣突厥後附薛延陀滅其酋娑匐俟利發歌濫㧞延始内屬以其地為金微州拜歌濫抜延為右武衞大將軍州都督唐開元初為首領僕固所殺詣朔方降有司誅之子曰懐恩至徳時以功至朔方節度使葛邏祿葛邏祿本突厥諸族在北廷西北金山之西跨僕固振水包多怛嶺與車鼻部接有三族一謀落或為謀刺二熾俟或為婆匐三踏實力唐永徽初髙偘之伐車鼻可汗三族皆内屬顯慶二年以謀落部為陰山都督府熾俟部為大漠都督府踏實力部為元池都督府即用酋長為都督後分熾俟部置金附州三族當東西突厥間常視其興衰附叛不常也後稍南徙自號三姓葉䕶兵彊甘於鬭廷州以西諸突厥皆畏之開元初再來朝天寳時與囘紇㧞悉密共攻殺烏蘇米施可汗又與囘紇撃㧞悉密走其可汗阿史那施於北廷奔京師葛禄與九姓復立囘紇葉䕶所謂懐仁可汗者也於是葛祿之處烏徳犍山者臣囘紇在金山北廷者自立葉䕶嵗來朝乆之葉䕶頓毗伽縛突厥叛酋阿布思進封金山郡王天寳間凡五朝至徳後葛邏禄􅎊盛與囘紇争彊徙十姓可汗故地盡有碎葉怛邏斯諸城然限囘紇故朝㑹不能自達於朝駮馬駮馬其地近北海去京萬四千里經突厥大部落五所乃至焉有兵三萬人馬三十萬匹其國以俟斤統領與突厥不殊有弓箭刀矟傍排無宿衛隊仗不行賞賜其土境東西一月行南北五十日行土地嚴寒毎冬積雪樹木不沒者纔一二尺至暖消逐陽坡浦波反以馬及人挽犁種五榖好漁獵取魚鹿獺貂䑕等肉充食以其皮為衣少鐡噐用陶瓦釜及樺皮根為盤盌隨水草居止累木為井欄樺皮盖以為屋土牀草蓐如氈而寢處之草盡即移居無定所馬色並駮故以名云其馬不乘但取其乳酪充飡而已與結骨數相侵伐貌類結骨而言語不相通唐永徽中遣使朝賀突厥謂駮馬為曷剌亦名曷剌國鬼國鬼國在駮馬國西六十日行其國人夜逰晝隠身著渾剝鹿皮衣眼鼻耳與中國人相同口在頂上食用瓦噐土無米粟噉鹿豕及蛇駮馬國南三十日行至突騎施二十日行至鹽漠念鹽漠念咄六闕俟斤部落又北八日行至可史檐部落其駮馬鹽漠並無牛羊雜畜其婚姻嫁娶與突厥同土多松樺樹每年税貂獺青白二䑕皮以奉酋長杜氏通典傅奕曰西晋時匈奴諸部在太原離石其酋劉元海覆兩都執天子自是戎夷赫連氏沮渠氏李氏石氏慕容氏佛氏秃髪氏拓跋氏宇文氏髙氏苻氏吕氏姚氏翟氏相繼並興遞主中壤衣冠殄盡周齊每以騎戰驅夏人為肉籬詫丑亞反曰當剉漢狗飼馬刀刈漢狗頭不可刈草也劉石之徒寓居中夏禍福相恤中原之人衆心不齊故彼雖少而强我雖衆而弱也石季龍死羯胡大亂冉閔令胡人不願留者聴去或有留者乃誅之死者二十餘萬氐羌分散各還本部部至數萬故苻姚代興鮮卑既入中國而蠕蠕據其土後魏時蠕蠕主阿那瓌大餒求糧於魏魏帝使元孚賑恤之既飽遂冦暴及蠕蠕衰而突厥興自劉石至後周皆北狄種類相與婚姻髙氏娉蠕蠕女為妻宇文氏以突厥女為后北齊供突厥嵗十萬匹周氏傾國事之錦衣玉食長安者恒數千人可汗驕曰但使我在南二兒無患貧何憂哉周齊使於突厥遇其喪􅋇面如其國臣其為夷狄所屈辱也如是天冊萬嵗二年補闕薛謙光上疏曰臣聞中外不雜自古所誡邊人無信易動難安故斥居塞外不遷中國前史所稱其來乆矣然而帝徳廣被時有謁受向化之誠請納梯山之禮貢事畢則歸其父母之國導以指南之車此三王之盛典也自漢魏以來遂革其風務飾虚名徴求侍子喩其内徙使襲衣冠居室京師不令歸國此又中葉之故事也較其利害則三王是而漢魏非論其得失則備邉長而徴質短殷鑒在乎往代豈可不懐經逺之慮哉昔郭欽獻䇿於武皇江統納諫於恵主咸以為逺人徙内地必為變晋武不納二臣之逺䇿徒好慕化之虚名縱其習史漢等書官之以五部都尉此皆計之失也前事之不忘則後代之龜鏡此臣所以極言而不隐者也竊惟突厥吐蕃契丹等往因入貢並叨殊奬或執㦸丹墀冊名戎秩或曵裾庠序髙歩學門被服氈裘語兼中夏明習漢法覩衣冠之儀申覿朝章知經國之要窺成敗於圖史察安危於古今識邉塞之盈虚知山川之險易或委以經畧之功令其展效或矜其首邱之志放使歸蕃於國家雖有冠帶之名在邊方廣其縱横之智雖則慕化之美茍悦於當時狼子孤恩旋生於過後乃歸部落鮮不稱兵邉鄙罹災實由於此故老子云國之利噐不可以示人在於齊人猶不可以示之况於他族乎謹按楚申公巫臣奔晋而使於吳使其子狐庸為吳行人教吳戰陣使之叛楚吳於是伐楚取巢駕克棘入州來子反一嵗七奔命其所以能謀楚良以此也按漢桓帝遷五部匈奴於汾晋其後卒有劉石之難向使五部不徙則晋祚猶未可量也鮮卑不遷則慕容無中原之僭也又按漢史書陳湯云夫胡兵五而當漢一何者兵刃朴鈍弓弩不利今聞頗得漢工然猶三而當一由是言之利兵尚不可使匈奴得法况處之中國而使習見哉昔漢東平王請太史公書朝臣以為太史公書有戰國縱横之説不可以與諸侯此則内地諸王尚不可與况外國乎臣竊計秦并天下及劉項之際累載用兵人户凋散以晋恵方之當八王之䘮師則輕於楚漢之塗地匈奴冒頓之全實過於五部之微弱當曩時冒頓之强盛乘中國虚弊髙帝餒厄平城而冒頓不能入中國者何也非兵不足以侵諸夏力不足以破汾晋其所以解圍而縱髙祖者為不習中土之風不安中國之美生長磧漠之北以穹廬堅於城邑以氈罽美於章紱既安其所習而樂其所生是以無窺中國之心者為生不在漢故也豈有心不樂漢而欲深入者乎劉元海五部離散之餘而卒能自振於中國者為少居内地明習漢法非元海悦漢而漢亦悦之一朝背誕四方響應遂鄙單于之號竊帝王之寳賤沙漠而不居擁平陽而鼎峙者為居漢故也向使元海不内徙止當刼邉人繒綵麴蘖以歸陰山之北安能使王彌崔懿為其用邪當今皇風遐覃含識革面凡在虺性莫不懐馴方使由余効忠日磾盡節以臣愚見國家方傳無窮之祚於後脱備防不謹邉臣失圗則四郊多壘不在方外非所以肥中國削四裔經營萬葉之規貽厥孫謀之道也臣愚以為願充侍子者一皆禁絶必若先在中國者亦可更使歸蕃則彼皆保疆邉邑無事矣劉起居貺武指曰自昔議邉者推髙於嚴尤班固嚴尤議曰御匈奴自古無得上䇿者周時獫狁内侵命將征之盡境而還譬蚊䖟螫人驅之而已是為中䇿漢武輕賫深入連兵三十年中國罷耗匈奴亦尅是為下䇿秦築長城勤於轉輸疆境完而中國竭是為無䇿自古無得其上策者也其班固曰言匈奴者大要歸於兩科搢紳則守和親介胄則言征伐漢興以來有修文以和之有用武以尅之有卑下而承事之有威服而臣畜之和親之論發於劉敬天下新定故從其言賂遺以救安邉境孝恵髙后遵而不違匈奴加驕寇盗不止與通關市妻以漢女嵗賂千金無益之明驗也仲舒欲復守舊文厚結以財質愛子邉城不選武畧之臣修障隧備塞之具厲長㦸勁弩恃吾所以待冦而務賦歛於人逺行貨賂割剥百姓以奉冦讐信甘言守空約而冀胡馬不窺不亦過乎王莾時單于棄其愛子昧利不顧侵掠所獲嵗巨萬而和親賂遺不過千金安在其不棄質而失重利也匈奴之俗貪而好利叛服不常聖王特羇縻之不與約誓不就攻伐約之則費賂而見欺攻之則勞師而招冦外而不内踈而不親政教不及其人正􅃋不加其國來則懲而禦之去則備而守之慕義則接之以禮讓使曲在彼盖聖主禦蠻夷之常道也貺以為嚴尤之議辯而未詳班固之論詳而未盡推而為言周得上䇿秦得其中漢無䇿焉何以言之荒服之外聲教所逺其叛也不為之勞師其降也不為之釋備嚴其守禦險其走集犯塞則有執訊之㨗深入則有殪戎之勲俾其欲為冦而不能願臣妾而不得斯御戎之上䇿禁暴之良算恵此中夏以綏四方周人之道也貺故曰周得上䇿易稱王侯設險以固其國築長城修障塞易之設險也今􅃋塞上多古長城未知起自何代七國分争國有長城趙簡子起長城以備胡燕秦亦䇿長城以限中外則長城之作其來逺矣秦兼天下益理城壍城全國滅人歸咎焉自漢至隋因其成業或修或築無代無之後魏時築長城議曰虜騎輕㨗風來電往塢壁未遑閉牛羊不暇收雷撃至於近郊雲飛出於塞表不得不立長城以備之人築一歩千里之地役三萬人不有旬􅃋之勞安獲乆長之逸始皇斥中國之戎出諸塞表匈奴不敢南下而牧馬戰士不敢彎弓而報怨貺故曰秦得中䇿史稱劉敬説髙祖以魯元公主嫁匈奴嗣王則漢之外孫豈敢與大父争哉假立宗女匈奴不信無益也帝欲遣魯元后泣諫曰帝惟一女奈何棄之匈奴乎由是遣宗女行又按魯元公主則趙王張敖之后也告趙王反吕后言趙王以公主故不冝有此髙祖曰使張敖有天下豈少乃女乎髙祖審魯元不能止趙王之謀而謂能息匈奴之叛邪假有欲遣之辭固戲言耳且冒頓手刃頭曼躬射其母而冀其不與外祖争强豈不惑哉然則髙祖之和親不能久安而為之者以天下初定茍紓嵗月之禍以息兆人之勤耳而天姿豁達不矜智能沉謀内斷衆莫之識武帝時中國康寜胡冦益鮮踈而絶之此其時也方更糜耗華夏連兵積年嚴尤以為下䇿可矣而漢之失䇿非止用兵至於昭宣武士練習斥候精審胡入則覆亡居又畏逼收迹逺徙窮竄海陰朝廷不遵宗周之故事乃襲奉春之過舉啓寵納侮傾竭府藏給西北方無慮嵗二億七十萬賞賜之費傳送之勞尚不計焉皇室淑女嬪於穹廬掖庭良人降於沙漠夫貢子女方物臣僕之職也詩曰莫敢不來享莫敢不來王傳稱荒服者來王此皆稱其來不言當往也把用夷禮經貶其爵公及吳盟諱而不書奈何以天子之尊與匈奴約為兄弟帝女之號與胡媪並為戎妻媪烏老反烝母報子從其汚俗中國之異於蠻夷者以有父子男女之别也若乃位配天地職調陰陽不能革聾昧之性使漸習華風反令婉冶之姿毁節異類其為垢辱可勝道哉漢之君臣常莫之恥東漢至曹馬招來羌狄内之塞垣資奉所費有踰於昔百人之酋千口之長金印紫綬食王侯之俸者相半於朝牧馬之童乘羊之𨽻齎毳毼之資邀綾紈之利者相錯於路九州五服耒耨之所利絲枲之所生方三千里植於三千里之中散於數萬里之外人焉得不勞國焉得不貧胡夷嵗驕華夏日戲當其强也又竭人力以征之其服也又如是以飬之病則受飬强則内攻嗚呼中國為羌胡服役且千載而莫之恤可不大悲哉為政者誠能移其財以賞戌卒則我人冨矣移其爵以餌守臣則我將良矣冨利歸於我危亡移於彼無納女之辱無傳送之勞此之不為而棄同即異與頑用嚚以夷亂華以裔謀夏變上國之風俗汨中和之正氣貺故曰漢無䇿焉嚴尤深以古無上䇿者為不能臣妾也聖王誠能之而不用耳稱秦氏無䇿者謂其攘狄而亡國也秦亡之咎非攘狄也稱漢代得下䇿者謂伐胡而人病人既病矣又役人而奉之是無䇿也貺故曰嚴尤之議辯而未詳者也班固之論頗究其情而曰其來慕義接以禮譲使曲在彼是未盡也何者禮譲以交君子不以接小人况於禽獸盜賊乎夫竒貨内來即華夏之情蕩纎麗外散則戎羯之心生華夏情蕩出兵之源也戎羯心生侵盗之本也聖人唯此之慎不貴竒貨不寳逺物禽獸非其土性不育噐服非其所産不御豈惟贄幣不通哉至於飲食聲樂不與共之故四裔來朝坐之門外使舌人體委以食之若禽獸然不使知馨香嘉味也獲其聲不列於庭廟受其貢不過楛矢獸皮不為贄幣不為財貨利既小矣酬亦冝然漢氏習玩驕虜使悦燕趙之名倡雅質甘太官之八珍六齊便五都之文綺羅紈供之則長欲而増求絶之則滅徳而招怨加以斥候不明士卒不習是猶飽豺狼以食肉而縱其獵噬疲人求其禍源接以禮讓之所致也故通貢獻則去錦繢而得毛革討負約則獲犬馬而喪士人許和親則毁禮義而順戎俗張騫使西域得摩訶兠勒曲漢武採之以為鼓吹東漢魏晋樂則胡笛箜篌御則胡牀食則羌炙貊炙噐則蠻盤祠則胡天晋末五胡逓居中夏豈無天道亦人事使之然也華人歩卒也利險阻虜人騎兵也利平地彼利馳突我則堅守無與追奔無與競逐來則杜險使無進去則閉險使無還衝以長㦸臨以强弩非求勝之也創之而已措彼頑凶寘之度外譬諸烏鵠淄素各殊如是何禮讓之接何曲直之争哉貺故曰班固之論詳而未盡者也四夷之猾夏尚矣明達之士論備邊之要無代無之國朝有房司空上書諫伐髙麗云比來犯罪死囚每令三覆重惜人命至此而億萬吏卒無一罪戾委之鋒刃實為寃酷薛補闕上書諫諸蕃侍子久在京師恐其知邉塞盈虚險易悦華夏服翫聲色或窺圗籍兼達古今如有劉元海之徒終成大憝劉起居武指云秦逐戎狄出塞限隔華夷是為中䇿三賢所陳可謂篤論言詳理切度越前古斯仰歎不暇豈敢繁述耳文獻通考卷三百四十八
