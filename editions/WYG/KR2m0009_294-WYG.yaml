元年八月壬申東北方有赤氣四年三月辛亥白虹貫日京房易𫝊曰蜺日旁氣也白蜺雙出日中兹謂擅陽五月壬子赤雲亘天中又有白氣十餘道貫之如練起於紫微垣犯北斗及文昌由東南而散占兵大起又所向兵至宫中有喪紹興元年二月己巳白氣亘天占有暴兵七年十一月癸夘有赤雲如火隨日入八年二月辛巳日中有白虹亘天九月甲申正北方有赤氣如火影二十七年二月乙酉赤氣出紫微垣壬寅白虹貫日三十年二月壬申西北方正北方東北方一帶約五處赤氣如火影十一月甲午西南方白氣由尾宿歴壁宿婁宿􅄧宿止十二月戊申夜白氣出尾宿歴心房氐亢角宿入天市貫太微至郎位止有類天漢白氣主兵眀年虜亮大入冦辛酉曲虹見日之西占曰虹蜺陰陽交錯之氣曲虹冬見異之尤甚也三十一年十二月辛丑白氣自斗歴牛女虚孝宗隆興元年十二月壬午白氣自危宿歴室壁婁胃􅄧宿二年正月甲寅白氣自壁宿歴奎婁􅄧畢觜參乾道元年正月庚午夜白氣出奎漸上經婁胃􅄧貫畢入參占主殺伐主邊城三月戊辰夜白氣自參宿至角宿與天漢相接其白氣約廣七丈已来占有暴兵四月丁酉夜蒼白氣自西北漸上東北入天市垣辛丑入北斗魁中乙巳入紫微垣内至天極天樞中十一月丙寅白氣出女歴虚危室壁上奎婁胃􅄧宿十二月庚午白氣亘天三年十月丙申虹出非時四年三月己丑四方皆昏濛若下塵占名曰霾語云天地霾君臣乖五年正月甲申昏霧四塞又曰黄霧六年十月庚午赤氣隨日出占氣如火隨日出者軍行有兵憂十一月丁丑赤氣隨日入占有告急者或檄天下召兵不行七年六月壬寅十月戊午赤氣隨日出八年十月乙巳赤氣隨日入丙午赤氣隨日出占君側有佞臣九年十月壬申日出前東方并日入後西方有雲氣若煙非煙若雲非雲青赤黄三色光潤占凡氣有三色名曰矞雲矞雲見則國有慶乃人君脩徳而致淳熙元年十月戊寅東北方生曲虹見日之東二年十月庚辰東南方生青赤黄蟩虹虹生非時三年八月丁酉赤氣隨日沒戊戌赤氣隨日出五年十月丁巳曲虹見日之東十年正月戊子西南有白氣如天漢而眀南北廣六丈東西亘天占有兵起十四年十一月甲寅赤氣隨日入光宗紹熈四年十一月甲戌夜赤雲白雲見占赤雲如火影見者如疋帛天下多兵五年六月壬寅白氣如帶道亘天己酉亦然喪之象也於是孝宗崩寧宗受禪寧宗慶元元年正月丙辰白虹貫日四年八月庚辰赤氣如帶亘天占有暴兵五年二月癸酉夜白氣如帶道亘天嘉泰三年七月壬午白虹貫日四年二月庚申赤氣亘天次月臨安大火迫近太廟十一月虹生非時壬申白氣如帶道亘天占有暴兵嘉定六年十月乙夘有赤氣隨日出十一月辛夘有赤氣隨日入十一年二月丙辰白虹貫日宋中興天文志曰書星變而至於蟩虹雷電非時塵霧雲氣雜見必書何也凡皆氣也張自眀曰一元肇判分陰分陽輕清為天重濁為地逆生五行順布五氣故五氣之㑹其精秀靈明者為日為月為星為河漢五氣之散颺而為風和而為雨鬱而為霧結而為雲舒而為霞凝而為露肅而為霜冽而為雪戰而為雹擊而為雷爍而為電駁而為虹其變十有二無非氣也而是氣之忽合忽分又各有形有象殆不可徧舉其為災為祥亦㦯有應有不應或應焉而人莫之知也然而推歩宿曜之道度分畫垣舍之名數覘象色之所見驗躔分之攸属參之於璣衡候之於晷漏探應感於精祲求形驗於事情以考以告以戒以勸以慮以備占其有益於人國太史遷曰孔子六經紀異而說不書至於天道不𫝊𫝊其人不待告告非其人雖言不著有味其言哉所志者占云文獻通考卷二百九十四
