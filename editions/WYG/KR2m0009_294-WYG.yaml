body:
  text: 文獻通考卷二百九十四鄱陽馬端臨貴與著象緯考十七瑞星漢武帝元封元年望氣王朔言候獨見鎮星出如𤓰食頃復入有司皆曰陛下建漢家封禪天其報徳星云徳星即鎮星也言天以徳星報帝晉孝武太元二年七月己卯老人星見三年七月乙酉老人星見南方十月丁巳老人星見梁武帝天監四年八月庚子老人星見占曰老人星見主夀昌自是每年恒以秋分後見於參南至秋分而伏武帝夀考之象云宋太祖皇帝開寶四年八月辛夘景星見真宗景徳三年四月戊寅周伯星出氐南騎官西一度狀半月有芒角煌煌然可以鍳物歴庫樓東八月隨天輪入濁十一月復見在氐自是常以十一月晨見東南方八月西南入濁占曰天下無兵國大昌又氐為露寝即天子正寝也大中祥符七年正月己酉含譽星見其年九月丙戌又見似彗有尾而不長與周伯星同占太祖朝夀星見乾德三年八月辛酉四年八月乙夘六年正月戊申開寶二年七月乙亥太宗朝夀星見太平興國四年八月乙亥五年八月己夘六年八月己夘八年八月辛夘雍熈三年八月己酉四年八月辛亥端拱元年八月乙夘二年八月癸亥淳化元年八月丁夘二年八月辛未三年八月戊寅四年九月己亥五年八月己丑至道元年八月己亥二年閏七月己亥三年八月辛丑真宗朝夀星見咸平元年八月癸丑二年八月癸亥三年八月丁夘四年八月甲子五年八月乙丑六年八月丙子景徳元年八月癸酉二年八月庚辰三年八月庚寅四年二月己夘八月甲午大中祥符元年正月丁亥八月丙申二年二月壬辰八月乙巳三年二月辛巳八月己酉四年正月戊寅八月癸丑五年正月辛巳八月己未六年五月庚子八月丙寅七年正月癸丑八月己巳八年七月癸酉九年正月甲寅八月壬午天禧元年八月癸巳二年正月丁巳八月辛夘五年二月辛夘八月己亥四年八月己亥五年二月丙午八月乙巳皆出於丙仁宗朝夀星見天聖元年二月己亥二年八月丙子四年七月壬申景祐二年正月己丑至和三年二月辛夘八月己未嘉祐二年八月庚申三年八月丙辰四年正月庚戌八月癸未五年八月庚午六年正月癸丑八月壬辰七年正月辛亥八年正月辛酉英宗朝夀星見治平元年二月己丑七月癸巳二年二月癸巳八月己亥三年正月庚辰八月庚戌神宗朝老人星見治平四年二月癸巳八月戊申熈寧元年正月乙未八月己夘二年二月乙夘八月壬戌三年正月甲寅八月癸酉四年二月己未八月丁丑五年二月己未閏七月乙亥六年正月庚午八月丁酉七年二月甲申八月庚寅八年二月己丑八月庚戌九年二月丁酉八月庚子十年正月己夘九月戊申元豐元年二月己酉八月丙午二年二月壬戌八月乙夘三年二月甲寅八月己未四年八月丁夘五年二月甲戌八月己巳六年二月己未八月丁丑七年二月辛巳八月己夘八年二月庚辰八月辛巳哲宗朝老人星見元祐元年二月戊寅八月庚子二年二月庚寅九月辛亥三年二月癸巳八月己亥四年二月壬子八月丁未五年正月甲午八月辛亥六年二月己亥閏八月壬戌七年正月壬子八月壬戌八年二月丙寅八月己巳九年二月乙丑紹聖元年八月庚子二年二月壬午八月丁丑三年二月庚午八月癸未四年二月甲申八月甲申五年二月庚辰元符元年八月辛夘二年二月乙未九月壬辰徽宗朝老人星見崇寧元年二月壬寅八月癸丑二年二月甲寅八月庚戌三年二月戊午八月辛酉四年二月庚申八月丙寅五年二月戊辰八月甲戌大觀元年二月乙亥八月丁丑二年二月甲午八月壬午三年二月戊子八月癸巳四年二月乙未閏八月丁酉政和元年二月癸夘八月己亥二年二月乙巳八月己酉三年二月甲午八月己未四年二月己酉八月辛未五年二月庚申八月甲子六年閏正月壬戌八月丁夘七年五月戊午八月丙子八年二月壬申八月乙亥宣和元年二月癸未八月癸未二年二月辛巳八月己丑三年二月丙戌八月癸巳四年二月己亥八月辛丑五年二月庚子八月丙午六年二月戊申八月辛亥七年二月癸丑八月庚申皆見於丙主人君夀昌天下安寧賢士進用自太平興國以来星見必賀至熈寧四年詔罷賀禮客星漢武帝元光元年六月客星見於房占曰為兵起其二年十一月單于將十萬騎入武州漢遣兵三十餘萬以待之昭帝元鳯四年九月客星在紫宮中斗樞極間占曰為兵其五年六月發三輔郡國少年詣北軍宣帝地節元年六月戊戌甲夜客星居左右角間東南指長可二尺色白占曰有姦人在宮庭間其丙寅又有客星見貫索東北南行至七月癸酉夜入天市芒炎東南指其色白占曰有戮卿一曰有戮王期皆一年逺二年是時楚王延夀謀逆自殺四年霍氏謀反誅黃龍元年三月客星居王良東北可九尺長丈餘西指出閣道間至紫宫其十二月宫車晏駕元帝初元元年四月客星大如𤓰色青白在南斗第二星東可四尺占曰為水饑其五月渤海水大溢六月關東大饑民多餓死瑯琊郡人相食二年五月客星見􅄧分居卷舌東可五尺青白色炎長三寸占曰天下有妄言者其十二月鉅鹿郡尉謝君男詐為神人論死父免官孟康曰姓謝名君男者兒也不記其名直言男耳後漢光武建武三十一年十月有客星熖二尺許西南行至眀年二月二十二日在輿鬼東北六尺所滅凡見百一十三日輿鬼尸星主死亡客星居之為死喪後二年光武崩按漢書嚴光𫝊帝即位思光召之至京入宫論道舊故因共偃卧光以足加帝腹明日太史奏客星犯御座甚急帝笑曰朕故人嚴子陵共卧耳通鑑載徵光事在建武五年然史志五年不言客星之事云孝明永平四年八月辛酉客星出梗河西北指貫索七十日去梗河為胡兵至五年北匈奴七千騎入五原雲中貫索貴人之牢其十二月陵鄉侯梁松坐怨望誹謗下獄死七年三月庚戌客星光氣二尺所在太微左執法南端門外凡見七十五日八年十二月戊子客星出東方九年正月戊申客星出牽牛長八尺歴建星至房南滅見至五十日牽牛主吴越房星為宋後廣陵王􅍮楚王英謀逆事覺自殺廣陵属吴彭城古宋地十三年十一月客星出軒轅四十八日十四年正月戊子客星出􅄧六十日在軒轅右角稍滅􅄧主邊兵後一年漢遣竇固耿秉等將兵擊匈奴一曰軒轅右角為貴相􅄧為獄事時考楚事未竟司徒虞延坐與楚王英交通自殺孝章元和元年四月丁巳客星晨出東方在胃八度長三尺歴閣道入紫宫留四十日滅閣道紫宫天子之宫也客星犯入留久為大喪後四年帝崩孝和永元十三年十一月乙丑軒轅第四星間有小客星色青黃軒轅為後宫星出之為失勢其十四年六月陰皇后廢十六年四月戊午客星出紫宫西行至昴五月滅􅄧為趙後一年和帝崩又一年殤帝崩無嗣太后遣迎清河孝王子即位是為安帝清河趙地是其應也孝安永初元年八月戊申客星在東井弧星西南占為大水是歳郡國四十一縣三百一十五雨水四瀆溢傷稼壞城郭殺人民三年六月甲子客星大如李蒼白芒氣長二尺西南指上階星指上階為三公後太尉張敏免官元初二年十一月甲午客星見西方己亥在虚危南至胃􅄧郗萌曰客星入虚大人當之又曰客星守危强臣執國命在后族又且大風有危敗黄帝星經曰客星入守若出危大饑民食貴延光三年十一月客星見天市占為貴人喪四年帝崩孝順永建六年十二月壬申客星芒氣長二尺餘西南指色蒼白在牽牛六度客星芒氣白為兵牽牛為吴越後一年㑹稽海賊曽於等殺長吏拘奪吏民揚州六郡逆賊章何等稱將軍犯四十九縣大攻畧吏民陽嘉元年閏月戊子客星氣白廣二尺長五丈起天苑西南主馬牛為外軍色白為兵是時燉煌太守徐白使疏勒王盤等兵二萬人入于闐界虜掠斬首三百餘級烏桓校尉耿曅使烏桓親漢都尉戎末瘣等出塞鈔鮮卑斬首獲生口財物鮮卑怨恨鈔遼東代郡殺傷吏民是後西戎北狄為寇害以馬牛起兵馬牛亦死傷於兵中至十餘年乃息孝靈光和五年六月丁夘客星如三升椀出貫索西南行入天市至尾而消占曰天市為貴人喪明年宫車晏駕中平二年十月癸亥客星出南門中大如筳五色喜怒稍小至後年六月消占曰為兵至六年司𨽻校尉袁紹誅滅中宫大將軍部曲吴匡攻殺車騎将軍何苗死者數千人魏文帝皇初三年九月甲辰客星見太微左掖門内占曰客星出太微國有兵喪十月帝南征孫權是後累有征役明帝景初二年十月癸巳客星見危逆行在離宫北騰蛇南甲辰犯宗星己酉滅占曰客星所出有兵喪虚危為宗廟又為墳墓客星近離宫則宫中将有大喪就先君於宗廟之象也三年正月帝崩高貴鄉公甘露四年十月丁丑客星見太微中轉東南行歴軫宿積七日滅占曰客星出太微有兵喪景元元年帝為成濟所弑晉惠帝永興元年五月客星守畢占曰天子絶嗣一曰大臣有誅時諸王擁兵其後惠帝失統終無繼嗣海西公太和四年二月客星見紫宫西垣至七月乃滅占曰客星守紫宫臣弑主六年桓温廢帝孝武太元十一年三月客星在南斗至六月乃沒占曰有兵有赦是後司雍兖冀常有兵役十二年正月大赦八月又大赦十八年二月客星在尾中至九月乃滅占曰燕有兵喪二十年慕容垂伐魏為所破死者數萬人二十一年垂死國遂衰亡安帝元興元年十月有客星色白如粉絮在太微西至十二月入太微占曰兵入天子庭二年十二月桓元簒位放遷帝后於潯陽三年二月劉裕盡誅桓氏宋文帝元嘉十九年客星在北斗化為彗詳見彗門陳廢帝光大二年六月壬子客星見氐東周武帝保定元年九月丁巳客星見於翼天和三年七月己未客星見房心白如粉絮大如斗漸大東行八月入天市長如匹所復東行犯河鼓右將癸未犯匏𤓰又入室犯離宫九月壬寅入奎稍小壬戌至婁北一尺所滅凡六十九日占曰兵起若有喪白衣㑹為饑旱國易政又曰兵犯外城大臣誅建徳三年二月戊午客星大如桃青白色出五車東南三尺所漸東行稍長二尺所至四月壬辰入文昌丁未入北斗魁中後出魁漸小凡見九十三日占曰天下兵起車騎滿野人主有憂又曰天下亂兵大起臣謀主其七月衛王直舉兵反討禽之十月始州民王鞅擁衆反討平之唐文宗太和三年十月客星見於水位開成二年三月甲申客星出於東井下戊子客星别出於端門内近屏星四月丙午東井下客星沒五月癸酉端門内客星沒壬午客星如孛在南斗天籥旁昭宗乾寧三年有客星三一大二小在虚危間乍合乍離相隨東行状如鬭經三日而二小星沒其大星後沒虚危齊分也光化三年正月客星出於中垣宦者旁大如桃光炎射宦者宦者不見天復二年正月客星如桃在紫宫華盖下漸行至御史丁夘有流星起文昌抵客星客星不動己巳客星在杠守之至眀年猶不去占将相出兵梁太祖乾化元年五月客星犯帝座宋太祖建隆二年十二月己酉客星出天市垣宗人星東微有芒彗三年十二月辛未西南行入氐宿二月癸丑至七星沒太宗太平興國八年二月甲辰客星出太微垣端門東近屏星北行占曰主弼臣失禮免端拱二年七月丁亥客星出北河星西北稍暗微有芒彗指西南淳化元年正月辛巳客星出軫宿逆行至張七十日經四十度乃不見占云有土功又云有使来真宗景徳二年八月甲辰客星出紫微天棓側孛孛然如粉絮稍入垣内歴御女華盖凡十一日沒占曰后妃災踰年荘穆皇后崩三年三月乙巳客星出東南方大中祥符四年正月丁丑客星見南斗魁前占曰有赦令其年親祀汾隂后土大赦天禧五年四月丙辰客星出軒轅前星西北大如桃速行經軒轅大星入太微垣掩右執法犯次將歴屏星西北凡七十五日入濁沒占曰周雒之分大臣憂仁宗眀道元年六月乙巳客星出東北方近濁如木星太微有芒彗至丁巳凡十三日而沒至和元年五月己丑客星出天關東南可數寸歳餘消沒神宗熈寧二年六月丙辰客星出箕度中至七月丁夘犯箕乃散主民饑大臣有見棄者㦯大水河溢船行平地三年十一月丁未客星出天囷主倉庫憂火災哲宗元祐六年十一月辛亥客星出參度中犯掩厠星主有暴兵米貴晉分兵災壬子犯九斿星十二月癸酉入奎至七年三月辛亥乃散主邊兵動高宗紹興八年五月客星守婁魯分也敵将悟室占之太史曰無傷至七月敵殺魯兖滕虞等二十一王敵亦應天象也九年客星守亢亢陳分也九月敵将悟室被誅悟室封陳王云八年六月己巳客星出奎宿犯𫝊舍占客星亦妖星天之使者見於天而無常所入列舍以示休咎星大者事大而禍深色白其分有兵喪今客星出紫微外座𫝊舍星宜備姦使邊人侵境又云出奎宿為兵姦臣偽惑天子於是金人遣使来争執進書儀甲戌客星守𫝊舍第五星九年正月癸酉客星始不見自去年六月己巳至是凡一百八十五日乃消伏時金使久在館至是乃去寧宗嘉泰三年六月乙夘東南方泛出一星在尾宿青白色無芒彗係是客星如土星大占客星者天之使者偶見於天而無常所入列宿以示休咎色青憂疾白為兵喪兵革罷民饑死於是韓􅇑胄方謀用兵雲氣虹蜺漢昭帝元平元年正月庚子日出時有黒雲狀如猋風亂鬊轉出西北東南行轉而西有頃亡占曰有雲如衆風是謂風師法有大兵其後兵起烏孫五将征匈奴二月乙酉牂雲如狗赤色長尾三枚夾漢西行詳見流星門成帝永始二年二月癸未夜東方有赤色大三四圍長二三丈索索如樹南方有大四五圍下行十丈餘皆不至地滅占曰東方客之變氣狀如樹木以此知四方欲動者眀年十二月己夘尉氏男子樊並等謀反賊殺太守刼略令丞自稱将軍皆誅死庚子山陽銕官亡徒蘇令等殺傷吏民取庫兵聚黨數百人為大賊踰年經歴郡國四十餘一日有兩氣同時起並見而並令等同月俱發也哀帝建平元年正月丁未日出時有著天白氣廣如一疋布長十丈餘西南行讙如雷西南行一刻而止名曰天狗𫝊曰言之不從則有犬禍詩妖到其四年正月二月三月民相驚動讙譁奔走𫝊行詔籌祠西王母又曰從目人當来十二月白氣出西南従地上至天出參下貫天厠廣如一疋布長十丈餘十餘日去占曰天子有陰病其三年十一月壬子太皇太后詔曰皇帝寛仁孝順奉承聖緒靡有解怠而久病未瘳夙夜惟思殆繼體之君不宜改作春秋大復古其復甘泉泰畤汾隂后土如故王莽地皇四年漢兵起南陽至昆陽莽遣王㝷王邑將諸郡兵號百萬圍昆陽城數重軍勢甚盛晝有雲氣如壞山墮軍上軍人皆厭所謂營頭之星也占曰營頭之所墮其下覆軍流血三千里袁山松書曰怪星晝行名曰營頭行振大誅也時光武將兵救昆陽殺王尋莽軍敗散王邑還長安莽敗俱誅死營頭之變覆軍流血之應也和帝永元十二年十一月癸酉夜有蒼白氣長三丈起天園東北指軍市見積十日占曰兵起十日期歳明年十一月遼東鮮卑二千餘騎寇右北平十六年四月丁未紫宫中生白氣如粉絮占為喪後一年和帝崩殤帝即位一年崩順帝永建二年九月戊寅有白氣廣三尺長十丈餘從北落師門南至斗靈帝熹平二年八月白氣如一疋練衝北斗第四星占白氣衝北斗為大戰明年冬揚州刺史臧旻等攻盗賊斬首數千級光和元年六月丁丑有黒氣墮北宫温眀殿東庭中黒如車盖起奮迅身五色有頭體長十餘丈形貌似龍上問蔡邕對曰所謂天投蜺者也不見足尾不得稱龍易𫝊曰蜺之比無德以色親也潛潭巴曰虹出后妃隂脅王者又曰五色迭至照於宫殿有兵革之事演孔圖曰天子外苦兵威内奪臣無忠則天投蜺按邕集稱曰演孔圖曰蜺者斗之精也失度投蜺見態主惑於毁譽合誠圖曰天子外苦兵者也變不空生占不空言邕對又曰意者陛下樞機之内衽席之上獨有以色見進陵尊踰制以昭變象若羣臣有所毁譽聖意低廻未知誰是兵戎未息威權漸移忠言不聞則虹蜺所在生也抑内寵任中正決毁譽分直邪各得其所勒守衛整武備威權之機不以假人則其效也先是立皇后何氏皇后每齋當謁祖廟輙有變異不得謁中平元年黄巾賊張角等立三十六方起兵燒郡國山東七州處處應角遣兵外討角等内使皇后二兄為大將統兵其年宮車晏駕皇后攝政二兄秉權譴讓帝母永樂后令自殺隂呼并州牧董卓欲共誅中官中官逆殺天将軍進兵相攻討京都戰者塞道皇太后母子遂為太尉卓等所廢黜皆死天下之敗兵先興於宫省外延海内二三十歳其殃禍起自何氏袁山松書曰是年七月虹晝見御座玉堂後殿前庭中色青赤也晉惠帝永興元年十二月壬寅夜有赤氣亘天砰隠有聲二年十月丁丑赤氣見北方東西竟天占曰並為大兵砰隱有聲怒之象也是後四海雲擾九服交兵光熈元年十二月甲申有白氣若虹中天北下至地夜見五日乃滅占曰大兵起明年王彌起青徐汲桑亂河北毒流天下懷帝永嘉三年十二月乙亥有白氣如帶出南北方各二起地至天貫參伐中占曰天下大兵起四年三月司馬越收繆允等又三方雲擾攻戰不休五年三月司馬越死扵寗平城石勒攻破其衆死者十餘萬人六月京都焚滅帝如虜庭愍帝建興元年十月己巳夜有赤氣曜於西北荆州刺史陶侃討杜弢之黨於石城戰敗宋文帝元嘉三十年正月乙亥朔㑹羣臣於太極前殿有青黒氣從東南来覆映宫上是年二月元凶劭構逆帝崩於合殿三月武陵王討劭建牙於軍門有紫雲二蔭於牙上陳宣帝太建四年有白氣如虹自北方貫北斗紫宫十二年二月壬寅白虹見西方占曰有喪後一年帝崩北齊後主天統三年五月戊寅甲夜西北有赤氣竟天夜中始滅十月丙午天西北頻有赤氣占曰有大兵大戰後周武帝總衆来伐周武帝天和二年十月辛夘有黒氣一大如杯在日中甲午又加一經六日乃滅占曰臣有蔽主之明者六年二月己丑夜有蒼雲廣三丈經天自戌加辰建德四年十月癸亥帝率衆攻晉州是日虹見晉州城上首向南尾入紫宫長十丈餘庚午克之丁夘夜白虹見長十餘丈頭在南尾入紫宫中占曰天下兵戰流血又曰若無兵必有大喪至六年正月平齊靜帝大象二年六月甲戌有赤氣起西方漸東行徧天唐高祖武德初隋将堯君素守蒲州有白虹下城中太宗貞觀十一年七月一日黃氣竟天大雨穀水溢高宗永隆元年六月戊子虹蜺亘天蜺者斗之精占曰后妃隂脅王者又曰五色疊至照於宫殿有兵武太后延載元年六月幽州都督孫佺帥兵襲奚將入賊境有白虹垂頭於軍門占曰其下流血中宗景龍元年九月十八日有赤氣竟天其光燭地三日乃止肅宗至德二載正月丙子南陽夜有白虹四上亘百餘丈代宗寶應元年七月西北方有赤光亘天貫紫微漸流於東彌漫北方照曜數十里徳宗貞元二年正月大雨雪平地深尺餘雪上有黄黒色狀如浮埃憲宗元和十三年十二月丙辰有白虹闊五尺東西亘天敬宗寶歴元年十二月乙酉夜有霧起須㬰遍天霧上有赤氣㦯深㦯淺久而乃散武宗㑹昌四年正月己酉西方有白虹懿宗咸通元年七月戊戌白虹横亘西方己酉白虹横亘西方十一月丁酉戌時妖星初出如匹練亘空化為雲而沒在楚分九年七月戊戌白虹横亘西方僖宗中和二年七月丙午夜西北有赤氣如絳竟天昭宗光啟二年九月白虹見西方十月壬辰夜又如之光化二年春有白氣竟天如練自西南徹東北而旋天復三年三月庚申有曲虹在日西北後唐明宗天成二年十二月壬辰酉時西南方有赤氣如火燄燄約二千里占者云不出二年其下當有大兵晉髙祖天福二年正月二日夜初北方有赤氣西至戌亥地東北至丑地南北濶三丈狀如火光赤氣内見紫微宫及北斗諸星至三㸃後内有白氣數條次西行至夜半子時方散八年正月丙戌黄霧四塞九年正月乙未大霧中二白虹相偶四月庚戌大霧中有蒼白二虹末帝開運元年正月乙未大霧中有白虹相偶占者云海淫所興其将有戰時帝在澶州與契丹相守周太祖廣順元年十一月甲子白虹竟天宋太祖乾徳三年七月己夘夜西方起蒼白氣長五十尺貫天船五車亘井宿占曰主兵動六年十月己未亘西北蒼白氣三道長二十尺趨東散占曰㳺兵之象太宗太平興國四年四月己未夜西北方有白氣壓北斗雍熈三年正月己未夜赤氣如城占為兵四年正月癸酉夜白氣起角亢經太微垣厯軒轅大星至月旁散端拱元年十月壬申遲明巽上有雲氣過中天連地濃潤前赤黄後蒼黒色先廣後大行勢如截占曰將領行陣有大克㨗十一月戊午夜西北方有赤氣如日脚髙二丈至道二年二月丙子夜西方有蒼白氣長短八道如彗掃稍經天漢參錯如交虵占曰所見之方主兵勝真宗咸平三年十月辛亥黒氣貫北斗占曰兵起人疫十二月庚午黒氣長三丈餘貫心宿入天市垣抵帝座久方􅄆四年三月丙申白氣二亘天十月辛亥黒氣貫北斗五年正月白氣如虹貫日久而散七月戊戌白氣如陣貫東井六年四月己巳白氣東西亘天丁丑白氣貫日五月辛亥白氣出􅄧至東壁沒六月辛未赤氣出婁貫天庾占曰倉廩有火災丙子曰氣出河鼓左右旗分為數道沒七月癸夘白氣如彗起西南方占曰有兵喪景德元年三月白氣貫軒轅蒼白氣十餘如布亘天七月辛亥黄氣出壁長五尺餘占曰兵出十一月癸丑黒氣十餘道衝日二年正月丙寅黄白氣環之二月丁亥白氣五道貫北斗占為大風幸臣憂十月丙子白氣出閣道西孛孛有光占曰宫中憂三年三月丙辰北方赤氣亘天白氣貫月十月甲午黒氣貫北斗魁占曰邊兵起四年三月己未白氣東西亘天庚申白氣出南方長二丈許久而不散四月庚午白氣貫北斗長十丈占為大風庚寅白氣如布襲月三丈許甲午南方有黒氣貫心宿長五丈許占大水十一月己巳中天有赤氣如掃長七尺在輿鬼南占曰秦兵疫大中祥符元年正月癸亥朔黄氣出於艮占曰主五穀熟丁丑白氣二東西亘天七月西北方白雲氣如彗箒三十餘條占曰主兵戰二年九月戊午黄氣如柱起東南方長五丈許三年四月丁巳中天有黒氣東西亘天占為水十二月癸亥青赤氣貫太微五年二月壬寅白氣長五丈出東井貫北斗魁及軒轅占為兵為雷雨七年九月有氣出紫微為宫闕状光燭地天禧三年四月黄氣如柱貫月占曰女后喜仁宗天聖七年二月己夘夜蒼黒雲長三十尺貫弧矢翼軫占曰荆楚水眀道元年十月庚子夜黄白氣五貫紫微垣十二月壬戌西北有蒼白氣亘天景祐元年八月壬戌夜有黄白氣如彗長七尺餘出張翼之上凡三十三日不見四年七月戊申夜黒氣長丈餘出畢宿下寶元二年正月壬子夜蒼黒雲起西北長三十尺漸東南行歴婁胃􅄧畢及火木相次中天而散占曰水災倉穀腐敗敵主死邊兵憂若七日有雨則不占三月甲寅夜細黒雲起西北方長三十尺貫王良及營室占曰衛分大人憂康定元年三月丙子夜東南方近濁黒氣横亘数丈闊尺許良久散占曰東南有水憂六月壬子黒氣起心宿西長五十尺首尾侵濁久之散占曰大雨水二年八月庚辰夜東方有白氣長十尺許在星宿度中至十日長丈餘衝天相居星宿大星南九十餘日沒壬午夜黒氣起西南長七丈貫危宿羽林入濁至天津良久散癸夘夜蒼白雲起西北闊二尺許首尾至濁良久漫占曰其下有兵慶歴二年十一月壬申黑氣貫北斗