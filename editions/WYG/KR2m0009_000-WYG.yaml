body:
  text: 欽定四庫全書御製重刻文獻通考序朕允儒臣之請校刋三通通典既竣即以文獻通考付之剞劂是書曽蒙皇祖聖祖仁皇帝命禮臣補訂殘缺御製序文梓行宇内頋簡帙繁重年久不無漫漶今悉仿十三經二十二史成式刋訂盖於是家有其書矣朕惟㑹通古今該洽載籍薈萃源流綜統同異莫善於通考之書其考覈精審持論平正上下數千年貫穿二十五代於制度張弛之迹是非得失之林固已燦然具備矣夫帝王之治天下也有不敝之道無不敝之法綱常倫理萬世相因者也忠敬質文随時損益者也法久則必變所以通之者必監於前代以為之折衷大哉我聖祖之序曰有治人無治法師古者師其意不師其跡誠體此意而因其可因損益其所當革因時以制宜理得而事舉則是編也誠考據之資可以羽翼􅀴史禆益治道豈淺鮮也哉是為序乾隆戊辰冬十二月奉㫖開列校刻文獻通考諸臣職名監理和碩和親王臣𢎞晝武英殿總裁吏部左侍郎臣徳齡兵部左侍郎臣王㑹汾國子監祭酒臣陸宗楷提調翰林院編修臣林蒲封原任詹事府詹事兼翰林院侍讀學士今加七品銜臣陳浩校對翰林院侍讀學士今陞禮部右侍郎臣齊召南日講官起居注翰林院侍讀學士臣程景伊左春坊左諭徳臣羅源漢原任左春坊左中允臣程恂左春坊左賛善臣沈慰祖翰林院編修臣王檢翰林院編修臣儲麟趾翰林院編修臣楊述曽翰林院編修臣史貽謨翰林院編修臣鄭虎文翰林院編修臣李清時翰林院編修臣李友棠原任翰林院編修臣陸樹本翰林院檢討臣阮學浩原任翰林院檢討臣萬松齡原任翰林院編修今以知縣用臣邱柱原任翰林院檢討今以知縣用臣周世􅂵校録貢生臣劉岱貢生臣潘煇貢生臣謝霖貢生臣李泓貢生臣申居鄖貢生臣杜桂貢生臣盧殿人貢生臣楊志梁貢生臣葉廷推武英殿監造内務府錢糧衙門郎中兼佐領加六級紀録十六次臣永保内務府錢糧衙門員外郎兼佐領加一級紀録五次臣永忠内務府廣儲司員外郎臣永泰内務府廣儲司司庫加一級紀録五次臣三格監造加一級臣李保監造加二級臣姚文彬庫掌臣虎什泰庫掌臣髙永仁抄白皇帝聖㫖裏饒州路逹魯花赤總管府承奉江浙等䖏行中書省掾史周仁榮承行劄付近據本路申准𢎞文輔道粹徳真人關欽奉聖㫖節該行法籙有本事的好人教尋訪將來者今訪至本路竊見樂平州儒人馬端臨前宋宰相碧梧先生之子知前代之典章識當時之體要以所見聞著成一書名曰文獻通考凡二十四𩔖三百四十八卷天文地理禮樂兵刑財用貢賦官職選舉學校􅀴籍郊祀封建户口征役之屬可謂濟世之儒有用之學解到繕寫文獻通考三百四十八卷并序目共計六十八冊得此送據江浙儒司校勘得堪以傳授移准中書省咨來咨饒州路申准𢎞文輔道粹徳真人關樂平州儒人馬端臨著成書曰文獻通考凡二十四𩔖三百四十八卷治國安民可謂濟世之儒令人繕寫成帙官為鏤板以廣其傳得此行據本路繕寫完備計六十八冊校勘無差本省今將文獻通考隨此發去咨請照驗准此送據禮部呈翰林國史院考校得馬端臨所著文獻通考凡二十四𩔖三百四十八卷纂集古今浩汗該博殫極精力用志良勤有益後學如䝉准呈移咨本省於贍學錢糧内刻板印行相應具呈照詳得此都省咨請依上刋印施行准此省府仰照驗依上施行仍委自總管叚通議提調選能書儒人真楷謄寫就令馬端臨校勘無差於本路槩管贍學錢糧内計料合用紙板工價兩平顧買刋印具依准申省奉此照得近承江浙等䖏行中書省劄付欽奉聖㫖節該王真人根底與五箇鋪馬教直南田地裏名山去䖏尋訪行法籙有本事的好人有呵交各䖏官司依著在先世祖皇帝時分起發好人的體例與氣力起發上来欽此除欽遵外延祐五年十二月十八日准𢎞文輔道粹徳真人關尋訪至饒州路據本路儒學狀申准本路楊教授關該竊見本路樂平州儒人馬端臨前宋宰相碧梧先生之子昨䝉都省咨發再任衢州路柯山書院山長見𩔖各路儒學教授選内即目閑居聽除本儒行履端純詞章雅麗家傳鼎鼐之譜幼繙館閣之儲知前代之典章識當世之體要以所見聞著為成書名曰文獻通考凡二十四𩔖三百四十八卷天文地理禮樂兵刑財用貢賦官職選舉學校􅀴籍郊祀封建户口征役之屬凡於治道有關者無不彪分彚列井井有條治國安民特舉而措之耳此可謂濟世之儒有用之學其書本儒用心二十餘年卷帙繁多非可卒致今先將所定序目一本繳連前去蚤為轉申上司令人繕寫成帙校勘完備官為鏤板以廣其傳非惟不負本儒平生所學抑且於世教有所補益關請施行准此行據本路儒學申令儒人馬端臨謄寫到所譔文獻通考序目一様三本裝禙完備内將二本繳申省府并集賢院照詳外將一本關發𢎞文輔道粹徳真人收管又准關文該於江浙行省計禀得上項文集已行劄付貴路謄寫成帙解省去訖關請將文獻通考謄寫成帙校勘無差裝褙發來呈院准此行下儒學依上謄寫呈解延祐六年七月十二日承奉省府劄付繕寫成帙校勘無差觧省奉此行下本州委自同知竇承直提調禮請馬端臨繕寫到文獻通考三百四十八卷并序目共計六十八冊校正無誤裝褙完備本路具解差人齎赴省府投呈去後今奉前因照得本路元解文獻通考六十八冊雖奉省府劄付咨發都省轉發翰林國史院考校得馬端臨所著文獻通考用志良勤有益後學令本路總管叚通議提調選能書儒人謄寫刋印别不見發元解校勘過的本文籍為此總府除己關請總管叚通議依奉省府劄付所行提調外合下仰照驗速為差委有俸人員禮請馬端臨親齎所著文獻通考的本文籍赴路謄寫校勘刋印施行須至指揮右下樂平州准此至治二年六月日進文獻通考表臣壽衍言臣於延祐四年七月恭奉聖㫖給賜驛𫝊令臣壽衍尋訪道行之士者臣竊謂野有遺賢非弓旌而莫致朝能信道必簡冊之是稽爰竭愚衷用干聖聽欽惟皇帝陛下勵精圖治虚巳待人一視同仁若神堯之御下九功惟叙體大禹之協中隂陽順而風雨時禮樂興而刑罰中是皆陛下本乎清浄臻兹太平下至飛潜動植之微均被鼓舞甄陶之化使指所及雖蒭蕘之言必詢人才之難由把梓之朽弗棄是以采儒流之著述庶㡬益聖主之謀猷臣伏覩饒州路樂平州儒人馬端臨乃故宋丞相廷鸞之子甞著述文獻通考三百四十八卷總二十四𩔖其書與唐杜佑通典相為出入杜書肇自隆古以至唐之天寳今馬氏所著天寳以前者視杜氏加詳焉天寳以後至宋寧宗者又足以補杜氏之闕其二十四𩔖𩔖各有考一曰田賦二曰錢幣三曰户口四曰職役五曰征𣙜六曰市糴七曰土貢八曰國用九曰選舉十曰學校十一曰職官十二曰郊社十三曰宗廟十四曰王禮十五曰樂十六曰兵十七曰刑十八曰經籍十九曰帝系二十曰封建二十一曰象緯二十二曰物異二十三曰輿地二十四曰四裔其議論則本諸經史而可據其制度則㑹之典禮而可行思惟所作之勤勞恐致斯文之隐沒謹謄書於楮墨逺進逹於蓬莱幸垂乙夜之觀快覩五星之聚臣壽衍冒犯天威無任戰兢惶懼屛營之至臣壽衍誠惶誠恐頓首頓首謹言延祐六年四月日𢎞文輔道粹徳真人臣王壽衍上表欽定四庫全書文獻通考鄱陽馬端臨貴與著自序昔荀卿子曰欲觀聖王之跡則於其粲然者矣後王是也君子審後王之道而論於百王之前若端拜而議然則考制度審憲章博聞而强識之固通儒事也詩書春秋之後惟太史公號稱良史作為紀傳書表紀傳以述理亂興衰八書以述典章經制後之執筆操簡牘者卒不易其體然自班孟堅而後斷代為史無㑹通因仍之道讀者病之至司馬温公作通鑑取千三百餘年之事跡十七史之紀述萃為一書然後學者開卷之餘古今咸在然公之書詳於理亂興衰而略於典章經制非公之智有所不逮也編簡浩如煙埃著述自有體要其勢不能以兩得也竊嘗以為理亂興衰不相因者也晉之得國異乎漢隋之喪邦殊乎唐代各有史自足以該一代之始終無以參稽互察為也典章經制實相因者也殷因夏周因殷繼周者之損益百世可知聖人盖已預言之矣爰自秦漢以至唐宋禮樂兵刑之制賦歛選舉之規以至官名之更張地理之沿革雖其終不能以盡同而其初亦不能以遽異如漢之朝儀官制本秦規也唐之府衞租庸本周制也其變通張弛之故非融㑹錯綜原始要終而推尋之固未易言也其不相因者猶有温公之成書而其本相因者顧無其書獨非後學之所宜究心乎唐杜岐公始作通典肇自上古以至唐之天寳凡歴代因革之故粲然可考其後宋白嘗續其書至周顯徳近代魏了翁又作國朝通典然宋之書成而傳習者少魏當屬槀而未成書今行於世者獨杜公之書耳天寳以後盖闕焉有如杜書綱領宏大考訂該洽固無以議為也然時有古今述有詳略則夫節目之間未為明備而去取之際頗欠精審不無遺憾焉盖古者因田制賦賦乃米粟之屬非可析之於田制之外也古者任土作貢貢乃包篚之屬非可雜之於税法之中也乃若叙選舉則秀孝與銓選不分叙典禮則經文與𫝊注相汨叙兵則盡遺賦調之規而姑及成敗之跡諸如此𩔖寧免小疵至於天文五行藝文歴代史各有志而通典無述焉馬班二史各有諸侯王列侯表范曄東漢書以後無之然歴代封建王侯未嘗廢也王溥作唐及五代㑹要首立帝系一門以叙各帝歴年之久近𫝊授之始末次及后妃皇子公主之名氏封爵後之編㑹要者倣之而唐以前則無其書凡是二者盖歴代之統紀典章係焉而杜書亦復不及則亦未為集著述之大成也愚自蚤嵗盖嘗有志於綴緝顧百憂薫心三餘少暇吹竽已澁汲綆不修豈復敢以斯文自詭昔夫子言夏殷之禮而深慨文獻之不足徵釋之者曰文典籍也獻賢者也生乎千百載之後而欲尚論千百載之前非史傳之實録具存可以稽考儒先之緒言未逺足資討論雖聖人亦不能臆為之説也竊伏自念業紹箕裘家藏墳索挿架之收儲趨庭之問答其於文獻盖庶幾焉嘗恐一旦散軼失墜無以屬來哲是以忘其固陋輒加考評旁搜逺紹門分彚别曰田賦曰錢幣曰户口曰職役曰征𣙜曰市糴曰土貢曰國用曰選舉曰學校曰職官曰郊社曰宗廟曰王禮曰樂曰兵曰刑曰輿地曰四裔俱傚通典之成規自天寳以前則増益其事迹之所未備離析其門𩔖之所未詳自天寳以後至宋嘉定之末則續而成之曰經籍曰帝系曰封建曰象緯曰物異則通典元未有論述而採摭諸書以成之者也凡叙事則本之經史而參之以歴代㑹要以及百家傳記之書信而有證者從之乖異傳疑者不録所謂文也凡論事則先取當時臣僚之奏疏次及近代諸儒之評論以至名流之燕談稗官之紀録凡一話一言可以訂典故之得失證史傳之是非者則採而録之所謂獻也其載諸史傳之紀録而可疑稽諸先儒之論辨而未當者研精覃思悠然有得則竊著巳意附其後焉命其書曰文獻通考為門二十有四卷三百四十有八而其每門著述之成規考訂之新意各以小序詳之昔江淹有言修史之難無出於志誠以志者憲章之所繋非老於典故者不能為也陳壽號善叙述李延壽亦稱究悉舊事然所著二史俱有紀傳而獨不克作志重其事也况上下數千年貫串二十五代而欲以末學陋識操觚竄定其間雖復窮老盡氣劌目鉥心亦何所發明聊輯見聞以備遺忘耳後之君子儻能芟削繁蕪増廣闕略矜其仰屋之勤而俾免於覆車之愧庶有志於經邦稽古者或可考焉古之帝王未嘗以天下自私也故天子之地千里公侯皆方百里伯七十里子男五十里而王畿之内復有公卿大夫采地禄邑各私其土子其人而子孫世守之其土壤之肥磽生齒之登耗視之如其家不煩考覈而姦偽無所容故其時天下之田悉屬於官民仰給於官者也故受田於官食其力而輸其賦仰事俯育一視同仁而無甚貧甚富之民此三代之制也秦始以宇内自私一人獨運於其上而守宰之任驟更數易視其地如傳舍而閭里之情偽雖賢且智者不能周知也守宰之遷除其嵗月有限而田土之還受其姦敝無窮故秦漢以來官不復可授田遂為庶人之私有亦其勢然也雖其間如元魏之泰和李唐之貞觀稍欲復三代之規然不久而其制遂隳者盖以不封建而井田不可復行故也三代而上天下非天子所得私也秦廢封建而始以天下奉一人矣三代以上田産非庶人所得私也秦廢井田而始捐田産以予百姓矣秦於其當與者取之所當取者與之然沿襲既久反古實難欲復封建是自割裂其土宇以啓紛争欲復井田是强奪民之田畝以召怨讟書生之論所以不可行也隨田之在民者税之而不復問其多寡始於商鞅隨民之有田者税之而不復視其丁中始於楊炎三代井田之良法壊於鞅唐租庸調之良法壊於炎二人之事君子所羞稱而後之為國者莫不一遵其法一或變之則反至於煩擾無稽而國與民俱受其病則以古今異宜故也作田賦考第一叙歴代因田制賦之規而以水利屯田官田附焉凡七卷生民所資曰衣與食物之無闗於衣食而實適於用者曰珠玉五金先王以為衣食之具未足以周民用也於是以適用之物作為貨幣以權之故上古之世以珠𫝊為上幣黄金為中幣刀布為下幣刀布即古錢之名然珠𫝊黄金為世難得之貨至若權輕重通貧富而可以通行者惟銅而已故九府圜法自周以來未之有改也然古者俗朴而用簡故錢有餘後世俗侈而用糜故錢不足於是錢之直日輕錢之數日多數多而直輕則其致逺也難自唐以來始制為飛劵鈔引之屬以通商賈之厚齎貿易者其法盖執劵引以取錢而非以劵引為錢也宋慶歴以來蜀始有交子建炎以來東南始有㑹子自交㑹既行而始直以楮為錢矣夫珠𫝊黄金可貴之物也銅雖無足貴而適用之物也以其可貴且適用者制幣而通行古人之意也至於以楮為幣則始以無用為用矣舉方尺腐敗之劵而足以奔走一世寒藉以衣饑藉以食貧藉以富盖未之有然銅重而楮輕鼓鑄繁難而印造簡易今捨其重且難者而用其輕且易者而又下免犯銅之禁上無搜銅之苛亦一便也作錢幣考第二凡二卷古者户口少而皆才智之人後世生齒繁而多窳惰之軰鈞是人也古之人方其為士則道問學及其為農則力稼穡及其為兵則善戰陣投之所向無不如意是以千里之邦萬家之聚皆足以世守其國而扞城其民民衆則其國强民寡則其國弱盖當時國之與立者民也光嶽既分風氣日漓民生其間才益乏而智益劣士拘於文墨而授之介胄則慚農安於犁鋤而問之刀筆則廢以至九流百工釋老之徒食土之毛者日以繁夥其肩摩􅃑接三孱不足以滿隅者總總也於是民之多寡不足為國之盛衰官既無藉於民之材而徒欲多為之法以征其身户調口賦日増月益上之人厭棄賤薄不倚民為重而民益窮苦憔悴祇以身為累矣作户口考第三叙歴代户口之數與其賦役而以奴婢占役附焉凡二卷役民者官也役於官者民也郡有守縣有令鄉有長里有正其位不同而皆役民者也在軍旅則執干戈興土木則親畚鍤調征行則負覊絏以至追胥力作之任其事不同而皆役於官者也役民者逸役於官者勞其理則然然則鄉長里正非役也後世乃虐用其民為鄉長里正者不勝誅求之苛各􅎯避免之意而始命之曰戸役矣唐宋而後下之任户役者其費日重上之議户役者其制日詳於是曰差曰僱曰義紛紜雜襲而法出姦生莫能禁止噫成周之里宰黨長皆有禄秩之命官兩漢之三老嗇夫皆有譽望之名士盖後世之任户役者也曷嘗凌暴之至此極乎作職役考第四叙歴代役法之詳而以復除附焉凡二卷征𣙜之途有二一曰山澤茶鹽坑冶是也二曰關市酒酤征商是也羞言利者則曰縣官當食租衣税而已而欲與民庶争貨殖之利非王者之事也善言利者則曰山海天地之藏而豪强擅之關市貨物之聚而商賈擅之取之於豪强商賈以助國家之經費而毋專仰給於百姓之賦税是崇本抑末之意乃經國之逺圖也自是説立而後之加詳於征𣙜者莫不以藉口征之不已則併其利源奪之官自煑鹽酤酒採茶鑄鐡以至市易之屬利源日廣利額日重官既不能自辦而豪强商賈之徒又不可復擅然既以立為課額則有司者不任其虧減於是又為均派之法或計口而課鹽錢或望户而𣙜酒酤或於民之有田者計其頃畝令於賦税之時帶納以求及額而征𣙜遍於天下矣盖昔之𣙜利曰取之豪强商賈之徒以優農民及其久也則農民不獲豪强商賈之利而代受豪强商賈之𣙜有識者知其苛横而國計所需不可止也作征𣙜考第五首叙歴代征商之法鹽鐡始於齊則次之𣙜酤始於漢𣙜茶始於唐則又次之雜征歛者若津渡間架之屬以至漢之告緡唐之率貸宋之􅀴總制錢皆衰世一切之法也又次之凡六卷市者商賈之事也古之帝王其物貨取之任土所貢而有餘未有國家而市物者也而市之説則昉於周官之泉府後世因之曰均輸曰市易曰和買皆以泉府藉口者也糴者民庶之事古之帝王其米粟取之什一所賦而有餘未有國家而糴粟者也而糴之説則昉於齊桓公魏文侯之平糴後世因之曰常平曰義倉曰和糴皆以平糴藉口者也然泉府與平糴之立法也皆所以便民方其滯於民用也則官買之糴之及其適於民用也則官賣之糶之盖懋遷有無曲為貧民之地初未嘗有一毫征利富國之意然沿襲既久古意寖失其市物也亦諉曰𣙜蓄賈居貨待價之謀及其久也則官自效商賈之為而指為富國之術矣其糴粟也亦諉曰捄貧民榖賤錢荒之弊及其久也則官未嘗有及民之恵而徒利積粟之入矣至其極弊則名曰和買和糴而强配數目不給價直鞭笞取足視同常賦盖古人恤民之事後世反藉以厲民不可不究其顛末也作市糴考第六凡二卷禹貢八州皆有貢物而冀州獨無之甸服有米粟之輸而餘四服俱無之説者以為王畿之外八州俱以田賦所當供者市易所貢之物故不輸粟然則土貢即租税也漢唐以來任土所貢無代無之著之令甲猶曰當其租入然叔季之世務為苛横徃徃租自租而貢自貢矣至於珍禽竒獸袤服異味或荒滛之君降㫖取索或姦諂之臣希意創貢徃徃有出於經常之外者甚至掯留官賦隂増民輸而名之曰羡餘以供貢奉上下相蒙茍悦其名而於百姓則重困矣作土貢考第七凡一卷賈山至言曰昔者周盖千八百國以九州之民養千八百國之君君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力罷不能勝其役財盡而不能勝其求一君之身耳所自養者馳騁弋獵之娱天下弗能供也然則國之廢興非財也財少而國延財多而國促其效可覩矣然自周官六典有太府又有王府内府且有惟王不㑹之説後之為國者因之兩漢財賦曰大農者國家之帑蔵也曰少府曰水衡者人主之私蓄也唐既有轉運度支而復有瓊林大盈宋既有户部三司而復有封樁内蔵於是天下之財其歸於上者復有公私恭儉賢主常捐内帑以濟軍國之用故民裕而其祚昌滛侈僻王至糜外府以供耳目之娱故財匱而其民怨此又歴代制國用者龜鑑也作國用考第八叙歴代財計首末而以漕運賑恤蠲貸附焉凡五卷古之用人徳行為首才能次之虞朝載采亦有九徳周家賔興考其徳行於才不屑屑也兩漢以來刺史守相得以專辟召之權魏晉而後九品中正得以司人物之柄皆考之以里閈之毁譽而試之以曺掾之職業然後俾之入備王官以階清顯盖其為法雖有愧於古人徳行之舉而猶可以得才能之士也至於隋而州郡僚屬皆命於銓曹搢紳發軔悉由於科目自以銓曹署官而所按者資格而已於是勘籍小吏得以司升沉之權自以科目取士而所試者詞章而已於是操觚末技得以階榮進之路夫其始進也試之以操觚末技而專主於詞章其既仕也付之於勘籍小吏而專校其資格於是選賢與能之意無復存者矣然此二法者歴數百年而不可以復更一或更之則蕩無法度而僥濫者愈不可澄汰亦獨何哉又古人之取士盖將以官之三代之時法制雖簡而考核本明毁譽既公而賢愚自判徃徃當時士之被舉者未有不入官初非有二途也降及後世巧偽日甚而法令亦滋多遂以科目為取士之途銓選為舉官之途二者各自為防閑檢柅之法至唐則以試士屬之禮部試吏屬之吏部於是科目之法銓選之法日新月異不相為謀盖有舉於禮部而不得官者不舉於禮部而得官者而士之所以進身之塗轍亦復不一不可比而同之也於是立舉士舉官兩門以該之作選舉考第九凡十二卷古之教者家有塾黨有庠術有序國有學所謂學校至不一也然惟國學有司樂司成専主教事而州閭鄉黨之學則未聞有司職教之任者及考周禮地官黨正各掌其黨之政令教治孟月屬民而讀法祭祀則以禮屬民州長掌其州之教治政令考其徳行道藝糾其過惡而勸戒之然後知黨正即一黨之師也州長即一州之師也以至下之為比長閭胥上之為鄉遂大夫莫不皆然盖古之為吏者其徳行道藝俱足以為人之師表故發政施令無非教也以至使民興賢出使長之使民興能入使治之盖役之則為民教之則為士官之則為吏鈞是人也秦漢以來儒與吏始異趨政與教始殊途於是曰郡守曰縣令則吏所以治其民曰博士官曰文學掾則師所以教其弟子二者漠然不相為謀所用非所教所教非所用士方其從學也曰習讀及進而登仕版則棄其詩書禮樂之舊習而從事乎簿書期㑹之新規古人有言曰吾聞學而後入政未聞以政學者後之為吏者皆以政學者也自其以政學則儒者之學術皆筌蹄也國家之學宫皆芻狗也民何由而見先王之治哉又况榮途㨗徑旁午雜出盖未嘗由學而升者滔滔也於是所謂學者姑視為粉飾太平之一事而庸人俗吏直以為無益於興衰理亂之故矣作學校考第十叙歴代學校之制及祠祭褒贈先聖先師之首末幸學養老之儀而郡國鄉黨之學附見焉凡七卷古者因事設官量能授職無清濁之殊無内外之别無文武之異何也唐虞之時禹宅揆契掌教臯陶明刑伯夷典禮羲和掌厯䕫典樂益作虞垂共工盖精而論道􅀴邦粗而飭財辨器其位皆公卿也其人皆聖賢也後之居位臨民者則自詭以清髙而下視曲藝多能之流其執技事上者則自安於鄙俗而難語以輔世長民之事於是審音治厯醫祝之流特設其官以䖏之謂之雜流擯不得與搢紳伍而官之清濁始分矣昔在成周設官分職綴衣趣馬俱籲俊之流宫伯内宰盡興賢之侣逮夫漢代此意猶存故以儒者為侍中以賢士備郎署如周昌袁盎汲黯孔安國之徒得以出入宫禁陪侍晏私陳誼格非拾遺補過其才能卓異者至為公卿將相為國家任大事霍光張安世是也中漢以來此意不存於是非閹豎嬖倖不得以日侍宫庭而賢能搢紳特以之備員表著漢有宫中府中之分唐有南司北司之黨職掌不相為謀品流亦復殊異而官之内外始分矣古者文以􅀴邦武以撥亂其在大臣則出可以將入可以相其在小臣則簮筆可以待問荷戈可以前驅後世人才日衰不供器使司文墨者不能知戰陣被介胄者不復識簡編於是官人者制為左右兩選而官之文武始分矣至於有侍中給事中之官而未嘗司宫禁之事是名内而實外也唐以來以侍中為三公官以䖏勲臣又以給事中為封駁之官皆以外庭之臣為之並不預宫中之事有太尉司馬之官而未嘗司兵戎之事是名武而實文也太尉漢承秦以為三公然猶掌武事也唐以後亦為三公宋時吕夷簡王旦韓琦官皆至太尉非武臣也大司馬周官掌兵至漢元成以後為三公亞於司徒乃後來執政之任亦非武臣也太常有卿佐而未嘗審音樂將作有監貳而未嘗諳營繕不過為儒臣養望之官是名濁而實清也尚書令在漢為司牘小吏而後世則為大臣所不敢當之穹官校尉在漢為兵帥要職而後世則為武弁所不齒之冗秩尚書令漢初其秩至卑銅章青綬主宫禁文書而已至唐則為三省長官髙祖入長安時太宗以秦王為之後郭子儀以勲位當拜以太宗曽為之辭不敢受自後至宋無敢拜此官者漢八校尉領禁衞諸軍皆尊顯之官宰相之罷政者至為城門校尉又司𨽻校尉督察三輔弹劾公卿其權至雄尊護羌校尉護烏桓校尉皆領重兵鎮方面乃大帥之職至宋時校尉副尉為武職初階不入品從至為冗賤盖官之名同而古今之崇卑懸絶如此叅稽互考曲暢旁通而因革之故可以𩔖推作職官考第十一首叙官制次序官數内官則自公師宰相而下外官則自州牧郡守而下以至散官禄秩品從之詳凡二十一卷郊特牲曰禮之所尊尊其義也失其義陳其數祝史之數也故其數可陳也其義難知也荀卿子曰不知其義謹守其數慎不敢損益父子相傳以持王公是故三代雖亡治法猶存是官人百吏之所以取禄秩也然則義者祭之理也數者祭之儀也古者人習於禮故家國之祭祀其品節儀文祝史有司皆能知之然其義則非儒宗講師不能明也周衰禮廢而其儀亡矣秦漢以來諸儒口耳所授簡冊所載特能言其義理而已戴記是也儀理所言止於卿士大夫之禮六典所載特以其有關於職掌者則言之而國之大祀盖未有能知其品節儀文者漢鄭康成深於禮學作為𫝊註頗能補􅀴之所未備然以䜟緯之言而釋􅀴以秦漢之事而擬三代此其所以舛也盖古者郊與明堂之祀祭天而已秦漢始有五帝泰一之祠而以古者郊祀明堂之禮禮之盖出於方士不􅀴之説而鄭注禮經二祭曰天曰帝或以為靈威仰或以為耀魄寳襲方士緯書之荒誕而不知其非夫禮莫先於祭祭莫重於天而天之名義且乖異如此則其他節目注釋雖復博贍不知其果得禮􅀴之意否乎王肅諸儒雖引正論以力排之然魏晉以來祀天之禮當恭酌王鄭二説而迭用之竟不能偏廢也至於禘祫之節宗祧之數禮􅀴之明文無所稽據而注家之聚訟莫適折􅇆其叢雜牴牾與郊祀之説無以異也近世三山信齋楊氏得考亭勉齋之遺文奥義著為祭禮一書詞義正大考訂精核足為千載不刋之典然其所述一本􅀴文不復以注疏之説攙補故經之所不及者則濶略不接續杜氏通典之書有祭禮則恭用經註之文兩存王鄭之説雖通暢易曉而不如楊氏之純正今並録其説次及歴代祭祀禮儀本末而唐開元宋政和二禮書中所載諸祀儀注併詳著焉作郊祀考第十二以叙古今天神地祇之祀首郊次明堂次后土次雩次五帝次日月星辰寒暑次六宗四方次社稷山川次封禪次髙禖次八蜡次五祀次藉田祭先農次親蠶祭先蠶次祈穣次告祭而後以雜祠滛祠終焉凡二十三卷作宗廟考第十三以叙古今人鬼之祀首國家宗廟次時享次祫禘次功臣配享次祠先代君臣次諸侯宗廟而以大夫士庶宗廟時享終焉凡十五卷古者經禮禮儀皆曰三百盖無有能知其節目之詳者矣然總其凡有五曰吉凶軍賔嘉舉其大有六曰冠昏䘮祭鄉相見此先王制禮之略也秦漢而後因革不同有古有而今無者如大射聘禮士相見鄉飲酒投壺之𩔖是也有古無而今有者如聖節上夀上尊號拜表之𩔖是也有其事通乎古今而後世未嘗制為一定之禮者若臣庶以下冠昏䘮祭是也凡若此者皆本無沿革不煩紀録而通乎古今而代有因革者惟國家祭祀學校選舉以至朝儀廵狩田獵冠冕服章圭璧符璽車旗鹵簿及凶禮之國恤耳今除國祀學校選舉已有専門外朝儀已下則總謂之王禮而備著歴代之事迹焉盖本晦庵儀禮經𫝊通解所謂王朝之禮也其本無沿革者若古禮則經𫝊所載先儒所述自有専書可以尋求毋庸贅叙若今禮則雖不能無失而議禮制度又非書生所得預聞也是以亦不復措辭焉作王禮考第十四凡二十二卷記曰聲音之道與政通矣故審樂以知政盖言樂之正哇有關於時之理亂也然自三代以後號為歴年多施澤久而民安樂之者漢唐與宋漢莫盛於文景之時然至孝武時河間獻王始獻雅樂天子下太樂官常存肄之嵗時以備數然不常御常御及郊廟皆非雅聲至哀帝時始罷鄭聲用雅樂而漢之運祚且移於王莽矣唐莫盛於貞觀開元之時然所用者多教坊俗樂太常閲工人常肄習之其不可教者乃習雅樂然則其所謂樂者可知矣宋莫盛於天聖景祐之時然當時胡瑗李照阮逸范鎮之徒拳拳以律呂未諧聲音未正為憂而卒不克更置至政和時始製大晟樂自謂古雅而宋之土宇且䧟入女真矣盖古者因樂以觀政而後世則方其發政施仁之時未暇制樂及其承平之後綱紀法度皆已具舉敵國外患皆已銷亡君相他無所施為學士大夫他無所論説然後始及制樂樂既成而政已秕國已衰矣昔隋開皇中制樂用何妥之説而擯萬寳常之議及樂成寳常聽之泫然曰樂聲滛厲而哀不久天下將盡噫使當時一用寳常之議能捄隋之亡乎然寳常雖不能制樂以保隋之長存而猶能聽樂而知隋之必亡其宿悟神解亦有過人者竊嘗以為世之興衰理亂固未必由樂然若欲議樂必如師曠州鳩萬寳常王令言之徒其自得之妙豈有法之可𫝊者而後之君子乃欲强為議論究律呂於黍之縦横求正哇於聲之清濁或證之以殘缺斷爛之簡編埋没銷蝕之尺量而自謂得之何異刻舟覆蕉叩槃捫燭之為愚固不知其説也作樂考第十五首叙歴代樂制次律呂制度次八音之屬各分雅部胡部俗部以盡古今樂器之本末次樂縣次樂歌次樂舞次散樂鼓吹而以徹樂終焉凡十五卷按周官小司徒五人為伍五伍為兩四兩為䘚五䘚為旅五旅為師五師為軍上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人此教練之數也司馬法地方一里為井四井為邑四邑為邱四邱為甸甸六十四井有戎馬四匹兵車一乗牛十二頭甲士三人䘚七十二人此調發之數也教練則不厭其多故凡食土之毛者除老弱不任事之外家家使之為兵人人使之知兵故雖至小之國勝兵萬數可􅃌頋而集也調發則不厭其簡甸六十四井為五百一十二家而所調者止七十五人是六家調發共出一人也每甸姑通以中地二家五人計之五百一十二家可任者一千二百八十人而所調者止七十五人是十六次調發方及一人也教練必多則人皆習於兵革調發必簡則人不疲於征戰此古者用兵制勝之道也後世士自為士農自為農工商末技自為工商末技凡此四民者平時不識甲兵為何物而所謂兵者乃出於四民之外故為兵者甚寡知兵者甚少一有征戰則盡數驅之以當鋒刄無有休息之期甚則以未嘗訓練之民而使之戰是棄民也唐宋以来始専用募兵於是兵與民判然為二途諉曰教養於平時而驅用於一旦然其季世則兵數愈多而驕悍而劣弱為害不淺不惟足以疲國力而反足以促國祚矣作兵考第十六首叙歴代兵制次禁衞及郡國之兵次教閲之制次車戰舟師馬政軍器凡十三卷昔漢陳咸言為人議法當依於輕雖有百金之利慎無與人重比盖漢承秦法過於嚴酷重以武宣之君張趙之臣滛刑喜殺習以為常咸之言盖有激也竊甞以為劓刵㧻黥􅃖尤之刑也而唐虞遵之收帑赤族亡秦之法也而漢魏以来遵之以賢聖之君而不免襲亂虐之制由是觀之咸言尤為可味也漢文除肉刑善矣而以髠笞代之髠法過輕而略無懲創笞法過重而至於死亡其後乃去笞而獨用髠減死罪一等即止於髠鉗進髠鉗一等即入於死而深文酷吏務從重比故死刑不勝其衆魏晉以来病之然不知減笞數而使之不死乃徒欲復肉刑以全其生肉刑卒不可復遂獨以髠鉗為生刑所欲活者傅生議於是傷人者或折腰體而纔剪其毛髪所欲陷者與死比於是犯罪者既已刑殺而復誅其宗親輕重失宜莫此為甚及隋唐以来始制五刑曰笞杖徒流死此五者即有虞所謂鞭朴流宅雖聖人復起不可偏廢也若夫茍慕輕刑之名而不恤恵姦之患殺人者不死傷人者不刑俾無辜罹毒虐者抱沉寃而其伸而舞文利賕賄者無後患之可惕則亦非聖人明刑弼教之本意也作刑考第十七首刑制次徒流次詳讞次贖刑赦宥凡十二卷昔秦燔經籍而獨存醫藥卜筮種樹之書學者抱恨終古然以今考之易與春秋二經首末俱存詩亡其六篇或以為笙詩元無其辭是詩亦未嘗亡也禮本無成書戴記雜出漢儒所編儀禮十七篇及六典最晩出六典僅亡冬官然其書純駮相半其存亡未足為經之疵也獨虞夏商周之書亡其四十六篇耳然則秦所燔除書之外俱未甞亡也若醫藥卜筮種樹之書當時雖未嘗廢錮而並無一卷流𫝊至今者以此見聖經賢𫝊終古不朽而小道異端雖存必亡初不以世主之好惡為之興廢也漢隋唐宋之史俱有藝文志然漢志所載之書以隋志考之十已亡其六七以宋志考之隋唐亦復如是豈亦秦為之厄哉昌黎公所謂為之也易則其𫝊之也不逺豈不信然夫書之傳者已鮮𫝊而能蓄者加鮮蓄而能閲者尤加鮮焉宋皇祐時命名儒王堯臣等作崇文總目記館閣所儲之書而論列於其下方然止及經史而亦多缺略子集則但有其名目而已近世昭徳鼂氏公武有讀書記直齋陳氏振孫有書録觧題皆聚其家蔵之書而評之今所録先以四代史志列其目其存於近世而可考者則採諸家書目所評并旁搜史𫝊文集雜説詩話凡議論所及可以紀其著作之本末考其流𫝊之真偽訂其文理之純駮者則具載焉俾覽之者如入群玉之府而閲木天之蔵不特有其書者稍加研窮即可以洞究㫖趣雖無其書者味兹題品亦可粗窺端倪盖殫見洽聞之一也作經籍考第十八經之𩔖十有三史之𩔖十有四子之𩔖二十有二集之𩔖六凡七十六卷昔太史公言儒者斷其義馳説者騁其辭不務綜其始終盖譏世之學者以空言著書而歴代統系無所考訂也於是作為三代世表自黄帝以下譜之然五帝之事逺矣而遷必欲詳其世次按圖而索徃徃牴牾故歐陽公復譏其不能缺所不知而務多聞以為勝然自三代以後至於近世史牒所載昭然可考始學者童而習之屈伸指而得其大槩至其𫝊世歴年之延促枝分派别之逺近猝然而問雖華顛鉅儒不能以遽對則以無統系之書故也今倣王溥唐及五代㑹要之體首叙帝王之姓氏出䖏及其享國之期改元之數以及各代之始終次及后妃皇子公主皇族其可考者悉著於篇而歴代所以尊崇之禮冊命之儀并附見焉作帝系考第十九凡十卷封建莫知其所從始也禹塗山之㑹號稱萬國湯受命時凡三千國周定五等之封凡千七百七十三國至春秋之時見於經𫝊者僅一百六十五國而蠻夷戎狄亦在其中盖古之國至多後之國日寡國多則土宜促國少則地宜曠而夷考其故則不然試以殷周上世言之殷契至成湯八遷史以為自商而砥石自砥石而復居商又自商而亳周棄至文王亦屢遷史以為自邰而豳自豳而岐自岐而豐夫湯七十里之國也文王百里之國也然以所遷之地考之盖有出於七十里百里之外者矣又如泰伯之為吴鬻繹之為楚箕子之為朝鮮其初不過自屛於荒裔之地而其後因以有國𫝊世竊意古之諸侯者雖曰受封於天子然亦由其行義徳化足以孚信於一方人心翕然歸之故其子孫因之遂君其地或有災否則轉徙他之而人心歸之不能釋去故随其所居皆成都邑盖古之帝王未甞以天下為己私而古之諸侯亦未嘗視封内為己物上下之際均一至公非如後世分疆畫土争城争地必若是其截然也秦旣滅六國舉宇内而郡縣之尺土一民始皆視為己有再傳而後劉項與羣雄共裂其地而分王之髙祖既誅項氏之後凡當時諸侯王之自立者與為項氏所立者皆撃滅之然後裂土以封韓彭英盧張吴之屬盖自是非漢之功臣不得王矣逮數年之後反者九起異姓諸侯王多已夷滅於是悉取其地以王子弟親屬如荆吴齊椘淮南之𩔖盖自是非漢之同姓不得王矣然一再𫝊而後賈誼鼂錯之徒拳拳有諸侯强大之慮以為親者無分地而疏者偪天子必為子孫之憂於是或分其國或削其地其負强而動如七國者則六師移之盖西漢之封建其初則勦滅異代所封而以畀其功臣繼而勦滅異姓諸侯而以畀其同宗又繼而勦滅疏屬劉氏王而以畀其子孫盖檢制益密而猜防益深矣昔湯武雖以征伐取天下然商惟十一征周惟滅國者五十其餘諸侯皆襲前代所封未聞盡以宇内易置而封其私人周雖大封同姓然文昭武穆之邦與國咸休亦未聞成康而後復畏文武之族偪而必欲夷滅之以建置巳之子孫也愚甞謂必有公天下之心而後可以行封建自其出於公心則選賢與能而小大相維之勢足以綿千載自其出於私心則忌疏畏偪而上下相猜之形不能以一朝居矣景武之後令諸侯王不得治民補吏於是諸侯雖有君國子民之名不過食其邑入而已土地甲兵不可得而擅矣然則漢雖懲秦之弊復行封建然為人上者茍慕羙名而實無唐虞三代之公心為諸侯者既獲裂土則遽欲效春秋戰國之餘習故不久而遂廢逮漢之亡議者以為乏藩屏之助而成孤立之勢然愚又甞夷考歴代之故魏文帝忌其諸弟帝子受封有同幽縶再𫝊之後主勢稍弱司馬氏父子即攘臂取之曽無頋憚晉武封國至多宗藩强壯俱自得以領兵䘚置官屬可謂懲魏之弊矣然八王首難阻兵安忍反以召五胡之釁宋齊皇子俱童孺當方靣名為藩鎮而實受制於典籖長史之手每一易主則前帝之子孫殱焉而運祚䘚以不永梁武享國最久諸子孫皆以盛年雄材出為邦伯専制一方可謂懲宋齊之弊矣然諸王擁兵捐置君父卒不能止侯景之難然則魏宋齊疏忌骨肉固以取亡而晉梁崇奨宗藩亦不能捄亂於是封建之得失不可復議而王綰李斯陸士衡栁宗元軰所論之是非亦不可得而偏廢矣今所論著三皇而後至春秋之前國名之見於經𫝊而事跡可考者畧著之如共工防風氏以至邶􅅠樊檜之𩔖是也春秋十二列國既有太史世家詳其事跡不復贅叙姑紀其世代歴年而已若諸小國之事跡見於春秋三𫝊雜記者則倣世家之例叙其梗概邾莒許滕以下是也漢初諸侯王王子侯功臣外戚恩澤侯則悉本馬班二史年表東漢以後無年表可據則採摭諸𫝊各訂其受封𫝊授之本末而備著焉列侯不世襲始於唐親王不世襲始於宋則姑志其始受封者之名氏而已作封建考第二十凡十八卷昔三代之時俱有太史其所職掌者察天文記時政盖合占候紀載之事以一人司之漢時太史公掌天官不治民而紬史記金匱石室之書猶是任也至宣帝時以其官為令行太史公文書其修撰之職以他官領之於是太史之官惟知占候而已盖必二任合而為一則象緯有變紀録無遺斯可以考一代天文運行之常變而推其休祥然二任之隳廢離隔不相為謀盖已久矣昔春秋日食不書日而史氏以為官失之可見當時掌占候與司紀載者各為一人故疏畧如此又甞考之春秋二百四十二年而日食三十六自魯定公十五年至漢髙帝之三年其間二百九十三年而搜考史𫝊書日食凡七而已然則遺缺不書者多矣自漢而後史録具在天下一家之時紀載者遞相沿襲無以知其得失也及南北分裂之後國各有史今考之南自宋武帝永初元年至陳後主禎明二年北自魏明帝泰常五年至隋文帝開皇八年此一百六十九年之間南史所書日食僅三十六而北史所書乃七十九其間年嵗之相合者纔二十七又有年合而月不合者夫同此一蒼旻也食於北者其數過倍於南理之所必無者而又日月不相脗合豈天有二日乎盖史氏之差謬牴牾其失大矣懸象著明莫大乎日月雖庸奴舉目可知而所書薄蝕之謬且如此則星辰之遲留伏逆陵犯徃来其所紀述豈足憑乎按漢哀帝以日無精光邪氣連昏之事問待詔李尋而尋所對具言其故光武以建武五年召嚴光入禁中共卧而太史奏客星犯帝座二事見於李尋嚴光𫝊中而以漢志考之終哀帝時不言日無精光之事光武建武五年亦不言客星事亦可證其疏畧也姑述故事廣異聞耳天文志莫詳於晉隋至丹元子之歩天歌尤為簡明宋兩朝史志言諸星去極之逺近中興史志採近世諸儒之論亦多前史所未發故擇其尤明暢有味者具列於篇作象緯考第二十一首三垣二十八宿之星名度數次天漢起没次日月五星行度次七曜之變次雲氣凡十七卷記曰國家將興必有禎祥國家將亡必有妖孽盖天地之間有妖必有祥因其氣之所感而證應隨之自伏勝作五行𫝊班孟堅而下踵其説附以各代證應為五行志始言妖而不言祥然則隂陽五行之氣獨能為妖孽而不能為禎祥乎其亦不達理矣雖然妖祥之説固未易言也治世則鳯凰見故有虞之時有来儀之祥然漢桓帝元嘉之初靈帝光和之際鳯凰亦屢見矣而桓靈非治安之時也誅殺過當其應為恒寒故秦始皇時有四月雨雪之異然漢文帝之四年亦以六月雨雪矣而漢文帝非滛刑之主也斬蛇夜哭在秦則為妖在漢則為祥而槩謂之龍蛇之孽可乎僵樹蟲文在漢昭帝則為妖在宣帝則為祥而槩謂之木不曲直可乎前史於此不得其説於是穿鑿附㑹强求證應而冞有所不通竊甞以為物之反常者異也其祥則為凰凰麒麟甘露醴泉慶雲芝草其妖則山崩川竭水湧地震豕禍魚孽妖祥不同然皆反常而罕見者均謂之異可也故今取歴代史五行志所書并旁搜諸史本紀及𫝊記中所載祥瑞隨其朋𩔖附入各門不曰妖不曰祥而總名之曰物異如恒雨恒𤾉恒燠恒寒恒風水潦火災之屬俱妖也不可言祥故仍前史之舊名至如魏晉時魚集武庫屋上前史所謂魚孽也若周武王之白魚入舟則祥而非孽然妖祥雖殊而其為異一爾故均謂之魚異秦孝公時馬生人前史所謂馬禍也若伏羲之龍馬負圖則祥而非禍然妖祥雖殊而其為異亦一爾故均謂之馬異其餘鳥獸昆蟲草木金石以至童謡詩䜟之屬前史謂之羽蟲毛蟲龍蛇之孽或曰詩妖華孽今所述皆並載妖祥故不曰妖不曰孽而均以異名之其豕禍䑕妖則無祥可述故亦仍前史之舊名至於木不曲直者木失其常性而為妖如桑榖共生之𩔖是也若雨木冰乃寒氣脇木而成氷其咎不在木也而劉向以雨木冰為木不曲直華孽者花失其常性而為妖如冬桃李華之𩔖是也若冰花乃冰有異而結花其咎不在花也而唐志以冰花為華孽二者俱失其倫𩔖今革而正之俱以入恒寒門附雨雹之後又前志以䑕妖為青眚青祥物自動為木沴金物自壊為金沴木其説俱後學所未諭今以䑕妖青眚各自為一門而自動自壊直以其事名之庶覧者易曉云作物異考第二十二凡二十卷昔堯時禹别九州至舜分為十二州周職方復分為九州而又與禹異漢承秦分天下為郡國而復以十三州統之晉時分州為十九自晉以後為州冞多所統冞狭且建治之地亦不一所姑以揚州言之自漢以来或治歴陽或治壽春或治曲阿􅂉治合肥或治建業而唐始治廣陵至南北分裂之後務為夸大僑置諸州以㑹稽為東揚京口為南徐廣陵為南兖歴陽為南豫歴城為南冀㐮陽為南雍魯郡在禹跡為徐州而漢則屬豫州所領陳留在禹跡為豫州而晉則屬兖州所領離析磔裂循名失實而禹跡之九州冞不復可考矣夾漈鄭氏曰州縣之設有時而更山川之形千古不易故禹貢分州必以山川定疆界使兖州可移而濟河之兖州不可移梁州可遷而華陽黒水之梁州不可遷故禹貢為萬世不易之書後之作史者主於郡縣故州縣移易其書遂廢矣善哉言也杜氏通典亦以歴代郡縣析於禹九州之中今所論著九州則以禹跡所統為準沿而下之府州軍監則以宋朝所置為準泝而上之而備歴代之沿革焉至冀之幽朔雍之銀夏南粤之交趾元未甞入宋之職方者則以唐郡為準追考前代以補其缺而於每州總論之下復各為一圖先以春秋時諸國之可考者分入九州次則及秦漢晉隋唐宋所分郡縣考其地理悉以附禹九州之下而漢以来各州刺史州牧所領之郡其不合禹九州者悉改而正之作輿地考第二十三凡九卷昔先王疆理天下制立五服所謂蠻夷戎狄其在要荒之内九州之中者則被之聲教疆以戎索唐虞三代之際其詳不可得而知矣春秋所録如蠻則荆舒之屬也夷則莱夷之屬也戎則山戎北戎陸渾支駒之屬也狄則赤狄白狄臯落鮮虞之屬也載之􅀴𫝊如齊桓之所攘魏絳之所和其種𩔖雖曰戎狄而皆錯䖏於華地故不容不有以制服而羈縻之至於沙磧之濵瘴海之外固未甞窮兵黷武絶大漠踰懸度必欲郡縣其部落衣冠其旃毳以震耀當時而誇示後世也秦始皇既并六國始北却匈奴南取百粤至漢武帝時東并朝鮮西收甘凉南闢交趾珠厓北斥朔方河南以至車師大宛夜郎昆明之屬俱遣信使齎重賄招来而羈置之俾得通於上國窺其廣大割齊民以附夷狄弊所恃以事無用自是之後世謹梯航歴代載記所叙其風氣之差殊習俗之詭異可考而索至其世代𫝊授之詳則固不能以備知也作四裔考第二十四凡二十五卷文獻通考自序欽定四庫全書史部十三文獻通考總目録政書𩔖一通制之屬卷第一田賦考凡七卷厯代田賦之制有唐至西漢卷第二厯代田賦之制東漢至唐太宗卷第三厯代田賦之制唐元宗至後唐卷第四厯代田賦之制後晉至宋神宗卷第五厯代田賦之制宋哲宗至寧宗卷第六水利田卷第七屯田官田籍田附卷第八錢幣考凡二卷歴代錢幣之制太皥至唐卷第九歴代錢幣之制後唐至宋卷第十戸口考凡二卷歴代戸口丁中賦役夏至五代卷第十一歴代戸口丁中賦役宋奴婢傭賃品官占戸卷第十二職役考凡二卷歴代鄉黨版籍職役黄帝至宋神宗卷第十三厯代鄉黨版籍職役宋哲宗至寜宗復除卷第十四征𣙜考凡六卷征商關市卷第十五鹽鐡礬周至宋真宗卷第十六鹽鐡礬宋神宗至寧宗卷第十七𣙜酤禁酒卷第十八𣙜茶坑冶卷第十九雜征歛山澤津渡卷第二十市糴考凡二卷均輸市易和買卷第二十一常平義倉租稅社倉卷第二十二土貢考凡一卷厯代土貢進奉羡餘卷第二十三國用考凡五卷厯代國用周至宋太祖卷第二十四厯代國用宋真宗至寧宗卷第二十五漕運卷第二十六賑恤卷第二十七蠲貸卷第二十八選舉考凡十二卷舉士周至隋卷第二十九舉士唐卷第三十舉士梁至宋真宗卷第三十一舉士宋仁宗至欽宗卷第三十二舉士宋髙宗至度宗卷第三十三賢良方正卷第三十四孝廉武舉任子卷第三十五童科小學附吏道貲選進納方伎卷第三十六舉官虞至隋卷第三十七舉官唐卷第三十八舉官後唐至宋寧宗卷第三十九辟舉考課卷第四十學校