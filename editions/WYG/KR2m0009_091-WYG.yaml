body:
  text: 文獻通考卷九十一鄱陽馬端臨貴與著宗廟考一天子宗廟唐虞立五廟鄭𤣥按禮緯元命包云天子五廟二昭二穆與始祖而五夏氏因之夏太祖無功而不立自禹與二昭二穆也夏后氏世室堂修二七廣四修一五室三四步四三尺九階四旁兩夾忩白盛門堂三之二室三之一世室者宗廟也魯廟有世室注見眀堂門爾雅室有東西廂曰廟無東西廂有室曰寢䟽曰凡大室有東西廂夾室及前堂有序􅉹者曰廟但有大室者曰寢月令仲春云寝廟畢備鄭注云前曰廟後曰寝以廟是接神之處尊故在前寝衣冠所蔵之處對廟為卑故在後廟中路謂之唐堂途謂之陳詩曰中唐有甓至䟽曰廟中之路名唐堂下門徑名陳閍謂之門詩曰祝祭于祊殷制商書云七世之廟可以觀徳王制云天子七廟鄭元復云殷制六廟自契至湯二昭二穆殷人重屋堂修七尋堂崇三尺四阿重屋重屋者王宫正堂大寢匠人營國之制夏舉宗廟殷舉王宫周舉眀堂互相備舉王宫則宗廟與眀堂亦同此制注見眀堂門周制小宗伯掌建國之神位右社稷左宗廟庫門内雉門外之左右雉門中門也在中門之外外門之内詳見社門匠人營國左祖右社疏曰左右前後者據王宫所居處中而言之周人眀堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂上度以筵宫中度以尋野度以步涂度以􅁤廟門容大扄七个闈門容小扄參个注並見眀堂門小宗伯辨廟祧之昭穆祧遷主所蔵之廟自始祖之後父曰昭子曰穆疏曰祭法注祧之言超超然上去意以其逺廟為祧故云上去意也周以文武為二祧文王第稱穆武王第稱昭當文武後穆之木主入文王祧昭之木主入武王祧故云遷主所蔵之廟曰祧也云自始祖之後父曰昭子曰穆者周以后稷廟為始祖特立廟不毁即従不窋已後為數不窋父為昭鞠子為穆從此以後皆父為昭子為穆至文王十四世文王第稱穆也諸侯無二祧謂始封太祖廟為祧故聘禮云不腆先君之祧是太祖為祧也春官朱子曰昭如字㦯問昭穆之昭世讀為韶今従本字何也曰昭之為言眀也以其南面而嚮眀也其讀為韶先儒以為晉避諱而改之然禮書亦有作佋字者則假借而通用耳曰其為向眀何也曰凡廟主在本廟之室中皆東向及其祫於太廟之室中則唯太祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其向眀故謂之昭北向者取其深逺故謂之穆盖羣廟之列則左為昭右為穆祫祭之位則北為昭而南為穆也天子七廟三昭三穆與太祖之廟而七此周制七者太祖及文王武王之祧與親廟四太祖后稷二疏曰周所以七者以文王武王受命其廟不毁以為祧并始祖后稷及髙祖以下親廟四故為七也若王肅則以為天子七廟者謂髙祖之父及髙祖之祖廟為二祧并始祖及親廟四為七故聖證論肅難鄭云周之文武受命之王不遷之廟權禮所施非常廟之數殷之三宗宗其徳而存其廟亦不以為數凡七廟者皆不稱周室禮器云有以多為貴者天子七廟孫卿云有天下者事七世又云自上而下降殺以兩今使天子諸侯立廟並親廟四而止則君臣同制尊卑不别禮名位不同禮亦異數况其君臣乎穀梁𫝊曰天子七廟諸侯五家語云子羔問尊卑立廟制孔子云禮天子立七廟諸侯立五廟大夫立三廟又云逺廟為祧有二祧焉又儒者難鄭云祭法逺廟為祧鄭注周禮云遷主所蔵曰祧違經正文鄭又云先公之遷主蔵於后稷之廟先王之遷主蔵於文武之廟便有三祧何得祭法云有二祧難鄭之義凡有數條大略如此不能具載鄭必以為天子七廟唯周制者馬昭難王義云按喪服小記王者立四廟又引禮緯夏無太祖宗禹而已則五廟殷人祖契而宗湯則六廟周祖后稷宗文王武王則七廟自夏及周少不減五多不過七禮器云周旅酬六尸一人發爵則周七尸七廟眀矣今使文武不在七數既不同祭又不享嘗豈禮也哉故漢侍中盧植說云二祧謂文武曽子問當七廟無虗主禮器天子七廟堂九尺王制七廟盧植云皆據周言也穀梁𫝊天子七廟尹更始說天子七廟據周也漢書韋元成四十八人議皆云周以后稷始封文武受命石渠論白虎通云周以后稷文武特七廟又張融謹按周禮守祧職奄八人女祧每廟二人自太祖以下與文武及親廟四用七人姜嫄用一人適盡若除文武則奄少二人曽子問孔子說周事而云七廟無虗主若王肅數髙祖之父髙祖之祖廟與文武而九主當有九孔子何云七廟無虗主乎故云以周禮孔子之言為本穀梁及小記為枝葉韋元成石渠論白虎通為證驗七廟元說為長是融申鄭之意且天子七廟者有其人則七無其人則五若諸侯廟制雖有其人不得過五則此天子諸侯七五之異也王肅云君臣同制尊卑不别其義非也天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼建國封諸侯也置都立邑為卿大夫之采地及賜士有功者之地廟之言貌也宗廟者先祖之尊貌也祧之言超也超上去意也封土曰壇除地曰墠書曰三壇同墠王皇皆君也顯眀也祖始也名先人以君眀始者所以尊本之意也天子遷廟之主以昭穆合蔵於二祧之中諸侯無祧蔵於祖考之廟中聘禮曰不腆先君之祧是謂始祖廟也享嘗謂四時之祭天子諸侯為壇墠祈禱謂後遷在祧也既事則反其主於祧鬼亦在祧頋逺之於無事祫乃祭之爾春秋文公二年秋大事於太廟𫝊曰毁廟之主陳於太祖未毁廟之主皆升合食於太祖是也魯煬公者伯禽之子也至昭公定公久已為鬼而季氏禱之而立其宫則鬼之主在祧眀矣唯天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主爾其無祖考者庶士以下鬼其考王考官師鬼其皇考大夫適士鬼其顯考而已大夫祖考謂别子也凡鬼者薦而不祭王制曰大夫有田則祭無田則薦適士上士也官師中士下士庶士府史之属此適士云顯考無廟非也當為皇考字之誤也疏曰王立七廟者親四始祖一文武不遷合為七廟一壇一墠者七廟之外又立壇墠各一也起土為壇除地曰墠近者起土逺親除地示将去然也曰考廟者父廟曰考考成也謂父有成徳之美也曰王考廟者祖廟也王君也君考者言祖有君成之徳也祖尊於父故加君名也曰皇考廟者曽祖也皇大也君也曽祖轉尊又加大君之稱也曰顯考廟者髙祖也顯眀髙祖居四廟最上故以髙祖目之曰祖考廟者始祖也此廟為王家之始故云祖考也計其祖考之廟當在二祧壇墠之上應合在後始陳今在此言之者因皇考顯考同皆月祭之故此先言之也皆月祭之者此之五廟則並同月月祭之也逺廟為祧者逺廟謂文武廟也文武並在應遷之例故云逺廟也特為功徳而留故謂為祧祧之言超也言其超然上去也有二祧者有文武二廟不遷故云有二祧焉享嘗乃止者享嘗四時祭祀文武特留故不得月祭但四時祭而已去祧為壇者謂髙祖之父也若是昭行寄蔵武王祧若是穆行即寄蔵文王祧不得四時而祭之若有四時之祈禱則出就壇受祭也去壇為墠者謂髙祖之祖也不得在壇若有祈禱則出就墠受祭也髙祖之父既初寄在祧而不得於祧中受祭故曰去祧也髙祖之祖經在壇而今不得祭故云去壇也壇墠有禱焉祭之者在壇墠者不得享嘗應有祈禱於壇墠乃祭也無禱乃止者若無所祈禱則不得祭也去墠曰鬼者若又有從壇遷来墠者則此前在墠者遷入於石函為鬼雖有祈禱亦不及唯禘祫乃出晉張融評曰孝經為之宗廟以鬼享之公羊毁廟之主蔵乎太祖五年而再殷祭無去祧為壇去壇為墠去墠為鬼之制祭法所言皆衰世之法朱子曰王制祭法廟制不同以周制言之恐王制為是楊氏曰愚按祭法與王制不同王制天子七廟三昭三穆與太祖之廟而七祭法則序四親廟二祧太祖以辨昭穆王制諸侯五廟二昭二穆與太祖之廟而五祭法則云三親廟月祭髙太二廟享嘗以見隆殺王制大夫三廟一昭一穆與太祖之廟而三祭法但有三親廟而髙太無廟有二壇以為請禱之祭而已王制士一廟祭法則分適士二廟官師一廟又祭法有考王考皇考顯考祖考之稱王制則無之祭法有壇有墠㦯二壇無墠或一壇無墠王制則無之大抵王制略而祭法詳又按三壇同墠之說出於金縢乃是因有所禱而後為之非於宗廟之外預為壇墠以待他日之有禱也孝經為之宗廟以鬼享之非去墠而為鬼也如晉張融之說則祭法所言難以盡信陳氏禮書曰廟所以象生之有朝也寝所以象生之有寢也建之觀門之内不敢逺其親也位之觀門之左不忍死其親也家語曰天子七廟諸侯五廟自虞至周之所不變也是故虞書禋於六宗以見太祖周官守祧八人以兼姜嫄之宫則虞周七廟可知矣伊尹言七世之廟商禮也禮記荀卿穀梁皆言天子七廟不特周制也則自虞至周七廟又可知矣然存親立廟親親之至恩祖功宗徳尊尊之大義古之人思其人而愛其樹尊其人則敬其位况廟乎法施於民則祀之以勞定國則祀之况祖宗乎於是禮以義起而商之三宗周之文武漢之孝文孝武唐之神堯文皇其廟皆在三昭三穆之外厯世不毁此所謂不遷之廟非謂祧也鄭康成之徒以喪服小記言王者立四廟則謂周制七廟文武為二祧親廟四而已則文武不遷之廟在七廟内是臆說也王肅聖證論曰禮自上以下降殺以兩使天子諸侯皆親廟四則是君臣同䓁尊卑不别也又王祭殤五而下及無親之孫上不及無親之祖不亦詭哉王舜中劉歆論之於漢韓退之論之於唐皆與肅同盖理之所在者無異致也又曰父昭子穆而有常數者禮也祖功宗徳而無定法者義也故周於三昭三穆之外而有文武之廟魯於二昭二穆之外而有魯公之世室觀春秋𫝊稱襄王致文武胙於齊侯史記稱顯王致文武胙於秦孝公方是時文武固已逺矣襄王顯王猶且祀之則其廟不毁可知矣家語左𫝊稱孔子在陳聞魯廟火曰其桓僖乎以為桓僖親盡無大功徳而魯不毁故天災之其言雖涉於怪而理或有焉若然則魯公之室在所不毁可知矣王舜中劉歆王肅韓退之之徒皆謂天子祖功宗徳之廟不在七世之列特鄭康成以周禮守祧有八人小記王者立四廟則謂周制七廟文武為二祧親廟四而已是不知周公制禮之時文武尚為近廟其所以宗之之禮特起於後代也果所以宗之者在七廟内使繼世祖先間有豐功盛徳不下文武復在可宗之列則親廟又益殺乎理必不然祭法曰逺廟為祧則祧者兆也天子以五世六世之祖為祧所謂有二祧是也諸侯以始祖為祧所謂先君之祧是也鄭氏以祧為超去之超誤矣既曰超矣又以文武為不毁之祧何邪眀堂位曰魯公之廟文世室武公之廟武世室然武公之於魯徇宣王立庶之非以階魯國攻殺之禍而豐功懿徳不著於世自武至閔其廟已在可遷之列春秋成公六年二月立武宫昭公十五年有事於武宫左氏曰季文子以鞌之戰立武宫公羊曰武宫者何武公也立者不宜立也盖武宫立於成公之時厯襄及昭積世不毁故記史得以大之欲以比周之文武也朱子論古今廟制曰王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也顔師古曰父為昭子為穆孫復為昭昭眀也穆美也後以晉室諱昭故學者改昭為韶其制皆在中門之左外為都宫内各有寢廟别有門垣太祖在北左昭右穆以次而南晉博士孫毓議天子太祖百世不遷一昭一穆為宗亦百世不遷宗亦曰世室亦曰祧鄭注周禮守祧曰宗亦曰祧亦曰世室周禮有守祧之官鄭氏曰逺廟為祧周為文武之廟遷主蔵焉又曰遷主所蔵曰祧先公之遷主蔵於太祖后稷之廟先王之遷主蔵於文武之廟羣穆於文羣昭於武眀堂位有文世室武世室鄭氏曰世室者不毁之名二昭二穆為四親廟髙祖以上親盡則毁而遞遷昭常為昭穆常為穆昭之二廟親盡則毁而遷其主於昭之宗曽祖遷於昭之二新入廟者祔於昭之三而髙祖及祖在穆如故穆廟親盡放此新死者如當為昭則祔於昭之近廟而自近廟遷其祖於昭之次廟而於主祭者為曽祖自次廟遷其髙祖於昭之世室盖於主祭者為五世而親盡故也其穆之兩廟如故不動其次廟於主祭者為髙祖其近廟於主祭者為祖也主祭者沒則祔於穆之近廟而遞遷其上放此凡毁廟遷主改塗易檐示有所遷非盡毁也見穀梁𫝊及注諸侯則無二宗大夫又無二廟其遷毁之次則與天子同但毁廟之主蔵於太祖儀禮所謂以其班祔檀弓所謂祔於祖父者也曲禮云君子抱孫不抱子此言孫可以為王父尸子不可以為父尸鄭元云以孫與祖昭穆同也周制自后稷為太祖不窋為昭鞠為穆以下十二世至太王復為穆十三世至王季復為昭十四世至文王又為穆十五世至武王復為昭故書稱文王為穆考詩稱武王為昭考而左氏𫝊曰泰伯虞仲太王之昭也虢仲虢叔王季之穆也又曰管蔡魯衛文之昭也䢴晉應韓武之穆也盖其次序一定百世不易雖文王在右武王在左嫌於倒置而别有所謂門垣足以各全其尊初不以左右為尊卑三代之制其詳雖不得聞然其大略不過如此漢承秦敝不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆韋元成𫝊云宗廟異處昭穆不序但考周制先公廟在岐文王在豐武王在鎬則都宫之制亦不得為與漢亦無甚異未詳其說貢禹韋元成匡衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢眀帝又欲遵儉自抑遺詔毋起寢廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆為同堂異室之制見後漢眀帝紀祭祀志又云其後積多無别而顯宗但為陵寢之號自是以来更厯魏晉下及隋唐其間非無奉先思孝之君据經守禮之臣而皆不能有所裁正其弊至使太祖之位下同子孫而更僻處於一隅既無以見其為七廟之尊羣廟之神則又上厭祖考而不得自為一廟之主以人情而論之則生居九重窮極壮麗而沒祭一室不過尋丈之間甚􅂉無地以容鼎爼而隂損其數孝子順孫之心於此宜亦有所不安矣肆我神祖始獨慨然深詔儒臣討論舊典盖将以逺迹三代之隆一正千古之繆甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書以詔萬世今獨具見於陸氏之文者為可考耳然其所論昭穆之說亦未有定論圗說在後獨原廟之制外為都宫而各為寢廟門垣乃為近古但其禮本不經儀亦非古故儒者得以議之如李清臣所謂略於七廟之室而為祠於佛老之側不為木主而為之象不為禘祫烝嘗之祀而行一酌奠之禮楊時所謂舎二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也不議復此而徒欲廢彼亦安得為至當之論哉又曰今公私之廟皆為同堂異室以西為上之制而無左昭右穆之次一有遞遷則羣室皆遷而新死者當入於其禰之故室矣此乃禮之大節與古不同而為禮者猶執祔於祖父之文似無意義然欲遂變而祔於禰廟則又非愛禮存羊之意竊意與其依違牽制而均不免為失禮曷若獻議於朝盡復公私之廟皆為左昭右穆之制而一洗其繆之為快乎又論漢同堂異室廟及原廟曰五峯胡仁仲論漢文帝之短喪其失不在文帝而景帝當任其責予於不起寝廟之詔則以為眀帝固不得為無失然使章帝有魏顆之孝其羣臣有宋仲㡬楚子囊之忠則於此必有䖏矣况以一時之亂命而壊千古之彛制其事體之輕重又非如三子之所正者而已邪然古今諸儒未有斥其非者而徒知論恵帝叔孫通作原廟之罪夫原廟誠不當作要必復古宗廟之制然後可得而議爾㦯曰周公祀文王武王於洛邑非原廟邪曰此固禮之變也然設於别都而不設於京師及所幸郡國又不聞其以果獻之䙝禮施焉則亦與漢異矣又語録曰如今士大夫家都要理㑹古禮今天下有二件極大底事恁地循襲其一是天地同祭於南郊其一是太祖不特立廟與諸祖同一廟又曰天地合祭於南郊及太祖不别立廟室千五六百年無人整理韋元成王者五廟圗王者始受命諸侯始封之君皆為太祖以下五世而迭毁毁廟之主蔵於太祖五年而再殷祭韋元成等周廟圖昭武王世室昭昭太祖后稷穆文王世室穆穆周之所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七劉歆宗無數圗武世室昭昭昭太祖后稷文世室穆穆穆七者其正法數可常數者宗不在此數中宗變也茍有功徳則宗之不可預為設數故殷有三宗周公舉之以勸成王由是言之宗無數也朱子曰劉歆說文武為宗不在七廟數中此說是又曰商之三宗若不是别立廟只是親廟時何不胡亂將三箇来立如何恰限取祖甲太戊髙宗為之那箇祖有功宗有徳天下後世自有公論不以㨂擇為嫌所以名之曰幽厲雖孝子慈孫百世不能改那箇好底自是合當宗祀如何毁得如今若道三宗只是親廟則是少了一箇親廟了周世數圗稷不窋武王公劉康王皇僕穆王毁隃懿王髙圉夷王公叔宣王王季鞠王成慶節昭王差弗共王公非孝王亞圉厲王太王幽王文王周七廟圗稷髙圉以上藏主公叔公季亞圉古公文王時稷亞圉以上藏主公叔王季太王文王武王時稷公叔以上藏主王季武王太王文王成王時稷太王以上藏主王季武王文王成王康王時稷王季以上藏主武文康成昭王時稷文世室武成康昭穆王時稷武世室文世室康成穆昭共王時稷武世室文成康昭穆共懿王時稷武康文成穆昭懿共孝王時稷武康昭文成穆共懿孝夷王時稷武康穆文成昭懿共夷孝厲王時稷武康穆文成懿孝夷厲宣王時稷武康文成夷孝宣厲幽王時周九廟圗稷公非以上藏主髙圉公叔王季亞圉太王文王武王時稷髙圉以上藏主公叔王季武王亞圉太王文王成王時稷亞圉以上藏主公叔王季武王太王文王成王康王時稷公叔以上藏主王季武王康王太王文王成王昭王時稷太王以上藏主王季武王康王文王成王昭王穆王時稷王季以上藏主武文康成穆昭共王時稷文世室武成康昭穆共懿王時稷武世室文世室康成穆昭懿共孝王時稷武成文康昭穆共懿孝夷王時稷武康文成穆昭懿共夷孝厲王時稷武康昭文成穆共懿孝夷厲宣王時稷武康穆文成昭懿共夷孝宣厲幽王時朱子曰韋元成劉歆廟數不同班固以歆說為是今亦未能決其是非姑兩存之至於遷毁之序則昭常為昭穆常為穆假令新死者當祔昭廟則毁其髙祖之廟而祔其主於左祧遷其祖之主於髙祖之故廟而祔新死者於祖之故廟即當祔扵穆者其序亦然盖祔昭則羣昭皆動而穆不移祔穆則羣穆皆移而昭不動故虞之眀日祔於祖父盖将代居其處故為之祭以告新舊之神也今以周室世次為圗如右所謂髙祖以上親盡當毁虞之眀日祔於祖父者也元豐議禮何洵直張璪以此為說而陸佃非之曰昭穆者父子之號昭以眀下為義穆以恭上為義方其為父則稱昭取其昭以眀下也方其為子則稱穆取其穆以恭上也豈可膠哉壇立於右墠立於左以周制言之則太王親盡去右壇而為墠王季親盡去左祧而為壇左右遷徙無嫌又曰顯考王考廟與左祧為昭皇考考廟與右祧為穆如曰成王之世武王為昭文王為穆則武不入考廟而入王考廟矣此皆為說之誤殊不知昭穆夲以廟之居東居西主之向南向北而得名初不為父子之號也必曰父子之號則穆之子又安得復為昭哉壇墠之左右亦出先儒一時之說禮􅀴非有眀文也政使果然亦為去廟之後主藏夾室而有禱之祭且壇墠又皆一而已昭不可以越壇而徑墠穆不可以有壇而無墠故迭進而無嫌非若廟之有昭穆而可以各由其序而逓遷也又况昭穆之分自始封以下入廟之時便有定次後雖百世不復移易而其尊卑則不以是而可紊也故成王之世文王為穆而不􅊣其尊於武武王為昭而不􅊣其卑於文非謂之昭即為王考謂之穆即為考廟也且必如佃說新死者必入穆廟而自其父以上穆遷於昭昭遷於穆祔一神而六廟皆為之動則其祔也又何不直祔於父而必隔越一世以祔於其所未應入之廟乎佃又言曰假令甲於上世之次為穆今合堂同食寔属父行乙於上世之次為昭今合堂同食寔属子行則甲宜為昭乙宜為穆豈可遽引千載以来世次覆令甲為右穆乙為左昭以紊父子之序乎此亦不曉前說之過也盖昭穆之次既定則其子孫亦以爲序禮所謂昭與昭齒穆與穆齒𫝊所謂太王之昭王季之穆文之昭武之穆者是也如必以父為昭而子為穆則太伯虞仲乃太王之父而文王反為管蔡魯衛之子矣而可乎哉且一昭穆也既有上世之次又有今世之次則所以序其子孫者無乃更易不定而徒為紛紛乎曰然則廟之遷次如圗可以見矣子孫之序如佃所駮得無真有難處者邪曰古人坐次㦯以西方為上㦯以南方為上未必以左為尊也且又安知不如時祫之位乎周大祫及時祫圗見於祫祭禮守祧掌守先王先公之廟祧注疏見下守蔵條若将祭祀其廟則有司修除之其祧則守祧黝堊之黝於糾反鄭音幽堊烏路反或烏洛本㦯作惡同之廟祭此廟也祧祭遷主有司宗伯也修除黝堊互言有司恒主修除守祧恒主黝堊鄭司農云黝讀為幽黒也堊白也爾雅曰地謂之黝􅉹謂之堊䟽曰凡廟舊皆修除黝堊祭更修除黝堊示新之敬也今将祭而云修除知祭此廟也遷主蔵於祧春官𨽻僕掌五寢之埽除糞洒之事五寢五廟之寢也周天子七廟唯祧無寢詩云寢廟繹繹相連貌也前曰廟後曰寢氾埽曰埽埽席前曰拚洒灑也鄭司農云洒當為灑拚方問反疏曰必湏寢者祭在廟薦在寢祭祀修寢於廟祭寢㦯有事焉月令凡新物先薦寢廟生疏曰薦只在寢不在廟連廟言者欲見是廟之寢非人之寢也官夏𫝊山節藻梲復廟重檐刮楹逹鄉反坫出尊崇坫康圭疏屏天子之廟飾也梲専恱反復音福重平聲檐以占反刮古八反鄉許亮反坫丁念反康音抗又如字疏音疎廟山節刻欂盧為山也藻梲畫侏儒柱為藻文也復重屋也重檐重承壁材也刮刮摩也鄉牖属謂夾戸窓也每室八窓為四逹反坫反爵之坫也出尊當尊南也唯兩君為好既獻反爵於其上禮君尊於兩楹之間崇髙也康讀為亢龍之亢又為髙坫亢所受圭奠於上焉屏謂之樹今桴思也刻之為雲氣蟲獸如今􅇅上為之矣欂音博又皮麥反一旁各反徐薄厯反字林平碧反好呼報反桴音浮者疏曰山節謂欂盧刻為山形則今之斗拱也藻梲謂侏儒柱畫為藻文梁上短柱也復廟者上下重屋也重檐重承壁材也謂就外檐下壁復安板檐以辟風雨之灑壁故云重檐重承壁材刮楹者刮摩也楹柱也以宻石摩柱逹鄉者逹通也鄉謂窓牖也每室四戶八忩窓戶皆相對以牖戶通逹故曰逹鄉也反坫者兩君相見反爵之坫也築土為之在兩楹間近南人君飲酒既獻反爵於坫上故謂之反坫也出尊者尊在兩楹間坫在尊南故云出尊崇坫康圭者崇髙也亢舉也為髙坫受賔之圭舉於其上也疏屏者疏刻也屏樹也謂刻於屏樹為雲氣蟲獸也天子之廟飾也者自山節以下皆天子廟飾也屏謂之樹釋宫文漢時謂屏為桴思故云今桴思解者以為天子外屏人臣至屏俯伏思念其事按匠人注云城隅為角桴思也漢時東􅇅桴思災以此諸文参之則桴思小樓也故城隅􅇅上皆有之然則屏上亦為屋以覆屏􅉹故稱屏曰桴思侏音朱眀堂位清廟茅屋以茅飾屋著儉也清廟肅然清靜之稱坫疏曰眀堂位曰山節藻梲復廟重檐刮楹逹鄉反出尊崇坫康圭疏屏天子之廟飾也其飾備物盡文不應以茅為覆得有茅者杜云以茅飾屋著儉也以茅飾之而已非謂多用其茅總為覆盖猶童子垂髦及蔽膝之属示其存古耳詩頌清廟者祀文王之歌故鄭元以文王解之言天徳清眀文王象焉故稱清廟此則廣指非獨文王故以清廟解之昭其儉也示儉春秋桓公二年左氏傳右宗廟制度措之廟立之主曰帝疏曰主用木五經異議云主状正方穿中央逹四方天子長尺二寸諸侯長一尺曰帝者天神曰帝今號此主同於天神故題稱帝云文帝武帝之類也藍田吕氏曰考之禮經未見有以帝名者惟易稱帝乙亦不知其何帝獨司馬遷史記載夏殷之王皆以帝名疑殷人祔廟稱帝遷據世本而言當有所考至周有諡始不名帝曲禮下孔子曰當七廟五廟無虗主虗主者唯天子崩諸侯薨與去其國與祫祭於祖為無主耳吾聞諸老聃曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟老聃古夀考者之號與孔子同時藏諸主於祖廟象有凶事者聚也卒哭成事先祔之祭名也疏曰卒哭主各反其廟者為眀日祔時湏以新死者祔祭於祖故祖主先反廟也君去其國太宰取羣廟之主以從禮也鬼神依人者也祫祭於祖則祝迎四廟之主主出廟入廟必蹕蹕止行者者疏曰主天子一尺二寸諸侯一尺出廟謂出己廟而往太祖廟入廟者謂從太祖廟而反還己廟若在廟門之外當主出入之時必湏蹕止行人若主入太祖廟則不湏蹕也似􅐦於尊者若有喪及去國無蹕也曽子問曰喪有二孤廟有二主禮歟怪時有之孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始也疏曰亟數也偽假也言作假主以行而反藏於祖廟故有二主也舉兵謂南伐楚北伐山戎西伐白狄故謂之數舉兵也昭公十八年宋衛陳鄭災左氏曰鄭子産使祝史徙主祏於周廟告於先君祏廟主石函周廟厲王廟也有火災故合羣主於祖廟易救䕶疏曰每廟木主皆以石函盛之當祭則出之事畢則納於函蔵於廟之北壁之内所以辟火災也文二年𫝊云鄭祖厲王故知鄭之周廟是厲王廟也右主禮曰君子抱孫不抱子此言孫可以為王父尸子不可以為父尸以孫與祖昭穆同也祭疏曰凡稱禮曰者皆舊禮語也曽子問云成喪者必有尸尸必以孫孫幼則使人抱之無孫則取於同姓可也是有抱孫之法也言無孫取於同姓可者謂無服内之孫取服外同姓也天子至士皆有尸特牲是士禮少牢是大夫禮並皆有尸又祭統云君執圭瓉祼尸是諸侯有尸也又守祧職云若将祭祀則各以其服授尸是天子有尸也天子以下宗廟之祭皆用同姓之嫡故祭統云祭之道孫為王父尸所使為尸者於祭者為子行父北面而事之注云子行猶子列也祭祖則用孫列皆取於同姓之嫡孫也天子諸侯之祭朝事延尸於戶外是以有北面事尸之禮也雖取孫列用卿大夫為之鄭注特牲禮大夫士以孫之倫為尸是也言倫眀非己孫皇偘用崔靈恩義以大夫用己孫為尸非也曲禮上楊氏曰特牲饋食筮尸與疏曰大夫士以孫之倫為尸皆取無爵者無問成人幼皆得為之若天子諸侯雖用孫之倫取卿大夫有爵者為之故鳬鷖祭尸之詩皆言公尸又春秋宣公八年壬午猶繹公羊子何休註曰禮天子以卿為尸諸侯以大夫為尸卿大夫以下以孫為尸又鳬鷖詩公尸来燕来寜疏曰其尸以卿大夫爲之孫為王父尸所使為尸者於祭者子行也子行猶子列也祭祖則用孫列皆取於同姓之適孫也祭統為人子者祭祀不為尸尊者之䖏為其失子之道然則尸卜筮無父者曲疏曰尸代尊者之處人子不為也禮上曽子問曰祭必有尸乎孔子曰祭成喪者必有尸尸以孫孫幼則使人抱之無孫則取於同姓可也疏曰以其成人威儀既備有為人父之道不可無尸祭詳見宗廟殤條舉斚角詔妥尸古者尸無事則立有事而后坐也尸神象也祝将命也妥他果反奠妥安坐也尸始入舉斚若奠角将祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之也天子奠斚諸侯奠角古謂夏時也牲郊特夏立尸而卒祭夏禮尸有事乃坐殷坐尸無事猶坐周坐尸詔侑武方其禮亦然其道一也侑音又武音無殷言此亦周所因於也武當為無聲之誤也方猶常也告尸行節勸尸飲食無常若孝子之為也孝子就養無方養羊讓反周旅酬六尸使之相酌也后稷之尸發爵不受旅疏見祫祭九獻條君迎牲而不迎尸見宗廟篇下祭禮禮器總義朱子曰神主之位東向尸在神主之北又曰古人用尸本與死者是一氣又以生人精神去交感他那精神是㑹附著他歆享又曰古人立尸必隔一位孫可以為祖尸子不可以為父尸以昭穆不可亂也㦯問古人合祭時每位有尸否曰固是周家旅酬六尸是每位各有尸也古者主人獻尸尸酢主人開元禮猶如此每位一獻畢則尸便酢主人主人受酢已又獻第二位不知是甚時緣甚事後廢了到本朝都把這様禮數併省了又曰古人不用尸則有隂厭書儀中所謂闔門垂簾是也欲使神靈厭飫之也又曰杜佑說上古時中國與夷狄一般後世聖人改之有未盡者尸其一也盖今蠻夷洞中亦有此但擇美丈夫為之不問族類事見杜佑理道要訣末篇楊氏曰愚按曲禮孫為王父尸疏云新喪虞祭之時男女各立尸故士虞禮云男男尸女女尸至祔祭之後止用男之一尸以其祔祭漸吉故也凡吉祭祗用一尸故祭統云設同几是也又按司几筵每敦一几注云周禮雖合葬及同時在殯皆異几體寔不同祭於廟同几精氣合故也右尸守祧掌守先王先公之廟祧其遺衣服藏焉廟謂太祖之廟及三昭三穆遷主所藏曰祧先公之遷主藏於后稷之廟先王之遷主蔵於文武之廟遺衣服大斂之餘也疏曰按士喪禮云小斂十九稱不必盡服則小斂亦有餘衣必知據大斂之餘者小斂之餘至大斂更用之大斂餘乃留之若将祭祀則各以其服授尸尸當服卒者之上服以象生時疏曰既言卒者上服則先王之尸服衮冕先公之尸服鷩冕也若然士爵弁以助祭祭宗廟服元端而士虞特牲尸不服爵弁者爵弁是助祭諸侯廟中乃服之士尸還在士廟故尸還服元端為上服也曽子問云尸弁冕而出卿大夫皆下之註云弁冕者君之先祖或有為大夫士者則是先君之先祖為士尸服卒者上服不服元端而服爵弁者爵弁本以助祭在君廟君先祖雖為士今為尸還在君廟中故服爵弁不服元端既祭則藏其隋與其服隋許恚反劉相恚反依元謂隋尸所祭肺脊黍稷之属藏之以神疏曰按特牲禮註云肺祭刌肺是其隋者彼不言脊似誤所以誤有脊者特牲禮云佐食舉肺脊以授尸尸授振祭齊之是以於此誤有脊但彼是尸食而舉者故有脊此隋祭不合有也春官小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱鄭司農云志謂記也春秋𫝊所謂周志國語所謂鄭書之属是也史官主書故韓宣子聘於魯觀書太史氏繫世謂帝繫世夲之属是也小史主㝎之瞽矇諷誦之先王死日為忌名為諱故書奠為帝杜子春云帝當為奠讀為㝎元謂王有事祈祭於其廟世疏曰云奠繫世者謂定帝繫世本云辨昭穆者帝繫夲之上皆有昭穆親疏故湏辨之天子謂之帝繫諸侯謂之世本按瞽矇註云奠繫世謂帝繫諸侯卿大夫世本之属也云先王死日爲忌名為諱者告王當避此二事也天府掌祖廟之守藏與其禁令祖廟始祖后稷之廟其寳物世𫝊守之若魯寳玉大弓者不疏曰所守藏者即下文玉鎮以下是也禁令謂禁守得使人妄入之等也若魯寳玉大弓者按春秋定八年公羊傳云寳者何璋判白弓繡質是世傳守者也凡國之玉鎮大寳器藏焉若有大祭則出而陳之既事藏之玉鎮大寳噐玉瑞玉器之美者禘祫陳之以華國也上春釁寳鎮及寳器上春孟春也釁謂殺牲以血釁之月疏曰殺牲取血釁之若令上春釁龜筴䓁也若遷寳則奉之奉猶送也寳疏曰此遷謂王者遷都若平王東遷則寳亦遷天府奉送之於彼新廟之天府藏之如故也同上𫝊桓公二年取郜大鼎于宋納于太廟左氏曰非禮也臧哀伯諌不􅃪襄公六年齊侯滅萊獻萊宗器于襄宫右宗廟守藏文獻通考卷九十一
