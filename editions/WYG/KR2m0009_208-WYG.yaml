body:
  text: 文獻通考卷二百八鄱陽馬端臨貴與著經籍考三十五子儒家漢藝文志儒家者流蓋出於司徒之官助人君順陰陽明教化者也游心於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言於道為最高孔子曰如有所譽者其有所試矣唐虞之隆殷周之盛仲尼之業已試之而效者也然惑者既失精㣲而辟者又隨時抑揚違離道本茍以譁衆取寵後進循之是以五經乖析儒學寖衰此則辟儒之患也辟讀曰僻隋經籍志曰儒者所以助人君明教化者也聖人之教非家至而户說故有儒者宣而明之其大抵本於仁義及五常之道黄帝堯舜禹湯文武咸由此則周官太宰以九兩繫邦國之人其四曰儒是也其後陵夷衰亂儒道廢缺仲尼祖述前代修正六經三千之徒並受其義至於戰國子思孟軻荀卿之流宗而師之各有著述發明其指所謂中庸之教百王不易者也俗儒為之不顧其本茍欲譁衆多設問難便辭巧說亂其大體致令學者難曉故曰博而寡要漢志五十三卷八百三十六篇入楊雄一家三十八家隋志六十二部五百三十卷通計亡書合六十七部六百九卷唐志六十九家九十二部七百九十一卷陸善經以下不著録三十九家三百七十一卷宋三朝志五十一部三百七十一卷宋兩朝志二十部一百四十三卷宋四朝志二十四部一百九十七卷宋中興志九十六家一百一十八部八百五十七卷曽子二卷鼂氏曰曽子者魯曽參也舊稱曽參所撰其大孝篇中乃有樂正子春事當是其門人所纂爾漢藝文志曽子十八篇隋志曽子二卷目一卷唐志曽子二卷今此書亦二卷凡十篇蓋唐本也視漢亡八篇視隋亡目一篇考其書俱已見於大戴禮世人久不讀之文字謬誤為甚乃以大戴禮參校之其所是正者至於千有餘字云高氏曰曽參與公明儀樂正子春單居離曽元曽華之徒講論孝行之道天地事物之原凡十篇自修身至於天圓已見於大戴禮篇為四十九為五十八他又雜見於小戴禮略無少異是固後人掇拾以為之者歟劉中壘父子奏漢七略已不能致辨於斯况他人乎然董仲舒對䇿已引其書有曰尊其所聞則高明行其所知則光大則書固在董氏之先乎又其言曰君子愛日及時而成難者不避易者不從旦就業夕自省可謂守業年三十四十無藝則無藝矣五十不以善聞則無聞矣質諸吾日三省吾身何其辭費邪周氏渉筆曰曽子一書議道褊廹又過於荀卿蓋戰國時為其學者所論也孔子言七十而從心所欲不踰矩正指聖境妙處此書遽謂七十而未壊雖有後過亦可以免七十而壊與否已不置論而何以為過何以為免聖門家法無此語也陳氏曰凡十篇具大戴禮後人從其中録出别行慈湖楊簡注子思子七卷鼂氏曰魯孔伋子思撰載孟軻問牧民之道何先子思子曰先利之孟軻曰君子之教民者亦仁義而已何必曰利子思曰仁義者固所以利之也上不仁則不得其所上不義則樂為詐此為不利大矣故易曰利者義之和也又曰利用安身以崇德也此皆利之大者也温公采之著於通鑑夫利者有二有一已之私利有衆人之公利子思所取公利也其所引援易之言是也孟子所鄙私利也亦易所謂小人不見利不勸之利也言雖相反而意則同不當以優劣論也楊倞注荀子二十卷鼂氏曰趙荀况撰漢劉向校定除其重複著三十二篇為十二卷題曰新書稱卿趙人名况當齊宣王威王之時聚天下賢士稷下是時荀卿為秀才年十五始來遊學至齊襄王時荀卿最為老師後適楚相春申君以為蘭陵令已而歸趙按威王死其子嗣立是為宣王楚考烈王初黄歇始相年表自齊宣王元年至楚考烈王元年凡八十一年則荀卿去楚時近百嵗矣楊倞唐人始為之注且更新書為荀子易其篇第析為二十卷其書以性為惡以禮為偽非諫諍傲災祥尚强霸之道論學術則以子思孟軻為餙邪說文姦言與墨翟惠施同詆焉論人物則以平原信陵為輔拂與伊尹比干同稱焉其指往往不能醇粹故後儒多疵之云昌黎韓氏曰荀氏書考其辭時若不粹要其歸與孔子異者鮮矣抑猶在軻雄之間乎孔子刪詩筆削春秋合於道者著之離於道者黜去故詩春秋無疵余故削荀氏之不合者附於聖人之籍亦孔子之志歟孟子醇乎醇者也荀與楊大醇而小疵東坡蘇氏曰昔者常怪李斯事荀卿既而焚滅其書大變古先聖王之法於其師之道不啻若冦讎及今觀荀卿之書然後知李斯之所以事秦者皆出於荀卿而不足怪也荀卿者喜為異說而不讓敢為高論而不顧者其言愚人之所驚小人之所喜也子思孟軻世之所謂賢人君子也荀卿獨曰亂天下者子思孟軻也天下之人如此其衆也仁人義士如此其多也荀卿獨曰人性惡桀紂性也堯舜偽也由是觀之意其為人必也剛愎不遜而自許太過彼李斯者又特甚者耳今夫小人之為不善猶必有所顧忌是以夏商之亡桀紂之殘暴而先王之法度禮樂刑政猶未至於絶滅而不可考者是桀紂猶有所存而不敢盡廢也彼李斯者獨能奮而不顧焚燒夫子之六經烹滅三代之諸侯破壊周公之井田此亦必有所恃者矣彼見其師歴詆天下之賢人自是其愚以為古先聖王皆無足法者不知荀卿特以快一時之論而荀卿亦不知其禍之至於此也其父殺人報仇其子必且行刦荀卿明王道述禮樂而李斯以其學亂天下其高談異論有以激之也孔孟之論未嘗異也而天下卒無有及者茍天下果無有及者則尚安以求異為哉程子曰荀卿才高其過多揚雄才短其過少韓子稱其大醇非也若二子可謂大駁矣且性惡一句大本已失朱子語録曰荀子儘有好處勝似掦子然亦難㸔㸔來荀卿亦是剛明底人只是粗陳氏曰漢志作孫卿子者避宣帝諱也至楊倞始復改為荀分為二十卷而注釋之淳熈中錢佃耕道用元豐監本參校江西漕司其同異著之篇末凡二百二十六條視他本最為完善董子一卷鼂氏曰周董無心撰皇朝吳秘注無心在戰國時著書闢墨子賈誼新書十卷崇文總目漢賈誼傳本七十二篇劉向刪定為五十八篇隋唐皆九卷今别本或為十卷鼂氏曰誼著事勢連語雜事凡五十八篇考之漢書誼之著書未嘗散軼然與班固所載時時不同固紀云掇其切於世者容有潤益刋削無足怪也獨其說經多異義而詩尤甚以騶虞為天子之囿官以靈䑓為神靈之靈與毛氏殊不同學者不可不知也高氏子略曰皮日休讀賈誼新書嘆其心切其憤深其辭隐而麗其藻傷而雅惟蘇公軾以為非才之難所以自用者實難惜乎賈生王者之佐而不能自用其才觀其過湘作賦以弔屈原紆鬱憤悶有逺舉之志其後卒以自傷哭泣至於天絶是亦不善處窮者矣夫謀之一不見用安知終不復用嗚呼此東坡以志量才識論誼者非誼所及也朱子語録曰賈誼新書除了漢書中所載餘亦難得粹者㸔得來只是賈誼一雜記藁耳中間事事有些箇問新書曰此賈誼平日記録藁草也其中細碎俱有治安䇿中所言多在焉陳氏曰漢志五十八篇今書首載過秦書末為弔湘賦餘皆録漢書語且畧節誼本傳於第十一卷中其非漢書所有書輒淺駁不足觀决非誼本書也揚子法言十三卷鼂氏曰漢揚雄撰晉祠部郎中李軌注雄好古學見諸子各以其知舛駁不與聖人同是非頗謬於經故人時有問雄者常用法言應之譔此以象論語號曰法言每篇復為序贊以發其大意然雄之學自得者少其言務擬聖人靳靳然若影之守形既鮮所發明又往往違其本指正古人所謂畫者謹毛而失貎者也程子曰揚子無自得者也故其言蔓衍而不斷優柔而不决其論則曰人之性善惡混葢雄規矩窄狹道即性也言性已錯更何所得陳氏曰凡十三篇篇各有序本在卷末如班固叙傳然今本分冠篇首自宋咸始李軌注本歴景祐嘉祐治平三降詔更監學館閣兩制校定然後板行與建寜四注本不同温公集注法言十三卷鼂氏曰温公集晉李軌唐桞宗元國朝宋咸吳秘注公自言少好此書歴年已多今輙采諸家所長附以已意名集注李祠部注本及音義最為精詳宋吳亦據李本而文多異同今參以漢書取其通者以為定本先審其音乃解其義云太元經十卷鼂氏曰漢掦雄子雲撰雄作此書當時已誚其艱深其後字讀多異予嘗以諸家本參校不同者疏於其上且發䇿以問諸生云揚雄凖易作太元經其自序稱元盛矣而諸儒或以為猶吳楚僭王當誅絶之罪或以為度越老子之書大抵譽之者過其實毁之者失其真皆未可信然譬夫聼訟曽未䆒其意烏能决其曲直哉今欲論元之得失必先窺其奥然後可得而議也夫元雖凖易然托始高辛大初二歴而為之故元有方州部家凡四重而為一首九贊通七百二十九贊有竒分主晝夜以應三百六旬有六日之度首凖一卦始於中凖中孚而終於飬凖頥二十四氣七十二候與夫二十八宿錯居其間先後之序蓋不可得而少差也夫易卦之直日起於漢儒之學舍四正卦取六十卦之爻三百六十各直一日此元之所凖者也然易之卦直日其亦如元之首有序乎抑無也若亦有之則雄之為元不亦善乎不然則元之序亦贅矣自復姤而為乾坤十有二卦皆以陰陽之消長分居十二月謂之辟卦固有序矣其餘一月而四卦之序云何耳如中孚頥何以為一日之卦也曰公卿大夫侯者何謂也其所謂屯正於丑間時而左行䝉正於寅間時而右行者其㫖可得而聞歟又一陽一陰者元相錯之法也然飬為陽而中不為陰水火木金土者元相傳之法也然􅕳為金而羡不為土其自相戾𩔖如此豈得無說哉朱子語録曰揚子為人思沉㑹去思索如陰陽消長之妙他直是去推求然太元亦拙底工夫蓋天地間只有一箇竒偶竒陽偶陰春少陽夏太陽秋少陰冬太陰自二而四自四而八只恁地推去都走不得揚子却添作三事事要作三截又且有氣無朔有日星無嵗月恐不是道理其學本似老氏如清静淵黙等語皆是老氏意思陳氏曰按漢志揚雄所叙三十八篇太元十九本傳三方九州二十七部八十一家七百二十九贊分為三卷有首衝錯測摛瑩数文掜圗告十一篇皆以解剥元體蓋與本經三卷共為十四今志云十九未詳初宋陸二家各依舊本解釋范望折中長短或加新意既成此註乃以元首一篇加經贊之上元測一篇附贊之下為九篇列為四卷首測二序載之第一卷之首蓋猶王弼離合古易之𩔖也卷首有陸績述元一篇水心葉氏曰太元雖名幽深然既枝葉扶踈獨說十餘萬言侯芭又受其辭則是雄所以作之意固嘗曉然號於人使皆可識不為甚難明也至宋􅇆陸績范望乃皆創立註釋若昔未嘗聞知者如首名以節氣起止贊義以五行勝尅最為此書要㑹不知自雄及芭親相傳授已如此邪或舊語果零落而𠂻績等方以意自為參測也以位當卦以卦當日出於漢人若夫節候晷刻推其五行所寄而吉凶禍福生之至元而益詳蓋農工小人所教以避就趨舍者雄為孔氏之學其書將經緯大道柰何俛首效之且未有求其小而能得其大者也惜乎其未講矣范氏註太元經解十卷鼂氏曰吳范望叔明註其序云子雲著元桓譚以為絶論張衡以擬五經自侯芭受業之後希有傳者建安中宋𠂻陸績解釋之文字繁猥今以陸為本録宋所長訓理其義為十卷耳以首分居本經之上以測散處贊辭之下其前又有陸績序以子雲為聖人云說元一卷鼂氏曰唐王涯廣津撰涯始以貞元丙子終於元和己丑二十六年間註太元為六卷今不之見獨此書行於世凡五篇明宗一立例二揲法三占法四辯首五巽岩李氏曰自晉范望而後為元學者無聞而涯獨能名家諸儒共宗之涯别有經註六卷行於世此特其大畧耳揲法所稱并扐之後便都数之不中分蓋誤也若爾則終不成七八之数當云又中分其餘而三数之但不復掛一然本多如此今姑仍其舊使觀者自擇焉宋惟幹太元解十卷鼂氏曰皇朝宋惟幹註惟幹嘗得太元古本於昭應咸平中知滑䑓取宋𠂻陸績范望三家訓解别為之註仍作太元宗㫖兩篇附於後其學蓋師濟東田告司馬温公所謂小宋者也徐庸註太元經解十卷鼂氏曰皇朝徐庸註庸慶歴間人也以范望解指義不的因王涯林氏諸解重為之註取王涯說元附於後自為元頥通名之為太元性總其自序云爾又多改其文字如以杚為仡以姽為危以壯凡為札乃以孿為㝈以稚為推之𩔖其所謂林氏者瑀也賈文元嘗闢瑀之姦妄於朝章氏太元經註十四卷疏三十卷鼂氏曰皇朝章詧撰嘉祐中成都帥蔣棠獻其書於朝詔書褒寵賜號冲退處士實録詧字隐之䨇流人通經術善屬文性恬淡屏居林泉以飬生治氣為事巽岩李氏曰其說以范望為宗望所否者輙改正之大抵元之吉凶專在晝夜而子雲之辭或竒奥難曉諸家徃徃迷悞指凶為吉違背經義詧獨以晝夜訂其辭於吉凶無所差比諸家誠最優焉詧成都人字隐之博通五經尤長於易與太元王素趙抃守蜀皆賓禮之賜冲退素所請也詧將死其鄉人夢詧以小童自隨投謁告别曰此間囂塵非修行地吾歸閬苑矣詧蓋明術数得道者云陳漸演元十卷鼂氏曰皇朝陳漸撰漸堯佐之族子也國史有傳凡十四篇漸謂史以揚雄非聖人而作經猶吳楚僣王按子雲法言解嘲止云太元然則經非其自稱弟子侯芭之徒尊之耳太元淵㫖一卷鼂氏曰右皇朝張揆撰太元經疏十八卷鼂氏曰皇朝郭元亨撰元亨謂雄之作元傳之侯芭後獨有張衡桓譚張華見而稱嘆吳郡鄒伯岐求本不能得宋𠂻為訓陸績為解范叔明王涯亦注之皆未明白元亨在蜀自淳化末迄於祥符八年僅三十年撰成今疏又云太元潤色於君平未知何所據而言然巽岩李氏曰其疏專主范望雖講論極詳然於望本注無所増益也元亨自謂得師於蜀而不著其師之名氏蜀人蓋多元學疑嚴揚所傳固自不絶但潛伏退避非遇其人則鮮有顯者耳元亨之本末亦未詳太元發隐三篇巽岩李氏曰章詧撰詧有太元講疏四十九卷其說甚備發隐之作蓋在講疏以前其大畧可見矣下篇所稱王莽旦筮遇於之一五七乃宋𠂻陸績舊註本寓言也而詧謂宋陸皆居漢世去揚雄未逺必得之傳聞故因用之要恐非實耳然亦不害學者觀其意焉可也温公集註太元經十卷鼂氏曰司馬光君實集漢宋𠂻解話吳陸績釋文晉范望解贊唐王涯註經及首測宋惟幹通註陳漸演元吳祕音義七家為此書自慶歴至元豐凡三十年始成其直云宋者𠂻也小宋者惟幹也惟幹漸祕皆國朝人温公說元曰班固稱諸儒或譏揚雄非聖人而作經猶春秋吳楚之君僣號稱王余亦私怪雄不贊易而别為元易之道其於天人之藴備矣而雄豈有以加之更乃為一書且不知其焉所用之故亦不謂雄宜為元也及長學易苦其幽奥難知以為元者賢人之書校於易其義必淺其文必易夫登喬山者必踐於坱埤適滄海者必沿於江漢故願先從事於元以漸進於易庻㡬乎其可跂而望也於是求之積年始得觀之初則溟涬漫漶畧不可入乃研精易慮屏人事而細讀之数十過參以首尾稍得窺其梗槩然後喟然置書嘆曰嗚呼揚子雲真大儒者邪孔子没後知聖人之道者非子雲而誰孟荀殆不足擬况其餘乎觀元之書明則極於人幽則盡於神大則包宇宙細則入毛髪合天地人之道以為一䆒其根本示人所出胎育萬物而兼為之母若地履之而不可窮也若海挹之而不可竭也蓋天下之道雖有善者蔑不易此矣考之於渾元之初而元已生察之於當今而元非不行窮之於天地之季而元不可亡叩之以萬物之情而不漏測之以鬼神之狀而不違槩之以六經之言而不悖藉使聖人復生視元必釋然而笑以為得已之心矣乃知元者以贊易也非别為書以與易角逐也何歆固知之之淺而過之之深也陳氏曰集取宋𠂻以下七家之說而斷之以已意太元釋文一卷陳氏曰相傳自侯芭虞翻宋𠂻陸績互相増損亦後人所作也吳秘嘗作音義豈即此邪元解四卷元歴一卷陳氏曰右丞襄陵許翰崧老撰所解十一篇通温公註為十卷倣韓康伯註繫辭合王弼為全書之例也大抵元首如彖贊如爻測如象文如文言攡瑩掜告如繫辭数如說卦衝如序卦錯如雜卦之𩔖其於易也規規然擬之勤矣太元歴者亦翰所傳云温公手録不著何人作易元星紀圗一卷鼂氏曰從父詹事公撰以温公元歴及邵康節太元凖易圗合而譜之以見揚雄以首凖卦非出私意蓋有星候為之機括且辯正古今諸儒之失如羡不當凖臨夷不當凖大壯之𩔖凡此難與諸家口舌爭觀譜則彼自屈矣此譜元所以作也文獻通考卷二百八
