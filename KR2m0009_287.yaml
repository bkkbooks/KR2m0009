body:
  text: 文獻通考卷二百八十七鄱陽馬端臨貴與著象緯考十月五星凌犯秦始皇之時熒惑守心及天市芒角色赤如雞血始皇既死適庶相殺二世即位殘骨肉戮將相太白再經天因以張楚並興兵相跆藉跆音臺登躡也或作蹈秦遂以亡漢髙帝三年秋太白出西方有光幾中幾中近踰身乍北乍南過期乃入辰星出四孟法當出四仲出四孟為易主之象是時項羽為楚王而漢已定三秦與相距滎陽太白出西方有光幾中是秦地戰將勝而漢國將興也辰星出四孟易王之表也後二年漢滅楚十二年春熒惑守心心為天王也四月宫車晏駕孝文帝後七年七月火東行行畢陽環畢東北出而西逆行至昴即南乃東行占曰為喪死寇亂畢昴趙也其年帝崩孝景三年填星在婁幾入還居奎奎魯也占曰其國得地為得填星是歲魯為國四年七月癸未火入東井行隂又以九月己未入輿鬼戊寅出占曰為誅又為火災後二年有栗氏事其後未央東闕災中元三年填星當在觜觹參去居東井占曰亡地不廼有女憂孝武建元六年熒惑守輿鬼占曰為火變有喪是歲髙園火災竇太后崩元鼎五年太白入於天苑占曰將以馬起兵一曰馬將以軍而死耗其後以天馬故誅大宛馬大死於軍元鼎中熒惑守南斗占曰熒惑所守為亂賊喪兵守之乆其國絶祀南斗越分也其後越相吕嘉殺其王及太后漢兵誅之滅其國孝昭始元中漢宦者梁成恢及燕王候星者吳莫如見蓬星出西方天市東門行過河鼓入營室中恢曰蓬星出六十日不出三年下有亂臣戮死於市後太白出西方下行一舎復上行二舎而下去太白主兵上復下將有戮死者後太白出東方入咸池東下入東井人臣不忠有謀上者後太白入太微西藩第一星北出東藩第一星北東下去太微者天廷也太白行其中宫門當閉大將被甲兵邪臣伏誅熒惑在婁逆行至奎法曰當有兵後太白入昴莫如曰蓬星出西方當有大臣戮死者太白星入東井太微廷出東門漢有死將後熒惑出東方守太白兵當起主人不勝後流星下燕萬載宫極東去李竒曰極屋梁也三輔間名為極或曰棟極也三輔間名棟為極尋棟東去也延篤謂之堂前闌楯也法曰國恐有誅其後左將軍桀驃騎將軍安與長公主燕刺王謀作亂咸伏其辜兵誅烏桓孝宣本始元年四月壬戌甲夜辰星與參出西其二年七月辛亥夕辰星與翼出皆為蚤占曰大臣誅其後熒惑守房之鈎鈐鈎鈐天子之御也晉灼曰上言房為天駟其隂右驂旁有二星曰鈐故曰天子之御也占曰不太僕則奉車不黜即死也房心天子之宫也房為將相心為子屬也其地宋今楚彭城也四年七月甲辰辰星在翼月犯之占曰兵起上卿死將相也是日熒惑入輿鬼天質占曰大臣有誅者名曰天賊在大人之側地節元年正月戊午乙亥月食熒惑孟康曰凡星入月見月中為星食月月掩星星滅為月食星熒惑在角亢占曰憂在宫中非賊而盗也有内亂讒臣在旁其辛酉熒惑入氐中氐天子之宫熒惑入之有賊臣後四年霍氏謀反坐誅孝成建始元年七月熒惑踰歲星居其東北半寸所如連李時歲星在闗星西四尺所熒惑初從畢口大星東東北徃數日至徃疾去遲占曰熒惑與歲鬬有病君饑歲至河平元年三月旱傷麥民食榆皮二年十二月壬申太皇太后避時昆明東觀如淳曰食貨志武帝修昆明池列觀環之或曰即病謝君男故避其時十一月乙卯月食填星星不見時在輿鬼西北八九尺所占曰月食填星流民千里至河平元年三月流民入函谷闗河平二年十月下旬填星在東井軒轅南耑大星尺餘歲星在其西北尺所熒惑在其西北二尺所皆從西方來填星貫輿鬼先到歲星次熒惑亦貫輿鬼十一月上旬歲星熒惑西去填星皆西北逆行占曰三星若合是謂驚位是謂絶行外内有兵與喪改立王公其十一月丁巳夜郎王歆大逆不道牂牁太守立捕殺歆三年九月東郡盗起左將軍千秋卒史丹為左將軍明年梁王賀薨陽朔元年七月壬子月犯心星占曰其國有憂若有大喪房心為宋今楚地十一月楚王友薨綏和二年春熒惑守心二月乙丑丞相翟方進欲塞災異自殺三月丙戌宫車晏駕哀帝元夀元年十一月歲星入太微逆行干右執法占曰大臣有憂執法者誅若有罪二年十月戊寅髙安侯董賢免大司馬歸第自殺李尋上疏曰臣聞五星者五行之精五帝司命應王者號令為之節度歲星主歲事為統首號令所紀今失度而盛此君指意欲有所為未得其節也又填星不避歲星者后帝共政相留於奎婁張晏曰歲星為帝填星為女主也當以義斷之熒惑徃來亡常周歴兩宫作態低昻張晏曰兩宫謂紫微太微入天門上明堂貫尾亂宫孟康曰角兩星為天門房為明堂尾為後宫蘇林曰常占當從尾北而今貫之尾為後宫之義也太白𤼵越犯庫張晏曰𤼵越疾貌庫天庫也孟康曰奎為天庫兵寇之應也貫黄龍入帝庭張晏曰黄龍軒轅也當門而出隨熒惑入天門至房而分欲與熒惑為患不敢當明堂之精此陛下神靈故禍亂不成也熒惑厥弛張晏曰厥弛動揺貌佞巧依勢微言毁譽進類蔽善師古曰進其黨類而壅蔽善人太白出端門孟康曰端門太微正南門臣有不臣者火入室金上堂張晏曰熒惑入營室也孟康曰火入室謂熒惑歴兩宫也金謂太白也上堂入房星也不以時觧其憂凶填歲相守又主内亂宜察蕭墻之内毋忽親疏之微師古曰微謂其事微誅放佞人防絶萌芽以盪滌濁濊消散積惡師古曰濊與穢同也毋使得成禍亂辰星主正四時當效於四仲四時失序則辰星作異今出於歲首之孟天所以譴告陛下也政急則出早政緩則出晩政絶不行則伏不見而為彗茀師古曰茀與孛同四孟皆出為易王命四季皆出為星家所諱今幸獨出寅孟之月蓋皇天所以篤祐陛下師古曰篤厚也祐與右同右猶助也宜深自改治國故不可以戚戚欲速則不逹經曰三載考績三考黜陟師古曰虞書舜典之辭也言三年一考功績三考一行黜陟也加以號令不順四時既徃不咎來事之師也莽地皇四年秋太白在太微中燭地如月太白為兵太微為天庭太白贏而北入太微是大兵將入天子廷也時莽遣兵至昆陽為光武所破漢將鄧曄進攻京師十月殺莽大兵蹈籍宫廷之中更始入長安敗赤眉立劉盆子為天子皆以大兵入宫廷是其應也光武建武六年九月丙戌月犯太微西藩十一月辛亥月犯軒轅七年九月庚子土入鬼中漢史鎮星逆行輿鬼女主貴親有憂巫咸曰有土功事是歲太白經太微八年四月辛未月犯房第二星光芒不見九年正月乙卯金犯婁南星甲子月犯軒轅第二星壬寅犯心大星七月戊辰月並犯昴黄帝星占土犯鬼皇后有憂失亡其勢河圖月犯房天子有憂四足之蟲多死漢史曰國有憂將軍死九年七月乙卯金犯軒轅大星十一月金又犯軒轅孟康曰犯七寸以内光芒相及也韋昭曰自下徃觸之曰犯軒轅者後宫之官大星為皇后金犯之為失勢時郭后已失勢見疎後廢為中山太后十二年七月丁丑月犯昴頭兩星八月辛酉水見東方翼分九月甲午火犯輿鬼十三年二月乙卯火犯輿鬼西北黄帝占曰熒惑守輿鬼大人憂一曰多火災石氏曰為旱十六年四月土星逆行十七年三月乙未火逆行從東門入太微到執法星東己酉南出端門十八年十二月壬戌月犯木星十九年閏月戊申火逆從氐到亢二十一年七月辛酉月入畢二十三年三月癸未月食火星郗萌占熒惑逆行氐為失火三十一年七月戊午火在輿鬼一度入鬼中出尸星南半度十月己亥犯軒轅大星熒惑為凶哀其後二年光武崩中元二年八月丁巳火犯太微西南角星相去二寸西南角星為將相後太尉趙熹司徒李訢坐事免官孝明永平元年閏九月辛未火在太微左執法星所光芒相及十一月辛未土逆行乗東井北軒轅第二星二年十二月戊辰月食火星十年七月甲寅月犯歲星十一年六月壬辰火犯土星十三年閏月丁亥火犯輿鬼為大喪質星為大臣誅戮晋灼曰鬼五星其中白者為質其年十二月楚王英坐謀逆自殺十五年十一月乙丑太白入月中為大將戮人主亡不出三年後三年孝明帝崩十六年正月丁丑歲星犯房右驂北第一星不見辛巳乃見石氏星經曰歲星守房良馬出厩古今注曰正月丁未月犯房房右驂為貴臣嵗星犯之為見誅是後司徒邢穆坐與阜陵王延交通知逆謀自殺四月癸未太白犯畢畢為邉兵後北匈奴冦入雲中至咸陽使者髙宏發三郡兵追討無所得太僕祭肜坐不進下獄孝章建初元年正月丁巳太白在昴西一尺二月甲申金入斗魁孝和永元二年九月金犯軒轅占曰女主失勢其年竇氏被誅太后失勢五年正月甲戌月乗歲星七月壬午歲星犯軒轅大星九月金在南斗魁中為水石氏曰為旱為大將將死火犯房北第一星為將相其六年正月司徒丁鴻薨十二月車騎將軍鴻坐追虜失利下獄死六年六月丁亥金在東井十三年正月辛未水乗輿鬼十二月癸巳犯軒轅大星十四年正月乙卯月犯軒轅在太微中二月丁酉水入太微西門十六年七月庚午水在輿鬼中輿鬼為死喪後一年帝崩孝安永初元年五月戊寅熒惑逆行守心前星心為天子明堂熒惑逆行守之為反臣時安帝未臨朝鄧太后攝政鄧隲及弟悝等秉國司空周章意不平謀閉宫門誅隲等廢太后及帝事覺自殺三年正月庚戌月犯心後星河圗曰亂臣在旁己亥太白入斗中月犯心後星不利子心為宋五月丁酉沛王牙薨太白入斗中為貴相凶臣昭按楊厚對曰以為諸侯王子多在京師容有非常宜亟𤼵還本國太后從之星尋滅不見以斯而言太白入之災在貴相六月癸酉太白入輿鬼為將凶後中郎將任尚坐贓棄市元初元年三月癸酉熒惑入輿鬼二年九月辛酉熒惑入輿鬼中三年三月熒惑入輿鬼中五月丙寅太白入畢口黄帝占大敗近期十五日逺期四十日又曰大臣當之國易主七月甲寅歲星入輿鬼閏月己未太白犯太微左執法四年正月丙戌歲留輿鬼石氏經曰歲星入留輿鬼五十日不下民有大喪百日不下民半死黄帝經曰守鬼十日金錢散諸侯郗萌曰五穀多傷民以飢死者無數四月壬戌太白入輿鬼中石氏占太白入鬼一曰病在女主一曰將戮死己巳辰星入輿鬼中郗萌曰以罪誅大臣一曰后疾一曰大人憂五月己卯辰星犯歲星六月丙申熒惑入輿鬼中戊戌犯輿鬼大星九月辛巳太白入南斗口中黄帝經曰大人當之國易政五年三月丙申鎮星犯東井鉞星五月庚午辰星犯輿鬼質星丙戌太白犯鉞星六年四月癸丑太白入輿鬼郗萌曰太白守輿鬼疾在女主六月丙戌熒惑在輿鬼中黄帝經曰熒惑犯守鬼國有大喪有女喪大將有死者荆州星占曰熒惑犯鬼忠臣戮死不出一年中丁卯鎮星在輿鬼中黄帝經曰鎮星入鬼中大臣誅海中石氏曰大人憂辛未太白犯左執法自永初五年到永寜七年中太白一晝見經天再入輿鬼一守畢再犯左執法入南斗犯鉞星熒惑五入輿鬼鎮星一犯東井鉞星一入輿鬼歲星辰星再入輿鬼凡五星入輿鬼中皆為死喪熒惑太白甚犯鉞質星為誅戮斗為貴將執法為近臣客星在虚危為喪為哭泣星占曰不一年逺期二年昴畢為邉兵又為獄事至建光元年三月癸巳鄧太后崩五月庚申太后兄車騎將軍隲等七侯皆免官自殺是其應也延光古今注曰元年四月丙午太白晝見二年八月己亥熒惑出太微端門三年二月辛未太白犯昴石氏星占曰太白守昴兵從門闕入主人走郗萌曰不有亡國必有誅主又云入昴大赦五月癸丑太白入畢郗萌曰太白入畢口馬馳人走又曰有中喪九月壬寅鎮星犯左執法四年四月太白入輿鬼中古今注曰四月甲辰入六月壬辰太白出太微九月甲子太白入斗口中十一月客星見天市熒惑出太微為亂臣太白犯昴畢為近兵一曰大人當之鎮星犯左執法有誅臣太白入輿鬼中為大喪太白出太微為中宫有兵入斗口為貴將相有誅時大將軍耿寳中常侍江京與阿母王聖等搆譖太子保廢之以北鄉侯懿代四年三月帝崩立北鄉侯侯病薨京等復不欲立保白太后更徵諸王子擇所立中黄門孫程等共誅江京閻顯立保為天子是為順帝皆姦人强臣狂亂王室其於死亡誅戮兵起宫中是其應也孝順永建二年二月丁巳月犯心七月丁酉犯昴八月乙巳熒惑入輿鬼三年二月癸未月犯心後星五年夏熒惑守氐諸侯有斬者是冬班始腰斬馬市六年四月熒惑入太微中犯左右執法西北方六寸所永和二年八月庚子熒惑犯南斗斗為吳黄帝經曰不期年國有亂有憂海中占為多火災一曰旱古今注曰九月壬午月入畢口中明年五月吳郡太守行丞事羊珍等反又江賊蔡伯流等攻廣陵燒城郭殺都尉三年八月甲寅辰星入輿鬼己酉熒惑入太微辰入輿鬼為大臣有死者入太微亂臣在廷中其四年祀南郊中常侍張逵等與曹騰等争權白帝言騰等反矯詔收之騰等自觧說帝悟逵自知事不諧乃奔走自刺又征西將軍馬賢擊西羌父子俱戰沒是其應也四年七月熒惑入南斗犯第三星八月入太微中斗為貴相為揚州熒惑犯之為兵喪其六年大將軍梁商薨九江丹陽賊周生等反攻沒郡縣漢安二年五月丁亥辰星犯輿鬼占為大喪六月乙丑熒惑光芒犯鎮星占為大人忌明年八月孝順帝崩又明年冲帝崩孝質本初元年三月癸丑熒惑入輿鬼四月辛巳太白入輿鬼皆為大喪五月庚戌太白犯熒惑為逆謀閏月一日帝為梁冀所鴆崩孝桓建和元年八月壬寅熒惑犯輿鬼質星二年二月辛卯熒惑行在輿鬼中三年五月己丑太白行入太微右掖門留十五日出端門丙申熒惑入東井八月己亥鎮星犯輿鬼中南星乙丑彗星芒長五尺見天市中東南指色黄白九月戊辰不見熒惑犯輿鬼為死喪質星為戮臣入太微為亂臣鎮星犯輿鬼為喪彗星見天市中為質貴人至和平元年十二月甲寅梁太后崩梁冀益驕亂矣永夀元年三月丙申鎮星逆行入太微中七十四日去左掖門七月己未辰星入太微中八十日去左掖門八月己巳熒惑入太微二十一日出端門太微天子廷也鎮星為貴臣妃后逆行為匿謀辰星入太微為大水一曰後宫有憂是歲雒水溢至津門南陽大水熒惑留入太微中又為亂臣是時梁氏専政九月癸巳熒惑犯歲星為姦臣謀大將戮二年六月甲寅辰星入太微遂伏不見辰星為水為兵為妃后八月戊午太白犯軒轅大星為皇后其三年四月戊寅熒惑入東井口中為大臣有誅者其七月丁丑太白犯心前星為大臣後一年四月懿獻皇后以憂死大將梁冀使其蒼頭秦宫刺殺議郎邴尊又欲殺鄧后母宣事覺桓帝收冀及妻夀襄城君印綬皆自殺誅諸梁及孫氏宗族或徙邉是其應也延熹四年三月甲寅熒惑犯輿鬼質星其占大臣有戮死者五年南郡太守李肅坐罪棄市七年七月戊辰辰星犯歲星八月庚戌熒惑犯輿鬼質星庚申歲星犯軒轅大星十月丙辰太白犯房北星丁卯辰星犯太白十二月乙丑熒惑犯軒轅第二星辰星犯歲星為兵熒惑犯質星有戮臣歲星犯軒轅為女主憂太白犯房北星為后宫其八年二月太僕南鄉侯左勝以罪賜死勝弟中常侍上蔡侯悺北鄉侯黨皆自殺癸亥皇后鄧氏坐執左道廢遷於祠宫死親黨皆係暴室又荆州刺史芝等坐為賊所拘畧桂陽太守任允背敵走皆棄市是其應也八年五月癸酉太白犯輿鬼質星壬午熒惑入太微右執法閏月己未太白犯心前星十月癸酉歲星犯左執法十一月戊午歲星入太微犯左執法九年正月壬辰歲星入太微中五十八日出端門六月壬戌太白行入輿鬼七月乙未熒惑行輿鬼中犯質星九月辛亥熒惑入太微西門積五十八日永康元年正月庚寅熒惑逆行入太微東門留太微中百一日出端門七月丙戌太白晝見經天太白犯心前星太白犯輿鬼質星有戮臣熒惑入太微為賊臣太白犯心前星為兵喪歲星入太微犯左執法將相有誅者歲星入守太微五十日占貴人憂太白熒惑入輿鬼皆為死喪又犯質星為戮臣熒惑留太微中百一日占為人主太白晝見經天為兵憂在大人其九年十一月太原太守劉瓆南陽太守成瑨皆坐殺無辜荆州刺史李隗為賊所拘尚書郎孟璫坐受金漏言皆棄市永康元年十二月丁丑桓帝崩太傅陳蕃大將軍竇武尚書令尹勲黄門令山氷等皆枉死太白犯心熒惑留太微之應也孝靈建寧元年六月太白在西方入太微犯西蕃南頭星太微天廷也太白行其中宫門當閉大將被甲兵大臣伏誅其八月陳蕃竇武等被害熹平元年十月熒惑入南斗中占曰熒惑所守為兵亂斗為吳其十一月㑹稽許昭等聚衆自稱大將軍攻破郡縣五年四月熒惑在太微中守屛占為亂臣是時中常侍趙忠張讓等並為姦亂光和四年四月熒惑逆行守心後星十月戊午月食心後星占曰為大喪後三年帝崩中平六年八月丙寅太白犯心前星戊辰犯心中大星其日未㝠四刻大將軍何進於省中為諸黄門所殺己巳車騎將軍何苗為進部曲將吳匡所殺魏文帝黄初四年三月癸卯月犯心大星占曰心為天王位王者惡之十二月丙子月犯心大星占同上五年歲星入太微逆行積百四十九日乃出占曰五星入太微從右入三十日已上人主有大憂一曰有赦七年五月帝崩明帝即位赦天下六年五月壬戌熒惑入太微至壬申與歲星相及俱犯右執法至癸酉乃出占曰從右入三十日已上人主有大憂又日月五星犯左右執法大臣有憂一曰執法者誅金火尤甚十一月皇子東武陽王鑒薨七年正月驃騎將軍曹洪免為庶人四月征南大將軍夏侯尚薨五月帝崩蜀記稱明帝問黄權曰天下鼎立何地為正對曰當驗天文徃者熒惑守心而文帝崩吳蜀無事此其徵也按三國史並無熒惑守心之文疑是入太微八月吳遂圍江夏寇襄陽大將軍宣帝救襄陽斬吳將張覇等兵喪更王之應也明帝太和五年五月熒惑犯房占曰房四星股肱臣將相位也月五星犯之將相有憂其七月車騎將軍張郃追諸葛亮為亮所殺十二月太尉華歆薨十一月乙酉月犯軒轅大星占曰女主憂十二月甲辰月犯鎮星凡月蝕五星其國皆亡五星入月其野有逐相六年三月乙亥月犯軒轅大星青龍二年十月乙丑月犯鎮星戊寅月犯太白占曰人君死又為兵景初元年公孫淵叛討之三年正月帝崩三年三月辛卯月犯輿鬼輿鬼主斬殺占曰人多病國有憂又曰大臣憂是年夏及冬大疫四年五月司徒董昭薨七月己巳月犯楗閉占曰有火災三年七月崇華殿災三年六月丁未填星犯井鉞戊戌太白又犯之占曰凡月五星犯井鉞悉為兵災一曰斧鉞用大臣誅七月填星犯東井距星占曰大人憂大水五榖不成景初元年夏大水傷稼十月月犯熒惑占曰貴人死二年四月司徒韓暨薨四年五月太白犯畢左股第一星占曰畢為邉兵又主刑罰九月凉州塞外胡阿畢師使侵犯諸國西域校尉張就討之斬首捕虜萬計七月甲寅太白犯軒轅大星占曰女主憂其後皇后毛氏崩景初二年二月己丑月犯心距星又犯中央大星五月乙亥月又犯心距星及中央大星按占曰王者惡之犯前星太子有憂三年正月帝崩太子立卒見廢其年十月甲午月犯箕占曰將軍死正始元年車騎將軍黄權薨少帝正始元年四月戊午月犯昴東頭第一星十月庚寅月又犯昴北第四星占曰月犯昴胡不安二年六月鮮卑阿妙兒等寇西方敦煌太守王延破之斬二萬餘級三年又斬鮮卑大帥及千餘級二年九月癸酉月犯輿鬼西北二星三年二月丁未又犯西南星占曰有錢令一曰大臣憂三年三月太尉滿寵薨四年正月帝加元服賜羣臣錢各有差四年十一月月再犯井鉞是月宣帝討諸葛恪恪棄城走五年三月曹爽征蜀五年十一月癸巳填星犯亢距星占曰諸侯有失國者七年七月丁丑月犯左角占曰天下有兵左將軍死七月乙亥熒惑犯畢距星占曰有邉兵一曰刑罰用九年正月辛亥月犯亢南星占曰兵起一曰將軍死七月癸丑填星犯楗閉占曰王者不宜出宫下殿嘉平元年天子謁陵宣帝奏誅曹爽等天子野宿於是失勢嘉平元年正月甲子太白襲月六月太白犯井距星占曰國失政大臣為亂四月太白犯輿鬼占曰大臣誅一曰兵起其年宣帝奏廢誅曹爽二年三月己未太白又犯井距星三年七月王凌與楚王彪有謀皆伏誅人主遂卑吳孫權赤烏十三年夏五月月北至熒惑逆行入南斗秋七月犯魁第三星而東漢晉春秋云逆行按占熒惑入南斗三月吳王死一曰熒惑逆行其地有死君太和二年權薨是其應也故國志書於吳是時王凌謀立楚王彪謂斗中有星當有暴貴者以問知星人浩詳詳疑有故欲恱其意不言吳有死喪而言淮南楚分吳楚同占當有王者興故凌計遂定三年四月戊寅月犯東井五月甲寅月犯亢距星占曰軍將死一曰為兵是月王凌楚王彪等誅七月皇后甄氏崩四年三月吳將為寇鎮東將軍諸葛誕破走之其年七月己巳月犯輿鬼九月乙巳又犯之十月癸未熒惑犯亢南星占羣臣有亂十一月丁未月犯鬼積尸五年六月戊午太白犯角占曰羣臣有謀不成庚辰月犯箕星占曰軍將死七月月犯星井鉞丙午月又犯鬼西北星占曰國有憂十一月癸酉月犯東井距星占曰將軍死正元元年正月鎮東將軍毋邱儉揚州刺史文欽反兵俱敗死二月李豐及弟翼后父張緝等謀亂事泄悉誅皇后張氏廢九月帝廢為齊王蜀將姜維攻隴西車騎將軍郭淮討破之髙貴鄉公正元二年二月戊午熒惑犯東井北轅西頭第一星甘露元年七月乙卯熒惑犯東井鉞星壬戌月又犯鉞星八月辛亥月犯箕吳廢孫亮太平元年九月壬辰太白犯南斗吳志所書也占曰太白犯斗國有兵大臣有反者其明年諸葛誕反又明年孫綝廢亮吳魏並有兵事也甘露元年九月丁巳月犯東井二年六月己酉月犯心中央大星八月壬子歲星犯井鉞九月庚寅歲星逆行乗井鉞十月丙寅太白犯亢距星占曰逆臣為亂人君憂景元元年五月有成濟之變諸葛誕誅皆其應也二年三月庚子太白犯東井占曰國失政大臣為亂是夜歲星又犯東井占曰兵起至景元元年髙貴鄉公敗三年八月壬辰歲星犯輿鬼質星占曰斧鑕用大臣誅四年四月甲申歲星又犯輿鬼東南星占曰鬼東南星主兵木入鬼大臣誅景元元年殺尚書王經元帝景元元年春月犯建星按占月五星犯建星大臣相譖其後鍾㑹鄧艾破蜀㑹譖艾二年四月熒惑入太微犯右執法占曰人主有大憂一云大臣憂四年十月歲星守房占曰將相有憂一云有大赦明年鄧艾鍾㑹皆夷滅赦蜀士五年帝遜位文獻通考卷二百八十七
