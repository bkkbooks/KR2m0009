body:
  text: 文獻通考卷二百鄱陽馬端臨貴與著經籍考二十七史偽史霸史史評史抄華陽國志十二卷一百二十卷鼂氏曰晉常璩撰華陽梁州地也記漢以來巴蜀人物吕微仲跋云漢至晉初四百載間士女可書四百人亦可謂盛矣復自晉至周顯德僅七百載而史所紀者無幾人忠魂義骨與塵埃同殁何可勝數豈不重可歎哉陳氏曰志巴蜀地理風俗人物及公孫述劉焉劉璋先後主以及李特等事迹末卷為序志云肇自開闢終乎永和三年九州春秋九卷陳氏曰晉司馬彪紹統撰記漢永州部之亂司冀徐兖青荆揚涼益幽凡盜賊僭叛皆紀之淝上英雄小録二卷陳氏曰信都鎬撰所録楊行密將吏有勳名者四十人其二十四人皆淝人餘諸道人又有僧道漁樵之屬十人録其小事故名小録江淮異人録二卷陳氏曰吳淑撰所記道流俠客術士之類凡二十五人南唐烈祖開基志十卷陳氏曰南唐滁州刺史王顔撰起天祐乙丑止升元癸卯合三十九年南唐烈祖實録十三卷陳氏曰南唐史館修撰高遠撰闕第八第十二卷遠又嘗為吳録二十卷而徐鉉鄭文寶皆云開寶中遠始緝升元以來事書未成而疾焚其草故事多遺落江南録十卷鼂氏曰皇朝徐鉉等撰鉉等自江南歸朝奉詔集李氏時事王介甫嘗謂鉉書至亡國之際不言其君之過但以歷數存亡論之於春秋箕子之義為得也雖然潘佑以直見殺而鉉書佑死以妖妄殆與佑爭名且恥其善不及佑故匿其忠汚之以罪耳若然豈唯厚誣忠臣其欺吾君不亦甚乎世多以介甫之言為然獨劉道原得佑子華所上其父事迹略與江南録所書同乃知鉉等非欺誣也陳氏曰徐鉉湯悅撰二人皆唐舊臣故太宗命之撰湯悅即殷崇義避宣祖諱并姓改焉南唐近事二卷鼂氏曰皇朝鄭文寶編記李氏三主四十年間雜事陳氏曰起天福乙酉終開寶乙亥然泛記雜事實小説傳記之流耳江南别録四卷鼂氏曰皇朝陳彭年撰偽吳偽唐四主傳也江表志三卷鼂氏曰鄭文寶撰序言徐鉉湯悅所録事多遺落無年可編然前録固為略而猶以年月記事今此書亦止雜記如事實之類耳近事稱太平興國二年丁丑今稱庚戍者太中祥符三年江南野史二十卷鼂氏曰皇朝龍兖撰凡八十四傳江南館載二卷陳氏曰不著姓名序言徐鉉始奉詔為江南録其後王舉路振陳彭年楊億皆有書大槩六家皆不足以史稱而龍兖為尤甚熙寧八年得鄭君所述於楚州其事迹有六家所遺或小異者刪落正是取百九十五假以類相從鄭君者莫知何人南唐書三十卷陳氏曰陽羡馬令撰序言其祖太傅元康世家金陵多知南唐故事未及撰次今纂先志而成之實崇寧乙酉其書略備記傳體亦言徐湯之疏略云新修南唐書十五卷陳氏曰寶謨閣待制山隂陸遊務觀撰采獲諸書頗有史法蜀桂堂編事二十卷鼂氏曰偽蜀楊九齡撰雜記孟氏廣政中舉試事載詩賦䇿題及知舉登科人姓氏且云科舉起於隋開皇前陋者謂唐太宗時非也外史檮杌十卷鼂氏曰皇朝張唐英次公撰稱王建孟知祥父子四世八十年比之公孫述輩最為久遠其間善惡有可為世戒者路振之書未備治平成此書以補其遺凡五代史及皇朝日歷所書皆略之溫公修通鑑搜羅小説殆遍未嘗取此書蓋多差舛如光大至二年之類是也陳氏曰唐英自號黃松子商英之兄也前蜀記事二卷陳氏曰偽蜀學士毛文錫平圭撰起唐明庚子盡天福甲子凡二十五年文鍚唐太僕卿龜範之子十四登進士第入蜀仕建至判樞密院隨衍入洛而卒後蜀記事十卷陳氏曰直史館太常博士董淳撰惟記孟昶事吳越備史九卷陳氏曰吳越掌書記范坰巡官林禹撰按中興書目其初十二卷書開寶三年後又增三卷至雍熙四年今書止石晉開運比初闕三卷吳越備史遺事五卷陳氏曰全州觀察使錢儼撰俶之弟也其序云備史亦其所作託名林范而遺名墜迹殊聞異見闕漏未盡者復為是編時皇宋平南海之二年吳興西齋序蓋開寶五年也儼以三年代其兄偡刺湖州閩中實録十卷陳氏曰周顯德中揚州永貞縣令蔣文惲記閩王審知父子及將吏儒士僧道事迹末亦略及山川土物閩王列傳一卷陳氏曰祕書監晉江陳致雍撰二世七主通六十年閩王事迹一卷陳氏曰不知何人作末稱光啓二年至天聖元年一百三十八年所記頗詳三楚新録三卷陳氏曰知桂州修仁縣周羽沖撰上卷為湖南馬殷中卷為武陵周行逢下卷為荆南高季興湖南故事十卷陳氏曰不知作者記馬氏至周行逢事館閣書目作十三卷蓋為列傳十三篇其實十卷也文辭鄙甚五國故事二卷陳氏曰不知作者記吳蜀閩漢諸國事九國志五十一卷鼂氏曰皇朝路振子發撰雜記吳越唐前後蜀東漢南漢閩楚凡九國陳氏曰各為世家列傳凡四十九卷末二卷為北楚言高季興事張唐英所補撰十國紀年四十二卷鼂氏曰皇朝劉恕道原撰溫公序云渙之子也博學強記同修通鑑史事之紛錯難治者以諉恕宋次道知亳州家多書恕往借觀之目為之瞀性剛介初與王安石善及改新法言其非遂與之絶卒年四十九所謂十國者一王蜀二孟蜀三吳四唐五吳越六閩七楚八南漢九荆南十北漢溫公又題其後云世稱路氏九國志在五代之史中最佳此書又過之以豫考之長於考異同而拙於屬文其書國朝事皆曰宋而無所隱諱意者各以其國為主耳天下大定録一卷陳氏曰殿中丞通判桂州王舉撰景祐間人始高季興終劉繼元其所記疏略獨江南稍詳本十卷今但為一卷恐非全書也北廷雜記十卷鼂氏曰契丹降人趙志忠撰記北廷雜事始於安巴堅迄邪律宗真李清臣云志忠仕北為中書舍人得罪來歸上此書及契丹地圖言敵中甚詳隂山雜録十六卷契丹録一卷陳氏曰不著名氏莆田鄭氏書目云趙志忠撰歐公歸田録云志忠本華人自幼陷敵為人明敏在敵中舉進士至顯官歸國能述敵中君臣世次山川風物甚詳今觀此書可以槩見矣其首一卷名契丹録契丹疆宇圖一卷陳氏曰不著名氏録契丹諸夷地及中國所失地遼四京記陳氏曰亦無名氏曰東京中京上京燕京燕北雜録五卷西征寨地圖附陳氏曰思卿武圭記嘉祐六年宫苑使知雄州趙某進於朝圭亦自契丹逃歸事見國史傳胸奴須知一册鼂氏曰契丹歸明人田緯編次録契丹地理官制辨鴂録一卷陳氏曰不著名氏契丹譯語也凡八篇敵庭須知一卷陳氏曰左藏庫副使知安肅軍陳昉撰熙寧元年集賢校理胡穆為之序凡二十一條目戴斗奉使録二卷鼂氏曰皇朝王曙撰景德三年為契丹主生辰使祥符二年為弔慰使所録也生辰國信語録一卷鼂氏曰皇朝冦瑊與康德輿天聖六年使契丹賀其主生辰往返語録并景德二年至天聖八年使副姓名及雜議於後張浮休使遼録二卷鼂氏曰皇朝元祐甲戌春張舜民被命為回謝大遼弔祭使鄭介為副録其往返地理及話言也舜民字藝叟自號浮休居士北遼遺事二卷鼂氏曰不題撰人蓋遼人也記女真滅遼事序云遼國自安巴堅創業於其初德光恢廓於其後吞滅諸蕃割據漢界南北開疆五千里東西四千里戒器之備戰馬之多前古未有子孫繼統二百三十餘年逮至天祚失御女真稱名十二年間舉國土崩古人謂得之難而失之易非虗言耳陳氏曰燕山史願撰一名金人亡遼録金敵節要一卷一作三卷鼂氏曰陷敵人所上也記金人初內侮止紹興十年共十六年事頗詳實陳氏曰右從事郎兖人張匯東卿撰宣和中隨父官保州陷敵十五年至紹興十年歸朝金敵志二卷又一卷陳氏曰承奉郎張棣撰淳熙中歸明人記敵中事頗詳又一卷不著名氏似節略張棣書其末又雜録敵界事宜及敵亮以後事松漠記聞二卷陳氏曰徽猷閣直學士番陽洪皓光弼撰皓奉使留敵中録所聞雜事征蒙記一卷陳氏曰金人明威將軍登州刺史李大諒撰建炎巨冦之子隨其父成降敵者也偽楚録二卷偽齊録二卷陳氏曰並不著名氏金人南遷録一卷陳氏曰稱偽著作郎張師顔撰初見此書疑非北人語其間有曉然傳會者或曰華嶽所為也近扣之汴人張總翼則云歲月皆抵牾不合益證其妄西夏須知一卷鼂氏曰皇朝劉溫潤守延州日編録偽境雜事陳氏曰凡十五條目蕃爾雅一卷鼂氏曰不載著人姓名以夏人語依爾雅體譯以華言夏國樞要二卷鼂氏曰皇朝孫巽纂記夏虜兵屯會要土地肥磽井泉湧涸榖粟窖藏酋豪姓氏名位司存與夫城池之完缺風俗之所向編為兩帙上之朝西域志十二卷鼂氏曰唐僧元奘撰奘西遊天竺求佛書既歸記其所歷諸國風俗其自序云自黑領以西皆土著尚東左袵務田畜重財賄嫁娶無禮獨天竺則異别記於後云或云元奘譯大總持寺僧辨機撰雞林志三十卷鼂氏曰皇朝崇寧中王雲編次崇寧中劉逵吳拭使高麗雲為書記官既歸捃輯其會見之禮聘問之辭類分為八門陳氏曰自元豐創通高麗以後事實皆詳載之海外使程廣記三卷陳氏曰南唐如京使章僚撰使高麗所記海道及其國山川事迹物産甚詳史虗白為作序稱己未十月蓋本朝開國前一歲也高麗圖經四十卷陳氏曰奉議郎徐兢明叔撰宣和六年路允迪傅墨卿使高麗兢為之屬歸上此書圖其形事為之説今所刋不復有圖矣兢鉉之後南詔録三卷陳氏曰唐嶺南節度巡官徐雲虔撰乾符中雍中遣雲虔使南詔所作上卷記山川風俗後二卷紀行及使事雲南行記二卷鼂氏曰唐韋齊休撰齊休長慶三年從韋審規使雲南記其往來道里及其見聞序謂雲南所以能為唐患者以開道越嶲耳若自黎州之南清溪關外盡斥棄之疆埸可以無虞不然憂未艾也及唐之亡禍果由此本朝棄嶲州不守而遂無邉患以此論之則齊休之言可不謂善哉雲南志十卷鼂氏曰唐樊綽撰咸通中南詔數冦邊綽為安南宣慰使纂入詔始末名號種族風俗物産山川險易疆境接聨聞於朝至道雲南録三卷鼂氏曰皇朝辛怡顯撰蜀賊李順既平餘黨竄入雲南雷有終募怡顯招出之至道初歸因書其所歷成此書陳氏曰怡顯入雲南招李順餘黨因賜蠻酋告敕而遂為此録天禧四年自序稱左侍禁知興化軍或云此書妄也余在莆田視壁記無怡顯名字恐或然皇祐平蠻記一卷鼂氏曰皇朝馮炳撰記儂智高叛朝廷遣狄青平之南蠻録十卷鼂氏曰未詳撰人熙寧間交趾叛朝廷議討之或纂厯代南蠻事迹及便宜上之諸蕃志二卷陳氏曰福建提舉市舶趙汝適記諸蕃國及物貨所出右偽史霸史劉氏史通二十卷鼂氏曰唐劉知幾撰知幾長安神龍間三為史官頗不得志乃以前代書史序其體法因習廢置掇其得失述所曲直分內外篇著為評議備載史策之要當時徐堅深重之云居史職者宜置坐右元宗朝詔其家録進上讀而善之宋子京稱唐舊史之文猥釀不綱謂知幾工訶古人而拙於用己觀此書知子京之論不誣前世史部中有史抄類而集部中有文史類今世抄節之學不行而論説者為多故自文史類內摘出論史者為史評附史部而廢史抄云陳氏曰其著書亦博矣史通者漢封司馬遷後為史通子亦兼白虎通之義也史通析微十卷鼂氏曰唐柳璨照之撰璨以劉子元史通妄誣聖哲評湯之德為偽迹論桀之惡為厚誣謗周公云不臣褒武庚以徇節其甚至於彈劾仲尼因討論其舛謬共成五十篇蕭統云論則析理精微故以為名乾寧四年書成唐史云璨公綽族孫少孤貧好學著史通析微時或稱之起布衣至於相不四歲按唐紀相璨在天祐改元則書成猶未仕也史例三卷陳氏曰唐右補闕劉餗鼎卿撰知幾次子也厯代史贊論五十四卷鼂氏曰未詳撰人纂史記迄五代史臣贊論厯代史辨志五卷鼂氏曰未詳撰人亦有可觀者凡百許篇序謂人之志有甚微者不可不辨故以名書通鑑釋文二十卷陳氏曰司課司馬康公休撰溫公之子通鑑釋文三十卷陳氏曰左宣義郎眉山史照見可撰馮時行為之序今考之公休之書大略同而加詳焉蓋因其舊而附益之也通鑑前例一卷修書帖一卷三十六條四圖共一卷陳氏曰司馬光記集修書凡例諸帖則與書局官屬劉恕范祖禹往來書簡也其曽孫侍郎伋季思裒於一篇又以前例分為三十六條而考其離合稽其授受推其甲子括其卷帙分為四圖通鑑問疑一卷陳氏曰高安劉羲仲壯輿纂集其父道原與溫公往復相繼者亦附修書帖後讀史管見三十卷陳氏曰禮部侍郎建安胡寅明仲以通鑑事備而義少故為此書議論宏偉嚴正間有感於時事其於熙豐以後接於紹興權姦之禍尤拳拳寓意焉晦庵綱目亦多取之朱子語録胡致堂議論英發人物偉然讀史管見乃嶺表所作當時並無一册文字隨行只是記憶所以其間有抵牾處南軒言管見專為秦檜設豈有言天下之事而專於一人者先生曰儘有好處但好惡不相掩耳又曰致堂管見方是議論唐鑑議論弱又有不相應處前靣説一項事末又説别處去通鑑論篤三卷陳氏曰侍講廣漢張栻敬夫撰取通鑑中言論之精確者表而出之多或全篇少至一二語去取甚嚴可以見前輩讀書眼力之高南北籌邊十八卷臨江曽三英無愧撰周平園序略曰南渡初士大夫日夜防守江淮計時右正言吕祉帥金陵與其屬吳若陳克著東南防守利便三卷上之事既詳實文亦條暢其後有尚書郎臨川吳曽著南北征伐編年二十三卷起三國終五代凡古今形勢師旅勝負該貫無遺仍集當時君臣議論為分門事類一十二卷其相謀相應攻守通好可指諸掌視祉之書益加詳焉今臨江曽君三英復為南北邊籌十八篇南之攻北其事有九諸葛亮紀瞻禇裒桓溫劉裕宋文帝陳顯達陳慶之吳明徹是也北之圖南其事亦九曹操魏明帝羊祜苻堅拓跋太武孝文元英邢巒北齊是也人為一論論指一事皆援昔以證今因迹以求心即成而究敗考古可謂勤而用志可謂切矣史記音義二十卷陳氏曰唐崇賢館學士劉伯莊撰貞觀初奉敕講授采鄒誕生徐廣及隋柳顧言音義而為此書史記索隱三十卷鼂氏曰唐司馬貞撰據徐裴注紏正抵牾援據密緻如東坡辨宰我未嘗從田常為亂蓋本諸貞也陳氏曰採托異聞釋文演注末二卷為述贊為三皇本紀世號小司馬史記附索隱史記一百三十卷陳氏曰淳熙中廣漢張材介仲刋於桐川郡齋削去禇少孫所續而附以司馬貞索隱其後江陰耿秉直之復取所削者别刋之史記正義二十卷陳氏曰唐諸王侍讀張守節撰開元二十四年作序崇文總目為漢書學者此最精博陳伯宣注史記八十七卷崇文總目唐陳伯宣撰因裴駰説有所未悉頗增損焉然多取司馬氏索隱以為已説今篇殘缺遷史刪改古書異辭十二卷陳氏曰倪思撰以遷史多易經語更簡嚴為平易體當然也然易辭而失其義書事而與經異者多不可以無考故為是編經之外與他書異者亦并載焉班馬異同三十五卷陳氏曰倪思撰以班史仍史記之舊而多刪改大抵務趨簡嚴然或刪而遺其事實或改而失其本意因其異則可以知其筆力之優劣而又知作史述史之法矣新校史記一百三十卷新校前漢書一百卷新校後漢書九十卷三史刋誤四十五卷崇文總目皇朝張觀等校定初祕書丞余靖上言國子監所收史記漢書誤請行校正詔翰林學士張觀知制誥李淑宋祁與靖洎直講王洙於崇文院讐對靖等悉取三館諸本及先儒注解訓傳六經小説字林説文之類數百家之書以相參校凡所是正增損數千言尤為精備逾年而上之靖等又自録其讐校之説别為刋誤四十五卷漢書問答五卷崇文總目唐沈遵行撰采諸儒為漢書説者申釋其義有博聞之益然篇第頗差討求未獲闕劉傳以下諸篇三劉漢書標注六卷鼂氏曰皇朝劉敞原父弟攽貢父子奉世仲馮撰劉跂嘗跋其書尾云余為學官亳州故中書劉舍人實為守從容出所讀漢書示余曰欲作補注未能也然卷中題識已多公之子方山亞夫録以相示也陳氏曰又本題公非先生刋誤其實一書公非貢父自號漢書自顔監之後舉世宗之未有能異其説者至劉氏兄弟始為此書多所辨正發明吕氏前漢論三十卷鼂氏曰皇朝吕大忠晉伯撰豫得其本於銅梁令吕肇修撰汲陵諸孫也西漢發揮十卷鼂氏曰皇朝劉涇巨濟撰涇蜀人西漢決疑五卷陳氏曰國子司業宛邱王述致君撰一曰失實二曰引古三曰異言四曰雜證五曰注釋西漢史抄十七卷兩漢博議十四卷中興藝文志陳傅良撰指摘精要禆正闕誤如制度始末因革則條其大意遺其煩碎而一代之興衰治體人才紀綱風俗亦略矣博議陳季雅所撰闕涉尤大東漢刋誤一卷鼂氏曰劉攽貢父撰攽序英宗讀後漢書見墾田字皆作懇字命國子監刋正攽為直講校正其謬誤不可勝算然此書世無善本率以己意定之治平三年奏御攽號有史學溫公修通鑑以兩漢事付之兩漢博聞十二卷鼂氏曰皇朝楊侃纂景德中侃讀兩漢書取其名數前儒解釋為此書以資涉獵者侃嘗編職林此亦其類也兩漢刋誤補遺十七卷陳氏曰國子博士吳仁傑斗南撰補三劉之遺也三國人物論三卷鼂氏曰皇朝楊祜甫撰蜀人晉書指掌十二卷鼂氏曰皇朝劉編以晉書事實以類分為六十五門唐書直筆新例四卷鼂氏曰皇朝吕夏卿撰夏卿強記絶人預修新史此其在書局時所建明歐宋間有取焉如增入高祖字叔德之類是也陳氏曰紀傳志各一卷末一卷摘舊史繁闕又為新例須知附於後略舉名數如目録之類記新書比舊增減志傳及總類唐書音訓四卷鼂氏曰皇朝竇鞏撰新書多竒字觀者必資訓釋鞏問學精博發揮良多而其書時有改革者不知何人附益之也唐書音義三十卷鼂氏曰未詳撰人比竇氏書大略同而稍簡乃析為三十卷唐書辨證二十卷一名糾謬鼂氏曰皇朝吳縝撰縝字廷珍成都人仕至郡守數新書初修之時其失有八類其舛誤二十門凡四百餘事縝不能屬文多誤有詆訶如新書張九齡傳云武惠妃陷太子瑛遣官奴告之曰廢必有興公為援宰相可常處九齡奏之故卒九齡相而太子無患縝以為時九齡已相而太子竟以廢死以為新書似實而虛按史之文謂終九齡在相位日太子得不廢也豈謂卒以九齡為相太子終無患乎初名糾謬其後改云辨證實一書也王氏揮麈録曰嘉祐中詔宋景文歐陽文忠諸公重修唐書時有蜀人吳縝者初登第因范景仁而請於文忠願預官屬之末上書文忠言甚懇切文忠以其年少輕佻拒之縝鞅鞅而去逮夫新書之成乃從其間指摘瑕疵為紏謬一書至元祐中縝遊宦蹉跎老為郡守與五代史纂誤俱刋行之紹興中福唐吳仲實元美為湖州教授復刻於郡庠且作後序以謂針膏肓起廢疾杜預實為左氏之忠臣然不知縝著書之本意也陳氏曰其父師孟顯於熙豐此書紹聖初上之注唐記十卷鼂氏曰題曰樊先生而不詳其名近代人所著新書紀也唐書列傳辨證二十卷陳氏曰端明殿學士玉山汪應辰聖錫撰專攻列傳不及紀志以元祐名賢謂列傳記事毁於鐫削暗於藻繪故隨事辨證之新唐書略三十五卷陳氏曰吕祖謙授徒患新史難閲摘要抹出而門人抄之蓋節本之有倫理者也唐史要論十卷一作論斷二卷鼂氏曰皇朝孫甫之翰撰歐陽永叔司馬溫公蘇子瞻稱其書議論精核以為舊史所不及終於天章閣待制朱子語録司馬溫公書孫公唐史後云孫公之翰昔著此書甚自重惜嘗别緘其藁於笥必盥手然後啓之謂家人曰萬一有水火兵甲之急他貨財盡棄之此笥不可失也公私少間則增損改易未嘗去手其在江東為轉運使出行部亦以自隨過亭休止輒取修之會宣州有急變乘馹遽往不暇挈以俱既行之後金陵大火延及轉運廨舍弟子察親負其笥避於沼中島上公在宣州聞之亟還入門問曰唐書在乎察對曰在乃悅餘無所問自壯年至於白首乃成亦未以示人文潞公執政嘗從公借之又曰伯恭晚年謂人曰孫之翰唐論勝唐鑑要之也是切於事情只是大綱却不正了陳氏曰甫以唐書煩冗遺略多失體法乃修為唐史用編年體自康定元年逮嘉祐元年成書七十五卷為論九十二首甫沒朝廷取其書留禁中其從子察録以遺溫公而世亦罕見蜀有刻本末有之今惟諸論存焉唐鑑二十卷鼂氏曰皇朝范祖禹醇夫撰醇夫為溫公通鑑局編修官十五年分掌唐史以其所自得著成此書取武后臨朝二十一年繫之中宗其言曰此春秋公在乾侯之義也雖得罪於君子有所不辭觀此則知醇夫之從公決非茍同者凡三百六篇朱子語録曰范太史唐鑑第一段論守臣節處不圓要做一書補之不曽做得范氏此文字草草之甚其人資質渾厚説得都如此平正只是疏多不入理終守臣節處於此亦須有些處置豈可便如此休了如此議論豈不為英雄所笑又曰唐鑑有疏處孫之翰唐論精細説得利害如身親厯之但理不及唐鑑耳又曰唐鑑多説得散開無收煞如姚崇論擇十道使患未得人他自説得意不知范氏何故却貶其説又曰唐鑑白馬之禍歐公論不及此又曰唐鑑有緩而不精確處如言租庸調及楊炎二稅之法説得都無收煞只云在於得人不在乎法有這般茍且處他是見熙寧間詳於制度故有激而言只那有激便不平直陳氏曰元祐初上此書唐史評三卷鼂氏曰題曰適適先生不詳何人門人譙孝寧為編次五代史纂誤五卷雜録一卷鼂氏曰皇朝吳縝撰凡二百餘事皆歐陽永叔新五代史抵牾舛訛也按通鑑考異證歐陽史差誤如莊宗還三矢事之類甚衆今此書皆不及之特證其字之脫錯而已又善本未必皆然陳氏曰宇文時中守吳興郡庠有二史板遂二書刻之後皆入國子監初郡人思溪王氏刻藏經有餘板以刋二史置郡庠中興監書多闕遂取其板以往今監本是也典故辨疑二十卷儒林郎主管尚書吏部架閣文字李大性撰淳熙十三年投進自為序略曰仰惟皇朝聖明相紹明良之懿著在青史坦然明白信以傳信而纓紳相屬占畢益繁私史薦興説令蜂午朱紫苗莠混為一區熙朝盛美未免蒙翳請略舉數端言之如梅堯臣碧雲騢非堯臣所撰孔平仲雜録非平仲所述建隆遺事以王禹稱名而實非禹稱志怪集括異志倦遊録以張師正名而實非師正涑水記聞雖出於司馬光而多所增益談叢雖出於陳師道而多所誤盩以至王安石日録蔡絛國史後補又皆不足以取信儒者俱嘗言之而未之詳辨也矧其言者乎蓋嘗推其疇品為説滋夥數其差舛不見殫述雖云爝火之衆於大明何傷而微塵纎埃非全鏡所宜有也然則丹鉛點勘寤疑辨惑匪書生職與臣大懼私史蹖駮或為正史之蠹輒擷其事而正之伏自忖念衡茅之下多未見之書朴􅈪之材無竒特之見固不當自置於五不韙之域以姦嚴誅而孤忠拳拳所欲辨明懷不能已非敢遠慕昔人作指瑕糾謬之書以詒攻訶之誚獨取熙朝美事及名卿才大夫之卓卓可稱而其事為野史語録所翳者辨而明之參其歲月質其名氏爵位而考證焉其或傳聞異詞難以示信以意逆志雖知其非而未有曉然依據則姑置弗辨其所辨者必得所證而後為之説焉所辨凡二百條釐為二十卷名之曰典故辨疑右史評史抄文獻通考卷二百
