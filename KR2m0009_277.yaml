body:
  text: 文獻通考卷二百七十七鄱陽馬端臨貴與著封建考十八五代諸王梁親王廣王全昱太祖兄也太祖受禪封貞明二年卒友諒全昱子初封衡王後嗣廣王坐弟友能反廢囚京師唐師入汴見殺友能昱子封惠王後為宋滑二州留後舉兵反敗死友誨昱子封邵王坐友能反廢後為唐兵所殺安王友寧太祖兄存子受禪後封密王友倫太祖兄存子受禪後封郴王友裕太祖子為忠武節度使卒受禪後追封博王友文本姓康名勒太祖養以為子受禪後封郢王友圭弒逆並殺友文郢王友圭太祖子受禪後封乾化二年弒太祖篡位均王以兵討之自殺追廢為庶人福王友璋太祖子受禪後封賀王友雍太祖子受禪後封建王友徽太祖子受禪後封康王友孜太祖子末帝即位後封後以反誅唐親王雍王存美太祖子同光三年封莊宗敗不知所終永王存霸太祖子同光三年封莊宗敗為軍卒所殺薛王存禮太祖子同光三年封莊宗敗不知所終申王存渥太祖子同光三年封莊宗敗與劉皇后同奔太原為部下所殺睦王存乂太祖子同光三年封後以郭崇韜壻為莊宗所殺通王存確太祖子同光三年封莊宗敗為霍彥威所殺雅王存紀太祖子同光三年封莊宗敗為霍彥威所殺魏王繼岌莊宗長子同光三年封將兵伐蜀取之師回至渭南聞莊宗敗師徒潰散自縊死繼湩繼嵩繼蟾繼嶢並莊宗子同光三年拜光祿大夫檢校司徒未封莊宗敗並不知所終秦王從榮明宗子長興元年封後舉兵反敗死廢為庶人許王從益明宗子長興四年封晉天福四年封郇國公為二王後奉唐帝祀開運三年契丹犯京師復封許王尋為番將蕭翰立為帝知南朝軍國事漢高祖入洛遇害雍王重美末帝子清泰三年封晉兵入與末帝俱自焚死洋王從璋明宗從子長興四年封晉時降封隴西郡公兖王從溫明宗從子晉時為忠武軍節度使涇王從敏明宗從子晉時降封秦國公晉親王韓王敬暉高祖弟為曹州防禦使卒天福八年追封子曦嗣楚王重信高祖子天福初為河陽三城節度使范延光反遇害追封陳王重杲高祖子蚤卒追封壽王重乂高祖子張從賓反遇害追封漢親王魏王承訓高祖子蚤卒追封陳王承勳高祖子隱帝即位為開封尹周廣順元年追封周親王郯王侗太祖子漢末遇害顯德時追封把王信太祖子漢末遇害顯德時追封越王宗誼世宗長子漢末遇害顯德時追封曹王宗讓世宗子顯德六年封紀王熙謹世宗子顯德六年封宋乾德二年卒蘄王熙誨世宗子顯德六年封封爵之差唐制王食邑五千户郡王國公三千戶開國郡公二千户縣公千五百户縣侯千户伯七百户子五百戶男三百户又有食實封者給縑帛每賜爵遞加一級唐末及五代始有特加邑户而罷實封之給又去縣公之名封侯以郡宋朝沿其制文臣少卿監以上內職崇班以上有封爵丞相學士刺史大將軍諸司使以上有實封但以增戶數為差不繫爵級邑過其爵則并進爵焉止於開國郡公每加食邑自千户至二百户實封自六百户至百户皆六等親王重臣或特加有踰千戶者郡公食邑有纍加至萬餘者實封至數千者又於王爵之上有國王及西平南平之號皆非常典所加凡加食邑宰相千户實封四百户餘降麻官七百户實封三百户直學士以上五百户實封二百户舍人待制散尚書至少卿監以上實封一百户食邑三百户封縣開國男五百户封子七百户封伯千户封郡侯二千户封公千五百户以上始加實封惟將相食邑萬户即開國亦或謙而不就者仁宗慶歷七年郊惟夏竦滿萬户中書請封英國公因詔使相未滿萬户皆得封皇屬有特封郡公縣公或贈侯者無開國字侯無開國字在開國郡公之上開寶以來伐國降主及外臣叛命赦不誅者亦封侯皆因名以著罪焉開寶四年劉鋹封恩赦侯九年李煜封違命侯淳化五年趙保忠封宥罪侯又采秦制賜民爵曰公士其王公以下封國之名舊有大次小三等以為進封之敘然每或封拜又有權升次小國為大國者淳化五年九月詔升壽為大國列於晉之下燕之上咸平六年八月故兖王追封安王升安為大國景德二年八月故雍王追封鄆王仍升鄆為大國大中祥符七年五月故舒王追封曹王仍升曹為大國乾興元年三月進封鄧申冀三大長公主並升為大國景祐中詔春秋秦漢以來下及皇朝所封舊名别分大次小三等以為定制焉太祖時詔晉王太宗齊王廷美武功郡王德昭朝會班宰相上太宗太平興國八年詔自今宰相序立宜在親王上宰相宋琪李昉等頓首言漢法丞相在諸侯王下請如舊制不許王府講官有翊善一人直講一人贊讀二人記室一人又有諸王宫大小教授宋諸王王子侯雍王光濟宣祖長子太祖兄蚤亡建隆三年贈中書令封雍王秦王廷美宣祖第四子太祖弟建隆元年授嘉州防禦使進同平章太宗即位封齊王繼封秦王後以罪降封涪陵縣公房州安置卒於房陵真宗即位追復官封廷美十子德恭為左武衛大將軍封樂平縣公德隆右武衛大將軍封長寧郡侯德雍贈寧逺軍節度使臨沂郡公德彛保寧軍節度留後追封信都郡王德均左監門衛大將軍追封安鄉侯德欽雲州觀察使追封雲中侯德潤右羽林將軍追封金城侯德願右武衛將軍追封姑臧侯德存左羽林將軍追封洮陽侯德文昭武軍節度使東平郡王夔王光贊宣祖第五子太祖幼弟早卒建隆三年贈侍中追封右宣祖之世魏王德昭太祖子乾德二年出閣授貴州防禦使遷同平章事太平興國元年封武功郡王四年以譴自殺贈中書令追封魏王止齋陳氏曰謹按國史乾德二年以皇子德昭為貴州防禦使時年十七前代皇子出閣即封王上以德昭未冠特殺其禮非舊典也夫貴州屬廣西下州防禦使從五品耳皇子始命以此禮曰天子之元子士也天下無生而貴者也儲君副主猶云士明人有賢行著德乃得貴也先王以家人不憚自貶如此損益教道行矣故國人觀之曰世子將君我而齒我於學然後衆知父子之道君臣之義長幼之節出閣封王後世之夸心也藝祖起百世之後獨追古意自王禮殺而為防禦使非聖人能之乎紹聖中皇子初命便封國公遂為故事惟正德昭長子建寧軍節度使追封同安郡公從讜惟正子溫州團練使坐罪死贈濟南侯世程從讜子洺州防禦使贈榮國公世智從讜子桂州觀察使贈申國公世繁從讜子袁州防禦使贈信都郡公惟吉德昭次子早卒守節惟吉子彰化軍節度留後追封丹陽郡王守巽惟吉子和州防禦使贈楚國公守度惟吉子英州團練使贈廬江侯世延惟吉孫絳州防禦使贈彭城郡公世靜惟吉孫均州防禦使贈北海郡公世長惟吉孫解州防禦使贈濟陽郡公世茂惟吉孫鳳州刺史贈東陽侯惟忠德昭子早卒從恪惟忠子贈磁州刺史東萊侯從藹惟忠子齊州防禦使追封韓國公世綱惟忠孫澧州刺史贈南康侯從質惟忠子信州團練使贈博陵侯從信惟忠子雄州防禦使贈楚國公惟和德昭子早卒從審惟和子復州防禦使宣城郡公從誨台州團練使襄陽侯岐王德芳太祖子開寶九年出閣授防禦使太平興國中進同平章事六年薨惟敘德芳子懷州防禦使追封河南侯從煦惟敘子歸州團練使齊國公世逸從煦子耀州觀察使贈惠國公惟憲德芳子資州團練使贈英國公從演惟憲子登州防禦使贈遂寧侯從郁惟憲子贈金州觀察使新興侯世奕惟憲孫永州團練使贈南康侯惟能德芳子右羽林將軍贈張掖侯從古惟能子登州觀察使楚國公從贄惟能子溫州團練使贈南陽侯世瑞惟能子嘉州刺史贈華陰侯安定郡王從式太祖曾孫岐王德芳次子英國公惟憲之子神宗熙寧元年詔以太祖肇造區夏令中書門下考太宗之屬籍近行尊者一人裂地王之使常從獻於郊廟於是從式最長乃拜彰化軍節度觀察留後封安定郡王薨追封榮王世清熙寧五年嗣封世凖元豐七年嗣封世開紹聖元年嗣封世雄建中靖國元年嗣封世福崇寧五年嗣封令蕩宣和二年嗣封令話紹興元年嗣封令畤二年嗣封令矼五年嗣封令懬六年嗣封令誏二十五年嗣封令襟二十六年嗣封令德乾道元年嗣封令檯八年嗣封子棟淳熙七年嗣封子肜九年嗣封子恭慶元元年嗣封子覿嘉泰二年嗣封伯栩嘉泰四年嗣封伯柷嘉定元年嗣封伯澤八年嗣封熙寧所封安定郡王從式乃秦王德芳之孫從式薨乃更封燕王德昭曾孫世清為嗣安定郡王紹興初燕秦二王後爭襲封禮部員外郎王居正言燕王太祖長子其後當襲封議遂定自紹興至嘉定襲封者並燕王後自孝宗後受封者率自下僚承襲且多癃老疾病不能起跪嘉定十二年臣僚言自今有該封襲之人先行下所居州郡審驗委堪拜跪方與保明申奏仍遣赴都堂察審然後取旨除授或序當承襲本州宗司見其不能拜跪與特轉一官及一子恩澤以華其老却於次行內更行選襲從之秀安僖王子稱太祖六世孫岐王德芳之後德芳生英國公惟憲惟憲生新興侯從郁從郁生華陰侯世將世將生東頭供奉官令繪令繪生子稱以舍試合格調嘉興丞生子是為孝宗六歲選入宫紹興十四年子稱卒孝宗既正儲宫詔贈子稱中書令秀王伯圭子稱子封滎陽郡王光宗時嗣秀王師夔伯圭子永興軍節度使開府儀同三司贈新安郡王師揆伯圭次子奉國軍節度使贈澧王師禹伯圭季子保康軍節度使贈和王信王璩太祖七世孫父子彥高宗紹興四年育孝宗於宫中明年詔再選璩入宫憲聖慈烈皇后以為己子九年封崇國公五年封恩平郡王孝宗既正儲宫璩始稱皇姪三十年出居紹興府淳熙十四年薨追封信王右太祖之世楚王元佐太宗長子初封衛王後徙封楚坐罪廢為庶人真宗即位復封爵仁宗初薨允升元佐子封延安郡王宗禮允升子虔州觀察使成國公宗道允升子常州團練使贈高密侯宗楷允升子康州刺史漢東侯宗回沂州防禦使漢東郡公宗默昭州刺史安康侯宗秀左武衛華陰侯仲翹允升孫睂州防禦使通義侯昭成太子元僖太宗次子太平興國七年初封廣平郡王後封許王尹開封淳化三年薨追贈太子陳王元份太宗子太平興國八年初封冀王景德二年薨追封陳王允寧元份子武定軍節度使信安郡王宗敏允寧子文州刺史會稽侯宗盂允寧子汝州防禦使臨汝侯允讓元份子知大宗正事汝南郡王贈濮安懿王宗懿允讓子宿州觀察使和國公宗詠洪州觀察使豫章侯宗師密州觀察使高密侯宗邈隴州防禦使濟陽侯宗沔洛州防禦使廣平侯宗望舒州防禦使高密郡公安王元傑太宗子太平興國八年初封益王咸平六年薨無子密王元偓太宗子端拱元年封徐國公真宗即位封彭城郡王天禧元年封徐王二年薨曹王元稱太宗子初封涇國公真宗即位封安定郡王大中祥符七年薨贈曹王鎮王元儼太宗子景德初封廣陵郡王仁宗即位拜太尉尚書令天聖七年封鎮王後改荆王慶厯四年薨允迪元儼子安靜軍節度使贈永嘉郡王允熙元儼子滁州刺史博平侯允初元儼子寧國軍節度使贈博平郡王代國公元億太宗子早薨至道三年追封嗣濮王宗暉太宗曾孫安懿王允讓之子英宗之親兄神宗時嗣封濮王紹聖元年薨宗晟安懿王子紹聖元年嗣封宗愈紹聖二年嗣封宗綽紹聖二年嗣封宗楚紹聖三年嗣封宗祐紹聖四年嗣封宗漢紹聖五年嗣封仲增安懿王孫大觀三年嗣封仲御政和五年嗣封仲爰宣和四年嗣封仲理靖康時襲封北遷仲良建炎二年嗣封仲儡建炎八年嗣封士俴安懿王曾孫紹興二十五年嗣封士輵隆興初嗣封士歆淳熙時嗣封不秸安懿王元孫慶元二年嗣封不舋慶元六年嗣封不儔開禧三年嗣封不嫖嘉定十一年嗣封不凌