body:
  text: 文獻通考卷九十八鄱陽馬端臨貴與著宗廟考八祭祀時享宋制太廟歳以四孟月及季冬凡五享朔望薦食薦新三年一祫以孟冬五年一禘以孟夏開寳初上親享太廟見所陳籩豆簠簋問曰此何物也左右以禮器對上曰吾祖宗寧識亟命徹去進常膳如平生既而曰古禮不可廢也命復設之於是判太常寺和峴言按唐天寳中享太廟禮料外每室加常食一牙盤五代以來遂廢其禮今請如唐故事乃詔别設牙盤食禘祫時享皆用之太宗端拱二年七月詔以今年八月二十四日親享太廟㑹有彗出東井詔罷其禮仁宗慶歴時四孟臘時享太廟攝事用羊豕各二祈報象罇一别廟增黄彛壺尊二親享則加犢三年御史蔡禀言周制四時享親之禮有九今寺觀則車駕一歲再臨未嘗薦獻宗廟非奉先教民意帝謂輔臣曰三歳一祠郊廟而賚及天下若歲親行之則人有覬賞之心朕朝夕奉三聖御容於禁中未嘗敢怠也太廟舊唯薦冰景祐二年趙良規請薦新如通禮宗正寺禮官參定正月韭菘卵二月冰三月筍含桃四月麥彘五月𤓰來禽六月菱芡七月粟穄鷄棗梨八月酒稻菱九月小豆蕎麥十月兎栗藷藇十一月鴈麞十二月魚増二十六種禮院因奏禮有薦新如朔奠自頃有司言宗廟則后廟可兼遂上前廟帝主薦冰請后主奉慈后廟四時薦新如朔望牙盤食例宗正寺官充攝行禮詔可神宗元豊三年詳定郊廟奉祀禮文所言祠禴烝嘗之名春夏則物未成而祭薄秋冬則物盛而祭備故許慎以品物少文詞多為祠而王弼以禴為祭之薄何休謂祈穀成者非一黍先熟可得薦故曰嘗冬萬物畢成所薦衆多故曰烝故禮記以嘗為大嘗周禮以烝為大烝孔安國亦以烝嘗為大享今太廟四時雖有薦新而孟享禮料無祠禴烝嘗之别伏請春加韭卵夏加麥魚秋加黍豚冬加稻鴈當饋熟之節薦於神主其籩豆於常數之外别加時物之薦豐約各因其時以應古禮從之又言薦血之器禮所不載唐崔沔議曰毛血盛於槃宋書志南郊以二陶豆盛毛血開元開寳通禮及今儀注皆以豆盛之禮以豆盛菹醢登盛羮其薦毛血當以槃親享太廟但有三牲骨體俎而無腸胃膚俎不應古義請於三牲骨體俎之外加以牛羊腸胃及豕膚俎各一古者祭祀無迎神送神之禮其於祭之末皆不拜按少牢饋食禮主人朝服即位於阼階東西面鄭氏曰為將祭也即不言拜及祝告禮成主人出立於阼階上西南亦不言拜近代事神拜而迎送殊非禮意請改定儀注聖王之事宗廟禮如事生故饌則薦四時之和氣與四海九州之美味貢則陳金璧龜帛以明共天下之材其餘無常必致國之所有以明逺物無不至自秦漢以來奉宗廟者不本先王之經訓有司奉行充其位而已故天下常貢入王府者未嘗陳於太廟良為濶略請親祠太廟並令户部陳歲貢以充庭實仍以龜為前金次之玉帛次之餘居後太常禮院言舊儀親祠太廟車駕未至大次太祝宫闈令奉出帝后神主置於座行禮畢已還齋殿方納神主今親祠皇帝至阼階太祝闈令始奉神主置於座行禮畢皇帝俟納神主然後降阼階舊八室帝主各以太祝遷納其后主止命太廟宮闈令二員恐致遲緩請權差七員同奉從之詳定禮文所言古者宗廟九獻王及后各四諸臣一自漢以來為三獻后無入廟之事相循至今若時享則有事於室而無事於堂禘祫則有事於堂而無事於室室中神位不在奥堂上神位不當扆有饋食而無朝踐度今之宜以備古九獻之意請室中設神位於奥東面堂上設神位於户外之西南面皇帝立於户内西面祼鬯是為一獻出户立於扆前北向行朝踐薦腥之禮是為再獻皇帝立於户内西南行饋食薦熟之禮是為三獻詔並候廟制成取㫖又言王制祭宗廟之牛角握周禮小司徒凡小祭祀奉牛牲天子之祭無不用牛者唐郊祀錄稱宗廟社稷等祭悉用太牢今三年親祠而八室共用一犢及祫享盛祭有司攝事而不用太牢則為非稱請三年親祠并時享有司攝事太廟每室並用太牢詔親祠并祫享每室用太牢又言古者人君臨祭立於阼階者主階惟人君涖之行事示繼體祖考親親之義且以尊别於臣庶也今朝享太廟設小次於殿下褥位之東西向設皇帝版位於廟東階之東南西向乃是古者大夫士臨祭之位殊失禮意請自今太廟行禮並設皇帝版位於東階之上西向更不設殿下版位及小次又曾子問曰斂幣玉藏諸兩階之間聘禮卷幣埋於西階東舊制宗廟燔其幣未合於禮請凡禮神之幣皆埋之西階東冊則藏諸有司之匱五年詔自今太廟祠祭前廟初獻差親王宗室使相節度使郡王后廟初獻宗室節度觀察留後觀察使歲以序差不赴者罰之其餘祠祭勅差行事者准此六年十一月帝親祠南郊前期三日奉仁宗英宗徽號冊寳於太廟是日齋於大慶殿翼日薦享於景靈宫禮畢帝服通天冠絳紗袍乘玉輅至太廟宰臣百僚班迎於廟門侍中跪請降輅帝却乘輿歩入廟趨至齋宫翼日帝服鞾袍至大次有司奏中嚴外辦禮儀使跪奏請行事帝服衮冕以出至東門外殿中監進大圭帝執以入宫架樂作升東階樂止登歌樂作至位樂止太祝宮闈令奉諸室神主於座禮儀使贊曰有司謹具請行事帝再拜詣罍洗登歌樂作降階樂止宫架樂作至南北向樂止帝搢圭盥帨洗瓚拭瓚訖執圭宮架樂作升堂樂止登歌樂作殿中監進鎮圭帝搢大圭執鎮圭詣僖祖室樂止登歌奏瑞安之曲至神座前北向跪奠鎮圭於繅藉執大圭跪三上香執瓚祼地奠瓚捧幣奠訖執圭俛伏興出户外北向再拜内侍舉鎮圭以授殿中監至次室行事皆如前儀帝還位登歌樂作至位樂止宮架興安之樂作文舞九成止禮部户部尚書以次官奉逐室俎豆宫架豐安樂作奠訖樂止帝再詣罍洗登歌樂作降階樂止宮架樂作至洗南北向立樂止帝搢圭盥帨洗爵拭爵訖執圭宮架樂作帝升東階樂止登歌樂作至僖祖室樂止宫架樂作帝搢圭跪受爵祭酒三奠爵執圭俛伏興出户外北向立樂止太祝讀冊文帝再拜詣次室皆如前儀帝還位登歌樂作至位樂止文舞退武舞進宫架正安之樂作亞獻以次行事如前儀樂止帝詣飲福位登歌樂作至位樂止宫架僖安樂作帝再拜搢圭跪受爵祭酒三啐酒奠爵受俎奠俎受搏黍奠黍豆再受爵飲福酒訖奠爵執圭俛伏興再拜樂止帝還位登歌樂作至位樂止太常博士徧祭七祀配享功臣户部禮部尚書徹俎豆登歌豐安樂作徹訖樂止禮直官曰賜胙行事陪祠官皆再拜宫架興安樂作一成止太祝宫闈令奉神主入諸祏室禮儀使跪奏禮畢登歌樂作帝降階樂止宫架樂作出東門殿中監受大圭歸大次樂止有司奏解嚴轉仗赴南郊自元豐初命陳襄等詳定郊廟禮文至是始用新儀七年詔舊制薦新米麥之屬皆取於市今後宜令玉津瓊林宜春瑞聖諸園及金明池後苑供具其所無者乃索之雜買務詳定郊廟禮文所言古者薦新於廟之寢無尸不卜日不出神主奠而不祭近時擇日而薦非也天子諸侯物熟則薦不以孟仲季為限月令孟夏薦麥孟秋薦黍季秋薦稻呂氏月令一歲之間八薦新物開元禮加以五十餘品景祐中禮官建議以謂呂紀簡而近薄唐令雜而不經於是更定四時所薦凡二十八物除依詩禮月令外又増多十有七品雖出於有司一時之議然歲時登薦新物自祖宗行之已乆今欲稍加刋定取其間先王所嘗享用膳饈之物見於經者可依舊制存之其不經者去之庶㡬不失禮意請自今孟春薦韭以卵饈以葑仲春薦冰季春薦笋饈以含桃孟夏以彘嘗麥仲夏嘗雛以黍饈以𤓰季夏饈以芡以菱孟秋嘗粟與稷饈以棗以梨仲秋嘗麻嘗稻饈以蒲季秋嘗菽饈以兎以栗孟冬饈以鴈仲冬饈以麕季冬饈以魚今春不薦鮪實為闕典請季春薦鮪以應經義無則闕之如林檎蕎麥藷藇之類及季秋嘗酒皆不經見宜刪而去之凡新物及時出者即日登獻既非正祭則於禮不當卜日漢儀嘗韭之屬皆於廟而不在寢故韋元成傳以為廟歲二十五祠而薦新在焉自漢至於隋唐因仍其失薦新雖在廟然皆不出神主今出神主則失禮尤甚請依韋彤五禮精義但設神座仍俟廟成薦新於寢庶合典禮詔依所定如鮪魚闕即以魴鯉代之八年太常寺言治平四年故事山陵前宗廟輟祭享遇朔望以内臣行薦食之禮俟祔廟畢仍舊今景靈宮神御殿已行上食太廟朔望薦食自當請罷從之元祐七年太廟復用牙盤食舊制並於禮饌外設常食一牙盤元豐中罷之禮官呂希純嘗建議曰先王之於祭祀皆備上古中古及今世之食所設古器禮饌即上古中古之食也牙盤常食即今世之食也而議者乃以為宗廟牙盤原於秦漢陵寢上食殊不知三代以來自備古今之食請依祖宗舊制薦一牙盤及是始從希純之議云呂希純又嘗奏唐開元開寳禮每廟室薦獻帝后各奠一爵其后爵謂之副爵每堂室只奠一爵帝后共享慢神瀆禮莫此之甚請帝后各奠一爵亦如其儀焉徽宗大觀四年議禮局言按太廟儀注春夏用犧罇象罇秋冬用著罇壺罇各二已應周禮司罇彛之義又每享各用大罇二則是以追享朝享之罇施之於禴祠烝嘗矣其為失禮明甚請自今四時享太廟不用大罇禮記郊特牲曰灌以圭璋用玉氣也周禮典瑞祼圭有瓚以肆先王説者謂天地有禮神之玉而無鬰鬯宗廟有鬰鬯而無禮神之玉然則宗廟之玉祼圭而已圭瓚之制以圭為枋其長尺有二寸黄金為勺青金為外朱中央其容五升其徑八寸其勺之鼻為龍首所以出鬰鬯也其槃徑一尺所以承瓚也今親祀太廟以塗金銀瓚有司行事以銅瓚其大小長短之制皆不如禮請改製以應古制十一月太常光祿寺言禮制局新定太廟陳設之儀盡依周制籩豆各用二十有六簠簋各八以籩二十有六為四行以右為上饈籩二為第一行朝事籩八次之饋食籩八又次之加籩八又次之豆二十有六為四行以左為上饈豆二為第一行朝事豆八次之饋食豆八又次之加豆八又次之簠八為二行在籩之外簋八為二行在豆之外籩豆所實之物悉如周禮籩人醢人之制惟簠以稻粱簋以黍稷而茅菹以蓴蚳醢以蜂子代之十二月禮制局言太廟祭器鉶用三豋用一竊考鉶與豋皆盛羮之器祭祀烹牲於鼎升肉於俎其湆芼以醢鹽蔬實之於鉶則謂之鉶羮不致五味實之於豋則謂之太羮周官饔人祭祀共太羮鉶羮是也且宗廟之祭用太牢而三鉶實牛羊豕之羮固無可論者至於太羮止設一登以少牢饋食禮考之則少牢者羊豕之牲也佐食饈兩鉶司士進湆二豆三牲之祭鉶既設三則登亦如其數請太廟設三豋實牛羊豕之湆以為太羮明堂亦如之政和四年比部員外郎何天衢言先王建祭祀之禮必得疏數之中未聞一日並行兩祭者也今太廟薦新有與朔祭同日者夫朔祭之禮行於一月之首不可易也若夫薦新則未嘗卜日一月内皆可薦也新物未備猶許次月薦之亦何必同朔祭之日哉詔薦新與朔祭同日即用次日高宗建炎二年上幸揚州行南郊禮時太廟神主奉於壽寧寺前一日上親詣寺行朝享謝禮禮成恭謝如儀時景靈宮神御奉安於温州乃差官詣温州行禮三年上幸杭州太廟神主併奉安於温州祭享皆差官攝事以禮器未備五享權用酒脯行禮太廟朔祭每室例用一羊建炎初務省約初用酒脯紹興五年復用羊紹興七年上祀明堂於建康時有徽宗之䘮先是太常少卿吳表臣乞於大祀前二日朝獻景靈宮前一日朝享太廟及是援熙寧元年故事謂是時英宗䘮未除不廢景靈宫太廟之禮請如故事翰林學士朱震以為不然謂王制䘮三年不祭唯天地社稷得越紼行事監察御史趙渙言升祔以後宗廟常祭皆不當廢而當䘮享廟亦有顯據左氏傳曰烝嘗禘於廟曾子問曰已葬而祭此不當廢也詩頌成王即位諸侯來助祭春秋文公四年十一月成風薨六年十月猶朝於廟此顯據也疏奏詔侍從臺諫議吏部尚書孫近等十五人言謹按春秋三十三年傳凡君薨卒哭而祔祔而作主特祀於寢烝嘗禘於廟杜預謂新主既特祀於寢則宗廟四時常祀自當如舊又按景德三年明德皇后之䘮改易而服除真宗遂享太廟合祭天地於圜丘熙寧元年神宗居諒闇復用景德故事躬行郊廟之禮則是考古及今居䘮得見宗廟將來明堂大禮已在以日易月服除之後前一日皇帝合詣太廟朝享從之禮部太常寺言將來明堂大禮依已降㫖前一日朝享太廟檢照景德熙豐南郊故事皆在諒闇之中當時親行郊禮除郊廟景靈宮合用樂外所有鹵簿鼓吹及樓前宮架諸軍音樂皆備而不作其逐處廵警場止鳴金鉦鼓角而已今臣僚欲議罷宗祀奏樂受胙故事即無去奏樂受胙之文兼祖宗故事三載大饗明堂蓋亦為民祈福奏樂受胙合依祖宗累朝已行故事從之先是監察御史趙渙言春秋有事於武宮叔弓卒去樂卒事以卿佐之䘮而猶去樂况天王后之䘮而可用備樂乎載祀既殯既葬而祭五祀則尸入三飯不侑不酢以五祀之祭猶廢侑酢况宗廟之祭而可享受福釐乎故晉制國有大䘮天地明堂皆去聲樂且不受胙有唐祭日遇忌亦備樂而不奏此皆得禮之體也陛下雖在䘮服而猶宗祀者用王制之言不敢以卑廢尊也今唯聲樂受胙於未安者蓋拜跪受釐既爲嘉慶之事而虞祔既畢則廟加先帝之坐陛下薦祼饋奠進詣徽室必將想像平生悲哀感愴而乃金石絲竹雜然並奏豈不違神靈之至意而傷陛下之孝心哉將來明堂大禮前一日乞依列聖故事躬詣宗廟行朝享之禮其奏樂受胙二事乞寢庶合禮有㫖令本部太常寺討論故事紹興三十二年六月時孝宗已即位禮部太常寺言皇帝登極擇日詣太廟行朝享之禮參酌紹興十三年親享禮例牲牢禮料酒齊等並如每嵗五享施行從之淳熙十六年二月光宗受禪詔以四月六日親享太廟紹熙五年閏十月時寧宗已即位浙東提舉李大性言竊觀紹興七年侍從臺諫禮官詳定明堂典禮其大略云居䘮皆得見宗廟近者合宮展祀陛下止詣明堂殿然臣之愚竊謂與淳熙十五年事體不同又况漢文以來皆即位而謁廟陛下龍飛已三越月未嘗一至宗廟行禮鑾輿屢出過太廟門不入揆之人情似爲闕典乞與二三大臣議之早行擇日恭謝太廟少見祗肅宗廟之意於是詔遵用三年之制其朝謁太廟委有妨礙明年吏部員外郎李謙言事莫重於登極禮莫急於告廟蓋即位必告廟示敬親也告廟必於嵗首大其事也舜正月上日受命於文祖禹正月朔旦受命於神宗皆行告廟之禮也然禮以變而或殊事隨時而亦異有不可以一例觀者議禮之家各持一説不致其辯禮意無自而明夫嘉禮之與凶禮不可以並行舉一必廢一故在禮經䘮三年不祭唯祭天地社稷爲越紼而行事蓋不敢以卑而廢尊也夫天地以尊而不廢宗廟以親豈獨可廢乎况王制三年不祭之説諸儒之論亦自不同杜預之説以爲既祔以後宗廟得四時常祭蓋杜氏之意不以三年不祭宗廟爲是也今姑置常祭之説而論即位踰年告廟之禮庶㡬禮簡而易明虛言無證則論不定請質事以明之且太甲之元祀十有二月乙丑伊尹奉嗣王祗見厥祖百官猶總已以聼冢宰則是太甲居仲壬之䘮而告廟也漢吕后以八年七月即世九月大臣迎立代王元年十月辛亥文帝即祚謁高廟即是文帝居呂后之䘮而告廟也唐代宗以大歴十四年即世德宗建中元年正月庚午朝享於太廟其後穆宗長慶之元年敬宗寳歴之元年武宗㑹昌之元年懿宗咸通之元年皆以正月朝享於太廟徧觀歴代之制雖小節不同大槩居䘮雖權住祭踰年正月必告於廟載諸經史可考而知漢昭宣元成哀平六世皆以即位謁廟不待踰年則失之速唐太宗貞觀三年正月方事於太廟馬周得以爲言則失之緩皆非禮之正也以歴代之事而求其當其惟踰年正月告廟乎恭惟陛下自登極以來已享帝矣大行梓宮發引在即來年正月盍行告廟之禮禮官未見申明者豈非以王制爲據乎竊謂即位之後已曽謁廟國有大故故可以未祭與居䘮之後即位未經謁廟者事體不同考歴代已行之事宜於來年正月一日陛下躬行告廟之禮庶㡬立一王之制示萬世之規乞下禮官指定施行詔令禮部太常寺討論聞奏至是禮寺看詳乞俟皇帝從吉日討論典禮施行從之禮部太常寺修立郊祀大禮前一日朝享太廟行禮儀注陳設前享三日儀鑾司設大次於太廟東神門外道北南向小次於阼階東稍南西向又設文武侍臣次於大次之前行事助祭官宗室及有司次於廟之内外設東方南方客使次於文官之後西方北方客使次於武官之後各隨地之宜設饌幔於南神門外每室饌幔各一又設七祀次於殿下横街之北道西東向又設配享功臣次於殿下横街之南東西相向每室功臣配享各爲一次前享二日宫闈令帥其屬掃除廟之内外開瘞坎於殿西階之東南方深取足容物南出陛太常設七祀燎柴於南神門外光祿牽牲詣所太常陳登歌之樂於殿上前楹間稍南北向設宫架於庭中立舞表於酇綴之間户部陳諸州嵗貢於宫架之南神門外隨地之宜東西相向前享一日奉禮郎禮直官設皇帝位版於阼階上飲福位於東序俱西向贊者設亞終獻位於小次南稍東助祭親王宗室使相在其南進幣爵酒官受爵酒官奉幣官薦牛俎官薦羊俎官實鑊水官薦豕俎官増沃鑊水官受幣官盥洗奉爵官奉瓚槃官進搏黍官舉冊官七祀獻官在助祭宗室使相之南並西向北上大禮使位於西階之西稍南與亞終獻相對行事光祿卿讀冊官光祿丞功臣南官在其西太常光祿以下皆稍却執