body:
  text: 文獻通考卷一百八十三鄱陽馬端臨貴與著經籍考十經春秋春秋經解十五卷陳氏曰孫覺撰其自序言三家之説榖梁最為精深且以為夲雜取二傳及諸儒之説長者從之其所未安則以所聞于安定先生者斷之楊龜山為之後序海陵周茂振跋云先君傳春秋于孫先生嘗言王荆公初欲釋春秋以行于天下而莘老之書已出一見而忌之自知不能復出其右遂詆聖經而廢之曰此斷爛朝報也不列于學官不用于貢舉云春秋尊王發微十五卷鼂氏曰皇朝孫眀復撰史臣言眀復治春秋不取傳注其言簡而義詳著諸大夫功罪以考時之盛衰而推見治亂之迹故得經之意為多常秩則譏之曰眀復為春秋猶商鞅之法棄灰于道者有刑步過六尺者有誅謂其失于刻也胡安國亦以秩言為然石林葉氏曰孫眀復春秋專廢傳從經然不盡逹經例又不深于禮學故其言多自抵牾有甚害于經者雖槩以禮論當時之過而不能盡禮之制尤為膚淺朱子語録曰近時言春秋皆是計較利害大義却不曾見如唐之陸淳夲朝孫眀復之徒他雖未曾深于聖經然觀其推言治道凛凛然可畏終是得聖人箇意思春秋之作蓋以當時人欲橫流遂以二百四十二年行事寓其褒貶恰如今之事送在法司相似極嚴謹一字不輕易若如今之説法只是箇權謀智略兵書譎詐之書爾聖人晚年痛哭流涕筆為此書其肯恁地􅊏巧豈至恁地不濟事陳氏曰復居泰山之陽以春秋教授不惑傳注不為曲説其言簡易眀于諸侯大夫功罪以考時之盛衰而推見王道之治亂得于經為多石介而下皆師事之歐陽文忠公為作墓志春秋演聖統例二十卷鼂氏曰皇朝丁副撰田偉書目副作嗣未知孰誤其序云經有例法一家所至較然重輕杜預釋例專主左氏而未該唐陸淳纂例雖舉經而未備纎悉網羅而咸在者其惟此書乎春秋權衡意林劉氏春秋傳共三十四卷劉敞原父撰其自序曰劉子作春秋權衡權衡之書始出未有能讀者自序其首曰權凖也衡平也物雖重必凖于權權雖移必平于衡故權衡者天下之公器也所以使輕重無隱也所以使低昂適中也察之者易知執之者易從也不凖則無以知輕重不平則輕重雖出不信也故權衡者天下之至信也凡議春秋亦若此矣春秋一也而傳之者三家是以其善惡相反其褒貶相戾則是何也非以其無凖失輕重邪且昔者董仲舒江公劉歆之徒蓋常相與爭此三家矣上道堯舜下據周禮是非之議不可勝陳至于今未決則是何也非以其低昂不平邪故利臆説者害公義便私學者妨大道此儒者之大禁也誠凖之以其權則童子不欺平之以其衡則市人不惑今此新書之謂也雖然非達學通人則亦必不能觀之矣耳牽于所聞而目迷于所習恐懷見破之私意而無從善服義之公心故亦譬之權衡矣或利其寡而視權如嬴或利其多而視權如縮若此者非權衡之過也人事之變也鼂氏曰權衡論三傳之失意林序其解經之旨劉氏傳其所解經也如桓無王季友卒胥命用郊之類皆古人所未言石林葉氏曰劉原父知經而不廢傳亦不盡從傳據義考例以折衷之經傳更相發眀雖間有未然而淵源已正今學者治經不精而蘇孫之學近而易眀其失者不能遽見故皆信之而劉以其難入則或詆以為用意太過出于穿鑿彼不知經無怪其然也陳氏曰原父始為權衡以平三家之得失然後集衆説斷以己意而為之傳傳所不盡者見之意林其傅用公穀文體説例凡四十九黎氏春秋經解十二卷鼂氏曰皇朝黎錞希聲撰錞蜀人歐陽公之客名其書為經解者言以經解經也其後又為統論附焉橫渠春秋説一卷鼂氏曰張子厚撰為門人雜説春秋其書未成潁濵春秋集傳十二卷鼂氏曰蘇轍子由撰大意以世人多師孫復不復信史故盡棄二傳全以左氏為夲至其不能通者始取二傳啖趙自熙寧謫居髙安至元符初十數年矣暇日輒有改定卜居龍川而書始成石林葉氏曰蘇子由專據左氏言經左氏解經者無幾其凡例既不盡經所書亦多違牾疑自出己意為之非有所傳授不若公穀之合于經故蘇氏但以傳之事釋經之文而已傳事之誤者不復敢議則遷經以成其説亦不盡立凡例于經義皆以為求之過朱子語録曰蘇子由解春秋謂其從赴告此説亦是既書鄭伯宇又書鄭世子忽據史文而書耳定哀之時聖人親見據實而書隱桓之時世既逺史册亦有簡略處夫子據史册寫出耳陳氏曰其書專取左氏不得已乃取二傳啖趙蓋以一時談經者不復信史或失事實故也伊川春秋傳二卷程子自序曰後世以史視春秋謂褒善貶惡而已至于經世之大法則不知也春秋大義數十其義雖大炳如日星乃易見也惟其微辭隱義時措從宜者為難知也或抑或縱或與或奪或進或退或微或顯而得乎義理之安文質之中寬猛之宜是非之公乃制事之權衡揆道之模範也夫觀百物然後識化工之神聚衆材然後知作室之用于一事一義而欲窺聖人之用心一本無心字非上智不能也故學春秋者必優遊涵泳默識心通然後能造其微也後王知春秋之義則雖德非禹湯尚可以法三代之治自秦而下其學不傳豫悼夫聖人之志不眀于後世也故作傳以眀之俾後之人通其文而求其義得其意而法其用則三代可復也是傳也雖未能極聖人之藴奧庶幾學者得其門而入矣朱子語類曰或問伊川春秋傳曰中間有説好處如難理會處他亦不為決然之論如説滕子來朝以為滕夲侯爵後微弱服屬于魯自貶降而以子禮見魯則貢賦少力易供此説最好程沙隨之説亦然陳氏曰略舉大義不盡為説襄昭後尤略序文崇寧二年作蓋其晚年也劉質夫春秋十二卷鼂氏曰皇朝劉絢質夫撰絢學于二程伯淳嘗語人曰他人之學敏則有之未易保也斯人之至吾無疑焉正叔亦曰遊吾門者多矣而信之篤得之多行之果守之固若子者幾希有李參序陳氏曰所解眀正簡切中興國史志絢傳説多出于頥書而頥以為不盡夲意故更為之未及竟故莊公以後解釋多殘闕春秋得法志例論三十卷鼂氏曰皇朝馮正符所撰熙寧八年何郯取其書奏之久而不報意王安石不喜春秋故也其書例最詳悉務通經旨不事浮辭正符頗與鄧綰陳亨甫交私後坐口語被斥陳氏曰蜀州晉原主簿遂寧馮正符信道撰其父堯民希元為鄉先生正符三上禮部不第教授梓遂學十年著此書及詩易論語解蜀守何郯首以其春秋論上之熙寧末中丞鄧綰薦之得召試賜同進士出身王安石亦待之厚其書首辨王魯素王之説及杜預三體五例何休三科九旨之怪妄穿鑿皆正論也巽巖李氏曰信道當熙寧九年用御史鄧文約薦召試舍人院賜出身文約尋責守虢略信道亦坐附會奪官歸故郡後又得馮允南所為墓銘信道實事安逸處士何羣其學蓋得之羣羣學最高國史有傳其師友淵源果如此則謂信道附會進取或以好惡言之耳王荆公當國廢春秋不立學官而信道學經顧于春秋特詳鄧御史嚴事王荆公不敢異乃先以得法志例論言于朝初不曰宰相不喜此也此亦可見當時風俗猶淳厚士各行其志不專以利祿故輟作御史殆加于人一等然信道要當與何羣牽聨書國史鄧御史偶相知適相纍耳余舊評如此今無子孫其書則為鬻書者擅易其姓名屬諸李陶陶字唐夫嘗學于溫公號通經李氏諸子唐夫最賢而得法志例則實非唐夫所論也不知者妄託之繹聖傳十二卷鼂氏曰皇朝任伯雨德翁所撰解經不甚通例如解桓十三年二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績取榖梁之説戰稱人敗績稱師重衆之説殊不知齊人伐衛衛人及齊人戰衛人敗績何獨不重衆也王氏春秋列國諸臣傳共六十三卷鼂氏曰皇朝王當撰當眉山人嘗為列國諸臣傳效司馬遷史記凡一百三十有四人十萬餘言今又釋春秋真可謂有志矣陳氏曰當元祐中復制科以蘇轍薦試六論廷對切直置下第與堂除簿尉所傳諸臣皆夲左氏有見于他書則附其末繫之以贊諸贊論議純正文辭簡古于經傳多所發眀馮氏春秋通解十二卷鼂氏曰皇朝馮山允南撰普州人澥之父也春秋會義二十六卷鼂氏曰皇祐間進士杜諤集釋例繁露規過膏肓先儒同異篇指掌碎玉折衷指掌議纂例辨疑微旨摘微通例胡氏論箋義總論尊王發微夲旨辨要旨要集議索隱新義經社三十餘家成一書其後仍斷以己意雖其説不皆得聖人之旨然使後人博觀古今異同之説則于聖人之旨或有得焉陳氏曰自三傳及啖趙諸儒訖于孫氏經社凡三十餘家集而繫之時述以己意有任貫者為之序春秋口義五卷陳氏曰胡翼之撰至宣十二年而止戴岷隱在湖學嘗續之不傳春秋皇綱論眀例隱括圖共六卷陳氏曰太常博士王哲撰至和間入館閣目有通義十二卷未見左氏解一卷陳氏曰專辨左氏為六國時人其眀驗十有一事題王安石撰其實非也左氏邦典二卷陳氏曰唐既潛亨撰質肅之姪自號真淡翁與其子愗問答而為此書鄒道卿為之序左氏鼓吹一卷陳氏曰彭門吳元緒撰春秋後傳補遺共二十一卷陳氏曰陸佃撰補遺者其子宰所作也宰字元鈞遊之父也春秋通訓五禮例宗共二十六卷陳氏曰直祕閣吳興張大亨嘉父撰其自序言少聞春秋于趙郡和仲先生某初蓋嘗作例宗論立例之大要矣先生曰此書自有妙用學者罕能領會多求之繩約中乃近法家者流仔細繳繞竟亦何用惟丘眀識其用然不肯盡談微見端兆使學者自得之豫從事斯語十有餘年始得其倣佛通訓之作所謂去例以求經略微文而視大體者也東坡一字和仲所謂趙郡和仲其東坡乎然例宗考究亦為詳洽胡文定春秋傳通例通旨共三十二卷鼂氏曰皇朝胡安國被旨撰安國師程頥其傳春秋事按左氏義取公穀之精者採孟子莊周董仲舒王通邵堯夫程眀道張橫渠程正叔之説以潤色之其序略曰近世推隆王氏新説按為國是獨于春秋貢舉不以取士庠序不以設官經筵不以進讀斷國論者無以折衷天下不知所適人欲日長天理日銷其效使夷狄亂華莫之遏也陳氏曰紹興中經筵所進大綱夲孟子而微旨多以程氏之説為據近世學春秋者皆宗之通旨者所與其徒問答及其他議論條例凡二百餘章其子寧輯為一書中興史志曰安國書與孫覺合者十六七朱子語録曰胡文定春秋非不好却不合這件事聖人意是如何下字那件事聖人意又如何下字要知聖人只是直筆據見在而書豈有許多忉怛胡春秋傳有牽強處然議論有開合精神春秋指南十卷鼂氏曰吳園先生張根知常撰以征伐會盟年經而國緯汪藻為之序陳氏曰專以編年旁通該括諸國之事如指掌又為解例亦用旁通法其他辨疑雜論諸篇略要義多所發眀春秋新傳十一卷鼂氏曰皇朝余安行撰采三傳及孫復四家書參以己意為之四家春秋集解二十五卷鼂氏曰或人集皇朝師協石季長王棐景先之解為一通具載夲文春秋機括一卷鼂氏曰皇朝沈括存中撰春秋譜也石林春秋傳春秋考春秋讞共七十二卷陳氏曰葉夢得撰各有序其序讞曰以春秋為用法之君而已聼之有不盡其辭則欺民有不盡其法則欺君凡啖趙論三家之失為辨疑劉氏廣啖趙之遺為權衡合二書正其差誤而補其疏略目之曰讞其序考曰君子不難于攻人之失而難于正己之是必有得也乃可知其失必有是也乃可斥其非自是讞推之知吾之所正為不妄也而後可以觀吾考自其考推之知吾之所擇為不誣也而後可以觀吾傳其序傳曰左氏傳事不傳義是以詳于史而事未必實以其不知經也公穀傳義不傳事是以詳于經而義未必當以其不知史也乃酌三家求史與經不得于事則考于義不得于義則考于事更相發眀以作傳其為書辨訂考究無不精詳然其取何休之説以十二公為法天之大數則所未可曉也春秋經解夲例例要共十七卷陳氏曰涪陵崔子方彥直撰紹聖中罷春秋取士子方三上書乞復之不報遂不應進士舉黃山谷稱曰六合有佳士曰崔彥直其人不遊諸公然則賢而有守可知矣其學辨三傳之是非而專以日月為例則正蹈其失而不悟也春秋本旨二十卷陳氏曰知饒州丹陽洪興祖慶善撰其序言三代各立一王之法其末皆有弊春秋經世之大法通萬世而無弊又言春秋夲無例學者因行事之迹以為例猶天夲無度歷者即周天之數以為度又言屬辭比事春秋教也學者獨求于義則其失迂而鑿獨求于例則其失拘而淺若此類多先儒所未發其解經義精而通矣興祖嘗為程瑀作論語解序忤秦檜貶昭州以死春秋正辭通例共三十五卷陳氏曰知盱眙軍東平畢良史少董撰良史為東亰留守屬官東亰再陷留敵中三年著此書已而得歸表上之息齋春秋集注十四卷陳氏曰禮部侍郎鄞髙閌抑崇撰其學專夲程氏序文可見夾漈春秋傳春秋考地名共十四卷其通志中自述曰按春秋之經則魯史記也初無同異之文亦無彼此之説良由三家所傳之書有異同故是非從此起臣作春秋考所以是正經文以凡有異同者皆是訛誤古者簡編艱繁學者希見親書惟以口相授左氏世為楚史親見官書其訛差少然有所訛從文起公穀漢之經生惟是口傳其訛差多然有所訛從音起以此辨之了無滯疑又有春秋傳十二卷以眀經之旨備見周之憲章陳氏曰其學大抵工于考究而義理多迂僻春秋經解指要共十四卷陳氏曰知常州永嘉薛季宣士龍撰指要列譜例于前其序專言諸侯無史天子有外史掌四方之志而職于周之太史隱之時更周歷而為魯史季宣博學通儒不事科舉陳止齋師事之季宣死當乾道九年年四十其為此書實紹興三十二年蓋甫二十歲云朱子語録曰薛常州解春秋不知如何率意如此只是幾日成此文字如何説諸侯無史內則尚有閭史又如趙盾崔杼事皆史臣所書春秋集傳十五卷陳氏曰監察御史王葆彥光撰朱新仲為作序葆周益公之婦翁也其説多用胡氏春秋集解十二卷陳氏曰吕夲中撰自三傳而下集諸家之説各記其名氏然不過陸氏及兩孫氏兩劉氏蘇氏程氏計嵩老胡文定數家而已大略如杜諤會義而所擇頗精却無自已議論朱子語録曰吕居仁春秋亦甚眀白正如某詩傳相似左傳類編六卷陳氏曰吕祖謙撰分類外內傳事實制度論議凡十九門首有綱領數則兼採他書左氏博議二十卷陳氏曰吕祖謙撰方授徒時所作自序曰春秋經旨不敢僣議而枝辭贅喻則舉子所以資課試也左氏説三十卷陳氏曰吕祖謙撰于左氏一書多有發眀而不為文似一時講説門人所抄朱子語録曰東萊有左氏説亦好是人記録他言語左氏國紀徐得之撰止齋陳氏序曰自荀恱袁宏以兩漢事編年為書謂之左氏體蓋不知左氏于是始矣昔夫子作春秋博極天下之史矣諸不在撥亂世反之正之科則不録也左氏獨有見于經故采史記次第之某國事若干某事書某事不書以發眀聖人筆削之旨云爾非直編年為一書也古者事言各有史凡朝廷號令與其君臣相告語為一書今書是已被之弦歌謂之樂章為一書今詩是也有司藏焉而官府都鄙邦國習行之為一書今儀禮若周官之六典是已自天子至大夫士民族傳序為一書若所謂帝繫世夲是已而他星卜醫祝皆各為書至編年則必敘事如春秋三代而上僅可見者周譜他往往見野史竹書穆天子傳之類自夫子始以編年作經其筆削嚴矣左氏亦始合事言二史與諸書之體依經以作傳附著年月下茍不可以發眀筆削之指則亦不録也蓋其辭足以傳逺而無與于經誼則别為國語至夫子所見書左氏有不盡見又闕不敢為傳唯謹如此後作者顧以為一家史體而讀左氏者寖失其意見謂不釋經是書之在亡幾無損益于春秋故曰袁荀二子為之也由是言之徐子所為左氏國紀曷可少哉余讀國紀周平桓之際王室嘗有事于四方其大若置曲沃伯為侯詩人美焉而經不著師行非一役亦與王風刺詩合而特書伐鄭一事王子頺之禍視帶為甚襄書而惠不書也學者誠得國紀伏而讀之因其類居而稽之經某國事若干某事書某事不書較然眀矣于是致疑疑而思思則有得矣徐子殆有功于左氏者也余苦不多見書然嘗見唐􅰚左氏史與國紀略同而無所論斷今國紀有所論斷矣余故不復贊而道其有功于左氏者為之序春秋比事二十卷陳同甫序之曰春秋繼四代而作者也聖人經世之志寓于屬辭比事之間而讀書者每患其難通其善讀則曰以傳考經之事迹以經考傳之真偽如此則經果不可以無傳矣遊夏之徒胡為而不能措一辭也余嘗欲即經以類次其事之始末考其事以論其時庶幾抱遺經以見聖人之志客有遺余以春秋總論者曰是習春秋者之祕書也余讀之灑然有當于余心雖其論未能一一中的而即經類事以見其始末使聖人之志可以捨傳而獨考此其為志亦大矣惜其為此書之勤而卒不見其名也或曰是沈文伯之所為也文伯名棐湖州人常為婺之校官因為易其名曰春秋比事鋟諸木以與同志者共之陳氏曰按湖州有沈文伯名長卿號審齋居仁為常州倅忤秦檜貶化州不名棐也不知同甫何以云然豈别名棐而字文伯者乎然則非湖人也春秋經傳集解三十三卷陳氏曰林栗撰其學專主左氏而黜二傳故為左氏傳解表上之止齋春秋後傳左氏章指共四十二卷陳氏曰陳傅良撰樓參政鑰為之序大略謂左氏存其所不書以實其所書公羊穀梁以其所書推見其所不書而左氏實録矣此章指之所以作也若其他發明多新説序文略見之徐潮州春秋解十二卷知潮州徐某德操撰水心序略曰箋傳之學惟春秋為難工經理也史事也春秋名經而實史也專于經則理虛而無證專于史則事礙而不通所以難也年時閏朔禘郊廟制理之綱條不專于史也濟西河曲丘甲田賦事之枝葉不專于經也薛伯卒經無預然杞滕邾莒之興廢固眀也詭諸卒史無預然戊寅甲子之先後固察也觀潮州此類皆卓信眀而篤矣至于授霸者之權彼與此奪録夷狄之變先略後詳諸侯羣誅大夫衆貶凡春秋始終統紀所繫自公穀以來畫為義例名分字别族貴人微其能夲末相顧隱顯協中如潮州殆鮮焉然則理之熟故經而非虛事之類故史而非礙歟古人以教其國而使人知深于是書者歟雖然詩書禮所以紀堯舜三代之盛而春秋衰世之竭澤也示不泯絶而已或者遂謂一事一義皆聖人之用則余未敢從也春秋經辨十卷陳氏曰廬陵蕭楚子荆撰紹聖中貢禮部不第蔡亰用事與其徒馮澥書言蔡將為宋王莽誓不復仕死建炎中自號三顧隱客門人諡為清節先生胡邦衡師事之以春秋登甲科歸拜床下楚告之曰學者非但拾一第身可殺學不可辱毋禍吾春秋乃佳邦衡志其墓春秋集善十一卷陳氏曰端眀殿學士廬陵胡銓邦衡撰銓既事蕭楚為春秋學復學于胡文定公安國南遷後作此書張魏公為之序春秋考異四卷陳氏曰不著名氏録三傳經文之異者春秋類事始末五卷陳氏曰朝請大夫吳興章沖茂深撰子厚之曾孫葉少藴之壻左氏發揮六卷陳氏曰臨川吳曾虎臣撰取左氏所載事時為之論若史評之類春秋直音三卷陳氏曰德清丞方淑智善撰劉給事一止為作序以學者或不通音切故于每字切腳之下直注其音蓋古文未有反切為音訓者皆如此服虔如淳文頴輩於漢書音義可見左傳約説百論共二卷陳氏曰奉議郎新昌石朝英撰又有王道辨一書未板行僅存其書于此篇之末其為説平平無甚髙論左氏紀傳五十卷巽巖李氏曰不著撰人名氏取丘眀所著二書用司馬遷史記法君臣各為紀傳凡欲觀某國之治亂某人之臧否其行事夲末畢陳于前不復錯見旁出可省翻閲之勤或事同而辭異者皆兩存之又因以得文章繁簡之度雖編削附離尚多不滿人意然亦可謂有其志矣獨所敘世族譜繫既與釋例不同又非史遷所記質諸世夲亦不合也疑撰者别據他書今姑仍其舊以俟考求又題後在陵陽觀沈存中自志乃知此書存中所著存中喜述作而此書終不滿人意史法信未易云春秋分記九十卷陳氏曰邛州教授眉山程公説伯剛撰以春秋經傳倣司馬遷書為年表世譜歷天文五行地理禮樂征伐官制諸書自周魯而下及諸小國夷狄皆彚次之時有所論發眀成一家之學公説積學苦志早年登科值逆曦亂憂憤以死年才三十七兄弟三人皆以科第進中書舍人公許其季也春秋三傳分國紀事夲末夾江勾龍傅眀甫撰後溪劉氏序略曰勾龍君傳習詳考又分國而紀之自東周而下大國次國特出小國滅國附見不獨紀其事與其文而兼著其義凡采其説者數十家君蓋嗜古尊經之士確乎其能自信者也春秋通説十三卷陳氏曰永嘉黃仲炎若晦撰端平中嘗進之于朝春秋外傳國語二十一卷崇文總目左丘眀撰吳侍中領左國史亭陵侯韋昭解昭參引鄭衆賈逵虞翻唐固二人皆吳臣合凡五家為注自所發正者三百十事鼂氏曰班固藝文志有國語二十一篇隋志云二十二卷唐志云二十一卷今書篇次與漢志同蓋歷代儒者析簡併篇互有損益不足疑也要之藝文志審矣陸淳謂與左傳文體不倫定非一人所為蓋未必然范寧云左氏富而豔韓愈云左氏浮夸今觀此書信乎其富豔且浮夸矣非左氏而誰栁宗元稱越語尤竒峻豈特越哉自楚以下類如此巽巖李氏曰昔左丘眀將傳春秋乃先采集列國之史國别為語旋獵其英華作春秋傳而先所采集之語草藁具存時人共傳習之號曰國語殆非丘眀夲志也故其辭多枝葉不若內傳之簡直峻健甚者駮雜不類如出他手蓋由當時列國之史材有厚薄學有淺深故不能醇一耳不然丘眀特為此重復之書何邪先儒或謂春秋傳先成國語繼作誤矣惟夲朝司馬溫公父子能識之陳氏曰自班固志言左丘眀所著至今與春秋傳並行號為外傳今考二書雖相出入而事辭或多異同文體亦不類意必非出一人之手也司馬子長云左丘失眀厥有國語又似不知所謂唐啖助亦嘗辨之朱子語録曰國語委靡繁絮真衰世之文耳是時語言議論如此宜乎周之不能振起也國語文字極困沓振作不起國語補音三卷陳氏曰丞相安陸宋庠公序撰以先儒未有為國語音者近世傳舊音一卷不著撰人名氏蓋唐人也簡陋不足名書因而廣之悉以陸德眀釋文為主陸所不載則附益之非國語二卷鼂氏曰唐柳宗元子厚撰序云左氏國語其文深閎傑異而其説多誣淫懼學者溺其文采而淪于是非夲諸理作非國語上卷三十一篇下卷三十六篇左傳國語類編二卷陳氏曰吕祖謙撰與左傳類編略同但不載綱領止有十六門又分傳與國語為二汲冡師春一卷陳氏曰晉汲郡魏安釐王冡所得古簡杜預得其紀年知其魏國史記以考證春秋别有一卷純集疏左氏傳卜筮事上下次第及其文義皆與左傳同名曰師春似是抄集者人名也今此書首敘周及諸國世系又論分野律吕為圖又雜録諡法卦變與杜預所言純集卜筮者不同似非當時夲書也文獻通考卷一百八十三
