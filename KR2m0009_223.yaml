body:
  text: 文獻通考卷二百二十三鄱陽馬端臨貴與著經籍考五十子醫家太平聖惠方一百卷鼂氏曰太宗皇帝在潛邸日多蓄名方異術太平興國中内出親驗者千餘首乃詔醫局各上家傳方書命王懐隱王祐鄭彦陳昭遇校正編類各篇首著其疾證淳化初書成御製序引慶歴善救方一卷兩朝藝文志詔以福州奏獄醫林士元藥下蠱毒人以獲全錄其方令國醫類集附益八年頒行皇祐簡要濟衆方五卷兩朝藝文志皇祐中仁宗謂輔臣曰外無善醫民有疾疫或不能救療其令太醫簡聖惠方之要者頒下諸道仍勅長史按方劑以時拯濟令醫官使周應編以爲此方三年頒行太醫局方十卷鼂氏曰元豐中詔天下髙手醫各以得效祕方進下太醫局驗試依方製藥鬻之仍模本傳於世和劑局方十卷鼂氏曰大觀中詔通醫刋正藥局方書閱歲書成校正七百八字增損七十餘方陳氏曰庫部郎中陳師文等校正凡二十一門二百九十七方其後時有增補王氏博濟方五卷鼂氏曰皇朝太原王袞撰慶歴間因官滑臺暇日出家藏七十餘方擇其善者爲此書名醫云其方用之無不效如草還丹治大風太乙丹治鬼胎尤奇驗藥凖一卷陳氏曰潞公文彦博寛夫撰所集方才四十首以爲依本草而用藥則有凖故以此四十方為處方用藥之凖也沈存中良方十卷鼂氏曰皇朝沈括存中撰存中博學通醫術類其經驗方成此書用者多驗或以蘇子瞻論醫藥雜説附之陳氏曰不知何人所錄其間辯鷄舌香一叚言靈苑所辯猶有未盡者館閣書目别有沈氏良方十卷蘇沈良方十五卷而無靈苑方靈苑二十卷鼂氏曰亦存中編本朝士夫如高若訥林億孫奇龐安常皆以善醫名世而存中尤善方書此書所載多可用孫氏傳家祕寶方三卷陳氏曰尚藥奉御太醫令孫用和集其子殿中丞兆父子皆以醫名自昭陵時迄於熙豐無能出其右者元豐八年兆弟宰爲河東漕屬呂惠卿帥并從宰得其書序而刻之自言爲思邈之後鼂氏讀書志作孫尚祕寶方凡十卷養生必用方十六卷鼂氏曰皇朝初虞世撰序謂古人醫經行於世者多矣所以别著者古方分劑與今銖兩不侔用者頗難此方其證易詳其法易用茍尋文為治雖不習之人亦可無求於醫也虞世本朝士一旦削髮爲僧在襄陽與十父遊從甚密尊生要訣二卷陳氏曰卽初虞世四時常用要方有廬山陳淮者復附益焉楊子護命方五卷通神論十四卷鼂氏曰皇朝楊退修撰以岐伯論五運六氣以治百病後世通之者惟王砯一人而已然猶於遷變行度莫知其始終次序故著此方論云龎氏家藏祕寶方五卷陳氏曰蘄水龎安時安常撰安時以醫名世所著書傳於世者惟傷寒而已此書南城吳炎晦父錄以見遺山谷黄氏龎安常傷寒論後序安常自少時善醫方爲人治病處其生死多驗名傾江淮諸醫然爲氣任俠鬬雞走狗蹴踘擊毬少年豪縱事無所不爲博奕音技一工所難而兼能之家富多後房不出戸而所欲得人之以醫聘之也皆多陳其所好以順適其意其來也病家如市其疾已也君脱然不受謝而去之中年乃屏絶戲弄閉門讀書自神農黄帝經方扁鵲八十一難經靈樞甲乙葛洪所綜緝百家之言無不貫穿其簡策紛錯黄素朽蠧先師或失其讀學術淺陋私智穿鑿曲士或竄其文安常悉能辯論發揮每用以視病如是而生如是而不治幾乎十全矣然人以病造之不擇貴賤貧富便齋曲房調䕶以寒暑之宜珍膳羮饘時節其饑飽之度愛其老而慈其㓜如痛在己也未嘗輕用人之疾嘗試其所不知之方蓋其輕財如糞土而樂義耐事如慈母而有常似秦漢間游俠而不害人似戰國四公子而不爭利所以能動而得意起人之疾不可縷數他日過之未嘗有德色其所論著傷寒論多得古人不言之意其所師用而得意於病家之隂陽虛實今世所謂良醫十不得其五也余始欲掇其大要論其精微使士大夫稍知之適有心腹之疾未能卒業然未嘗游其庭者雖得吾言而不解若有意於斯者讀其書自足攬其精微故特著其行事以為後序云其前序海上道人諾爲之故虛右以待宛邱張氏䟦傷寒論曰張仲景傷寒論論病處方纎悉必具又爲之增損進退之法以預吿人嗟夫仁人之用心哉且非通神造妙不能爲也安常又竊憂其有病證而無方者續著為論數卷用心爲術追儷古人淮南謂安常能與傷寒説話豈不信哉錢氏小兒方八卷鼂氏曰皇朝錢乙仲陽撰神宗時擢太醫丞於書無所不窺他人勤勤守古獨度越縱舍卒與法合尤邃本草多識物理辯正闕誤最工療嬰孺病年八十二而終閻季忠方附其後錢氏小兒藥證眞訣三卷陳氏曰錢仲陽撰閻季忠集上卷言證中卷叙嘗所治病下卷爲方季忠亦頗附以己説且以劉斯立所作仲陽傳附於末宣和元年也嬰童寶鏡十卷鼂氏曰題曰栖眞子不著姓名錄世行應驗方成此書小兒靈祕方十三卷鼂氏曰不題撰人辯小兒疾證及治療之方多爲歌訣小兒玉訣一卷鼂氏曰未詳撰人名氏爲韻語以記小兒疾證治法二十三醫說十卷陳氏曰新安張景季明撰食治通説一卷陳氏曰東虢婁居中撰臨安藥肆金藥臼者有子登第以恩得初品官趙忠定丞相䟦其後書凡十六篇大要以食治則身治此上工醫未病之一術也趙丞相序略曰君自㓜業醫至是歴八十一寒暑矣錢唐行都多貴人君未嘗出謁卿相王侯之家屢迎之不可致每旦肩輿至藥肆羣兒已四集悲啼呌號囂然滿室君皆調䕶委曲坐良乆徐起枚視之一以至之先後為序輙爲言兒本無疾愛之者害之也如言兒下利時此為脾虛乳食過傷所致惟苦節其乳食微以參术藥温其胃即愈矣而愛之者曰兒數利氣且乏非强食莫補其所喪於是胃虛不能攝化其氣重傷參术弗效增以薑附薑附不已重以金石而兒殆矣胡不以身喻之方吾曹盛壯時日食二升米飯幾不滿欲一日意中微不佳則粒米不堪向口何况兒乎予毎視君持藥欲授時必諄諄爲人開説口幾欲破又為紙囊貯藥各著其説於上使歸而勿忘焉治病須知一卷陳氏曰不知名氏專論外證以用藥之次第爲不能脉者設也正俗方一卷陳氏曰知䖍州長樂劉彛執中撰以䖍俗信巫無醫藥集此方以教人奉親養老書一卷陳氏曰泰州興化令陳眞撰元豐中人小兒班疹論一卷陳氏曰東平董汲及之撰錢乙元祐癸酉題其末脚氣治法一卷陳氏曰董汲撰指迷方三卷陳氏曰考城子王貺子亨撰吳丞相敏爲之序貺為南京名醫宋毅叔之壻宣和中以醫得幸至朝請大夫九籥衛生方三卷陳氏曰宣和宗室忠州防禦使士紆撰治風一卷陳氏曰張耒文潛所傳凡三十二方小兒醫方妙選三卷陳氏曰成安大夫惠州團練使張渙撰凡四百二十方渙五世爲小兒醫未嘗改科靖康元年自為之序鷄峯備急方一卷陳氏曰太醫教授張銳撰紹興三年爲序大抵皆單方也産育保慶集一卷陳氏曰濮陽李師聖得産論二十一篇有其説而無其書醫學教授郭稽中以方附諸論之末遂為全書近時括蒼陳言嘗評其得失於三因方婺醫杜荍者又附益之頗爲詳備本事方十卷陳氏曰維揚許叔微知可撰紹興三年進士第六人以藥餌隂功見於夢寐事載夷堅志晚歲取平生已試驗之方併記其事實以為此書取本事詩詞之例以名之傷寒歌三卷陳氏曰許叔微撰凡百篇皆本仲景法又有治法八十一篇及仲景脉法三十六圖翼傷寒論二卷辯類五卷皆未見指南方二卷陳氏曰蜀人史堪載之撰凡三十一門各有論楊氏方二十卷陳氏曰樞宻楊倓子靖以家藏方一千一百十有一首刻之當塗世多用之本草單方三十五卷陳氏曰工部侍郎宛邱王俁碩父撰取本草諸藥條下所載單方以門類編之凡四千二百有六方何氏方六卷陳氏曰太常博士括蒼何偁德揚撰洪氏方一卷陳氏曰鄱陽洪氏莫氏方一卷陳氏曰刑部郎中吳興莫伯虛致道刻博濟方於永嘉而以其家藏經驗方附於後備急總效方四十卷陳氏曰知平江府溧陽李朝正撰大抵皆單方也是齋百一選方三十卷陳氏曰山隂王璆孟玉撰百一言其選之精也三因極一方六卷陳氏曰括蒼陳言無擇撰三因者内因外因不内外因其説出金匱要畧其所述方論徃往皆古書也小兒保生方三卷陳氏曰左司郎姑熟李檉與幾撰傷寒要㫖二卷陳氏曰李檉撰列方於前而類證於後皆不外仲景漢東王氏小兒方二卷陳氏曰不著名㓜㓜新書五十卷陳氏曰直龍圖閣知潭州劉昉方明撰集刋未畢而死徐璹夀卿以漕攝郡趣成之大衍方十二卷陳氏曰朝散大夫孫紹逺稽仲撰凡藥當預備者四十九種故名大衍所在易得者不與焉諸方附於後海上方一卷陳氏曰不著姓名括蒼刻本館閣書目有此方云乾道中知處州錢竽編集效方一卷陳氏曰南康守李觀民集胎産經驗方一卷陳氏曰陸子正撰集葉氏方三卷陳氏曰太社令延平葉大亷撰胡氏方一卷陳氏曰不著名傳道適用方二卷陳氏曰稱拙菴吳彦䕫淳熙庚子陳氏手集方一卷陳氏曰建安陳抃選奇方十卷後集十卷陳氏曰青田余綱堯舉撰傷寒㵼痢要方一卷陳氏曰直龍圖閣長樂陳孔碩膚仲撰湯氏嬰孩妙訣二卷陳氏曰東陽湯衡撰衡之祖民望精小兒醫有子曰麟登科衡麟之子尤邃於祖業爲此書也十九篇諸家名方二卷陳氏曰福建提舉司所刋市肆常貨而局方所未收者易簡方一卷陳氏曰永嘉王碩德膚撰增損方三十首㕮咀藥三十品市肆常貨圓子藥十種以爲倉卒應用之備其書盛行於世四時治要方一卷陳氏曰永嘉屠鵬時舉撰專爲時疾瘧痢吐瀉傷寒之類雜病不與焉治奇疾方一卷陳氏曰夏子益撰凡三十八道皆奇形怪證世間所未見者傷寒證類要略二卷玉鑑新書二卷陳氏曰汴人平堯卿撰專爲傷寒而作皆仲景之舊也亦别未有發明瘡疹證治一卷陳氏曰金華謝天錫撰產寶諸方一卷陳氏曰不著名氏集諸家方而以十二月產圖冠之纂要備急諸方一卷陳氏曰不知何人集皆倉卒危急所須藥及雜術也摘要方一卷陳氏曰傷寒十勸及危證十病末載托裏十補散方劉涓子神仙遺論十卷陳氏曰東蜀刺史李頔錄按中興書目引崇文總目云宋龔慶宣撰劉涓子者晉末人於丹陽縣得鬼遺方一卷皆治癰疽之法慶宣得而次第之今按唐志有慶宣劉涓子男方十卷未知卽此書否卷或一板或止數行名為十卷實不多也衛濟寶書一卷陳氏曰稱東軒居士不著名氏治癰疽方也外科保安方三卷陳氏曰知興化軍亳社張允蹈家藏方龔參政茂良劉太史夙爲之序跋五發方論一卷陳氏曰不知名氏亦吳晦父所錄李氏集驗背疽方一卷陳氏曰泉江李迅嗣立撰凡五十二條其論議詳盡曲當皇帝醫相馬經三卷晁氏曰唐穆蠡集伯樂王良等六家書成此編皇帝斥神農也育駿方三卷晁氏曰未詳撰人相馬術及醫治畜牧之方相馬經一卷晁氏曰未詳撰人相馬法式并著馬之疾狀及治療之術李氏書目有之文獻通考卷二百二十三
