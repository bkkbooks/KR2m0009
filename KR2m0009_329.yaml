body:
  text: 文獻通考卷三百二十九鄱陽馬端臨貴與著四裔考六夜郎國夜郎國今夜郎播川犍為郡即其國漢時西南夷君長以十數夜郎最大在蜀郡徼外東接交趾西鄰滇國今雲南郡滇國其國鄰牂牱江江廣數里出番禺城下戰國時楚頃襄王遣將莊蹻從沅水伐夜郎軍至且蘭椓船於岸而步戰既滅夜郎因留王滇池以且蘭有椓船牂牱處乃改其名為牂牱牂牱繫船􅍻也番禺即今南海郡城南江􅍻音弋其地多雨潦俗好巫鬼禁忌寡畜産又無蠶桑故最貧鉤町有桄榔木可以為麵百姓資之鉤町漢以為縣屬牂牱郡鉤音巨于反町音大鼎反武帝時唐蒙上書曰竊聞夜郎精兵可得十餘萬浮船牂牱江出不意此制南越竒兵也乃拜蒙為郎中遂見夜郎侯蒙厚賜諭以威德夜郎貪漢繒帛以為漢道險終不能有也乃與蒙約還報乃以為犍為郡今犍為陽安仁壽通義和義資陽皆其地發巴巴郡今通川等十五郡地已具上注蜀卒蜀郡今蜀郡濛陽唐安臨卭盧山等郡亦曰蜀川理道自僰道指牂牱江蜀人司馬相如亦言西夷卭笮可置郡今越嶲郡地帝使相如往諭皆如南夷為置一都尉十餘縣屬蜀郡當是時巴蜀四郡漢中廣漢巴郡今漢川巴川蜀川地也通西南夷道戍轉相餉古餉字數嵗道不通士罷餓離濕罷音疲離遭也死者甚衆夷又數反發兵興擊耗費無功帝患之使公孫𢎞往視問焉還言其不便時方築朔方據河逐胡𢎞因數言西南夷為害通西南夷大為損害可且罷専力事胸奴上罷西夷獨置南夷兩縣一都尉及元狩元年張騫言使大夏時見蜀布卭竹杖問所從來曰從東南身毒國即天竺也可數千里得蜀賈人市或聞卭西可二千里有身毒國於是乃令王然于間出西南夷往身毒國至滇道皆為昆明所閉昆明在今越嶲郡西南莫能通身毒及南越反上使發南夷兵且蘭君小邑乃與其衆反漢發巴蜀校尉擊破之遂平南夷為牂牱郡今涪川夜郎義泉郡地夜郎侯始倚南越越滅恐懼遂入朝封為夜郎王昭帝始元中牂牱談指同並等二十四邑凡三萬餘人皆反並音伴談指同並後皆為縣屬漢牂牱郡遣水衡都尉發蜀郡犍為兵擊牂牱大破之後姑繒葉榆人復反鉤町侯亡波率其人擊之有功漢立亡波為鉤町王至成帝河平中夜郎王興與鉤町王禹漏卧侯俞漏卧夷邑名後為縣屬漢牂牱更舉兵相攻牂牱太守請發兵誅興等漢以道逺不可擊遣大中大夫張匡持節和解並不從杜欽説王鳳曰張匡和解蠻夷王侯王侯不從不憚國威其效可見恐議者選耎復守和解選耎怯懦不前之意選息兖反耎人兖反太守察動靜有變乃以聞如此則復曠一時曠空也一時三月言空廢一時不早發兵王侯得收獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂犯守尉言起狂悖之心而殺守尉逺藏溫暑毒草之地雖有孫吳之將賁育之士若入水火往必焦沒智勇俱亡所設施屯田備守之費不可勝量宜因其罪惡未成未疑國家加誅隂敕旁郡守尉練士馬大司農先調榖積要害處調發也要害者在我為要於敵為害選任職太守往以秋涼時入誅其王侯尤不軌者即以為不毛之地亡用之人聖王不以勞中國即猶若也不毛言不生草木宜罷郡放棄其人絶其王侯勿復通如以先帝所立纍代之功不可隳壞亦宜因其萌芽早斷絶之及已成形然後師興則萬姓被害矣鳳於是薦陳立為牂牱太守至牂牱乃從吏數十人出行縣召興興將數千人往立數責因斷興頭出曉其衆皆釋兵降興子邪務收餘兵迫脅旁二十邑反立又擊平之公孫述時大姓龍傅尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江奉貢番禺江今南海郡光武嘉之並加褒賞桓帝時郡人尹珍乃從汝南許慎應奉受經書學成還鄉里教授自是南域始有學焉珍官至荆州刺史後漢史云有女子浣於遁水有三節大竹流入足間剖之得一男兒飬之及長自立為夜郎侯以竹為姓武帝元鼎中置牂牱郡夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後牂牱太守吳霸以聞天子乃封其三子為侯死配食其父按范曄所撰乃引華陽國志又按漢書其夜郎侯降封王不言殺成帝時猶謂之夜郎王曄焉得云竹王被殺後封其子為侯與班史全乖角宜華陽國志為怪詭也大抵范曄著述多稱詭異若無他書可以辨正則因習纂録不復刋革云唐置費珍莊琰播郎牂夷等州其地北距充州百五十里東距辰州二千四百里南距交州一千五百里西距昆明九百里無城郭散居村落土多霖雨稻粟皆再熟無徭役將征戰乃屯聚刻木為契其法劫盜者償其主三倍殺人者出牛馬三十頭與其家以贖死疾病無醫藥但擊銅砂羅以祀神風俗與東謝蠻同隋大業末首領謝龍羽據其地勝兵數萬人唐末王建據西川由是不通中國後唐天成二年牂牱清州刺史宋朝化等一百五十人來朝孟知祥據蜀復不通朝貢宋乾德三年平蜀五年知西南蕃南寧州蕃落使龍亮瑫等來貢詔授以官開寶二年武才等一百四十人來貢八年三十九部順化王子若廢等三百七十人來貢馬百六十匹丹砂千兩太平興國五年蕃王龍瓊琚遣其子并諸州蠻七百四十七人以方物名馬來貢自是至景德朝貢不絶太宗召見其使詢以地理風俗譯對曰地去宜州陸行四十五日土宜五榖多種粳稻以木弩射麞鹿充食每三二百户為一州州有長殺人者不償死出家以贖國王居有城郭無壁壘官府惟短垣光進説與前書所記小異故并敘之上因令作本國歌舞一人吹瓢笙如蚊蚋聲良久數十輩連袂宛轉而舞以足頓地為節詢其曲則名曰水曲其使十數輩從者千餘人皆蓬髮靣目黧黑狀如猿猱使者衣虎皮氊裘以虎尾插首為飾大中祥符以後頗為冦抄轉運使冦瑊調兵擊之夷人寧息天聖以來訖於元符貢奉其首領龍氏於諸姓為最大世世襲職貢奉尤頻使者但衣布袍至假伶人之衣入見蓋實貧陋所冀者恩賞而已賜以袍帶等物至刺其數於臂故事蠻夷入貢雖交趾于闐之屬皆御前殿見之獨此諸蕃見於後殿蓋卑之也諸蕃部族數十獨龍方張石羅五姓最著號五姓蠻其後又有程氏韋氏皆比附五姓故號西南七番云滇滇者漢時在夜郎之西靡莫之屬滇最大靡莫西南徼外蠻也滇音顛始楚頃襄王使將軍莊蹻蹻即莊王之苖裔居略反將兵循江上略巴黔以西巴國今清化始寧咸安符陽巴川南賓南浦是其地也黔則黔中蹻至滇池方三百里在今雲南郡其澤在西北水源深廣末更淺狹如倒流故曰滇池旁平地肥饒數千里池旁之地以兵威定屬楚欲歸報會秦擊楚巴黔中郡道塞不通因而以其衆王滇變服從其俗以長之為其長帥也案史記及漢書皆云楚威王使莊蹻略巴黔以西至滇池欲歸會秦奪楚巴黔中郡因以其衆王滇後十餘嵗秦滅之又案楚自威王後懷王立三十年至頃襄王之二十二年秦昭襄王遣兵攻楚取巫黔中郡地後漢史則云頃襄王時莊豪王滇豪即蹻也若莊蹻自威王時將兵略地屬秦陷巫黔中郡道塞不還凡經五十二年豈得如此淹久或恐史記謬誤班生因習便書范曄所記詳考為正又案莊蹻王滇後十五年頃襄王卒考烈王立二十五年幽王立十年王負芻立五年而楚滅十五年而秦亡七十年何故云蹻之王滇後十餘嵗而秦亡斯又未之詳也至武帝時滇王有衆數萬人元封二年發巴蜀兵臨滇滇王舉國降請置吏入朝於是以為益州郡今雲南郡賜滇王王印長復其人武帝割牂牱越嶲各數縣配之後數年復并昆明地皆以屬之西南夷君長以百數獨夜郎滇受王印滇小邑也最寵焉後王莾篡位改漢制貶鉤町王為侯蠻夷盡反莽遣平蠻將軍馮茂發巴蜀犍為吏士賦取足於人以擊益州出入三年疾疫死者什七巴蜀騷動更遣寧始將軍亷丹大發天水隴西騎士廣漢蜀犍為吏人十萬轉輸者合二十萬人擊之不能剋而還公孫述據益土文齊為太守亦固守拒述後漢初遣使朝謁建武十八年夷渠帥棟𧖟與姑復葉榆梇棟連然滇池建伶昆明諸種反叛殺長吏漢姑復縣屬越嶲郡餘六縣並屬益州郡也並在今越嶲雲南郡也遣武威將軍劉尚等發廣漢犍為蜀人及朱提夷擊之尚軍遂渡瀘水入益州郡界瀘水一名若水旄牛徼外經朱提至僰道入江在今越嶲郡南時有瘴氣羣夷聞大兵至皆棄壘奔走尚獲其羸弱榖畜斬棟𧖟帥凡首虜萬餘人諸夷悉平至蜀後主建興二年諸葛孔明率衆南征四郡平之改益州郡為建寧分建寧永昌今雲南郡也為雲南郡又分建寧牂牱為興古郡亮至南中所戰皆捷孟獲者為夷漢所服募生致之既得使觀於營陳之間問曰此軍何如獲曰不知虛實故敗定易勝耳亮縱使更戰七縱七擒而滇亮猶遣獲獲止不去曰公天威也南人不復反矣遂至池南中平皆即其渠率而用之或以諫亮亮曰若留外人即留兵兵留即無食一不易也夷新傷破父兄死喪留外人而無兵者必成禍患二不易也又夷纍有廢殺之罪自嫌釁重若留外人終不相信三不易也今欲使汝不留兵不運糧而綱紀遂定夷漢相安故爾卭都卭都漢時自滇以北君長十數卭都最大今越嶲郡本其地自夜郎滇卭都人皆椎髻左袵邑聚而居知耕田其外西自桐師以東北至葉榆葉榆澤名名為嶲昆明嶲即今越嶲郡昆明在西南諸㸑所居地方數千里無君長辮髮隨畜遷徙無常武帝開以為卭都縣屬越嶲郡無幾而地陷為汙澤因名為卭池南人以為卭河其人後復反叛元鼎六年漢兵自越嶲水伐平之嶲水源出今越嶲郡西南嶲山下其土地平原有稻田俗多遊蕩而喜謳歌略與牂牱相類豪帥放縱難得制御王莽時郡守枚根枚根太守姓名調卭人長貴以為軍候更始三年長貴攻殺枚根自立為卭榖王至光武因就封之授越嶲太守印綬後劉尚擊益州夷路由越嶲長貴聞之即聚兵欲襲尚尚掩長貴誅之徙其家屬於成都安帝時永昌益州蜀郡夷並今雲南郡皆叛衆十餘萬破壞二十餘縣益州刺史張喬乃遣從事楊竦將兵至葉榆破之渠帥三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死論筰都筰都者漢時自越嶲以東北君長以十數徙徙漢為縣屬蜀郡筰都最大武帝開以為筰都縣其人被髮左袵言語多好譬類居處略與汶山夷同汶山夷在蜀郡西北即冉駹也今通化郡元鼎六年以為沈黎郡今洪源郡至天漢四年并蜀為西部置兩部尉一居旄牛主徼外夷一居青衣主漢人旄牛青衣並今蜀郡之西後漢明帝永平中益州刺史朱輔慷慨有大略宣示漢德威懷逺夷自汶山以西前代不至正朔所不加白狼槃木唐菆等菆阻留反百有餘國户百三十餘萬舉種奉貢稱為臣僕和帝永光十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種十七萬户口內屬安帝永和元年蜀郡三襄種夷與徼外汙滸種反叛攻𧖟陵城臨翼郡地在蜀郡之西汙音烏滸呼五反殺長吏二年青衣道夷邑長令田令姓田名也與徼外三種夷三十一萬口舉土內屬後旄牛夷叛攻零關零關道屬漢越嶲即今郡益州刺史張喬與西部尉擊破之於是分置蜀郡屬國都尉領縣四如太守冉駹冉駹漢時自筰以北君長十數冉駹最大其俗土著或隨畜遷徙在蜀西武帝元鼎六年以為汶山郡今蜀郡西北通化郡地至宣帝地節三年夷人以立郡賦重帝乃省并蜀郡為北部都尉其山有六夷七羌九氐各有部落其王侯頗知文書土氣多寒雖在盛夏氷猶不釋皆依山居止纍石為室髙者至十餘丈為卭籠今彼土夷人呼為雕又土地剛鹵不生榖粟麻菽唯以麥為資而宜畜牧有旄牛無角一名犝牛肉重千斤毛可為毦犝徒冬反毦音二出名馬有羚羊可療毒又有食藥鹿鹿麑有有胎者其腸中有糞亦療毒疾又有五角羊其西又有三河槃于虜北有黃石北地盧水胡其表乃為徼外後漢靈帝時復分蜀郡北部為汶山郡蜀後主建興十年汶山平康夷反薑維討破之附國附國隋代通焉在蜀郡西北二千餘里即漢之西夷也有嘉良夷即其東部所居種自相率領不能統一土俗與附國同言語少殊其人並無姓氏其地南北八百里東西四千五百里無城柵近川谷傍山險俗好復讐故疊石為􅠼而居以避其患其􅠼與巢字同高至十餘丈下至五六丈狀似浮圖於下級開小門從內上通夜必關閉有二萬餘家弓長六尺以竹為弦妻其羣母及嫂兒弟死父凡亦納其妻好歌舞鼓簧吹長笛有死者無服制置尸於髙床上沐浴衣服以牟甲覆以獸皮子孫不哭𢃄甲舞劒而呼云我父為鬼所取我欲報寃殺鬼其俗以皮為帽形圓如鉢或戴羃㒿衣多毛毼裘毼胡割反全剝牛腳皮為靴項繫鐡釧王與酋帥金飾首胸前懸一金花徑三寸其土髙氣候涼多風少雨宜小麥青斜山出金銀多白雉水有嘉魚長四尺鱗細煬帝大業四年其王遣子弟宜林率嘉良夷六十人朝貢嘉良有水闊六七十丈附國水闊百餘丈並南流用皮為舟而濟附國南有薄緣夷風俗亦同西有女國其東北連山綿亘數千里接黨項及諸羌按其地接汶山故為附焉哀牢哀牢後漢時通焉其先有婦人名沙一居於牢山嘗捕魚水中觸沉木若有感因懷妊十月産男子後沉木化為龍出水因舐其男之背其母鳥語謂背為九謂坐為隆因名曰九隆後漸相滋長種人皆刻畫其身象龍文衣背著尾九隆代代相繼乃分置小王往往邑居散在溪谷絶域荒外山川阻深生人以來未嘗交通中國光武建武中其王賢栗等遂率衆人户二千七百詣越嶲太守鄭鴻降求內屬帝封賢栗等為君長自是嵗來朝貢明帝永平中哀牢王柳貊遣子率種人內屬其稱邑王者七十人户五萬一千八百九十四界去洛陽七千里明帝以其地置哀牢博南二縣今雲南越嶲之西割益州郡西部都尉所領六縣後漢六縣謂不韋嶲唐比蘇葉榆邪龍雲南並今雲南越嶲之西合為永昌郡即今雲南郡始通博南山渡蘭倉水華陽國志曰博南縣西山髙三十里越之得蘭倉水行者苦之歌曰漢德廣開不賓度博南越蘭津渡蘭倉為他人哀牢人皆穿鼻儋耳儋丁甘反其渠帥自謂王者耳皆下肩三寸庶人則至肩而已土地沃美宜五榖蠶桑染綵文繡蘭干細布華陽國志曰蘭干獠言紵也織成文章綾錦有梧桐木華績以為布廣志曰梧桐有白者剽國有桐木其華有白毳取毳淹績緝以為布幅廣五尺潔白不受垢汙先以覆亡人然後服之其竹節相去二丈名曰濮竹出銅鐡鉛錫金銀光珠博物志曰光珠即江珠琥珀水精琉璃軻蟲蚌珠孔雀翡翠犀象猩猩貊獸山海經云猩猩知人名據華陽國志曰永昌郡有猩猩能言取其血可以染朱罽荀卿子曰猩猩能言笑淮南萬畢術曰婦終知來猩猩知往注云並神獸也後魏酈元注水經云武平郡封溪縣有獸名猩猩猿形人面身毛黃姿顔端正善學人語聞者無不酸楚太原王綱著傳云阮研曾使封溪見邑人説猩猩好酒及履里人置之山谷常行路百數為羣見酒物等知人設張取之此獸甚靈先知其人祖父姓名而罵曰奴欲殺我捨爾去也既去復還因相呼曰試共嘗酒及飲乃甘其味逮乎醉皆擒之無遺逸遂置檻中隨其所欲飼之將烹索其肥者乃自推擇泣而遣之又禮記曰猩猩能言廣志云猩猩唯聞其啼不聞其言出交趾郡封溪縣按前代永昌郡即今雲南郡武平郡即今安南郡並封略之內古謂其靈而智不因人教而解人語殊為珍異秦漢以降天下一家即嶺南獻能言鳥及馴象西域獻汗血馬皆載之史傳以為竒物復廣異聞聲教逺覃如越裳白雉之類故彰示後代則猩猩不劣於鳥象何為獨無獻乎獲之以充口實則致之固難也王莽置漢孺子於西壁中禁人與語及長不能名六畜猩猩若非靈異自解人語即須因教方成又不可容易而為庖膳也是知諸家所説不加考核遞相祖述耳佑以為廣志尤足徵矣血染朱罽遍問胡商元無此事故詳而疏之永昌太守鄭純為政清潔化行夷人與哀牢夷人約邑豪歲輸布貫頭衣二領鹽一斛為常賦夷俗安之唐麟德元年五月於昆明之梇棟川置姚州都督府每年差兵募五百人鎮守武太后神功二年閏十月蜀州刺史張柬之上表曰姚州者古哀牢之舊國本不與中國交通前漢唐蒙開夜郎滇筰而哀牢不附至光武季年始請內屬漢置永昌郡以統理之稅其鹽布氈罽以利中土其國西通大秦南通交趾竒珍進貢歲時不闕及諸葛亮五月渡瀘收其金銀鹽布以益軍儲使張伯岐選其徑卒以增武備前代置郡其利頗深今鹽布之稅不供珍竒之貢不入而空竭府庫驅率平人受役夷蠻肝腦塗地漢以得利既多歷博南山涉蘭倉水更置博南哀牢二縣蜀人愁怨行者作歌蓋漢得其利人且怨歌今於國家無絲髮之利在百姓受終身之酷往者諸葛亮破南中使其渠帥自相統領不置漢官亦不留鎮守臣竊以亮之策妙得羈縻蠻夷之術今姚府置官既無安邊靜冦之心又無葛亮且縱且擒之術唯知詭謀狡算恣情割剝貪婪劫掠積以為常扇動酋渠遂成朋黨提挈子弟嘯引凶愚今見散在彼州專以掠奪為業姚州本武陵縣主簿石子仁奏置之後長史李孝讓辛文協並為羣蠻所殺又使將軍李義總往征郎將劉惠在戰陳死其州遂廢即諸葛亮稱置官留兵有三不易之言遂驗垂拱四年南蠻郎將王善寶昆州刺史㸑乾福又請置州奏言所有課稅自出姚府管內更不勞擾蜀川及置州後録事參軍李稜為蠻所殺延載年中司馬成琛請於瀘南置鎮七所遣蜀兵防守自此蜀中騷擾於今不息伏乞省罷姚州使𨽻嶲府嵗時朝覲同之蕃國瀘南諸國悉廢於瀘北置關百姓非奉使入蕃不許交通往來疏奏不納南詔南詔或曰鶴柘曰龍尾曰苴􅫗曰陽劒本哀牢夷後烏蠻别種夷語王為詔其先渠帥有六詔號六詔曰蒙嶲詔越析詔浪穹詔邆睒詔施浪詔蒙舍詔兵埓不能相君長蜀諸葛亮討定之蒙舍詔在諸部南故曰南詔居永昌姚州之間鐡橋之南東距㸑東南屬交趾西摩伽他西北與吐蕃接南女王西南驃北抵益州東北際黔巫王都芉苴􅫗城别都曰善闡府王自稱曰元猶朕也謂其下曰昶猶卿爾也官之大者曰清平官以決國事猶唐宰相也爽猶省也督爽總三省也百家有總佐千家有治人官萬家有都督一凡田五畝曰雙上官授田四十雙上户三十雙以是為差壯者為戰卒有馬為騎軍一將統千人四軍置一將其外有六節度二都督十瞼夷語瞼若州云初羣山之西多瘴歊地平草不枯自曲靖州至滇池人水耕食蠶以柘蠶生閲二旬而繭大和祈鮮而西人不𧖟剖波羅樹實狀若絮紐縷而幅之有井産鹽有野桑生石上其材可為弓不筋漆而利長川諸山有金越睒之西多薦草産善馬婦人不粉黛以蘇澤髮俗以寅為正四時大抵與中國少差師行以二千五百人為一營其法前傷者養治後傷者斬犁田一牛三夫前挽中壓後驅然専於農無貴賤皆耕不繇役嵗輸米二斗一藝者給田二收乃稅王蒙氏父子以名相屬自舍龍以來有譜次可考舍龍生細奴邏唐高宗時遣使者入朝賜錦袍其孫炎閣武后時入朝炎閣立死開元時弟盛邏皮立生皮邏閣授特進封臺登郡王炎閣未有子時以閣羅鳳為嗣及生子還其宗而名承閣遂不改開元末皮邏閣逐河蠻取大和城又襲大釐城守之因城龍口夷語山陂陀為和故謂大和以處閣羅鳳天子詔賜皮邏閣名歸義當是時五詔微歸義獨強乃厚以利啖劍南節度使王昱求合六詔為一制可歸義已并羣蠻遂破吐蕃寖驕大入朝天子亦為加禮又以破渳蠻功馳遣中人册為雲南王賜錦袍金鈿帶七事於是徙治大和城天寶初遣閣羅鳳子鳳迦異入宿衛拜鴻臚卿恩賜七載歸義死閣羅鳯立襲王以其子鳳迦異為瓜州刺史初安寧城有五鹽井人得煮鬻自給元宗詔特進何履光以兵定南詔境取安寧城及井復立馬援銅柱乃還鮮于仲通領劍南節度使卞忿少方略故事南詔嘗與妻子謁都督過雲南太守張虔陀私之多所求丐閣羅鳳不應虔陀數詬靳之陰表其罪由是忿怨反發兵攻虔陀殺之取姚州及小夷州凡三十二明年仲通自將出戎嶲州分二道進次曲州靖州閣羅鳳遣使者謝罪願還所虜得自新且城姚州如不聼則歸命吐蕃恐雲南非唐有仲通怒囚使者進薄白崖城大敗引還閣羅鳳斂戰胔築京觀遂北臣吐蕃吐蕃語謂弟為鍾稱贊普鍾給金印號東帝揭碑國門明不得已叛曰我上世世奉中國纍封賞後嗣容歸之若唐使至可指碑澡祓吾罪也會楊國忠以劍南節度當國乃調天下兵凡十萬使侍御史李宓討之輦餉者尚不在涉海而疫死相踵於道宓敗於太和城死者十八亦會安祿山反閣羅鳳因之取嶲州會同軍據清溪關以破越析梟於贈西而降尋傅驃諸國尋傳蠻者俗無絲纊跣履榛棘不苦也射豬生食其肉戰以竹籠頭如兜鍪其西有祼蠻亦曰野蠻漫散山中無君長作檻舍居男少女多無田農以木皮蔽形婦或十或五共養一男子廣德初鳳迦異築柘東城諸葛亮石刻故文曰碑即仆蠻為漢奴夷畏誓常以石榰梧大歷十四年閣羅鳳以鳳迦異前死立其孫異牟尋以嗣異牟尋有智數善撫衆略知書母李獨錦蠻女也獨錦蠻亦烏蠻種在秦藏川南天寶中命其長為蹄州刺史世與南詔婚聘異牟尋立悉衆二十萬入冦與吐蕃并力一趨茂州踰文川擾灌口一趨扶文掠方維白埧一侵黎雅叩卭郲關令其下曰為我取蜀為東府工伎悉送邏娑城歲賦一縑於是進陷城聚人率走山德宗發禁衛及幽州軍以援東川與山南兵合大敗異牟尋衆斬首六千級擒生捕傷甚衆顛踣崖峭且十萬異牟尋懼徙苴咩城築袤十五里吐蕃封為日東王然吐蕃責賦數悉奪其險立營候嵗索兵助防異牟尋稍苦之唐人鄭回為清平官説異牟尋曰中國有禮義少求責非若吐蕃婪刻無極也今棄之復歸唐無逺戍勞利莫大於此異牟尋善之會節度使韋臯撫諸蠻有威惠諸蠻頗得異牟尋語白臯貞元九年乃遣使者趣成都遺臯書願竭誠自新歸欵天子請加戍劍南西山涇原等州安西鎮守揚兵四臨委回鶻諸國所在侵掠使吐蕃勢分力散不能為邊患德宗嘉之賜以詔書異牟尋乃殺吐蕃使迎唐使遣其臣隨使入朝初吐蕃與回鶻戰殺傷甚乃調南詔萬人異牟尋欲襲吐蕃陽示寡弱以三千人行即自將數萬踵後晝夜行大破吐蕃於神川遂斷鐡橋溺死以萬計俘其五王乃遣使入獻地圖方物請復號南詔帝賜賚有加遣使册異牟尋為南詔王異牟尋迎使拜詔甚恭尋遣清平官入謝貢方物復攻吐蕃取昆明城以食鹽池又破施蠻順蠻並虜其王置白崖城因定磨些蠻𨽻昆山西㸑故地破茫蠻掠梇棟蠻漢裳蠻以實雲南東北十五年異牟尋謀擊吐蕃帝許出兵助又請以大臣子弟為質於臯舍之成都令就學且言昆明嶲州與吐蕃接不先加兵為虜所脅反為我患請臯圖之時唐兵比嵗屯京西朔方大峙糧欲南北並攻取故地然南方轉餉稽期兵不悉集是夏吐蕃飢疫贊普死新君立臯揣虜未敢動勸異牟尋緩舉會吐蕃大臣謀襲南詔臯乃命部將屯黎嶲二州為援既而吐蕃五萬分二軍攻雲南一軍攻嶲州臯將扶忠義取末恭城俘係牛羊千計吐蕃將馬定德監軍野多輸煎等俱來降虜氣衰軍不振無功而還期以明年吐蕃苦唐詔掎角亦不敢圖南詔異牟尋比年獻方物天子禮之元和三年異牟尋死遣使弔祭子尋閣勸立或謂夢湊自稱驃信夷語君也改賜元和印章明年死子勸龍晟立淫肆不道上下怨疾十一年為梇棟節度王嵯巔所殺立其弟勸利詔少府少監李銑為册立弔祭使勸利德嵯巔賜氏蒙封大容蠻謂兄為容長慶三年始賜印是嵗死弟豐祐立豐祐趫敢善用其下慕中國不肯連父名穆宗使京兆少尹韋審規持節臨册豐祐遣洪成酋趙龍些楊定竒入謝天子於是西川節度使杜元頴治無狀障候弛沓相蒙時大和三年也嵯巔乃悉衆掩卭成嶲三州陷之入成都止西郛十日慰賚居人市不擾肆將還乃掠子女工技數萬引而南人懼自殺者不勝計救兵逐嵯巔身自殿至大度河謂華人曰此吾南境爾去國當哭衆號慟赴水死者十三南詔自是工文織與中國埓明年上表請罪比年使者來朝開成會昌間再至大中時李琢為安南經略使苛墨自私以斗鹽易一牛夷人不堪結南詔將假酋遷陷安南都護府號白衣沒命軍南詔發朱弩佉苴三千助守然朝貢猶嵗至從者多杜悰自西川入朝表無內蠻傔豐祐怒即慢言索質子會宣宗崩使者告哀是時豐祐亦死坦綽酋龍立恚朝廷不弔恤又詔書乃賜故王以草具進使者而遣遂僣稱皇帝建元建極自號大禮國懿宗以其名近元宗嫌諱絶朝貢乃陷播州安南都護李鄠屯武州咸通元年為蠻所攻棄州走明年攻雍管詔湖南觀察使蔡襲發諸道兵二萬屯守南詔憚畏不敢出會詔左庶子蔡京經制嶺南忌襲功奏罷其兵南詔乃攻交州進略安南陷之詔諸軍保嶺南更以秦州經略使髙駢為安南都護南詔稍逼雍州乃大興諸道兵益戍又分兵屯容藤披蠻勢置行交州於海門五年南詔回掠嶲州以搖西南西川節度使蕭鄴率屬蠻鬼主邀南詔大度河敗之眀年復來攻盡殺戍卒時安南久屯兩河鋭士瘴毒死者十七髙駢以選士五千度江敗林邑兵於雍州遂攻交州戰數勝士酣鬭斬首三萬級安南平十年酋龍復入冦陷嘉州黎州進攻成都次眉州蠻本無謀不能乘機會鼓行亟驅但蚍結蠅營忸鹵剽小利處處留屯故蜀孺老得扶攜悉入成都閭里皆滿蠻傅外郛西川節度使盧耽遣將出兵三面苦戰蠻引却帝遣東川節度使顔慶俊以兵應接蠻聞鳳翔山南軍且來乃迎戰王師燒其攻具蠻大敗乃引去酋龍年少嗜殺戮親戚異己者皆斬兵出無寧嵗男子十五以下悉發婦耕以餉軍十四年復冦蜀攻大度河陷黎州入卭州成都大震城中固守蠻至新津而還回冦黔中俄攻黎州僖宗乾符元年劫掠嶲雅間破黎州入卭崍關掠成都閉三日乃去詔以髙駢領西川節度使駢至閲精騎五千逐蠻至大度河奪鎧馬執酋長五十斬之收卭崍關復取黎州南詔遁還酋龍使奉書丐和駢答曰我且將百萬衆至龍尾城問爾罪酋龍大震自南詔叛天子數遣使至其國酋龍不肯拜使者遂絶駢以其俗尚浮屠法故遣浮屠景仙攝使酋龍與其下迎謁且拜乃定盟而還遣清平官酋望趙宗政質子二十入朝乞盟請為兄弟若舅甥詔拜景仙鴻臚卿檢校左散騎常侍駢結吐蕃尚延心嗢未魯耨月等為間築戎州馬湖沐源川大度河三城列屯拒險料壯卒為平夷軍南詔氣奪酋龍恚發疽死偽諡景莊皇帝子法嗣改元貞明承智大同自號大封人法年少好畋獵酣逸衣絳紫錦罽鏤金帶國事顓決大臣乾符四年遣陀西假瑳寶詣雍州節度使辛讜請修好詔使者答報未幾冦西川駢奏請與和親右諌議大夫柳韜吏部侍郎崔淡醜其事上言逺蠻畔逆乃因浮屠誘致入議和親垂笑後世駢職上將謀乖謬不可從遂寢蠻使者再入朝議和親而駢從荆南持前請不置宰相鄭畋盧攜爭不決皆罷帝手詔問崔安潛和親事答曰雲南姚州譬一縣中國何資於彼而遣重使加厚禮彼且妄謂朝廷畏怯無能脫有他請何以待之且天宗近屬不可下小蠻夷南詔知蜀強故襲安南陷之都護曽兖奔雍府戍兵潰會西川節度使陳敬瑄申和親議時盧攜復輔政與豆盧琢皆厚駢入譎説帝曰咸通以來蠻始叛命再入安南雍管一破黔州四盜西川遂圍盧耽召兵東方戍海門天下騷動十有五年中藏空虛士死瘴癘可謂痛心今朝廷財匱兵少安南客戍單寡涉冬冦禍可虞誠命使臨報縱未稱臣且伐其謀外以縻服蠻夷內得蜀休息也帝謂然乃以宗室女為安化長公主遣使許婚使還具言驃信誠欵以為敬瑄功進其官南詔遣其宰相趙隆眉楊竒混假義宗朝行在迎公主髙駢自揚州言三人南詔腹心宜止而鴆之蠻可圖也帝從之隆眉等皆死自是謀臣盡矣蠻亦衰法死偽諡聖明文武皇帝子舜化立遣使欵黎州修好昭宗不答後中國亂不復通後唐同光三年既平蜀魏王繼岌奏齎書招諭南詔蠻天成元年供奉官李彥楷等雲南使回嶲州山後兩林百蠻都鬼主右武衛將軍李卑晚差大鬼主傅能阿花等來朝貢明宗引見加其官遣還二年七月遣使入蠻九月西川奏據黎州狀申雲南使趙和於大度河南起舍一間留信物十五籠并雜詩一卷遞至闕下宋太祖鑒唐之禍基於南詔乃棄越嶲諸郡以大度河為界使欲為冦則不能為臣則不得橫山有寨宜管以西虎頭關九十里險甚所在把握洞丁結聚道路荒僻大理益不通於中國皇祐中儂智髙敗奔大理其國捕之以聞熙寧九年遣使貢方物自後不常來亦不領於鴻臚政和三年廣州觀察使黃璘奏南詔大理慕義懷來願為臣妾欲聼其入貢詔置局於賓州六年遣進奉使李紫琮等過鼎州請詣學瞻拜宣聖像許之遂遍謁見諸生又乞觀御書閣閲讀御製舉笏叩首七年至京師貢馬及麝香等制以其王假和譽為金紫光祿大夫檢校司空雲南節度使上柱國大理國王髙宗紹興三年廣西奏大理國欲進奉及賣馬事上曰令賣馬進奉可勿許彼之進奉實利賈販但令帥臣邊將償其馬直當價則馬當繼至庶可增諸將騎兵不為無益也六年廣西經略司奏大理人使進奉表章國信及象馬約五月至橫山詔所進方物除不受外餘驛付行在仍計價優與回賜章表等遞進降敕書回答石湖范氏桂海虞衡志曰大理南詔國也本唐小夷蒙舍詔在諸部最強故號南詔自皮邏閣併五詔為一受册封雲南王至異牟尋封南詔王至酋龍而稱驃信改元自稱大禮國今其與中國接乃稱大理國與唐史禮理字異未詳所始大理地廣人庶器械精良前志載之詳矣雍州右江水與大理大槃水通大槃在大理之威楚府而特磨道又與其善闡府者相接自雍州道諸蠻獠至大理不過四五十程産良馬可與橫山通北梗自杞南梗特磨久不得至語在大理馬條下乾道癸巳冬忽有大理人李觀音得董六斤黑張般若師等率以三字為名凡二十三人至橫山議市馬出一文書字畫略有法大略所須文選五臣注五經廣注春秋後語三史加注都大本草廣注五藏論大般若十六會序及初學記張孟押韻切韻玉篇集聖歷百家書之類及須浮量鋼器并碗疑即饒州浮梁磁器書梁作量琉璃碗壺及紫檀沉香水甘草石決明井泉石蜜陀僧香蛤海蛤等藥稱利正二年十二月其後云古人有云察實者不留聲觀行者不識詞知己之人幸逄相謁言音未同情慮相契吾聞夫子云君子和而不同小人同而不和今兩國之人不期而會者豈不習夫子之言哉續繼短章伏乞斧伐短章有言音未會意相和逺隔江山萬里多之語其人皆有禮儀擎誦佛書碧紙金銀字相間雍人得其大悲經稱為坦綽趙般若宗祈禳目疾而書坦綽酋望清平官皆其官名也雍守犒來者厚以遣歸然南詔地極西南當為西戎尤邇蜀都非桂帥所當鎮撫文獻通考卷三百二十九
