body:
  text: 文獻通考卷三百十三鄱陽馬端臨貴與著物異考十九鳳凰虞舜簫韶九成鳳凰來儀韶舜樂名言簫見細樂之備雄曰鳳雌曰凰靈鳥也儀有容儀備樂九奏而致鳳凰則餘鳥獸不待九而率舞漢昭帝始元三年冬十月鳳凰集東海遣使者祠其處宣帝本始元年五月鳳凰集膠東千乘四年五月鳳凰集北海安邱淳于地節二年四月鳳凰集魯郡羣鳥從之元康二年三月以鳳凰集賜天下吏民爵女子牛酒鰥寡高年帛神爵二年鳳凰集京師羣鳥從者以萬數四年冬十月鳳凰十一集杜陵十二月鳳凰集上林五鳳三年鸞鳳集長樂宮東闕中樹上飛下止地文章五色東坡蘇氏曰黃霸傳言時鳳凰神爵數集郡國潁川尤多天子以霸治行長者下詔稱揚此可疑也霸以鶡為神爵不知潁川之鳳以何物為之邪致堂胡氏曰孝宣之世誠安且治矣然方之堯舜成康可封刑措之俗無乃尚逺有不及乎鳳凰何為而屢至哉自本始逮黃龍二十五年間天變則日食星孛大雨雹地變則四十九郡同日震山崩壞宗廟殺人民以人事論之趙蓋楊韓四良臣無罪而死元康二年中子弟殺父兄妻殺夫者二百四十二人魏相以為大故者不論他年然則世雖安治亦多舛逆不得稱太平決矣鳳凰表太平之瑞也何為而至哉宣帝繼武帝之後撫養百姓不興兵革親致康阜其心自喜必有窺見微意者故爭言祥瑞以侈耀之雖然所謂鳳者非也何以明之黃霸以鶡為神爵而神爵年號非有他異焉乃為鳳凰而名之然則其時公以鶡為神爵神爵為鳳凰則鳳凰羣集非鶡而何雖名治安而未及古正使有鳳尚不足貴况非鳳邪此可破千載之疑而發一笑為後世自欺之戒也或曰漢權歸外家自王鳳始殆天以告爾然則尤當警懼者也後漢章帝元和三年正月鳳凰集肥城五月詔曰乃者鳳凰黃龍鸞鳥比集七郡孫之柔瑞圖曰鸞鳥者赤神之精鳳凰之佐雞身而毛色赤被五采鳴中五音人君進退有度親疏有序則至也比頻也或一郡再見其賜天下吏民爵及帛有差安帝延光三年新豐上言鳳凰集西界亭仐新豐縣西原有鳳凰原俗傳云即此時鳳凰所集之處也二月戊子有五色大鳥集濟南臺十月又集新豐時以為鳳凰陽明之應故非明主則隱不見凡五色大鳥似鳳者多羽蟲之孽是時安帝信中常侍樊豐江京阿母王聖及外屬耿寶等讒言免太尉楊震廢太子為濟隂王不哲之異也章帝末號鳳凰百四十九見時直臣何敞以為羽孽似鳳翺翔殿屋不察也臣昭曰已論之於敞傳記者以為其後章帝崩以為驗按宣帝明帝時五色鳥羣翔殿屋賈逵以為胡降徴帝多善政雖有過不及至衰缺末年胡降二十萬口是其驗也帝之時羌胡外叛讒慝內興羽孽之時也樂叶圖徴説五鳳皆五色為瑞者一為孽者四叶圖徴曰似鳳有四並為妖一曰鷫鸘鳩喙圓目身義戴信嬰禮膺仁負智至則旱疫之感也二曰發明烏喙大頸大翼身仁戴智嬰義膺信負禮至則喪之感也三曰焦明長喙疏翼圓尾身義戴信嬰仁膺智負禮至則水之感也四日幽昌鋭目小頭大身細足脛若鱗葉身智戴信負禮膺仁至則旱之感也國語曰周之興也鸑鷟鳴岐説文曰五方神鳥東方曰發明南方曰焦明西方曰鷫鸘北方曰幽昌中央曰鳳凰桓帝元嘉元年十一月五色大鳥見濟隂已氏時以為鳳凰此時政治衰缺梁冀秉政阿枉上幸亳后皆羽孽時也臣昭按魏朗對䇿桓帝時雉入太常宗正府朗説見本傳注靈帝光和四年秋五色大鳥見於新城衆鳥隨之時以為鳳凰時靈帝不恤政事常侍黃門專權羽孽之時也衆鳥之性見非常斑駁好聚觀之至於小爵希見梟者暴見猶聚魏文帝黃初元年八月石邑縣言鳳凰集吳孫權黃武四年蒼梧言鳳凰見黃龍元年夏口武昌並言鳳凰見孫亮建興二年有大鳥五見於春申吳人以為鳳凰詳見羽蟲門孫皓建衡三年西苑言鳳凰見明年改元鳳凰晉武帝泰始元年郡國言鳳凰見凡六二年鳳凰六見五年鳳凰見於趙國穆帝升平四年二月鳳凰將九雛見於豐城十二月鳳凰復見於豐城羣鳥隨之五年鳳凰見於沔北宋文帝元嘉十四年正月戊戌鳳凰二見於都下衆鳥隨之改其地曰鳳凰里周武帝天和元年七月梁州上言鳳凰集楓樹衆鳥列侍以萬數唐武后長壽三年十一月陳州上言苑邱縣鳳凰集衆鳥數萬前後翊從行列齊整色别為羣後三日改元儀鳳蜀王建元年鳳凰見萬嵗縣漢劉晟時鳳凰見雍州宋太宗端拱元年八月有鳳凰集廣州清逺縣廨舍柏樹高六尺衆鳥隨之向東北去真宗景德元年五月白州有三鳳自南來入城中羣禽周繞至萬嵗寺前棲百尺木龍樹身長九尺髙五尺其文五色冠如金杯神宗熙寧七年六月乙未廣州言增城縣鳳凰見雞禍春秋左氏傳周景王時大夫賔起見雄雞自斷其尾劉向以為近雞禍也時王有愛子子朝王與賔起隂謀欲立之田於北山將因兵衆殺適子之黨未及而崩王子爭國王室大亂其後賔起誅死子朝奔楚而敗京房易傳曰有始無終厥妖雄雞自斷其尾漢宣帝黃龍元年未央殿輅軨中雌雞化為雄輅與路同軨音零廄名也毛衣變化而不鳴不將無距將謂率領其羣距雞附足骨鬭時所用刺之元帝初元中丞相府史家雌雞伏子漸化為雄冠距鳴將永光中有獻雄雞生角者京房易傳曰雞知時知時者當死房以為已知時恐當之劉向以為房失雞占雞小畜主司時起居人為人起居之節小臣執事為政之象也言小臣將秉君威以害正事猶石顯也竟寧元年顯伏辜此其驗也或曰顯何足以當此昔武王伐殷誓師曰牝雞無晨牝雞之晨惟家之索今殷王受惟婦言是用由是論之黃龍初元永光雞變乃國家之占妃后象也黃龍元年宣帝崩元帝立王妃將為后故是嵗未央殿雌雞化雄明其占在正宮也不鳴不將無距貴始萌而尊未成也初元元年立王妃為皇后以后父丞相少史王禁為陽平侯明年立皇后子為太子故應是丞相府史家雌雞化為雄其占即丞相少史之女也伏子者明已有子也冠距鳴將者尊已成也永光二年禁薨子鳳嗣侯元帝崩成帝遂委政於元舅王氏之權自鳳始故於鳳始受爵位時雄雞有角明視作威專君害上危國者從此人始也京房易傳曰賢者居明夷之世知時而傷或衆在位厥妖雞生角時主獨又曰婦人顓政國不靜牝雞雄鳴主不榮故房以為已亦在占中矣後漢靈帝光和元年南宮侍中寺雌雞欲化雄一身毛皆似雄但頭冠尚未變詔以問議郎蔡雍雍對曰貌之不恭則有雞禍臣竊推之頭元首人君之象今雞一身已變未至於頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後張角作亂稱黃巾破壞四方魏明帝景初二年廷尉府中雌雞化為雄不鳴不將干寶曰是嵗宣帝平遼東百姓始有與能之義此其象也然晉三后並以人臣終而不鳴不將又天意也晉惠帝元康六年陳國有雞生雄雞無翅既大墜坑而死王隱以為雄者允嗣子之象坑者母象今雞生無翅墜坑而死此子無羽翼為母所陷害乎於後賈后誣殺愍懷此其應也泰安中周玘音起家雌雞逃承霤中六七日而下奮翼鳴將獨毛不變其後有陳敏之事敏雖控制江表終無紀綱文章殆其象也卒為玘所滅雞禍見玘家又天意也京房易傳曰牝雞雄鳴主不榮元帝太興中王敦鎮武昌有雌雞化為雄天戒若曰雌化為雄臣陵其上其後王敦再攻京師孝武太元十三年四月廣陵髙平閻嵩家雌雞生無右翅彭城人劉象之家雞有三足京房易傳曰君用婦人言則雞生妖是時主相並用尼媪烏老反之言寵賜過厚故妖象見焉安帝隆安元年八月琅邪王道子家青雌雞化為赤雄雞不鳴不將桓元將篡不能成業之象四年荆州有雞生角角尋􅑁落是時桓元始擅西夏狂慢不肅故有雞禍天戒若曰角兵象尋墮落者暫起不終之妖也後皆應也元興二年衡陽有雌雞化為雄八十日而冠萎天戒若曰衡陽桓元楚國之邦略也及桓元篡位果八十日而敗此其應也隋文帝開皇中有人上書言頻歲已來雞鳴不鼓翅類腋下有物而妨之翮不得舉肘腋之臣當為變矣書奏不省京房易飛候曰雞鳴不鼓翅國有大害其後大臣多被夷滅諸王廢黜太子幽廢煬帝大業初天下雞多夜鳴京房易飛候曰雞夜鳴急令又云昏而鳴百姓有事人定鳴多戰夜半鳴流血漫漫及中年已後軍國多務用度不足於是急令發賦責成守宰百姓不聊生矣各起而為盜戰爭不息尸骸被野唐武后垂拱三年七月冀州雌雞化為雄永昌元年明州松州各有雌雞化為雄中宗景龍二年春滑州匡城縣民家雞有三足京房易傳占曰君用婦言則雞生妖元宗好鬭雞貴臣外戚皆尚之貧臣或弄木雞識者以為雞酉屬帝生之歲鬭者兵象近雞禍宣宗大中八年九月考城縣民家雄雞化為雌伏子而雄鳴雄化為雌王室將卑之象反雌伏也漢宣帝時有此異至元帝而王氏始萌蓋馴致其禍也懿宗咸通六年七月徐州彭城民家雞生角角兵象雞小畜猶賤類也宋髙宗紹興初陳州民蓄雞忽人言近雞禍也後河南為偽齊所據時松陽縣民家雞生三足與唐志景龍中雞禍同占縣治有雞伏卵毛生殼外近雞禍亦毛孽也孝宗乾道六年衢州西安縣官塘有物怪雞首人身髙丈餘晝見於野寧宗慶元三年饒州壘舍雞卵出蛇近雞孽亦蛇孽也徽州婺源縣張村民家雌雞化為雄烹之形冠距而腹卵孕同里洪氏家雄雞伏子中一雛有三足龍蛇之異夏孔甲之時天降二龍有雌雄孔甲不能食未得豢龍氏豢飬也穀食曰豢陶唐既衰其後有劉纍學擾龍擾音柔馴也能順飬得其嗜欲於豢龍氏以事孔甲孔甲賜其姓曰御龍氏更豕韋之後龍一雌死潛醢以食夏后夏后享之既而使求之懼而遷去史記夏后氏之衰有二龍止於夏庭而言余褒之二君也褒古國名夏帝卜殺之去之止之莫吉卜請其漦而藏之乃吉應劭曰漦沫也鄭氏曰漦音牛齝之齝師古曰去謂驅逐也止謂拘留也去音邱吕反漦音丑之反於是布幣策告之師古曰奠幣為禮讀策詞而告之也説者以為䇿者米蓋失之矣龍亡而漦在乃櫝去之師古曰櫝匱也去藏也櫝音讀去音邱吕反其後夏亡傳櫝於殷周三代莫發至厲王末發而觀之漦流於庭不可除也厲王使婦人裸而噪之應劭曰羣呼曰噪師古曰噪音先到反漦化為元黿韋昭曰元黑黿也蜤蝪也似蛇而有足師古日黿似鱉而大非蛇及蜤蝪入後宫處妾遇之而孕師古曰處妾宫中之童女生子懼而棄之宣王立女童謡曰檿弧萁服實亡周國服虔曰檿檿桑也師古曰女童謡閭里之童女為歌謡也檿山桑之有點文者也木弓曰弧服盛箭者即今之步義也萁草似荻而細織之為服也檿音一簟反萁音基荻音敵後有夫婦鬻是器者宣王使執而僇之師古曰鬻賣也音戈六反既去見處妾所棄妖子聞其夜號哀而收之遂亡奔褒後褒人有罪入妖子以贖是為褒姒幽王見而愛之生子伯服王廢申后及太子宜臼而立褒姒伯服代之廢后之父申侯與繒西畎戎共攻殺幽王師古曰畎戎即犬戎亦曰昆夷詩曰赫赫宗周褒姒滅之師古曰小雅正月之詩也赫赫盛貌也宗周鎬京也滅滅也音呼恱反劉向以為夏后季世周之幽厲皆悖亂逆天師古曰悖惑也音布內反故有龍黿之怪近龍蛇孽也漦血也一曰沫也檿弧桑弓也萁服蓋以萁草為箭服近射妖也女童謡者禍將生於女國以兵寇亡也師古曰因婦以致兵寇也左氏傳魯莊公時有內蛇與外蛇鬭鄭南門中內蛇死劉向以為近蛇孽也先是鄭厲公劫相祭仲逐兄昭公代立後厲公出奔昭公復入死子儀代立厲公自外劫大夫傅瑕使僇子儀此外蛇殺內蛇之象也蛇死六年而厲公立莊公問申繻曰猶有妖乎對曰人之所忌其氣炎以取之妖由人興也人亡釁焉妖不自作人棄常故有妖京房易傳曰立嗣子疑厥妖蛇居國門鬭文公十六年夏有蛇自泉宫出泉宫即泉臺入於國如先君之數劉向以為近蛇孽也泉宫在囿中公母薑氏曾居之蛇從之出象宫將不居也詩曰維虺維蛇女子之祥又蛇入國國將有女憂也秋公母薨公惡之乃毁泉臺後二年公薨公子遂殺文之二子而立宣公文公夫人大歸於齊昭公十九年龍鬭於鄭時門之外洧淵劉向以為近龍孽也鄭以小國攝乎晉楚之間重以強吳時子産任政內惠於民外善辭令以交三國鄭卒亡患能以德消變之效也京房易傳曰衆心不安厥妖龍鬭漢髙祖母媪常息大澤之陂休息而寢也夢與神遇是時雷電晦冥父太公往視則見交龍其上已而娠遂産髙祖髙祖為亭長送徒驪山被酒夜經澤中有大蛇當徑乃拔劒斬蛇蛇分兩頭詳見人異門惠帝二年正月癸酉旦有兩龍見於蘭陵延東里溫陵井中至乙亥夜去劉向以為龍貴象而困於庶人井中象諸侯將有幽執之禍其後吕太后幽殺三趙王諸吕亦終誅滅京房易傳曰有德將害厥妖龍見井中又曰行刑暴惡黑龍井出文帝十五年黃龍見於成紀武帝太始四年七月趙有蛇從郭外入與邑中蛇鬭孝文廟下邑中蛇死二年秋有衛太子事事自趙人江充起宣帝甘露元年黃龍見新豐成帝鴻嘉元年冬黃龍見真定後漢光武建武十二年六月黃龍見東阿章帝建初五年有八黃龍見於泉陵伏侯古今注曰見零陵泉陵湘水中相與戲其二大如馬有角六枚大如駒無角安帝延光元年九真言黃龍見無功歷城琅邪言黃龍見時安帝聽讒免太尉楊震楊震自殺又帝獨有一子以為太子信讒廢之是皇不中故有龍孽時多用佞媚故以為瑞應明年正月東郡又言黃龍二見濮陽桓帝建和元年沛國言黃龍見譙元嘉二年濟隂言黃龍見句陽金城言黃龍見允街桓帝即位有大蛇見德陽殿上雒陽市令淳于翼曰蛇有麟甲兵之象也見於省中將有椒房大臣受甲兵之誅也其後梁冀以逆誅延熹七年六月壬子河內野王山上有龍死長可數十丈袁山松書曰長可百餘丈襄楷以為夫龍者為帝王瑞易論大人天鳯中黃山宫有死龍漢兵誅莽而世祖復興此易代之徴也至建安二十五年魏文帝代漢臣昭曰夫屈申躍見變化無方非顯死之體橫強之畜易况大聖實類君道野王之異豈桓帝將崩之表乎妖等占殊其例斯衆茍欲附會以同天鳯則帝陟三主年踰五十此為迂闊將恐非徵矣永康元年八月巴郡言黃龍見時吏傅堅以郡欲上言內白事以為走卒戲語不可太守不聽嘗見堅語云時民以天熱欲就池浴見池水濁因戲相恐此中有黃龍語遂行人間聞郡欲以為美故言時史以書帝紀桓帝時政治衰缺而在所多言瑞應皆此類也又先儒言瑞興非時則為妖孽而民訛言生龍語皆龍孽也靈帝建寧二年夏青蛇見御座軒前張奐上疏言陳蕃竇氏未被明宥妖眚之來皆為此也敦煌實録曰蛇長六尺夜於御前當軒而見熹平元年甲午青蛇見御座上是時靈帝委任宦者王室微弱五年沛國言黃龍見譙光祿大夫橋元問太史令單揚此何祥也曰其國後當有王者興不及五十年亦當復見天事恆象此其應也內黃殷登默而記至四十五年登尚在時延康元年魏王丕嗣位三月黃龍見譙登聞之曰單揚之言其驗兹乎魏明帝青龍元年正月甲申青龍見郟之摩陂井中凡瑞興非時則為妖孽况困於井非嘉祥矣魏以改年非也干寶曰自明帝終魏世青龍黃龍見者皆其主廢興之應也魏土運青木色而不勝於金黃得位青失位之象也青龍多見者君德國運內相尅伐也故髙貴鄉公卒敗於兵按劉向説龍貴象而困井中諸侯將有幽執之禍也魏世龍莫不在井此居上者逼制之應髙貴鄉公著潛龍詩即此旨也髙貴鄉公正元元年戊戌黃龍見於鄴井中甘露元年正月辛丑青龍見軹縣井中六月乙丑青龍見元城縣界井中二年二月青龍見溫縣井中三年黃龍青龍俱見頓邱冠軍陽夏縣界井中四年正月黃龍二見寧陵縣界井中元帝景元元年十二月甲申黃龍見華容縣井中三年二月龍見軹縣井中吳孫權黃武元年鄱陽言黃龍見黃龍元年夏口武昌並言黃龍見權即皇帝位改元赤烏五年海鹽言黃龍見九年雲陽言黃龍見孫休永安四年九月布山言白龍見五年始新言黃龍見六年泉陵言黃龍見又長沙言青龍見孫皓天册中龍乳於長沙人家啖雞雛京房易傳曰龍乳人家王者為庶人其後皓降晉晉武帝泰始元年郡國言白龍見凡二二年青龍十見黃龍九見三年白龍二見𢎞農澠池五年青龍二見於滎陽白龍二見於趙國六年白龍二見於東莞咸寧二年六月白龍二見新興井中又見武庫井中十一月白龍二見於梁國太康元年白龍三見於永昌二年白龍二見於濟南五年白龍見京兆九年青龍黃龍各一見於魯國又龍見武庫井中帝觀之有喜色百僚將賀劉毅獨表曰昔龍漦俟滋反夏庭禍發周室龍見鄭門子産不賀帝答曰朕德政未修未有以應受嘉祥遂不賀也孫盛曰龍水物也何與於人子産言之當矣但非其所處實為妖災夫龍以飛翔顯見為瑞今則潛伏幽處非休祥也漢惠帝二年兩龍見蘭陵井中本志以為其後趙王幽死之象武庫者帝王威御之器所寶藏也屋宇邃密非龍所處是後七年藩王相害二十八年果有劉石僣竊神器二逆皆字曰龍此之表異為有證矣愍帝建興二年十一月枹罕羌妓産一龍子色似錦文常就母乳遙見神光少得就視此亦皇極不建於是帝竟淪沒吕纂末龍出東廂井中到其殿前蟠卧比旦失之俄又有黑龍升其宫門咸以為美瑞或曰龍者隂類出入有時今而屢見必有下人謀上之變後纂果為吕超所殺武帝咸寧中司徒府有二大蛇長十許丈居聽事平橑音老上而人不知但數年怪府中數失小兒及豬犬之屬後有一蛇夜出被刃傷不能去乃覺之發徒攻擊移時乃死夫司徒五教之府此皇極不建故蛇孽見之漢靈帝時蛇見御座楊賜以為帝溺於色之應也魏代宫人猥多晉又過之燕遊是湎此其孽也詩云維虺維蛇女子之祥也惠帝元康五年三月癸巳臨淄有大蛇長十餘丈負二小蛇入城北門徑從市入漢城陽景王祠中不見天戒若曰昔漢景王有定傾之功而不厲節忠慎以至失職奪功之辱今齊王冏不悟雖建興復之功而驕陵取禍此其徵也明帝太寧初武昌有大蛇常居故神祠空樹中每出頭從人受食京房易傳曰蛇見於邑不出三年有大兵國有大憂尋有王敦之逆恭帝元熙元年冬東方黑龍四登於天易傳曰冬龍見天子亡社稷大人受命慕容皓時有黑龍白龍各一見於龍山皓率羣寮觀之去龍二百步祭以太牢二龍交首嬉翔解角而去皓大恱赦其境內號新宫曰和龍宋髙祖微時行止時見二小龍附翼樵漁山澤同侣或亦觀焉及貴龍形更大後伐荻新洲見大蛇長數丈射之傷明日復至洲裏聞有杵臼聲及往覘之見有童子數人皆著青衣於榛中搗藥問其故答曰我王為劉寄奴所射合散傳之帝曰王神何不殺之答曰寄奴王者不死不可殺也帝叱之皆散仍收藥而反文帝發江陵有黑龍躍負上所乘舟左右莫不失色上謂王曇首曰此乃夏禹所以受命吾何德以堪之至都羣臣勸進即位齊東昏侯永元三年七月丙辰龍鬭於建康淮激水五里梁武帝天監二年北梁州潭中有龍鬭濆霧數里龍蛇之孽洪範五行傳曰龍獸之難害者也天之類君之象天氣害君道傷則龍亦害鬭者兵革之象也京房易飛候曰衆心不安厥妖龍鬭是時帝初即位而有陳伯之劉季連之亂國內危懼普通五年六月龍鬭於曲阿王陂因西行至建陵城所經之處樹木折開數十丈與天監二年同占經建陵而樹木折者國有兵革之禍園陵殘毁之象時帝專以講論為務不崇耕戰將輕而卒惰君道既傷故有龍鬭之應帝殊不悟至太清元年黎州水中又有龍鬭波浪涌起雲霧四合而見白龍南走黑龍隨之其年侯景以兵來降帝納之而無備國人皆懼俄而難作帝以憂崩大同十年夏有龍夜因雷而墮延陵人家井中明旦視之大如驢將以戟刺之俄見庭中及室中各有大蛇如數百斛船家人奔走洪範五行傳曰龍陽類貴象也上則在天下則在地不當見庶人邑里室家井中幽深之象也諸侯且有幽執之禍皇不建之咎也後侯景反果幽殺簡文於酒庫宗室王侯皆幽死中大同元年有大蛇鬭曲阿縣建陵隧中其一被傷奔走元帝承聖二年有兩龍見湘州西江三年三月主衣庫見黑蛇長丈許數十小蛇隨之舉頭髙丈餘南望俄失所在帝又與宫人幸元洲苑復見大蛇盤屈如前羣小蛇繞之並黑色帝惡之宫人曰此非怪也恐是錢龍帝敕所司即日取數千萬錢鎮於蛇處以厭之因謀法會赦囚徒振窮乏退居栖心省又蛇從屋墜落帝帽上忽然便失又龍光殿上所御肩輿復見小蛇縈屈輿中以頭駕夾膝前金龍頭上見人走去逐之不及城壕中龍騰出煥爛五色竦躍入雲六七小龍相隨飛去羣魚騰躍墜死於陸道龍處為窟若數百斛圌舊大城上常有紫氣至時稍復消歇先時有二龍自南郡城西升天百姓聚觀五采分明江陵故老竊相泣曰昔年龍出建康淮而天下大亂今復有焉禍至無日矣帝聞而惡之踰年遘禍陳武帝討侯景軍頓西昌有龍見水濵髙五丈五尺鮮曜軍人觀者數萬人永定三年正月丁酉夜大雪及旦太極殿前有龍迹現宣帝太建十一年正月龍見南兖州池中與梁大同十年同占未幾後主嗣位荒淫至於亡國為俘後主末年有青龍出建陽門井涌霧又見大蛇地中分首尾各走東魏孝靜帝太平二年龍見并州人家井中武定元年有大蛇見虎牢城時髙仲密以虎牢叛附西魏神武為西兵所窘北齊文宣天保九年有龍長七八丈見齊州大堂占同大同十年明帝崩太子殷立常山王演廢而害之武成河清元年龍見濟州浴堂中占同天保九年二年齊州上言濟河水口見八龍升天後主天統四年貴鄉人伐枯桑得一黃龍折腳死於孔中齊稱木德龍君象木枯龍死不祥之甚其年武成崩武平三年龍見邯鄲井中其氣五色屬天又見汲郡佛寺涸井中占同河清元年後主竟降周後被誅七年并州招逺樓下有赤蛇與黑蛇鬭數日赤蛇死赤齊尚色黑周尚色鬭死滅亡之象也後主任用邪佞與周師連兵於晉州之下委軍於孽臣髙阿那肱竟啓敵人皇不建之咎也後主遂為周師所虜琅琊王儼壞北宫中白馬浮圖石趙時澄公所建見白蛇長數丈回旋失所在時儼專誅失中之咎也見變不知戒以及於難後周武帝建德五年黑龍墜於亳州而死龍君之象黑周所尚色墜死不祥後二歲帝崩太子立靜帝大象元年有黑龍與赤龍鬭於汴州水側黑龍死次年宣帝崩靜帝立禪於隋隋文帝仁壽四年龍見代州總管府井中其龍或變為鐵馬甲士彎弓上射之象變為鐵馬近馬禍也彎弓上射又近射妖諸侯將有兵革之變致幽囚也後漢王諒坐反誅唐太宗貞觀八年七月隴右大蛇屢見蛇女子之象大者有所象也又汾州青龍白龍見白龍吐物在空中光明如火墮地地陷掘之得元金廣尺長七寸髙宗顯慶二年五月庚寅有五龍見於岐州之皇后泉睿宗先天二年六月京師朝堂磚下有大蛇出長丈餘有大蝦蟆如盤而目赤如火相與鬭俄而蛇入於大樹蝦蟆入於草蛇蝦蟆皆隂類朝堂出非其所也玄宗開元四年六月彬州馬嶺山下有白蛇與黑蛇鬭白蛇長六七尺吞黑蛇入腹口眼血流黑蛇長丈餘頭穿白蛇腹出俱死天寶中洛陽有巨蛇髙丈餘長百尺出芒山下胡僧無畏見之曰此欲決水瀦洛城即以天竺法咒之數日地裂十四載七月有二龍鬭於南陽城西易坤上六龍戰于野文言曰隂疑于陽必戰肅宗至德元載八月朔成都丈人廟有肉角蛇見二載三月有蛇鬭於南陽門之外一蛇死一蛇上城德宗建中二年夏趙州寧晉縣沙河北有棠樹甚茂民祠之為神有蛇數百千自東西來趨北岸者聚棠樹下為二積留南岸者為一積俄有徑寸龜三繞行積蛇盡死而後各登其積野人以告蛇腹皆有瘡若矢所中刺史康日知圖其事奉三龜來獻四年九月戊寅有龍見於汝州城壕龍大人象其潛也淵其飛也天城壕失其所也貞元十八年八月滄州言白龍見貞元末資州得龍丈餘西川節度使韋臯匣而獻之百姓縱觀三日為煙所薰而死憲宗元和十年四月滑州言青龍見於新開河文宗太和二年六月丁丑西北有龍鬭三年成都門外有龍與牛鬭開成元年宫中有衆蛇相與鬭僖宗乾符三年三月奉天鎮上言金龍晝見自河升天光啓二年冬鄜州洛交有蛇見於縣署復見於州署蛇冬則蟄易曰龍蛇之蟄以存身也昭宗光化三年九月杭州有龍鬭於浙江水溢壞民廬舍占同天寶十四載蜀王建元年萬歲縣黃龍見武定三年八月有龍五十見洵陽水中永平二年十二月黃龍見富義江又見大昌池宋太祖從周世祖征淮南戰於江亭有龍自水中向太祖奮躍識者驚異以為出潛之兆乾德五年京師雨有黑龍見尾於雲際自西北趨東南占主大水明年州府二十四水壞田廬六年四月單州單父縣民王美家龍起井中暴風雨漂廬舍失族屬及壞舊鎮廨舍三百五十餘區大木皆拔開寶七年六月棣州有火自空墜於城北門樓有物抱東柱如龍金色足三尺許其氣甚腥旦視之壁上有煙痕爪迹三十六太宗太平興國二年五月白龍見寧州要册龍廟池中長數十丈東向吐青白雲見者千餘人真宗大中祥符元年八月青蛇出無為軍廨長數尺許三年內侍任文慶奉詔於茅山設醮禱郭真人池取雙龍以歸長二寸許鱗極細腹如玳瑁置手中仰覆無懼中路風雨失一五月內出以示近臣令文慶送還茅山至華陽宫投池中俄於岸側樹上觀二龍一乃放還者一乃所失者六年五月迎奉聖祖至穀熟縣於聖祖舟中幢節上得小龍二如茅山池中畜於禁中己巳方午忽失一守者求之不獲是夜聞雷聲有光如火照淨閣翼日失者復至即遣使送還茅山六月趙州言聖像玉石舟度河之石橋時河水淺澀有黑龍鼓浪進舟凡歷二灘悉然舟既度河流復故詔遣官即其所致祭上清宫先天節道場香奩中獲小龍背有金彩三道尾有翠文寸餘八月建昌軍部民家麻姑山仙都觀設醮己巳五鼓有龍出玉皇殿西北醮壇下升中天回視長數尺金色隱隱有雷聲聞數里神宗熙寧二年建州民楊緯言元年三月大雷雨所居之處有黃龍見下獲一木如龍而形未具七月雷雨如初復有龍飛其上及霽木龍尾翼足皆具歸合舊木宛然一體圖象以進徽宗宣和元年夏雨連晝夜凡數曰及霽開封縣前茶肆中有異物如犬大蹲踞卧榻細視之身僅六七尺色蒼黑其首類驢兩頰作魚頷而色正緑頂有角坐極長於其際始分兩岐聲如牛鳴與世所繪龍無異茶肆近軍器作坊兵卒來觀共殺食之已而京城大水訛言龍復讐云髙宗紹興初朱勝非出守江州過梁山龍入其舟才長數寸赤背緑腹白尾黑爪甲有聲目有光近龍孽也時行都柴垜橋旌忠廟有三蛇出沒庭廡大者盈尺方鱗金色首脊有金線遇霽或變化數百於蕉卉間廟徙而蛇孽亦絶五年金國泠山有二龍死泠氣腥焰襲人其一無角其一額有深穴如斧鑿痕女真烏竒邁欲截其首或言不祥乃止烏竒邁卒以是歲死七年五月乙酉汴京有龍撼宣德門滅宣德二字劉豫亟命葺之君龍象也宣德帝居也非豫所宜僣撼滅亡象也是歲偽齊亡八年夏金國熙州濼水有蒼龍見明日為黃龍以爪擎嬰兒為戲者三日有帝者服乘白馬六蟾蜍在其前是嵗金伐蒙為蒙所敗此龍孽之尤異者也十一年四月潭州衡山縣西北淨居岩有蛇長二丈身圓數尺黑色而方文震死山水大至先是山氣遇夜輒昏昧蛇斃而夜色始明十六年溫州平陽縣古剎老松有巢蛇食鸛鶻擊蛇蛇分三時黃岩縣蛇孽亦如之二十五年六月江州湖口縣有赤龍橫水中如山風濤大作寒風肅然覆舟數十艘士卒溺者數十人三十年春撫州宜黃縣有大蛇見於丞治長二丈捕之縱數里外俄復至者數四京房易傳曰蛇見於邑三年有大兵孝宗乾道五年七月乙亥隆興府武寧縣龍鬭於西北大雨俄頃迅雷起東南二龍奔逃墜珠如輪其地復塘村牧童得之是邑境連嵗有水災易坤上六龍戰于野文言曰隂疑于陽必戰與唐志天寶十四載同占春秋書龍鬭于洧淵亦水祥也光宗紹熙五年七月辛酉饒州紫樞坊二犬共摶一蛇俄頃三者俱斃亦蛇孽也魚異周武王伐紂至孟津渡河中流白魚躍入王舟中魚者介鱗之物兵象也白者殷家之正色言殷之兵衆與周之象也武王俯取以祭秦始皇八年河魚大上劉向以為近魚孽也時始皇弟長安君將兵擊趙死屯留軍吏皆斬遷其民於臨洮長安軍至屯留而謀反乃賜死殺其兵遷其民明年有嫪毐之誅魚隂類民象逆流而上者民將不從其君令為逆行也在天文魚星中河而處車騎滿野至於二世暴虐愈甚終用危亡京房易傳曰衆逆同志厥妖河魚逆流上三十七年東巡並海上至之罘見巨魚射殺一魚漢宣帝神爵元年幸河東祠后土東濟大河天氣清淨神魚舞河成帝鴻嘉四年秋雨魚於信都長五寸以下永始元年春北海出大魚長六丈髙一丈四枚哀帝建平三年東萊平度出大魚長八丈一尺七枚皆死京房易傳曰海數見巨魚邪人進賢人疏後漢靈帝熹平二年東萊海出大魚二枚長八九丈髙二丈餘明年中山王暢任城王博並薨京房易傳曰海出巨魚邪人進賢人疏臣昭謂此占符靈帝之世巨魚之出豈為二王之妖也魏齊王嘉平四年五月有二魚集於武庫屋上此魚孽也王肅曰魚生於水而亢於屋介鱗之物失其所也邊將其殆有棄甲之變乎後果有東關之敗干寶以為髙貴鄉公兵禍之應二説皆與班固旨同晉武帝太康中有鯉魚二見武庫屋上干寶以為武庫兵府魚有鱗甲亦兵類也魚極隂屋上太陽魚見屋上象至隂以兵革之禍干太陽也至惠帝初誅楊駿廢太后矢交館閣元康末賈后謗殺太子尋亦誅廢十年之間母后之難再興是其應也自是禍亂構矣京房易傳曰魚去水飛入道路兵且作梁武帝大同十年帝幸朱方至四塹中及元武湖魚皆驤首見於上若望乘輿者帝入宫而沒洪範五行傳魚隂類也下人象又有鱗甲兵之應下入將舉兵圍宫而睥睨乘輿之象其後果有侯景之亂後周靜帝大象元年六月陽武有鯉魚乘空而鬭猶臣下興起小人從之而鬭也明年帝崩國失政尉迥起兵相州髙祖遣兵擊敗之隋文帝開皇十七年大興城西南四里有袁村設佛會有老翁皓首白裙襦衣來食而去衆莫識追而觀之行二里許不復見但有一陂中有白魚長丈餘小魚從者無數人爭射之或弓折弦斷後竟中之剖其腹得粳飯始知此魚向老翁也後數日漕渠暴溢射人皆溺死煬帝大業十二年淮陽郡驅人入子城鑿斷羅郎郭至女垣之下有穴其中得鯉魚長七尺餘昔魏嘉平四年魚集武庫屋上王肅以為魚生於水而亢於屋水之物失其所也邊將殆有棄甲之變後果有東關之敗是時長白山賊寇掠河南月餘賊至城下郡兵拒之反為所敗男女死者萬餘人唐武后如意中濟源路敬淳家水碾柱將壞易之為薪中有鮎魚長尺餘猶生近魚孽也中宗神龍中渭水有蝦蟆大如鼎里人聚觀數日而失歲大水元宗開元四年安南都護府江中有大蛇首尾橫出兩岸經日而腐寸寸自斷數日江魚盡死蔽江而下十十五五相附著江水臭憲宗元和十四年二月晝有魚長尺餘墜於鄆州市良久乃死魚失水而墜於市敗滅之象也文宗開成二年三月壬申有大魚長六丈自海入淮至濠州招義民殺之近魚孽也僖宗乾符六年汜水河魚逆流而上至垣曲平陸界魚民象逆流而上民不從君令也光啓二年揚州雨魚占如元和十四年宋太宗至道元年十二月廣州大魚擊海水而出魚死長六丈三尺髙丈餘徽宗政和二年內出魚純赤色蔡京等乞付史館拜表稱賀七年夏中有二魚落殿中省廳屋上髙宗建炎初越州應天寺有石眼才方數寸深不可探舊號鰻井有魚如鰻有鱗有耳尾有刃迹每鰻出則郡有水旱癘疫近魚孽也紹興十八年漳州漳浦縣崇昭鹽場海岸連有巨魚髙數丈旁海人割取肉數百車至剜目乃覺轉鬛而旁艦皆覆又漁人獲魚長二丈餘重數千斤剖之腹橫人骼膚髮如生京房易傳曰海見巨魚邪人進賢人疏二十年四月秀州海鹽縣海洋有巨鰍羣蝦從之聲如謳歌抵岸偃沙上猶揚鬐撥剌其高齊縣門樓其長百丈縣民臠肉轉鬛壓死十數人頷骨長二丈五尺與前孽同占孝宗乾道六年行都北關有鮎魚色黑腹下出人手於兩旁各具五指七年十一月丁亥洞庭湖巨黿走沙擁舟身廣長皆丈餘升舟以首足壓重艦沒水淳熙十三年二月庚申錢塘龍山江岸有大魚如象隨潮汐復逝十六年六月甲辰錢塘旁江居民得魚備五色鯽首鯉身民詭言夢得魚覺而在手猶躍事聞有司令縱之寧宗慶元三年二月饒州景德鎮漁人得魚頳尾鯉鱗而首異常魚鎮之老人言其不祥紹興二年嘗出後為水災蓋是嵗五月鎮果大水皆魚孽也嘉定十七年海壞畿縣鹽官地數十里先是有巨魚橫海岸民臠食之海患凡六年而平文獻通考卷三百十三
