body:
  text: 文獻通考卷二百六十六鄱陽馬端臨貴與著封建考七西漢王子侯髙祖兄及兄子侯者三人頡羮侯信帝兄子七年封立十三年有罪削爵一級為關內侯合陽侯喜帝兄為代王胸奴攻代棄國廢為侯六年封七年薨濞後封吳王德哀侯廣帝兄子十二年封通齕何坐酎金免楚元王子侯者六人郢客禮二人嗣封王已見前休侯富景帝時封登嘉章亡後國除沈猷侯歲景帝時封受坐為宗正有罪免宛朐侯藝景帝時封三年反誅棘樂侯調景帝時封應慶坐酎金免齊悼惠王子侯者十二人章興居將閭辟光志卬賢雄渠八人封王見前管共侯罷軍罷音皮孝文時封戎奴坐反誅氏邱侯寧國孝文時封偃坐反誅營平侯信都孝文時封廣坐反誅楊邱侯安孝文時封偃坐出國界耐為司寇淮南厲王子侯者四人安勃賜三人後為王見前東城侯良孝文時封無子國除梁孝王子侯者二人乘氏侯買桓邑侯明俱景帝時封後為王見前河間獻王子侯者十六人旁光侯殷武帝時封坐罪免兹侯明武帝時封坐殺人自殺國除距陽侯丐武帝時封凄坐酎金免蔞侯退武帝時封嬰益夀充世遺亡後國除阿武侯豫武帝時封宣信嬰齊黃長久王莽時絶參户侯免武帝時封嚴元利親度州鄉侯禁武帝時封齊惠商伯禹王莽時絶平成侯禮武帝時封坐罪免廣侯順武帝時封坐酎金免蓋侯讓武帝時封坐酎金免重侯簷武帝時封坐罪免沈陽侯自為不得封年景成侯雍宣帝時封歐禹福平隄侯昭宣帝時封榮曾世育乃始樂鄉侯佟宣帝時封蒯鄧勝地緒髙郭侯宣帝時封久長菲稱霸亡後長沙定王子侯者凡十五人安城侯蒼武帝時封自當夀光坐罪廢宜春侯成武帝時封坐酎金免句容侯黨武帝時封亡後容陵侯福武帝時封坐酎金免路陵侯童武帝時封坐殺人自殺攸輿侯則武帝時封坐篡死罪囚棄市茶陵侯欣武帝時封湯亡後建成侯拾武帝時封坐罪免安衆侯丹武帝時封山柎母妨褒㱈崇王莽時舉兵為莽所害寵建武二年紹封松葉平侯喜武帝時封坐酎金免夫夷侯義武帝時封禹奉宗慶福商王莽時絶舂陵侯買武帝時封熊渠仁敞祉建武二年立為城陽王都梁侯定武帝時封傒宏順懷容他人王莽時絶洮陽侯狩燕武帝時封亡後衆陵侯賢武帝時封真定慶骨王莽時絶楚安王子侯者凡二人浮邱侯不害武帝時封坐酎金免杏山侯成武帝時封坐酎金免魯共王子侯者凡六人廣戚侯將武帝時封坐酎金免寧陽侯恬武帝時封慶忌信扈方瑕邱侯政武帝時封國湯奉義遂成禹公邱侯順武帝時封置延夀賞元王莽時絶郁桹侯驕武帝時封坐酎金免西昌侯敬武帝時封坐酎金免江都易王子侯者凡五人丹陽侯敢武帝時封亡後盱眙侯蒙之武帝時封坐酎金免胡孰侯胥行武帝時封聖犯罪免秣陵侯纒武帝時封亡後淮陵侯定國武帝時封坐酎金免梁共王子侯者凡一人張梁侯仁武帝時封順為胸奴所殺災川懿王子侯者凡十三人龍邱侯代武帝時封坐酎金免劇原侯錯武帝時封廣昌貴吉囂勝客懷昌侯髙遂武帝時封延年勝時可置平望侯賞武帝時封楚人光起均旦臨衆侯始昌武帝時封革生廣平農理賢商王莽時絶葛魁侯寬武帝時封戚坐縛家吏恐猲受賕棄市益都侯胡武帝時封廣嘉坐非廣子免平的侯強武帝時封中時福鼻利親宣劇魁侯黑武帝時封招德利親嬰向夀梁侯守武帝時封坐酎金免平度侯行武帝時封慶忌帥軍欽宗嘉宜城侯偃武帝時封福坐殺弟棄市臨胊侯奴武帝時封乘質信禕岑城陽共王子侯者凡十三人雷侯豨武帝時封坐酎金免東莞侯吉武帝時封坐病不任朝免辟土侯壯武帝時封明坐酎金免利鄉侯嬰武帝時封有罪免有利侯釘武帝時封坐罪誅東平侯慶武帝時封坐姦廢運平侯記武帝時封坐酎金免山州侯齒武帝時封坐酎金免海常侯福武帝時封坐酎金免騶邱侯寬武帝時封報德毋害坐罪誅南城侯貞武帝時封猛尊充國遂友王莽時絶廣陵侯裘武帝時封成坐酎金免杜原侯臯武帝時封坐酎金免趙敬肅王子侯者凡二十四人尉侯丙武帝時封犢坐酎金免封斯侯胡傷武帝時封如意宫仁榆邱侯受福武帝時封坐酎金免襄侯建武帝時封坐酎金免邯會侯仁武帝時封慧賀張康重蒼朝節侯義武帝時封祿固城坐酎金免東城侯遺武帝時封為妾所殺亡後隂城侯蒼武帝時封嗣子有罪不得立邯平侯順武帝時封坐酎金免武始侯昌武帝時封三十四年嗣為趙王􅱺氏侯賀武帝時封安意千秋漢強酆易安侯平武帝時封種德坐殺人免柏暢侯終古武帝時封朱亡後歊安侯延年武帝時封坐酎金免漳北侯寬武帝時封為胸奴所殺南䜌侯他武帝時封坐酎金免南陵侯慶武帝時封坐為沛郡太守有罪下獄死鄗侯舟武帝時封坐祝詛誅安檀侯福武帝時封坐為常山太守祝詛死爰戚侯當武帝時封坐謀反自殺栗節侯樂武帝時封忠終根况洨夷侯周舍武帝時封惠乃始勳承猇侯起武帝時封充國廣明固巨鹿揤裴侯道武帝時封尊章景發中山靖王子侯者凡二十人廣望侯忠武帝時封中何齊遂閣將梁侯朝平武帝時封坐酎金免薪館侯未央武帝時封坐酎金免陸地侯貞武帝時封坐酎金免薪處侯嘉武帝時封坐酎金免陸城侯義武帝時封坐酎金免臨樂侯光武帝時封建固萬年廣都王莽時絶東野侯章武帝時封中時亡後髙平侯喜武帝時封坐酎金免廣川侯頗武帝時封坐酎金免乘丘侯將夜武帝時封德外人坐罪死髙邱侯破胡武帝時封亡後柳宿侯蓋武帝時封蘇坐酎金免戎邱侯讓武帝時封坐酎金免樊輿侯修武帝時封過倫異衆土生自豫王莽時絶曲成侯萬歲武帝時封坐酎金免安郭侯傅富武帝時封偃崇坐罪死安儉侯應武帝時封坐酎金免安道侯恢武帝時封坐酎金免澎侯屈釐武帝時封為