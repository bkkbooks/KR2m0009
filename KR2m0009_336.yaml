body:
  text: 文獻通考卷三百三十六鄱陽馬端臨貴與著四裔考十三西域總序西域以漢孝武時始通本三十六國皆在胸奴之西烏孫之南南北有大山中央有河東西六千餘里東則接漢厄以玉門陽關二關並在燉煌郡西則限以蔥嶺諸國大率土著有城郭田畜與烏孫異故皆役屬胸奴西邊日逐王領西域賦稅取足焉其南山東出金城今金城會寧安鄉西平等即漢金城郡地與漢南山屬焉屬聨也自玉門陽關出西域有兩道西踰蔥嶺則出大宛康居奄蔡焉耆自張騫開西域之迹其後霍去病擊破胸奴右地降渾邪休屠王遂空其地始築令居以西今西平郡之西北初置酒泉郡後稍發徙人充實之分置武威張掖燉煌酒泉四郡據兩關焉自李廣利伐大宛之後西域震懼多遣使來貢獻於是東自燉煌西至鹽澤即蒲昌海在今交河北庭界中往往起亭障是時軍旅連出師行二三十年海內虛耗征和中二師李廣利以軍降胸奴帝既悔逺征伐而搜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東捷枝渠犂皆故國地輪臺渠犂地名今在交河北庭界中其地相連廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五穀與中國同時熟田一歲有積穀募人壯健有纍重敢徙者詣田所纍重謂妻小家屬就畜積為本業益墾溉田稍築列亭連城而西以威西國帝深陳既往之悔乃不復出軍昭帝時乃用桑𢎞羊前議以給外國使者至宣帝遣衛司馬使護鄯善以西數國及破姑師未盡殄分以為車師前後王及山北六國時漢獨護南道未能盡并北道也神爵三年胸奴日逐王來降護鄯善以西使者鄭吉迎之乃因使鄭吉併護北道故號曰都護都護之起自吉置矣由此胸奴益弱不能近西域於是徙屯田於比胥鞬披莎車之地屯田校尉始屬都護都護督察烏孫康居諸外國都護治烏壘城去陽關二千七百四十里與渠犂田官相近土地肥饒於西域中故治焉至元帝復戊巳二校尉屯田於車師前王庭戊巳中央鎮覆四方又開渠播種以為厭勝故稱戊巳焉哀平間自相分割為五十五國凡國自譯長城長君監史大祿伯長千長都尉且子餘反渠當户將相至侯王皆佩漢印綬凡三百七十六人而康居大月氐安息罽賓烏弋之屬皆以絶逺不在數中其來貢獻則相與報不督録總領也至王莽時四邊擾亂與中國遂絶並復役屬胸奴前往西域有二道自元始以後有三道從玉門關出西經婼羌婼而遮反轉西域蔥嶺經懸度入大月氐為南道從玉門關西出發都護并回三隴沙北頭經居盧倉從沙西北過龍堆到故樓蘭轉西詣龜兹至蔥嶺為中道從玉門關西北出經橫坑辟三隴沙及龍堆出五船皆到車師界戊巳校尉所理髙昌轉西與中道合龜兹新道後漢永平中胸奴乃脅諸國共冦河西郡縣今武威張掖等郡地城門晝閉明帝乃命將北征胸奴取伊吾廬地今伊吾縣置宜禾都尉以屯田遂通西域于闐諸國西域自絶六十五載乃復通焉明年始復置都護戊巳校尉及明帝崩焉耆龜兹攻沒都護陳睦胸奴車師圍戊巳校尉章帝不欲疲敝中國以事邊徼乃迎還戊巳校尉不復遣都護復罷屯田胸奴因遣兵守伊吾地時軍司馬班超留于闐綏集諸國和帝永光初竇憲大破胸奴因遣副使尉閻盤掩擊伊吾破之三年班超遂定西域因以超為都護居龜兹復置戊巳校尉於是五十餘國悉納質內屬其條枝安息諸國至於海濱四萬里外皆重譯貢獻九年班超遣掾甘英窮臨西海而還皆前代所不至莫不備其風土傳其珍怪焉及班超被徴以任尚為都護尚謂超曰猥承君後宜有以誨之超曰塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懷鳥獸之心難養易敗今君性嚴急水清無大魚察政不得下和宜蕩佚簡易寬小過總大綱而已尚不能從數年至安帝初西域背叛如超所言頻攻都護任尚假禧等朝廷以為險逺難相應赴詔罷都護自此遂棄西域北胸奴即復收屬諸國共為邊患十餘歲燉煌太守曹崇請出兵擊胸奴復欲進取西域鄧太后不許但令置護西域副校尉居燉煌羈縻而已其後胸奴連與車師入寇河西漢不能禁議者因欲閉玉門陽關以絶其患尚書陳忠上疏曰臣聞八蠻之寇莫甚北虜髙祖窘平城之圍文帝屈供奉之恥故孝武憤怒深惟久長之計命遣武臣浮河絶漢窮破虜庭遂開西河四郡以隔絶南羌收三十六國斷胸奴右臂是以單于孤特竄迹逺藏由此觀之戎狄可以威服難以化狎西域內附日久區區東向叩關者數矣此其不樂胸奴慕漢之效也今北虜已破車師勢必南攻鄯善棄而不救則諸國從矣若然則虜財賄日增膽勢益殖威臨南羌與之交連如此河內四郡危矣不得不救則百倍之役興不訾之費發矣議者但念西國絶逺恤之煩費不見先代苦心勤勞之意也臣以為燉煌宜置校尉按舊增四郡屯兵以西撫諸國庶足以折衝萬里震怖胸奴太后又召班超之子勇問之勇議曰昔者孝武皇帝患胸奴強盛開通西域諸國論者以為奪胸奴府藏斷其右臂遭王莽篡盜徴求無厭胡夷憤毒遂以背叛光武中興未遑外事故胸奴負強驅率諸國及至永平再攻燉煌河西郡城門晝閉帝命武臣出征西域故胸奴逺遁邊境得安及至永元莫不內屬會間者羌亂西域復絶北虜遂遣責諸國備其逋租髙其價直嚴其期會鄯善車師皆懷忿怒思樂事漢其路無從前所以時有叛者皆由牧養失宜還為其害舊燉煌郡有營兵三百人宜復之復置護西域副校尉居於燉煌如永元故事又宜遣西域長史將五百人屯樓蘭西當焉耆龜兹徑路南強鄯善于闐心膽北扞胸奴東近燉煌如此誠便長樂衛尉鐔顯等難曰朝廷前所以棄西域者以其無益於中國而費難供也今車師已屬胸奴鄯善不可保信一朝反覆班將軍能保北虜不為邊害乎勇對曰今中國置州牧者以禁郡縣姦猾盜賊也若州牧能保盜賊不起者臣亦願以腰斬保胸奴之不為邊害也今通西域則虜勢必弱虜勢弱則為患微矣敦與歸其府藏續其右臂哉為置校尉以扞北撫西設長史以招懷諸國若棄而不立則西域屈就北虜緣邊之郡將受困苦河西城門復有晝閉之警矣今不廓開朝廷之德而拘屯戍之費若北虜遂熾豈安邊久長之策哉太尉屬毛軫難曰今若置校尉則西域絡繹遣使求索無厭與之則費難供不與則失其心一朝為胸奴所迫當復求救則為役大矣對曰今設以西域歸胸奴而使其因西域租入之饒兵馬之衆以擾動緣邊是為富仇讐之財增暴夷之勢也置校尉者宣威布德以繫諸國內向之心以疑胸奴覬覦之情而無費財耗國之慮也且西域之人無他求索其來入者不過廩食而已今若拒絶勢必北屬夷虜并力以寇并涼則中國之費不止十億於是從忠勇議乃以勇為西域長史將五百人西屯柳中今交河郡縣勇遂破平車師自建武至於延光西域三絶復通順帝永建二年勇復擊降焉耆於是龜兹疏勒于闐莎車等十七國皆來服從而烏孫蔥嶺以西遂絶六年帝以伊吾舊膏腴之地傍近西域胸奴資之以為鈔暴復令開設屯田如永元時事置伊吾司馬一人自陽嘉以後朝威稍損諸國驕放轉相陵伐矣自魏及晉中原多故西域朝貢不過三數國焉至後魏太武帝使董琬使西域還且言其地為三域自蔥嶺以東流沙以西為一域姑墨以南月氐以北為一域兩海之間水澤以南為一域三域之內諸小渠長蓋以百數其出西域更為四道自玉門流沙西行二千里至鄯善為一道自玉門度流沙北行二千二百里至車師為一道從莎車西行一百里至蔥嶺西千三百里至伽部為一道自莎車西南五百里至蔥嶺西南千三百里至波路為一道焉於是貢獻者十有六國孝文延興中尚書奏以燉煌一鎮界逺西北寇賊路衝慮或不固欲移就涼州羣官會議給事中韓秀曰此蹙境之事非闢土之宜燉煌之立其來久矣雖土臨強寇而兵人素習縱有姦竊不能為害循常置戍足以自全進斷北狄之覘途退塞西夷之窺路若徙就姑臧慮人懷異意或貪留重遷情不願徙脫引寇內侵深為國患且燉煌去涼州三千里捨逺就近防制有闕一朝廢置是啓戎心則夷狄交構互相來往恐醜徒協契竊侵涼土邊役煩興艱難方甚乃從秀議隋煬帝時遣侍御史韋節司隸從事杜行滿使於西蕃諸國至罽賓得瑪瑙杯王舍城得佛經史國得十舞女獅子皮火鼠毛而還帝復令裴矩於武威張掖間往來以引致之皆啖以厚利令轉相諷諭大業中相率而來朝者四十餘國帝因置西戎校尉以應接之自燉煌西出玉門陽關涉鄯善北通伊吾千里自伊吾北通車師前部高昌壁千二百里自髙昌壁北通車師後部金滿城今北庭府縣五百里此其西域之門户內地故漢戊巳校尉更互屯焉伊吾地宜五榖桑麻蒲萄其北及柳中皆膏腴之地故漢帝與胸奴爭車師伊吾以制西域至隋有商胡雜居勝兵千餘人附於鐵勒人甚驍悍厥田良沃隋末內屬置伊吾郡屬天下亂又臣突厥唐貞觀四年以頡利破滅遂舉其屬七城來降因列其地為西伊州同於編户至武太后如意初武威軍總管王孝傑大破吐蕃復龜兹于闐疏勒碎葉四鎮自是諸國朝貢侔於前代矣神龍以後黑衣大食強盛漸并諸國至於西海分兵鎮守焉杜佑族子環隨鎮西節度使髙仙芝西征天寶十載至西海寶應初因賈商船舶自廣州而回著經行記今之所纂其小國無異聞者則不暇録焉諸家纂西域志多引諸僧遊歷傳記如法明遊天竺記支僧載外國事法盛歷諸國傳道安西域志及佛國記曇勇外國傳智猛外國傳支曇諦烏山銘翻經法師外國傳之類皆盛論釋氏詭異奇迹參以他書則皆紕繆故多略焉樓蘭即鄯善樓蘭在婼羌西北漢時通焉王治杆泥城去陽關千六百里東去長安六千一百里户千五百西北去都護治所千八百里至山國千三百餘里此國山居故名山國西北至車師千九百里地沙鹵少田寄田仰穀旁國國多出葭葦㮒柳胡桐白草白草牛馬所嗜也胡桐似桐蟲食其樹而沫下流出者俗名為胡桐淚可以汗金銀人隨畜牧逐水草有驢馬多槖駝能作兵器與婼羌同漢武帝因張騫之言甘心欲通大宛諸國一歲中多至十餘輩樓蘭姑師當道苦之每給使者受其勞費故厭苦也攻劫漢使王恢等漢將趙破奴率屬國騎謂諸外國屬漢者及郡兵擊之虜樓蘭王遂破姑師於是列亭障至玉門矣樓蘭既降服貢獻胸奴聞發兵擊之於是樓蘭遣一子質漢後二師將軍擊大宛便道引兵捕樓蘭王將詣闕簿責王對曰小國在大國間不兩屬無以自安願徙國入於漢地上直其言遣歸國樓蘭王死後王立樓蘭國最東垂近漢當白龍堆乏水草常主發導負米擔糧送迎漢使又數為吏卒所懲艾不便與漢通後復為胸奴反間數遮漢使昭帝遣平樂監傅介子往刺其王懸首北闕下乃立其弟尉屠耆為王更名其國為鄯善王自請天子曰身在漢久今歸單弱而前王有子在恐為所拒國中有伊循城其地肥美願漢遣一將屯田積穀令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以鎮撫之其後置都尉伊循官置始此矣鄯善當漢道衝西通且末且此余反七百二十里自且末以往皆種五穀土地草木産畜作兵略與漢同自後無聞至後魏太延時鄯善王遣其弟入侍及太武平涼州沮渠無諱度流沙遣其弟安周擊鄯善王王比龍恐懼欲降會魏使自天竺罽賓至鄯善勸比龍拒之連戰安周不能克而退後比龍懼率衆西奔且末其世子乃應安周太武討平之拜交趾公韓杖為假節征西將軍領護西戎校尉鄯善王以鎮之賦役其人比之郡縣然其後部落遂役屬於且末西魏大統八年其王允鄯來率衆內附且末且末國漢時通焉王治且末城去長安六千八百里户二百三十西北至都護治所二千二百里北接尉犂丁零東與白提西接波斯精絶南至小宛可三日行地有葡萄諸果人皆剪髮著氊帽小袖衣為衫則開頸而縫前多牛羊驢騾其王安末染盤梁武帝普通五年遣使貢獻謂之末國梁史云即且末其國西北有流沙數百里夏月有熱風為行旅之患風之欲至老駝先知即鳴而聚立埋口鼻於沙中人每以為候即將氊擁蔽鼻口其風迅駛斯須過盡若不防者必致危斃杅彌杅彌漢時通焉王治杅彌城去長安九千三百里户三千三百東北至都護治所三千五百里南與疏勒東北與龜兹西北與姑墨接西通于闐四百里後漢改其國曰拘彌居寧彌城順帝永建中為于闐王放前破殺其王興陽嘉初燉煌太守徐由遣疏勒發兵擊破于闐遂更立拘彌王靈帝熹平中又為于闐所破掠殺殆盡衆才千口車師前後王即髙昌車師前王後王並漢時通焉前王國一曰前部治交河城今交河郡水分流繞城下故為號去長安八千一百里户千五百西南至都護治所千八百里西域長史及戊巳校尉並治此去燉煌十三日行其地東西三百里南北五百里四面多大山後王國治務塗谷即今蒲城今北庭府蒲類縣也去長安八千九百里户六百西南至都護治所千二百三十餘里北與胸奴接初漢武帝征和四年遣重合侯馬通將諸國兵共圍車師車師王降服後其王烏貴與胸奴結親教之遮漢道昭帝時胸奴復使四千騎田車師宣帝地節二年遣侍郎鄭吉校尉司馬喜將免刑罪人田渠犂積穀欲以攻車師至秋收穀吉喜發城郭諸國兵共擊車師攻交河城破之王尚在北石城未得會吉食盡歸渠犂田至秋收後更往攻石城王乃輕騎奔烏孫吉還田渠犂及車師益積穀以安西國侵胸奴胸奴大臣皆曰車師地肥美近胸奴使漢得之多田積穀必害我國不可不爭也遣騎來擊吉吉將田士卒保車師城胸奴圍城數日乃解吉上書言車師去渠犂千餘里間以山河北近胸奴漢兵在渠犂者勢不能相救願益田卒於是召故車師太子軍宿在焉耆者立以為王盡徙車師國人令居渠犂遂以車師故地與胸奴車師王得近漢田官與胸奴絶亦安樂親漢其後置戊巳校尉屯田車師故地即今交河郡漢取之以置校尉平帝元始中車師後王國有新道出五船北通玉門關往來差近戊巳校尉徐普欲開以省道里避白龍堆之厄車師後王始句音勾以道通當為拄置心不便也拄支拄也言有所置立而支拄於已故心不便也拄音竹禹反地又頗與胸奴南將軍地接其後舉國降胸奴是時王莽易胸奴單于璽單于怒大擊北邊而西域亦瓦解焉耆國近胸奴先叛殺都護但欽莽不能討西域因絶至後漢和帝元光二年大將軍竇憲破北胸奴車師震懾前後王各遣子入侍其後屢叛至安帝延光四年長史班勇擊其後王軍大破之桓帝永興初後部王阿羅多攻圍漢屯田且固城殺傷吏士後部侯炭遮領餘人叛阿羅多詣漢降阿羅多從百餘騎亡走北胸奴中漢立後部故王軍就質子卑君為後部王阿羅多復從胸奴中來降於是更立阿羅多為王將卑君還燉煌以後部人三百帳别屬役之食其稅帳者猶中國户數至魏時賜其王亦多離守魏侍中號大都尉晉以交河城為髙昌郡蓋因其地髙敞人庶昌盛立名或云昔漢武帝遣軍西討師旅頓弊者因住焉有漢時髙昌壘故也張軌呂光沮渠蒙遜在河西皆置太守以統之後魏太武時其前部王為沮渠無諱所攻遣使上表云不能自全遂捨國東奔三分免一在焉耆東界幸垂賑救魏使撫慰開焉耆倉給之文成帝末其地又為蠕蠕所并立闞伯周為王髙昌稱王自此始孝文太和五年髙車主阿伏至羅殺闞王以燉煌人張孟明為髙昌王太和二年孟明為國人所殺立馬儒為王以鞏顧禮麴嘉為左右長史儒又通使後魏請內屬人皆戀土不願東徙相與殺儒立嘉為王嘉字靈鳯金城郡榆中人今郡地既立為王會焉耆為嚈噠所破衆不自立請王於嘉嘉遣第二子為焉耆王由是始大益為國人所服其都城周回千八百四十步於坐室畫魯哀公問政於孔子之像國內有城十八置四十六鎮官有令尹有交河公田北公皆其王子也餘官多同中國大事決之於王小事世子及二公隨狀斷平章録記事訖即除藉書之外無久掌文案官人雖有列位並無曹府唯每朝集於衙門評議衆事諸城各有户曹水曹田曹每城遣司馬侍郎相監檢校名為城令服飾丈夫從胡法婦人裙襦頭髻略同華夏兵器有弓箭刀楯甲矟文字亦同華夏兼用胡書有毛詩論語孝經歷代子史集學官弟子以相教授雖習讀之而皆為詩賦稅則計田輸銀無者輸麻布其刑法風俗婚姻喪葬與華夏大同其人面貌類髙麗辮髮垂之於背女子亦然其地髙燥多石磧氣候溫暖與益州相似穀麥再熟宜蠶多五果有草名為羊刺其上生蜜味甚佳赤鹽如朱白鹽如玉多葡萄酒俗事天神兼信佛法國中羊馬牧於隱僻以避外寇非貴人不知其所又有草實如繭中絲如細纑名為白疊子國人取織以為布交市用焉其國北有赤石山山北七十里有貪汗山夏有積雪此山之北鐵勒界也從武威西北有捷路度砂磧千餘里四面茫然無有蹊徑欲往者不可準記唯以人畜骨骸及駝糞為驗路中或聞歌哭之聲行人尋之多致亡失蓋魑魅魍魎也故商旅往來多取伊吾路魏孝文以來朝貢不絶孝明時遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉燮以為博士許之嘉死子堅立後關中賊亂使命遂絶梁大同中遣使南奉方物普泰初遣使朝貢後遂隔絶至大統十四年詔以其世子元嘉為王恭帝二年又以田北公茂嗣位武成元年其王遣使貢方物保定初又遣使來貢隋文帝開皇中突厥破其四城有二千人來歸中國嘉孫伯雅立其大母本突厥可汗女其父死突厥令依其俗伯雅不從突厥逼而從之煬帝大業五年伯雅來朝因從擊髙麗還尚宗女華容公主八年歸蕃唐武德中遣使獻狗雌雄各一髙六寸長尺餘性甚慧能牽馬銜燭云本生拂菻國其後不供職貢貞觀四年其王文泰來朝伯雅子後與西突厥連結諸國朝貢者路出髙昌文泰稍擁絶之至十三年太宗謂其使曰髙昌數年來朝貢脫略我使人至彼文泰云鷹飛於天雉竄於蒿貓逰於堂鼠安於穴各得其所豈不快邪明年當發兵以擊汝國十四年拜侯君集為交河道大管總發兵討之羣臣諫以行萬里兵難得志且天界絶域雖得之不可守不從文泰謂左右曰曩吾入朝見秦隴北城邑蕭條非有隋比今伐我兵多則糧輸不逮若下三萬我能制之度磧疲鈍以逸待勞卧收其弊耳及聞王師至磧口悸駭無他計發病死子智盛立君集以兵傅其城智盛降乃下其郡三縣五城三十二户八千四十六口萬七千七百三十馬四千三百匹以其地為西州以交河城為交河縣始昌城為天山縣田北城為柳中縣東鎮城為蒲昌縣髙昌城為髙昌縣初西突厥遣其葉護屯兵於可汗浮圖城與髙昌為影響至是懼而來降以其地為庭州并置蒲類縣每歲調內地更發千人鎮遏焉黃門侍郎褚遂良諫曰古者先函夏後夷狄務先德化不爭荒逖今髙昌誅滅威動四夷然自王師始征河西共役飛米轉芻十室九匱五年未可復今又歲遣屯戍行李萬里去者資裝使自營辦賣菽粟傾機杼道路死亡尚不可計所遣罪人始於犯法終於惰業無益行陳復有亡命官司捕逮株蔓相牽有如張掖酒泉塵飛烽舉豈得髙昌一乘一卒及事乎必發隴右河西耳然則河西為我腹心髙昌他人手足也何必耗中華事無用昔陛下平頡利吐谷渾者皆為立君蓋罪而誅之服而立之百蠻所以畏威慕德也今宜擇髙昌可立者立之召首領悉還本土長為蕃翰中國不擾書奏不省焉耆請歸髙昌所奪五城留兵以守君集勒石紀功凱旋徙髙昌豪傑於中國智盛拜左武衛將軍金城郡公弟智湛右武衛中郎將天山郡公麴氏傳國九世百三十四年而亡智湛麟德中以左驍衛大將軍為西州刺史卒有子昭好學有鬻異書者母顧笥中金歎曰何愛此不使子有異聞乎盡持易之昭歷司膳卿頗能詞章弟崇裕有武藝永徽中為右武衛翊府中郎將封交河郡王邑至三千户終鎮軍大將軍武后為舉哀賻襚甚厚封爵遂絶安史之亂其地陷沒復自為國語訛亦曰髙敞然其地頗有回鶻故亦謂之回鶻宋建隆三年四月西州回鶻阿都督等四十二人以方物來貢乾德三年西州回鶻可汗遣僧法淵獻佛牙琉璃器琥珀盞太平興國六年其王始稱西州外生師子王阿厮蘭漢遣都督麥溫來獻五月遣供奉官王延德等使髙昌景德元年又遣使金延福來貢王延德使還敘其行程來上云初自夏州歷玉亭鎮次歷黃羊度沙磧無水行人皆載水凡二日至都囉囉族漢使過者遺以財寶謂之打當次歷第女喎子族族臨黃河以羊皮為囊吹氣實之浮於水或以橐駝牽木筏而渡次歷茅女王子開導族行入六窠砂砂深三尺馬不能行行者皆乘橐駝不育五穀砂中生草名登相收之以食次歷樓子山無居人行砂磧中以日為占旦則背日暮則向日日中則止夕行望月亦如之歷卧梁劾特族地有都督山唐回鶻之地次歷大蟲太子族族接契丹界人衣尚錦繡器用金銀馬乳釀酒飲之亦醉次歷屋地因族蓋達于于越王子之子次至達于于越王子族此九族達靼中尤尊者次歷拽利王子族有合羅川唐回鶻公主所居之地城基尚在有湯泉之地傳云契丹舊為回鶻牧牛回鶻徙甘州契丹達靼遂各爭長攻戰次歷阿墩族經馬綜山望鄉嶺上石庵李陵題字處次歷格囉美源西方百川所會極望無際鷗鷺鳬鴈之類甚衆次至托邊城亦名李僕射城城中首領號通天王次歷小石州次歷伊州州將陳氏其先自唐開元二年領州凡數十世唐時詔敕尚在地有野蠶生苦參上可為錦帛有羊尾重者三斤小者一斤肉如熊白而甚美又有礪石剖之得賔鐵謂之喫鐵石又生胡桐樹經雨即生胡桐律次歷益都次歷納職城在大患鬼魅磧之東南望玉門關甚近無水草載糧以行凡三日至鬼谷口避風驛用本俗法試茶出詔押禦風風乃息凡八日至驛田寺髙昌聞使至遣人來迎次歷地名寶莊又歷六鍾乃至髙昌即西州也其地南距于闐西南距大食波斯西距西天步露沙雪山蔥嶺皆數千里地無雨雪而極熱每盛暑居人皆穿地為穴以處飛鳥羣萃河濱或起飛即為日氣所爍墜而傷翼屋宇覆以白堊開寶三年雨及五寸即廬舍多壞有水出金嶺導之周繞國城以溉田園作水磑地産五穀惟無蕎麥貴人食馬餘食羊及鳬鴈樂多琵琶箜篌出貂鼠白氊繡文花蘂布俗好騎射婦人戴油帽謂之蘇幕遮用開元七年歷以三月九日為寒食餘二社冬至亦然以銀或鍮石為筒貯水激以相射或以水交潑為戲謂之壓陽氣去病好遊賞行者必抱樂器佛寺五十餘區皆唐朝所賜額寺中有大藏經唐韻玉篇經音等居民春月多羣聚遨樂於其間遊者馬上持弓矢射諸物謂之禳災有敕書數藏唐太宗明皇御札詔敕緘鎖甚緊復有摩尼寺波斯僧各持其法佛經所謂外道者也所統有南突厥北突厥大衆慰小衆樣磨割祿點戞司永蠻格哆族豫龍族之名甚衆國中無貧民絶食者共振之人多壽考率百餘歲絶無夭死時四月師子王避暑於北庭以其舅阿多于越守國先遣人致意於延德曰我王舅也使者拜我乎延德曰持朝命來禮不當拜復問曰見王拜乎延德曰禮亦不當拜阿多于越復數日始相見然其禮頗恭師子王邀延德至其北庭歷交河州凡六日至金嶺口寶貨所出又兩日至漢家寨又五日上金嶺過嶺即多雨雪嶺上有龍堂刻石記云小雪山也嶺上有積雪行人服毛罽度嶺一日至北庭憩髙臺寺其王烹羊并馬以具膳尤豐潔地多馬王及王后太子各養馬牧放於平川中彌亘百餘里以毛色分别為羣莫知其數北庭川長廣數千里鷹鷂雕鶻之所生多美草下生花砂鼠大如䨲鷙禽捕食之其王遣人來言擇日以見使者願無訝其淹久至七日見其主王及王子侍者皆東向拜受賜旁有持磬者擊以節拜王聞磬聲乃拜既而王之兒女親屬皆出羅拜以受賜遂張樂飲宴為優戲至暮明日泛舟於池中池四面作鼓樂又明日逰佛寺曰應運泰寧之寺貞觀十四年造北庭北山中出硇砂山中常有煙氣涌起而無雲霧至夕光焰若炬火照見禽鼠皆赤采硇砂者著木底鞋若皮為底者即焦下有穴生青泥出穴外即變為砂石土人取以治皮城中多樓臺卉木人白晳端正性工巧善治金銀銅鐵為器及攻玉善馬直絹一匹其駑馬充食者才直一丈貧者皆食肉西抵安西即唐之西境七月令延德先還其國其王九月始至亦聞有契丹使來使缺唇以銀葉蔽之謂其王云聞漢遣使入達靼而道出王境誘王窺邊宜早送至達靼無使久留因云髙敞本漢土漢使來覘視封域將有異圖王當察之延德偵知其語因謂王曰犬戎素不順中國今乃反間我欲殺之王固勸乃止自六年五月離京師七年四月至髙昌所歷以詔賜諸蕃君長襲衣金帶繒帛八年春與其謝恩使凡百餘人復循舊路而還雍熙元年四月至京師延德初至達靼之境頗見晉末陷敵者之子孫咸相率遮迎獻飲食問其鄉里親戚意甚悽感留旬日不得去延德之所述云龜兹龜兹一曰邱兹又曰屈茨漢時通焉王治延城今名伊邏盧城都白山之南二百里隋西域圖云白山一名阿羯山常有火及煙即出硇砂之所東去長安七千五百里户七千南與精絶東南與且末西南與杅彌北與烏孫西與姑墨接能冶鑄俗有城郭東至都護治所烏壘城四百里烏壘户百十與都護同治其南三百里至渠犂東北與尉犂東南與且末南與精絶接昭帝田輪臺與渠犂地皆相連也晉武帝時其王遣子入侍惠懷末以中國亂遣使貢方物於張重華苻堅堅遣其將吕光伐之其王白純距境不降光進軍討平之立其後白震為王其所居城方五六里城三重中有佛塔千所其刑法殺人者死劫賊則斷其一臂并刖一足賦稅準地徵租無田者則稅銀風俗婚姻喪葬物産與焉耆略同唯氣候少溫為異又出細氊饒銅鐵鉛䴨皮氍毹沙鹽緑雌黃胡粉安息香良馬犎牛等東有輪臺即漢李廣利所屠者其南三百里有大河東流號計戌水即黃河也東去焉耆九百里南去于闐一千四百里西去疏勒一千五百里北去突厥牙六百里東南去瓜州三百里其東關城屯寇竊非一魏太武詔將軍萬度歸率騎一千以擊之龜兹遣烏羯目提等領兵三千拒戰度歸擊斬之斬二百餘級大獲駝馬而還俗性多淫置女市收男子鐵以入官土多孔雀羣飛山谷間人取而食之孳乳如雞騖其王家恆有千餘隻云其國西北大山中有如膏者流出成川行數里入地狀如䬾糊甚臭服之齒髮已落者能令更生癘人服之皆愈自後每使朝貢周保定元年其王遣使來獻隋大業中其王白蘇尼遣使朝貢方物是時其國勝兵可數千人唐髙祖受禪其王遣使入貢貞觀四年獻馬帝賜璽書撫慰後臣西突厥郭孝恪伐焉耆乃遣兵與焉耆應援自是不朝貢二十一年兩遣使入朝貢帝怒其佐焉耆叛乃以阿史那社爾為崑邱道行軍大總管部兵十萬討之社爾凡破五大城俘男女數萬遣使者諭降小城七百餘西域震懼社爾乃立王弟葉護王其國勒石紀功始徙安西都護於其都統于闐碎葉疏勒號四鎮髙宗復封訶黎布失畢為龜兹王與其降王還國後為降王所拒復發兵討誅之以其地為龜兹都督府更立子素稽為王是歲徙安西都護於其國以故安西為西州都督府治儀鳯時吐蕃攻焉耆以西四鎮皆沒長壽元年武威道總管王孝傑破吐蕃復四鎮地置安西都護府於龜兹以兵三萬鎮守於是沙磧荒絶民供資糧甚苦議者請棄之武后不聽都護以政績稱者田揚名郭元振張孝嵩杜暹云開元七年王白莫宓死子多市立改名孝節十八年遣弟孝義來朝自龜兹贏六百里踰小沙磧有跋祿迦小國也一曰亟墨即漢姑墨國橫六百里縱三百里風俗文字與龜兹同言語少異出細氊褐西三百里度石磧至凌山蔥嶺北原也水東流春夏山谷積雪西北五百里至素葉水城比國商胡雜居素葉以西數十城皆立君長役屬突厥自素葉水城至羯霜那國衣氈褐皮㲲以繒繚額素葉城西四百里至千泉地贏二百里南雪山三垂平陸多泉池因名之突厥可汗歲避暑其中羣羆鹿飾鈴鐶可狎也西贏百里至咀邏私城亦比國商胡雜居有小城三百本華人為突厥所掠羣保此尚華語西南贏二百里至白水城原隰膏腴南五十里有笯赤建國廣千里地沃宜稼多葡萄又二百里即石國宋大中祥符三年龜兹王可汗遣使貢方物天禧四年又入貢自天聖至景祐四年龜兹入貢者五最後賜以佛經一藏其國主自稱師子王衣黃衣寶冠與宰相九人同治國事其國西至大食國六十日行東至夏州九十日行或稱西州回鶻或稱西州龜兹或稱龜兹回鶻熙寧四年五年俱入貢紹聖三年使大首領阿連撒羅等三人以表章及玉佛至洮西熙河經略使以其罕通使請令於熙秦等州博買而估所賫物價答賜遣還從之且彌西且彌國王治天山東於太谷在車師北本屬役車師去長安八千六百七十里户三百三十二口千九百二十六勝兵七百八十三人西且彌侯左右將左右騎君各一人西南至都護治所四百八十里東且彌國王治天山東兌虛谷去長安八千二百五十里户百九十一口千九百八十四勝兵五百七十二人東且彌侯左右都尉各一人西南至都護治所千五百八十七里焉耆焉耆漢時通焉王治員渠城在白山之南七十里去長安七千三百里户四千西南都護治所四百里南去尉犂百里北與烏孫接東去交河城唐郡九百里西去龜兹九百里皆沙磧其國近海水多魚鹽蒲葦之利四面有大山道險厄易守海水曲入四山之內周匝其城三十餘里後漢明帝永平末有户萬五千與龜兹共攻沒都護陳睦至和帝永光六年都護班超發諸國兵討之殺其王超乃立焉耆左侯元孟為王至安帝時西域背叛延光中超子勇為西域長史復討定之晉武帝太康中其王龍安遣子入侍安夫人糩胡之女糩古邁反妊身十二月剖脅生子曰會立為世子會少而勇傑安病篤謂會曰我嘗為龜兹王白山所辱汝能雪之乃吾子也及會立襲滅白山遂據其國遣子熙歸本國為王會有膽氣籌略遂霸西域蔥嶺以東莫不率服其俗丈夫剪髮婦人衣𥜗著大褲婚姻同華夏兵有弓刀甲矟死亡者皆焚而後葬其服制滿七日則除之俗事天神氣候寒土田良沃穀有稻粟菽麥畜有駝馬牛羊養蠶不以為絲唯取纊綿俗尚葡萄酒兼愛音樂其後張駿遣沙州刺史楊宣率衆經理西域宣以部將張植為前鋒軍次其國進屯鐵門未至十餘里熙又率衆先要之於遮留谷植將至或曰漢祖畏於柏人岑彭死於彭亡谷名遮留殆將有伏單騎嘗之果有伏發植擊敗之進據尉犂熙降於宣吕光僣位熙遣子入侍至魏遣成周公萬度歸討之其王尸鳩卑那衆大潰單騎走入山中度歸進屠其城四部諸戎皆降服焉耆為國斗絶一隅不亂日久獲其珍奇異玩殊方詭譎難名之物橐駝馬牛雜畜巨萬至後周武帝保定四年其王遣使獻名馬隋煬帝大業中其王龍突騎遣使貢方物唐貞觀六年龍突騎遣使來朝自隋亂磧路閉故西域朝貢皆道髙昌突騎支請開大磧道以便行人帝許之髙昌怒大掠其邊西突厥復攻之與髙昌陷其五城掠千五百人焚廬舍遣使言狀詔侯君集討髙昌突騎支引兵佐唐髙昌破歸向所俘及城遣使入謝其後與西突厥相約為輔車勢不朝貢乃命安西都護郭孝恪討之傅其城執突騎支更以栗婆準攝國事後其從兄薛婆阿那支自為王執栗婆準獻龜兹殺之阿史那社爾討龜兹擒阿那支斬以徇立突騎支弟婆伽利為王以其地為焉耆都督府婆伽利死國王請還前王突騎支許之歸國死龍懶突立開元七年龍懶突死吐拂延立訖天寶常朝貢其後盡并有漢時尉犂危須山國三國之地并鄯善之北界矣文獻通考卷三百三十六
