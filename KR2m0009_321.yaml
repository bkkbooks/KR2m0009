治合川合川常芬宋無此州翼州本漢蠶陵縣地屬汶山郡郡廢屬蜀郡晉復屬汶山郡後周置翼針縣及翼針郡隋開皇初郡廢屬會州後屬汶山郡唐武德元年析置翼州或為臨翼郡屬劍南道貢犛牛尾麝香白蜜領縣三治衛山衛山翼水漢蠶陵縣有蠶陵山峨和宋無此州當州本諸羌之地後周置覃州及覃川榮鄉二郡隋開皇初郡廢四年州廢屬汶山郡唐貞觀間析松州置當州以地産當歸為名或為江源郡屬劍南道貢麩金酥麝香當歸羌活領縣三治通軌通軌唐置谷和開生羌置利和析通軌置宋無此州悉州本生羌之地後周置廣平左封二郡隋開皇初並廢屬汶山郡唐顯慶元年析當州置悉州以悉唐川為名或為歸誠郡屬劍南道貢同當州領縣二治左封左封本𨽻會州武德初改歸誠宋無此州靜州土地與當州同唐置靜州或為靜川郡屬劍南道貢麝香犛牛尾當歸羌活領縣三治悉唐悉唐靜居清道宋無此州柘州土地與當州同唐置柘州或為蓬山郡屬劍南道貢同靜州領縣二治柘柘喬珠宋無此州恭州北接吐蕃土地與當州同唐以靜州之廣平置恭州或為恭化郡屬劍南道貢麝香當歸升麻羌活領縣三治和集和集博恭烈山宋無此州奉州蠻夷之地北連吐蕃唐開元二十八年以維州之定廉置天寶八年徙治天保軍名保州廣德元年沒吐蕃乾元元年嗣歸誠王董嘉俊以郡來歸更名州後又更名古州其後復為保州屬劍南道貢同當州領縣一定廉宋無此州嶲州故卭都國謂之西南夷史記曰滇之君大長十數邛都最漢武開之置越嶲郡郡有嶲水越水焉後漢晉宋皆因之齊謂之獠郡越嶲謂之獠郡後周置嚴州隋改曰西寧州後以為嶲州煬帝改為越嶲郡唐置嶲州或為越嶲郡至德二載沒吐蕃貞元十三年收復太和五年為蠻寇所破六年徙治臺登屬劍南道貢蜀馬絲布花布麩金麝香刀靶領縣九治越嶲越嶲漢卭都縣昆明漢定莋縣蘇祁漢舊縣卭部漢闌縣有嶲山會川有瀘水諸葛亮五月渡瀘即此臺登漢舊縣有澠水西瀘和集昌明貞觀間開松外蠻置牢州及松外尋聲林開三縣後周廢入昌明宋無此州姚州故滇王國漢武帝開之置益州郡有滇池澤焉後漢分置永昌郡蜀後主置雲南郡晉因之兼置寧州領郡四治於此宋齊因之領郡十五治於此並為建寧郡唐麟德元年於昆明之梇棟川置姚州以其人多姓姚故名姚州屬劍南道其後沒於南詔自嶲州南至西瀘經陽蓬鹿谷菁口會川四百五十里至瀘州及南渡瀘水經褒州微州三百五十里至姚州州西距南詔芈苴􅫗城三百里東南距安南水陸二千里貢麩金麝香領縣三治姚城姚城故漢梇棟縣地瀘南唐縣有蔥山長明宋無此州文獻通考卷三百二十一
