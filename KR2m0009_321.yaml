body:
  text: 文獻通考卷三百二十一鄱陽馬端臨貴與著輿地考七古梁州禹貢曰華陽黑水惟梁州孔安國以為東據華山之南西距黑水也又曰導黑水至於三危入於南海孔安國注云黑水自北而南經三危過梁州入南海鄭元云按三危在鳥鼠之西而南當岷山又在積石之西南當黑水祠黑水出其南脅此云經三危彼云其出明其乖戾又按漢書地理志益州郡滇池有黑水祠而不記山之所在即今中國無之矣又按酈王道元注水經鋭意尋討亦不能知黑水所經之處顧野撰輿地志以為至僰道入江其言與禹貢不同未為實録至於孔鄭通儒莫知其所或是年代久逺遂至堙涸無以詳焉滇音顛岷嶓既藝沱潛既道岷山在今通化郡汶山縣嶓山在今漢中郡金牛縣也言水已去二山之土皆可種藝沱潛二水理從故道也沱水在今濛陽郡唐昌縣潛水未詳蔡蒙旅平和夷底績蔡蒙二山名旅陳也旅平言已平理而陳祭也和夷地名亦已致功可耕稼也蒙山在盧山郡蔡山未詳厥土青黎色青而細疏也自漢川已下諸郡皆其封域舜置十二牧梁州其一也以西方金剛其氣強梁故曰梁州周禮以梁州併雍州梁州當夏殷之間為蠻夷之國所謂巴賨彭濮之人也或曰蜀之先帝嚳封其支庶於蜀其後稱王長曰𧖟叢次日伯雍次日魚鳬周末秦惠王使司馬錯伐蜀有其地於天文兼參之宿亦秦之分野漢之巴蜀廣漢犍為武都牂牱越嶲等郡與今通川潾山南平涪陵南川瀘川清化始寧咸安符陽巴川南賔南浦閬中南充安嶽盛山雲安犍為陽安仁夀通義和義資陽南溪武都河池同谷順政隂平江油益昌普安巴西梓潼遂寧蜀郡德陽濛陽唐安臨卭盧山通化臨翼越嶲雲南等郡皆是漢之𢎞農郡西南境今上洛郡又得楚之交漢之漢中今洋川安康房陵等郡並宜屬楚秦平天下置郡為漢中今漢中洋川郡安康房陵等郡地也巴今通川潾山南平涪陵南川瀘川清化始寧咸安符陽巴川南浦閬中南充盛山雲安安嶽之東境皆是蜀今巴西普安梓潼遂寧益昌蜀郡德陽濛陽唐安臨卭盧山等郡地並是隴西郡之南境今河池郡內史之南境今上洛郡其餘土境自漢以後厯代開拓氐羌戎夷之地今犍為陽安安嶽之西境仁夀通義和義資陽皆故夜郎侯國南溪僰侯國並漢武帝開之置犍為郡今武都同谷順政懷道同昌隂平江油交川合川通化臨翼江源歸誠靜川蓬山恭化維川雲山越嶲雲南洪源等郡即漢以後所開拓也漢武帝置十三州此為益州領郡八益之為言隘也言其地隘險亦曰疆壤益大漢既滅越而蜀西南夷皆震恐請吏入朝遂置益州越嶲等郡王莽末公孫述據有其地後漢建武中平之置益州領郡九屬國三理雒今德陽郡縣至獻帝末劉備復據其地魏末平之遂分置梁益二州晉初因之益領郡八理成都梁領郡八理南鄭後又分益州南境置寧州領郡四理雲南即今郡惠帝以後李特據之後又收復宋梁益寧三州並因前代梁領郡二十益領郡二十九寧領郡十五更置秦州領郡十四理南鄭齊及梁初多因之梁武帝天監三年刺史夏侯道遷以所部叛降西魏南至劒閣悉失之後魏得漢中亦曰梁州西魏亦因之復入於梁西魏大統十二年為梁將蘭欽所陷梁滅再復其地將逹奚武平漢川尉遲逈平蜀川自是以後所置州郡割裂無恆不可詳記唐分置十五部此為山南西道漢中通川巴川清化洋川順政河池益昌咸安盛山始寧南平符陽潾山等郡皆是山南東道房陵南賔南浦雲安劒南道蜀郡唐安濛陽德陽通義梓潼巴西普安閬中資陽臨卭通化交川越嶲南溪遂寧仁夀犍為盧山瀘川陽安安嶽洪源隂平同昌江油臨翼歸誠洪源靜川恭化維川和義雲山蓬山雲安南充等郡兼分入京畿上洛安康隴右道同谷武都懷道合川及黔中道涪陵南川唐末蜀地為王建所據後唐滅王氏而取其地孟知祥復據之至宋乾德三年平孟蜀始盡得梁州之地分為益州利州梓州夔州四路云巴蜀之人少愁苦而輕易淫佚周初從武王勝殷庸蜀羌髳微盧彭濮人是也東遷之後楚子強大而役屬之暨於戰國又為秦有資其財力國以豐贍漢景帝時文翁為蜀郡守建立學校自是蜀士學者比齊魯焉土肥沃無凶嵗山重復四塞險固王政微缺跋扈先起公孫述李雄譙縱王建孟知祥迭據之皆因中原多事故一方之寄非親賢勿居古梁州厯代沿革之圖春秋時可考者五國楚西南境是麇庸巴蜀秦時為郡五巴郡蜀郡漢中郡隴西郡南境是內史南境是漢時為郡國九縣一百二十八漢中郡十二縣西城沔陽洵陽武南鄭房褒中安成固上鍚陵陵陽庸長利廣漢郡十三縣梓潼新都什方道涪綿雒甸氐竹葭萌廣漢郪平隂道白水剛氐道蜀郡十五縣成都綿虒郫牛繁臨廣都青江原汶嚴道廣旄卭衣江柔徙湔氐道𧖟陵巴郡十一縣江州復臨江國枳墊閬中朐安漢涪宕渠魚充江䏰陵益州郡二十四縣滇池昌雙柏臧同勞古銅瀨然收靡榖秦賁連俞元澤葉榆比蘇律髙建伶不韋毋掇雲南勝休邪龍嶲唐味棟昆弄來唯武都郡九縣武都道上祿辨故道沮河池樂嘉陵道循成下道平道牂牱郡十七縣故且蘭毋鐔封夜鄨宛溫斂郎漏卧平夷談指同並西隨都夢談藁毋單漏江進桑句町越嶲郡十五縣卭都莋遂久復靈關道大姑三絳臺登定莋莋秦會無卑水潛街蘇祗闌青蛉犍為郡十二縣僰道南廣江陽漢陽武陽􅛿䣕南安資中牛鞞朱符提堂琅𢎞農郡南境是縣見雍州晉時為郡國二十五縣一百五十六漢中郡八縣南鄭黃蒲池興褒中鄉金道沔陽成固西廣漢郡三縣廣漢德陽五城梓潼郡八縣梓潼劒涪城白武連夀閣水黃安漢德晉新都郡四縣雒什方綿竹新都涪陵郡五縣漢復涪陵漢平漢葭萬寧巴都郡四縣江州墊江臨江枳巴西郡九縣閬中漢昌西充國安蒼溪南岐愜宕渠漢充國平州巴東郡三縣魚復朐䏰南浦蜀郡六縣成都廣都繁江原臨卭郫犍為郡五縣武陽南安僰道資中牛鞞汶山郡八縣汶山蠶升遷廣都安康陵柔廣陽興樂平漢嘉郡四縣漢嘉徙陽嚴道旄牛朱提郡五縣朱提南廣漢陽南秦堂琅越嶲郡五縣會無卭都卑水定莋臺登牂牱郡八縣萬夀鄨且蘭夷談指渠平夜郎母劒井江陽郡三縣江陽符漢安建寧郡十七縣味江昆澤牧麻􅛿䣕榖昌新定談藁銅瀨毋單漏雙柏俞元修雲連然秦臧泠邱滇池興古郡十一縣律髙鐔封句町漢興宛溫進乘漏卧毋掇勝休賁古都篖雲南郡九縣雲平遂雲南永弄棟姑青蛉榆久寧復邪龍楪永昌郡八縣不韋哀永夀博比蘇唐牢南雍鄉南涪嶲武都郡五縣下辨河池沮武都故道隂平郡二縣隂平平廣魏興郡六縣晉興安康西城錫長利洵陽新城郡四縣房陵緩陽昌魏沶鄉上庸郡六縣上庸陽安富北巫武陵上亷微隋時為郡三十四縣二百一十六漢川郡八縣南鄭金西難褒城黃江城固興勢西鄉房陵郡四縣光遷永清竹山上庸西城郡六縣金川利石泉洵陽安康黃土豐漢陽郡三縣上祿鐔水長道清化郡十四縣化成始寧曽口其章清化恩陽盤道長池永穆符陽歸仁安固白石伏虞通川郡七縣通川萬三岡流世石鼓東鄉宣漢西宕渠郡六縣流江江賨城鄰水宕渠咸安墊巴郡三縣巴江津涪陵新城郡五縣郪射洪鹽亭通泉飛烏巴東郡十四縣人復巴東雲安新浦南浦盛山梁山大昌秭歸巫山石城臨江武寧務川巴西郡十縣閬內奉南部儀蒼溪相南充大西水城國隴如寅晉蜀郡十三縣成都武雙流元雒新津清城晉原九隴綿竹金泉郫陽安平泉臨卭郡九縣嚴道沈名山漢盧山臨依政溪黎源卭蒲江蒲汶山郡十一縣汶山翼北川江交川通通化汶翼針左平康水源軌川封義城郡七縣綿谷嘉益昌谷川義城葭萌岐坪景平武郡四縣江油馬盤平武方維河池郡四縣梁泉兩當河池同谷順政郡四縣順政鳴水長舉修城武都郡七縣將利正建威水西覆津盤堤長松曲宕昌郡三縣良恭和戎懷道上洛郡五縣上洛商洛洛南豐陽上津隆山郡五縣仁夀貴平井研始建隆山瀘川郡五縣瀘川富世江安合江綿水涪陵郡三縣石鏡漢初赤水資陽郡九縣盤石隆內江資威逺安大牢居康陽嶽普慈安眉山郡八縣龍遊丹平羌洪夾江神稜雅峨眉通義青犍為郡四縣僰道犍為南溪開邊普安郡七縣普安臨永歸連津黃安隂平梓潼武遂寧郡三縣方義青石長江金山郡七縣巴西金昌隆泉山涪城魏城萬安神黔安郡二縣彭水涪川同昌郡八縣尚安常鉗川金帖夷德芬崖同昌嘉誠封越嶲郡六縣越嶲部卭都蘇祗可泉臺登卭牂牁郡二縣牂牁賔化唐時為州六十二縣二百九十二興元府六縣洋州四縣商州五縣金州六縣房州四縣逹州九縣渠州五縣渝州五縣涪州五縣瀘州六縣巴州九縣壁州四縣蓬州七縣集州三縣合州六縣忠州五縣萬州三縣閬州九縣果州五縣普州六縣開州三縣夔州四縣嘉州八縣簡州三縣陵州五縣眉州五縣榮州六縣資州八縣戎州五縣鳯州四縣階州二縣成州三縣興州二縣文州二縣龍州二縣利州六縣劒州八縣綿州八縣梓州八縣遂州五縣益州十縣漢州五縣彭州四縣蜀州四縣卭州七縣雅州五縣茂州四縣維州二縣黎州二縣南州二縣宕州二縣扶州四縣松州四縣疊州二縣翼州三縣當州三縣悉州二縣靜州三縣柘州二縣恭州三縣奉州一縣嶲州九縣宋時為州五十八縣二百二十一興元府五縣洋州三縣商州五縣金州五縣房州二縣逹州七縣渠州四縣重慶府三縣涪州五縣瀘州三縣巴州五縣壁州三縣蓬州六縣集州二縣合州五縣忠州五縣萬州二縣閬州九縣果州四縣普州四縣開州三縣夔州二縣嘉州六縣簡州二縣陵州四縣眉州四縣榮州五縣資州四縣敘州四縣鳯州三縣階州二縣成州二縣興州二縣文州一縣龍州二縣利州五縣劒州七縣綿州八縣潼州府九縣遂寧府五縣成都府九縣漢州四縣彭州三縣蜀州四縣卭州七縣雅州五縣茂州三縣威州二縣黎州二縣永康軍二縣石泉軍三縣懷安軍二縣廣安軍三縣富順監一縣雲安軍一縣梁山軍一縣大寧監一縣南平軍二縣興元府春秋至戰國並楚地秦置漢中郡二漢因之漢髙帝始封之地後漢末張魯據其地改漢中為漢寧魏武征漢中走張魯復曰漢中郡後劉備破魏將夏侯妙才遂有其地以為重鎮先主以魏延後主以蔣琬薑維相繼屯守後聞魏將鍾會理兵關中維表請分將護陽平關口後主不從魏末平蜀又置梁州領郡八晉宋齊梁皆為梁州理於此晉初領郡八後領郡二十宋齊梁因之宋以後更置秦州亦理於此領郡十四漢中常以巴蜀扞蔽故劉備初得漢中曰曹公雖來無能為也是以巴蜀有難漢中輒沒自公孫述劉備李雄譙縱據蜀漢中皆為所陷氐虜鄰接常為威禦之鎮蕭齊明帝初從魏大將元英率兵十萬通斜谷圍南鄭刺史蕭懿守拒百餘日不拔而退後魏亦置梁州梁天監三年夏侯道遷以州郡入魏大同初復之元帝末陷於西魏及漢中郡西魏因之後周改曰漢川郡隋初郡廢而梁州如故煬帝初州廢復置漢川郡唐為梁州開元十三年以梁涼聲相近更名褒州興元元年為府屬山南道山南西道節度領縣五南鄭西褒城三泉固城王蜀改天義軍後復宋乾德五年以三泉屬京至道二年以西縣屬大安軍三年還屬利州路建炎二年帶本路鈐轄宣撫張浚積粟理財以待巡幸謂前控六都之師後據兩川之粟左通荆襄之財右出秦隴之馬天下大計可定四年兼本路經略安撫使後又置利州路階成和鳯州制置使涇原秦鳯路經略安撫使乾道四年合為一路興元帥兼領之貢燕脂紅花領縣五治南鄭南鄭漢縣有梁山巴嶺黃牛山褒中汶川武鄉城固唐縣有黑水褒城隋