body:
  text: 文獻通考卷三鄱陽馬端臨貴與著田賦考三歷代田賦之制元宗開元八年頒庸調法於天下是時天下戶未嘗升降監察御史宇文融獻策括籍外羡田逃戶自占者給復五年每丁稅錢千五百以攝御史分行括實陽翟尉皇甫憬上書言其不可帝方任融乃貶憬為盈川尉諸道所括得客戶八十餘萬田亦稱是州縣希旨張虛數以正田為羡編戶為客歲終籍錢數百萬緡沙隨程氏曰按唐令文授田每年十月一日里正預造簿縣令總集應退應授之人對共給授謂如里正管百丁田萬畝立法之意欲百家仰事俯育不致困乏耳因制租調以祿君子而養民之意為多律文脫戶者有禁漏口者有禁浮浪者有禁占田違限者有禁官司應授田而不授應課農桑而不課者有禁但使後世謹守高祖太宗之法其為治豈易量哉中間法度廢弛凡史臣所記時弊皆州縣不舉行法度耳時天下有户八百萬而浮客乃至八十萬此融之論所以立也使融檢括剩田以授客戶責成守令不收限外之賦雖古之賢臣何以加諸雖有不善其振業小民審修舊法所得多矣故杜佑作理道要訣稱融之功當是時姚崇宋璟張九齡輩皆在豈雷同默默者耶故唐人後亦思之然陸贄稱租調法曰不校閲而衆寡可知是故一丁之授田決不可令輸兩丁之賦非若兩稅鄉司能開闔走弄於其間也史臣曰州縣希融旨空張其數務多其獲蓋與陸贄之説背馳豈史臣未稽其實邪開元十六年詔每三歲以九等定籍先是揚州租調以錢嶺南以米安南以絲益州以羅紬綾絹供春綵因詔江南以布代租凡庸調租資課皆任土所宜以江淮轉輸有河洛之艱而關中蠶桑少菽麥常賤乃命庸調資課皆以米凶年樂輸布絹者從之河南北不通運州租皆以絹代關中庸課詔度支減轉運天寶五載詔貧不能自濟者每鄉免三十丁租庸天寶中應受田一千四百三十萬三千八百六十二頃十三畝按十四年有戶八百九十萬餘計定墾之數每戶合得一頃六十餘畝至建中初分遣黜陟使按比墾田田數都得百十餘萬畝代宗寶應元年租庸使元載以江淮雖經兵荒其民比諸道猶有資産乃按籍舉八年租調之違負及逋逃者計其大數而徴之擇豪吏為縣令而督之不問負之有無資之高下察民有粟帛者發徒圍之籍其所有而中分之甚者十取八九謂之白著有不服者嚴刑以威之民有蓄穀十斛者則重足以待命或相聚山林為羣盜縣不能制盜袁朝起浙東攻陷諸郡衆近二十萬經二年李光弼討平之廣德元年詔一戶三丁者免一丁庸稅地稅依舊凡畝稅二升男子二十五為成丁五十五為老以優民大歷元年詔天下苖一畝稅錢十五市輕貨給百官手力課以國用急不及秋苖方青則徴之號青苖錢又有地頭錢畝二十通名青苖錢又詔上都秋稅分二等上等畝稅一斗下等六升荒田畝稅二升五年始定法夏上田畝稅六升下田畝四升秋上田畝稅五升下田畝三升荒田如此青苖錢畝加一倍而地頭錢不在焉大歷四年敕天下及王公以下今後宜凖度支長行旨條每年稅錢上上戶四千文上中戶三千五百上下戶三千中上戶二千五百中中戶二千中下戶千五百下上戶一千下中戶七百下下戶五百文其見任官一品凖上上户稅九品凖下下户稅餘品並凖此依戶等稅若一戶數處任官亦每處依品納稅其內外官仍據正員及占額內闕者稅其試及同正員文武官不在稅限百姓有邸店行鋪及爐冶應準式合加本戶二等稅者依此稅數勘責徴納其寄莊戶準舊例從八等户稅寄住戶從九等戶稅比類百姓事從不均宜遞加一等稅其諸色浮客及權時寄住田者無問有官無官亦在所為兩等收稅稍殷有者準八等戶稅餘準九等户稅如數處有莊田亦每處稅諸道將士莊田既緣防禦勤勞不可同百姓例並從九等輸稅按以錢輸稅而不以穀帛以資力定稅而不問身丁人皆以為行兩稅以後之弊今觀此則由來久矣德宗時楊炎為相遂作兩稅法夏輸無過六月秋輸無過十一月置兩稅使以總之凡百役之費先度其數而賦於人量出制入戶無主客以見居為簿人無丁中以貧富為差不居處而行商者在所州縣稅三十之一度所取與居者均使無僥利其租庸雜徭悉省而丁額不廢其田畝之稅以大歷十四年墾田之數為定而均收之遣黜陟使按諸道丁産等級免鰥寡惸獨不濟者敢加斂以枉法論舊户三百八十萬五千使者按得主戶三百八十萬客戶三十萬天下之民不土斷而地著不更版籍而得其虛實歲斂錢二千五十餘萬緡米四百萬斛以供外錢九百五十餘萬緡米千六百餘萬斛以供京師天下便之租庸調法以人丁為本開元後久不為版籍法度廢弊丁口轉死田畝換易貧富升降悉非向時而戶部歲以空文上之又戍邊者蠲其租庸六歲免歸元宗事夷狄戍者多死邊將諱不以聞故貫籍不除天寶中王鉷為戶口使務聚斂以其籍存而丁不在是隱課不出乃按舊籍除當免者積三十年責其租庸人苦無告法遂大弊至德後天下兵起人口凋耗版圖空虛賦斂之司莫相統攝紀綱大壞王賦所入無幾科斂凡數百名廢者不削重者不去吏因其苛蠶食於人富人多丁者以宦學釋老得免貧人無所入則丁存故課免於上而賦增於下是以天下殘瘁蕩為浮人鄉居土著者百不四五炎疾其弊乃請為兩稅法以一其制議者以為租庸調高祖太宗之法不可輕改而帝方任炎乃行之自是吏姦無所容輕重之權始歸朝廷矣沙隨程氏曰開元中豪弱相併宇文融修舊法收羡田以招徠浮戶而分業之今炎創以新意而兼并者不復追正貧弱者不復田業姑定額取稅而已始與孟子之論悖而史臣詆融而稱炎可謂淺近矣贊稱融取隱户剩田以中主欲夫隱戶而不出剩田而不取則高祖太宗之法廢矣流亡浮寄者何以振業之乎使賢者當炎之地宜用融之善以修舊法以革時弊去融之不善務為簡易責成守令而不收籍外之稅俾高祖太宗之法弊而復新戶口既增租調自廣此陸贄之論諄復而發者如斯而已也且天寶盛時戶八百餘萬兵亂之後至是三百餘萬既曰土著者百無四五是主戶十五餘萬浮客二百八十餘萬也宜無是理既不復授田雖以見居為簿何益乎按宇文融楊炎皆以革弊自任融則守高祖太宗之法炎則變高祖太宗之法然融守法而人病之則以其逼脅州縣妄增逃羡以為功也炎變法而人安之則以其隨順人情姑視貧富以制賦也融當承平之時簿書尚可稽考乃不能為熟議緩行之規炎當離亂之後版籍既已隳廢故不容不為權時施宜之舉今必優融而劣炎則為不當於事情矣建中三年詔增天下稅錢每緡二百朱滔王武俊田悅合縱而叛國用不給淮南節度使陳少遊增其本道稅錢因詔天下皆增之貞元八年劍南節度使韋臯又增稅十二以增給官吏貞元四年詔天下兩稅審等第高下三年一定戶自初定兩稅貨重錢輕乃計錢而輸綾絹既而物價愈下所納愈多絹匹為錢三千二百其後一匹為錢一千六百輸一者過二雖賦不增舊而民愈困矣度支以稅物頒諸司皆折本價為虛估給之而繆以濫惡督州縣剝價謂之增納復有進奉宣索之名改科役曰召雇率配曰和市以巧避微文比大歷之數再倍又癘疫水旱戶口減耗刺史析戶張虛數以寬責逃死闕稅取於居者一室空而四鄰亦盡戶版不緝無浮遊之禁州縣行小惠以傾誘鄰境新收者優假之唯安居不遷之民賦役日重帝以問宰相陸贄贄上疏請釐革其甚害者大略有六其一曰國家賦役之法曰租曰調曰庸其取法逺其斂財均其域人固有田則有租有家則有調有身則有庸天下法制均一雖轉徙莫容其姦故人無搖心天寶之季海內波蕩版圖隳於避地賦法壞於奉軍賦役舊法行之百年人以為便兵興供億不常誅求隳制此時弊非法弊也時有弊而未理法無弊而已更兩稅新制竭耗編氓日日滋甚陛下初即位宜損上益下嗇用節財而摘郡邑驗簿書州取大歷中一年科率多者為兩稅定法此總無名之暴賦而立常規也夫財之所生必因人力兩稅以資産為宗不以丁身為本資産少者稅輕多者稅重不知有藏於襟懷囊篋物貴而人莫窺者有場圃囷倉直輕而衆以為富者有流通蕃息之貨數寡而日收其贏者有廬舍器用價高而終歲利寡者計估算緡失平長偽挾輕費轉徙者脫徭稅敦本業者因斂求此誘之為姦驅之避役也今徭賦輕重相百而以舊為凖重處流亡益多輕處歸附益衆有流亡則攤出已重者愈重有歸附則散出已輕者愈輕人嬰其弊願詔有司與宰相量年支有不急者罷之廣費者節之軍興加稅諸道權宜所增皆可停稅物估賈宜視月平至京與色樣符者不得虛稱折估有濫惡罪官吏勿督百姓每道以知兩稅判官一人與度支參計戶數量土地沃瘠物産多少為二等州等下者配錢少高者配錢多不變法而逋逃漸息矣其二曰播殖非力不成故先王定賦以布麻繒纊百穀勉人功也又懼物失貴賤之平交易難凖乃定貨泉以節輕重蓋為國之利權守之在官不以任下然則穀帛人所為也錢貨官所為也人所為者租稅取焉官所為者賦斂捨焉國朝著令租出穀庸出絹調出繒纊布麻曷嘗禁人鑄錢而以錢為賦今兩稅效算緡之末法估資産為差以錢穀定稅折供雜物歲目頗殊所供非所業所業非所供增價以市所無減價以貨所有耕織之力有限而物價貴賤無常初定兩稅萬錢為絹三匹價貴而數不多及給軍裝計數不計價此稅少國用不充也近者萬錢為絹六匹價賤而數加計口蠶織不殊而所輸倍此供稅多而人力不給也宜令有司復初定兩稅之歲絹布匹估為布帛之數復庸調舊制隨土所宜各修家技物甚賤所出不加物甚貴所入不減且經費所資在錢者獨月俸資課以錢數多少給布廣鑄而禁用銅器則錢不乏有糴鹽以入直𣙜酒以納資何慮無所給哉其三曰亷使奏吏之能者有四科一曰戶口增加二曰田野墾闢三曰稅錢長數四曰率辦先期夫貴戶口增加詭情以誘姦浮苛法以析親族所誘者將議薄征則遽散所析者不勝重稅則又亡有州縣破傷之病貴田野墾闢然農夫不增而墾田欲廣誘以墾殖荒田限年免租新畝雖闢舊畬蕪矣及至免租年滿復為汙萊有稼穯不增之病貴稅錢長數重困疲羸捶骨瀝髓茍媚聚斂之司有不恤人之病貴率辦先期作威殘人絲不容織粟不暇舂貧者奔迸有不恕物之病四病繇考核不切事情之過驗之以實則租賦所加固有受其損者此州若增客戶彼郡必減居人增處邀賞而稅數加減處懼罪而稅數不降國家設考課之法非欲崇聚斂也宜命有司詳考課績州稅有定徭役有等覆實然後報戶部若人益阜實稅額有餘據戶均減十三為上課減二次之減一又次之若流亡多加稅見戶者殿亦如之民納稅以去歲輸數為常罷據額所率者增闢勿益租廢耕不降數定戶之際視雜産以校之田既有常租則不宜復入兩稅如此不督課而人人樂耕矣其四曰明君不厚所資而害所養故先人事而借其暇力家給然後斂餘財今督收促迫蠶事方興而輸縑農功未艾而斂穀有者急賣而耗半直無者求假費倍定兩稅之初期約未詳屬征役多故率先限以收宜定稅期隨風俗時候務於紓人其五曰頃師旅亟興官司所儲唯給軍食凶荒不暇賑救人小乏則取息利大乏則鬻田廬斂穫始畢執契行貸飢歲室家相棄乞為奴僕猶莫之售或縊死道途天災流行四方代有稅茶錢積戶部者宜計諸道戶口均之穀麥熟則平糶亦以義倉為名主以巡院時稔傷農則優價廣糴穀貴而止小斂則借貸循環斂散使聚穀幸災者無以牟大利其六曰古者百畝地號一夫蓋一夫授田不得過百畝欲使人不廢業田無曠耕今富者萬畝貧者無容足之居依託強家為其私屬終歲服勞常患不充有田之家坐食租稅京畿田畝稅五升而私家收租畝一石官取一私取十穯者安得足食宜為定條限裁租價損有餘優不足此安富恤窮之善經不可捨也贄言雖切以讒逐事無施行者河南尹齊抗復論其弊以為陛下行兩稅課納有時貪暴無所容姦二十年間府庫充牣但定稅之初錢輕貨重故陛下以錢為稅今錢重貨輕若更有稅名以就其輕其利有六吏絶其姦一也人用不擾二也靜而獲利三也用不乏錢四也不勞而易知五也農桑自勸六也百姓本出布帛而稅反配錢至輸時復取布帛更為三估計折州縣升降成姦若直定布帛無估可折蓋以錢為稅則人力竭而有司不之覺今兩稅出於農人農人所有唯布帛而已用布帛處多用錢處少又有鼓鑄以助國計何必取於農人哉疏入亦不報東萊呂氏曰賦役之制自禹貢始可見禹貢既定九州之田賦以九州之土地為九州之土貢説者以謂有九州之土貢然後以田賦之當供者市易所貢之物考之於經蓋自有證何者甸服百里賦納總至於五百里米自五百里之外其餘四服米不運之京師必以所當輸者上貢於天子以此知當時貢賦一事所以冀州在王畿甸服之內全不敘土貢正緣已輸粟米以此相參考亦自有證蓋當時寓兵於農所謂貢賦不過郊廟賔客之奉都無養兵之費故取之於畿甸而足自大略而言之三代皆沿此制夏后氏五十而貢商人七十而助周人百畝而徹三代之賦略相當周官所載九畿之貢而已九州之貢所謂食者半或三之一或四之一或以半輸王府或以三之一輸王府或以四之一輸王府所謂土貢未必能當貢賦之半留之於諸侯之國以待王室之用皆是三代經常之法所謂弼成五服至於五千州十有二師説者以為二千五百人為師亦是一時權時之役所謂經常之役用民之力歲不過三日豳詩所謂我稼既同上入執宫功皆是經常之役法如此用兵軍役寓之井賦乘馬之法無事則為農有事則征役至漢有所謂材官踐更過更卒更三等之制當時有干戈之征及至魏晉有戶調之名凡有戶者出布帛有田者出租賦後魏亦謂之戶調在後魏以一夫一婦出帛一匹在北齊則有一牀半牀之制已娶者則一牀未娶者則半牀當時有戶調之名然役法尚存古制但至南北朝增三代之三日至於四十五日自漢至南北朝其賦役之法如此至唐高祖立租庸調之法承襲三代漢魏南北之制雖或重或輕要之規摹尚不失舊德宗時楊炎為相以戶籍隱漏徴求煩多變而為兩稅之法兩稅之法既立三代之制皆不復見然而兩稅在德宗一時之間雖號為整辦然取大歷中科徭最多以為數雖曰自所稅之外並不取之於民其後如間架如借商如除陌取於民者不一楊炎所以為千古之罪人大抵田制雖商鞅亂之於戰國而租稅猶有歷代之典制惟兩稅之法立古制然後掃地要得復古田制不定縱得薄斂如漢文帝之復田租荀悅論豪民收民之資惟能惠有田之民不能惠無田之民田制不定雖欲復古其道無由兵制不復古民既出稅賦又出養兵之費上之人雖欲權減兵又不可不養兵制不定此意亦無由而成要之寓兵於農賦役方始定按自秦廢井田之制隳什一之法任民所耕不計多少於是始舍地而稅人征賦二十倍於古漢高祖始理田租十五而稅一其後遂至三十而稅一皆是度田而稅之然漢時亦有稅人之法按漢高祖四年初為算賦注民十五以上至六十五出賦錢人百二十為一算七歲至十五出口賦人錢二十此每歲所出也然至文帝時即令丁男三歲而一事賦四十則是算賦減其三之二且三歲方徴一次則成丁者一歲所賦不過十三錢有竒其賦甚輕至昭宣帝以後又時有減免蓋漢時官未嘗有授田限田之法是以豪強田連阡陌而貧弱無置錐之地故田稅隨占田多寡為之厚薄而人稅則無分貧富然所稅每歲不過十三錢有竒耳至魏武初平袁紹乃令田每畝輸粟四升又每戶輸絹二匹綿二斤則戶口之賦始重矣晉武帝又增而為絹三匹綿三斤其賦益重然晉制男子一人占田七十畝女子及丁男丁女占田皆有差則出此戶賦者亦皆有田之人非鑿空而稅之宜其重於漢也自是相承戶稅皆重然至元魏而均田之法大行齊周隋唐因之賦稅沿革微有不同史文簡略不能詳知然大槩計畝而稅之令少計戶而稅之令多然其時戶戶授田則雖不必履畝論稅只逐戶賦之則田稅在其中矣至唐始分為租庸調田則出粟稻為租身與戶則出絹布綾綿諸物為庸調然口分世業每人為田一頃則亦不殊元魏以來之法而所謂租庸調者皆此受田一頃之人所出也中葉以後法制隳弛田畝之在人者不能禁其賣易官授田之法盡廢則向之所謂輸庸調者多無田之人矣乃欲按籍而徴之令其與豪富兼并者一例出賦可乎又况遭安史之亂丁口流離轉徙版籍徒有空文豈堪按以為額蓋當大亂之後人口死徙虛耗豈復承平之舊其不可轉移失陷者獨田畝耳然則視大歷十四年墾田之數以定兩稅之法雖非經國之遠圖乃救弊之良法也但立法之初不任土所宜輸其所有乃計綾帛而輸錢既而物價愈下所納愈多遂至輸一者過二重為民困此乃掊刻之吏所為非法之不善也陸宣公與齊抗所言固為切當然必欲復租庸調之法必先復口分世業之法均天下之田使貧富等而後可若不能均田則兩稅乃不可易之法矣又歷代口賦皆視丁中以為厚薄然人之貧富不齊由來久矣今有幼未成丁而承襲世資家纍千金者乃薄賦之又有年齒已壯而身居窮約家無置錐者乃厚賦之豈不背繆今兩稅之法人無丁中以貧富為差尤為的當宣公所謂計估算緡失平長偽挾輕費轉徙者脫徭稅敦本業不遷者困斂求乃誘之為姦毆之避役此亦是有司奉行者不明不公之過非法之弊蓋力田務本與商賈逐末皆足以致富雖曰逐末者易於脫免務本者困於徴求然所困猶富人也不猶愈於庸調之法不變不問貧富而一概按元籍徴之乎蓋賦稅必視田畝乃古今不可易之法三代之貢助徹亦只視田而賦之未嘗别有戶口之賦蓋雖授人以田而未嘗别有戶賦者三代也不授人以田而輕其戶賦者兩漢也因授田之名而重其戶賦田之授否不常而賦之重者已不可復輕遂至重為民病則自魏至唐之中葉是也自兩稅之法行而此弊革矣豈可以其出於楊炎而少之乎又按古今戶口之數三代以前姑勿論史所載西漢極盛之數為孝平元始二年人戶千一百二十三萬三千東漢極盛之時為桓帝永壽三年戶千六十七萬七千九百六十此通典所載之數據東漢書郡國志計戶一千六百七萬九百六則多通典五百八十三萬有竒是又盛於前漢矣三國鼎峙之時合其戶數不能滿百二十萬昔人以為才及盛漢時南陽汝南兩郡之數蓋戰爭分裂戶口虛耗十不存一固宜其然然晉太康時九州攸同不可謂非承平時矣而為戶只二百四十五萬九千八百自是而南北分裂運祚短促者固難稽據姑指其極盛者計之則宋文帝元嘉以後戶九十萬六千八百有竒魏孝文遷洛之後只五百餘萬則混南北言之才六百萬隋混一之後至大業二年戶八百九十萬七千有竒唐天寶之初戶八百三十四萬八千有竒隋唐土地不殊兩漢而戶口極盛之時才及其三之二何也蓋兩漢時戶賦輕故當時郡國所上戶口版籍其數必實自魏晉以來戶口之賦頓重則版籍容有隱漏不實固其勢也南北分裂之時版籍尤為不明或稱僑寄或冒勳閥或以三五十戶為一戶茍避科役是以戶數彌少隋唐混一之後生齒宜日富休養生息莫如開皇貞觀之間考核之詳莫如天寶而戶數終不能大盛且天寶十四載所上戶總八百九十一萬四千七百九而不課戶至有三百五十六萬五千五百夫不課者鰥寡廢疾奴婢及品官有蔭者皆是也然天下戶口豈容鰥寡廢疾品官居其三之一有竒乎是必有説矣然則以戶口定賦非特不能均貧富而適以長姦偽矣又按漢元始時定墾田八百二十七萬五千三十六頃計每戶合得田六十七畝百四十六步有竒隋開皇時墾田千九百四十萬四千二百六十七頃計每戶合得田二頃有餘夫均此宇宙也田日加於前戶日削於舊何也蓋一定而不可易者田也是以亂離之後容有荒蕪而頃畝猶在可損可益者戶也是以虛耗之餘並緣為弊而版籍難憑杜氏通典以為我國家自武德初至天寶末凡百三十八年可以比崇漢室而人戶才比於隋氏蓋有司不以經國馭遠為意法令不行所在隱漏之甚其説是矣然不知庸調之征愈增則戶口之數愈滅乃魏晉以來之通病不特唐為然也漢之時戶口之賦本輕至孝宣時又行蠲減且令流徙者復其賦故膠東相王成遂偽上流民自占者八萬餘口以徼顯賞若如魏晉以後之戶賦則一郡豈敢偽占八萬口以貽無窮之逋負乎陸宣公又言先王制賦入必以丁夫為本無求於力分之外無貸於力分之內故不以務穯增其稅不以輟稼減其租則播種多不以殖産厚其征不以流寓免其調則地著固不以飾勵重其役不以窳怠蠲其庸則功力勤如是故人安其居盡其力此雖名言然物之不齊物之情也均是人也而才藝有智愚之不同均營生也而時運有屯亨之或異蓋有起窮約而能自致千金其餘力且足以及他人者亦有蒙故業而不能保一簪一身猶以為纍者雖聖人不能比而同之也然則以田定賦以家之厚薄為科斂之輕重雖非盛世事而救時之策不容不然未宜遽非也貞元三年時歲事豐稔上因畋入民趙光竒家問百姓樂乎對曰不樂上曰時豐何故不樂對曰詔令不信前云兩稅之外悉無他徭今非稅而誅求者殆過於稅詔書優恤徒空文耳憲宗末年度支鹽鐵與諸道貢獻尤甚有助軍及平賊賀禮上尊號賀物穆宗即位一切罷之兩稅外加率一錢以枉法贓論然務姑息賞賜諸軍不可勝紀用不能節自建中定兩稅而物輕錢重民以為患至穆宗時四十年當時為絹二匹半者為八匹大率加三倍豪家大商積錢以逐輕重故農人日困末業日增帝亦以貨輕錢重民困而用不充詔百官議革其弊議者多請重挾銅之律戶部尚書楊於陵言大歷以前淄青太原魏博雜鉛鐵以通時用嶺南雜以金銀丹砂象齒今一用泉貨故錢不足今宜使天下兩稅榷酒鹽利上供及留州送使錢悉輸以布帛穀粟則人寬於所求然後出內府之積收市㕓之滯廣山鑄之數限邊裔之出禁私家之積則貨日重而錢日輕矣宰相善其議由是兩稅上供留州皆易以布帛絲纊租庸課調不計錢而納布帛惟鹽酒本以𣙜率計錢與兩稅異不可去錢時貨輕錢重與留州送使所在長吏又降省估使就實估以自封殖而重賦於人裴垍為相奏請天下留州送使物一切令就省估其所在觀察使仍以其所蒞之郡租賦自給若不足方許徴於支郡其諸州送使額變為上供故疲人稍息肩會昌元年敕今後州縣所徴科斛斗一切依額為定不得隨年檢責數外如有荒間陂澤山原百姓有人力能墾闢耕種州縣不得輒問所收苖子五年不在稅限五年之外依例納稅於一鄉之中先填貧戶欠闕如無欠闕則均減衆戶合徴斛斗但令不失元額不得隨田加率仍委本道觀察使每年收成之時具管內墾田頃畝及合徴科斗數分析聞奏數外有剩納人戶斛斗刺史以下重加懲貶大中二年制諸州府縣等納稅祗合先差優長戶車牛近者多是權要富豪悉請留縣輸納致使貧單之人却須雇腳搬載今後其留縣並須先饒貧下不支濟戶如有違越官吏重加科殿四年制百姓兩稅之外不許分外更有差率委御史臺糾察其所徴兩稅匹假等物並留州留使錢物納匹假虛實估價及見錢從前皆有定制如聞近日或有於虛估匹假數內實徴估物及其間分數亦不盡依敕條宜委長吏郡守如有違越必議科懲又青苖兩稅本繫田土地既屬人稅合隨去從前赦令纍有申明豪富之家尚不恭守以後州縣覺察如有此比須議痛懲地勒還主不理價直按兩稅不徴粟帛而徴錢吏得為姦以病民穆宗時嘗復舊制徴粟帛矣今復有此令豈又嘗變易邪計貨徴錢必有估直而估乃有虛實之異舞文如此今禁其於定制外多科固不若仍復粟帛之徴則自不能多求於定數之外也昭宗末諸道多不上供惟山南東道節度使趙匡凝與其弟荆南留後匡明委輸不絶詳見國用門光啓三年張全義為河南尹初東都經黃巢之亂遺民聚為三城以相保繼以秦宗權孫儒殘暴僅存壞垣而已全義初至白骨蔽地荆棘彌望居民不滿百戶全義麾下才百餘人乃於麾下選可使者十八人命曰屯將人給一旗一榜於舊十八縣中令招農戶自耕種流民漸歸又選可使者十八人命曰屯副民之來者綏撫之除殺人者死餘但加杖無重刑無租稅歸者漸衆又選諳書計者十八人命曰屯判官不一二年每屯戶至數千於農隙選壯者教之戰陳以禦冦盜關市之賦逮於無籍刑寬事簡遠近趨之如市五年之後諸縣戶口率皆歸復桑麻蔚然野無曠土其勝兵大縣至七千人小縣不減二千人乃奏置令佐以治之全義明察人不能欺為政寬簡出見田疇美者輒下馬與僚佐共觀之召田主勞以酒食有蠶麥善收者或親至其家悉呼出老幼賜以茶綵衣物民間言張公不喜聲伎見之未嘗笑獨見佳麥良繭則笑耳有田荒穢者則集衆杖之或訴以乏人牛則召鄰里責之曰彼誠乏人牛何不助之由是鄰里有無相助比戶有積蓄在洛四十年遂成富庶按唐末盜賊之亂振古所未有洛陽四戰之地受禍尤酷全義本出群盜乃能勸農力本生聚教誨使荒墟為富實觀其規畫雖五季之君號為有志於民者所不如也賢哉後唐莊宗即位推恩天下除百姓田租放諸場務課利欠負者而租庸使孔謙悉違詔督理更制括田竿尺盡率州使公廨錢天下怨苦民多流亡租稅日少容齋洪氏隨筆曰朱梁之惡最為歐陽公五代史記所斥詈然輕賦一事舊史取之而新書不為拈出其語云梁祖之開國也屬黃巢大亂之餘以夷門一鎮外嚴𤇺候內辟汙萊厲以耕桑薄其租賦士雖苦戰民則樂輸二紀之間俄成霸業及末帝與莊宗對壘於河上河南之民雖困於輦運亦未至流亡其義無他蓋賦斂輕而邱園可戀也及莊宗平定梁室任吏人孔謙為租庸使峻法以剝下厚斂以奉上民産雖竭軍食尚虧加以兵革因以飢饉不三四年以致顚隕其義無他蓋賦役重而寰區失望故也豫以事考之此論誠然有國家者之龜鑑也資治通鑑亦不載此一節吳徐知誥為淮南帥以宋齊邱為謀主先是吳有丁口錢又計畝輸錢民甚病之齊邱以為錢非耕桑所得使民輸錢是教之棄本逐末也請蠲人口錢自餘稅悉收穀帛紬絹匹直千錢者稅三十知誥從之由是曠土盡闢國以富強容齋洪氏隨筆曰自用兵以來民間以見錢紐納稅直既為不堪然於其中所謂和買折帛尤為名不正而斂最重偶閲大中祥符間太常博士許載著吳唐拾遺録所載多諸書未有者其勸農桑一篇正云吳順義年中差官興販簿定租稅厥田上上者每一頃稅錢二貫一百文中田一頃稅錢一貫八百下田一頃千五百皆足陌見錢如見錢不足許依市價折以金銀並計丁口課調亦科錢宋齊邱時為員外郎上策乞虛擡時價而折紬絹綿本色曰江淮之地唐季以來戰爭之所今兵革乍息黎氓始安而必率以見錢折以金銀此非民耕鑿可得也必興販以求之是為教民棄本逐末耳是時絹每匹市價五百文紬六百文綿每兩十五文齊邱請絹每匹擡為一貫七百紬為二貫四百綿為四十文皆足錢丁口課調亦請蠲除朝議喧然沮之謂虧損官錢萬數不少齊邱致書於徐知誥曰明公總百官理大國督民見錢與金銀求國富庶所謂擁篲救火撓水求清欲火減水清可得乎知誥得書曰此勸農上策也即行之自是不十年間野無間田桑無隙地自吳變唐自唐歸宋民到於今受其賜齊邱之事美矣徐知誥亟聽而行之可謂賢輔相而九國志齊邱傳中略不書資治通鑑亦佚此事今之君子為國唯知浚民以益利豈不有􅌤於偏閏之臣乎同光三年敕魏府小菉豆稅每畝減收三升城內店宅園圃比來無稅頃因偽命遂有配征後來以所徴物色添助軍裝衣賜將令通濟宜示矜蠲令據緊慢去處於見輸稅絲上每兩作三等酌量納錢貴與充本回圖收市軍裝衣賜其絲永與除放吏部尚書李琪上疏曰臣聞古人有言穀者人之司命地者穀之所生人者君之所理有其穀則國力備定其地則人食足察其人則徭役均如此三者為國之急務也軒黃以前不可詳記自堯堙洪水禹作司空於是辨九等之田收什一之稅其時戶口一千三百餘萬定墾田約九百二十萬頃為太平之盛及殷革夏命重立田制每私田十畝種公田一畝水旱同之亦什一之義也洎周室立井田之法大約百里之國提封萬井出車千乘戎馬四千匹畿內兵車萬乘馬四萬匹以田法論之亦什一之制也故當成康之時比堯舜之朝戶口更增二十餘萬非他術也蓋三代之前皆量入以為出計農以立軍雖逢水旱之災而有凶荒之備降及秦漢重稅工商急關市之征倍舟車之算人口既以減耗古制猶復兼行按此時戶口尚有一千二百餘萬墾土亦一千八百萬餘頃至乎三國並興兩晉之後則農夫少於軍衆戰馬多於耕牛供軍須奪於農糧秣馬必侵於牛草於是天下戶口秪有二百四十餘萬洎隋文之代與漢比崇及煬帝之年又三分去二唐太宗文皇帝以四夷初定百姓未豐延訪羣臣各陳所見惟魏徴獨勸文皇力行王道由是輕徭薄賦不奪農時進賢良悅忠直天下粟斗直兩錢自貞觀至於開元將及九百萬户五千三百萬口墾田一千四百萬頃比之近古又多增加是知救人瘼者必重斂為病源料兵食者以惠能為軍政仲尼云百姓足君孰與不足臣之此言是魏徴所以勸文皇也伏惟深留宸鑒如以六軍方闕未可輕徭兩稅之餘猶須重斂則但不以折納為事一切以本色輸官又不以細配為名止以正稅加納則天下幸甚敕本朝徴科唯有兩稅至於折納比不施為宜依李琪所論應逐稅合納錢物斛斗及鹽錢等宜令租庸司指揮並準元徴本色輸納不得改更若合有移改即須具事由聞奏按同光三年是為莊宗既滅梁蜀之後驕侈自恣賞賚無節倉廩空虛軍民咨怨孔謙復行尅剝之政民力重困而國用不支將以危亡之時也然則琪言雖美詔敕雖再祗虛文耳以此疏敘述歷代勸農寬征生聚之事辭簡而義備故録之明年以軍食不足敕河南尹預借夏秋稅民不聊生明宗天成元年赦節文應納夏秋稅子先有省耗每斗一升今後祗納正稅數不量省耗二年敕率土黎氓並輸王稅逐年生計祗在春時深虞所在之方無知之輩不自增修産業輒便攪擾鄉鄰既撓公門須嚴定制自今後凡關論認桑土二月一日後州縣不得受狀十月務開方許論對準格據理斷割三年敕應三京鄴都諸道州府縣村人戶自今年七月後於夏秋田苖上每畝納麴錢五文足陌長興二年人戶每田畝納農器錢一文五分四年五月五日戶部奏三京鄴都諸道州府逐年所徴夏秋稅租兼鹽麴折徴諸般錢穀等起徴條流如後四十七處節候常早大小麥􅜿麥豌豆五月十五日起徴八月一日納足正稅匹帛錢鞋地頭㰌麴蠶鹽及諸色折科六月五日起徴至八月二十日納足河南府華州耀陜絳鄭孟懷陳齊棣延兖沂徐宿汝申安滑濮澶襄均房雍許邢洺磁唐隋郢蔡同鄆魏汴潁復鄜宋亳蒲等州二十三處節候差晚隨本處與立兩等期限一十六處校晚大小麥􅜿麥豌豆六月一日起徴至八月十五日納足正稅匹帛錢鞋地頭㰌麴蠶鹽及諸色折科六月十日起徴至八月二十五日納足幽定鎮滄晉隰慈密青鄧淄萊邠寧慶衍七處節候尤晚大小麥豌豆六月十日起徴至九月納足正稅匹帛錢鞋地㰌麴錢等六月二十日起徴九月納足并潞澤應威塞軍大同軍振武軍其月勑百姓今年夏苖委人戶自供通手狀其頃畝多少五家為保委無隱漏攢連狀送本州具帳送省州縣不得差人檢括如人隱欺許令陳告其田並令倍徴長興二年六月勑委諸道觀察使屬縣於每村定有力人戶充村長與村人議有力人戶出剩田苖補貧下不追頃畝自首者即據狀徴收有詞者即排假檢括自今年起為定額有經災沴及逐年逋處不在此限三年十二月三司奏諸道上供稅物充兵士衣賜不足其天下所納斛斗及錢除支贍外請依時估折納綾羅絹帛從之長興九年勑天下州府受納稈草每束約一文足一百束納枸子四莖充積年供使棗針一莖充稕場院其草并柴蒿一束其納絹絁布綾羅每匹納錢十二文足絲綿紬線麻皮等每一十兩納耗半兩鞋每量納錢一文足見錢每貫納七文足省庫收納上件錢物元條流見錢每貫納二文足絲綿納子每一百兩納耗一兩其諸色匹假並無加耗二年敕今後諸州府所納稈草每二十束别納加耗一束充場司耗折潞王清泰元年劉昫命判官鉤考窮核積年逋欠之數姦吏利其徴責丐取故存之昫具奏其狀且請察其可徴者急督之必無可償者悉蠲之韓昭允極言其便乃詔長興以前戶部及諸道逋租三百三十八萬虛煩簿籍咸蠲免勿徴貧民大悅而三司悉怨之致堂胡氏曰胥吏利於督租固小人常情也長民者士大夫也不恤百姓而以胥吏所利者為生財之術無窮之源則於胥吏何責焉前代著令曰凡言放稅者不得過四分每有水旱許訴災傷或下赦令盡蠲之而有司徴督如故農氓不諭乃有黃紙放白紙催之謡蓋不知令甲之文也是則赦令行一時之恩以收人心令甲著永久之制恐失財賦隂行虐政陽行惠澤豈先王之用心哉三司吏不肯釋除逋負非獨其利在焉亦以在上之意吝於與而嚴於取也此百姓膏肓之病也明宗能蠲二百萬緡潞王能蠲三百萬石豈非衰亂之時盛德之事哉文獻通考卷三
