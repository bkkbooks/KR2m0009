有而纂輯已備者則更不贅録云又按禮經言郊報天而主日配以月然則周之郊以后稷配天之外從祀惟日月而已明堂則鄭氏注謂所祀者五方五帝及五人帝五官配以文王武王而已不祀他神也自秦漢以來郊禮從祀之神漸多晉太興中賀循言郊壇之上尊卑雜位千五百神唐圜丘壇位上帝配帝以及從祀通計七百餘座然圜丘所祀者昊天則從祀者天神而已於地祗人鬼無預也自漢末始有合祭天地之禮魏晉以來則圜丘方澤之祀未嘗相溷宋承五代之弊政一番郊祀賞賚繁重國力不給於是親祠之禮不容數舉遂以后土合祭於圜丘而海嶽鎮瀆山川邱陵原隰墳衍皆在從祀之列於是祭天從祀始及地祗矣至仁宗皇祐二年大享明堂蓋以親郊之嵗移其祀於明堂而其禮則合祭天地並祀百神蓋雖祀於明堂而所行實郊禮也然既曰明堂則當如鄭氏之注及歷代所行故以太昊炎帝黃帝少昊顓頊五人帝勾芒祝融后土蓐收元冥五官神侑祀五帝於是祭天從祀又及人鬼矣中興以來國勢偏安三嵗親祀多遵皇祐明堂之禮然觀儀注所具神位殿上正配四位東朵殿自青帝至南嶽十三位西朵殿自白帝至北嶽十二位東廊自北斗至北隰二百有八位西廊自帝座至哭星一百七十五位又有衆星一百五十八位共五百七十位則比晉賀循所言才三之一唐圜丘所祀三之二耳然晉唐未嘗雜祀地祗人鬼而位數反多此則以圜丘方澤明堂所祀合為一祠自五帝五官海嶽以至於原隰而位數反少殆不可曉然晉史唐史但能言從祀之總數而不及其名位之詳故無由參稽互考而不知其纎悉也姑志於此以俟博聞者共訂焉文獻通考卷七十五
