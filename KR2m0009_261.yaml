body:
  text: 文獻通考卷二百六十一鄱陽馬端臨貴與著封建考二周封建之制王制千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯屬連卒州猶聚也伯帥正亦長也凡長皆因賢侯為之殷之州長曰伯虞夏及周皆曰牧八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯老謂上公周禮曰九命作伯天子使其大夫為三監監於方伯之國國三人使佐方伯領諸侯羊客問子思曰周自后稷封為王者後子孫據國至太王王季文王此固世為諸侯矣焉得為西伯乎子思曰吾聞諸子夏古之帝王中分天下使二公治之謂之二伯殷王帝乙之時王季以功九命作伯受圭瓉秬鬯之賜故文王因之得專征伐此以諸侯為伯猶周召之君為伯也公羊傳子曰自陜而東者周公主之自陜而西者召公主之一相處乎內周成王使召康公命齊太公曰五侯九伯汝實征之以夾輔周室五等之侯九州之伯皆得征討其罪齊桓因此命以夸楚周襄王命尹氏及王子虎內史叔興策命晉侯重耳為侯伯左傳僖公二十八年陳氏禮書曰古之官有常名有異名內而為比長閭師黨正州長鄉大夫此常名也及任以師田之事則為軍將師帥旅帥卒長兩司馬公司馬此異名也外而為公侯伯子男此常名也及寓以連屬之法則為屬長連帥卒正州伯此異名也屬則繫其人連則結其衆以其民之衆足以禦卒然之變故謂之卒以其地之廣有逹於重川之逺故謂之州屬有長則足以長五國而已未足以率十國之衆故連有帥帥足以帥十國而已未足以率三十國之衆故卒有正正足以正三十國而已未足以長二百一十國故州有伯則為人長者才也帥人者智也正人者義也長人者仁也易曰體仁足以長人則外之八伯內之二伯皆以其能體仁故也蓋王者有分土無分民建萬國所以分其土親諸侯所以合其人不分其土則其守不專不合其人則其勢不一王制言凡九州千七百七十三國分其土也繼之以方伯連帥之法合其人也周官大司馬比小事大以和邦國職方氏凡邦國大小相維者此也古者什伍之法於州鄉則聨其民於師田則聨其徒於宿衛則聨其官故能以中國為一人而無內患為屬連卒州以聨其國為長帥正伯以聨其人故能以天下為一家而無外虞然不惟其官惟其人則法行而事舉詩曰四國有王郇伯勞之是也非其人則法雖存而事廢詩序曰衛侯不能修方伯連帥之職公羊傳曰下無賢方伯是也方伯連帥之職周道故書與周禮伯皆稱牧者蓋自內言之則屈於二伯故稱牧周官大宗伯八命作牧曲禮九州之長入天子之國曰牧是也自外言之則伸於諸侯故稱伯王制謂方伯之國是也虞十二州則十二牧夏九牧左氏夏之方有德也貢金九牧周九州則九伯而王制言八州八伯則王畿之內不建伯焉鄭氏以為商制是也然州牧伯之名見於經傳多矣連帥特見於詩序若夫五國之屬於經無聞左傳曰晉侯享公請屬鄫豈周所為連屬歟公羊傳曰自陜以東周公主之書曰畢公率東方諸侯入應門右太保率西方諸侯入應門左此所謂九命作伯者也與商所謂天子之老二人一矣周有九伯則畿內蓋亦設牧而太宰言施典於邦國設其牧者以牧之所設主為邦國故也康成釋詩謂周之制使伯佐牧蓋以傳所謂五侯者五牧也九伯者佐侯之伯也孔頴逹申之以為一牧之下二伯然質之於商州伯之下無二佐則周州牧之下無二伯右牧伯之制周禮上公九命為伯其國家宫室車旗衣服禮儀皆以九為節城方九里宮方九百步執桓圭九寸繅藉九寸以五采韋衣奠玉以藉之冕服九章自山龍以下建常九斿斿其屬幓垂者也樊纓九就樊纓馬飾以罽飾之每一處五采備為一就二車九乘介九人二副也介輔已行禮者也禮九牢三牲備為一牢其朝位賔主之間九十步立當車軹立於車轂之末謂之軹王行四十五步以迎賔賓行四十五步以朝王擯者五人廟中將幣三享王禮再祼而酢朝畢則有廟享之禮享必將幣束加於璧饗禮九獻食禮九舉出入五積禾米芻薪之費三問三勞公之服自衮冕而下如王之服王十二旒上公龍衮前後皆九旒侯伯七命其國家宫室車旗衣服禮儀皆以七為節城方七里宮方七百步侯執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就二車七乘介七人禮七牢朝位賔主之間七十步立當前疾謂駟馬車轅前胡下柱地者擯者四人廟中將幣三享王禮一祼而酢饗禮七獻食禮七舉出入四積再問再勞諸伯執躬圭其他皆如諸侯之禮侯伯之服自鷩冕而下如公之服三公八旒侯伯七旒子男五命其國家宮室衣服禮儀皆以五為節城方五里宫方五百步諸子執穀璧五寸繅藉五寸冕服五章建常五斿樊纓五就二車五乘介五人禮五牢朝位賔主之間五十步立當車衡擯者三人廟中將幣三享王禮一祼不酢再祼者王既拜送爵又設酌璋瓉而祼后又拜送爵是謂再祼賔乃酢王也禮侯伯一祼而酢者祼賔賔酢王而已后不祼也禮子男一祼不酢者祼賔而已不酢王也饗禮五獻食禮五舉出入三積一問一勞諸男執蒲璧其他皆如諸子之禮子男之服自毳冕而下如侯伯之服王之孤及卿前後各六旒子男五旒王制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命卷讀作衮三公八命矣復加一命則服龍衮與王者之後同若有加則賜也者謂九命衮龍之外依制不合有其服若有加益則是君之特賜非禮法之常也虞夏之制天子服有日月星辰周禮曰諸公之服自衮冕而下如王之服右諸侯命服之制大國三軍三萬七千五百人次國二軍二萬五千人小國一軍萬二千五百人陳氏禮書曰周官大司馬主六軍大國三軍次國二軍小國一軍春秋傳曰成國不過半天子之軍諸侯之大者三軍可也然軍之多寡係地之廣狹而公侯之田皆百里則皆三軍矣魯於周為侯而地方百里頌稱公徒三萬此大國三軍之數也春秋襄十一年作三軍昭五年舍中軍則魯之三軍蓋嘗變於僖公之後至襄而復作至昭而又舍也左氏曰季武子作三軍三分公室而各有其一杜預曰魯本無中軍惟上下二軍皆屬於公有事三卿更帥以征伐季氏欲專其民人故假立中軍公羊曰三軍者何三卿也何譏爾古者上卿下卿上士下士何休曰襄公委任強臣乃益司馬作中卿官踰王制故譏之穀梁曰古者天子六師諸侯一軍作三軍非正也啖氏曰天子六軍大國三之一小國半大國數不必常所以示稱國語曰季武子為三軍叔孫穆子曰不可今我小侯也處大國之間繕貢賦以共從者猶懼有討若為元侯之所以怒大國無乃不可乎弗從遂作中軍自是齊楚伐討魯襄昭皆如楚由此觀之魯於春秋之時尊事齊楚為不暇則其國次國而已不宜復作三軍作三軍非正也故春秋書作以譏之作猶作僖公主之類也及舍中軍以起於禮又書以正之公羊曰舍中軍復古也穀梁曰復正也其説是也然穀梁言天子六師諸侯一軍啖氏言天子六軍大國三之一小國半大國其制與周禮不合是臆説耳春秋時王命曲沃伯以一軍為晉侯莊十六年其後晉作三行以增上中下而當六軍則世衰禮廢大夫僭諸侯諸侯僭天子不足怪也又曰春秋傳曰列國一同明堂位曰魯革車千乘坊記曰制國不過千乘語曰道千乘之國蓋諸侯地不過百里車不過千乘以開方之法計之方十里者為方一里者百方百里者為方一里者萬方一里者百其賦十乘方一里者萬則其賦千乘然賦雖至於千乘而兵不過三軍三軍五百乘而已則五百乘三鄉之所出也千乘闔境之所出也何則鄉萬二千五百家合三鄉則三萬七千五百家凡起徒役無過家一人則三軍為三萬七千五百人矣司馬法兵車一乘甲士三人步卒七十二人合七十五人則一卒所餘在後車矣後卒復以五十人合二十五人為一車二卒則所餘五十人又在後車矣凡三卒而車四乘三旅而車二十乘三師而車百乘三軍而車五百乘由此推之天子六軍則車千乘矣此車人參兩以相聨糾之法也詩曰公車千乘又曰公徒三萬則千乘之賦豈特三軍而已哉鄭氏據司馬法井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人十成為終終千井三千家革車十乘士百人徒二百人十終為同同萬井三萬家革車百乘士千人徒二千人率十家出一人之役百家出十人之役賈公彥遂以此為畿內之法以甸出長轂一乘甲士三人步卒七十二人為邦國之法然周官之於調役其寡也家出一人其多也起餘子與竭作未聞十家出一人之役百家出十人之役也賈公彥言出軍之法先六鄉次六遂次公邑都鄙乃徵兵於諸侯不止則諸侯闔境出焉所謂千乘之賦也然先王之於天下大則有方伯小則有連帥其待卒應變如身之使臂臂之使指各適其事之逺近而已方伯連帥所不能克然後鄉遂之士應之周官曰王之大事諸侯左傳曰五侯九伯汝實征之又曰諸侯敵王所愾則出軍之法顧豈先虛其內以實其外哉馬融曰千乘之賦其地千成居地方三百一十六里有竒惟公侯之封乃能容之蓋惑周禮公五百里侯四百里之制不知周禮之所言者乃附庸也右諸侯立軍之制王制大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人三卿依周制而言謂立司徒兼冢宰之事立司馬兼宗伯之事立司空兼司寇之事左傳云季孫為司徒叔孫為司馬孟孫為司空是三卿也鄭注言小國亦三卿差次而言應一卿命於天子二卿命於其君此惟言二卿則似誤也大國之卿不過三命下卿再命小國之卿與下大夫一命不著次國之卿者以大國之下互明之以大國卿三命則知次國之卿不過再命大國下卿再命則知次國下卿一命是故云互明之諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿次國之卿三大夫祿君十卿祿小國之卿倍大夫祿君十卿祿解見職田門次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫其有中士下士者數各居其上之三分永嘉徐氏曰先王量祿以分田視口以計食其品節差等上焉不至於過制下焉不至於不足諸侯下士享百畝之利茍足以代耕免勞苦而已雖不能有餘亦不至不足其餘自卿以下其祿各殺一則無多邑踰制之失諸侯分田雖多祿入自有定數亦無尾大不掉之患此先王制祿之美意也且先王分土以封諸侯固宜盡得其地以享侯國之富今乃山澤之所有則歸之公間田之所有則歸之公侯國之祿餘又待用於天子而不敢私諸侯所得自十卿祿之外而無有覬心防間若過嚴矣然君十卿祿乃君之所自得者耳而侯國之公用則取諸地入以給之其山澤間田雖歸之公上領於王官而實藏富於天下又封建之美意也春秋以來諸侯土地各有財賦皆足以用其民而戰其力其山澤之賦列國亦自擅而有之無復君十卿祿之制而於卿大夫祿地多踰古制一時諸侯皆任已意以行私賞故多強宗大族為國生患晉惠公一入國遽許里克以汾陽之田百萬丕鄭以負葵之田七十萬此豈常典也哉在齊威時伯氏亦有駢邑三百在魯成公時施氏之宰有百室之邑其他國可見矣後如鄭賞入陳之功子産以上卿受八邑三十二井為邑井九百畝推而計之視古時卿四大夫祿之制己大相遼絶矣宋之盟公與左師邑六十子罕削而投之齊慶父之變公與晏子邑六十晏子辭而復之此惟懼其足以召患故卻而不受有如先王之制不暇論矣衛免餘言於衛曰唯卿備百邑晉叔向賦秦楚公子之祿皆百人之餼一卒百人其祿足百人此皆徇春秋之亂法非王法也右諸侯建官之制周官六年五服一朝又六年王乃時巡考制度於四嶽諸侯各朝於方嶽大明黜陟大行人邦畿方千里其外方五百里謂之侯服歲一見其貢祀物又其外方五百里謂之甸服二歲一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四歲一見其貢服物又其外方五百里謂之衛服五歲一見其貢材物又其外方五百里謂之要服六歲一見其貢貨物九州之外謂之蕃國世一見各以其所貴寶為贄王之所以撫邦國諸侯者歲遍存三歲遍眺五嵗遍省存眺省者王使臣於諸侯之禮七嵗屬象胥諭言語協辭命九嵗屬瞽史諭書名聽聲音十有一嵗達瑞節同度量成牢禮同數器修法則十有二嵗王巡守殷國三山林氏曰周官言六年五服一朝大行人言侯服嵗一見至要服而後六年一朝與此經不合唐孔氏雖引嵗聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明為與此經相當然左氏之言是三年一朝六年一會十二年一盟計十二年之中諸侯之朝不止於二此則十二年止於二朝然後王巡守亦不得為相當唐孔氏又以大行人所云見者皆言貢物或可因貢而見何必皆是君自朝乎按周官朝覲宗遇會同皆其君自行故皆言見至於問與視則其臣故曰時聘殷眺而已不言見也以見為遣使亦非周官之夲意然此篇所載六卿與周禮同而惟六年五服一朝一句與周禮異當闕之以俟知者春朝而圗天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時會以發四方之禁殷同以施天下之政此六事者以王見諸侯為文言六服以其朝嵗四時分來更迭如此而遍時會者無常期蓋諸侯有不順服者王將有征討之事則合諸侯而發禁事焉禁謂九伐之法殷同即殷見也王十二嵗不巡守則殷同殷同者乃六服盡朝既朝乃合諸侯而命其政時聘以結諸侯之好殷眺以除邦國之慝此二事以王見諸侯之臣使來者為文時聘亦無常期殷眺謂一服朝之歲也一服朝之嵗五服諸侯皆使其卿以聘禮來眺天子以禮見之命以政禁之事所以除其惡行間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之災此四者王使臣於諸侯之禮也間問者間嵗一問諸侯謂存省之屬致禬凶禮之弔禮補諸侯災若春秋澶淵之會歸宋財凡諸侯之邦交嵗相問也殷相聘也世相朝也王制諸侯之於天子也比年一小聘三年一大聘五年一朝比年每嵗也小聘使大夫大聘使卿朝則君自行然此大聘與朝晉文伯時所制唐虞之制諸侯歲朝周之制侯甸男采衛要服六者皆以服數來朝天子五年一巡守歲二月東巡守至于岱宗柴而望祀山川覲諸侯問百年者就見之命太師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟市典市者賈謂物貴賤厚薄也質則用物貴淫則侈物貴民之志淫邪則所好不正命典禮考時月定日同律禮樂制度衣服正之山川神祇有不舉者為不敬不敬者君削以地舉猶祭也宗廟有不順者為不孝不孝者君絀以爵不順謂背逆昭穆變禮易樂者為不從不從者君流流放也革制度衣服者為畔畔者君討有功德於民者加地進律律法也五月南巡守至于南嶽如東巡守之禮八月西巡守至于西嶽如南巡守之禮十有一月北巡守至于北嶽如西巡守之禮歸假于祖禰用特孟子天子適諸侯曰巡守諸侯朝於天子曰述職春省耕而補不足秋省斂而助不給入其疆土地辟田野治養老尊賢俊傑在位則有慶慶以地入其疆土地荒蕪遺老失賢掊克在位則有讓一不朝則貶其爵再不朝則削其地三不朝則六師移之王制天子無事與諸侯相見曰朝考禮正刑一德以尊天子天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之將謂執以致命柷鼗皆所以節樂諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯未賜圭瓚則資鬯於天子得其器乃敢為其事圭瓚鬯爵也鬯秬酒也賜圭瓚者亦謂上公九命若未賜圭瓚則用璋瓚故周禮小宗伯注云天子圭瓚諸侯璋瓚既不得鬯則用薰右朝聘巡守賞罰之制三皇以來至殷末周初諸侯之見於經傳者共工氏女媧末年共工氏任智刑以強霸而不王與祝融戰不勝怒觸不周山以死州甫甘許戲露齊紀怡向申呂皆炎帝神農氏薑姓之後並為諸侯或分四嶽當周室甫侯申伯為王賢相齊許列為諸侯蚩尤氏九黎之君始作淫刑不用帝命黃帝與戰於阪泉之野禽殺之有苗氏縉雲氏之後作五虐之刑殺戮無辜堯遏絶其世舜攝政放之於三危又命禹徂征七旬而格虞賔書虞賔在位注丹朱為王者後故稱賔與諸侯助祭容齋洪氏隨筆曰堯舜之子不肖等耳舜之後雖不有天下而傳至於陳及田齊幾二千載惟堯之後當舜在位時即絶故禹之戒舜曰毋若丹朱傲用殄厥世又作戒曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡原丹朱之惡固在所絶方舜禹之世顧不能别訪賢胄為之立繼乎左傳載子産之辭曰唐人是因以服事夏商其季世曰唐叔虞謂唐人之季非周武王子封於晉者成王滅唐而封太叔又蔡墨曰陶唐氏既衰其後有劉纍氏曰御龍范宣子曰丐之祖自虞以上為陶唐氏在夏為御龍氏然則封國雖絶尚有子孫武王滅商封帝堯之後於薊而未嘗一見於簡策史趙言楚之滅陳曰盛德必百世祀虞之世數未也臧文仲聞蓼與六二國亡曰臯陶庭堅不祀忽諸堯之盛德豈出舜臯之下而爵邑不能及其孫何也有庳舜封象使吏治其國而納其貢稅有庳在今道州契佐禹治水有功舜使為司徒封於商賜姓子氏契子昭明傳相土昌若曹圉冥振微報丁報乙報丙主壬主癸凡十四世而生成湯始代夏有天下稷教民播種帝堯舉為農師舜時封於邰稷子不窋傳鞠公劉慶節皇僕差弗毁隃公非髙圉亞圉公叔祖類古公亶父季歷西伯昌凡十六世而生武王始代商有天下英六禹即天子位舉臯陶薦之且授政焉而臯陶卒乃封臯陶之後於英六至春秋魯文公之時六人叛楚即東夷楚成大心帥師滅六子燮滅蓼六安國六縣咎陶後偃姓所封國英即蓼也在光州固始縣按六蓼雖滅於春秋之時然史記以為禹封臯陶之後於英六則是禹時所建之國也防風氏汪芒氏之君禹會諸侯於塗山防風氏後至禹殺而戮之其骨專車其後在春秋時為長狄長狄首尾見狄事迹有扈氏夏禹崩啓立有扈氏不服啓伐而滅之天下咸朝有扈國在雍州南鄠縣后羿有窮氏之君太康盤遊失德羿距之於河遂廢之而立仲康自鉏遷於窮石因夏人代夏政信用寒浞為浞所殺羲和二氏世掌天地之官至仲康時湎淫胤侯征之胤侯仲康時掌六師征羲和寒浞伯眀氏之讒子弟羿信之以為已相浞行媚於內而施賂於外樹之詐慝以取其國家內外咸服乃殺羿而代之夏遺臣有鬲氏收斟灌斟尋餘燼滅浞立少康有仍氏寒浞子夏殺帝相妃仍氏女曰后緡歸有仍生少康有鬲氏夏為羿浞所代夏之遺臣靡奔有鬲氏自有鬲氏率遺民滅浞立少康有鬲今平原鬲縣斟灌斟尋氏二國夏同姓諸侯仲康之子后相所依羿命其子澆用師滅之斟灌故城在青州壽光縣東斟尋故城在青州北海縣過戈寒浞處其子澆於過􅜦於戈靡既滅浞立少康少康乃滅澆於過后杼少康子滅􅜦於戈有窮因是遂亡過在東萊掖縣戈在宋鄭之間葛葛伯與湯為鄰不祀湯征之葛梁國寧陵有葛鄉韋顧昆吾三國名韋豕韋彭姓也顧昆吾皆已姓也三國黨桀為惡湯先伐韋顧克之昆吾桀則同時誅三朡湯伐夏夏師敗績桀走保三朡湯從而伐之俘其寶玉桀乃奔南巢三朡今定陶也氐羌西戎國湯時來享來王荆楚殷道衰楚國叛髙宗伐之冞入其阻鬼方北夷髙宗伐鬼方三年克之九侯為紂三公有好女入之紂女不喜淫紂怒殺之而醢九侯鄴縣有九侯城鄂侯為紂三公紂醢九侯鄂侯爭之強辨之疾紂并脯鄂侯鄂一作邘野王縣有邘城崇侯虎紂殺九侯鄂侯西伯昌聞之竊歎崇侯虎以告紂紂囚西伯羑里西伯之臣閎夭之徒求美女竒物獻紂紂赦西伯賜弓矢斧鉞使專伐征西伯遂伐崇崇在京兆鄠縣黎殷近王畿之諸侯西伯伐而勝之紂之臣祖伊奔告於紂作西伯戡黎黎在上黨東北密密須氏不共距周侵阮及共文王伐之密地在寧州庸蜀羌髳微盧彭濮八國皆蠻夷戎狄屬文王者武王伐商俱以師至牧野羌在西蜀髳微在巴蜀盧彭在西北庸濮在江漢之間巢殷之臣巢伯南方逺國武王克商乃來朝芮伯作旅巢命奄東方淮夷之種武王崩與三監武庚叛周周公討之成王即政又叛成王滅之遷其君於蒲姑奄在兖州曲阜縣蒲姑齊地樂記武王克殷反商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞封殷之後於宋左傳昔周公弔二叔之不咸故封建親戚以藩屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也十六國皆文王子管國在滎陽京縣東北雍國在河內山陽縣西畢國在長安縣西北酆國在始平鄠縣東郕音成邘晉應韓武之穆也四國皆武王子應國在襄陽城父縣西韓國在河東郡界河內野王縣西北有邘城凡蔣邢茅胙祭周公之允也蔣在弋陽期思縣髙平昌邑縣西有茅鄉東郡燕縣西南有胙亭班固諸侯王表序昔周監於二代三聖制法謂文王武王周公也立爵五等封國八百同姓五十有餘周成王以後春秋以前諸侯之見於經傳者畢畢公髙文王子成王時為司馬又為太師成王將崩與召太保等同受顧命立康王康王既立率東方諸侯以見王以成周之衆命畢公保釐東郊作畢命畢在長安縣西北其後為畢萬彤彤伯姒姓成王時為宗伯王將崩與召太保等同受顧命立康王時六卿召太保芮伯彤伯畢公衛侯毛公惟彤伯非同姓密密康公姬姓共王遊於涇上康公從有三女奔之康公不獻於王一年王滅密邶武王克商三分其地自紂而北謂之邶南謂之鄘東謂之衛初以處三監三監既叛討平之乃封康叔於衛而以邶鄘封同姓之國其後衛子孫稍并邶鄘二國故邶鄘之詩皆言衛事鄘説見前檜妘姓髙辛火正祝融之後武王封之為檜子國在禹貢豫州外方之北滎波之南居溱洧之間夷王厲王之時檜公不務政事而好潔衣服大夫去之於是檜之變風始作幽王時為鄭桓公所滅榮厲王時榮夷公為卿士好專利王説之諸侯不享王流於彘甫甫侯亦薑姓與申皆太嶽之後穆王時甫侯作呂刑嵩髙言惟申及甫維周之翰即穆王時甫侯子孫樊樊侯仲山甫宣王時為卿士兼師保之官韓姬姓左傳邘晉應韓武之穆宣王錫命韓侯後為晉所滅幽王九年史伯對鄭桓公曰武王之子應韓不在韓地在同州黎黎姓未詳侯爵國在上黨壺關縣後黎侯為狄人所逐棄其國而寄於衛衛處以中露泥中二邑黎之臣子作式微旄邱二詩以責衛不能救黎右以上皆周以來諸侯之國而亡於春秋以前者東坡蘇氏曰傳稱武王克商光有天下兄弟之國十有五人姬姓之國四十人爵五品而别三等公侯百里伯七十里子男五十里不滿者為附庸蓋一千八百國周室既衰轉相吞滅數百年間列國耗盡春秋之世見於經傳者一百六十五國蠻夷戎狄亦在其間若夫二百四十年之中朝聘會盟侵伐圍入孔子筆之於經公穀發明於傳至今猶想見其處今掇取其尤者附次於後經傳始見諸國圖姬姓爵姓具魯侯隱元經鄭伯隱元經祭伯隱元經衛侯隱二經西虢公隱元傳注隨侯隱五傳郕伯隱五經晉侯隱六經凡伯隱七經滕侯隱十經郜子桓二經芮伯桓荀侯桓二傳九傳賈伯桓九傳曹伯桓十四經單伯莊元經蔡侯莊十經息侯莊十四傳滑伯莊十六經邢侯莊三十二經虞公僖二經周公僖九經畢公僖二十四傳原伯僖二十四傳酆侯僖二十四傳應侯僖二十四傳韓侯僖二十四傳甘公僖二十四傳頓子僖二十五傳毛伯文元經巴子文十六經唐侯宣十二傳吳子成六經召伯成八經尹子成十六經北燕伯昭三經胡子昭四經劉子昭十三經異姓爵姓具宋子公隱元經邾曹子隱元經宿風男隱元經莒已子隱二經紀薑侯隱二經齊薑侯隱三經陳媯侯隱三傳把姒伯隱四經南燕姞伯隱五傳薛任侯隱十一經許薑男隱十一經州薑公桓五經穀伯桓七經鄧曼侯桓七經葛嬴伯桓十五經郳曹子莊五經僖七稱小邾荆芉子莊十經僖元稱楚徐嬴子莊二十六經舒偃子僖三經鄫姒子僖十四經梁嬴伯僖十八經須句風子僖二十二經夔芉子僖二十六經秦嬴伯僖三十經沈姒子文三傳麇嬴子文十一經郯嬴子宣四經鄖嬴子宣四傳箕子子成十三傳逼陽妘子襄十經舒鳩偃子襄二十五經鄅鄖子昭十八經姓具爵不具申薑隱元傳東虢姬隱元傳羅熊桓十二傳夷鄖莊十六傳霍姬閔元傳耿姬閔元傳魏姬閔元傳黃嬴僖二傳溫姬僖十經任風僖二十一傳顓臾風僖二十一傳焦姬僖二十三傳管雍邘胙茅蔣聃以上七國並姬見僖二十四傳鄀元文五經蓼偃文五經六偃文五傳闕揚姬襄二十九傳爵具姓不具談子莊十經弦子僖五經宗子文十二傳萊子襄六經杜伯襄二十四傳賴子昭四經鍾吾子昭二十七傳蘇子宣一傳姓爵俱失戴隱十經鄖二軫絞以上並桓十一傳牟桓十五經遂莊十三經權莊十八傳陽閔二經共閔二傳冀僖二傳道僖五傳柏僖五傳厲僖十五經項僖十七經英氏同上江僖二經巢文十二經庸文十六傳崇宣元傳舒庸成十七經邿襄十三經鑄襄二十三傳亳昭九傳房昭十六傳桐定二傳附庸極隱二經向隱二經於餘邱莊二經蕭莊二十二經鄣莊十五經鄟成六經夷狄諸種盧桓十三傳驪戎莊二十八傳山戎莊三十經北戎僖十傳揚拒泉臯伊雒並僖十傳介僖二十九經薑戎僖三十二經長狄文十一經百濮文十六傳羣蠻文十六傳陸渾宣三經赤狄宣四經白狄宣八經根牟宣九經潞宣十五經甲氏留吁並宣十六經鐸辰宣十六經茅戎成元經牆咎如成三經無終襄四傳濮奄並昭元傳淮夷昭四經肅慎昭九傳鮮虞昭十二經肥昭十二傳鼓昭十五傳戎蠻哀四經文獻通考卷二百六十一
