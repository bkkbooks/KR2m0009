body:
  text: 文獻通考卷七十九鄱陽馬端臨貴與著郊社考十二祭日月大宗伯以實柴祀日月星辰實柴實牛柴上也大疏曰祭義云郊之祭也報天而主日配以月則郊祭並祭日月可知玉人之事圭璧五寸以祀日月星辰圭其邸為璧取殺於上帝邸疏曰此圭璧謂以璧為邸旁有一圭故云圭其為璧也云取殺於上帝者按上文四圭以祀天此日月星辰為天之佐故一圭是取殺於上帝也冬官春官典瑞同掌次朝日則張大次小次設重帟重案疏詳見祀五帝篇王搢大圭執鎮圭繅藉五采五就以朝日繅有五采文所以薦玉木為中幹用韋衣而畫之就成也王朝日者示有所尊訓民事君也天子常春分朝日秋分夕月覲禮曰拜日於東門之外玉人職曰大圭長三尺杼上終葵首天子服之鎮圭尺有二寸天子守之繅讀為藻率之藻五就五匝也一匝為一就帶衣於既反圭疏曰搢插也謂插大圭長三尺玉笏於間手執鎮尺二寸繅藉五采五就者謂以五采就繅藉玉也以朝日者謂以春分朝日於東郊也云繅有五采文者釋繅字以其繅者雜采之名故云繅有五采文所以薦玉也云木為中幹用韋衣而畫之就成也者鎮圭尺二寸廣三寸則此木板亦長尺二寸廣三寸與玊同然後用韋衣之乃於韋上畫之一采為一匝五采則五匝一匝為一就就成也是采色成者也云玉人職曰大圭長三尺杼上終葵首天子服之者按彼注云杼殺也終葵首謂大圭之上近首殺去之留首不去處為椎頭齊人名椎為終葵故名圭首為椎頭者為終葵首也按玊藻云天子搢珽方正於天下即此大圭也云鎮圭尺有二寸天子守之者亦玊人文引之證經大圭與鎮圭之義也杼除汝反春官典瑞禮器曰大圭不琢注曰琢當為篆字之誤也葵疏曰大圭天子朝日月之圭也尚質之義但杼上終首而無琢桓蒲之文也天子元端而朝日於東門之外端當為冕字之誤也元衣而冕冕服之下朝日春分之時也東門謂國門也元疏曰按宗伯實柴祀日月星辰則日月為中祀而用冕者以天神尚質玊藻天子乘龍載大旗象日月升龍降龍出拜日於東門之外反祀方明禮日於南門外禮月與四瀆於北門外覲禮日注見百神篇祀方明禮黃氏曰覲禮載朝之禮蓋時會殷同王既揖諸侯於壇乘龍路載大旗出拜日於東門之外反祀方明此所謂大朝覲者也常歲春朝朝日諸侯有修歲事而朝者豈亦帥之而出與國語大采朝日小采朝月蓋日朝焉大司樂乃奏黃鐘歌大呂舞雲門以祀天神天神謂五帝及日月星辰春官孟冬天子乃祈來年於天宗疏曰謂祭日月星辰也月令傳王宮祭日也夜明祭月也幽宗祭星也疏曰王君也宮亦壇也營域如宮也日神尊故其壇曰君宮也夜明者祭月壇名也月明於夜故謂其壇為夜明也幽宗祭星壇名也幽暗也宗當為禜禜壇域也蓋星至夜而始出故謂之幽也為營域而祭之故謂之幽禜也祭法郊之祭大報天而主日配以月注見祀天禮執天主日條祭日於壇祭月於坎以别幽明以制上下幽明者謂日照晝月照夜祭疏曰此經及下經皆據春分朝日秋分夕月日於壇謂春分也祭月於坎謂秋分也祭日於東祭月於西以别外內以端其位别彼列反祭端正疏曰日於東用朝旦之時祭月於西鄉夕之時而崔氏云祭日於壇祭月於坎還據上文郊祭之時今謂若是郊祭日與月當應同處何得祭日於壇祭月於坎日於東月於西祭不同處則崔説非也崔又云日月有合祭之時謂郊祭天而主日配以月其禮大用牛各祭之時謂春分朝日秋分夕月其禮小故祭法用少牢今謂小司徒云小祭祀奉牛牲鄭注謂元冕所祭自元冕皆用牛也何得用少牢今謂祭法日月用少牢鄭云禱祈之祭也崔氏説又非崔氏又云迎春之時兼日月者今按諸文迎春迎秋無祭日月之文小宗伯云兆五帝於四郊四望四類亦如之謂四望四類之祭亦如五帝在四郊故鄭云兆日於東郊兆月與風師於西郊不謂兆五帝之時即祭日月崔説又非通典曰凡祭日月歲有四焉迎氣之時祭日於東郊祭月於西郊一也二分祭日月二也祭義云郊之祭大報天而主日配以月三也月令十月祭天宗合祭日月四也但四時之氣有分有合二分之日祭謂分也大報天而主日以月配之是合也大報配祭之時日燎於壇月埋於坎瘞埋之時自血始燔燎之時自氣先合為大祭分為中祭郊特牲云大報天而主日其禮宜重用犢分祭宜輕輕則用少牢拜日於東郊禮月於西郊者此因而祭於郊也郊特牲大報之時掃地而祭燔柴而郊就陽位也祭法分祭之時王宮祭日夜明祭月以少牢在壇上不於地也至時於二祭所用圭玊亦無差别陳氏禮書曰古者之祀日月其禮有六郊特牲曰郊之祭大報天而主日配以月一也玊藻曰朝日於東門之外祭義曰祭日於東祭月於西二也大宗伯四類於四郊兆日於東郊兆月於西郊三也大司樂樂六變而致天神月令孟冬祈來年於天宗天宗者日月之類四也覲禮拜日於東門之外反祀方明禮日於南門之外禮月於北門之外五也雪霜風雨之不時於是乎禜之六也夫因郊蠟而祀之非正祀也類禜而祀之與覲諸侯而禮之非常祀也春分朝之於東門之外秋分夕之於西門之外此祀之正與常者也日言朝則於日出之朝朝之也月言夕則於月出之夕夕之也日壇謂之王宮以其有君道故也月壇謂之夜明以其眀於夜故也其次則大次小次設重帟重案其牲體則實柴其服則元冕元端其圭之繅藉則大采少采禮之之玊則一圭邸璧祀之之樂則奏黃鐘歌大呂舞雲門玊藻十有二旒龍衮以祭元端以朝日於東門之外則龍衮元端皆言其衣也衣元冕之衣則用元冕矣鄭氏改元端為元冕不必然也虞氏釋國語謂朝日以元冕然祀上帝以衮冕而朝日以圭璧與張次設帟一切殺於上帝則其不用袞冕可知矣周禮於掌次之次帟案於典瑞之大圭鎮圭繅藉言朝日而已則夕月之禮又殺乎此也漢武帝因郊泰畤朝出行宮東向揖日其夕西向揖月則失東西郊之禮也魏文帝正月祀日於東門之外則失春分之禮也齊何佟之曰王者兄日姊月馬鄭用二分盧植用立春佟之以為日者太陽之精月者太隂之精春分陽氣方永秋分隂氣向長天地至尊故用其始而祭以二至日月次天地故祭以二分則融與康成得義矣魏薛靖曰朝日宜用仲春之朔夕月宜用仲秋之朏此尤無據也後周於東門外為壇以朝日燔燎如圜丘於西門外為壇於坎中方四丈深四尺以夕月燔燎如朝日隋唐壇坎之制廣狹雖與後周差異大槩因之而已楊氏曰愚按典瑞朝日注云天子常春分朝日秋分夕月玉藻朝日於東門之外注云朝日於春分之時馬融鄭康成皆同此説賈誼亦曰三代之禮春朝朝日秋暮夕月所以明有敬也蓋冬至祭天夏至祭地此祭天地之正禮也春分朝日秋分夕月此祭日月之正禮也陳氏云天地至尊故用其始而祭以二至日月次天地故祭以二分此言是也所謂兆日於東郊兆月於西郊祭日於壇祭月於坎祭日於東祭月於西王宮祭日夜明祭月即春分朝日秋暮夕月之事也此外則因事而祭如大報天而主日配以月此因郊而祭也覲禮拜日於東門之外禮日於南門外禮月於北門外此因覲禮而行拜也月令祈來年於天宗此因蠟而祈也日月星辰之神則雪霜風雨之不時於是乎禜之此因禜而祭也天子大采朝日與三公九卿祖識地德虞説云大采袞織也祖習也識知也地德所以廣生昭謂禮玊藻天子元冕以朝日元冕冕服之下則大采非袞織也周禮王搢大圭執鎮圭藻五采五就以朝日則大采謂此也言天子與公卿因朝日以修陽政而習地德因夕月以治隂教而糾天刑日照晝月照夜各因其照以修其事也日中考政與百官之政事師尹惟旅牧相宣序民事宣遍也序次也三君云師尹大夫官也掌以媺詔王惟陳也旅衆士也牧州牧也相國相也皆百官政事之所及也一云師尹工也少采夕月與太史司載糾虔天刑夕月以秋分糾共也虔敬也刑法也或云少采黼衣也昭謂朝日以五采則夕月其三采也載天文也司天文謂馮相氏保章氏與太史相儷偶也此因夕月而恭敬觀天法考行度以知妖祥也音馮皮氷反相息亮反儷力智反共恭日入監九御使潔奉禘郊之粢盛監視也九御九嬪之官主粢盛祭服者而後即安即就也立國語魯語而又周語曰古者先王既有天下又崇上帝明神敬事之於是乎有朝日夕月以教民事君日月星辰之神則雪霜風雨之不時於是乎禜之昭公元年左氏傳莊公十有八年春王三月日有食之穀梁子曰不言日不言朔夜食也何以知其夜食也曰王者朝日王制曰天子元冕而朝日於東門之外故日始出而有虧傷之處是以知其夜食也制疏云此是禮記玊藻文而云王制者謂王者之法非是王制之篇也此魯事而輒言天子朝日者言王者朝日所以顯諸侯朝朔也天子朝日於東門之外服元冕其諸侯則玉藻云皮辨以聼朔於太廟與天子禮異其禮雖異皆早旦行事而作夜有虧傷之處尚存故知夜食也故雖為天子必有尊也貴為諸侯必有長也故天子朝日諸侯朝朔秦始皇東遊海上行禮祠名山川及八神六曰月主祠之萊山在東萊長廣在齊北並渤海七曰日主祠盛山盛山斗入海盛山在東萊不夜縣斗絶入海也最居齊東北陽以迎日出云雍有日月參辰廟各以歲時奉祠漢武帝立二十八年始郊泰一朝日夕月改周法其後常以郊泰畤質明出行竹宫東向揖日西向揖月即為郊日月又不在東西郊遂朝夕常於殿下東面拜日羣公無四朝之事郊泰一時祭日以牛祭月以羊彘特若牛若羊若豕只一特牲泰一祝宰衣紫及繡五帝各如其色日赤月白宣帝時於成山祠日萊山祠月魏文帝黃初二年正月朝日於東門之外詔曰漢氏不拜日於東郊而旦夕常於殿下東西拜日月煩褻似家人之事非事天神之道也時議者以為朝日於正月非二分之義祕書監薛靖論云按周禮朝日無常日鄭元云用二分秋分之時月多東升西向拜之背實逺矣朝日宜用仲春之朔夕月宜用仲秋之朏淳于睿駁之引禮記云祭日於東祭月於西以端其位周禮秋分夕月並行於上代西向拜月雖如背實亦猶月在天而祭之於坎不復言背也猶如天子東西遊幸其官猶北向朝拜寧得以背實為疑明帝太和元年二月丁亥朔朝日於東郊八月己丑夕月於西郊始得古禮晉武帝太康二年有司奏春分朝日寒溫未適不可親出詔曰頃方難未平今戎事已息此禮為大遂親朝日此後廢齊末東昏侯永元元年何佟之議王者兄日姊月馬鄭用二分盧植用立春佟之以為日者太陽之精月者太隂之精春分陽氣方永秋分隂氣向長天地至尊故用其始而祭以二至日月次天地朝敬故以二分差有理據則融元得義矣今損漢儀上採周禮春分之義又無諸侯之事無所出於東郊今正殿即會行禮之廷宜常以春分正殿之廷拜日其夕月文不分明佟之謂魏代所行善得與奪之衷今請以春分朝於殿廷西東向而拜日秋分夕於殿廷東西向而拜月此所謂正於日月以端其位服無旒藻之飾蓋本天至質朝日不得同昊天至質之禮故以元冕三旒近代祀天服袞冕十二旒極文章之美則是古今禮變禮天朝日服宜有異頃代天子小朝會服絳紗袍通天金博山冠斯即今朝之服次袞冕者也竊謂宜服此拜日月甚得差降之宜後魏孝文泰和十五年詔曰近論朝日夕月皆以二分之日於東西郊行禮然月有餘閏行無常準今若一以分日或值月出於東而禮於西尋情即理不可施行昔曹魏薛靖以為朝日取月一日為朔夕月三日為朏朏者月形始著今未知朏朔二分何者為是遊明根等對曰考按舊式準校衆議宜從朏朔後周以春分朝日於東門外為壇如其郊用特牲青圭有邸皇帝乘青輅及祀官俱青冕執事者青辨司徒亞獻宗伯終獻燔燎如圜丘秋分夕月於國西門外為壇於坎中方四丈深四尺燔燎如朝日禮隋因周制開皇初國東春明門外為壇如其郊每以春分朝日又於國西開逺門外為坎深三尺廣四丈為壇於坎中髙一尺廣四尺每以秋分夕月牲幣與周同其朝日夕月奏諴夏辭各一首迎送神登歌樂辭與圜丘同唐制以二分日朝日夕月於國城東西各用方色犢籩豆各十簠簋㽅俎各一樂舊用黃鐘之均三成新改用天神之樂圜鐘之均六成唐開元禮皇帝春分朝日於東郊儀秋分夕月及攝事附齋戒前祀五日皇帝散齋三日致齋二日如圜丘儀諸應祀之官齋戒如别儀陳設如祀五帝儀惟不設配帝位及樽罍燎壇方八尺高一丈開上南出戶方三尺鑾駕出宮如圜丘之儀奠玉帛祀日未明三刻諸祀官各服其服郊社令良醞令各帥其屬入實樽罍玊幣凡樽之次太樽為上實以醴齊著樽次之實以盎齊罍樽實以清酒其元酒各實於上樽罍樽無元酒禮神之玉以圭有邸其幣大明以青夜明以白太官令帥進饌者實諸籩豆簠簋入設於內壝東門之外饌幔內未明二刻奉禮帥贊者先入就位贊引引御史太祝及令史與執樽罍篚羃者入自東門當壇南重行北面以西為上凡引導者每曲一逡巡立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽者升自東陛立於樽所壇下執罍洗篚羃者各就位贊引引御史太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖引降就位駕將至謁者贊引各引祀官及從祀羣臣諸國蕃客使先至者俱就門外位駕至大次門外回輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次通事舍人引文武五品以上從祀之官皆就門外位太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除於上降行樂懸於下訖引出就位皇帝停大次半刻頃通事舍人分引從祀文武羣官介公酅公諸國客使先入就位太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝服元冕出次華蓋侍衛如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至南內壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停於門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位西面立每立定太常卿與博士退立於左謁者贊引各引祀官次入就位立定太常卿前春稱請再拜退復位皇帝再拜奉禮曰衆官再拜在位者皆再拜太常卿前奏有司謹具請行事攝則初司空入謁者贊引各引祀官以次入就位贊拜訖謁者進太尉之左白請行事凡獻皆以太尉為初獻退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏元和之樂乃以圜鐘之均以文舞之舞樂舞六成偃麾戞敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而後止太常卿前奏稱請再拜退復位攝則奉禮贊曰衆官再拜皇帝再拜奉禮曰衆官再拜在位者皆再拜太祝取玊幣於篚立於樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛侍中中書令已下及左右侍從量人從升以下皆如之皇帝升壇北向立樂止攝則謁者引太尉升奠太祝加玉於幣以授侍中侍中奉玊帛東向進皇帝搢鎮圭受玉帛每受物搢鎮圭奠訖執圭俯伏興登歌作肅和之樂乃以大呂之均太常卿引皇帝進北面跪奠於大明夕月云夜明神座俯伏興太常卿引皇帝少退北向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止攝則謁者引太尉初羣官拜訖祝史奉毛血之豆立於門外於登歌止祝史奉毛血入升自南陛太祝迎取於壇上進奠於神座前太祝與祝史退立於樽所進熟皇帝既升奠攝則太尉既升奠玉帛太官令出帥進饌者奉饌陳於內壝門外謁者引司徒出詣饌所司徒奉俎初皇帝既入至位樂止太官令引饌入俎初入門雍和之樂作以黃鐘之均饌至陛樂止祝史進徹毛血之豆降自東陛以出饌升南陛太祝迎引於壇上設於神座前籩豆蓋羃先徹乃升簋簠既奠却其蓋於下設訖謁者引司徒以下降自東陛復位太祝還樽所太常卿引皇帝詣罍洗樂作其盥洗之儀如圜丘太常卿引皇帝樂作皇帝詣壇升自南陛樂止謁者引司徒升自東陛立於樽所齋郎奉俎從升立於司徒之後太常卿引皇帝詣樽所執樽者舉羃侍中贊酌醴齊訖夀和之樂作皇帝每酌獻及飲福皆作夀和之樂太常卿引皇帝少退北向立樂止太祝持版進於神座之右東面跪讀祝文曰維某年歲次月朔日子嗣天子臣某攝則云謹遣太尉封臣名敢昭告於大明惟神宣布太陽照臨下土動植咸賴幽隱無遺時維仲春敬遵常禮夜明云昭著懸象輝耀隂精理歷授時仰觀取則爰兹仲秋用率常禮謹以玊帛犧齊粢盛庶品祗祀於神尚享訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神座還樽所皇帝拜訖樂止太祝以爵酌上樽福酒授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興太祝帥齋郎進爼太祝減神前胙肉加於爼太祝持爼以授司徒司徒奉爼西向進皇帝受以授左右攝則太尉受以授齋郎謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戞敔樂止武舞入鼓柷作舒和之樂立定戞敔樂止初皇帝獻將畢謁者引太尉詣罍洗盥手攝則太尉獻將畢謁者引太常卿為亞獻下皆倣此洗匏爵訖謁者引太尉自東陛升壇詣著樽所執樽者舉羃太尉酌盎齊武舞作謁者引太尉進大明神座前北向跪奠爵興謁者引太尉少退北向再拜太祝以爵酌罍福酒進太尉右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光祿卿皇帝儀與攝事同以光祿卿為終獻詣罍洗盥洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光祿卿降復位武舞六成樂止舞獻俱畢太祝進徹豆還樽所徹者籩豆各少移於故處奉禮曰賜胙贊者唱衆官再拜在位者皆再拜已飲福受胙者不拜元和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜在位皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作攝則謁者引太尉皇帝就望燎位南向立樂止於羣官將拜太祝執篚進神座前跪取玉帛祝版齋郎以爼載牲體黍稷飯爵酒興降自南陛南行經懸內當柴壇南東行自南陛登柴壇以玉幣祝版饌物置於柴上戶內訖奉禮曰可燎東西各四人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出內壝門殿中監前受鎮圭以授尚衣奉御殿中監又前受大圭華蓋仗衛如常儀皇帝入次樂止謁者贊引引祀官及從祀羣官諸國蕃客以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下俱再拜贊引引出工人二舞以次出鑾駕還宮如圜丘之儀宋制春分朝日秋分夕月為大祀用羊豕各二籩豆十二簠簋爼二仁宗皇祐二年禮院言知石州王簡塋近九宫朝日壇今其家舉葬乞移祀壇今二壇皆濶一百步據咸平四年升九宮為大祠遷展壇壝亦言百步內無墳林是依淳化四年敕大祠壇壝制度禮部式天地五郊壇三百步內不得葬埋不言諸祠圜丘方澤五帝壇三百步內墳塋不少若移二壇京城側近墳冢相屬一壇之地若方濶六百步無墳塋始為吉土則近城無地請天地五郊壇依諸祠壇式詔可五年定朝日壇舊髙七尺東西六步一尺五寸增修髙八尺廣四丈如唐郊祀録夕月壇與隋唐制度不合從舊則壇小如唐則坎狹定坎深三尺廣四丈壇高一尺廣二丈四方為陛降入坎中然後升壇神宗元豐六年禮部言熙寧祀儀朝日壇廣四丈夕月壇廣二丈以唐王涇郊祀録考之夕月壇方廣四丈今止二丈蓋祀儀之誤請依制廣改造夜明壇從之徽宗政和三年議禮局上五禮新儀朝日壇廣四丈高八尺四出陛兩壝二十五步夕月坎深三尺廣四丈壇高一尺廣二丈四方各為陛入坎中然後升壇兩壝每壝二十五步高宗紹興三年司封員外郎鄭士彥言春分朝日秋分夕月祀典未舉望詔禮官講求從之其後於城外惠照院望祭位版日書曰大明月書曰夜明玊用圭璧大明幣用赤夜明幣用白禮如祀感生帝文獻通考卷七十九
