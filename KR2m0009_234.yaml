body:
  text: 文獻通考卷二百三十四鄱陽馬端臨貴與著經籍考六十一集别集田表聖咸平集五十卷鼂氏曰宋朝田錫字表聖其先京兆人唐末徙於蜀國初與胡旦何士宗齊名中興國三年進士第歷相臺桐廬淮陽海陵四郡守知制誥終於諫議大夫范仲淹司馬光讀其書皆稱其直諒蘇軾亦以比賈誼云陳氏曰首卷有奏議十二篇即東坡所序錫之子孫無顯者端平初遊侶為成都漕奏言朝廷方用端拱咸平之舊紀元而臣之部內乃有端拱咸平之直臣宜褒表之以示勸願下有司議諡博士徐清叟議諡曰獻翼今漢嘉田氏子孫不知在亡而文集版之在州者亦燬於兵燼矣東坡蘇氏奏議序曰嗚呼田公古之遺直也其盡言不諱蓋自敵以下受之有不能堪者而况於人主乎吾是以知二宗之聖也自太平興國以來至於咸平可謂天下大治千載一時矣而田公之言常若有不測之憂近在朝夕者何哉古之君子必憂治世而危明主明主有絶人之資而治世無可畏之防夫有絶人之資必輕其臣無可畏之防必易其民此君子之所甚懼也方漢文時刑措不用兵革不試而賈誼之言曰天下有可長太息者有可流涕者有可痛哭者後世不以是少漢文亦不以是甚賈誼由此觀之君子之遇治世而事明主法當如是也誼雖不遇而其所言略已施行不幸早世功烈不著於時雖誼嘗建言使諸侯王子孫各以次受分地文帝未及用歷孝景至武帝而主父偃舉行之漢室以安今公之言十未用五六也安知來世不有若偃者舉而行之歟願廣其書於世必有與公合者此亦忠臣孝子之志也鼂文元公道院别集十五卷法藏碎金録十卷耄智餘書三卷昭德新編三卷理樞一卷鼂氏曰五世祖文元公也諱迥字明逺澶州人自父佺徙家彭門幼從王禹稱學太平興國五年進士至道末擢右正言直史館知制誥入翰林為學士加承旨眷禮優厚天禧中祈解近職判西京留司御史臺居六年請老以太子少保致仕終少傅年八十四文元諡也國史云公樂易淳固守道甚篤雖貴勢無所摧屈嘗言歷官臨事未嘗挾情害人以售進保全護固如免髮膚之傷真宗數稱其長者楊億謂其所作書命得代言之體李獻臣亦言服膺墳典耆年不倦少遇異人指導心要不喜術數之説疑文滯義須質正後已文章典贍書法楷正時輩推重自唐以來世掌誥命者唯楊於陵及見其子鼂氏繼之延譽後進其門人如宋宣獻晏元獻李邯鄲皆世顯人集皆自有序及李遵朂後序自經兵亂六世圗書焚棄無孑遺法藏碎金世傳最廣先得之於趙郡蘇符昭德新編則得之於丹稜李燾道院集要則得之於知閬州王輔耄智餘書則得之於眉山程敦厚理樞則得之於澠池卷中鼂文元道院集要三卷鼂氏曰宋朝王古編其序云文元鼂公博觀內書不徒力行復勤於撰述以開導後學其書曰道院别集曰自擇增修百法曰法藏碎金曰隨因紀述曰耄智餘書余嘗遍閲之以為名理之妙雖白樂天不逮也輒刪去重復總集精粹以便觀覽云古元祐中侍從雲龕李氏書後曰鼂公道院集要觀之始則簡暢清逺如聞超世特立之士希微之言反復數十過乃知深入理窟開導後學直而不迂簡而易行非有道君子莫能為也楊文公刀筆十卷鼂氏曰宋朝楊億字大年建州人祖文逸嘗夢一羽人自稱懷玉山人覺而億生白毛被體其長盈尺踰月始墮雍熙初以才名聞年才十一召至闕下得對面試詩賦授祕書省正字宰臣等賀得神童淳化中奏二京賦命試禁林賜進士第久之直集賢院修永熙實録獨成五十六卷真宗即位纍擢知制誥入翰林為學士祥符中母病陽翟謁告不待報歸省俄自以疾丐解官以太常少卿分司病愈起知汝州復為學士卒年四十七天性頴悟自幼迄老不離翰墨為文敏速對客談笑揮毫無滯博聞強記於歷代典章制度尤所該洽時多取正樂道人善後進翕然宗之然評品人物黑白太明姦邪疾惡之故屢被讒毁真宗愛其材特保持之僅免焉景祐中王晦叔上其為寇相請皇太子親政疏草仁宗嘉歎特贈禮部尚書諡曰文刀筆集有陳詁序凡三百六十三首陳氏曰楊文公武夷集二十卷别集十二卷按本傳所著括蒼武夷頴隂韓城退居汝陽蓬山冠鰲等集及內外制刀筆共一百九十四卷館閣書目猶有一百四十六卷今所有者惟此而已武夷新集者億初入翰苑當景德丙午明年條次十年詩筆而序之别集者祥符五年避讒佯狂歸陽翟時所作也君可思賦居其首亦見本傳餘書疏皆作其弟倚酬答倚亦景德中進士東齋記事夏英公言楊文公文如錦繡屏風但無骨耳古今詩話楊大年錢文僖晏元獻劉子儀為詩皆宗李義山號西崑體後進效之多竊取義山詩句嘗內宴優人有為義山者衣服敗裂告人曰吾為諸館職撏扯至此聞者大噱然大年咏漢武詩云力通青海求龍種死諱文成食馬肝待詔先生齒編貝忍令乞米向長安義山不能遇也後村劉氏曰歐陽公答蔡君謨詩云先朝楊劉風采聳動天下至今使人傾想世謂公尤惡楊劉之作而其言如此豈公特惡其碑版奏疏磔裂古文為偶儷者其詩之精工律切者自不可廢歟种明逸集六卷鼂氏曰宋朝种放字明逸長安人隱終南之豹林谷咸平中遣使召赴闕授左司諫纍遷諫議大夫給事中祥符八年終工部侍郎放通經史七嵗能屬文不喜釋氏常裂佛書以製帷帳著嗣禹説在朝有所啓奏時無知者楊億譏其循默真宗乃出其議十三篇以示輔臣晚年頗嗜酒盛輿服王嗣宗知京兆嘗條上其不法詔問狀不娶無子集乃姪孫説所編范巽為之序卷首載真宗詔書及御製詩十首陳氏曰淳化中有李介者序於九江名江南小集凡二卷館閣書目别有正集十卷云大略與此同張穆之觸鱗集尚書郎知蔡州張肅穆之撰濟北鼂旡咎序略曰公之曾孫大方出公遺稿曰觸鱗集蓋公為太宗御史時所上疏議而觸鱗所自名也三復彌月凛乎直諒多聞之益如藥石如米穀非無用而設者其多至數十章皆切當世之務不可盡舉至其他詩文皆清麗有唐中葉以來才士之風非若五季及國初文物始復武夫粗鄙田里朴陋者之作也其相與切磋學問見於酬唱者翰林王黃州元之黃州名世士以直諫斤久而召於流輩少許可獨畏公以為不可及則公之為人可知矣張乖崖集十卷鼂氏曰宋朝張詠字復之濮州人太平興國中進士纍擢至樞密直學士御史中丞禮部尚書卒年七十為文尚氣不可雕飾自號乖崖公錢易所撰墓志李畋所纂語録附於後陳氏曰近時郭森卿宰崇陽刻此集舊本十卷今增廣并語録為十二卷劉中山刀筆二卷淝川集四卷鼂氏曰宋朝劉筠字子儀大名人咸平元年進士三遷右正言直史館以司諫知制誥出知鄧陳兩州召入翰林為學士嘗草丁謂李迪罷相制既而又命草制復留丁謂筠不奉詔遂出知廬州再召為學士月餘以疾知潁州三召入翰林加承旨未幾進户部龍圗閣學士再知廬州為人不茍合學問閎博文章以理為宗辭尚緻密尤工篇詠能侔揣情狀音調凄麗自景德以來與楊億以文章齊名號為楊劉天下宗之刀筆集有黃鑑序陳氏曰刀筆皆四六應用之文筠與楊大年同時號楊劉詩號西崑體有册府應言集十卷榮遇集十二卷表奏六卷淝川集四卷見館閣書目滑稽集四卷陳氏曰翰林學士吳越錢易希白撰多譎諷之辭淳化癸巳自序擁旄集五卷伊川集三卷陳氏曰樞密使思公吳越錢惟演希聖撰易倧之子惟演俶之子也惟演文集甚多此特其二集耳出鎮河陽河南時所作也全集未見陳文惠公愚邱集陳氏曰宋朝陳堯佐字希元閬州人端拱初進士纍遷三司副使修永定實録擢知制誥歷韶廬壽洛并同雍鄭八州景德四年召拜同中書門下平章事後以太子太師致仕年八十二卒號知餘子諡文惠堯佐屬辭尚古不牽世用喜為二韻詩詞調清警雋永集皆自有序曽致堯文集十卷贈諫議大夫曾致堯撰南豐之祖也南豐作集序曰公所為書號仙鳬羽翼者三十卷西陲要紀者十卷清邊前要五十卷廣中台志八十卷為臣要紀三卷四聲韻五卷總一百七十八卷皆刋行於世今類次詩賦書奏一百二十三篇又自為十卷藏於家方五代之際儒學既擯後生小子治術業於閭巷又多淺近是時公雖少所學已皆知治亂得失興壞之理其為文閎深雋美而長於諷諭今類次樂府已下是也宋既平天下公始出仕當此之時太祖太宗已綱紀大法矣公於是勇言當世之得失其在朝廷疾當事者不忠故凡言天下之要必本天子憂憐百姓勞心萬事之意而推大臣從官執事之人觀望懷姦不稱天子屬任之心故治未久洽至其難言則人有所不敢言者雖屢不合而出而所言益切不以利害禍福動其意也公所言甚衆其在上前及書亡者蓋不得而集其或從或否而後常可思者與歷官行事廬陵歐陽修已銘公之碑特詳焉此故不論論其不盡載者鳬繹先生集十卷顔太初淳之撰東坡序略曰昔吾先君適京師與卿士大夫逰歸以語軾曰自今以往文章其日工而道將散矣士慕逺而忽近貴華而賤實吾已見其兆矣以魯人鳬繹先生之詩文十餘篇示軾曰小子識之後十餘年天下無復為斯文者也先生之詩文皆有為而作精悍確苦言必中當世之過鑿鑿乎如五穀必可以療飢斷斷乎如藥石必可以伐病其逰談以為髙校詞以為觀美者先生無一言焉其後二十餘年先君既沒而其言存士之為文者莫不超然出於形器之表微言髙論既以鄙陋漢唐而其反復論難正言不諱如先生之文者世莫之貴也軾是以悲於孔子之言而懷先君之遺訓益求先生之文而得之於其子復乃録而藏之司馬溫公序略曰太初常以為讀先王之書不治章句必求其理而已矣既得其理不徒誦之以誇誑於人必也蹈而行之在其身與鄉黨無餘於其外則不光不光先王之道猶翳如也乃求天下國家政理風俗之得失為詩歌洎文以宣暢之景祐初青州牧有荒淫放蕩為事慕嵇康阮籍之為人當時四方士大夫樂其無名教之拘翕然效之寖以成風太初惡其為大亂風俗之本作東州逸黨詩以刺之遂上聞天子亟治牧罪又有鄆州牧怒屬令之清直與已異者誣以罪搒掠死獄中妻子弱不能自訴太初素與令善憐其寃死作哭友人詩牧亦坐是廢於時世人見太初官職不能動人又其文多指訐有疵病者所惡聞雖得其文不甚重之故所棄居多余止得其兩卷在同州又得其所為題名記今集而序之李仲方集二十卷鼂氏曰宋朝李維字仲方雍熙二年進士景德中知制誥遷中書舍人為翰林學士承旨年七十一維以文學進至老手不釋卷能詩嗜酒嘗謂人曰人生詩酒足則尚何營哉民士編一十九卷鼂氏曰宋朝陳充撰充成都人雍熙中擢甲科仕至刑部郎中知祥符六年貢舉卒年七十詞學典贍性曠達喜談謔淡於榮利自號中庸子民士云者蓋其未仕已仕前後所著文也嘗以唐牛僧孺善惡無餘論為害教著書反之國史稱焉今集載其論兩篇孫漢公集三十卷鼂氏曰宋朝孫何字漢公蔡州人淳化三年應進士殿省俱中第一四遷起居舍人知制誥性卞急嘗任京西東兩浙轉運使副頗事苛察幼篤學嗜古為文宗經與丁謂同為王元之所稱時謂之孫丁集有丁謂序丁晉公集四卷鼂氏曰宋朝丁謂字公言初字謂之蘇州人淳化三年進士官纍遷知制誥出知鄆亳升三州天禧四年拜平章事俄以户部罷未幾復相封晉國公乾興中坐擅改永定陵貶崖州司户更赦徙道州明道末以祕書監召還卒於光州幼聰敏書經目輒記不忘善為古文章尤工詩什憸巧險詖世鮮其儔大中祥符初上欲封禪未堅決謂因言大計有餘議遂定當時所奏祥瑞事皆謂及王欽若預焉多喜圗畫博奕音律吳人自陸宣公後至謂始相本朝熙寧以前議者莫不指謂為姦邪之首自王安石用事頗稱其賢智云集皆詩也鮮于伯圭集一卷鼂氏曰宋朝鮮于懷字伯圭閬中人文章為一時之冠纍舉不第嘗作揠愁詞時人稱之李宗諤贈詩云漢殿無人薦楊子滿朝空誦揠愁詞後與宗諤同年第四人登科趙普判秦州辟為觀察推官卒晏元獻臨川集三十卷紫微集一卷鼂氏曰宋朝晏殊字同叔臨川人景德二年張知白薦得召賜同進士出身再試文擢祕書正字為升王府記室纍擢知制誥翰林學士寶元三年拜平章事四年坐事罷知潁州歷陳許雍終以疾歸侍經席卒性剛峻幼孤篤學為文溫純應用尤長於詩抒情寓物辭多曠達當世賢士如范文正歐文忠皆出其門女適富鄭公楊察世稱其知人集有兩本一本自作序陳氏曰其五世孫大正為年譜一卷言先元獻嘗自差次起儒館至學士為臨川集三十卷起樞庭至宰席為二府集二十五卷今按本傳有文集二百四十卷中興書目亦九十四卷今所刋止此爾臨川集有自序范文正公集二十卷别集四卷鼂氏曰宋朝范仲淹字希文其先邠人大中祥符八年進士仕至樞密副使參知政事諡文正為學明經術跂慕古人事業慨然有康濟之志作文章尤以傳道為任事母至孝姑蘇之范皆疏屬置義莊以賙給之天下想聞其風采賢士大夫以不獲登門為耻獨梅堯臣嘗著碧雲騢以譏詆之云陳氏曰祥符八年進士曰朱説者即公也幼孤從其母適朱氏其為兖州推官始復姓更名又尺牘五卷其家所傳在正集之外東坡曰伊尹太公管仲樂毅之流其王霸之略皆定於畎畝中非仕而後學者也淮隂侯見髙帝於漢中論劉項短長畫取三秦如指諸掌及佐帝定天下漢中之言無一不酬者諸葛孔明卧草廬中與先主䇿曹操孫權規取劉璋因蜀之資以爭天下終身不易其言此豈口授耳傳嘗試為之而僥幸其或成者哉公在天聖中居太夫人憂則已有憂天下致太平之意故為萬言書以遺宰相天下傳誦至用為將帥為執政考其平生所為無出此書者今其集二十卷為詩賦二百六十八為文一百六十五其於仁義禮樂忠信孝弟蓋如飢渴之於飲食欲須臾忘而不可得如火之熱水之濕蓋其天性有不得不然者雖弄翰戲語率然而作必歸於此故天下信其誠爭師尊之孔子曰有德者必有言非有言也德之發於口者也又曰我戰則克祭則受福非能戰也德之見於怒者也李復古集一百卷鼂氏曰宋朝李迪復古濮州人少從柳開學為古文開嘗謂其門人張景髙辨曰此公輔器也景祐初應進士擢居第一纍遷翰林學士拜同中書門下平章事後致仕諡文定孫文懿集三十卷鼂氏曰宋朝孫抃字夢得眉山人六世祖長孺喜藏書貯以樓蜀人號書樓孫家天聖中進士甲科纍遷知制誥翰林學士承旨後參知政事諡文懿姚鉉文集二十卷鼂氏曰宋朝姚鉉字寶臣廬州合淝人中進士甲科文辭敏麗淳化中直史館應制賦賞花釣魚詩特被嘉賞翌日命中使就第賜白金褒奬之纍遷兩浙轉運使鉉雋爽尚氣薛映知杭州與之不協中以危法除其名卒年五十三夏文莊集一百卷鼂氏曰宋朝夏竦字子喬江州德安人以父死事補官舉賢良除光祿丞纍擢知制誥仁宗屢欲相之為言者所攻而寢初封英國公後改封鄭諡文莊貴顯凡四十年天資好學自經史百氏隂陽律歷之書無所不通善為文章尤長偶儷之語朝廷大典䇿屢以屬之為詩巧麗皆山勢蜂腰斷溪流燕尾分之類其集夏伯孫編次有宋次道序陳氏曰竦父死王事身中賢科又為文辭復多材術而不自愛至甘心姦邪聲伎之盛冠於承平夫婦反目隂慝彰播皆可為世戒也吕文靖試卷一卷陳氏曰丞相許國文靖公夀春吕夷簡坦夫撰咸平二年夀州應舉此其程文也真本藏范太史氏前有家狀大略與今同其所習曰春秋何論大義何論者當是何晏論語也其所問各十條皆非深義逐條所答才數句或止一言或直稱未審考官二人花書其上并批通不又禮行於郊賦建侯置守孰優論其所習又稱雜文時務䇿則不復存此可以見國初場屋事體文法簡寬士習純茂得人之盛後世反不能及文盛則實衰世變蓋可覩矣宋元憲集四十四卷一作湜中集二十卷鼂氏曰宋朝宋庠字公序開封雍邱人天聖中擢進士第一入翰林為學士皇祐元年拜相嘉祐中復為樞密使封莒國公以司空致仕初名郊字伯庠御史言其姓符國號名應郊天乃改今名遺命子孫不得以其文集流傳宋景文集一百五十卷鼂氏曰宋朝宋祁字子京與其兄郊同舉進士奏名第一章獻以為弟不可先兄乃擢郊第一而以祁為第十當是時兄弟俱以詞賦妙天下號大小宋纍遷知制誥除翰林學士承旨以文章擅名一時終不至大用衆頗惜之張方平為之請諡景文通小學故其文多竒字蘇子贍常謂其淵源皆有考竒嶮或難句世以為知言集有出麾小集西州猥稿之類合併而為一陳氏曰景文清約莊重不逮其兄以此不至公輔所撰唐書列傳不稱良史景文筆記余於為文似蘧瑗年五十知四十九年非余年六十始知五十九年非其庶幾至於道乎每見舊所作文章憎之必欲燒棄梅堯臣喜曰公之文進矣景文未第時為學於永陽僧舍或問曰君好讀何書答曰余最好大誥故景文為文謹嚴至修唐書其言艱其思苦蓋亦有自歟龎相國清風集十卷丞相龎籍撰司馬溫公序略曰公之勳業治行范景仁所為清風集敘言之詳矣公性喜詩雖相府機務之繁邉庭軍旅之急未嘗一日置不為凡所以怡神養志及逢時值事一寓之於詩其髙深閎逺之趣固非庸淺所可及至於用事精當偶對的切雖古人能者殆無以過及疾亟光時為諫官有謁禁走手啓參候公猶録詩十餘篇相示手注其後曰欲令吾弟知老夫病中尚有此意思耳字已慘淡難識後數日而薨嚮者嗣子某字𢡟賢已集其文為五十卷既而以文字之多懼世人傳者不能廣也又選詩之尤善者凡千篇為十卷命曰清風集略刻版摹之命光繼敘其事田公金巖集兩卷鼂氏曰皇朝田况字元均嘗登學究進士賢良科終尚書左丞嘗知成都聼斷之明以比張乖崖何聖從廬江文集二十卷刀筆五卷奏議二十卷鼂氏曰宋朝何郯字聖從成都人仁廟朝為御史諫官擢天章閣待制熙寧中以尚書右丞致仕歷漢梓永興河南四帥守天資好學殆廢寢食為詩章簡重淳淡有孟東野之風其仕臺諫時知無不言頗有直聲鮮于子駿志其墓集有李邦直序楊樂道集二十卷龍圗閣學士知諌院楊畋樂道撰王介甫序略曰公所為文莊厲謹潔類其為人而尤好為詩其詞平易不迫而能自道其意讀其書咏其詩視其平生之大節如此所謂善人之好學而能言者也安陽集五十卷陳氏曰丞相魏國公忠獻公安陽韓琦稚圭撰富文忠劄子集六卷奏議十二卷安邉䇿鼂氏曰宋朝富弼字彥國河南人天聖八年中制科至和二年召拜同中書門下平章事元豐中卒年八十諡文忠其為文章辨而不華質而不俚鼂以道為之序其略曰人孰不仰公使北之功上乃拜公樞密副使而公力辭至和之末請立皇嗣之功人或未聞公於褒進司徒則一命而不避公聞人語及北事便變色若不欲聞者至青州救災之功平居喜為人道之石介嘗以夔契方公矣而嚴事王沂公薦士後至將相者多矣而最喜劉槩數事皆世所罕知者又曰公於仁宗時言猶雨露也英宗時言猶海潮也神宗時言猶鳳鳴也文潞公集四十卷補遺一卷陳氏曰丞相介休文彥博寬夫撰石林葉氏序略曰公平生所為文章上自朝廷典册至於章奏議論下及詞賦歌詩間適之辭世猶未盡見兵興以來故家大族多奔走遷移於是公之集藏於家者散亡無餘其少子維申稍討求追輯猶得二百八十六篇以類編次為略集二十卷而屬某為序噫公之所謂文者逺矣重德偉度足以鎮服四夷精識逺慮足以錯綜萬務博聞強識足以貫通九流讜論嘉言足以弼成百度世之區區事其語言以一藝自名者未足以論公也公未嘗有意於為文而因事輒見操筆立成簡質重厚經緯錯出譬之鼖鼓鏞鐘音節疏緩雜然並奏於堂上不害其與嘒嘒簫韶舞百獸而諧八音也昔韓愈論于頔之文曰變化若雷霆浩瀚若江河正聲諧韶濩徑氣沮金石頔何足以當之其公之謂歟武溪集二十卷陳氏曰集賢院學士襄公曲江余靖安道撰徂徠集二十卷鼂氏曰石介字守道兖州奉符人天聖八年登進士第遷直集賢院篤學有大志嘗謂時無不可為不在其位則行其言雖獲禍至死不悔其為文章陳古今治亂成敗以指切當時無所忌諱作慶歷聖德詩分别邪正專斥夏竦其後守道死竦因誣以北走契丹請剖棺驗視云陳氏曰集中南京夏尚書啓及夫子廟上梁文皆為夏竦作介所謂大姦之去如距斯脫者豈當時竦之姦邪猶未著邪陸子遹刻於新定述其父放翁之言曰老蘇之文不能及然世自有公論歐公所以重介者非緣其文也竹溪林氏曰石徂徠之文多方少圎却略有典則滄浪集十五卷鼂氏曰蘇舜欽字子美易簡之孫杜祁公衍之壻也景祐中進士纍遷集賢校理監進奏院坐用故紙錢會客除名慷慨有大志好古工文章及廢居蘇州買水石作滄浪亭益讀書發其憤悶於歌詩其體豪放往往驚人又喜草書酣醉落筆爭為人所傳玩陳氏曰子美既廢逐嘗答韓持國書具見其意趣本傳載之歐公序言同時得罪者未幾復顯用而子美獨先沒可恨也歐陽氏序曰斯文金玉也棄擲埋沒糞土不能銷蝕其見遺於一時必有收而寶之於後世者雖其埋沒而未出其精氣光怪已能常自發見而物亦不能掩也故方其擯斥摧挫流離窮厄之時文章已自行於天下雖其怨家仇人及嘗能出力而擠之死者至其文章則不能少毁而掩蔽之也凡人之情忽近而貴逺子美屈於今世猶若此其伸於後世宜何如也公其可無恨豫嘗考前世文章政理之盛衰而怪唐太宗致治幾乎三王之盛而文章不能革五代之餘習後百有餘年韓李之徒出然後元和之文始復於古唐衰兵亂又百餘年而聖宋興天下一定晏然無事又幾百年而古文始盛於今自古治時少而亂時多幸時治矣文章或不能純粹或遲久而不相及何其難之若是歟豈非難得其人歟茍一有其人又幸而及出於治世世其可不為之貴重而愛惜之歟嗟吾子美以一酒食之過至廢為民而流落以死此其可以歎息流涕而為當世仁人君子之職位宜與國家樂育賢才者惜也子美之齒少於豫而子學古文反在其後天聖之間豫舉進士於有司見時學者務以言語聲偶擲裂號為時文以相誇尚而子美獨與其兄才翁及穆參軍伯長作為古歌詩雜文時人頗共非笑之而子美不顧也其後天子患時文之弊下詔書諷勉學者以近古由是其風漸息而學者稍趨古焉獨子美為於舉世不為之時其始終自守不牽世俗趨舍可謂特立之士也子美官至大理評事集賢校理而廢後為湖州長史以卒享年四十有一其狀貌竒偉望之昂然而即之溫溫久而愈可愛慕其材雖髙而人亦不甚嫉忌其擊而去之者意不在子美也後村劉氏曰蘇子美歌行雄放於聖俞軒昂不羈如其為人及蟠屈為吳體則極平夷妥帖絶句云别院深深夏簟清石榴開遍透簾明樹隂滿地日卓午夢覺流鶯時一聲又云春隂垂野草靑青時有幽花一樹明晚泊孤舟古祠下滿川風雨看潮生極似韋蘇州垂虹亭觀中秋月云佛氏解為銀色界仙家多住玉華宫極工而世惟詠其上一聨金鉼彩虹之句何也山蟬帶響穿踈户野蔓蟠青入破窗亦佳句梅聖俞宛陵集六十卷外集十卷鼂氏曰梅堯臣字聖俞宛陵人少以蔭補吏纍舉進士輒抑於有司幼習為詩出語已驚人既長學六經仁義之説其為文章簡古純粹然最樂為詩歐陽永叔與之友善其意如韓愈之待郊島云陳氏曰凡五十九卷為詩他文賦才一卷而已謝景初所集歐陽公為之序外集者吳郡宋績臣所序謂皆前集所不載今考之首卷諸賦已載前集矣不可曉也聖俞為詩古淡深逺有盛名於一時近世少有喜者或加訾毁惟陸務觀重之此可為知者道也自世競宗江西已看不入眼况晚唐卑格方錮之時乎杜少陵猶敢竊議妄論其於宛陵何有歐陽氏序略曰聖俞文章簡古純粹不求茍説於世世之人徒知其詩而已然時無賢愚語詩者必求之聖俞聖俞亦自以其不得志者樂於詩而發之故其平生所作於詩尤多世既知之矣而未有薦於上者昔王文康公嘗見而歎曰二百年無此作矣雖知之深亦不果薦也若使其幸得用於朝廷作為雅頌以歌詠大宋之功德薦之清廟而追商周魯頌之作者豈不偉歟奈何使其老不得志而為窮者之詩乃徒發於蟲魚物類羈愁感歎之言世徒喜其工不知其窮之久而將老也可不惜哉聖俞詩既多不自收拾其妻之兄子謝景初懼其多而易失也取其自洛陽至於吳興以來所作次為十卷豫嘗嗜聖俞詩而患不能盡得之遽喜謝氏之能類次也輒序而藏之其後十五年聖俞以疾卒於京師余既哭而銘之因索於其家得其遺稿千餘篇并舊所藏掇其尤者六百七十七篇為一十五卷又詩話曰子美筆力豪雋以超邁橫絶為竒聖俞覃思精微以深逺間淡為意各極其長雖善論者不能優劣也余嘗於水谷夜行詩略道其一二云子美氣尤雄萬竅號一噫有時肆顛狂醉𢎞灑滂沛譬如千里馬已發不可殺盈前盡珠璣一一難揀汰梅翁事清切石齒激寒瀨作詩三十年視我猶後輩文辭愈精新心意雖老大有如妖韶女老自有餘態近詩尤古硬咀嚼苦難嘬又如食橄欖真味久愈在蘇豪以氣轢舉世徒驚駭梅窮我獨知古貨今難賣語雖非工謂粗得髣佛然不能優劣之也漁隱叢話聖俞詩工於平淡自成一家如東溪云野鳬眠岸有間意老樹著花無醜枝山行云人家在何處雲外一聲雞春隂云鳩鳴桑葉吐村暗杏花殘杜鵑云月樹啼方急山房人未眠似此等句須細味之方見其用意也張浮休評聖俞詩如深山道人草衣菌茹土形木質雖王公大人見之不覺屈膝許彥周詩話聖俞詩句之精鍊如焚香露蓮泣聞磬清鷗邁之類宜乎為歐公所稱其他古體如朱弦疏越一唱三嘆讀者當以意求之後村劉氏曰歐公詩如昌黎不當以詩論本朝詩惟宛陵為開山祖師宛陵出然後桑濮之哇淫稍息風雅之氣脈復續其功不在歐尹下世之學梅詩者率以為淡集中如葑上春田濶蘆中走吏參海貨通閭市漁歌入縣樓白水照茆屋清風生稻花霜落熊升樹林空鹿飲溪河漢微分練星辰淡布螢每令夫結友不為子求郎山形無地接寺界與波分山風來虎嘯江雨過龍腥之類殊不草草蓋逐字逐句銖銖而較者決不足為大家數而前輩號大家數者亦未嘗不留意於句律也尹師魯集二十卷鼂氏曰尹洙字師魯河南人天聖中進士以薦為館閣校勘纍遷右司諫知渭州兼鎮涇源路經略公事爭城永洛事為董士亷所訟遣御史就鞫不能得其罪猶貶筠州監酒師魯內剛而外和與人言必極辨其是非如前世治亂沿革之變靡不該博人有疑不能通為指畫講説皆釋然自得尤長於春秋文章自唐末卑弱柳開始為古文天聖初與穆修大振起之陳氏曰其父仲宣明經入仕父子皆歐陽公志其墓洙與穆伯長同為古文范文正公為作集序歐陽公亦稱其文簡而有法以剛直數忤時卒以貶死死時精明不亂有過人者石林葉氏曰尹師魯不長於詩亦自以為無益而廢事故方洛中歐陽文忠公與梅聖俞鋭意作詩時獨不作余平生僅見其三五篇而已吳下施昌言家子弟有其和昌言一絶云千里觀風使節來百城舒慘係行臺威嚴少霽猶知幸誰信芳尊盡日開氣格終自不凡竹溪林氏曰本朝古文自尹穆始倡為之然二公去華就實可謂近古而未盡變化之妙所以歐公謂老泉曰於文得尹師魯孫明復而意猶不足此語見子由作公墓碑書判一卷陳氏曰尹洙撰天聖二年進士後以安德軍節推試書判拔萃科中之前十道是程文餘當為擬卷本朝惟余安道亦中是科集中有判詞二卷文鑑亦載一二又有王回判二道而回不以此科進餘未有聞尹子漸集六卷陳氏曰太常博士知懷州河南尹源子漸撰師魯之兄焞彥明其孫也六一居士集一百五十二卷附録四卷年譜一卷鼂氏曰歐陽修字永叔吉州人舉進士纍遷知制誥夏竦以永叔黨於杜韓范富因以外甥張氏事汚之下開封府治之無狀坐用張氏奩中物市田出知滁州召入修唐書為翰林學士未幾參知政事蔣之竒言其帷箔事連其子婦吳氏詔詰之竒辭窮坐貶年六十乞致仕卒諡文忠博極羣書好學不倦尤以奬進天下士為己任延譽慰籍極其力而後已於經術治其大指不求異於諸儒與尹洙皆為古學遂為天下宗匠蘇明允以其文詞令雍容似李翺切近適當似陸贄而其才亦似過此兩人至其作唐書五代史不愧班固劉向也獨議濮邸事議者不以為是陳氏曰本朝初為古文者柳開穆修其後有二尹二蘇兄弟歐公本以詞賦擅名場屋既得韓文刻意為之雖皆在諸公後而獨出其上遂為一代文宗其集遍行海內而無善本周益公解相印歸用諸本編校定為此本且為之年譜曰居士集外集而下至於書簡集凡十名刋之家孰其子綸又以所得歐陽氏傳家本乃公之子棐叔弼所編次者屬益公舊客曽三異校正益完善無遺恨矣居士集歐公手所定也東坡蘇氏集序略曰自漢以來道術不出於孔氏而亂天下者多矣晉以老莊亡梁以佛亡莫或正之五百餘年而後得韓愈學者以愈配孟子蓋庶幾焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以達於孔氏著禮樂仁義之實以合於大道其言簡而明信而通引物連類折之於至理以服人心故天下翕然師尊之自歐陽子之存世之不説者譁而攻之能折困其身而不能屈其言士無賢不肖不謀而同曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯文終有愧於古士亦因陋守舊論卑而氣弱自歐陽子出天下爭自濯磨以通經學古為髙以救時行道為賢以犯顔納諌為忠長育成就至嘉祐末號稱多士歐陽子之功為多嗚呼此豈人力也哉非天其孰能使之歐陽子沒十有餘年士始為新學以佛老之似亂周孔之實識者憂之賴今天子明聖詔修取士法風厲學者專治孔氏黜異端然後風俗一變考論師友淵源所自復知誦習歐陽子之書余得其詩文七百六十六篇於其子棐乃次而論之曰歐陽子論大道似韓愈論事似陸贄記事似司馬遷詩賦似李白此非余言也天下之言也石林葉氏曰歐陽文忠公晚年取平生所為文自編次今所謂居士集者往往一篇至𢾗十過有纍日去取不能決者一夕大寒燭下至夜分薛夫人從旁語曰寒甚當早睡胡不自愛目力此已所作安用再三閲寧畏先生嗔邪公徐笑曰吾正畏先生嗔耳又曰歐公詩始矯崑體專以氣格為主故其詩多平易踈暢律詩意所到處雖語有不倫亦不復問而學之者往往失於快直傾囷倒廩無復餘地然公詩好處豈專在此如崇徽公主手䀶詩玉顔自昔為身纍肉食何人與國謀此是兩段大議論抑揚曲折發見於七字之中婉麗雄勝字字不失相對雖崑體之工者亦未易此意所曽處如是乃為至到張浮休評歐陽永叔詩如春服乍成淥酒既釃登山臨水竟日忘歸朱子語録韓退之及歐蘇諸公議論不過是主於詞少間却是邉頭帶得説些道理其本意終自可見歐公文意及三蘇文好處只是平易説道理初不曽使差異底字换却尋常底字歐陽公文字敷腴溫潤竹溪林氏曰歐曽老蘇東坡所以絶出於唐以後者以其辭必已出不蹈襲前人而又自然也蹈襲者非剽竊言語但體製相似筆力相類皆是也仲朴翁文集十二卷尚書屯田員外郎仲訥朴翁撰歐陽公序略曰君生於有宋百年全盛之際儒學文章得用之時宜其馳騁上下發揮其所畜振耀於當世而獨韜藏抑鬱久伏而不顯者蓋其不茍屈以合世故世亦莫之知也豈非知命之君子歟余謂君非徒知命而不茍屈亦自負其所有者謂雖抑於一時必將伸於後世而不可掩也君之既沒富春孫莘老狀其行以告於史臨川王介甫銘之石以藏諸幽而余又序其集以行於世然則君之不茍屈於一時而有待於後世者其不在吾三人者邪江鄰幾文集二十卷刑部郎中修起居注江休復鄰幾撰歐陽公序略曰鄰幾毅然仁厚君子也雖知名於時仕宦久而不進晚而朝廷方將用之未及而卒其學問通博文詞雅正深粹而議論多所發明詩尤清淡間肆可喜其文已行於世矣固不待余言而為重輕也陸子履寓山集十二卷集賢修撰洛陽陸經子履撰周平園序略曰公與歐陽文忠公周旋館閣詩文往復相與至厚惜仕不偶陷於朋黨屢起屢仆晚遇裕陵方嚮於用則已老矣余嘗謂尹師魯蘇子美江鄰幾梅聖俞丁元珍皆著美名負屈稱與子履大略相似彼五賢者得文忠銘其藏序其文姓名鏗轟炳耀至今蕩人耳目獨公以死後不得與於斯文或者遂謂公生既不遇其沒又重不幸也余曰不然公當古文復興時文忠實與為友其出倅宿州送以詩曰子履自少聲名馳落筆文章天下知開懷吐胸不自疑世路迫窄多穽機鬢毛零落風霜摧十年江湖千首詩又曰一自蘇梅閉九泉始開東潁播新篇暮年酬唱尤多有怕逢詩敵力難當及敢期佳句報琅玕之句則是公之生也已為文忠所稱道如此尚何待於身後其垂名不朽亦豈下於五賢哉余故表而出之云文獻通考卷二百三十四
