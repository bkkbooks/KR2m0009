body:
  text: 文獻通考卷二百八十六鄱陽馬端臨貴與著象緯考九孛彗春秋魯文公十四年秋七月有星孛入於北斗孛彗也既見而移入北斗非常所有故書之左傳周内史叔服曰不出七年宋齊晉之君皆將死亂後三年宋弑昭公五年齊弑懿公七年晉弑靈公史服但言事徵而不論其占固非末學所得詳言公羊傳孛者何彗星也狀如彗其言入於北斗何據大辰不言入又不言孛名北斗有中也中者魁中何以書記異也孛者邪亂之氣彗者埽舊布新之象穀梁傳孛之為言猶茀也其曰入北斗斗有環域也據孛於大辰及東方皆不言入此言入者明斗有規郭入其魁中也劉向曰北斗貴星人君之象也彗星亂臣之類言邪亂之臣將弑君昭公十年冬有星孛於大辰大辰房心尾也傳曰有星孛於大辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢夏户雅反下文同見賢遍反申須曰彗所以除舊布新也申須魯大夫彗似跪反又息遂反天事恒象天道恒以象類告示人今除於火火出必布焉諸侯其有火災乎今火向伏故知當須火出乃布散為災向許亮反又作嚮梓慎曰徃年吾見之是其徵也徵始有形象而著也火出而見前年火出時見賢遍反下及注同今兹火出而章必火入而伏隨火沒也其居火也乆矣歴二年其與不然乎言必然也與如字又音預火出於夏為三月謂昏見於商為四月於周為五月夏數得天得天正若火作其四國當之在宋衛陳鄭乎宋大辰之虚也大辰大火宋分野陳太皥之虚也太皥居陳木火所自出鄭祝融之虚也祝融髙辛氏之火正居鄭皆火房也房舎也星孛及漢漢水祥也天漢水也衛顓頊之虚也故為帝邱衛今濮陽縣昔帝顓頊居之其城内有顓頊冡濮音卜其星為大水衛星營室營室水也水火之牡也牡雄也牡茂后反其以丙子若壬午作乎水火所以合也丙午火壬子水水火合而相薄水少而火多故水不勝火薄本又作搏音博若火入而伏必以壬午尚未知今孛星當復隨火星俱伏不故言若復扶又反不過其見之月火在周之五月公羊傳其言如大辰何據北斗言入於大辰非常名在大辰也大辰者何大火也大火謂心大火為大辰伐為大辰伐謂參伐也大火與伐天所以示民時早晩天下所取正故謂之大辰辰時也北辰亦為大辰北辰北極天之中也常居其所迷惑不知東西者須視北辰以别心伐所在故加亦亦者兩相須之意也二十六年齊有彗星出齊之分野不書魯不見彗齊侯使禳之晏子曰無益也祗取誣焉誣欺也天道不謟不貳其命謟疑也若之何禳之且天之有彗也以除穢也君無穢徳又何禳焉若徳之穢禳之何損哀公十三年冬十一月有星孛於東方平旦衆星皆沒而孛乃見故不言所在之次公羊孛者何彗星也其言於東方何據北斗言星名也見於旦也旦者日方出時宿不復見故言東方知為旦貞定王二年彗星見先公曰史表稱彗見於秦愚按春秋終於魯哀公之十四年而麟獲於魯左傳終於魯哀公之二十六年明年而彗見於秦天人之理何其昭昭也秦人亡二周滅六國包舉宇内并吞八荒廢井田開阡陌埽除先王之典籍彗之為禍烈矣表彗見以為傳鑑補遺之首書考王八年彗星見赧王十年彗星見十二年彗星見十九年彗星見秦始皇七年彗星先出東方見北方五月見西方十六日九年彗見或竟天四月見西方又見北方從斗以南八十日十三年正月彗星見東方三十三年明星出西方徐廣曰皇甫謐云彗星也漢天文志秦始皇之時十五年間彗星四見乆者八十日長或竟天後秦遂以兵兼六國外攘夷狄死人如麻漢髙帝三年七月有星孛於大角旬餘乃入劉向以為是時項羽為楚王伯諸侯而漢已定三秦項羽相距滎陽天下歸心於漢楚將滅故彗除王位也一曰羽阬秦卒燒宫室弑義帝亂王位故彗加之也文帝後七年有星孛於西方其本直尾箕末指虚危長丈餘及天漢十六日不見劉向以為尾宋地今楚彭城也箕為燕又為吳越齊宿在漢中負海之國水澤地也是時景帝新立信用鼂錯將誅正諸侯其象先見後三年七國反皆誅滅云孝景二年彗星出西南其三年吳楚七國反中三年三月丁酉彗星見西北其色白長丈在觜觹且去益小十五日不見占曰必有破國亂君伏死其辜觜觹梁也其年梁王得罪孝武建元三年二月有星孛於注張歴太微干紫宫至於天漢春秋星孛於北斗齊魯晉之君皆將死亂今星孛歴五宿其後濟東膠西江都王皆坐法削黜自殺淮南衡山反誅三年四月有星孛於天紀至織女占曰織女有女變天紀為地震至四年十月而地動其後陳皇后廢六年六月有星孛於北方劉向以為明年淮南王安有邪謀而陳皇后驕恣其後廢后王誅八月長星出於東方長終天三十日去占曰是為蚩尤旗見則王者征伐四方其後兵誅四夷連數十年元狩四年四月長星又出西北是時伐胡尤甚班固曰建元六年蚩尤之旗見其長竟天後遂命將出征畧取河南建置朔方其春戾太子生自是之後師行三十年所誅屠夷滅死者不可勝數及巫蠱事起京師流血僵尸數萬太子子父俱敗故太子生長於兵與之終始何獨一嬖臣哉劉奉世曰按武紀建元六年長星見更元光至元朔元年春戾太子始生贊殊為乖誤元封元年五月有星孛於東井又孛於三台其後江充作亂京師紛然此明東井三台為秦地效也元封中星孛於河戍占曰南戍為越門北戍為胡門其後漢兵擊抜朝鮮以為樂浪元莵郡朝鮮在海中越之象也居北方胡之域也太初中星孛於招揺星𫝊曰客星守招揺蠻夷有亂民死君其後漢兵擊大宛斬其王招揺逺夷之分也宣帝地節元年正月有星孛於西方去太白二丈所劉向以為太白為大將彗孛加之埽滅之象也明年大將軍霍光薨後二年家夷滅元帝初元五年彗星出西北赤黄色長八尺所後數日長丈餘東北指在參分後二嵗餘西羌反成帝建始元年正月有星孛於營室青白色長六七丈廣尺餘劉向谷永以為後宫懷姙之象彗星加之將有害懷姙絶繼嗣者一曰後宫將受害也其後趙皇后立妹為昭儀害兩皇子上遂無嗣趙后姊妹卒皆伏誅元延元年七月辛未有星孛於東井踐五諸侯孟康曰五諸侯星名出河戍北率行軒轅太微後日六度有餘晨出東方十三日夕見西方犯次妃長秋斗填􅑣炎再貫紫宫中大火當後達天河除於妃后之域南逝度犯大角攝提至天市而按節徐行服䖍曰謂行遲炎入市中旬而後西去五十六日與蒼龍俱伏谷永對曰上古以來大亂之極所希有也察其馳騁驟歩芒炎或長或短所歴奸犯師古曰奸音干内為後宫女妾之害外為諸夏叛逆之禍劉向亦曰三代之亡攝提易方秦項之滅星孛大角是歲趙昭儀害兩皇子後五年成帝崩昭儀自殺哀帝即位趙氏皆免官爵徙遼西哀帝無嗣平帝即位王莽用事追廢成帝趙皇后哀帝傅皇后皆自殺外家丁傅皆免官爵徙合浦歸故郡平帝無嗣莽遂簒國哀帝建平二年二月彗星出牽牛七十餘日𫝊曰彗所以除舊布新也牽牛日月五星所從起歴數之元三正之始彗而出之改更之象也其出乆者為其事大也其六月甲子夏賀良等建言當改元易號增漏刻詔書改建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度八月丁巳悉復蠲除之賀良及黨與皆伏誅流放其後卒有王莽簒國之禍王莽地皇三年十一月有星孛於張東南行五日不見孛星者惡氣所生為亂兵或謂之彗星所以除穢而布新也張為周地星孛於張東南行即軫翼之分軫翼為楚是周楚地將有兵亂後一年正月光武起兵舂陵破南陽更始為天子都雒陽西入長安光武興河北復都雒陽居周地除穢布新之象光武建武十五年正月丁未彗星見昴炎長三丈韓楊占曰在昴大國起兵也稍西北行入營室犯離宫韓楊占曰彗出營室東壁之間為兵起也三月乙未至東壁滅見四十九日彗星為兵入除穢昴為邉兵彗星出之為有兵至十一月定襄都尉隂承反太守隨誅之盧芳從匈奴入居髙桞至十六年十月降上璽綬一曰昴星為獄事是時大司徒歐陽歙以事繫獄踰歲死營室天子之常宫離宫妃后之所居彗星入營室犯離宫是除宫室也是時郭皇后已疏至十七年十月遂廢為中山太后立隂貴人為皇后除宫之象三十年閏月甲午水星在東井二十度生白氣東南指炎長五尺為彗東北行至紫宫西藩上五月甲子不見凡見三十一日水常以夏至放於東井閏月在四月尚未當見而見是贏而進也東井為水衡水出之為大水是歲五月及明年郡國大水壊城郭傷禾稼殺人民白氣為喪有炎作彗彗所以除穢紫宫天子之宫彗加其藩除宫之象荆州星經曰彗在東井國大人死七十日主當之五十日相當之三十日兵將當之後三年光武帝崩孝明帝永平三年六月丁卯彗星出天船北長二尺所稍北行至亢南百三十五日去天船為水彗出為大水是歲伊雒水溢到津城門壊伊橋郡七縣三十二皆大水八年六月長星出桞張三十七度犯軒轅刺天船陵太微氣至上階凡見五十六日去桞周地是歲多雨水郡十四傷稼十八年六月己未彗星出張長三尺轉在郎將南入太微皆屬張張為周地東都太微天子廷彗星犯之為兵喪其八月帝崩孝章建初元年八月庚寅彗星出天市長二尺所稍行入牽牛三度積四十日稍滅十二月戊寅彗星出婁三度長八九尺稍入紫宫中百六日滅為大人忌後四年明徳皇后崩孝安永初三年十二月彗星起天苑南東北指長六七尺色蒼白天苑為外軍彗星出其南為外兵其後任尚馬賢等擊羌降之孝順永建六年彗星出於斗牽牛滅於虚危虚危為齊牽牛吳越故海賊浮於會稽山賊㨗於濟南六年二月丁巳彗星見東方長六七尺色青白西南指營室及墳墓星郗萌占曰彗星出而中營室天下亂易政以五色占其吉凶丁丑彗星在奎一度長六尺癸未昏見河圖曰彗星出貫奎庫兵悉出禍在强侯外夷胡應逆首誅也西北歴昴畢甲申在東井遂歴輿鬼桞七星張光炎及三台至軒轅中滅古今注曰五月庚寅太白畫見十一月甲午太白晝見營室者天子常宫墳墓主死彗星起而在墳墓營室不出五年天下有大喪後四年孝順帝崩昴為邉兵又為趙羗周馬父子後遂為冦又劉文刦清河相謝暠欲立王蒜為天子暠不聽殺暠王閉門距文官兵捕誅文蒜以惡人所刦廢為尉氏侯又徙為犍陽都鄉侯薨國絶歴東井輿鬼為秦皆羗所攻鈔炎及三台為三公是時太尉杜喬及故太尉李固為梁冀所䧟入坐文書死及至注張為周滅於軒轅中為後宫其後懿獻后以憂死梁氏被誅是其應也孝桓建和元年八月乙丑彗星芒長五尺見天市中東南指色黄白九月戊辰不見時梁冀驕亂延熹四年五月辛酉客星在營室稍順行生芒長五尺所至心一度轉為彗占為大喪後四年鄧氏以憂死孝靈光和元年八月彗星出亢北入天市中長數尺稍長至五六丈赤色經歴十餘宿八十餘日乃消於天苑中彗除天市天帝將徙帝將易都至初平元年獻帝遷都長安三年冬彗星出狼弧東行至於張乃去張為周地彗星犯之為兵亂後四年京都大發兵擊黄巾賊七月彗星出三台下東行入太微至太子幸臣二十餘日而消彗入太微天下易主至中平六年宫車晏駕光和五年二月彗星出奎逆行入紫宫後三出六十餘日乃消占曰彗除紫宫天下易主孝獻初平三年九月蚩尤旗見長十餘丈色白出角亢之南占曰蚩尤旗見則王征伐四方其後曹公征討天下且三十年四年十月孛星出兩角間東北行入天市中而滅占曰彗除天市天帝將徙帝將易都是時上在長安後二年東遷明年七月至雒陽其八月曹公迎上都許建安五年十月辛亥有星孛於大梁冀州分也時袁紹在冀州其年十一月紹軍為曹軍所破七年夏紹死後曹公遂取冀州九年十一月有星孛於東井輿鬼入軒轅太微十一年正月星孛於北斗首在斗中尾貫紫宫及北辰占曰彗星掃太微宫人主易位其後魏文帝受禪十二年十月辛卯有星孛於鶉尾荆州分也時荆州牧劉表據荆州時益州從事周羣以荆州牧將死而失土明年秋表卒以少子琮自代曹公將伐荆州琮懼舉軍詣公降十七年十二月有星孛於五諸侯周羣以為西方專據土地者皆將失土時益州牧劉璋據益州漢中太守張魯别據漢中韓遂據凉州宋建别據枹罕明年冬曹公遣偏將擊凉州十九年獲宋建韓遂逃於羌中病死其年璋失益州二十年秋公攻漢中魯降二十三年三月孛星辰見東方二十餘日夕出西方犯歴五車東井五諸侯文昌軒轅后妃太微鋒炎指帝座占曰除舊布新之象也魏文帝黄初六年十月乙未有星孛於少微歴軒轅占為兵喪除舊布新之象時帝軍廣陵辛丑親御甲胄觀兵明年五月帝崩明帝太和六年十一月丙寅有星孛於翼近太微上將星占曰為兵喪甘氏曰孛彗所當之國是受其殃翼又楚分野孫權封略也明年權有遼東之敗又明年諸葛亮入秦川孫權發兵緣江淮屯要衝權自圍新城以應亮天子東征權青龍四年十月甲申有星孛於大辰長三尺乙酉又孛於東方十一月己亥彗星見犯宦者天紀星占曰大辰為天王天下有喪劉向五紀論曰春秋星孛於東方不言宿者不加宿也宦者在天市為中外有兵天紀為地震孛彗主兵喪景初二年八月彗星見張長三尺逆西行四十一日滅占同上張周分野少帝正始元年十月乙酉彗星見西方在尾長二丈拂牽牛犯太白十一月甲子進犯羽林占曰尾為燕又為吳牛亦吳越之分太白為上將羽林為中軍兵為吳越有喪中軍兵動二年五月吳遣三將寇邉吳太子登卒六月宣帝討諸葛恪於皖太尉滿寵薨六年八月戊午彗星見七星長二尺色白進至張積二十三日滅七年十一月癸亥又見軫長一尺積五十六日滅九年三月又見昴長六尺色青白芒西南指七月又見翼長二尺進至軫積四十二日滅按占曰七星張為周分野翼軫為楚昴為趙魏彗所以除舊布新主兵喪也嘉平元年宣帝誅曹爽兄弟又其黨與皆夷三族京師嚴兵三年誅楚王彪又襲王凌於淮南淮南東楚也魏諸王幽於鄴嘉平三年十一月癸亥有星孛於營室西行積九十日滅占曰有兵喪室為後宫後宫有亂四年二月丁酉彗星見西方在胃長五六丈色白芒南指貫參積二十日滅五年十一月彗星又見軫長五丈在太微左執法西南指積百九十日滅按占曰胃兖州之分野參主兵太微天子庭執法為執政孛彗為兵喪除舊布新之象正元元年二月李豐豐弟翼后父張緝等謀亂皆誅皇后亦廢九月廢帝為齊王髙貴鄉公正元元年十一月白氣出南斗側廣數丈長竟天王肅曰蚩尤之旗也東南其有亂乎二年正月有彗星見於吳楚分西北竟天鎮東大將軍毋邱儉等據淮南叛景帝討平之按占蚩尤旗見王者征伐四方自後又征淮南西平巴蜀是嵗吳主孫亮立吳五鳳元年長星見斗牛吳越分按占吳有兵喪除舊布新之象也太平三年孫綝盛兵圍宫廢亮為會稽王故國志又書於吳也淮南江東同揚州地故於時變見吳楚之分則魏之淮南多與吳同其災是以毋邱儉等以孛為己應遂起兵而敗後三年即魏甘露二年諸葛誕又反淮南吳遣將救之及城䧟誕衆與吳兵死沒各數萬人猶前長星之應也魏甘露二年十一月彗星見角色白占曰彗星見兩角間色白者軍起不戰邦有大喪景元元年髙貴鄉公為成濟所害元帝景元三年十一月壬寅彗星見亢色白長五寸轉北行積四十五日滅占曰為兵喪一曰彗星見亢天子失徳四年鍾會鄧艾伐蜀剋之二將俱以反誅咸熙二年五月彗星見王良長丈餘色白東南指積十二日滅占曰王良天子御駟彗星掃之禪代除舊布新之象也白色為喪王良在東壁宿又并州之分野八月元帝崩十二月武帝受魏禪晉武帝泰始四年正月丙戌彗星見軫青白色西北行又轉東行占曰為兵喪軫又楚分野三月皇太后王氏崩十月吳寇江夏襄陽五年九月星孛於紫宫占如上紫宫天子内宫十年武元楊皇后崩十年十二月有星孛於軫占曰天下有兵起軫又楚分野咸寜二年六月甲戌星孛於氐占曰天子失徳易政氐又兖州分七月星孛於大角大角為帝座八月星孛於太微至翼北斗三台占曰太微天子庭大人惡之一曰有改王翼又楚分野北斗主殺罰三台為三公三年正月星孛於西方三月星孛於胃胃徐州分四月星孛於女御女御為後宫五月又孛於東方七月星孛紫宫占曰天下易主四年四月蚩尤旗見東井後年傾三方伐吳是其應也五年三月星孛於桞四月又孛於女御七月孛於紫宫占曰外臣陵主桞又三河分野大角太微紫宫女御並為王者明年吳亡是其應也孛主兵喪征吳之役三河徐兖之兵悉起交戰於吳楚之地吳丞相都督以下梟戮十數偏裨行陣之徒馘斬萬計皆其徵也太康二年八月有星孛於張占曰為兵喪十一月星孛於軒轅占曰後宫當之四年三月戊申星孛於西南是年齊王攸任城王陵琅琊王伷新都王詠薨八年九月星孛於南斗長數十丈十餘日滅占曰斗主爵禄國有大憂一曰孛於斗王者疾病天下易政大亂兵起永熙元年四月客星在紫宫占曰為兵喪太康末武帝耽宴逰多疾病是月己酉帝崩元康元年賈后誅楊駿及其黨與皆夷三族楊太后亦見弑又誅汝南王亮太保衛瓘楚王瑋王室兵喪之應也惠帝元康五年四月有星孛於奎至軒轅太微經三台大陵占曰奎為魯又為庫兵軒轅為後宫太微天子庭三台為三司大陵有積尸死喪之事其後武庫火西羗反後五年司空張華遇禍賈后廢死魯公賈謐誅又明年趙王倫簒位於是三王興兵討倫兵士戰死十餘萬人永康元年十二月彗星出牽牛之西指天市占曰牛者七政始彗出之改元易號之象也天市一名天府一名天子旗帝座在其中明年趙王倫簒位改元尋為大兵所滅二年四月彗見齊分占曰齊有喪時齊王冏起兵討趙王倫倫滅冏明年復敗泰安元年四月彗星晝見二年三月彗見東方指三台占曰兵喪象三台為三公三年正月東海王越執太尉長沙王乂張方又殺之永興二年八月有星孛於昴畢占曰為兵喪昴畢又趙魏分野十月丁丑有星孛於北斗占曰旋璣更授天子出走又曰彊國發兵諸侯争權是後諸王交兵皆有應明年惠帝崩成帝咸和四年七月有星孛於西北犯斗二十三日滅占曰為兵亂十二月郭黙殺江州刺史劉允荆州刺史陶侃討黙斬之時石勒又始僭號咸康二年正月辛巳彗星夕見西方在奎占曰為兵喪奎又為邉兵三年正月石季龍僭天王位四年石季龍伐慕容皝不克既退皝追擊之又破麻秋時皝稱蕃邉兵之應也六年二月庚辰有星孛於太微七年三月杜皇后崩康帝建元元年十一月六日彗星見亢長七尺白色占曰亢為朝廷主兵喪二年康帝崩穆帝永和五年十一月乙卯彗星見於亢芒西向色白長一丈六年正月丁丑彗星又見於亢占曰為兵喪疾疫其五年八月褚裒北征兵敗十一月冉閔殺石遵又盡殺胡十餘萬人於是中土復大亂十二月褚裒薨是年大疫升平二年五月丁亥彗星出天船在胃占曰為兵喪除舊布新出天船外夷侵一曰為大水四年五月天下大水五年穆帝崩哀帝興寧元年八月有星孛於角亢入天市按占曰為兵喪三年正月皇后王氏崩二月帝崩慕容恪攻沒洛陽沈勁等戰死孝武寜康元年正月丁巳有星孛於女虚經氐亢角軫翼張至二月丙戌彗星見於氐九月丁丑有星孛於天市占曰為兵喪太元元年七月苻堅破凉州虜張天錫太元十五年七月壬申有星孛於北河或經太微三台文昌入北斗色白長十餘丈八月戊戌入紫微乃滅占曰北河或一名胡門胡門有兵喪掃太微入紫微王者當之三台為三公文昌為將相將相三公有災入北斗諸侯戮一曰掃北斗强國發兵諸侯争權大人憂二十一年帝崩隆安元年王恭殷仲堪桓元等𤼵兵請誅王國寳朝廷從而殺之司馬道子由是失勢禍亂成矣安帝隆安四年二月己丑有星孛於奎長三丈上至閣道紫宫西蕃入北斗魁至三台三月遂經於太微帝座端門占曰彗星掃天子庭閣道易主之象也經三台入北斗占同上條十二月戊寅有星孛於貫索天市天津占曰貴臣獄死内外有兵喪天津為賊斷王道天下大動按占災在吳越五年二月有孫恩兵亂攻侵郡國於是内外戒嚴營陣屯守柵斷淮口九月桓元表至逆謀陵上其後元遂簒位亂京都大饑人相食百姓流亡皆其應也義熙十一年五月甲申彗星二出天市掃帝座在房心北房心宋之分野按占得彗柄者興除舊布新宋興之象十四年五月庚子有星孛於北斗魁中七月癸亥彗星出太微西柄起上相星下芒漸長至十餘丈進掃北斗紫微中台占曰彗出太微社稷亡天下易主入北斗紫微帝宫空十四年劉裕還彭城受宋公十二月安帝崩恭帝元年正月戊戌有星孛於太微西蕃占曰革命之徵其年宋有天下宋武帝永初三年二月丙戌有星孛於虚危十一月戊午有星孛於營室少帝景平元年正月乙卯有星孛於東壁十月己未有星孛於氐文帝元嘉十九年九月丙辰有客星在北斗因為彗入文昌貫五車掃畢拂天節經天苑季冬乃滅二十六年十月癸卯彗星見於太微二十八年四月乙卯彗星見於昴六月壬子見太微中對帝座次年元凶劭構逆帝崩齊東昏侯永元三年正月乙巳長星見竟天二月壬戌蚩尤旗見和帝中興元年三月乙巳彗星竟天梁武帝中大通五年正月己酉長星見大同五年十月辛丑彗出南斗長一尺餘東南指漸長一丈餘十一月乙卯至婁滅占曰天下有謀王者其八年正月安成民劉敬躬挾左道反黨與數萬九年李賁稱皇帝於交州陳文帝天嘉元年九月癸丑彗星長四尺芒指西南占曰彗星見則敵國兵起得本者勝其年周將獨孤盛領衆趣巴湘侯瑱襲破之六年六月辛酉有彗長丈餘見於上台占曰隂謀姦宄起一曰宫中火起其後帝崩安成王廢少帝而自立隂謀之應也廢帝光大二年六月丁亥彗星見宣帝大建七年四月丙戌有星孛於大角占曰人主亡十二年十二月辛巳彗星見西南占曰有兵喪明年帝崩始興王叔陵作亂後魏明元帝泰常元年五月甲申彗星二見北齊武成帝河清四年三月彗星見占曰除舊布新易王至四月傳位太子後主天統元年六月壬戌彗星出文昌東北其大如手後移長乃至丈餘百日乃滅四年彗星見於東井七月孛星見房心白如粉絮大如斗東行八月入天市漸長四丈犯瓠𤓰歴虚危入室犯離宫九月入奎至婁而滅孛者孛亂之氣占曰兵喪並起易政大臣誅其後太上皇崩至武平二年琅琊王儼矯詔誅錄尚書和士開既而殺儼周武帝保定五年六月庚申彗星出三台入文昌犯上將後經紫宫西垣入危漸長一丈餘指室壁後百餘日稍短長二尺五寸滅虚危齊之分野天和三年六月甲戌彗見東井長一丈上白下赤而光漸東行至七月癸卯在鬼北八寸所乃滅占曰為兵國政崩壊將軍死大臣誅建徳三年四月乙卯有星孛於紫宫垣外大如拳色赤白指五帝座漸東南行稍長一丈五尺五月甲子至上台北乃滅占曰天下易政無徳者亡後二年帝滅齊隋文帝開皇八年十月甲子有星孛於牽牛占曰臣殺君天下合謀内不有大亂則外有大兵牛吳越之星陳之分野後年陳氏滅十四年十一月癸未有彗星孛於虚危及奎婁齊魯之分野其後魯公虞慶則伏法齊公髙熲除名煬帝大業三年二月乙丑彗星見於東井文昌歴大陵五車北河入太微掃帝座前後百餘日而止三月辛亥長星見西方竟天干歴奎婁角亢而沒至九月辛未轉見南方亦竟天又干角亢頻掃太微帝座干犯列宿唯不及參井經歳乃滅占曰去穢布新天所以去無道建有徳見乆者災深星大者事大行遲者期逺兵大起國大亂而亡餘殃為水旱饑饉土功疾疫其後築長城討吐渾及髙麗兵戎連歲水旱疾疫土功相仍羣盗并起邑落空虚四年彗星出五車掃文昌至房而滅十一年六月有星孛於文昌東南長五六寸色黑而銳夜動揺西北行數日至文昌去宫四五寸不入却行而滅占曰為急兵其八月突厥圍帝於鴈門矢及帝前十三年六月有星孛於太微五帝座色黄赤長三四尺所數日而滅占曰有亡國殺君明年三月宇文化及弑帝九月彗見於營室唐髙祖武徳九年二月壬午有星孛於胃昴間丁亥孛於卷舌孛與彗皆非常惡氣所生而孛災甚於彗太宗貞觀八年八月甲子有星孛於虚危歴元枵乙亥不見十三年三月乙丑有星孛於畢昴十五年六月己酉有星孛於太微犯郎位七月甲戌不見髙宗龍朔三年八月癸卯有彗星於左攝提長二尺餘乙巳不見攝提建時節大臣象乾封二年四月丙辰有彗星於東北在五車畢昴間乙亥不見上元二年十二月壬午有彗星於角亢南長五尺三年七月丁亥有彗星於東井指北河長三尺餘東北行光芒益盛長三丈掃中台指文昌九月乙酉不見東井京師分中台文昌將相位兩河天闕也開耀元年九月丙申有彗星於天市中長五丈漸移東行至河鼓癸丑不見市者貨食之所聚以衣食生民者一曰帝將遷都河鼓將軍象永淳二年三月丙午有彗星於五車北四月辛未不見中宗光宅元年九月丁丑有星如半月見於西方月衆隂之長星如月者隂盛之極文明元年七月辛未夕有彗星於西方長丈餘八月甲辰不見是謂天欃景龍元年十月壬午有彗星於西方十一月甲寅不見二年二月丁酉有星孛於胃昴間胡分也八月壬辰有星孛於紫宫睿宗太極元年六月有彗星自軒轅入太微至大角滅元宗開元十八年六月甲子有彗星於五車癸酉有星孛於畢昴二十六年三月丙子有星孛於紫宫垣歴北斗魁旬餘因雲隂不見肅宗乾元三年四月丁巳有彗星於東方在婁胃間色白長四尺東方疾行歴昴畢觜觹參東井輿鬼柳軒轅至右執法西凡五旬餘不見閏月辛酉朔有彗星於西方長數丈至五月乃滅婁為魯胃昴畢為趙觜觹參為唐東井輿鬼為京師分柳其半為周分二彗仍見者荐禍也又婁胃間天倉代宗大歴元年十二月己亥有彗星於瓠𤓰長尺餘經二旬不見犯宦者星五年四月己未有彗星於五車光芒蓬勃長三丈五月己卯彗星見於北方色白癸未東行近八榖中星六月癸卯近三公己未不見占曰色白者太白所生也七年十二月丙寅有長星於參下其長亘天長星彗屬參唐星也憲宗元和十年三月有長星於太微尾至軒轅十二年正月戊子有彗星於畢穆宗長慶元年正月己未有星孛於翼二月丁卯孛於太微西上將六月有彗星於昴長一丈凡十日不見文宗太和二年七月甲辰有彗星於右攝提南長二尺八年九月辛亥有彗星於太微長丈餘西北行越郎位庚申不見開成二年三月丙午有彗星於危長七尺餘西指南斗戊申在危西南芒耀愈盛癸丑在虚辛酉長丈餘西行稍南指壬戌在婺女長二丈餘廣三尺癸亥愈長且濶三月甲子在南斗乙丑長五丈其末兩岐一指氐一掩房丙寅長六丈無岐北指在亢七度丁卯西北行東指己巳長八丈餘在張癸未長三尺在軒轅右不見凡彗星晨出則西指夕出則東指乃常也未有遍指四方凌犯如此之甚者八月丁酉有彗星於虚危虚危為元枵枵耗名也三年十月乙巳有彗星於軫魁長二丈餘漸長西指十一月乙卯有彗星於東方在尾箕東西亘天十二月壬辰不見四年正月癸酉有彗星於羽林衛分也閏月丙午有彗星於卷舌西北二月己卯不見五年二月庚申有彗星於營室東壁間二十日滅十一月戊寅有彗星於東方燕分也武宗會昌元年七月有彗星於羽林營室東壁間也十一月壬寅有彗星於北落師門在營室入紫宫十二月辛卯不見并州分也宣宗大中六年三月有彗星於觜參參唐星也十一年九月乙未有彗星於房長三尺懿宗咸通五年五月己亥夜漏未盡一刻有彗星出東方色黄白長三尺在婁徐州分也九年正月有彗星於婁胃十年八月有彗星於大陵東北指占為外夷兵及水災僖宗乾符四年五月有彗星光啟元年有彗星於積水積薪之間二年五月丙戌有星孛於尾箕歴北斗攝提占曰貴臣誅昭宗大順二年四月庚辰有彗星於三台東行入太微掃大角天市長十丈餘五月甲戌不見宦者陳匡知星奏曰當有亂臣入宫三台太一三階也太微大角帝庭也天市都市也景福元年五月蚩尤旗見初出有白彗形如髪長二尺許經數日乃從中天下如匹布至地如蛇六月孫儒攻楊行宻於宣州有黑雲如山漸下隊於儒營上狀如破屋占曰營頭星也十一月有星孛於斗牛占曰越有自立者十二月丙子天欃出於西南己卯化為雲而沒二年三月天乆隂至四月乙酉夜雲稍開有彗星於上台長十丈餘東行入太微掃大角入天市經三旬有七日益長至二十餘丈因雲隂不見乾寧元年正月有星孛於鶉首秦分也天祐二年四月甲辰有彗星見於北河貫文昌長三丈餘陵中台下台五月乙丑夜自軒轅左角及天市西垣光芒猛怒其長亘天丙寅雲隂至辛未少霽不見兩河為天闕在東井間而北河中國所經也文昌天之六司天市都市也梁太祖乾化二年四月壬申彗出張甲戌彗出靈臺後唐明宗天成三年十月庚午彗出西南長丈餘東南指在牛宿五度至三夕不見末帝清泰三年九月己丑彗出虚危長尺餘形微細經天壘哭星其年十一月帝遇難晉髙祖登位晉髙祖天福六年九月壬子彗出西方掃天市垣長丈餘八年十月庚戌彗見東方西指尾跡長一尺在角九度周世宗顯徳三年正月壬戌夜有星孛於參宿其芒指於東南宋太祖皇帝開寳八年六月甲子彗出桞長四丈晨見東方西南指歴輿鬼至東壁凡十一舎八十三日而滅是歲平江南太宗端拱二年六月戊子有彗出東井積水西青白色光芒漸長晨見東北旬日夕見西北歴右攝提凡三十日至亢沒真宗咸平元年正月甲申有彗出營室北光芒尺餘至丁酉凡十四日滅六年十一月辛亥旄頭犯輿鬼占與彗同甲寅有星孛於井鬼大如杯色青白光芒四尺餘犯五諸侯歴五車入參凡三十餘日沒占有燕兵明年冬契丹入寇天禧二年六月辛亥彗出北斗魁第二星東北長三尺許與北斗第一星齊北行經天牢拂文昌長三丈餘歴紫微三台軒轅逺行而西至七星凡三十七日沒仁宗明道二年二月戊戌東北方有含譽星見其色黄白有光芒長二尺許其後章獻明肅太后崩或以為彗景祐二年八月壬戌夜有星孛於張翼長七尺濶五寸十二日而沒十二月己未夜有星出外屛有芒氣皇祐元年二月丁卯彗出虚晨見東方西南指歴紫微至婁凡一百一十四日而沒占曰有兵喪嘉祐元年七月彗出紫微歴七星其色白長丈餘至八月癸亥滅英宗治平三年三月己未彗出營室晨見東方長七尺許西南指危泊墳墓漸東逺行近日而伏至辛巳夕見西北有星無芒彗益東行别有白氣一濶三尺許貫紫微極星并房宿首尾入濁益東行歴文昌北斗貫尾至壬午星復有芒彗長丈餘濶三尺餘東北指歴五車白氣為岐横天貫北河五諸侯軒轅太微五帝座内五諸侯及角亢氐房宿癸未彗長丈五尺有星孛氣如一升器歴營室至張凡一十四舎積六十七日星氣孛皆滅占曰白氣長星也孛氣孛也光如箒者彗也為兵喪水旱饑疫之災神宗熙寧八年十月乙未星出東南軫度中如填青白丙申西北生光芒長三尺斜指軫若彗丁酉光芒長五尺戊戌長七尺斜指左轄至丁未入濁不見主兵喪元豐三年七月癸未彗出西北太微垣郎位南白氣長一丈斜指東南在軫度中丙戌向西北方行在翼度中戊子長三尺斜穿郎位癸卯犯軒轅至丁酉入濁不見庚子晨復出於張度中至戊午凡三十有六日沒不見主除舊布新兵喪火災又主京城有兵變哲宗紹聖四年八月己酉彗出氐度中如填有光色白氣長三尺斜指天市垣中星九月壬子光芒長五尺入天市垣己未犯天市宦者主侍臣有憂庚申犯天市垣帝座戊辰沒不見主兵喪大水及赦又主五榖大貴侍臣有憂又主人民亂大臣憂徽宗崇寧五年正月戊戌彗出西方如杯口大光芒散出如碎星長六丈濶三尺斜指東北自奎宿貫婁胃昴畢後入濁不見主兵喪大饑西北宜備之大觀四年五月丁未彗出奎婁光芒長六尺北行入紫微垣至西北入濁不見主水旱榖傷兵饑人主惡之欽宗靖康元年六月壬戌彗出紫微垣主天下兵變破軍亡國閏十一月彗竟天時金人入寇京城失守髙宗紹興元年九月偽齊長星見於是劉豫謀明年遷十二月戊寅彗星見二年八月甲寅彗見胃占彗大則除舊布新兵饑疫癘水旱交興至九月甲戌乃沒次年金人䧟金州入興元十五年四月戊寅彗出東方宿度内五十餘日乃沒占為兵饑臣下失忠務私彗掃除之丙申復出參度旬有五日乃伏是歲蒙國始建號改元五月丁巳彗星因為客星其色青白占喪十六年十二月戊戌彗出西南危宿十七年正月乙亥彗出東北方女宿二月二日乃伏二十二年七月丙午彗見東北方井宿内丁未其星如木星光芒長二尺占天所以去無道建有徳彗出有叛者兵起大水晉邦尤甚彗晨見東方又為君臣爭明癸丑夜彗星犯五諸侯占大臣憂執法之臣凶孝宗淳熙二年七月辛丑夜泛出一小星在紫微垣外七公星之上小如火星參然蓬勃體氣蒼白是為孛星占孛星惡氣所生為亂兵孛徳又云參然孛焉兵之類也無内亂則水兵天下合謀闇蔽不明有所傷害災甚於彗寧宗嘉定十五年八月甲午彗星出右攝提光芒約三丈以上其體小如木星凡兩月行歴氐房心乃沒占彗本類星末類彗大則除舊布新天所以去無道而建有徳彗出有叛者兵起其國彗星昏見其國受兵於是其應金主殂九月壬戌彗星消伏文獻通考卷二百八十六
