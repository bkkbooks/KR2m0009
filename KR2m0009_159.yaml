body:
  text: 文獻通考卷一百五十九鄱陽馬端臨貴與著兵考十一馬政祭馬祖周官校人掌王馬之政政謂差擇飬乘之數也月令曰頒馬政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物種為上善似母者以次差之玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役凡頒良馬而飬乘之乘馬一師四圉三乘為皂皂一趣馬三皂為繫繫一馭夫六繫為廄廄一僕夫六廄成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫良善也善馬五路之馬鄭司農云四匹為乘飬馬為圉故春秋傳曰馬有圉牛有牧元謂二耦為乘師趣馬馭夫僕夫師之名也趣馬下士馭夫中士則僕夫上士也自乘至廄其數二百一十六匹易乾為馬此應乾之策也至校變為言成者明六馬各一廄而王馬小備也校有左右則良馬一種者四百三十二匹五種合二千一百六十匹駑馬三之則為千二百九十六匹五良一駑凡三千四百五十六匹然後王馬大備詩云騋牝三千此王馬之大數與麗耦也駑馬自圉至馭夫凡馬千二十四匹與三良馬之數不相應八皆宜為六字之誤也師十二匹趣馬七十二匹則馭夫四百三十二匹矣然後而三之既三之無僕夫者不駕於五路卑之也天子十有二間馬六種邦國六間馬四種家四間馬二種降殺之差每廄為一間諸侯有齊馬道馬田馬大夫有田馬各一間其駑馬則皆分為三焉凡馬特居四之一欲其乘之性相似也物同氣則心一鄭司農云四之一者三牝一牡疏使三牝各産其一通牡為四共駕一車取同氣一心之義春祭馬祖執駒馬祖天駟也孝經説曰房為龍馬鄭司農云執駒毋令近母猶攻駒也二嵗曰駒三嵗曰駣元謂執猶拘也春通淫之時駒弱血氣未定為其乘匹傷之夏祭先牧頒馬攻特先牧始飬馬者其人未聞夏通淫之後攻其特為其蹄齧不可乘用鄭司農云攻特謂騬之秋祭馬社臧僕馬社始乘馬者世本作曰相士作乘馬鄭司農云臧僕謂簡練馭者令皆善也元謂僕馭五路之僕冬祭馬步獻馬講馭夫馬步神為災害馬者獻馬見成馬於王也馭夫馭貮車從車使車者講猶簡習故疏云春時通淫求馬蕃息故祭馬祖夏草茂求肥充祭先牧是放牧之先秋時馬肥盛可乘故祭始乘馬者冬時萬物成故教僕使善也凡軍事物馬而頒之物馬齊其力趣馬掌贊正良馬而齊其飲食簡其六節贊佐也佐正者謂校人臧僕講馭夫之時簡差也節猶量也差擇王馬以為六等掌駕説之頒用馬之次第辨四時之居治以聼馭夫居謂牧庌所處治謂執駒攻特之屬巫馬掌飬疾馬而乘治之相醫而藥攻馬疾受財於校人乘謂驅步以發其疾知所疾處乃治之相助也疏財謂共祈具及藥直牧師掌牧地皆有厲禁而頒之頒馬授圉者所牧處孟春焚牧焚牧地以除陳生新草中春通淫中春隂陽交萬物生之時可以會馬之牝牡也月令季春乃合纍牛騰馬遊牝於牧秦時書也秦地寒涼萬物後動也掌其政令凡田事贊焚萊焚萊者山澤之虞庾人掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圉馬九者皆有政教焉阜盛壯也杜子春云佚當為逸鄭司農云馬三嵗曰駣二嵗曰駒散讀如中散之散謂聒馬耳毋令善驚也元謂逸者用之不使甚勞安其血氣也教駣始乘習之也攻駒騬其蹄齧者間之先牧制間者散馬耳以竹括押其耳頭動搖則括中物後遂串習不復驚正校人員選校人謂師圉也正員選者選擇可備員者平之馬八尺以上為龍七尺以上為騋六尺以上為馬大小異名爾雅曰騋牝驪牡元駒裊驂鄭司農云以月令曰駕蒼龍圉師掌教圉人飬馬春除蓐釁廄始牧夏庌馬冬獻馬射則充椹質茨墻則剪闔蓐馬茲也馬既出而除之新釁焉神之也春秋傳曰凡馬日中而出日中而入故字庌為訝鄭司農云當為庌元謂庌廡也廡所以芘馬涼也充猶居也茨蓋也闔苫也椹質剪闔圉人所習也杜子春讀椹為齊人言鐵椹之椹椹質所射者習射處圉人掌飬馬芻牧之事以役圉師役者圉師使令焉馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬買以給官府之使無種也鄭司農曰皆有物色及賈直疏馬有六種此三馬無種買以入官府者種謂馬上善似母者綱惡馬鄭司農云綱讀為以亢其讐之亢書亦或為亢亢御也禁也禁去惡馬不畜也綱謂綱以縻索維綱狎習之也凡受馬於有司者書其齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更其外否鄭司農云更謂償也元謂旬之內死者償以齒毛與賈受之日淺飬之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否者旬之外踰二十日而死不任用非用者罪疏旬之內日少若飬之善未能致死也故更旬之外日多任之過馬力既竭雖飬之善容得致死故不償馬及行則以任齊其行職其所載輕重及道里齊其勞逸乃復用之若有馬訟則聼之訟謂買賣之言相負禁原蠶者原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁原蠶為其傷馬歟陳氏禮書曰先王之時國馬足以行軍公馬足以稱賦則周禮鄉師以時辨其馬牛之物均人均牛馬之力政縣師辨其六畜車輦之稽遂人遂師以時登其六畜車輦遂大夫以時稽其六畜而牛馬與焉及其用之則司馬法甸出長轂一乘牛三頭馬四匹此國馬也校人掌王馬之政辨種戎齊道田駑之六馬此公馬也蓋天子十二間馬六種每馬一圉每乘一師三乘馬十二匹三皂為繫三十六匹六繫為廄二百一十六匹六廄成校校有左右則十二廄合三千四百五十六匹種各一廄廄有左右則一種四百三十二匹良馬五種則合二千一百六十匹又駑馬一種三良馬一種之數則為千二百九十六匹五良一駑凡三千四百五十六匹邦國六間四種家四間二種蓋諸侯及大夫廄無左右則良馬三居三廄合六百四十八匹駑馬三良馬一種之數居三廄亦六百四十八匹凡千二百九十六匹家四間二種一良居一廄二百一十六匹駑三之居三廄為六百四十八凡八百六十四匹春秋之時晉悼公使程鄭為乘馬御六騶屬焉諸侯六間之制成十八年彼衛文公之騋牝三千齊景公之馬千駟三千則近於天子十二間之數而千駟又過之是皆僭侈而違禮者也校人駑馬麗馬一圉八麗一師八師一趣馬八趣馬一馭夫鄭氏謂八宜為六者蓋自圉至馭夫以八計之則為千二十四匹與三良馬之數不合以六計之則適四百三十二匹矣然後而三之既三之無僕夫以駑不駕五路卑之也然後周天子之馬不過三千四百五十六匹而已漢之飬馬有五監六廄而武帝之時馬至四十萬匹唐置八使五十六監麟德間馬至七十萬開元間至四十五萬匹而與周之馬數相逺者蓋周制八軍之馬出於民而校人所飬者特給公家之用而已漢唐則不然行軍之馬一出於公此多寡所以異也秦之先有造父以善御得幸於周繆王得驥溫驪溫一作盜鄒誕本作駣音陶音義云盜驪竊也竊淺青色駰馬細頸驪黑色驊駵色如華而赤今名馬驃赤為棗駵駵赤也騄耳之駟索隱曰按穆天子傳八駿曰赤驥盜驪白義渠黃驊駵踰輪騄耳山子西巡狩樂而忘歸徐偃王作亂造父為繆王御長驅歸周以救亂繆王以趙城封造父其後又有非子居犬邱好馬及畜善飬息之犬邱人言之周孝王孝王召使主馬於汧渭之間馬大蕃息於是孝王曰昔柏翳為舜主蓄之多息故有土賜姓嬴今其後世亦為朕息馬朕其分土為附庸邑之秦使復續嬴氏之祀魯僖公務農重榖牧於坰野坰逺野也邑外曰郊郊外曰野野外曰林林外曰坰箋云必牧於坰野者辟民居與良田也周禮曰以官田牛田賞田牧田任逺郊之地駉駉牡馬在坰之野駉駉良馬腹幹肥張也薄言駉者有驈有皇有驪有黃以車彭彭驪馬白跨曰驈黃白曰皇純黑曰驪黃騂曰黃諸侯六間馬四種有良馬有戎馬有田馬有駑馬彭彭有力有容也箋云坰坰牧地水草既美牧人又良飲食得其時則自肥健耳思無疆思馬斯臧臧善也僖公之思遵伯禽之法反復思之無有竟已乃至於思馬斯善其所及廣博駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾蒼白雜毛曰騅黃白雜毛曰駓赤黃曰騂青黑曰騏伾伾有力也思無期思馬斯才才多材也駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹青驪驎曰驒白馬黑鬛曰駱赤身黑鬛曰駵黑身白鬛曰雒繹繹善走也思無斁思馬斯作作始也箋云斁厭也作謂牧之使可乘駕也駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車袪袪隂白雜毛曰駰彤白雜毛曰騢足豪骭曰驔二目白曰魚袪袪強健思無邪思馬斯徂徂猶行也晉惠公與秦師戰於韓乘小駟鄭入也鄭所獻馬名小駟慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事及懼而變將與人易變化人意亂氣狡僨隂血周作張脈僨興外強中乾狡戾也僨動也氣狡僨於外則血脈必周身而作隨氣張動外雖有強形而中實乾竭也進退不可周旋不能君必悔之弗聼及戰晉戎馬還濘而止濘泥也還便旋也小駟不調故墮泥中秦獲晉侯以歸林氏曰成周以民牧者如邱甸嵗取馬四匹之類前刑法志四邱為甸四甸為縣有戎馬一匹平時則官給芻秣有警則民供召發然而在天子之都諸侯之國士大夫之家未嘗不自畜焉此蓋在官飬之爾何以知之如周禮以天子有十二間先儒論數不過三千餘匹衛文公承夷狄所滅之後新造之國未年亦至騋牝三千若以制度論之衛以諸侯之國又當殘亂之餘其他固未及論安得遽如成周全盛乘馬之數蓋所謂天子十有二間是飬之於官者衛文公詩騋牝三千舉官民通數而言之此成周官民通牧之制也阡陌開井田廢兵車不取之田賦戎馬各從官給於是馬政日廢而外患生矣漢制太僕掌輿馬屬官有大廄未央家馬三令又車府路軨騎馬駿馬四令丞又龍馬間駒槖泉騊駼承華五監長丞徐氏曰按漢舊儀云天子六廄未央承華騊駼騎馬路軨大廄馬皆萬匹三輔黃圗都廄天子車馬所在中廄皇后車馬所在漢初鑄莢錢馬至匹百金自天子不能具鈞駟無純色之駟謂駟馬雜色而將相或乘牛車至孝武時衆庶街巷有馬阡陌之間成羣謂田中之阡陌也乘牸牝者擯而不得會聚言時富饒耻乘牸牝文帝二年詔太僕見馬遺財足餘皆以給傳置又令民有車騎馬一匹者復卒三人景帝時造苑馬以廣用苑馬謂為苑以牧馬四年御史大夫綰奏禁馬髙九尺五寸以上齒未平不得出關綰衛綰馬十歲齒下平六年胸奴入鴈門至武泉入上郡取苑馬漢儀注太僕牧師諸苑三十六所分布北邊西邊以郎為苑監官奴婢三萬人飬馬三十萬匹師古曰武泉雲中之縣也飬鳥獸者通名為苑故謂牧馬處為苑武帝建元元年罷苑馬以賜貧民師古曰飬馬之苑舊禁百姓不得芻牧采樵今罷之是時大將軍衛青比嵗十餘萬衆擊胡漢軍士馬死者十餘萬天子為伐胡故盛飬馬馬之往來食長安者數萬匹卒掌者關中不足乃調旁近郡而胡降者數萬人皆得厚賞衣食仰給縣官縣官不給天子乃損膳解乘輿駟出御府禁藏以贍之兩將軍之出塞塞閲官馬及私馬凡十萬匹而後入塞者不滿三百匹自衛青圍單于以後以漢馬少故久不伐胡元鼎元年令民得畜邉縣得畜牧於邉縣也官假馬母三嵗而歸及息什一以除告緡用充入新秦中李竒曰邉有官馬今令民能畜官母馬者滿三嵗歸之十母馬還官一駒此為息什一也師古曰官淂母馬之息以給用度得充實秦中人故除告緡之令也明年車騎乏馬縣官錢少買馬難得乃著令令封君以下至三百石吏以上差出壯馬天下亭亭有畜字馬嵗課息金日磾輸黃門飬馬牽馬過殿下馬又肥好拜為馬監上官桀遷未央廄令武帝嘗體不安及愈見馬馬多瘦上大怒曰以我不復見馬邪欲下吏桀曰臣聞聖體不安日夜憂懼誠不在馬因泣數行上以為忠胸奴渾邪王帥衆來降漢發車二萬乘縣官無錢從民貰馬賖買也民或匿馬馬不具上怒欲斬長安令汲黯曰令亡罪獨斬臣黯民乃肯出馬且胸奴畔其主而降漢徐以縣次傳之何至令天下騷動罷中國甘心夷狄之人乎上默然四年馬生渥窪水中李非文曰南陽新野有暴利長遭刑屯田燉煌界數於此水旁見群野馬有竒者與凡馬異利長先作士人持勒靽於水旁後馬玩習久之代土人持勒靽收得獻之欲神異此馬云從水中出也作天馬之歌太初元年遣二師將軍李廣利將兵前後十餘萬人伐大宛時宛别邑七十餘城多善馬馬汗血言其先天馬子也孟康曰大宛國有髙山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云張騫始為帝言之上遣使者持千金及金馬以請宛善馬宛王以漢絶逺大兵不能至愛其寶馬不肯與漢使妄言謂辱詈宛王宛遂攻殺漢使取其財物天子乃遣兵伐之連四年宛人斬其王母寡首獻馬三千匹漢軍乃還其後與漢約嵗獻天馬二匹二年籍吏民馬補車騎馬籍者總入籍録之征和中上下詔深陳既往之悔禁苛暴止擅賦力本農修馬復令孟康曰先是令長吏以秩飬馬亭有牝馬民飬馬皆復不可後馬多乏絶至此復修之也師古曰此説非也馬復因飬馬以免徭賦也復音房目反以補缺毋乏武備而已郡國二千石各上進畜馬方略補邉狀與計對師古曰與上計者同來起對也徐氏曰按鼂錯疏言民有車騎馬一匹者復卒三人即馬復令也昭帝始元四年詔往時令民共出馬其止勿出諸給中都官者且減之五年罷天下亭馬母及馬弩關應劭曰武帝令天下諸亭飬馬母今罷之孟康曰舊馬髙五尺九寸以上齒未平弩十石以上者皆不得出關今不禁也宣帝五鳳二年詔頗省乘輿馬及苑馬以補邊郡三輔傳馬其令郡國毌斂今年馬口錢元帝初元元年省苑馬以賑困乏九月詔太僕減榖食馬二年罷黃馬乘輿駒馬五年詔乘輿秣馬毌乏正事而已貢禹奏言髙祖孝文孝景皇帝循古節儉廄馬百餘匹方今廄馬食粟將萬匹今民大飢而廄馬食粟苦其太肥氣盛怒至乃日步作之願減損乘輿服御廄馬亡過數十匹天子納善其忠乃下詔太僕減榖食馬成帝建始二年減乘輿廄馬林氏曰漢初民出善賦以備車馬武帝於口賦錢人增三錢以補車騎馬昭帝元鳯二年令郡國母斂今年馬口錢又稍復古制勸民飬馬有一匹者復卒三人蓋居間則免三人之算有事則當三人之卒此內郡之制也至於邉塞則縱民畜牧而官不禁烏氏居塞則馬數千羣橋桃居塞則致馬千匹貨殖傳於時內郡之盛則衆庶有馬阡陌成羣食貨志邊郡之盛則三十六苑分置西北漢儀注武帝初年單于入塞見馬布野而無人牧者征伐四夷而馬往來食長安者數萬匹既數出師馬大耗乏乃行一切之令自封君而下至三百石吏以次出馬則內郡庶民之有馬者欲望復卒難矣又令民得畜邉者從官假馬母而歸其息十一則邉郡之欲廣畜牧者難矣又匿馬者有罪有以列侯匿馬而腰斬者功臣表黎頃侯召奴有以民或匿馬馬不具而長安令幾坐死者汲黯傳故內郡不足則籍民馬以補車騎邉郡不足則發酒泉騾駝負石至玉門關武帝太初三年輪臺之恨始修馬令吁亦晚矣後漢制太僕掌車馬屬官未央廄令一人主乘輿及廄中諸馬舊有六廄中興省約但置一廄後置左駿令廄别主乘輿御馬後或併省又有牧師苑皆令官主飬馬分在河西六郡界中中興皆省唯漢陽有流馬苑但以羽陵郎監領馬援好騎射善别名馬於交趾得駱越銅鼓乃鑄為馬式還上之因表云夫行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則以别尊卑之序有變則以濟逺近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之於行事輒有驗效臣愚以為傳聞不如親見視景不如察形今欲行之於生馬則骨法難備具又不可傳之於後孝武皇帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門臣謹依儀氏羈中帛氏口齒謝氏脣鬐丁氏身中備此數家骨相以為法馬高三尺五寸圍四尺五寸有詔置於宣德殿下以為名馬式焉馬援傳援銅馬相法曰水火欲分明水火在鼻孔兩間也上脣欲急而方口中欲紅而有光此馬千里頷下欲深下脣欲緩牙欲前向牙欲去齒一寸則四百里牙劍鋒則千里目欲滿而澤腹欲充膁欲小季肋欲長垂薄欲厚而緩垂薄股也腹下欲平滿汗溝欲深長而膝本欲起肘腋𣣔開膝欲方蹄欲厚三寸堅如石羈音居竒反劉攽曰牙欲去齒一寸按文多一欲字又汗溝欲深長而按文而當在長字上和帝永元五年詔有司省減外廄及涼州諸苑馬安帝永初元年詔廄馬非乘輿所御者減半食六年詔越嶲置長利髙望始昌三苑又令益州置萬嵗苑犍為置漢平苑順帝漢安元年始置承華廄東觀記曰時以逺近獻馬衆多園廄充滿故置按當時隱士魏桓被徴不出謂人曰廄馬萬匹其可減乎蓋當時畜馬未嘗以資軍國之用徒侈服御糜廪粟而已靈帝光和四年初置騄驥廄丞領受郡國調馬豪右辜𣙜馬一匹至二百萬辜障也𣙜專也謂障餘人買賣而自取其利中平元年詔公卿出馬弩廄馬非郊祭之用悉出給軍任尚代班雄屯三輔臨行虞翊説尚曰今討逐寇賊三州屯兵二十萬棄農桑疲征役而未有功兵法弱不攻強走不逐飛自然勢也今虜皆騎馬日行數百里來如風雨去如絶弦以步追之勢不相及今莫如市馬尚即上言用其計以輕騎鈔擊斬首四百級獲牛馬甚衆晉制太僕統典牧乘黃廄驊騮廄龍馬廄等令太僕自元帝渡江之後或省或置太僕省故驊騮為門下之職後魏明元帝時詔天下户二十輸戎馬一匹大牛一頭又制六部人滿百口者調戎馬一匹太武幸棝陽驅野馬於雲中置野馬苑孝文敕後軍將軍宇文福行牧地福表石濟以西河內以東距河凡十里帝自代徙雜畜置其地使福掌之畜無耗失以為司衛監初世祖平統萬及秦涼以河西水草豐美用為牧地畜甚蕃息馬至二百餘萬匹槖駝半之牛羊無數及髙祖置牧於河陽常畜戎馬十萬匹每歲自河西徙牧并州稍復南徙欲其漸習水土不至死傷而河西之牧愈更蕃滋及正光以後皆為寇盜所掠無孑遺矣爾朱榮有馬十二谷色别為羣北齊太僕寺統驊騮掌御馬及諸鞍乘左右龍左右牝掌駝馬驊騮署又有奉乘直長二人左龍署有左龍局右龍署有右龍局左牝署有左牝局右牝署有右牝局隋太僕寺有獸醫博士員一百二十人統驊騮乘黃龍廄等署各置令其後減驊騮署入殿內尚乘局改龍廄曰典廄署有左右駁皂二廄加置主乘司庫司廩官隋制常以仲春用少牢祭馬祖於大澤諸合祭官於祭所致齋一日積柴於壇禮畢就燎仲夏祭先牧仲秋祭馬祖仲冬祭馬步並於大澤皆以剛日牲用少牢如祭馬祖埋而不燎唐之初起得突厥馬二千匹又得隋馬三千於赤岸澤徙之隴右監牧之制始於此其官領以太僕其屬有牧監副監監有丞有主簿直司團官牧尉排馬牧長羣頭有正有副凡羣置長一人十五長置尉一人歲課功進排馬又有掌間調習馬上又以尚乘掌天子之御左右六間一曰飛黃二曰吉良三曰龍媒四曰騊駼五曰駃騠六曰天苑總十有二間為二廄一曰祥麟二曰鳳苑以繫飼之其後禁中又增置飛龍廄初用太僕少卿張萬歲領羣牧自貞觀至麟德四十年間馬七十萬六千置八坊岐豳涇寧間地廣千里一曰保樂二曰甘露三曰南普四曰北普五曰岐陽六曰太平七曰宜祿八曰安定八坊之田千二百三十頃募民耕之以給芻秣八坊之馬為四十八監而馬多地狹不能容又析八監列布河西豐曠之野凡馬五千為上監三千為中監餘為下監監皆有左右因地為之名方其時天下以一縑易一馬萬歲掌馬久恩信行於隴右後以太僕少卿鮮于匡俗檢校隴右監牧儀鳳中以太僕少卿李思文檢校隴右諸牧監使監牧有使自是始後又有羣牧都使有間廄使使皆置副有判官又立四使南使十五西使十六北使七東使九諸坊若涇川亭川闕水洛赤城南使統之清泉溫泉西使統之烏氏北使統之木硤萬福東使統之他皆失傳其後置八監於鹽州三監於嵐州鹽州使八統白馬等坊嵐州使三統樓煩元池天池之監凡征伐而發牧馬先盡強壯不足則取其次録色歲膚地印記主名送軍以帳馱之數上於省自萬歲失職馬政頗廢永隆中夏州牧馬之死失者十八萬四千九百九十景雲二年詔羣牧歲出髙品御史按察之開元初國馬益耗太常少卿善晦乃請以空名告身市馬於六胡州率三十匹讐一遊擊將軍命王毛仲領內外間廄九年又詔天下之有馬者州縣皆先以郵遞軍旅之役定户復緣以升之百姓畏苦乃多不畜馬故騎射之士減曩時自今諸州民勿限有無廕能家畜十馬以下免帖驛郵遞征行定戶無以馬為資毛仲既領間廄馬稍稍復始二十四萬至十三年乃四十三萬其後突厥欵塞元宗厚撫之歲許朔方軍西受降城為互市以金帛車馬於河東朔方左右牧之既雜胡種馬乃益壯天寶後諸軍戰馬動以萬計五侯將相外戚牛駝羊馬之牧布諸道百倍於縣官皆以封邑號名為印自别將校亦備私馬議者謂秦漢以來唐馬最盛天子又鋭志武事遂弱西北蕃十一載詔二京旁五百里勿置私牧十三載隴右羣牧都使奏牛馬駝羊總六十萬五千六百而馬三十二萬五千七百安祿山以內外間廄都使兼知樓煩監隂選勝甲馬歸范陽故其兵力傾天下而卒反肅宗收兵至彭原率官吏馬抵平涼搜監牧及私羣得馬數萬軍遂振至鳯翔又詔公卿百僚以後乘助軍其後邉無重兵吐蕃乘隙陷隴右苑牧畜馬皆沒矣乾元後回紇恃功嵗入馬取繒馬皆病弱不可用永泰元年代宗欲親擊虜魚朝恩乃請大搜城中百官士庶馬輸官曰團練馬下制禁馬出城者已而復罷德宗建中元年市關輔馬三萬實內廄貞元三年吐蕃羌渾犯塞詔禁大馬出潼蒲武關者元和十年伐蔡命中使以絹一萬市馬河曲其始置四十八監也據隴西金城平涼天水員廣千里繇京度隴置八坊為會計都領其間善水草腴田廄旋以給貧民及軍吏間及賜佛寺道館幾千頃十二年間廄使張茂宗舉故事盡收岐陽坊地失業者甚衆十三年以蔡州牧地為龍陂監十四年置臨漢監於襄州牧馬三千二百費田四百頃穆宗即位岐人叩關訟茂宗所奪田事下御史按治悉豫民太和七年度支鹽鐡使言銀州水甘草豐請詔刺史劉源市馬三千河西置銀川監以源為使襄陽節度使裴度奏停臨漢監開成二年劉源奏銀川馬已七千若水草乏則徙牧綏州境今綏南二百里四隅險絶寇路不能通以數十人守要畜牧無他患乃以𨽻銀川監其後闕不復可紀林氏曰唐府兵之制當給馬者官與其直市之每匹錢二萬五千刺史折衝果毅核歲周不任戰者鬻之以其錢更市不足則府供之此給錢以市也至府兵漸壞兵貧難致乃給以監牧之馬此給馬以用也大抵唐之馬政皆給於官民無與焉唐兵志自髙宗武后府兵之法更號曰彍騎詔諸州府馬闕乏官私共補之今兵貧難致乃給以監牧馬餘見兵志始唐接周隋亂離之後承天下征伐之餘鳩括殘騎僅得壯牝三千匹於赤岸澤徙之隴右始命太僕張萬嵗葺其政焉肇貞觀訖麟德四十年間馬至七十萬餘匹於時天下以一縑易一馬秦漢之盛未之有也垂拱以後馬耗大半開元始命王毛仲為內外間廄使牧飬有法雲錦成羣復與麟德馬數相等爾此唐牧於官而給於民之制也唐開元禮仲春祀馬祖儀將祀有司筮日如别儀以下先牧馬社馬步皆筮日前祀三日應享之官散齋二日致齋一日如别儀前祀二日守宫設祀官次於東壝外道南北向西上陳饌幔於內壝外郊社令積柴於燎壇方髙五尺太官令具特牲之饌未明二刻太史令郊社令升設神座於壇上席以莞南向奉禮設獻官位於壇東南西向執事位又於東南俱西向北上設奉禮位於獻官西南贊者二人在南差退又設奉禮贊者位於燎壇東北俱西向北上望燎位當柴壇北南向設祀官等門外位於東壝外道南西上郊社令設酒樽於壇上東南隅北向洗於壇東南北向執樽篚者如常幣篚於樽所未明一刻太祝獻官等各服其服郊社令與良醖令入實樽罍及幣質明謁者引獻官以下俱就門外位奉禮郎帥贊者先入就位贊引引太祀與執樽罍篚羃者入當壇南重行北面西上立定奉禮曰再拜贊者承傳太祝以下俱再拜太祀與執樽者升東階至樽所執罍洗篚羃者各就位謁者引獻官以下入就位立定奉禮曰再拜在位者俱再拜謁者進獻官之左白有司謹具請行事退復位太官令出詣饌所太祝跪取幣於篚興立樽所謁者引獻官詣神座前北面立太祝奉幣東向授獻官獻官受幣進北面跪奠於神座俯伏興少退北面再拜謁者引獻官還本位太官令引饌入升南陛太祝迎引於壇上設於神座前訖太官以下降復位太祝還樽所謁者引獻官詣罍洗盥手洗爵訖謁者引獻官升自南陛詣酒樽所執樽者舉羃獻官酌酒謁者引獻官進神座前北向跪奠爵俯伏興少退北向立太祝持版進於神座之右東面跪讀祝文曰維某年嵗次月朔日天子謹遣具官臣姓名昭告於馬祖天駟之神爰以春季逰牝於牧祗薦制幣犧齊粢盛庶品明薦於馬祖天駟之神尚饗訖興獻官再拜太祝進跪奠版於神座俯伏興還樽所太祝以爵酌福酒進獻官之右西向立獻官再拜受爵跪祭酒遂飲卒爵太祝進受爵於坫獻官俯伏興太祝帥齋郎進俎減神前胙肉以授獻官受以授齋郎謁者引獻官降自南陛還本位太祝進跪徹豆俯伏興還樽所奉禮曰再拜在位者皆再拜已飲福受胙者不拜謁者引獻官就望燎位南向立奉禮又帥贊者退立於燎壇東北位太祝進神座前跪取制幣祝版爵酒又以俎載牲體黍飯興降自南行當柴壇東南行自南陛登柴壇以幣酒祝版饌置柴上訖奉禮曰可燎東西面各二人以炬燎火者以炬投壇上火半柴謁者進獻官之左白禮畢遂引獻官以下出奉禮贊者還本位贊引引太祝以下俱復執事位立定奉禮曰再拜太祝以下皆再拜贊引引出仲夏享先牧儀仲秋祭馬社仲冬祭馬步同前享三日應享之官散齋二日於正寢致齋一日於享所右校掃除壇之內外為瘞坎於壇之壬地方深取足容物衛尉設享官次於東壝外道南北向西上太官令具特牲之饌其日未明一刻以下至設贊者位於瘞坎西南同馬祖儀設瘞坎位於壇之西南北向設享官以下門外位以下至讀祝文如馬祖儀祝文曰昭告於先牧之神肇開牧飬厥利無窮式因頒馬爰以制幣云云尚饗訖興獻官再拜太祝進跪徹以下至燔版如馬祖儀其坎置土東西各二人祭馬社祝文曰惟神肇教人乘用賴於今式因肆僕爰以制幣云云尚饗馬步祝文曰惟神為國所重在於間牧神其屏兹隱慝使無有害載因獻校爰以制幣云云尚饗後梁開平四年頒奪馬令冒禁者罪之先是梁師攻戰得敵人之馬必納官故出令命獲者有之後唐同光三年下河南河北諸州和市戰馬官吏除一匹外匿者有罪時將伐蜀長興四年敕沿邉藩鎮或有蕃部賣馬可擇其良壯者給劵具數以聞先是上問見管馬數樞密使范延光奏天下常支草粟者近五萬匹見今西北諸蕃賣馬者往來如市其郵傳之費中估之直日四十五貫以臣計之國力十耗其七馬無所使財賦漸銷朝廷甚非所利上善之故有是敕清泰三年敕諸道州府縣鎮賓佐至録事參軍都押衙教練使已上各留馬一匹乘騎及鄉村士庶有馬者無問形勢馬不以牝牡盡皆抄借但勝衣甲並仰印記差人管押送納其小弱病患者印退字本道收管節度防禦團練等使刺史除自己馬外不得因便影占管軍都將除出軍及隨駕外見逐處屯駐者都指揮使舊有馬許留五匹小指揮使兩匹都頭一匹其餘凡五匹取兩匹十匹取五匹更多有者並依此例抽取在京文武百官主軍將校內諸司使已下隨駕職員舊有馬者任令隨意進納不得影占人私馬各下諸道準此按清泰之距長興才數年耳長興時樞密使范延光奏陳方患官馬太多芻秣耗用曽幾何年而括馬之令復如此豈長興之馬已俱不復存邪晉天福九年發使於諸道州府括取公私馬以備禦契丹文獻通考卷一百五十九
