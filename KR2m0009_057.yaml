body:
  text: 文獻通考卷五十七鄱陽馬端臨貴與著職官考十一殿中監少監乘丞尚尚食局尚藥御尚衣長尚舍尚輦等奉直魏置殿中監官晉宋並同齊有內外殿中監各八人梁陳因之其資品極下後魏亦有殿中監北齊有殿中局置監四人屬門下省掌駕前奉引隋改為殿內局置監二人大業三年分門下太僕二司取殿內監名以為殿內省有監少監丞各一人掌諸供奉領尚食尚藥尚衣尚食即舊御府尚舍即舊殿中局尚乘領左右六間及諸間尚輦等六局漢儀注曰省中有五尚即尚食尚冠尚衣尚帳尚席或曰秦置六尚謂尚冠尚衣尚食尚沐尚席尚書若今殿中之任每局各置奉御二人以總之置直長以二之屬門下省唐改為殿中省加置少監二人丞亦二人其官局職任一如隋制為一司不屬門下龍朔二年改殿中省為中御府改監為中御大監少監改丞為中御大夫改尚食為奉膳尚藥為奉醫尚衣為奉冕尚舍為奉扆尚乘為奉駕尚輦為奉輦凡奉御皆改為大夫咸亨初復舊丞隋置一人唐加一人尚食局奉御始秦置六尚有尚食焉如淳曰謂掌天子之物曰尚後漢以後并其職於太官湯官北齊門下省又有尚食局置典御二人後周有內膳上士中士凡進食先嘗之隋分屬殿內改典御為奉御有二人唐因之龍朔二年改為奉膳大夫咸亨初復舊直長隋置六人唐因之減置五人尚藥局奉御自梁陳以後皆太醫兼其職北齊門下省有典御二人隋如北齊之制後改為奉御而屬殿內唐因之龍朔二年改為奉醫大夫咸亨初復舊直長隋置四人唐因之尚衣局奉御周官有司服中士掌王之服辨其名物戰國有尚衣尚冠之職秦漢有御府令丞掌供御府而屬少府後漢又掌宦者典官婢作中衣服魏因之晉屬光祿勳江東省宋大明中改尚方曰左右御府各置令丞一人後廢帝初省御府置中署𨽻右尚方其後又置初宋氏用三品勳位明帝改用二品準南臺御史掌金銀綵帛凡諸造作以供奉及妃主六宮梁陳其職𨽻在尚方後魏有掌服郎北齊門下省統主衣局都統子統各二人後周有司服上士二人中士二人隋分屬殿內省其後又改為尚衣局置奉御二人唐因之龍朔三年改為奉冕大夫咸亨元年復舊直長隋置八人唐因之減二人尚舍局奉御周禮有掌舍掌行所解止之處帷幕幄帟之事漢少府屬官有守宮令丞掌宮殿陳設魏殿中監掌帳設監護之事晉宋以下其職並在殿中監隋煬帝置殿內監改殿內局為尚舍局置奉御二人唐因之龍朔二年改為奉扆大夫咸亨元年復舊直長隋置八人唐因之而減二人尚乘局奉御自秦漢以來其職皆在太僕北齊太僕驊騮署有奉御十人管十二間馬隋煬帝取之置尚乘局署奉御二人唐因之增置奉御四人龍朔二年改為奉駕大夫咸亨元年復舊尚乘奉御掌六間馬一曰飛黃間二曰吉良間三曰龍媒間四曰騊駼間五曰駃騠間六曰天苑間開元中減二人先是别置廄使因𨽻焉猶屬殿中武太后萬嵗通天二年置仗內間廄令殿中丞袁懷哲檢校至聖歷二年改為少監間廄使自後他官相循為之直長隋置十四人唐減四人尚輦奉御周官小司徒中大夫掌六畜車輦又宗伯巾車下大夫掌王后之五輅輦車組挽有翣羽蓋古謂人牽為輦春秋宋萬以乘車輦其母秦始皇乃去其輪而輿之漢代遂為人君之乘漢魏晉並太僕屬官車府令掌之東晉省太僕遂𨽻尚書駕部宋齊梁陳車府乘黃令丞掌之後魏北齊則乘黃車府令兼掌之後周則司車輅主之隋又乘黃車府令丞掌之煬帝置殿內省尚輦局奉御二人唐因之龍朔二年改為奉輦大夫咸亨元年復舊直長四人隋置唐因之宋制殿中省判省事一人以無職事朝官充舊有六尚之局名别而事存今尚食歸御厨尚藥歸醫官院尚衣歸尚衣庫尚舍歸儀鑾司尚乘歸騏驥院內鞍轡庫尚輦歸輦院皆不領於本省元豐正官制置監少監丞各一人監掌供奉天子五食醫藥御幄帟輿輦舍次之政令少監為之二凡總六局曰尚食掌膳羞之事曰尚藥掌和劑診候之事曰尚醖掌酒醴之事曰尚衣掌衣服冠冕之事曰尚舍掌次舍幄帟之事曰尚輦掌乘輿之事六尚各有典御二人奉帥六人或四人監門二人或一人又尚食有膳工尚藥有醫師尚醖有酒工尚衣有衣徒尚舍有幕士尚輦有正供等官皆分𨽻其局又置提舉六尚局及管幹官一員舊殿中省判省事一人以無職事朝官充雖有六尚局名别而事存凡官隨局而移不領於本省所掌唯郊祀元日冬至天子御殿及禘祫后廟神主赴太廟供其繖扇而殿中監視祕書監為寄祿官而已元豐中神宗欲復建此官而度禁中未有其地但詔御輦院不𨽻省寺令専達焉初權太府卿林顔因按內藏庫見乘輿服御親行百物中乃乞復殿中省六尚以嚴奉至尊於是徽宗乃出先朝所度殿中省圖命三省行之而其法皆左正言姚祐所裁定嵗崇寧二年也三年蔡京上修成殿中省六尚局供奉庫務敕令格式看詳凡六十卷仍冠以崇寧為名政和元年殿中省尚伸上編定六尚供奉式靖康元年詔六尚局並依祖宗法又詔六尚局既罷格內嵗貢品物萬數尚為民害非祖宗舊制其並除之少府監少監掌丞等主簿暴中尚左尚右尚染冶署室等丞織少府秦官漢因之是為九卿掌山海池澤之稅以給供養應劭曰山海池澤之稅名曰禁錢以給私養自别為藏少者小也故稱少府顔師古曰大司農供軍國之用少府以養天子也天子曰少府諸侯曰私府漢時官有司府長掌禁錢後光武改屬司農也王莽曰共工後漢少府卿一人掌中服御之諸物衣服寶貨珍膳之屬朝賀則給璧後漢東平王蒼為驃騎正月朔朝蒼當入賀故事少府給璧時隂就為少府貴傲不奉法漏將盡而求璧不得蒼掾朱暉遙見少府主簿持璧乃往紿曰試請覩之既得而馳奉之就復以他璧朝紿徒改反凡中書謁者尚書令僕侍中常侍黃門御史中丞以下皆屬焉晉制銀章青綬五時朝服進賢兩梁冠絳朝服佩水蒼玉哀帝末省併丹陽尹孝武復置宋少府領左右尚方御府東冶南冶平凖等令丞齊又加領左右銀煆署梁少府為夏卿位視尚書左右丞陳因之後魏少府謂之六卿以少府宗正太僕廷尉司農鴻臚為六卿至孝文太和中易制官品遂改少府為太府北齊無少府其尚方等署皆𨽻太府至隋煬帝大業五年又分太府為少府監置監及少監復領尚方織染等署後又改監少監並為令唐武德初置軍器監廢少府監貞觀元年五月分太府中尚方織染坊掌冶坊署置少府監龍朔二年改為內府監咸亨元年復舊光宅元年改為尚方監神龍元年復舊監一人總判少監二人通判初少監一人太極元年加一人領中尚左尚右尚織染掌冶等五署開元十年五月於北都置軍器監至二十六年五月廢丞漢有六人後漢省五而有一丞其後歷代皆一人山公啓事曰中郎衛昱往為少府丞具有損益唐置四人主簿晉置二人自後歷代一人唐有二人中尚署周官為玉府秦置尚方令漢因之後漢掌上手工作御刀劍玩好器物及寶玉作器宦者蔡倫為尚方令監作祕劍及諸器械莫不精工堅密為後代法兩漢又有考工令主作兵器其職稍同考工令作兵器兵器成則傳執金吾入武庫及主織綵諸雜工初屬少府中屬主爵光武時屬太僕漢末分尚方為中左右三尚魏晉因之自過江唯置一尚方哀帝以𨽻丹陽尹宋武帝踐祚以相府作部配臺謂之左尚方而本署謂之右尚方並掌造軍器又以相府細作配臺即其名置令一人𨽻門下孝武大明中改曰御府御府二漢已有之典官婢作藝衣服補浣之事魏晉猶置其職江左乃省焉後廢帝初省御府置中署𨽻右尚方則漢之考工令如宋之尚方令尚方令如宋中署矣齊署左右尚方令各一人梁有中左右尚方北齊亦有三尚方𨽻太府隋煬帝分𨽻少府唐省方字有中左右三尚署令丞各一人中署掌宮內營造雜作左署掌車輦繖扇膠漆畫鏤等作右署掌皮毛膠墨雜作席薦等事開元以後别置中尚使以監之織染署令一人周禮天官典絲掌受文織綵組焉染人掌染線帛秦置平凖令韋昭釋名曰平凖令主染色染有均平之法故凖而則之漢因之及主物價練染初少府屬官有東織西織成帝省東織更名西織為織室北齊中尚方領涇州雍州絲局定州紬綾局丞後周有司織下大夫隋有司織司染二署煬帝合為織染一署令掌織紝組綬綾錦冠幘并染色等唐因之有令丞掌冶署秦及漢郡國有鐵官諸郡國出鐵者署鐵官長丞晉冶令掌工徒鼓鑄𨽻衛尉江左以來省衛尉始𨽻少府宋有東冶南冶各置令丞東冶令丞各一人南冶令丞各一人而屬少府齊因之江南諸郡縣有鐵者或置冶令或置冶丞多是吳所置梁陳有東西冶東冶重西冶輕其西冶即宋齊之南冶北齊諸冶屬太府後周有冶工鐵工中士隋有掌冶署令丞唐於京師置冶署有令丞各一人掌造鑄金銀銅鐵塗飾琉璃玉作等事暴室丞後漢暴室丞宦者也主中婦人病疾者就此室理之其皇后貴人有罪亦就此室屬少府其後無之海丞漢平帝置少府海丞一人掌海稅後無果丞與海丞同置掌諸果實後無宋少府監判監事一人以朝官充凡天子器玩后妃服飾雕文錯彩工巧之事分𨽻於文思院後苑造作所本監但掌造門戟神衣旌節郊廟諸壇祭玉法物鑄牌印朱記百官拜表案褥之事諸州鑄錢監並屬少府監官各一人以京朝官及三班使臣充元豐正官制置監少監丞主簿各一人掌百工伎巧之政令所隸官屬五文思院掌造金銀犀玉工巧之物金綵繪素裝鈿之飾以供輿輦册寶法物及凡器服之用監官文臣一員武臣二員綾錦院掌織紝錦繡以供乘輿及凡服飾之用監官三人以京朝官諸司使副及內侍充染院掌染絲枲幣帛監官二人以京朝官及內侍充裁造院掌裁造服飾監官二人以京朝官及內侍充文繡院掌纂繡以供乘輿服御及賔客祭祀之用建炎初以將作少府監併歸工部紹興三年復置將作監少府事總焉寄祿官少府監後為中散大夫將作監少監校丞署主簿園左校令右校中等東主章甄官今將作亦少皥氏以五雉為五工正以利器用雉有五種故曰五雉唐虞共工周官考工之官蓋其職也秦有將作少府掌治宮室漢景帝中元六年更名將作大匠後漢位次河南尹中元二年省以謁者領之章帝建初元年復置初以任隗為之掌修作宗廟路寢宮室陵園木土之功并樹桐梓之類列於道側後漢志注曰古列樹以表道魏晉因之江左至宋齊皆有事則置無事則省而梁改為大匠卿陳因之後魏亦有之北齊有將作寺其官曰大匠兼領功曹主簿長史司馬等官屬後周有匠師中大夫掌城郭宮室之制又有司木中大夫掌木工之政令隋與北齊同至開皇二十年改寺為監大匠為大監初加置副監煬帝改大監少監為大匠少匠五年又改為大監少監十三年又改大令少令唐復皆為匠龍朔二年改將作為繕工監大匠少匠隨監名改咸亨元年復舊光宅元年改為營繕監神龍元年復舊大匠一人總判少匠二人通判初一人太極元年加置一人天寶中改大匠為大監少匠為少監領左校右校甄官中校四署丞漢有二人後漢一人魏晉因之東晉以後有事則置無事則省梁又置一人陳因之後魏有之北齊四人後周有匠師中士隋二人唐四人主簿晉置自後與丞同隋二人唐因之左右校署秦及漢初有左右前後中五校令後唯置左右校令後漢因之掌左右工徒魏併左校右校於材官晉左右校屬少府宋以後並有左校令丞北齊亦有之隋左右校令丞屬將作唐因之左校署令丞二人掌營搆木作採材等事右校署令丞二人掌營土作瓦泥并燒石灰厠溷等事甄官署令丞一人後漢