漢禮又賈誼年二十餘文帝召為博士年最少每有詔議下諸老生未能言誼盡為對之人人各如其意後漢博士凡十四人易施孟梁邱京氏尚書歐陽大小夏侯詩齊魯韓氏禮大小戴春秋嚴顔各一博士華嶠漢書曰初欲立左氏傳博士范升以為左氏淺末不宜立陳元聞之乃詣闕上疏爭之更相辨對凡十餘上帝卒立左氏學掌以五經教子弟國有疑事掌丞問對舊時從議郎為博士其通睿異藝入平尚書出部刺史諸侯守相久次轉諌議大夫中興髙第為侍中小郡若都尉博士限年五十其督郵版狀曰生事愛敬喪沒如禮理易尚書孝經論語兼崇載籍窮微闡奧師事某官經明受謝見授門徒尚五十人以上正席謝坐三郡二人隱居樂道不求聞逹身無金痍痼疾三十六屬不與妖惡交通王侯賜賞行應四科經任博士下言某官某甲保舉順帝諱保故稱守安帝以博士多非其人詔命三公將軍中二千石舉博士各一人務得經明行髙卓爾茂異是時羣僚承風凡所旌賞綽有餘裕後旋復故遂用陵遲初平帝元始四年改博士為博士師後漢兼而存之並擇儒者桓榮魯恭戴憑等並為博士魏及西晉朝博士置十九人武帝咸寧四年初立國子學置國子博士一人皆取履行精淳通明典義若散騎常侍中書侍郎太子中庶子以上乃得召試元帝時荀嵩上疏曰昔咸寧太康永嘉之中侍中常侍黃門通洽古今行為世表者領國子博士宋齊諸博士皆皂朝服進賢兩梁冠佩水蒼玉梁國學有博士二人天監四年置五經博士各一人魏晉宋齊並不置五經博士至此始置焉舊國子學生限以貴賤武帝欲招來後進五館生皆引寒門雋才不限人數陳因之後魏北齊並有之隋仁夀元年省國子博士大業三年復置一人唐增置二人龍朔二年改為司成宣業咸亨初復舊諸州府亦有經學博士一人助教晉咸寧四年初立國子學置助教十五人以教生徒江左及宋並十人宋制易尚書毛詩禮記周禮儀禮左傳公羊榖梁各為一經論語孝經為一經合十經助教分掌宋齊並同梁國子助教舊視南臺御史品服與博士同陳因之後魏亦有北齊置十人隋置四人唐國子學助教三人諸府州縣各有助教職員府州二人縣一人學生各有差太學博士晉江左增置國子博士十六人謂之太學博士品服同國子博士梁置太學博士八人陳因之後魏亦然北齊國子寺有太學博士十人後周置太學博士下大夫六人隋初置太學博士五人仁夀元年罷國子唯立太學置博士五人大業三年減置二人唐因之助教後魏置北齊亦有之置二十人後周曰太學助教上士隋又曰太學助教五人大業三年減三人唐因之廣文館博士一人助教一人並以文士為之唐天寶九載置四門博士後魏書劉芳表云太和二十年立四門博士於四門置學按禮記曰天子設四學鄭玄注曰四郊之虞庠也今以其遼逺故置於四門請移與太學同處從之北齊二十人隋五人唐三人助教北齊國子寺有二十人隋初則五人唐因之直講四人唐初置無員數長安四年始定為四員大成二十人唐置取貢舉及第人簡聰明者試書日誦得一千言并日試䇿所習業等十條通七然後補充仍散官祿俸賜會同直官例給武太后長安中省而置直講定為四員律學博士晉置屬廷尉衛覲奏請律學博士轉相教授東晉以下因之梁曰胄子律博士屬廷尉陳亦有律博士後魏北齊並有之隋大理寺官屬有律博士八人唐因之而置一人移屬國學助教一人位從九品上書學博士唐置三人又置典學二人算學博士唐置二人又置典學二人宋國子監無博士有直講八人熙寧改為太學博士元豐定制亦無國子博士大觀元年乃置國子博士四員國子正録二員與太學官分掌教導中興後置國子博士二員太學博士元豐改直講為之紹聖元年令太學博士正録令國子監長二薦舉召試而後除紹興十二年置太學博士三員國子正録大觀初置掌行學規糾不如規者罰之紹興十三年詔正録各置一員太學正録仁宗朝胡瑗掌太學其正録第補諸生熙寧末興三舍始選官為正録如學官之制正録各五人掌行學規不如規者糾罰之元祐三年罷命官正録以上舍內舍充後復置命官學正二員紹聖悉如元豐舊制紹興十二年復各置一員書庫官淳化五年判國子學李志言監中印書亦主掌錢物凡有公文其所司止以印書錢物所為名稍為近俗今乞改為國子監書庫官從之書庫監官以京朝官充掌印經史羣書以備朝廷宣索賜豫之用及出鬻而收其直以上於官元豐三年省中興後併國子監入禮部紹興十三年乃復置一員三十一年罷龍興初詔主庫兼書庫乾道七年復置一員武學唐開元間始置太公尚父廟以留侯張良配中春中秋上戊祭之牲樂如文宣王仍以古名將十人為十哲配享貞元元年尊太公為武成王詔考定可配享者列古今名將六十四人圖形焉宋慶歷三年詔置武學於武成王廟以阮逸為教授八月罷武學以議者言古名將如諸葛亮羊祜杜預等豈専學孫吳故也熙寧五年樞密院言古者出師受成於學文武弛張其道一也乞復置武學詔於武成王廟置學紹興十六年詔修建武學武博武諭嘗以兵書弓馬武藝誘誨學者元豐官制行以博士代教授紹興二十六年詔武學博士學諭各置一員內博士於文臣有出身或武舉出身曾預髙選充其學諭差武學人後又除文臣之有出身者宗學漢平帝詔朕惟宗室皆髙帝子孫令置宗師以糾教之明章二帝友愛子弟幼者率留京師訓導以禮唐髙宗詔宗室子孫就祕書外省别為小學宋元豐六年宗室令鑠乞建宗學詔從之既而中輟建中靖國元年復置崇寧初立月書季考法南渡初建學嘉定更新置四齋後再增三齋宗學博士舊諸王宮大小學教授也至道元年太宗將為皇姪等置師傅執政謂環衛之官親王比當有降乃以教授為名咸平初遂命諸王府官分兼南北宅教授南宫者太祖太宗諸王之子孫處之所謂睦親宅也崇寧五年又改稱某王宫宗子博士位國子博士之上靖康之亂宗學遂廢紹興四年始復置諸王宫大小學教授二員隆興省其一嘉定九年十二月始復置宗學改教授為博士又置宗學諭一員並𨽻宗正寺在太常博士之下諭在國子正之上俸給賞典依國子博士及正體例於是宗室疏逺者皆得就學而彬彬可觀矣旋有旨復存諸王宫大小學教授一員軍器監丞主簿甲坊署弩坊署後周武帝四年初置軍器監唐武德初置軍器監貞觀元年罷軍器大監置少監後省之以其地𨽻少府監為甲弩坊開元初復以其地置軍器使至三年以使為監更置少監一員丞二員主簿一員録事一員及弩坊等署十一年悉罷之復𨽻少府為甲弩坊十六年移其名於北都置軍器監亦嘗以太原尹兼領之天寶六載復於舊所置軍器監監一人領甲坊弩坊兩署丞主簿各一人唐置甲坊署令丞周禮考工記曰函人為甲隋少府有甲鎧署唐改焉弩坊署令丞周禮司弓矢掌四弩隋有弓弩署唐改焉宋軍器初領於三司胄案官無專職熙寧六年廢胄案乃按唐令置監擇從官總判元豐正名分案五所𨽻官屬四東西作坊掌造兵器旗幟戎帳行物辨其名地監官二人以京朝官及三班使臣充作坊物料庫掌收鐵錫羽箭油漆之類皮角場掌收皮革筋骨以供作坊之用置官與東西作坊同建炎併歸工部紹興復置長二各一員隆興初詔軍器所已𨽻工部本監惟置丞一員乾道後置監少監及簿淳熙初詔戎器非進入毋輒出所由是呈驗寖省嘉定以後事最稀簡特為儲才之所都水使者丞主簿舟楫署河渠署虞舜命益作虞以掌山澤周官有林衡川衡二官掌林麓川澤之禁漢武帝元鼎二年初置水衡都尉顔師古曰山林之官曰衡掌諸池苑故稱水衡張晏曰主都水及林苑故曰水衡主諸官故曰都有卒徒武事故曰尉衡平也主平其稅也掌上林苑漢趙充國以中郎為水衡都尉主船官也蓋主上林離宮燕休之處王莽改曰豫虞後漢光武省之併其職於少府每立秋貙劉之日輒暫置水衡都尉貙劉將祭大獵之名貙敕俱反事訖省初秦漢又有都水長丞主陂池灌溉保守河渠自太常少府及三輔等皆有其官漢武帝以都水官多乃置左右使者以領之劉向為左都水使者是也又續漢百官志曰劉向領三輔都水至漢哀帝省使者官至東京凡都水皆罷之併置河隄謁者漢之水衡都尉本主上林苑魏世主天下水軍舟船器械晉武帝省水衡置都水臺有使者一人掌舟航及運部而河隄為都水官屬元康中復有水衡都尉元康百官名及晉起居注曰陳慎戴熊俱以都水使者領水衡都尉懷帝永嘉六年胡賊入洛陽都水使者奚濬先出督運得免江左省河隄諸公贊曰陳協字太和有巧思為都水使者洛陽記曰千金隄協所置宋都水使者銅印墨綬進賢兩梁冠與御史中丞同孝武帝初省都水臺罷都水使者置水衡令孝建元年復置齊有都水臺使者一人梁初與齊同天監七年改都水使者為大舟卿位視中書郎列卿之最末者主舟航河隄陳因之後魏初皆有水衡都尉及河隄謁者都水使者官至永平二年都水臺依舊置二使者北齊亦置二使者隋開皇二年廢都水臺入司農十三年復置仁夀元年改臺為監更名使者亦為監煬帝又改為使者尋又為監加置少監又改監及少監並為令領舟楫河渠二署唐武德八年置都水臺後復為都水署置令隸將作貞觀中復為都水監置使者龍朔二年改都水使者為司津監丞咸亨元年復舊光宅元年改都水監為水衡置都尉神龍元年復為都水監置使者二人分總其事不屬將作領舟楫河渠二署丞漢有水衡丞五人亦有都水丞後漢晉初都水使者有參軍二人蓋亦丞之職任宋因之梁大舟卿有丞陳因之後魏北齊又曰參軍隋曰都水丞唐二人主簿晉水衡都尉有之為左右前後中五水衡令悉皆有之梁大舟卿亦有之至隋又置唐因之舟楫署令漢主爵中尉屬官有都船令丞水衡都尉有楫棹令丞晉曰船曹吏齊曰官船典軍後周曰舟中士隋為舟楫署令丞唐因之令丞各一人河渠署隋煬帝置令丞各一人唐因之宋都水監判監事一人以員外郎以上充同判監一人以朝官以上充丞二人主簿一人並以京朝官充掌內外河渠隄堰之事舊例三司河渠案嘉祐三年始専置監以領之輪遣丞一人出外治河掃之事或一嵗再嵗而罷其間有諳知水政或至三年者置局於澶州號曰外監寺司押司官一人元豐八年詔提舉汴河堤岸司𨽻本監先是導洛入汴専置堤岸司至是歸之都水司元祐時詔南北外都水丞並以三年為任七年方議回河流乃詔河北京西漕臣及開封府界提點各兼南北外都水事宣和三年詔罷南北外都水丞司依元豐法通差文武官一員四年臣僚言都水監因恩州修河舉辟文武官至百二十餘員授牒家居不省所領何事皆乘傳給劵第功希賞詔除正官十一員外餘並罷所𨽻有東西四排岸司監官各以京朝官閣門祗候以上及三班使臣充掌水運綱船輸納顧直之事汴河上下鎖蔡河上下鎖各監官一人以三班使臣充掌算舟船木筏之事天下堰總二十一監官各一人渡總六十五監官各一人皆以京朝官三班使臣充亦有以本處監當兼掌者內侍省內侍伯內常侍局內給事局內謁者監內寺掖庭宮闈奚官局內僕局內府局天文有宦者四星在帝座之西周官有宮正宫伯皆主王宮中官之長宮人掌王之六寢內宰理王內之政令以隂禮教六宮閽人掌守王宮寺人掌王之內人及女官戰國時有宦者令趙有宦者令繆賢是秦少府屬官有中書謁者令丞又有將行衛尉少府各一人並皇后卿漢景帝中元六年改將行為大長秋顔師古曰秋者收成之時長者恆久之義故以為皇后官名或用中人或用士人中人閹人成帝加置太僕一人掌太后輿馬通謂之皇太后卿皆隨太后宮為宮號在正卿上無太后則闕衛尉在衛尉上少府在少府上之類是也又有長信詹事掌皇太后宮景帝六年更名長信少府平帝元年更名長樂少府帝祖母稱長信宮帝母稱長樂宮故有長信少府長樂少府職如長秋位在長秋上及職吏皆宦者也後漢常用宦者職掌奉宣中宮命凡給賜族親當謁見者關通之中宮出則從屬官有丞中宫僕謁者私府署令初秦又置中常侍官參用士人皆銀璫左貂給事殿省漢制置侍中中常侍各一人省尚書事黃門侍郎一人傳發書奏皆用姓族後漢中常侍贊導內事顧問應對永平中始定員數中常侍四人漢舊儀曰秩千石得出入卧內舉法省中省中即禁中也成帝外家王禁貴重朝中為諱禁曰省小黃門十人自明帝以後員數稍增改以金璫右貂兼領卿署之職自和熹太后以女主稱制不接公卿乃以閹人為常侍小黃門通命兩宮自此以來悉用閹人不調他士自安迄桓權任尤重手握王爵口含天憲桓帝既與宦官謀誅梁冀乃封宦者五人單超徐璜貝瑗左琯唐衡也同日為侯皆食邑故世號五侯焉楊秉為太尉奏請免中常侍侯覽貝瑗等官尚書召對秉掾屬曰公府外職而劾近官經典漢制有故事否秉使對曰春秋趙鞅以晉陽之甲逐君側之惡又傳曰除君之惡唯力是視鄧通戲慢申屠嘉召責文帝許之漢制故事三公之職無所不統帝不得已遂免覽官削瑗國及袁紹大誅宦者之後永巷掖庭復用士人閫闈出入莫有禁切侍中侍郎門部騶宰中外雜錯醜聲彰聞魏改漢制太后三卿在九卿下晉復舊在同號卿上有后則置無后則闕齊鬱林王立文安太后即尊號以宫名置宣德衛尉少府太僕梁有𢎞訓太后亦置屬官陳亦有太后三卿後魏大長秋掌顧問應對自文明馮后閹官用事大者令僕小者卿守宦者趙黑為選曹尚書北齊有中侍中省置中侍中二人中常侍四人掌出入閣門又有長秋寺置卿中尹各一人掌諸宮閣領掖庭等令並用宦者後周有司內上士小司內中士巷伯中士等官隋曰內侍省領內侍內常侍等官內侍即舊長秋內常侍即舊中常侍煬帝改內侍省為長秋監置令一人少令一人丞二人並用士人餘用宦者領掖庭宫闈奚官三署亦參用士人唐武德初改為內侍省皆用宦者龍朔二年改為內侍監咸亨元年復舊光宅元年改為司宫臺神龍元年復舊有內侍四人掌知宮內供奉中宮駕出則夾引總判局事舊二人開元中加二人七年三月敕內侍五品以上許養一子仍以同姓者初養日不得過十嵗內常侍六人通判省事屬官有內給事八人內謁者監六人內寺伯二人寺人六人領掖庭宫闈奚官內僕內府等五局神龍元年後始以中使出監諸軍兵馬寶應元年五月敕諸道州所承上命須憑正敕可施行不得懸便信中使宣敕即遵行內給事周禮內小臣之職掌王后之命后出入前驅後漢少府有給事黃門常侍左右止在內宫門通中外及中宫已下衆事自魏晉至於梁陳無其職後魏有中給事中後改為中給事北齊中侍中省有中給事中四人煬帝改為內承直唐復為內給事置八人內謁者後漢大長秋屬官有中宫謁者二人主報中章後魏北齊有中謁者僕射隋內侍省有內謁者監六人內謁者十二人唐因之內寺伯周禮寺人掌王之內人及女宫之戒令隋內侍省有內寺伯二人唐因之掖庭局令秦置永巷漢武更名掖庭置令掌宫人簿帳公桑養蠶及女工等事後漢掖庭令掌後宫貴人采女又有永巷令典官婢皆宦者並屬少府唐置二人宮闈局令二人隋置令掌宫內門閣之禁及出納神主并內給使名帳糧廩事唐因之奚官局令二人齊梁陳隋有奚官署令掌守宮人使藥疾病罪罰喪葬等事唐置二人內僕局令二人後漢有中宫僕令掌車輿雜畜及導等唐置二人內府局令二人漢有內者局令隋曰內者唐為內府置令二人掌內庫出納帳設澡沐等范曄史論曰宦人之在王朝者其來舊矣將以其體非全氣情志専良通關中人易以役養乎然而後世因之才任稍廣其能者則勃貂管蘇有功於楚晉景監繆賢著庸於秦趙及其敝也則豎刁亂齊伊戾禍宋漢興仍襲秦制置中常侍官然亦引用士人以參其選皆銀璫左貂給事殿省又髙后稱制乃以張卿為大謁者出入卧內受宣詔命文帝時有趙談北宮伯子頗見親幸至於孝武亦愛李延年帝數宴後庭或潛遊離館故請奏機事多以宦人主之至元帝之世史遊為黃門令勤心納忠有所補益其後𢎞恭石顯以佞險自進卒有蕭周之禍損穢帝德焉中興之初內官悉用閹人不復雜調他士至永平中始置員數中常侍四人小黃門十人和帝即祚幼弱而竇憲兄弟専總權威內外臣僚莫由親接所與居者唯閹宦而已故鄭衆得専謀禁中終除大憝遂享分土之封超登宮卿之位於是中官始盛焉自明帝以後迄乎延平委用漸大而其員稍增中常侍至有十人小黃門二十人改以金璫右貂兼領卿署之職鄧后以女主臨政而萬機殷逺朝臣國議無由參斷帷幄稱制下令不出房闈之間不得不委用刑人寄之國命手握王爵口含天憲非復掖庭永巷之職閨牖房闥之任也其後孫程定立順之功曹騰參建桓之策續以五侯合謀梁冀受鉞迹因公正恩固主心故中外服從上下屏氣或稱伊霍之勳無謝於往載或謂良平之畫復興於當今雖時亦忠公而竟見排斥舉動回山海呼吸變霜露阿旨曲求則光寵三族直情忤意則慘夷五宗漢之紀綱大亂矣若夫髙冠長劍紆朱懷金者布滿宮闈苴茅分虎南面臣人者蓋以十數府署第館綦列於都鄙子弟支附過半於州國南金和寶冰紈霧縠之積盈仞珍藏嬙媛侍兒歌童舞女之玩充備綺室狗馬飾雕文土木被緹繡皆剝割氓黎競恣奢欲搆害明賢専樹黨類其有更相援引希附權強者皆腐身熏子以自衒逹同弊相濟故其徒有繁敗國蠧政之事不可覃書所以海內嗟毒志士窮棲寇劇緣間搖亂區夏雖忠良懷憤時或奮發而言出禍從旋見孥戮因復大考鉤黨轉相誣染凡稱善士莫不離被災毒竇武何進位崇戚近乘九服之囂怨協羣英之勢力而以疑留不斷至於殄敗斯亦運之極乎雖袁紹龔行芟夷無餘然以暴易亂亦何云及自曹騰説梁冀竟立昏弱魏武因之遂遷龜鼎所謂君以此始必以此終信乎其然矣宋祁史論曰太宗詔內侍省不立三品官以內侍為之長階第四不任以事惟門閣守禦廷內掃除稟食而已武后時稍增其人至中宗黃衣乃二千員七品以上員外置千員然衣朱紫者尚少元宗承平財用富足志大事奢不愛惜賞賜爵位開元天寶中宫嬪大率至四萬宦官黃衣以上三千員衣朱紫千餘人其稱旨者輒拜三品將軍列戟於門其在殿頭供奉委任華重持節傳命光焰殷殷動四方所至郡縣奔走獻遺至萬計修功德市禽鳥一為之使猶且數千緍監軍持權節度反出其下於是甲舍名園上便之田為中人所占者半京畿矣肅代庸弱倚為捍衛故輔國以尚父顯元振以援立奮朝恩以軍密重然猶未得常主兵也德宗懲艾泚賊故以左右神策天威等軍委宦者主之置護軍中尉中護軍分提禁兵是以庶柄下遷政在宦人舉手伸縮便有輕重至標士竒材則奏以為子巨鎮強藩則爭出我門小人之情猥險無顧籍又日久侍天子狎則無威習則不疑故昏君蔽於所昵英主禍生所忽元宗以遷崩憲敬以弒殞文以憂僨至昭而天下亡矣禍始開元極於天祐凶愎參會黨類殱滅王室從而潰衰譬猶灼火攻蠧蠧盡木焚詎不哀哉迹其殘氣不剛柔情易褫褻則無上怖則生怨借之權則専為禍則迫而近緩相攻急相一此小人常勢也噫梟狐不神天與之昏末如亂何故取中葉以來宦人之大者萃之篇右古今宦者之禍無如漢唐之季年范宋二史傳論特為明暢故備載之然夷考其磐固猖獗之由則有自來矣蓋將相者天下大權之所自出也漢中葉以後以中書為政本而中書令管機密屬之貂璫是宦者得以竊相之柄也故陳蕃竇武何進之徒一有規畫奏啓即為所窺先發制人禍不旋踵而國祚隨之唐中葉以後倚兵戎定禍亂而觀軍容監軍屬之貂璫是宦者得以竊將之權也故勳德如李郭則俯首受節制而不免失律跋扈如李茂貞朱全忠則稱兵內侮而遂以移祚矣兵刑者人主威柄之所自出也漢自桓靈以來有黃門北寺獄是宦者得以専刑也故窮捕鈎黨勦戮名士皆黃門北寺獄之所為也唐自德代以來有兩軍中尉是宦者得以専兵也故易置人主誅夷大臣皆兩軍中尉之所為也蓋將相之任彼得以據之兵刑之司彼得以専之而又地近情親根連株固故雖有英特之君賢智之臣終不能以一朝而去腹心之病亦由積漸之久故也然桓靈昏主又從而崇奬之故權悉下移而漢之亡遂亟文武宣賢君雖不能抑制之然政自已出故唐之亡少紓云宋初有內中髙品班院淳化五年改入內內班院又改入內黃門班院又改內侍省入內內侍班院景德三年其東門取索司可併𨽻內東門司餘入內都知司內東門都知司內侍省入內內侍班院可立為入內內侍省以諸司𨽻之國初有內班院淳化五年八月改內班為黃門九月改黃門為內侍省入內內侍省與內侍省號為前後省而入內省比前省尤為親近通侍禁中役服褻近者𨽻入內內侍省供侍殿中備灑掃之職役使雜品者𨽻內侍省職略云入內內侍省號北司內侍省號南班與志不同入內內侍省有都都知都知副都知押班內東頭供奉官內西頭供奉官內侍殿頭內侍髙品內侍髙班內侍黃門內侍省有左班都知副都知右班都知副都知押班內東頭供奉官內西頭供奉官內侍殿頭內侍髙品內侍髙班內侍黃門自供奉官至黃門以一百八十人為定員凡內侍初補曰小黃門經恩遷補則為內侍黃門後省官闕則以前省官補押班次遷副都知次遷都都知遂為內臣之極品熙寧中入內內侍省內侍省都知押班逐省各以轉入先後相壓永為定式其官稱則有內客省使延福宫使宣政使宣慶使昭宣使國初所置職略云太祖以內客省使換樞密以延福宫使換宣徽其旨逺哉由都知延福使以下至寄資諸司副使者即依外官廕補之法元豐議改官制張誠一欲易都知押班之名置殿中監以易內侍省既而宰執進呈神宗曰祖宗為此名有深意豈可輕議四朝志王定國見聞録政和二年始遂改焉以通侍大夫易內客省使正侍大夫易延福宫使中侍大夫易景福殿使中亮大夫易宣慶使中衛大夫易宣政使拱衛大夫易招宣使供奉官易內東頭供奉官左侍禁易內西頭供奉官右侍禁易內侍殿頭左班殿直易內侍髙品右班殿直易內侍髙班而黃門之名如故其屬有御藥院勾當官四人以入內內侍省充掌按驗方書修合藥劑以待進御及供奉禁中之用內東門司勾當官四人以入內內侍省充掌宮禁人物出入周知其名數而譏察之合同憑由司監官二人掌禁中宣索之物給其要驗凡特旨賜豫皆具名數憑由付有司準給管勾往來國信所管勾官二人以都知押班充掌契丹使介交聘之事後苑勾當官無定員以內侍充掌苑囿池沼臺殿種藝雅飾以備遊幸造作所掌造作禁中及皇屬婚娶之名拜龍圖天章寶文閣勾當官四人以入內內侍充掌藏祖宗文章圖籍及符瑞寶玩之物而安像設以崇奉之軍頭引見司勾當官五人以內侍省都知押班及閣門宣贊舍人以上充掌供奉便殿禁衛諸軍入見之事及馬步兩直軍員之名翰林院勾當官一員以內侍押班都知充總天文書藝圖畫醫官四局凡執伎以事上者皆在焉中興以來深懲內侍用事之弊嚴前後省使臣與兵將官往來之禁著內侍官不許出謁及接見賓客之令紹興三十年詔內侍省所掌職務不多徒有冗費可廢併歸入內內侍省舊制內侍遇誕節許進子年十二試以墨義即中程者候三年引見供職三十二年殿中侍御史張震言宦者員衆孝宗即命內侍省開具見在人數免會慶節進子仍定以二百人為額乾道間以差赴德夀宫應奉闕人增至二百五十人紹熙三年因宰臣奏中官只令承受宮禁中事不許預聞他事嘉定初詔內侍省陳乞恩例親屬充寄班祗候以十年為限文獻通考卷五十七
