body:
  text: 文獻通考卷二百四十八鄱陽馬端臨貴與著經籍考七十五集總集各門總總集隋經籍志曰總集者以建安之後詞賦轉繁衆家之集日以滋廣晉代摯虞苦覽者之勞倦於是採摘孔翠芟翦繁蕪自詩賦以下各為條貫合而論之謂之流别是後文集總鈔作者繼軌屬辭之士以為覃奥而取則焉隋志一百七部二千二百一十三卷通計亡書合二百四十九部五千二百二十四卷唐志七十五家九十九部四百二十三卷李淳風以下不著錄七十八家八百一十三卷宋三朝志一百一十七部四千一百八卷宋兩朝志二十九部四百一十三卷宋四朝志六十二部五百一十四卷宋中興志二百九十三家三百一十五部六千五百卷右總集宋三朝藝文志晉李充始著翰林論梁劉勰又著文心雕龍言文章體製又鍾嶸為詩評其後述畧例者多矣至於揚㩁史法著為類例者亦各名家焉前代志錄散在雜家或總集然皆所未安惟吳兢西齋有文史之别今取其名而條次之中興藝文志文史者譏評文人之得失也通志敘論評史韻語陽秋評詩藝苑雌黃則併子史集之誤皆評之唐志四部四家一十八卷劉子元以下皆不著錄二十二家三十三部一百七十九卷宋三朝志三十八部一百二十五卷宋兩朝志八部五十九卷宋四朝志一十八部一百四十卷宋中興志六十二家六十五部四百八十七卷右文史李善註文選六十卷鼂氏曰梁昭明太子蕭統纂選賦詩騷七詔冊令敎䇿秀才文表上書啟彈事牋記書移檄難對問議論序頌贊符命史論連珠銘箴誄哀䇿碑誌行狀弔祭文類之為三十卷竇常謂統著文選以何遜在世不錄其文蓋其人旣往而後其文克定然則所錄皆前人作也唐李善集註析為六十卷善高宗時為𢎞文學士博學經史百家無不備覽而無文時人謂之書簏初為輯註博引經史釋事而忘其義書成上進問其子邕邕無言善曰非邪爾當正之於是邕更加以義釋解精於五臣今釋事加義者兩存焉蘇子瞻嘗讀善註而嘉之故近世復存東坡蘇氏答劉沔書曰梁蕭統文選世以為工以軾觀之拙於文而陋於識者莫統若也宋玉賦高唐神女其初畧陳所夢之因如子虛亡是公相與問答皆賦矣而統謂之敘此與兒童之見何異李陵蘇武贈别長安而詩有江漢之語及陵與武書辭句儇淺正齊梁間小兒所擬作决非西漢文而統不悟劉子元獨知之識眞者少蓋從古所病也五臣註文選三十卷鼂氏曰唐呂延祚集註延祚以李善止引經史不釋述作意義集呂延濟劉良張銑呂向李周翰五人註延祚不與焉復為三十卷開元六年延祚上之名曰五臣註陳氏曰後人并李善元註合為一書名六臣註凡六十卷東坡謂五臣乃俚儒之荒陋者反不及善如謝瞻詩苛慝暴三殤引苛政猛於虎以舅與夫為殤非是然此說乃本於善也玉臺新詠十卷陳氏曰陳徐陵孝穆集且為作序後村劉氏曰徐陵所序玉臺新詠十卷皆文選所棄餘也六朝人少全集雖賴此書畧見一二然尚好不出月露氣骨不脫脂粉雅人莊士見之廢卷昔坡公笑蕭統之陋以陵觀之愈陋於統如沈休文六憶之類其䙝慢有甚於香奩花間者然則自國風楚辭而後固當繼以選詩不易之論也楚漢逸書八十二篇豫章洪芻編宋玉司馬相如司馬遷董仲舒賈誼枚乘路喬如公孫詭鄒陽公孫乘羊勝中山王勝淮南王安班婕妤王褒劉向劉歆揚雄班固凡十九家敘其可考而讀者共八十二篇野處洪氏題後曰此書傳於道山又有漢賢遺集所載畧同凡所脫字皆據以衍入猶有疑不可知者他日當以諸書互出者參校之雜文章一卷鼂氏曰孫巨源得之於祕閣載宋玉等賦頌五十八篇景迂生元豐甲子以李公擇本校正後有劉大經田為王雲李端唐君益諸人題跋古文苑九卷陳氏曰不知何人集皆漢以來遺文史傳及文選所無者世傳孫洙巨源於佛寺經龕中得之唐人所藏韓無咎類次為九卷刻之婺州中興書目有孔逭文苑非此書孔逭晉人本書百卷惟存十九卷耳古文章十六卷陳氏曰會稽石公輔編與前書相出入而稍多亦有史傳中抄出者首卷為武王丹書其末蔡琰胡笳十八拍也館閣書目又有漢魏文章二卷集宋玉以下文八十八首未見晉代名臣文集容齋洪氏隨筆曰故簏中得舊書一帙題為晉代名臣文集凡十四家所載多不能全眞泰山一毫芒耳有張敏者太原人仕歴平南參軍太子舍人濟北長史其一篇曰頭責子羽文極為尖新古來文士皆無此作恐藝文類聚文苑英華或有之惜其泯沒不傳謾采以遺博雅君子文見五筆第四卷其文九百餘言頗有東方朔客難劉孝標絶交論之體集仙傳所載神女成公智瓊傳見於太平廣記蓋敏之作也鄒湛姓名因羊叔子而傳而字曰潤甫蓋見於此文粹一百卷鼂氏曰宋朝姚鉉字寶臣編鉉廬州人太平興國中進士文辭敏麗善書札藏書至多頗有異本累遷兩浙漕課吏寫書采唐世文章分門編類初為五十卷後復增廣之坐事斥連州卒其子以其書上獻詔藏内府命以一官陳氏曰鉉為兩浙轉運使在杭州與知州薛映不協映摭其罪狀數條密以聞當奪一官特除名貶連州文學其自為序稱吳興姚鉉蓋本郡望鉉實合肥人麈史姚鉉集唐人所為古賦樂章歌詩贊頌碑銘文論箴表傳錄書序凡百卷名文粹予在開封時得唐潭州刺史張登文集一䇿三卷權文公為序其畧曰如求居寄别懷人三賦與證相一篇意有所激鏘然玉振倘有繼昭明之為者斯不可遺也然觀文粹並不編載由是知姚亦有未見者鉉謫居連州嘗寫所著文粹一百卷好事者於縣建樓貯之官屬多遣吏寫錄吏以為苦以鹽水噀之冀其速壞後以火焚其樓續古文詩苑英華集十卷鼂氏曰唐僧惠淨撰輯梁武帝大同中會三敎篇至唐劉孝孫成臯望河之作凡一百五十四人歌詩五百四十八篇孝孫為之序珠英學士集五卷鼂氏曰唐武后朝嘗詔武三思等修三敎珠英一千三百卷預修書者凡四十七人崔融編集其所賦詩各題爵里以官班為次融為之序麗則集五卷鼂氏曰唐李氏撰不著名集文選以後至唐開元詞人詩凡三百二十首分門編類貞元中鄭餘慶為序梁詞人麗句一卷陳氏曰唐李商隱集梁明帝而下十五人詩并鬼詩童謠玉臺後集十卷陳氏曰唐李康成撰後村劉氏曰鄭左司子敬家有玉臺後集天寶間李康成所選自陳後主隋煬帝江總庾信沈宋王楊盧駱而下二百九人詩六百七十首彚為十卷與前集等皆徐陵所遺落者往往其時諸人之集尚存天寶間大詩人如李杜高適岑參輩迭出康成同時乃不為世所稱若非子敬家偶存此編則許多佳句失傳矣中間自載其詩八首如自君之出矣絃吹絶無聲思君如百草撩亂逐春生似六朝人語如河陽店家女長編一首押五十二韻若欲與木蘭及孔雀東南飛之作方駕者末云因緣茍會合萬里猶同鄉運命倘不諧隔壁無津梁亦佳篋中集一卷陳氏曰唐元結次山錄沈千運趙微明孟雲卿張彪元季川于逖王季友七人詩二十四首盡篋中所有次之荆公詩選盡取不遺唐中世詩高古如此今人乃專尚季末亦異矣館閣書目以為結自作入别集門非是國秀集三卷陳氏曰唐國子進士芮挺章集李嶠至祖詠九十人詩二百二十首天寶三載國子進士樓頴為序搜玉小集一卷陳氏曰自崔湜至崔融三十七人詩六十一首竇氏聯珠集五卷陳氏曰唐禇藏言所序竇氏兄弟五人詩各有小序曰國子祭酒常中行國子司業牟貽周容管經畧羣州列婺州刺史庠胄卿武昌節度使鞏友封皆拾遺叔向子也五人惟羣以處士薦入諫省庠以辟舉餘皆進士科容齋洪氏隨筆曰竇氏聯珠序云五竇之父叔向當代宗朝善五言詩名冠流輩時屬正懿皇后山陵上注意哀挽卽時進三章内考首出傳諸人口有命婦羞蘋葉都人揷柰花禁兵環素帟宮女哭寒雲之句可謂佳唱而畧無一首存於今荆公百家詩選亦無之是可惜也予嘗得故吳良嗣家所抄唐詩僅有叔向六篇皆奇作念其不傳於世今悉錄之詩見四筆第六卷叔向字遺直仕至左拾遺出為溧水令唐書亦稱其以詩自名云唐御覽詩一卷陳氏曰唐翰林學士令狐楚纂劉方平而下迄於梁鍠凡三十人詩二百八十九首一名唐新詩又名曰選進集又名元和御覽河嶽英靈集二卷陳氏曰唐進士殷璠集常建等詩二百三十四首極元集一卷陳氏曰唐姚合集王維至戴叔倫二十一人詩一百首曰此詩家射鵰手也中興間氣集三卷鼂氏曰唐高仲武輯至德迄大歴中錢起以下二十六人詩自為序以天寶叛渙述作中廢至德中興風雅復振故以名仍品藻衆作著之於前云或又題孟彦深纂陳氏曰所選詩一百三十二首各有小傳敘其大畧且拈提其警句而議論文辭皆凡鄙南薰集三卷鼂氏曰唐竇常撰集韓翊至皎然三十人約三百六十篇凡三卷其序云欲勒上中下則近於褒貶題一二三則有等差故以西掖南宮外臺為目人各係名係贊本事詩一卷鼂氏曰唐孟棨撰纂歴代詞人緣情感事之詩叙其本事凡七類斷金集一卷鼂氏曰唐令狐楚韓琪與李逄吉自為進士以至宦達所與酬唱詩什開成初裴夷直序之唐詩類選二十卷陳氏曰唐太子校書郎顧陶集凡一千二百三十二首自為序大中景子歲也陶會昌四年進士漢上題襟集三卷陳氏曰唐段成式溫庭筠崔皎余知古韋蟾徐商等唱和詩什往來簡牘蓋在襄陽時也松陵集十卷鼂氏曰唐皮日休與陸龜蒙酬唱詩凡六百五十八首龜蒙編次之日休為序松陵者平江地名也唐賦二十卷鼂氏曰唐科舉之文也裴穎士裴度白居易薛逄陸龜䝉之作皆在焉竒章集四卷中興藝文志集唐李林甫至崔湜百餘家詩竒警者集者不知名咸通初表奏集一卷中興藝文志唐夏侯孜令狐綯于琮白敏中等作集者不知名西漢文類二十卷鼂氏曰唐栁宗直撰其兄宗元嘗為之序至皇朝其書亡陶氏者重編纂成也陳氏曰宗直此書四十卷唐藝文志有之其書不傳今書陶叔獻元之所編次未詳何人梅堯臣為之序子厚序略曰文之近古而尤壯麗莫若漢之西京班固書傳之吾嘗病其畔散不屬無以考其變欲采比義會年長病作駑墮愈甚未能勝也幸吾弟宗直愛古書樂而成之搜討磔裂攟摭融結離而同之與類推移不易時月而咸得從其條貫森然若開羣玉之府指揮聯累圭璋琮璜之狀各有列位不失其敘雖第其價可也以文觀之則賦頌詩歌書奏詔䇿辯論之辭畢具以語觀之則右史紀言尚書戰國䇿成敗興壞之說大備無不苞也噫是可以為學者之端邪始吾少時有路子者自贊為是書吾嘉而叙其意而其書終莫能具卒俟宗直也故刪取其叙係於左以為西漢文類首紀東漢文類三十卷鼂氏曰五代竇儼編三國文類四十卷陳氏曰不知何人集唐文類三十卷鼂氏曰皇朝陶叔獻編唐類表二十卷陳氏曰館閣書有李吉甫所集唐類表五十卷未之見也漢唐䇿要十卷鼂氏曰陶叔獻編續本事詩二卷鼂氏曰偽吳處常子撰未詳其人自有序云比覽孟初中本事詩輙搜篋中所有依前題七章類而編之皆唐人詩也才調集十卷陳氏曰後蜀韋縠集唐人詩洞天集五卷陳氏曰漢王貞範集道家神仙隠逸詩篇漢乾祐中也煙花集五卷陳氏曰蜀後主王衍集豔詩二百篇且為之序文苑英華一千卷陳氏曰太平興國七年命學士李昉扈蒙徐鉉宋白等閱前代文學撮其精要以類分之續又命蘇易簡王祐等至雍熙三年書成王氏曰太平中諸降王舊臣或宣怨言太宗盡收用之寘之館閣使修羣書如冊府元龜文苑英華太平廣記之類廣其卷帙厚其廪祿贍給以役其心多卒老於文字之間云平園周氏跋文苑英華後曰臣伏覩太宗皇帝丁時太平以文化成天下旣得諸國圖籍聚名士於朝詔修三大書曰太平御覽曰冊府元龜曰文苑英華各一千卷今二書閩蜀已刋惟文苑英華士大夫間絶無而僅有蓋所集止唐文章如南北朝間存一二是時印本絶少雖韓栁元白之文尚未甚傳其他如陳子昻張說張九齡李翺諸名士文籍世猶罕見故修書官於宗元居易權德輿李商隱顧雲羅隱或全卷收入當眞宗朝姚鉉銓擇十一號唐文粹由簡故精所以盛行近歲唐文摹印寖多不假英華而傳况卷帙浩繁人力難及其不行於世則宜臣事孝宗皇帝間聞聖諭欲刻江鈿文海臣奏其去取差謬不足觀帝乃詔館閣裒集皇朝文鑑臣因及英華雖祕閣有本然舛誤不可讀俄聞傳旨取入遂經乙覽時御前置校正書籍一二十員皆書生稍習文墨者月給餐錢滿數歲補進武校尉旣得此為課程往往妄加塗注繕寫装飾付之祕閣後世将遂為定本臣過計有三不可國初文籍雖寫本然校讎頗精後來淺學改易寖失本旨今乃盡以印本易舊書是非相亂一也凡廟諱未祧止當闕筆而校正者於賦中以商為殷以洪易𢎞或値押韻全韻隨之至於唐諱及本朝諱存改不定二也元缺一句或二句或頗用古語乃以不知為知擅自增損使前代遺文幸存者轉增疵纇三也頃嘗屬荆帥范仲藝均倅丁介稍加校正晩幸退休徧求别本與士友詳議疑則缺之凡經史子集傳註通典通鑑及藝文類聚初學記下至樂府釋老小說之類無不參用惟是元脩書歴年多非出一手叢脞重複首尾衡決一詩或析為三二詩或合為一姓名差互先後顚倒不可勝計其間賦多用員字非讀秦誓正義安知今日之云字乃員之省文以堯韭對舜榮非讀本草註安知其為菖蒲又如切磋之磋馳驅之驅掛帆之帆仙装之装廣韻各有側音而流俗改切磋為效課以駐易驅以席易帆以仗易装今皆正之詳註逐篇之下不復徧舉始讎於嘉泰改元春至四年秋訖工蓋欲流傳斯世廣熙陵右文之盛彰阜陵好善之優老臣發端之志深懼求者之莫知其由故列興國至雍熙成書歲月而述證誤本末如此缺疑尚多謹俟來哲羣書麗藻六十五卷陳氏曰按三朝藝文志一千卷崔遵度編中興館閣書目但有目錄五十卷云南唐司門員外郎崔遵度撰以六例總括古今之文一曰六籍瓊華二曰信史瑶英三曰玉海九流四曰集苑金鑾五曰絳闕蘂珠六曰鳯首龍編為二百六十七門總一萬三千八百首今無目錄合三本共存此卷數斷續訛缺不復成書當其傳寫時固已如此矣其目止有四種無金鑾蘂珠二類姑存之以備缺文按江南餘錄載遵度青州人居金陵高尚不仕中興書目云司門郎未知何據也文選目錄二卷陳氏曰丞相元獻公晏殊集中興館閣書目以為不知名誤也大略欲續文選故亦及於庾信何遜陰鏗諸人而云唐人文者亦非莆田李氏有此書凡一百卷力不暇傳姑存其目唐百家詩選二十卷鼂氏曰皇朝宋敏求次道編次道為三司判官嘗取其家所藏唐人一百八家詩選擇其佳者凡一千二百四十六首為一編王介甫觀之因再有所去取且題云欲觀唐詩者觀此足矣世遂以為介甫所纂陳氏曰世言李杜韓詩不與為有深意其實不然按此集非特不及此三家而唐名人如王右丞韋蘇州元白劉栁孟東野張文昌之倫皆不在選意荆公所選特世所罕見其顯然在人者固不待選邪抑宋氏獨有此一百五集據而擇之他不復及邪未可以臆斷也四家詩選十卷陳氏曰王安石所選杜韓歐李詩其置李於末而歐反在其上或亦謂有抑揚云唐宋類詩二十卷鼂氏曰皇朝僧仁贊序稱羅唐兩士所編而不載其名分類編次唐及宋朝祥符以前名人詩西崑酬唱集二卷鼂氏曰楊億劉筠李宗諤鼂某錢惟演及當時同館十五人唱和詩凡二百四十七章前有楊億序陳氏曰所謂崑體者於此可見歐公詩話曰楊大年與錢劉諸公唱和自西崑集出時人爭效之詩體一變而先生老輩患其多用故事至於語僻難曉殊不知自是學者之敝如子儀一作大年新蟬云風來玉宇烏先轉露下金莖鵲未知雖用故事何害為佳句也又如大年詩峭帆橫渡官橋栁疊鼓驚飛海岸鷗其不用故事又豈不佳乎蓋其雄文博學筆力有餘故無施而不可非如前世號詩人者區區於風雲草木之類為許洞所困也寶刻叢章三十卷鼂氏曰皇朝宋敏求次道編次道聚天下古今詩歌石刻一千一百三十篇多有别集中所逸者以其相附近者相從又次以歲月先後王益柔為之序云文章難能者莫如詩凡刻之金石者則必其自以為得或作於人所愛重者故多有清新瓌麗之語覽者其深究焉三謝詩一卷陳氏曰集謝靈運惠連元暉詩不知何人集中興書目云唐庚子西謝氏蘭玉集十卷陳氏曰吳興汪聞集謝安而下子孫十六人詩三百餘篇聞熙寧六年進士序稱新天子卽位之歲元祐元年也樂府集十卷解題一卷陳氏曰題劉次莊中興書目直云次莊撰取前代樂府分類為十九門而各釋其命題之意按唐志樂類有樂府歌詩十卷者二有吳兢樂府古題要解一卷今此集所載止於陳隋人則當是唐集之舊而序文及其中頗及杜甫韓愈元白諸人意者次莊因舊而增廣之歟然館閣書目又自有吳兢題解及别出古樂府十卷解題一卷未可考也樂府詩集一百卷陳氏曰太原郭茂倩集凡古今號稱樂府者皆在焉其為門十有二首尾皆無序文中興書目亦不言其人本末按茂倩侍讀學士郭仲褒之孫昭陵名臣也本鄆州須城人有子曰源中源明茂倩源中之子也但未詳其官位所至歲時雜詠二十卷鼂氏曰皇朝宋綬編宣獻公昔在中書第三閣手編古詩及魏晉迄唐人歲時章什一千五百有六釐為十八卷今益為二十卷云唐僧詩三卷陳氏曰吳僧法欽集唐僧三十四人詩二百餘篇楊傑次公為之序後村劉氏曰唐僧見於韓氏者七人唯大顚穎師免嘲侮高閑草書頗見貶抑如惠如靈如文暢如澄觀直以為戲笑之具而已靈尤跌蕩至於醉花月而羅嬋娟豈佳僧乎韓公方欲冠其顚始聞澄觀能詩欲加冠巾及觀來謁見其已老則又澘然惜其無及所謂善戲謔不為虐者邪九僧詩集一卷鼂氏曰皇朝僧希晝保暹文兆行肇簡長惟鳯惠業牢昭懷古也陳充為序凡一百十篇歐公曰進士許洞因會九僧分題出一紙約曰不得犯一字其字乃山水風雲竹石花草雪霜禽日星鳥之類於是諸僧皆閣筆此本出李夷中家其詩可稱者甚多惜乎歐公不盡見之許洞之約雖足以困諸僧然論詩者正不當爾蓋詩多識鳥獸草木之名而楚辭亦寓意於飈風雲霓如池塘生春草窓間列遠岫天際識歸舟雲中辨江樹蟬噪林逾靜鳥鳴山更幽庭草無人隨意綠宮漏出花遲楓落吳江冷空梁落燕泥微雲淡河漢疎雨滴梧桐殘星幾㸃鴈橫塞長笛一聲人倚樓雞聲茅店月人跡板橋霜之類莫不犯之若使此諸公與許洞分題亦須閣筆矧其下者哉陳氏曰凡一百七首景德初直昭文館陳充序目之曰琢玉工以對姚合射鵰手九人惟惠崇有别集歐公詩話乃云其集已亡惟記惠崇一人今不復知有九僧未知何也歐陽公詩話曰國初浮屠以詩名於世者九人故時有集號九僧詩今不復傳矣余少時聞人多稱其一曰惠崇餘八人者忘其名字余亦畧記其詩有云馬放降來地鵰盤戰後雲又云春生桂嶺外人在海門西其佳句多類此瑶池新集一卷鼂氏曰唐蔡省風集唐世能詩婦人李秀蘭至程長文二十三人詩什一百十五首各為小序以冠其前且總為序其畧云世叔之婦修史屬文皇甫之妻抱忠善𨽻蘇氏雅於廻文蘭英擅於宮掖晉紀道韞之辨漢尚文姬之辭况今文明之盛乎名臣贄种隱君書啟一卷陳氏曰祥符諸賢所與种放明逸書牘也首篇張司空齊賢書自叙平生出處甚詳可以見國初名臣氣象仕塗必用集二十一卷鼂氏曰宋朝祝熙載編本朝楊劉以後諸公表啟為一編陳氏曰吳郡祝熙載序云陳君材夫所編皆未詳何人錄景德以來人表牋雜文亦有熙載所作者題為祝著作當是未改官制前人也三家宮詞三卷陳氏曰唐王建蜀花蘂夫人宋朝丞相王珪三人所著五家宮詞五卷陳氏曰石晉宰相和凝本朝學士宋白中大夫張公庠直祕閣周彦質及王仲修共五人各百首仲修當是珪之子丹陽類藁十卷鼂氏曰宋朝曾􅌈編元豐中􅌈守官潤州因采諸家之集始自東漢終於南唐凡得歌詩賦贊五百餘篇雲臺編六卷鼂氏曰宋朝耿思柔纂華州雲臺觀古今君臣所題詩什清才集十卷鼂氏曰宋朝劉禹卿編輯古今題劒門詩什銘賦蒲逄為序和陶集十卷陳氏曰蘇氏兄弟追和傅共註汝陰唱和集一卷陳氏曰元祐中蘇軾子瞻守潁與簽判趙令畤德麟敎授陳師道無已唱和鼂說之以道為之序李廌方叔後序二序皆為德麟作綸言集一百卷鼂氏曰或編國朝制冊詔誥成此書以為皆王言也故以為名太平盛典二十三卷鼂氏曰或編政和間制誥表章多有可觀者續中興制草三十卷丞相益公周必大集自為序曰嘉祐中歐陽修建言學士所作文書皆繫朝廷大事示於後世則為王者之謨訓藏之有司乃是本朝之故實而景祐以後漸成散失於是以門類年次編為卷帙號學士院草錄中經兵火文人故家僅傳所課玉堂集及大詔令者其全書不可得而見矣近歲承㫖洪遵起建炎中興迄紹興内禪三紀之間得制草六十四卷序而藏之復十年於兹今乃命史院裒隆興以來舊藁繼遵所編而以上太上皇帝尊號表文為之首其餘制詔各從其類復增召試館職䇿問合三十卷繼今隨事附益則卷帙未止在後人續之而已高麗詩三卷鼂氏曰元豐中高麗遣崔思齊李子威高琥康壽平李穗入貢上元宴之於東闕下神宗製詩賜館伴畢仲行仲行與五人者及兩府皆和進其後使人金梯朴寅亮裴闕李絳孫盧栁金化珍等途中唱和七十餘篇自編之為西上雜詠絳孫為之序聖宋文粹三十卷鼂氏曰不題撰人輯慶歴間羣公詩文劉牧黃通之徒皆在其選宋文海一百二十卷鼂氏曰江鈿編集本朝諸公所著賦詩表啟書論說述議記序傳文贊頌銘碑制詔疏詞誌挽祭禱文凡三十八門雖頗該博而去取無法皇宋詩選五十七卷鼂氏曰皇朝曾慥編慥魯公裔孫守贛川帥荆渚日選本朝自冦萊公以次至僧璉二百餘家詩序云博采旁搜㧞尤取頴悉表而出焉陳氏曰慥字端伯官至太府卿編此所以續荆公之詩選而鑒識不高去取無法為小傳畧無義類議論亦凡鄙陸放翁以比中興間氣集謂相甲乙非虛語也其言歐王蘇不入選以擬荆公不及李杜韓之意荆公前選不然余固言之矣唐三百家文粹四百卷眉山成叔陽編後村劉氏序畧曰往時有唐文粹百卷姚鉉之所銓纂已倍於古今眉山成君乃增益之至三百家為四百卷嗚呼何其多也文之多者可以察治言之富者可以觀德眉山鄉多藏書叔陽所以盡力乎其間豈徒然哉叔陽薦於鄉既成此書丐余序之皇朝文鑑一百五十卷陳氏曰呂祖謙編周益公為序既成封以遺呂一讀命藏之蓋亦未當乎呂之意也張南軒以為無補治道何益後學而朱晦庵晩年嘗語學者曰此書編次篇篇有意每卷首必取一大文字作壓卷如賦取五鳯樓之類其所載奏議亦係一時政治大節祖宗二百年規模與後來中變之意盡在其間非選粹比也建炎以來朝野雜記文鑑者呂祖謙被旨所編也先是臨安書坊有所謂聖宋文海者近歲江鈿所編孝宗得之命本府校正刻板時淳熙四年十一月也周益公以學士輪當内直因奏言此編去取差謬殊無倫理莫若委館閣官銓擇本朝文章成一代之書上大以為然曰卿可理會益公奏乞委館職後二日伯恭以祕書郎轉對上遂令伯恭校正本府開雕始趙丞相以西府奏事上問伯恭文采及為人如何趙力薦之故有是命伯恭言文海元係書坊一時刋行名賢高文大冊尚多遺落乞一就增損仍斷自中興以前銓次庶可行遠許之又命知臨安府趙磻老并本府敎官二員同伯恭校正磻老言臣府事繁委慮妨本職兼䇿府書籍亦難令敎官携出乞專令祖謙校正從之於是伯恭盡取祕府及士大夫所藏本朝諸家文集旁采傳記他書悉行編類凡六十一門為百五十卷旣而伯恭再遷著作郎兼禮部郎官五年十二月得中風病六年正月引疾求去有旨予郡後十三日乃以書進二月上諭輔臣曰祖謙編類文海採摭精詳可除直祕閣又宣諭賜銀帛三百疋兩時方嚴非有功不除職之令舍人陳叔進駮之輔臣奏事上曰謂祖謙平日好名則有之今此編次文海採取精詳且如奏議之類有益治道故以寵之可即命詞叔進不得已草制曰館閣之職文史為先爾編類文海用意甚深採取精詳有益治道寓直中祕酬寵良多爾當知恩之有自省行之不誣用竭報焉人斯無議時益公為禮部尚書兼學士得旨撰文海序奏乞名皇朝文鑑從之時序旣成將刻板會有近臣密啟云所載臣僚奏議有詆及祖宗政事者不可示後世乃命直院崔大雅更定增損去留凡數十篇然訖不果刻也張南軒時在江陵移書晦庵曰伯恭好弊精神於閑文字中徒自損何益如編文海何補於治道何補於後學徒使精神困於繙閱亦可憐耳承當編此等文字亦非所以承君德也今孝宗實錄書此事頗詳未知何人當筆其詞云初祖謙得旨校正蓋上意令校讎差誤而已祖謙乃奏以為去取未當欲乞一就增損三省取㫖許之甫數日上仍命磻老與臨安敎官二員同校正則上意猶如初也時祖謙已誦言皆當大去取其實欲自為一書非復如上命議者不以為可磻老及敎官畏之不敢與共事故辭不敢預而祖謙方自謂得計及書成前輩名人之文蒐獮殆盡有通經而不能文辭者亦以表奏厠其間以自矜黨同伐異之功薦紳公論皆疾之及推恩除直祕閣中書舍人陳騤繳還比再下騤雖奉命然頗詆薄之祖謙不敢辯也其書上不復降出云史臣所謂通經而不能文詞蓋指伊川也時侂胄方以道學為禁故詆伯恭如此而牽聯及於伊川云然余謂伯恭既為詞臣醜詆自當力辭職名受之非矣黃直卿亦以余言為然朱子語錄伯恭文鑑有止編其文理佳者有其文且如此而衆人以為佳者有其文雖不甚佳而其人賢名微恐其泯沒亦編其一二篇者有文雖不佳而理可取者凡五例已忘其一熹與伯恭書云文鑑條例甚當今想已有次第但一種文勝而義理乖僻者恐不可取其只為虛文而不說義理者却不妨耳佛老文字恐須如歐陽公登眞觀記曾子固仙都觀菜園寺記之屬乃可入其他贊邪害正者文詞雖工恐皆不可取也熹讀文鑑曰伯恭去取之文如某平時不熟者也不敢斷他有數般皆某熟㸔底今㨂得無把鼻如詩好底都不在上靣却載那衰颯底把作好句法又無把作好意思又無把作好勸戒亦無康節詩如天向一中分造化人從心上起經綸却不編入又曰文鑑後來為人所譖復令崔敦詩刪定奏議多刪改之如蜀人呂綯有一文論制師服此意甚佳呂止收此一篇崔云綯多少好文何獨收此遂去之更無入他文又曰如編得沈存中律歴一篇說渾天儀亦好水心葉氏曰自古類書未有善於此者按上世以道為治而文出於其中戰國至秦道統放滅自無可論後世可論惟漢唐然旣不知以道為治當時見於文者徃徃訛雜乖戾各恣私情極其所到便為雄長類次者復不能歸一以為文正當爾華忘實巧傷正蕩流不反於義理愈害而治道愈遠矣此書刋落浩穰百存一二茍其義無所考雖其文不錄或於事有所該雖稍質不廢鉅家鴻筆以浮淺受黜稀名短句以幽遠見收合而論之大抵欲約一代治體歸之於道而不以區區虛文為主余以舊所聞於呂氏又推言之學者可以覽焉然則謂莊周相如為文章宗者司馬遷韓愈之過也周必大承詔為序稱建隆淳熙之間其文偉咸平景德之際其文博天聖明道之辭古熙寧元祐之辭達按呂氏所次二千餘篇天聖明道以前在者不能十一其工拙可驗矣文字之興萌芽於栁開穆修而歐陽修最有力曾鞏王安石蘇洵父子繼之始大振故蘇氏謂天聖景祐斯文終有媿於古此論世所共知不可改安得均年析號各擅其美乎及王氏用事以周孔自比掩絶前作程氏兄弟發明道學從者十八九文字遂復淪壞則所謂熙寧元祐其辭達亦豈的論哉且人主之職以道出治形而為文堯舜禹湯是也若所好者文由文合道則必深明統紀洞見本末使淺知狹好無所行於其間然後能有助於治乃侍從之臣相與論思之力也而此序無一字不諂尚何望其開廣德意哉蓋此書以序而晦不以序而顯學者宜審觀也又曰文字總集各為流别始於摯虞以簡代繁而巳未必有意然聚之旣多則勢亦不能久傳今其遠者獨一文選尚存以其少也近世多者至百千卷今雖尚存後必淪逸獨呂氏文鑑去取最為有意止百五十卷得繁簡之中鮮遺落之患所可惜者前代文字源流不能相接若自本朝至渡江則粲然矣歴代確論一百一卷陳氏曰不知何人集自三皇五帝以及五代凡有論述者隨世代編次右總集文獻通考卷二百四十八
