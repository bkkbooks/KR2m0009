body:
  text: 文獻通考卷一百七十六鄱陽馬端臨貴與著經籍考三經易伊川易傳十卷程子序至微者理也至著者象也體用一源顯微無間觀會通以行其典禮則辭無所不備故善學者求言必自近易於近者非知言者也豫所傳者辭也由辭以得意則在乎人焉遺書張閎中以書問易之義本起於數程子答曰謂義起數則非也有理而後有象有象而後有數易因象以知數得其義則象在其中矣必欲窮象之隱微盡數之毫忽乃尋流逐末術家所向非儒者之務也管輅郭璞之學是已又曰理無形也故因象以明理理見乎辭者也則可由辭以觀象故曰得其義則象數在其中矣門弟子請問易傳事雖有一字之疑伊川必再三喻之蓋其潛心甚久未嘗容易下一字也伊川以易傳示門人曰亦只説得七分後人更須自體究朱子曰自秦漢以來考象辭者泥於術數而不得其𢎞通簡易之法談義理者淪於空寂而不適乎仁義中正之歸求其因時立教以承三聖不同於法而同於道者則惟伊川先生程氏之書而已後之君子誠能日取其一卦若一爻者熟復而深玩之如己有疑將決於筮而得之者虛心端意推之於事而反之於身以求其所以處此之實則於吉凶消長之理進退存亡之道將無所求而不得邇之事父逺之事君亦無處而不當矣程子髙弟尹公嘗謂易傳乃夫子自著欲知道者求於此足矣不必旁觀他書蓋語録或有他人所記未必盡得先生意又言先生踐履盡一部易其作傳只是因而寫成此言尤有味又曰易傳不看本文亦自成一書又曰易傳眀白無難看處但此是先生以天下許多道理散入六十四卦三百八十四爻之中將作易看却無意味須將來作事看即句句字字有用處耳程先生易傳義理精字數足無一毫欠缺只是於本義不相合易本是卜筮之書程先生只説得一理程易言理甚備象數却欠在按伊川之易精於義理而略於卜筮象數此固先儒之説然愚嘗以為易之象數卜筮豈出於義理之外蓋有此理則有此象有此數而卜筮之説其所謂趨吉避凶惠迪從逆云者又未嘗不一出於義理平時本諸踐履則觀象玩辭此義理也一旦謀及卜筮則觀變玩占亦此義理也初不必岐而二之然言出聖賢之口則單辭片語皆有妙理假借旁通悉為至教往往多借易以眀理初不拘於説易也自夫子而然矣何也君子學以聚之問以辨之寬以居之仁以行之為乾九二而言也而乾之九二豈有學問寬仁之義乎日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉為咸九四而言也而咸之九四豈有歲時代謝之義乎蓋其初因􅊰易遂借易以言理言理雖精而於易此卦此爻之旨則逺矣如程子因君子豹變而發為自暴自棄之論因君子得輿而發為匪風下泉之論亦是意也晦庵所謂不看夲文自成一書者是已鼂氏曰朱震言頤之學出於周敦頤敦頤得之穆修亦夲於陳摶與邵雍之學然考正叔之解不及象數頗與胡翼之相類景迂云胡武平周茂叔同師潤州鶴林寺僧夀涯其後武平傳其學於家茂叔則授二程與震之説不同按伊川之學出自濂溪此先儒通論也而鼂朱之説以為濂溪所師夲於希夷及一僧則固老釋之宗旨矣此論未之前聞陳氏曰伊川止解六十四卦不解大傳而以序卦分置諸卦之首唐李鼎祚集解亦然王介甫易解二十卷龔原耿南仲注易各二十卷鼂氏曰介甫三經義皆頒學官獨易解自謂少作未善不専以取士故紹聖後與龔原耿南仲注易三書偕行於場屋東坡易傳十一卷鼂氏曰東坡自言其學出於父洵且謂卦不可爻别而觀之其論卦必先求其所齊之端則六爻之義未有不貫者未嘗鑿而通之也朱子語録曰老蘇説易専得於愛惡相攻而吉凶生以下三句他把這六爻似那纍世相讐相殺底人相似看這一爻攻那一爻這一畫克那一畫全不近人情東坡見他恁地太粗疏却添得些佛老在裏其書自做兩樣亦間有取王輔嗣之説以補老蘇之説亦有不曉得他説了亂填補處老蘇説底亦有去那物理上看得著處又雜學辨曰乾上彖辭發明性命之理與詩蒸民維天之命書湯誥泰誓中庸孟子相表裏而大傳之言亦若符契蘇氏不知其説而欲以其所臆度者言之又畏人之指其失也故每為不可言不可見之説以先後之務為閃倐滉漾不可捕捉之形使讀者茫然雖欲攻之而無措其辨殊不知性命之理甚明而其為説至簡今將言之而先曰不可言既指之而又曰不可見足以眩夫未嘗學問之庸人矣由學者觀之豈不適所以為未嘗見未嘗知之驗哉然道衰學絶世頗惑之故為之辨以待後之君子而其他言死生鬼神之不合者亦并附焉橫渠易説十卷鼂氏曰其解甚略繫辭差詳溫公易説一卷鼂氏曰雜解易義無銓次蓋未成書也乾生歸一圖二卷鼂氏曰皇朝石汝礪撰先辨卦彖爻象之别後列數圖頗雜以釋老之説陳氏曰嘉祐初人序取乾為生生之本萬物歸於一也有論有圖亦頗與劉牧辨然或雜以釋老之學其所謂一者自注云一則靈寂真元首篇論道専以靈明靈字恐誤或當作虛無體無生為主又曰因靈不動而生寂體豈非異端之説乎周易義海一百卷鼂氏曰皇朝房審權撰集鄭玄至王安石凡百家摘取其専明人事者為一編或諸家説有異同輒加評議附之篇末陳氏曰審權編義海凡四卷近時江都李衡彥平刪削而益以東坡伊川漢上之説為撮要十卷若房氏百卷之書則未見也衡乾道中由侍御史為起居郎張弼葆光易解十卷鼂氏曰弼莆田人字舜元紹聖中章惇薦於朝賜號葆光處士後黃裳等再薦詔以為福州司戶夲州教授其學頗宗鄭氏陳氏曰其學多言取象鄭揚庭周易傳十三卷邵伯溫辨惑云沈存中筆談言江南人鄭夬字揚庭曽為一書談易其間一説曰乾坤大父母也復姤小父母也乾一變生復得一陽坤一變生姤得一隂云云至乾六變生歸妹本得三十二陽坤六變生漸本得三十二隂乾坤錯綜隂陽各得三十二生六十四卦即邵氏先天圖夬之為書皆荒唐之論獨有此變卦之説未知其是非豫後見兵部員外郎秦玠論夬所談駭然曰何處得此法玠云嘗遇一異人受此厯數推往古興衰運厯無不皆驗嘗恨不能盡其術西都邵雍亦知大略已能洞知吉凶之變此人乃形之於書必有天譴此非世人所得聞也竊惟我先君易學微妙玄深不肖所不得知也其傳授夲末則受易於李之才挺之挺之師穆修伯長伯長師陳摶圖南先君之學雖有傳授而微妙變通則其所自得也平時未嘗妄以語人惟大名王天恱滎陽張子望嘗從學又皆蚤死秦玠鄭夬嘗欲從先君學先君以玠頗好任數夬志在口耳多外慕皆不之許玠嘗語夬以王天恱傳先君之學夬力求之天恱不許天恱感疾且卒夬賂其僕於卧內竊得之遂以為已學著易傳易測宋範五經明用數書皆破碎妄作穿鑿不根嘗以變卦圖示秦玠夬竊天恱書入京師補國子監解試䇿問八卦次序夬以所得之説對有司異之擢在優等既登第以所著書投贄公卿之門後以贓罪竄秦謂必有天譴恐指此秦既知夬竊書乃謂夬何處得此法又謂西都邵某聞大略近乎自欺矣然謂得之異人蓋指希夷而言也鼂氏曰姚嗣宗謂劉牧之學受之吳祕祕受之夬夬又作明數明象明傳道明次例明範五篇周易析蘊二卷陳氏曰孫坦撰凡二卷其首言子夏辭不甚粹或取左氏傳語證之晚又得十八占稱天子曰縣官嘗疑漢杜子夏之學及讀杜傳見引明夷對䇿疑始釋然坦不知何人國史志及中興書目皆不著阮逸易筌六卷陳氏曰逸字天隱每一爻各以一古事繫之頗多合易童子問三卷陳氏曰歐陽永叔撰設為問答其上下卷専言繫辭文言説卦而下皆非聖人之作周易義類三卷陳氏曰顧叔思撰未詳何人序言先儒論説甚衆而其旨未嘗不同卦爻或有不同而辭意未常不一各立標目總而聚之沈存中易解二卷陳氏曰所解甚略不過數卦而於大小畜大小過獨詳陳了翁易説一卷陳氏曰了翁晚年所著止解六十四卦辭旨深晦王逢易説十卷鼂氏曰逄嘗為國子直講著易傳十卷其學宗王弼龔原易講義十卷陳氏曰原字深之嘉祐八年進士初以經學為王安石引用元符後入黨籍呂氏易章句一卷鼂氏曰呂大臨與叔撰其解甚略有統論數篇呂微仲周易古經二卷陳氏曰吕大防微仲所録上下經並録爻辭彖象隨經分上下為六卷上下繫二卷文言説卦各一卷鼂氏曰其序云彖象所以解經始各為一書王弼専治彖象以為注乃分於卦爻之下學者於是始不見完經而文辭次第貫穿之意亦缺然不屬因按古文而正之凡十二篇别無解釋鼂以道古易十二卷鼂氏曰從父詹事公諱説之撰以諸家易及許慎説文等九十五書是正其文字且依漢田何夲分易經上下并十翼通為十二篇以矯費氏王弼之失謂劉向嘗以中古文易經校施孟梁丘經至蜀李撰又嘗注古文易遂名曰古易陳氏曰以道之説曰以彖象文言雜入卦中自費氏始孔頴逹又謂輔嗣之意象本釋經宜相附近分爻之象各附逐爻則費氏初變古之時猶若今乾坤歟古經始變於費氏而卒大亂於王弼奈何後之儒者尤而效之杜預分左氏傳於經宋衷范望散太玄測贊於八十一首之下是其明比也揆觀其初乃如古文尚書遷固敘傳揚雄法言敘篇云爾卷首列名氏二十餘家文字異同則散見於諸卦云巽岩李氏曰鼂氏専主北學凡故訓多取許叔重説文解字陸德明章義僧一行李鼎祚陸希聲及夲朝王昭素胡翼之黃聱隅輩所論亦時采掇呂公書則文字句讀初無增損景迂則輯諸家異同或斷以己意有增有損篇第則放費長公未解輔嗣未注以前舊本并十二篇為八篇呂鼂各有師承初不祖述而其指歸則往往暗合鼂以道太極傳外傳因説共八卷陳氏曰其學夲康節自言學京氏易紹聖間遇洛陽楊賢寶得康節二易圖又從其子伯溫得其遺編始作易傳名曰商瞿傳兵火後失之晚年復為此書又有易玄星紀譜易規二書見本集中又有傳易堂記述漢以來至夲朝傳授甚詳漢上易集傳易圖叢説共十五卷鼂氏曰朱震子發撰自謂其學以程頤為宗和會邵雍張載之論合鄭玄王弼之學為一云其書多采先儒之説以成故曰集解然頗舛誤陳氏曰漢上經筵表中具述源流云陳摶以先天圖傳种放放傳穆修穆修傳李之才之才傳邵雍放以河圖洛書傳李溉溉傳許堅許堅傳范諤昌諤昌傳劉牧穆修以太極圖傳周敦頤敦頤傳程皓程頤是時張載講學於二程邵雍之間故雍著皇極經世書敷陳天地五十有五之數敦頤作通書程頤著易傳載造太和三兩等篇臣今以易傳為宗和會雍載之論上采漢魏吳晉下逮有唐及今包括異同庶幾道離而復合蓋其學専以王弼盡去舊説雜以莊老専尚文辭為非是故其於象數頗加詳焉序稱九卷蓋合説序雜卦為一也朱子語録曰漢上易卦變只變到三爻而止於卦辭多有不通處某更推盡去方通如無妄剛自外來而為主於內只是初剛自訟二移下來晉柔進而上行只是五柔自觀四挨上去此等類按漢上卦變則通不得王弼破互體朱子發用互體朱子發互體一卦中自二至五又自有兩卦這兩卦又伏兩卦林黃中便倒轉推成四卦四卦裏又伏四卦此謂互體這自那風為天於上上有箇艮之象來互體自左氏已言亦有道理只是今推不合處多一卦互換是兩卦伏兩卦是四卦反看又是兩卦又伏兩卦共成八卦梁溪易傳內外篇共十九卷陳氏曰丞相昭武李綱伯紀撰按序內外篇凡二十三卷內篇訓釋上下經繫辭説序雜卦并總論合十卷外篇釋象七明變一訓辭二類占一衍數二合十有三卷今內篇闕總論外篇闕訓辭及衍數下卷存者十卷蓋罷相遷謫時所作其書未行於世館閣亦無之莆田鄭寅子敬從忠定之曽孫得其藏夲頃倅莆田借鄭夲傳録今考梁溪集紹興十三年所編其訓辭二序已云有録無書則雖其家亦亡逸久矣豈其有序而書實未成邪其書於辭變象占無不該貫可謂博矣吳園易解十卷陳氏曰祕閣修撰鄱陽張根知常撰卷後有序論五篇雜説泰論各一篇先天易鈐太極寶局二卷鼂氏曰皇朝牛師德撰自云傳邵雍之學於司馬溫公其説近於術數未知其信然否陳氏曰未詳何人蓋為邵氏之學而専乎術數者也兼山易解二卷傳家易説十一卷鼂氏曰郭忠孝撰忠孝字立之河南人頗明象數自謂得李挺之卦變論於陳子惠因亟讀有得焉靖康中持憲關右死於難故其書散落大半陳氏曰傳家易説十一卷沖晦處士郭雍頤正撰自言其父忠孝受學於程伊川伊川示以易之艮曰艮止也學道之要無出於此自是方覺讀易有味榜其室曰兼山立身行道皆自止始兵興之初先人舊學掃地念欲補續其説中心所止者艮止也潛稽易學以述舊聞用傳於家忠孝字立之名將樞密逵之子自言得先天卦變於河陽陳安民子惠其書出李挺之由是頗通象數仕為永興軍路提刑死於狄難其書散逸雍隱居陕州長陽山中帥守屢薦召之不至由處士封頤正先生其末提舉趙善譽言於朝遣官受所欲言得其傳家兵學六卷以進時淳熙丙午也王湜易學一卷鼂氏曰皇朝王湜同州人早潛心於康節之學其序曰康節有云理有未見不可強求使通故愚於觀物篇之所得既推其所不疑又存其所可疑亦以先生之言自慎不敢輕其去取故也河圖解二卷鼂氏曰皇朝康平撰凡五十二篇麻衣道者正易心法一卷李潛序曰此書頃得之廬山一異人或云許堅或有疑而問者余應之云何疑之有顧其議論可也昔黃帝素問孔子易大傳世尚有疑之嘗曰世固有能作素問者乎固有能作易大傳者乎雖非夲真是亦黃帝孔子之徒也余於正易心法亦曰世固有作之者乎雖非麻衣是乃麻衣之徒也胡不觀其文辭議論乎一滴真金源流天造前無古人後無來者翩然於羲皇心地上馳騁實物外真仙之書也讀來十年方悟浸漬觸類以知易道之大如是也得其人當與共之南軒張子曰嗚呼此真麻衣道者之書也其説獨本於羲皇之畫推乾坤之自然考卦脈之流動論反對變復之際深矣其自得者歟希夷隱君實傳其學二公髙視塵外皆有長往不來之碩抑列禦寇莊周之徒歟雖然概以吾聖門之法則未也形而下者謂之器或者有未察歟其説曰六十四卦惟乾與坤夲之自然是名真體又曰六子重卦乾坤雜氣悉是假合無有定實豫則以為六子重卦皆乾坤雜氣之妙用真實自然非假合也希夷述其説曰學者當於羲皇心地上馳騁無於周孔腳足下盤旋豫則以為學易者須於周孔腳足尋求然後羲皇心地上可得而識推此可概見矣然其書之傳固非牽於文義鑿於私意者所可同年而語也朱子曰此書詞意凡近不類一二百年文字如所謂雷自天下而發山自天下而墜皆無理之妄談所謂一陽生於子月而應於卯月乃術家之小數所謂由破體之乃成全體則爐火之末技所謂人間萬事悉是假合乃佛者之幻語必近年術數末流道聽塗説掇拾老佛醫卜諸説之陋者以成此書後二年守南康有前湘隂主簿戴師愈者求謁即及麻衣易因復扣之宛然此老所作欲馳報敬夫敬夫已下世時當塗守李侍郎夀翁雅好此書亟以書來曰即如君言斯人而能為此書亦吾所碩見幸為津致之戴不久即死而夀翁亦得請西歸矣麻衣易是戴師愈所作太平州刋夲第二跋即其人也昨親見之甚稱此易以為得之隱者問之不肯明言其人某適到其家見有一册雜録乃戴公自作其言皆與麻衣易説相類及戴死其子弟將所作易圖來看乃知真戴所自作也陳氏曰舊傳麻衣道者授希夷先生崇寧間廬山隱者李潛得之凡四十二章蓋依託也朱侍講云南康戴主簿師愈撰乃不唧𠺕底禪不唧𠺕底修養法不唧𠺕底時日法王炎曰洛水李夀翁侍郎喜論易炎嘗問曰侍郎在當塗版行麻衣新説如何李曰程沙隨見屬炎曰恐托名麻衣耳以撲錢背靣喻八卦隂陽純駁此鄙説也以泉雲雨為陽水以澤為隂水與夫子不合李曰然然亦有兩語佳炎曰豈非學者當於羲皇心地上馳騁不當於周孔腳迹下盤旋邪然此二語亦非也無周孔之辭則羲皇心地學者何從探之李無語李名椿易正誤一卷陳氏曰不知何人作也稱其名曰揚又稱元祐以來云云則近世人也據序為書三篇曰正誤曰脫簡曰句讀今所存惟正誤一篇大抵增益郭范之説故并附二書册後周易外義三卷陳氏曰不知何人作載於三朝史志則其來亦久矣大抵於易中所言及於制度名物者皆詳注之於易之夲旨無所發明故曰外義廣川易學二十四卷陳氏曰中書舍人東平董􅓉彥達撰周易窺餘十五卷陳氏曰資政殿學士金華鄭亨仲撰兼取象義不解乾坤二卦獨自屯卦始剛中嘗得罪秦檜豈其於乾坤之義有所避邪鄭東卿易卦疑難圖二十五卷自序冨沙丘先生告某曰易盡在畫中當求諸畫中始得其理若易之用則畫有所不盡於是畫一卦置之座則六十四卦周而復始積日纍月幾五年而後有所入醫卜算厯之書黃老丹竈之説經傳子史凡與易相涉者皆博觀之不泥於文字而一採其意旨以求於吾之卦畫則始之六十四卦皆一理也一理皆夲於吾之一心心外則無理理外則無心心理混融與象數體用冥而為一言乎天地之大蚊虻之細皆不出於吾之心內焉聖人豈欺我哉陳氏曰其書以六十四卦為圖外及六位皇極先天卦氣等圖各附一論説末有繫辭解自言其學出於冨沙丘先生以為易理皆在於畫中於是日畫一卦周而復始久而後有所入沙隨程逈可久曰丘程字憲古有詩曰易理分明在畫中又曰不知畫意空箋注何異丹青在畫中其學傳之東卿云永嘉所刋夲作二册不分卷無繫辭解東卿三山人字少梅先君曰此書夲五行卦氣之説而象數義理出焉無朱子發之瑣碎戴師愈之矯偽讀之時有會心者必宿儒所著張汝明易索十三卷陳氏曰汝明字舜文撰上下經六卷外觀象三觀變玩辭玩占叢説各一汝明元祐壬申進士大觀初為御史省郎遊酢定夫志其墓凌公弼易解義十卷陳氏曰其書十卷善解析文義頗簡潔有所發眀館閣書目有集解六卷稱朝奉大夫凌唐佐撰亦不著夲末豈即其人耶沈該周易小傳六卷陳氏曰釋六爻兼論變卦多本春秋左氏傳占法卦為一論又有繫辭補注十餘則附之卷末昭德易故訓傳十八卷陳氏曰鼂公武子正撰博採古今諸家附以已聞又考載籍行事以明諸爻之變其文義音讀之異者别之逐條曰同異考乾道中上之其議論精博不主一家然亦略於象數讀易老人解説十卷陳氏曰恭政李光泰發撰光忤秦檜謫海外為此書李嘗受學於劉元城易傳拾遺十卷陳氏曰敷文閣直學士胡銓邦衡撰銓謫新州作此書大槩宗主程氏而時出新意於易傳之外李泰發為之序其曰拾遺謙辭也逍遙公易解八卷疑問二卷陳氏曰直學士院李椿年仲永撰其門人鄱陽吳説之景傳所述胡邦衡為作序疑問者説之所録其問答之語也晦庵易傳易夲義易學啓蒙傳十一卷夲義十二卷啓蒙一卷朱子語録曰易只是卜筮之書今人説得來太精了更入粗不得如某之説雖粗然却入得精精義皆在其中若曉得某一人説則曉得伏羲文王之易夲是如此元來有許多道理在方不失易之夲意今未曉得聖人作易之夲意便要説道理縱饒説得好只是與易元不相干聖人分眀説昔者聖人之易觀象設卦繫辭焉以明吉凶幾多分曉某所以説易只是卜筮書者此類可見問讀夲義所釋卦辭若看得分明則彖辭之義亦自明只須略提破此是卦義此是卦象卦體卦變不必更下注腳矣曰某當初作此文字時正欲如此蓋彖辭夲是釋經之卦辭若看卦辭分明則彖亦可見但後來要重整頓過未及不知解者能如此夲意否又曰某作夲義欲將文王卦辭只大綱依文王卦辭略説至其所以然之故却於孔子彖辭中發之且如大畜利貞不家食吉利涉大川只是占得大畜卦者為利正不家食而吉利於涉大川至於剛上而尚賢等處乃孔子發明各有所主爻象亦然如此則不失文王夲意又可見孔子之意但而今未暇整頓耳某之易簡略者當時只是略搭記兼文義伊川及諸儒皆已説了某只就語脈中略牽過這意思近得趙子欽書云語孟説極詳易説太略此譬如燭籠添一條骨則障了一路明若能去其障使之統體光明乃更好蓋著不得詳説也上經猶可曉易解下經多有不可解難曉處不知是某看到末梢懶了解不得為復是難解又曰繫辭也如此只是上繫好看下繫沒理會陳氏曰晦庵初為易傳用王弼夲復以呂氏古易經為夲義其大指略同而加詳焉首列九圖末著揲法大略兼義理占象而言啓蒙之目曰夲圖書原卦畫明蓍筮考變占凡四篇周易變體十六卷陳氏曰吏部郎中都潔聖與撰用蔡墨言乾六爻之例専論之卦為主繫辭精義二卷陳氏曰呂祖謙伯恭集程氏諸家之説程傳不及繫辭故也館閣書目以為託祖謙之名大易粹言十卷陳氏曰知舒州曽穜獻之集二程張遊酢楊時外及二郭之學為一書穜嘗受學於郭白雲呂伯恭古易音訓共十四卷陳氏曰伯恭所定篇次與呂微仲同音訓則其門人王莘叟筆受晦庵刻之臨漳會稽益以程氏是正文字及鼂氏説所著夲義據此夲也吳仁傑古周易十二卷陳氏曰仁傑所録以爻為繫辭今之繫辭為説卦其言十翼謂彖傳繫辭傳上下説卦上中下文言序卦雜卦并上下經為十二篇按漢世傳易者施孟梁丘京費費最晚出不得立於學官其學亡章句惟以彖象文言等解上下經自劉向校中古文易經諸家或脫無咎悔亡惟費氏與古文同東京名儒馬鄭皆傳之其後諸家皆廢而費學孤行以至於今其合彖象文言於經蓋自康成輔嗣以來展轉相傳學者遂不識古文夲經甚至於今世考官命題或連彖象爻辭為一對大義者志得而已往往穿鑿傅會而經旨破碎極矣凡此諸家所録雖頗有同異大較經自為經傳自為傳而於傳之中彖象文言亦各不相混稍復古文之舊均有補於學者宜並存之又有九江周燔所次附見吳氏書篇末今古文恭用視諸夲為無據云又有程逈可久古易考十二篇見後程大昌易原十卷陳氏曰首論天地五十有五之數恭之河圖洛書大衍之異同以此為易之原也以及卦變揲法皆有圖論往往斷以己見出先儒之外李舜臣隆山易夲傳三十三卷陳氏曰其自序以為易起於畫捨畫無以見易因畫論心以中為用如捨夲卦而論他卦及某卦從某卦來者皆所不取洪景盧為之序沙隨易章十卷外篇一卷占法一卷古易考一卷陳氏曰程逈可久撰其論占法雜記占事尤詳逈嘗從喻樗子才學登科仕至邑宰及與前輩名公交遊多所見聞故其論頗有源流根據古易考十二篇闕序雜卦楊誠齋易傳二十卷陳氏曰其序以為易者聖人通變之書惟中為能中天下之不中惟正為能正天下之不正中正立而萬變通又言古未有字八卦之畫即字也林黃中周易經傳集解三十六卷朱子語録曰林黃中以互體為四象八卦林侍郎來言論易有太極是生兩儀兩儀生四象四象生八卦就一卦言之全體為太極內外為兩儀內外及互體為四象又顛倒取為八卦先生曰如此則不是生却是包也始畫卦時只是個隂陽竒耦一生兩兩生四四生八而已方其為太極未有兩儀也由太極而後生兩儀方其為兩儀未有四象也由兩儀而後生四象方其為四象未有八卦也由四象而後生八卦此之謂生若以為包則是未有太極已先有兩儀未有兩儀已先有四象未有四象已先有八卦矣林曰惟其包之所以生之也先生曰包如母之懷子子在母中生如母之産子子在母外陳氏曰黃中淳熙中表進其書末卷為六十四卦立成圖言聖人以八卦重為六十四未聞以復姤泰否臨遁變為六十四也以辨卲堯夫朱子發之説其與朱侍講違言以論易不合為朱公所闢也數學一卷陳氏曰雜録象數諸圖説不知何人所録趙善譽易説二卷陳氏曰善譽為潼川漕進易説每卦為論一篇何萬易辨三卷淵源録三卷陳氏曰萬為辨三十三篇大抵多與先儒異淵源録者蓋其易解未成書僅有乾坤二卦而已萬受知阜陵官至右司郎中知漳州戴溪易總説二卷陳氏曰每卦為一篇溪嘉定初為東宫端尹作此以授景獻項安世周易玩辭十六卷陳氏曰安世當慶元中得罪時謫居江陵杜門潛心不出諸書皆有論説而易為全書其自序以為讀程易三十年此書無一字與之合合則無用乎此書矣世之君子以易傳之理觀吾書則夲末條貫無一不夲於程氏者以易傳之文觀吾書則恐有西河疑女之誚大抵程氏一於言理盡略象數而此書未嘗偏廢程氏於小象頗欠發眀而此書爻象尤貫通蓋亦遍考諸家斷以己意精而博矣林至易裨傳二卷外篇一卷陳氏曰至撰凡三篇曰法象夲之太極曰極數本之天地之數曰觀變夲之揲蓍十八變外篇則曰反對世應互體納甲卦氣之類凡八條述釋葉氏易説一卷陳氏曰葉正則為習學記言易居其首門人建安袁聘儒述而釋焉聘儒紹熙進士王炎易筆記總説共九卷陳氏曰炎嘗以上下經解進表作十卷今但六卷并繫辭二卷為八闕説卦於象數頗有發明鄭汝諧易翼傳二卷陳氏曰翼云者所以為程傳之輔也大抵以程傳為主而附以己見之異然汝諧立朝多為善類所不可至互相排擊仕至吏部侍郎趙南塘易説三卷陳氏曰専辨十翼非夫子所作其説多自得之見也真西山復卦説一卷吳如愚準齋易説一卷馮椅厚齋易學中興藝文志椅為輯注輯傳外傳蓋以程沙隨朱文公雖夲古易為注猶未及盡正孔傳名義乃改彖曰象曰為贊曰以繫卦之辭即為彖繫爻之辭即為象王弼夲彖曰象曰乃孔子釋彖象與商飛卿説同又改繫辭上下為説卦上中以隋經籍志有説卦三卷云文獻通考卷一百七十六
