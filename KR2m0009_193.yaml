body:
  text: 文獻通考卷一百九十三鄱陽馬端臨貴與著經籍考二十史編年漢紀三十卷鼂氏曰漢荀悅撰班固作漢書起髙祖終孝平王莽之誅十二世二百四十二年為紀表志傳凡八十餘萬言獻帝以其文繁詔悅舉要撮總通比其事列繫年月為紀三十篇凡八萬三千四百三十二字辭約事該時稱嘉史陳氏曰獻帝詔悅依左氏傳體以為漢紀詔尚書給筆札辭約事詳論辨多美其自序曰立典有五志焉曰逹道義章法式通古今著功勲表賢能巽岩李氏曰某家有寫本一印本一寫本不記其時而印本乃天聖間益州市所摹刻者大抵皆差悞而印本尤甚衍文助語亂布錯置往往不可句讀或又增以子注音切並非所當有而近歲江浙印本號為曾經校讎其實與天聖市刻相似間用班固書竄改悅語而又非固書本文按悅為此紀固不出班書然亦時有所刪潤而諫大夫王仁侍中王閎諫疏班書皆無之不知悅何從得此也如張騫傳贊以所有放哉為有所放焉之類顔師古亦嘗辨其誤又不知悅何以云也司馬光編集資治通鑑書太上皇崩葬及五鳳郊泰畤之月皆舎班而從荀蓋以悅修紀時固書猶未訛舛而君蘭君簡端瑞興譽寛竟等字猶兩存之疑以傳疑先儒蓋慎之也由此觀之古書雖殘缺不倫非證驗明白要未可妄下雌黄爾然鄉所謂子注音切可削去不疑而演文助語亦當參考班書句讀略加是正其他差悞尚或有之固不敢以胸臆定也昔人謂校誤書猶風庭掃葉随掃随有詎不信邪自司馬遷創改春秋記事之體為本紀世家表志列傳而班固因之至悅始能復古學者甚重其書袁宏干寳以下皆祖述焉事日月年之相繫在史家固良法也而傳録歲乆卒未得其眞可為太息者矣後漢紀三十卷鼂氏曰袁宏彦伯撰宏在晉末為一時文宗以東京史籍不倫謝承司馬彪之徒錯謬同異無所取正唯張璠紀差詳因參摭記傳以損益之比諸家號為精密陳氏曰宏以後漢書煩穢雜亂撰集為此記晉春秋略二十卷鼂氏曰唐秘書省正字杜延業撰自王隠而下諸書及諸僭偽傳記皆所詳究而以蕭方等三十國春秋刪緝為此書館閣書目作杜光業按唐志亦曰延業考新舊史他無所見未詳何時人元經薛氏傳十五卷鼂氏曰隋王通撰唐薛收傳皇朝阮逸學起晉惠帝太熙元年終於陳亡予從兄子逸仕安康嘗得其本歸而示四父四父讀至帝問蛙鳴哂其陋曰六籍奴婢之言不為過按崇文無其目疑逸依託為之陳氏曰稱王通撰薛收傳阮逸補并注按河汾王氏諸書自中說之外皆唐藝文志所無其傳出阮逸或云皆逸為作也今考唐神堯諱淵其祖景皇諱虎故晉書戴淵石虎皆以字行薛收唐人於傳稱戴若思石季龍宜也元經作於隋世太興四年亦書曰若思何哉意逸之心勞日拙自不能掩邪此書始得於莆田纔三卷止晉成帝後從石林葉氏得全本録成之唐歴四十卷鼂氏曰唐栁芳撰初肅宗詔芳綴緝吳兢書其叙天寳後事不倫上元中芳謫黔中㑹髙力士同貶因從力士質開元天寳及禁中事識其本末時舊史送官不可追刋乃推衍義類倣編年法作此書起隋義寧元年迄大歴十三年芳善叙事或譏其不立褒貶義例而詳於制度然景迂生亟稱之以為通鑑多取焉巽岩李氏曰肅宗詔芳與韋述同修吳兢所撰國史述先死芳獨奏編興武徳訖乾元而先天以來芳所筆削多失其當史官病之芳亦自悔及上元中坐事徙黔中適與髙力士會貶所因從力士質開元天寳及禁中事具識本末念國史已送官不可追改乃用編年法别為此書意欲以晚蓋者也本朝歐陽修宋祁修唐紀志及傳司馬公修資治通鑑掇取四十卷中事幾盡然異聞嘉話尚多遺棄芳本書蓋不可少祁傳指芳歴不立褒貶義例被諸儒訕譏然祁所贊房杜姚宋等語則皆因芳之舊云按劉恕謂芳始為此書未成而先傳故世多異本今此篇首注起隋義寧元年訖建中三年凡百八十五年而所載乃絶於大歴十四年資治通鑑往往以唐歴辨證牴牾見於考異者無慮百十餘而此皆無之其脫亡又不止此也疑此即恕所謂未成而先傳者或後人抄略芳書故不得其全倘遂零落至此亦可惜也今以唐諸書參校謬誤頗加是正其文或不可知并事應有而無者皆列卷末更竢考求續唐歴二十二篇陳氏曰唐監修國史崔龜從元吉撰起大歴十三年春盡元和十五年以續栁芳之書也藝文志載韋澳蔣偕李荀張彦遠崔等撰實大中時大唐統紀四十卷陳氏曰唐江南西道觀察判官陳岳撰用荀袁體起武徳盡長慶為一百卷今止武后如意非全書也唐紀四十卷巽岩李氏曰故參知政事陳彭年撰彭年在眞宗時以博學稱凡朝廷大制作大議論多出其手彭年所撰唐紀蓋用編年法次劉明遠新書最號踈略故三百年治亂善惡之迹彭年亦多所脫遺其後歐陽修宋祁别修紀志表傳及司馬光編集資治通鑑行於世則彭年此紀宜無足觀然彭年之用意亦勤矣猶可與袁干裴元等備一家言而荀悅所謂參得失廣視聽者要不可廢也第二卷武徳三年闕十月以後事四年闕四月以前事京蜀二本一同採劉氏新書補足之乃可讀疑不敢增入姑列於後云河洛行年記十卷鼂氏曰唐劉仁軌記唐初李密王世充事起大業十三年二月迄武徳四年七月秦王擒竇建徳第九卷述大業都城第十卷載宮館園囿且云煬帝還都之詔稱務從節儉觀其宮室窮極綺麗云陳氏曰唐志作二十卷五運録十二卷崇文總目唐曹圭撰起三皇訖隋年世之略通歴十卷鼂氏曰唐馬總撰纂太古十七氏中古五帝三王及刪取秦漢三國晉十六國宋齊梁陳元魏北齊後周隋世紀興滅粗述其君賢否取虞世南畧論分繫於末以見義焉陳氏曰書本十卷止於隋代今書直至五代增五卷者後人所續也續通歴十卷鼂氏曰荆南孫光憲撰輯唐洎五代事以續馬總歴參以黄巢李茂貞劉守光阿保機吳唐閩廣胡越兩蜀事迹太祖詔毁其書以所紀多非實也帝王鏡略一卷鼂氏曰唐劉軻撰自開闢迄唐初帝王世次綴為四言以訓童䝉偽蜀馮鑑續之至唐末陳氏曰唐志及館閣書目有劉軻帝王歴歌一卷疑即此書也唐年補録六十五卷陳氏曰後晉起居郎史館修撰鉅鹿賈緯以武宗後無實録故為此書終唐末其實補實録之闕也唯論次多闕誤而事迹粗存亦有補於史氏五代通録六十五卷鼂氏曰皇朝范質撰五代實録計三百六十卷質刪其煩文摭其妄言以成是書自乾化壬申至梁亡十二年間簡牘散亡亦採當時制勅碑碣以補其闕運歴圖六卷鼂氏曰皇朝龔頴撰起於秦昭王滅周之歲乙巳止於國朝雍熙丁亥以歴代興亡大事附見於下四年獻於朝優詔奬之歐陽公嘗據之考正集古目録稱其精博按晉史張軌世襲涼州但稱愍帝建興年號其間唯張祚簒竊改建興四十二年為和平元年始奉穆帝升平之朔始末不聞有改元事唯頴書載張寔改元曰永安張茂改元曰永元張重華曰永樂曰和平張元龍曰太始張天錫曰太清張大豫曰鳳凰不知頴何所據而言然或云出崔鴻十六國春秋鴻書乆不傳於世莫得而考焉紀年通譜十二卷鼂氏曰皇朝宋庠字公序撰自漢文帝後元戊寅止周恭帝顯徳庚申為九篇以本朝建隆之元至慶歴辛巳為一篇皆曰統元以甲子貫之有五號曰正閏偽賊蠻夷以王莽十九年繫孺子更始以接建武東魏十七年附西魏豫王六年天后十五年繫中宗緒神龍朱梁十六年通濟陰天祐續同光捃晉恭帝禪宋之歲對魏明元泰常五年尊北降南始主正朔乃通譜之斷意也别二篇舉字為類各以部分曰類元慶歴中上之優詔褒焉公武按三國志魏景初元年丁巳當蜀建興十五年次年戊午蜀改元延熙訖二十年歲次丁丑明年改元景耀今通譜載蜀建興之號止於丙辰凡十四年延熙改元在丁巳且復增至二十一年豈别有所據邪歐陽公集古目録以東魏造石像記證通譜武定七年非戊辰蓋自元象以後逓差一歲公序聞之以為宜易遂著其事於譜意者編簡浩博時有舛誤也陳氏曰其書曰正曰閏曰偽曰賊曰蠻夷以正為主而附列其左號統元為十卷其二卷曰類元因文之同各以彚别編年通載十五卷鼂氏曰皇朝章衡撰衡觀四部書至古今纂輯運歴書十餘家皆淺陋揎釀無足紬繹乃編歴代年號貫以甲子始於帝堯訖於國朝治平丁未質之經史資以傳記百家之書聖賢勲徳姦雄簒竊及蠻夷盗賊凡繫於存亡綱紀之大者無不詳録三千四百年且刋正謬誤如史記載舜年虞書不同漢紀載魏受漢禪與魏志受禪壇碑各異之類熙寧七年表獻之陳氏曰其族父粢質夫為之序衡嘉祐二年進士第一人仕至集賢大學士稽古録二十卷鼂氏曰皇朝司馬光君實編起自三皇止皇朝英宗治平末至周共和庚申始為編年陳氏曰其表云由三晉開閏迄於顯徳之末造臣既具之於歴年圖自六合為宋接於熙寧之元臣又著之於百官表乃威烈丁丑而上伏羲書契以來悉從論纂皆有依憑蓋元祐初所上也此書始刻於越其後載刻於潭越本歴年圖譜論聚見第十六卷蓋因圖之舊也潭本諸論各繫於國亡之時故第十六卷惟存總論朱子語録曰稽古録一書可備講筵官僚進讀小兒讀六經了令讀之亦好末後一表其言如蓍龜一一皆驗又曰温公之言桑麻穀粟且如稽古録極好看常思量教太子諸王恐通鑑難看且看一部稽古録有不備者當以通鑑補之温公作此書想在忙裏做成元無義例編年紀事十一卷鼂氏曰皇朝劉攽因司馬温公所撰編次資治通鑑二百九十四卷目録三十卷考異三十卷鼂氏曰皇朝治平中司馬光奉詔編集歴代君臣事迹許自辟官屬借以館閣書籍在外聽以書局自随至元豐七年凡十七年始奏御上起戰國下終五代凡一千三百六十二年又略舉事目年經國緯以備檢閱别為目録参考異同俾歸一途别為考異各一篇公自謂精力盡於此書神宗賜名資治通鑑御製序以冠其首且以為賢於荀悅云公武心好是書學之有年矣見其大抵不采俊偉卓異之事如屈原懷沙自沉四皓羽翼儲君嚴光足加帝腹姚崇十事開説之類皆削去不録然後知公忠信有餘蓋陋子長之愛竒也陳氏曰初光嘗約戰國至秦二世如左氏體為通志八卷以進英宗悅之遂命論次歴代君臣事蹟起周威烈王訖於五代目録倣史記年表年經國緯用劉羲叟長歴氣朔而撮新書精要散於其中考異参諸家異同正其謬誤而歸於一公子康公休告其友鼂說之曰此書成蓋得人焉史記前後漢則劉貢父三國歴九朝而隋則劉道原唐迄五代則范純甫其在正史外楚漢事則司馬彪荀悅袁宏南北崔鴻十六國春秋蕭方等三十國春秋李延夀南北史太清記亦足採建康實録以下無譏焉栁芳唐歴最可喜唐以來禆官野史暨百家譜録正集别集墓誌碑碣行狀别傳亦不敢忽也茍不先讀正史則資治通鑑果何有邪武夷胡氏曰昔聞贈諫大夫陳公言因讀資治通鑑然後知司馬文正公之有相業也余自志學以來渉獵史篇文詞汗漫莫知統紀徒費精神而無所得及讀此書編年紀事先後有倫凡君臣治亂成敗安危之跡若登乎喬嶽天宇澄清周顧四方悉來獻狀雖調元宰物輔相彌綸之業未能窺測亦信其為典刑之總㑹矣致堂胡氏曰司馬公六任冗官皆以書局自随歲月既乆又數應詔上書論新法之害小人欲中傷之而光行義無可訾者乃倡為浮言謂書之所以乆不成緣書局之人利尚方筆墨絹帛及御府果餌金錢之賜耳既而承受中貴人隂行檢校乃知初雖有此㫖而未嘗請也光於是嚴課程省人事促修成書其表有云日力不足繼之以夜簡牘盈積浩如淵海其間牴牾不敢自保今讀其書蓋自唐及五代采取微冗日月或差良有由也光以議論不合辭執政而不居舎大藩而不為甘就冗散編集舊史盡願忠之志而憸險細夫顧謂眷戀匪頒之入孟子曰如使予欲富何為辭十萬而受萬乎小人以己臆度君子類皆如是夫編集舊史欲人君學者便於觀覽其功不細矣以乆之故尚有讒口又况矯世拂俗興復先王之治哉嗚呼悲夫髙氏緯略曰公與宋次道書曰某自到洛以來專以修資治通鑑為事於今八年僅了得晉宋齊梁陳隋六代以來奏御唐文字尤多託范夢得將諸書依年月編次為草卷每四丈截為一卷自課三日刪一卷有事故妨廢則追補自前秋始刪到今已二百餘卷至大歴末年耳向後卷數又須倍此共計不減六七百卷更須三年方可粗成編又湏細刪所存不過數十卷而已其費工如此温公居洛十五年故能成此書今學者觀通鑑往往以為編年之法然則一事用三四處出處纂成是其為功大矣不觀正史精熟未易決通鑑之功績也通鑑采正史之外其用雜史諸書凡二百二十二家容齋洪氏随筆曰司馬公修資治通鑑辟范夢得為官屬嘗以手帖論纉述之要大抵欲如左傳叙事之體又云凡年號皆以後來者為定如武徳元年則從正月便為唐髙祖更不稱隋義寧二年梁開平元年正月便不稱唐天祐四年故此書用以為法然究其所窮頗有窒而不通之處公意正以春秋定公為例於未即位即書正月為其元年然昭公以去年十二月薨則次年之事不得復係於昭故定雖未立自當追書然經文至簡不過一二十字一覽可以了解若通鑑則不侔隋煬帝大業十三年便以為恭皇帝上直至下卷之末恭帝立始改義寧後一卷則為唐髙祖蓋凡渉歴三卷而煬帝固存方書其在江都時事明皇後卷之首標為肅宗至徳元載至一卷之半方書太子即位代宗下卷云上方勵精求治不次用人乃是徳宗也莊宗同光四年便係於天成以為明宗而卷内書命李嗣源討鄴至次卷首莊宗方殂潞王清泰三年便標為晉髙祖而卷内書石敬瑭反至卷末始為晉天福凡此之類殊費分說此外如晉宋諸胡僭國所封建王公及除拜卿相纎悉必書有至二百字者又如西秦丞相南川宣公出連乞都卒魏都坐大官章安侯封懿天部大人白馬文正公崔宏宜都文成王穆觀鎮遠將軍平舒侯燕鳳平昌宣王和其奴卒皆無闗於社稷治亂而周勃薨乃不書及書漢章帝行幸長安進幸槐里岐山又幸長平御池陽宫東至髙陵十二月丁亥還宮又乙未幸東阿北登太行山至天井闗夏四月乙卯還宫又書魏主七月戊子如魚池登青岡原甲午還宮八月己亥如彌澤甲寅登牛頭山甲子還宮如此行役無歲無之皆可省也巽岩李氏曰左丘明傳春秋自隐至成八公凡百五十年為十三卷自襄至哀四公凡百五年為十七卷年近則事詳遠則略理勢固然無足怪者温公與范太史議修唐紀初約為八十卷此帖云已及百卷既而卒為八十卷刪削之功盛矣卷數細事前軰相與平章猶嚴若此則其他肯輕下筆哉吁可敬畏也然今以唐紀視漢紀其紙葉蓋多八九視周紀滋益多於斯文奚累焉而或者弗察強以繁省論文晉張輔遽謂孟堅不及子長孟堅不及子長固也豈在文之繁省乎此兒童之見耳先公曰張新叟言洛陽有資治通鑑草藁盈兩屋黄魯直閱數百卷訖無一字草書見李巽岩集此温公所謂平生精力盡於此書也如人之不能讀何公嘗謂吾此書惟王勝之嘗讀一遍餘人不能數卷已倦睡矣公此書歴英宗神宗二世凡十九年而書成通鑑舉要歴八十卷鼂氏曰皇朝司馬光撰通鑑奏御之明日輔臣亟請觀焉神宗出而示之每編始末識以睿思殿寳章蓋尊寵其書如此公尚患本書浩大故著此陳氏曰公患本書浩大難領略而目録無首尾晚著是書以絶二累其藁在晁說之以道家紹興初謝克家任伯得而上之累代歴年二卷陳氏曰司馬光撰即所謂歴年圖也治平初所進自威烈王至顯徳本為圖五卷歴代皆有論今本陳輝晦叔刻於章貢以便觀覽自漢髙帝始温公記歴年圖後曰光頃歲讀史患其文繁事廣不能得其綱要又諸國分列歲時先後参差不齊乃止采共和以來下訖五代略記國家興衰大迹集為五圖每圖為五重每重為六十行每行紀一年之事其年取一國為主而以朱書他國元年綴於其下蓋欲指其元年以推二三四五則從可知矣凡一千八百年命曰歴年圖其書雜亂無法聊以私便於討論不敢布於他人也不意趙君摹刻於版傳之蜀人梁山令孟君得其一通以相示始光率意為此書茍天下非一統則漫以一國主其年固不能辨其正閏而趙君乃易其名曰帝統非光志也趙君頗有所增損仍變其卷帙又傳寫多脱誤今此淺陋之書既不可掩因刋正使復其舊而歸之資治通鑑外紀十卷鼂氏曰皇朝劉恕撰司馬公作通鑑託始於周威烈王命韓魏趙為諸侯下訖五代恕嘗語光曷不起上古或堯舜光答以事包春秋不可又以經不可續不敢始於獲麟恕意謂闕漏因撰此書起三皇五帝止周共和載其世次而已起共和庚申至威烈王二十二年丁丑四百三十八年為一編號曰外紀猶國語稱春秋外傳也陳氏曰司馬公修通鑑辟恕為屬恕嘗謂史記不及包犧神農今歴代書不及威烈之前欲為前紀而本朝為後紀將俟書成請於公㑹病廢絶意後乃改前紀為外紀云通鑑書成恕已亡范淳父奏恕於此書用力最多援黄鑑梅堯臣例官其子且以書賜其家道原父渙凝之家廬山歐公所為賦廬山髙者也疑年譜一卷年略譜一卷雜年號附陳氏曰劉恕撰謂春秋起周平魯隠史記本紀自軒轅列傳首伯夷年表起共和共和至魯隐其間七十一年即與春秋相接矣先儒叙包犧女媧下逮三代享國之歲衆說不同懼後人以疑事為信書穿鑿滋甚故周厲王以前三千五百一十九年為疑年譜而共和以下至元祐壬申一千九百一十八年為年略譜大略不取正閏之說而從實紀之四夷及冦賊僣紀名號附之於末寳歴歌一卷鼂氏曰未詳撰人以開闢太古迄於周世宗正統帝王世次諡號成七言韻語一通歴代紀元賦一卷鼂氏曰皇朝楊備撰次漢至五代正統年號為賦一首又别為宋頌四章通鑑節文六十卷鼂氏曰題云温公自抄纂通鑑之要然實非也紹運圖一卷陳氏曰諸葛深通甫撰元祐中人亦未詳爵里其書頗行於世俗歴代帝王年運詮要十卷陳氏曰左朝請大夫朱繪撰紹興五年序未詳何所人歴代紀年十卷陳氏曰濟北鼂公邁伯咎撰詠之之子也嘗為提舉常平使者其自為序當紹興七年皇王大紀八十卷陳氏曰胡宏仁仲撰述三皇五代至周赧王前二卷自􅌉古至帝嚳年不可考信姑載其事而已自堯以後用皇極經世歴起甲辰始著年紀博采經傳時有論說自成一家之言然或取莊周寓言以為實及叙邃古之初終於無徴不信云爾經世紀年二卷陳氏曰侍講廣漢張栻敬夫撰用皇極經世譜編有所發明則著之其言邵氏以數推之去外丙仲壬之年乃合於尚書成湯既殁太甲元年之説今按孔氏正義正謂班固不見古文謬從史記而章衡通載乃云以紀年推之外丙仲壬合於歲次尚書殘闕而正義之說誤蓋三代而上帝王歴年逺而難考類如此劉道原所謂疑年者也南軒張氏自序曰太史遷作十二國世表始紀甲子起於成周共和庚申之歲庚申而上則莫紀焉歴世寖逺其事雜見於諸書靡適折中則亦傳疑而已本朝嘉祐中康節邵先生雍出於河南窮往知來精極於數作皇極經世書上稽唐堯受命甲辰之元為編年譜如去外丙仲壬之紀康節以數知之乃合於尚書成湯既沒太甲元年之說成湯之後蓋實傳孫孟子所說特以太丁未立而卒方是時外丙生二年仲壬生四年耳又正武王伐商之年蓋武王嗣位十一年矣故書序稱十有一年而復稱十有三年者字之誤也是類皆自史遷以來傳習之繆一旦使學者曉然得其眞萬世不可改者也某不自揆輙因先生之歴考自堯甲辰至皇上乾道改元之歲凡三千五百二十有二年列為六圖命之曰經世紀年以便觀覽間有鄙見則因而明之其大節目有六如孟子謂堯舜三年之喪畢舜禹避堯舜之子而天下歸之然後踐天子位此乃見帝王奉天命之大㫖其可闇而弗彰故於甲申書服堯之喪乙酉書踐位之實丙戍書元載格于文祖自乙酉至丁巳是踐位三十有三載也則書薦禹於天與尚書命禹之辭合自丁巳至癸酉是薦禹十有七年也與孟子之說合於禹受命之際書法亦然然而書稱舜在位五十載陟方乃死則是史官自堯崩之明年通數之耳夏后相二十有八載寒浞弑相明年少康始生於有仍氏凡四十年而後祀夏配天不失舊物寒浞豈可使間有夏之統故缺此四十載不書獨書少康出處而紀元載於復國之歲以見少康四十年經營宗祀絶而復續足以為萬代中興之冠冕今按張氏此序成於乾道間所謂四十年經營中興者蓋以少康之所歴如此其乆以諷時也然而事情不同於新莽之簒缺其年亦足以表光武之中興也漢吕太后稱制既不得係年而所立他人子名為少帝者又安得承統故復缺此數年獨書曰吕太后臨朝稱制亦范太史祖禹係嗣聖紀年之意也漢獻之末曹丕雖稱帝而昭烈以正義立於蜀不改漢號則漢統烏得為絶故獻帝之後即係昭烈年號書曰蜀漢逮後主亡國而始繫魏凡此皆節目之大者妄意明微扶正不自知其愚也其他如夏以上稱載商稱祀周始稱年皆考之書可見而周書洪範獨稱祀者是武王不欲臣箕子尚存商立箕子之志也由魏以降南北分裂如元魏北齊後周皆夷狄也故統獨係於江南五代迭揉則都中原者不得不係之先公曰愚按張氏本皇極經世書作經世紀年圖愚之所述蓋亦本此然嘗疑堯之前標甲子者六而不載世代與事迹意者黄帝命大撓作甲子則甲子紀年自黄帝始以前無有甲子則亦不可得而書也通鑑紀事本末四十二卷陳氏曰工部侍郎袁樞機仲撰樞自太學官分教嚴陵為此書楊誠齋為之序朱子曰古史之體其可見者春秋而已春秋編年通紀以見事之先後書則每事别記以具事之首尾意者當時史官既以編年紀事至於事之大者則又採合而别記之若二典所紀上下百有餘年而武成金縢諸篇其所紀載或經數月或歴數年其間豈無異事蓋必已具於編年之史而今不復見矣故左氏於春秋既依經以作傳復為國語二十餘篇國别事殊或越數十年而遂其意蓋亦近書體以相錯綜云爾然自漢以來為史者一用太史公紀傳之法此意固不復講至司馬温公受詔纂述資治通鑑然後二千三百六十二年之事編年繫日如指諸掌雖托始於三晉之侯而追本其原始於智伯上繫左氏之卒章實相授受偉哉書乎自漢以來未始有也然一事之首尾或散出於數十百年之間不相綴屬讀者病之今建安袁機仲乃以暇日作為此書以便學者其部居門目始終離合之間又皆曲有微意於以錯綜温公之書其亦國語之流矣通鑑綱目五十九卷陳氏曰侍講新安朱熹元晦撰始司馬公通鑑有目録舉要其後胡給事安國康侯又脩為舉要補遺朱晦翁因别為義例著此書自為之序乾道壬辰也大書者為綱分注者為目綱如經目如傳此書嘗刋於温陵别其綱謂之提要今板在監中廬陵所刋則綱目並列不復别也朱子自序曰温公通鑑既成又撮其精要之語别為目録三十卷并上之晚病本書太詳目録太簡更著舉要歴八十卷以適厥中紹興中胡文定公因公遺藁修成舉要歴補遺若干卷則其文愈約而事愈備矣今輙與同志因兩公四書别為義例增損􅕍括以就此篇蓋表歲以首年而因年以著統大書以提要而分注以備言使夫歲月之乆近國統之離合辭事之詳略議論之同異通貫曉析如指諸掌名曰資治通鑑綱目云建炎以來朝野雜記自昔注書首尾多不相照雖資治通鑑亦或未免此病大抵編集非出一手故也姑以一事論之漢景帝四年中四年皆以冬十月日食今通鑑並書於夏秋之後蓋編緝者自本志中摘出而不思漢初以十月為歲首故誤係之歲末耳近歲吕伯恭最為知古陳君舉最為知今伯恭親作大事記君舉親作建隆編世號精宻余嘗考之皆不免差誤亦随事辨之矣朱文公通鑑綱目條貫至善今草本行於世者於唐肅宗朝直脫二年之事亦由門人綴緝前後不相顧也又自唐武徳八年以後至於天祐之季甲子並差考求其故蓋通鑑以歲名書之而文公門人大抵多忽史學不熟歲多故有此誤余因諸生有問亦為正之矣然則該貫古今亦非可薄之事但不至於喪志可也國紀五十八卷陳氏曰吏部侍郎睢陽徐度敦立撰丞相處仁擇之之子也其書詳畧頗得中而不大行於世鄞學有魏邸舊書傳得之續通鑑長編一百六十八卷陳氏曰禮部侍郎眉山李燾仁父撰長編云者司馬公之為通鑑也先命其屬叢目叢目既成乃修長編然後刪之以成書唐長編六百卷今通鑑惟八十卷耳燾所上書自言未可謂之通鑑止可謂之長編故其書雖繁蕪而不嫌也其卷數雖如此而冊數至餘三百蓋逐卷又自分子卷或至十餘續通鑑長編舉要六十八卷陳氏曰李燾撰大畧皆温公舊䂓也巽岩李氏進長編奏狀隆興元年知榮州李燾奏臣嘗盡力史學於本朝故事尤切欣慕每恨學士大夫各信所傳不考諸實録正史紛錯難信如建隆開寳之禪授涪陵岐魏之遷殁景徳慶歴之盟誓曩宵諒祚之叛服嘉祐之立子治平之復辟熙寧之更新元祐之圖舊此最大事家自為說臣輙發憤討論使衆說咸㑹於一敢先具建隆迄開寳十有七年為十有七卷上進乾道四年禮部郎官李燾上言臣准朝㫖取臣所著續資治通鑑自建隆迄元符令有司繕寫投進今先次寫到建隆元年至治平四年閏三月五朝事迹共一百八卷投進治平以後文字增多容臣更加整齊節次投進臣竊聞司馬光之作資治通鑑也先使其寮採摭異聞以年月日為叢目叢目既成乃修長編唐三百年范祖禹實掌之光謂祖禹長編寧失於繁無失於畧今唐紀取祖禹之六百卷刪為八十卷是也臣今所纂集義例悉用光所創立錯綜詮次皆有依憑顧臣此書詎可便謂續資治通鑑姑謂續資治通鑑長編可也旁采異聞補實録正史之闕畧参求真是破巧說偽辨之紛紜益以昭明祖宗之豐功盛徳區區小忠或在可録所有續資治通鑑長編一百八卷随表上進淳熙元年知瀘州李燾上言臣先次投進續資治通鑑長編自建隆迄治平今欲纂輯治平以後至中興以前六十年事迹庶幾一祖八宗之豐功盛徳粲然具存無所闕遺顧此六十年事於實録正史外頗多所增益首尾略究端緒合為長編凡六十年年為一卷以字之繁略又均分之總為二百八十卷然熙豐祐聖符靖崇觀和康之大廢置大征伐闗天下之大利害者其事跡比治平以前特異寧失之繁無失之畧必湏睿明稱制臨決如兩漢宣章故事無使各自為說乃可傳信無窮淳熙九年知遂寧府李燾上言臣累次進所為續資治通鑑長編今重别寫進共九百八十卷計六百四冊其修換事總為目一十卷又緣一百六十八年之事分散為九百八十卷之間文字繁多本末頗難立見畧存梗槩庶易檢㝷今創為建隆至靖康舉要六十八卷并卷總目共五卷已上四種通計一千六十三卷六百八十七冊投進者紀一祖八宗之盛徳至善義寜止於百篇聚九朝三世之各見殊聞事或傳於兩說惟折諸聖廼得其真臣網羅收拾垂四十年綴葺穿聮踰一千卷牴牾何敢自保精力幾盡此書非仰託大君之品題懼難逃乎衆人之指目漢孝宣稱制決疑故事最髙於甘露我神考錫名冠序治鑑莫毁於元符豫席恩言比迹先正臣死且不朽乾道六年奉㫖降付續資治通鑑長編一百七十六冊祕書省令依通鑑紙様繕寫進納水心葉氏曰李氏續通鑑春秋之後纔有此書自史法壊譜牒絶百家異傳與詩書春秋並行而漢至五季事多在記後史官常狼狽收拾僅能成篇嗚呼其何以信天下也通鑑雖幸復古然由千有餘歲之後追戰國秦漢之前則遠矣疑詞誤說流於人心乆矣方將鉤索質驗貫殊析同力誠勞而勢難一矣及公據變復之㑹乗歲月之存斷自本朝凡實録正史官文書無不是正就一律也而又家録野記旁互参審毫髪不使遁逸邪正心跡随卷較然夫孔子之所以正時月日必取於春秋者近而其書具也今惟續通鑑為然爾故余謂春秋之後纔有此書信之所聚也雖然公終不敢自成書第使至約出於至詳至簡成於至繁以待後人而已先公曰李文定公纂本朝長編自紹興隆興乾道淳熙節次上進收拾舊事垂四十年是長編一百六十八年之書以四十年而成九朝通畧一百六十八卷陳氏曰起居郎建安熊克子復撰中興小歴四十一卷陳氏曰熊克撰克之為書往往疏略多牴牾不稱良史中興遺史六十卷陳氏曰從義郎趙甡之撰慶元中上進其書大抵記軍中事為詳而朝政則甚略意必當時游士往來邉陲出入幕府者之所為及觀其記張浚攻濠州一段自稱姓名曰開封張鑑然則此書鑑為之而甡之竊以為已有也或曰鑑即甡之婦翁未知信否丁未録二百卷陳氏曰左修職郎昭武李丙撰自治平丁未王安石初召用迄於靖康童貫之誅故以丁未名之每事皆全載制詔章疏甚詳思陵大事記三十六卷阜陵大事記二卷陳氏曰李燾撰建炎以來繫年要記二百卷陳氏曰工部侍郎陵陽李心傳微之撰蓋與李巽岩長編相續亦嘗自隆興後相繼為之㑹蜀亂散失不可復得大事記十二卷解題十二卷通釋一卷陳氏曰著作郎東萊吕祖謙伯恭撰自敬王三十九年以下采左氏傳歴代史皇極經世通鑑稽古録輯而廣之雖上接獲麟而書法則視太史公所録不盡用䇿書凡例解題者畧具本末或附以己意多所發明通釋者經典綱要孔孟格言以及歴代名儒大議論初意欲起春秋接於五代僅及漢武征和三年而止東萊年方強仕而得末疾平生論著大抵經始而未及成如讀詩記書說是己是書之作當淳熙七年又二年而沒使天假之年所傳於世者寧止是哉朱子曰伯恭大事記甚精宻古今蓋未有此書若能續而成之豈非美事但讀書本自不多加以衰老昏憊豈復能辦此事世間英俊如林要必有能為之者但恐其所經世之意未離乎功利術數之間則非筆削之本意耳答詹師書語録伯恭大事記辨司馬遷班固異同處最好大抵謙不敢任作書之意故左傳通鑑已載者不復載其載者皆左傳通鑑所無者耳有大纎巧處如指公孫𢎞張湯姦狡處皆說得羞愧人伯恭少時被人說他不曉事故其論事多指出人之情偽云我亦知得他有此意東萊大事記時已自感疾了一日做一年若不死自漢武到五代只千年三年自可了此文字解題煞有工夫只一句要包括一段意思建隆編一卷陳氏曰陳傅良撰蓋長編太祖一朝節畧也随事考訂併及累朝之始末慶元初在經筵上止齋自序曰本朝國書有日歴有寳録有正史有㑹要有勅令有御集又有司專行指揮典故之類三朝以上又有寳訓而百家小說私史與大夫行狀誌銘之類不可勝記自李燾作續通鑑起建隆元年盡靖康元年而一代之書萃見於此可謂備矣然篇帙浩繁文字重併未為成書難以觀覧今畧依漢司馬遷年表大事記温公司馬光稽古録與燾舉要撮取其要繫以年月其上譜將相大臣除罷而記其政事因革於下方夫學之為王事非若書生務多而求博雖章句言語皆不忍捨也誠能考大臣之除罷而識君子小人進退消長之際考政事之因革而識取士養民治軍理財之方其後治亂成敗效出於此斯足以成孝敬廣聰明矣故今所節畧通鑑如羣臣奏疏與其他年行與一時誥令出於代言之臣茍非闗於當年治道之大端即不抄録或見於他書實係治體不可不聞而通鑑偶遺即據某書添入至於通鑑登載萬一有小小遺誤亦畧附著其説於下若夫列聖深仁厚澤垂裕後人傳之萬世尤當循守者必為之論但存本指不加文采深有冀於省察也讀書譜一卷陳氏曰陳傳良撰自伏羲迄春秋終於書詩春秋諸經考世代而附著之共和而下始有年數紀年統論一卷紀年備遺一百卷陳氏曰永嘉朱黼文昭撰從陳止齋學嘗著紀年備遺起陶唐終顯徳為百卷蓋亦本通鑑稽古録而擷其中論正統者為統紀論水心葉氏序曰平陽朱黼因通鑑稽古録章别論者始堯舜迄五代三千餘篇述吕武王莽曹丕朱温皆削其紀年以從正統曰吾為書之志也書法無大於此矣報讐明恥貴夏賤夷其次也凡民人家國之用制度等威之異皆為說以處之衆言之淆亂則折而一之訛謬之相承則釐而正之南北華戎之離合爭奪之碎人所厭簡亦備論之該括既多而條目衆矣所以存世次觀興廢本經訓原事實芟理蕪蔓顯發精隐扶樹正義蒐舉墜逸不以華為辨不以意為覺無偏駮之說無新特之論反而約之知其能費而隐也時而措之知其能典而當也嗚呼此豈非學者之所當盡其心歟皇朝編年舉要三十卷備要三十卷中興編年舉要十四卷備要十四卷陳氏曰太學生莆田陳均平甫撰均丞相俊卿之從孫端平初有言於朝者下福州取其書由是得初品官大抵依倣朱氏通鑑綱目舉要者綱也備要者目也然去取無法詳畧失中未為善書續稽古録一卷陳氏曰祕書丞歴陽龔頥正養正撰以續司馬光前録而序述繁醸其記紹熙甲寅事歸功於韓侂胄頥正本名惇頥避諱改焉嘗撰元祐黨籍譜得官韓氏用事時賜出身入館歴代帝王纂要譜括二卷陳氏曰餘姚孫應符仲潜撰蓋紹運圖之詳者也文獻通考卷一百九十三
