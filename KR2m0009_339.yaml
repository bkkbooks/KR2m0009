body:
  text: 文獻通考卷三百三十九鄱陽馬端臨貴與著四裔考十六大秦大秦一名犁靬靬居言反一云前漢時犁靬國也後漢時始通焉其國在西海之西亦云海西國其王治安都城宫室皆以水精為柱從條支西度海曲萬里去長安蓋四萬里其國平正人居星布其地東西南北各數千里有四百餘城小國役屬者數十西有大海海西有遲散城王城有官曹簿領而文字習胡人皆髦頭而衣文繡亦有白蓋小車旌旗之屬又十里一亭三十里一堠一如中州地多師子遮害行旅不百餘人持兵器輙為所傷其王無常人皆簡立賢者有災異及風雨不時輒廢而更立受放者無怨其人長大平正有類中國故謂之大秦或曰本中國人也土有駭鷄犀枹朴子云通天犀有一白理如綖者以盛米置羣鷄中欲啄米至輒驚去故南人名為駭鷄也合㑹諸香煎其汁以為蘇合土多金銀竒寳夜光璧明月珠琥珀琉璃神龜白馬朱髦瑇瑁元熊赤螭辟毒䑕大貝車渠廣雅云車渠石似玉瑪瑙石似玉出西海有養者似狗多力獷惡蔵宗反北附庸小邑有羊羔自然生於土中候其欲萌築牆護之恐獸所食也其臍與地連割之絶則死擊物驚之遂絶逐水草無羣又有木難金翅鳥口中結沬所成碧色珠也土人珍之曹子建詩云珊瑚間木難有幻人能額上為炎燼手中作江湖舉足而珠玉自墮開口則旙毦亂出前漢武帝遣使至安息安息獻犁靬幻人二皆蹙眉峭鼻亂髪拳鬢長四尺五寸毦人志反有織成細布言用水羊毛名曰海西布作氍翕毛㲪罽帳之屬其色又鮮於海東諸國所作也又常利得中國縑素解以為胡綾紺紋數與安息諸胡交市於海中西南漲海中可七八百里行到珊瑚洲水底有盤石珊瑚生其上大秦人常乗大舶載鐵網令水工沒先入視之可下網乃下初生白而漸漸似苗坼甲歴一歳許出網目間變作黄色支格交錯髙極三四尺大者圍尺餘三年色乃赤好復視之知可採便以鐵鈔發其根乃以索繫網使人於舶上絞車舉出還國理截恣意所作若失時不舉便蠧敗其國以金銀為錢銀錢十當金錢一其人質直市無二價穀食常賤國用富饒鄰國使到其界首者乗驛詣王都至則給以金錢其王常欲通使於漢而安息欲以漢繒綵與之交市故遮閡不得自達又塗經大海商客往来皆賫三歳粮是以至者稀桓帝元熹初大秦王安敦遣使自日南徼外獻象牙犀角瑇瑁始乃一通焉其所表貢並無珍異疑傳者隠之至晉武帝大康中其王遣使貢獻或云其國西有弱水流沙近西王母所處幾於日所入也外國圖云從喁巨北有國名大秦其種長大身丈五六尺杜環行經記云拂菻國有苦國西隔山數千里亦曰大秦其人顔色紅白男子悉着素衣婦人皆服珠錦好飲酒尚乾餅多工巧善織絡或有俘在諸國守死不改鄉風琉璃妙者天下莫比王城方八十里四面境土各數千里勝兵約有百萬常與大食相禦西枕西海南枕南海北接可薩突厥西海中有市客主同和我往則彼去彼来則我歸賣者陳之於前買者酬之於後皆以其直置諸物傍待領直然後收物名曰鬼市又聞西有女國感水而生又云摩隣國在秋薩羅國西南度大磧行二千里至其國其人黒其俗獷少米麥無草木馬食乾魚人食鶻莽鶻莽即波斯棗也瘴癘特甚諸國陸行之所經山胡則一種法有數般有大食法有大秦法有尋尋法其尋尋蒸報於諸夷狄中最甚當食不語其大食法者以弟子親戚而作判典縱有微過不至相累不食猪狗驢馬等肉不拜國王父母之尊不信鬼神祀天而已其俗每七日一假不買賣不出納唯飲酒放浪終日其大秦善醫眼及痢或未病先見或開腦出蟲其國東南通交趾又水道通益州永昌郡多出異物大秦西海水水西有河河西南流河西有南北山山西有赤水西有白玉山玉山西有西王母山玉為堂室云從安息西界循海曲亦至大秦廻萬餘里於彼國觀日月星辰無異中國而前史云條支西行百里日入處失之逺矣唐貞觀十七年拂菻王波多力新唐書云拂菻即古大秦也遣使獻赤玻璃綠金精下詔答賫大食强而伐之遂臣屬焉乾封至大定再朝獻開元七年因吐火羅大酋獻師子羚羊小人小人在大秦之南軀纔三尺其耕種之時懼鶴所食大秦每衛助之小人竭其珍以酬報軒渠軒渠其國多九色鳥青口綠頸紫翼紅膺紺頂丹足碧身緗背元尾亦名九尾鳥亦名錦鳳其青多紅少謂之繡鸞常從弱水西來或云是西王母之禽也其國幣貨同三童國三童三童在軒渠國西南千里人皆眼有三睛珠或有四舌者能為一種聲亦能俱語常貨多用蕉越犀象作金幣率效國王之面亦效王后之面若丈夫交易則用國王之面王死則更鑄已上三國與大秦隣接故附之澤散澤散魏時聞焉屬大秦其治在海中央北至驢分水行半歳風疾時一月到最與安息城谷相近西南詣大秦都不知里數驢分驢分魏時聞焉屬大秦其治去大秦都二千里從驢分城西之大秦度海飛橋長二百四十里發海道西南繞海道直西行至焉堅昆堅昆魏時聞焉在康居西勝兵二萬人隨水草畜牧多貂有好馬呼得呼得魏時聞焉在葱嶺北烏孫西北康居東北勝兵萬餘人隨畜牧出好馬亦多貂丁令丁令魏時聞焉在康居北勝兵六萬人隨畜牧出名䑕皮白子青昆子皮此上三國堅昆中央俱去匈奴單于庭安習水七千里南至車師六國五千里西南去康居界二千里西去康居王治八千里或以為此丁令即匈奴北丁令也而此丁令在烏孫西似其種别也又匈奴北有屈射國有隔昆國有新犁國明北之南自復有丁令非烏孫西丁令也烏孫長老言北丁令有馬腦國其人聲音似鴈鶩從膝以上身至頭人也以下生毛馬腦馬蹄不騎馬而走疾於馬勇健敢戰短人短人魏時聞焉在康居西北男女皆長三尺人衆甚多去奄蔡諸國甚逺康居長老傳聞嘗有商旅行北方迷惑失道而到斯國中甚多眞珠夜光明月珠見者不知名此國號言以意商度此國去康居可萬餘里突厥本未記云突厥窟北馬行一月有短人國長者不踰三尺亦有二尺者頭少毛髮若羊胞之狀突厥呼為羊胞頭國其傍無他種類相侵俗無寇盗但有大鳥髙七八尺常伺短人啄而食之短人皆持弓矢以為之備案此亦在西北即魏畧云短人國是也波斯波斯後魏時通焉在達曷水之西都宿利城後周史云蘇利城隋史云蘇藺城記録音訛其實一也有河經其城中南流即條支之故地也大月氏之别種其先有波斯匿王其子孫以王父字為氏因為國號焉王姓波斯户十餘萬東去中國萬餘里西去海數百里東南去穆國四千餘里西北至拂菻四千五百里有樓觀屋宇佛寺城西十五里有土山山周迴髙大其勢連接甚逺中有鷲鳥噉羊土人極以為患其王坐金羊座戴金花冠衣錦袍織成帔飾以眞珠寳物其俗丈夫剪髮戴白皮帽貫頭衫兩肩近下開之并布巾帔緣以織皮婦人服大衫帔仍貫五色珠絡之於膊王即位以後擇諸子内賢者密書其名封之於庫諸子及大臣皆莫之知也王死衆乃共發書視之其封内有名者即立以為王餘子各出就邊任兄弟更不相見也國人號王曰醫囋才割反妃曰陟率王之諸子曰殺野其刑法重罪懸諸竿射而殺之次則繫獄新王立乃釋之賦稅准地輸銀錢事火神天神婚合不擇尊卑於諸夷中最為醜穢死者多棄尸於山一月治服城外有人别居唯知喪葬之事號為不浄人若入城市搖鈴自别以六月為歳首氣候暑熱家自藏冰其地多砂磧引水溉灌其五穀及禽獸與中州畧同唯無稻黍土出名馬及駝富室至有數千頭者出象師子多良犬有大鳥形如槖駝有兩翼飛而不能高食草與肉亦能噉人有大鳥卵眞珠玻璃珊瑚琉璃瑪瑙水精瑟瑟金銀鍮石金剛火齊銅錫鑌鐵朱砂水銀錦疊細布氍毹翕毛㲪護那越諾布金縷織成赤麖皮薫陸鬱金蘇合青木等香胡椒蓽撥石蜜千年棗香附子訶黎勒無食子鹽綠雌黄又有優鉢曇花鮮華可愛地有鹹池俗尊右下左祠天地日月水火戰乗象一象士百人負則盡殺叛者鐵灼其舌瘡白為直黒為曲魏神龜中其國遣使上書貢物云大國天子天之所生願日出處常為漢中天子波斯國王居和多千萬敬拜朝廷嘉納之自此每使朝獻恭帝二年其王又遣使獻方物梁中大通二年始通江左遣使獻佛牙隋煬帝時遣雲騎尉李昱使通波斯尋有使隨昱貢方物隋末西突厥葉護可汗討殘其國而不能有唐貞觀十二年遣使朝貢又獻活褥蛇狀類䑕色正青長八九寸能入穴取䑕後其王為大酋所逐大食復攻之遣使告難髙宗以逺不可師謝遣龍朔初又訴為大食所侵時天子遣使到西域分置州縣以疾陵城為波斯都督府拜其王為都督俄為大食所滅雖不能國咸亨中猶入朝授右武衛將軍死始其子泥湼師為質調露元年詔裴行儉將兵䕶還將復王其國以道逺至安西碎葉行儉還泥湼師因客吐火羅二十年部落益離散景龍初復来朝授左威衛將軍病死西部獨存開元天寳間遣使者十輩獻瑪瑙牀火毛繡舞筵乾元初從大食襲廣州焚倉庫廬舍浮海走大歴時復来獻又有陀㧞斯單者或曰陀㧞薩憚其國三面阻山北瀕小海居婆里城世為波斯東大將波斯滅不能臣大食天寳五載王忽魯汗遣使入朝封為歸信王後八年遣子自㑹羅来朝拜右武衛員外中郎將賜紫袍金魚留宿衛為黒衣大食所滅貞觀後逺小國君遣使来朝獻有司未嘗參考本末者今附之左方曰火辭彌與波斯接貞觀十八年與摩羅游使者偕朝二十一年有健達王獻佛土菜莖五葉赤華紫須龍朔元年多福王難婆脩疆宜說遣使者来朝總章元年有末陀提王開元五年有習阿薩般王安殺並遣使来朝貢七年訶毘施王撩塞因吐火羅大酋羅摩獻獅子五色鸚鵡天寳時來朝者曰俱爛那曰舍摩曰威逺曰蘇吉利𤼵屋闌曰蘇利息單曰建成曰新城曰俱位凡八國俱位或曰商彌治阿賖䫻師多城在大雪山勃律河北地寒有五穀蒲萄石榴冬窟室國人常助小勃律為中國候新城之國在石東北贏百里有弩室羯城亦曰新城曰小石國城後為葛邏祿所并悅般悅般國在烏孫西北其先匈奴北單于之部落為漢車騎將軍竇憲所逐北單于度金微山西走康居其羸弱不能去者住龜兹北地方數千里衆可二十餘萬涼州人猶謂之單于王其風俗言語與髙車同而其人清潔於胡俗剪髪齊眉以䬾餬塗之昱昱然光澤日三澡潄然後飲食其國南界有火山山傍石皆燋鎔流地數十里乃凝堅人取以為藥即石流黄也與蠕蠕結好其王嘗將數千人入蠕蠕國欲與大檀相見入其界百餘里見其部人不浣衣不絆髮不洗手婦人口䑛器物王謂其從臣曰汝曹誑我將我入此狗國中乃馳還大檀遣騎追之不及自是相仇讐數相征討魏太平眞君九年遣使朝獻并送幻人稱能割人喉脉令斷擊人頭令骨陷皆血出或數升或盈斗以草藥納其口中令嚼咽之須臾血止養瘡一月復常又無㾗瘢世疑其虚乃取死罪囚試之皆驗云中國諸名山皆有此草乃使人受其術而厚遇之又言其國有大術者蠕蠕来抄掠術人能作霖雨盲風大雪及行潦蠕蠕凍死漂亡者十二三是歳再遣使朝貢求與官軍東西齊契討蠕蠕太武嘉其意命中外諸軍戒嚴以淮南王他為前鋒襲蠕蠕仍詔有司以其鼓舞之節施於樂府自是每使朝貢伏盧尼伏盧尼後魏時通焉治伏盧尼城在波斯國西北有大河南流中有鳥其形似人亦有似槖駝馬者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琥珀多師子朱俱波朱俱波後魏時通焉亦名朱居槃國漢子合國也今并有之漢西夜蒲犁依耐得若四國之地在于闐國西千餘里其西至渇槃國南至女國三千里北至疎勒九百里南至葱嶺二百里其王本疎勒國人魏畧西戎傳曰西夜并屬疎勒宣武永平中朱居槃國遣使朝貢其人言語與于闐相似其間小異人貌多同華夏亦類疎勒唐武徳以後頻遣使朝貢渇槃陀渇槃陀後魏時通焉亦名漢陁國亦名渇羅陀國治葱嶺中在朱俱波國西至䕶密國其南至懸度山無定界北至疎勒國界西北至判汗國其王本疎勒人累代相承以居此國有户二千餘懸度山在國西南四百里懸度者石山也谿谷不通以繩索相引而度其間四百里中往往有棧道因以為名今按懸度葱嶺迤邐相屬郵置所絶道阻且長故行人由之莫能分别然法顯宋雲所經即懸度山也又有頭痛山在國西南鄉罽賓歴大頭痛小頭痛之山赤土身熱之阪宋膺異物志云大頭痛小頭痛山皆在渠搜之東疎勒之西經之者身熱頭痛夏不可行行則致死唯冬可行尚嘔吐山有毒藥氣之所為也冬乃枯歇故可行也其葱嶺俗號極嶷山今按葱嶺周環其國衣服人貌語音與于闐相似其間多有異者書與婆羅門同國中咸事佛人山居勁健雜人多而胡少有音樂兵器有甲弰弓刀國法殺人刦賊者死餘徵罰其稅雜輸之服飾婚姻同疎勒王坐金牀死者埋殯七日為孝太武帝大延三年朝獻於後不絶粟弋粟弋後魏通焉在葱嶺大國一名粟特一名特拘夢出好馬牛羊蒲萄諸果出美蒲萄酒其土地水美故也出大禾髙丈餘子如胡豆在安息北五千里附庸小國四百餘城太武時遣使朝貢阿鈎羌阿鈎羌後魏通焉在莎車西南國西有懸度山其間四百里中往往有棧道下臨不測之淵人行以繩索相持而度土有五穀諸果市用錢為貨居止立宫室有兵器副貨副貨後魏通焉東至阿富使且國西至沒誰國中間相去千里南有連山不知名北至竒沙國相去千五百里宜五穀蒲萄唯有駝騾國王有黄金殿殿下有金駝七頭各髙三尺孝文帝時其王遣使朝貢疊伏羅疊伏羅後魏通焉去代三萬一千里國中有勿悉城城北有彊竒水西流有白象土宜五穀宣武帝時遣使貢方物石國石國隋時通焉居於藥殺水都柘折城方千餘里本漢大宛北鄙之地東與北至西突厥界西至波臘國界西南至康居界南至率都沙那國界王姓石國城之東南立屋置座於中正月六日七月十五日以王父母燒餘之骨金甕盛之置於床上廵繞而行散以香花雜果王率臣下設祭焉禮終王與夫人出就别帳臣下以次列坐而饗宴有粟麥多良馬南去鏺音撥汗六百里東南去𤓰州六千里嘗貳於突厥射匱可汗滅之令特勒甸攝其國事隋大業五年遣使朝貢唐武徳貞觀間數獻方物顯慶三年以瞰羯城為大宛都督府授其王都督開元初封其君長為石國王二十八年又冊順義王明年其王上言今突厥已屬天可汗惟大食為諸國患請討之天子不許天寳初封王子那俱車鼻施為懐化王賜鐵劵久之安西節度使髙仙芝劾其無蕃臣禮請討之王約降仙芝遣使者護送至開逺門斬闕下於是皆怨王子走大食乞兵攻怛邏斯城敗仙芝軍自是臣大食寳應時遣使朝貢杜環經行記云其國城一名赭支一名大宛天寳中鎮西節度使髙仙芝禽其王及妻子歸京師國中有二水一名眞珠河一名質河並西北流土地平敞多果實出好犬良馬又云碎葉國從安西西北千餘里有勃達嶺嶺南是大唐北界嶺北是突厥騎施南界西南至葱嶺二千餘里其水嶺南流者盡過中國而歸東海嶺北流者盡歸胡境而入北海又北行數日度雪海其海在山中春夏常雨雪故曰雪海有細道道傍往往有水孔嵌空萬仞轉墮者莫知數在勃達嶺北行千餘里至碎葉川其川東頭有熱海兹地寒而不凍故曰熱海又有碎葉城天寳七載北庭節度使王正見薄伐城壁摧毁邑居零落昔交河公主所居止之處建大雲寺猶存其川西接石國約長千餘里中有異姓部落有異姓突厥各有兵馬數萬城堡間雜日尋干戈凡是農人皆擐甲胄専相虜掠以為奴婢其川西頭有城曰怛羅斯石國人鎮即天寳十載髙仙芝軍敗之地從此至西海以来自三月至九月天無雲雨皆以雪水種田宜大麥小麥稻禾豌豆畢豆飲蒲萄酒糜酒醋乳東女東女亦曰蘇伐刺拏瞿咀羅羌别種也西海亦有女自王故稱東别之東與吐蕃党項茂州接西屬三波訶北距于闐東南屬雅州羅女蠻白狼夷東西行盡九日南北行盡二十日有八十城以女為君居康延川巖險四繚有弱水南流縫革為船户四萬勝兵萬人王號賓就官曰髙霸黎猶言宰相也官在外者率男子為之凡號令女官自内傳男官受而行之王侍女數百五日一聴政王死以金錢數萬納王族求淑女立之凡二次為小王王死因以為嗣或姑死婦繼無簒奪所居皆重屋王九層國人六層王服青毛綾裙被青袌袖委於地冬羊裘飾以文錦為小鬟髻耳垂璫足曵􅤼履俗輕男子女貴者咸有侍男被髮以青塗面惟務戰與耕而已子從母姓地寒宜麥畜羊馬出黄金風俗大與天竺同以十一月為正巫者以十月詣山中布糟麥咒呼羣鳥俄有鳥来如雞狀剖視之有穀者歳豐否即有災名曰鳥卜居喪三年不易服不櫛沐貴人死剥葬其皮内骨罋中糅金屑瘞之葬殉者至數十人隋開皇六年遣使朝貢唐武徳時王湯滂氏始遣使入貢髙祖厚報為突厥所掠不得通貞觀中使復至太宗璽制慰撫顯慶初遣髙霸黎文與王子三盧来朝授右監門中郎將其王斂臂使大臣来請官號武后冊拜斂臂左玉鈐衛員外將軍賜瑞錦服天授開元間王及子再来朝詔與宰相宴曲江封王曵夫為歸昌王左金吾衛大將軍後乃以男子為王貞元九年其王湯立悉與白狗君及哥隣君董卧庭逋租君鄧吉知南水君薛尚悉曩弱水君董避和悉董君湯悉贊清逺君蘇唐磨咄霸君董義蓬皆詣劔南韋皋求内附其種散居西山弱水雖自謂王蓋小小部落耳自失河隴悉為吐蕃覊屬部數千户輒置令歳督絲絮至是猶上天寳所賜詔書皋處其衆於維霸等州賜牛粮治生業立悉等入朝差賜官禄於是松州羌二萬口相踵入附立悉等官刺史皆得世襲然陰附吐蕃故謂之兩面羌西女西女國在葱嶺之西其俗與東女畧同種皆女子多珍貨附拂菻君長歳遣男子配焉俗産男子不舉唐貞觀八年朝貢使至吐火羅吐火羅一名土壑宜後魏時吐呼羅國也隋時通焉都葱嶺西五百里在烏滸河南即媯水也與挹怛雜居勝兵十萬人皆習戰俗奉佛多男少婦人故兄弟通室婦人五夫則首戴五角十夫戴十角男子無兄弟者則與他人結為昆季方始得妻不然終身無婦矣生子屬其長兄被服文字與于闐畧同城北有玻璃山南崖穴中有神馬國人每牧馬於其側時産名駒皆汗血焉其北界則漢時大宛之地南去曹國千七百里東去𤓰州六千七百里大業中遣使来貢唐初屬西突厥髙宗永徽初遣使獻大鳥髙七尺其色元足如駝鼔翅而行曰三百里能噉鐵夷俗謂駝鳥龍朔元年吐火羅置州縣使王名逺進西域圖記并請于闐以西波斯以東十六國分置都督府及州八十縣一百軍府一百二十六仍於吐火羅立碑以紀聖徳帝從之開元天寳間數獻馬騾異藥乾陀婆羅二百品紅碧玻璃乃冊其君骨咄祿頓達度為吐火羅葉挹怛王其後隣胡羯師謀引吐蕃攻吐火羅於是葉護失里忙伽羅丐安西兵助討帝為出師破之乾元初與西域九國發兵為天子討賊肅宗詔隸朔方行營刧國刧國隋時聞焉在葱嶺中西與南俱與賖彌國界接西北至挹怛國去長安萬二千里有户數萬氣候熱有稻麥粟豆羊馬出洛沙青黛婚姻同突厥死亡棄於山唐武徳二年遣使貢寳帶金鏁玻璃水精盃各一玻璃四百九十枚大者如棗小者如酸棗陁羅伊羅陁羅伊羅隋時聞焉在烏荼國北大雪山坡上緣梯登山接七百梯方到其國越底延越底延國隋時聞焉治辛頭河北南至婆羅門國三千里西北至賖彌國千餘里東北至𤓰州五千四百里其王婆羅門種類户數萬有弓矢刀矟皮甲國法不殺人重罪流輕者杖國無課稅其俗事佛書同婆羅門王及庶人翦髮衣錦袍不開縫貧者衣白疊婦人為髻衣裙衫帔長巾俗清潔氣候温多稻有羊馬多牛出鍮石訶黎勒石蜜麖皮細疊大食大食唐永徽中遣使朝貢云其國在波斯之西或云初有波斯胡人若有神助得刀殺人因招附諸胡有胡人十一来據次第摩首受化為王此後衆漸歸附遂滅波斯又破拂菻及婆羅門城所當無敵兵衆有四十二萬有國以来三十四年矣初王已死次傳第一摩首者今王即是第三其王姓大食其國男夫鼻大而長瘦黒多須鬢似婆羅門婦女多端麗亦有文學與波斯不同出駝馬驢騾羖羊等土多砂石不堪耕種無五穀唯食駝象等肉破波斯拂菻始有米麵敬事天神又云其王嘗遣人乗船將衣糧入海經涉八年未極西岸於海中見一方石石上有樹枝赤葉青樹上總生小兒長六七寸見人不語而皆能笑動其手脚頭着樹枝人摘取入手即乾黒其使得一枝還今在大食王處杜環經行記云一名亞俱羅其大食王號暮門都此處其士女瓌偉壯大衣裳鮮潔容止閑麗女子出門必擁蔽其面無問貴賤一日五時禮天食肉作齋以殺生為功徳繫銀帶佩銀刀斷飲酒禁音樂人相争者不至毆擊又有禮堂容數萬人毎七日王出禮拜登髙為衆說法曰人生甚難天道不易奸非劫竊細行謾言安已危人欺貧虐賤有一於此罪莫大焉凡有征戰為敵所戮必得生天殺其敵人獲福無量率土禀化從之如流法唯從寛葬唯從儉郛郭之内里閈之中土地所生無物不有四方輻輳萬貨豐賤錦綉珠貝滿於市肆駝馬驢騾充於街巷刻石蜜為廬舍有似中國寳轝每至節日將獻貴人琉璃器皿鍮石瓶鉢蓋不可算數粳米白麵不異中華其果有偏桃又千年棗其蔓菁根大如斗而圓味甚美餘菜亦與諸國同蒲萄大者如雞子香油貴者有二一名耶塞蔓一名没女甲反師香草貴者有二一名查塞菶蒲孔反一名葜蘆苃綾絹機杼金銀匠畫匠漢匠起作畫者京兆人樊淑劉泚織絡者河東人樂􅻤吕禮又以槖駝駕車其馬俗云西海濱龍與馬交所産也腹肚小脚腕長善者日走千里其駝小而緊背有孤峯良者日馳千里又有駝鳥髙四尺以上脚似駝蹄頸項勝得人騎行五六里有卵大如三升又有薺樹實如夏棗堪作油食除瘴其氣候温土地無冰雪人多瘧痢一年之内十中五死今吞滅四五十國皆為所役屬多分其兵鎭守其境盡於西海焉又云米祿國在亞梅國西南七百餘里胡姓米者兹土人也其城方十五里用鐵為城門城中有鹽池又有兩所佛寺其境東西百四十里南北百八十里村柵連接樹木交映四面合匝摠是流沙南有大河流入其境分渠數百灌溉一川其土沃饒其人浄潔墻宇髙厚市㕓平正木既雕刻土亦繪畫又有細軟疊布羔羊皮裘估其上者直銀錢數百果有紅桃白㮈遏白黄李𤓰大者名尋支十餘人飡一顆輙足越𤓰長四尺以上菜有蔓菁蘿蔔長葱顆葱芸薹胡苽葛藍單達茴香英薤瓠蘆尤多蒲萄又有黄牛野馬水鴨石鷄其俗以五月為歳毎歳以盡缸相獻有打毬節鞦韆節其大食東道使鎮於此從此至西海以来大食波斯參雜居止其俗禮天不食自死肉及宿肉以香油塗髮又云苦國在大食西界周廻數千里造屋兼瓦壘石為壁米穀殊賤有大川東流入亞俱羅商客糴此糴彼往来相繼人多魁梧衣裳寛大有似儒服其苦國有五節度有兵馬一萬以上北接可薩突厥可薩北又有突厥足似牛蹄好噉人肉開元初復遣使獻馬鈿帶謁見不拜有司將劾之中書令張說謂殊俗慕義不可寘於罪元宗赦之使者又来辭曰國人止拜天見王無拜也有司切責乃拜十四年遣使蘇黎滿獻方物拜果毅賜緋袍帶或曰大食族中有孤列種世酋長號白衣大食種有二姓一曰盆尼末換二曰奚深有摩訶末者勇而智衆立為主闢地三千里克夏臘城傳十四世至末換殺兄伊疾自王下怨其忍有呼羅柵木鹿人並波悉林將討之徇衆曰助我者皆黒衣俄而衆數萬即殺末換求奚深種孫阿蒲羅㧞為王更號黒衣大食蒲羅死弟阿蒲恭拂立至徳初遣使者朝貢代宗取其兵平兩京阿蒲恭拂死子迷地立死弟訶論立貞元時與吐蕃相攻吐蕃歳西師故鮮盜邊十四年遣使者含嵳烏雞沙北三人朝皆拜中郎將賚遣之宋乾徳四年僧行勤游西域因賜王書以招懐之開寳元年遣使来朝貢四年又貢方物以其使李訶末為懐化將軍特以金花五色綾紙寫官誥以賜是年本國及占城闍婆又致貢物於李煜煜不敢受遣使来上因詔今後勿以為獻六年遣使来貢方物七年九年皆遣使入貢太平興國二年遣使貢方物其從者目深體黒謂之崑崙奴詔賜其使襲衣器幣從者縑帛有差四年復有朝貢使至雍熙二年國人花茶復来獻花綿越諾揀香白龍腦白沙糖薔薇水琉璃器淳化四年又遣其副蕃長李亞勿来貢其國舶主蒲希密至南海以老病不能詣闕乃以方物附亞勿来獻希密進象牙乳香鑌鐵紅絲吉貝五色雜花蕃錦白越諾琉璃瓶無名異薔薇水等詔賜希密敕書錦袍銀帶束帛以答之至道元年其國舶主蒲押陁黎齎蒲希密表獻白龍腦腽肭臍龍鹽眼藥白沙糖千年棗五味子偏桃薔薇水乳香山子蕃錦駝馬褥面白越諾引對於崇政殿譯者代奏云父蒲希密因緣射利泛舶至廣州逮今五稔未歸母令臣逺来尋訪昨至廣州見之具言前歳蒙皇帝聖恩降赦書賜以法錦袍紫綾纒頭間塗金銀鳯瓶一對綾絹二十疋今令臣奉章来謝以方物致貢太宗因問其國對云與大秦國相隣為其統屬今本國所管之民裁及數千有都城界山海間又問其山澤所出對云唯犀象香藥問犀象以何法可取對云象用象媒誘致漸以大繩覊縻之耳犀則使人升大樹操弓矢伺其至射而殺之其小者不用弓矢可以捕獲上賜以襲衣冠帶被褥等物令閣門宴犒訖就舘延留數月遣回降詔答賜蒲希密黄金準其所貢之直三年二月又與賓同隴國使来朝咸平二年又遣判官文戍至三年舶主陀羅離遣使穆吉鼻来貢吉鼻還賜陁羅離詔書并器服鞍馬六年又遣使婆欽羅三摩尼等對於崇政殿持真珠以進自云離國日誠願得瞻威顔即獻此乞不給囬賜眞宗不欲違其意俟其還優加恩賚景徳元年又遣使来時與三佛齊蒲端國使並在京師㑹上元觀燈皆賜錢縱其宴飲其年秋蕃客蒲加心至四年又遣使同占城使来優加館餼之禮許徧至苑囿寺觀遊覽大中祥符元年十月車駕東封陁婆離上言願執方物赴泰山從之自國初以来數入貢路繇沙州涉夏國抵秦州乾興初趙徳明請道其國中不許至天聖元年来貢恐為西人鈔掠乃詔自今取海路繇廣州至京師至和嘉祐間四貢方物最後以其首領蒲沙乙為武寧司階毎入貢朝廷視其物多寡加賜答之以進奉蕃官為郎將熙寧中其使辛押陀乞統察蕃長司公事詔廣州裁度又進錢銀助修廣州城不許六年都蕃首保順郎將蒲陀婆離慈表令男麻勿奉貢物乞以自代而求為將軍詔但授麻勿郎將其國部屬各異名故有勿延有陀婆離有俞盧和地有麻囉㧞等國然皆冠以大食勿延所貢又有龍腦兠羅綿毬錦襈番花簟陁婆有金飾夀帶連環鈎臂數珠之屬政和中横州士曹蔡蒙休押伴其使入都沿道故滯留强市其香藥不償直事聞詔提㸃刑獄置獄推治因詔自今蕃夷入貢並選承務郎以上清强官押伴按程而行無故不得過一日乞取賈市者以自盜論其國在泉州西北自泉州𤼵船四十餘日至藍里博易住冬次年再𤼵順風六十餘日方至其國本國所産多運載與三佛齊貿易商賈轉販以至中國其國雄壯其地廣袤民俗侈麗甲於諸蕃天氣多寒雪厚二三尺故貴氊毯國據諸蕃衝要其王錦衣玉帶躡間金履朔望則戴百寳純金冠其居以瑪瑙為柱綠甘為壁水晶為瓦碌石為磚活石為灰帷幕之屬悉用百花錦官有丞相太尉各領兵馬二萬餘人馬髙七尺士卒驍勇民居屋宇與中國同但瓦則以薄石為之市肆諠譁金銀綾錦之屬種種而聚技巧咸精建炎三年張浚奏大食國遣使進奉珠玉寳貝等物已至熙州上宣諭曰大觀宣和間茶馬之政廢川茶不以博馬惟市珠玉故馬政浸缺武備不脩致邊徼内侵危弱之甚今若復損數十萬緡貿易無用珠玉曷若惜財以養戰士宜以禮贈賄而謝遣之乃詔張浚並不得受量度支賜以答逺人之意紹興元年六年俱以船舶入貢乾道四年進貢方物初遣使賫寳貝象牙乳香等入貢舟至占城為所奪訴於福建市舶上令以禮遣囘開禧間遣使入貢拂菻拂菻國南東至滅力沙北至海皆四十程西至海三十程東自西大食及于闐囘紇達靼青唐乃抵中國歴代未嘗朝貢至宋元豐四年十月其王滅力沙靈改撒始遣大首領伱厮都令厮孟判来獻鞍馬刀劔眞珠言其國地甚寒土屋無瓦産金銀珠胡錦牛羊馬獨峯駝梨杏千年棗巴攬粟麥以蒲萄釀酒樂有箜篌胡琴小篳篥偏鼓王服紅黄衣以金線織絲布纒頭歳三月則詣佛寺坐紅床使人舁之貴人如王之服或青綠緋白粉紅褐紫並纒頭跨馬城市田野皆有首領主之每歳唯夏秋兩得俸給金錢錦穀帛以治事大小為差刑罰罪輕者杖數十重者至二百大罪則盛以毛囊投諸海不尚鬬戰鄰國小有争但以文字往来相詰問事大亦出兵鑄金銀為錢無穿孔面鑿彌勒佛皆為王名禁民私造元祐六年其使兩至詔别賜其王帛二百疋白金餅對衣金束帶按唐史有拂菻國以為即古大秦也然大秦自後漢始通中國歴晉唐貢獻不廢而宋四朝史拂菻傳則以為其國歴代未嘗朝貢至元豐時始遣使入獻方物今以二史兩拂菻傳參之唐傳言其國西瀕大海宋傳則言西至海尚三十程而餘界亦齟齬不合土産風俗亦不同恐是其名偶同而非大秦也今故以唐之拂菻附入大秦而此拂菻自為一國云邈黎邈黎國宋元祐四年般次冷夷四抹粟迷等齎于闐國黒汗王并本國王表章来有司以其國未嘗入貢請視于闐條式從之文獻通考卷三百三十九
