body:
  text: 文獻通考卷七十四鄱陽馬端臨貴與著郊社考七明堂武后臨朝垂拱元年郊丘明堂諸祭以髙祖太宗髙宗並配詳見郊祀門四年毁乾元殿於其地作明堂明堂成髙二百九十四尺方三百尺凡三層下層法四時各隨方色中層法十二辰上為圓蓋九龍捧之上層法二十四氣亦為圓蓋上施鐵鳳髙一丈飾以黃金中有巨木十圍上下通貫栭櫨㮰藉以為本下施鐡渠為辟雍之象號曰萬象神宫宴賜羣臣赦天下縱民入觀改河南為合宫縣又於明堂北起天堂五級以貯大像至三級則俯視明堂矣僧懷義以功拜左威衛大將軍梁國公侍御史王求禮上書曰古之明堂茅茨不剪采椽不斫今者飾以珠玉圖以丹青鐵鷟入雲金龍隱霧昔殷辛瓊臺夏癸瑶室無以加也太后不報永昌元年正月朔大享萬像神宫太后服衮冕搢大圭執鎮圭為初獻皇帝為亞獻太子為終獻先詣昊天上帝座次髙祖太宗髙宗次魏國先王次五方帝座太后御明堂受朝賀布政於明堂復御明堂享羣臣天授二年革命以武氏祖宗配享明堂唐三帝亦同配中宗神龍元年九月親享明堂合祭天地以髙宗配季秋大享復就圜丘行事元宗開元五年幸東都將行大享之禮以武太后所造明堂有乖典制遂坼依舊造乾元殿每臨御依正殿禮自是駕在東都常以元日冬至於乾元殿受朝賀季秋大享依舊於圜丘行事十年復題乾元殿為明堂而不行享禮二十年季秋大享於明堂祀昊天上帝以睿宗配又以五方帝五官從祀籩豆樽罍之數與雩禮同二十五年駕在西京詔將作大匠康辨素詣東都毁武后所創明堂辨素言則天時以木為瓦夾紵漆之毁之勞人乃去其上層易以真瓦依舊改為乾元殿自是迄唐之世季秋大享皆寓圜丘代宗永泰二年禮儀使杜鴻漸奏季秋大享明堂祀昊天上帝請以肅宗配制可憲宗元和元年太常禮院奏季秋大享明堂祀昊天上帝今太廟祔享禮畢大享之日準禮合奉皇考順宗配神作主詔曰敬依典禮十五年時穆宗已即位禮院奏大享明堂案禮文皇考配坐今奉憲宗配神作主詔曰敬依典禮唐開元禮皇帝季秋大享於明堂儀將祀有司卜日如别儀前祀七日戒誓百官皇帝散齋致齋並如圜丘儀祀官齋戒同陳設前祀三日尚舍直長施大次於明堂東門之外道北尚舍奉御鋪御座守宫設文武侍臣次於大次之後文官在左武官在右俱北向諸祀官次於璧水東門之外道南從祀官文官九品以上於祀官之東東方南方蕃客又於其東俱重行每等異位北向西上介公􅈶公於璧水西門之外道南武官九品以上於介公􅈶公西西方北方蕃客又於其西俱重行每等異位北向東上褒聖侯於文武三品之下若有諸州使人分方各於文武官之後攝事無大次已下儀守宫設祀官公卿已下次於璧水東門外道南北向西上設陳饌幔於璧水東門之內道北南向前祀二日太樂令設宫懸之樂於明堂前庭如圜丘之儀右校清掃明堂內官郊社令積柴於燎壇其壇於樂懸之南方一丈髙丈二尺開上南出户方六尺前祀一日奉禮設御位堂之東南西向設祀官公卿位於東門之內道南攝事設祀官公卿位於明堂東南執事者位於公卿之後近南每等異位俱重行西面北上設御史位於堂下一位在東南西向一位在西南東向令史各陪其後設奉禮位於樂懸東贊者二人在南差退俱西向設協律郎位於堂上午陛之西東向設太樂令位於北懸之間攝事於此下便設望燎位於柴壇之北南向無太祝已下至褒聖侯之位也太祝奉玉帛位於柴壇之南皆北向設從祀文官九品已上於執事之南東方南方蕃客又於其南俱每等異位重行西向北上介公􅈶公位於西門之內道南武官九品已上於介公􅈶公之後西方北方蕃客於武官之南俱每等異位重行東面北上其褒聖侯於文武三品之下若有諸州使人分位各於文武官之後又設祀官及從祀羣官等門外位於東門外道南皆如設次之式設牲榜於東門之外當門西向南上牲數如雩祀之儀設酒樽之位明堂之上下昊天上帝太樽二著樽二犧樽二山罍二在室內神座之左象樽二壺樽二山罍二在堂下東南西向配帝著樽二犧樽二象樽二罍二在堂上神座之左五方帝各太樽二著樽二犧樽二罍一各於室內神座之左內向五帝各著樽二在堂上各於神座之左俱內向五官各象樽二在階下皆於神座之左俱右向堂上之樽皆於坫階下之樽皆藉以席俱如勺冪設爵於樽下設御洗於東階東南攝事設祀官洗亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設五官罍洗篚羃各於酒樽之左俱右向其執樽罍篚羃者各位於其後各設玉幣之篚於堂之上下樽坫之間祀日未明五刻太史令郊社令升設昊天上帝神座於明堂太室之內中央南向席以藁秸設睿宗大聖真皇帝神座於上帝之東南西向席以莞設青帝於木室西向赤帝於火室北向黃帝於太室南户之西北向白帝於金室東向黑帝於水室南向席皆以藁秸設太昊炎帝軒轅少昊顓頊之座各於五方帝之左俱內向差退若非明堂五室皆如雩祀圜丘設座之禮設五官座於明堂之庭各依其方俱內向席皆以莞設神位各於座首省牲器鑾駕出宫並如圜丘儀奠玉帛祀日未明三刻諸祀官各服其服其設樽罍玉帛升行掃除門外位儀舞人就位皇帝出行宫之次羣官入就位近侍臣陪從儀並同圜丘攝事亦如圜丘皇帝至版位西向立每立定太常卿與博士退立於左太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜謁者引諸獻官俱詣東陛升堂立於樽所太祝與獻官皆跪取玉幣於篚立於東南隅西向北上五方帝五配帝太祝立於西南隅東向北上五方帝五官諸太祝及獻官又取幣於篚立於樽所太常卿引皇帝太和之樂作皇帝每行皆奏太和之樂皇帝升自南陛侍中中書令已下及左右侍衛量人從升已下皆如之攝則謁者引太尉升南陛奠玉帛皇帝升堂北面立樂止太祝加玉於幣以授侍中侍中奉玉帛西向進皇帝搢鎮圭受玉帛凡受物皆搢鎮圭奠訖執圭俯伏興登歌作肅和之樂以太吕之均太常卿引皇帝進北向跪奠於昊天上帝神座俯伏興太常卿引皇帝立於南方北面五方帝之前太祝奉玉帛各奠於神座還樽所皇帝再拜訖太祝又以配帝之幣授侍中攝事皆謁者贊授太尉上下皆然侍中奉幣西向進皇帝受幣太常卿引皇帝進西面跪奠於睿宗大聖真皇帝神位前俯伏興太常卿引皇帝立於東方西向五帝之獻官各奠幣於神座各還五官之祝次奠幣神座各還樽所皇帝再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初羣官拜訖祝史皆奉毛血之豆立於堂下於登歌止祝史奉毛血各由其階升諸太祝迎取於堂上俱進奠於神座諸太祝與祝史退立於樽所進熟皇帝既升奠玉帛其設饌盥洗樽爵一如圜丘之儀攝則太尉既升奠太常卿引皇帝立於南方北向太祝一人持版進於皇帝之右西面跪讀祝文曰維某年嵗次某月朔日子嗣天子臣某敢昭告於攝事云天子臣某謹遣太尉封臣名敢昭告於昊天上帝惟神覆燾羣生陶甄庶類不言而信普博無私謹擇元辰祗率恆禮敬以玉帛犧齊粢盛庶品肅恭禋祀式展誠敬皇考睿宗大聖真皇帝配神作主尚享訖興皇帝再拜初讀祝文訖樂作太祝進奠版於天帝神座還樽所皇帝拜訖樂止太常卿引皇帝詣配帝酒樽所執樽者舉羃侍中取爵於坫進引皇帝受爵侍中贊酌泛齊訖樂作太常卿引皇帝進睿宗大聖真皇帝座前西向跪奠爵俯伏興太常卿引皇帝立於東方西向謁者五人引五方帝之太祝詣罍洗盥手俱取匏於坫酌泛齊各進奠於其神座前還樽所樂止配帝太祝一人持版進於皇帝之左北面跪讀祝文曰維某年嵗次月朔日孝子開元神武皇帝臣某敢昭告於皇考睿宗大聖真皇帝祗率舊章肅恭恆禮敬致禋祀於昊天上帝惟皇考德光宇宙道叶乾元申錫無疆實膺嚴配謹以制弊犧齊粢盛庶品肅恭明薦侑神作主尚享訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神座前還樽所皇帝拜訖樂止太常卿引皇帝南方北向立樂作其飲福還宫並如圜丘儀攝事亦同雩祀攝事大享明堂祀昊天上帝以睿宗大聖真皇帝配座又以五方帝五帝五官從祀籩豆等如冬至都七十座宋初因唐舊制每嵗冬至圜丘正月上辛祈榖孟夏雩祀季秋大享凡四祭昊天上帝太宗雍熙元年以太祖配上帝淳化四年詔季秋大享以宣祖配真宗時季秋大享以太祖配仁宗時季秋大享以真宗配皇祐二年秋九月辛亥大享明堂三聖並侑先是宋庠建議以今年當郊而日至在晦用建隆故事宜有所避因請季秋大享於明堂詔從之上謂輔臣曰明堂者布政之宫天子路寢今大慶殿是也况明道初已合祭天地於此乃下詔以大慶殿為明堂揭御篆明堂二字飛白明堂之門四字祠已藏宗正寺判太常寺兼儀事宋祁等檢詳典禮條請一據明堂制有五室當大享時即設昊天上帝座於太室中央南向配帝位於上帝東南西向青帝室在東西向赤帝室在南北向黃帝在太室內少西南北向白帝室在西東向黑帝室在北南向今大慶殿初無五室欲權為幔室以準古制每室為四户八牖或不為幔室即止依方設版位於禮亦不至妨闕其五神位即設於庭中東南一明堂古制南面三階三面各二階今大慶殿唯南向一面有兩階其三面之制即難備設欲於南向權設五階以備乘輿登降一明堂大享唯真宗崇配據禮合止告一室伏緣乘輿入廟仰對列聖若専享一室禮未厭情今欲罷有司今年孟秋時享請皇帝親行朝享之禮即七室皆偏可盡恭虔於禮為便其真宗室祝册兼告崇配之意自餘齋宿如南郊之儀一南郊禮畢自大次輦還帷宫鈞容鼓吹導引自帷宫還內諸營兵夾路鼓吹奉迎今明堂禮畢還文德殿以須旦明登樓肆赦緣宫禁地近難用鈞容鼓吹其鈞容合在宣德門外排列營兵鼓吹合在馳道左右排列欲候禮成乘輿離大次還文德殿時自內傳呼出外計鈞容及諸營鼓吹一時振作俟乘輿至文德殿御幄即傳呼令罷太常禮院言昨赴大慶殿詳度陳列天地以下神位今參比郊壇壝兆上下位敘如左殿上五室內太室中北昊天上帝位皇地祗在左皆南面太祖太宗真宗位在東西向黃帝在太室中西南北面人帝在左少退青帝赤帝白帝黑帝各從本室人帝在左少退神州地祗日月北極天皇大帝並設於五室之間其位少退五帝神州日月北極天皇帝郊壇為第一龕位五官勾芒以下設於明堂庭中少東南别為露幄五緯十二次紫微垣內官五方嶽鎮海瀆嵗星真枵鈎星以下七十二位於東西夾廡下版設於郊壇為第二龕位二十八舍黃道內天官角宿攝提五方山林川澤以下一百七十九位於丹墀龍墀道東西版設於郊壇為第三龕位黃道外天官及衆星五方墳衍原隰以下四百九十六位並東西廡周環殿後版設以北為上於郊壇為內壝之內外為倣古明堂之制又稍與壇壝位敘相類及令修內司并少府司天監量廣深丈尺約陳列祭器不至併隘如得允當望下司天監繪圖以進詔曰國朝三嵗親郊即合祭天地祖宗並配而百神從祀今祀明堂而禮官所定祭天不及地配坐不及祖宗未合三朝之制且移郊為大享蓋為民祈福宜合祭皇地祗奉太祖太宗真宗並配而五帝神州地祗亦親獻之日月河海諸神悉如圜丘從祀因謂輔臣曰禮非天降地出緣人情耳今禮官習拘儒之舊傳昧三朝之成法非朕所以昭孝息民也先是資政殿學士知杭州范仲淹建言祀明堂曠禮宜召元老舊德陪位於庭乃詔南京起太子太保杜衍西京起太子太傅任布陪祀且供帳都亭驛待之既而二人皆以老疾力辭不至遂賜衣帶器幣自後每遇大禮而前兩府致仕者率有詔召焉然亦無至者按宋初雖有季秋大享明堂之禮然未嘗親祠只命有司攝事沿隋唐舊制寓祭南郊壇至仁宗皇祐二年始以大慶殿為明堂合祭天地三聖並侑百神從事一如圜丘南郊之儀蓋當舉郊祀之嵗而移其禮用之於明堂故不容不重其事也嘉祐六年九月辛亥大享明堂奉真宗配禮院言皇祐參用南郊百神之位不應祀法宜如隋唐舊制設昊天上帝五方帝位以真宗配而五人帝五官神從祀餘皆罷又前一日親享太廟當時嘗停孟冬之薦考詳典禮宗廟時祭未有因嚴配而輟者今明堂去孟冬日尚逺請復薦廟前者祖宗並侑今用典禮獨配前者地祗神州並享今以配天而亦罷是皆變於禮中之大者也開元開寶二禮五帝無親獻儀舊禮先詣昊天奠獻五帝並行分獻以侍臣奠幣皇帝再拜次詣真宗神座於禮為允詔恭依而五方帝亦行親獻宋祁奏臣切見鄭康成以上天之神凡六昊天者天皇大帝五帝者太微五帝王肅曰天惟一神以五帝為次神而諸儒附鄭者多胡據而為説云凡合祭五帝一嵗有二祀龍見之月祭於南郊謂之大雩一也九月大享於明堂宗祀文王以配一也祭明堂者諸儒之言不同或説周家祭五天帝皆明堂中以五人帝及文王配五官神坐庭中以武王配號曰祖宗禮所謂祖文王而宗武王者也施設神位凖五行相向以為法威仰在卯西面熛怒在午北面招拒在酉東面叶光紀在子南面太皥炎帝黃帝少皥髙辛各在其位少退勾芒祝融后土蓐收元冥皆在人帝下少後文王坐太皥之南位如主人少退或曰合祭之日五精之帝皆西向其牲則天帝各一犢合用十牲文王武王之牲用太牢以詩我將篇曰我將我享維羊維牛文王武王而用太牢者以五人帝各専配一天為之主主足為外神依止則文王泛配五帝矣不専配則所用牲得從盡物之享云英宗治平元年冬十月詔明堂奉仁宗配時禮院奏乞與兩制同議仁宗皇帝配侑明堂錢公輔等奏曰三代之法郊以祭天而明堂以祭五帝郊之祭以始封之祖有聖人之功者配焉明堂之祭以創業繼體之君有聖人之德者配焉故孝經曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝又曰孝莫大於嚴父嚴父莫大於配天則周公其人也以周公言之則嚴父也以成王言之則嚴祖也後世失禮不足考據請一以周事言之臣切謂聖宋崛起非有始封之祖也則創業之君是為太祖矣太祖則周之后稷配祭於郊者也太宗則周之文王配祭於明堂者也此二配至重萬世不遷之法也真宗則周之武王宗乎廟而不祧者也雖有配天之功而無配天之祭未聞成王以嚴父之故廢文王配天之祭而移於武王也仁宗則周之成王也雖有配天之功而無配天之祭亦未聞康王以嚴父之故廢文王配天之祭而移於成王也以孔子之心推周公之志則嚴父也以周公之心攝成王之祭則嚴祖也嚴祖嚴父其義一也下至於兩漢去聖甚逺明堂配祭東漢為得在西漢時則孝武始營明堂而以髙帝配之其後又以景帝配之孝武之後無聞焉在東漢時則孝明始建明堂而以光武配其後孝章孝安之後無聞焉當始配之代適符嚴父之説及時異事遷而章安二帝亦弗之變此最為近古而合乎禮者也有唐始在孝和時則以髙宗配之在明皇時則以睿宗配之在永泰時則以肅宗配之禮官杜鴻漸王涯輩皆不能推明經訓務合古初反雷同其論以惑時主延及於今牢不可破當仁宗之初倘有建是論者配天之祭常在乎太宗矣當時無一人言者故使宗周之典禮不明於聖代而有唐之曲學流弊乎後人願陛下深詔有司博謀羣賢使配天之祭不膠於嚴父而嚴父之道不専乎配天循宗周之典禮替有唐之曲學治平元年正月上於是又詔臺諌及講讀官與兩制再詳定以聞孫抃等奏議曰仁宗繼體保成置天下於大安者四十二年功德於人可謂極矣今祔廟之始遂抑而不得配上帝之享甚非所以宣章陛下為後嚴父之大孝司馬光等奏曰臣等竊以孝子之心誰不欲尊其父者聖人制禮以為之極不敢踰也故祖已訓髙宗曰祀無豐於昵孔子與孟懿子論孝亦曰祭之以禮然則事親者不以數祭為孝者貴於得禮而已前漢以髙祖配天後漢以光武配明堂以是觀古之帝王自非建邦啓土及造有區夏者皆無配天之文故雖周之成康漢之文景明章其德業非不美也然而子孫不敢推以配天者避祖宗也孝經曰嚴父莫大於配天則周公其人也孔子以周公有聖人之德成太平之業制禮作樂而文王適其父也故引之以證聖人之德莫大於孝答曽子之問而已非謂凡有天下者皆當以父配天然後為孝也近世祀明堂者皆以其父配五帝此乃誤識孝經之意而違先王之禮不可以為法也景祐二年仁宗詔禮院官稽案禮典辨崇配之序定二祧之位以太祖為帝者之祖比周之后稷太宗真宗為帝者之宗比周之文武然則祀真宗於明堂以配五帝亦未失古禮今仁宗雖豐功美德洽於四海而不在二祧之位議者乃欲捨真宗而以仁宗配明堂恐於祭法不合必若此行之不獨乖違典禮恐亦非仁宗意也臣等竊謂宜遵舊以真宗配五帝於明堂為便詔從孫抃等議以仁宗配享明堂或問朱子曰我將之詩乃祀文王於明堂之樂章詩傳以為物成形於帝人成形於父故季秋祀帝於明堂而以父配之取其成物之時也此乃周公以義起之非古制也不知周公以後將以文王配邪以時王之父配邪曰諸儒正持此二議至今不決看來只得以文王配且周公所制之禮不知在武王之時在成王之時若在成王時則文王乃其祖也亦自可見又問繼周者如何曰只得以有功之祖配之問周公郊后稷以配天宗祀文王於明堂以配上帝此説如何曰此是周公創立一箇法如此將文王配明堂永為定例以后稷配郊推之自可見後來妄將嚴父之説亂了治平四年七月時神宗已即位翰林學士承旨張方平等言季秋大享明堂請以英宗皇帝配神作主以合嚴父之義詔恭依熙寧四年六月詔以今年季秋有事於明堂冬至更不行南郊之禮恩賞就明堂禮畢施行太常禮院言親祀明堂惟昊天上帝英宗皇帝及五方帝並皇帝親獻五人帝五官神位即命分獻從之元豐三年詔歷代以來合宫所配雜以先儒六天之説朕甚不取將來祀英宗皇帝於明堂以配上帝餘從祀羣神悉罷詳定郊廟奉祀禮文所詳定謹按周禮有稱昊天上帝有稱上帝以義推之稱昊天上帝者一帝而已如祀昊天上帝則服大裘而冕祀五帝亦如之之類是也稱上帝者昊天上帝及五帝如類造上帝封於大神之類是也稱五帝者昊天上帝不與如祀五帝則張大次小次之類也繇是而言則經所謂宗祀文王於明堂以配上帝者與周禮所稱上帝同矣其將來祀英宗皇帝於明堂以配昊天上帝及五帝欲以此修入儀注并據知太常禮院趙居錫楊傑王仲修檢討楊完何珣直狀謹按周禮掌次職曰王大旅上帝則張氊案祀五帝則設大次小次又司服職曰祀昊天上帝則服大裘而冕祀五帝亦如之明上帝與五帝異矣則孝經所謂宗祀文王於明堂以配上帝者非可兼五帝也考之易詩書所稱上帝非一易曰先王作樂崇德薦之上帝以配祖考詩曰昭事上帝聿懷多福又曰上帝是祗書曰以昭受上帝天其申命用休又曰惟皇上帝降衷於下民如此類者豈可皆以五帝而言之自鄭氏之學興乃有六天之説而事非經見至晉泰始初論者始以為非遂於明堂惟設昊天上帝一座而已唐顯慶禮亦止祀昊天上帝於明堂今大享在近議者猶以謂上帝可以及五帝請如聖詔祀英宗皇帝於明堂惟以配上帝至誠精禋以稱皇帝嚴父之意詔如趙君錫等所議楊氏曰愚按孝經曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝而注疏家言明堂者皆曰祀五帝然則上帝之與五帝同乎異乎山隂黃度曰昊天上帝者天之大名也五帝分王於四時者也周人祀天於圜丘祀上帝於明堂皆報本也祀五帝於四郊所以致其生物之功也大宗伯言禋祀昊天上帝而不言祀五帝義可知矣由此觀之則明堂祀上帝者祀天也非祀五帝也而注疏家言明堂者皆曰祀五帝其説何從始乎遭秦滅學専用夷禮漢興襲秦四畤增之為五畤自是以後郊祀用新垣平之言則祠五帝明堂用公玉帶之言則祀五帝皆以五畤為主不知有上帝五帝之分也成帝即位用匡衡之説改郊祀明年衡坐事免官衆庶多言不當變動祭祠者遂復甘泉泰畤及雍五畤如故夫明堂祀五帝自武帝首行之光武中興以後始建明堂明帝章帝安帝遵行不變大抵以武帝汶上明堂為法不知周人祀上帝於明堂之意矣是故漢儒之注釋明堂者皆云祀五帝蓋其見聞習熟然也其後晉泰始中有言明堂南郊宜除五帝坐只設昊天上帝一位未幾韓楊建言以漢魏故事兼祀五帝無祀一天者竟復明堂五帝位是又習熟漢魏故事而然也抑又有甚焉者唐開元中王仲邱奏謂禋享上帝有合經義而五帝並祀行之已久請二禮並行以成大享之義本朝皇祐中宋祁奏以上帝五帝二禮並存以明聖人尊天奉神之義不敢有所裁抑夫祀上帝於明堂周禮也祀五帝於明堂漢禮也合周漢而並用之既並祀五帝又祀上帝其義何居是説也創於王仲邱襲於宋祁後之言禮者習熟見聞又將循此以為不易之典甚矣知天之學不明諸儒惑於古今同異而莫知所決行之既久而莫覺其誤也肆我神祖聖學髙明洞見周人明堂以文王配上帝之深意屏黜邪説斷然行之不以為疑非聰明睿智不惑之至其孰能與於此哉詳定禮文所言祀帝於南郊以天道事之享帝於明堂以人道事之以天道事之則雖配帝用犢禮所謂帝牛不吉以為稷牛是也以人道事之則雖天帝用太牢詩所謂我將我享維羊維牛是也梁儀曹郎朱異請明堂用特牛故隋唐因之皆用特牲非所謂以人道享上帝之意也皇祐大享明堂用犢七以薦上帝配五方帝用豕各五以薦五人帝熙寧中禮院議昊天上帝配帝用犢與羊豕各一五帝五人用犢與羊豕各五皆未應禮今明堂親祠上帝配帝五方帝五人帝請用牛羊豕各一六月太常禮院言今年明堂尚在慈聖光獻皇后三年之內請如熙寧元年南郊故事惟祀事用樂鹵簿鼓吹宫架皆備而不作從之是後凡國有故皆用此制又言按晉摯虞議明堂之祭備物以薦三牲並陳籩豆咸列禮同人理故配以近考開元開寶禮及見行儀注明堂之享席用藁鞂器陶匏並與郊祀無别殊非所謂禮同人理配以近考之意請以莞席代稿鞂蒲越以玉爵代匏爵其豆登簋俎樽罍並用宗廟之器從之哲宗元祐元年吏部尚書吕大防等請宗祀神宗皇帝於明堂以配上帝詔以季秋擇日有事於明堂九月辛酉帝大享於明堂詔明堂禮畢御紫宸殿羣臣起居不奏祥瑞御樓惟行肆赦儀稱賀並罷以太常寺言司馬光薨故也四年九月辛巳大享於明堂禮畢詣景靈宫及寺觀恭謝先時三省言按天聖五年南郊故事禮畢行勞酒之禮如元會之儀今明堂禮畢請太皇太后御會慶殿皇帝於簾內行恭謝之禮百僚稱賀訖宣羣官升殿賜酒太皇太后不許詔曰皇帝臨御海內晏安五經季秋再講宗祀以享天心顧吾何功獲被斯福今有司因天聖之故事修會慶之盛禮將俾文武稱慶於庭吾自臨決萬機祗畏豈以菲簿之德自比章獻之明矧復皇帝致賀於禁中羣臣奉表於闈左禮文既具夫又何求前朝舊儀吾不敢受將來明堂禮畢更不受賀百官並內東門拜表六年太常博士趙睿言本朝親享之禮自明道以來即大慶殿以為明堂至於有司攝事之所乃尚御於圜丘竊見南郊齋宫有望祭殿請就行禮從之徽宗崇寧四年詔營建明堂已度地鳩工俟過來嵗取旨興役明年以彗出西方遂詔罷之政和三年八月詔立明堂於大內之丙地徙祕書省於宣德門之東以其地為之詔明堂之制朕取考工互見之文得其制作之本夏后氏世室堂修二七廣四修一五室三四步四三尺九階四旁兩夾窗考夏后氏之制名曰世室又曰堂者則世室非廟堂修二七廣四修一則度以六尺之步其堂修十四步廣十七步之半又曰五室三四步四三尺者四步益四尺中央土室也三步益三尺木火金水四室也每室四户户兩夾窗此夏后氏之制也商人重屋堂修七尋崇三尺四阿重屋商人名曰重屋而又曰堂者非寢也度以八尺之尋其堂修七尋又曰四阿重屋者阿屋之曲也重者屋之復也則商人有四隅之阿四柱復屋則知下方也周人明堂度以九尺之筵三代之制不相襲夏曰世室商曰重屋周曰明堂則知皆堂也東西九筵南北七筵堂崇一筵五室凡室二筵者九筵則東西長七筵則南北狹所以象天則知上圜也夏商周之名雖不相襲其制則一唯步尋筵廣狹不同而已考工記所言三代之制亦各互見朕取夏后氏益土室之度兼商人四阿重屋之制從周人度以九尺之筵上圓象天下方象地四户以合四序八窗以應八節五室以聚五行十二堂以聼十二朔九階四阿每室四户夾以八窗兼三代之制黜諸儒之臆説亨帝嚴父聼朔布政於一堂之上於古皆合其制大備宜令明堂使司遵圖建立於是內出明堂圖式於崇政殿宣示百官命蔡京為明堂使蔡攸討論指畫制度蔡倏蔡翛宋升參詳梁師成為都監童師敏為承受以開封尹盛章彈壓兵匠章罷以王革代之復以章為參詳八月甲寅開局興工日役萬人仍差天武捧日兵士二千巡檢蔡京言三代之制世室重屋明堂修廣不相襲夏度以六尺之步商度以八尺之尋而周以九尺之筵世每近制每廣今若以二筵為太室方一丈八尺則室之中設版位禮器已不可容理當增廣今從周之制以九尺之筵為度太室修四筵三丈六尺廣五筵四丈五尺共為九筵木火金水四室各修三筵益四五三丈一尺五寸廣四筵三丈六尺共七筵益四尺五寸十二堂古無修廣之數今亦度以九尺之筵明堂元堂各修四筵三丈六尺廣五筵四丈五尺左右個各修廣四筵三丈六尺青陽總章各修廣四筵三丈六尺左右個各修四筵三丈六尺廣三筵益四五三丈一尺五寸四阿各四筵三丈六尺堂柱外基各一筵九尺堂總修一十九筵一十七丈一尺廣二十一筵一十八丈九尺蔡攸言明堂五門廊廡蓋以素瓦而門堂則以琉璃其地則隨所向而砌以五色之石欄楯柱端以銅為辟邪之象而飾以五方所向之色八窗八柱則以青黃緑相間堂室柱門欄柱並以丹艧塗之堂階為三級每級崇三尺共為一筵改火珠為雲龍之象階庭植松梓檜之木宫門不設戟而殿隅並垂鈴云詔以元堂犯聖祖之諱取平在朔易之義改為平朔門亦如之仍改敷右門曰左敷佑左承天門曰右敷佑承天門曰平秩更衣大次曰齋明殿其明堂青陽總章元堂太室五門並御書榜之七年明堂成有司請頒常視朔聼朝詔明堂専以配帝嚴父餘悉移於大慶文德殿羣臣五表陳請乃從之禮制局列上明堂七議一曰古者朔必告廟示不敢専請視朝聼朔必先奏告以見繼述之意二曰古者天子負扆南鄉以朝諸侯聼朔則各隨其方請自今御明堂正南鄉之位布政則隨月而御堂其閠月則居門焉三曰禮記月令天子居青陽總章每月異禮請稽月令十二堂之制修定時令使有司奉而行之四曰月令以季秋之月為來嵗受朔之日請以每嵗十月於明堂受新歷退而頒之郡國五曰古者天子負扆公侯伯子男蠻夷戎狄四塞之國各以內外尊卑為位請自今元正冬至及朝會並御明堂遼使依賓禮蕃國各隨其方立於四門之外六曰古者以明堂為布政之宫自今若有御扎手詔並請先於明堂宣示然後榜之廟堂頒之天下七曰赦書德音舊制宣於文德殿自今請非御樓肆赦並請於明堂宣讀九月詔頒朔布政自十月為始其月皇帝御明堂平朔左個頒天運政治及八年戊戌嵗運歷數於天下百官常服立明堂下乘輿自內殿出負扆坐於明堂大晟樂作百官朝於堂下大臣升階進呈所頒布時令左右丞一員跪請付外施行宰相承制可之左右丞乃下授頒政官頒政官受而讀之訖出閣門奏禮畢皇帝降御座百官乃退自是以為常重和元年九月辛卯大享明堂併祀五帝初禮部尚書許光凝等言月令季秋大享帝説者謂遍祭五帝也曲禮大享不問卜説者謂祭五帝於明堂莫適卜也周官太宰祀五帝則掌百官誓戒説者謂祀五帝於四郊及明堂而王安石以謂五帝者五精之君昊天之佐也惟其為五精之君故分位於五室惟其為昊天之佐故與享於明堂自神宗下詔惟以英宗配上帝而悉去從祀羣神陛下肇新宏規季秋大享位五帝於其室既無以禰槩配之嫌止祀五帝又無羣神從祀之黷則神宗黜六天於前陛下正五室於後其揆一也從之乃詔從祀五帝禮制局言祀天神於冬至祀地示於夏至乃有常日無所事卜季秋大享帝以先王配則有常月而未有常日禮不卜常祀而卜其日蓋月有上辛次辛謀及卜筮所以極嚴恭之意也請明堂以吉辛為正詔每嵗季秋大享親祠明堂罷有司攝事又詔明堂近在宫城秋享實薦時事行之久逺宜極簡嚴其每嵗季秋親祠如孟月朝獻禮更不差五使儀仗等自是迄宣和末嵗行親享之禮云髙宗紹興元年上合祭天地於明堂奉太祖太宗配祀禮畢不受賀文武百官拜表稱賀如儀以嗣濮王仲湜為亞獻右監門衛大將軍信州防禦使令話為終獻時禮部尚書秦檜等言伏覩建炎恭行郊祀之禮其時儀文制度與夫衣服器皿之類已不能如禮明年渡江國步愈艱今嵗復當郊祀謹按冬祀大禮神位六百九十行事官六百七十餘員而鹵簿儀仗輿輦宫架祭器法服散失殆盡及景靈宫太廟行事與登門肆眚等禮不可悉行至於祫享親詣宗廟行禮又不及天地惟宗祀明堂似乎簡易茍朝廷深原禮意采先儒之説漢武帝孝章之制而略其嚴父之文志存享帝而不拘於制度之末獨明堂之禮尚或可行乞博採羣議令有司參考典禮以聞禮部尚書胡直孺議曰謹按百王之禮沿革不同而祀天地於郊丘祀上帝於明堂祫享祖宗於太廟此三者萬世不易之禮惟仁宗皇祐時大享明堂合祭天地並侑祖宗遍禮百神聖訓有禮緣人情之語而文彥博以仁祖為能逹禮之情適禮之變由此觀之皇祐祀典本非為萬世不易之禮也國朝配祀初無定制自英宗皇帝始専配以近考司馬光吕誨爭之以為絀祖進父然卒不能奪王圭孫抃之諂辭其後神宗皇帝謂周公宗祀在成王之時成王以文王為祖則明堂非以考配明矣王安石亦以誤引孝經嚴父之文惜乎不能將順上意以辨正典禮謹按聖宋崛起非有始封之祖則創業之君太祖是也太祖則周之后稷配祭於郊者也太宗則周之文王配祭於明堂者也此二祭者萬世不遷之法皇祐宗祀合祭天地固宜以太祖太宗配當時蓋拘於嚴父故配帝并及於真宗今主上紹膺大統自真宗至於神宗均為祖廟獨躋則患在於無名並配則幾同於祫享又從祀百神在於明堂本非典禮或升或黜慢瀆為多今參酌皇祐詔書將來請合祭昊天上帝皇地祗於明堂奉太祖太宗以配天惟禮専而事簡庶幾可以致力於神明然後申飭攸司各揚乃職犧牲必成粢盛必潔衣服必備以盡其所以致力於神之意則一朝大典豈特施於艱難之時情文粗稱雖萬世行之可也是時太常少卿蘇遲等則請用皇祐詔書之意兼采景祐禮官之請即常御殿南向西上設昊天上帝皇地祗位西向北上設太祖太宗真宗神位於殿之東廡設圓丘第一龕九位於殿之西廡設方澤第一成一十六位庶幾誠意可展儀物可備如以不遍及列聖為未足則大禮前一日有親誼太廟之文今神主在溫州恐當命大臣於某處攝行祀事如以不遍及百神為未足則請即行在天慶觀之大享後擇一日取祖宗大禮既畢恭謝之文亦命大臣簡其儀物悉舉以告亦足以盡祈報之心詔依禮部新儀一遵皇祐二年詔書仍以明堂大禮為稱於常御殿設位行禮禮部言凖詔參酌皇祐詔書合祭天地於明堂奉太祖太宗以配合用神位四位元係御筆明金青字出雕木縷金五綵裝蓮花戲龍座黃紗明金罩子黃羅夾軟罩子黃羅襯褥朱紅漆腰􅐝套匣黃羅夾帕事件全昨緣揚州渡江失去乞下所屬制造從之四年九月有事於明堂合祭天地以太祖太宗配兼祀百神先時有司請議郊祀明堂祫享之宜禮部侍郎陳與義議曰臣切考國家大祀天子躬行者有南郊有明堂有祫祭有恭謝古者為郊之制在國之南五十里蓋謂國都之南也陛下駐蹕於此非建都之地置設壇壝固無其所建炎戊申舉是禮於維揚者是時以火德嗣興大統復集即位之初不可以不見帝以禮從權非必襲用而況鹵簿儀物渡江散盡疆陲戎事嵗晚多虞則南郊之禮在今日固不敢輕議者也國步未定之際奉安廟祏權在永嘉既已纍年若欲移徙以便親祠懼失在天神靈之意則祫祭之禮在今日實不可行者也陛下躬履多虞嚴恭寅畏方與萬姓請命於天用實而去文有祈而無報則恭謝之禮在今日不可行者也搢紳儒生又有為柴望之説者以謂雖祖宗未之或行而今日可以肇修臣嘗考之其説本於書之堯典本為巡狩之用而周室行之於時邁告祭之詩其説詳於孔頴逹之疏指為封禪之事而漢光武用之著於泰山刻石之文陛下遭時艱故遵養東南修政理戎俟天悔禍舉兹大禮惟務於忱豈可托巡狩告至以有辭乎又況柴望之祭不及祖宗所用時日亦當有據若一切損益之則安用柴望之名哉然則柴望之禮在今日亦不可行者也臣竊惟明堂之禮有漢武帝汶上之制紹興元年實已行之若再舉而行適宜於今事無戾於古典或謂自維揚南郊之後至於今日再遇當郊之嵗不可以踰六年而不郊以臣考之郊之疏數本無定制真宗自景德二年祀南郊至祥符七年而始祀東郊則九年而後再郊矣仁宗皇帝皇祐五年祀南郊嘉祐元年行恭謝禮四年行祫祭禮七年行明堂禮則踰九年而不再郊矣踰六年而不郊非所疑也或以周公嚴父之文為疑則既有治平中司馬光吕誨之議又有熙寧中祖宗之聖訓與王安石之説足以破萬世之惑矣或以並配之禮為疑蓋紹興元年禮官之議以謂皇祐之時四方無虞萬物盛多是以明堂合祭天地並配祖宗蓋其説不盡不能推明所以變禮之意是以致衆人之疑謹按皇祐詔書其略曰國朝自祖宗以來三嵗一郊今祀明堂正當三嵗親郊之期而禮官所定配坐不及祖宗宜並配以稱朕恭事祖宗之意蓋太祖則周之后稷當配祭於郊者也太宗則周之文王當配祭於明當者也郊當祭太祖而以當郊之嵗舉明堂之禮則不可以遺太祖而不祭稽之神理本之人情則皇祐詔書之本意可以為萬世不刋之典豈特以四方無虞萬物盛多而舉此哉並配之禮又非所疑也若乃神位儀物損益多寡之數更合再加斟酌以盡今日情文之宜詔從之蓋中興郊祀明堂合祭天地並配祖宗之禮參考推明至與義之議而始定於是太常寺條具乞以明堂大禮為稱左僕射誓行事執事陪祠官於尚書省刑部尚書蒞誓明堂殿上下徹去黃道禋褥入殿門不張蓋百官不得回班御燎從物繖扇更不入殿行禮前衛士不起居呼萬嵗讀册官讀册至御名勿興詔並從之國子監丞王普言大禮明堂有未合典禮之事正配每位設太樽三著樽三犧樽象樽壺樽山樽各一又設罍如樽之數太樽一實供內法酒一實泛濟一實醴齊著樽一實祠祭法酒一實盎齊犧樽實緹齊象樽實沈齊壺樽實昔酒山樽實事酒太罍一實清酒餘皆實明水謹按周禮春祠夏禴用兩犧樽兩象樽秋嘗冬蒸用兩著樽兩壺樽四時之間祀用兩太樽兩山樽又曰凡祭祀供五齊三酒以實八尊然則六尊之數凡十有二其當時所用者四其設而不酌者八明堂乃季秋大享則初獻當用兩著樽一實元酒一實醴齊亞終獻當用兩壺樽一實元酒一實盎齊皆有罍如樽之實又設兩太樽兩山樽兩犧樽兩象樽實五齊三酒而不酌罍亦如之今祭祀所用惟九樽而首設太樽者三以供內法酒及泛齊醴齊實之又設著樽者二以祠祭法酒及盎齊實之又設犧樽象樽壺樽山樽各以緹齊沈齊事酒昔酒實之尊之數不足以盡五齊三酒也又設太罍以清酒實之元酒不與齊酒對設也則又為八罍以實之且在三酒之後焉蓋不論所設之適與所陳之義但取遍於樽罍之數而已實無經據也宜倣司樽彜秋嘗之制設兩著樽一實元酒一實醴齊以俟初獻又設兩壺樽一實元酒一實盎齊以俟亞獻終獻其餘八尊以實五齊三酒設而不酌悉如周官之制其醴齊請以祠祭法酒代之其盎齊請以供內法酒代之增三樽為十二之數庶與周官相應又言按祭器實倣聶崇義三禮圖制度如爵為爵形負盞於背則不可以反坫簠簋如桶其上為龜則不可以郤蓋此類甚多蓋出於臆度而未嘗親見古器也自劉敞著先秦古器記歐陽修著集古録李公麟著古器圖吕大臨著考古圖乃親得三代之器驗其款識可以為據政和新成禮器制度皆出於此其用銅者嘗有詔許外州以漆木為之至主上受命於應天郊祀於維揚皆用新成禮器初未嘗廢止緣渡江散失無有存者昨來明堂所用乃有司率意略倣崇義三禮圖其制非是宜並從古器制度為定其簠簋樽罍之屬仍以漆木代銅庶幾易得成就紹興七年詔大享明堂時徽宗升遐上躬行三年之喪禮部太常寺言景德熙豐南郊故事皆在諒暗中當時親郊行禮除郊廟景靈宫合用樂外所有鹵簿鼓吹及樓前宫架諸軍音樂皆備而不作其逐處警揚止鳴金鉦鼓角乞依纍朝故事行太常博士孫邦乞自受誓戒日皇帝暨百僚禁衛等權易吉服至禮成還內仍舊中書舍人傅嵩卿援嚴父之文欲升徽宗配享詔令侍從臺諫禮官同議禮部侍郎陳公輔言陛下方居道君皇帝之喪而道君皇帝神靈方在几筵豈可遽預配祭之禮况梓宫未還祔廟未有定議臣愚以為當先期一日陛下盡哀致奠奏於道君皇帝以將有事明堂暫離几筵暫假吉服蓋國家故事不敢廢也然後即齋宫入太廟行明堂事事畢服喪如初斯謂合禮吏部尚書孫近等議引司馬光之説曰漢以髙祖配天後漢以光武配明堂古之帝王自非建邦啓土造有區夏者皆無配天之文雖周之成康漢之文景明章德業非不美也然子孫不敢推以配天者避祖宗也近世祀明堂者皆以其父配此乃誤認孝經之意而違先王之禮不可以為法況梓宫未還几筵未除山陵未下而遽議配侑之事乎臣等伏請今年明堂大禮權依紹興元年詔書請俟削平僣亂恢復大業然後定郊祀明堂之議一從成周庶不失禮經之正詔從之三十一年九月辛未大享明堂罷合祭奉徽宗配祀祀五天帝五人帝於堂上五官神於東廂罷從祀諸神位用熙寧禮也禮部太常寺言明堂大禮車輅鹵簿法駕儀仗理合預行討論欲依政和五禮新儀宗祀上帝有司陳法駕鹵簿車駕自太廟乘玉輅詣文德殿皇祐明堂記大駕宇圖用萬有八千二百五十六人大中祥符元年法駕用萬有六百六十一人較之昨禮令三分減一為率禮官所定凡萬有一千八十八人昨紹興二十五年至二十八年郊祀大禮大駕鹵簿捧日奉宸隊等共一萬五千二百二十二人今討論明堂大禮乞依紹興二十八年例三分減一用一萬一百四十人從之文獻通考卷七十四
