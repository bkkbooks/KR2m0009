body:
  text: 文獻通考卷二十八鄱陽馬端臨貴與著選舉考一舉士周官大司徒以鄉三物教萬民而賔興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數物猶事也興猶舉也民三事教成鄉大夫舉其賢者能者以飲酒之禮賔客之既則獻其書於王鄉大夫三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之鄭司農云興賢若今舉孝廉興能若今舉茂材厥明鄉老及鄉大夫羣吏獻賢能之書於王王再拜受之登於天府內史二之天府掌祖廟之寶藏者內史副寫其書者當詔王爵祿之時退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞當射之時民必觀焉因詢之也此謂使民興賢出使長之使民興能入使治之王制命鄉論秀士升之司徒曰選士詳見學校考州長各掌其州之教治政令之法正月之吉各屬其州之民而讀法以考其德行道藝而勸之以糾其過惡而戒之若以歲時祀祭州社則屬其民讀法亦如之三年大比則大考州里以贊鄉大夫廢興黨正各掌其黨之政令教治及四時之孟月吉日則屬民而讀邦法以糾戒之以四孟月朔日讀法者彌親民者於教亦彌數春秋祭禜亦如之正嵗屬民讀法而書其德行道藝以嵗時涖校比及大比亦如之族師各掌其族之戒令政事月吉則屬民而讀邦法書其孝悌睦姻有學者閭胥各掌其閭之徵令凡春秋之祭祀役政喪紀之數聚衆庶既比則讀法書其敬敏任恤者禮書曰閭胥聚民無常時族師屬民有常月族師嵗屬以月吉與春秋黨正嵗屬以孟吉與正歲州長嵗屬以正月之吉與春秋然後鄉大夫三年大比之以卑者其職煩尊者其事簡也由黨正而下有所讀有所書州長則有所讀無所書而有所考鄉大夫則考而興之無所讀敬敏任恤易知者也故閭師書之孝悌睦姻有學難知者也故族師書之德行則非特孝悌也道藝則非特有學也故黨正書之書之者易考之興之者難故書之止於黨正考之在州長興之在鄉大夫以卑者其責輕尊者其任重也凡此皆教之有其術飬之有其漸方其在學也一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達強立而不反謂之大成此中年考校之法也大胥掌學士之版春合舞秋合聲於其合聲則頒次其所學而辨異之諸子掌國子之倅春合諸學秋合諸射以考其藝而進退之比年考校之法也學之考校如此鄉之考察又如彼所掌非一人所積非一日此人人所以莫不激昻奮勵以趨上之所造也遂大夫各掌其遂之政令三嵗大比則率其吏而興氓眀其有功者屬其地治者興氓舉民賢能如六鄉之所為也屬猶聚也又因舉吏治有功者而聚敕其餘以治職事按六鄉之外為六遂遂大夫之職猶鄉大夫之職也州長以下之職猶縣正以下之職也然勵教化興賢能之事鄉詳而遂略先儒謂鄉以教為主遂以耕為主豈遂民不可教而鄉民不可耕邪蓋亦當互文以推之國語齊桓公內政之法正月之朝鄉長復事君親問焉曰於子之鄉有居處好學慈孝於父母聰慧賢仁發聞於鄉里者有則以告有而不以告謂之蔽明其罪五有司已於事而竣竣音悛退伏也公又問焉曰於子之鄉有拳勇股肱之力秀出於衆者有則以告有而不以告謂之蔽賢其罪五有司已於事而竣公又問焉曰於子之鄉有不慈孝於父母不長弟於鄉里驕躁淫暴不用上令者有則以告有而不以告謂之下比其罪五有司已於事而竣是故鄉長退而修德進賢公親見之遂使役官及五屬大夫復事公問之如初五屬大夫於是退而修屬屬退而修縣縣退而修鄉鄉退而修卒卒退而修邑邑退而修家是故匹夫有善可得而舉也匹夫有不善可得而誅也因讀國語此章而參以王制所言司徒俊選之事然後知古之聖賢其於化民成俗選賢與能二事視其賢愚升沉舉切吾身故其為法甚備其教人也不特上賢以崇德而必欲簡不肖以絀惡其舉人也不特進賢受上賞而必欲蔽賢蒙顯戮蓋賞罰相胥而行則始不視為具文後世非不立學校也而未聞有不帥教之罰蓋姑選其能者而無能之人則聽其自為不肖而已非不興選舉也而未聞有蔽賢之戮蓋姑進其用者而未用之人則聽其自為不遇而已其教之也不備其選之也不精宜人才之所以日衰也雖然惟其教訓之法不備所以選舉之塗不精士生斯世蓋自為材而未嘗有所賴於上之人則所謂焉知賢才而舉之何以識其不才而舍之而蔽賢之罰亦無所施矣漢髙祖十一年詔曰蓋聞王者莫髙於周文伯者莫髙於齊桓皆待賢人而成名今天下賢者智能豈特古之人乎患在人主不交故也士奚由進今吾以天之靈賢士大夫定有天下以為一家欲其長久世世奉宗廟亡絶也賢人既與我共平之矣而不與吾共安利之可乎賢士大夫有肯從我遊者吾能尊顯之布告天下使眀知朕意御史大夫昌下相國相國酇侯下諸侯王御史中執法下郡守其有意稱明德者必身勸為之駕有賢者郡守身自往勸勉令至京師駕車遣之遣詣相國府署行義年行狀年紀也有而弗言覺免年老癃病勿遣文帝十五年詔諸侯王公卿郡守舉賢良能直言極諫者詳見賢良方正考孝武元光元年冬初令郡國舉孝廉各一人元朔五年制詔補博士弟子郡國縣官有好文學敬長上肅政教順鄉里出入不悖所聞令相長丞上屬所二千石二千石謹察可者令與計偕詣太常得受業如弟子按漢制郡國舉士其目大槩有三曰賢良方正也孝廉也博士弟子也然是三者在後世則各自為科目其與鄉舉里選又自殊塗矣故姑載其立法之始略見於此而其詳各見本考元光五年徵吏民有明當世之務習先聖之術者縣次續食令與計偕計者上計簿使也郡國每歲遣詣京師上之偕者俱也令所徵之人與計者偕來而縣次給之食也先時董仲舒對䇿曰臣愚以為使列侯郡守二千石各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也後遂令州郡舉茂材孝廉皆自仲舒發之元朔元年詔曰公卿大夫所使總方略一統類廣教化美風俗也夫本仁祖義褒德祿賢勸善刑暴五帝三王所由昌也朕夙興夜寐嘉與宇內之士臻於斯路故旅耆老復孝敬選豪俊講文學稽參政事祈進民心深詔執事興廉舉孝庶幾成風紹休聖緒夫十室之邑必有忠信三人並行必有我師今或闔郡不薦一人是化不下究而積行之君子壅於上聞也二千石官長紀綱人倫將何以佐朕燭幽隱勸元元厲蒸庶崇鄉黨之訓哉且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪有司奏議曰古者諸侯貢士一適謂之好德適得其人再適謂之賢賢三適謂之有功乃加九錫不貢士一則黜爵再則黜地三則黜爵地畢矣夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不能進賢者退此所以勸善黜惡也今詔書昭先帝聖緒令二千石舉孝廉所以化元元移風易俗也不舉孝不奉詔當以不敬論不察廉不勝任也當免奏可按齊桓公內政之法與漢髙皇孝武二詔俱為舉賢設也觀其辭旨皆以為人才之遺佚咎在公卿之蔽賢至立法以論其罪後來之法嚴繆舉之罰而限其塗轍者有之矣未有嚴不舉之罰而責以薦揚者也蓋古之稱賢能者皆不求聞逹之士而後世之干薦舉者皆巧於奔競之人故法之相反如此國家待士之意固薄而士之不自重深可慨也制郡國口二十萬以上歲察一人四十萬以上二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二歲一人不滿十萬三嵗一人限以四科一曰德行髙妙志節清白二曰學通行修經中博士三曰眀習法令足以決疑能按章覆問文中御史四曰剛毅多略遭事不惑眀足決斷材任三輔縣令孝昭元始五年詔舉郡國文學髙第各一人元鳳元年賜郡國所選有行義者涿郡韓福等五人帛人五十匹遣歸孝宣本始元年地震詔內郡國舉文學髙第各一人地節三年詔令郡國舉孝悌有行義聞於鄉里者各一人元康元年詔博舉吏民厥身修正通文學明於先王之術宣究其意者各二人中二千石各一人元康四年詔遣大中大夫循行天下舉茂材異倫之士孝元初元三年詔丞相御史舉天下明隂陽災異者各三人建昭四年臨遣諌大夫博士循行天下舉茂材特立之士孝成河平四年日食遣光祿大夫博士行瀕河之郡舉淳厚有行能直言之士陽朔二年奉使者不稱詔丞相御史其與中二千石二千石雜舉可充博士位者使卓然可觀鴻嘉二年詔舉淳厚有行義能直言者冀聞切言嘉謀正朕之不逮永始二年日食臨遣大中大夫循行天下與部刺史舉淳朴遜讓有行義者各一人元延元年詔以日食星隕北邊二十二郡舉勇猛知兵法者各一人哀帝建平元年詔大司馬列侯將軍中二千石州牧守相舉孝悌淳厚能直言通政事延於側陋可親民者各一人四年詔將軍中二千石舉明兵法有大慮者孝平元始元年以日食詔公卿將軍中二千石舉淳厚能直言者各一人二年詔舉武勇有節眀兵法郡一人詣公車冬詔中二千石舉治獄平嵗一人五年召天下通知逸經古記天文歷算鐘律小學史篇方術本草及以五經論語孝經爾雅教授者在所為駕一封軺傳遣詣京師至者數千人東漢之制選舉於郡國屬功曹於公府屬東西曹於天臺屬吏曹尚書亦曰選部凡郡國守相視事未滿嵗不得察舉孝廉以其未久不周知也東漢舉士多以孝廉詳見本考建武六年詔舉賢良方正各一人以後並見本考建武十二年詔三公舉茂材各一人光祿勳嵗舉茂材四行各一人監察御史司𨽻州牧嵗舉茂材一人四行謂淳厚質朴謙遜節儉也章帝時所徴舉率皆特拜不復簡試士或矯飾謗議漸生乃詔曰夫鄉舉里選必纍功勞今刺史守相不明真偽茂材孝廉嵗以百數既非能著而當授之政事甚無謂也餘見孝廉考時陳事者多言郡國貢舉率非功次故守職益懈而吏事寖疏咎在州郡有詔下公卿朝臣議大鴻臚韋彪上議曰夫國以簡賢為務賢以孝行為首孔子曰事親孝故忠可移於君夫人才行少能相兼孟公綽優於趙魏老而不可以為滕薛大夫忠孝之人持心近厚煆鍊之吏持心近薄三代所以直道而行者在其所以磨之故也士宜以才行為先不可純以閥閲然其要在於選二千石二千石賢則貢舉皆得其人矣帝深納之元和二年令郡國上明經者口十萬以上五人不滿十萬三人安帝建光元年令公卿特進中二千石二千石郡國守相舉有道之士各一人元初元年詔三公特進列侯中二千石二千石郡守舉淳厚質直各一人陳忠上疏曰嘉謀異策宜輒納用若有道之士對問髙者宜垂省覽以廣直言之路書御有詔拜有道髙第士沛國施延為侍中永初二年詔曰間者公卿郡國舉賢良方正遠求博選開不諱之路冀得至謀以鑒不逮而所對皆循尚浮言無卓爾異聞其有百僚及郡國吏人有道術明習災異隂陽之度璇璣之數者各使指變以聞二千石長吏眀以詔書博衍幽隱朕將親覽待以不次順帝陽嘉元年除郡國耆儒十九人補郎舍人二年又除京師耆儒年六十以上四十八人補郎舍人及諸王國郎沖帝永嘉元年尚書令左雄議改察舉之法限年四十以上儒者試經學文吏試章奏胡廣駮之詔從雄議詳見孝廉門先公曰公府三公府也端門太微垣左右執法所舍即御史府猶近世御史臺覆試進士之法也試之公府而覆之端門此所以牧守不敢輕舉而察選清平也是法也胡廣首駮其非帝不從既行而廣出為濟隂太守首坐繆舉之罰蓋公正之法庸回者之所不便也左伯豪在當世風節剛徑舉雄者虞詡也雄所舉者周舉也觀舉雄者與雄所舉者雄之為人可知矣得雄之為人雄之為法可知矣范史推其效驗至於傾而未顚決而未潰皆仁人君子心力之所為而陳蕃李膺之徒皆在雄法中所得之人其坐繆舉者胡廣輩爾靈帝建寧元年詔郡國守相舉有道之士各一人范曄論曰漢初詔舉賢良方正州郡察孝廉秀才斯亦貢士之方也中興以後復增淳朴有道賢能直言獨行髙節質直清白淳厚之屬榮路既廣觖望難裁自是竊名偽服寖以流競權門貴仕請謁繁興自左雄任事限年試才雖頗有不密固亦因識時宜而黃瓊胡廣張衡崔瑗之徒泥滯舊方互相詭駮循名者屈其短算實者挺其效故雄在尚書天下莫敢妄選十餘年間稱為得人斯亦效實之證乎順帝始以童弱反政而號令自出知能任使故士得用情天下喁喁仰其風采遂乃備元纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問得失急登賢之舉虛降已之禮於是處士鄙生忘其拘儒拂巾衽褐以企旌車之招矣至乃英能承風俊乂咸事若李固周舉之淵謨𢎞深左雄黃瓊之政事正固桓焉楊厚以儒學進崔瑗馬融以文章顯吳祐蘇章种皓欒巴牧民之良幹龎參虞詡將帥之宏規王龔張皓虛心以推士張綱杜喬直道以糾違郎顗隂陽詳密張衡機術特妙東京之士於兹盛焉向使廟堂納其髙謀疆場宣其智力帷幄容其謇辭舉措稟其成式則武宣之軌豈其逺而詩云靡不有初鮮克有終可為恨哉逮孝桓之時碩德繼興陳蕃楊秉處稱賢宰皇甫張段出號名將王暢李膺彌縫衮闕朱穆劉陶獻替匡時郭有道奬鑒人倫陳仲弓𢎞道下邑其餘宏儒逺智髙心潔行激揚風流者不可勝言而斯道莫振文武陵墜在朝者以正議嬰戮謝事者以黨錮致災往車雖折而來軫方遒所以傾而未顚決而未潰豈非仁人君子心力之為乎魏文帝時三方鼎立士流播遷四民錯雜詳覆無所延康元年尚書陳羣以為天朝選用不盡人才乃立九品官人之法州郡皆置中正以定其選擇州郡之賢有識鑒者為之區别人物第其髙下又制郡口十萬以上嵗察一人其有秀異不拘户口其武官之選俾護軍主之州郡縣俱置大小中正各取本處人在諸府公卿及臺省郎吏有德充才盛者為之區别所管人物定為九等其有言行修著則升進之或以五升四以六升五倘或道義虧缺則降下之或自五退六自六退七矣是以吏部不能審定核天下人才士庶故委中正銓第等級憑之授受謂免乖失及法弊也唯能知其閥閲非復辨其賢愚所以劉毅云下品無髙門上品無寒士南朝至於梁陳北朝至於周隋選舉之法雖互相損益而九品及中正至開皇中方罷黃初三年詔曰今之計考古之貢士也十室之邑必有忠信若限年然後取士是吕尚周晉不顯於前世也其令郡國所選勿拘老幼儒通經術吏達文法到皆試用有司糾故不以實者齊王嘉平初曹爽既誅司馬宣王秉政詳求理本中護軍夏侯元言曰夫官才用人國之柄也故銓衡專於臺閣上之分也孝行考乎閭巷優劣任之鄉人下之敘也夫欲清教審選在明其分敘不使相涉而已今令中正但考行倫輩輩當行均斯可官矣行有大小比有髙下則所任之次渙然别矣奚必使中正干銓衡之機於下而執機柄者有所委仗於上上下交侵以生紛錯哉且衆職之屬各有官長但使官長各以其屬能否獻之臺閣則據官長能否之第參以鄉閭德行之次擬其倫比勿使偏頗中正則唯考行迹别其髙下審定輩類勿使升降而總之於臺閣官長所第中正所輩擬比隨次率而用之如其不稱責負在外則內外相參得失有所庶可靜風俗而審官才矣兼請除重設之官定服制之等宣王辭不能改請俟於他賢晉武帝泰始五年詔州郡舉勇猛秀異之才散騎常侍傅玄皇甫陶以為政教頽敝風俗不淳上疏曰近者魏武好法術而天下貴刑名魏文慕通逹而天下賤守節其後綱維不攝而虛無放誕之論盈於朝野使天下無復清議而亡秦之病復發於今陛下聖德化鄰唐虞唯未舉清逺有禮之臣以敦風節未退虛鄙以懲不恪也帝乃使元草詔進之元奏曰臣聞先王分士農工商以經國制事各一其業而殊其務自士以上子弟則為之立太學以教之選明師以訓之隨才優劣以之授用農以豐其食工以足其器商賈以通其貨故雖天下之大兆庶之衆而無遊人在其間漢魏不定其分百官子弟不修經藝而務交遊未知蒞事而坐享天祿農工之業多廢或逐淫利而離其事徒繫名於太學然不聞先王之風今聖政滋始而漢魏之失未改散官衆而學校未設遊手多而親農者少工器不盡其宜臣以為宜亟定其制前皇甫陶上事欲令賜拜散官皆課使親耕天下享足食之利禹稷躬稼祚崇後代是以明堂月令著帝籍之制伊尹古之名臣耕於有莘晏嬰齊之大夫避莊公之難亦耕於海濵昔者聖帝明王賢佐俊士皆嘗從事於耕農矣王人賜官冗散無事者不督使學則當使耕無緣放之使坐食百姓也今文武之官既衆而賜拜不在職者又多加服役為兵不得耕稼當農者之半南面食祿者叁倍於前使冗散之官為農收其租稅家得其實而天下之榖可以無乏矣虞書曰三載考績三考黜陟幽明是為九年之後乃有遷敘也故居官久則念立愼終之化不久則競為一切之政六年之限日月淺近不周黜陟陶之所上義合古制惟陛下裁之武帝甚善而終不能用於時雖風教頽失而無典制然時有清議尚能勸俗陳壽居喪使女奴丸藥積年沉廢郤詵篤孝以假葬違常降品一等其為懲勸如是其後中正任久愛憎由已而九品之法漸弊遂計官資以定品格天下惟以居位者為貴尚書僕射劉毅以九品者始因魏初喪亂是軍中權時之制非經久之典也宜用土斷復古鄉舉里選之法上疏曰夫九品有八損而官才有三難皆興替之所由也人物難知一也愛憎難防二也情偽難明三也今之中正定九品髙下任意榮辱在手操人主威福奪天朝權勢愛惡隨心情偽由已上品無寒門下品無世族公無考校之負私無告訴之忌損政之道一也置州郡者本取州里清議咸所歸服將以鎮異同一言議不謂一人之身了一州之才一人不審遂為坐廢若然雖宣尼之聖莫不有過則可廢何獨責於中人哉使是非之論橫於州里嫌隙之讎結於大臣損政之道二也本立格制謂人倫有序若貫魚成次才德優劣倫輩有首尾也今之中正坐徇其私推貴異之器使在九品之下負載不肖越在成人之首損政之道三也委以一國之重而無賞罰之防使得縱橫無所顧憚諸受枉者抱怨積久獨不蒙天地無私之德長壅蔽於邪人之銓損政之道四也古先政教崇鄉黨之義故得天下之人退而修本今一國之士多者千數或流徙異邦或給事殊方猶不識其面况能盡其才乎而中正知與不知將定品狀必采聲於臺府納毁於流言任已則有不識之弊聽受則有彼此之偏所知以愛憎奪其平所不知者以人事亂其度既無鄉老紀行之議又非朝廷考績之課遂使為官之人棄近求逺背本趨末損政之道五也凡所以立品設狀者求人才而論功報也今於限當報雖職之髙還附卑品無績於官而獲髙敘是為抑功實而崇虛名也損政之道六也凡官不同事人不同能今九品不狀才能之所宜而以九等為例以品取人或非才能之所長以狀取人則為本品之所限若狀得其實猶品狀相妨况不實者乎損政之道七也前九品詔書善惡必書以為褒貶今之九品所下不章其罪所上不列其善廢褒貶之義任愛憎之斷天下之人焉得不懈於德行而鋭於人事乎損政之道八也職名中正實為姦府事名九品而有八損臣以為宜罷中正除九品棄魏氏之弊法立一代之美制按魏晉以來雖立九品中正之法然仕進之門則與兩漢一而已或公府辟召或郡國薦舉或由曹掾積纍而升或由世胄承襲而用大率不外此三四塗轍然諸賢之説多欲廢九品罷中正何也蓋鄉舉里選者採毁譽於衆多之論而九品中正者寄雌黃於一人之口且兩漢如公府辟掾屬州郡選曹僚皆自薦舉而自試用之若非其人則非特纍衡鑑之明抑且失倚毗之助故終不敢十分徇其私心至中正之法行則評論者自是一人擢用者自是一人評論所不許則司擢用者不敢違其言擢用或非其人則司評論者本不任其咎體統脈絡各不相關故徇私之弊無由懲革又必限以九品專以一人其法太拘其意太狹其迹太露故趨勢者不暇舉賢如劉毅所謂上品無寒門下品無世族是也畏禍者不敢疾惡如孫秀為琅琊郡吏求品於清議王戎從弟衍衍將不許戎勸品之及秀得志朝士有怨者皆被害戎衍獨免是也快恩讎者得以自恣如何劭初亡袁粲弔劭子岐岐辭以疾粲曰今年決下婢子品是也又如陳夀遭父喪有疾使婢丸藥客見之鄉里以為貶坐是沉滯纍年謝惠連愛幸會稽郡吏杜德靈及居父憂贈以五言詩十餘首坐廢不豫榮伍尚書僕射殷景仁愛其才乃白文帝言臣小兒時便見此文而論者云是惠連其實非也文帝曰若此便應通之元嘉七年乃始為彭城王義康參軍閻纘父卒繼母不慈纘恭事彌謹而母疾之愈甚乃誣纘盜父時金寶訟於有司遂被清議十餘年纘孝謹不怠母後意解更移中正乃得復品以此三事觀之其法甚嚴然亦太拘蓋人之履行稍虧者一入品目遂永不可以抆拭湔滌則天下無全人矣况中正所品者未必皆當乎固不若採之於無心之鄉評以詢其履行試之以可見之職業而驗其才能一如兩漢之法也東晉元帝制揚州嵗舉二人諸州各一人時以天下喪亂務存慰勉逺方孝秀不復䇿試到即除署既經略粗定乃詔試經有不中科刺史太守免官其後孝秀莫敢應命有送至京師皆以疾辭太興三年尚書孔坦議請普延五嵗許其講習仍詔孝廉申至七年而秀才如故也按孝廉諸科自東漢以來皆有策試之事夫以文墨小技而定其優劣已不足以稱其科名矣今觀東晉之事則應舉者皆不能試之人且以孝廉秀才自名而必遲以五嵗待其講習乃能預於試不亦有靦面目乎然觀惠帝永寧初王接舉秀才報友人書曰今世道交喪將遂剝亂而智識之士鉗口韜筆非榮此行欲極陳所言冀有覺悟會是嵗三王舉義惠帝復阼以國有大慶天下秀才孝廉一皆不試接以為恨然則上下相蒙姑息具文其來久矣宜其皆欲僥幸於不試也宋制丹陽吳郡會稽吳興四郡嵗舉二人餘郡各一人凡州秀才郡孝廉至皆䇿試天子或親臨之及公卿所舉皆屬於吏部序才銓用凡舉得失各有賞罰失者其人加禁錮年月多少隨郡議制文帝元嘉中限年三十而仕孝武即位仕者不拘長幼詳見舉官門齊尚書都令史駱宰議䇿秀才格五問並得為上四三為中二為下一不合與第謝超宗以為片辭折獄寸言挫衆魯史褒貶孔論興替皆無俟繁而後秉裁夫表事之深析理之會豈必委牘方切理道非患對不盡問患以常文弗竒必使一通峻正寧劣五通而常與其俱竒一亦宜採詔從宰議因習宋代限年之制然而鄉舉里選不核才德其所進取以官婚胄籍為先遂令甲族以二十登仕後門以三十試吏故有增年矯貌以圖進者其時士人皆厚結姻援奔馳造請浸以成俗至和帝時梁武帝為丞相上表曰前代選官皆立選簿應在貫魚自有銓次胄籍升降行能臧否或素定懷抱或得之輿論故得簡通賔客無俟掃門頃代陵夷九流乖失其有勇退忘進懷質抱直者選部或以未經朝謁難於進用或有晦善藏聲自埋衡泌者又以名不表著絶其階緒必須書刺投狀然後彈冠則是驅迫廉撝奬成澆競愚謂自今選曹宜精隱核依舊立簿使冠履無爽名實不違庶人識涯涘造請自息且聞中間立格甲族以二十登仕後門以過立試吏求之愚懷抑有未達何者設官分職惟才是務若限嵗登朝必增年就官故貌實幼童籍已踰立滓穢名教於斯為甚乃施行梁初無中正制年二十五方得入仕天監中又制九流常選年未三十不通一經者不得為官若有才同甘顔勿限年次至七年州置州重郡置郡崇鄉置鄉豪各一人專典搜薦無復膏粱寒素之隔普通七年詔凡州嵗舉二人大郡一人敬帝太平二年復令諸州各置中正仍舊放選舉皆須中正押上然後量授不然則否尚書左僕射沈約論曰漢末喪亂魏武始創軍中倉卒權立九品蓋以論人才優劣非謂代族髙卑因此相沿遂為成法自魏至晉莫之能改州都郡正以才品人而舉代人才升降蓋寡徒以憑籍代資用相凌駕都正俗士斟酌時宜品目多少隨事俯仰劉毅所云下品無髙門上品無賤族也嵗月遷訛斯風漸篤凡厥衣冠莫非二品自此已還遂成卑庶周漢之道以智役愚臺𨽻參差用成等級魏晉以來以貴役賤士庶之科較然有辨夫人君南面九重懸絶陪奉朝夕義隔鄉士階闥之任宜有司存武帝天監中約又上疏曰頃自漢代本無士庶之别自非仕宦不至京師罷公卿牧守並還鄉里小人瞻仰以成風俗且庠校棊布傳經授受學優而仕始自鄉邑本於小吏幹佐方至文學功曹積以嵗月乃得察舉人才秀異始為公府所辟遷為牧守入作台司漢之得人於斯為盛今之士人並聚京邑其有守土不遷見謂愚賤且當今士子繁多略以萬計常患官少才多無以處秀才自别是一種任官非若漢代取人之例也假使秀才對五問可稱孝廉答一䇿能過此乃雕蟲小道非關理功得失以此求才徒虛語耳鴻臚卿裴子野又論曰書云貴貴為其近於君也天下無生而貴者是故道義可尊無擇負販茍非其人何取代族周衰禮壞政出臣下卿士大夫自相繼及非夫嗣嫡猶等家臣且徒步匹夫見禮侯伯式閭擁篲無絶於時其後四方豪勢之家門客千數卑身折節比食同袍雖相傾倚亦成風俗迄於二漢尊儒重道朝廷州里學行是先雖名公子孫還齊布衣之士士庶雖分而無華素之隔有晉以來其流稍改草澤髙士猶厠清塗降及季年專稱閥閲自是三公之子傲九棘之家黃散之孫蔑令長之室轉令互爭銖兩所論必門户所議莫賢能茍且之俗成傲慢之禍作非所以敦𢎞退讓厲德興化之道也陳依梁制凡年未三十不得入仕唯經學生䇿試得第諸州迎主簿西曹左奏及嘗為挽郎得未壯而仕詳見舉官門後魏州郡皆有中正掌選舉每以季月與吏部銓擇可否其秀才對䇿第居中上表敘之詳見舉官門韓麒麟子顯宗上言前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀孝之名而無秀孝之實而朝廷但檢其有門地不復彈坐如此則可别貢門地以敘士人何假置秀孝之名或云代無竒才不若取士於門此亦失矣豈可以代無周召便廢宰相而不置哉但當較其寸長銖重者即先敘之則賢才無遺矣正始元年冬乃罷諸郡中正詳見舉官門北齊選舉多沿後魏之制凡州縣皆置中正其課試之法中書䇿秀才集書䇿貢士考功郎中策廉良天子常服乘輿出坐於朝堂中檻秀孝各以班草對字有脫誤者呼起立席後書有濫劣者飲墨水一升文理孟浪者奪席脫容刀周武帝既平齊廣收遺佚乃詔山東諸州舉明經幹理者上縣六人中縣五人下縣四人至宣帝大成元年詔州舉髙才博學為秀才郡舉經明行修者為孝廉上州上郡嵗一人隋文帝開皇七年制諸州嵗貢三人工商不得入仕杜正玄開皇舉秀才試䇿髙第時海內惟正玄一人舉秀才餘常貢者隨例銓注訖正玄獨不得進止曹司以䇿過楊素素怒曰周孔更生尚不得為秀才刺史何忽妄舉此人素志在試退正玄乃手題使擬司馬相如上林賦王褒聖主得賢臣頌班固燕然山銘張載劍閣銘白鸚鵡賦曰我不能為君住宿可至未時令就正玄及時並了素大驚曰誠好秀才其弟正藏亦舉秀才蘇威監選時射䇿甲第者合奏曹司難為别奏抑為甲科正藏訴屈威怒改為丙第正倫亦舉秀才隋世天下舉秀才不十人而正玄一門三秀才按常貢者不分優劣隨例銓注之人也舉秀才者文才傑出對䇿髙第之人也隋雖有秀才之科而上本無求才之意下亦無能應詔之人間有一二則反訝之且嫉之矣楊素苛酷俗吏宜其疾視如此蘇威儒者也亦復沮抑正藏士生斯時何其不幸邪治書侍御史李諤以選才失中上書曰自魏之三祖更尚文詞忽君人之大道好雕蟲之小藝下之從上有同影響競騁浮華遂成風俗江左齊梁其弊彌甚貴賤賢愚唯務吟咏遂復遺理存異尋虛逐微競一韻之竒爭一字之巧連篇纍牘不出月露之形積案盈箱惟是風雲之狀代俗以此相髙朝廷據兹擢士祿利之路既開愛尚之情愈篤於是閭里童昏貴遊總丱未窺六甲先製五言捐本逐末流遍華壤遞相師祖澆漓愈扇及大隋受命聖道聿興是以開皇四年普詔天下公私文翰並宜實録其年九月泗州刺史司馬幼之上表華艷付所司理罪由是公卿大臣咸知正路莫不鑽仰墳索棄絶華綺擇先王之令典行大道於兹代如聞在外州縣仍踵弊風選吏舉人未遵典則至於宗黨稱孝鄉曲歸仁學必典謨交不茍合則擯落私門不加收齒其學不稽古逐俗隨時作輕薄之篇章結朋黨而稱譽則選充吏職舉送天朝蓋由縣令刺史未行風教猶挾私情不存公道臣既忝憲司職當糾察若聞風即劾恐挂網者多請敕諸司普加搜訪有如此者具狀送臺煬帝始建進士科文獻通考卷二十八
