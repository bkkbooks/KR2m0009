body:
  text: 文獻通考卷二百三十三鄱陽馬端臨貴與著經籍考六十集别集李文公集十八卷鼂氏曰唐李翺習之也涼武昭王之後貞元十四年進士調校書郎知制誥會昌初終山南東道節度使翺性峭鯁議論無所屈仕不得顯官怫鬱無所發從韓愈為文詞致渾厚見推當時集皆雜文無歌詩前有蘇舜欽序云唐之文章稱韓柳翺文雖詞不逮韓而理過於柳陳氏曰蜀本分二十卷集中無詩獨有戲贈一篇拙甚非其作也習之為文源委於退之但才氣不能及耳石林葉氏曰李習之文辭髙古幾可追配韓退之然不長於作詩故集中無傳今惟傳燈録載其贈藥山僧一篇云鍊得身形似鶴形千株松下兩函經我來欲問西來意雲在青天水在瓶氣格與其文全不相類韓退之逺遊聫句亦記其一聫云前之詎灼灼此去信悠悠終篇不再見或云退之以其不工却之使不復與也白樂天長慶集七十一卷鼂氏曰唐白居易樂天也唐史云太原人居易詩中自序生於鄭州滎陽貞元十七年進士中拔萃科元和初制策一等調盩厔尉入翰林為學士太和初遷刑部侍郎會昌初以刑部尚書致仕居易於文章精切然最工詩初頗以規諷得失及其多更下偶俗好當時士人爭傳雞林賈國相率篇易一金與元微之酬唱故號元白與劉禹錫齊名號劉白在杭州自類詩藳分諷諭間適感傷雜律四類前集五十卷有元稹序後集二十卷自為序紀又有續後集五卷今亡三卷豫嘗謂樂天進退以義風流髙矣與劉禹錫遊人謂之劉白而不陷入司馬黨中與元稹逰人謂之元白而不陷北司黨中又與楊虞卿為姻家而不陷牛李黨中鳴呼叔世有如斯人之倣佛者乎獨集後載聞李崖州貶三絶句其言淺俗似幸其禍敗者余固疑非樂天之語及以編年書考之崖州貶時樂天歿將踰年或曰浮屠某作也陳氏曰長慶集五十卷元微之為序後集二十卷自為序今又續後集五卷自為記前後七十五卷時會昌五年也墓志乃云集前後七十卷當時預為志時未有續後集今本七十一卷蘇本蜀本編次亦不同又有外集一卷往往皆非樂天自記之舊矣年譜維揚李璜德邵所作樓大防參政得之以遺吳郡守李伯珍諫議刻之余嘗病其疏略抵牾且號為年譜而不繫年乃别為新譜刋附集首白集年譜一卷陳氏曰知忠州漢嘉何友諒以居易舊治既刋其文集又作年譜刋之集首始余為譜既成妹夫王栐叔永守忠録寄之則忠已有此譜視余譜略詳互見亦各有發明其辨李崖州三絶非樂天作及載鼂子止之語謂與楊虞卿為姻家與牛僧孺為師生而不陷牛李黨中與余暗合因並存之詳見新譜末章潁濵蘇氏曰士雖不遇如樂天入為從官以諌諍顯出為牧守以循良稱歸老泉石憂患不及其身而文詞足以名世可以老死而無憾矣又曰樂天每間冷衰病發於咏嘆輒以公卿投荒僇死不獲其終者自解余亦鄙之至其聞文饒謪朱崖三絶句刻核尤甚樂天雖陋蓋不至此蓋樂天之徒淺陋不學者附益之耳詩史沈存中謂樂天詩不必皆好然識趣尚可章子厚謂不然云樂天識趣最淺狹謂詩中言甘露之事幾如幸禍樂天為王涯所讒謫江州司馬其詩謂當君白首同歸日是我青山獨住時雖私讎可快然朝廷當此不幸臣子不當形之歌咏東坡謂樂天豈幸人之禍者蓋悲之也鼂氏法藏碎金曰白氏集中頗有遣懷之作故達道之人率多愛之余友李公維録出其詩名曰養恬集余亦如之名曰助道其辭語出於經教法門用此彌縫其闕而直捷曉悟於人也平園周氏曰香山詩語平易文體清駛疑若信手而成者間觀遺稿則竄定甚多朱子語録曰樂天多説其清髙其實愛官職詩中凡及富貴處都説得口津津地涎出元稹長慶集六十卷外集一卷鼂氏曰唐元稹微之也河南人擢明經書判入等授校書郎元和初舉制科對䇿第一拜左拾遺在江陵與監軍崔潭峻善潭峻以稹歌詩奏御穆宗賞悅除祠部郎中知制誥未幾入翰林為中書舍人承旨學士長慶二年拜同中書門下平章事稹為文長於詩與白居易齊名號元和體往往播樂府穆宗在東宮妃嬪近習皆誦之宫中呼元才子及知制誥變詔書體務純厚明切盛傳一時有長慶集百卷今亡其四十卷又有外集一卷詩五十二篇皆宫體也陳氏曰中興目録止四十八卷又有逸詩二卷稹嘗自彚其詩為十體其末為艷詩暈眉約鬢匹配色澤劇婦人之怪艷者今世所傳李娃鶯鶯夢逰春古決絶句贈雙文示楊瓊諸詩皆不見於六十卷中意館中所謂逸詩者即其艷體者邪稹初與白樂天齊名文章相上下出處亦不相悖晚而欲速比依奄宦得相卒為小人之歸而居易始終全節嗚呼為士者可以監矣戴叔倫述藁十卷外詩一卷書狀一卷鼂氏曰唐戴叔倫幼公也潤州人為人溫雅善舉止中進士第纍遷容管經略使政治稱最德宗賜中和詩世以為榮代還請為道士未幾卒集有馬總序或題曰會録唐史但云師事蕭頴士初不稱其能詩以時人少其詩骨氣綿弱故也符載集十四卷鼂氏曰唐符載字厚之岐襄人幼有宏達之志隱居廬山聚書萬卷不為章句學貞元中李巽江西觀察薦其才授奉禮郎為南昌軍副使繼辟西川韋臯掌書記澤潞郤士美參謀歷協律郎監察御史元和中卒假文昌為墓志附於後集皆雜文末篇有數詩而已集前有崔郡王湘送符處士歸覲序皆云載蜀人以比司馬王掦云張登集六卷鼂氏曰唐張登性剛潔介特始以巾褐就辟歷衛佐廷尉平監察御史貞元中改河南府士曹掾遷殿中侍御史漳州刺史居七年坐公纍受劾吏議侵誣感疾卒權德輿為之序甚詳以公幹景陽比之國史補亦稱登長於小賦氣宏而密間不容髮有織成隱起結綵蹙金之狀其舊集詩賦之外書啓序述志記銘誄合一百二十二篇今存者才六十餘首樊宗師集一卷綘守園池記注一卷陳氏曰唐諌議大夫南陽樊宗師紹述撰韓文公為墓志稱魁紀公三十卷樊子三十卷詩文千餘篇今所存才數篇耳讀之殆不可句有王晟者天聖中為綘倅取其園池記章解而句釋之猶有不盡通者孔子曰辭達而已矣為文而晦澀若此其湮沒弗傳宜哉陳氏曰國史補云元和之後文章則學竒於韓愈學澀於樊宗師退之作樊墓志稱其為文不剽襲觀綘守居園池記誠亦太竒澀矣本朝王晟劉忱皆為之注解如瑶翻碧瀲嵬眼澒耳等語皆前人所未道也歐陽公跋綘守居偶來登覽周四隅異哉樊子怪可吁心欲獨去無古初窮荒探幽入有無一語詰曲百盤紆孰云已出不剽襲句斷欲學盤庚書後山陳氏曰歐陽公謂退之為樊宗師墓志便似樊文其始出於司馬子長子長為長卿傳如其文惟其過之故兼之也皇甫持正集六卷鼂氏曰唐皇甫湜持正也睦州人元和元年進士仕至工部郎中裴度辟東都判官度修福先寺求碑文於白居易湜怒曰近捨湜而逺徴居易請從此辭度謝之湜即酣飲援筆立就度贈車馬繒綵甚厚湜怒曰吾自為顧況集序未嘗許人令碑字三千一字三縑何遇我薄邪度笑曰不羈之才也從而酬之今集雜文三十八篇而已況集序在而碑已亡矣陳氏曰湜輕傲不羈非裴公巨德殆不能容之矣今集才至數十篇碑不復存意其多所亡逸然湜之矜負如此固不茍為人作人亦未必敢求之也容齋洪氏隨筆曰皇甫湜李翺雖為韓門弟子而皆不能詩浯溪石間有湜一詩為元結而作其辭云次山有文章可惋只在碎然長於指敘約潔有餘態心語適相應出句多分外於諸作者間拔戟成一隊中行雖富劇粹美若可蓋子昂感遇佳未若君雅裁退之全而神上與千載對李杜才海翻髙下非可概文於一氣間為物莫與大先王路不荒豈不仰吾輩石屏立衙衙溪口揚素瀨我思何人知徙倚如有待味此詩乃論唐人文章爾風格殊無可採也沈亞之集十卷鼂氏曰唐沈亞之字下賢長安人元和十年進士涇原李彚掌書記為祕書省正字長慶初補樂陽尉四年為福建都團練副使事徐晦後纍遷殿中丞御史內供奉太和三年柏耆宣慰德州取為判官耆罷亞之貶南康尉後終郢州掾亞之以文詞得名狂躁貪冒輔耆為惡故及於貶常遊韓愈門李賀杜牧李商隱俱有擬下賢詩亦當時名輩所稱許云此本之後有景文宋公題字稱得之於端明李學士編次無倫蓋唐本也余頗愛其能造語然其本極舛誤頗正是之且裒其遺闕者數篇及賀牧商隱三詩附於後孟東野集十卷詳見詩集陳氏曰唐溧陽尉武康孟郊東野撰集惟末卷有書二篇贊一篇餘皆詩也郊貞元十二年進士杜牧樊川集二十卷外集一卷鼂氏曰唐杜牧牧之也京兆人太和二年進士復舉制科會昌中以考功郎中知制誥終中書舍人牧善屬文剛直有竒節敢論列大事指陳利病為詩情致豪邁人號小杜以别甫云臨終自為墓志悉焚所為文其甥裴廷翰輯其稿編次其文後序樊川蓋杜氏所居外集皆詩也陳氏曰牧佑之孫在天台録外集詩一篇别見詩集類未知是否牧才髙俊邁不羈其詩豪而艷有氣概非晚唐人所能及也後村劉氏曰杜牧許渾同時然詩各自為體牧於唐律中常寓拗峭以矯時弊渾則不然如荆樹有花兄弟樂橘林無實子孫忙之類律切麗密或過牧而抑揚頓挫不及也二人詩不著姓名亦可辨樊川有續别集三卷十之八九皆渾詩牧佳句自多不必又取他人詩益之若丁卯集割去許多傑作則渾詩無一篇可傳矣牧仕宦不至南海别集乃存南海府罷之作甚可笑李商隱樊南甲集二十卷乙集二十卷又文集八卷鼂氏曰唐李商隱義山也隴西人開成二年進士令狐楚奏為集賢校理楚出汴滑興元皆表幕府嘗補太學博士初為文瑰邁竒古及從楚學儷偶長短而繁縟過之旨意能感人人謂其橫絶前後無儔者今樊南甲乙集皆四六自為序即所謂繁縟者又有古賦及文共三卷辭旨恢譎宋景文序傳中稱詭怪則商隱蓋以此詩五卷清新纎艷故舊史稱其與溫庭筠段成式齊名時號三十六體云陳氏曰商隱令狐楚客後從王茂元鄭亞辟二人皆李德裕所善坐此為令狐綯所憾竟坎壈以終甲乙集皆表章啓牒四六之文既不得志於時歷佐藩府又依盧𢎞正柳仲郢故其所作應用若此之多商隱本為古文令狐楚長於章奏遂以授商隱所作當時以為工以近世四六較之未見其工也談苑商隱為文多檢閲書册左右鱗次號獺祭魚石林葉氏曰唐人學老杜惟李商隱一人而已雖未盡造其妙然精密華麗亦自得其倣佛故國初錢文僖與楊大年劉中山皆傾心師尊以為過老杜一時翕然從之好事者次為西崑集所謂崑體者也至歐陽文忠公始力排之然宋莒公兄弟雖尊老杜終不廢商隱雖王荆公亦與之嘗為蔡天啓言學詩者未可遽學老杜當先學商隱未有不能為商隱而能為老杜者故公詩晚年亦微樂於華巧其所好者然也玉溪生集三卷陳氏曰李商隱自號此集即前卷中賦及雜著也會昌一品集二十卷别集十卷外集四卷鼂氏曰唐李德裕文饒也趙郡人宰相吉甫之子少力於學既冠卓犖有大節不喜與諸生試有司憲宗時以廕補校書郎穆宗初擢翰林學士號令大典皆出其手進中書舍人召兵部尚書中書門下平章事會昌初復秉政平澤潞䇿功拜大尉封衛公大中中貶崖州司户參軍三年卒德裕性孤峭明辨有風采善為文章雖在大位手不去書謀議援古滚滚可喜為武宗所知常以經綸天下為己任時王室幾中興焉一品集鄭亞之為序皆會昌制誥表狀外內册贊碑序文也賦詩四首窮愁志乃崖州所撰姑臧集題假全緯纂上四卷亦制誥第五乃戞黠斯朝貢傳與八詩别集乃裒合古賦平泉詩集外雜著又有古賦一卷載金松等四賦陳氏曰一品集者皆會昌在相位制誥詔册表疏之類也别集詩賦雜著外集則窮愁志也德裕自穆宗時已掌內外制纍踐方鎮遂相文宗平生著述詎止此此外有姑臧集四卷而已其不傳於世者亦多矣窮愁志晚年遷謫後所作凡四十九篇其論精深其辭峻潔猶可見其英偉之氣周秦行紀一篇竒章怨家所為而文饒遂信之爾李衛公備全集五十卷年譜一卷托遺一卷陳氏曰此永嘉集及蜀本三十四卷之外有姑臧集五卷獻替記辨謗略等諸書共十一卷刺鎮江府江隂耿秉直之所輯併考次為年譜托遺姑臧集者兵部員外郎假全緯所集前四卷皆西掖北門制草末卷惟黠戞斯朝貢圗及歌詩數篇其曰姑臧未詳衛公三為浙西出入十年皆治京口故秉直刻其集若永嘉則其事頗異郡故有海神廟本城北隅叢祠元祐中太守范峋夢其神自言姓李唐武宗時宰相南遷以殁寤而意其為德裕訪得其祠遂作新廟且列上其事自是日盛賜廟額開王爵然衛公平生於溫蓋邈乎不相及也殊有不可曉者平泉雜文一卷陳氏曰即别集第九卷第十卷平泉山居所作詩賦記也林藻集一卷陳氏曰唐嶺南節度副使林藻緯乾撰貞元七年進士試珠還合浦賦敘珠去來之意人謂之神助林藴集一卷陳氏曰唐邵州刺史林藴復夢撰藻之弟也見儒學傳藴父披蘇州别駕有子九人世號九牧林氏其族至今衣冠詩禮以藴所為父墓碑考之其八子為刺史司馬其一號處士而披之父為饒陽郡守祖為瀛州刺史蓋亦盛矣孫樵經緯集三卷鼂氏曰唐孫樵字可之大中九年進士廣明初黃巢犯闕赴岐隴授職方員外時詔書曰行在三絶以常侍李騭有曾閔之行前進士司空圗有巢由之風樵有揚馬之風遂輯所著名經緯集陳氏曰其文自為序凡三十五篇蓋其刪擇之餘也東坡嘗曰學韓愈而不至者為皇甫湜學湜而不至者為孫樵陳黯文集三卷鼂氏曰唐四庫書目有綺莊集十卷今所餘止四卷詩三十二啓狀四十四而已惜其散落大半其本乃南唐故物紙墨甚精後題曰升平四年重題印其文云建鄴文房本內密字皆缺其畫而超字不缺蓋吳時所繕寫也其詩如置酒揚州送人皆不凡而樂府格調尤髙然史逸其行事詩中亦有不可考獨啓事內有白韋崔三相公狀白乃敏中崔乃元式韋乃琮也三人同相於宣宗初載其末云限守藩服則知綺莊時已任刺史矣李甘文集一卷陳氏曰唐侍御史李甘和鼎撰甘欲壞鄭注麻坐貶死杜牧所為賦詩者也薛逢四六集一卷陳氏曰唐祕書監河東薛逢陶臣撰鄭畋集五卷鼂氏曰唐鄭畋台文也滎陽人會昌元年進士書判入等授校書郎調渭南尉知制誥中書舍人乾符四年以本官同中書門下平章事二年召復秉政至成都以疾不拜終太子少保藳草皆乾符堂判敕語云又名敕語唐判集凡一卷陳陶集二卷鼂氏曰唐陳陶嵩伯也鄱陽人大中時隱洪州西山自號三教布衣云江南野史有傳皮日休文藪十卷鼂氏曰唐皮日休字襲美一字逸少襄陽人隱鹿門山自號醉吟先生以文章自負尤善針銘咸通八年登進士第為著作佐郎太常博士乾符喪亂東出關為毗陵副使陷巢賊中賊遣為讖文疑其譏已遂害之集乃咸通丙戍年居州里所編自序云發篋次類文藁繁如藪澤因以名之凡二百篇陳氏曰黃巢之難日休陷賊中為果頭三屈律之讖賊疑譏已髮拳遂見害陸遊筆記以皮光業碑辨其不然陸龜蒙笠澤叢書四卷鼂氏曰唐陸龜蒙魯望也蘇州人少髙放通六經大義尤明春秋舉進士一不中從張搏為蘇湖從事居松江甫里以文章自怡少工歌詩其體裁不一卒造乎平淡而已自號江湖散人或號甫里先生皆為之傅新史多取之而獨不云工歌詩笠澤者松江地名也其集自序云自乾符六年春卧病笠澤時亦隱几著書詩賦銘記往往雜發混而録之故曰叢書今按其集歌詩為多又比他文最工新史踈漏如此陳氏曰叢書為甲乙丙丁詩文雜編政和中朱衮刋之吳江末有四賦用蜀本增入蜀本七卷郫人樊開所序龜蒙自號天隨子甫里先生江湖散人與皮日休善有松陵唱和集皆不在文藪叢書中文泉子十卷陳氏曰唐中書舍人長沙劉蛻復愚撰自為序云覃以九流之旨配以不竭之義曰泉有文塜銘甚竒蛻大中四年進士其為西掖在咸通時司空圗一鳴集三十卷鼂氏曰唐司空圗表聖也河中人咸通十一年王凝下及第黃巢陷長安僖宗次鳳翔召拜知制誥中書舍人朱溫將篡召為禮部尚書不赴聞哀帝遇弒不食而卒圗居中條山自號知非子耐辱居士集自為序以濯纓亭一鳴窗名其集子荷别為集後記最長於詩其論詩有曰梅止於酸而鹽止於鹹味常在於酸鹹之外謂其詩棋聲花院靜幡影石壇髙之句為得之人以其言為然陳氏曰圗見卓行傳唐末髙人勝士也蜀本但有雜著無詩自有詩十卷别行詩格尤非晚唐諸子所可望其論詩酸鹹之喻東坡以為名言容齊洪氏隨筆曰東坡稱司空表聖詩文髙雅有承平之遺風蓋嘗自列其詩之有得於文字之表者二十四韻恨當時不識其妙又云表聖論其詩以為得味外味如緑樹連村暗黃花入夢稀此句最善又棋聲花院靜幡影石壇髙吾嘗獨入白鶴觀松隂滿地不見一人惟聞棋聲然後知此句之工但恨其寒儉有僧態豫讀表聖一鳴集有與李生論詩一書乃正坡公所言者其餘五言句云人家寒食月花影午時天雨微吟足思花落夢無憀坡暖冬生笋松涼夏健人川明虹照雨樹密鳥衝人夜短猿悲減風和鵲喜靈馬色經寒慘雕聲帶晚飢客來當意愜花發遇歌成七言句云孤嶼池䀶春漲滿小欄花韻午晴初五更惆悵回孤枕猶自殘燈照落花皆可稱也程晏集一卷鼂氏曰唐程晏字晏然乾寧二年進士集皆雜文孫郃文纂一卷鼂氏曰唐孫郃字希韓四明人乾寧四年進士好荀揚孟之書纂韓愈為校書郎河南府文學舊四十卷朱朴致理書十卷鼂氏曰唐朱朴也襄陽人以三史舉為荆門令乾寧中方士許巖士得幸禁中言朴有經濟才帝幸石門召對即拜諌議大夫平章事羅隱甲乙集十卷讒書五卷鼂氏曰杭越羅隱字昭諫餘杭人唐乾符中舉進士不第從事諸鎮皆無合久之而歸錢鏐辟掌書記歷節度判官副使奏授司勳郎中梁祖以諫議大夫召不行魏博羅紹威推為叔父表薦給事中卒隱少聰敏作詩著文以譏刺為主自號江東生其集皆自為序又有吳越掌記集一卷隱掌錢鏐記室所著表啓也陳氏曰甲乙集皆詩後集五卷有律賦數首湘南集者長沙幕中應用之文也隱又有淮海寓言讒書等求之未獲沈顔贅書十卷鼂氏曰偽吳沈顔字可鑄傳師之孫天復初進士為校書郎屬亂離奔湖南辟巡官吳國建為淮南巡官禮儀使兵部郎中知制誥翰林學士順義中卒顔少有詞藻琴棋皆臻妙場中語曰下水船言為文敏速無不載也性間淡不樂世利嘗疾當時文章浮靡倣古著書百篇取元次山聱叟之説附己志而名書其自序云自孟軻以後千餘年經百千儒者咸未有聞焉天厭其極付在鄙子其誇誕如此陳氏曰顔傳師之孫其文骫骳而自序之語極其矜負鳳䇿聫華三卷陳氏曰唐虞部郎中淮南從事秋甫顧雲垂象撰多以擬古為題蓋行卷之文也雲咸通十五年進士李後主集十卷鼂氏曰偽唐主李煜重光也少聰悟喜讀書屬文工書畫知音律建隆三年嗣偽位開寶八年王師克金陵封違命侯太平興國三年終隴西郡公贈吳王江鄰幾雜志云為秦王廷美所毒而卒韓熙載文集五卷鼂氏曰偽唐韓熙載字叔言北海人後唐同光中進士南奔江淮李忭建國用為祕書郎使與其子璟遊璟嗣位為虞部員外史館修撰兼太常博士知制誥頃之請誅陳覺黜和州司馬復召中書舍人纍遷兵部尚書第宅華侈妓樂四十餘人不加檢束時人比徐之才璟屢欲倚以為相用是不果後左授右庶子分司乃盡斥羣妓單車引道留為祕書監俄復位已而其去妓皆還熙載天才俊敏工𨽻書及畫聲名冠一時自朱元叛後煜猶疑北人多因事誅之熙載愈益淫縱然喜延譽後進如舒雅等後多知名諡曰文孫晟文集三卷鼂氏曰南唐孫晟字鳳密州人好學有文辭尤長於詩少為道士常畫賈島像置於屋壁晨夕事之後乃儒服謁唐莊宗於鎮州莊宗以為著作佐郎天成中奔於吳李忭父子用之為相周世宗征淮璟懼遣晟奉表求和世宗召問江南事不對殺之璟聞贈魯國公潘佑滎陽集十卷鼂氏曰偽唐潘佑金陵人韓熙載薦於璟授祕書正字直崇文館煜時為虞部員外史館修撰知制誥中書舍人佑性貞介文章贍逸尤長議論坐言事悖慢下獄自刎死人頗言張洎譖之成彥雄梅頂集一卷鼂氏曰南唐成彥雄江南進士有劉鉉序徐常侍集三十卷鼂氏曰南唐徐鉉字鼎臣廣陵人仕楊溥為祕書郎直宣徽北院掌文翰李忭時知制誥煜時纍遷翰林學士歸朝為直學士院給事中散騎常侍淳化初坐纍黜靖難軍司馬鉉初至京師見御毛褐者輒哂之邠苦寒竟以冷氣入腹而卒鉉幼能屬文尤精小學文思敏速凡所撰述常不喜預作有欲從其求文者必戒臨事即來請往往執筆立就未嘗沈思常曰文速則意思敏壯緩則體勢踈慢陳氏曰其二十卷仕江南所作餘十卷歸朝後所作也所撰國主李煜墓銘婉微有體文鑑取之田霖四六集一卷鼂氏曰南唐田霖撰孫光憲鞏湖編三卷鼂氏曰荆南孫光憲字孟文陵州人王衍降唐避地荆南從誨辟掌書記歷檢校祕書監御史大夫王師收閬州光憲勸其主獻三州地乾德中終黃州刺史自號葆光子扈載集十卷鼂氏曰後周翰林學士范陽扈載仲熙撰少俊早達年二十六以死其子蒙顯於國朝神宗皇帝御集二百卷鼂氏曰宋朝神宗皇帝撰章惇等纂紹聖初以元祐中所集止九百四十三道有旨命惇再加編次至元符中書成比元祐所編增多八千七百三十道分文辭政事邊機三門言者仍以元祐之臣託以邊機不宜泄露掩沒先帝盛美於是遍以賜羣臣云范魯公集三十卷鼂氏曰宋朝范質字文素大名人後唐長興中舉進士時和凝典貢舉覽質程文器之自以登第名在十三即以其數處質舉子謂之傳衣鉢晉天福中為翰林學士周廣順初拜相太祖受禪加兼侍中乾德二年始罷為太子太傅卒年五十四將終戒其子旻勿請諡勿刻墓碑質力學強記好聚書既登朝猶手不釋卷國史載其示從子詩家書目序薦吕餘慶趙普表三篇趙韓王集三卷鼂氏曰宋朝趙普字平則薊州人其父遷洛陽占籍焉乾德中代范質為平章事太平興國六年及端拱初三入相薨封真定王諡忠獻卒年七十一普初無學術太宗勉之晚年頗該博陳氏曰遺藁凡十卷普開國元臣不以文著而彗星班師二疏天下至今傳誦末有劉昌言所撰行狀按館閣書目惟有奏議一卷令麻沙書坊刋本奏議止數篇餘者表狀之屬巽岩李氏遺藁序曰王禹稱嘗賦詩哭普謂其章疏與夏訓商謨相表裏本傳獨載普諫伐幽州辭多刪潤每恨弗見其全網羅搜索久乃得普遺文而幽州之奏咸在後有論星變及薦張齊賢二奏其言諄諄要本於仁嗚呼賢矣禹稱褒讃諒不為私而史官簡編誠可歎息乃次第其遺文以傳於世其四六表狀往往見禹稱集蓋禹稱代作也雖禹稱代作必普之心聲云耳因弗敢棄顧草疏決不止此當博求而附益之柳仲塗集一卷鼂氏曰宋朝柳開字仲塗大名人開寶六年進士太平興國中上書願備邊用换崇儀使知寧邊軍徙全桂二州貶復州團練副使居久之復官歷環邠曹邢代欣滄七州咸平四年終於京師開幼竒警有膽氣學必宗經慕韓愈柳宗元為文因名肩愈字紹先既而易今名字自以為能開聖道之塗也集乃門人張景所編歐公嘗推本朝古文自仲塗始陳氏曰仲塗歷知常潤州以殿中侍御史换崇儀使又歷七郡以卒門人張景為行狀集序集凡十五卷本朝為古文自開始然其體艱澀為人慷慨喜功名急義史亦稱其傲狠強愎云張晦之集二十卷鼂氏曰宋朝張景字晦之師事柳開學為古文名震一時卒官至廷評年四十九集有文百九十三首禹稱所編並為之序穆參軍集三卷陳氏曰泰州司法參軍東平穆修伯長撰修祥符二年經明行修進士仕不遇困窮以死師事陳搏傳其易學以授李之才之才傳邵雍而尹洙兄弟亦從之學古文且傳其春秋學或曰太極圗亦修所傳於陳搏种放者今其遺文傳世者僅如此門人祖無擇為之序水心葉氏曰柳開穆修張景劉牧當時號能古文今文鑑所存來賢亭記柳河南尉廳壁記張法相院鐘記靜勝亭記穆待月亭記劉諸篇可見時以偶儷工巧為尚而我以斷散拙鄙為髙自齊梁以來言古文者無不如此韓愈之備盡時體抑不自名李翺皇甫湜往往不能知而况孟郊張籍乎古人文字固極天下之巧麗矣彼怪迂鈍朴用功不深才得其腐敗粗澀而已胡周父文集十卷鼂氏曰宋朝胡旦字周父渤海人太平興國三年進士第一人知海州上河平頌先是盧多遜趙普罷頌有逆遜投荒姦普屏外之句太宗怒貶商州團練副使上平燕八議召復官再遷知制誥翟馬周上封事斥時政語連旦謪防州團練副使復召知制誥草王繼恩制詞溢美流潯州景德初以目病致仕終祕書監為人雋辨強敏少有大志力學以贍博聞雍熙淳化間奏御之文為時推賞晚節黷貨多干擾州縣持吏短長時論薄之張師黯集五十卷鼂氏曰宋朝張洎字師黯滁州人仕李煜知制誥中書舍人歸朝為史官修撰翰林學士淳化中參知政事至道二年卒洎風神灑落文辭清麗通釋氏學然性險陂而諂附集有吳淑序其子安期所編咸平五年上之王元之小畜集三十卷鼂氏曰王禹稱字元之巨野人家微賤九嵗能為歌詩畢士安見而異之及長善屬文太平興國八年登進士第端拱初試文擢右司諫知制誥判大理寺辨徐鉉罪忤旨貶商州團練副使久之復召知制誥入翰林為學士孝章皇后崩梓宫遷主第禹稱謂后常母儀天下當用舊典以謗詘左遷知滁州真宗即位復召掌誥修太宗實録坐語涉輕誣出守黃州徙蘄州卒年四十八元之詞學敏贍獨步一時丰氣峻厲極談世事臧否人物以直道自任故屢被擯斥喜稱奬後進當時名士多出其門下集自為序陳氏曰元之文自為之序略曰閲平生所為文類而第之得三十卷將名其集以易筮之遇乾之小畜象曰君子以懿文德未能行其施但可懿文而已外集者其曾孫汾裒輯遺文得三百四十首又有承明集十卷奏議集三卷未見水心葉氏曰王禹稱文簡雅古淡由上三朝未有及者而不甚為學者所稱蓋無師友議論故也竹溪林氏曰王元之又在尹穆之前雖未能盡去五代浮靡之習而意已務實但未得典則之正宋文安集一百卷鼂氏曰宋朝宋白字素臣開封人年十二屬文建隆二年進士調嘉州玉津令從太宗平晉獻頌上嘉之纍擢翰林學士祥符中卒諡文安白之文頗浮麗而理致或不工典貢舉取王禹稱田錫胡旦時稱得人又名廣平集文獻通考卷二百三十三
