侍衞警蹕如常儐者進受命出門東西面曰敢請事左庶子承傳進跪奏如常皇太子曰以茲初婚某奉制承命左庶子俛伏興傳於儐者入吿主人曰某謹敬具少頃儐者出傳於左庶子奏如初儐者引主人迎於門外之東西面再拜左庶子前跪奏稱左庶子臣某言請答俛伏興還侍位皇太子答再拜主人揖皇太子先入掌畜者以鴈授左庶子進東南向奉授皇太子既執鴈進入侍衞者量入侍從及内門主人譲曰請皇太子入皇太子曰某弗敢先主人又曰固請皇太子入皇太子曰某固不敢先主人揖入皇太子從入皇太子入門而左主人入門而右内門主人揖入内霤將曲揖當階揖皇太子皆報揖至於階主人曰請皇太子升皇太子曰某敢辭主人曰固請皇太子升皇太子曰某固敢辭主人又曰終請皇太子升皇太子又曰某敢終辭主人揖皇太子報揖主人升立於阼階上西面皇太子升進當房戸前北面跪奠鴈俛伏興再拜降出主人不降送内廐尉進厭翟於内門外傅姆導妃司則前引出於母左傅姆在右保姆在左執燭及侍從如式父少進西面戒之必有正焉若衣若花命之曰戒之敬之夙夜無違命母戒之西階上施衿結帨命之曰勉之敬之夙夜無違庶母及門内施鞶申之以父母之命命之曰恭敬聽宗父母之言夙夜無愆視諸衿鞶妃既出内門至輅後皇太子授綏母辭不受曰未敎不足與為禮妃升輅乗以几姆加幜皇太子御輪三周馭者代之皇太子出大門乗輅還宫侍衞如來儀妃仗次於後主人使其屬送妃以儐從同牢其日司閨設妃次於東閤内道東南向掌筵鋪褥席將夕司閨設皇太子幄於殿室西廂東向鋪地重茵施屏障設同牢之席於室内皇太子之席西廂南向妃東廂西向席皆莞筵紛純加藻席繢純席間量容牢饌典膳監設洗於東階東南東西當霤南北以堂深罍水在洗東篚在洗西南肆篚實以二巾二爵設妃洗在東房筵北罍水在洗西篚在洗東北肆皆加勺巾羃典膳監先設饌於房西牖下籩豆各二十簠簋各二鉶各三瓦甒一皆加巾羃蓋俎三罇在室内北牖下元酒在西加羃勺南柄羃夏用絺冬用緆罇在房戸外之東無元酒篚在南實四爵合卺其器皆烏漆惟㽅以陶卺以匏皇太子車至侍臣下馬所車權停文武侍臣皆下馬車左降立於輅右車動車右夾輅而趨車至左閤㢠廻輅南向左庶子進當輅前跪奏稱左庶子臣某言請降輅俛伏興還侍位皇太子降輅入俟於内殿門外之東西面侍衞如常儀庶子以下皆退妃至宮門鹵簿仗衞停於門外近侍者從如常入至左閤外㢠廻輅南向司則進當輅前啓請妃降輅掌筵依式執扇前後執燭如常儀妃降輅就次整飾司閨引妃詣内殿門西東面皇太子揖妃以入又司閨前升自西階妃後升執扇燭者陳於東西階内皇太子即席東向立妃即席西向立司饌進詣階間北面跪奏稱司饌妾姓言請具牢饌興司則承令曰諾司饌帥其屬升奉饌入設於皇太子及妃座前醤在席前葅醢在其北俎三入陳於豆東豕俎特於俎北豆東葅醢之東司饌設黍於醤東饌在西也設對醬於東對醤婦醤也設之當特俎葅醢在其南北上設黍於豕俎北其西稷稻粱設湇於醬北司饌啓㑹於簠簋之南對簠簋於北啓𤼵也豆蓋徹於房内各加七箸設訖司饌北面跪奏饌具興皇太子及妃俱坐司饌跪取脯擩於醢取韭葅擩醢授皇太子又司饌取脯擩於醢取韭葅擩醢授妃皇太子及妃受俱祭於籩豆之間司饌興取黍實於左手徧取稷反於右手授皇太子又司饌取黍實於左手徧取稷反於右手授妃皇太子及妃各受祭於葅醢之間司饌俱興各立取肺皆絶末跪授皇太子及妃俱受又祭於葅醢之間司饌俱以肺加於俎掌嚴授皇太子巾又掌嚴授妃巾皇太子及妃俱帨手以柶扱上鉶徧擩之祭於上豆之間司饌品嘗皇太子饌又司饌品嘗妃饌司饌各移黍置於席上以次跪授肺脊皇太子及妃皆食以湇醬三飯卒食司饌北面跪奏稱司饌妾姓言請進酒司則承令曰依奏興司饌北面俱盥手洗爵於房入室詣酒罇所酌酒進北面立皇太子及妃俱再拜興一人進授爵皇太子一人以爵授妃皇太子及妃俱受爵司饌俱退北面答再拜皇太子及妃俱坐皇太子及妃俱祭酒司饌各以肝從司則俱進受虛爵奠於篚司饌又俱洗爵酌酒再醑皇太子及妃俱受爵俱飲司則進受虛爵奠於篚三醑用卺如禮再拜皇太子及妃立於席後司則降東階洗爵升酌於戸外罇進北面俱奠爵興再拜皇太子及妃俱答拜司則俱坐取爵祭酒遂飲卒爵奠爵遂拜執爵興降奠爵於篚還侍位司饌北面奏稱司饌妾姓言牢饌畢司則承令曰諾司饌徹饌設於房司則前跪奏稱司則妾姓言請殿下入俛伏興還侍位皇太子入於東房釋冕服著袴褶司則啓妃入幃幄皇太子及妃俱入室媵餕皇太子之饌御餕妃之饌妃朝見其日晝漏上水一刻所司列御座於所御殿阼階上西面其席莞筵紛純加藻席畫純次席黻純左右玉几司設設皇后座於室戸外之西近北南向尚食帥司膳設酒罇於房内東壁下有坫加勺羃罇用瓦甒實以醴酒籩一豆一實以脯醢設於罇北又設洗於東房近北罍水在洗西篚在東北肆篚實以巾羃觶一角柶一其日夙興妃沐浴司則啓請妃内嚴質眀諸衞帥其屬陳布儀仗如常儀近仗入陳於寝門外内廐尉進厭翟於正寝西階之前南向司則啓外辦妃服褕翟加首飾以出降自西階升輅侍衞如常至降車所司則贊妃降輅司言引妃入仗衞停於閤外障扇侍從如常妃至寝門之外立於西廂東面諸衞勒所部屯門布仗三仗入陳於所御殿閤外如常侍中奏請皇后内嚴妃既至寢門侍中版奏外辦皇帝服通天冠絳紗袍以出升自阼階即御座西向坐侍衞如常儀尚儀又奏皇后外辦皇后褘衣首飾司言引尚宮尚宮引皇后出即御座南向坐侍從如常妃奉笲棗栗司饌