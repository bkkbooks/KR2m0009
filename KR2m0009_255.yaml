body:
  text: 文獻通考卷二百五十五鄱陽馬端臨貴與著帝系考六后妃唐開元禮皇帝納后儀告圜丘卜日告圜丘方澤並如時廵告祭儀其祝文臨時撰臨軒命使将行納采制命太尉為使者宗正卿為副使吏部承以戒之問名納徴納吉告期并奉迎並同使前一日尚書舍奉御設幄座於太極殿如常守宫設羣官客使等諸應陪位者次於東西朝堂太樂令展宫懸於殿庭設舉麾位於殿上一位於懸下鼓吹令設十二案乗黄令陳車輅尚輦奉御陳輿輦皆如元日之儀典儀設文官一品以下五品以上位於懸東六品以下於横街南皆重行西面北上設武官一品以下五品以上位於懸西六品以下於横街南當文官皆重行東面北上設朝集使位各分方於文武官當品之下設諸親位於四品五品之下皇帝親在東異親親在西設蕃客位各分方於朝集使六品之南諸州使人分方位於朝集使九品之後設典儀位於懸東北贊者二人在南少退俱西向設使者受命位於大横街南道東副使又於其東少退俱北面奉禮設門外位於東西朝堂如元日儀其日諸衛勒所部列黄麾仗如常儀羣官依時刻集朝堂俱就位各服其服通事舍人引就朝堂前位侍中量時刻版請中嚴鈒㦸近仗入陳於殿庭太樂令帥工人就舞位協律郎入就舉麾位諸侍衛之官各服其器服符寳俱就閤奉迎典儀帥贊者先入就位通事舍人引羣官入就位又引使副入立於太極門外道東西面黄門侍郎引主節執幡節中書侍郎引制書案立於左延明門内道北西面北上侍中版奏外辦皇帝服衮冕御輦以出曲直華葢警蹕侍衛如常儀皇帝将出仗動出自西房即御座南向符寳郎奉寶置於御座如常通事舍人引使主副入就位定典儀曰再拜贊者承傳羣官在位者皆再拜侍中前承制降詣使者東北西面稱有制使主副俱再拜侍中宣制曰納某官女為皇后命公等持節行納采等禮宣訖使主副又再拜侍中還侍位黄門侍郎引主節於使者東北西面授使者使者受付主節主節立於使後黄門侍郎退中書侍郎引制書案立於使者東北西面中書侍郎取制書持案退自使後立於使者之左西面授使者使者受制書置於案持案者退立於使後中書侍郎退典儀曰再拜贊者承傳羣官在位者皆再拜舍人引使者主副出持節者前導持案者次之侍中前跪奏稱侍中臣某言禮畢俛伏興還侍位皇帝降座御輿入自東房侍衛警蹕如來儀舍人引羣官在位以次出初使主副乗輅備儀仗而行鼓吹備而不作從者乗車以從其制書油絡網犢車載而行自後皆如之納采前一日守宫設使者次於后氏大門外道右南向其日大昕使主副至於后氏大門外掌次者迎入次凡賔主及行事者皆公服主人受於廟無廟者受於正寝掌事者設神席於室戸外之西莞筵紛純加藻席畫純南向右雕几使主副出次謁者引立於大門外之西東面北上持幡節者立於使者之北少退東面令史二人對舉制案立於使者之南執鴈者又在其南俱東面主人立於大門内西面儐者立於主人之左北面受命出立門東西面曰敢請事使者曰某奉制納采儐者入告主人曰臣某之女若如人既䝉制訪臣某不敢辭儐者出告入引主人出迎使者於大門外之南北面主人再拜使者不答拜主人揖使者先入於階使者及宗正卿入幡節先導其持節案及執鴈者從入幡節立西階之西東門自後幡節皆如之使者由西階升於兩楹間南面使副在使者西南執案及執鴈者在使副西南俱東面主人升阼階詣使者前北面持案者以案進使副前使副取制書持案者退復位使副奉制書進授使者退復位持節者脫節衣使者曰有制主人再拜宣制畢主人降詣階間北面再拜稽首訖升進北面受制書退以授左右仍北面立使副取鴈以授使者退復位使者受鴈主人再拜進受鴈退以授左右仍北面立儐者引二人對舉答表案進於主人後少西儐者取表以授主人主人進授使者訖退復位再拜持節者加節衣謁者引使者及使副等降自西階以出制文凡六禮皆以版長一尺二寸博四寸厚八分后家答版亦如之皇帝曰咨具官封姓渾元資始肇經人倫爰及夫婦以奉天地宗廟社稷謀於公卿咸以為宜率由舊典今使持節太尉封某宗正卿封某以禮納采答文皇帝嘉命訪婚陋族備數采擇姑姊妹則云先臣某官之遺女未閑敎訓衣履若如人欽承舊章肅奉典制某官封臣姓名稽首頓首再拜承制詔問名使者既出遂立於内門外之西東向並如納采位初使者降主人降立於内門内東廂西面儐者進受命出請事使者曰將加卜筮奉制問名儐者入告主人曰臣某之子若如人既蒙制訪臣某不敢辭儐者出告入引主人出迎使者至主人受鴈訖出如納采儀使者出立於内門之西使副在南少退俱東面初使者降主人使者立於東階下西面儐者進受命出請事使者曰禮畢儐者入告主人曰某公奉制至於某之室某有先人之禮請禮從者儐者出告使者曰某既得命将事敢辭儐者入告主人曰先人之禮敢固以請儐者出告使者曰某辭不得命敢不從儐者入告遂引主人升立於序端掌事者徹几改設二筵東上各用莞筵紛純加藻席繢純設甒醴於東房西牖下加勺羃坫在罇北實觶二角柶二各一籩一豆實以脯醢在坫北又設洗於東階東南如常訖儐者引主人降迎使者於内門外之東西面揖使者先入使者入門而左副從之主人入門而右至階主人曰請某位升使者曰某敢辭主人曰固請某位升使者曰某敢固辭主人曰終請某位升使者曰某敢終辭主人升阼階使者升西階副從升俱北面主人阼階上北面再拜使者及副西階上北面答再拜主人受几於序端掌事者内拂几三奉兩端西北向以進主人東南向外拂几三振袂内執之掌事者又一人又執几以從主人進西北向使者序進迎受於筵前東南向以俟主人還東階上北向再拜送使者以几筵進北面跪各設於座差退於西階上北面東上俱答再拜立於階西東面南上贊者二人俱升取觶降盥手洗觶升實醴加柶於觶覆之面葉出房南面主人受醴面柄進使者筵前西北面又贊者執觶以從使者西階上北面各一拜序進筵前東南面主人又以次授醴使者受俱復西階上位主人退復東階上北面一拜送掌事者以次薦脯醢於筵前使者各進升筵皆坐左執觶右取脯擩於醢祭於籩豆間各以柶祭醴三始版一祭又版再祭興各以柶兼諸觶上獵降筵於西階上俱北面坐俱啐醴建柶各奠觶遂拜執觶主人答拜使者進升筵坐各奠觶於薦東降筵序立於西階上東面南上掌事者牽馬入陳於門内三分庭一在南北首西上又掌事者奉幣升東階以授主人主人受於序端進西面掌事者一人又奉幣篚立於主人之後使者西階上俱北面再拜主人進詣楹間南面立使者序進立於主人之西俱南面主人以幣篚授使者使者受退立於西階上東面掌事者又以幣篚授主人主人受以授使副使副受退立於使者北俱東面主人還東階上北面拜送使者降西階從者迓受幣使者當庭實揖馬出牽馬者從出使者出大門之外西東面立從者迓受馬主人出門東西面再拜送使者退主人入立於東階下西面儐者告主人曰賓不顧矣主人反於寝使者奉答表詣闕進制文皇帝曰咨某官封姓兩儀配合承天統物正位乎内必俟令族重章舊典今使使持節太尉封某宗正卿封某以禮問名答文皇帝嘉命使者某重宣中制問臣名族臣女夫婦所生先臣故某官之遺元孫先臣故某官之遺曽孫先臣故某官之遺孫先臣故某官之外孫女年若干欽承舊章謹奉典制某官某臣姓某稽首頓首再拜承制詔若女祖以上在則直云某官臣之孫女等語納吉前一日守宫設使者次以下至主人立於大門内西面如納采儀儐者進受命出請事使者曰加諸卜筮占曰從制某也納吉儐者入告主人曰臣某之女若如人龜筮云吉臣占在焉臣某謹奉典制儐者出告入引主人出迎使者於大門外以下至使者降自西階以出如納采儀使者出立於内門外之西使副在南少退俱東面初使者降主人立於東階下西面儐者進受命出請事使者曰禮畢其賔使者如問名之儀制文皇帝曰咨某官姓人謀龜從僉曰貞吉敬順典禮今使使持節太尉封某宗正卿封某以禮納吉答文皇帝嘉命使者某重宣中制太卜元吉臣陋族卑鄙憂懼不堪欽承舊章肅奉典制某官臣姓某稽首頓首再拜承制詔納徴前一日守宫設使者次如初其日大昕使主副至后氏大門外掌次者延入次執事者入布羃於内門外元纁束帛陳於羃上六馬陳於幕南北首西上執事者奉榖珪以匱俟於幕東西掌事者設几筵如初使主副出次謁者引立於大門之外西東南面北上持幡節者立於使之北少退東面令史二人對舉制案立於使副南東面主人立於大門内西面儐者進受命出請事使者曰某奉制納徵儐者入告主人曰奉制賜臣以重禮某祗奉典制儐者出告入引主人出迎使者於大門外之南北面主人再拜使者不答拜謁者引使者及使副入幡節前導持案者從入使者入門而左主人入門而右至於内門使主副立於門西東面北上主人立於門東西面儐者引主人揖使者先入門至階使副從入由西階升立於楹間南面使副在使者西南持案者在使副西南俱東面主人由阼階詣使者前北面立執事者坐啟匱取珪加於元纁上及牽馬者從入三分庭一在南北首西上執珪者在馬西俱北面持案者以案進使副前使副取制書持案退復位使副奉制書進授使者退復位持節者脫節衣使者曰有制主人再拜使者宣制畢主人降詣階間北面再拜稽首訖升進北面受制書退以授左右仍北面立儐者引二人對舉答表案進主人後少西儐者取表以授主人主人受以授使者訖退復位再拜謁者引使者及使副等降自西階以出立於内門外之西使副在南少退俱東面初主人受制書訖左右受玉帛於庭受馬者自左受之以東牽馬者既授馬自前面而出主人降立於東階下西面儐者進受命出請事使者曰禮畢其賔使者如納吉之儀制文皇帝曰咨某官姓之女有母儀之徳窈窕之姿如山如河宜奉宗廟永承天祚以元纁車馬以章典禮今使使持節太尉封某宗正卿封某以禮納徵答文皇帝嘉命使者某重宣中制降婚卑陋崇以上公寵以豐禮備物典册欽承舊章肅奉典制某官臣姓名稽首頓首再拜承制詔告期前一日守宫設使者次以下至出請事如納采儀使者曰制使某告期儐者入告主人曰臣某謹奉制儐者出告入引主人出迎使者以下至禮畢如納采儀制文皇帝曰咨某官姓謀於公卿大筮元龜㒺有不臧率遵典禮今使使持節太尉封某宗正卿封某以禮告期答文皇帝嘉命使者某重宣中制告曰惟某月某日可迎臣欽承舊章肅奉典制某官臣姓某稽首頓首再拜承制詔告廟有司以特牲告如常告禮祝文臨時撰册后前一日守宫設使者次於后氏第大門外之西如常尚舍設尚宮以下次於后氏閤外道西東向障以行帷其日臨軒命使如納采命使之儀太尉為正使司徒為副使奉禮設使者位於大門外之西東向使副及内使位於使者之南舉册案及寶綬者在南差退持節者在使者之北少退俱東面設主人位於大門外之南北面設使者以下及主人位於内門外亦如之設内謁者監位於内門外主人之南西面謁者監設司贊位於東階東南掌贊二人在南差退俱西向内謁者監又先置一案於閤外近限使主副乗輅持節備儀仗鼓吹備而不作至后氏大門外使者降輅掌次者延入次尚宫以下至客之次内僕進重翟以下大門外道西東向北上諸衛令其屬布后儀仗如常使者出次謁者引使者以下