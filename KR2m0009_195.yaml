body:
  text: 文獻通考卷一百九十五鄱陽馬端臨貴與著經籍考二十二史雜史各門總雜史隋經籍志曰自秦廢去古文篇籍遺散漢初得戰國䇿葢戰國遊士記其䇿謀其後陸賈作椘漢春秋以述誅鋤秦項之事又有越絶相承以為子貢所作後漢趙曄又為吳越春秋其屬辭比事皆不與春秋史記漢書相似葢率爾而作非史䇿之正也靈獻之世天下大亂史官失其常守博逹之士愍其廢絶各記聞見以備遺亡是後羣才景慕作者甚衆又自後漢以來學者多抄撮舊史自為一書或起自人皇或斷之近代亦各其志而體制不經又有委巷之說迂怪妄誕真虚莫測然其大抵皆帝王之事通人君子必博采廣覧以酌其要故備而存之謂之雜史宋三朝志曰雜史者正史編年之外别為一家體制不純事多異聞言或過實然藉以質正疑謬補緝闕遺後之為史者有以取資如司馬遷采戰國䇿楚漢春秋不為無益也隋志七十二部九百七十一卷通計亡書七十三部九百三十九卷唐志雜史八十八家一百七部一千八百二十八卷失姓名八家元行中以下不著録六十八家八百六十一卷宋三朝志雜史九十一部九百六十八卷宋兩朝志三十一部六百三十卷宋四朝志二十四部一千七十三卷内唐武宗實録以下六部入實録門不重具宋中興志别史三十一家三十六部一千三十四卷右雜史隋經籍志曰古之史官必廣其所記非獨人君之舉周官外史掌四方之志則詩侯史記兼而有之春秋傳曰虢仲虢叔王季之穆勲在王室藏於盟府臧紇之叛季孫命太史召掌惡臣而盟之周官司寇凡大盟約涖其盟書登於天府太史内史司㑹六官皆受其貳而藏之是則王者誅賞具録其事昭告神明百官史臣皆藏其書故自公卿諸侯至於羣士善惡之迹畢集史職而又閭胥之政凡聚衆庶書其敬敏任恤者族師每月書其孝弟睦婣有學者黨正歲書其徳行道藝者而入之於鄉大夫鄉大夫三年大比考其徳行道藝舉其賢者能者而獻其書王再拜受之登於天府内史貳之是以窮居側陋之士言行必逹皆有史傳自史官曠絶其道廢壊漢初始有丹書之約白馬之盟武帝從董仲舒之言始舉賢良文學天下計書先上太史善惡之事靡不畢集司馬遷班固撰而成之股肱輔弼之臣扶義俶儻之士皆有記録而操行髙潔不渉於世者史記獨傳夷齊漢書但述楊王孫之儔其餘皆略而不說又漢時阮倉作列仙圖劉向典校經籍始作列仙列士列女之傳皆因其志尚率爾而作不在正史後漢光武始詔南陽撰作風俗故沛三輔有耆舊節士之序魯廬江有名徳先賢之贊郡國之書由是而作魏文帝又作列異以序鬼神奇怪之事嵇康作髙士傳以叙聖賢之風因其事類相繼而作者甚衆名目轉廣而又雜以虛誕怪妄之說推其本原葢亦史官之末事也載筆之士刪采其要焉魯沛三輔序贊並亡後之作者亦多零失今取其見存部而類之謂之雜傳宋三朝藝文志曰傳記之作葢史筆之所不及者方聞之士得以紀述而為勸戒隋志曰雜傳唐志曰雜傳類有先賢耆舊孝友忠節列藩良吏髙逸科録家傳文士僊靈髙僧鬼神列女之别今總為傳記事渉道釋者各具於其事宋兩朝藝文志曰傳記之作近世尤盛其為家者亦多可稱采獲削槀為史所傳然根據膚淺好尚偏駮滯泥一隅寡通方之用至孫冲胡訥收摭益細而通之於小說按雜史雜傳皆野史之流出於正史之外者葢雜史紀志編年之屬也所紀者一代或一時之事雜傳者列傳之屬也所紀者一人之事然固有名為一人之事而實闗係一代一時之事者又有参錯互見者前史多以雜史第四雜傳第八相去懸隔難以参照今以二類相附近庶便檢討云隋志二百一十七部一千二百八十六卷唐志一百二十五家一百四十六部一千六百五十六卷宋三朝志一百三十九部四百三十七卷宋兩朝志一十六部八十一卷宋四朝志五十三部五百二十二卷宋中興志三百一十三家三百三十九部一千三百七十九卷右雜傳隋經籍志曰自永嘉之亂皇綱失馭九州君長據有中原者甚衆而當時臣子亦各記録後魏克平諸國據有嵩華始命司徒崔浩博采舊聞綴述國史諸國記注盡集祕閣爾朱之亂並皆散亡今舉其見在謂之覇史隋志三十七部三百三十五卷唐志一十七家二十七部五百四十二卷宋三朝志二十七部三百七十二卷宋兩朝志五部五十四卷宋中興志四十家四十三部四百三十七卷夾漈鄭氏曰古今編書所不能分者五一曰傳記二曰雜家三曰小說四曰雜史五曰故事凡此五類之書足相紊亂又如文史與詩話亦能相濫編書之家多是茍且有見名不見書者有看前不看後者尉繚子兵書也班固以為諸子類寘於雜家此之謂見名不見書隋唐因之至崇文目始入兵書類顔師古作刋謬正俗乃雜記經史惟第一篇說論語而崇文目以為論語類此之謂看前不看後應知崇文所釋不看全書多只看帙前數行率意以釋之耳按刋謬正俗當入經解類按夾漈言古今編書所不能分者五可以訂歴代藝文志之失所謂見名不見書看前不看後者尤足以究其所失之源然愚嘗考之經録猶無此患而莫謬亂於史葢有實故事而以為雜史者實雜史而以為小說者又有隋志以為故事唐志以為傳志宋志以為雜史者若一一考訂改而正之則既不欲以臆見改前史之舊文且所録諸書葢有前史僅存其名晚學實未嘗見其書者則亦無由知其編類之得失是以姑仍其舊而於所録先儒議論諸書本末則必詳加考訂俾以類相從而不盡仍前史之舊云右覇史偽史隋唐志史部皆附在雜史宋志方别立史抄門宋三朝志二十六部六百一十二卷宋兩朝志四部一百三十八卷宋四朝志三部三十三卷宋中興志四十家四十六部六百八十一卷右史抄汲冢周書十卷鼂氏曰晉太康中汲郡與穆天子傳同得晉孔鼂注葢孔子刪采之餘凡七十篇古者天子諸侯皆有史官惟書法信實者行於世秦漢罷黜封建獨天子之史存然史官或怯而阿世貪而曲筆虚美隠惡不足考信則儒學處士必私有記述以伸其志將來頼之以證史官之失其宏益大矣以司馬遷之博聞猶采數家之言以成其言况其下者乎亦有聞見單淺記録失實胸臆偏私褒貶弗公以誤後世者在觀者慎擇之而已矣陳氏曰晋太康汲郡發魏安釐王冢所得竹簡書此其一也凡七十篇叙一篇在其末今京口刋本以叙散在諸篇葢以倣孔安國尚書相傳以為孔子刪書所餘者未必然也文體與古文不類似戰國後人放傚為之者巽岩李氏曰隋唐經籍藝文志皆稱此書得之晋太康中汲郡魏安釐王冢孔鼂注解或稱十卷或八卷大抵不殊按此則晉以前初未有此也然劉向班固所録並著周書七十一篇且謂孔子刪削之餘而司馬遷記武王克殷事葢與此合豈西漢世已得入中祕其後稍隠學者不道及盗發冢乃幸復出邪篇目比漢但闕一耳必班劉司馬所見者也繫之汲冢失其本矣書多駮辭宜孔子所不取抑戰國處士私相綴緝託周為名孔子亦未必見章句或脫爛難讀更須考求别加是正云容齋洪氏随筆曰周書今七十篇殊與尚書體不相類所載事物亦多過實其克商解云武王先入適紂所在射之三發而後下車擊之以輕吕劍名斬之以黄鉞縣諸大白商二女既縊又射之三發擊之以輕吕斬之以元鉞縣諸小白越六日朝至於周以三首先馘入燎於周廟又用紂於南郊夫武王之伐紂應天順人不過殺之而已紂既死何至梟戮俘馘且用之以祭乎其必不然者也又言武王狩事尤為淫侈至於擒虎二十有二猫二麋五千二百三十五犀十有三氂七百二十有一熊百五十一羆百十八豕三百五十有二狢十有八麂十有六麝五十鹿三千五百有二遂征四方凡憝國九十有九國馘磨億有十萬七千七百七十有九其多如是雖注家亦云武王以不殺為仁無緣所馘如此葢大言也王㑹篇皆大㑹諸侯及四夷事云唐叔荀叔周公在左太公在右堂下之右唐公虞公南面立焉堂下之左商公夏公立焉四公者堯舜禹湯後商夏即把宋也又言俘商寳玉億有百萬所紀四夷國名頗古奧畜獸亦竒崛以肅慎為稷慎獩人為穢人樂浪之夷為良夷姑蔑為姑妹東甌為且甌渠搜為渠叟髙句麗為髙夷所叙穢人前兒若彌猴立行聲似小兒良夷在子獸名鼈身人首脂其腹炙之藿則鳴揚州禺禺魚人鹿青邱狐九尾東南夷曰氐乘黄乗黄者似騏背有兩角東越海蛤海陽盈車大蟹西南戎曰央林以酋耳酋耳者身若虎豹渠叟以䶂犬䶂犬者露犬也能飛食虎豹區陽戎以鼈封鼈封者若彘前後有首蜀人以文翰文翰者若臯雞康民以稃苡其實如李食之宜子北狄州縻費費其形人身枝踵自笑笑則上唇翕其目食人都郭亦北狄生生若黄狗人面能言奇幹亦北狄善芳頭若雄雞佩之令人不眯正東髙夷嗛羊嗛羊者羊而四角西方之戎曰獨鹿卭卭距虚犬戎文馬而赤鬣縞身目若黄金名古皇之乘白州比閭比閭者其華若羽以其木為車終行不敗篇末引伊尹朝獻商書云湯問伊尹使為四方獻令伊尹請令正東以魚皮之鞞鰂醬蛟瞂利劍正南以珠璣瑇瑁象齒文犀正西以丹青白旄江歴珠名龍角正北以槖駝騊駼駃騠良弓為獻湯曰善凡此皆無所質信姑録之以貽博雅者唐太宗時逺方諸國來朝貢者甚衆服裝詭異顔師古請圖以示後作王㑹圖葢取諸此漢書所引天予不取反受其咎毋為權首將受其咎以為逸周書此亦無之然則非全書也後村劉氏曰汲冢書十卷七十篇與藝文志周書七十一篇合但少一篇鼂子止謂其記録失實李仁父謂書多駮詞按中間所載武王征四方馘億有十萬七千七百七十有九俘三億萬二百三十暴於秦皇漢武矣狩擒虎二十有二云云見前段紂囿雖大安得熊羆如是其衆又謂俘商寳玉億有百萬皆荒唐誇誕不近人情非止於駮而已百篇聖筆所定孟子猶疑漂杵之語前軰云吾欲忘言觀道妙六經俱不是全書况汲冢之類乎吳越春秋十二卷鼂氏曰後漢趙曄撰吳起太伯盡夫差越起無餘盡勾踐内吳外越本末咸備吳越春秋傳十卷崇文總目唐皇甫遵注初趙曄為吳越春秋十二卷其後有楊方者以曄所撰為煩又刋削之為五卷遵乃合二家之書考定而注之越絶書十五卷崇文總目子貢撰或曰子胥舊有内紀八外傳十七今文題闕舛載二十篇又載春申君疑後人竄定世或傳二十篇者非是陳氏曰無撰人名氏相傳以為子貢者非也其書雜記吳越事下及秦漢直至建武二十八年葢戰國後人所為而漢人又附益之耳越絶之義曰聖人發一隅辨士宣其辭聖文絶於彼辯士絶於此故曰越絶雖則云然終未可曉也西京雜記二卷一作六卷鼂氏曰晋葛洪撰初序言洪家有劉子駿漢書百卷乃當時欲撰史録事而未得締思無前後之次雜記而已後學者始甲乙之終癸為十卷以其書校班史殆全取劉書耳所餘二萬言乃抄撮之析二篇以禆漢書之闕猶存甲乙裒次江左人或以為吳均依託為之陳氏曰卷末言洪家有劉子駿書百卷先父傳之歆欲撰漢書雜録漢事未及而亡試以此記考校班固所作殆是全取劉書有少異同耳固所遺不過二萬餘言今抄出為二卷以禆漢書之闕所謂先父者歆之於向也而館閣書目以為洪父傳之非是唐藝文志亦只二卷今六卷者後人分之也按洪博聞深學江左絶倫著書幾五百卷本傳具載其目不聞有此書而向歆父子亦不聞其嘗作史傳於世使班固有所因述亦不應全沒不著也殆有可疑者豈惟非向歆所傳亦未必洪之作也東觀漢記十卷陳氏曰漢謁者僕射劉珍校書郎劉騊駼等撰初班固在顯宗朝嘗撰世祖本紀功臣列傳載記二十八篇至永初中珍騊駼等著作東觀撰集漢記其後蔡植蔡邕馬日磾等皆嘗補續唐藝文志著録者一百二十卷今所存者惟吳漢賈復耿弇寇恂馮異祭遵及景丹葢延八人列傳而已其卷第凡十而闕第七八二卷未知果當時之遺否也羅鄂州序曰願聞之上蔡任文源曰家舊有東觀漢記四十三卷丙子渡江亡去後得蜀本錯誤殆不可讀用祕閣本讐校刪著為八篇洎見唐諸儒所引参之以袁宏後漢紀范曄後漢書粗為全具其疑以待博洽君子按顯宗命班固為蘭臺令史遷為郎撰光武功臣平林新市公孫述事作列傳載記二十八篇永寧元年太后又詔劉珍與劉騊駼作建武以來名臣傳今此記所存皆建武事豈固及珍騊駼所述邪其文間類前漢書又傳後所題有太史官曰有序目者此班劉之所為分也然固與珍傳不載成書卷目隋書經籍志稱劉珍所撰漢記百四十三卷新舊唐書經籍藝文志皆百二十七卷吳兢所蔵與官書卷同劉知幾所有僅百十四篇本朝歐陽公嘗欲求於海外後復散亡今所存纔此耳豈不惜哉然後漢成書自劉珍謝承薛瑩司馬彪華嶠謝忱袁崧劉義慶蕭子顯凡九家唯華嶠專述漢記逮范曄總載諸家而成書亦以華嶠為主後之欲考漢記者於范氏之書猶有取焉文源之言既然願以為此書乃漢世史臣親記見聞而袁范出魏晋後以世揆之不得為比觀髙宻侯一傳而綱領見矣書雖不全當共存録因刻板於江夏郡篇中往往有唐武后時字不欲輙改髙氏小史一百二十卷鼂氏曰唐髙峻撰以司馬遷史至陳隋書附以唐實録纂其要分十例為六十卷後其子迥析而倍之陳氏曰葢鈔節歴代史也司馬温公嘗稱其書使學者觀之今按國史志凡一百九卷目録一卷中興書目一百二十卷止於文宗今本多十卷直至唐末峻元和中人則其書當止於徳順之間迥之所序但云分六十卷為百二十取其便易而已初未嘗有所增加也其止於文宗及唐末者殆皆後人傅益人非髙氏本書此書舊有杭本今本用厚紙裝䙡夾面寫多錯誤俟求杭本校之五代新說二卷鼂氏曰唐張詢古撰以梁陳北齊周隋君臣雜事分三十門纂次古史六十卷鼂氏曰皇朝蘇轍子由撰其序曰太史公始易編年之法為紀傳世家記五帝以來然不得聖人之意余因遷之舊始伏羲訖秦始皇為七本紀十六世家三十七列傳謂之古史追録聖賢之遺意以示後世國史譏蘇氏之學皆權謀變詐今觀此書葢不然則知子由晚節為學益精深云朱子古史餘論曰近世之言史者惟此書為近理其序言古帝王為善不為不善之意非近世論者所能及而論史遷以為淺近而不學踈略而輕信亦中其病顧其本末乃有大不相應者其曰帝王之道以無為宗萬物莫能嬰之此特以老子浮屠之意論聖人非能知聖人之所以為聖也故其為言虚空無實而中外首尾不相為用其曰管晏叔向之流皆不足以知之與孔子知之而有隐孟子知之而未盡者皆何事邪若但曰以無為宗萬物莫能嬰之而已則數子之未知也不足恨而孔孟之所知吾恐其非此之謂也此皆義理之本原而不可失者秦漢以來史冊之言近理而可觀者莫如此書而其所未合猶若此豈其學之所従入者既已未得其正而其所以講摩詠蹈者又有所未精是以雖既其文而未既其實雖聞其號而未燭厥理也蘇氏之學大抵不知義理本原之正而横邪曲直惟其意之所欲其父子兄弟平日之言如此者不可勝舉少公資稟静厚故此書於一時正見有暫明者而本原綱領終未能了若長公之志林又不逮逺矣陳氏曰其書因馬遷之舊上觀詩書下考春秋及秦漢雜録為本紀世家列傳葢漢世古文經未出戰國諸子各自著書或增損故事以自信其說遷一切信之甚者或采世俗相傳之語以易古文舊說故為此史以正之然詆遷為不學淺近則過矣雁湖李氏跋曰士固有夙懐精識自其少年便自超卓至於終身不能以易某觀黄門應制五十篇之文首論夏商周考其年甫踰冠耳而其辭已閎詣如此逮晩謫官續成古史乃系以前論止附益數言豈非理之所到初無老少之異乎太清記十卷崇文總目梁王韶撰起太清元年盡六年初侯景破建鄴韶西奔江陵士人多問城内事韶不能人人為說乃䟽為一篇問者即示之元帝聞而取讀曰昔王韶之為隆安記言晋末之亂離今亦可以為太清記矣韶因為之然其議論皆謝之矣又韶希帝㫖撰述多非實録魏典三十卷崇文總目唐太常少卿元行冲撰起道武帝終宇文革命凡三十篇孝武入關則書東魏為東帝並載兩國事為凡例微用編年之法文約事詳學者宗之行冲以族出於魏刻意論著引魏明帝時西栁谷瑞石有牛繼馬後之象舊史謂元帝本出牛氏行冲以為非因言道武名犍繼晋受命此其應也特為論載於篇陳氏曰今本従莆田劉氏借録卷帙多寡不同歲月首尾不具殆類抄節似非全書三國典畧二十卷崇文總目唐汾州司戸参軍邱悅撰以闗中鄴都江南為三國起西魏終後周而東包魏北齊南總梁陳凡三十篇今卷第多遺自二十一以下卷闕南部煙花録一卷鼂氏曰唐顔師古撰載隋焬帝時宫中祕事僧志徹得之於官閣筍筆中一名大業拾遺記大業雜記十卷鼂氏曰唐杜寳撰起隋仁夀四年焬帝嗣位止越王侗皇泰三年王世充降唐事陳氏曰序言貞觀修史未盡實録故為此書以彌縫闕漏大唐新語十三卷鼂氏曰唐劉肅撰輯故事起武徳止大歴分為三十類肅元和時人大唐說纂四卷陳氏曰不著名氏分門類事效世說止有十二門恐非全書容齋洪氏随筆曰藝文志有李繁大唐說纂四卷今罕得其書予家有之凡所紀事率不過數十字極為簡要新史大抵采用之其忠節一門曰武后問石泉令王方慶曰朕夜夢雙陸不勝何也曰蓋謂宫中無子意者恐有神靈儆夫陛下因陳人心在唐之意后大悟召廬陵王復儲位新史載其說通鑑去之似為可惜景龍文館記八卷陳氏曰唐修文館學士武甄平一撰記中宗初置學士以後館中雜事及諸學士應制倡和篇什雜文之屬亦頗記中宗君臣宴䙝無度以至暴崩其後三卷為諸學士傳今闕二卷平一以字行唐年小録八卷陳氏曰唐戸部尚書扶風馬總㑹元撰記唐以來雜事分為七門末卷為雜録舊有一本畧甚後得程文簡本𫝊之始為全書開元天寳遺事四卷鼂氏曰漢王仁裕撰仁裕事蜀至翰林學士蜀亡仁裕至鎬京采摭民言得開元天寳遺事一百五十九條後分為四卷容齋洪氏随筆曰俗間所傳淺妄之書所謂雲仙散録開元天寳遺事之屬皆絶可笑遺事託云王仁裕所著仁裕五代時人雖文章乏氣骨恐不至此姑析其數端以為笑其一云姚崇開元初作翰林學士有歩輦之召按崇自武后時已為宰相及開元初三入輔矣其二云郭元振少時美風姿宰相張嘉貞欲納為壻遂牽紅絲線得第三女果随夫貴逹按元振為睿宗宰相明皇初年即貶死後十年嘉貞方作相其三云楊國忠盛時朝之文武爭附之以求富貴惟張九齡未嘗及門按九齡去相位十年國忠方得官耳其四云張九齡覧蘇頲文卷謂為文陣之雄師按頲為相時九齡元未逹也此皆顯顯可言者固鄙淺不足攻然頗能疑誤後生也惟張彖指楊國忠為冰山事資治通鑑亦取之不知别有何据近歲興化軍學刋遺事南劍州學刋散録皆可毁明皇雜録二卷鼂氏曰唐鄭處晦撰記孝明時雜事别録一卷題補闕所載十二事陳氏曰其書大中九年序處晦大和八年進士也開元傳信記一卷鼂氏曰唐鄭棨撰紀開元天寳傳聞之事故曰傳信開元昇平源記一卷陳氏曰唐史官吳兢撰叙姚崇十事廬陵王傳一卷陳氏曰唐彭王傅㑹稽徐浩季海撰叙狄仁傑五王事河洛春秋二卷陳氏曰唐揚州司功包諝撰記安史之亂右雜史文獻通考卷一百九十五
