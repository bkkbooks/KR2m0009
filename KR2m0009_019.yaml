body:
  text: 文獻通考卷十九鄱陽馬端臨貴與著征𣙜考六雜征斂山澤津渡周官委人掌斂野之賦斂薪芻凡疏材木材凡畜聚之物野遠郊以外所斂野之賦謂野之園圃山澤之賦也凡疏材草木有實者也凡畜聚之物瓜瓠葵芋禦冬之具也載師漆林之征二十而五疏漆林特重者自然所生非人力所作故也漢高祖時山川園池市肆租稅之入自天子至於封君湯沐邑各自為奉養不領於天下之經費言各收其所賦稅以自供不入國朝之倉庫也文帝後六年弛山澤章氏曰漢之山澤園池之稅本以給供養而少府掌之其後倣古虞衡之意而置水衡乃取少府之所謂山林苑池之稅而付水衡以平之然他日猶有江海陂池屬少府者而海丞主海稅果丞主果實二者皆少府屬官猶掌之於少府之下則亦不盡屬之也惟文帝時稍弛其賦而後世猶有增益其稅而故為六管之令其增損行廢固有時邪武帝元狩四年初算緡錢公卿言郡國頗被災害貧民無産業者募徙廣饒之地陛下損膳省用出禁錢以振元元而民不齊出南畝商賈滋衆貧者畜積無有皆仰縣官異時算軺車賈人之緡錢皆有差請算如故諸賈人末作貰貸賣買居邑貯積諸物及商以取利者雖無市籍各以其物自占占隱度也各隱度其財物多少而為名簿送之於官也率緡錢二十而算一諸作有租及鑄以手力所作而賣之者率緡錢四十算一非吏比者三老北邊騎士軺車一算比例也身非為吏之例非為三老非為北邊騎士而有軺車皆令出一算商賈人軺車二算商賈人有軺車使多出一算重其賦船五丈以上一算匿不自占占不悉戍邊一嵗沒入緡錢有能告者以其半畀之賈人有市籍及家屬皆無得名田以便農敢犯令沒入田貨是時豪富皆爭匿財唯卜式數求入財以助縣官天子乃超拜式中郎賜爵左庶長田十頃布告天下以風百姓而百姓終莫分財佐縣官於是告緡錢縱矣縱放也放令告言楊可告緡遍天下如淳曰告緡令楊可所告言也師古曰此説非也楊可據令而發動之故天下皆被告中家以上大抵皆遇告杜周治之獄少反者乃分遣御史廷尉正監分曹往往即治郡國緡錢得民財以億計奴婢以千萬數大縣數百頃小縣百餘頃宅亦如之於是商賈中家以上大抵破民偷甘食好衣不事畜藏之業而縣官以鹽鐵緡錢之故用少饒矣東萊吕氏曰卜式為小忠而不知大體者也其願輸家業半助邊丞相𢎞以為此非人情不軌之臣然罷報之後此助縣官之心終不衰則非矯飾也惜其未嘗講學故區區以輸財為忠是時富豪皆爭匿財惟式獨欲助費事勢相激故武帝寵式者日厚嫉富豪者日深中家以上大率破雖假手於桑𢎞羊輩茍無式以形之未必如是之酷也元鼎四年令民得畜邊縣得畜牧於邊縣官假馬母三嵗而歸及息十一以除告緡用充入新秦中邊有官馬令民能畜官母馬者滿三嵗十母馬還一駒以給用度得充實秦中人故除告緡之令也先公曰按告緡之令至是行之五年矣武帝之聚斂正為征伐計也得馬息遂不告緡此漢之所以猶愈於秦也嘗觀文帝時才令民實粟塞下便可以減田租武帝時才令邊民畜馬取息便可除告緡蓋一事輒有一事之益後世厲民之政一行則與國俱弊無可哀救雖復縣官百方措置徒為煩擾而於民間無分毫之益可歎也夫宣帝五鳳中大司農中丞耿夀昌白增海租三倍天子從其計御史大夫蕭望之言故御史屬徐宫家在東萊言往年加海租魚不出長老皆言武帝時縣官嘗自漁海魚不出後復與民魚乃出夫隂陽之感物類相應萬事盡然夀昌習於商功分銖之事其深計遠慮未足任宜如故上不聽元帝元鳳元年令郡國無斂今年馬口錢往時有馬口出斂錢今省武帝時租及六畜王莽初設六管之令諸采取名山澤衆物者稅之王莽末邊兵二十萬人仰縣官衣食用度不給數橫賦斂又一切稅吏民資二十而取一又令公卿以下至郡縣黃綬吏皆保養軍馬師古曰保者不許其死傷吏盡復以豫民轉令百姓養民搖手觸禁不得耕桑後漢和帝永元五年自京師離宫果園上林廣成圃悉以假貧民恣得採捕不收其稅九月官有陂池令得採取勿收假稅二嵗九年詔山林饒利陂池魚採以贍元元勿取假稅十二年十五年俱有此令不復録順帝時長吏二千石聽百姓謫罰者輸贖號為義錢託為貧人儲而守令因以聚斂尚書僕射虞詡上疏元年以來貧百姓章言長吏取受百萬以上者胸胸不絶謫罰吏人至數千萬而三公刺史少所舉奏尋永平章和中州郡以走卒錢給貸貧人走卒五百之類行鞭杖者此言錢者令其出資錢不役身也司空劾按州及郡縣皆坐免黜今宜遵前典蠲除權制於是詔書下詡章切責州郡謫罰輸贖自此而止靈帝令刺史二千石及茂材孝廉遷除皆責助軍修宫錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去其守清者乞不之官皆迫遣之又令郡國貢獻先輸中府名為道行費蓋正貢外别有所獻也詳見國用門晉自渡江以來至於梁陳凡貨賣奴婢馬牛田宅文券率錢一萬輸估四百入官詳見商稅門宋文帝元嘉二十七年魏師南侵軍旅大起用度不充王公妃主及朝士牧守各獻金帛等物以助國用下及富室小人亦有獻私財數千萬者揚南徐兖江四州富有之家資滿五十萬僧尼滿二十萬者並四分借一過此率計事息即還宋孝武帝大明初揚州刺史西陽王子尚上言山湖之禁雖有舊科人俗相因替而不奉熂許氣反山封水保為家利自頃以來頽弛日甚富強者兼領而占貧弱者薪樵無托至漁採之地亦又如兹斯實害理之深弊請損益舊條更申常制有司檢壬辰詔書擅占山澤強盜律論贓一丈以上皆棄市左丞羊希以壬辰之制其禁嚴刻事既難遵理與時弛而占山封水漸染復滋更相因仍便成先業一朝頓去易致怨嗟今更刋革立制五條凡是山澤先恆熂爐力居反種竹木薪果為林芿及陂湖江海魚梁鰌鮆七由反即移反常加工修作者並不追舊各以官品占山見官品占田門若先已占山不得更占先占足若非前條舊業一不得禁有犯者水上一尺以上並計贓依常盜論除晉壬辰之科從之齊武帝即位詔免逋城錢自今以後申明舊制初晉宋舊制受官二十日輒送修城錢二千宋太始初軍役大興受官者萬計兵戎機急事有未遑自是令僕以下並不輸送二十年中大限不可勝計文符督切所在擾亂至是除蕩百姓悅焉齊武帝時王敬則為東揚州刺史今會稽郡以會稽邊帶湖海人無士庶皆保塘陂敬則以功力有餘悉詳斂為錢以送臺庫帝納之竟陵王子良上表曰臣忝會稽粗嫻物俗塘丁所上本不入官良由陂湖宜壅橋路須通均夫計直人自為用若甲分毁壞則年一修改乙限堅牢則終嵗無役今乃通課此直悉以還臺租賦之外更生一調致令塘路崩蕪湖源泄散害人損政實此為劇建元初軍用殷廣浙東五郡丁稅一千乃質賣妻子以充此限所逋尚多尋蒙蠲原而此等租課三分逋一明知徒足擾人實自弊國愚謂課塘丁一條宜還復舊唐高宗龍朔三年減百官一月俸賦雍同等十五州民錢作蓬萊宫唐肅宗即位時兩京陷沒民物耗弊乃遣御史鄭叔清等籍江淮富商右族資富什收其二謂之率貸諸道亦稅商賈以贍軍錢一千者有稅德宗時朱滔王武俊田悅背叛國用不給陳京請借富商錢度支杜佑以為軍費才支數月幸得商錢五百萬緡可支半嵗乃以户部侍郎趙贊判度支代佑行借錢令約罷兵乃償之搜督甚峻民有自經者家若被盜然總京師豪人田宅奴婢之估才得八十萬緡又取僦匱納質錢及粟麥糶於市者四取其一長安為罷市遮邀宰相哭訴乃以錢不及百緡粟麥不及五十斛者免而所獲才二百萬緡時軍用不給乃稅間架算除陌其法屋二架為間上間錢二千中間一千下間五百吏執筆握算入人家計其數或有宅屋多而無他資者出錢動數百緡敢匿一間杖六十告者賞錢五萬除陌法者公私給與及買賣每緡官留五十錢舊算三十今加為五十給他物及相貿易者約錢為率算之市牙各給印紙人有買賣隨日署記翌日合算之有自貿易不用市牙者給其私簿無簿者投狀自集其有隱錢百者沒入二千杖六十告者賞十千出犯人家法既行而主人市牙得專其柄率多隱盜公家所入不能半而怨讟滿天下舊制諸道軍出境則仰給度支時討賊兵在外者衆上優恤士卒每出境加給酒肉本道糧仍給其家一人兼三人之給故將士利之各出軍才逾境而止月費錢百三十餘萬緡常賦不能給趙贊乃奏行二法愁怨之聲盈於遠近及涇原兵反大呼長安市中曰不奪爾商户僦質不稅爾間架除陌矣於是間架除陌竹木茶漆鐵之稅皆罷致堂胡氏曰當是時天下稅户三百八萬五千餘户稅榖二百一十五萬七千餘斛而籍兵七十六萬七千餘人是稅户四榖斛三而養一兵他用不預焉被甲荷戈者既不常飽量入以為出國非其國矣今按德宗之橫斂諉曰軍興乏用也然瓊林大盈之積特不過假軍興之名而厚賦以實私藏是以餉賜稍不如意反使涇原驕橫之卒得藉口以為作亂之階然則平時刻剝生民而姑息軍卒竟何益哉唐貞觀初京司及州縣皆有公廨田供公私之費其後以用度不足京官有俸賜而已諸司置公廨本錢以畨官貿易取息計員多少為月料十二年罷諸司公廨本錢以天下上户七千人為胥士視防閣制而收其課計官多少而給之十五年復置公廨本錢以諸司令史主之號捉錢令史每司九人補於吏部所主才五萬錢以下市肆販易月納息錢四千嵗滿受官諫議大夫褚遂良上疏言七十餘司更一二載捉錢令史六百餘人受職太學髙第諸州進士拔十取五猶有犯禁罹法者況廛肆之人茍得無恥不可使其居職太宗乃罷捉錢令史復給京官職田開元十八年御史大夫李朝隱奏請藉百姓一年稅錢充本依舊令高户及典正等捉隨月收利將供官人料錢並取情願自捉不得令州縣牽挽乾元元年敕長安萬年兩縣各備錢一萬貫每月收利以充和顧時祠祭及蕃夷賜宴别設皆長安萬年人吏主辦二縣置本錢配納質積户收息以供費諸使捉錢者給牒免徭役有罪府縣不敢劾治民間有不取本錢立虛契子孫相承為之嘗有毆人破首詣間廄使納利錢受牒貨罪御史中丞栁公綽奏諸司捉錢户府縣得捕役給牒者毁之自是不得錢者不納利矣寶應元年敕諸色本錢比來將放與人或府縣自取及貧人將捉非唯積利不納亦且兼本破除今請一切不得與官人及窮百姓并貧典吏揀擇當處殷富幹了者三五人均使翻轉回易仍放其諸色差遣庶得永存官物又冀免破人家貞元元年敕自今後應徵息利本錢除主保逃亡轉徵鄰近者放免餘並凖舊徵收其所欠錢仍任各取當司闕官職田量事糶貨充填本數元和二年宰臣上言聖政惟新事必歸本疏理五坊户色役令府縣郤收萬人欣喜恩出望外臣等輒釐革舊弊率先有司其兩省納課陪厨户及捉錢人總一百二十四人望令歸府縣色役從之元和十一年御史中丞崔從奏捉錢人等比緣皆以私錢添雜官本所防耗折裨補官吏近日訪聞商販富人投身要司依托官本廣求私利可徵索者自充家業成逋欠者證是官錢非理逼迫為弊非一今請許捉錢户添放私本不得過官本錢勘責有剩並請沒官十四年御史中丞蕭俯奏諸司諸軍諸使公廨諸色本利錢等伏緣臣當司及祕書省等三十二司利錢凖赦文至十倍者本利並放展轉攤保至五倍者本利並放緣前件諸司諸使諸軍利錢節文並不該及其中有納利百姓見臣稱訴納利已至十倍者未蒙一例處分求臣上達天聽伏以南北諸司事體無異納利百姓皆陛下赤子若恩澤均及則雨露無偏乞特賜凖赦放免會昌元年正月赦節文每有過客衣冠皆求應接行李茍不供給必致怨尤刺使縣令但取虛名不惜百姓夫畜皆配民户酒食科率所由蠧政害人莫斯為甚宜為本道觀察使條流量縣大小及道路要僻各置本錢逐月收利或前觀察使前任臺省官不乘館驛者許量事供給其錢便以留州留使錢充每至季終申觀察使如妄破官錢依前科配並同入已贓論仍委出使御史糾察以聞按捉錢之事惟唐有之蓋以供諸司公用之費雖曰官出本錢令其營運納息非鑿空之橫斂及其久也民利於假官之勢則不請本錢白納利息官利於取民之財則所徵利息數倍本錢而其為無藝甚矣故述其事附之雜征斂之後宋太祖皇帝建隆元年詔除滄德棣淄齊鄆乾渡三十九處所算錢或水漲聽民置渡勿收其算五代時有津渡之算水或枯涸改置橋梁有司猶責主者備償至是詔除此後諸州有類是者多因恩宥蠲除陳州私置蔡河瑣民船勝百斛者取百錢有所載倍其征太平興國中詔除之建隆二年詔自今宰相樞密使帶平章事兼侍中中書令節度使依故事納禮錢宰相樞密使三百千藩鎮五百千充中書門下公用仍於中書刻石記授上年月已經納者後雖轉官不再更納舊相復入者納如其數時中書門下言唐制凡視事於中書者納禮錢三千緡近頗隳廢乞舉行之故也按朝廷視官制祿所以養賢官莫崇於相則祿賜宜優於百僚今於上日反徵其錢以充公用可乎今考五代會要後唐天成元年門下中書兩省狀凖舊例檢校官合納光省禮錢近降敕命除翊衛勳庸藩垣將佐外其餘不帶平章事節度使及防禦團練刺史諸道副使郎中以下并三司職掌鹽院官縣令録事參軍判司等凡關此例並可徵收伏緣省司舊例别無錢物祗徵禮錢以充公廨破使遭值離亂致失規繩乞依元行依例徵理自防禦團練刺史至諸道將校押衙各納錢有差則為例已久且不止於使相而已又考是年十二月中書奏準故事應諸道藩鎮帶平章事處各納禮錢五百千充中書修建公署及添置都堂內鋪陳什物敕從之則納此錢者似是唐末以來方鎮據土地修貢獻求為使相之人恐非盛唐之制然觀建隆之詔則在廟堂為相者皆納矣又考梁開平五年敕食人之食者憂人之事况丞相位尊參決大政而堂封未給且無餐錢朕甚愧之宜令日食萬錢之半則當時為相者俸廩尚無之况修公署置什物乎此所以反有無藝之橫取也又按所謂修公署備什物之類唐時有諸司捉錢户捉官本錢營運納息以供此費至五代之時則不復有之而令居職者履任之初自出此錢國初承五代之法遂亦有之故併附於捉錢之後太宗淳化元年詔諸處魚池舊皆省司管係與民爭利非朕素懷自今應池塘河湖魚鴨之類任民採取如經市貨賣乃收稅先時淮南江浙荆湖廣南福建當僭偽之時應江湖及池潭陂塘聚魚之處皆納官錢或令人户占賣輸課或官遣吏主持帝聞其弊詔除之又有橘園水磑社酒蓮藕鵝鴨螺蚌柴薪地鋪枯牛骨溉田水利等名皆因偽國舊制而未除前後纍詔廢省開寶三年令買撲坊務者收抵當止齋陳氏曰買撲始見此至淳化中而買撲酬奬之法次第舉矣買撲之利歸於大户酬奬之利歸於役人州縣坐取其贏以佐經費以其剩數上供此其大略也自熙寧悉罷買撲酬奬之法官自召買實封投狀著價最高者得之而舊章舉廢矣神宗元豐二年導洛通汴司言綱船為商人附載有留阻之弊今洛水入汴無湍駛請置堆垜場於泗州賈物至者先入官場官以船運至京稍輸船算從之三年詔近京以通津水門外順成倉為場元豐二年三月言人户買撲官監及非新酬衙前場務所增收錢並合入三司帳而司農寺以謂官監務外皆是新法拘收錢不當入三司乞留以助募役兼嵗入百萬緡於市易務封樁若失此錢恐不能繼爭辨久之乃從司農之請七年府界諸路坊場錢嵗收六百九十八萬六千緡榖帛九十七萬六千六百石匹有奇新法既鬻坊場河渡司農又并祠廟鬻之募人承買收取淨利官既得錢聽民為賈區廟中判應天府張方平言管下五十餘祠百姓盡已承買閼伯主祀大火火為國家盛德所承微子開國於宋亦本朝受命建號所因又有雙廟乃唐張巡許遠今既許承買小人以利為事必於其間營為招聚紛雜冗褻嵗收甚微實損大體欲乞不賣此三廟以稱國家嚴恭之意上震怒批出曰慢神辱國無甚於斯於是天下祠廟皆得不鬻明年二月中丞鄧潤甫言興利之臣議前代帝王陵寢皆合請射耕墾而司農可之緣此唐之諸陵悉見芟刈聞昭陵已剪伐無遺乞下所屬依舊禁止詔從之哲宗元祐元年侍御史劉摯言坊場舊法買户相承皆有定額毋得增價新法乃使實封入狀唯利價高有舊才百緡而益及千緡者其後類多敗闕請罷實封之法令諸路轉運提舉司會新舊之數酌取其中立為永額召人承買其後詳定役法所度之事請下之諸州若纍界有增以次高一界為額增虧不常以酌中為額或前次所負及五分縣以聞州州與漕司次第保上之仍立界滿承買抵當之制餘皆如舊法從之五年户部郎中高鎛言場務敗闕者請止損淨息其省額如故從之又詔無人承買者許自陳損其錢數明諭以召人願增價者聽若不售則更減之減及八分而不售者提刑司審核權停閉徽宗自崇寧來言利之言殆析秋毫其最甚若沿汴州縣創增鎖柵以牟稅利官賣石炭增賣二十餘場而天下市易務炭皆官自賣名品瑣碎則有四腳鋪床榨磨等錢水磨錢侵街房廊錢廟圖錢淘沙金錢不得而盡記也大觀三年臣僚言比嵗諸郡求以坊場增給公帑不啻二十餘萬緡且慮朝廷封樁寖為厨傳之費請考元豐舊制詳議行之詔令户部以所用封樁及坊場錢數申尚書省按坊場即墟市也商稅酒稅皆出焉今考其明言酒務者入𣙜酤門明言貨稅者入征商門而泛言坊場者則以附雜征𣙜之後牙契稅契始於東晉厯代相承史文簡略不能盡考宋太祖開寶二年始收民印契錢令民典賣田宅輸錢印契稅契限兩月止齋陳氏曰元降指揮應典賣物會問鄰至有不願即書之於帳聽即兩月批印違者依漏稅法所以防姦偽省獄訟非私之也慶厯四年十一月始有每貫收稅錢四十文省之條至政和無所增宣和四年發運使經制兩浙江東路陳亨伯奏乞淮浙江湖福建七路每貫增收二十文充經制移用通舊收錢不得過一百省紹興五年三月敕每貫勘得産人合同錢一十文入總制名起發乾道七年户部尚書曾懷奏人户交易一十貫內正錢一貫除六百九十五文充經總制錢外有三百二十五文欲存留一半餘入總制錢帳另項起發至是牙契今為州縣利源矣神宗元豐時令民有交易則官為之據因收其息徽宗崇寧三年敕諸縣典賣牛畜契書并稅租鈔旁等印賣田宅契書並從官司印賣除紙筆墨工費外量收息錢助贍學用其收息不得過一倍大觀二年以出賣鈔旁息錢事涉苛細罷之政和中應奉事起乃復行宣和五年詔諸路所收鈔旁定帖錢除兩浙路𨽻應奉外餘路並逐州委通判拘收與發運司充糴本高宗建炎元年赦應今日以前典賣田宅馬牛之類違限印契合納倍稅者限百日許自陳蠲免二年初復鈔旁定帖錢靖康時嘗罷之命諸路提刑司掌之無得擅用紹興二年右朝奉郎姚沇言諸路曾被兵火去失契書業人許詣所屬陳理本縣下鄰保證實給户帖從之五年詔諸路勘合錢每貫收十文足即鈔旁定帖錢初令諸州通判印賣田宅契紙自今民間競産而執出白契者毋得行用從兩浙運副吳革請也革言在法田宅契書縣以厚契印造遇人户有典賣納紙墨本錢買契書填緣縣典自掌印板往往多印私賣致有論訴今欲委逐州通判立千字文號印造每月給付諸縣遇民買契當官給付冬十一月詔諸路州縣出賣户帖令民間自行開其所管地宅田畝間架之數而輸其直仍立式行下時諸路大軍多移屯江北朝廷以調度不繼故有是詔既而中書言恐騷擾稽緩乃立定價錢應坊郭鄉村三等户皆三十千鄉村五等坊郭九等户皆一千凡六等惟閩廣下户差減期一等足計綱赴行在即旱傷及四分以上權住聽旨又用殿中侍御史王縉言詔州縣止以簿籍見在數目出給户帖務要簡便不擾如容縱乞取重置於法令刑獄使者察之時州縣追呼頗擾乃命通判職官遍詣諸邑面付人户其兩浙下户展限二月內諸路簿籍不存者許先納價錢俟造簿畢日給帖二十六年户部言印契違日限者罪之而沒其産太重難行徒長告訐欲並依紹興法舊限六十日投稅再限六十日齎錢請契從之二十七年詔人户買賣耕牛並免投納契稅孝宗乾道七年户部言每交易一十貫納正稅錢一貫除六百七十五文充經總制錢外三百二十五文存留一半充州用餘一半入總制錢帳如敢隱漏依上供錢法人户違限不納或於契內減落價貫規免稅錢許牙人併出産户陳首將物業半給賞半沒官每正稅錢一百文帶納頭子錢二十一文二分州縣過數拘收公人邀阻作弊並重置典憲從之臣僚言乞詔有司應民間交易並令先次過割而後稅契凡進産之家限十日繳連小契自陳令本縣取索兩家砧基赤契并以三色官簿夏稅簿力秋苖簿物簿令主簿點對批鑿如不先經過割不許投稅詔敕令所參照見行指揮修立成法八年詔今後遇赦刪去稅契違限許免倍自首一節監司州郡無得自擅免倍稅契違者坐之言者謂今之置産者未嘗以稅契為意蓋起於赦恩許其免納而自首况監司州郡不候朝旨免倍稅契所收錢不復分𨽻窠名一切以資妄用故有此令六年敕令所進呈重修淳熙法上親筆圈記人户內驢駝馬船契書收稅諭輔臣曰凡有此條並令刪去恐後世有算及舟車之言七年臣僚言民間典賣田産必使之請官契輸稅錢其意不徒利也慮高資之家兼并日增下户日益朘削是亦抑之之微意今州縣以人户物力科配空給印紙名為預借契錢殊失法意詔禁止之寧宗嘉定十三年臣僚言州縣交易印契所以省詞訟清稅賦而投報輸直亦有助於財計今但立草契請印紙粘接其後不經官投報者不知其幾也印契具文過割可廢間有交易已畢遷徙他郡二稅茫無所歸州縣徒費追擾至於改換等色減退畝步者不知其幾也乞申嚴成法從之經總制錢宣和末陳亨伯以發運兼經制使因以為名廢於靖康建炎復之紹興初孟庾提領措置財用又因經制之額增析而為總制錢蓋南渡以來養兵耗財為夥不敢一旦暴斂於民而展轉取積於細微之間以助軍費初非強民而加賦也建炎二年冬上在維揚四方貢賦不以期至於是户部尚書吕頤浩翰林學士葉夢得等言亨伯以東南用兵嘗設經制司取量添酒錢及增收一分稅錢頭子賣契等錢斂之於細而積之甚衆求之於所欲而非強其所不欲如增收印契錢出於兼并之家無傷於下户增收賣酒錢合於人情而無害於民官吏俸給除頭子錢百分取一靖康初相繼遽罷欲望博延羣議更加討論且亨伯為河北轉運使又行於京東西昨來河北京東西一嵗得錢近二百萬緡所補不細今若行於兩浙江東西荆湖南北福建二廣嵗入無慮數百萬計况邊事未寧茍不知出此緩急必致暴斂與其暴斂於倉卒曷若取積於細微於是除不便於民者如免行錢減罷曹官役人錢鈔旁定帖錢院虞候充獄子重祿錢牛畜等契息錢契白紙錢以權添酒錢添賣糟錢人户典賣田宅增添牙稅錢官員等請給頭子錢并樓店務增添三分房錢五省令東西八路州軍兩浙江東西荆湖南北福建二廣收充經制錢命各路憲臣領之州委通判拘收季終起發紹興五年閏二月參政孟庾提領措置財用乞以總制司為名而總制錢自此始矣四月臣僚言賦入之利莫大於雜稅茶鹽出納之間每貫增頭子錢五文嵗入不少而財用司言茶鹽已復鈔價其頭子錢難以增添而諸路州縣出納係省錢所收頭子錢依節次指揮每貫共收錢二十三文省內一十文省作經制起發上供餘一十三文並充本路州縣并漕司支用今欲令諸路州縣雜稅出納錢於每貫見收頭子錢上量行增添共作二十三文足除漕司并州舊來合得一十三文省外餘盡併入經制窠名帳內起發補助軍需尚書省又言耆户長雇錢并抵當庫樁四分息錢轉運移用錢勘合朱墨錢出賣係官田舍錢及赦限內典賣牛畜等印契稅錢進獻納貼錢常平司七分錢茶鹽司袋息錢並令諸路州縣樁管應辦軍期而總制司又言人户稅賦畸零如析居異財絹綿零至一寸一錢者亦收一尺一兩米零至一勺一抄者亦收一升之類並與折納至於二廣福建江東西路免役一分寬剩錢若無災傷減閣並令發付行在及兩浙西路役人顧錢除嵗用應副外大軍支用八月江西提舉司言常平錢物舊例每貫收頭子錢五文足今合依諸錢例增作二十三文足除五文依舊法支費外餘增到錢與經制司别作一項窠名起發十一月尚書省言經制錢監司州郡或以軍期應辦為名輒行借兌拘截取撥者乞依諸路州軍通判已得指揮施行州縣輒將經制錢擅行應副兌借拘截取撥輒有侵支互用者內所委官所當職及取撥官並先降兩官放罷人吏徒二年各不以去官赦降原減紹興十六年户部侍郎李朝正言諸路每嵗所取經總制錢委本路提刑并檢法幹辦官點磨拘催嵗終欲通行殿最增及一分以上減三季磨勘二分四分以上議賞有差虧一分以上展三年磨勘二分四分以上議罰有差二十六年禮部侍郎賀允中言比年經總制錢以二十六年以前最高者十九年之數立額其當職官既誘以厚賞又驅以嚴責額一不登每至橫斂民受其弊望詔有司立嵗額既而倉部郎中黃祖舜乞自十九年之外有稍高年分或少損其數詔從之三十一年詔諸路州軍未起二十六年二十七年經總制錢特與除放其二十八年以後欠數令提刑司督責補發孝宗乾道元年詔諸路州縣出納每貫添收錢一十三文省充經總制錢仍將所增錢别項發納左藏西庫補助經費自是公家出納經總制每千共收五十六文光宗登極從吏部尚書顔師魯奏減江東西福建淮東浙西路經總制錢共十七萬一千緡嘉泰初除四川外東南諸州額理經制錢七百八十餘萬四川九十萬緡月樁錢始於紹興二年也時韓世忠駐軍建康宰相吕頤浩朱勝非共議令江東漕臣月樁發大軍錢十萬緡以朝廷上供經制及漕司移用等錢應辦當時漕司不量州軍之力一例均拋既有偏重之弊又於本司移用錢不肯取撥止取於朝廷窠名曾不能給十之二三上供經制無額添酒錢并淨利錢贍軍酒息錢常平錢及諸司封樁不封樁係省不係省錢皆是朝廷窠名也於是州縣橫斂銖積絲纍僅能充數一月未畢而後月之期已逼江東西之害尤甚七年户部員外郎霍蠡言願詔諸路守臣條具所樁實有窠名幾何臨時措畫者若為而辦八年侍郎士㒟及參政李光皆言月樁之害上感動每諭宰臣若得休兵凡取於民者悉除之九年正月復河南州軍赦務與民休息令轉運司具逐州見認月樁錢數申朝廷據實科撥二月詔以州縣大小所入財賦欲斟量適當易於樁辦其日後殿進呈各有窠名但多為漕司占留遂不免敷及百姓上曰若所撥科名錢不足從朝廷給降應副不得一毫及民紹興十七年減江東西月樁錢一十二萬七千緡有奇光宗登極用吏部尚書顔師魯奏減江浙諸郡月樁錢一十六萬五千緡有奇江浙轉運趙汝愚上言臣伏自到任以來不住詢訪民間利害及今來巡厯所至有可以寬裕民利者本司已隨事斟酌輕重次第罷行獨有諸縣措置月樁錢物其間名色類多違法最為一方細民之害臣試舉其大者則有曰麴引錢白納醋錢賣紙錢户長甲帖錢保正牌限錢折納牛皮筋角錢兩訟不勝則有罰錢既勝則令納歡喜錢殊名異目在處非一臣嘗詢究蓋已纍經朝廷指揮及前後監司約束住罷矣大抵類能力制於一時而不能保無於後日其弊正如鼠穴左固則右逸矣至詰其所從出入則首以月樁無科名循例措置為辭甚者姦贓之吏又並緣掊克以濟其私預於簿書之間隂為抵讕之計有司熟視不可稽考其間設有能自植立整齊紀綱者則往往窘於調度拘率牽制困不得逞其豪宗大姓因得持是數者挾持官吏以漁獵細民流弊萬端不可殫述其原則始於月樁太重而已臣不勝憤悶因盡考諸縣月樁出納之數及其初科降之目與夫先後因革之制觀之其始緣江淮用兵供億數萬朝廷深恐一時乏事遂令本路計月樁辦大軍錢物而月樁之名始立然其時降到旁通式內猶許先取無額經制錢不足方取上供錢又不足則取諸司封樁錢其後又增置贍軍七分酒息錢其餘不以有無拘礙錢物皆許移用甚至急闕則朝廷亦時支降茶引度牒之類以濟之是時兵火之初所在皆有餘積公私未告病也今諸司封樁固不得用而無額經制錢州縣皆有定額不盡分𨽻月樁此外所存名目惟上供錢及七分酒息錢二種而已其餘蓋盡以取足於州縣也况夫比年以來州縣用度日廣財賦日蹙所以豫之者嵗益加少謂如州縣科撥二稅與州縣贍用之類而取之者嵗益加多謂如增收頭子錢勘合錢閏月坊場錢之類非作法以取諸民則何以哉臣嘗略計本路月樁之數每嵗為緡錢七十萬而格外所入者半之雖其間亦有傅致文法者大抵法外之斂什常三四也今朝廷縱未能大有蠲除以盡掃宿弊臣謂宜令有司擇其間最重者稍賑恤之板帳錢亦軍興後所創嘉定十六年正月五日兩浙運判耿秉言二浙近在日邊疾苦易於上聞固宜州縣之間雍容為政今百里之寄銓曹見缺至無人願就是安可不思所以救之蓋今縣邑之所苦者不過板帳錢額太重耳額重而收趁不及計無所出則非法妄取以納斛斗則增收耗剩交錢帛則多收糜費幸富人之犯法而重其罰恣胥吏之受贓而課其入索到盜賊不還失主檢校財産不及其卑幼亡僧絶户不候核實而拘籍入官逃産廢田不與銷豁而逼勒填納遠債之難索者豪民獻於官則追催甚於正稅私納之為罰者仇家訟於縣則監納過於贓錢賒酒不至於公吏而抑配及保正户長檢稅不止於商旅而苛細及於盤合奩具今年之稅賦已足而預借於明年田産之交易未成而探契以寄納其他如罰酒科醋賣紙稅醬下拳錢之類殆不可以遍舉亦不能遍知無非違法州郡利其能辦財賦佯若不聞一旦告發則邑宰坐罪而去後人繼之未免循復前例蓋其太重之額既不減則亦别無他策爾且是法創立經隔已數十年物價有低昂户口有息耗安可不隨時而加損乞令臣與諸郡從長斟酌將合減之數開具奏聞去其太甚而立為中制庶幾仰副聖天子惠養斯民之意從之於是鎮江府丹陽金壇兩縣一嵗通減錢二千八百四十四貫有奇平江府常熟縣每年與減一萬貫崑山吳江縣每年合與減發三千貫自此諸路有陳情亦優減不一矣葉適應詔條奏曰何謂一曰經總制錢之患昔李憲經始熙河始有所謂經制財用者其後童貫繼之亦曰經制蓋其所措畫以足一方之用而已非今之所謂經制也方臘既平東西殘破郡縣事須興復陳亨伯以大漕兼經制使移用諸路財計其時所在艱窘無以救急故減役錢除頭子賣糖酵以相補足靖康召募勤王兵翁彥國以知江寧兼總制括民財以數百萬計已散者視若泥沙未用者棄之溝壑維揚駐蹕國用益困吕頤浩葉夢得實總財事四顧無策於是議用陳亨伯所收經制錢者其説以為征商雖重未有能強之而使販賣酒雖貴未有能強之而使飲若頭子之類特取於州縣之餘而可供猝迫之用夢得號為士人而其言如此蓋辦目前者不暇及遠亦無怪也然其所取止於一二百萬而已其後內則為户部外則為轉運使不計前後動添窠名黃子遊栁約之徒或以造運船或以供軍興遞添酒稅隨刻頭子趙鼎張浚相繼督師悉用取給而孟庾以職事之重當總制之名耆户長壯丁雇錢始行起發役法由此大壞二制並出色額以數十計州縣之所趁辦者本不過數條瓜剖碁布皆以分𨽻一州則通判掌之一路則提點刑獄督之胥吏疲於磨算屬官倦於催發酒有栁運副王祠部都督府二分本柄虧折官本茶有稱頭篰息油單壓面商稅有增添七分免役有一分寬剩得産有勘合典賣有牙契至於後也僧道有免丁截撥有糜費故酒之為勝也幾至於二百頭子之去貫也至於五十六而其所收之多也以貫計者至於千七百萬凡今截取以畀總領所之外户部經常之用十八出於經總制士方其入仕執筆茫然莫知所謂老胥猾吏從旁而嗤之上之取財其多名若是於是州縣之所以誅求者江湖為月樁兩浙福建為印板帳其名尤繁其籍尤雜上下焦然役役以度日月者五十年於此向之學士大夫尤有知其不善歎息而不能拯今之新進後出者有智者驚有勇者奮視兩稅為何物而况遠及先王貢賦之法乎臣嘗計之自王安石始正言財利其時青苗免役之所入公上無所用坊場河渡免行茶湯水磨堆垜之額止以給吏祿而已前有薛向後有吳居厚可謂刻薄矣蔡京繼之行鈔法改鈔幣誘賺商旅以盜賊之道利其財可謂甚矣然未有收拾零細解落貫陌飲人以不資之酒其患如經總制之甚者蓋王安石之法桑𢎞羊劉晏之所不道蔡京之法又王安石之所不道而經總制之為錢也雖吳居厚蔡京亦羞為之至其急迫皇駭無所措其手足則雖紹興以來號為名相如趙張者皆安焉又以遺後人而秦檜權忮劫脅一世而出其上及其取於棄餘瑣屑之間以為國用者是何其無恥之至是也哉故總制錢不除一則人才日衰二則生民日困三則國用日乏陛下誠有意加惠天下以圖興復以報仇怨拔才養民以振國用在一出令而已又曰何謂人才日衰本朝人才所以衰弱不逮古人者直以文法繁密每事必守程度按故例一出意則為妄作矣當其風俗之成名節之厲猶知利之不當言財之不當取蓋處而學與出而仕者雖不能合而猶未甚離也今也不然其平居道先古語仁義性與天道者特雅好耳特美觀耳特科舉之餘習耳一日為吏簿書期會迫之於前而操切無義之術用矣曰彼學也此政也學與政判然為二縣則以板帳月樁無失乎郡之經常為無罪郡則以經總制無失乎户部之經費為有能而已矣夫置守令監司以寄之人民社稷其所任必有大於此者而今也推是術以往風流日散名節日壞求還祖宗盛時豈復可得是則人才日衰者經總制錢使之也何謂生民日困俗吏小人之説必曰經總制錢者朝廷所以取州縣之棄餘而板帳月樁各自以力趁辦其於民固未嘗明加之賦斂也贏縮多少惟人而已臣請以事驗之知州去民尚遠而知縣去民最近者也月樁板帳多者至萬緡少者猶不下數千緡昔之所謂窠名者強加之名而已今已失之所以通融收簇者用十數爪牙吏百計罔民日月消削蓋昔之號為壯縣富州者今所在皆不復可舉手今之所謂富人者皆其智足以兼并與縣官抗衡及衣冠勢力之家在耳若夫齊民中産衣食僅足昔可以耕織自營者今皆轉徙為盜賊餓死矣若經總制不住州縣破壞生民之困未有已也何謂國用日乏今嵗得緡錢千五百萬昔三代及漢唐不能進焉所以裕國也而何乏之敢言陛下知夫博者乎其驟為孤注與不博而丐其贏之一二者皆其本先竭者也為國有大計自始至末必有品節條章豈有左右望而羅其細碎不收之物且均之為朝廷出納也又從而刻削其頭子賣酒取數倍之息若此者猶可以為國乎使國不貧宜不至此既至此矣何以能富故經總制錢不除則取之雖多斂之雖急而國用之乏終不可救也今欲變而通之莫若先削今額之半正其窠名之不當取者罷去然後令州縣無敢為板帳月樁以困民黜其舊吏刻削之不可訓誨者而拔用惻怛愛民之人使稍修牧養之政其次罷和買其次罷折帛最後議茶鹽而寬減之若此則人才不衰生民不困矣夫財用之所以至此者兵多使之也財與兵相為變通則兵數少而兵政舉若此則國用不乏矣陛下豈有愛於多財多兵哉直未得其所以去之之道耳一舉而天下定王業之所由始也右經總制月樁板帳等錢所取最為無名雖曰責辦州縣不及百姓然朱文公嘗論其事以為自户部四折而至於縣如轉圜於千仞之坂至其址而其勢窮矣縣何所取之不過巧為科目以取之於民耳而議者必且以為朝廷督責官吏補發非有與於民也此又與掩耳盜鐘之見無異蓋其心非有所蔽而不知特藉此説以詿誤朝聽耳此至當之論昔太史公論桑𢎞羊之善理財以為民不加賦而上用足而司馬溫公謂其不過設法隂奪民利然𢎞羊所謂理財若鹽鐵則取之山澤也若酒酤均輸舟車之算則取之商賈逐利者也蓋山海天地之藏而商賈坐籠不資之利稍奪之以助縣官經費而不致盡倚辦於農田之租賦亦崇本抑末之意然則𢎞羊所為亦理財之良法未可深訾也至後世則若茶鹽若酒酤若坑冶若商稅官既各有名額以取之未嘗有遺利在民間矣而復别立窠名以為取辦州縣所斂不及民將以誰欺此水心所以言非惟桑𢎞羊劉晏所不道雖蔡京吳居厚之徒亦羞為之者是也蓋宋承唐之法天下財賦除其供輦送京師之外餘者並留之州郡至於坊場坑冶酒稅商稅則興廢增虧不常是以未嘗立為定額其留州郡者軍資庫公使庫係省錢物長吏得以擅收支之柄景德以來雖屢有拘轄比算之令然祖宗法度寬大未嘗究竟到底熙豐以後驅磨方密然又有青苗助役市易免行等項錢物則州郡所入亦復不少過江以來軍屯日盛國用大困遂立經總制等窠名以取之雖曰增征商之羡餘減出納之貫陌而亦所以收州縣之遺利也然倥偬之際不暇審訂故不量州軍之力一例均拋而額之重者不可復輕督迫之餘州縣遂至别立苛橫之法取之於民紹興講和以後至乾淳之時諸賢論之屢矣如趙丞相所奏及水心應詔所言最為詳明然言其弊而不思所以革弊之方則亦未免書生之論蓋經總制等窠名皆起於建炎紹興間而彼何如時也強敵壓境嵗有薦食吞噬之謀翠華南巡未知稅駕息肩之所兵屯日盛將帥擅命而却敵之功無嵗無之固非計財惜費之時則何暇為寬征薄斂之事隆興再講和好之後國勢稍張敵患亦息雖曰詰戎兵討軍實不當廢弛然文物禮樂既已粲然承平之舊矣則無名之征權宜之法豈不可講求而蠲削之議者必曰錢榖數目浩大而科取各有去著未易盡捐然酒價牙契之利可以增羡則當於坊場要閙之地人物殷實之處而明增之不當例立此法而使州縣之凋弊無措者不免别賦於民以取足也官員請俸之給可以尅除則當視其員之太冗者俸之太優者而明減之不當掯留頭錢而使士大夫之受俸於官者不免有口惠而實不至之譏也州郡樁留之財賦可以收取則當擇其郡計之優厚者於留州錢內明增上供而凋弊之郡則不復責取如此考核明白之後則正其名色曰某郡酒坊牙契錢增羡幾何某郡增解户部上供錢幾何諸州減除冗官俸錢幾何按期申解而盡削經總制月樁板帳之名則是三者之名已去而三者之利未盡捐也其未盡捐者明以增課減俸等項之所得起解而其名既去則州縣不得借鑿空取辦挨那不敷之説而違法取財以困民上下之間豈不兩利蓋天下之財皆朝廷之財遮藏諱避而暗取之固不若考核名實而明取之且使牙契酒坊增羡等項既明屬版曹則異日或有趁辦不行之處亦未嘗不可明致蠲減之請今朝廷之所以取之州縣者曰經總制月樁板帳錢也而州縣之所藉以辦此錢者曰酒坊牙契頭子錢也或所取不能及額則違法擾民以足之曰輸納斛面富户詞訟役人承替違限科罰之類是也上下之間名目各不吻合州縣以酒坊牙契不辦訴之版曹則朝廷曰吾所取者經總制錢而已未嘗及此而不知其實取此以辦彼也百姓以斛面罰錢等事訴之朝廷則州縣曰吾以辦經總制錢而已未嘗入已而不知上取其一而下取其十也互相遮覆文不與而實與百姓如之何而不困固不若大行核實擇其可取者正其名而使不失經常之賦其不應取者削其名而可絶並緣之姦豈非經久之計夀皇英主乾淳間賢俊滿朝而計不及此惜哉文獻通考卷十九
