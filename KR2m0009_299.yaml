body:
  text: 文獻通考卷二百九十九鄱陽馬端臨貴與著物異考五木異華孽殷大戊亳有祥桑榖共生二木合而共生傳曰俱生乎朝七日而大拱兩手合為拱伊陟戒以修德而木枯劉向以為桑猶喪也榖猶生也殺生之柄失而在下近草妖一曰野木生朝而暴長小人將暴在大臣之位危亡國家象朝將虛之應也春秋魯僖公三十三年十二月李梅實詳見草異門考王十三年冬晉桃杏實顯王元年冬桃華於秦漢惠帝五年冬桃李華棗實呂后元年秋桃李華文帝六年冬十月桃李華昭帝時上林中大柳樹斷仆地一朝起立生枝葉有蟲食其葉成文字曰公孫病已立昌邑王國社有枯樹復生枝葉眭孟以為木隂類下民象當有故廢之家公孫氏從民間受命為天子者昭帝富於春秋霍光秉政以孟妖言誅之後昭帝崩無子徴昌邑王賀嗣位狂亂失道光廢之更立衛太子之孫是為宣帝宣帝本名病已京房易傳曰枯楊生稊師古曰大過九二爻辭也稊楊秀之始生者音徒奚反枯木復生人君亡子元帝初元四年皇后曾祖父濟南東平陵王伯墓門梓柱卒生枝葉上出屋孟康曰王伯莽之祖也師古曰莽髙祖父也故下云髙祖考卒讀曰猝猝暴也劉向以為王氏貴盛將代漢家之象也後王莽篡位自説之曰初元四年莽生之歲也當漢九世火德之厄而有此祥興於髙祖考之門門為開通梓猶子言王氏當有賢子開通祖統起於柱石大臣之位受命而王之符也建昭五年兖州刺史浩賞禁民私所自立社張晏曰民間三月九月又社號曰私社臣瓚曰舊制二十五家為一社而民或十家五家共為田社是私社師古曰瓚説是山陽橐茅鄉社有大槐樹師古曰橐縣名也屬山陽郡茅鄉橐縣之鄉也橐音拓吏伐斷之其夜樹復立其故處成帝永始元年二月河南街郵樗樹生枝如人頭師古曰郵謂行書之舍樗樹似椿樗音丑余反椿音丑眉倫反目鬚皆具亡髮耳哀帝建平三年十月汝南西平遂陽鄉柱仆地生枝如人形師古曰仆頓也音赴身青黃色靣白頭有鬚髮稍長大凡長六寸一分京房易傳曰王德衰下人將起則有木生為人狀哀帝建平三年零陵有樹僵地師古曰僵偃也音疆圍大六尺長十丈七尺民斷其本長九尺餘枯三月樹卒自立故處師古曰卒讀曰猝京房易傳曰棄正作淫厥妖木斷自屬師古曰屬連續也音之欲反天辟惡之如淳曰天辟謂天子也師古曰辟音璧成帝建始四年秋桃李實後漢安帝元初三年東平陸上言木連理序例曰凡瑞應自和帝以上政事多美近於有實故書見於某處自安帝以下王道衰缺容或虛飾故書某處上言也延光三年潁川言木連理桓帝建和二年河東言木連理延熹九年雒陽城局竹柏葉有傷者占曰天子凶靈帝熹平三年右校别作中有兩樗樹皆髙四尺所其一株宿夕暴長長丈餘大一圍作胡人狀頭目鬢鬚髮備具京房易傳曰王德衰下人將起則有木生人狀臣昭以木生人狀下人將起京房之占雖以證驗貌類胡人猶未辨了董卓之亂實擁胡兵傕汜之時充斥尤甚遂窺間宫嬪剽虐百姓鮮卑之徒踐籍畿封胡之害深亦已毒矣五年十月壬午御所居殿後槐樹皆六七圍自拔倒樹根在上臣昭曰槐是三公之象貴之也靈帝授位不以德進貪愚是升清賢斯黜槐之倒植豈以斯乎中平中長安城西北六七里空樹中有人面生鬢魏志曰建安二十五年正月曹公在雒陽起建始殿伐濯龍樹而血出又掘徙梨根傷而血出曹公惡之遂寢疾是月薨獻帝興平元年九月桑復生椹可食臣昭曰桑重生椹誠是木異必在濟民安知非瑞乎時蒼生死敗周秦殱盡餓魂餒鬼不可勝言食此重椹大拯危命雖連理附枝亦不能及若以為怪則建武野榖旅生麻菽尤盛復是草妖邪建安二十五年正月魏武帝在洛陽起建始殿伐濯龍樹而血出又掘徙梨根傷亦血出帝惡之遂寢疾未幾崩蜀後主景曜五年宫中大樹無故自折魏文帝景初三年十月桃李華吳孫亮建興元年九月桃李華晉惠帝元康二年春巴西郡界竹生紫花結實如麥外皮青中赤白味甘元康九年六月庚子有桑生東宮西廂日長尺餘甲辰枯死此與殷大戊同妖太子不能悟故至廢戮也班固稱野木生朝而暴長小人將暴居大臣之位危國亡家之象朝將為墟也是後孫秀張林用事遂至大亂永康元年四月立皇孫臧為皇太孫五月甲子就東宫桑又生於西廂眀年趙王倫篡位鴆殺臧此與愍懷同妖也是月壯武國有桑化為柏而張華遇害壯武華之封邑也孝懷帝永嘉二年冬項縣桑樹有聲如解材人謂之桑樹哭按劉向説桑者喪也又為哭聲不祥之甚是時京師虛弱胡寇交侵東海王越無衛國之心四年冬季而南出五年春薨於此城石勒邀其衆圍而射之王公以下至衆庶死者十餘萬人又剖越棺焚其尸是敗也中原無所請命洛京亦尋覆沒桑哭之應也六年五月無錫縣有四株茱萸樹相樛居虬反而生狀若連理先是郭景純筮延陵蝘於殄反字或作鼹音偃鼠遇臨之益曰後當復有妖樹生若瑞而非辛螫音釋之木也倘有此東西數百里必有作逆者及此木生其後徐馥果作亂亦草妖也郭又以為木不曲直其七月豫章郡有樟諸良反樹久枯是日忽更榮茂與漢昌邑枯社復生同占是懷愍淪陷之徴元帝中興之應也元帝太興四年王敦在武昌鈴下儀仗生華如蓮華五六日而萎落此木失其性干寶以為狂華生枯木又在鈴閣之間言威儀之富榮華之盛皆如狂華之發不可久也其後敦果以逆戮一説亦華孽也於易枯楊生華眀帝太寧元年九月會稽剡縣木生如人面是後王敦稱兵作逆禍敗無成昔漢哀成之世並有此妖而人貌備具故其禍亦大今此但如人面而已故其變也輕矣成帝咸和六年五月癸亥曲阿有柳樹枯倒六載是日忽復起生至九年五月甲戌吳縣吳雄家有死榆樹是日因風雨起生與漢上林斷柳起生同象初康帝為吳王於時雖改封琅邪而猶食吳郡為邑是帝越正體饗國之象也曲阿先亦吳地象見吳邑雄之舍又天意乎哀帝興寧三年五月癸卯廬陵西昌修眀家有僵栗樹是日忽復起生時孝武年始四歲俄而哀帝崩海西即位未幾而廢簡文越自藩王入纂大業登阼享國又不踰二年而孝武嗣統帝諱昌眀識者竊謂西昌修眀之祥帝諱實應焉是亦與漢宣帝同象也海西太和元年涼州楊樹生松天戒若曰松者不改柯易葉楊者柔脆之木今松生於楊豈非永久之業將集危亡之地邪是時張天錫稱雄於涼州尋而降苻堅孝武太元十四年六月建寧郡銅樂縣枯樹斷折忽然自立相屬京房易傳曰棄正作淫厥妖木斷自屬妃后有專木仆音赴反立是時正道多僻其後張夫人專寵及帝崩兆庶歸咎張氏焉安帝元興三年荆江二州界竹生實如麥劉曜時西眀門內大樹風吹折經一宿樹忽變為人形髮長一尺鬚眉生三寸皆黃白色有斂手之狀亦有兩腳著裙之形惟無目鼻每夜有聲十日而生柯條遂成大樹枝葉甚茂石勒微時所居武鄉北原山上草木皆有鐵騎之象家園中人參花葉甚茂悉成人狀父老及相者曰此胡狀貌竒異志度非常不可量也宋孝武帝孝建元年芳香琴堂東西有雙橘連理改芳香堂為連理堂魏太武太延元年魏郡野木連理齊後主武平五年鄴城東青桐樹有如人狀京房易傳曰王德衰下人將起則有木生為人狀時後主怠於政事耽荒酒色大發徭役後二嵗而亡木不曲直之效七年宫中有樹大數圍夜半無故自拔齊以木德王無故自拔亡國之應其年齊亡隋文帝開皇八年四月幽州人家以白楊木懸竈上積十餘年忽生三條皆長三尺餘甚鮮茂仁壽二年春盩厔人以楊木為屋梁生三條長二尺京房易傳曰妃后有顓木仆反立斷枯復生獨孤后專恣之應也仁壽元年十月蘭州楊樹上松生髙三尺六節十二枝宋志曰松不改柯易葉楊者危脆之木此永久之業將集危亡之地也是時帝惑讒言幽廢冡嫡初立晉王為皇太子天戒若曰皇太子不勝任永久之業將致危亡帝不悟及帝崩太子立是為煬帝竟以亡國仁壽四年八月河間柳樹無故枯落既而花葉復生京房易飛候曰木再榮國有大喪是嵗宫車晏駕唐武德四年亳州老子祠有枯樹復生枝葉老子唐所祖也占曰枯木復生權臣執政眭孟以為有受命者九年三月順天門樓東柱已傾毁而自起占曰木仆而自起國之災貞觀十八年十月山南獻木連理交錯玲瓏有同羅木一丈之幹并枝者二十餘所二十年正月玉華宫李樹連理隔澗合枝顯慶四年八月有毛桃樹生李李國姓也占曰木生異實主國殃垂拱四年三月雨桂子於台州旬餘乃止占曰天雨草木人多死長壽二年十月萬象神宫側柳杉皆變為柏柏貫四時不改柯易葉有士君子之操柳杉柔脆小人性也象小人居君子之位延載元年九月內出梨花一枝示宰相萬木搖落而生花隂陽黷也傳曰天反時為災又近常燠也景雲二年髙祖故第有柿樹自天授中枯死至是復生神龍二年十月陳州李有華鮮茂如春開元二十一年蓬州枯楊生李枝有實與顯慶毛桃生李同占二十九年亳州老子祠枯樹復榮大厯九年晉州神山縣興唐觀枯檜復生興元元年春亳州真源縣有李樹植已十四年其長丈有八尺至是枝忽上聳高六尺周回如蓋九尺餘李國姓也占曰木生枝聳國有寇盜是嵗中書省枯柳復榮貞元四年正月雨木於陳留十里許大如指長寸餘中空所下立如植木生於下而自上隕者上下易位之象碎而中空者小人象如植自立象元和十一年十二月桃李華十五年九月己酉大雨樹無風而摧者十五六近木自拔也占曰木自拔國將亂長慶二年七月幽州奏當道有李樹兩根並生相去七寸連理去地二尺合為一幹向上一體外分布枝葉髙一丈三尺有實二百二十一顆長慶三年十一月成都栗樹結實食之如李太和二年九月徐州􅉸州李有華實可食三年成都李樹有木瓜空中不實會昌三年冬沁源桃李華咸通十四年四月成都李實變為木瓜時人以為李國姓也變者國奪於人之象廣眀元年冬桃李華山華皆發二年春眉州有檀樹已枯倒一夕復生中和二年九月太原諸山桃杏華有實後唐同光二年三月唐州奏淮瀆廣潤王廟有兩樹東西相去七尺五寸各出地七尺五寸兩樹相向連理畫圖以進晉開運二年十一月鄧州奏穰縣和平鄉竹合歡畫圖進之蜀王建永平二年劔州木連理宋太平興國六年正月溫州瑞安縣民張度解木五片皆有天下太平字雍熙二年八月刑部尚書宋琪家牡丹生三華淳化三年冬十月京師太平興國寺牡丹生華占曰有喪是嵗恭孝太子薨至道二年秋九月環慶州梨生華占曰有兵眀年敵寇朔方咸平元年九月河南府鞏縣柴務牡丹華六年修昭應宫有木斷之文如點􅃮貫徹上下體若梵書八月召近臣觀龍圖閣瑞木有文成字一有北斗七星形一有佛手形一有蛇形十一月襄州民劉七言家生木有文如龍魚鳯鶴之狀七年五月撫州修天慶觀解木有文如墨畫雲氣峯巒人物衣冠之狀焉七月綿州彰眀縣崇仙觀柱有文為道士形及北斗七星象八年晉州慶唐觀古柏中别生槐長丈餘又葛生柏中分條垂蔓下覆九年舒州懷寧縣民家二柳相距三尺許其枝合如一資州梅樹與青棡樹上合成連理太平軍紅橘連理又黃橘附桑枝而生瑞聖園槐一株中分四枝上復合為一眉州修天慶觀江中獲巨木數百咸平二年三月宣池歙杭越睦衢婺州箭竹生米如稻詳見榖異門慶厯六年九月甲辰登州有巨木浮海而出者三千餘八年九月甲子潭州南嶽南臺寺瑞應峯前一夕雷雨平地涌木若龜首足具髙二尺圍一丈熙寧元年三月簡州木連理是嵗英州因雷震一山梓樹盡枯而為龍腦價為之賤至京師一兩才直錢一千四百二年建州民獲木龍詳見龍蛇之孽十年八月乙巳惠州言柚木有文曰王帝萬天下太平元豐元年五月劍州木連理三年六月己未饒州長山雨木子數畝狀類山芋子味香而辛土人以為木子又曰菩提子眀道中嘗有之是嵗大稔十二月唐州泌陽縣甘棠木連理六年五月亳州衛真縣洞霄宮枯槐生枝葉元祐元年八月己丑杭州民俞舉慶七世同居家園木連理五年四月德州言木連理元符元年八月施州李木連理二年九月眉州眉山縣榿木二株異根同幹本枝相附崇寧四年正月汝州襄城縣李梨木連理大觀元年三月湟州言爛木生葉八月端州永興軍並言木連理二年十月乙巳兖州龔邱縣檜生花如蓮實十二月岢嵐軍園池生瑞木政和二年七月玉華殿萬年枝木連理是月乙酉南雄州言楓木連理十月安州武義縣木根有萬宋年嵗四字四年建州言木連理五年五月禁中芭蕉連理六月辰州沅陵縣江漲流出楠木二十七條可為眀堂梁柱蔡京等拜表賀九月丙申徐州彭城縣柏開花十二月辛丑真定府言元氏縣民王置屋柱槐木再生枝葉約髙四十餘尺是嵗邵州海棠木連理澤州台州槐木連理荆門軍紫薇木連理六年坊兖洪眀夔徐新全隰太平州並言木連理梅州枯木生枝宣和二年四月永州民劉思析薪兩邊各有天下太平字紹興十四年四月虔州民毁欹屋析柱木理有字五其文曰天下太平時守臣薛弼上之時土宇分裂南北塗炭不儷於事近木妖也或曰木之生也在先朝盛時二十年八月福州沖虛觀皂策木翠策再實二十一年池州建德縣定林寺桑生李實栗生桃實占曰木生異實國主殃二十五年十月贛州獻太平木如虔時秦檜擅朝喜飾太平郡國多上草木之妖以為瑞二十七年四月徽州祁門縣圃桃已實復華隆興初漢陽軍有插柳枝於石罅者木無根石無土而秀茂成隂嵗有華實先是郡獄誣服孝婦殺姑當刑祝髻上花以自眀行刑者如其言而生此寃氣之鍾於木而木反麗土之常者也淳熙中興化軍仙遊縣九座山古杉木末生花氣如蘭淳熙十六年三月揚州桑生瓜櫻桃生茄此草木互為妖也七月晉陵縣民析薪中有木字曰紹熙五年如是者二是時紹熙新元猶未頒也而紹熙紀號果止五年此近木妖也紹熙四年臨安府富陽縣栗生檎實五年十一月辛亥行都雨木與唐志貞元陳留雨木同占木生於下而自上隕者將有上下易位之象越月吏部侍郎彭龜年上疏論知閣門事韓托胄姦萌坐黜後托胄擅朝嘉定六年五月己巳嚴州淳安遂安桐廬三縣大木自拔占曰木自拔國將亂草異春秋僖公三十三年十二月隕霜不殺草李梅實劉歆以為草妖劉向以為今十月周十二月於易五為天位君位九月隂至五通於天位其卦為剝剝落萬物始大殺矣眀隂從陽命臣受君令而後殺也今十月隕霜而不能殺草此君誅不行舒緩之應也時公子遂專權三桓始世官其後遂殺子赤三家逐昭公董仲舒指略同京房易傳曰臣有緩兹謂不順厥異霜不殺也李梅當剝落反實近草妖先華而後實不書華舉重者也隂成陽事象臣顓君作威福一曰冬當殺反生象驕臣當誅不行其罰也故冬華華者象臣邪謀有端而不成至於實則成矣一曰君舒緩其燠氣不藏則華實復生董仲舒以為李梅實臣下強也記曰不當華而華易大夫不當實而實易相室師古曰相室猶言相國謂宰相也相室相王室冬水王木相故象大臣漢元帝永光二年八月天雨草而葉相樛結大如彈丸平帝元始元年正月天雨草狀如永光時京房易傳曰君吝於祿信衰賢去厥妖天雨草後漢安帝元初三年有瓜異本共生一瓜同蒂時以為嘉瓜或以為瓜者外延離本而實女子外屬之象也是時閻皇后初立後閻后與外親耿寶等共譛太子廢為濟隂王更外迎濟北王子犢立之草妖也古今注曰和帝永元七年三月江夏縣民舍柱生兩枝其一尺五寸分八枝其一尺六寸分五枝皆眚也靈帝中平元年夏東郡陳留濟陽長垣濟隂寃句離狐縣界風俗通曰西及城皇陽武城郭路邊有草生其莖靡纍腫大如手指狀似鳩雀龍蛇鳥獸之形五色各如其狀毛羽頭目足翅皆具風俗通曰亦作人狀操持兵弩萬萬備具非但倣佛類良熟然也近草妖也是嵗黃巾賊始起皇后兄何進異父兄朱苖皆為將軍領兵後苖封濟陽侯進苖遂秉威權持國柄漢遂微弱自此始焉應劭曰關東義兵先起於宋衛之郊東郡太守喬瑁負衆怙亂陵蔑同盟忿嫉同類以殞厥命陳留濟隂迎助謂為離德棄好即戎吏民殱之草妖之興豈不信哉吳孫亮五鳯元年六月交趾稗草化為稻昔三苖將亡五榖變種此草妖也其後亮廢孫皓天璽元年吳郡臨平湖自漢末穢塞是時一夕忽開除無草長老相傳此湖塞天下亂此湖開天下平吳尋亡而九服為一天紀三年八月建鄴有鬼目菜生工黃狗家依緣棗樹長丈餘莖廣四寸厚二分又有蕒菜生工吳平家髙四尺如枇杷形上圎徑一尺八寸莖廣五寸兩邊生葉緑色東觀案圖名鬼目作芝草蕒菜作平慮遂以狗為侍芝郎平為平慮郎皆銀印青綬干寶曰眀年平吳王濬止船正得平渚姓名顯然指事之徴也黃狗者吳以土運承漢故初有黃龍之瑞及其季年而有鬼目之妖託黃狗之家黃稱不改而貴賤大殊天道精微之應也容齋洪氏隨筆曰吳歸命侯天紀三年唐中宗景龍二年俱有苦蕒菜生之異説者以為草妖豫按蕒菜即苦蕒今俗呼為苦篤者是也天紀景龍之事甚相類歸命次年亡國中宗後一年遇害雖事非此致亦可謂妖矣平慮草不知何狀揚雄甘泉賦并閭注如淳曰并閭其葉隨時政政平則平政不平則傾也顔師古曰如氏所説自是平慮耳然則亦異草也鬼目見爾雅郭璞云今江東有鬼目草莖似葛葉員而毛如耳璫也赤色叢生廣志曰鬼目似梅南人以飲酒南方草木狀曰鬼目樹大者如木子小者如鴨子七月八月熟色黃味酸以蜜煮之滋味柔嘉交趾諸郡有之交州記曰髙大如木瓜而小傾邪不周正本草曰鬼目一名東方宿一名連蟲陸名羊蹄晉惠帝元康二年二月巴西郡界草皆生花結子如麥可食時帝初即位楚王瑋矯詔誅汝南王亮及太保衛瓘帝不能察今非時草結實此恆燠寬舒之罰安帝義熙二年九月揚武將軍營士陳蓋家有苦蕒菜莖髙四尺六寸廣三尺二寸厚三寸亦草妖也此殆與吳終同象識者以為苦蕒者買勤苦也自後歲歲征討百姓勞苦是買苦也十餘年中姚泓烏宏反滅兵始戢是苦蕒之應也義熙中宫城上及御道左右皆生蒺藜亦草妖也蒺藜有刺不可踐而行生宮牆及馳道天戒若曰人君不聽政雖有宫室馳道若空廢也故生蒺藜宋眀帝泰始四年春正月丙辰朔雨草於宫陳後主末年臨平湖草久塞忽然自通魏太武太延元年有嘉瓜合蒂生於中山隋髙祖時上黨有人宅後每夜有人呼聲求之不得去宅一里所但見人參一本枝葉峻茂因掘去之其根五尺餘具體人狀呼聲遽絶蓋草妖也視不眀之咎時晉王隂有奪宗之計髙祖不悟聼邪言廢無罪因此而亂也唐武德四年益州獻芝草如人狀占曰王德將衰下人將起則有木生為人狀草亦木類也景龍二年岐州郿縣民王上賔家有苦蕒菜髙三尺餘上廣尺餘厚二分近草妖也三年內出蒜條上重生蒜蒜惡草也重生者其類衆也四年亰畿藍田山竹實如麥占曰大飢開元二年終南山竹有華實如麥嶺南亦然竹並枯死是嵗大飢民採食之占曰竹柏枯不出三年有喪十七年睦州竹實元和十三年八月鹽鐡使奏郾城上蔡等縣生䔄草引蔓結實味甘人賴為食太和九年冬鄭注金帶有菌生近草妖也開成四年六月襄州山竹有實成米民採之光啓元年七月河中解永樂生草葉自相樛結如旌旗之狀人以為旗子草二年七月鳯翔麟遊草生如旗狀占曰其野有兵宋乾德四年渭州范裕獻嘉蓮一莖二花符瑞志所載雙頭花甚多不及悉書太平興國七年八月知易州白繼贇獻合歡瓜知河南府焦繼獻合歡牡丹花大中祥符四年四月江陵府刑部郎中袁煒家圃芍藥雙華並蕚符瑞志所載蓮牡丹芍藥甘瓜雙生者甚多不悉録各托其一以偹異聞咸平二年知黃州張鑑獻瑞草二本九月鄂州武昌縣生異草如柏色瑩白枝葉傅地如繡淳化三年知開州趙得忠獻忘憂草圗花蕚相重而生咸平二年閏三月宣池歙杭越睦衢婺州箭竹生米如稻時民飢採之充食大中祥符四年四月亰師竹有華占主嵗不登天禧元年四月邵州邵陽縣竹上生穗如米居民飢乏食採食之又饒州浮梁縣山竹生穗如米慶𩔶元年二月丙午亰師雨藥熙寧六年十二月徐州滕縣官舍生異草經月不腐元豐二年六月忠州雨豆元豐間眉州􅎚州處州俱生瑞竹元祐三年六月忠州臨江縣雨白黍又雨黑黍大觀元年廬州雨大豆政和四年八月建州言境內竹生米數千萬石五年十一月癸酉越州言承天寺瑞竹一竿七枝枝幹相似其葉圎細生花結實紹興十六年正月辛未瀘州雨豆豆生於地自天而下近草妖也二十一年饒州鄱陽縣石門民家籬竹生重蕚牡丹又民家竈鼎生金色蓮花萬州虔州汀州俱有蓮同蒂異蕚榖異野榖竹米周唐叔得禾異畝同頴唐叔於其食邑內得異禾畝壠頴穗也禾各生一壟而合為一穗故異也獻諸天子王命唐叔歸周公於東異畝同頴天下和同之象周公德所致周公東征未還故命唐叔以禾歸周公作歸禾周公既得命禾旅天子之命旅陳也陳成王歸禾之命而推美成王善則稱君作嘉禾漢哀帝建平元年光武生於濟陽縣舍時皇考南頓君為縣令是嵗縣界有嘉禾生一莖九穗因名光武曰秀後漢光武建武三年野榖旅生旅寄也不因播種而生故曰旅今字書作穭音吕古字通麻菽尤甚被於山阜人收其利焉眀帝永平十一年嘉禾生安帝延光二年九真言嘉禾生東觀記曰禾一百五十六夲七百六十八穗桓帝建和二年嘉禾生大司農帑藏魏陳留王咸熙元年安彌福祿縣各言嘉禾生吳孫權黃龍三年由拳野稻自生改為禾興縣會稽南始平言嘉禾生赤烏七年宛陵言嘉禾生孫亮時交趾稗草化為稻詳見草異門晉惠帝元康二年竹結實如麥又有草結實如麥俱見草妖門安帝元興三年荆江二州界竹結實如麥宋孝武帝孝建二年清景殿西甍鴟尾中央生嘉禾一株五莖乃以清景殿為嘉禾殿梁武帝中大同三年秋吳興生野稻飢者利焉魏太武太延元年嘉禾合秀於恆農唐開元二年竹結實如麥十九年四月揚州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異元和七年十一月􅎚州上言龍川界嘉禾生開成四年六月襄州竹成實如米太和二年福建進瑞粟一十莖大中二年七月福建觀察使殷儼進十莖莖有五六穗六年九月淮南節度使杜悰奏海陵髙郵兩縣百姓於官河中漉得異米煮食呼為聖米天祐元年七月河南府奏榖水村內嘉禾合穗後唐天成四年七月遂州進嘉禾一莖九穗蜀王建武㝎二年廣都嘉禾合穗宋乾德二年十月眉州獻禾生九穗圗四年六月果州南充縣民何約田禾一莖十三穗一莖十一穗七月又生一莖九穗開寶八年八月嘉州廨有禾一莖十四穗生庭中河間府寶鼎縣民張知友田禾隔四壠相去二尺許合穗太平興國三年懷安軍金水縣民田禾一莖三十六穗六年召近臣觀嘉榖於後苑有七穗至四十八穗者七年八月府州府谷縣民劉善田禾隔三壠合成一穗遼州平城縣民田禾隔二壠至五壠合穗有十三夲或二十一莖合為一者天禧元年竹成米見草異門五年四月襄州襄陽縣民田榖穭生成實乾德四年澶州濮陽縣民李溫田麥兩岐三岐四岐各五十夲五岐二十夲六岐五本淳化五年亳州永城縣麥一莖三穗四岐同幹者三十夲咸平二年竹生米見草異門景德二年􅎚州麥五岐大中祥符四年五月唐汝廬宿椘泗濠州民田麥自生其六月夀州六安縣民田穭生麥八十餘頃天禧五年四月襄州營田務麥自生者四頃餘太平興國四年八月宿州符離縣渒湖穭生稻民采食之味如麵謂之聖米淳化五年溫州靜光院有稻穭生石罅九穗皆實大中祥符三年二月江陵公安縣民田獲穭生稻四百斛至道二年四月福州福清縣廨雨黃黑豆又長樂太平二鄉雨黑豆皆堅實異常大中祥符六年二月泰州管內四縣生聖米大如芡實九年慶州安化縣民王景溫田秫一麩二米右三朝瑞符志載自乾德以來至天禧郡縣所上嘉禾異麥野榖之屬殆不勝書姑托其尤異者一二著於此天聖元年六月蘇秀二州湖田生聖米飢民取之以食興州竹有實如大麥民取以食占曰大飢慶歷七年渠州言石照等五縣野榖穭生民飢之候也熙寧三年安州麥一夲三穗至五穗凡十四莖深州麥秀兩岐或三四穗凡四十畝四年徐州麥一夲百七十二穗八年杭州鹽官縣自三月地産物如珠可食水産菜如菌可為葅飢民賴之定州安喜縣禾二夲間五壠合穗成德軍平山縣禾合穗者二保州保塞縣禾七夲間一壠或兩壠合穗九年渠州流江縣禾一苖九穗元豐元年武康軍禾一莖十一穗二年袁州禾一莖八穗至十一穗皆層出長者尺餘洪州六縣稻已穫再生皆實元祐三年劍州安國軍麥秀兩岐夔州苖十二穗潤州丹陽縣麥一夲五穗四年嘉州峨眉縣禾異畝同頴又禾登一百五十三穗五年汀州禾生三十六穗六年南劒粟一本三十九穗紹聖元年淮南軍禾一本九穗五年淮西路民田既刈復生實政和二年知定州梁子野奏嘉禾合穗一科相隔五壠計六尺三寸生為一穗并中間壠內一科三莖上生粟三穗蔡州麥一莖兩岐至七八岐者近約十畝逺或連野台州進寧海縣早禾一麩二米者凡五石時方修明堂遂叶典禮詔拜表稱賀右四朝志載自熙寧以後至於宣政禾同頴麥兩岐之事尤多不及悉書芝草朱草漢武帝元封二年甘泉宫內中産芝草九莖連葉瑞應圗王者敬事耆老不失故舊則芝草生內中謂後庭之室也宣帝神爵元年金芝九莖産於函德殿銅池中金芝色象金也銅池承霤也以銅為之函與含同後漢光武中元元年夏亰師醴泉湧出又有赤草生於水崖赤草朱草也大戴禮曰日生一葉至十五日以後日落一葉周而復始明帝永平十七年芝草生殿前章帝建初四年零陵獻芝草五年零陵獻芝草桓帝建和元年芝草生中黃藏府中黃藏府掌中幣帛金銀諸貨物靈帝光和四年二月郡國上芝英草唐武德四年益州獻芝草如人狀占見草異門貞觀十七年九月皇太子寢室中産素芝十四莖並為龍鳯之形天寶初臨川郡人李嘉允屋柱生芝草狀如天尊像上元二年七月甲辰延英殿御坐上白芝一莖三花白喪象也貞元十二年七月東都留守奏苑內生芝草一株長慶元年七月夀昌殿內槽柱上産玉芝一莖長九尺後唐同光二年九月萊州奏即墨縣人李夢徵室內柱上生芝草兩本畫圗以進長興三年十月萊州奏即墨縣人王友家生芝草一夲三枝分兩岐或三岐上漸相向成片而圎色紫葉莖一色其表白髙尺餘上命宫中舊進芝草四夲色莖皆同周顯德元年河陽奏泛水縣民家生紫芝數莖南漢劉鋹時芝菌生宫中宋建隆二年七月亳州獻芝一株開寶七年陳州獻芝一夲四十九莖太平興國四年華山道士丁少微獻彤芝黝芝各一笥五年真㝎府行宫殿梁生芝草如荷葉八年十一月歙州婺源縣民王化於王陵山石上得紫芝一夲叢生五莖咸平四年濰州獻芝草一夲如佛狀六年永康軍導江縣民潘矩田生芝一莖三層黃紫色其髙五寸許九月相州牧龍坊生芝一莖色紫黃長尺餘分七枝枝皆如手五指狀其最上枝類鳯首大中祥符元年東封遣官祭文宣於孔林得芝五株色黃紫如雲氣及人戴冠幘之象詔遣內侍祭謝復得芝四夲輕黃如雲氣之狀東封經度制置使王欽若言親獲芝十一夲又州民所得二十六本且言泰山日生靈草軍民競採請量給緡錢絹帛從之欽若來朝獻芝草八千一百三十九本有貫草木附石連理及飾為寶山者九月趙安仁來朝獻五色金玉丹紫芝八千七百十一本十月泰山芝草再生者甚衆辛丑車駕次鄆州知州馬元方獻芝草五本甲辰欽若等又獻泰山芝草三萬八千二百五十夲有並五並三連理五色重暈如意寶蓋上下相連帶瓦石草木五榖如寶山神仙靈禽瑞獸之象者六百四十二詔令封禪日列天書輦前送諸路名山勝境及賜宰相是月復州獻芝草三本類神仙佛像河中府酒厨梁上生芝一本十二葉其色如玉六年奉祀經度制置使丁謂至亳州真源縣太清宫道士瀨陽鄉民繼獲芝草八十一夲以獻己丑乂獲二百五十夲有一夲三莖一莖三蓋如雲氣佛像者九月又得應天府宋城縣所獲芝五十本獻之十一月謂來朝獻芝草三萬七千一百八夲飾以仙人寶山靈禽異獸之狀十二月獻九萬五千一百夲眀年車駕至真源縣置二百輿前𨗳民有詣行闕獻者又一萬八千本按三朝符瑞志載天禧以前草木之瑞史不絶書而芝草尤多然多出於大中祥符以後東封西祀之時王欽若丁謂之徒以此𨗳諛且動以萬本計則何足瑞哉姑存其略云熙寧四年至元豐八年天下言芝草凡三十七建中靖國元年至宣和靖康天下言芝草尤多政和二年二月戊午河南府新安縣蟾蜍背生芝草自是而後祥瑞日聞玉芝産禁中殆無虛嵗凡殿宇園囿及妃嬪位皆有之外則中書尚書二省太學醫學亦産紫芝五年八月甲子蘄州進一萬二千六百枝內一枝紫色九幹十二月己未汝州至進六萬夲其間連理雙枝者一千八百八十有司不勝其紀初猶表賀後以為常不皆賀也時朱勝非為京東提舉學事行部至密州界見縣令部數百夫入山採芝彌漫山谷皆芝菌也或附木石或出平地有一夲數十葉層疊髙大衆色咸備郡守李文仲採及三十萬夲每萬夲作一綱入貢文仲尋進職除本道轉運使云建炎二年九月癸卯密州獻芝草五葉如人指掌色赤而澤郤之東漢書以草生如手指為秉威權持國柄蓋黃潛善汪伯彥誤國脅上之應也十八年梅州學廟生芝草二十一年紹興府府學御書閣下生芝二十五年五月太室楹生芝九莖宰臣秦檜帥百官觀芝稱賀自檜既相和讎罷兵文飾太平天下競以草木之妖獻瑞慶元五年八月太室西北夾室楹生白芝四葉唐書以白芝為喪祥眀年八月國連有大喪嘉泰二年十一月祕書省右文殿楹生芝二莖青眚青祥五行志以鼠妖為青眚今削之自有専門後漢桓帝永興二年四月丙午光祿勳吏舍壁下夜有青氣視之得玉鈎玦各一鉤長七寸二分周五寸四分身中皆雕鏤此青祥也玉金類也七寸二分啇數也五寸四分徵數也啇為臣徴為事蓋為人臣引決事者不肅將有禍也時梁兾秉政専恣後四嵗誅滅靈帝光和元年七月有青虹見御座玉堂後殿庭中晉武帝咸寧元年八月丁酉大風折大社樹有青氣出焉此青祥也占曰東莞當有帝者明年元帝生是時帝大父武王封東莞由是徙封琅邪孫盛以為中興之象晉室之亂武帝子孫無孑遺社樹折之應又恆風之罰唐貞觀十七年四月立晉王為太子有青氣繞東宫殿始册命而有祲不祥十八年六月壬戌有青黑氣廣六尺貫於辰戌其長亘天太和九年鄭注篋中藥化為蠅數萬飛去注始以藥術進化為蠅敗死之象近青眚也乾元三年六月昏西北有青氣三文獻通考卷二百九十九
