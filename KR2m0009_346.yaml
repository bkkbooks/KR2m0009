body:
  text: 文獻通考卷三百四十六鄱陽馬端臨貴與著四裔考二十三契丹中宋太祖皇帝受命務保境息民不欲生事夷狄先是五代募民盗戎人馬給其直籍數以補戰騎之闕上乃令盡還所盗馬仍禁民毋得出塞外盗者未㡬敵衆入冦棣州刺史何繼筠擊敗之獲馬四百匹乾徳二年命昭義軍節度李繼勲攻遼州州将杜延韜以城降遼州平晋軍三年四年俱冦易州開寳二年車駕征河東敵兩道率衆來援何繼筠韓重贇等敗其師是秋涿州刺史許周瓊來降以為左羽林将軍仍領涿州豐州刺史王重安上言契丹實哩錫琳等部凡一十六族歸欵詔官其首領是嵗舒嚕為帳下所殺國人立烏雲之子明記號明照王子稱天賛皇帝改元保寕三年六月敵六萬騎冦定州遣判四方館事田欽祚領兵三千人赴之上謂欽祚曰彼衆我寡但背城列陣以待之敵至即戰勿與追逐欽祚與敵戰滿城敵騎小却乘勝逐北至遂城殺獲甚衆值暮夜入保遂城敵圍欽祚數日欽祚度城中糧少整衆開南門突圍一角出是夕至保塞軍軍中不亡一矢北邉傳言三千打六萬太祖自是益修邉備嘗謂左右曰若敵敢犯邉我以二十四疋絹購一敵人首其精兵不過十萬人止費我二百萬疋絹此敵盡矣七年十一月其涿州刺史耶律琮以書遺知雄州孫全興言欲講和之意太祖命全興以書答焉八年三月遣使來聘太祖召見宴賜禮遣之詔太常丞吕端報聘自是始交中國八月又遣其左衛大将軍耶律覇徳等来聘獻御衣玉帶名馬太祖厚賜之令從獵近郊上親射走獸矢無虚發使者俯伏呼萬嵗私謂譯者曰皇帝神武無敵射必命中所未嘗見也十二月又遣使獻御衣及馬賀來年正月詔遣宋準等報聘九年二月其使耶律延顓來賀長春節五月命田守竒等報聘是嵗十二月以國哀遣使来修賻禮太平興國二年遣使賀太宗即位四月又遣使奉貢助太祖山陵五月令起居舍人辛仲甫等報聘繼又遣使來賀乾明節自此聘使不絶四年二月車駕征河東次趙州遣其臣耶律伊喇美楞奉書問起居俄而敵騎數萬冦石嶺闗以援晋陽為郭進所敗及太原還上親征幽州敵聞上之至皆不敢居城中及數萬衆屯城北上親率兵乘之斬首千餘級餘黨遁去敵渤海兵三百餘人來降未㡬其建雄軍節度知順州劉延素率官屬十四人降以延素為右監門衛将軍又其知薊州劉守恩與官屬十七人降自王師之入敵境凡獲馬五千餘匹師傳於城下命諸将攻城定國軍節度宋偓南面河陽節度崔彦進北面保靜軍節度劉遇東面定武軍節度孟元喆西面旬有五日以士卒疲頓班師十月大冦闗南劉延翰崔彦進崔翰等三将㑹兵擊破之斬首萬餘級獲戎馬兵噐甚衆十一月嵐州忻州皆破其師五年三月十萬衆冦代州為潘美楊業所敗俘獲甚衆十一月契丹萬騎冦雄州車駕北征次大名敵遁去上乘勝欲討幽州李昉扈䝉等以為大兵所聚轉餉是資河朔之區連嵗飛輓近經蹂躪尤極蕭然恐不堪調發乃下詔南歸六年正月九月俱冦易州擊退之七年明記卒偽諡景宗孝成皇帝子常王隆緒立纔十二嵗母蕭氏專國是嵗五月敵三萬三道來冦一襲鴈門潘美擊破之遂北入其境破其壘三十六一攻府州折御卿大破之於新澤擒酋長百餘人斬首七百級一冦髙陽闗崔彦進擊敗之斬首二千級獲兵器羊馬數萬十月詔禁民入北界擄畧及竊盗仰所屬州軍收捉重斷所盗之物送還十二月實哩錫琳穆濟烏雅等十一族七萬餘帳内徙歸附豐州刺史王承美出兵迎之與敵戰大破之斬首二千級八年二月承美又破其師逐北至青塚降者三千帳獲羊馬萬計雍熙初知雄州賀令圖及薛繼昭劉文裕侯莫陳利用等相繼上言契丹主㓜國事决於其母蕭氏蕭内行不正私於大将韓徳讓等寵幸用事國人疾之請乘其釁以取幽薊上以其説為然三年正月大發師出塞進討曹彬崔彦進米信等趨涿州田重進等趨飛狐潘美楊業等出鴈門尅期齊舉彬等所向克㨗多所俘獲降其招安使大鵬翼康州刺史馬頵等邉民有驍勇者競團結以襲敵或夜入城壘斬取首級又詔出賞格募民應接王師擒獲敵中首領自是應募者衆初師出之日上謂彬等曰潘美等但先取雲應卿等以十餘萬衆聲言取幽州而持重緩行敵聞之必萃勁兵扵幽州兵既聚不暇為援於山後矣及王師入契丹美果下寰朔雲應等州重進取飛狐靈邱蔚州山後要害之地多得之而彬等亦連收新城固安下涿州兵勢甚振每㨗奏至上頗疑彬進軍之速且慮斷饟道彬至涿州留十餘日食且盡還軍以援供饋彬下諸将聞美重進累戰獲利自以握重兵慮功少於美等競畫進取之策彬不能制遂裹五十日糧復往攻涿州敵當其前且行且戰歴二十日始至城下屬盛暑士卒疲乏乃還師境上大軍之退也無復行伍将至岐溝闗敵騎追及與戰王師不利彬等收餘師宵渉拒馬河營於易水之南奏至詔以諸将所領兵分屯緣邉諸郡召彬彦進信赴闕留田重進守中山令潘美還代州遣使部徙雲應寰朔四州民五萬户及其吐渾突厥三部落安慶等族八百餘帳於河南孟曹汝潞等州處之是冬冦易州州遣强壮指揮使劉鈞率兵襲岐溝闗破之斬首千餘級焚其積聚而還復冦代州為副部署盧漢贇擊破於土鐙堡斬首二千級生擒五百人獲馬千匹四年正月復入冦三闗自曹彬失律諸将多坐黜免至是上思宿将劉廷讓宋偓張永徳罷節制在環衛欲令擊敵自効遂遣廷讓屯雄州偓屯覇州永徳屯定州廷讓與敵戰君子館軍敗僅以身免先鋒賀令圗髙陽闗部署楊重進沒焉敵復入深祁陷易州殺畧甚衆又冦定逺軍城中兵少人心甚危知軍著作都曹諌慮不能守殺數人乃定敵遂引去上為下哀痛之詔大發兵戍鎮定髙陽闗每遣屯守上必授以成算端拱元年十一月復冦中山郭守文李繼隆等與戰唐河敗之斬首萬五千級獲馬萬匹豐王承美言契丹頻嵗畧州境族帳漢民皆奔毛馳山東黑山以避之承美皆以州兵擊退詔書褒美彬等師既不利敵復取雲應朔等州二年詔緣邉作方田頒條置量地里之逺近列置寨柵以限戎馬而利我之步兵明年敵遣人至雄州求通好部署劉福以聞上令許之既使卒不至至道元年正月韓徳威率數萬騎誘党項勒浪嵬族十六府大首領馬尾等自振武入冦先是敵與賊遷相結以窺邉境上密授成算於府州折御卿為之備至是御卿率輕騎邀擊之大敗其衆於子河汊勒浪等族乘敵之亂詐為州兵躡其後敵衆大驚擾死者十六七悉委其輜重渉河而遁敵将號突厥太尉司徒舍利死者二十餘人生擒吐渾大将一人徳威僅以身免勒浪等族既與敵有隙悉欵塞内附令御卿将兵迎之分䖏扵河南自府州抵平夏帳幕連屬數百里凡得精甲萬餘騎以馬尾為歸徳大将軍領恩州刺史四月數千騎冦雄州為何承矩所敗梟其特哩大将一人真宗咸平元年契丹裕恱王五寨監使馬守玉等百七十口内附上召見問勞守玉等自言苦暴斂重役遂謀向化詔賜衣服繒綵給近甸良田處之是冬敵衆萬騎来三路先鋒逆擊於廉良路殺二千餘人獲馬五百匹十二月詔親征上御鎧甲於中軍命樞密使王顯押後隊横亘數十里督諸将進戰敵襲冀州州兵擊於城南斬千餘人奪馬萬餘匹又府州率兵入五合川破㧞黄太尉寨盡殺帳下焚獲不可勝計三年敵縱掠髙陽闗貝冀都部署范廷召擊於莫州東斬首萬餘級盡奪所掠老㓜而還四年十一月戎人逼威逺軍王顯等全師至大破敵戮二萬餘人獲其偽署大王統軍特哩相公等十五人首級并獲甲馬甚衆餘奔北號慟滿野自此嵗侵邉界所在擊走之六年七月偽供奉官李信來降言其國中事云眀記四子長即隆緒次隆慶隆裕㓜鄭哥早亡國中所管幽州漢兵謂之神武控鶴羽林驍武等約萬八千餘騎其偽署将帥契丹九女奚南北皮室當直錫里及八部落錫里山後四鎮諸軍約十萬八千餘騎内五千六百餘常衛戎主九萬三千九百餘即入冦兵也其國自幽州東行五百五十里至平州又五百五十里至古遼陽城即號為界東京者也又京北六百里至烏舎國其國用漢文法使印八角而圓又東南接髙麗又北至女真東踰鴨江即新羅也以信為供奉官賜器幣冠帶上召鎮安軍節度李繼隆論邉事且議親征繼隆曰陛下向來制置邉備分任将帥悉合機要至契丹入冦盖亦常事上如太宗朝亦有城堡陷然後不能為害願專責将帥不湏戎輅親舉景徳元年閏九月敵主與其母舉國入冦統軍順國王達蘭引兵掠威逺順安軍保州三路攻保州不利别部冦岢嵐軍知軍賈宗擊敗之十月敵主與母率衆至唐河三路都部署王超按兵以待既而不交鋒緣胡盧河而東敵遂南熾攻圍瀛州詔威敵岢嵐軍保州莫州北平寨部署入北境腹背縱擊以分其勢既而大破敵衆㨗奏連上十一月敵衆急攻瀛州晝夜鼓噪大設攻具負板秉燭驅奚人乘城城上𤼵礧石巨木擊之皆墜敵主與母復鼓衆四面急擊矢𤼵如雨敵為城兵所殺者三萬餘人傷者倍之圍遂解獲鎧甲兵矢數百計又以逰兵逼冀州城知州王嶼擊走敵衆猶二十萬詔諸路兵㑹天雄軍車駕北廵以山東南道節度李繼隆為駕前東面排陣使西上閣門使孫全照為都鈐轄南作坊使張旻為鈐轄武寕節度駙馬都尉石保吉為駕前西面排陣使侍衛歩軍都虞候王隐為都鈐轄入内副都知秦翰為鈐轄及令諸路将帥速赴行在又詔滑州張秉齊州馬應昌濮州張晟部率丁夫鑿河氷又出陣圖二一行一止付殿前都指揮使髙瓊既而敵衆過天雄犯徳清軍抵澶州北直犯大陣圍合三面王師既成列都排陣使李繼隆等分伏勁弩以控要害其貴将順國王達蘭有機勇所領皆鋭兵方為先鋒異旗幟出行陣督戰伏弩齊發矢中額而隕暮夜至寨死敵大挫衂退却不敢動初定州路副都部署王繼忠戰敗陷敵敵授以官繼忠嘗為彼言和好之利至是雖大舉深入復遣李興等以繼忠書詣莫州部署石普且致密奏一封達闕下上覽奏以手詔諭繼忠繼忠欲朝廷先遣使上未許敵之攻瀛州也繼忠復附奏乞遣使議和乃命曺利用持書往至大名王欽若疑敵不誠留之不遣繼忠又奏言頓兵不敢刼掠以待王人之至乃詔督利用前去利用至敵營戎母禮遇甚勤遣飛龍使韓把随利用至行闕先是繼忠上章及把至皆以求闗南地為名上以事在前朝不許利用至契丹帳數沮割地之議乃許以嵗遺絹二十萬疋銀一十萬兩議遂定敵主請以兄事上遣其右監門衛大将軍姚東之來聘把與東之來皆言國母附問起居以其專政自是皆致聘問每嵗别以金帛遺之令西京左藏庫使李繼昌報聘遺以衣服茶藥金噐等東之言收衆北歸恐為緣邉邀擊有詔諸部署及諸州軍勿出兵縱契丹還蕃二年春詔雄覇州安肅軍置三𣙜場南北界貿易瀛代州部送契丹降人詔以請盟後者還是年以其母生日遣孫瑾等往使敵主嵗避暑於含凉淀聞使至即來幽州屢召瑾等宴㑹張樂待遇之禮甚厚瑾等辭還賮以器服及馬五百餘匹自郊勞至於餞飲所遣皆親信詞禮恭恪者以致勤厚之意十一月契丹母及其主各遣使來賀承天節又遣使来賀來年正月遣使報聘如之自是嵗以為常四年户部員外郎李維使還言敵主見漢使强服衣冠事已即幅巾雜蕃騎出射獵官屬随帳自辦器械糗糧自是遇漢使益厚大凡蕃法極嚴罪死者必屠割慘毒敵主嘗云契丹風俗薄非同漢人可以文法治也大中祥符元年契丹置館於拒馬河北以候朝使二月户部副使宋摶使還言契丹所居中京在幽州東北城壘庳小鮮居人夾道多蔽以垣墻宫中有武功殿其主居之文化殿母居之又有東掖西掖門然蕃夷性不檢每宴集有不拜而懈惰者二年十二月蕭氏卒遣使弔奠致賻是年其相韓徳讓死徳讓專政有智畧契丹推服自蕭氏卒徳讓繼死虜主闇弱隆慶尤桀黠衆心附焉其年契丹将伐髙麗命所部南北大王皮室伊實丕勒貝太師奚室韋黑水女真等賦車二千乘凡調𤼵先下令使自辦兵器駝馬糧糗故其抄畧所得不補所失又索境内漢口有罪者配軍為驍民皆嗟怨十月遣使來告征髙麗十一月敵主自遼陽親伐髙麗大為髙麗敗覆帳族卒乘罕有還者官屬戰沒大半乃令幽薊選土人以補其乏初奉使者止達幽州後署中京又置上京或西凉淀北安州炭山長泊自雄州白溝驛度河四十里至新城縣右督亢亭之地又七十里至涿州北度涿水范水劉李河六十里至良鄉縣度盧孤河六十里至幽州偽號燕京子城就羅郭西南為之正南曰啟夏門内有元和殿洪政殿東門曰宣和城中坊門皆有樓有閔忠寺夲唐太宗為征遼陣亡将士所造又有開泰寺魏王耶律漢寕造皆邀朝使逰觀城南門内有裕恱王廨為宴集之所門外永平館舊名碣石館請和後易之即桑乾河出北門過古長城延芳淀四十里至孫侯館後改為望京館稍移故處望楮谷山五龍池過温餘河大夏坡坡西北即凉淀避暑之地五十里至順州東北過白嶼河北望銀冶山又有黄羅螺盤牛闌山七十里至檀州自北漸入山五十里至金溝館川原平廣謂之金溝淀國主嘗於此過冬自入山屈曲登陟無復里候但以馬行記日景而約其里數過朝鯉河亦名七渡河九十里至古北口兩旁峻崖中有路僅容車軌口北有鋪彀弓連䋲夲范陽防扼奚契之所最為隘束然幽州東趣營平州路甚平坦自頃犯邉多由斯出又度徳勝嶺盤道數層俗名思鄉嶺八十里至新館過雕窠嶺偏槍嶺四十里至卧如來館盖山中有卧佛像故也過烏灤河東有灤州因河為名又過墨斗嶺亦名度雲嶺長二十里許又過芹菜嶺七十里至栁河館河在館旁西北有鐡冶多渤海人所居就河漉沙石鍊得鐡渤海俗每嵗時聚㑹作樂先命善歌舞者數輩前行士女相随更相唱和回旋宛轉號曰踏追所居屋皆就山墻開門過松亭嶺甚險嶮七十里至打造部落館有蕃戸百餘編荆為籬鍜鐡為兵器東南行五十里至牛山館八十里至鹿兒峽館過蝦蟆嶺九十里至鐡漿館過石子嶺自北漸出山七十里至富谷館居民多造車者云渤海人東望馬雲山山多鳥獸林木國主多於此打圍八十里至通天館二十里至中京大定府城垣庳小方圓纔四里許門但重屋無築闍之制南門曰朱夏門内夾道歩廊多坊門又有市樓門曰天衢通闤望闕次至大同館其北正門曰陽徳閶闔城内西南隅岡山有寺城南有園圃宴射之所自過古口即蕃境居人草庵板壁亦務耕種但有桑柘所種皆從壠上盖虞吹沙所壅山中長松鬱然深谷中多燒炭為業時見畜牧牛馬橐駝尤多青羊黄豕亦有挈車帳逐水草射獵食止糜粥粆糒自中京至北八十里至臨都館又四十里至窑館又七十里至松山館又七十里至崇信館又九十里至廣寕館又五十里至姚家館又五十里至咸寕館又三十里度潢水石橋旁有饒州盖唐朝嘗於契丹置饒樂州也渤海人居又五十里至保和館度黑河七十里至宣化館又五十里至長館館西二十里許有佛寺民舍云即祖州亦有祖山山中有安巴堅廟所服鞾尚在長四五尺許又四十里至上京臨潢府自過崇信館契丹舊境盖其南皆奚地也入西門門曰金徳内有臨潢館子城東門曰順陽入門北行至景福門又至承天門内有昭徳宣政二殿皆東向其氊廬亦皆東向臨潢西北二百餘里號凉淀在漫頭山南避暑之處多豐草掘丈餘即有堅氷天禧四年工部員外郎知制誥宋綬充使始至木葉山山在中京東㣲北自中京過小河唱呌山道北奚王避暑荘有亭䑓由古北至中京北皆奚境奚夲與契丹等後為契丹所併所在分奚契丹漢人渤海雜處之奚有六節度都省統領言語風俗與契丹不同善耕種歩射入山采獵其行如飛凡六十里羖䍽河館過恵州城二重至低小外城無人居内城有瓦舍倉廩人多漢服七十里至榆林館館前有小河屈曲北流自北入山少人居七十里至敖拉烏蘇館蕃語謂山為敖拉水為烏蘓七十里至香子山館前倚土山臨小河其東北三十里即長泊也渉沙磧過白馬淀九十里至水泊館度土河亦云撞撞水聚沙成墩少人烟多林木其河邉平處國主曾此過冬凡八十里至張司空館七十里至木葉館離中京皆無館舍但宿穹帳欲至木葉三十里許始有居人瓦屋及僧舍及歴荆榛荒草復度土河木葉山本安巴堅𦵏處又云祭天地之所東向設氊屋署曰省方殿無階以氊藉地後有二大帳次北又設氊屋署曰慶夀殿去山尚逺國主帳在氊屋西北望之不見嘗出三豹甚馴焉上附其人而坐獵則以捕獸蕃俗罩魚設氊廬於河之上密掩其門鑿氷為竅舉火照之魚盡來湊即埀釣竿罕有失者廻至張司空館聞國主在土河上罩魚以魚来饋是嵗隆慶初封常王及請盟改梁王後封秦國王又加秦晋國王隆裕有子宗業封廣平王為中京留守改幽州幽都縣為宛平縣其衣服之制國母與蕃官皆本服國主與漢官即漢服蕃官戴氊冠上以金華為飾或加珠玉翠毛盖漢魏時遼人歩揺冠之遺象也額後垂金花織成夾帶中貯髮一總服紫穿袍加義襴繫䩞鞢帶以黄紅色絛裏革為之用金玉水晶碧石綴飾又有紗冠制如烏紗帽簷不㩎雙耳額前綴金花上結紫帶帶末綴珠或紫皂幅巾紫穿袍束帶丈夫或綠巾綠花穿袍中單多紅綠色貴者被貂裘貂以紫黑色為貴青色為次又有銀䑕尤潔白賤者被貂毛羊䑕沙裘弓以皮為弦箭削樺為簳韀勒輕缺於馳走以貂䑕或鵞項鴨頭為扞腰按三朝契丹傳所言自幽州迤北至遼主所都中京上京道里與五代史四夷附錄所載胡嶠所述小異故並錄之以俟參考契丹下乾興元年真宗崩遣使告哀并贈以遺留物敵主隆緒聞訃𤼵哀甚慟遣使来弔祭隆緒又謂其國后汝可致書大宋皇太后汝得名通中國并以珠珂等物獻太后又設真宗靈御於范陽閔忠寺建道場百日下令國中諸犯真宗諱易之又遣使来賀登極隆緒卒立二十四年年六十一諡天輔皇帝廟號聖宗遣使告哀帝及太后各北向舉哭詔為罷朝七日京師及邊州禁樂七日遣使祭奠弔慰隆緒嵗獻方物皆親閲必使羙好中意守約甚堅未嘗稍啟邊隙既卒其第八子宗真立小名濟古爾為皇太子及即位軍國事專制於其母順聖元妃加號曰法天皇太后慶歴二年元昊未平宗真知中國厭兵用劉六符議聚兵幽涿聲言入冦遣使蕭英劉六符來致書曰大契丹皇帝致書兄大宋皇帝惟瓦橋闗南夲石晋所割而柴氏狂謀掠我十縣自太祖創業始通隣好及太宗繼位才定并汾而無名興師直抵燕薊羽召精銳禦之獲退自是穆鎮國强兵南北王府嵗有戍境之勞備渝盟之事竊審專命将臣薄伐河右且李元昊稱藩尚主北朝甥舅之親設罪合致討曷不以一介為報况營築長隄堵塞隘路開決塘水添置邊軍既稔猜嫌慮隳信睦儻思乆好共遣疑懐願以晋陽舊附之區闗南元割之縣見歸敝國共康黎元使者至雖以請地求婚為言而其指頗欲邀嵗賂仁宗重用兵遣富弼符惟忠報以書曰昔我烈考章聖皇帝恵養天下與大契丹弭兵講好通聘著盟迨於纉承共循謨訓邉氓安堵埀四十年兹者專致使臣貽及緘問言瓦橋内地晋陽故封石氏所割周朝所復皆事繫累代安及夲朝况太宗皇帝親征劉繼元而北兵来援以至交鋒石嶺是以有幽薊之役元昊我之叛臣曏議討除已嘗遣杜防郭稹傳道復云營築堤埭開決陂澤盖霖潦衍溢當致繕防至於備塞隘路閲集兵夫邉臣常職彼此何疑遽興請地之言殊匪載書之約宜遵先志共保隣懽初敵在巴納穆丹河弼惟忠見行帳弼曰兩朝人主父子繼好垂四十年一旦求割地何也宗真曰南朝違約塞鴈門増塘水治城隍籍民兵意将何為羣臣請舉兵吾止之故遣使求地而已弼曰北朝忘章聖皇帝之大徳乎澶淵之役若從諸将言北兵無得脱者且與中國通好則主專所利而臣下無所獲若用兵則利歸於臣下而主受其禍故欲用兵者皆為身謀非國計也宗真驚曰何也弼曰晋末帝時中國狹小上下離叛故契丹全師獨克雖虜獲金幣充牣大臣之家而壮士健馬斃者大半此誰任其禍者今中國提封萬里精兵百萬法令修明中外一心北朝欲用兵能保其必勝乎曰不能弼曰勝負未可知借使必勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶嵗幣盡歸人主臣下所得止奉使者嵗一二人耳羣臣何利焉宗真大悟首肯者乆之弼又曰塞鴈門備元昊也塘水始於何承矩事在通好前地卑水聚勢不得不増城隍皆修舊民兵亦補其闕耳非違約也晋髙祖以盧龍一道賂契丹周世宗復伐取闗南皆異代事宋興已九十年若欲各求異代故地豈北朝利哉今主上命使臣則有詞矣曰朕為祖宗守國必不敢以其地與人北朝所欲不過利其租賦耳朕不欲因爭地多殺兩朝赤子故屈已増幣以代賦入若必欲得地是志在敗盟假此為詞耳朕亦安得獨避用兵乎澶淵之盟天地鬼神豈可欺哉宗真感悟遂欲求婚弼對婚姻易以生隙不若嵗幣之乆也夲朝長公主齎送不過十萬緡豈若嵗幣無窮之利宗真曰而且歸矣再来當擇一事為報宜遂以誓書来弼既歸復命再同張茂實往聘詔弼草答詔及誓書弼請增誓書三事毋廣開塘淀增屯兵騎容受叛士錄副以行中使持誓書追至武彊授之時宰相吕夷簡害之弼私念三事前與敵約萬一書詞同異則無以反命乃密啟觀之果如所料即奏列其事先遣屬官蔡挺馳白執政上亟召對弼以禮物屬茂實疾馳至京師以晡入見一夕易書而行既至契丹宗真求誓書用獻納二字弼力折之宗真知不可乃罷且約令元昊復來臣自此遂増銀絹為五十萬時契丹實惜盟好特為虚聲以動中國中國方困西師而宰相吕夷簡持之不堅許之過厚其後遂為無窮之敝敵既得増幣因勒石紀功擢劉六符為貴官四年元昊納契丹降人契丹問罪遣使來告出師皇祐元年遣使來言師還告㨗四年以契丹賀乾元節書嘗去國號而稱南北朝詔兩制臺諫官議以為講和以來國書有定式不可輙許乃詔答書復稱大宋大契丹至和元年使來言通好五十年宗真思南朝皇帝無由一㑹欲交馳畫像庶瞻覿以紓兄弟之情二年遺以馴象二年四月遣使賀乾元節因持宗真畫像來其年八月宗真卒立二十五年年四十一諡文成皇帝廟號興宗詔輟朝𤼵哀禁樂遣使慰奠皆如故事宗真性輕佻嘗與教坊使王税輕等數十人約為兄弟出入其家至拜其父母數變服入酒肆佛寺道觀尤重浮圖法僧有正拜三公三師兼政事令者凡二十人子洪朞立嘉祐元年來聘再求聖容又以洪朞像來詔許之六年五月詔河北緣邊安撫禁北人捕魚於界河初界河屬我境而北人潛入河中捕魚採葦雄州移文涿州禁詰之契丹驅所犯人榜境上及隆緒統和二十四年亦下令禁約其後北人或自海口載鹽入界河渉雄覇入涿易邉吏因循不能止至趙滋守雄州遣人射殺其人破其舟遂嚴捕魚之禁自慶歴増嵗賂契丹寖驕而貴臣杜防将死又教契丹以辯爭小事無輙置使中國常為我所撓則金帛時至持乆之術也自此使者之來多頡頏爭禮被邉數侵禁地又為石墻於銀坊城以動真定之北寨越耕薤子平夜遣人㧞我容城栁朝廷待以異類雖加鐫諭亦不鬬直取必而塘水益廣兵備甚飭矣契丹每嵗上旬出行射獵凡六十日然後並達魯河鑿氷釣魚氷泮即縱鷹鶻以捕鵞鴈夏居炭山或上陘避暑七月上旬復入山射鹿夜半令獵人吹角效鹿鳴既集而射之賤他姓貴耶律蕭氏其官有契丹樞密院中書省行宫都總管司謂之南面以其在牙帳之南以主漢事其特哩衮宗室也伊勒希巴參知政事也林牙翰林學士也額爾竒木刺史也内外官多倣中國者其下佐吏則有扎色穆昆薩納噶達嚕噶圖嚕分領兵馬則有統軍侍衛控鶴司南王北王奚王府五帳分扎薩克東西都省太師兵又有國舅鈐轄約尼詳衮諸司南北皮室二十部族節度頻布里九克漢人渤海女真五節度烏雅太師一百六百九百家奚凡民年十五以上五十以下皆籍為兵将舉兵必殺灰牛白馬祠天地日及木葉山神鑄金魚符調𤼵兵馬其捉馬及傳命有銀牌二百軍所舍有逺探攔子馬以夜聼人馬之聲每其主立聚所剽人户馬牛金帛及其下所獻生口或犯罪沒入者别為行宫領之建州縣置官屬既死則設大穹廬鑄金為像朔望節辰忌日輙致祭築䑓髙丈餘以盆焚酒食謂之燒飰十宫各有民户出兵馬安巴堅曰洪義宫徳光曰永輿宫烏雲曰積慶宫舒嚕曰延昌宫明記曰章敏宫應天后曰長寕宫燕燕曰崇徳宫隆緒曰興聖宫隆慶曰敦睦宫隆運曰文忠王府又有四樓在上京者曰西樓木葉山曰南樓龍化州曰東樓唐州曰北樓凡受冊積柴升其上大㑹蕃夷其下已乃燔柴告天而漢人不得預有諢子部百人夜以五十人番直四鼓将盡歌於帳前號曰聒帳每謁拜木葉山即射栁枝諢子唱番歌前導彈胡瑟和之已事而罷三嵗一試進士貢院以二寸紙書及第者姓名給之號喜帖明日舉案而出樂作及門擊鼓十二面云以法雷震自安巴堅相承二百餘年盡有契丹奚渤海及幽燕雲朔故地四面與髙麗安定女真黑水珠赫烏舎國博和哩阿里瑪鐡離靺鞨党項突厥土渾伊濟珠巴克室韋越離喜等諸國相隣髙昌龜兹于闐大小食甘州人時以物貨至其國交易而去土宜羊馬馬庳而善走人能寒苦而衆故諸國憚之每正兵一名自備馬二匹韉鞍馬甲皮鐡視其力人鐡中九事打草榖守營鋪家丁各一弓四箭四百長短鎗䤪鉞斧小旗鎚錐火刀石馬盂粆袋撘鈎氊傘各一縻馬繩二百尺粆一㪷以九月末南來十二月退散伐桑柘園圃焚燒室屋虜掠老㓜婦女所過城邑不可擊者聲言治攻具脅使自守不出每城門輙以百餘人刺候或城中突出力不敵則走還集衆兵往鬭號簇門兵津濟徑路皆廵視絞絡若攻城驅所掠老㓜運薪土塞池壕引滿以居其後置陣必預度山水地濶狹馬五百或七百為隊每十隊次第更進以一隊奔突哮噉擾我軍疲困則退而飲食休息新覊者進回環不已又以草榖家丁揚塵助聲勢於其旁官軍多歩兵裹糧負甲退而食息又為所乘若累日不解則困於賊戎主則以精兵自随命曰䕶駕兵馬其大畧如此自隆緒改元統和至二十九年改開泰訖九年眀年改太平至十一年宗真立改景福明年又改重熙重熙二十三年洪朞立改清寕清寕九年即治平四年也英宗崩遣使弔祭神宗登極遣使來賀既而修涿易二州城増兵馬葺器械積芻糧而燕民數漁我界河至遣兵遮䕶官軍相與鬭射或追焚其舟又創遣邏騎越拒馬河入歸信容城兩屬地内緣邉安撫王臨請於保州塘濼西築隄植木引水種稻為方田作溝以限戎馬熙寕初王師取熙河置河北三十七将籍保甲廣武備洪朞疑焉數欲辯爭小事以嘗試中國七年遂遣蕭禧來致書謂蔚應朔三州土田昨安鋪舍南北永標於定舍往來悉絶於姦徒洎覽舉申輙為侵擾或營修戍壘或止居民皆是守邉之冗員不顧睦隣之大體妄圖勲賞深越封陲今屬省廵遂令按視備詳端貫盡合拆移爰遣介軺特垂緘報據侵入當界地里所起鋪形之處早令毁撤却於乆來元定界至再行安頓豈惟疆場之内不見侵踰兼於信誓之間且無違爽禧自雄州來知州王慶民以誓書不許泛使入境拒不得進慶民卒後守周永清遂納之二月禧到闕以河東地界為言且及雄州修城白溝驛創箭窻及趙用越境事帝面諭以三州地界當遣官㑹北朝官檢視定奪雄州外城自嘉祐年中因舊繕修固非創築有違誓書今當罷止其役白溝館舍如果有修營並令拆去固嘗累飭邉臣不令生事昨趙用擅入北境即已降停今郭庠侵入夲界仍復射傷戍人理須應敵如北朝近差廵馬乃是創興事端此無可施行者禧奉詔而退又命韓縝報聘遣太常少卿劉忱等㑹其臣蕭素於代州境上往復累月議不决八年三月禧再來致書言上命縝等乘驛往河東計議禧必欲以分水嶺為界帝患之詔詢故相文彦博富弼韓琦曾公亮以可與不可許之状故事使者留京師不過十日禧過期不肯行帝遣内侍李憲許以長連城六蕃嶺為界禧猶不從帝不得已議先遣沈括報聘樞密院言夲朝邉臣照用長連城為界有公牒六十初無指石長城分水嶺之文是時彦博等四人皆上章以為不可與地而王安石言於帝曰将欲取之必固與之於是詔不論有無照驗令於分水嶺擗撥遣使持示禧禧乃辭去往時界於黄嵬山麓我可以下瞰其應朔武三州既以嶺與之敵遂反瞰忻代州凡東西失地七百里七月命韓縝等往交新疆元豐初又以索覘人李福夀之故妄占瓶形寨地縱騎入塞踐稼河東安撫劉舜卿以為言尋捕得逃民王善及妻子皆䝉塞其耳目械以還之然猶時有亡命者若于惟孝程全官程㞯武備翟公僅軰皆嘗刺其隂事以報我及告捕姦邏懼而來歸朝廷悉命以班行處之江南洪朞能守成柔恵愛民安靜不撓然嬖幸其臣耶律英弼英弼與太子濬有隙潛畜甲士謀殺之其母與琵琶工通英弼又引洪朞視之母自縊死濬有遺腹子延禧時未生故免於難英弼益専恣累封魏王北人諺云寕違敇㫖無違魏王白帖子其後國相梁益介殺英弼坐死者千餘人乃立延禧為太孫元符二年遣泛使蕭徳崇等至時方討夏國故為其㳺説帝亦遣使報之而不從其請三年哲宗崩徽宗即位遣使來弔祭聘賀如故事明年正月洪朞死在位四十七年其紀元自咸熙改太康又改大安皆盡十年然後為夀昌至七年終廟號道宗詔輟朝禁樂遣使弔祭如故事建中靖國元年延禧即位號天祚皇帝改元乾統崇寕中朝廷討西夏夏人求救於遼遼遣使來蔡京為相隃度所以來之意議先遣使往乞師以塞其請延禧得乞師之書怒曰我夲遣人往南朝和解今番來借兵用相玩爾五年又遣使來議夏國疆界後乾統十一年改元天慶是嵗政和元年也自延禧在位貪縱不道諸國附從者皆有離心四年八月女真首領阿固達遂叛集所部甲馬二千犯東境寕江州延禧方射鹿秋山聞亂小之不以介意遣海州刺史髙仙夀帥渤海兵千人討之敗焉遂陷寕江始時州有𣙜易場女真以金珠蜜蠟為市率為州人賤直彊買且拘辱之謂之打女真至是逞憾殺城民無噍類獲遼甲三千退長白山之按春河延禧自秋山将之顯州冬山射虎聞警不行十月遣樞密使蕭奉先之弟殿前都㸃檢嗣先為東北路都統靜江軍節度使蕭保巴副之帥契丹奚兵五千屯珠赫店臨白江與女真對壘時北方乆無事奚契丹聞軍興皆願舊行希賞至挈其孥以從而不設備女真潛度混同江掩擊之嗣先軍張皇未及陣而兵交遂奔潰子女輜重牛羊金帛悉為所得又追襲百里殺都押管安州防禦使崔公議商州刺史邢頴遼人故事漢人不預軍國大議自兩戰之敗始召宰相張琳呉庸付以東征事琳庸皆書生無将略奏言前日之敗失於輕舉若用漢兵二十萬分路進討無不克矣延禧與之十萬命中京上長春遼西四路課民家貲每及三十萬者調一卒富家至調一二百人以十二月為期民多蹷産琳庸統御無法器仗聽從便但持刀矛氊甲備數而弓弩鐡甲百無一二於是分四道並進雜以蕃軍樞密副使耶律鄂爾多出淶河路黄龍尹耶律寕出黄龍路復州節度使蕭尼格出咸州路左祗候郎君蕭阿古出好草谷路獨淶河一軍深入遇敵才交鋒稍郤退鄂爾多以為漢軍遁即領奚契丹兵棄營而奔翌日所留漢衆三萬自推将作少監武朝彦為将再戰再敗餘三道軍聞之各退保其疆不數月盡為女真攻陷蕭嗣先之敗也士卒多逃歸奉先懼其弟獲罪妄云潰兵畏誅所至剽掠若不一赦将為腹心患延禧從之詔一切勿問自是出征者皆曰戰則有死而無功退則有生而無罪故士無鬭志遇敵輙奔五年延禧下詔親征其臣耶律章努以延禧不道謀廢之而立其叔父秦晋國王耶律淳謀泄延禧殺章努待淳如初延禧兵至鴨綠江女真縱撃之延禧督戰三合俱不利衆相隨而潰是嵗朝廷遣賀生辰正旦使至北庭留兩月不見而還延禧募渤海武勇軍高永昌等二千人屯白草谷契丹昔滅渤海建為東京時留守蕭保先為政苛酷六年渤海十數人殺保先於是武勇軍因之作亂還據東京推永昌為渤海皇帝遼東五十餘州盡沒獨藩州未下張琳州人也請討之募兵二萬人自顯州進軍攻渤海永昌兵敗遁入海追斬之緣邊奏敵亂帝屢詔邊臣毋得輙有所陳邀功生事貽禍邊鄙而童貫已啟北伐之議㑹奉使陶説及前通判保州張毣等言遼雖為女真所挫而上下未叛其國尚立邊臣迎合撰為事端以誤朝聽不可不察乃止先是延禧命叔淳為元帥宰相蕭徳恭副之募遼東飢民得二萬人謂之怨軍淳嘗守遼陽得人心欲倚之復遼東未出境而兵亂乃强率衆度遼水欲下瀋州急攻未能㧞或報女真至乃引還是年夏再命淳㑹兵防秋至隂涼川聞怨軍兩營以無衣叛十一月留大軍於衛州蒺藜山就糧自領輕騎二千赴顯州討叛者次懿州忽報女真前軍已過乃號召大軍㑹徽州八年正月與女真遇陣未合而潰淳以麾下五百騎保長泊女真入新川州節度使王從輔開門降大掠而去又破乾顯等州以馬疲而歸延禧在中京初聞敗震懼潛令内庫裒珠玉珍玩五百囊擇駿馬二千匹私謂左右若女真必來吾有日行五百里馬又與南宋為兄弟夏國為舅甥何憂哉所憂者兵民被害耳及女真歸邉備小寛延禧復自肆女真遂陷黄龍府咸信蘇復五十餘州據遼東長春兩路阿固達自號大金國遣人議和約十事邀求封冊為皇帝延禧付南北大臣議蕭奉先等喜自此無患請許之遣静江軍節度使實訥埒歸州觀察使張孝偉為封冊慶問使備儀物輅冕冊為東懐皇帝阿固達大怒叱出實訥埒等腰斬之諸酋為謝乃解酋人笞百餘十一年改元保大是嵗宣和三年也金人破上京凡祖懐慶州乾顯州境内木葉山遼國上世冢塋所在皆焚刼發掘無遺延禧有子四人長曰趙王母趙昭容次曰晋王母文妃次秦王許王母元妃晋王賢而有人望蕭奉先元妃兄也欲立其甥秦王文妃妹適耶律達哈拉妹適耶律伊都奉先疑二人欲立晋王譖殺文妃及達哈拉并其妻伊都懼擁千餘騎叛歸金國時金人悉師度遼而西用伊都為先鋒二年正月陷中京延禧懼即日出居庸闗入鴛鴦泊尋聞伊都至奉先謂延禧曰伊都宗支也豈欲遼亡哉不過來立其甥晋王耳何惜一子伐其姦謀延禧惑之乃賜晋王死王賢死不以罪聞者無不揮涕自此衆心益擕延禧畏逼率禁衛五千奔雲中中道稍引去能從者趙王梁王與三百餘騎㡬為敵所及過雲中囑留守蕭扎拉曰賊至矣善守城亟入天徳趨漁陽嶺入隂夾山謂奉先曰誤我至此皆汝之由汝亟去恐人不汝容并及我奉先痛哭辭去行未十里左右追殺之金人至雲中扎拉迎降隂夾山者在沙漠之北有陷淖六十里他兵不能至金人駐兵鴛鴦泊經營之渉歴時月遼人無主命令不通初延禧留張琳李處温與叔淳守燕至是處温與蕭幹挾怨軍郭藥師等謀立淳三月率燕京民數萬人入府勸進琳有難色曰居攝可矣何必為真處温不可淳出遽被以赭袍淳慟哭力辭不得已遂僭即位稱天錫皇帝下詔廢延禧為湘隂王燕雲平中上京遼西六路淳主之沙漠以北西南西北兩都招討諸蕃部族延禧主之遼國自此分矣舊有馬數千羣羣以千計皆良馬也上世常擇三萬匹嵗牧於雄滄兩境之間謂之南征馬意夸示中國及金人入冦民馬衰每匹價至三十萬無鬻者官馬雖多未嘗以頒将士延禧入夾山之後有司悉以羣牧獻於金人唯松漠以北者為達實林牙所有淳既立遣知宣徽院蕭托卜樞密副承㫖王琚來告謝帝以延禧尚在淳安得擅立却而不受初易州淶水人董才沉雄果敢為鄉軍隸官與女真戰敗主将欲斬之才亡命山谷集衆至千人剽掠郡縣飛狐靈邱入雲朔至岢嵐三界谷來歸知軍解潛以聞詔賜姓名曰趙詡以為閤門宣贊舍人從者皆拜官使詣童貫詡見貫屢言淳可取於是貫決計出師駐於雄州以劉延慶為東西兩路都統制种師道總東路兵屯白溝王稟楊惟忠种師中王玶趙明王志為偏裨辛興宗總西路兵屯范村楊可世王淵焦安節劉光國光世兾景曲竒王育呉子厚為偏裨貫張榜招諭燕民來歸又使歸朝官張憲等入燕諭淳以禍福使之舉國内附淳執而斬之遣王子班耶律達實林牙蕭赫嚕為西南面都統領千五百人屯涿州新城使王介儒語貫曰欲和即還作善鄰不欲和請以兵相見大暑中無徒苦諸軍也楊可世将輕騎進戰師不利辛興宗等戰於范村復北乃議班師敵以敗盟責我追至雄州北風大雨雹我軍不能視薄暮始解未㡬淳卒知中山府詹度言契丹無主燕人願歸國王黼力主再舉之議於是悉諸道兵二十萬期九月㑹三闗淳既死私諡曰宣宗蕭幹立其妃蕭氏為皇太后后既立幹専政國人遂貳其易州守将王琮涿州留守郭藥師舉二州來降蕭后聞之與其臣議曰事至於此苟可以託國吾即從之或言女真兵盛勢不可遏可以休附或言大宋百年歡好信誓可倚后曰二說皆可行乃遣使二國令蕭容韓昉等使於我又令章言中使於金皆奉表稱臣妾昉至童貫蔡攸以其止納欵麾去之曰非納土不可昉笑曰納欵即納土也乃以表聞初李處温謂中國可仗説蕭后且密約貫攸欲以后及燕山來歸貫攸不能周旋其間事寖泄或詣后告之后殺處温而拒王師貫攸乃令劉延慶郭藥師等自雄趨新城劉光世楊可世自安肅軍出易州遂㑹於涿州時兵衆五十萬進駐盧溝河契丹四軍蕭幹亦於燕城十里外築壘與我師相拒日遣騎渡河擊我嘗縱兵犯中軍藥師言四軍者既以全師抗我則燕必虚宜遣輕騎襲之延慶即用其策選常勝兵并西兵五千騎間道襲燕夜半渡河銜枚而進質明常勝軍五千騎雜鄉人奪迎春門以入大軍繼至下令曰燕人盡降契丹盡殺不意契丹兵尚多而我師已驕所至紛然肆掠藥師遣人諭蕭氏使降不從我師與敵合戰至晩不解蕭幹知我師入燕亟來救或告藥師城外塵起必有救兵至諸将皆謂延慶遣兵來助登髙望之則燕王塚上立四軍旗矣四軍兵自南門入人皆死鬭藥師屢敗奔門不得出盡棄馬縋城而下死傷過半還者數百騎而已時大軍屯盧溝河者未動蕭幹兵纔數千得漢兩人留帳中夜半偽相語曰聞漢兵十萬吾師三倍當分左右翼以精兵衝其中舉火為應殱之無遺隂逸其一人歸報既夕而遁衆軍遂潰自相蹂踐而死幹遣騎來追至涿水北乃回自熙寕以來所積軍實掃地盡矣十二月金人陷居庸闗蕭后率蕭幹等遁左企弓等迎降后東走至松亭闗議所向達實林牙欲歸延禧蕭幹奚人也欲往其國淳之壻蕭伯特曰今日固合歸天祚然見之有何面目林牙命牽出斬之於是契丹軍從林牙奚軍從幹林牙挾后見延禧延禧先已下詔追削淳官爵貶后為庶人改姓虺氏矣至是殺后而赦林牙幹僭號大奚國神聖皇帝領衆出盧龍嶺攻陷景薊燕山安撫使王安中遣郭藥師討斬之延禧鳩集散亡勢少振帝間使胡僧與之約許迎至京師待以皇兄之禮位燕越二王上築第千間實以女樂三百延禧大喜㑹阿古達死弟烏竒邁立其将尼堪自雲中東歸以烏舎代主兵延禧謂其去又得達實林牙兵隂山以三萬騎助之謂天且中興欲擣山後之虚復燕雲地林牙諫曰自金人入長春遼陽車駕跳奔當兵力全盛時不能一戰今舉國為所有乃欲嬰其鋒非計也不如蓄鋭待時毋輕舉以取辱不聽林牙稱病不行四年冬延禧擕后妃二子及宗屬出夾山南下武州烏舎盛兵遮其歸路戰於昻阿下烏舎復千騎山間出後顧之驚潰延禧奔山金人盡得其妻子延禧計窮欲投夏國夏人不敢納乃之小呼嚕五年正月與金國将羅索遇時從騎尚千餘有金鑄佛像長丈有六尺他寳貨稱是皆委之而遁竟為所及羅索下馬跪於前捧觴而進遂俘以還烏竒邁封為海濵王處之長白山東凡在位二十五年踰嵗而死契丹由是遂亡自安巴堅至天祚凡九代文獻通考卷三百四十六
