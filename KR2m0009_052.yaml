body:
  text: 文獻通考卷五十二鄱陽馬端臨貴與著職官考六歷代尚書八座附秦尚書四人不分曹名漢成帝初置尚書五人其一人為僕射四人分為四曹尚書曹名自此而有常侍曹主公卿二千石曹主郡國二千石民曹主凡吏民上書以人字改焉自後歷代曹部皆同客曹主外國夷狄後又置三公曹主斷獄是為五曹後漢尚書五曹六人其三公曹尚書二人掌天下嵗盡集課州郡吏曹掌選舉齋祠後漢志謂之常侍曹亦謂之選部二千石曹掌中都官水火盜賊辭訟罪法亦謂之賊曹民曹掌繕理功作鹽池苑囿客曹掌羌胡賀法駕出則護駕後漢光武分二千石曹及客曹為南主客北主客二曹兩梁冠納言幘或説有六曹按後志云分客曹為二是六天曹也又晉志云以前漢五曹更加中都官曹為六曹也按應劭漢官云二千石主中都官事則不應更有中都官曹也今依劭説為五曹六人魏朗字叔英又為尚書再升紫微謇諤禁省為百僚所服又張陵字處仲為尚書嵗朝梁冀帶劍入省陵叱令奪劍劾冀詔以嵗俸贖罪又鄭均字仲虞為尚書淡泊無為以病罷還第賜尚書祿號為白衣尚書魏有吏部左民客曹五兵度支凡五尚書晉初有吏部三公客曹駕部屯田度支六曹無五兵太康有吏部殿中五兵田曹度支左民為六曹尚書無駕部三公客曹及渡江有吏部祠部五兵左民度支五尚書皆銅印黑綬進賢兩梁冠納言幘絳朝服佩水蒼玉乘軺車皂輪執笏負荷加侍官者武冠左貂金蟬宋有吏部祠部度支左民左民尚書統右民及駕部二曹都官五兵六尚書尚書納言幘進賢兩梁冠佩水蒼玉齊梁與宋同侯景改梁五兵為七兵尚書又職官録曰齊尚書品服悉與今同亦别有起部而不常置也陳與梁同後魏初有殿中掌殿內兵馬倉庫樂部掌伎樂及角使五百駕部掌牛馬驢騾南部掌南邊州郡北部掌北邊州郡五尚書其後亦有吏部初曰選部兵部都官度支七兵祠部民曹等尚書又有金部庫部虞曹儀曹右民宰官元禔為宰官尚書都牧元禎為都牧尚書牧曹右曹太倉太官祈曹神都儀同曹等尚書自金部以下但有尚書之名而不詳職事北齊有吏部殿中殿中統殿中曹主駕行百官留守名賑宫殿禁衛及儀曹三公駕部四曹祠部五兵都官度支六尚書後周無尚書隋有吏禮兵刑戶工六部尚書唐尚書與隋同龍朔二年改尚書為太常伯咸通初復舊歷代吏部尚書及侍郎品秩悉髙於諸曹八座後漢以六曹尚書并令僕二人謂之八座魏以五曹尚書二僕射一令為八座宋齊八座與魏同晉梁陳不言八座之數隋以六尚書左右僕射及令為八座唐與隋同凡歷代尚書有五曹則兼以二僕射一令為八座有六曹則以左右僕射為一座兼令共為八座若有六曹而左右僕射並闕則以尚書僕射及令為八座若尚書唯有五曹又無左右僕射則不備矣宋制判省事一人以諸司三品以上充總轄二十四司及集議定諡文武官封贈注甲發付選人出雪投狀之事令史三人驅使官三人散官一人至和中宣徽南院使吳育言國家總覽萬機唯在綱要小大之務各有攸司若朝廷職舉而事簡則坐制天下不勞而治矣今尚書都省是其本也自唐末五代因循茍且雜置他局事無本末不相維持使天子之大有司廢為間所凡細瑣之務動干朝廷遂至君相焦勞日不暇給如百川浩蕩而不治其本源萬目開張而不得其綱領雖欲盡力其勢莫可以正也臣前判尚書都省見其官司局次燦然具存其如有大論議當下衆官雜定以質所長而久廢不舉今惟定諡時一會都堂是存其小而廢其大者深足惜也竊謂久廢之職豈能一人盡正其名謂當隨宜講舊而漸復之且於諸學士中分命知六行尚書事其舍人待制大兩省官即知左右丞郎中員外事其餘館職或有名望朝士即知郎中員外事仍於舊相或前任兩府重臣中除一兩人判都省然後各使檢詳典故度其可行者奏復之其次諸司寺監從而舉之至於金榖之計見屬三司者亦無相妨並且依舊事不驚俗體皆有宜嵗年之間此制一定有所責成則髙拱無為之治可以馴致矣論者嘉之然以因襲既久難於驟革其論卒不行容齋洪氏隨筆曰祖宗朝曾為執政其後入朝為他官者甚多自元豐改官制後但為尚書曾孝寬自簽書樞密去位復拜吏部尚書韓忠彥自知樞密院出藩以吏書召李清臣蒲宗孟王存皆嘗為左丞而清臣存復拜吏書宗孟兵書先是元祐六年清臣除目下為給事中苑祖禹封還朝廷未決繼又進擬宗孟兵部右丞蘇轍言不如且止左僕射吕大防於簾前奏諸部久闕尚書見在人皆資淺未可用又不可闕官須至用前執政轍曰尚書闕官已數年何嘗闕事遂已胡宗愈嘗為右丞召拜禮書吏書自崇寧以來乃不復然嶽氏愧郯録曰今世為尚書者尚字皆從平聲都省之名亦然珂嘗竊疑其義有所未解考之宋書百官志而後知其訛志之言曰尚書古官也舜攝帝位命龍作納言即其任也周官司會鄭元云若今尚書矣秦世少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢初有尚冠尚衣尚食尚浴尚席尚書謂之六尚戰國時已有尚衣尚冠之屬矣秦時有尚書令尚書僕射尚書丞然則尚書之稱尚書從去聲而非平聲亦既明甚第鄭康成注周禮司會曰司會周官之長若今尚書唐陸德明釋其音曰常雖有此據了不知其義之所由取此殆今世襲稱之始也徽宗朝復殿中省有六尚今內官省品秩猶有尚官等稱謂益無可疑云歷代郎官郎官謂之尚書郎漢置四人分掌尚書事一人主胸奴單于營部一人主羌夷吏民一人主户口墾田一人主財帛委輸後漢尚書侍郎三十六人後漢志曰尚書六曹侍郎三十六人一曹六人也主作文書草取孝廉年未五十先試箋奏選有吏能者為之從三署諸臺試初上臺稱守尚書郎中滿嵗稱尚書郎三嵗稱侍郎五嵗遷大縣其遷為縣令縣令秩滿自占縣詔書賜錢三萬與三臺租錢餘官則否吏部典劇多超遷者鄭𢎞為僕射奏以臺職任尊而賞薄人無樂者諸吏郎補二千石自此始也八座受成事決於郎下筆為詔策出言為詔命後漢尚書陳忠上疏曰尚書出納帝命為王喉舌之官臣等既愚暗諸郎多文俗吏鮮有雅才每為詔文宣示內外轉相求請其入直官供青縑白綾被或以錦緤為之緤私列反緤繫也給帳帷茵褥通中枕太官供食物湯官供餅餌及五熟果實之屬五日一美食下天子一等給尚書郎侍使一人女侍使二人皆選端正妖麗執香爐香囊護衣服奏事明光殿省省中皆以胡粉塗壁畫古賢烈女以丹朱漆地故謂之丹墀尚書郎口含雞舌香以其奏事答對欲使氣息芬芳也奏事則與黃門侍郎對揖黃門侍郎稱已聞乃出丞郎月賜赤管大筆一雙隃麋墨一笏馮豹為尚書郎每奏事未報常俯伏省閣下或從昏至明天子默使持被覆之不驚也日暮諸郎下豹每獨在後帝嘉之隃麋今汧陽縣出墨魏自黃初改祕書為中書置通事郎掌詔草即今中書舍人之任而尚書郎有二十三人有殿中吏部駕部金部虞曹比部南主客祠部度支庫部農部水部儀曹三公倉部民曹二千石中兵外兵别兵都兵考功定課非復漢時職任青龍二年尚書令陳矯奏置都官騎兵合凡二十五郎每一郎缺白試諸孝亷能給文案者五人謹封奏其姓名以補之魏韓宣為尚書郎常以職事當受罰已背縛束杖未行文帝輦過聞而赦之晉尚書郎選極清美號為大臣之副武帝時有三十四曹加魏直事屯田起部左士右士其民曹中兵外兵分為左右主客又分為左右南北無農部定課考功凡三十四曹後又置運曹為三十五曹置郎中二十三人更相統攝晉魏舒為尚書郎時欲沙汰郎官非其才者罷之舒曰吾即其人也襆被而出同僚無清論者咸有愧色或為三十六曹當五王之難其都官中騎三曹郎晝出督戰夜還理事東晉有十五曹殿中祠部吏部儀曹三公比部金部度支都官左民騎部倉部庫部中兵外兵自過江之後官資少減王坦之選曹將擬為尚書郎坦之聞曰自過江尚書郎正用第二人何得以此見擬其子國寶好傾側婦父謝安惡之除尚書郎國寶以為中興膏腴之族唯作吏部不作餘曹郎辭不拜又宋江智淵改尚書庫部郎時髙流官序不為臺郎智淵門孤援寡此選意不悅固辭不拜梁王筠除尚書殿中郎王氏過江以來未有居郎署者或勸不就筠曰陸平原東南之秀王文度獨步江東吾得比蹤昔人何所多恨乃欣然就職桓元僭位改都官郎為賊曹宋髙祖時有十九曹元嘉以後有二十曹郎三公比部主法制度支主算都官主軍事刑獄其餘曹所掌各如其名宋武帝初加置騎兵主客起部水部四曹并東晉舊十五曹合為十九曹元嘉十八年增刪定曹郎即魏世之定科郎也三十年又置功論郎後又省騎兵故為二十曹齊依元嘉制其拜吏部郎亦有表讓之禮齊謝朓遷尚書吏部郎上表三讓中書疑朓官未及讓以問沈約約曰宋元嘉中范曄讓吏部朱循之讓黃門蔡興宗讓中書並三表詔答其事宛然近代小官不讓遂成常俗恐此有乖讓意王藍田劉安西並貴重初自不讓今豈可慕此不讓邪孫興公孔顗並讓記室今豈可三署皆讓邪謝吏部今授超階讓别有意豈關官之大小邪梁加三曹為二十三曹殿中虞曹屯田其郎中舊用員外郎正主簿正佐有才地者為之遷通直郎天監三年復置侍郎視通直郎郎中遷為之梁到洽為尚書殿中郎洽兄弟羣從遞居此職時人榮之又殿中郎缺武帝曰此曹舊用文學且居鴈行之首宜詳擇其人乃以張緬為之陳有二十一曹後魏三十六曹至西魏改為十二部北齊有二十八曹吏部考功主爵殿中儀曹三公祠部駕部主客虞曹屯田起部左中兵右中兵左外兵右外兵都兵都官二千石比部水部膳部度支倉部左民右民金部庫部其吏部三公各二人餘並一人凡三十郎中後魏北齊唯置郎中隋初尚書有六曹二十四司凡領三十六侍郎吏部司勳主客膳部兵部職方都官司門度支戶部比部刑部等侍郎各二人主爵考功禮部祠部駕部庫部金部倉部工部屯田虞部水部侍郎各一人分司官曹務直禁省如漢之制至開皇三年二十四司又各置員外郎一人以司其曹之籍帳侍郎闕則攝其曹事今尚書員外郎其置自此始以前歷代皆謂之尚書郎各以曹名為稱首或謂之侍郎皆無員外之號前代史傳及職官要録或有言員外郎者蓋謂員外散騎侍郎耳非尚書之職前代所言郎官上應列宿蓋謂三署郎非今所謂尚書郎中也煬帝即位以尚書六曹各置侍郎一人以二尚書之職今之侍郎其置自此始也或有曹加二人者夫侍郎之名舊矣漢凡諸郎皆掌更直執戟宿衛諸殿門以侍衛之故通謂之侍郎故武帝時東方朔為郎當時謂之官不過侍郎位不過執戟是也歷代尚書亦有侍郎隋初尚書諸曹二十四司諸郎皆謂之侍郎通若今之郎官耳非今六部侍郎之任自漢以來尚書侍郎悉然改諸司侍郎但曰郎則今郎中之職又改吏部為選部郎禮部為儀部郎兵部為兵曹郎刑部為憲曹郎工部為起曹郎以異六侍郎之名廢諸司員外郎而每司增置一曹郎各為二員都司置左右司郎中各一人品同諸曹郎掌都省之職尋又每減一郎署承務郎一人同開皇員外郎之職唐改隋諸司郎為郎中每曹又復置員外郎武德六年廢六司侍郎貞觀二年復舊今尚書省有左右司郎中各一人分掌尚書六曹事其諸曹諸司郎中總三十人員外郎總三十一人通謂之郎中尤重其選其職任名數各列在六曹之後凡郎中章服皆元冕五旒衣無章裳刺黻一章兩梁冠凡員外郎章服並爵辨元纓簪尊者衣纁裳一梁冠行臺省行臺自魏晉有之昔魏末晉文帝討諸葛誕散騎常侍裴秀尚書僕射陳泰黃門侍郎鍾會等以行臺從至晉永嘉四年東海王越帥衆許昌以行臺自隨是也越請討石勒表以行臺隨軍及後魏謂之尚書大行臺别置官屬後魏道武帝置中山行臺以秦王儀為尚書令以鎮之孝文永熙三年以宇文泰為大行臺以蘇綽為行臺度支尚書北齊行臺兼統民事自辛術始焉武定八年辛術為東南道行臺東徐州刺史郭志殺郡守文宣聞之敕術曰江淮初附百姓難向京師留卿為行臺亦欲理邊民寃枉監理牧守自今以後所統十餘州地諸有犯法者刺史先啓聼報以下先理後表齊代行臺兼總民事自術始也其官置令僕射其尚書丞郎皆隨時權制江左無行臺唯梁末以侯景為河南王大行臺承制如鄧禹故事隋謂之行臺省有尚書令僕射左右任置各一人主事四人有考功兼吏部主爵司勳禮部兼祠部主客膳部兵部兼職方駕部庫部刑部兼都官司門度支兼倉部金部工部屯田兼水部虞部侍郎各一人每行臺置食貨農圃武器百工監副各置丞食貨四人農圃一人武器二人百工四人録事等員食貨農圃百工等各二人武器一人蓋隨其所管之道置於外州以行尚書事開皇八年將伐陳則置淮南行省於夀春九年已平陳則廢淮南行臺省唐初亦置行臺武德四年詔陜東道大行臺尚書省自令僕至郎中主事品秩皆與京師同而員數差少山東行臺及總管諸州並隸焉其益州襄州山東淮南河北等道令僕以下各降京師一等員數又減焉行臺尚書令得承制補其秦王齊王府官之外各置左右六護軍府及左右親事帳內府貞觀以後廢其後諸道各置採訪等使每使有判官二人兼判尚書六行事亦行臺之遺制致堂胡氏曰由朝廷制藩屏以藩屏臨州縣以州縣治百姓如挈裘而振其領政出於一則稟承者無二三之惑今唐全有四海置郵以傳命雖萬里之逺不逾時月而至矣而建二三行臺於外使大臣承制補置是政出於朝廷又出於行臺夫豈國無異政之體哉按行臺省之名雖始於魏晉之間然兩漢初興髙祖所以委蕭何世祖所以命鄧禹其權任蓋亦類此唐天寶以後以盜賊陷兩京夷狄侵畿甸則或以大元帥副元帥命親王勳臣為之然但可任専征之責而他事則稟朝旨則亦未嘗備行臺省之事也至其末年方鎮擅地請節於是或以侍中中書令同平章事王爵命之如錢鏐馬殷王審知之徒蓋名為奉正朔而實自為一朝廷矣然則行臺省之名茍非創造之初土宇未一以此任帷幄腹心之臣則必衰微之後法制已隳以此處分裂割據之輩至若承平之時則不宜有此名也建炎時張魏公以樞密使宣撫川陜趙忠簡謂之曰元樞新立大功出當川陜半天下之責自兵事外悉當奏稟蓋大臣在外忌權太重也及魏公得罪謫詞言假便宜行事之制忘人臣無將之嫌肖內閣以招賢擬尚方而鑄印然則承制之事易以惹謗忠簡之言固篤論也吏部尚書侍郎郎郎中勳員外郎員司封郎中功員外司郎中外郎考郎中員外郎官誥院附周禮天官太宰掌建邦之六典以佐王理邦國變冢言太者進退異名也百官總焉則謂之冢宰列職於王則謂之太宰宰主也建立也邦理王所居之邦國佐猶助也周公居攝而作六典之職以佐王理邦國漢成帝初分尚書置四曹蓋因事設員以司其務非擬於古制也至光武乃分為六曹迄於魏晉或五或六亦隨宜施制無有常典自宋齊以來多定為六曹稍似周禮至隋六部其制益明唐武太后遂以吏部為天官戶部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官以承周六官之制若參詳古今徴考職任則天官太宰當為尚書令非吏部之任今吏部之始宜出於夏官之司士云又夏官之屬有司士下大夫二人掌羣臣之版古書版為班班書或為版版名籍也嵗登下其損益之數謂用功過黜陟者辨其年嵗與其貴賤年數多少知其老少周知邦國都家縣鄙之數卿大夫士庶子之數以詔王理告王所當進退以德詔爵有賢者之德乃詔以爵以功詔祿理有功勳後告以祿以能詔言以久奠食能者事成乃食之王制曰論定然後官之任官然後爵之位定然後祿之奠音定漢成帝初置尚書有常侍曹主公卿事後漢改為吏曹主選舉祠祀後又為選部靈帝以梁鵠為選部尚書魏改選部為吏部主選事陳羣為尚書延康元年羣始建九品官人之法拜吏部尚書晉與魏同山濤為吏部尚書用人皆先密啓然後公奏舉無遺才凡所題目終始如其言唯用陸亮尋以賄敗啓事曰臣欲以郤生為溫令詔可尋又啓曰訪聞詵喪母不時葬遂於所居屋後假葬有異同之議請更選之詔曰君為管人倫之職此輩應為清議與不便當裁處之劉聰僭號省吏部置左右選曹石勒時又置左右執法郎典定士族副選舉之任宋時吏部尚書領吏部刪定三公比部四曹孝武不欲威權在下大明二年分吏部尚書置二人以輕其任而省五兵後還置一吏部尚書順帝升明元年又置五兵二尚書晉宋以來吏部尚書資位尤重蔡廓為吏部尚書曰我不能為徐羡之署紙尾遂不就選按黃紙録事尚書與吏部連名故云署紙尾梁陳亦然後魏北齊吏部統吏部掌褒崇選補考功主爵三曹自洛陽遷鄴已後掌大選知名者數四文襄帝少年髙明所蔽也疏袁淑德沈密謹厚所傷者細楊愔風流辨給取士失於浮華唯辛術為尚書性尚貞明擢士以才以器循名責實新舊參舉管庫必擢門閥不遺前後銓衡術最為折衷甚為當時所稱後周有吏部中大夫一人掌羣臣及諸子之簿辨其貴賤與其年嵗嵗登下其損益之數依六勳之賞頒祿之差小吏部下大夫一人掌二吏部之事領司勳上士等官屬大司馬隋吏部統吏部主爵司勳考功四曹牛𢎞為吏部尚書其選舉先德行而後文才所進用多稱職吏部侍郎髙孝基鑒賞機悟清慎絶倫然爽俊有餘迹似輕薄時宰多以此疑之唯𢎞深識其真推心委任隋之選舉於斯為最自後周以降選無清濁及盧愷攝吏部與薛道衡陸彥師等甄别士流故涉黨同之譖唐龍朔二年改吏部尚書為司列太常伯咸亨初復舊光宅元年改吏部為天官神龍元年復舊天寶十一載改為文部至德初復舊掌文官選舉總判吏部司封司勳考功四曹事舊令班在侍中中書令上開元令移在侍中中書令下尚書六曹吏部兵部為前行戶刑為中行禮工為後行其官屬自後行遷入二部者以為美自魏晉以來凡吏部官屬悉髙於諸曹其遷舉皆尚書主之自隋置侍郎二尚書之事則六品以下銓補多以歸之唐自貞觀以前尚書掌五品選事貞觀二十二年二月文部侍郎盧承慶兼檢校兵部侍郎仍知五品選事承慶辭曰五品選事職在尚書臣今掌之便是越局太宗不許曰朕今信卿卿何不自信也由是言之即尚書兼知五品選事明矣至景龍中尚書掌七品以上選侍郎掌八品以上選至景雲元年宋璟為尚書始通其選而分掌之因為常例開元以前諸司之官兼知政事者午前議政於朝堂午後理務於本司自開元以來宰相員少資地崇髙又以兵吏尚書權位尤美而宰臣多兼領之但從容衡軸不自銓綜其選試之任皆侍郎専之尚書通署而已遂為故事或分領其事則列為三銓四年六月敕其員外郎御史并餘供奉官直進名敕授自此不在吏部尚書掌其一侍郎分其二尚書所掌謂之尚書銓侍郎所掌其一為中銓其一為東銓各有印侍郎二人隋煬帝置説在歷代郎中篇凡六司侍郎皆二尚書之事吏部初置一員總章元年加二員龍朔二年改為司列少常伯咸通元年復舊分掌選部流內六品以下官是為銓衡之任凡初仕進者無不仰屬焉當選集之際勢傾天下列曹之中資位尤重初隋世髙孝基為吏部侍郎房元齡杜如晦與選孝基特加賞異後以為知人唐文皇帝永徽時馬戴裴行儉為吏部侍郎貞觀以來最為稱職崔元暐為之介然自守絶於請謁為執政者所忌轉文昌左丞選司令史乃設齋自慶武后聞之復拜為天官侍郎郎中二人漢魏以來尚書屬或有侍郎或有郎中或曰尚書郎或曰某曹郎或則兩置或為互名雖稱號不同其職一也皆今郎中之任山公啓事曰吏部郎主選舉宜得能整風俗理人倫者又曰吏部郎以碎事日夜相接非但當正已而已乃當能正人不容穢雜也乃以議郎杜默為之又陸慧曉字叔明為吏部郎吏部郎令史歷政以來咨執選事慧曉任己獨行未嘗與語帝遣左右以事請問之慧曉曰六十之年不復能咨都令史為吏部郎也然自過江吏部郎不復典大選又職官録曰梁吏部郎舊視中丞遷侍中又陳吏部郎中秩六百石後魏孝文帝欲創革舊制選制百官謂羣臣曰為朕舉一吏部郎給卿三日假尋曰朕已得之矣乃徴崔亮為之亮字敬儒自參選事垂將二十年廉謹明決尚書曰非崔郎中選事不辦隋初諸曹郎皆謂之侍郎煬帝三年置六司侍郎後遂改諸曹侍郎但曰郎其吏部郎改為選部郎唐初復為選部郎中武德五年改為吏部郎中龍朔二年改為司列大夫咸通元年復舊掌選補流外官謂之小銓并掌文官名簿朝集録賜假使并文官告身分判曹事員外郎二人隋開皇六年置吏部員外郎一人煬帝三年改為選部承務郎唐武德三年復舊加置一人一員判廢置一員判南曹起於總章二年司列少常伯李敬元奏置未置以前銓中自勘責故事兩員轉廳至建中元年侍郎邵説奏各挾闕替南曹郎王鋗以後遂不轉廳貞元十一年閏八月侍郎杜黃裳奏舊例轉廳初武太后延載元年又加一員聖歷二年八月省開元十二年四月敕兵吏各事定兩人判南曹尋却一人判貞元元年九月又以兩人判至十二年閏八月又却一人判司封郎中一人左傳曰晉文公執秩以正其官注云執秩主爵秩之官漢尚書有封秩之任而無其官故後漢書曰馮勤字偉伯光武以為郎中給事尚書使典諸侯封事勤量功次輕重國土逺近地勢豐薄不相踰越莫不厭伏焉自是封爵之制非勤不定晉尚書有左右主客曹北齊河清中改為主封置郎中一人屬吏部主封爵之事隋初為主爵侍郎煬帝改為主爵郎武德初為主爵郎中龍朔二年改為司封大夫咸亨元年復舊光宅元年改為司封郎中掌封爵皇之枝族及諸親內外命婦告身及道士女冠等天寶八載十一月敕道士女冠籍每十載一造永為常式至德二年十一月敕道士女冠等宜依前屬司封曹員外郎一人隋文帝置煬帝改為主爵承務郎武德初為主爵員外郎其後曹改而官不易司勳郎中一人周禮夏官有司勳上士掌六卿賞地之法歷代無聞至後周吏部有司勳上士一人掌六勳之賞以等其功如古之主爵隋文帝置司勳侍郎煬帝改為司勳郎龍朔二年改為司勳大夫咸通初復故掌校定勳績論官賞勳官告身等事員外郎二人隋文帝置煬帝改為司勳承務郎至武德初乃改為司勳員外郎考功郎中一人漢文帝時京房作考功課吏之法然其職不在尚書至光武改尚書三公曹主嵗書考課課諸州郡魏尚書有考功定課二曹宋元嘉三年又置功論郎並其任也例在吏部郎中後魏考功郎掌考第孝秀北齊課功郎中亦掌考第及孝秀貢士隋文帝置考功侍郎煬帝改為考功郎武德初復為考功郎中龍朔二年改考功為司績咸通初復舊掌考察內外百官及功臣家傳碑頌誄諡等事員外郎一人隋文帝置煬帝改為考功承務郎武德初復為考功員外郎其後曹改而官不易武德舊令考功郎中監試貢舉人貞觀以來乃以員外郎専掌貢舉省郎之殊美者至開元二十四年移貢舉於禮部而考功員外郎分判事而已宋朝典選之職自分為四文選二曰審官東院太平興國六年命郭贄考京朝官課淳化二年置磨勘京朝官院又以興國中所置差遣院併入號磨勘差遣院亦名考課院淳化四年以考課京朝官院為審官院而涑水記聞云太宗患中書權太重向敏中時為諫官請分中書吏房置審官院刑房置審刑院熙寧間置審官西院以主武選於是改審官院為審官東院焉曰流內銓實録淳化四年以幕職州縣考課院歸流內銓命翰林學士蘇易簡領其事自後命近臣主之武選二曰審官西院涑水記聞云王介甫與韓子華合謀欲沮文潞公且奪其權一日發中旨置審官西院樞密初不知也曰三班院實録淳化三年詔置三班院以崇儀副使蔚進掌之先是供奉官等悉𨽻宣徽院至是别置三班院以考殿最自後多命近臣以主之元豐定制以審官東院為尚書左選審官西院為尚書右選流內銓為侍郎左選三班院為侍郎右選道鄉集蘇丞相行狀唐制文選掌於吏部武選則兵部主之掌文武官選授勳封考課之政令文臣寄祿官自朝議大夫職事官自大理正以下非中書省敕授者歸尚書左選武臣升朝官自皇城使職事官自金吾衛仗司以下非樞密院宣授者歸尚書右選自初仕至州縣幕職官歸侍郎左選自借差監當至供奉官軍使歸侍郎右選凡分職為三封爵贈官之事則司封主之賜功定省之事則司勳主之官資課最名諡之事則考功主之凡應注擬升移敘復蔭補及酬賞封贈者隨所分𨽻校勘法例團甲以上尚書省即法例可否不決應取裁者亦如之若中散大夫閣門使以上則列遷敘之狀上中書省樞密院得盡給告身則通書尚書侍郎及所𨽻郎官續會要尚書左右選凡十五案左選掌闕案知闕案六品案七品案八品案九品知雜上案下案甲庫案右選流擬案大使臣案小使臣案甲庫案掌注案知雜案告身案侍郎左右選凡十五案左選注擬知闕案補闕案參軍上案下案主簿上案下案縣尉上案下案入官案甲庫案格式案過院案右選注擬上案下案供奉官案殿直案甲庫案掌法案知一案而四選密矣尚書從二品掌文武之選事而奉行其制命凡天下員闕具注諸籍月取其應選者揭而書之集官注擬考其閥閲以定可否凡選授封爵功賞課最之事皆所𨽻郎官驗實而後判成焉若有疑不能決則稟議於尚書省即應論奏與郎官同上殿侍郎從三品掌文臣未改秩者凡始命或有殿負皆試而後選若應遷格則團甲同郎官引見於便殿稟奏改官右選掌武臣未升朝者凡所任而試不中等及已入官而未應選者皆勿注正闕若選路分都監將官閣門祗候都總管司承受皆以名上樞密院視朝入閣則執文武班簿對立官制尚書侍郎同治曹事奏事則同班惟吏選分領四選有所論奏則各以選事同所𨽻郎官上殿元豐寄祿吏部尚書為金紫光祿大夫六部侍郎為正議大夫南渡初諸曹尚書侍郎互置惟吏部備官紹興八年依元祐制六曹皆置權尚書以處未應資格之人建炎四年六曹置權侍郎如元祐制滿二年為真補外者除待制未滿除修撰舊制吏部除侍郎二員分典左右選總稱吏部侍郎間命官兼攝惟稱左選侍郎或右選而已紹熙三年謝深甫張叔椿兼攝始有侍左侍郎侍右侍郎之稱既而自林大中沈揆擢二尚書則侍左侍右徑入除目相承不改郎中主管尚書左右選及侍郎左右選各一員參掌選事而分治之凡郎官並用知縣資序以上充未及者為員外郎元豐寄祿為朝請大夫建炎四年詔權攝添差郎官並罷初進擬第云吏部郎官及擬告身細銜始具言吏部尚書郎中或員外郎主管尚書某選主管侍郎某選紹興間吕希常以監六部門兼權侍右侍郎李端民正除尚右郎官既而何俌楊倓費行之除吏部郎官皆有侍左侍右尚左尚右之稱自此相承不改乾道元年紹令後非曾任監司守臣不除郎官著為令自是館學寺監丞拘礙資格遷除不行郎曹闕員但得兼攝旋即外補間有不次擢用者則自二著躐升二史以至從列其自外召至為郎則資級已髙曾不數月即序進卿少而郎有正員者益少矣司封判司事一人初以無職事朝官充凡封爵之制一出於中書本司但掌定諡先期戒本部赴集而已元豐官制行始實行本司事掌封爵敘贈奏蔭承襲之事寄祿為朝請大夫司勳掌勳掌事凡勳十有二級自上柱國至武騎尉自從七品推而上之至正三品三嵗一遷必因其除授以加之凡賞有格若事應賞從所𨽻之司考實以報審核以上尚書省寄祿為朝請大夫隆興初詔省併司勳郎中以司封郎中兼領考功判司事一人以帶職朝官或無職事朝官充凡考課之法分𨽻他司或以他司専領本司但掌覆太常擬諡及幕府州縣官流外較考之事元豐官制行郎中員外郎始實行本司事續會要初除蔡峋蔡京職略掌文武遷敘磨勘資任考課之政令凡命官隨所𨽻選以其職事且注於歷給之於其屬州若司嵗書其功過應升遷選授者驗歷按法而敘進之有負殿則正其罪罰以七事考監司以四善三最考守令凡改服色者以年勞計之應諡者覆太常所定行狀報尚書省官集議以聞凡立碑碣名額之事掌之舊置考課院其定殿最皆有考辟元豐悉罷分案十有七五品案六品案七品案八品案九品案職官案參軍案令丞案主簿案縣尉案使副案供奉官案資任案校定案法案知雜案元祐三年詔知州課法吏部上其事於尚書省送中書省取旨縣令以下本部專行官告院主管官二員舊制掌吏兵勳封官告以給妃嬪王公文武品官內外命婦及封贈者四選皆用吏部印惟蕃官用兵部印凡綾紙幅數標軸各色皆視其品之髙下應奏鈔劃聞者給之大觀併歸尚書省政和仍歸吏部差主管官户部尚書侍郎郎郎中部員外郎員度支郎中部員外金郎中外郎倉郎中員外郎周禮地官大司徒之職掌建邦之土地之圖與其人民之數按今戶部之職與地官之任雖亦頗同若徴其承受考其沿襲則戶部合出於度支度支主計算之官也算計之任本出於周禮天官之司會云又太宰之屬有司會以九貢之法致邦國之財用以九賦之法令田野之財用以九功之法令民職之財用以九式之法均節邦之財用掌國之官府郊野縣都之百物財用凡在書契版圖者之二以逆羣吏之治而聼其會計逆謂受而鉤考之可知得失多少漢置尚書郎四人其一人主財帛委輸至魏文帝置度支尚書寺專掌軍國支計吳有户部吳孫休初即位戶部尚書階下讀奏而晉有度支晉當陽侯杜元凱為度支尚書內以利民外以救邊備物置用以濟當時之益者五十餘條又張華為度支尚書量計運漕決定廟算皆主算計也宋齊度支尚書領度支金部倉部起部四曹梁亦有之後魏度支亦掌支計崔亮為度支尚書經營費用嵗減億計北齊度支統度支掌計會凡軍國損益供糧廪等事倉部左戶左戶掌天下計帳戶口右户掌天下公私田宅租課金部庫部六曹後周置大司徒卿一人如周禮之制其屬有民部中大夫二人掌承司徒教以籍帳之法贊計人民之衆寡隋初有度支尚書則并後周民部職漢武帝初置尚書有民曹主凡吏民上書悉經此曹主之後漢光武改民曹主繕修工作鹽池苑圃魏置左民尚書晉惠帝又加置右民尚書至於宋齊梁陳皆有左民尚書而後魏有左民右民等尚書多領工役非今戶部之例而梁陳兼掌戶籍此則略同自周隋有民部始當今戶部之職開皇三年改度支為民部統度支民部金部倉部四曹國家修隋志謂之户部蓋以廟諱故也煬帝時韋中為民部尚書又武德二年隋民部尚書蕭瑀為相府司録唐永徽初復改民部為戶部廟諱故也太宗在位詔官名及公私文籍有世民兩字不相連者並不諱至元宗始諱之顯慶元年改戶部為度支龍朔二年改度支尚書為司元太常伯咸亨元年復為戶部尚書初戶部居禮部之後武太后改置天地四時之官以戶部為地官由是遂居禮部前神龍元年復改地官為戶部總判戶部度支金部倉部事侍郎二人蓋周官小司徒建大夫職同其任後周依周官今侍郎則隋煬帝置民部侍郎唐因之後改曰戶部龍朔二年改為司元少常伯咸亨元年復為戶部侍郎他時曹名或改而官號不易舊制一員長安四年加一員神龍元年減二年復加郎中二人漢尚書郎一人主戶口墾田吳時張溫為尚書戶曹郎魏有民曹郎晉分為左右民曹宋齊以下或為左民或為左户後魏有戶部郎北齊有左右民曹同在吏部郎中篇隋初為戶部侍郎煬帝除侍字隋末改為民部郎武德初為民部郎中龍朔二年改郎中為大夫咸通元年復舊他時曹名或改而官號不易掌户口籍帳賦役孝義優復蠲免婚姻繼嗣百官衆庶園宅口分永業等建中三年正月戶部侍郎判度支杜佑奏天寶以前戶部事繁所以郎中員外各二人判署自兵興以後戶部事簡度支事繁唯郎中員外各一人請回輟郎中員外各一人分判度支案待天下之兵革已息却歸本曹奉敕依員外郎二人隋文帝置煬帝改為承務郎武德三年復為員外郎度支郎中一人漢初張蒼善算以列侯主計居相府領郡國上計者謂之計相殆今度支之任魏尚書有度支歷代度支具尚書中隋初為度支侍郎煬帝除侍字武德加中字龍朔二年改度支為司度咸亨元年復舊掌支使國用開元二十四年三月戶部尚書同中書門下三品李林甫奏租庸丁防和糴春綵稅草諸色旨符每年一造據州府及諸司計紙當五十萬張仍差百司抄寫事甚勞煩條目既多詳檢難過緣無定額支稅不常亦因此涉情兼長姦偽臣今與採訪使及朝集使商量有不穩便於人非當土所出者隨意沿革務從允便即人知定準政有常文編成五卷以為長行首冠省事司每年但收應支物數頒行每州不過一兩紙仍附驛送敕依至德以後戎事費多二年十二月吕諲為兵部侍郎平章事充勾當度支使上元元年五月劉晏為户部侍郎勾當度支事元年建子月元載為户部侍郎勾當度支使寶應元年正月劉晏為戶部侍郎勾當度支使二年二月韓滉以宰相加度支使五月二日竇參為中書侍郎平章事度支使自後雖無亦有他官判或云權判亦云專判員外郎一人改置與户部員外郎同金部郎中一人周官有金職掌金玉錫石丹青之令魏尚書有金部郎其後歷代多有之北齊金部主才量尺度內外諸庫藏文帳隋盧昌衡字子均祖孝徴薦為尚書金部郎每謂人曰吾用盧子均為尚書郎自謂無愧幽冥矣隋初為金部侍郎煬帝除侍字武德中加中字龍朔二年改金部為司珍成亨初復舊天寶中改為司金至德初復舊掌庫藏金寶貨物權衡度量等事自開元二年置鑄錢使皆以他官為之員外郎一人改置與戶部員外郎同倉部郎中一人周官有倉人主藏九穀又有廩人主藏九榖之數賙賜稍食魏尚書有倉部郎後魏有太倉尚書亦其任也故後魏書曰李欣為太倉尚書攝南部事令千里之外戶别轉運詣倉輸之所在委積延停嵗月大為困弊歷代多有倉部曹皆掌倉廩之事後周有地官屬司倉下大夫隋初為倉部侍郎煬帝除侍字武德中加中字龍朔二年改倉部為司庾咸亨初復舊天寶中改為司儲至德初復舊掌諸倉廩之事開元二十六年以後置出納使皆以他官為之欣音許斤切員外郎一人改置與户部員外郎同宋制戶部判部事一人以兩制以上充凡戶口田産錢榖食貨之政令皆歸於三司三司謂鹽鐵户部度支也本曹但受天下之土貢元會陳於庭而已熙寧中以知樞密院陳升之參知政事王安石制置三司條例建官設屬取三司條例看詳所行事付之三年罷歸中書以常平免役農田水利新法歸司農以胄案歸軍器監修造歸將作監推勘公事歸大理寺帳司理欠司歸比部衙司歸都官坑冶歸虞部而三司之權始分矣元豐官制行罷三司歸户部左右曹而三司之名始泯矣舊三司使即今尚書副使即今侍郎權發遣副使即今