但掌制科舉人補奏太廟郊社齋郎室長掌座都省集議百官謝賀表章諸州申舉祥瑞出納內外牌印之事而兼領貢院官制行始正其職凡天地宗廟陵園之祀后妃親王將相封册之命皇子加封公主降嫁稽其儀以詔上下而舉行之朝廷慶會宴樂宗室冠婚喪祭蕃使去來宴賜與夫經筵史館賜書修書之禮例皆同奉常講求參酌而定其儀節三嵗貢舉學校試補諸生皆總其政旌節章服之頒祥瑞表奏之進凡關於禮樂者皆掌之建炎三年詔鴻臚光祿寺併歸於禮部太常國子監亦𨽻之焉分案五曰禮樂曰貢舉曰宗正奉使帳曰封册表曰檢法各隨其名而治其事侍郎二尚書之事南渡諸曹長二互置紹興七年禮部置侍郎二員隆興初詔尚書不常置禮部侍郎置一員郎中參預禮樂祭祀朝會宴享學校貢舉之事有所損益則審訂以次咨決凡慶賀若謝掌撰表文與祠部主客膳部並列為四建炎四年併省郎曹禮部領主客祠部領膳部隆興初復詔禮部祠部一員兼領自是併行四司之事矣祠部掌諸州宫觀僧尼道士童行住持教門事務祠祭奉安祈禱神廟加封賜額並屬之醫官磨勘醫生試補校其事而豫奪之主客掌諸蕃朝貢宴設賜豫之事膳部掌祠寺奏告牲牢禮料及宴設酒食果實之事收氷藏氷賜氷以時無闕事御厨翰林司牛羊司𨽻焉兵部尚書侍郎郎郎中部員外郎員職方郎中部員外駕郎中外郎庫郎中員外郎周禮夏官大司馬之職以九伐之法正邦國制軍詰禁以糾邦國領校人牧師職方司兵之屬即今兵部之任也魏置五兵尚書周官有司兵掌五兵五盾各辨其物與其等以待軍事五兵之名當出於此鄭司農云五兵者戈殳戟酋矛夷矛也五兵謂中兵外兵騎兵别兵都兵也晉初無太康中乃有五兵尚書而又分中兵外兵各為左右按晉雖分中兵外兵為左右與舊五兵為七曹然尚書唯置五兵而已無七兵尚書之名至後魏始有七兵尚書耳今諸家著述或謂晉太康中置七兵尚書誤矣宋五兵尚書唯領中兵外兵二曹餘則無矣齊梁陳皆有之後魏為七兵尚書北齊為五兵統左中兵掌諸都督告身諸宿衛官右中兵掌幾內丁帳事諸兵力士左外兵掌河南及潼關以東諸部丁帳及發召諸兵右外兵掌河北及潼闕以西諸州所典與左外兵同都兵掌鼓吹大樂部小兵等事五曹後周置大司馬其屬又有兵部中大夫小兵部下大夫其職並闕至隋有兵部尚書統兵部職方駕部庫部四曹蓋因後周兵部之名兼前代五兵之職唐龍朔二年改兵部尚書為司戎太常伯咸亨元年復舊光宅元年改為夏官神龍元年復舊天寶十一載改為武官至德初復舊掌武官選舉總判兵部職方駕部庫部事其分領選舉亦為三銓制如吏部尚書所掌謂之兩書侍郎所掌其一為中銓其一為西銓各有印侍郎二人煬帝置唐因之龍朔二年改為司戎少常伯咸亨元年復舊他時曹名或改而官不易舊制一員總章元年加一員掌武職武勳官三衛及兵士以上簿書朝集祿賜假使差發配親士帳內考核及給武職告身郎中一人歷代兵部曹皆有部具尚書中或單為郎或置郎中例在吏部郎中篇隋初為兵部侍郎煬帝除侍字改為兵部曹郎武德三年改為兵部郎中龍朔二年改為司戎大夫咸亨元年復舊掌與侍郎同員外郎二人隋文帝置兵部員外郎煬帝改為兵曹承務郎武德三年復舊其後曹改而官不易職方郎中一人周禮夏官有職方氏掌天下之圖辨九州之國歷代無聞至後周依周官隋初有職方侍郎煬帝除侍字武德中加中字龍朔二年改為司城大夫咸亨元年復舊掌地圖城隍鎮戍烽候防人路程逺近親化首渠員外郎一人周官夏官職方上士後周依周官隋改置與戶部員外郎同駕部郎中一人周禮夏官之屬有輿司馬又有校人主馬之官又有牧司掌牧放又有巾車掌公車之政及王之五輅此皆駕部之本也魏晉尚書有駕部郎宋時駕部屬左民尚書齊亦有之後魏與北齊並曰駕部郎中後周有駕部中大夫屬夏官隋初為駕部侍郎屬兵部及辛公義為駕部侍郎勾檢馬牧所獲十餘萬匹文帝喜曰唯我公義奉國忠煬帝除侍字武德二年加中字龍朔二年改為司輿大夫咸亨初復舊天寶中改駕部為司駕至德初復舊掌輿輦専乘郵驛廄牧司牛馬驢騾闌遺離畜開元十八年閏六月敕比來給傳使人為先傳馬事頗勞煩自今以後應乘傳者宜給紙劵二十三年十月敕新給都督刺史并關三官州上佐並給驛發遣二十八年六月敕有陸驛處得置水驛自二十年以後常置館驛以他官為之員外郎一人周官有輿上士後周有小駕上士蓋其任也至隋置與戶部同庫部郎中一人周官有司甲掌戈盾弓矢之長各辨其物以待軍事魏尚書有庫部郎晉因之宋庫部主兵仗文帝宴會有荒服外歸化人帝問尚書庫部郎顧琛曰庫中仗有幾許琛跪對曰有十萬人仗武庫仗多祕不言帝既問失言及琛跪對善之歷代或有或闕後魏北齊庫部屬度支尚書掌凡戎仗器用後周有武藏中大夫隋屬兵部初為庫部侍郎煬帝除侍字武德中加中字龍朔二年改為司庫大夫咸亨初復舊天寶十一載又改庫部為司庫至德初復舊掌軍器儀仗鹵簿法式及乘具等員外郎一人周官有司兵中士後周有小武藏下大夫隋改置與戶部同宋兵部判部事一人凡籍武官軍師卒戎之政令悉歸於樞密院其選授小者又歸三班本曹但掌三駕儀仗鹵簿字圖釋奠武成王廟及武舉事嵗終以義勇兵箭手寨兵之數上於朝元豐更制惟民兵馬政權𨽻樞密院武官銓選并歸吏部五年詔應緣義勇保甲事並𨽻樞密院其餘民兵悉𨽻兵部以什伍之法教民為兵以選舉之法試武士以鹵簿字圖分布儀衛以郡縣之圖周知地域凡廂軍蕃兵剩員及金吾街仗司人兵稽其數而振飭其藝大將出征告捷於廟破賊露布以聞臣僚之家宣借兵級與夫蕃夷屬户授官封襲之事皆掌之建炎三年併衛尉寺𨽻焉分案十曰賞功曰民兵衛曰廂兵曰人從看詳曰帳籍告身曰武舉曰蕃官曰開折曰知雜曰檢法侍郎南渡後長二互置續侍郎二員隆興常置一員郎中建炎三年詔兵部兼職方駕部兼庫部隆興初詔駕部兵部郎官共一員兼領自是四司合為一矣厥後間或並置若從軍或將命於外則假以為寵職方掌天下地圖以周知方域之廣及城隍堡塞𤇺候之事蕃夷歸朝內附之事駕部掌輦路車乘廄牧雜畜乘具傳驛之政令辨其出入之數建炎三年詔併太僕寺𨽻焉太僕有騏驥車輅二院左右騏驥院監官二員以武臣充掌司國馬總教駿四指揮之衆以養餵諸馬每一指揮百人為額車輅院掌供乘輿法物庫部掌軍器儀仗鹵簿法式隨軍防城什物及凡供帳之事洪氏容齋隨筆曰唐因隋制尚書置六曹吏部兵部分掌銓選文屬吏部武屬兵部自三品以上官册授五品以上制授六品以下敕授皆委尚書省奏擬兩部各列三銓曰尚書銓尚書主之曰東銓曰西銓侍郎二人主之吏居左兵居右是為前行故兵部班級在户刑禮之上睿宗初政以宋璟為吏部尚書李乂盧從原為侍郎姚元之為兵部尚書陸象先盧懷謹為侍郎六人皆名臣二選稱治其後用人不能悉得賢然兵部為甚其變而為三班流外銓不知自何時元豐官制行一切更改凡選事無論文武悉以付吏部蘇東坡當元祐中拜兵書謝表云然恭惟先帝六卿之名本欲後人識三代之舊古今殊制間劇異宜武選𨽻於天官兵政總於樞府故司馬之職獨省文書蓋紀其實也今本曹所掌惟諸州廂軍名籍及每大禮則書寫蕃官加恩告雖有所轄司局如金吾街仗司騏驥車輅象院法物庫儀鸞司不過每季郎官一往耳名存實亡一至於是刑部尚書侍郎郎郎中部員外郎員都官郎中門員外比郎中外郎司郎中員外郎唐虞之時士官以正五刑周禮秋官大司寇掌邦之三典以佐王刑邦國蓋其任也漢成帝時尚書初置二千石曹主郡國二千石又置三公曹主斷獄後漢光武改三公曹主嵗盡考課諸州郡政二千石曹掌中都官水火盜賊辭訟罪法亦謂之賊曹重於諸曹華談集尚書二曹論曰劉道真問薛令長在吳何作答曰為吏部尚書問曰吳待吏部何如餘曹答曰並通髙選吏部特一時之俊劉曰晉魏以來俱爾獨謂漢氏重賊曹為是吳晉重吏部為非薛君曰八座秩同班等其選並清宜同一揆若人才或多或少選例難精如不得已吏部職掌人物人物難明謂吳晉為得君何是古而非今劉難曰今吏部非為能刋虛名舉沉朴者故録以成人位處三署聼曹探鄉論而用之耳無煩乎聰明賊曹職典刑獄刑獄難精是以欲重之答曰今之賊曹不能聼聲觀色以别真偽縣不能斷讞之尚書也夫在獄者率小人在朝者率君子小人易檢君子難精俱不得已吏部宜重賊曹宜輕也魏青龍二年置尚書都官郎佐督軍事晉復以三公尚書掌刑獄宋三公比部皆王法制又置都官尚書主軍事刑獄領都官水部庫部功論四曹齊梁陳並有都官尚書後魏亦有都官尚書北齊都官統都官掌畿內非為得失二千石掌畿內得失比部水部膳部五曹又有三公曹掌諸曹囚賑斷罪赦日建金雞等處又掌五時讀時令屬殿中尚書後周有秋官大司寇卿掌刑邦國其屬官又有刑部中大夫掌五刑之法隋初有都官尚書開皇三年改都官為刑部尚書統都官刑部比部司門四曹亦因後周之名唐因之龍朔二年改刑部尚書為司刑太常伯咸亨元年復舊武太后改刑部為秋官神龍初復舊天寶中改為憲部至德初復舊總判刑部都官比部司門事侍郎一人周官小司寇中大夫蓋今任也後周依周官至隋煬帝置刑部侍郎唐因之龍朔二年改為司刑少常伯咸亨元年復舊他時曹名或改而官號不易掌律令定刑名案復大理及諸州應奏之事郎中二人周官大司寇屬官有士師下大夫蓋今任也漢尚書有三公曹後漢有二千石曹魏有都官曹皆掌刑法獄訟之事歷伐沿革具尚書中或為侍郎或置郎中例在吏部郎中篇後周有小刑部下大夫屬秋官府隋初置刑部侍郎煬帝除侍字又改為憲部郎武德三年改為刑部郎中龍朔二年改為司刑大夫咸亨元年復舊與侍郎同員外郎二人隋文帝置刑部員外郎煬帝改為憲部承務郎武德三年改為刑部員外郎其後曹改而官不易都官郎中一人漢司𨽻校尉屬官有都官從事掌中都官不法事後漢又改尚書二千石曹掌中都官水火盜賊魏青龍二年始置尚書都官郎佐督軍事晉宋尚書都官兼主刑獄歷代事具尚書中其官例在吏部郎中注後周則曰司厲隋初為都官侍郎掌簿録配役官私奴婢良賤訴競俘囚等事煬帝除侍字置員外二人武德三年加中字減一人龍朔二年改為司僕大夫咸亨元年復舊掌簿斂配役官奴婢簿籍良賤及部曲客女俘囚之事員外郎一人周官曰司厲下士蓋並今任也後周依焉隋改置與戶部同比部郎中一人魏尚書有比部曹晉因之宋時比部主法制齊梁陳皆有比部曹後魏亦然北齊掌詔書律令勾檢等事後周曰計部中大夫蓋其任也隋初為比部侍郎煬帝除侍字武德中加中字龍朔二年改為司計大夫咸亨元年復舊天寶十一載又改比部為司計至德初復舊掌內外諸司公廨及公私債負徒役公程贓物帳及勾用度物員外郎一人改置與戶部員外郎同司門郎中一人周禮地方有司門下大夫掌授管鍵啓閉歷代多闕至後周依周官隋初有司門侍郎煬帝除侍字武德三年加中字龍朔二年改為司門大夫咸亨元年復舊掌門籍關橋及道路過所闌遺物事員外郎一人周官有司門上士後周依焉後改置與戶部同宋刑部判部事二人以御史知雜以上或朝官充淳化二年以刑部覆大辟案增置審刑院知院事一人以郎官以上至兩省充詳議官以京朝官充掌詳讞大理所斷案牘而奏之治所在右掖門凡四方以刑獄來上則讞於審刑院大中祥符二年置紏察在京刑獄司紏察官二人以兩制以上充詳正駮奏在京刑禁徒以上罪者元豐三年併歸刑部五年官制行刑部始專其官侍郎舊制定奪審復除雪敘復移放尚書專領之若制勘體量奏讞紏察録問長二通治之中興長二互置隆興常置一員淳熙依崇寧専法奏獄及法令事請大理寺官赴部共議郎中二人分左右廳掌詳覆敘雪之事建炎時郎中二員職無分異紹興時詔依元豐舊法分廳治事左以詳覆右以敘雪使官各有守人各有見參而任之都官掌在京百司吏職補換更替或以功過展減磨勘則依條制行之諸路州軍編配羈管等人置册以記其在亡建炎三年詔比部兼司門隆興初詔都官比部各置一員自此都官兼比部司門之事比部掌勾稽文帳周知百司給費之多寡凡諸倉場庫務收支各隨所𨽻以時具帳籍申上比部驅磨審覆而會計其數諸受文歷每季終取索審核事故住支及藏罰欠債負則追索填納無隱昧則勾銷除破司門掌門關津梁道路之禁令凡所過官吏軍民商販出入稽其詐偽工部尚書侍郎郎郎中部員外郎員屯田郎中部員外虞郎中外郎水郎中員外郎軍器所文思院周禮冬官其屬有考工掌百工之事曰國有六職百工是其一焉漢成帝初置尚書有民曹主凡吏民上書後漢光武改民曹主繕修功作鹽池囿苑魏置左民尚書亦領其職晉宋以來有起部尚書而不常置每營宗廟宫室則權置之事畢則省以其事分屬都官左民二尚書北齊起郎亦掌工造屬祠部尚書後周有冬官大司空卿掌五材九範之法其屬工部中大夫二人承司之事掌百工之籍而理其禁令至隋乃有工部尚書統工部屯田二曹蓋因後周工部之名兼前代起部之職唐龍朔二年改工部尚書為司平太常伯咸亨元年復舊武太后改工部為冬官神龍初復舊總判工部屯田虞部水部事侍郎一人隋煬帝改置工部侍郎唐因之龍朔二年改為司平少常伯咸亨元年復舊他時曹名或改而官不易掌興造工匠諸公廨屋宇五行并紙筆墨等事郎中一人晉尚書有起部曹歷代皆有具尚書中隋初為工部侍郎煬帝除侍字又改為起部郎武德三年改為工部郎中龍朔二年改為司平大夫咸亨元年復舊其後曹名改而官不易所掌與侍郎同員外郎一人隋文帝置工部員外郎煬帝改為起部承務郎武德三年復為工部員外郎其後曹改而官不易屯田郎中一人漢成帝置尚書郎兩人其一人掌戶口墾田蓋尚書屯田郎之始也至魏尚書有農部郎又其職也至晉始有屯田尚書及太康中謂之田曹後復為屯田江左及宋齊則左民郎中兼知屯田事梁陳則曰侍郎後魏北齊並為屯田郎隋初為屯田侍郎兼以掌儀武之事故隋書曰補或為屯田侍郎煬帝除侍字武德三年加中字龍朔二年改為司田大夫咸亨元年復舊掌屯田官田諸司公廨官人職分賜田及官園宅等員外郎一人改置與户部員外郎同虞部郎中一人虞部蓋古虞人之遺職至魏尚書有虞曹郎中晉因之梁陳曰侍郎後魏北齊虞曹掌地圖山川近逺園圃田獵雜木等並屬虞部尚書後周有虞部下大夫掌山澤草木烏獸而阜蕃之又有小虞部並屬大司馬隋初為虞部侍郎屬工部煬帝除侍字武德中加中字龍朔二年改為司虞大夫咸亨元年復舊天寶十一載又改虞部為司虞至德初復舊掌京城街巷種植山澤苑囿草木薪炭供須四稅等事員外郎一人隋置曹與戶部員外郎同龍朔以後曹名改而官不易水部郎中一人周禮夏官有司檢掌設國之五溝五塗而逹其道路蓋其職也魏尚書有水部郎歷代或置或否後魏北齊有水部屬都官尚書亦掌舟船津梁之事後周有司水大夫隋初為水部侍郎屬工部煬帝除侍字武德三年加中字龍朔二年改為司川大夫咸亨元年復舊天寶中改水部為司水至德初復舊掌川瀆津堰船艫浮橋溝渠漁捕運漕水碾磑等事員外郎一人後周小司水上士隋改曹與戶部員外郎同龍朔二年以後曹名改而官不易宋制工部判部事一人以兩制以上充凡城池土木工役皆𨽻三司修造案本曹無所掌元豐官制行尚書工部掌天下城池宫室舟車器械符印錢寶之事百工山澤溝洫屯田之政令是時尚書猶未除人紹興三年并少府監歸工部以文思院屬焉建炎并省將作少府軍器監並歸工部是時營繕未遑惟戎器方急紹興二年詔於行在别置作院一所專打造器甲令工部長二專一提點郎官逐旬點檢少府監既歸工部文思院上下界監官並從本部辟差又詔御前軍器所𨽻工部自是營造稍廣宰臣議戶部以給財為務工部以辦事為能誠非一體欲令户部兼領其事上雖然之卒未能合隆興以後宫室器甲之造寖稀且各分職掌而起部之務益簡特提其綱要焉分案六曰工作曰營造曰材料曰兵匠曰檢法曰知雜舊又專立一案以御前軍器案為名侍郎南渡初長二互置隆興詔各置一員郎中舊制凡製作營繕計置採伐材物按程式以授有司則郎中員外郎參掌之建炎三年詔工部郎官兼虞部屯田郎官兼水部隆興元年詔工部屯田共一員兼領自此四司合為一矣屯田掌凡屯田營田職田學田官莊稻田塘濼堤堰之事虞部掌凡山澤苑囿畋獵取伐木石薪炭藥物之屬屏絶猛獸毒藥及茶礬場鹽池井金銀銅鐵鉛錫坑冶廢置收採之事水部掌凡川瀆河渠津梁舟楫漕運水碾磑凡隄防疏瀹之政令皆掌之軍器所𨽻工部提點官二員紹興三十二年詔於邊臣內差提轄監造官各二員幹辦受給監門官各一員掌鳩工聚材製造戎器之政令舊就軍器監置别差提舉官以內侍領之紹興中改𨽻工部罷提舉官日輪工部郎官軍器監官前去本所點檢監視後復以中人典領工部侍郎黃中以為言請復𨽻屬從之三十二年孝宗即位有旨增置提點官以內省都知李綽為之改稱提舉免𨽻工部後以御史張震力爭復𨽻工部後改𨽻步軍司尋復舊紹熙元年減省員額如上制文思院𨽻工部提轄官一員監官三員內一員文臣京朝官充監門官一員掌金銀犀玉工巧及綵繒裝鈿之飾凡儀物器仗權量輿服所以供尚方給百司者於是出焉沿革附見𣙜貨務都茶場提轄官六部監門六部監門官一員掌司鑰紹興二年置選升朝文臣有才力人充仍令六部踏逐奏差序位請給依寺監丞郎官有闕得兼之初從吏部尚書沈與求之請也主管架閣庫掌儲藏帳籍文案以備用擇選人有時望者為之舊有管幹架閣庫官宣和罷之紹興十五年復置吏户部各差一員體兵部共差一員刑工部共差一員以主管尚書某部架閣庫為名從大理寺丞周楙之請也嘉定八年又置三省樞密院架閣官三省樞密院監門官舊以小使臣為之嘉定六年諫官鄭景紹言部門以京朝官則省門事體尤重遂亦命京朝官曾作縣通判資序人為之文獻通考卷五十二
