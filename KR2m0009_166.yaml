body:
  text: 文獻通考卷一百六十六鄱陽馬端臨貴與著刑考五刑制唐髙祖入關除苛政約法十二條唯制殺人劫盜背軍叛逆餘悉蠲之武德二年頒新格五十三條唯吏受贓詐冒盜府庫物赦不原凡斷屠日及正月五月九月不行刑四年髙祖躬録囚徒以人因亂冒法者衆盜非劫傷其主及征人逃亡官吏枉法皆原之已而又詔僕射裴寂等十五人更撰律令大略以開皇為凖凡律五百麗以五十三條唐之刑書有四曰律令格式律令者尊卑貴賤之等數國家之制度也格者百官有司之所常行之事也式者其所常守之法也凡邦國之政必從事于此三者其有所違及人之為惡而入於罪戾者一斷以律律之為書因隋之舊為十有二篇一曰名例二曰衛禁三曰職制四曰户婚五曰廄庫六曰擅興七曰賊盜八曰鬬訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄其用刑有五一曰笞笞之為言恥也凡過之小者捶撻以恥之漢用竹後世更以楚書曰撲作教刑是也二曰杖杖者持也可持以擊也書曰鞭作官刑是也三曰徒徒者奴也蓋奴辱之周禮曰其奴男子入於罪𨽻任之以事置之圜土而教之量其罪之輕重有年數而捨四曰流書云流宥五刑謂不忍刑殺宥之於遠也五曰死乃古大辟之刑也自隋以前死刑有五曰罄絞斬梟裂而流徒之刑鞭笞兼用數皆踰百至隋始定為笞刑五自十至于五十杖刑五自六十至于百徒刑五自一年至于三年流刑三自一千里至于二千里死刑二絞斬除其鞭刑及梟首轘裂之酷又有議請減贖當免之法唐皆因之諸枷長五尺以上六尺以下頰長二尺五寸以上六寸以下共闊尺四寸以上六寸以下徑三寸以上四寸以下杻長六寸以上二尺以下廣三寸厚一寸鉗重八兩以上一斤以下長一尺以上一尺五寸以下鎌長八尺以上丈二尺以下諸杖皆削去節目長三尺五寸訊囚杖大頭三分二釐小頭二分三釐常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分半其決笞者腿分受決杖者背腿臀分受須數等栲訊者亦同笞以下願背腿均受者聽即殿庭決者皆背受太宗即位以為古者斷獄必訊于三槐九棘之下今三公九卿即其職也乃詔死罪中書門下五品以上及尚書平議之帝嘗覽明堂針炙圗見人之五臟皆近背針灸失所則其害致死歎曰夫箠者五刑之輕死者人之所重安得犯至輕之刑而或至死乃詔罪人毋鞭背詔三品以上犯公罪流私罪徒皆不追身時引囚至岐州刺史鄭善果上曰善果雖有罪官品不卑豈可與諸囚為伍乃詔自今三品以上犯罪不須引過聽於朝堂俟進止致堂胡氏曰三品以上貴近之臣也大臣不欲與諸囚同引得待臣以恥之道矣然諸囚蒙引而貴近之臣反不見引設有誣陷寃抑欲面訴於君而止於朝堂無由自進其所失又多矣隋史萬嵗實在朝堂而楊素以往謁東宫讒之朝堂雖近天子之居至是遠於萬里故太宗不欲使三品以上與囚同引者别引可也二年詔長孫無忌房元齡等復定律令議絞刑之屬五十皆免死而斷右趾其後蜀王府法曹參軍裴𢎞獻又駮律令不便者四十餘事遂除斷趾法為加役流三千里居作比古死刑殄除其半據有司定律五百條分為十二卷于隋代舊律減大辟入流九十二條減入徒七十一條既定免死斷右趾法帝又哀其斷毁支體謂侍臣曰肉刑前代除之久矣今復斷人趾吾不忍也王圭蕭瑀陳叔達對曰受刑者當死而復生豈憚斷一趾去趾所以使見者知懼今以死刑為斷趾蓋寬之也其後裴𢎞獻駮律令房元齡等又以為古者五刑刖居其一今肉刑既廢以笞杖徒流死為五刑而又刖足是六刑也於是除之五年帝以大理丞張藴古奏罪不以實斬之既而大悔詔死罪雖令即決皆三覆奏見詳讞門六年帝親録囚徒縱死罪三百九十人歸家期以明年秋即刑如期皆來乃赦之見赦門十一年頒新格於天下凡律五百條分為十二卷定律一千五百四十六條為三十卷又刪武德以來敕三千餘條為七百條以為格又取尚書省列曹及諸寺監十六衛計帳以為式凡州縣皆有獄而京兆河南獄治京師其諸司有罪及金吾捕者又有大理獄京師之囚刑部月一奏御史巡行之每嵗立春至秋分及大祭祀致齋朔望上下弦二十四氣雨及夜未明假日斷屠日皆停死刑京師決死涖以御史金吾在外則上佐餘皆判官涖之五品以上罪論死乘車就刑大理正涖之或賜死於家凡囚已刑無親屬者將作給棺瘞于京城七里外壙有磚銘上揭以榜家人得取以葬諸獄之長官五日一慮囚夏置漿飲月一沐之疾病給醫藥重者釋械其家一人入侍職事散官三品以上婦女子孫入侍天下疑獄讞大理寺不能決者尚書省衆議之録可以為法者送祕書省奏報不馳驛經覆而決者刑部嵗以正月遣使巡覆所至閲獄囚杻校糧餉治不如法者十六年詔盜賊之作為害最深州縣官人多求虛譽茍有盜發不煩陳告鄉村長正知其此情遞相勸止十不言一假有披論先劾物主爰及鄰伍久嬰縲紲有一於斯實虧正化自今以後勿使更然十七年刑部以反逆連坐律兄弟沒官為輕請改從死勑八座議之議者以為秦漢魏晉之法反者皆夷三族今宜如刑部所請給事中崔仁師駁曰古者父子兄弟罪不相及奈何以亡秦酷法變隆周中典且誅其父子足纍其心此而不顧何愛兄弟上從之髙宗即位詔律學之士撰律疏又長孫無忌等增損格勑其曹司常務曰留司格頒之天下曰散頒格龍朔儀鳯中司刑太常伯李敬元左僕射劉仁軌相繼又加刋正趙冬曦上書言臣聞夫今之律者昔乃有千餘條近者隋之姦臣將弄其法故著律曰犯罪而律無正條者應出罪則舉重以明輕應入罪則舉輕以明重立夫一言而廢其數百條自是迄今竟無刋革遂使死生罔由乎法律輕重必因乎愛憎受罰者不知其然舉事者不知其犯臣恐賈誼見之必為之慟哭矣立法者貴乎下人盡知則天下不敢犯耳何必飾其文義簡其科條哉夫科條省則下人難知文義深則法吏得便下人難知則暗陷機穽矣安得無犯法之人哉法吏得便則比附而用之矣安得無弄法之臣哉臣請律令格式復更刋定其科條言罪直書其事無假文飾其以凖加減比附量情及舉輕以明重不應為而為之類皆勿用之使愚夫愚婦聞之必悟則相率而遠之矣亦安肯知而故犯哉茍有犯者雖貴必坐則宇宙之內肅肅然咸服矣故曰法明則人信法一則主尊書曰刑期於無刑誠哉是言永徽以後武氏得志而刑濫當時大獄以尚書刑部衛史大理寺雜按謂之三司而法吏以慘酷為能至不釋枷而笞捶以死者皆不禁律有杖百凡五十九條犯者皆至死而杖未畢乃詔內有盜竊及蠧害尤甚者量留一十二條自餘四十七條並宜停然無益也武后時內史裴居道鳯閣侍郎韋方質等又刪武德以後至於垂拱詔勑為新格藏於有司曰垂拱留司格中書令韋安石又續其後至于神龍為散頒格后自徐敬業之反疑天下人多圖已又自以久專國事且內行不正知宗室大臣怨望不服欲大誅殺以威之乃盛開告密之門時有飛騎十餘人飲于坊曲一人言向知别無勳賞不若奉廬陵一人起出詣北門告之座未散皆捕得繫羽林獄言者斬餘以知而不告皆絞告者除五品官有告密者臣下不得問皆給驛馬供五品食使詣行在雖農夫樵人皆得召見廪於客館所言或稱旨則不次除官無實者不問於是四方告密者蜂起人皆重足屏息有胡人索元禮知太后意因告密召見擢為遊擊將軍令按制獄元禮性殘忍推一人必令引數十百人太后數召見賞賜以張其權於是尚書都事長安周興萬年人來俊臣之徒效之紛紛繼起興纍遷至秋官侍郎俊臣纍遷至御史中丞相與私畜無賴數百人專以告密為事欲陷一人輒令數處俱告事狀如一俊臣與司刑評事洛陽萬國俊共撰羅織經數千言教其徒網羅無辜織成反狀搆造布置皆有支節太后得告密者輒令元禮等推之競為訊囚酷法作大枷有定百脈突地吼死豬愁求破家反是實等名字或以椽關手足而轉之謂之鳯皇曬趐或以物絆其腰引枷向前謂之驢駒拔橛或使跪捧枷纍甓其上謂之仙人獻果或使立髙木之上引枷尾向後謂之玉女登梯或倒縣石縋其首或以醋灌鼻或以鐡圈其首而加楔至有腦裂髓出者每得囚輒先陳其械具以示之皆戰栗流汗望風自誣每有赦令俊臣輒令獄卒先殺重囚然後宣示太后以為忠益寵任之中外畏此數人甚于虎狼又置制獄於麗景門內入是獄者非死不出人戲呼為例竟門時法官競為深酷唯司刑丞徐有功杜景儉獨存平恕被告者皆曰遇來侯必死遇徐杜必生致堂胡氏曰自古酷刑未有甚於武后之時其技與其具皆非人理蓋出於佛氏地獄之事也佛之意本以怖愚人使之信也然其説自南北朝瀾漫至唐未有用以治獄者何獨言武后之時效之也佛之言在册知之者少形于繪畫則人人得見而慘刻之吏智巧由是滋矣閻立本圖地獄變相至今尚有之况當時羣僧得志繪事偶像之盛從可知矣是故惟仁人之言其利溥佛本以善言之謂治鬼罪於幽隂間耳不虞其弊使人真受此苦也吁亦不仁之甚矣長夀元年左臺中丞來俊臣羅告同平章事任知古狄仁傑裴行本司農卿裴宣禮前文昌左丞盧獻御史中丞魏元忠潞州刺史李嗣真謀反先是來俊臣奏請降勑一問即承反者得減死及知古等下獄俊臣以此誘之仁傑對曰大周革命萬物惟新唐室舊臣甘從誅戮反是實俊臣乃少寬之仁傑密裂衾帛書寃狀令其子持之稱變得召見則天覽之以問俊臣對曰仁傑等下獄臣未嘗褫其巾帶寢處安甚茍無事實安肯承反太后使通事舍人周綝往視之俊臣暫假仁傑等巾帶羅立於西使綝視之綝不敢視唯東顧唯諾而已俊臣詐為仁傑等謝死表使綝奏之樂恩晦男未十嵗沒入司農上變得召見太后問狀對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言可擇朝臣之忠清陛下素所信任者為反狀以付俊臣無不承反矣太后意稍悟召見仁傑曰卿承反何也對曰不承則已死於拷掠矣太后曰何為作謝死表對曰無之出表示之乃知其詐於是出此七族俱坐流貶太后自垂拱以來任用酷吏先誅唐宗室貴戚數百人次及大臣數百家其刺史郎將以下不可勝數每除一官户婢竊相謂曰鬼朴又來矣不旬月輒遭掩捕族誅監察御史朝邑嚴善思公直敢言時告密者不可勝數皆誘人奴婢告其主以希功賞太后亦厭其煩命善恩按問引虛伏罪者八百五十餘人羅織之黨為之不振乃相與搆陷善思坐流貶右補闕新鄭朱敬則以太后本任威刑以禁異議今既革命衆心已定宜省刑尚寬乃上疏以為李斯相秦用刻薄變詐以屠諸侯不知易之以寬和卒至土崩此不知變之禍也漢髙祖定天下陸賈叔孫通説之以禮義傳世十二此知變之善也自文明草昧天地屯蒙三叔流言四凶搆難不設鉤距無以應天順人不切刑名不可摧姦息暴故置神器開告端曲直之影必呈包藏之心盡露神道助直無罪不除蒼生晏然紫宸易主然而急趨無善迹促柱少和聲向時之妙䇿乃當今之芻狗也伏願覽秦漢之得失考時事之合宜審糟粕之可遺覺蘧廬之須毁去萋菲之牙角頓姦險之鋒芒窒羅織之原掃朋黨之迹使天下蒼生坦然大悅豈不樂哉太后善之賜帛三百段侍御史周矩上疏曰推劾之吏皆相矜以虐泥耳籠頭枷研楔摺膺籖爪懸髮薰耳號曰獄持或纍日節食連宵緩問晝夜搖撼使不得眠號曰宿囚此等既非木石且救目前茍求賒死臣竊聽輿議皆稱天下太平何苦須反豈被告者盡是英雄欲求帝王邪但不勝楚毒自誣耳願陛下察之今滿朝側息不安皆以為陛下朝與之密夕與之讎不可保也周用仁而昌秦用刑而亡願陛下緩刑用仁天下幸甚太后頗采其言制獄稍衰太后謂侍臣曰頃者周興來俊臣按獄多連引朝臣云其謀反國有常法朕安敢違中間疑其不實使近臣就獄引問得其手狀皆自承服朕不以為疑自興俊臣死不復聞有反者然則前死者不有寃邪夏官侍郎姚元崇對曰自垂拱以來坐謀反死者率皆興等羅織自以為功陛下使近臣問之近臣亦不自保何敢動搖所問者若有翻覆懼遭慘毒不若速死賴天啓聖心興等伏誅臣以百口為陛下保自今內外之臣無復反者若微有實狀臣請受知而不告之罪太后悅曰嚮時宰相皆順成其事陷朕為淫刑之主聞卿所言深合朕心賜元崇錢千緡時人多為魏元忠訟寃者太后復召為肅政中丞元忠前後坐棄市流竄者四嘗侍宴太后問曰卿往者數負謗何也對曰臣猶鹿耳羅織之徒欲得臣肉為羮臣安所避之元宗開元三年黃門監盧懷慎等著開元格其後李林甫又著新格凡所損益數千條宋璟著後格皆以開元名書天寶初又詔刑部尚書蕭炅稍增損之十年前廣州都督裴胄先下獄中書令張嘉貞奏請決杖兵部侍郎張説進曰臣聞刑不上大夫以其近於君也故曰士可殺不可辱臣今秋巡邊中途聞薑皎朝堂決杖流皎三品亦有微功不宜決杖廷辱以卒伍待之且律有八議勳貴在焉今胄先亦不可輕不宜決罰上然其言嘉貞不恱退謂説曰何言事之深也説曰宰臣時來則為若貴臣盡當受杖但恐吾輩行當及之此言非為胄先乃為天下士君子也容齋洪氏隨筆曰唐太宗自臨治兵以部陳不整命大將軍張士貴杖中郎將等怒其杖輕下士貴吏魏徴諫曰將軍之職為國牙爪使之執杖已非治法况以杖輕下吏乎上亟釋之明皇開元三年御史大夫宋璟坐監朝堂杖人杖輕貶睦州刺史姚崇為宰相弗能止盧懷慎亦為相疾亟表言璟明時重器所坐者小望垂矜録上深納之太宗明皇有唐賢君也而以杖人輕之故加罪大將軍御史大夫可謂失政刑矣吳氏能改齋漫録曰陳政敏遁齋間覽言杜子美脫身簿尉中始與箠楚辭韓退之判司卑官不堪説未免箠楚塵埃間杜牧之參軍與簿尉塵土驚羌勷一語不中治鞭笞身滿瘡謂唐時參軍簿尉有過不免受杖鮑彪謂詳考杜韓所言捶有罪者也牧之亦言驚見有罪者如此非身受杖也退之江陵途中云栖栖法曹掾何處事卑陬何况親犴獄敲榜發姦偷此豈身受杖者邪然太平廣記載李遜決包尉臀杖十下及舊唐書于頔為湖州刺史改蘇州追憾湖州舊尉封杖以計強決之則鮑論亦未當按以裴胄先之事觀之則唐三品官固有受杖者又張士貴宋璟所監涖者其受刑必皆胄先之流則捶楚非特簿尉末僚而已十六年御史中丞李林甫奏天下定贓估互有高下如山南絹賤河南絹貴賤處計贓不至三百即入死刑貴處至七百以上方至死刑即輕重不侔刑典安寄請天下定贓估絹每匹計五百五十價為限勑依其應徴贓入公私依常式至上元時勑先凖格例每例五百五十價估當絹一匹自今以後應定贓數宜約當時絹估並凖實錢庶叶從寬俾在不易十八年刑部奏天下死罪止二十四人致堂胡氏曰以文觀之四海九州之大一嵗死罪止有二十四人幾于刑措矣以實論之元宗以奢汰逸樂教有邦則獄訟安得一一伸理曲直安得一一辨白無乃慕刑措之名飾太平之盛有當死而蒙宥者乎官吏之慘舒一視上之好惡君好之則臣為之上行之則下從之故詩云誘民孔易茍欲措刑不用雖囹圄常空可也然訟獄曲直不得其分姦猾逋誅蠧害脫死而平人寃抑者衆矣是故善為治者必去華而務實則不為人所罔也三十三年殿中侍御楊汪為張瑝等所殺先時瑝父張審素為嶲州都督人告其贓汚制遣汪按之總管董元禮將兵七百圍汪殺告者謂汪曰善奏審素則生不然則死會救兵至擊斬之汪奏審素謀反審素坐斬籍沒其家時瑝及弟琇俱幼坐流嶺表尋逃歸謀伺便復讎三月手殺萬頃於都城繫表於斧言父寃狀欲之江外殺與萬頃同謀陷其父者至汜水為有司所得議者多言二子父死非罪稚年孝烈能復父讎宜加矜宥張九齡亦欲活之裴耀卿李林甫以為如此壞國法上亦以為然謂九齡曰孝子之情義不顧死然殺人而赦之此塗不可啓也乃下勑曰國家設法期於止殺各伸為子之志誰非徇孝之人展轉相讎何有限極咎繇作士法在必行曾參殺人亦不可恕宜付河南府杖殺士民皆憐之致堂胡氏曰復讎因人之至情以立臣子之大義也讎而不復則人道滅絶天理淪亡故曰父之讎不與共戴天君之讎視父張審素未嘗反為人妄告楊汪受命往按遽以反聞審素坐斬此汪之罪也瑝與琇忿其父死之寃亡命報之其失在不訟于司寇其志亦可矜矣張九齡欲宥之豈非為此乎而裴李降勑之言何其戾哉設法之意固欲止殺然子志不伸豈所以為教且曰曾參殺人亦不可恕是有見於殺人者死而無見于復讎之義也楊汪非理殺張審素而瑝琇殺汪事適均等但以非司寇而擅殺當之仍矜其志則免死而流放之可耳若直殺之是楊氏以一人而當張氏三人之命不亦頗乎二十五年夷州刺史楊濬坐贓當死上命杖之六十流古州左丞相裴耀卿上疏以為決杖贖死恩則甚優解體受笞事頗為辱止可施之徒𨽻不當及於士人上從之大理少卿徐嶠奏今嵗天下斷死刑五十八人大理獄院由來相傳殺氣太盛烏雀不栖今有鵲巢其樹於是百官以為幾致刑措上表稱賀按通鑑紀此事於開元之二十五年然當時李林甫方用事崇奬姦邪屏斥忠直監察御史周子諒以彈牛仙客杖死殿廬太子瑛鄂王瑶光王琚以失寵被讒無罪同日賜死皆是年事也其為濫刑也大矣而方以理院鵲巢為刑措之祥何邪天寶初李林甫為相起大獄以誣陷異已者寵任吉溫羅希奭為御史二人皆隨林甫所欲深淺煆錬成獄無能自脫者時人謂之羅鉗吉網所殺數十百人六載敕自今以後所斷絞斬刑者宜削除此條仍令法官約近例詳定處分又詔曰徒非重刑而役者寒暑不釋械繫杖古以代肉刑或犯非巨蠧而捶以至死其皆免以配諸軍自效民年八十以上及重疾有罪皆勿坐侍丁犯法原之俾終飬肅宗至德二載廣平王俶克復東京百官受安祿山父子官者陳希烈等三百餘人皆素服悲泣請罪俶以上旨釋之尋勒赴西京崔器令詣朝堂請罪如西京百官之儀然後收繫大理京兆獄其府縣所由祗承人等受賊驅使追捕者皆繫之上御丹鳯樓下制士庶受官祿為賊用者令三司條件聞奏其因戰被虜或所居密近因與賊往來者皆聽自首除罪其子女為賊所汚者勿問以禮部尚書李峴兵部侍郎呂諲為詳理使與御史大夫崔器共按陳希烈等獄峴以殿中侍御史李栖筠為詳理判官栖筠多務平恕故人皆怨諲器之刻深而峴獨得美譽器諲上言諸陷賊官背國從偽凖律皆應處死上欲從之峴以為賊陷兩京天子南巡人自逃生此屬皆陛下親戚或勳舊子孫今一槩以叛法處死恐乖仁恕之道且河北未平辟臣陷賊者尚多若寬之足開自新之路若盡誅之是堅其附賊之心也書曰殱厥渠魁脅從罔治諲器守文不達大體惟陛下圖之爭之纍日上從峴議以六等定罪重者刑之于市次賜自盡次重杖一百次三等流貶斬達奚珣等十八人於城南獨桞樹下陳希烈等七人賜自盡于大理寺應受杖者於京兆府門代宗寶應元年詔曰凡制勑與一頓杖者其數止四十至到與一頓及重杖一頓痛杖一頓者皆至六十並不至死帝性仁恕河洛平詔河北河東吏民任偽官者一切不問得史朝義將士妻子四百餘人皆赦之僕固懷恩反免其家不緣坐諌者常諷帝政寬朝廷不肅帝笑曰艱難時無以逮下顧刑法峻急有威無恩朕不忍也即位五年府縣寺獄無重囚故時别勑決人捶無數有司言應決重杖之人令式先無分别京城知是蠧害決者多死外州見流嶺南決不至死決有兩種法開二門請詳處分故有是詔德宗建中三年刑部侍郎班宏奏其十惡中謀反大逆叛惡逆四等請凖律用刑其餘犯别罪合處斬者今後並請重杖一頓處死以代極法重杖既是死刑諸司使不在奏請決重杖限敕旨依貞元八年敕比來所斷罪拘守科條或至死刑猶先決杖處之極法更此傷殘惻隱之懷實所不忍今後罪至死者先決杖宜停按鞭撲在有虞為至輕之刑在五刑之下至漢文帝除肉刑始以笞代斬趾而笞數既多反以殺人其後以為笞者多死其罪不至死者遂不復笞而止于徒流魏晉以下笞數皆多笞法皆重至唐而後復有重杖痛杖之律只曰一頓而不為之數行罰之人得以輕重其手欲活則活之欲斃則斃之夫生之與死箠楚之與刀鋸亦大有間矣今重杖痛杖之法乃出入乎生死之間而使姦吏得因緣為市是何理也至於當絞斬者皆先決杖或百或六十則與秦之具五刑何異建元時始定重杖為死刑貞元時始令死刑不先決杖蓋革纍朝弊法云憲宗時刑部侍郎許孟容等刪天寶以後敕為開元格後敕時李吉甫李綘為相吉甫言治天下必任賞罰陛下頻降赦令蠲逋賑飢恩德至矣然典刑未舉中外有懈怠心絳曰今天下雖未大治亦未甚亂乃古平國用中典之時自古欲治之君必先德化至暴亂之世始專任刑法吉甫之言過矣帝以為然司空于頔亦諷帝用刑以收威柄帝謂宰相曰頔懷姦謀欲朕失人心也元和八年詔兩京關內河東河北淮南山南東西道死罪十惡殺人鑄錢造印若強盜持杖劫京兆界中及他盜贓踰三匹者論如故其餘死罪皆流天德五城父祖子孫欲隨者勿禁唐史刑法志論曰刑者政之輔也政得其道仁義興行而禮讓成俗然猶不敢廢刑所以為民防也寬之而已今不隆其本顧風俗謂何而廢常刑是弛民之禁啓其姦猶積水而決其防故自元宗廢徒杖刑至是又廢死刑民未知德而徒以為幸也穆宗時每有司斷大獄令中書舍人一人參酌而輕重之號參酌院其後罷之大理少卿崔把奏曰國家法度髙祖太宗定制二百餘年矣周禮正月布刑張之門閭及都鄙邦國所以屢丁寧使四方謹行之大理寺陛下守法之司也今别設參酌之官有司定罪乃議其出入是豫奪係於人情而法官不得守其職昔子路問政孔子曰必也正名乎臣以為參酌之名不正宜廢乃罷之文宗時命尚書省郎官各刪本司敕而丞與侍郎覆視中書門下參其可否而奏之為太和格後敕太和九年李訓鄭注謀誅宦官不克仇士良等擒宰相王涯舒元輿等入左庫被以桎梏掠拷不勝苦自誣服稱與李訓謀行大逆尊立鄭注於是以左神䇿出兵三百人以李訓首引王涯王璠羅立言郭行餘右神䇿出兵三百人擁賈餗舒元輿李孝本獻於廟社徇于兩市命百官臨視腰斬於獨桞之下梟其首於興安門外親屬無問親踈皆死孩稚無遺妻子不死者沒為官婢昭義軍節度使劉從諫上表請王涯等罪名且言涯等儒生荷國榮寵咸欲保身全族安肯搆逆訓等實欲討除內臣兩中尉自為救死之謀遂致相殺誣以反逆誠恐非辜設若宰相實有異圖當委之有司正其典刑豈有內臣擅領甲兵恣行剽劫延及士庶橫被殺傷流血千門僵尸萬計搜羅枝蔓中外恫疑臣欲身詣闕庭面陳臧否恐并陷孥戮事亦無成謹當修飭封疆訓練士卒內為陛下心腹外為陛下藩垣如姦臣難制誓以死清君側士良等甚憚之武宗時詔竊盜贓滿千錢者死故時竊盜無死所以原民情迫于飢寒也武宗有此令宣宗立乃罷之會昌五年制節文據律已去任者公罪流以下勿論公罪之條情有輕重茍涉欺詐豈得勿論向後公罪有情狀難恕並不在勿論之限宣宗時左衛率府倉曹參軍張戣以刑律分類為門而附以格敕為大中刑律統類詔刑部頒行之大中五年敕今後有官典犯贓及諸色取受但是全未發覺以前能經官陳首即準律文與減等如知事發已有萌肇雖未被追捕勘問亦不許陳首之限七年敕法司斷罪每脊杖一下折法杖十下臀杖一下折笞杖五下則吏無逾判法守常規八年勑估絹結贓天下一例依上都以一千一百九十文為陌計贓絹一匹僖宗乾符四年勑法律有去任勿論之條頗為僥幸今後應州縣官更所犯諸罪五年之後去任勿論五年內同見任官例追收據事定例梁太祖開平四年中書門下奏新刪定令三十卷式二十卷格一十卷律并目録十三卷律疏三十卷共一百三卷請目為大梁新定格式律令頒下施行從之後唐莊宗同光二年刑部及御史臺奏廢偽梁新格行本朝舊章今集衆商量開元格多是條流公事開成格關於刑獄今欲且請行開成格從之三年大理寺奏凖斷獄律諸立春後秋分以前不得奏決死刑違者徒一年今寺司相次有案牘若凖律文候秋分後申奏必慮刑獄遲滯者詔曰刑以秋分雖關惻隱罪多連纍翻慮淹延若或十人之中止於一夫抵罪豈可以輕附重禁錮逾時言念哀矜又難全廢其諸司囚徒罪無輕重並宜各委本司據罪詳斷輕者即時疏理重者候過立春至秋分然後行法如是事繫軍機須行嚴令或謀為逆惡或蘊蓄姦邪或行劫殺人難於留滯並不在此限明宗天成二年大理寺奏按斷獄律諸死罪不待覆奏報而決者流二千里即奏報應決者聽三日乃行刑若限未滿而行刑者徒一年伏以人命至重死不再生近年以來全不覆奏或蒙赦宥已被誅夷乞敕所司應在京有犯極刑者令決前決日各一覆奏聽進止有凶逆犯軍令者亦許臨時一覆奏奉敕依容齋洪氏隨筆曰五代之際時君以殺為嬉視人命如草芥唐明宗頗有仁心獨能斟酌悛救天成三年京師巡檢軍使渾公兒口奏有百姓二人以竹竿習戰鬬之事帝即傳宣令付石敬塘處置敬塘殺之次日樞密使安重誨敷奏方知悉是幼童為戲下詔自咎以為失刑減常膳十日以謝幽寃罰敬塘一月俸渾公兒削官杖脊配流登州小兒骨肉賜絹五十匹粟麥各百石便令如法埋葬仍戒諸道州府凡有極刑並須子細裁遣此事見舊五代史新書去之長興四年大理正張仁瑑奏伏見諸道州府刑殺罪人雖有骨肉尋時不容收瘞皆給喪葬行人載於城外或殘害尸髮多致邀求凖獄官令諸大辟罪並官給酒食聽親故辭訣宣告犯狀日未後行刑注云決之經宿所司即為埋瘞若有親故亦任收葬又條諸囚死無親戚者官給棺於官地埋瘞置磚銘于壙內立牌于冢上書姓名請依令指揮從之閩主曦欲杖御史中丞諫議大夫鄭元弼諫曰古者刑不上大夫中丞儀刑百辟豈宜加之箠楚乃釋之致堂胡氏曰庶人貧賤不能偹禮故不責以行禮大夫尊貴不可加刑故不使之受刑非固欲然因其勢也賈誼得聖人之意故引投鼠忌器之喻自是漢不加刑于大臣大臣有罪皆自殺而臨川王氏反此義為之説曰禮不可以庶人為下而不用刑不可以大夫為上而不施其意非為化民成俗而興禮教也直欲殺戮故老以制異已耳豈非邪説害義之大乎以區區之閩無道之曦猶能為鄭元弼正論而自屈談經佐王乃祖韓非商鞅之術曽元弼之不若而世猶尊信之何哉晉天福十二年勑應天下凡關強盜捉獲不計贓物多少按驗不虛並宜處死時四方盜賊多朝廷患之故重其法仍分命使者捕逐蘇逢吉自草詔意云應賊及四鄰同保皆全族處斬衆以為盜猶不可族况鄰保乎逢吉固爭不得已但省去全族字由是捕賊使者張令柔殺平隂十七村民逢吉為人文深好殺在河東幕府嘗令帝靜獄祈福逢吉盡殺獄囚還報漢法既嚴而侍衛都指揮使史𢎞肇尤殘忍寵任孔目官解暉凡入軍獄者使之隨意煆鍊無不自誣及三叛連兵民間震動驚訛𢎞肇掌部禁兵巡邏京城得罪人不問情輕重於法如何皆專殺不請或決口斷舌斫筋折脛無虛日雖姦盜屏息而寃死者甚衆周太祖廣順二年敕民有訴訟必先歷縣州及觀察使處決不直乃聽詣臺省或自不能書牒倩人者必書所倩姓名居處若無可倩聽執素紙所訴必須已事無得挾私妄訴世宗顯德四年中書門下奏準宣法書行用多時文意古質條目繁細使人難會兼前後敕格差繆重疊亦難詳究宜令中書門下並行刪定務從簡要所貴天下易為頒行者伏以今奉制旨刪律令之書求政理之本經聖賢之損益為今古之章程歷代以來謂之彛典朝廷之所行用者律一十二卷律疏三十卷式二十卷令三十卷開成格一十卷大中統類一十二卷及皇朝制敕等折獄定刑無出於此律令則文辭古質看覽者難以詳明格勑則條目繁多檢閲者或有疑誤加以邊逺之地貪猾之徒緣此為姦寖以成弊方屬盛明之運宜伸畫一之規所冀民不陷刑吏知所守臣等商量望準聖旨施行仍差侍御史知雜事張湜等十人編集新格勒成部帙律令之有難解者就文訓釋格勑之有繁雜者隨事刪除止要詣理省文兼且直書易會其中有重輕未當便於古而不便於今矛楯相攻可于此而不可于彼盡宜改正無或率拘候編集畢日委御史臺尚書省四品以上官及兩省五品以上官參詳可否送中書門下議定奏取進止從之至五年七月七日中書門下及兵部尚書張昭遠等奏其所編集勒成一部别有目録凡二十一卷目之為大周刑統伏請頒行天下與律疏令式通行其刑法統類開成編勑等採掇既盡不在法司行使之限自來有宣命指揮公事及三司臨時條法州縣見今施行不在編集之數應該京百司公事逐司各有見行條件望令本司刪集送中書門下詳議聞奏者奉勑宜依五年勑州縣自長官以下因公事行責情杖量情狀輕重用不得過臀杖十五因責情杖致死者具事由聞奏又勑諸盜經斷後仍更行盜前後三犯並曾經官司推問伏罪者不問赦前後贓少多並決殺容齋洪氏隨筆曰周世宗英毅雄傑以衰亂之世區區五六年間威武之聲震懾夷夏可謂一時賢主而享年不及四十身沒半歲國隨以亡固天方授宋使之驅除然考其行事失於好殺周法太嚴羣臣職事小有不舉往往置之極刑雖素有才幹聲名無所開宥此其所短也薛居正舊史紀載翰林醫官馬道元進狀訴夀州界被賊殺其子獲正賊見在宿州本州不為勘斷帝大怒遣竇儀乘驛往按之及獄成坐族死者二十四家儀奉辭之日帝旨甚峻故儀之用刑傷於深刻知州趙礪坐除名此事本只馬氏子一人遭殺何至於族誅二十四家其他可以類推矣見竇儀傳又曰周世宗用法太嚴豫既書於續筆矣薛居正舊史記載其事甚􅊀而歐陽公多芟去今略記於此樊愛能何徽以用兵先潰軍法當誅無可言者其他如宋州巡檢供奉官竹奉璘以捕盜不獲左羽林大將軍孟漢卿以監納取耗刑部員外郎陳渥以檢田失實濟州馬軍都指揮使康儼以橋道不謹內供奉官孫延希以督修永福殿而役夫有就瓦中噉飯者密州防禦副使侯希進以不奉使者命檢視夏苗左藏庫使符令光以造軍士復襦不辦楚州防禦使張順以隱落稅錢皆抵極刑而其罪有不至死者宋太祖皇帝建隆三年定大辟詳覆法上懲五代藩鎮專殺之弊初令諸州奏大辟案委刑部詳覆既又令諸州録參與司法掾同斷獄二月詔曰王者禁人為非乃設法令臨下以簡必務哀矜世屬亂離則紏之以猛人知恥格則濟之以寬竊盜之生本非巨蠧近朝立制重於律文甚非愛人之旨自今竊盜贓滿五貫足陌者死唐建中定令竊盜滿三匹者死會昌之後竊盜贓錢一貫以上抵極法大中初以其太重復遵建中之制漢乾祐以來用法嚴急民盜一錢者死周太祖深懲其弊定令竊盜贓滿三匹棄市建隆二年增為錢三千陌以八十為限至是又有是詔法益寬矣容齋洪氏隨筆曰國朝削併僭偽救民水火之中然亦有因仍舊弊未暇更張者故須賴于賢士大夫昌言之江左初平太宗選張齊賢為江南西路轉運使諭以民間不便事令一一條奏先是諸州罪人多錮送闕下緣路非理而死者常十五六齊賢至蘄州見南劔州吏送罪人索得州帖視之二人皆逢販私鹽者為荷鹽籠得鹽二斤又六人皆嘗見販鹽而不告者並黥決傳送而五人已死於路江州司理院自正月至二月經過寄禁罪人計三百二十四人建州民二人本田家客户嘗于主家塘內以錐刺得魚一斤半並脊杖黥靣送闕下齊賢上言乞俟至京擇官慮問如顯有負屈者本州官吏量加懲罰自今只令發遣正身及虔州送三囚嘗市得牛肉并家屬十二人悉詣闕而殺牛賊不獲齊賢憫之即遣其妻子還自是江南送罪人者減大半是皆相循習所致也一賢改為其利民如此三年定折杖法凡流刑四加役流脊杖二十配役三年流三千里脊杖二十二千五百里脊杖十八二千里脊杖十七並配役一年徒刑五徒三年脊杖二十二年半脊杖十八二年脊杖十七一年半脊杖十五一年脊杖十三杖刑五杖一百臀杖二十九十臀杖十八八十臀杖十七七十臀杖十五六十臀杖十三笞刑五笞五十臀杖十下四十三十臀杖八下二十臀杖七下常行官杖如周顯德五年制長三尺五寸大頭闊不過二寸厚及小頭徑不得過九分徒流笞通用常行杖徒罪決而不役四年判大理寺竇儀上重定刑統三十卷削去令式宣勑一百九十增入制勑十五又録律內餘律準此者凡四十四條附於名例之次後别取格令宣勑之削出及後來續降要用者凡一百六條編為四卷曰新編勑其釐革一司一務一州一縣之內類不在焉詔與刑統並刋行儀等酌參輕重尤為詳偹世稱其平允是後削平諸國州府皆頒下之開寶二年五月上以暑氣方盛深念縲繫之苦乃下手詔兩京諸州令長史督掌獄掾五日一檢視灑掃獄户洗滌杻械貧不自存者給飲食病者給醫藥輕繫小罪即時決遣無得淹滯自是每嵗仲夏必申明是詔以誡官吏八年三月有司言自三年至今詔所貸死罪凡四千一百八人上注意刑辟哀矜無辜嘗讀虞書嘆曰堯舜之時四凶之罪止從投竄何近代憲網之密邪蓋有意於措刑也故自開寶以來犯大辟非情理深害者多貸其死云太宗太平興國三年改司寇參軍為司理參軍以司寇院為司理院令于選部中選歷任清白能折獄辨訟者為之秩滿免選赴集又置判官一員委諸州於牙校中擇幹局曉法律高資者為之給以月俸秩滿上其殿最以定黜陟有踰濫者坐長吏以下其後又詔諸州察司理參軍有不明推鞠致刑獄淹滯具名以聞蔽匿不舉者罪之是嵗命有司取國初以來勑條纂為太平興國編勑十五卷行于世太平興國時始用士人為司理判官六年詔自今長吏每五日一慮囚情得者即決之詔自今繫囚如證左明白而捍拒不伏合訊掠者集官屬同訊問之勿令胥吏拷決上頗慮天下有滯獄復建三限之制大事四十日中事二十日小事十日有不須追捕而易決者不過三日九年三月令諸州十日一具囚帳及所犯罪禁繫日數以聞刑部專加糾察時上閲諸州所奏囚簿有禁繫至三百人者乃下詔申嚴淹獄之戒令今後門留寄禁取保在外并邸店養疾人等並凖禁囚例件析以聞其鞫獄違限及可斷不斷事小禁繫者有司奏駁之六月詔遣殿中侍御史李範等四十人分往江南江浙西川荆湖嶺南等道按問刑獄情得者即決之若須證逮者並具獄論如律吏之弛怠者劾其罪以聞其臨事強明刑獄無滯者亦以名來上十年五月令竊盜滿十貫者奏裁七貫決杖黥面𨽻本城五貫配役三年三貫二年一貫一年他如舊制九月詔自今京朝幕職州縣並須習讀律令格式秩滿至京者當加試問其全不明習者量加殿罰淳化元年令刑部定置詳覆官五員專閲天下所上案牘勿復分遣鞠獄置御史臺推勘官二十人並以京朝官充若諸州有大獄則乘傳就鞫獄辭日上必臨遣諭旨曰無滋蔓無留滯或賜以裝錢還必召見問以所推事狀著為彜式二年二月判司天監苗守信等請正月一日及每月八日太歲三元天赦日及上慶誕日皆不斷極刑事下有司有司言晉天福七年詔書應大辟罪遇大祠冬正受朝立春立夏及大雨雪並不論決自今請太嵗三元及上慶誕日兩京諸州不決死罰餘如故從之五月置諸路提點刑獄司命常參官主之管內州府十日一具囚帳供報有疑獄之未決者即馳傳以視之州郡敢積稽留大獄久而不決及以偏辭按讞情不得實并官吏用情者悉以聞八月始置審刑院於禁中以樞密直學士李昌齡知院事兼置詳議官六員凡獄具上奏先由審刑院印訖以付大理寺刑部斷覆以聞乃下審刑詳議中覆裁決訖以付中書當者即下之其未允者宰相復以聞如命論決令左右巡使五日一案視開封司録司左右軍巡及四推司繫囚因督促之有寃滯者以聞三年令諸州決死刑有號呼不伏及親屬稱寃者即以白長吏移司推鞫是年春京江浙大飢民多相率持杵棒投劵富家取其粟坐強盜棄市者甚衆蔡州民張緒等二百一十八人皆當死知州張䇿推官江嗣宗共議取其為首者杖脊餘悉論杖罪以其事上聞上感悟下詔褒之令本州大發廪以賑飢民遂遣使分詣諸道巡撫自臨遣而謂之曰彼皆平民因艱食強取餱糧以圖活命爾若其情非巨蠧悉為末減其法不可從強盜之科其凶狠難制為患閭里者固便宜從事務於除惡繇是獲全活者殆千計十月詔曰比者申命使臣分聽獄訟徒終嵗序蔑有平反曷助哀矜祗增煩擾其諸路提點刑獄司宜罷以其事歸轉運司至道二年勑大理寺所決天下案牘大事限二十五日中事二十日小事十日審刑院詳覆大事十五日中事十日小事五日真宗咸平三年判大理寺王欽若言夲寺公案常有五七道今者踰月之內絶無案牘足彰恥格之化式漸太和之風請付史書用昭聖政從之四年知黃州王禹稱奏令諸路置病囚院持杖劫賊徒流以上有疾者處之餘悉責保於外是年天下斷死罪八百人上覽囚簿憮然動容語宰執曰雜犯死罪條目至多官吏倘不盡心豈無枉濫故事死罪獄具三覆奏蓋甚重慎何代罷之遂命檢討沿革終慮淹繫不克行六年詔有盜主財者五貫以上杖脊黥面配牢城十貫以上奏裁勿得私黥涅舊制士庶家僮僕有犯或私黥其面上以今之僮僕本傭雇良民故有是詔景德元年詔諸道州軍斷獄內有宣勑不定刑名止言當行極斷者所在即置大辟頗乖平允自今凡言處斷重斷極斷決配朝典之類未得論決具獄以聞二年詔大理寺刑部所舉詳斷詳覆官止試斷獄案五道差官與二司互考又詔刑部大理寺三司法直官副法直官令吏部銓選流內官一任三考以上謹幹無過工書判官具名引對試斷案五道中格者授之三司大理寺一年刑部三年無私罪者授京官先是悉自令史遞補端拱中寇凖典選奏用士人至是復舉前詔三年四月樞密院直學士劉綜等詣三司開封府御史臺殿前侍衛司編敘囚繫翌日上御崇政殿臨決殺人者論如律雜犯死罪流徒遞降一等杖以下釋之日旰既罷令軍頭引見司覆奏所決刑名審視訖乃行是後每嵗暑月上必親臨慮問率以為常四年復置諸路提點刑獄司官所在專察視囚禁審詳案牘州郡不得迎送相與聚會內出御寶印紙為歷書其績效中書樞密院籍其名代還考課議功行賞如刑獄枉濫不能摘舉官吏曠弛不能彈奏務從畏避者置以深罪知審刑院朱巽上言官吏因公事受財許為曲法決遣之際依法科行規避枉法之罪證左明白者望以枉法論至死者加役流從之河北提點刑獄陳綱上言杖罪械繫者其枷未有定制望今特置以十五斤為凖從之大中祥符二年詔御史臺開封府及在京凡有刑按之處今特置司糾察令金部員外郎知制誥周起等充凡徒以上罪即時具收禁移報內未盡理及淹延者追取欵詞詳閲駁奏衛尉卿權判刑部慎從吉言凖淳化三年敕諸路所奏獄空須是司理院州司倚郭縣俱無繫囚又凖後敕諸路自今獄空更不降詔奬諭奏至委刑部以逐處旬奏禁狀點勘不謬即具以聞伏見提點刑獄司所奏獄空本司比對多不應舊敕外州妄覬奬諭沽市虛名近者邠滄二州勘鞫大辟囚干詿數人裁一夕即行斬決伏見前代京師決獄尚五覆奏蓋欲慎重大辟豈宜一日之內便決死刑朝廷比務審詳恐有寃濫非有求於急速其間州府不體朝旨邀為已功但務獄空必無所益欲望依凖前詔不行奬諭其諸州府監以公事多少分為三等第一等公事多處五日其次十日其次二十日並須州司司理院倚郭縣全無禁囚及責保寄店之類方為獄空委提點刑獄司據等第目數勘驗詣實書於卯歷從之四年詔自今決杖令衆者舊十日減為三日半月以上勿過五日暑月免之七年殿中侍御史曹定上言諸州長吏有罪恐為訟訴即投牒自首雖情狀至重亦以例免詔自今如實未有顯露即以狀報轉運使如格當原免亦書於歷十月御史臺鞫殺人賊獄具知雜王隋請臠割之上曰五刑自有常制何必為此况此賊本情已見一死足矣又內供奉官楊守珍使陜西督捕賊因請擒獲強盜至死者望以付臣凌遲用戒後來詔所捕賊送所屬依法論決毋為慘毒按以此二則觀之則知法外凌遲之刑祖宗時未嘗用也天禧二年上封者言今斷天下之獄皆在大理詳天下之法總在審刑二者海內之凖繩也且今之律令則具有明文制勑則常有更改凡定罪之要言敕則多指故失言罪則皆坐公私四者定刑重輕殊邈犯情輕而法重則近舞文按狀重而處條輕則為失實此之審克尤在盡心入私則犯徒追官為公則贖金記過稱故則不得末減稱失則例有降差承前斷公私故失之名止是法官臨時裁處既無著定深慮差殊欲望令經應歷刑法司定公私罪名參詳畫一其違制稱失者亦須審詳失錯情輕者明件條奏使不能因緣為姦輕重其法杜其萌漸實在于斯詔審刑院大理寺刑部開封府同議定以聞既而法官參詳自今捕盜掌獄官不稟長吏而捶囚不甚傷而得情者止以違制失公坐過差而不得情挾私拷決有所規求者以違制私坐又捕盜官承前有捕捉稽時不即聞州者咸以違制論罪涉太重望令犯者以違制失論又律分公私罪云私謂不緣公事私自犯者雖緣公不吐實情心挾隱欺亦同私罪公謂緣公事致罪而無私者雖私曲相須公事得正違法猶以公坐望令斷獄並以上文審定又律有被制書有所施行而違者徒二年失錯者杖一百今請法官斷罪除每行條貫元敕指定違制外自餘情輕失錯者止從違制失論其公私相半而私情重者奏裁從之四月敕命官犯贓不以輕重並劾舉之私罪杖以下勿論四年詔自今天下犯十惡劫殺謀殺故殺鬬殺放火強劫正枉法贓偽造符印厭魅呪詛造妖書妖言傳授妖術合造毒藥禁軍諸軍逃亡為盜罪至死者每遇十二月權住區斷過天慶節即決之餘犯至死者十二月及春夏未得區遣禁錮奏裁咸平中殿中侍御史趙湘上言聖王行法必順天道漢制大辟之科盡冬月乃斷臣竊以為古之善政亦有當於今舉而行之無虧大體伏見十二月陛下聖誕之月萬方祝頌之時而大辟罪人決斷如故又十一月一陽始出其氣尚微以至微之陽處重隂之下蓋議獄緩刑所以助陽抑隂也伏望特降明詔以十一月十二月內天下大辟正者更令詳覆已結正者未令決斷所在州府厚加矜恤掃除獄房供給飲食薪炭之屬而嚴防護無致他故情可憫者奏聽敕裁合依法者盡冬月乃斷在京大辟人既當春孟之月亦行慶施惠之時伏望萬幾之暇臨軒躬覽情可憫者特從末減亦所以布聖澤于無窮况愚民之抵罪未斷兩月亦未至淹延如此則議獄詳刑助順生氣若用刑順于隂陽則四時之氣和氣和則百穀豐實水旱不作矣上覽之曰此誠嘉事然古今異制沿革不同行之則慮有淹滯或因緣為姦矣至是乃有是詔文獻通考卷一百六十六
