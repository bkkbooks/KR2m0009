body:
  text: 文獻通考卷二百二十一鄱陽馬端臨貴與著經籍考四十八子兵書漢藝文志兵家者流蓋出古司馬之職王官之武備也洪範八政八曰師孔子曰為國者足食足兵以不教民戰是謂棄之明兵之重也湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也自春秋至於戰國出竒設伏變詐之兵並作漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸呂用事而盜取之武帝時軍政楊僕捃托遺逸紀奏兵録猶未能備至於孝成命任宏論次兵書為四種漢志兵權謀十三家二百五十九篇省伊尹太公管子孫卿鶡冠子蘇子蒯通陸賈淮南王二百五十九種出司馬法入禮也其權謀者以正守國以竒用兵先計而後戰兼形勢包陰陽用技巧也漢志兵形勢十一家九十二篇圖十八卷形勢者雷動風舉後發而先至離合背鄉變化無常以輕疾制敵者也漢志陰陽十六家二百四十九篇圖十卷陰陽順時而發推刑德隨斗擊因五行相勝假鬼神而為助也右漢志兵技巧十三家百九十九篇省墨子重入蹴鞠也技巧者習手足便器械積機關以立攻守之勝者也凡兵書五十三家七百九十篇圖四十三卷容齋洪氏隨筆曰漢成帝命任宏論次其書為四種其權謀中有韓信三篇形勢中有項王一篇前後藝文志載之且云漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸吕盜取之項韓雖不得其死而遺書可傳於後者漢世不廢今不可復見矣隋志一百三十三部五百一十二卷唐志二十三家六十部三百一十九卷失姓名十四家李筌以下不著録二十五家一百六十三卷宋三朝志一百八十二部五百五十三卷宋兩朝志三十二部一百二十七卷宋四朝志九十七部八百二十八卷宋中興志九十二家一百單七部一千七十四卷六韜六卷鼂氏曰周呂望撰按漢藝文志無此書梁隋唐始著録分文武龍虎豹犬六目兵家權謀之書也元豐中以六韜孫子吳子司馬法黃石公三略尉繚子李衛公問對頒行武學令習之號七書云按兵法漢成帝常命任宏分權謀形勢陰陽技巧為四種今又有卜筮政刑之説蓋在四種之外矣高氏子略曰詩曰維師尚父時維鷹揚涼彼武王肆伐大商會朝清明鄭康成稱其天期已至兵甲之強師卒之武故今伐商合兵以清明也牧誓曰時甲子昧爽王朝至於商郊牧野與詩合也武王之問太公曰何以知人心王時寢疾太公負而起之曰行迫矣勉之武王乃駕鶩冥之車周旦為之御至於孟津大黃參連弩大才扶骨車戰具飛鳬赤莖白羽以銅為首電影青莖赤羽以銅為首副也畫則為光夜則為星方頭鐡鎚重八斤一名鐡鉞行馬廣二丈二十具渡溝飛橋廣五丈轉關鹿盧鷹爪方凶鐵把柄長七尺天陳日月斗杓杓一左一右一仰一背此為天陳地陳邱陵水泉有左右前後之利人陳車馬文武積楹臨衝攻具雲梯飛樓視城中也武衡大櫓三軍所需雲火萬炬火具吹鳴箛審此則康成所曰兵甲之強師卒之武為可考歟亦詩所謂檀車煌煌駟騵彭彭者也又考諸武王曰殷可伐乎太公曰天與不取反受其咎武王又曰諸侯已至士民何如太公曰大道無親何急於元士武王又曰民吏未安賢者未親何如太公曰無故無親如天如地其言若有合於書者詩之上章曰保右命爾燮伐大商上帝臨女無二爾心此之謂也周氏涉筆曰謂太公為兵家之祖自漢人已然本無所稽僅以陰符有託而云爾太公遇文王事尚未足信况談兵哉周詩鷹揚外無他語周公曰惟文王尚克修和我有夏亦惟有若虢叔有若閎夭有若泰顛有若南宫括武王惟兹四人尚迪有祿後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冒丕單稱德向使太公主柄伐商身為大將周公其遺之乎六韜不知出何時其屑屑共議以家取國以國取天下殆似丹徒布衣太原宫監所經營者史記載君臣各把鉞斷首懸旗以後人臆記非實也歸賂免囚好事為之而此書因著文伐十二節陰賂左右輔其淫樂養其亂臣與韓非所云納費仲奉玉版并為一論蓋文武周召之一厄也管子書載湯結女華以為陰事曲逆以為陽戰國諸子窺測古聖妄誕率類此太公舉賢尚功周公知其有篡弒之臣亦是後人妄以見事附合而諸子因記殺華士謂周公馳往救之踈謬可笑此書有上賢篇則六賊七害指抗志高節輕爵位賤有司語無為言無欲虛論高議窮居靜處條居大半全與暴亂同科按武王既定天下其詩曰日靖四方其書曰無有作惡當丕單稱德之世而紛然懸賞罰募功名不知將何出也此書並緣吳起漁獵其詞而綴緝以近代軍政之浮談淺駁無可施用蓋吳起武侯真答問也故問者當其形對者應其實至於料六國形勢所當出百代之下猶可想像而此書問答徒效之也故務廣不務精語脈皆不相應讀者宜熟察也陳氏曰其辭鄙俚世俗依託也水心葉氏曰自龍韜以後四十三篇條畫變故預設方禦皆為兵者所當講習孫子之論至深不可測而此四十三篇繁悉備舉似為孫子義疏也其書言避正殿乃戰國後事固當後於孫子論將有十過近於五危戰車十死戰騎十敗與行軍九地相出入其勵軍言禮將力將一欲練士各聚卒教戰成三軍又本於吳起然則孫吳固兵家所師用至莊周亦稱九徵則真以為太公所言矣然周嫚侮為方術者而不悟六韜之非偽何也蓋當時學術無統諸子或妄相詆訾或偶相崇出於率爾豈足據哉司馬法三卷鼂氏曰齊司馬穰苴撰威王使大夫追論古者司馬兵法而附穰苴於其中因號司馬兵法司馬遷謂其書閎廓深遠雖三代征伐未能竟其義如其文近亦少褒矣穰苴為區區小國行師何暇及司馬兵法之揖讓乎陳后山擬御試武舉策曰臣聞齊威王使其大夫追論古者司馬兵法附以先齊大司馬田穰苴之説號曰司馬穰苴兵法夫所謂古者司馬兵法周之政典也所謂穰苴兵法太史遷之所論今博士弟子之所誦説者也昔周公作政典司馬守之以佐天子平邦國而正百官均萬民故征伐出於天子及上廢其典下失其職而周衰矣故征伐出於諸侯典之用舍興壞係焉遷徒見七國楚漢之戰以詐勝而身固未嘗行道也遂以仁義為虛名而疑三代以文具可謂不學矣史稱遷博極羣書而其論如此所謂雖多奚為者也臣謹按傳記所載司馬法之文今書皆無之則亦非齊之全書也然其書曰禮與法表裏文與武左右又曰殺人以安人殺之可也攻其國愛其民攻之可也以戰去戰雖戰可也又曰冬夏不興師所以兼愛民此先王之政何所難乎至其説曰擊其疑加其卒致其屈襲其規此穰苴之所知也漢之所行遷之所見而謂先王為之乎魏武注孫子一卷鼂氏曰吳孫武撰魏武帝注按漢藝文志孫子兵法八十二篇今魏武所注止十三篇杜牧以為武書數十萬言魏武削其繁剩筆其精粹成此書云其序略曰吾讀兵書戰策多矣武所著深矣水心葉氏曰按司馬遷稱孫子十三篇兩言之而班固志藝文乃言孫武子兵法八十二篇又吳起四十八篇而今吳起六篇而已又今中庸一篇而志稱四十九篇豈昔所謂篇者特章次之比非今粹書也然遷時已稱十三篇而劉歆班固在其後反著八十二篇以火攻用間考之疑孫子亦有未盡之書然此為文字多少其不存者自不足論遷載孫武齊人而用於吳在闔閭時破楚入郢為大將按左氏無孫武他書所有左氏不必盡有然潁考叔曹劌燭之武鱄設諸之流微賤暴用事左氏未嘗遺而武功名章灼如此乃更闕又同時伍員宰嚭一一銓次乃獨不及武邪詳味孫子與管子六韜越語相出入春秋末戰國初山林處士所為其言得用於吳者其徒夸大之説也自周之盛至春秋凡將兵者必與聞國政未有特將於外者六國時此制始改吳雖蠻夷而孫武為大將乃不為命卿而左氏無傳焉可乎故凡為穰苴孫武者皆辨士妄相標指非事實其言闔閭試以婦人尤為竒險不足信高氏子略曰周衰制隳法蕩政不克綱強弱凌一趨於武侈兵圖霸干戈相尋甚可畏也其間謀師行帥命意立制猶知篤禮信尚訓齊庶幾三代仁義之萬一焉耳殊未至於毒也兵流於毒始於孫武乎武稱雄於言兵往往舍正而鑿竒背義而依詐凡其言反覆其變無常智術相高氣驅力奪故詩書所述韜匱所傳至此皆索然無遺澤矣先儒曰無以學術殺天下後世是猶言學者也吳越交兵勝負未決武居其間豈無所以為強吳勝越者二十年間闔閭既以戰死夫差旋喪其國方是時武之言兵亦知為吳計而已成敗興亡易如反掌固無待於殺天下後世兵其可以智用歟陳氏曰世之言兵者祖孫武然孫武事吳闔閭而不見於左傳不知果何時人也李筌注孫子三卷鼂氏曰唐李筌注以魏武所解多誤約歷代史依遁甲注成三卷杜牧注孫子三卷鼂氏曰唐杜牧牧之注牧以武書大略用仁義使機權曹公所注解十不釋一蓋惜其所得自為新書爾因備注之世謂牧慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳知兵者有取焉陳皥注孫子三卷鼂氏曰唐陳皥撰皥以曹公注隱微杜牧注闊踈重為之注云紀燮注孫子三卷鼂氏曰唐紀燮集唐孟氏賈林杜佑三家所解梅聖俞注孫子三卷鼂氏曰皇朝梅堯臣聖俞注歐公為之序歐陽氏序曰世所傳孫武十三篇多用曹公杜牧陳皥注號三家孫子余頃與撰四庫書目所見孫子注者尤多一有至二十餘家五字武之書本於兵兵之術非一而以不窮為竒宜其説者之多也凡人之用智有短長其設施各異故或膠其説於偏見然無出所謂三家者三家之注皥最後其説時時攻牧之短牧亦慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳然前世言善用兵稱曹公嘗與董呂諸袁角其力而勝之遂與吳蜀分漢而王傳言魏之諸將出兵千里一有公字每坐計勝敗授其成算諸將用之十不失一一有違者兵輒敗北故魏世用兵悉以新書從事其精於兵也如此牧謂曹公於注孫子尤略蓋惜其所得自為一書是曹公悉得武之術也然武嘗以其術干吳王闔閭用之西破楚北服齊晉而霸諸侯夫使武自用其書止於強霸及曹公用之然亦終不能滅吳蜀豈武之術盡於此乎抑用之不極其能也後之學者徒見其書又各牽於己見是以注者雖多而少當也獨吾友聖俞不然常評武之書曰此戰國相傾之説也三代王者之師司馬九伐之法武不及然亦愛其文略而意深其行師用兵料敵制勝亦皆有法其言甚有次序而注者汨之或失其意乃自為注凡膠於偏見者皆抉一作挑去傅以己意而發之然後武之説不汨而明吾知此書當與三家並傳而後世取其説者往往於吾聖俞多焉聖俞為人謹質溫恭一有仁厚而明四字衣冠進趨眇然儒者也後世之視其書者與太史公疑張子房為壯夫何異朱子語録曰歐公大段推許梅聖俞所注孫子看得來如何得似杜牧注底好王晳注孫子三卷鼂氏曰皇朝王晳注晳以古本校正闕誤又為之注仁廟時天下久承平人不習兵元昊既叛邊將數敗朝廷頗訪知兵者士大夫人人言兵矣故本朝注解孫武書者大扺皆其時人也何氏注孫子三卷鼂氏曰未詳其名近代人也吳子三卷鼂氏曰魏吳起撰言兵家機權法制之説唐陸希聲類次為之説料敵治兵論將變化勵士凡六篇高氏子略曰讀吳子其説蓋與孫武截然其不相侔也起之書幾乎正武之書一乎竒吳之書尚禮義明教訓或有得於司馬法者武則一切戰國馳騁戰爭奪謀逞詐之術耳武侯浮西河下中流喟然嘆曰美哉山河之固魏之寶也起言之曰在德不在險德之不修舟中之人盡敵國也斯言之善質於經求之古奚慚焉反覆此編則所教在禮所貴在禮夫以湯武仁義律之起誠有間求之齊魯晉衛秦楚之論兵者起庶幾乎黃石公三略三卷鼂氏曰題曰黃石公上中下三略其書論用兵機權之妙嚴明之決明妙審決軍可以死易生可以存易亡經籍志云下邳神人撰世傳此即圯上老人以一編書授張良者陳氏曰其書傳會依託也西山真氏序曰三略先秦書雖非鷹揚翁自作要必其遺法豫嘗深味之其言治國養民法度與儒者指意不悖而斂藏退守不為物先之意則黃老遺言也子房號稱善用兵然最所得者不過與物推移變化無方因敵轉化動而輒隨數語耳以此推之則今傳於世者子房所受書也尉繚子五卷鼂氏曰未詳何人書論兵主刑法按漢藝文志有二十九篇今逸五篇首篇稱梁惠王問意其魏人歟陳氏曰六國時人按漢志雜家有二十九篇兵形勢家又有三十一篇今書二十三篇未知果當時本書否周氏涉筆曰尉繚子言兵理法兼盡然於諸令督責部伍刻矣所以為善者能分本末别賔主所謂高之以廊廟之論重之以受命之論鋭之以踰垠之論廊廟本也受命所以授也凡諸令所云將事也踰垠之論爾視孫子專篇論火攻吳起武侯纎碎講切蓋從容有餘矣人主崇儉務本均田節斂明法稽驗為之主本無蔓獄無留刑故曰兵凶器爭逆德事必有本以武為植以文為種武為表文為裏文視利害辨安危武犯強敵力攻守不攻無過之城不殺無罪之人夫殺人之父兄利人之財貨臣妾人之子女此皆盜也其説雖未純王政亦可謂窺本統矣古者什伍為兵有戰無敗有死無逃自春秋戰國來長募既行動輒驅數十萬人以赴一決然後有逃亡不可禁故尉繚子兵令於誅逃尤詳世傳張魏公建壇拜曲端為大將端首問魏公見兵幾何魏公曰八十萬人端曰須是斬了四十萬人方得四十萬人用端所言果如是固覆軍失地殺身之道也夫分數豈專在殺哉此念熏蒸決不能興起輯睦吸引安祥而尉繚子亦云善用兵者能殺卒之半其次殺其十三其下殺其十一能殺其半者威加海內殺十三者力加諸侯殺十一者令行士卒筆之於書以殺埀教孫吳却未有是論也張橫渠注尉繚子一卷鼂氏曰皇朝張載撰其辭甚簡蚤年喜談兵後謁范文正文正愛其才勸其學儒載感悟始改業此殆少作也武侯十六策一卷鼂氏曰蜀諸葛亮孔明撰序稱謹進便宜十六事一治國二君臣三視聽四納言五察疑六治民七舉措八考黜九治軍十賞罰十一喜怒十二治亂十三教令十四斬斷十五思慮十六陰察陳壽録孔明書不載此策疑依託者庾衮保聚圖一卷鼂氏曰晉庾衮撰晉書孝友傳載衮字叔褒齊王冏之倡義也張泓等掠陽翟衮率衆保禹山泓不能犯此書序云大駕遷長安時元康三年己酉撰保聚壘議二十篇按冏之起兵惠帝永寧元年也帝遷長安永興元年也皆在元康後且三年歲次實癸丑今云己酉皆誤李衛公問對三卷鼂氏曰唐李靖對太宗問兵事史臣謂李靖兵法世無完書略見於通典今對問出於阮逸家或云逸因杜氏附益之陳氏曰亦假託也文辭淺鄙尤甚今武舉以七書試士謂之武經其間孫吳司馬法或是古書三略尉繚子亦有可疑六韜問對偽妄明白而立之學官置師弟子伏而讀之未有言其非者何也何薳春渚紀聞言其父去非為武學博士受詔校七書以六韜問對為疑白司業朱服服言此書行之已久未易遽廢遂止後為徐州教授與陳師道為代師道言聞之東坡世所傳王通元經關子明易傳及李靖問對皆阮逸偽撰逸嘗以草示奉常公云奉常公者老蘇也按四朝國史兵志神宗熙寧間詔樞密院曰唐李靖兵法世無全書雜見通典離析訛舛又官號物名與今稱謂不同武人將佐多不能通其意令樞密院檢詳官與王震曾敀王白郭逄原等校正分類解釋令今可行豈即此問答三卷邪或别有其書也然鼂陳二家以為阮逸取通典所載附益之則似即此書然神宗詔王震等校正之説既明見於國史則非逸之假託也郭元振安邊策三卷鼂氏曰唐郭元振撰以總兵進攻聚衆退守不可無權謀乃著此書故舊題曰定逺安邊策李臨淮武記鼂氏曰唐李光弼撰其書凡一百二章末云呂望志廓而逺孫武思幽而密黃石寬而重斷吳起嚴而貴勇墨翟守而無攻老聃勝而不美今擇其精要雜以愚識為一家書一本題曰統軍靈轄寶祕策或云光弼從事張參所纂閫外春秋十卷陳氏曰唐少室山布衣李筌撰起周武王勝殷止唐太宗擒竇建德明君良將戰爭攻取之事天寶二年上之風后握竒經一卷陳氏曰永嘉薛士龍季宣校定自晉馬隆三百八十四字續圖三百十五字合標題七百字又有馬隆讚述多所發明并寫陳圖於後馬隆本竒作機高氏子略曰風后握竒經三百八十四字其妙本乎竒正相生變化不測蓋潛乎伏羲氏之畫所謂天地風雲龍鳥蛇虎則其為八卦之象明矣蓋注竒讀如竒耦之竒則尤可與易凖諸儒多稱諸葛武侯八陳唐李衛公六花皆在乎此唐裴緒之論又以為六十四卦之變其出也無窮若此則所謂八陳者八卦之統爾焦氏易學卦變至於四千九十有六竒正相錯變化無窮是可以名數該之乎然觀太公武韜且言牧野之師有天陳有地陳此固出於握竒而又有人陳焉此又出於天地之外者非八陳六花所能盡也獨孤及作風后八陳圖記有曰黃帝順煞氣以作兵法文昌以命將風后握機制勝作為陳圖故八其陳所以定位衡抗於外軸布於內風雲負其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢所以致用也至若疑兵以固其餘地遊軍以按其後列門具將發然後合戰弛張則二廣迭舉掎角則四竒皆出圖成樽爼帝用經略北逐獯鬻南平蚩尤遺風冥冥神機未昧項籍得之霸西楚黥布得之奄九江孝武得之攘胸奴唐天寶中客有得其遺制於黃帝書之外篇裂素而圖之按魚復之圖全本於握機賾其妙窮其神者武侯而已獨孤乃以為項黥武帝得之未之思歟人事軍律三卷鼂氏曰皇朝符彥卿撰其序言兵者多雜以陰陽殊不知往亡宋捷甲子胡興鵝入梟集翻成吉兆故此但述人事云或以為唐燕僧利正撰神武祕略十卷鼂氏曰皇朝仁宗御撰纂古今兵書戰策及舊史成敗之迹類權謀形勢陰陽技巧凡四門三十篇三朝武經聖略十卷鼂氏曰皇朝曾公亮丁度撰寶元中西邊用兵朝廷講武備是時王洙奉詔編祖宗任將用兵邉防事迹分為二十門陳氏曰凡十七門後五卷為奏議中興書目云十卷李淑書目十五卷今本與邯鄲卷數同武經總要四十卷鼂氏曰皇朝曾公亮丁度撰康定中朝廷恐羣帥昧古今之學命公亮等采古兵法及本朝計謀方略凡五年奏御制度十五卷邊防五卷故事十五卷占候五卷御為製序巽岩李氏曰昔杜君卿取前世用兵故事分一百三十餘門編入通典國朝修經武要略亦承用之但微有附益耳百將傳十卷鼂氏曰皇朝張預公立撰預觀歷代將兵者所以成敗莫不與孫武書相符契因擇良將得百人集其傳成一書而以武之兵法題其後上之陳氏曰每傳必以孫武兵法斷之兵要望江南一卷鼂氏曰題云黃石公以授張良者按其書雜占行軍吉凶寓聲於望江南詞取其易記憶總目云武安軍左押衙易靜撰蓋唐人也倚馬立成法二卷鼂氏曰唐李淳風撰兵行占候之書也淳風太宗時人而此書起九宫法至貞元六年庚午假託以行其書耳非淳風真本也三略素書解一卷陳氏曰吕惠卿吉甫撰熙寧收復熙河陳法三卷陳氏曰觀文殿學士九江王韶子純撰武經龜鑑二十卷陳氏曰保平軍節度使王彥撰隆興御製序其書以孫子十三篇為主而用歷代事證之渭南祕訣一卷陳氏曰昭武謝淵得之於瀘州蓋武侯八陳圖法也為之注釋而傳於世補漢兵制一卷陳氏曰錢文子撰西漢兵制一卷陳氏曰建安王珨器之撰制勝方略三十卷陳氏曰修武郎楊肅德欽撰自左氏傳而下迄於陳隋用兵事迹慶元丁巳序漢兵論一卷辨疑一卷陳氏曰姑蘇潘夢旗天錫撰修城法式條約二卷陳氏曰判軍器監沈括知監丞呂和卿等所修敵樓馬面團敵式樣并申明條約熙寧八年上文獻通考卷二百二十一
