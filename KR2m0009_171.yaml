body:
  text: 文獻通考卷一百七十一上鄱陽馬端臨貴與著刑考十上贖刑虞舜金作贖刑金黃金誤而入刑出金以贖罪周官職金掌受士之金罰貨罰入於司兵給治兵及工直也貨泉貝也罰贖也書曰金作贖刑是也穆王呂刑墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宮辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪注並見刑制門蔡氏曰舜典之金作贖刑蓋官府學校鞭撲之刑爾夫刑莫輕於鞭撲入於鞭撲之刑而又情法猶有可議者則是無法以治之故使之贖特不欲遽釋之也五刑之寬惟處以流鞭撲之寬方許其贖今穆王贖法則皆及五刑雖大辟亦許其贖免矣漢張敞以討羌兵食不繼建為入榖贖罪之法初亦未嘗及夫殺人及盜之罪而蕭望之等猶以為如此則富者得生貧者獨死恐開利路以傷治化曾謂唐虞之時而有是贖法哉愚論見刑制門漢惠帝元年令民有罪得買爵三十級以免死罪應劭曰一級直錢二千凡為六萬若令贖罪入三十匹縑矣師古曰令出買爵之錢以贖罪孝文時納鼂錯之説募民入粟塞下得以除罪武帝天漢四年令死罪入贖錢五十萬減死一等時大司農陳藏錢經用賦稅既竭不足以奉戰士有司請令民得買爵贖禁錮免贓罪宣帝時西羌反遣師征之京兆尹張敞議國兵在外吏民並給轉輸田事頗廢雖羌虜已破來春民食必乏縣官榖度不足以振之願令各諸有罪非盜受財殺人及犯法不得赦者皆得以差入榖此八郡贖罪差次也八郡者隴西以北安定以西務益致榖以豫備百姓之急事下有司少府蕭望之等以為不可乃止望之等言今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不一也人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此伯夷之行壞公綽之名滅政教一傾雖有周召之佐恐不能服古者藏富於民不足則取有餘則與詩曰爰及矜人哀此鰥寡上惠下也又曰雨我公田遂及我私下急上也今有西邊之役民失作業雖戶賦口斂以贍其困乏師古曰率户而賦計口而斂也古之通義百姓莫以為非以死救生恐未可也師古曰子弟竭死以救父兄令其生也陛下布德施教教化既成堯舜亡以加也今議開利路以傷既成之化臣竊痛之於是天子復下議兩府丞相御史以難問張敞敞曰少府左馮翊所言常人之所守耳昔先帝征四夷兵行三十餘年百姓猶不加賦而軍用給今羌虜一隅小夷跳梁於山谷間漢但令罪人出財減罪以誅之其名賢於煩擾良民橫興賦斂也師古曰橫音胡孟反又諸盜及殺人犯不道者百姓所疾苦也皆不得贖首匿見知縱所不當得為之屬議者或頗言其法可蠲除師古曰以其罪輕而法重故常欲除此條科今因此令贖罪其便明甚何化之所亂甫刑之罰小過赦薄罪贖師古曰呂侯為周穆王司冦作贖刑之法謂之呂刑後改為甫侯故又稱甫刑有金選之品應劭曰選音刷金銖兩名也師古曰音刷是也字本作鋝鋝即鍰也其重十一銖二十五分銖之十三一曰重六兩呂刑曰墨辟疑赦其罰百鍰劓辟疑赦其罰惟倍剕辟疑赦其罰倍差宮辟疑赦其罰六百鍰大辟疑赦其罰千鍰是其品也所從來久矣何賊之所生敞備皂衣二十餘年如淳曰雖有五時服至朝皆著皂衣嘗聞罪人贖矣未聞盜賊起也竊憐涼州被寇方秋饒時民尚有飢乏病死於道路况至來春將大困乎不早慮所以振救之策而引常經以難恐後為重責常人可與守經未可與權也敞幸得備列卿以輔兩府為職不敢不盡愚望之復強對曰先帝聖德賢良在位作憲垂法為無窮之規永惟邊竟之不贍師古曰惟思也竟讀曰境其下亦同故金布令甲曰師古曰金布者令篇名也其上有府庫金錢布帛之事因以名篇令甲者其篇甲乙之次邊郡數被兵離飢寒師古曰離遭也夭絶天年父子相失令天下共給其費師古曰共給之也自此以上令甲之文固為軍旅卒暴之事也師古曰卒讀曰猝言此令文專為軍旅猝暴而施設聞天漢四年常使死罪人入五十萬錢減死罪一等豪強吏民請奪假貣師古曰貣音士得反至為盜賊以贖罪其後姦邪橫逆羣盜並起師古曰橫音胡孟反至攻城邑殺郡守充滿山谷吏不能禁明詔遣繡衣使者以興兵擊之師古曰軍興之法也誅者過半然後衰止愚以為此使死罪贖之效也故曰不便時丞相魏相御史大夫丙吉亦以為羌虜且破轉輸略足相給遂不施敞議元帝時貢禹上疏請除贖罪之法禹言孝文皇帝時貴廉潔賤貪汙賈人贅壻及吏坐贓者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅師古曰白明也疑者以與民師古曰罪疑從輕也亡贖罪之法故令行禁止海內大化天下斷獄四百與刑措亡異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲師古曰從讀曰縱耆讀曰嗜用度不足乃行一切之變使犯法者贖罪入榖者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職師古曰上府謂所屬之府右職髙職也姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位師古曰操持也切刻也操音千髙反故亡義而有財者顯於世欺謾而善書者尊於朝師古曰謾誑也謾音慢又武連反悖逆而勇猛者貴於官師古曰悖亂也音布內反故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政於世行雖犬彘家富勢足目指氣使是為賢耳師古曰動目以指物出氣以使人故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利師古曰相諸侯相也守郡守也崇尚也誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有贓者輒行其誅亡但免官師古曰不止免官而已則爭盡力為善貴孝弟賤賈人進真賢舉實廉而天下治矣後漢光武建武二十九年令天下罪囚殊死以下及徒各減本罪一等其餘贖罪輸作有差明帝即位詔罪囚中二千石下至黃綬貶秩贖論者悉皆復秩還贖又詔天下亡命殊死以下聽得贖論死罪入縑二十匹右趾至髠鉗城旦舂十匹全城旦舂至司寇作三匹其未發覺詔書到日先自告者半入贖八年詔犯罪亡命者贖罪各有差十五年詔亡命殊死以下贖死罪縑四十匹右趾及髠城旦舂十匹全城旦至司寇五匹犯罪未發覺詔書到日自告者半入贖十八年詔天下亡命自殊死以下贖死罪縑三十匹右趾髠鉗以下各有差肅宗建初七年詔亡命贖死罪入縑二十匹餘各有差永元六年廷尉陳寵言今律令贖罪以下二千六百八十一溢於甫刑者七十九事詳見刑制門順帝漢安二年令罪囚殊死以下出縑贖各有差其不能入贖者遣詣臨光縣居作二歲桓帝建和三年詔死罪及亡命以下贖各有差靈帝建寧元年令天下繫囚未決入縑贖各有差三年及熹平六年光和三年中和四年俱有此令橋元乞天下凡有劫質皆并殺之不得以財寶開張姦路詔下其章魏明帝改士庶罰金之令男聽以罰代金太和五年令罪非殊死聽贖各有差魏律贖刑十一贖金六晉新律意善功惡以金贖之金等不過四兩梁武帝依周漢故事有罪者贖其科凡在官身犯罰金鞭撲杖督之罪悉入贖停罰其臺省令史士卒欲贖者聽之五歲刑笞二百收贖絹男子六十匹又有四歲刑男子四十八匹又有三歲刑男子三十六匹又有二歲刑男子二十四匹罰金一兩以上為贖罪贖死者金二斤男子十六匹贖髠鉗五歲刑笞二百者金一斤十二兩男子十四匹贖四歲刑者金一斤八兩男子十二匹贖三歲刑者金一斤四兩男子十匹贖二歲刑者金一斤男子八匹罰金十二兩者男子六匹罰金八兩者男子四匹罰金四兩者男子二匹罰金二兩者男子一匹罰金一兩者男子二丈女子各半之五刑不簡正於五罰五罰不服正於五過以贖論故為此十四等之差將吏以上及女子應有罰者以罰金代之致堂胡氏曰按舜典五刑之目一曰象以典刑二曰鞭作官刑三曰撲作教刑四曰金作贖刑五曰怙終賊刑何為設贖謂罪之疑者也三代相承至周穆王其法尤密乃有罰鍰之數皆為疑刑也鞭施於官蓋胥吏徒𨽻也撲施於教蓋學校夏楚也是則鞭重而撲輕鞭以痛懲撲以愧耻而已夫當官典刑教臨時之用有何可疑而使贖乎無疑而贖則頑者肆怠者縱法不嚴而人易犯其末流乃至於惟贖之利變亂正刑其弊有不可勝言者且使士流與卒伍同條豈刑不上大夫之義乎案虞書言金作贖刑而已九峯蔡氏則以為贖特為鞭撲輕刑設五刑夲無贖法而以穆王贖鍰之事為非致堂胡氏則以為贖本為五刑之疑者而鞭撲輕刑則無贖法二論正相反然以書之本文考之固未見其專為五刑設或專為鞭撲設也愚嘗論之五刑刑之大者所以懲創其罪愆鞭撲刑之小者所以課督其慵怠五刑而許之論贖者蓋矜其過誤之失書所謂罪疑惟輕所謂五刑之疑有赦是也鞭撲而許其論贖者蓋飬其愧耻之心記所謂刑不上大夫東坡所謂鞭撻一行則豪傑不出於其間故士之刑者不可用用者不可刑是也二者皆聖人忠厚之意也天監三年詔以金作權典宜在蠲息於是除贖罪之科十一年復開贖罪之科陳存贖罪之律其三歲刑若有官準當二年餘一年贖若公坐過誤罰金其二歲刑有官者贖論一歲刑無官亦贖論後魏起自朔方其初刑法甚峻死罪至多後乃令當死者其家獻金馬以贖北齊律贖罪舊有金皆代以中絹死百匹流九十二匹刑五歲七十八匹四歲六十四匹三歲五十匹二歲三十六匹各通鞭笞論一歲無笞則通鞭二十四匹鞭杖每十贖絹一匹無絹之鄉皆凖絹收錢自贖笞十以上至死又為十五等之差當加減次如正決法合贖者謂流內官及爵秩比視老小閹癡并過失之屬犯罰絹一匹及杖十以下皆各為罪人後周制其贖杖刑五金一兩至五兩贖鞭刑五金六兩至十兩贖徒刑一年金十二兩二年十五兩三年一斤二兩四年一斤五兩五年一斤八兩贖流刑一斤十二兩贖死刑金二斤婦人當笞者聽以贖論應贖金者鞭杖十收中絹一匹流徒者依限歲收絹十二匹死罪者百匹其贖刑死罪五旬流刑四旬徒刑三旬鞭刑一旬限外不輸者歸於法貧者請而免之隋制官品第九以上犯罪者聼贖應贖者皆以銅代絹銅一斤為負負十為殿笞十者銅一斤加至杖百則十斤徒一年贖銅二十斤每等加銅十斤三年則六十斤流千里贖銅八十斤每等則加銅十斤三千里則百斤絞斬二死刑皆贖銅百二十斤煬帝即位以文帝禁網深刻每加減降然斗稱皆小舊二倍其贖銅亦加二倍為差其實不異開皇舊制唐元宗天寶六載敇節文其贖銅如情願納錢每斤一百二十文若欠負官物應徴正贓及贖物無財以備官役折庸其物雖多限三年一人一日折絹四匹若會恩其物合免者停役僖宗乾符三年敇應殘疾篤疾犯徒流罪或是連纍即許徵贖如身犯罪不在免限其年十五以下者準律文處分晉天福六年尚書刑部員外郎李象奏請今後凡是散官不計髙低若犯罪不得當贖亦不得上請詳定院覆奏應內外文武官有品官者自依品官法無品官有散試官者應內外帶職廷臣賔從有功將校等並請同九品官例其京都軍巡使及諸道州府衙前職員內外雜任鎮將等並請準律不得上請當贖其巡司馬步司判官雖有曾歷品官者亦請同流外職準律杖罪已下依決罰例徒罪已上仍依當贖法宋太祖皇帝開寶四年大理正髙繼申上言準刑統三品五品七品以上官親屬犯罪各有等用蔭減贖伏恐年代已深子孫不肖為先祖曾有官品不畏憲章欲請自今犯罪人用祖父親屬蔭減贖者即須祖父曾任本朝官據品秩得使前代官即須有功及國有惠及民為時所推官及三品方得上請從之端拱二年詔諸州民犯薄罪或入金以贖長吏得以任情而輕重自今後並決杖遣之不得以贖論真宗景德二年審刑院大理寺上折杖贖金條犯加役流而下一罪先發已經論罰餘罪後發又計前杖科決上以細民膚革薦傷殊非哀矜之意詔申定其制止贖金以滿餘數若情理凶惡者即復決杖仁宗慶歷三年詔曰先王用法簡約使人知禁而易從後代設茶鹽酒稅之禁奪民厚利刑用滋章今之編敇皆出律外又數改更官吏且不能曉百姓安得聞之而一陷於理身體髮膚以之毁傷父母妻子以之離散情雖可哀法不得贖豈禮樂之化未行而專用刑罰之敝歟孔子曰禮樂不興則刑罰不中刑罰不中則民無所措手足漢文帝使天下人入粟於邊以受爵免罪而幾於刑措其後京師之錢纍百巨萬太倉之粟陳陳相因其議科條有非著以律者或細民難知或人情不免或冒利犯禁或奢侈違令或過誤可閔之類别為贖法鄉民以榖麥市人以錢帛使人重榖帛免刑罰則農桑自勸富夀可期矣詔下論者以為富人皆得贖罪而貧者不能以自免非朝廷用法之意不果行至和初詔前代帝王後嘗仕本朝官不及七品者祖父母父母妻子罪流以下聼贖雖不仕而嘗被賜豫者有罪非巨蠧亦如之神宗熙寧四年前單州碭山縣尉王存立言嘉祐中同學究出身以父坐事配𨽻納官贖自便而鄉縣不免丁役願同舉人例詔復賜出身仍注合入官中書言刑名未安者五條其四令州縣考察士民有能孝悌力田為衆所知者給帖付身偶有犯令情輕可恕者特議贖罰其不悛者科決後竟不行文獻通考卷一百七十一上欽定四庫全書文獻通考卷一百七十一下鄱陽馬端臨貴與著刑考十下赦宥寬恤虞舜眚災肆赦眚過災害也肆緩也過而有害當緩赦之周官司刺掌三刺三宥三赦之法以贊司冦聼獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民注見刑制門一宥曰不識再宥曰過失三宥曰遺亡鄭司農云不識謂愚民無所識則宥之過失若今律過失殺人不坐死元謂識審也不審若今仇讎當報甲見乙誠以為甲而殺之者過失若舉刃欲斫伐而軼中人者遺亡若間帷薄忘有在焉而以兵矢投射之一赦曰幼弱再赦曰老耄三赦曰憃愚憃愚生而癡騃童昏者鄭司農云幼弱老耄若今律令年未滿八年八十以上非手殺人他皆不坐以此三法者求民情斷民中而施上服下服之罪然後刑殺上服殺與墨劓下服宮刖也司約職曰其不信者服墨刑凡行刑必先規識所刑之處乃後行之穆王呂刑五刑之疑有赦五罰之疑有赦其審克之詳見刑制及贖刑門王制疑獄泛與衆共之衆疑赦之管仲曰文有三情武無一赦赦者先易而後難久而不勝其禍法者先難而後易久而不勝其福故惠者人之仇讎也法者人之父母也凡赦者小利而大害者也無赦者小害而大利者也夫盜賊不勝則良人危法禁不立則姦邪煩故赦者奔馬之委轡也椘陶朱公中子殺人繫獄乃令其長子賫千金遺楚王所信善莊生請之莊生入見楚王言某星宿某獨以德為可以除之王乃使使者封三錢之庫楚人告朱公長男曰王且赦曰何以也曰每王且赦常封三錢之府昨暮王使使封之錢幣至重慮人或逆知故盜竊之故以封庫備竊盜也朱公長男以為赦弟固當出重千金虛棄莊生以為殊無短長也乃復見莊生以為王且赦莊生乃還其金羞為所賣復入言王曰臣前言某星王言欲修德報之今臣出道路皆言陶之富人朱公之子殺人囚椘其家多持金錢賂王左右王非為椘國而赦乃以朱公子故也椘王大怒令論殺朱公子明日遂下赦令按唐虞三代之所謂赦者或以其情之可矜或以其事之可疑或以其在三赦三宥八議之列然後赦之蓋臨時隨事而為之斟酌所謂議事以制者也至後世乃有大赦之法不問情之淺深罪之輕重凡所犯在赦前則殺人者不死傷人者不刑盜賊及作姦犯科者不詰於是赦遂為偏枯之物長姦之門今觀管仲所言及陶朱公之事則知春秋戰國時已有大赦之法矣秦二世元年陳涉將周文兵至戲下二世大驚少府章邯曰盜已至衆強今發近縣不及矣驪山徒多請赦之授兵以擊之二世乃大赦天下使章邯免驪山徒人奴産子悉發以擊椘軍大破之漢髙帝二年正月赦罪人六月立太子赦罪人五年正月兵事畢赦天下殊死以下六月都長安大赦天下六年以豪傑未習法令故犯法其赦天下九年正月丙寅前有罪殊死以下皆赦之十一年正月立代王大赦天下七月征英布赦天下死罪以下令從軍十二年帝崩發喪大赦天下右髙帝在位十二年凡九赦惠帝四年皇帝冠赦天下右惠帝在位七年唯此一赦呂太后臨朝稱制大赦天下六年赦天下八年遺詔大赦天下右呂后臨朝八年凡三赦文帝初即位赦天下七年赦天下十五年郊見五帝赦天下後四年日食赦天下右文帝在位二十三年凡四赦景帝元年赦天下四年赦天下中元年赦天下五年赦天下後元年赦天下右景帝在位十六年凡五赦武帝建元元年赦天下元光元年赦天下四年地震赦天下元朔元年赦天下與民更始三年赦天下六年赦天下元狩元年赦天下三年赦天下元鼎元年赦天下五年赦天下元封二年甘泉産芝赦天下五年修封禪赦天下天漢元年赦天下三年修封禪赦天下太始元年赦天下四年修封還赦天下征和三年赦天下後元元年郊泰畤赦天下右武帝在位五十五年凡十八赦昭帝始即位赦天下始元元年赦天下四年立皇后赦天下元鳯元年赦天下二年赦天下四年赦天下六年赦天下右昭帝在位十三年凡七赦宣帝即位大赦天下本始元年鳯凰集赦天下四年立皇后赦天下地節二年鳯凰集赦天下三年立皇太子赦天下元康二年赦天下與士大夫厲精更始神爵二年鳯凰甘露降集赦天下四年嘉瑞並見赦天下五鳯三年婁蒙嘉瑞赦殊死以下甘露二年赦天下右宣帝在位二十五年凡十赦元帝初元元年大赦天下三年地動赦天下三年白鶴館災赦天下永光元年赦天下二年二月大赦天下六月赦天下四年赦天下建昭二年赦天下四年斬郅支赦天下五年赦天下右元帝在位十五年凡十赦元帝時匡衡上疏曰陛下躬聖德開太平之路閔愚吏民觸法抵禁比年大赦使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦明日犯法相隨入獄此殆導之未得其務也蓋保民者陳之以德義示之以好惡觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡廉恥之節薄淫僻之意縱綱紀失序疏者踰內親戚之恩薄婚姻之黨隆茍合徼幸以身設利不改其原雖歲赦之刑猶難使錯而不用也成帝即位大赦天下建始元年火災大赦天下河平元年赦天下陽朔二年大赦天下四年赦天下鴻嘉三年赦天下永始元年赦天下元延元年赦天下綏和元年大赦天下右成帝在位二十六年凡九赦成帝時王尊劾奏丞相衡御史大夫談知中書謁者令顯等専權擅勢皆不道在赦令前赦後衡談舉奏顯云云天子下御史問狀劾奏尊妄詆欺非謗赦前事有詔左遷哀帝即位大赦天下建平元年赦天下二年六月改元赦天下元夀元年大赦天下右哀帝在位六年凡四赦帝即位詔有司無得舉赦前往事平帝即位大赦天下元始元年日食大赦天下三年立皇后大赦天下五年帝崩大赦天下右平帝在位五年凡四赦帝即位詔曰夫赦令者將與天下更始誠欲令百姓改行潔已全其性命也往者有司多舉奏赦前事纍增罪過誅陷亡辜殆非重信審刑灑心自新之意也自今以來有司毋得陳赦前事置奏上有不如詔書為虧恩以不道論定著令布告天下使明知之赦徒文帝二年民謫作縣官及貸種食未入備者皆赦之景帝中四年赦作陽陵者死罪欲腐者許之武帝元封元年封泰山赦所過徒宣帝元康元年鳯凰集赦天下徒五鳯元年赦徒作杜陵者元帝初元四年祠后土赦汾隂徒永光元年幸甘泉赦雲陽徒成帝建始二年祀南郊赦奉郊縣及中都官耐罪徒三年赦天下徒四年單于朝赦天下徒陽朔元年赦天下徒鴻嘉元年幸初陵赦作徒哀帝建平二年赦天下徒平帝元始元年赦天下徒二年赦天下徒别赦漢髙帝五年遣使者赦田橫八年吏有罪未發覺者赦之十年太上皇崩葬萬年赦櫟陽囚死罪以下瓚曰萬年陵有櫟陽縣界十二年擊盧綰居去來歸者赦之惠帝六年八月赦降司馬氏大事記文帝三年七月詔濟北吏民兵未至先自定及以軍城邑降者皆赦之復官爵與王興居去來者亦赦八月赦諸與興居反者景帝三年赦襄平侯及妻子當坐者六月詔吳王濞已滅吏民當坐濞等及逋逃亡軍者皆赦之武帝建元元年赦吳楚七國孥輸在官者六年赦鴈門代郡軍吏不循法者元封四年祭后土赦汾隂夏陽中都死罪以下益州昆明反赦京師亡命令從軍太初二年用事介山祭后土赦汾隂安邑殊死以下昭帝元鳯元年赦燕王太子建公主子文信及宗室子與燕主上官桀等謀反父母同産當坐者皆免為庶人其吏為桀等所詿誤未發覺在吏者除其罪宣帝地節四年諸為霍氏所詿誤未發覺者皆赦之元康二年諸觸諱在令前者赦之後漢光武建武元年大赦天下即位二年二月大赦天下六月戊戌大赦天下立太子三年正月大赦天下六月壬戍大赦天下四年正月大赦天下五年正月大赦天下七年四月大赦天下日食中元元年大赦天下封禪明帝永平二年自殊死以下謀反大逆皆赦除之祀明堂十年四月大赦天下十五年四月大赦天下其謀反大逆及諸不應宥者皆赦除之章帝建初三年大赦天下祀明堂元年二年大赦天下祀明堂時赦天下繫囚在四月丙子以前減罪一等勿笞詣金城而文不及亡命未發覺者郭躬上封事曰聖恩所以減死罪使戍邊者重人命也今死罪亡命無慮萬人又自赦以來捕得甚衆而詔令不及皆當重論伏惟天恩莫不蕩宥死罪已下並蒙更生而亡命捕得獨不沾澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全人命有益於邊肅宗善之即下詔赦焉和帝永元十一年大赦天下十四年三月大赦天下臨辟雍元興元年大赦天下改元殤帝延平元年大赦天下安帝永初元年大赦天下三年正月大赦天下加元服四年四月大赦天下元和三年二月大赦天下永寧元年大赦天下立太子建光元年大赦天下延光元年大赦天下改元四年六月大赦天下順帝永建元年大赦天下四年正月大赦天下陽嘉元年大赦天下三年五月大赦天下永和三年四月大赦天下漢安元年大赦天下改元建康元年大赦天下質帝即位大赦天下本初元年六月大赦天下桓帝建和元年大赦天下二年大赦天下加元服和平元年大赦天下元嘉元年大赦天下永興元年大赦天下永夀元年正月大赦天下改元三年正月大赦天下延熹元年六月大赦天下三年正月大赦天下四年六月大赦天下六年三月大赦天下八年三月大赦天下九年六月大赦天下靈帝建寧元年大赦天下四年正月大赦天下熹平元年五月大赦天下二年二月大赦天下三年二月大赦天下四年五月大赦天下五年四月大赦天下六年正月大赦天下光和元年三月大赦天下二年四月大赦天下三年正月大赦天下四年四月大赦天下五年正月大赦天下六年三月大赦天下中平元年十二月大赦天下三年二月大赦天下四年正月大赦天下六年四月大赦天下八月辛未大赦天下獻帝初平元年大赦天下二年正月大赦天下三年正月大赦天下四年正月大赦天下興平元年正月大赦天下二年正月大赦天下建安元年正月大赦天下二年正月大赦天下光武時吳漢言願陛下謹勿赦而已安帝永初中尚書陳忠上言母子兄弟相代死者聼赦所代者從之王符述赦篇曰凡療病者必知脈之虛實氣之所結然後為之方故疾可愈而夀可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣何以明之哉夫謹敕之人身不蹈非又有為吏正直不避強禦而姦猾之黨橫加誣言者皆知赦之不久故也善人君子被侵怨而能至闕庭自明萬無數人數人之中得省問者百不過一既對尚書而空遣去者復十六七矣其輕薄姦宄既陷罪法怨毒之家冀其辜戮以解蓄憤而反一槩悉蒙赦釋令惡人髙會而誇吒老盜服臧而過門孝子見讎而不得討遭盜者覩物而不可取痛莫甚焉夫飬稂莠者傷禾稼惠姦宄者賊良民書曰文王作罰刑兹無赦先王之制刑法也非好傷人肌膚斷人夀命也貴威姦懲惡除人害也故經稱天命有德五服五章哉天討有罪五刑五用哉詩刺彼宜有罪汝反脫之古者惟始受命之君承大亂之極冦賊姦宄難為法禁故不得不有一赦與之更新頤育萬物以成大化非以飬姦活罪放縱大賊也夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脫重梏夕還囹圄嚴明令尹不能使其斷絶何也凡敢為大姦者才必有過於衆而能自媚於上者也多散誕得之財奉以諂諛之辭以轉相驅非有第五公之廉直孰不為顧哉論者多曰久不赦則姦宄熾而吏不制宜數肆眚以解散之此未昭亂之本源不察禍福之所生也昭烈章武元年即皇帝位大赦後主元年即位大赦建興十二年丞相亮北征卒於軍中師還大赦延熙元年立皇后大赦九年秋大赦大司農河南孟光責大將軍費禕曰夫赦者偏枯之物非明世所宜有也衰敝窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職何有旦夕之急而數施非常之恩以惠姦宄之惡禕謝之初丞相亮時有言公惜赦者亮答曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言周旋陳元方鄭康成間每見啓告治亂之道悉矣曾不語赦也若劉景升季玉父子歲歲赦宥何益於治由是蜀人稱亮之賢知禕不及焉陳夀評曰諸葛亮為政軍旅數興而赦不妄下不亦卓乎致堂胡氏曰赦之無益於治道也前賢言之多矣而終不能革至按以常典而行之於其間有吉慶克捷祥瑞祈禱之事則又赦焉不信二帝三王之法而循後世之制是何也其説多矣始受命則赦改年號則赦獲珍禽竒獸則赦河水清則赦刻章璽則赦立皇后則赦建太子則赦生皇孫則赦平叛亂則赦開境土則赦遇災異則赦有疾病則赦郊祀天地則赦行大典禮則赦或三年一赦或比歲一赦或一歲再赦三赦赦令之下也有罪者除之有負者蠲之有滯者通之或得以廕補子孫或得以封爵祖考大槩如是而已耳明哲之君則赦希而實昏亂之世則赦數而文希者尚按故事而不能盡去也數者則意在邀福而歸諸已也實者有罪必除有負必蠲也文者雖有是言而人不被其澤也復有姦宄擅權者以急征暴賦多獄無罪歸之上而施行寬宥布宣惠心自我請之由是數者而論赦為有益乎為無益乎人君誠以明哲自期而以昏亂為戒則所謂按故事而釋有罪者尚在所議故事有是有非豈可盡循罪人若審有罪豈可盡貸有罪而貸則善人奈何甲殺乙而遇赦乙巳不可復生而甲得不死以赦為偏枯者此也若曰乙巳不辜而死矣吾未知甲之果當殺之乎抑疑似也則援寧失不經之文而赦之以為從厚而終不恤乙之無辜以赦為偏枯者此也百姓負租或以旱或以貧或以已納而不為之除籍或為官司所抑代人而輸其事非一每下赦令未嘗不蠲也而百姓有黃紙放白紙催之言自古如此則以著於甲令者曰凡蠲旱稅不得過若干分而赦令則曰歲大旱其盡蠲之百姓喜於盡蠲之文而不知令甲之有限也則相與怨其上曰黃紙之放特紿我耳此又偏枯之甚者也姦宄亂賊之人知赦之可擬也則甫期而為姦宄亂賊之事僥幸貸釋不可勝數矣亦或病其然則下令曰凡距赦若干日而殺人是待赦也不得以赦原先為逺期焉而姦宄亂賊之人有財可行有力可援有反可恃有來可使一入囹圄用是數者遷延稽故終以無事而捕寇之吏被傷之主發覺之人往往反坐於是良善困於姦宄閭里怵於亂賊喑嗚飲氣無路伸吐此又偏枯之甚者也靈帝行冠禮大赦天下而黨人不與焉自是後凡五赦而益增五族之錮又五赦而黃巾起不得已乃赦黨人黨人縱有罪不輕於十赦之惡逆乎况黨人無罪而願忠於君志除姦凶以清天下者也乃經十赦不得已而後赦此豈直偏枯而已舉四肢皆廢矣四肢盡廢頭首兀然其能不為人所捽擊曵挽而仆乎於是董卓角之袁紹掎之曹操靡之獻帝為所挾而不得赦伏后為所弒而不得赦二皇子為所弒而不得赦語赦至此無益明矣明哲之君監失而思得舍非而從是莫若兼用虞舜大易呂刑周官之法則雖曠歲而不一赦一年而十百赦無不可者舜之法曰眚災肆赦謂有目病而害加乎人者也大易之法曰君子以赦過宥罪過誤則直肆之罪咎則稍寬之而已呂刑之法曰五刑五罰之疑而不明者則赦無疑則不赦矣周公之法曰赦幼弱老耄憃愚非此三者則不赦矣魯國肆大眚春秋非之以其無謂而盡赦也取正乎孔子略法乎虞周大易之訓則刑罰盡道可以代天之春生秋殺矣夫吳漢攻戰之士也臨終獻言勸光武以勿赦陳夀於孔明有憾者也而稱譽不赦之卓况為天下國家者可不如吳漢陳夀之見乎十一年四月大赦十四年冬大赦十七年春大赦十九年大赦二十年大赦景耀元年大赦改元四年冬大赦六年大赦改元炎興文獻通考卷一百七十一下
