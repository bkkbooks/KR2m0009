body:
  text: 文獻通考卷一百五十六鄱陽馬端臨貴與著兵考八郡國兵鄉兵周制大國三軍次國二軍小國一軍詳見兵制門秦始皇并天下列為三十六郡郡置材官漢列郡王國侯國三者其兵不殊郡有都尉佐太守典武職甲卒其在王國者則以内史比郡守中尉比都尉侯國亦有相秩比天子令長其郡國之兵必有虎符而後可發齊王欲發兵誅諸吕魏勃曰王欲𤼵兵非有漢虎符驗也武帝建元三年東甌告急上曰吾新即位不欲出虎符召兵郡國乃遣嚴助以節發㑹稽兵㑹稽守欲距法不為發助乃斬一司馬諭指意遂發兵浮海救東甌七國敗弓髙侯詰膠西王卬曰未有詔虎符擅𤼵兵王其自圖之卬遂自殺至公孫戎奴為上黨太守發兵不以聞免髙祖命天下選能引閱蹶張材力武猛者以為輕車騎士材官樓船常以秋後講肄課試各有員數平地用車騎山阻用材官水泉用樓船光武以幽冀兵克定天下始於黎陽立營領兵騎常千人以謁者監之號黎陽兵建武六年詔罷郡國都尉并職太守無都試之法七年罷天下輕車騎士材官樓船及軍假吏悉還民伍詳見兵制門晉武帝大封同姓大國三軍兵五千人次國二軍兵三千人小國一軍兵千五百人太康元年既平呉詔悉去州郡兵大郡置武吏百人小郡五十人唐制髙祖武徳初始置軍府析闗中為十二道以驃騎車騎兩将軍領之太宗貞觀十年更號統軍為折衝都尉别将為果毅都尉諸府總曰折衝府凡天下十道闗中置府一百七十三河南置府六十二河東道置府百三十九河北道置府十四山南道置府凡十隴右道置府二十九淮南道置府凡六江南道置府凡二劔南道置府凡十嶺南道置府凡三共十道置府五百六十四皆有名號而闗中府皆以𨽻諸衞凡府三等兵千二百人為上為中八百人為下府置折衝都尉一人左右果毅都尉各一人長史兵曹别将各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長髙宗武后以来府衞之法寖壊變而為彍騎彍騎變而方鎮之兵熾矣詳見兵制門林氏曰唐之府兵折衝都尉雖遥𨽻於諸衞軍城守捉實散在於諸道每歳季冬折衝将率兵馬之在府者置左右校習戰陣之儀步隊騎隊之有其制擊鉦伐鼓之有其節國無不習之兵然府兵六百三十四所以三百六十有一在闗中固為重本計而諸道二百有餘分布錯置亦為防外設唐初相制之意非不善也夫何更代法廢諸府之籍不補折衝之将不遷見兵制及范陽之變所過州縣望風瓦解如入無人之境外兵盖失於不補耳迨至諸鎮之兵共起討賊其後安史繼亂中國雲擾肅宗命李光弼等討之號九節度之師大盗既滅而武夫戰卒以功起行陣者皆除節度由是方鎮相望於内地朝廷不能制而甘為姑息之政是以京師有變藩鎮亦驅兵而至朱李之徒相繼犯闕唐祚遂以𤓰裂此亦矯重外兵之失也嗟夫輕則盗賊以乗隙重則牧鎮以據兵為國者安可不權其勢歟田承嗣鎮魏博選募六州驍勇之士五千人為牙軍厚其給賜以自衞為腹心自是父子相繼親黨膠固歳久益驕横小不如意輙族舊帥而易之自史憲誠以来皆立於其手天雄節度使羅紹威心惡之力不能制朱全忠之圍鳳翔也紹威遣軍将楊利言密以情吿全忠欲借其兵以誅之全忠以事方急未暇如其請隂許之及李公佺作亂紹威益懼復遣牙将臧延範趣全忠全忠乃發河南諸鎮兵七萬遣其将李思安将之㑹魏鎮兵屯深州樂城聲言擊滄州討其納李公佺也㑹全忠女適紹威子廷規者卒全忠遣客将馬嗣勲實甲兵於槖中選長直兵千人為擔夫帥之入魏詐云㑹葬全忠自以大軍繼其後云赴行營牙軍皆不之疑庚午紹威潛遣人入庫㫁弓弦甲襻是夕紹威帥其奴客數百與嗣勲合擊牙軍牙軍欲戰而弓甲皆不可用遂闔營殪之凡八千家嬰孺無遺宋太祖皇帝詔諸州長吏選所部兵送都下以補禁旅之闕詳見兵制門宋制軍有禁軍廂軍二等國初盡選驍勇部送闕下以補禁衞餘留本城其後開拓土宇申嚴紀律闗防要害皆設屯戍漕輓營繕力役之任悉用士伍自乾徳至於乾興召募増置名額漸廣凡所規畫盡為節制畿甸之内蕃服雖大不以加也邊防之地堡障雖小必有備也廂軍者諸州之鎮兵也各𨽻其州之本城專以給役内總於侍衞司而尚書兵部掌其政令一軍之額有分𨽻數州者或一州之管兼屯數軍其教閱者始號廂禁軍後皆以為丁禁軍其給使於諸司者亦各以其事役屬焉禁軍月俸五百以上者皆日閱習武技其三百以下有閲習或充役者戍川廣者不習其後詔諸道騎兵頗為長吏之所役使失於教習自今止之禁軍殿前侍衞司分領見禁衞門廂軍總諸州騎兵之額四十八歩兵之額百八十三又在京諸司之軍額有五分給畜牧繕修之役𨽻宣徽院州有屯兵者官給錢宴犒将校謂之旬設凡諸州置馬歩軍都指揮使副都指揮使都虞候馬軍有都指揮使副都指揮使都虞候歩軍亦如之馬歩軍諸指揮各有指揮使副指揮使開寳中嘗置軍教練使在指揮使上後廢每都有軍使副兵馬使都頭副都頭廂軍頭十将将虞候承局押官置都監監押以領之歳時簡練焉下州及軍監但有牢城兵則軍校之職隨宜裁置其諸州都監監押止得典司軍旅及捕逐冦賊不許關預州縣政事屯駐禁軍将校凡遥帶郡令以客禮見長吏餘如統攝之儀其駐泊就糧禁軍将校見長吏如屯駐将校之禮止齋陳氏曰自建隆二年以諸郡本城共百役淳化四年十一月宣應馬遞鋪兵士並於本城諸指揮内輪差候及二年替咸平三年九月宣諸路本城兵士差直馬逓鋪祇應内有搬家者今後並五年一替不搬家者三年一替嘉祐元年九月二十七日定州都著禮奏在城廂軍逐年抽上黄河執役并修葺倉營城池迎送官員擔擎往来又自官中不招添以来人數轉少今来一名當著数人色欲權宜勾抽馬逓鋪閑劇人赴州驅使見得自淳化至嘉祐猶如此或更戍他郡又按咸平三年二月二十七日宣諸州夲城兵士差在州陜駐泊遇郊賞如係屯駐駐泊及廵檢下即與同𢃄甲例逐人三貫歸營却同不𢃄例天禧四年十月二十三日永州團練使錢惟濬奏諸州兵士差往邉上守把及於都同廵檢下捉賊及諸色役多是别指揮節級軍員部轄或有違犯未有明文元豐四年七月福建路閭邱奏廵檢下土兵並是諸雜攅諸指揮廂禁軍或屯駐客軍不諳夲路山川道路差到年歲間稍能辨認道路人物又却替移元豐八年八月宣福建路東南第十将下部軍六指揮年滿令差使臣往抽衡州威果四百五十九人道州威果四百五十一人辰州雄畧三百十八人鄂州懐恩三百五十一人鼎州歸逺二百六人廣徳軍教閲忠節二百六十二人替閲歸營見得咸平元豐猶更戍如此不但以逸民戸也所以勞苦其身違離其妻子使習於南北風土之異而不得坐食於本營盖勞之則易使散之則易養此藝祖神謀也三司禁旅就糧州郡亦不得常坐食於京師按祥符編勑淳化四年十二月二十六日宣應差發就糧禁軍欲往軍前屯駐駐泊廵檢守把處及歸學指揮收管如及二三十人便湏聞奏乞差使臣管押景徳四年知福州陳象輿奏駐泊許州騎射指揮節級兵士多缺命抵一家三百二十疋今揀選冒知髙大依與餧飬候替換日赴京師送納皇祐三年宣差在京歩軍虎翼第四指揮使唐興下五百二十二人宋興下三百二十人至福州提轄司如轄下州軍缺人防守緩急捉捕盗賊去處便仰量酌差撥應付以上指揮甚多不可悉載自列郡各置禁軍於是嚴差出占破之令慶歴三年十月十四日宣置定毅指揮即不得差出及諸般占役五年七月二十七日宣定毅兵士不得差上綱及出外諸般功役其知州以下不得影占一名嘉祐四年八月宣置就糧禁軍以威果為額七年十月九日吕誨奏諸路提轉宣諭州軍存留兵士不得差出防䕶借請諸般虚占人数治平四年五月七日勅主兵之官冗占雜使法外重㫁仍令提轉覺察申奏而壮城元豐三年四月十二日宻院劄子於廂軍内差壮城兵士大城五十人崇寕五年五月置壮城指揮作院熈寜元年置作院指揮各置指揮由是在軍禁旅無就糧者熈寜五年宣諸路教閲廂軍備員使喚不得奏差禁軍在城防托而廂軍亦升為禁軍不復戍役矣養兵之費徧天下北人犯闕無或能發一矢者以不守藝祖舊章也開寳八年發渭州平源藩源二縣民治城壕因立為保毅軍弓箭手分鎮戍寨能自置馬者免役逃死以親屬代盖因周廣順之制周廣順中㸃秦州税户充保毅軍止齋陳氏曰此所謂義軍也藝祖有志於民兵矣咸平五年始置營升為禁軍其後寖有㸃差之令而前朝名臣多言不便咸平五年五月命使臣分往邠寜環慶涇原渭隴鄜延等州於保安保毅義軍内與逐處官吏選取有力者二萬人各本州置營升為禁軍號曰振武指揮既而帝曰邉防缺兵朝廷須為制置盖不得已也候邉鄙大寧即可銷弭咸平五年嘗於曹單宋亳汝潁間㸃集强壮五七萬人始降宣命只今在本城防守及至奏聞都数即便押赴京師見侍御史知雜事田錫奏康定元年差吳遵路等於河東㸃差强壮共一十四萬三千餘人多而不精頗防奪農事見河東轉運使文彦博奏慶歴元年宣差朝臣往陜西河東京東西路㸃集强壮弓手願充軍人分配宣毅保㨗指揮謹列不便事件如左見知諫院張方平奏治平元年十一月差提㸃刑獄陳安石於本路人户三丁之内刺一萬為充勇如果若此大為非便自寳元慶歴之間因趙元昊叛遂於三路人户不問貧富等第但有三丁充鄉弓手及强壮尋将陜西一路鄉弓手盡刺面充保㨗指揮云云凡六奏韓𤦺為相嘗身歴西事留意兵政刺陜西義勇知諫院司馬光至六疏争之不聼已而新法行熈寧六年十月遂罷强壮弓箭手而行保甲海内騷然要之皆以刺配為軍失祖宗本意而非民兵不可復以臣愚見條約弓箭社如龎籍蘇軾則人情不擾而邉備修矣此今日所當講也仁宗皇祐中京東安撫使富弼上言臣頃因河北水災農民流入京東者三十餘萬臣既憫其濱死又防其為盗遂募伉健者以為廂兵既而選尤壮者得九指揮教以武技已類禁軍今止用廂兵俸廪而得禁軍之用可使効死戰鬬而無驕横難制之患此當世大利也詔以騎兵為教閲騎射威邊歩兵為教閲壮武威勇分置青萊淄徐沂密淮陽七州軍征役同禁軍初弼請刺教閲字帝不許止加於軍額嘉祐四年復詔西路於鄆濮齊兖單州置歩兵指揮六如東路法於是東南州軍多置教閲廂軍皆以威勇忠果壮武為號訓肄如禁軍免其他役英宗治平初遣使分募河北河東陜西京東民為本城兵遇就糧禁軍闕即選補又陜西州軍悉置壮城如河北以備繕完城壘之役盖景祐中本城四十三萬八千逮治平三年乃五十萬矣總諸州本城教閲騎軍之額四歩軍之額六不教閲騎軍之額三十有五歩軍之額一百九十有五河北河東神鋭忠勇强壮仁宗時神鋭忠勇廢已久而忠順保毅僅有存者康定初詔河北河東添籍强壮河北凡二十九萬三千河東十四萬四千皆以時訓練自夏人逆命王師屢衂正兵不足乃籍陜西之民三丁選一以為鄉弓手未幾刺充保㨗軍為指揮一百八十五分戍邉州及西師罷多揀放為民慶歴二年籍河北强壮得二十九萬五千揀十之七為義勇盡抄民丁增廣其數河東亦揀刺如河北法其後議者論義勇為河北伏兵以時講習無待儲廪得古者寓兵於農之意惜其束於列郡遺其大用只以為城守之備誠能令河北邢冀二州分東西兩路命二郡守臣分領以時閲習冦至即兩路義勇翔集赴援使其腹背受敵則是河北三十餘所常伏鋭兵羣胡何恃不恐朝廷下其議河北帥臣李昭亮等議曰昔唐澤潞留後李抱真籍户丁男三選其一農隙則分曹角射嵗終都試以示賞罸三年皆善射舉部内得勁卒二萬既無廪費府庫益實乃繕甲兵為戰具遂雄視山東是時天下稱昭義歩兵冠於諸軍此則近代之顯效而或者謂民兵祇可城守難備戰陣誠非通論也但當無事時便分義勇為兩路置官統領以張用兵之勢外使敵人疑而生謀内亦揺動衆心恐非寓兵之術也姑令所在㸃集訓練三二年間武藝稍精漸習行陣遇有警得将臣如抱真者統馭制其陣隊示以賞罸何戰敵不可哉至於部分布列量敵應機遣用之地繫於臨時便宜亦難預圗况河北河東皆邉胡之地自置義勇州縣以時按閲耳目已熟行固無疑詔如所議嵗教閲以新舊籍并闕数聞熈寧七年轉運判官黄好謙言河東强壮前已寝廢其募於河北者舊給唐泊河游之田力不足以耕重苦番教應募者寡請罷强壮以田募民耕毋過兩頃蠲其賦以為保甲從之陜西保毅周廣順置開寳八年因之詳見前咸平初秦州極邉上置千人分番戍守月給米冬賜衣五年㸃陜西近邊丁壮充保毅凡得萬六千人給資糧與正兵分戍邉郡慶歴初悉刺為保㨗軍唯秦州増置及三千人環慶保安亦各置籍時諸州總六千五百十八人為指揮三十一皇祐五年涇原都總管程勘上言陜西保毅近歳止給役州縣無復責以武技自㸃刺為保㨗軍而家猶不免保毅之籍或折賣田産而所售之家以分数助役今秦州僅三千人久廢農業請罷遣詔自今敢私役者計傭坐之其後詔買保毅田承名額者悉揀刺以為義勇熈寧四年詔廢其軍河北忠順自太宗朝以瀛鄚雄霸州乾寧順安保定軍家户置凡三千人自陶河至泥姑海口九百里為二十六寨一百二十六鋪沿界河分番廵徼𨽻縁邉戰棹廵寨司自十月悉上人給糧二升至二月輪半營農慶歴七年夏竦建議與正兵參戍其後以多補亡者權放業農俟歳豐如故自後不復補河北陜西强人咸平四年募河北民諳契丹道路勇鋭可為間伺者充强人置都頭指揮使無事散處田野遇敵入冦追集給器甲口糧食錢遣出塞偷斫賊壘能斬首級奪馬者如賞格擄獲財畜皆畀之慶歴二年環州亦募湼手背自備戎械并馬置押官甲頭隊長户四等以下免役上番防守月給俸廪三年涇原路被邉城寨悉置環慶二州復有寨户天禧慶歴間募置番戍為廵徼斥堠日給糧人賦田八十畝能自備馬者益賦田四十畝遇防秋官給器甲下番隨軍訓練為指揮六河北河東强壮自五代時瀛霸諸州已有之咸平三年詔河北家二丁三丁籍一四丁五丁籍二六丁七丁籍三八丁以上籍四為强壮五百人為指揮置指揮使百人為都置正副都頭二人節級四人所在置籍擇善騎射者第補校長聼自置馬勝甲者蠲其户役五年募其勇敢團結附大軍為柵官給鎧甲景徳元年遣使分詣河北河東集强壮借庫兵給糧訓練非縁邉即分番迭教遇敵入境悉集守城敵退放營農至康定初州縣不復閲習多亡其籍乃詔二路選補増廣為伍保迭糾游手不業農及作姦者二十五人為團置押官四團為都置正副都頭各一人五都為指揮置指揮使各以階級伏事年二十係籍六十免取家人或他户代之嵗正月縣以籍上州州以籍奏兵部按舉不如法者慶歴二年悉揀以為義勇不預者釋之而存其籍以備守葺城池而强壮自此寝廢矣河東陜西弓箭手周廣順初鎮州諸縣十戸取材勇者一人為之餘九户資以器甲芻糧建隆二年詔釋之凡一千四百餘人景徳二年鎮戎軍曹瑋言有邉民應募為弓弩手者請給以間田蠲其徭賦有警可參正兵為前鋒而官無資糧戎械之費詔人給田二頃出甲士一人及三頃者出戰馬一疋設堡戍列部伍補軍置廵檢以統之其後鄜延環慶涇原并河東州軍亦各募置慶歴中諸路總三萬二千四百七十四人為指揮一百九十二至和二年韓琦奏昔潘美患契丹数入冦遂驅旁邉耕民内徙茍免一時失備之咎其後契丹講和因循不復許人復業遂名禁地嵗久為戎人侵耕漸失疆界今代州寧化軍有禁地萬頃請如草城川募弓箭手可得四千餘人詔如其請條視山坡川原地均給人二頃其租秋輸川地畝五升均原地畝三升毋折變科徭仍指揮即擇山險為社以居止備征防毋得擅役先是麟府豐州亦以閑田募置人給屋貸口糧二石而徳順軍静邉寨壕外弓箭手尤為勁勇夏人利其地數来争朝廷為築堡戍守至治平末河東七州軍弓箭手總七千五百人陜西十州軍并寨户總四萬六千三百人熈寧二年兵部上河東七郡舊籍七千五百今籍七千陜西十郡并寨户舊籍四萬六千三百唯秦鳳有寨户三年秦鳳路經畧使李師中言前年築熟羊等堡募蕃部獻地置弓箭手迄今三年所募非良民初未嘗團結訓練竭力田事今當置屯列堡為戰守計置屯之法百人為屯授田於旁寨置将校領農事休即教武技其牛具農器旗鼓之屬並官予置堡之法諸屯併力自近及逺築為堡以備冦至冦退則悉出掩擊從之五年趙卨為鄜延括地萬五千九百頃募漢番弓箭手四千九百人帝嘉卨能省募兵之費有詔褒賞六年詔熈河路以公田募弓箭手其旁塞民强勇願自占田出租賦聨保伍或義勇願應募或民户願受畨部地者聼中書條例司乞五路弓箭手寨户除防托廵警及緩急邉事許差發外若修城諸役即申經畧司如敢擅差及科配和僱並論違制罪從之八年環慶路經畧使范純仁言舊陜西勅弓箭手百姓不許典買租賃蕃部田土臣今體訪環慶諸州城寨熟户昨因災傷多以田土典賣與番部竊恐既賣盡田土則無顧戀之心詔依舊勅元豐四年涇原路經畧司言本路弓箭手闕地九千七百頃渭州隴山一帶川原陂地四千餘頃可募弓箭手二千餘人或不願應募乞收其地入官從之六年鄜延經略司言弓箭手於近裏縣置田兩處立户及四丁以上乞取一丁為保甲一丁為弓箭手有二丁至三丁即且令充弓箭手詔保甲願充弓箭手者聼其見役弓箭手與當丁役毋得退就保甲陜西河東亦如之八年殿前副都指揮使劉昌祚奏根括隴山地凡一萬九百九十頃招置弓箭手人馬凡五千二百六十二人騎賜敕書奨諭紹聖元年樞密院言熈河等路經略司奏本路弓箭手以戰功補官者遣歸所屬差使仍以其地令親屬承刺如無召人承之崇寧元年樞密院勘㑹陜西五路并河東自紹聖開拓以来疆土至廣逺者数百里近者不減百里罷兵以来未曽措置田多膏腴雖累降詔置弓箭手類多貧乏或至逃亡州縣鎮寨汚吏豪民冒占沃壤利不及於平民且並緣舊疆侵占新土今遣官分往逐路提舉措置應縁新疆土田分定腴瘠招置弓箭手推行新降條法舊弓箭手如願出佃新疆亦仰相度施行詔湯景仁河東路董采秦鳳路陶節夫環慶路安師文鄜延路並提舉弓箭手大觀二年詔罷提舉弓箭手四年詔復置提舉弓箭手以武臣為之以前所置文臣皆養安不能親詣極邉衝冒寒暑經理番地故也三年提舉河東路弓箭手司奏本司體訪得沿邉州軍逐處招置弓箭手多将人户舊用工開耕之地指射剗奪其舊佃人遂致失業且所出租僅比佃户五分之一於公私俱不便今欲乞應係官荘屯田已有人租佃及五年者並不在招置弓箭手請射之限其河東路察訪司初不以邉防民兵為重姑息佃户致有此弊欲乞應熈寧八年以前人户租佃官田並先取問佃人如願投刺弓箭手毎出一丁許依條給見佃田二頃五十畝充人馬地若不願充弓箭手及出外尚有請占不盡地土即拘収入官從之提舉熈河蘭湟路弓箭手何灌申漢人買田尚多比縁打量其人亦不自安首陳已及一千餘頃若招弓箭手即可得五百人若納税租依條毎畝三斗五升草二束一嵗之間亦可以得米三萬五千石草二十萬束今相度欲乞将漢人買置到蕃部土田願為弓箭手者兩頃已上刺一名四頃已上刺兩名如願者依條立定租税輸納其巧為影占者重為禁止從之七年三月詔熈河鄯湟自開拓已来疆土雖廣而地利悉歸屬羌官兵吏禄仰給縣官不可為後計仰本路帥臣相度以錢糧茶綵或以羌人所嗜之物與之貿易田土田土既多即招置弓箭手入耕出戰以固邉圉靖康元年臣僚上言陜西恃弓箭手為國籓籬舊𨽻帥府比年始置提舉司其提舉官務多取数目以為功将舊人已給田分擘招刺新人貪賞欺蔽遂至選練不精法制浸壊乞罷提舉司復𨽻帥司其已分擘弓箭手田土依舊改正撥還招到新人依條别給地庶得均濟從之河北河東陜西義勇慶歴三年選河北河東强壯并抄民丁湼手背為之户三等以上置弩一當税錢二十三等以下官給各營於其州嵗教練給俸廪犯罪㫁比廂軍下番比强壯治平元年詔陜西民除商虢二州餘悉義勇凡主户家三丁選一年二十至五十材勇者充以五百人為指揮置将領詳見兵制門又詔秦隴儀渭涇原邠寧環慶鄜延十二州義勇遇召集防守日給米二升給醤菜錢三百盖慶歴初河北路總十八萬九千二百三十一人河東路總七萬七千七十九人陜西路治平初總十五萬六千八百七十三人熈寧元年樞密使吕公弼請以河北義勇毎指揮揀人材少壮事藝精强者百人為上等手背添刺上等二字從之帝言義勇可使分為四番出戍吕公弼曰須先省得募兵乃可議此王安石曰計毎歳募兵所死亡之数乃以義勇補之可也陳升之欲令義勇以漸戍近州兩府共議或以為令一月一番或以為一季一番且令近戍文彦博等又言難使逺戍安石辯之甚力兵部上陜西河南河東義勇數陜西路二十六郡舊籍十五萬三千四百益以環慶延州保毅弓箭手三千八百總十五萬六千八百為指揮三百二十一河北三十三郡舊籍十八萬九千二百今籍十八萬六千四百為指揮四百三十而河東二十郡自慶歴後總七萬七千為指揮一百五十九凡三路義勇之兵總四十二萬三千五百人三年涇原經略使蔡挺言欲以涇渭儀原四州義勇分五番三千人防秋以八月十五日上十月罷防春以正月十五上三月罷周而復始詔從之行於諸路判延州郭達言陜西起發義勇赴縁邉戰守今後並令自齎一月糗糧折本户稅賦若不能自備則就所發州軍預請一月口食從之知永興軍司馬光極言分義勇四番於沿邉屯守以為挑敵勞人虛費糧餉於是永興一路獨得免六年詔永興軍河中府陜觧同華鄜延丹坊邠寧環耀十五州軍各依元刺義勇外商虢保安軍並止團成保甲八年諸路義勇總二十四萬七千五百人元豐四年蒲宗孟言乞開封府五路義勇並改為保甲自此以次行於諸路義勇寖銷皆聨為保甲云陜西護塞慶歴元年募土人熟山川道路曉蕃情善騎射者湼臂充二百人為指揮自備戎械就鄉閭習武技季一集州閲教無事放營農月給鹽茗有警召集防守即廪給之毋出本路麟州義軍與弓箭手略同而不給田康定元年詔麟州府募歸業人増補俾耕本户故地免其租稅荆湖義軍土丁弩手不見剏置之始北路辰澧二州南路全邵道永四州皆置盖溪峒諸蠻種類滋熾保據巖險或叛或服控制陬落須其土人故置是軍皆選自户籍蠲免徭賦番戍寨柵大率安其土風則罕攖瘴毒知其區落則可制狡獪其校長則有都指揮使副都指揮使指揮使副指揮使都頭副都頭軍頭頭目採斫招安頭目十将節級皆叙功遷補使相綜領施之西南實代王師有禦侮之備而無饋餉之勞其後荆南歸峽鼎郴衡桂陽亦置慶歴二年北路總萬九千四百人南路總五千一百五十八人番戍諸寨或以嵗或以季或以月上番人給口糧有功遷補自都副使指揮使嵗給錦袍月給食錢指揮使副指揮使給紫大綾綿袍都頭以上率有廪給熈寧初籍其数凡一萬五千人六年諸路行保甲司農寺請令全邵二州土丁弩手共為保甲立保正保長以統之元祐七年湖南路鈐轄謝麟請以邵陽武岡新化等縣中等以下户選充土丁弩手與免科役七年一替排補将級不拘替放年分作兩番邉寨防拓不得募人如有私役依私後禁軍敕論從之政和七年募湖北辰沅澧州土丁為刀弩手授以閑山散居邉境教以武藝其𨽻於籍者至九千餘人靖康初全軍調發前徃河東援太原䧟於虜存者僅千五百人建炎二年罷之紹興六年命招募以三千五百人為額淳熈三年敕募人教閲犒賜如禁軍例然刀弩手舊田諸郡已收為省計有司雖募人為之往往無田可給但虚立姓名以應命又土人多憚㸃集甚患苦之李燾張栻力言其不便栻請用見數委提刑躬行㸃檢候有田設官始令招足元額燾復言如此則提舉刀弩一司又當復置而欲冒賞者必至横沒民田為害滋大不若以見㸃数為凖専委守臣寛以歳月令招及從之湖南鄉社舊制領以鄉豪有彈壓緝捕等名大者統数百家小者亦二三百家由潭連道英韶郴桂皆置淳熈七年言者奏鄉社之擾請罷之帥臣辛棄疾言鄉社皆處深山窮谷中忠實狡詐色色有之不可盡罷欲擇其首領使大者不過五十家小者減半屬之縣尉從之夔州路義軍土丁壮丁州縣籍税户充或自溪峒歸投分𨽻邉寨習山川道路遇蠻入冦遣使襲討官軍但據嶮䇿應之其校長之名隨州縣補置月給衣糧犒賜有差有功者以次遷熈寧初詔除防托廵警外敢擅差役及科配和僱並科違制之罪施黔思三州義軍土丁總六千三百六十五人𨽻都廵檢司施州諸寨有義軍指揮使把截将寨并土丁總一千二百八十一人壮丁六百六十九人又有兩路廵防殿侍兼義軍都指揮使指揮使都頭十将押番寨将黔州諸寨有義軍正副指揮使兵馬使都頭寨将把截将并壮丁總千六百二十五人思州洪杜彭水縣有義軍指揮使廵檢将寨糧理旁頭把截部轄壮丁總千四百二十二人渝州懐化軍溱州江津巴縣廵遏将皆州縣調補其户下率有子弟客丁遇有冦警一切責辦主户治平元年詔懐化軍溱州廵遏把截将嵗支料塩襖子須三年其地内無冦警乃支三年一比如有失縱或致獠冦五次即罷給有勞者増之仍使分地戍守涪州義軍舊無之嘉祐中始補賔化縣夷人為義軍正都頭副把截将小節級其請給節制大率如渝溱廣南西路土丁嘉祐七年籍稅户應常役外五丁㸃一為之凡得三萬九千八百人分隊伍行陣習槍鏢牌州縣以時按閲紹興八年廣西經略胡舜陟言数十年来武備弛廢土丁老弱混雜嘗乞只就鄉村教習更不分番入州縣已得朝㫖於諸縣逐鄉置教塲自十一月起教至次年正月罷教輪差縣官檢㸃今以一路人数計之土丁五萬一千八百九十六人保丁七萬六千一百五十九人若帥臣不變易更一二年必為精兵詔依乾道二年詔土丁邕宜雅等州籍定姓名年甲年五十則汰别選户丁替保丁則毎户一名土丁則父兄弟皆在其数後以州縣因教閲之時拘留重役下令禁止廣南東路槍手嘉祐六年廣惠梅潮循五州以户籍置三等以上免身役四等以下免户役嵗以十月集縣教閲治平元年詔有闕即招補招補不足選本鄉有武技者充熈寧元年詔廣州槍手十之三教弓弩手是嵗㑹六郡槍手為指揮四十一總一萬四千七百有竒六年詔户四等以上有丁三者以一為保甲每百人為一都五都為一指揮輪番教閲九年兵部廣東五郡槍手請籍主户弟以上丁壮無過舊額一萬四千之數餘以為保甲奏可邕州溪峒壮丁治平二年廣西安撫司集左右兩江四十五溪峒知州峒将各占隣迭為救應仍籍壮丁補校長給以旗號峒以三十人為一甲置節級五甲置都頭十甲置指揮使五十甲置都指揮使總四萬四千五百人以為定額各置戎械遇有冦警召集之二年一閲察視戎械有老疾并物故名闕選少壮者填三嵗一上其籍熈寧中王安石言募兵未可全罷而民兵可漸復至於二廣尤不可緩今中國募禁軍往戍南方多死陛下誠移軍職所得官十二三鼓舞百姓豪傑使趨為兵則事甚易成於是蘇軾請訓練二廣峒丁以利祿勸奨使勤於閲習從之十年樞密院請邕欽峒丁委經畧司行下訓練第為三等軍功武藝出衆為上蠲其徭役人材趫㨗為中蠲其科配餘為下邉盗發則酋長相報率族衆以捍冦元豐元年經略司請集兩江峒丁為指揮權補将校奏可其後又増置都廵檢使兩員五年詔廣南保申如戎瀘故事自置褁頭無刅槍竹鏢排木弓刀蒿矢習武技遇捕盗則官給器械六年廣西提㸃刑獄彭次雲言邕苦瘴癘請量留兵更戍用峒丁以季月番上給禁軍錢糧詔從之議者謂若以代正兵恐妨農請計戍兵三之一代以峒丁季輪二千赴邕州肄習武事制可大觀二年八月詔熈寧團集左右江峒丁十餘萬衆自廣以西頼以防守今又二十萬衆来歸已令依左右江例相度聞奏及所條法入熈河蘭湟秦鳳路勅施行紹興四年廣東宣諭明槖言邕州有左右江峒丁本防交趾比年㸃差赴桂州防托其峒官及親屬及本戸丁夫未嘗被差科率錢糧擾之無所不至乞行下經略司應峒丁土丁各仰本處防守無得調發詔依河北弓箭社河北舊有之熈寧三年知定州滕甫言中國夷狄之兵常患多寡不敵盖中國兵有定数至於平民則素不使知戰夷狄之俗人人能戰舉國皆兵此其所以多勝也今河北州縣近山谷處民間各有弓箭社及獵射人習慣便利與夷人無異欲乞下本道逐州縣並令募諸色公人及城郭鄉村百姓有武勇願習弓箭者自為之社毎嵗之春長吏就閲試之北人勁悍緩急可用從之元祐八年知定州蘇軾上言欲将河北弓箭社照河東陜西弓箭手例官給田以供車馬事詳見兵制門宣和七年臣僚言京東西兩路昨因提刑梁揚祖奏請勸誘民户充弓箭社原立法之意不過使鄉民自願入社者閲習武備為禦賊之具爾奈何邀功生事之人唯以入社之民衆多為功厚誣朝廷而斂怨於民督責州縣急於星火取五等之籍甲乙而次之家至户到追胥廹脅悉驅之入社更無免者法始行於西路西路既已冒受厚賞於是東路憲司前後論列誕謾滋甚近者東路之奏以数計至二十四萬一千七百人又奏武藝優長一十一萬六千餘人且云比之西路僅多一倍陛下灼知其不然雖命帥臣與亷訪使者覈實彼安肯以實聞乎今東路憲司官屬與登淄兩州當職官坐増秩者幾二十人而縣令佐不及焉不知出入阡陌間勸誘者誰歟此其誕謾可知矣審如所奏有被甲執兵之民數十萬按閲有方則山東之冦何至累月淹時未見殄滅哉則其所奏二十四萬與十一萬殆虚有名不足以捍賊明矣大抵因縁追擾民不堪其勞則老弱轉徙道路强壮起為盗賊此亦致寇之一端也近者仰賴陛下遣将出師授以方略又命近臣持詔撫諭至於發内庫之藏轉淮甸之粟以賑給之寛免其税租蕩宥其罪戾丁寧纎悉㒺不曲盡方将歸伏田畝以為遷善逺罪之民詎可以其所甚病擾之邪且私家有兵器在律之禁甚嚴三路保伍之法雖於農隙以講武事然猶事畢則兵器藏於官府今弓箭社一切兵器民皆自藏於家不幾於借冦也哉望陛下㫁自聖心罷京東弓箭社之名所藏兵器悉送之官使民得免非時追呼廹脅之擾以安其生應兩路緣弓箭社推恩者並追奪改正首議之人重賜黜責後来奏請誕謾亦乞特賜施行庶幾羣下悚懼不敢妄進曲説以肆其姦實今日之先務也詔並依奏梁揚祖落職其禁兵器令安撫司並拘入官弓箭社人依已降指揮放散建炎元年六月河北京東廵社鄉民結集以禦金人詔以忠義廵社為名𨽻安撫司後樞密院立法募鄉民為之以忠義强壮為名每十人為一甲設甲長隊長部長社長都正於鄉井便處劄寨以時按試不得非時追擾川陜土丁熈寜七年經制瀘江夷事熊本募土丁五千人入夷界捕戮水路大小四十六村蕩平其地二百四十里募民墾耕聨其屬夷以為保甲政和六年瀘南安撫使孫羲叟奏邉民冒法買夷人田依法盡拘入官招置土丁子弟見招到二千四百餘人欲令番上從之福建路槍仗手元豐元年福建轉運使蹇周輔廖恩為盗以槍仗手捕殺乃有冒為槍仗手之人乗賊勢驚擾村落患甚於恩詔犯者刺配仍額定槍仗手人数以嵗閲集依保甲法𨽻提刑司有保長保正具教閲捕盗食直等令總一萬二百人有竒聼自置兵械寄於官遇捕盗乃給元祐元年御史上官均言槍仗手老弱不閑武技者十七八監司按試多克期呼集既至往往代名充数冒賞徒有呼集之勞而無校試之實如未欲罷乞重行考覈靖康元年臣僚言天下歩兵之精無如福建槍仗手出入輕㨗馭得其術一可當十乞選官前去召募從之建炎三年六月詔令福建初募槍仗手五十人專一備東西捕盗毎百人差部轄一名有功先次借補進武校尉紹興五年福建帥司乞将福建繫籍槍仗手並行蠲放從之江西槍仗手熈寧七年詔籍䖍汀漳三州鄉丁槍手以制置盗賊司言三州壤界嶺外民喜販塩且為盗非土人不能制故也元豐二年詔䖍州槍仗手五百三十六人撫州建昌軍鄉丁開軍槍仗手各千七百七十八人為定額毎嵗農隙按閲武藝以備姦盗七年兵部言江西槍仗手以八千三十五人為額河東陜西勇敢効用亦募兵也涇原路經略使蔡挺言涇原勇敢三百四十四人季一㸃閲校其騎射能否陞除補有功者以為隊長募極邉塞博軍子嘗歴戰陣者補其闕益募熟户蕃部以為蕃勇敢凡一千三百八十八人騎一千一百九十四匹詔諸路如挺請施行之六年樞密院言勇敢効用皆以材武應募從軍廪賜既優戰馬戎械之具皆出公上平時又得以家居以勞効賞者凡四補而至借職校弓箭手減十資淹速相逺甚非朝廷第功均賞之意請自今河東鄜延秦鳳環慶熈河路各以三百涇原路五百為額第一等步射弓一石一斗馬射弓九斗俸千錢第二等以下遞減一斗俸七百至五百季首閲試於經畧司射親及野戰中者有賞全不中者削其俸次季又不中者罷之戰有功者以八等定賞一給公據二以為隊長三守闗中将四軍将五殿侍六三班借差七差使八借職其弓箭手有功亦以八等定賞一押官丞局二将虞将十将三副兵馬使軍使四副指揮使五都虞候六都指揮使七三班差使八借職即以闕排連者次遷如今詔可仍頒之諸路蕃兵者塞下内屬諸部落團結以為籓籬之兵也西北邉羌戎種落不相統一保寨者謂之熟户餘謂之生户陜西則秦鳳涇原環慶鄜延河東則石隰鄜府其大首領為都軍主司帳已上者為軍主其次為副軍主又有以功次補者其官職俸給有差康定二年陜西體量安撫使王堯臣言涇原路熟户萬四百七十餘帳帳之首領各有職名曹瑋帥本路威令明著常用之平西羌其後邉備稍懈守将惟務姑息寖成驕黠自元昊反戎軍及渭州山外皆被侵擾近界熟户亦遭殺虜蕃族之情最重酬賽因此釁隙激怒之可復得其用請遣人募首領願効用者籍姓名并士馬之数及千人聼自推有謀勇者一人授以班行及廵檢之名使将領出境破蕩生户所獲財畜官勿檢覈得首級及傷者給以賞物仍依本族職名補遷及増俸錢詔如所請慶歴二年知青澗城种世衡奏募蕃兵五千湼右虎口為忠勇字𨽻折馬山族上封者因請募屬户給禁廪賜使戍邉悉罷正兵下其章四路安撫使議環慶路范仲淹上言熟户戀土田䕶老弱牛羊遇賊力鬬可以藩蔽漢户而不可倚為正兵大率蕃情黠詐畏强凌弱常有以制之則服從可用如去正兵必至驕蹇又令蕃部都虞候至副兵馬使俸錢止七百至三百悉無衣廪若長行遽得禁軍奉給則蕃官必生徼望况嵗罕見敵何用長與廪給且錢入熟户部族資市羊馬青塩轉入河西亦非䇿也以臣所見不若遇有警旋以金帛募勇猛禦賊為便議遂格治平二年詔陜西四路駐泊兵馬鈴轄梁實等各管勾本路蕃部團結强人壮馬預為經畫冦至則令老弱各有保存之所仍諭實等往来族帳受其牒訴伸其屈抑察其反側者覊縻之勿令猜阻以萌邉釁實等至蕃部召酋領稱詔犒勞賞以銀帛城寨兵馬計族望大小分隊伍給旗幟使合繕堡壘人置器甲以備調發仍約不如令下不集押隊首領以軍法從事秦鳳路寨十三强人四萬一千一百九十四壮馬七千九百九十一鄜延路軍城堡寨十蕃兵一萬四千五百九十五官馬二千三百八十二强人六千五百四十八壮馬八百十涇原路鎮寨城堡二十一强人一萬二千四百六十六壮馬四千五百八十六為百十甲總五百五隊環慶路鎮寨二十八强人三萬一千七百二十三壮馬三千四百九十五總一千一百八十二隊治平四年郭達言秦州青鷄川蕃部願獻地請於川南牟谷口置城堡寨募弓箭手以通秦州徳順二州之援㫁賊入冦之路閏三月收原州九寨番官三百八十一人總二百二十九族七千七百三十六帳蕃兵萬人馬千匹是嵗罷四路内臣主蕃部者選逐路陞朝使臣諳練蕃情者為之熈寜元年議者謂熟羌乃唐設三使所統之党項也自遷賊不臣種落叛散分寓南北為首領者父死子繼兄死弟襲家無正親則又推其旁屬之强者以為族首多或数百雖族首年㓜第其本門中婦女之令亦皆信服故國家因其族以為法其大首領上自刺史下至殿侍並補本族廵檢次首領補軍主指揮使下至十将第受廪給嵗久客族帳混淆莫紀康定中嘗遣将偕籍之今踰三十年主家或以累降失其先職族首名品而客户或以功使臣軍班超處主家之上軍興調發有司惟視職名使號令其部曲而衆心以非主家莫肯為用請自今蕃官身殁秩髙者子孫如例降等以為本族廵檢其旁邉能捍賊者給俸逺邉者如舊制限以嵗月其已降等或三班差使殿侍身歿無等可降者其子孫不降充軍主指揮使者即以為殿侍如此則本族蕃官名品常在或其部曲立功當任官者非正親毋得為本族廵檢止増其俸其軍主至十将祖父有族帳兵騎者子孫即承其舊限年受廪給極邉及立功者不用此令如此則熟羌之心皆知異日子孫不失舊職世為我用矣從之五年王韶初納沿邉蕃部自洮河武勝軍以西至蘭州馬御山洮岷巖疊等州凡補蕃官首領九百三十二人首領給飱錢蕃官給俸者四百七十三人月計費錢四百八十餘緡得正兵三萬族帳数千時詔拓熈河地千二百里招附三十餘萬之衆漸推之法變其夷族然韶所募勇敢士九百餘人耕田百頃坊三十餘所部蕃既得為漢而其俗又賤土貴貨漢人得以貨與蕃部易田蕃人得貨兩得所欲而田疇墾貨殖通番漢為一其勢易以調御請如諸路以錢借助收息又捐百餘萬緡養馬於番部且什伍其人奨勸以武藝使其人民富足士馬强盛奮而使之則所向可有功番部初附如洪荒之人唯我所御而已七年韶言討平河州叛蕃闢土甚廣已置弓箭手又以其餘地募番兵弓箭手毎寨三指揮或至五指揮毎指揮二百五十人人給田百畝以次蕃官二百畝大蕃官三百畝仍募漢弓箭手為隊長稍衆則補将校暨蕃官同主部族之事其蕃弓箭手並刺蕃兵字於左耳以防漢兵之盗殺而效首者詔如其請八年五月詔季承之參定蕃兵法十一月詔選陜西蕃兵丁壮户九丁以上取五六取四五取三三取二二取一並年二十以上湼手背毋過五丁毎十人置十将一五十人置副兵馬使一百人置軍使一副兵馬使一二百人置軍使一副兵馬使三三百人置副指揮使一軍使二副兵馬使三四百人加軍使一副兵馬使一五百人又加指揮使一副兵馬使一過五百人毎百人加軍使一副兵馬使一即一族三十人以上亦置副兵馬使一不及二十人止置十将月受俸仍増給錢指揮使二千五百至十将有差熈河等路制置使李憲言漢蕃兵騎雜為一軍語言不通居處飲食悉不便利昔李靖以蕃落自為一法請釐蕃漢為兩軍相參號令軍事從之元祐元年臣僚言舊制諸路蕃官不問官職髙卑例在漢官之下所以尊中國制夷狄也行之既久今忽更制蕃漢官非相統轄者並依官序相壓即邉上使臣及京職官當蕃官之下者十有八九非人情所堪且夷狄兇驕豈可輒啟宜悉依舊制並列漢臣之下從之神宗熈寧二年詔諸揀不任禁軍者降充廂軍不任廂軍者免為民詳見兵制門七年分天下兵為九十二将各總其兵詳見兵制門樞密院言京城役兵不足嵗取於諸路而江淮兵毎饑凍道斃相屬略計嵗所用外軍七千人調發増給不貲請募東西八作司壮役指揮諸司雜犯罪人情輕者並配𨽻以次補雜役効役代諸路役兵從之又言諸路廂軍名額猥多自騎射至牢城其名凡二百二十三其間因事募人團立新額或因工作榷酤水陸運送通道山險橋梁郵傳馬牧堤防堰埭若此者事在而名未可廢及剰員直牢城皆得有犯配𨽻之人壮城專治城隍不給他役别為一軍而教閲廂軍亦自為額請以諸路不教閲廂軍併為一額餘從省廢其移併如禁軍法奏可遂下諸路轉運司以州大小髙下為序始自某州為第一指揮差次至某州凡為若干指揮毎指揮毋過五百人自五代無政凡國之役皆調於民民以勞敝宋有天下悉役廂軍凡役作工徒營繕民無與焉故天下民力全固至今遵之元豐四年詔陞南京青鄧鄆曹齊濮州有馬教閲廂軍及真定北寨勁勇環州下蕃落未排定指揮並為禁軍河北路騎軍之額自騎射而下十有一歩軍之額自奉化而下二十有六並改號曰崇勝凡為一百一十二指揮總二萬九千二百七十人河東路騎軍之額自威邉而下二歩軍之額自左衙而下十有八並改號曰雄猛凡為五十二指揮總一萬二千四百一十人陜西路騎軍之額自騎射而下有六歩軍之額自左衙而下二十有九並改號曰保寧凡為一百一十一指揮總二萬五百六十二人京東路騎軍之額自騎射而下有三歩軍之額自左衙而下十有七並改號曰奉化凡為五十四指揮總一萬四千七百五十人京西路騎軍之額自騎射而下六歩軍之額自奉化而下二十有五並改號曰勁武凡為四十五指揮總一萬五千一百五十人淮南路騎軍之額自威邉而下六歩軍之額自左衙而下二十有七並改號曰寧淮凡為一百二指揮總四萬一千二百八十五人兩浙路歩軍之額自捍江而下三並改號曰崇節凡為五十一指揮總一萬九千人江南路騎軍之額揀中騎射一歩軍之額自効勇而下五並改號曰効勇凡為五十三指揮總一萬六千六百五十人荆湖路騎軍之額自騎射而下三歩軍之額自左衙而下二十並改號曰宣節凡為四十四指揮總一萬一千三百人福建路歩軍之額自水軍而下三並號曰保節凡為三十三指揮總一萬一千一百五十人廣南路騎軍之額自静山而下二歩軍之額自水軍而下十並改號曰清化凡為八十二指揮總一萬二千七百人四川路歩軍之額自開逺而下十並改號曰克寧凡為一百一十一指揮總二萬三千四百人元符元年九月詔罪人應配五百里以上皆配陜西河東充廂軍曾布白帝曰此漢徙罪人以實邉之遺法也政和四年中衞大夫童師敏奏竊見東南州郡例闕廂軍凡有役使並是逐急和僱於理未便欲望指揮諸郡守臣并提刑司措置招填数足庶免逐急僱人之費從之髙宗紹興二年詔戍兵於本州知通依階級法言者請令後統兵官經由州縣如屯駐法從之中興後熈寧所置将兵在東南者纔十三将淮南東路第一淮西路第二兩浙西路第三浙東路第四江南東路第五江西路第六荆湖北路第七湖南路第八而全郡永三州凖備廣西應援第九福建路第十廣南東路第十一廣西路桂州第十二邕州第十三慶元令諸廂軍𨽻尚書兵部因事立名者隨事所屬如清務𨽻户部壮城作院錢監𨽻工部河清橋道廣濟𨽻水部青石塲採造務司竹監𨽻虞部之類建炎以来朝野雜記四川廂軍二萬九百七十二人禁軍二萬七千九百九十二人土兵一千八百三十六人已上係官軍義士二萬六百五十二人興元府興洋州大安軍保勝金忠勝文忠勇軍階成西和鳯弓箭手西和階良家子共六千三百九十九人已上係民兵保甲五萬五千一百七十人關外四州凡民兵優恤之制義志忠勝軍免家業錢百五十千至二百千止一家䨇名則更免五十千忠勇軍則階州免家業錢馬軍二百三十千歩軍一百七十千成州免稅賦馬軍二頃半歩軍二頃西和鳳州皆免租馬軍六石九斗八升歩軍五石三斗六升其更戍則月給糧人七斗有半惟忠勇軍更戍保勝軍亦免家業自五千至二十千止弓箭手則給官田馬軍二頃半歩軍二頃此其大較也大率西蜀大軍廂禁軍民兵保甲總二十三萬三百六十四人仰給縣官者十四萬餘人而民兵保甲不仰給者八萬餘人此乾道之籍也淳熈以後土丁亦有仰給者别出於後成都禁軍謂之飛山軍驕懦最甚紹興末王時亨為制帥取㑹四川禁軍之籍二萬九千餘人除利䕫兩路禁軍分戍沿邉城寨外東西路一萬九千人内揀到五千五百七十三人謂之盛强将兵時吳璘兵少遂調四十人往仙人關守禦三十二年秋也事平復罷土豪建炎四年臣僚言朝廷近起鄉兵防江召募土豪乞責守臣止使各保鄉井詔依仍詔各聼夲州縣守令節制将来防托無虞當議推恩紹興四年十一月密院言浙西沿江見在土豪民兵無補事功詔存留强壮餘並放散八字軍河北土人也建炎初王彦為河北制置使聚兵大行山皆湼其面曰誓殺金人不負趙王故號八字軍二年上命范瓊往山東擊敵瓊請彦與俱已而彦以疾留真州瓊并将其兵瓊誅復以兵還彦時彦為御營都統制既而彦以八字軍隨張浚宣撫川陜六年彦召為行營前䕶副軍都統制以所部八字軍萬人赴行在與馬帥觧潛不叶兩軍交鬬中外洶洶詔兩罷之以劉錡領司馬軍事并王觧兩軍屬之十年錡為東京副留守将八字軍以行至順昌㑹金人烏珠入侵錡大敗其師十一年復還姑孰七月錡罷為荆南帥其衆復還臨安府今侍衞馬軍皆其子孫也義兵紹興十年密院言沿淮制使劉錡申陳蔡兩州團結鄉兵保聚委是忠義今以朱昌臧成充義兵将領團集詔依三十一年淮南官荘秉義郎陳順忠訓郎車定方紏集義兵九百人自備器械不支官俸可以守禦詔各轉官資乾道四年参政陳俊卿言兩淮民兵乞令諸州以户口多寡三丁取强壮一名籍為義兵於農隙授之弓弩教之戰陣給以錢糧詔依䕫路義兵紹興末帥臣李師顔於䕫州三縣保甲中選置立七資職以分上下邑軍名團結初議摘禁軍時梁山守臣言䕫環萬山民勇過於正軍乃募鄉兵元額三千四百餘人師顔既去軍無紀律大抵䕫路恭涪忠萬四州皆有義軍額或數千而施黔有勇敢及思珍田楊等家丁悉驍勇皆鄉兵云義士紹興元年興元府帥王庶以富平兵敗後籍興元諸縣良家子弟兩丁取一與免下户物力錢二百千毎二十人為一隊號曰義士以縣令為軍正尉副之守臣提舉不半年有兵数萬教閲有方則令尉改秩張浚言於朝其後合梁洋大安三郡至萬三千人軍勢遂張三十一年戰於大散闗驅在軍前為敵人所敗僅存六千人乾道元年悉罷之除籍放散其衆三年四川宣撫虞允文言興洋大安軍見管義士二萬六千一百四十人訓練有功成効乞移皇甫倜於興元軍專一教閲從之民兵建炎三年御營参議官栁約奉聖㫖沿江地分須是民兵毎五十人為一隊有長副以田括丁一户抽一丁五丁抽二丁官户不免輕重不等科擾太重乞量立刑賞委官檢視如有老弱則令舉劾詔依六年詔立兩淮民兵賞格淳熈十四年九月令湖北京西措置民兵三丁取一弓箭手建炎元年赦應諸路蕃漢弓箭手合該承襲人因差使出入事故陳乞違限限百日自陳承襲紹興九年京城副留守郭仲荀乞将京城外閑地依陜西沿邉例招弓箭手種蒔詔依十年詔據見田招刺不拘舊額黎雅州土丁集沿邉農人火甲户為之盖唐雄邉子弟之遺法舊無行陣軍伍但以甲頭總之祖宗以来弛酒禁免征役凡優恤之者無所不用其至黎州自乾道七年邉釁之後始置寨将押隊旗頭之類略寓軍制毎歳農隙時官給口食教之武事舊制凡千人淳熈三年禄粹父直閣為守請倍其数又以等級籍其少壮者月給以錢九年春言者乞下黎州别立優恤土丁之目守臣龔總始奏以五十二人為一隊毎邉二十隊計千四十人三邉共三千一百二十人置教塲四十九所是時三邉土丁之籍實為五千一百二十六人而東南邉防托卭部川一千七百八十七西南邉防托吐蕃青羌等族一千二百九十一正西邉防托五部落一千九百四十八凡上等一千五百九十九人嵗費錢二萬八千三百七十有六緡毎人月給一千遇閏年嵗總計四萬一千五百七十四緡而戍兵不與議者謂土丁粗有軍律統紀且熟知夷人情偽地形險阻其實可用為鄉導守邉鎮言者乃乞将黎雅二州依利路義士法措置留丞相為制置使遣屬官馮傳之往二州共議各州選二千人上等六百為㸃集之丁月給錢三千五百次等千四百為居守之丁月給錢千兩郡嵗費錢共八萬七千六百緡而教閲之費不與焉時淳熈十年矣嘉定土丁者惟峨眉犍為二縣有焉自熈豐以来峨眉八寨千四百八十人犍為五寨之籍二百七十五官既無以給之而又多為寨官所尅剥紹興十三年有言於都鈐轄司者謂宜教試而優恤之時方諱兵迄不能用也威茂州亦有土丁各州二百威州之丁月給米三斗驍㨗可用夷人亦畏之茂州之丁半市人無月給半有為夷人傭耕者盖二郡皆斗入夷腹中無省地茂州毎合教則土丁悉從夷人假衣甲器械以為用事已復歸殊為文具把截将紹興二十七年䕫路安撫使奏南平軍夷透漏入恭州舊以土丁為把截詔帥臣相度請以清溪寨主户逐名家業錢多少均定合置土丁二百名内選材勇為把截将依例支破請受從之保勝紹興六年密院言金均房三州保甲後稱保勝三州安撫柴武措置結為隊伍分成五軍詔依二十九年開蓬州安撫王彦申保勝三千屢立戰功錢糧不足乞依正軍破支口劵從之勇敢紹興二年知池州葉煥申招土人充守禦勇敢乞依禁軍請給以二千人為額從之山水寨紹興四年承楚泰三州各有水寨民兵合力擊賊詔免十年租税三十一年中丞汪澈乞存恤淮南山水寨鄉豪各收其用隆興元年臣僚言乞行下都督府專委兩淮守臣各括責山水寨首領姓名保明来上量補官資專一裒集鄉兵俾之團結明立賞格一有緩急入城守禦荆襄邉郡亦乞行下制置司依此施行詔江淮都督府湖北京西制置司措置二年十二月十日徳音赦楚滁濠廬光州盱眙光化軍管内并揚成西和㐮陽徳安府信陽髙郵軍應州縣山水寨首領自備錢糧紏集把隘或戰鬬立功仰逐州軍守臣保明申省取㫖推恩乾道五年九月辛酉兩淮徐子寅言得㫖将夲路諸州山水寨民兵應三丁以上選壮丁赴州教一月從之淳熈初子寅上其数弓一萬六千九百八十人弩手凡一千四百二十五明年秋提舉張宗允與子寅分路提督宗允奏毎郡以土豪見任官一員統轄月增給人三十千自十月下旬始州帥司教二月淮東五郡用錢十六萬米三萬石淮西倣此惟光黄濠楚安豐盱眙七郡但就夲州教閲犒設錢減半萬弩手紹興元年沅州奏熈寧末始剏營田鼎澧辰沅靖置弓弩四千人靖康調發不存乞以閑田募民承佃招弓弩手二千人從之八年詔淮東西湖北京西沿江民兵萬弩手農隙教閲有武藝超越人材智勇可以服衆者本司拍試其名申省以慿覆試推恩淳熈二年淮南運判張士元言廬舒和蘄州無為軍五州民兵萬弩手教閲兩月合用錢十六萬一千餘貫乞行科降從之壮丁民社乾道四年知楚州劉舜謨言兩淮舊有壮丁民社乞依陜西弓箭手法並免户下苗田兩頃從之良家子紹興四年宣撫吳玠始創興元府良家子招兩淮闗陜流寓及陣亡主兵将子弟驍武不能存立者充月給比强弓手五十人為一隊休兵之後数月消減乾道六年本路帥臣復招募人材及五尺二寸弓力及九斗通者将傳習将條法練習弓馬者充有官人省司月給米麥各一石帥司緡錢十五千無官人緡錢減三之一依義士法𨽻帥司御前統兵官不得與及王剛中為宣撫抽帳前良家子還宣撫司淳熈之初宣撫司廢後屬帥司籍二百人嵗管錢二萬四千米管四千八百石實無所用但充雜役紹興五年二月庚子楊嗣勲申嚴塩計奏夲府自有義士廂禁軍良家子無所損益請罷塩店六所而以良家子𨽻都統司義勇紹興中鄂州七縣主家户六萬六千三十二口三十一萬四千八百九十四而民兵之籍總為萬五千二百有一人岳州義勇之籍四千四百九十九人四邑保伍九百三十五甲計二萬八千五百九十三人大抵荆鄂岳三郡率五家供一兵焉三十一年北兵逼江詔淮漢等郡籍民為兵時荆南守續觱乃請籍民為義勇其法取於主户之䨇丁毎十户為甲五甲為團甲皆有長擇邑豪為總首嵗於農隙教以武藝糧從官給初乾道間舉荆南七州之籍主客佃戸凡四萬二千餘户計十萬餘丁除當差役人外得義勇八千四百十九人四年荆湖安撫王炎言荆湖義勇團結教集使之自備食用必不能辦乞截留夲所苗米萬四千石并漕司應副錢二萬緡仍從都統司假甲三千弓矢旗幟官為造給㫖從之六年二月辛亥帥司劉珙言荆南湖北兩路民兵訪問諸郡起籍民兵有上三等户取義勇一人亦有四等五等户取一家産多者可以枝梧少者往往棄産逃走乞充義勇者並免科役及身丁口四等户仍差充保正長五等户又免三分税役毎七十五人為一隊遇教閲日以營屯田之榖供其費奏可仍以甲萬副與之是年九月權知荆門馮忠嘉奏夲軍所教義勇三千五百四十八人教閲各一月乞添展教之三月詔令劉珙相度申省七年正月馮忠嘉又教閲本軍義勇因舊籍増補三百人又籍户馬得四百匹分為六隊孝宗大喜詔總領所嵗以馬料千石給之仍擢忠嘉直秘閣淳熈初張栻為帥遵修劉珙之法義勇増多至萬五百人分為五軍軍分五部栻既去教法浸弛十一年冬趙雄為帥舉行其政増三百人通舊為萬三千八百人大抵湖北諸郡皆有義勇信陽有義勇又有義士惟澧州石門慈利不置籍紹興末守臣亦籍之章頴帥湖北時又乞義勇之應差保正者以家業錢多寡為限限外之数與官户編户輪差從之忠勇淳熈五年四川制使胡元質言闗外西和階成鳳四州所聚民兵謂之忠勇皆以土兵為之向來虞允文團結四川忠勇軍計二千九十四人其後不能増募乞令四川守臣添募仍立賞格詔毎州各先募五百人鎮淮初淮南運司招募邉民號鎮淮軍多至十萬錢米月給視効用惟不黥湼乆之廪給不足公肆刼掠嘉定初江淮制置邱崈恐其生變乃以分𨽻諸州聼守臣節制續又奏淮東人数少令帥漕選汰歸農外僅存八十餘人其半以充効用又補鎮江大軍與武鋒軍闕額淮西六萬餘人委官揀到二萬六千餘人充御前定武軍額分為六軍各置統制自是月省錢二十八萬緡米三萬四千石而定武亦成軍伍淮西賴其力居多忠義民兵紹興二十八年福州帥臣沈調言諸縣舊有忠義社隨鄉多寡屯結推豪右衆畏服者為長别量置槍仗器甲盗由是息民賴之後官司科率騷擾遂失夲意令守臣覺察憲司舉職㫖從其請開禧用兵淮㐮忠義民兵有籍於官者甚衆嵗約用百六十緡以養一兵及和議再成始汰遣時帥臣邱崈先已汰鎮淮軍五六萬何澹繼為制帥始盡放遣澹言夲司近放散廬濠州忠義二萬五百八十六人各令歸業雖費錢三十二萬七千餘緡米六千餘石而毎嵗却省錢二百十三萬米十一萬三千石有田之人預於江南經營牛種無田之人多入城市開張店業此乃夲司幹官徐剪體國任事之力詔剪特遷一官時二年四月戊子也其年六月辛邜京湖制置李大性言昨者大臣創招軍額團結忠義休兵之後依舊支請糜費廪給已放散計二萬九千二百一十三人詔奨諭繼而江淮盗起言者謂皆前日放散之卒請罷剪攝郡追所遷官㫖從之時揀汰民兵無歸多散為盗大性乃命毎郡擇豪首一人授以官兵使之彈壓其後餘黨始皆帖然文獻通考卷一百五十六
