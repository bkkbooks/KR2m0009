人以爾朱榮黨積功至平原郡公後為元顥所殺賀悦代人道武母黨其先世為君長以從平中原功封鉅野侯子泥嗣進爵為瑯琊公醜建杜超魏郡鄴人宻皇后兄初封陽平公後進爵為王子鳯皇嗣遺超弟封廣平王子元寶嗣閭毗代人文成母恭皇后兄初封河東公後與弟紇並進爵為王自餘子弟賜爵為王者二人公五人侯六人子三人馮熙長樂信都人文眀太后之兄初封肥如侯後進爵昌黎王子誕嗣例降為侯穆李恵中山人思皇后之父初襲父爵南郡公後進爵為王後坐事誅髙肇渤海蓚人文昭皇后之兄封平原郡公後坐罪誅胡國珍安定臨涇人靈太后父封安定郡公子祥嗣梁越新興人魏初為禮經博士眀元時以師傅恩封祝阿侯盧醜昌黎徒河人太武時以師傅恩封濟隂公張偉太原中都人太武時與髙允等俱徴後封建安公李業興上黨長子人孝武登極時以預行禮事封屯留縣子乞伏保髙車部人獻文時襲爵寧國侯段進不知何許人太武時蠕蠕入塞被擒罵賊死贈顯美侯郭琰京槃人孝武時封新豐縣公西遷封馮翊郡公乙速孤佛保北秀容胡酋孝武時從入關封蒲子縣公李崇渤海蓚人孝武時以歸關中功封廣宗縣公敞竇瑗遼西人以從平葛榮功封容城縣伯李洪之恒農人太武時封安陽男後進爵任城侯劉靈助燕郡人爾朱榮入京師以卜筮封長子縣公周澹京兆鄠人眀元時以善醫封成徳侯王顯陽平樂平人宣武時以營療功封衛國縣伯王叡太原晉陽人文明太后臨朝時以恩倖封太原公後進爵中山王子襲嗣後降為公王仲興趙郡人宣武時以恩倖封上黨郡公侯剛河南洛陽人明帝時以恩倖積封至武陽縣公宗愛不知何許人太武時以恩倖封秦郡公後坐弑逆誅仇洛齊中山人本宦者太武時封零陵公子儼嗣王琚髙平人亦宦者孝文時積封至髙平王趙黙夲凉州隸户為閹人封至河内公後進爵為王孫小咸陽石安人以閹封至中都侯後進爵彭城公張祐安定石塘人以閹入宫孝文時至新平王後降為公李堅髙陽易人文成時以閹入宫封魏昌伯劉騰原城人以閹入宫靈太后時封長樂縣公楊範閹人封華隂子成軌閹人封始平縣伯王温閹人封欒城縣侯孟鸞閹人封元城縣侯已上並靈太后臨朝時右元魏時封爵所及者尤衆盖自道武興於代北以來凡部落之大人與鄰境之降附者皆封以五等之爵令其世襲或賜以王封逮中世以後則不緣有功而封者愈多程駿𫝊載獻文崩初遷神主於太廟有司奏舊事廟中執事官例皆賜爵今宜依舊詔百寮詳議羣臣咸以為宜依舊事駿獨以為不可表曰臣聞名器為帝王所貴山河為區夏之重是以漢祖有約非功不侯未聞預事於宗廟而獲賞於疆土雖復帝王制作弗相沿襲然一時恩澤豈足為長世之軌乎書奏從之可見當時封爵之濫然髙允在太武時以平凉州勲封汶陽子至文成時史言其為郎二十七年不徙官時百官無禄允第唯草屋衣唯縕袍食唯鹽菜恒使諸子採樵自給則其時雖有受封之名而未嘗與之食邑人道武以來有受封為建業公丹陽侯㑹稽侯蒼梧伯之類此皆江南土地未嘗為魏所有可見當時五等之爵多為虚封前史雖言魏制侯伯四分食一子男五分食一然若真食五分之一則不至如髙允之貧乏且受封丹陽㑹稽等處者雖五分之一亦於何而取之乎文獻通考卷二百七十三
