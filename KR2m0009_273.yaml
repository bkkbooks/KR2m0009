body:
  text: 文獻通考卷二百七十三鄱陽馬端臨貴與著封建考十四後魏諸侯王列侯後魏道武皇始元年始封五等至天賜元年減五等之爵始分為四曰王公侯子除伯男之號皇子及異姓元功上勲者封王皇族及始藩王皆降為公諸公降為侯子亦此為差於是封王者七十人公者二十二人侯者七十九人子者百有三人王封大郡公封小郡侯封大縣子封小縣其後復加伯男焉孝文太和十八年詔凡王公侯伯子男開國食邑者王食半公三分食一侯伯四分食一子男五分食一舊制諸鎮將刺史假五等爵及有所貢獻而得假爵者皆得世襲延興二年詔革此類不得世襲又舊制諸以勲賜官爵者子孫世襲軍號後改降五等始革之止襲爵而已凡公主皆嫁於賔附之國朝臣子弟雖名族美彦不得尚焉後魏道武帝因見漢書婁敬説髙帝欲以魯元公主妻匈奴良久故立此制又江陽王女卒靈太后詔贈鄉主諸王侯亦各有師友文學侍郎掾屬舎人等官時王國舎人應取八族及清修之門咸陽王禧乃取任城王隸户為之深為孝文所責公主有家令丞髙平公主薨欲使公主家令居廬制服太常博士常景曰婦人無專國之理婦人為君男子為臣古禮所不載則家令不得純臣公主不得為正君明矣乃寢後魏宗室王公上谷公紇羅神元皇帝曾孫道武即位以援立功封卒子題後進爵為王悉降爵為公建徳公嬰文真定侯陸並神元後仕太武獲封爵武陵侯因章帝後從道武平中原封後改封長樂王夀章帝後文成即位有援立功封後坐罪誅望都公頹昭帝後隨道武平中原封曲陽侯素延順陽公郁宜都王目辰並桓帝後事道武文成以功封後並坐事死國除吉陽男比干江夏公吕並道武族弟以軍功封髙凉王孤平文皇帝第四子昭成即位以推戴功分國半部封孤道武時追封髙凉王諡神武子斤搆逆死真樂以孤孫襲封禮那紇大曹孝文時例降封太原郡公洪威為髙歡所殺陵禮弟太武賜爵襄邑子瓌鷙大器度孤孫道武初賜爵松滋侯乙斤平萇子華樂城侯興都烈帝之裔文成時賜爵提丕興都次子以告乙渾反功封東陽公孝文時進封王後以非道武子孫例降爵為公坐罪廢雋邕俱丕子以功封新安及涇陽縣男河間公齊元帝元孫太武時以征伐功封諡敬子陵蘭陵弟襲爵志扶風公處真烈帝之後位殿中尚書賜爵後坐事誅文安公泥魏之疎族道武厚遇之賜爵子屈後坐事誅磨渾以勲拜長沙公秦王翰昭成皇帝子征伐有功道武即位追贈諡明子儀以從征伐功封王後以罪賜死纂良以弟襲封禎瑞烈儀弟以功封隂平王諡熹求觚烈弟奉使慕容垂遇害追封秦王䕫常山王遵昭成皇帝孫道武時以佐命及征伐功封後坐罪賜死子素嗣可悉陵陪斤懋遵之後孝武時以從駕入關封北平王順懋弟亦以從入關封濮陽王偉順子封南安郡王毗亦遵之後孝武時以定䇿入關封魏郡王陳留王䖍昭成孫以戰功封後沒於陣諡桓子悦嗣崇以弟襲建降爵為公毗陵王順昭成孫以功封後坐罪廢遼西公意烈昭成孫以戰功封後坐罪賜死子㧞干受洛粟太武時以功進封為王清河王紹道武皇帝子天興時封後行弑逆伏誅平陽王熙道武子天興時封子佗嗣顯世遵河南王曜道武子天興時封子提嗣平原和鑒顯河間王修道武子天賜時封羯兒有罪國除長樂王處文道武子天賜時封無子國除廣平王連道武子天賜時封渾飛纂京兆王黎道武子天賜時封子吐根嗣繼樂平王丕眀元皇帝子泰常七年封子㧞嗣坐罪賜死國除安定王彌眀元子泰常時封無子國除樂安王範眀元子泰常時封子良嗣永昌王健明元子泰常時封子仁嗣坐罪死國除建寧王崇眀元子泰常時封後坐罪死新興王俊明元子泰常時封坐罪賜死晉王伏羅太武皇帝子真君三年封無子國除東平王翰太武子真君時封子道符嗣坐謀反誅臨淮王譚太武子真君時封子提嗣昌彧孝友齊受禪國除廣陽王建太武子真君時封子石嗣遺興嘉深湛法輪南安王余太武子真君時封太武暴崩宗愛矯詔立余復為愛所弑陽平王新成景穆皇帝子太安三年封子頤嗣宗允坐罪死國除衍頤弟封廣陵侯子暢從孝武入關封博陵王欽衍弟封鉅平縣公子子孝從入關封義陽王贇融暢弟從入關封魏興王京兆王子推景穆子太安時封子太興嗣子昴悰仲景退冲濟隂王小新成景穆子和平時封子鬰嗣暉業汝隂王天賜景穆子和平時封後坐罪廢死樂良王萬夀景穆子和平時封子樂平嗣長命忠廣平王洛侯景穆子和平時封匡獻祖育勤任城王雲景穆子和平時封子澄嗣彜順彜兄封東阿縣公紀順弟從孝武入關封華山郡王南安王禎景穆子皇興時封後坐罪奪爵子英改封中山王熙略熙弟封義陽王怡英弟封魯郡王城陽王長夀景穆子皇興時封子鸞嗣徽延章武王太洛景穆子皇興時封彬融景悊樂陵王胡兒景穆子和平時封永金景略安定王休景穆子皇興時封子燮嗣超琰安樂王長樂文成皇帝子皇興四年封子銓嗣鑒斌之廣川王略文成子延興時封子諧嗣靈道齊郡王簡文成子太和時封子祐嗣河間王若文成子琛安豐王猛文成子太和時封子延明嗣長孺咸陽王禧獻文皇帝子太和九年封後坐謀逆賜死坦趙郡王幹獻文皇帝子太和時封子謐嗣諶廣陵王羽獻文子太和時封子恭嗣是為節閔帝欣恭兄孝莊初封沛郡王髙陽王雍獻文子太和時封後為爾朱榮殺之河隂斌彭城王勰獻文子太和時封後為髙肇等所譛賜死子劭嗣韶北海王詳獻文子太和時封後為髙肇所譛賜死子顥嗣後奔梁為梁所立送之北還終敗死京兆王愉孝文皇帝子太和二十一年封後坐謀反死清河王懌孝文子太和時封後為元义所殺廣平王懐孝文子汝南王悦孝文子遭爾朱之亂奔梁梁立為魏主北還遇害後魏列侯衛操代人桓穆二帝時以佐佑功封定襄侯莫題鴈門繁畤人道武初以功賜爵東宛侯後坐罪賜死雲題弟以功封安定公劉庫仁獨孤部人為南部大人後為慕容文等所殺眷庫仁弟羅辰眷子拜南部大人道武時以從平中原功賜爵永安公子殊暉襲求引爾頭仁之尉古真代人道武時以從平中原功賜爵東州侯子徳萬嗣眷古真弟子以功封漁陽王子多侯嗣穆崇代人道武時以從平中原功封宜都公子遂留乙真泰以反伏誅觀崇子襲爵贈宜都王夀平國伏干羆亮羆弟封趙郡王孝文時例降為公紹長嵩奚斤代人道武時以征伐功爵山陽侯進爵宜城王長子他觀嗣緒叔孫建代人登國初封安平公後進封丹陽王子俊蒱安同遼東胡人以功積封至髙陽公卒贈髙陽王子原後以謀逆誅頡同子以禽赫連昌功封西平公後進爵為王庾業延代人以從平中原功賜爵西昌公子陵王建廣寗人以從平中山功封濮陽公羅結代人以功封屈虵侯子斤嗣敢伊利婁伏連代人以征伐積功封廣陵公後進爵為王子真嗣閭大肥蠕蠕人以征伐積功封滎陽公奚牧代人以從征伐功封任城公後坐事誅和䟦代人以從征伐功封定陵公後坐事誅莫題代人以征伐功封髙邑公後坐事誅奚眷代人以戰功封南陽公後坐事誅燕鳳代人太武時以舊勲封平舒侯子才嗣許謙代人以平并州功封髙陽公子洛陽嗣崔宏清河東武城人以籌策功封夀光侯子浩嗣後坐修史事誅夷張衮上谷沮陽人以從平中山功封臨渭侯子度嗣白澤鄧彦海安定人以參定朝儀功封下博子後坐事誅子頴嗣進爵為侯怡侍長孫嵩代人世為南部大人以軍功封鉅鹿公太武即位以定䇿進爵北平王子敦嗣道降爲公悦儉嵩五世孫事周以功封索盧侯後封鄫國公道生嵩從子以勲封汝隂公後進封上黨王子瓬嗣觀冀歸彦兕熾晟熾弟紹逺冀歸子以從孝武西遷功封文安縣子子覽嗣洪澄冀歸從子以功封西華縣侯子嶸嗣長孫肥代人以軍功封瑯琊公子翰嗣後封平陽王成降為公陵翰弟封吳郡王于栗磾代人明元時以征伐功封新安侯後進爵為公子洛㧞嗣烈祚忠祚弟明帝時以定䇿功封常山郡公勁忠弟以后父封太原郡公暉勁子嗣謹亦栗磾之後西魏時以戰功封新野郡公周閔帝即位進封燕國公子實嗣顗世䖍仲文世䖍弟以功封延夀郡公翼實弟以尚主封安平縣公後進封國公子璽嗣義翼弟封廣都縣公宣道崔頤清河武城人道武時賜爵清河侯㥄頤之裔孝武時以預定冊功封武城縣公王憲北海劇人道武時以功進爵至北海公子崇嗣祖念昕顗封懿渤海蓚人道武時封章安子元之囘隆之纂古弼代人太武時以功拜靈夀侯後坐事誅張黎鴈門平原人明元時封廣平公後坐事誅劉潔長樂信都人太武時以從征討功封㑹稽公後坐反誅夷邱堆代人太武時以佐命封臨淮公後坐事誅娥清代人眀元時以戰功積封至東平公子延嗣伊馛代人太武時以戰功積封至河南公子蘭嗣盆生乙瓌代人太武時以尚主封西平公後進爵為王子乾歸嗣海瑗周㡬代人明元時以軍功封交趾侯子歩嗣豆代田代人太武時以戰功積封至長廣公贈王爵子周求嗣車伊洛焉耆胡人世為東境部落封前部王子歇嗣王洛兒京兆人明元即位以佐命功封新息王卒贈建平王子長城嗣東路頭代人眀元初以佐命封宣城侯卒贈宣城王子眷嗣盧魯元昌黎徒河人以功封襄城公卒贈王子統嗣彌娥陳建代人太武時以從征伐功積封趙郡公後進封魏郡王子念生嗣來大干代人太武時以戰功封廬陵公子邱頽嗣宿石朔方人太武時以尚主封泰山公後贈太原王子倪嗣萬安國代人獻文時以尚主封安城王後坐罪賜死子翼嗣周觀代人太武時以軍功封金城公尉撥代人獻文時以功累封至安城侯陸真代人太武時以戰功積封至河南公子延嗣吕洛㧞代人太武時以功封武城侯子文祖嗣薛彪子代人道武時以部落歸國封河東公子琡嗣允尉元代人獻文時累封太昌侯後進封至淮陽王子詡嗣慕容白曜晃之元孫文成時以秉政封南鄉公後進爵濟南王坐罪誅和其奴代人文成初封平昌公後贈王子受嗣茍頽代人太武時進爵至河南公後進爵河東王子愷嗣宇文福其先南單于之逺屬以勲封襄樂縣男許彦高陽新城人太武時以參預謀議封武昌公子熙嗣安仁元康宗之熙弟封潁川公後坐罪誅刁廱渤海饒安人眀元時以功賜爵東安伯子遵嗣楷冲韋閬京兆杜陵人太武時以功賜爵髙平男子範嗣子粲韋道福閬從叔本仕宋以徐州内附功封髙密侯子欣宗嗣珍閬族弟以招降羣蠻功封霸城子後進爵侯子纘彧彪杜銓京兆人太武時封新豐侯屈遵昌黎徒河人道武時以功封下蔡子子須嗣進爵信都侯恒以破平凉功賜爵濟北公道賜㧞張蒲河内修武人太武時以謀䇿功封夀張子子昭嗣以軍功進修武侯谷渾昌黎人太武時封濮陽公子闡嗣洪頴士恢公孫表燕郡廣陽人明元初賜爵固安子後坐罪死子軌以奉使稱㫖封燕郡公叡良以别功封昌平子衡良弟襲父爵張濟西河人父千秋事慕容永來奔封成紀侯濟襲封子多羅嗣李先中山盧奴人明元時以先帝舊臣封夀春侯子國嗣賈秀武威姑臧人太武時封陽都子子雋嗣叔休竇瑾頓邱衛國人以功封衛國侯後坐事誅李崇范陽人事馮䟦以城降太武時封固安侯子訢增封扶風公後坐事誅韓延之南陽堵陽人本仕晉後奔秦入魏明元時為鎮將封魯陽侯袁式陳郡陽夏人本仕晉奔秦入魏為上客封陽夏子子濟嗣毛脩之滎陽陽武人始仕晉為劉義真司馬没統萬夏之亡入魏太武時遷尚書能煎調主太官封南郡公子法仁嗣贈南郡王朱修之亦宋臣守滑臺被禽明元嘉其固守封郃陽侯子幼玉嗣唐和晉西宜安人本仕凉凉亡臣於蠕蠕文成