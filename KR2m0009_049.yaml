body:
  text: 文獻通考卷四十九鄱陽馬端臨貴與著職官考三宰相黄帝得六相而天地治神明至黄帝得蚩尤而明天道得太常而察地理得蒼龍而辨東方得祝融而辨南方得風后而辨西方得后土而辨北方謂之六相虞舜臣堯為堯時臣舉八愷倉舒隤敳檮戭大臨厖降庭堅仲容叔逹為八愷即垂益禹臯陶之倫也庭堅則臯陶字隤六回切敳于來切使主后土后土地官也以揆百事莫不時叙地平天成揆度成平也舉八元伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍為八元使布五教於四方内平外成内諸夏外夷狄謂之十六相亦曰十六族及殷成湯居亳初置二相以伊尹仲虺為之伊尹號為阿衡阿倚也衡平也湯倚伊尹而取平故以為官名仲虺臣名為湯左相以諸侯而相天子者也左傳稱居薛為湯左相武丁得傅説爰立作相王置諸其左右武丁殷之高宗也使百官以所夢之形象經營求之於野外得賢相傅説於傅巖之谿於是禮命立以為佐相使在左右也周時召公為保周公為師相成王為左右亦其任也秦悼武王二年始置丞相官以樗里疾甘茂為左右丞相茂為左疾為右莊襄王又以吕不韋為丞相及始皇立尊不韋為相國則相國丞相皆秦官又漢官儀云皆六國時官金印紫綬掌丞天子助理萬機秦初有左右荀悦曰秦本次國命卿二人是以置左右丞相無三公官也至二世復有中丞相二世時右丞相去疾左丞相斯及斯被誅乃以趙高為中丞相事無大小皆決之漢高帝即位一丞相綠綬高帝元年拜曹參為假左丞相即漢初丞相當有左右今言一丞相或漢書之誤以蕭何為之及誅韓信乃拜何為相國何薨以曹參為之孝惠高后置左右丞相文帝二年復置一丞相丞相月俸錢六萬初陳平為左丞相及誅諸吕文帝初立平乃謝病以讓周勃乃以勃為右丞相位第一平為左丞相位第二帝因問勃天下一歲決獄幾何勃謝不知問天下錢穀一歲出入幾何勃又不能對汗出洽皆及問平平曰有主者宰相者上佐天子理隂陽順四時下遂萬物之宜外鎭四夷諸侯内親附百姓使卿大夫各任其職上善之勃謝病請免相平專為一丞相成帝綏和元年御史大夫何武建言古者民謹事約國之輔佐必得賢聖然猶則天三光備三公官三光日月星各有分職今末俗之弊政事煩多宰相之才不能及古而今丞相獨兼三公之事所以大化久未洽也宜建三公官定卿大夫之位分職分政以考功效於是上拜曲陽侯王根為大司馬而何武自御史大夫改為大司空皆金印紫綬比丞相則三公俱為宰相漢御史大夫副丞相事若今之同平章事及參知機務之𩔖所以漢書云薛貢韋匡迭為宰相薛宣韋賢匡衡則是丞相而貢禹但為御史大夫又蕭望之謂朱雲曰吾備位將相蓋蕭望之嘗任御史大夫及前將軍之職也至孝哀帝建平二年正月從朱博議復罷大司空大司空朱博奏曰帝王之道不必相襲髙祖置御史大夫次丞相典正法度以職相參歴載二百天下安寧今更大司空與丞相同位故事選郡國守相髙第為中二千石為御史大夫任職者為丞相位次有序所以重聖徳重國相也今中二千石未更御史而為丞相非所以重國政也今願罷大司空以御史大夫為百寮長哀帝從之元壽二年更名丞相為大司徒初漢制常以列侯為相唯公孫𢎞布衣數年登相位武帝乃封為平津侯其後為故事至丞相而封自𢎞始也到光武絶不復侯或自以際㑹援立見封漢儀注曰御史大夫為丞相更春乃封故且賜爵闗内侯李奇曰以冬月非封侯故且先賜爵關内侯白事教令稱曰君侯亦謂丞相為上相陸賈謂陳平曰足下位為上相是也春秋之義尊上公謂之宰言海内無不統焉故丞相進天子御座為起在輿為下皇帝見丞相起謂者贊稱曰皇帝為丞相起起立乃坐贊稱曰敬謝行禮皇帝在道丞相某迎謁者稱曰皇帝為丞相下輿下立乃升車也丞相有病皇帝法駕親至問疾從西門入丞相有疾御史大夫三朝問起居百寮亦然後漢三公疾令中黄門問疾魏晉即黄門郎尤重者或侍中及瘳視事尚書令若光祿大夫賜以養牛上尊酒如淳曰律稻米一斗得酒一斗為上尊丙吉為丞相尚寛大好禮儀掾吏有罪不稱職與長休終告無案驗客或曰君侯為漢相姦吏成其私然無所懲艾乎吉曰夫以三公之府有按吏之名吾竊陋焉因為故事公府不按吏自吉始韋賢為丞相年七十餘乞罷歸私第丞相致仕自賢始也有天地大變天下大過則以病聞有天地大變天下大過皇帝使侍中持節乗四白馬賜上尊酒十斛牛一頭策告殃咎使者居半道丞相追上病使者還來白事尚書以丞相不起病聞若丞相不勝任使者䇿書駕輅馬即時布衣歩出府免為庶人若丞相有他過使者奉䇿書駕騅騩馬即時歩出府乗棧車牝馬歸田里思過騩京媚切凡丞相府門無闑不設鈴鼓言其大開無節限也應劭曰丞相舊位在長安時府有四出門隨時聽事國每有大議天子車駕親幸後漢廢丞相及御史大夫而以三公綜理衆務則三公復為宰相矣前代丞相有倉頭字宜禄至漢代有所關白則叩閤呼宜禄遂以為常閤古㳫切至於中年以後事歸臺閣則尚書官為機衡之任至獻帝建安十三年復置丞相而以曹公居之又有相國魏黄初元年改為司徒吴有左右丞相而文帝復置中書監令並掌機密自是中書多為樞機之任説在中書令篇其後定制置大丞相第一品後又有相國齊王以司馬師為之晋景帝髙貴鄉公以司馬昭為之晋文帝晋初並不置武帝初安平王孚為太宰鄭沖為太傅王祥為太保義陽王子初為太尉何曾為司徒荀顗為司空石苞為司馬陳騫為大將軍凡八公同時並置唯無丞相焉至惠帝永康元年改司徒為丞相永寧元年罷丞相復置司徒官永昌元年罷司徒并丞相則與司徒不並置矣丞相與司徒廢置非一其後或有相國或有丞相省置無恒而中書監令常管機要多為宰相之任自魏晋以來相國丞相多非尋常人臣之職晋趙王倫梁王彤成都王頴南陽王保並為之元帝渡江以王敦為丞相轉司徒荀組為太尉以司徒官屬并丞相為留府敦不受成帝以王導為丞相罷司徒府為丞相府導薨罷丞相復為司徒府相國丞相皆衮冕綠盭綬盭音吏宋孝武帝初唯以南郡王義宣為丞相而司徒府如故亦有相國丞相金章紫綬進賢三梁冠絳朝服佩山元玉相國則綠元綬也齊丞相不用人以為贈官梁罷相國置丞相罷丞相置司徒陳又置相國位列丞相上并丞相並為贈官按自魏晋以來宰相但以他官叅掌機密或委知政事者則是矣無有常官其相國丞相或為贈官或則不置自為尊崇之位多非人臣之職其眞為宰相者不必居此官魏文帝以劉放孫資為中書監令並掌機密晋武帝詔以荀朂為中書監侍中毗贊朝政張華為中書令侍中劉卞謂華曰公居阿衡之地東晋庾亮庾氷相次為中書監先是王導輔政以寛和得衆庾亮以法裁飭頗失人心至氷經綸時務升擢後進朝野注心咸曰賢相殷浩為揚州刺史參綜朝權王敦為大將軍侍中上表曰臣備位宰輔謝安為中書監錄尚書省事宋文帝初徐羡之為司空錄尚書事後以江湛王僧綽俱為侍中任以機密後又以殷景仁為侍中左衞將軍與侍中右衞將軍王華侍中左衞將軍王曇首侍中劉湛四人俱居門下皆以風力局幹冠冕一時同時之美近代莫及初王𢎞為江州刺史加侍中後徵輔政以為侍中司徒錄尚書事而𢎞弟曇首為文帝所任與華相持華常謂已力用不盡每歎息云宰相頓有數人天下何由得理湛母憂去職後徵為太子詹事加給事中與殷景仁並被任遇湛常云今代宰相何難此正可當我南陽郡漢代功曹耳沈演之為侍中衞將軍文帝謂之曰侍中領衞俱為優重此蓋宰相便坐卿其勉之齊王儉為侍中尚書令常謂人曰江左風流宰相惟有謝安蓋自况也明帝顧命江祏兄弟及始安王遙光尚書令徐孝嗣領軍蕭坦之更日貼勅時呼為六貴皆宰相也梁何敬容初為吏部尚書侍中時徐勉為僕射參掌機事以疾陳解因舉敬容自代故敬容遷為僕射掌選事侍中如故此並為宰相後敬容屢轉他官而參掌如故又王訓為侍中武帝問敬容曰褚彥回年幾為宰相對曰少過三十帝曰今之王訓無謝彥回彥回宋明帝時為侍中又周舍卒後朱异為散騎常侍代掌機密北齊韓軌為中書令尋授司空自以勲歴登台鉉按此則或掌機密或錄尚書或綜機權或管朝政或單侍中或給事中或受顧命皆為宰相也然侍中職任機密之司不必他名亦多為宰相其侍中兼外官若宋王𢎞侍中兼内官若沈演之其例不少則非宰相蓋在當時委任而已自晋宋以來宰相皆文武自逸何敬容獨勤庶務為代所嗤鄙姚察曰魏正始及晋之中朝俗尚於元虚貴為放誕尚書丞郎以上簿領文案不復經懷皆成於令史逮乎江左此道彌扇唯卞壼以臺閣之務頗欲綜理阮孚謂之曰卿常無閒暇不乃勞乎宋代王敬𢎞身居端右未嘗省牒風流相尚其流遂遠覩白署空是稱清貴恪勤匪懈終滯鄙俗是使朝經廢於上衆職隳於下小人道長抑此之由也嗚呼傷風敗俗而使何敬容之識理見譏薄俗者哉後魏舊制有大將軍不置太尉有丞相不置司徒自正光以後俱始置之神瑞元年置八大人官總理萬機時號八公然而尤重門下官多以侍中輔政則侍中又為樞密之任矣説在侍中篇北齊乾明中置丞相河清中中分為左右各置府僚天統三年以太宰叚韶為左丞相太師賀㧞仁為右丞相又斛律金斛律光並由右丞相轉拜為左丞相然而為宰相秉朝政者亦多為侍中趙彦琛元文遙和士開同為宰相皆兼侍中後周大冢宰亦其任也其後亦置左右丞相大象二年以楊堅為大丞相遂罷左右丞相官隋有内史納言即中書令侍中也是為宰相亦有他官參與焉柳述為兵部尚書參掌機事又楊素為右僕射與髙熲專掌朝政按自後漢時雖置三公而事歸臺閣尚書始為機衡之任然當時尚書不過預聞國政未嘗盡奪三公之權也至魏晋以來中書尚書之官始眞為宰相而三公遂為具員其故何也蓋漢之典事尚書中書者號為天子之私人及叔季之世則姦雄之謀簒奪者亦以其私人居是官而所謂三公者古有其官雖鼎命將遷之時大權一出於私門然三公未容遽廢也故必擇其老病不任事依違不侵權者居之東漢之末曹公為丞相而三公則楊彪趙温尚書令中書監則二荀華歆劉放孫資之徒也魏之末司馬師昭為丞相而三公則王祥鄭冲尚書令中書監則賈充荀朂鍾㑹之徒也蓋是時凡任中書者皆運籌帷幄佐命移祚之人凡任三公者皆備員髙位畏權遠勢之人而三公之失權任中書之秉機要自此判矣至丞相一官西漢廢於哀帝之時東漢本不置丞相建安特置之以處曹操魏本不置丞相正始特置之以處司馬師昭及晉則不置正苻堅所謂朕以龍驤建業之説也然東晉以至宋齊梁陳隋皆有之夫中書監既為宰相之任則升其品秩可也丞相既不為宰相之任而嘗為擅代之階則廢其名字可也今觀魏以後之官品中書監僅為三品而黄鉞大將軍大丞相諸大將軍則為一品二品然此數官者未嘗以授人特宋齊梁陳隋將受禪則居之此外則王敦桓温侯景亦嘗為之夫髙官極品不以處輔佐之臣而又存其名字使亂臣賊子遞相承襲以為竊取大物之漸非所以昭徳塞違明示百官也唐世宰相名尤不正初唐因隋制以三省之長中書令侍中尚書令共議國政此宰相職也其後以太宗嘗為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為宰相其品位既崇不欲輕以授人故常以他官居宰相職而假以他名自太宗時杜淹以吏部尚書參議朝政魏徵以祕書監參預朝政其後或曰參議得失參知政事之𩔖其名非一皆宰相職也貞觀八年僕射李靖以疾辭位詔疾小瘳三兩日一至中書門下平章事而平章事之名蓋始起於此其後李勣以太子詹事同中書門下三品謂同侍中中書令也而同三品之名蓋起於此然二名不專用而他官居職者猶假他名如故自髙宗已後為宰相者必加同中書門下三品雖品髙者亦然惟三公三師中書令則否其後改易官名而張文瓘以東臺侍郎同東西臺三品同三品入衘自文瓘始永淳元年以黄門侍郎郭待舉兵部侍郎岑長倩等同中書門下平章事平章事入衘自待舉等始自是以後終唐之世不能改初三省長官議事於門下省之政事堂其後裴炎自侍中遷中書令乃徙政事堂於中書省開元中張説為相又改政事堂號中書門下列五房於其後一曰吏房二曰樞機房三曰兵房四曰户房五曰刑禮房分曹以主衆務焉宰相事無不統故不以一職名官自開元以後常以領他職實欲重其事而反輕宰相之體故時方用兵則為節度使時崇儒學則為大學士時急財用則為鹽鐡轉運使又其甚則為延資庫使至於國史太清宫之𩔖其名頗多皆不足取侍中中書令是眞宰相其餘但加同中書門下三品及平章事知政事參知機務等名者皆是自先天之前其員頗多景龍中至十餘人開元以來常以二人為限或多則三人武太后聖歴三年四月勅同中書門下三品平章事賜會並同中書門下三品例開元十年十一月勅自今以後中書門下宜共食實封三百户二十二年十一月制宰相兼官者並兩給俸祿天寶十五載之後天下多難勲賢並建故備位者衆然其秉鈞持衡亦一二人而已舊例起居舍人及起居郎唯得對仗承旨仗下之後謀議不得聞武太后時文昌右丞姚璹以為帝王謨訓不可無紀若不宣自宰相史官無從而知表請仗下所言軍國政要則宰相一人撰錄每月封送史館謂之時政記自璹始也徳宗時常衮為相奏貶中書舍人崔祐甫為潮州刺史上以為太重貶祐甫河南少尹初肅宗之世天下務殷宰相常有數人更直決事或休沐各歸私第詔直事者代署其名而奏之自是踵為故事時郭子儀朱泚雖以軍功為宰相皆不預朝政衮獨居政事堂代二人署名奏祐甫既貶二人表言其非罪上問卿向言可貶今云非罪何也二人對初不知上初即位以衮為欺罔大駭乃貶衮為潮州刺史以祐甫為門下侍郎同平章事宋承唐制以同平章事為宰相之職無常員有二人則分日知印以丞郎以上至三師為之其上相為昭文館大學士監修國史其次為集賢殿大學士或置三相則昭文集賢兩學士并監修國史並除焉國初范質昭文學士王溥監修國史魏仁浦集賢學士此三相例也唐以來三大館皆宰臣兼之宋仍唐制參知政事掌副宰相毗大政參庶務其除授不宣制不押班不知印不預奏事不升政事堂殿庭别設磚位於宰相後及勅尾署衘降宰相一等乾徳二年以趙普為相上欲為普置副而難其名稱問陶穀下丞相一等何官穀引唐參知政事為對時薛居正為樞密直學士吕餘慶為兵部侍郎乃命二人以本官兼不宣制押班蓋未欲遽令與普齊也史臣曰按唐參預朝政參知政事等職皆宰相任也髙宗嘗欲用郭待舉參知政事復以其資淺止令同承受平章事則平章亞於參政矣穀言失之至道元年詔宰相與參政輪班知印同升政事堂二年詔復如舊制參政押勅齊衘行並馬自冦凖始至今不易親王樞密使留守節度使兼中書令侍中同平章事者謂之使相不預政事不書勅惟宣勅除授者勅尾存其衘而已乾徳二年范質等三相皆罷以趙普同平章事李崇矩為樞密使命下無宰相書勅使問翰林陶穀穀謂自昔輔相未嘗虛位唯唐太和中甘露事數日無宰相時左僕射令狐楚等奉行制書今尚書亦南省長官可以書勅竇儀曰穀所陳非承平令典今皇弟開封尹同平章事即宰相之任也可書勅上從之神宗新官制於三省置侍中中書尚書二令而不除人而以尚書令之貳左右僕射為宰相左僕射兼門下侍郎以行侍中之職右僕射兼中書侍郎以行中書令之職復别置中書門下侍郎尚書左右丞以代參知政事中書揆而議之門下審而覆之尚書承而行之獨中書取㫖而門下尚書之官為首相者不復與朝廷議論時王珪蔡確俱為宰相確奏三省長官位髙恐不須設遂以兩僕射行三省事而確為次相專政珪不復預元祐初司馬光乃請令三省合班奏事分省治事自紹興以後皆因之時議者謂門下相凡事既同進呈則不應自駮已行之命是省審之職可廢也政和中改左右僕射為太宰少宰仍兼兩省侍郎靖康中復為左右僕射焉建炎三年吕頤浩請參酌三省之制舊尚書左僕射今欲尚書左僕射同中書門下平章事舊尚書右僕射今欲尚書右僕射同中書門下平章事門下中書二侍郎並改為參知政事廢尚書左右丞從之至乾道八年詔尚書左右僕射可依漢制改作左右丞相詳定勅令所言近承詔㫖改左右僕射為左右丞相令刪去侍中中書尚書令以左右丞相充緣舊左右僕射非三省長官故為從一品今左右丞相係充侍中中書尚書令之位即合為正一品從之丞相官以太中大夫以上充參政以中大夫以上充常除二員或一員嘉泰三年始除三員故事丞相謁告參預不得進擬惟丞相未除則參預輪日當筆多不踰年少纔旬月獨淳熙初葉衡罷相龔茂良行相事近三年亦創見也按以三省為宰相之司存以三省長官為宰相之職任其説肇於魏晋以來而其制定於唐然中書尚書之名始於漢通典言漢武帝遊宴後庭始令宦者典事尚書為之中書謁者則中書尚書只是一所然考霍光傳光薨霍山以奉車都尉領尚書事故事諸上書者皆為二封署其一曰副領尚書者先發之所言不善屏去不奏魏相請去副封以防壅蔽而光夫人顯及禹山雲等言上書者益黠盡奏封事輙下中書令出取之不關尚書則其時中書尚書似已分而為二蓋尚書在漢時乃御前管文書之所故漢人上書言昩死上言尚書如丞相大將軍已下連名奏太后廢昌邑王亦是尚書令讀奏武帝雖令宦者典其事然其末年以霍光出入禁闥謹愼可屬大事輔少主則以光領之光薨而山繼領其事蓋既以大臣之秉政者領之則其事始在外庭矣然則所謂上書者為二封意正本則徹中書而人主閲之副封則徹尚書而大將軍閲之自此始判而為二而有内外之分此顯禹所以有中書令出取之不關尚書之說歟霍氏既敗張安世復以大司馬車騎將軍領尚書事史言安世職典樞機謹慎周密每定大政已決輙移病出聞有詔令乃驚使使之丞相府問焉蓋霍光領尚書之時丞相乃蔡義楊敞也張安世領尚書時丞相乃魏相丙吉也是時尚書雖在外庭以腹心重臣領之然於宰相並無干預此安世所以密議大政及出詔令而佯為不知遣使問之丞相府則丞相府乃宣行尚書所議之政令耳而尚書非丞相之司存也漢丞相府有東曹西曹為處掾屬議政令之地於尚書並無干預至魏明帝常卒至尚書門陳矯為尚書令跪問欲何之帝曰欲案行文書然則魏時尚書猶去禁中不逺及唐初始定制以三省為宰相之司存以三省長官為宰相之職任然省分為三各有所掌而其官亦不復一相職既尊無所不統則不容拘以一職於是始有同中書門下三品同平章事參知機務參預政事之名焉諸名之中所謂同平章事者唐初雖以稱宰相乃以處資淺之人在參知政事之下見前參政注中世以後則獨為眞宰相之官至宋元豐以前皆然然宰相者總百官弼天子既不當儕之他官而其上則不當復有貴官矣自唐開元以來郭子儀李光弼相繼以平章事為節度使謂之使相而宰相之職儕於他官自此始自宋元祐以後文潞公吕申公相繼以平章軍國重事序宰臣上而宰相之上復有貴官自此始然郭李以勲臣名將為之宜也自此例一開於是田承嗣李希烈之徒俱以節鎭帶同平章事者非一人極而至於王建馬殷錢鏐之軰蠭起盗地者皆欲效之蓋鄙他官而不為而必欲儕於宰相以自附於郭李則唐中葉以後所謂平章者如此文吕以碩徳老臣為之宜也自此例一開於是蔡京王黼相繼以太師總知三省事三日一朝赴都堂治事以至於韓侂胄賈似道擅權專政之久者皆欲效之蓋卑宰相而不屑為而必求加於相以自附於文吕則宋中葉以後所謂平章者如此蓋平章之始立名也本非甚尊之官及其久也則强藩之竊地者為之權臣之擅政者為之蓋雖官極尊而居之者多非其人矣宰相屬官丞相司直漢武帝五年置掌佐丞相舉不法位在司𨽻校尉上翟方進為司直旬歲間免兩司𨽻旬歳猶言滿歳若十日之一周後漢罷丞相光武以武帝故事置司徒司直居司徒府助司徒督録諸州郡所舉上奏司直考察能否以徵虛實建武十一年省獻帝建安八年復置司直不屬司徒掌督中都官不領諸州九年詔司直皆比司𨽻校尉坐同席在上假傳置也伏湛字惠公光武以湛才任宰相拜為司直行大司徒事後無石勒置都部從事各部一州秩二千石准丞相司直丞相長史漢文帝二年置一丞相有兩長史漢百官表云丞相有兩長史而張湯傳云殺臣者三長史也顏師古云兼有守者非正員故耳蓋諸史之長也職無不監田仁為宰相長史上書言天下太守皆下吏誅死武帝悅拜仁為丞相司直威振天下介幘進賢一梁冠朱衣銅印黄綬劉屈氂為左丞相分丞相長史為兩府以待天下遠方之選待得賢人當拜為右丞相後漢建武中省司直有長史一魏武為丞相置左右長史丞相諸曹吏掾屬三十御屬一獻帝建安中魏武為丞相置徵事二人建安十五年初置徵事二人以邴原王烈選補之舊有東西曹自魏武大軍還鄴乃省西曹時毛玠為東曹掾與崔琰並典選舉請謁不行時人憚之及議併省咸欲省東曹皆曰舊西曹為上東次之宜省東曹也魏武知其情令曰日出於東月盛於西凡人言方亦復先東遂省西曹及咸熙中司馬昭為相國相國府置中衛驍騎二將軍左右長史司馬從事中郎主簿舍人參軍東西曹及户賊金騎兵車鎧水集法奏倉士馬媒等曹掾屬凡二十二人晉元帝以鎭東大將軍為丞相丞相府置從事中郎分掌諸曹有錄事中郎度支中郎三兵中郎其參軍則有諮議參軍二人主諷議事江左初置軍諮祭酒有錄事記室東曹西曹等十三曹其後又置七曹宋武帝為相合中兵直兵置一參軍曹則猶二也其小府不置長流參軍者置禁防參軍蜀丞相諸葛亮有行參軍晉太傅司馬越府又有行參軍兼行參軍後漸加長兼字除拜則為參軍事府版則為行參軍晉宋以來參軍各有除版行參軍下則長兼行參軍又有參軍督䕶東曹督䕶二督䕶江左置尚書都司隋置左右司郎中各一人掌都省之職唐武徳省貞觀復置掌副左右丞所管諸司事二十三曹呼左右司為都公龍朔改為左右承務咸亨中復為左右司郎中武后又增員外郎一人宋熙寧時詔中書五房各置檢正二員在堂後官之上都檢正一員在五房提㸃之上皆士人為之元豐五年罷檢正職務分歸中書舍人給事中左右司郎官未改官制前左右司郎中為階官無職掌郎中各一人員外郎各一人凡四員掌舉諸司之綱紀號為都司亦曰左右曹元豐六年諸司置御史房主行彈劾御史按察失職建炎三年以軍興多事復置檢正二員一員禮刑兵一員户刑位序在左右司上四年罷隆興元年詔尚書省吏兵房三省樞密院機速房尚書省刑户工房三省樞密院看詳賞功房尚書省禮房令左右司分房書擬其中書門下諸房令檢正書擬又有詔左右司郎中各差一員減罷二員左司書擬吏户禮機速房右司書兵刑工賞功房文字後以右司掌刑房事任為劇乃置二員餘見尚書左右司郎中門文獻通考卷四十九
