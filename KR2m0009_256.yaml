皇太后嘉命使者某重宣中制臣陋族卑鄙憂懼不堪欽承舊章肅奉典制某官糞土臣姓名稽首頓首再拜承制詔納成制文太皇太后曰咨某官姓名之女孝友恭儉實維母儀宜奉宗廟永承天祚以黝纁榖圭六馬以章典禮今遣使持節太尉封某宗正卿封某以禮納成答文曰太皇太后嘉命使者某重宣中制降婚卑陋崇以上公寵以豐禮備物典册欽承舊章肅奉典制某官糞土臣姓名稽首頓首再拜承制詔告期制文太皇太后曰咨某官姓名謀於公卿大筮元龜罔有不臧吉日維某月某甲子可迎率遵典禮今使使持節太尉封某宗正卿封某以禮告期答文曰太皇太后嘉命使者某重宣中制以某月某甲子吉日告期臣欽承舊章肅奉典制某官糞土臣姓名稽首頓首再拜承制詔命使奉迎制文太皇太后曰咨某官姓名禮之大體欽順重正其期維吉典圖是若今遣使持節太尉封某宗正卿封某以禮奉迎答文曰太皇太后嘉命使者某重宣中詔令日吉辰備禮以迎螻蟻之族猥承大禮憂懼戰悸欽承舊章肅奉典制某官糞土臣姓某稽首頓首再拜承制詔按晉穆帝永和十年臺符問六禮版文舊稱皇帝今太后臨朝當何稱博士曹耽云公羊傳婚禮不稱主人母諸父為主太常王彪之云三傳異議不可全據今太皇太后臨朝稱制文告所達國之大典皆仰稟成非無外事也豈婚聘獨不通乎六禮版文應稱皇太后今請遵彪之議詔並從之三月禮部太常寺上納后儀注發六禮制書日太皇太后御崇慶殿坐命內外命婦立班行禮畢內給事出殿門置六禮制書案上出內東門禮直官通事舍人引由宣祐門至文德殿後門入權置案於東上閣門命使納采問名文德殿宰臣親王執政官宗室文武百僚大小使臣軍員蕃官易朝服樂備而不作立班定內給事奉制書案置於橫街北稍東西向北上禮直官通事舍人引門下中書侍郎次引使副就橫街南承制位北向東上內給事詣使者東北立稱太皇太后有制典儀曰再拜在位官皆再拜宣制曰皇帝納后命公等持節行禮宣訖典儀曰再拜使副皆再拜授制書訖典儀曰再拜在位官皆再拜禮直官通事舍人太常博士引使副從制案出由端禮門入右升龍門安於油絡網犢車內出宣德門鼓吹備而不作至皇后行第大門外令史二人對捧制案立主人於大門內儐者立於主人之左北面進受命出曰敢請事使者曰某奉制納采儐者入告主人曰某之女若而人既蒙制訪臣某不敢辭儐者出告入引主人出於大門外再拜使者先入使者曰太皇太后有制主人再拜宣制書畢主人再拜受訖主人進表訖再拜使者出問名同上儀使者曰將加卜筮奉制問名主人曰臣某之女若而人既蒙制問臣不敢辭命使納吉納成告期並同命使納采問名儀納吉使者曰加請卜筮占曰從制使某納吉主人曰臣某之女若而人龜筮云吉臣預有焉臣某謹奉典制告期使者曰某奉制告期主人曰臣某謹奉典制以上納吉納成告期請見受制接表並如納采儀臨軒命使册后及奉迎文德殿宰臣親王執政官宗室文武百僚朝堂易朝服皇帝常服乘輦至文德殿後閣待中奏中嚴次外辦皇帝服通天冠綘紗袍出閣乘輦皇帝出自西房降輦即御座分引兩省官及待制權侍郎觀察使以上分東西入殿門各就位東西相向立奉寶置於御座前奉宣后册出閣由東上閣門出至文德殿庭橫行典儀贊曰拜在位官皆再拜使副授册宣制曰册某氏為皇后命公等持節展禮宣訖典儀曰再拜使副皆再拜使副受册寶訖典儀曰再拜在位官皆再拜宣制曰太皇太后制命公等持節奉迎皇后宣訖典儀曰再拜使及副皆再拜受節典儀曰再拜在位羣官皆再拜出殿門侍中奏禮畢皇帝升座入自東房入閣侍中奏解嚴承旨放仗百僚再拜出皇帝常服還內册寶出文德殿門端禮門入右升龍門出宣德正門赴行第册后如納采儀使者曰某奉制授皇后備物典册皇后受册寶內外命婦序立如儀主人以書奉使者奉迎宰臣親王使相執政官文武百僚宗室等常服班迎於宣德門外行第儐者請使者曰某奉制以禮奉迎儐者入告主人曰臣某謹奉典制儐者出告入引主人出大門外再拜使者先入曰有制主人再拜使者宣制畢主人再拜主人受制訖主人答表再拜姆導皇后尚宫前引外堂出立房外典儀曰再拜使副俱再拜使者曰令月吉日某等承制以禮奉迎內侍受以入使副退主人以書授使者奉於司言受以奏聞皇后降立堂下再拜訖升堂主人升阼階進西向戒之曰戒之戒之夙夜無違命訖主人退母進西階上東向施襟結帨戒之曰勉之戒之夙夜無違命訖連進皇后升輿至中門皇后降輿升車內皇后出大門使副及羣臣前引從皇后將到宣德門有司宰臣文武百僚宗室南向班迎再拜訖分班皇后入宣德門鳴鐘鼓班迎官退皇后降車入次外輿出右升龍門入端禮門文德殿東上閣門出文德殿後門入宣祐門至內東門內降輿司輿前導皇后詣福寧殿門大次以俟至日晡後皇后車入宣德門禮直官通事舍人引侍中版奏請中嚴內侍轉奏皇帝服通天冠絳紗袍御福寧殿宫人侍衛如常儀尚宫引皇后出次詣殿庭之東西南立尚儀跪奏外辦請皇帝降座禮迎尚宫前引詣庭中之西東面揖皇后以入皇帝導皇后外自西階入室各就榻前立尚食跪奏具皇帝揖后皆坐尚食以饌進皇帝及后皆食三飯尚食以酒進皇帝皇后俱受爵飲尚食以饌進再飲如初三飲用卺如再飲尚儀跪奏禮畢皇帝皇后俱興尚宫請皇帝御常服常寢請皇后釋禮服入幄次日以禮朝見太皇太后皇太后參皇太妃如宫中之儀詔從之昭德皇后劉氏初入宫為媫妤昭慈既廢立為皇后徽宗立册為元符皇后朱夫人開封人治平間自襁褓入官建炎四年從隆祐太后幸江西還封嘉國夫人主管大內公事知尚書內省提舉十閣分紹興二年卒張夫人久在宫掖嘗教哲宗道君讀書建炎時卒慕容貴妃哲宗後宫初為侍御紹興初纍進至媫妤二十二年薨靖康之難六宫皆北去惟隆祐太后以廢處瑶華及先朝嬪御得留其姓氏封爵可見者如前徽宗顯恭皇后王氏開封人徽宗元妃即位册為皇后生欽宗大觀二年崩顯肅皇后鄭氏開封人入宫纍進至貴妃顯恭崩册為皇后淵聖受禪尊為太上皇后明達皇后劉氏入宫為才人七遷至貴妃政和三年薨追册為皇后明節皇后劉氏入宫為才人進至淑妃宣和三年薨追册為皇后顯仁太后韋氏開封人入宫自侍御纍遷至婉容生髙宗從上皇北狩髙宗即位遙尊為宣和皇后紹興十二年歸自北方貴妃王氏徽宗後宫政和七年薨貴妃崔氏徽宗後宫宣和時坐罪廢貴妃喬氏徽宗後宫從北狩殁於他境欽宗仁懷皇后朱氏開封人初為皇太子妃上受禪立為皇后從北狩殁於他境慶元三年遙上尊號諡祔於太廟欽宗室髙宗憲節皇后邢氏開封祥符人帝在康邸封夫人從二帝北狩帝即位遙册為皇后紹興九年崩於五國城金祕之上虛中宫以待者十六年顯仁回始得凶問梓宫至祔神主於别廟淳熙末合祔髙宗於太廟憲聖慈烈太后吳氏開封人上在維揚納之纍進婉儀憲節皇后崩問至紹興十三年立為皇后孝宗即位尊為太上皇后賢妃潘氏開封人髙宗在康邸納之既即位生元懿太子進位賢妃紹興十八年薨張賢妃開封人建炎初為才人進媫妤上令母養孝宗十二年薨劉貴妃臨安人入宫纍封至貴妃淳熙十四年薨劉婉儀初為宜春郡夫人纍遷至婉儀紹興末以罪廢張貴妃開封祥符人纍封至婉容淳熙七年進封太上皇帝淑妃再進貴妃紹熙元年薨馮美人韓氏吳氏李氏王氏四才人紹興中俱寵幸後皆廢容齋洪氏隨筆曰內庭婦職遷敘皆出中旨至中書命詞如尚書內省官固知其為長年習事如司字典字掌字知其為主守之微者至於紅紫霞帔郡國夫人則其年齡之長少爵列之崇卑無由可以測度紹興二十八年九月仲兄以左史直前奏事時兼權中書舍人高宗聖訓云有一事待與卿説昨有宫人宫正者封夫人乃宫中管事人六十餘嵗非是嬪御恐卿不知兄奏云係王剛中行詞剛中除蜀帥係臣書黃容别撰入上頷首後四日經筵留身奏事奏言前日面蒙宣諭永嘉郡張夫人告詞既得聖旨令不須别撰上曰乃皇后閣中老管事人今六十六嵗宫正乃執事者昨日宰執奏欲換告亦無妨礙不須别進今已年老多病但欲得稱呼耳蓋昨訓詞中稱其容色云成穆皇后郭氏開封祥符人孝宗正妃初封咸寧郡夫人紹興二十六年薨上即位追册為皇后成恭皇后夏氏江西人上為普安郡王入宫上即位進賢妃踰年立為皇后乾道三年崩成肅皇后謝氏丹陽人上為普安郡王時入宫上即位纍遷至貴妃夏后崩中宫虛位將十載淳熙三年立為皇后光宗受禪尊為夀成皇后蔡貴妃孝宗後宫淳熙十二年薨李賢妃孝宗後宫淳熙十年薨慈懿皇后李氏安陽人光宗元妃生寧宗帝正位東宫立為皇太子妃受禪立為皇后寧宗立稱太上皇后黃貴妃張貴妃武才人並光宗後宫又有潘夫人符夫人二張夫人並上郡封無品程凡宫中之制郡夫人以上始稱房院恭淑皇后韓氏其先相州人寧宗元妃上即位立為皇后慶元六年崩壽明皇后楊氏遂安人入宫纍封貴妃恭淑既崩以嘉泰三年立為皇后理宗即位尊為皇太后文獻通考卷二百五十六
