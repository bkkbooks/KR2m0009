body:
  text: 文獻通考卷二百五十六鄱陽馬端臨貴與著帝系考七后妃梁太祖元貞皇后張氏單州碭山人太祖少聘之生末帝太祖貴封魏國夫人天祐元年卒太祖即位追册為賢妃末帝立追諡后昭儀陳氏宋州人少以色進後專寵開平三年度為尼昭容李氏亦以色進拜昭容後不知所終末帝德妃張氏父歸霸事太祖為梁功臣帝為王時以婦聘之帝即位將册德妃立為后未及而卒末帝次妃郭氏父登州刺史歸厚少以色進梁亡為尼後唐太祖正室劉氏代北人太祖為晉王時封秦國夫人莊宗即位尊為皇太妃次妃曹氏太原人先封晉國夫人生莊宗莊宗即位尊為皇太后薨葬魏縣諡貞簡莊宗神閔敬皇后劉氏魏州安成人晉王攻魏禆將袁建豐掠得之納之晉宫莊宗嗣位太后以賜之有寵生子繼岌帝即位將立后而衛國夫人韓氏正室也燕國夫人伊氏次妃位在劉氏上故難其事宰相豆盧革樞使郭崇韜等希旨請立劉氏為皇后上從之乃封韓氏為淑妃伊氏為德妃莊宗遇弒后出奔明宗即位遣人賜后死韓淑妃伊德妃皆居太原晉髙祖反時為契丹所虜自唐末喪亂后妃之制不備至莊宗時後宫之數尤多有昭容昭儀昭媛出使御正傅真懿才咸一瑶芳懿德宣等其餘名號不可勝紀明帝已後又有司寶司贊司膳司醖司飾司衣過藥梳箆衣服知客寶省書省弟子院使等名皆封國夫人或郡夫人少者縣君前代內職無封君之禮此一時之制明宗和武憲皇后曹氏不知所出天成元年封淑妃後立為皇后愍帝即位尊為皇太后明宗昭懿皇后夏氏不知其所出生秦王從榮及愍帝帝未即位前卒天成時追册為皇后明宗淑妃王氏邠州餅家子初為梁將劉鄩侍兒鄩卒帝納之即位封為淑妃愍帝即位尊為皇太妃愍帝哀皇后孔氏父循愍帝即位將立為皇后未及而難作帝出奔廢帝入與所生四子皆見殺晉髙祖立追諡曰哀廢帝皇后劉氏父茂威應州渾源人初封沛國夫人帝即位為皇后石敬塘犯京師與帝俱自焚死晉髙祖皇后李氏唐明宗女初號永寧公主天福二年有司請立皇后帝以宗廟未立謙抑未遑帝崩出帝即位乃尊為皇太后安太妃代北人不知其世家生出帝帝立尊為皇太妃出帝皇后馮氏定州人父濛初適髙祖弟重允重允卒出帝納之立為皇后契丹入京師從帝北遷不知所終漢髙祖皇后李氏晉陽人本農家女髙祖少為軍卒入其家劫取之髙祖貴封魏國夫人生隱帝髙祖即位立為皇后隱帝即位為皇太后周太祖聖穆皇后柴氏邢州堯山人太祖少娶之太祖即位已卒追册為皇后太祖淑妃楊氏鎮州真定人初為趙王鎔妾鎔死嫁石光輔光輔卒太祖聘為繼室天福中卒即位追册為妃貴妃張氏鎮州真定人初為武氏婦武卒太祖納之太祖兵入京妃為劉銖所殺即位追册為貴妃德妃董氏鎮州靈壽人初為劉進超妻進超殁太祖聘之即位册為德妃世宗貞惠皇后劉氏不知所出帝微時所娶封縣君太祖舉兵留京師為漢人所殺太祖即位封彭城郡夫人世宗即位追册為皇后宣懿皇后符氏彥卿之女初適李崇訓崇訓反誅帝納為夫人即位立為皇后顯德時崩皇后符氏宣懿后之妹宣懿后崩帝納之恭帝立尊為皇太后宋太祖皇帝始因五代之制置司簿掌宫中簿書出納之事又置司賔並封縣君又置樂使主宫中聲伎並賜裙帔太宗置尚宫太監及知內省充內宣徽南院使兼承旨并司簿或封國夫人郡夫人又置寶省尚食封縣君又置司寶司儀司給或授郡君縣君又樂使之下增置副使又改內省為尚書內省令尚官太監並號尚書司給司簿同掌宫籍及司出給改祗候人為御侍衣服為司衣梳箆為司飾枕被為司寢湯藥為司藥樂使為仙韶使副使為仙韶副使弟子呼供奉又置直筆書省主事改茶器為翰林局掌御閣為直閣掌宫門為直門掌燈火為掌燈掌從物為直仗針線院為裁縫院又令司簿兼掌寶司言兼監班司儀兼承宣掌寶司儀及仙韶使副使仍封縣君又司記知尚書內省公事而皆賜以裙帔真宗置淑容順容婉儀婉容並從一品在昭儀上又置貴儀在淑容之上又置司宫令正四品在尚宫之上太祖孝惠皇后賀氏開封人太祖正妃初封會稽郡夫人顯德五年崩建隆三年追册為皇后孝明皇后王氏邠州新平人太祖繼妃建隆元年八月立為皇后乾德元年崩孝章皇后宋氏河南洛陽人乾德六年納為皇后太宗即位號開寶皇后居西宫至道元年崩太宗淑德皇后尹氏相州鄴人太宗正妃早崩太平興國元年追册為皇后懿德皇后符氏陳州宛邱人太宗繼妃帝為晉王封越國夫人開寶八年崩太平興國元年追册為皇后元德皇后李氏真定人初為太宗後宫封夫人生真宗太平興國二年崩真宗即位追尊為皇太后明德皇后李氏潞州上黨人太宗妃雍熙元年立為皇后真宗立尊為皇太后貴妃孫氏開封人昭容吳氏錢塘人尚宫李氏徐氏順容邵氏揚州人俱太宗後宫朱貴妃太宗後宫為才人後入道明道中卒秦國夫人劉氏真宗乳母始封齊國夫人真宗即位封秦國延夀保聖夫人咸平元年薨帝以乳保之恩事之如母舉哀制服真宗莊懷皇后潘氏大名人真宗元妃端拱二年崩至道三年追册為皇后莊穆皇后郭氏太原人真宗繼妃帝繼位立為皇后景德四年崩章獻明肅皇后劉氏益州人景德初為美人進德妃莊穆后崩立為皇后仁宗即位尊為皇太后章懿皇后李氏杭州人入宫為司寢生仁宗進位婉儀明道元年進宸妃薨章獻既崩追尊為皇太后章惠皇后楊氏益州郫人初為才人進婉儀仁宗在乳褓有護視功帝即位進皇太妃章獻崩遺誥以為皇太后杜貴妃真宗後宫後入道國初立后妃皆不行册禮大中祥符七年封婉儀楊氏為淑妃翰林草制付中書不宣於外廷乾興元年遺制尊皇后為皇太后淑妃為皇太妃亦不果行册禮自雍熙後后妃乃寫告身用金華羅紙金塗褾袋有司進入近臣牧伯皇親皆修貢禮為賀仁宗廢后郭氏其先應州金城人天聖中册為皇后立九年以後宫嬖寵忿爭坐廢出居瑶華宫號金庭教主沖靜仙師又二年暴薨追册為皇后嘉祐中帝欲置影殿於洪福寺禮官因請祔廟下兩制議未定而知制誥劉敞言春秋之義不薨於寢不赴同姓不反哭於廟則不言夫人不稱小君徒以禮不足故名號闕然然則名號與禮非同物也名號存而禮不足因不正其稱况敢正其議乎郭后於三者無一焉而欲正其禮恐未安於義也傳曰不有廢也君何以興廢興之間固必有正與不正之理存焉今欲扶所廢以為正亦將抑所興以為不正歟古者不二嫡則萬世之後宗廟之禮豈臣子所當擅輕重哉議者或謂郭氏之追命也既復其號不得不異其禮譬之大臣坐非辜之貶者茍明其非辜則復用之豈得不遂使為大臣乎臣謂物有殊類而異勢未可以相凖臣之與妻其義雖均然逐臣可以復歸放妻不可復合臣衆而妻一也禮官張洞言郭后之沒不得其所責當歸於朝廷死者何罪豈有始儷宸極終不廟食邪議者欲用後漢東晉故事或祭於陵寢或築宫於外稽之二史皆曰母后亦未見其合也惟唐立别廟遇禘祫則享之於義為允敞又言郭后所以然者蓋於時聖慮在宗廟社稷之際也昔漢光武以后郭氏怨懟廢之然當時羣臣不以光武為情有厚薄亦不以郭氏為不當廢者其意識逺也今陛下之慮豈不然乎光武雖廢郭氏然顧待其家不衰亦明退人以義不緣於私也此又詔書所以追復郭氏之意矣用平生之眷故尊以虛名顧禮義之正故絶其祔廟是范曄所謂使後世不見有隆薄進退之隙者也今洞之意以追復郭后則出於天子以停止廟諡則出於大臣共一詔書也而論之異同未知洞何從見之若不幸此言傳於後而且歸過君父虧損聖德此其一也臣前奏以為廢興不兩立人君不二嫡使萬世之後禮分不明洞不以此為辨若不幸朝廷過聽之是雖自以能訐上起廢為功而且陰福母后妄瀆禮正此其二也故臣以謂非臣子之義忠信之道矣其後議卒不上朝廷亦未遑有所行也按郭后正位宫闈者九年其廢也坐與後宫爭寵非如前代若霍若賈之徒有不可恕之大罪也是以當時范文正公輩力爭之以為過舉失德既而昭陵悔悼追復位號蓋賢於漢之景武唐之髙宗元宗矣既復位號則享祀乃禮之正而劉原父力爭之夫古人所謂並后二嫡者但謂不當使妾上僭耳如后既廢而復則固后也又已殁則不嫌其為先后也何二嫡之有且當時曹后在位而溫成以宫嬪專寵及其殁也追册皇后置立園廟乃其失禮之尤大者貢甫不彼之正而此之泥何邪慈聖光獻皇后曹氏真定人景祐元年册為皇后英宗即位尊為皇太后景祐元年九月立皇后曹氏冬至行册禮與通禮異不立仗不設縣前一日守宫設次於朝堂册寶使副次於內東門命婦次於受册寶殿門外設皇后受册寶位於殿庭階下北向奉禮設册寶使位於內東門外副使內侍位於其南差退東向北上册寶案位於使前南向又設內給事位於北廂南向其日百官常服早入次禮官通事舍人先引中書令侍中門下侍郎中書侍郎及捧册寶官執事人綘衣介幘詣垂拱殿門就次以俟册降禮官通事舍人分引宰臣樞密册寶使副百官入文德殿庭立班東西相向北上內侍二員自內承旨降册寶率執事者捧册寶出垂拱殿捧册寶官俱搢笏率執事人禮官導中書侍郎押册中書令後從門下侍郎押寶侍中後從援衛如儀由東上閣門出至文德殿庭權置禮官通事舍人引使副就承制位次引侍中於使前西向稱有制典儀曰再拜贊者承傳使副在位官皆再拜宣曰贈尚書令冀王曹彬孫女册為皇后命公等持節展禮使副再拜侍中還位門下侍郎持節帥主節使詣東北主節以節授門下侍郎門下侍郎執節授册使册使跪受興付主節幡隨節立於使左次引中書令侍中詣册寶東北西向立中書侍郎引册案立於中書令之右中書令取册授册寶使使跪受興置於案中書令侍郎退復本班又門下侍郎引寶案於侍中之右侍中跪取寶以授册寶使使跪受興置於案侍中門下侍郎退復本位典儀再拜如前禮官通事舍人引使副押寶持節者前導捧册寶官捧舁援衛以次出朝堂由右升龍門入大慶殿門由殿西過宣祐門詣內東門內臣引內外命婦俱入就位立內侍詣閣奏請皇后首飾褘衣册寶至內東門外位使副東向立內給事進就南向位禮官通事舍人引使就內給事前面北向跪稱册寶使李迪副使王隨奉制授皇后册寶訖內給事入詣受册寶殿閣皇后前跪奏內侍進詣使前面西跪受册寶以授內謁者監使退復位內謁者監主當內臣持册寶入內東門內侍從之以次入詣殿庭內侍贊引皇后降立庭中北向位內侍跪取册又內侍跪取寶興進立於皇后之右少前西向內侍二員進立於皇后之左少前東向又內侍稱有制內侍贊皇后再拜內侍奉册進授皇后皇后以授內侍內侍又奉寶亦然復贊再拜前導皇后升座南向內臣引內外命婦稱賀如常儀內侍進詣皇后前跪奏禮畢內侍前導皇后降座還閣內外命婦班退少頃皇后常服謝皇帝皇太后用常禮百官東上閣門拜表稱賀其册如皇太子用珉玉五十簡褾首在內匣隨册之長寶用金方一寸五分髙一寸文曰皇后之寶盤螭紐綬并沿册寶法物約舊制為之匣緑朱漆金塗銀裝册文曰皇帝若曰天地定位隂陽相成人道貫之以綱大倫后德配之以熙內治聖人有以端其本也故造舟之迎言乎備詩人有以美其化也故周南之風著乎始粵朕沖昧祗若丕搆深惟承荷之重輔佐攸艱用簡納賢明協於人神之望咨爾贈尚書令冀王配饗太祖廟庭曹彬孫女惟乃祖克有武功勤勞王家保勳不伐享