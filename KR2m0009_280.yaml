body:
  text: 文獻通考卷二百八十鄱陽馬端臨貴與著象緯考三十二次度數晉天文志十二次班固取三統歷十二次配十二野其言最詳又有費直説周易蔡雍月令章句所言頗有先後魏太史令陳卓更言郡國所入宿度今附而次之中興天文志王奕按星本無次古昔黃帝因日月所會而為之名耳帝王世紀一度二千九百三十二里分為十二次一次三十度三十分度之十四周天積一百七萬九百一十三里經三十五萬六千九百七十一里三統歷詳矣然帝王世紀費直周易蔡雍月令又與三統殊少或差一二度多或五六度何也是日行也每歲有差則日月所會之次分度亦異此言十二次所以不同也自軫十二度至氐四度為夀星於辰在辰鄭之分野屬兖州費直周易分野夀星起軫七度蔡雍月令章句夀星起軫六度自氐五度至尾九度為大火於辰在卯宋之分野屬豫州費直起氐十一度蔡雍起亢八度自尾十度至南斗十一度為析木於辰在寅燕之分野屬幽州費直起尾九度蔡雍起尾四度自南斗十二度至須女七度為星紀於辰在丑吳越之分野屬揚州費直起斗十度蔡雍起斗六度自須女八度至危十五度為元枵於辰在子齊之分野屬青州費直起女六度蔡雍起女二度自危十六度至奎四度為娵訾於辰在亥衛之分野屬并州費直起危十四度蔡雍起危十度自奎五度至胃六度為降婁於辰在戌魯之分野屬徐州費直起奎二度蔡雍起奎八度自胃七度至畢十一度為大梁於辰在酉趙之分野屬冀州費直起婁十度蔡雍起婁一度自畢十二度至東井十五度為實沈於辰在申魏之分野屬益州費直起畢九度蔡雍起畢六度自東井十六度至栁八度為鶉首於辰在未秦之分野屬雍州費直起井十二度蔡雍起井十度自栁九度至張十六度為鶉火於辰在午周之分野屬三河費直起栁五度蔡雍起栁三度自張十七度至軫十一度為鶉尾於辰在已楚之分野屬荆州費直起張十三度蔡雍起張十二度州郡躔次陳卓范蠡鬼谷先生張良諸葛亮譙周京房張衡並云角亢氐鄭兖州東郡入角一度東平任城山陽入角六度泰山入角十二度濟北陳留入亢五度濟隂入氐一度東平入氐七度房心宋豫州潁川入房一度汝南入房二度沛郡入房四度梁國入房五度淮陽入心一度魯國入心三度楚國入心四度尾箕燕幽州營州入箕中十度上谷入尾一度漁陽入尾三度右北平入尾七度西河上郡北地遼西東入尾十度涿郡入尾十六度渤海入箕一度樂浪入箕三度元菟入箕六度廣陽入箕九度斗牽牛須女吳越揚州九江入斗一度廬江入斗六度豫章入斗十度丹陽入斗十六度會稽入牛一度臨淮入牛四度廣陵入牛八度泗水入女一度六安入女六度虛危齊青州齊國入虛六度北海入虛九度濟南入危一度樂安入危四度東萊入危九度平原入危十一度災川入危十四度營室東壁衛并州安定入營室一度天水入營室八度隴西入營室四度酒泉入營室十一度張掖入營室十二度武都入東壁一度金城入東壁四度武威入東壁六度燉煌入東壁八度奎婁胃魯徐州東海入奎一度琅琊入奎六度髙密入婁一度城陽入婁九度膠東入胃一度昴畢趙冀州魏郡入昴一度巨鹿入昴三度常山入昴五度廣平入昴七度中山入昴一度清河入昴九度信都入畢三度趙郡入畢八度安平入畢四度河間入畢十度真定入畢十三度觜參魏益州廣漢入觜一度越嶲入觜三度蜀郡入參一度犍為入參三度牂牱入參五度巴郡入參八度漢中入參九度益州入參七度東井輿鬼秦雍州雲中入東井一度定襄入東井八度雁門入東井十六度代郡入東井二十八度太原入東井二十九度上黨入輿鬼二度栁七星張周三輔𢎞農入栁一度河南入七星三度河東入張一度河內入張九度翼軫楚荆州南陽入翼六度南郡入翼十度江夏入翼十二度零陵入軫十一度桂陽入軫六度武陵入軫十度長沙入軫十六度容齋洪氏隨筆曰十二國分野上屬二十八宿其為義多不然前輩固有論之者矣其甚不可曉者莫如晉天文志謂自危至奎為娵訾於辰在亥衛之分野也屬并州且衛本受封於河內商墟後徙楚邱河內乃冀州所部漢屬司𨽻其他邑皆在東郡屬兖州於并州了不相干而并州之下所列郡名乃安定天水隴西酒泉張掖諸郡自係涼州耳又謂自畢至東井為實沈於辰在申魏之分野也屬益州且魏分晉地得河內河東數十縣於益州亦不相干而雍州為秦其下乃列雲中定襄雁門代太原上黨諸郡蓋又自屬并州及幽州耳謬亂如此而出於李淳風之手豈非蔽於天而不知地乎天漢起沒天河亦一名天漢起自東方箕尾間遂乃分為南北道南經傅説入魚淵開籥戴辨鳴河鼓北經龜宿貫箕邊次絡斗魁冒左旗又合南道天津湄二道相合西南行分夾匏瓜絡人星杵畔造父騰蛇精王良附路閣道平登此太陵泛天船直到卷舌又南征五車駕向北河南東井水位入吾驂水位過了東南遊經次南河向闕邱天狗天紀與天稷七星南畔天河沒天漢起東方經箕尾之間謂之天河亦謂之漢津乃分為二道其南經傅説魚天籥天辨河鼓其北經龜貫箕下次絡南斗魁左旗至天津下而合南道乃西南行又分夾匏瓜絡人星杵造父騰蛇王良附路閣道北端太陵天船卷舌而南行絡五車經北河之南入東井水位而東南行絡南河闕邱天狗天紀天稷在七星南而沒張衡云津漢者金之氣也其本曰水漢中星多則水星少則旱中興天文志石氏云天漢蓋天一所生凝育而成者天所以為東南西北襟𢃄之限也天下河漢之源蓋出於此故河漢者亦地所以為東南西北之限也漢張氏云八極之維徑二億三萬二千三百里南北則短減千里東西則廣增千里自地至天半於八極則地之深亦如之唐袁氏云以是觀之天漢越東北而止西南其修徑可知矣七曜日月隋天文志日循黃道東行一日一夜行一度三百六十五日有竒而周天行東陸謂之春行南陸謂之夏行西陸謂之秋行北陸謂之冬行以成隂陽寒暑之節是故傳云日為太陽之精主生養恩德人君之象也又人君有瑕必露其慝以告示焉故日月行有道之國則光眀人君吉昌百姓安寧日變色有軍軍破無軍喪侯王其君無德其臣亂國則日赤無光日失色所臨之國不昌日晝昏行人無影到暮不止者上刑急下人不聊生不出一年有大水日晝昏烏鳥羣鳴國失政日中烏見主不眀為政亂國有白衣會日中有黑子黑氣乍三乍五臣廢其主日食隂侵陽臣掩君之象有亡國有死君有大水日食見星有殺君天下分裂王者修德以禳之月者隂之精也其形圓其質清日光照之則見其眀日光所不照則謂之魄故月望之日日月相望人居其間盡覩其眀故形圓也二弦之日日照其側人觀其傍故半眀半魄也晦朔之日日照其表人在其裏故不見也其行有遲疾其極遲則日行十二度強極疾則日行十四度半強遲則漸疾疾極漸遲二十七日半強而遲疾一終矣又月行之道斜帶黃道十三日有竒在黃道表又十三日有竒在黃道裏表裏極逺者去黃道六度二十七日有竒隂陽一終張衡云對日之衝其大如日日光不照謂之暗虛暗虛逢月則月食值星則星亡今歷家月望行黃道則值暗虛矣值暗虛有表裏深淺故食有南北多少月為太隂之精以之配日女主之象也以之比德刑罰之義列之朝廷諸侯大臣之類故君眀則月行依度臣執權則月行失道大臣用事兵刑失理則月行乍南乍北女主外戚擅權則或進或退月變色將有殃月晝眀姦邪並作君臣爭眀女主失行隂國兵強中國飢天下謀僣數月重見國以亂亡張衡靈憲曰懸象著眀莫大乎日月其徑當天周七百三十六分之一地廣二百四十二分之一日者陽精之宗積而成鳥象烏而有三趾陽之類其數竒月者隂精之宗積而成獸象兔隂之類其數耦其後有馮焉者羿請無死之藥於西王母姮娥竊之以奔月將往枚筮之於有黃有黃占之曰吉翩翩歸妹獨將西行逄天晦芒毋驚毋恐後且大昌姮娥遂託身於月是為蟾蜍夫日譬猶火月譬猶水火則外光水則含景故月光生於日之所照魄生於日之所蔽當日則光盈就日則光盡也衆星被耀因水轉光當日之衝光常不合者蔽於地也是謂暗虛在星星微月過則食日之薄地其眀也繇暗視眀眀無所屈是以望之若火方於中天天地同眀繇眀瞻暗暗還自奪故望之若水火當夜而揚光在晝則不眀也月之於夜與日同而差微星則不然強弱之差也日月行道漢天文志日有中道月有九行中道者黃道一曰光道光道北至東井去北極近南至牽牛去北極逺東至角西至婁去極中夏至至於東井北近極故晷短立八尺之表而晷景長尺五寸八分冬至至於牽牛逺極故晷長立八尺之表而晷景長丈三尺一寸四分春秋分日至婁角去極中故晷中立八尺之表而晷景長七尺三寸六分此日之去極逺近之差與景長短之制也去極逺近難知要以晷景晷景者所以知日之南北也日陽也陽用事則日進而北晝進而長陽勝故為溫暑隂用事則日退而南晝退而短隂勝故為涼寒也故曰進為暑退為寒若日之南北失節晷過而長為常寒退而短為常燠此寒燠之表也故曰為寒暑一曰晷長為潦短為旱奢為扶鄭氏曰扶當為蟠齊魯之間聲如酺酺扶聲近蟠止不行也蘇林曰景形奢大也晉灼曰扶附也小臣佞媚附近君子之側也扶者邪臣進而正臣疏君子不足姦人有餘月有九行者黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東立春春分月東從青道立秋秋分西從白道立冬冬至北從黑道立夏夏至南從赤道然用之一決房中道青赤出陽道白黑出隂道若月失節度而妄行出陽道則旱風出隂道則隂雨凡君行急則日行疾君行緩則日行遲日行不可指而知也故以二至二分之星為候日東行星西轉冬至昏奎八度中夏至氐十三度中春分栁一度中秋分牽牛三度七分中此其正行也日行疾則星西轉疾事勢然也故過中則疾君行急之感也不及中則遲君行緩之象也至月行則以晦朔決之日冬則南夏則北冬至於牽牛夏至於東井日之所行為中道月五星皆隨之也箕星為風東北之星也東北地事天位也孟康曰東北陽日月五星起於牽牛故為天位坤在西南紐於陽為地統故為地事也故易曰東北喪朋及巽在東南為風風陽中之隂大臣之象也其星軫也月去中道移而東北入箕若東南入軫則多風西方為雨雨少隂之位也月失中道移而西入畢則多雨故詩云月離於畢俾滂沱矣言多雨也星傳曰月入畢則將相有以家犯罪者言隂盛也書曰星有好風星有好雨月之從星則以風雨言失中道而東西也故星傳曰月南入牽牛南戒民間疾疫月北入太微出坐北若犯坐則下人謀上一曰月為風雨日為寒溫冬至日南極晷長南不極則溫為害夏至日北極晷短北不極則寒為害故書曰日月之行則有冬有夏也政治變於下日月運於上矣月出房北為雨為隂為亂為兵出房南為旱為夭喪水旱至衝而應及五星之變必然之效也中興天文志按三統歷日躔與堯典月令不同日行黃道每嵗有差故也江默謂嵗差者日躔於一嵗之間行周天度未及餘分而日已至焉故每嵗常有不及之分然嵗差古無有其法漢洛下閎雖知太初歷八百年當差一度後人未究其悉也晉虞喜始覺之歷家祖述其説自唐堯至漢自漢至本朝冬至日躔各各不同然後知嵗差之法得天甚密不可廢也然又嘗考嵗差諸説不同宋大眀歷以四十年差一度失之太過何承天倍其數以百年退一度又反不及惟隋劉焯取二家中數以七十五年退一度故唐一行詳考三家而知劉焯之為尤近遂以大衍歷推之乃得八十三年而差一度蓋大衍分一度為三千四十分其所差之分一嵗三十有六太積至八十三年則差一度又不若本朝紀元歷以七十八年差一度為最密也即其法推之慶歷甲申冬至日在斗五度上距唐開元甲子三百二十一年日差五度蓋唐志開元甲子日在赤道斗中十度是也開元甲子上距漢太初元年丁丑八百二十七年日差十度蓋唐志以開元大衍歷嵗差引而退之則太初元年冬至日在斗二十度是也太初丁丑上距秦莊襄王元年一百四十五年日差二度冬至日在斗二十二度蓋月令云日在斗是也秦莊襄王元年上距堯甲子二千二十八年日差二十八度冬至日在虛一度日沒而昴中故堯典言日短星昴也説者不知嵗差之法以堯典較之月令逮於今日不啻差一次求其説而不可得遂以為節氣有初中之殊又謂古以午為中皆失之逺矣又曰開禧占測冬至日已在箕宿較之堯時幾退四十餘度差自漢太初至今已差一氣有餘而太陽之躔十二次大約中氣前後乃得本月宫次蓋太陽本日行一度近嵗紀元歷定嵗差約退一分四十餘秒蓋太陽日行一度而微遲緩一年周天而微差積纍分秒而躔度見焉循是以往萬有五千年後將所差半周天審如是寒暑易位乎以俟治歷者又曰占天之法以二十八宿為綱維分列四方南北去極各九十有一度有竒南低而北昻去地各三十有六度一定不易者名之曰赤道以日躔半在赤道內半在赤道外出入內外極逺者皆二十有四度以其行赤道之中者名之曰黃道凡五緯皆隨日由黃道行惟月之行有九道四時交會歸於黃道而轉變焉故有青赤黑白四者之異名夫赤道終古不移則星舍宜無盈縮矣然自唐一行作大衍歷以儀揆測之得畢觜參鬼四宿分度與古不同本朝皇祐初日官周淙以新儀測候與唐一行尤異紹聖二年清臺以赤道度數有差復命考正惟牛尾室栁四宿與舊法合其他二十四宿躔度或多或寡蓋天度之不齊隨古今而變者也若夫黃道橫絡天體列宿躔度自隨嵗差而增減中興以來用統元紀元及乾道淳熙開禧用統天會元每一歷更一黃道其多寡之異有不可勝載者而步占家亦隨各歷之躔度焉又曰王奕按渾天説黃道九道厥初本無是因日行而強名之日行曰黃道者黃色之中也黃道即中道也日道居中月五星循左右而行故日道獨謂之黃月行青朱白黑道各兼黃道而言故又謂之九道也是故月道出入於黃道其最逺者去黃道六度月行黃道之內曰隂歷行黃道之外曰陽歷北為內南為外然漢志謂黃道北至井去極近南至牽牛去極逺東至角西至婁去極中晉葛洪則謂黃道與赤道東交於角西交於奎南至斗北至井唐志又云黃道春分與赤道交於奎秋分交於軫南至斗北至井與漢志殊何也蓋赤道分天之半今古不易黃道本無定體因日行而為之名日之行也每嵗有差漢志主太初而言此古今所以不同也又曰按天文志黃道北至東井去北極近南至牽牛去北極逺東至角西至婁去極中立春春分月從青道立秋秋分月從白道立冬冬至北從黑道立夏夏至南從赤道吳興沈氏云月行黃道之南謂之朱道行黃道之北謂之黑道黃道之東謂之青道黃道之西謂之白道黃道內外各四并黃道為九日月之行有遲有速難可以一術御也故因其合散分為數段每段以一色名之欲以别算位而已如陳卓於三家星别其色以識之如算法用赤籌黑籌以别之耳而歷家不知其意遂以為實有九道甚可嗤也沈氏筆談曰或問豫以日月之形如丸邪如扇也若如丸則其相遇豈不相礙豫對曰日月之形如丸何以知之以月盈虧可驗也月本無光猶銀丸日耀之乃光耳光之初生日在其傍故光側而所見才如鈎日漸逺則斜照而光稍滿如一彈丸以粉塗其半側視之則粉處如鈎對視之則正圓此有以知其如丸也日月氣也有形而無質故相直而無礙五星嵗星曰東方春木於人五常仁也五事貌也仁虧貌失逆春令傷木氣則罰見嵗星嵗星盈縮以其舍命國其所居久其國有德厚五榖豐昌不可伐其對為衝嵗乃有殃嵗星安靜中度吉盈縮失次其國有變不可舉事用兵又曰人主之象也色欲眀光潤澤德合同又曰進退如度姦邪息變色亂行主無福又主福主大司農主齊吳主司天下諸侯人君之過主嵗五榖赤而角其國昌赤黃而沉其野大穰張衡云嵗星者東方之精蒼帝之子一名攝提一名重華一名應星一名紀星晉灼曰太嵗在四仲則嵗行三宿太嵗在四孟四季則嵗二宿二八十六三四十二而行二十八宿十二嵗而周天西漢天文志嵗星所在國不可伐可以伐人超舍而前為贏退舍為縮贏其國有兵不復縮其國有憂其將死國傾敗所去失地所之得地一曰當居不居國亡所之國昌已居之又東西去之國凶不可舉事用兵安靜中度吉出入不當其次必有天祅見其舍嵗星贏而東南孟康曰五星東行天西轉嵗星晨見東方行疾則不見不見則變為祅星石氏見彗星甘氏不出三月乃生彗本類星末類彗長二丈贏東北石氏見覺星甘氏不出三月乃生天棓本類星末鋭長四尺縮西南孟康曰嵗星當伏西方行遲早沒變為祅星也石氏見欃雲如牛韋昭曰欃音參差之參甘氏不出三月乃生天槍左右鋭長數丈縮西北石氏見欃雲如馬甘氏不出三月乃生天欃本類星末鋭長數丈石氏槍欃棓彗異狀其殃一也必有破國亂君伏死其辜餘殃不盡為旱凶飢暴疾至日行一尺出二十餘日乃入甘氏其國凶不可舉事用兵出而易所當之國是受其殃又曰祅星不出三年其下有軍及失地若國君喪中興天文志嵗星色青比參左肩小於太白熒惑曰南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑熒惑法使行無常出則有兵入則兵散各以舍命國為亂為賊為疾為喪為飢為兵所居國受殃環繞鉤已芒角動搖變色乍前乍後乍左乍右其殃愈甚其南丈夫北女子喪周旋止息乃為死喪寇亂其野亡地其失行而速兵聚其下順之戰勝又曰熒惑主大鴻臚主死喪主司空又為司馬主楚吳越以南又司天下羣臣之過司驕奢亡亂妖孽主嵗成敗又曰熒惑不動兵不戰有誅將其出色赤怒逆行成鈎已戰凶有圍軍鈎已有芒角如鋒刃人主無出宫下有伏兵芒大則人民怒君子遑遑小人浪浪不有亂臣則有大喪人欺吏吏欺王又為理外則理兵內則理政為天子之理也故曰雖有眀天子必視熒惑所在其入守犯太微軒轅營室房心主命惡之張衡云熒惑為執法之星其精為風伯之師或童兒歌謠嬉戲晉灼曰熒惑常以十月入朝太微受制而出行列宿司無道出入無常也二嵗而周天中興天文志熒惑色赤比心大星大小類填按五星之行過有道之分則循軌順行天下義寧年榖順成過無道之分則犯鬭變色為災為兵曰吉曰凶未有不關於人事者也然五星之變俱足以致殃熒惑太白為甚而熒惑尤甚蓋熒惑火也性烈而不常又為執法之官司天下過失故其應尤為亟也填星曰中央季夏土信也思心也仁義禮智以信為主貌言視聽以心為政故四星皆失填乃為之動動而盈侯王不寧縮有軍不復所居之宿國吉得地及女子有福不可伐去之失地若有女憂居宿久國福厚易則薄失次而上二三宿曰盈有主命不成不乃大水失次而下曰縮后戚其嵗不復不乃天裂若地動一曰填為黃帝之德女主之象主德厚安危存亡之機司天下女主之過又曰天子之星也天子失信則填星大動張衡云填星者皇帝之子女主之象也一名地候晉灼曰常以甲辰之始建斗之嵗填行一宿二十八嵗而周天中興天文志填星色黃比參右肩小於辰按唐孔氏謂五星之行金水日行一度火七百八十日行星四百一十五度木三百九十八日行星三十三度惟土三百七十七日行星十二度蓋土性重厚而舒緩其行最遲故其為變亦少容齋洪氏隨筆曰世之伎術以五星論命者大率以火土為惡故有晝忌火星夜忌土之語土填星也行遲每主一宫則二嵗四月乃去以故為災最久然以國家論之則不然苻堅欲南伐嵗鎮守斗識者以為不利史記天官書云五潢五帝居舍火入旱金兵水水宋均曰不言木土者德星不為害也又云五星犯北落軍起火金水尤甚木土軍吉又云填星所居國吉未當居而居已去而復還居之其國得土若當居而不居既已居之又西東去其國失土其居久其國福厚其居易輕速也福薄如此則填星乃為大福德與木無異豈非國家休祥所係非民庶可得侔邪太白曰西方秋金義也言也義虧言失逆秋令傷金氣罰見太白太白進退以候兵髙卑遲速靜躁見伏用兵皆象之吉其出西方失行夷狄敗出東方失行中國敗未盡期日過參天病其對國若經天天下革人更王是謂亂紀人民流亡晝與日爭眀強國弱小國強女主昌又曰太白主大臣其號上公也大司馬位謹候此張衡云太白者白帝之子一名火政一名官星一名眀堂一名文表一名太皥一名終星一名天相一名天浩一名序星一名梁星一名威星一名大囂一名大爽晉灼曰常以正月甲寅與熒惑晨出東方二百四十日而入入四十日又出西方二百四十日而入入三十五日而復出東方出以寅戌入以丑未一嵗而周天西漢天文志曰日方南太白居其南日方北太白居其北為贏侯王不寧用兵進吉退凶日方南太白居其北日方北太白居其南為縮侯王有憂用兵退吉進凶當出不出當入不入為失舍不有破軍必有死王之墓有亡國一曰天下偃兵壄有兵者所當之國大凶當出不出未當入而入天下偃兵兵在外入未當出而出當入而不入天下兵起有至破國未當出而出未當入而入天下舉兵所當之國亡當期而出其國昌出東為東方入為北方出西為西方入為南方所居久其國利易其鄉凶蘇林曰疾過也一説易鄉而出入也晉灼曰上言出而易言疾過是也入七日復出將軍戰死入十日復出相死之入又復出人君惡之已出三日而復微入三日乃復盛出是為耎而伏晉灼曰耎退也不進而伏伏不見也其下國有軍其衆敗將北已入三日又復微出三日乃復盛入其下國有憂帥師雖衆敵食其糧用其兵虜其帥出西方失其行夷狄敗出東方失其行中國敗一曰出蚤為月食晚為天祅及彗星將發於亡道之國太白出而留桑榆間病其下國晉灼曰行遲而下也正出舉目平正出桑榆上餘二千里也上而疾未盡期日過參天病其對國晉灼曰三分天過其一此酉戌之間也太白經天天下革民更主孟康曰謂出東入西出西入東也太白隂星出東當伏東出西當伏西過午為經天晉灼曰日陽也日出則星亡晝見午上為經天也是為亂紀人民流亡晝見與日爭眀強國弱小國強女主昌太白兵象也出而髙用兵深吉淺凶卑淺吉深凶行疾用兵疾吉遲凶行遲用兵遲吉疾凶角敢戰吉不敢戰凶擊角所指吉逆之凶進退左右用兵進退左右吉靜凶圜以靜用兵靜吉躁凶出則兵出入則兵入象太白吉反之凶凡太白所出所直之辰其國得其位得其位者戰勝所直之辰順其色而角者勝其色害者敗晉灼曰鄭色黃而赤蒼小敗宋色黃而赤黑小敗楚色赤黑小敗燕色黃黑小敗皆大角勝也太白白比狼赤比心黃比參右肩青比參左肩黑比奎大星色勝位晉灼曰有色勝得位也行勝色晉灼曰太白行得度勝有色也行得盡勝之晉灼曰行應天度雖有色得位行盡勝之行重而色位輕星經得字作德中興天文志太白色白比狼星而大又大於嵗星辰星曰北方冬水智也聽也智虧聽失逆冬令傷水氣罰見辰星辰星見則主刑主廷尉主燕趙又為燕趙代以北宰相之象亦為殺伐之氣戰鬭之象又曰軍於野辰星為偏將之象無軍為刑事和隂陽應效不效其時不和出失其時寒暑失其節邦當大飢當出不出是謂擊卒兵大起在於房心間地動亦曰辰星出入躁疾常主夷狄又曰蠻夷之星也亦主刑法之得失色黃而小地大動光眀與月相逮其國大水張衡云辰星一名勾星一名㸑星一名伺星晉灼曰常以二月春分見奎婁五月夏至見東井八月秋分見角亢十一月冬至見牽牛出以辰戍入以丑未二旬而入晨候之東方夕候之西方一嵗而周天西漢天文志辰星出蚤為月食晚為彗星及天祅一時不出其時不和四時不出天下大飢失其時而出為當寒反溫當溫反寒與他星遇而鬭天下大亂晉灼曰祅星彗孛之屬也一曰五星中興天文志辰星色黑比奎大星小於嵗星凡五星有色大小不同各依其行而順時應節色變有類凡青皆比參左肩赤比心大星黃比參右肩白比狼星黑比奎大星不失本色而應其四時者吉色害其行凶凡五星所出所行所直之辰其國為得位者嵗星以德熒惑有禮填星有福太白兵強辰星隂陽和所行所直之辰順其色而有角者勝其色害者敗居實有德也居虛無德也色勝位行勝色行得盡勝之營室為清廟嵗星廟也心為眀堂熒惑廟也南斗為文太室填星廟也亢為疏廟太白廟也七星為員官辰星廟也五星行至其廟謹候其命凡五星盈縮失位元精降於地為人嵗星降為貴臣熒惑降為童兒歌謠嬉戲填星降為老人婦女太白降為壯夫處於林麓辰星降為婦人吉凶之應隨其象吉凡五星木與土合為內亂飢與水合為變謀而更事與火合為飢為旱與金合為白衣之會合鬭國有內亂野有破軍為水太白在南嵗在北名曰牡年榖大熟太白在北嵗星在南年或有或無火與金合為鑠為喪不可舉事用兵從軍為軍憂離之軍却出太白隂分宅出其陽偏將戰與土合為憂主孽與水合為北軍用兵舉事大敗一曰火與水合為焠不可舉事用兵土與水合為壅沮不可舉事用兵有覆軍下師一曰為變謀更事必為旱與金合為疾為白衣會為內兵國亡地與木合國飢水與金合為變謀為兵憂入太白中而上出破軍殺將客勝下出客亡地視旗所指以命破軍環繞太白若與鬭大戰客勝凡木火土金與水鬭皆為戰兵不在外皆為內亂凡同舍為合相陵為鬭二星相近其殃大相逺無傷七寸以內必之凡月蝕五星其國亡嵗以飢熒惑以亂填以殺太白以強國戰辰以女亂凡五星入月其野有逐相太白將僇凡五星所聚其國王天下從嵗以義從熒惑以禮從填以重從太白以兵從辰以法各以其事致天下也三星若合是謂驚立絶行其國外內有兵天喪人民改立侯王四星若合是謂太陽其國兵喪並起君子憂小人流五星若合是謂易行有德受慶改立王者奄有四方子孫蕃昌亡德受殃離其國家滅其宗廟百姓離去被滿四方五星皆大其事亦大皆小事亦小凡五星色其圜白為喪為旱赤中不平為兵為憂青為水黑為疾疫為多死黃為吉皆角赤犯我城黃地之爭白哭泣聲青有兵憂黑有水五星同色天下偃兵百姓安寧歌儛以行不見災疾五榖蕃昌凡五星為政緩則不行急則過分逆則占熒惑緩則不入急則不出違道則占填緩則不還急則過舍逆則占太白緩則不入逆則占辰星緩則不出急則不入非時則占五星不失行則年榖豐昌凡五星分天之中積於東方中國利積於西方外國用兵者利辰星不出太白為客其出太白為主出而與太白不相從及各出一方為格野有軍不戰五星為五德之主其行或入黃道裏或出黃道表猶月行出有隂陽也終出入五常不可以算數求也其東行曰順西行曰逆順則疾逆則遲通而率之終為東行矣不東不西曰留與日相近而不見曰伏伏與日同度曰合其留行逆順掩合犯法陵變色芒角凡其所主皆以時政五常五官五事之得失而見其變木火土三星行遲夜半經天其初皆與日合度而後順行漸遲追日不及晨見東方行去日稍遲朝時近中則留留經旦過中則逆行逆行至夕時近中則又留留而又順先遲漸速以至於夕伏西方乃更與日合三星之行雖遲速不同其大略如此惟金水二星行速而不經天自始與日合之後行速而先日夕見西方去日前稍逺夕時欲近南方則漸遲遲極則留留而近日則逆行而合日在於日後晨見東方逆極則留留而後遲遲極去日稍逺旦時欲近南方則速行以追日晨伏於東方復與日合此五星合見遲速逆順留行之大經也昏旦者隂陽之大分也南方者太陽之位而天地之經也七曜行至陽位當天之經則虧昃留逆而不居焉此天之常道也三星經天二星不經天三天兩地之道也凡五星見伏留行逆順遲速應歷度者為得其行政合於常違歷錯度而失路盈縮者為亂行亂行則為天矢彗孛而有亡國革政兵飢喪亂之禍云古歷五星並順行秦歷始有金火之逆又甘石並時自有差異漢初測候乃知五星皆有逆行其後相承罕能察至後魏末清河張子信學藝博通尤精歷數因避葛榮亂隱於海島中積三十許年專以渾儀測候日月五星差變之數以算步之始悟日月交道有表裏遲速五星見伏有感召向背言日行在春分後則遲秋分後則速合朔月在日道裏則日食若在日道外雖交不虧月望值交則虧不問表裏又月行遇木火土金四星向之則速背之則遲五星行四方列宿各有所好惡所居遇其好者則留多行遲見早遇其惡者則留少行速見遲與常數並差少者差至五度多者差至三十許度其辰星之行見伏尤異晨應見在雨水後立夏前夕應見在處暑後霜降前並不見啓蟄立夏立秋霜降四氣之內晨夕去日前後三十六度內十八度外有木火土金一星者見無者不見後張胄元劉孝孫劉焯等依此差度為定入交食分及五星定見定行與天密會皆古人所未得也中興天文志夫二曜二氣之精也五緯五行之精也二躍俱順行五緯獨有退逆何也班氏謂三代盛時天下五緯順軌無逆行者周之末造人紀不修師旅數起故五緯始失常度而有逆行然則姬降而嬴世道趨末星軌遁常亦失其初歟易觀乎人文以察時變故星紀之逆順可以悚然懼矣又曰古法周天之數如嵗星謂十二年一周天乃約數耳前稱嵗星在四仲則行三宿在四孟四季則在二宿二八十六三四十二故十二年而行周二十八宿其説非是夫二十八宿度有廣狹而嵗星之行有贏縮豈得以十二年一周無差忒乎唐一行始言嵗星自商周迄春秋季年率百二十餘年而超一次因以為常以春秋亂世則其行速時平則其行遲其説尤迂既乃為後率前率之術以求之則其説益自相悖按劉歆三統歷推嵗星一百四十四年行天一百四十五次一千七百二十年剩行一周此古人所未究也又左氏疏以歷法推之周天凡十二次每次别為百四十四分嵗星每行一百四十五分是每年行一次之外尚餘一分積一百四十四年剩一次今紹興歷法嵗星每年行一百四十分是每年行一次之外有餘一分積一百四十四年剩一次矣殆據是乎餘四星之行固有順逆中間亦豈無差忒一行不復詳言蓋亦知之矣後之考歷者當能辨之然嘗考五星之行率循黃道惟金火二星遊行不測土水嵗星為變希則凡黃道所經順軌則不占惟陵犯留守則有凶咎如熒惑每入太微出端門星家謂受制而出實則黃道所經也而月與五星相遇亦多涉黃道內外之徑黃道邪界列宿各有尺數如房宿又有上中下三道焉此其所以易於陵犯是以清臺每言五星行次黃道所經諸星占家多不驗凡以此故要諸天人之際可畏有兆於此有感於彼其出沒顯晦飛流升降疾遲贏縮進退會散動移轉徙非邈無與於人是故精祲之交明君謹之能遇災而加懼見祥而滋警思其咎謝其過不敢怠寧王事之當然也善乎太史公之言曰太上修德其次修政其次修救其次修禳畏天者擇焉又曰按五星之變有合有散有犯有守有陵有歷有鬭有贏有縮有食同舍曰合變為妖星曰散寸以內光芒相及曰犯韋昭謂自下而往觸之為犯也居其宿曰守相冒而過曰陵韋昭謂突掩為陵也經之曰歷相擊曰鬭又曰離復合合復離為鬭早出曰贏晚出曰縮又失次上二三宿曰羸失次下二三宿曰縮星月相陵曰食吉凶各以類應不可誣已然有或不盡如所占何也曰日月五行俱行黃道不能無侵犯也惟迫近則殃大逺則無傷寸以內芒角相及則其占始應漢志曰近者殃大逺者殃毋傷後之星史不此之察猥見其差近遂譸張以為變此所以繁褻不驗文獻通考卷二百八十
