body:
  text: 文獻通考卷一百九鄱陽馬端臨貴與著王禮考四廵狩唐虞天子五載一廵狩晏子對齊景公曰天子適諸侯曰廵狩白虎通曰廵者循也狩者牧也爲天下循行守牧民也道德太平恐逺近不同又恐幽隱有不得所者故親行之行禮謹敬重人之至也鄭元云諸侯爲天子守土時一廵省所以必五年者因天道時有所生嵗有所成三嵗一閏天道小備五嵗再閏天道大備也羣后四朝孔安國曰各㑹朝於方嶽之下凡四處故曰四朝也堯舜同道舜攝則然堯又可知也歲二月東廵狩至於岱宗柴岱宗東嶽也特謂泰山爲岱宗者以其處東北居寅丑之間萬物始終之地隂陽交泰之所爲衆山之所宗主此其所以謂之岱宗是也望秩於山川張守節云乃望秩遥祭東方諸侯境内名山大川也言秩五嶽視三公四瀆視諸侯也肆覲東后遂見東方之諸侯恊時月正日同律度量衡時四時也月十二月也日三百六十日也律法制也度丈尺也量斗斛也衡斤兩也鄭元曰恊正四時之月數日名備其失悞具節炁晦朔恐諸侯有不同故因廵狩而合正之也修五禮吉凶軍賔嘉禮五玉五等諸侯之瑞也執之曰瑞陳列之曰玉三帛二生一死贄三帛纁元黄三孤所執二生羔鴈卿大夫所執也一死者雉士所䞇爲禮五月廵狩至南嶽衡山也八月廵狩至西嶽華山也十一月廵狩至北嶽恒山也皆如岱宗之禮白虎通曰二月八月晝夜分五月十一月隂陽終也歸格於藝祖用特孔安國曰廵狩四嶽然後歸告至文祖廟藝言文也言祖則考亦著特謂一牛也夏后氏因之王肅云天子五年一廵狩鄭元云五年者虞夏之制也太康尸位以逸豫滅厥德黎民咸貳乃盤游無度畋於有洛之表十旬弗反有窮后羿因民弗忍距於河由此失國周制十二年一廵狩大行人云十有二嵗王廵狩殷國殷衆也謂當方諸侯周以木德王嵗星是木王之星十二嵗一周以木象之故梁崔靈恩云取嵗星一周天道之備數鄭元註尚書云每歸用特者明每一嶽卽歸也因明四嶽禮同使其文相次是以終廵狩之後乃始云歸耳天子將廵狩𩔖乎上帝宜乎社造乎禰帝謂五精之帝所配祭南郊者謂靈威仰也𩔖宜造皆祭名也按曽子問諸侯適天子告祖禰此不言祖者白虎通曰七廟皆告之獨言禰者辭時先從禰後至祖以上遂行不敢留尊者之命故也職方氏先戒四方諸侯曰各修平乃守考乃職事無敢不敬戒國有大刑乃猶汝也守謂國境之内職事所當供具及王之所行先道帥其屬而廵戒令先道先由王所從道居前廵其前日所戒之令太馭掌犯軷之禮謂祖道也土訓氏夾王車而行以待王問九州形勢所謂以道地圗山川所宜所謂以詔地事誦訓氏亦夾王車以上古久逺之事以告王誦訓所謂掌道方志以詔觀事若魯有大庭氏之庫殽之二陵也又掌道方慝方慝四方言語所惡以詔辟忌以知地俗辟音避乘金輅建大旂巾車云金輅鈎樊纓九就建大旂以賔歲二月東廵狩至於岱宗柴而望祀山川燔柴告感生之天帝覲諸侯覲見也其方之諸侯先於境首待之祭義云天子廵狩諸侯待於境所過山川則使祝宗先以三等璋瓚皆以黄金爲鼻流酌鬱鬯以禮神次乃校人殺黄駒以祭之玉人云大璋中璋九寸邊璋七寸射四寸厚寸黄金勺青金外朱中鼻寸衡四寸有繅天子以廵狩宗祝以前馬鄭元云鼻勺流也衡謂勺徑也於犬山川則用大璋加文飾也於中山川用中璋殺文飾也於小山川用邊璋半文飾也又校人云凡將事於四海山川則飾黄駒鄭元云謂王廵狩過大山川也每宿舍掌舍設梐枑再重謂行馬再重者以周衞有外内列枑音互其外則土方氏又設蕃籬土方氏云王廵狩則樹王舍鄭元云爲之蕃籬旣至方嶽先問百年就見之若未滿百年八十九十者路經其門則見之不然則否祭義所謂東行西行弗敢過天子乃令太師採人歌謡賦詩以樂播而陳之以觀人風俗以審其善惡所謂命太師陳詩以觀人風也命典市納賈陳百物之貴賤以觀人之所好惡所謂命市納賈以觀人之所好惡志淫好辟故鄭云淫則侈物貴人之志若淫邪則所好者必不得其正者也又命典禮之官考校四時節炁月之晦朔甲乙等日及候氣之律呂所用禮樂宫室車旗等制度君臣上下之衣服皆以王者所頒制度考校之所謂命典禮考時月定日同律禮樂制度衣服正之註云同隂律也諸侯封内有名山大川不舉而祭之者爲不敬不敬者君削其地有祭宗廟不順昭穆者爲不孝不孝者君絀以爵不順爲若逆昭穆者以宗廟可以表官爵故絀之變禮易樂者爲不從不從者君流流放也革制度衣服者爲畔畔者君討有功德於人者加地進律律法度也其諸侯待王之牢禮以一犢掌客云王廵狩殷國則國君膳以牲犢又郊特牲云天子適諸侯諸侯膳用犢貴誠之義也天子牲孕弗食也旣黜陟諸侯乃與之相見於方嶽之下築壇與覲禮壇鄭元註司儀職引覲禮制一廵狩殷國而同則其爲宫亦如此歟是也其壇外爲土埒方三百步開四門壇方九十六尺髙四尺上爲堂下爲三等謂之三成成每等髙一尺其堂置司盟之神位謂之方明覲禮云諸侯覲於天子爲宫方三百步開四門壇十有二尋深四尺加方明於其上鄭元云宫爲壇土爲埒以象墻壁八尺曰尋十二尋則方九十六尺也深謂髙也從上向下曰深方明者上下四方神明之象也㑹同而盟監之天之司盟有象者猶宗廟之有主乎其方明狀具朝覲篇司儀職云其壇三成宫旁一門鄭元云成猶重也三重者下差之爲三等每面丈二尺也見諸侯之時據鄭註司儀及覲禮諸侯之上介各以其君之旗置於宫内以表立位之處乃詔三升壇訖諸侯皆就其旗而立其位鄭按明堂位諸公中階之前北面東上諸侯阼階之東西面北上諸伯西階之西東面北上諸子門東北面西上諸男門西北面東上王乃於壇上揖之以定其位其揖之節有三儀與王無親者推手小下之司儀所謂土揖庻姓與王婚姻之親者平推手揖之所謂時揖異姓與王同姓者推手小舉之所謂天揖同姓王旣揖定其位諸侯乃進升壇奠玉又按司儀職及鄭註云公於上等奠桓圭玉陳擯者五人禮之侯伯於中等奠信圭躬圭玉陳擯者四人禮之子男於下等奠榖璧蒲璧玉陳擯者三人禮之諸侯各奠玉訖降拜又升成拜訖擯者乃延諸侯升堂授王玉訖乃以璧琮行享禮謂之將幣玉人云璧琮九寸諸侯旣朝見王訖乃退而自相與盟王官之伯臨之其神主於月必因以祭之覲禮云祭天燔柴祭山邱陵升祭川沉祭地瘞鄭注云升沉必就祭者也就祭者則是謂王廵狩諸侯之盟祭也其餘五月南廵狩至於南嶽如東廵狩之禮八月西廵狩至於西嶽如南廵狩之禮十有一月北廵狩至於北嶽如西廵狩之禮廵狩之月皆用正嵗之仲月者以王者考禮正刑當得其中春秋分晝夜均冬夏之至隂陽中蓋欲取中平之義故唐虞以還皆用仲月者此也廵狩訖却歸每廟用一牛以吿至謂之歸格於祖禰用特特一牛昭王德衰南廵濟於漢船人惡之以膠船進王王御船至中流膠液船解王及祭公俱沒於水而崩其右辛餘靡長臂且多力游得王周人諱之穆王得驥温驪温音盗或作騑淺青色驪黒色騄耳之駟郭璞曰紀年北唐之君來見一驪馬是生騄耳八駿皆因其毛色以爲名號索隱曰按穆天子傳曰赤驥盗驪白義渠黄驊騮騟騄耳山子西廵狩樂而忘歸徐偃王作亂造父爲穆王御長驅歸周以救亂孟子昔者齊景公問於晏子曰吾欲觀於轉附朝儛皆山名遵海而南放於琅琊齊東境上邑吾何修而可以比於先王觀也言何修治而可以比先王之游觀晏子對曰善哉問也天子適諸侯曰廵狩廵狩者廵所守也諸侯朝於天子曰述職述職者述所職也無非事者春省耕而補不足秋省斂而助不給夏諺曰吾王不游吾何以休吾王不豫吾何以助一游一豫爲諸侯度今也不然師行而糧食言人君興師行軍皆逺轉糧食而食之飢者弗食勞者弗息睊睊胥讒民乃作慝言在位者又睊睊側目相視更相讒慝民因化之而作慝惡也方命虐民飲食若流方猶放也放棄不用先王之命但爲虐民之政恣意飲食若水流之無窮極謂湎沉於酒流連荒亡爲諸侯憂從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡先王無流連之樂荒亡之行惟君所行也景公說大戒於國出舍於郊於是始興發補不足戒備也大修戒備於國出舍於郊示憂民困始興惠政發倉廪以賑貧民召太師曰爲我作君臣相悅之樂蓋徵招角招是也太師樂師徵招角招其所作樂章名其詩曰畜君何尤畜君者好君也秦始皇二十七年廵隴西今隴右北地今寜州出雞頭山在成州上禄縣東北二十里過回中焉回中在安定髙平賜爵一級治馳道應劭曰馳道天子道也若今之中道然漢賈山傳曰秦爲馳道於天下東窮燕齊南極吳楚江湖之上濵海之觀畢至道廣五十步三丈而樹厚築其外隱以金椎樹以青松二十八年始皇東行郡縣上鄒嶧山鄒魯縣山在其北立石與魯諸儒生議刻石頌秦功德議封禪望祭山川之事乃遂上泰山立石封祠祀下風雨暴至休於樹下因封其樹爲五大夫禪梁父刻所立石乃並渤海以東過黄腄東萊有黄縣腄縣窮成山豋之罘之罘山在腄縣成山在文登縣北一百九十里立石頌秦徳焉而去南登琅琊今兖州東沂州宻州卽古琅琊大樂之留三月乃徙黔首三萬户琅琊臺下復十二歲作琅琊臺立石頌徳遣徐市發童男女入海求仙人還過彭城齋戒禱祠欲出周鼎泗水使千人沒水求之不得乃西南渡淮水之衡山南郡今荆州浮江至湘山祠黄陵廟在岳州湘隂縣北自南郡由武關歸二十九年始皇東遊至陽武博浪沙中河南陽武縣有博浪沙爲盜所驚求弗得令天下大索十日登之罘刻石之琅琊道上黨入三十二年始皇之碣石刻碣石門廵北邊從上郡入三十七年始皇出遊行至雲夢望祀虞舜於九疑山山在永州唐興縣虞舜冢在九疑山浮江下觀藉柯渡海渚括地志云在舒州周安縣東過丹陽至錢塘臨浙江水波惡乃西百二十里從狹中渡在餘杭上㑹稽祭大禹望於南海而立石刻頌秦徳還過吳從江乘渡丹陽有江乘縣並海上北至琅琊自琅琊北至榮成山在萊州至之罘並海西至平原津而病渡河西徳州平原縣崩於沙邱平臺沙邱去長安二千餘里趙有沙邱宫在鉅鹿趙武靈王死處二世元年東行郡縣到碣石並海南至㑹稽盡刻始皇所立刻石遂至遼東而還漢髙祖六年人告楚王信謀反上僞游雲夢㑹諸侯於陳信迎謁因執之時有上書告信反者上問諸將爭欲撃之陳平曰今兵不如楚精而將不能及舉兵攻之是趣之戰也古者天子有廵狩㑹諸侯陛下第出僞游雲夢㑹諸侯於陳陳楚之西界信聞天子以好出游其勢必無事而郊迎謁謁而陛下因禽之此特一力士之事耳上從之武帝元封元年帝親征匈奴行自雲陽北歴上郡西河五原出長城北登單于臺至朔方臨北河還祠黄帝於橋山廼歸甘泉是年復冬廵海上還登封泰山至於梁父禪肅然山名在梁父行所廵至博奉髙蛇邱歴城梁父民田租逋賦貸已除加年七十以上孤寡帛人二疋四縣無出今年算行自泰山復東廵海上至碣石自遼西歴北邊九原歸於甘泉周萬八千里云王莽天鳳元年欲行廵狩之禮令大官齎糒乾肉内者行張坐卧所過毋得有所給羣臣奏一歲四廵道路萬里帝春秋尊非糒乾肉之所能堪乃止後漢世祖建武十七年四月南廵狩皇太子及右翊公輔楚公英東海公陽濟南公廉東平公蒼從幸潁川進幸葉章陵五月還宫漢祀令天子行有所之出河沈用白馬珪璧各一衣以繒緹五尺祠用脯二束酒六斗鹽一升涉渭灞涇洛他名水如此者沈珪璧各一律在所給祠具及行沈祠他水先驅投石少府給珪璧不滿百里者不沈十八年二月甲寅西廵狩幸長安三月壬午祠髙廟遂有事於十一陵歴馮翊界進幸蒲坂祠后土夏四月甲戌車駕還宫十九年九月南廵狩壬申幸南陽進幸汝南南頓縣舍置酒㑹賜吏人復南頓田租一歲父老前叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩願賜復十年帝曰天下重器常恐不任日復一日安敢逺期十歲乎吏人又言陛下實惜之何言謙也帝大笑復增一歲進幸淮陽二十年二月戊子車駕還宫二十年十月東廵狩甲午幸東海楚沛國十二月壬寅車駕還宫三十年二月東廵狩甲子進幸魯濟南閏月癸丑車駕還宫中元元年正月丁卯東廵狩二月己卯幸魯進幸泰山北海王興齊王石朝於東嶽辛卯柴望岱宗登封泰山甲午禪於梁父四月癸酉車駕還宫明帝永平二年十月甲子西廵狩幸長安祠髙廟遂有事於十一陵歴覽館邑㑹郡縣吏勞賜作樂癸卯車駕還宫十年閏月甲午南廵狩幸南陽祠章陵日北至又祠舊宅禮畢召校官弟子作雅樂奏鹿鳴帝自御塤箎和之以娛嘉賔還幸南頓勞享三老官屬十二月甲午車駕還宫十五年二月庚子東廵狩辛丑幸偃師進幸彭城遂幸孔子宅祠仲尼及七十二弟子親御講堂命皇太子諸王說經又幸東平辛卯進幸大梁至定陶四月庚子車駕還宫章帝建初七年十月西廵狩幸長安丙辰祠髙廟遂有事十一陵進幸槐里又幸長平御池陽宫東至髙陵造舟於涇而還每所到幸輒㑹郡縣吏人勞賜作樂十一月詔勞賜河東守令掾以下十二月丁亥車駕還宫元和元年七月丁酉南廵狩詔所經道上郡縣無得設儲峙命司空自將徒支柱橋梁有遣使奉迎探知起居二千石當坐其賜鰥寡孤獨不能自存者粟人五斛十一月己丑車駕還宫賜從者各有差二年正月丙辰東廵狩幸泰山柴告岱宗進幸奉髙宗祀五帝於汶上明堂幸魯祠孔子於闕里四月乙卯車駕還宫三年春正月丙申北廵狩濟南王康中山王焉西平王羡六安王恭樂成王黨淮陽王昞任城王尚沛王定皆從辛丑帝耕於懐二丹壬寅告常山魏郡清河鉅鹿平原東平郡太守相曰朕惟廵狩之制以宣聲教考同遐邇解釋怨結也今四國無政不用其良四方之國無政者由天子不用善人者也駕言出游欲親知其劇易前祠園陵遂望祀華霍華霍山名也今在廬江灊縣西南亦名天柱山爾雅曰華山爲西嶽霍山爲南嶽東柴岱宗爲人祈福今將禮常山遂徂北土歴魏郡經平原升踐隄防詢訪耆老咸曰往者汴門未作深者成淵淺則泥塗追惟先帝勤人之徳謂永平十二年修汴渠底績逺圖復禹𢎞業聖跡滂流至於海表不克堂構朕甚慚焉月令孟春善相邱陵土地所宜今肥田尚多未有墾闢其悉以賦貧民給與糧種務盡地力勿令游手所過縣邑聽半入今年田租以勸農民之勞乙丑勅侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之夾轅者爲服馬服馬外爲騑馬詩云敦彼行葦牛羊勿踐履詩大雅云鄭元註曰敦敦然道旁之葦牧牛羊者無使踐履折傷之況於人乎禮人君伐一草木不時謂之不孝禮記孔子曰伐一樹殺一獸不以其時非孝也俗知順人莫知順天其明稱朕意戊辰進幸中山遣使者祠北嶽出長城史記䝉恬爲秦築長城西自臨洮東至海癸酉還幸元氏祠光武顯宗於縣舍正堂明日又祠顯宗於始生堂皆奏樂明帝生於常山元氏傳舍也三月丙子詔髙邑令祠光武於卽位壇復元氏七年徭己卯進幸趙庚辰祠房山於靈夀靈夀縣名屬常山郡今恒州縣房山今在恒州房山縣縣西北俗名王母山上有王母之祠辛卯車駕還宫賜從行者各有差章和元年八月癸酉南廵狩戊子幸梁乙未幸沛庚子幸彭城辛亥幸夀春十月丙子車駕還宫和帝永和十五年九月壬午南廵狩賜所過二千石長吏以下三老官屬及民髙年者錢布各有差幸章陵祠舊宅十一月車駕還宫安帝延光三年二月丙子東廵狩辛卯幸泰山柴告岱宗祀五帝於汶上明堂幸東平東郡歴魏郡河内壬戌車駕還京師魏明帝凡三東廵狩所過存問髙年恤疾苦或賜榖帛晉初新禮廵狩方嶽柴望告設壝宮如禮諸侯之覲者賔及執䞇皆如朝儀而不建旗摰虞以覲禮諸侯各楚其旗章所以殊爵命示等威詩稱君子至止言觀其旂宜定新禮建旗如舊詔可然終晉代不行其禮宋文帝元嘉四年二月東廵狩至於丹徒告覲園陵三月享㑹父老舊勲於行宫加賜衣裳幣帛蠲租原刑戰亡之家單孤並隨宜隱䘏二十六年二月東廵幸至京城幷謁二陵㑹舊京故老萬人享勞賚發赦蠲徭役後魏文成帝和平元年正月東廵狩歴橋山祀黄帝遼西遥祀醫無閭山遂緣海幸冀州北至中山過恒嶽禮其神而反明年南廵過石門遣使者用玉璧牲牢禮衡嶽隋煬帝大業元年三月詔曰聽採輿頌謀及庻民故能審刑政之得失今將廵歴淮海觀省風俗是嵗命尚書右丞皇甫議發河南淮北諸郡民前後百餘萬開通濟渠自西苑引榖洛水達於河復自板渚引河歴滎澤入汴又自大梁之東引汴入泗達於淮又發淮南民十餘萬開邦溝自山陽至楊子入江渠廣四十歩渠旁皆築御道樹以柳自長安至江都置離宫四十餘所又遣黄門侍郎王𢎞等往江南造龍舟及雜船數萬艘督役嚴急役丁死者什四五八月壬寅帝行幸江都發顯仁宫王𢎞遣龍舟奉迎上御小朱航自漕渠出洛口御龍舟龍舟四重髙四十五尺長二百尺上重有正殿内殿東西朝堂中二重有百二十房皆節以金玉下重内侍處之皇后乘翔螭舟制度差小而裝飾無異别有浮景九艘三重皆水殿也又有漾彩朱鳥蒼螭白虎元武飛羽青鳬凌波五樓道場元壇樓船板黄篾等數千艘後宫諸王公主百官僧尼道士蕃客乘之及載内外百官供奉之物共用挽船士八萬餘人其挽漾彩以上者九千餘人謂之殿脚皆以錦綵爲袍又有平乘青龍艨艟艚八擢艇舸等數千艘並十二衛兵乘之并載兵器帳幙兵士自引不給夫舳艫相接二百餘里照耀川陸騎兵翊兩岸而行旌旗蔽野所過州縣百里内皆令獻食多者一州至百轝極水陸珍竒後宫厭飫將發之際多棄埋之二年三月庚午上發江都四月庚戌自伊闕陳法駕備千乘萬騎入東京御端門大赦三年三月帝還長安四月庚辰下詔欲安輯河北廵省趙魏丙寅車駕北廵六月至鴈門頓榆林郡諭突厥啓民可汗召所部諸國朝於行宫八月發榆林歴雲中泝金河九月己巳至東都時天下承平百物豐實甲士五十餘萬馬十萬匹旌旂輜重千里不絶令宇文愷造觀風行殿上容侍衛者數百人離合爲之下施輪軸倏忽推移又作行城周二千步以板爲幹衣之以布飾以丹青樓櫓悉備胡人驚以爲神四年三月車駕幸五原因出塞廵長城八月親祭恒嶽河北道郡守畢至行宫設六合板城載以槍車每頓舍則外其轅以爲外圍内布鐵菱次施弩床床皆揷鋼錐外向上施旋機弩以繩連機人來觸繩則弩機旋轉所處而發其外又以矰周圍施鈴柱五年三月西廵河右出臨津關度黄河五月至張掖命裴矩說髙昌王及伊吾吐屯等㗖以厚利召使入朝帝至燕支山髙昌王及西域二十七國謁於道左皆令佩金玉被錦罽焚香奏樂歌舞喧譁帝復令武威張掖士女盛服縱觀衣服車馬不鮮者郡縣督課之騎乘塡咽周亘數十里以示中國之盛七月車駕東還至西京十一月復幸東京自河西東還行經大斗㧞谷山路隘險魚貫而出風雪晦冥文武飢餒沾濕夜久不逮前營士卒凍死者大半馬驢什八九後宫妃主或狼狽相失與軍士雜宿山間六年三月帝幸江都宫詔以百官從駕皆服袴褶於軍旅間不便令從駕涉逺者文武官皆戎衣五品以上通著紫袍六品以下要用緋緑胥吏以青庻人以白屠商以皂士卒以黄敕穿江南河自京口至餘杭八百餘里廣十餘丈使可通龍舟并置驛宫草頓欲東廵㑹稽七年二月帝自江都幸涿郡御龍舟渡河入永濟渠仍敕選部門下内史御史四司之官於前船選補其受選者三千餘人或徒步隨船不得處分凍餒疲頓因而致死者十二三是嵗征髙麗車駕駐涿郡八年車駕在涿郡征髙麗不克九月還東都九年四月車駕度遼征髙麗楊元感反乃班師十年三月復幸涿郡征髙麗八月班師十月還京十二月幸東都十一年三月帝幸太原汾陽宫避暑宫城廹隘百官士卒布散山谷間結草爲營而居之八月廵北塞入鴈門突厥可汗帥騎數十萬圍鴈門九月解圍去車駕還太原十月至東都十二年七月帝自東都幸江都通典曰梁崔靈恩云唐虞五載廵狩一嶽二十年方遍四嶽周則四十八年矣若一出四嶽皆遍且闕四時祭享唐虞衡山爲南嶽周氏霍山爲南嶽其制吉行五十里若以二月到東嶽五月到南嶽八月到西嶽十一月到北嶽路程遼逺固必不能以此知每至一嶽卽歸義爲長也按尚書周官篇云六年五服一朝又六年王乃時廵考制度諸侯各朝於方嶽大明黜陟孔安國註云周制十二年一廵狩春東夏南秋西冬北故曰時廵考制度正禮法如虞帝然其四方諸侯各覲於方嶽之下大明考績黜陟幽明又按堯舜簡儉常稱茆茨土階廵狩四方羽儀導從必少一年四嶽五載復往宗廟享祭暫委有司展義省方觀風察俗之大政如或二十年方遍乃於民物不亦乖踈詳周官本文與孔氏註觧旣改制十有二載比唐虞已甚遐濶如四十八年乃遍豈非益爲曠邈乎且周雖尚文天子諸侯降殺以兩穆王廵歴天下萬姓不甚苦勞始皇遊幸四方屬車八十一乗二漢以降至於有隋或東封告成或觀省風俗百辟悉至羣司畢從不下十餘萬人何止千乘萬騎所以曠代多闕斯禮崔生謂堯舜及周帝王行幸車徒禮數與秦漢以後無異斯不達古今豐約之别復不詳周官之文輙肆臆度說耳按舜典王制明言二月東廵五月南廵八月西廵十二月北廵而崔靈恩乃以爲一年廵一嶽虞五載則二十年而遍周十二載則四十八年而遍何所據邪文中子言舜一歲而廵五嶽國不費而民不勞何也兵衛少而徵求寡也古帝王之廵狩所以省方觀民初非游適然舜之時五載僅能一行至周成王則又不能如舜至於十二年乃一行之又必止以四嶽爲底止之地蓋雖一本於憂民之心而尚恐有煩民之事故出必有期而行必有方如此至穆王始欲肆其心周行天下必使有車轍馬跡而幾以䘮邦秦始皇隋煬帝假望秩省方之說以濟其流連荒亡之舉千乘萬騎無歲不出遐方下國無地不到至於民怨盜起覆祚殞身曽不旋踵雖秦隋所以召亡者固非一端然倘非游蕩無度則河決魚爛之勢亦未應如是其促也唐太宗貞觀元年三月幸九成宫去京三百里冬幸洛陽七年幸九成宫十一年二月幸洛陽十二年二月還京十二月幸河北觀底柱因令勒石於上以陳盛德髙宗顯慶二年閏正月幸洛陽麟德二年幸東都遂幸東嶽總章二年將幸凉州羣臣諌不果行調露元年九月幸幷州元宗開元五年正月幸東都十一年正月發東都北廵至幷州十二年十一月幸東都至華州命勒石華嶽祠南道衢十三年十月發東都赴東岱二十年十月自東都幸太原二十四年十月勅兩京行幸緣頓所須應出百姓者宜令每頓取官錢一百千文作本取利充仍令所由長官專勾當不得抑配百姓唐開元禮皇帝廵狩儀鑾駕出宫將廵狩所司承制先頒告於東方諸州曰皇帝二月東廵狩各修平乃守考乃職事無敢不敬戒國有大刑駕將發告圜丘宗廟社稷皆如别儀皇帝出宫大備鹵簿皆如常儀軷於國門祭所過山川如親征之禮所經州縣刺史縣令先待於境通事舍人承制問百年古先帝王名臣烈士皆州縣致祭燔柴告至將告將作先於泰山下修圜壇四出陛若舊有封禪祀天壇卽不須别築前告三日尚舍直長施大次於外壝東門之内其設文武侍臣次陳饌位設宫懸樂燎壇之制一如圜丘之儀前一日皇帝清齋於行宫應告之官皆於吿所清齋一日近侍之官應後升者及從告羣官諸方客使皆於其所俱清齋一宿諸衛令其屬晡後一刻各以其方器服守衛壝門盥太樂工人俱清齋一宿奉禮設御位於壇之東南西向設告官司徒執事者御史奉禮贊者協律郎太樂令望燎位東方諸州刺史縣令介公􅈶公文武九品以上官西方北方蕃客等位並如上幸圜丘儀其褒聖侯等亦如之設告官以下門外位於東西壝門之外道南皆如設次之式郊社令帥府史一人及齋郎以罇坫罍洗篚羃入設於位並如常儀執罇罍篚羃者各位於罇罍篚羃之後告日未明十五刻太官令帥宰人烹牲於厨蒼牲一騂牲一未明四刻太史令郊社令各服其服升設昊天上帝神座於壇上北方南向席以藁秸設髙祖神堯皇帝神座於東方西向席以莞設神位各於座首未明三刻諸告官以下各服其服郊社令良醖令各帥其屬入實罇罍及玉天帝大罇二配帝著罇二俱實以汎齊其明水各實於上罇玉以蒼碧幣二丈八尺太祝以玉帛置於篚太官令帥進饌者實諸籩豆簠簋等皆設於饌幔内未明二刻奉禮帥贊者先入就位贊引引御史太祝以下入行掃除如常儀訖各就位皇帝服衮冕乘輅行宫奏請進發内外器服如常儀駕將至謁者贊引各引告官通事舍人引從告羣官東方刺史縣令諸方客使俱就門外位駕至大次門外廻輅南向其降輅之大次謁者引告官及從告羣官入就位皇帝奠玉帛等儀並如圜丘初皇帝旣升奠玉幣太官令帥進饌者其奉饌奏樂之儀並如圜丘天帝之饌升自南陛配帝之饌升自東陛諸太祝迎引於壇上各設於神座前設訖謁者引司徒以下降自東陛復位諸太祝各還罇所太常卿引皇帝詣罍洗樂止其盥洗酌獻奏樂讀祝之儀並如圜丘其祝文臨時撰訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神座還罇所其酌獻配帝奏樂讀祝之儀並如圜丘皇帝拜訖樂止太常卿引皇帝進天帝神座前北向立樂作太祝各以爵酌福酒其飲福受胙奏樂皇帝還版位之儀並如圜丘謁者引司徒降復位太祝各進徹豆還罇所奉禮曰賜胙其衆官受胙皇帝望燎及太祝燎牲體玉幣皇帝還大次禮官二人次出等儀並如圜丘鑾駕還行宫皇帝旣還大次侍中版奏請解嚴將士不得輙離部伍皇帝改服通天冠綘紗袍乘輅奏請還宮如常儀望秩於山川柴之明日望秩祀於嶽鎮海瀆山川林澤邱陵墳衍原隰將祭所司先爲壇於祭所其神皆以尊卑爲敘重行南向前三日守宫設祭官以下次於東壝之外道南北向以西爲上設陳饌幔於内壝東門之外道北南向前二日太樂令設宫懸之樂於壇南設登歌於壇上皆如常儀右校掃除壇内外又爲瘞埳於壇北之壬地外壝之内方深取足容物前一日諸祭官清齋於祭所諸衛令其屬晡後一刻各以其方器服守衛壝門與太樂工人俱清齋一宿奉禮設祭官位於内壝東門之内道北執事位於道南俱西向北上設御史位於壇下一位於東南西向一位於西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西向協律郎位於壇上在西陛之西東向設太樂令位於北懸之間設望瘞位於瘞埳之東西向設祭官以下門外位於外壝東門之外道南每等異位北向西上設酒罇之位嶽鎮海瀆各山罍二山川林澤俱蜃罇二邱陵墳衍原隰俱散罇二各於壇上南陛之東北向西上其嶽靈上加山罍二罍置於山罇東北向皆加白羃設玉篚於罇坫之所設洗於壇南陛東南如常執罇罍篚羃各位於罇罍篚羃之後郊社令帥齋郎以罇坫罍洗篚羃入設於位祭日未明十五刻太官令帥宰人以鸞刀割牲齋郎以豆取牲血置於饌所遂烹牲未明二刻太史令郊社令各服其服入設神座各於壇上北方南向席皆以莞設神位各於座首未明一刻祭官以下各服其服郊社令良醖令入實罇罍及玉山罍實以醍齊蜃罇實以汎齊散罇及山罍皆實以清酒齊加明水酒加元酒各實於上罇祭神之玉以兩珪有邸太祝以幣置於篚太官令帥進饌者實諸籩豆簠簋等奉禮帥贊者先入就位贊引引御史太祝與執罇罍篚羃者入自東門當壇南重行北向西上立定奉禮曰再拜贊者承傳御史以下皆再拜訖執罇罍篚羃者各就位贊引引御史詣壇東陛升行掃除於上令史祝史行掃除於下訖引就位質明謁者引獻官贊引引執事者俱就東門外位太樂令帥工人次入就位謁者贊引各引獻官以下入就位立定奉禮曰再拜在位者皆再拜謁者進獻官之左白有司謹具請行事退復位協律郎跪俛伏舉麾鼓柷奏順和之樂以㽔賔之均自後壇下之樂皆奏姑洗樂三成偃麾戞敔樂止奉禮曰再拜獻官以下皆再拜太祝取玉於篚立於罇所謁者引獻官詣嶽壇升自南陛北向太祝以玉幣東向授獻官受登歌作肅和之樂以凾鐘之均謁者引獻官進北面跪奠於嶽神之座俛伏興謁者引退北面再拜訖登歌止謁者引獻官降自南陛還本位初獻官升奠玉幣太官令帥進饌者奉饌陳於東門外登歌止太官令引饌入俎初入門雍和之樂作饌至陛樂止饌升南陛太祝迎引於壇上設於神座前籩豆蓋羃徹之如式設訖太官令以下降自東陛以出太祝還罇所其鎮海以下之饌皆祝史迎於壇上設於神座前相次而畢訖謁者引獻官詣罍洗盥手洗爵訖謁者引升自南陛詣酒罇所執罇者舉羃獻官酌醍齊訖樂作謁者引詣嶽神座北向跪奠爵興謁者引獻官少退北向立樂止初獻官進奠爵祝史各以爵奠鎮海以下還罇所太祝持版於神座之右東面跪讀祝文祝文臨時撰訖興獻官再拜初讀祝文訖樂作太祝進奠版於神座還罇所獻官拜訖樂止太祝酌罍福酒進獻官之右西面立獻官再拜受爵跪祭酒啐酒奠興太祝帥齋郎進俎太祝減神前三牲胙肉皆取前脚第二骨加於俎西向授獻官受以授齋郎獻官跪取爵遂飲卒爵太祝受爵覆於坫獻官興再拜謁者引獻官降復位諸祝各徹豆如常訖還罇所奉禮曰賜胙贊者唱再拜在位者皆再拜獻官不拜順和之樂作奉禮又曰再拜獻官以下皆再拜樂一成止謁者進獻官之左白請就望瘞位西向立於衆官將拜諸太祝外執篚進神座前跪取玉幣齋郎以俎載毛血等各由其陛降壇詣瘞埳以物置於埳訖奉禮曰瘞埳東西各四人寘土半埳謁者進獻官之左白禮畢遂引出贊引引執事者以次出又贊引引御史太祝以下俱復執事位奉禮曰再拜御史以下皆再拜訖出贊引引工人以次出其祝版燔於齋所肆覲東后望秩之明日肆覲東后於告至之前刺史縣令皆先奉見如常將作先於行宫之南爲壝宫方三百步面一門爲壇於壝内三分壝二在南壝方九丈六尺髙四尺四出陛南面兩陛餘三面各二陛前二日太樂令設宫懸之樂於壇南如殿庭之儀前一日尚舍鋪御座於壇上近北南向又設解劒席於南陛之西南守宫於門外量設百官次文東武西以北爲上東方刺史縣令次於文官之南蕃客次於武官之南所司陳路於壇南如常典儀設羣官拜位文官一品以下九品以上位於壇東南每等異位重行西面以北爲上武官一品以下九品以上位於壇西南當文官每等異位重行東面以北爲上東方刺史縣令於壇南三分庭一在南每等異位重行北面以西爲上若有蕃客則位於刺史之西每國異位重行北面以東爲上設典儀位於南陛之東贊者二人在南差退俱西面北上奉禮設門外位文官一品以下九品以上位於門東每等異位重行西面武官一品以下九品以上位於門西毎等異位重行東面俱以北爲上設東方刺史縣令位於文官之南毎等異位重行西面以北爲上蕃客位於武官之南每國異位重行東面以北爲上其日未明三刻諸衛各以其方器服量設牙旗於壝外四面未明一刻諸衛各勒所部列黄麾大仗屯門及鈒㦸陳於壝内如殿庭之儀羣官及刺史以下集各就次服其朝服蕃客集次各服其服侍中版奏請中嚴近仗陳於行宫門外諸侍衛之官各服其器服符寳郎奉寶俱詣行宫門外奉迎典儀帥贊者先入就位吏部兵部主客户部及羣官客使俱出次通事舍人各引就門外位刺史縣令俱執䞇通事舍人引就門外位䞇各以其土所有錦綺繒布葛布之屬具五兩為一束而執之仍飾以黄帊其餘當土常貢之物並盛以篚其屬執之列於縣令位後通事舍人引文武一品以下九品以上先入就位侍中版奏外辦皇帝將出仗動太樂令令撞黄鍾之鐘左右五鐘皆應協律郎舉麾工鼓柷奏太和之樂皇帝服衮冕乘輿以出曲直華蓋警蹕侍衛如常儀皇帝入自北壝門由北陛升壇卽御座樂止腰輿退其羽儀華蓋仍侍於御側通事舍人引東方刺史以下入就位鴻臚引蕃客次入就位初刺史入壝門懸下舉麾舒和之樂作至位立定樂止典儀曰再拜贊者承傳執贄者俱跪奠贄興在位者皆再拜訖跪取贄興凡拜奠贄皆如之侍中前承制降詣刺史東北西面立稱有制蕃客則舎人承㫖宣勅刺史以下皆再拜宣制訖又再拜户部引諸州貢物兩行各入於刺史位前東西陳之龜爲前列金次之丹漆絲纊四海九州美物重行量陳於後訖執物者各退立於東西廂文武前側立通事舍人引刺史爲首者一人執贄詣解劒席跪解劒脫舄執贄興舍人接引升壇詣御座前北面跪奏稱具官臣某姓名等敢獻壤奠遂奠贄俛伏興又舍人跪奉以東授所司舍人引刺史降詣解劒席跪佩劒納舄興通事舍人引復北面位初爲首者奠贄通事舍人引在庭者以次奠贄於位前訖各俛伏興引退復位訖刺史以下俱再拜户部尚書進詣階間北面跪奏稱户部尚書臣某言諸州貢物請付所司俛伏興侍中前承詔退稱制曰可尚書退復位所司受贄其執貢物各進執物所司引退俱出東門初刺史將朝中書侍郎以諸州鎮表方别爲一案俟於西門外給事中以祥瑞案俟於東門外俱令史絳公服對舉案侍郎給事中俱就侍臣班初刺史將入門中書侍郎降引表案入詣西階下東面立給事中降引祥瑞案詣東階下西面立刺史將升奠中書令黄門侍郎俱降立於階下刺史執贄升陛中書令黄門侍郎各執所奏之文以次升初户部尚書令退復位訖中書令前跪奏諸方表記黄門侍郎又進跪奏祥瑞各還侍位侍郎與給事中引案退司儀曰再拜贊者承傳文武羣官刺史以下及諸國客俱再拜訖通事舍人以次引北面位者出就門外位侍中前奏稱侍中臣某言禮畢俛伏興還侍位皇帝興太樂令令撞㽔賔之鐘左右鐘皆應太和之樂作皇帝乘輿降自北陛警蹕侍衛如來儀入行宫樂止通事舍人引東西面位者以次出設㑹如元㑹之儀考制度朝覲之明日左右丞相以考制度事奏聞命太常卿採詩陳之以觀百姓之風俗命市納賈以觀百姓之所好惡命典禮者考時月定日同律觀禮樂制度衣服正之山川神祇有不舉者爲不敬宗廟有不順者爲不孝不孝不敬者則長官黜以爵革制度衣服者爲叛叛者長官有討有功德於百姓者加爵賞五月南廵狩至於南嶽如東廵狩之禮八月西廵狩至於西嶽如南廵狩之禮十有一月北廵狩至於北嶽如西廵狩之禮歸格於宗禰用特如别禮若告封禪如别儀宋太祖皇帝建隆初平潞楊二叛開寶二年至太原皆以師行供頓從儉約故不備廵幸之儀九年幸西京先命重修宫室極其壯麗所過賜夏秋田租之半太宗太平興國二年平太原五年次大名皆如太祖勞軍之制真宗咸平二年幸大名景德元年駐澶淵勞軍之禮如祖宗四年正月幸西京朝諸侯命知雜御史王濟等籍所過父老及繋囚逋負官物人仍察民間疾苦毎日引逋欠人及禁囚等對於行在多蠲免原釋父老賜茶帛綾袍其貢香藥名馬者召對撫慰賜之金帛大中祥符元年三月詔許羣臣請封禪令泰山路葺行宫不得侵民户田苗及人馬損踐苗稼有司言準禮廵狩有燔柴告至皇帝親行事旣不載有司攝事之文車駕至泰山合行告至望令太尉以酒脯幣帛於山下壇告至奏可又詔給事中張秉等管勾所經州縣父老詣行在者送門引對賜以酒食州縣見禁囚具所犯以聞又詔以御史中丞王嗣宗攝御史大夫爲考制度使左正言知制誥周起攝中丞爲副使所經州縣採訪民間不便事幷市物之價車服權衡度量不如法則者舉儀制禁之有竒才異行隱淪不仕者與所屬長吏詢求論薦鰥寡􅑏獨不能自存者重加賑恤官吏政迹尤異民受其惠及不守廉隅昧於政理者孝子順孫義夫節婦爲鄉里所稱者並條析以聞官吏知民間利病者亦爲録奏有司言澶州城門卑下不容大輦請徹門而出上慮煩勞不許詔由城外而過他所皆然又詔扈從人宿頓所無得壊民舍什物樹木違者重寘其罪爲朝覲壇於奉髙宫之南方九丈六尺髙九尺四出陛其南兩陛設衛仗宫懸於壇中書門下文武百官皇親諸軍將校四方朝貢使舉人蕃客父老僧道皆在列設襲文宣公位於文官三品之下鄰州長吏悉集上服衮御夀昌幄殿受朝賀大赦天下遂幸兖州賜從官待制以上宗室將軍辟寒丸紫花茸綿紬窄袍三畢記祀汾隂悉如東封之制八月有司言祠宇之旁難行覲禮望俟至河中府朝覲經度制置使陳堯叟等言寶鼎行宫之前可以設壇詔如堯叟等言七年幸亳州一如西京禮舊制省方上與羣官皆窄絳袍帽還京具鑾駕儀仗預遣官與留司同排設禮官具儀以奏真宗朝陵及舉大禮塗中皆服折上巾窄袍出京過京城至禮所上服靴袍具鑾駕群臣公服穿靴供奉官班及内朝官前導過州府上寬袍羣臣公服凡從官自親王中書樞宻宣徽三司使副翰林學士待制節度兩使留後觀察防禦團練刺史並赴行宫全班起居中頓侍食百官就宿頓迎駕先發或道塗隘逺則放迎駕特進發近臣諸軍賜装錢出京留司馬步諸軍夾道左右至新城門外奉辭留守辭於門内百官父老辭於苑中州縣長吏留司官待於境所過賜廵警兵守津梁行郵治道卒時服錢屬父老綾袍茶帛中塗賜衛士緡錢所幸寺觀賜釋道茶帛或加紫服師號凡經州關鎮及比州吏民有以饔餼酒果方物爲獻者計直答之州府綵樓陳音樂百戱洎道釋威儀奉迎者悉有賜與東京留守遣官奉表請還京凡數上優詔以答皇親諸道釋市民至近境貢物迎請留司官以次奉入京師大陳留司兵衛過還京綵樓駐蹕觀樂御乾元樓召從官坐閱扈駕兵仗還營許羣臣休暇三日近臣一日凡京城車駕出太祖太宗豫幸不常其數真宗嘗以正月謁啓聖院太宗神御殿望日謁玉清昭應宫㑹靈祥源觀又或六月至玉津園觀麥八月瑞聖園觀榖十月望日謁景靈宫因禮慶祈禱又詣太一宫并謁奉先院宣祖昭憲太后影殿普安殿元德太后真容自餘臨幸則親王公主第外苑馬監頗有定制親王宗室中書樞宻宣徽使三司使副知開封府學士節度使至刺史常侍學士初皆候得㫖咸平五年詔行幸卽從不須奏禀詣宫觀及游宴閤門仍奏知制誥待制統軍士上將軍特召三品祕書監以上兩省御史知雜御史以上金吾將軍自咸平中每出令親從官卒二百執檛周繞輿駕謂之禁圍春夏緋衣秋冬以紫郊祀省方並増二百服錦襖出京師加以執劒親王中書樞宻行圍内餘官圍外大禮備儀衛則有司先布土爲黄道自至祀所左右設香臺畫甕青繩欄干廵省在塗則不設東封嵗殿中侍御史趙湘請詔羣臣不得行黃道上及閱習路馬不得穿過郊祀廵省東京舊城門並契勘其内城外宫廟門並勘箭出入皆然入蕃鎮外城子城門亦勘箭髙宗建炎元年九月詔據羣臣章䟽請幸東西金人叵測難以便憑探報逺去中原專備一方可暫駐蹕淮甸庻四方有警皆易應接應合行事務令三省樞宻院共同措置施行今來廵幸卽非遷都捍禦稍定即還京闕以待二聖之復駐蹕之地不爲久計仰先次行下不得輙有陳修改易以致勞費十月車駕廵淮甸十四日次泗州二十七日至揚州駐蹕三年二月三日詔宰執百官諸軍並扈衛車駕渡楊子江是日至鎮江府十三日至杭州三月一日詔移蹕江寜府三日命尚書右丞葉夢得專一提領户部財用充車駕廵幸頓遞使四月車駕進發自杭州幸江寜府五月至江寜府改爲建康府閏八月詔廵幸浙西九月至平江府十月自平江幸浙東次越州十一月車駕至明州詔只帶親兵輦官長入祗候共三千餘人隨駕百官並減一半其餘候見駐蹕去處起發前來四年正月一日次台州章安鎮二月次温州三月車駕登舟囘鑾幸浙西四月次越州紹興元年十一月詔以紹興駐蹕日久漕運艱梗兵軍薪水不便可移蹕臨安府二年正月車駕至臨安府駐蹕閤門言以車駕省方儀令參酌修立儀註詔從之車駕廵幸請還及期出城百里外奉迎主當物務并監臨官免赴臨京再於五里外起居次日入問聖體儀制車駕臨京請城外奉迎起居依閤門儀内執政及兩省御史臺司并尚書侍郎以上侍從官節度使俟迎駕訖分左右前導入内一太常寺檢㑹因革禮太平興國五年太宗北征囘禮院狀鑾駕還京是日早留守文武百官並出城奉迎再拜起居如常儀退中書門下兩省常侍以下舍人以上御史中丞並引駕至昇龍門下馬分班序立駕至中書門下横行餘官不横行俱再拜三呼萬嵗俟駕過其不引駕官先至丹鳳門外立班俟駕至横行起居再拜隨拜三呼萬嵗分班俟駕過退次日中書門下文武百官内殿起居如常儀一今來前項儀令故事比附參酌若依儀起居前𨗳官前導緣今來車駕係乘御舟進發竊恐難以前導兼員數止有三兩員若依令除主當物務并監臨官不赴外餘官出城百里外奉迎其合赴官數目亦是不多兼俟迎駕班退合赴近城五里外起居其經由道路窄隘或至日値雨慮難以趂赴及百里外卽非程頓去處若行創造待班幕次顯是勞費欲乞止依儀制應見任文武臣僚并寄居待闕京官小使臣以上出城五里外立班奉迎起居更合取自朝廷指揮一今擬定將來奉迎車駕節次其日留守率應見任文武臣僚并寄居待闕京官小使臣以上並履笏内将校止窄衣執杖子詣餘杭門五里外分立定俟御舟将至舍人揖躬喝拜兩拜起且躬留守奏聖躬萬福再喝拜兩拜訖各祗候御舟過並退内留守先入門赴章亭驛御幄下側立定俟車駕降御舟入御幄坐管軍臣僚并合從駕祗應官欲乞免奏萬福留守自赴幄殿下立定舍人揖躬宣名奏萬福喝祗候留守升幄殿當頭問聖體訖兩拜如有宣諭又再拜訖詣御座左側奏事如儀俟奏事畢降階退皇帝升輦還内如宣馬臨時聽㫖沿路官局並履笏迎駕起居應合從駕官并管軍臣僚祗應官等並從駕還内如儀四年十月車駕幸平江府五年二月車駕囘臨安六年九月車駕幸平江府先時詔将來進發三省樞宻院百司以紹興四年隨從人數三分爲率差發二分前去應軍旅非泛支降錢榖差除並隨行在所處分外其餘百司常程事務並留臨安府依舊行遣聽行宫留守司與决内事有不决者即申奏行在所七年二月車駕自平江進發次鎮江三月至建康府駐蹕八年二月車駕自建康府進發至臨安府還宫三十一年車駕自臨安進發視師次臨平鎮三十二年正月車駕次建康府二月車駕自建康府囘臨安文獻通考卷第一百九
