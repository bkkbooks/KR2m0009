人周時以平齊功封郕國公隋初坐反誅元諧河南洛陽人文帝受禪以舊恩封樂安郡公後坐罪誅虞慶則京兆櫟陽人開皇初以討突厥功封彭城郡公元胄河南洛陽人文帝受禪以腹心佐命封武陵郡公煬帝時坐事死達奚長儒代人文帝受禪以佐命功封蘄郡公賀婁子幹代人以討尉遲逈功封巨鹿郡公子善柱嗣史萬嵗京兆杜陵人以戰功封太平縣公後坐事誅子懷義嗣劉方京兆長安人以戰功贈盧國公子通仁嗣杜彥雲中人以討尉遲逈功封襄武縣公子虔寶嗣周搖河南洛陽人以戰功封夔國公獨孤楷不知何許人以戰功積封至汝陽郡公乞伏慧鮮卑人以破尉遲逈封西河郡公張威不知何許人以戰功積封至晉熙郡公和洪汝南人以破尉遲逈功封廣武郡公隂夀武威人以功封趙郡公子世師嗣楊義臣代人以舊恩封秦興公劉昉望都人以佐命功封舒國公後坐反誅柳裘河東解人周時以功封昌樂公子惠童嗣皇甫績安定朝那人以佐命功封義陽郡公子偲嗣郭衍太原介休人周時封武強縣公煬帝即位以預奪嫡謀封真定侯楊汪𢎞農華隂人以功封平鄉縣伯趙煚天水西人文帝受禪以進璽綬功封金城郡公子義臣嗣趙芬天水西人周時封淮安縣男子元恪嗣王韶太原晉陽人周時以平齊功封晉陽縣公帝受禪改封項城郡公子士隆嗣元巖河南洛陽人周時封昌國縣伯帝受禪進封平昌郡公子宏嗣宇文弼河南洛陽人周時為濟陽侯隋受禪進爵為公子傑嗣李圓通京兆涇陽人少賤給事文帝家帝受禪以佐命功封萬安縣公子孝常嗣郭榮太原人周時以軍功封平陽縣男文帝受禪以龍潛舊人進爵蒲城郡公龎晃榆林人周時襲爵比陽侯文帝受禪以舊人進爵為公李安狄道人以佐命功封趙郡公子瓊嗣楊尚希𢎞農人周時為髙都侯文帝受禪進爵為公子旻嗣張煚河間鄚人周時封北平縣伯文帝受禪進爵為侯蘇孝慈扶風人周時封臨水縣公隋初進爵安平郡公子康嗣元夀河南洛陽人周時封隆城縣公段文振北海期原人周時封襄國縣公來護兒南陽新野人以平江南功封襄陽縣公後為宇文化及所害樊子蓋廬江人以平陳功封上蔡縣伯周羅㬋九江潯陽人夲陳將陳亡乃降後以擊突厥功封義寧郡公周法尚汝南安城人夲仕陳後降周封歸義縣公以戰功封譙郡公衛元河南洛陽人周時襲爵興勢公隋文受禪封同軌郡公劉權彭城豐人以平陳功封宋城縣公李景天水休官人隋初封平冦縣公煬帝時以擊髙麗封滑國公李諤趙郡人文帝受禪封南和伯鮑宏東海郯人周平齊以功封平遙縣伯隋初進爵為公梁毗安定烏氏人周時封易陽縣子隋初進爵為侯杜整京兆杜陵人周時以平齊功封平原縣公隋初進爵長廣郡公子楷嗣張定和京兆萬年人以破突厥功封武安縣侯張奫清河東武城人以從平陳功封文安縣子麥鐡杖始興人遼東之役戰死贈宿國公子孟才嗣權武天水人周時以父戰死襲封齊郡公吐萬緒代郡鮮卑人周時襲爵元夀縣公隋文受禪進穀城郡公董純隴西成紀人周時以平齊封大興縣侯後從平漢王諒進爵郡公後坐罪死王辨馮翊蒲城人以從平漢王諒功封武寧縣男陳稜廬江襄安人以破楊元感功封信安侯宇文述代郡武川人周時以軍功封江陵郡公後以平尉遲逈功進封褒國公子化及嗣智及以父功封濮陽郡公後並以江都弒煬帝僭立為竇建德所誅王世充夲西域胡人煬帝時為東都留守帝遇弒世充奉越王侗為主封世充鄭國公後篡立號鄭唐討平之蕭該蘭陵人梁鄱陽王恢之孫開皇初封山隂縣公王頒太原祁人僧辨之子開皇初以平蠻功封蛇邱縣公劉𢎞彭城人以從平陳功封護澤縣公子長信嗣盧楚涿郡范陽人越王侗時封涿郡公王世充篡楚不從死之來和京兆長安人周時以相術封洹水縣男隋受禪進爵為子文獻通考卷二百七十四
