body:
  text: 文獻通考卷二百七十四鄱陽馬端臨貴與著封建考十五齊周隋諸侯王列侯北齊有王公侯伯子男六等之爵王位列大司馬上非親王則在三公下封內之調盡以入臺三分食一公以下四分食一王置師一人餘官大抵與晉宋梁制不異公主則置家令丞等官齊宗室諸王趙郡王琛神武皇帝弟天平三年追封子睿嗣後主時見殺清河王嶽神武從父弟天保初封子勱嗣齊亡入周仕隋至上開府廣平公盛神武從叔祖以從起兵封子瑗嗣改封平昌王陽州公永樂神武從祖兄子太昌時封子孝緒嗣後改封修城郡王襄樂王顯神武從祖弟天保初封上洛王思宗神武從子天保初封子元海嗣齊亡死於周思好思宗弟封南安王後反兵敗死平秦王歸彥神武族弟天保初封後反誅普歸彥兄子天保初封武興郡王齊亡卒於周永安簡平王浚神武第三子保定初封後為文宣所殺子凖嗣平陽翼王淹神武第四子天保初封子德素嗣彭城景思王浟神武第五子天保初封後為武成所殺子寶德嗣上黨剛肅王渙神武第七子天保初封子寶嚴嗣襄城景王清神武第八子天保初封子亮嗣齊亡卒於周任城王湝神武第十子天保初封齊亡入周死髙陽康穆王湜神武第十一子天保初封子士義嗣博陵文簡王濟神武第十二子天保初封後為後主所殺子智嗣華山王凝神武第十三子天保初封馮翊王潤神武第十四子天保初封子茂德嗣漢陽敬懷王洽神武第十五子天保初封子建德嗣河南康獻王孝瑜文襄帝長子齊初封子𢎞節嗣廣寧王孝珩文襄第二子齊初封齊亡卒於周河間王孝琬文襄第三子天保初封後為武成所殺子正禮嗣蘭陵武王長恭文襄第四子天保初封安德王延宗文襄第五子後主時周師入軍敗出奔延宗即位力戰周克鄴禽之見殺漁陽王紹信文襄第六子齊亡沒於周太原王紹德文宣帝第二子天保初封後為武成所殺子辨才嗣范陽王紹義文宣第三子天保初封後周既取齊紹義入突厥稱帝周人購得之流死蜀西河王紹仁文宣第四子天保初封隴西王紹廉文宣第五子天保初封樂陵王百年孝昭帝第二子帝即位立為太子後為武成所殺子白澤嗣汝南王彥理孝昭子武帝初封齊亡入關授儀同隋開皇初卒於并州刺史汝平王彥德城陽王彥基定陽王彥康汝南王彥忠皆孝昭子與彥理同時受封後不知所終南陽王綽武成帝子河清時封後為後主所殺琅琊王儼武成子河清初封後為陸令萱等所殺齊安王廓武成第四子北平王貞淮南王仁光西河王仁機樂平王仁雍潁川王仁儉丹陽王仁直東海王仁謙皆武成子齊亡與後主俱死於長安髙平王仁英安樂王仁雅亦武成子周之殺齊宗室二王以清狂瘖疾獲免俱徙蜀死齊列侯万俟普太平人其先胸奴之别世為酋長魏孝武時封清水郡公神武封河西郡公子洛嗣可朱渾道元遼東人魏時以功封東縣伯神武時以軍功纍封扶風郡王子長舉嗣天元道元弟以功封昌陽縣伯天和天元弟以道元功積封至博陵郡公劉豐普樂人以功封山鹿縣公後戰死子曄嗣破六韓常單于之裔魏時封永安縣侯齊受禪封廣川縣公金祚安定人神武時封安定縣公劉貴陽曲人封樂縣男子洪徽嗣蔡雋廣寧石門人神武時以戰功封烏洛縣侯韓賢廣寧石門人以功封汾陽縣伯子裔嗣王懷不知何許人神武時以功封盧鄉縣侯任祥廣寧人積功封至魏郡公子胄嗣莫多婁貸文狄那人從神武征伐積功封至石城公子敬顯嗣庫狄回洛代人神武時以衆附封順陽縣子昭帝即位進爵王庫狄盛懷朔人積封至華陽縣公張保洛南陽人以功積封至安武縣公侯莫陳相代人以從神武起兵積封至白水郡公後進爵王子晉貴嗣薛孤延代人從神武起兵積封至都昌縣公斛律羌舉太安人以戰功封至密縣侯子孝卿嗣王則太原人以功封太原縣伯慕容紹宗太原王恪之後以軍功封索盧侯後以討侯景功進封燕郡公子三藏嗣叱列平代郡西部人以軍功封癭陶伯子孝沖嗣步大汗薩代郡西部人以軍功積封至義陽郡公薛修義河東汾隂人以軍功封正平郡公子文殊嗣慕容儼廆之後以征伐功積封至義安王潘樂廣寧石門人以軍功積封至金門郡公子晃嗣彭樂安定人以戰功積封至陳留王後謀反誅暴顯魏郡人以功積封至定陽王皮景和琅琊下丕人以征伐功積封至廣漢郡公子信機嗣綦連猛代人以軍功積封至山陽王元景安河南洛陽人本魏昭成裔以軍功封歷陽郡王獨孤永業中山人以功封臨川王鮮于世榮漁陽人以軍功封義陽郡王及周師取齊不屈見殺傅伏太安人以軍功封永昌郡公齊亡後入周為岷州刺史孫騰咸陽石安人神武時以親信積封至石安縣公子鳳珍嗣髙隆之洛陽人以功封夏陽王子子遠嗣司馬子如河內溫人魏節閔時以功封陽平郡公後以翼贊功封須昌郡公子消難嗣竇泰太安捍殊人以軍功封廣阿子後戰沒子孝敬嗣尉景善無人以從神武起兵功封博野縣公後追封長樂王子粲嗣世辨婁昭代郡平城人武明皇后母弟封濟北公後追封太原王子仲達嗣定遠昭次子封臨淮郡王睿昭兄子封東安王庫狄干善無人以從神武起兵封廣平郡公後封章武郡王子士文嗣韓軌太安狄那人以軍功封德安郡公子晉明嗣段榮武威姑臧人以功封姑臧縣侯子韶嗣公功進爵平原郡王子懿嗣孝言韶弟封霸城縣侯斛律金朔州敕勒部人魏孝莊時賜爵阜城男後以佐命功封咸陽郡王子光嗣後主時祖珽譖而殺之陳元康廣宗人以掌機密封安平子子善臧嗣杜弼中山曲陽人文宣受禪以功封長安縣伯張纂代郡平城人神武時以參丞相軍事封武安縣伯張亮西河隰城人以參軍事封安定縣男張曜上谷昌平人天保初封都鄉男平鑒燕郡薊人以軍功封西平縣伯子敬嗣唐雍太原晉陽人天保初封廣漢鄉男元文遙河南洛陽人孝昭時以典機密封永樂縣伯趙隱南陽宛人為神武功曹世掌機密積封至宜陽王馮子琮長樂信都人後主時封昌黎郡公魏蘭根曲陽人神武初封巨鹿縣侯長子相如嗣趙猛太安狄那人姊為齊文穆皇后神武時以預義功封信都縣伯胡長仁安定臨涇人武成后長兄後封隴東郡王後為和士開所殺馬敬德河間人為後主師傅後追封廣漢郡王張景仁濟北人工草𨽻為後主侍書封建安王張華原代郡人神武時以功積封至新城公子宰均嗣由吾道榮琅琊沭陽人文宣時以術封沭陽縣公顔惡頭章武郡人神武時以術封安夷縣公信都芳河間人以筮術封長安縣子陸法和不知何許人梁元帝時助討侯景有功梁亡入周後入齊文宣封為安湘郡公郭秀范陽涿人齊神武時以恩幸封夀陽伯和士開清都臨漳人後主時以權幸封淮陽郡王後為琅琊王儼所殺穆提婆漢陽人後主時以恩幸封城陽郡王髙阿那肱無善人後主時以恩幸封淮陽郡王韓鳳昌黎人後主時以恩幸封昌黎郡王後周制封爵郡縣亦有公侯伯子男五等爵者皆加開國授柱國大將軍開府儀同者並加使持節大都督皇弟皇子置友及學士等員外餘史闕聞周宗室王公邵惠公皓文帝長兄保定初追封子什肥嗣胄後為楊堅所殺導皓子以功封饒陽縣伯子廣追封蔡國公洽後為楊堅所殺護皓子以功積封至中山公周受禪封晉國公秉政後以專權為武帝所誅把簡公連以戰殁保定初追封子元寶亮椿為楊堅所殺莒莊公洛為爾朱榮所殺保定初追封子菩薩至賓貢虞國公仲德文帝從父兄保定初追封子興嗣洛隋受禪為介公廣川公測文帝族子以從魏孝武西遷封子該嗣深測弟以功積封至長樂侯子孝伯嗣後為天元所殺歆東平公神舉文帝族子初以從孝武入關封城陽縣公後為天元所殺子同嗣慶神舉弟以戰功封汝南郡公子靜亂協衛刺王直文帝子建德三年封後坐反誅齊焬王憲文帝子建德三年封後為天元所殺趙王招文帝子建德五年封後為楊堅所殺譙孝王儉文帝子建德時封子乾惲嗣為楊堅所殺陳王純文帝子建德三年封越王舒文帝子建德三年封代王達文帝子建德三年封冀王通文帝子建德三年封滕王逌文帝子建德三年封以上並為楊堅所殺紀厲王康孝閔帝子建德三年封後坐罪死子湜嗣為楊堅所殺畢王賢明帝子酆王貞明帝子漢王贊武帝子秦王贄武帝子曹王允武帝子道王充武帝子蔡王兌武帝子荆王元武帝子萊王衍宣帝子郢王術宣帝子以上並為楊堅所殺周列侯寇洛上谷昌平人以從入關及戰功積封至京兆郡公子和嗣趙貴天水南安人以迎周文積功封至楚國公後為宇文護所殺善貴從祖兄以翊戴周文功封襄城縣公李賢隴西成紀人以功封上邽縣公子端嗣詢端族孫武帝時以軍功封髙平郡公子元方嗣崇端弟以父賢功封回樂侯子敏嗣穆賢弟以從迎魏孝武功封永平縣子後進安武郡公子筠嗣渾梁禦安定人以戰功積封至廣平郡公子睿嗣洋李弼隴西成紀人以征伐功積封至趙國公子暉嗣衍暉弟以功封真鄉公子仲威嗣綸衍弟封河陽郡公子長雅嗣曜弼子封邢國公子寬嗣密􅎎弼弟以戰功封晉陽公子椿嗣改封河東郡公宇文貴昌黎大棘人以戰功封許國公子善嗣欣善弟以戰功封興國縣公隋文時以功進封英國公愷欣弟封安平公侯莫陳崇代武川人以戰功積封至梁國公子芮嗣頴芮弟以功封廣平侯王雄太原人以戰功封武威郡公子謙嗣王盟德皇后之兄封魏昌縣公子勱嗣誼獨孤信雲中人以從魏孝武入關功進爵浮陽郡公子善嗣竇熾扶風平陵人以征伐功積封至鄧國公子茂嗣榮定毅賢德藏賀蘭祥武川人以功積封至涼國公子敬嗣叱烈伏龜代郡西部人以從征伐功封長樂縣公子椿嗣閻慶河隂人以功積封至太安郡公子毗嗣雄權景宣天水顯親人以征伐功積封至千金郡公子如璋嗣王羆京兆霸城人以戰功封扶風郡公子慶遠嗣述謨王思政太原祁人以軍功積封至太原郡公後戰敗陷於東魏子康嗣尉遲逈代人以征伐功封蜀國公宣帝崩楊堅輔政將圖篡奪逈舉兵討堅不克死之王軌太原祁人以功積封至郯國公後為天元所殺周惠達文安人周文時以府司馬積封至文安公蘇綽武功人文帝時以輔佐功封美陽縣公子威嗣隋時封邳公椿綽弟以軍功封美陽子後進爵侯子植嗣亮綽從兄以功封臨涇縣子子師嗣韋叔裕京兆杜陵人以征伐功積封至鄖國公子總嗣國成夀叔裕子以父功封永安縣侯子保巒嗣洸叔裕兄孫以征伐功封衛國縣公後進郡公子協嗣藝洸弟以擊尉遲逈功封武威縣公沖藝弟封安固縣侯韋瑱京兆杜陵人周時封長安縣男隋初以定䇿功進封普安郡公柳檜河東解人以軍功封萬年縣子後戰沒子斌嗣祚慶檜弟以功封平齊縣公子機嗣述達奚武代人以軍功封髙陽郡公子震嗣若干惠代武川人周文初興以翊戴功積封至長樂郡公子鳳嗣怡峯遼西人以戰功封華陽縣公子昂嗣劉亮中山人以軍功封至長廣公子昶嗣王德代武川人以翊戴功封至河間郡公子慶嗣赫連達勃勃之後魏孝武入關以奉迎功積封至魏昌公子遷嗣韓果代武川人以戰功封褒中郡公子明嗣蔡祐陳留圉人以戰功封至懷寧郡公子正嗣常善髙陽人以政積封永陽郡公子昻和嗣梁椿代人以戰功封清陵郡公子明嗣梁臺萇池人以翊戴功封中部縣公田宏髙平人以戰功封鴈門郡公子仁恭嗣王傑金城直城人以戰功積封張掖郡公王勇代武川人以戰功封新陽郡公子昌嗣宇文虬代武川人以戰功封南安侯耿豪巨鹿人以戰功封平原公子雄嗣高琳其先髙麗人以戰功封犍為郡公子儒嗣李和朔方巖緑人以功封永豐