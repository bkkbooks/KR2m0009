body:
  text: 文獻通考卷一百十一鄱陽馬端臨貴與著王禮考六君臣冠冕服章上古衣毛冒皮後代聖人見鳥獸冠角乃作冠纓黄帝造旒冕始用布帛冕者冠之有旒唐虞以上冠布無緌緌纓飾郊特牲太古冠布齋則緇之其緌也孔子曰吾未之聞也太古無飾非時人緌也雜記曰大白緇布之冠不緌大白即上古白布冠今䘮冠也齋則緇之者鬼神尚幽闇也唐虞以上曰太古染疏太古之時其冠唯用白布常所冠也若其齋戒則之爲緇今始冠重古先冠之也冠而敝之可也此重古而冠之耳三代改制齋冠不復用也以白布冠質以爲䘮冠也疏言緇布之冠初加暫用冠之罷冠則敝棄之可也以古之齋冠後世不復用也周氏日緇布冠加之以緌孔子以爲吾未之聞然非天子不議禮雖孔子亦不得不從當世之所尚則冠之加緌雖非禮但冠而棄之可也故曰冠而敝之敝有棄意黄帝作冕垂旒目不邪視也充纊示不聽讒言也事出世本虞書帝曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彜藻火粉米黼黻絺繡以五采彰施於五色作服汝明日月星辰取其照臨也山取其鎮龍取其變華蟲雉取其文㑹繪也宗彛虎蜼取其孝藻水草取其潔火取其明粉米白米取其養黼若斧形取其斷黻爲兩已相背取其辨絺鄭氏讀爲薾紩以爲繡也日月至華蟲六者繪之於衣宗彜至黼黻六者繡於裳所謂十二章也衣之六章其序自上而下裳之六章其序自下而上采者青黄赤白黒也色者言施之於繒帛也繪於衣繡於裳皆雜施五采以爲色也汝當明大小尊卑之等差也有虞氏皇而祭深衣而養老夏后氏収而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭元衣而養老皇冕屬也畫羽飾焉凡冕屬其服皆元上纁下有虞氏十二章周九章夏殷未聞凡養老之服皆其時與羣臣燕之服有虞氏質深衣而已夏而改之尚黒而黒衣裳殷尚白而縞衣裳周則兼用之元衣素服其冠則毋追章甫委貌也諸侯以天子之燕服爲朝服燕禮曰燕朝服服是服也王者之後亦以燕服爲之魯季康子朝服以縞僣宋之禮也天子皮弁以日視朝也質其冠未聞郊特牲言太古冠布則虞氏或用白布冠也正義曰深衣謂白布衣故言馬氏曰在祭祀則言冠不言衣言冠則知有其衣故虞十二章周九章推此則二代可知矣在養老則言衣不言冠言衣則知有冠故毋追夏后氏之道也章甫殷道也委貌周道也推此則有虞氏可知委貌周道也章甫殷道也毋追夏后氏之道也周弁殷冔夏收三王共皮弁素積委猶安也言所以安正容貌章明也殷質言所以表明丈夫也毋發聲也追猶推也夏后氏質以其形名之其制之異同未聞弁名出於槃槃大也所以言自光大也冔名出於幠幠覆也所以自覆飾也收言所以収斂髪也其制之異亦未聞通典有虞氏皇而祭其制無文蓋爵弁之𩔖夏后氏因之曰收純黒前小後大殷因之曰冔黒而微白前大後小周因制爵弁爵弁冕之次赤而微黒如爵頭然前小後大三代以來皆廣八寸長尺二寸如冕無旒皆三十升布爲之士冠禮三加成人服之陳氏禮書曰鄭氏曰皇冕屬畫羽飾焉周禮掌次之皇邸樂章之皇舞皆以鳳凰之羽爲之則皇冕畫羽飾可知也王制以皇收冔對冕言之又孔子稱禹致美乎黻冕詩稱商之孫子常服黼冔黼冔云者所謂猶黼冕也然郊特牲與冠禮記云周弁商冔夏収又以收冔對弁言之夫三王共皮弁素積夏商而上非無弁也然世之文質煩簡不同故夏商之用冕者周或用弁而已又曰周禮有韋弁無爵弁書二人雀弁儀禮禮記有爵弁無韋弁士之服止於爵弁而荀卿則曰士韋弁孔安國則曰雀韋弁也則爵弁即韋弁耳又曰古文弁象形則其制上銳如合手然非如冕也韋其質也爵其色也士冠禮再加皮弁三加爵弁而以爵弁爲尊聘禮主卿贊禮服皮弁及歸饔餼服韋弁而以韋爲敬韎色赤爵色亦赤亦即一物耳楊氏曰愚按冕弁之制上得以兼下下不得以兼上故爵弁皮弁冠弁之服爲上下之通用冠弁委貌也又曰元冠而其服又分爲二朝服也元端也而元端之用爲尤多以祭服言之大夫爵弁而祭於已士爵弁而祭於公此以爵弁爲祭服也少牢主人朝服筮日朝服以祭特牲元端筮日朝服以祭此以朝服元端爲祭服也惟皮弁之服不爲祭服然祭義君皮弁素積朔月月半廵牲是致敬於祭牲而用皮弁之禮也祭義君皮弁素積卜三宫之夫人世婦使入於蠶室是致敬於祭服而用皮弁之禮也大學始教皮弁祭菜是致敬於祭菜而用皮弁之禮也及按春官司服士之服自皮弁以下如大夫之服以儀禮士冠士喪考之則皮弁之上有爵弁以司服考之則皮弁之上有韋弁今特云士之服自皮弁而下何也皮弁之用多於爵弁韋弁也蓋人爲者多變自然者不易皮弁因其自然而已此所以三王共皮弁素積而周天子至士共用之也按周以前冠冕衣裳之制其詳不可得而聞所可考者惟虞書言服章戴記言冠制耳然冠之制有三曰冕曰弁曰冠冕者朝祭之服所謂十二旒九旒而下是也惟有位者得服之弁亞於冕所謂周弁殷冔夏收是也冠亞於弁所謂委貌章甫毋追是也弁與冠自天子至於士皆得服之冕始於黄帝至有虞氏以爲祭服所謂皇而祭夏殷之祭則用弁蓋未以弁爲殺於冕也至周而等級始嚴故大夫雖可以服冕而私家之祭不得用之天子不妨服弁而雖小祀必以冕蓋冕弁之尊卑始分矣然弁有二曰皮弁以白鹿皮爲之其制最古曰爵弁則其制下員上方如冕而無旒古者冠禮三加始緇布冠次皮弁次爵弁皆士服也大夫則服冕矣古者雖重冠禮而於服章之際視之彌重故雖天子之元子始冠亦服士之冠至爵弁而止而不敢僭用冕所謂天下無生而貴者其嚴如此又按冕則卿大夫以上服之而可以兼服弁弁則士以下服之而不可以僭服冕固也然冕服之用非惟位有尊卑不可躐服而事有大小亦不可以例服故天子之冕以之奉祀其次則初即位服之伊尹以冕服奉太甲康王麻冕黼裳是也納后妃服之冕而親迎是也養老服之冕而總干是也躬耕籍田服之冕而朱紘躬秉耒是也至於日視朝等事則服皮弁而已卿大夫之冕則以之朝王及助祭其次則受遺奉册服之卿士邦君麻冕蟻裳一人冕執劉一人冕執鉞之𩔖是也至其私家則雖奉祀亦服皮弁而已蓋於其所不當服也則雖天子之視朝卿大夫之奉祀亦不果服於其所當服也則雖服之以總干服之以秉耒服之以執劉執鉞亦無嫌也適禮之宜而已周官司服掌王之吉凶衣服辨其名物與其用事用事祭祀視朝甸凶弔之事衣服各有所用王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之大裘羊裘冕者首飾尊也祀天尚質正義曰六服服雖不同首同用冕也享先王則衮冕衮卷龍衣也虞時冕服十二章自日月至黼黻王者相變至周而以日月星辰畫於旌旗所謂三辰旂旗昭其明也而冕服九章登龍於山登火於宗彜尊其神明也衮之衣五章裳四章凡九享先公饗射則鷩冕先公謂后稷之後太王之前不窟至諸盩享祀賔客與諸侯射也鷩裨衣也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彜皆畫以爲繪次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以爲繡衮則九章備鷩冕無龍山畫以雉其衣三章裳四章凡七也正義曰此無正文並鄭以意解之祀四望山川則毳冕毳冕其衣罽衣元謂毳畫虎蜼謂宗彛也其衣三章裳二章凡五章也祭社稷五祀則希冕希刺粉米無畫其衣一章裳二章凡三祭羣小祀則元冕其衣無文裳刺黻而已冕服皆元衣纁裳凡兵事韋弁服韋弁以韎韋爲弁又以爲衣裳春秋傳晉郤至衣韎之跗注是也正義曰韋弁即蒨染謂赤色也以赤色韋爲弁衣裳亦以韎皆赤色眡朝則皮弁服視朝視内外朝之事皮弁之服十五升白衣積素以爲裳王受諸侯朝覲於廟則用衮冕凡甸冠弁服甸田獵也冠弁委貌其服緇布衣亦積素以爲裳諸侯以爲視朝之服凡凶事服弁服服弁䘮冠也其服斬縗齊縗正義服弁注云䘮冠色未詳凡弔事弁絰服弁絰者如爵弁而素加環絰以正義曰如爵弁者爵弁之形木爲體廣八寸長尺六寸以三十弁布染為爵頭色赤多黒少今爲弁絰之弁其體亦然但不可爵色之布而用素爲之加環絰者凡絰皆兩股絞之今以麻爲體又以一股麻爲體糾而横纒之如環然加於素弁之上大札大荒大烖素服大札疫疾也大荒饑饉也大烖水火爲災君臣素服縞冠若晉伯宗哭梁山之崩公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自元冕而下如孤之服士之服自皮弁而下如大夫之服其齋服有元端素端自公之衮冕至卿大夫之元冕皆其朝聘天子及助祭之服諸侯非二王後其餘皆元冕而祭於已雜記曰大夫冕而祭於公弁而祭於已士弁而祭於公冠而祭於已大夫爵弁自祭家廟唯孤耳其餘皆元冠與士同元冠自祭其廟者其服朝服元端諸侯之自相朝聘皆皮弁服此天子日視朝之服士齋有素端者亦爲札荒有所禱請變素服言素端者明異制鄭司農云衣有襦裳者爲端元謂端者取其正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫已上侈之侈之者蓋半而益一則其𬒮三尺三寸袪尺八寸中正義曰魯祭服亦得與天子同然唯在文王周公廟得用衮冕其二王後惟祭受命王得用衮冕其餘廟亦用元冕也云雜記曰大夫晃而祭於公至元冠與士同者諸侯除孤用爵弁之外卿大夫皆用元冠與士同故少牢是上大夫祭用元冠朝服特牲是士禮用元冠元端是餘皆元冠與士同也云諸侯之自相朝聘皆皮弁者欲見此經上服惟施於入天子廟不得入諸侯廟之意必知諸侯自相朝聘用皮弁者見聘禮主君及賔皆皮弁諸侯相朝其服雖無文聘禮主君待聘者皮弁明待諸侯朝亦皮弁可知云此天子視朝之服者此解皮弁非諸侯常服之物惟於朝聘乃服之意也林氏曰黄帝始備衣裳之制舜觀古人之象繪日月星辰山龍華蟲於衣繡宗彜藻火粉米黼黻於裳以法乾坤以昭象物所以彰天子之盛德能備此十二物者也使服者當須有是服之盛德焉繪以三辰所以則天之明尤爲君徳之光自黄帝以來歴代之制莫不然也周人特備以斿繅之數爾周禮乃無十二章之文司服惟有衮冕至元冕説者謂周登三辰於旗冕服惟有九章嗚呼何説之異也自堯舜至於三代文物日以盛名分日以嚴儀章日以著夫子於四代禮樂特曰服周之冕取其文之備尊卑之有辨也何得至周反去三辰之飾文乃不足乎蓋不過據左氏三辰旂旗之文左氏謂旗有三辰何嘗謂衣無三辰邪豈有王者象三辰之明歴代皆飾於衣周人特飾於旗有何意乎况又謂上公冕服九章而王服亦九章将何所别周公制禮防亂萬世乃至於無别與郊特牲曰祭之日王被衮以象天則十二章備矣鄭氏曰謂有日月星辰之章此魯禮也夫被衮以象天周制固然也何魯之足云豈有周制止九章魯乃加以十二章之禮乎宋兩朝輿服志皇祐三年詔問冠韋弁何服所執何玉太常禮院奏謂周禮司服凡兵事韋弁服釋之者曰韋弁以韎韋爲弁又以爲衣裳春秋傳晉郤至衣韎韋之跗注是也今伍伯緹衣古兵服之遺色孔頴達以韎蒨染謂以赤色韋爲弁杜佑通典韋弁之制晉以韋爲之頂少尖宋因之爲車駕親戎中外戒嚴之服後周廵兵卽戎則服之自此以來無復其制三禮圗韋弁服王及諸侯卿大夫之兵服天子亦以五采玉十二飾之詳此則韋弁服蓋天子諸侯卿大夫臨戎所通服古者非祭祀朝聘㑹同不執玉今韋弁既爲戎服於經無執玉之文而三禮圗繪爲執玉斯一時之誤不足爲據也弁師弁者古冠之大稱掌王之五冕皆元冕朱裏延紐冕服有六而言五冕者大裘之冕蓋無旒不聨數也延冕之覆在上是以名焉紐小鼻在武上笄所貫也疏曰云皆元冕者古者績麻三十升升染之上以元下以朱衣之於冕之上下云延者即是上元云紐者綴於冕之兩傍垂之武兩傍作孔以笄貫之使得其牢固也凡冕體周禮無文叔孫通作漢禮器制度取法於周案彼文凡冕以版廣八寸長尺六寸上元下朱覆之乃以五采繅繩貫五采玉垂於延前後謂之邃延故玉藻云天子玉藻前後邃延龍卷以祭是也又曰爵弁前後平則得弁稱冕則前低一寸得冕名冕則俛也五采繅十有二就皆五采玉十有二玉笄朱紘繅音早五繅雜文之名也合采絲爲之繩垂於延之下前後各十二所謂邃延也就成也繩之每一匝而貫五采玉十二斿則十二玉也毎就間蓋一寸朱紘以朱組爲紘也紘一條屬兩端於武繅不言皆有不皆者此爲衮衣之冕十二斿則用玉二百八十八鷩衣之冕繅九斿用玉二百一十六毳衣之冕七斿用玉百六十八希衣之冕五斿用玉百二十元衣之冕三斿用玉七十二紘斿音留頭疏曰云紘一條屬兩端於武者謂以一條先屬一於左旁笄上以一頭繞於頤下至向上於右屬笄上繞之是以鄭注士冠禮云有笄者屈組以爲紘垂爲飾無笄者纓而結其絛彼有笄據皮弁爵弁此五冕皆有笄與彼同此言屬於武者據笄貫武故以武言之其實在笄云繅不言皆有不皆者謂王之五冕繅則有十二有九有七有五有三其玉旒皆十二故不言皆有不皆者則九旒已下是也玉言皆則五冕旒皆十二玉也此經十二旒據衮冕而言是以鄭云此爲衮衣之冕以其十二旒旒各十二玉前後二十四旒故用二百八十八玉已下計可知諸侯之繅旒九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄瑉本又作珉亡貧反瑱吐練反侯當爲公字之誤也三采朱白蒼也其餘謂延紐皆元覆朱裏與王同也出此則異繅斿皆就皆三采也毎繅九成則九旒也公之冕用玉百六十二玉瑱塞耳者故書珉作璑鄭司農云繅當爲藻繅古字也藻今字也同音璑惡玉名璑音無有疏曰諸公云繅九就又云繅斿皆就文與上言繅十二就皆五采玉十有二繅玉别文則繅有差降玉無差降此諸公繅玉同則唯有一冕而已故鄭注一冕爲九旒旒各九玉據冕九旒不别計鷩冕已下以其一冕而冠五服也已下侯伯子男亦皆一冕冠數服也王不言玉瑱於此言之者王與諸侯互見爲義是以王言元冕朱裏延紐及朱紘明諸侯亦有之諸公言玉瑱明王亦有之是其互有也又曰知三采朱白蒼者聘禮記公侯伯繅藉三采朱白蒼故知也云出此則異者異謂天子朱紘諸侯當青紐紘之等不得與王同也王之皮弁㑹五采玉璂象抵玉笄鄭司農云㑹謂以五采束髪元謂㑹縫中也璂讀如綦綦結也皮弁之縫中每貫結五采玉十二以爲飾謂之綦詩云㑹弁如星又曰其弁伊綦抵下抵也以象骨爲之同疏曰㑹取㑹聚之義故爲縫中天子以十二爲節約冕旒也弁之縫中飾之以玉皪皪而處状如星故曰㑹弁如星云抵下抵也者謂爲弁内頂上以象骨爲抵諸侯及孤卿大夫之冕韋弁皮弁各以其等爲之而掌其禁令各以其等繅斿玉璂如其命數也冕則侯伯繅七就用玉九十八子男繅五就用玉五十繅玉皆三采孤繅四就用玉三十二三命之卿繅三就用玉十八再命之大夫藻再就用玉八藻玉皆朱緑韋弁皮弁則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采一命之大夫冕而無旒士變爲爵弁其韋弁皮弁之㑹無結飾禁令者不得相僣踰也飾疏曰云一命之大夫冕而無旒者凡冕旒所以爲文一命若有則止一旒一玉而已非華美爵弁之制如冕而無旒則一命之冕與爵弁不殊得謂之冕者蓋弁則前後平冕則前低一寸餘陳氏曰司服之服六而弁師之冕五者大裘衮衣同冕猶后首服同副也又曰弁師王之五冕皆朱紘禮記天子爲藉冕而朱紘諸侯爲藉冕而青紘士冠禮緇衣冠青組纓皮弁笄爵弁笄緇組紘纁邊蓋朱者正陽之色天子以爲紘青者少陽之色諸侯以爲紘緇者隂之色而士以爲紘卿大夫冕弁之紘無所經見禮器曰管仲鏤簋朱紘君子以爲濫鄭氏謂大夫士當緇組紘纁邊理或然也一組繋於左笄遶頤而上屬於右笄垂餘以爲飾謂之二紘又曰冕約之以武設之以紐貫之以笄固之以紘又曰瑱以充耳紞以垂瑱周官弁師王之五冕皆玉瑱詩於衛夫人言玉之瑱也於衛武公言充耳琇瑩於衛之臣子言褎如充耳齊詩言充耳以素以青以黄尚之以瓊華瓊瑩瓊英則瑱不特施於男子也婦人亦有之不特施於冕也弁亦有之故詩言充耳琇瑩繼之以㑹弁如星䘮禮士無冕而瑱用白纊則弁亦有之可知也士瑱用白纊即詩所謂充耳以素者也人君用黈纊即詩所謂充耳以黄者也毛氏以充耳以素爲士之服充耳以青爲卿大夫之服充耳以黄爲人君之服其説是也春秋傳曰縳之如一瑱則縳纊以爲瑱自古然也其制蓋皆元紞以垂之瓊玉以承之承之詩所謂尚之也檀弓小祥用角瑱楚語曰巴浦之犀犛兕象其可盡乎則古者之瑱亦以象與角爲之又曰周官追師掌王后之首服爲副編次追衡笄左傳曰衡紞紘綖昭其度也鄭司農曰衡維持冠者鄭康成曰王后之衡笄皆玉爲之惟祭服有衡垂於副之兩旁當耳其下以紞垂瑱孔頴達曰婦人首服有衡則男子首服亦然王后之衡以玉諸侯以下未聞然則左傳言衡則繼以紞弁師士冠禮言笄則繼以紘朱子曰禮家載祀先王服衮冕祀先公服鷩冕諸侯之服蓋雖上祀先公以天子之禮然不敢以天子之服臨其先公但鷩冕旒玉與諸侯不同天子之旒十二玉蓋雖與諸侯同是九旒但天子九旒十二玉諸侯九旒九玉耳楊氏曰愚按六服而冕注説恐未安當從陳氏大裘衮衣同冕之說蓋祀天祀先王皆十二旒旒十二玉祀先公鷩冕則九旒旒十二玉祀四望山川毳冕則七旒旒十二玉禮有輕重則繅旒有隆殺惟祀天祀先王皆致其隆不容有所輕重也按先儒疑服有六而冕止於五遂謂大裘衮衣二服而同冕然按郊特牲祭之日王被衮以象天玉藻天子龍卷以祭家語曰郊之日天子大裘以黼之被裘象天既至泰壇王脫裘矣服衮以臨燔柴戴冕璪十有二旒則天數也陳祥道以爲王之祀天内服大裘外被龍衮龍衮所以襲大裘也然則祭天之服亦龍衮特内襲大裘而宗廟之祭則龍衮内無裘故以大裘而冕在衮冕之前非謂衮冕之上復有大裘之服也蓋大裘衮衣不可分而爲二服而服與冕皆五未嘗有六服矣禮家又謂大裘之冕無旒如此則是以大裘爲一服無旒者爲一冕是有六服亦有六冕然冕之無旒者乃一命之服蓋子男之國爲大夫者服之其秩至卑以天子祀天之冕而下同於子男之大夫可乎其義不通矣天子玉藻十有二旒前後邃延龍卷以祭祭先王之服雜采曰藻天子以五采藻爲旒旒十有二前後邃延者言皆出冕前後而垂也天子齊肩延冕上覆也元表纁裏龍卷畫龍於衣或作衮藻疏曰藻謂雜采之絲繩以貫於玉以玉飾藻故云玉前後各十二旒垂而深邃延卷謂卷曲畫此龍形云天子齊肩者以天子之旒十二就每一就以玉就間相去一寸則旒長尺二寸故垂而齊肩言天子齊肩則諸侯以下各有差降則九玉者九寸七玉者七寸以下各依旒數垂而長短爲差旒垂五采玉依飾射侯之次從上而下初以朱次白次蒼次黄次元五采玉既貫遍周而復始其三采者先朱次白次蒼二色者先朱後綠皇氏沈氏並爲此説今依用焉後至漢明帝時用曹褒之説皆用白旒珠與古異也云延冕覆者用三十升之布染之爲元覆於冕上出而前後冕謂以板爲之以延覆上故云延冕上覆也但延之與板相着爲一延覆在上故云延冕也元端而朝日於東門之外聽朔於南門之外端當爲冕元衣而冕冕服之下朝日春分之時也東門南門謂國門也天子廟及路寝皆如明堂在國之陽每月就其室之堂而聽朔焉卒事反宿路寝亦如之閏月聽其朔於明堂門中還處寝門終月凡聽朔必以特牲告其帝及神配以文王武王於疏曰案下諸侯皮弁聽朔朝服視朝是視朝之服卑聽朔聽朔大視朝小故知端當爲冕元冕祭小祀日月爲中祀而用之者以天神尚質魯語云大采朝日故於日韋昭注大采謂元冕也春分日於其日朝之皮弁以日視朝遂以食日中而餕卒食元端而居天子服元端燕居也而疏曰遂以食者既著皮弁視朝遂以皮弁朝食所以敬養身體故著朝服至日中之時還著皮弁而餕朝之餘食之沙隨程氏曰先儒相傳謂前旒蔽明黈纊塞聡亦習誤此獨祭祀之衮冕爲然欲其專精神以享也君視朝則皮弁服何旒纊之有哉諸侯元端以祭祭先君也端亦當爲冕諸侯祭宗廟之服唯魯與天子同裨冕以朝朝天子也裨冕公衮侯伯鷩子男毳也皮弁以聽朔於太廟皮弁下天子也朝服以日視朝於内朝朝服冠元端素裳也此内朝路寝門外之正朝也天子諸侯皆三朝朝辨色始入羣臣也入入應門也辨猶正也别也君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服小寝燕寝也釋服釋元端又朝服以食特牲三俎祭胏食必復朝服所以敬養身也三俎豕魚腊夕深衣祭牢肉祭牢肉異於始殺也天子言日中諸侯言夕天子言餕諸侯言牢肉互相挾正義曰元端賤於皮弁下文皮弁聽朔於太廟不應元端以祭先君故知此端亦當爲冕覲禮云侯氏裨冕鄭注裨之爲言埤也天子六服大裘爲上其餘爲裨故總云裨冕王制云周人元衣而養老注云元衣素裳天子之燕服爲諸侯朝服彼注云元衣則此元端也若素爲裳則是朝服此皆爲元端周禮司服其齋服有元端素端注見前内則曰子事父母冠緌纓端韠紳端元端士服也玉藻天子元端而朝日於東門之外端當爲冕卒食元端而居諸侯元端以祭端亦當爲冕朝元端夕深衣謂大夫士也無君者不二采大夫去位宜服元端素衣小記除殤之喪者其祭也必元冠元端黄裳而祭不朝服未純吉也於成人爲釋禫之服樂記魏文侯問於子夏曰吾端冕而聽古樂則惟恐卧端元衣也雜記曰端縗䘮車皆無等䘮者衣縗及所乘之車貴賤同衣縗言端者元端吉時常服䘮之衣縗當如之子羔之襲素端一公襲卷衣一元端一儀禮士冠緇布冠元端元裳黄裳雜裳可也緇帶爵韠此暮夕於朝之服元端則朝服之衣易其裳耳上士元裳中士黄裳下士雜裳賔如主人服贊者元端從之冠者既冠乃易服服元冠元端爵韠見於君見於鄉大夫鄉先生見服不朝服者非朝士也特牲饋食禮主人冠元端論語公西華曰宗廟之事如㑹同端章甫願爲小相焉荀卿曰端衣元裳絻而乘路志不在於食葷大戴禮曰武王端冕而受丹書左氏劉定公曰吾端委以治民臨諸侯禹之力也晏平仲端委以立於虎門晉語董安于曰臣端委以隨宰人周語曰晉侯端委以入武宫韋昭曰此士服也諸侯之子未受爵命服士服也榖梁曰免牲者爲之緇衣纁裳有司元端奉迎至於南郊襄三十一年吳夷狄之國也被髪文身欲因魯而請冠端而襲襲衣冠端元端鄭氏釋士冠禮謂爵弁純衣絲衣也餘衣皆用布惟冕與爵弁用絲耳賈公彦曰此據朝服皮弁服元端服及深衣長衣之等皆布爲之是以雜記云朝服十五升布元端亦朝服之𩔖皮弁亦是天子朝服深衣或名麻衣故知用布也陳氏禮書曰司服言及諸侯孤卿大夫士之服而繼之以其齋服有元端素端則元端素端非特士之齋服而已鄭氏曰端者取其正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫以上侈之侈之者蓋半而益一則其袂三尺三寸袪尺八寸然謂之端則衣袂與袪廣袤等矣無大夫士之辨也果士之祛殺於袂尺非端也大夫之袪侈以半而益一亦非端也深衣之袪圜長衣之袪長弔祭及餘衣之袪侈司服凡弔事弁絰服雜記凡弁絰服其縗侈少牢主婦衣宵衣侈袂儒行曰孔子衣逢掖之衣荀卿曰其衣逢則元端之袂端可知矣古者端衣或施之於冕或施之於冠大戴記曰武王端冕而受丹書樂記曰魏文侯端冕而聽古樂荀卿曰端衣元裳絻而乘路此施於冕者也冠禮冠者元端緇布冠既冠易服服元冠元端特牲禮主人冠端元内則子事父母冠緌纓端韠紳劉定公曰吾端委以治民董安于曰臣端委以隨宰人公西華曰宗廟之事如㑹同端章甫以至晉侯端委以入武宫晏平仲端委以立於虎門此施之於冠者也蓋元端齋服也諸侯與士以爲祭服玉藻元端以祭特牲冠端元是也大夫士以爲私朝之服玉藻朝元端是也天子至士亦以爲燕服玉藻天子卒食元端而居内則事父母端韠是也然則端衣所用固不一矣記曰齋之元也以隂幽思也故祭之冕服皆元齋之端衣亦元若夫朝服天子以素諸侯以緇未聞以元端也儀禮大夫祭以朝服士祭以元端冠禮主人朝服既冠冠者服元端雜記公襲朝服一元端一襚禮自西階受朝服自堂受元端則朝元端異矣元端皆元裳或黄裳雜裳可也鄭氏曰上士元裳中士黄裳下士雜裳前元後黄荀卿曰端衣元裳絻而乘路志不在於食葷蓋齋則衣裳皆元非齋則裳不必元未聞以素裳也鄭氏釋儀禮謂云端即朝服之衣易其裳耳釋玉藻曰朝服冠元端素裳此説無據服元端者冠則緇布冠齋則元冠特天子齋用冕燕則元冠而已然齋或用素端則其冠不元矣鄭氏曰素端爲禮荒有所禱請是也又曰元端齋服也天子以爲燕服士以爲祭服大夫士以爲私朝之服或以事親或以擯相或既冠則服之以見鄉大夫鄉先生凡書傳所謂委貌者即此元端委貌也如晉侯端委以入武宫劉定公曰吾端委以治民臨諸侯晏平仲端委以立於虎門之外是也則元端之所用爲尤多矣朱子曰不學雜服不能安禮鄭注謂以服爲皮弁冕服其説恐是蓋古人服各有等降若理㑹得雜裳則於禮亦是思過半矣且如冕服是天子祭服皮弁是天子朝服諸侯助祭於天子則服冕服自祭於其廟則服元冕大夫助祭於諸侯則服元冕自祭於其廟則服皮弁又如天子常服則服皮弁朔旦則服元冕無旒之冕也諸侯常朝則服朝服元衣素裳朔旦則服皮弁大夫私朝亦用元端夕深衣士則元端以祭上士元裳中士黄裳下士雜裳前後元黄庻人深衣古者深衣蓋有制度以應規矩繩權衡聖人制事必有法度短毋見膚衣取蔽也長毋被土爲汚辱也續袵鉤邊續猶屬也袵在裳旁者也屬連之不殊裳前後鉤邊若今曲裾也續或爲裕要縫半下三分要中減一以益下下宜寬也要或爲優袼之髙下可以運肘肘不能出入袼衣袂當掖之縫也袂之長短反詘之及肘袂屬幅於衣詘而至肘當臂中爲節臂骨上下各尺二寸則袂肘以前尺二寸肘或爲腕帶下毋厭髀上毋厭脅當無骨者當骨緩急難爲中也制十有二幅以應十有二月裳六幅幅分之以爲上下之殺袂圜以應規謂胡下也圜音圓下垂曰胡曲袷如矩以應方袷交領也古者方領如今小兒衣領司馬公曰方領如孔所言似三代以前人反如今服上領衣但方裁之耳案上領衣本出胡服須用結紐乃可服不知古人有此否也鄭註周禮袷状如著横銜之繣潔於項顔師古註漢書繣者結礙也潔繞也蓋爲結紐而繞項也然則古亦有結紐也繣音獲潔音結漢時小兒衣服既不可見而後漢馬援傳朱勃衣方領能矩歩註引前書音義曰頸下施衿領正方學者之服也如此則自於頸下别施一衿映所交領使之方正今朝服有方心曲領以白羅爲之方二寸許綴於圜領之上以繋於頸後結之或者袷之遺象歟又今小兒疊方幅係於頸下謂之涎衣與鄭說頗相符然事當闕疑未可決從也後漢儒林傳曰服方領習矩歩者委蛇乎其中註方領直領也春秋傳叔向曰衣有襘杜曰襘領㑹也工外反曲禮曰視不上於袷鄭曰袷交領也然則領之交㑹處自方即謂袷疑更無他物今且從之以從簡易負繩及踝以應直繩謂裻與後幅相當之縫也踝跟也正義曰衣之背縫及裳之背縫上下相當如繩之正直故云負繩非謂實負繩也下齊如權衡以應平齊緝故規者行舉手以爲容行舉手謂揖遜負繩抱方者以直其正方其義也故易曰坤六二之動直以方也下齊如權衡者以安志而平心也心平志安行乃正或低或昂則心有異志者歟五法已施故聖人服之言非法不服也故規矩取其無私繩取其直權衡取其平故先王貴之故可以爲文可以爲武可以擯相可以治軍旅完且弗費善衣之次也完且弗費言可善衣而易有也深衣用十五升布鍜濯灰治純之以采善衣朝祭之服也自士以上深衣爲之次庻人吉服深衣而已正義曰可善衣而易有也謂其完牢乃可於善事衣著故庻人服之以完牢故也而易有者以白布爲之不須黼黻錦繡之屬云自士以上深衣爲之次者案玉藻諸侯夕深衣祭牢肉及大夫士朝元端夕深衣是深衣爲朝服之次也諸侯之下自深衣以後其别更無所謂餘服故知是爲庻人之吉服也具父母大父母衣純以繢具父母衣純以青如孤子衣純以素尊者存以多飾爲孝繢畫文也三十以下無父稱孤純袂緣純邊廣各寸半純謂緣之也緣袂謂其口緣裼也緣邊衣裳之側廣各寸半則表裏共三寸矣唯袷廣二寸陸氏曰名曰深衣者謂連衣裳而純之以采也有表則謂之中衣以素純則曰長衣正義曰長衣中衣及深衣其制度同玉藻云長中繼揜尺若深衣則緣而已諸侯大夫爲夕服庻人吉服皆著之在表也其中衣則在朝服祭服䘮祭之下餘服則上衣下不相連此深衣衣裳相連被體深邃故謂之深衣藍田吕氏曰深衣之用上下不嫌同名吉凶不嫌同制男女不嫌同服諸侯朝朝服夕深衣大夫士朝元端夕深衣庻人衣吉服深衣而已此上下之同也有虞氏深衣而養老諸侯大夫夕皆深衣將軍文子除䘮而受越人弔練冠深衣親迎女在塗壻之父母死深衣縞總以趨䘮此吉凶男女之同也蓋深衣者簡便之服雖不經見推其義𩔖則非朝祭皆可服之故曰可以爲文可以爲武可以擯相可以治軍旅也按三代時衣服之制其可考見者雖不一然除冕服之外惟元端深衣二者其用最廣元端則自天子至士皆可服之深衣則自天子至庻人皆可服之蓋元端者國家之命服也深衣者聖賢之法服也然元端雖曰命服而本無等級非若冕弁之服上下截然者之比故天子服之而不卑士服之而不爲僭至於深衣則裁製縫袵動合禮法故賤者可服貴者亦可服朝廷可服燕私亦可服天子服之以養老諸侯服之以祭膳卿大夫士服之以夕視私朝庻人服之以賔祭蓋亦未嘗有等級也古人衣服之制不復存獨深衣則戴記言之甚備然其制雖具存而後世茍有服之者非以詭異貽譏則以儒緩取哂雖康節大賢亦有今人不敢服古衣之説司馬温公必居獨樂園而後服之吕滎陽朱文公必休致而後服之然則三君子當居官涖職見用於世之時亦不敢服此以取駭於俗觀也蓋例以物外髙人之野服視之矣可勝嘅哉右衣冠之制有虞氏服韍夏后氏山殷火周龍章韍或作黻音弗韍冕服之韠也舜始作之以尊祭服禹湯至周增以畫文後王彌飾也山取其仁可仰火取其明龍取其變化天子備焉諸侯火而下卿大夫山士韎韋而已韎莫拜反此疏曰士冠禮士韎韐是士無飾推此即尊者飾多有四等天子至士亦爲四等故知卿大夫加山諸侯加火天子加龍韠君朱大夫素士爵韋韠音必此元端服之韠也韠之言蔽也凡韠以韋爲之必象裳色則天子諸侯元端朱裳大夫素裳唯士元裳黄裳雜裳也皮弁服皆素鞸裳疏曰知此元端服之韠也者案士冠禮元端元裳黄雜裳爵韠謂士元端之韠此云爵韋故知元端之韠也云皮弁服皆素韠者案士冠禮皮弁服素韠云皆者君與大夫士皮弁皆然故云皆也圜殺直目韠制圜音圓也疏曰經云圜則下文大夫前方後挫角則圜經云殺則下文公侯前後方則殺也經云直則下文天子直是目韠制也天子直四角直無圜殺公侯前後方殺四角使之方變於天子也所殺者去上下各五寸上疏曰云所殺者去上下各五寸者案雜記云韠㑹去五寸是上去五寸又云紕以爵韋六寸不至下五寸是去下五寸大夫前方後挫角圓其上角變於君也韠以下爲前以上爲後挫作卧反士前後正士賤與君同不嫌也正直方之間語也天子之士則直諸侯之士則方之疏曰正謂不袤也直而不袤謂之正方而不袤亦謂正故云正直方之間語也韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸頸五寸亦謂廣也頸中央肩兩角皆上接革帶以繋之肩革帶廣同凡佩繋於革帶玉藻雜記韠長三尺下廣二尺上廣一尺㑹去上五寸紕以爵韋六寸不至下五寸純以素紃以五采注曰㑹謂領上縫也領之所用蓋與紕同在旁曰紕在下曰純素生帛也紕六寸者中執之表裏各三寸也純紕所不至者五寸與㑹去上同紃施諸縫中若今時縧也疏曰韠長三尺與紳齊也下廣上狹象天地數也㑹謂韠之領縫也此縫去韠上畔廣五寸紕以爵韋六寸者謂㑹縫之下兩旁縫以爵韋濶六寸倒攝之兩廂各三寸也不至下五寸者謂紕韠之兩邊不至韠之下畔濶五寸純以素者素謂生帛謂紕所不至之處横純之以生帛此帛上下亦濶五寸紃絛者謂五采之絛置於諸縫之中一命緼韍幽衡再命赤韍幽衡三命赤韍葱衡此元冕爵弁服之韠尊祭服異其名耳韍之言亦蔽也緼赤黄之間色所謂韎也衡注見後佩玉條周禮公侯伯之卿三命其大夫再命其士一命子男之卿再命其大夫一命其士不命疏曰以上經云君朱大夫素士爵韋是元端服之韠故云此元冕爵弁服之韠言異於上也此據有孤之國以卿大夫雖三命再命皆着元冕若無孤之國則三命再命之卿大夫皆着絺冕不得爲元冕也爵弁則士所服云一命緼韍者一命公侯伯之上士冠爵弁韎韐此緼韍則當彼韎韐毛詩云韎韐茅蒐茅蒐則蒨草也以蒨染之其色淺赤則緼爲赤黄之間色陳氏禮書曰韠之作也在衣之先其服也在衣之後其色則視裳而已禮記言君朱大夫素士爵韋者祭服之韠也蓋君祭以冕服冕服元衣纁裳故朱韠大夫祭以朝服緇衣素裳故素韠士祭以元端元裳黄裳雜裳可也故爵韠周官典命公侯伯之士一命而士之助祭以爵弁弁而祭於公爵弁纁裳故緼韍緼赤黄之間色所謂一命緼韍是也公侯伯之卿三命大夫再命而卿大夫助祭聘王以元冕司服孤之服自希冕而下鄭氏以爲卿大夫之服自元冕而下鄭氏以爲助祭聘王之服蓋孤希冕祭於公弁而祭於已卿大夫元冕祭於公冠而祭於已元冕纁裳故赤韍所謂再命三命赤韍是也韠之爲物以其茀前則曰韍以其一巾足矣故曰韠以色則曰緼以緼質則曰韎韐古人謂舊爲茅蒐讀茅蒐爲韎韐考之士冠禮於皮弁元端皆言韠特於爵弁言韎韐詩於素韠於朱芾赤芾乃言芾是韠者芾之通稱而芾與韎韐異於名所以尊祭服也君韠雖以朱而諸侯朝王亦赤芾在股赤芾金舄是也士雖以爵凡君子之齋服皆爵韠記曰齋則綪結佩而爵韠是也采芑言方叔之将兵韍亦以朱瞻彼洛矣言作六師而韍以韎韐者蓋兵事韋弁服纁裳故貴者以朱芾卑者以韎韐韎韐即所謂緼韍長三尺所以象三才頸五寸所以象五行下廣二尺象地也上廣一尺象天也㑹去上五寸紕以爵韋六寸不至下五寸純以素紃以五采㑹猶書所謂作㑹也紕裨其上與旁也純緣其下也去㑹與純各五寸則其中餘二尺也紕六寸則表裏各三寸也天子之韠直其㑹龍火與山諸侯前後方其㑹火以下大夫前方挫角其㑹山而已鄭氏謂山取其仁火取其明龍取其變天子備焉諸侯火而下卿大夫山士韍韋以禮推之周人多以近世之禮待貴者逺世之禮待卑者則鄭氏之說是也周以虞庠爲小學以夏序商學爲太學以成人棺槨䘮長殤以夏之堲周葬中殤以虞氏之瓦棺葬無服之殤皆待卑者以質畧也自頸肩而下則其身也鄭氏以其身之五寸爲領而㑹爲領縫是肩在領上矣衣之上韋猶尊上元酒俎上生魚也鄭氏謂衣之上韠者執事以蔽裳爲敬與不忘其本之說戾矣古者䘮服用韠無所經見詩曰庻見素韠是祥祭有韠也劉熙曰韠以蔽前婦人蔽膝亦如之唐志婦人蔽膝皆如其夫是婦人有韠也荀子曰共艾畢說者曰蒼白之韋是罪人有韠也及戰國連兵韍非兵飾去之明帝復制韍天子赤皮蔽膝魏晉以來用絳紗爲之故字或作紱徐廣車儀制云楊氏曰愚按儀禮士皮弁素韠朝服緇韠元端爵韠爵弁韎韐士冠筮於廟門主人朝服緇帶素韠又云冠禮三加爵弁韎韐鄭注云韎韐緼韍也士緼韍而幽衡合韋爲之士染以茅蒐因以名焉今齊人名蒨爲韎韐韍之制似韠又按周官典命一命緼韍蓋公侯伯之士一命而士之助祭以爵弁纁裳故緼韍緼赤黄之間色也左氏傳衮冕黻珽疏曰黻韠制同而名異鄭元詩箋云芾太古蔽膝之象也冕服謂之芾其他服謂之韠右韠天子素帶朱裏終辟謂大帯也而素帶終辟大夫素帶辟垂士練帶率下辟辟依注爲禆婢支反率音律素而素帶終辟謂諸侯也諸侯不朱裏合爲之下天子也大夫亦如之率繂也士以下皆不合而繂積如今作頭爲之也辟讀如禆冕之裨冕之裨謂以繪采飾其側人君充之大夫裨其紐及末士裨其末而已爲懆七曹反疏曰天子素帶朱裏者以素爲帶用朱裏終辟辟而禆也終竟帶身在要及垂皆裨故云終辟諸侯以素爲帶不以朱爲裏亦用朱綠終辟大夫亦素爲帶不終裨但以元華裨其身之兩旁及屈垂者士練帶率下辟者士用熟帛練爲帶其帶用單帛兩邊繂而已繂謂緶緝也下裨者但士帶垂者必反屈嚮上反垂而下大夫則總皆裨之士則用緇唯裨嚮下垂者并紐約用組三寸長齊於帶紳長制士三尺有司二尺有五寸子游曰三分帶下紳居二焉紳韠結三齊三寸謂約帶紐組之廣也長齊於帶與紳齊也紳帶之垂者也言其屈而重也論語曰子張書諸紳有司府史之屬也三分帶下而長三尺則帶高於紳也結約餘也帶疏曰記者引子游之言以證紳之長短人長八尺大之下四尺五寸分爲三分紳居二分焉紳長三尺也革帶博二寸玉藻見革帶博二寸其說上文韠制大夫大帶四寸雜帶君朱綠大夫元華士緇辟二寸再繚四寸凡帶有率無箴功雜猶飾也卽上裨也君裨帶上以朱下以綠終之大夫裨垂外以元内以華華黄色也士裨垂之下外内皆以緇是爲緇帶大夫以上以素皆廣四寸士以練廣二寸再繚之凡帶有司之帶也亦繂之如士帶矣無箴功則不裨之士雖繂帶裨亦用箴功楊氏曰禮士練帶率下辟士冠主人朝服緇帶冠者爵皮弁緇布冠皆緇帶則士帶皆練而皆飾以緇也陳氏禮書曰古者革帶大帶皆謂之鞶内則所謂男鞶革帶也春秋傳所謂鞶厲大帶也易言鞶帶揚子言鞶帨以至許愼服䖍杜預之徒皆以鞶爲帶特鄭氏以男鞶革爲盛帨之囊誤也詩言垂帶而厲毛萇杜預之徒皆以厲爲帶之垂者特鄭氏以而厲爲如裂亦誤也辟猶冠裳之辟積也率縫合之也天子諸侯大帶終辟則竟帶之身辟之大夫辟其垂士辟其下而已雜飾也飾帶君朱綠大夫元華士緇故儀禮士冠主人朝服緇帶冠者爵弁皮弁緇布冠皆緇帶則士帶練而飾以緇也士辟下二寸則所辟其下端二寸也再繚四寸則結處再繚屈之四寸也天子至士帶皆合帛爲之或以素或以練或終辟或辟垂或辟下其飾或朱綠或元華蓋素得於自然練成於人功終辟則所積者備辟垂辟下則所積者少朱者正陽之色綠者少陽之雜禮器冕朱綠藻雜記公襲朱綠帶聘禮問諸侯朱綠繅皆取陽色元與緇者隂之體華者文之成天子體陽而兼乎下故朱裏而裨以朱綠諸侯雖體陽而不兼乎上故飾以朱綠而不朱裏大夫體隂而有文故飾以元華士則體隂而已故飾以緇然於大夫言帶廣四寸則其上可知而士不必四寸也於士言紳三尺則其上可知而有司止於二尺五寸也凡帶有率無箴功則帶繂而已無刺繡之功也以至并紐約紐三寸再繚四寸紳韠結三齊皆天子至士所同也夫所束長於飾則失之太拘所飾長於束則失之太文紳韠結三齊叔向曰衣有㑹帶有結然後爲稱則有司之約韠蓋亦二尺五寸歟古者於物言華則五色備矣書云華蟲華玉於文稱凡則衆禮該矣鄭氏以華爲黄以凡帶爲有司之帶以率爲士與有司之帶以辟爲裨以二寸爲士帶廣以至大夫以上用合帛士以下裨而不合皆非經據之論也又曰内則曰男鞶革莊子曰帶死牛之脅玉藻曰革帶博二寸士喪禮韐帶用革笏揷於帶之右旁然則革帶其博二寸其用以繫佩韍然後加以大帶而佩繫於革帶笏搢於二帶之間矣晉語寺人勃鞮曰乾時之役申孫之矢集於桓鈎鉤近於袪而無怨言則革帶有鉤以拘之後世謂之鉤䚢丑列切阮諶云䚢螳螂相以相拘帶謂之鉤䚢唐以玉爲鉤䚢與古異矣然革帶用於吉而已荀卿曰縉紳而無鉤帶是也古者裼衣象裘色韠屨象裳色而革帶與韠其用相因則革帶豈亦與韠同色歟右帶天子佩白玉而元組綬公侯佩山元玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玟而緼組綬玉有山元水蒼者視其文色所似也綬者所以賁佩玉相承受者也純當爲緇古文緇字或作絲旁才綦文雜色也緼赤黄巾純讀爲緇佩其反瑜羊朱反綦音其瓀而兖反玟武反字又作同緼音温故疏曰玉色似山之元而雜有文似水之蒼而雜有文云文色所似但尊者玉色純公侯以下玉色漸雜而世子及士唯論玉質不明玉色則玉色不定也瑜是玉之美者故世子佩之瓀玫石次玉賤故士佩之一命緼韍幽衡再命赤韍幽衡三命赤韍葱衡緼韍注見上韍條昭衡佩玉之衡也幽讀爲黝黒謂之黝青謂之葱三韋曰衡似磬而小孔穎達曰佩玉上繫於衡下垂道穿以蠙珠前後下端垂以璜中央下端垂以衝牙禐禐佩之衿也鄭氏謂凡佩繫於革帶則繫於革帶者也璜璜肉倍好謂之璧半璧謂之璜大戴記曰下有雙璜居前後而牙衝之然後有宫角徵羽之音衝牙玉藻曰佩玉有衝牙鄭氏謂居中央以爲前後觸有琚瑀說文曰琚佩玉名瑀玫石似玉也大戴記曰上雙衡下有雙璜衝牙蠙珠以納其間琚瑀以雜之注曰玭珠納於衡璜之間玭亦作蠙總曰玭珠而赤者曰琚白者曰瑀左氏詩傳曰雜佩者珩璜瑀衝牙之𩔖則居中央而璜瑀爲之也纂要曰琚瑀則在佩玉之中間禮記曰行歩有環佩之聲又孔子佩象環衛南子環佩璆然魯昭公賜仲環而佩之漢制縌綬之間得施之玉環鐍蓋古者佩玉則有環古之君子必佩玉君子士以上右徵角左宫羽玉聲所中也徵角在右事也民也可以勞宫羽在左君也物也宜逸趨以采齊路門外之樂節至應門謂之趨齊當作楚薺之薺采薺詩名行以肆夏登堂之樂節周還中規反行也宜圜折還中矩曲行也宜方進則揖之退則揚之然後玉鏘鳴也揖之謂小俛見於前也揚之謂小仰見於後也鏘聲貌故君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自入也鸞在衡和在式自由也君在不佩玉左結佩右設佩謂世子也出所處而君在焉則去徳佩而設事佩辟徳而示卽事也結其左者若於事有未能也結者結其綬不使鳴焉居則設佩謂所處而君不在焉朝則結佩朝於君亦結左齊則綪結佩而爵韠綪屈也結又屈之思神靈不在事也爵韠者齋服元端齊側皆反注同綪側耕反凡帶必有佩玉唯喪否喪主於哀去飾謂天子以至於凡士佩玉有衝牙居中央以前後觸也君子無故玉不去身君子於玉比徳焉故謂喪與災眚陳氏禮書曰古之君子必佩玉其制上有折衡下有雙璜中有琚瑀下有衝牙貫之以組綬納之以璸珠而其色有白蒼赤之辨其聲有角徵宫羽之應其象有仁智禮樂忠信道徳之備見禮記君子比徳於玉此所以非僻之心無自入也又曰禮紳縪結三齊特佩綬之長無所經見漢制貴者縌長三尺二寸卑者縌長三尺古者之佩蓋亦𩔖此漢制曰縌者佩繸也謂之縌以其貫玉相迎也右佩笏天子以球玉諸侯以象大夫以魚須文竹士竹本象可也球羙玉也文猶飾也大夫士飾竹以爲笏不敢與君並用純物也正義曰大夫以魚須文竹者文飾也以鮫魚須飾竹而成文士以竹爲本質以象牙飾其邊緣飾之可也言可者通許之辭見於天子與射無說笏入太廟說笏非禮也言凡吉事無所說笏也太廟之中唯君當事說笏也小功不說笏當事免則說之免悲哀哭痛之時不在於記事也小功輕不當事可以搢笏也既搢必盥雖有執於朝弗有盥矣搢笏輙盥爲必執事凡有指畫於君前用笏造受命於君前則書於笏笏畢用也因飾焉畢盡也疏曰謂事事盡用笏記之因飾焉者因其記事所須以爲等級笏度二尺有六寸其中博三寸其殺六分而去一殺猶杼也天子杼上終葵首大夫士又杼其下首廣二寸半終正義曰天子杼上此云殺故知殺猶杼也云諸侯不葵首者以玉人云天子終葵首故知諸侯不也葵首椎頭也云大夫士又杼其下者以經特明云其中博三寸明笏上下二首不博三寸諸侯既南面之君同殺其上大夫士北面之臣宜俱殺其下也天子搢珽方正於天下也此亦笏也謂之珽珽然無所屈也或謂之大圭長三尺杼上終葵首終葵首者於杼上廣其首方如椎頭是謂無所屈後則恒直相玉書曰珽玉六寸明自炤諸侯荼前詘後直讓於天子也荼讀爲舒遲之舒舒懦者所畏在前也詘謂圜殺其首不爲椎頭諸侯唯天子詘焉是以謂笏爲荼大夫前詘後詘無所不讓也大夫奉君命出入者也上有天子下有已君又殺其下而圜將適公所史進象笏書思對命思所思念將以告君也對所以對君者也命所受君命者也書之於笏備失忘也年不順成君衣布搢本搢本去珽荼佩士笏也荀卿曰天子御珽諸侯御荼大夫服笏管子曰天子執玉笏以朝日釋名曰笏忽也君有命則書其上備忽忘也陳氏禮書曰天下之事常修治於人之所慎而廢弛於人之所忽先王於是制之爲笏或執或搢而畢用之使人稽其名以見其義觀其制以思其徳庸有臨事而失者乎天子之笏以玉諸侯以象大夫以魚須文竹士竹本象可也蓋玉徳之美象義之辨竹禮之節天子尚徳諸侯貴義大夫士則循禮而已此笏所以異也魚須文之也竹本象可也竹本而象飾之也大夫近尊而其勢屈士逺尊而其禮伸此飾所以異也禮大夫沐稷而君與士皆沐粱大夫之臣曰私人而君與士之臣皆曰私臣大夫祭則堂之上下共尊而君與士則堂下異尊大夫内子拜尸西而君與士之妻則北面大夫之於主婦不致爵而君與士則致爵大夫嗣子不舉奠而君與士之嗣則舉奠大夫賔尸尸酢主人乃設席而君與士則先酢而設席大夫前祭一日筮尸而君與士則前祭三日筮尸大夫祭之日視濯而君與士則前祭一日視濯凡此皆順而摭之之禮則其飾笏以象不亦可乎天子之於天下體無所屈故珽必方正諸侯之於天子則謹度以臣之於臣民則制節以君之故荼必前屈後直大夫於其君則爲臣於天子則爲陪臣故笏必前屈後屈士笏之制無所經見觀其制之以象疑亦前屈後直歟天子之朝日執鎮圭搢大圭則所執者摯也所搢者笏也諸侯之朝大夫之聘蓋亦如此則諸侯執命圭者必搢荼大夫執聘圭者必搢笏及其合瑞而授圭則執其所搢而已此所謂見於天子無說笏也見天子也入太廟也射也皆禮之不可忽者故不說笏小功則禮可以勝情故亦不說笏當事而免則事可以勝禮故說之小功不說笏則大功以上說之可知朱子語錄曰今官員執笏最無義理笏者只在君前記事恐事多須以紙粘笏上記其頭緒或在君前不可以手指人物便用笏指之此笏常只揷在腰間不執在手中夫子攝齊升堂何曽手中有笏攝者是畏謹恐上階時踏着裳有顛仆之患執圭者自是贄見之物只是捧至君前不是如執笏所以夫子執圭時便足縮縮如有循緣手中有圭不得攝齊亦防顛仆按圭鎮寳也笏服飾也圭則執之以爲信笏則執之以爲飾晦庵言笏只是君前記事指畫之具不當執之於手然古者天子亦有笏豈亦藉此以記事指畫乎蓋朝章之服飾也但天子之笏以玉爲之其制似圭而天子與公侯伯之圭上銳下方其形𩔖笏故後人或誤以圭爲笏然笏者非執則搢不可須叟去身者也若圭則天子以禮神諸侯以朝見天子不過於當事之時暫捧之而卽奠之不常執也嘗見繪禮圖者繪上公衮冕執桓圭在手如秉笏之狀是矣至卿大夫無圭璧則端冕盛服而執所謂羔鴈者在手殊爲可笑蓋誤以圭爲笏誤以鎮信之具爲服飾之具故也所謂公執桓圭至士執雉者特言贄之等級耳此執字非必謂兩手捧之當心如執笏之狀也又如大司馬振旅之時王執路鼓諸侯執賁鼓此二鼓乃鼓中之至大者師之耳目係焉故王之與諸侯自司其事而謂之執豈亦以是二鼓者執之於手而如執圭之狀乎右笏屨人掌王及后之服屨爲赤舄黑舄赤繶黄繶青句素屨葛屨屨必連服言者著服各有屨也複下曰舄襌下曰屨古人言屨以通於複今世言屨以通於襌俗易語反舄屨有絇有繶有純者飾也鄭司農云赤繶黄繶以赤黄之絲爲下緣士喪禮曰夏葛屨冬皮屨皆繶緇純禮家說繶亦謂以采絲纅其下元謂凡舄屨各象其裳之色士冠禮曰元端黒屨赤絇繶純素積白屨緇絇繶純爵弁纁屨黒絇繶純是也王吉服有九舄有三等赤舄爲上冕服之舄也詩云王錫韓侯元衮赤舄則諸侯與王同下有白舄黒舄句當爲絇聲之誤也絇繶純同色今云赤繶黄繶青絇雜互言之明舄屨衆多反覆以見之凡舄之飾如繢之次赤繶者王黒舄之飾青絇者王白舄之飾言繶必有絇純言絇亦有繶純三者相將王及后之赤舄皆黒飾凡屨之舄如綉次也黄屨白飾白屨黑飾黒屨青飾絇謂之拘著舄屨之頭以爲行戒繶縫中紃純緣也天子諸侯吉事皆舄其餘唯服冕衣翟者著舄耳士爵弁纁屨黒絇繶純尊祭服之屨飾也繢也素屨者非純吉有凶去飾者言葛屨明有用皮時正義下謂底也重底者名曰舄襌底者名曰屨古人周人也言屨以通於舄故直言屨下言舄今人漢人也以複者爲屨并襌者亦爲屨俗易語反也繶牙底相接之縫綴絛於其中綰屨頭以絛爲鼻純以絛爲口緣經不云純者文畧也舄屨與裳俱在下故與裳同色素屨即下經㪚屨大祥時除縗杖後身服素縞麻衣而著此素屨去飾無繶絇純故經不言繶絇純也葛屨自赤舄以下夏則用葛爲之冬則皮爲之在素屨下者欲見素屨亦用葛與皮赤舄者男子冕服婦人闕狄之舄黒舄者天子諸侯元端服之舄赤繶以下曰繶曰絇以表見其舄赤繶者是天子諸侯黒舄之飾黄繶者與婦人爲元舄之飾青絇者與王及諸侯爲白舄之飾凡屨舄皆有絇繶純三者相將各舉其一以互見也辨外内命夫命婦之命屨功屨㪚屨命夫之命屨纁屨命婦之命屨黄屨以下功屨次命屨於孤卿大夫則白屨黑屨九嬪内子亦然世婦命婦以黒屨爲功屨女御士妻命屨而已士及士妻謂再命受服者㪚屨亦謂去飾妻正義曰大夫以上衣冠則有命舄無命屨外命婦孤以下内命九嬪以下不得服舄自鞠衣黄屨展衣白屨褖衣黒屨以下以廣之矣陳氏禮書曰詩云赤舄几几元衮赤舄赤芾金舄周公及諸侯冕服之舄也赤舄謂之金舄者鄭氏謂金舄黄朱色也考之於禮周尚赤而灌尊黄彝纁裳赤黄馬黄朱而諸侯之芾亦黄朱鄭氏釋斯干詩曰芾天子純朱諸侯黄朱則舄用黄朱宜矣唐制以金飾屨與鄭氏之所傳異也楊氏曰愚按屨人言王后之舄屨惟有赤舄黑舄素屨葛屨其爲飾不過赤繶黄繶青絇而已鄭氏則以爲王之舄有三赤黑白后之舄有三元白黑又有黄屨白屨黑屨之異外内命夫命婦之命屨惟有功屨㪚屨而已鄭氏又有纁黄白黑之屨皆是經外推說恐難據信右屨文獻通考卷第一百十一
