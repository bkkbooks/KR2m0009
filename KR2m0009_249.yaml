body:
  text: 文獻通考卷二百四十九鄱陽馬端臨貴與著經籍考七十六集總集文史江西詩派一百三十七卷續派十三卷陳氏曰黃山谷而下二十五家又曾紘曾思父子詩詳見詩集類詩𣲖之説本於呂居仁前輩多有異論觀者當自得之漁隱叢話呂居仁近世以詩得名自言傳衣江西嘗作宗𣲖圖自豫章以降列陳師道潘大臨謝無逸洪芻饒節僧祖可徐俯洪朋林敏修洪炎汪革李錞韓駒李彭鼂沖之江端本楊符謝薖夏倪林敏功潘大觀何顒王直方僧善權高荷合二十五人以為法嗣謂其源流皆出豫章也其宗𣲖圖序數百言大略云唐自李杜之出焜耀一世後之言詩者皆莫能及至韓柳孟郊張籍諸人激昻奮厲終不能與前作者並元和以後至國朝歌詩之作或傳者多依效舊聞未盡所趣惟豫章始大出而力振之抑揚反覆盡兼衆體而後學者同作並和雖體制或異要皆所傳者一豫故録其名字以遺來者余竊謂山谷自出機杼别成一家清新竒巧是其所長若言抑揚反覆盡兼衆體則非也元和至今騷翁墨客代不乏人觀其英辭傑句真能發明古人不到處卓然成立者甚衆若言多依效舊文未盡所趣又非也所列二十五人其間知名之士有詩卷傳於世為時所稱者止數人而已其餘無聞焉亦濫登其列居仁此圖之作選擇弗精議論不公余是以辨之後村劉氏總序曰呂紫微作江西宗派自山谷而下凡二十六人內何人表顒潘仲達大觀有姓名而無詩詩存者凡二十四家王直方詩絶少無可采餘二十三家部帙稍多今取其全篇佳者或一聯一句可諷詠者或對偶工者各著於編以便觀覽派中如陳后山彭城人韓子蒼陵陽人潘邠老黃州人夏均父二林蘄人鼂叔用江子之開封人李商老南康人祖可京口人高子勉京西人非皆江西人也同時如曾文清乃贛人又與紫微公以詩往還而不入派不知紫微去取之意云何惜當日無人以此叩之後來誠齋出誠得所謂活法所謂流轉圓美如彈丸者恨紫微公不及見耳派詩舊本以東萊居后山上非是今以繼宗派庶不失紫微公初意輶軒集一卷張氏曰鄱陽洪皓歷陽張邵新安朱辨使金得歸道間唱酬邵為之序古今絶句三卷陳氏曰吳説傅朋所書杜子美王介甫詩師禮之子王令逄原之外孫也元真子漁歌碑傳集録一卷陳氏曰元真子漁歌世止傳誦其西塞山前一章而已嘗得其一時唱和諸賢之辭各五章及南卓栁宗元所賦通為若干章因以顔魯公碑述唐書本傳以至近世用其詞入樂府者集為一編以備吳興故事艇齋師友尺牘二卷陳氏曰南豐曾季貍裘父之師友往復書簡其子濰輯而刻之自呂居仁徐師川以降下至淳熙乾道諸賢或在焉裘父蕭然布衣而名流敬愛之若此足以知其人之賢且見當時風俗之美也膾炙集一卷陳氏曰朝請郎嚴煥刻於江陰韓吏部而下雜文二十餘篇唐人絶句詩集一百卷陳氏曰洪邁景盧編七言七十五卷五言六言二十五卷卷各百首凡萬首上之重華宮可謂博矣而多有本朝人詩在其中如李九齡郭震滕白王嵒王初之屬其尤不深考者梁何仲言也後村劉氏曰野處洪公編唐人絶句僅萬首有一家數百首並取不遺者亦有復出者疑其但取唐人文集雜説令人抄類而成書非必有所去取也唐絶句選五卷陳氏曰莆田柯夢得東海編所選僅一百六十六首去取甚嚴然人之好惡亦隨所見耳唐絶句選四卷陳氏曰倉部郎中福清林清之直父以洪氏雜句抄取其佳者七言一千二百八十五言百五十六六言十五首考德集三卷陳氏曰強至所集韓魏公薨後時賢祭文挽詩四家胡笳詞一卷陳氏曰蔡琰劉商王安石李元白也選詩七卷陳氏曰文選中録出别行以人之時代為次宏辭總類四十一卷後集三十五卷第三集十卷第四集九卷陳氏曰起紹聖乙亥迄嘉定戊辰皆刻於建昌軍學相傳紹興中太守陸時雍所刻前集也餘皆後人續之戊辰以後時相不喜此科主司務以艱僻之題困試者縱有記憶不遺文采可觀輒復推求小疵以故久無中選者初紹聖設科但曰宏詞不試制誥止於表檄露布戒諭針銘頌記序九種亦不用古題及大觀改曰詞學兼茂去戒諭及檄而益以制誥亦為九種四題而二題以歷代故事及紹興始名以博學宏詞復益以誥贊檄為十一種三日試六題各一今一古遂為定制古文關鍵二卷陳氏曰呂祖謙所取韓栁歐蘇曾諸家文標抹注釋以教初學迂齋古文標注五卷陳氏曰宗正寺簿四明樓昉暘叔撰大略如呂氏關鍵而所取自史漢而下至於本朝篇目增多發明尤精學者便之歷代奏議十卷陳氏曰呂祖謙集國朝名臣奏議十卷陳氏曰呂祖謙集凡二百篇皇朝名臣奏議一百五十卷陳氏曰丞相沂國忠定公趙汝愚編進時為蜀帥自序曰恭惟我宋藝祖開基纍聖嗣業深仁厚澤相傳一道若夫崇建三館增置諫員許給舍以封還責侍從以獻納復唐轉對之制設漢方正之科凡以廣聰明容受讜直海涵天覆日新月益得人之盛高掩前古逮至王安石為相務行新法違衆自用而患人之莫已從也於是指老成為流俗謂公論為浮言屏棄忠良一時殆盡自是而後諂諛之風盛而朋黨之禍起矣臣伏覩建隆以來諸臣章奏考尋歲月蓋最盛於慶歷元祐之際而漸弊於熙寧紹聖之時方其盛也朝廷庶事微有過差則上自公卿大夫下及郡縣小吏皆得盡言極諫無所違忌其議論不已則至於舉國之士咸出死力而爭之當是時也豈無不利於言者謂其強聒取名植黨於朝期以搖動上心然而聖君賢相率善遇而優容之故其治效卓然士以增氣及其敝也朝廷有大黜陟大政令至無一人敢議論者縱或有之其言委曲畏避終無以感悟人主之意而獻諛者遂以為內外安靜若無一事可言者矣殊不知禍亂之機發於所伏今尚忍言哉臣仰惟陛下嘗命館閣儒臣編類國朝文鑑奏疏百五十六篇猶病其太略兹不以臣既愚且陋復許之盡獻其言萬幾餘間特賜紬繹推觀慶歷元祐諸臣其詞直其計從而見效如此熙寧紹聖諸臣其言切其人放逐而致禍如彼然則國家之治亂言路之通塞蓋可以鑒矣續百家詩選二十卷陳氏曰三衢鄭景龍伯允集以續曾慥前選凡慥所遺及在慥後者皆取之然其率略尤甚江湖集九卷陳氏曰臨安書坊所刻本取中興以來江湖之士以詩馳譽者而方惟深子通承平人物鼂公武子止嘗為從官乃亦在其中其餘亦未免玉石蘭艾混殽雜遝然而士之不能自暴白於世者賴此以有傳書坊巧為射利未可以責備也回文類聚三卷陳氏曰桑世昌澤卿集以璇璣圖為本初而並及近世詩詞且以至道御製冠於篇首送朱壽昌詩三卷中興藝文志皇朝司農少卿朱壽昌生數歲而母嫁五十年不相知熙寧初棄官於同州求得之乃屈資求為蒲中倅士大夫作詩送之江湖堂詩集一卷中興藝文志皇朝知洪州元積中詠其居和者數十人世綵集三卷中興藝文志政和中廖剛曾祖母與祖母享年最高皆及見五世孫剛作堂名世綵以奉之士大夫為作詩滁陽慶厯集十卷後集十卷陳氏曰朝散郎滁人徐徽仲元集斷自慶厯以來曾肇子開紹聖中謫守為之序其後集則吳臸張康朝王彥恭所續宣和四年唐恪欽叟序之末及紹興蓋又後人續入之爾吳興詩一卷陳氏曰熙寧中知湖州孫氏集而不著名以其時考之孫覺莘老也吳興分類詩集三十卷陳氏曰霅川倪祖義子由編大抵以孫氏所集太略而增廣之且並及近時諸公之作然亦病於太詳祖義齊齋之子少俊該洽仕未達年五十以死會稽掇英集二十卷續集四十五卷陳氏曰熙寧中郡守孔延之程師孟相繼纂集其續集則嘉定中汪綱俾郡人丁燧為之潤州類集十卷陳氏曰監潤州倉曹曾􅌈彥和纂始東漢終南唐京口詩集十卷續二卷陳氏曰鎮江教授熊克集開寶以來詩文本二十卷止刻其詩又得二卷自南唐而上曾所遺者補八十餘篇永嘉集三卷嘉禾詩一卷陳氏曰並不知集者天台集二卷别編一卷續集三卷陳氏曰初李庚子長集本朝人詩為二卷未行太守李兼孟達得之又得郡士林師針所集前代之作為賦二詩二百乃以本朝人詩為續集而併刻焉别師針之子表民所補也括蒼集三卷後集五卷别集四卷陳氏曰郡人吳飛英陳百朋相繼纂輯釣臺新集六卷續集十卷陳氏曰郡人王敷集續者郡守謝得輿子上也長樂集十四卷陳氏曰福建提刑吳興俞尚集宣和三年序清漳集三十卷陳氏曰通判漳州趙不敵編揚州詩集二卷陳氏曰教授馬希孟編元豐四年秦觀作序少遊序略曰鮮于公領州事之二年命教授馬君採諸家之集而次之又搜訪於境內簡編碑板亡缺之餘凡得古律詩洎針賦合二百二篇勒為三卷號揚州集按禹貢淮海惟揚州則江湖之間盡其地自漢以來既置刺史於是稱揚州者往往指其刺史所治而已漢以來刺史無常治或歷陽壽春曲阿合肥建業而江左復以會稽為東揚州自隋以後始治廣陵此集之作自魏文帝詩而下在當時雖非揚州而實今之廣陵者皆取之其非廣陵而當時為揚州者皆不復取云宣城集三卷陳氏曰知宣州安平劉涇元符三年序南州集十卷陳氏曰太平州教授林桷子長集南紀集五卷後集三卷陳氏曰知漢陽軍于霆教授施士衡編其後集則教授鞏豐也湘江集三卷陳氏曰不知何人集湘江者韶州曲江别名艮嶽集一卷陳氏曰不知集者其首則御製記文也桃花源集二卷又二卷陳氏曰紹聖丙子四明田孳序淳熙庚子縣令趙彥琇重編合為一卷下卷則淳熙以後所續庾樓紀述三卷琵琶亭詩一卷東陽紀詠四卷陳氏曰俱不知集者盤洲編二卷陳氏曰洪丞相適兄弟子姪所賦園池詩也瓊野録一卷陳氏曰學士洪邁園池記述題詠其曰瓊野者從維揚得瓊花植之而生遂以名圃清暉閣詩一卷陳氏曰史正志創閣於金陵僚屬皆賦詩會稽紀詠六卷陳氏曰汪綱仲舉帥越多所修創嚴陵洪渼每事為一絶賡者四人曰張渂王栐程震龍馮大章又有諸葛興為古詩二十篇蕭秋詩集一卷陳氏曰玉山徐文卿斯遠作蕭秋詩四言九章章四句趙蕃昌甫而下和者十三人紹熙辛亥也趙汝談履常亦與焉後三十三年嘉定癸未乃序而刻之文卿晚第進士未注官而死有詩見江湖集唐山集一卷後集三卷陳氏曰卞圜宋佽編唐山者臨安昌化縣也後典麗賦四十卷陳氏曰金華唐仲友與政編仲友以詞賦稱於時此集自唐末以及本朝盛時名公所作皆在焉止於紹興間有王戊集典麗賦九十三卷故此名後典麗賦王氏集未見指南賦箋五十五卷指南賦經八卷陳氏曰皆書坊編集時文止於紹熙以前指南論十六卷又本前後二集四十六卷陳氏曰淳熙以前時文擢犀䇿一百九十六卷擢象䇿一百六十八卷陳氏曰擢犀者元祐宣政以及建紹初年時文也擢象則紹興末大抵科舉場屋之文愈降愈下後生亦不復知前輩之舊作姑存之以觀世事文章正宗二十卷陳氏曰參知政事真德秀希元撰自序正宗云者以後世文詞之多變欲學者識其源流之正也自昔集録文章若杜預摯虞諸家往往湮沒不傳今行於世者惟梁昭明文選姚鉉文粹而已繇今視之二書所録果得源流之正乎故今所集以明義理切世用為主其體本乎古而指近乎經者然後取焉否則辭雖工亦不録其目凡四曰辭命曰議論曰敘事曰詩賦去取甚嚴序辭命曰書之諸篇聖人筆之於經不當與後世文辭同録獨取春秋內外傳所載周天子諭告諸侯之辭列國往來應對之辭下至兩漢詔册而止蓋魏晉以降文辭猥下無復深淳溫厚之指至偶儷之作興而去古益遠矣學者欲知王言之體當以書之誥誓命為之主而參之以此篇則所謂正宗者庶可識矣序議論曰六經語孟聖賢大訓不當與後之作者同録而獨取春秋內外傳所載諫爭論説之辭先漢以後諸臣所上書疏封事之屬以為議論之首他所纂述或發明義理或敷析治道或褒貶人物以次而列焉序敘事曰今於書之諸篇與史之紀傳皆不復録獨取左氏史漢敘事之可喜者與後世記序傳志之典則簡嚴者以為作文之式若夫有志於史筆者自當深求春秋大義而參之遷固諸書非此所能該也序詩歌曰朱文公嘗言古今之詩凡三變蓋自書傳所記虞夏以來下及漢魏自為一等自晉宋間顔謝以後下及唐初自為一等自沈宋以後定著律詩下及今日又為一等然自唐初以前其為詩者固有高下而法猶未變至律詩出而後詩之古法始為大變矣故嘗欲抄取經史諸書所載韻語下及文選古詩以盡乎郭景純陶淵明之作自為一編而附於三百篇楚辭之後以為詩之根本凖則又於其下二等之中擇其近於古者各為一編以為之羽翼輿衛其不合者則悉去之不使其接於胸次要使方寸之中無一字世俗語言意思則其為詩不期於高遠而自高遠矣今惟虞夏二歌與三百五篇不録外自餘皆以文公之言為凖而拔其尤者列之此篇律詩雖工亦不得與若針銘頌贊郊廟樂歌琴操皆詩之屬間亦采摘一二以附其間至於詞賦則有文公集注楚辭後語今亦不録或曰此編以明義理為主後世之詩其有之乎曰三百五篇之詩其正言義理者無幾而諷詠之間悠然得其性情之正即所謂義理也後世之作雖未可同日而語然其間寄興高遠讀之使人忘寵辱去鄙吝翛然有自得之趣而於君親臣子大義亦時有發焉其為性情心術之助反有過於他文者蓋不必顓言性命而後為關於義理也讀者以是求之斯過半矣後村劉氏曰文章正宗初蒙西山先生以詩歌一門屬余編類且約以世教民彛為主如仙釋閨情宮怨之類皆勿取豫取漢武帝秋風辭西山曰文中子亦以此詞為悔心之萌豈其然乎意不欲收其嚴如此然所謂携佳人兮不能忘之語蓋指公卿扈從者似非為後宮設凡余所取而西山去之者大半又增入陶詩甚多如三謝之類多不收右總集文心雕龍十卷鼂氏曰晉劉協撰評自古文章得失别其體製凡五十篇各係之以贊云余嘗題其後曰世之詞人刻意文藻讀書多滅裂杜牧之以龍星為真龍王摩詰以去病為衛青昔人譏之然亦不足怪蓋詩賦或率爾之作故也今協著書垂世自謂嘗夢執丹漆器隨仲尼南行其自負亦不淺矣觀其論説篇論語以前經無論字六韜三論後人追題是殊不知書有論道經邦之言也其疏略殊過於王杜矣陳氏曰協後為沙門名慧地文章緣起一卷陳氏曰梁太常卿樂安任昉彥升撰但取秦漢以來不及六經詩品三卷陳氏曰梁記室參軍潁川鍾嶸仲偉撰以古今作者為三品而評之上品十一人中品三十九人下品六十九人金針詩格三卷鼂氏曰唐白居易撰居易自謂與劉禹錫元稹皆以詩知名撮詩之體要為一格病得針而愈詩亦猶是也故曰金針集詩格一卷陳氏曰稱魏文帝而所述詩或在沈約後其為假託明矣詩格一卷詩中密旨一卷陳氏曰唐王昌齡撰評詩格一卷陳氏曰唐李嶠撰嶠在昌齡之前而引昌齡詩格八病亦未然也二南密旨一篇陳氏曰唐賈島撰凡十五門恐亦依託文苑詩格一卷陳氏曰稱白氏尤非也詩式五卷詩議一卷陳氏曰唐僧皎然撰以十九字括詩之體風騷指格一卷陳氏曰唐僧齊已撰詩格一卷陳氏曰沙門神彧撰處囊訣一卷陳氏曰金華僧保暹撰流類手鑑一卷陳氏曰僧虛中撰詩評一卷陳氏曰桂林僧德淳撰擬皎然十七字一卷陳氏曰稱正字王元撰不知何人炙轂子詩格一卷陳氏曰唐王睿撰句圖一卷陳氏曰唐李洞撰唐詩主客圖一卷陳氏曰唐張為撰所謂主者白居易孟雲卿李益鮑溶孟郊武元衡各有標目餘有升堂及門入室之殊皆所謂客也近世詩𣲖之詩殆出於此要皆有未然者文章元妙一卷陳氏曰唐任藩言作詩聲病對偶之類凡世所傳詩格大率相似余嘗書其末云論詩而若此豈復有詩矣唐末詩格汙下其一時名人著論傳後乃爾欲求高尚豈可得哉修文要訣一卷鼂氏曰偽蜀馮鑑撰雜論為文體式評其誤謬以訓初學云緣情手鑑詩格一卷陳氏曰題樵人李𢎞宣撰未詳何人當在五代前詩格要律一卷陳氏曰進士王夢簡撰風騷要式一卷陳氏曰徐衍述亦未詳何人琉璃堂墨家圖一卷陳氏曰不著名氏雅道機要二卷陳氏曰前卷不知何人後卷稱徐寅撰詩評一卷陳氏曰不知何人御製句圖一卷陳氏曰太宗皇帝所選楊徽之詩十聯真宗皇帝所選送劉琮詩八篇楊氏筆苑句圖一卷續一卷陳氏曰黃鑑編蓋楊億大年之所嘗舉者皆時賢佳句續者不知何人亦大年所書唐人句也所録李義山唐彥謙之句為多崑體蓋出二家惠崇句圖一卷陳氏曰僧惠崇所作孔中丞句圖一卷陳氏曰中丞者或是孔道輔耶雜句圖一卷陳氏曰不知何人所集皆本朝人詩也自魏文帝詩格而下二十七家皆已見吟窗雜詠續金針詩格一卷鼂氏曰梅堯臣聖俞撰聖俞遊廬山宿西林與僧希白談詩因廣樂天所述云陳氏曰二金針大抵皆假託也吟窗雜詠三十卷陳氏曰莆田蔡傅撰君謨之孫也取諸家詩格詩評之類集成之又為吟譜凡魏晉而下能詩之人皆略具本末總為此書麻沙嘗有刻本節略不全李公詩苑類格三卷鼂氏曰李淑撰寶元三年豫王出閣淑為王子傅因纂成此書上之述古賢作詩體格總九十目林和靖摘句圖一卷陳氏曰林逋詩句詩三話一卷陳氏曰無名氏詩話一卷鼂氏曰歐陽修永叔撰修退居汝陰戲作此以資談笑續詩話一卷鼂氏曰司馬光君實撰序云詩話尚有遺者歐公文章聲名雖不可及然記事一也故敢續之中山詩話三卷鼂氏曰劉攽貢父撰多及蘇梅歐石攽以博學名世如言蕭何未嘗掾功曹亦有誤謬東坡詩話二卷鼂氏曰蘇軾號東坡居士雜書有及詩者好事者因集之成二卷后山詩話二卷鼂氏曰陳師道無已撰論詩七十餘條潛溪詩眼一卷鼂氏曰范溫元實撰溫祖禹之子學詩於黃庭堅歸叟詩話六卷鼂氏曰王直方立之撰直方自號歸叟元祐中蘇子瞻及其門下士以盛名居北門東觀直方世居浚儀有别墅在城南殊好事以故諸公亟會其家由是得聞緒言餘論因輯成此書然其間多以已意有所抑揚頗失是非之實宣和末京師書肆刋刻鬻之羣從中以其多記從父詹事公語言得之以呈公公覽之不懌曰皆非我語也苕溪漁隱曰王直方詩話載鼂以道云説之初見東坡詠梅西江月詞便知道此老須過海只為古今人不曾道到此須罰教去此言鄙俚近於忌人之長幸人之禍直方無識載之詩話寧不畏人之譏誚乎杜詩刋誤一卷鼂氏曰皇朝王仲至撰韓文辨證八卷鼂氏曰洪興祖討論韓愈詩文推考其根源以訂正其訛謬頗為該博云韓栁文章譜三卷鼂氏曰皇朝黃大輿撰大輿之意以為文章有壯老之異故取韓愈栁宗元文章為三譜其一取其詩文中官次年月可考者次第先後著其初晚之異也其一悉取其詩文比敘之其一列當時君相於上以見二人之出處極為詳悉天厨禁臠三卷鼂氏曰釋惠洪撰論諸家詩格石林詩話二卷陳氏曰葉夢得撰續詩話一卷陳氏曰無名氏許彥周詩話一卷陳氏曰襄邑許顗撰四六談麈一卷陳氏曰謝伋景思撰四六話一卷陳氏曰王銍性之撰四六餘話一卷陳氏曰楊囦撰未詳何人視前二家為泛雜艇齋詩話一卷陳氏曰曾季貍裘父撰賦門魚鑰十五卷陳氏曰進士馬稱撰集唐蔣防而下至本朝宋祁諸家律賦格訣賔朋宴語三卷陳氏曰太子中舍致仕貴溪邱昶孟陽撰南唐進士歸朝宰數邑著此書十五篇敘唐以來詩賦源流天禧辛酉鄧賀為序西清詩話三卷陳氏曰題無名子撰或曰蔡絛使其客為之也環溪詩話一卷陳氏曰臨川吳沆集韻語陽秋二十卷陳氏曰葛立方撰漁隱叢話六十卷後集四十卷陳氏曰新安胡仔元任撰待制舜陟之子居湖州自號苕溪漁隱䂬溪詩話十卷陳氏曰莆田黃徹常明撰續廣本事詩五卷陳氏曰聶奉先撰雖曰廣孟啓之舊其實集詩話耳山陰詩話一卷陳氏曰李兼孟達撰諸家老杜詩評五卷續一卷陳氏曰莆田方深道集選詩句圖一卷陳氏曰高似孫編杜詩發揮一卷陳氏曰金華杜旃仲高撰觀林詩話一卷陳氏曰楚東吳律子書撰未詳何人文説一卷陳氏曰南城包揚顯道録朱侍講論文之語右文史文獻通考卷二百四十九
