body:
  text: 文獻通考卷二百七十八鄱陽馬端臨貴與著象緯考一中宮三垣漢天文志曰凡天文在圖籍昭昭可知者經星常宿中外官凡一百十八名積數七百八十三星皆有州國官宮物類之象其伏見早晚邪正存亡虚實濶陿孟康曰伏見早晩謂五星也日月五星下道為邪存謂列宿不虧也亡謂恒星不見虚實若天牢星實則囚多虚則開出之屬也濶陿若三台星相去逺近也及五星所行合散犯守陵歴鬬食孟康曰合同舍也散五星有變則精散為祅星也犯五寸以内光芒相及也陵相冒過也食星月相凌不見者則所食也韋昭曰自下往觸之曰犯居其宿曰守經之為歴突掩為凌星相擊為鬭也彗孛飛流日月薄食張晏曰彗所以除舊布新也孛氣似彗飛流謂飛星流星也孟康曰飛絶迹而去流光迹相連也日月無光曰薄京房易傳曰日月赤黄為薄或曰不交而食曰薄韋昭曰氣往廹之為薄虧毁曰食也暈適背穴抱珥􅛆蜺孟康曰皆日旁氣也適日之將食先有黑之變也背形如背字也穴多作鐍其形如玉鐍也抱氣向日也珥形㸃黑也如淳曰暈讀曰運􅛆或作虹蜺讀曰齧螮蝀謂之􅛆表云雄為􅛆雌為蜺凡氣在日上冠為戴在旁直對為珥在旁如半環向日為抱向外為背有氣刺日為鐍鐍抉傷也迅雷風祅怪雲變氣此皆陰陽之精其本在地而上發於天者也政失於此則變見於彼猶景之象形鄉之應聲師古曰鄉讀曰響是以明君覩之而寤飭身正事思其咎謝其過則禍除而福至自然之符也晉天文志曰張衡云文曜麗乎天其動者有七日月五星是也日者陽精之宗月者陰精之宗五星五行之精衆星列布體生於地精成於列列居錯峙各有攸屬在野象物在朝象官在人象神其以神差有五列焉是為三十五名一居中央謂之北斗四布於方各七為二十八舍日月運行厯示吉凶五緯躔次用告禍福中外之官常明者百有二十四可名者三百二十為星二千五百微星之數盖萬一千五百二十庶物蠢蠢咸得繫命不然何得總而理諸後武帝時太史令陳卓總甘石巫咸三家所著星圖大凢二百八十三官一千四百六十四星以為定紀今畧其昭昭者以備天官云中宫北極紫微宫中元北極紫微宫北極五星在其中大帝之座第二珠第三之宫庶子居第一號曰為太子四為后宫五天樞一云第三明者帝之居第四明曰四庶子最小第五天之樞左右四星是四輔天一太一當門路左樞右樞夾南門兩面營衞一十五上宰少尉兩相對少宰上輔次少輔上衞少衞次上丞後門東邊大贊府門西唤作一少丞以次却向門前數陰德門裏兩黄聚尚書以次其位五女史柱史各一户御女四星五天柱大理兩星隂德邊勾陳尾指北極顛勾陳六星六甲前天皇獨在勾陳裏五帝内座後門是華盖并杠十六星杠作柄象華盖形盖上連連九箇星名曰傳舍如連丁垣外左右各六珠右是内階左天厨階前八星名八穀厨下五箇天棓宿天床六星左樞在内厨兩星右樞對文昌斗上半月形希疎分明六箇星文昌之下曰三公太尊只向三公明天牢六星太尊邊太陽之守四勢前一箇宰相太陽側更有三公相西邉即是元戈一星圓天理四星斗裏暗輔星近著開陽淡一本云文昌之下三師名天牢六星四勢前更有二公相西偏即是太陽一星圓天理四星斗裡暗輔星近著開陽淡北斗之星七宿明第一主帝名樞精第二第三璇璣是第四名權第五衡開陽搖光六七名北極五星在紫微宫中一名天極一名北辰其紐星天之樞也天運無窮三光迭耀而極星不移故曰居其所而衆星共之第一星主月太子也第二星主日帝王也亦為太乙之座謂最赤明者也第三星主五星庶子也北極五星最為尊也中星不明主不用事右星不明太子憂也其第四星為后宫第五星為天樞張衡云二星並為後宫北極五星明大則吉變動則憂抱極樞四星曰四輔所以輔佐北樞而出度受政也張衡云抱極之細星也為輔臣之位主贊萬機小而明吉大明及芒角臣逼君暗則官不理天乙一星在紫宫門右星之南天帝之神也主戰鬬知人吉凶者也太乙一星在天乙南相近亦天帝神也主使十六神知風雨水旱兵革饑饉疾疫災害所生之國也張衡云天乙逼閶闔外其占明而有光則隂陽和合萬物成人主吉不然反是太乙占與天乙畧同紫微垣十五星其西蕃七東蕃八在北斗之北一曰紫微大帝之座也天子之常居也主命主度也一曰長垣一曰天營一曰旗星為藩衞備藩臣也宫闕兵起旗星直天子出自將宫中兵張衡云紫微垣十五星東藩八西藩七其東藩近閶闔門第一星為左樞第二星為上宰第三星為少宰第四星為上輔第五星為少輔第六星為上衞第七星為少衞第八星為少丞其西藩近閶闔門第一星為右樞第二星為少尉第三星為上輔第四星為少輔第五星為上衞第六星為少衞第七星為少丞皆以明大有常則吉若盛明則内輔盛也宫垣直而明天子將兵開則兵起西藩開如門象名閶闔門有流星自門而出四野者當有中使銜命視其所適野而諭之也陰德二星在紫微宫内尚書之西主施德者其占以不明為宜明則新君踐極隋志曰尚書西二星曰陰德陽德主周急振撫又分為二坐星矣門内東南維五星曰尚書主納言夙夜咨謀龍作納言此之象也張衡曰八座大臣之象其占與四輔不殊極東一星曰柱下史主左右記君之過星明則史直辭不明反是柱史北一星曰女史婦人之微者主傳漏故漢有侍史張衡云婦官也主記宫中之事其占與柱史同御女四星在紫微宫内勾陳之北八十一御妻之象也其占眀則多内寵不明則否晉志謂之女御宫天柱五星在紫微宫門内華盖杠左旁近東垣北隅法五行主晦朔晝夜之職明正則吉人安陰陽調不然則司厯過隋志云建政教立圖法之府也常以朔望日垂禁令於天柱以示百司周禮以正歳之月示法象魏此之謂也大理二星在紫微門内次近陰德决獄之官星明則刑憲平不明則寃酷深勾陳六星在紫微宫華盖之下隋志云後宫也大帝之正妃也大帝之常居也張衡云大帝所居之宫也亦將軍之象也星明則吉暗則人主惡之勾陳口一星曰天皇大帝其神曰曜魄寳主御羣靈秉萬機神圖也其星隐而不見則為災六甲六星在紫微宫内華盖杠左旁分掌陰陽紀時節明則陰陽和不明則寒暑易節五帝内座五星在華盖下勾陳上斧扆之象所以備宸居者明正則吉變動則災凶隋志云客星犯紫微宫中座大臣犯主華葢七星其杠九星合十六星在勾陳上正當大帝所以覆蔽大帝之座也明正則吉傾動則凶傳舍九星在華盖上近河賔客之館主胡人入中國客星守之備姦使亦曰胡兵起内階六星在文昌北天皇之陛也明吉傾動凶紫微東垣北維外六星曰天厨天子百官之厨也見吉不見凶八穀八星在紫微西藩之外五車之北其八星一主稻二主黍三主大麥四主小麥五主大豆六主小豆七主粟八主麻子明則八穀皆成暗則不熟一星不見則八穀不登八星不見則國人糊口天棓五星在女床東北天子先驅所以禦難也不明則國兵起一曰主爭訟明大凶小吉天床六星當閶闔門外主天子寢舍解息燕休之處星正大吉君有慶傾則人主不安一云在宫門外聽政之象也為寢舍也暗凶内厨兩星在紫微垣外西南角主六宫之内飲食府也一云主后夫人與太子飲晏居常無咎有犯守凶文昌六星在北斗魁前天之六府也主集計天道一曰上將大將軍建威武次二曰次將尚書正左右三曰貴相太常理文緒四曰司禄司中司隸賞功進爵五曰司命司怪太史主滅咎六曰司冦大理佐理寳所謂一者起北斗魁前近内階者也明潤大小齊天瑞臻張衡云其占黄潤光明萬人安大小均天瑞降青黑細微多所害搖動移徙大臣憂金火守入兵興孛犯國亂一曰文昌動則三公受誅后崩災福與三公同三公三星在北斗柄東又三公星在北斗魁西並為太尉司空司徒之象主爕理陰陽弼君機務其星移徙不吉居常安金火守之三公有凶隋志曰杓南三星及魁第一星皆曰三公宣德化調七政和陰陽之官也太尊一星在中台之北貴戚也巫咸云聖公之象居常為定不見則凶金犯守為災貴賤將敗者也天牢六星在北斗魁下貴人之牢也主愆過禁暴淫與貫索同占太陽守一星在相西大將大臣之象也主戒不虞設武備也非其常兵起明吉暗凶移徙大臣誅勢四星在太陽西北刑餘人而用事者也不明吉明即閹官擅權相一星在北斗南隋志曰相者總領百官而掌邦教以佐帝王安邦國集衆事也明吉元戈一星在招搖北一曰天戈也芒角大而動則四夷兵起其占與梗河相類北斗魁中四黒星為貴人之牢曰天理明及搖動與有星者為貴人下獄北斗七星輔一星在太微北七政之樞機陰陽之本元也故運乎天中而臨制四方以建四時而均五行也魁四星為璇璣杓三星為玉衡又象號令之主又為帝車取乎運動之義也又魁第一星曰天樞二曰璇三曰璣四曰權五曰玉衡六曰開陽七曰搖光一至四為魁五至七為杓樞為天璇為地璣為人權為時玉衡為音開陽為律搖光為星石氏云第一曰正星主陽德天子之象也二曰法星主陰刑女主之位也三曰令星主禍害也四曰伐星主天理伐無道五曰殺星主中央助四旁殺有罪六曰危星主天倉五穀七曰部星亦曰應星主兵又云一主天二主地三主火四主水五主土六主木七主金又曰一主秦二主楚三主梁四主吳五主趙六主燕七主齊輔星附乎開陽所以佐斗成功也又曰主危正矯不平又曰丞相之象也七政星明則國昌不明則國殃斗旁欲多星則安斗中少星則人怨上天下多訟法者無星二十日有輔星明而斗不明臣强主弱斗明輔不明主强臣弱也杓南三星及魁第一星皆曰三公宣德化調七政和陰陽之官也張衡云若廣營宫室妄鑿山陵則第二星不明或變色若不愛百姓聚興征役則第三星不明或變色若發號令不明四時不明天道則第四星不明或變色若廢正樂務淫聲則第五星不明或變色若不勸農桑不務稼穡峻法濫刑退賢傷政則第六星不明或變色若不撫四方不安夷夏則第七星不明或變色凡日月暈連環及斗月暈及搖動兵起其傍側中小星多則天下不安人多怨一云小星多則天下安不然則國人散五曜及客星守入皆凶孛彗尤甚也右夾漈鄭氏作通志天文略言漢晉諸志所載諸星名數災祥叢雜難舉惟隋丹元子作歩天歌句中有圖言下見象或豐或約無餘無失故特取其歌而於歌之後採諸家之言以備之今所載其前則丹元子歌也後則夾漈所取諸志以釋之者也其説亦略備矣然宋史志所載近代諸儒之説則考訂尤詳故又摭其所未備者附見各叚之末云宋兩朝天文志舊説皆以紐星正樞機後祖暅之立儀測之洎皇祐中以銅儀管候之其不動處猶在樞星之末一度餘朱子語録曰北辰乃天之北極天如水車北辰乃軸處水車動而軸未嘗動又曰北辰是那中間無星處些子不動是天之樞紐北辰無星縁人要取此為極不可無箇記認所以就其旁取一小星謂之極星問極星動否曰極星也動只是近那辰後雖動而不覺今人以管去窺那極星見其動來動去只在管裡面不動出去向來人説北極便是北辰皆只説北極不動至本朝人方去推得是北極只在北辰邊頭而極星依舊動宋兩朝天文志太子星去北極十五度入心宿三度四輔四星去天樞各四度勾陳六星去極六度半入壁宿五度天皇大帝星去極八度半入室宿十一度華盖七星杠九星距中大星去極二十六度入婁宿四度五帝内座五星距中大星去極十二度半入室宿六度六甲六星距南星去極一十五度