在翼軫北張衡云天子之宮庭五帝之座十二諸侯府也其外蕃九卿也一曰軒轅為權太微為衡衡主平也隋志云又為天庭理法平辭監升授德列宿受符諸神考節舒情稽疑也南蕃中二星間曰端門東曰左執法廷尉之象也西曰右執法御史大夫之象也執法所以舉刺凶奸者也左執法之東左掖門也右執法之西右掖門也東蕃四星南第一曰上相其北東太陽門也第二星曰次相其北中華東門也第三星曰次將其北東太陰門也第四星曰上將所謂四輔也西蕃四星南第一星曰上將其北西太陽門也第二星曰次將其北中華西門也第三星曰次相其北西太陰門也第四星曰上相亦四輔也東西蕃有芒及動搖者諸侯謀天子也執法移則刑罰尤急月五星入太微軌道吉其所犯中座成刑謁者一星在太微内在執法東北主贊賔客也不見外國不賔服謁者東北三星曰三公内座朝㑹之所居也張衡云以輔弼帝者其名與夹斗三公同三公北三星曰九卿内座主治萬事與天紀同占九卿西五星曰内五諸侯内侍天子不之國也辟雍之禮得則太微諸侯明屏四星在端門内帝座南近右執法屏所以擁蔽帝庭也執法主刺舉星明潤則君臣有禮黄帝内座一星在太微中含樞紐之神也天子動得天度止得地意從容中道則太微五帝之座明以光黄帝座不明人主當求賢士以輔治不然則奪勢又曰太微五帝座小弱青黒天子國亡四帝内座四星夾黄帝座東方星蒼帝靈威仰之神也南方星赤帝赤熛怒之神也西方星白帝白招矩之神也北方星黑帝叶光紀之神也張衡云五帝同明而光則天下歸心不然則失位金火水入太微若順入軌道伺其出之所守之分則為天子所誅也帝座東北一星曰幸臣主親愛臣明則幸臣用事微細吉太子一星在幸臣西五帝座北儲貳之星明而潤則太子賢不然則否金火守入太子不廢則為簒逆之事從官一星在太子西北主從官不見則帝不安如常則吉郎將一星在郎位東北所以為武衞張衡云今左右中郎將是也大明芒角將恐不可當也虎賁一星在太微西蕃之外上相之西下台之南靜室旄頭之騎官也張衡云主侍從之武臣也與車騎同占常陳七星如畢狀在郎位北天子宿衞虎賁之士以設强毅也星搖動天子自出明則武兵用微則兵弱郎位十五星又云二十四星在帝座東北一曰依烏郎位也周官之元士漢官之光禄中散騎諌議議郎三署郎中是其職也張衡云今之尚書郎也欲其大小相均光潤有常吉隋志郎位主守衞也其星明大臣有刼主又曰客犯上其星不具后死幸臣誅客星入之大臣為亂明堂三星在太微西南角外天子布政之宫也明吉暗凶明堂西三星曰靈臺主觀雲物察符瑞候災變也占與司怪同少微長垣二座星已釋在張星之次矣三台六星兩兩而居起文昌列招搖太微一曰天柱三公之位也在天曰三台主開德宣符也西近文昌二星曰上台為司命主夀次二星對軒轅曰中台為司中主宗室東二星抵太微曰下台為司禄主兵所以昭德塞違也又曰三台為天階太乙躡以上下一曰泰階上階上星為天子下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庶人所以和陰陽而理萬物也其星有變各以所主占之君臣和集如其常度張衡云色齊明而行列相類則君臣和法令平不齊為乖度金火守入兵起彗孛尤甚也宋兩朝天文志太微十星右執法去極八十四度入翼宿十二度半左執法去極八十六度入軫宿初度半謁者一星去極八十三度入軫宿一度三公三星距東星去極八十四度半入軫六度九卿三星距西北星去極七十五度入軫七度内五諸侯五星距西星去極七十度入軫一度五帝座五星距中大星去極七十一度半入翼十一度屏四星距西南星去極八十度入翼十度太子一星去極六十六度半入翼十一度半從官一星去極六十四度半入翼八度半幸臣一星去極六十六度半入翼十五度郎位十五星距西南星去極六十度入翼十八度郎將一星去極四十七度半入軫十一度常陳七星距東星去極五十一度半入軫初度虎賁一星去極六十二度少入翼二度宋中興天文志曰太微垣有五帝座五帝内座又列乎紫宮何也曰五帝常居在太微而入覲乎紫宮故有内座也然則五帝何帝也此志所謂靈威仰赤熛怒含樞紐白招矩叶光紀之神也有天皇矣而又有五帝何也五帝在天主五行在地主五嶽分方主事以輔天皇者昔周公郊祀后稷以配天斯北極紫微中宫天皇大帝也而宗祀文王於明堂以配上帝則宫南太微五帝也此月令明堂所以分五宫祀五帝也天市垣下元一宫名天市兩扇垣牆二十二當門六角黒市樓門左兩星是車肆兩箇宗正四宗人宗星一雙亦依次帛度兩星屠肆前候星還在帝座邊帝座一星常光明四箇微茫宦者星以次兩星名列肆斗斛帝前依其次斗是五星斛是四垣北九箇貫索星索口横者七公成天紀恰似七公形數著分明多兩星紀北三星名女牀此座還依織女傍三光之象無相侵二十八宿隨其隂水火木土并與金以次别有五行吟天市垣二十二星在房心東北主權衡主聚衆一曰天旗庭主斬戮之事也市中星衆潤澤則嵗實星希則嵗虚熒惑守之戮不忠之臣又曰若怒角守之者臣殺主彗星出為徙市易都客星入之兵大起出之有貴䘮張衡云天市明則市利急商人無利忽暗則反是市樓六星在市中臨箕星之上主司闤闠明則吉暗則市利不理也隋志市樓者市府也主市價律度其陽為金錢其陰為珠玉變見各以所主占之車肆二星在天市垣南門之内主車駕不明則國車盡行隋志主衆賈之區宗正二星在帝座東南宗大夫也彗星守之若失色宗正有事客星守動則天子親屬有變又曰客星守之貴人死又曰宗正明則宗室有秩暗則國家凶宗人四星在宗正東主録親疎享祀如綺而明正族人有序宗星二星在宗人東北候星之東宗室之象帝輔血脉之臣也客星守之宗人不和帛度二星在宗室星東北主度量明則尺量平商人不欺暗則否屠肆二星在帛度東北主烹宰明大則肆中多宰殺候一星在帝座東北主伺陰陽也明大則輔臣强四夷開候細微則國安亡則主失位移則主不安居常則吉帝座一星在天市中候星西天庭也光而潤則天子吉威令行微細凶大人當之或云暗則大人不正張衡云帝座者帝王之座帝座有五一座在紫微宫一座在大角一座在心中一座在天市垣一座在太微宫咸云帝座一曰神農所居不見則大人當其咎宦者四星在帝座西南帝傍之閹人也星微則吉明則凶非其常宦者有憂其占與勢星同列肆二星在斛西北主寳玉之貨移徙則列肆不安火守入兵大起斗五星在宦者西南主平量覆則嵗熟仰則大饑明暗與帛度同斛四星在市樓北亦曰天斛主量者也占與斗同貫索九星在七公前一曰連索一曰連營一曰天牢主法律禁暴强也牢口一星為門欲其開也九星皆明天下獄煩七星見小赦五星見大赦動則斧鑕用中空則更元漢志云十五星張衡云貫索開有赦不見則形獄簡若閉口及星入牢中有繫死者常以午子夜候之一星不見則有小喜二星不見賜禄三星不見人主德令行且赦若客星出視其小大大有大赦小有小赦或云貫索為賤人之牢一星芒有喜事二星芒賜爵禄三星芒有赦門閉牢中多死水犯災火犯米貴七公七星在招搖東天之相也三公之象張衡云七公横列貫索之口主執法列善惡之官也星齊正則國法平差戾則獄多寃酷或云星入河米貴火犯之兵起天紀九星在貫索東九卿也為九河主萬事之紀理寃訟也明則天下多詞訟亡則政理壞國紀亂散絶則地震山崩女床三星在天紀之北為後宫御女主女事明則宫人恣意常則無咎宋兩朝天文志天市垣二十二星東西列各十一星其東垣南第一星曰宋第二星曰南海第三星曰燕第四星曰東海第五星曰徐第六星曰吳越第七星曰齊第八星曰中山第九星曰九河第十星曰趙第十一星曰魏其西垣第一星曰韓第二星曰楚第三星曰梁第四星曰巴第五星曰蜀第六星曰秦第七星曰周第八星曰鄭第九星曰晉第十星曰河間第十一星曰河中東垣南第一星宋去極一百五度半入危宿七度西垣第一星韓去極九十八度半入心宿五度市樓一星距東南星去極九十八度入尾宿十二度車肆二星距西大星去極一百度入尾宿三度斛四星距西南星去極八十七度半入尾宿三度列肆二星距東星去極八十六度入心宿三度半帝座一星去極七十五度入尾十度候一星去極七十八度半入尾十六度宦者四星距南星去極七十六度半入尾九度半斗五星距東大星去極七十九度入尾六度半宗正二星距北星去極八十五度半入尾十六度宗人四星距大星去極八十六度入箕一度宗室二星距北大星去極八十度半入箕五度帛度二星距西星去極六十九度少入箕三度屠肆二星距西星去極六十八度半入箕宿三度宋中興天文志天市垣中一星明大者謂之帝座帝座東北一星為后舊誤作候西南三星為妃舊失其位妃北一星在帝右后北一星在帝左是為左右常侍妃南四星為宦寺宦寺南一星為閽人閽人南四星為内屏此其别也而舊乃以右常侍一星及妃三星為宦者又以宦寺閽人合五星為斗又以内屏四星為斛皆誤也又曰凢三垣紫宫在中天市在紫宫之東北太微在紫宮之東南而大角在紫宫之正東故天市在大角左太微在大角右大角一星晉隋志雜之衆星中謂之天王座其説不同司馬遷云大角者天王帝廷其兩旁各有三星鼎足勾之曰攝提攝提者直斗柄所指以建時節故曰攝提格雖於衆星中頗表而出之亦未為得也故凢曰天王座曰天王帝廷曰直斗柄所指以建時節皆非是文獻通考卷二百七十八
