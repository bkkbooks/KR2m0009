body:
  text: 文獻通考卷三百十鄱陽馬端臨貴與著物異考十六訛言漢成帝建始三年十月丁未京師相驚言大水至渭水虒上小女陳持弓年九嵗師古曰虒上地名也音斯走入橫城門入未央宮尚方掖門殿門門內諸衛戶者莫見至句盾禁中而覺得師古曰句盾少府之署覺得事覺而見執得也民以水相驚者隂氣盛也小女而入宮殿中者下人將因女寵宮室之象也名曰持弓有似周家檿弧之祥易曰弧矢之利以威天下師古曰下繫之辭也是時帝母王太后弟鳳始為上將秉國政天知其後將威天下而入宮室故象先見也其後王氏兄弟父子五侯秉權至莽卒篡天下蓋陳氏之後云京房易傳曰妖言動衆兹謂不信路將亡人司馬死成帝綏和二年八月庚申鄭通里男子王褒師古曰鄭縣之通里衣絳衣小冠帶劒之北司馬門殿東門師古曰入北司馬門又入殿之東門也上前殿入非常室中如淳曰殿上室名解帷組結佩之師古曰組綬類所以繫帷又垂以為飾也佩帶之招前殿署長業等曰天帝令我居此業等收縛考問褒故公車大誰卒應劭曰在司馬殿門掌歡呵者也服虔曰衛士之師也著樊噲冠師古曰大誰者主問非常之人云姓名是誰也而應氏乃以歡譁為義云大歡呵不當厥理後之學者輒改此書誰字為歡違本文矣大誰本以誰何稱因用名官有大誰長今此卒者長所領士卒也病狂易師古曰謂病狂而變易其常也不自知入宮狀下獄死是時王莽為大司馬哀帝即位莽乞骸骨就第天知其必不退故因是而見象也姓名章服甚明徑上前殿路寢入室取組而佩之稱天帝命然時人莫察後莽就國天下寃之哀帝徴莽還京師明年帝崩莽復為大司馬因是而篡國哀帝建平四年正月民驚走持稿或棷一枚如淳曰棷麻幹也師古曰稿禾稈也音工老反棷音鄒又則久反傳相付與曰行詔籌道中相過逢多至千數或被髮徒踐師古曰徒踐謂徒跣也或夜拆關或踰墻入或乘車騎奔馳以置驛傳行經歷郡國二十六至京師其夏京師郡國民聚會里巷阡陌設張博具師古曰博戲之具歌舞祠西王母又傳書曰母告百姓佩此書者不死不信我言視門樞下當有白髮師古曰樞門扇所由開閉者也音昌于反至秋止是時帝祖母傳太后驕與政事師古曰與讀曰豫故杜鄴對曰春秋災異以指象為言語籌所以紀數民隂水類也水以東流為順走而西行反類逆上象數度放溢妄以相豫違忤民之心也西王母婦人之稱博奕男子之事於街巷阡陌明離闑內師古曰闑門撅也音魚列反與疆外師古曰與讀曰豫臨事盤樂亢陽之意白髮衰年之象體尊性弱難理易亂門人之所由樞其要也居人之所由制持其要也其明甚著今外家丁傅並侍帷幄布於列位有罪惡者不坐辜罰亡功能者畢受官爵皇甫三桓詩人所刺春秋所譏亡以甚此師古曰皇甫周卿士之字也周后嬖寵而處職位詩刺之事見小雅十月之交篇指象昭昭以覺聖朝奈何不應後哀帝崩成帝母王太后臨朝王莽為大司馬誅滅丁傅一曰丁傅所亂者小此異乃王太后莽之應云按訛言惟唐史志置之詩妖之後諸史皆無之惟錯見於言不從及人痾條下今撮取其語言之妖異類世俗所謂語讖者立訛言一門云王莽始建國元年長安狂女子碧呼道中碧女子名也曰高皇帝大怒趣歸我國不者九月必殺汝莽收捕殺之二年十一月立國將軍建奏今月癸酉不知何一男子遮臣建車前自稱漢氏劉子輿成帝下妻子也下妻猶小妻劉氏當復趣空宮趣音促收繫男子即常安姓武字仲大逆無道請論如法天鳳元年民訛言黃龍墮死黃山宮中百姓奔走往觀者有萬數莽惡之師古曰莽自謂黃德故惡此妖捕繫問語所從起不能得後漢安帝永初元年十一月民訛言相驚司𨽻并冀州民人流移時鄧太后專政婦人以順為道夫死從子今專主王事此不從而僭也靈帝熹平二年六月雒陽民訛言虎賁寺東壁中有黃人形容鬚眉良是觀者數萬省中悉出道路斷絶到中平元年二月張角兄弟起兵冀州自號黃天三十六方四靣出師將帥星布吏士外屬因其疲餧幸而勝之光和元年五月壬午何人白衣欲入德陽門辭我梁伯夏教上殿為天子中黃門桓賢等呼門吏僕射欲收縛須臾還走求索不得不知姓名蔡雍以為類成帝時男子王褒入宮事以往况今將有狂狡之人欲為王氏之謀其事不成其後張角稱黃天作亂竟破壞應劭曰尚書春秋左傳伯益佐禹治水封於梁飂叔安有裔子曰董父帝舜賜姓董氏董氏之祖與梁同焉其後董卓自外入廢帝殺后梁本安定而卓隴西人俱涼州也袁山松曰張角一時狡亂不足致此大異斯乃曹氏滅漢之證梁即魏地之名伯夏明於中夏非溥天之稱後主嗣位譙周曰先主諱備其訓具也後主諱禪其訓授也若言劉已具矣當授與人甚於晉穆侯漢靈帝命子之祥也蜀果亡魏齊王嘉平中東郡有訛言云白馬河出妖馬夜過官牧邊鳴呼衆馬皆應明日言其迹大如斛行數里還入河楚王彪本封白馬兖州刺史令狐愚與王凌謀共立之事泄俱死晉惠帝永寧初齊王冏唱義兵誅亂逆乘輿反正忽有婦人詣大司馬門求寄産門者詰之婦曰我截臍便去耳其後冏果斬戮永寧元年十二月甲子有白頭公入齊王冏大司馬府大呼曰有大兵起不出甲子旬冏殺之明年十二月戊辰冏敗即甲子旬也泰安元年四月癸酉有人自雲龍門入殿前北靣再拜曰我當作中書監即收斬之干寶以為禁庭尊祕之處今賤人徑入而門殿不覺者宮室將虛而下人踰上之妖也是後帝北遷鄴又遷長安宮闕遂空焉元帝永昌元年大將軍王敦下據姑孰百姓訛言蟲病食人大孔數日入腹入腹則死療之有方當得白犬膽以為藥自淮泗遂及京都數日之間百姓驚擾人人皆自云已得蟲病又云始在外時當燒鐡以灼之於是翕然被燒灼者十七八矣而白犬暴貴至相請奪其價十倍或有自云能行燒鐡灼者賃灼百姓日得五六萬憊而後己四五日漸靜説曰夫祼蟲人類而人為之主今云蟲食人言本同臭類而相殘賊也自下而上明其逆也必入腹者言害由中出不由外也犬有守衛之性白者金色而膽用武之主也帝王之運王霸會於戊戌主用兵金者晉行火燒鐡以療疾者必去其類而來火與金合德共除蟲害也按中興之際大將軍本以腹心受伊呂之任而元帝末年遂攻京邑明帝諒暗又有異謀是以下逆上腹心內爛也及錢鳳沈充等逆兵四合而為王師所挫踰月而不能濟水北中郎劉遐及淮陵內史蘇峻率淮泗之衆以救朝廷故其謠言首作於淮泗也朝廷卒以弱制強罪人授首是用白犬膽可救之效也海西公時庾晞四五年中喜為挽歌自搖大鈴為倡使左右齊和又宴會輒令倡伎作新安人歌舞離别之辭其聲悲切時人怪之後亦果敗孝武帝太元中小兒以兩鐵相打於土中名曰鬭族後王國寶王孝伯一姓之中自相攻擊也桓元初改年為大亨遐邇歡音喧言曰二月了故義謀以仲春發也元篡立又改年為建始以與趙王倫同又易永始永始復是王莽受封之年也苻堅時有人於明光殿大呼曰甲申乙酉魚羊食人悲哉無復遺堅命執之俄而不見祕書監朱肜等因請誅鮮卑堅不從也宋明帝時訛言東城天子出其後建安王休仁鎮東府帝懼殺休仁而常閉東府不居明帝又屢幸改代作伐以厭王氣又使子安成王代之及蒼梧王敗安成王代立咸言為驗術數者推齊高祖舊居武進東城村東城之言其在此也齊武帝時文惠太子立樓館於鍾山下號曰東田太子屢遊幸之東田反語為顛童也武帝又於青溪立宮號曰舊宮反之窮廄也至鬱林王果以輕狡而至於窮又武帝時小史姓皇名太子武帝曰皇太子非名之謂於是移點於外易名犬子處士何點曰太子者天地之所懸三才之所繫今化而為犬不得立矣既而文惠太子薨鬱林海陵相繼廢黜此其驗也文惠太子與才人共賦七言詩句後輒云愁和帝至東昏以暴虐殞南康王寶融即位禪於梁以弒殞諡和帝其言乃驗焉梁武帝天監十三年六月都下訛言有棖棖取人肝肺及血以飴天狗百姓大懼二旬而止大通五年十二月都下訛言天子取人肝以飴天狗大小相警日晚便閉門持杖數月乃止武陵王紀僭帝位建元曰天正永豐侯蕭偽曰王不克矣昔桓元年號大亨有識者以為二月了而元之敗實在仲春今曰天正正之為文一止其能久乎果一年而敗陳後主時諸省官人多稱省主北齊末亦有此稱識者以為主將見省之兆未幾國亡北齊文宣帝太子殷當冠詔令邢子才為制字子才字之曰正道帝曰正一止也吾兒其替乎子才請改帝不許曰天也後卒為常山王所廢殺武成河清三年晉陽訛言有鬼兵百姓競擊銅鐵以捍之後主武平七年為周師所敗走至鄴自稱太上皇傳位太子恆改元隆化時人離合其字曰降死竟降周而死周武帝改元為宣政梁主蕭巋離合其字為宇文亡日其年六月帝崩隋文帝開皇初梁主蕭琮改元廣運江陵父老相謂曰運之為字軍走也吾君當為軍所走乎後琮朝京師被拘留不反梁國遂廢文帝名皇太子曰勇晉王曰英秦王曰俊蜀王曰秀開皇初有人上書言勇者一夫之用又千人之秀為英萬人之秀為俊斯乃布衣之美稱非帝王之嘉名也帝不省時人呼楊性多為嬴者或言於上曰楊英反為嬴殃帝不懌遽改之其後勇俊秀皆被廢黜煬帝終失天下為楊氏之殃煬帝改元大業識者惡之曰於字離合為大苦來也尋而天下喪亂率土遭荼炭之酷唐太宗貞觀十七年七月民訛言官遣棖棖殺人以祭天狗云其來也身衣狗皮鐵爪每於暗中取人心肝而去於是更相震怖每夜驚擾皆引弓劒自防無兵器者剡竹為之郊外不敢獨行太宗惡之令通夜開諸坊門宣旨慰諭月餘乃止武后時民飲酒謳歌曲終而不盡者謂之族鹽元宗開元二十七年十月改作東都明堂訛言官取小兒埋明堂下以為厭勝村野兒童藏於山谷都城騷然或言兵至元宗惡之遣使慰諭久之乃止天寶三載二月卒亥有星如月墜於東南墜後有聲京師訛言官遣棖棖捕人取肝以祭天狗人頗恐懼畿內尤甚遣使安諭之與貞觀十七年占同天寶後詩人多為憂苦流寓之思及寄興於江湖僧寺而樂曲亦多以邊地為名有伊州甘州涼州等至其曲遍繁聲皆謂之入破又有胡旋舞本出康居以旋轉便捷為巧時又尚之破者蓋破碎云德宗建中三年秋江淮訛言有毛人食其心人情大恐朱泚既僭號名其舊第曰潛龍宮移內府珍貨實之占者以為易稱潛龍勿用此敗祥也文宗太和九年京師訛言鄭注為上合金丹生取小兒心肝密旨捕小兒無算往往隂相告曰某處失幾兒矣方士言金丹可致神仙蓋誕妄不經之語或信而服之則發熱多死如其所戒云小兒無辜者取其心肝將有殺戮象劉從諫未死時潞州有狂人折腰於市曰石雄七千人至矣從諫捕斬之懿宗咸通十四年秋成都訛言有㹫母鬼夜入人家民皆恐夜則聚坐或曰某家見鬼眼晃然如燈熖民益懼黃巢未入京師時都人以黃米及黑豆屑蒸食之謂之黃賊打黑賊僖宗時里巷鬭者激怒言任見右廂天子晉高祖天福中兩浙兒童聚戲率以趙字為語助如言得曰趙得可曰趙可自是一國之人語言無不以趙字兼之者及晉末趙延壽貴盛浙人謂必應讖後延壽為契丹所縶而謠言益盛洎太祖受禪始悟焉天福末宣州太平縣掘地得石記云天子冀州人時李景據江表名子曰冀欲當之及太祖開統方悟冀州趙地也出帝開運末宋州宋城縣有異僧常挾彈持銅丸走榛莽中如飛指其地曰不二十年當有帝王由此建號後周太祖廣順初江南伏龜山圯得石函長二尺廣八寸中有鐡銘云維天監十四年秋八月葬寶公於銘背有引曰寶公嘗為此偈大書於版白巾羃之人欲讀者必施數錢乃得讀訖即羃之是時名臣陸倕王筠姚察而下皆莫知其旨或問之云在五百年後至卒乃鑄其偈同葬焉銘曰莫問江南事江南自有憑乘雞登寶位跨犬出金陵子建司南位安仁秉夜燈東鄰家道闕隨虎遇明興其字皆小篆體勢完具徐鉉徐鍇韓熙載皆不能解及煜歸朝好事者云煜以丁酉年生辛酉年襲位即雞也開寶八年甲戌江南國滅是跨犬也當王師圍其城而曹彬營其南是子建司南位也潘美營其北是安仁秉夜燈也其後太平興國戊寅嵗淮海王錢俶舉國入覲即東鄰也家道闕者意無錢也隨虎戊寅年也世宗顯德六年二月癸巳有一人敝衣冠闌入中書升政事堂據床而坐堂吏叱之曰何人遣爾至此其人曰宋州官家教我來此吏具白其事於宰臣宰臣密令遣之尋不知所適其年六月十九日世宗崩明年正月四日大宋受命荆南高從誨鑿池於山亭下得石匣長尺餘扃鐍甚固從誨神之屏左右焚香啓匣中得石有文云此去遇龍即歇及建隆中從誨孫繼沖入朝改鎮徐州龍隆音相近宋太祖建隆中京師士庶及樂工少年競唱歌曰五來子聲調清逸遍於里巷自建隆至開寶凡平荆湖川廣江南五國而中原混一矣時西川孟昶賦斂無度射利之家配率尤甚既乏緍錢唯仰在質物乃競書簡扎揭於門曰今召主收贖又每嵗除日命翰林為詞題桃符正旦置寢門左右末年學士卒寅遜撰詞昶以其非工自命筆題新年納餘慶嘉節號長春昶以其年正月十一日降王師即命呂餘慶知成都府而長春乃太祖誕聖節名也召與趙贖與蜀同音開寶初廣南劉鋹令民家置貯水桶號防火大桶又鋹末年童謠曰羊頭二四白天雨至後王師以辛未年二月四日擒鋹識者以為國家以火德王房為宋分羊未神也雨者王師如時雨之義也防與房桶與統同音太宗太平興國中京師童兒以木雕合子中有竅藏掖下蹙之有聲號為掖底閙後盧多遜有罪投荒人以為讖其在肘掖而干國典也雍熙中京師人破竹為細縷以五色紙為胡蝶綴其杪兩兩相對手撚之遞相飛觸謂之鬭胡蝶其後河朔頻嵗用兵真宗天禧二年五月西京民訛言有物如烏帽夜飛入人家又變為犬狼狀攫人民多恐駭每夕重閉深處至持兵器驅逐者六月乙巳傳及京師云能食人里巷聚族環坐呌噪達曙軍營中尤甚而實無狀意其妖人所為有詔嚴捕得數輩訊之皆非仁宗皇祐五年正月戊午狄青敗儂智高於歸仁鋪初謠言農家種糴家收至是智高果為青所破徽宗政和七年詔修神保觀俗所謂二郎神者京師人素畏之自春及夏傾城男女負土以獻揭榜通衢云某人獻土又有飾形作鬼使巡門催納土者或謂蔡京曰獻土納土非佳語也後數日有旨禁絶宣和六年御樓觀燈時開封尹設次以彈壓於西觀下上從六宮於其上以觀天府之斷決者簾幕深密下無由知衆中忽有人躍出墨色布衣若寺僧童行狀以手畫簾出指斥語執於觀下上怒甚令中使傳旨治之箠掠亂下又加炮烙詢其誰何略不一語亦無痛楚之狀又斷其足筋俄施刀臠血肉狼籍上大不悅為罷一夕之歡竟不得其何人付獄盡之七年八月有都城東門外鬻菜夫至宣德門下忽若迷罔釋荷擔向門戟手出悖詈語且曰太祖皇帝神宗皇帝使我來道尚宜速改也邏卒捕之下開封獄一夕方省則不知向之所為者乃於獄中盡之高宗建炎二年十一月駐蹕掦州郊祀後數日有狂人具衣冠執香爐携絳囊拜於行宮門外自言天遣我為官家兒書於囊紙刻於右臂皆是語鞫之不得姓名上以其狂釋不問明年二月金人下維揚三月有明受之變紹興元年四月庚辰閬州有狂僧縗絰哭於郡譙門曰今日佛下世且言且哭實隆祐太后上仙日云閬距行都萬里逾月而遺詔至十二月越州連有火後民訛言相驚十六日當再有火樞密院以軍法禁之乃定孝宗淳熙十四年正月紹興府有狂人突入恩平郡王第升堂踐王座曰我太上皇孫來報訃音鞫訊終不語是冬高宗晏駕明年八月王薨光宗紹熙元年三月行都市人夜以殺相驚奔迸者久乃定與漢志永初民相驚同占二年十二月庚寅昧爽成都府有人縗服入帳門大呼閫帥京鏜姓名後八年鏜薨相位蓋慶元六年前五日光宗晏駕後四日皇子沖溫邠王薨時慈懿皇后梓宮在殯寧宗慶元六年十月瓊州訛言妖星流墮民舍郭七家聲如雷通守曾丰瓊山縣令移文往復民獠驚喧後皆坐黜嘉泰二年六月故循王張俊家火後旬日市井訛言相驚有絳衣婦人為火殃下墜都民皆徙避晝夜不遑寧處此訛言也禁之後亦不火服妖春秋左氏傳閔公二年晉獻公使太子申生出師公衣之偏衣謂左右異色其半象公之服佩之金玦半環曰玦以金為之狐突歎曰時事之徴也衣身之章也佩衷之旗也旗表也衣所以明貴賤佩所以表中心故敬其事則命以始賞以春夏服其身則衣之純一其色用其衷則佩之度佩玉者君子之常服今命以時卒閟其事也卒盡也閟閉也謂十二月盡時也衣以尨服逺其躬也尨雜色謂偏衣也佩以金玦棄其𠂻也服以逺之時以閟之尨涼冬殺金寒玦離胡可恃也涼薄也尨色不能純故曰薄也冬主殺氣金行在西是謂之寒玦形半玦故曰離梁餘子養曰帥師者受命於廟受脤於社有常服矣御軍常服則韋辨弗獲而尨命可知也死而不孝不如逃之罕夷曰尨竒無常金玦不復君有心矣竒竒怪非常意復反也金玦猶決去不復反意也有心言有害太子之心也復扶目反後四年申生以讒自殺近服妖也鄭子臧好聚鷸冠鷸今翠鳥鄭文公惡之使盜殺之劉向以為近服妖也漢昭帝時昌邑王賀遣中大夫之長安多治仄注冠應劭曰今法冠是也李竒曰一曰高山冠本齊冠也謁者服之師古曰仄古側字也謂之側注者言形側立而下注也蔡雍云高九寸鐵為卷非法冠及高山也卷音去權反以賜大臣又以冠奴劉向以為近服妖也時王賀狂悖師古曰悖惑也音布內反聞天子不豫師古曰言有疾不悅豫也周書顧命曰王有疾不豫弋獵馳騁如故與騶奴宰人遊居娛戲驕慢不敬師古曰騶廄御也宰人主膳者也娛樂也戲音熺冠者尊服奴者賤人賀無故好作非常之冠暴尊象也以冠奴者當自至尊墜至賤也師古曰墜墮也音直類反其後帝崩無子漢大臣徵賀為嗣即位狂亂無道縛戮諫者夏侯勝等於是大臣白皇太后廢賀為庶人賀為王時又見大白狗冠方山冠而無尾鄧展曰方山冠以五采縠為之樂舞人所服此服妖亦犬禍也賀以問郎中令龔遂遂曰此天戒言在仄者盡冠狗也師古曰言王左右侍側之人不識禮義若狗而著冠者耳冠音工喚反其下亦同去之則存不去則亡矣賀既廢數年宣帝封之為列侯復有罪死不得置後又犬禍無尾之效也京房易傳曰行不順厥咎人奴冠天下亂辟無適如淳曰辟君也適適子也師古曰辟音壁適讀曰嫡妾子拜如淳曰無適子故也又曰君不正臣欲篡厥妖狗冠出朝門成帝鴻嘉永始之間好為微行出遊選從期門郎有材力者及私奴客多至十餘少五六人皆白衣袒幘師古曰袒幘不加上冠帶持弓劒或乘小車御者在茵上蘇林曰茵車上蓐也御者錯亂更在茵上坐也師古曰車小故御者不得回避而在天子茵上也茵音因或皆騎出入市里郊野逺至旁縣大臣車騎將軍王音及劉向等數以切諫谷永諫曰陛下棄萬乘之至尊樂家人之賤事離深宮之固挺身獨與小人晨夜相隨烏集醉飽吏民之家亂服共坐溷肴亡别典門戶奉宿衛之臣執干戈衛空宮公卿百僚不知陛下所在積數年矣後漢更始諸將軍過雒陽者數十輩皆幘而衣婦人衣繡擁􅜎時智者見之以為服之不𠂻身之災也乃奔入邊郡避之是服妖也其後更始為赤眉所殺桓帝元嘉中京都婦女作愁眉啼粧墮馬髻折腰步齲齒笑所謂愁眉者細而曲折啼粧者薄拭目下若啼處墮馬髻者作一邊梁冀别傳曰冀婦女又有不聊生髻折腰步者足不在體下齲齒笑者若齒痛樂不欣欣始自大將軍梁冀家所為京都翕然諸夏皆倣效此近服妖也梁冀二世上將婚媾王室大作威福將危社稷天戒若曰兵馬將往收捕婦女憂愁踧眉啼泣吏卒掣頓折其腰脊令髻傾邪雖強語笑無復氣味也到延熹二年舉宗誅夷延熹中梁冀誅後京都幘顔短耳長短上長下時中常侍單超左悺徐璜具瑗唐衡在帝左右縱其姦慝海內愠曰一將軍死五將軍出家有數侯子弟列布州郡賔客雜襲騰翥上短下長與梁冀同占到其八年桓帝因日蝕之變乃拜故司徒韓縯為司𨽻校尉以次誅鉏京都正清臣昭按本傳縯誅左悺貶具瑗雖尅折姦首羣閹相蒙京都未為正清延熹中京都長者皆著木屐婦女始嫁至作漆畫五綵為系此服妖也到九年黨事始發傳黃門北寺臨時惶惑不能信天任命多有逃走不就考者九族拘繫及所過歷長少婦女皆被桎梏應木屐之象也靈帝建寧中京都長者皆以葦方笥為粧具下士盡然時有識者竊言葦方笥郡國讞篋也今珍用之此天下人皆當有罪讞於理官也到光和三年癸丑赦令詔書吏民依黨禁錮者赦除之有不見文他以類比疑者讞於是諸有黨郡皆讞廷尉人名悉入方笥中靈帝好諸異服帷帳牀坐飲食歌舞箜篌笛篳栗等京都貴戚皆競為之及獻帝建始中董卓多擁邉兵填塞街衢虜掠宮掖發掘園陵靈帝於宮中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相放效至乘輜軿以為騎從互相侵奪賈與馬齊案易曰時乘六龍以御天行天者莫若龍行地者莫如馬詩曰四牡騤騤載是常服檀車煌煌四牡彭彭夫驢乃服重致逺上下山谷野人之所用耳何有帝王君子而驂服之乎遲鈍之畜而今貴之天意若曰國且大亂賢愚倒植凡執政者皆如驢也其後董卓陵虐王室多援邊人以克本朝殊方部落跨蹈中國熹平中省內冠狗帶綬以為笑樂有一狗突出走入司徒府門或見之者莫不驚怪袁山松書曰光和四年又於西園㺯狗以配人也京房易傳曰君不正臣欲篡厥妖狗冠出後靈帝寵用羣小又於西園賣官天戒若曰在位多非其人如狗而冠也靈帝數遊戲於西園中令後宮采女為客舍主人身為商賈服行至舍采女下酒食因共飲食以為戲樂此服妖也其後天下大亂風俗通曰時京師賔婚嘉會皆作魁􅪡酒酣之後續以挽歌魁􅪡喪家之樂挽歌執紼相偶和之者天戒若曰國家當急殄悴諸貴樂皆死亡也自靈帝崩後京師壞滅戶有兼尸蟲而相食魁􅪡挽歌斯之效也獻帝建安中男子之衣好為長躬而下甚短女子好為長裙而上甚短時益州從事莫嗣以為服妖是陽無下而隂無上也天下未欲平也後還遂大亂魏武帝以天下凶荒資財匱乏始擬古皮辨裁縑帛為白帢苦洽反以易舊服傅元曰白乃軍容非國容也干寶以為縞素凶喪之象也名之為帢毁辱之言也蓋革代之後劫殺之妖也明帝日著繡帽披縹紹反紈半袖常以見直臣楊阜諫曰此禮何法服邪帝默然蓋近服妖也夫縹非禮之色褻音薛服尚不以紅紫况接臣下乎人主親御非法之章所謂自作孽不可禳也帝既不享永年身沒而祿去王室後嗣不終遂亡天下景初元年發銅鑄為巨人二號曰翁仲置之司馬門外按古長人見為國亡長狄見臨洮為秦亡之禍始皇不悟反以為嘉祥銅鑄人以象之魏法亡國之器而於義竟無取焉蓋服妖也尚書何晏好服婦人之服傅元曰此服妖也夫衣裳之制所以定上下殊內外也大雅云元衮赤舄鉤膺鏤鍚歌其文也小雅云有嚴有翼共武之服詠其武也若內外不殊王制失敘服妖既作身隨之亡末嬉冠男子之冠桀亡天下何晏服婦人之服亦亡其家其咎均也吳婦人修容者急束其髮而劘音靡角過於耳蓋其俗自操束太急而亷隅失中之謂也故吳之風俗相驅以急言論彈射以刻薄相尚孫休後衣服之制上長下短又積領五六而裳居一二干寶曰上饒奢下儉逼上有餘下不足之妖也至孫皓果奢暴恣情於上而百姓雕困於下卒以亡國晉武帝泰始初衣服上儉下豐著衣者皆厭䙅一宵反此君衰弱臣放縱下掩上之象也至元康末婦人出兩襠加乎交領之上此內出外也為車乘者茍貴輕細又數變易其形皆以白篾為純蓋古喪車之遺象也夫乘者君子之器蓋君子立心無恆事不崇實也干寶以為晉之禍徴也及惠帝踐阼權制在於寵臣下掩上之應也至永嘉末六宮才人流冗沒於劉石內出外之應也及天下撓亂宰輔方伯多負其任又數改易不崇實之應也泰始之後中國相尚用交牀貊音陌槃及為羌煮貊炙貴人富室必畜其器吉亨嘉會皆以為先太康中又以氈為絈與帕同莫格反方言帕頭幧頭也南楚江淮之間曰帕頭自關以西秦晉之郊曰絡頭字書帕頭巾者也幧且消反頭及絡帶袴口百姓相戲曰中國必為北所破夫氈毳此芮反産於北而天下以為絈頭帶身袴口彼既三制之矣能無敗乎至元康中氐羌互反永嘉後劉石遂篡中都自後羣雄迭據華土是服妖之應也初作屐者婦人頭圓男子頭方圓者順之義所以别男女也至太康初婦人屐乃頭方與男無别此賈后專妬之徴也太康中天下為晉世寧之舞手接杯盤而反覆之歌曰晉世寧舞杯盤識者曰夫樂生人心所以觀事也今按杯盤於手上而反覆之至危之事也杯盤者酒食之器而名曰晉世寧言晉世之士茍偷於酒食之間而知不及逺晉世之寧猶杯盤之在手也惠帝元康中婦人之飾有五兵佩又以金銀玳瑁之屬為斧鉞戈戟以當笄干寶以為男女之别國之大節故服物異等贄幣不同今婦人而以兵器為飾此婦人妖之甚者於是遂有賈后之事終亡天下是時婦人結髮者既成以繒急束其環名曰擷胡結反子紒始自中宮天下化之其後賈后廢害太子之應也元康中天下始相效為烏杖以拄掖其後稍施其鐓徒猥反住則植之夫木東方之行金之臣也杖者扶體之器烏其頭者尤便用也必旁拄掖者旁救之象也施其金住則植之言因為金能孤立也及懷愍之世王室多故而此中都喪敗元帝以藩臣樹德東方維持天下拄掖之應也至社禝無主海內歸之遂承天命建都江外獨立之應也元康泰安之間江淮之域有敗屩音腳自聚於道多者至四五十量人或散投坑谷明日視之復如故或云見狸銜聚之干寶以為夫屩者人之賤服處於勞辱黔庶之象也敗者疲敝之象道者四方往來所以交通王命也今敗屩聚於道者象黔庶罷病將相聚為亂以絶王命也泰安中發壬午兵百姓怨叛江夏張昌倡亂荆楚從之如流於是兵革嵗起服妖也初魏造白帢橫縫其前以别後名之曰顔俗傳行之至永嘉之間稍去其縫名無顔帢而婦人束髮其緩彌甚紒之堅不能自立髮被於額目出而已無顔者愧之言也覆額者慙之貌也其緩彌甚者言天下亡禮與義放縱情性及其終極至於大恥也永嘉之後二帝不反天下醜焉孝懷帝永嘉中士大夫競服生箋單衣識者指之曰此則古者繐衰音崔諸侯所以服天子也今無故服之殆有應乎其後遂有劉氏之亂帝遇害焉元帝大興中兵士以絳囊縛紒識者曰紒者在首為乾君道也囊者坤臣道也今以朱囊縛紒臣道上侵君之象也於是王敦陵上焉舊為羽扇柄者刻木象其骨形列羽用十取全數也自中興初王敦南征始改為長柄下出可捉而減其羽用八識者尤之曰夫羽扇翼之名也創為長柄者將執其柄以制羽翼也改十為八者將未備奪已備也此殆敦之擅權以制朝廷之柄又將以無德之材欲竊非據也是時為衣者又上短帶才至於掖著帽者又以帶縛項下逼上上無地也為袴者直幅為口無殺下大之象尋而王敦謀逆再攻京師海西嗣位忘設豹尾天戒若曰夫豹尾儀服之主大人所以豹變也而海西豹變之日非所宜忘而忘之非主社稷之人故忘其豹尾示不終也尋而被廢焉孝武太元中人不復著帩七遙反頭天戒若曰頭者元首帩者助元首為儀飾者也今忽廢之若人君獨立無輔佐以至危亡也至安帝桓元乃篡位焉舊為屐者齒皆達楄扶然反上名曰露卯太元中忽不徹名曰隂卯識者以為卯謀也必有隂謀之事至烈宗末驃騎參軍袁悅之始攬搆內外隆安中遂謀詐相傾以致大亂太元中公主婦女必緩鬢傾髻以為盛飾用髲皮義反既多不可恆戴乃先於木及籠上裝之名曰假髻或名假頭至於貧家不能自辦自號無頭就人借頭遂布天下亦服妖也無幾時孝武晏駕而天下騷動刑戮無數多喪其元至於大殮力驗反皆刻木及蠟或縳菰草為頭是假頭之應云桓元篡立殿上施絳帳鏤黃金為顔四角金龍銜五色羽葆音保流蘇羣下相謂曰頗類轜音而車尋而元敗此服之妖也晉末皆冠小而衣裳博大風流相放輿臺成俗識者曰上小而下大此禪代之象也尋而宋受終焉齊武帝永明中百姓忽著破後帽始自建業流於四逺貴賤翕然服之此服妖也帽自蕭諶之家其流遂逺天意若曰武穆文昭皆當滅而諶亦誅死之效焉又時以燕支為朱衣朝士皆服之及明帝以宗子入篡此又奪朱之效也時又多以生紗為帽半其裙而折之號曰倚勸先是人問語好云擾攘建武至是朝士勸進實為匆遽倚勸擾攘之言驗東昏時百姓皆著下屋白紗帽而反裙覆頂東昏曰裙應在下今更在上不祥命斷之於是百姓皆反裙向下此服妖也帽者首之所寄今而向下天意若曰元首方為猥賤乎東昏又令左右作逐鹿帽形甚窄狹後果有逐鹿之事東昏宮裏又作散叛髮反髻根向後百姓爭學之及東昏狂惑天下散叛矣東昏又與羣小别立帽騫其口而舒兩翅名曰鳳度三橋裙向後總而結之名曰反縛黃麗東昏與刀敕之徒親自著之皆用金寶鑿以璧璫又作著調帽鏤以金玉間以孔翠此皆天意梁武帝舊宅在三橋而鳳度之名鳳翔之驗也黃麗者皇離為日而反縛之東昏戮死之應也調者梁武帝至都而風俗和調先是百姓及朝士皆以方帛填胸名曰假兩此又服妖假非正名也儲兩而假之明不得真也東昏誅其子廢為庶人假兩之意也北齊婁后卧疾寢衣無故自舉俄而后崩文宣帝末年衣錦綺傳粉黛數為胡服微行市里粉黛者婦人之飾陽為隂事君變為臣之象也及帝崩太子嗣位被廢為濟南王又齊氏出自隂山胡服者將反初服也錦綵非帝王之法服微服者布衣之事齊亡之效也後主好令宮人以白越布折額狀如髽幗又為白蓋此二者喪禍之服也後主果為周武帝所滅父子同時被害武平時後主於苑內作貧兒村親衣繿縷之服而行乞其間以為笑樂多令人服烏衣以相執縛後主果為周所敗被虜於長安而死妃后窮困至以賣燭為業又婦人皆剪剔以著假髻而危邪之狀如飛鳥至於南面則髻心正西始自宮內為之被於四逺天意若曰元首剪落危側當走西也又為刀子者刃皆狹細名曰盡勢遊童戲者好以兩手持繩拂地而却上跳且喝曰高末高末之言蓋高氏運祚之末也後周靜帝大象元年服冕二十四旒車服旗鼓皆以二十四為節侍衛之官服五色雜以紅紫令天下車以大木為輪不施輻朝士不得佩綬婦人墨粧黃眉又造下帳如送終之具令五皇后各居其一實宗廟祭器於前帝親讀版而祭之又將五輅載婦人身率左右步從又倒懸雞及碎瓦於車上觀其作聲以為笑樂皆服妖也帝尋暴崩而政由於隋周之法度皆悉改易隋文帝開皇中房陵王勇之在東宮及宜陽公王世積家婦人所服領巾製同槊幡軍幟婦人為隂臣象也而服兵幟臣有兵禍之應矣勇竟廢而遇害世積坐伏誅唐初宮人乘馬者依周舊儀著羃㒿全身障蔽永徽後乃用帷帽施裙及頸頗為淺露至神龍末羃羅始絶皆婦人預事之象太尉長孫無忌以烏羊毛為渾脫氈帽人多效之謂之趙公渾脫近服妖也高宗嘗內宴太平公主紫衫玉帶皂羅折上巾具紛礪七事歌舞於帝前帝與武后笑曰女子不可為武官何為此裝束近服妖也武后時嬖臣張易之為母臧作七寶帳有魚龍鸞鳳之形仍為象牀犀簟安樂公主使上方合百鳥毛織二裙正視為一色傍視為一色日中為一色影中為一色而百鳥之狀皆見以其一獻韋后公主又以百獸毛為韉面韋后則集鳥毛為之皆具其鳥獸狀工費巨萬公主初出降益州獻單絲碧羅籠裙縷金為花鳥細如絲髮大如黍米眼鼻觜甲皆備瞭視者方見之皆服妖也自作毛裙貴臣富家多效之江嶺竒禽異獸毛羽採之殆盡韋后妹嘗為豹頭枕以辟邪白澤枕以辟魅伏熊枕以宜男亦服妖也中宗景龍二年十一月郊祀韋后為亞獻以婦人為齋娘以祭祀之服執事近服妖也中宗賜宰臣宗楚客等巾子樣其制高而踣即帝在藩邸時冠也故時人號英王踣踣顛仆也元宗開元二十五年正月道士尹愔為諫議大夫衣道士服視事亦服妖也天寶初貴族及士民好為胡服胡帽婦人則簮步搖叉襟袖窄小楊貴妃常以假鬢為首飾而好服黃裙近服妖也時人為之語曰義髻拋河裏黃裙逐水流憲宗元和末婦人為圓鬟椎髻不設鬢飾不施朱粉惟以烏膏注唇狀似悲啼者圓鬟者上不自樹也悲啼者憂恤象也文宗時吳越間織高頭草履纎如綾縠前代所無履下物也織草為之又非正服而被以文飾蓋隂邪闒葺泰侈之象僖宗乾符五年雒陽人為帽皆冠軍士所冠者又內臣有刻木象頭以裹幞頭百官效之工門如市度木斫之曰此斫尚書頭此斫將軍頭此斫軍容頭近服妖也僖宗時內人束髮極急及在成都蜀婦人效之時謂為囚髻唐末京都婦人梳髮以兩鬢抱面狀如椎髻時謂之拋家髻又世俗尚以琉璃為叉釧近服妖也拋家流離皆播遷之兆云昭宗時十六宅諸王以華侈相尚巾幘各自為制度都人效之則曰為我作某王頭識者以為不祥蜀王衍晚年俗競為小帽僅覆其頂俯首即墮謂之危腦帽衍以為不祥禁之而衍好戴大帽每微服出遊民間以大帽識之因令國中皆戴大帽又好裹尖巾其狀如錐而後宮皆戴金蓮花冠衣道士服酒酣免冠其髻髽然更施朱粉號醉粧國人皆效之宋太祖建隆初時當蜀孟昶末年婦女競治髮為高髻號朝天髻未幾昶入朝京師江南李煜末年有衛士秦友登壽昌堂榻覆其鞋而坐訊之風狂不寤識者云鞋友履也其李氏將覆於此地而為秦所有乎履與李友與有同音趙與秦同祖又煜宮中盛雨水染淺碧為衣號天水碧未幾為王師所克士女至京師猶有服者天水國姓之望也太宗淳化三年京師里巷婦人競剪黑光紙圑靨又裝鏤魚腮中骨號魚媚子以飾面或曰黑水行魚水族皆隂類也面為六陽之首隂侵於陽將有災明年京師秋冬積雨衢路水深數尺真宗景德四年春京城小兒裂裳為小旗繫竿首相對揮颭兵鬭之象也是嵗宜州卒陳進為亂出師討平之高宗紹興二十一年行都豪貴競為小青蓋飾赤油火珠於蓋之尊出都門外傳呼於道國朝以火德興赤火祥也又珠者乘輿服御飾升龍用焉臣庶以加於小蓋近服妖亦僭咎也又都市為戲加篦巾披卧辣執藤鞭羣吹鷓鴣笛撥葫蘆琴效北人為禮長跪獻酒時金患僅定上念境土未復將請河南地命有司禁止之與漢靈帝時旋舞唐天寶北妝同占皆服妖也二十三年士庶家競以胎鹿皮製婦人冠山民採捕胎鹿無遺九月庚子言者以暴殄傷仁遂申嚴景祐捕鹿之禁紹興初去宣和未逺婦人服飾尚集翠羽為之與唐志百鳥毛織裙同占二十七年交趾貢翠羽數百上命焚之通衢至是始立法亦禁之光宗紹熙元年里巷婦人初以琉璃叉為首飾唐志琉璃叉釧有流離之兆亦服妖也後連年有飢流之厄射妖周宣王殺杜伯而無辜後三年王會諸侯田於圃日中起於道左衣朱衣冠操朱弓矢射王中心折脊而崩莊公十八年秋有蜮劉向以為蜮生南越越地多婦人男女同川淫女為主亂氣所生故聖人名之曰蜮蜮猶惑也在水旁能射人射人有處甚者至死以氣射人也南方謂之短弧即射工也亦呼水弩近射妖死亡之象也時莊公將娶齊之淫女故蜮生後女淫於二叔叔牙慶父兩子見弒夫人亦誅劉歆以為蜮盛暑所生非自越來也京房易傳曰忠臣進善君不試試用也厥妖國生蜮哀公時有隼集陳廷而死楛矢貫之楛木名堪為箭笴石砮砮鏃也長尺有咫陳閔公使人問仲尼對曰隼之來也逺矣昔武王克啇通道百蠻使各以方物來貢肅慎貢楛矢肅慎東北夷石弩長尺有咫先王分異姓以逺方職使母亡服服事也故分陳以肅慎矢試求之故府果得之劉向以為隼近黑祥貪暴類也矢貫之近射妖也死於廷國亡表也象陳眊亂不服事周而行貪暴將致逺夷之禍為所滅也其後陳卒為楚所滅後漢靈帝光和中雒陽男子夜龍以弓箭射北闕吏收考問辭居貧負責無所聊生因買弓箭以射近射妖也風俗通曰龍從兄陽求臘錢龍假取繁數頗厭患之陽與錢千龍意不滿欲破陽家因持弓矢射元武門東闕吏士呼問首服詔龍以重論陽不連坐其後車騎將軍何苖與兄大將軍進部兵還相猜疑對相攻擊戰於闕下苖死兵敗殺數千人雒陽宮室內人燒盡蜀車騎將軍鄧芝征涪陵見元猿緣山手射中之猿拔其箭卷木葉塞其瘡芝曰嘻吾違物之性其將死矣俄而卒此射妖也一曰猿母抱子芝射中之子為拔箭取木葉塞創芝歎息投弩自知當死晉恭帝為琅琊王好竒戲嘗閉一馬於門內令人射之欲觀幾箭死左右有諫者曰馬國性也今射之不祥於是乃止而馬已被十許箭矣此蓋射妖也俄而禪位云東魏孝靜武定四年後齊神武作宰親率諸軍攻西魏於玉壁其年十一月帝不豫班師將士震懼皆曰韋孝寬以定功弩射殺丞相西魏下令國中曰徑弩一發凶身自殞神武聞而惡之其疾暴增近射妖也洪範五行傳曰射者兵戎禍亂之象氣逆天則禍亂將起神武行殿中將軍曹魏諫曰王以死氣逆生氣為客不利主人則可帝不從頓軍五旬頻戰沮衄又聼孤虛之言於城北斷汾水起土山其處天險千餘尺功竟不就死者七萬氣逆天之咎也其年帝崩明年王思政擾河南北齊武平後主自并州還鄴至八公嶺夜與左右歌而行有一人忽發狂意後主以為狐媚伏草中彎弓而射之傷數人幾中後主後主執而斬之其人不自覺也狐而能媚獸之妖妄也帝時不恤國政專與內人閹豎酣歌為樂或衣繿縷衣行乞為娛此妖妄之象人又射之兵戎禍亂之應也未幾而國滅宋理宗淳熙十四年正月閹宦競以小弓矢射於殿廡為戲弓長尺餘箭才數寸近射妖也寧宗慶元五年諸軍器械所造筒子弩桞木牌以為戲木弩加以竹筒蔽以方布剔以角箆時朝廷遣使閲習器械射妖之戒若曰除戎器皆兒戲也後開禧卒有兵弗戢之禍文獻通考卷三百十
