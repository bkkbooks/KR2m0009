body:
  text: 文獻通考卷二百十三鄱陽馬端臨貴與著經籍考四十子雜家漢藝文志雜家者流蓋出於議官兼儒墨合名法知國體之有此見王治之無不貫此其所長也及蕩者為之則漫羡而無所歸心漢志二十家四百三篇隋志九十七部合二千七百二十卷唐志六十四家七十五部一千一百三卷失姓名六家虞世南以下不著録三十四家八百十六卷宋三朝志七十部七百三十三卷宋兩朝志十二部七十卷宋四朝志一十七部九十五卷宋中興志一百十九家一百四十九部一千七百六卷范子計然十五卷髙氏子略曰計然遨遊海澤自稱漁父范蠡有請曰先生有隂德願令越社稷長保血食計然曰越王烏喙不可以同利蠡之智其有決於此乎此編卷十有二往往極隂陽之變窮厯數之微其言之妙者有曰聖人之變如水隨形蠡之所以俟時而動以見幾而作者其亦有得乎此計然濮上人姓辛名文子其先晉國公子也容齋洪氏隨筆曰漢書貨殖傳越王句踐困於會稽之上乃用范蠡計然遂報強吳孟康注曰姓計名然越臣也蔡謨曰計然者范蠡所著書篇名耳非人也謂之計然者所計而然也羣書所稱句踐之賢佐種蠡為首豈復聞有姓計名然者乎若有此人越但用半䇿便以致霸是功重於范蠡而書籍不見其名史遷不述其傳乎顔師古曰蔡説謬矣古今人表計然列在第四等一名計研班固賔戲研桑心計於無垠即謂此耳計然者濮上人也嘗南遊越范蠡卑身事之其書則有萬物録事見皇覽及晉中經簿又吳越春秋及越絶書並作計倪此則倪研及然聲皆相近實一人耳何云書籍不見哉豫按唐貞元中馬總意林一書抄類諸子百餘家有范子十二卷云計然者葵邱濮上人姓辛字文子其先晉國之公子也為人有內無外狀貌似不及人少而明學隂陽見微知著其志沉沉不肯自顯天下莫知故稱曰計然時遨遊海澤號曰漁父范蠡請其見越王計然曰越王為人烏喙不可與同利也據此則計然姓名出處皎然可見裴駰注史記亦知引范子北史蕭大圜云留侯追蹤於松子陶朱成術於辛文正用此事曹子建表引文子李善注以為計然師古蓋未能盡也而文子十二卷李暹注其序以謂范子所稱計然但其書一切以老子為宗略無與范蠡謀議之事意林所編文字正與此同所謂范子乃别是一書亦十二卷馬總只載其敘計然及他三事云餘並隂陽厯數故不取則與文子了不同李暹之説誤也唐藝文志范子計然十五卷注云范蠡問計然答列於農家其是矣而今不存吕氏春秋二十卷鼂氏曰秦吕不韋撰後漢髙誘注按史記不韋撰云不韋相秦致辨士厚遇之使人人著所聞集論以為八覽六論十二記二十餘萬言以為備天地萬物古今之事號曰吕氏春秋暴之咸陽市門懸千金其上有能增損一字者豫之時人無增損者高誘以為非不能也畏其勢耳昔張侯論為世所貴崔浩五經注學者尚之二人之勢猶能使其書傳如此况不韋權位之盛學者安敢牾其意而有所更易乎誘之言是也然十二記者本周公書後儒置於禮記善矣而目之為吕令者誤也高氏子略曰淮南王尚志謀募竒士廬館一開天下雋絶馳騁之流無不雷奮雲集蜂議橫起瓌詭作新可謂一時傑出之作矣及觀吕氏春秋則淮南王書殆出於此者乎不韋相秦蓋始皇之初也始皇不好士不韋則徠英茂聚畯豪簪履充庭至以千計始皇甚惡書也不韋乃極簡册攻筆墨采精録異成一家言吁不韋何為若此者也不亦異乎春秋之言曰十里之間耳不能聞帷墻之外目不能見三畝之間心不能知而欲東至開悟南撫多鷃西服夀靡北懷靡耳何以得哉四極國名此所以譏始皇也始皇顧不察哉韋以此書暴之咸陽門曰有能損益一字者豫千金卒無一敢易者是亦愚黔之甚矣秦之士其賤若此可不哀哉雖然是不特人可愚也雖始皇亦為之愚矣異時亡秦者又皆屠沽負販無一知書之人嗚呼陳氏曰十二記者即今禮記之月令也淮南子二十一卷鼂氏曰漢劉安撰淮南厲王長子也襲封招致諸儒方士講論道德總統仁義著內書二十一篇號曰鴻烈鴻大也烈明也以為大明道之言也避父諱以長為修後漢許慎注慎自名注曰記上今存原道俶真天文地形時則覽宜精神本經主術繆稱齊俗道應汜論詮言丘略説山説林等十七篇李氏書目亦云第七第十九亡崇文目則云存者十八篇蓋李氏亡二篇崇文亡三篇家本又少其一俟求善本是正之容齋洪氏隨筆曰淮南王安招致賔客方術之士作為內書二十一篇外書甚衆又有中篇八卷言神仙黃白之術漢書藝文志淮南二十一篇淮南外三十三篇列於雜家今所存者二十一卷蓋內篇也夀春有八公山正安所延致客之處傳記不見姓名而高誘序以為蘇飛李尚左吳田申雷被毛被伍被晉昌等八人然惟左吳雷被伍被見於史雷被者蓋為安所斥而亡之長安上書者疑不得為賔客之賢者也高氏子略曰少愛讀楚辭淮南小山篇聱峻瓌磊他人制作不可企攀者又慕其離騷有傳窈窕多思致每曰淮南天下竒才也又讀其書二十篇篇中文章無所不有如與莊列吕氏春秋韓非子諸篇相經緯表裏何其意之雜出文之沿復也淮南之竒出於離騷淮南之放得於莊列淮南之議論錯於不韋之流其精好者又如玉杯繁露之書是又非獨出於淮南所謂蘇飛李尚左吳田申雷被毛被伍被大山小山諸人各以才智辨謀出竒馳雋所以其書駁然不一雖然淮南一時所延蓋又非止蘇飛之流也當是時孝武皇帝雋鋭好竒蓋又有甚於淮南內篇一陳與帝心合內少君下王母聘方士搜蓬萊神仙譎怪日日作新其有感於淮南所謂崑崙增城璇室懸圃弱水流沙者乎武雖不仙猶享多夀王何為者卒不克終士之誤人一至於此然其文字殊多新特士之厭常玩俗者往往愛其書况其推測物理探索隂陽大有卓然出人意表者惟揚雄氏曰淮南説之用不如太史公之用太史公之用聖人將有取焉淮南鮮取焉耳悲夫周氏涉筆曰淮南子多本文子因而出入儒墨名法諸家雖章分事彚欲成其篇而本末愈不相應且并其事自相舛錯如云武王伐紂載尸而行海內未定故不為三年之喪又云天下未定海內未輯武王欲昭文王之令德使夷狄各以其賄來貢遼逺未能至故治三年之喪殯兩楹以俟逺方當諸子放言之時不自相考幾無一可信者又謂武王用太公之計為三年喪以不蕃人類又甚矣陳氏曰按唐志又有高誘注今本記題許慎注而詳序文即是高誘不可曉也序言自誘之少從同縣盧君受其句讀盧君者植也與之同縣則誘乃涿郡人又言建安十年辟司空掾東郡濮陽令十七年遷監河東則誘乃漢末人其出處略可見子華子十卷鼂氏曰其傳曰子華子程氏名本晉人也劉向校定其書按莊子稱子華子見韓昭侯陸德明以為魏人既不合又藝文志不録子華子書觀其文辭近世依托為之者也其書有子華子為趙簡子不悅又有秦襄公方啓西戎子華子觀政於秦夫秦襄之卒在春秋前而趙簡子與孔子同時相去幾二百年其抵牾類如此且多用字説謬誤淺陋殆元豐以後舉子所為耳朱子曰會稽官書版本有子華子者云是程本字子華者所作孔子所與傾蓋而語者好竒之士多喜補之以豫觀之其詞故為艱澀而理實淺近其體務為高古而氣實輕浮其理多取佛老醫卜之言其語多用左傳班史中字其粉飾塗澤俯仰態度但如近年後生巧於模擬變撰者所為不惟決非先秦古書亦非百十年前文字也原其所以祗因家語等書有孔子與程子傾蓋而語一事而不見其所語者為何説故好事者妄意此人既為先聖所豫必是當時賢者可以假托聲勢眩惑世人遂為造此書以傅會之正如麻衣道者本無言語秪因小説有陳希夷問錢若水骨法一事遂為南康軍戴師愈者偽造正易心法之書以托之也麻衣易豫亦嘗辨之矣然戴生朴陋豫嘗識之其書鄙俚不足惑人此子華子者計必一能文之士所作其言精麗過麻衣易逺甚如論河圖之二與四抱九而上躋六與八蹈一而下沉五居其中據三持七巧亦甚矣唯其巧甚所以知其非古書也又以洛書為河圖亦仍劉牧之謬尤足以見其為近世之作或云王銍性之姚寬令威多作贋書二人皆居越中恐出其手然又恐非其所能及如子華子者今亦未暇詳論其言之得失但觀其書數篇與前後三序皆一手文字其前一篇托為劉向而殊不類向他書後二篇乃無名氏嵗月而皆托為之號類若世之匿名書者至其首篇風輪水樞之云正是並緣釋氏之説其卒章宗君三祥蒲璧等事皆剽剝他書傅會為説其自序出處又與孔叢子載子順事略相似孔叢亦偽書也又言有大造於趙宗者即指程嬰而言以左傳考之趙朔既死其家內亂朔之諸弟或放或死而朔之妻乃晉君之女故武從其母畜於公宫安得所謂大夫屠岸賈者興兵以滅趙氏而嬰與杵臼以死衛之云哉且其曰有大造者又用吕相絶秦語其不足信明甚而近嵗以來老成該洽之士亦或信之固已可怪至引其説以自證其姓氏之所從出則又誣其祖矣大抵學不知本而眩於多愛又每務欲出於衆人之所不知者以為博是以其弊必至於此可不戒哉周氏涉筆曰子華子所著劉向序者文字淺陋不類向其云善持論聚徒著書更題其書皆非當時事辭大抵十卷者編緝見意鳩聚衆語老莊荀孟國語素問韓非楚詞俱被剽拾殆似百家衣葆其實近時文字又多解字義蓋古文屢降至漢世今文猶未專行吾嘗疑其三經後此書方出故信字説而主老莊又論治古之時積美於躬弗憂於無聞如擊考鼓鐘其傳以四逹驛如也今則不然荒飈怒號而獨秀者先隕霜露霄零而諸草交稿媾市之徒又從而媒孽以髠搖之萌意於方寸未有毫分也而觸機穽展布其四體未有以為容也而得拲梏抱其一概之操泯泯默默而願有以試也而漫漫之長夜特未旦也疾雷破山澍雨如注雞鳴於塒而失其所以為司晨也人夀幾何而期有以待也吾反覆其言而悲之嗟夫斯人也是書也毋乃黨禁不開善類塗地無所呌號之時乎陳氏曰考前世史志及諸家書目並無此書蓋假托也館閣書目辨之當矣家語有孔子遇程子傾蓋事而莊子亦載子華子見昭僖侯一則此其姓字之所從出昭僖與孔子不同時然莊子固寓言而家語亦未可考信班固古今人表亦無之使果有其人遇合於夫子班固豈應見遺也其文不古然亦有可觀者當出近世能言之流為此以玩世耳風俗通義十卷鼂氏曰漢應劭撰劭字仲逺奉之子篤學博覽多聞靈帝時舉孝廉仕至泰山太守撰風俗通以辨物名號釋時嫌疑文雖不典世服其洽聞自序云風者天氣有寒暖地形有隂陽泉水有美惡草木有剛柔俗者含血之類象而生之千里不同風百里不同俗陳氏曰唐志二十卷今惟存十卷餘略見廖仲容子鈔文獻通考卷二百十三
