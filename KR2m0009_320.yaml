body:
  text: 文獻通考卷三百二十鄱陽馬端臨貴與著輿地考六古豫州禹貢曰荆河惟豫州西至南荆山今襄陽郡南漳縣界北距河也伊洛瀍澗既入于河伊出今河南府伊闕縣陸渾山洛出今上洛郡洛南縣冡領山瀍出今河南縣榖城山澗出澠池縣山四水皆入河也滎波既瀦滎本沇水溢出在今滎陽郡滎澤縣也波亦水名言其水並已蓄聚矣一説謂滎水之波也今沇水不過河道菏澤被孟瀦菏澤在今魯郡方與縣孟瀦亦澤名在今睢陽郡虞城縣即孟瀦澤也言菏澤水衍溢則使被及孟瀦不常入也道音導菏音柯厥土惟壤下土墳壚髙地即壤下土即墳壚壚土之剛黑者墳扶粉反壚音盧浮于洛河因洛入河舜為十二牧之一周禮職方河南曰豫州其山曰華即今華隂郡山也連延東出故屬豫州藪曰圃田在今滎陽郡中牟縣川曰滎雒滎即滎澤洛即洛川今福昌縣界浸曰波溠出黃山在今漢東郡棗陽縣界東北又云波水出歇馬嶺即應劭所謂孤山在今臨汝郡魯山縣西北溠音莊亞反其利麻漆絲枲人二男三女畜宜六擾馬牛羊豕犬雞也謂之擾者言人所馴養也榖宜五種黍稷稻菽麥豫州在九州之中言常安逸也又云逸者舒也言稟中和之氣性理安舒也其在天官栁七星張則周之分野漢之河南雒陽榖城平隂偃師鞏緱氏皆其分也今河南府之河南雒陽偃師東至緱氏鞏縣南得伊闕也北至於河房心則宋之分野漢之沛梁濟隂皆其分也今睢陽譙郡濟隂地也觜觿參則魏之分野漢之髙陵以東及陳留汝南之召陵濦強新汲西華長平潁川之舞陽郾許鄢陵河南之開封中牟陽武原武卷皆其分也今𢎞農郡之北境滎陽之東北境潁川之東境淮陽之北境汝南之北境并陳留郡地也角亢氐則韓之分野漢之南陽及潁川之父城定陵襄城潁陽潁隂長社陽翟郟東接汝南西接𢎞農兼得新安宜陽皆其分也今陜郡之河南地河南府之西境南境東境滎陽臨汝潁川之西境漢東淮安南陽武當等郡也兼得秦楚之交漢之𢎞農故關以西今𢎞農郡之南境宜屬秦漢之汝南今汝隂汝南之南境淮陽之南境漢之南郡北境今襄陽郡地並宜屬楚也秦分天下置郡為三川今河南府陜郡之河南地𢎞農臨汝滎陽陳留等郡地是也碭今睢陽譙郡濟隂等郡地是也潁川今潁川淮陽汝隂汝南等郡地是也南陽郡之東境北境今漢東淮安南陽武當等郡地是也南郡之北境今襄陽郡漢武置十三州此為豫州領郡國五其今河南府陜郡𢎞農之地則屬司𨽻陳留濟隂則屬兖州也後漢為司𨽻理洛陽豫州理於譙領郡國六譙今譙郡是也魏亦同理汝南安城今汝南吳房縣也晉分置司州領郡十一理洛陽及豫州領郡國十理梁國項今淮陽郡項城縣也永嘉之亂豫州沒於劉石苻姚宋初有其南境置豫州領郡十理汝南郡即今郡宋文帝元嘉中全盛得之後失後魏以後分裂不詳焉唐分置十五部此為都畿河南府陜郡臨汝滎陽等郡河南道陳留睢陽濟隂譙郡潁川淮陽汝隂汝南等郡兼分入山南東道淮安南陽襄陽漢東武當及河東道𢎞農五代並都於汴宋因之其豫州之境俱為京師輔郡置京東路開封應天單曹拱濟廣京西路河南汝潁鄭蔡許唐鄧隨襄陽陽均光陳棗化兼得陜西路陜虢淮東路亳南渡後俱沒於金惟得京西之襄陽均隨棗陽光化而已荆河之間四方輻輳故周人善賈趨利而纎嗇韓國分野亦有險阻蘇秦謂韓宣王曰韓北有鞏洛成臯之固西有宜陽商阪之塞東有宛穰洧水南有陘山也鞏成臯則今鞏縣汜水也宜陽商阪即今福昌山及商山也宛穰南陽界陘山密縣界自東漢魏晉宅於洛陽永嘉以後戰爭不息元魏徙居才過三紀逮乎二魏爰及齊周河洛汝潁迭為攻守夫土中風雨所交宜乎建都立社均天下之漕輸便萬國之享獻不恃隘害務修德刑則卜世之期可延久也古豫州厯代沿革之圖春秋時可考者四十國周鄭宋陳曹許蔡虞虢祭劉單把蘇甘管芮郜滑頓胡沈鄧唐隨賴戴江項厲應息葛焦道柏夷房亳楚北境是秦時為郡五三川郡碭郡潁川郡南陽郡東北境是南郡北境是漢時為郡國八縣一百八十六潁川郡二十縣陽翟新汲昆陽襄城潁陽郟定陵城長社氏郾陽綸舞陽成安潁隂休崈髙周承許鄢陵臨潁父城河南郡二十二縣雒陽中牟滎陽陽偃師河京平武南平隂成臯苑陵成緱氏封卷梁原武鄭鞏新開新榖成故市密陳留郡十七縣陳留酸棗小黃東昏成安襄邑寧陵外黃雍邱封邱長羅尉氏傿長垣平邱濟陽浚儀汝南郡三十七縣平輿陽陽安陽陽城房濦強成富波汝鮦吳安慎陽息南頓陽朗陵思細陽新灈期項宜春召汝隂弋新蔡西慎陵陽平德上蔡新陽寢昌西華陽長平陽宜祿陽新郪陵歸安安博成定沛郡三十七縣相廣龍亢下竹戚蔡榖陽夏蕭豐邱向鄲銍譙洨蘄扶虹陽輒與芒山桑城公邱父符離平敬邱沛建城建鄼栗都祁鄉義成髙髙柴溧陽平阿東鄉臨南陽郡三十六縣宛涅犨陽杜衍堵鄼隂陽育陽雉博山穰山都鄂蔡陽陽新野西朝酈築陽安衆棘陽冠軍武當比陽舞隂平氏隨樂葉成鄧望魯陽陽舂陵博復新都湖陽紅陽梁國八縣碭陽災睢杼秋蒙已氏虞下邑淮陽國九縣陳圉苦平陽夏新柘寧平扶溝固始漢中郡北境是縣見梁州南郡北境是縣見荆州𢎞農郡東境是縣見雍州晉時為郡國十四縣一百三十七河南郡十二縣洛陽緱河南陽鞏臯氏城河隂新城新安陸渾成梁陽翟滎陽郡八縣滎陽開京牟封密卷陽武苑陵中𢎞農郡六縣𢎞農湖宜陽陜澠池華隂陳留國十縣小黃雍浚儀尉封邱襄酸棗外濟陽垣邱氏邑黃長梁國十二縣睢陽項蒙長虞陳平下邑陽夏寧陵武平榖熟苦汝南郡十五縣新息朗南安陽安安成蔡慎陽輿北宜春陵陽上平定潁灈陽南頓汝陽吳房西平南陽國十四縣宛望西鄂陽雉葉魯陽隂犨比淯陽涅博堵舞陽陽冠軍酈譙郡七縣譙城父鄼山桑龍亢蘄銍汝隂郡八縣汝隂宋慎信原鹿褒固始鮦陽新蔡潁川郡九縣許昌陵長社汲潁隂平臨頴鄢新長郾邵陵濟陽郡西境是縣見兖州義陽郡十二縣新野棘陽穰厥鄧平蔡陽義隨西氏陽安昌平林朝陽順陽郡八縣鄼陽順陽築析南鄉丹水武當隂襄城郡七縣襄城陽繁昌舞郟定陵父城昆陽沛國九縣相虹沛蕭豐築邑符離杼秋洨隋時為郡十七縣一百四十八河南郡十八縣河南澠洛陽新閿鄉偃桃林鞏陜宜熊耳池安師陽城夀安陸渾伊闕興泰緱氏嵩陽陽滎陽郡十一縣管城圃田汜水浚儀滎澤酸棗原武新鄭陽武滎陽開封梁郡十三縣宋城雍襄邑下寧陵考虞城楚榖熟碭陳留邱邑城邱山圉城柘城汝南郡十一縣汝陽上蔡城陽平輿真陽新蔡新息朗山褒信吳房西平潁川郡十四縣潁川繁襄城臨汝墳尉葉城昌潁氏北舞長葛郾許昌濦強扶溝鄢陵濟隂郡九縣濟隂定外黃單濟陽金成武氏陶父鄉寃句乘譙郡六縣譙鄼城父谷陽山桑臨渙汝隂郡五縣汝隂潁陽清邱潁上下蔡淮陽郡十縣宛邱項西華南溵水扶樂陽太康邑城頓鮦鹿淮安郡七縣比陽桐平氏邱柏真昌顯岡臨舞慈淯陽郡三縣武川向城方城𢎞農郡四縣𢎞農盧氏長泉朱陽舂陵郡六縣棗陽陽舂陽清潭湖陽上馬蔡襄城郡八縣承休魯梁城郟城犨陽翟汝源汝南南陽郡八縣穰菊新野新南陽潭城課陽順陽冠軍漢東郡八縣隨上土山光唐城明化安貴順義平林淅陽郡七縣南鄉鄖內鄉福鄉丹水武當均陽安唐時為州十八縣一百二十五河南府二十縣陜州六縣虢州六縣汝州七縣鄭州七縣汴州六縣宋州八縣單州四縣亳州七縣曹州五縣許州九縣陳州六縣潁州四縣蔡州十縣唐州七縣鄧州六縣均州三縣隨州四縣宋時為州二十二縣一百二十七河南府十九縣陜州八縣虢州四縣汝州六縣鄭州五縣開封府十六縣應天府七縣單州四縣拱州二縣亳州七縣曹州四縣廣濟軍一縣許州七縣陳州五縣潁州四縣蔡州十縣唐州五縣鄧州五縣均州二縣襄陽府六縣隨州四縣棗陽軍一縣光化軍一縣河南府凡河北諸縣並冀州之域餘則豫州之域今治河南洛陽二縣蓋周之舊都昔武王尅殷定鼎於郟鄏至成王營成周卜澗水東瀍水西而宅洛邑是為王城郟鄏陌名漢孔安國云王城今河南城周靈王時榖雒鬭毁王宫則左傳齊莊公遣師城郟是也在今城之西按此榖水本澗水自後遂更名矣經今城之苑中入於洛又於瀍水東卜亦吉遷殷頑民居之孔安國云將定下都遷殷人故并卜之也平王因犬戎之亂自酆東遷而居王城則東周之始王也至敬王與王子朝爭立出奔晉定公使魏舒率諸侯之大夫會於狄泉以其地本成周之城而居敬王按在今洛陽之城東三十餘里故城是則周之下都也有狄泉在城中然而成周是王城下都之總號故左氏傳曰萇𢎞云西王天棄之東王必大克時子朝居王城故曰西王敬王居狄泉在王城之東故曰東王至孝王封其弟桓公於河南以續周公之官職至孫惠公乃封少子於鞏號東周惠公按此時又别稱東周也王赧立赧尼板反東西周分理又徙都西周則王城也初平王時雒邑與宗周宗周鎬京也通封畿東西長南北短長短相覆為千里後為諸侯所侵比周之亡七城而已河南洛陽新城平隂偃師鞏緱氏也按七邑之境西自今河南洛陽南自伊闕緱氏東得鞏縣北至於河秦平天下置三川郡漢髙帝置河南郡領縣二十二後漢改為河南尹領縣二十兼置司𨽻領郡七理於此魏晉郡因之兼置司州領縣十一理於此後魏孝文自代徙都之亦為河南尹至東西魏分有其地北齊為洛州石季龍已為洛州至齊又改名焉齊滅屬後周當東西魏及齊周之時二境交爭攻戰邊鎮俱在於此隋初為洛州煬帝之初移都創制復曰豫州尋改為河南郡置尹唐平偽鄭王充置洛州開元元年改為河南府凡周漢魏晉後魏隋至唐並為帝都周謂平王以下漢謂後漢晉謂西晉也今號為東京後改號東都按故都城自周氏至大業以前常為都邑今都城即隋煬帝大業元年所築屬河南道領縣二十河南偃師洛陽陸渾伊闕清新安池鞏福緱氏長陽城永登封潁夀安伊密河澠昌水寧陽陽屋王漢乾祐中置望陵縣周顯德中廢陽城縣宋乾德初廢望陵景德四年升永安鎮為縣屬京西路號西京熙寧後以王屋縣𨽻孟州伊闕緱氏二縣並省為鎮建炎後沒於金紹興間講和歸我河南地遣使者祀陵寢既而金復取河南金改永安為芝田縣以密縣屬鄭州永寧縣為嵩州改夀安縣為宜陽縣伊陽縣為嵩州河清縣為孟津縣又升龍開小水福昌三鎮並為縣貢蜜蠟瓷器領縣十九治河南洛陽河南古郟鄏地是為王城後漢縣有闕塞山俗曰龍門有洛伊瀍三水榖城山瀍水所出有金墉城洛陽古成周地有邙山東北有孟津武王會諸侯處有後漢明章二帝陵永安本永安鎮宋以陵寢所在升為縣登封唐縣有中嶽嵩髙山少室山有鬼谷潁川測景臺石羊關夀安隋縣有瀍水又有九曲城髙齊置以備周伊闕古戎蠻國隋縣有陸渾山伊水所出伊闕山鼓鐘山伊水涓陽水陸渾關永寧隋縣有三崤山晉敗秦師處有熊耳山嶕嶢榖水髙門關松陽關鵜鶘關又有回溪馮異敗師處長水漢盧氏縣地唐縣有天壇山新安漢縣縣東北一里有漢故函谷關其秦關在今靈寶縣漢武帝時樓船將軍楊僕數有大功恥為關外人上書乞移關以家財給其用乃徙於新安項羽坑秦降卒於新安城南即此地也福昌唐縣有女几山金門山城東南北三靣峭絶天險後周置兵於此備齊伊陽古陸渾氏之地唐縣有伊水三塗山後周置兵於此備齊鞏春秋時鞏國戰國時有東西周此即東周所居漢為縣有鮪渚密古密國亦鄶國有大騩山鄶水後𨽻