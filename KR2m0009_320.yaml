澤薨命杜充上官悟相繼留守四年二月卒陷於金紹興二年逆豫僭號遷於汴九年金廢豫以河南來歸十年叛盟入寇復取之完顔亮偽易東京為南京三十一年亮自燕徙都汴入寇遇弒金主雍立乃復都燕嘉定七年金主珣復徙汴十二年尅復京東河北二府九州四十縣未幾復失貢方紋綾方紋紗藨席麻黃酸棗仁領縣十六治開封祥符開封唐縣有古通津臨蔡二關逢池沙海祥符東魏浚儀縣宋改有蔡水浚水沙臺崇臺尉氏春秋鄭大夫尉氏之邑漢縣有逢池陳留有莘國城本鄭邑後為陳所併故曰陳留唐為縣雍邱古杞國漢縣有葵邱齊桓會諸侯之地又東晉初祖逖駐兵於此封邱古封國有黃池吳夫差會諸侯地漢縣中牟漢舊縣有圃田澤又有官渡曹操袁紹相拒之地陽武漢縣有汝池又有博浪沙張良擊秦皇地酸棗漢縣以地多棘而立名有金隄關長垣隋匡城縣孔子所厄之地宋改今名東明古東昏之地後為東明鎮宋初置縣襄邑春秋時襄牛地漢縣崇寧間以縣建拱州扶溝漢縣有洧水溝鄢陵漢縣鄭伯克段於鄢即此地考城古戴國隋縣梁改戴邑後唐復太康漢陽夏縣唐改有魯溝咸平舊通許鎮𨽻陳留咸平五年改縣應天府髙辛氏子閼伯所居商邱也周武王克殷以封微子啓是為宋國戰國時齊楚魏三分其地秦置碭郡漢改為梁國後漢因之晉亦曰梁國後周置梁州隋文帝置宋州煬帝初為梁郡唐復為宋州或為睢陽郡屬河南道領縣八宋城寧陵襄邑下邑榖熟柘城楚邱虞城梁為宣武軍節度以襄邑屬開封府碭山屬輝州以輝州楚邱來屬後唐改歸德軍宋升為應天府號南京屬京西路靖康金人入京師建炎元年四月髙宗即位於南京十月幸淮甸三年沒於金金改為歸德府貢絹領縣七治宋城宋城宋國都有孟諸澤有梁孝王園鴈鶩池漢為睢陽縣隋改今名楚邱古戎州已氏之邑唐縣柘城唐縣有柘溝榖熟殷之南亳湯所都古榖城地隋縣下邑古虞國漢縣寧陵古葛伯國又魏信陵君邑隋縣單州唐光化二年朱全忠奏以宋州碭山虞地單父曹州之武成置輝州梁以楚邱還屬宋州後唐改為單州以兖州魚臺來屬宋因之為團練屬京東西路建炎三年沒於金金𨽻河南路貢防風蛇床領縣四治單父單父古魯邑隋縣有宓子賤琴臺碭山隋縣山出文石得名漢髙祖隱芒碭山澤即其地成武隋縣有堂溝魚臺魯棠臺隱公矢魚之所唐縣拱州本開封府襄邑縣宋崇寧四年建為州保慶軍節度為東輔以開封之考城太康南京之寧陵楚邱柘城來𨽻大觀四年廢拱州復為襄邑縣還𨽻開封政和四年復為州罷東輔宣和二年以襄邑太康寧陵為屬縣餘歸舊𨽻六年又以寧陵歸南京太康歸開封復割柘城來𨽻屬京東西路紹興後沒於金金為睢州𨽻河南路割東京考城縣來屬領縣二治襄邑襄邑見開封府柘城見應天府亳州周武王封神農之後於焦即其地也後改為譙春秋時為陳國之譙邑戰國時屬宋秦屬碭郡漢屬沛郡後漢為沛國兼置豫州領郡六治於此魏置譙郡晉因之後置南兖州後周為亳州兼置陳留郡隋初郡廢煬帝初州廢復置譙郡唐為亳州或為譙郡屬河南道領縣七譙真鄼源城父永城鹿邑蒙城梁為防禦晉因之宋大中祥符七年建為集慶軍節度屬淮南東路紹興十年沒於金張俊王德復取之既而復失金𨽻河南路貢皺紗絹領縣七治譙譙周武王封神農後之地有渦水城父春秋時陳國之夷邑有乾溪楚靈王敗之地又有肥水唐焦夷縣後唐改蒙城唐縣有嵇山山桑城鄼漢縣有龍亢城太邱城鹿邑隋縣有瀖水永城隋縣有碭山衛真古之苦縣老子生於此唐真源縣宋改有老子祠瀨水曹州昔唐堯所居州界有堯塜在周為曹國之地曹叔振鐸所封湯伐桀桀奔三朡湯又伐之即此地戰國時屬宋秦屬碭郡漢改為梁國景帝分梁為濟隂國宣帝更名定陶後為濟隂郡後漢因之晉為濟陽郡後魏置沛郡及西兖州後周改西兖為曹州隋為濟隂郡唐復為曹州或為濟隂郡屬河南道領縣五濟隂南考城乘宛句華氏梁以考城屬開封府升為威信軍節度周改彰德軍宋為輔州建中靖國元年升為興仁府屬京東西路建炎三年沒於金金𨽻河南路而宛亭南華乘氏三縣皆為黃河水淹廢乃以東明縣來屬貢絹葶􅐗子領縣四治濟隂濟隂古三朡亭在縣東北漢定陶縣地有汜水髙帝即位之所唐改今名縣在濟水之南宛句有漆園莊周為吏之所今縣西南漢光武生於此唐為縣元祐間改為宛亭縣南華唐縣有沙溝莊周釣臺乘氏古乘邱地唐為縣廣濟軍漢定陶縣唐為鎮𨽻曹州周建廩庾管𣙜於此宋乾德元年疏洧水以通漕運置發運務開寶九年改為轉運司太平興國二年建為軍四年割曹澶濟濮四州地復置縣以𨽻焉屬京東西路熙寧四年廢軍以定陶縣𨽻曹州元祐元年復為軍建炎後沒於金金領縣一定陶有三朡亭陶邱濮水許州春秋許國七國時為韓魏二國之境秦為潁川郡漢髙帝為韓國尋復故後漢因之獻帝都之魏文帝受禪於此及晉後魏並為潁川郡西魏初得之後入東魏西魏將王思政鎮守東魏軍圍之二百日城陷即今長葛縣界故長社城改為鄭州後周改曰許州隋復為潁川郡唐為許州或為潁川郡忠武軍節度屬河南道領縣九長社陵長葛溝陽翟陽許昌鄢扶舞郾城潁臨梁改正國軍以扶溝鄢陵二縣屬開封後唐復為忠武軍宋因之元豐三年升為潁昌府崇寧四年建為南輔屬京西北路建炎二年沒於金四年收復未幾復失金𨽻河南路又以陽翟縣為潁順軍後為鈞州𨽻河南路以鄭州新鄭來𨽻貢絹藨席領縣七治長社長社唐縣有髙陽里荀淑故宅又有潩水郾城漢縣有長沙河五溝水鴻隙陂陽翟鄭櫟邑漢縣有荆山具茨水長葛隋縣有洧水臨潁漢縣有豢龍城舞陽唐縣有舞水滍水許田魏許昌縣漢獻帝都於此後唐縣熙寧四年省為鎮入長社陳州昔庖犧氏所都曰太昊之墟周初封舜後媯滿於此以備三恪為陳國楚滅為縣楚頃襄王自郢徙於此戰國時為楚魏二國之境秦屬潁川郡漢汝南郡淮陽國之地後漢亦同晉為汝南郡梁國二境地兼置豫州領郡國十治於此後魏置陳郡又置北揚州治於此北齊改北揚州為信州以百姓守信不附侯景故曰信州隋置陳州煬帝初州廢置淮陽郡唐為陳州或為淮陽郡屬河南道領縣六宛邱華項城康南頓水西太溵梁以太康屬開封府晉為鎮安軍節度宋因之宣和元年升為淮寧府屬京西北路建炎二年沒於金紹興元年復旋失金𨽻河南路紹興三十一年土人陳亨祖執偽守以城來歸旋復失貢紬絹領縣五治宛邱宛邱陳國都有東門池又有固陵髙祖追及項羽處項城古項子國隋縣商水隋縣有章華臺乾溪南頓古頓子國後迫於陳南徙故曰南頓唐縣西華唐縣潁州春秋時胡子國也戰國時屬楚秦為潁川郡地兩漢為汝南郡地魏置汝隂郡司馬宣王使鄧艾屯田於此後廢晉武帝復置汝隂郡後魏置潁川郡隋復為汝隂郡唐為潁州或為汝隂郡屬河南道領縣四宋同漢為防禦周為團練以下蔡屬夀州宋升汝隂縣百尺鎮為萬夀縣元豐二年升順昌軍節度政和六年改為順昌府屬京西北路紹興後沒於金金𨽻河南路紹興中和議成以河南地來歸既而背盟入寇劉錡大敗其師於郡城下紹興三十一年李貴同忠義總首孟俊取順昌旋復失貢紬絁綿領縣四治汝隂汝隂漢縣有寢邱潁水淮水淝水汝水萬夀有潁川宣和後改為泰和縣潁上隋縣有潁水淮水雷陂塘沈邱唐縣有武邱蔡州春秋時沈蔡二國之地戰國時為楚魏二國之境秦屬潁川郡漢髙祖置汝南郡後漢因之魏晉亦曰汝南郡宋初因之兼置豫州領郡十治於此以為重鎮常珍竒守之元嘉二十六年後魏太武率兵攻圍汝南太守陳憲守拒四十餘日魏人積尸與城齊卒不能拔後魏置豫州治於此東魏置行臺後周置總管府後改曰舒州尋復曰豫州其後改洛州為豫州以此為溱州尋改曰蔡州後置汝南郡隋初郡廢煬帝初復置汝南郡唐為豫州或為汝南郡寶應元年更名蔡州屬河南道領縣十汝陽褒信朗山新息遂平真陽上蔡平輿新蔡西平漢為防禦宋為淮康軍節度屬京西北路建炎二年沒於金金𨽻河南路紹興八年三十一年開禧三年收復凡三皆旋失貢綾領縣十治汝陽汝陽漢北宜春縣隋改有懸瓠城鴻郤陂溱水東南有二龍鄉月旦里上蔡古蔡國蔡仲始封地漢縣有汝水平輿古沈子國唐縣新蔡古吕國隋縣有鮦陽葛陂褒信隋縣有淮水汝水西平古柏子國唐縣有棠溪遂平古房子國唐縣有龍泉水瀙水確山古道國隋朗山縣宋改有淮水真陽漢縣有淮水汝水石塘陂新息古息國漢縣有汝水唐州春秋楚地戰國時屬韓秦漢並南郡地後漢亦然晉屬南陽國後魏置東荆州西魏改為淮州為重鎮置兵以備東魏隋改為顯州煬帝改為淮安郡唐為唐州或為淮安郡屬山南道領縣七泌陽平比陽湖慈邱方桐柏氏陽城梁改為泌州後唐復晉又為泌州漢復周廢慈邱縣宋升為團練屬京西南路紹興十二年與金議和割以遺金紹興末金主亮渝盟入寇我師復唐州隆興再和復割以遺金貢絹領縣五治泌陽泌陽漢舞隂縣唐改有泌水桐柏隋縣淮水所出湖陽古蓼國漢縣方城後魏縣有方城山衡山堵水比陽漢縣有比水鄧州本夏禹之國春秋時申伯鄧侯二國之地戰國屬韓後沒於秦封魏冉為穰侯尋屬楚楚亡秦置南陽郡兩漢因之晉為南陽國及順陽義陽二郡之境宋齊並為南陽郡後魏置荆州西魏為重鎮置兵以備齊隋初改為鄧州煬帝初為南陽淯陽二郡地唐為鄧州或為南陽郡屬山南道領縣六穰湍南陽鄉向城潭臨內菊梁為宣化軍節度後唐改威勝軍周改武勝軍廢菊潭縣宋初廢臨湍縣屬京西南路中興後與金議和割以遺之與唐州同金屬河南路貢白菊花花蠟燭領縣五治穰穰漢縣有鉗盧陂沮陽城橘水南陽古申伯國隋縣周慶向城縣入焉有菊水內鄉隋縣有丹水淅水淅水朱梁縣有淅水富水順陽有五龍山丹水均州戰國時屬韓秦屬南陽郡漢為南陽漢中二郡後漢因之魏屬南鄉郡晉宋並屬順陽郡後置武當郡齊於此僑立始平郡尋改為齊興郡梁置興州後周改為豐州隋初郡廢改為均州煬帝初州廢改為淅陽郡今郡城即後漢延岑築據之唐為均州或為武當郡屬山南道領縣三武當豐鄖鄉利宋廢豐利入鄖鄉為武當軍節度屬京西南路郡當荆襄上遊商鄧陜虢要衝吳蜀襟喉之地貢麝香領縣二治武當武當漢縣有古塞城在縣北戰國時楚築以備秦其山髙峻險峭又有武當山鄖鄉古麇國地晉縣襄陽府禹貢豫州之南境南漳一縣則荆州之域餘並荆河州之域春秋以來楚地秦南郡之北界二漢屬南郡南陽二郡地至獻帝時魏武始置襄陽郡亦為重鎮蜀將關侯攻沒于禁等七軍兵勢甚盛徐晃屯守不下曹公謂晃曰全襄陽子之功也後孫權帥兵向西時曹仁鎮之司馬宣王言於魏文帝曰襄陽水陸之衝禦寇要地不可失也晉初因之兼置豫州理於此平吳後理江陵東晉僑置雍州時以雍州既沒流人聚此魏該朱序皆鎮焉宋文帝割荆州置雍州領郡十七理於此襄陽去江陵步道五百勢同脣齒無襄陽則江陵受敵自東晉庾翼為荆州刺史將謀北伐遂鎮襄陽田土肥良桑梓遍野常為大鎮北接宛洛跨對楚沔為鄢郢北門部領蠻左齊梁並因之亦為重鎮後梁蕭察附庸於西魏而都於此西魏改曰襄州隋復為襄陽郡唐因之為山南東道節度屬山南道領縣七襄陽南漳義清鄧城樂鄉榖城宜城周廢樂鄉縣宋屬京西南路宣和元年升為襄陽府中興後京西安撫京湖制置置司領襄隨郢均房棗陽光化凡七郡貢麝香白榖漆器領縣六治襄城襄城漢縣在襄水之陽有峴山漢水隆中髙陽池冠蓋里鳯林關栁關鄧城古樊邑唐縣有宛水泌水榖城古榖伯之國隋縣中廬古廬戎之國隋義清縣宋改宜城漢縣有涑水鄀水南漳隋縣有荆山禹貢荆及衡陽惟荆州即此山卞和得玉之所隨州光化鄉在今郡東南三十餘里則荆州之域餘則豫州之域春秋隨侯之國左傳曰漢東之國隨為大其後屬韓秦二漢並屬南陽郡晉屬義陽郡後分置隨郡宋齊因之西魏置并州後改曰隨州隋分其地置漢東春陵二郡唐併為隨州或為漢東郡屬山南道領縣四宋同宋升為崇義軍節度後改崇信軍屬京西南路其地因山為郡岩石隘狹道路交錯自棗陽至厲山九十九岡昔智謀之士多談漢東險阻如兵家詭伏竒計又言有括囊之勢易入而難出嘉定十五年以三關𨽻德安置關使貢絹綾葛覆盆子領縣四治隨隨漢縣有三鍾山厲山隨侯臺九井棗陽隋縣有濜水紹興十二年升為軍唐城唐縣梁改漢東後唐復有溠水光化後周縣有錫水棗陽軍本隨州屬縣宋紹興十二年升軍光化軍本襄陽宜城縣隂城鎮宋初升為光化軍熙寧五年廢軍改為光化縣𨽻襄陽元祐初復為軍領縣一乾德有漢江溫水文獻通考卷三百二十
