body:
  text: 文獻通考卷一百六十九鄱陽馬端臨貴與著刑考八詳讞平反虞舜眚災肆赦怙終賊刑眚過也災害也肆緩賊殺也過而有害當緩赦之怙奸自終當刑殺之宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經辜罪也經常也周官小司宼以八辟麗邦法附刑罰辟法也麗附也故書付作附附猶著也一曰議親之辟鄭司農云若今時宗室有罪先請是也二曰議故之辟故謂舊知也三曰議賢之辟鄭司農云若今時廉吏有罪先請是也元謂賢有徳行者四曰議能之辟能謂有道藝者春秋傳曰夫謀而鮮過恵訓不倦叔向有焉社稷之固也猶将十世宥之以勸能者今一不免其身以棄社禝不亦惑乎五曰議功之辟謂有大勲勞立功者六曰議貴之辟鄭司農云若今時吏墨綬有罪先請是也七曰議勤之辟謂憔悴以事國八曰議賓之辟謂所不臣者三恪二代之後歟以三刺斷庻民獄訟之中中謂罪正所定一曰訊羣臣二曰訊羣吏三曰訊萬民刺殺也三訊罪定則殺之訊告也疏曰羣臣士以上羣吏府史胥徒庻人在官者萬民民間有徳行不仕者聽民之所刺宥以施上服下服之刑宥寛也民言殺殺之言寛寛之上服劓墨也下服宫刖也王制司宼正刑明辟以聽獄訟必三刺以求民情斷其獄訟之中也三刺注見前有㫖無簡不聽簡誠也有其意無其誠者不論以為罪附從輕附施刑也求出之使從輕赦從重雖是罪可重猶赦之疑獄汜與衆共之衆疑赦之必察小大之比以成之小大輕重也行故事曰比君陳王曰君陳殷民在辟予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中穆王吕刑上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要事在上刑而情適輕則服下刑舜之宥過無大康誥所謂大罪非終是也事在下刑而情適重則服上刑舜之刑故無小康誥所謂小罪非眚是也若諸罰之輕重亦皆有權焉權者進退推移以求其輕重之宜也刑罰世輕世重者周禮刑新國用輕典刑亂國用重典刑平國用中典随時而為輕重者也輕重諸罰有權者權一人之輕重也刑罰世輕世重者權一世之輕重也惟齊非齊者法之權也有倫有要者法之經也言刑罰雖惟權變是適而齊之以不齊焉至其倫要所在蓋有截然而不可紊者矣此兩句總結上意也大戴禮刑法者御人之衘勒也吏者轡也刑者䇿也天子御者内史太史左右手也古者以法為衘勒以官為轡以刑為䇿以人為手而御天下公家不畜刑人大夫不養士遇之途不與之言屏諸四方唯其所如不及以政不欲生之故也又曰刑不上大夫者古之大夫有坐不廉汚穢者則曰簠簋不飾媱亂男女無别者則曰帷薄不脩罔上不忠者則曰臣節未著罷軟不勝任者則曰下官不職干國之紀者則曰行事不請此五者大夫定罪名矣不忍斥然以正呼之是故大夫之罪其在五刑之域者聞有譴發則自冠氂纓盤水加劔造乎闕而自請罪君不使有司執縳牽而加之也其有大罪者聞命則北面跪而自裁君不使人捽引而刑殺之也曰子大夫自取之耳吾遇子有禮矣是曰刑不上大夫漢髙帝七年制詔御史獄之疑者吏或不敢决有罪者久而不論無罪者久繫不决自今以來縣道官獄疑者各讞所屬二千石官二千石官以其罪名當報謂處斷也所不能决者皆移廷尉亦當報之廷尉所不能决謹具為奏傳所當比律令以聞文帝時張釋之為廷尉罪疑者予民時上行出中渭橋有一人從橋下走乗輿馬驚於是使騎捕之屬廷尉釋之奏當此人犯蹕當罰金上怒曰此人親驚吾馬馬頼和柔令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天下公共之也今法如是更重之是法不信扵民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也一傾天下皆用法為輕重民安所措其手足唯陛下察之上良乆曰廷尉當是也其後人有盗髙廟座前玉環得帝怒下廷尉治釋之按盗宗廟服御物者為奏當棄市上大怒曰人無道乃盗先帝器吾屬廷尉者欲置之族而君以法奏之非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足也且罪等然逆順為差今盗宗廟器而族之假令愚民取長陵一抔土陛下且何以加其法乎帝乃白太后許之孝景中五年詔諸獄疑雖文致於法而於人心不厭者輙讞之後元年詔曰獄重事也人有智愚官有上下獄疑者讞有司所不能決移廷尉有令讞而後不當讞者不為失師古曰假令讞訖其理不當所讞之人不為罪失欲令治獄者務先寛時廷尉上囚訪年繼母陳論殺訪年父訪年因殺陳依律殺母以大逆論帝疑之武帝時年十二為太子在旁帝命問之太子答曰夫繼母如母明不及母縁父之故比之於母今繼母無状手殺其父則下手之日母恩絶矣宜與殺人者同不宜與大逆論從之文帝時詔除收孥相坐法景帝時詔髙年鰥寡幼弱孕婦師侏儒有罪當鞫繫者頌繫之並詳見刑制門武帝時兒寛為廷尉史以古法義决疑獄張湯甚重之時上方向文學湯决大獄欲傳古義乃請博士弟子扵尚書春秋補廷尉湯雖文深意忌不專平然得此聲譽而深刻吏多為爪牙用者依於文學之士宣帝時置廷平季秋後請讞時上常幸宣室齋居而决事詳見刑制門成帝詔中二千石二千石博士及明習律令者議减死刑及可蠲除約省者令較然易知條奏詳見刑制門沛縣有富家翁貲三千餘萬小婦子年纔數嵗頃失其母父無親近其女不賢翁病困思念恐争其財兒必不全因呼族人為遺書令悉以財屬女但遺一劔云兒年十五以還付之其後果不肯與兒詣郡自言求劔時太守何武得其條辭因録女及壻省其手書顧謂掾史曰女性强梁婿復貪鄙畏殘害其兒又計小兒得此財不能全䕶故且與女實寄之耳不當以劔與之夫劔者所以决斷限年十五者智力足以自居度此女壻必不復還其劔當關縣官縣官或能証察得見申展此凡庸何能思慮𢎞遠如是哉悉取財以與子曰敝女惡壻温飽十嵗亦以幸矣論者大服武薛宣為丞相時弟循為臨菑令後母常隨循居官宣迎後母循不遣後母病死循去官持服宣謂循三年服少能行之者兄弟相駮不可駮者執意不同猶如色之間雜循遂竟服繇是兄弟不和後宣免丞相加特進久之哀帝即位博士申咸給事中亦東海人毁宣不供養行喪服薄於骨肉前以不忠孝免不宜復封列侯在朝省宣子况為右曹侍郎數聞其語賕客楊明欽令創咸面目使不居位創謂傷之㑹司𨽻缺况恐咸為之遂令明欽遮斫咸宫門外斷鼻唇身八創事下有司議御史中丞衆等議史失衆姓奏曰况朝臣父故宰相封列侯不相勅承教化而骨肉相疑咸受循言以謗毁宣咸所言皆宣行迹衆人所共見公家所宜聞况知咸給事中恐為司𨽻舉奏宣而公令明等廹切宫闕要遮創戮近臣扵大道人衆中欲以鬲塞聰明杜絶論議之端鬲與隔同杜塞也桀黠無所畏忌萬衆讙譁流聞四方不與凡人忿怒争鬬同臣聞敬近臣為近主也禮下公門式路馬過公門則下車見路馬則撫式蓋崇敬也式車前横木居處畜産且猶敬之春秋之義意惡功遂不免於誅遂成也言舉意不善雖成功猶加誅上浸之原不可長也浸近也傷戮大臣有所逼近也浸亦作侵犯也其義兩通長音竹兩反况首為惡明手傷功意俱惡手傷人為功使人傷人為意皆大不敬明當以重論及况皆棄市廷尉直駮議曰律曰以刃傷人完為城旦其賊加罪一等與謀者同罪詔書無以詆欺成罪詆毁也丁禮反傳曰遇人不以義而見疻者與疻人之罪鈞惡不直也以杖手毆擊破其皮腫起青黒傷無創瘢者律謂之疻痏遇人不以義為不直雖見毆罪同毆也疻音枳痏音鮪咸厚善循而數稱宣過惡流聞不可謂直言咸為循而毁宣是不義而不正况以故謀傷咸計謀已定後聞置司𨽻因前謀而趣明趣讀曰促非以恐咸為司𨽻故造謀也本争私變雖扵掖門外傷咸道中與凡人争鬬無異殺人者死傷人者刑古今之通道三代所不易也孔子曰必也正名乎名不正則言不順至扵刑罰不中而人無所措手足措置也今以况為首惡明手傷為大不敬公私無差春秋之義原心定罪原謂尋其本原况以父見謗發忿怒無他大惡加詆欺輯小過成大辟䧟死刑違明詔恐非法意不可施行聖王不以怒増刑明當以賊傷人不直以其受財况與謀者皆爵减完為城旦以其身有爵級故得减罪而為完也况身及同謀之人皆從此科帝以問公卿丞相孔光大司空師丹以中丞議是自将軍以下至博士議郎皆是廷尉况竟減死罪一等徙燉煌宣坐免為庻人歸故鄉定陵侯淳于長坐大逆誅小妻乃始等六人皆以事未發覺時棄去或更嫁及長事發丞相方進大司空何武議曰令犯法者各以發時律令論之此其引令條之文也發時謂其犯法之時明有所記也志記長犯大逆時乃始等見為妻已有當坐之罪與身犯法無異後乃棄去於法無以解解免也請論廷尉孔光駮議以為大逆無道父母妻子同産無少長皆棄市欲懲後犯法者也懲創止之夫婦之道有義則合無義則離長自未知當罪大逆之法而乃始等棄去或更嫁義已絶而欲以為長妻論殺之名不正不當坐有詔光議是王尊為美陽令美陽女子告假子以我為妻妬笞我尊驗問辭伏曰律無妻母之法聖人所不忍書此經所謂造獄者也言非常刑名造殺戮之法乃使騎吏五人射殺之哀帝時廷尉梁祖與丞相長史御史中丞及五二千石雜治東平王雲獄雲為息夫躬等誣告不道事時冬月未盡二旬而祖心疑雲寃獄有飾辭奏欲傳之長安傳謂移其事也更下公卿覆治天子以為祖等皆見上體不平外内顧望操持兩心幸雲踰冬無討賊疾惡主讎之意制詔免祖等皆為庻人後數月大赦丞相王嘉薦祖等明習治獄又封還益董賢户事上發怒召嘉詣尚書責問光禄大夫孔光等希㫖劾嘉迷國罔上不道請召嘉詣廷尉詔獄嘉竟死獄中永信少府猛等十人以為聖王斷獄必先原心定罪探意立情故死者不抱恨而入地生者不銜怨而受罪明主躬聖徳重大臣刑辟廣延有司議欲使海内咸服嘉罪名雖應法聖王之扵大臣在輿為下御坐則起師古曰解在翟方進傳疾病視之無數死則臨弔之廢宗廟之祭進之以禮退之以義誄之以行師古曰言大臣之死積累其行而為誄也誄者累徳行之文按嘉本以祖等為罪罪惡雖著大臣括髪闗械祼躬就笞師古曰括結也闗貫也祼露也非所以重國褒宗廟也今春月寒氣錯繆露霜數降宜示天下以寛和臣等不知大義唯陛下察焉有詔假謁者節召丞相入廷尉詔獄使者既到府掾史涕泣共和藥進嘉嘉不肯服主簿曰将相不對理陳寃相踵以為故事師古曰踵由躡也君侯宜引决師古曰令自裁也使者危坐府門上師古曰以逼促嘉也主簿復前進藥嘉引藥杯以擊地謂官屬曰丞相幸得偹位三公奉職負國當伏刑都市以示萬衆丞相豈兒女子邪何謂咀藥而死師古曰咀嚼也音才汝反嘉遂装出見使者再拜受詔乗吏小車去蓋不冠随使者詣廷尉廷尉收嘉丞相新甫侯印綬縳嘉載致都􅊑詔獄上聞嘉生自詣吏大怒使将軍以下與二千石雜治吏詰問嘉嘉對曰按事者思得實竊見祖等前治東平王獄不以雲為不當死欲關公卿示重慎置驛馬傳囚執不得踰冬月誠不見其外内顧望阿附為雲驗復幸得䝉大赦祖等皆良善吏臣竊為國惜賢不私此三人獄吏曰茍如此則君何以為罪猶當有以負國不空入獄矣吏稍侵辱嘉嘉喟然卬天歎曰師古曰卬讀作仰幸得充偹宰相不能進賢退不肖以是負國死有餘責吏問賢不肖主名嘉曰賢故丞相孔光故大司空何武不能進惡髙安侯董賢父子佞邪亂朝而不能退罪當死死無所恨嘉繫獄二十餘日不食歐血而死後漢制治書侍御史二人𨕖明法律者為之凡天下諸讞疑事掌以法律當其是非明帝永平十四年楚王英以謀逆廢徙自殺時窮治楚獄遂至累年其辭語相連自京師親戚諸侯州郡豪傑及考案吏阿附坐死徙者以千數而繋獄者尚數千人顔忠王平辭引隧鄉侯耿建朗陵侯臧信濩澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時上怒甚吏皆惶恐諸所連及率一切䧟入無敢以情恕者侍御史寒朗心傷其寃試以建等物色獨問忠平而二人錯愕不能對朗知其詐乃上言建等無姦專為忠平所誣疑天下無辜類多如此帝曰即如是忠平何故引之對曰忠平自知所犯不道故多有虚引冀以自明帝曰即如是何不早奏對曰臣恐海内别有發其姦者帝怒曰吏持兩端促提下捶之左右方引去朗曰願一言而死帝曰誰與共為章對曰臣獨作之上曰何以不與三府議對曰臣自知當必族滅不敢多汚染人上曰何故族對曰臣考事一年不能窮盡姦状反為罪人訟寃故知當族滅然臣所以言者誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝㑹陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止扵身天下幸甚及其歸舍口雖不言而仰屋竊嘆莫不知其多寃無敢為陛下言者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄録囚徒理出千餘人時天旱即大雨馬后亦以楚獄多濫乗間為帝言之帝惻然感悟夜起彷徨由是多所降宥任城令汝南袁安遷楚郡太守到郡不入府先徃案楚王英獄事理其無明驗者條上出之府丞掾史皆叩頭争以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即報許得出者四百餘家肅宗初陳寵為尚書寵以帝新即位宜改前世苛俗廼上疏言宜隆先王之道蕩滌煩苛之法輕薄箠楚以奉天心帝納寵言詔有司絶鉆鑚諸惨酷之科解妖惡之禁除文致之請讞五十餘事定著扵令寵曾祖父咸成哀間以律令為尚書性仁恕常戒子孫曰為人議法當依於輕雖有百金之利慎無予人重比王莾時謝病收歛其家律令書文壁藏之寵明習法家少為郡吏辟司徒鮑昱府轉為辭曹掌天下獄訟其所平決無不厭服衆心撰辭訟比七卷决事科條皆以事類相從寵子忠為廷尉正司徒劉凱舉忠明習法律擢拜尚書忠自以世典刑法用心務在寛詳初父寵在廷尉上除漢法溢於甫刑者未施行忠畧依寵意為二十三條為决事比以省請讞之敝元和三年廷尉郭躬條諸重文可從輕者四十一事奏之事皆施行著於令明帝時奉車都尉竇固出擊匃奴騎都尉秦彭為副彭在别屯而輙以法斬人固奏彭專擅請誅之帝問郭躬曰軍征校尉一統扵督督謂大将彭無斧鉞何得殺人躬曰一統扵督謂在部曲也前漢書音義曰大将軍行有五部部有曲今彭專軍别将有異扵此兵事呼吸不容先闗督帥且漢制棨㦸即為斧鉞有衣之㦸曰棨帝從躬議又有兄弟共殺人者帝以兄不訓弟故報兄重報論也重死刑而减弟死中常侍孫章宣詔言兩報重尚書奏章矯制罪當腰斬帝問郭躬躬曰法令有故誤章傳令之謬於事為誤誤者於文則輕當罰金帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢詩小雅如砥貢賦平如矢賞罰均君子不逆詐且王法天刑不可以委曲生意帝善之躬父𢎞習小杜律前書杜周斷獄深刻子延年亦明法律對父故言小也太守寇恂以𢎞為决曹掾斷獄至三十年用法平諸為𢎞所决者退無怨情郡内比之東海于公躬少傳父業講授徒衆常數百人後為郡吏辟公府元和初為廷尉躬家世掌法務在寛平及典理官决獄斷刑多依矜恕梁人取後妻後妻殺夫其子又殺之孔季彦返魯過梁梁相曰此子當以大逆論禮繼母如母是殺母也季彦曰若如母則與親母不等欲以義督之也昔文姜與殺魯桓春秋去其姜氏傳曰絶不為親禮也絶不為親即凡人爾且夫手殺重扵知情知情猶不得為親則此下手之時母名絶矣方之古義是子宜以非司宼而擅殺當之不得為殺母而論以逆也梁相從其言和帝即位初建初中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之自後因以為比是時遂定其議以為輕侮法張敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫春秋之義子不報讎非子也而法令不為之减者以相殺路不可開故也今托義者得减妄殺者有差使執憲之吏得設巧詐非所以遵在醜不争之義又輕侮之比寖以繁滋至有四五百科轉相顧望彌復増甚難以垂之萬載可下三公廷尉蠲除其弊議寝不省敏復上疏曰臣伏見孔子垂經典臯陶造法律原其本意皆欲禁民為非也未曉輕侮之法将以何禁必不能使不相輕侮而更開相殺之路執憲之吏復容其姦枉願陛下考尋利害廣令平議和帝從之永元十六年詔一切囚徒於法疑者勿决以奉勅令安帝即位鄧太后臨朝初肅宗時斷獄皆以冬至之前自後論者互多駮異太后詔公卿以下㑹議魯恭議曰夫王者之作因時為法孝章皇帝深惟古人之道助三正之微定律著令冀承天心順物性命以致時雍然從變故以來年嵗不熟糓價常貴人不寧安小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正一夫吁嗟王道為虧况扵衆乎易十二月君子以議獄緩死可令疑罪使詳其法大辟之科盡冬月乃斷其立春在十二月中者勿以報囚如故事後卒施行吳祐為膠東太守安邱男子母邱長與母俱行市道遇醉客辱其母長殺之而亡捕得之祐呼長謂曰子母見辱人情所恥然孝子忿必慮難動不累親今若背親逞怒白日殺人赦若非義刑若不忍将如之何長以械自繫在手曰械曰國家制法囚身犯之明府雖加哀矜恩無所施祐問長有妻子乎對曰有妻未有子即移安邱逮長妻妻到觧其桎梏使同㝛獄中妻遂懐孕至冬盡行刑長泣謂母曰負母應死當何以報吳君乎乃齧指而吞之含血言曰妻若生子名之吳生因繯而死謂以繩為繯投之而縊按此即所謂遭侮辱而殺人者肅宗時貰其死刑和帝時除之故吳祐疑此獄且容其投繯以死而不明正典刑蓋猶在可議之列也獻帝建安時應劭刪定律令見刑制門初安帝時河間人尹次頴川人史玉皆坐殺人當死次兄初及玉母軍並詣官曹求代其命因縊而物故尚書陳忠以為罪疑從輕議活次玉劭後追駮之曰夫時化則刑重時亂則刑輕書曰刑罰世輕世重此之謂也今次玉以清時逞其私憾阻兵安忍僵屍道路朝恩在寛幸至冬獄而初軍愚狷妄自投斃昔召忽親死子糾之難而孔子曰經扵溝瀆人莫之知鼂氏之父非錯刻峻自隕其命班固亦云不如趙母指括以全其宗傳曰僕妾感慨而致死者非能義勇顧無慮耳言無計慮夫刑罰威獄以類天之震燿殺戮也温慈和恵以放天之生殖長育也故春一草枯則為災秋一木華亦為異今殺無罪之初軍而活當死之次玉其為枯華不亦然乎陳忠不詳制刑之本而信一時之人遂廣引八議求生之端夫親故賢能功貴勤賔豈有次玉當罪之科哉若乃小大以情原心定罪此為求生非謂代死可以生也敗法亂政悔其可追凡有駮議三十篇皆此類魏文帝時有大女劉朱檛陟𤓰反子婦酷暴前後三婦自殺論朱减死輸作尚方因是下怨毒殺人减死之令按所謂怨毒殺人者蓋行兇之人遭被殺之人苦毒故不勝其怨憤起而殺之今劉朱之事史不言子婦有悖逆其姑之跡則非怨毒殺人也要之姑檛其婦婦因檛而自殺非姑手殺之則可以免死但以為怨毒則史文不明未見其可坐以此律耳齊王時司馬師輔政犯大逆者誅及已出之女母邱儉之誅其子甸妻荀氏應坐死族兄顗通表乞其命詔聽離婚荀氏所生女芝為頴川太守劉子元妻亦坐死以懐姙繋獄荀氏辭詣司𨽻校尉何曽乞沒為官婢以贖芝命曽哀之使主簿程咸上議曰臣以為女人有三從之義無自專之道出適他族降父母之服所以明外成之節也而父母有罪則追刑夫黨見誅又隨戮一人之身内外受辟女既産育則他族之母無辜受戮傷孝子之心且男既不得罪扵他族而女獨嬰戮扵二門臣以為在室宜從父之誅既醮可隨夫之罰扵是詔改定律令晋惠帝之時政出羣小每有疑獄各出私情刑法不定獄訟繁滋尚書裴頠劉頌上疏論之見刑制門元帝承制江左時主簿熊遠上書以為軍興以來處事不用律令競作新意臨事立制朝作夕改至扵主者不敢任法每輙開諮非為政之體也愚謂凡為駮議者皆當引律令經傳不得直以情言無所依凖以虧舊典若開塞隨宜權道制物此是人君之所得行非臣子所宜專用也成帝時廷尉奏殿中帳施吏邵廣盗官幔二帳合布三十疋有司正刑棄市廣二子宗年十三雲年十一黄幡撾登聞鼓乞恩辭求自没為奚官奴以贖父命尚書官朱映議以為天下之人無子者少一事遂行便成永制懼死罪之刑於此而弛時議者以廣為鉗徒二兒没入既足以懲艾使百姓知父子之道聖朝有垂恩之仁可特聽减廣死罪為五嵗刑宗等付奚官為奴而不為永制尚書右丞范堅駮之曰自淳朴澆散刑辟乃作刑之所以止刑殺之所以止殺雖時有赦過宥罪議獄緩死未有行不忍而輕易典刑者也且既許宗等宥廣死罪若復有宗比而不求贖父者豈得不擯絶人倫同之禽獸邪按主者今奏云唯聽宗等而不為永制臣以為王者之作動關盛衰嚬笑之間尚慎所加今之所以宥廣正以宗等耳人之愛父誰不如宗今既許宗之請将來訴者何獨匪人特聽之意未見其益不以為例交興怨讟此為施一恩扵今而開萬怨於後也從之宋文帝元嘉七年剡縣人黄初妻趙打息載妻王死後遇赦王有父母及息男稱法徙趙二千里司徒左長史傅隆議曰禮律之興蓋本自然求之情理非從天墮非從地出父子至親分形同氣稱之於載即載之扵趙雖云三代合之一體未有分者也稱雖創巨痛深固無讎祖之義故古人不以父命辭王父命也若云稱可殺趙當何以處載若父子孫祖互相殘戮懼非先王明罰臯陶立法之本㫖也向使石厚之子日磾之孫砥鋒挺鍔不與二祖同戴天日則石碏秺侯何得純臣於國孝義扵家矣舊令云殺人父母徙二千里外不施父子孫祖明矣趙當避王朞功千里外耳令云凡流徙者同籍親近欲相隨聽之此又大通情理因親以教爱者也趙既流移載為人子何得不從載行而稱不行豈名敎所許趙雖内愧終身沈痛沒齒孫祖之義不得絶事理固然孝武於元嘉中出鎮歴陽沈亮行參征虜将軍事人有盜發冢者有罪所近村人與符伍遭刼不赴救同坐亮議曰尋發冢之情事止竊盗徒以侵亡犯死故同之嚴科夫穿掘之侣必銜枚以晦其迹刼掠之黨必讙呼以威其事故起兇赫者易應潜深密者難知且山原為無人之鄉邱壠非常塗所踐至扵防救不得比之村鄉督實劾名理與刼異則符伍之坐居宜降矣又結罰之科雖有同符之限而無逺近之斷若不域之以界則數歩之内與千里之外便應同罹其責防人之禁不可不慎夫止非之憲宜當其律愚謂相去百歩内赴告不時者一嵗刑自此以外差不及咎孔淵之大明中為尚書比部郎時安陸應城縣人張江陵與妻吳共罵母黄黄忿恨自縊死遇赦律文子殺傷毆父母梟首罵詈棄市婦謀殺夫之父母亦棄市遇赦免刑補兵江陵罵母母以之自裁重於傷毆若同殺科則疑重同毆傷及罵制則疑輕准制惟有傷於父母遇赦猶梟首無罵母致死遇赦之科淵之議曰夫題里逆心仁者不入名且惡之况乃人事故毆傷咒詛法所不原詈之致盡則理無可宥從輕葢疑失善求之文㫖非此之謂江陵雖遇赦恩故合梟首婦本以義愛非支屬黄之所恨情不在吳原死補兵有枉正法詔如淵之議吳興餘杭人薄道舉為刼刼制同籍周親補兵道舉從弟代公道生等並為大功親則應在補謫之例法以代公等母存為周親則子宜隨母補兵何承天議曰尋刼制同籍周親補兵大功不在此例婦人三從即嫁從夫夫死從子今道舉為刼若其叔尚在制應補謫妻子營居固其宜也但為刼之時叔父已殁代公道生並是從弟大功之親不合補謫今若以叔母為周親令代公隨母補兵既違大功不謫之制又失婦人三從之道由扵主者守周親之文不辨男女之異遠嫌畏負以至此疑懼非聖朝恤刑之㫖謂代公等母子並宜見原吳興武康縣人王延祖為刼父睦以告官新制凡刼身斬刑家人棄市睦既自告扵法有疑時尚書何叔度議曰設法止姦本扵情理一人為非闔門應刑所以罪及同産欲開其相告以出造惡之身睦父子之際容可悉共逃亡而割其天屬還相縳送螫毒在手解腕求全扵情可愍理亦宜宥使凶人不容扵家逃刑無所乃大絶根源也睦既糺送則餘人無應復告並合赦之沛郡相縣唐賜徃北村朱起母彭家飲酒還得病吐蠱蟲十餘枚臨死語妻張死後刳腹出病死後張手自破視五臟悉㸏碎郡縣以張忍行刳剖賜子副又不禁止事起赦前法不能决按律傷死人四嵗刑妻傷夫五嵗刑子不孝父母棄市並非科例三公郎劉勰議妻痛遵徃言兒識不及理考事原心非存忍害謂宜哀矜吏部尚書顧凱之議曰法移露尸猶為不道况在妻子而忍行凡人所不行不宜曲通小情當大理為斷謂副不孝張同不道詔如凱之議也梁武帝天監三年建康女子任提女坐誘口當死其子景慈對鞫辭云母寔行此是時法官虞僧虬啟稱按子之事親有隐無犯直躬證父仲尼為非景慈素無防閑之道死有明目之據䧟親極刑傷和損俗凡乞鞫不審降罪一等豈得避五嵗之刑忽死母之命景慈宜加罪詔流扵交州後魏太武制論刑者部主言状公車鞫而三都决之當死者定案奏聞帝親臨問無異辭怨言乃刑之諸州囚之大辟皆先讞報乃施行真君中以有司斷法不平詔諸疑獄皆付中書依經義論决孝文帝時吏民犯他法者帝率寛之疑罪奏讞多减死徙邊嵗以千計宣武帝景明中冀州人費羌皮母亡家貧無以葬賣七嵗女子與張廻為婢廻轉賣與梁之定而不言狀按律掠人和賣為奴婢者死廻故買羌皮女謀以轉賣依律處絞刑詔曰律稱和賣人者死謂兩人詐取他財羌皮賣女告廻稱良張廻利賤知良公買誠於律俱乖而各非詐然廻轉賣之日應有遲疑而决從真賣扵情固可處絞刑三公郎中崔鴻議曰按律賣子一嵗刑五服内親屬在尊長者死賣周親及妾與子婦者流蓋以天性難奪支屬易遺又尊卑不同故殊以死刑且買者於彼無天性支屬罪應一例明知是良决便真賣因此流漂家人不知追贖無蹤永沈賤𨽻按其罪状與掠無異太保髙陽王雍議曰檢廻所買保證明然處以和掠實為乖當律云謀殺人而發覺者流從五嵗刑已傷及殺而還蘓者死從者流已殺者斬從而加功者死不加者流詳沈賤之與身死流漂之與腐骨一存一亡為害孰甚然賊律殺人有首從之科盗人賣買無唱和差等謀殺之與和掠同是良人應為准例所以不引殺人减之降從強盗之一科縱令謀殺之與強盗俱得為例而以從輕其義安在又云知人掠盗之物而故買者以隨從論此明禁暴掠之源遏姦盗之本非謂買之扵親尊之手而同之於盗掠之愆竊謂五服相賣俱是良人所以容有等差之罪者明去掠盗理逺故從親踈為差級尊卑為輕重依律諸共犯罪者皆以發意為首明賣買之先有由魁末之坐宜定若羌皮不云賣則廻無買心則羌皮為首廻為從可也且既一為婢賣與不賣俱非良人何必以不賣而可原轉鬻為難恕張廻之愆宜鞭一百賣子葬親孝誠可美而表賞之議未加刑罰之科已及恐非敦風化之謂詔曰羌皮賣女葬母孝誠可嘉便可特原張廻雖買之扵父母不應轉賣可刑五嵗河東郡人李憐坐行毒藥按以死坐其母訴稱一身老更無周親例合上請檢籍不謬及憐母身亡州斷三年服終後乃行决主簿李陽駮曰按法例律諸犯罪若祖父母父母年七十以上無成人子孫旁無周親者具状上請流者鞭宫留飬其親終則從流不在原赦之例且憐既懐耽毒之心母在猶宜闔門投畀况今已死給假殯葬足示仁寛不合更延可依律處斬流其妻子詔從之神龜中蘭陵公主駙馬都尉劉輝坐與河隂縣人張智夀妹容妃陳慶和妹惠猛姦亂毆主傷胎遂逃門下處奏容妃惠猛各入死刑智夀慶和並以知情不加防限處以流坐詔曰容妃惠猛恕死髠鞭付宫餘如奏崔纂執曰伏見㫖募若獲輝者職人賞二階白身人聴出身進一階厮役免役奴婢為良按輝無叛逆之罪未可募同反者夫王者理天下不為喜怒増减不由親踈改易按鬪律祖父母父母忿怒以兵刃殺子孫者五嵗刑毆殺及愛憎而故殺者各加一等雖王姬下降貴殊常妻然人婦之孕不得非子又依初平四年先朝舊格諸刑流及罪死者皆首末判定然後處决且事必因本若以輝逃避應便懸募未有捨其首罪而成其末愆按容妃等罪止姦私律處不越刑坐何得同宫掖之罪齊奚官之役按智夀口訴妹適人已生二女是他家之母他人之妻昔魏晉末除五族之刑有免子戮母之坐謂在室之女從父母之刑已醮之婦從夫家之戮律許周親相隐况姦私之醜豈得使同氣證之按律姦罪無相縁之坐不可借失輝之忿加兄弟之刑夫刑人扵市與衆棄之爵人於朝與衆共之明不私扵天下也右僕射㳺肇等奏如纂言詔曰輝悖法亂理罪不可縱厚賞徴募必冀擒獲容妃惠猛與輝私亂因此耽惑主致非常此而不誅将何懲肅智夀慶和初不防禁招引劉輝共成滛醜敗風穢化豈得同扵常人且古有造獄寕復一歸大理而尚書理本納言所屬弗䆒悖法之淺深不詳損化之多少有孤執憲殊乖任寄崔纂可免郎都坐尚書悉奪禄一秩隋文帝以用律者多致䮞駮罪同論異詔諸州死罪不得便决悉移大理按覆事盡然後上取奏裁仁夀十五年制死罪者三奏而後决唐制天下疑獄讞大理寺不能决尚書省衆議之録可為法者送祕書省奏報諸疑獄法官執見不同者得為異議不得過三太宗即位其年九月武德九年未改元盛開選舉或有詐為資䕃者上令自首不首者死俄有詐偽事洩大理少卿戴胄斷流上曰朕下敕不首者死今斷流是示天下以不信卿欲賣獄乎胄曰陛下當即殺之非臣所及既付所司臣不敢虧法上曰卿自守法而令我失信邪胄曰法者國之所以布大信扵天下言者當時喜怒之所發耳陛下發一朝之忿而許殺之既而不可而寘之扵流此乃忍小忿而存大信若順忿違信臣竊為陛下惜之上曰法有所失公能正之朕何憂也貞觀元年同州人房任統軍於岷州以謀反伏誅任兄強從坐當死舊條兄弟分後䕃不相及連坐俱死祖坐罪死孫配流帝令百官詳議房元齡等定議曰按禮孫為王父尸按令祖有䕃孫之義然則祖孫親重而兄弟屬輕應重反流合輕反死據禮論情深未為愜請定律祖孫與兄弟縁坐俱配流其以惡言犯法不能為害者情状稍輕兄弟免死配流為允從之帝欲止姦貪遣人以財物試之有司門令史受饋絹一疋上怒将殺之民部尚書裴矩諫曰此人受賂誠合重誅但陛下以物試之即行枉法所謂䧟人扵罪恐非導徳齊禮之義上納其言二年大理少卿胡演進每月囚帳上覽焉問曰其間罪亦有情可矜容者皆以律斷對曰原情宥罪非臣下所敢上謂侍臣曰古人云鬻棺者欲嵗之疫匪欲害人利於售棺故爾今法司覆理一獄心求深刻欲成其考今作何法得使平允王珪奏曰但選良善平恕人斷獄允當者賞之即姦偽自息上善之五年河内人李好徳坐妖言下獄大理丞張藴古以為好徳病狂瞀法不當坐治書侍御史權萬紀劾蘊古相州人好徳兄厚徳方為相州刺史故藴古奏不以實太宗怒遽斬藴古既而大悔詔死刑雖令即决皆三覆奏乆之謂羣臣曰死者不可復生決囚雖三覆奏而頃刻之間何暇思慮自今二日五覆奏决日尚食勿進酒肉教坊太常輟教習諸州死罪三覆奏其日亦蔬食務合禮徹樂减膳之意然自藴古之死法官以失出為戒有失入者又不加罪自是吏法稍宻帝以問大理卿劉德威對曰律失入减三等失出减五等今失入無辜而失出為大罪故吏皆深文帝矍然遂命失出入者皆如律自此吏亦持平十八年九月茂州童子張仲文忽自稱天子口署其流輩數人為官司大理以為指斥乗輿雖㑹赦猶斬太常卿攝刑部尚書韋挺奏仲文所犯止當妖言今既㑹赦准法免死上怒挺曰去十五年懐州人吳至浪入先置鈎陳口稱天子大理刑部皆言指斥乗輿咸斷處斬今仲文稱妖乃同罪異罰卿作福扵下而歸虐扵上邪挺拜謝趨退自是憲司不敢以聞數日刑部尚書張亮復奏仲文請依前以妖言論上謂亮曰韋挺不識刑典以重為輕朕當時怪其所執不為處斷卿今日復為執奏不過欲自取剛正之名耳曲法要名朕所不取亮黙然就列上因謂之曰爾無恨色而我有猜心夫人君含容屈在於我可申君所請屈我所見其仲文宜處以妖言帝嘗因録囚謂侍臣曰反逆有二興師動衆一也惡言犯法二也輕重固異而鈞謂之反連坐皆死豈定法邪文獻通考卷一百六十九
