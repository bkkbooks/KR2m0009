body:
  text: 文獻通考卷六鄱陽馬端臨貴與著田賦考六水利田魏史起引漳水溉鄴魏襄王時史起為鄴令起曰魏氏之行田也以百畝賦田之法一夫百畝鄴獨二百畝是田惡也漳水在其旁西門豹不知用是不知也於是乃引漳水溉鄴以富魏之河內民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻粱秦開鄭國渠韓欲疲秦人使毋東伐乃使水工鄭國間説秦令開涇水自中山西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間然渠成亦秦之利也乃使卒就渠渠成用溉注填閼之水溉舄鹵之地四萬餘頃收皆畝一鍾於是關中為沃野無凶年秦以富強名曰鄭國渠秦李冰開蜀渠秦平天下以李冰為蜀守冰壅江水作堋部朋反穿二江成都中雙過郡下以通舟船因以灌溉諸郡於是蜀沃野千里號為陸海公非劉氏七門廟記曰豫為廬州從事始以事至舒城觀所謂七門三堰者問於居人其田溉幾何對曰凡二萬頃考於圖書則漢羮頡侯信始基而魏揚州刺史劉馥實修其廢昔先王之典有功及民則祀之若信者可謂有功矣然吾恨史策之有遺而憐舒人之不忘其思也昔高帝之起宗室昆弟之有材能者賈以征伐顯交以出入傳命謹信為功此二者皆裂地為王連城數十代王喜以棄國見省而子濞亦用力戰王吳獨信區區僅得封侯而能勤心於民以興萬世之利而愛惠豈與賈濞相侔哉夫攻城野戰滅國屠邑是二三子之所謂能能殺人者也與夫闢地墾土使數十萬之民世世無飢餒之患所謂善養人者於以相譬猶天地之懸絶也然賈濞以功自名信不見録豈殺人易以快意養人不見形象哉然彼賈濞之死泯無聞久矣而信至今民猶思之按此漢初之事史所不載然溉田二萬頃則其功豈下於李冰文翁邪愚讀公非集表而出之以補遺軼漢文帝以文翁為蜀郡太守煎㳛羊朱反口溉灌繁田千七百頃人獲其饒武帝開渭渠龍首渠白渠元光中大司農鄭當時言引渭穿渠起長安並南山下至河三百餘里渠下民田萬餘頃又可得以溉田益肥關中之地得穀天子以為然令齊水工徐伯表巡行表記之悉發卒數萬人穿漕渠三歲而通渠下民頗得以溉田矣其後河東守番係請穿渠引汾溉皮氏汾陰下引河溉汾陰蒲坂下皮氏今龍門縣地屬絳郡汾陰今寶鼎縣地蒲坂今河東縣地並屬河東郡度可得五千頃五千頃故盡河壖棄地民茭牧其中耳今溉田之度可得穀二百萬石以上天子以為然發卒數萬人作渠田數歲河移徙渠不利則田者不能常種久之河東渠田廢與越人令少府以為稍入時越人有徙者以田與之其租稅入少府也稍漸也其入未多故謂之稍其後莊熊羆言臨晉民即今馮翊縣願穿洛以溉重泉以東萬餘頃重泉在今馮翊郡界今有乾坑即熊羆之所穿渠故惡地誠得水可令畝十石於是為發卒萬餘人穿渠自徴音懲引洛水至商顔下徴在馮翊郡即今郡之澄城縣商顔今馮翊縣界岸善崩洛水岸乃鑿井深者四十餘丈往往為井井下相通行水水頽以絶商顔下流曰頽東至山嶺十餘里間井渠之生自此始穿渠得龍骨故名曰龍首渠作之十餘歲渠頗通猶未得其饒是時用事者爭言水利朔方西河河西酒泉皆引河及川谷以溉田而關中輔渠靈軹引諸水汝南九江引淮東海引巨定澤名泰山下引汶水皆穿渠為溉田各萬餘頃他小渠披山通道不可勝言自鄭國渠起至元鼎六年百三十六歲而倪寬為左內史奏請穿鑿六輔渠在鄭國渠之裏今尚謂之輔渠亦曰六渠以益溉鄭國傍高仰之田素不得鄭國之溉灌者仰謂上向帝曰農天下之本也泉流灌寖所以育五穀也左右內史地名山川原甚衆細民未知其利故為通溝瀆畜陂澤所以備旱也今內史稻田租挈重不與郡同租挈收田租之約令郡謂四方諸郡其議減令吏民免農盡地利平徭行水勿使失時平徭者均齊渠堰之力役謂俱得水之利後十六歲趙中大夫白公此時無公爵蓋相呼尊老之稱也復奏穿渠引涇水首起谷口尾入櫟音藥陽谷口今雲陽縣治谷是也注渭中袤二百里溉田四千五百餘頃因名曰白渠民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉鍤為雲決渠為雨鍤鍬涇水一石其泥數斗且溉且糞長我禾黍水停淤泥可以當糞衣食京師億萬之口此兩渠之饒也自河決瓠子後二十餘歲歲數不登而梁楚尤甚天子既封禪巡祭山川其明年旱乾封少雨乃發卒塞瓠子決築宫其上名宣房宫而道河北行二渠復禹舊迹梁楚乃無水災是後用事者爭言水利朔方西河河西酒泉皆引河及川谷以溉田而關中輔渠靈軹輔渠倪寬所穿引堵水汝南九江引淮東海引巨定太山下引汶水皆穿渠為溉田各萬餘頃他小渠披山通道者不可勝言然其著者在宣房元帝時召信臣造鉗盧陂建昭中召信臣為南陽太守於穰縣理南六十里造鉗盧陂纍石為堤傍開六石門以節水勢澤中有鉗盧王池因以為名用廣溉灌歲歲增多至二萬頃人得其利及後漢杜詩為太守復修其業時歌之曰前有召父後有杜母息夫躬傳躬言秦開鄭國渠以富國強兵今為京師土地肥饒可度地勢水泉灌溉之利天子使躬持節領護三輔都水躬上表欲穿長安城引漕注太倉下以省轉輸議不可成乃止翟方進傳汝南有鴻隙大陂郡以為饒成帝時關東數水陂溢為害方進為相與御史大夫孔光共遣掾行視以為決去陂水其地肥美省隄防費而無水憂遂奏罷之及翟氏滅鄉曲歸惡言方進請陂下良田不得而奏罷陂云王莽時常枯旱郡中追怨方進童謠曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰云者兩黃鵠後漢章帝建初中王景為廬江太守郡部安豐縣有楚孫叔敖所起芍陂先是荒廢景重修之境內豐給陂徑百里灌田萬頃在今安豐縣界順帝永和五年馬臻為會稽太守始立鏡湖築塘周回三百十里灌田九千頃至今人獲其利晉武帝咸寧元年東南水災杜預請決壞諸陂從之詔曰今年霖雨過差又有蟲災潁川襄城自春以來略不下種深以為慮主者何以為百姓計當陽侯杜預上疏曰臣輒思惟今者水災東南特劇非但五穀不收居業并損下田所在渟汙高地皆多墝塉百姓困窮方在來年雖詔書切告長吏二千石為之設計而不廓開大制定其趣舍之宜恐徒文具所益蓋薄當今秋夏蔬食之時而百姓已有不贍前至冬春野無青草則必指仰官穀以為生命此乃一方之大事不可不早為思慮臣愚謂既以水為田當恃魚菜螺蚌而洪陂泛濫貧弱者終不能得今者宜大壞兖及荆河州東界兖州東界今濟陽濟陰東平魯郡之間荆河州東界今汝南汝陰譙郡之間也諸陂隨其所歸而宣導之令飢者盡得水産之饒百姓不出境界之內朝暮野食此目下日給之益也水去之後填淤之田畝收數鍾至春大種五穀五穀必豐此又明年之益也杜預又言諸欲修水田者皆以火耕水耨為便非不爾也然此施於新田草萊與百姓居相絶離者耳往者東南草創人稀故得火田之利頃來戶口日增而陂堰歲決良田變生蒲葦人居沮澤之際水陸失宜放牧絶種樹木立枯皆陂之害也陂多則土薄水淺潦不下潤故每有水雨輒復橫流延及陸田言者不思其故因云此土不可陸種臣計漢之戶口以驗今之陂處皆陸業也其或有舊堰則堅完修固非今所謂當為人害也臣見尚書胡威啓宜壞陂其言懇至臣又見宋侯相應遵上便宜求壞泗陂徙運道時下都督度支共處當各據所見不從遵言臣按遵上事運道東詣壽春有舊渠可不由泗陂出泗陂在彼地界壞地凡萬三千餘頃傷敗成業遵縣領應佃三千六百口可謂至少而猶患地狹不足肆力此皆水之為害也當所共恤而都督度支方復執異非所見之難直以不同害理也人心所見既不同利害之情又有異軍家之與郡縣士大夫之與百姓其意莫有同者此皆偏其利以忘其害此理之所以未盡而事之所以多患也臣又按荆河州界中度支所領佃者州郡大軍雜士凡用水田七千五百餘頃計三年之儲不過二萬餘頃以常理言之無為多積無用之水况於今者水潦甕溢大為災害臣以為宜發明詔敕刺史二千石漢氏舊堰及山谷私家小陂皆當修繕以積水其諸魏氏以來所造立及諸因雨決溢蒲葦馬腸陂之類皆決瀝之長吏二千石躬先勸戒諸食力之人並一時附功令比及水凍得粗枯涸其所修功實之人皆以畀之其舊陂堰溝渠當有所補塞者此尋求微迹一如漢時故事早為部分列上須冬間東南休兵交代各留一月以佐之夫川瀆有長流地形有定體漢氏居人衆多猶以為患今因其所患而宣瀉之迹古事以明近大理昭然可坐而論得臣不勝愚意常竊謂最是今日之實益也朝廷從之按水利之説三代無有也蓋井田之行方井之地廣四尺謂之溝十里之成廣八尺謂之洫百里之同廣二尋謂之澮夫自四尺之溝積而至於二尋之澮則夫一同之間而捐膏腴之地以為溝洫之制捐賦稅之入以治溝洫之利蓋不少矣是以能時其蓄泄以備水旱子産相鄭猶必使田有封洫蓋謂此也自秦人開阡陌廢井田任民所耕不計多少而溝洫之制大壞後之智者遂因川澤之勢引水以溉田而水利之説興焉魏起鄭白之徒以此為功然水就下者也陂而遏之利於旱歲不幸霪潦則其害有不可勝言者此翟子威杜元凱所以決壞隄防以紓水患也張闓音開為晉陵內史時所部四縣並以旱失田闓乃立曲阿新豐塘今丹陽郡田八百餘頃每歲豐稔宋文帝時劉義欣為荆河刺史治夀陽夀春芍陂良田萬頃隄堰久壞秋夏常苦旱乃因舊溝引淠水在汝南入陂伐木開溱水得通涇由是豐稔後魏刁雍為薄骨律鎮將至鎮上表曰富平西三十里薄骨律鎮今靈武郡富平今回樂縣有艾山南北二十六里東西四十五里鑿以通河似禹舊迹其兩岸作溉田大渠廣十餘步山南引水入此渠中計昔時高於河水不過一丈河水激急沙土漂流今日此渠高於河水二丈三尺又河水浸射往往崩頽渠既高懸水不得上雖復諸處按舊引水水亦難求今艾山北中有洲渚水分為二西河小狹水廣百四十步臣今請入來年正月於河西高渠之北八里分河之下五里平鑿渠廣十五步深五尺築其兩岸令高一丈北行四十里還入古之高渠即修高渠而北復八十里合百二十里大有良田計用四千人四十日功渠得成就所欲鑿新渠口河下五尺水不得入今求從小河東南岸斜斷到西北岸計長二百七十步廣十步高二尺絶岸小河二十日功計得成畢合計用功六十日小河之水盡入新渠水則充足溉官私田四萬餘頃旬日之間則水一遍水凡四溉穀得成實從之公私獲其利裴延俊為幽州刺史范陽郡有舊沈渠徑五十里漁陽燕郡有故戾諸堰廣袤三十里皆廢毁多時不復水旱為害延俊自度水形營造未幾而就溉田萬餘頃為利十倍唐武德七年同州治中雲得臣開渠自龍首引黃河溉田六十餘頃貞觀十一年揚州大都督府長史李襲稱以江都俗好商賈不事農業乃引雷陂水又築白城塘溉田八百餘頃百姓獲其利永徽六年雍州長史長孫祥奏言往日鄭白渠溉田四萬餘頃今為富商大賈競造碾磑堰遏費水太尉長孫無忌曰白渠水帶泥淤灌田益其肥美又渠水發源本高向下支分極衆若使流至同州則水饒足比為碾磑用水泄渠水隨入滑加以壅遏耗竭所以得利遂少於是遣祥等分檢渠上碾磑皆毁之至大歷中水田才得六千二百餘頃開元九年京兆少尹李元紘奏疏三輔諸渠王公之家緣渠立磑以害水田一切毁之百姓蒙利廣德二年戶部侍郎李栖筠等奏拆京城北白渠上王公寺觀碾磑七十餘所以廣水田之利計歲收粳稻三百萬石大歷十二年京兆尹黎幹開決鄭白二水支渠毁碾磑以便水利復秦漢水道建中三年宰相楊炎請於豐州置屯田發關輔人開陵陽渠詳見屯田門貞元八年嗣曹王臯為荆南節度觀察使先是江陵東北七十里有廢田旁漢古堤壞決凡二處每夏則為浸溢臯始命塞之廣良田五千頃畝收一鍾楚俗佻薄舊不鑿井悉飲陂澤臯乃令合錢鑿井人以為便元和八年孟簡為常州刺史開漕古孟瀆長四十里得沃壤四千餘頃十二月魏博觀察使田𢎞正奏準詔開衛州黎陽縣古黃河故道從鄭滑節使薛平之請也先是滑州多水災其城西去黃河止二里每夏雨漲溢則浸壞城郭水及羊馬城之半薛平詢諸將吏得古黃河道於衛州黎陽縣界遣從事裴𢎞泰以水患告於田𢎞正請開古河用分水力𢎞正遂與平皆以上聞詔許之乃於鄭滑兩郡徴促萬人鑿古河南北長十四里東西闊六十步深一丈七尺決舊河以注新河遂無水患焉十三年湖州刺史于頔復長城縣方山之西湖溉田三十頃長慶二年溫造為朗州刺史奏開復鄉渠九十七里溉田二千頃郡人利之名為右史渠至太和五年造復為河陽節度使奏浚懷州古渠枋口堰役功四萬溉濟源河內溫武陟四縣田五千頃長慶中白居易為杭州刺史浚錢塘湖周回三十里北有石涵南有筧凡放水溉田每減一寸可溉十五頃每一伏時可溉五十餘頃作湖石記言若隄防如法蓄泄及時則瀕湖千餘頃田無凶年矣周顯德三年以尚書司勳郎中何幼沖為開中渠堰使命於雍耀二州界疏涇水以溉田宋太宗皇帝淳化四年知雄州何承矩及臨濟令黃懋請於河北諸州置水利田興堰六百里置斗門灌溉詳見屯田門神宗熙寧元年遣使察農田水利程皓等八人充使王臨言保州塘濼以西可築隄植木凡十九里隄內可引水處即種稻水不及處並為方田又因出土作溝以限戎馬從之中書言諸州縣古迹陂塘異時皆畜水溉田民利數倍近歲多所湮廢詔諸路監司訪尋州縣可興復水利如能設法勸誘興修塘堰墟堤功利有實當議旌寵蘇軾上書論之略曰天下久平民物滋息四方遺利皆略盡矣今欲鑿空尋訪水利所謂即鹿無虞豈惟徒勞必大煩擾所在追集老少相視可否吏卒所過雞犬一空若非灼然難行必須且為興役何則沮格之罪重而誤興之過輕人多愛身勢必如此且古陂廢堰多為側近冒耕歲月既深已同永業茍欲興復必盡追收人心或搖甚非善政又有好訟之黨多怨之人妄言某處可作陂渠規壞所怨田産或指人舊物以為官陂冒佃之訟必倍今日臣不知朝廷本無一事何苦而行此哉熙寧四年御史劉摯言內臣程昉大理寺丞李宜之於河北開修漳河功力浩大朝廷既令權罷則利害姑置之朝廷又令總領淤田司事臣謹按程昉等將命興事初不以事之可實聞於朝伏恐生事興患未有窮已乞明布昉等罪狀重行貶竄王安石為昉辨甚力遂寢不報六年賜屯田員外郎侯叔獻等淤田各十頃叔獻等引河水淤田決清水於畿縣澶州間壞民田廬塜墓歲被其患他州縣淤田類如此朝廷不知也七年提舉河北常平等事韓宗師劾程昉導滹沱河水淤田而隄壞水溢廣害民稼欺罔十六罪詔昉分析王安石復為之辨明云原武等縣民因淤田侵壞廬舍墳墓又妨秋種相率詣闕訴使者聞之急責其令追呼將杖之民即繆曰詣闕謝耳使者因代為百姓謝淤田表遣吏詣鼓院投之狀有二百餘名但二吏來投安石喜上亦不知其妄也吕氏曰汴河乃京師之司命安石信小人之狂言謂決水淤田可以省漕食甚至河北塘濼乃北邊之設險而安石以塘濼為無益數欲廢之本朝恃河以捍虜恃汴以通食恃塘濼以安邊而安石乃於根本之地數出高竒之䇿以動之其罪大矣六年詔創水磑碾碓有妨灌溉民田者以違制論不以赦原沈括言浙西諸州水患久不疏障隄防川瀆皆湮廢之乞下司農貸官錢募民興役從之七年賜江寧府常平米五萬石修水利九年前相度淮南路水利劉瑾言體訪揚州江都縣古鹽河高郵縣陳公塘等湖天長縣白馬塘沛塘楚州寶應縣泥港射馬港山陽縣渡塘溝龍興浦淮陰縣青州澗宿州虹縣萬安湖小河壽州安豐縣芍陂等可興置古鹽萬安湖小河已令司農寺結絶欲令逐路轉運司選官覆案施行從之興修水利起熙寧三年至九年府界及諸路凡一萬七百九十三處為田三十六萬一千一百七十八頃有竒高宗紹興七年潭州守臣吕頤浩修復馬氏時龜塘田萬頃侍御史蕭振奏乞詔親民官各分委土豪共修陂塘水利縣滿任批書印歷量加旌賞興隆元年知紹興府吳芾乞浚會稽山隂諸暨縣舊湖以復水利及築蕭山縣海塘以限鹹潮從之又開掘鑑湖乾道二年詔漕臣王炎相視開掘浙西勢家新圍田謂草蕩荷蕩菱蕩及陂湖溪港岸際築塍畦圍裹耕種者所至令守倅縣令同共措置五年知明州張津奏乞開東錢湖瀦水灌田從之七年四川宣撫使王炎奏開興元府山河堰溉南鄭褒城田九十三萬三千畝有竒詔奬諭淳熙二年淮東總領錢良臣奏修復鎮江府練湖凡七十二源灌田百餘萬畝從之三年監察御史傅淇奏近臣僚奏陳圍田湮塞水道之害陛下復令監司守臣禁止圍裹此乃拔本塞源之要術然豪右之家未有無所憑依而肆意築圍者聞浙西諸縣江湖草蕩計畝納錢利其所入給據付之望條約諸縣毋得給據與官民戶及寺觀上曰此乃侵占之田今絶其源後去毋復此患可令漕司常平司察之寧宗嘉定七年令臨安府復西湖舊界至自嘉泰以後續租地假侵占湖面處盡行開拓仍盡蠲歲增租錢墟田水利江東水鄉隄河兩涯田其中謂之墟農家云墟者圍也內以圍田外以圍水蓋河高而田在水下沿隄通斗門每門疏港以溉田故有豐年而無水患紹興元年詔宣州太平州守臣修墟議修墟官賞罰詔修墟錢米及貸民種糧並於宣州常平義倉米撥借又詔建康新豐墟租米歲以三萬石為額墟四至相去皆五六十里有田九百五十餘頃近歲墾田不及三分之一至是始立額紹興二十三年詔以永豐墟賜秦檜檜死墟復歸有司乾道元年詔令淮西總領所撥付建康中收到子粒令項摏管非詔旨毋得擅用臣僚言秦檜既得永豐墟竭江東漕計修築隄岸自此水患及於宣池太平建康昨據總領所申通管田七百三十頃共理租二十一萬一千餘稱當年所收才及其半次年僅收十五之一假令歲收盡及元數不過米二萬餘石而四州歲有水患所失民租何翅十倍乞下江東轉運司相度本墟如害民者廣乞依浙西例開掘及免租戶積欠從之江東轉運司奏永豐墟自政和五年圍湖成田今五十餘載橫截水勢每遇泛漲衝決民墟為害非細雖營田千頃自開修至今可耕者止四百頃而損害數州民田失稅數倍欲將永豐墟廢掘瀦水其在側民墟不礙水道者如舊詔從之其後漕臣韓元吉言此墟初是百姓請佃後以賜蔡京又以賜韓世忠又以賜秦檜繼撥𨽻行宫今𨽻總所五十年間皆權臣大將之家又在御府其管莊多武夫健卒侵欺小民甚者剽掠舟船囊槖盜賊鄉民病之非墟田能病民也於是開掘之命遂寢乾道九年詔戶部侍郎葉衡核實寧國府太平州墟岸五月衡言寧國府惠民化成舊墟四十餘里新增築九里餘太平州黃州鎮福定墟周回四十餘里延福等五十四墟周回一百五十餘里包圍諸墟在內蕪湖縣墟岸大小不等周回總約二百九十餘里通當塗墟岸共約四百八十餘里並皆高濶壯實瀕水一岸種植榆栁足捍風濤詢之農民實為永利於是詔奬諭知寧國府汪徹言他墟無大害惟童墟最為民害只決此墟水勢且順從之湖田圍田紹興五年春二月寶文閣待制李光言明越之境皆有陂湖大抵湖高於田田又高於江海旱則放湖水溉田潦則決田水入海故不為災本朝慶歷嘉祐間始有盜湖為田者三司使切責漕臣甚嚴政和以來創為應奉始廢湖為田自是兩州之民歲被水旱之患壬子歲嘗取會餘姚上虞兩邑利害自廢湖以來每縣所得租課不過數千斛而所失民田常賦動以萬計遂先罷兩邑湖田其會稽之鑑湖鄞之廣德湖蕭山之湘湖等處尚多望詔漕臣訪問應明越湖田盡行廢罷其江東西墟田蘇秀圍田併遍下諸路監司守令條上詔諸路漕臣躬親相度以聞於朝二十三年諫議大夫史才言浙西民田最廣而平時無甚害者太湖之利也近年瀕湖之地多為軍下侵據纍土增高長堤彌望名曰壩田旱則據之以溉而民田不沾其利水則逺近泛濫不得入湖而民田盡沒望詔有司究治盡復太湖舊迹使軍民各安田疇均利從之按墟田湖田多起於政和以來其在浙間者𨽻應奉局其在江東者蔡京秦檜相繼得之大槩今之田昔之湖徒知湖中之水可涸以墾田而不知湖外之田將胥而為水也主其事者皆近幸權臣是以委鄰為壑利己困民皆不復問洓水記聞言王介甫欲興水利有獻言欲涸梁山泊可得良田萬頃者介甫然其説復以為恐無貯水之地劉貢甫言在其旁别穿一梁山泊則可以貯之矣介甫笑而止當時以為戲談今觀建康之永豐墟明越之湖田大率即涸梁山泊之策也沙田蘆場紹興二十八年詔戶部員外郎莫濛同浙西江東淮南漕臣趙子潚鄧根孫藎檢視逐路沙田蘆場先是言者謂江淮間沙田蘆場為人冒占歲失官課至多故以命濛等既而侍御史葉義問等言貧民受害乃詔沙田蘆場止為世家詭名冒占其三等以下戶勿一例根括尋詔官戶十頃民戶二十頃以上並增租餘如舊置提領官田所領之不𨽻戶部二十九年詔盡罷所增租文獻通考卷六
