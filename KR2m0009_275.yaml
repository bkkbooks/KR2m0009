body:
  text: 文獻通考卷二百七十五鄱陽馬端臨貴與著封建考十六唐諸王唐高祖受禪以天下未定廣封宗室以威天下皇從弟及姪年始孩童者數十人皆封為郡王太宗即位因舉屬籍問侍臣曰封宗子於天下便乎尚書右僕射封德彛對曰不便厯觀往古封王者今日最多兩漢以降唯封帝子及親兄弟若宗室疏逺者非有大功如周之郇滕如漢之賈澤並不得濫叨名器所以别親疏也先朝敦睦九族一切封王爵命既崇多給力役蓋以天下為私殊非至公馭物之道也太宗曰然朕理天下本為百姓非欲勞百姓以養巳之親也於是率以屬疏降爵唯有功者數人得王餘並封為縣公貞觀二年太宗以宇内晏清思以致理謂公卿曰朕欲使子孫長久社稷永固其理如何尚書右僕射宋國公蕭瑀對曰臣觀前代國祚所以長久者莫不封建諸侯以為磐石之固秦并六國罷侯置守二世而亡漢有天下參建藩屏年踰四百魏晉廢之不能永久封建之法實可遵行上然之始議永封列土之制禮部侍郎李百藥論曰周氏以鑒夏殷之長久遵黄唐之並建維城磐石深根固本雖王綱弛廢而枝榦相持故使逆節不生宗祀不絶秦氏背師古之訓棄先王之道剪華恃險罷侯置守子弟無尺土之邑兆庶罕共理之憂故一夫號澤七廟隳祀臣以為自古皇王君臨㝢内莫不受命上元飛名帝籙締搆遇興王之運殷憂屬啟聖之期雖魏武攜養之資漢高徒役之賤非止意有覬覦推之不能去也若其獄訟不歸菁華已竭雖帝堯之光被四表大舜之上齊七政非止情存揖讓守之亦不可固焉以放勲重華之德尚不能克昌厥後是知祚之長短必在天時政或盛衰有闗人事宗周卜世三十卜年七百雖淪胥之道斯極而文武之器猶在斯則龜鼎運祚巳懸之於杳㝠也至使南征不返東遷避逼禋祀如綫郊畿不守此乃陵夷之漸有累於封建焉暴秦運距閠餘數鍾百六受命之主德異禹湯繼世之君才非啟誦借使李斯王綰之輩咸開四履將閭子嬰之徒俱啟千乗豈能逆帝王之勃興抗龍顔之祚命者也然則得失成敗各有由焉而著述之家多守常轍莫不情忘今古理蔽澆淳欲以百王之季行三代之法天下五服之内盡封諸侯王畿千里之間俱為采地是則以結繩之化行虞夏之朝用象刑之典理劉曹之末鍥船求劍未見其可膠柱成文彌所多惑徒知問鼎請隧有懼霸王之師白馬素車無復藩籬之援不悟望夷之釁未甚羿浞之災復思髙貴之殃寧異申繒之酷此乃欽明昏亂自繫安危固非守宰公侯以成興廢且數代之後王室䆮微始自藩屏化為仇敵家殊俗國異政强凌弱衆暴寡疆埸彼此干戈侵伐狐駘之役女子盡髽崤陵之師隻輪不返斯蓋略舉一隅其餘不可勝數陸士衡方規規然云嗣王委其九鼎凶族據其大邑天下晏然以理待亂斯言之謬也而設官分職任賢使能以循良之才膺共理之寄刺舉分竹何代無人至使地或呈祥天不愛寳人稱父母政比神明曹元首方區區然稱與人共其樂者人必憂其憂與人同其安者人必拯其危豈容委以侯伯則同其安危任之牧宰則殊其憂樂何斯言之妄也封君列國藉慶門資忘先業之艱難輕自然之崇貴莫不代增淫虐時益驕侈離宫别館切漢凌雲或刑人力而將盡或召諸侯而共樂陳靈則君臣悖禮共侮徴舒衞宣則父子聚麀終誅壽朔乃云為已思理豈若是乎内外羣臣選自朝廷擢士庶以任之澄水鏡以鑒之年勞優其階品考績明其黜陟爵非代及用賢之路斯廣人無定主附下之情不固此乃愚智所辨安可惑哉至如滅國殺君亂常干紀春秋二百年間略無寧嵗次睢咸秩遂用玉帛之君魯道有蕩每等衣裳之㑹縱使西漢哀平之際東漢桓靈之時下吏淫暴必不至此為政之理可以一言蔽焉陛下獨照宸衷永懷前古將復五等而修舊制建萬國而親諸侯竊以漢魏以還餘風之弊未盡勲華既往至公之道斯革請待琢琱成朴以質代文刑措之教一行登封之禮云畢然後定疆理之制議山河之賞未為晚也中書侍郎顔師古論封建表曰伏聞前年陛下親發聖慮特降明勅博問卿士議欲封建既合事宜實惟理要然而議者不一各執異端或欲追法殷周逺遵上古天下之地盡為封國庶姓羣官皆錫茅社或云凋弊之後人稀土曠封建之事普未可行此皆不臻至理兩失其𠂻臣愚以為當今之要莫不量其逺近分置王國均其户邑强弱相濟畫野分疆不得過大間以州縣雜錯而居互相維持永無傾奪使各守其境而不能為非協力同心則足扶京室陛下然後分命諸子各就封之為置官僚皆一省選用法令之外不得擅作威刑朝貢禮儀具為條式一定此制萬代永久則狂狡絶暴慢之心本朝無怵惕之慮特進魏徴議曰臣聞三代之利建藩屏保乂皇家兩漢之大啓山河同奬王室故楚國不恭齊桓有召陵之舉諸呂搆難朱虚奮北軍之謀九鼎危而復安諸侯慠而還肅比夫秦之孤立子弟為匹夫魏氏虚名藩扞若囹圄豈可同年而語哉至於同憂共樂之談百足不僵之義曹冏六代陸機五等論之詳矣陛下發明詔封五等事雖盡善時即未遑何也自隋氏亂離百殃俱起黎元塗炭十不一存始䝉敷至仁以流元澤沐春風而霑夏雨一朝棄之為諸侯之隸衆心未定或致逃亡其未可一也既立諸侯當建社廟禮樂文物儀衞左右頓闕則理必不安粗修則事有未暇其未可二也大夫卿士咸資禄俸薄賦則官府困窮厚斂則人不堪命其未可三也王畿千里地税不多至於貢賦所資在於侯甸之外今若並為國邑京師府藏必虛諸侯朝宗無所取給其未可四也今燕秦趙代俱帶蕃夷黠羌旅拒匈奴未㓕追兵内地逺赴邊庭不堪其勞將有他變難安易動悔或不追其不可五也原夫聖人舉事貴在相時時或未可理資通變敢進芻蕘之議惟明主擇焉六年監察御史馬周上疏曰伏惟詔書令宗室勲賢作鎮部貽厥子孫嗣守其政非有大故則無黜免臣竊惟陛下封之者誠愛之重之欲其允裔承守而與國無疆也臣以為如詔㫖者陛下思所以安存之富貴之然後使其為世官也何則以堯舜之父而有朱均之子倘有孩童嗣職萬一驕愚則兆庶被其殃而國家受其敗正欲絶之則子文之理尤在正欲留之而欒黶之惡已彰與其毒害於見存之百姓則寧使割恩於已亡之一臣明矣則向所謂愛之者乃適所以傷之也臣謂宜賦以茅土疇其戸邑必有材行隨器方授則雖其翰翮非强亦可以獲免尤累昔漢光武不任功臣以吏事所以終全其代者良得其術也願陛下深思其宜使夫得奉大恩而子孫終其福禄也十一年詔曰設官司以制海内建藩屏以輔王室莫不明其典章義存於致理崇其賢戚志在於無疆者也今採按部之嘉名參建侯之舊制共理之職重矣分土之實存矣已有詔書存其至理繼世垂範貽其後昆維城作固同符前列荆州都督荆王元景凉州都督漢王元昌徐州都督徐王元禮潞州都督韓王元嘉遂州都督彭王元則鄭州刺史鄭王元懿絳州刺史霍王元軌虢州刺史虢王元鳳豫州刺史道王元慶壽州刺史舒王元名鄧州刺史鄧王元裕幽州都督燕王靈䕫蘇州刺史許王元祥安州都督吳王恪相州都督魏王泰齊州都督齊王祐益州都督蜀王愔襄州刺史蔣王惲揚州都督越王貞并州都督晉王治秦州都督紀王慎等或地居旦奭夙聞詩禮或望乃間平早稱才藝並爵崇土宇寵兼車服誠孝之心無㤀於造次風政之譽克著於期月宜冠藩垣胙以休命其所署刺史咸令子孫世世承襲十一年又以司空長孫無忌為趙州刺史改封趙國公尚書左僕射房元齡為宋州刺史改封梁國公司空杜如晦密州刺史封萊國公特進李靖為濮州刺史改封衞國公特進高士廉為申州刺史改封申國公趙郡王孝恭為觀州刺史改封河間郡王同州刺史尉遲敬德為宣州刺史改封鄂國公光禄大夫李勣為蘇州刺史改封英國公左驍衞大將軍叚志元為金州刺史改封褒國公右領軍大將軍程知節為普州刺史改封盧國公兵部尚書侯君集為陳州刺史改封陳國公任城王道宗為鄂州刺史改封江夏郡王太僕卿劉𢎞基為朗州刺史改封䕫國公金紫光禄大夫張亮為澧州刺史改封鄖國公詔曰周武定業胙茅土於子孫漢髙受命誓帶礪於功臣豈止重親賢之地崇其典禮抑亦固磐石之基寄以藩翰但今之刺史古之諸侯雖立名不同而監統一也故申命有司斟酌前代宣條委共理之寄象賢存代及之典司空無忌等並策名運始功參締構即令子孫世世承襲非有大故無或黜免餘官食邑並如故其後無忌將之國情皆係戀不願是行辭不獲免謬出怨言以激上怒曰臣披荆棘以事陛下今海内寧一乃令世牧外州復與遷徙何異因上表固讓太宗謂之曰割地以封功臣古今之通義也意欲公之枝葉翼朕子孫長為藩翰傳之永久情在此耳而公等薄山河之誓發言怨望朕亦安可强公以土宇邪太子左庶子于志寧以古今事殊恐非久安之道上疏爭之竟從志寧議劉秩政典曰自漢以降雖封建失道然諸侯猶皆就國今封建子弟有其名號而無其國邑空樹官僚而無涖事聚居京師食租衣税國用所以不足也按文中子後序言太宗嘗讀周官辨方正位體國經野設官分職以為民極之言慨然歎曰不井田不封建不足以法三代之治然則詔羣臣議封建必是時事也後之儒者往往追恨當時諸臣不能將明英主之美意使生民復見三代之治以為遺憾愚嘗竊論之以為必能偹究古今之事情然後可以斷其議論之是非法制之得失蓋封建一事漢以來未嘗廢也然行之輙利少而害多其故有二一則不能存三代之公心二則不能存三代之良法公心者何昔文武成康之衆建諸侯也有德有功者則卑之初未嘗專以私其宗親雖曰兄弟甥舅之邦然所封皆極一時之選若其果賢則微子尹東夏蔡仲君蔡邦雖仇讐不廢也若其不賢則管蔡為戮五叔無官雖同氣不恕也至漢則且私且忌故始則勦㓕異代所建國而盡以卑其功臣繼則𠞰㓕異姓王而盡以卑其同宗又繼則𠞰滅疏屬劉氏王而盡以卑其近親而其所建置若濞若長之徒初無功德足以君國子民特以其近親而王之故不旋踵而犯上作亂墟其國而隕其身矣蓋有先王之公心則其弊不至於此良法者何昔先王之建邦也上有方伯連率下有公侯伯子男小大相維尊卑相制如公侯受封之地雖多而制禄不過十倍其卿成國不過半天子之軍名山大澤不以封必賜弓矢然後征必賜圭瓉然後鬯有廵守有述職有慶有讓綱紀未嘗一日隳也若漢初諸侯王則卑以大城名都連數千里未嘗為之分限山澤蓄貨在其國者不領於天子之大農五嶽四瀆在其國者不領於天子之祠官故為諸侯者一受封之後即自負其富强摘山煑海招納亡命擅爵人赦死罪天子不能訶謀臣不敢議所以縱恣之者如此及景武之後則作左官之律嚴附益之法吹毛求疵積毁銷骨所以猜防之者復如此蓋方其縱恣也則畏之有同乎敵國及其猜防也則抑之不啻如謫徙矣蓋有先王之良法則其弊不至於此由漢而來有天下者未嘗不王其昆弟子姓而名之曰封建然其得失與漢無以大相逺盖其初也惟務私其宗親未嘗有擇德而授之意故有國者不皆可使南面之人而復不能固結之以恩義繩律之以法度故仁恕者則流於縱恣西晉是也尅核者則過於猜防曹魏是也而晉魏皆縁是以亡是豈封建誤之哉先王之意之法不存而强慕美名則適足以為禍亂之階耳唐太宗亦好名之主然審時量已固自不能存帝王之心而行帝王之事矣故刺史世襲之詔不久而遂停而當時諸臣雖以魏鄭公之賢亦以為事雖至善時即未遑而有五不可之説蓋其度之審矣如顔師古之議欲封建與郡縣並行王侯與守令錯處則漢初已嘗如此至景帝令諸侯王不得治民補吏而漢置内史以治其地則封建之地悉為郡縣矣盖古之所謂諸侯即後之所謂守令然自漢中葉以後王侯之與守令始判然為二承流宣化而實有治人之責者守令也食租衣税而但襲茅土之封者王侯也令欲並建則凡王侯受封之地必盡廢内史之官即付之兵民之任而後可但恐恣縱專擅犯上作亂復如漢初之事容之則廢法而貽子孫之深憂誅之則傷恩而失封建之初意矣又况魏晉以後王侯多是虚封有三分食一四分食一五分食一者又有非其境内之地而遙封者如元魏之以會稽蒼梧建業丹陽等郡封其臣為公侯之類是也盖户封既為虚名則受封者之俸禄必仰給於縣官而出納之吝有所不能免於是遂有虚食真食之異今欲盡復舊制則王侯受封之地其户邑之入必合盡捐以予之地既𤓰分租賦隨之京師府藏頓鮮無以供軍國之用非居上之利也又王侯於所受封之郡邑既無撫字之責而徒利租賦之入於是一意侵漁不顧怨讟為封户者甚於征行非百姓之利也又所謂王侯者非子弟即勳臣素號名貴人華屋玉食之奉於京師為宜今使之塊處外郡朝不坐宴不預憂䜛畏譏此絳侯之所以恐懼長孫司空之所以怨望然則又非受封者之利也夫封建者古帝王所以建萬世之長䇿今其公心良法一不復存而顧强希其美名以行之上則不利於君中則不利於臣下則不利於民而方追咎其不能力行此書生之論所以不能通古今之變也唐制皇兄弟皇子為王皆封國之親王龍朔二年制諸王子嫡者封郡王任職從四品下叙其衆子封郡公從五品上叙貞觀中王珪奏曰三品以上遇親王於塗皆降乘違法申敬有乖儀注太宗曰卿欲自尊而卑吾子乎魏徴曰自古迄今親王班次三公以下今三品皆天子列卿及八座之長為王降乗非王所宜當也詔從之親王府各置官屬凡府官國官王未出閤則皆不置領親事帳内二府及國官太子男封郡王其庶姓卿士功業特盛者亦封郡王自至德元載至大厯三年封異姓為王者凡百一十有二人其次封國公其次有郡縣開國公侯伯子男之號亦九等並無官土其加實封者則食其封分食諸郡以租調給自武德至天寳實封者百餘家自至德二載至大厯三年食實封者二百六十五家凡食四萬四千八百六十户十六年制王府官以四考為限高宗時滕王元嬰江王元祥蔣王惲虢王鳳俱以貪暴為吏人所患有授其府官者皆比嶺外荒裔為之語曰寧向儋崖象白不事江滕蔣虢嗣聖二年初置公府官員武太后天授二年又置皇孫官員開元四年三月制諸封國自始封至曾孫者其封户三分減一十年加永穆公主封千户凡諸王及公主以下所食封邑皆以課户充州縣與國官邑官共執文帳准其户數收其租調均為三分其一入官其二入國公所食邑則全給焉二十年五月勅諸食邑實封並以三丁為限不須一分入官其物仍令封隨庸調送入京親王府置傅一人師範輔導參議可否初置王師景雲二年改為傅咨議參軍一人匡正幕府咨謀庶事友一人陪隨左右拾遺補闕文學二人修撰文章讐校經史東西閤祭酒各一人接引賓客長史司馬各一人通判掾一人通判功倉戸三曹屬一人通判兵騎法士四曹主簿一人覆省教命記室參軍二人掌表啟書疏宣行教命録事參軍一人受事勾檢功曹倉曹户曹兵曹法曹士曹等參軍各一人各有所主參軍二人行參軍四人掌出使及雜檢校典籖二人宣傳教命親事府置典軍副典軍各二人掌守衞陪從執仗親事執弓刀衞從執乗親事各十六人供進騎乗親事三百三十三人帳内府置典軍副典軍各三人掌儀衞陪從兼知鞍馬等帳内六百六十七人親王國施行公文准等署式嗣王以下府准此國令一人大農二人通判國司尉二人分判丞一人監印勾稽小吏有差若府主薨則諸府佐視事帳内過葬追退雖無妻子亦准此其國官聽終喪若有襲爵者聽其回事諸公主邑司有家令丞録事各一人並隸宗正寺出降者不置景龍三年應食封邑者一百四十餘家應出封户凡五十四州皆天下膏腴物産其安樂太平公主封又取富户不在損免限百姓著封户者甚於征行十一月河南廵使監察御史宋務光上疏曰臣聞分珪列土各有方位通邑大都不以封錫前猷未逺古義亦深自頃命侯稍殊舊式莫居墝塉專擇雄奥徐州貢土方色巳乖寢邱辭封讓德不嗣且滑州者國之近甸密邇帝畿地出縑紈人多趨射所以列縣惟七分封有五王賦少於侯租入家倍於輸國求諸既往實所未聞每科封丁有甚征役因而失業莫返其居此土風逃者舊少頃日波散良縁封多伏願稍均封户散配餘州下息疲甿上遵古制則公侯不失於采地流人得還於故鄉諸州封户亦望准此又徵封使者往來相繼既勞傳驛甚擾公私請附租庸每年送納望停封使以靜下人仍編入新格庶為永例又聞五等崇榮百王盛典自非邢茅懿戚冦鄧洪勲無以誓彼山河疇其爵土近者封建頗縁恩澤功無横草人已分茅遂使沃壤名藩多入侯國邑収家税半於天府經費不足盖亦有由竊見武德之初建侯故事於時天保新定王業創開佐命如雲謀臣如雨然而封者不過十數人今禮樂承平邦家繼世有象賢舊德之裔無野戰攻城之勤至於命封不合全廣論功謝於前業食邑多於往時既減邊儲實虧國用伏惟酌宗周之前訓咨武德之舊章地匪宗盟勲殊社稷不宜加於實邑自可寵以虚名如此則庶績其凝彛倫攸敘臣忝當廉問備採風謠見此不安豈敢自黙知必被封家所疾顧常以報國為心乞擇愚言訪諸朝宰秋毫有益夕死無憂兵部尚書韋嗣立上疏曰臣竊見食封之家其數甚衆昨問户部云用六十餘萬丁一丁兩疋計一百二十萬疋已上臣頃在太府知每年庸調絹數多不過百萬少則七八十萬以來比諸封家所入全少臣聞自古封茅土列山河皆須業著經綸功申草昧然後配宗廟之享承帶礪之恩往者皇運之初功臣共定天下當食封纔祗三二十家今以恩澤受封百四十家已上國家租賦大半私門私門資用有餘國家支計不足有餘則或致奢僭不足則坐致憂危制國之方豈謂為得封户之物諸家自徵或是官典或是奴僕多挾勢騁威凌蔑州縣凡是封户皆不勝侵漁若户不滿丁物送太府封家但於右藏請受不得輒自徵催則必免侵漁人冀蘇息矣愚嘗謂古之諸侯即後之守令自漢以來始判而為二為王侯者於其受封之地實無撫字之責而但利其租食之入於是反為百姓之患若宋韋二公之疏所言尤詳故備著之江夏郡王道宗太祖曾孫髙祖兄子以從秦王討賊功初封任城王貞觀時更封永徽初坐罪流象州薨子景恒封盧國公道興道宗弟初封廣寧郡王後以疏屬降封縣公永安壯王孝基武德初封二年將兵討劉武周師敗為賊所害道立以兄子嗣封髙平王後降為公淮陽壯王道元武德初封後將兵討劉黑闥戰歿道明以弟嗣王坐罪奪爵長平肅王叔良武德初封子孝協初王范陽後降為郇國公思訓中宗復位以宗室耆舊封隴西郡王新興郡王德良叔良弟晉坐罪誅長樂郡王幼良德良弟後坐罪賜死蔡烈王蔚子安武德時封琛儉降為公河間元王孝恭安子子崇義嗣降封譙國公濟北郡王瑊安子武德初封漢陽郡王瓌安子武德初封後降為公廬江郡王瑗蔚孫武德初封後坐反誅淮安靖王神通武德初封子道彦嗣後降為公孝詧神通子初封高密王孝同神通子初封淄川王孝慈神通子初封廣平王孝友神通子初封河間王孝節神通子初封清河王孝義神通子初封膠西王後並降為公孝逸神通子封梁郡公襄邑王神符神通弟武德初封子七人初並封郡王後降為公隴西恭王博乂世祖孫高祖兄蜀王湛子武德初封渤海敬王奉慈博乂弟武德初封右太祖世祖子孫王者息隱王建成高祖長子帝即位立為太子後為太宗所殺追封息王太原王承宗建成長子蚤卒安陸王承道河間王承德武安王承訓汝南王承明鉅鹿王承義俱建成子建成死時並坐誅衞懷王元霸蚤薨武德初追封諡泰太宗子以嗣元霸保定宗室西平王子泰徙封復以保定嗣巢刺王元吉初封齊王後為太宗所殺追封梁郡王承業漁陽王承鸞普安王承奬江夏王承裕義陽王承度俱元吉子元吉死時並坐誅楚哀王智雲隋大業末高祖起兵吏捕送長安害之武德初追封寛太宗子嗣封靈龜福降為公承况神龍中同節愍太子死於難荆王元景武德三年封後坐預房遺愛反謀賜死長沙降為侯逖復王爵無子國除漢王元昌武德三年封後坐預太子承乾反謀賜死國除鄷悼王元亨武德三年封蚤薨無子國除周王元方武德四年封貞觀時薨無子國除徐康王元禮武德四年封子茂嗣後坐罪廢璀延年坐罪貶國除諷再嗣封韓王元嘉武德四年封武后時坐謀舉兵誅武氏遇害訥元嘉第五子神龍初復嗣爵叔璩煒彭思王元則武德四年封絢以霍王子嗣志暕鄭惠王元懿武德六年封子璥嗣希言霍王元軌武德四年封武后時坐預謀舉兵廢死緒元軌子封江都王暉純亦元軌子封安定王虢莊王鳳武德六年封子翼嗣㝢邕巨道孝王元慶武德六年封子誘嗣微錬鄧康王元裕貞觀五年封炅孝先舒王元名貞觀五年封後為武后所殺亶元名子封豫章王亦為武后所殺津萬藻魯王靈䕫貞觀五年封後坐謀起兵討武氏見害詵靈䕫子為清河王早夭藹靈䕫子為范陽王道堅子宇嗣江安王元祥貞觀五年封子晫嗣坐罪誅欽皎元祥子封武陽王繼宗密貞王元曉貞觀五年封子頴嗣朂曇徹滕王元嬰貞觀十三年封子修琦嗣渉湛然右高祖子孫王者常山愍王承乾太宗長子武德三年封常山王太宗即位立為太子後坐謀逆廢為庶人徙黔州死楚王寛武德三年出後楚哀王蚤薨貞觀初追封吳王恪貞觀二年封永徽中長孫無忌譛殺之子仁貶為鬱林縣男中宗反正改王成紀以預誅武三思死祇祇巘濮恭王泰貞觀二年封子欣嗣嶠徽泰次子封新安郡王齊王祐武德八年封後坐反廢為庶人賜死蜀悼王愔貞觀五年封永徽時以吳王恪母弟得罪廢徙俄復封涪陵子璠嗣褕蔣王惲貞觀五年封子煒嗣為武氏所害紹宗欽福越王貞貞觀五年封中宗廢貞起兵討武氏不克死子冲與貞同死開元初追復爵王琳紀王慎貞觀五年封武后時謫死證行同東平王續慎子義陽王叡慎子為武氏所殺趙王福貞觀十三年封出後隱太子思順曹王明貞觀二十一年封出後巢刺王髙宗時坐太子賢事廢死子俊嗣為武氏所殺允戢臯右太宗子孫王者燕王忠高宗長子貞觀二十年封帝即位立為太子後立武后子宏乃降封王尋為許敬宗所誣賜死澤王上金永徽初封後為武氏所殺子義詢神龍初嗣潓許王素節永徽初封後為武氏所殺子瓘神龍初嗣益孝敬皇帝宏永徽六年封代王顯慶元年立為皇太子後為武后所鴆追諡帝章懷太子賢始王潞後立為太子以忤武后廢死守禮承宏樂安王光順犍為王守義並賢子右高宗子懿德太子重潤中宗長子永淳時立為皇太孫中宗失位廢後封邵王為武氏所殺神龍初追贈譙王重福高宗時封神龍初為韋后所譖廢徙睿宗立召還至東都謀作亂不克死節愍太子重俊聖厯三年封義興王中宗復位立為皇太子後與李多祚等殺武三思兵敗死睿宗立追諡子宗暉封湖陽郡王右中宗子讓皇帝憲睿宗子文明元年立為皇太子後改王夀又改王宋元宗即位徙王寜薨追諡帝子璡封汝陽王莊憲子封濟陰王琳憲子嗣寧王瑀憲子封漢中王惠莊太子撝垂拱三年封恒王開元時薨贈太子珣璹惠文太子範初封鄭王從元宗誅太平有功開元十四年薨贈太子子瑾嗣珍後坐罪死惠宣太子業始封趙王後進王薛開元二十二年薨贈太子瑗業子封樂安王瑒業子封滎陽王琄業子嗣薛王右睿宗子奉天皇帝琮元宗子景雲九年封許昌郡王天寳十載薨贈太子肅宗立諡帝子俅嗣太子瑛初封真定王開元三年立為皇太子後為武惠妃所構為庶人賜死寳應初贈太子儼瑛子封新平郡王伸瑛子封平原郡王俅瑛子嗣慶王棣王琰開元二年始封後坐罪以幽死僎琰子王汝南僑琰子王宜都俊琰子王濟南俀琰子王順化鄂王瑤開元時封二十五年為武惠妃所譖與太子瑛同廢死倩瑤子王陳靖恭太子琬始王鄄徙王榮天寳末薨追諡太子俯琬子王濟陰偕琬子王北平光王琚開元十三年封二十五年為武惠妃所譖與太子瑛同廢死儀王璲開元十三年封侁璲子王鍾陵僆璲子王廣陵潁王璬開元十三年封建中時薨神璬子王滎陽僝璬子王高邑永王璘開元十三年封至德初謀反兵敗死儹璘子王餘姚壽王瑁開元十五年封大厯十年薨僾瑁子王德陽伾瑁子王濟陽偡瑁子王廣陽延王玢開元十三年封興元初薨倬玢子王彭城侹玢子王平陽盛宣王琦開元十三年封廣德二年薨償琦子王真定佩琦子王武都濟王環開元十三年封傃環子王永嘉俛環子王平樂信王瑝開元二十一年封佟瑝子王新安倜瑝子王晉陵義王玼開元二十一年封儀玼子王舞陽僇玼子王晉陽陳王珪開元二十一年封倫珪子王安南佗珪子王臨淮佼珪子王安陽豐王珙開元二十一年封廣德初坐罪賜死佻珙子王齊安恒王瑱開元二十一年封代宗時薨凉王璿開元二十一年封代宗時薨仂璿子王瀘陽汴哀王璥開元二十一年封明年薨右元宗子孫王者文獻通考卷二百七十五
