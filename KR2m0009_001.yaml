body:
  text: 文獻通考卷一鄱陽馬端臨貴與著田賦考一厯代田賦之制堯遭洪水天下分絶使禹平水土别九州冀州厥土白壤無塊曰壤厥田惟中中田第五厥賦上上錯賦第一錯謂雜出第二之賦兖州厥土黑墳色黑而墳起厥田惟中下第六厥賦貞貞正也州第九賦正與九相當作十有三載乃同治水十三年乃有賦法與他州同青州厥土白墳厥田惟上下第三厥賦中上第四徐州厥土赤埴墳土黏曰埴厥田惟上中第二厥賦中中第五揚州厥土惟塗泥地泉濕厥田惟下下第九厥賦下上上錯第七雜出第六荆州厥土惟塗泥厥田惟下中第八厥賦上下第三豫州厥土惟壤下土墳壚髙者壤下者壚壚疎也厥田惟中上第四厥賦錯上中第二雜出第一梁州厥土青黎色青黑沃壤也厥田惟下上第七厥賦下中三錯第八雜出第七第九三等雍州厥土黄壤厥田上上第一厥賦中下第六九州之地定墾者九百一十萬八千二十頃孔氏曰田下而賦上者人功修也田上而賦下者人功少也三山林氏曰三代取於民之法不同而皆不出什一之數既不出什一之數而乃有九等之差者盖九州地有廣狹民有多寡其賦稅所入之總數自有不同不可以田之高下而凖之計其所入之總數而多寡比較有此九等冀州之賦比九州為最多故為上上兖州之賦比九州為最少故為下下其餘七州皆然非取於民之時有此九等之輕重也五百里甸服為天子服理田百里賦納總禾本全曰總二百里納銍刈禾曰銍三百里納秸服半藁去皮曰秸服事也納總銍秸之外又使之服輸將之事四百里粟五百里米量其地之逺近而為納賦之輕重精粗唐虞法制簡略不可得而詳其見於書者如此夏后氏五十而貢殷人七十而助朱子集註曰夏時一夫受田五十畝而每夫計其五畝之入以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝中為公田其外八家各授一區但借其力以助耕公田而不復稅其私田周文王在岐今扶風郡岐山縣用平土之法以為治人之道地著為本地著謂安土故建司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同同方百里同十為封封十為畿畿方千里故邱有戎馬一匹牛三頭甸有戎馬四匹兵車一乗牛十二頭甲士三人步卒七十二人一同百里提封萬井戎馬四百匹車百乗此卿大夫采地之大者是謂百乗之家一封三百六十六里提封十萬井定出賦六萬四千井戎馬四千匹車千乗此諸侯之大者謂之千乗之國天子之畿内方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乗戎卒七十萬人故曰萬乗之主按孟子言文王之治岐耕者九一即司馬法也然自卿大夫采地推而至於諸侯天子者恐是商之末造法制隳弛故文王因而修明之非謂在岐之時自立千里之畿提封百萬之井奄有萬乗之兵車也周人百畝而徹其實皆什一也朱子集註曰周時一夫授田百畝鄉遂用貢法十夫有溝都鄙用助法八家同井耕則通力而作收則計畝而分故謂之徹其實皆什一也貢法固以十分之一為常數惟助法乃是九一而商制不可考周制則公田百畝中以二十畝為廬舎一夫所耕公田實計十畝通私田百畝為十一分取其一盖又輕於什一矣竊料商制亦當似此而以十四畝為廬舎一夫實耕公田七畝是亦什一也遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以逹於畿十夫二鄰之田百夫一鄼之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水於川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仞徑畛涂道路皆所以通車徒於國都也徑容牛馬畛容大車涂容乗車一軌道容二軌路容三軌萬夫者方三十三里少半里九而方一同以南畮圖之則遂從溝横洫從澮横九澮而川周其外焉去山林陵麓川澤溝瀆城郭宫室涂巷三分之制其餘如此以至於畿則中雖有都鄙遂人盡主其地右鄭注以為此鄉遂用溝洫之法也用之近郊鄉遂匠人為溝洫主通利田間之水道耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅎌田首倍之廣二尺深二尺謂之遂古者耜一金兩人併發之其隴中曰􅎌􅎌上曰伐伐之言發也􅎌畎也今之耜岐頭兩金象古之耦也田一夫之所佃百畝方百步也遂者夫間小溝遂上亦有徑九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮專逹於川井者方一里九夫所治之田也采地制井田異於鄉遂及公邑三夫為屋屋具也一井之中三屋九夫三三相具以出賦稅共治溝也方十里為成成中容一甸甸方八里出田稅縁邊一里治洫方百里為同同中容四都六十四成成方八十里出田稅縁邊十里治澮右鄭注以為此都鄙用井田之法也用之野外縣都陳及之曰周制井田之法通行於天下安有内外之異哉遂人言十夫有溝以一直度之也凡十夫之田之首必有一溝以瀉水以方度之則方一里之地所容者九夫其間廣四尺深四尺謂之溝則方一里之内凡四溝矣兩旁各一溝中間二溝遂人云百夫有洫是百夫之地相連屬而同以一洫瀉水以方度之則方十里之成所容者九百夫其間廣八尺深八尺謂之洫則方十里之内凡四洫矣兩旁各一洫中間二洫至於澮亦然若川則非人力所能為故匠人不為川而云兩山之間必有川焉遂人萬夫有川亦大約言之耳大槩甽水瀉於溝溝水瀉於洫洫水瀉於澮澮水瀉於川其縱横因地勢之便利遂人匠人以大意言之遂人以長言之故曰以逹於畿匠人以方言之故止一同耳又曰遂人所言者積數也匠人所言者方法也積數則計其所有者言之方法則積其所圍之内名之其實一制也朱子語錄曰溝洫以十為數井田以九為數决不可合近世諸儒論田制乃欲混井田溝洫為一則不可行鄭氏注分作兩項却是永嘉陳氏曰鄉遂用貢法遂人是也都鄙用助法匠人是也按遂人云百夫有洫十夫有溝即不見得包溝洫在内若是在内當云百夫十夫之間矣匠人溝洫却在内故以間言方十里者以開方法計之為九百夫方百里者以開方法計之為萬夫遂人匠人兩處各是一法朱子總其説謂貢法十夫有溝助法八家同井其言簡而盡矣但不知其必分二法者何故竊意鄉遂之地在近郊逺郊之間六軍之所從出必是平原曠野可畫為萬夫之田有溝有洫又有途路方圎可以如圖盖萬夫之地所占不多以井田一同法約之止有九分之一故以徑法攤算逐一見其子數若都鄙之地謂之甸稍縣都乃公卿大夫之采地包山林陵麓在内難用溝洫法整齊分畫故逐處畫為井田雖有溝洫不能如圖故但言在其間其地綿亘一同之地為萬夫者九故以徑法紐算但止言其母數按自孟子有野九一而助國中什一使自賦之説其後鄭康成注周禮以為周家之制鄉遂用貢法遂人所謂十夫有溝是也都鄙用助法匠人所謂九夫為井是也自是兩法晦菴以為遂人以十為數匠人以九為數決不可合以鄭氏分注作兩項為是而近世諸儒合為一法為非然愚嘗考之孟子所謂野九一者乃授田之制國中什一者乃取民之制盖助有公田故其數必拘於九八居四旁為私而一居其中為公是為九夫多與少皆不可行若貢則無公田孟子之什一特言其取之之數遂人之十夫特姑舉成數以言之耳若九夫自有九夫之貢法十一夫自有十一夫之貢法初不必拘以十數而後可行貢法也今徒見匠人有九夫為井之文而謂遂人所謂十夫有溝者亦是以十為數則似太拘盖自遂而逹於溝自溝而逹於洫自洫而逹於澮自澮而逹於川此二法之所以同也行助法之地必須以平地之田分畫作九夫中為公田而八夫之私田環之列如井字整如棊局所謂溝洫者直欲限田之多少而為之疆界行貢法之地則無問髙原下隰截長補短每夫授之百畝所謂溝洫者不過隨地之髙下而為之蓄洩此二法之所以異也是以匠人言遂必曰二尺言溝必曰四尺言洫必曰八尺言澮必曰二尋盖以平原曠野之地畫九夫之田以為井各自其九以至於同其間所謂遂溝洫澮者隘則不足以蓄水而廣則又至於妨田故必有一定之尺寸不可踰也若遂人止言夫間有遂十夫有溝百夫有洫千夫有澮盖是山谷藪澤之間隨地為田横斜廣狹皆可墾闢故溝洫亦不言其尺寸所謂夫間有遂遂上有徑以至萬夫有川川上有路云者姑約略言之大意謂路之下即為水溝水溝之下即為田耳非若匠人之田必拘以九夫而其溝洫之必拘以若干尺也訂義所載永嘉陳氏謂遂人十夫有溝是以直度之匠人九夫為井是以方言之又謂遂人所言者積數匠人所言者方法想亦有此意但其説欠詳明耳然鄉遂附郭之地必是平衍沃饒可以分畫宜行助法而反行貢法都鄙野外之地必是有山谷之險峻溪澗之阻隔難以分畫宜行貢法而反行助法何也盖助法九取其一似重於貢然地有肥磽歲有豐凶民不過任其耕耨之事而所輸盡公田之粟則所取雖多而民無預貢法十取其一似輕於助然立為一定之䂓以樂歲之數而必欲取盈於凶歉之年至稱貸而益之則所取雖寡而民已病矣此龍子所以言莫善於助莫不善於貢也鄉遂廹近王城豐凶易察故可行貢法都鄙僻在遐方情偽難知故止行助法此又先王之微意也然鄉遂之地少都鄙之地多則行貢法之地必少而行助法之地必多至魯宣公始税畝杜氏注以為公無恩信於民民不肯盡力於公田故履踐案行擇其善畝好榖者税取之盖是時公田所收必是不給於用而為此横斂孟子曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也則是孟子之時助法之廢已久盡胥而為貢法矣孟子特因詩中兩語而想像成周之助法耳自助法盡廢胥而為貢法於是民所耕者私田所輸者公租田之豐歉靡常而賦之額數已定限以十一民猶病之况過取於十一之外乎大司徒凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮不易之地歲種之地美故家百畮一易之地休一歲乃復種地薄故家二百畮再易之地休二歲乃復種故家三百畮遂人辨其野之土上地中地下地以頒田里上地夫一㕓田百畮萊五十畮餘夫亦如之中地夫一㕓田百畮萊百畮餘夫亦如之下地夫一㕓田百畮萊二百畮餘夫亦如之萊謂休不耕者㕓居也揚子雲有田一㕓謂百畮之居孟子所云五畝之宅樹之以桑者是也小司徒乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人一家男女七人以上則授之以上地所養者衆也男女五人以下則授之下地所養者寡也有夫有婦然後為家可任矣見力役門王制制農田百畝百畝之糞上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差也孟子答北宫錡同朱子集註一夫一婦佃田百畝加之以糞糞多而力勤者為上農其所收可供九人其次用力不齊故有此五等庶人在官者其受祿不同亦有此五等也王制糞作分注疏引周禮小司徒上地家七人解此段按小司徒言上地中地下地以田之肥瘠言之王制言上農次農下農以人之勤怠言之當如集註云右按周家授田之制但如大司徒遂人之説則是田肥者少授之田瘠者多授之如小司徒之説則口衆者授之肥田口少者授之瘠田如王制孟子之説則一夫定以百畝為率而良農食多惰農食少三者不同西漢食貨志理王量能授事四民陳力受職民受田上田夫百畝中田夫二百畝下田夫三百畝歲耕種者為不易上田休一歲者為一易中田休二歲者為再易下田三歲更耕之自爰其處爰於也更謂三歲即改與别家佃以均厚薄農民户人已受田其家衆男為餘夫亦以口授田如比比同也士工商家受田五口當農夫一人口二十畝此謂平土可以為法者也若山林藪澤原陵淳鹵之地淳盡也澤鹵之田不生各以肥磽多少為差民年二十受田六十歸田七十以上上所養也十歲以下上所長也十一以上上所强也勉强勸之以集事按此言受田之法與大司徒遂人所言略同但言餘夫受田如比孟子言餘夫二十五畝集註年十六别受田二十五畝俟其壯有室然後更受百畝之田則此二十五畝者十六以後十九以前所受也載師掌任土之法以物地事授地職而待其政令任土者任其力勢所能生育且以制貢賦也物物色之以知其所宜之事而授農牧衡虞使職之以㕓里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地㕓里若今邑居里民居之區域也里居也園樹果蓏之属宅田致仕之家所受田士田圭田也賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受之田也賞田賞賜之田公邑謂六遂餘地天子使大夫治之自此以外皆然家邑大夫之采地小都卿之采地王子弟所食邑也畺五百里王畿界也皆言任者地之形實不方平如圗受田邑者逺近不得盡如制其所生育賦貢取正於是耳凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五征税也國宅凡官所有宫室吏所治者也鄭氏曰周税輕近而重逺近者多役也園㕓亦輕之者㕓無榖園少利也山齋易氏曰孟子之説十一之法通乎三代今考載師所言任地則不止十一而已毋乃非周人之徹法歟鄭氏惑焉盖誤認載師為任民之法而不知其為任地之法也嘗考載師之職以宅田士田賈田任近郊之地故曰近郊十一以官田牛田賞田牧田任逺郊之地故曰逺郊二十而三若公邑之田則六遂之餘地家稍小都大都之田則三等之采地故曰甸稍縣都皆無過十二是六者皆以田賦之十一者取於民又以其一分為十分各酌其輕重而以其十一十二二十而三者輸之於天子此皆任地之賦也知任地之法異乎任民之法則成周十一之徹法可考矣載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征不毛不樹桑麻布帛也宅不毛者罰以一里二十五家之布空田者罰以一屋三家之税民無職事者出夫税百畝之税家税出士徒車輦給徭役趙商問田不耕罰宜重乃止三夫之税粟宅不毛罰宜輕乃以二十五家之布未逹輕重之差鄭答語亦不明閭師凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰按周家立此法以警游惰之民所謂里布屋粟夫家之征盖倍蓰而取以困之也所謂無牲無盛無椁不帛不衰盖禁其合用以辱之也其為示罰一也然所罰之里布屋粟國用曷嘗仰給於此鄭氏注謂以共吉凶二服及喪器誤矣至孟子言㕓無夫里之布則知戰國時以成周所以罰游惰者為經常之征斂矣是無罪而受罰也可乎甚至王介甫遂欲舉此例以役坊郭之民夫古人五畝之宅與田皆受之於官是以不毛者罰之後世官何嘗以宅地場圃給民而欲舉此比乎魯宣公十五年初税畝宣公無恩信於民民不肯盡力於公田履踐案行擇其善畝好榖者税取之左氏𫝊曰非禮也榖出不過藉謂公田借民力耕之税不過此以豐財也公羊𫝊曰譏始履畝而税也古者什一而藉什一者天下之中正也什一行而頌聲作矣榖梁𫝊曰私田稼不善則非吏非責也吏田畯也言吏急民使不得營私田公田稼不善則非民民勤私也初税畝者非公之去公田而履畝十取一也以公之與民為巳悉矣悉謂盡其力魯成公元年作邱甲周禮九夫為井四井為邑四邑為邱邱十六井出戎馬一匹牛三頭四邱為甸甸六十四井出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使邱出之譏重斂左氏𫝊曰為齊難故魯哀公十二年用田賦杜預註左𫝊邱賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各自為賦故名田賦用何休注公羊𫝊田謂一井之田賦者歛取其財也言田賦者若今漢家斂民錢以田為率矣不言井者城郭里巷亦有井嫌悉賦之禮税民公田不過什一軍賦十井不過一乗哀公外慕强兵空盡國儲故復用田賦過什一左𫝊季孫欲以田賦使冉有訪諸仲尼仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以邱亦足矣邱十六井出戎馬一匹牛三頭是賦之常法若不度禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉不聽國語仲尼不對而私於冉有曰先王制土籍田以力而砥其逺近賦里以入而量其有無任力以夫而議其老幼於是乎有鰥寡孤疾有軍旅之出則徵之無則已言無軍旅則不征鰥寡孤疾之賦其歲收田一井出稯禾秉芻缶米不是過也此有軍旅之歲所征缶庾也十六斗曰庾十庾曰秉秉百六十斗四秉曰筥十筥曰稯稯六百四十斛先王以為足若子季孫欲其法也則有周公之籍若欲犯法則茍而賦又何訪焉按四井為邑四邑為邱四邱為甸甸六十四井成公以甸賦取之於邱已是四倍於先王之時今詳夫子答語如左𫝊所載似是以井賦取之於邱田乃一井之田注見上則又十六倍於成公之時未應如是其酷如國語所載是以軍旅之賦施之平時則只是每井加賦而未必盡及一邱之數此杜何二公所註所以有别賦家財及引漢斂民錢為喻之説也哀公問於有若曰年饑用不足如之何對曰盍徹乎公曰二吾猶不足如之何其徹也有若曰百姓足君孰與不足百姓不足君孰與足二謂已收公田之租又履私田之畝十取其一公又問於孔子孔子曰薄賦斂則人富公曰若是寡人貧矣對曰豈弟君子人之父母未見子富而父貧也滕文公使畢戰問井地孟子曰夫仁政必自經界始經界不正井地不均榖祿不平是故暴君汙吏必慢其經界經界既正分田制祿可坐而定也夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子請野九一而助國中什一使自賦卿以下必有圭田圭田五十畝餘夫二十五畝死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事所以别野人也此其大略也若夫潤澤之則在君與子矣朱子集註曰經界謂治地分田經畫其溝塗封植之界也此法不修則田無定分而豪强得以兼并故井地不均賦無定法而貪暴得以多取故榖祿不平野郊外都鄙之地九一而助為公田而行助法也國中郊門之内鄉遂之地也田不井授但為溝洫使什而自賦其一盖用貢法也周所謂徹法盖如此當戰國時非惟助法不行其貢亦不止什一矣圭田世祿常制之外又有此田以奉祭祀所以厚君子不言世祿滕已行之但此未備餘夫年十六授此田在百畝之外所以厚野人方里而井以下乃周之助法上言野及國中二法此獨詳於治野者國中貢法當時已行但取之過於什一耳魏文侯時租賦増倍於常或有賀者文侯曰今户口不加而租賦歲倍此由課多也譬如彼治冶令大則薄令小則厚治人亦如之夫貪其賦税不愛人是虞人反裘而負薪也徒惜其毛而不知皮盡而毛無所傅李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居三分去一為田六百萬畮治田勤則畮益三升臣瓚曰當言三斗謂治田勤則畝加三斗也不勤則損亦如之地方百里之増減輙為粟百八十萬石矣餘見平糴門秦孝公十二年初為賦納商鞅説開阡陌制貢賦之法杜氏通典曰秦孝公用商鞅鞅以三晋地狹人貧秦地廣人寡故草不盡墾地利不盡出於是誘三晉之人利其田宅復三代無知兵事而務本於内而使秦人應敵於外故齊井田制阡陌任其所耕不限多少數年之間國富兵强天下無敵吳氏曰井田受之於公毋得粥賣故王制曰田里不粥秦開阡陌遂得賣買又戰得甲首者益田宅五甲首而𨽻役五家兼并之患自此起民田多者以千畝為畔無復限制矣朱子開阡陌辯曰漢志言秦廢井田開阡陌説者之意皆以開為開置之開言秦廢井田而始置阡陌也故白居易云人稀土曠者宜修阡陌户繁鄉狹者則復井田盖亦以阡陌為秦制井田為古法此恐皆未得其事之實也按阡陌者舊説以為田間之道盖因田之疆畔制其廣狹辨其縱横以通人物之往來即周禮所謂遂上之徑溝上之畛洫上之涂澮上之道也然風俗通云南北曰阡東西曰陌又云河南以東西為阡南北為陌二説不同今以遂人田畝夫家之數考之則當以後説為正盖陌之為言百也遂洫從而徑涂亦從則遂間百畝洫間百夫而徑涂為陌矣阡之為言千也溝澮横而畛道亦横則溝間千畝澮間千夫而畛道為阡矣阡陌之名由此而得至於萬夫有川而川上之路周於其外與夫匠人井田之制遂溝洫澮亦皆四周則阡陌之名疑亦因其横從而得之也然遂廣二尺溝四尺洫八尺澮二尋則丈有六尺矣徑容牛馬畛容大車涂容乗車一軌道二軌路三軌則幾二丈矣此其水陸占地不得為田者頗多先王之意非不惜而虚棄之也所以正經界止侵爭時蓄洩備水旱為永久之計有不得不然者其意深矣商君以其急刻之心行茍且之政但見田為阡陌所束而耕者限於百畝則病其人力之不盡但見阡陌之占地太廣而不得為田者多則病其地利之有遺又當世衰法壞之時則其歸授之際必不免有煩擾欺𨼆之姦而阡陌之地切近民田又必有隂據以自私而税不入於公上者是以一旦奮然不顧盡開阡陌悉除禁限而聽民兼并買賣以盡人力墾闢棄地悉為田疇而不使其有尺寸之遺以盡地利使民有田即為永業而不復歸授以絶煩擾欺𨼆之姦使地皆為田而田皆出税以覈隂據自私之幸此其為計正與楊炎疾浮户之弊而遂破租庸以為兩税盖一時之害雖除而千古聖賢𫝊授精微之意於此盡矣故秦紀鞅𫝊皆云為田開阡陌封疆而賦税平蔡澤亦曰决裂阡陌以靜生民之業而一其俗詳味其言則所謂開者乃破壞剗削之意而非創置建立之名所謂阡陌乃三代井田之舊而非秦之所制矣所謂賦税平者以無欺隱竊據之姦也所謂靜生民之業者以無歸授取予之煩也以是數者合而證之其理可見而蔡澤之言尤為明白且先王疆理天下均以予民故其田間之道有經有緯不得無法若秦既除井授之制矣則隨地為田隨田為路尖斜屈曲無所不可又何必取其東西南北之正以為阡陌而後可以通往來哉此又以物情事理推之而益見其説之無疑者或乃以漢世獨有阡陌之名而疑其出於秦之所置殊不知秦之所開亦其曠僻而非通路者耳若其適當衝要而便於往來則亦豈得而盡廢之哉但必稍侵削之不復使如先王之舊耳或者又以董仲舒言富者連阡陌而請限民名田疑田制之壞由於阡陌此亦非也盖曰富者一家兼有千夫百夫之田耳至於所謂商賈無農夫之苦有阡陌之得亦以千夫百夫之收而言盖當是時去古未逺此名尚在而遺跡猶有可考者顧一時君臣乃不能推尋講究而修復之耳豈不可惜也哉始皇三十一年使黔首自實田通典曰夏之貢殷之助周之徹皆十而取一盖因地而税秦則不然舍地而税人故地數未盈其税必備是以貧者避賦役而逃逸富者務兼并而自若加以内興工作外攘夷狄收大半之賦發閭左之戍竭天下之資財以奉其政猶未足以贍其欲也二世承之不變海内潰叛按秦壞井田之後任民所耕不計多少已無所稽考以為賦斂之厚薄其後遂舍地而税人則其繆尤甚矣是年始令黔首自實田以定賦通典所言其是年以前所行歟秦田租口賦鹽鐵之利二十倍於官或耕豪民之田見税十五言貧人無田而耕墾豪富家之田十分之中以五輸田主也漢興循而未改漢興天下既定高祖約法省禁輕田租十五而税一量吏祿度官用以賦於民惠帝即位減田租復十五税一漢初十五税一中間廢今復之也文帝十二年詔賜天下民租之半鼂錯説上曰堯禹有九年之水湯有七年之旱而國無捐瘠者以蓄積多而備先具也今海内為一土地人民之衆不避湯禹加以亡天災水旱而蓄積未及何也地有遺利民有餘力生榖之土未盡墾山澤之利未盡出也游食之民未盡歸農也民貧則姦邪生貧生於不足不足生於不農不農則不地著不地著則離鄉輕家不能禁也今農夫五口之家其服役者不下二人能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給徭役四時之間無日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此尚復被水旱之災急征暴賦賦斂不時朝令而暮改於是有賣田宅鬻子孫以償責者矣方今之道欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵除罪如此則富人有爵農民有財粟有所渫夫能入粟以受爵皆有餘者也取有餘以供君上則貧民之賦可損上從其言令民入粟邊拜爵各有差錯復言邊食足支五歲可令入粟郡縣郡縣足支一歲以上可時赦勿收農民租上從之詔賜民田租之半十三年除民之田租詔曰農天下之本務莫大焉今勤身從事而有租税之賦是謂本末無以異也其於勸農之道未備其除田之租税致堂胡氏曰漢志文帝時封國漸衆諸侯王自食其地王府所入寡矣又與匈奴和親歲致金繒後數為邊患天子親將出擊復因河決有築塞勞費大司農財用宜不致充溢而文帝在位十二年即賜民歲半租次年遂除之然則何以足用乎盖文帝恭儉百金之費亦不茍用宫閫是效流𫝊國都莫有奢侈之習如之何不富其財盖不可勝用矣然後知導諛逢惡者納君於荒淫取之盡錙銖用之如泥沙至於財竭下畔而上亡其罪可勝誅哉按文帝時賈誼鼂錯皆以積貯未備為可痛惜説帝募民入粟拜爵曾未幾而邊食可支五歲郡縣可支一歲遂能盡蠲田之税租者盖當時務末者多農賤賈貴一以爵誘之則盡驅而之南畝所謂為之者衆則財常足雖帝恭儉所致亦勸勵之有方也景帝元年詔曰間者歲比不登民多乏食夭絶天年朕甚痛之郡國或磽陿無所農桑繫畜或地饒廣薦草莽水泉利而不得徙其議民欲徙寛大地者聽之二年令民半出田租三十而税一先公曰文帝除民田租税後十三年至景帝二年始令民再出田租三十而税一文帝恭儉節用而民租不收者至十餘年此豈後世可及武帝元狩元年遣謁者勸種宿麥董仲舒説上曰春秋他穀不書至於麥禾不成則書之以此見聖人於五榖最重麥禾今關中俗不好種麥是歲失春秋之所重而損生民之具也願陛下詔大司農使關中民益種宿麥毋令後時上從之仲舒又説上曰秦用商鞅之法改帝王之制除井田民得賣買富者田連阡陌貧者無立錐之地漢興循而未改古井田法雖難猝行宜少近古限民名田以贍不足名田占田也名為立限不使富者過制則貧弱之家可足也塞并兼之路然後可善治也竟不能用元鼎六年上曰左右内史地名山川源甚衆内史地謂京兆扶風細民未知其利今内史稻田租挈重挈苦計反收田租之約令也不與郡同郡謂四方諸郡其議減令吏民勉盡地利平繇行水勿失其時元封四年祠后土賜二縣及楊氏無出今年租賦五年修封禪所幸縣無出今年租賦天漢三年修封泰山行所過無出田租帝末年悔征伐之事乃封丞相田千秋為富民侯下詔曰方今之務在於力農以趙過為捜粟都尉過能為代田田一畮三􅎌􅎌壟也或作畎歲代處故曰代田代易也古法也后稷始􅎌田以二耜為耦併兩耜而耕廣尺深尺曰􅎌長終畝一畝三􅎌一夫三百􅎌而播種於􅎌中苗生葉以上稍耨隴草因隤其土以附苗根故其詩曰或耘或耔黍稷嶷嶷耘除草也耔附根也言苗稍壯每耨輙附根比盛暑隴盡而根深能風與旱能作耐故嶷嶷而盛也其耕耘下種田器皆有便巧率十二夫為田一井一屋故畝五頃九夫為井三夫為屋夫百畝於古為十二頃古百步為畝漢時二百四十步為畝古千二百畝則得今五頃也用耦犁二牛三人一歲之收當過縵田畝一斛以上縵田謂不􅎌者音莫幹反善者倍之善為􅎌者又過縵田一斛以上過使敎田太常三輔太常主諸陵有民故亦課田種大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛無以趨澤趨讀曰趣及也澤雨之潤澤故平都令光敎過以人輓犁過奏光以為丞光史失其姓敎民相與傭輓犁率多人者田日三十畮少者十三畮以故田多墾闢過試以離宫卒田其宫壖而縁反地離宫别處之宫非天子所常居也壖餘也宫壖地謂外垣之内内垣之外守離宫卒閑而無事因令於壖地為田課得榖皆多其旁田畮一斛以上令命家田三輔公田令離宫卒敎其家田公田也又教邊郡及居延城居延張掖縣是後邊城河東𢎞農三輔太常民皆便代田用少而得榖多至孝昭時流民稍還田野墾闢頗有蓄積石林葉氏曰世多言耕用牛始漢趙過以為易服牛乗馬引重致逺牛馬之用盖同初不以耕也故華山桃林之事武王以休兵並言而周官凡農政無有及牛者此理未必然孔子弟子冉伯牛司馬牛皆名耕若非用於耕則何取於牛乎漢書趙過𫝊但云畮五頃用耦耕二牛三人其後民或苦少牛平都令光乃敎過以人輓犁由是言之盖古耕而不犁後世變為犁法耦用人犁用牛過特為之増損其數耳非用牛自過始也耦與犁皆耕事故通言之孔子言犁牛之子騂且角則孔子時固已用犁此二氏所以為字也昭帝始元元年詔毋令民出今年田租始元六年令民得以律占租武帝時賦斂煩多律外而取之今始復舊元鳳二年令三輔太常郡得以菽粟當賦謂聽以菽粟當錢物也宣帝本始元年鳳凰集膠東千乗赦天下租税勿收三年詔郡國傷旱甚者民毋出租賦四年詔被地震傷壞甚者勿收租賦元康二年詔郡國被災甚者毋出今年租賦神爵元年上行幸甘泉河東行所過毋出田租甘露二年鳳凰集新蔡毋出今年租元帝初元元年令郡國被災害甚者毋出租賦二年郡國被地動災甚者毋出租賦永光元年幸甘泉所過毋出租賦成帝建始元年郡國被災什四以上毋收田租鴻嘉四年郡國被災害什四以上民貲不滿三萬勿收租賦孝成帝時張禹占鄭白之渠四百餘頃他人兼并者𩔖此而人彌困孝哀即位師丹建言古之聖王莫不設井田然後治乃可平孝文皇帝承周秦兵革之後天下空虛故務勸農桑帥以節儉民始充實未有兼并之害故不為民田及奴婢為限今累世承平豪富吏民貲數鉅萬而貧弱逾困盖君子為政貴因循而重改作所以可改者將以救急也亦未可詳宜略為限天子下其議丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及關内侯吏民名田皆無過三十頃諸侯王奴婢二百人列侯公主百人關内侯吏民三十人期盡三年犯者没入官時田宅奴婢賈為減賤丁傅用事董賢隆貴皆不便也詔書且須後遂寝不行哀帝即位令水所傷縣邑及他國郡災害什四以上民貲不滿十萬皆無出今年租賦平帝元始二年天下民貲不滿二萬及被災之郡不滿十萬勿收租税漢提封田一萬萬四千五百一十三萬六千四百五頃提封者大舉其封疆也其一萬萬二百五十二萬八千八百八十九頃邑居道路山川陵澤羣不可墾其三千二百二十九萬九百四十七頃可墾不可墾定墾田八百二十七萬五百三十六頃漢極盛矣據元始二年户千二百二十三萬三千毎户合得田六十七畝百四十六步有竒王莽簒位下令曰古者設井田則國給人富而頌聲作秦為無道壞聖制廢井田是以兼并起貪鄙生强者䂓田以千數弱者曾無立錐之居漢氏減輕田租三十而税一而豪民侵凌分田刼假分田謂貧者無田而取富人田耕種共分其所收假如貧人賃富人之田刼者富人刼奪其税欺凌之也厥名三十實什税五也富者驕而為邪貧者窮而為姦俱陷於辜刑用不錯今更名天下田曰王田奴婢曰私屬皆不得買賣其男口不過八而田滿一井者分餘田與九族鄉黨犯令法至死制度又不定吏緣為姦天下謷謷然陷刑者衆後三歲莽知民愁下詔諸食王田及私屬皆得賣勿拘以法然刑罰深刻他政誖亂用度不足數賦横斂民愈貧困荀悦論曰古者什一而税以為天下之中正也今漢氏或百一而税可謂鮮矣然豪强人占田逾侈輸其賦大半官家之恵優於三代豪强之暴酷於亡秦是上惠不通威福分於豪强也文帝不正其本而務除租税適足以資豪强也且夫井田之制不宜於人衆之時田廣人寡苟為可也然欲廢之於寡立之於衆土地布列在豪强卒而革之並有怨心則生紛亂制度難行由是觀之若髙祖初定天下光武中興之後人衆稀少立之易矣既未悉備井田之法宜以口數占田為之立限人得耕種不得賣買以贍貧弱以防兼并且為制度張本不亦善乎老泉蘇氏曰周之時用井田井田廢田非耕者之所有而有田者不耕也耕者之田資於富民富民之家地大業廣阡陌連接募召浮客分耕其中鞭笞驅役視以奴僕安坐四顧指麾於其間而役屬之民夏為之耨秋為之穫無有一人違其節度以嬉而田之所入已得其半耕者得其半有田者一人而耕者十人是以田主日累其半以至於富强耕者日食其半以至於窮餓而無告夫使耕者至於窮餓而不耕不穫者坐而食富强之利猶且不可而况富强之民輸租於縣官而不免於怨歎嗟憤何則彼以其半而供縣官之税不若周之民以其全力而供上之税也周之什一以其全力而供什一之税也使其半供什一之税猶用十二之税然也况今之税又非特止於什一而已則宜乎其怨歎嗟憤之不免也噫貧民耕而不免於飢富民坐而飽且嬉又不免於怨其弊皆起於廢井田井田復則貧民有田以耕榖食粟米不分於富民可以無飢富民不得多占田以錮貧民其勢不耕則無所得食以地之全力供縣官之税又可以無怨是以天下之士爭言復井田既又有言者曰奪富民之田以與無田之民則富民不服此必生亂如乗大亂之後土曠而人稀可以一舉而就髙祖之滅秦光武之承漢可為而不為以是為恨吾又以為不然今雖使富民奉其田而歸諸公乞為井田其勢亦不可得何則井田之制九夫為井井間有溝四井為邑四邑為邱四邱為甸甸方八里旁加一里為一成成間有洫其地百井而方十里四甸為縣四縣為都四都方八十里旁加十里為一同同間有澮其地萬井而方百里百里之間為澮者一為洫者百為溝者萬既為井田又必兼備溝洫之制夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路萬夫之地盖三十二里有半而其間為川為路者一為澮為道者九為洫為涂者百為溝為畛者千為遂為徑者萬此二者非塞溪壑平澗谷夷邱陵破墳墓壞廬舍徙城郭易疆隴不可為也縱使盡能得平原曠野而遂規畫於其中亦當驅天下之人竭天下之糧窮數百年専力於此不治他事而後可以望天下之地盡為井田盡為溝洫已而又為民作屋廬於其中以安其居而後可吁亦已迂矣井田成而民之死其骨已朽矣古者井田之興其必始於唐虞之世乎井田之法起於黄帝事見鄉黨門非唐虞之世則周之世無以成井田唐虞啟之至於夏商稍稍葺治至周而大備周公承之因遂申定其制度疏整其疆界非一日而遽能如此也其所由來者漸矣夫井田雖不可為而其實便於今今誠有能為近井田者而用之則亦可以蘇民矣乎聞之董生曰井田雖難卒行宜少近古限民名田以贍不足名田之説盖出於此而後世未有行者非以不便民也懼民不肯損其田以入吾法而遂因此以為變也孔光何武曰吏民名田毋過三十頃期盡三年而犯者没入官夫三十頃之田周民三十夫之田也縱不能盡如周制一人而兼三十夫之田亦已過矣而期之三年是又廹蹙平民使自壞其業非人情難用吾欲少為之限而不奪其田嘗已過吾限者但使後之人不敢多占田以過吾限耳要之數世富者之子孫或不能保其地以復於貧而彼嘗已過吾限者散而入於他人矣或者子孫出而分之已無幾矣如此則富民所占者少而餘地多則貧民易取以為業不為人所役屬各食其地之全利利不分於人而樂輸官夫端坐於朝廷下令於天下不驚民不動衆不用井田之制而獲井田之利雖周之井田何以逺過於此哉水心葉氏進卷曰今之言愛民者臣知其説矣俗吏見近事儒者好逺謀故小者欲抑奪兼并之家以寛細民而大者則欲復古井田之制使其民皆得其利夫抑兼并之術吏之强敏有必行之於州縣者矣而井田之制百年之間士方且相與按圖而畫之轉以相授而自嫌其迂未敢有以告於上者雖告亦莫之聽也夫二説者其為論雖可通而皆非有益於當世為治之道終不在此且不得天下之田盡在官則不可以為井而臣以為雖得天下之田盡在官文武周公復出而治天下亦不必為井何者其為法瑣細煩密非今天下之所能為昔者自黄帝至於成周天子所自治者皆是一國之地是以尺寸步畝可厯見於鄉遂之中而置官帥役民夫正疆界治溝洫終歲辛苦以井田為事而諸侯亦各自治其國百世不移故井田之法可頒於天下然江漢以南濰淄以東其不能為者不强使也今天下為一國雖有郡縣吏皆總於上率二三歲一代其間大吏有不能一歲半歲而代去者是將使誰為之乎就使為之非少假十數歲不能定也此十數歲之内天下將不暇耕乎井田之制雖先廢於商鞅而後諸侯封建絶然封建既絶井田雖在亦不可獨存矣故井田封建相待而行者也夫畎遂溝洫環田而為之間田而疏之要以為人力備盡望之而可觀而得粟之多寡則無異於後世且大陂長堰因山為源鍾固流潦視時決之法簡而易周力少而用博使後世之治無愧於三代則為田之利使民自養於中亦獨何異於古故後世之所以為不如三代者罪在於不能使天下無貧民耳不在於田之必為井不為井也夫已逺者不追已廢者難因今故堰遺陂在百年之外瀦防衆流即之渺然瀰漫千頃者如其湮淤絶滅尚不可求而况井田逺在數千載之上今其阡陌連亘墟聚遷改盖欲求商鞅之所變且不可得矣孔孟生衰周之時井田雖不治而其大略具在勤勤以經界為意歎息先王之良法廢壞於暴君汙吏之手後之儒者乃欲以耳目之所不聞不見之遺言顧從而效之亦咨嗟太息以為不可廢豈不難乎井田既然矣今俗吏欲抑兼并破富人以扶貧弱者意則善矣此可隨時施之於其所治耳非上之所恃以為治也夫州縣獄訟繁多終日之力不能勝大半為富人役耳是以吏不勝忿常欲起而誅之縣官不幸而失養民之權轉歸於富人其積非一世也小民之無田者假田於富人得田而無以為耕借貲於富人歲時有急求於富人其甚者傭作奴婢歸於富人游手末作俳優技藝𫝊食於富人而又上當官輸雜出無數吏常有非時之責無以應上命常取具於富人然則富人者州縣之本上下之所賴也富人為天子養小民又供上用雖厚取贏以自封殖計其勤勞亦略相當矣廼其豪暴過甚兼取無已者吏當教戒之不可敎戒隨事而治之使之自改則止矣不宜豫置疾惡於其心茍欲以立威取名也夫人主既未能自養小民而吏先以破壞富人為事徒使其客主相怨有不安之心此非善為治者也故臣以為儒者復井田之學可罷而俗吏抑兼并富人之意可損因時施智觀世立法誠使制度定於上十年之後無甚富甚貧之民兼并不抑而自已使天下速得生養之利此天子與其羣臣當汲汲為之不然古井田終不可行今之制度又不復立虚談相眩上下乖忤俗吏以卑為實儒者以髙為名天下何從而治哉按自秦廢井田之後後之君子毎慨歎世主不能復三代之法以利其民而使豪强坐擅兼并之利其説固正矣至於斟酌古今究竟利病則莫如老泉水心二公之論最為確實愚又因水心之論而廣之曰井田未易言也周制凡授田不易之地家百畝一易之地二百畝再易之地三百畝則田土之肥瘠所當周知也上地家七人中地家六人下地家五人則民口之衆寡所當周知也上農夫食九人其次食八人其次食七人則其民務農之勤怠又所當周知也農民每户授田百畝其家衆男為餘夫年十六則别受二十五畝士工商受田五口乃當農夫一人每口受二十畝則其民之或長或少或為士或為商或為工又所當周知也為人上者必能備知閭里之利病詳悉如此然後授受之際可以無弊盖古之帝王分土而治外而公侯伯子男内而孤卿大夫所治不過百里之地皆世其土子其人於是取其田疇而伍之經界正井地均榖祿平貪夫豪民不能肆力以違法制汙吏黠胥不能舞文以亂簿書至春秋之世諸侯用兵爭强以相侵奪列國不過數十土地寖廣然又皆為世卿强大夫所裂如魯則季氏之費孟氏之成晉則欒氏之曲沃趙氏之晋陽亦皆世有其地又如邾莒滕薛之𩔖亦皆數百年之國而土地不過五七十里小國寡民法制易立竊意當時有國者授其民以百畝之田壯而畀老而歸不過如後世大富之家以其祖父所世有之田授之佃客程其勤惰以為予奪較其豐凶以為收貸其東阡西陌之利病皆其少壯之所習聞雖無俟乎考覈而姦弊自無所容矣降及戰國大邦凡七而么麽之能自存者無幾諸侯之地愈廣人愈衆雖時君所尚者用兵爭强未嘗以百姓為念然井田之法未全廢也而其弊已不可勝言故孟子有今也制民之產仰不足以事父母俯不足以畜妻子之説又有暴君汙吏慢其經界之説可以見當時未嘗不授田而諸侯之地廣人衆考覈難施故法制隳弛而姦弊滋多也至秦人盡廢井田任民所耕不計多少而隨其所占之田以制賦蔡澤言商君決裂井田廢壞阡陌以靜百姓之業而一其志夫曰靜曰一則可見周授田之制至秦時必是擾亂無章輕重不均矣晦庵語錄亦謂因蔡澤此語可見周制至秦不能無弊漢既承秦而卒不能復三代井田之法何也盖守令之遷除其歲月有限而田土之還授其姦弊無窮雖慈祥如龔黄召杜精明如趙張三王既不久於其政則豈能悉知其土地民俗之所宜如周人授田之法乎則不過受成於吏手安保其無弊後世盖有爭田之訟厯數十年而不決者矣况官授人以田而欲其均平乎杜君卿曰降秦以後阡陌既敝又為隱覈隱覈在乎權宜權宜憑乎簿書簿書既廣必藉衆功藉衆功則政由羣吏由羣吏則人無所信矣夫行不信之法委政於衆多之胥欲紀人事之衆寡明地利之多少雖申商督刑撓首總算不可得而詳矣其説可謂切中秦漢以後之病然揆其本原皆由乎地廣人衆罷侯置守不私其土世其官之所致也是以晋太康時雖有男子一人占田七十畝之制而史不詳言其還受之法未幾五胡雲擾則已無所究詰直至魏孝文始行均田然其立法之大槩亦不過因田之在民者而均之不能盡如三代之制一𫝊而後政已圯亂齊周隋因之得失無以大相逺唐太宗口分世業之制亦多踵後魏之法且聽其買賣而為之限至永徽而後則兼并如故矣盖自秦至今千四百餘年其間能行授田均田之法者自元魏孝文至唐初纔二百年而其制盡隳矣何三代貢助徹之法千餘年而不變也盖有封建足以維持井田故也三代而上天下非天子之所得私也秦廢封建而始以天下奉一人矣三代而上田產非庶人所得私也秦廢井田而始捐田產以與百姓矣秦於其所當予者取之所當取者予之然沿襲既久反古實難欲復封建是自割裂其土宇以啓紛爭欲復井田是强奪民之田產以召怨讟書生之論所以不可行也文獻通考卷一
