body:
  text: 文獻通考卷四十二鄱陽馬端臨貴與著學校考三太學宋初增修國子監學舍周顯德二年以天福普利禪院建國子監修飾先聖十哲像畫七十二賢及先儒二十一人像於東西廊之板壁太祖皇帝開寶八年國子監上言生徒舊數七十人先奉詔令分習五經內有繫籍而不至者又有住京進士諸科常赴講席緣監生元有定數欲以在監習業之人補充生徒詔令元繫籍而聼習不闕得干秋試繫籍而不至者聼於本貫請其未入於籍而聼習者或有冠裳之族不居鄉里令補監生之闕仁宗慶歷二年天章閣侍講王洙言國子監每科場詔下許品官子弟投保官家狀量試藝業給牒充廣文太學律學三館學生多或致千餘人即隨秋試召保取解及科場罷日則生徒散歸考官倚席若此但為遊士寄應之所殊無國子肄習之法居常講筵無一二十人聼講者欲望自今應國子監每遇科場勑下授納取解家狀日已前須實曾附本監聼學滿五百日者許投狀令本授官取文簿勘會詣實依例召京朝官委保方得取應每十人之中與解三人其未係監生欲求試補者亦不限時月投狀試業收補每日講筵應係聼讀生徒並於本授業學官前親書到歷如遇私故出入或疾告歸寧並具狀給假若滿周年不來參假者除落名籍事下國子監本監請自今試補學生聼讀五百日方許取解已得國學文解省試下者止聼讀一百日許再請解又國子監除七品以上子孫許召保官試補外八品以下至庶人子弟例不收補以此每遇科場多有冒稱品官子孫難以詳别或興詞訴請倣唐制立四門學以八品以下至庶人子孫補充學生自今每嵗一補試差學官鎖宿封彌精加考校取文理稍通者具名聞奏給牒收補內不合格者且令理日依舊聼讀後次與試若三試不中不在試補之限從之四月詔國子監太學天下州縣學生更不立聼讀日限以諌官余靖極言其非便故也按古人所謂中年考校九年大成者進德修業之事也至漢人之補博士弟子員則只限以通一經而後授之官唐人之法尚倣佛如此至宋煕豐後立三舍之法則不過試之以浮靡之文而誘之以利祿之途然明經而必至於通一藝試文而必至於歷三舍皆非旦暮可就故國家雖未嘗嚴其法制稽其去留而為士者內耻於習業之未精外誘於榮途之可慕其坐學之日自不容不久今慶歷之法所謂習業者雖有講肄聼讀而未嘗限以通經之嵗月所謂榮途者止於拔解赴省而未嘗别有優異之捷徑此所以科場罷日則生徒散歸講官倚席雖限以聼學之嵗月而不能強其久留反以淹滯為困故不久而遂廢也慶歷三年立四門學以士庶子弟為生員四年判國子監王拱辰等言首善自京師漢太學二百四十房千八百餘室生徒三萬人唐學舍亦千二百間今國子監才二百楹不足以容學者請以錫慶院為太學從之明年三司言更造錫慶院乏財費多而北使錫宴之所不可闕乃復以太學為錫慶院皇祐末以胡瑗為國子監講書専管勾太學數年進天章閣侍講猶兼學正其初人未甚信服乃使其徒之已仕者盛僑顧臨輩分治其事又令孫覺説孟子中都士人稍稍從之一日升堂講易音韻髙朗指意明白衆方大服然在列者皆不喜謗議蜂起瑗不顧強力不倦以卒有立逮今三十餘年猶用其規模不廢瑗在學時每公私試罷掌儀率諸生會於首善令雅樂歌詩乙夜乃散諸齋亦自歌詩奏琴瑟之聲徹於外瑗在湖學教法最備始建太學有司請下湖學取瑗之法以為太學法至今為著令神宗熙寧元年增太學生員慶歷中嘗置內舍生二百人至是又增置一百尋詔九百人為額四年侍御史鄧綰言國家治平百餘年雖有國子監僅容釋奠齋庖而生員無所容至於太學未嘗營建止假錫慶院廊廡數十間生員才三百人請以錫慶院為太學仍修武成王廟為右學上以擬三王四代膠庠序學東西左右之制下則無後於漢唐生員學舍之盛乃詔盡以錫慶院及朝集院西廡建講書堂四諸生齋舍官掌事者直廬略具而太學棟宇始僅足用者自主判官外益至直講總而為十員率二員共講一經委中書選差或主判官奏學生員釐為三等初入學為外舍外舍升內舍內舍升上舍上舍員以百內舍二百外舍不限員各以其經從所講官受學月考試舉業優等上中書其正録學諭以上舍生為之經各二員學行卓異者主判直講復保上中書審察奏除官先有職掌者已受官仍與舊職俟直講教授有闕次第選用議學校貢舉見舉士門初蘇頌子嘉在太學顔復嘗䇿問王莽後周變法事嘉極論為非在優等蘇液密寫以示曾布曰此輩唱和非毁時政布大怒責張琥曰君為諌官判監豈容學官與生徒非毁時政而不彈劾遂以告安石安石大怒遂逐諸學官以李定常秩同判監選用學官非執政所喜者不與陸佃黎宗孟葉濤曾肇沈季良與選季良安石妹壻濤其姪壻佃門人肇布弟也佃等夜在安石齋授口義旦至學講之無一語出已其設三舍皆欲引用其黨耳八年頒王安石詩書周禮義於學詳見舉士門太學安惇等已升上舍皆特免解其自發解者即免禮部試時三舍未有推恩定法故特降命也仁宗時嘗置武學既而中輟至是復置尋詔生員以百人為額又置律學置教授四員公試習律令生員義三道習斷案生員一道刑名五事至七事私試義二道案一道刑名五事至三事元豐二年頒學令太學置八十齋齋容三十人外舍生二千人內舍生三百人上舍生百人總二千四百月一私試嵗一公試補內舍生間嵗一舍試補上舍生封彌謄録如貢舉法而上舍試則學官不與考校公試外舍生入第一第二等參以所書行藝與籍者升內舍內舍試入優平二等參以行藝升上舍上舍分三等俱優為上一優一平為中俱平若一優一否為下上等命以官中等免禮部試下等免解學正增為五人學録增為十人學録參以學生為之太學生虞蕃訟學官升舍偏曲下御史臺核實何正臣請置獄辭所及雖非蕃所嘗言者皆得究治於是追逮遍四方踰年獄始成判監李季長坐受學生竹簟陶器削職停官判監黃履失察陳襄受請皆降罰直講王沇之削籍太常丞余中貶秩皆有賕也又詔嵗賜緡錢至二萬五千又益郡縣田租屋課息錢之類以為學費學制所言國子監以國子名而實未嘗教養國子乃詔許清要官親戚入監為國子生聼讀額二百人仍盡以開封府解額歸諸太學其國子生解額以太學分數取之毋過四十人七年用司業朱服言四方來試禮部者雖不籍於太學或有顯過若造飛語謗朝政許監官以聞用學規殿罰按子産不以鄭人議執政之然否而毁鄉校蓋以學校所以來公論也今煕寧之建太學蘇嘉言變法事忤介甫則學官并坐其罪而改用李定常秩之徒試文則宗新經䇿時務則誇新法今又立飛語謗朝政者以學規殿罰之條則太學之設乃箝制羅織之具耳以是為一道德可乎哲宗元祐六年岑象求等言國學設師生而禁其謁見無從叩問禮部詳度許從長二請益仍立講訓考課之式私試既不鎖宿則是日講説亦不廢七年置廣文館解額先是開封解額稍優四方士子多冒畿縣戶以試又有隸太學不及一年不該解試者亦往往冒戶禮部案舊制凡試國子監者先補中廣文館生乃得以牒求試遂依效其法立廣文館生二千四百員除開封府元解百人則許自試其嘗撥取諸科二百國子額四十通二百四十人者今皆取諸開封府以為本館解額遇科場年試補館生中者執牒詣國子監驗試凡試者十人取一開封考取亦如其數試者不及千人即以率減取仍嚴禁重試禮部言國子生應解已有定額在法試者滿百人即如額取二十人若不滿百與國子混試通取以元祐五年計之凡五人有竒而解一人詔自今太學及國子生發解並以是年分數準此帝既親政羣臣多言元祐所更學校科舉制度非是帝念宣仁保祐功久不許改至是議者益多監察御史郭知章言先帝立三舍法以嵗月稽其行實故入上舍而中上等者得不經禮部試特命以官責備而持久故其得也難自元豐以來應格特命官者林自一人而已誘進激勸莫善於此元祐新令遂罷推恩之制宜復元豐法以廣樂育之德知章又請三學補外舍生依元豐令一嵗四試皆從罷五路經歷通禮科太學生中上舍者悉用元豐制推恩上等即該注官者嵗毋過二人免禮部試者每舉五人而止免解試者二十人而止仍計數對除省試發解額其元祐法勿用諸三舍升補等法悉推行舊制茍合增損即條具以聞紹聖元年國子監奏罷廣文館發解其額本取之開封府諸科及國子悉復還之凡學生自外路參假及新補中未該撥填入學者權附國子監别號試取一次詔五路禮部奏名額以十分之三與府監諸路進士通取二分合五路通取餘五分監自取罷春秋科元符元年詔以命官人許為國子生毋過四十人凡試優取二禮兩經許占全額之半而以其半及他經復置春秋博士崇寧間復罷之徽宗崇寧元年命將作少監李誡即城南門外相地營建外學是為辟雍蔡京又奏古者國內外皆有學周成均蓋在邦中而黨庠遂序則在國外臣親承聖詔天下皆興學貢士即國南建外學以受之俟其行藝中率然後升諸太學凡此聖意悉與古合今上其所當行者太學専處上舍內舍而外學則處外舍生太學上舍本額一百人內舍二百人今貢士盛集欲增上舍至二百人內舍六百人外舍三千人外學為四講堂百齋齋列五楹一齋可容三十人士初貢至皆入外學經試補入上內舍始得進處太學太學外舍亦令出居外學俟學成奏行之其勑令格式悉用太學見制國子祭酒總治學事外學官屬司業丞各一人稍減太學博士正録員歸外學仍增博士為十員正録為五員學士充學諭者十人直學二人俟貢士至為之置諸王宫大小學教授立考選法詔取士皆從學校三舍廢科舉法見舉士門內侍劉公度鄭祿肄業國庠文粗可采特減磨勘以旌之令學生實非資問輒見師長因而干請用學規極等罰之凡奉祠及仕而解官或待次悉許入內外學任子不繫州土隨所寓入學仍别齋居處别號試考曾升補三舍生從後獻助得官其入學視任子法大觀三年提舉淮東常平徐畈言蔭補入官人須隸學及一年不犯上三等罰方許就銓試嘗再入等即免銓試公私試嘗為第一人比銓試推恩從之七年臣僚言進士之中銓格者每一百人而得占注優恩不過五七人去年中上二等皆闕不取今取𨽻學國子試格用之銓法五年而得上二等優恩者二百四十人免試者尚在其外是蔭補𨽻學者優於纍試得第之人詔在學嘗魁一試者許如舊恩餘止令免試注官欽宗靖康元年右諌議大夫楊時言王安石著為邪説以塗學者耳目使蔡京之徒得以輕費妄用極侈靡以奉上幾危宗社乞追奪安石王爵毁去配饗之像使邪説淫辭不能為學者惑詔王安石從祀孔子廟廷禮部其改位置在鄭康成以下御史中丞陳過庭言五經義微諸家因而異見所不能免也以所是者為正所否者為邪此乃一偏之大失也頃者指蘇軾為邪學而加禁切已弛其禁許采其長而用之實為通論祭酒楊時矯枉太過復詆王氏以為邪説此又非也諸生習用王學率衆見時而詆詈之時引避不出乃得散退齋生又自互黨王蘇至相追擊附從者紛紛凡為此者足以明時之不能服衆也詔時罷兼祭酒正言崔鶠言近詔諌臣直論得失以求實是陛下求治切矣然數十年來王公卿相及居要路者皆自蔡京出則安有實是聞於陛下乎且舉馮澥所上之言曰士無異論太學之盛也此姦言也昔王安石斥除異已名臣如韓琦司馬光輩既以異論逐而其所著三經士子宗之者得官不用者黜落則天下靡然無一人敢可否矣陵夷以至大亂則無異論之禍也尚敢為此熒惑也乎其言曰崇寧以來博士各徇其黨而言皆偏異附王學則詆元祐之文附元祐則誚王氏之説此尤欺罔也此時士夫豈有敢學元祐而詆王氏者乎自京賊用事借學法以鉗士人如用軍法以脅卒伍大小相制內外相轄一有異論則學官亦皆黜廢矣此非徒劫持學校也疑有異論則已過且暴聞焉爾而何博士先生稍敢誚詆王氏乎前日博士講解具在取而覆視則澥之誕信見矣至如蘇軾黃庭堅之文集范鎮沈括之雜説或記祖宗典故或載名臣談論慮其鑑照巳罪一切禁錮嚴刑重賞使不敢藏則其禁異亦已極矣而元祐能與王氏兩立乎其欺罔亦已甚矣律學熙寧六年置教授四員凡命官學人皆得自占入學舉人須命官二員任其平素先入學聼讀而後試補習斷案人試案一道習律令人試大義五道月一公試三私試需用古今刑書許於所屬索取凡朝廷新頒條令刑部畫日關送算學崇寧三年立其業以九章周髀及假設疑數為算問仍兼海島孫子五曹張邱建夏侯陽算法并歷算三式天文書為本科本科外人占一小經願占大經者聼公私試三舍法略如太學上舍三等推恩以通仕登仕將仕郎為次容齋洪氏隨筆曰大觀中置算學如庠序之制三年三月詔以文宣王為先師兖鄒荆三國公配饗十哲從祀而列自昔著名算數之人繪像於兩廊加賜五等之爵於是中書舍人張邦昌定其名風后大橈𨽻首容成算子商髙常僕鬼臾區巫咸九人封公史蘇卜徒父卜偃梓貞卜楚邱史趙史墨禆竈榮方甘德石申鮮于妄人耿壽昌夏侯勝京房翼奉李尋張衡周興單揚樊英郭璞何承天宋景業蕭吉臨孝恭張恭張曽元王朴二十八人封伯鄧平劉洪管輅趙逹祖沖之殷紹信都芳許遵耿詢劉焯劉炫傅仁均王孝通瞿曇羅李淳風王希明李鼎祚邊岡郎顗襄楷二十人封子司馬季主洛下閎嚴君平劉徽薑岌張邱建夏侯陽甄鸞盧太翼九人封男考其所條具固有於傳記無聞者而髙下等差殊為乖謬如司馬季主嚴君平止於男爵鮮于妄人洛下閎同定太初歷而妄人封伯下閎封男尤可笑也十一月又改以黃帝為先師云書學篆𨽻草三體字説文字説爾雅博雅方言五書仍兼通論語孟子義願占大經者聼三舍試補升降略同算學法推恩差降一等畫學曰佛道人物山水鳥獸花竹屋木以説文爾雅方言釋名教授説文則令篆字著音訓餘書皆設答以所解義觀其能通畫意與否仍分士流雜流别其齋以居之士流兼習一大經一小經雜流則誦小經或讀律考畫文等以不倣前人而物之情態形色俱若自然筆韻髙簡為工三舍試補升降以及推恩略同書學惟雜流授官止自三班借職以下三等醫學初𨽻太常寺神宗時置提舉判局始不𨽻太常亦置教授一員翰林醫官以下與上等學生及在外良醫為之學生常以春試取三百人為額三學生願預者聼倣三學之制立三舍法為三科以教諸生有方脈科針科瘍科方脈以素問難經脈經為大經病源千金翼方為小經考察升補等略如諸學之法其選用最髙者為尚藥醫師以次醫職餘各以等補官為本學博士正録及外州醫學教授云小學見童科門髙宗建炎初詔即駐蹕所置國子監立博士二員以隨駕之士三十六人為監生國子監生員皆胄子也舊制行在職事官同姓緦麻親釐務官大功親聼補試入學每三年科場舉三人取一若未補中則七人取一然太學生皆得以公私試積校定分數升舍惟國子生以父兄嫌但寄理而已須父兄外補乃移入太學而得升紹興八年葉林上書言西漢奪於大盜天下非漢有矣光武起於河朔五年而建太學西晉滅於狂胡天下非晉有矣元帝興於江左一年而建太學光武時十分天下有其四元帝時十分天下有其二然二君急於教養未嘗以恢復為辭饋餉為解我宋以儒立國垂二百年懿範閎規非漢晉比也今中興聖祚駐蹕東南百司庶府經營略備若起太學計官吏生徒姑養五百人不過費陛下一觀察使之月俸願謀之大臣咨之宿學亟復盛典以昌文治而廷臣皆曰若倣元豐則軍食未暇而削弱非禮也請徐議之十三年始建太學置祭酒司業各一員博士三員正録各一員養士七百人上舍生三十員內舍生百員外舍生五百七十員凡諸道住本貫學滿一年三試中選不犯第三等已上罰或雖不住學而曽兩預釋奠及齒於鄉飲酒者聼取應充弟子員是嵗秋季始開補就試者五千人自後春秋兩補三舍舊法凡四百十條紹興重修視元豐尤密諸齋長諭月書學生行藝於籍行謂帥教不戾規矩藝謂治經程文每季終論可選者考於學諭仲月後入學者次季選考十日考於學録二十日考於學正三十日考於博士四十日考於長二嵗終校定三經季選者準此校定至升補日展一季外舍百人內舍三十人注於籍如逐舍與校定生不滿元額即計分數取內舍仍分優平二等於次年六月以前聞奏諸補內舍附公試以外舍上二等同考選簿參定若簿內所選者據闕升補闕多就試人少者以就試人所為率不得過一分五釐上舍準此不得過三分若簿未成其合理升補年月聼以試中日為始即試雖入上二等而考選不預者候補一嵗私試入三等及不犯三等已上罰或預選而試不入上二等者候再試入三等已上聼補諸補上舍以間嵗九月五日鎖院發解年侯試畢别為一甲附試考校合格分優平二等奏號長二同拆號官入院以所奏行藝參定俱優為上一優一平為中俱平或一優一否為下否謂已經三季已上選或校考不預聞奏而試入優等及有優等校定而試不入等者注籍訖具名聞奏上等命以官中等免省下等免解中下等補及一年並申尚書禮部若下等自該免解及已經免解而再該免者即與免省其不自該免者許再試入優與升等王㬇知臨安府括民間冒占白地錢嵗入十二萬緡有畸為太學養士之費十八年詔太學在籍外舍生若入學已及五年不預校定及不曽請到國學解或不曾公試入等自紹興十九年為始嵗終檢校除籍免請本州公據止召本學生二員委保再補以後嵗終依此檢校權禮部侍郎陳誠之言國庠立額不為不廣然有待闕之士者臣嘗得其説矣京師視四方為甚逺非身𨽻業上庠者不能取應其請假歸省即就鄉舉故額常有餘今首善之地江浙士人便於往來一補中外舍即無假滿不參之人故未嘗有闕後來之士將何以待之國子監勘會昨京師上庠外舍生以二千人為額自來未嘗滿額蓋緣四方士人請假歸鄉道途既逺往往止就鄉舉又舊法或三經試而不與升補或兩經試而曽犯規罰自有除籍之法所以闕額周流源源不塞今來上庠見以一千人為額江浙士人往還既無告假逾限除籍之慮得以故作規避占據學籍使有司補試不行有妨後進故有是命按自崇觀以來三舍之法大備議者病其立捷徑之塗長奔競之風然觀此疏則知當時尚有參假而歸復取鄉舉者如後來之法以資望言則舍選尊而鄉舉卑以名額言則舍選優而鄉舉窄蓋未嘗有以太學生退就鄉舉者非惟國家無此法而士亦決不肯辭尊而居卑舍優而就窄矣二十七年詔自今以春季放補省試年即以孟夏立為定制孝宗隆興元年始三嵗一補太學遇覃恩舊無免解法帝始創行之自是為例省額增數十人乾道二年詔下省併曽請舉赴補人以太學遇省闕額收補額外勿增在朝清要官期親許牒子弟作待補國子别號考校如太學生遇有期親任清要官更有國子生不預校定外補及差職事惟得赴公試私試科舉則混試焉舊公私試皆學官主之自淳熙後公試仍鎖院降勑差官學官不預太學補弟子員故例每三嵗科舉後朝廷差官鎖院凡四方舉人皆得就試取合格者補入之謂之混補淳熙後朝議以就試者多欲為之限制乃立待補之法諸路漕司及州軍皆以解試終場人數為凖每百人而取六人許赴補試率以開院後十日揭榜然逺方士人多不就試則為他人取其公據代之冒濫滋甚慶元中遂罷之嘉泰二年復行混補就試者至三萬七十餘人分六場十八日引試云三年黃倫以兩優釋褐自紹興建學至是始有兩優用崇寧恩例授承務郎國子録朝野雜記舊制太學上舍生積校已優而舍試又入優等者就化原堂釋褐號釋褐狀元例補承事郎太學正録淳熙初鄭鑑自明由此選不四年而為著作郎補郡自明數言事上甚喜久而稍厭之六年劉純叟堯夫復以解褐除國子正時王仲行為兵部尚書奏言今兩優釋褐初授京秩即授學官視狀元制科恩數過之事理不當乞先與外任時知滁州張商卿亦言今中上舍為學官不數年便可作監司郡守獄訟財賦非所素習豈能保其不謬乞先注職官上然之十月丙申詔與殿試第二人恩例光宗紹熙三年禮部侍郎倪思請混補以徠多士詔兩省臺諌可否於是吏部尚書趙汝愚等合奏曰伏奉詔書講論混補之法蓋有根本之論稍師古始而言我國家恢儒右文列聖一揆內自京師外至郡縣皆有學慶歷以後文物彬彬幾與三代同風逮至崇寧創行舍法誠得黨庠遂序之遺意故一時學者粗知防檢非冠帶不敢行於道路遇鄉曲之長及學校之職則斂容而避之習俗誠美矣而其失也在於専習經義崇尚老莊廢黜春秋絶滅史學又罷去科舉遂使寒畯之士進取無他塗事理俱違旋行廢革炎祚中興始建太學於行都行貢舉於諸郡然奔競之風勝忠信之俗微亦惟榮辱升沉皆不由乎學校至於德行道藝惟取決於糊名茍為雕篆之文無復進修之志視庠序如傳舍目師儒如路人季考月書盡成文具臣請逺稽古制近酌時宜不煩朝廷建官不勞有司增費惟重教官之選仍假守二之權倣舍法以育才因大比而取士考終場之數定所貢之員期以次年試於太學庶幾士修實行不事虗文漸復淳風仰禆大化有三舍之利而無三舍之害其諸州教養課試升貢之法下有司條上思議遂寢時朱熹門人或問三舍法如何熹曰欠去根頭理會若太學無非望之恩又於鄉舉額窄處增之則人自安鄉里矣朱子學校貢舉私議曰學校必選實有道德之人使為學官以來實學之士裁減解額舍選謬濫之恩以塞利誘之塗蓋古之太學主於教人而因以取士故士之來者為義而不為利且以本朝之事言之如李豸所記元祐侍講吕希哲之言曰仁宗之時太學之法寬簡國子先生必求天下賢士真可為人師者就其中又擇其尤賢者如胡翼之之徒使専教導規矩之事故當是時天下之士不逺萬里來悅師之其遊太學者端為道藝稱弟子者中心悅而誠服之蓋猶有古法之遺意也熙寧以來此法浸壞所謂太學者但為聲利之場而掌其教事者不過取其善為科舉之文而嘗得雋於場屋者耳士之有志於義理者既無求於學其奔趨輻輳而來者不過為解額之濫舍選之私而已師生相視漠然如行路之人間相與言亦未嘗開之以德行道藝之實而月書季考者又祗以促其嗜利茍得冒昧無恥之心殊非國家之所以立學教人之本意也欲革其弊莫若一遵仁皇之制擇士之有道德可為人師者以為學官而久其任使之講明道藝以教訓其學者而又痛減解額之濫以還諸州罷去舍選之法而使為之師者考察諸州所解德行之士與諸生之賢者而特命以官則大學之教不為虛設而彼懷利干進之流自無所為而至矣如此則待補之法固可罷去而混補者又必使與諸州科舉同日引試則彼有鄉舉之可望者自不復來而不患其紛冗矣至於取人之數則又嚴為之額而許其補中之人從上幾分特赴省試則其舍鄉舉而來赴補者亦不為甚失職矣其計會監試漕試附試之類亦當痛減分數嚴立告賞以絶其冒濫其諸州教官亦以德行人充而責以教導之實則州縣之學亦稍知義理之教而不但為科舉之學矣寧宗慶元二年以國子生員多偽濫制自今職事官期親釐務官子孫乃得試補凡監學生皆給綾牒若告謁在外遇科舉試於漕司嘉定七年祭酒請以外舍分數及五分或六分最優者一人與次年升內舍後二年家始以外優升嵗為定例宗學紹興十四年建於臨安學生以百員為額太學生五十人小學生四十人職事各五人置諸王宫大小學教授一員在學者皆南宫北宅子孫若親賢宅近屬則别選館職以教授焉寧宗嘉定九年詔諸王宫學改作宗學參之國朝典故仍𨽻宗正寺以宫教授改為博士宗諭葉適論學校曰何謂京師之學有考察之法而以利誘天下三代漢儒其言學法盛矣皆人耳目之熟知不復論若東漢太學則誠善矣唐初猶得為美觀本朝其始議建學久而不克就至王安石乃卒就之然未幾而大獄起矣崇觀間以俊秀聞於學者旋為大官宣和靖康所用誤朝之臣大抵學校之名士也及諸生伏闕捶鼓以請起李綱天下或以為有忠義之氣而朝廷以為倡亂動衆者無如太學之士及秦檜為相務使諸生為無亷耻以媚已而以小利啖之隂以拒塞言者士人靡然成風獻頌拜表希望恩澤一有不及謗議喧然故至於今日太學尤弊遂為姑息之地夫正誼明道以此律已以此化人宜莫如天子之學而今也何使之至此蓋其本為之法使月書季考校定分數之毫釐以為終身之利害而其外又以勢利招來之是宜其至此而無怪也何謂州縣之學無考察之法則聚食而已往者崇觀政和間蓋嘗考察州縣之學如天子之學使士之進皆由此而罷科舉此其法度未必不善然所以行是法者皆天下之小人也故不久而遂廢今州縣有學宫室廩餼無所不備置官立師其過於漢唐甚逺惟其無所考察而徒以聚食而士之俊秀者不願於學矣州縣有學先王之餘意幸而復見將以造士使之俊秀而其俊秀者乃反不願於學豈非法度之有所偏而講之不至乎今宜稍重太學變其故習無以利誘擇當世之大儒久於其職而相與為師友講習之道使源流有所自出其卓然成德者朝廷官使之為無難矣而州縣之學宜使考察上於監司聞於禮部逹於天子其卓然成德者或進於太學或遂官之人知由學而科舉之陋稍可洗去學有本統而古人文憲庶不墜失若此類者更法定制皆於朝廷非有所難顧自以為不可為耳雖然治道不明其紀綱度數不一揭而正則宜有不可為者陛下一揭而正之如此類者雖欲不為亦不可得也東萊吕氏曰先王之制度雖自秦漢以來皆弛壞廢絶然其他如禮樂法度尚可因影見形因枝葉可以尋本根惟是學校幾乎與先王全然背馳不可復考且如禮後世所傳固非先王之舊如射饗宗廟明堂雖是展轉參雜而有識之者猶自可見且樂如韶樂文始五行之舞全然非舊然知鍾律者尚自可以推尋復先王六律五音之舊且如官名後世至體統斷絶然而自上臨下以大統小左右相司彼此相參推此尚可以及先王之舊惟是學校一制與古大不同前此數者猶是流傳差誤然學校不特流傳差誤乃與先王之學全然背馳且如唐虞三代設教與後世學校大假不同只舉學官一事可見在舜時命夔典樂教胄子在周時大司樂掌成均之法以治建國之學政而合國之子弟焉何故皆是掌樂之官掌教蓋其優遊涵養鼓舞動蕩有以深入人心處却不是設一箇官司自秦漢以後錯把作官司看了故與唐虞三代題目自别雖足以善人之形而不足以善人之心雖是法度具舉然亦不過以法制相臨都無深入人心道理大抵教與政自是兩事後世錯認便把教做政看若後世學校全不可法大率因枝葉可以見本根今則但當看三代所以設教命官教養之意且如周禮一書設官設教所以便民若師氏保氏大司樂大胥小胥之類所教者不過是國子然當時所謂鄉遂所以興賢能在周三百六十之官並不見有設教之官雖是州序黨遂略見於周禮然而未嘗見其州序是何人掌之其法又如何只看此亦是學者所當深思且如周公設官下至於射夭鳥至微至纎之事尚皆具載豈於興賢能國之大教不見其明文其他大綱小紀表裏如此備具學者須要識先王之意只緣不是官司凡領於六官者皆是法之所寓惟是學校之官不領於六官非簿書期會之事其上者三公論道不載於書其下者學官設教不領於六官蓋此二者皆是事大體重非官司所領惟是國子是世祿之官鮮克由禮以蕩凌德實悖天道不可不設官以教養之然而所以教養之意上與三公其事大體重均非有司簿書期會之可領要當識先王之意雖非六官之所掌而所以設教未嘗有理無事有體無用本末亦自備見但不在官聨官屬之中舜之時自國子之外略不見其掌教之官然庶頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而揚之如此之備在周人學官雖不領於一屬然而比年入學中年考校一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通逹強立而不反謂之大成終始備具至於不率教者屏之逺方終身不齒這又見體用本未無窮大抵學校大意唐虞三代以前不做官司看秦漢以後却做官司看了所以後世之學不可推尋求之唐虞三代足矣秦漢之事當束之不觀今所詳編者要當推此意大抵看後世秦漢一假錯認教為政全然背馳自秦至五代好文之君時復能舉如武帝表章六經興太學不足論如光武為諸生投戈講義初建三雍亦不足論如後魏孝文遷都洛陽欲改戎狄之俗亦不足論如唐太宗貞觀之初功成治定將欲文飾治具廣學舍千二百區遊學者至八千餘人亦不足道這箇都是要得鋪張顯設以為美觀惟是擾攘之國僻陋之邦剛明之君其視學校若弊屣斷梗然而有不能已者見得理義之在人心不可已處今時學者多是去看武帝光武魏孝文唐太宗做是不知這箇用心內外不同止是文飾治具其去唐虞三代學校却逺却是擾攘之時剛武之君偏迫之國本不理會如南北朝雖是草創若不足觀却不是文飾自有一箇不能已處其去唐虞三代學校却近惜乎無鴻儒碩師發明之這般處學者須深考其他制度一一能考亦自可見學校之所以得失三代以上所以設教命官至理精義要當深考文獻通考卷四十二
