body:
  text: 文獻通考卷一百七鄱陽馬端臨貴與著王禮考二朝儀開元中蕭嵩奏每月朔望皇帝受朝於宣政殿先列仗衛及文武四品以下於庭侍中奏外辦上乃歩自西序門出升御座朝罷入自御座起歩入東序門然後放仗散臣以為宸儀肅穆升降俯仰衆人不合得而見之乃請備羽扇於殿兩廂上將出所司承㫖索扇扇合上坐定乃去扇給事中奏無事上將退又索扇如初今以為常八年中書門下奏曰冬至一陽生萬物潛動所以自古聖帝明王皆此日朝萬國觀雲物禮之大者莫逾是時其日亦祀圜丘皆令得攝官行事質眀既畢日出視朝國家以來更無改易緣脩新格将其日祀圜丘遂改用小冬日受朝若親拜南郊受朝須改既令攝祭理不可移伏請改正從之因勅自今已後冬至日受朝永為常式至天寳三載十一月五日甲子冬至勅伏以昊天上帝義在尊嚴恭惟祀典每用冬至既於是日有事圜丘更受朝賀實深兢愓自今已後冬至宜取以次日受朝仍永為常式至永泰二年十一月三日詔以十三日甲子冬至令有司祭南郊於含元殿受朝賀至建中二年十一月二十日敕宜以冬至日受朝賀二十五年御史大夫李通之奏每至冬至及緣大禮應朝參官併六品清官並服朱衣餘六品以下許通著袴褶如有襂故准式不合著朱衣袴褶者其日聽不入朝自餘應合著而不著者請奪一月俸以懲不恪制曰可天寳六載敕中書門下奏承前諸道差使賀正十二月早到或有先見或有不見其所賀正表但送省司又不通進因循日久於禮全乖望自今已後應賀正使並取元日隨亰官例序立便見通事舎人奏知其表直送四方館元日仗下後一日同進敕㫖依肅宗乾元三年敕員外郎五品以上常參官自今已後非朔望日許不入賊平之後依舊常參時安史據河洛代宗廣徳二年敕常參官遇泥雨准儀制令停朝參今軍國事殷若准式停恐有廢闕泥既深阻許延三刻傳㸃待道路通依常式徳宗建中元年十一月朔御宣政殿朝集使及貢士見自兵興以來典禮廢墜州郡不上計内外不㑹同者二十五年至此始復舊典州府計吏至者一百七十有三二年正月朔御含元殿四方貢獻列為庭實復舊例也御史中丞竇參奏准儀制令泥雨合停朝參伏以軍國事殷恐有廢缺請令每司長官一人入朝有兩員併副貳亦許分日其夜甚雨至眀不止許令仗下到廊食訖入中書其餘官及王府長官並請停朝任於本司勾當公事泥雨經旬亦望准此是年舉故事置武班朝參其廊下食等亦宜加給貞元七年詔常參官入閤不得奔走其有司以下喪者禁襂服朝㑹復衣綾袍金玉帶初金吾将軍沈房有弟喪公服不衣襂服入門上問宰臣董晉對曰准式朝官有司以下喪者許服絁縵衣不合淺色上曰南班何得有之對曰因循而然又曰在式朝官皆以綾為袍五品以上服金玉帶取其文綵華飾以奉上也昔尚書郎含香此意也十五年膳部郎中歸崇敬以百官朝服袴褶非古禮上疏云按三代典禮兩漢史籍並無袴褶之制亦未詳所起之由隋代以來始有服者事不師古請罷之奏可憲宗元和元年三月准吏部兵部尚書侍郎郎官并禮部侍郎御史中丞武元衡奏前件等司近起十月至來年三月稱在選舉限内不奉朝參令式無文禮敬斯闕一年之内半嵗不朝去貞元十二年中丞王顔奉敕釐革載在明文尋又因循輙自更改若以兵吏禮部舉選限内事繁即中書門下御史臺度支亰兆府公事至重朝請如常又况旬節已賜歸休常參又許分日一月之内才奉十日朝參其間甚熱甚寒皆蒙頒放臣以為王顔舉奏甚詳當時敕文甚備准貞元十一年四月敕㫖自今以後永為常式他年妄改條請委臺司彈奏庻使班行式叙典法無虧依奏二年御史臺奏文武常參官准乾元元年敕如有朝堂相弔慰及跪拜待漏行立不序談笑喧譁入衙門執笏不端行立遲慢至班列立不正趨拜失儀言語微喧穿班仗出閤門不卽就班無故離位廊下食行坐失儀語閙入朝及退朝不從正衙出入非公事入中書每犯奪一月俸今啇量舊條每罰各減半有犯必舉不敢寛容如所由指揮尚抵拒飾非即請准舊例錄奏貶官從之十年三月壬申朔御延英殿召對宰臣故事朔望日御宣政殿見羣臣謂之大朝元宗始以朔望陵寝薦食不聽政其後遂以為常今之見宰臣特以事召也武宗㑹昌二年中書門下奏元日御含元殿百官就列惟宰相及兩省官皆未索扇前立於欄檻之内及扇開便侍立於御前三朝大慶萬邦稱賀惟宰相侍臣同介胄武夫竟不拜至尊而退酌於禮意事未得中臣啇量請御殿日昧爽宰相兩省官對班於黄案前俟扇開通事贊兩省官再拜拜訖升殿侍立從之昭宗天佑二年敇漢宣帝中興五日一聽朝歴代通規宜為常式今後每月只許一五九日開延英計九度其入閤日仍於延英日一度指揮如有大段公事中書門下具榜子奏請開延英不計日數三年敇文武百僚每月一度入閤於貞觀殿貞觀大殿朝廷正衙正至之辰受羣臣朝賀比來視朔未正規儀今後於崇勲殿入閤唐開元禮皇帝正至受羣臣朝賀儀前一日尚舎奉御設御幄於太極殿北壁下南向鋪御座如常守宫設羣官客使等次於東西朝堂太樂令展宫懸於殿庭設麾於殿上西階之西東向一位於樂懸東南西向鼓吹令分置十二按於建鼓之外乘黄令陳車輅尚輦奉御陳輿輦尚舎奉御設解劍席於懸西北横街之南並如常儀典儀設文官三品以上位於横街之南道東褒聖侯於三品之下介公酅公於道西武官三品以上於介公之西少南每等異位重行北面相對為首設文官四品五品位於懸東六品以下於横街南每等異位重行西面北上設諸州朝集使位都督刺史及三品以上東方南方於文官三品之東重行北面西上西方北方於武官三品之西重行北面東上四品以下皆分方位於文武官當品之下諸州使人分方位於朝集使下亦如之設諸親位於四品五品之南皇宗親在東異姓親在西設諸方客位三等以上東方南方於東方朝集使之東每國異位重行北面西上西方北方於西方朝集使之西每國異位重行北面東上四等以下分方位於朝集使六品之下重行每等異位設典儀位於懸之東北贊者二人在南少退俱西面奉禮設門外位文官於東朝堂每等異位重行西面褒聖侯於三品之下介公酅公於西朝堂之前武官於介公之南少退每等異位重行東面諸親位文武官四品五品之南皇宗親在東異姓親在西設諸州朝集使位東方南方於宗親之南每等異位重行西面西方北方於異姓親之南每等異位重行東面諸州使人分方位於朝集使之下亦如之諸方客位東方南方於東方朝集使之南每國異位重行西面北上西方北方於西方朝集使之南東面北上其日依時刻將士填街諸衛勒所部列黄麾大仗屯門及陳於殿庭如常儀羣官諸親客使集朝堂皆就次各服其服侍中版奏請中嚴太樂令帥工人入就位協律郎入就舉麾位諸侍衛之官各服其器服符寳郎奉寳俱詣閤奉迎典儀帥贊者先入就位吏兵部主客戸部贊羣官客使俱出次通事舎人各引就朝堂前位又通事舎人引四品以下及諸親客使等應先置者入就位侍中版奏外辦皇帝服衮冕冬至則服通天冠綘紗袍御輿以出曲直華盖警蹕侍衛如常儀皇帝将出仗動太樂令令撞黄鍾之鐘右五鐘皆應協律郎俛仗舉麾鼓柷奏太和之樂鼓吹振作以姑洗之均皇帝出自西房即御座南向坐符寳郎奉寳置於御座如常協律郎偃麾戞敔樂止通事舎人引王公以下及諸方客使等以次入就位皇太子若來朝則皇太子朝出訖典謁引公王以下入公初入門舒和之樂作至位樂止羣官客使等立定典儀唱再拜贊者承傳羣官客使等皆拜訖通事舎人引上公一人詣西階公初行樂作至解劍席樂止公就席脱舄跪解劍置於席俛伏興通事舎人引升階進當御座前北面跪賀稱某官臣言賀詞與太子同唯稱尊號為異賀訖俛伏興通事舎人引降階詣席後上公跪著劍俛伏興納舄樂作復横街南位樂止羣官客使等俱再拜侍中前承詔降詣羣官東北西面稱有制羣官客使等皆再拜宣制曰履新之慶與公等同之冬至云履長之慶與公等同之宣訖羣官客使等皆再拜訖舞蹈三稱萬嵗訖又再拜侍中還侍位初羣官将朝中書侍郎以諸州鎮表别為一案俟於右延眀門外給事中以祥瑞案俟於左延眀門外俱令史絳公服對舉案侍中給事中俱就侍臣班於客使入戸部以諸州貢物陳於太極門東西廂禮部以諸藩貢物最可執者蕃客手執入就内位其重大者陳於朝堂前初上公將入門中書侍郎降引表案入詣西階下東面立給事中降引祥瑞案入詣東階下西面立上公將升賀中書令黄門侍郎俱降各立階下初上公升階中書令黄門侍郎各取所奏之文以次升上公賀訖中書令前跪奏諸方表訖黄門侍郎又進跪奏祥瑞訖俱降置所奏之文於案各還侍立侍郎與給事中引案退至東西階前案遂出侍郎給事還侍立初侍中宣制訖朝集使及蕃客皆再拜訖戸部尚書進詣階間北面跪奏其尚書奏仍待黄門侍郎奏祥瑞訖稱戸部尚書臣某言諸州貢物請付所司俛伏興侍中前承制退稱制曰可尚書退復位禮部尚書以次進詣階間北面跪奏稱禮部尚書臣某言諸蕃貢物請付所司俛伏興侍中前承制退稱制曰可尚書退復位侍中還侍位太府率其屬受諸州及諸蕃貢物出歸仁納義門執物者隨之典儀曰再拜通事舎人以次引北面位者出公初行樂作出門樂止侍中前跪奏稱侍中臣某禮畢俛伏興還侍位皇帝興太樂令令撞㽔賓之鐘左右五鐘皆應奏太和之樂鼓吹振作皇帝降座御輿入自東房侍衛警蹕如來儀侍臣從至閤樂止通事舎人引東西面位者以次出蕃客先出其冬至受朝則不奏祥瑞貢物又無諸方表㑹朝訖太樂令設登歌於殿上引二舞入立於懸南面尚舎奉御鋪羣官升殿者座文官三品以上於御座東南西向褒聖侯於三品之下介公􅈶公於御座西南東向武官三品以下於介公􅈶公之後朝集使都督刺史及三品以上東方南方於文官三品之後西方北方於武官三品之後蕃客三等以上東方南方於東方朝集使之後西方北方於西方朝集使之後俱重行每等異位以北為上設不升殿者座各於其位又設羣官解劍席於懸之西北横街之南並如常儀尚食奉御設夀罇於殿上東序之端西向設坫於罇南加爵一太官令設升殿者酒罇於東西廂近北設殿庭羣官酒罇各於其座之南皆有坫羃俱幛以帷施設訖吏部兵部戸部主客贊羣官客使俱出次通事舎人各引就朝堂前位典儀帥贊者先入就位通事舎人各引升陛者次入就位侍中版奏外辦皇帝服通天冠絳紗袍冬至則不改服御輿以出曲直華盖警蹕侍衛如常儀皇帝将出仗動太樂令撞黄鍾之鐘右五鐘皆應奏太和之樂鼓吹振作皇帝出自西房即御座南向坐符寳郎奉寳置於座如常樂止典儀一人升就東階上西面立通事舎人引王公以下及諸客使以次入就位公王初入門樂作至位樂止羣官客使立定若朝㑹日别設位贊拜陳引如朝禮其日二舞與工人俱入就位侍中進當御座前北面跪奏稱侍中臣某言請延諸公王等升俛伏興又侍中稱制曰可侍中詣東階上西面稱制延公王等升殿上典儀承傳階下贊者又承傳羣官客使皆再拜侍中還位羣官拜訖通事舎人引應升殿者詣東西階公初行樂作至解劍席樂止公王以下各脱舄跪解劍置於席上俛伏興通事舎人接引上公一人升階少東西面立定以下各立於座後立定光祿卿進詣階間跪奏稱臣某言請賜羣臣上夀俛伏興侍中稱制曰可