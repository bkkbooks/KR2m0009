同若言官是近臣於禮尤宜肅謹起今後逐日常朝宣不坐除職事官押班不拜外其兩省官與東西班並齊拜從之天成元年五月十九日敕本朝舊日趨朝官置待漏院候子城門開便入立班如遇不坐前一日晩便宣來日兩衙不坐其日纔眀閤門立班便宣不坐百官各退歸司近年以來雖遇不坐正殿或是延英對宰臣或是内殿親决機務所司不循舊制往往及辰巳之時尚未放班既日色已髙人心咸倦今後若遇不坐日未御内殿前便令閤門使宣不坐放朝班退五月詔每月朔望日賜百官廊下餐唐室升平日常參官每日朝退賜食謂之廊餐自乾符亂離之後祗遇月旦入閤日賜食上初即位命百官五日一起居李琪以為非故事請罷之唯每月朔望日入閤賜食至是宣㫖朔望入閤外依舊五日一起居遂為定式五代史李琪傳曰唐末喪亂朝廷之禮壊天子未嘗視朝而入閤之制亦廢常參之官日至正衙者傳聞不坐即退獨大臣奏事日一見便殿而侍從内諸司日再朝而已眀宗初即位乃詔羣臣五日一隨宰相入見内殿謂之起居琪以謂非唐故事請罷五日起居而復朔望入閤眀宗曰五日起居吾思所以數見羣臣也不可罷而朔望入閤可復然唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寝有思慕之心不能臨前殿則御便殿見羣臣曰入閤宣政前殿也謂之衙衙有仗紫宸便殿也謂之閤其不御前殿而御紫宸也乃自正衙喚仗由閤門而入閤官俟朝於衙者因隨以入見故謂之入閤然衙朝也其禮尊閤宴見也其事殺自乾符已後因亂禮闕天子不能日見羣臣而見朔望故正衙常日廢仗而朔望入閤有仗其後習見遂以入閤為重至出御前殿猶謂之入閤其後亦廢至是而復然有司不能講正其事凡羣臣五日一入見中興殿便殿也此入閤之遺制而謂之起居朔望一出御文眀殿前殿也反謂之入閤琪皆不能正也琪又建言入閤有待制次對官論事而内殿起居一見而退欲有言者無由自陳非所以數見羣臣之意也眀宗乃詔起居日有言事者許出行自陳又詔百官以次轉對二年中書門下奏逐日常朝宣奉敕不坐兩省官與東西兩班並拜押班宰臣不拜或聞班行所論承前有廊餐百官謝食兩省即各有常厨從來不拜或云有侍臣不拜檢尋故實不見眀規百官拜為廊餐即承㫖合宣有敕賜食供奉官不拜亦恐非儀且左右前後之臣日面天顔豈可不拜臣等啇量今後常朝押班宰臣亦拜通事舎人亦拜閤門外放仗亦拜從之晉開運元年十一月尚書吏部侍郎張昭逺奏文武常參官日於正衙立班閤門使宣不坐後百僚俱拜舊制唯押班宰相押樓御史通事舎人各緣提舉贊揚所以不隨庶官俱拜自唐天成末議者不悉朝儀遽違舊典遂令押班之職一例折腰此則深忽禮文殊乖故實且宰相居庶僚之首御史持百職之綱嚴肅禁庭糾繩班列慮於拜揖之際或爽進退之宜於是凝立静觀檢其去就若令旅拜旅揖實恐非儀况事要酌中恭須近禮人臣愛主不在於斯其通事舎人職司贊導比者兩班進退贊相其宜今則在文班武班之前居一品二品之上押笏齊拜禮實未聞其押班宰相押樓御史通事舎人並請依天成三年已前禮例施行殿中侍御史賈元珪奏除押樓御史通事舎人請依張昭逺奏其宰臣押班請依舊設拜從之石林葉氏曰唐以宣政殿為前殿謂之正衙即古之内朝也以紫宸殿為便殿謂之上閤即古之燕朝也而外别有含元殿古者天子三朝外朝内朝燕朝外朝在王宫庫門外有非常之事以詢萬民於宫中内朝在路門外燕朝在路門内蓋内朝以見羣臣或謂之路朝燕朝以聽政猶今之奏事或謂之燕寝鄭氏小宗伯注以漢司徒府有天子以下大㑹殿為周之外朝而蕭何造未央宫言前殿則宜有後殿大㑹殿設於司徒府則為外朝而宫中有前後則為内朝燕朝蓋去周猶未逺也唐含元殿宜如漢之大㑹殿宣政紫宸乃前後殿其沿習有自來矣方其盛時宣政蓋常朝日見羣臣遇朔望陵寢薦食然後御紫宸旋傳宣喚仗入閤宰相押之由閤門進百官隨之入謂之喚仗入閤紫宸殿言閤猶古之言寢此御朝之常制也中世亂離宣政不復御正衙立仗之禮遂廢惟以隻日常朝御紫宸而不設仗敬宗始復修之因以朔望陳仗紫宸以為盛禮亦謂之入閤誤矣又曰唐正衙日見羣臣百官皆在謂之常參喚仗入閤百官亦隨以入則唐制天子未嘗不日見百官也其後不御正衙紫宸所見惟大臣及内諸司百官俟朝於正衙者傳聞不坐即退則百官無復見天子矣敬宗再舉入閤禮之後百官復存朔望兩朝至五代又廢故後唐眀宗始詔羣臣每五日一隨宰相入見謂之起居時李琪為中丞以為非禮請復朔望入閤之禮眀宗曰五日起居吾思見羣臣不可罷朔望入閤可復遂以五日羣臣一入見中興便殿為起居朔望天子一出御文眀前殿為入閤訖於宋朝不改元豐官制行始詔侍從官而上日朝垂拱謂之常參官百司朝官以上每五日一朝紫宸為六參官在亰朝官以上朔望一朝紫宸為朔參官遂為定制宋朝因唐與五代之制文武官每日赴文眀殿正衙常參宰相一人押班五日起居即崇徳長春二殿中書門下為班首其長春殿常朝則内侍省都知押班率内供奉官以下并寄班等先起居次閤門使次三班使臣節度觀察防禦團練刺史等子弟充供奉官侍禁殿直有㫖令預内朝起居者次内殿當直諸班殿前指揮使左右班都虞侯以下内殿直散直散指揮散都頭金槍班等次長入祗候東西班殿侍次御前忠佐次殿前都指揮使率軍校至副指揮使次駙馬都尉任刺史以上者綴本班次諸王府僚次殿前司諸軍使都頭次皇親將軍以下至殿直次行門指揮使率行門起居以上並内侍贊謁如傳宣前殿不坐即宰相與樞密使文眀殿學士三司使翰林樞密直學士中書舎人三司副使知起居注皇城内監庫藏朝官諸司使副内殿崇班供奉官侍禁殿直翰林醫官待詔等同班入中書舎人乾徳後始令赴内朝三司判官太平興國前赴内殿其後罷之止隨百官五日起居中書舎人知起居注遇五日起居之時亦各赴外朝次親王次侍衛親軍馬歩軍都指揮使率軍校至副指揮使次使相次節度使次統軍次兩使留後觀察使次防禦團練使刺史次侍衛馬軍歩軍使都頭起居畢見謝班入如御崇徳殿即樞密使以下先就班俟升坐諸司使副以下至殿直分東西對立餘皆北向長春殿皆北向宰相參知政事最後入以上並閤門贊謁日止再拜朔望及三日假即樞密使以下皆舞蹈國初近侍執事之臣皆赴晩朝後罷之凡早朝宰相樞密宣徽使起居畢同升殿問聖體宰相奏事樞密宣徽使退候宰相對畢樞密使復入奏事次三司開封府審刑院遇百官起居即樞密宣徽使侍立俟左右廵使出即退其崇徳殿三司使文眀樞密直學士内客省使仍侍立舊三司使奏事副使判官同對其後止副使司之大中祥符九年詔自今有大事許判官同上之及羣臣以次升殿自兩省以上領務京師者有公事許即請對自餘受使出入要切者欲面議奏事則先聽進止其見謝辭官以次入於庭出使閑慢及未升朝官或止拜於殿門外自祕書監上将軍觀察使内客省使以上得拜殿前階上及升殿止拜御座前餘皆庭中也凡見者先之謝次之辭又次之其班次先宰相次親王次樞密副使參知政事次内職内臣次使三司學士兩省御史臺文武班節使以下次将軍校次雜班惟宰相親王使相赴崇徳殿即宣徽使通喚餘皆側立候通再拜舞蹈致詞辭即不舞蹈見即將相升殿問聖體其賜分物酒食及收進奉物皆舞蹈稱謝凡收進奉物皆入謝幕職州縣官謝辭即判銓官引對兼於殿門外宣辭戒勵凡國有大慶瑞出師勝㨗樞密使率内職軍校入賀致詞閤門使宣答訖當侍立者升殿次百官入宰相致詞宣徽使宣答賜酒即預坐官後入作樂送酒如曲宴之儀凡視朝退進食訖易服御崇政殿或承眀殿先羣臣告謝自諫舎知雜御史以上及帶三司館王府僚屬歴官醫官刺史以上上将軍并發運使轉運使并許焉自非宣制並捧官告勅叙謝其貴近者或賜坐賜茶餘或改章服即謝訖易服又告謝再拜次軍頭引見司奏事於殿陛下次三班審官院流内銓刑部及諸司引見官吏後詔審官院引對亰朝官奏課不得過三人差遣不得過五人三使部選人差遣各不得過十人如假日起居辭見畢即移御坐臨軒視事既退復有羣司奏或閲器物之式謂之後殿再坐御賜宴之儀宋朝常以春秋之季仲月及誕聖節擇日大宴羣臣於廣徳殿有司預於殿庭設山樓排塲為羣仙隊仗六著進貢九龍五鳯之状司天雞唱樓於側殿上陳錦綉幃帟垂香毬設銀香爐於楹内藉以文茵御設茶酒器於殿東北楹間羣官醆斚於殿下幕屋分設宰相使相三師三公參知政事東宫三師僕射學士大夫中丞三少尚書常侍賓客太常宗正卿丞郎給事諌舎節度兩使留後觀察防禦團練刺史上將軍統軍廂都指揮使坐於殿上文武四品以上知雜御史郎中郎将禁軍都虞候坐於朶殿餘升朝官諸軍副都頭以上諸蕃進奉使諸道進奉軍將以上分坐於兩廊宰相使相坐以綉墪曲宴行幸用几參知政事以下用二蒲墪花毬曲宴樞密副使並同軍都指揮以上用一蒲墪自朶樓而下皆緋張氊條席殿下器上以金餘以銀其日樞密使以下先起居訖當侍立者升殿宰相率百官入宣徽門通喚致詞訖宰相升殿進酒各就坐酒九行曲宴酒七行或至五行每上舉酒羣臣立侍次宰相次百官舉酒或傳㫖命釂即皆搢笏起飲再拜曲宴多令不拜或上夀朝㑹止令滿酌不勸中飲更衣賜花有差宴訖舞蹈拜謝而出其郊祀籍田禮畢皆設大宴上元觀燈設燈山靈臺音樂百戲於眀徳門前召三公僕射尚書丞郎東宫三師三少賓客太常宗正卿大兩省御史大夫中丞知雜御史中元下元升東華門唯近臣預焉苑囿池御及觀稼校獵逰幸所至但宴從官太平興國以後大宴於大眀殿親王樞密使副宣徽三司使駙馬都尉皆侍立軍校自龍神衛四廂都指揮使立庭其宴契丹使亦於崇政殿但近臣及刺史郎中而上預焉廵幸還亰亦設大宴於崇徳殿雍熙三年後常以暮春召近臣賞花釣魚於苑中三館之職皆預中書樞密院節度使出使赴鎮宰相還朝咸賜宴於外苑以親王或樞密宣徽使主其席掌兵觀察以上有特賜者皆開封府樂營支應又别賜酒果細食餅餌中書樞密院節度使見辭日長春殿賜酒五行見仍設食當直翰林學士以上皇親觀察以上預坐太祖太宗朝藩鎮沿五代舊制時或來朝自後非詔命不得擅離治所牧伯入覲及被召使逥客省齎籖賜酒食節度使十日留後七日觀察使五日留後三日觀察使一日防禦團練使刺史並賜生料節度使以私故到闕下及歩軍都虞候以上出使逥者亦賜酒食熟羊羣官出使逥朝見日面賜酒食中書樞密宣徽使伴學士東宫三師僕射刺史大夫節度使内客省使並宣徽使伴兩省五品已上待制中丞三司副使東宫三少尚書丞郎卿監上将軍統軍留後觀察防禦團練使刺史宣慶宣政昭宣使並客省使伴少卿監大諸将軍司使以下任發運轉運提㸃刑獄知州通判縣令都監廵檢逥者朝見並通事舎人伴客省引進四方館閤門使並本㕔就食也羣臣稱賀賜衣奉尉並特賜茶酒或賜食外任遣人進奉亦賜酒食或生料十一月一日後盡正月每五日起居百官皆賜茶酒諸軍小校三日一賜冬正二社重陽寒食樞宰近臣禁軍大校或賜宴其第及府署中率以為常淳化四年令亰官兼館職者並預大宴先是輔臣宴集於尚書省或都亭驛誕聖節齋㑹則就相國寺大中祥符間上以佛舎中烹飪優笑有虧恭潔乃令内侍臣度館宇顯敞者易之遂以南衙為鍚慶院以備宴㑹焉太祖皇帝建隆二年春正月朔帝御崇元殿受朝賀服衮冕設宫懸仗衛如儀仗退羣臣詣皇太后宫門奉賀上常服御廣徳殿羣臣上夀用教坊樂宋承前代之制以元日五月朔冬至行大朝㑹之禮太祖建隆元年五月朔有司請受朝時司天上言日當食故罷是年十一月冬至上親征揚州不受朝宰臣率百官詣行宫拜表稱賀至二年正月朔始行其禮自是凡正冬及五月朔皆太常禮院奏請其無事而罷㑹者下敕但云不御殿至日宰臣文武百官詣閤門拜表稱賀五月朔亦無拜表之禮宋因唐開元之制每正冬不受朝及邦國大慶瑞奉上尊號則宰相率文武羣臣并諸軍校蕃夷酋長道釋耆老等詣東上閤門拜表進表官跪授表於宰相宰相又跪授閤門使乃以奉御凡有答詔亦拜受於閤門獲可奏者奉表稱謝其正冬樞密使率内職廷臣拜表於長春殿門外亦閤門使受之西亰留守率留守百官正日一上表起居質眀並集長夀寺之班置表於案再拜以遣其春秋賜及國大慶瑞並同之御殿儀仗及宫中導從之制御殿儀仗者本充庭之制唐禮殿庭屯門皆列諸衛黄麾大仗宋朝太祖増創錯繡諸旗并旛􅌁等著於通禮正至五月一日御正殿則陳之青龍白虎旗各一人分左右五岳旗五在左五星旗五在右五方龍旗二十五在左五方鳯旗二十五在右紅門神旗二十八分左右朱雀元武旗各一分左右皂纛十二分左右以上金吾天一泰一旗各一分左右攝提旗二分左右五神旗五木火在左金水土在右北斗旗一在左二十八宿旗各一角宿至璧宿在左奎宿至軫宿在右風伯雨師旗各一分左右白澤馴象仙鹿玉兎馴犀金鸚鵡瑞麥孔雀野馬㹈牛旗各二分左右日月合璧旗一在左五星連珠旗一在右雷公電母旗各一分左右軍分旗六分左右黄鹿飛麟兕騶牙白狼蒼鳥辟邪綱子貔旗各二分左右信旛二十二分左右傳教告止旛各十二分左右黄麾二分左右以上兵部日旗月旗各一分左右君王萬嵗旗一在左天下太平旗一在右獅子旗二分左右金鸞金鳯旗各一分左右五方龍旗各一青赤在左黄白黒在右以上龍犀龍君虎君旗五分左右赤豹黄熊旗各五分左右小黄龍旗一在左天馬旗一在右吏兵力士旗各五分左右天王旗四分左右太嵗旗十二分左右天馬旗六分左右排䦨旗六十分左右左右旛􅌁各五行行七十五大黄龍旗二分左右大神旗六分左右以上六軍宫中導從之制唐以前無聞焉五代漢乾祐中始置主輦十六人捧足一人掌扇四人持踏床一人並服文綾袍銀葉弓脚幞頭尚宫一人寳省一人髙鬢紫衣書省二人紫衣弓脚幞頭新婦二人高鬢青袍大将二人紫衣弓脚幞頭童子執紅絲拂二人髙鬟髻青衣執犀盤二人帶鬅頭黄衫執翟尾二人帶鬅頭黄衫雞冠二人紫衣執香爐香盤分左右以次奉引宋太平興國初増主輦二十四人改服髙脚幞頭一輦頭一人衣紫綉袍持金塗銀杖以督領之捧真珠七寳翠毛華樹二人衣緋袍捧金寳山二人衣綠繡袍捧龍腦榼二人衣緋銷金袍並髙脚幞頭執拂翟四人鬅頭衣黄繡袍舊衣綾袍紫衣者悉易以銷金及繡復増司簿一人内省一人司儀一人司給一人皆分左右前導凡一十七行每冬正脚殿祀郊廟歩輦出入至長春殿即用之其乘輦則屈右足垂左足而憑几盖唐制也真宗時又加四面内官周衛八月朔上御崇元殿行入閤儀置待制候對官賜廊下食入閤唐制起於天寳明皇以無為守成詔宴朝喚仗百官從容至閤門入蓋唐前含元殿非正至大朝㑹不御次宣政殿謂之正衙每坐朝必立仗於正衙或御紫宸殿即喚正衙仗自宣政殿兩門入是謂東西上閤門故謂之入閤其後遂為常朝之儀自五代以來既廢正衙立仗而入閤亦希闊不講至是復行之然御前殿非唐舊制矣崇元殿即大慶殿前殿也待制候對者亦唐制也每正衙置待制官兩員正衙退後又令六品以下官於延英候對皆所以備顧問其後每入閤即有待制次對官後唐天成中廢至是復行之廊下食起唐貞觀其後常參官每日朝退賜食謂之廊餐唐末浸廢但於入閤起居日賜食今循其制三年三月詔内殿起居日令百官以次轉對限三人為定其封章於閤門通進復鞠躬自奏宣徽使承㫖宣答拜舞而出乾徳三年冬至受朝賀於文眀殿皆服通天冠絳紗袍設宫懸仗衛如元㑹四年冬至朝元殿受朝畢常服御大眀殿羣臣上夀始用雅樂登歌二舞羣臣酒五行而罷每行酒太官令奏廵周饋食稱食徧六年九月始以旬假日御講武殿近臣但赴早參宰相以下皆具靴笏諸司使以下悉係鞵其節假及太祠並如令式處分開寳九年旬休日不視事太宗即位旬休日復視事講武殿其後又詔自今内外百司除舊制給假外每月旬假上已社重午重陽並休務一日三司開封府事關急速不在此限遇初寒盛暑大雨雷雪當議放朝太宗淳化三年正月朔服衮冕御朝元殿受朝賀禮畢改通天冠絳紗袍升座受羣臣等上夀帝即位以來每朝賀畢退御大眀殿常服上夀奏教坊樂至是始命有司約開元禮定上夀儀皆以法服行禮設宫懸萬舞酒三行而罷復舊制也又取嗣位以來祥瑞作祥麟丹鳯白龜河清瑞麥五曲用之是嵗令有司復舉十五條一朝堂行私禮二跪拜三待漏行立失序四談笑喧譁五入正衙門執笏不端六行立遲緩七至班列行立不正八趨拜失儀九言語微喧十穿班仗十一閤門不即就班十二無故離位十三廊下食行坐失儀語喧十四不從正衙門出入十五非公事入中書犯者罰一月俸有司振舉拒不伏者錄奏乞行貶降其後每罰減半仁宗天聖四年帝詔輔臣曰朕欲元日率百官先上太后夀然後御天安殿可令禮院草具其儀太后曰豈可為吾故後元㑹禮哉宰相王曽因言陛下以孝奉母儀太后以謙全國體請如太后命不聽詔中書門下具儀注正月壬寅朔曉漏未盡三刻百官常服與契丹使班㑹慶殿廷内侍請皇太后出殿後幄鳴鞭升座又自殿後皇帝幄贊引皇帝服靴袍於簾内皇太后北向褥位再拜跪稱臣名言元正啓祚萬物惟新伏惟尊號皇太后陛下膺時納祐與天同休内常侍承㫖答曰履新之祜與皇帝同之帝再拜詣皇太后御座稍東内給事酌御酒盞授内謁者監進皇帝執盞盤前跪進訖以盤興内謁者監承接皇帝却就褥位跪奏曰臣名稽首言元正令節不勝大慶謹上千萬嵗夀再拜内常侍宣答曰恭舉皇帝夀酒皇帝再拜執盤侍立教坊樂止皇帝受虚盞還幄通事舎人引百官横行典儀贊再拜舞蹈起居太尉升自西階稱賀簾外降還位皆再拜舞蹈侍中承㫖曰有制皆再拜宣曰履新之吉與公等同之再拜舞蹈閤門使簾外奏宰臣某以下進夀酒皆再拜太尉升自東階翰林使酌御酒盞授太尉執盞盤跪進簾外内謁者監跪接以進太尉跪奏曰元正令節臣等不勝慶忭謹上千萬嵗夀降還位皆再拜宣徽使承㫖曰舉公等觴皆再拜分班序立太尉升立簾外樂止内謁者監出簾授虚盞太尉降階横行皆再拜舞蹈宣徽使承㫖宣羣臣升殿再拜乃升及東西廂坐酒三行侍中奏禮畢樞密使已下迎乘輿於長春殿起止稱賀百官就朝堂易朝服班天安殿皇帝兖冕受朝禮官通事舎人引中書令門下侍郎各於案取所奏文詣褥位脱劒舄以次升分東西立諸方鎮表祥瑞案並先置殿門外左右令史絳衣對舉給事押祥瑞中書侍郎押表案入分詣東西階下對立既賀更服承天冠絳紗袍稱觴上夀止舉四爵乘輿還内恭謝太后如常禮英宗治平四年詔御史臺每遇起居日令百僚轉對御史臺請依閤門儀制諭兩省及文班秩髙者二員於百官起居日轉對若兩省官有充學士待制則綴樞密班起居内朝臣僚不與詔從之又詔遇轉對日増二員文獻通考卷一百七
