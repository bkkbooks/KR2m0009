body:
  text: 文獻通考卷二百六鄱陽馬端臨貴與著經籍考三十三史地理時令歷代宮殿名一卷陳氏曰翰林承旨李昉等纂歷代及僭偽宮殿門闕樓觀園苑池館名無不畢録五嶽諸山記一卷陳氏曰無名氏多鄙誕不經王屋山記一卷陳氏曰唐乾符三年道士李歸一撰華山記一卷陳氏曰不知名氏西湖古迹事實一卷陳氏曰錢塘進士傅牧撰以楊蟠百詠增廣共為一百八十三目紹興壬午序青城山記一卷鼂氏曰偽蜀道士杜光庭賓聖撰集蜀山若水在青城者悉本道家方士之言峨眉志三卷鼂氏曰皇朝張開撰峨眉山名也隋開皇十三年以名其邑竒勝冠三蜀郡守吕勤命開考圗經及傳記石刻綴輯成書析為十四門宋白吳中復詩文附於後茅山記一卷陳氏曰嘉祐六年句容令陳倩修幕阜山記一卷陳氏曰葛洪撰其山在豫章豫章西山記一卷陳氏曰贊皇李上文撰嘉祐丁酉嵗玉笥山記一卷陳氏曰唐道士令狐見堯撰山在新淦别本又有南唐及本朝事後人所益也湘中山水記三卷晉耒陽羅含君章撰范陽盧拯注其書頗及隋唐以後事則亦後人附益也天台山記一卷陳氏曰唐道士徐靈府撰元和中人也余假守臨海就使本道嘉熙丙申十月解郡符趨會稽治所道過之鋭欲往逰會大雪不果改轅由驛道至今以為恨偶見此記録之以寄卧逰之意顧渚山記一卷陳氏曰唐陸羽鴻漸撰鄉邦不貢茶久矣遺迹未必存也廬山記五卷鼂氏曰皇朝陳令舉舜俞撰先是劉煥嘗為記令舉因而增廣之又為俯視圗紀尋山先後之次云陳氏曰劉煥凝之李常公擇皆為之序令舉熙寧中謫居所作續廬山記四卷陳氏曰南康守廣陵馬玕録山中碑記之文以續前録九華拾遺一卷陳氏曰山居劉放至和二年自序曰滕天章作新録於前沈太守撰總録於後博考傳聞復得三十餘節九華總録十八卷陳氏曰邑人程太古撰裒集諸家所記萃為一編也武夷山記一卷陳氏曰杜光庭撰霍山記一卷陳氏曰知循州林須撰山在循州境內羅浮山記一卷陳氏曰廬陵郭之美撰皇祐辛卯序鴈山行記一卷陳氏曰永嘉陳謙撰嘉定己巳遊山直至絶頂得所謂鴈蕩者前人蓋未之識也然繼其後者亦未有聞焉廬阜紀逰一卷陳氏曰開封孫惟信季蕃撰嘗大雪登山至絶頂盡得其景物之詳嘉定初年也惟信能為詩詞善談謔蓋嘗有官棄去不仕自號花翁逰江湖間人多愛之何氏山莊次序本末一卷陳氏曰尚書崇仁何異同叔撰其别墅曰三山小隱三山者浮石山岩石玲瓏山其實一也周回數里敘其景物序為此篇自號月湖標韻清絶如神仙中人膺高壽而終其山間今蕪廢矣湘江論一卷陳氏曰太常博士潘洞撰海濤志一卷陳氏曰唐竇叔蒙撰太虛潮論一卷陳氏曰永泰縣令錢栖業述末稱天祐六年海潮圗論一卷陳氏曰龍圗閣學士燕肅撰進潮説一卷陳氏曰知錢塘縣張尹房撰凡三篇西南備邊録十三卷巽岩李氏曰唐李德裕撰今特存其第一卷而崇文總目亦止載一卷豈嘉祐以前已亡逸乎德裕之深謀逺慮雖至今可用也而所存止此可惜哉西南備邊志十二卷陳氏曰嘉州進士鄧嘉猷撰紹興末犍為有蠻擾邊初莫知其何種族也已而有能别識其為虛恨蠻者時蜀邊久無事既去而朝廷憂之詔有司經度嘉猷取秦漢以來訖於本朝凡史傳所載蠻事皆著於篇時乾道中也其為志九為圗一北邊備對六卷陳氏曰程大昌撰淳熙中進禹貢圗孝廟因以北邉地理為問對以彼無定居無文史不敢強言紹熙退居追采自古中華北邉樞紐相關者條列其地而推言之名曰備對南北攻守類考六十三卷陳氏曰監進奏院趙善譽撰進以三國六朝攻守之變鑒古事以考今地每事為之圗海外使程廣記三卷陳氏曰南唐如京使章僚撰使高麗所記海道及其國山川事迹物産甚詳史虛白為作序己未十月蓋本朝開國前一嵗也大唐西域記十二卷陳氏曰唐三藏法師元奘譯大總持寺僧辨機撰南詔録三卷陳氏曰唐嶺南節度巡官徐雲虔撰乾符中雍州遣雲虔使南詔所作上卷記山川風俗後二卷紀行及使事至道雲南録三卷陳氏曰左侍禁知興化軍辛怡顯撰李順之亂餘黨有散入蠻中者怡顯往招安之繼馳賜蠻酋告勑而歸遂為此録天禧四年自序或云此書妄也余在莆田視壁記無怡顯名字恐或然契丹疆宇圗一卷陳氏曰不著名氏録契丹諸夷地及中國所失地遼四京記一卷陳氏曰亦無名氏曰東京中京上京燕京髙麗圗經四十卷陳氏曰奉議郎徐兢明叔撰宣和六年路允迪傅墨卿使髙麗兢為之屬歸上此書物圗其形事為之説今所刋不復有圗矣兢鉉之後善篆書亦能畫嘗自題保大騎省世家宣和書學博士又自號自信居士諸蕃志二卷陳氏曰福建提舉市舶趙汝適記諸蕃國及物貨所出右地理夏小正傳四卷陳氏曰漢戴德傳給事中山陰傅嵩卿注此書本在大戴禮鄭元注禮運夏時曰夏四時之書也其存者有小正後人以大戴禮抄出别行嵩卿以正文與傳相雜倣左氏經傳列正文其前時附以傳且為之注荆楚嵗時記四卷鼂氏曰梁宗凛撰其序云傅元之朝會杜篤之上已安仁秋興之敘君道娛蠟之述其屬辭則已洽其比事則未𢎞率為小説以録荆楚嵗時風物故事自元日至除日凡二十餘事錦帶一卷陳氏曰梁元帝撰比事儷語在法帖中章草月儀之類也玉燭寶典十二卷陳氏曰隋著作郎博陵杜臺卿少山撰以月令為主觸類而廣之博采諸書旁及時俗月為一卷頗號詳洽開皇中所上嵗華紀麗四卷鼂氏曰唐韓諤撰分四時十二月節序以事實為偶儷之句附著之陳氏曰其書采經子史傳嵗時事類聚而以儷語間之保生月録一卷鼂氏曰唐韋行規撰分十二月雜記每月攝養種藝祈禳之術李翺為之序金谷園記一卷陳氏曰題李雍撰館閣書目云唐中散大夫按雍字泰和江都人至北海太守世號李北海其父善注文選者也中散大夫唐文散階本傳不載不知書目别何所據唐世不應有兩李雍也秦中嵗時記一卷陳氏曰唐膳部郎中趙郡李綽撰綽别未見此據中興書目云爾其序曰緬思庚子之嵗薦周戊辰之年庚子唐廣明元年戊辰梁開平二年也又曰偶記昔年皇居舊事絶筆自嘆橫襟出涕然則唐之舊臣國亡之後感傷疇昔而為此書也按朱藏一紺珠集曽端伯類説載此書有杏園探花使端午扇市嵗除儺公儺母及太和八年無名子詩數事今皆無之豈别一書乎咸鎬故事一卷陳氏曰韋慎微撰其書與前大同小異竟不知何人作也末卷却有神鬼大者號儺公母一語按館閣書目秦中嵗時記一名咸鎬嵗時記輦下嵗時記一卷鼂氏曰唐李綽撰綽經黃巢之亂避地蠻隅偶記秦地盛事傳之晚學千金月令三卷陳氏曰唐孫思邈撰國朝時令十二卷鼂氏曰皇朝賈昌朝撰景祐初復禮記舊文其唐月令别行三年詔昌朝與丁度李淑采國朝律歷典禮百度昏曉中星祠祀配侑嵗時施行約唐月令定為時令一卷以備宣讀後昌朝注為十二卷奏上頒行陳氏曰唐因禮記舊文增損為禮記首篇天寶中改名時令景祐初始命復禮記舊文其唐之時令别為一篇遂命禮院修書官丁度等約唐時令撰定為國朝時令以便宣讀蓋自唐以來有明堂讀時令禮也及昌朝解相印治郡五臣皆已淪沒乃采經史諸書及祖宗詔令典式為之集解而上之兩朝藝文志詔因入閣讀時令問禮官五月朔日夏至百官入閣可否皆曰五月朔朝會合唐舊制雖是大祠比冬至圜丘禮成受賀在質明後無嫌然據易象月令及蔡雍有閉關靜事不賀之説鄭康成據樂緯春秋之説夏至有前殿從八能作樂後漢嘗行其儀入閣讀令既屬嘉禮在朔與假本無所礙惟夏至則於經義有妨移用七月朔又罷寶元二年宋庠論入閣之非兩制議入閣者是唐朝隻日紫宸殿受常朝儀若隔日行禮頗為煩况今殿宇與舊不同乃止慶歷七年復詔來年四月一日讀時令禮院約定儀注以通禮參用唐宣政殿朔望朝參儀草定御文德殿皇帝服靴袍百官公服減正仗半不設樂尋停皇祐初又詔立夏讀時令禮官邵必請四時皆讀然亦不果嵗時雜詠續嵗時雜詠宣獻公宋庠及其孫剛叔撰濟北鼂無咎補之作序曰余元豐六年六月遇畢公叔於京師公叔言宋氏藏詩曰嵗時雜詠者蓋宣獻公所集唐以前詩人之作髣佛具在公叔曰夫天地變化其情至微有不可道以辭者四時之間氣候物色俯仰輒異使一人言之雖其巧如簧恐不得與造物者爭功於是雜衆言而觀之不亦可乎宋氏故多賢而宣獻之孫曰剛叔尤篤志於學不愧其先人又常集宋詩人之所為為續嵗時雜詠以成其祖之意蓋若干篇且詩之作患言不能稱物者以得之偏也嘗試丹青衆言慿几肆目於方尺之間而四時氣候物色慘舒榮稿所以過乎吾前者每觀每異其致亦足樂也因以其集屬補之為序補之復於公叔曰詩之亡久矣豳詩七月其記日月星辰風雨霜露草木鳥獸之事盛矣屈原宋玊為離騷最近於詩而所以託物引類其感在四時可以慷慨而太息想見其忠潔剛叔於宋詩所取若此其亦有得於昔人之意乎宋有天下百年而詩之作中間尤盛蓋叔之所取小大咸備今觀其録一時顯人用是名世其尤宏傑者雖以磅礴天地呼吸陰陽而成嵗功可也其下者亦因所長而傳猶之一氣候至生者皆作灼然而華嚶然而鳴以謂天地之巧盡此矣嵗時雜記二卷陳氏曰侍講東萊吕希哲原明撰希哲正獻公公著之子吕滎陽公在歷陽時與子孫講誦遇節日則休學者雜記風俗之舊然後團坐飲酒以為樂久而成編承平舊事猶有考焉周平園序曰本朝承平嵗久斯民安生樂業凡遇節物隨時制宜雖有古有今或雅或鄙所在不同然上而朝廷次而郡國下逮民庶歡娛熙洽未嘗虛度則一也侍講吕公當全盛時食相門之德既目擊舊禮又身歷外官四方風俗皆得周知追記於册殆無遺者惟上元一門多至五十餘條百年積纍之盛故家文獻之餘兹可推矣慶元戊午秋公之元孫仙遊邑大夫祖平以示平園老叟周某竊有生晚不及見之歎云右時令文獻通考卷二百六
