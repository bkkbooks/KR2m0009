body:
  text: 文獻通考卷二百四十七鄱陽馬端臨貴與著經籍考七十四集章奏陳氏曰凡無他文而獨有章奏及雖有他文而章奏復獨行者亦别為一類漢名臣奏一卷陳氏曰按隋志刑法類有漢名臣奏事三十卷唐志已亡其一中興書目僅存其二一為孔光一為唐林今惟唐林而已所言皆莽朝事無足論者姑以存古云爾唐魏鄭公諫錄五卷陳氏曰唐尚書吏部郎中瑯琊王綝集綝字方慶以字行相武后其為吏部當在高宗時館閣書目作王綝誤也所錄魏公進諫奏對之語又名魏文貞公故事陸宣公奏議二十卷陳氏曰唐宰相嘉興陸贄敬輿撰又名牓子集議論並見别集類李司空論諫集七卷鼂氏曰唐李絳深之贊皇人貞元八年進士中宏詞補渭南尉六年進中書侍郎平章事太和初為山南西道節度使四年南蠻入冦為亂兵所害絳偉儀質以直道進退望冠一時賢不肖太分屢為讒邪所中平生論諫數十百事其甥夏侯孜所編史官蔣偕為序令狐公表奏十卷鼂氏曰唐令狐楚字殻士撰楚相憲宗為文善於牋奏自為序云登科後為桂并四府從事掌牋奏者十三年始遷御史綴其藁得一百六十三篇自號曰白雲孺子陳氏曰楚長於應用嘗以授李商隱包孝肅奏議十卷鼂氏曰包拯字希仁合淝人天聖五年進士為御史中丞知開封府為人剛嚴無私聞者皆憚之汪玉山序公奏議分門編類其事之首尾時之先後不可考也如請那移河北兵馬凡三章其二在第八卷議兵門其一廼在第九卷議邊門其不相貫穿如此今考其歲月繫於每章之下而記其履歴於後若其歲月可見於章中者不復重出與夫不可得而考者不容於不闕也庶幾讀者尚可以尋其大槩云如劾罷張方平宋祁三司使而奏議不載豈包氏子孫所不欲以示人者邪范文正公奏議二卷陳氏曰范仲淹撰諫垣存藁三卷陳氏曰韓琦撰富文忠公劄子十六卷陳氏曰富弼撰平生歷官辭免陳情之文也從諫集八卷陳氏曰歐陽修撰南臺諫垣集二集陳氏曰參政信安趙抃閱道撰范貫之奏議十卷直龍圖閣范師道貫之撰曾南豐序曰自至和以後十餘年間公常以言事任職自天子大臣至於羣下自掖庭至於四方幽隱一有得失善惡闗於政理公無不極意反復為上力言或矯拂情欲或切劘計慮或辨别忠佞而處其進退章有一再或至於十餘上事有陰爭獨陳或悉引諫官御史合議肆言仁宗常虛心采納為之變命令更廢舉近或立從遠或越月踰時或至於其後卒皆聽用蓋當是時仁宗在位歲久熟於人事之情偽與羣臣之能否方以仁厚清淨休養元元至於是非與奪則一歸之公議而不自用也其所引拔以言為職者如公皆一時之選而公與同時之士亦皆樂行其言不曲從茍止故天下之情因得畢聞於上而事之害理者常不果行至於奇衺恣睢有為之者亦輙敗悔故當此之時常委事七八大臣而朝政無大闕失羣公奉法遵職海内乂安夫因人而不自用者天也仁宗之所以其仁如天至於享國四十餘年能承太平之業者繇是而已後世得公之遺文而論其世見其上下之際相成如此必將低囘感慕有不可及之歎然後知其時之難得則公言之不沒豈獨見其志所以明先帝之盛德於無窮也呂獻可奏章二十卷鼂氏曰呂誨字獻可熙寧中為御史中丞坐攻王安石知鄧州司馬溫公服其知人且序其章奏集云其草存者二百八十有九歴觀古人有能得其一二者已可載之史籍在獻可蓋不足道也陳氏曰獻可丞相正惠公端之孫也孫莘老奏議十卷鼂氏曰孫覺字莘老元豐末自祕書少監除右諫議大夫元祐初遷給事中吏部侍郎莘老素與王介甫善後為諫官論新法遂絶李公擇廬山奏議十七卷陳氏曰李常字公擇早年讀書於廬山熙寧間為諫官論青苖法而罷元祐初為御史中丞范蜀公奏議二卷鼂氏曰范鎭字景仁成都人舉進士為禮部第一仁宗朝知諫院後言王安石新法不便乞致仕歸潁昌元祐初詔召不赴封蜀郡公年八十一諡忠文經緯集十四卷陳氏曰樞密副使會稽孫抃元規撰傅顯簡奏議四卷陳氏曰傅堯兪撰汪玉山跋畧曰范忠宣公誌公墓曰司馬溫公言傅欽之清且勇邵康節謂欽之清而不耀直而不訐勇而能溫云范忠宣彈事五卷國論五卷陳氏曰范純仁撰范德孺奏議二十五卷陳氏曰龍圖閣直學士范純粹德孺撰文正公三子中子純禮彝叟至尚書右丞純粹守邊有將才文正嘗謂仁得其忠禮得其靜粹得其畧其長子純祐天成尤英悟不幸病廢蚤世富文忠深惜之為作墓誌盡言集十三卷陳氏曰諫議大夫元城劉安世器之撰王明叟奏議二卷陳氏曰翰林學士海陵王覿明叟撰坐黨籍謫臨江而卒其在朝專論蘇程朋黨之弊以為深患丁隲奏議一卷陳氏曰右正言毘陵丁隲撰元祐中在諫垣嘉祐二年進士也諫垣集二卷陳氏曰陳瓘撰閑樂奏議一卷陳氏曰殿中侍御史建陽陳師錫伯修撰熙寧九年第進士裕陵素知其文行擢為第三人蘇軾知湖州師錫掌書記軾下御史獄師錫篤賔友之義安輯其家軾入西掖薦自代明著其事師錫在元豐已為察官坐論進士習律罷出建中靖國再入未幾又罷河間公奏議十卷鼂氏曰朱光庭元祐中為諫官時所論事也得得居士戇草一卷陳氏曰正言眉山任伯雨德翁撰其論蔡卞章惇欲廢宣仁尤切故卞深恨之獨貶嶺外龔彦和奏疏一卷陳氏曰殿中侍御史河間龔夬彦和撰二陳任龔皆建中靖國言事官極論蔡京者也石林奏議十五卷陳氏曰葉夢得撰石林自序志愧集曰進對以來奏藁藏於家者若干篇不忍盡棄乃序次為十卷目之曰志愧集夫天下豈無大安危生民豈無大休戚矧宣靖以來中原分裂上方櫛沐風雨旰食圖功而身遭不世之主橫被非常之知所言僅如是而已心非木石安得不愧姑自識之留以遺子孫庶後世悼其意之不終或有感勵奮發慨然少能著見者猶足雪其無功之恥而償其未報之恩也虞雍公奏議丞相虞允文撰後溪劉氏序畧曰余讀雍國忠肅虞公奏議二百二十有七篇而慨然有感世但知采石之戰以七千卒卻敵兵四十萬其功甚偉然忌者猶曰適然豈知公於紹興辛巳之前已因論對面奏敵必叛盟兵必公五道正兵必出淮西奇兵必出海道宜令良將勁卒備此二境其先事之識已絶出乎衆人之表矣及敵叛盟上令從臣集議公獨言敵兵必出兩淮丞相善其言而未果行及遣公勞師采石事已大壞公以書生收合亡卒激厲諸將施置於倉卒之際而破敵於俄頃之間嗚呼非胸中素有蓄積忠誠足以動天地感人心而作士氣未易成此偉績也而曰適然可乎自昔狃勝者必忽其餘憂公又令設備於瓜洲其他區畫悉各精密而不茍敵遂遁去乃徐請車駕還行都皆厯厯見於奏疏也余竊妄論本朝多議論少成功雖盛時猶然也况積習消靡之餘夫人皆喜逸而惡勞圖安而懼危中興以來前有張魏公後有虞雍公為國家任其勞當其危者也彼不少愧焉而又忍短毁之乎連寶學奏議二卷陳氏曰寶文閣學士安陸連南夫鵬舉撰紹興初知饒州捍禦有功及和議成南夫知泉州上表畧曰不信亦信其然豈然又曰雖虞舜之十二州昔皆吾有然商於之六百里當念爾欺由是得罪若溪奏議一卷陳氏曰資政長城劉珏希范撰嘗以同知三省樞密院扈從隆祐南幸毘陵公奏議二十五卷陳氏曰張守撰陳國佐奏議十二卷陳氏曰禮部侍郎赤城公輔國佐撰政和三年上舍釋褐首選紹興初為諫官胡忠簡奏議四卷陳氏曰胡銓撰玉山表奏一卷陳氏曰汪應辰撰陳正獻奏議二十卷表劄二十卷陳氏曰陳俊卿撰龔實之奏藁六卷陳氏曰龔茂良撰南軒奏議十卷陳氏曰張拭撰胡獻簡奏議八卷臺評二卷陳氏曰禮部尚書會稽胡沂撰梅溪奏議三卷陳氏曰太子詹事樂清王十朋龜齡撰省齋厯官表奏十二卷陳氏曰周必大撰軒山奏議二卷陳氏曰王藺撰北山戇議一卷陳氏曰户部侍郎濡湏王少愚撰藺之兄開禧中諫用兵李祭酒奏議一卷陳氏曰國子祭酒錫山李祥元德撰慶元初論救趙忠定得罪者齊齋奏議三十卷掖垣繳論四卷銀臺章奏五卷臺諫論二卷昆命元龜說一卷陳氏曰倪思撰文獻通考卷二百四十七
