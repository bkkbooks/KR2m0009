body:
  text: 文獻通考卷二百七十六鄱陽馬端臨貴與著封建考十七唐諸王越王係肅宗子元宗末年封肅宗寢疾張后召係矯制作亂坐誅建係子王武威逌係子王興道承天皇帝倓初封建寧王張后譖之坐賜死大厯三年追諡帝衞王佖始王西平早薨彭王僅始王新城鎮僅子王常山兗王僴始王潁川寳應初薨涇王侹始王東陽興元初薨鄆王榮始王靈昌早薨追封襄王僙至德二載封貞元七年薨宣僙子王伊吾宷僙子王樂安把王倕至德二載封貞元十四年薨召王偲至德二載封元和元年薨恭懿太子佋始封興王上元元年薨贈太子定王侗至德二載封寳應初薨右肅宗子昭靖太子邈上元二年封益昌王大厯八年薨贈太子均王遐早薨貞元中追封睦王述大厯十年封貞元七年薨丹王逾大厯十年封元和十五年薨恩王連大厯十年封元和十二年薨韓王迥大厯十年封貞元十二年薨簡王遘大厯十年封元和四年薨益王廼大厯十四年封隋王迅大厯時封興元元年薨荆王選早薨建中二年追封蜀王遡大厯十四年封忻王造大厯十年封元和六年薨韶王暹大厯十年封貞元十二年薨嘉王運大厯十年封貞元十七年薨端王遇大厯十年封貞元七年薨循王遹大厯十年封恭王通大厯十年封原王逵大厯十年封太和六年薨雅王逸大厯十年封貞元十五年薨右代宗子舒王誼本昭靖太子子德宗取以為子永貞元年薨通王諶大厯十四年封䖍王諒大厯十四年封肅王詳大厯十四年封建中二年薨文敬太子謜本順宗子德宗愛之取以為子貞元初封十五年薨資王謙大厯十四年封代王諲蚤薨建中二年追封昭王誡貞元二十一年封欽王諤順宗即位封珍王誠順宗即位封太和六年薨右德宗子郯王經貞元四年封太和八年薨均王緯貞元四年封開成二年薨淑王縱貞元四年封開成二年薨莒王紓貞元四年封太和八年薨密王綢貞元四年封元和二年薨郇王總貞元四年封元和三年薨邵王約貞元四年封元和元年薨宋王結貞元四年封長慶二年薨集王緗貞元四年封長慶二年薨冀王絿貞元四年封太和九年薨和王綺貞元四年封太和七年薨衡王絢貞元四年封寳應二年薨㑹王纁貞元二十一年封元和五年薨福王綰貞元四年封咸通二年薨珍王繕貞元四年封撫王紘貞元二十一年封乾符三年薨岳王緄貞元二十一年封太和二年薨袁王紳貞元二十一年封咸通元年薨桂王綸貞元二十一年封元和九年薨翼王綽貞元二十一年封咸通三年薨蘄王緝咸通二年封咸通八年薨欽王績無封薨年右順宗子惠昭太子寧貞元二十一年封平原王元和四年立為太子薨澧王惲憲宗即位封漢惲子王東陽源惲子王安陸演惲子王臨安深王悰元和初封潭悰子王河内淑悰子王吳興洋悰子王忻始悰子王高密進悰子王洋絳王悟元和初封後為王守澄所殺洙悟子王新安滂悟子王高平建王恪元和初封長慶元年薨鄜王憬長慶元年封開成四年薨溥憬子王平陽瓊王悦長慶初封津悦子王河間氾王郇長慶初封瀛郇子王晉陵婺王懌長慶初封清懌子王新平茂王愔長慶初封潓懌子王武功淄王協長慶初封開成元年薨澣協子王許昌涣協子王馮翊衡王憺渉憺子王晉平澶王悦長慶初封濘悦子王鴈門棣王惴大中六年封咸通三年薨無子彭王惕大中六年封後為韓建所殺信王憻大中六年封咸通八年薨榮王㥽咸通三年封子令平嗣右憲宗子懷懿太子湊長慶元年封漳王後為王守澄陷以罪黜為巢縣公開成三年追贈安王溶長慶元年封後為仇士良所殺右穆宗子悼懷太子普寳厯元年封晉王太和二年薨追贈梁王休復開成二年封襄王執中開成二年封宷執中子王樂平紀王言揚開成二年封陳王成美開成二年封後為仇士良所殺儼成美子王宣城右敬宗子莊恪太子永太和四年封魯王六年立為皇太子開成元年暴薨追贈蔣王宗儉開成二年封右文宗子杞王峻開成五年封益王峴㑹昌六年封兖王岐會昌六年封德王嶧㑹昌六年封昌王嵯㑹昌六年封右武宗子靖懷太子漢㑹昌六年封雍王大中六年薨追諡雅王涇大中元年封通王滋㑹昌六年封昭宗時為韓建劉季述所殺慶王沂㑹昌六年封大中十四年薨濮王澤大中二年封鄂王潤大中五年封乾符三年薨懷王洽大中八年封昭王汭大中八年封乾符三年薨康王汶大中八年封乾符四年薨廣王澭大中十一年封乾符四年薨衞王灌大中十一年封十四年薨右宣宗子魏王佾咸通三年封涼王侹咸通三年封乾符六年薨蜀王佶咸通六年封威王偘咸通六年封吉王保咸通十三年封恭哀太子倚初封睦王後為劉季述所殺天復初追贈右懿宗子建王震中和元年封益王昇光啟三年封右僖宗子德王裕大順二年封乾寧四年立為皇太子劉季述等幽昭宗立裕為帝昭宗反正復為王後為朱温所殺棣王祤乾寧元年封景王祕乾寧四年封䖍王禊乾寧元年封祁王祺乾寧四年封沂王禋乾寧元年封雅王禎光化元年封遂王禕乾寧四年封瓊王祥光化元年封八王並為朱温所殺端王禎天祐元年封豐王祁天祐元年封和王福天祐元年封登王禧天祐元年封嘉王祜天祐元年封潁王禔天祐二年封蔡王祐天祐二年封右昭宗子唐制親王封戸八百増至千公主三百長公主只六百髙宗時沛英豫三王太平公主武后所生戸始踰制垂拱中太平至千二百戸聖厯初相王太平皆三千壽春等五王各三百神龍初相王太平至五千衞王三千温王二千壽春等主皆七百嗣雍衡陽臨淄巴陵中山王五百安樂公主二千長寧千五百宣城宜城宣安各千相王女為縣主各三百相王增至七千安樂三千長寧二千五百宜城以下二千相王太平長寧安樂以七丁為限雖水旱不蠲以國租庸滿之中宗遺詔雍壽春王進為親王户千開元後天子敦睦兄弟故寧王戸至五千五百岐薛五千申王以外家微戸四千邠王千八百帝妹戸千中宗諸女亦如之通以三丁為限及皇子封王户二千公主五百咸宜公主以母惠妃故封至千自是諸公主例千户止唐史贊曰唐自中葉宗室子孫多在京師㓜者或不出閤雖以國王之貴與匹夫不異故無赫赫過惡亦不能為王室軒輊運極不還與唐俱殫然則厯數短長自有底止彼漢七國晉八王不得其效愈速禍云肅宗嘗問於李鄴侯泌曰今郭子儀李光弼已為宰相若克兩京平四海則無官以償之柰何對曰古者官以任能爵以酬功漢魏以來雖以州郡治民然有功則錫以茅土傳之子孫至於周隋皆然唐初未得闗東故封爵皆設虚名其食實封者給繒布而已貞觀初太宗欲復古制大臣議論不同而止由是賞功多以官夫以官賞功有二害非才則廢事權重則難制是以功臣居大官者皆不為子孫逺慮務乗一時之權邀利無所不為向使禄山有百里之國則亦惜之以傳子孫不反矣為今之計俟天下既平莫若疏爵土以賞功臣則雖大國不過二三百里可比今之小郡豈難制哉於人臣乃萬世之利也上曰善按如鄴侯之説則知唐之所謂爵土祗是虚名且無承襲盖受封者於内府給繒布不得以自食其所封之地則只同俸賜不可以言胙土矣故今叙唐之封建只及諸王而凌烟功臣以下之封公侯者更不叙録蓋既無胙土世襲之事則封建之規模盡失矣唐初如英衞之類其子尚襲封至中葉以後則此制盡廢如狄仁傑封梁公子光嗣未嘗襲梁公張説封燕公子均未嘗襲燕公又按唐㑹要神龍二年七月制功臣段志元屈突通蕭瑀李靖秦叔寳長孫順德劉宏基宇文士及錢九隴程知節龎卿惲竇悰苑君璋李子和張平高張公謹梁恪仁安修仁秦行師獨孤卿雲蘇定方李安逺鄭仁泰杜君綽李孟嘗等二十五家所食實封並依舊給可見當時所給實封繒布止受封者之身如此二十五家則特㫖依舊支給耳非通例也唐天寳以後藩鎮按唐自中葉以來皇子弟之封王者不出閤諸臣之封公侯者不世襲封建之制已盡廢矣至肅代而後則强藩私其土地甲兵而世守之同於列國故取唐書藩鎮傳述諸鎮傳授之次第以繼諸王之後唐書藩鎮傳叙曰安史亂天下至肅宗大難略平君臣皆幸安故𤓰分河北地付授叛將䕶養孽萌以成禍根亂人乗之遂擅署吏以賦税自私不朝獻於廷效戰國肱髀相依以土地傳子孫脇百姓加鋸其頸利怵逆汙遂使其人自視猶𦍑狄然一㓂死一賊生訖唐亡百餘年卒不為王土當其盛時蔡附齊連内裂河南地為合從以抗天子杜牧至以山東王不得不王霸不得不霸賊得之故天下不安又曰厥今天下何如哉干戈朽鈇鉞鈍含忍混貸昫育逆孽殆為故常而執事大人曾不歴算周思以為宿謀方且嵬岸抑揚自以為廣大繁昌莫已若也嗚呼其不知乎其俟偃蹇顛傾而後為之支計乎且天下幾里列郡幾所自河以北蟠城數百角奔為冦伺吾人顦顇天時不利則將與朋伍駭亂吾民於掌股之上今者及吾之壯不圖擒取乃偷取恬逸以為後世子孫背脅疽根此復何也議者曰倔强之徒吾以良將勁兵為銜策高位美爵充飽其腸安而不撓外而不拘猶豢虎狼而不拂其心則忿氣不萌此大厯貞元所以守邦也何必疾戰焚煎吾民然後為快也愚曰大厯貞元之間有城數十千百卒夫則朝廷貸以法故於是濶視大言自樹一家破制削法角為尊奢天子不問有司不呵王侯通爵越録受之覲聘不來几杖扶之逆息悖嗣皇子嬪之地益廣兵益强僭擬益甚侈心益昌土田名器分畫大盡而賊夫貪心未及畔岸淫名越號走兵四略以飽其志趙魏燕齊同日而起梁蔡吳蜀躡而和之其餘混澒軒囂欲相效者往往而是運遭孝武前英後傑夕思朝議故能大者誅鋤小者惠來大抵生人油然多欲欲而不得則怒怒則爭亂隨之是以教笞於家刑罰於國征伐於天下裁其欲而塞其爭也大厯貞元之間反此提區區之有而塞無涯之爭是以首尾指支幾不能相運掉也凡今者不知非此而反用以為經將見為盗者非止於河北而已嗚呼大厯貞元守邦之術永戒之哉魏博傳五世至田宏正入朝十年復亂更四姓傳十世有州七成德更二姓傳五世至王承元入朝明年王庭湊反傳六世有州四盧龍更三姓傳五世至劉總入朝六月朱克融反傳十二世有州九淄青傳五世而滅有州十二滄景傳三世至程權入朝十六年而李全略有之至其子同㨗而滅有州四宣武傳四世而滅有州四彰義傳三世而㓕有州三澤潞傳三世而滅有州五雖然迹其由來事有因藉地之輕重視人謀臧否歟今取擅興若世嗣者為藩鎮傳若田宏正張孝忠等暴忠納誠以屏王室自如别傳云田承嗣平州盧龍人本隸安禄山麾下郭子儀平東都來降俄復叛後再降於僕固懷恩遷貝博滄瀛等州節度使名其軍曰天雄加同平章事封鴈門郡王悦承嗣弟子承嗣卒為留後俄遷節度使德宗立悦舉兵反僭號魏王朱泚簒逆帝乃下詔赦悦罪悦復順命封濟陽郡王後為其從弟緒所殺緒承嗣第六子既殺悦為留後請命乃即命為節度使加同平章事封鴈門郡王卒季安緒少子緒既死為留後因授節度使加同平章事懷諫季安子嗣為留後軍中廢之而立宏正送懷諫京師自承嗣至懷諫四世凡四十九年宏正承嗣從子為衙内兵馬使軍中既廢懷諫脅立宏正宏正乃舉六州版籍請吏於朝詔除節度使以討王承宗李師道功加同平章事入朝移鎮成德軍亂遇害布宏正子為河陽節度使㑹魏博節度李愬病不能軍乃詔布鎮魏博牙將史憲誠怵軍中脅布叛布不從自殺史憲誠本奚人三世為魏博將田布既自殺憲誠擅總軍務穆宗因授以節度使進同平章事後請納地欲分相衞請置帥軍中攻殺之憲誠起至卒凡七年何進滔靈武人世為魏軍校史憲誠既死軍中推為留後進滔乃斬作亂者數十人請命詔授節度使後進同平章事卒重順進滔子進滔既死為留後就加節度使後進同平章事卒全皥重順子嗣拜節度使以平龎勛功進同平章事後軍衆叛而殺之自進滔至全皥三世四十二年韓君雄魏州人全皥死軍中推君雄總軍事加節度使同平章事卒子簡襲留後遷節度使平章事封魏郡王時黄巢亂帝在蜀簡北略邢洛東攻鄆兵敗未幾死君雄簡凡再世十二年樂彦禎魏人韓簡時澶州刺史簡卒魏人立之進節度使加同平章事後軍亂殺彦禎彦禎起至殺凡七年羅宏信魏州人為裨將軍中既殺彦禎推大將趙文㺹總留後彦禎子從訓求救於朱全忠以兵討之衆懼殺文㺹推𢎞信為主詔擢留後遷節度使平章事封臨清郡王後為朱全忠李克用所攻拔其三州卒子紹威襲昭宗時授節度使為劉仁恭所攻朱全忠救之遂事全忠加侍中封魏王與全忠謀盡誅魏牙兵以除逼紹威自此勢弱為全忠所取右魏博據七州具博魏相衞磁洺傳五姓李寳臣本范陽内屬奚為安禄山射生慶緒時為恒州刺史來降詔授故官封密雲郡公後復叛事史思明思明死乃挈恒趙深定易五州以獻封趙國公名其軍曰成德拜節度使封隴西郡王拜同平章事後為妖人所毒死惟岳寳臣子寳臣死軍中推為留後求襲父位德宗不許趣䕶喪京師以張孝忠代之惟岳拒命詔朱滔等討之其將王武俊殺惟岳以降王武俊本出契丹為李寳臣裨將李惟岳既死武俊遣使請命詔授武俊恒冀觀察使而惟岳將楊政義等以深定二州來降武俊怨不得節度又失二州乃反僭號趙王興元初乃黜偽號請命詔授節度使加同平章事以破朱滔功封清河郡王卒士真武俊長子嗣為節度使拜同平章事卒承宗士真子初為副大使憲宗即位欲析鎮藩遣使諭承宗承宗乃上德棣二州詔以薛昌朝為保信軍節度使統德棣承宗拒命却昌朝囚之帝怒削承宗官爵遣兵討之久無功而淄青盧龍數表請赦承宗乃罷兵盡以故地畀之承宗復拒命出兵掠鄰鄙為吳元濟平乃恐遣二子入侍歸德棣二州詔復官爵卒軍中推其弟承元為留後承元不敢請命於朝詔以為義成軍節度使廷湊本回紇阿布思之族為武俊養子世為裨將承元既以成德軍請命後詔以田宏正為節度使庭湊以軍作亂害宏正自稱留後脅監軍表請節又取冀州穆宗怒詔宏正子布以魏博兵討之㑹魏博軍變布死乃赦庭湊庭湊復拒命討之無功後庭湊上書謝表上景州穆宗厭兵赦之復其官爵封太原郡公卒元逵庭湊次子庭湊死軍中以元逵請命詔襲節度使以討劉稹功加同平章事太原郡公卒紹鼎元逵子嗣為節度使遷尚書左僕射卒紹懿元逵次子嗣為留後封太原縣伯加檢校司空卒景崇紹鼎子嗣為節度使以討龎勛功進檢校尚書右僕射同平章事常山王卒鎔景崇子嗣為節度為李克用所擊兵敗與克用和後復附於朱全忠全忠既簒封鎔趙王全忠謀取河北鎔附克用後為其將張文禮所殺滅王氏之族文禮自為留後李存朂討而誅之自廷湊至鎔凡百年右鎮冀據六州恒定易趙深冀傳二姓李懷仙柳城胡為安禄山禆將史朝義以為幽州節度使朝義敗懷仙使其將李抱忠奉其首來降即授幽州盧龍節度使封武威郡王大厯三年為其麾下朱希彩朱泚及弟滔所殺族其家朱希彩幽州昌平人既與泚滔殺懷仙自稱留後代宗赦其罪詔宰相王縉為節度使以希彩副之縉至鎮度希彩不可制勞軍即還乃授希彩節度使封高密郡王七年為其下所殺泚希彩同宗軍衆既殺希彩推為留後詔即拜節度使封懷寧郡王後入朝留京師滔泚弟泚既入朝滔攝留後泚留京師滔遂領節度討李惟岳取深州德宗賜以德棣二州以康日知為深趙二州團練使滔失深州不平乃與王武俊等同叛僭號冀王武俊説推滔為盟主涇原軍變泚僭逆武俊等乃叛滔攻之泚既誅滔兵復敗上書待罪詔洗釁與更始未幾卒劉怦幽州昌平人朱滔時積功至雄武軍使滔死軍中推怦總軍事詔為節度使彭城郡公卒濟怦子怦嗣節度累遷同平章事以討王承宗功進中書令為其子總所毒死總濟次子既毒其父即領軍政詔嗣節度封楚國公進同平章事㑹吳元濟李師道平總恐乃用譚忠謀上疏願奉朝請髠髮為浮屠詔張宏靖領其軍總入朝至定州卒朱克融滔族孫以偏校隨劉總入朝留京師久不得調詣宰相求自試不聽無聊怨忿張宏靖赴鎮從還幽州軍變囚宏靖推克融領軍務時朝廷方討王庭湊薄克融罪就拜節度遷司空吳興郡王後軍亂殺克融子延嗣領留後大將李載義殺而代之族其家李載義自稱恒山愍王之後為幽州牙中兵馬使朱克融死子延立叛命殘虐載義率衆殺之敬宗授載義節度使封武威郡王以討賊功進同平章事後為兵馬使楊志誠所逐入朝為山南節度使楊志誠為載義牙將逐載義自為留後詔以為節度副使遷尚書右僕射後為其下所逐推部將史元忠總留後詔以為副大使會昌初為偏將陳行泰所殺行泰邀節制未報次將張絳殺之張仲武范陽人為雄武軍使遣其屬入朝請擊囘鶻自效㑹張絳殺陳行泰求節宰相李德裕請用仲武乃以為留後絳果為軍所逐以破回鶻等功遷進節度使同平章事卒子直方嗣為留後俄進副大使直方舉動多不法畏下變起乃奔京師詔以為金吾將軍後為黄巢所殺張允伸范陽人為都知兵馬使直方出奔衆推為留後俄遷節度使同平章事燕國公卒張公素范陽人為别將事允伸允伸死表其子簡㑹為留後公素以兵來㑹喪軍士附之簡㑹乃出奔詔公素為節度使進同平章事後為李茂勲所襲奔京師李茂勲本回鶻阿布思之裔來降賜姓為燕將誣納降軍使陳貢言反襲殺