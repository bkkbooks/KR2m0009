以五路兵攻之大小數十戰繼遷遁去太宗崩乃遣使修貢求領蕃任真宗復賜姓名拜定難軍節度使後復入㓂䧟靈州為其番部射死子德明入貢上表歸欵拜定難節度使西平王進封夏王卒子元昊嗣景祐初入㓂後攻唃厮囉䧟𤓰沙肅三州盡得河西之地寳元元年僭號改元詔削奪元昊官爵遣兵討之慶歴四年乃遣使稱臣冊為夏國主嵗賜銀絹茶綵共二十五萬五千仍聽市易卒子諒祚立治平三年入冦明年种諤取綏州城之諒祚卒子秉常立元豐四年遣李憲等五路兵攻之取四砦城永樂夏人陷之秉常卒子乾順立元祐時來請所侵地并送還永樂陷沒人口詔還其米脂安强浮圖葭蘆四砦紹聖後章惇為相遣師伐之夏人亦歳歳㓂邊初夏國恃横山諸族帳强勁善戰故用以抗中國种諤謀取横山故興靈州之師及王師失利李憲始獻進築之䇿神宗厭兵不克行童貫舊常從憲得其髣髴故獻議進築遂領六路邊事將諸路兵六七年進築軍壘建立保砦遂得横山之地夏人失所恃遂納欵夏國自此少衰矣㑹金滅遼乾順以事遼之禮事金金人以天德雲中金肅河清四軍及八館之地賂之未幾復奪其地建炎時遣使入夏乾順已僭稱制待使倨自後始用敵國禮張浚吳玠遣使約夏夾攻金卒無成説紹興九年李顯忠自夏來歸是年乾順卒子天祈立嘉定間金遷汴有西都長安之意宿重兵於鞏州夏畏之遣使來議夾攻四川宣閫安丙從之遣董炤等攻鞏州不利繼乾順而立者正史作天祈建炎以來朝野雜記作仁孝未知孰是自乾順之死至嘉定甲申凡八十餘年其後立者決非一主并夏亡之嵗月正史不載當續考右靈夏據五州夏銀綏宥靜唐末藩鎮按唐末宇内皆為節鎮而所謂節鎮者非士卒殺主帥則盗賊逐牧守朝廷不能討因而命之大槩皆欲互相噬吞廣自封殖以為子孫傳襲之計江淮以南之蠭起者其地非英雄所必爭又值中州多故無暇逺略故皆能傳世而北方節鎮其驟興忽敗不能以一世多為宣武河東所併獨鳳翔之初起也據地最多故能崛强汴晉之間相為長雄後雖日削而傳襲亦及再世靈夏僻在一隅據五州之地世事中朝及宋興四方僭偽節鎮悉已削平獨不能取其地盖自繼遷以來效化外蕃以至於獷悍難制雖加之以强弓毒矢而亦能自存傳世三百餘年然其地則唐之地而其初亦唐之節鎮也故叙鳯翔靈夏以繼唐史藩鎮傳所載八鎮之後先公曰嗚呼宇宙之為天下裂豈一朝一夕之故哉太宗初置沿邊節度使天寳十載分西北十節度大率以其兵防邊耳固未嘗有世襲之節度也自安史亂而後河北三鎮有世襲之節度然猶未有東南之世襲節度也自黄巢亂而後東南徧海内皆為世襲節鎮矣五代十國皆節鎮之流裔而并合者也自宣武併河中魏博淄青成德澤州而為梁自河東據潞州而為晉然後吳以淮南越以鎮海閩以威武楚以武安靜江南漢以清海岐以鳳翔邠寧蜀以兩川而燕之盧龍荆之荆南亦併出焉楊行密廬州合淝人以盜見獲為兵遷隊將逐廬州刺史據其州詔就拜刺史淮南節度使高駢為畢師鐸等所攻行密擊之取揚州後取宣潤滁和等州唐拜行密淮南節度使同平章事行密遣兵攻取自淮以南江以東諸州皆下之進拜中書令吳王卒子渥嗣後為徐溫張顥等所殺弟隆演嗣即吳王位改元卒弟溥立僭即皇帝位後禪位於徐知誥右淮南傳四世四十六年行密以唐景福元年入揚州至溥以晉天福二年為李氏所簒王建許州舞陽人為忠武軍卒遷隊將𨽻軍將鹿宴宏僖宗在蜀以兵隨駕扈從有功遷壁州刺史以兵取閬利梓等州逐西川節度使韋昭度而代之又攻成都殺陳敬暄田令孜乃以建為西川節度使復攻東川取之并有兩川山南之地封蜀王梁簒唐建乃僭號皇帝卒子衍嗣立唐莊宗既滅梁乃遣兵伐蜀取之衍降見殺右前蜀二世三十五年建以唐大順二年為西川節度使至衍以後唐同光三年亡孟知祥邢州龍岡人仕晉為左教練使遷太原尹莊宗既滅王衍乃以知祥為劍南西川節度副大使明宗立知祥陰有據蜀之志殺監軍李嚴與東川節度使董璋俱反唐師討之不利知祥遂攻東川殺董璋取其地乃遣使入朝唐封為蜀王唐明宗崩知祥僭號皇帝後復取山南之地卒子㫤嗣時中國多故雄武軍節度使何建以秦成階三州附於蜀㫤又取鳳州盡得王衍故地周世宗時伐蜀取秦成階鳳宋乾德三年遣師伐蜀取之㫤降封秦國公卒右後蜀二世四十一年知祥以後唐同光三年為節度使至㫤以宋乾德三年亡劉隱其祖安仁上蔡人後徙閩中商賈南海因家焉父謙為廣州牙將黄巢冦廣廣州表謙為封州刺史賀江鎮遏使以禦梧桂謙卒表隱代之㑹廣州節度劉崇龜死將盧琚等作亂隱以封州兵討殺琚迎節度使嗣薛王知柔徐彦若代知柔表隱節度副使彦若卒軍中推隱為留後天祐時拜節度使梁初進太師封南平王卒弟龑嗣以兵取潮韶及容管邕管僭號皇帝卒子玢嗣立後為其弟晟所弑晟既弑玢遂自立值馬氏政亂乃出兵攻楚克桂宜嚴梧蒙五州又取柳州卒子鋹嗣立宋開寳四年遣師伐南漢取之鋹降封恩赦侯右南漢五世六十七年隱以唐天祐二年為廣州節度使至鋹以宋開寳四年亡馬殷許州鄢陵人初為孫儒裨將儒攻宣州敗死殷與其下推劉建峰為主轉攻豫章䖍吉入湖南取潭州建峰自稱留後僖宗因授之建峰為其下所殺軍司馬張佶率衆推殷為主拜潭州刺史殷攻連邵郴衡道永六州皆下之又取桂州拜武安軍節度使梁時拜中書令封楚王又取嶺南昭賀梧䝉龔富等州澧溆辰州皆附於殷拜天䇿上將軍唐滅梁殷入貢仍封爵卒子希聲立授武安靜江等軍節度使卒追封衡陽王弟希範立卒弟希廣立為其兄希蕚所攻兵敗自縊死希蕚既殺希廣遂自立臣於李景其將徐威等作亂執希蕚立其弟希崇彭師暠等復奉希蕚為衡山王臣於李景希崇亦請命於景景遣邊鎬將兵入楚盡遷馬氏之族於金陵周行逢武陵人與王進逵俱為靜江軍卒事希蕚進逵攻唐將邊鎬逐之行逢復破唐兵進逵奉表京師周太祖以為武安節度使以劉言為武平節度使進逵與言有隙行逢為畫謀襲殺言進逵據武陵行逢據潭州會進逵為潘叔嗣所殺行逢殺叔嗣取武陵卒子保權立衡州刺史張文表畔之保權遣使請命太祖命慕容延釗討之保權舉族朝於京師右湖南馬氏五世五十七年殷自唐乾寧三年有湖南至希蕚以周廣順元年為南唐所滅周氏再世十年行逢以周顯德元年拜節度使至保權以宋乾德元年納土錢鏐杭州臨安人始為石鏡鎮將董昌偏裨擊黄巢有功為都將擊劉漢宏破越州昌徙居越而鏐為杭州刺史擊取蘇常潤等州進鎮海節度使同平章事昌僭逆鏐討平之盡有兩浙之地拜中書令越王梁時封吳越王尚父卒子元瓘立卒子佐立破李景兵福州卒弟俶立太平興國三年俶入覲盡獻其地右兩浙四世八十四年鏐以唐乾寧二年為鎮海鎮東軍節度使有兩浙至俶以宋太平興國三年納土王潮光州固始人初為縣史壽州人王緒攻陷固始以潮為軍校緒為秦宗權所攻率衆南奔自南康入汀陷漳浦緒性忌多殺潮與其前鋒將執緒殺之推潮為主授泉州刺史攻福州克之授福建觀察使卒弟審知立授威武軍節度使同平章事封瑯琊王梁時封為閩王卒子延翰立後為其弟延禀延鈞所殺延鈞既殺延翰更名鏻自立後唐拜為節度使閩王後僭號皇帝為其子繼鵬及李倣所弑繼鵬立更名㫤遣使朝貢於晉後為王延羲所殺延羲審知少子嗣立更名曦後為其臣連重遇所殺延政審知子初為建州刺史曦淫虐延政數諌之曦怒攻延政兵敗延政乃以建州建國稱殷明年曦遇弑連重遇立朱文進盡殺王氏子孫稱晉年號重遇復殺文進南唐李景聞閩亂發兵攻之遂取閩遷延政之族於金陵右福建六世五十五年潮以唐景福元年入福州拜觀察使至延政以晉開運三年為李唐所殺高季興陜州硤石人初為汴人李讓家僮朱温鎮宣武事温梁開平初拜荆南節度均王時阻兵自守均王優容之封為渤海王梁亡朝唐莊宗明帝時取䕫萬歸峽等州臣於吳卒子從誨立復臣唐封南平王卒子保融立襲封南平王卒弟保朂立卒兄子繼冲立建隆四年太祖詔慕容延釗討湖南張文表假道荆南入其郛繼冲懼以地内附舉族入朝右南平五世凡五十七年季興以梁開平元年鎮南至繼冲以宋乾德元年納土按唐末五代以來八國其初亦皆世襲節鎮也故叙其興滅之歳月傳授之世次附於唐方鎮之後或曰五代史之十國世家即晉書十六國載記之流也何十六國獨無述乎曰十六國乃夷狄之據地而欲自為帝王者也未嘗受命於晉難以藩方目之故除張李二涼之外不復録若此八國則雖出於卒伍盗賊然其竊地之初皆常請命於天子而畀以旌節矣後雖僭號而其源則藩侯也故叙之若南唐受禪於楊氏北漢繼世於河東則其初即稱帝是以亦不復錄云文獻通考卷二百七十六
