body:
  text: 文獻通考卷二百八十一鄱陽馬端臨貴與著象緯考四瑞變各星及雲氣名狀隋天文志梁奉朝請祖暅天監中受詔集古天官及圖緯舊說撰天文錄三十卷逮周氏克梁獲庾季才為太史令撰靈臺祕苑一百二十卷占驗益備今畧其雜星瑞星妖星客星流星及雲氣名狀次之於此云瑞星一曰景星如半月生於晦朔助月為眀或曰星大而中空或曰三星在赤方氣與青方氣相連黄星在赤方氣中亦名徳星二曰周伯星黄色煌煌然所見之國大昌三曰含譽光耀似彗喜則含譽射四曰格澤如炎火下大上兌色黄白起地而上見則不種而穫有土功有大客中興天文志瑞星有十二一曰景星一名徳星二曰周伯三曰含譽四曰王蓬芮五曰格澤六曰元保七曰昭眀八曰昏昌九曰旬始十曰司危十一曰菟昌十二曰地維臧光瑞星五行之冲和氣也五行順樂旺相喜合之所生也周伯王蓬芮皆古者髙世不仕之人王其姓蓬芮其名周伯其姓字也其精為星帝命之為瑞星三家義同然考之晉志瑞星止四星其周伯又於客星見之無王蓬芮而客星則有王蓬絮芮所至之國非福也而三家所言妖星則别有蓬星焉曰蓬芮曰蓬絮芮曰蓬星其言福禍不同豈各有據乎並存之又晉志無元保以下七星其昭眀司危地維臧光則皆為妖星若隋志則因晉志而又無格澤疑當從晉志星雜變一曰星晝見若星與日並出名曰嫁女星與日争光武且弱文且强女子為王在邑為䘮在野為兵又曰臣有姦心上不眀臣下從横大水浩洋又曰星晝見虹不滅臣蔽主眀星奪日光天下有立王二曰恒星不見恒星者在位人君之類不見者象諸侯之背畔不佐王者奉順法度無君之象也又曰恒星不見主不嚴法度消又曰天子失政諸侯横暴又曰常星列宿不見象中國諸侯微滅也三曰星鬭星鬭天下大亂四曰星搖星搖人衆將勞五曰星隕大星隕下陽失其位災害之萌也又曰衆星墜人失其所也凡星所墜國易政又曰星墜當其下有戰塲天下亂期三年又曰奔星之所墜其下有兵列宿之所墜滅家邦衆星之所墜衆庶亡又曰塡星墜海水溢黄星騁海水躍又曰黄星墜海水傾亦曰星墜而渤海決星隕如雨天子微諸侯力政五伯代興更為盟主衆暴寡大并小又曰星辰附離天猶庶人附離王者也王者失道綱紀廢下將畔去故星畔天而隕以見其象國有兵凶則星墜為鳥獸天下將亡則星墜為飛蟲天下大兵則星墜為金鐵天下有水則星墜為土國主有兵則星墜為草木兵起國主亡則星墜為沙星墜為人而言者善惡如其言又曰國有大䘮則星墜為龍流星流星天使也自上而降曰流自下而升曰飛大者曰奔奔亦流星也星大者使大星小者使小聲隆隆者怒之象也行疾者期速行遲者期遲大而無光者衆人之事小而光者貴人之事大而光者其人貴且衆也乍眀乍滅者賊敗成也前大後小者恐憂前小後大者喜事也蛇行者姦事也徃疾者徃而不返也長者其事長久也短者事疾也奔星所墜其下有兵無風雲有流星見良久間乃入為大風發屋折木小流星百數四面行者庶人流移之象流星異狀名占不同今畧古書及荆州占所載云流星之尾長二三丈暉然有光竟天其色白者主使也色赤者將軍使也流星有光其色黄白者從天墜有音如炬熛火下地野雉盡鳴斯天保也所墜國安有喜若水流星其色青赤名曰地雁其所墜者起兵流星有光青赤其長二三丈名曰天雁軍之精華也其國起兵將軍當從星所之流星暉然有光白長竟天者人主之星也主相將軍從星所之凡星如甕者為發謀起事大如桃者為使事流星大如缶其光赤黑有喙者名曰梁星其所墜之鄉有兵君失地飛星大如缶若甕後皎然白前卑後髙此謂頓頑其所從者多死亡削邑而不戰有飛星大如缶若甕後皎然白前卑後髙搖頭乍上乍下此謂降石所下民食不足飛星大如缶若甕後皎然白星滅後白者曲環如車輪此謂解銜其國人相斬為爵祿此謂自相齧食有飛星大如缶若甕其後皎然白長數丈星滅後白者化為雲流下名曰大瀆所下有流血積骨有飛星大如缶若甕後皎白縵縵然長可十餘丈而委曲名曰天刑一曰天飾將軍均封疆天狗狀如大奔星色黄有聲其止地類狗所墜望之如火光炎炎衝天其上銳其下圓如數頃田處或曰星有毛旁有短彗下有狗形者或曰星出其狀赤白有光下即為天狗一曰流星有光見人面墜無音若有足者名曰天狗其色白其中黄黄如遺火狀主候兵討賊見則四方相射千里破軍殺將或曰五將鬭人相食所徃之鄉有流血其君失地兵大起國易政戒守禦餘占同前營頭有雲如壊山墮所謂營頭之星所墮其下覆軍流血千里亦曰流星晝隕名營頭中興天文志流星有八一曰天使二曰天暉三曰天雁四曰天保五曰地雁六曰梁星七曰營頭八曰天狗自上而降曰流東西横行亦曰流奔亦流也流星之為天使者有祥有妖流星之為天暉天雁者祥流星夜隕而為天保者亦祥流星夜隕而為地雁為梁星者妖流星晝隕或夜隕而為營頭者亦妖流星之大者為奔星奔星夜隕而為天狗其妖甚矣飛星有五一曰天刑二曰降石三曰頓頑四曰解銜五曰大瀆自下而升曰飛飛星之為天刑者祥自降石以下皆妖妖星妖星者五行之氣五星之變各見其方以為殃災各以其日五色占知何國吉凶決矣行見無道之國失禮之邦為兵為饑水旱死亡之徵也又曰凡妖星所出形狀不同為殃如一其出不過一年若三年必有破國屠城其君死天下大亂兵士亂行戰死於野積尸從横餘殃不盡為水旱兵饑疾疫之殃又曰凡妖星出見長大災深期逺短小災淺期近三尺至五尺期百日五尺至一丈期一年一丈至三丈期三年三丈至五丈期五年五丈至十丈期七年十丈以上期九年審以察之其災必應一曰彗星所謂掃星本類星末類彗小者數寸長或竟天見則兵起大水主掃除除舊布新有五色各依五行本精所主史臣按彗體無光傅日而為光故夕見則東指晨見則西指在日南北皆隨日光而指頓挫其芒或長或短光芒所及則為災二曰孛星彗之屬也偏指曰彗芒氣四出曰孛孛者孛孛然非常惡氣之所生也内不有大亂外則有大兵天下合謀闇蔽不眀有所傷害晏子曰君若不政孛星將出彗星何懼乎由是言之災甚於彗三曰天棓一名覺星本類星末銳長四丈或出東北方西方主奮争四曰天槍其出不過三月必有破國亂君伏死其辜殃之不盡當為旱饑暴疾五曰天欃石氏曰雲如牛狀甘氏曰本類星末銳巫咸曰彗星出西方長可二三丈主捕制六曰蚩尤旗類彗而後曲象旗或曰赤雲獨見或曰其色黄上白下或曰若植雚而長名曰蚩尤之旗或曰如箕可長二丈末有星主伐枉逆主惑亂所見之方下有兵兵大起不然有䘮七曰天衝出如人蒼衣赤頭不動見則臣謀主武卒𤼵天子亡八曰國皇大而赤類南極老人星或曰去地三丈如炬火主内寇内難或曰其下起兵兵强或曰外内有兵䘮九曰昭眀象如太白光芒不行或曰大而白無角乍上乍下一曰赤彗分為昭眀昭眀滅光以為起霸起徳之徵所起國兵多變一曰大人凶兵大起十曰司危如太白有目或曰出正西西方之野星去地有六丈大而白或曰大而有毛兩角或曰類太白數動察之而赤為乖争之徵主擊强兵見則主失法豪傑起天子以不義失國有聲之臣行主徳十一曰天欃彗出西北狀如劍長四五丈或曰如鉤長四丈或曰狀白小數動主殺罰出則其國内亂其下相䜛為饑兵赤地千里枯骨藉藉十二曰五殘一名五鋒出正東東方星之狀類辰可去地六七丈或曰蒼彗散為五殘如辰星出角或曰星表有氣如暈有毛或曰大而赤數動察之而青主乖亡為五分毁敗之徵亦為備急兵見則主誅政在伯野亂成有急兵有䘮不利衝十三曰六賊見出正南南方之星去地可六丈大而赤動有光或曰形如彗五殘六賊出禍合天下逆侵闗樞其下有兵衝不利十四曰獄漢一名咸漢出正北北方之野星去地可六丈大而赤數動察之中青或白赤表下有三彗從横主逐王主刺王出則隂精横兵起其下又為䘮動則諸侯驚十五曰旬始出北斗旁如雄雞其怒有青黑象伏鼈或曰怒雌也主争兵又曰黄彗分為旬始為立主之題主亂主招横見則臣亂兵作諸侯虐期十年聖人起伐羣猾横恣或曰出則諸侯雄鳴十六曰天鋒彗象矛鋒天下從横則天鋒星見十七曰燭星如太白其出也不行見則不久而滅或曰主星上有三彗上出所出城邑亂有大盗不成又以五色占十八曰蓬星大如二斗器色白一名王星狀如夜火之光多至四五少一二一曰蓬星在西南長數丈左右兌出而易處星見不出三年有亂臣戮死又曰所出大水大旱五榖不收人相食十九曰長庚如一疋布著天見則兵起二十曰四鎮星出四隅去地六丈餘或曰可四丈或曰星大而赤去地二丈常以夜半時出見十月而兵起皆為兵起其下二十一曰地維臧光出四隅或曰大而赤去地二三丈如月始出見則下有亂亂者亡有徳者昌河圖云嵗星之精流為天棓天槍天猾天衝國皇反登蒼彗熒惑散為昭旦蚩尤之旗昭眀司危天欃赤彗鎮星散為五殘獄漢大賁昭星絀流旬始蚩尤虹蜺擊咎黄彗太白散為天杵天柎伏靈大敗司姦天狗天殘卒起白彗辰星散為枉矢破女拂樞滅寳繞廷驚理大奮祀黑彗五色之彗各有長短曲折應象漢京房著風角書有集星章所載妖星皆見於月旁互有五色方雲以五寅日見各有五星所生云天槍天根天荆真若天猿天樓天垣皆嵗星所生也見以甲寅其星咸有兩青方在其旁天隂晉若官張天惑天雀赤若蚩尤皆熒惑之所生出在丙寅日有兩赤方在其旁天上天伐從星天樞天翟天沸荆彗皆鎮星之所生也出在戊寅日有兩黄方在其旁若星帚星若彗竹彗牆星㨬星白雚皆太白之所生也出在庚寅日有兩白方在其旁天美天毚天社天麻天林天蒿端下皆辰星之所生也出以壬寅日兩黑方在其旁以前三十五星即五行氣所生皆出於月左右方氣之中各以其所生星將出不出日數期候之當其未出之前而見見則有水旱兵䘮饑亂所指亡國失地王死破軍殺將中興天文志凡妖星五行之乖戾氣也五行掩合陵犯怒逆錯亂流離雜變之所生也孛本黄帝時一女子修行不得其死蚩尤則黄帝所誅者亦五行戾氣之所蓄結而為之者也按申須公羊杜預郭璞俱以彗孛為一星左氏昭十七年有星孛於大辰魯申須曰彗所以除舊布新也公羊曰孛者何彗星也文公十四年有星孛於北斗杜預曰孛彗也郭璞釋爾雅曰彗妖星也亦謂之孛綜其實不然彗孛長三星其占畧同而其形少異孛星光芒短其光四出蓬蓬孛孛然彗星光芒長參之如掃帚長星光芒有一直或竟天或十丈或三十丈宋均注鈎命決曰彗五彗也蒼則王侯破天子苦兵赤則賊起强國恣黄則女害色權奪於后妃白則將軍逆二年兵大作黑則水精賊江河決賊處處起史記彗出東井東井齊分景公以為憂晏子曰君髙臺深池賦歛如弗得刑罰恐弗勝孛星將出彗星何懼乎然則孛甚彗也董仲舒曰孛者乃非常惡氣之所生也大率孛彗為除舊布新火災長星為兵革事又曰變星天官書及漢晉隋志所載紛雜象位色占或相抵迕盖祥妖之所係知者不𫝊𫝊者不真徃哲先賢心口相授不著之書以為國之重事故也今訂其繁重削其繆妄定正其數而存其名晉隋志又載漢京房風角書云五緯所生妖星三十五旁各有五色方雲常見月左右木火金水各生所屬宿中惟鎮星所生無所從出又載河圖說云五緯之精散為妖星又三十五既多複出不可考而其分𨽻又徃徃傅㑹難信云客星客星者周伯老子王蓬絮國皇温星皆客星也行諸列舍十二國分野各在其所臨之邦所守之宿以占吉凶周伯大而色黄煌煌然見其國兵起若有䘮天下饑衆庶流亡去其鄉瑞星中名狀與此同而占異老子眀大色白淳淳然所出之國為饑為凶為善為惡為喜為怒常出見則兵大起人主有憂王者以赦除咎則災消王蓬絮狀如紛絮拂拂然見則其國兵起若有䘮白衣之㑹其邦饑亡又曰王蓬絮星色青而熒熒然所見之國風雨不如節焦旱物不生五榖不成登蝗蟲多國皇星出而大其色黄白望之有芒角見則兵起國多變若有水饑人主惡之衆庶多疾温星色白而大狀如風動搖常出四隅出東南天下有兵將軍出於野出東北當有千里暴兵出西北亦如之出西南其國兵䘮並起若有大水人饑又曰温星出東南為大將軍服屈不能𤼵者出於東北暴骸三千里出西亦然凡客星見其分若留止即以其色占吉凶星大事大星小事小星色黄得地色白有䘮色青有憂色黑有死色赤有兵各以五色占之皆不出三年又曰客星入列宿中外官者各以其所出部舍官名為其事近之者為其謀其下之國皆受其禍以所守之舍為其期以五氣相賊者為其使中興天文志客星有三一曰老子二曰國皇三曰温星老子一星休咎半之國皇温星皆為咎徵老子非李耳古之有徳行而不仕老而有夀之人國皇者國星也不知何國人温星者温其姓古之有操行不仕者也三人者其精皆為星帝命之為客星錯出乎五緯之間其見無期其行無度晉志無國星温星而有周伯王蓬絮芮又有盗星種陵天狗女帛之為凶也隋志五星周伯蓬絮同晉志其三星與此同然周伯晉志以為祥隋志以為妖雲氣瑞氣一曰慶雲若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲亦曰景雲此喜氣也太平之應二曰歸邪如星非星如雲非雲或曰星有兩赤彗上向有盖下連星見必有歸國者三曰昌光赤如龍狀聖人起帝受終則見妖氣一曰虹蜺日旁氣也斗之亂精主惑心主内淫主臣謀君太子詘后妃顓妻不一二曰䍧雲如狗赤色長尾為亂君為兵䘮十煇周禮眡祲氏掌十煇之法以觀妖祥辨吉凶一曰祲謂隂陽五色之氣浸淫相侵或曰抱珥背璚之屬如虹而短是也二曰象謂雲氣成形象如赤烏夾日以飛之類是也三曰鑴日旁氣刺日形如童子所佩之鑴四曰監謂雲氣臨在日上也五曰闇謂日月蝕或曰光脫也六曰瞢謂瞢瞢不光眀也七曰彌謂白虹彌天而貫日也八曰序謂氣若山而在日上或曰冠珥背璚重疊次序在於日旁也九曰隮謂暈氣也或曰虹也詩所謂朝隮於西者也十曰想謂氣五色有形想也青饑赤兵白䘮黑憂黄熟或曰想思也赤氣為人獸之形可思而知其吉凶也凡遊氣蔽天日月失色皆是風雨之候也沉隂日月俱無光晝不見日夜不見星有雲障之兩敵相當隂相圖議也日濛濛無光士卒内亂又曰數日俱出若鬭天下兵起大戰日鬭下有拔城日戴者形如直狀其上微起在日上為戴戴者徳也國有喜也一云立日上為戴青赤氣抱在日上小者為冠國有喜事青赤氣小而交於日下為纓青赤氣小而圓一二在日下者為紐青赤氣如小半暈狀在日上為負負者得地為喜又曰青赤氣長而斜倚日旁為㦸青赤氣圓而小在日左右為珥黄白者有喜又曰有軍日有一珥為喜在日西西軍戰勝在日東東軍戰勝南北亦如之無軍而珥為拜將又日旁如半環向日為抱青赤氣如月初生背日者為背又曰背氣青赤而曲外向為叛象分為反城璚者如𢃄璚在日四方青赤氣長而立旁為直日旁有一直敵在一旁欲自立從直所擊者勝日旁有二直三抱欲自立者不成順抱擊者勝殺將氣形三角在日四方為提青赤氣横在日上下為格氣如半暈在日下為承承者臣承君也又曰日下有黄氣三重若抱名曰承福人主有吉喜且得地青白氣如履在日下者為履日旁抱五重戰順抱者勝曰一抱一背為破走抱者順氣也背者逆氣也兩軍相當順抱擊逆者勝故曰破走日抱且兩珥一虹貫抱抱至日順虹擊者勝殺將日抱兩珥且璚二虹貫抱至日順虹擊者勝日重抱内有璚順抱擊者勝亦曰軍内有欲反者日重抱左右二珥有白虹貫抱順抱擊勝得二將有三虹得三將日抱黄白潤澤内赤外青天子有喜有和親來降者軍不戰敵降軍罷色青黄將喜赤將兵争白將有䘮黑將死日重抱且背順抱擊者勝得地若有罷師日重抱抱内外有璚兩珥順抱擊者勝破軍軍中不和不相信日旁有氣圓而周匝内赤外青名為暈日暈者軍營之象周環匝日無厚薄敵與軍勢齊等若無軍在外天子失御民多叛日暈有五色有喜不得五色者有憂凡占兩軍相當必謹審日月暈氣知其所起留止逺近應與不應疾遲大小厚薄長短抱背為多少有無實虚久亟宻疎澤枯相應等者勢等近勝逺疾勝遲大勝小厚勝薄長勝短抱勝背多勝少有勝無實勝虚久勝亟宻勝疎澤勝枯重背大破重抱為和親抱多親者益多背為天下不和分離相去背於内者離於内背於外者離於外也凡占分離相去赤内外青以和相去青内赤外以惡相去日暈眀久内赤外青外人勝内青外赤内人勝内黄外青黑内人勝外黄内青黑外人勝外白内青外人勝内白外青内人勝内黄外青外人勝内青外黄内人勝日暈周匝東北偏厚厚為軍福在東北戰勝西南戰敗日暈黄白不鬭兵未解青黑和解分地色黄土功動人不安日色黑有水隂國盛日暈七日無風雨兵大作不可起衆大敗不及日蝕日暈而眀天下有兵兵罷無兵兵起不戰日暈始起前滅而後成者後成面勝日暈有兵在外者主人不勝日暈内赤外青羣臣親外外赤内青羣臣親内其身身外其心日有朝夕暈是謂失地主人必敗日暈而珥主有謀軍在外外軍有悔日暈抱珥上將軍易日暈而珥如井幹者國亡有大兵交日暈上西將軍易兩敵相當日暈兩珥平等俱起而色同軍勢等色厚潤澤者賀喜日暈有直珥為破軍貫至日為殺將日暈圓且戴國有喜戰從戴所擊者勝得地日暈而珥背左右如大車輞者兵起其國亡城兵滿野而城復歸日暈暈内有珥一抱所謂圍城者在内内人則勝日暈有重抱後有背戰順抱者勝得地有軍日暈有一抱抱為順貫暈内在日西西軍勝有軍日暈有一背背為逆在日西東軍勝餘方放此日暈而背兵起其分失城日暈有背背為逆有降叛者有反城在日東東有叛餘方放此日暈背氣在暈内此為不和分離相去其色青外赤内節臣受王命有所之日暈上下有兩背無兵兵起有兵兵入日暈四背在暈内名曰不和有内亂日暈而四背如大車輞者四提設其國衆在外有反臣日暈四提必有大將出亡者日暈有四背璚其背端盡出暈者反從内起日暈而兩珥在外有聚雲在内與外不出三日城圍出戰日暈有背珥直而有虹貫之者順虹擊之大勝得地日暈有白虹貫暈至日從虹所指戰勝破軍殺將日暈有虹貫暈不至日戰從貫所擊之勝得小將日暈有一虹貫暈内順虹擊者勝殺將日暈二白虹貫暈有戰客勝日重暈有四五白虹氣從内出外以此圍城主人勝城不拔又曰重暈攻城圍邑不抜日暈二重其外清内濁不散軍㑹聚日暈三重有拔城日交暈無厚薄交争力勢均厚者勝日交暈人主左右有争者兵在外戰日在暈上軍罷交暈貫日天下有破軍死將日交暈而争者先衰不勝即兩敵相向交暈至日月順以戰勝殺將一法日在上者勝日有交者赤青如暈狀或如合背或正直交者偏交也兩氣相交也或相貫穿或相向或相背也交主内亂軍内不和日交暈如連環為兩軍兵起君争地日有三暈軍分為三日方暈而上下聚二背將敗人亡日暈若井垣若車輪二國皆兵亡又曰有軍日暈不匝半暈在東東軍勝南北亦如之日暈如車輪半軍在外者罷日半暈東向者西夷羌胡來入國半暈西向者東夷人欲反入國半暈北向者南夷人欲反入國半暈南向者北夷人欲反入國又曰軍在外月暈師上其將戰必勝月暈黄色將軍益秩祿得位月暈有兩珥白虹貫之天下大戰月暈而珥兵從珥攻擊者利月暈有蜺雲乘之以戰從蜺所徃者大勝月暈虹蜺直指暈至月者破軍殺將雜氣天子氣内赤外黄四方所發之處當有王者若天子欲有遊徃處其地亦先發此氣或如城門隠隠在氣霧中恒帯殺氣森森然或如華盖在氣霧中或氣象青衣人無手在日西或如龍馬或雜色鬱鬱衝天者此皆帝王氣猛將之氣如龍如猛獸或如火煙之狀或白如粉沸或如火光之狀夜照人或白而赤黑繞之或如山林竹木或紫黑如門上樓或上黑下赤狀似黑旌或如張弩或如埃塵頭銳而卑本大而髙此皆猛將之氣也氣發漸漸如雲變作山形將有深謀凡軍勝之氣如堤如坂前後磨地或如火光將軍勇士卒猛或如山隄山上若林木將士驍勇或如埃塵粉沸其色黄白或如人持斧向敵或如蛇舉首向敵或氣如覆舟雲如牽牛或有雲如鬭雞赤白相連在氣中或發黄氣皆將士精勇凡氣上黄下白名曰善氣所臨之軍敵欲求和退凡負氣如馬肝色或如死灰色或類偃盖或類偃魚或黑氣如壊山墜軍上者名曰營頭之氣或如羣羊羣猪在氣中此衰氣也或如懸衣如人相隨或紛紛如轉蓬或如揚灰或雲如卷席如匹布亂穰者皆為敗徵氣如繫牛如人卧如雙蛇如飛鳥如決隄垣如壊屋如驚鹿相逐如兩雞相向此皆為敗軍之氣凡降人氣如人十十五五皆义手低頭又云如人义手相向或氣如黑山以黄為緣者皆欲降伏之象也凡堅城上有黑雲如星曰軍精或白氣如旌旗或青雲黄雲臨城皆有大喜慶或氣青色如牛頭觸人或城上氣如煙火如雙蛇如杵形向外或有雲分為兩彗狀者皆不可攻凡屠城之氣或赤如飛鳥或赤如敗車或有赤黑氣如貍皮斑或城中氣聚如樓出見於外營上有雲如衆人頭赤色其城營皆可屠氣如雄雉臨城其下必有降者凡伏兵有黑色渾渾圓長赤氣在其中或白氣粉沸起如樓狀或如幢節狀在烏雲中或如赤杵在烏雲中或如烏人在赤雲中凡暴兵氣白如𤓰蔓連結部隊相逐須臾罷而復出或白氣如仙人如仙人衣千萬連結部隊相逐罷而復興當有千里兵來或氣如人持刀楯雲如人色赤所臨城邑有卒兵至或赤氣如人持節兵來未息雲如方虹此皆有暴兵之象凡戰氣青白如膏如人無頭如死人卧如丹蛇赤氣隨之必大戰殺將四望無雲見赤氣如狗入營其下有流血凡連隂十日晝不見日夜不見月亂風四起欲雨而無雨名曰䝉臣有謀霧氣若晝若夜其色青黄更相奄冒乍合乍散亦然視四方常有大雲五色具者其下賢人隠也青雲潤澤蔽日在西北為舉賢良雲氣如亂穰大風將至視所從來雲甚潤而厚大雨必暴至四始之日有黑雲氣如陣厚大重者多雨氣若霧非霧衣冠不濡見則其城帯甲而趣日出沒時有霧雲横截之白者䘮烏者驚三日内雨者各解有雲如蛟龍所見處將軍失魄有雲如鵠尾來䕃國上三日亡有雲赤黄色四塞終日竟夜照地者大臣縱恣有雲如氣昩而濁賢人去小人在位凡白虹者百殃之本衆亂所基霧者衆邪之氣隂來冒陽凡白虹霧姦臣謀君擅權立威晝霧夜眀臣志得申凡夜霧白虹見臣有憂晝霧白虹見君有憂虹頭尾至地流血之象凡霧氣不順四時逆相交錯微風小雨為隂陽氣亂之象積日不解晝夜昏闇天下欲分離凡天地四方昏濛若下塵十日五日以上或一月或一時雨不沾衣而有土名曰霾故曰天地霾君臣乖凡海旁蜃氣象樓臺廣野氣成宫闕北夷之氣如牛羊羣畜穹廬南夷之氣類舟船幡旗自華以南氣下黑上赤嵩髙三河之郊氣正赤恒山之北氣青渤碣海岱之間氣皆正黑江淮之間氣皆白東海氣如員簦附漢河水氣如引布江漢氣勁如杼濟水氣如黑㹠渭水氣如狼白尾淮南氣如白羊少室氣如白兎青尾恒山氣如黑牛青尾東夷氣如樹西夷氣如室屋南夷氣如闍臺或類舟船陣雲如立垣雲類軸摶兩端兌㣿雲如繩居前亘天其半半天其蛪者類闕旗故鈎雲句曲諸此雲見以五色占而澤摶密其見動人及有兵必起合鬭其直雲氣如三疋帛廣前兌後大軍行氣也韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬周雲如車輪秦雲如行人魏雲如䑕鄭雲如絳衣越雲如龍蜀雲如囷車氣乍髙乍下徃徃而聚騎氣卑而布卒氣摶前卑後髙者疾前方而髙後銳而卑者却其氣平者其行徐前髙後卑者不止而返校騎之氣正蒼黑長數百丈遊兵之氣如彗掃一云長數百丈無根本喜氣上黄下赤怒氣上下赤憂氣上下黑土功氣黄白徙氣白凡候氣之法氣初出時若雲非雲若霧非霧髣髴若可見初出森然在桑榆上髙五六尺者是千五百里外平視則千里舉目望則五百里仰瞻中天則百里内平望桑榆間二千里登髙而望下屬地者三千里敵在東日出候之在南日中候之在西日入候之在北夜半候之軍上氣髙勝下厚勝薄實勝虚長勝短澤勝枯氣見以知大占期内有大風雨久隂則災不成天變洪範𫝊曰清而眀者天之體也天忽變色是謂易常天裂陽不足是謂臣强天裂見人兵起國亡天鳴有聲至尊憂且驚皆亂國之所由生也漢孝恵帝二年天開東北廣十餘丈長二十餘丈天裂陽不足下强盛將害上之變也其後有吕氏之禍晉恵帝元康二年二月天西南大裂天裂陽不足是時人主昏瞀后妃專制泰安二年八月庚午天中裂為二有聲如雷者三君道虧而臣下專僣之象也是日長沙王奉帝出距成都河間二王後成都河間東海又迭專威命是其應也元帝太興二年八月戊戌天鳴東南有聲如風水相薄京房易妖占曰天有聲人主憂三年十月壬辰天又鳴甲午止其後王敦入石頭王師敗績元帝屈辱於强臣既而晏駕大恥不雪穆帝升平五年八月己夘天中裂廣三四丈有聲如雷野雉皆鳴是後哀帝荒疾海内失徳皇太后臨朝太宗總萬㡬桓温專權威震内外隂氣盛陽氣微安帝隆安五年閏月癸丑天東南鳴六年九月戊子天東南又鳴是後桓元簒位安帝播越憂莫大焉鳴每東南者盖中興江外天隨之而鳴也義熙元年八月天鳴在東南京房易𫝊曰萬姓勞厥妖天鳴是時安帝雖反正而兵革嵗動衆庶勤勞也梁武帝天監十三年二月庚辰朔天震西南如裂中大同元年六月辛巳竟天有聲如風水相薄太清二年六月天裂於西北長十丈闊二丈光出如電其聲若雷十二月戊申天西北裂有光如火陳宣帝大建十三年九月癸未夜天東南有聲如風水相激三夜乃止十四年八月癸未天有聲如風水相激九月辛亥夜天東北有聲如蟲飛漸移西北後主至徳元年九月丁巳天東南有聲如蟲飛十二月戊午夜天開自西北至東南其内有青黄雜色隆隆若雷聲隋文帝開皇二十年四月乙亥天有聲如瀉水自南而北唐元宗天寳十四載五月天鳴聲若雷占曰人君有憂徳宗貞元二十一年八月天鳴在西北僖宗中和三年三月浙西天鳴若轉磨無雲而雨元和十二年正月乙酉星見而雨占曰無雲而雨是謂天泣宋神宗熙寧元年七月戊子丑之五刻西南雲間有聲鳴如風水相激寖周四方主民勞兵革嵗動六年七月丙寅丑之四刻西北方雲間有聲如磨物主百姓勞七年七月庚子丑之三刻西北天鳴主驚憂之事寧宗開禧元年六月壬寅天鳴有聲占人主憂驚百姓勞失文獻通考卷二百八十一
