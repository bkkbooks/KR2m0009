body:
  text: 文獻通考卷一百五十一鄱陽馬端臨貴與著兵考三兵制魏制略如東漢南北軍如故魏武為相國置武衛營相府以領軍主之文帝增置中營於是何武衛中壘二營以領軍將軍併五校統之是時有中左右前軍各一帥又有中護中領軍領護軍將軍各一人黃初中復令州郡典兵州置都督尋加四征四鎮將軍之號又置大將軍都督中外兵之柄世在司馬氏而魏祚移矣吳多舟師而兵有解煩敢死兩部又有車下虎士甘寧傳從攻合肥疫疾軍旅皆已引出唯車下虎士千餘人丹陽青巾孫皓傳丹陽太守沈瑩領丹陽鋭卒刀楯五十號曰青巾兵屢捷交州義士步隲傳權遣吕岱代隲隲將交州義士萬人出長沙及健兒武射之名調度亦無法健兒見凌統甘寧傳武射吏見駱統傳大率強者為兵羸者補户見陸遜傳至有二百餘家輒皆料取以他郡羸民遷補其處陳武傳武子表領新安都尉初表所受賜復人得二百家在會稽新安縣表簡視其人皆堪好兵乃上疏陳讓乞以還官充足精鋭詔曰先將軍有功於國國家以此報之卿何得辭表乃稱曰今除國賊報父之仇以人為本空枉此徑鋭以為童僕非表志也皆輒料取以充部伍所在以聞權甚嘉之下郡縣料正户羸民以補其處其後又以五子分將而吳遂亡晉文帝置二衛中衛後衛三部司馬前驅由基強弩以中領之軍領之武帝以伐吳遂分左右各一將軍又置羽林虎賁上騎異力四部皆領於驍騎又有左右前後四軍四護軍領之凡二衛左右前後驍騎七軍皆以中軍將軍羊祜領之祜罷改北中軍候帝懲魏氏孤立大封同姓大國三軍兵五千人次國二軍兵三千人小國一軍兵千五百人太康元年既平吳詔悉去州郡兵詔曰昔自漢末四海分崩刺史內親民事外領兵馬今天下為一當韜戢干戈刺史分職皆如漢氏故事悉去州郡兵郡置武吏百人小郡五十人交州牧陶璜上言交廣東西數千里不賓屬者六萬餘户至於服從官役才五千餘家二州唇齒唯兵是鎮又寧州諸夷接據上流水陸俱通州兵未宜約損以示單虛僕射山濤亦言不冝去州郡武備帝不聼及永寧以後盜賊羣起州郡無備不能禽制天下遂大亂如濤所言然其後刺史復兼兵民之政州鎮愈重矣元帝南渡有大將軍都督四鎮四征四平之號然調兵不出三吳大發毋過三萬每議出討多取奴兵自用刁協議後皆以奴為兵王道子發諸郡奴號曰樂屬庾翼發六州奴北伐是也漢主劉聰置輔漢等十六大將軍各配兵二千以諸子為之又置左右司隸各領户二千餘萬萬户置一內史單于左右輔各主六夷十萬落萬落置一都尉趙王石虎命司冀青徐幽并雍七州之民五丁取三四丁取二合鄴城舊兵滿五十萬興船萬艘自河通海運榖千一百萬斛於樂安城徙遼西北平漁陽萬餘户於兗豫雍洛四州之地興屯田括民馬得萬餘大閲於宛陽欲以擊燕又制征士五人出軍一乘牛二頭米十五斛絹十匹調不辦者斬民至鬻子以共軍需猶不能給死者相望秦王苻堅下詔大舉入寇民每十丁遣一兵其良家子二十以下有材勇者皆拜羽林郎良家子至者三萬餘騎宋文帝元嘉二十七年大舉伐魏以兵力不足悉發青冀徐豫二兗三州三五民丁倩使暫行符到十日裝束緣江五郡集廣陵緣淮三郡集盱眙又募中外有馬步衆藝武力之士應科者皆加厚賞江南白丁輕進易退卒以敗師晉氏南遷以揚州為京畿所資皆出焉以荆江為重鎮甲兵所聚盡在焉常使大將居之三州户口居江南之半宋孝武惡其大故分揚州浙東五郡置東揚州治會稽分荆湘江豫州八郡置郢州治江夏罷南蠻校尉遷其營於建康齊高祖受禪自泰始以來內外多虞將帥各募部曲屯聚建康李安上表請自非淮北常備外餘軍悉皆輸遣若親近宜以隨身者聼限人數上從之武帝末年魏孝文欲遷都洛陽聲言南伐詔發揚徐州民丁廣設召募以備之後魏眀元帝置四廂大將又放十二時置十二小將詔諸州六十户出戎馬一匹大閲於東都署將帥以山陽侯奚斤為前軍衆三萬陽平王熙等十二將各一萬騎帝臨白登躬自校覽其後又詔天下户二十輸戎馬一匹大牛一頭六部人羊滿百口者調戎馬一匹太武真君十一年遣師南伐圍盱眙遺臧質書曰吾今所遣鬭兵盡非我國人城東北是丁零與胡南是氐羌設使丁零死正可減常山趙郡賊胡死減并州賊氐羌死減關中賊卿殺之無所不利孝文帝定都洛陽選武勇之士十五萬人為羽林虎賁以充宿衛其後詔軍士自代來者皆以為羽林虎賁司州民十二夫調一吏以供公私力役宣武時源懷奏邉鎮事少而置官猥多沃野一鎮自將以下八百餘人請一切五分損二從之孝眀時任城王澄以北邉鎮將選舉彌輕恐賊虜窺邉山陵危迫奏求重鎮將之選修警備之嚴詔公卿議之廷尉少卿袁翻議以為比緣邉州郡官不擇人唯論資級或值貪汚之人廣開戍邏多置帥領或用其左右姻親或受人貨財請屬皆無防寇之心唯有聚斂之意其勇力之兵驅令抄掠若值強敵即為奴虜如有執獲奪為已富其羸弱老小之輩微解金鐵之工少嫻草木之作無不搜營窮壘苦役百端自餘或伐木深山或藝草平陸販貿往還相望道路此等祿既不多資亦有限皆收其實絹給其虗粟窮其力薄其衣用其功節其食緣冬歷夏加之疾苦死於溝瀆者什常七八是以鄰敵伺間擾我疆場皆由邉任不得其人故也愚謂自今已後南北邉諸番及所統郡縣府佐統軍至於戍主皆令朝臣王公已下各舉所知必選其才不拘階級若稱職及敗官并所舉之人隨事賞罰太后不能用及正光之末北邉盜賊羣起遂逼舊都犯山陵如澄所慮李崇長史巨鹿魏蘭根説崇曰昔緣邉初置諸鎮地廣人稀或徴發中原強宗子弟或國之肺腑寄以爪牙中年以來有司號為府户役同厮養宦婚班齒致失清流而本來族類各居榮顯顧瞻彼此理當憤怨宜改鎮立州分置郡縣凡是府户悉免為民入仕次敘一凖其舊文武兼用威恩並施此計若行國家無北顧之憂矣崇為之聞奏事寢不報廣陽王深上言先朝都平城以北邉為重盛簡親賢擁麾作鎮配以高門子弟以死防遏非唯不廢仕宦乃更獨得復除當時人物欣慕為之太和中僕射李沖用事涼州土人悉免厮役帝鄉舊門仍防邉戍自非得罪當世莫肯與之為伍本鎮驅使但為虞候白直一生推遷不過軍主然其同族留京師者得上品通官在鎮者即為清途所隔或多逃逸乃峻邉兵之格鎮人不聼浮逰在外於是少年不得從師長者不得逰官獨為匪人言之流涕自定鼎伊洛邉任益輕唯底滯凡才乃出為鎮將轉相模習専事聚斂或諸方姦吏犯罪配邉為之損蹤政以賄立邉人無不切齒及阿那瓌背恩縱掠發奔命追之十五萬衆度沙漠不日而還邉人見此援師遂自意輕中國尚書令臣崇求改鎮為州抑亦先覺朝廷未許而高闕戍主御下失和拔陵殺之遂相帥為亂攻城掠地所過夷滅王師屢北賊黨日盛此假之舉指望銷平而崔暹隻輪不返臣崇與臣逡巡復路相與還次雲中將士之情莫不解體今日所慮非止西北將恐諸鎮尋亦如此天下之事何易可量書奏不省孝眀神龜二年征西將軍張彞子仲瑀上封事求銓削選格排抑武人不使豫清品於是喧謗盈路立榜尅期集會屠其家二月羽林虎賁近千人直造其第焚殺彜父子逺近震駭胡太后收羽林虎賁凶強者八人斬之其餘不復窮治大赦以安之高歡時給使至洛歸而散家財以結客曰宿衛相帥焚大臣之第朝廷懼其亂而不問為政如此事可知矣按先儒因高歡之言以為當時不能伸張彝之寃酷殱羽林之驕橫可以見魏政之不綱然愚嘗考之拓跋氏起自雲朔據有中原兵戎乃其所以為國也羽林虎賁則宿衛之兵六鎮將卒則禦侮之兵往往皆代北部落之苗裔其初藉之以橫行中國者孝文詔軍士自代來者皆以為羽林虎賁自孝文定鼎伊洛務欲以夏變夷遂至矯枉過正崇文鄙武六鎮兵卒多擯抑之有同奴隸邉任浸輕裔夷內侮魏之衰弱實肇於此任城廣陽二王之言可見當時為國逺慮者正當少遵創造之規優假介胄之士以救其偏而彝復欲排抑武人不豫清品且當時幼主尸位政出房闥選舉無章賢否混雜所謂清品豈皆佳士而獨欲擯羽林虎賁使不得預乎軍士賊殺大臣而不能討紀綱隳矣然彜父子謀之不臧固有以取死也北齊軍制别為內外領之二胄外步兵曹內騎兵曹十八受田二十充兵六十免役頗追古意神武王將出兵拒魏行臺郎中杜弼請先除內賊歡問內賊為誰弼曰諸勳貴掠奪百姓者是也歡不應使軍士皆張弓注矢舉刀按矟夾道羅列命弼冒出其間弼戰栗流汗歡乃徐諭之曰矢雖注不射刀雖舉不擊矟雖按不刺爾猶亡魂失膽諸勳人身犯鋒鏑百死一生雖或貪鄙所取者大豈可同之常人也弼乃頓首謝不及歡每號令軍士常令丞相屬代郡張華原宣旨其語鮮卑則曰漢民是汝奴夫為汝耕婦為汝織輸汝粟帛令汝溫飽汝何為陵之其語華人則曰鮮卑是汝作客得汝一斛粟一匹絹為汝擊賊令汝安寧汝何為疾之周太祖輔西魏時用蘇綽言始倣周典置六軍籍六等之民擇魁健材力之士以為之首盡蠲租調而刺史以農隙教之合為百府每府一郎將主之分屬二十四軍開府各領一軍大將軍凡十二人每一將軍統二開府一柱國主二大將將復加持節都督以統焉凡柱國六貟衆不滿五萬人閔帝時改八丁兵為十二丁兵率嵗一月一役武帝既誅晉公護始親政初周太祖為魏相立左右十二軍總屬相府太祖殂皆受晉公護處分凡所徴發非護書不行護第屯兵侍衛盛於宫闕帝既親政始收兵權既克齊之後并相各置六府而東北别為七總管隋兵制大抵仍周齊府兵之舊而加潤色其十二衛曰翊衛曰驍騎衛曰武衛曰屯衛曰禦衛曰侯衛各分左右皆置將軍以分統諸府之兵有郎將副將坊主團主以相統治其外又有驃騎車騎二府皆有將軍後更驃騎曰鷹揚郎將車騎曰副郎將别置折衝果毅此府兵之大略也文帝開皇八年以伐陳置淮南省於夀春以晉王廣為尚書令冬十月出師凡總管卒兵五十一萬八千皆受晉王節度九年平陳詔曰今率土大同含生遂性太平之法方可流行凡我臣民澡身浴德家家自修人人克念兵可立威不可不戢刑可助化不可専行禁衛九重之餘鎮守四方之外戎旅軍器皆宜停罷世路既夷羣方無事武力之子俱可學經民間甲仗悉皆除毁頒告天下咸悉此意十年詔曰魏末喪亂軍人權置坊府南征北伐居處無定家無完堵地罕苞桑朕甚愍之凡是軍人可悉屬州縣墾田籍帳一與民同軍府統領宜依舊式罷山東河南及北方緣邉之地新置軍府煬帝大業八年敕四方兵皆集涿郡伐高麗左右各十二軍凡一百一十三萬二千八百人號二百萬其餽運者倍之帝親授節度每軍大將亞將軍各一人騎兵四十隊隊百人十隊為團步卒八十隊分為四團團各有偏將一人其鎧胄纓拂旗幡每團異色受降使者一人承詔慰撫不受大將節制其輜重散兵等亦為四團使步卒挾之而行進止立營皆有次敘儀法唐高祖初起兵開大將軍府以建成為左領大都督領左三軍太宗為右領大都督領右三軍元吉統中軍發自太原有兵三萬人及諸起義以相屬與降郡盜得兵二十萬武德初始置軍府以驃騎車騎兩將軍府之析關中為十二道曰萬年道長安道富平道醴泉道同州道華州道寧州道岐州道幽州道西麟州道涇州道宜州道皆置府時以天下未定將舉關中之衆以臨四方三年更以萬年道為參旗軍長安道為鼓旗軍富平道為元戈軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍岐州道為平道軍幽州道為招搖軍西麟州道為苑遊軍涇州道為天紀軍宜州道為天節軍軍置將副各一人以督耕戰以車騎府統之六年以天下既定遂廢十二軍改驃騎曰統軍車騎曰别將居嵗餘十二軍復而軍置將軍一人軍有坊置主一人以檢察户口勸課農桑太宗貞觀十年更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而關內二百六十有一皆以隸諸衛凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長史兵曺别將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長火備六馱馬凡火具烏布幕鐵馬盂布槽鍤钁鑿碓斧鉗鋸皆一甲牀二鎌二隊具火鑽一胸馬繩一首羈足絆皆三人具弓一矢三十胡祿橫刀礪石大觿氊帽氊裝行縢皆一麥飯九斗米二斗皆自備并其介胄戎具藏於庫有所征行則視其入而出給之其番上宿衛者惟給弓矢橫刀而已凡民年二十為兵六十而免其能騎而射者為越騎其餘為步兵武騎排䂎手步射每嵗李冬折衝都尉率五校兵馬之在府者置左右二校尉位相距百步每校為步隊十騎隊一皆卷矟幡展刃旗散立以俟角手吹大角一通諸校皆斂人騎為隊二通偃旗矟解幡三通旗舉左右擊鼓二人校之人合譟而進右校擊征隊少却左校進逐至右校立所左校擊征隊少却右校進逐至左校立所右校復擊征隊還左校復薄戰皆擊征隊各還大角復鳴一通皆卷幡攝矢弛弓匣刃二通旗矟舉隊皆進三通左右校皆引還是日也因縱獲各入其人其隸於衛也左右衛皆領六十府諸衛領五十至四十其餘以𨽻東宫六率凡發府兵皆下符契州刺史與折衝勘契乃發若全府發則折衝都尉以下皆行不盡則果毅行少則别將行當給馬者豫其直市之每匹豫錢二萬五千刺史折衝果毅嵗閲不任戰事者鬻之以其錢更市不足則一府共足之凡當宿衛者番上兵部以逺近給番五百里為五番千里七番一千五百里八番二千里十番外為十二番皆以月上若簡留直衛者五百里為七番千里八番二千里十番外為十二番亦月上上嘗引諸衛將卒習射於顯德殿諭曰戎狄侵盜自古有之患在邉境小安則人主逸遊忘戰今朕不使汝曺穿池築苑専習弓矢居間無事則為汝師突厥入寇則為汝將庶中國之民可以少安於是日引數百人教射於殿庭上親臨試中多者賞以弓刀帛其將帥亦加上考由是人思自勵數年之間悉為精鋭府兵圖上府千二百人折衝都尉左果毅都尉右果毅都尉同長史一人中府千人折衝都尉左果毅都尉右果毅都尉兵曹一人别將一人下府八百人折衝都尉左果毅都尉右果毅都尉同校尉一人坊髙祖置坊主一人羽林軍高宗龍武軍元宗團三百人校尉神武軍肅宗禁軍英武軍代宗隊五十人隊正神策軍代宗火十人火長天威軍順宗神威軍德宗章氏曰唐志言凡天下十道置府六百三十四皆有名號而關內二百六十有一皆以𨽻諸衛會要云折衝府二百八十通計舊府六百三十三陸贄奏議則以為太宗置府八百在關中者五百杜牧原十六衛上畜養戎臣外開折衝果毅府五百七十有四其數不同府多在關中説者以為固本漢置都尉亦此意左右衛皆領六十府諸衛領五十至四十其餘以𨽻東宫十率府而折衝亦𨽻焉太子管軍非古制也唐只是折衝自教漢都試之日郡縣之官盡會唐之府兵雖散在諸道然折衝都尉並遙𨽻於諸衛乃是內任官故官志係之於諸衛之後不與外官同漢都尉不𨽻於衛尉乃是外任官故表係之郡守之後與唐異然而領兵則太守與都尉刺史與折衝同矣唐以逺近分番皆以一月恐太紛擾漢以二嵗更代為善又唐在二千里外者亦不免此法所以壞也元宗先天元年詔曰往者分建府衛計户充兵裁足周事二十一入募六十一出軍多憚勞以規避匿今宜取年二十五以上五十而免屢征鎮者十年免之雖有其言事不克行開元六年始詔折衝府兵每六嵗一簡自高宗武后時天下久不用兵府兵之法寖壞番役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張説乃請一切募士宿衛十一年取京兆蒲同岐華府兵及白丁而益以潞州長從兵共十二萬號長從宿衛嵗一番命尚書左丞蕭嵩與州吏共選之眀年更號曰彍騎又詔諸州府馬闕官私共補之今兵資難致乃給以監牧馬然自是諸府事益多不補折衝將又積嵗不得遷士人皆恥為之十三年始以彍騎分𨽻十二衛總十二萬為六番每衛萬人京兆彍騎六萬六千華州六千同州九千蒲州萬二千三百絳州三千六百晉州千五百岐州六千河南府三千陜虢汝鄭懷汴六州各六百內弩手六千其制皆擇下户白丁宗丁品子強壯五尺七寸以上不足則兼以户八等五尺以上皆免征鎮役為四籍兵部及州縣衛分掌之十人為火五火為團皆有首長又擇材勇者為番頭頗習弩射又有羽林軍飛騎亦習弩凡伏逺弩自能施張縱矢三百步四發而二中擘張弩二百三十步四發而二中角弓弩二百步四發而三中單弓弩百六十步四發而二中皆為及第諸軍皆近營為堋士有便習者教試之及第者有賞自天寶以後彍騎之法又稍變廢士皆失拊循八載折衝諸府至無兵可交李林甫遂請停上下魚書其後徒有兵額官吏而戎器馱馬鏑幕糗糧並廢矣故時府人目番上宿衛者曰侍官言侍衛天子至衛佐悉以假人為童奴京師人恥之至相罵辱必曰侍官而六軍衛皆市人富者販繒綵食梁肉壯者為角抵拔河翹木扛鐵之戲及祿山反皆不能受甲矣祿山既反安西節度使封常清入朝上問以討賊方略常清大言曰今太平積久故人望風憚戰然事有逆順勢有奇變臣請赱馬詣東京開府庫募驍勇挑馬箠渡河計日斬逆胡之首上悅以常清為范陽平盧節度使乘驛詣東京募兵旬日得六萬人又出內府錢市於京師募兵十一萬號曰天武軍旬日而集皆市井子弟也常清屯武牢以拒賊所募兵皆白徒未更訓練賊以鐵騎蹂之官軍大敗德宗貞元二年上與常侍李泌議復府兵泌因為上歷敘府兵自西魏以來興廢之由且言府兵平日皆安居田畝每府有折衝領之折衝以農隙教習戰陳國家有事徴發則以符契下其州及府參驗發之至所期處將帥按閲有教習不精者罪其折衝甚者罪及刺史軍還賜勳加賞便道罷之行者近不踰時逺不經嵗高宗以劉仁軌為洮河鎮守使以圖吐蕃於是始有久戍之役武后以來承平日久府兵寖墮為人所賤百姓恥之至蒸慰手足以避其役又牛仙客以積財得宰相邉將之山東戍卒多齎繒帛自隨邉將誘之寄於府庫晝則苦役夜縶地牢利其死而沒入其財故自天寶以後山東戍卒還者十無二其殘虐如此然未嘗有外叛內侮殺帥自擅者誠以顧戀田園恐纍宗族故也自開元之末張説始募長征兵謂之彍騎其後益為六軍及李林甫為相奏諸軍皆募人為兵兵不土著又無宗族不自重惜忘身徇利禍亂自生至今為梗嚮使府兵之法常存不廢安有如此下陵上替之患哉陛下思復府兵此乃社稷之福太平有日矣上曰俟平河中當與卿議之三年上復問泌以復府兵之策對曰今嵗徴關東卒戍京西者十七萬人計嵗食粟二百四萬斛今粟斗直錢百五十為錢三百六萬緡國家比遭飢亂經費不充就使有錢亦無粟可糴未暇議復府兵也上曰然將奈何亟減戍卒歸之何如對曰陛下誠能用臣之言可以不減戍卒不擾百姓糧食皆足粟麥日賤府兵亦成上曰果能如之何為不用對曰此須急為之過旬日則不及矣今吐蕃久居原蘭之間以牛運糧糧盡牛無所用請發左藏惡繒染為綵纈因黨項以市之每頭不過二三匹計十八萬匹可致六萬餘頭又命詣冶鑄農器糴麥種分賜緣邉軍鎮募戍卒耕荒田而種之約眀年麥熟倍償其種其餘據時價五分增一官為糴之來春種禾亦如之關中土沃而久荒所收必厚戍卒獲利耕者寖多邉地居人至少軍士月食官糧粟麥無所售其價必賤名為增價實比今嵗所減多矣上曰善即時命行之泌又言邉地官多闕請募人入粟以補之可足今嵗之糧上亦從之因問曰卿言府兵亦集如何對曰戍卒因屯田致富則安於其土不復思歸舊制戍卒三年而代及其將滿下令有願留者即以所開田為永業家人願來者本貫給長牒續食而遣之據應募之數移報本道雖河朔諸帥得免更代之煩亦喜聞矣不過數番則戍卒皆土著乃悉以府兵之法理之是變關中之疲弊為冨強也上喜曰如此天下無復事矣泌曰未也臣能不用中國之兵使吐蕃自困上曰計將安出對曰臣未敢言之俟麥禾有效然後可議也上固問不對泌意欲結回紇大食雲南與共圖吐蕃令吐蕃所備者多知上素恨回紇恐聞之不悅并屯田之議不行故不肯言既而戍卒應募願耕屯田者什五六憲宗元和中供嵗賦者浙西浙東宣歙淮南江西鄂嶽福建湖南八道户百四十四萬比天寶開元四之一兵食於官者八十三萬加天寶三之一通以二户養一兵京西北河北以屯兵廣無上供至長慶户三百三十五萬而兵卒九萬率三户以奉一兵穆宗初即位兩河略定宰相蕭俯假文昌以為天下已太平漸宜消兵請密詔天下軍鎮有兵處每嵗百人之中限八人逃死上方荒宴不以國事為意遂可其奏軍士落籍者衆皆聚山澤為盜及朱克融王庭湊作亂一呼而亡卒皆集詔徴諸道兵討之諸道既少兵臨時召募烏合之衆又諸節度既有監軍其領偏師者亦置中使監陳主將不得専號令戰小勝則飛驛奏捷自以為功不勝則迫脅主將以罪歸之悉擇軍中驍勇以自衛遣羸懦者就戰故每戰多敗又凡用兵舉動皆自禁中授以方略朝令夕改不知所從不度可否惟督令速戰中使道路如織驛馬不足掠行人馬以繼之人不敢由驛路行故雖以諸道十五萬人之衆裴度元臣宿老烏重允李光顔皆當時名將討幽鎮萬餘之衆屯守踰年竟無成功財竭力盡崔植杜元頴王播為相皆庸才無逺略史憲誠既逼殺田布朝廷不能討遂并朱克融王庭湊以節鉞授之由是再失河朔訖於唐亡不能復取致堂胡氏曰兵不可好好兵者必有不戢自焚之災亦不可惡惡兵者必有授人以柄之禍三代藏兵於農三時耕種一時講武若有征討則命卿將之天子六卿大國三卿次國二卿小國一卿大事則六軍盡行又召會諸侯諸侯之軍無王命不敢私用內外重輕之勢如此其不用也舉天下皆力農桑知孝弟之民其用也舉萬乘皆裸股肱決射御之士夫豈有兵少兵多之患哉唐自張説變革府衛日以陵夷李鄴侯言欲修復而不果也憲宗中興所宜討論舊制而急於近效不為逺圖至蕭俯假文昌慕銷偃之美名而不知弛張之道既許以逃死則百人之中豈但八人而已姦將貪帥利其衣糧則軍鎮之兵實亡而名在耳夫兵有國之大事也宰相既妄奏請穆宗聼之懵然則以憲宗豢養其子不知教之之過也唐方鎮節度使之兵其原皆起於邉將之屯防者唐初兵之戍邉者大曰軍小曰守捉曰城曰鎮而總之曰道自武德至天寶以前邉防之制其軍城鎮守捉皆有使而道有大將一人曰大總管已而更曰大都督至太宗時行軍征討曰大總管在其本道曰大都督自高宗永徽後都督帶使持節者始謂之節度使然猶未以名官景雲二年以賀拔延嗣為􅋽州都督河西節度自此而後接乎開元朔方隴右河東河西諸鎮皆置節度使及范陽節度使安祿山反犯京師天子之兵弱不能抗遂陷兩京肅宗起靈武而諸鎮之兵共起誅賊其後祿山子慶緒及史思眀父子繼起中國大亂肅宗命李光弼討之號九節度之師久之大盜既滅而武夫戰卒以功起行陳列為侯王者皆除節度使由是方鎮相望於內地大者連州十餘小者猶兼三四故兵強則逐帥帥強則叛上或父死子握其兵而不肯代或取捨由於士卒往往自擇將吏號為留後以邀命於朝天子顧力不能制則忍恥含垢因而撫之號為姑息之政蓋姑息起於兵驕兵驕由於方鎮姑息愈甚則兵將愈俱驕由是號令自出以相侵奪虜其將帥并其土地天子熟視不知所為反為和解之莫肯聼命始時為朝廷患者號河朔三鎮及其末朱全忠以梁兵李克用以晉兵更犯京師而李茂貞韓建近據岐華妄意喜怒兵已至國門天子為殺大臣罪已悔過而後去及昭宗用崔允召梁兵以誅宦官劫天子奔岐梁兵圍之逾年當此之時天下之兵無復勤王者向所謂三鎮徒能始禍而已其他大鎮南則吳浙荆湖閩廣西則岐蜀北則燕晉而梁盜據其中自國門以外皆分裂於方鎮矣唐所謂天子禁軍者南北衙兵也南衙諸衛兵是也北衙者禁軍也初高祖以義兵起太原已定天下悉罷遣歸其願留宿衛者三萬人高祖以渭北白渠旁民棄腴田分給之號元從禁軍後老不任事以其子弟代謂之父子軍及貞觀初太宗擇善射者百人為二番於北門長上曰百騎以從田獵又置北衙七營選材力驍壯月以一營番上十二年始置左右屯營於元武門領以諸衛將軍號飛騎其法取户二等以上長六尺闊壯者試弓馬四次上翹開舉五圎米五斛行三十步者復擇馬射者為百騎衣五色袍乘六間駁馬虎皮韉為遊幸翊衛高宗龍朔二年始取府兵越騎步射置左右羽林軍大朝會則執仗以衛階陛行幸則夾馳道為內仗武后改百騎曰千騎睿宗乂改千騎曰萬騎分左右營及元宗以萬騎平韋氏改為左右龍武軍皆用唐元功臣子弟制若宿右兵是時良家子避征戍者亦皆納資𨽻軍分日更上如羽林開元十二年詔左右羽林軍飛騎闕取京旁州府士以户部印印其臂為二籍羽林兵部分掌之末年禁兵寖耗及祿山反天子西駕禁軍從者裁千人肅宗赴靈武士不滿百及即位稍復調補北軍至德二載置左右神武軍補元從扈從官子弟不足則取他色帶品者同四軍亦曰神武天騎制如羽林總曰北衙六軍又擇便騎射者置衙前射生手十人亦曰供奉射生官又曰殿前射生分左右廂總號曰左右英武軍乾元元年李輔國用事請選羽林騎士五百人徼巡李揆曰漢以南北軍相制故周勃以北軍安劉氏朝廷置南北衙文武區列以相察伺今用羽林代金吾警忽有非常何以制之遂罷上元中以北衙軍使衛伯玉為神策軍節度使鎮陜州中使魚朝恩為觀軍容使監其軍初哥舒翰破吐蕃臨洮西之磨環川即其地置神策軍以成如璆為軍使及安祿山反如璆以伯玉將兵千人赴難伯玉與朝恩皆屯於陜時邉土陷蹙神策故地淪沒即詔伯玉所部兵號神策軍以伯玉為節度使與陜州節度使郭英乂皆鎮陜其後伯玉罷以英乂兼神策軍節度英乂入為僕射軍遂統於觀軍容使代宗即位以射生軍入禁中清難皆賜名寶應功臣故射生軍又號寶應軍廣德元年代宗避吐蕃幸陜朝恩舉在陜兵與神策軍迎扈悉號神策軍天子幸其營及京師平朝恩遂以軍歸禁中自將之然尚未與北軍齒也永泰元年吐蕃復入寇朝恩又以神策軍屯苑中自是寖盛分為左右廂勢居北軍右遂為天子禁軍非他軍比朝恩乃以觀軍容宣慰處置使知神策軍兵馬使太歷四年請以京兆之好畤鳳翔之麟遊普潤皆𨽻神策軍眀年復以興平武功扶風天興𨽻之朝廷不能遏又用愛將劉希暹為神策虞候主不法遂置北軍獄募坊市不逞誣捕大姓沒産為賞至有選舉旅寓而挾厚資多橫死者朝恩得罪以希暹代為神策軍使是嵗希暹復得罪以朝恩舊校王駕鶴代將十數嵗德宗即位以白志貞代之是時神策兵雖處內而多以禆將將兵征伐往往有功及李希烈反河北盜且起數出禁軍征伐神策之士多鬭死者建中四年下詔募兵以志貞為使搜補峻切郭子儀之壻端王傅吳仲孺殖資纍巨萬以國家有急不自安請以子率奴馬從軍德宗喜甚為官其子五品志貞乃請節度都團練觀察使與世嘗任者家皆出子弟馬奴裝鎧助征授官如仲孺子於是豪富者緣為幸而貧者苦之神策兵既發殆盡志貞隂以市人補之各𨽻籍而身居市肆及涇卒潰變皆戢伏不出帝遂出奔初假秀實見禁兵寡弱不足備非常上疏曰天子萬乘諸侯千大夫百蓋以大制小十制一也尊君卑臣強幹弱枝之道今外有不廷之虜內有梗命之臣而禁兵不精其數削少後有猝故何以待之猛虎所以百獸畏者爪牙也爪牙廢則孤豚特犬悉能為敵願少留意至是方以秀實言為然及志貞等流貶神策都虞候李晟與其軍之他將皆自飛狐道西兵赴難遂為神策行營節度屯渭北軍遂振貞元二年改神策左右廂為左右神策軍特置監句當左右神策軍以寵中官而益置大將軍以下又改殿前射生左右廂曰殿前左右射生軍亦置大將軍以下三年詔射生神策六軍將士府縣以事辨治先奏乃移軍勿輒逮捕京兆尹鄭叔則建言京畿輕猾所聚慝作不常俟奏報將失罪人請非婚田皆以時捕乃可之俄改殿前左右射生軍曰左右神威軍置監左右神威軍使左右神策軍皆加將軍二員左右龍武軍加將軍一員以待諸道大將軍有功者自肅宗以後北軍增置威武長興等軍名類頗多而廢置不一惟羽林龍武神策神威最盛總曰左右十軍其後京畿之西多以神策軍鎮之皆有屯營軍司之人散處甸內皆恃勢凌暴民間苦之德宗幸梁還以神策兵有勞皆號興元元從奉天定難功臣恕死罪中書御史府兵部乃不能嵗比其籍京兆又不敢總舉名實三輔人假庇於軍一牒至十數長安姦人多寓占兩軍身不宿衛以錢代行謂之納課户益肆為暴吏稍禁之輒先得罪故當時京尹赤令皆為之斂屈十年京兆尹楊於陵請置挾名敕五丁許二丁居軍餘差以條限繇是富強少畏十二年以監句當左神策軍左監門衛大將軍知內侍省事竇文場為左神策軍護軍中尉監句當右神策軍右監門衛將軍知內侍省事霍仙鳴為右神策軍護軍中尉監右神威軍使內侍兼內謁者監張尚進為右神威軍中護軍監左神威軍使內侍兼內謁者監焦希望為左神威軍中護軍護軍中尉中護軍皆古官帝既以禁衛假宦官又以此寵之十四年又詔左右神策置統軍以崇親衛如六軍時邉兵衣餉多不贍而戍卒屯防藥茗蔬醬之給最厚諸將務為詭辭請遙𨽻神策軍稟賜遂贏舊三倍繇是塞上往往稱神策行營皆內統於中人矣其軍乃至十五萬故事京城諸司使府縣皆季以御史巡囚後以北軍地密未嘗至十九年監察御史崔薳不知近事遂入右神策中尉奏之帝怒杖薳四十流崖州順宗即位王叔文用事欲取神策兵柄乃用故將范希朝為左右神策京西諸城鎮行營兵馬節度使以奪宦者權而不克元和二年省神武軍眀年又廢左右神威軍合為一曰天威軍八年廢天威軍以其兵騎分𨽻左右神策軍及僖宗幸蜀田令孜募神策新軍為五十四都離為十軍令孜自為左右神策十軍兼十二衛觀軍容使以左右神策大將軍為左右神策諸都指揮使諸都又領以都將亦曰都頭景福二年昭宗以藩臣跋扈天子孤弱議以宗室典禁兵及伐李茂貞乃用嗣覃王允為京西招討使神策諸都指揮使李鐬副之悉發五十四軍屯興平已而兵自潰茂貞逼京師昭宗為斬神策中尉西門重遂李周乃引去乾寧元年王行瑜韓建及茂貞連兵犯闕天子又殺宰相韋昭度李磎乃去太原李克用以其兵伐行瑜等同州節度使王行實入迫神策中尉駱全瓘劉景宣請天子幸邠州全瓘景宣及繼晟與行實縱火東市帝御承天門敕諸王率禁軍扞之捧日都頭李筠以其軍衛樓卞茂貞將閻圭攻筠矢及樓扉帝乃與親王公主幸筠軍扈蹕都頭李君實亦以兵至侍帝出幸莎城石門詔嗣薛王知柔入長安收禁軍清宮室月餘乃還又詔諸王閲親軍收拾神䇿亡散得數萬益置安聖捧宸保寧安化軍曰殿後四軍嗣覃王允與嗣延王戒丕將之三年茂貞再犯闕嗣覃王戰敗昭宗幸華州眀年韓建畏諸王有兵請皆歸十六宅留殿後兵三十人為控鶴排馬官𨽻飛龍坊餘悉散之且列甲圍行宫於是四軍二萬餘人皆罷又請誅都頭李筠帝恐為斬於大雲橋俄遂殺十一王及還長安左右神策軍復稍置之以六千人為定是嵗左右神策中尉劉季述王仲先以其兵千人廢帝幽之季述等誅已而昭宗召朱全忠兵入誅宦官宦官覺劫天子幸鳯翔全忠圍之嵗餘天子乃誅中尉韓全誨張宏彥等二十餘人以解梁兵乃還長安於是悉誅宦官而神策左右軍由此廢矣諸司悉歸尚書省郎官兩軍兵皆𨽻六軍而以崔允判六軍十二衛事六軍者左右龍武神武羽林其名存而已自是軍司以宰相領及全忠歸留步騎萬人屯故兩軍以子友倫為左右軍宿衛都指揮使禁衛皆汴卒崔允乃奏六軍名存而兵亡非所以壯京師軍皆置步軍四將騎軍一將步將皆兵二百五十人騎將皆百人總六千六百人番上如故事乃令六軍諸衛副使京兆尹鄭元規立格募兵於市而全忠隂以汴人應之允死以宰相裴樞判左三軍獨孤損判右三軍向所募士悉散去全忠亦兼判左右六軍十二衛及東遷唯小黃門打毬供奉十數人內園小兒五百人從至穀水又盡屠之易以汴人於是天子無一人之衛昭宗遇弒唐乃亡唐書兵志唐有天下二百餘年而兵之大勢三變其始盛時有府兵府兵後廢而為彍騎又廢而方鎮之兵盛矣及其末也強臣悍將兵布天下而天子亦自置兵於京師曰禁軍其後天子弱方鎮強而唐遂以滅亡者措置之勢使然也蓋府兵之制居無事時耕於野其番上者宿衛京師而已若四方有事則命將以出事解輒罷兵散於府將歸於朝故士不失業而將帥無握兵之重所以防微杜漸絶禍亂之原也及府兵法壞而方鎮盛武夫悍將雖無事時據安險専方面既有其土地又有其民人兵甲財賦以布列天下然則方鎮不得不強京師不得不弱夫置兵所以止亂及其弊也適足以為亂又其甚也至困天下以養亂故兵之始重於外也土地民賦非天子有既其盛也號令征伐非其有其末也至無尺土而不能庇其妻子宗族遂以滅亡可不哀哉文獻通考卷一百五十一
