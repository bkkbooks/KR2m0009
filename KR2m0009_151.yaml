body:
  text: 文獻通考卷一百五十一鄱陽馬端臨貴與著兵考三兵制魏制略如東漢南北軍如故魏武為相國置武衞營相府以領軍主之文帝増置中營於是何武衞中壘二營以領軍将軍併五校統之是時有中左右前軍各一帥又有中護中領軍領護軍将軍各一人黄初中復令州郡典兵州置都督尋加四征四鎮将軍之號又置大将軍都督中外兵之柄世在司馬氏而魏祚移矣吴多舟師而兵有觧煩敢死兩部又有車下虎士甘寧傳從攻合肥疫疾軍旅皆已引出唯車下虎士千餘人丹陽青巾孫皓傳丹陽太守沈瑩領丹陽鋭卒刀楯五十號曰青巾兵屢㨗交州義士歩隲傳權遣吕岱代隲隲将交州義士萬人出長沙及健児武射之名調度亦無法健児見凌統甘寕傳武射吏見駱統傳大率強者為兵羸者補户見陸遜傳至有二百餘家輙皆料取以他郡羸民遷補其處陳武傳武子表領新安都尉初表所受賜復人得二百家在㑹稽新安縣表簡視其人皆堪好兵乃上疏陳譲乞以還官充足精鋭詔曰先将軍有功於國國家以此報之卿何得辭表乃稱曰今除國賊報父之仇以人為本空枉此勁鋭以為童僕非表志也皆輙料取以充部伍所在以聞權甚嘉之下郡縣料正户羸民以補其處其後又以五子分将而吴遂亡晉文帝置二衞中衛後衛三部司馬前驅由基強弩以中領之軍領之武帝以伐吴遂分左右各一将軍又置羽林虎賁上騎異力四部皆領於驍騎又有左右前後四軍四護軍領之凡二衞左右前後驍騎七軍皆以中軍将軍羊祜領之祜罷改北中軍候帝懲魏氏孤立大封同姓大國三軍兵五千人次國二軍兵三千人小國一軍兵千五百人太康元年既平吴詔悉去州郡兵詔曰昔自漢末四海分崩刺史内親民事外領兵馬今天下為一當韜戢干戈刺史分職皆如漢氏故事悉去州郡兵郡置武吏百人小郡五十人交州牧陶璜上言交廣東西數千里不賓屬者六萬餘户至於服從官役纔五千餘家二州唇齒唯兵是鎮又寧州諸夷接據上流水陸俱通州兵未宜約損以示單虛僕射山濤亦言不冝去州郡武備帝不聼及永寧以後盗賊羣起州郡無備不能禽制天下遂大亂如濤所言然其後刺史復兼兵民之政州鎮愈重矣元帝南渡有大将軍都督四鎮四征四平之號然調兵不出三吴大𤼵毋過三萬每議出討多取奴兵自用刁協議後皆以奴為兵王道子發諸郡奴號曰樂屬庾翼發六州奴北伐是也漢主劉聪置輔漢等十六大将軍各配兵二千以諸子為之又置左右司隸各領户二千餘萬萬户置一内史單于左右輔各主六夷十萬落萬落置一都尉趙王石虎命司冀青徐幽并雍七州之民五丁取三四丁取二合鄴城舊兵滿五十萬興船萬艘自河通海運榖千一百萬斛於樂安城徙遼西北平漁陽萬餘户於兗豫雍洛四州之地興屯田括民馬得萬餘大閲於宛陽欲以撃燕又制征士五人出軍一乗牛二頭米十五斛絹十疋調不辦者斬民至鬻子以共軍需猶不能給死者相望秦王苻堅下詔大舉入宼民每十丁遣一兵其良家子二十以下有材勇者皆拜羽林郎良家子至者三萬餘騎宋文帝元嘉二十七年大舉伐魏以兵力不足悉𤼵青冀徐豫二兗三州三五民丁倩使暫行符到十日装束緣江五郡集廣陵緣淮三郡集盱眙又募中外有馬步衆藝武力之士應科者皆加厚賞江南白丁輕進易退卒以敗師晉氏南遷以揚州為京畿所資皆出焉以荆江為重鎮甲兵所聚盡在焉常使大将居之三州户口居江南之半宋孝武惡其大故分揚州浙東五郡置東揚州治㑹稽分荆湘江豫州八郡置郢州治江夏罷南蠻校尉遷其營於建康齊高祖受禅自泰始以來内外多虞将帥各募部曲屯聚建康李安上表請自非淮北常備外餘軍悉皆輸遣若親近宜以隨身者聼限人數上從之武帝末年魏孝文欲遷都洛陽聲言南伐詔發揚徐州民丁廣設召募以備之後魏眀元帝置四廂大将又放十二時置十二小将詔諸州六十户出戎馬一疋大閲於東都署将帥以山陽侯奚斤為前軍衆三萬陽平王熙等十二将各一萬騎帝臨白登躬自校覽其後又詔天下户二十輸戎馬一疋大牛一頭六部人羊滿百口者調戎馬一疋太武真君十一年遣師南伐圍盱眙遺臧質書曰吾今所遣鬭兵盡非我國人城東北是丁零與胡南是氐羌設使丁零死正可減常山趙郡賊胡死減并州賊氐羌死減関中賊卿殺之無所不利孝文帝定都洛陽選武勇之士十五萬人為羽林虎賁以充宿衞其後詔軍士自代來者皆以為羽林虎賁司州民十二夫調一吏以供公私力役宣武時源懐奏邉鎮事少而置官猥多沃野一鎮自将以下八百餘人請一切五分損二從之孝眀時任城王澄以北邉鎮将選舉彌輕恐賊虜闚邉山陵危廹奏求重鎮将之選修警備之嚴詔公卿議之廷尉少卿袁翻議以為比緣邉州郡官不擇人唯論資級或值貪汚之人廣開戍邏多置帥領或用其左右姻親或受人貨財請屬皆無防㓂之心唯有聚斂之意其勇力之兵驅令抄掠若值強敵即為奴虜如有執獲奪為已富其羸弱老小之輩㣲觧金鐵之工少嫻草木之作無不搜營窮壘苦役百端自餘或伐木深山或芸草平陸販貿往還相望道路此等禄既不多貲亦有限皆収其實絹給其虗粟窮其力薄其衣用其功節其食緣冬歴夏加之疾苦死於溝瀆者什常七八是以鄰敵伺間擾我疆塲皆由邉任不得其人故也愚謂自今已後南北邉諸番及所統郡縣府佐統軍至於戍主皆令朝臣王公已下各舉所知必選其才不拘階級若稱職及敗官并所舉之人隨事賞罰太后不能用及正光之末北邉盗賊羣起遂逼舊都犯山陵如澄所慮李崇長史鉅鹿魏蘭根説崇曰昔緣邉初置諸鎮地廣人稀或徴發中原強宗子弟或國之肺腑寄以爪牙中年以來有司號為府户役同厮養宦婚班齒致失清流而本來族𩔖各居榮顯顧瞻彼此理當憤怨宜改鎮立州分置郡縣凡是府户悉免為民入仕次叙一凖其舊文武兼用威恩並施此計若行國家無北顧之憂矣崇為之聞奏事寝不報廣陽王深上言先朝都平城以北邉為重盛簡親賢擁麾作鎮配以高門子弟以死防遏非唯不廢仕宦乃更獨得復除當時人物欣慕為之太和中僕射李冲用事凉州土人悉免厮役帝鄉舊門仍防邉戍自非得罪當世莫肯與之為伍本鎮驅使但為虞候白直一生推遷不過軍主然其同族留京師者得上品通官在鎮者即為清途所隔或多逃逸乃峻邉兵之格鎮人不聼浮逰在外於是少年不得從師長者不得逰官獨為匪人言之流涕自定鼎伊洛邉任益輕唯底滯凡才乃出為鎮將轉相模習専事聚斂或諸方姦吏犯罪配邉為之損蹤政以賄立邉人無不切齒及阿那瓌背恩縱掠發奔命追之十五萬衆度沙漠不日而還邉人見此援師遂自意輕中國尚書令臣崇求改鎮為州抑亦先覺朝廷未許而高闕戍主御下失和拔陵殺之遂相帥為亂攻城掠地所過夷滅王師屢北賊黨日盛此叚之舉指望銷平而崔暹隻輪不返臣崇與臣逡廵復路相與還次雲中将士之情莫不觧體今日所慮非止西北将恐諸鎮尋亦如此天下之事何易可量書奏不省孝眀神龜二年征西将軍張彞子仲瑀上封事求銓削選格排抑武人不使豫清品於是諠謗盈路立榜尅期集㑹屠其家二月羽林虎賁近千人直造其第焚殺彜父子逺近震駭胡太后収羽林虎賁凶強者八人斬之其餘不復窮治大赦以安之高歡時給使至洛歸而散家財以結客曰宿衞相帥焚大臣之第朝廷懼其亂而不問為政如此事可知矣按先儒因高歡之言以為當時不能伸張彝之寃酷殱羽林之驕横可以見魏政之不綱然愚嘗考之拓跋氏起自雲朔據有中原兵戎乃其所以為國也羽林虎賁則宿衞之兵六鎮将卒則禦侮之兵往往皆代北部落之苗裔其初藉之以横行中國者孝文詔軍士自代來者皆以為羽林虎賁自孝文定鼎伊洛務欲以夏變夷遂至矯枉過正崇文鄙武六鎮兵卒多擯抑之有同奴隸邉任浸輕裔夷内侮魏之衰弱實肇於此任城廣陽二王之言可見當時為國逺慮者正當少遵創造之規優假介胄之士以救其偏而彝復欲排抑武人不豫清品且當時幼主尸位政出房闥選舉無章賢否混雜所謂清品豈皆佳士而獨欲擯羽林虎賁使不得預乎軍士賊殺大臣而不能討紀綱隳矣然彜父子謀之不臧固有以取死也北齊軍制别為内外領之二胄外歩兵曹内騎兵曹十八受田二十充兵六十免役頗追古意神武王将出兵拒魏行臺郎中杜弼請先除内賊歡問内賊為誰弼曰諸勲貴掠奪百姓者是也歡不應使軍士皆張弓注矢舉刀按矟夾道羅列命弼冒出其間弼戰慄流汗歡乃徐諭之曰矢雖注不射刀雖舉不擊矟雖按不刺爾猶亡魂失膽諸勲人身犯鋒鏑百死一生雖或貪鄙所取者大豈可同之常人也弼乃頓首謝不及歡每號令軍士常令丞相屬代郡張華原宣旨其語鮮卑則曰漢民是汝奴夫為汝耕婦為汝織輸汝粟帛令汝温飽汝何為陵之其語華人則曰鮮卑是汝作客得汝一斛粟一疋絹為汝擊賊令汝安寧汝何為疾之周太祖輔西魏時用蘇綽言始倣周典置六軍籍六等之民擇魁健材力之士以為之首盡蠲租調而刺史以農隙教之合為百府每府一郎将主之分屬二十四軍開府各領一軍大将軍凡十二人每一将軍統二開府一柱國主二大将将復加持節都督以統焉凡柱國六貟衆不滿五萬人閔帝時改八丁兵為十二丁兵率嵗一月一役武帝既誅晉公護始親政初周太祖為魏相立左右十二軍總屬相府太祖殂皆受晉公護處分凡所徴發非䕶書不行護第屯兵侍衞盛於宫闕帝既親政始収兵權既克齊之後并相各置六府而東北别為七縂管隋兵制大抵仍周齊府兵之舊而加潤色其十二衞曰翊衞曰驍騎衞曰武衞曰屯衞曰禦衞曰侯衞各分左右皆置将軍以分統諸府之兵有郎将副将坊主團主以相統治其外又有驃騎車騎二府皆有将軍後更驃騎曰鷹揚郎将車騎曰副郎将别置折衝果毅此府兵之大略也文帝開皇八年以伐陳置淮南省於夀春以晉王廣為尚書令冬十月出師凡縂管卒兵五十一萬八千皆受晉王節度九年平陳詔曰今率土大同含生遂性太平之法方可流行凡我臣民澡身浴徳家家自修人人克念兵可立威不可不戢刑可助化不可専行禁衞九重之餘鎮守四方之外戎旅軍器皆宜停罷世路既夷羣方無事武力之子俱可學經民間甲仗悉皆除毁頒告天下咸悉此意十年詔曰魏末䘮亂軍人權置坊府南征北伐居䖏無定家無完堵地罕苞桑朕甚愍之凡是軍人可悉屬州縣墾田籍帳一與民同軍府統領宜依舊式罷山東河南及北方緣邉之地新置軍府煬帝大業八年勅四方兵皆集涿郡伐高麗左右各十二軍凡一百一十三萬二千八百人號二百萬其餽運者倍之帝親授節度每軍大将亞将軍各一人騎兵四十隊隊百人十隊為團歩卒八十隊分為四團團各有偏将一人其鎧胄纓拂旗旛每團異色受降使者一人承詔慰撫不受大将節制其輜重散兵等亦為四團使步卒挾之而行進止立營皆有次叙儀法唐高祖初起兵開大将軍府以建成為左領大都督領左三軍太宗為右領大都督領右三軍元吉統中軍發自太原有兵三萬人及諸起義以相屬與降郡盗得兵二十萬武徳初始置軍府以驃騎車騎兩将軍府之析関中為十二道曰萬年道長安道富平道醴泉道同州道華州道寧州道岐州道幽州道西麟州道涇州道宜州道皆置府時以天下未定将舉関中之衆以臨四方三年更以萬年道為参旗軍長安道為鼓旗軍富平道為元戈軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍岐州道為平道軍幽州道為招揺軍西麟州道為苑㳺軍涇州道為天紀軍宜州道為天節軍軍置将副各一人以督耕戰以車騎府統之六年以天下既定遂廢十二軍改驃騎曰統軍車騎曰别将居嵗餘十二軍復而軍置将軍一人軍有坊置主一人以檢察户口勸課農桑太宗貞觀十年更號統軍為折衝都尉别将為果毅都尉諸府縂曰折衝府凡天下十道置府六百三十四皆有名號而関内二百六十有一皆以隸諸衞凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長史兵曺别将各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長火備六䭾馬凡火具烏布幕鐵馬盂布槽鍤钁鑿碓斧鉗鋸皆一甲牀二鎌二隊具火鑚一胸馬䋲一首覊足絆皆三人具弓一矢三十胡禄横刀礪石大觿氊帽氊装行縢皆一麥飯九斗米二斗皆自備并其介胄戎具藏於庫有所征行則視其入而出給之其番上宿衞者惟給弓矢横刀而已凡民年二十為兵六十而免其能騎而射者為越騎其餘為步兵武騎排䂎手步射每嵗李冬折衝都尉率五校兵馬之在府者置左右二校尉位相距百步每校為步隊十騎隊一皆卷矟幡展刃旗㪚立以俟角手吹大角一通諸校皆斂人騎為隊二通偃旗矟觧幡三通旗舉左右擊鼓二人校之人合譟而進右校擊征隊少却左校進逐至右校立所左校擊征隊少却右校進逐至左校立所右校復擊征隊還左校復薄戰皆擊征隊各還大角復鳴一通皆卷幡攝矢弛弓匣刃二通旗矟舉隊皆進三通左右校皆引還是日也因縱獲各入其人其隸於衞也左右衞皆領六十府諸衞領五十至四十其餘以𨽻東宫六率凡發府兵皆下符契州刺史與折衝勘契乃發若全府發則折衝都尉以下皆行不盡則果毅行少則别将行當給馬者予其直市之每匹予錢二萬五千刺史折衝果毅嵗閲不任戰事者鬻之以其錢更市不足則一府共足之凡當宿衞者番上兵部以逺近給番五百里為五番千里七番一千五百里八番二千里十番外為十二番皆以月上若簡留直衞者五百里為七番千里八番二千里十番外為十二番亦月上上嘗引諸衞将卒習射於顯徳殿諭曰戎狄侵盗自古有之患在邉境小安則人主逸游㤀戰今朕不使汝曺穿池築苑専習弓矢居閑無事則為汝師突厥入㓂則為汝将庶中國之民可以少安於是日引數百人教射於殿庭上親臨試中多者賞以弓刀帛其将帥亦加上考由是人思自勵數年之間悉為精鋭府兵圖上府千二百人折衝都尉左果毅都尉右果毅都尉同長史一人中府千人折衝都尉左果毅都尉右果毅都尉兵曹一人别将一人下府八百人折衝都尉左果毅都尉右果毅都尉同校尉一人坊髙祖置坊主一人羽林軍高宗龍武軍元宗團三百人校尉神武軍肅宗禁軍英武軍代宗隊五十人隊正神策軍代宗火十人火長天威軍順宗神威軍徳宗章氏曰唐志言凡天下十道置府六百三十四皆有名號而闗内二百六十有一皆以𨽻諸衞㑹要云折衝府二百八十通計舊府六百三十三陸贄奏議則以為太宗置府八百在関中者五百杜牧原十六衞上畜養戎臣外開折衝果毅府五百七十有四其數不同府多在関中説者以為固本漢置都尉亦此意左右衞皆領六十府諸衞領五十至四十其餘以𨽻東宫十率府而折衝亦𨽻焉太子管軍非古制也唐只是折衝自教漢都試之日郡縣之官盡㑹唐之府兵雖㪚在諸道然折衝都尉並遥𨽻於諸衞乃是内任官故官志係之於諸衞之後不與外官同漢都尉不𨽻於衞尉乃是外任官故表係之郡守之後與唐異然而領兵則太守與都尉刺史與折衝同矣唐以逺近分番皆以一月恐太紛擾漢以二嵗更代為善又唐在二千里外者亦不免此法所以壊也元宗先天元年詔曰往者分建府衞計户充兵裁足周事二十一入募六十一出軍多憚勞以規避匿今宜取年二十五以上五十而免屢征鎮者十年免之雖有其言事不克行開元六年始詔折衝府兵每六嵗一簡自高宗武后時天下久不用兵府兵之法寖壊番役更代多不以時衞士稍稍亡匿至是益耗散宿衞不能給宰相張説乃請一切募士宿衞十一年取京兆蒲同岐華府兵及白丁而益以潞州長從兵共十二萬號長從宿衞嵗一番命尚書左丞蕭嵩與州吏共選之眀年更號曰彍騎又詔諸州府馬闕官私共補之今兵資難致乃給以監牧馬然自是諸府事益多不補折衝将又積嵗不得遷士人皆恥為之十三年始以彍騎分𨽻十二衞總十二萬為六番每衞萬人京兆彍騎六萬六千華州六千同州九千蒲州萬二千三百絳州三千六百晉州千五百岐州六千河南府三千陜虢汝鄭懐汴六州各六百内弩手六千其制皆擇下户白丁宗丁品子彊壮五尺七寸以上不足則兼以户八等五尺以上皆免征鎮役為四籍兵部及州縣衞分掌之十人為火五火為團皆有首長又擇材勇者為番頭頗習弩射又有羽林軍飛騎亦習弩凡伏逺弩自能施張縱矢三百步四發而二中擘張弩二百三十步四發而二中角弓弩二百步四𤼵而三中單弓弩百六十步四𤼵而二中皆為及第諸軍皆近營為堋士有便習者教試之及第者有賞自天寳以後彍騎之法又稍變廢士皆失拊循八載折衝諸府至無兵可交李林甫遂請停上下魚書其後徒有兵額官吏而戎器䭾馬鏑幕糗糧並廢矣故時府人目番上宿衞者曰侍官言侍衞天子至衞佐悉以假人為童奴京師人恥之至相罵辱必曰侍官而六軍衞皆市人富者販繒綵食梁肉壮者為角觝㧞河翹木扛鐵之戯及禄山反皆不能受甲矣禄山既反安西節度使封常清入朝上問以討賊方畧常清大言曰今太平積久故人望風憚戰然事有逆順勢有奇變臣請赱馬詣東京開府庫募驍勇挑馬箠渡河計日斬逆胡之首上悦以常清為范陽平盧節度使乗驛詣東京募兵旬日得六萬人又出内府錢市於京師募兵十一萬號曰天武軍旬日而集皆市井子弟也常清屯武牢以拒賊所募兵皆白徒未更訓練賊以鐵騎蹂之官軍大敗徳宗貞元二年上與常侍李泌議復府兵泌因為上歴叙府兵自西魏以来興廢之由且言府兵平日皆安居田畝每府有折衝領之折衝以農隙教習戰陳國家有事徴𤼵則以符契下其州及府參驗發之至所期處将帥按閲有教習不精者罪其折衝甚者罪及刺史軍還賜勲加賞便道罷之行者近不踰時逺不經嵗高宗以劉仁軌為洮河鎮守使以圖吐蕃於是始有久戍之役武后以来承平日久府兵寖墮為人所賤百姓恥之至蒸慰手足以避其役又牛仙客以積財得宰相邉将之山東戍卒多齎繒帛自隨邉将誘之寄於府庫晝則苦役夜縶地牢利其死而没入其財故自天寳以後山東戍卒還者十無二其殘虐如此然未嘗有外叛内侮殺帥自擅者誠以顧戀田園恐累宗族故也自開元之末張説始募長征兵謂之彍騎其後益為六軍及李林甫為相奏諸軍皆募人為兵兵不土著又無宗族不自重惜㤀身狥利禍亂自生至今為梗曏使府兵之法常存不廢安有如此下陵上替之患哉陛下思復府兵此乃社稷之福太平有日矣上曰俟平河中當與卿議之三年上復問泌以復府兵之策對曰今嵗徴関東卒戍京西者十七萬人計嵗食粟二百四萬斛今粟斗直錢百五十為錢三百六萬緡國家比遭饑亂經費不充就使有錢亦無粟可糴未暇議復府兵也上曰然将奈何亟減戍卒歸之何如對曰陛下誠能用臣之言可以不減戍卒不擾百姓糧食皆足粟麥日賤府兵亦成上曰果能如之何為不用對曰此須急為之過旬日則不及矣今吐蕃久居原蘭之間以牛運糧糧盡牛無所用請𤼵左藏惡繒染為綵纈因党項以市之每頭不過二三疋計十八萬疋可致六萬餘頭又命詣冶鑄農器糴麥種分賜緣邉軍鎮募戍卒畊荒田而種之約眀年麥熟倍償其種其餘據時價五分増一官為糴之來春種禾亦如之関中土沃而久荒所収必厚戍卒獲利畊者寖多邉地居人至少軍士月食官糧粟麥無所售其價必賤名為増價實比今嵗所減多矣上曰善即時命行之泌又言邉地官多闕請募人入粟以補之可足今嵗之糧上亦従之因問曰卿言府兵亦集如何對曰戍卒因屯田致富則安於其土不復思歸舊制戍卒三年而代及其将滿下令有願留者即以所開田為永業家人願來者本貫給長牒續食而遣之據應募之數移報本道雖河朔諸帥得免更代之煩亦喜聞矣不過數番則戍卒皆土著乃悉以府兵之法理之是變関中之疲弊為冨彊也上喜曰如此天下無復事矣泌曰未也臣能不用中國之兵使吐蕃自困上曰計将安出對曰臣未敢言之俟麥禾有效然後可議也上固問不對泌意欲結回紇大食雲南與共圖吐蕃令吐蕃所備者多知上素恨回紇恐聞之不悦并屯田之議不行故不肯言既而戍卒應募願畊屯田者什五六憲宗元和中供嵗賦者浙西浙東宣歙淮南江西鄂岳福建湖南八道户百四十四萬比天寳開元四之一兵食於官者八十三萬加天寳三之一通以二户養一兵京西北河北以屯兵廣無上供至長慶户三百三十五萬而兵卒九萬率三户以奉一兵穆宗初即位兩河畧定宰相蕭俛叚文昌以為天下已太平漸宜消兵請密詔天下軍鎮有兵處每嵗百人之中限八人逃死上方荒宴不以國事為意遂可其奏軍士落籍者衆皆聚山澤為盗及朱克融王庭凑作亂一呼而亡卒皆集詔徴諸道兵討之諸道既少兵臨時召募烏合之衆又諸節度既有監軍其領偏師者亦置中使監陳主将不得専號令戰小勝則飛驛奏㨗自以為功不勝則廹脇主将以罪歸之悉擇軍中驍勇以自衞遣羸懦者就戰故每戰多敗又凡用兵舉動皆自禁中授以方畧朝令夕改不知所從不度可否惟督令速戰中使道路如織驛馬不足掠行人馬以繼之人不敢由驛路行故雖以諸道十五萬人之衆裴度元臣宿老烏重允李光顔皆當時名将討幽鎮萬餘之衆屯守踰年竟無成功財竭力盡崔植杜元頴王播為相皆庸才無逺畧史憲誠既逼殺田布朝廷不能討遂并朱克融王庭凑以節鉞授之由是再失河朔訖於唐亡不能復取致堂胡氏曰兵不可好好兵者必有不戢自焚之災亦不可惡惡兵者必有授人以柄之禍三代藏兵於農三時耕種一時講武若有征討則命卿將之天子六卿大國三卿次國二卿小國一卿大事則六軍盡行又召㑹諸侯諸侯之軍無王命不敢私用内外重輕之勢如此其不用也舉天下皆力農桑知孝弟之民其用也舉萬乗皆臝股肱决射御之士夫豈有兵少兵多之患哉唐自張説變革府衞日以陵夷李鄴侯言欲修復而不果也憲宗中興所宜討論舊制而急於近效不為逺圖至蕭俛叚文昌慕銷偃之羙名而不知弛張之道既許以逃死則百人之中豈但八人而已姦将貪帥利其衣糧則軍鎮之兵實亡而名在耳夫兵有國之大事也宰相既妄奏請穆宗聼之懵然則以憲宗豢養其子不知教之之過也唐方鎮節度使之兵其原皆起於邉将之屯防者唐初兵之戍邉者大曰軍小曰守捉曰城曰鎮而縂之曰道自武徳至天寳以前邉防之制其軍城鎮守捉皆有使而道有大将一人曰大總管已而更曰大都督至太宗時行軍征討曰大總管在其本道曰大都督自高宗永徽後都督帶使持節者始謂之節度使然猶未以名官景雲二年以賀㧞延嗣為􅋽州都督河西節度自此而後接乎開元朔方隴右河東河西諸鎮皆置節度使及范陽節度使安禄山反犯京師天子之兵弱不能抗遂䧟兩京肅宗起靈武而諸鎮之兵共起誅賊其後禄山子慶緒及史思眀父子繼起中國大亂肅宗命李光弼討之號九節度之師久之大盗既滅而武夫戰卒以功起行陣列為侯王者皆除節度使由是方鎮相望於内地大者連州十餘小者猶兼三四故兵強則逐帥帥強則叛上或父死子握其兵而不肯代或取捨由於士卒往往自擇将吏號為留後以邀命於朝天子顧力不能制則忍恥含垢因而撫之號為姑息之政盖姑息起於兵驕兵驕由於方鎮姑息愈甚則兵将愈俱驕由是號令自出以相侵奪虜其将帥并其土地天子熟視不知所為反為和觧之莫肯聼命始時為朝廷患者號河朔三鎮及其末朱全忠以梁兵李克用以晉兵更犯京師而李茂貞韓建近據岐華妄意喜怒兵已至國門天子為殺大臣罪已悔過而後去及昭宗用崔允召梁兵以誅宦官刼天子奔岐梁兵圍之逾年當此之時天下之兵無復勤王者向所謂三鎮徒能始禍而已其他大鎮南則吴浙荆湖閩廣西則岐蜀北則燕晉而梁盗據其中自國門以外皆分裂於方鎮矣唐所謂天子禁軍者南北衙兵也南衙諸衞兵是也北衙者禁軍也初高祖以義兵起太原已定天下悉罷遣歸其願留宿衞者三萬人高祖以渭北白渠旁民棄腴田分給之號元従禁軍後老不任事以其子弟代謂之父子軍及貞觀初太宗擇善射者百人為二番於北門長上曰百騎以従田獵又置北衙七營選材力驍壮月以一營番上十二年始置左右屯營於元武門領以諸衞将軍號飛騎其法取户二等以上長六尺闊壮者試弓馬四次上翹開舉五圎米五斛行三十步者復擇馬射者為百騎衣五色袍乗六閑駁馬虎皮韉為㳺幸翊衞高宗龍朔二年始取府兵越騎步射置左右羽林軍大朝㑹則執仗以衞階陛行幸則夾馳道為内仗武后改百騎曰千騎睿宗乂改千騎曰萬騎分左右營及元宗以萬騎平韋氏改為左右龍武軍皆用唐元功臣子弟制若宿右兵是時良家子避征戍者亦皆納資𨽻軍分日更上如羽林開元十二年詔左右羽林軍飛騎闕取京旁州府士以户部印印其臂為二籍羽林兵部分掌之末年禁兵寖耗及禄山反天子西駕禁軍從者裁千人肅宗赴靈武士不滿百及即位稍復調補北軍至徳二載置左右神武軍補元從扈從官子弟不足則取他色帶品者同四軍亦曰神武天騎制如羽林總曰北衙六軍又擇便騎射者置衙前射生手十人亦曰供奉射生官又曰殿前射生分左右廂總號曰左右英武軍乾元元年李輔國用事請選羽林騎士五百人徼廵李揆曰漢以南北軍相制故周勃以北軍安劉氏朝廷置南北衙文武區列以相察伺今用羽林代金吾警忽有非常何以制之遂罷上元中以北衙軍使衞伯玉為神策軍節度使鎮陜州中使魚朝恩為觀軍容使監其軍初哥舒翰破吐蕃臨洮西之磨環川即其地置神策軍以成如璆為軍使及安禄山反如璆以伯玉将兵千人赴難伯玉與朝恩皆屯於陜時邉土䧟蹙神策故地淪没即詔伯玉所部兵號神策軍以伯玉為節度使與陜州節度使郭英乂皆鎮陜其後伯玉罷以英乂兼神策軍節度英乂入為僕射軍遂統於觀軍容使代宗即位以射生軍入禁中清難皆賜名寳應功臣故射生軍又號寳應軍廣徳元年代宗避吐蕃幸陜朝恩舉在陜兵與神策軍迎扈悉號神策軍天子幸其營及京師平朝恩遂以軍歸禁中自将之然尚未與北軍齒也永泰元年吐蕃復入㓂朝恩又以神策軍屯苑中自是寖盛分為左右廂勢居北軍右遂為天子禁軍非他軍比朝恩乃以觀軍容宣慰處置使知神策軍兵馬使太歴四年請以京兆之好畤鳳翔之麟游普潤皆𨽻神策軍眀年復以興平武功扶風天興𨽻之朝廷不能遏又用愛将劉希暹為神策虞候主不法遂置北軍獄募坊市不逞誣捕大姓没産為賞至有選舉旅寓而挟厚貲多横死者朝恩得罪以希暹代為神策軍使是嵗希暹復得罪以朝恩舊校王駕鶴代将十數嵗徳宗即位以白志貞代之是時神策兵雖處内而多以禆将将兵征伐徃徃有功及李希烈反河北盗且起數出禁軍征伐神策之士多鬭死者建中四年下詔募兵以志貞為使蒐補峻切郭子儀之壻端王傅吴仲孺殖貲累巨萬以國家有急不自安請以子率奴馬從軍徳宗喜甚為官其子五品志貞乃請節度都團練觀察使與世嘗任者家皆出子弟馬奴装鎧助征授官如仲孺子於是豪富者緣為幸而貧者苦之神策兵既發殆盡志貞隂以市人補之各𨽻籍而身居市肆及涇卒潰變皆戢伏不出帝遂出奔初叚秀實見禁兵寡弱不足備非常上疏曰天子萬乗諸侯千大夫百盖以大制小十制一也尊君卑臣強榦弱枝之道今外有不廷之虜内有梗命之臣而禁兵不精其數削少後有猝故何以待之猛虎所以百獸畏者爪牙也爪牙廢則孤豚特犬悉能為敵願少留意至是方以秀實言為然及志貞等流貶神策都虞候李晟與其軍之他将皆自飛狐道西兵赴難遂為神策行營節度屯渭北軍遂振貞元二年改神策左右廂為左右神策軍特置監句當左右神策軍以寵中官而益置大将軍以下又改殿前射生左右廂曰殿前左右射生軍亦置大将軍以下三年詔射生神策六軍将士府縣以事辨治先奏乃移軍勿輙逮捕京兆尹鄭叔則建言京畿輕猾所聚慝作不常俟奏報将失罪人請非婚田皆以時捕乃可之俄改殿前左右射生軍曰左右神威軍置監左右神威軍使左右神策軍皆加将軍二員左右龍武軍加将軍一員以待諸道大将軍有功者自肅宗以後北軍増置威武長興等軍名類頗多而廢置不一惟羽林龍武神策神威最盛總曰左右十軍其後京畿之西多以神策軍鎮之皆有屯營軍司之人散處甸内皆恃勢凌暴民間苦之徳宗幸梁還以神策兵有勞皆號興元元從奉天定難功臣恕死罪中書御史府兵部乃不能嵗比其籍京兆又不敢總舉名實三輔人假庇於軍一牒至十數長安姦人多寓占兩軍身不宿衞以錢代行謂之納課户益肆為暴吏稍禁之輙先得罪故當時京尹赤令皆為之斂屈十年京兆尹楊於陵請置挾名敕五丁許二丁居軍餘差以條限繇是富彊少畏十二年以監句當左神策軍左監門衞大将軍知内侍省事竇文場為左神策軍護軍中尉監句當右神策軍右監門衞将軍知内侍省事霍仙鳴為右神策軍護軍中尉監右神威軍使内侍兼内謁者監張尚進為右神威軍中䕶軍監左神威軍使内侍兼内謁者監焦希望為左神威軍中䕶軍䕶軍中尉中護軍皆古官帝既以禁衞假宦官又以此寵之十四年又詔左右神策置統軍以崇親衞如六軍時邉兵衣饟多不贍而戍卒屯防藥茗蔬醤之給最厚諸将務為詭辭請遥𨽻神策軍禀賜遂贏舊三倍繇是塞上往往稱神策行營皆内統於中人矣其軍乃至十五萬故事京城諸司使府縣皆季以御史廵囚後以北軍地密未嘗至十九年監察御史崔薳不知近事遂入右神策中尉奏之帝怒杖薳四十流崖州順宗即位王叔文用事欲取神策兵柄乃用故将范希朝為左右神策京西諸城鎮行營兵馬節度使以奪宦者權而不克元和二年省神武軍眀年又廢左右神威軍合為一曰天威軍八年廢天威軍以其兵騎分𨽻左右神策軍及僖宗幸蜀田令孜募神策新軍為五十四都離為十軍令孜自為左右神策十軍兼十二衞觀軍容使以左右神策大将軍為左右神策諸都指揮使諸都又領以都将亦曰都頭景福二年昭宗以藩臣䟦扈天子孤弱議以宗室典禁兵及伐李茂貞乃用嗣覃王允為京西招討使神策諸都指揮使李鐬副之悉發五十四軍屯興平已而兵自潰茂貞逼京師昭宗為斬神策中尉西門重遂李周乃引去乾寧元年王行瑜韓建及茂貞連兵犯闕天子又殺宰相韋昭度李磎乃去太原李克用以其兵伐行瑜等同州節度使王行實入廹神策中尉駱全瓘劉景宣請天子幸邠州全瓘景宣及繼晟與行實縦火東市帝御承天門敕諸王率禁軍扞之捧日都頭李筠以其軍衞樓卞茂貞将閻圭攻筠矢及樓扉帝乃與親王公主幸筠軍扈蹕都頭李君實亦以兵至侍帝出幸莎城石門詔嗣薛王知柔入長安収禁軍清宮室月餘乃還又詔諸王閲親軍収拾神䇿亡㪚得數萬益置安聖捧宸保寧安化軍曰殿後四軍嗣覃王允與嗣延王戒丕将之三年茂貞再犯闕嗣覃王戰敗昭宗幸華州眀年韓建畏諸王有兵請皆歸十六宅留殿後兵三十人為控鶴排馬官𨽻飛龍坊餘悉散之且列甲圍行宫於是四軍二萬餘人皆罷又請誅都頭李筠帝恐為斬於大雲橋俄遂殺十一王及還長安左右神策軍復稍置之以六千人為定是嵗左右神策中尉劉季述王仲先以其兵千人廢帝幽之季述等誅已而昭宗召朱全忠兵入誅宦官宦官覺刼天子幸鳯翔全忠圍之嵗餘天子乃誅中尉韓全誨張宏彦等二十餘人以觧梁兵乃還長安於是悉誅宦官而神策左右軍由此廢矣諸司悉歸尚書省郎官兩軍兵皆𨽻六軍而以崔允判六軍十二衞事六軍者左右龍武神武羽林其名存而已自是軍司以宰相領及全忠歸留步騎萬人屯故兩軍以子友倫為左右軍宿衞都指揮使禁衞皆汴卒崔允乃奏六軍名存而兵亡非所以壮京師軍皆置歩軍四将騎軍一将步将皆兵二百五十人騎将皆百人總六千六百人番上如故事乃令六軍諸衞副使京兆尹鄭元規立格募兵於市而全忠隂以汴人應之允死以宰相裴樞判左三軍獨孤損判右三軍向所募士悉散去全忠亦兼判左右六軍十二衞及東遷唯小黄門打毬供奉十數人内園小児五百人從至穀水又盡屠之易以汴人於是天子無一人之衞昭宗遇弑唐乃亡唐書兵志唐有天下二百餘年而兵之大勢三變其始盛時有府兵府兵後廢而為彍騎又廢而方鎮之兵盛矣及其末也強臣悍将兵布天下而天子亦自置兵於京師曰禁軍其後天子弱方鎮強而唐遂以滅亡者措置之勢使然也盖府兵之制居無事時畊於野其番上者宿衞京師而已若四方有事則命将以出事觧輙罷兵散於府将歸於朝故士不失業而将帥無握兵之重所以防㣲杜漸絶禍亂之原也及府兵法壊而方鎮盛武夫悍将雖無事時據安險専方面既有其土地又有其民人兵甲財賦以布列天下然則方鎮不得不強京師不得不弱夫置兵所以止亂及其弊也適足以為亂又其甚也至困天下以養亂故兵之始重於外也土地民賦非天子有既其盛也號令征伐非其有其末也至無尺土而不能庇其妻子宗族遂以滅亡可不哀哉文獻通考卷一百五十一
