body:
  text: 文獻通考卷十鄱陽馬端臨貴與著戶口考一歷代戶口丁中賦役夏禹平水土為州人口千三百五十五萬三千九百二十三塗山之會諸侯執玉帛者萬國及其衰也諸侯相兼逮湯受命其能存者三千餘國方於塗山十損其七周武王定天下列五等之封凡千七百七十三國又減湯時千三百國人衆之損亦如之周公相成王致理刑措人口千三百七十萬四千九百二十三此周之極盛也小司徒之職掌建邦之教法以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食喪紀之禁令鄭司農云九比謂九夫為井康成謂九比者冢宰職出九賦者之人數也乃會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師以起軍旅以作田役以比追胥以令貢賦乃均土地以稽人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人可任謂丁強任力役之事者出老者以其餘男女強弱相半其大數凡起徒役毋過家一人以其餘為羡唯田與追胥竭作羡饒也田謂獵也追追寇賊也竭作盡行鄉大夫以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以嵗時入其書征之給公上事也國中城郭內年十五以下為六尺二十為七尺國中晚賦而早免之以其所居復多役少野早賦而晚免之以其復少役多朱子語録曰問周制都鄙用助法八家同井鄉遂用貢法十夫有溝鄉遂所以不為井者何故曰都鄙以四起數五六家始出一人故甸出甲士三人步卒七十二人鄉遂以五起數家出一人為兵以守衛王畿役次必簡故周禮惟挽匶則用之此役之最輕者山齋易氏曰近郊之民王之內地共輦之事職無虛月追胥之比無時無之故七尺而征六十而舍則稍優於畿外非姑息也逺郊之地王之外地也其溝洫之制各有司存野役之起不及其羡故六尺而征六十五而舍則稍重於內地非荼毒也園㕓二十而一若輕於近郊也而草木之育夫家之聚不可以擾擾則不能以寧居是故二十而稅一漆林二十而五若重於逺郊也而器用之末作商賈之資利不可不抑不抑則必至於忘本是二十而五係近郊逺郊勞佚所係載師凡民無職事者出夫家之征夫稅者百畝之稅家稅者出士徒車輦給徭役橫渠張氏曰夫家之征疑無過家一人者謂之夫餘夫竭作或三人或二人或二家五人謂之家閭師凡無職者出夫布民無職者一而已載師出夫家之征閭師止言出夫布何也載師承上文宅不毛田不耕之後乃示罰之法也閭師承上文九職任民之役乃常法也均一無職之民而待之有二法何也蓋古人於遊惰不耕及商賈末作之人皆於常法之外别立法以抑之如關市或譏而不征或征之譏者常法也征者所以抑之也間民或出夫布或并出夫家之征夫布其常也并出夫家所以抑之也夫家解當如橫渠之説鄭注謂令出一夫百畝之稅則無田而所征與受田者等不幾太酷矣遂大夫以嵗時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者掌其政令禁戒司民掌登萬民之數自生齒以上皆書於版辨其國中與其都鄙及其郊野異其男女嵗登下其死生及三年大比以萬民之數詔司寇司寇及孟冬祀司民之日獻其數於王王拜受之登於天府內史司會冢宰二之以贊王治三官以二佐王治者當以民多少黜陟主民之吏均人掌均人民牛馬車輦之力政政讀為征人民則治城郭塗巷溝渠牛馬車輦轉委積之屬凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉旬均也凶札則無力政王制用民之力嵗不過三日宣王既喪南國之師敗於薑戎是也乃料民於太原仲山甫諫曰民不可料也夫古者不料民而知其多少司民協孤終掌民數者無父曰孤終死也司商協民姓掌賜族受姓之官司徒協旅合師旅司寇協姦刑官知死刑之數牧協職牧養犧牲合其物色之數工協革百工之官更制度合其數場協入場圃黍稷之數廩協出廩人掌九榖出用之數是則少多死生出入往來者皆可知也於是乎又審之以事事謂國籍田搜狩簡知其數王治農於籍搜於農隙耨穫亦於籍獮於既蒸狩於畢時蒸秋時畢冬時是皆習民數者也又何料焉不謂其少而大料之是示少而惡事也言王不謂其衆少而大料數之是示以寡少又厭惡政事不能修之意也臨政示少諸侯避之治民惡事無以賦令且無故而料民天之所惡也害於政而妨於後嗣王卒料之及幽王乃廢滅平王東遷三十餘年莊王十三年齊桓公二年五千里外非天子之御自太子公侯以下至於庶人凡千一百九十四萬一千九百二十三人戰國之時考蘇張之説計秦及山東六國戎卒尚餘五百餘萬推人口數尚當千餘萬秦兼諸侯所殺三分居一猶以餘力北築長城四十餘萬南戍五嶺五十餘萬阿房驪山七十萬三十年間百姓死沒相踵於路陳項又肆其酷烈新安之坑二十餘萬彭城之戰睢水不流漢髙帝定天下人之死傷亦數百萬是以平城之卒不過三十萬方之六國十分無三右杜氏通典所考東遷以後漢初戶口數目大約如此秦用商鞅之法月為更卒已復為正一嵗屯戍一嵗力役三十倍於古更卒謂給郡縣一月而更者正卒謂給中都官者也漢興循而未改漢髙祖四年八月初為算賦漢儀注人年十五以上至五十六出賦錢人百二十為一算為治庫并車馬按戶口之賦始於此古之治民者有田則稅之有身則役之未有稅其身者也漢法民年十五而算出口賦至五十六而除二十而傅給徭役亦五十六而除是且稅之且役之也十一年詔曰欲省賦甚今獻未有程吏或多賦以為獻而諸侯王尤多民疾之令諸侯王通侯常以十月朝獻及郡各以口數率人嵗六十三錢以給獻費據四年算賦減其半也更賦如淳曰更有三品有卒更有踐更有過更古者正卒無常人皆當迭為之一月一更是為卒更也貧者欲得雇更錢者次直者出錢雇之月二千是為踐更也天下人皆直戍邊三日亦名為更律所謂繇戍也雖丞相子亦在戍邊之調不可人人自行三日戌又行者當自戍三日不可往便還因便住一嵗一更諸不行者出錢三百入官官以給戍者是為過更也律説卒踐更者居也居更縣中五月乃更也後從尉律卒踐更一月休十一月也食貨志曰月為更卒已復為正一嵗屯戍一嵗力役三十倍於古此漢初因秦法而行後遂改易有謫乃戍邊一嵗耳惠帝六年令民女子年十五以上至三十不嫁五算漢律人出一算算百二十錢唯賈人與奴婢倍算今使五算罪謫之也文帝偃武修文丁男三年而一事民賦四十常賦嵗一事每算百二十時天下民多故三嵗一事賦四十也吳以銅鹽故百姓無賦卒踐更輒豫平賈景帝二年令天下男子年二十始傅傅著也言著名籍給公家徭役徐氏曰按髙紀發關中老弱未傅者悉詣軍如淳曰律年二十三傅之疇官髙不滿六尺二寸以下為疲癃漢儀注民年二十三為正一嵗為衛士一嵗為材官騎士習射御馳戰陳年五十六乃免為庶民就田里則知漢初民在官三十有三年也今􅕺帝更為異制令男子年二十始傅則在官三十有六年矣武帝建元元年詔民年八十復二算二口之算也元封元年行所巡縣無出今年算昭帝元鳳四年詔毋收四年五年口賦漢儀注民年七嵗至十四出口賦錢人二十三二十錢以食天子其三錢武帝加口錢以補車騎馬三年以前逋更賦未入者勿收更賦注見上按算賦十五嵗以上方出此口賦則十五嵗以前未算時所賦也元平元年詔減口賦錢有司奏請減什三上許之宣帝地節三年流民還歸者且勿算事甘露元年減民算三十一算減錢三十也五鳳三年減天下口錢按漢始有口賦然頗輕於後代至昭宣時又時有減免且令流民還歸者勿算故其時膠東相王成遂偽增上流民自占八萬餘口以蒙顯賞則以流徙者算數既除州郡無逋負之責可以容偽故也元帝時貢禹請民年二十乃算禹以為古民亡賦算口錢起武帝征伐四夷重賦於民民産子三嵗則出口錢故民重困至於生子輒殺宜令民七嵗去齒乃出口錢年二十乃算天子下其議令民産子七嵗乃出口錢自此始成帝建始元年減天下賦錢算四十惠帝即位令吏六百石以上父母妻子與同居及故吏嘗佩將軍都尉印將兵及佩二千石官印者家唯給軍賦他無所與同居謂同籍同財也貨殖傳秦漢之制列侯封君食租稅嵗率戶二百千戶之君則二十萬朝覲聘享出其中庶民農工商賈率一嵗萬息二千戶百萬之家即二十萬而更繇租賦出其中衣食好美矣按漢法有口賦有戶賦口賦則算賦是也戶賦見於史者惟此二條貨殖傳所言則是封君食邑戶所賦然則地土之不以封者縣官别賦之歟抑無此賦也庶民農工商賈以下似是百戶賦二十與上懸絶殊不可曉又謂之息二千豈官每戶貸以一文而萬戶取其息二千乎當考漢自髙祖訖於孝平民戶千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八漢極盛矣漢之戶口至元始二年最為殷盛故志舉之以為數王莽篡位以周官稅民凡田不耕者為不殖出三夫之稅城郭中宅不樹藝者為不毛出三夫之布民浮遊無事出夫布一匹其不能出布者冗作冗散也人勇反縣官衣食之世祖建武二十二年地震壓死者其口賦逋稅勿收明帝即位九月發天水三千人討叛羌復是嵗更賦永平五年復元氏田租更賦六嵗永平九年徙朔方者復口算章帝元和元年人無田徙他界者除算三年二年詔曰令人之有産子者復勿算三嵗令諸懷妊者賜胎養穀人三斛復其夫勿算一嵗著以為令和帝永元六年流民就賤還歸者復一嵗田租更賦安帝永初四年除三年過更口算元初元年除三輔三嵗更賦口算順帝永建五年郡國貧人被災傷者勿收責今年過更陽嘉元年勿收更租口賦永和四年除太原民更賦金城隴西地震災甚者勿收口賦桓帝永壽元年復泰山琅琊更算光武中元二年戶四百二十七萬九千六百三十四口二千一百萬七千八百二十明帝永平十八年戶五百八十六萬百七十三口三千四百一十二萬五千二十一章帝章和二年戶七百四十五萬六千七百八十四口四千三百三十五萬六千三百六十七和帝永興元年戶九百二十三萬七千一百一十二口五千三百二十五萬六千二百二十九安帝延光四年戶九百六十四萬七千八百三十八口四千八百六十九萬七百八十九順帝建康元年戶九百九十四萬六千九百一十九口四千九百七十三萬五百五十沖帝永嘉元年戶九百九十三萬七千六百八十口四千九百五十二萬四千一百八十三質帝本初元年戶九百三十四萬八千二百二十七口四千七百五十六萬六千七百七十二右郡國志注伏無忌所記每帝崩輒記戶口及墾田大數列於後以見滋減之差墾田數見田賦門光武中興之後三十餘年所拊養至末年戶數僅及西都孝平時四分之一兵革之禍可畏哉嗣是纍朝休養生息每每增羡固其理也但沖質二帝享國各止一年二年之間史所載無大兵革飢饉而永嘉戶數損於建康一萬本初戶數損於永嘉五十八萬有竒殊不可曉豈紀録之誤邪桓帝永壽二年戶千六百七萬九百六口五千六萬六千八百五十六右東都戶口極盛之數此係後漢書郡國志所載如通典則以為戶千六十七萬七千九百六十口五千六百四十八萬六千八百五十六戶少於漢書五百三十八萬有竒口多於漢書六百四十二萬有竒未知孰是靈帝遭黃巾之亂獻帝罹董卓之難大焚宮廟劫御西遷亰師蕭條豪傑並爭郭汜李傕之徒殘害又甚是以興平建安之際海內荒廢天子奔流白骨盈野故陕津之難以箕撮指安邑之東后裳不全遂有戎冦雄雌未定割剝庶民三十餘年及魏武剋平天下文帝受禪人衆之損萬有一存魏武據中原劉備割巴蜀孫權盡有江東之地三國鼎立戰爭不息魏氏戶六十六萬三千四百二十三口四百四十三萬二千八百八十一漢昭烈章武元年有戶二十萬男女九十萬蜀亡時戶二十八萬口九十四萬帶甲將士十萬二千吏四萬吳赤烏三年戶五十二萬男女口二百三十萬吳亡時戶五十三萬吏三萬二千兵二十三萬男女口二百三十萬後宮五千餘人劉昭補注後漢郡國志注曰魏􅕺元四年與蜀通計民戶九十四萬三千四百二十三口五百三十七萬二千八百九十一又按正始五年揚威將軍朱照日所上吳之所領兵戶凡十三萬二千推其民數不能多蜀矣昔漢永和五年南陽戶五十餘萬汝南戶四十萬方之於今三帝鼎足不踰二郡加有食祿復除之民凶年飢疾之難且可供役裁足一郡以一郡之用供三帝之用斯亦勤矣魏武帝初平袁氏定鄴都制賦戶絹二匹綿二斤見田賦門晉武帝平吳之後制戶調之式丁男之戶嵗輸絹三匹綿三斤女及次丁男為戶者半輸其諸邊郡或三分之二逺者三分之一夷人輸賨布戶一匹逺者或一丈占田數見田賦門男女年十六已上至六十為正丁十五以下至十三六十一以上至六十五為次丁十二以下六十六以上為老小不事蜀李雄薄賦其人口出錢四十文巴人謂賦為賨因為名焉賨之名舊矣其賦錢四十則起於李雄也晉武帝太康元年平吳之後九州攸同大抵編戶二百四十五萬九千八百四口千六百一十六萬三千八百六十三此晉之極盛也後趙石勒據有河北初文武官上疏請依劉備在蜀魏王在鄴故事魏王即曹公以河內魏綘等十一郡并前趙國合二十四戶二十九萬為趙國前秦苻堅滅前燕慕容暐入鄴閲其名籍戶二百四十五萬八千九百六十九口九千九百九十八萬七千九百三十五徙關東豪傑及諸雜夷十萬口於關中平燕定蜀之後偽代之盛也時關隴清宴百姓豐樂自長安至於諸州二十里一亭四十里一旅行者取給於途工賈資販於道孝武帝太元二年除度定田收租之制公王以下口稅三斛唯蠲在身之役八年又增稅米五石南燕主慕容備德優遷徙之民使之長復不役民緣此迭相蔭冒或百室合戶或千丁共籍以避課役尚書請加隱核從之得蔭戶五萬八千宋武帝北取南燕平廣固今北海郡西滅姚秦平關洛長河以南盡為宋有帝素節儉文帝勵精勤民元嘉之治比於文􅕺國富兵強更務逺略師徒覆敗江左虛耗今按本史孝武大明八年戶九十萬六千八百七十口四百六十八萬五千五百一宋文帝元嘉中始興太守孫豁上表曰武吏年滿十六便課米六十斛五十以下至十三皆課三十斛一戶內隨丁多少悉皆輸米且十三兒未堪田作或是單逈便自逃匿戶口之減實此之由宜更量課限使得存立今若減其米課雖有交損考之將來理有深益詔善之按漢以前田賦自為田賦戶口之賦自為戶口之賦魏晉以來似始混而賦之所以晉孝武時除度定田收租之制只口稅三斛增至五石而宋元嘉時乃至課米六十斛與晉制懸絶殊不可曉豈所謂六十斛者非一嵗所賦邪當考宋孝武帝大明五年制天下人戶嵗輸布四尺孝武大明中王敬宏上言舊制人年十二半役十六全役當以十三以上能自營私及公故以充役考之見事猶或未盡體有強弱不皆稱耳循吏恤隱可無甚患庸愚守宰必有勤劇况值苛政豈可稱言至今逃竄求免胎孕不育乃避罪憲實亦由茲今皇化維新四方無事役名之宜應存消息十五至十六宜為半丁十七為全丁帝從之齊氏六主年代短促其戶口未詳齊自永元以後魏每來伐繼以內難揚徐二州人丁三人取兩以此為率逺郡悉令上米凖行一人五十斛輸米既畢就役如故又先是諸郡役人多依人士為附𨽻謂之屬名又東境役苦百姓多注籍詐病遣外醫巫在所檢占諸屬名并取病身凡屬名多不合役往往所在並是復蔭之家凡注病者或以積年皆攝充將役又追責病者租布隨其年嵗多少銜命之人皆務貨賂隨意縱捨梁武之初亦稱為治後侯􅕺逆亂竟以幽斃元帝才及三年便至覆滅墳籍亦同灰燼戶口不能詳究陳武帝荆州之西既非我有淮肥之內力不能加宣帝勤恤民隱時稱令主閲其本史戶六十萬而末年窮兵黷武逺事經略吳明徹全軍隻輪不返鋭卒殱焉至後主亡時隋家所收戶五十萬口二百萬後魏起自隂山盡有中夏孝文遷都河洛定禮崇儒明帝正光以前時惟全盛戶口之數比夫晉太康倍而餘矣按太康平吳後戶二百四十五萬九千八百口千六百一十六萬三千八百六十三云倍而餘是其盛時則戶有至五百餘萬矣道武帝時詔採諸漏戶合輸綸綿自後諸逃戶占為紬繭羅縠者甚衆於是雜營戶師遍於天下不𨽻守宰賦役不同戶口錯亂景穆帝即位一切罷之以屬郡縣按人戶之以輸財别為戶計不𨽻郡縣其事始此魏令每調一夫一婦帛一匹粟二石詳見田賦門爾朱之亂政移臣下分為東西權臣擅命戰爭不息人戶流離官司文簿散棄今按舊史戶三百三十七萬五千三百六十八其時以征伐不息唯河北三數大郡多千戶以下復通新附之郡小者戶才二十口百而已齊神武秉政乃命孫騰髙崇之分責無籍之戶得六十餘萬於是僑居者各勒還本籍是後租調之入有加焉北齊承魏末喪亂與周人抗衡雖開拓淮南而郡縣褊小文宣受禪性多暴虐及武成後主俱是僻王至崇化二年為周所滅有戶三百三萬二千五百二十八口二十萬六千八百八十北齊武成清河三年乃令男子十八以上六十五以下為丁十六以上十七以下為中丁六十六以上為老十五以下為小後周閔明二主俱以弒崩武帝誅權臣攬庶政恭儉節用考核名實五六年內平蕩燕齊嗣子昏虐亡不旋踵大象中有戶三百五十九萬口九百萬九千六百四周制司役掌力役之政令凡人自十八至五十九皆任於役豐年不過三旬中年則二旬下年則一旬起徒役無過家一人有年八十者一子不從役百年者家不從役廢疾非人不養者一人不從役若凶札亦無力征隋文帝頒新令男女三嵗以下為黃十嵗以下為小十七嵗以下為中十八嵗以上為丁以從課役六十為老乃免開皇三年乃令人以二十一成丁煬帝即位戶口益多男子以二十二為丁髙熲奏人間課稅雖有定分年恆徵納除注常多長吏肆情文帳出沒既無定簿難以推挍乃為輸籍之樣請遍下諸州每年正月五日縣令巡人各隨近五黨三黨共為一團依樣定戶上下帝從之自是姦無所容通典論曰隋受周禪至大業二年有戶八百九十萬蓋承周齊分據暴君慢吏賦重役勤人不堪命多依豪室禁網隳廢姦偽尤滋髙熲覩流冗之病建輸籍之法於是定其名輕其數使人知為浮容被強家收太半之賦為編氓奉公上蒙輕減之征浮客悉自歸於編戶隋代之盛由此東坡蘇氏曰古者以民之多寡為國之貧富故管仲以隂謀傾魯梁之民而商鞅亦招三晉之人以併諸侯當周之盛時其民物之數登於王府者蓋拜而受之自漢以來丁口之蕃息與倉廩府庫之盛莫如隋其貢賦輸籍之法必有可觀者然學者以其得天下不以道又不過再世而亡是以鄙之而無傳焉孔子曰不以人廢言而况可以廢一代之良法乎文帝之初有戶三百六十餘萬平陳所得又五十萬至大業之始不及二十年而增至八百九十餘萬者何也方是時布帛之積至於無所容資儲之在天下者至不可勝數及其敗亡塗地而洛口諸倉足以致百萬之衆豈可少哉文帝恭儉為治不加賦於人煬帝大業二年戶八百九十萬七千五百三十六口四千六百一萬九千九百五十六此隋之極盛也後周靜帝時有戶三百九十九萬九千六百四至開皇九年平陳得戶五十萬及是才二十六七年直增四百八十萬七千九百二十二煬帝承其全盛遂恣荒淫建洛邑每月役丁二百萬人導洛河及淮北通涿郡築長城東西千餘里皆徵百萬餘人丁男不充以婦女充役而死者大半天下之人十分九為盜賊以至於亡大業五年民部侍郎裴藴以民間版籍脫漏戶口及詐注老少尚多奏令貌閲若一人不實則官司解職又許民糾得一丁者令被紏之家代輸賦役是時諸郡計帳進丁二十四萬三千新附口六十四萬一千五百帝臨朝覽狀曰前代無賢才致此罔冒今戶口皆實全由裴藴由是漸見親委唐制民始生為黃四嵗為小十六為中二十一為丁六十為老授田法見田賦門定天下戶量其資産定為三等後詔三等未定升降宜為九等凡丁附籍帳者春附則課役並征夏附則免課從役秋附則課役俱免其冒詐隱避以免課役者不限附之早晚皆征之制每嵗一造帳三年一造籍州縣留五比尚書省留三比唐貞觀戶不滿三百萬三年戶部奏中國人因塞外來歸及突厥前後降附開四夷為州縣獲男子一百二十餘萬口侯君集破髙昌得三郡五縣二十二城戶八千四十六口萬七千三十一馬千三百匹永徽元年戶部奏去年進戶一十五萬通天下戶三百八十萬致堂胡氏曰方隋之盛也郡縣民戶尚版圗者八百九十餘萬自李密王竇為倡而山東盡為盜區是後四方並興擁衆十數萬而加多者垂五十餘黨以郡縣反者尚不與焉至唐武德六十年間蓋干戈雲擾狼吞虎噬者十三四年而後內盜悉平後二年太宗即位貞觀仁義之治興休息生養至髙宗永徽三年天下樂業阜生將一世矣有司奏戶口才及三百八十萬然則略會之隋氏極盛之民經離亂之後十存不能一二皆起於獨孤后無關雎之德廢長立少而其禍至此也總章元年司空李績破髙麗國虜其王下城百七十戶六十九萬七千二百配江淮以南山南京西證聖元年鳳閣舍人李嶠上表曰臣聞黎庶之數戶口之衆而條貫不失按此可知者在於各有管統明其簿籍而已今天下流散非一或違背軍鎮或因緣逐糧茍免嵗時偷避徭役此等浮衣寓食積嵗淹年王役不供簿籍不挂或出入關防或往來山澤非直課調虛蠲闕於恆賦亦自誘動愚俗堪為禍患不可不深慮也或逃亡之戶或有檢察即轉入他境還行自容所司雖具設科條頒其法禁而相看為例莫適遵承縱欲紏其愆違加之刑罰則百州千郡庸可盡科前既依違後仍積習檢獲者無賞停止者獲原浮逃不悛亦由於此今縱更搜檢委之州縣則還襲舊蹤卒於無益臣以為宜令御史督察檢挍設禁令以防之垂恩德以撫之施權衡以御之為制限以一之然後逃亡可還浮寓可絶所謂禁令者使閭閻為保遞相覺察前乖避皆許自新仍有不出輒聽相告每紏一人隨事加賞明為科目使知勸沮所謂恩德者逃亡之徒久離桑梓糧儲空闕田野荒廢即當賑其乏少助其修營雖有缺賦懸徭背軍離鎮亦皆舍而不問寬而勿征其應還家而貧乏不能致者乃給程糧使逹本貫所謂權衡者逃人有絶家去鄉失離本業心樂所住情不願還聽於所在𨽻名即編為戶夫願小利者失大計存近務者喪逺圗今之議者或不逹於變通以為軍府之地戶不可移關輔之人貫不可改而越關繼踵背府相尋是開其逃亡而禁其割𨽻也􅈬令逃亡者多不能總計割𨽻猶當計其戶等量為節文殷富者令還貧弱者令住檢責已定計料已明戶無失編人無廢業然後按前躅申舊章嚴為防禁與人更始所謂限制者逃亡之人應自首者以符到百日為限限滿不出依法科罪遷之邊州如此則戶無所遺人無所匿矣武后神龍元年戶六百三十五萬六千一百四十一萬嵗通天元年敕天下百姓父母令外繼别籍者所析之戶並須與本戶同不得降下其應入役者共計本戶丁中用為等級不得以析生蠲免元宗開元十四年戶七百六萬九千五百六十五八年宇文融請括籍外逃戶羡田從之見田賦門按開元二十五年戶令云諸戶主皆以家長為之戶內有課口者為課戶無課口者為不課戶諸視流內九品以上官及男年二十以上老男廢疾妻妾部曲客女奴婢皆為不課戶無夫者為寡妻妾餘準舊令諸年八十及篤疾給侍一人九十二人百嵗五人皆盡子孫聽取先親皆先輕色無近親外取白丁者人取家內中男者並聼諸以子孫繼絶應析戶者非年十八以上不得析即所繼處有母在雖小亦聽析出諸戶欲析出口為戶及首附口為戶者非成丁皆不合析應分者不用此令諸戶計年將入丁老疾應徵免課役及給侍者皆縣令貌形狀以為定簿一定以後不須更貌若有姦欺者聽隨事貌定以附於實九年制天下雖三載定戶每載亦有團貌自今以後計其轉年合入中丁成丁五十者任追團貌天寶十三載戶九百六十一萬九千二百五十四通典天寶十四載管戶總八百九十一萬九千三百九應不課戶三百五十六萬五千五百應課戶五百三十四萬九千二百八管田總五千二百九十一萬九千三百九不課口四千四百七十萬九百八十八課口八百二十萬八千二百二十一唐之極盛也三載更令民十八以上為中男二十三以上成丁又制如聞百姓或有戶髙丁多茍為規避父母見在别籍異居宜令州縣勘會一家有十丁以上放兩丁征行賦役五丁以上者放一丁即令同籍共居以敦風化如更犯者準法科罪通典曰我國家自武德初至天寶末凡百三十八年可以比崇漢室而人戶才比於隋氏蓋有司不以經國馭逺為意法令不行所在隱漏之甚也愚論見田賦門致堂胡氏曰世有博古者言自古人主養民至一千萬戶則止矣三代以上無經據者兩漢而後誠未有溢於一千萬戶明皇幾之矣繁夥既甚理復虧耗豈人力所能遏哉是以數言亦然亦不然也然者以漢文􅕺而武帝繼之以隋髙祖而煬帝繼之以明皇而祿山出焉不然者堯舜禹啓太平凡三百餘年周成王身致刑措康王穆王昭王嗣守丕業太平亦二百餘年豈與後世中國無事之時淺促之比也然則唐虞夏周之民豈止一千萬戶而已哉養之既至教之又備無夭札瘥及兵革殺戮之禍父子祖孫連數十世為太平之民王者代天理物於是為盡矣明皇享國雖久戶口雖多不待易世而身自毁之比禍亂稍平幾去其半徒以內有一楊太真外有一李林甫而致之嗚呼可不監哉可不監哉肅宗至德二載戶八百一萬八千七百一乾元三年戶一百九十三萬三千一百二十五敕逃亡戶不得輒徵親近及鄰保務從減省要在安存又敕應有逃戶田宅並須官為租賃取其價直以充課稅逃人歸復宜並郤還所由亦不得稱負欠租賦别有追索通典乾元三年見到帳百六十九州應管戶總百九十三萬三千一百三十四不課戶總百一十七萬四千五百九十二課戶七十五萬八千五百八十二管口總千六百九十九萬三百八十六不課口千四百六十一萬九千五百八十七課口二百三十七萬七百九十九自天寶十四載至乾元三年損戶總五百九十八萬二千五百八十四損口總三千五百九十二萬八千七百二十三愚嘗論漢以後以戶口定賦故雖極盛之時而郡國所上戶口版籍終不能及三代兩漢之數蓋以避賦重之故遞相隱漏且疑天寶以上戶不應不課者居三分之一有竒今觀乾元戶數則不課者反居其太半尤為可笑然則是豈足憑乎詳見田賦門代宗廣德二年戶二百九十三萬三千一百二十五詔一戶三丁者免一丁凡畝稅二升男子二十五為成丁五十五為老以優民二年敕如有浮客願編附請射逃人物業者便準式據丁口給授如二年以上種植家業成者雖本主到不在却還限任别給授大歷元年制逃戶復業者給復二年如百姓先賣田宅盡者宜委本州縣取逃死戶田宅量丁口充給德宗建中元年定天下兩稅戶凡三百八十萬五千七十六通典主戶百八十餘萬客戶百三十餘萬通典論曰昔賢云倉廪實知禮節衣食足知榮辱夫子適衛冉子僕曰美哉庶矣既庶矣又何加焉曰富之既富矣又何加焉曰教之故知國足則政康家足則教從反是而理者未之有也夫家足不在於逃稅國足不在於重斂若逃稅則不土著而人貧重斂則多養贏而國貧不其然矣管子曰以正戶籍調之養贏贏者大賈蓄家也正數之戶既避其賦則至浮浪以大賈蓄家之所役屬自收其利也三王以前井田定賦秦革周制漢因秦法魏晉以降名數雖繁亦有良規不救時弊昔東晉之宅江南也慕容符姚迭居中土人無定本傷理為深遂有庚戍土斷之令財豐俗阜實由於茲其後法制廢弛舊弊復起義熙之際重舉而行已然之效著在前志隋受周禪得戶三百六十萬開皇九年平陳又收戶五十萬洎於大業二年干戈不用唯十八載有戶八百九十萬矣自平陳後又加四百八十餘萬其時承西魏喪亂周齊分據暴君慢吏賦重役勤人不堪命多依豪室禁網隳紊姦偽尤滋髙熲覩流冗之病建輸籍之法於是定其名輕其數使人知為浮客被強家收大半之賦為編氓奉公上蒙輕減之征浮客謂避公稅依強家作佃家也荀恱論曰公家之惠優於三代豪強之暴酷於亡秦是惠不下通威福分於豪人也髙熲設輕稅之法浮戶悉自歸於編戶隋代之盛實由於此先敷其信後行其令蒸庶懷惠姦無所容隋氏資儲遍於天下人俗康阜熲之力焉國家貞觀中有戶三百萬至天寶末百三十餘年才如隋氏之數聖唐之盛邁於西漢約計天下編戶合踰元始之間而名籍所少三百餘萬貞觀以後加五百九十萬其時天下户都有八百九十餘萬也漢武黷兵人口減半末年追悔方息征伐其後至平帝元始二年經七十餘載有戶千二百二十餘萬唐百三十餘年中雖時起兵戎都不至減耗而浮浪日衆版圗不收若比量漢時實合有加數約計天下人戶少猶可有千三四百萬矣直以選賢授任多在藝文才與職乖法因事弊隳循名責實之義闕考言詢事之道習程典親簿領謂之淺俗務根本去枝葉目以迂濶職事委於郡胥貨賄行於公府而至此也自建中初天下編氓百三十萬賴分命黜陟重為按比收入公稅增倍而餘諸道加出百八十萬共得三百一十萬遂令賦有常規人知定制貪冒之吏莫得生姦狡猾之氓皆被其籍誠適時之令典拯弊之良圗舊制百姓備上公計丁定庸調及租其稅戶雖兼出王公以下比之二三十分唯一耳自兵興以後經費不充於是徵斂多名且無常數貪吏橫恣因緣為姦法令莫得檢制蒸庶不知告訴其丁狡猾者即多規避或假名入仕或托迹為僧或占募軍伍或依倚豪族兼諸色役萬端蠲除鈍劣者即被徵輸困竭日甚建中新令並入兩稅常額既立加益莫由浮浪悉收規避無所而使臣置制各殊或有輕重未一仍屬多故兵革洊興舊額既在見人漸艱詳今日之宜酌晉隋故事版圗可增其倍征繕自減其半賦既均一人知稅輕免流離之患益農桑之業安人濟用莫過於斯矣計諸簿帳所收可有二百五十餘萬戶按歷代戶口多不過五少不減三約計天下除有兵馬多處食鹽足知見在之數者採晉隋舊典制置可得五百萬矣以五百萬戶共黜二百五十萬戶稅自然各減數古之為理也在於周知人數乃均其事役則庶功以興國富家足教從化被風齊俗一夫然後災沴不生悖亂不起所以周官有比閭族黨州鄉縣遂之制維持其政綱紀其人孟冬司徒獻民數於王王拜而受之其敬之守之如此之重也及理道乖方版圗脫漏人如鳥獸飛走莫制家以之乏國以之貧姦宄漸興傾覆不悟斯政之大者逺者將求理平之道可無其本歟憲宗元和時戶二百四十七萬三千九百六十三史官李吉甫撰元和國計簿十卷總計天下方鎮凡四十八道管州府二百九十三縣一千四百五十三見定戶二百四十四萬二百五十四其鳳翔鄜坊邠寧鎮武涇原銀夏靈鹽河東易定魏博鎮冀范陽滄景淮西淄清十五道七十一州並不申戶口數目每嵗賦入倚辦止於浙西浙東宣歙淮南江西鄂嶽福建湖南等道合四十州一百四十萬戶比量天寶供稅之戶四分有一天下兵戎仰給縣官八十三萬餘人比量士馬三分加一率以兩戶資一兵其他水旱所損徵科妄斂又在常役之外六年制自定兩稅以來刺史以戶口增損為其殿最故有析戶以張虛數或分産以係戶兼招引浮客用為增益至於稅額一無所加徒使人心易搖土著者寡觀察使嚴加訪察必令詣實衡州刺史呂溫奏當州舊額戶一萬八千四百七除貧窮死絶老幼單獨不支濟外堪差科戶八千二百五十七臣到後團定戶稅次檢責出所由隱藏不輸稅戶一萬六千七百昨尋舊案詢問閭里承前徵稅並無等第又二十餘年都不定戶存亡孰察貧富不均臣不敢因循設法團定檢獲隱戶數約萬餘州縣並不曾科徵所由已私自斂率與其潛資於姦吏豈若均助於疲人臣請作此方圎以救雕瘵庶得下免偏苦上不缺供敕旨宜付所司庫部貟外郎李渤上言臣過渭南長源鄉舊四百戶今才百戶閿鄉縣舊三千戶今才千戶他處皆然蓋由聚斂之臣剝下媚上惟思竭澤不慮無魚故也執政惡之渤謝病免致堂胡氏曰天寶初戶幾一千萬元和初合方鎮有戶百四十四萬是十失其八也憲宗急於用兵則養民之政不得厚重以用異鎛聚斂受諸道貢獻百姓難乎其阜蕃矣穆宗長慶時戶三百九十四萬四千五百九十五敬宗寶歷時戶三百九十七萬八千九百八十二文宗開成四年戶四百九十九萬六千七百五十二唐食貨志天寶戶數通以二戶養一兵長慶以後率三戶養一兵詳見國用門武宗會昌時戶四百九十五萬五千一百五十一會昌元年正月制安土重遷黎民之性茍非難窘豈至流亡將欲招綏必在資産諸道頻遭災沴州縣不為申奏百姓輸納不辦多有逃移長吏懼在官之時破失人戶或恐務免征稅減剋料錢袛於見在戶中分外攤配亦有破除逃戶桑地以充稅錢逃戶産業已無歸還不得見戶每年加配流亡轉多自今以後應州縣開成五年已前觀察使刺史差強明官􅈬鄉村詣實檢會桑田屋宇等仍勒令長加檢校租佃與人勿令荒廢據所得與納戶內征稅有餘即官為收貯待歸還給付如欠少即與收破至歸還日不須徵理自今以後二年不歸復者即仰縣司召人給付承佃仍給公憑任為永業其逃戶錢草斛斗等計留使錢物合十分中三分已上者並仰於當州當使雜給用錢內方圎權落下不得剋正貟官吏料錢及館驛使料遞乘作人課等錢仍任大戶歸還日漸復元額大中二年正月制所在逃戶見在桑田屋宇等多是暫時東西便被鄰人與所由等計會推云代納稅錢悉將斫伐毁拆及願歸復多已蕩盡因致荒廢遂成間田從今已後如有此色勒村老人與所由并鄰近等同檢勘分明分析作狀送縣入案任鄰人及無田産人且為佃事與納稅如五年內不來復業者便任佃人為主逃戶不在論理之限其屋宇桑田樹木等權佃人逃戶未歸五年內不得輒有毁除斫伐如有違犯者據根口量情科責并科所由等不檢校之罪會昌五年天下所還俗僧尼二十六萬五千餘人奴婢為兩稅戶十五萬人周廣順三年敕天下縣邑素有差等年代既深增損不一其中有戶口雖衆地望則卑地望雖髙戶口至少每至調集不便銓衡宜立成規庶協公共應天下州府及縣除赤縣畿縣次赤次畿外其餘三千戶以上為望縣二千戶以上為緊縣一千戶以上為上縣五百戶以上為中縣不滿五百戶為中下縣宜令所司據今年天下縣戶口數定望緊上中下次等奏聞戶部據今年諸州府所管縣戶數目合定為望縣六十四緊縣七十上縣一百二十四中縣六十五下縣九十七文獻通考卷十
