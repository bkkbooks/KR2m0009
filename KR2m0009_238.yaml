body:
  text: 文獻通考卷二百三十八鄱陽馬端臨貴與著經籍考六十五集别集龍雲集三十二卷附錄一卷陳氏曰著作佐郎廬陵劉弇偉明撰元豐進士紹聖詞科曾慥詩選以比石敏若非其倫也龍雲安福鄉名弇所居也周平園序略曰廬陵自歐陽文忠公以文章續韓文公正傳遂為本朝儒宗繼之者龍雲劉公文忠薨於潁公方冠不及從之游然斯文未䘮何害其為韓門籍湜也先是汴京及麻沙刻公集二十五卷紹興初會昌尉羅良弼徧求别本增至三十二卷凡六百三十餘篇予嘗論公之文如南郊賦氣格近先漢已為泰陵簡擢詩書序記徃徃祖述韓柳間或似之銘誌豐腴規摹文忠讀者可以自見其才學出處具載李彦弼誌銘羅氏跋語云東觀餘論三卷陳氏曰祕書郎昭武黄伯思長睿撰伯思右丞黄履之孫呉園張根之壻於李忠定綱為中外襟袂故忠定誌其墓伯思元符庚辰進士年四十而死好古博雅喜神仙家言自號雲林子别字霄賓有集一百卷此書止法帖刋誤及序跋古書畫器物故名餘論北湖集十卷長短句一卷陳氏曰直祕閣知虢州富川呉則禮子副撰其父中復以孫抃薦為御史不求識面臺官者也中復弟㡬復嗣復子立禮及嗣復子審禮皆登科有名譽則禮以父澤入仕晩居豫章號北湖居士劉左史集四卷陳氏曰起居郎永嘉劉安節元承撰與從弟安上皆嘗事二程同遊太學號二劉安節元符三年進士為察官左史晩知宣州以沒箕潁集二十卷陳氏曰潁昌曹組元寵撰組本與兄緯有聲太學亦能詩文而以滑稽下俚之詞行於世得名良可惜也謝克家任伯為集序其子勛跋其後略見其出處蓋宣和三年始登第郊禮進祥光賦有㫖換武階兼閣職詔中書召試仍給事殿中未㡬而卒然集中有謝及第啓自叙云蚤預諸生竟叨右列則未第之前已在西班未知何以也曾慥詩選云六舉不第宣和中詔赴廷試賜第啓中所謂特舉孱㣲許從俊造慥之言良是序䟦不著其實爾夷白堂小集二十卷别集三卷陳氏曰考功員外郎括蒼鮑慎由欽止撰元祐初以任子試吏部銓第一復登六年進士乙科甫脱選即為郎然自是數坐累官竟不進其父粹始居呉故葬於呉興青溪集十卷附錄一卷陳氏曰楚州教授臨川汪革信民撰紹聖四年試禮部第一遂登甲科蔡京當國召為宗子博士力辭不就年才四十卒呂原明志其墓鼂以道為詞以哀之革嘗有言曰咬得菜根則萬事可做誠名言也玊谿集二十二卷陳氏曰左司員外郎永嘉倪濤巨濟撰其父始徙居廣徳濤大觀三年進士燕山之役誦言其非以沮軍罷謫衡州茶陵以死年三十九呂居仁志其墓曾吉父為作集序竹隠畸士集四十卷陳氏曰右文殿修撰韋城趙鼎臣承之撰元祐甲科紹聖宏詞又自號葦溪翁其孫綱立刋於復州本百二十卷刋止四十卷而代去遂止後湖集十卷陳氏曰丹陽蘇庠養直撰其父堅伯固亦有詩名庠以遺澤畀其子而自放江湖間東坡見其清江曲大愛之由是得名僧祖可正平號癩可者其弟也庠中子扶亦工詩有清苦之節庠紳之後頌之族劉給事集五卷陳氏曰給事中劉安上元禮撰紹聖四年登第歴臺諫掖垣鎖闥以次對歴三郡而終集中有彈蔡京疏章貢集二十卷陳氏曰秘書監李朴先之撰紹聖元年進士坐言隆祐之賢廢三十年蔡京欲強致之不屈其教授西京國子監也程伊川與之甚厚然謂其太直以洛中風波為戒朴笑曰不意此言發於先生之口伊川為之改容愧謝其風節可畏也呂吉甫集二十卷鼂氏曰呂惠卿字吉甫閩人王安石執政擢參知政事元祐初謫知福州紹聖後累領藩鎮有莊子解為文長於表奏後村劉氏曰考亭論荆公東坡門人寜取呂吉甫而不取秦少游輩其説以為吉甫猶㸔經書少游翰墨而已孫鴻慶序其文謂辭嚴義密追古作者李淇水集八十卷陳氏曰門下侍郎大名李清臣韓魏公壻治平二年中制科歐陽公愛其文以比蘇軾其為人亦寛博有度而趣時嗜權利首主紹述之論意規宰相亦卒不如其志張無盡集三十二卷鼂氏曰張商英字天覺登第調官陕路章惇察訪巴蜀風采傾動西南峽中部使者憂之日夕謀所以待之之禮曲盡因求辯博之士以備燕談或以天覺姓名告因檄召至䕫州惇既至杯酒間果以人材為問部使者即言之惇令召入天覺不冠服峩巾長揖徑就坐左惇負氣敢大言天覺輙吐言壓之惇大喜歸而薦於朝由是召用元祐中為開封府推官出使河東紹聖初擢御史大觀四年長星見蔡京罷相乃拜右僕射盡反京之政召用元祐遷客天下翕然歸重朞年去位靖康初遂與司馬温公范文正公同日降制加贈官爵賜諡文忠臨漢隠居集二十卷鼂氏曰魏泰字道輔襄陽人曾布子宣之妻弟幼爽邁能屬文嘗從徐禧晩節卜隐漢上人頗言其倚子宣之勢為鄉里患苦云梅文安集十五卷陳氏曰戸部尚書浦江梅執禮和勝撰執禮死於靖康之禍人固哀其不幸而不知呉革趙子昉之謀執禮寔主之事既泄范瓊殺革徐秉哲以子昉遺敵敵知執禮預謀以根括金銀為罪問誰為長官意在執禮也安扶恐其坐之進曰皆長官也遂俱死文安者所封開國縣也李忠愍集十二卷陳氏曰吏部侍郎臨洺李若水清卿撰後二卷為附錄其死事時才三十五嵗本名若氷以靖康出使改今名詩文雖不多而詩有風度文有氣概足以知其所存矣傅忠肅集三卷陳氏曰待制濟源傅察公晦撰堯俞從孫也宣和七年以吏部郎接伴金使金人入侵使人不來為金驅去斡里雅布脅使拜不屈見殺周平園序其集謂公文務體要辭約而理盡甚類獻簡詩尤温純該貫間次險韻愈多而愈工歐陽修撰集六卷陳氏曰崇仁布衣贈祕閣修撰歐陽徹徳明撰徹死年三十一環溪呉沆裒其詩為飄然集三卷而會稽胡衍晉逺取其所上三書併刻之臨川倅廨丁永州集三卷陳氏曰知永州呉興丁注葆光撰元豐中余中榜進士喜為歌詞世所傳催雪無悶及重午慶清明皆有承平閑雅氣象有女適樂清令富春李素見素實先妣之大父母也演山集六十卷陳氏曰端明殿學士延平黄裳勉仲撰元豐二年進士第一人貴顯於崇觀死於建炎年八十七方三舍法行裳謂宜近不宜逺宜少不宜老宜富不宜貧不如遵祖宗科舉之制世傳以為口實梁溪集一百二十卷陳氏曰丞相忠定公昭武李綱伯紀撰父䕫進士起家至右文殿修撰黄右丞履之甥也綱娶呉園先生張根之女亦右丞外孫梁溪名集者修撰葬錫山忠定嘗廬墓云襄陵集二十四卷陳氏曰尚書右丞襄陵許翰崧老撰元祐三年進士靖康初入西府建炎為丞轄與黄潛善輩不合而去横塘集三十卷陳氏曰尚書右丞瑞安許景衡少伊撰亦嘗從程氏學建炎初為執政與汪黄不合罷建議渡江幸建康言者以為非是及下還京之詔景衡憂卒於𤓰州未幾敵騎奄至維揚倉卒南渡呂忠穆集十五卷陳氏曰丞相濟南呂頣浩元直撰後三卷為燕魏雜記古今事忠正德文集十卷陳氏曰丞相聞喜趙鼎元鎮撰四字髙廟所賜宸翰中語也周平園序略曰公為中丞上語范宗尹云鼎在言路極舉職所言四十事已施行三十六蓋祖宗初除言事官即置簿載所言事目多寡當否已行即朱銷其下外庭未必知也既入相敵震合淝決䇿親征慮無遺䇿蓋公氣節端方學術純正筆力又過人凡處分軍國機務多其視草然後御劄付外惟徳與文又孰加此龜山集二十八卷陳氏曰工部侍郎延平楊時中立撰時及從明道死當建炎四年年八十七於程門最為夀考尹和靖集一卷附集一卷陳氏曰徽猷閣待制河南尹焞彦明撰子漸之孫年十九舉進士策問欲誅元祐黨籍不對而出遂罷舉靖康賜號和靖處士金陷洛陽闔門遇害死而復蘓門人潛載以逃客涪州以范元長薦入經筵擢列侍從葬會稽山胡文定公武夷集十五卷陳氏曰給事中崇安胡安國康侯撰紹聖四年進士第三人仕四十年實歴不及三載著春秋傳行於世本喜為文後篤志於學乃不復作其辭召試曰少習藝文不稱語妙晩捐華藻纔取理明既覺昨非更無餘習故其文集止此致堂序略曰惟鄒魯之學由秦漢隋唐莫有傳授其間名世大儒僅如佛家者流所謂戒律講論之宗而已至於言外傳心直超佛地則未見其人是以聖道不絶如綫口筆衮衮異乎身踐有書徒存猶無書也逮及我宋熈寜以來先覺傑出上繼囘軻天下英才心悦而誠服然後孔氏術業寖以光顯五經語孟所載譬如逢春之木有本之瀾生意流形初非死質成已成物始終有序先臣夙禀大志聞而知之以仁為居以義為用以身修家齊國治天下平為效若夫記誦訓詁辯説詞華之習不一與焉其宏綱大用奥義㣲詞既於筆削之書發揮底藴自餘因事有作進則陳之君父退則語於公卿或酬酢朋㳺或訓教子弟一言一話猶足以證明徃昔昭廸來今敢圖家藏遂上御府斯文不墜後裔有榮然父書精深而臣以粗淺之言冠於篇首君學髙逺而臣以卑近之論瀆於聰眀兹榮也祗所以為愧歟朱子語錄曰胡文定公文字皆實但奏議毎件引春秋亦有無其事而遷就之者大抵朝廷文字且要論事情利害是非令分暁今人多先引故事如論青苖只是東坡兄弟説得有精神他人皆説從别處去默堂集二十二卷陳氏曰宗正少卿延平陳淵知默撰一字㡬叟了翁之姪孫楊龜山門人紹興初嘗為諫官致堂斐然集三十卷陳氏曰禮部侍郎胡寅明仲撰文定公長子也本其兄子初生棄不舉文定收育之既長俾自絶於本生不為心䘮止服世父之服寅遵行之集中有與秦丞相書言之甚詳人倫之變古今所未有也寅宣和進士紹興初已為從官不主和議秦檜本與其父子有契分竟謫新州檜死北歸沒於岳州五峰集五卷陳氏曰右承務郎胡宏仁仲撰文定季子不出仕篤意理學南軒張栻其門人也别本不分卷王履道初寮集十卷内制十八卷外制十卷鼂氏曰王安中字履道真定人政和中有宻薦於上者自監大明倉累擢掌内外制後拜太保鎮燕山建炎初貶象州為文瓌竒髙妙最長於制誥李邴入翰林嘗請於上以方今詞林之式上首尾舉安中之名自號初寮陳氏曰安中年十四薦於鄉凡四舉乃登第為中司受㫖攻蔡京京子攸入禁中日夜泣涕告於上安中亟改翰苑事遂止其自政府出守燕京父子排之也然安中之進亦本由梁師成始東坡帥定武安中未弱冠猶及師事焉未卒業而坡去其後鼂以道為無極令安中既第修邑子禮用長牋自言以新學竊一第為親榮非其志也以道曰為學當謹初何患不逺到安中築室榜曰初寮其議論聞見多得於以道既貴顯遂諱鼂學但稱成州使君四丈無復先生之號矣甚哉籍湜不畔之難也雲龕李氏序略曰本朝承五季之後楊劉之學盛於一時其裁割纂組之工極矣石介憤然以楊公破碎聖人之道為世巨害著論排之甚力然當時文宗鉅儒司翰墨之職者亦必循本朝故事如近世張公安道髙簡粹純王公禹玊温潤典裁元公厚之精麗稳密蘇東坡先生雄深秀偉皆制詞之傑然者譬之王良造父䇿驥騄而騁康荘一日千里而節以和鑾馳之蟻封亦必中度豈能彼而不能此哉初寮先生太保王公自布衣以文稱天下由東觀入掖垣由烏府登鼇禁皆天下第一選司内外制者累年其所製體大而義嚴事覈而㫖深竒而不失正雄而不為夸褒勲勞則有帶礪丹青之信施霈宥則有雨露涵濡之澤文治平則祥極乎鳳麟申戒飭則誠著乎金石嘉武節則毅乎彪虎之威羙文徳則昭乎藻火之華極其致蓋與本朝三數公不相上下而馳驟乎燕許常楊之域若不以體製拘之駸駸乎漢氏矣蓋公天才英邁筆力有餘於文於詩皆瓌竒髙妙無所不能故出為世用者如此自徽宗皇帝即位以来擅制誥之羙者公一人而已得不謂一代之竒文與周平園序略曰公年二十有七㳺五臺為竹林泉賦以将相喻泉石格髙而意新送某贈大父詩云不論與汝小一月政自容君數百人專用吾宗公瑾伯仁事致推尊年徳之意精切混成不類少作時方諱言蘓學而公已潛啓其祕鑰久之徽宗旁求文士召置館閣給札親試驟掌書命由中司入北門歴二轄其制誥表章詩文大率雅重温潤而時發秀傑之語定功繼伐等碑睿謨曲宴百韻詩多出特命上恩與天通矣萬目睽睽徒謂其鶴鳴九臯而不知奪胎換骨自有仙手故未嘗以曲學指之今前集四十卷是也中興南渡四海名勝遷謫避地萃於湖廣而公壻趙竒子辟章又家之㳺夏大篇短章更唱迭和既已盡發平昔之所藴且復躬閲事物之變益以江山之助心與境會意隨辭達韻遇險而反夷事積故而逾新他人瞠乎其後我乃綽有餘裕至如桂栁佛寺諸記閎深辨麗近坡暮年之作黄張鼂秦既沒系文統接墜緒誰出公右豈止襲其裳佩其環而已今後集十卷是也汪彦章浮溪集六十卷陳氏曰翰林學士婺源汪藻彦章撰四六偶儷之文起於齊梁歴隋唐之世表章詔誥多用之然令狐楚李商隱之流是為能者殊不工也本朝楊劉諸名公猶未變唐體至歐蘇始以博學富文為大篇長句叙事達意無艱難牽強之態而王荆公尤深厚爾雅儷語之工昔所未有紹聖後置詞科習者益衆格律精嚴一字不茍錯若浮溪尤其集大成者也孫鴻慶序言其文貫穿百氏網羅舊聞文從字順體製亦渾然不見刻畫如金鐘大鏞叩之輙應當大典冊深淳雅健追配古作所謂常楊燕許諸人皆莫及也石林總集一百卷年譜一卷陳氏曰尚書左丞呉郡葉夢得少藴撰紹聖四年進士崇觀間驟貴顯三十一嵗掌外制次年遂入翰林中廢至建炎乃執政然才數日而罷平生所歴州鎮皆有能聲胡文定安國嘗以其蔡潁南京之政薦於朝謂不當以宿累廢晩兩帥金陵當烏珠臨江移三山平羣宼其功不可沒也秦檜秉政欲令帥蜀辭不行忤檜意以崇慶節度使致仕其居在卞山竒石森列藏書數萬卷既沒守者不謹屋與書俱燼於火石林二字本出楚辭天問石林建康集十卷陳氏曰皆帥建康時詩文其初以所莅官各為一集後其家編次總而合之此集其一也石林審是集八卷陳氏曰其門人盛光祖子紹所錄亦已入總集翟忠惠集三十卷陳氏曰參政丹陽翟汝文公巽撰汝文制誥古雅多用全句氣格渾厚近世罕及夫人邢氏恕之女居實其弟也長子耆季實邢出好古博文髙尚不仕忠惠者私謚也鴻慶集四十二卷陳氏曰戸部尚書晉陵孫覿仲益撰大觀三年進士政和四年詞科代髙麗謝賜燕樂表膾炙人口生元豐辛酉卒乾道己丑蓋年八十九可謂耆宿矣而其平生出處至不足道也嘗提舉鴻慶宮故以名集周平園序略曰公軼羣邁徃賦才獨異而復天假之年磨淬鍜煉重之以湖山之助名章雋語少而成壯而盈晩而愈精靖康時為執法詞臣其章䟽制誥表奏徃徃如陸敬輿明辯駿發每一篇出世争傳誦耄年為論譔次對親為謝表啓各出新意用事屬詞少壮所不逮綦北海集六十卷陳氏曰翰林學士北海綦崈禮叔厚撰工於四六秦檜初罷相崈禮當制有御筆詞頭藏其家檜再相下台州追索時崈禮已死幸不及禍雲龕草堂後集二十六卷陳氏曰參政鉅野李邴漢老撰明受之變以兵部侍郎直學士院叱責兇渠朝廷賴焉既復辟首擢執政周益公作神道碑言前後集一百卷今惟後集盖皆南渡後所作也朱文公為之序漢老樂静右史之姪五世祖濤五代時宰相石晋之亂弟澣在翰林䧟於金及邴立節於建炎而弟鄴守會稽亦隨金人北去世以為異龜溪集十二卷陳氏曰知樞宻院忠敏呉興沈與求必先撰建炎紹興之間歴三院翰苑以至執政嘗奏言王安石之罪大者在於取揚雄馮道當時學者惟知有安石喪亂之際甘心從偽無仗節死義之風實安石倡之此論前未之及也紹興七年終於位陳參政簡齋集二十卷鼂氏曰陳與義字去非汝州葉縣人中進士第宣和中徽宗見其所賦墨梅詩喜之遂登冊府建炎中掌内外制拜參知政事以卒晩年詩尤工周葵得其家所藏五百餘篇刋行之號簡齋集陳氏曰去非其先蓋蜀人東坡所傳陳希亮公弼者其曾祖也崇觀間尚王氏經學風雅㡬廢絶而去非獨以詩名中興後遂顯用後村劉氏曰元祐後詩人迭起一種則波瀾富而句律踈一種則煆煉精而情性逺要之不出蘇黄二體而已及簡齋出始以老杜為師墨梅之類尚是少作建炎以後避地湖嶠行路萬里詩益竒壮元日云後飲屠蘓驚已老長乘舴艋竟安歸除夕云多事鬢毛隨節換盡情燈火向人眀記宣靖事云東南鬼火成何事終待邊烽作争臣謂方臘不能為患直待尼堪耳岳陽樓云登臨吳蜀横分地徙倚湖山欲暮時又云乾坤萬事集雙鬢臣子一謫今五年聞徳音云自古安危關政事隨時憂喜到樵漁五言云泊舟華容縣湖水終夜眀凄然不能寐左右菰蒲聲窮途事多違勝處心亦驚三更螢火閙萬里天河横腐儒憂平世况復值甲兵終焉無寸䇿白髪滿頭生造次不忘憂愛以簡嚴掃繁縟以雄渾代尖巧第其品格當在諸家之上捫膝先生文集尚書郎三嵎喻汝礪撰後溪劉氏序略曰靖康之難金議立偽楚以絶民望先生捫其膝曰此膝豈可屈哉即日挂冠神武門遂自號捫膝居士由此名重海内先生之於學不古不好於文不古不嗜於事不古不愜故其於名節不古不止也既沒六十三年而文集始出嗚呼此豈如時花候禽可悦一時耳目之比宜其愈久而愈難冺也蓋先生之文一字不肯茍於下筆每篇率能馳騁上下濤起阜湧力有餘而氣不竭辭既工於理與事又欲眀白而深切其得無傳乎昭徳鼂公文集六十卷侍郎鼂公武子止撰後溪劉氏序略曰國家丙午之變中原衣冠不南渡則西入於蜀其入於蜀者有能言當時理亂興䘮之由而明乎得失之跡歴歴道徃事誦京洛之遺風者鮮矣藉令有之而能逹之乎文辭可使耳目尚接乎而後之人有傳焉者亦又鮮焉昭徳鼂公盖能言當時理亂興䘮之由而眀乎得失之跡道徃事誦遺風而又能逹之乎文辭以傳者也其經事之多嘗艱之久而學日益强文日益力猶以為未足其答進士劉興宗書曰僕少時貫穿群書出入百氏旁逮釋老恢詭之學一再終星其勤亦至矣亡得焉反而求之六藝似於道有見也乃願師董仲舒心竒賈生而病其雜也則公之學可覩矣宇文肅愍公文集贈開府儀同三司宇文虚中撰後溪劉氏序略曰公羈絶域者十五年而朝廷悉發其家人北去後四年父子謀覺而闔門被禍矣公弟兄早以才奮皆致位二府公之文章又最見稱於當世余讀其為館職時所與開封尹論事書而壮之使充是書以徃足以追古人而並駕公既亟見用於尚文之日潤色太平黼藻休烈則余之所謂繫一時所遇而作非公之所欲充而不已者也故公答曾晦之書云僕長而游太學為科舉所使及得一官又屢為應制代言之文皆非得已而為者去嵗得罪杜門於此閑取篋中書史卧而讀之日盡數卷乃知古人之未嘗為文也惟其無意於為文而遇事乃言則其優㳺舒泰奮迅豪蕩蓋無施而不可昔嘗謂西漢制詔妙絶於元成間而章䟽奏對至谷子雲而工極無以復加矣迨今思之則不然惟髙帝立長沙王令諸吏善遇髙爵及省賦舉賢等詔呂后孝文賜匈奴單于書楚王信以下上尊號相國何等議天子所服此等數篇卓然渾成非司馬相如王褒輩㝠搜巧繪所能至也公之此書至論古之人成徳為行隐然出處之大致亦非有意於其間又觀所與趙慶長論文書亦曰不若清眀廖邈之為愈也挺臣欲表出其先大父之文即二書所言余又何加焉杜起莘文集殿中侍御史杜莘老起莘撰後溪劉氏序略曰公學術之正文辭之典氣節之剛與王公龜齡大畧相似而公奮起孤逺為尤難余嘗得公奏䟽而讀之其言五穀藥石也公卒四十餘年余守眉陽又得公他文閲之嘆曰善哉窮之言達之行也今年又得公經論千餘篇信乎公之學得於孟子者歟世益降士之為文益浮噫無復斯文也已西山老文集二十四卷豫章胡直孺少汲撰紹興中仕至刑部尚書孫鴻慶序略云公少工於詩語出驚人魯直一見擊節嘆賞指示佳處數十語表而出之他文稱是筆力雄贍所為賦頌表啓記序銘贊之屬蓋數萬言如行雲流水自然成文胡承公集十卷資古紹志集十卷鼂氏曰胡世将字承公中進士科早受知鼂無咎建炎南渡嘗直學士院終於資政殿學士川陕宣撫使為文敏贍温雅掌書命頗有能聲喜聚金石刻效歐公集古錄為資古紹志集序云以成其先人之志故以紹志目其書陳氏曰文恭公宿之曾孫以兵部侍郎為川陕副宣金人敗盟繼吳玠之後經畫守禦以迄和議再成分疆未定死於河池世将好古博雅有資紹志錄效集古錄䟦尾亦見集中謚忠獻邵氏集二十卷鼂氏曰邵溥字澤民進士第靖康初為户部侍郎上踐祚以例貶官紹興中復待制宣撫川陕師事崇福十二歲詩文早有能聲文獻通考卷二百三十八
