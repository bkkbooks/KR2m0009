body:
  text: 文獻通考卷八十八鄱陽馬端臨貴與著郊社考二十一祈禳旅禜附雩祭門禱疾祓除難禱水旱已見大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝六祝之秀反祝永長也貞正也求多福歴年得正命也鄭司農云順順豐年也年祝求永貞也吉祝祈福祥也化祝弭災兵也瑞祝逆時雨寧風旱也筴祝逺罪疾也疏曰此六祝皆是祈禱之事皆有辭説以告神故云六祝之辭鄭司農云順祝順豐年已下皆約小祝而説順祝當小祝順豐年年祝當求永貞吉祝當祈福祥化祝當弭災兵云瑞祝逆時雨寧風旱也者此二者似若天之應瑞故總謂之瑞祝云筴祝逺罪疾者自此以上差次與小祝不同唯有筴祝與小祝逺罪疾相當宜為一也黄氏曰筴祝命龜筮之辭也鄭見金縢史乃筴祝為禱疾之事故以為逺罪疾而不知金縢筴祝正為命卜筮也小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌烖兵逺罪疾疏曰掌小祭祀者即是將事侯禳已下禱祠之事是也小祭祀與将事侯禳已下作目将事侯禳禱祠祝號又與祈福祥順豐年已下為目祈福祥順豐年逆時雨三者皆是侯寧風旱彌烖兵逺罪疾三者即是禱求福謂之禱報賽謂之祠皆有祝號故總謂之禱祠之祝號祈福祥已下不言一曰二日者大祝已言訖小祝佐大祝行事故畧而不言亦欲見事起無常故不言其次第黄氏曰所謂祈順逆寧彌逺與大祝六祝相参錯但小祝所掌皆小祭祀不為辭掌其祝號而已肆師與祝侯禳於畺及郊注曰侯禳小祝職也畺五百里逺郊百里近郊五十里疏曰侯者候逆善祥禳者禳去殃氣故肆師與小祝為此侯禳二事掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰説造七報反禜音詠求祈謂有災變號呼告神以福天神人鬼地祗不和則六癘作見故以祈禮同之鄭司農云類造禬禜攻説皆祭名也類祭於上帝詩曰是類是禡爾雅曰是類是禡師祭也司馬法曰將用師乃告於皇天上帝日月星辰以禱於后土四海神祗山川冡社乃造於先王然後冡宰徴師於諸侯曰某國為不道征之以某年某月某日師至某國禜日月星辰山川之祭也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之災於是乎禜之元謂類造加誠肅求如志禬榮告之以時有災變也攻説則以辭責之禜如日食以朱絲營社攻如其鳴鼓然董仲舒救日食祝曰昭昭大明殱滅無光奈何以隂侵陽以卑侵尊是之謂説也禬未聞焉造類禬禜皆有牲攻説用幣而已牢疏曰鄭知類造禬禜皆有牲者按禮記祭法云埋少於泰昭祭時也下云幽禜祭星雩禜祭水旱鄭注云凡此以下皆祭用少牢禜既用牲故知類造亦皆有牲故云皆有牲也知攻説用幣者是日食伐鼓之屬天災有幣無牲故知用幣而已詩云靡愛斯牲是也舜典肆類于上帝見因祭篇立君條王制天子將出類于上帝造乎禰見廵守及征伐條伐大祝大師造于祖類上帝及肆師類造上帝並見征條王制諸侯將出造乎禰及大祝造于廟並見㑹同條禜祭見百神篇禜酺條國有大故天烖彌祀社稷禱祠大故兵冦也天災疫癘水旱也彌猶徧也徧祀社稷及諸所禱既則祠之以報焉春官荒肆師若國有大故則令國人祭注曰大故謂水旱凶所令祭者社及禜酺禜音詠酺音蒲疏見百神篇禜酺條令都宗人國有大故則令禱祠既祭反命于國注曰令都之有司也祭謂報賽也反命還白王賽西代反王家宗人國有大故則令禱祠反命祭亦如之注曰以命令禱祠歸白王於獲福又以王命令祭之還又反命小宗伯大烖及執事禱祠于上下神示凡王之㑹同軍旅甸役之禱祠肄儀為位國有禍烖則亦如之凡天地之大烖類社稷宗廟則為位執事大祝及男巫女巫也求福曰禱得求曰祠誄曰禱爾于上下神祗鄭司農云小宗伯與執事共禱祠禱祈禮輕類者依其正禮而為之疏曰禍烖謂國遭水旱凶荒則有禱祠之事故云亦如之天烖謂日月食星辰奔殞地烖謂震裂則類祭社稷及宗廟則亦小宗伯為位祭之春官小子凡沉辜侯禳飾其牲鄭司農云沉謂祭川爾雅曰祭川曰浮沉辜謂磔牲以祭也月令曰九門磔禳以畢春氣侯禳者候四時惡氣禳去之也夏官小子祈五祀見釁條羊人凡沈辜侯禳釁積共其羊牲疏曰祭天用犢其日月已下有用羊者雞人凡祭祀面禳釁共其雞牲疏曰司農云面禳四面禳則侯禳禳謂禳去惡祥也謂春官及地官牧人凡外祭毁事用厖可也注曰外祭表貉王行所過山川用事者厖謂雜色不純毁謂疈辜侯禳毁除殃咎之屬疏曰按宗伯云疈辜祭四方百物而引九門磔禳又按小祝職云將事侯禳皆是祈除殃害非常之祭用厖之類故引以為證也厖亡江反男巫掌望祀望衍授號旁招以茅衍注音延疏曰云望祀者類造禬禜遥望而祀之云望衍者衍延也是攻説之禮遥望延其神以言語責之云授號者此二者皆詛祝授以神號云旁招以茅者旁謂四方此男巫於地官祭此神時則以茅招之於四方也元謂破衍為延者衍字於六祈義無所取故破從延云望祀謂有牲粢盛者注大祝已云類造禬禜皆有牲攻説用幣而已有牲則有黍稷故此兼云粢盛者也云延進也謂但用幣致其神者此即攻説用幣而已是也云二者詛祝所授類造攻説禬禜之神號男巫為之招者以其授號文承二者之下故知此六神皆授之號云授號知是詛祝者按詛祝而知也注及黄氏説見地示篇四望條冬堂贈無方無算堂贈謂逐疫也無方四方為可也無算道里無數遠益善也元謂冬嵗終以禮送不祥及惡夢皆是也其行必由堂始巫與神通言當東則東當西則西可近則近可逺則逺無常數三春官巳女巫掌嵗時祓除釁浴注曰嵗時祓除如令月上如水上之類釁浴謂以香薫草藥沐浴疏曰一月有三巳據上旬之巳而為祓除之事見令三月三日水上戒浴是也占夢季冬乃舍萌於四方以贈惡夢注曰元謂舍讀為釋舍萌猶釋菜也古書釋菜釋奠多作舍字萌菜始辭也贈送也欲以新善去故惡疏曰元謂舍萌猶釋菜也者按王制有釋菜奠幣之事故從之秋官庶氏掌除毒蠱以攻説禬之嘉草攻之凡敺蠱則令之比之注曰毒蠱虫物而病害人者賊律曰敢蠱人及敎令者棄市攻説祈名祈其神求去之也嘉草藥物其状未聞攻之謂熏之令之比之謂使為之又校比之疏曰攻説禬之據去其神也嘉草攻之據去其身也云敺之止謂用嘉草熏之時并使人敺之既役人衆故須校比之翦氏掌除蠧物以攻禜攻之以莽草熏之凡庶蠱之事疏曰庶除故以六祈而言之以莽草熏之據去其身也傳荘公二十五年六月辛未朔日有食之鼓用牲于社左氏曰非常也唯正月之朔慝未作正月夏之四月周之六月謂正陽之月今書六月而傳云唯者明此月非正陽月也慝隂氣正音政日有食之於是乎用幣于社伐鼓于朝食於正陽之月則諸侯用幣于社請救於上公伐鼓於朝退而自責以明隂不宜侵陽臣不宜掩君以示大義公羊子曰日食則曷為鼓用牲于社求乎隂之道也以朱絲營社或曰脅之或曰為闇恐人犯之故營之社者土地之主也月者土地之精也上繫於天而犯日故鳴鼓而攻之脅其本也朱絲營之助陽抑隂也或曰為闇者社者土地之主尊也為日光盡天闇㝠恐人犯歴之故營之然此説非也記或傳者示不欲絶異説耳疏曰云知其非者正以日食隂氣侵陽社官五土之神理宜抑之而反營衛失抑隂之義故也榖梁子曰言日言朔食正朔也鼓用牲鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓麾旌幡也五兵矛㦸鉞楯弓矢諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也凡有聲皆陽事以厭隂氣柝兩木相擊充實也五疏曰五麾者糜信云各以方色之旌置之五處也兵者徐邈云矛在東㦸在南鉞在西楯在北弓矢在中央五鼓者糜信徐邈並云東方青鼓南方赤鼓西方白鼓北方黒鼓中央黄鼓按五兵有五種未審五鼓是一鼓有五色為當五種之鼓也何者周禮有六鼓靁鼓靈鼓路鼓鼖鼓鼛鼓晉鼓之等若以為五種之鼓則不知六鼓之内竟去何鼓若以為一種之鼓則不知六鼓之内竟取何鼓文公十五年六月辛丑朔日有食之鼓用牲于社左氏曰非禮也日有食之天子不舉去盛饌諸侯用幣于社社尊於諸侯故請救而不敢責之伐鼓于朝以昭事神訓民事君天子不舉諸侯用幣所以事神尊卑異制所以訓民示有等威古之道也等威威儀等差昭公十七年六月甲戍朔日有食之左氏曰祝史請所用幣昭子曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也正音政月正月謂建巳正陽之也於周謂六月於夏為四月慝隂氣也四月純陽用事隂氣未動而侵陽災重故有伐鼓用幣之禮也平子以為六月非正月故太史答言在此月也夏戸雅反平子弗從昭子退曰夫子將有異志不君君矣安君之災故曰有異志日疏曰日食隂侵陽臣侵君之象救食所以助君抑臣也平子不肯救日食是不君事其君也齊有彗星出齊之分野不書魯不見疏曰出齊之分野於元枵之次也彗即孛也文十四年有星孛入于北斗十七年有星孛于大辰皆書此不書者時魯不見或隂不見齊侯使禳之晏子曰無益也祗取誣焉且天之有彗也以除穢也君無穢徳又何禳焉若徳之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懐多福厥徳不回以受方國君無違徳方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡若徳回亂民將流亡祝史之為無能補也公説乃止昭公二十六年左氏傳哀公六年有雲如衆赤鳥夾日以飛三日楚子使問諸周太史周太史曰其當王身乎日為人君妖氣守之故以為當王身雲在楚上唯楚見之故禍不及他國若禜之可移於令尹司馬王曰除腹心之疾而寘諸股肱何益不榖不有大過天其夭諸有罪受罰又焉移之遂弗禜春秋左氏傳昭公十七年冬有星孛于大辰左氏曰有星孛于大辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斚玉瓉鄭必不火瓘珪也斚玉爵也瓉勺也欲以禳火子産弗與十八年夏五月火始昏見火心星丙子風梓慎曰是謂融風火之始也東北曰融風融風木也木火母故曰火之始疏曰東北曰融風易緯作調風俱是東北風一風有二名東北木之始故融風為木也木是火之母火得風而盛故融為火之始七日其火作乎從丙子至壬午七日壬午水火合之日故知當火作戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之大庭氏古國名在魯城内魯於其處作庫髙顯故登以望氣参所占以審前日之言曰宋衛陳鄭也數日皆來告火禆竈曰不用吾言鄭又將火前年禆竈欲用瓘斚禳火子産不聼今復請用之鄭人請用之子産不可子大叔曰寳以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言也豈不或信多言者或時有中遂不與亦不復火傳言天道難明雖禆竈猶不足以盡知之昭公十八年夏五月宋衛陳鄭災左氏曰鄭子産使子寛子上廵羣屏攝至於大宫二子鄭大夫屏攝祭祀之位大宫鄭祖廟廵行宗廟不得使火及之行去聲疏曰楚語説事神之禮云使名姓之後能知犧牲之物彜噐之量屏攝之位壇塲之所而心率舊典者為之宗知屏攝是祭祀之位也鄭衆云攝攝來茅以為屏蔽其事或當然使公孫登徙大龜登開卜大夫使祝史徙主祏於周廟告於先君祏音石廟注疏見宗篇中主條明日使郊人助祝史除於國北疏曰郊人當謂郊内鄉之人也祝史掌祭祀之官也使此鄉人助祝史除地在城之北作壇塲為祭處也就國北者南為陽北為隂就太隂禳火也禳火於元㝠回禄元㝠水神回禄火神知疏曰月令冬云其神元㝠元㝠水神也周語云夏之亡也回禄信於黔隧先儒注左傳及國語者皆云回禄火神或當有所見也祭水神欲令水抑火祭火神欲令火自止禳其餘災慮更火也三日哭七月鄭子産為火故大為社祓禳於四方振除火災禮也掁棄也宋災二師令四鄉正敬享二師左右師也鄉正鄉大夫享祀也疏曰宋國之法二師分掌其方左右各掌其二鄉并言其事故云二師命四鄉正也費誓云魯人三郊三遂則魯立三鄉此云命四鄉正則宋立四鄉也周禮鄉為一軍大國三軍宋是大國不過三軍而有四鄉者當時所立非正法也於是宋置六卿况四鄉乎敬享不知所享何神周禮大祝國有天災乃彌祀社稷禱祠祝宗用馬於四墉祀盤庚於西門之外祝大祝宗宗人墉城也用馬祭於四城以禳火盤庚殷王宋逺祖城積隂之氣故祀之凡天災有幣無牲用馬祀盤庚皆非禮疏曰周禮大祝掌六祝之辭以事鬼神示祈福祥小宗伯掌建國之神位特牲少牢士大夫之祭祀也皆宗人掌其事然則諸是祭神言辭大祝掌之禮儀宗人掌之故所有祭祀皆祝宗同行此事晉侯問於士弱曰吾聞之宋災於是乎知有天道何故問宋何故自知天道将災對曰古之火正或食於心或食於咮以出内火是故咮為鶉火心為大火謂火正之官配食於火星也建辰之月鶉火星昏在南方則令民放火建戌之月大火星伏在日下夜不得見則令民内火禁放火疏曰周禮司爟掌行火之政令季春出火民咸從之季秋内火民亦如之鄭司農云以三月昏心星見於辰上使民出火九月黄昏心星伏在戍上使民内火建辰之月即月令季春之月日在胃昏七星中南方七星有井鬼桞星張翼軫七者共為朱鳥之宿星即七星也咮謂桞也春秋緯文耀鉤云咮謂鳥陽七星為頸宋均注云陽猶首也桞謂之咮咮鳥首也七星為朱鳥頸也咮與頸共在於午者鳥之止宿口屈在頸七星與咮體相接連故也鶉火星昏而在南方於此之時令民放火咮星為火之候故於十二次咮為鶉火也建戌之月即月令季秋之月日在房東方七宿角亢氐房心尾箕七者共為蒼龍之宿釋天云大辰房心尾也大火謂之大辰孫炎曰龍星明者以為時候大火心也在中最明故時候主焉以是故此傳心為大火九月日體在房房心相近與日俱出俱没伏在日下不得出見故令民内火禁放火也火官合配其人蓋多不知誰食於心誰食於咮也此傳鶉火大火共為出内火之候周禮之注不言咮者以咮非内火之候故唯指大火以解出内之文故其言不及咮也陶唐氏之火正閼伯居商邱閼伯髙辛氏之子傳曰遷閼伯於商邱主辰辰大火也今為宋星然則商邱在宋地疏曰爾雅以大火為大辰是辰為大火也昭公七年傳曰宋大辰之虛是大火為宋星也閼伯居商邱祀大火今大火為宋星則知宋亦居商邱以此明之故云然則商邱在宋地也釋例云宋商商邱三名一地祀大火而火紀時焉謂出内火時相土因之故商主大火相土契孫商之祖也始代閼伯之後居商邱祀大火商人閲其禍敗之釁必始於火是以日知其有天道也閲猶數也商人數所更歴恒多火災宋是殷商之後故知天道之災必火數所主反左襄公九年氏傳梁山崩晉侯以傳召伯宗傳中戀反傳驛伯宗辟重曰辟傳傳乃重載之車也重人曰待我不如㨗之速也㨗邪出問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川主謂所主祭故山崩川竭君為之不舉為于偽反去盛饌降服損盛服乘縵縵武旦反又莫半反車無文徹樂息八音出次舍於郊祝幣陳玉帛史辭自罪責禮焉禮山川其如此而已雖伯宗若之何伯宗請見之見之於晉君不可不肯見遂以告而從之成公五年左氏傳國語晉語同荘公三十二年秋七月有神降于莘有神聲以接人莘虢地惠王問諸内史過曰是何故也過古禾反夫内史過周大對曰國之將興明神降之監其徳也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之亦有神異王曰若之何對曰以其物享焉其至之日亦其物也享祭也若以甲乙日祭先脾玉用蒼服上青以此類祭之王從之内史過往聞虢請命聞虢請於神求賜土田之命反曰虢必亡矣虐而聼於神神居莘六月虢公使祝應宗區史嚚享焉神賜之土田祝大祝宗宗人史大史應區嚚皆名史嚚曰虢其亡乎吾聞之國將興聼於民政順民心將亡聼於神求福於神神聰明正直而壹者也依人而行唯徳是與虢多涼徳其何土之能得涼薄也為僖二年晉滅下陽傳楚共王無冡適有寵子五人無適立焉乃大有事于羣望羣望星辰山川而祈曰請神擇於五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於大室之庭大室音泰巴姬共王妾大室祖廟昭公十三年左氏傳尚書大傳曰維王后元祀王謂禹也后君也祀年也禹始居攝為君之年也帝令大禹歩于上帝帝舜也歩推也帝令禹推演天道謂觀得失反覆也維時洪祀六沴用咎于下用此時始大祀六沴之用咎于下者禹乃共辟厥徳受命休令爰用五事建立王極一曰貌貌之不恭是謂不肅肅敬也君貌不恭則是不能敬其事也厥咎狂君臣不敬則倨慢如狂矣厥罰恒雨貌曰木木主春春氣生生氣失則踰其節故恒雨也厥極惡生氣失故於人則為惡時則有服妖服貌之飾時則有龜孽龜蟲之生於水而遊於春者也屬木時則有雞禍雞畜之有冠翼者也屬貌時則有下體生於上之痾痾病也貌氣失之病時則有青眚青祥維金沴木次二事曰言言之不從是謂不乂君言不從則是不能治其事也厥咎僭君臣不治則僭差矣厥罰恒暘言曰金金主秋秋氣殺殺氣失故恒𤾉也厥極憂殺氣失者於人為憂時則有詩妖詩以言志時則有介蟲之孽蝝蟲蜩蟬之類蟲生於火而藏於秋者屬金時則有犬禍犬畜之以口吠守者也屬言時則有口舌之痾言氣失病也時則有白𤯝白祥維木沴金次三事曰視視之不明是謂不悊悊為暸也君視不明是謂不能暸其事也厥咎荼君視不暸則荼緩也厥罰恒燠視曰火火主夏夏氣長長氣失則恒燠也厥極疾長氣失故於人為疾時則有草妖物可見者莫衆於草也時則有倮蟲之孽時則有羊禍羊畜之逺視者也屬火時則有目痾時則有赤𤯝赤祥維水沴火次四事曰聼聼之不聰是謂不謀君聼不聰則是不能謀其事也厥咎急厥罰恒寒聼曰水水主冬冬氣藏藏氣失故恒寒也厥極貧藏氣失故於人為貧時則有鼓妖鼓聼應也時則有豕禍豕畜之居閑衛而聼者也屬水時則有耳痾聼氣失之病時則有黒青黒祥維火沴水次五事曰思心思心之不容是謂不聖容當為睿睿通也心明曰聖孔子説休徴曰聖者通也兼四而明則所謂聖聖者包貌言視聼而載之以思心者通以待之君思心不通則是不能心明其事也厥咎雺雺冐也君臣心不明則相象冐矣厥罰恒風思心曰土土王四時主消息生殺長藏之氣風亦出内雨𤾉寒燠之徴皆所以殖萬物之性命者也殖氣失故恒風厥極凶短折殖氣失則於人為凶短折未齓曰凶未冠曰短未婚曰折時則有脂夜之妖夜讀曰液時則有華孽華當為夸夸蚓蟲之生於土而遊於土者時則有牛禍牛畜之任重者時則有心腹之痾思心氣失之病時則有黄𤯝黄祥時則有金木水火沴土志論皆言君不寛容則地動元或疑焉今四行來沴土地乃動臣下之相師為畔逆之象君不通於事所致也以為不寛容亦皆為隂勝陽臣强之異王之不極是謂不建王君也言王者五事象五行則王極象天也人法天元氣純則不可以一體而言之也厥咎眊劉子駿傳曰眊亂也君臣不立則上下亂也厥罰恒隂王極象天天養萬物養氣失故恒隂也厥極弱天為剛徳剛氣失故於人為弱時則有射妖射人將發矢必先於此儀之發矢則必中於彼矣君將出政亦先於朝廷度之出則歴於民心射其象者也時則有龍蛇之孽龍蟲生於淵行於無形過於天者也屬天蛇龜之類或曰龍無角曰蛇時則有馬禍天行健馬畜之疾行者也時則有下人伐上之痾時則有日月亂行星辰逆行亂謂薄食鬭並是逆謂盈縮反明經天守舍之類維五位復建辟厥沴君失五事則五行相沴違其位復立之者明其變異則改過以共禦之又必齊肅祭祀以撫其神則凶咎可除矣曰二月三月維貌是司四月五月維視是司六月七月維言是司八月九月維聼是司十月十一月維思心是司十二月與正月維王極是司司主也凡六沴之作嵗之朝月之朝日之朝則后王受之嵗之中月之中日之中則正卿受之嵗之夕月之夕日之夕則庶民受之自正月盡四月為嵗之朝自五月盡八月為嵗之中自九月盡十二月為嵗之夕上旬為月之朝中旬為月之中下旬為月之夕平旦至食為日之朝禺中至日昳為日之中下晡至黄昏為日之夕受之謂受其凶咎也其二辰以次相將其次受二辰為日月也假令嵗之朝也日月中則上公受之日月夕則下公受之日月朝則大夫受之嵗之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣禦貌於喬忿止貌之失者在於去驕忿驕忿者是不恭之刑也謂若傲狠明徳忿戾無期之類也以其月從其禮祭之叄乃從從順也叄祭之其神乃順不怒也禦言於訖衆以其月從其禮祭之叄乃從訖止也止言之失者在於去止衆止衆者是不從之刑也止衆謂若周威厲王弭譛謗以障民口之類也禦視於忽似以其月從其禮祭之叄乃從止視之失者在於去忽似忽似者是不明之刑也謂若亂於是非象共滔天及不辨鹿馬之類禦聼於怵攸以其月從其禮祭之叄乃從止聼之失者在於去怵攸怵攸者是不聰之刑也若老夫灌灌小子蹻蹻誨爾諄諄聼我藐藐之類禦思心於有尤以其月從其禮祭之叄乃從尤過也止思心之失者在於去欲有所過欲者是不睿之刑也是若昭公不知禮而習小儀不修政而欲誅季氏之類也禦王極於宗始以其月從其禮祭之叄乃從宗尊也止王極之失者在於尊用始祖之法度不言惡者人性備五徳得失在斯王不及則五事皆失非一惡也大者易姓小者滅身其能宗始則録延其受命之君承天制作猶天之敎命也故掌祖廟之藏者謂之天府六沴之禮散齊七日致齋三日新噐潔祀用赤黍朝於中庭祀四方從東方始卒於北方其祀禮曰格祀篇名也今亡大宗伯國有大故則旅上帝及四望故謂凶烖旅陳也陳其祭祀以祈焉禮不如祀之備也上帝五帝也元謂四望五嶽四鎮四瀆春官典瑞四圭有邸以祀天旅上帝注疏見祀天禮兩圭有邸以祀地旅四望注疏見祀地禮大旅共玊噐而奉之玊噐謂四圭祼圭之屬同上掌次王大旅上帝則張氈案設皇邸注疏見祭物篇筵几條職金旅于上帝則共其金版金鉼謂之版此版所施未聞秋官司尊彝大喪存奠彝大旅亦如之旅者國有大故之祭也亦存其奠彜則陳之不即徹疏曰云不即徹則與上注奠者朝夕乃徹義異但上經據人鬼日出逮日放其去來於隂陽此天神無此義但不即徹不必要至夕也春官上眡瞭掌凡樂事播鼗擊頌磬笙磬頌音容磬眡瞭播鼗又擊磬在東方曰笙笙生也在西方曰頌頌或作庸庸功也大射禮曰樂人宿縣於阼階東笙磬西面其南笙鐘其南鎛皆南陳又曰西階之西頌磬東面其南鐘其南鎛皆南陳掌大師之縣大師當縣則為之疏曰大師掌六律六同五聲八音以其無目於音聲審凡樂事相瞽相謂扶工大喪廞樂噐大旅亦如之廞許金反故疏曰大旅非常祭亦臨時乃造云亦如之同上笙師掌敎龡竽笙塤籥簫箎篴管舂牘應雅以敎祴樂龡昌垂反竽音于塤虚袁反牘音獨或大錄反注疏見祭物篇樂條大旅則陳之陳於饌處而已不涖其縣臨疏曰此經直言陳之明陳於饌處而已不臨其縣其縣者大司樂云大喪臨廞樂噐注云臨笙師鎛師之屬是也同上大卜凡旅陳龜陳龜於饌處也士䘮禮曰卜人先奠龜于西塾正南首是也不親貞龜亦以卜旅祭非常輕於大遷大師疏曰饌處謂在西塾南首故引士喪禮為証也同上也龜人若有祭事則奉龜以往旅亦如之注曰奉猶送送之所當卜疏曰旅謂祈禱天地及山川之類陳氏禮書曰旅非常祭也國有大故然後旅其羣神而祭之則荆岐既旅蔡䝉旅平九山刋旅者以水災耳推此則凡所遭之大故皆凶災之類也考之於禮天子所次之位則張氈案設皇邸所奠之圭則四圭有邸所用之版則金版至於司尊彜之存奠彜笙師之陳樂噐眡瞭之廞樂噐皆如大喪之禮言奠則非純乎祭也言存則非即徹之也陳樂而不懸廞樂而不鼓非以其凶灾邪周官或言大旅或言旅葢故有大小而旅亦隨異也然大旅之禮不若祀天之為至也故曰大旅具矣不足以享帝若夫旅四望山川則所次不以氈案皇邸所用不以金版而所用之圭則两圭有邸而已大祝掌六祈以同鬼神四曰禜禜崇敬反如禜日月星辰之祭也日食以朱絲營社有牲禜疏曰祭法埋少牢於泰昭祭時也下云幽祭星雩禜祭水旱皆用少牢黨正及四時之孟月吉日則屬民而讀邦法以紏戒之春秋祭禜亦如之禜謂雩禜水旱之神葢亦為壇位如祭社稷云疏曰禮記祭法云雩禜祭水旱按昭公元年左氏傳子産云水旱癘疫之不時於是乎禜之皆是禜祭水旱神也大司徒及封人等皆云社稷有壇又祭法王官祭日及雩禜祭水旱等皆是壇名故知亦如社稷有壇位無正文故言云以疑之也官地族師月吉則屬民而讀邦法月吉毎月朔日也也疏曰云月吉每月朔日者以其彌親民敎亦彌數故十二月朔日皆讀之春秋祭酺亦如之酺音歩或音蒲酺者為人物烖害之神也故書酺或為歩杜子春云當為酺元謂校人職又有冬祭馬歩則未知此世所云蝝螟之酺與人鬼之歩與葢亦為壇位如雩禜云族長無飲酒之禮因祭酺而與其民以長㓜相獻酬焉蝝悦全反歩與音餘皆疏曰鄭知酺者為人物烖害之神者凡國之祈祭者恐與人物為烖害謂若州長黨正所祭社禜亦為水旱與人物為烖害明此亦是恐與人物為烖害之神也但此經云酺不知何神故舉漢法以况之但漢時有蝝螟之酺神又有人鬼之歩神未審此經酺定當何酺故两言之以無正文故皆云與以疑之也按上州長春秋習射有飲酒禮黨正十月農功畢亦有飲酒禮皆得官物為之今此族卑不得官物為禮故云族長無飲酒禮也鄭知因祭酺有民飲酒之禮者按禮記禮噐云周旅酬六尸曽子曰周禮其猶醵與鄭注彼云合錢飲酒為醵即引王居明堂禮乃命國醵鄭據禮噐明堂禮皆有醵法醵即合錢飲酒以不得官酒故湏合錢爾庶同上則閭胥各掌其閭之徵令凡春秋之祭祀聚衆既比讀法書其敬敏任恤者注曰鄭司農云二十五家為閭祭祀謂州社黨禜族酺也及比皆㑹聚衆民因以讀法以勅戒之疏曰旅師以上官尊讀法雖稀稠不同皆有時節但閭胥官卑而於民為近讀法無有時節但是聚衆庶比之時節讀法故云既比則讀法云書其敬敏任恤者以上書其徳行道藝今此閭胥親民更近故除任恤六行之外兼記敬敏者也鄙師各掌其鄙之祭祀注曰祭祀祭禜也疏曰五百家為鄙鄼鄼長各掌其鄼之政令疏曰一鄙五鄼故云各掌其之政令云治其祭祀者謂若族祭酺之類時鄼作管反如春官肆師若國有大故則令國人祭嵗之祭祀亦之注曰大故謂水旱凶荒所令祭者社及禜酺疏曰云命國人祭按地官州祭社黨祭禜族祭酺於六遂之中亦縣祭社鄙祭禜鄼祭酺皆是國人所祭之事也凡言嵗時者謂嵗之四時月令唯見一時故鄭云此其一端也官春傳山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之注疏見久雨禱條右祈禳旅禜附女祝掌王后之内祭祀凡内禱祠之事内祭祀六宫之中竈門户禱疾病求瘳也祠報福所疏曰婦人無外事無行與中霤之等其竈與門户人出入動作所由后亦當祀之故言竈與門戸也按月令春祀户夏祀竈秋祀門后祀之時亦當依此也后無外事禱祠又是非常之祭故知唯有求瘳報福之事也掌以時招梗禬禳之事以除疾殃疏曰云以時者謂隨其事時不必要在四時也云招者招取善祥梗者禦捍惡之未至禬者除去見在之災禳者推郤見在之變異此四者皆與人為疾殃故云以除疾殃也云四禮唯禳其遺象今存者此四禮至漢時招梗及禬不行唯禳一禮漢猶存其遺象故云遺象今存也天官男巫春招弭以除疾病元謂弭讀為敉字之誤也敉安也安凶禍也招敉皆有祀衍之禮疏曰知招敉皆有祀衍之禮者此招敉為招福安禍與侯禳同在六祝有祭之法故知此二者亦有望祀望衍之禮可知衍音延春官疾病乃行禱乎五祀盡孝子之情五祀博言之士二祀曰門曰行士䘮禮傳武王有疾周公作金縢為請命之書藏之於匱緘之以金不欲人開之金縢遂以所藏為篇名既克商二年王有疾弗豫伐紂明年武王有疾不悦豫二公曰我其為王穆卜周公曰未可以戚我先王召公太公言王疾當敬卜吉凶先疏曰止二公之卜云未可以憂怖我王公乃自以為功周公乃自以請命為己事為三壇同墠因太王王季文王請命於天故為三壇壇築土墠除地大除地於中為三壇為壇于南方北面周公立焉疏曰神位在壇故周公立壇上對三王也植璧秉珪乃告太王王季文王璧以禮神植置於三王之坐周公秉桓珪以為䞇告謂祝辭史乃册祝曰惟爾元孫某遘厲虐疾疏曰史乃以策執以祝之曰惟爾元孫某某即發也遇得危暴重疾今恐其死若爾三王是有丕子之責于天以旦代某之身大子之責謂疾不可救於天則當以旦代之不疏曰元云丕讀曰不愛子孫曰子元孫遇疾若汝救是將有不愛子孫之過為天所責欲使為之請命也與孔讀異予仁若考能多材多藝能事鬼神我周公仁能順父又多材多藝能事鬼神言可以代武王之意乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方汝元孫受命於天庭為天子布其徳敎以佑助四方言不可以死用能定爾子孫于下地四方之民罔不祗畏言武王用受命帝庭之故能定先人子孫於天下四方之民無不敬畏嗚呼無墜天之降寳命我先王亦永有依歸今我即命于元龜爾之許我我其以璧與珪歸俟爾命許謂疾瘳待命當以事神爾不許我我乃屏璧與珪不許謂不愈也屏藏也言不得事神乃卜三龜一習吉習因也以三王之龜卜一相因而吉啟籥見書乃并是吉三兆既同吉開籥見占兆書乃亦并是吉公曰體王其㒺害公視兆曰如此兆體王其無害言必愈予小子新命于三王惟永終是圗公歸乃納册于金縢之匱中王翼日乃瘳從壇歸翼明瘳差也朱子曰若爾三王是有丕子之責于天以旦代某之身此一叚先儒都解錯了惟有鼂以道説得好他解丕子之責如史傳中責其侍子之責葢云責三王之侍子侍子指武王也上帝責其來服事左右故周公乞代其死云以旦代某之身予仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神用能定爾子孫于下地四方之民罔不祗畏言三王有侍子之責于天則不如以我代之我多材多藝能事上帝武王不若我多材多藝不能事上帝你不如且留他在世上定你之子孫與四方之民文意如此伊川却疑周公不應自説多材多藝不是如此葢他只是要代武王之死而已子疾病子路請禱子曰有諸子路對曰有之誄曰禱爾于上下神祗子曰丘之禱久矣朱子曰禱謂禱於鬼神有諸問有此理否誄者哀死而述其行之詞也上下謂天地天曰神地曰祗禱者悔過遷善以祈神之佑也無其禮則不必禱既曰有之則聖人未嘗有過無善可遷其素行固已合於神明故曰丘之禱久矣又士喪禮疾病行禱五祀葢臣子廹切之至情有不能自已者初不請於病者而後禱也故孔子之於子路不直拒之而但告以無所事禱之意鄭子産聘于晉晉侯有疾韓宣子逆客私焉私語曰寡君寢疾並走羣望晉所望祀山川皆走往祈禱有加而無瘳今夢黄熊入于寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山殛誅也羽山在東海祝其縣西南熊獸名亦作能如字一音奴來反三足鼈也解者云獸非入水之物故是鼈也一曰既為神何妨是獸按説文及字林皆云能熊屬足似鹿然則既熊屬又為鼈類今本作能者勝也東海人祭禹廟不用熊白及鼈為饍斯豈鯀化為二物乎其神化為黄熊以入于羽淵實為夏郊三代祀之夏户雅反又鯀禹父夏家郊祭之歴殷周二代通在羣神之數并見祀晉為盟主其或者未之祀也乎言周衰晉為盟主得佐天子祀羣神韓子祀夏郊祀鯀晉侯有間間差也語昭公七年左氏傳語國語晉及説苑並同惟國云祀夏郊董伯為尸為異楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望諸侯望祀境内山川星辰江漢睢漳楚之望也睢七餘反郡四水在楚界豐疏曰江經南江夏弋陽安漢經襄陽至江夏安陸縣入江睢經襄陽至南郡枝江縣入江漳經襄陽至南郡當陽入江是四水皆在楚界也禍福之至不是過也不糓雖不徳河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉哀公六年左氏傳晉侯有疾鄭伯使公孫僑如晋聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也子產曰昔髙辛氏有二子伯曰閼伯季曰實沈駘他才反閼於葛反居于曠林不相能也尋干戈以相征討后帝不臧后帝堯也臧善也遷閼伯于商邱主辰商邱宋地主祀辰星辰大火也商人是因故辰為商星商人湯先相土封商邱因閼伯故國祀辰星相息亮反遷實沈于大夏主参夏户雅反参所林反陽大夏今晉縣唐人是因以服夏商疏曰謂之唐人當為陶唐之後二十九年傳云陶唐氏既衰其後有劉累知此唐人是彼劉累之等類也其季世曰唐叔虞唐人之季世其君曰叔虞當武王邑姜方震大叔震本作娠之慎反又音申邑姜武王后齊大公之女懐胎為震大叔成王之弟叔虞也夢帝謂己余命而子曰虞將與之唐屬諸参而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故参為晉星疏曰叔虞為晉之祖故言晉侯也由是觀之則實沈参神也昔金天氏有裔子曰昩為元㝠師生允格臺駘金天氏帝少皥裔逺也元㝠水官昩為水官之長二疏曰昩為元㝠師師訓長也故云昩為水官之長十九年傳云少皥氏有四叔修及熙為元㝠昩為金天裔子當是修熙之後釋例曰修及熙皆為元㝠未知昩為誰之子或是其子孫也臺駘能業其官纂昩之業宣汾洮汾扶分反洮他刀反宣猶通也汾洮二水名障大澤陂障之以處太原太原晉陽也臺駘之所居帝用嘉之封諸汾川帝顓頊沈姒蓐黄實守其祀沈音審之四國臺駘後今晉主汾而滅之矣滅四國由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎禜之有水旱之災則禜祭山川之神若臺駘者周禮四曰禜祭為營攅用幣以祈福祥疏曰日月山川之神其祭非有常處故臨時營其地立攅表用幣告之以祈福祥也攅聚也聚草木為祭處耳反攅作管日月星辰之神則雪霜風雨之不時於是乎禜之星辰之神若實沈者若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉言實沈臺駘不為君疾昭元年左氏傳宋公享晉侯於楚邱請以桑林疏曰若非天子之樂則宋人不當請荀罃不湏辭以宋人請而荀罃辭明其非常樂也宋是殷後得用殷樂知桑林是殷天子之樂名也經典言殷樂為大濩而此復云桑林者葢殷家本有二樂如周之大武象舞也名為大濩則傳記有説湯以寛政治民除其邪虐言能覆濩下民使得其所故名其樂為大濩其曰桑林先儒無説唯書傳言湯伐桀之後大旱七年史卜曰當以人為禱湯乃剪髮斷爪自以為牲而禱於桑林之社而雨大至方數千里或曰禱桑林以得雨遂以桑林名其樂也荀罃辭辭讓之荀偃士匄曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀魯有禘樂賔祭用之禘三年大祭則作四代之樂别祭羣公則用諸侯樂疏曰劉炫曰禘是大禮賔得與同者享賔用樂禮傳無文但賔禮既輕必異於禘魯以享賔當時之失用之已久遂以為常荀偃士匄引過繆之事以諂晉侯使聼宋耳魯以禘樂享賔猶以十一牢為士鞅吳以引徴百牢亦非正也宋以桑林享君不亦可乎言具天子之樂也舞師題以旌夏疏曰舞師樂人之師主陳設樂事者謂舞初入之時舞師建旌夏以引舞人而入以題識其舞人之首故晉侯卒見懼而退入于房也謂之旌夏葢形制大而别為之名晉侯懼而退入於房旌夏非常卒見之人心偶有所畏去旌卒享而還及著雍疾卜桑林見荀偃士匄欲奔請禱焉奔走還宋請禱荀罃不可曰我辭禮矣彼則以之猶有鬼神於彼加之言自當加罪於宋晉侯有間間疾差也公差初賣反傳襄十年左氏齊侯疥遂痁疥音戒梁元帝音該又作痎音皆痁失亷反及疏曰後魏之世嘗使李繪聘梁梁人袁狎與繪言春秋説此事云疥當為痎痎是小瘧痁是大瘧痁患積久以小致大非疥也狎之此言梁主之説也今人瘧有二日一發亦有頻日發者俗人仍呼二日一發久不差者為痎瘧則梁主之言信而有證也是齊侯之瘧初二日一發後遂頻日熱發故曰疥遂痁以此久不差故諸侯之賔問疾者多在齊也先儒舊説皆為疥遂痁初疥後瘧耳期而不瘳諸侯之賔問疾者多在期音基瘳勅留反多在齊梁邱據與裔欵言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔欲殺嚚固以辭謝來問疾之賔公説告晏子晏子曰日宋之盟屈建問范㑹之徳於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈屈居勿反之家無猜疑事故祝史無求於鬼神建以語康王康王曰神人無怨宜夫子之光輔五君以為諸侯主也語去聲五君文襄靈成景疏曰文公為戎右襄靈為大夫成公為卿景公為太傅公曰據與欵謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有徳之君外内不廢上下無怨動無違事其祝史薦信無愧心矣君有功徳祝史陳説之無所愧是以鬼神用享國受其福祝史與焉其所以蕃祉老夀者為信君使也祉音恥為子偽反其言忠信於鬼神其適遇淫君外内頗邪上下怨疾動作辟違從欲厭私辟匹亦反從子用反厭於豔反高臺深池撞鐘舞女斬刈民力輸掠其聚刈魚廢反掠音畧以成其違不恤後人暴虐淫從肆行非度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也以實白神是為言君之罪其葢失數美是矯誣也數所主反是疏曰掩葢愆失妄數美善之謂矯詐誣㒺者也進退無辭則虛以求媚作虛辭以求媚於神是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可為也徴斂無度宫室日更淫樂不違内寵之妾肆奪於市外寵之臣僭令於鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東聊攝齊西界也平原聊城縣東北有攝城姑尤以西姑尤齊東界也姑水尤水皆在城陽郡東南入海其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅於祝史修徳而後可公説使有司寛政毁闗去禁薄歛己責除逋責十二月齊侯田于沛沛音貝沛言疾愈行獵澤名年昭公二十左氏傳右禱疾方相氏掌䝉熊皮黄金四目元衣朱裳執戈揚盾帥百𨽻而時難以索室敺疫難乃多反敺起俱反癘䝉冐也冐熊皮者以驚敺疫之鬼如今魌頭也時難四時作方相氏以難郤凶惡也月令季冬命國難索庾也魌音欺疏曰云時難四時者按月令唯有三時難鄭云四時者雖三時亦得云四時總言之也夏官春官占夢季冬令始難敺疫注曰令令方相氏也難謂執兵以有難郤也季春命國難九門磔攘以畢春氣磔作伯反氣此難難隂氣也此月之中日行歴昴有大陵積尸之氣佚則厲鬼隨而出行命方相氏帥百𨽻索室敺疫以逐之又磔牲以攘於四方之神所以畢止其災也王居明堂禮曰季春出疫于郊以攘春氣仲秋天子乃難以逹秋氣此難難陽氣也陽暑至此不衰害亦將及人所以及人者陽氣左行此月宿直昴畢昴畢亦得大陵積尸之氣氣佚則厲鬼亦隨而出行於是亦命方相氏帥百𨽻而難之王居明堂禮曰仲秋九門磔攘以發陳氣禦止疾疫季冬命有司大難旁磔出土牛以送寒氣此難難隂氣也難隂始於此者隂氣右行此月之中日歴虚危有墳墓四司之氣為厲鬼将隨强隂出害人也旁磔於四方之門磔攘也出猶作也作土牛者丑為牛牛可牽止也送猶畢也疏曰出土牛以送寒氣者出猶作也此時强隂既盛年嵗已終隂若不去凶邪恐來嵗更為人害其時月建丑又土能尅水持水之隂氣故特作土牛以畢送寒氣也熊氏引石氏星經云司命二星在虚北司禄二星在司命北司危二星在司禄北司中二星在司危北史遷云四司鬼官之長又云墳墓四星在危東南是虛危有墳墓四司之氣也月令傳鄉人儺朝服而立於阼階朱子曰儺所以逐疫周禮方相氏掌之阼階東階也儺雖古禮而近於戲亦必朝服而臨之者無所不用其誠敬也或曰恐其驚先祖五祀之神欲其依已而安也此一節記夫子居鄉之事也鄉黨庾郊特牲鄉人禓孔子朝服立于阼存室神疏曰云禓是强鬼之名謂鄉人驅逐强鬼也右難漢制厲殃祀天地日月星辰四時隂陽之神以師曠配之其壇常祀以禳災兼用三代葦茭桃梗五月五日朱索五色印為門户飾以儺止惡氣通典夏后氏金行初作葦茭言氣所交也風俗通曰傳曰萑葦有叢吕氏春秋曰始得伊尹祓之於廟薰以萑葦故用葦者欲人之子孫蕃殖不失其類有如萑葦茭者交易隂陽代興之義也殷人水徳以螺首慎其閉塞使如螺也周人木徳以桃為梗梗更也言氣相更也髙帝八月祓於霸上文帝十三年詔曰祕祝之官移過於下朕甚弗取其除之十四年詔曰朕獲執犧牲珪幣以事上帝宗廟十四年於今歴日彌長以不敏不明而久撫臨天下朕甚自愧其廣増諸祀壇場珪幣昔先王逺施不求其報望祀不祈其福右賢左戚先民後已至明之極也今吾聞詞官祝釐釐福也賈誼傳受釐坐宣室是也音僖皆歸福於朕躬不為百姓朕甚媿之夫以朕之不徳而專饗獨美其福百姓不與焉是重吾不徳也其令祠官致敬無有所祈後漢仲夏之月萬物方盛日夏至隂氣萌作恐物不楙其禮以朱索連葷菜彌牟朴蠱鍾以桃印長六寸方三寸五色書文如法以施之門户三月上巳官民皆絜於東流水上曰洗濯祓除去宿垢疢為大絜絜者言陽氣布暢萬物訖出始絜之矣禊者絜也言自絜濯也先臘一日大儺譙周論語注曰儺却之也謂之逐疫漢舊儀曰顓頊氏有三子生而亡去為疫鬼一居江水是為虎一居若水是為魍魉蜮鬼一居人宫室區隅漚庾善驚人小兒月令章句曰日行北方之宿北方太隂恐為所抑故命有司大儺所以扶陽抑隂也盧植禮記注云所以逐衰而迎新其儀選中黄門子弟年十嵗以上十二以下百二十人為侲子皆赤幘皂裳執大鼗漢舊儀曰方相帥百𨽻及童女以桃弧棘矢土鼓鼓且射之以赤丸五榖播灑之譙周論語注曰以葦矢射之薛綜曰侲之言善善童㓜子也方相氏黄金四目䝉熊皮元衣朱裳執戈揚盾十二獸有衣毛角中黄門行之穴從僕射將之以逐惡鬼於禁中夜漏上水朝臣㑹侍中尚書御史謁者虎賁羽林郎將執事皆赤幘陛衛乘輿御前殿黄門令奏曰侲子備請逐疫於是中黄門倡侲子和曰甲作食􅓇胇胃食虎雄伯食魅騰簡食不祥攬諸食咎伯竒食夢强梁祖明共食磔死寄生委隨食觀錯斷食巨窮竒騰根共食蠱凡使十二神追惡凶赫女軀拉女幹節解女肉抽女肺賜女不急去後者為糧東京賦曰捎魑魅斮獮狂斬委蛇腦方良囚耕父於清泠溺女魃於神潢殘䕫魖與㒺象殪壄仲而殱游光注曰魑魅山澤之神獝狂惡鬼委蛇大如車轂方良草澤神耕父女魃皆旱鬼惡水故囚溺於水中使不能為害䕫魖罔象木石之怪壄仲㳺光兄弟八人恒在人間作怪害也孔子曰木石之怪䕫㒺两水之怪龍㒺象臣昭曰木石山怪也䕫一足越人謂山㺐㒺两山精好學人聲而迷惑人龍神物非所常見故曰怪㒺象食人一名沐膒埤蒼曰獝狂無頭鬼因作方相與十二獸儛嚾呼周徧前後省三過持炬火送疫出端門東京賦曰煌火馳而星流逐赤疫於四裔注曰煌火光逐驚走煌然火光如星馳赤疫疫鬼惡者也侲子合三行從東序上西序下也門外騶騎傳炬出宫司馬闕門門外五營騎士傳火棄雒水中東京賦注曰衛士千人在端門外五營千騎在衛士外為三部更送至雒水凡三輩逐鬼投雒水中仍上天池絶其橋梁使不復度還百官官府各以木面獸能為儺人師訖設桃梗欝櫑葦茭畢執事陛者罷山海經曰東海中有度朔山上有大桃樹蟠屈二千里其畢枝門曰東北鬼門萬鬼出入也上有二神人一曰神荼一曰欎櫑主閲領衆鬼之惡害人者執以葦索而用食虎於是黄帝法而象之敺除畢因立桃梗於門户上畫欎櫑持葦索以禦凶鬼畫虎於門當食鬼也史記曰東至於蟠木風俗通曰黄帝上古之時有神荼與欎櫑兄弟二人性能執鬼桃梗梗者更也嵗終更始受介祉也蘇秦説孟嘗君曰土偶人語桃梗今子東國之桃木削子為人虎者陽物百獸之長能擊鷙牲食魑魅者葦㦸桃杖以賜公卿將軍特侯諸侯漢宫名秩曰大将軍三公臘賜錢各三十萬牛肉二百斤粳米二百斛特侯十五萬卿十萬校尉五萬尚書丞郎各萬五千千石六百石各七千侍御史謁者議郎尚書令各五千郎官蘭臺令史三千中黄門羽林虎賁士二人共三千以為當祠門户直各隨多少受也是月也立土牛六頭於國都郡縣城外丑地以送大寒月令章句曰是月之㑹建丑丑為牛寒將極是故出其物類形象以示送逹之且以升陽魏祀五郊六宗及厲殃何晏議月令季春磔攘大儺非所以祀皇天也夫天道不諂不貳其命若之何禳之國有大故可祈於南郊至於祈禳自宜止於山川百物而已王肅云厲殃漢之淫祀耳日月有常位五帝有常典師曠自是樂祖無事於厲殃厲殃同人非禮噐雄黄等非禮飾漢文除祕祝所以稱仁明也陳留范宣曰舜有拂卯無磔雞及魏明帝大脩禳祭儀雞特禳宜之事磔雞宜起於魏卯本漢制所以輔卯金又宜魏所除也晉制每嵗朝設葦茭桃梗磔雞於宫及百寺之門以辟惡氣太始二年有司奏春分祀厲殃及禳祠詔曰不在祀典除之晉公卿以下至於庶人皆禊洛水之側東晉元帝詔罷三日弄具海西公於鍾山立流杯曲水延百僚宋省磔禳之禮而郡縣往往猶存齊以三月三日曲水㑹古禊祭也今相承為百戲之具雕弄巧飾増損無常通典説曰按禊與曲水其義参差晉趙王倫篡位三日㑹天泉池誅張林懐帝亦㑹天泉池賦詩陸機云天泉池南石溝引御溝水池西積石為禊堂跨水流杯飲酒不言曲水韓詩曰鄭國之俗三月上巳之日溱洧水之上招魂續魄秉蘭草祓除不祥蔡邕曰今三月上巳祓於水濵葢由此也凡言祓者祉也以為祈介祉也一説三月三日清明之節將脩事於水側禱祀以祈豐年也後漢杜篤云郭虞三月三日上辰産二女上巳日産一女二日産三女並不育俗以為大忌至此月巳日諱止家皆於東流水上為祈禳自潔濯謂之禊祠引流行觴遂成曲水梁劉昭曰郭虞之説良為虚誕假有庶人旬内夭其三女何足警彼風俗乎杜篤賦乃稱王侯公主暨於富商用事伊洛帷幔元黄本傳大將軍梁商亦歌泣於洛禊也馬融梁冀西第云西北戊亥元石承輸蝦蟇吐冩庚辛之域即曲水之象劉楨魯都賦曰素秋二七天漢指隅人胥祓禳國子永嬉此用七月十四日也魏孝文居文明太后喪服縗服太尉丕曰臣與尉元歴事五帝魏家故事尤諱之後三月必迎神於西禳惡於北具行吉禮自皇始以來未之或改帝曰若能以道事神不迎自至茍失仁義雖迎不來此乃平日所不當行况居喪乎北齊正月晦日中書舍人奏祓除年暮上臺東宫奏擇吉日詣殿堂貴臣與帥行事所須皆移尚書省備設齊制季冬晦選樂人子弟十嵗以上十二以下為侲子又作方相氏與窮竒祖明十二獸逐惡鬼於禁中大略如漢制皇帝常服即御座王公執事官一品已下從六品以上陪列預觀儺者鼓譟入殿西門徧於禁中出殿南門分為六道出於郭外隋制季春晦儺磔牲於宫門及城四門以禳隂氣秋分前一日禳陽氣季冬旁磔大儺亦如之其牲每門各用羝羊及雄雞一選侲子如後齊冬八隊二時儺則四隊執事十二人赤幘褠衣執皮鞭工人二十二人其一人方相氏黄金四目䝉熊皮元衣朱裳其一人為唱師着皮衣執捧鼓角各十有司預備雄雞羝羊及酒於門外為坎未明鼓譟以入方相氏執戈揚楯周呼鼓譟而出合趣顯陽門分詣諸城門將出諸祝師執事預疈牲匈磔之於門酌酒禳祝舉牲并酒埋之唐制季冬大儺及州縣儺並見開元禮大儺之禮前一日所司奏聞選人年十二以上十六以下為侲子著假面衣赤布袴褶二十四人為一隊六人作一行執事者十二人着赤幘褠衣執鞭工人二十二人其一人方相氏着假面黄金四目蒙熊皮元衣朱裳右執戈左執楯其一人為唱師着假面皮衣執捧鼓角各十合為一隊隊别鼓吹令一人大卜令一人各監所部巫師二人令以下皆服平巾幘袴褶州縣儺方相四人執戈楯唱率四人侲子都督及上州六十人中下州四十人縣皆二十人方相唱率縣皆二人皆以雜職差之其侲子取人年十五以下十三以上充之又雜職八人四人執鼓鞉四人執戈鞭今以小㦸也以逐惡鬼於禁中有司先備每門雄鷄及酒擬於宫城正門皇城門設祭大祝一人齋郎三人右校為瘞埳各於皇城門外之右方稱其事先一日之夕儺者各赴集所具其噐服依次陳布以待事諸州縣儺則前一日之夕所司帥領宿於府門外縣門亦如之其日未明諸衛依時刻勒所部屯門列仗近仗入陳於階下如常儀鼓吹令帥儺者各集於宫門外諸州縣未辨色所司白刺史縣令請引儺者入内侍詣皇帝所御殿前奏侲子備請逐疫訖出命内寺伯六人分引儺者於前長樂門永安門以次入至左右上閤鼓譟以進方相氏執戈揚楯諸州縣儺將辨色官者二人出門各執青麾引儺者入無官者外人引導於是儺擊鼓鞉俱譟呼鼓鞭戈楯而入唱率侲子和曰甲作食􅓇胇胃食疫雄伯食魅騰簡食不祥攬諸食咎伯竒食夢强梁祖明共食磔死寄生委隨食觀錯斷食巨窮竒騰根共食蠱凡使十二神追惡鬼凶赫汝軀拉汝幹節解汝肌肉抽汝肺腸汝不急去後者為糧唱率侲子以下諸州縣儺同周呼訖前後鼓譟而出諸隊各趣順天門以出分詣城門出郭而止儺者將出祝布神席當中門南向出訖宰率齋郎疈牲匈磔之神席之西藉以席北首齋郎酌酒太祝受奠之祝史持版於座右跪讀祝文諸州縣儺官者引之遍索諸室及門巷訖官者引出中門所司接引仍鼓譟而出大門外分為四部各趨四城門出郭而止初儺者入祝五人各帥執事者以酒脯各詣州門及城四門儺者出便酌酒奠脯於門右禳祝而止乃舉酒脯埋於西南酒以爵脯以籩曰維某年嵗次月朔日天子遣太祝臣姓名昭告於太隂之神立冬已謝青陽馭節惟神屛除凶厲俾無後艱謹以清酌敬薦於太隂之神尚饗訖興奠版於席乃舉牲并酒瘞於埳訖退其内寺伯導引出順天門外止諸州縣儺其祝文曰維某年嵗次月朔日子祝姓名敢昭告於太隂之神寒往暑來隂陽之常度惟神以屛凶厲謹以酒脯之奠敬祭於神尚饗宋朝之制凡水旱災異有祈報之禮祈用酒脯醢報如常祀宫觀寺院以香茶素饌詳見雩祀門太祖皇帝建隆二年六月澶濮曹絳等州蝗命長吏以牢禮祭之真宗天禧元年以蝻蟲再生分遣官禱京城宫觀寺廟仍勅諸州軍於公宇設祭四年四月以大風起西北飛沙折木晝晦數刻上遣中使詣宫觀建道場以禳之仁宗嘉祐元年正月以帝不豫設醮於大慶殿輔臣宿齋於殿廡命近臣分詣寺觀宿齋一月及遣諸州軍長吏禱嶽瀆諸祠八年五月輔臣分詣景靈宫郊廟社稷為皇帝祈福仍遣朝臣二十一人遍禱於五嶽四瀆名山勝迹英宗治平二年三月詔以彗星見開在京諸寺觀五日放士庶燒香於玊津園設醮延福宫建道場半月祈禳哲宗元祐八年以太皇太后不豫遣官禱在京宫觀寺院祠廟嶽瀆所在勅長吏就祈又遣近臣設道場於近上宫觀寺院凡七晝夜仍龍散日於中太上宫上清儲祥宫醴泉觀設醮嶽瀆亦就道場七晝夜高宗紹興七年正月一日詔朕惟两宫北狩之久痛切於中而又道君皇帝春秋益高念無以見勤誠之意可令入内内侍省差官一員前去建康府元符萬嵗宫脩建祈福道場三晝夜務令嚴潔庶稱朕心三十一年金主渝盟臣僚言竊謂陛下飭躬脩徳可勝强暴望差撥使人降祝文御香告祭沿江祠廟威靈顯著血食廟庭載於祀典者令州府分詣致禱四聖五嶽之神於宫觀設位祈禱冀䝉隂助以速萬全從之三十二年閏二月太常少卿王普言伏覩車駕廵幸視師前期遣官祈告天地宗廟社稷宫觀諸神諸陵攅宫感格響應昭彰使逆亮誅夷北騎遁去两淮無警舊疆復歸兹者回鑾臨安當行報謝之禮從之三十二年八月時孝宗已即位禮部太常寺言㸔詳酺祭事欲依紹興祀令蟲蝗為災則祭之俟得㫖本寺擇日依儀祭告其祭告之所國城西北無壇壝乞於餘杭門外西北精進寺設位行禮所差祭告官并合排辦事並依常時祭告小祀禮例在外州縣無蟲蝗為害處候得㫖令户部行下有蝗蟲處即依儀式一面差令設位祭告施行從之按太常因華禮慶歴四年六月臣僚言天下螟蝗頗為民物之害乞京師内外並修祭酺詔送禮院詳定禮院稱周禮族師春秋祭酺音歩酺為人物災害之神鄭康成云校人職有冬祭馬歩則未知此酺者蝝螟之酺歟人鬼之歩歟葢亦為壇位如雩禜云然則校人職有冬歩是與馬為害者此酺葢人物之害也漢時有蝝螟之酺神又有人鬼之歩神康成未審果從何酺故两言之歴代書史悉無祭酺儀式欲准祭馬歩儀施行壇在國城西北祭儀禮料並屬小祠乞差官就馬壇設祭稱為酺神祝文係學士院撰定若外州者即略依禜禮是嵗儀注先擇便方除地設營攅謂立表施繩以代壇其致齋行禮噐物等並如小祠上香幣以白祝文曰維某年歳次月朔日某州縣某官姓名敢昭告於酺神蝗蝝洊生害於嘉穀惟神降祐應時消殄請以清酌制幣嘉薦昭告於神尚饗淳熙十四年十月以太上皇帝聖躬違和命五嶽四瀆名山大川及祀典者所在精䖍祈禱又令宰臣以下分詣祈禱天地宗廟社稷宫觀等寧宗嘉定間以飛蝗為災行下酺祭文獻通考卷八十八
