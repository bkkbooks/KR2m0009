body:
  text: 文獻通考卷一百二十六鄱陽馬端臨貴與著王禮考二十一山陵宋宣祖安陵舊在京城東南隅太祖乾德元年改卜陵寢得地於河南府鞏縣南訾鄉鄭封村二年以宰相范質為改卜安陵使翰林學士竇儀等為儀仗使吏部尚書張昭為鹵簿使皇弟開封尹為橋道頓遞使未幾質免相以開封尹代充改卜使兼總轄五使事奉新陵皇堂下深五十尺髙三十九尺陵臺三層正方下層每面長九十尺南神門至乳臺乳臺至鵲臺皆九十五步乳臺髙二十五尺鵲臺增四尺神墻髙九尺五寸周囬四百六十步各置神門角闕有司言改卜陵寢宣祖合有哀冊及文班官各撰挽歌二首吉仗用大駕鹵簿凶仗用大升輿龍輴鵝茸纛魂車香輿銘旌哀諡冊寶車方相買道車白幰弩素信幡錢山輿黄白紙帳暖帳夏帳千味臺盤衣輿拂纛明器輿漆梓宫夷衾儀椁素翣包牲倉瓶五榖輿瓷甒瓦甒惡事詔曰特與少府同製凶器又言進元宫有鐵帳覆梓宫藉以㯶櫚褥鐵盆鐵山以燃漆燈宣祖衮冕昭憲花釵暈衣贈玉十二神當壙當野祖明祖思地軸及留陵刻漏等並望修製從之有司言按儀禮改葬緦注云服緦者臣為君也子為父也妻為夫也服緦者親尸柩不可無服緦三月而除之後魏孝明帝改葬文昭皇太后崔光上言請至尊皇太子羣臣並服緦麻既葬而除漢戴德云改葬無祖奠蓋祖奠設於柩車之前以謂為行始謂之祖爾至改葬在墓已久告遷而已今請皇帝服緦麻皇親及文武臣䕶送靈駕者皆服緦麻既葬而除不設祖奠陵所行一虞之祭宣祖諡冊諡寶在廟室中合遷置陵内其元宫内贈玉鎭圭劒佩旒冕玉寶並以珉玉藥玉製綬以青錦詔諸親羣臣先為孝明皇后制服當服以會葬安陵中玉圭劒佩玉寶等皆用于闐玉孝明孝惠陵内圭珉玉藥玉餘從其奏三月丙戌改命樞密直學士薛居正為鹵簿使啓故安陵奉安宣祖昭憲皇后孝惠皇后梓宫於幄殿癸卯靈駕發引所過州府縣鎭長吏令佐素服出城奉迎并辭皆哭四月乙卯掩元宫自發引至是皆廢朝禁京城音樂乾德四年九月命内人詣鞏縣安陵薦寒衣遂為定式自是寒食亦徃其後定制每歲春秋仲月遣太常宗正卿朝拜祖宗及后陵先齋三日牲用少牢一獻國初安陵以太牢奉肉服本品祭服唐禮具本品鹵簿乘輅後寢奉御書祝版逐陵復上起居表其儀祭日質明禮生引奉禮先升奉幣次卿詣褥位解劒脫履升奉幣跪奠訖再拜降復位次詣罍洗訖升詣神座前執爵奠酒俛伏興俟太祝讀文訖再拜降階佩劒納履復位禮生贊拜在位皆再拜詣焚版幣位東向俟焚火半退次詣諸陵奉行皆如儀後以卿闕分遣宗正寺太常禮官常參行故事十月皇后王氏崩有司言孝明孝惠皇后諡冊按禮皇后諡成於廟將來定諡訖讀於太廟然後上諡禮儀使扈䝉奏諡曰白虎通后夫人於何所諡以為於廟臣子共定諡白之於君然後加之婦人天夫故但敬之而已又唐元和中順宗皇后王氏崩縁是憲宗之母禮官遂引賤不誄貴㓜不誄長之文又云古者皇后之諡則讀之於廟言受成於祖宗也今詳后夫人者有太后有皇后若其尊卑不同不異其制則夫典禮之訓有失厥中欲請凡母后之諡則定於廟而讀之受成於祖宗乃㓜不誄長之意也皇后之諡取天夫之義自君之命也可今請孝明皇后諡號俟百官議定制下後行冊之前命官告太廟告訖上於靈座從之開寶九年帝幸西京至鞏縣親謁安陵奠獻號慟久之左右皆泣下會要漢儀乘輿謁陵太官上食太常薦樂舞如吉祭國朝謁陵皆輟樂舉哭素服行事故列於凶禮是年十月太祖崩卜葬以翰林學士杜彦圭為山陵按行使齊王廷美為山陵使兼橋道頓遞又有禮儀鹵簿儀仗使皆以侍官為之次年三月奉冊寶告於南郊讀於靈座前四月啓攢宫上與羣臣皆服如初喪朝晡臨易常服出宫城發引上親啓奠祖奠出詣明德門外行遣奠之禮讀哀冊又詣大升輿前哭盡哀再拜奉辭釋縗還宫靈駕發至都城外百官奉辭訖凶仗如安陵進增輼輬車及神帛肩輿鹵簿三千五百三十九人乙卯葬永昌陵在河南鞏縣附宣祖永安陵己未神主將至羣臣出都城奉迎安於大明殿自啓攢前三日至奉安神主皆廢朝五月己卯祔廟亦廢朝仍禁京城音樂十月崩次年四月葬至道三年三月太宗崩以雍王元份為山陵使餘四使及按行使副如前制有司言大駕鹵簿萬八千九百三十六人全用其數慮山塗近隘車騎塡委望加裁定詔用其半皇堂深百尺方廣八十尺陵臺方二百五十尺置守陵户五百人作殿以設聖容朝暮上食四時祭享十月丁酉靈駕發引以太宗好玩弓劒筆硯琴碁之屬列於仗内僧道威儀奉引繪聖容三冠服一常服設輦殿置仗中有司言發引畢皇帝當改御吉服上不忍止以縗服還宫乙酉葬永熙陵甲寅神主至奉安於含光殿上服鞾袍歩出殿門迎拜鳴咽流涕前導神主至殿階下羣臣就列安神畢拜奠而退十一月祔廟上服鞾袍前導神主由西上閤門出乾元門外奉辭餘如永昌陵之儀三月崩十月葬元德皇后李氏眞宗生母以至道三年十月追尊先殯於普安禪院咸平元年議改卜園陵二年命使按行園陵地議立陵名禮官言周顯德末都省集議故事帝后同陵謂之合葬同塋謂之附葬漢吕氏陵在長陵西百餘步以同塋兆而無名號又唐穆宗二后王氏生恭宗蕭氏生文宗並附葬完陵之側今園陵鵲臺在永熙陵封地之内恐不須别建陵號從之景德三年皇太后李氏崩四月司天監言奉詔集衆官以諸家葬書選定園陵年月今歲甲辰年分未到宜用閏九月二十三日權攢於壬地其修陵至丙年始吉詔禮官詳定上奏曰伏以宗廟之儀享祀為大若三年不祭則闕孰甚焉再三詢問日官復有論列安敢以禮官博士之議拒馮相保章之說況事繫園陵理務便宜今參詳喪葬之議古有變禮合祔自乎姬旦始墨由乎晉襄書之簡編亦無譏議禮云葬者藏也欲人之不得見也既不欲穿壙動土則莫若就司天所擇之地依葬訖王后之殯居棺以龍輴欑木題湊䝉槨上四注如屋以覆蓋盡塗之如今埋重如不欲入土則至時焚之如此則是用攢禮而存葬名所冀粗合經典便可行虞祭升祔神主祭享宗廟宰相請依禮官之議詔可景德三年八月詔以來春朝拜諸陵凡百費用以官物充增修館驛以備行宫從臣百司儲擬供御並從省約諸司需索非有勅命州縣不得供給道路不得廣役夫丁修治鄰近州府長吏不得擅離本任赴行在諸道不得以進奉為名科配起居表章附廐置以聞宰臣王旦言行宫損壊要須修葺上曰此亦勞民所至但飭州縣廨舍處之百司非有司事祗應不令扈從九月一日太常禮院言朝陵準故事合排小駕鹵簿唐貞觀中太宗朝獻陵宿設黄麾仗周衛陵寢今請逐陵寢並周設黄麾仗又古之記事必書方冊方即今祝版也方則燔之冊則藏於其室唐制前一日陵令以玉冊進御親書近臣奉出陵令受之今請酌中造竹冊四副祝畢焚之又舊設百官位於陵所從祝官及皇親并客使分於神道左右貞觀中並陪列於司馬門内今望凖舊儀施行又舊儀詣寢宫到大次之時設百官位奏請行禮今望令預先入赴寢殿立班又貞觀中皇帝至小次素服乘馬檢會今年正月内車駕朝拜明德攢宮止特服素白之衣當時皇帝在大祥之内今既服除拜陵望止服淡黄袍又按貞觀永徽故事朝陵皆先親後尊拜辭訖出還大次便進發今望凖故事先朝永熙陵又儀注每至陵奏請行事及辭皇帝皆兩次再拜陪位官每陵亦各兩次再拜今請皇帝詣安陵參辭四度再拜永昌永熙陵各兩度設拜舊儀逐寢殿上食備太牢之饌珍饈庶品近禮以羊豕代太牢今請備少牢之祭設奠讀冊畢復詣寢宫上珍饈庶品别行致奠之禮又舊儀前發二日太尉告太廟今請依禮徧告六室詔特服素白衣行事次序如告太廟餘悉依所請十一月詔三陵陪葬皇子皇孫公主之未出閤者及諸王夫人之蚤亡將來朝拜日並令有司隨尊卑各設位於諸陵下宮之東序以致祭焉凡陪葬子孫安陵一百二十一墳量設三十位男子女子共祝版二永昌陵十五墳量設十位祝版一永熙陵八墳量設五位祝版一四年正月二十一日車駕進發幸鞏縣朝陵二十六日次鞏縣帝以諸陵密邇罷鳴鞭及太常奏嚴金吾傳呼二十八日帝乘馬發行宫至中路頓進蔬膳是夕齋於永安鎭之行宫二十九日夜漏未盡三鼓帝乘馬却輿輦繖至安陵外易素服步入司馬門行奠獻之禮次詣永昌陵永熙陵又詣下宫凡上宫用牲牢冊祝有司奉事下宫備膳饈内臣執事用家人禮百官皆陪位又詣元德皇太后陵奠獻又於陵西南設幄殿祭如下宫禮帝每至陵寢望門而哭禮畢徧詣孝明孝惠孝章懿德明德淑德皇后又至懐皇后陵遂單騎以内臣從廵視陵闕及親奠䕫王岐王恭孝太子鄭王安王周王諸墳辰後暫至幄次更衣復詣諸陵奉辭初有司以朝拜無奉辭之禮帝感慕哀切未忍遽去故復徃焉至午而還左右進繖帝以陵闕在望却之度昭應水許進焉至行宫始御常膳仍遣官祭一品墳皇親諸親冢大中祥符三年詔將來祀汾隂還時朝拜諸陵大畧如景德四年之禮乾興元年二月眞宗崩以宰相為山陵使餘如舊制六月參知政事王曾言奉詔按視出陵定皇堂之制深八十一尺上方百四十尺宰相等請以前後所降天書置陵中十月己酉葬永定陵自啓攢至祔廟如舊禮内侍雷允恭為山陵都監司天邢中和為允恭言今山陵上百步法宜子孫類汝州秦王墳允恭曰如此何故不就中和曰恐下有石并水耳允恭曰先帝獨有上無他子若如秦王墳何故不用中和曰山陵事重踏行覆按動經日月恐不及七月之期耳允恭曰第移就上穴我走馬入見太后言之安有不從允恭素貴横人不敢違即改穿上穴及允恭入白太后太后曰此大事何輕易如此出與山陵使議可否允恭見丁謂言之謂亦知其非而重違允恭唯唯而已允恭乃入奏太后曰山陵使無異議矣既而上穴果有石石盡水出王曾以謂擅易陵地意有不善密奏之太后大驚乃誅允恭謂貶崖州司户始丁謂請名陵曰鎭陵及謂貶馮拯謂三陵皆有永字故易曰永定陵然永安乃永安縣名也宣祖陵止名安陵又不知翼祖已名定陵於是復追改翼祖陵為靖陵議者譏拯不學當時無正之者景祐初滄州觀察使守節言寒食節例遣宗室拜陵而十月令内司賓徃非所以致恭乃詔宗室正刺史以上一員朝拜罷永定薦納之非禮者四年減桓子户安陵永昌永熙各留四户永定五十户會聖宫十户嘉祐八年三月晦仁宗崩發諸路卒四萬六千七百八十人修奉山陵學士王珪言古者賤不誄貴㓜不誄長禮天子稱天以誄之近制惟詞臣撰議即降詔命頗違稱天之義欲稽典禮集中書門下御史臺五品以上庶僚於南郊告天議定然後連奏以聞詔從之遂為定制十月甲辰葬永昭陵庚子虞丙午祔初永安縣官月朔朝定陵望朝三陵韓琦言昭陵未有朝日乃令縣官朔望分朝諸陵治平四年正月英宗崩遺詔山陵務從省約所歴郡縣無科率煩民八月癸酉葬永厚陵禮如舊制元豐八年三月神宗崩十月乙酉葬永裕陵紹聖元年四月太史請徙去永裕陵禁山民墳一千三百餘以便國音帝曰徙墓得無擾乎若無所害則勿令徙果不便國音當給官錢以資葬費元符三年春正月哲宗崩七月壬寅葬永㤗陵諸陵儀制治平四年永厚陵置使副使二增募奉先軍一指揮昭陵東南禁地占民田者優買償之熙寧五年建昭孝院奉永昭永厚陵以官田給始詔文臣兩省武臣閤門使以上道陵下聽朝謁故事嵗遣朝陵官自宣祖至眞宗章惠皇后總以太常宗正卿二人其餘九陵則通遣郎中或清望官二人分詣太常宗正卿闕以尚書省四品兩省五品以上或大卿監充又闕遣以次官獨永定陵輪宗寺及太常禮院官一人春秋朝享因之檢察陵事以陵臺令陪位若非時祭則遣陞朝官其永厚陵凖永定陵故事應諸陵奉祀牙床什器各以東闕庭藏之元豐二年詔增陵園地為七十有五歩以應生火中五十之數禁昭陵東北山口路勿耕鑿中有民田則給其直或易以官地舊以兆域南地十頃有畸資官費而監䕶官循習以為圭田帝詔曰陵寢重事今守吏不法如此不可不深加懲治其選强毅官劾治以聞初永熙陵之艮巽方築隄以鎭土至是因日官有請乃命為隄於永厚陵及濮園之東行鎭土法各於其方以珍寶玉為獸瘞之詔朝陵官非嘗任執政事止奠獻薦新其勿進湯特拜應諸陵官物皆籍二年一遣官檢察陵臺令通治陵事𨽻太常寺仍專按視陵域或内外林木歲以數申寺其典領官月一出所藏衣冠及應供奉之物以時展閲暴凉六年太常博士何洵直言自秦漢即陵為寢有事生之具今祠陵官具牲牢爼豆以祭服行禮而朝獻景靈宫純用時王之制陵寢義當一體其朝陵薦牙盤食獻官止以常服六陵下宫及會聖宫門各視廟社宫門立㦸二十四皆從之復詔朝陵自今各遣官太常寺輪長貳餘以宗室遙郡防禦使永安陵下宫之南令加舊地十步三尺仍視其制度增修厚陵其永昌永熙陵亦繕治之陵官輙離陵所以擅去官守法論若宫人朝陵毋以伎樂迎送昭陵下宫帝后同幄薦獻安陵以合祔及昌熙定陵悉無諸后神像長至元正清明節帝后異宫酌獻上食皆不豫饗七年因何洵直之請乃命各設后位遂選官定薦獻供奉式焉髙宗建炎元年五月一日赦應永安軍祖宗陵寢西京應天禪院會聖宫影殿西墳可差西京留守及臺官一員日下前去躬親省視如合修奉去處一面措置仍密具奏聞南墳委汝州守臣依此又詔河南府鎭撫使翟興團結本處義兵保䕶祖宗陵寢紹興元年四月隆祐太后孟氏崩遺詔擇近地權殯俟息兵歸葬園陵棺取周身勿拘舊制以為他日遷奉之便六月殯於越州會稽縣上亭鄉上許里諡曰昭慈獻烈攢宫方百步下宫深一丈五尺明器止用鉛錫置都監廵檢各一員衛卒百人生日忌辰旦望節序排辦如天章閣之儀以香火院為㤗寧寺虞主還温州於温州行祔廟之禮二年知紹興府張守言頃嘗備位政府今叨領藩符伏覩昭慈獻烈皇后攢宫近在本府界望許臣攢宫朝謁從之自是守臣皆從其請三年禮部太常寺言春秋二仲薦獻諸陵禮於行在法惠寺設位行望祭禮從之自此每歲薦獻率循此例紹興七年正月道君皇帝寧德皇后凶問至上舉哀成服命王倫為奉迎梓宫使六月宰臣張浚等詣南郊請諡廟號徽宗閏十月户部尚書章誼等言梓宫未還久廢諡冊之禮不行請依景德元年明德皇后故事行理重虞祭祔廟之禮及依嘉祐八年治平四年虞祭畢而後卒哭而後祔廟仍於小祥前卜日行之異時梓宫至宜遵用安陵故事行改葬之禮更不立虞主從之九年正月太常寺言徽宗及顯肅皇后將及大祥雖未置皇堂若不先建陵名則春秋二仲有妨薦獻請先命宰臣上陵名宰臣秦檜等請上陵名曰永固詔恭依是年以金人歸河南地命大宗丞士㒟兵部侍郎張燾祗謁陵寢二人至西京朝拜陵寢民夾道驤迎遂入栢城披荆履蘖隨宜葺之而去及還奏言諸陵下澗水自兵興以來涸竭幾十五年二使到日水即大至父老驚嘆以為中興之祥上問諸陵寢如何燾不對惟言萬世不可忘此讐上為之黯然時方庭實為三京淮北宣諭使至西京先朝謁陵寢見永昌而下皆遇驚犯泰陵至暴露庭實觧衣覆之歸日痛哭流涕為上言之由是大忤秦檜十月禮部言永安軍等處今已收復委知軍詣諸陵逐位檢視除永定永昭永厚永裕永泰陵園内並無損動内永安永昌永熙陵神臺􅪤列損枳橘栢株木未敢一面擅行補飾合就差所委修飾官奏告行禮詔令河南府委官如法補飾不得滅裂十二年四月禮部太常等言徽宗皇帝顯肅皇后梓宫至宜權設龍德宫以備安奉迎見梓宫皇帝及百官宜依永安陵改葬故事從之詔侍從臺諫禮官修奉陵寢或攢宫工部尚書莫將等請依景德元年明德皇后權攢故事修奉攢宫詔恭依八月車駕詣臨平鎭迎奉二梓宫九月發引十月掩攢在昭慈攢宫西北五十歩用地二百五十畝十三年改陵名曰永祐朝野雜記徽宗初葬五國城後七年金人乃以梓宫還行在梓宫將至上服黄袍乘輦詣臨平奉迎登舟易緦服百官皆如之既至行在寓於龍德别宫以故待漏院為之行在宫南門外之東帝后異殿先是選人楊煒獻書於執政李光以梓宫可還眞偽未辨左宣義郎王之道亦貽書諫官曾統奏乞命大臣取神襯之最下者斵而視之然後奉安既而禮官請用安陵故事梓宫入境即承之以槨有司預製衮冕輦衣以徃至則納槨中不改歛又曰徽宗梓宫將還宰相秦檜白令侍從臺諫禮官赴尚書省集議靈駕既還當崇奉陵寢或稱攢宫禮部員外郎眉山程敦厚希檜意獨上奏言仍攢宫之舊稱則莫能示通和之大信而用因山之正典則若亡存本之後圖臣以為宜勿徇虛名而當示大信於是議者工部尚書莫將等乃言太史稱歲中不利大葬請用明德皇后故事權攢許之議狀逺引明德而近捨昭慈似有所避也其後髙宗遺誥亦稱攢迄今遂循故事又曰永祐之權攢也宰相秦檜不欲行乃命信安孟王忠厚以樞密使為之及營思陵備置五使遂命右相周益公掩攢宫從所請也時左相王季海以母老惡凶事故不欲行然陵成而王卒罷永阜之役既命左相留仲至未葬而仲至逐右相趙子直亦不欲行乃以少傅保寧軍節度使郭師禹為總䕶使而命參知政事余處恭持節道梓宫既葬師禹封永寜郡王子直遂得罪慶元末永崇陵將復土右相謝子肅亦不行乃命平原王韓侂胄焉山陵非宰相䕶送遂為故事十三年十月禮部太常等言將来郊祀禮畢合奏謝諸陵昭慈聖獻皇后攢宫永祐陵攢宫已差官行禮内諸陵權於臨安府法惠寺設位望祭差南班宗室二員行禮從之二十年正月臣僚言陵廟之祭月有薦新永祐諸陵缺而未議望令有司討論舉行其新物令逐宫預行關報紹興府排辦從之三十一年淵聖皇帝凶問至以六月舉哀成服七月宰相陳康伯等率百官謁南郊請諡廟號欽宗其餘並如徽宗典禮建炎以來朝野雜記欽宗之喪舉哀於天章閣南以學士院為几筵殿遙上陵名曰永獻暨乾道中朝廷遣使求陵寢地金人許以遷奉且并歸靖康梓宫朝廷難之金人乃以禮陪葬於鞏縣云顯仁皇太后韋氏崩祔於永祐陵攢宫詔兩攢宫禁地内有遷士庶墳冢屋宇及收買士庶田産山林地叚專委守臣同檢察宫陵所攢置告諭先估實直倍數支還取人户收領毋令人吏乞覔騷擾殿中侍御史汪澈言竊惟攢宫之地舊占百步去冬新立四隅回環不啻二十里居民悉已遷徙屋廬悉已毁撤寸土尺木率居於官今皆為禁地而士庶丘墓錯雜其中陰陽家流或謂盡宜挑去以肅靜陵域且有内將外從天柱門三男方位之說或謂暫為攢宫不必挑去是故上貽聖慮命臣躬親前去看定臣遵奉睿訓周視四隅見得士庶墳冢元計九百三十八穴除近已挑去一百七十二穴外有七百六十六穴見存竊以攢宫經今三十餘年無有議其非者今二十里之内乃云盡合挑移始有紛紛之論太史局各守其說皆虛誕浮誣不可取信臣請以史傳及祖宗故事明之秦樗里子死葬於渭南章臺之東曰後百歲是當有天子之宫夾我墓至漢興長樂宫在其東未央宫在其西武庫正直其墓且以天子之宫密近而當時不聞遷其墓也以今觀之一百七十二穴業已挑去而築實之無可柰何而見存七百六十六穴纍纍相望雖山林掩蔽皆在禁地若一旦悉令挑去恐頓泄地氣兼於人情有所未安欲下紹興府專委守臣出榜備坐宫陵制内所載曉諭民間如對界内舊墳有願遷出仰召保聞說經府自陳令廵尉監視聽其遷出如不願者仍舊從之孝宗乾道六年以起居郎范成大為祈請使之北請陵寢地先時上賜宰臣陳俊卿手札曰朕痛念祖宗陵寢淪於異域四十餘年今欲特遣范使就彼祈請卿以為如何可密奏來俊卿以為未可坐罷相知福州乃遣成大行令學士院草國書以陵寢所在欲求河南地為辭成大將行祕書少監李燾等皆不以為然國子博士丘宗山輪對論其無益啓侮上不樂曰卿家祖先墳墓為人占據莫亦須理會否答云臣但能訴之不能告之上赫怒成大既出疆使還其國書云和約再成界山河以如舊緘音遽至指鞏洛以為言援曩時無用之文瀆今日既盟之好既云廢祀欲伸追逺之懐止可奉遷即俟刻期之報至若未歸之旅柩亦當並發於行塗明年遣趙惟賀金主生辰復附國書畧曰惟列聖久安之陵寢既難一旦而驟遷則靖康未返之衣冠豈敢先期而獨請其後金人徙葬欽宗於鞏原而荆襄諜報乃謂金以十萬騎奉遷陵寢以來中外洶洶邊帥咸請增戍後卒無事淳熙十四年髙宗崩宰相王淮等上陵名曰永思詔攢宫遵遺誥務從儉約凡修營百費並從内庫及封樁錢物毋侵有司經常之費諸路監司州軍府監止進慰表其餘禮並免仍不得以進奉攢宫為名有所貢獻按行使蕭燧等言相視到大行太上皇帝神穴地叚係在徽宗皇帝攢殿籬圍之外正西北顯仁皇后攢殿近上正西向南乞差官覆按施行詔户部侍郎葉翥充覆按使紹熙五年孝宗崩宰相趙汝愚等上陵名曰永阜詔於永思陵下宫之西修蓋攢宫建炎以來朝野雜記紹興初六飛駐越昭慈聖獻皇后上賓因卜地權殯於會稽上皇村蓋便於修奉也及卜祐陵遂就其側併舉顯肅憲節二后祔焉顯仁髙宗繼從其兆則廹隘已甚矣髙宗之葬也趙子直時守蜀手疏論會稽攢宫淺薄可為深憂宜復祖宗山陵之制朝論不從於是自昭慈之西連用五穴山勢漸逺其地愈卑矣孝宗將殯子直為樞密使建議以攢宫本非永制實居淺土蔽以上宫初期克復神京奉遷神駕雖其志甚美而其事實難且死者無終極國家有廢興豈宜徒徇虛名以基實禍識者深以為然時日官荆大聲已卜地思陵之傍開深五尺下有泉石近例神穴深九尺按行使趙德老以為土肉淺薄不可用子直乞改卜意欲以中軍寨為之而宰相留仲至以為不然於是德老與覆按使謝子肅附其說乃命大聲改卜於新穴之東視新穴纔髙一尺一寸五分而已孫從之為覆按使還言當少寛時日别求吉兆而内廷左右以上久居喪次内外不便皆主速葬之說乃詔侍從臺諫限三日集議議者皆言神穴未安自合展期改卜况朝廷禮文何嘗盡循古制豈必拘七月之期奏劉德修所草也朱晦翁時在經筵復上奏論臺史國音之說不可信又言今穴視前穴髙一尺一寸五分則是開至六尺一寸五分即與舊穴五尺之下有水石處髙低齊等如何却可開至九尺而其下二尺八寸五分者無水石邪臣自南來經由嚴州及富陽縣其江山之勝雄偉非常說者又言臨安縣乃錢氏故鄉山川形勢寛平䆳密此必有佳處可用而臣未之見也竊見近年地理出於江西福建為尤盛望下兩路帥臣監司疾速搜訪量給路費多差人兵轎馬津遣赴闕令於近甸廣行相視或謂晦翁之意似屬蔡元定季通也所謂國音者蓋近世庸妄之說以五音盡類羣姓而謂冡地向背各有其宜以國姓論之必當用離山坐南向北之地晦翁謂以禮而言則死者北首若以術言則凡擇地者必論主勢之强弱風氣之聚散水土之淺深穴道之偏正力量之全否然後可以較其地之美惡政使實有國音之説亦必先此五者以得形勝之地然後其術可得而推若曰其法果驗不可改易則洛越諸陵無不坐南向北固已合於國音矣又何吉之少而凶之多邪疏入不報其後卒定永阜攢陵於會稽子直請如故事建陵臺同列又以後喪踰前喪而止故崇陵亦因之若成穆成恭二后則先葬於赤山慈懿皇后則殯於南山淨慈寺慶元六年光宗崩丞相謝深甫等上陵名曰永崇按行使副韓邈黄鑑言判太史局荆大聲等相視得大行太上皇帝神穴係在永阜陵西永思陵下宫閑地叚委是國音王氣聚秀之地依得尊卑次序可以安建既而差官覆按從之開禧三年成肅太后崩於永阜陵正北祔殯吏部尚書陸峻等言伏覩列聖在御間有諸后上仙縁無山陵可祔是致别葬若上仙在山陵已卜之後無有不從葬者其他諸后葬在山陵之前有神靈既安並不遷祔惟元德章懿二后方其葬時名位未正續行追冊其成穆皇后孝宗登極即行追冊改殯所為攢宫典禮已備與章懿二后事體不同所以更不遷祔竊稽前件典禮秪縁喪有前後勢所當然其於禮意却無隆殺今來太皇太后上仙從葬阜陵依得上件典故從之成穆孝宗正妃未登位薨成肅孝宗繼妃登位後立為后文獻通考卷一百二十六
