body:
  text: 文獻通考卷二百十一鄱陽馬端臨貴與著經籍考三十八子道家漢藝文志曰道者秉要執本清虛以自守卑弱以自持此君人南靣之術也合於堯之克讓易之謙謙一謙而四益此其所長也及放者為之則欲絶去禮學兼棄仁義曰獨任清虚可以為法隋經籍志曰自黄帝而下聖哲之士所言道者傳之其人世無師説漢時曹參始薦盖公能言黄老文帝宗之自是相傳道學衆矣下士為之不推其本茍以異俗為髙狂狷為尚迂誕譎怪而失其真漢志三十七家九百九十三篇隋志七十八部合五百二十五卷唐志七十七家八十四部一千有四卷宋三朝志四十三部二百五十卷宋兩朝志八部十五卷宋四朝志九部三十二卷宋中興志四十七家五十二部一百八十七卷鬻子一卷鼂氏曰楚鬻熊撰按漢志云為周師自文王以下問焉周封為楚祖凡二十二篇今存者十四篇唐逢行珪注永徽中上於朝叙稱見文王時行年九十而書載周公封康叔事盖著書時百餘嵗矣石林葉氏曰世傳鬻子一卷出祖無擇家漢藝文志本二十二篇載之道家鬻熊文王所師不知何以名道家而小說家亦别出十九卷亦莫知孰是又何以名小説今一卷止十四篇本唐永徽中逢行珪所獻其文大畧古人著書不應爾廖仲容子抄云六篇馬總意林亦然其所載辭畧與行珪先後差不倫恐行珪書或有附益云巽岩李氏曰藝文志二十六篇今十四篇崇文總目以為其八篇亡特存此十四篇耳某謂劉向父子及班固所著録者或有他本此盖後世所依託也熊既年九十始遇文王胡乃尚說三監曲阜時何邪又文多殘闕卷第與目篇皆錯亂甚者㡬不可曉而注尤謬誤然不敢以意刪定姑存之以俟考高氏子畧曰魏相奏記載霍光曰文王見鬻子年九十餘文王曰噫老矣鬻子曰君若使臣捕虎逐麛臣已老矣若使坐䇿國事臣年尚少文王善之遂以為師今觀其書則曰發政施仁謂之道上下相親謂之和不求而得謂之信除天下之害謂之仁其所以啓文王者決矣其與太公之遇文王有相合者太公之言曰君有六守仁義忠信勇謀又曰鷙鳥將擊卑飛翩翼虎狼將擊弭耳俯伏聖人將動必有愚色尤決於啓文王者矣非二公之言殊相經緯然其書辭意大畧淆雜若大誥洛誥之所以為書者是亦漢儒之所綴輯者乎太公又曰天下非一人之天下天下之天下也竒矣藝文志敘鬻子名熊著書二十二篇今一卷六篇唐貞元間栁伯存甞言子書起於鬻熊此語亦佳因錄之永徽中逢行珪為之序曰漢志所載六篇此本凡十四篇予家所𫝊乃十有二篇陳氏曰漢志云二十二篇今書十五篇陸佃農師所校唐鄭縣尉逢行珪注止十四篇盖中間以二章合而為一故視陸本又少一篇此書甲乙篇次皆不可曉二本前後亦不同姑兩存之老子道徳經二卷鼂氏曰李耳撰以周平王四十二年授關尹喜凡五千七百四十有八言八十一章言道德之㫖予甞學焉通其大㫖而悲之盖不幸居亂世憂懼者所為之書乎不然何其求全之甚也古之君子應世也或知或愚或勇或怯惟其當之為貴初不滯於一曲也至於成敗生死則以為有命非人力所能及不用智於其間以求全特隨其所遇而處之以道耳是以臨禍福得喪而未甞有憂懼之心焉今耳之書則不然畏明之易暗故守以昏畏寵之必失故不辭辱畏剛之折則致柔畏直之挫則致曲畏厚亡也則不敢多蔵畏盈溢也則不如其已既貴矣畏其咎故退功成矣畏其去故不居凡所以知䧺守雌知白守黒以懦弱謙下為道者其意盖曰不如是則將不免於咎矣由此觀之豈非所謂求全也哉嗟夫人惟有意於求全故中懐憂懼先事以謀而有所不敢為有所不敢為則其蔽大矣此老子之學所以雖深約博大不免卒列於百家而不為天下逹道歟以諸家本參校其不同者近二百字互有得失乙者五字注者五十五字塗者三十八字其間徽宗御注最異諸本云天下柔弱莫過於水而攻堅强者莫之能勝以其無能易之而御注作天下莫柔弱於水而攻堅强者莫之能先以其無以易之也諸本云恬淡為上勝而不美而美之者是樂殺人者不可得志於天下矣吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之御注作恬淡為上故不美也若美必樂之樂之者是樂殺人也夫樂殺人也不可得志於天下者故吉事尚左凶事尚右偏將軍處左上將軍處右言居上則以喪禮處之其不同如此朱子語録曰老子之術須自家占得十分穏便方肯做纔有一毫與已不便便不肯做老子術冲嗇不肯役精神問先儒論老子多為之出脱云老子乃矯時之説以某觀之不是矯時只是不見實理故不知禮樂刑政之所出而欲去之曰使渠識得寂然不動感而遂通天下之故自不應如此他本不知下一莭欲占一簡徑言之然上節無實見故亦不脱灑老子之學只要退歩柔伏不與你爭纔有一毫主張計較思慮之心這氣便粗了故曰致虛極守靜篤又曰專氣致柔能如嬰兒乎又曰知其雄守其雌為天下谿知其白守其黒為天下谷所謂谿所謂谷只是低下處讓爾在髙處他只要在卑下處全不與爾爭他這工夫極難常見畫本老子便是這般氣象笑嘻嘻地便是箇退歩占便宜底人雖未必肖他然亦是他氣象也只是他放出無狀來便不可當如曰以正治國以竒用兵以無事取天下他取天下便是用此道如子房之術全是如此嶢闗之戰啗秦將以利與之連和即回兵殺之與項羽約和已講解了即勸髙祖追之漢家始終治天下全是得此術至武帝盡發出來便郎當子房閑時不做聲氣莫教他説一話更不可當少年也任俠殺人後來因黄石公教得來較細只是都使人不疑他此其所以乖也老子説話只是欲退歩占姦不要與事物接如治人事天莫若嗇廹而後動不得已而後起皆是這意思故為其學者多流於術數如申韓之徒是也其後則兵家亦祖其説如隂符經之𩔖是也陳氏曰昔人言諡曰聃故世稱老聃然聃之為訓耳漫無輪也似不得為諡河上公注老子二卷鼂氏曰太史公言河上丈人通老子再傳而至盖公盖公即齊相曹參師也而晉葛洪曰河上公者莫知其姓名漢孝文時居河之濵侍郎裴楷言其通老子孝文詣問之即授素書道經章句兩説不同當從太史公也其書頗言吐故納新按摩導引之術近神仙家劉子元稱其非真殆以此歟傅奕謂常善救人故無棄人常善救物故無棄物四句古本無有獨得於公耳老子指歸十三卷鼂氏曰漢嚴遵君平撰谷神子注其章句頗與諸本不同如以曲則全章末十七字為後章首之𩔖按唐志有嚴遵指歸四十卷馮廓注指歸十三卷此本卷數與廓注題谷神子而不顯名姓疑即廓也老子畧論一卷鼂氏曰魏王弼撰凡十有八章景迂云弼有得於老子而無得於易注易資於老子而老子論無資於易則其淺深之效可見矣陳氏曰魏晉之世元學盛行弼之談元冠於流輩故其注易亦多元義鼂以道言弼注易亦假老子之㫖世所行老子分道徳經為上下卷此本道徳經且無章目當是古本明皇老子注二卷疏一卷鼂氏曰唐元宗撰天寳中加號元邁道徳經世不稱焉又頗増其詞如而貴食母作兒貴求合於母之𩔖貴食母者嬰兒未孩之義諸侯之子以大夫妻為食母増之贅矣三十家注老子八卷鼂氏曰唐蜀郡岷山道士張君相集河上公嚴遵王弼何晏郭象鍾㑹孫登羊祜羅什盧裕劉仁㑹顧歡陶隠居松靈仙人裴處思杜弼節解張憑張嗣臧元靜大孟小孟竇略宋文明褚糅劉進喜蔡子晃成元英車惠弼等注君相稱三十家而列其名止二十有九盖君相自以為一家言并數之耳君相不知何時人而謂成元英為皇朝道士則唐天寳後人也以絶學無憂一句附絶聖棄知章末以唯之與阿别為一章與諸本不同道徳經傳四卷崇文總目唐陸希聲撰傳疏道徳二經義道徳經廣聖義三十卷崇文總目唐杜光庭撰以明皇注疏演其義道徳經疏二卷崇文總目不著撰人名氏集河上公葛仙翁鄭思逺唐睿宗明皇諸家注序其自疏道徳經疏節解上下各二卷崇文總目偽蜀喬諷撰諷仕偽蜀為諫議大夫知制誥奉詔以唐明皇注疏杜光庭義綴其要附以已意解釋之道徳經小解二卷崇文總目不著撰人名氏注解道徳經義道徳經譜二卷崇文總目道士扶小明撰不詳何代人以道徳經章句略為義訓老子道徳經論著二卷鼂氏曰皇朝司馬光撰光意謂太史公曰老子著書言道徳之意後人以其篇首之文名上篇曰道下篇曰徳夫道徳連體不可偏舉故廢道經徳經之名而曰道徳論墓誌載其目無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼皆於無與有下斷句不與先儒同王介甫注老子二卷王雱注二卷呂惠卿注二卷陸佃注二卷劉仲平注二卷鼂氏曰王介甫平生最喜老子故解釋最所致意首章皆斷有無作一讀與温公同後其子雱及其徒呂惠卿陸佃劉仲平皆有老子注呂氏老子注二卷鼂氏曰皇朝呂大臨撰其意以老氏之學合有無謂之元以為道之所由出盖至於命矣其言道體非獨智之見孰能臻此求之終篇膠於聖人者盖寡但不當以聖智仁義為可絶棄耳蘓子由注老子二卷鼂氏曰皇朝蘇轍子由注子由謫官筠州頗與學浮屠者游而有所得焉於是解老子甞曰中庸云喜怒哀樂未發謂之中發而皆中節謂之和致中和天地位焉萬物育焉此盖佛法也六祖謂不思善不思惡則喜怒哀樂之未發也盖中者佛法之異名而和者六度萬行之總目致中極和而天地萬物生於其間非佛法何以當之天下無二道而所以治人則異古之聖人忠信行道而不毁世法以此耳故解老子亦時有與佛法合者其自序云爾其解是謂襲明以為釋氏傳燈之𩔖陳氏曰東坡䟦曰使戰國有此書則無商鞅韓非使漢初有此書則孔老為一使晉宋間有此書則佛老不為二朱子雜學辯曰蘓侍郎晩著此書合吾儒於老子以為未足又并釋氏而彌縫之可謂舛矣然其自許甚髙至謂當世無一人可與語此者而其兄東坡公亦以為不意晩年見此竒特以予觀之其可謂無忌憚者歟因與之辯而或者謂蘇氏兄弟以文義贊佛乘盖未得其所謂如傳燈録解之屬其失又有甚焉不但此書為可辯也應之曰予之所病病其學儒之失而流於異端不病其學佛未至而溺於文義也其不得已而論此豈好辯哉誠懼其亂吾學之傳而失人心之正爾若求諸彼而不得其説則予又何暇知焉御注老子二卷鼂氏曰徽宗御撰或曰鄭居中視草未詳劉巨濟注老子二卷鼂氏曰皇朝劉涇巨濟注涇蜀人篤志於學文詞竒偉早登蘇子瞻之門晩受知蔡京除太學博士老子解二卷陳氏曰葉夢得撰其説曰孔子稱竊比於我老彭孟子闢楊墨而不及老氏老氏之書孔孟所不廢也所解生之徒十有三死之徒十有三以為四支九竅本韓非子解老之説易老通言十卷陳氏曰程太昌撰其序言多為訓老而實該故曰易老通言易在而六經皆在矣盖以易為六經之首也李暹注文子十二卷鼂氏曰右李暹注其傳曰姓辛葵丘濮上人號曰計然范蠡師事之本受業於老子録其遺言為十二篇云按劉向録文子九篇而已唐志録暹注與今篇次同豈暹析之歟顔籕以其與孔子並時而稱周平王問疑依託者然三代之書經秦火幸而存者其錯亂參差𩔖如此爾雅周公作也而有張仲孝友列子鄭穆公時人而有子陽餽粟是也李暹師事僧般若流支盖元魏人也河東栁氏辯文子曰文子書十二篇其傳曰老子弟子唐有徐靈府注又有李暹注訓或謂其書錄老子遺言其辭有若可取其㫖意皆本老子然考其書孝即考字盖駮書也其渾而𩔖者少竊取他書以合之者多凡孟子輩數家皆見剽竊嶢然而出其𩔖童曰嶢音堯山髙貎或作嶤其意緒文辭义牙相抵而不合不知人之増益之歟或者衆為聚歛以成其書歟然觀其往徃有可立者又頗惜之閔其為之也勞今刋去謬惡亂雜者取其似是者又頗為發其意蔵於家髙氏子略曰天寳中以文子為通元真經桞子厚為刋去謬亂頗發其意子厚所刋之書世不可見矣今觀其言曰神者智之淵神清則智明智者心之府智公則心平又曰上學以神聽之中學以心聽之下學以耳聽之又曰貴則觀其所齊富則觀其所欲貧則觀其所愛又曰人性欲平嗜欲害之此亦學之一臠也周氏渉筆曰文子一書誠如栁子厚所云駮書也然不獨其文聚歛而成亦黄老名法儒墨諸家各以其説入之氣脉皆不相應其稱平王者徃徃是楚平王序者以為周平王時人非也陳氏曰按志有文子九篇老子弟子與孔子同時而稱周平王問似依託者也又按史記貨殖傳徐廣注計然范蠡師名研裴駰曰計然葵邱濮上人姓辛字文子黙希子引以為據然自班固時已疑其依託况未必當時本書乎至以文子為計然之字尤不可考信墨希子注文子十二卷鼂氏曰墨希子者唐徐靈府自號也靈府謂文子周平王時人朱元注文子十二卷鼂氏曰唐朱元注缺府言一篇或取黙希注補焉張湛注列子八卷鼂氏曰鄭列禦㓂撰劉向校定八篇云繆公時人學本於黄帝老子清虛無為務崇不競其寓言與莊周𩔖晉張湛注唐號冲虚真經景徳中加至徳之號力命篇言夀夭不存於葆養窮逹不繫於智力皆天之命楊朱篇言肆耳目之欲而不卹生之危縱酒色之娯而不顧名之醜是之謂制命於内劉向以二義乖背不似一家之言予以道家之學本謂世衰道䘮物偽滋起或騁智力以圖利不知張毅之走髙門竟以病殞或背天真以狥名不知伯夷之在首陽因以餒終是以兩皆排擯欲使好利者不巧詐以干命好名者不矯妄以失性爾非不同也雖然儒者之道則異乎是雖知夀夭窮逹非人力也必修身以俟焉以為立巖墻之下而死者非正命也知耳目之於聲色有性焉以為其樂也外而不易吾内鳴呼以此自為則為愛已以此教人則為愛人儒者之道所以萬世而無弊歟河東栁氏辯列子曰劉向古稱博極羣書然其録列子獨曰鄭穆公時人穆公在孔子前㡬百嵗列子書言鄭國皆云子産鄧析不知向何以言之如此史記鄭繻公二十四年楚悼王四年圍鄭鄭殺其相駟子陽子陽正與列子同時是嵗周安王三年秦惠王韓烈侯趙武侯二年魏文侯二十七年燕釐公五年釐古文僖字齊康公七年宋悼公六年魯穆公十年不知向言魯穆公時遂誤為鄭耶不然何乖錯至如是其後張湛徒知怪列子書言穆公後事亦不能推知其時然其書亦多増竄非其實要之莊周為放依其辭放方往切其稱夏棘狙公紀渻子渻音省季咸等皆出列子不可盡紀雖不概於孔子道然其虛泊寥廓居亂世逺於利禍不得逮於身而其心不窮易之遁世無悶者其近是歟余故取焉其文辭𩔖莊子而尤質厚少為作好文者可廢耶其楊朱力命列子篇名疑其楊子書其言魏牟孔穿皆出列子後不可信然觀其辭亦足通知古之多異術也讀焉者慎取之而已矣石林葉氏曰列子天瑞黄帝兩篇皆其至理之極盡言之而不隠故與佛書直相表裏所謂莊語者也自周穆王以後始漸縱弛談譎縱横惟其所欲言盖慮後人淺狹難與直言正理則設為詭辭以激之劉向弗悟遂以為不似一家之書張湛微知之至於逐事為注則又多迷失然能知其近佛是時佛經到中國者尚未多亦不易得矣要之讀老氏莊列三書皆不可正以言求其間自有莊語有荒唐之辭如佛氏至唐禪宗自作一種語自與諸經不𩔖亦此意也容齋洪氏隨筆曰列子書事簡勁宏妙多出莊子之右其言惠盎見宋康王説勇有力一叚語宛轉四反非數百言曲而暢之不能了而潔淨粹白如此後人筆力渠可復到耶朱子語録曰列子平淡疎曠孟子莊子文章皆好列子便有迂僻處左氏亦然皆好髙而少事實因言列子語佛氏多用之莊子全寫列子又變得峻竒列子語温純栁子厚常稱之髙氏子略曰太史公史殊不傳列子如莊周所載許由務光之事漢去古未逺也許由務光往往可稽遷猶疑之所謂禦㓂之説獨見於寓言耳遷於此詎得不致疑耶周之末篇敘墨翟禽滑釐慎到田駢闗尹之徒以及於周而禦㓂獨不在其列豈禦㓂者其亦所謂鴻蒙列缺者歟然則是書與莊子合者十七章其間尤有淺近迂僻者特出於後人㑹萃而成之耳至於西方之人有聖者焉不言而自信不化而自行此故有及於佛而世尤疑之夫天毒之國紀於山海竺乾之師間於柱史此楊文公之文也佛之為教已見於是何待於此時乎然其可疑可怪者不在此也列子釋文二卷鼂氏曰唐殷敬順撰敬順甞為當塗丞郭象注莊子十卷鼂氏曰莊周撰郭象注周為蒙漆園吏按漢書志本五十二篇晉向秀郭象合為三十三篇内篇八外篇十五雜篇十一唐世號南華真經自孔子没天下之道術日散老聃始著書垂世而虛無自然之論起周又從而羽翼之掊擊百世之聖人殫殘天下之聖法而不忌其言可謂反道矣自荀卿揚䧺以來諸儒莫不闢之而放者猶自謂游方之外尊其學以自肆於是乎禮教大壊戎狄亂華而天下横流兩晉之禍是已自熈寜元豐之後學者用意過中見其書末篇論天下之道術雖老聃與其身皆列之為一家而不及孔子莫不以為陽訿孔子而隂尊焉遂引而内之殊不察其言之指歸宗老氏邪宗孔氏邪既曰宗老氏矣詎有隂助孔子之理也邪至其論道術而有是言盖不得已耳夫盗之暴也又何甞不知主人之為主人邪顧可以其智及此遂以為尊我開闗揖而進之乎竊懼夫禍之過乎兩晉也東坡蘇氏莊子祠堂記曰謹按史記莊子與梁惠王齊宣王同時其學無所不窺然要本歸於老子之言故其著書十餘萬言大抵率寓言也作漁父盗蹠胠篋以詆訾孔子之徒以明老子之術此知莊子之粗者余以為莊子盖助孔子者要不可以為法耳楚公子微服出亡而門者難之其僕操箠而罵曰𨽻也不力門者出之事固有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可故莊子之言皆實予而文不予陽擠而隂助之其正言盖無㡬至於詆訾孔子未甞不微見其意其論天下道術自墨翟禽滑釐彭蒙慎到田駢闗尹老聃之徒以至於其身皆以為一家而孔子不與其尊之也至矣然余甞疑盗蹠漁父則若真詆孔子者至於讓王說劔皆淺漏不入於道反覆觀之得其寓言之終曰陽子居西遊於秦遇老子老子曰而睢睢而旴旴而誰與居太白若辱盛徳若不足陽子居蹵然變容其往也舍者將迎其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣去其讓王説劒漁父盗蹠四篇以合於列禦㓂之篇曰列禦㓂之齊中道而反曰吾驚焉吾食於十漿而五漿先餽然後悟而笑曰是固一章也莊子之言未終而昧者勦之以入其言余不可以不辯凡分章名篇皆出於世俗非莊子之本意朱子語録曰莊列亦似曽㸃底意思他也不是專學老子吾儒書他都㸔來不知如何被他􅷄見這箇物事便放浪去了今禪學也是恁地列莊本楊朱之學故其書多引其語莊子説子之於親也命也不可解於心至臣之於君則曰義也無所逃於天地之間是他㸔得那君臣之義却似是逃不得不奈何須着臣伏他更無一箇自然相胥為一體處可怪故孟子以為無君此𩔖是也又莊子比列子見較髙氣較豪他是事事識得又却蹴踏了以為不足為列子却有規矩問莊子孟子同時何不曽相遇又不聞相道及先生曰莊子當時也無人宗之他只是在僻處自説孟子平生足跡只在齊魯滕大梁之間不曽過大梁之南莊子自是楚人想見聲聞止於梁而止然當時南方亦多異端如陳良之𩔖是也陳氏曰按晉郭象傳向秀解莊子未竟而卒頗有别本遷流象竊以為已注乃自注秋水至樂二篇又易馬蹄一篇其餘㸃定文句而已其後秀義别出故今有向郭二莊其義一也然向義今不傳但時見陸氏釋文莊子音義三卷陳氏曰唐陸德明撰即經典釋文二十六至二十八卷成元英莊子疏三十三卷鼂氏曰唐道士成元英撰本郭象注為之疏義元英字子實陜州人隠居東海貞觀五年召至京師加號西華法師永徽中流郁州不知坐何事書成道士王元慶邀文學賈鼎就授大義序云周字子休師長桑公子内篇理深故别立篇目外篇雜篇其題取篇目二字而已文如海莊子疏十卷鼂氏曰唐文如海撰如海明皇時道士也以郭象注放乎自然而絶學習失莊生之㫖因再為之解凡九萬餘言呂吉甫注莊子十卷鼂氏曰皇朝吕惠卿撰吉甫惠卿字也元豐七年先表進内篇餘續成之王元澤注莊子十卷鼂氏曰皇朝王雱字元澤撰東坡廣成子解一卷鼂氏曰皇朝蘇軾撰取莊子中黄帝問道於廣成子一章為之解景迂甞難之其序略曰某晩玷先生薦賢中安敢與先生異論然先生許我不茍同翰墨具在鶡冠子八卷鼂氏曰班固載鶡冠子楚人居深山以鶡羽為冠著書一篇因以名之至唐韓愈稱愛其博選學問篇而栁宗元以其多取賈誼鵩賦非斥之按四庫書目鶡冠子三十六篇與愈合已非漢志之舊今書乃八卷前三卷十三篇與今所傳墨子書同中三卷十九篇愈所稱兩卷皆在宗元非之者篇名世兵亦在後兩卷有十九論多稱引漢以後事皆後人雜亂附益之今削去前後五卷止存十九篇庻得其真其詞雜黄老刑名意皆淺鄙宗元之評盖不誣昌黎韓愈讀鶡冠子曰鶡冠子十九篇其詞雜黄老刑名其博選篇四稽五至之說當矣使其人遇時授其道而施於國家功徳豈少哉學問篇稱賤生於無所用中流失船一壺千金者余三讀其詞而悲之文字脱謬為之正三十有五字乙者三滅者二十有二注十有二字云河東栁氏辯鶡冠子曰余讀賈誼鵩賦嘉其詞而學者以為盡出鶡冠子鶡冠子十九篇論三才變通古今治亂之道其世兵篇頭與鵩賦相亂余往來京師求鶡冠子無所見至長沙始得其書讀之盡鄙淺言也惟誼所引用為美餘無可者吾意好事者偽為其書反用鵩賦以文飾之非誼有取之决也太史公伯夷列傳稱賈子曰貪夫狥財烈士徇名夸者死權不稱鶡冠子遷號為博極羣書假令當時有其書遷豈不見耶假令真有鶡冠子書亦必不取鵩賦以充入之者何以知其然邪曰不𩔖髙氏子畧曰列仙傳曰鶡冠子楚人隠居著書言道家事則盡出於黄老矣其書有曰小人事其君務蔽其明塞其聰乘其威以灼熱天下天髙不難追有福不可請有禍不可違其言如此是盖未能忘情於斯世者周氏渉筆曰韓文讀鶡冠子僅表出首篇四稽五至末章一壺千金盖此外文勢闕自不足録栁子厚則斷然以為非矣按王鈇篇所載全用楚制又似非賈誼後所為先王比閭起教鄉遂逹才道廣法寛尊上帥下君師之義然也今自五長里有司扁長鄉師縣嗇夫郡大夫遞相傳吿以及柱國令尹然動輒有誅柱國滅門令尹斬首舉國上下相持如束濕而三事六官亦皆非所取通與編氓用三尺法此何典也處士山林談道可也乃妄論王政何哉陳氏曰陸佃解今書十九篇韓吏部稱十有六篇故陸謂其非全韓公頗道其書而栁以盡鄙淺言自今考之栁説為長崇文總目今書十五篇述三才變通古今治亂之道唐世常辯此書後出非古所謂鶡冠子者亢倉子二卷鼂氏曰唐栁宗元曰太史公為莊周列傳稱其為書畏累亢倉子皆空言無事實今世有亢倉子書其首篇出莊子而益以庸言盖周所云者尚不能有事實又况取其語而益之者其為空言尤也劉向班固録書無亢倉子而今之為術者乃始為之傳注以教於世不亦惑乎按唐天寳元年詔號亢倉子為洞靈真經然求之不獲襄陽處士王士元謂莊子作庚桑子太史公列子作亢倉子其實一也取諸子文義𩔖者補其亡今此書乃士元補亡者宗元不知其故而遽詆之可見其鋭於譏議也其書多作古文竒字豈内不足者必假外飾歟何璨註髙氏子畧曰開元天寳間天子方鄉道家者流之説尊表老氏莊列又以亢桑子號洞靈真經既不知其人之仙否又不識其書之可經一旦表而出之固未始有此書也處士王褒乃趨世好廹上意撰而獻之今讀其篇往往采諸列子文子又采吕氏春秋新序説苑又時采諸戴氏禮源流不一往往論殊而辭異可謂雜而不純濫而不實者矣周氏渉筆曰庚桑楚固寓言然所居以忘言化俗以醇和感天今所著切切用誅罰政術盖全未識庚桑者其稱危代以文章取士剪巧綺濫益至正指唐事又補賊廣引俟赦率是獄案文書又一鄉一縣一州被青紫章服皆近制既為唐人短淺者無書不煩子厚掊擊也惟農道一書可讀自合孤行陳氏曰首篇所載與莊子庚桑楚同亢倉者庚桑聲之變也崇文總目凡九篇闗尹子九卷陳氏曰周闗令尹喜盖與老子同時啟老子著書言道徳者按漢志有闗尹子九篇而隋唐及國史志皆不著録意其書亡久矣徐藏子禮得之於永嘉孫定首載劉向校定序末有葛洪後序未知孫定從何傳授殆皆依託也序亦不𩔖向文素書一卷鼂氏曰題黄石公著凡一千三百六十六言其書言治國治家治身之道龎雜無統盖采諸書以成之者也陳氏曰後人傅㑹依託以為之者無盡居士注素書一卷鼂氏曰皇朝張商英注商英稱素書凡六篇按漢書黄石公圯上授子房世人多以三畧為是盖誤也晉亂有盗發子房塜玉枕中獲此書商英之言世未有信之者十一賢注隂符經一卷李筌注隂符經一卷鼂氏曰唐少室山人布衣李筌註云隂符經者黄帝之書或曰受之廣成子或曰受之元女或曰黄帝與風后玉女論隂陽六甲退而自著其事隂者暗也符者合也天機暗合於事機故曰隂符皇朝黄庭堅魯直甞䟦其後云隂符出於李筌熟讀其文知非黄帝書也盖欲其文竒古反詭譎不經盖糅雜兵家語又妄説太公范蠡鬼谷張良諸葛亮訓註尤可笑惜不經栁子厚一掊擊也朱子語録閭邱主簿進黄帝隂符經傳先生説握竒經等文字恐非黄帝作唐李筌為之聖賢言語自平正却無蹺欹如許崇文總目自太公而下註傳尤多今集諸家之説合為一書若太公范蠡鬼谷子諸葛亮張良李筌李合李鑒李鋭楊晟凡十一家自淳風以下皆唐人又有傳曰者不詳何代人太公之書世逺不傳張良本傳不云著書二説疑後人假托云又有隂符經敘一卷不詳何代人敘集太公以後為隂符經註者凡六家并以惠光嗣等傳附之隂符機一卷崇文總目唐李靖撰以謂隂符者應機制變之書破演其説為隂符機又有勢滋及論合三篇隂符經太無傳一卷隂符經辯命論一卷崇文總目唐張果傳或曰果於道藏得此傳不詳何代人所作因編次而正之今别為古字盖當時道書所得之本也隂符經正義一卷崇文總目唐韋洪撰隂符經要義一卷隂符經小解一卷崇文總目題云元解先生撰不詳何代人天機子一卷鼂氏曰不著撰人凡二十五篇或曰一名隂符二十四機諸葛亮撰予觀其詞㫖殆李筌所為爾托之孔明也載道藏中隂符元機一卷崇文總目唐李筌撰自號少室山逹觀子筌好神仙甞於嵩山虎口岩石壁得黄石隂符本題云魏道士宼謙之傳諸名山筌雖畧抄記而未曉其義後入秦驪山逢老母傳授陳氏曰即隂符經也監察御史新安朱安國註此書出於李筌云得於驪山老母舊志列於道家安國以為兵書之祖要之非古書也無能子三卷鼂氏曰不著撰人唐光啟三年天子在褒寓三輔景氏舍成書三十篇述老莊自然之㫖總目録之道家陳氏曰唐志云光啟間隠民盖其自敘四子治國樞要四卷鼂氏曰唐范乾九集四子謂莊子文子列子亢倉子其意以為黄老之道内足以修身外足以治國者分為二十門元真子外篇三卷陳氏曰唐隠士金華張志和撰唐元真十二卷今纔三卷非全書也既曰外篇則必有内篇矣志和事跡詳見余所集碑傳莊子十論一卷陳氏曰題李士表撰未詳何人文獻通考卷二百十一
