髙帝受禪改封監利縣諡壯吕安國廣陵人宋時以功封鍾武縣男髙帝即位進爵湘鄉侯諡肅周山圖義興人以討沈攸之功封晉興縣男周盤龍北蘭陵人宋時以軍功封晉安子髙帝起兵改封純陽侯王廣之沛郡相人宋時以軍功封寧都縣子髙帝即位以佐命進爵為侯諡壯子珍國梁武起兵以佐命封宜陽縣侯僧度荀伯玉廣陵人髙帝受禪以佐命功封南豐縣子後為武帝所殺蘇侃武邑人髙帝受禪以佐命功封新建縣侯諡質江祏濟陽考城人眀帝即位以佐命封安陸縣侯後為東昏所殺劉善眀平原人以佐命及征伐功封新淦伯紀僧真丹陽建康人齊髙帝踐祚以佐命功封新陽縣男茹法亮吳興武康人以權幸封望蔡縣男法真亮從弟東昏時以佞幸進封餘干縣子梁列侯王茂太原祁人武帝即位以佐命功封望蔡縣公諡忠烈子貞秀嗣後坐反誅曹景宗新野人武帝即位以佐命功封湘西縣侯諡壯子皎嗣席闡文安定臨涇人武帝即位以佐命功封山陽伯諡威夏侯詳譙郡人武帝時以佐命功封寧都縣侯改豐城縣公諡景子亶嗣誼夔亶弟以征伐功封保城縣侯諡桓子撰嗣蔡道恭南陽冠軍人武帝起兵以佐命功封漢夀縣伯後戰殁於魏傳國至孫固楊公則天水西縣人武帝起兵以附從戰伐功封寧都縣侯諡烈子瞟嗣眺鄧元起南郡當陽人武帝起兵以附從功封當陽縣侯諡忠張惠紹義陽人武帝起兵以附從功封石陽縣侯諡忠子登嗣馮道根廣平酇人武帝時以征戰功封增城縣男後進爵為伯諡威子懷嗣康絢華山藍田人武帝起兵以附從功封南陽縣男昌義之歷陽烏江人武帝時以佐命功封永豐侯諡烈子寶景嗣張宏䇿范陽方城人武帝母文獻后從弟帝起兵以定䇿功封洮陽縣侯後為賊所害諡閔子緬嗣纘緬弟以尚主封利亭侯庾域新野人武帝時以佐命功封廣牧縣子後進爵為伯子子輿嗣鄭紹叔滎陽開封人武帝時以佐命功封營道縣侯後改封東興諡忠子貞嗣吕僧珍東海范陽人武帝初以佐命功封平固縣侯子淡嗣沈約吳興武康人武帝初以佐命功封建昌縣侯諡隱子旋嗣實范雲南鄉舞隂人武帝初以佐命功封霄城縣侯諡文子孝才嗣韋睿京兆杜陵人武帝時以征伐功封梁都子後進爵為侯諡嚴子放嗣粲裴邃河東聞喜人武帝時以征伐功封夷陵縣子諡壯子之政嗣之髙邃兄子以征伐功封都城縣男之平之髙弟以軍功封費縣侯子忌陳時以軍功封東興縣侯之橫之髙弟以軍功封豫寧侯諡忠壯子鳯寶嗣江淹濟陽考城人武帝克石頭以附從功封臨沮縣伯後改醴陵侯諡憲子蒍嗣陳伯之濟隂睢陵人齊時以征伐功封魚復縣伯梁武起兵以附從功進封豐城縣公後反兵敗入魏既而復以兵來降陳慶之義興國山人以送魏元皓入北功封永興侯諡武子昭嗣蘭欽中昌魏人天監中以軍功封懷安縣男後改封曲江縣公王神念太原祁人本魏潁川太守與子僧辨據郡歸梁封南城縣侯諡壯僧辨以誅侯景功封永寧郡公羊侃泰山梁父人本魏將以兵來降封髙昌縣侯子球嗣鵾侃第三子以手殺侯景功封昌國縣侯羊鴉仁泰山巨平人本魏人後歸梁封廣晉侯杜崱京兆杜陵人元帝時以附從討侯景功封枝江縣侯後進封公諡武岸崱兄與崱同歸元帝封江陵縣侯後為嶽陽王察所殺幼安崱弟與崱同歸元帝封華容縣侯後為侯景所殺龕崱兄子與諸父歸元帝封中廬縣侯後為陳霸先所殺王琳會稽山隂人以軍功封建寧縣侯陳武帝受梁禪琳降齊後為陳所攻兵敗見殺何逺東海郯人梁武踐祚以奉迎功封廣興男周石珍建康厮𨽻太清三年以恩幸封南豐縣侯後坐侯景黨伏誅陳列侯杜僧眀廣陵臨澤人以討侯景功封臨江縣侯諡威子晉嗣周文育義興陽羡人以討侯景功封南移縣侯後進封公為熊曇朗所害諡忠愍子寶安嗣侯瑱巴西充國人以討侯景功封康樂縣公後進封零陵郡公諡壯肅子淨藏嗣侯安都始興曲江人以討侯景功封富川縣子後改封西江縣公文帝即位以佐命功進清逺郡公後坐罪賜死子亶嗣歐陽頠長沙臨湘人以征伐功封始興縣侯文帝即位改封陽山郡公諡穆子紇嗣後舉兵反敗誅黃法氍巴山新建人以軍功封巴山縣子後進爵為郡公諡威子玩嗣淳于量濟北人以軍功封廣晉縣男後進封始安郡公章昭達吳興武康人以軍功封欣樂縣侯後進封邵陵郡公子太寶嗣吳眀徹秦郡人宣帝時以佐命功纍封至南平郡公後拒周師敗沒於長安子慧覺嗣胡頴吳興人以從軍功封漢陽縣侯諡壯子商嗣徐度安陸人以戰功封廣德侯後進封湘東郡公諡忠肅子敬成嗣敞杜稜吳郡錢塘人文帝即位以預建立功封永城縣侯諡成子安世嗣周鐵武不知何許人以戰功封純陽縣子後進爵侯子瑜嗣程靈洗新安海寧人以征伐功封遂安縣侯後進封公諡忠壯子文季嗣響沈恪吳興武康人以戰功封東興侯諡光子法興嗣陸子隆吳郡人以戰功封益陽縣子後進爵為侯諡威子之武嗣子才子隆弟以戰功封始康縣子錢道戢吳興長城人以平張彪功封永安縣侯諡肅子邈嗣駱文牙吳興臨安人以戰功封臨安縣侯諡恭子義嗣孫瑒吳郡吳人以軍功封富陽侯諡桓子訓嗣徐世譜巴東魚復人以討侯景功封魚復縣侯諡桓周敷臨川人以拒侯景功封西豐縣侯後為周迪所害子智安嗣荀朗潁川潁隂人以戰功封興寧縣侯諡壯子法尚嗣周炅汝南安成人以軍功封西陵縣伯後進封武昌郡公諡壯魯悉達扶風郿人以晉熙等五州歸附功封彭澤縣侯諡孝子覽嗣廣達悉達弟以軍功封中宿縣侯後隋軍渡江力戰死之蕭摩訶蘭陵人以軍功積封至綏建郡公隋軍渡江戰敗被擒後與漢王諒作逆誅任忠汝隂人以戰功封安福縣侯隋師渡江忠降隋樊毅南陽湖陽人以戰功封夷道縣伯後進爵為侯陳亡入隋趙知禮天水隴西人以從討侯景功封始平縣子後進爵為伯諡恭子元恭嗣蔡景歷濟陽考城人文帝即位以定䇿功封新豐縣子後進爵為侯諡忠敬子徵嗣華皎晉陵暨陽人文帝時以佐命功封懷仁縣伯進封公後降梁毛喜滎陽武陽人宣帝時以定䇿功封東昌縣侯子處沖嗣沈君理吳興人以尚主及后父封望蔡縣侯諡貞憲沈炯吳興武康人以從王僧辨討侯景功封原鄉侯諡恭蕭濟東海蘭陵人以預平侯景功封松陽縣侯司馬申河內溫人以討始興王叔陵功封文招縣伯文獻通考卷二百七十二
