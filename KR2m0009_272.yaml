body:
  text: 文獻通考卷二百七十二鄱陽馬端臨貴與著封建考十三宋齊梁陳諸侯王列侯宋氏一用晉制唯大小國皆有三軍自明帝以後皇子皇弟雖非都督亦置記室參軍小號將軍為大郡邊守置佐吏者又不置長史餘則同矣凡王子為侯者食邑皆千户諸王世子皆金印紫綬進賢兩梁冠佩山元玉初江夏王義恭為孝武所忌憂懼故奏革諸侯廳事不得南向坐國官正冬不得跣登國殿及夾侍障扇不得雉尾劔不得鹿盧形但馬不得過二諸侯常行車前後不得過六隊白直夾殿不在其限刀不得過銀銅為飾諸王子繼體為王者婚葬吉凶悉依諸國公侯之禮不得同皇弟皇子諸王女封縣主諸王子孫襲封之王妃及封侯者夫人並不得鹵簿詔可王國有師改傅為之自內史相記室以下官多與晉同孔顗字思逺為江夏內史好酒多醉而明曉政事咸曰一月二十九日醉勝他人二十九日醒又有辭記室參軍箋曰記室之要須通才敏思性情綸密者為之凡郡縣內史相並於國主稱臣去任便止孝武孝建中始革此制不得追敬不得稱臣止宜云下官而已劉雍嗣封南康侯河東王歆之常為南康國相素輕雍後俱元會雍性嗜酒謂歆之曰卿昔嘗見臣今不能勸一杯酒乎歆之效孫皓歌答之曰昔為汝作臣今與汝比肩既不勸汝酒亦不願汝年公主有傳令傳令不得朱服不得朱服亦江夏王所奏長沙景王道憐武帝中弟帝即位封永初三年薨子義欣嗣瑾義融義欣弟封桂陽縣侯子覬嗣晃義宗義融弟封新渝縣侯子懷珍承義賔義宗弟封興安侯義綦封營道縣侯臨川烈武王道規武帝少弟桓元篡位時以預起義進封至南郡公武帝即位追封臨川王義慶以長沙景王子嗣曅綽營浦侯遵考武帝族弟帝即位封薨諡元子澄之嗣盧陵孝獻王義真武帝次子初封桂陽縣公帝即位封廬陵王後為徐羡之等廢而殺之時年十八紹文帝第五子以嗣義真敬先彭城王義康武帝子帝即位封元嘉時入輔政後廢為庶人賜死江夏文獻王義恭武帝子帝即位封後為廢帝所殺南郡王義宣武帝子元嘉元年初封竟陵王後改封南郡孝武時與臧質同反兵敗誅衡陽文王義季武帝子元嘉元年封衡陽王後改封二十四年薨傳國至孫齊受禪國除始興王濬文帝子元嘉十三年封後與元凶劭同行弒逆伏誅南平穆王鑠文帝第四子元嘉十六年封孝武初薨敬猷為廢帝所殺産以孝武子嗣宣曜以晉平王休祐子嗣伯玉以衡陽恭王薿子嗣竟陵王誕文帝第六子元嘉二十年封廣陵王後改封竟陵討元凶劭及南郡王義宣有功孝武忌誕遣兵襲之誕反兵敗死建平宣簡王宏文帝第七子元嘉二十一年封孝武時薨子景素嗣廢帝時舉兵攻臺城不克被殺廬陵王褘文帝第八子元嘉二十二年封東海王後改封廬陵孝武時坐罪廢死晉熙王昶文帝第九子元嘉二十三年封義陽王廢帝即位舉兵反不克奔魏燮以眀帝子嗣齊受禪見殺武昌王渾文帝第十子元嘉二十四年封孝武時坐罪廢死建安王休仁文帝第十二子元嘉二十九年封明帝立休仁有功帝忌之賜死晉平刺王休祐文帝第十三子孝建二年封山陽王後改封晉平眀帝忌而殺之海陵王休茂文帝第十四子孝建二年封大眀時謀反敗死鄱陽哀王休業文帝第十五子孝建二年封三年薨士宏以山陽王休祐子嗣臨慶沖王休倩文帝第十六子孝建元年封未拜薨新野懷王夷父文帝第十七子蚤薨加封桂陽王休範文帝第十八子孝建三年封順陽王大明元年改封廢帝時反誅巴陵哀王休若文帝第十九子孝建三年封眀帝忌之賜死豫章王子尚孝武第二子孝建元年封西陽王後改封豫章廢帝殞賜自盡晉安王子勛孝武第三子大明四年封廢帝凶狂長史鄧琬等奉子勛起兵眀帝定亂即位琬等不受命奉子勛為帝一嵗琬敗見殺年十一松滋侯子房孝武第六子大明四年封潯陽王眀帝即位長史孔覬不受命以子房舉兵應晉安王子勛敗坐貶為松滋侯後見殺年十一臨海王子頊孝武第七子初封歷陽王後改封臨海坐應晉安王子勛事敗賜死年十一始平孝敬王子鸞武帝第八子大明四年封襄陽王又改封新安廢帝即位見殺時年十嵗眀帝立改封始平以建平王景素子延年嗣永嘉王子仁孝武第九子大眀五年封年十嵗遇害始安王子真孝武第十一子邵陵王子元孝武第十二子淮南王子孟孝武第十六子東平王子嗣孝武第二十七子以上並為眀帝所殺齊敬王子羽孝武第十四子晉陵孝王子雲孝武第十九子並未拜而亡南海哀王子師孝武第二十二子為廢帝所殺武陵王贊眀帝子眀帝既誅孝武諸子詔以贊奉孝武為子封武陵郡王順帝升眀二年薨國除邵陵殤王眀帝子五嵗封順帝升眀二年薨無子國除隨陽王翽眀帝子升明二年封齊受禪降封舞隂縣公新興王嵩眀帝子齊受禪降封定襄縣公始建王禧明帝子齊受禪降封荔浦縣公尋並為齊髙祖所殺齊封爵史闕齊竟陵王子良開西邸延才俊以為士林自永明末京邑士人盛為文章談議皆奏於西邸王國有師王琨為武陵王師時王儉為宰相屬琨用東海迎吏琨使謂曰語郎三臺五省皆是郎用人外方小郡當乞寒賤省官何容復奪之遂不聽其事咨議張岱歷臨海章郡晉安三王府咨議三王行事事舉而情得文學等官齊永明元年竟陵王子良表置文學官公侯置郎中令一人卿餘與晉宋同衡陽元王道度齊高祖長兄仕宋位安定太守卒齊受禪加封諡無子鈞以髙祖第十一子繼後為明帝所殺珉以永陽王子繼子坦始安貞王道生髙祖次兄仕宋位奉朝請卒齊受禪追封諡後子鸞即位是為明帝追尊道生為景皇鳳道生長子仕宋位正員郎卒髙帝即位諡靖世子眀帝即位追封始安靖王子遙光明帝崩受遺輔政東昏失道遙光舉兵攻臺城兵敗誅鸞是為明帝􅒺封安陸昭王豫章文獻王嶷髙帝子帝受禪封武帝即位進太尉薨子子亷嗣元綝梁受禪降封新淦侯臨川獻王映髙帝子帝受禪封永明七年薨子子晉梁時坐反誅長沙威王晃高帝子帝受禪封武帝時薨武陵昭王曅高帝子帝受禪封隆昌元年薨安成恭王皓高帝子帝受禪封永明元年薨鄱陽王鏘高帝子帝受禪封明帝既廢鬱林王遂害鏘桂陽王鑠高帝子帝受禪封後為明帝所殺始興簡王鑑高帝子初封廣興郡後改封永明九年薨江夏王鋒高帝子南平王鋭高帝子宜都王鏗高帝子晉熙王銶高帝子江東王鉉高帝子已上並為眀帝所害竟陵文宣王子良武帝第二子帝即位封帝崩受遺詔輔太孫薨子昭胄嗣東昏時謀舉兵事覺誅魚復侯子響武帝第四子初封巴東郡王為荆州刺史坐殺臺使誅死貶為侯安陸王子敬武帝第五子永明中封明帝即位遣人襲殺之晉安王子懋武帝第七子隆昌初為江州刺史及明帝輔政誅剪髙武諸王子懋欲起兵入討事覺見害隨郡王子隆武帝第八子年二十一遇害建安王子真武帝第九子年十九遇害西陽王子明武帝第十子年十七遇害南海王子罕武帝第十一子年十七遇害巴陵王子倫武帝第十三子年十六遇害邵陵王子貞武帝第十四子年十五遇害臨賀王子嶽武帝第十六子年十四遇害西陽王子文武帝第十七子年十四遇害衡陽王子峻武帝第十八子年十四遇害南康王子琳武帝第十九子年十四遇害湘東王子建武帝第二十一子年十三遇害南郡王子夏武帝第二十三子年七嵗遇害巴陵王昭秀文惠太子第三子年十六遇害桂陽王昭粲文惠太子第四子年八嵗遇害巳上並為明帝所殺先是高帝武帝為諸王置典籖帥一方之事悉以委之每至覲接輒留心顧問刺史行事之美惡係於典籖之口莫不折節推奉恆慮弗及於是威行州部權重藩君武陵王曅為江州性烈直不可忤典籖趙渥之曰今出郡易刺史及見武帝相誣曅遂免還南海王子罕戍琅琊欲暫遊東堂典籖薑秀不許而止還泣謂母曰兒欲移五步亦不得與囚何異秀後輒取子罕屐繖飲器等供其兒昏武帝知之鞭二百繫尚方然而擅命不改邵陵王子貞嘗求熊白厨人答典籖不在不敢與西陽王子明欲送書參侍讀鮑僎病典籖吳修之不許曰應咨行事乃止言行舉動不得自專徴衣求食必須咨訪永眀中巴東王子響殺行事劉寅等武帝聞之謂羣臣曰子響遂反戴僧靜大言曰諸王都自應反豈惟巴東武帝問故答曰夫王無罪而一時被囚取一挺藕一杯漿皆咨籖帥不在則竟日忍渴諸州唯聞有籖帥不聞有刺史竟陵王子良嘗問衆曰士大夫何意詣籖帥參軍范雲答曰詣長史以下皆無益詣籖帥使便有倍夲之價不詣謂何子良有愧色及眀帝誅異己者諸王見害悉典籖所殺竟無一人相抗孔圭聞之流涕曰齊之衡陽江夏最有意而復害之若不立籖帥故當不至於此按宋齊之制諸王之為刺史者立長史以佐之既而復立典籖以制之然大槩多以童稚之年膺方靣之寄而主其事者則皆長史典籖也宋蒼梧王以凶狂遇弒眀帝嗣位而江州長史鄧琬不受命奉晉安王子勛起兵稱帝會稽長史孔覬雍州長史孔道存俱不受命皆奉其王以應晉安未幾兵敗而臣主俱就誅夷而孝武之子孫殱焉及齊明帝以支代宗欲盡除髙武之子孫而皆以典籖殺之然則長史典籖之設皆所以禍諸王而當時之居此職者皆輕躁傾險之人或假之以稱亂或賣之以為功其情雖異而搆禍則同童孺無知駢首橫死於鋒鏑鴆毒之下至誓不願生帝王家及乞為奴以紓死而不可得哀哉梁封爵亦如晉宋之制諸王皆假金獸符第一至十九諸公侯皆假銅獸符竹使符第一至第五名山大澤不以封鹽鐡金銀銅鐵錫及竹園别都宫室園圃皆不以屬國諸王言曰令境內稱之曰殿下公侯封郡縣者言曰教境內稱之曰第下自第下稱皆曰寡人相以下公文上事皆詣典事世子主國其文書表疏儀式如臣而不稱臣文書下郡官皆言告諸王公侯國官皆稱臣上於天朝皆稱陪臣有所陳皆曰上疏其公文曰言事梁南平元襄王偉好學重士四方遊士當世知名者莫不畢至齊世青溪宫改為華林苑賜偉為宅穿築種植與賔客遊其中梁世藩邸之盛無過五等諸公位視三公班次之開國諸侯位視孤卿重號將軍光祿大夫班次之開國諸伯位視九卿班次之開國諸子位視二千石班次之開國諸男位視比二千石班次之王國置傅相公以下則臺各為選置之皆掌知百姓事郎中令將軍常侍典書令典衛長伯子無典衛典祠以下自選備上諸官多同前代若王加將軍開府則置長史司馬及記室掾屬祭酒主簿録事官屬張綰字孝卿自中軍宣城王長史遷御史中丞武帝使宣旨曰為國之急唯在執憲直繩用人夲不限升降晉宋代周閔蔡廓並以侍中為之卿勿疑是左遷時宣城王府資重故有此旨嗣王則唯置郎中令中尉常侍大農藩王則無常侍與後漢同長沙宣武王懿武帝兄齊時為中書令為東昏所殺武帝受禪追封諡子業嗣孝儼眘藻業弟封西昌侯猷藻弟封臨汝侯韶猷子封上甲縣都鄉侯後襲封長沙王駿韶弟封南安侯眀猷弟封貞陽侯武帝既納侯景以眀督師北伐兵敗沒於魏至齊文宣時遣使送明南還王僧辨納之稱尊號陳霸先襲殺僧辨更立敬帝而廢明齊人徴之薨永陽昭王敷武帝兄仕齊為隨郡內史卒武帝受禪追封諡子伯遊嗣衡陽宣王暢武帝弟仕齊位太常封江陵縣侯卒武帝受禪追封諡子獻嗣桂陽簡王融武帝弟仕齊為太子洗馬與懿俱遇害武帝受禪追封諡象以長沙王子嗣慥臨川靜惠王宏武帝弟仕齊為王府功曹武帝受禪封普通七年薨子正義嗣正德正義弟封西豐縣侯後奔魏復還大通四年封臨賀郡王侯景反奉正德僭位景入城並廢而