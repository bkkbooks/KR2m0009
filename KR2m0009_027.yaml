body:
  text: 文獻通考卷二十七鄱陽馬端臨貴與著國用考五蠲貸漢文帝二年民貸種食未入入未備者赦之十二年賜天下民田租之半十三年除民之田租右除田租始於漢文以後或因行幸所過除田租或各處災傷除田租非遍及天下者不錄詳見田賦考武帝元朔元年諸逋貸在孝景後三年以前皆勿收昭帝始元二年䛇所賑貸種食勿收責按漢以来始有蠲貸之事其所蠲貸者有二田賦一也逋責二也何三代之時獨不聞有所蠲貸耶盖三代之所以取民田賦而已貢助徹之法雖不離乎什一然徃徃隨時隨地為之權衡未嘗立為一定不易之制故禹貢九州之地如人功多則田下而賦上人功少則田上而賦下兗州之地盖十有三載而後可同於他州又有雜出於數等之間如下上上錯下中三錯之𩔖可見其未嘗立為定法孟子以為治地莫不善於貢亦病其較數嵗之中以為常然則數嵗之外亦未嘗不變易非如後世立經常之定額其登於賦額者遂升合不可懸欠也盖其所謂田賦者既隨時斟酌而取之則自不令其輸納不敷而至於逋懸既無逋懸則何有於蠲貸而當時之民亦秉義以事其上所謂雨我公田遂及我私所謂私田稼不善則非吏公田稼不善則非農則又不至如後世徇私忘公而徼幸其我蠲至於田賦之外則未嘗他取於民雖有春省耕補不足秋省歛助不給之制然未聞責其償也春秋時始有施舍己責之説家量貸而以公量收之説秦漢而下賦税之額始定而民不敢逋額内之租征歛之名始多而官復有税外之取夫如是故上之人不容不視時之豐歉民之貧富而時有蠲貸之令亦其勢然也由唐以来取民之制愈重其法愈䌓故蠲貸之令愈多或以水旱或以亂離改易朝代則有所蠲恢拓土宇則有所蠲甚至三嵗祀帝之赦亦必有所蠲以為常典盖征歛之法本苛逋欠之數日多故蠲貸之令不容不宻而桀黠頑獷之徒至有故逋常賦以待蠲而以為得䇿則上下胥失之矣宣帝元康元年詔所賑貸勿收神爵元年詔所賑貸物勿收元帝永光四年詔所貸貧民勿收責鴻嘉元年詔逋貸未入者勿收四年逋貸勿收成帝河平四年詔諸逋租賦所賑貸勿收後漢章帝元年詔以大旱勿收兖豫徐州田租和帝永元四年詔郡國秋稼為旱蝗所傷者什四以上勿收田租九年詔如之順帝永建元年詔以疫癘水旱令人半輸今年田租其傷害什四以上勿收責不滿者以實除之桓帝延熹九年靈帝熹平元年皆有是詔魏陳留王景元四年取蜀赦益州士民復除租税之半吳大帝嘉禾三年寛民間逋賦勿復督課十三年詔原逋責普武帝泰始元年受禪復天下租賦及關市之税一年逋責宿負皆勿收太康元年平吳将吏渡江復十年百姓及百工復二十年二年詔四方水旱甚者無出田租五年減天下户課三分之二六年以嵗不登免租貸宿負惠帝永平元年除天下户調絹綿成帝咸和四年詔遭賊州縣復租稅三年孝武太元四年郡縣遭水旱者減租税五年以比嵗荒歉大赦自太元三年以前逋租宿債皆蠲除之十七年大赦除逋租宿債宋武帝即位大赦除逋租宿債勿收齊髙帝即位大赦除逋租宿債梁陳受禪皆然魏道武天興元年詔大軍所經州郡皆復貲租一年除山東人租賦之半二年又除租賦之半太武延和三年詔以頻年征伐有事西北運輸之役百姓勤勞令郡縣括貧富以為級富者租賦如常中者復二年下窮者復三年孝文帝太和六年分遣大使廵行州縣遭水之處免其租賦隋文帝開皇九年以江表初平給復十年自餘諸州並免當年租賦十二年詔河北河東今年田租三分減一兵減半功調全免唐髙祖武徳元年即位詔義師所過給復三年其餘給復二年四年平王世充竇建徳大赦百姓給復一年陜鼎函虢虞芮邠七州轉輸勞費幽州管内久隔寇戎並給復二年太宗即位免民逋租宿債又免關内及蒲芮虞秦陜鼎六州二嵗租給復天下一年貞觀元年以山東旱免今年租中宗復位免民一年租賦睿宗即位免天下嵗租之半元宗開元五年免河南北蝗水州今嵗租八年免水旱州逋負九年免天下七年以前逋負十七年免今嵗租之半二十七年免今年租天寳十四載免今年租庸半肅宗乾元二年免天下租庸来嵗三之一陷賊州免三嵗租代宗即位免民逋負租宿負次年又詔免之憲宗元和四年免山南東道淮南江西浙東湖南荆南今嵗税十四年大赦免元和二年以前逋負武宗會昌六年以旱免今年夏税宣宗大中四年蠲度支鹽鐡户部逋負九年以旱遣使廵撫淮南減上供饋運蠲逋租又罷淮南宣歙浙西冬至元日常貢以代下户租税懿宗咸通七年大赦免咸通三年以前逋負後唐莊宗天成二年詔免三司逋負近二百萬緡潞王即位以劉昫判三司鈎考舊逋必無可償者請蠲之詔長興以前户部及諸道逋租三百三十萬石咸免之貧民大悅三司吏怨之致堂胡氏論見田賦考宋太宗皇帝至道二年祕書丞髙紳上言受詔詣江南諸州首至宣州撿責部内逋官物千二百四十八萬即日詔太常丞黄夢錫乗𫝊按其事皆李煜日吏掌郵驛鹽鐡酒𣙜供軍槀秸等以鐡錢計其數逮四十年州郡不為削去其籍夢錫檢勘合理者纔三四萬民貧無以償乃詔悉除逋籍真宗咸平元年判三司催欠司王欽若上言諸路所督逋負并十保人償納未盡者請令保眀聞奏均在吏屬科理者請蠲放之詔可又令川峽逋欠官物不得估其家奴婢以償自是每有大赦必令臺省官與三司同詳定逋負引對蠲放天書降放五百八十萬東封放五百四十九萬汾陰放五百九十四萬其後所放大約準此巽巖李氏送湯司農歸朝序曰側聞真宗初即位王文穆公與毋賔古同佐三司賔古謂天下宿逋自五代訖咸平理督未已民病不能勝将啓蠲之文穆得賓古言即夕俾吏治其數翌日具奏真宗愕曰先帝曷不知此文穆曰先帝固知之特留遺陛下收天下心耳真宗感悟因遣使四出蠲宿逋凡一千餘萬釋係囚三千餘人由是遇文穆甚異卒用為相仁宗繼立推廣先志亟改追欠司曰蠲納司旋命近臣詳定應在名物下諸路轉運司期以三年悉蠲之每三年復一大赦凡宿逋之總於蠲納司者茍非侵盗皆得除洗歴聖相授率由舊章所蠲當以數百萬計究其本原事迹實自文穆發之文穆晚繆所為要不合古而真宗獨加寵待亦惟文穆早有恤民之言宜為宰相故爾仁宗天聖六年詔天下應在物轉運司選所部官期三年内悉除之百萬以上嵗中除十之八者陞陟不及百萬而嵗中悉除者錄其勞過期者劾其罪是嵗有司言所蠲二百三十六萬嘉祐四年蠲三千二百一十六萬其餘或千萬或數百萬推是以知四十餘年之間以恩釋者多矣然有司或務聚歛有嘗以恩除而追督不捨者朝廷知其弊下詔戒飭英宗治平三年詔逋負非侵盗皆除之或請所負須嘉祐七年赦後已輸十之三乃以赦除端眀殿學士錢明逸言此非赦意請如初令詔可神宗熈寧元年釋逋負貸糧一百六十二萬八千五百石有竒錢十一萬七千四百緡有竒元豐五年詔内外市易務在京酒户罸息錢並除之後又詔倍罰麴錢三分已放一分外更免一分哲宗元祐元年右司諫蘓轍言乞將民間官本債負出限役錢及酒坊元額罰錢見今資産耗竭實不能出者令州縣監司保明除放詔令户部勘㑹轍謂此事惟州縣可見若令户部取之州縣文字徃来問難淹延嵗月救民之急不當如此乞與一切放免於是詔户部勘㑹應係諸色欠負窠名數目若干係息或罰及逐户已納過息罰錢數并抛下免役及坊塲淨利等錢仍以欠户見有無抵抵當物力速具保眀以聞尋詔内外見監理市易官錢特許以納過息罰錢充折如已納及官本即便與放免并坊塲淨利錢亦依此五年詔府界諸路人户積年負欠以十分為率每年隨夏秋料各帶納一分願併納者聼又詔諸路負欠許将斛斗增價折納御史中丞傅堯俞言風聞逐處監司以今嵗蠶麥並熟催督積年逋負百姓必不能用一熟之力了積年之欠徒費鞭朴長公人貪暴乞取之弊諸路監司且令帶納一料候秋成更令帶納知杭州蘇軾言二聖嗣位以來恩貸指揮多被有司巧為艱閡故四方皆有黄紙放白紙收之語雖民知其實止怨有司然陛下未嘗峻發徳音戒飭大臣令盡理推行况臣所論市易塩錢酒税和買絹四事錢物雖多皆是虚數必難推理除是復用小人如吳居厚盧秉之𩔖假以事權濟其威虐則五七年間或能索及三五分若官吏兵循常法何緣索得三五年後人户竭産伍保散亡勢窮理盡不得不放當此之時亦不得謂之聖恩矣伏乞留神省覧或執政只作常程文字行下一落胥吏庸人之手則茫然如墮海中民復何望矣七年軾又上言曰臣聞之孔子曰善人教民七年亦可以即戎矣夫民既富而教然後可以即戎古之所謂善人者其不及聖人逺甚今二聖臨御八年於茲仁孝慈儉可謂至矣而帑廩日益困農民日益貧商賈不行水旱相繼以上聖之資無善人之效臣竊痛之所至訪問耆老有識之士陰求其所以皆曰方今民荷寛政無他疾苦但為積欠所壓如負千鈞而行免於僵仆則幸矣何暇舉首奮臂以營求於一飽之外㢤今大姓富家昔日號為無比户者皆為市易所破十無二三矣其餘自小民以上大率皆有積欠監司督守令守令督吏卒文符日至其門鞭撻日加其身雖有白圭猗頓亦化為篳門圭竇矣自祖宗以来每有赦令必曰凡欠官物無侵欺盗用及雖有侵盗而本家及五保人無家業者並與除放祖宗非不知官物失陷姦民幸免之弊特以民既乏竭無以為生雖加鞭撻終無所得緩之則為姦吏之所蠶食急之則為盗賊之所憑藉故舉而放之則天下悦服雖有水旱盗賊民不思亂此為捐虚名而收實利也自二聖臨御以来每以施舍己責為先務登極赦令每次郊赦或隨事指撝皆從寛厚凡今所催欠負十有六七皆聖恩所貸矣而官吏刻薄與聖意異舞文巧詆使不該放監司以催欠為職業守令上為監司之所廹下為胥吏之所使大率縣有監催千百家則縣中胥徒舉欣欣然日有所得若一旦除放則此等皆寂寥無獲矣自非有力之家納賂請求誰肯舉行恩貸而債欠之人皆隣於寒餓何賂之有其間貧困掃地無可蠶食者則縣胥教令通指平人或云衷私擅買抵當物業或雖非衷私而云買不當價似此之𩔖蔓延追擾自甲及乙自乙及丙無有窮已每限皆空身到官或三五限得一二百錢謂之破限官之所得至微而胥徒所取蓋無虚日俗謂此等為縣胥食邑户嗟乎聖人在上使民不得為陛下赤子而皆為姦吏食邑户此何道也商賈販賣例無見錢若用見錢則無利息湏今年索去年所賣明年索今年所賖然後計算得行彼此通濟今富户先已殘破中民又有積欠誰敢賒賣物貨則商賈自然不行此酒税課利所以日虧城市房廊所以日空也諸路連年水旱上下共知而轉運司窘於財用例不肯放税縦放亦不盡實雖無眀文指撝而以喜怒風曉官吏孰敢違者所以逐縣例皆拖欠兩税較其所欠與依實檢放無異於官了無所益而民有追擾鞭撻之苦近者詔㫖凡積欠皆分為十料催納通計五年而足聖恩隆厚何以加此而有司以謂有㫖倚閣者方待依十料指撝餘皆并催縦使盡依十料吏卒乞覓必不肯分料少取人户既未納足則追擾常在縦分百料與一料同臣頃知杭州又知潁州今知揚州親見兩浙京西淮南三路之民皆為積欠所壓日就窮􅕚死亡過半而欠籍不除以致虧欠兩税走陷課利農末皆病公私並困以此推之天下大率皆然矣臣自潁移揚州舟過濠夀楚泗等州所至麻麥如雲臣每屏去吏卒親入村落訪問父老皆有憂色云豐年不如凶年天災流行民雖乏食縮衣節口猶可以生若豐年舉催積欠胥徒在門枷棒在身則人户求死不得言訖淚下臣亦不覺流涕又所至城邑多有流民官吏皆云以夏麥既熟舉催積欠故流民不敢歸鄉臣聞之孔子曰苛政猛於虎昔嘗不信其言以今觀之殆有甚者水旱殺人百倍於虎而人畏催欠乃甚於水旱臣竊度之每州催欠吏卒不止五百人以天下言之是常有二十餘萬虎狼散於民間百姓何由安生朝廷仁政何由得成乎臣自到任以來日以檢察本州積欠為事内已有條貫除放而官吏不肯舉行者臣即指撝本州一面除放去訖其於理合放而於條未有眀文者即且令本州權住催理聼候指撝其於理合放而於條有礙者臣亦未敢住催各具利害奏取聖㫖元符三年十二月時徽宗已即位詔兩浙轉運司應舊欠朝廷及他司錢物斛斗總計六百五十餘萬分作十五年撥還仍自建中靖國元年為始時右司員外郎陳瓘進國用須知言帝嗣位之初肆赦天下大弛逋負其數太多不無僥倖方國用匱乏之時傾天下之財而無孑遺大臣為無益之舉以壊先憲不可以不慮㑹御史中丞趙挺之亦言契勘元祐七年所放不問係與不係欠負凡民間錢物宜輸於官者一切均放之然所放欠乃元豐八年三月已前盖七年以前也今元符三年乃放元符三年已前者則所放不貲矣祖宗以来放欠自有程式今不取神宗以来舊法而獨取元祐七年之法其間放欠止依所放名件而不依所放年嵗顯有情弊乞並送户部勘當將建隆以来至元祐六年赦敕契勘如不曽放過名件並合依祖宗以来赦敕催納方當内外告乏之時朝廷能收宜取之物以助國用非小補也宣和六年臣僚言西京等處二税及坊塲酒税拖欠貫萬不少悉非良民不納多是形勢頑猾人户欺隐又髙郵縣共欠一十餘萬貫石作逃移者四萬七千餘户每歳輙除額税五萬二千餘貫石盖州縣之官不能治豪右抑兼并貧下之户為豪右兼并其籍必妄申逃移失陷省税乞詔有司驅磨按治庻使貧下之民均被聖澤從之髙宗建炎二年詔元年夏秋税租及應欠負官物並除放紹興二年建盗范汝為平蠲本州路上四州今年夏秋税及夏料役錢下四州曽遭冦掠者蠲今年夏税三年詔諸州軍所欠紹興元年夏秋二税并和買上三等人户與倚閣一半第四等以下並倚閣分限三年帶納又詔潭郴鼎澧岳復循梅恵英䖍吉撫汀南雄荆南南安臨江皆盗賊所蹂踐及軍行經歴處與免科差及催欠各二年六年詔去年旱傷及四分已上州縣紹興四年以前積欠租税皆除之執政初議倚閣上曰若倚閣州縣因緣為姦又復催理擾人乃盡蠲之七年詔駐蹕及經由州縣見欠紹興五年已前賦税并坊塲淨利所負並蠲之二十一年詔自紹興十一年至十七年諸色拖欠錢物除形勢及公吏鄉司與第二等以上有力之家餘並蠲之二十三年溫州布衣萬春上書言乞將民間有利債欠還息與未還息及本與未及本者並除放庶少抑豪右兼并之權伸貧民不平之氣上謂輔臣曰若止償本則上户不肯放債反為細民害乃詔私債還利過本者並與依條除放二十六年吏部侍郎許興古言今銓曹有知縣縣丞共二百餘闕無願就者正緣財賦督廹民官被罪所以畏避如此若罷獻羡餘蠲民間積欠謹擇守臣戒飭監司奉法循理則稱民安矣詔行之二十八年三省言平江紹興府湖秀州被水欲除下户積欠擬令户部開具有無侵損歳計上曰不湏如此止令具數便於内庫撥還朕平時不妄費内庫所積正欲備水旱本是民間錢却為民間用何所惜乃詔平江等處應日前積欠税賦並蠲之二十九年詔諸路州縣紹興二十七年前積欠官錢三百九十七萬餘緡及四等以下户係官所欠皆除之三十年臣僚言自岳飛得罪湖北轉運司拘收前宣撫司庫務金幣物斛計直六百九十餘萬緡有未輸納者八十九萬緡至是一十年拘催不已此皆出軍支使及囘易逃亡之數即非侵盗無所追償望即除放從之紹興三十二年孝宗即位赦文應官司債負房賃税賦和買役錢及坊場河渡等截止紹興三十二年以前並除放如别立名額追納者許越訴官吏並坐之乾道元年正月有事於南郊赦蠲減並循舊制自後每三嵗郊禋赦皆如之詔蠲福建路寺觀寛剰錢先是閩部寺觀計口給食常住所餘盡為官拘是致僧道不肯留心管業田多不耕耕者旋復逃棄抑勒隣保補欠累及鄉民乃有是命廣東帥臣林安宅言近者湖南凶賊奔衝本路韶連南雄封州徳慶肇慶府之西㑹廣州之懐集清逺皆遭蹂踐或被焚蕩乞依廣西例免今年夏秋二税并合應副轉運司供贍荆南及本路大兵錢糧詔并英賀郴州桂陽軍未起錢物悉蠲之十二月宰執進呈立皇太子赦内一項應為人曾孫如祖孫四世見在特與免本身色役二税諸般科敷一年户部慮虧損嵗計欲每户放止五十千上曰豈可失信於人雖數多亦不奈何乾道二年詔饒州嵗進金一千兩特減七百兩五年蠲諸路州軍隆興元年至乾道二年終拖欠上供諸色窠名錢糧及乾道二年以前上供科糴綱運欠米又蠲江淮等路紹興二十七年至乾道二年終拖欠内藏庫嵗額錢共八十七萬五千三百緡有竒六年户部侍郎王佐等言軍興以後行在省倉諸路總所借兌過錢一百九十六萬餘緡銀三十八萬五千餘兩金二百餘兩度牒五千道殿歩馬軍司元借過酒本錢二十二萬五千餘緡及諸郡寄招軍兵兑支錢五萬八千緡起發忠勇軍衣賜綿一萬二千九百餘兩絹三千八百餘疋並乞蠲放從之九年詔大理寺見追贓錢自乾道七年二月以前並蠲之淳熈四年臣僚言屢赦蠲積欠以蘇疲民州縣不能仰體聖意至變易名色以取之宜下諸路漕司如合該除放無得更取之於州州無得更取之於縣仍督逐縣銷豁欠簿書其名數榜民通知詔可七年池州言檢放旱苗米四萬五千餘石其經總制錢二萬六千餘貫係於苗上收趂無所従出詔蠲之浙東提舉朱熹言去年水旱相繼朝廷命檢放秋苗蠲閣夏税縁起催在前善良畏事者多已輸納其所減放者皆頑猾人户事件不均望詔将去年剰納數目理作八年蠲豁詔户部看詳詔淳熈七年八年諸路州軍應住催併權免拘催候成理納或隨料留納苗税縁係連年旱傷可特與蠲放十年先是户部尚書曽懷申請妄訴災傷僥倖減免稅租許人告依條斷罪仍沒其田一半充賞至是江東運副蘇諤奏昨稱災傷止是規免本年一料税租斷罪給賞已是適中難以拘沒其田從之朱熹戊申封事臣伏見祖宗舊法凡州縣催理官物已及九分以上謂之破分諸司即行住催版曹亦置不問由是州縣得其贏餘以相補助貧民些小拖欠亦得遷延以待蠲放恩自朝廷恵及閭里君民兩足公私兩便此誠不刋之令典也昨自曾懷用事始除此法盡刷州縣舊欠以為隐漏悉行拘催於是民間稅物豪分銖兩盡要登足懷以此進身遂取宰相而生靈受害寃痛日深得財失民猶為不可况今政煩賦重民卒流亡所謂財者又無可得之理若不早救必為深害按以此二事觀之曾懷之為刻剝小人可知矣淳熈十六年二月光宗受禪即位蠲赦條畫一依夀皇登極赦事理臣僚言紹興三十二年赦止放官司債負今乃易官司之司為公私之私赦下之後並緣昬頼者衆乃詔私債納息過本者放未過本者免息還本並緣昏頼者科罪紹熈元年臣僚言陛下嗣位之初首議蠲貸意州縣可以均受其賜今郡之督責於縣者如故縣之誅求乎民者無所遺也乞令諸路監司將知名闕乏縣道諸郡公心共議蠲減無名之供而後禁戢不止之取一郡則通一郡之事力而寛融所當減之縣監司則通一路之事力而寛融所當減之州期以一季開具減放名色錢數聞奏詔可紹熈五年寧宗即位登極赦蠲放一如淳熈十六年故事慶元五年臣僚奏乞蠲潭州科納承平時黄河築埽鐡䌫錢寜國府抱認廢圩米從之二項係攸縣及宣城縣民田畝内抱認科納今除之嘉泰四年前知常州趙善防言貧民下户每嵗二税但有重納未嘗拖欠朝廷蠲放利歸攬户鄉胥而小民未嘗沾恩乞明詔自今郊霈與減放次年某料官物或全料或一半其日前殘零並要依數納足則貧民實被寛恩官賦亦易催理從之開禧元年詔免兩浙身丁錢絹自来年並除之右宋以仁立國蠲租已責之事視前代為過之而中興後尤多州郡所上水旱盗賊逃移倚閣錢榖則以詔㫖徑直蠲除無嵗無之殆不勝書姑撮其普及諸路與所蠲名目頗大者登載於此盖建炎以来軍興用度不給無名之賦稍多故不得不時時蠲減數目以寛民力又西蜀自張魏公屯軍關陜以趙開為隨軍轉運軍前支使饋饟尤浩故賦税茶鹽𣙜酤和買布絹對糴米糧及其他名色錢物錙銖必取率是増羡蜀民頗困事定之後凡無名横歛不急冗費多從蠲減云文獻通考卷二十七
