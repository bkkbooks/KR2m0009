body:
  text: 文獻通考卷二百十八鄱陽馬端臨貴與著經籍考四十五子農家漢藝文志曰農家者流蓋出於農稷之官播百榖勸耕桑以足衣食故八政一曰食二曰貨孔子曰所重民食此其所長也及鄙者為之以為無所事聖王欲使君臣並耕誖上下之序宋三朝藝文志歲時者本於敬授平秩之義殖物寳貨著譜録者亦佐助衣食之源故咸見於此陳氏曰農家者流勤耕桑以足衣食神農之言許行學之漢世野老之書不傳於後而唐志著録雜以歲時月令及相牛馬諸書是猶薄有關於農者至於錢譜相貝鷹鶴之屬於農何預焉今既多從其類而花果栽植之事猶以農圃一體附見於此其實則浮末之病農者也漢志九家一百一十四部隋志五部一十九卷唐志十九家二十六部二百三十五卷宋三朝志三十二部二百一十三卷宋兩朝志十二部四十七卷宋四朝志一十九部三十三卷宋中興志六十四家六十九部一百四十八卷齊民要術十卷鼂氏曰元魏賈思勰撰記民俗歲時治生種蒔之事凡九十二篇農家者本出於神農氏之學仲尼既稱禮義信足以化民焉用稼以誚樊須而告曾參以用天之道分地之利為庶人之孝言非不同意者以躬稼非治國之術乃一身之任也然則仕之倦游者詎可不知乎故今所取皆種藝之書也前世録史部中有歲時子部中有農事兩類實不可分今合之農家又以錢譜寘其間今以其不類移附類書陳氏曰起自耕農終於醯醢資生之業靡不畢書其曰治生之道不仕則農蓋名言也巽岩李氏序孫氏齊民要術音義解釋曰賈思勰著此書專主民事又旁摭異聞多可觀在農家最嶤然出其類而近世學者忽焉第竒字錯見徃徃艱讀今運使秘丞孫公為之音義解釋略備其正名辨物蓋與揚雄郭璞相上下不但借助於思勰也此書李淳風嘗演之淳風書遽亡韓諤又撮思勰所記别著四時纂要五卷本朝天禧四年詔並刻二書以賜勸農使者然其書與律令俱藏衆弗得習市人輙抄要術之淺近者摹印相師用才一二此有志於民者所當惜也今公幸以稽古餘力悉發其隠盍併刻焉豈惟决疑紏繆有益學者抑使斯民日用知所本末更被天禧遺澤不亦可乎四時纂要五卷鼂氏曰唐韓諤撰諤徧閲農書取廣雅爾雅定土產取月令家令叙時宜採氾勝種樹之書掇崔寔試榖之法兼刪韋氏目錄齊民要術編成陳氏曰雖時令之書然皆為農事也山居要術三卷陳氏曰稱王􅌈撰館閣書目作王旻皆莫知何時人也蠶書二卷陳氏曰孫光憲撰光憲事迹見小説類秦少游蠶書見少游淮海集第六卷序略曰予閒居婦善蠶從婦論蠶作蠶書考之禹貢揚梁幽雍不貢繭物兗篚織文徐篚元纎縞荆篚元纁璣組豫篚纎纊青篚檿絲皆繭物也而桑土既蠶獨言於兗然則九州蠶事兗為最乎子游濟河之間見蠶者豫事時作一婦不蠶比屋詈之故知兗人可為蠶師今予所書有與呉中蠶家不同者皆得之兗人也禾譜五卷陳氏曰宣德郎温陵曾安止移忠撰東坡所為賦秧馬歌也謂禾譜文既温雅事亦詳實惜其不譜農器故以此歌附之安止熙寜進士嘗為彭澤令農器譜三卷續二卷陳氏曰耒陽令曾之謹撰安止之姪孫也追述東坡作歌之意為此編周益公為之序陸務觀亦作詩題其後周平園序曰紹聖初元蘇文忠公軾南遷過太和邑人宣德郎致仕曾公安止獻所著禾譜文忠美其温雅詳實為作秧馬歌又惜不譜農器時曾公已喪明不暇為也後百餘年其姪孫耒陽令之謹始續成之凡耒耜耨鎛車戽蓑笠銍刈篠簣杵臼斗斛釡甑倉庾厥類惟十附以雜記勒成三卷皆考之經傳參合今制無不備者是可補伯祖之書成蘇公之志矣其序牛犂蓋一編之管轄予嘗學稼因演其説山海經曰后稷之孫叔均始作牛耕世以為起於三代予謂不然牛若常在畎畝武王平定天下胡不歸之三農而放之桃林之野乎故周禮祭牛之外以享賔駕車犒師而已未及耕也不然牽以蹊田正使藉稻何足為異乃設奪而罪之之喻邪在詩有云載芟載柞其耕澤澤千耦其耘徂隰徂畛又曰有略其耜俶載南畝以明竭作於春皆人力也至於穫之積之如墉如櫛然後殺時犉牡有捄其角以為社稷之報若使之耕曾不如迎猫迎虎列於蜡祭乎厥後王弼傳易以為稼穡之資宋景文公祁闢之曰古者牛惟服車書肇牽車牛易服牛乘馬漢趙過始教牛耕蓋本賈思勰齊民要術子謂輔嗣固失矣賈氏及景文亦未為得也按論語子謂仲弓曰犂牛之子騂且角雖欲勿用山川其舍諸此聖人格言也蓋犂田之牛純雜牝牡皆可祭牛則非純非牡不可故曰騂且角也注疏乃以犂為雜色騂為赤純色角為周正近世諸儒並從此義今觀周禮牧人時祀牲必用牷牷純色也外祭毁事用尨尨雜色也是則純雜之辨也封人設其楅衡魯頌夏而楅衡白牡騂剛是則言角之意也竊疑犂起於春秋之間故孔子有犂牛之言而弟子冉耕亦字伯牛彼禮記呂氏月令季冬出土牛示農耕早晩賈誼新書劉向新序俱載鄒穆公曰百姓飽牛而耕暴背而耘大率在秦漢之際何待趙過過特教人耦犂共二牛費省而功倍爾易傳出於魏晉第見牛耕不復考其初而賈公彥考工正義遂謂起於後漢其失尤甚農書三卷陳氏曰稱西山隠居全眞子陳雱撰未詳何人其書曰田曰牛曰蠶洪慶善為之後序耕桑治生要偹二卷陳氏曰宣教郎通判横州何先覺撰紹興癸酉序耕織圖一卷陳氏曰於潛令鄞樓璹玉撰攻媿參政之伯父也竹譜一卷鼂氏曰戴凱之撰凱之字慶預武昌人裒輯竹事四字一讀有韻類賦頌李邯鄲云未詳何代人筍譜二卷鼂氏曰皇朝僧惠崇撰陳氏曰僧贊寜撰續酒譜十卷鼂氏曰唐鄭遨雲叟撰纂輯古今酒事以續王績之書酒譜一卷陳氏曰汶上竇苹子野撰其人即著唐書音訓者北山酒經三卷陳氏曰不知撰人茶經三卷鼂氏曰唐太子文學陸羽鴻漸撰載產茶之地造作器具古今故事分十門陳氏曰羽自號竟陵子又號桑苧翁顧渚山記二卷鼂氏曰陸羽撰羽與皎然朱放軰論茶以顧渚為第一顧渚山在湖州呉王夫差顧望欲以為都故以名山煎茶水記一卷鼂氏曰唐張又新撰其所嘗水凡二十種因第其味之優劣陳氏曰唐涪州刺史張又新撰本刑部侍郎劉伯芻稱水之與茶宜者凡七等又新復言得李季卿所筆陸鴻漸水品凡二十歐公大明水記嘗辨之今亦載卷末余足跡所至不廣於水品僅嘗三四若惠山泉甘美置之第二不忝特未知康王谷水何如爾其次呉松第四橋水亦不惡虎邱劍池殊未佳而在第四已不可曉至於雪水清甘絶佳而居其末尤不可曉也大抵水活而後宜茶活而不清潔猶不宜故浮泉石池漫流者為上為其活且潔也若夫天一生水烝為雲雨水之活且潔者何以過此余嘗用淨器承雨水試以烹煎不減雪水故知又新之説妄也茶譜一卷鼂氏曰偽蜀燕文錫撰記茶故事其後附以唐人詩文建安茶録三卷鼂氏曰皇朝丁謂撰建州硏膏茶起於南唐太平興國中始進御謂咸平中為閩漕監督州吏創造規模精緻嚴謹録其團焙之數圖繪器具及叙採製入貢法式盧仝譏陽羡貢茶有安知百萬億蒼生墜在顚崖受辛苦之句余於謂亦云北苑拾遺一卷鼂氏曰皇朝劉异撰北苑建安地名茶為天下最异慶歴初在呉興採新聞附於丁謂茶録之末其書言滌磨調品之器甚備以補謂之遺也補茶經一卷又一卷鼂氏曰皇朝周絳撰絳祥符初知建州以陸羽茶經不載建安故補之又一本有陳龜注丁謂以為茶佳不假水之助絳則載諸名水云試茶録二卷鼂氏曰皇朝蔡襄君謨撰襄皇祐中修注仁宗嘗面諭云昨卿所進龍茶甚精襄退而記其烹試之法成書二卷進御世傳歐公聞君謨進小團茶驚曰君謨士人何故如此東溪試茶録一卷鼂氏曰皇朝朱子安集拾丁蔡之遺東溪亦建安地名其序謂七閩至國朝草木之異則產臈茶荔子人物之秀則產狀頭宰相皆前代所未有以時而顯可謂美矣然其草木厚味難多食其人物多智難獨任亦地氣之異云吕惠卿建安茶記一卷鼂氏曰皇朝吕惠卿撰聖宋茶論一卷鼂氏曰右徽宗御製茶雜文一卷鼂氏曰集古今詩文及茶者北苑總録十二卷陳氏曰興化軍判官曾伉録茶經諸書而益以詩歌二卷茶山節對一卷陳氏曰攝衢州長史蔡宗顔撰宣和北苑貢茶録一卷陳氏曰建陽熊蕃叔茂撰其子克義益寫其形製而傳之北苑别録一卷陳氏曰趙汝礪撰品茶要録一卷陳氏曰建安黄儒道父撰元祐中東坡嘗䟦其後荔枝譜一卷荔枝故事一卷鼂氏曰皇朝蔡襄記建安荔枝味之品第凡三十餘種古今故事陳氏曰君謨為此書且書而刻之與牡丹記並行閩無佳石以板刋歲久地又温皆蠧朽至今猶藏其家而字多不完可惜也增城荔枝譜一卷陳氏曰無名氏其序言福唐人熙寜九年承乏增城多植荔枝蓋非嶠南之大山實類吾鄉之晩熟搜境内所出得百餘種其初亦得閩中佳種植之故為是譜四時栽接花果圖一卷陳氏曰無名氏桐譜一卷陳氏曰銅陵逸民陳翥撰皇祐元年序何首烏傳一卷陳氏曰初見唐李翺集今後人增廣之耳海棠記一卷陳氏曰呉人沈立撰橘錄一卷陳氏曰知温州延安韓彥直子温撰世忠長子也菊譜一卷陳氏曰史正志志道撰孝宗朝為發運使者也范村梅菊譜二卷陳氏曰范成大至能撰有園在居第之側號范村糖霜譜一卷陳氏曰遂寜王灼晦叔撰言四方所產遂寜為冠灼自號頤堂蟹譜二卷陳氏曰稱怪山𫝊肱子翼撰嘉祐四年序怪山者越之飛來山也蟹略四卷陳氏曰高似孫續古撰越中牡丹花二卷陳氏曰僧仲林撰其序言越之所好尚惟牡丹其絶麗者三十二種始乎郡齋豪家名族梵宇道宫池臺水榭植之無間來賞花者不間親踈謂之花局澤國此月多有輕雲微雨謂之養花天里語曰彈琴種花陪酒陪歌末稱丙戌歲八月十五日移花日序丙戌者當是雍熙三年也越在國初繁富如此殆不減洛中今民貧至骨種花之風遂絶何今昔之異邪其故有二一者鏡湖為田歲多不登二者和買白著數倍常賦勢不得不貧也牡丹譜一卷鼂氏曰歐陽修撰初調洛陽從事見其俗重牡丹因著花品凡三篇陳氏曰蔡君謨書之盛行於世冀王宫花品一卷陳氏曰題景祐元年滄州觀察使記以五十種分為三等九品而潛溪緋平頭紫居正一品姚黄反居其下此不可曉也呉中花品一卷陳氏曰慶歴乙酉趙郡李英述皆出洛陽花品之外者以今日呉中論之雖曰植花未能如承平之盛也花譜二卷陳氏曰滎陽張峋子堅撰以花有千葉多葉黄紅紫白之别類以為譜凡千葉五十八品多葉六十二品又以芍藥附其末峋與其弟㟭子望同登進士第㟭嘗從邵康節學牡丹芍藥花品七卷陳氏曰不著名氏録歐公及仲林等諸家牡丹譜孔常甫芍藥譜共為一篇洛陽貴尚録一卷陳氏曰殿中丞新安邱濬道源撰專為牡丹作也其書援引該博而迂怪不經濬天聖五年進士通數知未來壽八十一及歛衣空人以為尸解新安志云爾芍藥譜一卷陳氏曰中書舍人清江劉攽貢甫撰芍藥圖序一卷陳氏曰待制新淦孔武仲常甫撰芍藥譜一卷陳氏曰知江都縣王觀通叟撰三家皆述維揚所産花之盛文獻通考卷二百十八
