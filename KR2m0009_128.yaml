body:
  text: 文獻通考卷一百二十八鄱陽馬端臨貴與著樂考一歷代樂制伏羲樂名扶來亦曰立本神農樂名扶持亦曰下謀見帝系譜及孝經緯又按隋樂志云伏羲有綱罟之詠伊耆有葦蘥之音葛天八闋神農五絃事與功偕其來尚矣黃帝作咸池堯增修而用之咸皆也池施也言德之無不施也又云池言其包容浸潤周禮曰大咸莊子北門成問於黃帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩默默乃不自得不自得坐忘之謂也北門成人姓名也帝曰女殆其然哉吾奏之以人徴之以天行之以禮義建之以大情夫至樂者非音聲之謂也必先順乎天律乎人得於心而適於性然後發之以聲奏之以曲耳故咸池之樂必待黃帝之化而後成焉徴之如字古本多作微大音泰四時迭起萬物循生一盛一衰文武倫經一清一濁隂陽調和流充其聲自然呂律以滿天地之間但當順而不奪則至樂全蟄蟲始作吾驚之以雷霆因其自作而用其所以動其卒無尾其始無首運轉無極一死一生一僨一起所常無窮以變化為常則所常者無窮也僨方問反司馬云敗也而一不可待汝故懼也初聞無窮之變不能待之以一故瞿然悚聽吾又奏之以隂陽之和燭之以日月之眀所謂用天之道其聲能短能長能柔能剛變化齊一不主故常齊一於變化故不主故常在谷滿谷在坑滿坑至樂之道無不用也坑苦更反爾雅云虛也塗郤守神塞其兑也郤去逆反與隙義同兑徒外反以物為量大制不割量音亮其聲揮綽所謂闡詣其名髙眀名當其實則髙眀也是故鬼神守其幽不離其所離力智反日月星辰行其紀不失其度吾止之物有窮常在極上注也流之於無止隨變而往也豫欲慮之而不能知也望之而不能見也逐之而不能及也故暗然恣使化去倘然立於四虛之道𢎞敞無偏之謂倘敕黨反一音敞倚於稿梧而吟無所復為也倚於綺反稿梧老反目知窮乎所欲見力屈乎所欲逐吾既不及巳矣言物之知力各有所齊限知音智齊才細反形充空虛乃至委蛇故怠夫形充空虛無身也無身故能委蛇委蛇任性而悚懼之情怠也吾又奏之以無怠之聲意既怠矣乃復無怠此其至也調之以自然之命命之所有者非為也皆自然耳故若混逐叢生混然無係隨叢而生叢才公反林樂而無形至樂者適而巳適在體中故無所形樂音洛亦如字布揮而不泄自布耳揮音輝廣雅云振也幽昏而無聲所謂至樂動於無方夫動者豈有方而後動哉居於窈𡨕所謂寧極窈鳥了反或謂之死或謂之生或謂之實或謂之榮行流散徙不主常聲隨物變也世疑之稽於聖人眀聖人應非世唱也稽古兮反聖也者逹於情而遂於命也故有情有命者莫不資焉天機不張而五官皆備此之謂天樂忘樂而樂足非張而後備無言而心説心説在適不在言也故有焱氏為之頌曰聽之不聞其聲視之不見其形充滿天地苞裹六極汝欲聽之而無接焉而故惑也比之無樂之樂樂之至也焱必遙反本亦作猋苞音包本或作包樂也者始於懼懼故祟瞿然竦聽故其祟耳未大和也祟蚩遂反吾次之以怠怠故遁迹稍減也卒之於惑惑故愚愚故道道可載而與之俱也以無知而愚愚乃至也少皥作大淵見帝王世紀顓頊作六莖莖根也謂澤及下也帝嚳作六英英謂華茂也唐堯作大章章眀也言堯德章眀也虞舜作大韶韶繼也言舜能繼堯之德周禮曰大㲈帝曰夔命汝典樂教胄子胄長也謂元子以下至卿大夫子弟以歌詩舞之蹈之教長國子中和祇庸孝友王之胄子國子也直而溫寬而栗正直而溫和寬𢎞而莊栗剛而無虐簡而無傲剛失之虐簡失之傲教之以防其失詩言志歌永言聲依永律和聲聲五聲律六律六吕十二月之音氣言當依聲律以和樂八音克諧無相奪倫倫理也八音能諧理不錯奪神人以和夔曰戞擊鳴球搏拊琴瑟以詠祖考來格此舜廟堂之樂民悅其化神歆其祀禮備樂和故以祖考來至眀之戞擊以下注見樂器門虞賓在位羣后德讓下管鼗鼓合止祝敔堂下樂也上下合止樂各有柷敔鳴球弦鐘籥各自互見笙鏞以間鳥獸蹌蹌蹌蹌舞貌鳥獸化德相率而舞簫韶九成鳯凰來儀韶舜樂名言簫見細器之備儀有容儀備樂九奏而致鳯凰則餘鳥獸不待九而率舞夔曰於豫擊石拊石百獸率舞石磬聲之清者舉清者和則其餘皆從矣樂感百獸率舞則神人和可知庶尹允諧尹正也衆正官之長信皆和諧言神人治子謂韶盡美矣又盡善也美者音容之盛善者美之實也子在齊聞韶三月不知肉味曰不圖為樂之至於斯也史記三月上有學之二字不知肉味蓋心一於是而不及其他也曰不意舜之作樂至於如此之美則有以見其情文之備而不覺其歎息之深也蓋非聖人不足以及此耳夏禹作大夏夏大也言禹能大堯舜之德禹命登扶氏為承夏之樂有鐘鼓磬鐸鞉鐘所以記有德鼓所以謀有道磬所以待有憂鞉所以察有説理天下以五聲為銘於簨簴商湯作大濩湯以寬理人而除邪惡其德能使天下得其所言盡護救於人也那猗與那與置我鞉鼓猗歎辭那多也鼗鼓樂之所成也殷人置鼓箋云置讀曰植植鼗鼓者為楹貫而樹之美湯受命伐桀定天下而作濩樂故歎之多其改夏之制乃始植我殷家之樂鼗與鼓也鼗雖不植貫而搖之亦植之類奏鼓簡簡衎我烈祖湯孫奏假綏我思成衎樂也烈祖有功烈之祖也假大也箋云奏鼓奏堂下之樂也假升綏安也以金奏堂下諸縣其聲和大簡簡然以樂我功烈之祖成湯湯孫太甲又奏升堂之樂弦歌之乃安我心所思而成之謂神眀來格也鼗鼓淵淵嘒嘒管聲既和且平依我磬聲嘒嘒和也平正平也依倚也磬聲之清者也以象萬物之成周尚臭殷尚聲箋云磬玉磬也堂下諸縣與諸管聲皆和平不相奪倫又與玉磬之聲相依亦謂和平也玉磬尊故異言也於赫湯孫穆穆厥聲庸鼓有斁萬舞有奕言盛矣湯為人子孫也大鐘曰庸斁斁然盛奕奕然間也箋云穆穆美也於盛矣湯孫呼太甲也此樂之美其聲鐘鼓則斁斁然有次序其於舞又間習也紂棄先祖之樂乃作淫聲書曰作竒伎淫巧以悅婦人言紂廢至尊之敬營卑褻之事過制伎巧以資耳目之娛周武王作大武武以武功定天下也子謂武盡美矣未盡善也美善解見上舜紹堯致治武王伐紂救民其功一也故其樂皆盡美然舜之德性之也又以揖遜有天下武王之德反之也又以征誅得天下故其實有不同者賓牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已久何也對曰病不得其衆也武謂周舞也備戒擊鼓警衆病猶憂也以不得衆心為憂憂其難也二疏曰孔子之間凡五賓牟賈所答亦五但三答是答非今此答是也言武王伐紂之時憂病不得士衆之心故先鳴鼓以戒士衆久乃出戰今武樂故令舞者久而不即出象武王憂不得衆心也咏歎之淫液之何也對曰恐不逮事也咏歎淫液歌遲之也逮及事戎事也發揚蹈厲之巳蚤何也對曰及時事也時至武事當施也武坐致右憲左何也對曰非武坐也言武之事無坐也致謂膝至地也憲讀為軒聲之誤也聲淫及商何也對曰非武音也言武歌在正其軍不貪商也時人或説其義為貪商子曰若非武音則何音也對曰有司失其傳也若非有司失其傳則武王之志荒矣有司典樂者也傳猶説也荒老耄也言典樂者失其説而時人妄説也子曰唯丘也聞諸萇𢎞亦若吾子之言也萇𢎞周大夫疏曰恐不逮事者言欲舞之前有此咏歎淫液之歌者象武王伐紂恐諸侯不至不逮其戰事故歌聲吟咏而歆羡此答是也初舞之時手足發揚蹈地而猛厲舞初則然故云已蚤及時事也言武王及時伐紂戰事也故發揚象戰此答非也知非者下云發揚蹈厲是太公之志故知此答非也致至也軒起也問武人何忽有時而跪以右膝至地而左足仰之何故也對曰非武坐也言致右軒左非是武人之坐言以舞法無坐也此答亦非知非者以下云武亂皆坐周召之治是武法有坐也非武音也者謂非是武樂之音言武王應天順人不得已而伐之何容有貪商之聲故言非武音此答是賓牟賈起免席而請曰夫武之備戒之已久則既聞命矣敢問遲之遲而又久何也遲之遲謂久立於綴綴疏曰賀氏云備戒已久是遲久立於亦是遲而久巳子曰居吾語汝夫樂者象成者也總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也成謂巳成之事總干持盾也山立猶正立也象武王持盾正立待諸侯也發揚蹈厲所以象威武時也武舞象戰鬬也亂謂失行列也失行列則皆坐象周公召公以文止武也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇成猶奏也每奏武曲一終為一成始奏象觀兵孟津時也再奏象克殷時也三奏象克殷有餘力而反也四奏象南方荆蠻之國侵畔者服也五奏象周公召公分職而治也六奏象兵還振旅也復綴反位止也崇充也凡六奏以充武樂也正義曰成謂曲之終成每一曲終成而更奏故云成猶奏也云復綴反位止也者謂最在南第一位初舞之時從此位入北至六成還反此位鄭注以充武樂者充謂充備言六奏其曲則舞樂充備者也天子夾振之而駟伐盛威於中國也夾振之者王與大將夾舞者振鐸以為節也駟當為四聲之誤也武舞戰象也每奏四伐一擊一刺為一伐牧誓曰今日之事不愆於四伐五伐乃止齊焉分夾而進事蚤濟也分猶部曲也事猶為也濟成也舞者各有部曲之列又夾振之者象用兵務於早成也久立於綴以待諸侯之至也象武王伐紂待諸侯也且女獨未聞牧野之語乎欲語以作武樂之意武王克殷及商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於把投殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位庶民弛政庶士倍祿濟河而西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲釁而藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜然後天下知武王之不復用兵也散軍而郊射左射貍首右射騶虞而貫革之射息也裨冕搢笏而虎賁之士説劒也祀乎眀堂而民知孝朝覲然後諸侯知所以臣耕籍然後諸侯知所以敬五者天下之大教也食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也若此則周道四逹禮樂交通則夫武之遲久不亦宜乎言武遲久為重禮樂成王時周公作勺勺言勺先祖之道勺讀曰酌勺取也又有房中之樂以歌后妃之德大司樂以樂德教國子公卿大夫之子弟中和祗庸孝友中猶忠和剛柔適也祗敬也庸有常也以樂語教國子興道諷誦言語興者以善物喻善事道讀作導言古以剴今也倍文曰諷以聲節之曰誦發端曰言答述曰語以樂舞教國子舞雲門大卷大咸大韶大夏大濩大武此周所存六代之樂黃帝曰雲門大卷黃帝能成名萬物以眀民共財言其德如雲之所出人得以有族類也卷音其爰反以六律六吕五聲八音六舞大合樂以致鬼神祇以和邦國以諧萬民以安賓客以説逺人以作動物六律合陽聲者六吕合隂聲者此十二者以銅為管轉而相生黃鍾為首律長九寸各因而三之上生者三分益一分下生者三分去一分焉國語曰律所以立均出度也古者神瞽考中聲而量之度律均鍾言以中聲定律以律立鍾之均也大合樂者謂遍作六代之樂也以冬日至作之致天神人鬼以夏日至作之致地祇物魅動物羽裸之屬虞書云夔曰戞擊鳴球摶拊琴瑟以詠祖考來格虞賓在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳯凰來儀夔又曰於豫擊石拊石百獸率舞庶尹允諧此其於宗廟九奏而應之乃分樂而序之以祭以饗以祀分謂各用一代之樂乃奏黃鍾歌大吕舞雲門以祀天神以黃鍾之鍾大呂之聲為之均也黃鍾陽聲之首大吕為之合奏之以祀天神尊之也天神五帝及日月星辰王者又各以夏正月祀其所受命之帝於南郊尊之孝經説曰王者祭天於南郊就陽位是也乃奏太蔟歌應鍾舞咸池以祭地祇太蔟陽聲第二者應鍾為之合咸池大咸地祇所祭於北郊謂神州之神及社稷乃奏姑洗歌南呂舞大韶以祀四望姑洗陽聲第三者南呂為之合四望五嶽四鎮四瀆此言祀者司中司命風師雨師或亦用此樂乃奏蕤賓歌函鍾舞大夏以祭山川蕤賓陽聲第四者函鍾為之合函鍾亦名林鍾函户南反乃奏夷則歌小吕舞大濩以享先妣夷則陽聲第五小吕一名中吕先妣薑嫄履大人迹感神靈而生后稷是周之先母周立廟自后稷為始祖而薑嫄無所配是以特立廟而祭之謂之閟宫乃奏無射歌夾鍾舞大武以享先祖無射陽聲之下者夾鍾為之合夾鍾一名圜鍾先祖謂先公先王也凡六樂者文之以五聲播之以八音六者言其均皆待五聲八音乃成也播之言被也凡六樂者一變而致羽物及川澤之祇再變而致裸物及山林之祇三變而致鱗物及邱陵之祇四變而致毛物及墳衍之祇五變而致介物及土祇六變而致象物及天神變猶更也樂成則更奏也此謂大蠟索鬼神而致百物六奏樂而禮畢東方之祭則用太蔟姑洗南方之祭則用蕤賓西方之祭則用夷則無射北方之祭則用黃鍾為均焉每奏有所感致和以來之凡物動敏疾者地祇髙下之甚者易致羽物既飛又走川澤有孔竅者蛤蟹走則遲墳衍孔竅則小矣是其所以舒疾之分土祇原隰及平地之神也象物有象在天禮運所謂四靈者麟鳯龜龍是也天地之神四靈之知非德至和則不能至凡樂圜鍾為宫黃鍾為角大蔟為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫太蔟為角姑洗為徴南呂為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地祇皆出可得而禮矣凡樂黃鍾為宫大吕為角太蔟為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣此三者皆禘大祭也天神則主北辰地祇則主崑崙人鬼則主后稷先奏是樂以致其神禮之以玉而祼焉乃後合樂而祭之大傳曰王者必禘其祖之所自出祭法曰周人禘嚳而郊稷謂此祭天圜丘以嚳配之圜鍾夾鍾也夾鍾生於房心之氣房心為大辰天帝之眀堂函鍾林鍾也林鍾生於未之氣未坤之位或曰天社在東井輿鬼之外天社地神也黃鍾生於虛危之氣虛危為宗廟以此三者為宫用聲類求之天宫夾鍾隂聲其相生從陽數其陽無射無射上生中呂中呂與地宫同位不用也中吕上生黃鍾黃鍾下生林鍾林鍾地宫又不用林鍾上生太蔟太蔟下生南吕南吕與無射同位又不用南吕上生姑洗地宫林鍾林鍾上生太蔟太蔟下生南呂南吕上生姑洗人宫黃鍾黃鍾下生林鍾林鍾地宫又辟之林鍾上生太蔟太蔟下生南吕南吕與天宫之陽同位又辟之南呂上生姑洗姑洗南呂之合又辟之姑洗下生應鍾應鍾上生蕤賓蕤賓地宫林鍾之陽也又辟之蕤賓上生大吕凡五聲宫之所生濁者為角清者為徴羽此樂無商者祭尚柔商堅剛也鄭司農云靁鼓靁鼗皆謂大面有革可擊者也雲和地名也靈鼓靈鼗四面路鼓路鼗二面九德之歌春秋傳所謂水火金木土榖謂之六府正德利用厚生謂之三事六府三事謂之九功九功之德皆可歌也謂之九歌也康成謂靁鼓靁鼗八面靈鼓靈鼗六面路鼓路鼗四面孤竹竹特生者孫竹竹枝根之末生者隂竹生於山北者雲和空桑龍門皆山名九㲈讀當為大韶字之誤也凡樂事大祭祀宿縣遂以聲展之即聼其聲具陳次之以知完不王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏帥國子而舞大饗不入牲其他皆如祭祀大射王出入令奏王夏及射令奏騶虞詔諸侯以弓矢舞王大食三宥皆令奏鐘鼓王師大獻則令奏愷樂凡日月食四鎮五嶽崩大傀異災諸侯薨令去樂大札大凶大災大臣死凡國之大憂令弛縣凡建國禁其淫聲過聲凶聲慢聲大喪涖廞樂器及葬藏樂器亦如之子曰吾自衛反魯然後樂正雅頌各得其所魯哀公十一年冬孔子自衛反魯是時周禮在魯然詩樂亦頗殘闕失次孔子周流四方參互考訂以知其説晚知道終不行故歸而正之子語魯太師樂曰樂其可知也始作翕如也縱之純如也皎如也繹如也以成語告也太師樂官名時音樂廢缺故孔子教之翕合也縱放也純和也皎眀也繹相續不絶也成樂之一終也謝氏曰五音六律不具不足以為樂翕如言其合也五音合矣清濁髙下如五味相濟而後和故曰純如合而和矣欲其無相奪倫故曰皎如然豈宫自宫而商自商乎不相反而相連如貫珠可也故曰繹如也以成子曰師摯之始關雎之亂洋洋乎盈耳哉師摯魯樂師名摯也亂樂之卒章也史記曰關雎之亂以為風始洋洋美盛意孔子自衛反魯而正樂適師摯在官之初故樂之美盛如此也太師摯適齊太師魯樂官之長摯其名也亞飯干適楚三飯繚適蔡四飯缺適秦亞飯以下以樂侑食之官白虎通曰王者平旦食晝食脯食莫食凡四食諸侯三飯大夫再飯故魯之樂官自亞飯以下蓋三飯也干繚缺皆名也鼓方叔入於河鼓擊鼓者方叔名河河內播鼗武入於漢少師陽擊磬襄入於海少師樂官之佐陽襄二人名襄即孔子所從學琴者海海島也此記賢人之隱遁以附前章張子曰周衰樂廢夫子自衛反魯一嘗治之其後伶人賤工識樂之正及魯益衰三桓僭妄自太師以下皆散之四方逾河蹈海以避亂聖人俄頃之助功化如此如有用我期月而可豈虛語哉鄭衛之音亂世之音也比於慢矣比猶同也桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也濮水之上地有桑間者亡國之音於此水出也昔殷紂使師延作靡靡之樂已而自沉於濮水後衛靈公將之晉舍濮水之上夜半聞鼓琴之聲聞左右皆對曰不聞乃召師涓聼而寫之至晉見平公公享之靈公曰今者聞新聲請奏之即命師涓坐師曠之旁援琴鼓之未終師曠止之曰此亡國之聲昔師延所作也與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必於濮水之上聞之也右周室既衰雅樂漸廢淫聲迭起夫子欲起而正之而不得其位以行其志然當時雖以優伶賤工猶有所守而不輕為流俗所移如師曠止濮上之音摯干而下至逾河蹈海以避世者必以不能諧世俗之樂故也魏文侯問於子夏曰吾端冕而聼古樂則唯恐臥聼鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也魏文侯晉大夫畢萬之後僭諸侯者也端元衣也古樂先王之正樂也子夏對曰今夫古樂進旅退旅和正以廣弦匏笙簧會守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也旅猶俱也俱進俱退言其齊一也和正以廣無姦聲也會猶合也皆也言衆待擊鼓乃作周禮太師職曰大祭祀師瞽登歌合奏擊拊下管播樂器合奏鼓􅉧文謂鼓也武謂金也相即拊也亦以節樂拊者以韋為表裝之以粳粳一名相因以名焉今齊人或謂粳為相雅亦樂器名也狀如漆筒中有椎夫音扶下同廣如字舊古曠反匏白交反笙音生簧音黃拊音撫注同復音伏相息亮反注同節拊也以韋為之實之以粳王云輔相也今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也俯猶曲也言不齊一也濫濫竊也溺而不止聲淫亂無以治之獶獮猴也言舞者如獮猴戲也亂男女之尊卑獶或為優獶乃刀反獮猴依字亦作猱今君之所問者樂也所好者音也夫樂者與音相近而不同言文侯好音而不知樂也鏗鏘之類皆為音應律乃為樂好呼報反注同近附近之近與如字鏗苦更反鏘七羊反又七衡反文侯曰敢問如何欲知音樂異意子夏對曰夫古者天地順而四時當民有德而五穀昌疾疢不作而無妖祥此之為大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂德音德音之謂樂當謂樂不失其所當丁浪反詩云莫其德音其德克眀克眀克類克長克君王此大邦克順克俾比于文王其德靡悔既受帝祉施于孫子此之謂也此有德之音所謂樂也德正應和曰莫照臨四方曰眀朝覲無私曰類教誨不倦曰長慶賞刑威曰君慈和遍服曰順俾當為比聲之誤也擇善從之曰比施延也言文王之德皆能如此故受天福延於後世也今君之所好者其溺音乎言無文王之德則所好非樂也文侯曰敢問溺音何從出也玩習之久不知所由出也玩又作玩音五換反子夏對曰鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音敖辟喬志此四者皆淫於色而害於德是以祭祀弗用也言四國皆出此溺音濫濫竊姦聲也燕安也春秋傳曰懷與安實敗名趨數讀為促速聲之誤也煩勞也祭祀者不用淫樂詩云肅雍和鳴先祖是聼夫肅肅敬也雍雍和也夫敬以和何事不行言古樂敬且和故無事而不用溺音無所施為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也誘進也孔甚也言民從君所好惡進之於善無難易以䜴反然後聖人作為鞉鼓椌楬塤箎此六者德音之音也六者為本以其聲質也椌楬謂柷敔也塤箎或為簨虡椌苦江反柷也楬苦瞎反敔也然後鐘磬竽瑟以和之干戚旄翟以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼之序也官序貴賤謂尊卑樂器列數有差次鐘聲鏗鏗以立號號以立橫橫以立武君子聼鐘聲則思武臣號號令所以警衆也橫充也謂氣作充滿也號胡到反橫古曠反充也石聲磬磬以立辨辨以致死君子聼磬聲則思死封疆之臣石聲磬磬當為罄字之誤也辨謂分眀於節義磬口挺反一音口定反聼磬口定反疆居良反不是強字絲聲哀哀以立廉廉以立志君子聼琴瑟之聲則思志義之臣廉廉介也竹聲濫濫以立會會以聚衆君子聼竽笙簫管之聲則思畜聚之臣濫之意猶攬聚也會猶聚也聚或為最濫力敢反鼓鼙之聲歡歡以立動動以進衆君子聼鼓鼙之聲則思將帥之臣聞歡囂則人意動作歡或為歡動或為勳君子之聼音非聼其鏗鏘而已也彼亦有所合之也以聲合成已之意孟子見梁惠王曰王嘗語莊子以好樂有諸王變乎色曰寡人非能好先王之樂也直好世俗之樂耳莊暴齊臣變色者慚其好之不正也曰王之好樂甚則齊其庶幾乎今之樂猶古之樂也庶幾近辭也今樂世俗之樂古樂先王之樂曰可得聞歟曰獨樂樂與人樂樂孰樂曰不若與人曰與少樂樂與衆樂樂孰樂曰不若與衆獨樂不若與人與少樂不若與衆亦人之常情臣請為王言樂此以下皆孟子之言今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉疾首蹙頞而相告曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散今王田獵於此百姓聞王車馬之音見羽旄之美舉疾首蹙頞而相告曰吾王之好田獵夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也鐘鼓管籥皆樂器也舉皆也疾首頭痛也蹙聚也頞額也人憂戚則蹙其額極窮也羽旄旌屬不與民同樂謂獨樂其身而不恤其民使之窮困也今王鼓樂於此百姓聞王鐘鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能鼓樂也今王田獵於此百姓聞王車馬之音見羽旄之美舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能田獵也此無他與民同樂也與民同樂者推好樂之心以行仁政使民各得其所也今王與百姓同樂則王矣好樂而能與百姓同之則天下之民歸之矣所謂齊其庶幾者如此范氏曰戰國時民窮財盡人君獨以南面之樂自奉其身孟子切於救民故因齊王之好樂開導其善心深勸其與民同樂而謂今樂猶古樂其實今樂古樂何可同也但與民同樂之意則無古今之異耳若必欲禮樂治天下當如孔子之言必用韶舞以放鄭聲蓋孔子之言為邦之正道孟子之言救時之急務所以不同楊氏曰樂以和為主使人聞鐘鼓管籥之聲而疾首蹙頞則雖奏以咸英韶濩無補於治也故孟子告齊王以此姑正其本而已按春秋時雖伶官猶以姦聲淫樂為可恥而戰國之際則時君直以世俗之樂為可好蓋世變於是愈下矣然去之百世之後先王之古樂絶響而聖賢之格言猶存深思而熟玩之猶可以得流風遺韻之髣佛也故以子夏孟子之説繼夫子論樂之後秦始皇平天下六代廟樂唯韶武存焉二十六年改周大武曰五行房中曰壽人衣服同五行樂之色二世尤以鄭衛之音為娛丞相李斯進諫曰放棄詩書極意聲色祖伊所以懼也輕積細過恣心長夜紂所以亡也趙髙曰五帝二王樂各殊名示不相襲朝廷下至人民得以接歡喜合殷勤非此和説不通解澤不流亦各一世之化度時之樂何必華山之騄耳而后行遠乎二世然之右太史公樂書所述如此如李斯進諫之言殊與其素論相反蓋焚經滅籍者李斯之説也恣情縱欲者趙髙之説也二論相須以相成而始皇之所謂貽謀二世之所謂善繼同此一道耳斯既進邪説以媚始皇而復欲持正論以抗髙猶勸人以飲而復咎其醉也豈不愚哉漢興樂家有制氏魯人善樂事以雅樂聲律世世在太樂官但能紀其鏗鏘鼓舞而不能言其義鏗鏘金石之聲髙祖時叔孫通因秦樂人制宗廟樂太祝迎神於廟門奏嘉至猶古降神之樂也皇帝入廟門奏永至以為行步之節猶古采齊肆夏也歌樂在逸詩乾豆上奏登歌乾豆晡羞之屬獨上歌不以管弦亂人聲欲在位者遍聞之猶古清廟之歌也登歌再終下奏休成之樂叔孫通所奏作美神眀既饗也皇帝就酒東廂坐定奏永安之樂美禮巳成也又有房中祠樂髙祖唐山夫人所作也髙祖姬也姓唐山周有房中樂至秦名曰壽人凡樂樂其所生禮不忘本髙祖樂楚聲故房中樂楚聲也帝既定天下過沛與故人父老相樂醉酒歡哀作風起之詩令沛中僮兒百二十人習而歌之帝崩令沛得以四時歌舞宗廟令歌兒習以相和嘗以百二十人為員六年又作昭容樂禮容樂昭容者猶古之昭夏也主出武德舞言昭容樂生於武德舞也禮容者主出文始五行舞舞入無樂者將至至尊之前不敢以樂也出用樂者言舞不失節能以樂終也大抵皆因秦舊事焉孝惠二年使樂府令夏侯寬備其簫管更名曰安世樂孝景元年詔髙皇帝廟奏武德文始五行之舞孝惠廟奏文始五行之舞孝文廟奏昭武文始五行之舞武德舞者髙祖四年作以象天下樂已行武以除亂也文始舞者曰本舜招舞也髙祖六年更名曰文始以示不相襲也五行舞者本周舞也秦始皇二十六年更名曰五行也四時舞者孝文所作以示天下之安和蓋樂已所自作眀有制也樂先王之樂眀有法也孝景采武德舞以為昭德以尊太宗廟武帝定郊祀之禮乃立樂府樂府之名始此至哀帝而罷之采詩夜誦采詩依古遒人徇路采取百姓謳謡以知政教得失也夜誦者其言辭或祕不可宣露故於夜中歌誦也有趙代秦楚之謳以李延年為協律都尉多舉司馬相如等數十人造為詩賦略論律吕以合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至眀時嬖臣李延年以好音見上善之下公卿議曰民間祠有鼓舞樂今郊祀而無樂豈稱乎公卿曰古者祠天地皆有樂而神祇可得而禮或曰泰帝使素女鼓五十弦琴瑟悲帝禁不止故破其瑟為二十五弦於是塞南越禱祠泰一后土始用樂舞益召歌兒作二十五弦及空侯瑟自此起河間獻王有雅材以為治道非禮樂不成因獻所集雅樂天子下大樂官常存肄之歲時以備數然不常御常御及郊廟皆非雅聲然詩樂施於後嗣猶得有所祖述班孟堅曰昔殷周之雅頌乃上本有娀薑嫄卨稷始生元王公劉古公泰伯王季薑太妊太姒之德乃及成湯文武受命武丁成康宣王中興下及輔佐阿衡周召太公申伯召虎仲山甫之屬君臣男女有功德者靡不褒揚功德既信美矣褒揚之聲盈乎天地之間是以光名著於當世遺譽垂於無窮也今漢郊廟詩樂未有祖宗之事八音調均又不協於鍾律而內有掖庭才人外有上林樂皆以鄭聲施之於朝廷孝宣采昭德舞為盛德詔世宗孝武廟奏盛德文始四時五行之舞其後諸帝廟皆常奏文始四時五行之舞本始四年詔樂府減樂人神爵五鳯之間天下殷富數有嘉應上頗作歌詩欲興協律之事丞相魏相奏知音善鼓雅琴者渤海趙定梁國龔德皆召見待詔元帝多材藝善史書鼓琴瑟吹洞簫自度曲被歌聲分寸節度窮極窈眇帝被疾不親政事留好音樂或置鼙鼓殿下天子自臨軒檻上隤銅圜以擲鼓聲中嚴鼓之節後宫及左右習知音者莫能為而定陶王亦能之上數稱其材史丹進曰凡所謂材者敏而好學溫故知新皇太子是也若乃器人於絲竹鼓鼙之間則是陳惠李微二人皆黃門鼓吹髙於匡衡可相國也上笑成帝時謁者常山王禹世受河間樂能説其義其弟子宋曄等上書言之下大夫博士平當等考試當以為漢承秦滅道之後賴先帝聖德博受兼聼修廢官立太學河間獻王聘求幽隱修興雅樂以助化時大儒公孫𢎞董仲舒等皆以為音中正雅立之大樂春秋鄉射作於學官希闊不講師古曰講謂論習也故自公卿大夫觀聼者但聞鏗鏘不曉其意而欲以風諭衆庶其道無由師古曰風化也是以行之百有餘年德化至今未成宋曄等習孤學大指歸於興助教化衰微之學興廢在人宜領屬雅樂以繼絶表微師古曰表顯也孔子曰人能𢎞道非道𢎞人河間區區小國藩臣以好學修古能有所存師古曰存意於禮樂民到於今稱之况於聖主廣被之資師古曰被猶覆也音皮義反修起舊文放鄭近雅述而不作信而好古於以風示海內揚名後世誠非小功小美也事下公卿以為久遠難分眀當議復寢哀帝時詔罷樂府官郊祭樂及古兵法武樂在經非鄭衛之樂者條奏别屬他官時鄭聲尤甚黃門名倡丙疆景武之屬富顯於世貴戚五侯定陵富平外戚之家五侯王鳯以下定陵淳于長富平張放淫侈過度至與人主爭女樂帝自為定陶王時疾之又性不好音及即位下詔曰惟世俗奢泰文巧而鄭衛之聲興夫奢泰則下不孫而國貧師古曰孫讀為遜文巧則趨末背本者衆師古曰趨讀曰趣趣嚮也鄭衛之聲興則淫辟之化流而欲黎庶敦朴家給猶濁其源而求其清流豈不難哉孔子不云乎放鄭聲鄭聲淫其罷樂府官郊祀樂及古兵法武樂在經非鄭衛之樂者條奏别屬他官丞相孔光大司空何武奏郊祭樂人員六十二人給祠南北郊大樂鼓員六人嘉至鼓員十人邯鄲鼓員二人騎吹鼓員三人江南鼓員二人淮南鼓員四人巴渝鼓員三十六人師古曰巴巴人也渝渝人也當髙祖初為漢王得巴渝人並趫捷善鬬與之定三秦因存其武樂也巴渝之樂因此始也巴即今之巴州渝即今之渝州各其本地歌鼓員二十四人楚嚴鼓員一人梁皇鼓員四人臨淮鼓員三十五人兹邡鼓員三人晉灼曰邡音方凡鼓十二員百二十八人朝賀置酒陳殿下應古兵法外郊祭員十二人諸族樂人兼雲招給祠南郊用六十七人師古曰招讀與翹同兼給事雅樂用四人夜誦員五人剛别柎員二人給盛德師古曰剛及别柎皆鼓名也柎音膚主調箎員二人師古曰箎以竹為之七孔亦笛之類也音池聼工以律知日冬夏至一人鐘工磬工簫工員各一人僕射二人主領諸樂人皆不可罷竽工員三人一人可罷師古曰竽笙類也三十六簧音于琴工員五人三人可罷柱工員二人一人可罷師古曰柱工主箏瑟之柱者繩弦工員六人四人可罷師古曰弦琴瑟之弦繩言主糾合作之也鄭四會員六十二人一人給事雅樂六十一人可罷張瑟員八人七人可罷安世樂鼓員二十人十九人可罷沛吹鼓員十二人族歌鼓員二十七人陳吹鼓員十三人商樂鼓員十四人東海鼓員十六人長樂鼓員十三人師古曰縵樂雜樂也音漫凡鼓八員一百二十八人朝賀置酒陳前殿房中不應經法治竽員五人楚鼓員六人常從倡三十人常從象人四人孟康曰象人若今戲蝦魚獅子者也韋昭曰著假面者也師古曰孟説是詔隨常從倡十六人秦倡員二十九人秦倡象人員三人詔隨秦倡一人雅大人員九人朝賀置酒為楚樂四會員十七人巴四會員十二人銚四會員十二人李竒曰疑是鼗韋昭曰銚國名音繇師古曰韋説是也銚音姚齊四會員十九人蔡謳員三人齊謳員六人竽瑟鐘磬員五人皆鄭聲可罷師學百四十二人其七十二人給大官挏馬酒李竒曰以馬乳為酒撞挏乃成也師古曰挏音動馬酪味如酒飲之亦醉故呼馬酒其七十人可罷大凡八百二十九人其三百八十八人不可罷可領屬大樂其四百四十一人不應經法或鄭衛之聲可罷奏可然百姓漸漬日久又不制雅樂相變豪富吏民湛沔自若湛讀沈又耽平帝元始元年放鄭聲五年召天下通知鍾律者世祖建武十三年四月耿弇罷益州傳送公孫述瞽師郊廟樂器葆車輿輦於是法物始備隴蜀平後乃增廣郊祀凡樂奏青陽朱眀西皓元冥及雲翹育命舞其後登封泰山北郊祀后土用樂皆如南郊眀帝永平三年博士曹充上言漢再受命宜興禮樂引尚書璇璣鈐曰有帝漢出德洽作樂名豫乃詔改大樂官曰大豫樂詩曲操以俟君子自是樂凡四品一曰大豫樂郊廟上陵諸食舉之二曰周頌雅樂辟雍饗射六宗社稷用之三曰黃門鼓吹樂天子宴樂羣臣用之四曰短簫鐃樂軍中用之即凱歌也又采百官詩頌以為登歌其後章帝親著歌詩四章列在食舉又制雲臺十二門詩各以其月祀而奏之熹平四年中出雲臺十二門新詩下大豫樂官習誦被聲與舊詩並行撰録以成樂志大豫樂令掌伎樂凡國祭祀掌請奏樂及大饗用樂掌其陳序十月蒸祭光武廟初奏文始五行武德之舞光武草創禮樂未備今始奏之既而公卿奏議世祖廟登歌八佾舞功名東平王蒼議以為漢制舊典宗廟各奏其樂不皆相襲以眀功德髙皇帝除殘賊有天下作武德之舞孝文躬行節儉除刑施澤景帝制昭德之舞孝武開地置郡威震海外宣帝制盛德之舞光武皇帝受命中興撥亂反正宇內治平方外震服修建三雍肅穆典祀功德巍巍比隆前代樂名宜曰大武之舞宗文始五行武德之舞為之章帝即位太尉趙熹奏孝眀皇帝功德茂盛宜上尊號曰顯宗四時祫食於世祖廟奏武德文始五行之舞東平王蒼上言昔孝文廟樂曰昭德之舞孝武廟樂曰盛德之舞今皆祫食於髙廟昭德之舞不進與髙廟同樂今孝眀皇帝在世祖廟當用樂盛德之樂無所施如自立廟作武德之舞從之建初五年始行十二月迎氣樂立春之日迎春於東郊歌青陽八佾舞雲翹之舞立夏之日迎夏於南郊歌朱眀八佾舞雲翹之舞先立秋十八日迎黃靈於中兆歌朱眀八佾舞雲翹育命之舞立秋之日迎秋於西郊歌西皓八佾舞育命之舞立冬之日迎冬於北郊歌元𡨕八佾舞育命之舞祭祀志又獻帝起居注曰建安八年公卿迎氣北郊始復用八佾皇覽曰迎禮春夏秋冬之樂又順天道天子迎春於東堂唱之以角舞之以羽翟此迎春之樂也迎夏於南堂唱之以徴舞之以鼓鞉此迎夏之樂也迎秋於西堂唱之以商舞之以干戚此迎秋之樂也迎冬北堂唱之以羽舞之以干戈此迎冬之樂馬防上言聖人作樂所以宣氣致和順隂陽也臣愚以為可因歲首發太蔟之律奏雅頌之音以迎和氣時以作樂器費多遂獨行十二月迎氣樂也和帝即位有司奏上尊章帝廟曰肅宗共進武德之舞制可順帝陽嘉二年十月庚午行禮辟雍奏應鍾始復黃鍾樂器隨月律喪紀云初隨月律作應鍾諸行出入皆鳴鐘作樂其有災眚有他故若求雨止雨皆不鳴鐘不作樂行謂乘輿出入也獻帝建安八年公卿初迎冬於北郊總章始復備八佾舞因亂久廢今復見之自東京大亂絶無金石之樂樂章亡缺不可復知魏武帝平荆州獲杜夔善八音常為漢雅樂郎尤悉樂事於是使創定雅樂時又有散騎郎鄧靜尹商善調雅樂歌師尹商能歌宗廟郊祀之曲舞師馮肅能曉知先代諸舞夔悉領之逺考經籍近采故事考會古樂始設軒懸鐘磬復先代古樂自夔始也而柴玉左延年之徒妙善鄭聲被寵唯夔好古存正文帝受禪後改漢巴渝舞曰昭武舞改安世樂曰正始樂嘉至樂曰迎靈樂武德樂曰武頌樂昭容樂曰昭業樂雲翹舞曰鳯翔舞育命舞曰靈應舞武德舞曰舜頌舞正始舞曰大韶舞五行舞曰大武舞其衆歌詩多則前代之舊使王粲改作登歌安世及巴渝詩而已眀帝太和初詔曰凡音樂以舞為主自黃帝雲門以下至於周大武皆太廟舞名也然則其所司之官皆曰大樂所以總領諸物不可以一物為名樂官自如故為大樂大樂漢書舊名後漢依讖改為大豫樂官至是改復舊於是公卿奏今請太祖武皇帝樂宜曰武始之舞武神武也武又迹也言神武之始又王迹所起也髙祖文皇帝宜曰咸熙之舞咸皆也熙興也言應受命之運天下由之皆興也夫歌以詠德舞以象事於文文武為斌臣等謹製樂舞名章斌之舞所以章眀聖德今有事於天地宗廟則此三舞宜並以薦享及臨朝大享並宜舞之臣等思惟二舞宜有總名可名大鈞之樂鈞平也言大魏三代同功以至崇平也侍中繆襲又奏安世歌本漢時歌名今詩非往歌之文則宜變改安世樂猶同房中之樂也往昔議者以房中歌后妃之德以風天下正夫婦焉宜改安世之名而為正始之樂襲又省安世歌詩有后妃之義方今享先祖恐失禮意可改安世歌曰享神歌奏可文帝已改安世為正始而襲至是又改為享神王肅議髙皇至髙祖文昭廟皆宜兼用先代及武始大鈞之舞按漢時有短簫鐃歌之樂其曲有朱鷺思悲翁艾如張上之回雍離戰城南巫山髙上陵將進酒君馬黃芳樹有所思雉子班聖人出上雅臨髙臺逺如期石留務成元雲黃雀釣竿等曲列於鼓吹多序戰陳之事及魏受命改其十二曲使繆襲為詞述以功德言代漢之意文獻通考卷一百二十八
