body:
  text: 文獻通考卷一百九十鄱陽馬端臨貴與著經籍考十七經小學禮部韻略五卷鼂氏曰皇朝丁度等撰元祐中孫諤蘇軾載加詳定陳氏曰雍熙中殿中丞丘雍景德龍圖閣待制戚綸所定景祐制誥丁度重修元祐太學博士增補其曰略者舉子詩賦所常用蓋字書聲韻之略也干祿字書一卷鼂氏曰唐顔元孫撰以經史所用為正世所行為俗二者之間為通凡三體林氏小説三卷鼂氏曰唐林罕撰凡五百四十一字以説文部居隨字出文以定偏傍其説頗與許慎不同而亙有得失邵必緣進禮記石經陛對仁宗顧問罕之書如何必曰雖有所長而微好怪説文歸字從堆從止從帚以堆為聲罕云從追於聲為近此長於許氏矣説文哭從吅獄省聲罕乃云象犬嘷此怪也有石刻在成都公武嘗從數友就觀之其解字殊可駭笑者不疑好怪之論誠然復古編二卷鼂氏曰吳興道士張有謙中撰有自幼喜小篆年六十成此書三千言據古説文以為正其點畫之微轉側從橫髙下曲直毫髮有差則形聲頓異自陽氷前後名人格以古文往往而失其精且博如此陳氏曰有工篆書専夲許氏説文一點畫不妄錯林中書攄母魏國夫人墓道碑有書之魏字從山攄以為非有曰世俗以從山者為巍不從山者為魏非也其實二字皆當從山蓋一字而二音爾説文所無手可斷字不可易也攄不能強晚著此書専辨俗體之訛手自書之陳了齋為之序古文四聲五卷鼂氏曰皇朝夏竦撰博採古文竒字分四聲編次以便檢尋龍龕手鏡三卷鼂氏曰契丹僧行均撰凡二萬六千四百三十字注十六萬三千一百餘字僧智光為之序後題云統和十五年丁酉按紀年通譜耶律隆緒嘗改元統和丁酉至道三年也沈存中言契丹書禁甚嚴傳入中國者法皆死熙寧中有人自敵中得此書入傅欽之家蒲傳正帥浙西取以刻版其末舊題云重熙二年序蒲公削去之今夲乃云統和非重熙字存中不見舊題妄記之耶英公字源一卷鼂氏曰皇朝釋夢英撰夢英通篆籕之學書偏傍五百三十九字郭忠恕云按説文字源唯有五百四十部子字合收在子部今目録妄有更改又集解中誤收去部在注中今檢點偏傍少晶惢至龜弦五字故知林氏虛誕誤後進其小説可焚夢英因此書正之柴禹錫為立石釋鑒聿韻總五篇洛陽僧鑒聿撰歐公序略曰儒之學者信哉逺且大而用功多則其有所不暇者宜也文字之為學儒者之所用也其為精也有聲形曲直毫釐之别音嚮清濁相生之類五方言語風俗之殊故儒者莫暇精之其有精者則往往不能乎其他是以學者莫肯捨其所事而盡心乎此所謂不兩能者也必待乎用心専者而或能之然後儒者有一取焉洛僧鑒聿為韻總五篇推子母輕重之法以定四聲考求前儒之失辨正五方之訛顧其用心之精可謂入於忽微櫛一有者字之於髮績一有者字之於絲雖細且多而條理不亂儒之學者莫能難也鑒聿通於易能知大衍之數又學乎隂陽地理黃帝岐伯之書其尤盡心者韻總也浮圖之書行乎世者數百萬言其文字雜以夷夏讀者罕得其真往往就一有聿字而正焉鑒一無此字聿之書一作韻非獨有取於吾儒亦欲傳於其徒也字説二十卷鼂氏曰皇朝王安石介甫撰晚年間居金陵以天地萬物之理著於此書與易相表裏而元祐中言者指其揉雜釋老穿鑿破碎聾瞽學者特禁絶之王氏自序曰文者竒耦剛柔雜比以相承如天地之文故謂之文字者始於一一而生於無窮如母之字子故謂之字其聲之抑揚開塞合散出入其形之衡從曲直邪正上下內外左右皆有義皆出於自然非人私智所能為也與伏羲八卦文王六十四異用而同制相待而成易先王以為不可忽而患天下後世失其法故三歲一同同者所以一道德也秦燒詩書殺學士而於是時始變古而為𨽻蓋天之喪斯文也不然則秦何力之能為而許眘説文於書之意時有所悟因序録其説為二十卷以與門人所推經義附之惜乎先王之文缺已久眘所記不具又多舛而以豫之淺陋考之宜有所不合雖然庸詎非天之將興斯文也而以豫贊其始故其教學必自此始能知此者則於道德之意已十九矣石林葉氏曰凡字不為無義但古之制字不專主義或聲或形其類不一先王略别之以為六書而謂之小學者自是専門一家之學其微處遽未易盡通又更篆𨽻損益變易必多乖失許慎之説文但據東漢所存以偏旁類次其造字之夲初未嘗深究也王氏見字多有義遂一槩以義取之雖六書且不問矣况所謂小學之専門者乎是以每至於穿鑿附會有一字析為三四文者古書豈如是煩碎哉學者所以閧然起而交詆誠不為無罪然遂謂之皆無足取則過也王元澤爾雅王雱撰項平甫跋豫讀王元澤爾雅為之永歎曰嗚呼以王氏父子之學之苦即其比物引類之博分章析句之工其用力也久其屬辭也精以此名家自足垂世視揚子雲許叔重何至多遜而必欲用此説也咸五帝而登三王縛頡利而臣髙昌則已疏矣度不能勝而乃濟之以愎輔之以狡招合一時之羣小盡逐纍世之舊臣以蹙吾國而覆之其遺凶流毒至使後之擅國者世師焉以享上祗辟之説悅人主以邦朋國是之説空廷臣則王氏父子實為之津梁可不痛哉唐氏字説解一百二十卷鼂氏曰皇朝唐耜撰紹聖以來用字説程試諸生解者甚衆耜集成此書頗注其用事所出一時稱之耜知卭州日奏御字説偏旁音釋一卷字説疊解備檢一卷鼂氏曰不著撰人名氏切韻指玄論三卷四聲等第圖一卷鼂氏曰皇朝王宗道撰切韻之學切韻者上字為切下字為韻其學夲出西域今其法類夲韻字各歸於母幫滂並明非敷奉微唇音也端透定泥知徹澄娘齒音也曉匣影喻牙音也來日半齒半舌也凡三十六分為五音天下之聲總於是矣切歸夲母韻歸夲等者謂之音和常夲等聲盡泛入别等者謂之類隔變也中國自齊梁以前此學未傳至沈約以後始以之為文章至於近時始有専門者矣韻補五卷陳氏曰吳棫撰取古書自易書詩而下以及夲朝歐蘇凡五十種其聲韻與今不同者皆入焉朱侍講多用其説於詩傳楚辭注其為書詳且博矣又有毛詩補音一書别見詩類大歸亦如此以愚考之古今世殊南北俗異語言音聲誠有不得盡合者古之為詩學者多以風誦不専在竹帛竹帛所傳不過文字而聲音不可得而傳也又漢以前未有反切之學許氏説文鄭氏箋注但曰讀若某而已其於後世四聲七音又豈能盡合哉反切之學自西域入中國至齊梁間盛行然後聲病之説詳焉韻書肇於陸法言於是有音同韻異若東冬鍾虞魚模庚耕清青登蒸之斷斷乎不可以相雜若此者豈惟古書未之有漢魏以前亦未之有也陸德明於燕燕詩以南韻心有讀南作泥心切者陸以為古人韻緩不煩改字此誠名言今之讀古書古韻者但當隨其聲之叶而讀之若來之為釐慶之為羌馬之為姥聲韻全别不容不改其聲韻若相近可以叶讀則何必改字如燔字必欲作汾沿反官字必欲作俱員反天字必欲鐡因反之類則贅矣廣干祿字書五卷中興藝文志婁機撰機取許慎説文及諸家字書按以蔡伯喈五經備體張參五經文字田放九經字樣與夫經典釋文子史古字參以夲朝丁度所書集韻為廣干祿字書蓋廣唐人顔元孫之書也陳氏曰唐顔元孫為干祿字書其姪真卿書之刻石吳興為世所寶辨正通俗三體目以干祿謂舉子所資也機熟於小學嘉泰中教授資善堂景獻時為惠國公數問字畫之異因為此書續唐之舊故仍干祿之名既而悟其非所以施於朱邸也則以干祿百福之義傅會焉修校韻略五卷陳氏曰祕書省正字莆田劉孟容以説文字林干祿書五經文字九經字樣佩觹復古編等書修校韻略分毫補注字譜一卷陳氏曰進士耒陽秦昌朝撰附前韻略之後皆永嘉教授臨安錢厚所刻也竊謂小學當論偏旁尚矣許叔重以來諸書是也韻以略稱止施於禮部貢舉夲非小學全書於此而校其偏傍既不足以盡天下之字而欲使科舉士子盡用篆籕點畫於試卷不幾於迂而可笑矣哉進退皆無據謂之贅可也附釋文亙注韻略五卷陳氏曰以監夲增注而釋之押韻釋疑五卷陳氏曰進士廬陵歐陽德隆易有開撰凡字同義異字異義同者皆辨之尤便於場屋正字韻類謝季澤撰止齋陳氏序略曰季澤家學長於詩禮頗欲有所論次而未就僅及就此篇其於字學偏傍訓故學者易入焉韓昌黎嘗言注爾雅蟲魚非磊落人歐陽公序韻總亦曰儒者莫暇精之其有精者往往不能乎其他余方悲季澤官不足行其志位不足稱其才且懼後之人見此書如二公之云也於是道其平昔大槩序之篇端焉字通一卷陳氏曰彭山李從周肩吾撰切韻義一卷纂要圖例一卷陳氏曰汴陽謝暉撰紹興十年序三十六字母圖一卷夾漈鄭氏曰僧守溫撰切韻之學起自西域舊所傳十四字貫一切音文省而音博謂之婆羅門書然猶未也其後又得三十六字母而音韻之道始備中華之韻只彈四聲然有聲有音聲為經音為緯平上去入者四聲也其體縱故為經宮商角徴羽半徴半商者七音也其體橫故為緯經緯錯綜然後成文愚所作韻書備矣釋氏謂此學為小悟學者誠不可忽也智永千字文一卷鼂氏曰梁周興嗣撰釋智永所書後村劉氏曰嘗疑千字文世以為梁散騎常侍周興嗣所作然法帖中漢章帝已嘗書此文殆非梁人作也經典釋文三十卷鼂氏曰唐陸德明撰德明名元朗以字行釋易書詩並三禮三傳孝經論語爾雅老莊頗載古文及諸家同異德明蓋博極羣書也羣經音辨七卷鼂氏曰皇朝賈昌朝撰先是大臣稽古不過秦漢引經義議政蓋自昌朝始此書以古文多通借音詁乃辨正之凡五門佩觹三卷鼂氏曰皇朝郭忠恕撰取字文相類者别其所從以檢訛舛上篇論今傳記小學異同極為辨博陳氏曰忠恕為國子周易博士觹者所以解結也忠恕恃酒狂縱數犯法忤物得罪其死時頗異世以為尸解翰林禁經八卷鼂氏曰唐李陽氷撰論書勢筆法所禁故以名書墨藪十卷鼂氏曰髙陽許歸與編未詳何代人李氏書目止五卷而梁武評書王逸少筆勢皆别出陳氏曰不知何代人所集凡十八篇又一夲二十一篇臨池妙訣三卷鼂氏曰未詳何人撰後有江南李煜述書周越書苑十五卷鼂氏曰皇朝周越撰越以善書名世天聖八年四月成此書奏御故其序稱臣越臣兄起於桞公權書又云亡兄間稱名而不臣似未精討論也陳氏曰主客郎中臨淄周越與其兄起皆有書名起書未見越書間有之俗甚唐藏經音義四卷鼂氏曰未詳撰人分四聲以類相從蜀中印夲也鐘鼎篆韻七卷鼂氏曰皇朝薛尚功集元祐中呂大臨所載僅數百字政和中王楚所傳亦不過數千字今是書所緑凡一萬一百二十有五陳氏曰不著名氏按館閣書目此書有二家其一七卷其一一卷七卷者紹興中通直郎薛尚功所廣一卷者政和中主管衡州露仙觀王楚也則未知此書之為王楚歟薛尚功歟尚功有鐘鼎法帖十卷刻於江州當是其篆韻之所夲也漢𨽻字源六卷陳氏曰婁機撰以世所存漢碑三百有九韻類其字魏碑附寫焉者僅三十之一首為碑目一卷每字先載今文而以漢字著其下一字數體者並列之皆以碑目之次苐著其所從出洪邁作序象類書十一卷中興藝文志鄭樵撰中興後安石之字説既廢樵復理其緒餘初有象類之書復約而歸於六書象形類六百八指事類百七會意類七百四十轉注類三百七十二諧聲類二萬一千八百十假借類五百九十八𨽻釋二十七卷𨽻續二十一卷中興藝文志洪適撰適取古今石刻法其字為之韻辨其文為之釋以辨𨽻書曰𨽻釋𨽻續陳氏曰凡漢刻之存於世者以今文寫之而為之釋又為之世代譜及物象圖碑形式悉具之魏初近古者亦附焉年來北方舊刻不可復得覽此猶可慨想字始連環二卷陳氏曰鄭樵撰大略謂六書惟類聲之生無窮音切之學自西域流入中國而古人取音制字乃與韻圖吻合論梵書一卷陳氏曰鄭樵撰樵論華梵曰諸蕃文字不同而多夲於梵書流入中國代有大鴻臚之職譯經潤文之官恐不能盡通其旨不可不論也梵書左旋其勢向右華書右旋其勢向左華以正錯成文梵以遍纒成體華則一字該一音梵則一字或貫數音華以直相隨梵以橫相綴華蓋以目傳故必詳於書梵以口傳如曲譜然書但識其大略華之讀别聲故就聲而借梵之讀别音故即音而借又曰梵人别音在音不在字華人别字在字不在音故梵書甚簡不過數個屈曲耳差别不多亦不成文理而有無字之音焉華人苦不别音如切韻之學自漢以前人皆不識實自西域流入中土所以韻圖之類釋子多能言之而儒者皆不識起例以其源流出於彼耳華書制字極密點畫極多梵書比之實相遼邈故梵有無窮之音而華有無窮之字梵則音有妙義而字無文彩華則字有變通而音無錙銖梵人長於音所得從聞入故曰此方真教體清淨在音聞我昔三菩提盡從聞中入有目根功德少耳根功德多之説華人長於文所得從見入故天下以識字人為賢智不識字人為庸愚石鼓文考三卷陳氏曰鄭樵撰其説以為石鼓出於秦其文有與秦斤秦權合者嘯臺集古録二卷陳氏曰王球子辨撰李邴漢老序之稱故人長孺之子未詳何王氏也皆録古彝器欵識自商迄秦凡數百章以今文釋之疑者闕焉前漢古字韻編五卷陳氏曰侍郎宣城陳天麟季陵撰取漢書所用古字以今韻編入之班馬字類二卷陳氏曰參政嘉禾婁機彥發撰取二史所用古字及假借通用者以韻之洪邁景盧作序閣夲法帖十卷樂靜李昭玘跋太宗皇帝治定餘暇遊意翰墨遣使購古帝王名卿墨帖集為十卷詔鏤版藏禁中每大臣登二府即賜焉歲久寖不復賜元豐中嘉王嘗從神考借其版模拂幾百夲王府官盡得之士大夫間亦見一二初長沙僧希白填夲刻石河東潘氏御史劉次莊又作别夲識者謂希白善書不甚失真潘復易次間以他書御史所模尤疏闊夫獨前者縱學步者拘因人之迹而又加意焉則目亂而心疑神已虧矣故終不近也法帖釋文十卷鼂氏曰淳化法帖既已焚板元祐中有劉次莊者模刻之石復取帖中草書世所病讀者為釋文行於世陳氏曰劉次莊元祐中為官帖釋文刻石臨江而武岡又嘗傳刻絳州民潘氏帖嘉定中汪立中取劉夲分二十卷中官帖所無者增附之法書要録十卷陳氏曰唐大理卿河東張彥逺愛賔撰彥逺𢎞靖之孫三世相閲其父文規嘗刺湖州著吳興雜録金壺記一卷陳氏曰僧適之撰集書家故事以二字為題而注所出於其下凡三百餘條飛白敘録一卷陳氏曰錢惟演希聖撰天聖四年序進法帖刋誤二卷陳氏曰黃伯思長睿撰淳化帖出於待詔王著去取時祕府墨迹真贋雜居著不能辨也但欲備晉宋間名迹遂至以江南人一手偽帖竄入其間鄙惡之甚米南宮辨之十已得七八至長睿益精詳矣籕史二卷陳氏曰翟耆年伯夀撰裒諸家鍾鼎圖説為一編頗有考究絳帖評二十卷陳氏曰鄱陽薑夔堯章撰山谷黃氏跋絳夲法帖心能轉腕手能轉筆書字便如人意古人工書無他異但能用筆耳元豐八年五月戊申趙正夫出此書於平原官舍會觀者三人石庭簡桞子文黃庭堅蘭亭博議十五卷陳氏曰淮海桑世昌撰世昌居天台陸放翁諸甥博雅能詩蘭亭考十三卷山谷黃氏蘭亭跋曰王右軍禊飲序草號稱最得意書宋齊以來似藏在祕府士大夫間未聞稱述豈未經大盜兵火時蓋有墨迹在蘭亭右者及蕭氏宇文焚蕩之餘千不存一永師晚出所見好迹唯有蘭亭故為虞褚輩道之所以太宗求之百方期於必得其後公私相盜今竟失之書家晚得定武石夲髣佛有古人筆意耳褚庭晦所臨極肥而洛陽張景元斸地得缺石極瘦武定夲則肥不剩肉瘦不露骨猶可想其風流三石刻皆有佳處不必寶已有而非彼也陳氏曰即博議也浙東庾司所刻視初夲頗有刪改初十五篇今存十三篇去其集字篇後人集蘭亭字作書帖詩銘之類者又附見篇兼及右軍他書迹於樂毅論尤詳其書始成夲名博議髙內翰文虎炳如為之序及其刋也其子似孫主為刪改去此二篇固當而其他務從省文多失事實或戾夲意其最甚者序文夲亦條逹可觀亦竄改無完篇首末闕漏文理斷續於其父猶然深可怪也此書纍十餘卷不過為晉人一遺帖自是作無益玩物喪志夲無足云其中所録諸家跋語有昭然偽妄而不能辨者不暇疏舉法言撮要十卷陳氏曰吳興蔡專山父撰以書家事實分門條類亦無所發明淳熙中人書苑菁華二十卷陳氏曰臨安書肆陳思者集刻按以字書入小學門自漢志已然歷代史志從之至陳直齋所著書録解題則以為書品書斷之類所論書法之工拙正與射御同科特削之俾列於雜藝不以入經録夫書雖至於鍾王乃遊藝之末者非所以為學削之誠是也然六經皆夲於字字則必有真行草篆之殊矣且均一字也屬乎偏旁音韻者則入於小學屬乎真行草篆者則入於雜藝一書而析為二門於義亦無所當矣故今並以入小學門仍前史之舊蒙求三卷鼂氏曰唐李瀚撰纂經傳善惡事實類者兩兩相比為韻語取蒙卦童蒙求我之義名其書蓋以教學童云陳氏曰夲無義例信手肆意雜襲成章取其韻語易於訓誦而已今舉世誦之以為小學發蒙之事補注蒙求八卷陳氏曰徐子光撰以李瀚蒙求句為之注夲句之外兼及其他人事左氏蒙求三卷鼂氏曰皇朝王舜俞序不知何人所作過於綱領者左氏綱領四卷鼂氏曰皇朝文濟道撰排比事實為􅓻句蒙求之類也兩漢蒙求十卷陳氏曰樞密吳興劉班希范撰紹聖中所序十七史蒙求二卷陳氏曰題王先生不著名或云王令也宋朝蒙求二卷陳氏曰端明殿學士成都范鎮景仁撰唐史屬辭五卷南北史蒙求十卷鼂氏曰未詳撰人皆效李瀚也班左誨蒙三卷陳氏曰程俱致道撰趙氏家孰蒙求二十五卷宗室蒙求二卷幼學須知五卷程氏曰餘符孫應符仲潛撰次此書夲書坊所為以教小學應符從而增廣之童蒙訓一卷陳氏曰中書舍人東萊呂夲中居仁撰少儀外傳二卷陳氏曰呂祖謙撰雜取經傳嘉言善行切於立身應世者皆小學切問之事也而大要以謹厚為夲大愚呂氏跋曰少儀外傳一編先兄太史所自次輯者也首命其名曰帥初次更其名曰辨志而其終則定以是名焉某嘗侍坐蓋與聞所以為此編之意蓋以始學之士徒玩乎見聞汨乎思慮輕自大而卒無據故指其前言往行所當知而易見者登之於册使之不待考索而自有得於日用之間其於未易遽知而非可卒見者則皆略而不載苟讀是編而無所厭忽各因其所得而有自立之地則先兄之夲心庶乎其不泯矣辨志録一卷陳氏曰皆已見上書而無次苐當是草創夲小學書四卷陳氏曰朱熹所集古聖格言至論以教學者皆成童幼志進學之序也內篇曰立教明倫敬身稽古外篇曰嘉言善行朱子語録曰修身之法小學備矣後生初學且看小學之書這個是做人底樣子學之小大雖不同而其道則一小學是事如事君事父事兄處友等事大學是發明此事之理遊倪曰自幼既失小學之序願授大學先生曰授大學甚好也須把小學書看只消旬日工夫小學字訓程端蒙撰朱子曰字訓甚佳言語雖不多却是一部大爾雅也弟子職等五書一卷陳氏曰漳州教授張時舉以管子弟子職篇班氏女誡呂氏鄉約鄉禮司馬氏居家雜儀合為一篇文獻通考卷一百九十
