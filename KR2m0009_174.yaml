body:
  text: 文獻通考卷一百七十四鄱陽馬端臨貴與著經籍考一總敘伏犧氏始畫八卦造書契書者文字契者刻木而書其側故曰書契也一云以書契約其事也鄭玄云以書書木邉言其事刻之木謂之書契也以代結繩之政由是文籍生焉伏犧神農黃帝之書謂之三墳墳大也言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也至於夏商周之書雖設教不倫雅誥奧義其歸一揆是故歷代寶之以為大訓八卦之説謂之八索索求也求其義也九州之志謂之九邱邱聚也言九州所有土地所生風氣所宜皆聚此書也按古書之流傳於今者惟六經六經之前則三墳五典八索九邱是已周官外史掌三皇五帝之書則國家之所職掌者此也楚左史倚相能讀三墳五典八索九丘則學士大夫之所誦習者此也今其書亡而其義則略見於孔氏尚書之序故録之以為經籍之始索隱史記三皇紀言春秋緯稱自開闢至於獲麟凡三百二十六萬七千嵗分為十紀凡世七萬六百年一曰九頭紀二曰五龍紀三曰攝提紀四曰合雒紀五曰連通紀六曰序命紀七曰循蜚紀八曰因提紀九曰禪通紀十曰疏仡紀則上古之書蓋不可勝計然其説荒誕故無取焉周官太史掌建邦之六典以逆邦國之治掌法以逆官府之治掌則以逆都鄙之治太史日官也凡辨法者考焉不信者刑之凡邦國都鄙及萬民之有約劑者藏焉以二六官六官各有一通此太史亦副寫一通故云以二六官小史掌邦國之志奠系世辨昭穆志猶記也春秋傳所謂周志國語所謂鄭書之屬是也史官主書故韓宣子聘於魯觀書太史氏系世謂帝系世本之屬是也小史主定之內史掌王之八枋之法以詔王治執國法及國令之二以考政事以逆會計國法六典八法八則掌敘事之法受納訪以詔王聼治敘六敘也納訪納謀於王也六敘六曰以敘聼其情凡命諸侯及孤卿大夫則䇿命之如春秋王命內史興父䇿命晉侯之類凡四方之事書內史讀之若今尚書入省事王制祿則贊為之以方出之贊為之為之辭也以方版書而出之賞賜亦如之內史掌書王命遂二之副寫藏之外史掌書外令王令下畿外掌四方之志志記也謂若魯之春秋晉之乘掌三皇五帝之書掌達書名於四方若謂堯典禹貢達此名使知之若以書使於四方則書其令書王令以授使者御史掌邦國都鄙及萬民之治令以贊冢宰王所以治之令冢宰掌王治凡治者受法令焉為書寫其治之法小行人掌五物者謂國札喪凶荒師役福事災禍共五者及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書凡此五物者每國辨異之以反命於王以周知天下之故按成周之時自太史以至小行人皆掌官府之典籍者也其名數亦多今除寶訓及太平六典之外亦無可考者矣孔子生於周末覩史籍之繁文懼覽之者不一遂乃定禮樂明舊章刪詩為三百篇約史記而修春秋讚易道以黜八索述職方以除九丘討論墳典斷自唐虞以下訖於周程子曰所謂大道若性與天道之説聖人豈得而去之哉若言隂陽四時七政五行之道亦必至要之理非如後世之繁衍末術也固亦常道聖人所必不去也或者所謂羲農之書乃後人稱述當時之事失其義理如許行為神農之言及隂陽權變醫方稱黃帝之説耳此聖人所以去之也五典既皆常道又去其三蓋上古巳有文字而制立法度為治有迹得以紀載有史官以識其事自堯始耳九峯蔡氏曰今按周禮外史掌三皇五帝之書周公所録必非偽妄而春秋時三墳五典八索九邱之書猶有存者若果全備孔子亦不應悉刪去之或其簡編脫落不可通曉或是孔子所見止自唐虞以下不可知耳今亦不必深究其説也禮記經解孔子曰入其國其教可知也觀其風俗則知其所以教其為人也溫柔敦厚詩教也疏通知逺書教也廣博易良樂教也潔靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也屬猶合也春秋多記諸侯朝聘會同有相接之辭爭辨之事故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂失謂不能節其教也詩敦厚近愚書知逺近誣易精微愛惡相攻逺近相取則不能容人近於傷害春秋習戰爭之事近亂其為人也溫柔敦厚而不愚則深於詩者也疏通知逺而不誣則深於書者也廣博易良而不奢則深於樂者也潔靜精微而不賊深於易者也恭儉莊敬而不煩深於禮者也屬辭比事而不亂則深於春秋者也言深者既能以教又防其失也疏皇氏云解者分析之名此篇分析六經體教不同故名曰經解也六經其教雖異總以禮為本故紀者録入於禮長樂劉氏曰此經言周衰之時諸侯之國雖不能逮文武之時猶能各通一經以化其民故孔子歷聘之時入其國而其教可知山隂陸氏曰不言失之而言之失者六經無失也學者之失而巳金華應氏曰醇厚者未必深察情偽故失之愚通達者未必篤確誠實故失之誣寬博者未必嚴立繩檢故失之奢沉潛思索多自耗蠧且或害道弄筆褒貶易紊是非且或召亂樂正崇四術以訓士則先王之詩書禮樂其設教固巳久易雖用於卜筮而精微之理非初學所可語春秋雖公其紀載而䇿書亦非民庶所得盡窺故易象春秋韓宣子適魯始得見之則諸國之教未必盡備六者蓋自夫子刪定讚繫筆削之餘而後傳習滋廣經術流行夫子既廣其傳而又慮其所敝故有此言然入其國即知其教非見逺察微者不能也觀其教即防其失非慮逺防微者不能也莊子天下篇古之人其備乎配神眀醇天地育萬物和天下澤及百姓明於本數係於末度六通四辟小大精粗其運無乎不在其眀而在數度者舊法世傳之史尚多有之其在於詩書禮樂者鄒魯之士搢紳先生多能眀之詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分其數散於天下而設於中國者百家之學時或稱而道之天下大亂賢聖不眀道德不一天下多得一察焉以自好譬如耳目鼻口皆有所眀不能相通猶百家衆技也皆有所長時有所用雖然不該不遍一曲之士也判天地之美析萬物之理察古人之全寡能備於天地之美稱神眀之容是故內聖外王之道暗而不眀欎而不發天下之人各為其所欲焉以自為方悲夫百家往而不反必不合矣後世之學者不幸不見天地之純古人之大體道術將為天下裂按莊生之時六籍未經秦火其書具在也而諸子百家各以其説舛馳而淆亂之是以有暗而不眀欎而不發之憂周以荒唐謬悠之言著書蓋亦百家之一也而此假議論誠醇正無異聖賢之格言東坡謂莊子蓋助孔子者於此見之所謂後之學者不幸不見天地之純古人之大體道術將為天下裂似逆知將有坑焚之禍而深悲之矣鳴呼秦始皇三十四年丞相李斯上書曰異時諸侯並爭厚招遊學今天下巳定法令出一百姓當家則力農工士則學習法令今諸生不師今而學古以非當世惑亂黔首相與非法教人聞令下則各以其學議之入則心非出則巷議誇主以為名異趣以為髙率羣臣以造謗如此弗禁則主勢降乎上黨與成乎下禁之便臣請史官非秦記者燒之非博士官所職天下有藏詩書百家語者皆詣守尉雜燒之有敢偶語詩書棄市以古非今者族吏見知而不舉與同罪令下三十日不燒黥為城旦所不去者醫藥卜筮種樹之書若欲學法令則以吏為師制曰可魏人陳餘謂孔鮒曰秦將滅先王之籍而子為書籍之主其危哉子魚曰吾為無用之學知吾者惟友秦非吾友吾何危哉吾將藏之以待其求求至無患矣夾漈鄭氏曰陸賈秦之巨儒也酈食其秦之儒生也叔孫通秦時以文學召待詔博士數嵗陳勝起二世召博士諸儒生三十餘人而問其故皆引春秋之義以對是則秦時未嘗不用儒生與經學也况叔孫通降漢時自有弟子百餘人齊魯之風亦未嘗替故項羽既亡之後而魯為守節禮義之國則知秦時未嘗廢儒而始皇所坑者蓋一時議論不合者耳又曰蕭何入咸陽收秦律令圗書則秦亦未嘗無書籍也其所焚者一時間事耳後世不眀經者皆歸之秦火使學者不覩全書未免乎疑以傳疑然則易固為全書矣何嘗見後世有眀易之人哉臣向謂秦人焚書而書存諸儒窮經而經絶蓋為此發也詩有六亡篇乃六笙詩本無辭書有逸篇仲尼之時已無矣皆不因秦火自漢以來書籍至於今日百不存一二非秦人亡之也學者自亡之耳按秦雖出自於西戎然自非子秦仲以來有國於豐岐者數百年春秋之時盟會聘享接於諸侯秦誓紀於書車鄰小戎之屬列於詩其聲名文物蓋藹然先王之遺風矣今下令焚詩書而曰史官非秦記皆燒之則秦誓秦風亦秦記也獨非詩書乎李斯者襲流血刻骨之故智而佐之以人頭畜鳴之偽辨固世所羞稱者然斯學於荀卿卿之道蓋祖述六經憲章仲尼者也是其初亦自儒者法門中來然則始皇既非聲教不通之編夷而驟有中華李斯亦非椎朴少文之俗物而盲處髙位今乃以焚滅經籍坑戮儒生為經國之逺猷者其説有二曰愧曰畏愧則愧其議巳也畏則畏其害已也自載籍以來詩書所稱桀有暴德而天下歸殷紂有暴德而天下歸周幽厲有暴德而周室東遷寖微寖滅五霸迭興七雄分據始皇既已習聞其説矣今雖諉曰德兼三皇功過五帝而其所行則襲桀紂幽厲之迹耳夫豈不自知之而儒者記纂眀以語人曰如是而興如是而亡不啻燭照數計龜卜而示後來以軌範蓋始皇之所愧而畏者此也自夫子歷聘列國孟氏以儒術遊於諸侯思濟天下之溺而引時君於當道者至拳拳也雖不肯柱道以求售然思濟天下之溺至拳拳也繼而蘇張之徒専以口舌干時君雖其所持者詭遇之術妾婦之道與孔孟之學如黑白薰蕕之相反然其汲汲皇皇求以用世之意則類也而范雎之於魏冉蔡澤之於范睢皆逞其辨口扼其吭而奪之位於是士生斯時皆以讀書遊説為可以得志而取髙位李斯亦以説客進身者也故韓非入秦以策干始皇則忌而誅之天下豈無尚如非者欲晲其後乎蓋李斯之所愧而畏者此也詩書百家語之在人間者焚之其在博士官者存之蓋亦知其本不可廢也罷侯置守者私其土地於已也焚書而獨存博士官者又欲私其經術於己也主相之心務欲滅經籍以愚天下峻法律以威天下而使之莫豫毒以為鞏固不拔之計然陳勝項梁項籍劉季之徒本非有祖述湯武𢎞濟蒼生之夙志俱以罹於禁網遁迹亡命出萬死不顧一生之計奮梃而起以成土崩瓦解之勢趙髙熏腐小醜亦非有文墨詞辨足以傾動上聼徒以少習深文依於忮忍故陷扶蘇蒙恬戮諸公子夷李斯如出一律蓋犯法而作亂者陳吳劉項也倚法而作姦者趙髙也然則隳秦七廟而具斯五刑者非詩書也乃秦之法律也秦以儒者為博士每國家有大事則下博士議之然因淳于越進議封建而下焚書之令因盧生輩竊議時事而下坑儒之令蓋此二事者皆激於博士之正論然則其所進用者必皆得面諛順指如周青臣叔孫通輩然後能持祿茍免耳稍引古義持正論則批逆鱗觸奇禍是書雖存而實亡博士官雖設而實廢矣又按史記言始皇聞盧生竊議亡去大怒曰吾前收天下書不中用者盡去之悉召文學方術士甚衆欲以興太平求奇藥今聞韓衆去不報徐市等費以巨萬計終不得藥徒姦利相告日聞然則始皇所謂不中用者所焚之六籍是也所謂召文學方術士求奇藥者所存之醫藥卜筮等書是也然六籍雖厄於煨燼而得之口耳所傳屋璧所藏者猶足以垂世立教千載如一日也醫藥卜筮種樹之書當時雖未嘗廢錮而並未嘗有一卷流傳於後世者以此見聖經賢傳終古不朽而小道異端雖存必亡初不以世主之好惡而為之興廢也西漢書儒林傳序曰秦始皇兼天下燔詩書殺術士六學從此闕矣陳涉之王也魯諸儒持孔子禮器往歸之於是孔甲為涉博士卒與俱死師古曰孔光傳云鮒為陳涉博士死陳下今此云孔甲將名鮒而字甲也陳涉起匹夫驅適戍以立號師古曰毆與驅同適讀曰謫不滿嵗而滅亡其事至微淺然而搢紳先生負禮器往委質為臣者何也以秦禁其業積怨而發憤於陳王也及髙皇帝誅項籍引兵圍魯魯中諸儒尚講誦習禮弦歌之音不絶豈非聖人遺化好學之國哉於是諸儒始得修其經學講習大射鄉飲之禮叔孫通作漢禮儀因為奉常諸弟子共定者咸為選首然後喟然興於學然尚有干戈平定四海師古曰言陳豨盧綰韓信黥布之徒相次反叛征伐也亦未遑庠序之事也孝惠髙后時公卿皆武力功臣孝文時頗登用師古曰言少用文學之士然孝文本好刑名之言及至孝景不任儒竇太后又好黃老術故諸博士具官待問未有進者師古曰具官謂備員而已漢興言易自淄川田生言書自濟南伏生言詩於魯則申培公於齊則轅固生師古曰培固者其人名生者其號也他皆類此培音陪燕則韓太傅師古曰名嬰也言禮則魯髙堂生言春秋於齊則胡母生於趙則董仲舒及竇太后崩武安君田蚡為丞相黜黃老刑名百家之言延文學儒者以百數而公孫𢎞以治春秋為丞相封侯天下學士靡然鄉風矣西漢書藝文志序曰昔仲尼沒而微言絶李奇曰微不顯之言也師古曰精微要妙之言耳七十子喪而大義乖師古曰七十子謂弟子達者七十二人舉其成數故言七十故春秋分為五韋昭曰謂左氏公羊穀梁鄒氏夾氏也詩分為四韋昭曰謂毛氏齊魯韓易有數家之傳戰國從衡真偽分爭從音子容反諸子之言紛然殽亂至秦患之乃燔滅文章以愚黔首漢興改秦之敗大收篇籍廣開獻書之路迄孝武世書缺簡脫禮壞樂崩師古曰編絶散落故簡脫脫音吐活反聖上喟然而稱曰朕甚閔焉於是建藏書之䇿如淳曰劉歆七略曰外則有太常太史博士之藏內則有延閣廣內祕室之府置寫書之官下及諸子傳説皆充祕府至成帝時以書頗散亡使謁者陳農求遺書於天下詔光祿大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校數術師古曰占卜之書侍醫李柱國校方技師古曰醫藥之書也每一書已師古曰已畢也向輒條其篇目撮其指意録而奏之師古曰撮總取也音於括反會向卒哀帝復使向子侍中奉車都尉歆卒父業師古曰卒終也歆於是總羣書而奏其七略故有輯略師古曰輯與集同謂諸書之總要有六藝略六藝六經也有諸子略有詩賦略有兵書略有數術略有方技略今刪其要以備篇籍師古曰刪去浮冗取其指要也其每所條家及篇數有與總凡不同者轉寫脫誤年代久逺無以詳知夾漈鄭氏曰班固藝文志出於七略者也七略雖疏而不濫若班氏步步趨趨不離於七略未見其失也間有七略所無而班氏雜出者則躓矣揚雄所作之書劉氏蓋未收而班氏始出若之何以太元法言樂針三書合為一總謂之揚雄所序三十八篇入於儒家類按儒者舊有五十二種固新出一種則揚雄之三書也且太元易類也法言諸子樂針雜家也奈何合而為一家是知班固胸中元無倫類劉歆為侍中遷光祿大夫領五經卒父前業欲建立左氏春秋及毛詩逸禮古文尚書皆列於學官哀帝令歆與五經博士講論其義諸博士或不肯置對師古云並不與歆意同故不肯立其學也置對置辭以對也歆因移書太常博士責讓之曰昔唐虞既衰而三代迭興師古曰迭互也音大結反聖帝明王纍起相襲其道甚著周室既微而禮樂不正道之難全也如此是故孔子憂道之不行歷國應聘自衛反魯然後樂正雅頌乃得其所修易序書制作春秋以紀帝王之道及夫子沒而微言絶七十子終而大義乖重遭戰國棄籩豆之禮理軍旅之陳孔氏之道抑而孫吳之術興陵夷至於暴秦燔經書殺儒士設挾書之法行是古之罪師古曰以古事為是者即罪之道術由是遂滅漢興去聖帝眀王遐逺仲尼之道又絶法度無所因襲時獨有一叔孫通略定禮儀天下唯有易卜未有他書至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介胄武夫莫以為意至孝文皇帝始使掌故鼂錯從伏生受尚書尚書初出於屋壁朽折散絶今其書見在時師傳讀而已詩始萌芽天下衆書往往頗出皆諸子傳説猶廣立於學官為置博士在漢朝之儒唯賈生而已至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師師古曰前學之師也皆起於建元之間當此之時一人不能獨盡其經或為雅或為頌相合而成泰誓後得博士集而讀之故詔書稱曰禮壞樂崩書缺簡脫朕甚閔焉時漢興已七八十年離於全經固已逺矣師古曰言廢絶已久不可得其遺也及魯恭王壞孔子宅欲以為宫而得古文於壞壁之中逸禮有三十九書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏邱眀所修皆古文舊書多者二十餘通藏於祕府伏而未發孝成皇帝閔學殘文缺稍離其真乃陳發祕藏校理舊文得此三事以考學官所傳經或脫簡傳或間編師古曰脫簡遺失也間編謂舊編爛絶就更次之前後錯亂也間音古莧反傳問民間則有魯國桓公趙國貫公膠東庸生之遺學與此同抑而未施此乃有識者之所惜閔士君子之所嗟痛也往者綴學之士不思廢絶之闕茍因陋就寡分文析字煩言碎辭學者罷老且不能究其一蓻師古曰罷讀曰疲究竟也信口説而背傳記是末師而非往古至於國家將有大事若立辟雍封禪巡狩之儀則幽冥而莫知其原師古曰幽冥猶暗昧也猶欲保殘守缺挾恐見破之私意而無從善服義之公心或懷妒嫉不考情實雷同相從隨聲是非抑此三學以尚書為備蘇林曰備之而已臣瓚曰當時學者謂尚書唯有二十八篇不知本有百篇也師古曰瓚説是也謂左氏為不傳春秋豈不哀哉今聖上德通神眀繼統揚業亦閔文學錯亂學士若兹雖昭其情猶依違謙讓師古曰依違言不専決也樂與士君子同之故下眀詔試左氏可立不遣近臣奉指銜命將以輔弱扶微與二三君子比意同力冀得廢遺師古曰比合也經蓻有廢遺者冀得興立之也比音頻寐反今則不然深閉固拒而不肯試猥以不誦絶之師古曰猥茍也茍不誦習之而欲絶去此學欲以杜塞餘道絶滅微學夫可與樂成難與慮始此乃衆庶之所為耳非所望於士君子也且此數家之事皆先帝所親論今上所考視其古文舊書皆有徴驗外內相應豈茍而已哉夫禮失求之於野古文不猶愈於野乎往者博士書有歐陽春秋公羊易則施孟然孝宣皇帝猶廣立穀梁春秋梁邱易大小夏侯尚書義雖相反猶並置之何則與其過而廢之也寧過而立之傳曰文武之道未墜於地在人賢者志其大者不賢者志其小者今此數家之言所以兼包大小之義豈可偏絶哉若必専巳守殘師古曰専執己所偏見茍守殘缺之文也黨同門妒道真師古曰黨同師之學妒道藝之真也違眀詔失聖意以陷於文吏之議甚為二三君子不取也劉歆總羣書著七略大凡三萬三千九十卷王莽之亂焚燒無遺程氏演繁露曰漢世藏書舊知有禁中外臺之别今讀劉向敘載所定列子之書而知中書之外又有太常太史與中祕而三也向言所校三藏本篇章大率中書多外書少知漢留意中祕故比他本特備也史遷紬金匱石室以成史記豈嘗許其稽閲中祕邪或太史所藏於漢家事實則金匱石室以加嚴邪然不知正在何地也光武中興篤好文雅眀章繼軌尤重經術四方鴻生巨儒負帙自逺至者不可勝算石室蘭臺彌以充積又於東觀及仁壽閣集新書校書郎班固傅毅等典掌焉並依七略而為書部眀帝幸三雍尊養三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶搢紳之人圜橋門而觀聼者蓋億萬計建初中大會諸儒於白虎觀考詳同異連月乃罷肅宗親臨稱制臨決如石渠故事前書甘露二年詔諸儒講五經同異蕭望之等平奏其議上親制臨決焉又曰施讎甘露中論五經於石渠閣三輔故事曰石渠閣在未央殿北藏祕書之所顧命史臣著為通議即白虎通議是孝和亦數幸東觀覽閲書林靈帝熹平時詔諸儒正定五經刋於石碑為古文篆𨽻三體書法以相參檢樹之學門古文謂孔子壁中書篆秦始皇使程邈所作也𨽻書亦程邈所獻也主於徒𨽻從簡易謝承書曰碑立太學門外瓦屋覆之四面欄障開門於南河南郡設吏卒視之揚龍驤洛陽記載朱超石與兄書云石經文都似碑髙一文許廣四尺駢羅相接使天下咸取則焉初光武遷還洛陽其經牒祕書載之二千餘兩自此以後參陪於前及董卓移都之際吏民擾亂自辟雍東觀蘭臺石室宣眀鴻都諸藏典䇿文章競共剖散其縑帛圗書大則連為帷蓋小乃制為縢囊縢亦幐也音徒恆反説文曰幐囊也及王允所收而西者裁七十餘乘道路艱逺復棄其半矣後長安之亂一時焚蕩莫不泯盡焉魏氏代漢采掇遺亡藏在祕書中外三閣魏祕書郎鄭默始制中經祕書監荀朂又因中經更著新簿分為四部總括羣書一曰甲部紀六藝及小學等書二曰乙部有古諸子家近世子家兵書兵家術數三曰丙部有史記舊事皇覽簿雜事四曰丁部有詩賦圗贊汲冡書大凡四部合二萬九千九百四十五卷但録題及言盛以縹囊書用緗素至於作者之意無所論辨晉惠懷之亂京華蕩覆石渠閣文籍靡有孑遺東晉之初漸更鳩聚著作郎李充以朂舊簿校之其見存者但為三千一十四卷充遂總沒衆篇之名但以甲乙為次自爾因循無所變革其後中朝遺書稍流江左宋武帝入關收其圗籍府藏所有才四千卷赤軸青紙文字古拙文帝元嘉八年祕書監謝靈運造四部目録大凡六萬四千五百八十二卷元徽元年祕書丞王儉又造目録大凡萬五千七百四卷儉又别撰七志一曰經典志紀六藝小學史記雜傳二曰諸子志紀今古諸子三曰文翰志紀詩賦四曰軍書志紀兵書五曰隂陽志紀隂陽圖緯六曰術藝志紀方技七曰圖譜志紀地域及圖書其道佛附見合九條然亦不述作者之意但於書名之下每立一傳而又作九篇條例編乎首卷之中文義淺近未為典則齊永眀中祕書丞王亮監謝朏又造四部書目大凡一萬八千一十卷齊末兵火延燒祕閣經籍遺散梁初祕書監任昉躬加部集又於文德殿內列藏衆書華林園中總集釋典大凡二萬三千一百六卷而釋氏不與焉梁有祕書監任昉殷鈞四部目録又文德殿目録其術數之書更為一部使奉朝請祖暅撰其名故梁有五部目録普通中有處士阮孝緒沉靜寡欲篤好墳史博采宋齊已來王公之家凡有書記參校官簿更為七録一曰經典録紀六藝二曰記傳録紀史傳三曰子兵録紀子書兵書四曰文集録紀詩賦五曰技術録紀數術六曰佛録七曰道録其分部題目頗有次序割析辭義淺薄不經梁武敦説詩書下化其上四境之內家有文史元帝克平侯景收文德之書及公私經籍歸於江陵大凡七萬餘卷周師入郢咸自焚之陳天嘉中又更鳩集考其篇目遺闕尚多後魏始都燕代南略中原粗收經史未能全具道武嘗問博士李先曰天下何物最善可以益人神智對曰莫若書籍帝曰書籍凡有幾何如何可集對曰自書契以來世有滋益以至於今不可勝計苟人主所好何憂不集乃命郡縣大收書籍悉送平城孝文徙都洛邑借書於齊祕府之中稍以充實暨於爾朱之亂散落人間後齊遷鄴頗更搜聚迄於天統武平校寫不輟後周始基關右外通強鄰戎馬生郊日不暇給保定之始書止八千後稍加增方盈萬卷武帝平齊先封書府所加舊本才至五千隋文帝開皇三年祕書監牛𢎞表請分遣使人搜討異本每書一卷賞絹一匹校寫既定本即歸主於是民間異書往往間出牛𢎞上表請開獻書之路曰昔周德既衰舊經紊棄孔子以大聖之才開素王之業憲章祖述制禮刋詩正五始而修春秋闡十翼而𢎞易道及秦皇馭宇吞滅諸侯先王墳籍掃地皆盡此則書之一厄也漢興建藏書之策置校書之官至孝成之代遣謁者陳農求遺書於天下詔劉向父子讎校篇籍漢之典文於斯為盛及王莽之末並從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅至肅宗親臨講肄和帝數幸書林其蘭臺石室鴻都東觀祕牒填委更倍於前及孝獻移都吏人擾亂圖畫縑帛皆取為帷囊所收而西才七十餘乘屬西京大亂一時燔蕩此則書之三厄也魏文代漢更集經典皆藏在祕書內外三閣遣祕書郎鄭默刪定舊文論者美其朱紫有别晉氏承之文籍尤廣晉祕書監荀朂定魏內經更著新簿屬劉石馮陵從而失墜此則書之四厄也永嘉之後冦竊競興其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚收其圖籍五經子史才四千卷皆赤軸青紙文字古拙並歸江左宋祕書丞王儉依劉氏七略撰為七志梁人阮孝緒亦為七録總其書數三萬餘卷及侯景渡江破滅梁室祕省經籍雖從兵火其文德殿內書史宛然猶存蕭繹據有江陵遣將破平侯景收文德之書及公私典籍重本七萬餘卷悉送荆州及周師入郢繹悉焚之於外城所收十才一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右戎車未息保定之始書止八千後加收集方盈萬卷髙氏據有山東初亦採訪驗其本目殘闕猶多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本合一萬五千餘卷部帙之間仍有殘缺比梁之舊目止有其半至於隂陽河洛之篇醫方圖譜之説彌復為少臣以經書自仲尼迄今數遭五厄興集之期屬膺聖代今祕藏見書亦足披覽但一時載籍須令大備不可王府所無私家乃有若猥發眀詔兼開購賞則異典必致觀閣斯積上納之漢世鄭玄並為衆經注解服虔何休各有所説玄易詩書禮論語孝經虔左氏春秋休公羊傳大行於河北王肅易亦間行焉晉世杜預注左氏預玄孫坦坦弟驥於宋朝並為青州刺史傳其家業故齊地多習之自魏末大儒徐遵眀門下講鄭元所注周易遵眀以傳盧景裕及清河崔瑾景裕傳權會郭茂權會早入鄴都郭茂恆在門下教授其後能言易者多出郭茂之門河南及青齊之間儒生多講王輔嗣所注師訓蓋寡齊時儒士罕傳尚書之業徐遵眀兼通之遵眀受業於屯留王聰傳授浮陽李周仁及勃海張文敬李鉉河間權會並鄭康成所注非古文也下里諸生略不見孔氏注解武平末劉光伯劉士元始得費甝義疏乃留意焉其詩禮春秋尤為當時所尚諸生多兼通之三禮並出遵眀之門徐傳業於李鉉祖雋田元鳳馮偉紀顯敬吕黃龍夏懷敬李鉉又傳授刁柔張買奴鮑季詳邢峙劉晝熊安生安生又傳孫靈暉郭仲堅丁恃德其後生能通禮經者多是安生門人諸生盡通小戴禮於周儀禮兼通者十二三焉通毛詩者多出於魏朝劉獻之獻之傳李周仁周仁傳董令度程歸則歸則傳劉敬和張思伯劉軌思其後能言詩者多出於二劉之門河北諸儒能通春秋者並服子慎所注亦出徐生之門張買奴馬敬德邢峙張思伯張奉禮張雕劉晝鮑長宣王元則並得服氏之精微又有衛覬陳達潘叔虔雖不傳徐氏之門亦為通解又有姚文安秦道靜初亦學服氏後兼更講杜元凱所注其河外儒生俱服膺杜氏其公羊穀梁二傳儒者多不厝懷論語孝經諸學徒莫不通講諸儒如權會李欽刁柔熊安生劉軌思馬敬德之徒多自出義疏雖曰専門亦皆相祖習也大抵南北所為章句好尚互有不同江左周易則王輔嗣尚書則孔安國左傳則杜元凱河洛左傳則服虔子慎尚書周易則鄭康成詩則並主於毛公禮則同遵於鄭氏南人約簡得其英華北學深蕪窮其枝葉考其終始要其會歸其立身成名殊方同致矣右北史儒林傳序言南北諸儒眀經傳授學術之詳最為眀備故録於此隋平陳已後經籍漸備檢其所得多大建時書紙墨不精書亦拙惡於是總集編次存為古本召天下工書之士京兆韋霈南陽杜頵等於祕書內補續殘缺為正副二本藏於宫中其餘以實祕書內外之閣凡三萬卷煬帝即位增祕書省官百二十員並以學士補之帝好讀書著述自為揚州總管置王府學士至百人常令修撰以至為帝前後近二十載修撰未嘗暫停自經術文章兵農地理醫卜釋道乃至捕搏鷹狗皆為新書無不精洽共成三十一部萬七千卷初西京嘉則殿有書三十七萬卷帝命祕書監柳顧言等詮次除其復重猥雜得正御本三萬七千餘卷納於東都修文殿又寫五十副本分為三品上品紅琉璃軸中品紺琉璃軸下品漆軸於東都觀文殿東西廂構屋以貯之東屋藏甲乙西屋藏丙丁又聚魏以來古迹名畫於殿後起二臺東曰妙楷臺藏古迹西曰寶臺藏古畫又於內道場集道佛經别撰目録其正御書皆裝翦華淨寶軸錦標於觀文殿前為書室十四間窗户牀褥厨幔咸極珍麗每三間開方户垂錦幔上有二飛仙户外地中施機發帝幸書室有宫人執香爐前行踐機則飛仙下收幔而上户扉及厨扉皆自啓帝出則復閉如故唐分書為四類曰經史子集而藏書之盛莫盛於開元其著録者五萬三千九百一十五卷而唐之學者自為之書者又二萬八千四百六十九卷嗚呼可謂盛矣六經之道簡嚴易直而天人備故其愈久而愈眀其餘作者衆矣質之聖人或離或合然其精深閎博各盡其術而怪竒偉麗往往震發於其間此所以使好竒博愛者不能忘也然凋零磨滅亦不可勝數豈其華文少實不足以行逺歟而俚言俗説猥有存者亦其有幸不幸者歟今著於篇其有名而忘其書者十蓋五六也可不惜哉初隋嘉則殿書三十七萬卷至武德初有書八萬卷重復相糅王世充平得隋舊書八千餘卷太府卿宋遵貴監運東都浮舟泝河西致京師經砥柱舟覆盡亡其書貞觀中魏徵虞世南顔師古繼為祕書監請購天下書選五品以上子孫工為書者手繕寫藏於內庫以宫人掌之元宗命左散騎常侍昭文館學士馬懷素為修圖書使與右散騎常侍崇文館學士褚無量整比會幸東都乃就乾元殿東序檢校無量建議御書以宰相宋璟蘇頲同署如貞觀故事又借民間異本傳録及還京師遷書東宫麗正殿置修書院於著作院其後大眀宫光順門外東都永福門外皆創集賢書院學士通籍出入既而太府月給蜀郡麻紙五千番季給上谷墨三百三十六丸嵗給河間景城清河博平四郡兔千五百皮為筆材兩都各聚書四部以甲乙丙丁為次列經史子集四庫其本有正有副軸帶帙籖皆異色以别之安祿山之亂尺簡不藏元載為相奏以千錢購書一卷又命拾遺苗發等使江淮括訪至文宗時鄭覃侍講進言經籍未備因詔祕閣搜採於是四庫之書復完分藏於十二庫黃巢之亂存者蓋鮮昭宗播遷京城制置使孫惟晟斂書本軍寓教坊於祕閣有詔還其書命監察御史韋昌範等諸道求購及徙洛陽蕩然無遺矣後唐莊宗同光中募民獻書及三百卷授以試銜其選調之官每百卷減一選天成中遣都官郎中庾傅美訪圖書於蜀得九朝實録及雜書千餘卷而已眀宗長興三年初令國子監校定九經雕印賣之石林葉氏曰唐以前凡書籍皆寫本未有摹印之法人以藏書為貴人不多有而藏者精於讎對故往往皆有善本學者以傳録之艱故其誦讀亦精詳五代時馮道始奏請官鏤板印行國朝淳化中復以史記前後漢付有司摹印自是書籍刋鏤者益多士大夫不復以藏書為意學者易於得書其誦讀亦因滅裂然板本初不是正不無訛誤世既一以板本為正而藏本日亡其訛謬者遂不可正甚可惜也余襄公靖為祕書嘗言前漢書本謬甚詔與王原叔同取祕閣古本參校遂為刋誤三十卷其後劉原父兄弟兩漢皆有刋誤余在許昌得宋景文用監本手校西漢一部末題用十三本校中間有脫兩行者惜乎今亡之矣又曰世言雕板印書始馮道此不然但監本五經板道為之爾柳玭訓序言其在蜀時嘗閲書肆云字書小學率雕板印紙則唐固有之矣但恐不如今之工今天下印書以杭州為上蜀本次之福建最下京師比嵗印板殆不減杭州但紙不佳蜀與福建多以柔木刻之取其易成而速售故不能工福建本幾遍天下正以其易成故也致堂胡氏曰易書詩春秋全經也先賢以之配皇帝王霸言世之變道之用不出乎是矣論語孟子聖賢之微言諸經之管轄也孝經非曽子所為蓋其門人纘所聞而成之故整比章指又未免有淺近者不可以經名也禮記多出於孔氏弟子然必去吕不韋之月令及漢儒之王制仍博集名儒擇冠婚喪祭燕饗相見之經與曲禮以類相從然後可以為一書若大學中庸則孟子之倫也不可附之禮篇至於學記樂記間居燕居緇衣表記格言甚多非經解儒行之比當以為大學中庸之次也禮運禮器玉藻郊特牲之類又其次也若周官則決不出於周公不當立博士使學者傳習姑置之足矣古有經而無數逮孔子刪定繫作然後易詩書春秋成焉然孔孟之門經無五六之稱其後世分禮樂為二與四經為六歟抑合禮樂為一與四經為五歟廢仲尼親筆所注之春秋而取劉歆所附益之周禮列之學官於是六經名實益亂矣有天下國家必以經術示教化不意五季之君夷狄之人而知所先務可不謂賢乎雖然命國子監以木本行所以一文義去舛訛使人不迷於所習善矣頒之可也鬻之非也或曰天下學者甚衆安得人人而頒之曰以監本為正俾郡邑皆傳刻焉何患於不給國家浮費不可勝計而獨靳於此哉此馮道趙鳳之失也後漢乾祐中禮部郎司徙調請開獻書之路凡儒學之士衣冠舊族有以三館亡書來上者計其卷帙賜之金帛數多者授以官秩時戎虜猾夏之後官族轉徙書籍罕存詔下鮮有應者周世宗以史館書籍尚少鋭意求訪凡獻書者悉加優賜以誘致之而民間之書傳寫舛訛乃選常參官三十人校讎刋正令於卷末署其名銜焉自諸國分據皆聚典籍惟吳蜀為多而江左頗為精真亦多修述宋建隆初三館有書萬二千餘卷乾德元年平荆南盡收其圗書以實三館三年平蜀遣右拾遺孫逢吉往收其圗籍凡得書萬三千卷四年下詔購募亡書三禮涉弼三傳彭幹學究朱載等皆詣闕獻書合千二百二十八卷詔分置書府弼等並賜以科名閏八月詔史館凡吏民有以書籍來獻當視其篇目館中所無者收之獻書人送學士院試問吏理堪任職官者具以名聞開寶八年冬平江南眀年春遣太子洗馬吕龜祥就金陵籍其圗書得二萬餘卷悉送史館自是羣書漸備兩浙錢俶歸朝又收其書籍先是朱梁都汴正眀中始以今右長慶門東北廬舍十數間列為三館湫隘卑庳才蔽風雨周廬徼道出於其側衛士騶卒朝夕喧雜歷代以來未遑改作每諸儒受詔有所論撰即移於他所始能成之太平興國初太宗因幸三館顧左右曰若此之陋豈可以蓄天下圗籍延四方之士邪即詔經度左升龍門東北舊車路院别建三館命中使督其後棟宇之制皆親所規畫三年二月書院成詔曰國家聿新崇構大集羣書宜鍚嘉名以光䇿府其三館新修書院宜目為崇文院自經始至於畢功臨幸者再輪奐壯麗甲於內庭西序啓便門以備行幸於是盡遷舊館之書以實之院之東廊為昭文書庫南廊為集賢書庫西廊有四庫分經史子集四部為史館書庫六庫書籍正副本凡八萬卷䇿府之文煥乎一變矣九年正月詔曰國家宣眀憲度恢張政治敦崇儒術啓迪化源國典朝章咸從振舉遺編墜簡當務詢求眷言經濟無以加此宜令三館以開元四部書目閲館中所闕者具列其名詔中外購募有以亡書來上及三百卷當議甄録酬奬餘第卷帙之數等級優賜不願送官者借本寫畢還之自是四方書籍往往間出端拱元年詔分三館之書萬餘别為書庫目曰祕閣以禮部侍郎李至兼祕書監右司諌直史館宋泌兼直祕閣右贊善大夫史館檢討杜鎬為校理淳化二年五月以史館所藏天文歷算隂陽術數兵法之書凡五千十二卷天文圗畫一百十四卷悉付祕閣八月賜宴於祕閣右僕射李昉吏部尚書宋琪左散騎常侍徐鉉及翰林學士諸曹侍郎給事中諌議舍人等皆預焉大陳圗籍令觀之翌日又詔御史中丞王化基及直館並賜宴復令觀書是嵗李至等上言曰王者藏書之府自漢置未央宫則有麒麟天祿閣命劉向揚雄典校其書皆在禁中謂之中書即內庫書也後漢之東觀亦禁中也至桓帝始置祕書監掌禁中圗書祕記謂之祕書及魏文帝分祕書立中書而祕書監専掌藝文圗籍之事後以祕書屬少府王肅為祕書監表論曰魏之祕書即漢之東觀也由是不屬少府而蘭臺亦藏書故薛夏云蘭臺為外臺祕書為內閣然則祕閣之書藏之於內眀矣晉宋以還皆有祕閣之號故晉孝武好覽文藝敕祕書郎徐廣料祕閣四部書三萬餘卷宋謝靈運為祕書監補祕閣之遺逸齊末兵火延燒祕閣經籍遺散梁江子一亦請歸祕閣觀書隋煬帝寫祕閣之書分為三品於觀文殿東西廊貯之然則祕閣之説其來久矣及唐開元中繕寫四部書以充內庫命散騎常侍禇無量祕書監馬懷素總其事事成列於乾元殿之東廊然則祕閣之書皆置之於內也自唐室陵夷中原多故經史文籍蕩然流離僅及百年斯道幾廢國家承衰敝之季開政治之源三館之書購求漸廣經籍之道於是復興陛下運獨見之眀下惟新之詔復建祕閣以藏奇書總羣經之博要資乙夜之觀覽斯實出於宸心非因羣下之建議也况睿藻神翰盈溢編帙其所崇重非復與羣司為比然自創置之後載離寒暑而官司所處未有定制望降眀詔令與三館並列敘其先後著為永式其祕書省既無籍元𨽻百司請如舊制詔可其奏列祕閣次於三館三年八月館閣成上製贊親書并篆額勒石立於閣前容齋洪氏隨筆曰國初承五季亂離之後所在書籍印板至少宜其焚蕩了無孑遺然太平興國中編次御覽引用一千六百九十種其綱目並載於首卷而雜書古詩賦又不及具録以今考之無傳者十之七八矣則是承平百七十年翻不若極亂之世姚鉉以大中祥符四年集唐文粹其序有云况今歷代墳籍略無亡逸觀鉉所類文集蓋亦多不存誠為可歎祖宗藏書之所曰三館祕閣在左升龍門北是為崇文院自建隆至大中祥符著録總三萬六千二百八十卷八年館閣火移寓右掖門外謂之崇文外院借太清樓本補寫既多損蠹更命繕還天聖三年成萬七千六百卷歸於太清九年冬新作崇文院館閣復而外院廢時已增募寫書史専事完緝景祐初命翰林學士張觀知制誥李淑宋郊編四庫書判館閣官覆視録校二年上經史八千四百二十五卷眀年上子集萬二千三百六十六卷差賜官吏器幣就宴輔臣兩制館閣官進管勾內侍官一等詔購求逸書復以書有謬濫不完始命定其存廢因倣開元四部録為崇文總目慶歷初成書凡三萬六百六十九卷然或相重亦有可取而誤棄不録者嘉祐四年右正言祕閣校理吳及言內臣監館閣久不更書多亡失補寫不精請選館職分吏編寫重借書法求訪所遺事並施用令陳襄蔡抗蘇頌陳繹編定四館書不兼他局二年一代遂用黃紙寫印正本以防蠹敗又選京朝官州縣官四人編校二年遷館職闕即隨補嵗餘詔曰國初承五代之後簡編散落三館聚書僅才萬卷其後平定列國先收圗籍亦嘗分遣使人屢下詔令訪募異本校定篇目聼政之暇無廢覽觀然比開元遺逸尚衆宜加購賞以廣獻書中外士庶並許上館閣闕書卷支絹一匹五百卷與文資官眀年冬奏黃本書六千四百九十六卷補白本二千九百五十四卷賜宴如景祐自是編寫不絶收獻書二百一十七部千三百六十八卷合崇文總目除前志所載刪去重復訛謬定注一千四百七十四部八千四百九十四卷熙寧四年集賢院學士史館修撰宋敏求言前代崇建䇿府廣收典籍所以備人君覽觀以成化天下今三館祕閣各有四部書外經史子集其書類多訛舛纍加校正尚無善本蓋逐館幾四萬卷校讎之時務存速畢每帙止用元寫本一册校正而已更無兼本照對第數既多難得精密故藏書雖富未及前代欲乞先以前漢書藝文志所載者廣求其本令在館供職官重復校正校正既畢然後校後漢時諸書竊緣戰國以後及於兩漢皆是古書文義簡奧多有脫誤須得他本參定乞依昨來十七史例於京師及下諸路藏書之家借本謄寫送官俟其已精方及魏晉次及宋齊至唐則分為數等取其堪傳者則校正庶幾祕府文籍得以全善事雖不行然補寫校定訪求闕遺未嘗廢也七年命三館祕閣編校所看詳成都府進士郭有直及其子大亨所獻書三千七百七十九卷得祕閣所無者五百三卷詔官大亨為將作監主簿自是中外以書來上凡增四百四十部六千九百三十九卷元豐三年改官制廢館職以崇文院為祕書省刋寫分貯集賢院史館昭文館祕閣經籍圗書以祕書郎主之編緝校定正其脫誤則校書郎正字主之嵗於仲夏曝書則給酒食費諫官御史及待制以上官畢赴元祐中詔祕書省見校對黃本書籍可添一員以選人秦觀充黃本書即嘉祐中寫印正本紹聖初罷不復置崇寧中詔兩浙成都府路有民間鏤板奇書令漕司取索上祕書省大觀二年詔大司成分委國子監太學辟雍等官校本監書籍候畢令禮部覆校四年祕書監何志同言漢著七略凡為書三萬三千九百卷隋所藏至三十七萬卷唐開元間八萬九千六百卷慶歷間常命儒臣集四庫為籍名曰崇文總目凡三萬六百六十九卷慶歷距今未逺也按籍而求之十才六七號為全本者不過二萬餘卷而脫簡斷編亡散缺逸之數浸多謂宜及今有所搜採視舊録有未備者頒其名數於天下選文學博雅之士求訪總目之外别有異書並借傳寫或官給劄即其家傳之就加校正上之䇿府即從其請政和七年校書郎孫覿言太宗皇帝建崇文殿為藏書之所景祐中仁宗皇帝詔儒臣即祕書所藏編次條目所得書以類分門賜名崇文總目神宗皇帝以崇文院為祕書省釐正官名獨四庫書尚循崇文舊目頃因臣僚建言訪求遺書今纍年所得總目之外凡數百家幾萬餘卷乞依景祐故事詔祕書省官以所訪遺書討論撰次增入總目合為一書乞别製美名以更崇文之號乃命覿及著作佐郎倪濤校書郎汪藻劉彥通撰次名曰祕書總目宣和初提舉祕書省官建言置補寫御前書籍所於祕書省稍訪天下之書以資校對以侍從官十人為參詳官餘官為校勘官進士以白衣充檢閲者數人及年皆命以官四年四月詔曰朕惟太宗皇帝底寧區宇作新斯文屢下詔書訪求亡逸䇿府四部之藏庶幾乎古歷嵗浸久有司玩習多致散缺私室所閟世或不傳可令郡縣諭旨訪求許士民以家藏書在所自陳不以卷帙多寡先具篇目申提舉祕書省以聞聼旨遞進可備收録當優與支賜或有所祕未見之書有足觀采即命以官議加崇奬其書録竟給還若率先奉行訪求最多州縣亦具名聞庶稱朕表章闡繹之意又詔曰三館圗書之富歷嵗滋久簡編脫落字畫訛舛校其卷帙尚多逸遺甚非所以示崇儒右文之意乃命建局以補全校正文籍為名設官總理募工繕寫一置宣和殿一置太清樓一置祕閣俾提舉祕書省官兼領凡所資用悉出內帑毋費有司庶成一代之典三詔同日而下四方奇書自是間出五年二月提舉祕書省言有司搜訪士民家藏書籍悉上送官參校有無募工繕寫藏之御府近與三館參校榮州助教張頤所進二百二十一卷李東一百六十二卷皆係闕遺乞加褒賞詔頤賜進士出身東補迪功郎七年提舉祕書省又言取索到王闡張宿等家藏書以三館祕閣書目比對所無者凡六百五十八部二千四百一十七卷及集省官校勘悉善本比前後所進書數稍多詔闡補承務郎宿補迪功郎然自熙寧以來搜訪補緝至宣和盛矣至靖康之變散失莫考今見於著録往往多非曩時所訪求者凡一千四百四十三部二萬五千二百五十四卷髙宗渡江書籍散佚獻書有賞或以官故家藏者或命就録鬻者悉市之乃詔分經史子集四庫仍分官日校又內降詔其略曰國家用武開基右文致治藏書之盛視古為多艱難以來網羅散失而十不得其四五令監司郡守各諭所部悉上送官多者優賞又復置補寫所令祕書省提舉掌求遺書詔定獻書賞格自是多來獻者淳熙四年祕書少監陳騤等言中興館閣藏書前後搜訪部帙漸廣乞倣崇文總目類次五年書目成計見在書四萬四千四百八十六卷較崇文所載實多一萬三千八百一十七卷復參三朝所志多八千二百九十卷兩朝所志多三萬五千九百九十二卷嘉定十三年以四庫之外書復充斥詔祕書丞張攀等續書目又得一萬四千九百四十三卷而太常太史博士之藏諸郡諸路刻板而未及獻者不預焉蓋自紹興至嘉定承平百載遺書十出八九著書立言之士又益衆往往多充祕府紹定辛卯火災書多闕今據書目續書目及搜訪所得嘉定以前書詮校而志之葉氏過庭録曰前世大亂之後書籍散亡時君多用意搜求自漢成帝遣謁者陳農求遺書於天下而命劉向等校之至隋煬帝設二臺募以金帛開元後元載當國亦命拾遺苖發等為江淮括圗書使每以千錢易書一卷故人以嗜利偽作爭獻時無劉向輩論考即並藏之但以卷帙多為貴往承平時三館嵗曝書吾每預其間凡世所不傳者類冗陋鄙淺無足觀及唐末五代書尤甚然好奇者或得其一爭以誇人不復更考是非此亦藏書一僻也漢武帝時河間獻王以樂書來獻乃周官大司樂章當時六經猶未盡出其誤固無足怪齊髙帝時雍州發古冡得十餘簡以示王僧虔云是蝌蚪書考工記周官所闕文世既無此書僧虔何從證之乎此亦好奇以欺衆爾本朝公卿家藏書惟宋宣獻最精好而不多蓋凡無用與不足觀者皆不取故吾書每以為法也又曰古書自唐以後以甲乙丙丁略分為經史子集四類承平時三館所藏不滿十萬卷崇文總目所載是也公卿名藏書家如宋宣獻李邯鄲四方士民如亳州祁氏饒州吳氏荆州田氏等吾皆見其目多止四萬許卷其間頗有不必觀者惟宋宣憲家擇之甚精止二萬許卷而校讎詳密皆勝諸家吾舊所藏僅與宋氏等而宋氏好書人所未見者吾不能盡得也自六經諸史與諸子之善者通有三千餘卷讀之固不可限以數以二十年計之日讀一卷亦可以再周其餘一讀足矣惟六經不可一日去手吾自登科後每以五月以後天氣漸暑不能泛及他書即日専誦六經一卷至中秋時畢謂之夏課守之甚堅宣和後始稍廢嵗亦必一周也每讀不唯頗得新意前所未達者其先日差誤所獲亦不少故吾於六經似不甚滅裂南史記徐廣年過八十猶嵗讀五經一遍吾殆不愧此前輩説劉原父初為窮經之學寢食坐卧雖謁客未嘗不以六經自隨蠅頭細書為一編置夾袋中人或效之後傭書者遂為雕板世傳夾袋六經是也今人但隨好惡茍誦一家之説便自立門户以為通經內不求之已外不求之古可乎後生稔習聞見所以日趨於淺陋也王氏揮麈録曰承平時士大夫家如南都戚氏歷陽沈氏廬山李氏九江陳氏鄱陽吳氏俱有藏書之名今皆散逸近年所至郡府多刋文籍且易得本傳録仕宦稍顯者家必有書數千卷然多失於讎校也吳眀可帥會稽百廢具舉獨不傳書眀清嘗啓其故云此事當官極易辦但僕既得書期會賓客應接無暇自校子弟又方令為程文不欲以此散其功委之他人孰肯盡心漫盈箱篋以誤後人不若已也又曰唐著作郎杜寶大業幸江都記云煬帝聚書至三十七萬卷皆焚於廣陵其目中蓋無一帙傳於後代靖康俶擾中祕所藏與士大夫家者悉為烏有南渡後惟葉少藴少年貴盛平生好收書逾十萬卷置之霅川辨山山居建書樓以處之極為華煥丁卯年其宅與書俱蕩一燎李泰發家舊有萬餘卷亦以是嵗火豈厄會自有時邪東坡作李氏山房藏書記曰象犀珠玊怪珍之物有悅於人之耳目而不適於用金石草木絲麻五穀六材有適於用而用之則敝取之則竭恱於人之耳目而適於用用之而不敝取之而不竭賢不肖之所得各因其才仁智之所見各隨其分才分不同而求無不獲者惟書乎自孔子聖人其學必始於觀書當是時惟周之柱下史聃為多書韓宣子適魯然後見易象與魯春秋季札聘於上國然後聞詩之風雅頌而楚獨有左史倚相能讀三墳五典八索九邱士之生於是時得見六經者蓋無幾其學可謂難矣而皆習於禮樂深於道德非後世君子所及自秦漢已來作者益衆紙與字畫日趨於簡便而書益多世莫不有然學者益以茍簡何哉余猶及見老儒先生自言其少時欲求史記漢書而不可得幸而得之皆手自書日夜誦讀惟恐不及近嵗市人轉相摹刻諸子百家之書日傳萬紙學者之於書多且易致如此其文詞學術當倍蓰於昔人而後生科舉之士皆束書不觀遊談無根此又何也余友李公擇少時讀書於廬山五老峯下白石庵之僧舍公擇既去而山中之人思之指其所居為李氏山房藏書凡九千餘卷公擇既已涉其流探其源採剝其華實而咀嚼其膏味以為已有發於文詞見於行事以聞名於當世矣而書固如是也未嘗少損將以遺來者供其無窮之求而各足其才分之所當得是以不藏於家而藏於其故所居之僧舍此仁者之心也余既衰且病無所用於世惟得數年之間盡讀其所未見之書而廬山固所願遊而不得者蓋將老焉盡發公擇之藏拾其餘棄以自補庶有益乎而公擇求余文以為記乃為一言使來者知昔之君子見書之難而今之學者有書而不讀為可惜也右歷代收書之數藏書之所備見前志而葉氏王氏所言又近代士大夫藏書之大概也坡翁一記可以警蓄書而不讀者故併載焉文獻通考卷一百七十四
