body:
  text: 文獻通考卷二百八十三鄱陽馬端臨貴與著象緯考六日食魏文帝黄初二年六月戊辰晦日有食之有司奏免太尉詔曰災異之作以譴元首而歸股肱豈禹湯罪已之義乎其令百官各䖍厥職後有天地𤯝勿復劾三公三年正月丙寅朔十一月庚申晦五年十一月戊寅晦明帝太和初太史令許芝奏日應蝕與太尉於靈臺祈禳帝曰蓋聞人主政有不徳則天懼之以災異所以譴告使得自脩也故日月薄蝕明治道有不當者朕即位以來既不能光明先帝聖徳而施化有不合於皇神故上天有以寤之宜敕政自脩有以報於神明天之於人猶父之於子未有父欲責其子而可以獻盛饌以求免也今外欲遣上公與太史令俱禳祠之於義未聞也羣公卿士大夫其各勉脩厥職有可以補朕不逮者各封上之太和五年十一月戊戌晦六年正月戊辰朔見吳歴青龍元年閏月庚寅朔少帝正始元年七月戊申朔三年四月戊戌朔四年五月丁丑朔五年四月壬子朔七月戊申朔八年二月庚午朔是時曹爽専政丁謐鄧颺等轉改法度有日蝕之變詔羣臣問得失蔣濟上疏曰昔大舜佐治戒在比周周公輔政慎於其朋齊侯問災晏子對以布惠魯君問異臧孫答以緩役塞變應天乃實人事濟㫖譬甚切而君臣不悟終至敗亡九年正月乙未朔嘉平元年二月己未朔髙貴鄉公甘露四年七月戊子朔五年正月乙酉朔京房易占曰日食乙酉君弱臣强司馬將兵反征其王五月有成濟之變元帝景元二年五月丁未朔三年十一月己亥朔晉武帝泰始二年七月丙午朔十月丙午朔七年十月丁丑朔八年十月辛未朔九年四月戊辰朔十年正月乙未三月癸亥咸寧元年七月甲申晦三年正月丙子朔四年正月庚午朔太康四年三月辛丑朔七年正月甲寅朔八年正月戊申朔九年正月壬申朔六月庚子朔並日有食之太熙元年四月庚申帝崩惠帝元康九年十一月甲子朔十二月廢皇太子遹為庶人㝷殺之永康元年正月己邜四月辛邜朔並日有蝕之永寧元年閏月丙戌朔光熙元年正月戊子朔七月乙酉朔十一月惠帝崩十二月壬午朔懷帝永嘉元年十一月戊申朔二年正月丙子朔六年二月壬子朔愍帝建興四年六月丁巳朔十二月甲申朔並日有食之五年五月丙子十一月丙子並日有食之時帝蒙塵於平陽元帝太興元年四月丁丑朔明帝太寧三年十一月癸巳朔在邜至斗斗吳分也其後蘇峻作亂成帝咸和二年五月甲申朔在井井主酒食女主象也明年皇太后以憂崩六年三月壬戌朔是時帝已年長每幸司徒第猶出入見王導夫人曹氏如子弟之禮以人君而敬人臣之妻有虧君徳之象也九年十月乙未朔是時帝既冠當親萬機而委政大臣道有虧也咸康元年十月乙未朔七年二月甲子朔三月杜皇后崩八年正月乙未朔京師大雨郡國以聞是謂三朝王者惡之六月而帝崩穆帝永和二年四月己酉七年正月丁酉八年正月辛邜並日有食之十二年十月癸巳朔在尾尾燕分北狄之象也是時邉表姚襄苻生互相吞噬朝廷憂勞征伐不止升平四年八月辛丑朔日有食之㡬既在角凡蝕淺者禍淺深者禍大角為天門人主惡之明年而帝崩哀帝隆和元年三月甲寅十二月戊午朔並日有食之明年而帝有疾不識萬㡬海西公太和三年三月丁巳朔五年七月癸酉朔並日有食之皆海西被廢之應也孝武帝寧康三年十月癸酉朔太元四年閏月己酉朔是時苻堅攻沒襄陽執朱序六年六月庚子朔九年十月辛亥朔十七年五月丁邜朔二十年三月庚辰朔明年帝崩安帝隆安四年六月庚辰朔是時元顯執政元興二年四月癸巳朔其冬桓元簒位義熙三年七月戊戌朔十年九月丁巳朔十一年七月辛亥晦十三年正月甲戌朔明年帝崩恭帝元熙元年十一月丁亥朔自義熙元年至是日食日從上始皆為革命之徵凡魏晉共一百五十年日蝕七十九朔六十五晦七不言朔晦七宋營陽王景平二年二月己邜朔日有蝕之文帝元嘉四年癸邜朔五年五月壬辰朔十一月己丑朔十七年四月戊午朔十九年七月甲戌晦二十三年六月癸未朔三十年秋七月辛丑朔孝武帝孝建元年七月丙申朔日有食之既大明五年九月甲寅明帝太始四年十月癸酉朔五年十月丁邜朔後廢帝元徽元年十二月癸邜朔順帝昇明二年三月己酉朔九月乙巳朔三年三月癸邜朔齊髙帝建元二年九月甲午朔三年七月己未朔武帝永明元年十二月乙巳朔廢帝隆昌元年五月甲戌朔明帝建武元年十一月壬申東昏侯永元三年正月丙申朔梁武帝天監元年七月丁巳朔五年三月丙寅朔十年十二月壬戌朔日食在牛四度十五年三月戊辰朔日有食之既普通元年正月乙亥朔丙子占曰日食隂侵陽陽不克隂也為大水其年七月江淮海溢三年五月壬辰朔日有食之既四年十一月癸未朔大同四年六月辛丑朔太清元年春正月己亥朔陳武帝永定三年五月丙辰朔文帝天嘉三年九月戊辰朔宣帝大建三年九月庚子朔六年三月壬辰朔後主至徳三年春正月戊午朔後魏道武帝天興三年夏六月庚辰朔即東晉安帝隆安四年六年夏四月癸巳朔晉元興二年天賜五年十月戊戌朔晉義熙三年明元神瑞元年九月丁巳朔晉義熙十年二年八月庚辰晦晉義熙十一年晉史作七月辛巳朔泰常元年七月辛亥晦二年正月甲戌朔晉義熙十四年四年冬十一月丁亥朔太武始光四年六月癸邜朔宋文帝元嘉四年神䴥元年十一月乙未朔宋元嘉五年南史是年五月亦日食此不載太延元年正月乙未朔三年冬十一月乙邜朔太平真君元年四月戊午朔宋元嘉十七年三年八月甲戌晦宋元嘉十九年六年六月戊子朔七年六月癸未朔元嘉二十三年十年四月丙申朔文成帝太安元年七月丙申朔宋孝武孝建元年和平元年九月庚申朔二年二月壬子朔宋大明五年獻文帝皇興元年十月己亥朔宋明帝太始四年二年四月丙子朔十月癸酉朔宋太始五年三年十月丁酉朔孝文延興元年十二月癸邜宋廢帝元徽元年三年十二月癸邜朔四年正月癸酉朔太和元年十月辛亥朔二年二月乙酉晦宋順帝昇平二年三年三月癸邜朔宋昇平三年五年七月庚申朔齊髙祖建元二年南史書九月甲午朔七年十二月乙巳朔十二年二月辛亥朔十四年正月己巳朔十五年正月癸亥晦十七年六月庚辰朔十八年五月甲戌朔齊明帝建武元年南史書十一月壬申朔二十年九月庚寅晦宣武帝景明元年正月辛丑朔齊東昏侯永元三年七月己亥朔二年秋七月癸巳朔三年七月丁巳朔梁武帝天監元年永平元年八月壬子朔二年八月丙午朔四年十二月壬戌朔梁天監十年延昌元年五月己未晦孝明帝熙平元年三月戊辰朔梁天監十五年神龜二年正月辛巳朔二年五月甲寅朔正光元年正月乙亥朔梁普通元年二年五月丁酉朔三年五月壬辰朔梁普通三年冬十一月己丑朔四年十一月癸未朔梁普通四年孝莊帝永安二年十月乙酉朔節閔帝普泰元年六月己亥朔孝武永熙元年十月辛酉朔二年四月己未朔三年四月癸丑朔孝靜帝元象元年正月辛酉朔梁大同四年興和元年閏五月丁丑朔武定五年正月己亥朔梁太清元年北齊後主武平七年六月戊申朔周武帝保定元年四月丙子朔十月甲戌朔二年九月壬辰朔陳文帝天嘉三年三年三月乙丑朔四年二月庚寅朔八月丁亥朔五年七月辛巳朔天和六年正月己邜朔二年正月癸酉朔十一月戊戌朔三年十一月壬辰朔五年十月辛巳朔六年四月戊寅朔陳宣帝太建三年南史書九月庚子朔建徳元年三月癸邜朔九月庚子朔三年二月壬辰朔陳太建六年四年二月丙戌朔十二月辛亥朔五年六月戊申朔六年十一月己亥朔靜帝大象二年十月甲寅朔隋文帝開皇三年二月己巳朔秋七月丁邜四年正月甲子朔七年五月乙亥朔十一年二月辛巳晦十二年七月壬申晦十三年七月戊辰晦仁夀元年二月乙邜朔煬帝大業十二年五月丙戌朔按自李延夀南北史不作諸志後來之閱史者遂以隋書上接晉書然隋書諸志南止及梁陳而不及宋齊北止及齊周而不及元魏而沈約蕭子顯魏收諸史世所罕見故宋齊魏之事無由考焉近世鄭漁仲作通志號為該洽然其天文略所書日食以梁武帝天監十年上接宋恭帝元熙元年蓋上以隋志之所有者書之而更不考宋齊之事疎略如此又況梁陳兩代日食凡十四而隋志僅書其四則隋志亦未為詳盡也今就帝紀中刷出所書日食類而載之南宋齊梁陳北魏周齊隋上承晉下接唐然後所載稍備然南自宋武帝永初元年至陳後主禎明二年北自魏明帝泰常五年至隋文帝開皇八年此一百六十九年之間南史所書日食僅三十六而北史所書乃七十九其間年歲之相合者纔二十七又有年合而月不合者如南齊髙帝建元二年即北魏孝文太和五年是年日食南史書九月甲午朔北史書六月庚申朔之類夫縣象著明同此一宇宙也豈有食於北而不食於南之理如以為隂雲不見則不書食然北史所書過倍南史之數豈南常隂翳而北常開霽乎又歲年之不合與年同而月異皆所不可曉者春秋日食不書日與晦朔猶以為官失之今二史牴牾乃如此其為官失也大矣唐髙祖武徳元年十月壬申朔日有食之在氐五度占曰諸侯専權則其應在所宿國諸侯附從則為王者事四年八月丙戌朔在翼四度楚分也六年十二月壬寅朔在斗十九度吳分也九年十月丙辰朔在氐七度太宗貞觀元年閏三月癸丑在胃九度九月庚戌朔在亢五度胃為天倉亢為疏廟二年三月戊申朔在婁十一度占為大臣憂三年八月己巳朔在翼五度占曰旱四年閏正月丁邜朔在營室四度七月甲子朔在張十四度占為禮失六年正月乙邜朔在虚九度虚耗祥也八年五月辛未朔在參七度九年閏四月丙寅朔在畢十三度占為邉兵十一年三月丙戌朔在婁三度占為大臣憂十二年閏二月庚辰朔在奎九度奎武庫也十三年八月辛未朔在翼十四度翼為逺夷十七年六月己邜朔在東井十六度京師分也十八年十月辛丑朔在房三度房將相位二十年閏三月癸巳朔在胃九度占曰主有疾二十二年八月己酉朔在翼五度占曰旱髙宗顯慶五年六月庚午朔在桞五度龍朔元年五月甲子晦在東井二十七度皆京師分也麟徳二年閏三月癸酉在胃九度占曰主有疾乾封二年八月己酉朔在翼六度總章二年六月戊申朔在東井二十九度咸亨元年六月壬寅朔在東井十八度二年十一月甲午朔在箕九度三年十一月戊子朔在尾十度東井京師分箕為后妃之府尾為後宫五年三月辛亥朔在婁十三度占為大臣憂永隆元年十一月壬申朔在尾十六度開耀元年十月丙寅朔在尾四度永淳元年四月甲子朔在畢五度十月庚申朔在房三度武后垂拱二年二月辛未朔在營室十五度四年六月丁亥朔在東井二十七度京飾分也天授二年四月壬寅朔在昴七度如意元年四月丙申朔在胃十一度皆正陽之月長夀二年九月丁亥朔在角十度角内為天廷延載元年九月壬午朔在軫八度軫為車騎證聖元年二月己酉朔在營室五度聖歴三年五月己酉朔在畢十五度長安二年九月乙丑朔幾既在角初度二年三月壬戌朔在奎十度占曰君不安九月庚寅朔在亢七度中宗神龍三年六月丁邜朔在東井二十八度京師分也景龍元年十二月乙丑朔在南斗二十一度斗為丞相位元宗先天元年九月丁邜朔在角十度開元三年七月庚申朔在張四度七年五月己丑朔在畢十五度九年九月乙巳朔在軫十八度十二年閏十二月丙辰朔在虚初度十七年十月戊午朔不盡如鈎在氐九度二十年二月甲戌朔在營室十度八月辛未朔在翼七度二十一年七月乙丑在張十五度二十二年十二月戊子朔在南斗十三度二十三年閏十一月壬午朔在南斗十一度二十六年九月丙申朔在亢九度二十八年三月丁亥朔在翼三度天寳元年七月癸邜朔在張五度五載五月壬子朔在畢十六度十三載六月乙丑朔幾既在東井十九度京師分也肅宗至徳元載十月辛巳朔日有食之既在氐十度上元二年七月癸未朔日有食之既大星皆見在張四度代宗大歴三年三月乙巳朔在奎十一度十年十月辛酉朔在氐十一度宋分也十四年七月戊辰朔在張四度十二月丙寅晦在危十二度徳宗貞元二年八月辛巳朔在軫八度五年正月甲辰朔在營室六度八年十一月壬子朔在尾六度宋分也十二年八月己未朔在翼十八度占曰旱十七年五月壬戌朔在東井十度憲宗元和三年辛巳朔在七星三度十年八月己亥朔在翼十八度十三年六月癸丑朔在輿鬼一度京師分也穆宗長慶二年四月辛酉朔在胃十三度三年九月壬子朔在角十二度文宗太和八年二月壬午朔在奎二度開成元年正月辛丑朔在虚三度武宗會昌三年二月庚申朔在東壁一度并州分也四年二月甲寅朔在營室七度五年七月丙午朔在張七度六年十二月戊辰朔在南斗十四度宣宗大中二年五月己未朔在參九度八年正月丙戌朔在危二度危為元枵亦耗祥也懿宗咸通四年七月辛邜朔在張十七度僖宗乾符三年九月乙亥朔在軫十四度四年四月壬申朔在畢三度六年四月庚申朔在胃八度文徳元年三月戊戌朔在胃一度昭宗天祐元年十月辛邜朔在心二度三年四月癸未朔在胃十二度右唐著紀二百八十九年日食九十三朔九十一晦一二日一梁太祖開平五年正月丙戌朔日有食之乾化元年正月丙戌朔少帝龍徳三年十月辛未朔唐莊宗同光三年四月癸亥朔司天奏在昴主嵗大旱明帝天成元年八月乙酉朔二年八月己邜朔三年五月丁丑其日隂雲不見百官稱賀長興元年六月癸巳朔二年十一月甲申朔先是司天奏朔日合食二分伏緣所食微少太陽光影相鑠伏恐不辨虧闕請其日不入閤百官不守司從之晉髙祖天福二年正月乙邜朔二日三年正月戊申朔四年七月庚子朔七年四月甲寅朔八年四月戊申朔少帝開運元年九月庚午朔二年八月甲子朔三年二月壬戌朔漢隠帝乾祐元年六月戊寅朔二年六月癸酉朔三年十一月甲子朔周太祖廣順二年四月丙戌朔宋太祖皇帝建隆元年五月己亥朔二年四月癸巳朔乾徳三年二月壬寅朔驗之不食五年六月戊午朔開寳元年十二月己酉朔三年四月辛未朔四年十月癸亥朔五年九月丁巳朔七年二月庚辰朔八年七月辛未朔太宗太平興國二年十一月丁亥朔六年九月乙未朔七年三月癸巳朔八年二月戊子朔雍熙二年十二月庚子朔三年六月戊戌朔淳化二年閏二月辛未朔三年二月乙丑朔四年二月己未朔五年十二月戊寅朔雲隂不見與不食同侍臣稱賀真宗咸平元年五月戊午朔十月丙戌朔二年九月庚辰朔三年三月戊寅朔五年七月甲午朔景徳元年十二月庚辰朔三年五月壬寅朔雲隂不見四年五月丙申朔十月甲午朔雲隂不見大中祥符二年三月丙辰朔隂雨不見五年八月丙申朔六年十二月戊午朔七年十二月癸丑朔驗之不食八年六月己酉朔天禧三年三月戊午朔五年七月甲戌朔當食既測驗及四分止仁宗乾興元年七月甲子朔日食幾盡天聖二年五月丁亥朔日當食候之不食四年十月甲戌朔六年三月丙申朔七年八月丁亥朔明道二年六月甲午朔皆食景祐三年殿中丞王立言四月己酉朔日當食二分半候之不食寳元元年正月丙辰朔食六分申一刻便復六月戊子日官楊維徳等言來歲閏十二月則庚辰歲正月朔日當食請移閏於庚辰則日食在前正月之晦帝曰閏所以正天時而授民事其可曲避乎不許康定元年正月丙辰朔食慶歴二年六月壬申朔食五分至酉六刻帯二分入濁不見三年五月丁邜朔食四年十一月戊申朔日當食不食五年四月丁亥朔日應食而雲晦不見六年三月辛巳朔食四分半申三刻復皇祐元年正月甲午朔食一分四年十一月壬寅朔食二分弱未正一刻復五年十月丙申朔午正一刻食至四分半至和元年四月甲午朔食九分餘闕於西南申正一刻甚是日雷雨降詔䘏刑及預降徳音占曰正陽之月日食王者惡之嘉祐元年八月庚戌朔食二分三年八月己亥朔食三分半四年正月丙申朔食三分餘未初三刻復占曰受歲而食日王者惡之先是日食欲改戊戌年十二月為閏以避之詔不許六年六月壬子朔未初刻食四分入雲不見時議稱賀修起居注司馬光上言臣愚以為日之所照周徧華夷雲之所蔽至為近狹今若太陽實虧而有浮翳塞雖京師不見四方必有見者此乃天戒至深不可不察也臣聞漢成帝永始元年九月日有食之四方不見京師見谷永以為沈湎於酒禍在内也二年二月日有食之四方見京師不見谷永以為百姓屈竭禍在外也臣愚以為永之所言似未協天意夫四方不見京師見者禍尚淺也四方見京師不見者禍寖深也日者人君之象天意若曰人君為隂邪所蔽災慝明著天下皆知其憂危而朝廷獨不知也由是言之人主尤宜側身戒懼憂念社稷而羣臣乃始相率稱賀豈得不謂之上下相䝉誣罔天譴哉又所食不滿分數者歴官術數之不精當治其罪亦非所以為賀也神宗熙寧元年正月甲戌朔日有食之二年七月乙丑朔太史言日當食八分是日隂雲蔽食不及定分六年四月甲戌朔太史言日當食隂雲不見八年八月庚寅太史言日當食隂雲不見元豐元年六月癸邜太史言當食驗之不食三年十一月己丑太史言日食六分不及所食分數四年十一月癸未太史言當食驗之不食五年四月壬子朔太史言日有食之隂雲不見六年九月癸邜日有食之哲宗元祐二年七月庚戌太史言日當食隂雲不見六年五月己未朔九年三月壬申朔太史言日當食隂雲不見初虧至未時三刻雲間見日西南已食一分餘六刻食甚至七分有雲不見復圓紹聖三年二月丁邜太史言日當食驗之不食四年六月癸未太史言當食隂雲不見元符三年四月丁酉朔徽宗建中靖國元年四月辛邜朔太史言日當食隂雲不見大觀元年十一月壬子朔二年五月庚戌朔四年九月丙寅朔政和三年三月壬子朔五年七月戊辰朔八年五月壬午朔宣和元年四月丙子朔五年八月辛巳朔太史言日當食隂雲不見髙宗建炎三年九月丙午朔食於亢四度紹興五年正月乙巳朔食於女分占曰有喪又曰東國發兵是年徽宗崩於五國城七年二月癸巳朔食於室占人主逰處不節外戚擅權十三年十二月癸未朔食於牛霠雲蔽之不見用舊制拜表稱賀十五年六月乙亥朔食於井占諸侯死又曰大旱民流亡十七年十月辛邜朔食於氐十八年四月戊子朔十九年三月癸未朔二十四年五月癸丑朔二十五年五月丁未朔日皆當食霠雲不見於是十月秦檜卒二十八年三月辛酉朔日當食霠雲不見始降詔免賀猶宣付史館三十年八月丙午朔食於翼占王者失禮宗廟不親又曰民流天下有大變兵起期三年於是始有言金人將敗盟次年逆亮果犯邉三十一年正月甲戌朔太史局言日當食而不食占人君修徳罪已察姦理賢寛恩布徳上動於天則有食而不食三十二年正月戊申朔食於女五月上内禪孝宗隆興元年六月庚申朔食於井三年六月甲寅霠雲不見乾道五年八月甲申朔食於翼九年五月壬辰朔食於井淳熙元年十二月甲申朔食於尾三年三月丙午朔日當食霠雲不見四年九月丁酉朔日當食霠雲不見時孝宗厲精為治十年十一月壬戌朔食於心占曰食壬戌羣小萌食太半災重相死又曰法令有失將相相疑十五年八月甲子朔食於翼占曰子日食夷兵動又曰在翼為王者失禮又秋食為兵十六年二月辛酉朔日當食始孝宗將以正月内禪宰臣周必大言新天子即位而食遽當避殿恐宜少緩上大以為然故展内禪在次月至是日霠雲蔽不見虧分寧宗慶元元年三月丙戌朔食於婁占多寃訟其分有叛臣或大水又曰戒邉臣於是侂胄用事始有意北伐四年正月己亥朔霠雲不見五年正月癸巳朔霠雲不見六年六月乙酉朔日食太史言夜食不見嘉泰二年五月甲辰朔食於畢占主大水潦諸侯死邉將亡逺國謀亂後三年吳曦反於蜀伏誅三年四月己亥朔日當食而太史局言日體圓明不見虧分凡言不見虧分者食不及一分也開禧二年二月壬子朔嘉定四年十一月己酉朔皆當食皆不見虧分七年九月壬戌朔食於角九年二月甲申朔食於室十年七月丙子朔食於張十一年七月庚午朔日食一分其日正午或見或不見太史局言是為陽勝隂微日體不虧十四年五月甲申朔食於畢十六年九月庚子朔日食於軫程氏演繁露曰古謂日輪規環千里特言其周廣當然者耳而無有言其如何其圓者也沈括取銀圜為喻曰月如銀圜本自無光日耀之乃有光其圓非圓乃月與日相望其光全耳及其闕也亦非真闕乃日光之所不及耳此喻最為精審予已詳著之矣淳熙丙申三月予為少蓬太史局言朔日已時日食西北隅食至一分半而復已而日行加已呼請臺官即道山下以盆貯油對日景候之時既及已雲忽驟起少選雲退則日輪西北角微有虧闕約其所欠殆不及一分盖食已而復非不及一分半也其年某人忘其名使虜自北而囘正當食時其行適及河北自北望之則日輪虧及十分之二是太史之言固不能精亦不全謬也予因此之見益知沈括銀圜之說確與之合也臨安距河北則向南二千餘里矣日食而北人在東南故從東南見之闕處全少是以其分而闕僅及一也至於人在河北日並東南故其食處多見而遂十分虧二以此見日輪正圓可驗也此如東京所鑄渾儀今在臨安清臺則於西北兩柱移低兩寸以順天勢其痕迹尚在可驗也南北異地於以凖望天度則臨安與汴京自是不同也文獻通考卷二百八十三
