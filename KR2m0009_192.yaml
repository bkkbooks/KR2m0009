body:
  text: 文獻通考卷一百九十二鄱陽馬端臨貴與著經籍考十九史正史晉書一百三十卷鼂氏曰唐房喬等撰貞觀中以何法盛等十八家晉史未善詔喬與褚遂良許敬宗再加撰次乃據臧榮緒書增損之後又命李淳風李義甫李延夀等十三人分掌著述敬播等四人考正類例西晉四帝五十四年東晉十一帝一百二年又胡羯氐羌鮮卑割據中原為五涼四燕三秦二趙夏蜀十六國共成帝紀十志二十列傳七十載記三十例出於播天文律歷淳風專之喬以宣武紀陸機王羲之傳論上所自為故曰制旨又總題御撰焉按歷代之史惟晉叢冗最甚可以無譏至於取沈約誕誣之説采語林世説幽明録搜神記詭異謬妄之言亦不可不辨夾漈鄭氏曰古者修書出於一人之手成於一家之學班馬之徒是也至唐始用衆手晉隋二書是矣然亦隨其學術所長者而授之未嘗奪人之所能而強人之所不及如李淳風于志寧之徒則授之以志如顔師古孔穎逹之徒則授之以紀傳以顔孔博通古今于李明天文地理圖籍之學所以晉隋二志髙於古今而隋志尤詳明宋書一百卷鼂氏曰梁沈約撰十本紀三十志六十列傳齊永明中約奉詔為是書以何承天書為本旁采徐爰之説頗為精詳但本志兼載魏晉失於限斷又王劭謂其喜造竒説以誣前代如琅琊王妃通小吏牛氏生中宗孝武於路太后處寢息時人多有異議之類是也後梁武帝知而不以為非嘉祐中以宋齊梁陳魏北齊周書舛謬亡缺始詔館職讐校曾鞏等以祕閣所藏多誤不足憑以是正請詔天下藏書之家悉上異本久之始集治平中鞏校定南齊梁陳三書上之劉恕等上後魏書王安國上周書政和中始皆畢頒之學官民間傳者尚少未幾遭靖康丙午之亂中原淪陷此書幾亡紹興十四年井憲孟為四川漕始檄諸州學官求當日所頒本時四川五十餘州皆不被兵書頗有在者然往往亡缺不全收合補綴獨少後魏書計十卷最後得宇文季蒙家本偶有所少者於是七史遂全因命眉山刋行焉陳氏曰本何承天山謙之蘇寶生所撰至徐爰勒為一史起義熙迄大明自永光以來闕而不録今新史始義熙終升明三年獨缺到彥之傳館閣書目謂其志兼載魏晉失於限斷揆以班馬史體未足為疵至其所創符瑞一志不經且無益其贅甚矣崇文總目其書雖諸志失於限斷然有博洽多聞之益今世所傳文多舛失參補未獲趙倫之傳一卷今闕謝靈運傳文注訛駮水心葉氏曰遷固為書志論述前代舊章以經緯當世而漢事自多闕略蔡雍胡廣始有篡輯陳夀范曄廢不復著至沈約比次漢魏以來最為詳悉唐人取之以補晉記然後歷代故實可得而推雖去遷固本意已遠然古事既不能追則所當存者隨世有無而已但其體煩雜非復前比殆成會要矣學者立乎千載之後考見始末當使相承如一日若姑競遷固之華而不求其實則失之遠矣南齊書五十九卷鼂氏曰梁蕭子顯撰八紀十一志四十列傳初江淹已作十志沈約又有紀子顯自表别修然天文但紀災祥州郡不著戶口祥瑞多載圗讖表云天文事祕戶口不知不敢私載陳氏曰子顯齊豫章王嶷之孫本傳稱六十卷南豐曾氏序曰子顯之於斯文喜自馳騁其更改破析刻雕藻繢之變尤多而其文益下豈非材固不可強而有邪梁書五十六卷鼂氏曰唐姚思廉撰六本紀五十列傳唐貞觀三年詔思廉同魏徴撰思廉梁史官察之子推其父意又採謝吳等所記以成此書徴唯著總論而已筆削次序皆出思廉思廉名簡以字行陳書三十六卷鼂氏曰唐姚思廉撰六本紀三十列傳其父察在陳嘗刪撰梁陳事未成陳亡隋文帝問之察以所論載每一篇成輒上之未訖而值察且死屬思廉繼其業貞觀中與梁書同時上之其書世亦罕傳多脫誤陳氏曰思廉採謝旻顧野王等諸書綜括為二史以卒父業南豐曾氏序曰唐興武德五年髙祖以自魏以來二百餘歲世統數更史氏放逸乃詔論次而思廉遂受詔為陳書久之猶不就貞觀三年遂詔論撰於祕書內省十年正月壬子始上之觀察等之為此書歷三世傳父子更數十歲而後乃成蓋其難如此然及其既成與宋魏齊梁等書世亦傳之者少故學者於其行事之迹亦罕得而詳也而其書亦以罕傳則自祕府所藏往往脫誤嘉祐六年八月始詔校讐使可鏤板行之天下而臣等言梁陳等書缺獨館閣所藏恐不足以定著願詔京師及州縣藏書之家使悉上之先皇帝為下其事至七年冬稍稍始集臣等以相校至八年七月陳書三十六篇者始校定可傳之學者其疑者亦不敢損益特各疏於篇末其書舊無目録列傳名氏多闕謬因别為目録一篇使覽者得詳焉夫陳之為陳蓋偷為一切之計非有先王經紀禮義風俗之美制治之法可章示後世然而兼權尚計明於任使恭儉愛人則其始之所以興惑於邪臣溺於嬖妾忘患縱欲則其終之所以亡興亡之端莫非自已致者至於有所因造以為號令威刑職官州郡之制雖其事已淺然亦各施於一時皆學者之所不可不考也而當時之士爭奪詐偽茍得偷合之徒尚不得不列以為世戒而况於壞亂之中倉皇之際士之安貧樂義取舍去就不為患禍勢利動其心者亦不絶於其間若此人者可謂篤於善矣蓋古人之所思見而不可得風雨之詩所為作者也安可使之泯沒不少概見於天下哉則陳之史其可廢乎蓋此書成之既難其後又久不顯及宋興已百年古文遺事靡不畢講而始得盛行於天下列於學官其傳之之難又如此豈非遭遇固自有時也哉後魏書一百三十卷魏收本傳收修魏書不甚能平修史諸人宗祖姻戚多被書録飾以美言夙有怨言多沒其善每云何物小子敢共魏收作色舉之則使上天按之則使入地初收得陽休之助因謝曰無以謝德當為卿作佳傳又納爾朱榮子金故減其惡而增其善時謂之穢史崇文總目齊天保中始詔收撰魏史收博采諸家舊文隨條甄舉綴屬後事成一代大典追敘魏先祖二十八帝下終孝靜作十二紀九十二列傳十志析之凡百三十篇而史有三十五例二十五序九十四論前後二表一􅪥然收諂於齊氏言魏室多所不平至隋開皇中敕魏淡更作魏史唐李延夀作北史並行於世與收史相亂因而卷第殊舛今所存僅九十餘篇鼂氏曰北齊魏收撰初魏史官崔浩既誅太和後始有李彪崔鴻等書魏末山偉綦雋更主國書二十餘年事迹蕩然萬不紀一文宣時始詔收撰次成十二紀十志九十二列傳上之悉焚舊書多諂諱不平受爾朱榮子金故減其惡夙有怨者多沒其善黨北朝貶江左時人疾之號為穢史劉知幾謂其生絶允嗣死逄剖斫皆隂慝所致後隋文帝命顔之推等别修唐貞觀中陳叔逹亦作五代史皆不傳獨收書在皇朝命劉恕等校正陳氏曰始魏初鄧彥海撰代記十餘卷其後崔浩典史為編年體李彪始分作紀表志傳收搜採遺亡綴續後事備一代史籍上之時論言收著史不平詔與諸家子孫共加討論前後訴者百有餘人衆口喧然號為穢史僕射楊愔髙德正與收皆親抑塞訴辭遂不復論今紀闕二卷復闕二十二卷又三卷不全志闕天象二卷收既以史招怨齊亡之歲竟遭發冢棄骨之禍隋文帝命魏淡等更撰魏書九十二卷今皆不傳而收書獨行中興書目謂所闕太宗紀以淡補之闕志以太素書補之二書既亡惟此紀志獨存不知何據也後魏書紀一卷崇文總目魏淡撰初髙祖以魏收書褒貶失實平繪中興事敘事不倫詔淡别成魏史淡斷自道武下迄恭帝為十二帝紀七十八列傳史論及例目録一篇合九十二篇退東魏孝靜帝稱傳矯正收繪之失收天子名則書太子名則諱淡諱皇帝名書太子名收諱太武獻文之弒使同善終天年淡顯書之以懲逆收書敵國皆曰死淡書曰卒體裁簡正帝甚善之然世以收史為主故淡書亡闕今才紀一卷存後魏書天文志二卷崇文總目唐張太素撰魏書凡百篇今悉散亡唯此二篇存焉北齊書五十卷鼂氏曰唐李百藥撰本紀八列傳四十二百藥父德林在齊嘗撰著紀傳貞觀初詔分修諸史百藥因父書續成以獻諸史稱帝號百藥避唐朝名諱不書世祖世宗之類例既不一議者少之書今亡闕不完周書五十卷鼂氏曰唐令狐德棻等撰本紀八列傳四十二初周有栁蚪隋牛洪各有撰次率多抵牾貞觀中德棻請撰次乃詔與陳叔逹唐儉共成之先是蘇綽秉周政軍國詞令多凖尚書牛𢎞為史尤務清言德棻因之以成是書故多非實録仁宗時出太清樓本合史館祕閣本又募天下書而取夏竦李巽家本下館閣正是其文字其後林希王安國上之陳氏曰初德棻武德中建言近代無正史詔德棻及諸臣論撰歷年不能就罷之貞觀二年復詔撰定議者以魏有收淡二家書為已詳惟五家史當立德棻與岑文本崔仁師次周史李百藥次齊史姚思廉次梁陳史魏徴次隋史房元齡總監而修撰之原自德棻發之隋書八十五卷鼂氏曰唐魏徴等撰紀五列傳五十五長孫無忌等撰志三十初詔顔師古孔穎逹修述徴總其序論皆徴自作復又詔于志寧李淳風韋安仁李延夀同修五代史志無忌上之詔編第入隋書人亦號五代史志天文律曆五行三志淳風獨作陳氏曰十志髙宗時始成上總梁陳齊周之事俗號五代志夾漈鄭氏曰按隋志極有倫理而本末兼明可以無憾遷固以來皆不及也正為班馬只事虛言不求典故實迹所以三代紀綱至遷八書固十志幾於絶緒雖其文彩灑然可喜求其實用則無有也觀隋志所以該五代南北兩朝紛然淆亂豈易貫穿而讀其書則了然如在目良由當時區處各當其才顔孔通古今而不明天文地理之序故只令修紀傳而以十志付之志寧淳風輩所以粲然具舉南史八十卷北史八十卷鼂氏曰李延夀撰延夀父太師嘗謂宋齊逮周隋分隔南北南謂北為索虜北謂南為島夷欲改正擬吳越春秋編年未就而卒延夀後預修晉隋書因究悉舊事更依馬遷體總序八代北起魏盡隋二百四十二年南起宋盡陳百七十年為二史刪煩補闕過本史遠甚今學者止觀其書沈約魏收等所撰皆不行獨闕本志而隋書有之故隋書亦行於世崇文總目唐髙宗善其書自為之序序今闕遁齋陳氏曰李延夀著南北史粗得作史之體故唐書本傳亦謂其刪略穰辭過本書遠甚然好述妖異兆祥謠讖特為繁猥司馬公曰光少時惟得髙氏小史讀之自宋迄隋并南北史或未嘗得見或讀之不熟今因修南北朝通鑑方得細觀乃知李延夀之書亦近世之佳史也雖於禨祥詼嘲小事無所不載然敘事簡徑比於南北正史無煩冗蕪穢之辭竊謂陳夀之後惟延夀可以亞之也唐書一百三十卷崇文總目唐韋述撰初吳兢撰唐史自創業訖於開元凡一百一十卷述因競舊本更加筆削刪去酷吏傳為紀志列傳一百一十二卷至德乾元以後史官于休烈又增肅宗紀二卷而史官令狐峘等復於紀志傳後隨篇增緝而不加卷帙今書一百三十卷其十六卷未詳撰人名氏唐書二百卷鼂氏曰石晉宰相劉昫等撰因韋述舊史增損以成為帝紀二十列傳一百五十繁略不均校之實録多所闕漏又是非失實其甚至以韓愈文章為大紕繆故仁宗時刪改焉新唐書二百二十五卷鼂氏曰皇朝嘉祐中曾公亮等被詔刪定歐陽修撰紀志宋祁撰列傳舊書約一百九十卷新書約一百七十四卷而其中增表故書成上於朝自言曰其事則增於前其文則省於舊也而議者頗謂永叔學春秋每務褒貶子京通小學唯刻意文章采雜説既多往往抵牾有失實之歎焉陳氏曰初慶歷中詔王堯臣張方平等别修久而未就至和初乃命修為紀志祁為列傳范鎮王疇宋敏求吕夏卿劉羲叟同編修嘉祐五年上之凡廢傳六十一增傳三百三十一志三表四故其進書上表曰其事則增於前其文則省於舊苐賞增秩訓詞劉敞原父所行最為古雅曰古之為國者法後王為其近於己制度文物可觀故也唐有天下且三百年明君賢臣相與經營扶持之其盛德顯功美政善謀固已多矣而史官非其人記述失序使興敗成壞之迹晦而不章朕甚恨之肆擇廷臣筆削舊書勒成一家具官歐陽修宋祁創立紀統裁成大體范鎮等網羅遺逸厥協異同凡十有七年大典乃立閎富精核度越諸子矣校讎有功朕將據古鑒今以立時治為朕得法其勞不可忘也皆增秩一等布書於天下使學者咸觀焉舊例修書止著官髙一人名銜歐公曰宋公於我為前輩且於此書用力久且深何可沒也遂於紀傳各著之宋公感其退遜今按舊書成於五代文氣卑陋之時紀次無法詳略失中論贊多用儷語固不足傳世而新書不出一手亦未得為全善本紀用春秋法削去詔令雖大略猶不失簡古至列傳用字多奇澀殆類虬戶銑溪體識者病之歐公嘗卧聽藩鎮傳序曰使筆力皆如此亦未易及也然其序全用杜牧罪言實無宋公一語然則歐公殆不滿於宋名銜之著固惡夫爭名抑亦以自表異邪溫公通鑑多據舊史而唐庚子西直謂新唐書敢亂道而不好雖過甚亦不為亡謂也劉元城亦謂事增文省正新書之失處云宋氏筆記曰文有屬對平側用事者供公家一時宣讀施行似快便然不可施於史傳余修唐書未能得唐人一詔一令可載於傳者惟拾對偶之文近髙古者乃可著於篇大抵史近古對偶非宜今以對偶之文入史䇿如黛粉飾壯士笙匏佐鼓聲非所宜云髙氏緯略曰仁宗詔重修唐書十年而歐陽公至分撰帝紀表志七年書成韓魏公素不悅宋景文公以所上列傳文采太過又一書出兩手詔歐公看詳改歸一體公受命歎曰宋公於我前輩人所見不同詎能盡如己意竟不易一字又故事修書進御惟書署官崇者是時宋公守鄭州歐公位在上公曰宋公於此日久功深吾可掩其長哉遂各列其姓名宋公聞之曰自昔文人相凌掩斯善古未有也然宋公却曾自撰紀表志今其家猶有此本世人固未嘗見之耳平園周氏曰景文之於唐史刪煩為簡變今以古用功既至尤宜不茍也如吳兢一傳具藁不知其幾五代史一百五十卷鼂氏曰皇朝開寶中詔修梁唐晉漢周書盧多遜扈蒙張淡李昉劉兼李穆李九齡同修宰相薛居正監修新五代史記七十五卷鼂氏曰皇朝歐陽修永叔以薛居正史繁猥失實重加修定藏於家永叔沒後朝廷聞之取以付國子監刋行國史稱其可繼班固劉向人不以為過特恨其晉出帝論以為因濮園議而發云陳氏曰歐陽子之説曰昔孔子作春秋因亂世而立治法余為本紀以治法而正亂君發論必以嗚呼曰此亂世之書也諸臣止事一朝曰某臣傳其更事歷代者曰雜傳尤足以為世訓然不為韓瞪眼立傳識者有以見作史之難按韓通之死太祖猶未踐極也其當在周臣明矣李方叔師友談記歐陽公五代史最得春秋之法蓋文忠公學春秋於胡瑗孫復故褒貶謹嚴雖司馬子長無以復加不幸五十二年之間皆戎狄亂華君臣之際無赫赫可道之功業也三朝國史一百五十卷鼂氏曰皇朝國史紀十卷志六十卷列傳八十卷呂夷簡等撰初景德中詔王旦先文元楊億等九人撰太祖太宗兩朝史至天聖五年詔夷簡宋綬劉筠陳堯佐王居正李淑黃鑑謝絳馮元加入真宗朝史王曾監修曾罷夷簡代八年書成計七百餘傳比之三朝實録增者大半事核文贍褒貶得宜百世之所考信云兩朝國史一百二十卷鼂氏曰仁宗英宗兩朝國史也王圭等撰元豐五年六月奏御監修王圭史官蒲宗孟李清臣王存趙彥若曾肇賜銀絹有差蘇頌黃履林希蔡卞劉奉世以他職罷去吳充宋敏求前死皆有錫賚紀五卷志四十五卷比之實録事迹頗多但非冦凖而是丁謂託之神宗詔旨四朝國史二百五十卷陳氏曰紹興二十八年置修國史院修三朝正史三十一年提舉陳康伯奏紀成乞選日進呈至乾道二年閏九月始與太上聖政同上淳熙五年同修史李燾言修四朝正史開院已十七年乞責以近限七年十月修史王希呂奏志成十二月進呈至十三年修史洪邁奏昨得旨限一年內修成列傳今已書成十二月與會要同進蓋首尾三十年所歷史官不知其幾矣中興藝文志紹興末始修神哲徽三朝正史越三年紀成乾道初進時洪邁已出李燾未入館史官遷易無常莫知誰筆後又進欽宗本紀詔通為四朝國史乃修諸志未進而燾去國淳熙初志成燾之力為多召修列傳垂成而燾卒上命洪邁專典之初邁以孫覿熟宣靖事乃奏令撰蔡京王黼童貫蔡攸梁師成談稹朱勔种師道何栗劉延慶聶昌談世績等列傳覿頗徇愛憎邁多採之邁又奏四朝諸臣有雖顯貴而無事迹可書者用遷固之劉舍薛澤許昌例不為立傳踰年書成為列傳八百七十邁又嘗欲合九朝三史為一書而不及成容齋洪氏隨筆曰本朝國史凡三書太祖太宗真宗曰三朝仁宗英宗曰兩朝神宗哲宗徽宗欽宗曰四朝各自記事至於諸志若天文地理五行之類不免煩復元豐中三朝已就兩朝且成神宗專以付曾鞏使合之鞏奏言五朝舊史皆纍世公卿道德文學朝廷宗工所共凖裁既已勒成大典豈宜輒議損益詔不許始謀纂成會以憂去不克成其後神哲各自為一史紹興初以其是非褒貶皆失實廢而不用淳熙乙巳邁承乏修史丙午之冬成書進御遂請合九朝為一夀皇即以見屬嘗奏云臣所為區區有請者蓋以二百年間典章文物之盛分見三書倉卒討究不相貫屬及纍代臣僚名聲相繼當如前史以子係父之體類聚歸一若夫制作之事則已經先正名臣之手是非褒貶皆有所據依不容妄加筆削乞以此奏下之史院俾後來史官知所以編纘之意無或輒將成書擅行刪改上曰如有未穩處改削無害邁既奉詔開院亦修成三十餘卷矣而有永思攢宫之役才歸即去國尤袤以髙宗皇帝實録為辭請權罷史院於是遂已祥符中王旦亦曾修撰兩朝史今不傳文獻通考卷一百九十二
